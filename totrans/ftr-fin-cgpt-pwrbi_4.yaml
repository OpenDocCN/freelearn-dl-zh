  prefs: []
  type: TYPE_NORMAL
  zh: 这些通过DCF分析得出的估计涉及众多假设，强调了专业财务咨询的必要性。这些发现的真实世界效用通过Power BI可视化得到了显著增强，这些可视化提供了一种动态直观的方式来理解这些潜在场景。这些可视化包括各种图表，展示了这些市场的预期增长、约翰·迪尔的潜在收入以及相关费用的分解。
- en: In this light, the combination of DCF analysis and Power BI visualizations presents
    a powerful toolkit for envisioning John Deere’s opportunities in these promising
    markets. As always, it is crucial to make investment decisions in consultation
    with a financial advisor, taking into account the broader economic landscape and
    John Deere’s specific strategies.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种背景下，DCF分析和Power BI可视化的结合为设想约翰·迪尔在这些有希望的市场中的机会提供了一个强大的工具包。一如既往，在咨询财务顾问的情况下做出投资决策至关重要，同时考虑到更广泛的经济格局和约翰·迪尔的具体策略。
- en: Now, get ready to step into the future as we explore the thrilling world of
    AutoGPT and how it’s transforming the face of financial analysis and trading.
    As we voyage through this exciting realm of autonomous AI, prepare to witness
    how AI can function as your personal finance assistant, predicting market trends,
    making investment recommendations, and even executing trades independently!
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，准备好步入未来，我们将探索激动人心的AutoGPT世界以及它如何改变财务分析和交易的面貌。在我们穿越这个令人兴奋的自主AI领域时，准备好见证AI如何作为您的个人财务助手，预测市场趋势，提供投资建议，甚至独立执行交易！
- en: Embracing the AI revolution with AutoGPT – reshaping financial analysis and
    trading through autonomous AI
  id: totrans-307
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与AutoGPT拥抱AI革命——通过自主AI重塑财务分析和交易
- en: AutoGPT, an innovative open source Python application, is built on the powerful
    GPT-4 model from OpenAI. This autonomous tool can independently analyze financial
    data, uncover crucial insights, and formulate investment recommendations according
    to your specified objectives. Imagine having an AI assistant that could supercharge
    your financial decisions – that’s the reality with AutoGPT.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGPT，一个创新的开源Python应用程序，建立在OpenAI强大的GPT-4模型之上。这个自主工具可以独立分析财务数据，揭示关键洞察，并根据您指定的目标制定投资建议。想象一下拥有一个能够增强您财务决策的AI助手——这就是AutoGPT带来的现实。
- en: But, as with any tool, AutoGPT comes with its strengths and caveats. While it
    brings efficiency, accuracy, and scalability to your financial analysis, you’ll
    need technical skills to harness its full potential. Moreover, like all AI, it
    should be seen as a supportive tool rather than a replacement for human judgment.
    Therefore, it’s essential to validate its outputs and ensure its use aligns with
    your risk tolerance and investment goals.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与任何工具一样，AutoGPT也有其优势和局限性。虽然它为您的财务分析带来了效率、准确性和可扩展性，但您需要技术技能来充分发挥其潜力。此外，像所有AI一样，它应被视为一种辅助工具，而不是替代人类判断的工具。因此，验证其输出并确保其使用与您的风险承受能力和投资目标相一致是至关重要的。
- en: 'Let’s explore how AutoGPT can revolutionize financial analysis and trading:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索AutoGPT如何彻底改变财务分析和交易：
- en: '**Automated trading**: AutoGPT can monitor real-time market data and execute
    trades based on predefined strategies. For instance, with John Deere’s stock,
    AutoGPT can automatically execute a trade when the 50-day moving average goes
    above the 200-day moving average, signaling a potential upward trend.'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化交易**：AutoGPT可以监控实时市场数据并根据预定义的策略执行交易。例如，当约翰·迪尔（John Deere）的股票50日移动平均线高于200日移动平均线时，AutoGPT可以自动执行交易，这表明可能存在上升趋势。'
- en: '**Monte Carlo simulation**: AutoGPT can take historical data and use Monte
    Carlo simulations to predict potential paths for John Deere’s stock price. This
    probabilistic approach allows for better risk management and investment decision-making.'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蒙特卡洛模拟**：AutoGPT可以使用历史数据并利用蒙特卡洛模拟来预测约翰·迪尔公司股价的可能路径。这种概率方法有助于更好的风险管理投资决策。'
- en: '**Portfolio rebalancing strategy**: AutoGPT can monitor a diverse portfolio
    – say, John Deere, Caterpillar Inc., CNH Industrial, and Kubota Corp. – and autonomously
    trigger a rebalance if the holdings of any stock deviate by more than 5% from
    their target allocation. This allows for consistent portfolio management and ensures
    your investments stay aligned with your financial goals.'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资组合再平衡策略**：AutoGPT可以监控多样化的投资组合——例如，约翰·迪尔公司、卡特彼勒公司、CNH工业公司和久保田公司——并在任何股票的持有量偏离其目标分配超过5%时自动触发再平衡。这允许进行一致的投资组合管理，并确保您的投资与您的财务目标保持一致。'
- en: The pros and cons of AutoGPT in financial analysis
  id: totrans-314
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AutoGPT在金融分析中的优缺点
- en: 'Like any tool, AutoGPT has its strengths and limitations. Let’s explore them:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何工具一样，AutoGPT有其优点和局限性。让我们来探讨它们：
- en: 'Pros:'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优点：
- en: '**Efficiency**: AutoGPT can automate time-consuming tasks, such as data analysis
    and report generation, freeing up your time for strategic decision-making'
  id: totrans-317
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**：AutoGPT可以自动化耗时的工作，如数据分析报告生成，从而释放您的时间用于战略决策。'
- en: '**Accuracy**: By leveraging AI, AutoGPT can process vast amounts of data with
    high precision, reducing the risk of human error'
  id: totrans-318
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**准确性**：通过利用AI，AutoGPT可以以高精度处理大量数据，从而降低人为错误的风险。'
- en: '**Scalability**: AutoGPT can manage large datasets and complex calculations
    that would be challenging for a human analyst'
  id: totrans-319
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：AutoGPT可以管理大型数据集和复杂的计算，这对于人类分析师来说可能具有挑战性。'
- en: 'Cons:'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺点：
- en: '**Complexity**: Setting up and using AutoGPT requires a certain level of technical
    expertise, including familiarity with Python and various API keys.'
  id: totrans-321
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：设置和使用AutoGPT需要一定的技术专长，包括熟悉Python和各种API密钥。'
- en: '**Limitations in real-world scenarios**: While AutoGPT is powerful, it may
    not perform well in complex, real-world business scenarios. It’s crucial to validate
    its output and use it as a tool to support, not replace, human judgment.'
  id: totrans-322
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现实场景中的局限性**：虽然AutoGPT功能强大，但在复杂、现实世界的商业场景中可能表现不佳。验证其输出并将其用作支持而非取代人类判断的工具至关重要。'
- en: '**Data privacy**: As AutoGPT requires internet access, there could be potential
    data privacy concerns that need to be addressed.'
  id: totrans-323
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据隐私**：由于AutoGPT需要互联网访问，可能存在需要解决的数据隐私问题。'
- en: OpenAI API credit and limits.
  id: totrans-324
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI API信用额和限制。
- en: AutoGPT can create errors that need to be corrected.
  id: totrans-325
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: AutoGPT可能会创建需要纠正的错误。
- en: Using AutoGPT in finance, investment, and trading
  id: totrans-326
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在金融、投资和交易中使用AutoGPT
- en: 'AutoGPT can be a game-changer in finance, investment, and trading. Here’s how:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGPT可以在金融、投资和交易中带来变革。以下是它的应用方式：
- en: '**Automated financial analysis**: AutoGPT can independently analyze financial
    data, calculate financial ratios, and generate insights. For example, it can automate
    the analysis of John Deere’s (NYSE: DE) financial performance, providing you with
    valuable insights without the manual work.'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化金融分析**：AutoGPT可以独立分析金融数据，计算财务比率，并生成见解。例如，它可以自动化分析约翰·迪尔公司（NYSE: DE）的财务表现，为您提供有价值的见解，而无需手动工作。'
- en: '**Investment recommendations**: Based on your specified goals, AutoGPT can
    evaluate investment opportunities and make recommendations. It can analyze market
    trends, company performance, and risk factors to suggest potential investments.'
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资建议**：根据您指定的目标，AutoGPT可以评估投资机会并提出建议。它可以分析市场趋势、公司表现和风险因素，以提出潜在的投资。'
- en: '**Trading automation**: AutoGPT can monitor market data in real time, generate
    trading signals based on your trading strategy, and even execute trades. This
    can help you respond quickly to market changes and execute your trading strategy
    more efficiently.'
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易自动化**：AutoGPT可以实时监控市场数据，根据您的交易策略生成交易信号，甚至执行交易。这可以帮助您快速响应市场变化并更有效地执行您的交易策略。'
- en: Remember, while AutoGPT is a powerful tool, it’s important to use it responsibly.
    Always validate its output and use it as a tool to support, not replace, human
    judgment. We will show some examples of AutoGPT in the following sections.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，虽然AutoGPT是一个强大的工具，但负责任地使用它很重要。始终验证其输出，并将其用作支持而非取代人类判断的工具。在接下来的章节中，我们将展示一些AutoGPT的示例。
- en: Using AutoGPT for automated trading (moving average trading example)
  id: totrans-332
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用AutoGPT进行自动化交易（移动平均交易示例）
- en: Imagine that you’re an investor interested in John Deere. You’ve developed a
    trading strategy that buys John Deere’s stock when its 50-day moving average goes
    above its 200-day moving average, a signal that often indicates a potential upward
    price trend.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
- en: Monitoring these moving averages manually can be time-consuming and prone to
    human error. This is where AutoGPT comes into play. With AutoGPT, you can automate
    this process, allowing the AI to monitor the moving averages of John Deere’s stock
    in real time. When the 50-day moving average goes above the 200-day moving average,
    AutoGPT can execute the trade on your behalf, adhering to your predefined strategy.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
- en: This automation not only saves you time but also ensures that you don’t miss
    out on potential investment opportunities due to human oversight or time constraints.
    It allows you to execute your trading strategy more efficiently, freeing up your
    time to focus on other important aspects of your investment portfolio.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
- en: By leveraging AutoGPT, you’re not just automating your trading strategy; you’re
    also enhancing your investment decision-making process with the power of AI. This
    can give you a competitive edge in the market, helping you make more informed
    and timely investment decisions.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
- en: Remember, while AutoGPT can be a powerful tool, it’s important to use it responsibly.
    Always ensure that your trading strategy aligns with your investment goals and
    risk tolerance, and regularly review and adjust your strategy as market conditions
    change. Happy investing!
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
- en: '**AutoGPT** **setup process**'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn how to set up an environment on a PC.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
- en: Here are detailed instructions on how to download and install Docker Desktop
    on a PC running Windows.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1 – system** **requirements verification:**'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
- en: 'First, make sure your PC meets the following system requirements:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Windows 10 (64-bit) Pro, Enterprise, or Education. Docker does not
    run on Windows 10 Home.
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Virtualization must be enabled. You can check this by opening Task Manager
    (*Ctrl* + *Shift* + *Esc*) and switching to the **Performance** tab. Next to the
    **CPU** category, you should see **Virtualization: Enabled**. If it says **Disabled**,
    you will need to go into your BIOS/UEFI settings to enable it.'
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enabling virtualization through the BIOS/UEFI is a hardware-level setting, and
    the exact steps can vary, depending on your motherboard manufacturer.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some general steps on BIOS/UEFI settings for most motherboard manufacturers:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
- en: '**Restart** **your computer**:'
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Restart your computer. As it starts up, you’ll need to press a specific key
    to enter the BIOS/UEFI settings. This key varies by manufacturer but is often
    *F1*, *F2*, *F10*, *Esc*, or *Del*.
  id: totrans-348
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enter the** **BIOS/UEFI setup**:'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Keep an eye on the screen for a message that tells you which key to press to
    enter the setup. Press this key immediately.
  id: totrans-350
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Navigate to the** **Advanced tab**:'
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once in the BIOS/UEFI menu, navigate to the **Advanced** tab or something similarly
    named. Again, this varies by manufacturer.
  id: totrans-352
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦进入 BIOS/UEFI 菜单，导航到 **高级** 选项卡或类似名称的选项。请注意，这因制造商而异。
- en: '**Locate the** **virtualization settings**:'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定位虚拟化设置**：'
- en: Inside the **Advanced** menu, look for a category called **CPU Configuration**,
    **Advanced CPU Features**, or simply **Virtualization**.
  id: totrans-354
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 **高级** 菜单中，寻找一个名为 **CPU 配置**、**高级 CPU 功能** 或简单地称为 **虚拟化** 的类别。
- en: '**Enable virtualization**:'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**启用虚拟化**：'
- en: Once you’ve located your respective virtualization option, change the setting
    to **Enabled**. You can usually do this by selecting the option, hitting *Enter*,
    and choosing **Enabled** from the list.
  id: totrans-356
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦找到您的虚拟化选项，将其设置为 **启用**。您通常可以通过选择选项，按 *Enter* 键，然后从列表中选择 **启用** 来完成此操作。
- en: '**Save** **and exit**:'
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**保存并退出**：'
- en: After enabling virtualization, save your changes and exit the BIOS/UEFI setup.
    To do this, navigate to the **Save & Exit** menu, which is usually located as
    an exit door icon or simply written as **Save &** **Exit**.
  id: totrans-358
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启用虚拟化后，保存您的更改并退出 BIOS/UEFI 设置。为此，导航到 **保存并退出** 菜单，它通常位于一个出口门图标或简单地写成 **保存并**
    **退出**。
- en: '**Restart** **your computer**:'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新启动您的计算机**：'
- en: Your computer will restart. You can now check Task Manager again to confirm
    that virtualization is enabled.
  id: totrans-360
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的计算机将重新启动。现在您可以再次检查任务管理器以确认虚拟化已启用。
- en: '**Recheck** **Task Manager**:'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新检查任务管理器**：'
- en: 'After your system restarts, open Task Manager (*Ctrl* + *Shift* + *Esc*) and
    switch to the **Performance** tab. Next to the **CPU** category, it should now
    say **Virtualization: Enabled**.'
  id: totrans-362
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统重启后，打开任务管理器 (*Ctrl* + *Shift* + *Esc*) 并切换到 **性能** 选项卡。在 **CPU** 类别旁边，现在应该显示
    **虚拟化：已启用**。
- en: Important note
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: '**BIOS/UEFI interface**: These interfaces are not uniform and can differ significantly,
    depending on the manufacturer. The terms and menu names are generic and should
    be similar to what you see.'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: '**BIOS/UEFI 界面**：这些界面不统一，并且可能因制造商而异。术语和菜单名称是通用的，应该与您看到的相似。'
- en: '**Be cautious**: Be careful when making changes in the BIOS/UEFI as incorrect
    settings could make your system unstable.'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: '**小心操作**：在 BIOS/UEFI 中进行更改时请小心，错误的设置可能会使您的系统不稳定。'
- en: '**Check your motherboard manual**: If you’re unsure, it’s a good idea to consult
    your motherboard’s manual or look for official guidance from the manufacturer’s
    website.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: '**查阅您的主板手册**：如果您不确定，建议您查阅主板手册或从制造商的网站上寻找官方指导。'
- en: 'Follow these steps to create a Docker account and download Docker Desktop:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤创建 Docker 账户并下载 Docker Desktop：
- en: 'Create a Docker Account:'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建 Docker 账户：
- en: '**Open your web browser**: Open your preferred web browser and go to the Docker
    Hub website: [https://hub.docker.com](https://hub.docker.com).'
  id: totrans-369
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**打开您的网页浏览器**：打开您首选的网页浏览器并访问 Docker Hub 网站：[https://hub.docker.com](https://hub.docker.com)。'
- en: '**Navigate to Sign Up**: In the top-right corner of the page, you’ll see a
    **Sign In** button. Click on it, and then click on **Sign Up** in the dialog that
    appears.'
  id: totrans-370
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**导航到注册页面**：在页面右上角，您会看到一个 **登录** 按钮。点击它，然后在出现的对话框中点击 **注册**。'
- en: '**Enter details**:'
  id: totrans-371
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入详细信息**：'
- en: '**Username**: Choose a unique username that you’ll use to log in to Docker
    Hub.'
  id: totrans-372
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户名**：选择一个独特的用户名，您将使用它登录 Docker Hub。'
- en: '**Email**: Provide a valid email address. You’ll need to confirm this email
    later, so make sure it’s accessible.'
  id: totrans-373
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**电子邮件**：提供一个有效的电子邮件地址。您稍后需要确认此电子邮件，所以请确保它可访问。'
- en: '**Password**: Create a strong password that you can remember. Usually, it needs
    to be a mix of letters, numbers, and special characters.'
  id: totrans-374
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**密码**：创建一个您能记住的强大密码。通常，它需要字母、数字和特殊字符的混合。'
- en: '**Complete the CAPTCHA**: You may be asked to complete a CAPTCHA to prove you’re
    not a robot.'
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完成 CAPTCHA 验证**：您可能需要完成 CAPTCHA 验证以证明您不是机器人。'
- en: '**Agree to the terms and conditions**: Check the box to agree to Docker’s terms
    and conditions. Make sure you read them before agreeing.'
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**同意条款和条件**：勾选复选框以同意 Docker 的条款和条件。在同意之前请确保您已阅读。'
- en: '**Click Sign Up**: After filling out all the details and agreeing to the terms,
    click the **Sign** **Up** button.'
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**点击注册**：填写所有详细信息并同意条款后，点击 **注册** 按钮。'
- en: '**Verify your email**: You’ll receive a verification email from Docker. Go
    to your email inbox, open the Docker email, and click on the verification link.
    This confirms that the email address you’ve provided is valid.'
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**验证您的电子邮件**：您将收到 Docker 发送的验证电子邮件。请前往您的邮箱收件箱，打开 Docker 邮件，并点击验证链接。这确认了您提供的电子邮件地址是有效的。'
- en: '`Installer.exe` file.'
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Installer.exe` 文件。'
- en: '`Installer.exe` file to start the installation.*   When the installer starts,
    you’ll be greeted with a window that tells you that Docker will be installed on
    your computer and that it will also install the necessary features of Windows.
    Click **Ok** to proceed.*   Accept the license agreement and authorize the installer.*   Follow
    the prompts on the installation wizard and accept the defaults unless you have
    a specific need to change them.*   `docker --version`.'
  id: totrans-380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Installer.exe`文件以开始安装。*   当安装程序启动时，您将看到一个窗口，告知您将在您的计算机上安装Docker，并且它还将安装Windows的必要功能。单击**确定**继续。*   接受许可协议并授权安装程序。*   按照安装向导的提示操作，除非您有特殊需求需要更改，否则请接受默认设置。*   `docker
    --version`。'
- en: You should see Docker’s version in the output. This means that Docker has been
    installed and is running correctly.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在输出中看到Docker的版本。这意味着Docker已安装并正确运行。
- en: '**Get an OpenAI** **API key:**'
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取OpenAI** **API密钥**：'
- en: Next, get your OpenAI API key from [https://platform.openai.com/account/api-keys](https://platform.openai.com/account/api-keys).
    Note that to avoid limitations, consider setting up a paid account. We suggest
    that you use an API key for the paid version (GPT-4), but can use an API for a
    free earlier version (GPT-3.5 turbo).
  id: totrans-383
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 接下来，从[https://platform.openai.com/account/api-keys](https://platform.openai.com/account/api-keys)获取您的OpenAI
    API密钥。请注意，为了避免限制，请考虑设置付费账户。我们建议您使用付费版本（GPT-4）的API密钥，但也可以使用免费早期版本（GPT-3.5 turbo）的API。
- en: '**Step 7 – set up the** **AutoGPT project:**'
  id: totrans-384
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤7 – 设置** **AutoGPT项目**：'
- en: 'Once Docker has been installed, create a project directory for AutoGPT using
    your system’s command line:'
  id: totrans-385
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一旦安装了Docker，使用系统命令行为AutoGPT创建一个项目目录：
- en: '[PRE14]'
  id: totrans-386
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Once you’ve made the necessary changes, save the `docker-compose.yml` file.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行必要的更改后，保存`docker-compose.yml`文件。
- en: Now, you need to create the necessary configuration files. To do so, locate
    the `.env.template` file in the `Auto-GPT` main folder. Depending on your OS (`Windows`,
    `macOS`), this may be a hidden file. Duplicate it as `.env`, by using `cp .env.template
    .env`, for example. Edit this `.env` file, filling in your OpenAI API key after
    `OPENAI_API_KEY=`, without quotes or spaces. Add other service keys/tokens if
    needed. Remove `#` to activate settings. Finally, save and close the file.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您需要创建必要的配置文件。为此，在`Auto-GPT`主文件夹中找到`.env.template`文件。根据您的操作系统（`Windows`，`macOS`），这可能是一个隐藏文件。通过使用`cp
    .env.template .env`等命令将其复制为`.env`文件。编辑此`.env`文件，在`OPENAI_API_KEY=`之后填写您的OpenAI
    API密钥，无需引号或空格。如有需要，添加其他服务密钥/令牌。移除`#`以激活设置。最后，保存并关闭文件。
- en: Important note
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: To learn more about `docker-compose.yaml` and the configuration file layout
    provided by Dr. Christian Mayer, go to [https://blog.finxter.com/installing-auto-gpt-any-other-way-is-dangerous/](https://blog.finxter.com/installing-auto-gpt-any-other-way-is-dangerous/).
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于`docker-compose.yaml`和Dr. Christian Mayer提供的配置文件布局的信息，请访问[https://blog.finxter.com/installing-auto-gpt-any-other-way-is-dangerous/](https://blog.finxter.com/installing-auto-gpt-any-other-way-is-dangerous/)。
- en: 'Back in the command line, run the following command to start the AutoGPT service
    with Docker:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 返回命令行，运行以下命令以使用Docker启动AutoGPT服务：
- en: '[PRE15]'
  id: totrans-392
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Step 8 – pull AutoGPT** **from Docker:**'
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤8 – 从Docker** **拉取AutoGPT**：'
- en: 'Pull the AutoGPT image from Docker Hub using the following command:'
  id: totrans-394
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用以下命令从Docker Hub拉取AutoGPT镜像：
- en: '[PRE16]'
  id: totrans-395
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '`ai_goals`:'
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai_goals`：'
- en: '- Buy John Deere stock when its 50-day moving average goes above its 200-day
    moving average'
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 当约翰·迪尔股票的50日移动平均线高于其200日移动平均线时购买约翰·迪尔股票'
- en: '- Sell John Deere stock when its 50-day moving average goes below its 200-day
    moving average'
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 当约翰·迪尔股票的50日移动平均线低于其200日移动平均线时出售约翰·迪尔股票'
- en: '- Develop and manage buys and sales of John Deere stock autonomously'
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 自动开发和管理工作约翰·迪尔股票的买卖'
- en: '- Play to its strengths as a `ai_name`: `JohnDeere50_200MovingAverage-GPT`'
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 充分发挥其作为`ai_name`：`JohnDeere50_200MovingAverage-GPT`的优势'
- en: '`ai_role`: An AI designed to autonomously buy and sell John Deere stock based
    on moving average parameters with the sole goal of increasing or decreasing John
    Deere stock holdings using a trend'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai_role`：一个AI，旨在根据移动平均参数自主买卖约翰·迪尔股票，唯一目标是使用趋势增加或减少约翰·迪尔股票持有量'
- en: Save this file as `ai_settings.yaml` in your AutoGPT project directory.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 将此文件保存为您的AutoGPT项目目录中的`ai_settings.yaml`。
- en: '**Step 10 – run AutoGPT** **with Docker:**'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤10 – 使用Docker** **运行AutoGPT**：'
- en: 'Now, you’re ready to run AutoGPT. Use the following command:'
  id: totrans-404
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在，您已准备好运行AutoGPT。使用以下命令：
- en: '[PRE17]'
  id: totrans-405
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This will start AutoGPT and load your trading strategy. It will begin monitoring
    John Deere’s stock for the specified moving average crossover events and execute
    trades when those events occur.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 这将启动 AutoGPT 并加载你的交易策略。它将开始监控约翰·迪尔的股票以寻找指定的移动平均线交叉事件，并在这些事件发生时执行交易。
- en: Please note that this guide doesn’t cover setting up a brokerage account or
    connecting AutoGPT to a brokerage API to execute actual trades. You would need
    to ensure that this integration is completed and thoroughly tested for AutoGPT
    to be able to execute trades. Always consult with a financial advisor or expert
    when deploying automated trading strategies.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，本指南不涵盖设置经纪账户或将 AutoGPT 连接到经纪 API 以执行实际交易。你需要确保此集成已完成并彻底测试，以便 AutoGPT 能够执行交易。在部署自动化交易策略时，请务必咨询财务顾问或专家。
- en: Remember that the actual implementation of this process could be more complex
    and might require additional steps, depending on your particular setup and requirements.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，此过程的实际实现可能更复杂，可能需要根据你的特定设置和需求进行额外步骤。
- en: Python code snippet explanation
  id: totrans-409
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python 代码片段说明
- en: '**Setting up the environment**: We started by installing Docker, an essential
    tool for running applications in an isolated environment, and setting up a project
    directory for AutoGPT.'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置环境**：我们首先安装了 Docker，这是一个在隔离环境中运行应用程序的必备工具，并为 AutoGPT 设置了一个项目目录。'
- en: '**Acquiring the API key**: The next step involved getting an API key from OpenAI
    to enable interaction with AutoGPT.'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取 API 密钥**：下一步是从 OpenAI 获取 API 密钥，以启用与 AutoGPT 的交互。'
- en: '**Configuring AutoGPT**: After, we created a YAML configuration file to specify
    the AI’s goals, name, and role. These settings instruct the AI to buy and sell
    John Deere’s stock based on 50-day and 200-day moving average indicators.'
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配置 AutoGPT**：之后，我们创建了一个 YAML 配置文件来指定 AI 的目标、名称和角色。这些设置指导 AI 根据移动平均线指标购买和出售约翰·迪尔的股票。'
- en: '`docker-compose run` command to start AutoGPT with the predefined trading strategy.'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用预定义的交易策略启动 AutoGPT 的 `docker-compose run` 命令。
- en: AutoGPT – financial analysis Monte Carlo simulation
  id: totrans-414
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AutoGPT – 财务分析蒙特卡洛模拟
- en: 'Let’s consider a Monte Carlo simulation to predict the possible evolution of
    John Deere’s stock price, based on historical data and an assumed statistical
    distribution:'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个基于历史数据和假设的统计分布来预测约翰·迪尔股票价格可能演变的蒙特卡洛模拟：
- en: Follow *steps 1* to *8* in the previous AutoGPT example.
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照上一个 AutoGPT 示例中的 *步骤 1* 到 *8* 进行。
- en: '`ai_goals`:'
  id: totrans-417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai_goals`:'
- en: Perform Monte Carlo simulations on John Deere stock
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对约翰·迪尔股票执行蒙特卡洛模拟
- en: Analyze simulation results and suggest trading actions based on the outcomes
  id: totrans-419
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析模拟结果并根据结果提出交易行动
- en: '`ai_name`: `JohnDeereMonteCarlo-GPT`'
  id: totrans-420
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai_name`: `JohnDeereMonteCarlo-GPT`'
- en: '`ai_role`: An AI designed to perform Monte Carlo simulations and provide trading
    recommendations based on simulation outcomes'
  id: totrans-421
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai_role`: 一个设计用于执行蒙特卡洛模拟并根据模拟结果提供交易建议的 AI'
- en: Save this file as ai_settings.yaml in your AutoGPT project directory.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 将此文件保存为 ai_settings.yaml 到你的 AutoGPT 项目目录中。
- en: '**Step 10 – run AutoGPT** **with Docker:**'
  id: totrans-423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**第 10 步 – 使用 Docker 运行 AutoGPT** **：**'
- en: 'You’re now ready to run AutoGPT with Docker. Run the following command:'
  id: totrans-424
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在，你已经准备好使用 Docker 运行 AutoGPT。运行以下命令：
- en: '[PRE18]'
  id: totrans-425
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This command will start AutoGPT with your Monte Carlo simulation strategy. It
    will conduct simulations and make recommendations based on the simulation’s outcomes.
  id: totrans-426
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此命令将启动 AutoGPT 并使用你的蒙特卡洛模拟策略。它将进行模拟并根据模拟结果提出建议。
- en: Portfolio rebalancing strategy – AutoGPT
  id: totrans-427
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 投资组合再平衡策略 – AutoGPT
- en: 'In this example, AutoGPT will be configured to monitor a portfolio consisting
    of John Deere, Caterpillar Inc., CNH Industrial, and Kubota Corp. and it will
    automatically trigger a rebalance if the holdings of any stock deviate by more
    than 5% from their target allocation:'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，AutoGPT 将被配置为监控由约翰·迪尔、卡特彼勒公司、CNH 工业公司和久保田公司组成的投资组合，并且如果任何股票的持有量偏离目标分配超过
    5%，它将自动触发再平衡：
- en: Follow *steps 1* to *8* in the previous AutoGPT example.
  id: totrans-429
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照上一个 AutoGPT 示例中的 *步骤 1* 到 *8* 进行。
- en: 'Go ahead and configure AutoGPT. At this stage, you need to create a YAML configuration
    file that defines your version of AutoGPT. This file will contain the details
    of your portfolio rebalancing strategy. Your `ai_settings.yaml` file might look
    like this:'
  id: totrans-430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 好的，接下来配置 AutoGPT。在这个阶段，你需要创建一个 YAML 配置文件来定义你的 AutoGPT 版本。这个文件将包含你的投资组合再平衡策略的详细信息。你的
    `ai_settings.yaml` 文件可能看起来像这样：
- en: '`ai_goals`:'
  id: totrans-431
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ai_goals`:'
- en: Monitor the portfolio consisting of John Deere, Caterpillar Inc., CNH Industrial,
    and Kubota Corp. stocks
  id: totrans-432
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控由约翰·迪尔、卡特彼勒公司（Caterpillar Inc.）、CNH工业公司和久保田公司（Kubota Corp.）股票组成的投资组合
- en: Maintain the portfolio balance at 25% for each stock
  id: totrans-433
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每只股票维持25%的资产组合平衡
- en: Rebalance the portfolio whenever any stock deviates by more than 5% from its
    target allocation
  id: totrans-434
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当任何股票的持有量偏离其目标分配超过5%时，重新平衡投资组合
- en: '`ai_name`: `PortfolioRebalance-GPT`'
  id: totrans-435
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ai_name`: `PortfolioRebalance-GPT`'
- en: '`ai_role`: An AI designed to maintain the balance of a portfolio and automatically
    trigger a rebalance based on predefined rules'
  id: totrans-436
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ai_role`: 一种AI，旨在维持投资组合的平衡，并根据预定义的规则自动触发再平衡'
- en: Save this configuration file in the AutoGPT project directory.
  id: totrans-437
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将此配置文件保存在AutoGPT项目目录中。
- en: 'Run AutoGPT with Docker. At this point, you’re ready to run AutoGPT using Docker.
    Use the following command:'
  id: totrans-438
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Docker运行AutoGPT。此时，你已准备好使用Docker运行AutoGPT。使用以下命令：
- en: '[PRE19]'
  id: totrans-439
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Once this command is executed, AutoGPT will begin monitoring your portfolio
    and automatically trigger a rebalance whenever the holdings of any stock deviate
    by more than 5% from their target allocation.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 执行此命令后，AutoGPT将开始监控你的投资组合，并在任何股票的持有量偏离其目标分配超过5%时自动触发再平衡。
- en: Remember, this guide doesn’t cover setting up a brokerage account or connecting
    AutoGPT to a brokerage API to execute actual trades. Always consult with a financial
    advisor or expert when deploying automated trading strategies. Furthermore, this
    is a simplified example. In a real-world application, transaction costs, tax implications,
    and other factors need to be taken into account when implementing a rebalancing
    strategy.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，本指南不涵盖设置经纪账户或将AutoGPT连接到经纪API以执行实际交易。在部署自动化交易策略时，始终咨询财务顾问或专家。此外，这是一个简化的示例。在实际应用中，实施再平衡策略时需要考虑交易成本、税收影响和其他因素。
- en: While AutoGPT is a powerful tool, remember to use it responsibly and as support
    for, not a replacement for, human judgment. As we journey into the future of finance
    with AI, be prepared for a new era of investment decision-making powered by AutoGPT!
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AutoGPT是一个强大的工具，但请记住负责任地使用它，并将其作为人类判断的支持，而不是替代品。随着我们进入AI赋能的金融未来，为AutoGPT驱动的投资决策新时代做好准备！
- en: In the next section, we’ll delve into the thrilling saga of financial analysis,
    where Python’s power comes alive. In this dynamic and thought-provoking section,
    we will venture into the heart of financial computations with Python – a language
    globally renowned for its potent libraries and user-friendly syntax.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨财务分析的激动人心的故事，在这里Python的力量得以展现。在这个动态且富有启发性的部分，我们将深入使用Python进行财务计算——这是一种在全球范围内以其强大的库和用户友好的语法而闻名于世的语言。
- en: Strap in for an exhilarating exploration of Python code examples that effortlessly
    handle complex financial calculations. This includes computing crucial financial
    ratios and, notably, calculating ROIC, a key indicator of profitability and efficiency
    in capital utilization.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好进行一场激动人心的Python代码示例探索之旅，这些示例能够轻松处理复杂的财务计算。这包括计算关键财务比率，特别是计算ROIC，这是衡量资本利用效率和盈利能力的关键指标。
- en: Python power play – fueling financial analysis with advanced code
  id: totrans-445
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python的力量游戏——用高级代码推动财务分析
- en: In our detailed expedition, we will bring the illustrious Deere & Co to the
    spotlight. Armed with actual figures extracted from their April 30, 2023 10-Q
    report, we will use Python to compute ROIC. This calculation, which will be seamlessly
    handled by Python, entails dividing the net income by the total invested capital,
    resulting in a percentage form of ROIC.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的详细探险中，我们将把著名的约翰·迪尔公司（Deere & Co）置于聚光灯下。凭借从其2023年4月30日的10-Q报告中提取的实际数据，我们将使用Python来计算ROIC。这个计算将由Python无缝处理，涉及将净收入除以总投资资本，从而得出ROIC的百分比形式。
- en: However, while Python may be a powerful catalyst in financial analysis, remember
    that it thrives on accurate and current financial data. As we forge forward into
    this Python-powered financial analysis journey, it’s essential to bear in mind
    the importance of feeding reliable and up-to-date data into our Python engine.
    In the world of Python-empowered financial analysis, data integrity is as crucial
    as the calculations themselves.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管Python可能在财务分析中是一个强大的催化剂，但请记住，它依赖于准确和最新的财务数据。随着我们进入Python驱动的财务分析之旅，牢记将可靠和最新的数据输入到我们的Python引擎中至关重要。在Python赋能的财务分析世界中，数据完整性与计算本身一样重要。
- en: So, get ready to dive into a captivating world where Python code and financial
    analysis intersect, sparking illuminating insights and unveiling previously hidden
    truths of financial performance.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，准备好进入一个迷人的世界，在这里Python代码和财务分析交汇，激发启发性的洞察，揭示财务表现的先前隐藏真相。
- en: 'Here’s a simple Python code snippet that calculates the ROIC for Deere & Co.
    from `yfinance`:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简单的Python代码片段，用于计算迪尔公司的ROIC（投资回报率）：
- en: '[PRE20]'
  id: totrans-450
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: In this Python example, we’re focusing on the April 30, 2023 financials, using
    `yfinance` to snag metrics for Deere & Co. We’ve zeroed in on net income, total
    debt, and equity – the three pillars for calculating ROIC. This isn’t just another
    metric; it’s the financial litmus test for assessing how efficiently a company
    turns capital into profits. Presented as a percentage, this ROIC number becomes
    a laser-focused indicator of Deere & Co.’s financial efficiency.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个Python示例中，我们关注的是2023年4月30日的财务数据，使用`yfinance`获取迪尔公司的指标。我们专注于净利润、总债务和股本——计算ROIC的三个支柱。这不仅仅是一个指标；这是评估公司如何有效地将资本转化为利润的财务试金石。以百分比形式呈现的ROIC数字成为迪尔公司财务效率的激光聚焦指标。
- en: So, where does ChatGPT fit in? Once you’ve crunched the ROIC numbers, ChatGPT
    can serve as your interactive financial analyst. You can query it to interpret
    the ROIC value, compare it against competitors and industry benchmarks, or even
    simulate what business moves could improve it. Think of ChatGPT as your on-demand
    financial consultant, adding context and insights to the raw numbers. With Python
    and ChatGPT, you’re not just data-rich, you’re insight-rich.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，ChatGPT在其中扮演什么角色呢？一旦你计算出了ROIC的数字，ChatGPT就可以作为你的互动式财务分析师。你可以查询它来解读ROIC值，将其与竞争对手和行业标准进行比较，甚至模拟哪些商业动作可以改善它。将ChatGPT视为你的按需财务顾问，为原始数据添加背景和洞察。有了Python和ChatGPT，你不仅仅是数据丰富，更是洞察丰富。
- en: Let’s embark on an exciting journey that takes us from weather forecasts to
    stock market predictions, focusing on one of the giants of agricultural machinery
    – John Deere. Buckle up as we learn how to use Python and a weather API to fetch,
    manipulate, and interpret meteorological data, turning them into insights that
    could potentially influence our trading decisions.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始一段激动人心的旅程，从天气预报到股市预测，聚焦于农业机械巨头之一——约翰·迪尔。随着我们学习如何使用Python和天气API来获取、操作和解读气象数据，将它们转化为可能影响我们交易决策的洞察，请系好安全带。
- en: Weather patterns have far-reaching implications, including in agriculture, a
    sector deeply intertwined with the fortunes of John Deere. Have you ever wondered
    how a sudden temperature drop, a deluge, or a drought might affect the growth
    of crops and, consequently, the sales of agricultural machinery? If you have,
    then this section is for you.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 天气模式有着深远的影响，包括在农业领域，这个与约翰·迪尔命运紧密相连的部门。你是否曾想过突然的气温下降、暴雨或干旱如何影响作物的生长，进而影响农业机械的销售？如果你有这个疑问，那么这一部分就是为你准备的。
- en: We’ll walk through the process of extracting weather data using OpenWeatherMap’s
    API and Python, transforming this raw data into meaningful metrics, and then developing
    a simple, albeit intuitive, trading strategy. This will provide a unique perspective
    on stock trading, where prevailing weather conditions help steer buy or sell decisions.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将逐步讲解使用OpenWeatherMap的API和Python提取天气数据的过程，将原始数据转化为有意义的指标，然后开发一个简单但直观的交易策略。这将为我们提供独特的股票交易视角，其中当前的天气条件有助于引导买卖决策。
- en: We’ll also create a “weather score” using variables such as temperature, rainfall,
    humidity, and wind speed, with each acting as a puzzle piece that forms a broader
    picture of crop growth conditions. Depending on whether this score is above or
    below a certain threshold, we may consider buying or selling John Deere stock.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将创建一个“天气评分”，使用诸如温度、降雨量、湿度和风速等变量，每个变量都像是一个拼图碎片，共同构成对作物生长条件的更全面认识。根据这个评分是否高于或低于某个阈值，我们可能会考虑买入或卖出约翰·迪尔股票。
- en: Moreover, we’ll delve into the specifics of selecting locations and crops, and
    how to refine the weather score calculation to account for optimal growing conditions.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还将深入研究选择地点和作物以及如何优化天气评分计算以考虑最佳生长条件的具体细节。
- en: Finally, we will elaborate on setting buy and sell thresholds based on the weather
    scores’ standard deviations, creating a framework that you can experiment with
    and refine based on your risk tolerance and market understanding.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将详细阐述基于天气评分的标准差设置买入和卖出阈值，创建一个你可以根据风险承受能力和市场理解进行实验和优化的框架。
- en: From forecasts to financial foresight – a deep dive into a weather-based trading
    strategy with John Deere
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 从天气预报到财务预测 – 与约翰·迪尔深入探讨基于天气的交易策略
- en: 'This section examines the unexplored interplay of meteorology and financial
    markets. We will outline how weather data can be leveraged to inform investment
    decisions in the stock market, specifically targeting John Deere, a major player
    in the agricultural sector. Utilizing a unique weather score, we’ll unravel the
    mysteries of algorithmic trading and illuminate how the weather impacts crop yields
    and subsequently, market dynamics. Let’s get started:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了气象学和金融市场之间未被探索的相互作用。我们将概述如何利用天气数据来为股票市场的投资决策提供信息，特别是针对农业领域的巨头约翰·迪尔。利用独特的天气评分，我们将揭示算法交易的奥秘，并阐明天气如何影响作物产量以及随后的市场动态。让我们开始吧：
- en: '**Step 1 – choose your** **weather API**:'
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**第一步 – 选择你的** **天气API**：'
- en: There are many weather APIs out there. For this example, we’ll use OpenWeatherMap’s
    API, which provides detailed and accurate forecasts. A free API key is available
    but not recommended due to call limits and uptime.
  id: totrans-462
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在有许多天气API。在这个例子中，我们将使用OpenWeatherMap的API，它提供详细和准确的预报。一个免费的API密钥可用，但由于调用限制和在线时间，不建议使用。
- en: OpenWeatherMap API subscription plans. For an individual investor, the recommended
    plan is Startup ($40/month). Why Startup?
  id: totrans-463
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: OpenWeatherMap API订阅计划。对于个人投资者，推荐的计划是创业版（每月40美元）。为什么是创业版？
- en: '**Uptime**: 95% uptime is usually sufficient for individual investors who may
    not require round-the-clock data'
  id: totrans-464
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Uptime**: 95%的在线时间通常对于可能不需要全天候数据的个人投资者来说已经足够'
- en: '**Rate limit**: 60 calls per minute with a limit of one million calls per month
    should be more than adequate for less frequent trading'
  id: totrans-465
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速率限制**: 每分钟60次调用，每月最多一百万次调用，对于不太频繁的交易应该足够'
- en: '**Cost**: At $40 per month, this plan is a cost-effective way to access reliable
    weather data for trading'
  id: totrans-466
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本**: 每月40美元，此计划是获取可靠天气数据以进行交易的经济有效方式'
- en: This plan provides a balance between cost and functionality. The data points
    that are available, such as the 3-hour forecast for 5 days, should be sufficient
    for making informed trading decisions.
  id: totrans-467
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此计划在成本和功能之间提供了平衡。可用的数据点，如5天的3小时预报，应该足以做出明智的交易决策。
- en: 'For an institutional investor, the recommended plan is Professional ($470/month)
    or Enterprise ($2,000/month). Why Professional or Enterprise? Let’s take a look:'
  id: totrans-468
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于机构投资者，推荐的计划是专业版（每月470美元）或企业版（每月2,000美元）。为什么是专业版或企业版？让我们看看：
- en: '**Uptime**: For institutional trading, you’ll want high reliability. Professional
    offers 99.5% uptime, while Enterprise offers 99.9%.'
  id: totrans-469
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Uptime**: 对于机构交易，你将需要高可靠性。专业版提供99.5%的在线时间，而企业版提供99.9%。'
- en: '**Rate limit**: With the high-frequency trading that institutions often engage
    in, higher rate limits are essential. Professional offers 3,000 calls per minute,
    while Enterprise allows up to 200,000 calls per minute.'
  id: totrans-470
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速率限制**: 对于机构通常参与的高频交易，更高的速率限制是必要的。专业版提供每分钟3,000次调用，而企业版允许每分钟高达200,000次调用。'
- en: '**Data availability**: Both plans offer extensive weather data options, which
    could be beneficial for complex trading algorithms.'
  id: totrans-471
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据可用性**: 两个计划都提供了广泛的天气数据选项，这可能对复杂的交易算法有益。'
- en: The choice between Professional and Enterprise would further depend on the specific
    needs of the institution, such as how many locations they are monitoring, how
    many trades they are making, and whether they need additional features such as
    Advanced Weather Maps or the Air Pollution API.
  id: totrans-472
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在专业版和企业版之间的选择将进一步取决于机构的特定需求，例如他们监控的位置数量、他们进行的交易数量，以及他们是否需要额外的功能，如高级天气地图或空气污染API。
- en: '**Step 2 – extract data via** **the API**:'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**第二步 – 通过** **API** 提取数据：'
- en: 'We’ll be using Python for this task. Let’s start by installing the necessary
    libraries:'
  id: totrans-474
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将使用Python来完成这个任务。让我们首先安装必要的库：
- en: '[PRE21]'
  id: totrans-475
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Now, let’s create a Python script to call the OpenWeatherMap API and fetch
    the forecast data:'
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，让我们创建一个Python脚本来调用OpenWeatherMap API并获取预报数据：
- en: '[PRE22]'
  id: totrans-477
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Replace `'your_api_key_here'` with your actual API key. This script will fetch
    the forecast data for the next 5 days in 3-hour intervals for the location you
    specified. It will save this data in a CSV file named `weather_forecast.csv`.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 将 `'your_api_key_here'` 替换为你的实际API密钥。此脚本将获取你指定位置的下一个5天的3小时间隔的预报数据。它将把这些数据保存到名为
    `weather_forecast.csv` 的CSV文件中。
- en: This is a basic way to get the weather forecast data. In a production setting,
    you would likely want to automate this task so that it runs at regular intervals
    and appends new forecasts to an existing dataset. You may also want to capture
    historical weather data, for which you may need to use a different API or dataset.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种获取天气预报数据的基本方法。在生产环境中，你可能希望自动化这项任务，使其定期运行并将新的预报附加到现有数据集中。你可能还需要捕获历史天气数据，这可能需要使用不同的API或数据集。
- en: Important note
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: This is a basic tutorial and does not include error handling and other best
    practices for working with APIs. Always consult the API’s documentation for more
    detailed and accurate information. Remember to keep your API key secret to prevent
    unauthorized usage.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个基本的教程，不包括处理API时的错误处理和其他最佳实践。始终参考API的文档以获取更详细和准确的信息。请记住，为了防止未经授权的使用，要保密你的API密钥。
- en: Weather score calculation – weather trade
  id: totrans-482
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 天气分数计算 – 天气交易
- en: 'For a simple trading strategy, you could calculate a “weather score” for each
    day based on these variables. If the score is above a certain threshold, it might
    indicate favorable conditions for crop growth, and you might consider buying John
    Deere stock. Conversely, if the score is below a certain threshold, it might indicate
    unfavorable conditions, and you might consider selling John Deere stock:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个简单的交易策略，你可以根据这些变量计算每天的“天气分数”。如果分数高于某个阈值，这可能会表明有利于作物生长的条件，你可能会考虑购买约翰·迪尔股票。相反，如果分数低于某个阈值，这可能会表明不利的条件，你可能会考虑出售约翰·迪尔股票：
- en: '**Temperature**: In general, a certain range of temperatures is optimal for
    the growth of crops. If the average temperature in a major agricultural area is
    significantly above or below this range, it might be an indicator of decreased
    crop yields, which could affect John Deere’s sales. For example, if the temperature
    is below the optimal range for more than a few days during the growing season,
    it might indicate a high risk of a freeze that could damage crops.'
  id: totrans-484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**温度**：一般来说，一定范围的温度对作物的生长是最优的。如果主要农业区的平均温度显著高于或低于这个范围，这可能是作物产量下降的指标，从而可能影响约翰·迪尔的销售额。例如，如果在生长季节中温度连续几天低于最优范围，这可能会表明有很高的冻害风险，可能会损害作物。'
- en: '**Rain volume**: Rainfall is necessary for crop growth, but too much or too
    little can be harmful. If the cumulative rainfall over a certain period (for example,
    a month) is significantly higher or lower than average, it could affect crop yields
    and, therefore, John Deere’s sales.'
  id: totrans-485
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**降雨量**：降雨对作物生长是必要的，但过多或过少都可能有害。如果在一定时期（例如，一个月）内的累积降雨量显著高于或低于平均值，可能会影响作物产量，从而影响约翰·迪尔的销售额。'
- en: '**Humidity**: High humidity levels can promote the growth of certain crop diseases,
    while low humidity levels can increase the risk of drought. Both can affect crop
    yields.'
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**湿度**：高湿度水平可能促进某些作物病害的生长，而低湿度水平可能增加干旱的风险。两者都可能影响作物产量。'
- en: '**Wind speed**: High wind speeds can cause physical damage to crops, particularly
    when combined with other adverse weather conditions.'
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风速**：高风速可能会对作物造成物理损害，尤其是在与其他不利天气条件结合时。'
- en: 'The following is an example of a score model:'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个分数模型的示例：
- en: '[PRE23]'
  id: totrans-489
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Each of the scores could be calculated based on whether the observed value is
    within an optimal range for crop growth. The specific ranges and how much weight
    you give to each score would need to be determined based on domain knowledge and
    possibly adjusted through backtesting.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 每个分数可以根据观察值是否在作物生长的最优范围内来计算。具体的范围以及你给每个分数的权重需要根据领域知识来确定，并且可能需要通过回测进行调整。
- en: 'Let’s consider a backtesting and domain knowledge example:'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个回测和领域知识示例：
- en: '**Define optimal ranges**: Based on domain knowledge, specify what constitutes
    an “optimal range” for each weather metric.'
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义最优范围**：根据领域知识，指定构成每个天气指标“最优范围”的内容。'
- en: '**Weightage**: Assign weights to each score based on their relative importance.
    For example, if temperature is more critical for crop growth than wind speed,
    it should have a higher weight.'
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**权重**：根据它们相对的重要性为每个分数分配权重。例如，如果温度对作物生长比风速更重要，那么它应该有更高的权重。'
- en: '**Historical data**: Use historical weather data and crop yield data to backtest
    your model. This will help you refine the optimal ranges and weightages.'
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**历史数据**：使用历史天气数据和作物产量数据来回测你的模型。这将帮助你细化最优范围和权重。'
- en: '**Adjust and iterate**: As you gather more data and observe real-world outcomes,
    continually refine your model for improved accuracy.'
  id: totrans-495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**调整和迭代**：随着你收集更多数据和观察现实世界的成果，持续优化你的模型以提高准确性。'
- en: 'Here is a Python code example of calculating the score:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个计算评分的Python代码示例：
- en: '[PRE24]'
  id: totrans-497
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: By developing and backtesting this model, you can create a robust framework
    for making more informed trading decisions based on weather conditions. This is
    an interdisciplinary approach, bringing together finance, data science, and agricultural
    expertise to create a unique investment strategy.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 通过开发和回测这个模型，你可以创建一个强大的框架，基于天气条件做出更明智的交易决策。这是一个跨学科的方法，将金融、数据科学和农业专业知识结合起来，创造独特的投资策略。
- en: In the next section, we’ll be moving beyond generic weather data to focus on
    the agricultural powerhouses of the US – think Iowa, Illinois, Nebraska, and Minnesota.
    These states are the epicenters of corn and soybean production, the very crops
    that fuel John Deere’s business.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将超越通用天气数据，专注于美国的农业强国——想想爱荷华州、伊利诺伊州、内布拉斯加州和明尼苏达州。这些州是玉米和大豆生产的中心，正是这些作物推动了约翰·迪尔（John
    Deere）的业务。
- en: Our mission? To fine-tune our weather score to capture the unique growing conditions
    of these key crops. We’ll leverage data from both the skies and the soil to craft
    a dynamic trading strategy for John Deere stock.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的使命？将我们的天气评分微调，以捕捉这些关键作物的独特生长条件。我们将利用天空和土壤的数据来制定针对约翰·迪尔（John Deere）股票的动态交易策略。
- en: We’ll delve into selecting prime agricultural locations, analyze historical
    weather patterns, and adapt our weather score to reflect conditions ideal for
    corn and soybean growth. The end goal? A set of actionable trading rules that
    let you capitalize on weather-induced market shifts.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深入探讨选择优质农业地点，分析历史天气模式，并调整我们的天气评分以反映玉米和大豆生长的理想条件。最终目标？一套可操作的交易规则，让你能够利用天气引起的市场变化。
- en: Location and crop type – weather trade
  id: totrans-502
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 地点和作物类型——天气交易
- en: In terms of location, you would want to focus on major agricultural areas in
    the US, particularly those where crops that require a lot of farming equipment
    are grown. These might include states such as Iowa, Illinois, Nebraska, and Minnesota,
    which are among the top producers of corn and soybeans.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 在地点方面，你可能会专注于美国的主要农业区，特别是那些种植需要大量农业设备作物的地区。这些可能包括爱荷华州、伊利诺伊州、内布拉斯加州和明尼苏达州，这些州是玉米和大豆的主要生产者。
- en: Incorporating location and crop type data into the trading strategy can be done
    by refining the “weather score” calculation to account for the specific growing
    conditions of corn and soybeans in the Midwestern US. The ideal conditions for
    these crops, particularly concerning temperature and rainfall, are well-documented,
    and this information can be used to set the optimal ranges for the weather variables
    in your strategy.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将地点和作物类型数据纳入交易策略，可以通过优化“天气评分”计算来考虑美国中西部玉米和大豆的具体生长条件。这些作物，尤其是关于温度和降雨，的理想条件有很好的记录，这些信息可以用来设定策略中天气变量的最佳范围。
- en: 'Here is a broad outline of how you might do this:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个大致的概述，说明你如何做到这一点：
- en: '**Select locations**: Identify the major corn and soybean-producing areas in
    the Midwest. The USDA provides detailed crop production data at the county level,
    which can be used for this purpose. You might focus on the top-producing counties
    in states such as Iowa, Illinois, Nebraska, and Minnesota.'
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择地点**：确定中西部的主要玉米和大豆生产区。美国农业部在县一级提供详细的作物生产数据，可用于此目的。你可能需要关注爱荷华州、伊利诺伊州、内布拉斯加州和明尼苏达州等州的顶级生产县。'
- en: '**Gather historical weather data**: Use the OpenWeatherMap API to gather historical
    weather data for these locations. You will need data on temperature, rainfall,
    humidity, and wind speed at a minimum. It’s also a good idea to get data for a
    long enough period that it includes both good and bad growing seasons.'
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**收集历史天气数据**：使用OpenWeatherMap API收集这些地点的历史天气数据。至少需要温度、降雨量、湿度和风速的数据。获取足够长的数据，包括好季节和坏季节也是一个好主意。'
- en: '**Calculate weather scores**: For each day, calculate a “weather score” based
    on the observed weather conditions. This score should be a measure of how close
    the conditions are to the ideal for corn and soybean growth.'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算天气评分**：对于每一天，根据观察到的天气条件计算一个“天气评分”。这个评分应该衡量条件与玉米和大豆生长理想条件之间的接近程度。'
- en: '**Define trading rules**: Define a set of rules for buying and selling John
    Deere stock based on the weather scores. For example, you might buy the stock
    when the score is above a certain threshold (indicating favorable conditions for
    crop growth) and sell it when the score is below a different threshold (indicating
    unfavorable conditions).'
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义交易规则**：根据天气分数定义一组用于买入和卖出约翰·迪尔股票的规则。例如，您可能会在分数高于某个阈值（表示作物生长的有利条件）时买入股票，在分数低于不同阈值（表示不利的条件）时卖出股票。'
- en: 'Here’s an example of how you might calculate the weather score:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个计算天气分数的例子：
- en: '[PRE25]'
  id: totrans-511
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: In this example, each score is a number between 0 and 1 that represents how
    close the observed value is to the optimal range for corn and soybean growth.
    The overall weather score is the sum of these scores, so it is a number between
    0 and 4\. You would then need to determine the thresholds for buying and selling
    John Deere stock based on this score.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，每个分数是一个介于0到1之间的数字，表示观察到的值与玉米和大豆生长最佳范围的接近程度。整体天气分数是这些分数的总和，因此它是一个介于0到4之间的数字。然后您需要根据这个分数确定买入和卖出约翰·迪尔股票的阈值。
- en: Trade threshold suggestions – weather trade
  id: totrans-513
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交易阈值建议 - 天气交易
- en: In this case, threshold settings would be largely dependent on your risk appetite
    and your belief in the reliability of the correlation between weather patterns
    and the stock’s performance. However, a common approach would be to set thresholds
    based on standard deviations from the mean score.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，阈值设置将主要取决于您的风险偏好以及您对天气模式与股票表现之间相关性的可靠性的信念。然而，一种常见的方法是，根据平均分数的标准差来设置阈值。
- en: 'Let’s assume we’ve calculated the mean and standard deviation of the weather
    score. A simplified version might look like this:'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们已经计算了天气分数的平均值和标准差。一个简化的版本可能如下所示：
- en: '[PRE26]'
  id: totrans-516
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Given the weather score ranges from 0 to 4, we could consider weather conditions
    to be exceptionally good if the score is one standard deviation above the mean,
    and exceptionally bad if it’s one standard deviation below the mean. These could
    be our buy and sell thresholds, respectively:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到天气分数的范围是0到4，如果分数比平均数高出一个标准差，我们可以认为天气条件非常好；如果分数比平均数低一个标准差，则可以认为天气条件非常糟糕。这些可以分别作为我们的买入和卖出阈值：
- en: '[PRE27]'
  id: totrans-518
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: In this scenario, we would consider buying John Deere stock when the weather
    score exceeds `buy_threshold` (signifying optimal conditions for crop growth,
    which could lead to higher machinery sales). Conversely, you would consider selling
    or shorting John Deere stock when the weather score drops below `sell_threshold`
    (signifying poor growing conditions, which could hurt machinery sales).
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，当天气分数超过`buy_threshold`（表示作物生长的最佳条件，可能导致更高的机械销售）时，我们会考虑买入约翰·迪尔股票。相反，当天气分数低于`sell_threshold`（表示生长条件不佳，可能损害机械销售）时，您会考虑卖出或做空约翰·迪尔股票。
- en: Note that these thresholds are quite simplistic. In a more sophisticated model,
    you might consider other factors, such as the velocity of the change in weather
    scores, the time of year, or the impact of consecutive periods of good or bad
    weather. Furthermore, financial decisions should also take into account other
    market indicators and your overall investment strategy.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些阈值相当简单。在更复杂的模型中，您可能需要考虑其他因素，例如天气分数变化的速率、一年中的时间或连续好天气或坏天气的影响。此外，财务决策还应考虑其他市场指标和您的整体投资策略。
- en: Please keep in mind that this is a very simplified model. The actual relationship
    between weather conditions and crop yields is likely to be much more complex and
    influenced by many other factors. For a more sophisticated strategy, you might
    consider using machine learning techniques to model the relationship between weather
    data and John Deere’s stock price.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这是一个非常简化的模型。实际天气条件和作物产量之间的关系可能要复杂得多，并受许多其他因素的影响。对于更复杂的策略，您可能需要考虑使用机器学习技术来模拟天气数据和约翰·迪尔股价之间的关系。
- en: In this section, we examined the intersection of weather patterns and financial
    markets, with a focus on John Deere, a leader in agricultural machinery. By extracting
    and analyzing weather data, we developed a simple trading strategy based on a
    “weather score,” which provides insight into crop growth conditions, thus influencing
    John Deere’s stock trading decisions. We discussed a selection of locations and
    crops, refined the weather score calculation, and set buy and sell thresholds,
    all within a Python environment.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了天气模式和金融市场之间的交集，重点关注农业机械领域的领导者约翰·迪尔。通过提取和分析天气数据，我们开发了一种基于“天气分数”的简单交易策略，该策略提供了对作物生长条件的洞察，从而影响了约翰·迪尔股票的交易决策。我们讨论了选择的位置和作物，细化了天气分数的计算，并设置了买入和卖出阈值，所有这些都在
    Python 环境中完成。
- en: In the next section, you’ll learn how to harness the raw power of weather data
    and John Deere’s stock data, which has been curated meticulously and stored in
    a humble CSV file. The adventure doesn’t end there, though – we’ll transform these
    raw elements into a “weather score,” a beacon guiding our understanding of how
    crop growth conditions influence John Deere’s stock performance.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，您将学习如何利用经过精心整理并存储在谦逊的 CSV 文件中的原始天气数据和约翰·迪尔股票数据，这些数据将成为我们理解作物生长条件如何影响约翰·迪尔股票表现的指南。然而，冒险并未结束——我们将将这些原始元素转换为“天气分数”，这是我们理解作物生长条件如何影响约翰·迪尔股票表现的灯塔。
- en: Our journey includes five key stages. We will begin by preparing our data for
    the voyage, extracting the information using Python, and storing it in an accessible
    format. Then, we will import this data into Power BI, setting the stage for our
    exploration.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的旅程包括五个关键阶段。我们首先将准备数据，使用 Python 提取信息，并将其存储在可访问的格式中。然后，我们将此数据导入 Power BI，为我们的探索做好准备。
- en: Beyond the initial exploration, we will offer an exhilarating peek into the
    future by connecting OpenAI to Power BI, creating a spectrum of fresh, insightful
    visualizations, such as correlating weather severity with stock price changes,
    or crafting heatmaps that capture weather patterns and corresponding stock price
    movements.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 在初步探索之后，我们将通过将 OpenAI 连接到 Power BI，提供令人兴奋的未来一瞥，创建一系列新颖、有洞察力的可视化，例如将天气严重程度与股价变化相关联，或制作捕捉天气模式和相应股价变动热图。
- en: Seeds of fortune – unraveling the correlation between weather patterns and John
    Deere’s stock performance
  id: totrans-526
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 幸运之种 – 揭示天气模式与约翰·迪尔股票表现之间的相关性
- en: 'In this section, you’ll learn how to use weather data and John Deere’s stock
    data to create a “weather score” to understand how crop growth conditions affect
    stock performance. The process consists of five stages: preparing the data, extracting
    information with Python, and importing it into Power BI.'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将学习如何使用天气数据和约翰·迪尔股票数据创建“天气分数”，以了解作物生长条件如何影响股价表现。该过程包括五个阶段：准备数据、使用 Python
    提取信息，并将其导入 Power BI。
- en: We’ll showcase future possibilities by integrating OpenAI with Power BI to generate
    insights, such as correlating weather intensity with stock price fluctuations
    or creating heatmaps to capture weather patterns and corresponding stock price
    changes.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过将 OpenAI 与 Power BI 集成来展示未来可能性，生成见解，例如将天气强度与股价波动相关联，或创建热图来捕捉天气模式和相应的股价变化。
- en: Power BI visualization
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power BI 可视化
- en: Important note
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Please note that this guide is based on the assumption that you’ve stored your
    weather and John Deere stock data in a CSV file, and that the weather data has
    already been transformed into a “weather score.”
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，本指南基于您已将天气和约翰·迪尔股票数据存储在 CSV 文件中的假设，并且天气数据已经转换为“天气分数”。
- en: 'Our journey includes five key stages. We will begin by preparing our data for
    the voyage, extracting the information using Python, and storing it in an accessible
    format. Then, we will import this data into Power BI, setting the stage for our
    exploration:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的旅程包括五个关键阶段。我们首先将准备数据，使用 Python 提取信息，并将其存储在可访问的格式中。然后，我们将此数据导入 Power BI，为我们的探索做好准备：
- en: '**Step 1 – extracting** **the data**:'
  id: totrans-533
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 1 – 提取** **数据**:'
- en: 'We have already discussed how to extract the data using Python and the OpenWeatherMap
    API, and how to calculate the “weather score.” Now, you will want to store this
    data, alongside the corresponding John Deere stock data, in a CSV file so that
    it can easily be imported into Power BI. The following Python code snippet shows
    how to do this:'
  id: totrans-534
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们已经讨论了如何使用 Python 和 OpenWeatherMap API 提取数据以及如何计算“天气评分”。现在，你将想要将此数据与相应的约翰·迪尔股票数据一起存储在
    CSV 文件中，以便它可以轻松导入到 Power BI 中。以下 Python 代码片段显示了如何做到这一点：
- en: '[PRE28]'
  id: totrans-535
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '**Step 2 – importing the data into** **Power BI**:'
  id: totrans-536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 2 – 将数据导入** **Power BI**：'
- en: Open Power BI Desktop.
  id: totrans-537
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Power BI Desktop。
- en: Go to **Home** > **Get Data** > **Text/CSV**.
  id: totrans-538
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 转到 **主页** > **获取数据** > **文本/CSV**。
- en: Navigate to the location of your CSV file and click **Open**. In the preview
    window, if the data looks correct, click **Load**.
  id: totrans-539
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到你的 CSV 文件位置，然后点击 **打开**。在预览窗口中，如果数据看起来正确，点击 **加载**。
- en: '**Step 3 – creating a line chart with two** **Y axes**:'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 3 – 创建具有两个** **Y 轴** 的折线图：'
- en: Click on the **Line chart** visual in the **Visualizations** pane.
  id: totrans-541
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **可视化** 面板中点击 **折线图** 视觉。
- en: Drag and drop your date field into the **Axis** field and the weather score
    and the John Deere stock price into the **Values** field.
  id: totrans-542
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你的日期字段拖放到 **轴** 字段，将天气评分和约翰·迪尔股票价格拖放到 **值** 字段。
- en: Now, you have a line chart with two series – weather score and stock price.
    However, they are currently using the same Y-axis, which could be misleading due
    to potentially different scales and units of measure. To fix this, we’ll add a
    secondary Y-axis.
  id: totrans-543
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，你有一个包含两个序列的折线图 – 天气评分和股票价格。然而，它们目前使用的是相同的 Y 轴，由于可能不同的刻度和度量单位，这可能会造成误导。为了解决这个问题，我们将添加一个次要的
    Y 轴。
- en: With the line chart selected, go to the **Format** pane and choose **Y2 axis**.
    Turn the switch on.
  id: totrans-544
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在选择折线图后，转到 **格式** 面板并选择 **Y2 轴**。打开开关。
- en: '**Step 4 – customizing** **the visual**:'
  id: totrans-545
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 4 – 自定义** **视觉**：'
- en: 'Now that you have your line chart, feel free to customize it to make it more
    appealing and easier to understand. Here are a few ideas:'
  id: totrans-546
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在你已经有了你的折线图，你可以自由地自定义它，使其更具吸引力且更容易理解。以下是一些想法：
- en: Add a chart title. Go to **Format** > **Title**, turn the switch on, and type
    your title in the text field.
  id: totrans-547
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加图表标题。转到 **格式** > **标题**，打开开关，并在文本字段中输入你的标题。
- en: Customize the colors. By going to **Format** > **Data colors**, you can change
    the colors of your data series.
  id: totrans-548
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义颜色。通过转到 **格式** > **数据颜色**，你可以更改数据序列的颜色。
- en: Add data labels. After going to **Format** > **Data labels**, turn the switch
    on.
  id: totrans-549
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加数据标签。在转到 **格式** > **数据标签** 后，打开开关。
- en: '**Step 5 –** **adding interactivity**:'
  id: totrans-550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 5 – 添加交互性**：'
- en: 'Power BI also allows you to add interactivity to your visuals. Here’s how you
    can add a date slicer:'
  id: totrans-551
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Power BI 还允许你向你的视觉添加交互性。以下是如何添加日期切片器的步骤：
- en: Click on the **Slicer** visual from the **Visualizations** pane.
  id: totrans-552
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 **可视化** 面板中点击 **切片器** 视觉。
- en: Drag and drop your date field into the **Values** field of the slicer.
  id: totrans-553
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你的日期字段拖放到切片器的 **值** 字段。
- en: Now, you can select a date range on the slicer, and the line chart will automatically
    update to show only data within that range.
  id: totrans-554
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，你可以在切片器中选择一个日期范围，折线图将自动更新以仅显示该范围内的数据。
- en: And that’s it! You now have an interactive Power BI line chart that shows the
    correlation between weather scores and John Deere’s stock price.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！你现在有一个交互式的 Power BI 折线图，显示了天气评分和约翰·迪尔股票价格之间的相关性。
- en: Connecting OpenAI with Power BI
  id: totrans-556
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 OpenAI 与 Power BI 连接
- en: For this step, you may need to work with an API connector such as Power BI’s
    built-in Web connector. Connect to the OpenAI API using the API key and set up
    the necessary GET requests to pull the relevant data.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这一步，你可能需要与 API 连接器一起工作，例如 Power BI 内置的 Web 连接器。使用 API 密钥连接到 OpenAI API，并设置必要的
    GET 请求以拉取相关数据。
- en: 'Before you can use the OpenAI API, you’ll need to obtain an API key:'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 在你可以使用 OpenAI API 之前，你需要获取一个 API 密钥：
- en: Go to [platform.openai.com](http://platform.openai.com).
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 [platform.openai.com](http://platform.openai.com)。
- en: Create an account, confirm your email, add account details, and confirm your
    phone number.
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建账户，确认你的电子邮件，添加账户详情，并确认你的电话号码。
- en: Click on the profile at the top left and then click **View** **API keys**.
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击左上角的个人资料，然后点击 **查看** **API 密钥**。
- en: Generate an API key by clicking on **+ Create new** **secret key**.
  id: totrans-562
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **+ 创建新** **密钥** 以生成 API 密钥。
- en: Copy the key.
  id: totrans-563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制密钥。
- en: Remember to replace `your_openai_api_key` with your actual OpenAI API key.
  id: totrans-564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记得将 `your_openai_api_key` 替换为你的实际 OpenAI API 密钥。
- en: 'To connect Power BI to ChatGPT via the OpenAI API, follow these steps:'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 要通过 OpenAI API 将 Power BI 连接到 ChatGPT，请按照以下步骤操作：
- en: Open Power BI and go to the **Home** tab.
  id: totrans-566
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Power BI 并转到**主页**选项卡。
- en: Click on **Get Data** and select **Web** from the available options.
  id: totrans-567
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**获取数据**并从可用选项中选择**Web**。
- en: In the **Web** dialog box, enter the URL for the OpenAI API endpoint and click
    **OK**.
  id: totrans-568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Web**对话框中，输入 OpenAI API 端点的 URL 并点击**确定**。
- en: Enter your API key and click **OK**.
  id: totrans-569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入你的 API 密钥并点击**确定**。
- en: Please note that these instructions are subject to change and it’s always a
    good idea to refer to the official documentation for the most up-to-date information.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这些说明可能会更改，并且始终参考官方文档以获取最新信息是一个好主意。
- en: Visualizing the data in Power BI – additional viz ideas
  id: totrans-571
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Power BI 中可视化数据 - 其他可视化想法
- en: 'Once you have the data in Power BI, you can create a variety of visualizations.
    For instance, you might create the following:'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你在 Power BI 中有了数据，你可以创建各种可视化效果。例如，你可能创建以下内容：
- en: A line chart showing the John Deere stock price and significant weather events
  id: totrans-573
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展示约翰·迪尔股价和重大天气事件的折线图
- en: A scatter plot correlating weather severity with changes in stock price
  id: totrans-574
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将天气严重程度与股价变化相关的散点图
- en: Heatmaps showing weather patterns in major agricultural regions and corresponding
    stock price fluctuations
  id: totrans-575
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展示主要农业区域天气模式及相应股价波动的热图
- en: This Power BI visualization offers an innovative exploration of the relationship
    between weather patterns and John Deere’s stock performance. Consolidating weather
    scores and stock data onto a single line chart with dual *Y*-axes provides a clear,
    dynamic, and interactive way to analyze the potential influence of weather on
    market trends. This approach facilitates an intuitive and comprehensive understanding
    of complex data, enabling users to make strategic, data-informed decisions in
    the realm of agriculture-based financial investments.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 Power BI 可视化提供了对天气模式和约翰·迪尔（John Deere）股价表现之间关系的创新探索。将天气评分和股价数据合并到单条双 *Y*
    轴的折线图上，提供了一种清晰、动态和交互式的方式来分析天气对市场趋势的潜在影响。这种方法有助于直观和全面地理解复杂数据，使用户能够在基于农业的金融投资领域做出战略性的、数据驱动的决策。
- en: The next section is a thrilling intersection of AI and finance. It’s crucial
    to distinguish between what’s real and what’s a mirage. Here, we will delve into
    a fascinating phenomenon known as “hallucinations” from LLMs such as OpenAI’s
    GPT series. These hallucinations, characterized by factual inaccuracies, speculative
    statements, or confident misinformation, can potentially distort our financial
    analyses or data visualizations.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节是人工智能和金融的激动人心的交汇点。区分现实与海市蜃楼至关重要。在这里，我们将深入研究一个称为“幻觉”的有趣现象，这是来自 OpenAI 的 GPT
    系列等大型语言模型（LLM）的。这些幻觉，以事实错误、推测性陈述或自信的错误信息为特征，可能会扭曲我们的财务分析或数据可视化。
- en: We’ll uncover the secrets of identifying these mirages and equip you with strategies
    to mitigate their impact. From cross-verifying information, developing robust
    evaluation metrics, and leveraging real-time data to fostering a constructive
    user feedback loop, you’ll learn how to ensure that your AI-assisted decision-making
    process remains rooted in reality. We’ll also take a peek into the future of LLMs,
    exploring how OpenAI is fine-tuning these models to minimize hallucinations, and
    discuss examples from trading and Power BI visualization scenarios to cement your
    understanding.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将揭示识别这些海市蜃楼的秘密，并为您提供减轻其影响的策略。从信息交叉验证、开发稳健的评估指标、利用实时数据到培养积极的用户反馈循环，您将学习如何确保您的
    AI 辅助决策过程始终立足于现实。我们还将一瞥 LLM 的未来，探讨 OpenAI 如何微调这些模型以最小化幻觉，并讨论交易和 Power BI 可视化场景的例子，以巩固您的理解。
- en: Remember, in this high-stakes game of finance and technology, a keen eye can
    mean the difference between a mirage and an oasis.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在这个高风险的金融和技术游戏中，敏锐的洞察力可能意味着沙漠中的海市蜃楼和绿洲之间的区别。
- en: Understanding and mitigating LLM “hallucinations” in financial analysis and
    data visualization
  id: totrans-580
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解和减轻金融分析和数据可视化中 LLM “幻觉”
- en: LLMs, such as OpenAI’s GPT series, can sometimes generate responses that are
    referred to as “hallucinations.” These are instances where the output from the
    model is factually incorrect, it presents information that it could not possibly
    know (given it doesn’t have access to real-time or personalized data), or it might
    output something nonsensical or highly improbable.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: LLM，如 OpenAI 的 GPT 系列，有时会生成被称为“幻觉”的响应。这些是模型输出事实错误、展示它不可能知道的信息（因为它没有访问实时或个性化数据）或可能输出无意义或高度不可能的输出的实例。
- en: Let’s explore deeper into what hallucinations are, how to identify them, and
    what steps can be taken to mitigate their impact, especially in a context where
    accurate and reliable information is crucial, such as financial analysis, trading,
    or visual data presentations.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地探讨幻觉是什么，如何识别它们，以及可以采取哪些步骤来减轻其影响，特别是在准确和可靠信息至关重要的环境中，例如财务分析、交易或视觉数据展示。
- en: Understanding hallucinations
  id: totrans-583
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解幻觉
- en: 'Let’s look at some examples:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些例子：
- en: '**Factual inaccuracies**: Suppose an LLM provides information stating that
    Apple Inc. was founded in 1985\. This is a clear factual inaccuracy because Apple
    was founded in 1976.'
  id: totrans-585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事实错误**：假设一个LLM提供的信息表明“苹果公司成立于1985年”，这是一个明显的事实错误，因为苹果公司成立于1976年。'
- en: '**Speculative statements**: If an LLM were to suggest that “As of 2023, Tesla’s
    share price has hit $3,000,” this is a hallucination. The model doesn’t know real-time
    data and any post-2021 prediction or speculation it makes about specific stock
    prices is unfounded.'
  id: totrans-586
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推测性声明**：如果一个LLM建议“截至2023年，特斯拉的股价已达到3,000美元”，这将是幻觉。模型不知道实时数据，并且它对特定股票价格的任何2021年之后的预测或推测都是无根据的。'
- en: '**Confident misinformation**: For instance, if an LLM confidently states that
    “Amazon has declared bankruptcy in late 2022,” this is a hallucination and can
    have serious consequences if it’s acted upon without verification.'
  id: totrans-587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自信的错误信息**：例如，如果一个LLM自信地声称“亚马逊在2022年底宣布破产”，这是幻觉，如果未经核实就采取行动，可能会产生严重后果。'
- en: How can we spot hallucinations?
  id: totrans-588
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们如何发现幻觉？
- en: 'Here are some useful ways to spot hallucinations:'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些有用的方法来发现幻觉：
- en: '**Cross-verification**: If an LLM suggests an unusual trading strategy, such
    as shorting a typically stable blue-chip stock based on some supposed insider
    information, always cross-verify this advice with other reliable sources or consult
    a financial advisor.'
  id: totrans-590
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交叉验证**：如果一个LLM建议一种不寻常的交易策略，例如基于某些所谓的内部信息做空通常稳定的蓝筹股，请始终与其他可靠来源交叉验证此建议，或咨询财务顾问。'
- en: '**Questioning the source**: If an LLM claims that “our internal data shows
    a bullish trend for cryptocurrency *X*,” this is likely a hallucination. The model
    doesn’t have access to proprietary internal data.'
  id: totrans-591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质疑来源**：如果一个LLM声称“我们的内部数据显示加密货币X呈牛市趋势”，这很可能是幻觉。模型无法访问专有的内部数据。'
- en: '**Time awareness**: If the model provides information or trends post-September
    2021 without the user explicitly asking for a hypothetical or simulated scenario,
    consider this a red flag. For example, GPT-4 giving specific “real-time” market
    cap values for companies in 2023 would be a hallucination.'
  id: totrans-592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间意识**：如果模型在用户没有明确要求假设或模拟场景的情况下，在2021年9月之后提供信息或趋势，请将其视为红旗。例如，GPT-4在2023年为公司在特定“实时”市值提供具体值就是幻觉。'
- en: What can we do about hallucinations?
  id: totrans-593
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们能做些什么来应对幻觉？
- en: 'Here are some ideas:'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些想法：
- en: '**Promote awareness**: If you are developing an AI-assisted trading app that
    uses an LLM, ensure users are aware of potential hallucinations, perhaps with
    a disclaimer or notification upon usage'
  id: totrans-595
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高意识**：如果你正在开发一个使用LLM的AI辅助交易应用，确保用户意识到潜在的幻觉，或许在使用时通过免责声明或通知来告知'
- en: '**Implement checks**: You might integrate a news API that could help validate
    major financial events or claims made by the model'
  id: totrans-596
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施检查**：你可能可以集成一个新闻API，这有助于验证模型提出的重大金融事件或声明'
- en: Minimizing hallucinations in the future
  id: totrans-597
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来减少幻觉
- en: 'There are various ways we can minimize hallucinations. Here are some examples:'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有多种方法可以最小化幻觉。以下是一些例子：
- en: '**Training improvements**: Imagine developing a better model that understands
    context and sticks to the known data more closely, avoiding speculative or incorrect
    financial statements. Future versions of the model could be specifically trained
    on financial data, news, and reports to understand the context and semantics of
    financial trading and investment better. We could do this to ensure that it understands
    a short squeeze scenario accurately, or is aware that penny stocks typically come
    with higher risks.'
  id: totrans-599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练改进**：想象一下开发一个更好的模型，它能更好地理解上下文并更紧密地遵循已知数据，避免推测或错误的财务声明。模型的未来版本可以专门针对财务数据、新闻和报告进行训练，以更好地理解金融交易和投资的上下文和语义。我们可以这样做，以确保它能够准确理解短期挤压场景，或者意识到便士股票通常伴随着更高的风险。'
- en: '**Better evaluation metrics**: For instance, develop a specific metric that
    calculates the percentage of the model’s outputs that were flagged as hallucinations
    during testing. In the development phase, the models could be evaluated on more
    focused tasks such as generating valid trading strategies or predicting the impact
    of certain macroeconomic events on stock prices. The better the model performs
    on these tasks, the lower the chance of hallucinations occurring.'
  id: totrans-600
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好的评估指标**：例如，开发一个特定指标，该指标计算在测试期间被标记为幻觉的模型输出的百分比。在开发阶段，模型可以在更专注的任务上进行评估，例如生成有效的交易策略或预测某些宏观经济事件对股价的影响。模型在这些任务上的表现越好，发生幻觉的可能性就越低。'
- en: '**Post-processing methods**: Develop an algorithm that cross-references model
    outputs against reliable financial data sources and flags potential inaccuracies.
    After the model generates a potential trading strategy or investment suggestion,
    this output could be cross-verified using a rules-based system. For instance,
    if the model suggests shorting a stock that has consistently performed well without
    any recent negative news or poor earnings reports, the system might flag this
    as a potential hallucination.'
  id: totrans-601
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后处理方法**：开发一个算法，将模型输出与可靠的财务数据来源进行交叉验证，并标记潜在的不准确性。在模型生成潜在的交易策略或投资建议后，可以使用基于规则的系统进行交叉验证。例如，如果模型建议卖空一只持续表现良好且没有最近负面新闻或糟糕的收益报告的股票，系统可能会将其标记为潜在的幻觉。'
- en: 'As an example, you can use libraries such as `yfinance` or `pandas_datareader`
    to access real-time or historical financial data:'
  id: totrans-602
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例如，您可以使用`yfinance`或`pandas_datareader`等库来访问实时或历史财务数据：
- en: '[PRE29]'
  id: totrans-603
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE29]'
- en: You could also develop a cross-verification algorithm and compare the model’s
    outputs with the collected financial data to flag potential inaccuracies.
  id: totrans-604
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你还可以开发一个交叉验证算法，并将模型的输出与收集到的财务数据进行比较，以标记潜在的不准确性。
- en: '`yfinance` or `pandas_datareader` to extract real-time data'
  id: totrans-605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`yfinance`或`pandas_datareader`提取实时数据
- en: '**Cross-verifying with real-time data**: You can compare the model’s output
    with real-time data to identify discrepancies:'
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与实时数据进行交叉验证**：你可以将模型的输出与实时数据进行比较，以识别差异：'
- en: '[PRE30]'
  id: totrans-607
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: '**User feedback loop**: A mechanism can be incorporated to allow users to report
    potential hallucinations. For instance, if a user spots an error in the LLM’s
    output during a Power BI data analysis session, they can report this. Over time,
    these reports can be used to further train the model and reduce hallucinations.'
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户反馈循环**：可以引入一种机制，允许用户报告潜在的幻觉。例如，如果用户在Power BI数据分析会话中发现了LLM输出的错误，他们可以报告这一点。随着时间的推移，这些报告可以用来进一步训练模型并减少幻觉。'
- en: OpenAI is on the case
  id: totrans-609
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI正在处理此事
- en: To tackle the chatbot’s missteps, OpenAI engineers are working on ways for its
    AI models to reward themselves for outputting correct data when moving toward
    an answer, instead of rewarding themselves only at the point of conclusion. The
    system could lead to better outcomes as it incorporates more of a human-like chain-of-thought
    procedure, according to the engineers.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决聊天机器人的失误，OpenAI的工程师们正在研究让其AI模型在向答案迈进时，因输出正确数据而自我奖励的方法，而不是仅在结论点自我奖励。工程师们表示，该系统可能会带来更好的结果，因为它更多地融入了类似人类的思维链过程。
- en: These examples should help in illustrating the concept and risks of LLM hallucinations,
    particularly in high-stakes contexts such as finance. As always, these models
    should be seen as powerful tools for assistance, but not as a final authority.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例应有助于说明LLM幻觉的概念和风险，尤其是在金融等高风险环境中。像往常一样，这些模型应被视为强大的辅助工具，而不是最终的权威。
- en: Trading examples
  id: totrans-612
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交易示例
- en: '**Hallucination scenario**: Let’s assume you’ve asked an LLM for a prediction
    on the future performance of a specific stock, let’s say Tesla. The LLM might
    generate a response that appears confident and factual, such as “Based on the
    latest earnings report, Tesla has declared bankruptcy.” If you acted on this hallucinated
    information, you might rush to sell Tesla shares only to find out that Tesla is
    not bankrupt at all. This is an example of a potentially disastrous hallucination.'
  id: totrans-613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉场景**：假设你要求一个LLM对某只特定股票的未来表现进行预测，比如特斯拉。LLM可能会生成一个看似自信且事实性的回应，例如：“根据最新的收益报告，特斯拉已经宣布破产。”如果你根据这个幻觉信息采取行动，你可能会匆忙出售特斯拉的股票，却发现特斯拉根本就没有破产。这是一个可能造成灾难性后果的幻觉例子。'
- en: '**Action**: Before making any trading decision based on the LLM’s output, always
    cross-verify the information from a reliable financial news source or the company’s
    official communications.'
  id: totrans-614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：在基于LLM的输出做出任何交易决策之前，始终从可靠的金融新闻来源或公司的官方通讯中交叉验证信息。'
- en: Power BI visualization examples
  id: totrans-615
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI可视化示例
- en: '**Hallucination scenario**: Suppose you’re using an LLM to generate text descriptions
    for a Power BI dashboard that tracks the market share of different automakers
    in the EV market. The LLM might hallucinate and produce a statement such as “Rivian
    has surpassed Tesla in terms of global EV market share.” This statement might
    be completely inaccurate as Tesla had a significantly larger market share than
    Rivian.'
  id: totrans-616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉场景**：假设您正在使用LLM为跟踪不同汽车制造商在电动汽车市场市场份额的Power BI仪表板生成文本描述。LLM可能会产生一个如“Rivian在全球电动汽车市场份额方面超过了Tesla”的陈述。这个陈述可能是完全错误的，因为Tesla的市场份额比Rivian大得多。'
- en: '**Action**: When using LLMs to generate text descriptions or insights for your
    Power BI dashboards, it’s crucial to cross-verify any assertions that are made
    by the model. You can do this by cross-referencing the underlying data in your
    Power BI dashboard or by referring to reliable external sources of information.'
  id: totrans-617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：当使用大型语言模型（LLM）为您的Power BI仪表板生成文本描述或见解时，交叉验证模型提出的任何断言至关重要。您可以通过交叉参考Power
    BI仪表板中的底层数据或参考可靠的外部信息来源来完成此操作。'
- en: To minimize hallucinations in the future, the model can be fine-tuned with a
    dataset that’s been specifically curated to cover the relevant domain. The use
    of a structured validation set can help spot and rectify hallucinations during
    the model training process. Also, employing a robust fact-checking mechanism on
    the output of the model before acting on its suggestions or insights can help
    catch and rectify any hallucinations.
  id: totrans-618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了最大限度地减少未来的幻觉，可以使用专门为涵盖相关领域而精心挑选的数据集来微调模型。使用结构化验证集可以帮助在模型训练过程中发现和纠正幻觉。此外，在根据模型的建议或见解采取行动之前，对模型的输出进行稳健的事实核查机制可以帮助捕捉和纠正任何幻觉。
- en: Remember, while LLMs can provide valuable insights and suggestions, their output
    should always be used as one of many inputs in your decision-making process, particularly
    in high-stakes environments such as financial trading and analysis.
  id: totrans-619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记住，虽然LLM可以提供有价值的见解和建议，但它们的输出应始终作为您决策过程中的多个输入之一，尤其是在金融交易和分析等高风险环境中。
- en: Summary
  id: totrans-620
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: As we draw the curtain on [*Chapter 4*](B21008_04.xhtml#_idTextAnchor094), you’ve
    just traversed an intricate and fascinating landscape where financial analysis,
    AI, and data visualization converge. Together, we’ve ventured into the world of
    financial ratios, unraveling their intricacies and understanding their crucial
    role in discerning a company’s financial health. Here, we delved deep into the
    enigmatic universe of quantitative investing, exploring how mathematical models
    can be leveraged to make data-driven investment decisions. We’ve chosen to focus
    on the agriculture sector and specifically on John Deere, a perfect canvas to
    paint our examples, given its rich history, global operations, and unique market
    challenges. This allowed us to demonstrate practical applications of these concepts
    in a real-world industry setting.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们关闭[*第4章*](B21008_04.xhtml#_idTextAnchor094)的帷幕时，您刚刚穿越了一个错综复杂且引人入胜的领域，在这里，财务分析、人工智能和数据可视化交汇。我们一起进入了财务比率的世界，揭开了它们的复杂性，并理解了它们在判断公司财务状况中的关键作用。在这里，我们深入探索了定量投资的神秘宇宙，探讨了如何利用数学模型来做出基于数据的投资决策。我们选择专注于农业部门，特别是约翰·迪尔（John
    Deere），鉴于其丰富的历史、全球运营和独特的市场挑战，它是一个完美的画布来描绘我们的例子。这使得我们能够在现实世界的行业环境中展示这些概念的实际应用。
- en: We also unraveled the transformative power of AI using ChatGPT, showing how
    it can revolutionize financial analysis by providing new insights, enhancing accuracy,
    and boosting efficiency. You’ve experienced how Power BI can bring financial data
    to life, making complex financial metrics digestible and interactive.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还揭示了ChatGPT的变革力量，展示了它如何通过提供新的见解、提高准确性和提高效率来彻底改变财务分析。您已经体验了Power BI如何使财务数据生动起来，使复杂的财务指标易于消化和互动。
- en: Next, we dove into the innovative realm of AutoGPT, where we saw its autonomous
    capabilities in action while exploring various trading strategies, from moving
    averages to portfolio rebalancing and grasping the power it holds in streamlining
    complex processes. However, with great power comes great responsibility. We also
    explored the concept of hallucinations in AI output, emphasizing the importance
    of critical thinking and fact-checking in an age of AI-driven decision-making.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们深入到AutoGPT的创新领域，我们看到它在各种交易策略中的自主能力，从移动平均到投资组合再平衡，并掌握它简化复杂流程的强大力量。然而，权力越大，责任越大。我们还探讨了AI输出中的幻觉概念，强调在AI驱动决策的时代，批判性思维和事实核查的重要性。
- en: You’re now armed with cutting-edge knowledge, fresh perspectives, and new tools
    that can transform the way you approach financial analysis. Remember, the world
    of finance is dynamic and ever-evolving. So, stay curious, continue learning,
    and harness the potential of AI to uncover new and exciting opportunities.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在拥有了前沿知识、新颖的视角和新的工具，这些可以改变您处理金融分析的方式。记住，金融世界是动态且不断演变的。因此，保持好奇心，继续学习，并利用AI的潜力来发现新的和令人兴奋的机会。
- en: As we step into [*Chapter 5*](B21008_05.xhtml#_idTextAnchor135), *Salesforce
    Reimagined, Navigating Software and LLMs*, we’re about to embark on an intriguing
    journey through the world of market sentiment analysis with AI and ChatGPT. We’ll
    discover the pivotal role sentiment analysis plays in financial investment decisions,
    with a spotlight on the metamorphosis of salesforce.com in the SaaS industry.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们步入[*第五章*](B21008_05.xhtml#_idTextAnchor135)，“Salesforce Reimagined, Navigating
    Software and LLMs”，我们将开始一段通过AI和ChatGPT探索市场情绪分析世界的迷人旅程。我们将发现情绪分析在金融投资决策中的关键作用，重点关注salesforce.com在SaaS行业的转型。
- en: Our journey will walk us through implementing sentiment analysis using ChatGPT
    for financial investments, where we’ll learn about data collection and preprocessing.
    We’ll then observe how Power BI can transform sentiment analysis results into
    visually compelling interpretations, enabling a more nuanced understanding of
    stock price movements and other financial indicators.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的旅程将引导我们通过使用ChatGPT进行金融投资的情绪分析实施，我们将学习数据收集和预处理。然后，我们将观察Power BI如何将情绪分析结果转化为视觉上引人入胜的解释，从而更深入地理解股价变动和其他金融指标。
- en: We’ll delve into practical examples and case studies, including Salesforce’s
    stock movement, to gain a deeper understanding of the interplay between market
    sentiment and stock price movements. Our exploration of best practices will arm
    us with techniques for enhancing the accuracy of sentiment analysis and the significance
    of incorporating it with other data sources.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深入研究实际案例和案例研究，包括Salesforce的股价变动，以更深入地理解市场情绪与股价变动之间的相互作用。我们对最佳实践的探索将为我们提供提高情绪分析准确性和将其他数据源与之结合的重要性。
- en: Further more, we’ll explore practical use cases, such as identifying potential
    investment opportunities or risks, tracking sentiment around specific financial
    events, and incorporating sentiment analysis insights into an overall investment
    strategy.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们将探讨实际应用案例，例如识别潜在的投资机会或风险、跟踪特定金融事件的情绪，以及将情绪分析洞察融入整体投资策略。
- en: As we conclude [*Chapter 5*](B21008_05.xhtml#_idTextAnchor135), we’ll recap
    the vital skills we’ve covered while encouraging you to continue exploring and
    integrating these innovative techniques into your financial investment toolkit.
    We hope you’re as excited as we are for this new chapter, where the analytical
    rigors of finance meet the emotional tides of market sentiment.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们总结[*第五章*](B21008_05.xhtml#_idTextAnchor135)之际，我们将回顾我们已覆盖的关键技能，同时鼓励您继续探索并将这些创新技术整合到您的金融投资工具箱中。我们希望您对这一新篇章感到与我们一样兴奋，在这一篇章中，金融分析的严谨性与市场情绪的波动相遇。
- en: 'Part 2: Pioneers and Protectors: AI Transformations in Software, Finance, Biotech,
    and Cybersecurity'
  id: totrans-630
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分：先驱与守护者：软件、金融、生物技术和网络安全中的AI转型
- en: In this part, we usher you through the groundbreaking junctions where technology
    meets industry giants – Salesforce, Silicon Valley Bank, Moderna, and CrowdStrike.
    This segment unfurls the undulating narratives of resurgence, innovation, and
    fortitude in the software, financial, biotechnology, and cybersecurity domains.
    We will begin with the gripping turnaround story of Salesforce, leading you through
    fascinating realms of both open source and proprietary **Large Language Models**
    (**LLMs**). Venture further to dissect the dramatic narrative surrounding the
    Silicon Valley Bank collapse, equipped with strategies grounded in AI insights
    for intelligent banking. Marvel at Moderna’s groundbreaking journey in revolutionizing
    biotech, and AGI’s potential. Then, delve into the world of cybersecurity with
    CrowdStrike, embracing the vital essence of AI literacy in an era dominated by
    deepfakes and indirect prompt injections. Each chapter presents a compelling case
    for the integrative force of AI in steering us toward uncharted territories of
    success and resilience.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 在本部分，我们将引导您穿越技术遇见行业巨头——Salesforce、硅谷银行、Moderna和CrowdStrike——的突破性交汇点。这一部分展开了一系列关于复苏、创新和坚韧不拔的故事，涉及软件、金融、生物技术和网络安全领域。我们将从Salesforce引人入胜的转型故事开始，带您进入开源和专有**大型语言模型**（**LLMs**）的迷人领域。进一步深入，剖析围绕硅谷银行崩溃的戏剧性叙述，并配备基于AI洞察力的智能银行策略。惊叹于Moderna在革命生物技术和AGI潜力方面的开创性旅程。然后，与CrowdStrike一起深入网络安全的世界，拥抱在深度伪造和间接提示注入主导的时代，AI素养的至关重要的本质。每一章都展示了AI在引导我们走向成功和韧性未知领域中的整合力量。
