  prefs: []
  type: TYPE_NORMAL
- en: Introduction to ontologies and knowledge engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When we’ve talked about RAG so far, we’ve relied on vector stores (semantic
    embeddings) and, at times, keyword (sparse) search to retrieve context for **large
    language models** (**LLMs**). While this hybrid semantic plus keyword approach
    improves relevance, it can still struggle whenever you need precise reasoning,
    explainability, or tight factual grounding. The next evolutionary leap is graph-based
    RAG, which leverages **knowledge graphs** (**KGs**) to provide a structured, navigable
    context that dramatically enhances reliability, factuality, and multi-step inference.
  prefs: []
  type: TYPE_NORMAL
- en: What is an ontology?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An **ontology** is a formal, explicit representation of domain knowledge structured
    into defined classes, properties, and relationships. Unlike traditional relational
    databases or purely vector-based stores, ontologies offer richer semantics and
    explicit links between concepts, facilitating better information retrieval, inference,
    and domain-specific reasoning. For example, an ontology can explicitly encode
    business rules, regulatory constraints, and logical connections between financial
    entities, making it invaluable for precise knowledge retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fundamentally, ontologies in KGs revolve around the same core graph concepts
    we introduced in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284): vertices
    (nodes), edges (relationships), paths, distances, and subgraphs. Nodes represent
    classes or individual instances, while edges define relationships among these
    nodes. Understanding paths and hops (connections between multiple nodes) allows
    agents to navigate and reason across complex networks of knowledge effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: The role of ontologies in agent architectures
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Agents are inherently versatile and powerful, adept at performing diverse tasks
    simultaneously. The transformative progression from shallow learning models, once
    narrowly focused on singular tasks such as translation, named-entity recognition,
    or classification, to neural networks and ultimately transformers has expanded
    the capabilities of artificial intelligence significantly. Modern models, especially
    **LLMs**, excel at multiple tasks and are even merging previously separate domains,
    such as vision and language, into integrated multi-modal frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: However, with **retrieval-augmented generation** (**RAG**), we revisit specialization.
    Here, our system will be designed to excel predominantly within a specific domain.
    Just as individuals specialize and become experts in particular fields, a well-planned
    AI agent will possess defined domain expertise to operate effectively. This domain
    expertise is central to an agent’s design, making the role of ontologies critical
    as they become the foundational backbone of the agent’s knowledge. Your agent
    has a specific goal and area it needs to be good at. We will step through how
    to properly plan and implement this domain expertise so that your agent will be
    set up for success!
  prefs: []
  type: TYPE_NORMAL
- en: Encoding domain expertise
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ontologies explicitly encode detailed domain knowledge, ensuring clarity and
    precision. To build an ontology, you define classes (such as organizations, financial
    instruments, and regulatory entities) and establish meaningful relationships and
    constraints using ontology languages. Capturing industry-specific expertise, such
    as the nuances of financial regulation or corporate structures, helps agents interpret
    complex user queries accurately and consistently.
  prefs: []
  type: TYPE_NORMAL
- en: To effectively embed this domain expertise into an agent through a KG, ontologies
    provide a structured framework that encapsulates both explicit factual information
    and implicit domain-specific logic. By clearly defining the semantic relationships
    among domain entities, an ontology facilitates accurate semantic inference, enabling
    the agent to derive new insights and answer complex queries beyond surface-level
    facts. For example, in financial compliance, an ontology can explicitly model
    the hierarchical relationship between regulatory frameworks, jurisdictional rules,
    and specific compliance obligations. This structured representation allows an
    agent to automatically infer compliance requirements applicable to different financial
    products or activities within various jurisdictions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ontology modeling languages: RDFS versus OWL'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'When building KGs, you need a way to define what types of things exist in your
    domain and how they relate to each other. While you could simply create ad hoc
    lists of nodes and relationships, standardized ontology languages provide crucial
    benefits: they enable automated reasoning (discovering implicit facts from explicit
    ones), ensure interoperability with other systems, and allow validation of data
    consistency.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Resource Description Framework Schema** (**RDFS**) is a vocabulary modeling
    language that lets you define classes and properties for your KG. With RDFS, you
    can specify that `Employee` is a type of `Person`, or that `worksFor` is a relationship
    between `people` and `companies`. It provides basic constructs such as class hierarchies
    (`subClassOf`) and property hierarchies (`subPropertyOf`), making it suitable
    for straightforward taxonomic structures. When you use RDFS, the systems that
    use it can understand inheritance. If all employees are people, and all people
    have names, then all employees have names.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Web Ontology Language** (**OWL**) extends RDFS with powerful logical capabilities.
    Where RDFS lets you say “employees are people,” OWL lets you express complex constraints
    such as “managers are employees who manage at least one person” or “no one can
    be both a company and a person.” OWL can specify that certain relationships are
    symmetric (if A knows B, then B knows A), transitive (if A supervises B and B
    supervises C, then A supervises C), or have cardinality restrictions (a person
    has exactly two biological parents). These features enable sophisticated automated
    reasoning, for instance, classifying individuals based on their properties or
    detecting logical inconsistencies in your data.'
  prefs: []
  type: TYPE_NORMAL
- en: The choice between RDFS and OWL depends on your needs. RDFS suffices for simple
    hierarchical vocabularies and basic inference. When you need complex domain modeling,
    validation rules, or advanced reasoning capabilities, OWL becomes essential. Many
    projects start with RDFS for its simplicity and add OWL constructs as requirements
    grow more sophisticated.
  prefs: []
  type: TYPE_NORMAL
- en: In the following code lab, we’ll work hands-on with OWL as our modeling language.
    We’ll use Protégé, a specialized ontology editor that provides a visual interface
    for creating OWL ontologies and leverages built-in reasoners to validate our model
    and infer new knowledge. This practical experience will illuminate the power of
    OWL’s formal reasoning capabilities in creating robust domain models.
  prefs: []
  type: TYPE_NORMAL
- en: Code Lab 13.1 – building a simple financial ontology in Protégé
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this code lab, we consider a financial ontology designed for a conversational
    AI assistant, where classes might include `Person`, `Organization`, `Account`,
    `Transaction`, `Financial Instrument`, and `Regulatory Authority`, with relationships
    such as `owns`, `isRegulatedBy`, or `issues`. By managing hierarchies (e.g., `FinancialInstrument`
    → `Equity` → `Stock`), providing thorough annotation (`labels`, `comments`, `synonyms`),
    and aligning with industry standards (such as FIBO for finance ontologies), the
    ontology becomes both robust and highly retrievable. For this example, we will
    keep things simple by focusing on just tickers and security types and offer a
    step-by-step code lab that guides users through building a basic financial ontology
    in Protégé. This walk-through will demonstrate the outlined process using concrete,
    easy-to-follow examples, centering on a handful of security types and ticker symbols.
  prefs: []
  type: TYPE_NORMAL
- en: What is Protégé?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Think of Protégé as your workbench for shaping knowledge into something a machine
    can actually “think” with. It’s a free, open source tool that lets you build ontologies,
    classes, relationships, and annotations, in a clean, standards-friendly way (like
    OWL) without getting lost in the weeds. The payoff? When you’re ready to turn
    your ontology into a KG for Neo4j, everything slots neatly into place, meaning
    no messy conversions or lost meaning. And for conversational AI, that neatness
    really matters: it’s what lets your bot understand questions, follow relationships,
    and serve up sharp, context-aware answers instead of vague guesses.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started with our code lab, working with Protégé!
  prefs: []
  type: TYPE_NORMAL
- en: Step 1 – define domain, scope, purpose, and competency questions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Define the domain**: Before specifying your particular domain, start by identifying
    the core subject area and its boundaries. Ask yourself: “What is the central topic?
    What related concepts must be included for completeness? What adjacent areas can
    be excluded?” The domain for this ontology is financial instruments and their
    relationships within the securities market. This includes publicly traded stocks
    and bonds, the organizations that issue them, and the regulatory authorities that
    oversee them. We’re focusing specifically on the core entities that a financial
    AI assistant would need to understand ticker symbols, security types (equity versus
    debt instruments), issuing companies, and regulatory bodies, such as the **Securities
    and Exchange Commission** (**SEC**). This domain is intentionally narrow to keep
    the lab manageable while still demonstrating key ontology engineering principles.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define the scope**: To define scope effectively, consider the depth and breadth
    of coverage needed for your use cases. List what will be explicitly included and,
    equally important, what will be excluded. Think about the level of detail required.
    Will you need granular attributes or just high-level concepts? The scope of this
    ontology is limited to modeling the essential relationships between financial
    instruments, their issuers, and regulators. We include only publicly traded securities
    (stocks such as AAPL and MSFT, bonds such as USTB), major organizations (Apple
    Inc., Microsoft Corp., U.S. Treasury), and the SEC as our regulatory authority.
    We explicitly exclude complex financial products such as derivatives, options,
    or private equity, as well as detailed financial metrics such as prices, volumes,
    or historical data. This focused scope allows us to build a complete, working
    ontology that answers specific questions without getting lost in financial complexity.
    But the key here is to know the scope that you need for your application and to
    define it as precisely as possible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify the purpose and users**: Begin by clearly articulating why this
    ontology exists and who will benefit from it. Interview potential users or stakeholders
    to understand their needs, technical expertise, and the types of questions they’ll
    ask. Document both primary and secondary user groups, as this will influence your
    design choices regarding complexity and terminology. For this financial ontology,
    we will define the purpose as enabling a conversational AI assistant to accurately
    answer questions about financial instruments, their types, and their regulatory
    relationships. The primary users are individual investors conducting research
    for their investment decisions, who need quick, accurate answers about whether
    a ticker represents a stock or bond, which companies issue specific securities,
    and what regulatory oversight applies. By structuring this knowledge in an ontology,
    we ensure the AI can not only retrieve facts but also reason about relationships,
    i.e., it can understand, for instance, if something is a `Stock`, it’s also an
    `Equity` and therefore a `FinancialInstrument`, providing investors with both
    specific answers and contextual understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Determine key use cases:** To identify use cases, analyze the tasks users
    will perform and the questions they’ll ask. Create specific scenarios that demonstrate
    how the ontology will be used in practice. Group similar use cases together and
    prioritize them based on frequency and importance to ensure your ontology addresses
    the most critical needs first. The key use cases we will define for this ontology
    focus on classification and relationship queries that a financial AI assistant
    must handle. Users should be able to ask whether a given ticker represents a stock
    or bond, identify which organization issued a particular security, determine which
    regulatory authority oversees specific instruments, and retrieve lists of known
    stocks or bonds. These use cases drive our modeling decisions—ensuring we have
    clear class hierarchies (`FinancialInstrument` → `Equity` → `Stock`), explicit
    relationships (`issuedBy`, i`sRegulatedBy`), and proper data properties (`hasTicker`)
    to support natural language queries about the financial domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Determine competency questions**: Competency questions are the litmus test
    for your ontology – concrete questions that it must be able to answer. Formulate
    these as natural language queries that reflect real user needs. Make them specific
    and measurable, covering different types of queries (factual, classification,
    relationship-based) to ensure comprehensive coverage. These questions will later
    serve as test cases to validate your ontology’s completeness and correctness.
    At the heart of ontology engineering is first scoping the project, that is, defining
    what your agent needs to know and do. You must clearly outline the domain of knowledge
    and the specific tasks your AI agent will perform. In this lab, the focus is on
    answering the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is AAPL a stock or bond?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What type of instrument is USTB?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Which authority regulates MSFT?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Which equities are regulated by the SEC, and who issues them?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What stocks do you know? What bonds?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: These competency questions guide us in selecting the classes, relationships,
    and attributes that our ontology needs to support. Identifying these questions
    upfront ensures that when you later test the ontology, you’re not just modeling
    concepts, you’re modeling the behaviors that matter to your AI. You’ll build the
    structure to support these queries throughout this lab, and, in [*Chapter 14*](B34736_14_ePub.xhtml#_idTextAnchor327),
    you’ll import this ontology into Neo4j and use Cypher queries with a RAG system
    to actually answer these questions. The final step of the code lab in [*Chapter
    14*](B34736_14_ePub.xhtml#_idTextAnchor327) demonstrates how all five competency
    questions are successfully answered using the financial knowledge graph you’re
    building here.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2 – gather and analyze domain knowledge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once your scope is set, gather the semantic ingredients. In a real-world project,
    you would collect texts, Excel tables, expert domain definitions, or even use
    LLMs to extract candidate entities and relations. For this lab, we keep it light:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Entities/tickers:** `AAPL` (Apple Inc.), `MSFT` (Microsoft Corp.), `USTB`
    (U.S. Treasury Bond)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Organization/authority instances:** `Apple Inc.`, `Microsoft Corp.`, `U.S.
    Treasury`, `SEC`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Concept types**: `FinancialInstrument` → `Equity` → `Stock`/`FinancialInstrument`
    → `Debt` → `Bond`; `Organization` → `RegulatoryAuthority`; `Person`; (`Account`
    and `Transaction` remain placeholders)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relationships:** `hasTicker` (datatype), `issuedBy`, `isRegulatedBy`, `ownedBy`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With these domain elements identified and documented, we can now organize them
    into a logical hierarchy that captures the inherent relationships between our
    concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3 – establish a preliminary class hierarchy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With those elements identified, sketch a draft taxonomy that mirrors domain
    logic. Your goal is to create a preliminary structure, classifying entities into
    subclasses and superclasses in a way that supports inheritance and type enforcement.
    In this lab, we’ll use the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This diagram will be your blueprint for the class structure you implement in
    Protégé.
  prefs: []
  type: TYPE_NORMAL
- en: Step 4 – define properties and relationships
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before you open Protégé, decide on the schema, which refers to the properties
    that tie classes together and give meaning. This includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data property**: `hasTicker`—domain: `FinancialInstrument`, range: `xsd:string`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Object properties**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`issuedBy`—connects `FinancialInstrument` → `Organization`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`isRegulatedBy`—connects `FinancialInstrument` → `RegulatoryAuthority`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`ownedBy`—links `FinancialInstrument` → `Person` or `Organization`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: The domain specifies which classes can have a property (e.g., only `FinancialInstruments`
    can have a `hasTicker`property), while the range specifies what type of values
    the property can take (e.g., `hasTicker`must be a string, or `issuedBy`must point
    to an `Organization`).
  prefs: []
  type: TYPE_NORMAL
- en: By spelling out these attributes (domains and ranges), you’re ensuring that
    Protégé’s built-in reasoners can detect modeling errors whenever someone later
    creates assertions that conflict with your schema logic. With our classes and
    properties clearly defined, the next crucial decision is selecting the right ontology
    modeling language that can express these relationships with the appropriate level
    of formality and reasoning support.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5 – choose an ontology modeling language
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Protégé supports both RDFS and OWL, and each offers different levels of expressivity.
    For this lab, we select OWL 2 DL. As we discussed earlier, OWL strikes a pragmatic
    balance, allowing domain/range declarations and basic cardinality, and supports
    full reasoning, while RDFS is simpler but lacks the inferencing power to enforce
    the constraints we require for this ontology.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing your ontology language is like picking the grammar for your domain
    logic. It shapes everything downstream. OWL 2 DL is the most widely compatible
    and semantically rich choice for our needs.
  prefs: []
  type: TYPE_NORMAL
- en: Step 6 – install Protégé 5.6.5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Use the latest allowed version to match the walk-through:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to https://protege.stanford.edu/ and download Desktop Protégé 5.6.5 for your
    operating system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unzip/extract the archive.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On Windows: run `run.bat`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On macOS: launch the Protégé app'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On Linux: execute `./run.sh` in a terminal'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If Protégé fails to launch, open a terminal and type `java -version`. It must
    report Java 11 or newer; install it if needed.
  prefs: []
  type: TYPE_NORMAL
- en: Step 7 – Launch Protégé, rename the ontology IRI, and save it using the correct
    syntax
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When saving your ontology, you’ll need to choose a syntax format. This decision
    can vary depending on the environment you are in and what formats you need in
    other parts of your pipeline, but we are going to be using Turtle syntax (`.ttl`)
    instead of RDF/XML or other formats. Turtle is more concise and human-readable
    than RDF/XML, making it easier to review or manually edit if needed. It retains
    the full expressivity needed for OWL ontologies while eliminating unnecessary
    XML boilerplate. The encoding remains precisely the same semantic graph, only
    the syntax differs. Additionally, Turtle is widely supported across RDF tools,
    libraries, and downstream systems due to its clarity and simplicity.
  prefs: []
  type: TYPE_NORMAL
- en: When you open **Protégé 5.6.5**, it immediately creates a brand-new blank ontology,
    which is typically named something, such as `untitled-ontology-1`, without prompting
    any naming dialog. Navigate to the **Active Ontology** tab. Click into the **Ontology
    IRI** field (which will look something like http://www.semanticweb.org/your-username/ontologies/…/untitled-ontology-3)
    and change the fragment to **FinancialOntology**. If asked whether to update all
    existing entity IRIs to match, click **Yes**. This ensures that all classes, properties,
    and individuals inherit your chosen namespace.
  prefs: []
  type: TYPE_NORMAL
- en: To save your ontology, go to **File** **→** **Save As…**. Protégé will ask you
    to select a syntax – for example, **RDF/XML, OWL/XML, Turtle**, or **OWL Functional**.
    Choose **Turtle Syntax (.ttl)**.
  prefs: []
  type: TYPE_NORMAL
- en: Starting with Step 8, we will start building our ontology.
  prefs: []
  type: TYPE_NORMAL
- en: Step 8 – build the class hierarchy in Protégé using the bulk entry wizard
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before adding to Protégé, place this exact set of names (including leading
    tabs) on your clipboard:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Replace each space character before `Equity`, `Stock`, and so on, with a single
    tab character (Protégé uses tab indentation to infer subclass relationships.)
    Copy-pasting this works immediately.
  prefs: []
  type: TYPE_NORMAL
- en: When you open the **Individual by classes** tab in Protégé, the topmost node
    you’ll see is `owl:Thing`. It’s not a user-created class; it’s a built-in feature
    of the OWL standard. Protégé includes `owl:Thing` so there’s always a canonical
    root for your class tree. By default, all user-defined classes hang under it.
    It cannot be deleted because OWL reasoning (e.g., subclass inferences, consistency
    checking) depends on this universal class. Deleting it would break the model.
  prefs: []
  type: TYPE_NORMAL
- en: Basic Protégé terminology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Protégé, “Individuals by class” refers to browsing or creating real-world
    examples (individuals, or “instances”) organized under specific classes (types
    or categories, such as `Stock`, `Organization`, or `RegulatoryAuthority`). The
    **Individuals** tab is where you actually see, select, and create these instances
    for a chosen class. `Entities` is a more general term covering all the main building
    blocks of your ontology: classes (types), properties (relationships and attributes),
    and individuals (instances). `Assertions` are statements that connect individuals
    to properties, such as saying `AAPL` (an individual) `hasTicker` “`AAPL`" (a data
    property assertion) or is `issuedBy Apple_Inc` (an object property assertion).
    So, classes are categories, individuals are examples, entities are the parts of
    your ontology, and assertions are the facts tying it all together.'
  prefs: []
  type: TYPE_NORMAL
- en: Populating all classes in one go
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Taking the list you created previously, find your way to the **Entities** tab,
    and then the **Classes** sub-tab:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.1: The Classes sub-tab in Protégé showing the class hierarchy view
    where you’ll build your ontology structure](img/B34736_13_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.1 – The Classes sub-tab in Protégé showing the class hierarchy view
    where you’ll build your ontology structure
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the instructions for entering the list you created in one bulk entry
    step:'
  prefs: []
  type: TYPE_NORMAL
- en: In the **Classes** tab, ensure the **Asserted** hierarchy view is active.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Right*-click on `owl:Thing` (or the class under which you want everything).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Add subclasses…**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.2: Right-click context menu showing the Add subclasses option for
    bulk class entry](img/B34736_13_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.2 – Right-click context menu showing the Add subclasses option for
    bulk class entry
  prefs: []
  type: TYPE_NORMAL
- en: You should see a popup with the title **Enter hierarchy**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Paste the preceding tab-indented listing or type it in, remembering to use the
    tabs to indent in the proper spots to create a hierarchy. Click on **Continue**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.3: The Enter hierarchy dialog box for bulk class entry using tab-indented
    text](img/B34736_13_3.png)Figure 13.3 – The Enter hierarchy dialog box for bulk
    class entry using tab-indented text'
  prefs: []
  type: TYPE_NORMAL
- en: 'Leave the **Do you want to make sibling classes disjoint?** box checked. For
    example, `Equity` and `Debt` should be explicitly disjoint: this ensures instances
    such as the `AAPL` class under `Equity` cannot also be a `Debt` instrument. Protégé
    will automatically add the `owl:AllDisjointClasses` axiom among sibling classes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on **Finish**. You may need to click the “expand” arrow next to `OwlThing`
    to see the new additions, but your full class tree should now appear correctly,
    just as you entered it previously, but with `OwlThing` at the top.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.4: The completed class hierarchy showing FinancialInstrument, Organization,
    Person, and Account classes with their respective subclasses](img/B34736_13_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.4 – The completed class hierarchy showing FinancialInstrument, Organization,
    Person, and Account classes with their respective subclasses
  prefs: []
  type: TYPE_NORMAL
- en: This automated wizard is ideal for the quick startup of domain skeletons and
    greatly reduces hierarchy placement errors. You also have the option to manually
    enter one class at a time, which we will cover in the next step.
  prefs: []
  type: TYPE_NORMAL
- en: Step 9 – manually adding one class at a time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We purposely left `Transaction` out, so we can add this class separately:'
  prefs: []
  type: TYPE_NORMAL
- en: Click on `owl:Thing`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the **Add subclass (+)** toolbar button. (In the previous steps, you used
    the option after right-clicking, but in this case, you are using the toolbar.
    This is an important distinction!)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.5: The toolbar with the Add subclass button highlighted for adding
    individual classes](img/B34736_13_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.5 – The toolbar with the Add subclass button highlighted for adding
    individual classes
  prefs: []
  type: TYPE_NORMAL
- en: Type `Transaction` in the popup and click **OK**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.6: The Create a new Class dialog for adding the Transaction class](img/B34736_13_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.6 – The Create a new Class dialog for adding the Transaction class
  prefs: []
  type: TYPE_NORMAL
- en: This option creates a single class per step, suited for conservative, iterative
    builds. A typical approach is to add your initial ontology in bulk with the previous
    steps, review it, and then add any additional individual entities with this approach.
  prefs: []
  type: TYPE_NORMAL
- en: Step 10 – define properties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Properties in OWL ontologies define the relationships between classes (object
    properties) and the data attributes that instances can have (data properties):'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Object Properties** sub-tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **owl:topObjectProperty** in the tree (this is the OWL canonical parent).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **Add sub property** button (looks like a small downward arrow with
    a plus).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.7: The Object Properties sub-tab showing owl:topObjectProperty
    and the Add sub property button](img/B34736_13_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.7 – The Object Properties sub-tab showing owl:topObjectProperty and
    the Add sub property button
  prefs: []
  type: TYPE_NORMAL
- en: 'In the dialog, create the following properties one by one:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`issuedBy`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`isRegulatedBy`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`ownedBy`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.8: Creating the issuedBy object property as a sub property of owl:topObjectProperty](img/B34736_13_8.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.8 – Creating the issuedBy object property as a sub property of owl:topObjectProperty
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.9: The Object properties hierarchy showing issuedBy, ownedBy, and
    isRegulatedBy properties](img/B34736_13_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.9 – The Object properties hierarchy showing issuedBy, ownedBy, and
    isRegulatedBy properties
  prefs: []
  type: TYPE_NORMAL
- en: If asked, do not check **Do you want to make sibling object properties disjointed?**
    (not recommended).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Note:** You can also use **Add Sibling** if you’re creating multiple side-by-side
    properties instead.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Select the `issuedBy` property and look for **Domains (intersection)** in the
    **Description: issuedBy** box on the right side of the screen. Click on the **+**
    next to **Domains (intersection)**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.10: Adding domain restrictions to the issuedBy property in the
    Description: issuedBy panel](img/B34736_13_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.10 – Adding domain restrictions to the issuedBy property in the Description:
    issuedBy panel'
  prefs: []
  type: TYPE_NORMAL
- en: In the **issuedBy** popup, expand `owl:Thing`, select `FinancialInstrument`,
    and click **OK**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.11: Selecting FinancialInstrument as the domain for the issuedBy
    property](img/B34736_13_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.11 – Selecting FinancialInstrument as the domain for the issuedBy
    property
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **+** next to **Ranges (intersection)**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **issuedBy** pop-up, expand `owl:Thing`, select `Organization`, and click
    **OK**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For `isRegulatedBy`, assign `Domain = FinancialInstrument`, `Range = RegulatoryAuthority`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For `ownedBy`, assign `Domain = FinancialInstrument`, then click **+** next
    to **Ranges** and select `Organization`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Switch to the **Data properties** sub-tab (still within the **Entities** tab).
    Select `owl:topDataProperty` and click on the **Add sub property** button.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.12: The Data properties sub-tab with the Add sub property button
    for creating data properties](img/B34736_13_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.12 – The Data properties sub-tab with the Add sub property button
    for creating data properties
  prefs: []
  type: TYPE_NORMAL
- en: In the **Create a new Data property** dialog, simply type `hasTicker`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.13: Creating the hasTicker data property dialog](img/B34736_13_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.13 – Creating the hasTicker data property dialog
  prefs: []
  type: TYPE_NORMAL
- en: Click **Continue**, then **Finish**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Then, to set the domain and range, do the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select `hasTicker` in the properties list.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **+** next to **Domains (intersection)**, then choose **FinancialInstrument**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **+** next to **Range**, and in the **Built in datatypes** tab, select
    **xsd:string**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Your **Description: hasTicker** section should look like this when you are
    done:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.14: The completed hasTicker property description showing the FinancialInstrument
    domain and xsd:string range](img/B34736_13_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.14 – The completed hasTicker property description showing the FinancialInstrument
    domain and xsd:string range
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve established our class hierarchy and defined all the necessary
    properties with their domains and ranges, we’re ready to populate our ontology
    with concrete examples. We’ll start by creating the organizations and regulatory
    authorities that will serve as reference points for our financial instruments.
  prefs: []
  type: TYPE_NORMAL
- en: Step 11 – create reference individuals first
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In Protégé (and in the “ontology” world in general), **individuals** just means
    actual things or examples of stuff in the real world. They could be people, companies,
    stocks, a single apple—whatever. The word *individual* doesn’t mean “person” here;
    it means “one specific thing.” So, even though it might feel a bit weird, we call
    `AAPL` (a stock) an *individual* because it’s a single, specific example of the
    class `Stock`. If your class is `Organization`, then `Apple_Inc` is an `Individual`
    of that class. If your class is `Bond`, then `USTB` might be an `Individual bond`.
    Create All Organization `Individuals`:'
  prefs: []
  type: TYPE_NORMAL
- en: Switch to the **Individuals by class** tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the `Organization` class.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.15: The Individuals by class tab with the Organization class selected](img/B34736_13_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.15 – The Individuals by class tab with the Organization class selected
  prefs: []
  type: TYPE_NORMAL
- en: Create `Apple_Inc` as an individual.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Individuals** panel, which is at the bottom right of the screen, you
    will see an **Individuals** tab. Click the icon that looks like a diamond square
    with a **+** (**Add individual +**), and create `Apple_Inc`.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **OK**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.16: Creating Apple_Inc as an individual of the Organization class](img/B34736_13_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.16 – Creating Apple_Inc as an individual of the Organization class
  prefs: []
  type: TYPE_NORMAL
- en: Repeat *Step 3* for `Microsoft_Corp`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat *Step 3* for `US_Treasury`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Your **Individuals** list should look similar to this:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.17: The Individuals panel showing Apple_Inc, Microsoft_Corp, and
    US_Treasury organizations](img/B34736_13_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.17 – The Individuals panel showing Apple_Inc, Microsoft_Corp, and
    US_Treasury organizations
  prefs: []
  type: TYPE_NORMAL
- en: With our organizations established as `Individuals` in the ontology, we next
    need to create the regulatory authority that oversees these financial entities.
  prefs: []
  type: TYPE_NORMAL
- en: Step 12 – create RegulatoryAuthority individual(s)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now we’ll create the SEC, which is the regulatory authority that oversees the
    financial instruments in our ontology. In the U.S. financial system, the **Securities
    and Exchange Commission** (**SEC**) regulates both stocks and bonds, making it
    a key entity for our financial ontology.
  prefs: []
  type: TYPE_NORMAL
- en: Select the `RegulatoryAuthority` class in the same **Individuals by class**
    tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create SEC as an individual:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add individual**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Name the new individual `SEC`.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **OK**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Your screen should look similar to this:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.18: The RegulatoryAuthority class with the SEC individual created](img/B34736_13_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.18 – The RegulatoryAuthority class with the SEC individual created
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have both the issuing organizations and the regulatory authority
    defined as individuals, we’re ready to create the financial instruments themselves
    and establish the relationships between all these entities.
  prefs: []
  type: TYPE_NORMAL
- en: Step 13 – create stock individuals and linking properties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With our organizations and regulatory authority in place, we can now create
    the actual financial instruments, which are the stocks and bonds that these organizations
    issue. We’ll create each instrument as an individual and then link them to their
    issuers and regulators using the properties we defined earlier.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create stock individuals:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go to the **Individuals by class** tab.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose the `Stock` class (under `FinancialInstrument`/`Equity`).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: In the box below, you will see an **Individuals** tab. Click the icon that looks
    like a square diamond with a **+** (**Add individual +**), and create `AAPL`.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: You should now see `AAPL` listed in the **Individuals** tab, under the `Stock`
    class.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Do the same for `MSFT`.![Figure 13.19: The Stock class showing AAPL and MSFT
    individuals](img/B34736_13_19.png)'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure 13.19 – The Stock class showing AAPL and MSFT individuals
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click on **AAPL** in the **Individuals** list to select it.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Look in the panel on the right (the **Property assertions: AAPL** panel). This
    panel has sections such as **Object property assertions**, **Data property assertions**,
    and so on.![Figure 13.20: The Property assertions panel for the AAPL individual](img/B34736_13_20.png)'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure 13.20 – The Property assertions panel for the AAPL individual
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click on the **+** next to **Data property assertions**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: In the popup, expand `owl:topDataProperty` and click on `hasTicker`.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the Value field to the right, enter `AAPL`, and then click **OK**.![Figure
    13.21: Adding the hasTicker data property value AAPL to the AAPL individual](img/B34736_13_21.png)'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure 13.21 – Adding the hasTicker data property value AAPL to the AAPL individual
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Do the same for `MSFT`.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a **Bond** individual(s).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add `USTB` as **Bond**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add this to **USTB**: **hasTicker: “USTB”**.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.22: The Bond class with USTB individual and its hasTicker property
    assertion](img/B34736_13_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.22 – The Bond class with USTB individual and its hasTicker property
    assertion
  prefs: []
  type: TYPE_NORMAL
- en: Add Object Properties to Financial Instruments
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For AAPL:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **AAPL** from the **Individuals** list.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Property assertions** panel on the right, do the following:'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Objec`t property`: `issuedBy` = `Apple_Inc`.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Objec`t property`: `isRegulatedBy` = `SEC`.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.23: AAPL’s property assertions showing issuedBy Apple_Inc and isRegulatedBy
    SEC](img/B34736_13_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.23 – AAPL’s property assertions showing issuedBy Apple_Inc and isRegulatedBy
    SEC
  prefs: []
  type: TYPE_NORMAL
- en: 'For **MSFT**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **MSFT** from the **Individuals** list.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Object property: `issuedBy` = `Microsoft_Corp`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Object property: `isRegulatedBy` = `SEC`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For USTB:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **USTB** from the **Individuals** list under **FinancialInstrument**/**Debt**/**Bond**
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Object property: `issuedBy` = `US_Treasury`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add Object property: `isRegulatedBy` = `SEC`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.24: USTB’s complete property assertions, including issuedBy US_Treasury
    and isRegulatedBy SEC](img/B34736_13_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.24 – USTB’s complete property assertions, including issuedBy US_Treasury
    and isRegulatedBy SEC
  prefs: []
  type: TYPE_NORMAL
- en: With our complete ontology structure now in place—including classes, properties,
    and individuals with their relationships—we can enhance its clarity and usability
    by adding human-readable annotations to make it more accessible for future users
    and applications.
  prefs: []
  type: TYPE_NORMAL
- en: Step 14 – enrichment and annotation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Adding a label (`rdfs:label`) and comment (`rdfs:comment`) to each class, such
    as `Stock`, is important for making your ontology both understandable and usable
    by people (and machines) who might use it in the future. The label provides a
    human-readable name for the class, which helps users quickly recognize what each
    class represents—even if the technical class name is less clear or uses code-like
    formatting. The comment gives a brief description or definition, explaining exactly
    what the class means in your model. This is especially helpful in larger ontologies,
    or when sharing your work, because it removes ambiguity and makes sure everyone
    has the same understanding of what a `Stock` is. Good labeling and commenting
    make your ontology self-documenting, easier to maintain, and more accessible for
    anyone who works with it.
  prefs: []
  type: TYPE_NORMAL
- en: 'For each class (starting with `Stock`), we will do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **Entities** tab, and then the **Classes** sub-tab. look for the
    list of classes down the left side.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Stock**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Look for the **Annotations** panel on the right side, select **Click +**, and
    add the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'rdfs:label: Stock'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'definition: A security representing equity ownership in a corporation.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'scope note: Includes only publicly traded equity securities; excluding private
    share classes (LP units, founder’s shares).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'example: AAPL is a Stock concept instance with ticker ‘AAPL’.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'hidden label: equity share'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'hidden label: common stock (add as a separate entry!)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optional: alternative label: Share'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The annotation properties `definition`, `scope note`, `example`, `hidden label`,
    and `alternative label` come from the SKOS vocabulary. Here is your chance to
    learn how to import a new ontology to help with your ontology development:'
  prefs: []
  type: TYPE_NORMAL
- en: At the top of the Protégé window, click the **Active Ontologies** tab.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the sidebar under **Direct imports**, click the small **+** **plus** button.
    (Yes—it’s in that tab.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choose **Import an ontology from a document on the Web**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enter this URL for SKOS-DL:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[http://www.w3.org/TR/skos-reference/skos-owl1-dl.rdf](http://www.w3.org/TR/skos-reference/skos-owl1-dl.rdf
    )'
  prefs: []
  type: TYPE_NORMAL
- en: Click **Continue**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It will check for the ontology, and if found, you can click **Finish** and continue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Be sure to go back and add this to the `Stock` class: definition, scope note,
    example, hidden label, alternative label.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note, when you add the SKOS ontology, the SKOS top-level classes become visible.
    SKOS defines these classes as the backbone of controlled vocabularies. We won’t
    dig too deep into this right now, but these can be helpful as you build out your
    ontology, so we will leave them and you can research and determine whether you
    want to use them in the future. Specifically:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Concept`: Represents any idea or term'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ConceptScheme`: Groups sets of concepts (a vocabulary or thesaurus)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Collection`: For arbitrary groupings of concepts (e.g., types of equity instruments)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now do this for **Bond**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'rdfs:label: Bond'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Definition: A debt security issued by governments or corporations, paying periodic
    interest and repaying principal at maturity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Scope note: Includes fixed-income securities with defined term and coupon;
    excludes unsecured debt not structured as bonds.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: USTB is a Bond individual issued by the US Treasury and regulated
    by the SEC.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hidden label: fixed income security'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hidden label: debt bond (add as a separate entry!)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optional: alternative label: Bond Security'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While it would be beneficial to add similar annotations to all classes in our
    ontology (`Account`, `FinancialInstrument`, `Debt`, `Equity`, `Organization`,
    `RegulatoryAuthority`, `Person`, and `Transaction`), we’ll skip annotating these
    remaining classes to keep this lab focused and manageable. In a production ontology,
    you would want to provide comprehensive annotations for every class to ensure
    clarity and maintainability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarly, while we defined the `ownedBy` property in *Step 10*, we haven’t
    demonstrated its use in this lab. In a production ontology with **Person** individuals
    representing investors, you would use `ownedBy` to link financial instruments
    to their owners. For instance, asserting that `John_Smith` is owned by AAPL to
    represent an investor’s stock holdings. We’ve omitted this to keep the lab focused
    on the core ontology structure, but ownership relationships are essential in real-world
    financial knowledge graphs. Annotate `individual stocks` and `bonds`:'
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **Individuals** sub-tab near where you currently are in the **Classes**
    sub-tab.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Select the following individuals:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Annotate `AAPL` with `rdfs:label` = `AAPL`
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Annotate `MSFT` with `rdfs:label` = `MSFT`
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Annotate `USTB` with `rdfs:label` = `USTB`
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, save in the Turtle format. Go to **File**→**Save** and ensure the format
    is **Turtle (.ttl)**. Save as `FinancialOntology.ttl`. We’ll use this exact file
    in *Code Lab 14.1*.
  prefs: []
  type: TYPE_NORMAL
- en: Why this lab matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'By the end of this exercise, you have actively walked through the full ontology
    lifecycle:'
  prefs: []
  type: TYPE_NORMAL
- en: Defined domain, scope, purpose, and competency questions for an ontology project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gathered and analyzed relevant domain entities and relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defined a clear class hierarchy for financial instruments and organizations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Specified data and object properties with explicit domains and ranges
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Selected OWL 2 DL as the modeling language for rich expressivity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Installed and launched Protégé `5.6.5` for ontology authoring
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Built the class structure in Protégé using bulk and manual methods
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Created and linked individuals (e.g., AAPL, MSFT, USTB, Apple_Inc, SEC)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Added detailed labels, comments, and SKOS annotations for clarity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Used disjoint classes and property assertions to enforce consistency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prepared a minimal, well-structured financial ontology for conversational AI
    and graph applications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This financial ontology, though minimal, illustrates the core of ontology-driven
    design. It becomes a structured backbone for answer retrieval and domain grounding
    in AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the foundational role of ontologies in creating
    intelligent AI agents. Through our hands-on work with Protégé, we built a financial
    ontology that formally represents domain knowledge—from the hierarchical relationships
    between stocks and bonds to the regulatory structures that govern them. This ontology
    provides more than just a data model; it offers a semantic framework that enables
    agents to understand not just what things are, but how they relate to each other
    and what rules constrain them.
  prefs: []
  type: TYPE_NORMAL
- en: The OWL ontology we created serves as a blueprint for machine reasoning, encoding
    expert knowledge in a form that supports automated inference and validation. By
    defining classes, properties, and individuals with rich annotations, we laid the
    groundwork for an AI system that can answer complex domain questions with precision
    and explainability.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll take this ontology and transform it into a functioning
    knowledge graph within Neo4j. You’ll learn how to convert your Protégé ontology
    into a graph database, implement graph-based RAG techniques, and see how combining
    ontological structure with graph traversal enables powerful multi-hop reasoning
    capabilities. This progression from formal knowledge representation to practical
    implementation will complete your understanding of how to build AI agents grounded
    in verified domain expertise.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
