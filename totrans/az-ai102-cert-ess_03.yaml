  - PREF_OL
  type: TYPE_NORMAL
- en: To estimate the monthly cost of Azure services
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: To configure firewall rules for AI services
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: To provide visibility into operations, track performance, and troubleshoot issues
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: To manage resource groups and subscriptions
  prefs:
