- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LLMs for Creative Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The blank page has long tormented many aspiring writers. But what if **artificial
    intelligence** (**AI**) could help spark new ideas and shape those fleeting sparks
    into captivating stories? In this chapter, we’ll explore how the rise of **large
    language models** (**LLMs**) such as GPT-3 and GPT-4 is transforming creative
    writing.
  prefs: []
  type: TYPE_NORMAL
- en: Discover how these AI tools can become your partners in imagination – suggesting
    plot lines and characters, enhancing your prose, and polishing your drafts. We’ll
    journey through the process of writing everything from haikus to sonnets, lyrics
    to screenplays with the aid of creative AI.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll cover examples of how prompt engineering can help an
    AI model understand your genre, style, and creative vision for a piece. Then,
    we’ll learn about strategies we can utilize to take the AI’s raw output and curate
    it into a refined work with our own flair. We’ll also discuss the importance of
    striking the right balance between AI-generated content and original human creativity.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll know how to start utilizing these fascinating
    tools to explore new narrative possibilities, gain fresh inspiration, and save
    time on the crafting process – all while retaining your artistic license and creative
    spirit. So, get ready to team up with AI and begin your next writing adventure!
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Using AI for creative writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using AI to generate fiction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using AI to write poetry
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using AI for creative writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the literary landscape of our hyper-digital world, the integration of technology
    with traditional creative processes has opened uncharted territories of artistic
    exploration and expression. LLMs have emerged as a game-changer in the realm of
    creative writing.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs have the power to generate text that can emulate human-like writing in
    a variety of genres, creating endless possibilities for writers. From generating
    intricate plotlines in science fiction to evoking profound emotions in romance
    tales and crafting spine-chilling narratives in horror, the capabilities of these
    AI models are as vast and diverse as the creative imagination itself.
  prefs: []
  type: TYPE_NORMAL
- en: As we proceed, we’ll explore the potential of LLMs not just as a tool for textual
    generation, but also as an avenue for prompt engineering that can cater to a multitude
    of writing styles and needs. Be it stirring up a reservoir of innovative ideas,
    fleshing out storylines, improving linguistic fluency, or editing and polishing
    drafts – the deployment of LLMs holds immense promise.
  prefs: []
  type: TYPE_NORMAL
- en: 'LLMs such as ChatGPT are exceptionally versatile tools that can aid in an array
    of creative writing endeavors:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Genre**: Whether you’re weaving a complex fantasy novel, penning a riveting
    crime thriller, writing a heart-wrenching drama, or exploring the depths of science
    fiction, LLMs can serve as valuable aids. They can generate ideas, suggest plot
    twists, develop characters, or even help with world-building based on the genre
    you’re working with.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Voice and tone**: LLMs can also aid you in maintaining a consistent narrative
    voice and tone throughout your work. Whether it’s a pensive first-person narrator
    or an omniscient third-person view, a comedic tone, or a more serious, somber
    one, these models can mimic the required styles effectively once they are adequately
    trained or given appropriate prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Writing style**: Whether your writing leans toward verbose and descriptive
    or succinct and straightforward, LLMs can help maintain your unique style. All
    you need to do is give the LLM an example of your writing style to imitate while
    generating text.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Poetry and songwriting**: For poets and songwriters out there, LLMs can be
    used to generate rhymes, verses, or entire poems and songs. They can identify
    rhyme schemes, rhythmic patterns, and common song structures to help you come
    up with emotionally resonant sentimental ballads, catchy pop songs, or profound
    epic poetry.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dialogue**: LLMs can be instrumental in writing dialogue as well. From creating
    everyday conversation sets to complex emotional exchanges between characters,
    by providing examples of the kind of dialogue you need, the model can generate
    similar interactions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research and historical accuracy**: If your work is set in a different era
    or requires specialist knowledge, LLMs can assist in ensuring historical or subject
    matter accuracy. Though not a substitute for detailed research, they can indeed
    supplement your efforts by providing quick information or context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Screenplays**: If your niche is screenwriting for film, television, or even
    video games, LLMs can help with structuring scenes, creating dialogue, and ensuring
    the correct format and style are maintained according to screenplay requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Editor and proofreader**: Besides generating creative text, LLMs such as
    ChatGPT are excellent tools for refining drafts. They can identify grammatical
    errors, suggest better phrasing options, and ensure overall readability and coherence
    in your writing, functioning as both an editor and a proofreader. This way, you
    can polish your raw content to a high standard without paying for professional
    services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brainstorming and outlining**: Transforming a wild idea into a comprehensive
    and engaging plot can be a daunting task. That’s where an LLM steps in, aiding
    in brainstorming different storyline possibilities, subplots, or character arcs.
    They can also help draft a basic outline of your narrative, providing a clear
    roadmap for your writing journey.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Non-fiction**: If your creative endeavors lean more toward non-fiction genres
    such as biographies, travelogues, or self-help books, LLMs can still offer invaluable
    support. They can help present information in an engaging and readable style,
    ensuring your readers stay engaged while learning something new.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Furthermore, one of the strengths of an LLM such as GPT-4 is its ability to
    assist in refining and polishing a piece of writing, including a story. Here are
    some ways they can help:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Grammar check**: LLMs are capable of identifying grammatical errors in your
    story. They can spot incorrect verb tenses, improper use of prepositions, missing
    or misplaced punctuation marks, and other common grammatical mistakes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Spelling correction**: The models can detect and correct spelling errors,
    thereby reducing the chance of your narrative being jumbled up with typos or incorrect
    spellings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Readability enhancement**: LLMs can suggest better sentence structures or
    vocabulary to make your story more readable and engaging. If a sentence is too
    complex or wordy, the model can recommend a simpler, clearer way to convey the
    same idea.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistency check**: The models can help ensure that character descriptions,
    plot developments, and other elements in your story remain consistent. It can
    alert you to inconsistencies such as a character’s appearance changing without
    explanation, timeline inconsistencies, or even continuity issues within the plot.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tone and style**: If you’ve chosen a specific tone or style for your story,
    the models can ensure it’s maintained throughout the piece. For instance, if your
    story is meant to maintain an informal, conversational tone or a formal, academic
    one, the LLM can suggest edits to maintain this consistency of voice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flow and transition**: One of the key elements of a good story is the smoothness
    of the narrative – how one scene or idea seamlessly flows into the next. LLMs
    can assist in perfecting these transitions in your story, making sure that every
    event or dialogue naturally progresses from previous ones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Plot structure**: LLMs can provide feedback on the structure of your story.
    They can check whether your story has a clear beginning, middle, and end with
    all the necessary elements of a plot, such as the setup, conflict, climax, and
    resolution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Style guide adherence**: If you’re writing for an outlet that requires adherence
    to a specific style guide, such as the AP or Chicago styles, an LLM can be trained
    to scan your material for any deviations and suggest necessary corrections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Character development**: Your characters need to grow and transform throughout
    the story, and an LLM can help ensure this. With precise inputs, it can track
    character arcs and suggest natural progressions based on their established traits
    and the story’s context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Narrative pace**: Maintaining the right pace is critical to keeping readers
    engaged. Too slow, and it may seem dull; too fast, and important details might
    be missed. An LLM can suggest where to add moments of suspense or conflict to
    speed up the narrative, or where more detailed descriptions or pauses might be
    required to slow things down.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Perspective consistency**: Whether you’re writing in first-, second-, or
    third-person perspective, LLMs can assist in maintaining this view consistently
    throughout your story, a pivotal factor in ensuring a cohesive narrative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the following section, we will explore a few examples of how to start and
    develop the writing ideas described here.
  prefs: []
  type: TYPE_NORMAL
- en: Using AI to generate fiction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When you intend to write fiction, starting from a blank page can feel daunting.
    However, with the assistance of an LLM, the process becomes more manageable. In
    this section, we will see how.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a step-by-step guide to help you move from a blank page to a full-fledged
    story using a tool such as ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Idea generation**: Begin with brainstorming. Even if you only have a vague
    idea, you can feed this into the LLM, and it will generate a variety of scenarios,
    characters, and possible plot directions for you. For example, if you input *A
    story about a time-traveling historian*, the model can give you multiple story
    teasers to choose from.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Character design**: With a basic idea at hand, the next step is character
    creation. Describe your character to the LLM in simple terms, and it can help
    you flesh out their personality, backstory, appearance, and more. Input *Introverted
    librarian with a secret past*, and the model can generate a more detailed character
    profile.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Plot outlining**: Now that you have a premise and characters, it’s time to
    create a rough sketch of your plot. Provide the LLM with the beginning and end
    and ask it to fill in critical plot points or scenes in the middle. For instance,
    if your story begins with the character in their everyday world and ends with
    them emerging as a hero after saving the day, the LLM will generate a sequence
    of events that connect these two points.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Scene writing**: Once you have a coherent sequence of plot points, you can
    ask the LLM to help you elaborate on each of these. Describe each scene to the
    model and it will generate descriptive text, dialogues, and actions. For example,
    input *Peter, the librarian, discovers an ancient artifact in the library that
    transports him to the 15th Century*, and the model might generate a detailed and
    vivid scene.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Dialogue enhancement**: For the parts in your story with dialogue, you can
    let the LLM help you create interesting and meaningful exchanges between characters.
    Input a desired topic or emotion, and the model might generate a dialogue intermixed
    with character actions and further narration.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Text refinement**: Once you’ve finished writing your story, the LLM functions
    as a writing assistant for editing and proofreading your work. The model can identify
    missing words, incorrect grammar use, or awkward phrase structures, and suggest
    how to enhance sentences.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Review and revise**: After the initial refinement, read your story thoroughly.
    Look for inconsistencies or areas lacking detail. Use the LLM to help rewrite
    sections, add extra descriptions or dialogue, or adjust the pacing, ensuring the
    story progression feels natural and captivating.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Title suggestion**: LLMs can also aid in creating compelling titles for your
    story. Provide some key story points and let the model suggest titles that encapsulate
    the mood and theme of your work.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Formatting**: In addition to creative aspects, LLMs can help with the more
    structural elements of your story, such as ensuring proper formatting, adherence
    to prescribed writing styles, if any, and generally enhancing the readability
    of your text.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Final edit**: Review your story one final time, using the LLM to do a last
    thorough grammar and punctuation check, and get a final polished version of your
    initially blank page now turned into a well-rounded story.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Try out this layout and experiment with creating your first short story. Iterate
    as you see fit to see the power of the LLM that you chose. Try the same process
    with ChatGPT, Bard, and Claude to see which one is more adept at what you are
    trying to accomplish.
  prefs: []
  type: TYPE_NORMAL
- en: If you are trying to produce longer stories, GPT-3.5 Turbo 16k-0613, released
    on June 13, 2023, supports up to 16k tokens, while Claude supports up to 100k
    tokens, which could be better suited for you. In November 6, 2023 OpenAI announced
    GPT-4 Turbo with 128k.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try to write something. Suppose you don’t have any idea about the topic
    of the genre. You can ask the LLM for suggestions. In this example, we are using
    the OpenAI Playground with chat mode and the GPT-4 0613 model:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: There are some good ideas there, but we have a long way to go.
  prefs: []
  type: TYPE_NORMAL
- en: 'One unexpected thing happened here: when I asked the LLM for the suggested
    temperature, I was thinking of the model temperature and not what the LLM produced.
    However, I think what it suggested was useful to set up the tone of the stories.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s develop a story for the science fiction genre.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This is not very good, but it’s just the starting point. Let’s iterate and try
    to make it better.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Although the initial story wasn’t good, the suggestions the LLM provides are
    quite useful. Furthermore, you can ask the LLM to write in the style of a well-known
    sci-fi author such as Isaac Asimov, Arthur C. Clarke, or Robert A. Heinlein. You
    can even ask the LLM to give a list of authors in the genre. If you have published
    your own work before, you can provide some examples of your writing and ask the
    LLM to write the story in your style.
  prefs: []
  type: TYPE_NORMAL
- en: When asking the LLM to enhance your story with some of the recommendations provided
    by it, don’t ask it to consider all of them at once. Do it one by one. Otherwise,
    it will miss things when trying to do too many *orders* in one shot.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, editing and polishing a story involves trial and error. Both the narrative
    and the characters will likely need multiple rounds of revisions before they create
    the impact and interest you’re aiming for. Try to get feedback from various readers
    to ensure your story appeals to a wide range of preferences. Experiment with different
    approaches, and don’t be afraid to take risks – the greatest stories often come
    from bold decisions and unconventional storytelling methods.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will explore how to write good prompts to generate poems.
    The same concepts could be used to write songs.
  prefs: []
  type: TYPE_NORMAL
- en: Using AI to write poetry
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To write poetry using an LLM such as OpenAI’s GPT-4, you’ll need some understanding
    of both poetry and the capabilities of the language model. Here’s a general guide:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Understand the basics of poetry**: Before you make the LLM write poetry,
    you need a basic understanding of what makes a poem. Study different styles of
    poetry, from the structured nature of sonnets and haikus to free verse poetry.
    Understand the important elements of poetry such as rhythm, rhyme, metaphors,
    similes, alliteration, and, most importantly, the ability to evoke deep emotions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Set the right tone**: In the prompt, set the tone or mood you want your poem
    to have. For instance, if you want an upbeat, hopeful poem, mention it in your
    prompt. A good language model can realign itself with the tone set in the prompt.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide a structure**: If you want a specific style of poetry or a certain
    pattern of rhyme, you need to instruct the language model accordingly. For example,
    if you want a sonnet with an ABAB rhyme scheme, you need to specify that.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use procedural tokens**: To ensure the language model adheres to your preferred
    poem style, use procedural tokens in your prompt as an instruction. For example,
    to write a haiku, you could guide the LLM using procedural tokens such as *Write
    a* *haiku about...*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Be specific with the theme**: For example, instead of just asking for a poem
    about nature, ask for a poem about *the setting Sun’s reflection in a* *still
    lake*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use creative constraints**: Remember that creative constraints often result
    in more interesting outcomes. Don’t be afraid to give specific instructions to
    see how the LLM can create content within them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s write a poem about my daughter Andrea on her trip to Italy and other parts
    of Europe this summer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: That’s fairly good. Since I don’t know much about poetry, I will ask GPT-4 to
    give feedback and some recommendations to improve upon.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: You can iterate suggesting different twists and scenes until you are happy with
    the results.
  prefs: []
  type: TYPE_NORMAL
- en: You can even combine concepts. For instance, you can write a product description
    as a poem that is funny and quirky. Experiment, experiment, experiment.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, in this case, the goal is to describe a physical product’s features and
    benefits in a playful, lyrical poem format:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose an intriguing, odd, or absurd product to inspire creative descriptions.
    Avoid mundane products.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outline the product’s key specifications and standout qualities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tell a mini story through the poem that gives the product personality and character.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use vivid imagery, sensory details, clever rhymes, wordplay, metaphors, and
    other poetic techniques.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try different verse forms, such as limericks or ballads. Vary the rhythm and
    rhyme scheme.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add witty dialogue or dramatic monologues to bring the product to life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Surprise readers with an inventive twist or punchline.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have fun celebrating the product through playful, charming verse. With imagination,
    you can transform any product into a lyrical mini adventure.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how it works for the Manatea Tea Infuser:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Now that you have a clear understanding of what concepts you can combine for
    a prompt and what response you can expect, we’ve come to the end of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored how LLMs such as GPT-3 and GPT-4 are transforming
    the creative writing process across diverse genres and styles.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we covered the key skills for leveraging AI writing assistants to enhance
    fiction projects. This included crafting effective prompts to communicate story
    requirements, utilizing the AI’s generative abilities for characters, settings,
    and plots, refining output through iterative editing, balancing reliance on AI
    content with human vision, and using the AI as an editing aid. The core lesson
    was learning to blend AI capabilities with your creativity and voice to retain
    ownership over your writing. With the right techniques, AI can take your fiction
    to new heights by sparking ideas, improving drafts, and opening creative possibilities.
    However, the human imagination and authorial vision remain essential to the storytelling
    process. By following the guidance in this chapter, you can harness the power
    of AI writing while maintaining your authentic style and narrative purpose. With
    practice, AI and human creativity can combine to take your fiction writing to
    the next level.
  prefs: []
  type: TYPE_NORMAL
- en: Mastering these skills empowers writers to get the most out of AI tools such
    as GPT-4\. You can gain fresh inspiration, accelerate idea generation, and create
    captivating stories, poems, lyrics, and more with an AI collaborator. This saves
    time, boosts creativity, and enables writers to reach their full potential.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, by complementing human creativity with the strengths of AI, writers
    can explore new frontiers of imagination and make the writing process more enriching
    and productive.
  prefs: []
  type: TYPE_NORMAL
- en: While this chapter focused on the creativity of fiction and poetry, in the next
    chapter, we’ll explore more practical applications of AI text processing. We’ll
    learn how to leverage LLMs to automatically classify text by emotion, categorize
    it into predefined topics, clean up inconsistencies, and extract key data points.
  prefs: []
  type: TYPE_NORMAL
