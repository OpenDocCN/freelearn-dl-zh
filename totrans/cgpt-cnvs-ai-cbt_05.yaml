- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting Started with LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’re going to look at LangChain and how this framework enables
    users to build complex LLM applications. You’ll gain an understanding of LangChain
    and the problems it fixes, as well as an introduction to the core components of
    LangChain, LangChain Expression Language, and the different types of chains that
    you can create.
  prefs: []
  type: TYPE_NORMAL
- en: At its core, LangChain is an open-source development framework designed for
    building LLM applications. By the end of this chapter, you’ll be well-equipped
    to engineer LangChain applications and use the more advanced functions and capabilities
    covered in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following key areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Core components of LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding LangChain Expression Language
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating different LangChain chains
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter aims to be an introduction to the core concepts to give you a solid
    base for mastering LangChain, enabling you to move on to more complex LangChain
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT extensively, so you will need to be
    signed up with a free account. If you haven’t created an account, go to https://openai.com/
    and click **Get Started** at the top right of the page, or go to https://chat.openai.com.
  prefs: []
  type: TYPE_NORMAL
- en: To carry out the examples, I would advise using ChatGPT via the web or mobile
    app unless stated otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: The last example technique requires Python 3.9 and Jupyter Notebook to be installed
    (https://jupyter.org/try-jupyter/lab/index.html).
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we progress further into the realm of LLM application development, you’ll
    start to notice that these sorts of applications quickly become complex and necessitate
    increasingly complex prompts. A prompt can include basic system instruction, user
    input, subject metadata, personalization for the user, previous interaction data,
    and other information from other systems. So, a typical application might necessitate
    multiple promptings of an LLM along with parsing its output, thus calling for
    a substantial amount of auxiliary code. This is where LangChain, created by Harrison
    Chase, comes into play to add structure to your LLM applications and ease the
    development journey.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain emerged from the necessity to fabricate intricate LLM applications
    while employing common abstractions in their developmental blueprint. It’s an
    open-source framework with a strong community and many active contributors.
  prefs: []
  type: TYPE_NORMAL
- en: The inception of LangChain was driven by the aspiration to streamline the development
    process, making it less daunting for developers to work with LLMs. In fact, this
    was the main reason I started using Langchain – as an easy means to deploy a proof
    of concept for a potential client to showcase a chatbot able to chat about a customer’s
    own data.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain is a framework tailored for crafting applications driven by language
    models. It accentuates context-awareness and reasoning by interfacing with language
    models and application-specific data. It offers modular components and off-the-shelf
    chains for ease of use and customization, facilitating a structured assembly of
    components for higher-level tasks. The framework also encapsulates various modules
    such as model I/O, retrieval, chains, agents, memory, and callbacks, catering
    to different aspects of interaction and data handling within your LLM application.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain libraries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The LangChain framework supports two different scripting languages: Python
    and JavaScript (TypeScript). The essence of LangChain lies in its emphasis on
    composition and modularity, housing a myriad of individual components. These components
    can either be amalgamated or utilized independently, showcasing the framework’s
    flexible nature.'
  prefs: []
  type: TYPE_NORMAL
- en: Both libraries are easy to use. While the Python LangChain library is more mature
    and feature-rich, the `TypeScript` library is newer but being developed to closely
    mirror the Python version’s capabilities. Both are designed to be user-friendly,
    with a focus on simplifying the integration and use of LLMs in various applications.
  prefs: []
  type: TYPE_NORMAL
- en: With such a strong community, there is a huge number of contributors in both
    libraries, with modules for everything from document loaders to agent blueprints
    to memory providers as well as integrations from tech providers, large and small.
  prefs: []
  type: TYPE_NORMAL
- en: But to make the best use of LangChain, it’s good to start with its basics. In
    the next section, we’ll look at the core components of LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Core components of LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LangChain offers a variety of modules that can be used to create language model
    applications. These modules can be used individually in simple applications or
    combined to create more complex ones. Flexibility is the key here!
  prefs: []
  type: TYPE_NORMAL
- en: 'The most common components of any LangChain chain are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LLM model**: LangChain’s core reasoning engine is your language model. LangChain
    makes it easy to use many different types of LLMs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt templates**: These provide instructions to the LLM, controlling its
    output. Understanding how to construct prompts and different prompting strategies
    is crucial, so it’s good that we covered this in the previous chapter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output parsers**: These convert the raw response from the LLM into a more
    usable format, simplifying downstream processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s look at each of these core components in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Working with LLMs in LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are two different types of LLM models in LangChain, which are called LLMs
    and ChatModels. These models are used to interface with the different LLM models
    available. LangChain supports many different types of LLMs and so is a great enabler
    for trying different types of LLMs and comparing results.
  prefs: []
  type: TYPE_NORMAL
- en: '**LLMs**: This is a language model that takes a string as input and returns
    a string'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatModel**: This is a language model that takes a list of messages as input
    and returns a message'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LLMs in LangChain refer to the pure text completion models that they interface
    with – for example, GPT-4\. These take a simple input as a string and output a
    string.
  prefs: []
  type: TYPE_NORMAL
- en: Chat models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In comparison, Chat models are tuned for conversations. The LLM APIs use a
    different interface than pure text completion models. Instead of a single string,
    they take a list of chat messages as input, which are labeled with a specific
    role: system, assistant, and user. You’ve already been introduced to the concept
    of working with a list of chat messages in [*Chapter 3*](B21100_03.xhtml#_idTextAnchor080),
    in the *Learning to use* *the ChatGPT API* section. The ChatGPT completions endpoint
    expects this input.'
  prefs: []
  type: TYPE_NORMAL
- en: As we’re concentrating on using ChatGPT and creating conversational experiences
    using LangChain, we’ll focus more on Chat Models for the rest of this chapter.
    If you are interested in carrying out generative tasks, then using the LLM model
    may be a better fit.
  prefs: []
  type: TYPE_NORMAL
- en: 'In LangChain, the chat model supports a list of ChatMessages, which have two
    properties:'
  prefs: []
  type: TYPE_NORMAL
- en: '`content`: The content of the message'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`role`: The role of the entity from where the `ChatMessage` originated'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The supported roles are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '`AIMessage`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`HumanMessage`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SystemMessage`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`FunctionMessage`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can also create a role manually in the `ChatMessage` class.
  prefs: []
  type: TYPE_NORMAL
- en: 'The ChatModel provides a `predict_messages()` method to interact with the mode
    using a list of messages. This would look like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This should output something that looks like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Let’s now look at using prompt templates with the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt templates
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we’ve seen, prompts can get detailed and long pretty quickly. We also often
    want to reuse our prompts. This is where the LangChain prompt templates can help
    a lot. They serve as structured blueprints to craft prompts for all the different
    tasks we want to carry out.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt templates can be combined, and LangChain also provides prompts for common
    tasks such as question answering and summarization.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, instead of directly manipulating the prompt string with instructions,
    we can just pass in the variables for a specific prompt and let LangChain handle
    the rest. We can also use LangChain prompts to work with our Chat Model prompting,
    so let’s take a look.
  prefs: []
  type: TYPE_NORMAL
- en: The `PromptTemplate` class in LangChain acts as a mold for string prompts, which
    can be filled with user-defined parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at an example. You are looking to build an application that analyzes
    your chat transcripts so you can understand the sentiment of your conversations
    across the different departments.
  prefs: []
  type: TYPE_NORMAL
- en: 'We import the `PromptTemplate`, then use the `from_template` function to create
    the template and corresponding variable placeholders:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'If you call the `format` method on your template and output `conversation_analysis`,
    you should have something that looks like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Notice that you have a completed prompt that is composed of the template and
    the variables that were passed in.
  prefs: []
  type: TYPE_NORMAL
- en: Chat prompt template
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `ChatPromptTemplate` works with chat models and enables the creation of
    conversational prompts, encapsulating a sequence of chat messages with designated
    roles such as `'`‘`system'`, `'human'`, and `'AI'`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at an example. We’re creating a health clinic chatbot to
    assist with general health-related inquiries. We import `ChatPromptTemplate`,
    and then create the template by calling the `from_messages` function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'You can then use this template as follows; this will create our message list
    populated with the variables we’ve assigned:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'These messages are now correctly formatted as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'You can now use these in a call to your Chat model by passing in your formatted
    prompts list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: There are also out-of-the-box prompts such as a prompt template that uses few-shot
    examples. The main components of the few-shot template are the examples, which
    are a list of examples to pass into the prompt and the example prompt itself.
    The prompt templates give you a lot of options with types of prompts; however,
    sometimes you may want to create your own prompt template. LangChain also makes
    this easy with custom prompt templates. Let’s look at these in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Custom templates
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Custom prompt templates in LangChain offer flexibility by enabling users to
    craft bespoke prompts for unique tasks beyond the scope of standard templates.
    These custom templates become useful when a task demands a distinct prompt format
    or particular details to steer your language model in the intended direction.
    Let’s look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Example usage of this template would look something like the following, by
    passing in the input variables when defining the prompt and calling the `format`
    function with your required variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: You now have a productivity advice-prompting template that you can reuse and
    share if necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Using output parsers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand an LLM and our prompts, the final core component of a
    LangChain app is the output parser.
  prefs: []
  type: TYPE_NORMAL
- en: Oftentimes, once we have extracted our response from our LLM, we have specific
    requirements for a certain format. Our example use case is based on some of the
    tasks we carried out in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057), in the
    section named *Creating utterances*. We can use our LLM to create intents and
    utterances. In these examples, although it appears to respond with JSON, it’s
    actually a string. What would be more useful would be to parse the LLM output
    string into a Python dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: First, we import all the required libraries and then create our `ResponseSchema`
    by providing a name and description. We can have as many of these as we require
    to match our output variables, which we then use to create our output parser by
    calling the `StructuredOutputParser.from_response_schemas` function.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can then create our instructions to include in our prompt template by calling
    `get_format_instructions()` on the output parser. The instructions are then used
    in our prompt template. Remember to pass our intent format instructions into our
    prompt. Let’s look at how we would do this in the following code example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Once we get the response back from the LLM, we can simply pass our response
    into our parse function to format our result – `output_dict = intent_output_parser.parse(response.content)`
    – which will now be a dictionary that we can interact with as normal.
  prefs: []
  type: TYPE_NORMAL
- en: There are a lot of benefits of using the output parser here as it manages any
    number of specific instructions to be used in the prompt, and the resulting response
    can be parsed as needed without having to manually format each one. The output
    parser is the final core component of a LangChain app.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at the concept of chains and the language used
    to manipulate them.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding LangChain Expression Language
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We’ve covered the core LangChain components. Now, we turn our focus to a pivotal
    concept that can be used in the creation and execution of these components: **LangChain
    Expression Language** (**LCEL**). Let’s delve deeper into what LCEL is and understand
    its significance in the LangChain framework.'
  prefs: []
  type: TYPE_NORMAL
- en: What is LCEL?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of chains is that they are the key building blocks of LangChain.
    A chain is a collection of blocks of functionality and in ’its simplest form,
    a chain would be made up of a prompt, a call to an LLM, and the processing of
    the result. We’ve seen these functional blocks in the previous section. At their
    most complex, chains can be made up of hundreds of steps.
  prefs: []
  type: TYPE_NORMAL
- en: LCEL provides a declarative syntax and orchestration framework that was created
    so users could easily create chains of functionality with a standardized way of
    defining and invocation to make it as easy as possible to run as well as create
    custom chains.
  prefs: []
  type: TYPE_NORMAL
- en: Key components of LCEL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LCEL offers a lot of functionality out of the box and is based on piping and
    modularity along with several specific features and a runnable protocol for each
    component, with each object providing a common interface so you can interact with
    each one in the same way.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a list of the key features of LCEL:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Streaming support**: LCEL enhances streaming efficiency by reducing the delay
    before the first output is produced. It streams tokens from an LLM to an output
    parser for quick, step-by-step parsing in real time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asynchronous and synchronous support**: Chains built with LCEL can be called
    using both synchronous (e.g., in Jupyter notebooks for prototyping) and asynchronous
    (e.g., in a LangServe server) APIs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Optimized parallel execution**: LCEL efficiently handles tasks by executing
    parallel steps in a sequence, such as retrieving documents simultaneously from
    various sources to minimize delay.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retries and fallbacks**: To make sure your applications are reliable; you
    can configure retries and fallbacks in any part of the LCEL chain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Input and output schemas**: To help with input and output validation, documentation,
    and error handling, LCEL chains include Pydantic and JSON Schema, which can be
    used for validation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Observability**: Out of the box, using LCEL logs the input and output of
    each step and details of the sequence of steps in the chain, which can then be
    viewed with the LangSmith server, which we’ll cover in later sections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration** : For complex chains, accessing the results for each step is
    often crucial for feedback or debugging. LCEL provides easy integration to LangSmith
    for monitoring and debugging.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runnable protocol
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LCEL’s Runnable protocol is important for custom chain creation. LCEL employs
    a “Runnable” protocol to streamline the development of custom chains.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Runnable protocol in LCEL is designed to make it easier to build and use
    custom processing chains. In simple terms, it’s like a set of rules or guidelines
    that helps in organizing how these chains are created and run. This protocol includes
    specific methods for tasks such as streaming data and processing in batches, along
    with their advanced versions for more complex operations. The main purposes of
    this protocol are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Standardization**: It creates a uniform way to define and use different parts
    of a system. This means that no matter what component you’re dealing with (such
    as a model or a tool), you use the same set of rules to work with it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexibility**: By having a standard approach, it becomes easier to mix and
    match different components. You can plug different parts into your chain, and
    they’ll work together smoothly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clarity**: It provides clear guidelines on what kind of data goes into and
    comes out of each component. This helps in understanding and inspecting how each
    part of the system functions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Efficiency**: It streamlines the process of building and modifying chains,
    saving time, and reducing the likelihood of errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, in essence, the Runnable protocol is like a common language or blueprint
    that helps in building, modifying, and understanding custom chains in LCEL effectively
    and efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: LCEL syntax
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With LCEL, we create our chains differently using the **pipe operator** (**|**)
    instead of **Chain**
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: When LangChain encounters the pipe operator between two objects, it tries to
    feed `x` into `y`.
  prefs: []
  type: TYPE_NORMAL
- en: A simple example of LCEL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To help you see the difference between using LCEL and the traditional approach,
    let’s compare both methods of creating a simple chain.
  prefs: []
  type: TYPE_NORMAL
- en: 'These two examples achieve the same outcome: setting up a chain with a language
    model and a default prompt. Let’s explore each one:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Use the `LLMChain` class as follows. In this approach, you’re explicitly creating
    an instance of the `LLMChain` class:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This involves passing in the language model (`llm`) and the default prompt (`default_prompt`)
    as arguments.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Create the chain with LCEL by connecting each step with the pipeline operator
    (`|`):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This approach uses the pipeline operator (`|`) to chain together the language
    model (`llm`) and the default prompt (`default_prompt`). The pipeline operator
    effectively “‘pipes”‘ the output of one component (the LLM) into the next component
    (the default prompt processor).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Key differences and benefits of LCEL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are some key differences and benefits to point out here:'
  prefs: []
  type: TYPE_NORMAL
- en: '`LLMChain` instantiation might be more readable and easier to understand. The
    pipeline operator, while concise, might require a bit of getting used to.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`LLMChain` class, you might extend functionality by subclassing or modifying
    the class. With the pipeline operator, you extend by adding more components to
    the pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Underlying mechanics**: While both achieve a similar end result, the underlying
    mechanics might differ slightly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Advanced features**: LCEL in both Python and Typescript offers benefits such
    as optimized parallel execution and support for handling errors with retries and
    fallbacks. LCEL also offers the ability to output the results of separate parts
    of your chain before the final chain completion, which is great for debugging
    and sending updates to the end client – for example, if you want to send your
    chat interface updates during a long execution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the LLMChain interface was the standard method. However, the more
    modern method is LCEL. LLMChain is still valid but for new application development,
    it’s advisable to use LCEL for composing chains.
  prefs: []
  type: TYPE_NORMAL
- en: In the following examples in this chapter and the remainder of the book, we’ll
    try and use LCEL wherever possible. In the next section, we’ll dive into creating
    different types of LangChain chains.
  prefs: []
  type: TYPE_NORMAL
- en: Creating different LangChain chains
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we’ll explore how to create some of the various chains you
    can create in LangChain. Our aim is to guide you from basic chains to more advanced
    chains.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll start with an example to introduce the basics of a simple chain. This
    will provide a foundation for understanding how chains work in LangChain. Next,
    we’ll learn how to create sequential chains, parallel chains, and finally, routing
    chains.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this section, you’ll have a clear understanding of how to create
    and utilize different LangChain chains and be equipped with the skills to apply
    these in your future LangChain projects. Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: Basic chain example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this basic example, we’ll show the simplest chain with a prompt and LLM
    component, which forms the basis of many more complex implementations. In this
    example, we are using our model to translate text into any language:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Walking through the code, you can see this is a simple chain. We create a `ChatPromptTemplate`
    instance from a template string. The template string defines the prompt that will
    be presented to the language model. The prompt asks the model to translate text
    into a specified language:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'The prompt template is a string that contains the following placeholders:'
  prefs: []
  type: TYPE_NORMAL
- en: '`{text}`: This placeholder will be replaced by the text to be translated'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`{language}`: This placeholder will be replaced by the target language'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can then create the runnable, our chain of components that all implement
    the runnable interface and are designed to be chained together, which is the core
    concept of LCEL. This line of code creates the `runnable` chain using the `|`
    operator:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'The `runnable` is a chain of three components:'
  prefs: []
  type: TYPE_NORMAL
- en: '`prompt`: This component applies the chat prompt template to the input data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ChatOpenAI`: This is the model that sends the prompted text to the `ChatOpenAI`
    chat models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`StrOutputParser`: This model parses the output of the `ChatOpenAI` chat models
    into a string, facilitating easy integration into various applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It’s likely that you may encounter chains where the `LLMChain` class is instantiated.
    This is the equivalent of our runnable in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The `LLMChain` is now a legacy class, so it’s best practice to use LCEL.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at creating a simple sequential chain for a
    more complex use case that’s specific to conversational AI.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a sequential chain to investigate conversational data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start by looking at a simple sequential chain. Sequential chains run a
    sequence of chains one after another and work well when you have expected input
    and outputs for carrying out downstream processing.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, imagine we have an electric car subscription company called
    GreenRide, which uses live chat to handle customer queries on its website. It
    is interested in creating a chatbot to automate some of its customer conversations.
    It has a lot of uncategorized chat transcripts. It wants to categorize these chat
    transcripts into **frequently asked questions** (**FAQs**) and transactional inquiries
    so it can understand which queries are complex and which ones are simple. It is
    interested in using an intent-based **Natural Language Understanding** (**NLU**)
    platform for handling transactional inquiries and an LLM to handle the FAQs. With
    the transactional inquiries, it wants to cluster the conversations by intent so
    that it can look at each use case in more detail and look at which teams need
    to be involved.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have been tasked with looking at this transcript data and carrying out
    these tasks. So, let’s break this down:'
  prefs: []
  type: TYPE_NORMAL
- en: Categorize each conversation and split it into two lists of FAQs and transactional
    conversations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Look at the transactional list of conversations and cluster these by intent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To achieve this, we’ll use LangChain to process chat transcripts through a
    sequential chain of operations. These processes are highlighted in the following
    diagram:'
  prefs: []
  type: TYPE_NORMAL
- en: "![\uFEFFFigure 5.1 – Processes of a sequential chain to investigate conversational\
    \ data](img/B21100_05_1.jpg)"
  prefs: []
  type: TYPE_IMG
- en: Figure 5.1 – Processes of a sequential chain to investigate conversational data
  prefs: []
  type: TYPE_NORMAL
- en: You will need two chains to carry out the categorization and clustering. The
    first chain, which uses an LLM and a prompt, will take in the list of transcripts
    and return two lists of conversations. The second chain will also be made up of
    an LLM and a prompt and will take in a list of transactional conversations and
    cluster these by intent type.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, we’ll be using LCEL and passing the results of one chain into
    another for further processing:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Start by importing the necessary modules from `langchain` and initialize our
    `ChatOpenAI` model with temperature `0`, as this isn’t going to be a creative
    task:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Chat transcripts are loaded from a JSON file, which will be the data source
    for processing:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Set up our output schemas to categorize the two conversations into `transactional_transcripts`
    and `faq`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You’ll notice that although you have a response schema for your two categorized
    lists of transcripts, you are only going to be using one, `transactional_transcripts`,
    for this processing task.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Set up your prompt template for categorizing transcripts, including placeholders
    for dynamic content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Configure an output parser to structure the language model’s output and set
    up a `ChatPromptTemplate` for the categorization task:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create your transactional categorization processing chain combining the prompt,
    ChatGPT model, and output parser for categorizing transcripts. This is composed
    using LangChain’s chaining mechanism, where each component is linked using the
    pipe operator (`|`):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This is the first chain complete, so now you can move on to creating the next
    chain.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'For the second intent clustering phase, you create new response schemas and
    an intent clustering prompt template:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Set up the second processing chain for intent clustering first, by creating
    a new prompt and the intent output parser. We can use the same chat model as we
    used for the first chain although depending on your task, these could be different.
    The beauty of LangChain is that all the components are interchangeable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The last part of the code helps you to create the second chain with the elements
    you’ve created. The output of the transcripts from `chain_one` is passed in:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The output should be a dictionary of chat transcripts made up of the transcripts
    list and the intent and category properties. You can access the first one as follows:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: There are other improvements you can try here. If you are going to be dealing
    with larger numbers of transcripts, it might be a good idea to loop over chunks
    of data so you don’t hit on token issues.
  prefs: []
  type: TYPE_NORMAL
- en: You could also add further processing by adding another chain element – for
    example, creating utterances for intents or categorizing intents for specific
    departments.
  prefs: []
  type: TYPE_NORMAL
- en: Using LangChain, we can also run chains in parallel. In the next section, let’s
    look at an example.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing parallel chains in LangChain for efficient multi-source information
    gathering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There may be situations when you want to run chains in parallel as part of
    a sequence. For example, imagine a scenario where we want to query multiple information
    sources simultaneously. This capability is particularly useful when a user asks
    a complex question that requires pulling data from different types of content,
    such as news articles, scientific papers, and general web information. The following
    diagram outlines the processes involved in a parallel chain:'
  prefs: []
  type: TYPE_NORMAL
- en: "![\uFEFFFigure 5.2 – Using a parallel chain in a sequence](img/B21100_05_2.jpg)"
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 – Using a parallel chain in a sequence
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code example illustrates how you can achieve this approach:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create our model and then create the three separate prompts we’re going to
    use in our chain (`news_chain`, `academic_chain`, and `web_info_chain`), each
    using a template to query specific types of content (news, academic papers, and
    general web information) about a given topic:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create our runnable parallel chain with the `RunnableParallel` class, as it
    is used to run these chains in parallel:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Invoke the parallel chains with topics (e.g., `"artificial intelligence"`),
    and each chain will fetch relevant information based on its configuration:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This will achieve what you expected. The chains all run in parallel and return
    their results as a `results['web_info'])`.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: It may be even more useful to create a summary of all three results to answer
    your user’s question. To achieve this, you need to run the parallel chains and
    then use these as part of a sequential chain.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Create the summarization prompt:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create our `RunnableSequence` and call our chain with `invoke()`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: In summary, `RunnableParallel` outputs a dictionary with the results of each
    parallel chain.
  prefs: []
  type: TYPE_NORMAL
- en: We can access those results using the keys we gave the parallel chains (e.g.,
    news, academic, and web info).
  prefs: []
  type: TYPE_NORMAL
- en: We pass that whole output dictionary into the `RunnableSequence`.
  prefs: []
  type: TYPE_NORMAL
- en: Our `summarise_prompt` prompt then has access to those results via the keys
    to populate its template. So, this allows smooth piping of the outputs of parallel
    processes into a sequential chain.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to a slightly more complex example, where we look intelligently
    routing our requests to different chains.
  prefs: []
  type: TYPE_NORMAL
- en: Routing chains to answer questions effectively
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When creating an LLM-powered application, you may need to call different chains,
    depending on the type of question or information you need to provide. The `RunnableBranch`
    allows you to do this.
  prefs: []
  type: TYPE_NORMAL
- en: 'For an example of this type of implementation, let’s go back to our car subscription
    company: GreenRide. We have an idea of the types of inquiries that we need to
    handle and these fit into three categories: maintenance, car info, and accounts.
    However, we’ll need to answer these with different chains. Let’s look at how this
    is achieved:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we import the necessary classes from the `langchain` library, then initialize
    our model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Next, we need to create the prompts for each department. We create templates
    for the different types of queries (maintenance, car info, and accounts). Each
    template is designed to guide the language model to answer in a specific context:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'We also need a general template:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This is a fallback template for queries that don’t fit into the specific departments.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Next, we create the branching logic using a `RunnableBranch`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This part defines the logic to decide which template to use based on the topic.
    It checks the topic of the input and matches it to the corresponding template.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We then need to create the topic classifier and classifier chain:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The `TopicClassifier` class defines a Pydantic data model that represents the
    output of the topic classification process. It has a single field, `topic`, which
    is an enum value indicating the classified topics of the user question.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Next, we use the `convert_pydantic_to_openai_function` function to convert
    the `TopicClassifier` Pydantic model into an OpenAI function that can be used
    with the `ChatOpenAI` API:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We then use the bind method to add the converted `TopicClassifier` function
    to the `ChatOpenAI` object. This effectively makes the topic classifier function
    available as a callable function within the `ChatOpenAI` context. The `PydanticAttrOutputFunctionsParser`
    class is used to parse the output of the topic classifier function, which is a
    JSON object. The `pydantic_schema` argument specifies the Pydantic model to use
    for parsing the JSON object, which in this case is the `TopicClassifier` model.
    The `attr_name` argument specifies the attribute of the Pydantic model to extract
    the classified topic from, which is the topic attribute.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: OpenAI functions
  prefs: []
  type: TYPE_NORMAL
- en: 'We are using OpenAI function calling here to ensure we receive the correct
    JSON format and schema. It’s worth noting that with the latest versions of OpenAI
    models (`gpt-4-1106-preview` or `gpt-3.5-turbo-1106`), you can set `response_format`
    to `{ "type": "json_object" }` to enable JSON mode. When JSON mode is enabled,
    the model is constrained to only generate strings that parse into valid JSON objects.
    However, this does not ensure the correct schema.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We then bring this together in our chain:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: When the `classifier_chain` is called with a user question, the question is
    first passed to the `ChatOpenAI` function for topic classification. The output
    of the topic classifier function is then parsed by the Pydantic attribute output
    functions parser, and the extracted classified topic is returned, allowing us
    to define which template to call.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Finally, we create our main chain pipeline, bringing all this together:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The final chain first classifies the input, then selects the appropriate template,
    processes the input with the language model, and parses the output. Finally, it’s
    easy to invoke our chain:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You should now have a working example that sets up a chatbot that can intelligently
    route customer support queries to specific departments such as maintenance, car
    information, and accounts.
  prefs: []
  type: TYPE_NORMAL
- en: At the moment, we are looking at different prompts. We can extend the `RunnableBranch`
    to route input not only to different prompts but also to entirely different chains.
    This allows for more complex and specialized processing, depending on the input’s
    topic or other criteria.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s assume that in addition to handling maintenance, car information, and
    account queries, you want to route some queries to a different chain for special
    handling. For instance, you might have a chain that handles credit control queries
    such as payments, which needs to tap into a payments service and user history
    and therefore has a much more complex chain. This is an easy case of just creating
    the chain and adding to our branching logic in the `RunnableBranch` configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: This is a pretty simple chain and theoretical example that uses a document loader
    component for looking up user payment account details. This introduces one of
    the many different modules available in LangChain that we’ll look at in the next
    chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ve taken our first look at LangChain and you should have
    a good understanding of what it is, the problems it solves, and its role in simplifying
    the development of complex LLM applications.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve looked at the core components of LangChain, such as the LLM models, prompt
    templates, and output parsers. You should have a good understanding of the LCEL,
    its key features, and its role in creating and executing chains within the LangChain
    framework. Finally, the chapter has covered the various examples of LangChain
    chains, ranging from basic to complex, to illustrate the practical application
    of the concepts discussed.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ve only scratched the surface of Langchain, but hopefully,
    we’ve built a solid foundation for you to engineer LangChain applications and
    enable you to move on to the more complex concepts and applications of the LangChain
    library. In our next chapter, we’ll look at other concepts such as memory as well
    as agents, modules, and other tools, particularly LangSmith.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are a curated list of resources to help you with the topics
    discussed in this chapter:'
  prefs: []
  type: TYPE_NORMAL
