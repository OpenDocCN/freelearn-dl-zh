  id: totrans-575
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Speech to text
  id: totrans-576
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Text to speech
  id: totrans-577
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
