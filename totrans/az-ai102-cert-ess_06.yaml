- en: By the end of this exercise, you should have a fully functional text analysis
    application capable of detecting language, evaluating sentiment, extracting key
    phrases, recognizing named entities, and linking entities to relevant sources
    across various text documents. This application showcases the extensive capabilities
    of the Azure AI Language service for extracting meaningful insights from text.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成这项练习后，您应该拥有一个功能齐全的文本分析应用程序，能够检测语言、评估情感、提取关键短语、识别命名实体，并将实体链接到相关来源，跨越各种文本文档。这个应用程序展示了Azure
    AI语言服务从文本中提取有意义的见解的广泛能力。
- en: Next, we will dive into processing speech using Azure AI Speech, where you’ll
    learn how to integrate speech-to-text, TTS, and other speech capabilities to build
    intelligent voice-enabled applications.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将深入探讨使用Azure AI语音处理语音，您将学习如何集成语音到文本、TTS和其他语音功能来构建智能语音启用应用程序。
- en: Processing speech by using Azure AI Speech
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Azure AI语音处理语音
- en: Azure AI Speech is a powerful suite of services that enables applications to
    handle transforming spoken language into written text, and vice versa, using machine
    learning models. It allows you to integrate speech recognition, transcription,
    and voice synthesis into your applications to build interactive and intelligent
    experiences.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI语音是一个强大的服务套件，它使应用程序能够通过机器学习模型处理将口语转换为书面文本，反之亦然。它允许您将语音识别、转录和语音合成集成到您的应用程序中，以构建交互式和智能体验。
- en: To use Azure AI Speech, you first need to provision an Azure AI Speech resource
    in your Azure subscription. This can be done by creating a dedicated AI Speech
    resource or a multi-service AI services resource. Once the resource is created,
    you will need the deployment location and one of the assigned keys, which can
    be found on the **Keys and Endpoint** page in the Azure portal. These details
    are required for client applications using supported SDKs. Let’s explore some
    key aspects of the Azure AI Speech service.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Azure AI语音，您首先需要在您的Azure订阅中配置Azure AI语音资源。这可以通过创建一个专门的AI语音资源或一个多服务AI服务资源来完成。一旦资源创建完成，您将需要部署位置和分配的密钥之一，这些可以在Azure门户中的**密钥和端点**页面找到。这些详细信息对于使用支持SDK的客户端应用程序是必需的。让我们探索Azure
    AI语音服务的一些关键方面。
- en: Key features
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键特性
- en: Azure AI Speech offers a comprehensive suite of features for converting between
    text and speech, enhancing interactions through voice-driven technologies. TTS
    enables the transformation of written text into spoken audio, which is ideal for
    creating interactive systems such as **Interactive Voice Response** (**IVR**)
    or generating audio versions of written content. For instance, a company might
    use this to automatically produce customer service messages in multiple languages.
    Speech to text, on the other hand, converts spoken audio into text, making it
    valuable for transcribing meetings or voice commands. This service supports **real-time
    speech to text** for instant transcription and **batch speech to text** for processing
    large volumes of audio, often used in post-call analytics.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI语音提供了一套全面的特性，用于在文本和语音之间转换，通过语音驱动技术增强交互。TTS可以将书面文本转换为语音，这对于创建交互式系统如**交互式语音响应**（**IVR**）或生成书面内容的音频版本非常理想。例如，一家公司可能会使用这项服务自动生成多语言客户服务信息。另一方面，语音到文本将语音转换为文本，这对于转录会议或语音命令非常有价值。这项服务支持**实时语音到文本**以实现即时转录，以及**批量语音到文本**以处理大量音频，通常用于通话后的分析。
- en: Additional features include **SSML**, which is an XML-based markup language
    that allows for detailed customization of TTS outputs. It offers control over
    voice characteristics such as pitch and pronunciation, allowing for more expressive
    speech generation. For example, an educational app might use SSML to add emotion
    to key learning moments.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 附加功能包括**SSML**，这是一种基于XML的标记语言，允许对TTS输出进行详细定制。它提供了对声音特征如音调和发音的控制，从而允许生成更具表现力的语音。例如，一个教育应用可能会使用SSML为关键学习时刻添加情感。
- en: '**Custom speech** solutions enable the creation of tailored models that improve
    recognition accuracy for specific industries or jargon, such as healthcare, where
    medical terminology needs to be accurately captured. Similarly, **custom neural
    voice** allows businesses to create synthetic voices that align with their brand
    identity, delivering a unique and personalized customer experience.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**定制语音**解决方案允许创建定制模型，以提高特定行业或术语的识别准确性，例如医疗保健行业，其中需要准确捕捉医学术语。同样，**定制神经网络声音**允许企业创建与品牌身份相符的合成声音，提供独特且个性化的客户体验。'
- en: '**Intent recognition** enables AI systems to interpret user intent from speech,
    making it integral to voice-activated assistants, while **keyword recognition**
    can detect specific terms within conversations, which is useful for automated
    alerts in customer service. The ability to configure audio formats and voices
    offers flexibility in how audio is output, allowing companies to select different
    voices or formats, including regional accents for localized marketing campaigns.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**意图识别**使AI系统能够从语音中解释用户意图，这对于语音激活助手至关重要，而**关键词识别**可以检测对话中的特定术语，这对于客户服务的自动警报很有用。配置音频格式和声音的能力提供了输出音频的灵活性，允许公司选择不同的声音或格式，包括区域口音以进行本地化营销活动。'
- en: Other advanced features include **speaker identification**, which helps in identifying
    unknown speakers from a set of known voices, aiding in customer verification and
    fraud detection, and **language identification**, which detects the language spoken
    in audio, helping businesses adjust multilingual virtual agents. The **Whisper
    model** enhances multilingual recognition, ensuring accurate transcriptions in
    various languages, which is crucial for international operations. Finally, **conversation
    transcription** captures discussions involving multiple speakers, making it perfect
    for meetings or conference settings, while maintaining compliance with privacy
    and consent considerations to protect user data during audio processing.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 其他高级功能包括**说话人识别**，这有助于从一组已知声音中识别未知说话人，有助于客户验证和欺诈检测，以及**语言识别**，它检测音频中的语言，帮助企业在多语言虚拟代理中进行调整。**Whisper模型**增强了多语言识别，确保在各种语言中准确转录，这对于国际运营至关重要。最后，**对话转录**捕捉涉及多个说话人的讨论，使其非常适合会议或会议环境，同时遵守隐私和同意考虑，以在音频处理过程中保护用户数据。
- en: Accessing the Azure AI Speech service
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 访问Azure AI语音服务
- en: 'Similar to other Azure AI services, there are three main ways to access the
    Azure AI Speech service:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他Azure AI服务类似，访问Azure AI语音服务主要有三种方式：
- en: Through the Azure AI Foundry service portal
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过Azure AI Foundry服务门户
- en: Via REST APIs
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过REST API
- en: Using SDKs
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用SDK
- en: 'In the following section, we will cover the portal and REST API approaches
    in detail; you will explore the SDK method in *Exercise 2: Recognizing and* *synthesizing
    speech*.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将详细介绍门户和REST API方法；你将在*练习2：识别和* *合成语音*中探索SDK方法。
- en: Azure AI service studio portal
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Azure AI服务工作室门户
- en: 'To get started, follow these steps:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，请按照以下步骤操作：
- en: Navigate to the AI Foundry home page at [ai.azure.com](http://ai.azure.com),
    and from the left pane, select **Azure AI Services** and then choose **Real-time
    transcription** under the **Speech** service.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到[ai.azure.com](http://ai.azure.com)的AI Foundry主页，然后在左侧面板中选择**Azure AI服务**，然后在**语音**服务下选择**实时转录**。
- en: 'Next, select **Record**. An audio file will be automatically generated, and
    the transcribed text will be displayed, as shown in the following figure:'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，选择**录制**。将自动生成音频文件，并显示转录文本，如下图所示：
- en: '![Figure 6.2 – Real-time speech-to-text in the AI service studio](img/B31034_06_02.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图6.2 – AI服务工作室中的实时语音到文本](img/B31034_06_02.jpg)'
- en: Figure 6.2 – Real-time speech-to-text in the AI service studio
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2 – AI服务工作室中的实时语音到文本
- en: By leveraging the Azure AI Foundry portal, users can quickly experiment with
    speech-to-text functionality in a no-code environment, making it an ideal platform
    for prototyping and validating speech recognition capabilities before integrating
    them into applications.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用Azure AI Foundry门户，用户可以在无代码环境中快速尝试语音到文本功能，使其成为原型设计和验证语音识别能力以集成到应用程序中的理想平台。
- en: REST APIs
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: REST API
- en: 'The Azure AI speech-to-text service provides two REST APIs for speech recognition:
    the primary **speech-to-text API** for general speech transcription and the **speech-to-text
    short audio API**, optimized for short audio streams (up to 60 seconds). These
    APIs support both interactive speech recognition and batch transcription, making
    them adaptable to various audio lengths and volumes. Developers typically access
    these services through language-specific SDKs, such as Python or C#. For more
    details on their usage, visit [https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-text-to-speech?tabs=streaming](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-text-to-speech?tabs=streaming).'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI语音到文本服务提供两个REST API用于语音识别：主要的**语音到文本API**用于通用语音转录和**语音到文本短音频API**，针对短音频流（最多60秒）进行了优化。这些API支持交互式语音识别和批量转录，使它们能够适应各种音频长度和音量。开发者通常通过特定语言的SDK，如Python或C#，访问这些服务。有关它们使用的更多详细信息，请访问[https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-text-to-speech?tabs=streaming](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-text-to-speech?tabs=streaming)。
- en: Using SDKs
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用SDK
- en: To use the Azure AI Speech SDK, you configure a `SpeechRecognizer` object using
    `SpeechConfig` (containing your resource’s location and key) and `AudioConfig`
    (to specify the audio source). By calling methods such as `RecognizeOnceAsync()`,
    the service transcribes spoken utterances asynchronously, returning a `SpeechRecognitionResult`
    object. This result includes important details, such as duration, transcription
    text, and error handling, in cases of unsuccessful recognition, as shown in the
    following figure.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Azure AI语音SDK，您需要使用`SpeechConfig`（包含您的资源位置和密钥）和`AudioConfig`（指定音频源）来配置`SpeechRecognizer`对象。通过调用`RecognizeOnceAsync()`等方法，服务异步转录语音，返回`SpeechRecognitionResult`对象。此结果包括重要细节，如持续时间、转录文本和错误处理，在识别失败的情况下，如以下图所示。
- en: '![Figure 6.3 – Patten for using the speech-to-text API](img/B31034_06_03.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图6.3 – 使用语音到文本API的模式](img/B31034_06_03.jpg)'
- en: Figure 6.3 – Patten for using the speech-to-text API
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3 – 使用语音到文本API的模式
- en: This setup allows for flexible integration into applications, supporting both
    real-time and batch transcription scenarios. Additional details will be explored
    in *Exercise 2*.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置允许灵活地集成到应用程序中，支持实时和批量转录场景。更多细节将在*练习2*中探讨。
- en: Configuring audio formats and voices
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置音频格式和声音
- en: The Azure AI Speech service provides flexible options for configuring audio
    formats and voices to suit various use cases, whether for high-quality audio or
    bandwidth-efficient applications.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI语音服务提供了灵活的选项来配置音频格式和声音，以适应各种用例，无论是高质量音频还是带宽高效的程序。
- en: Audio formats
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 音频格式
- en: 'The Azure AI Speech service supports multiple audio formats to meet different
    requirements:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI语音服务支持多种音频格式以满足不同的需求：
- en: '**WAV (PCM)**: Uses **Pulse Code Modulation** (**PCM**) with a bit rate of
    256 kbps and a 16 kHz sample rate, offering high-quality audio, which is ideal
    for applications where audio fidelity is critical.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**WAV (PCM)**：使用**脉冲编码调制**（**PCM**）的比特率为256 kbps、采样率为16 kHz，提供高质量的音频，非常适合音频保真度至关重要的应用。'
- en: '**OGG (Opus)**: This format uses Opus with a bit rate of 256 kbps and a 16
    kHz sample rate. It is well suited for streaming applications due to its compression
    efficiency, maintaining good audio quality.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OGG (Opus)**：此格式使用比特率为256 kbps、采样率为16 kHz的Opus。由于其压缩效率高，非常适合流媒体应用，同时保持良好的音频质量。'
- en: '**MP3**: A widely supported format, MP3 allows varying bit rates (e.g., 48
    kbps for low bandwidth), making it a popular choice for general playback with
    a balance between quality and file size.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MP3**：这是一个广泛支持的格式，MP3允许不同的比特率（例如，低带宽的48 kbps），使其在平衡质量和文件大小之间成为通用的播放选择。'
- en: Sample rates such as 24 kHz and 48 kHz are supported, with higher rates delivering
    superior audio quality. The bitrate and encoding determine the quality and size
    of the audio, with higher bitrates producing better quality but larger files,
    while lower bitrates are more efficient for bandwidth.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 支持的采样率有24 kHz和48 kHz，较高的采样率提供更优的音频质量。比特率和编码决定了音频的质量和大小，较高的比特率产生更好的质量但文件更大，而较低的比特率在带宽方面更高效。
- en: Configuring voices
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置声音
- en: 'The Speech service offers a variety of prebuilt and custom voices to enhance
    the user experience:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 语音服务提供各种预构建和自定义声音以增强用户体验：
- en: '**Prebuilt neural voices**: These are highly natural and human-like, available
    in different languages, genders, and voice styles, and are suitable for a wide
    range of applications'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom neural voices**: You can create a unique voice by training it using
    your own audio recordings, aligning it with your brand or product identity'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Voice styles and roles**: Voices can be further customized with different
    styles, such as professional, casual, or empathetic, depending on the context'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using SSML, you can fine-tune the speech output by adjusting pitch, rate, volume,
    and pronunciation, providing precise control over how the text is spoken.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of how you can use SSML to configure audio output:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The `"en-US-JennyNeural"` voice has been selected, with a pitch increase of
    2 semitones, a medium speaking rate, and a loud volume for the phrase *welcome
    to* *our service*.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2: Recognizing and synthesizing speech'
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you will continue using the Azure AI multi-service account
    created in *Exercise 1* in [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033) to
    build a speaking clock application that can recognize and synthesize speech. Alternatively,
    you can create a dedicated Azure AI Speech resource at [https://ms.portal.azure.com/#create/Microsoft.CognitiveServicesSpeechServices](https://ms.portal.azure.com/#create/Microsoft.CognitiveServicesSpeechServices)if
    preferred.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Configuring the application'
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, configure your environment to connect to the Azure AI Speech service.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Open the `speaking-clock.py` file located in `/02-synthesize-speech/Python/speaking-clock`.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the `.env` configuration file with your Azure AI Speech resource’s region
    and key.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Important note
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: For the Speech service, use the same key, but specify the region instead of
    the service endpoint when setting the `SPEECH_KEY` and `SPEECH_REGION` environment
    variables.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: 'Install the necessary Python package in the integrated terminal:'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This ensures that your development environment has all the required dependencies
    for Azure AI Speech.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Reviewing the code to use the Azure AI Speech SDK'
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, review and prepare the code to interact with the Speech SDK.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: 'Open `speaking-clock.py` and review the following:'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Under the `Configure speech service` comment, review the following:'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-138
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: With this step completed, your application is now configured to securely connect
    to the Azure AI Speech service.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Recognizing speech (speech to text)'
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, set up the application to capture and transcribe spoken input.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: To use a microphone for speech recognition in the `speaking-clock.py` file,
    you can follow these steps to modify the `TranscribeCommand` function. Under the
    `Configure speech recognition` comment, review the code to create a `SpeechRecognizer`
    client that recognizes and transcribes speech using the default system microphone.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: 'Review the following under `Configure` `speech recognition`:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Your application can now capture and transcribe spoken input from the microphone.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Processing the transcribed command'
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Process and display the transcribed speech for further use.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: 'Review the code to process the transcribed speech:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Your application can now process and display the transcribed text from spoken
    input.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Synthesizing speech (text to speech)'
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, generate spoken audio output from your text responses.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'Review the following code under the `TellTime` function to synthesize speech:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Your application can now generate spoken responses for the current time.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to switch to an alternative voice before creating `SpeechSynthesizer`,
    set it like this: `speech_config.speech_synthesis_voice_name = ''en-GB-LibbyNeural''`.
    You can find a list of neural and standard voices in the Speech studio at [https://speech.microsoft.com/portal/voicegallery](https://speech.microsoft.com/portal/voicegallery).'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Running the application'
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Run the complete application and test the speech-to-text and text-to-speech
    features.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: 'In the terminal, run the program using the following:'
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '![Figure 6.4 – Output after running the program](img/B31034_06_04.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
- en: Figure 6.4 – Output after running the program
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Your speaking clock application is now functional and can recognize and respond
    to time-related queries.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 7: Using Speech Synthesis Markup Language (optional)'
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Optionally, customize the speech output using SSML to enhance voice characteristics.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: 'SSML is an XML-based tool for customizing TTS outputs. It provides precise
    control over voice characteristics such as pitch, rate, volume, and pronunciation,
    enabling expressive and tailored speech generation for various applications, including
    educational tools:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `TellTime` function, review the code under the `Speech Synthesis Markup
    Language` comment, which replaces the previously commented-out code under `Synthesize`
    `spoken output`:'
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Run the program again, and when prompted, speak clearly into the microphone
    and say, “What time is it?” The program will respond in the voice specified in
    the SSML (overriding the voice in `SpeechConfig`), announcing the current time.
    After a pause, it will let you know that it’s time to conclude this lab—because
    it is!
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By following these steps, you’ve successfully implemented a speaking clock that
    can transcribe speech and generate spoken responses using Azure AI Speech services!
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: Let’s talk about translating language services next.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: Translating text/speech with speech services
  id: totrans-173
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The Azure AI Translator and AI Speech services offer comprehensive tools for
    translating text, documents, and speech across multiple languages. Here’s a breakdown
    of the key features and how they can be applied:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '**Translate text and documents using the Azure AI Translator service**: Azure
    AI Translator allows you to translate text or documents into multiple languages.
    This is useful for companies that need to communicate in multiple languages. For
    example, a company can translate a product manual from English into Spanish and
    French to reach a broader audience.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom translation with custom models**: Azure allows you to train custom
    translation models specific to your domain. For example, a healthcare company
    might develop a model that accurately translates medical terminology, improving
    communication between doctors and patients in different languages.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用自定义模型进行自定义翻译**：Azure 允许您训练特定于您领域的自定义翻译模型。例如，一家医疗保健公司可能会开发一个能够准确翻译医学术语的模型，从而改善不同语言之间的医生和患者之间的沟通。'
- en: '**Translate to multiple languages simultaneously**: Azure AI Translator allows
    you to translate content into several languages at once, making it ideal for global
    communications. For example, an announcement can be simultaneously translated
    into English, French, German, and Chinese to cater to a global audience.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同时翻译成多种语言**：Azure AI Translator 允许您一次性将内容翻译成多种语言，非常适合全球通讯。例如，一个公告可以同时翻译成英语、法语、德语和中文，以迎合全球受众。'
- en: Translating speech to text using the SDK
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 SDK 将语音翻译成文本
- en: Using the speech-to-text API, you can recognize spoken language and translate
    it into text. This can be done either in real time or in batch mode, for larger
    volumes of audio files. With the `SpeechTranslationConfig` object, you specify
    the input speech language and the target translation languages. The `TranslationRecognizer`
    object handles speech recognition and translation, delivering both the original
    transcription and its translation into other languages, as shown here.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 使用语音转文本 API，您可以将口语识别并翻译成文本。这可以在实时或批量模式下进行，适用于大量音频文件。使用 `SpeechTranslationConfig`
    对象，您指定输入语音语言和目标翻译语言。`TranslationRecognizer` 对象处理语音识别和翻译，提供原始转录及其翻译成其他语言的版本，如此处所示。
- en: '![Figure 6.5 – Speech translation](img/B31034_06_05.jpg)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.5 – 语音翻译](img/B31034_06_05.jpg)'
- en: Figure 6.5 – Speech translation
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5 – 语音翻译
- en: 'For example, in a multilingual conference setting, the speaker can talk in
    English, and Azure AI Speech can transcribe and translate the speech into French
    and Spanish in real time. Additional details will be explored in *Exercise 4:
    Translating speech using Azure* *AI Speech*.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个多语言会议环境中，演讲者可以用英语发言，Azure AI Speech 可以实时将发言转录并翻译成法语和西班牙语。更多细节将在 *练习 4：使用
    Azure AI Speech 翻译语音* 中探讨。
- en: Synthesize translations (speech-to-speech translation)
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成翻译（语音到语音翻译）
- en: In addition to translating speech into text, Azure AI Speech allows you to synthesize
    the translated text back into spoken audio for speech-to-speech translation. You
    can use event-based synthesis for 1:1 translation, where a single spoken language
    is translated into a single target language and played as audio. Alternatively,
    for multiple target languages, manual synthesis lets you create audio streams
    for each language from the translation result.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 除了将语音翻译成文本外，Azure AI Speech 允许您将翻译后的文本合成回语音，以进行语音到语音翻译。您可以使用基于事件的合成进行 1:1 翻译，其中单一口语语言被翻译成单一目标语言并播放为音频。对于多个目标语言，手动合成允许您从翻译结果中为每种语言创建音频流。
- en: For example, a customer service system can take a Spanish-speaking caller’s
    input, translate it into English text for the agent, and synthesize a voice response
    in Spanish, allowing the agent to interact fluently with the customer.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个客户服务系统可以接收讲西班牙语的客户的输入，将其翻译成英语文本供代理使用，并合成西班牙语的语音响应，使代理能够流畅地与客户互动。
- en: By integrating these translation capabilities, you can build applications that
    bridge language barriers across text and speech, making global communication smoother
    and more efficient.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 通过集成这些翻译功能，您可以构建跨越文本和语音的语言障碍解决方案，使全球通讯更加顺畅和高效。
- en: 'Exercise 3: Translating documents from a source language to a target language'
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 3：将文档从源语言翻译成目标语言
- en: As mentioned previously, all AI services can be accessed through the portal,
    an SDK, or a REST API. In this exercise, I’ll demonstrate access through the portal
    and SDK to help you become familiar with the UI. Although AI Foundry is a new
    tool and not covered by the AI-102 exam, you should be aware that it exists, and
    you’ll likely use it in real scenarios.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，所有 AI 服务都可以通过门户、SDK 或 REST API 访问。在这个练习中，我将演示通过门户和 SDK 的访问方式，以帮助您熟悉用户界面。尽管
    AI Foundry 是一个新工具，并且不在 AI-102 考试的范围内，但您应该知道它的存在，并且您可能会在实际场景中使用它。
- en: Translating text using the portal
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用门户翻译文本
- en: 'If you haven’t created an Azure AI Hub and project yet, refer to *Exercise
    1: Creating a hub, project, and AI service in the Azure portal* in [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140).
    Otherwise, proceed with the following steps to create the AI service resource
    under your existing project. For more details, visit [https://learn.microsoft.com/en-us/azure/ai-studio/ai-services/how-to/connect-ai-services](https://learn.microsoft.com/en-us/azure/ai-studio/ai-services/how-to/connect-ai-services):'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Go to the AI Studio home page at [ai.azure.com](http://ai.azure.com). In the
    left pane, select **AI Services**, then under **Language + Translation**, choose
    **Document Translation** from the **Translation** menu in the **Explore Language**
    **capabilities** section.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, upload the English text file and click the **Translate** button to translate
    the English document into the target language, Korean.
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Download the translated file and save it with any name—for example, `Ko-DocumentTranslationSample.txt`—for
    review, as shown in the following figure:'
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.6 – Translate text from one language to another in the portal](img/B31034_06_06.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
- en: Figure 6.6 – Translate text from one language to another in the portal
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: By following these steps, you can quickly translate documents into multiple
    languages using the Azure AI Studio portal, making it an efficient tool for handling
    multilingual content.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Translating text using the SDK
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This exercise will guide you in creating an application that translates text
    between languages using Azure AI Translator. It provides the same functionality
    as shown in *Figure 6**.6* but using the SDK approach.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Setting up your development environment'
  id: totrans-199
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First, set up your development environment and install the required SDK.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: Open the `03-translating-documents-sdk/Python/translate-text/` folder in VS
    Code.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Install the SDK by opening an integrated terminal in the `translate-text` folder
    and running the following:'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-203
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Enter your Azure AI Translator key and region, then save the file.
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 2: Importing the required libraries'
  id: totrans-205
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Next, import the necessary libraries to access the Azure AI Translator API.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Open `translate.py` in VS Code.
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'At the top, under `import namespaces`, review the following code:'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-209
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Step 3: Creating the client for the Translator API'
  id: totrans-210
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now, create the client object to connect your application to Azure AI Translator.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: 'Under `Create client using endpoint and key`, review the following code to
    connect your application to Azure AI Translator to set up a client connection:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This code initializes the connection to Azure AI Translator using your API key
    and endpoint.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Choosing a target language'
  id: totrans-215
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Prompt the user to select a target language for the translation.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: 'Under `Choose target language`, review the following code to fetch and select
    supported languages:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This code lists supported languages and prompts the user to enter a valid target
    language code.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Translating text'
  id: totrans-220
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now, implement the logic to translate text into the selected language.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: 'Under `Translate text`, review the following code for translating text:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This code prompts the user to input text, translates it into the selected target
    language, and displays the result until the user enters `"quit"`.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Testing the application'
  id: totrans-225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Run the application and test your text translation workflow.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: 'To run the application, in the terminal, execute the following:'
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-228
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Type a phrase (e.g., `This is a test`) to translate and view the output.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter `quit` to exit the program.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.7 – Output of translating English to Korean](img/B31034_06_07.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
- en: Figure 6.7 – Output of translating English to Korean
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: This completes your text translation application. You can rerun it with different
    language codes to test multiple translations.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 4: Translating speech using Azure AI Speech'
  id: totrans-234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you’ll use the Azure AI Speech service to develop a translation
    application capable of translating spoken language. For example, imagine you are
    traveling in a country where you don’t speak the local language. You can say phrases
    such as “Where is the station?” in your language and have the app translate it
    into the local language.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Configuring your application/review code to use the Speech SDK'
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, configure your application and set up the Speech SDK for translation.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the `04-translating-speech/Python/translator` folder and open the
    `Python` folder.
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Install the Azure AI Speech SDK package by running the following:'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-240
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Important note
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: For the Speech service, use the same key, but specify the region instead of
    the service endpoint.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: 'Step2: Reviewing code to use the Azure AI Speech SDK'
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, review the code that initializes translation and speech synthesis settings.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: 'Open the `translator.py` file and import the required namespaces to use the
    Azure AI Speech SDK:'
  id: totrans-245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-246
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'In the main function, use these variables to create a `SpeechTranslationConfig`
    object for your Azure AI Speech resource to translate spoken input. Review the
    following code under the `Configure` `translation` comment:'
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-248
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Use `SpeechTranslationConfig` to translate speech into text and `SpeechConfig`
    to synthesize translations into speech. Review the following code under the `Configure`
    `speech` comment:'
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-250
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Your application is now set up to recognize and translate speech into multiple
    languages.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Implementing speech translation using a microphone'
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, set up the application to recognize and translate speech from microphone
    input. In the `Translate` function of the `translator.py` file, under the `Translate
    speech` comment, review the code to create a `TranslationRecognizer` client. This
    client will recognize and translate speech using the default system microphone
    as input. Configure the speech translation to work seamlessly with microphone
    input:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Your application can now recognize spoken input and translate it into a selected
    language.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Running the program'
  id: totrans-256
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Run the program and test the real-time speech translation feature.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 运行程序并测试实时语音翻译功能。
- en: 'In the terminal, run the program using the following:'
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在终端中，使用以下命令运行程序：
- en: '[PRE30]'
  id: totrans-259
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The program will transcribe and translate your input into the selected language
    (French, Spanish, or Hindi). Repeat this process for each supported language,
    and press *Enter* to end the program.
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 程序将转录并将您的输入翻译成选定的语言（法语、西班牙语或印地语）。为每个支持的语言重复此过程，然后按*Enter*键结束程序。
- en: '`TranslationRecognizer` allows about five seconds for input. If no speech is
    detected, it returns a **No match** result. Note that Hindi translations may not
    display correctly in the console due to character encoding issues.'
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`TranslationRecognizer`允许大约五秒钟的输入时间。如果没有检测到语音，它将返回**无匹配**的结果。请注意，由于字符编码问题，印地语翻译可能在控制台中显示不正确。'
- en: '![Figure 6.8 – Speech output of the translation](img/B31034_06_08.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![图6.8 – 翻译的语音输出](img/B31034_06_08.jpg)'
- en: Figure 6.8 – Speech output of the translation
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8 – 翻译的语音输出
- en: Your application now translates spoken input into text in the selected language.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 您的应用程序现在可以将语音输入翻译成选定的语言。
- en: 'Step 5: Synthesizing the translation to speech'
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：将翻译合成语音
- en: 'Now, your application converts spoken input into text, which can be useful
    for seeking help while traveling. Enhancing this by having the translation spoken
    aloud in an appropriate voice would make it even more effective:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您的应用程序将语音输入转换为文本，这在旅行中寻求帮助时可能很有用。通过以适当的语音将翻译大声读出来来增强这一点将使其更加有效：
- en: 'In the `Translate` function, beneath the `Synthesize translation` comment,
    include the following code to utilize a `SpeechSynthesizer` client. This client
    will convert the translation into speech and play it through the default speaker:'
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`Translate`函数中，在`合成翻译`注释下方，包含以下代码以利用`SpeechSynthesizer`客户端。此客户端将翻译转换为语音并通过默认扬声器播放：
- en: '[PRE31]'
  id: totrans-268
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Run the program using the following:'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下命令运行程序：
- en: '[PRE32]'
  id: totrans-270
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE32]'
- en: '![Figure 6.9 – Output of language translation](img/B31034_06_09.jpg)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![图6.9 – 语言翻译的输出](img/B31034_06_09.jpg)'
- en: Figure 6.9 – Output of language translation
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9 – 语言翻译的输出
- en: This exercise demonstrated how to use Azure AI Speech services to translate
    spoken language and synthesize the translation as spoken translation, making it
    a practical solution for applications such as travel translators or customer support.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习演示了如何使用Azure AI语音服务将语音翻译成文本，并将翻译作为语音翻译合成，使其成为旅行翻译器或客户支持等应用程序的实用解决方案。
- en: Let’s explore the transformative power of NLP, where machines learn to understand
    and engage with human language, from TTS. A crucial part of NLP, **Natural Language
    Understanding** (**NLU**), allows systems to interpret the deeper meanings and
    intents within user interactions—unlocking capabilities for responsive, intelligent
    applications.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索自然语言处理（NLP）的变革力量，其中机器学习理解并参与人类语言，从文本到语音合成。NLP的一个关键部分是**自然语言理解**（**NLU**），它允许系统解释用户交互中的深层含义和意图——解锁响应性、智能应用程序的能力。
- en: Building a conversational language understanding model
  id: totrans-275
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建对话语言理解模型
- en: NLP enables machines to understand and interact with human language in both
    text and speech forms. One aspect of NLP is NLU, which focuses on interpreting
    the semantic meaning of natural language inputs, such as determining the intent
    behind a user’s question or command.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）使机器能够理解和以文本和语音形式与人类语言进行交互。NLP的一个方面是自然语言理解（NLU），它侧重于解释自然语言输入的语义意义，例如确定用户问题或命令背后的意图。
- en: 'In a common design pattern for conversational AI, the following takes place:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话式人工智能的常见设计模式中，以下情况发生：
- en: A user provides natural language input (spoken or written).
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户提供自然语言输入（语音或书面形式）。
- en: The system processes this input to determine the user’s intent.
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统处理此输入以确定用户的意图。
- en: Based on the intent, the system performs appropriate action (e.g., providing
    information or executing a task).
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据意图，系统执行适当的操作（例如，提供信息或执行任务）。
- en: 'Some key concepts for building a conversational model include the following:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 构建对话模型的一些关键概念包括以下内容：
- en: '**Intents** represent the purpose or goal behind a user’s input (e.g., asking
    for the weather)'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意图**代表用户输入背后的目的或目标（例如，询问天气）'
- en: '**Utterances** are examples of phrases users might say that map to an intent
    (e.g., “What’s the weather like today?”)'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**话语**是用户可能说的短语示例，这些短语对应于一个意图（例如，“今天天气怎么样？”）'
- en: '**Entities** provide context to the intent (e.g., “today” is a time entity
    in the weather request)'
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Azure AI Language** service includes features such as sentiment analysis,
    language detection, and key phrase extraction. Prebuilt entities (e.g., numbers
    or dates) allow developers to easily capture and classify common types of data
    without the need for extensive model training.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: Developers can create custom models to recognize specific intents and entities
    relevant to their applications. For example, a company could build a customer
    support bot where intents such as *check order status* and *return an item* are
    defined, and entities such as *order number* are extracted from user utterances.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example flow:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
- en: '**Input**: A user says, “What’s the weather in Seattle tomorrow?”'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`GetWeather` and extracts *Seattle* as a location entity and *tomorrow* as
    a time entity.'
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Action**: The system retrieves and provides the weather forecast for Seattle
    tomorrow.'
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Some advanced features of model enhancement include the following:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
- en: '**Use patterns to differentiate utterances**: In cases where utterances are
    similar but belong to different intents (e.g., “Turn on the light” versus “Is
    the light on?”), patterns help the model distinguish between these actions'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prebuilt entity components**: These components, such as date/time, names,
    and numbers, allow for quicker model setup, as the service automatically identifies
    common entities without requiring training data'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once you’ve defined your intents and entities, you do the following:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
- en: '**Train** the model using sample utterances.'
  id: totrans-295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Test** it with new data to ensure accuracy.'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Publish** it to an endpoint, making it accessible for use in applications
    such as chatbots.'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Review** performance continuously and retrain the model based on user interactions.'
  id: totrans-298
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By following this cycle, you can build a conversational AI model that effectively
    understands user queries and improves over time with real-world usage.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 5: Building a conversational language understanding model'
  id: totrans-300
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you’ll create an application using the Azure AI Language service
    to interpret natural language inputs, predict user intent, and identify relevant
    entities. This model can be used to enhance conversational applications, such
    as a clock application that interprets questions such as “What’s the time in London?”
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Provisioning an Azure AI Language resource'
  id: totrans-302
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To get started, you’ll need an Azure AI Language resource in your Azure subscription:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
- en: 'Sign in to the Azure portal, search for `Language Service`, and create a resource
    using your subscription details. Alternatively, you can go directly to the resource
    creation page using the following URL: [https://portal.azure.com/#create/Microsoft.CognitiveServicesTextAnalytics](https://portal.azure.com/#create/Microsoft.CognitiveServicesTextAnalytics).'
  id: totrans-304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Custom question answering** option. Set a region, provide a unique
    name, and select a pricing tier (**F0** for free or **S** for standard).
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once created, navigate to the **Keys and Endpoint** page in your resource to
    find the credentials you’ll use later.
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 2: Creating a conversational language understanding project'
  id: totrans-307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Using Language Studio, you’ll create a project to train a language model:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
- en: Open Language Studio at [https://language.cognitive.azure.com/](https://language.cognitive.azure.com/)
    and sign in.
  id: totrans-309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go to **Language Studio** | **+ Create new** | **Conversational** **language
    understanding**.
  id: totrans-310
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the project creation dialog, do the following:'
  id: totrans-311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Name your project (e.g., `Clock`).
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Set the primary language to **English**.
  id: totrans-313
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Add a description, click **Next**, and create the project.
  id: totrans-314
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 3: Defining intents with sample utterances for your model'
  id: totrans-315
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step in the project is to define intents, which the model will use
    to predict the user’s intent based on natural language input. Intents represent
    the actions or questions a user may have.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: 'To improve the model’s accuracy, each intent is labeled with sample utterances
    as examples of possible user requests:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
- en: In the `GetTime` (e.g., “What’s the time?”)
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`GetDay` (e.g., “What’s the day today?”)'
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`GetDate` (e.g., “What’s the date?”)'
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Data labeling**, add sample utterances (user questions or commands)
    for each intent to help the model learn. Press the *Enter* key after each utterance,
    using the examples provided in the following table:'
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Intents** | **Utterances** |'
  id: totrans-322
  prefs: []
  type: TYPE_TB
- en: '| `GetDate` | what date is it? / what’s the date? / what is the date today?
    / what’s today’s date? |'
  id: totrans-323
  prefs: []
  type: TYPE_TB
- en: '| `GetDay` | what day is it? / what’s the day? / what is the day today? / what
    day of the week is it? |'
  id: totrans-324
  prefs: []
  type: TYPE_TB
- en: '| `GetTime` | what is the time? / what’s the time? / what time is it? / tell
    me the time |'
  id: totrans-325
  prefs: []
  type: TYPE_TB
- en: Table 6.1 – Sample utterances for each intent
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
- en: After completing the creation of intents and utterances, be sure to click **Save
    changes** to save your work. The following figure will then display the results.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.10 – After intents and utterances creation](img/B31034_06_10.jpg)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
- en: Figure 6.10 – After intents and utterances creation
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 6**.10* shows additional utterances because, while this exercise initially
    includes four utterances per intent, more will be added later. This is why you
    see counts such as **7**, **6**, **7** utterances in the figure.'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Training and testing your model'
  id: totrans-332
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once you’ve defined the intents, it’s time to train and test your model:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Training jobs** section from the left-hand menu under your
    project. Then, click on **+ Start a training job** at the top of the page.
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Name the model (e.g., `Clock`) and use **Standard training mode**, leave the
    default settings unchanged, and then click **Train** to start the training job.
  id: totrans-335
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After training, view performance metrics such as precision and recall to assess
    your model’s accuracy.
  id: totrans-336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 5: Adding entities to extract specific information'
  id: totrans-337
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that you’ve trained your model to recognize intents, the next step is to
    add entities to capture specific information from user input. Entities help extract
    dates, locations, and other contextual details that refine the model’s understanding:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Entities** tab under **Schema definition**. To add a learned
    entity, click **+** **Add**.
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select `Location`. Then, add sample utterances, such as the following:'
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What time is it` `in London?`'
  id: totrans-341
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Tell me the time` `in Paris`'
  id: totrans-342
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`What''s the time in` `New York?`'
  id: totrans-343
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: While entering each utterance, highlight the city name (e.g., **New York**,
    **London**, or **Paris**) by selecting the text with your mouse. A dropdown will
    appear—choose **Location** as the entity, as shown in the screenshot.
  id: totrans-344
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 6.11 – Add a learned location entity](img/B31034_06_11.jpg)'
  id: totrans-345
  prefs: []
  type: TYPE_IMG
- en: Figure 6.11 – Add a learned location entity
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the `Weekday`, and click **Add entity**.
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Scroll down to the `Monday`, `Friday`, and so on., along with their synonyms
    (e.g., `Mon`, `Fri`) as shown in the following screenshot. Press *Tab* after each
    synonym to add additional entries.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.12 – Add a list of weekdays for the Weekday entity](img/B31034_06_12.jpg)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
- en: Figure 6.12 – Add a list of weekdays for the Weekday entity
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the `Date`, and click **Add entity**.
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To add a prebuilt entity, scroll to the **Prebuilt** section and click **+ Add
    new prebuilt**. From the drop-down list, select **DateTime** to enable recognition
    of date expressions such as **May 11th**, as shown in the following figure.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.13 – Add a prebuilt entity](img/B31034_06_13.jpg)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
- en: Figure 6.13 – Add a prebuilt entity
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
- en: After adding three entities (**Date**, **Location**, and **Weekday**), the final
    screen will appear as shown in the following figure.
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.14 – Entities creation with sample utterances](img/B31034_06_14.jpg)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
- en: Figure 6.14 – Entities creation with sample utterances
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
- en: By adding entities, your model can now extract relevant details from user input,
    enabling more precise responses in conversational applications.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Retraining and deploying your model'
  id: totrans-359
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After defining intents and entities, do the following:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
- en: To retrain your model, navigate to **Training jobs** and click **+ Start a training
    job**. In the **Start a training job** window, select **Overwrite existing model**
    to update the current model with new training data.
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To deploy the model, go to the **Deploying a model** section and click **+ Add
    deployment**. In the pop-up window, either enter a unique deployment name (e.g.,
    **production**) or select **Overwrite an existing deployment name**. Then, choose
    the trained model you want to deploy and select the desired deployment region.
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 7: Testing your deployed model'
  id: totrans-363
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can test your model in Language Studio’s **Testing** **deployments** section:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
- en: In **Testing deployments**, select **production** and enter sample utterances.
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, test with **What’s the time in Edinburgh?** or **What day is it
    on Friday?** to see the model predict intents and entities accurately, as shown
    in the following figure.
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.15 – The result of testing ](img/B31034_06_15.jpg)'
  id: totrans-367
  prefs: []
  type: TYPE_IMG
- en: Figure 6.15 – The result of testing
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 8: Integrating the model into a Python application'
  id: totrans-369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Using VS Code, you’ll now integrate the deployed model with your application.
    Browse to the `05-language\Python\clock-client` folder and carry out the following
    steps:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
- en: 'In the terminal of your app folder, run the following to install the SDK:'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-372
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Review `clock-client.py` and locate the following comments to review the code
    already prepared for this exercise:'
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`#` `Important namespaces`'
  id: totrans-374
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`# Create a client for the Language` `service model`'
  id: totrans-375
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`# Call the Language service model to get intent` `and entities`'
  id: totrans-376
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`# Apply the` `appropriate action`'
  id: totrans-377
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Run the application using the following:'
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-379
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE34]'
- en: '`What time` `is it?`'
  id: totrans-380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What''s the time` `in London?`'
  id: totrans-381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What''s` `the date?`'
  id: totrans-382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What date` `is Sunday?`'
  id: totrans-383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What day` `is it?`'
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`What day` `is 01/01/2025?`'
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By integrating your conversational model into a Python application, you now
    have a fully functional system capable of understanding user queries and responding
    intelligently.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.16 – First example: Hello](img/B31034_06_16.jpg)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.16 – First example: Hello'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
- en: This exercise provides a foundational approach to building conversational applications,
    allowing for the continuous refinement of intents and entities. The Python app
    demonstrates the process from connecting to an Azure AI Language service endpoint
    to interpreting user input and responding with appropriate actions based on the
    predicted intent and entities.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore building custom question-answering systems with Azure AI Language.
    The next section guides you in creating a knowledge base to handle frequent queries
    with conversational accuracy, which is perfect for enhancing chatbots and FAQ
    applications.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
- en: Creating a custom question-answering solution by using Azure AI Language
  id: totrans-391
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, you will learn how to create a custom question-answering solution
    using Azure AI Language. This solution allows you to set up a knowledge base that
    supports natural language questions and provides relevant answers, enhancing FAQ-style
    applications with conversational intelligence. This type of solution is particularly
    useful for applications or chatbots that need to handle frequent queries with
    precise, predefined responses.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the key steps in creating a custom question-answering solution:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
- en: '**Create a knowledge base**: Start by defining a knowledge base of question-answer
    pairs. This can be done using various sources, such as existing FAQs, structured
    text files, or built-in chitchat datasets. Each question-answer pair acts as a
    data point that the service can reference when users ask related questions.'
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Compare question-answering to language understanding**: While both question-answering
    and language understanding use natural language, they serve different purposes.
    Question-answering responds with a static answer from the knowledge base, whereas
    language understanding interprets user intent and entities for applications that
    need to take actions beyond displaying an answer. Combining both can create more
    dynamic conversational solutions.'
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**比较问答与语言理解**：虽然问答和语言理解都使用自然语言，但它们服务于不同的目的。问答从知识库中返回静态答案，而语言理解则解释用户意图和实体，为需要执行除显示答案之外操作的应用程序提供支持。结合两者可以创建更动态的对话解决方案。'
- en: '**Multi-turn conversation**: Sometimes, a single question doesn’t provide enough
    context for a complete answer. Multi-turn conversations allow the application
    to ask follow-up questions based on the user’s initial query. This feature enables
    the solution to clarify details before responding fully, enhancing the user experience
    with more personalized answers.'
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**多轮对话**：有时，单个问题不足以提供完整答案的上下文。多轮对话允许应用程序根据用户的初始查询提出后续问题。此功能使解决方案能够在完全回答之前澄清细节，通过更个性化的答案增强用户体验。'
- en: '**Test and publish the knowledge base**: Once you’ve created and populated
    the knowledge base, you can test it directly in Language Studio by asking questions
    and reviewing the returned answers. After confirming accuracy, deploy the knowledge
    base to a REST endpoint so applications or bots can use it for live question-answering.'
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试和发布知识库**：一旦您创建并填充了知识库，您可以直接在语言工作室中通过提问和审查返回的答案来测试它。确认准确性后，将知识库部署到REST端点，以便应用程序或机器人可以使用它进行实时问答。'
- en: '`reservation` and `booking`) ensures that users receive accurate responses
    even when using varied terminology.'
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`reservation` 和 `booking`) 确保用户即使在使用不同的术语时也能收到准确的响应。'
- en: By completing *Exercise 6*, you’ll be equipped to create and enhance intelligent,
    question-answering applications, using Azure AI Language to support robust, interactive
    experiences for end users.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 通过完成*练习6*，您将能够创建和增强智能问答应用程序，使用 Azure AI 语言支持为最终用户提供强大、交互式的体验。
- en: 'Exercise 6: Creating question-answering solution'
  id: totrans-400
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习6：创建问答解决方案
- en: This exercise guides you in building a question-answering solution using Azure
    AI Language. By setting up a knowledge base of frequently asked questions, this
    solution can later be integrated into a chatbot, enabling efficient and user-friendly
    information retrieval.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习指导您使用 Azure AI 语言构建一个问答解决方案。通过设置常见问题知识库，此解决方案可以后来集成到聊天机器人中，实现高效且用户友好的信息检索。
- en: 'Step 1: Using the existing Azure AI Language resource'
  id: totrans-402
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：使用现有的 Azure AI 语言资源
- en: 'For this exercise, we will use the Language service resource created in *Exercise
    5: Building a conversational language understanding model*. Utilize the same endpoint
    and keys from that resource to access the question-answering API.'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个练习，我们将使用在*练习5：构建对话语言理解模型*中创建的语言服务资源。利用该资源相同的端点和密钥来访问问答API。
- en: 'Step 2: Creating a question-answering project in Language Studio'
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：在语言工作室中创建问答项目
- en: 'To create and manage your knowledge base, we’ll use Language Studio:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建和管理您的知识库，我们将使用语言工作室：
- en: In Language Studio at [https://language.cognitive.azure.com/](https://language.cognitive.azure.com/),
    select your language resource, then under the **+ Create New** drop-down menu,
    choose **Custom Question Answering** to start a new project.
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在[https://language.cognitive.azure.com/](https://language.cognitive.azure.com/)上的语言工作室中，选择您的语言资源，然后在**+
    创建新**下拉菜单下，选择**自定义问答**以开始一个新项目。
- en: On the `QandASolution`
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`QandASolution`
- en: '`Creating` `QandA solution`'
  id: totrans-408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`创建` `问答解决方案`'
- en: '`Sorry, I don''t understand` `the question.`'
  id: totrans-409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`对不起，我不明白` `这个问题。`'
- en: Click **Next** to proceed.
  id: totrans-410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**下一步**继续。
- en: On the **Review and finish** page, click **Create project**.
  id: totrans-411
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**审查和完成**页面，点击**创建项目**。
- en: Important note
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Custom question-answering leverages Azure AI Search to index and query the knowledge
    base of questions and answers, so you’ll need to create an Azure AI Search service
    as part of the setup. For more details, refer to *Exploring Azure AI Search* in
    [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140).
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义问答利用 Azure AI 搜索对问题和答案的知识库进行索引和查询，因此您需要作为设置的一部分创建 Azure AI 搜索服务。有关更多详细信息，请参阅[*第7章*](B31034_07.xhtml#_idTextAnchor140)中的*探索
    Azure AI 搜索*。
- en: 'Step 3: Adding sources to the knowledge base'
  id: totrans-414
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：向知识库添加来源
- en: 'Populate your knowledge base by adding existing FAQs or documents. You can
    add multiple data sources, including web URLs, files, and predefined conversational
    **Chitchat** pairs, as shown in the following figure:'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.17 — Difference options for knowledge sources](img/B31034_06_17.jpg)'
  id: totrans-416
  prefs: []
  type: TYPE_IMG
- en: Figure 6.17 — Difference options for knowledge sources
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
- en: In `https://docs.microsoft.com/en-us/learn/support/faq`.
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add a **Chitchat** dataset in a friendly style to support conversational questions.
  id: totrans-419
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 4: Editing and expanding the knowledge base'
  id: totrans-420
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After populating the knowledge base with initial data, add custom questions
    or refine answers:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
- en: 'Manually add additional question-answering pairs to cover unique scenarios,
    as shown in the following figure:'
  id: totrans-422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Source**: [**https://docs.microsoft.com/en-us/learn/support/faq**](https://docs.microsoft.com/en-us/learn/support/faq)'
  id: totrans-423
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Question**: **What are** **Microsoft credentials?**'
  id: totrans-424
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Answer**: **Microsoft credentials enable you to validate and prove your skills
    with** **Microsoft technologies.**'
  id: totrans-425
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.18 – Adding a new question-answer pair](img/B31034_06_18.jpg)'
  id: totrans-426
  prefs: []
  type: TYPE_IMG
- en: Figure 6.18 – Adding a new question-answer pair
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
- en: In the field for the **What are Microsoft credentials?** question, expand **Alternate
    questions** and add an alternate phrasing, such as **How can I demonstrate my
    Microsoft** **technology skills?**.
  id: totrans-428
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In some scenarios, it’s beneficial to allow users to follow up on an answer
    through a multi-turn conversation, helping them refine their question to get more
    detailed information.
  id: totrans-429
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Under the answer you provided for the certification question, expand `.`
  id: totrans-430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enable **Show in contextual flow only** to ensure this answer appears only when
    the user follows up on the original certification question.
  id: totrans-431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Add prompt** to finalize the follow-up interaction.
  id: totrans-432
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 5: Training and testing the knowledge base'
  id: totrans-433
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To ensure accuracy, train the knowledge base and test it with various questions
    to verify the responses:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
- en: Save the knowledge base and start training to make the model understand different
    question variations.
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use the test pane to try sample questions and verify that the responses match
    the expectations, as shown:'
  id: totrans-436
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.19 – Testing the knowledge base](img/B31034_06_19.jpg)'
  id: totrans-437
  prefs: []
  type: TYPE_IMG
- en: Figure 6.19 – Testing the knowledge base
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: By training and testing the knowledge base, you ensure that it delivers precise
    and contextually relevant answers to user queries.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Deploying the knowledge base'
  id: totrans-440
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once the knowledge base meets accuracy standards, deploy it to make it accessible
    to applications:'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: Deploy your knowledge base, as shown in *Figure 6**.20*, which makes it available
    via the REST API.
  id: totrans-442
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Copy the API endpoint, including parameters such as `projectName` and `deploymentName`.
  id: totrans-443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.20 – Deploy knowledge base](img/B31034_06_20.jpg)'
  id: totrans-444
  prefs: []
  type: TYPE_IMG
- en: Figure 6.20 – Deploy knowledge base
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
- en: With the knowledge base deployed, it is now accessible for integration into
    applications, chatbots, and virtual assistants.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 7: Developing a question-answering app in VS Code'
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 7 步：在 VS Code 中开发问答应用程序
- en: 'With the knowledge base deployed, configure a simple client app in VS Code
    to interact with the question-answering model:'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 部署知识库后，在 VS Code 中配置一个简单的客户端应用程序以与问答模型交互：
- en: 'Configure the application using the following steps:'
  id: totrans-449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下步骤配置应用程序：
- en: In `06-qna\Python\qna-app\qna-app.py`, locate the placeholders for adding namespaces,
    authentication, and API requests.
  id: totrans-450
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `06-qna\Python\qna-app\qna-app.py` 中，找到添加命名空间、身份验证和 API 请求的占位符。
- en: Update the configuration values with the endpoint and key from the Azure AI
    Language resource you created (found on the **Keys and Endpoint** page of your
    Azure AI Language resource in the Azure portal). Also, add the project name and
    deployment name for your deployed knowledge base to this file.
  id: totrans-451
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用您在 Azure AI 语言资源中创建的端点和密钥（可在 Azure 门户中您的 Azure AI 语言资源的“密钥和端点”页面找到）更新配置值。同时，将部署的知识库的项目名称和部署名称添加到此文件中。
- en: 'Install the necessary SDK with the following:'
  id: totrans-452
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下命令安装必要的 SDK：
- en: '[PRE35]'
  id: totrans-453
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: '`# Create client using endpoint and key`: Use the endpoint and key to set up
    an authenticated API client'
  id: totrans-454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`# 使用端点和密钥创建客户端`：使用端点和密钥设置经过身份验证的 API 客户端'
- en: '`# Submit a question and display the answer`: Send user questions to the API
    and retrieve responses from your knowledge base'
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`# 提交问题并显示答案`：将用户问题发送到 API 并从您的知识库检索响应'
- en: 'Step 8: Running and testing the application'
  id: totrans-456
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 8 步：运行和测试应用程序
- en: 'Finally, test your application by running it in the terminal and asking questions:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过在终端中运行应用程序并提问来测试您的应用程序：
- en: 'Run the application using the following:'
  id: totrans-458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下命令运行应用程序：
- en: '[PRE36]'
  id: totrans-459
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: '`tell me about` `Microsoft credentials`'
  id: totrans-460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`告诉我关于` `Microsoft 凭据`'
- en: Review each response and continue testing different questions. When finished,
    type `quit` to end the program.
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查每个响应并继续测试不同的问题。完成后，键入 `quit` 以结束程序。
- en: '![Figure 6.21 – Outcome of running the program](img/B31034_06_21.jpg)'
  id: totrans-462
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.21 – 运行程序的结果](img/B31034_06_21.jpg)'
- en: Figure 6.21 – Outcome of running the program
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.21 – 运行程序的结果
- en: This exercise provides a robust foundation for a knowledge-based question-answering
    system that is interactive and capable of handling FAQs in a conversational format.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习为构建一个交互式且能够以对话格式处理常见问题的基于知识库的问答系统提供了坚实的基础。
- en: Let’s dive into custom text classification, a powerful NLP tool in Azure AI
    Language that automatically organizes text into relevant categories, making it
    ideal for handling extensive documents, support tickets, and other unstructured
    data.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解自定义文本分类，这是 Azure AI 语言中的一个强大的 NLP 工具，它能够自动将文本组织到相关类别中，非常适合处理大量文档、支持票据和其他非结构化数据。
- en: Developing NLP solutions
  id: totrans-466
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开发 NLP 解决方案
- en: NLP enables software to interpret and process human text and speech, with text
    classification being a crucial aspect. Text classification organizes text into
    predefined categories, such as sentiment, language, or custom labels, facilitating
    intelligent decision-making in applications.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: NLP 使软件能够解释和处理人类文本和语音，其中文本分类是一个关键方面。文本分类将文本组织到预定义的类别中，如情感、语言或自定义标签，有助于在应用程序中实现智能决策。
- en: 'The Azure AI Language service provides powerful tools for custom text classification,
    offering two project types: **single-label classification**, where each input
    is assigned to one category, and **multi-label classification**, allowing multiple
    categories per input. These capabilities enable developers to build intelligent
    applications for diverse use cases, such as categorizing customer feedback or
    sorting technical documents by topics.'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 语言服务为自定义文本分类提供了强大的工具，提供两种项目类型：**单标签分类**，其中每个输入被分配到一个类别，以及**多标签分类**，允许每个输入有多个类别。这些功能使开发者能够为各种用例构建智能应用程序，例如对客户反馈进行分类或按主题对技术文档进行排序。
- en: 'The following are the key steps in building a text classification model:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 构建文本分类模型的关键步骤如下：
- en: '**Define classification labels**: Labels (or classes) are categories that text
    data will be sorted into. For example, in a video game classification project,
    labels could include genres such as **Action**, **Adventure**, and **Strategy**.
    A clear label structure is essential to help the model distinguish between classes
    effectively.'
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义分类标签**：标签（或类别）是将文本数据分类到的类别。例如，在一个视频游戏分类项目中，标签可能包括**动作**、**冒险**和**策略**等类型。清晰的标签结构对于帮助模型有效地区分类别至关重要。'
- en: '**Tag data for training**: In this step, you’ll label (or tag) the documents,
    associating them with one or more classes. Labeling ensures that the model learns
    to recognize patterns that correlate with each class. Properly tagged data improves
    model accuracy and performance, especially for multiple-label projects where a
    document can belong to more than one category.'
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Train the model**: With labeled data, you train the model, teaching it to
    recognize which types of text belong to which labels. Azure allows automatic or
    manual data splitting for training and testing. Training models with a balanced
    dataset helps the model generalize well.'
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Evaluate the model’s performance**: After training, the model’s performance
    is evaluated using metrics such as precision, recall, and F1 score:'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Precision**: Measures how many of the model’s positive predictions were correct'
  id: totrans-474
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recall**: Assesses how many actual positives the model correctly identified'
  id: totrans-475
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**F1 score**: Combines precision and recall giving an overall performance score'
  id: totrans-476
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improve the model**: Use feedback from evaluation to refine the model. For
    example, if the **Adventure** and **Strategy** categories are frequently confused,
    add more examples of each to help the model learn the distinctions.'
  id: totrans-477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Deploy the model**: Deploying the model makes it available via Azure’s REST
    API. Deployed models can handle classification requests from applications, supporting
    scalable, automated classification in real time.'
  id: totrans-478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Azure AI Language service combines an intuitive GUI through **Language Studio**
    with the flexibility of REST APIs, empowering developers to create and refine
    custom NLP models. By leveraging this service, you can build robust and interactive
    applications tailored to your specific text classification needs, enhancing user
    experiences and driving actionable insights.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 7: Creating custom text classification'
  id: totrans-480
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, we’ll create and test a custom text classification solution
    using the Azure AI Language service. This involves configuring a classification
    model, labeling data, training the model, and deploying it to classify text based
    on custom categories such as **News** or **Sports**. Here’s a step-by-step explanation,
    including why each step is necessary.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Using the existing Azure AI Language resource'
  id: totrans-482
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For this exercise, we’ll use the Language service resource created in *Exercise
    5*. This allows us to utilize the same endpoint and keys from that resource to
    access a custom text classification API without needing to create a new resource.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Uploading sample articles'
  id: totrans-484
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To train our model effectively, we need sample text data:'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
- en: Locate the sample articles (`articles.zip`) under the `/07-text-claasification/data`
    folder and extract them to the same data folder.
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In your Azure Storage account, create a container named `articles` and set **Anonymous
    Access Level** to **Container**. To do this, navigate to **Configuration** under
    the **Settings** section in your Storage account.
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Upload the sample articles (13 files) to this `articles` container.
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The model requires sample data to learn how to categorize text. By uploading
    articles to Azure Storage, we ensure they’re accessible for labeling and training.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Creating a custom text classification project in Language Studio'
  id: totrans-490
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once your storage and data are ready, set up a new text classification project
    in Language Studio:'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
- en: Go to Language Studio at [https://language.cognitive.azure.com/](https://language.cognitive.azure.com/)
    and create a new **Custom Text** **Classification** project.
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Single label classification** to assign one category to each document.
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Name your project (`ClassifyLab`), set the primary language as `Custom` `text
    lab`.
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Connect your articles container and choose the option to label files as part
    of this project.
  id: totrans-495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Setting up a custom classification project in Language Studio provides a structured
    workspace to build, train, and evaluate our classification model, as shown in
    *Figure 6**.22*.
  id: totrans-496
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 6.22 – Creating a project](img/B31034_06_22.jpg)'
  id: totrans-497
  prefs: []
  type: TYPE_IMG
- en: Figure 6.22 – Creating a project
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
- en: Your project is now set up to train a custom text classification model using
    labeled data.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
- en: '*Check* *Cross-Origin Resource Sharing* *(CORS) settings on your* *storage
    account*'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
- en: 'Ensure your CORS settings are correctly configured. This is a common source
    of issues when integrating with services such as Azure AI Studio or deploying
    models. Refer to the official documentation for detailed steps: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/custom-text-classification/how-to/create-project?tabs=language-studio%2Cstudio%2Cmulti-classification#enable-cors-for-your-storage-account](https://learn.microsoft.com/en-us/azure/ai-services/language-service/custom-text-classification/how-to/create-project?tabs=language-studio%2Cstudio%2Cmulti-classification#enable-cors-for-your-storage-account).'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
- en: '*Encountering access or* *setup errors?*'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
- en: 'If you experience general errors or issues while setting up your custom text
    classification project or deploying content filters, the official guide provides
    comprehensive instructions: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/custom-text-classification/how-to/create-project?tabs=language-studio%2Cstudio%2Cmulti-classification#create-a-custom-text-classification-project](https://learn.microsoft.com/en-us/azure/ai-services/language-service/custom-text-classification/how-to/create-project?tabs=language-studio%2Cstudio%2Cmulti-classification#create-a-custom-text-classification-project).'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Labeling your data'
  id: totrans-505
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Labeling each article in the dataset helps the model learn how to categorize
    content:'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
- en: In Language Studio, go to **Data Labeling**.
  id: totrans-507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create classes such as `Sports`, `News`, `Entertainment`, and `Classifieds`.
  id: totrans-508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select each article (13 articles in total), assign it to a class, and designate
    it as part of either the **Training** (articles 1-10) or **Testing** (articles
    11-13) dataset, as shown in the following figure.
  id: totrans-509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.23 – Data labeling](img/B31034_06_23.jpg)'
  id: totrans-510
  prefs: []
  type: TYPE_IMG
- en: Figure 6.23 – Data labeling
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
- en: Properly labeled data is key for model accuracy. Training data helps the model
    learn, while testing data evaluates its performance.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Training your model'
  id: totrans-513
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, use the labeled data to train your model:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
- en: In Language Studio, go to **Training jobs** and start a training job.
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Name the model (e.g., `ClassifyArticles`) and select **Use a manual split of
    training and** **testing data**.
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Train** and wait for training to complete.
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Training the model with your labeled data enables it to learn patterns that
    distinguish each category, preparing it to classify new data.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Evaluating your model'
  id: totrans-519
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After training, evaluate the model to assess its accuracy and identify improvement
    areas:'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
- en: Go to **Model performance** and view your model’s precision, recall, and F1
    score.
  id: totrans-521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under the **Test Set Details** tab, use the **Show mismatches only** toggle
    to display only the documents with mismatches.
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Model evaluation helps verify its accuracy, showing where additional data or
    adjustments may be necessary for optimal performance.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 7: Deploying your model'
  id: totrans-524
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once you’re satisfied with the model’s performance, deploy it for real-time
    or batch classification:'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
- en: In Language Studio, go to `articles`.
  id: totrans-526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Deploy** to make the model available via an API.
  id: totrans-527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Deployment makes the model accessible for integration, allowing it to classify
    text in applications or automate tasks.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 8: Testing the model with a Python application'
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To test the model’s classification, create a simple Python app to interface
    with Azure’s Language API:'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
- en: Open the `07-text-classification\Python\classify-text` folder in VS Code and
    configure the app.
  id: totrans-531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Install the necessary libraries:'
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE37]'
  id: totrans-533
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Locate the following comments to review the code already prepared for this
    exercise:'
  id: totrans-534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`# Import namespaces`: Includes necessary libraries for connecting to the Azure
    AI Language service'
  id: totrans-535
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`# Create client using endpoint and key`: Uses the endpoint and key to set
    up an authenticated API client'
  id: totrans-536
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`# Get Classifications`: Fetches the classification results from the API based
    on the model’s predictions'
  id: totrans-537
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Run the app in the terminal:'
  id: totrans-538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE38]'
  id: totrans-539
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Testing the deployed model with a Python app allows us to interact with it programmatically,
    simulating real-world use cases. The application validates the model’s ability
    to accurately classify text, as demonstrated in the following output.
  id: totrans-540
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 6.24 – Output after running the app](img/B31034_06_24.jpg)'
  id: totrans-541
  prefs: []
  type: TYPE_IMG
- en: Figure 6.24 – Output after running the app
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
- en: By following these steps, you’ll have a fully functional text classification
    model using Azure AI Language, ready to categorize text automatically.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-544
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the powerful capabilities of Azure AI Language
    and Azure AI Speech for NLP tasks, providing a foundation for analyzing, understanding,
    and interacting with text and speech data. Starting with text analytics, Azure
    AI Language offers tools to detect language, extract key phrases, analyze sentiment,
    recognize named entities, and link entities to external sources. These features
    enable you to create intelligent applications that interpret and categorize content,
    adding value to processes such as customer feedback analysis or automated content
    summarization. Furthermore, detecting PII helps safeguard sensitive data, which
    is essential for compliance with regulations such as GDPR.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了Azure AI语言和Azure AI语音在NLP任务中的强大功能，为分析、理解和交互文本和语音数据提供了基础。从文本分析开始，Azure
    AI语言提供工具来检测语言、提取关键短语、分析情感、识别命名实体并将实体链接到外部来源。这些功能使您能够创建智能应用程序，解释和分类内容，为如客户反馈分析或自动内容摘要等流程增加价值。此外，检测PII有助于保护敏感数据，这对于遵守GDPR等法规至关重要。
- en: The chapter also introduces custom text classification, where documents are
    automatically tagged based on predefined categories. Azure AI Language supports
    both single-label (one category per document) and multi-label classification (multiple
    categories per document), which can be applied to scenarios such as sorting support
    tickets or tagging content for websites. Azure’s tools include model evaluation
    metrics such as precision and recall, which allow you to gauge the effectiveness
    of your model and continuously improve it.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还介绍了自定义文本分类，其中文档会根据预定义的类别自动标记。Azure AI语言支持单标签分类（每个文档一个类别）和多标签分类（每个文档多个类别），可用于排序支持票证或为网站标记内容等场景。Azure的工具包括模型评估指标，如精确率和召回率，这允许您评估模型的有效性并持续改进它。
- en: In addition to text analysis, Azure AI Speech offers advanced capabilities for
    converting between text and speech, supporting real-time transcription and translation
    in multiple languages. The Azure AI Speech SDK allows developers to integrate
    speech-to-text, TTS, and language translation into their applications. Features
    such as custom voice models and configurable audio formats enable tailored user
    experiences, whether for interactive customer service or multilingual support.
    Each exercise in this chapter provided practical experience with these tools,
    equipping you with the skills to develop applications that leverage NLP and speech
    recognition for enhanced user interaction.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 除了文本分析之外，Azure AI语音还提供了在文本和语音之间进行转换的高级功能，支持多种语言的实时转录和翻译。Azure AI语音SDK允许开发者在应用程序中集成语音转文本、TTS和语言翻译。如自定义语音模型和可配置音频格式等特性，可以提供定制化的用户体验，无论是用于交互式客户服务还是多语言支持。本章中的每个练习都提供了使用这些工具的实际经验，使你具备开发利用NLP和语音识别增强用户交互的应用程序技能。
- en: In the next chapter, we will explore knowledge and document intelligence services,
    which allow businesses to extract, process, and manage structured and unstructured
    information from documents, enhancing workflows and automation. These services
    play a crucial role in document understanding, contract analysis, and enterprise
    knowledge management, further expanding the AI-powered capabilities for intelligent
    automation.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨知识和文档智能服务，这些服务允许企业从文档中提取、处理和管理结构化和非结构化信息，从而提高工作流程和自动化水平。这些服务在文档理解、合同分析和企业知识管理中发挥着关键作用，进一步扩展了人工智能驱动的智能自动化能力。
- en: Review questions
  id: totrans-549
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 复习问题
- en: 'Answer the following questions to test your knowledge of this chapter:'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
