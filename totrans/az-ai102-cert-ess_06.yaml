  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在构建自定义文本分类模型时，哪个术语指的是分配给每个文档的类别？
- en: Utterances
  id: totrans-558
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 话语
- en: Labels
  id: totrans-559
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标签
- en: Intents
  id: totrans-560
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 意图
- en: Entities
  id: totrans-561
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实体
- en: '**Correct** **answer**: B'
  id: totrans-562
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B'
- en: Which type of text classification project allows a document to be assigned to
    more than one category?
  id: totrans-563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪种文本分类项目允许文档被分配到多个类别？
- en: Single-label classification
  id: totrans-564
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单标签分类
- en: Multi-label classification
  id: totrans-565
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 多标签分类
- en: Key phrase extraction
  id: totrans-566
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关键短语提取
- en: Named entity recognition
  id: totrans-567
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  id: totrans-568
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which Azure AI Language service capability detects and flags sensitive information,
    such as email addresses or social security numbers, within a document?
  id: totrans-569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Key phrase extraction
  id: totrans-570
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Sentiment analysis
  id: totrans-571
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Personally identifiable information** (**PII**) detection'
  id: totrans-572
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Entity linking
  id: totrans-573
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: C'
  id: totrans-574
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which Azure AI Speech capability enables real-time translation of spoken input
