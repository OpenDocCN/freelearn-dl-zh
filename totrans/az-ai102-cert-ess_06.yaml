- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Implementing Natural Language Processing Solutions
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施自然语言处理解决方案
- en: In this chapter, we’ll explore advanced text and speech analysis capabilities
    in the Azure AI Language and Azure AI Speech services. This chapter introduces
    you to various **Natural Language Processing** (**NLP**) techniques for analyzing
    text, including language detection, key phrase extraction, sentiment analysis,
    entity recognition, and identifying **Personally Identifiable Information** (**PII**).
    By leveraging these features, you’ll learn how to build applications that process
    and interpret text data to drive decisions. We’ll also dive into Azure AI Speech
    services, covering **Text-To-Speech** (**TTS**), speech-to-text, and custom speech
    solutions, such as keyword and intent recognition, providing you with the tools
    to build interactive and intelligent voice-enabled experiences.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 Azure AI 语言和 Azure AI 语音服务中的高级文本和语音分析功能。本章向您介绍了分析文本的各种 **自然语言处理（NLP**）技术，包括语言检测、关键词提取、情感分析、实体识别和识别
    **个人身份信息（PII**）。通过利用这些功能，您将学习如何构建处理和解释文本数据以驱动决策的应用程序。我们还将深入了解 Azure AI 语音服务，涵盖
    **文本到语音（TTS**）、语音到文本和自定义语音解决方案，如关键词和意图识别，为您提供构建交互式和智能语音体验的工具。
- en: Additionally, this chapter covers Azure AI Translator for text and speech translation,
    allowing applications to support multiple languages.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，本章还涵盖了 Azure AI 翻译器，用于文本和语音翻译，使应用程序能够支持多种语言。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将能够做到以下事项：
- en: Analyze and process text with Azure AI Language, including language detection,
    key phrase extraction, sentiment analysis, **Named Entity Recognition** (**NER**),
    and PII detection
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure AI 语言分析并处理文本，包括语言检测、关键词提取、情感分析、**命名实体识别（NER**）和 PII 检测
- en: Implement custom speech solutions using Azure AI Speech, including real-time
    and batch transcription, TTS, intent recognition, keyword spotting, and speaker
    identification
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure AI 语音实现自定义语音解决方案，包括实时和批量转录、文本到语音（TTS）、意图识别、关键词检测和说话人识别
- en: Configure and optimize audio formats, voices, and **Speech Synthesis Markup
    Language** (**SSML**) for tailored TTS experiences
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置和优化音频格式、语音和 **语音合成标记语言（SSML**）以实现定制的 TTS 体验
- en: Translate text and speech across multiple languages using Azure AI Translator,
    with options for language detection, transliteration, and simultaneous translation
    to multiple languages
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure AI 翻译器在多种语言之间翻译文本和语音，提供语言检测、转写和同时翻译到多种语言的功能
- en: Build applications that combine Azure AI Language and Azure AI Speech features
    to create conversational interfaces, integrate with virtual agents, and support
    multilingual, interactive experiences
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建结合 Azure AI 语言和 Azure AI 语音功能的应用程序，以创建对话界面、集成虚拟代理并支持多语言、交互式体验
- en: Let’s dive in!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: Analyzing text by using Azure AI Language
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Azure AI 语言分析文本
- en: 'Azure AI Language provides a comprehensive suite of tools to extract valuable
    insights from text, making it easier to process large amounts of data for various
    applications. In this section, we’ll explore key text analysis features, such
    as language detection, key phrase extraction, sentiment analysis, NER, PII detection,
    and entity linking. By leveraging these capabilities, you can enhance applications
    ranging from customer feedback analysis to compliance automation. Each capability
    within Azure AI Language enables the structured analysis of textual content, facilitating
    better decision-making:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 语言提供了一套全面的工具，用于从文本中提取有价值的见解，这使得处理大量数据以适应各种应用变得更加容易。在本节中，我们将探讨关键文本分析功能，例如语言检测、关键词提取、情感分析、命名实体识别（NER）、个人身份信息（PII）检测和实体链接。通过利用这些功能，您可以增强从客户反馈分析到合规自动化等应用。Azure
    AI 语言中的每个功能都使文本内容的结构化分析成为可能，从而促进更好的决策：
- en: '**Language detection**: Language detection identifies the language of a given
    text and provides a confidence score indicating the likelihood of correctness.
    This capability is crucial for businesses that interact with multilingual audiences,
    such as customer support centers, content moderation platforms, and global e-commerce
    websites. By automatically determining the language of incoming text, organizations
    can route queries to the appropriate language support team or configure chatbots
    to respond in the correct language. For example, if a support ticket contains
    text in Spanish, the system can classify it accordingly and ensure that a Spanish-speaking
    agent handles the request.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言检测**：语言检测识别给定文本的语言并提供一个置信度分数，表示正确性的可能性。这种能力对于与多语言受众互动的企业至关重要，例如客户服务中心、内容审查平台和全球电子商务网站。通过自动确定传入文本的语言，组织可以将查询路由到相应的语言支持团队或配置聊天机器人以正确响应。例如，如果一份支持工单包含西班牙语文本，系统可以相应地进行分类，并确保西班牙语客服人员处理该请求。'
- en: '**Key phrase extraction**: Key phrase extraction helps identify the most important
    terms and concepts within a given text, allowing organizations to summarize content
    efficiently and improve search functionality. This feature is beneficial for applications
    such as news aggregators, document indexing, and automated report generation.
    For instance, if an article discusses *Azure AI*, *machine learning*, and *predictive
    analytics*, these *terms* would be extracted as key phrases, enabling users to
    quickly grasp the document’s main topics without reading the entire text. Businesses
    can also use this feature to tag and categorize large volumes of documents, making
    it easier to retrieve relevant information when needed.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键词提取**：关键词提取有助于识别给定文本中最重要的人和概念，使组织能够高效地总结内容并改进搜索功能。此功能对新闻聚合器、文档索引和自动报告生成等应用有益。例如，如果一篇文章讨论了*Azure
    AI*、*机器学习*和*预测分析*，这些*术语*将被提取为关键词，使用户能够快速把握文档的主要主题，而无需阅读整个文本。企业还可以使用此功能对大量文档进行标记和分类，以便在需要时更容易检索相关信息。'
- en: '**Sentiment analysis**: Sentiment analysis determines the overall emotional
    tone of a piece of text—whether it is *positive*, *negative*, *neutral*, or *mixed*—with
    corresponding confidence scores. This capability is widely used in customer service,
    brand monitoring, and market research to gauge public sentiment and improve decision-making.
    For example, analyzing customer reviews of a product can help businesses understand
    whether users are satisfied or dissatisfied. If multiple reviews indicate frustration
    about a particular feature, the company can prioritize improvements in that area.
    Similarly, organizations can monitor social media conversations to assess public
    perception and take proactive measures to address negative feedback.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析**：情感分析确定文本的整体情感基调——是*正面*、*负面*、*中性*还是*混合*——并附带相应的置信度分数。这种能力在客户服务、品牌监控和市场研究中得到广泛应用，以衡量公众情绪并改善决策。例如，分析产品的客户评论可以帮助企业了解用户是否满意或不满。如果多个评论表明对某个特定功能的挫败感，公司可以优先改进该领域。同样，组织可以监控社交媒体对话，以评估公众看法并采取主动措施解决负面反馈。'
- en: '**NER**: NER identifies and categorizes specific entities within a text, such
    as *people*, *locations*, *organizations*, *dates*, and *product names*. This
    capability is essential for structuring unstructured data and automating content
    analysis in applications such as legal document processing, news categorization,
    and financial reporting. For instance, in the sentence *Elon Musk announced a
    new Tesla factory in Texas on Monday*, NER would extract *Elon Musk* (*Person*),
    *Tesla* (*Organization*), *Texas* (*Location*), and *Monday* (*Date*). By recognizing
    these entities, organizations can enrich metadata, improve search functionality,
    and facilitate better content recommendations.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**命名实体识别（NER）**：NER识别并分类文本中的特定实体，例如*人*、*地点*、*组织*、*日期*和*产品名称*。这种能力对于结构化非结构化数据以及在法律文件处理、新闻分类和财务报告等应用中自动化内容分析至关重要。例如，在句子“Elon
    Musk宣布在德克萨斯州周一开设一家新的特斯拉工厂”中，NER将提取*Elon Musk*（*人*）、*Tesla*（*组织*）、*Texas*（*地点*）和*Monday*（*日期*）。通过识别这些实体，组织可以丰富元数据，改进搜索功能，并促进更好的内容推荐。'
- en: '**Detect PII**: PII detection identifies and masks sensitive personal information
    within text, helping organizations comply with data protection regulations such
    as **General Data Protection Regulation** (**GDPR**) and **Health Insurance Portability
    and Accountability Act** (**HIPAA**). This feature is crucial for industries that
    handle customer data, including finance, healthcare, and e-commerce. PII detection
    automatically flags details such as credit card numbers, social security numbers,
    phone numbers, and email addresses, ensuring that this information is either removed
    or encrypted before storage or further processing. For example, in a customer
    support log that states *John Doe’s phone number is +1-202-555-0198 and his email
    is johndoe@example.com*, PII detection will identify and redact the sensitive
    details, safeguarding customer privacy.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Entity linking**: Entity linking enhances text analysis by connecting identified
    entities to external knowledge bases such as Wikipedia, LinkedIn, or proprietary
    databases. This feature is particularly useful in content recommendation systems,
    search engine optimization, and digital assistants, where understanding the context
    of a term is critical. For instance, in the phrase *Venus is visible in the night
    sky*, the word *Venus* could refer to the planet, the Roman goddess, or the tennis
    player Venus Williams. Entity linking disambiguates the term by associating it
    with a relevant knowledge source, providing deeper contextual understanding. This
    capability is instrumental in improving chatbot responses, enriching news articles
    with related links, and enhancing research workflows by connecting content to
    authoritative sources.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By leveraging these capabilities, you can build intelligent applications that
    understand, categorize, and analyze text to drive decision-making processes. Next,
    the following section provides hands-on exercises using the Azure AI Language
    service to reinforce these concepts and help you apply them to real-world scenarios.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Important: The following note applies to all exercises in this chapter'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 'If you haven’t yet cloned the repository or provisioned the Azure AI services,
    please refer to *Exercise 1: Getting started with Azure AI services* in [*Chapter
    2*](B31034_02.xhtml#_idTextAnchor033), specifically, the *Cloning the GitHub repository*
    and *Provisioning Azure AI services* sections, for detailed guidance. As previously
    mentioned, remember to have your endpoint and key ready, as they will be required
    here.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Text analysis with Azure AI Language'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Azure AI Language service offers a powerful way to analyze text using various
    techniques, such as language detection (*Step 5*), sentiment analysis (*Step 6*),
