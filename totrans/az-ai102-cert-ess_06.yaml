- en: Named entity recognition
  id: totrans-553
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 命名实体识别
- en: Machine translation
  id: totrans-554
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器翻译
- en: Optical character recognition
  id: totrans-555
  prefs:
