- en: Part 1
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分
- en: Foundations of AI Workflows and the Rise of AI Agents
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能工作流程的基础与人工智能代理的兴起
- en: In *Part 1* of this book, we explore the evolution of AI development since the
    rise of **large language models** (**LLMs**) in late 2022, leading up to the emergence
    of AI agents as a new architectural paradigm.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的*第一部分*中，我们探讨了自2022年末**大型语言模型**（**LLMs**）兴起以来人工智能发展的演变，直至人工智能代理作为新的架构范式出现。
- en: This part begins by tracing how AI workflows have shifted—from simple API calls
    to more dynamic systems such as **retrieval-augmented generation** (**RAG**)—and
    highlights key technical breakthroughs such as fine-tuning, model distillation,
    and **reinforcement learning from human feedback** (**RLHF**). It introduces the
    concept of agentic behavior as the next frontier in building intelligent, goal-driven
    systems.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分首先追溯了人工智能工作流程的转变——从简单的API调用到更动态的系统，如**检索增强生成**（**RAG**）——并突出了关键技术突破，如微调、模型蒸馏和**基于人类反馈的强化学习**（**RLHF**）。它介绍了代理行为作为构建智能、目标驱动系统的下一个前沿概念。
- en: 'We then dive into what makes an AI agent: how it differs from traditional automation,
    the components that enable it (LLMs, tools, memory, and knowledge), and why the
    field is rapidly converging on more autonomous, interactive systems.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们深入探讨什么构成了人工智能代理：它与传统自动化有何不同，使其成为可能的组件（LLMs、工具、记忆和知识），以及为什么该领域正迅速汇聚于更自主、交互式的系统。
- en: You’ll also gain an understanding of how AI agents build on the foundation of
    LLMs while incorporating new layers of intelligence and orchestration, setting
    the stage for more personalized, persistent, and task-oriented AI applications.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将了解人工智能代理如何建立在LLMs的基础上，同时融入新的智能和协调层，为更个性化、持久和任务导向的人工智能应用奠定基础。
