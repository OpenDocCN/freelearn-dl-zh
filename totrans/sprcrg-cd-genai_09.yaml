  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.10: Hierarchical multi-agent portfolio analyzer'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s examine each component as illustrated in *Figure 7.10*:'
  prefs: []
  type: TYPE_NORMAL
- en: '**search_agent**: Specialized in retrieving relevant websites to answer users’
    questions and provided with the following tools:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**tavily_tool**: A pre-built tool available in LangChain, specifically designed
    to retrieve search results from the Tavily API'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Definition**'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: Tavily is an AI-powered search API designed to enhance **retrieval-augmented
    generation** (**RAG**) and agent-based applications by providing real-time, high-quality
    web search results. It enables developers to integrate external knowledge into
    LLM workflows through simple, fast, and cost-effective API calls. Tavily is often
    used to improve the accuracy and relevance of AI-generated responses by grounding
    them in up-to-date web content.
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Let’s initialize this agent, starting with the tools’ initialization:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, we can create the agent and initialize it as nodes in a LangGraph graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**read_portfolio_agent**: Specialized in reading portfolios from provided paths
    and provided with the following tools:'
  prefs:
  - PREF_UL
