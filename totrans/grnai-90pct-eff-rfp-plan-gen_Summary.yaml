- en: Executive Summary
  prefs: []
  type: TYPE_NORMAL
- en: Government contracting has long been inefficient, and workforce growth has not
    kept pace with procurement spending in recent years. In FY22, a single federal
    contracting officer had to execute an average of 2,000 contracting actions per
    year, compared to only 300 in 2013 ([Deloitte](https://www2.deloitte.com/us/en/insights/industry/public-sector/automation-and-generative-ai-in-government/generative-ai-to-transform-government-procurement.html)).
    AI-driven automation has huge potential to reshape this landscape.
  prefs: []
  type: TYPE_NORMAL
- en: '[Procurement Sciences](https://procurementsciences.com/) is an organization
    at the forefront of the shift. In this report, Anthony Brown, Former Head of AI
    and Data at Procurement Sciences, shares the technical innovations and system
    architecture behind their approach, offering insights for tech leaders looking
    to implement AI in high-stakes, regulatory-driven environments.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/14.png)'
  prefs: []
  type: TYPE_IMG
- en: We’ve seen RFIs generated – the entire package, sometimes consisting of 20 or
    more documents – in just 15 minutes. Previously, completing such tasks could take
    up to six months.”
  prefs: []
  type: TYPE_NORMAL
- en: – Anthony Brown
  prefs: []
  type: TYPE_NORMAL
- en: The problem
  prefs: []
  type: TYPE_NORMAL
- en: Manual workflows, prolonged timelines, and high compliance risks have made the
    Request for Proposal (RFP) and Request for Information (RFI) processes notoriously
    complex and time-consuming. Notably, they involve processing large amounts of
    solicitation data and writing a response proposal that meets all of a given agency’s
    requirements.
  prefs: []
  type: TYPE_NORMAL
- en: The solution
  prefs: []
  type: TYPE_NORMAL
- en: 'The Procurement Sciences Awarded AI platform uses domain-specific AI assistants,
    multi-agent orchestration, and retrieval-augmented generation (RAG) to streamline
    the end-to-end contracting process. The platform:'
  prefs: []
  type: TYPE_NORMAL
- en: Automates solicitation analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generates tailored, high-quality proposals efficiently
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensures compliance with evolving regulations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The result is dramatically improved speed, accuracy, and compliance.
  prefs: []
  type: TYPE_NORMAL
- en: Result metrics
  prefs: []
  type: TYPE_NORMAL
- en: Clients have seen an average 90% efficiency increase across planning and proposal
    generation stages.
  prefs: []
  type: TYPE_NORMAL
- en: Key decisions
  prefs: []
  type: TYPE_NORMAL
- en: 'Don’t reinvent the wheel: Outsource to secure cloud infrastructure providers
    to provide compliance assurance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acknowledge and adapt to the strengths and weaknesses of different LLM models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bake transparency and traceability into the product for risk-averse clients
  prefs:
  - PREF_UL
