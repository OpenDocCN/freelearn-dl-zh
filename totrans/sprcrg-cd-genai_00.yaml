  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781805801351](https://packt.link/gbp/9781805801351).'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图/图表彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781805801351](https://packt.link/gbp/9781805801351)。
- en: Conventions used
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X handles.
    For example, “Launch a mock JSON server on `localhost:3000` to enable the cart
    management tool.”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`: 表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和X处理。例如，“在`localhost:3000`上启动一个模拟JSON服务器以启用购物车管理工具。”'
- en: 'A block of code is set as follows:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块设置如下：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen, for example, in menus or dialog boxes. For example: “LangChain was
    introduced in October 2022 as an open source framework aimed at simplifying the
    development of applications powered by **large language models** (**LLMs**).”'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或您在屏幕上看到的单词，例如在菜单或对话框中。例如：“LangChain于2022年10月推出，是一个开源框架，旨在简化由**大型语言模型**（**LLMs**）驱动的应用程序的开发。”'
- en: Warnings or important notes appear like this.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要提示如下所示。
- en: Tips and tricks appear like this.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士和技巧看起来像这样。
- en: Disclaimer on AI usage
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于AI使用的免责声明
- en: The author acknowledges the use of cutting-edge AI, such as ChatGPT and GitHub
    Copilot, with the sole aim of enhancing the language and clarity within the book,
    thereby ensuring a smooth reading experience for readers. It’s important to note
    that the content itself has been crafted by the author and edited by a professional
    publishing team.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 作者承认使用了尖端AI，如ChatGPT和GitHub Copilot，其唯一目的是增强书中的语言和清晰度，从而确保读者有一个顺畅的阅读体验。重要的是要注意，内容本身是由作者创作的，并由专业出版团队编辑。
- en: Get in touch
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from our readers is always welcome!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们始终欢迎读者的反馈！
- en: '**General feedback**: Email [feedback@packtpub.com](https://mailto:feedback@packtpub.com)
    and mention the book’s title in the subject of your message. If you have questions
    about any aspect of this book, please email us at [questions@packtpub.com](https://mailto:questions@packtpub.com).'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**：请发送电子邮件至 [feedback@packtpub.com](https://mailto:feedback@packtpub.com)，并在邮件主题中提及书籍标题。如果你对本书的任何方面有疑问，请通过电子邮件联系我们在
    [questions@packtpub.com](https://mailto:questions@packtpub.com)。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you could report this to us. Please visit [http://www.packtpub.com/submit-errata](http://www.packtpub.com/submit-errata),
    click **Submit Errata**, and fill in the form.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**勘误**：尽管我们已经尽一切努力确保内容的准确性，但错误仍然可能发生。如果你在这本书中发现了错误，我们将不胜感激，如果你能向我们报告这个错误。请访问
    [http://www.packtpub.com/submit-errata](http://www.packtpub.com/submit-errata)，点击
    **提交勘误** 并填写表格。'
- en: '**Piracy**: If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at [copyright@packtpub.com](https://mailto:copyright@packtpub.com)
    with a link to the material.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**：如果你在互联网上以任何形式发现我们作品的非法副本，如果你能提供位置地址或网站名称，我们将不胜感激。请通过电子邮件联系我们在 [copyright@packtpub.com](https://mailto:copyright@packtpub.com)，并提供材料的链接。'
- en: '**If you are interested in becoming an author**: If there is a topic that you
    have expertise in and you are interested in either writing or contributing to
    a book, please visit [http://authors.packtpub.com/](http://authors.packtpub.com/).'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你有兴趣成为作者**：如果你在某个领域有专业知识，并且你感兴趣的是撰写或为书籍做出贡献，请访问 [http://authors.packtpub.com/](http://authors.packtpub.com/)。'
