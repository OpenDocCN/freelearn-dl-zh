- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: 'We are living in a time of accelerated change in **artificial intelligence**
    (**AI**), where models are no longer passive tools but active decision-makers.
    Since the release of ChatGPT in November 2022, the world has witnessed a seismic
    shift: not only in the capabilities of **large language models** (**LLMs**) but
    also in the way AI is architected, integrated, and operationalized within real-world
    systems.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于人工智能（AI）加速变革的时代，模型不再是被动的工具，而是积极的决策者。自2022年11月ChatGPT发布以来，世界见证了地震般的转变：不仅在大语言模型（LLMs）的能力上，而且在人工智能在现实世界系统中的架构、集成和运营方式上。
- en: A new paradigm has emerged—AI agents. Unlike traditional AI workflows, agents
    bring persistence, autonomy, and goal-oriented reasoning to applications. They
    can plan, remember, use tools, and interact with other agents or humans to complete
    complex tasks. From customer service to R&D, from orchestrating APIs to driving
    personalized workflows, AI agents are reshaping how we think about software and
    intelligence.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 一个新的范式已经出现——人工智能代理。与传统的AI工作流程不同，代理为应用程序带来了持久性、自主性和以目标为导向的推理。它们可以规划、记忆、使用工具，并与其他代理或人类互动以完成复杂任务。从客户服务到研发，从编排API到驱动个性化工作流程，人工智能代理正在重塑我们对软件和智能的看法。
- en: This book serves as a hands-on guide to understanding and building AI agents,
    covering their architecture, key components, and real-world use cases. Whether
    you are a developer, architect, product manager, or AI enthusiast, this book aims
    to give you the foundational knowledge and practical skills to harness the power
    of autonomous agents.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本书是一本实用的指南，旨在理解和构建人工智能代理，涵盖了它们的架构、关键组件和实际应用案例。无论你是开发者、架构师、产品经理还是人工智能爱好者，本书旨在为你提供利用自主代理能力的坚实基础和实践技能。
- en: 'The book is structured into three parts:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为三个部分：
- en: '*Part 1*, *Foundations of AI Workflows and the Rise of AI Agents*, explores
    how AI workflows have evolved since the rise of generative models, tracing the
    shift from simple API calls to more intelligent, autonomous behaviors. It introduces
    the concept of AI agents, their ingredients—LLMs, tools, memory, and context—and
    highlights the growing need for agentic systems across industries.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一部分**，**人工智能工作流程的基础和人工智能代理的兴起**，探讨了自生成模型兴起以来人工智能工作流程的演变，从简单的API调用到更智能、更自主的行为的转变。它介绍了人工智能代理的概念、它们的成分——LLMs、工具、记忆和上下文，并强调了在各个行业中日益增长的对于代理系统的需求。'
- en: '*Part 2*, *Designing, Building, and Scaling AI Agents*, dives into the practical
    aspects of agent development. It covers AI orchestration tools, memory and context
    handling, tool integration, and agent observability. This part also walks you
    through building single-agent and multi-agent applications using frameworks such
    as LangChain and LangGraph, with hands-on examples such as e-commerce assistants
    and customer support agents.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二部分**，**设计、构建和扩展人工智能代理**，深入探讨了代理开发的实际方面。它涵盖了人工智能编排工具、记忆和上下文处理、工具集成和代理可观察性。本部分还通过使用LangChain和LangGraph等框架，以及电子商务助手和客户支持代理等实际案例，指导你构建单代理和多代理应用程序。'
- en: '*Part 3*, *Road to an Open, Agentic Ecosystem*, looks ahead to the protocols,
    platforms, and principles shaping the future of intelligent software. It covers
    emerging open standards such as MCP, A2A, and NLWeb, and discusses how to build
    responsible, secure, and cost-effective agent systems for enterprise-scale deployment.
    It will also cover responsible AI practices, including evaluation, safety mechanisms,
    and human oversight.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三部分**，**通往开放、代理生态系统之路**，展望了塑造智能软件未来的协议、平台和原则。它涵盖了新兴的开放标准，如MCP、A2A和NLWeb，并讨论了如何构建适用于企业规模部署的负责任、安全且成本效益高的代理系统。它还将涵盖负责任的人工智能实践，包括评估、安全机制和人工监督。'
- en: Who this book is for
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这本书面向的对象
- en: This book is for developers, architects, innovation leaders, and researchers
    who want to unlock the full potential of AI agents. Whether you’re a software
    engineer building agent-based workflows, a product owner designing intelligent
    assistants, or a business strategist looking to embed autonomous decision-making
    into your systems, this book offers the frameworks, examples, and tools you need
    to get started—and scale.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为开发者、架构师、创新领导者和研究人员而写的，他们希望释放人工智能代理的潜力。无论你是构建基于代理的工作流程的软件工程师，还是设计智能助手的产产品所有者，或者希望将自主决策嵌入到你的系统中的商业策略家，这本书都提供了你开始并扩展所需的框架、示例和工具。
- en: What this book covers
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](Chapter_01.xhtml#_idTextAnchor020), *Evolution of GenAI Workflows*,
    traces the transformation of AI workflows since late 2022, from simple API interactions
    to **retrieval-augmented generation** (**RAG**). It explores recent breakthroughs
    such as fine-tuning, model distillation, and **reinforcement learning from human
    feedback** (**RLHF**), and introduces the need for more autonomous, agentic behaviors.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第1章*](Chapter_01.xhtml#_idTextAnchor020)，*GenAI工作流程的演变*，追溯了自2022年底以来AI工作流程的转变，从简单的API交互到**检索增强生成**（**RAG**）。它探讨了最近的突破，如微调、模型蒸馏和**基于人类反馈的强化学习**（**RLHF**），并介绍了需要更多自主和代理行为的必要性。'
- en: '[*Chapter 2*](Chapter_02.xhtml#_idTextAnchor039), *The Rise of AI Agents*,
    defines what AI agents are and how they differ from previous automation paradigms
    such as RPA. It introduces different types of agents and the key components that
    make up their architecture, including system messages, tools, memory, and data.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第2章*](Chapter_02.xhtml#_idTextAnchor039)，*AI代理的兴起*，定义了AI代理是什么以及它们与之前的自动化范式（如RPA）有何不同。它介绍了不同类型的代理及其架构的关键组件，包括系统消息、工具、内存和数据。'
- en: '[*Chapter 3*](Chapter_03.xhtml#_idTextAnchor052), *The Need for an AI Orchestrator*,
    examines the emerging role of orchestration layers in LLM-based applications.
    It compares popular orchestrators, describes their components, and provides guidance
    on selecting the right orchestrator for your needs.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](Chapter_03.xhtml#_idTextAnchor052)，*对AI编排器的需求*，探讨了在基于LLM的应用中编排层的新兴角色。它比较了流行的编排器，描述了它们的组件，并提供了关于选择适合您需求的正确编排器的指导。'
- en: '[*Chapter 4*](Chapter_04.xhtml#_idTextAnchor067), *The Need for Memory and
    Context Management*, dives into how agents can store, retrieve, and update information
    through various types of memory (short-term, long-term, episodic, and semantic),
    along with techniques to manage context windows and leverage vector databases.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](Chapter_04.xhtml#_idTextAnchor067)，*对记忆和上下文管理的需求*，深入探讨了代理如何通过各种类型的记忆（短期、长期、情景和语义）存储、检索和更新信息，以及管理上下文窗口和利用向量数据库的技术。'
- en: '[*Chapter 5*](Chapter_05.xhtml#_idTextAnchor086), *The Need for Tools and External
    Integrations*, explores how agents use APIs, databases, and third-party services
    to interact with the world. It also discusses asynchronous versus synchronous
    calls and how to enable observability through monitoring and logging.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](Chapter_05.xhtml#_idTextAnchor086)，*对工具和外部集成的需求*，探讨了代理如何使用API、数据库和第三方服务与世界互动。它还讨论了异步调用与同步调用之间的区别，以及如何通过监控和日志记录启用可观察性。'
- en: '[*Chapter 6*](Chapter_06.xhtml#_idTextAnchor105), *Building Your First AI Agent
    with LangChain*, walks you through building your own single-agent applications
    using LangChain, including two practical use cases: an e-commerce assistant and
    a customer support agent.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_06.xhtml#_idTextAnchor105)，*使用LangChain构建您的第一个AI代理*，指导您使用LangChain构建自己的单代理应用程序，包括两个实际用例：电子商务助手和客户支持代理。'
- en: '[*Chapter 7*](Chapter_07.xhtml#_idTextAnchor122), *Multi-Agent Applications*,
    explores what happens when multiple agents work together. It covers design patterns
    such as group chat, hierarchical, and sequential coordination, introduces orchestrators
    such as LangGraph and AutoGen, and guides you in building your first multi-agent
    system.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_07.xhtml#_idTextAnchor122)，*多代理应用*，探讨了多个代理协同工作时会发生什么。它涵盖了设计模式，如群聊、分层和顺序协调，介绍了LangGraph和AutoGen等编排器，并指导您构建您的第一个多代理系统。'
- en: '[*Chapter 8*](Chapter_08.xhtml#_idTextAnchor136), *Orchestrating Intelligence:
    Blueprint for Next-Gen Agent Protocols*, introduces emerging standards and protocols—such
    as MCP, A2A, ACP, and NLWeb—that aim to define the next layer of the intelligent
    web for interoperable agents.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_08.xhtml#_idTextAnchor136)，*编排智能：下一代代理协议蓝图*，介绍了旨在定义智能网络下一层以实现互操作性的新兴标准和协议——如MCP、A2A、ACP和NLWeb。'
- en: '[*Chapter 9*](Chapter_09.xhtml#_idTextAnchor150), *Navigating Ethical Challenges
    in Real-World AI*, highlights the critical importance of designing agent systems
    responsibly. It covers evaluation strategies, security filters, cost control,
    and the implementation of guardrails and human-in-the-loop systems to ensure safe
    and ethical deployment of autonomous AI agents.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_09.xhtml#_idTextAnchor150)，*在现实世界AI中的伦理挑战导航*，强调了负责任地设计代理系统的关键重要性。它涵盖了评估策略、安全过滤器、成本控制和实施护栏以及人机交互系统以确保自主AI代理的安全和道德部署。'
- en: To get the most out of this book
  id: totrans-20
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用这本书
- en: 'Following along will be easier if you bear the following in mind:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您记住以下几点，跟随起来会更容易：
- en: '**Learn through hands-on examples**: Many chapters include real-world scenarios
    and practical exercises. Whenever possible, follow along by building your own
    AI agents using frameworks such as LangChain and LangGraph, and try deploying
    them using APIs, vector databases, and orchestrators.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过动手实践学习**：许多章节包括现实场景和实际练习。尽可能通过构建自己的AI代理（使用LangChain和LangGraph等框架）并尝试使用API、向量数据库和编排器部署它们来跟随。'
- en: '**Experiment with different agent behaviors**: Agent design is not one-size-fits-all.
    Modify tools, memory strategies, and workflows to see how they affect outcomes.
    Play with different architectures—single-agent, multi-agent, and hierarchical—to
    explore their strengths and trade-offs.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尝试不同的代理行为**：代理设计并非一刀切。修改工具、记忆策略和工作流程，看看它们如何影响结果。尝试不同的架构——单一代理、多代理和分层——以探索它们的优点和权衡。'
- en: '**Explore the open source tools and orchestration frameworks**: This book covers
    a wide range of technologies. Take time to dive into the documentation for LangChain,
    LangGraph, and LangSmith to understand how to extend and fine-tune your own implementations.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索开源工具和编排框架**：本书涵盖了广泛的技术。花时间深入研究LangChain、LangGraph和LangSmith的文档，了解如何扩展和微调您自己的实现。'
- en: '**Think beyond the basics**: The agentic paradigm is still evolving rapidly.
    Use this book as a launchpad, but stay current with the latest protocols, research
    papers, and advancements in LLM orchestration, tool use, and agent collaboration
    to deepen your expertise.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超越基础**：代理范式仍在快速发展。将本书作为跳板，但保持对最新协议、研究论文和LLM编排、工具使用和代理协作的进步的最新了解，以深化您的专业知识。'
- en: 'Here is a list of things you need to have:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一份您需要拥有的清单：
- en: '| **Software/hardware covered in the book** | **System requirements** |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| 本书涵盖的软件/硬件 | **系统要求** |'
- en: '| Python 3.10 or higher | Windows, macOS, or Linux |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| Python 3.10或更高版本 | Windows, macOS, 或 Linux |'
- en: '| Node.js | Windows, macOS, or Linux |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| Node.js | Windows, macOS, 或 Linux |'
- en: '| LLM chat and embedding models | Windows, macOS, or LinuxYou can decide to
    leverage your LLM of choice. Throughout the book, we will be using GPT-4o from
    Azure OpenAI or OpenAI.Other options include (but are not limited to) the following:Hugging
    Face HubAnthropicGemini |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| LLM聊天和嵌入模型 | Windows, macOS, 或 Linux您可以选择利用您选择的LLM。本书中，我们将使用Azure OpenAI或OpenAI的GPT-4o。其他选项包括但不限于以下内容：Hugging
    Face HubAnthropicGemini |'
- en: Download the example code files
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载示例代码文件
- en: The code bundle for the book is hosted on GitHub at [https://github.com/PacktPublishing/AI-Agents-in-Practice](https://github.com/PacktPublishing/AI-Agents-in-Practice).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本书代码包托管在GitHub上，网址为[https://github.com/PacktPublishing/AI-Agents-in-Practice](https://github.com/PacktPublishing/AI-Agents-in-Practice)。我们还有其他丰富的图书和视频代码包，可在[https://github.com/PacktPublishing](https://github.com/PacktPublishing)找到。请查看它们！
