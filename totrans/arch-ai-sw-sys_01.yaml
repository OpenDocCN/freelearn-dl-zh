  zh: 建筑基础
- en: In *Part 1* of the book, an overview is given of how architecture concepts impact
    software systems. This part walks you through the principle considerations in
    [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor012). Then, a short synopsis of architecting
    is described in [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor066). Finally, in [*Chapter
    3*](Chapter_3.xhtml#_idTextAnchor100), we discuss the impact architecting has
    on software engineering.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一部分，介绍了架构概念如何影响软件系统。本部分将引导您了解[*第一章*](Chapter_1.xhtml#_idTextAnchor012)中的主要考虑因素。然后，在[*第二章*](Chapter_2.xhtml#_idTextAnchor066)中简要描述了架构的概述。最后，在[*第三章*](Chapter_3.xhtml#_idTextAnchor100)中，我们讨论了架构对软件工程的影响。
