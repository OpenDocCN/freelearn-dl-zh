- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Prototyping for Success
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为成功进行原型设计
- en: In the previous chapter, we built our AI roadmaps by identifying high-impact,
    feasible use cases and aligning them with broader business goals. But having a
    roadmap alone doesn’t automatically deliver results, especially in AI, where uncertainty
    and rapid technological change can make planning complex.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们通过识别具有高影响力和可行性的用例，并将它们与更广泛的企业目标对齐，构建了我们的AI路线图。但仅仅拥有路线图并不能自动带来结果，尤其是在人工智能领域，不确定性和快速的技术变革可能会使规划变得复杂。
- en: 'The next step is to move from planning to prototyping. **Prototyping** validates
    whether your use cases can actually deliver the value you envisioned. In this
    chapter, we’ll look at the core elements of prototyping: deciding whether you
    want to build or buy your AI solution, managing AI projects effectively throughout
    the prototyping phase, and evaluating prototypes to ensure they’re on track to
    achieve success.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是从规划阶段过渡到原型设计阶段。**原型设计**验证您的用例是否能够真正实现您所期望的价值。在本章中，我们将探讨原型设计的核心要素：决定您是想购买还是自制人工智能解决方案，在整个原型设计阶段有效地管理人工智能项目，以及评估原型以确保它们能够成功。
- en: 'In this chapter, we’ll explore the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨以下主题：
- en: The make-versus-buy decision
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自制与购买决策
- en: Managing an AI project
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理人工智能项目
- en: Evaluating and iterating your prototype
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估和迭代您的原型
- en: Developing your prototype
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发您的原型
- en: The make-versus-buy decision
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自制与购买决策
- en: 'One of the first questions that arises when you move from idea to prototype
    is: *Should we build everything in-house, or purchase an off-the-shelf (or partially
    off-the-shelf) solution?* The **make-'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当您从想法过渡到原型时，首先出现的一个问题是：*我们应该在内部构建所有内容，还是购买现成的（或部分现成的）解决方案？* **自制**-
- en: versus-buy** question is rarely straightforward, and your choice may shift at
    different stages of your AI journey. It’s best to think of this not as a binary
    decision, but as a continuum of options.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**自制与购买**问题很少是直接的，您的选择可能会在您的人工智能旅程的不同阶段发生变化。最好将其视为一个二元决策，而不是一个选项的连续体。'
- en: 'There are choices to make: whether you want to build the complete solution
    in-house or outsource to external vendors. Let’s first give an overview of the
    options.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 有选择要做：您是想在内部构建完整的解决方案，还是外包给外部供应商。让我们首先概述一下这些选项。
- en: '**Fully build**: You do it all in-house, including data pipelines, model development,
    front end integration, and ongoing maintenance. This option offers maximum control,
    but also requires significant technical expertise, time, and resources.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全自制**：您将所有工作都在内部完成，包括数据管道、模型开发、前端集成和持续维护。这个选项提供了最大的控制权，但也需要显著的技术专长、时间和资源。'
- en: '**Hybrid**: You might use pre-built machine learning platforms or large language
    models, but develop the specific application logic, integrations, and custom data
    pipelines in-house. This approach can strike a balance between speed and flexibility.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合模式**：您可能使用预构建的机器学习平台或大型语言模型，但在内部开发特定的应用程序逻辑、集成和定制数据管道。这种方法可以在速度和灵活性之间取得平衡。'
- en: '**Fully buy**: In this scenario, you purchase or subscribe to an existing AI
    solution. The vendor handles the technical heavy lifting, and your internal teams
    focus on deployment, change management, and user adoption. This can accelerate
    time-to-value if a vendor solution matches your needs.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全购买**：在这种情况下，您购买或订阅现有的AI解决方案。供应商处理技术上的重活，您的内部团队专注于部署、变革管理和用户采用。如果供应商的解决方案符合您的需求，这可以加速价值实现的时间。'
- en: '![Figure 8.1: Continuum of make versus buy decision](img/B31200_08_01.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图8.1：自制与购买决策的连续体](img/B31200_08_01.png)'
- en: 'Figure 8.1: Continuum of the make-versus-buy decision'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1：自制与购买决策的连续体
- en: 'The decision to pick from fully build, fully buy, or a hybrid approach depends
    on four key factors:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 选择完全自制、完全购买或混合模式的决定取决于四个关键因素：
- en: '**Use case stage**: You might have to revisit this decision based on what stage
    your idea is at.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例阶段**：您可能需要根据您的想法所处的阶段重新审视这个决定。'
- en: '**Discovery**: During your first prototypes or proofs of concept, it’s often
    faster and cheaper to buy or license an existing solution – especially if you’re
    still in *learning mode*. You want to test quickly, fail fast, and iterate.'
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索**：在您的第一个原型或概念验证阶段，购买或许可现有解决方案通常更快、更便宜——尤其是如果您仍然处于*学习模式*。您希望快速测试、快速失败和迭代。'
- en: '**Delivery**: If your prototype proves high strategic value, you may later
    decide to gradually internalize more of the solution or build a new version from
    scratch that’s deeply tailored to your needs.'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交付**：如果你的原型证明具有高战略价值，你可能会后来决定逐步内部化更多的解决方案，或者从头开始构建一个深度定制以满足你需求的全新版本。'
- en: '**Strategic value:** Different products bring different business value. For
    instance, some products may help improve productivity, and some may be moonshot
    ideas. Hence, this decision will be driven by short- and long-term business goals.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略价值**：不同的产品带来不同的商业价值。例如，一些产品可能有助于提高生产力，而一些可能是宏伟的想法。因此，这个决策将由短期和长期业务目标驱动。'
- en: '**Core differentiator**: If the success of your entire business strategy hinges
    on a given AI use case – think autonomous driving for a company such as Tesla
    – it often makes sense to invest in building these capabilities in-house.'
  id: totrans-23
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**核心差异化**：如果你的整个商业战略的成功依赖于某个特定的AI用例——比如特斯拉这样的公司的自动驾驶——那么在内部投资构建这些能力通常是有意义的。'
- en: '**Non-core but useful**: For a low-impact or routine AI task (e.g., generating
    basic marketing insights), it’s typically more cost-effective to adopt an existing
    tool rather than re-invent the wheel.'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非核心但有用**：对于低影响或常规的AI任务（例如，生成基本的营销洞察），通常采用现有的工具比重新发明轮子更经济有效。'
- en: '**External solution performance**:For many use cases, there might be an existing
    solution on the market. If bringing a vendor in is a valid option, your main focus
    should be on evaluating the available solutions against relevant criteria using
    a vendor scorecard that covers key dimensions such as **Functionality and Performance**,
    **Integration and Technology Fit**, **Cost and Commercials**, **Vendor Trust and
    Stability**, and offered **Support and Services**. Consider the following:'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部解决方案性能**：对于许多用例，市场上可能已经存在现成的解决方案。如果引入供应商是一个可行的选项，你应该主要关注使用涵盖关键维度（如**功能性和性能**、**集成和技术兼容性**、**成本和商业**、**供应商信任和稳定性**以及提供的**支持和服务**）的供应商评分卡来评估可用的解决方案。考虑以下：'
- en: '**Good enough versus perfect**: No vendor solution will fit your needs perfectly
    out of the box. But sometimes 70%–80% accuracy, say on the *Performance* dimension,
    it can still be better than the 60% you had before. If an off-the-shelf product
    delivers that *good enough* threshold, you might opt to buy it.'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**足够好与完美**：没有供应商的解决方案能够完美地满足你的需求。但有时，在*性能*维度上达到70%–80%的准确度，仍然可能比之前的60%要好。如果一个现成的产品能够达到这个“足够好”的门槛，你可能会选择购买它。'
- en: '**Specialized requirements**: If you have ultra-specific needs, unique data,
    or regulatory constraints, you may find vendor solutions insufficient – pushing
    you closer to a *make* or *hybrid* approach.'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特殊需求**：如果你有超具体的需求、独特的数据或监管约束，你可能会发现供应商的解决方案不足——这可能会推动你更接近“制造”或“混合”方法。'
- en: '**Internal resources**: Who will actually be responsible for building and maintaining
    the AI solution? These aren’t set and forget but require constant monitoring and
    development over time – even if it’s just someone managing vendor licenses. The
    extent to which you have internal resources available at all is a key decision
    criterion.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部资源**：谁将真正负责构建和维护AI解决方案？这些不是一劳永逸的，但随着时间的推移需要持续的监控和发展——即使只是管理供应商许可证的人。你是否有可用的内部资源是一个关键决策标准。'
- en: '**Data, infrastructure, and talent**: Even if a use case is valuable, you may
    not have the internal skill sets or computing capabilities to build and maintain
    a custom AI solution. In that case, buying or partnering can help you leap forward.'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据、基础设施和人才**：即使一个用例很有价值，你可能也没有内部技能集或计算能力来构建和维护定制的AI解决方案。在这种情况下，购买或合作可以帮助你快速前进。'
- en: '**Shifting over time**: As your internal **AI Center of Excellence (AI CoE)**
    develops or matures, you might bring more of the AI lifecycle in-house. What you
    buy today, you might decide to build later if the strategic importance grows –
    or if your internal expertise becomes strong enough.'
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随着时间的推移而变化**：随着你的内部**AI卓越中心（AI CoE）**的发展或成熟，你可能会将更多的AI生命周期内部化。今天你购买的，如果战略重要性增加——或者如果你内部的专长足够强大，你可能会决定以后自己构建。'
- en: 'The following flowchart helps visualize the make or buy decision:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的流程图有助于可视化“制造”或“购买”决策：
- en: '![Figure 8.2: Make versus buy flowchart](img/B31200_08_02.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2：制造与购买流程图](img/B31200_08_02.png)'
- en: 'Figure 8.2: Make-versus-buy flowchart'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2：制造与购买流程图
- en: 'Before we dive into a specific example, it’s useful to highlight the typical
    situations that push organizations toward a make, buy, or hybrid approach. Prototyping
    is not one-size-fits-all, and the right path often depends on your organizational
    context:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入具体例子之前，先强调一下推动组织采取制造、购买或混合方法的一些典型情况是有用的。原型设计并非万能，正确的路径通常取决于你的组织环境：
- en: '**Buy**: Smaller organizations, or teams just starting their AI journey, often
    benefit from buying off-the-shelf solutions. For example, a mid-market retailer
    might quickly pilot a pre-built sentiment analysis tool to understand customer
    reviews without hiring data scientists. The goal here is speed, learning, and
    minimizing upfront investment.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**购买**：较小的组织或刚开始AI之旅的团队通常从购买现成解决方案中受益。例如，一家中型零售商可能会快速试点一个预构建的情感分析工具，以了解客户评价，而不需要雇佣数据科学家。这里的目的是速度、学习和最小化前期投资。'
- en: '**Make**: Larger organizations with deep technical expertise may view prototyping
    as an R&D investment. A global automaker or big insurance company might build
    in-house prototypes for potential AI use cases that might eventually have a strategic
    business impact. Even if the early versions are rough, the long-term strategic
    importance makes in-house ownership essential.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造**：拥有深厚技术专长的较大组织可能会将原型设计视为研发投资。一家全球汽车制造商或大型保险公司可能会为潜在的AI应用案例建立内部原型，这些案例最终可能对业务产生战略性的影响。即使早期版本粗糙，长期战略重要性使得内部拥有变得至关重要。'
- en: '**Hybrid**: Most companies actually land in the middle ground. They rely heavily
    on off-the-shelf solutions for things such as general AI infrastructure, but build
    the last mile in-house. This might involve the integration layer, user experience,
    or the monitoring framework for the AI solution. Ultimately, this last mile is
    what makes their AI solution competitive. For example, a media company might license
    a large language model from a vendor but build its own application layer on top
    to help editors write better headlines and article teasers without disrupting
    the editors’ workflows and with adherence to the company’s style guidelines. This
    balances speed with customization and control.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合**：大多数公司实际上处于中间地带。他们对于通用AI基础设施等事物高度依赖现成的解决方案，但最后一英里则是在内部构建。这可能包括集成层、用户体验或AI解决方案的监控框架。最终，这最后一英里是使他们的AI解决方案具有竞争力的关键。例如，一家媒体公司可能会从供应商那里获得大型语言模型许可，但会在其上构建自己的应用层，以帮助编辑写出更好的标题和文章摘要，同时不干扰编辑的工作流程并遵守公司的风格指南。这平衡了速度、定制和控制。'
- en: These scenarios illustrate that prototyping is not just about testing feasibility
    – it’s also about making strategic choices where you want your use case to land
    – whether it should be designed as a short-term ROI initiative that quickly has
    to pay for itself or a long-term strategic bet (that has more of an R&D character).
    With that context in mind, let’s look at a practical example of how this decision
    framework could play out.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这些场景说明，原型设计不仅仅是关于测试可行性——它还涉及到在战略层面做出选择，即你希望你的用例落在何处——它是否应该设计为一个短期ROI倡议，需要迅速收回成本，或者是一个长期战略赌注（具有更多研发特征）。考虑到这个背景，让我们看看这个决策框架如何在实际中发挥作用。
- en: A practical example
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个实际例子
- en: 'Let’s revisit our AI roadmap from the previous chapter. Suppose you’ve prioritized
    the RFP Chatbot Analyzer, which will provide responses to users based on the RFP
    documents. The next question is: How? Do you build or buy? At this stage, you’re
    typically in discovery mode – a concept we’ll explore in even more detail in the
    next chapter. In short, value hasn’t been validated yet. You’re confident the
    use case could add value, but you don’t have the data to prove it. So, for now,
    the goal is speed and learning: validating whether the idea works at all without
    committing heavy resources.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下上一章中的AI路线图。假设你已经将RFP聊天机器人分析器作为优先事项，它将根据RFP文档为用户提供响应。接下来的问题是：你是构建还是购买？在这个阶段，你通常处于探索模式——我们将在下一章中更详细地探讨这个概念。简而言之，价值尚未得到验证。你确信这个用例可以增加价值，但你没有数据来证明这一点。因此，目前的目标是速度和学习：验证这个想法是否可行，而不需要投入大量资源。
- en: We’ve scoped this use case in a way that it hits a $10K per year threshold ([*Chapter
    5*](Chapter_05.xhtml#_idTextAnchor140)), which immediately puts it into a tactical,
    not a strategic gain – which is exactly the lens under which we’ll prototype it,
    with a clear rigor on ROI.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经将这个用例的范围界定在每年10,000美元的门槛上（[*第五章*](Chapter_05.xhtml#_idTextAnchor140)），这立即将其归类为战术性收益而非战略性收益——这正是我们将要从中进行原型设计的视角，同时确保对投资回报率（ROI）有明确的严谨性。
- en: The anticipated $10K per year threshold basically rules out any means of hiring
    internal resources. That’s why our first action item is to quickly survey existing
    *chat-with-your-documents* vendors. One vendor might offer a 14-day free trial.
    The team signs up and uses a limited set of RFP PDFs to test the concept quickly.
    Or, you choose a solution that you’re already using in-house, such as Microsoft
    Copilot, and test whether the system can answer basic queries accurately enough
    to be useful. Within a few weeks, you’ll know whether this approach shows promise,
    where it struggles (e.g., compliance-heavy documents or graphics in PDFs), and
    whether your sales team sees real productivity gains.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 预期的每年 10K 美元的门槛基本上排除了任何内部招聘资源的手段。这就是为什么我们的首要行动项是迅速调查现有的 *与你的文档聊天* 供应商。一个供应商可能提供
    14 天的免费试用。团队注册并使用有限的 RFP PDFs 来快速测试这个概念。或者，你选择一个你已经在内部使用的解决方案，比如 Microsoft Copilot，并测试系统是否能够足够准确地回答基本查询，从而变得有用。几周内，你就会知道这种方法是否显示出希望，它在哪些方面有困难（例如，合规性强的文档或
    PDFs 中的图形），以及你的销售团队是否看到了真正的生产力提升。
- en: 'Fast-forward: if the prototype shows impact and you’re ready to switch to delivery
    mode (more on that in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312)), you reassess
    the situation. If you’re still looking for tactical impact, your means of delivery
    could mean moving to a hybrid approach, extending the existing vendor capabilities
    with custom additions such as a custom data integration layer. Or, you could choose
    a fully make approach, developing an in-house solution for greater control over
    data security and long-term ownership, basically rebuilding some components that
    were previously offered by the vendor, from scratch. The latter makes sense if
    responding to RFPs is a core business activity. But if RFPs are just one sales
    process among many, a hybrid approach is usually the better fit. And if the vendor
    solution continues to meet your needs at an acceptable cost and performance level,
    you may even stay with a pure buy strategy for quick ROI.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 快进：如果原型显示出影响，你准备切换到交付模式（更多内容请见 [*第 9 章*](Chapter_09.xhtml#_idTextAnchor312)），你将重新评估情况。如果你仍在寻找战术影响，你的交付方式可能意味着转向混合方法，通过定制添加（如定制数据集成层）来扩展现有供应商的能力。或者，你可以选择完全制造的方法，开发一个内部解决方案，以更好地控制数据安全和长期所有权，基本上是从头开始重建供应商之前提供的某些组件。后者在响应
    RFPs 是核心业务活动时是有意义的。但如果 RFPs 只是众多销售流程之一，混合方法通常是更好的选择。如果供应商解决方案继续以可接受的成本和性能水平满足你的需求，你甚至可以保持纯购买策略以快速获得
    ROI。
- en: This example shows how the same use case can follow different paths depending
    on your strategy and whether you’re still exploring or already scaling. We’ll
    dive deeper into these concepts-and how to transition seamlessly between phases
    in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了同一个用例可以根据你的策略以及你是否仍在探索或已经扩展而采取不同的路径。我们将更深入地探讨这些概念——以及如何在 [*第 9 章*](Chapter_09.xhtml#_idTextAnchor312)
    中无缝地过渡到各个阶段。
- en: 'For now, let’s recognize that for many AI use cases, especially in early prototyping
    phases, buying is often the simplest path, especially if your focus is more on
    generating ROI than making a heavy R&D investment. Later, for the few critical
    use cases that truly differentiate your business, you might invest in building.
    This dynamic approach to the *make-versus-buy* question will ensure you’re focusing
    resources where they have the highest payoff. As a rule of thumb: default to buy
    for fast ROI validation; only shift toward make when the use case proves core
    to your strategy.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，让我们认识到，对于许多人工智能应用案例，尤其是在早期原型设计阶段，购买通常是 simplest 的途径，尤其是如果你的重点是生成 ROI 而不是进行大量的研发投资。稍后，对于真正区分你业务的少数关键用例，你可能会投资于构建。这种对
    *制造与购买* 问题的动态方法将确保你将资源集中在回报最高的地方。作为一个经验法则：默认购买以快速验证 ROI；只有当用例证明对你的战略至关重要时，才转向制造。
- en: AI projects can often become unwieldy, given that you need to be agile in adapting
    to the dynamic landscape and developments, yet ensure that you don’t go down a
    rabbit hole, going back and forth on your AI project. We will discuss how to effectively
    manage an AI project next.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你需要灵活适应动态的景观和发展，同时确保你不会在人工智能项目上陷入困境，反复无常，因此人工智能项目往往会变得难以控制。我们将在下一节讨论如何有效地管理人工智能项目。
- en: Managing an AI project
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理人工智能项目
- en: Prototyping is rarely a smooth, linear journey. From proof-of-concept to pilot,
    you’ll encounter unique challenges-unstable timelines, complex data requirements,
    evolving user requirements, and uncertainties around performance.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 原型设计很少是一帆风顺的线性旅程。从概念验证到试点，你将遇到独特的挑战——不稳定的进度表、复杂的数据需求、不断变化的需求，以及性能的不确定性。
- en: In traditional IT, strict project plans can work well (sometimes). But AI projects
    come with higher uncertainty. A purely waterfall approach can stifle adaptability
    when your model’s accuracy stalls at 70%, or new data revelations require pivoting.
    On the other hand, a purely agile approach without business alignment can lead
    to *prototype purgatory* that never make it to production.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的IT中，严格的项目计划可以很好地工作（有时）。但AI项目伴随着更高的不确定性。如果你的模型准确率达到70%时，纯瀑布方法可能会阻碍适应性，或者新的数据发现需要转型。另一方面，没有业务对齐的纯敏捷方法可能导致永远无法进入生产的**原型炼狱**。
- en: 'First and foremost is **balancing structure and flexibility**. For this, you
    can follow these steps:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 首先最重要的是**平衡结构和灵活性**。为此，你可以遵循以下步骤：
- en: '**Define a clear scope, then embrace iteration**: Break your AI project down
    into small, manageable increments. Make sure the problem statement is crystal
    clear: What exactly are we trying to improve, and for whom? Rather than planning
    every detail up front, allocate time for repeated experiment cycles (sprints).
    After each cycle, review your results and adapt.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明确范围，然后拥抱迭代**：将你的AI项目分解成小而可管理的增量。确保问题陈述清晰明了：我们究竟想改进什么，以及为了谁？而不是一开始就计划好每一个细节，分配时间进行重复的实验周期（冲刺）。在每个周期结束后，回顾你的结果并做出调整。'
- en: '**Build a blended team**: AI prototypes benefit from a mix of data engineers,
    data scientists, subject matter experts, business leaders, and user-experience
    specialists. Recall from [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181) that
    frameworks such as **Responsible, Accountable, Consulted, Informed** (**RACI**)
    can help define responsibilities. If you also have an AI CoE, they can coordinate
    with departmental teams. Don’t hesitate to bring in freelancers or consultancies
    if your internal capacity is lacking-especially during the early prototype phase.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**组建一个混合团队**：AI原型从数据工程师、数据科学家、领域专家、业务领导者和用户体验专家的混合中受益。回想一下[第6章](Chapter_06.xhtml#_idTextAnchor181)，框架如**负责、问责、咨询、知情**（**RACI**）可以帮助定义责任。如果你还有一个AI
    CoE，他们可以与部门团队协调。如果你的内部能力不足，不要犹豫，引入自由职业者或咨询公司——尤其是在早期原型阶段。'
- en: '**Plan in two horizons-near-term and mid-term**: Keep weekly or bi-weekly sprints
    for building prototypes, analyzing data, and refining the approach. Focus on quickly
    testing big assumptions. A flexible project timeline that may include a pilot
    test after 6 to 12 weeks works quite well in many cases (as a rule of thumb).
    Prepare next steps if the pilot goes well (or an exit plan if it does not).'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在两个时间范围内规划-短期和中期**：保持每周或两周一次的冲刺，用于构建原型、分析数据和改进方法。专注于快速测试大的假设。在许多情况下，一个灵活的项目时间表，包括在6到12周后进行试点测试，效果相当好（作为一个经验法则）。如果试点成功，准备下一步行动（如果失败，制定退出计划）。'
- en: While you define the scope and plan your projects, you will also need to be
    vigilant about some common mistakes that happen while implementing AI projects.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当你定义范围和规划项目时，你还需要警惕在实施AI项目时发生的常见错误。
- en: Common AI project pitfalls and how to address them
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见的AI项目陷阱及其解决方法
- en: 'Here are the most common pitfalls you should avoid when starting to build your
    AI solutions:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始构建你的AI解决方案时，以下是最常见的陷阱，你应该避免：
- en: '**The 80% fallacy**: Many AI projects start off strong, with early prototypes
    quickly reaching a pretty decent performance that impresses stakeholders-making
    it feel like the project is **already 80% there**. This often sparks excitement
    and gives the impression that the project is nearly complete. However, this belief
    is misleading. While reaching 80% in accuracy, for example, may come relatively
    easily, pushing that performance up to 95% is often far more difficult and time-consuming.
    In fact, this last stretch can take up to 80% of the total effort, despite being
    only 15% of the total performance range.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**80%谬误**：许多AI项目一开始势头强劲，早期原型迅速达到相当不错的性能，给利益相关者留下了深刻印象，给人一种项目已经**完成了80%**的感觉。这往往引发兴奋，给人一种项目几乎完成的感觉。然而，这种信念是误导性的。例如，达到80%的准确率可能相对容易，但将性能提升到95%往往要困难得多，耗时更长。实际上，这个最后的冲刺可能需要占总努力量的80%，尽管它只占总性能范围的15%。'
- en: 'To give you a simple example: if your goal is to build an AI model that predicts
    anomalies, you could simply achieve a high accuracy by building a model that mostly
    predicts *no anomaly*-out of the box, this model would have 99% accuracy because
    99% of all observations wouldn’t be an anomaly. Yet, this model would be 0% useful.
    While it’s easy to understand the 80% fallacy in this case, more complex AI solutions
    fall for the same principle. For complex AI solutions too, it’s easy for the model
    to make some *easy* guesses, but matching the nuances is where it gets really
    tough.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个简单的例子来说明：如果你的目标是构建一个预测异常的AI模型，你可以简单地通过构建一个主要预测**无异常**的模型来达到高精度，这个模型将会有99%的准确率，因为99%的所有观察结果都不会是异常。然而，这个模型将毫无用处。虽然在这种情况下理解80%的谬误很容易，但更复杂的AI解决方案也会陷入同样的原则。对于复杂的AI解决方案来说，模型做出一些**简单**的猜测很容易，但匹配细微差别却非常困难。
- en: '![Figure 8.3: 80% fallacy-visualized](img/B31200_08_03.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图8.3：80%谬误可视化](img/B31200_08_03.png)'
- en: 'Figure 8.3: 80% fallacy-visualized'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3：80%谬误可视化
- en: Very often, the performance gains from a prototype to a deliverable product
    are slow and complex to achieve, as they require rigorous experimentation, handling
    countless edge cases, and fine-tuning to achieve a model that works well for real-life
    inputs, and gains are not guaranteed.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 很频繁地，从原型到可交付产品的性能提升既缓慢又复杂，因为它们需要严格的实验、处理无数边缘情况，以及微调以达到适用于现实生活输入的模型，而且收益并不保证。
- en: To address this, teams need to adopt a mindset that views early success as just
    the beginning. The real challenge-and the real value-lies in closing that final
    gap in performance. Plan and resource accordingly.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，团队需要采取一种将早期成功视为起点的心态。真正的挑战和真正的价值在于填补性能上的最后差距。相应地规划和分配资源。
- en: '**Ignoring user experience**: It’s not uncommon for AI teams to get so deep
    into building technically sophisticated models that they lose sight of the people
    who are actually supposed to use them. The result? A smart system that no one
    in the business understands, wants, or knows how to work with. You might end up
    with something that looks impressive on paper, but fails to make any real impact.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽视用户体验**：AI团队深入构建技术复杂的模型，以至于他们失去了关注实际使用这些模型的人。结果？一个聪明但没有人理解、想要或知道如何使用的系统。你可能会得到一些在纸上看起来很令人印象深刻的东西，但无法产生任何实际影响。'
- en: A classic sign of this is when a model is technically accurate but completely
    misaligned with day-to-day workflows. Maybe it delivers insights, but they’re
    buried in a confusing interface. Or, maybe it suggests actions, but at times when
    no one is in a position to act. If users can’t trust it or don’t see how it helps
    them, they’ll avoid it altogether.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况的一个典型迹象是，一个模型在技术上准确，但与日常工作流程完全脱节。也许它提供了见解，但这些见解被隐藏在一个令人困惑的界面中。或者，也许它建议采取行动，但在没有人能够采取行动的时候。如果用户无法信任它或看不到它如何帮助他们，他们可能会完全避免使用它。
- en: To avoid this, it’s critical to involve end users from day one. If you’re building
    an AI tool for a sales team, for instance, show them early wireframes or rough
    demos. Ask how they’d use it, where it fits into their daily routines, and what
    would make it truly helpful. Be ready to tweak the interface, the timing, and
    even the model’s behavior based on real feedback. Think of it as building *with*
    the user, not *for* the user. Embrace the concept of augmented-AI systems that
    support human decision-making, rather than trying to replace it entirely.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免这种情况，从第一天开始就涉及最终用户至关重要。例如，如果你正在为销售团队构建一个AI工具，那么可以尽早向他们展示线框图或粗糙的演示。询问他们如何使用它，它在他们的日常工作中如何定位，以及什么会使它真正有用。准备好根据实际反馈调整界面、时间安排，甚至模型的行为了。将其视为与用户**一起**构建，而不是为用户**而**构建。拥抱增强AI系统的概念，这些系统能够支持人类决策，而不是试图完全取代它。
- en: '**Spiraling costs and timelines**: What starts as a quick two-month prototype
    often turns into a six-month saga, burning through budget, stretching teams thin,
    and creating frustration across the board. This is one of the most common pitfalls
    in AI projects: underestimating how long things will take and failing to recognize
    when to cut losses.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本和时间的螺旋上升**：最初是一个快速的两个月原型，往往变成六个月的漫长故事，耗尽预算，使团队疲惫不堪，并在整个团队中造成挫败感。这是AI项目中最常见的陷阱之一：低估了事情需要多长时间，以及未能认识到何时应该止损。'
- en: AI projects are, by nature, exploratory. You’re often working with messy data,
    uncertain value, and shifting expectations. That’s why it’s crucial to build in
    decision points or clear checkpoints where you assess whether the project is still
    viable. Has the model reached a baseline performance level? Is it operating fast
    enough to be useful? Is there a clear path to return on investment? If the answer
    to any of those questions is *not yet*, *that’s okay-but only up to a point*.
    Be disciplined about setting limits. If a use case hasn’t proven itself within
    a defined time or budget window, it may be smarter to pause, pivot, or shut it
    down entirely. That frees up resources to double down on ideas that *are* working
    and shows stakeholders that your team makes strategic, data-driven decisions,
    not just sunk-cost commitments.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: AI项目本质上都是探索性的。你经常与混乱的数据、不确定的价值和不断变化的需求打交道。这就是为什么在项目中建立决策点或清晰的检查点至关重要，以评估项目是否仍然可行。模型是否达到了基线性能水平？它是否运行得足够快，足以有用？是否有明确的回报投资路径？如果对任何这些问题的回答是*尚未*，*那是可以的-但仅限于某个程度*。关于设定限制要有纪律性。如果一个用例在定义的时间或预算窗口内没有证明自己，那么暂停、转型或完全关闭它可能更明智。这样可以为那些正在工作的想法加倍投入资源，并向利益相关者表明，你的团队做出的是战略性的、数据驱动的决策，而不仅仅是沉没成本的承诺。
- en: Now that you are ready to set up your AI project, I will share a few tips to
    get you started.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经准备好设置你的AI项目，我将分享一些启动的技巧。
- en: Practical tips for project setup
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目设置的实际技巧
- en: Over the last decade of building machine learning and AI projects from both
    internal and AI consulting projects, I have acquired some tactics that can help
    you set up your AI projects. Obviously, the specifics might need to be adapted
    to your organization and ambition level, but on a high level, they’ll provide
    you with some guiding principles.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，无论是从内部还是AI咨询项目中构建机器学习和AI项目，我都积累了一些可以帮助你设置AI项目的策略。显然，具体细节可能需要根据你组织的规模和雄心水平进行调整，但在高层次上，它们将为你提供一些指导原则。
- en: '**Find atomic AI use cases**: Keep the prototype scope small – something you
    can test within a short timeframe (e.g., under four weeks). This ensures the project
    team can gather real feedback quickly and either iterate or move on.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找原子AI用例**：保持原型范围小-可以在短时间内测试的内容（例如，在四周内）。这确保了项目团队能够快速收集真实反馈，并迭代或继续前进。'
- en: '![A diagram of a diagram  AI-generated content may be incorrect.](img/B31200_08_04.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![一个图表的图表 AI生成的内容可能是不正确的。](img/B31200_08_04.png)'
- en: 'Figure 8.4: Atomic AI use cases'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4：原子AI用例
- en: 'The idea here to create atomic AI use cases is that, besides impact and feasibility
    (dimensions we discussed earlier, in [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181)),
    we’re now also looking at a third dimension: how easy is it to test or prototype
    a solution. If the solution can’t be prototyped easily, that’s a big roadblock.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这里创建原子AI用例的想法是，除了影响和可行性（我们之前讨论过的维度，见[*第6章*](Chapter_06.xhtml#_idTextAnchor181)）之外，我们现在还关注第三个维度：测试或原型化解决方案有多容易。如果解决方案不能轻松原型化，那将是一个巨大的障碍。
- en: I like to follow the 20-20 rule. A prototype should be shipped in less than
    20 days and cost no more than 20% of the anticipated annual value threshold. For
    example, if your threshold is $10K per quarter (that’s $40K per year), 20% equals
    $8K. If a prototype requires more time or budget than that, it’s usually a sign
    the scope is too big or the business case too weak. Of course, adjust these numbers
    to fit your organization’s size and risk appetite, but always keep them at the
    lower end.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢遵循20-20规则。原型应在20天内完成，成本不超过预期年度价值阈值的20%。例如，如果你的阈值是每季度10K美元（即每年40K美元），那么20%等于8K美元。如果一个原型需要更多的时间或预算，通常是一个迹象表明范围太大或商业案例太弱。当然，调整这些数字以适应你组织的规模和风险偏好，但始终将它们保持在较低端。
- en: '**Adopt a hybrid project management style**: In the roadmap stage, you have
    used somewhat *waterfall* thinking to outline timelines, budgets, and resource
    needs across departments. Once you start prototyping, though, it’s time to switch
    to an **agile** mindset for day-to-day execution:'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**采用混合项目管理风格**：在路线图阶段，你使用了一些*瀑布式*思维来概述时间表、预算和跨部门资源需求。然而，一旦开始原型设计，就需要切换到**敏捷**心态进行日常执行：'
- en: '**Iterative sprints**: Plan 2-4 week cycles. Each sprint aims to deliver a
    tangible improvement (such as *a working data ingestion pipeline* or *model V2
    that reduces error rates by 5%*).'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代冲刺**：规划2-4周的周期。每个冲刺的目标是交付一个可感知的改进（例如*一个可工作的数据摄取管道*或*模型V2，将错误率降低5%*）。'
- en: '**Frequent testing**: Evaluate results with real or representative data quickly.
    The sooner you find issues, the better.'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**频繁测试**：使用真实或代表性的数据快速评估结果。你发现问题的越早，越好。'
- en: '**Risk reviews**: Implement short risk checkpoints. If you discover your data
    pipeline can’t handle new file formats or your vendor solution is incompatible
    with your enterprise security requirements, address it now.'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险评估**：实施简短的风险检查点。如果你发现你的数据处理管道无法处理新的文件格式，或者你的供应商解决方案与你的企业安全要求不兼容，请立即解决。'
- en: '**Stakeholder feedback**: Keep relevant business owners in the loop. They can
    confirm whether the prototype is meeting real business needs or whether you’re
    drifting off course.'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利益相关者反馈**：让相关的业务负责人保持知情。他们可以确认原型是否满足真正的业务需求，或者你是否偏离了正确的方向。'
- en: '**Building the right team**: Most organizations still have a gap in specialized
    AI skill sets – particularly in older, legacy-driven companies. For an effective
    AI prototype, you’ll want a **blended** team:'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组建正确的团队**：大多数组织在专业的AI技能方面仍然存在差距——尤其是在那些由旧技术驱动的公司中。为了一个有效的AI原型，你需要一个**混合**团队：'
- en: '**AI experts**: Data scientists or ML engineers who are comfortable with your
    chosen modeling approach.'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI专家**：熟悉你选择的建模方法的数据科学家或机器学习工程师。'
- en: '**Business SMEs**: People who understand the real problem inside out. They’ll
    keep you from going down rabbit holes.'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务领域专家**：对实际问题了如指掌的人。他们会防止你陷入死胡同。'
- en: '**Translators**: Those who speak both **data** and **business**. They ensure
    that ROI is front and center and that AI experts build something truly relevant.'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**翻译人员**：那些既懂**数据**又懂**业务**的人。他们确保投资回报率始终放在首位，并且AI专家构建真正相关的东西。'
- en: '**IT/infrastructure**: Someone who can spin up (or procure) the environment,
    handle data ingestion, and plan for any security constraints.'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IT/基础设施**：能够启动（或采购）环境、处理数据摄取并规划任何安全限制的人。'
- en: '**Project manager or team lead**: Coordinates tasks, monitors progress, organizes
    sprints, and ensures stakeholders stay aligned.'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目经理或团队领导**：协调任务、监控进度、组织冲刺，并确保利益相关者保持一致。'
- en: Bear in mind, these are roles, not necessarily people. For very small projects,
    it’s not uncommon to have just 1-2 people wear these hats, which might be fine
    at the beginning, but as you can imagine, this won’t last long.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这些是角色，不一定是人。对于非常小的项目，只有1-2个人承担这些角色并不罕见，这可能一开始是可行的，但正如你所想象的那样，这种情况不会持续太久。
- en: Managing an AI project effectively means embracing uncertainty, prioritizing
    well-scoped prototypes, and creating a culture that allows you to pivot quickly-without
    sacrificing the structure and alignment necessary to deliver business value.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地管理AI项目意味着接受不确定性，优先考虑范围明确的原型，并创造一种文化，允许你快速调整——而不牺牲交付业务价值所需的架构和对齐。
- en: The next important action item is how to evaluate and evolve your prototype,
    which we will discuss next.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个重要的行动项目是如何评估和演进你的原型，我们将在下一节讨论。
- en: Evaluating and iterating on your prototype
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估和迭代你的原型
- en: Prototyping doesn’t end once you have a *working model*. You need a systematic
    approach to evaluate whether it’s worth further investment – and how to refine
    it for real-world conditions. Think of your prototype not as a *mini product*
    but as a *seed* that you’ll nurture into production. It might be planted in a
    small test environment, but it must already consider future operational needs
    to avoid dead ends when scaling.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了*工作模型*，原型设计并不结束。你需要一种系统的方法来评估它是否值得进一步投资——以及如何为实际条件进行优化。将你的原型视为*迷你产品*，而不是你将培育成生产的*种子*。它可能被种植在一个小型的测试环境中，但它必须已经考虑未来的运营需求，以避免在扩展时遇到死胡同。
- en: '![Figure 8.5: Planting the seed of a prototype-from idea to production](img/B31200_08_05.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图8.5：从想法到生产的原型种子](img/B31200_08_05.png)'
- en: 'Figure 8.5: Planting the seed of a prototype-from idea to production'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5：从想法到生产的原型种子
- en: In many traditional software development projects, prototypes are often *throwaway*
    builds – quick tests that are eventually discarded and rebuilt *the right way*
    for production. AI prototypes are different. The reality is that your AI prototype
    typically forms the seed of your final, deployed solution. The model, data workflows,
    integration points, and UX decisions made during prototyping don’t simply vanish;
    they’re carried forward (and often expanded) into production.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多传统的软件开发项目中，原型通常是*一次性*构建的——快速测试，最终被丢弃并重新以正确的方式为生产构建。人工智能原型则不同。现实情况是，你的AI原型通常是你最终部署解决方案的种子。在原型设计期间做出的模型、数据工作流程、集成点和UX决策并不会简单地消失；它们会被带入（并且通常扩展）到生产中。
- en: Thinking backwards
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 逆向思考
- en: Because AI prototypes eventually live on as your production system, it pays
    to adopt a *thinking backwards* approach. In other words, treat every prototype
    as if it will one day serve real users in a live environment-because it probably
    will.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 因为AI原型最终会作为你的生产系统继续存在，所以采用*逆向思考*的方法是值得的。换句话说，将每个原型都视为它最终将在真实环境中为真实用户服务的样子——因为它很可能就是这样。
- en: '**Prioritize the end goal**: Identify the ultimate business outcome and user
    needs even in the initial prototype phase. For instance, if your plan is to reduce
    call handling time by 50%, design the AI interactions (such as how a chatbot flows
    or how predictive suggestions appear) with that metric in mind from day one.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先考虑最终目标**：即使在初始原型阶段，也要确定最终的商业成果和用户需求。例如，如果你的计划是通过减少通话处理时间50%，那么从第一天起，就要考虑这个指标来设计AI交互（例如聊天机器人的流程或预测性建议的出现方式）。'
- en: '**Involve real users early**: Too often, teams validate prototypes only with
    synthetic or carefully prepared data. But messy, real-world usage is the best
    litmus test. Getting your AI in front of actual end users – whether that’s an
    internal team or external customers-reveals critical workflow issues you can fix
    early.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽早涉及真实用户**：团队往往只使用合成数据或精心准备的数据来验证原型。但混乱的真实世界使用是最好的试金石。将你的AI展示给实际最终用户——无论是内部团队还是外部客户——可以揭示你可以早期修复的关键工作流程问题。'
- en: '**Build with a future in mind**: You can still keep the prototype *lightweight*
    but choose tools and infrastructure that won’t be roadblocks when you want to
    scale. For example, if you pick a quick SaaS AI platform that can’t handle more
    than a few thousand documents, you’ll eventually have to rework large parts of
    your application if your data needs explode.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以未来为导向进行构建**：你仍然可以保持原型轻量级，但选择在你想要扩展时不会成为障碍的工具和基础设施。例如，如果你选择了一个只能处理几千份文档的快速SaaS
    AI平台，当你的数据需求激增时，你最终不得不重新构建应用程序的大部分内容。'
- en: What persists and what can be upgraded
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些会持续存在，哪些可以升级
- en: When transitioning from prototype to production, some components of your AI
    system are carried over, while others need to be rebuilt or added for the first
    time. Thinking about this upfront helps you avoid dead ends and design your prototypes
    in a modular way.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当从原型过渡到生产时，你的AI系统的一些组件会被保留，而其他组件则需要重建或首次添加。提前考虑这一点可以帮助你避免死胡同，并以模块化的方式设计你的原型。
- en: 'The following figure illustrates the core components of an AI solution at a
    high level:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了人工智能解决方案的核心组件在高级别上的情况：
- en: '![Figure 8.6\. High-level components of an AI solution ](img/B31200_08_06.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图8.6\. 人工智能解决方案的高级组件](img/B31200_08_06.png)'
- en: Figure 8.6\. High-level components of an AI solution
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6\. 人工智能解决方案的高级组件
- en: During prototyping, you’ll naturally focus on a few of these components - the
    AI model, the basic workflow logic, and perhaps a lightweight version of your
    data pipelines. These are the pieces you need in order to validate whether the
    idea works at all.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型设计过程中，你自然会关注这些组件中的几个——AI模型、基本的工作流程逻辑，以及可能的数据管道的轻量级版本。这些是你验证这个想法是否可行的必需品。
- en: Other components, like monitoring and governance, are rarely part of early prototypes.
    And that’s fine. You don’t need a full compliance dashboard or drift detection
    system just to validate your RFP Chatbot Analyzer. But it’s important to keep
    in mind that these missing pieces will eventually become critical if the solution
    moves into production.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 其他组件，如监控和管理，很少是早期原型的部分。这没关系。你不需要一个完整的合规仪表板或漂移检测系统来验证你的RFP聊天机器人分析器。但重要的是要记住，如果解决方案进入生产，这些缺失的部分最终将变得至关重要。
- en: 'Think of it as building a seed: the prototype contains the early shape of your
    workflows, data flows, and models, but not yet the full scaffolding of production.
    In [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312), we’ll look at how each of
    these components evolves from prototype to production and what it takes to harden
    them for real-world delivery.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为构建种子：原型包含了你的工作流程、数据流和模型的早期形态，但还没有生产全框架。在[*第9章*](Chapter_09.xhtml#_idTextAnchor312)中，我们将探讨这些组件如何从原型发展到生产，以及为了实际交付而加固它们需要做什么。
- en: 'But for now, let’s highlight three key components that deserve special attention:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，让我们强调三个值得特别注意的关键组件：
- en: '**Core model**: If your chatbot or computer vision tool can’t interpret data
    well in the prototype stage, it won’t magically fix itself in production. Early
    design choices about model architecture, training data, and inference speed typically
    remain.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**核心模型**：如果你的聊天机器人或计算机视觉工具在原型阶段无法很好地解释数据，它不会在生产中神奇地修复自己。关于模型架构、训练数据和推理速度的早期设计选择通常保持不变。'
- en: '**Data pipelines**: If you rely on manual data prep for a prototype, you’ll
    need a robust data pipeline for production. That pipeline will inherit any quirks
    in data formatting, cleansing steps, and refresh cycles built during the prototype.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据管道**：如果你为原型依赖手动数据准备，你需要一个健壮的数据管道用于生产。该管道将继承在原型阶段构建的数据格式、清洗步骤和刷新周期中的任何怪癖。'
- en: '**User adoption**: How people actually work with your AI in the prototype (e.g.,
    providing feedback or correcting mistakes) shapes their habits in production.
    If the prototype’s user experience is confusing, it will be doubly confusing with
    a larger user base later.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户采用**：人们在原型中如何实际使用你的AI（例如，提供反馈或纠正错误）将塑造他们在生产中的习惯。如果原型的用户体验令人困惑，那么在更大的用户群中将会加倍困惑。'
- en: Avoiding throwaway AI
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免废弃人工智能
- en: '**Plan for longevity, even when building fast**: Keep your initial coding or
    platform decisions as flexible as possible. A hacky, quick fix in your prototype
    might snowball into an expensive rework if it’s too specialized or reliant on
    a single vendor’s solution. I had one client that used a flashy RAG-as-a-Service
    start-up called Carbon to prototype their customer support chatbots. They had
    to start from scratch when Carbon was acquired by Perplexity and discontinued
    their operations within a few weeks.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**即使快速构建也要考虑长期性**：尽可能保持你的初始编码或平台决策的灵活性。原型中的快速修复可能因为过于专业化或依赖于单一供应商的解决方案而变成昂贵的重做。我有一个客户，他们使用了一个名为Carbon的RAG-as-a-Service初创公司来原型化他们的客户支持聊天机器人。当Carbon被Perplexity收购并在几周内停止运营时，他们不得不从头开始。'
- en: '**Embrace feedback loops**: AI systems thrive on continuous learning. If your
    prototype ignores feedback or collects it haphazardly, you’ll start production
    with a suboptimal model. Instead, design user-friendly ways for business owners
    or customers to report mistakes, supply better data, or highlight edge cases.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拥抱反馈循环**：人工智能系统依赖于持续学习。如果你的原型忽略反馈或随意收集反馈，你将带着一个次优模型开始生产。相反，设计用户友好的方式，让企业主或客户能够报告错误、提供更好的数据或突出边缘情况。'
- en: '**Consider operational costs**: A prototype that’s impressive but too expensive
    to run in production (e.g., using a high-end GPU 24/7 for minimal gains) won’t
    scale. Make sure cost factors, such as, cloud usage or licensing-are in the conversation
    early. You’ll learn more about these cost factors in the next chapter.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考虑运营成本**：一个令人印象深刻但生产成本过高的原型（例如，使用高端GPU 24/7以获得微小的收益）无法扩展。确保在早期就讨论成本因素，如云使用或许可。你将在下一章中了解更多关于这些成本因素的信息。'
- en: '**Build (even) a minimal path to production**: Outline where your prototype
    will *live* if it’s successful. This doesn’t require full DevOps from day one,
    but do think about basic version control, model deployment options (e.g., a container),
    and how you’ll monitor runtime performance. A lot of out-of-the-box AI tools and
    SaaS offerings simply don’t provide these metrics, and you’re not able to add
    them later on. We’ll also dive deeper into this during *Chapters 9* and *10*.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建（甚至）最小化生产路径**：概述如果你的原型成功，它将在哪里“生存”。这不需要从第一天开始就进行完整的DevOps，但确实要考虑基本的版本控制、模型部署选项（例如，容器）以及你将如何监控运行时性能。许多现成的AI工具和SaaS产品根本不提供这些指标，而且你以后也无法添加它们。我们还会在*第9章*和*第10章*中更深入地探讨这一点。'
- en: Prototyping is not a disposable exercise. The work you do up front strongly
    influences your final product. Quality and sustainability count. Even if you’re
    moving quickly, avoid choices that could corner you later. AI prototypes grow,
    evolve, and adapt in production; they don’t start over.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 原型设计不是一项可丢弃的练习。你前期所做的努力会强烈影响你的最终产品。质量和可持续性很重要。即使你正在快速推进，也要避免可能导致未来陷入困境的选择。AI原型在生产中会增长、演变和适应；它们不会从头开始。
- en: By recognizing that your prototype is already in the gravitational pull of a
    real, production environment, you’ll avoid the **throwaway trap** of traditional
    IT prototypes and set your AI project up for faster, smoother scaling.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过认识到你的原型已经处于真实、生产环境中的引力范围内，你可以避免传统IT原型中的**废弃陷阱**，并让你的AI项目能够更快、更平滑地扩展。
- en: Once you have a working prototype-however rough-the real learning starts. Let’s
    see how you can refine it and create a fully functional AI product.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有一个工作原型——不管多粗糙——真正的学习就开始了。让我们看看你如何可以完善它并创建一个完全功能的人工智能产品。
- en: Developing your prototype
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开发你的原型
- en: Prototypes are living experiments; their primary purpose is to gather feedback
    and guide your next steps. Evaluating them thoroughly and incorporating them helps
    you validate assumptions and refine your approach.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 原型是活生生的实验；它们的主要目的是收集反馈并指导你的下一步行动。彻底评估它们并吸收它们可以帮助你验证假设并完善你的方法。
- en: '**Define clear success criteria**: Before you let real users test your AI,
    set objective thresholds that indicate whether the prototype meets your business
    needs. These can include the following:'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义明确的成功标准**：在你让真实用户测试你的AI之前，设定客观的阈值，以表明原型是否满足你的业务需求。这些可以包括以下内容：'
- en: '**Quantitative performance**: Does the classification model achieve a minimum
    precision/recall? Does the generative model produce acceptable responses 90% of
    the time?'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定量性能**：分类模型是否达到了最低的精确度/召回率？生成模型90%的时间产生可接受的响应吗？'
- en: '**User adoption**: Do employees in the relevant department actually use the
    pilot solution? Or do they revert to manual processes?'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户采用**：相关部门的员工是否真的使用了试点解决方案？或者他们是否回归到手动流程？'
- en: '**Time savings or cost impact**: Are you seeing a measurable decrease in manual
    work hours or an increase in sales conversions?'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间节省或成本影响**：你是否看到了手动工作时间的可测量减少或销售转化率的增加？'
- en: '**Tip**: Use the same four **Value Levers** from the previous chapter (**Cost**,
    **Quality**, **Speed**, **Quantity**) or your departmental KPIs for alignment.'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**提示**：使用前一章中相同的四个**价值杠杆**（**成本**、**质量**、**速度**、**数量**）或你部门的KPIs进行对齐。'
- en: '**Conduct fast, real-world tests**: AI results can look brilliant in contrived
    lab conditions but flop when encountering real, messy data. Push your prototype
    into a near-real environment as soon as possible, even if it’s only a subset of
    your user base or partial data feed. This is how you spot edge cases quickly:'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进行快速、真实世界的测试**：在人为的实验室条件下，AI的结果可能看起来很棒，但遇到真实、混乱的数据时可能会失败。尽快将你的原型推入接近真实的环境，即使它只是用户基础的子集或部分数据流。这就是你快速发现边缘案例的方法：'
- en: '**Data gaps**: Additional data that’s needed to handle certain requests.'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据差距**：处理某些请求所需的数据。'
- en: '**Integration hiccups**: Slow performance or errors due to incomplete infrastructure.'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成问题**：由于基础设施不完整导致的性能缓慢或错误。'
- en: '**User behavior**: Surprise user inputs or different user expectations.'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户行为**：意外的用户输入或不同的用户期望。'
- en: '**Gather feedback early and often**: Invite direct feedback from pilot users.
    For instance, if your sales team is testing an RFP chatbot, ask them the following:'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽早和经常收集反馈**：邀请试点用户直接反馈。例如，如果你的销售团队正在测试一个RFP聊天机器人，你可以问他们以下问题：'
- en: Did the chatbot reduce the time it took to prepare proposals?
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天机器人是否减少了准备提案所需的时间？
- en: Did the chatbot occasionally produce awkward or incorrect statements? How often?
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天机器人偶尔会产生尴尬或不正确的陈述吗？多频繁？
- en: Would they keep using the chatbot if it were optional?
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果它是可选的，他们会继续使用聊天机器人吗？
- en: Leverage **observational feedback**, too. Sometimes, a formal survey might say
    **Everything’s fine**, but usage logs show minimal adoption. That’s a red flag
    indicating the solution might not actually fit into daily workflows.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 利用**观察反馈**，有时，正式的调查可能会说“一切都很好”，但使用日志显示采用率很低。这是一个红旗，表明解决方案可能实际上不适合日常工作流程。
- en: '**The pivot or proceed decision**: After a pilot runs for a certain period
    (a few weeks or months), gather all your data and decide which of the following
    to do:'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转向或继续的决定**：试点运行了一段时间（几周或几个月）后，收集所有数据并决定以下哪一项：'
- en: '**Proceed**: The prototype shows enough promise that you’re ready to address
    the last 20% of polish and move toward production.'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进行下一步**：原型展示出足够的潜力，表明你已经准备好解决最后20%的完善工作并转向生产。'
- en: '**Pivot**: Some aspects need a major revamp – maybe you discovered a different
    vendor can do it better, or a different data approach is needed.'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转型**：某些方面需要重大改革——也许你发现不同的供应商可以做得更好，或者需要不同的数据方法。'
- en: '**Pause or halt**: The business impact or feasibility just isn’t there. It’s
    better to stop now than to sink more money into a dead end.'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**暂停或停止**：业务影响或可行性根本不存在。现在停止比继续投入更多资金到死胡同中更好。'
- en: Don’t be discouraged if you must pivot or even pause. This is a natural part
    of the process. In fact, healthy prototypes should have a higher risk of *failing
    early*. This is how you preserve resources and channel them into other high-potential
    use cases on your roadmap.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你必须转型或甚至暂停，不要气馁。这是过程的一个自然部分。事实上，健康的原型应该有更高的早期失败风险。这是你如何保护资源并将它们引导到路线图上其他高潜力用例的方法。
- en: Many times, you might want to prioritize your prototypes based on value gained.
    Let’s talk about how you can achieve this.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 许多时候，你可能希望根据获得的价值来优先考虑你的原型。让我们谈谈你如何实现这一点。
- en: Sequencing your prototypes for maximum learning
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为最大学习效果对原型进行排序
- en: 'If you have multiple prototypes lined up from your backlog, consider the sequence
    in which you tackle them. Just as you sequence your roadmap at a higher level,
    you also want to optimize your prototyping schedule to gain maximum synergy:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从你的待办事项中排出了多个原型，考虑你解决它们的顺序。正如你在更高层次上对路线图进行排序一样，你还需要优化你的原型计划以获得最大的协同效应：
- en: '**Start with quick wins**: Particularly if you’re new to AI or need immediate
    proof to get more buy-in, for example, you might pick an atomic AI use case that
    can be proven or disproven in just a few weeks'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从快速胜利开始**：尤其是如果你是AI的新手或需要立即的证明来获得更多的支持，例如，你可能会选择一个可以在几周内证明或证伪的原子AI用例。'
- en: '**Apply learning**: The feedback and knowledge you gain from your first prototype
    (e.g., how to store text data efficiently or how to best interface with a vendor’s
    API) can be reused to accelerate subsequent prototypes'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用学习**：从你的第一个原型中获得反馈和知识（例如，如何高效地存储文本数据或如何最佳地与供应商的API接口）可以重新用于加速后续原型。'
- en: '**Move to champion use cases**: Once your teams and infrastructure have matured
    from smaller prototypes, take on high-impact, more complex projects'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转向关键用例**：一旦你的团队和基础设施从小型原型中成熟起来，就承担高影响、更复杂的项目。'
- en: Let’s see how all these elements might look in practice.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看所有这些元素在实践中可能看起来是什么样子。
- en: 'Prototype-in-action: Revisiting our RFP Chatbot Analyzer example'
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 原型实践：重新审视我们的RFP聊天机器人分析器示例
- en: Now, if you want to build a prototype of our RFP Chatbot Analyzer, how would
    you go about it? Here are a few pointers that can help you build this prototype.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你想构建我们的RFP聊天机器人分析器的原型，你会怎么做？以下是一些可以帮助你构建这个原型的提示。
- en: '**Make-versus-buy decision**: You could assemble a team with various team players
    focusing on the different aspects of the prototype.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造与购买决策**：你可以组建一个团队，由各种团队成员专注于原型的不同方面。'
- en: A marketing manager to supply real RFP data.
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个市场营销经理来提供真实的RFP数据。
- en: A data translator who has a good understanding of which data is needed, where
    it is stored, how it is stored, and how to access it.
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个对哪些数据需要、在哪里存储、如何存储以及如何访问有良好理解的**数据翻译者**。
- en: An IT specialist who sets up the environment to feed documents to the vendor’s
    API (if applicable).
  id: totrans-153
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个IT专家，负责设置环境将文档发送到供应商的API（如果适用）。
- en: A project manager (in a smaller company, this might be the same person as the
    data translator) to keep the pilot organized.
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个项目经理（在较小的公司，这个人可能是数据翻译者）来保持试点有序。
- en: '**Test in a real environment**: Then run the chatbot on real RFP data that
    came in last week. At first, the chatbot gives answers that are correct in 8 out
    of 10 cases. But a few RFP documents have domain-specific terms that confuse it,
    leading to missed key facts, especially when graphics or tables are involved.
    In some cases, the model just times out, which particularly happens on larger
    PDF files.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在真实环境中测试**：然后在上周收到的真实RFP数据上运行聊天机器人。起初，聊天机器人有8个正确答案中的10个。但一些RFP文档有特定领域的术语，这会使其困惑，导致错过关键事实，尤其是在涉及图形或表格时。在某些情况下，模型只是超时，这尤其发生在较大的PDF文件上。'
- en: For the uninitiated, the model development typically happens on historical data
    (here, RFP PDFs), and then the model can be tested on the new or latest documents
    to check its performance.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，模型开发通常在历史数据（此处为RFP PDFs）上进行，然后可以在新或最新文件上测试模型以检查其性能。
- en: '**Gather feedback**: Let the sales team use the chatbot for a subset of actual
    RFP tasks. Have them track usage and fill out a quick survey. They discover the
    following:'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**收集反馈**：让销售团队使用聊天机器人执行实际RFP任务的一部分。让他们跟踪使用情况并填写快速调查。他们发现了以下情况：'
- en: The chatbot significantly reduces your team’s RFP drafting time (on average
    by 25%) for standard proposals.
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天机器人显著减少了您团队的标准提案请求书（RFP）起草时间（平均减少25%）。
- en: It struggles with specialized compliance forms.
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它在与专业合规表格的斗争中感到困难。
- en: The sales reps prefer the chatbot to be integrated directly into their CRM system,
    rather than having to log into a separate web interface.
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售代表更喜欢聊天机器人直接集成到他们的CRM系统中，而不是需要登录到单独的网页界面。
- en: '**Decision**: The sales team decide to **proceed** with the next iteration,
    exploring a partial **build** approach: hooking in a custom **large language model**
    (**LLM**) trained with compliance data, then reusing the vendor’s interface for
    everything else. The factors that impacted this decision are as follows:'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策**：销售团队决定**继续**进行下一迭代，探索部分**构建**方法：使用经过合规数据训练的定制**大型语言模型**（**LLM**），然后重新使用供应商的界面进行其他所有操作。影响这一决策的因素如下：'
- en: An encouraging time reduction of 25% in RFP response.
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: RFP响应时间减少了25%，这是一个令人鼓舞的减少。
- en: They see a path to solving the compliance gap by adding domain-specific data
    or custom fine-tuning.
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们看到通过添加特定领域的数据或定制微调来解决合规差距的途径。
- en: By carefully prototyping in this manner, they avoid prematurely investing in
    a custom, fully in-house solution or blowing the budget on a vendor license that’s
    not quite fit for purpose.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种方式仔细进行原型设计，他们避免了过早投资于定制的、完全内部解决方案，或者花费预算在不太适合目的的供应商许可证上。
- en: Key takeaways
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: Prototyping is where grand AI ideas get their first real test. By carefully
    balancing the make-
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '原型设计是大型AI想法接受首次实际测试的地方。通过仔细平衡制作， '
- en: versus-buy decision, managing your AI project with a blend of structure and
    agility, and rigorously evaluating each prototype’s performance, you turn your
    strategic vision into tangible business outcomes.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 与购买决策相比，通过结合结构和敏捷性管理您的AI项目，并严格评估每个原型的性能，您将您的战略愿景转化为可衡量的商业成果。
- en: 'Here are your key takeaways for building effective and scalable prototypes:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是您构建有效和可扩展原型的关键要点：
- en: '**The make-versus-buy choice**: In early prototypes, don’t overcomplicate things.
    Leveraging off-the-shelf solutions can reduce risk and deliver fast feedback.
    For core, high-strategic-value use cases, you may eventually lean toward building
    and owning the IP.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制作与购买选择**：在早期原型中，不要使事情过于复杂。利用现成解决方案可以降低风险并快速获得反馈。对于核心、高战略价值用例，您最终可能倾向于构建和拥有知识产权。'
- en: '**Effective AI project management**: Plan in small increments, but ensure each
    sprint aligns with your broader roadmap. Build cross-functional teams, track risks,
    and expect some pivots along the way.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有效的AI项目管理**：以小增量进行规划，但确保每个冲刺与您的更广泛路线图保持一致。建立跨职能团队，跟踪风险，并预期在过程中进行一些调整。'
- en: '**Prototyping as a living lab**: Start small with *atomic AI use cases* so
    you can validate ideas quickly. Embrace short, iterative cycles, define success
    criteria from day one, and keep production realities in mind to avoid rework later.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原型作为活实验室**：从小规模的原子AI用例开始，以便您可以快速验证想法。拥抱短周期迭代，从第一天开始定义成功标准，并牢记生产现实以避免后续返工。'
- en: '**Iterate, integrate, or exit**: Not every prototype will make it all the way
    to production. That’s normal and it’s good to fail fast rather than sink time
    and money into a dead end. For the winners (successful prototypes), refine them
    in a pilot and then scale confidently.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代、集成或退出**：并非每个原型都能最终进入生产。这是正常的，快速失败比将时间和金钱投入到死胡同中要好。对于赢家（成功的原型），在试点中进行改进，然后自信地扩展。'
- en: Summary
  id: totrans-173
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we focused on various aspects to consider when developing your
    prototypes. This included decisions around whether to create in-house solutions
    or buy them from external vendors. We also discussed how you can effectively manage
    your AI projects. We learned to evaluate and iterate on prototypes and how they
    can evolve as a complete solution. Through a case study of the RFP chatbot, we
    demonstrated how you can put these principles into practice.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们关注了在开发原型时需要考虑的各个方面。这包括是否创建内部解决方案或从外部供应商购买的决定。我们还讨论了如何有效地管理您的AI项目。我们学习了如何评估和迭代原型，以及它们如何作为一个完整的解决方案发展。通过RFP聊天机器人的案例研究，我们展示了如何将这些原则付诸实践。
- en: In the next chapter, we’ll explore how to operationalize these prototypes and
    manage your AI stack as it matures across the organization-so you can scale your
    successful AI prototypes sustainably and keep delivering tangible ROI to your
    business.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何使这些原型投入运营，并随着组织内AI的成熟来管理您的AI堆栈——这样您就可以可持续地扩展您成功的AI原型，并继续为您的业务带来有形的投资回报。
- en: '|'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
