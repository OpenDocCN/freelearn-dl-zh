- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Our graph now has a solid structural foundation with proper class hierarchies
    and navigational anchors, but to enable powerful semantic search capabilities,
    we need to enrich our nodes with textual representations that capture both their
    properties and their relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Step 6 – enable hybrid embeddings (text + structure) and multi-hop support
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'So far, your Neo4j graph is already powerful: it knows about classes (`Stock`,
    `Bond`, `Organization`, `RegulatoryAuthority`), individuals (AAPL, USTB, Apple
    Inc., SEC), their relationships (`ISSUED_BY`, `IS_REGULATED_BY`, `OWNED_BY`),
    and properties (such as `hasTicker`). This makes it excellent for precise queries
    with Cypher. For example, you could ask “Which stocks are issued by Apple?” and
    Neo4j would give you an exact answer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the challenge: users often ask questions in natural language without
    knowing the schema, the Cypher query language, or the exact labels in your ontology.
    If someone types `equities regulated by the SEC`, your graph might not return
    a result directly because the node is labeled `Stock`, not `Equity`, and the user
    doesn’t know the `IS_REGULATED_BY` edge name. This is where hybrid embeddings
    come in, and this is why they are so powerful.'
  prefs: []
  type: TYPE_NORMAL
- en: So, what are hybrid embeddings?
  prefs: []
  type: TYPE_NORMAL
- en: '**Text embeddings** capture the language side of an entity (labels, descriptions,
    comments).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Graph embeddings** capture the structural side (how nodes are connected,
    which relationships they have).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hybrid embeddings** combine both. They take the entity’s own information
    plus its connected context and flatten it into a natural-language string that
    represents the knowledge in that part of the graph. That string is then embedded
    into a vector space for semantic search.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This means each entity isn’t just represented by its name; it’s represented
    by a context-rich description that already encodes relationships and facts from
    the graph.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example: `AAPL`. Instead of just embedding the `AAPL` label, we generate
    a hybrid description like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice what happened:'
  prefs: []
  type: TYPE_NORMAL
- en: We combined the class (`Stock`), the label (`AAPL`), the ticker (`[AAPL]`),
    the issuer (`Apple Inc.`), the regulator (`SEC`), and even multi-hop information
    (the issuer itself is regulated by the SEC)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This creates a richer, semantically meaningful snapshot of AAPL that covers
    not only its direct properties but also its connected context
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why does it matter for RAG?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This technique is the secret sauce for making KGs dramatically more effective
    in RAG pipelines:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Improved recall**: Queries such as *equities regulated by SEC* will find
    AAPL, even though the word “equity” doesn’t exist in the raw graph labels. The
    embedding captures the meaning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Graph and vector synergy**: Semantic search helps discover the right entities,
    and then Neo4j’s Cypher queries bring back the exact structured facts. It’s the
    best of both worlds.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-hop reasoning baked in**: By embedding enriched descriptions (up to
    *N* hops away), the system already *knows* second-order relationships before the
    search. That means when someone asks about an issuer’s regulator, the embedding
    has a good chance of surfacing the right entity even before Cypher expansion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In short, hybrid embeddings transform your graph from a static database into
    a semantically aware retrieval engine. They bridge the gap between natural language
    queries and structured graph facts, giving your RAG pipeline the ability to understand
    both intent and ground answers in precise relationships.
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the biggest reasons why KG-based RAG often outperforms traditional
    vector-only RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Step 6.1 – build an enriched hybrid text (with multi-hop)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This step builds *hybrid* text descriptions for ontology entities, combining
    their own properties with related facts from connected nodes, so they can be embedded
    for semantic search:'
  prefs: []
