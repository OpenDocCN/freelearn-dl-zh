- en: '14'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Graph-Based RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Having built a robust ontology in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    we now turn to implementing it as a functioning **knowledge graph** (**KG**).
    KGs have the potential to be the “brain” behind effective agentic RAG systems.
    Graph-based **retrieval-augmented generation** (**RAG**) involves querying a KG
    data source and presenting that data to the LLM for responding to queries. By
    using a KG, you can give your RAG results richer semantics and more explicit links
    between facts, enabling multi-hop reasoning that traditional retrieval methods
    cannot achieve.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll take the financial ontology you created in Protégé and
    implement it in Neo4j, demonstrating how to build a graph-based RAG system that
    combines the formal reasoning of ontologies with the practical power of graph
    databases. In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to graph-based RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code Lab 14.1 – building and querying a financial ontology KG in Neo4j
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These topics will equip you with the practical skills to transform your ontology
    into a production-ready knowledge graph that can power sophisticated AI agents.
    Let’s begin by exploring what makes graph-based RAG such a powerful evolution
    beyond traditional retrieval methods.
  prefs: []
  type: TYPE_NORMAL
- en: '**Terminology: Graph-based RAG vs. GraphRAG**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The name of this chapter is *Graph-Based RAG*, where we are intentionally avoiding
    calling it GraphRAG. “GraphRAG” is the name of a project that is related to what
    we will talk about here, but also has some key differences, and so we wanted to
    make sure we maintained the distinction between the two. Microsoft Research’s
    GraphRAG implementation is a full pipeline that uses LLMs to build, structure,
    and query KGs. It is a much more robust implementation of KGs than the simpler
    graph-based RAG we will outline here. It also has a specific way it groups entities
    and relationships, and a specific way that it conducts searches, which is different
    from the approach we outline in this chapter. It uses two modes of search: a global
    search that looks at high-level clusters of the graph to get an overview, and
    a local search that zooms in on specific related nodes for detail. At this point,
    it takes similar steps to what we outline in this chapter; the graph-based retrieval
    results are fed into the LLM to generate a final answer, and it has the same benefit
    of results that are structured and inherently relational, helping the LLM synthesize
    an answer that’s coherent and covers all necessary parts of the question. The
    experiments they ran show that GraphRAG could answer complex, multi-hop questions
    with greater accuracy than a standard RAG pipeline, helping to support how powerful
    KGs can be when used in RAG. Learn more about GraphRAG here: [https://arxiv.org/abs/2404.16130](https://arxiv.org/abs/2404.16130).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The GitHub repo can be found here: [https://github.com/microsoft/graphrag](https://github.com/microsoft/graphrag).'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to graph-based RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When we talked about RAG in previous chapters, we relied on vector stores (semantic
    embeddings) and, at times, keyword (sparse) search to retrieve context for LLMs.
    While this hybrid semantic plus keyword approach improves relevance, it can still
    struggle whenever you need precise reasoning, explainability, or tight factual
    grounding. The next evolutionary leap is graph-based RAG, which leverages KGs
    to provide a structured, navigable context that dramatically enhances reliability,
    factuality, and multi-step inference.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are key advantages of combining KGs with RAG in AI agents:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Enhanced retrieval precision and relevance**: By traversing explicit graph
    edges rather than relying solely on vector proximity, graph-based RAG filters
    out noise and returns highly targeted subgraphs that closely match the query intent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deeper semantic and contextual understanding**: KGs encode entities, synonyms,
    and disambiguation paths, preserving nuanced meaning and preventing misinterpretation
    of polysemous terms. They can go far beyond what flat embeddings alone can capture.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-hop reasoning and complex query handling**:Agents can traverse relation
    chains (A→B→C…) to join disparate facts logically, supporting complex, multi-step
    inferences that traditional retrieval misses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explainability and traceability**: Every retrieved node and edge comes with
    provenance metadata, enabling clear audit trails that are vital for regulated
    domains like healthcare and finance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Holistic summarization and cohesive responses**: Instead of disjointed snippets,
    graph-based RAG can extract and summarize connected subgraphs—yielding coherent
    overviews that respect the domain’s underlying structure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration of heterogeneous data sources**:KGs unify structured tables,
    ontologies, and unstructured text under one schema, letting agents query across
    silos without bespoke prompt engineering for each format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved data freshness and updatability**: Because graphs can be incrementally
    updatable, agents have the ability to always query the latest facts. If done properly,
    this can lead to cutting down hallucinations and eliminating the need for costly
    model retraining.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With those advantages in mind, let’s clarify the differences between how we’ve
    used KGs in previous chapters and how we use them in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Cyclical graphs versus ontology-based KGs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284), we introduced cyclical
    graphs using LangGraph. These are structures where entities and relationships
    form feedback loops that enable recursive, context-dependent reasoning. They excel
    in domains with mutual influence, such as financial modeling, where a parent company’s
    decisions affect a subsidiary’s performance, which, in turn, shapes future strategy.
    Ontology-based KGs, which we’ll implement in this chapter, take a fundamentally
    different approach. They’re predominantly static, schema-driven structures built
    on **directed acyclic graphs** (**DAGs**), meaning you can’t follow edges and
    return to where you started.
  prefs: []
  type: TYPE_NORMAL
- en: At their core lies a taxonomy encoding “is-a” and “part-of” relationships, where
    the type hierarchy enforces acyclicity (no class becomes its own ancestor) while
    supporting clear inheritance patterns. For instance, task dependencies where Task
    A must complete before Task B, and Task B before Task C, form a DAG.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.1 – Unidirectional information flow in DAGs](img/B34736_14_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14.1 – Unidirectional information flow in DAGs
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, cyclical graphs embrace loops. Consider a financial scenario where
    a parent company’s strategic decisions influence a subsidiary’s performance, which,
    in turn, shapes the parent’s future strategy.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.2 – Cyclical graphs](img/B34736_14_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14.2 – Cyclical graphs
  prefs: []
  type: TYPE_NORMAL
- en: These cycles emerge through conditional edges, mutual dependencies, or temporal
    feedback, enriching expressiveness but requiring cycle-detection and traversal
    strategies to prevent infinite loops.
  prefs: []
  type: TYPE_NORMAL
- en: 'This architectural difference matters for implementation. Cyclical graphs create
    active exploration loops where agents propose hypothesis-driven traversals and
    revisit nodes until reasoning converges. This is powerful for simulation but requires
    cycle-detection strategies. Ontology-based KGs enable straightforward lookups:
    the agent queries for definitions or constraints and incorporates them directly
    into prompts or post-processing. In RAG systems, they excel at filtering retrieval
    with precise type checks, ensuring that only valid, schema-compliant facts reach
    the LLM. Your financial ontology from [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    with its clear class hierarchies (`Stock`, `Bond`, `Organization`) and relationships
    (`issuedBy`, `isRegulatedBy`), is exactly this kind of stable backbone that grounds
    LLM responses in verified domain knowledge.'
  prefs: []
  type: TYPE_NORMAL
- en: With this conceptual foundation in place, we’re ready to put theory into practice.
    In the following code lab, we’ll take the financial ontology you built in [*Chapter
    13*](B34736_13_ePub.xhtml#_idTextAnchor299) and transform it into a functioning
    Neo4j knowledge graph. You’ll see firsthand how the static, schema-driven nature
    of ontology-based KGs provides the stable foundation needed for reliable graph-based
    RAG, while still maintaining the flexibility to answer complex, multi-hop queries
    about financial instruments and their relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 14-1 – building and querying a financial ontology KG in Neo4j (from
    Protégé)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this comprehensive hands-on lab, we’ll transform the financial ontology you
    created in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299) into a fully
    functional knowledge graph running in Neo4j. This practical exercise will demonstrate
    how to bridge the gap between formal ontology design and production-ready graph
    databases, enabling you to build powerful graph-based RAG systems.
  prefs: []
  type: TYPE_NORMAL
- en: Designing and implementing ontology-driven KGs in Neo4j
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You just built an ontology in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    and when you do this with Protégé, you have what is essentially a KG already.
    But we need to take a few more steps to take it from the current format to putting
    it into Neo4J, a popular KG service. Let’s first talk about KGs in general, and
    then we will be in a good position to put your new ontology into one!
  prefs: []
  type: TYPE_NORMAL
- en: Core graph concepts refresher
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A KG fundamentally relies on a clear, structured representation of entities
    and their relationships. The primary components of a graph are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Nodes (vertices)**: Nodes are entities or objects such as people, places,
    events, or concepts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relationships (edges)**: Relationships describe the connections or interactions
    between nodes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Properties (attributes)**: Properties provide detailed context or attributes
    to nodes and relationships, such as names, descriptions, and timestamps'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social networks are often used to explain graph theory, where the people are
    the nodes, and the “connections” between them are the edges. These connections
    can be given values, such as a number representing how many times two people who
    are connected interact with each other. The implication is that people who interact
    more have a “stronger” bond, and this can be used in the analysis of the social
    network. But the most important aspect of graph theory, in my opinion, is that
    it isn’t just social networks. Anything can be represented by a graph. Any relationship
    between two things can be represented by an edge. As a result, KGs can really
    represent the hidden knowledge world that exists across pretty much everything
    out there that can’t just be captured in a traditional flat database. The more
    you work with graphs, the more you will realize how incredibly powerful they are
    in representing data, going way beyond rows and columns. This also helps to explain
    why they are so ideal to represent “knowledge” to your LLM in a RAG approach!
  prefs: []
  type: TYPE_NORMAL
- en: Important graph metrics include distance (shortest path between nodes), path
    length (number of hops in a connection), degree (number of connections a node
    has), neighborhood (adjacent nodes and relationships), and the relative “strength”
    of the edge/relationship properties. These metrics are crucial for efficiently
    translating user queries into meaningful graph retrieval operations.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve covered the essential graph theory, it’s time to put these concepts
    into practice by building your knowledge graph step by step.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1 – a recap: what you have in Protégé'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ontology generated in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299)
    describes financial instruments, organizations, and regulatory authorities, with
    relationships such as `ownedBy`, `issuedBy`, `hasTicker`, and `isRegulatedBy`,
    plus labels, comments, and individuals such as AAPL, MSFT, USTB, Apple Inc., Microsoft
    Corp., and SEC.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299), you exported
    your ontology from Protégé as a Turtle (`.ttl`) file called `FinancialOntology.ttl`.
    We will start with that file for this code lab. We have provided an example of
    the file in GitHub if you do not currently have access to the one you generated
    in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).
  prefs: []
  type: TYPE_NORMAL
- en: Step 2 – preparing your notebook environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’ll be working locally with Neo4j Desktop so you can easily run and inspect
    your ontology-driven KG.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2.1 – install and launch Neo4j Desktop
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Here are the steps to install Neo4j Desktop:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [https://neo4j.com/download/](https://neo4j.com/download/) and download
    Neo4j Desktop for your operating system.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Install the application and launch it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In Neo4j Desktop, do the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Create instance** and give it a name (e.g., `FinancialOntologyKG`).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose a password you’ll remember and click **Create**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: It should be running, but if not, click **Start** to turn it on.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: In the interface, you will see a connection URI; copy that and add it to the
    `env.txt` described next.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Step 2.2 – save your credentials in a local file
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We’ll store these credentials in an `env.txt` file in the same directory as
    your notebook.
  prefs: []
  type: TYPE_NORMAL
- en: 'Add the following content to `env.txt`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This allows your notebook to load credentials without hardcoding them into the
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2.3 – install required Python packages
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In the first cell of your Jupyter/Colab notebook, install the packages we’ll
    need:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: If prompted, restart the notebook kernel after installation.
  prefs: []
  type: TYPE_NORMAL
- en: 'These libraries are used for the following purposes in this code lab:'
  prefs: []
  type: TYPE_NORMAL
- en: '`neo4j`: Official Python driver used to connect to your local Neo4j instance,
    run Cypher (create the uniqueness constraint, import nodes/edges/properties),
    and query the graph in *Steps 4*–*7*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`rdflib`:Parses the Protégé Turtle (`.ttl`) ontology and iterates triples to
    build the three CSVs (nodes, edges, data) and the `rdf:type` pairs used for `:IS_A`
    edges (*Steps 3* and *5*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pandas`: Holds extracted RDF as DataFrames, writes/reads the CSVs for import,
    and formats small tabular results from searches/queries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sentence-transformers`: Generates local text embeddings for the “hybrid” descriptions
    of graph entities to power semantic search (*Step 6*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`faiss-cpu`: In-memory vector index (CPU-only) wrapped by LangChain to run
    fast similarity search over those embeddings (*Steps 6*–*7*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`python-dotenv`: Loads `env.txt` so the notebook can read `NEO4J_URI/USER/PASS`
    and `OPENAI_API_KEY` without hardcoding secrets (*Step 2.2*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`langchain`,`langchain-openai`,`langchainhub`,`langchain-community`, and `langchain-experimental`:
    Glue for the RAG flow: documents, FAISS vector store wrapper, retriever, prompt
    templates, runnable chains, output parsing, and the OpenAI chat model; `hub`/`experimental`
    are included for templates/utilities you can optionally use later (*Steps 6*–*8*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With our environment fully configured and all necessary libraries installed,
    we’re ready to begin the transformation process.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3 – converting your Protégé ontology for Neo4j import
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this step, we’ll take the ontology file you saved at the end of *Code lab
    13.1* (`FinancialOntology.ttl`) and prepare it for import into Neo4j. We’ll do
    this by parsing the Turtle file into three CSVs –one for nodes, one for edges,
    and one for data properties –so Neo4j can load them easily.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.1 – place the ontology file in your notebook folder
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Locate `FinancialOntology.ttl` from *Code lab 13.1*. Copy or move it into the
    same directory as the notebook you are working in now.
  prefs: []
  type: TYPE_NORMAL
- en: This ensures that the notebook can read the file without needing extra file
    paths.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.2 – set up imports
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In a new cell, import the libraries we’ll use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s what the code in this cell block does, top to bottom:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Imports the libraries you’ll use later: RDF parsing (`rdflib`, `RDF/RDFS/OWL`),
    tabular work (`pandas`), Neo4j driver, local embedder (`SentenceTransformer`),
    typing hints, LangChain bits for docs/embeddings/vector store/prompts/runnables/parsers,
    OpenAI chat wrapper, `dotenv` for `env` files, and `textwrap`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Loads secrets/config from `env.txt` with `load_dotenv(...)`. Then, it pulls
    `OPENAI_API_KEY` from the environment and assigns it to `openai.api_key`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reads Neo4j connection settings from `env` with sensible defaults, if missing:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_URI` (defaults to `neo4j://127.0.0.1:7687`)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_USER` (defaults to `neo4j`)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_PASS` (defaults to `password`)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Sets up the LLM by choosing a chat model (`gpt-4o-mini`) and creates a LangChain
    `ChatOpenAI` client with `temperature=0.2` (more deterministic outputs).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Silences LangSmith tracing by setting `LANGCHAIN_TRACING_V2=false` to avoid
    the “tracing” warning in notebooks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creates a Neo4j database driver using the connection URI, username, and password
    loaded earlier.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines a `reset_neo4j_database()` function that clears all nodes and relationships
    from your Neo4j instance using `DETACH DELETE`, which removes nodes and their
    relationships in a single query.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Executes the `reset` function to start with a clean database (note: in production,
    you’d typically comment this out after initial setup to preserve your data).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Confirms the Neo4j connection by printing the connection details.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have all our dependencies loaded and configurations set, let’s parse
    the ontology file and extract its structure into a format Neo4j can understand.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.3 – parse the Turtle file into CSVs (new cell)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Neo4j doesn’t directly import RDF/Turtle files, so we need to transform our
    ontology into a format it understands: CSV files that clearly separate nodes (entities),
    edges (relationships), and properties (attributes). This intermediate step also
    gives us a chance to inspect and validate our data before loading it into the
    graph database, making debugging much easier if something goes wrong.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Run this cell to read your ontology and create `ontology_nodes.csv` and `ontology_edges.csv`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s an explanation of what we’re doing here:'
  prefs: []
  type: TYPE_NORMAL
- en: Loads the exported Turtle ontology file into an in-memory RDF graph.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines a small helper to fetch the first value of a given RDF property, such
    as a label or comment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all ontology classes and individuals, capturing their IRIs, human-readable
    labels, optional comments, and type, then writes them to a nodes CSV:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nodes CSV** (`ontology_nodes.csv`): Every class and individual in the ontology
    gets a row with its ID (IRI), label (human-friendly name), optional comment, and
    whether it’s a `Class` or `Individual` type'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all object property triples (links between resources), skipping
    metadata and OWL schema terms, and writes them to an edges CSV:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edges CSV** (`ontology_edges.csv`): Every object property assertion (links
    between two nodes) becomes a row with source, target, and type (the property name)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all data property triples (literal values attached to resources),
    recording the property name, value, and datatype, and writes them to a data properties
    CSV:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data properties CSV** (`ontology_data.csv`): Every data property assertion
    (a literal value assigned to a node, such as `hasTicker = "AAPL"`) is captured
    with the subject node’s IRI, the property name, the literal value, and its datatype'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: These three CSVs together describe the nodes, relationships, and literal attributes
    your Neo4j import will use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With our ontology successfully transformed into CSV format, we’re now ready
    to load this structured data into Neo4j and bring our KG to life.
  prefs: []
  type: TYPE_NORMAL
- en: Step 4 – importing nodes, edges, and data properties into Neo4j
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this step, you’ll connect from the notebook to your Neo4j instance, create
    a uniqueness constraint on node IDs, and then import the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '`ontology_nodes.csv` → nodes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ontology_edges.csv` → relationships (`issuedBy`, `isRegulatedBy`, `ownedBy`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
