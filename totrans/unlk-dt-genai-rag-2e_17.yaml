- en: '14'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: Graph-Based RAG
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于图的RAG
- en: Having built a robust ontology in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    we now turn to implementing it as a functioning **knowledge graph** (**KG**).
    KGs have the potential to be the “brain” behind effective agentic RAG systems.
    Graph-based **retrieval-augmented generation** (**RAG**) involves querying a KG
    data source and presenting that data to the LLM for responding to queries. By
    using a KG, you can give your RAG results richer semantics and more explicit links
    between facts, enabling multi-hop reasoning that traditional retrieval methods
    cannot achieve.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中构建了一个健壮的本体之后，我们现在转向将其实现为一个功能性的**知识图谱**（**KG**）。KGs有潜力成为有效代理RAG系统的“大脑”。基于图结构的**检索增强生成**（**RAG**）涉及查询KG数据源并将该数据呈现给LLM以回答查询。通过使用KG，你可以给你的RAG结果提供更丰富的语义和更明确的实体间联系，从而实现多跳推理，这是传统检索方法无法实现的。
- en: 'In this chapter, we’ll take the financial ontology you created in Protégé and
    implement it in Neo4j, demonstrating how to build a graph-based RAG system that
    combines the formal reasoning of ontologies with the practical power of graph
    databases. In this chapter, we’ll cover the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用你在Protégé中创建的金融本体，并在Neo4j中实现它，展示如何构建一个结合本体形式推理和图数据库实用能力的基于图结构的RAG系统。在本章中，我们将涵盖以下主题：
- en: Introduction to graph-based RAG
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于图结构的RAG简介
- en: Code Lab 14.1 – building and querying a financial ontology KG in Neo4j
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室14.1 – 在Neo4j中构建和查询金融本体KG
- en: These topics will equip you with the practical skills to transform your ontology
    into a production-ready knowledge graph that can power sophisticated AI agents.
    Let’s begin by exploring what makes graph-based RAG such a powerful evolution
    beyond traditional retrieval methods.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些主题将使你具备将本体转化为可用于驱动复杂AI代理的生产级知识图谱的实用技能。让我们首先探索是什么使得基于图结构的RAG在传统检索方法之上如此强大。
- en: '**Terminology: Graph-based RAG vs. GraphRAG**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**术语：基于图的RAG与GraphRAG**'
- en: 'The name of this chapter is *Graph-Based RAG*, where we are intentionally avoiding
    calling it GraphRAG. “GraphRAG” is the name of a project that is related to what
    we will talk about here, but also has some key differences, and so we wanted to
    make sure we maintained the distinction between the two. Microsoft Research’s
    GraphRAG implementation is a full pipeline that uses LLMs to build, structure,
    and query KGs. It is a much more robust implementation of KGs than the simpler
    graph-based RAG we will outline here. It also has a specific way it groups entities
    and relationships, and a specific way that it conducts searches, which is different
    from the approach we outline in this chapter. It uses two modes of search: a global
    search that looks at high-level clusters of the graph to get an overview, and
    a local search that zooms in on specific related nodes for detail. At this point,
    it takes similar steps to what we outline in this chapter; the graph-based retrieval
    results are fed into the LLM to generate a final answer, and it has the same benefit
    of results that are structured and inherently relational, helping the LLM synthesize
    an answer that’s coherent and covers all necessary parts of the question. The
    experiments they ran show that GraphRAG could answer complex, multi-hop questions
    with greater accuracy than a standard RAG pipeline, helping to support how powerful
    KGs can be when used in RAG. Learn more about GraphRAG here: [https://arxiv.org/abs/2404.16130](https://arxiv.org/abs/2404.16130).'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的名称是*基于图的RAG*，我们有意避免将其称为GraphRAG。“GraphRAG”是一个与我们在这里讨论的相关项目，但也有一些关键区别，因此我们想确保我们保持了两者之间的区别。微软研究院的GraphRAG实现是一个完整的管道，使用LLM来构建、结构和查询KGs。它是对KGs的更稳健的实现，比我们在这里概述的简单基于图的RAG要复杂得多。它还有特定的实体和关系分组方式，以及特定的搜索方式，这与我们在本章中概述的方法不同。它使用两种搜索模式：一种全局搜索，查看图的高级聚类以获得概览，以及一种局部搜索，聚焦于特定相关节点以获取详细信息。在此阶段，它采取与我们在本章中概述的类似步骤；基于图的检索结果被输入到LLM中以生成最终答案，并且它具有相同的好处，即结构化和固有的关系性结果，有助于LLM综合出一个连贯且涵盖所有必要部分的答案。他们进行的实验表明，GraphRAG能够比标准RAG管道更准确地回答复杂的多跳问题，有助于支持KGs在RAG中使用时的强大能力。了解更多关于GraphRAG的信息，请参阅[https://arxiv.org/abs/2404.16130](https://arxiv.org/abs/2404.16130)。
- en: 'The GitHub repo can be found here: [https://github.com/microsoft/graphrag](https://github.com/microsoft/graphrag).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub仓库地址如下：[https://github.com/microsoft/graphrag](https://github.com/microsoft/graphrag)。
- en: Introduction to graph-based RAG
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于图结构的RAG简介
- en: When we talked about RAG in previous chapters, we relied on vector stores (semantic
    embeddings) and, at times, keyword (sparse) search to retrieve context for LLMs.
    While this hybrid semantic plus keyword approach improves relevance, it can still
    struggle whenever you need precise reasoning, explainability, or tight factual
    grounding. The next evolutionary leap is graph-based RAG, which leverages KGs
    to provide a structured, navigable context that dramatically enhances reliability,
    factuality, and multi-step inference.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在前几章讨论RAG时，我们依赖于向量存储（语义嵌入）和有时是关键词（稀疏）搜索来检索LLMs的上下文。虽然这种混合语义加关键词方法提高了相关性，但它仍然会在需要精确推理、可解释性或紧密事实基础时遇到困难。下一个进化飞跃是基于图的RAG，它利用KGs提供结构化、可导航的上下文，极大地增强了可靠性、事实性和多步推理。
- en: 'The following are key advantages of combining KGs with RAG in AI agents:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是将KGs与RAG结合用于AI代理的关键优势：
- en: '**Enhanced retrieval precision and relevance**: By traversing explicit graph
    edges rather than relying solely on vector proximity, graph-based RAG filters
    out noise and returns highly targeted subgraphs that closely match the query intent.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强检索精度和相关性**：通过遍历显式图边而非仅依赖向量邻近度，基于图的RAG过滤掉噪声，并返回高度针对查询意图的子图。'
- en: '**Deeper semantic and contextual understanding**: KGs encode entities, synonyms,
    and disambiguation paths, preserving nuanced meaning and preventing misinterpretation
    of polysemous terms. They can go far beyond what flat embeddings alone can capture.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更深入的语义和上下文理解**：KGs编码实体、同义词和消歧路径，保留细微含义并防止多义词的误解。它们可以远远超出仅使用平面嵌入所能捕捉的内容。'
- en: '**Multi-hop reasoning and complex query handling**:Agents can traverse relation
    chains (A→B→C…) to join disparate facts logically, supporting complex, multi-step
    inferences that traditional retrieval misses.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多跳推理和复杂查询处理**：代理可以遍历关系链（A→B→C…）以逻辑地连接不同的事实，支持复杂的多步推理，这是传统检索所遗漏的。'
- en: '**Explainability and traceability**: Every retrieved node and edge comes with
    provenance metadata, enabling clear audit trails that are vital for regulated
    domains like healthcare and finance.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性和可追溯性**：每个检索到的节点和边都带有来源元数据，这为医疗保健和金融等受监管领域提供了至关重要的清晰审计轨迹。'
- en: '**Holistic summarization and cohesive responses**: Instead of disjointed snippets,
    graph-based RAG can extract and summarize connected subgraphs—yielding coherent
    overviews that respect the domain’s underlying structure.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全面总结和连贯响应**：而不是零散的片段，基于图的RAG可以提取和总结连接的子图——产生尊重领域潜在结构的连贯概述。'
- en: '**Integration of heterogeneous data sources**:KGs unify structured tables,
    ontologies, and unstructured text under one schema, letting agents query across
    silos without bespoke prompt engineering for each format.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异构数据源的集成**：KGs将结构化表格、本体和未结构化文本统一在一个模式下，让代理能够在不针对每种格式进行定制提示工程的情况下跨孤岛查询。'
- en: '**Improved data freshness and updatability**: Because graphs can be incrementally
    updatable, agents have the ability to always query the latest facts. If done properly,
    this can lead to cutting down hallucinations and eliminating the need for costly
    model retraining.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进数据新鲜度和可更新性**：由于图可以增量更新，代理有查询最新事实的能力。如果操作得当，这可以减少幻觉并消除昂贵模型重新训练的需求。'
- en: With those advantages in mind, let’s clarify the differences between how we’ve
    used KGs in previous chapters and how we use them in this chapter.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些优势，让我们明确区分我们在前几章中如何使用KGs，以及我们在这章中如何使用它们。
- en: Cyclical graphs versus ontology-based KGs
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环图与基于本体论的KGs
- en: In [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284), we introduced cyclical
    graphs using LangGraph. These are structures where entities and relationships
    form feedback loops that enable recursive, context-dependent reasoning. They excel
    in domains with mutual influence, such as financial modeling, where a parent company’s
    decisions affect a subsidiary’s performance, which, in turn, shapes future strategy.
    Ontology-based KGs, which we’ll implement in this chapter, take a fundamentally
    different approach. They’re predominantly static, schema-driven structures built
    on **directed acyclic graphs** (**DAGs**), meaning you can’t follow edges and
    return to where you started.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第 12 章*](B34736_12_ePub.xhtml#_idTextAnchor284)中，我们使用 LangGraph 介绍了循环图。这些是实体和关系形成反馈循环的结构，使得递归、上下文相关的推理成为可能。它们在具有相互影响的领域表现出色，例如财务建模，其中母公司的决策影响子公司的表现，反过来，这种表现又塑造了未来的战略。在本章中我们将实现的基于本体论的
    KGs 采用了一种根本不同的方法。它们主要是静态的、基于模式的结构，建立在**有向无环图**（**DAGs**）之上，这意味着你不能跟随边返回起点。
- en: At their core lies a taxonomy encoding “is-a” and “part-of” relationships, where
    the type hierarchy enforces acyclicity (no class becomes its own ancestor) while
    supporting clear inheritance patterns. For instance, task dependencies where Task
    A must complete before Task B, and Task B before Task C, form a DAG.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，是一个编码“是”和“部分”关系的分类法，其中类型层次结构强制执行无环性（没有类成为自己的祖先）同时支持清晰的继承模式。例如，任务依赖关系，其中任务
    A 必须在任务 B 完成之前完成，任务 B 在任务 C 之前完成，形成一个 DAG。
- en: '![Figure 14.1 – Unidirectional information flow in DAGs](img/B34736_14_1.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.1 – DAG 中的单向信息流](img/B34736_14_1.png)'
- en: Figure 14.1 – Unidirectional information flow in DAGs
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.1 – DAG 中的单向信息流
- en: In contrast, cyclical graphs embrace loops. Consider a financial scenario where
    a parent company’s strategic decisions influence a subsidiary’s performance, which,
    in turn, shapes the parent’s future strategy.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，循环图拥抱循环。考虑一个财务场景，其中母公司的战略决策影响子公司的表现，反过来，这种表现又塑造了母公司的未来战略。
- en: '![Figure 14.2 – Cyclical graphs](img/B34736_14_2.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.2 – 循环图](img/B34736_14_2.png)'
- en: Figure 14.2 – Cyclical graphs
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.2 – 循环图
- en: These cycles emerge through conditional edges, mutual dependencies, or temporal
    feedback, enriching expressiveness but requiring cycle-detection and traversal
    strategies to prevent infinite loops.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这些循环通过条件边、相互依赖或时间反馈出现，丰富了表达能力，但需要循环检测和遍历策略来防止无限循环。
- en: 'This architectural difference matters for implementation. Cyclical graphs create
    active exploration loops where agents propose hypothesis-driven traversals and
    revisit nodes until reasoning converges. This is powerful for simulation but requires
    cycle-detection strategies. Ontology-based KGs enable straightforward lookups:
    the agent queries for definitions or constraints and incorporates them directly
    into prompts or post-processing. In RAG systems, they excel at filtering retrieval
    with precise type checks, ensuring that only valid, schema-compliant facts reach
    the LLM. Your financial ontology from [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    with its clear class hierarchies (`Stock`, `Bond`, `Organization`) and relationships
    (`issuedBy`, `isRegulatedBy`), is exactly this kind of stable backbone that grounds
    LLM responses in verified domain knowledge.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构差异对实现很重要。循环图创建主动探索循环，其中代理提出基于假设的遍历，并回访节点直到推理收敛。这对于模拟来说很强大，但需要循环检测策略。基于本体论的
    KGs 允许直接查找：代理查询定义或约束，并将其直接纳入提示或后处理中。在 RAG 系统中，它们擅长通过精确的类型检查进行过滤检索，确保只有有效、符合模式的真实事实达到
    LLM。您在[*第 13 章*](B34736_13_ePub.xhtml#_idTextAnchor299)中提到的金融本体，具有清晰的类层次结构（`Stock`、`Bond`、`Organization`）和关系（`issuedBy`、`isRegulatedBy`），正是这种稳定的骨干，它将
    LLM 的响应建立在经过验证的领域知识上。
- en: With this conceptual foundation in place, we’re ready to put theory into practice.
    In the following code lab, we’ll take the financial ontology you built in [*Chapter
    13*](B34736_13_ePub.xhtml#_idTextAnchor299) and transform it into a functioning
    Neo4j knowledge graph. You’ll see firsthand how the static, schema-driven nature
    of ontology-based KGs provides the stable foundation needed for reliable graph-based
    RAG, while still maintaining the flexibility to answer complex, multi-hop queries
    about financial instruments and their relationships.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立好这个概念基础之后，我们就可以将理论付诸实践。在接下来的代码实验室中，我们将把你在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中构建的金融本体转换为一个功能性的Neo4j知识图谱。你将亲身体验到基于本体的KGs的静态、模式驱动特性如何为可靠的基于图的RAG提供稳定的基石，同时仍然保持回答关于金融工具及其关系的复杂、多跳查询的灵活性。
- en: Code lab 14-1 – building and querying a financial ontology KG in Neo4j (from
    Protégé)
  id: totrans-32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室14-1 – 在Neo4j中构建和查询金融本体KG（从Protégé）
- en: In this comprehensive hands-on lab, we’ll transform the financial ontology you
    created in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299) into a fully
    functional knowledge graph running in Neo4j. This practical exercise will demonstrate
    how to bridge the gap between formal ontology design and production-ready graph
    databases, enabling you to build powerful graph-based RAG systems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个全面的动手实验室中，我们将把你在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中创建的金融本体转换为一个在Neo4j中运行的完全功能性的知识图谱。这个实际练习将展示如何将形式本体设计和生产就绪的图数据库之间的差距连接起来，使你能够构建强大的基于图的RAG系统。
- en: Designing and implementing ontology-driven KGs in Neo4j
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Neo4j中设计和实现由本体驱动的KGs
- en: You just built an ontology in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299),
    and when you do this with Protégé, you have what is essentially a KG already.
    But we need to take a few more steps to take it from the current format to putting
    it into Neo4J, a popular KG service. Let’s first talk about KGs in general, and
    then we will be in a good position to put your new ontology into one!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中构建了一个本体，当你使用Protégé这样做时，本质上你已经有一个知识图谱了。但我们需要采取更多步骤，将当前格式转换为将其放入Neo4J，这是一个流行的KG服务。让我们首先谈谈KGs的一般情况，然后我们将处于一个很好的位置来将你的新本体放入其中！
- en: Core graph concepts refresher
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心图概念复习
- en: 'A KG fundamentally relies on a clear, structured representation of entities
    and their relationships. The primary components of a graph are as follows:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个知识图谱本质上依赖于实体及其关系的清晰、结构化表示。图的主要组成部分如下：
- en: '**Nodes (vertices)**: Nodes are entities or objects such as people, places,
    events, or concepts'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**节点（顶点）**：节点是实体或对象，如人、地点、事件或概念'
- en: '**Relationships (edges)**: Relationships describe the connections or interactions
    between nodes'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关系（边）**：关系描述节点之间的连接或交互'
- en: '**Properties (attributes)**: Properties provide detailed context or attributes
    to nodes and relationships, such as names, descriptions, and timestamps'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**属性（属性）**：属性为节点和关系提供详细的上下文或属性，如名称、描述和时间戳'
- en: Social networks are often used to explain graph theory, where the people are
    the nodes, and the “connections” between them are the edges. These connections
    can be given values, such as a number representing how many times two people who
    are connected interact with each other. The implication is that people who interact
    more have a “stronger” bond, and this can be used in the analysis of the social
    network. But the most important aspect of graph theory, in my opinion, is that
    it isn’t just social networks. Anything can be represented by a graph. Any relationship
    between two things can be represented by an edge. As a result, KGs can really
    represent the hidden knowledge world that exists across pretty much everything
    out there that can’t just be captured in a traditional flat database. The more
    you work with graphs, the more you will realize how incredibly powerful they are
    in representing data, going way beyond rows and columns. This also helps to explain
    why they are so ideal to represent “knowledge” to your LLM in a RAG approach!
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 社交网络常被用来解释图论，其中人们是节点，他们之间的“连接”是边。这些连接可以赋予值，例如一个数字表示两个相连的人相互互动的次数。这意味着互动更多的人有“更强”的联系，这可以用于社交网络的分析。但在我看来，图论最重要的方面是它不仅仅是社交网络。任何事物都可以用图来表示。任何两个事物之间的关系都可以用边来表示。因此，知识图谱（KGs）可以真正地表示存在于几乎所有无法仅用传统平面数据库捕获的事物中的隐藏知识世界。你越是用图工作，就越会意识到它们在表示数据方面的强大能力，远远超出了行和列。这也解释了为什么它们在用RAG方法向你的LLM表示“知识”时如此理想！
- en: Important graph metrics include distance (shortest path between nodes), path
    length (number of hops in a connection), degree (number of connections a node
    has), neighborhood (adjacent nodes and relationships), and the relative “strength”
    of the edge/relationship properties. These metrics are crucial for efficiently
    translating user queries into meaningful graph retrieval operations.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的图指标包括距离（节点之间的最短路径）、路径长度（连接中的跳数）、度（节点的连接数）、邻域（相邻节点和关系）以及边/关系的相对“强度”。这些指标对于有效地将用户查询转换为有意义的图检索操作至关重要。
- en: Now that we’ve covered the essential graph theory, it’s time to put these concepts
    into practice by building your knowledge graph step by step.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经涵盖了基本的图论，是时候通过逐步构建你的知识图谱来将这些概念付诸实践了。
- en: 'Step 1 – a recap: what you have in Protégé'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步 - 回顾：你在Protégé中的内容
- en: The ontology generated in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299)
    describes financial instruments, organizations, and regulatory authorities, with
    relationships such as `ownedBy`, `issuedBy`, `hasTicker`, and `isRegulatedBy`,
    plus labels, comments, and individuals such as AAPL, MSFT, USTB, Apple Inc., Microsoft
    Corp., and SEC.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中生成的本体描述了金融工具、组织和监管机构，以及如`ownedBy`、`issuedBy`、`hasTicker`和`isRegulatedBy`等关系，还有标签、注释以及AAPL、MSFT、USTB、苹果公司、微软公司和美国证券交易委员会等个人。
- en: At the end of [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299), you exported
    your ontology from Protégé as a Turtle (`.ttl`) file called `FinancialOntology.ttl`.
    We will start with that file for this code lab. We have provided an example of
    the file in GitHub if you do not currently have access to the one you generated
    in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)的末尾，你已将本体从Protégé导出为名为`FinancialOntology.ttl`的Turtle（`.ttl`）文件。我们将从这个文件开始这个代码实验。如果你目前无法访问[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中生成的文件，我们已在GitHub上提供了一个示例文件。
- en: Step 2 – preparing your notebook environment
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步 - 准备你的笔记本环境
- en: We’ll be working locally with Neo4j Desktop so you can easily run and inspect
    your ontology-driven KG.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本地使用Neo4j Desktop，这样你可以轻松地运行和检查你的本体驱动的KG。
- en: Step 2.1 – install and launch Neo4j Desktop
  id: totrans-49
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2.1步 - 安装并启动Neo4j Desktop
- en: 'Here are the steps to install Neo4j Desktop:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Neo4j Desktop的步骤如下：
- en: Go to [https://neo4j.com/download/](https://neo4j.com/download/) and download
    Neo4j Desktop for your operating system.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往[https://neo4j.com/download/](https://neo4j.com/download/)下载适用于您操作系统的Neo4j
    Desktop。
- en: Install the application and launch it.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装应用程序并启动它。
- en: 'In Neo4j Desktop, do the following:'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Neo4j Desktop中，执行以下操作：
- en: Click **Create instance** and give it a name (e.g., `FinancialOntologyKG`).
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**创建实例**并给它起一个名字（例如，`FinancialOntologyKG`）。
- en: Choose a password you’ll remember and click **Create**.
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个你记得的密码并点击**创建**。
- en: It should be running, but if not, click **Start** to turn it on.
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它应该正在运行，但如果不在，请点击**启动**来打开它。
- en: In the interface, you will see a connection URI; copy that and add it to the
    `env.txt` described next.
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Step 2.2 – save your credentials in a local file
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We’ll store these credentials in an `env.txt` file in the same directory as
    your notebook.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: 'Add the following content to `env.txt`:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This allows your notebook to load credentials without hardcoding them into the
    code.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Step 2.3 – install required Python packages
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In the first cell of your Jupyter/Colab notebook, install the packages we’ll
    need:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If prompted, restart the notebook kernel after installation.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 'These libraries are used for the following purposes in this code lab:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '`neo4j`: Official Python driver used to connect to your local Neo4j instance,
    run Cypher (create the uniqueness constraint, import nodes/edges/properties),
    and query the graph in *Steps 4*–*7*'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`rdflib`:Parses the Protégé Turtle (`.ttl`) ontology and iterates triples to
    build the three CSVs (nodes, edges, data) and the `rdf:type` pairs used for `:IS_A`
    edges (*Steps 3* and *5*)'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pandas`: Holds extracted RDF as DataFrames, writes/reads the CSVs for import,
    and formats small tabular results from searches/queries'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sentence-transformers`: Generates local text embeddings for the “hybrid” descriptions
    of graph entities to power semantic search (*Step 6*)'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`faiss-cpu`: In-memory vector index (CPU-only) wrapped by LangChain to run
    fast similarity search over those embeddings (*Steps 6*–*7*)'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`python-dotenv`: Loads `env.txt` so the notebook can read `NEO4J_URI/USER/PASS`
    and `OPENAI_API_KEY` without hardcoding secrets (*Step 2.2*).'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`langchain`,`langchain-openai`,`langchainhub`,`langchain-community`, and `langchain-experimental`:
    Glue for the RAG flow: documents, FAISS vector store wrapper, retriever, prompt
    templates, runnable chains, output parsing, and the OpenAI chat model; `hub`/`experimental`
    are included for templates/utilities you can optionally use later (*Steps 6*–*8*)'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With our environment fully configured and all necessary libraries installed,
    we’re ready to begin the transformation process.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Step 3 – converting your Protégé ontology for Neo4j import
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this step, we’ll take the ontology file you saved at the end of *Code lab
    13.1* (`FinancialOntology.ttl`) and prepare it for import into Neo4j. We’ll do
    this by parsing the Turtle file into three CSVs –one for nodes, one for edges,
    and one for data properties –so Neo4j can load them easily.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.1 – place the ontology file in your notebook folder
  id: totrans-78
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Locate `FinancialOntology.ttl` from *Code lab 13.1*. Copy or move it into the
    same directory as the notebook you are working in now.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: This ensures that the notebook can read the file without needing extra file
    paths.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.2 – set up imports
  id: totrans-81
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In a new cell, import the libraries we’ll use:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Here’s what the code in this cell block does, top to bottom:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: 'Imports the libraries you’ll use later: RDF parsing (`rdflib`, `RDF/RDFS/OWL`),
    tabular work (`pandas`), Neo4j driver, local embedder (`SentenceTransformer`),
    typing hints, LangChain bits for docs/embeddings/vector store/prompts/runnables/parsers,
    OpenAI chat wrapper, `dotenv` for `env` files, and `textwrap`.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Loads secrets/config from `env.txt` with `load_dotenv(...)`. Then, it pulls
    `OPENAI_API_KEY` from the environment and assigns it to `openai.api_key`.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reads Neo4j connection settings from `env` with sensible defaults, if missing:'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_URI` (defaults to `neo4j://127.0.0.1:7687`)'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_USER` (defaults to `neo4j`)'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NEO4J_PASS` (defaults to `password`)'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Sets up the LLM by choosing a chat model (`gpt-4o-mini`) and creates a LangChain
    `ChatOpenAI` client with `temperature=0.2` (more deterministic outputs).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Silences LangSmith tracing by setting `LANGCHAIN_TRACING_V2=false` to avoid
    the “tracing” warning in notebooks.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creates a Neo4j database driver using the connection URI, username, and password
    loaded earlier.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines a `reset_neo4j_database()` function that clears all nodes and relationships
    from your Neo4j instance using `DETACH DELETE`, which removes nodes and their
    relationships in a single query.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Executes the `reset` function to start with a clean database (note: in production,
    you’d typically comment this out after initial setup to preserve your data).'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Confirms the Neo4j connection by printing the connection details.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have all our dependencies loaded and configurations set, let’s parse
    the ontology file and extract its structure into a format Neo4j can understand.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Step 3.3 – parse the Turtle file into CSVs (new cell)
  id: totrans-98
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Neo4j doesn’t directly import RDF/Turtle files, so we need to transform our
    ontology into a format it understands: CSV files that clearly separate nodes (entities),
    edges (relationships), and properties (attributes). This intermediate step also
    gives us a chance to inspect and validate our data before loading it into the
    graph database, making debugging much easier if something goes wrong.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 'Run this cell to read your ontology and create `ontology_nodes.csv` and `ontology_edges.csv`:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here’s an explanation of what we’re doing here:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Loads the exported Turtle ontology file into an in-memory RDF graph.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines a small helper to fetch the first value of a given RDF property, such
    as a label or comment.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all ontology classes and individuals, capturing their IRIs, human-readable
    labels, optional comments, and type, then writes them to a nodes CSV:'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nodes CSV** (`ontology_nodes.csv`): Every class and individual in the ontology
    gets a row with its ID (IRI), label (human-friendly name), optional comment, and
    whether it’s a `Class` or `Individual` type'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all object property triples (links between resources), skipping
    metadata and OWL schema terms, and writes them to an edges CSV:'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edges CSV** (`ontology_edges.csv`): Every object property assertion (links
    between two nodes) becomes a row with source, target, and type (the property name)'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterates over all data property triples (literal values attached to resources),
    recording the property name, value, and datatype, and writes them to a data properties
    CSV:'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data properties CSV** (`ontology_data.csv`): Every data property assertion
    (a literal value assigned to a node, such as `hasTicker = "AAPL"`) is captured
    with the subject node’s IRI, the property name, the literal value, and its datatype'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: These three CSVs together describe the nodes, relationships, and literal attributes
    your Neo4j import will use.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With our ontology successfully transformed into CSV format, we’re now ready
    to load this structured data into Neo4j and bring our KG to life.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Step 4 – importing nodes, edges, and data properties into Neo4j
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this step, you’ll connect from the notebook to your Neo4j instance, create
    a uniqueness constraint on node IDs, and then import the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '`ontology_nodes.csv` → nodes'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ontology_edges.csv` → relationships (`issuedBy`, `isRegulatedBy`, `ownedBy`)'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ontology_data.csv` → data properties (we’ll set `hasTicker`)'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach avoids the need to copy CSVs into Neo4j’s `import` folder and
    works great for small-to-medium demos.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Step 4.1 – configure your Neo4j connection
  id: totrans-119
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'First, we’ll establish a connection to your Neo4j database using the credentials
    we loaded from the environment file:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here’s what the code does:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Defines a helper function to run a Cypher query within its own session and immediately
    consume the results
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prints a confirmation message showing the connection details to verify that
    the database is reachable
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When run, this should output the following:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: With our database connection established and verified, we need to set up the
    proper constraints to ensure data integrity during the import process.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Step 4.2 – create schema constraint
  id: totrans-128
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'We’ll import all resources with a generic label such as `:Resource` and `unique
    ID`. Later (optional steps), you can add more specific labels such as `:Stock`
    or `:Bond`:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'When run, this should output the following (where `id` is represented by `{id}`):'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Step 4.3 – load nodes from ontology_nodes.csv
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This step reads the exported ontology nodes from CSV and inserts them into
    Neo4j as graph resources:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Here’s what the code does:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Loads the `ontology_nodes.csv` file into a DataFrame and previews the first
    few rows
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines a Cypher query to merge each node into the graph with a `:Resource`
    label, keyed by its unique ID
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sets additional properties on each node: human-readable label, comment, and
    type (`Class` or `Individual`)'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Iterates over all rows in the CSV, passing their values into the Cypher query
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prints a confirmation message showing how many nodes were imported
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'At this point, it will list the nodes and output:'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-143
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now that all nodes are in the graph, we need to connect them according to the
    relationships defined in our ontology.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Step 4.4 – load relationships from ontology_edges.csv
  id: totrans-145
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4.4步 - 从ontology_edges.csv加载关系
- en: 'When we bring the relationships from your ontology into Neo4j, each one needs
    to be assigned a concrete relationship type (such as `:ISSUED_BY` or `:OWNED_BY`).
    In Cypher, you can’t just drop in a variable for the relationship type. It has
    to be written out directly in the query. Neo4j’s **Awesome Procedures On Cypher**
    (**APOC**) library has advanced tools for making that dynamic, but since we’re
    keeping this lab self-contained and simple, we’ll take a straightforward approach:
    we’ll only focus on the three edge types that matter for our financial ontology
    (`issuedBy`, `isRegulatedBy`, and `ownedBy`) and create a small Cypher query for
    each of them. Then, when we loop through the edges from the CSV, we’ll choose
    the right query depending on the edge’s name. This way, our ontology edges map
    cleanly into Neo4j’s relationship types without adding extra complexity:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将你的本体中的关系引入Neo4j时，每个关系都需要分配一个具体的关系类型（例如`:ISSUED_BY`或`:OWNED_BY`）。在Cypher中，你不能简单地插入一个变量作为关系类型。它必须直接在查询中写出。Neo4j的**Cypher的神奇过程库**（**APOC**）提供了高级工具来实现这一点，但由于我们保持这个实验室自包含和简单，我们将采取直接的方法：我们只关注对我们金融本体重要的三种边缘类型（`issuedBy`、`isRegulatedBy`和`ownedBy`），并为每种类型创建一个小Cypher查询。然后，当我们遍历CSV中的边缘时，我们将根据边缘的名称选择正确的查询。这样，我们的本体边缘可以干净地映射到Neo4j的关系类型，而不增加额外的复杂性：
- en: '[PRE10]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Here’s what the code does:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码做了以下操作：
- en: Reads the `ontology_edges.csv` file into a DataFrame and previews the first
    few rows
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`ontology_edges.csv`文件读入DataFrame并预览前几行
- en: Defines a mapping from ontology property names to the uppercase relationship
    types to be created in Neo4j
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义从本体属性名称到在Neo4j中创建的大写关系类型的映射
- en: Prepares separate Cypher queries for each relationship type (`ISSUED_BY`, `IS_REGULATED_BY`,
    and `OWNED_BY`)
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每种关系类型（`ISSUED_BY`、`IS_REGULATED_BY`和`OWNED_BY`）准备单独的Cypher查询
- en: Iterates through each edge record, filtering out any relationships not in the
    mapping
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历每个边缘记录，过滤掉不在映射中的任何关系
- en: Runs the appropriate Cypher query to connect the source and target nodes with
    the correct relationship type
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行适当的Cypher查询以使用正确的关联类型连接源节点和目标节点
- en: Counts the total number of relationships created and prints a summary message
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算创建的总关系数并打印摘要信息
- en: 'At this point, it will list the relationships and output:'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这一点上，它将列出关系并输出：
- en: '[PRE11]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: With our nodes now properly connected through their relationships, we need to
    add the data properties that provide specific attributes to our financial instruments.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经通过它们的关系正确连接了节点，我们需要添加提供特定属性的数据属性。
- en: Step 4.5 – load data properties from ontology_data.csv
  id: totrans-158
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4.5步 - 从ontology_data.csv加载数据属性
- en: 'We’ll set `hasTicker` on the `subject` node. You can extend this block later
    to handle more properties or cast datatypes:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在`subject`节点上设置`hasTicker`。你可以稍后扩展这个块来处理更多的属性或数据类型：
- en: '[PRE12]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Here’s what the code does:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码做了以下操作：
- en: Attempts to read the `ontology_data.csv` file; if it doesn’t exist, it creates
    an empty DataFrame with the expected columns
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试读取`ontology_data.csv`文件；如果不存在，则创建一个具有预期列的空DataFrame
- en: Displays the first few rows of the data for inspection
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显示数据的前几行以供检查
- en: Defines a Cypher query to set the `hasTicker` property on a node identified
    by its ID
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个Cypher查询来设置由其ID识别的节点的`hasTicker`属性
- en: Iterates through each record, filtering to only those where the property name
    is `hasTicker`
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历每个记录，过滤出属性名为`hasTicker`的记录
- en: Runs the query to update matching nodes with the `ticker` value
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行查询以更新匹配的节点并设置`ticker`值
- en: Counts how many nodes were updated and prints a summary message
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算更新的节点数量并打印摘要信息
- en: 'At this point, it will output the followng:'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这一点上，它将输出以下内容：
- en: '[PRE13]'
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Now that we’ve imported all nodes, relationships, and data properties from our
    ontology, let’s verify that everything is loaded correctly by running a quick
    test query.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经从我们的本体中导入了所有节点、关系和数据属性，让我们通过运行快速测试查询来验证一切是否正确加载。
- en: Step 4.6 – quick smoke test
  id: totrans-171
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4.6步 - 快速烟雾测试
- en: 'Run the following code as a test:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下代码作为测试：
- en: '[PRE14]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: If you see rows for `AAPL`, `MSFT`, and `USTB` with their tickers, you’re in
    great shape.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到`AAPL`、`MSFT`和`USTB`及其股票代码的行，你就做得很好了。
- en: 'It will look like the following:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 它看起来如下所示：
- en: '[PRE15]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: With our basic graph structure confirmed and working, we can now enhance it
    by adding navigational elements that will make querying more intuitive and enable
    class-based retrieval of our financial instruments.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在确认并验证了基本图结构和工作状态后，我们可以通过添加导航元素来增强它，这将使查询更加直观，并能够基于类检索我们的金融工具。
- en: Step 5 – add navigational anchor nodes (stocks, bonds, and so on)
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 5 步 – 添加导航锚节点（股票、债券等）
- en: 'In this step, you’ll do the following:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一步，你将执行以下操作：
- en: '`Import rdf:type` (class membership) from your `Turtle` into Neo4j.'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从你的 `Turtle` 中导入 `rdf:type` (类成员关系) 到 Neo4j。
- en: Create **concept** nodes (e.g., `All Stocks`, `All Bonds`) and connect them
    to their members.
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建 **概念** 节点（例如，`All Stocks`，`All Bonds`）并将它们连接到其成员。
- en: Why this change? Earlier snippets assumed that nodes already had labels such
    as `:Stock/:Bond`. Our import uses a generic `:Resource`, so we add explicit membership
    edges (`(:Resource)-[:IS_A]->(:Resource {rdfs_label:'Stock'})`) and use those
    to build the anchors.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么进行这个更改？早期的代码片段假设节点已经有了 `:Stock/:Bond` 这样的标签。我们的导入使用通用的 `:Resource`，因此我们添加了显式的成员边（`(:Resource)-[:IS_A]->(:Resource
    {rdfs_label:'Stock'})`）并使用这些边来构建锚点。
- en: Step 5.1 – add class membership edges from the TTL
  id: totrans-183
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第 5.1 步 – 从 TTL 添加类成员关系边
- en: 'Build `rdf:type` (class membership) edges from the Turtle file and push to
    Neo4j:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Turtle 文件构建 `rdf:type`（类成员关系）边并将其推送到 Neo4j：
- en: '[PRE16]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Here’s what the code does:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码执行的操作：
- en: Creates an empty list to store (individual IRI, class IRI) pairs
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个空列表来存储（个体 IRI，类 IRI）对
- en: Iterates through all triples where the predicate is `rdf:type` (type assignments)
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历所有谓词为 `rdf:type`（类型分配）的三元组
- en: Skips ontology meta-information such as `"is a Class"`, `"is a NamedIndividual"`,
    or `RDFS.Class`
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跳过诸如 `"is a Class"`，`"is a NamedIndividual"` 或 `RDFS.Class` 这样的本体元信息
- en: Keeps only cases where both the subject and object are IRIs (not literals),
    meaning an individual is linked to a class
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅保留主语和对象都是 IRI（不是字面量）的情况，这意味着个体被链接到类
- en: Adds these valid (individual, class) pairs to the list
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将这些有效的（个体，类）对添加到列表中
- en: Returns the total number of pairs found
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回找到的配对总数
- en: The output is `12`
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出是 `12`
- en: Now we need to materialize these class memberships as explicit relationships
    in Neo4j. By creating `:IS_A` edges between individuals and their classes (e.g.,
    `AAPL :IS_A Stock`), we enable powerful class-based queries and lay the groundwork
    for the navigational anchor nodes we’ll build in the next step.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要将这些类成员关系作为显式关系在 Neo4j 中实现。通过在个体和它们的类之间创建 `:IS_A` 边（例如，`AAPL :IS_A Stock`），我们能够实现强大的基于类的查询，并为我们在下一步中构建的导航锚节点打下基础。
- en: 'Push `[:IS_A]` edges into Neo4j between the resource (individual) and the class
    node:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 将 `[:IS_A]` 边推送到 Neo4j 中的资源（个体）和类节点之间：
- en: '[PRE17]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Here’s what the code does:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码执行的操作：
- en: Opens a Neo4j session for database operations
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开 Neo4j 会话进行数据库操作
- en: Defines a Cypher query to connect an individual node to its class node with
    an `:IS_A` relationship
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个 Cypher 查询，通过 `:IS_A` 关系将个体节点连接到其类节点
- en: Iterates through all (individual IRI, class IRI) pairs collected earlier
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历之前收集的所有（个体 IRI，类 IRI）对
- en: Executes the query for each pair, creating the relationship if it doesn’t already
    exist
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对每一对执行查询，如果尚未存在则创建关系
- en: Counts how many relationships were created or matched and returns the total
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算创建或匹配的关系数量并返回总数
- en: With the class membership relationships now established in our graph, we can
    create navigational anchor nodes that group related entities together for easier
    querying and exploration.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的图中建立了类成员关系后，我们可以创建导航锚节点，将相关实体分组在一起，以便更容易地进行查询和探索。
- en: Step 5.2 – create All X concept nodes and wire members
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 5.2 步 – 创建 All X 概念节点并连接成员
- en: 'We’ll create concept hubs and connect them to members by following the `:IS_A`
    edge to the corresponding class by human label (`rdfs_label`). Adjust or add more
    anchors as you expand the ontology:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建概念中心，并通过遵循 `:IS_A` 边到相应的人类标签（`rdfs_label`）的类来连接它们。随着本体的发展，调整或添加更多锚点：
- en: '[PRE18]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Here’s what the code does:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码执行的操作：
- en: Defines a list of “anchor” concept nodes, each representing a category (e.g.,
    `All Stocks`, `All Bonds`) linked to a specific ontology class label
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个“锚”概念节点列表，每个节点代表一个类别（例如，`All Stocks`，`All Bonds`），与特定的本体类标签相关联
- en: Opens a Neo4j session to process each anchor definition
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开 Neo4j 会话以处理每个锚定义
- en: Ensures that each anchor concept node exists in the graph, creating it with
    a descriptive text if it’s new
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保每个锚概念节点存在于图中，如果它是新的，则使用描述性文本创建它
- en: Removes any existing `INCLUDES` relationships from that anchor node to avoid
    duplicates
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从该锚点节点删除任何现有的`INCLUDES`关系，以避免重复
- en: Finds all resources of the matching class (via `:IS_A` relationships) and links
    them to the anchor node with new `INCLUDES` relationships
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过`:IS_A`关系找到匹配类的所有资源，并将它们通过新的`INCLUDES`关系链接到锚点节点
- en: Prints a confirmation message when all anchors have been created or updated
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当所有锚点都已创建或更新时打印确认消息
- en: 'The output will be as follows:'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出将如下所示：
- en: '[PRE19]'
  id: totrans-215
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Let’s verify that our anchor nodes are properly connected to their members and
    that the categorization is working as expected.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们验证我们的锚点节点是否正确连接到其成员，以及分类是否按预期工作。
- en: Step 5.3 – quick checks
  id: totrans-217
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第5.3步 – 快速检查
- en: 'Let’s verify the anchor nodes by counting how many members each one includes:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过计算每个锚点包含的成员数量来验证锚点节点：
- en: '[PRE20]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'This is the expected output:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE21]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Now, let’s inspect which specific stocks are connected to the `All Stocks`
    anchor to verify that the relationships were created correctly:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们检查哪些特定的股票与`All Stocks`锚点相连，以验证关系是否正确创建：
- en: '[PRE22]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'This is the expected output:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE23]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Our graph now has a solid structural foundation with proper class hierarchies
    and navigational anchors, but to enable powerful semantic search capabilities,
    we need to enrich our nodes with textual representations that capture both their
    properties and their relationships.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有一个坚实的结构基础，具有适当的类层次结构和导航锚点，但为了启用强大的语义搜索功能，我们需要用捕获其属性和关系的文本表示来丰富我们的节点。
- en: Step 6 – enable hybrid embeddings (text + structure) and multi-hop support
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第6步 – 启用混合嵌入（文本 + 结构）和多跳支持
- en: 'So far, your Neo4j graph is already powerful: it knows about classes (`Stock`,
    `Bond`, `Organization`, `RegulatoryAuthority`), individuals (AAPL, USTB, Apple
    Inc., SEC), their relationships (`ISSUED_BY`, `IS_REGULATED_BY`, `OWNED_BY`),
    and properties (such as `hasTicker`). This makes it excellent for precise queries
    with Cypher. For example, you could ask “Which stocks are issued by Apple?” and
    Neo4j would give you an exact answer.'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你的Neo4j图已经非常强大：它了解类（`Stock`、`Bond`、`Organization`、`RegulatoryAuthority`），个人（AAPL、USTB、Apple
    Inc.、SEC），它们的关系（`ISSUED_BY`、`IS_REGULATED_BY`、`OWNED_BY`），以及属性（如`hasTicker`）。这使得它非常适合使用Cypher进行精确查询。例如，你可以问“哪些股票是由苹果发行的？”Neo4j会给出一个精确的答案。
- en: 'But here’s the challenge: users often ask questions in natural language without
    knowing the schema, the Cypher query language, or the exact labels in your ontology.
    If someone types `equities regulated by the SEC`, your graph might not return
    a result directly because the node is labeled `Stock`, not `Equity`, and the user
    doesn’t know the `IS_REGULATED_BY` edge name. This is where hybrid embeddings
    come in, and this is why they are so powerful.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有一个挑战：用户通常在不知道模式、Cypher查询语言或本体中确切标签的情况下用自然语言提问。如果有人输入`equities regulated
    by the SEC`，你的图可能不会直接返回结果，因为节点被标记为`Stock`，而不是`Equity`，并且用户不知道`IS_REGULATED_BY`边名。这就是混合嵌入发挥作用的地方，这也是它们为什么如此强大的原因。
- en: So, what are hybrid embeddings?
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，什么是混合嵌入？
- en: '**Text embeddings** capture the language side of an entity (labels, descriptions,
    comments).'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本嵌入**捕获实体的语言方面（标签、描述、评论）。'
- en: '**Graph embeddings** capture the structural side (how nodes are connected,
    which relationships they have).'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图嵌入**捕获结构方面（节点如何连接，它们有哪些关系）。'
- en: '**Hybrid embeddings** combine both. They take the entity’s own information
    plus its connected context and flatten it into a natural-language string that
    represents the knowledge in that part of the graph. That string is then embedded
    into a vector space for semantic search.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合嵌入**结合了两者。它们将实体的自身信息及其连接的上下文结合起来，并将其扁平化为表示该部分图中的知识的自然语言字符串。然后，该字符串被嵌入到向量空间中进行语义搜索。'
- en: This means each entity isn’t just represented by its name; it’s represented
    by a context-rich description that already encodes relationships and facts from
    the graph.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着每个实体不仅仅由其名称表示；它由一个丰富的上下文描述表示，该描述已经编码了来自图的关系和事实。
- en: 'Here’s an example: `AAPL`. Instead of just embedding the `AAPL` label, we generate
    a hybrid description like this:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子：`AAPL`。我们不仅嵌入`AAPL`标签，还生成一个如下所示的混合描述：
- en: '[PRE24]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Notice what happened:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 注意发生了什么：
- en: We combined the class (`Stock`), the label (`AAPL`), the ticker (`[AAPL]`),
    the issuer (`Apple Inc.`), the regulator (`SEC`), and even multi-hop information
    (the issuer itself is regulated by the SEC)
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们结合了类别（`Stock`）、标签（`AAPL`）、股票代码（`[AAPL]`）、发行者（`Apple Inc.`）、监管机构（`SEC`），甚至多跳信息（发行者本身受SEC监管）
- en: This creates a richer, semantically meaningful snapshot of AAPL that covers
    not only its direct properties but also its connected context
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这为AAPL创建了一个更丰富、语义上更有意义的快照，不仅涵盖了其直接属性，还涵盖了其连接的上下文
- en: Why does it matter for RAG?
  id: totrans-240
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 这对RAG有什么意义？
- en: 'This technique is the secret sauce for making KGs dramatically more effective
    in RAG pipelines:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术是使KG在RAG管道中显著更有效的秘密配方：
- en: '**Improved recall**: Queries such as *equities regulated by SEC* will find
    AAPL, even though the word “equity” doesn’t exist in the raw graph labels. The
    embedding captures the meaning.'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高召回率**：例如，查询“由SEC监管的股票”将找到AAPL，即使“股票”这个词在原始图标签中不存在。嵌入体捕捉到了其含义。'
- en: '**Graph and vector synergy**: Semantic search helps discover the right entities,
    and then Neo4j’s Cypher queries bring back the exact structured facts. It’s the
    best of both worlds.'
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图和向量协同**：语义搜索有助于发现正确的实体，然后Neo4j的Cypher查询返回精确的结构化事实。这是两者的最佳结合。'
- en: '**Multi-hop reasoning baked in**: By embedding enriched descriptions (up to
    *N* hops away), the system already *knows* second-order relationships before the
    search. That means when someone asks about an issuer’s regulator, the embedding
    has a good chance of surfacing the right entity even before Cypher expansion.'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内置多跳推理**：通过嵌入丰富描述（最多*N*跳），系统在搜索之前已经“知道”了二阶关系。这意味着当有人询问发行者的监管机构时，嵌入体有很好的机会在Cypher展开之前就揭示正确的实体。'
- en: In short, hybrid embeddings transform your graph from a static database into
    a semantically aware retrieval engine. They bridge the gap between natural language
    queries and structured graph facts, giving your RAG pipeline the ability to understand
    both intent and ground answers in precise relationships.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，混合嵌入将您的图从静态数据库转变为语义感知的检索引擎。它们在自然语言查询和结构化图事实之间架起桥梁，使您的RAG管道能够理解意图和精确关系中的基础答案。
- en: This is one of the biggest reasons why KG-based RAG often outperforms traditional
    vector-only RAG.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 这是基于KG的RAG经常优于传统仅向量RAG的最大原因之一。
- en: Step 6.1 – build an enriched hybrid text (with multi-hop)
  id: totrans-247
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.1步 - 构建丰富的混合文本（含多跳）
- en: 'This step builds *hybrid* text descriptions for ontology entities, combining
    their own properties with related facts from connected nodes, so they can be embedded
    for semantic search:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤为本体实体构建*混合*文本描述，结合它们自己的属性和连接节点的相关事实，以便它们可以嵌入进行语义搜索：
- en: '[PRE25]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Here’s what the code does:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码做了什么：
- en: Defines a function that takes a class label (e.g., `"Stock"`, `"Bond"`) and
    queries Neo4j for all `:Resource` nodes belonging to that class via an `:IS_A`
    relationship
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义了一个函数，该函数接受一个类别标签（例如，`"Stock"`、`"Bond"`）并通过`:IS_A`关系查询Neo4j中属于该类别的所有`:Resource`节点
- en: Optionally matches related nodes connected through `ISSUED_BY`, `IS_REGULATED_BY`,
    and the issuer’s own `IS_REGULATED_BY` relationships to capture multi-hop context
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可选地匹配通过`ISSUED_BY`、`IS_REGULATED_BY`以及发行者自身的`IS_REGULATED_BY`关系连接的相关节点，以捕获多跳上下文
- en: Uses Cypher string concatenation and conditional logic to combine the class
    label, node label, ticker, issuer, regulator, comments, and issuer’s regulator
    into a single descriptive text string (`hybridText`)
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Cypher字符串连接和条件逻辑将类别标签、节点标签、股票代码、发行者、监管机构、注释以及发行者的监管机构组合成一个单一的描述性文本字符串（`hybridText`）
- en: Returns a DataFrame containing each node’s ID, class label, and generated hybrid
    text
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回一个包含每个节点ID、类别标签和生成的混合文本的DataFrame
- en: Calls the function for `"Stock"` and `"Bond"` to produce enriched descriptions
    for those classes and displays the first few results in each
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用`"Stock"`和`"Bond"`的函数以生成这些类别的丰富描述，并显示每个类别的几个结果
- en: The output will be the DataFrames
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出将是DataFrame
- en: Now let’s extend this approach to include all entity types in our ontology,
    creating a comprehensive dataset of enriched descriptions for semantic search.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们扩展这种方法，将我们的本体中的所有实体类型都包括在内，创建一个用于语义搜索的丰富描述的全面数据集。
- en: Step 6.2 – include more entity types
  id: totrans-258
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.2步 - 包含更多实体类型
- en: 'The following code generates hybrid text entries for the `Organization` and
    `RegulatoryAuthority` classes, then combines them with the previously created
    `Stock` and `Bond` entries into a single DataFrame. It prints the total number
    of entries and displays the first 10 rows for inspection:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码为`Organization`和`RegulatoryAuthority`类生成混合文本条目，然后将它们与之前创建的`Stock`和`Bond`条目合并到一个DataFrame中。它打印出条目的总数并显示前10行以供检查：
- en: '[PRE26]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The output of this code will also be the DataFrames.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码的输出也将是DataFrames。
- en: Step 6.3 – export for embedding service
  id: totrans-262
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.3步 – 导出用于嵌入服务
- en: 'Now that we’ve generated enriched hybrid text for all our entities, let’s save
    this data to a CSV file. This creates a clean record of our hybrid descriptions
    and makes it easy to regenerate embeddings later if needed:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经为所有实体生成了丰富的混合文本，让我们将这些数据保存到CSV文件中。这创建了一个关于混合描述的干净记录，并在需要时可以轻松地重新生成嵌入：
- en: '[PRE27]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Here’s the output:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是输出：
- en: '[PRE28]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Here’s how this fits in your graph-based RAG pipeline:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是它在基于图的RAG管道中的位置：
- en: Generate enriched hybrid text (this step).
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成丰富的混合文本（本步骤）。
- en: Embed these strings with a semantic embedding model (e.g., OpenAI text-embedding-3-large).
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用语义嵌入模型（例如，OpenAI text-embedding-3-large）嵌入这些字符串。
- en: Store the vectors in a vector DB or Neo4j’s native vector index.
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将向量存储在向量数据库或Neo4j的本地向量索引中。
- en: 'Query flow:'
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询流程：
- en: Embed the user’s question.
  id: totrans-272
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 嵌入用户的问题。
- en: Search the vector index for similar hybrid text entries.
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在向量索引中搜索相似的混合文本条目。
- en: Take the matched IDs back to Neo4j.
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将匹配的ID返回到Neo4j。
- en: Expand via Cypher for structured facts and multi-hop reasoning.
  id: totrans-275
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过Cypher扩展结构化事实和多跳推理。
- en: Pass both the hybrid text and structured facts into the LLM for answer generation.
  id: totrans-276
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将混合文本和结构化事实传递给LLM以生成答案。
- en: Step 6.4 – embeddings and vectorstore
  id: totrans-277
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.4步 – 嵌入和向量存储
- en: 'This step converts the hybrid text descriptions into numerical embeddings and
    stores them in a FAISS vector index so they can be quickly retrieved by semantic
    similarity:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤将混合文本描述转换为数值嵌入并将它们存储在FAISS向量索引中，以便可以通过语义相似性快速检索：
- en: '[PRE29]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'Here’s what the preceding code does:'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是前述代码执行的操作：
- en: Defines a custom `STEmbeddings` class that uses a local `SentenceTransformer`
    model to generate normalized embeddings for both documents and queries, avoiding
    any external API calls
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义了一个自定义的`STEmbeddings`类，该类使用本地的`SentenceTransformer`模型为文档和查询生成归一化嵌入，避免任何外部API调用
- en: Instantiates the embedder with the `"all-MiniLM-L6-v2"` model for lightweight,
    fast vector generation
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`"all-MiniLM-L6-v2"`模型实例化嵌入器，以实现轻量级、快速的向量生成
- en: Creates a list of LangChain `Document` objects from the `hybrid_df` DataFrame,
    storing each entity’s hybrid text and associated metadata (`id` and `class_label`)
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从`hybrid_df` DataFrame创建一个LangChain `Document`对象列表，存储每个实体的混合文本和相关元数据（`id`和`class_label`）
- en: Uses LangChain’s FAISS integration to build an in-memory vector store from these
    documents using the custom embedder
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用LangChain的FAISS集成从这些文档中构建内存中的向量存储，使用自定义嵌入器
- en: Creates a retriever from the vector store, configured to return the top five
    most similar documents for a given query
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从向量存储创建一个检索器，配置为返回给定查询最相似的五个文档
- en: With our hybrid text descriptions now embedded and indexed for fast similarity
    search, let’s create helper functions that combine semantic search with graph
    traversal to provide rich, contextual results.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经将混合文本描述嵌入并索引以进行快速相似性搜索，让我们创建结合语义搜索和图遍历以提供丰富、上下文相关的结果的辅助函数。
- en: Step 6.5 – semantic search helper and graph expansion using LangChain FAISS
  id: totrans-287
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.5步 – 使用LangChain FAISS的语义搜索助手和图扩展
- en: 'Use the LangChain FAISS vector store to search the hybrid text. The `search_hybrid()`
    function returns a DataFrame with `id`, `class_label`, `hybridText`, and `score`
    (`score` is the distance from FAISS; lower is better). We also add the `expand_in_graph()`
    function to give a list of Neo4j node IDs and fetch a small neighborhood (uses
    the driver from earlier steps):'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LangChain FAISS向量存储搜索混合文本。`search_hybrid()`函数返回一个包含`id`、`class_label`、`hybridText`和`score`（`score`是FAISS的距离；越低越好）的DataFrame。我们还添加了`expand_in_graph()`函数，以提供一个Neo4j节点ID列表并获取一个小邻域（使用早期步骤中的驱动程序）：
- en: '[PRE30]'
  id: totrans-289
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Here’s what the code does:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是代码执行的操作：
- en: '`search_hybrid`:'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`search_hybrid`:'
- en: Runs a similarity search over the FAISS vector store to find the top *k* hybrid
    text entries most relevant to a query
  id: totrans-292
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在FAISS向量存储上运行相似性搜索，以找到与查询最相关的最顶部*k*个混合文本条目
- en: Collects each match’s ID, class label, hybrid text, and similarity score into
    a list
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个匹配项的ID、类别标签、混合文本和相似度分数收集到一个列表中
- en: Returns the matches as a pandas DataFrame for easier viewing and filtering
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将匹配项作为pandas DataFrame返回，以便更容易查看和过滤
- en: '`expand_in_graph`:'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`expand_in_graph`:'
- en: Connects to Neo4j and retrieves nodes whose IDs are in the given list
  id: totrans-296
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接到Neo4j并检索给定列表中ID的节点
- en: Optionally matches neighboring nodes up to the specified number of hops (depth)
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可选地匹配最多指定跳数的相邻节点
- en: Returns each node’s ID, label, ticker, comment, and a list of its neighbors’
    labels (or IDs if no label exists)
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回每个节点的ID、标签、股票代码、评论以及其邻居标签的列表（如果没有标签，则为ID）
- en: Outputs the results as a list of dictionaries for further processing or display
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将结果作为字典列表输出，以供进一步处理或显示
- en: Let’s test these helper functions with some real queries to see how well our
    hybrid embedding approach captures semantic meaning and retrieves relevant financial
    entities.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一些实际的查询来测试这些辅助函数，看看我们的混合嵌入方法如何捕捉语义含义并检索相关的金融实体。
- en: Step 6.6 – try it out
  id: totrans-301
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6.6步 - 尝试一下
- en: 'Here are example natural language queries to test:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些示例自然语言查询以进行测试：
- en: '[PRE31]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Here’s what the code does:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码的功能：
- en: Defines a list of example natural language search queries to test the hybrid
    search and graph expansion workflow
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个示例自然语言搜索查询列表以测试混合搜索和图扩展工作流程
- en: Loops through each query, printing it with a search icon for clarity
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历每个查询，并打印带有搜索图标的内容以提高清晰度
- en: Uses `search_hybrid` to retrieve the top five most semantically similar hybrid
    text entries from the vector store
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`search_hybrid`从向量存储中检索与给定查询最语义相似的五个混合文本条目
- en: Displays a table of the top matches showing class label, ID, hybrid text, and
    similarity score
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显示一个显示类别标签、ID、混合文本和相似度分数的顶部匹配项表
- en: Selects the top three matches by ID and calls `expand_in_graph` to fetch their
    connected nodes up to two hops away
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过ID选择前三个匹配项，并调用`expand_in_graph`以获取其最多两个跳数的连接节点
- en: Prints a concise view of each expanded node’s label, ticker (if available),
    and a sample of up to six neighboring node labels
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印每个扩展节点的标签、股票代码（如有），以及最多六个相邻节点标签的样本
- en: 'This enables the following:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得以下操作成为可能：
- en: '**Local embedding and search**: No cloud services; fast iteration in your notebook'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地嵌入和搜索**：无云服务；在笔记本中快速迭代'
- en: '**RAG-ready**: For a user query, you can now do the following:'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG-ready**：对于用户查询，您现在可以执行以下操作：'
- en: Embed the query and retrieve the most similar graph entities via FAISS
  id: totrans-314
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过FAISS嵌入查询并检索最相似的图实体
- en: Expand those entities in Neo4j with Cypher to collect precise, multi-hop facts
  id: totrans-315
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Cypher在Neo4j中扩展这些实体以收集精确的多跳事实
- en: Assemble that context and pass it to your LLM for grounded answers
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将此上下文组装并传递给您的LLM以获得基于事实的答案
- en: Now that we’ve validated that our semantic search and graph expansion capabilities
    work effectively, let’s integrate these components into a complete retrieval pipeline
    that produces context ready for LLM consumption.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经验证了我们的语义搜索和图扩展功能有效，让我们将这些组件集成到一个完整的检索管道中，该管道产生LLM消费的上下文。
- en: Step 7 – vector search and graph expansion (ready-to-prompt context)
  id: totrans-318
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第7步 - 向量搜索和图扩展（准备好的提示上下文）
- en: 'We’ll wire the pieces together so that a natural language query is able to
    do the following:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把这些部分连接起来，以便自然语言查询能够执行以下操作：
- en: Gets embedded and matched against your hybrid text vectors.
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将嵌入的内容与您的混合文本向量进行匹配。
- en: Pulls back the top entities.
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检索顶部实体。
- en: Expands each hit in Neo4j to fetch related facts.
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Neo4j中扩展每个匹配项以获取相关事实。
- en: Returns a compact, LLM-ready context block (plus simple citations) you can drop
    into a prompt.
  id: totrans-323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回一个紧凑的、LLM就绪的上下文块（加上简单的引用），您可以将其放入提示中。
- en: 'Step 7.1 – helper: vector search and graph expansion'
  id: totrans-324
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第7.1步 - 辅助：向量搜索和图扩展
- en: 'We conduct a semantic search over the LangChain FAISS vector store built in
    *Step 6*, and return a DataFrame with `id`, `class_label`, `hybridText`, and `score`
    columns:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在*第6步*中构建的LangChain FAISS向量存储中执行语义搜索，并返回一个包含`id`、`class_label`、`hybridText`和`score`列的DataFrame：
- en: '[PRE32]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'There is a lot going on in this code, so let’s try to break it down succinctly,
    starting with the `vector_search` function:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码中有很多内容，所以让我们尝试简洁地分解它，从`vector_search`函数开始：
- en: Performs a semantic similarity search in the FAISS vector store for the given
    query, returning the top *k* matches
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在FAISS向量存储中针对给定查询执行语义相似度搜索，返回顶部*k*个匹配项
- en: Extracts each match’s ID, class label, hybrid text, and similarity score into
    a list
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个匹配项的ID、类别标签、混合文本和相似度分数提取到列表中
- en: Returns the matches as a pandas DataFrame for easy viewing and further processing
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将匹配项作为pandas DataFrame返回，以便轻松查看和进一步处理
- en: 'This is similar to what we’ve seen many times now, setting up the code to do
    a vector search. We then add the `graph_expand` function:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们现在看到的类似，设置代码进行向量搜索。然后我们添加 `graph_expand` 函数：
- en: Connects to Neo4j and retrieves all nodes whose IDs match the provided list
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接到 Neo4j 并检索所有 ID 与提供的列表匹配的节点
- en: Expands each node’s neighborhood up to the specified number of hops (depth)
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个节点的邻域扩展到指定的跳数（深度）
- en: Returns each node’s ID, label, ticker, comment, and a list of its neighbors’
    labels or IDs
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回每个节点的 ID、标签、股票代码、注释以及其邻居的标签或 ID 列表
- en: This introduces newer concepts that are more specific to working with KGs, but
    fundamentally, we are conducting the data retrieval in this function.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 这引入了更具体的新概念，这些概念更适用于与 KG 一起工作，但本质上，我们在该函数中执行数据检索。
- en: 'The next function is probably the most interesting function, though: `build_llm_context()`.
    This function orchestrates the pipeline by searching, expanding, and formatting
    the results. But what is this format? This may seem different than anything we’ve
    seen in the past. This function converts our KG relationships output into Python
    static dictionaries. You have different options for how you want to present your
    KG data to your LLM:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个函数可能是最有趣的函数：`build_llm_context()`。这个函数通过搜索、扩展和格式化结果来协调管道。但这是什么格式呢？这可能与我们过去所见过的任何东西都不同。这个函数将我们的
    KG 关系输出转换为 Python 静态字典。您有不同选项来决定如何向您的 LLM 展示您的 KG 数据：
- en: '**Natural language**: This is where you take the structured format from the
    KG output and turn it into natural language sentences. So, you might have text
    that says “AAPL is a Stock that is issued by Apple Inc. and is regulated by the
    SEC.” This approach is intuitive and easy to read, but can become verbose for
    complex multi-hop relationships and may introduce ambiguity that the LLM has to
    parse.'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言**：这是您将知识图谱（KG）输出的结构化格式转换为自然语言句子的地方。因此，您可能会看到这样的文本：“AAPL 是由苹果公司发行并由美国证券交易委员会（SEC）监管的股票。”这种方法直观易读，但对于复杂的多跳关系可能会变得冗长，并可能引入
    LLM 需要解析的歧义。'
- en: '**JSON**: It is very common to see KG output in JSON format, where you have
    the nodes in one list and the edges in another list. The LLM naturally understands
    this format because it is so common and standardized, and it has seen a lot of
    the same kind of format in its training and fine-tuning.'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**JSON**：在 JSON 格式中看到 KG 输出非常常见，其中节点在一个列表中，边在另一个列表中。LLM 自然理解这种格式，因为它非常常见且标准化，并且在训练和微调中已经看到了很多类似的格式。'
- en: However, we are introducing a third format – Python static dictionaries, based
    on recent research by Wu and Tsioutsiouliklis (2024) – which demonstrates that
    this representation significantly outperforms other formats for LLM reasoning.
    You will likely need to introduce dynamic elements to your data as well, which
    we do not do here, but in that case, you can add this right into this format because
    it is Python code already! See the information box for more information on this
    paper.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们引入了第三种格式——基于 Wu 和 Tsioutsiouliklis（2024）最近的研究的 Python 静态字典，该研究证明了这种表示在
    LLM 推理方面显著优于其他格式。您可能还需要向数据中引入动态元素，我们在这里没有这样做，但在这种情况下，您可以直接将此添加到该格式中，因为它已经是 Python
    代码！有关该论文的更多信息，请参阅信息框。
- en: '**Thinking with KGs – enhancing LLM reasoning through structured data**'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用知识图谱进行思考——通过结构化数据增强 LLM 推理**'
- en: 'Wu and Tsioutsiouliklis (2024) conducted comprehensive experiments comparing
    how different KG representations affect LLM reasoning performance. Their groundbreaking
    finding: programming language representations – specifically Python static dictionaries
    –dramatically outperform both natural language and JSON formats for multi-hop
    reasoning tasks.'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: Wu 和 Tsioutsiouliklis（2024）进行了全面的实验，比较了不同的 KG 表示如何影响 LLM 推理性能。他们的突破性发现：编程语言表示——特别是
    Python 静态字典——在多跳推理任务中显著优于自然语言和 JSON 格式。
- en: The researchers tested three representation formats across multiple datasets.
    Natural language representation achieved modest improvements (44.6% accuracy),
    while JSON actually decreased performance (26.1% accuracy) compared to the baseline.
    However, the Python static dictionary format achieved 67.9% accuracy, which is
    a 78% improvement over the baseline. Even more impressive, when LLMs were fine-tuned
    with Python representations, accuracy jumped to 91.5%, surpassing much larger
    models. The study attributes this success to Python’s unambiguous structure and
    the fact that LLMs are extensively pretrained on code, allowing them to mentally
    “execute” dictionary lookups as explicit reasoning steps rather than ambiguous
    pattern matching.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员在多个数据集上测试了三种表示格式。自然语言表示实现了适度的改进（44.6%的准确率），而与基线相比，JSON实际上降低了性能（26.1%的准确率）。然而，Python静态字典格式实现了67.9%的准确率，这比基线提高了78%。更令人印象深刻的是，当LLMs使用Python表示进行微调时，准确率跃升至91.5%，超过了更大的模型。这项研究将这一成功归因于Python的无歧义结构和LLMs在代码上的广泛预训练，这使得它们能够将字典查找视为明确的推理步骤而不是模糊的模式匹配。
- en: 'This research fundamentally changes how we should approach KG integration with
    LLMs. By representing relationships as `relationships[''property''][''entity'']`
    rather than prose or JSON arrays, we transform vague semantic relationships into
    precise computational operations. The LLM doesn’t just read about relationships—it
    can traverse them like executing code. This is why our `build_llm_context()` function
    outputs Python dictionaries: it’s not just a formatting choice, it’s a scientifically-proven
    method for enhancing LLM reasoning accuracy by treating knowledge retrieval as
    program execution rather than text comprehension.'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究从根本上改变了我们如何接近LLMs与KG的集成。通过将关系表示为`relationships['property']['entity']`而不是散文或JSON数组，我们将模糊的语义关系转化为精确的计算操作。LLM不仅阅读关于关系的内容——它还可以像执行代码一样遍历它们。这就是为什么我们的`build_llm_context()`函数输出Python字典：这不仅仅是一个格式选择，这是一个经过科学验证的方法，通过将知识检索视为程序执行而不是文本理解来提高LLM推理的准确性。
- en: 'Reference: Wu, Z., and Tsioutsiouliklis, K. (2024). *Thinking with Knowledge
    Graphs: Enhancing LLM Reasoning Through Structured Data*. Available at [https://arxiv.org/abs/2412.10654](https://arxiv.org/abs/2412.10654).'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 参考：Wu, Z. 和 Tsioutsiouliklis, K. (2024)。*用知识图谱思考：通过结构化数据增强LLM推理*。可在[https://arxiv.org/abs/2412.10654](https://arxiv.org/abs/2412.10654)获取。
- en: Now let’s see this complete retrieval pipeline in action with a practical example
    that demonstrates how our system transforms a natural language query into a structured,
    citable context.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过一个实际示例来查看这个完整的检索管道是如何工作的，该示例展示了我们的系统如何将自然语言查询转化为结构化、可引用的上下文。
- en: Step 7.2 – example usage
  id: totrans-346
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第7.2步 – 示例用法
- en: 'Let’s test the retrieval pipeline with a real query to see how it transforms
    natural language into a structured context ready for the LLM:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个实际的查询来测试检索管道，看看它是如何将自然语言转化为LLM准备的结构化上下文的：
- en: '[PRE33]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: You should see a compact, human-readable context block that includes the hybrid
    text, notes, and related entities for each hit, with simple citation keys such
    as `[E1]` and `[E2]`.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到一个紧凑、易于阅读的上下文块，其中包括每个命中项的混合文本、注释和相关实体，以及简单的引用键，如`[E1]`和`[E2]`。
- en: Step 7.3 – return a prompt template
  id: totrans-350
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第7.3步 – 返回一个提示模板
- en: 'If you want a ready-to-use prompt for an LLM, this helper creates a standard
    instruction, context, and question format:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要一个为LLM准备的提示，这个辅助工具创建了一个标准的指令、上下文和问题格式：
- en: '[PRE34]'
  id: totrans-352
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: With our prompt template defined, let’s summarize what we’ve built and the capabilities
    it enables for production-ready graph-based RAG systems.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了我们的提示模板后，让我们总结一下我们构建的内容以及它为生产就绪的图基础RAG系统提供的功能。
- en: 'Here’s what this enables:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得以下成为可能：
- en: '**Runnable graph-based RAG retrieval**:Semantic search → graph expansion →
    Python dictionary context'
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可执行的图基础RAG检索**：语义搜索 → 图扩展 → Python字典上下文'
- en: '**Grounded reasoning**: The Python dictionary format provides unambiguous entity-relationship
    mappings that reduce hallucination'
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于事实的推理**：Python字典格式提供了明确的实体-关系映射，这减少了幻觉'
- en: '**Traceability**: Citation keys map to concrete graph node IDs for verification'
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可追溯性**：引用键映射到具体的图节点ID以进行验证'
- en: '**Swap-in flexibility**:You can later replace FAISS or the embedding model
    without changing the flow'
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**替换灵活性**：你可以稍后替换FAISS或嵌入模型，而无需更改流程'
- en: With our retrieval pipeline fully operational and producing structured, citable
    context, we’re ready to complete the RAG cycle by adding the generation component.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的检索管道完全运行并产生结构化、可引用的上下文后，我们准备通过添加生成组件来完成RAG循环。
- en: Step 8 – generate with LangChain and OpenAI
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第8步 – 使用LangChain和OpenAI生成
- en: To complete our graph-based RAG implementation, let’s add the generation component
    that transforms our retrieved context into natural language answers. This final
    step demonstrates how all the pieces—ontology, KG, hybrid embeddings, and semantic
    search—come together to answer the competency questions we defined back in [*Chapter
    13*](B34736_13_ePub.xhtml#_idTextAnchor299).
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完成我们的基于图的RAG实现，让我们添加生成组件，将检索到的上下文转换为自然语言答案。这一最终步骤展示了如何将本体、知识图谱、混合嵌入和语义搜索的所有部件结合起来，以回答我们在[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)中定义的能力问题。
- en: 'Now, let’s build a complete LangChain pipeline that combines our retriever
    with the prompt template and LLM to generate answers to user queries:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们构建一个完整的LangChain管道，将我们的检索器与提示模板和LLM结合起来，以生成对用户查询的答案：
- en: '[PRE35]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'In this “pipeline” code, we see the following:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个“管道”代码中，我们看到以下内容：
- en: '`make_context`: Calls `build_llm_context` to retrieve and format the knowledge
    graph context'
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`make_context`: 调用`build_llm_context`以检索和格式化知识图谱上下文'
- en: '`RunnableLambda`: Wraps the context function for use in the LangChain pipeline'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`RunnableLambda`: 将上下文函数包装以用于LangChain管道'
- en: '`chat_prompt`: Applies the prompt template to guide the LLM’s response style'
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`chat_prompt`: 应用提示模板以引导LLM的响应风格'
- en: '`llm`: Generates the answer using the structured context'
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`llm`: 使用结构化上下文生成答案'
- en: '`StrOutputParser`: Extracts the plain text response'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`StrOutputParser`: 提取纯文本响应'
- en: 'The expected output is individual results for each of the five queries:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 预期输出是针对五个查询的每个查询的单独结果：
- en: '[PRE36]'
  id: totrans-371
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'Let’s bring this all the way back to *Step 1* of *Code lab 13.1*, where we
    defined our initial competency questions:'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到*代码实验室13.1的第1步*，在那里我们定义了我们的初始能力问题：
- en: '`Is AAPL a stock or a bond?`'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AAPL是股票还是债券？`'
- en: '`What type of instrument is USTB?`'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`USTB是什么类型的工具？`'
- en: '`Which authority regulates MSFT?`'
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`哪个机构监管MSFT？`'
- en: '`Which equities are regulated by the SEC, and who issues them?`'
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`哪些股票受SEC监管，谁发行它们？`'
- en: '`What stocks do you know? What bonds?`'
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`你知道哪些股票？哪些债券？`'
- en: 'These answers directly address our original competency questions from [*Chapter
    13*](B34736_13_ePub.xhtml#_idTextAnchor299), demonstrating that the graph-based
    RAG system successfully:'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 这些答案直接针对我们原始的能力问题来自[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)，证明了基于图的RAG系统成功：
- en: Identifies instrument types (stock vs. bond)
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别工具类型（股票与债券）
- en: Retrieves regulatory relationships
  id: totrans-380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索监管关系
- en: Performs multi-hop reasoning (finding issuers of SEC-regulated equities)
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行多跳推理（找到受SEC监管的股票发行者）
- en: Summarizes available knowledge from the graph
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结图中的可用知识
- en: The Python dictionary format ensures that the LLM grounds its answers in the
    structured KG rather than relying on potentially outdated or hallucinated information
    from its training data.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: Python 字典格式确保了LLM在回答问题时基于结构化知识图谱，而不是依赖于可能过时或幻觉的训练数据信息。
- en: With our graph-based RAG system now complete and successfully answering complex
    queries, you have a powerful foundation for domain-specific AI applications. The
    combination of formal ontology design, KG implementation, hybrid embeddings, and
    Python dictionary representation creates a system that can handle everything from
    simple lookups to multi-hop reasoning tasks. As your knowledge requirements grow
    and evolve, the following best practices will help you maintain and scale this
    architecture effectively.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们基于图的RAG系统已经完成并成功回答了复杂查询，你拥有了强大的领域特定AI应用的基础。形式化本体设计、知识图谱实现、混合嵌入和Python字典表示的结合，创建了一个能够处理从简单查找到多跳推理任务的系统。随着你的知识需求增长和演变，以下最佳实践将帮助你有效地维护和扩展这个架构。
- en: Best practices and next steps
  id: totrans-385
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最佳实践和下一步计划
- en: Continue to use Protégé for ontology evolution and annotation.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用Protégé进行本体演化和注释。
- en: Periodically export and re-import the updated ontology to Neo4j using the preceding
    steps.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 定期使用前面的步骤将更新的本体导出并重新导入Neo4j。
- en: Use constraints, indexing, and anchor nodes to keep your KG clean and fast.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 使用约束、索引和锚节点来保持你的知识图谱干净且快速。
- en: Layer on full-text, semantic, and path queries for agent retrieval.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 为代理检索添加全文、语义和路径查询。
- en: 'Here’s a summary of what we did in this code lab:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们在本次代码实验室中完成的工作总结：
- en: Built ontology in Protégé
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Protégé中构建本体
- en: Export as RDF/XML or OWL
  id: totrans-392
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导出为RDF/XML或OWL
- en: Converted CSVs to Neo4j using Python/RDFLib
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Python/RDFLib将CSV转换为Neo4j
- en: Imported nodes/edges, and added schema constraints and anchor nodes
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入节点/边，并添加了模式约束和锚节点
- en: Leveraged both keyword and semantic graph queries in our RAG pipeline
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们的RAG管道中利用了关键词和语义图查询
- en: It is not uncommon for data scientists to generate much larger ontologies using
    either off-the-shelf ontologies or custom ontologies developed in-house. If the
    ontology is already generated, you can write code to convert it into a format
    that you can upload to Neo4j.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家使用现成的本体或内部开发的定制本体生成更大的本体并不罕见。如果本体已经生成，你可以编写代码将其转换为可以上传到Neo4j的格式。
- en: Summary
  id: totrans-397
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we successfully transformed the financial ontology from [*Chapter
    13*](B34736_13_ePub.xhtml#_idTextAnchor299) into a functioning knowledge graph
    within Neo4j, demonstrating the power of graph-based RAG. Through our implementation,
    we showed how to convert RDF triples into a property graph, create navigational
    structures with anchor nodes, and implement hybrid embeddings that combine textual
    descriptions with graph topology. The resulting system can answer our original
    competency questions, from simple classifications such as “Is AAPL a stock or
    bond?” to complex multi-hop queries such as “Which equities are regulated by the
    SEC?”, by traversing explicit relationships rather than relying solely on vector
    similarity. This approach grounds AI agents in verified domain knowledge while
    maintaining the flexibility to handle natural language queries.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们成功地将第13章中[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)的金融本体转换成了Neo4j中的功能知识图谱，展示了基于图的RAG的强大功能。通过我们的实现，我们展示了如何将RDF三元组转换为属性图，使用锚节点创建导航结构，并实现结合文本描述与图拓扑的混合嵌入。该系统可以回答我们的原始能力问题，从简单的分类，如“AAPL是股票还是债券？”到复杂的多跳查询，如“哪些股票受到SEC的监管？”，通过遍历显式关系而不是仅仅依赖向量相似性。这种方法将AI代理建立在经过验证的领域知识之上，同时保持处理自然语言查询的灵活性。
- en: The combination of the ontological structure from [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299)
    with the graph implementation in this chapter creates a powerful foundation for
    domain-specific AI agents. By enriching entities with multi-hop context and enabling
    both semantic search and precise graph traversal, we’ve built a system that grounds
    LLM responses in verified, structured knowledge while maintaining the flexibility
    to handle natural language queries.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 将第13章中[*第13章*](B34736_13_ePub.xhtml#_idTextAnchor299)的本体结构与本章的图实现相结合，为特定领域的AI代理提供了一个强大的基础。通过丰富实体以多跳上下文，并启用语义搜索和精确的图遍历，我们构建了一个系统，该系统将LLM的响应建立在经过验证的结构化知识之上，同时保持处理自然语言查询的灵活性。
- en: Be sure not to limit yourself to ontologies when it comes to the content in
    your KGs! While we used ontology as our example across these two chapters because
    it really is something most RAG applications can benefit from, there are so many
    other ways to effectively use KGs with RAG. Now that you have the basics, think
    through other parts of your data infrastructure that could benefit from the same
    approach and implement them as well!
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理你的KGs中的内容时，务必不要将自己限制在本体上！虽然我们在这两章中用本体作为例子，因为本体确实是大多数RAG应用都能从中受益的东西，但还有许多其他有效使用KGs与RAG结合的方法。现在你已经掌握了基础知识，思考一下你数据基础设施的其他部分，看看是否也能从中受益，并将它们也实施起来！
- en: 'With your graph-based RAG foundation in place, you’re ready to tackle the next
    critical challenge in production AI systems: performance optimization. [*Chapter
    15*](B34736_15_ePub.xhtml#_idTextAnchor346) introduces semantic caches, which
    are an evolution of RAG concepts that dramatically reduce latency and computational
    costs by intelligently storing and retrieving previous query results. Just as
    knowledge graphs gave your agent deeper reasoning capabilities, semantic caches
    will make those capabilities practical at scale, potentially improving response
    times by 10–100x while maintaining accuracy. This combination of rich knowledge
    representation and efficient caching forms the backbone of production-grade agentic
    AI systems.'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的基于图的RAG基础已经建立之后，你准备好应对生产级AI系统中的下一个关键挑战：性能优化。[*第15章*](B34736_15_ePub.xhtml#_idTextAnchor346)介绍了语义缓存，这是RAG概念的演变，通过智能地存储和检索之前的查询结果，显著降低了延迟和计算成本。正如知识图谱赋予了你的代理更深入的推理能力一样，语义缓存将使这些能力在规模上变得实用，可能将响应时间提高10-100倍，同时保持准确性。这种丰富知识表示和高效缓存的结合构成了生产级代理AI系统的核心。
- en: Subscribe for a free eBook
  id: totrans-402
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 免费订阅电子书
- en: New frameworks, evolving architectures, research drops, production breakdowns
    – AI_Distilled filters the noise into a weekly briefing for engineers and researchers
    working hands-on with LLMs and generative AI systems. Subscribe now and receive
    a free eBook, along with weekly insights that help you stay focused and informed.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 新框架、演进的架构、研究突破、生产故障——AI_Distilled将噪音过滤成每周简报，供那些与LLMs和生成式AI系统实际操作工程师和研究人员参考。现在订阅，即可获得免费电子书，以及每周的洞察力，帮助你保持专注并获取信息。
