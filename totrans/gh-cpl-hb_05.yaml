  zh: 第2部分
- en: Getting Started with GitHub Copilot
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始使用GitHub Copilot
- en: 'The second part of the book will go into the main features in the different
    supported editors in depth: we start with suggestions while you type and take
    you to the chat interface with its different modes (Ask, Edit, and Agent Mode).
    You’ll learn what the differences between these modes are, and when to use them
    for different types of tasks.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本书第二部分将深入探讨不同支持编辑器中的主要功能：我们从您键入时的建议开始，带您进入具有不同模式的聊天界面（询问、编辑和代理模式）。您将了解这些模式之间的区别，以及在不同类型的任务中何时使用它们。
- en: After getting to know the main features, we take things a step further by showing
    additional functionalities that extend the editor experience, especially during
    debugging. You’ll see how GitHub Copilot integrates with the terminal to make
    fixing runtime errors and debugging issues even easier. We then close off by looking
    at advanced collaboration features in editors, such as the pull request extension
    in VS Code, where GitHub Copilot can assist with writing PR titles and descriptions
    and even help with the initial review, all directly within your editor environment.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解主要功能之后，我们进一步展示了扩展编辑器体验的附加功能，尤其是在调试期间。您将看到GitHub Copilot如何与终端集成，使修复运行时错误和调试问题变得更加容易。然后，我们通过查看编辑器中的高级协作功能来结束讨论，例如VS
    Code中的拉取请求扩展，GitHub Copilot可以直接在您的编辑器环境中协助编写PR标题和描述，甚至帮助进行初步审查。
