- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Are you overflowing with innovative ideas, yet finding it difficult to navigate
    the intricacies of software coding? Utilize **Artificial Intelligence** (**AI**)
    to expedite your **Internet of Things** (**IoT**) development journey!
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 您是否充满了创新想法，但发现难以应对软件编码的复杂性？利用**人工智能**（**AI**）来加速您的**物联网**（**IoT**）开发之旅！
- en: AI is a transformative force that is reshaping our lives, societies, and industries.
    This book guides beginners on how to use AI’s coding abilities to construct their
    first end-to-end IoT prototype. It covers everything from drawing an application
    flow diagram, crafting the hardware prototype, producing embedded C++ example
    code, establishing Wi-Fi connectivity, and accessing **Amazon Web Services** (**AWS**),
    to creating a real-time dashboard on ThingsBoard Cloud.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是一种变革力量，正在重塑我们的生活、社会和产业。本书指导初学者如何使用人工智能的编码能力来构建他们的第一个端到端物联网原型。它涵盖了从绘制应用程序流程图、制作硬件原型、生成嵌入式C++示例代码、建立Wi-Fi连接、访问**亚马逊网络服务**（**AWS**），到在ThingsBoard云上创建实时仪表板的所有内容。
- en: The book ensures a smooth learning curve, starting from the IoT fundamentals,
    architecture, key elements, recommendations, and best practice examples, to a
    thorough step-by-step hands-on project illustration. A distinguishing feature
    of this book is its exploration of recent AI advancements and their transformative
    impact on the IoT world. It emphasizes ChatGPT prompt skills specifically tailored
    for IoT projects and presents a detailed framework for crafting effective ChatGPT
    prompts. This empowers you to harness this powerful tool in your IoT endeavors,
    overcoming barriers related to inadequate software coding skills or experience.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本书确保学习曲线平缓，从物联网基础知识、架构、关键元素、建议和最佳实践示例开始，到详尽的逐步动手项目演示。本书的一个显著特点是探索了最近的AI进步及其对物联网世界的变革性影响。它强调了专门针对物联网项目的ChatGPT提示技能，并呈现了构建有效ChatGPT提示的详细框架。这使您能够利用这个强大的工具在物联网项目中取得进展，克服与软件编码技能或经验不足相关的障碍。
- en: You will be introduced to the PlatformIO IDE on Visual Studio Code, one of the
    most popular embedded software development environments. Additionally, you’ll
    learn about the cutting-edge RISC-V architecture MCU – ESP32, Arduino-compatible
    sensors, and integration methods for the AWS cloud and ThingsBoard dashboard.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 您将介绍Visual Studio Code上的PlatformIO IDE，这是最受欢迎的嵌入式软件开发环境之一。此外，您还将了解前沿的RISC-V架构MCU
    – ESP32、Arduino兼容的传感器以及AWS云和ThingsBoard仪表板的集成方法。
- en: As part of the learning approach, I provide the functional codes generated by
    ChatGPT and prompting instruction examples in the GitHub repo for this book.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为学习方法的一部分，我在本书的GitHub仓库中提供了ChatGPT生成的功能代码和提示指令示例。
- en: By the end of this book, you will be equipped to build your first successful
    IoT prototype, effectively bridging the gap between your innovative ideas and
    functional creations.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书结束时，您将能够构建您的第一个成功的物联网原型，有效地弥合您的创新想法和功能创造之间的差距。
- en: Who this book is for
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这本书面向谁
- en: This book is designed for beginners who are eager to explore the world of IoT
    technology but face obstacles due to limited experience in embedded software coding,
    particularly in C++. The primary audience includes middle- to high-school and
    undergraduate students, hobbyists interested in smart home applications, hardware
    enthusiasts, DIY creators, startup entrepreneurs, educators, and professionals
    from non-technical backgrounds. Often, their innovative potential is hindered
    by the complexity of software coding. Fortunately, AI can serve as an intelligent
    assistant, offering example code to accelerate the development of IoT prototypes.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为那些渴望探索物联网技术世界但受限于嵌入式软件编码经验不足（尤其是在C++方面）的初学者设计的。主要受众包括中学生、高中生、对智能家居应用感兴趣的爱好者、硬件爱好者、DIY创作者、初创企业企业家、教育工作者以及来自非技术背景的专业人士。通常，他们的创新潜力因软件编码的复杂性而受到阻碍。幸运的是，人工智能可以作为智能助手，提供示例代码以加速物联网原型的开发。
- en: This book assumes that readers have a basic understanding of electronic physics,
    knowledge of internet and IP connectivity, a rudimentary grasp of software coding
    structure, and familiarity with basic cloud concepts.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本书假设读者对电子物理有基本了解，了解互联网和IP连接，对软件编码结构有初步掌握，并熟悉基本云概念。
- en: What this book covers
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](B22002_01.xhtml#_idTextAnchor015)*, IoT Essentials, All You Should
    Know*, offers an introduction to the core concepts and components that define
    IoT technologies.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第1章*](B22002_01.xhtml#_idTextAnchor015)*，物联网基础，您应该知道的一切*，介绍了定义物联网技术的核心概念和组件。'
- en: '[*Chapter 2*](B22002_02.xhtml#_idTextAnchor047)*, IoT Network, the Neural System
    of Things*, gives you a detailed look at the infrastructure and architecture of
    IoT systems.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第2章*](B22002_02.xhtml#_idTextAnchor047)*，物联网网络，事物的神经网络*，详细介绍了物联网系统的基础设施和架构。'
- en: '[*Chapter 3*](B22002_03.xhtml#_idTextAnchor068)*, IoT End Devices, the Neuron
    Cells of an IoT System,* helps you understand the role and functionality of the
    devices at the edge of IoT networks.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第3章*](B22002_03.xhtml#_idTextAnchor068)*，物联网终端设备，物联网系统的神经元细胞*，帮助您了解物联网网络边缘设备的作用和功能。'
- en: '[*Chapter 4*](B22002_04.xhtml#_idTextAnchor111)*, Wireless Connectivity, the
    Nervous Pathway to Delivering IoT Data*, explores the wireless technologies that
    convey data within IoT systems.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第4章*](B22002_04.xhtml#_idTextAnchor111)*，无线连接，物联网数据传输的神经通路*，探讨了在物联网系统中传输数据的无线技术。'
- en: '[*Chapter 5*](B22002_05.xhtml#_idTextAnchor170)*, The Cloud, IoT’s “Superpower
    Brain”*, discusses the capabilities and advantages of cloud computing in enhancing
    and scaling IoT applications.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第5章*](B22002_05.xhtml#_idTextAnchor170)*，云，物联网的“超级大脑”*，讨论了云计算在增强和扩展物联网应用方面的能力和优势。'
- en: '[*Chapter 6*](B22002_06.xhtml#_idTextAnchor194)*, Applying ChatGPT in the IoT
    Innovation Journey*, explores how AI can assist in conceptualizing, planning,
    and executing IoT solutions, emphasizing the transformative impact of AI on the
    innovation process.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第6章*](B22002_06.xhtml#_idTextAnchor194)*，在物联网创新之旅中应用ChatGPT*，探讨了人工智能如何协助构思、规划和执行物联网解决方案，强调了人工智能对创新过程变革性影响。'
- en: '[*Chapter 7*](B22002_07.xhtml#_idTextAnchor210)*, Recommendations to Start
    Your First IoT Project*, provides you with practical advice on initiating your
    first IoT projects.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第7章*](B22002_07.xhtml#_idTextAnchor210)*，开始您的第一个物联网项目的建议*，为您提供启动第一个物联网项目的实用建议。'
- en: '[*Chapter 8*](B22002_08.xhtml#_idTextAnchor216)*, 10 Beginner-Friendly IoT
    Projects with ChatGPT Prompts*, details 10 projects using ChatGPT to various extents,
    showcasing how AI can streamline the development process, from sensor integration
    to data handling.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第8章*](B22002_08.xhtml#_idTextAnchor216)*，10个适合初学者的ChatGPT提示物联网项目*，详细介绍了使用ChatGPT在不同程度上进行的10个项目，展示了人工智能如何简化从传感器集成到数据处理的发展过程。'
- en: '[*Chapter 9*](B22002_09.xhtml#_idTextAnchor285)*, Using AI Tools to Draw Application
    Flow Diagrams,* teaches you about the use of AI-driven tools to create IoT application
    flow diagrams.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第9章*](B22002_09.xhtml#_idTextAnchor285)*，使用AI工具绘制应用程序流程图*，教您如何使用AI驱动的工具创建物联网应用程序流程图。'
- en: '[*Chapter 10*](B22002_10.xhtml#_idTextAnchor294)*, Setting Up the Development
    Environment for Your First Project*, provides a detailed guide on how to establish
    a development environment using Visual Studio Code and the PlatformIO IDE.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第10章*](B22002_10.xhtml#_idTextAnchor294)*，为您的第一个项目设置开发环境*，提供了使用Visual Studio
    Code和PlatformIO IDE建立开发环境的详细指南。'
- en: '[*Chapter 11*](B22002_11.xhtml#_idTextAnchor302)*, Programming Your First Code
    on ESP32*, walks through ChatGPT-assisted C++ programming on an ESP32 microcontroller
    to read sensor data locally.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第11章*](B22002_11.xhtml#_idTextAnchor302)*，在ESP32上编写您的第一个代码*，通过ChatGPT辅助的C++编程在ESP32微控制器上读取本地传感器数据。'
- en: '[*Chapter 12*](B22002_12.xhtml#_idTextAnchor311)*, Establishing Wi-Fi Connectivity*,
    explains the steps to configure the ESP32 to connect to a Wi-Fi network.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第12章*](B22002_12.xhtml#_idTextAnchor311)*，建立Wi-Fi连接*，解释了配置ESP32连接到Wi-Fi网络的步骤。'
- en: '[*Chapter 13*](B22002_13.xhtml#_idTextAnchor319)*, Connecting the ESP32 to
    AWS IoT Core*, illustrates the configuration of AWS IoT Core settings, certificate
    management, and how to establish a secure MQTT/TLS connection from the ESP32.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第13章*](B22002_13.xhtml#_idTextAnchor319)*，将ESP32连接到AWS IoT Core*，说明了AWS IoT
    Core设置的配置、证书管理以及如何从ESP32建立安全的MQTT/TLS连接。'
- en: '[*Chapter 14*](B22002_14.xhtml#_idTextAnchor330)*, Publishing Sensor Data to
    AWS IoT Core*, guides you through the process of setting up sensors, collecting
    data, and publishing it to the cloud.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第14章*](B22002_14.xhtml#_idTextAnchor330)*，将传感器数据发布到AWS IoT Core*，指导您设置传感器、收集数据并将其发布到云端。'
- en: '[*Chapter 15*](B22002_15.xhtml#_idTextAnchor338)*, Processing, Storing, and
    Querying Sensor Data on AWS Cloud*, has you practicing tasks to process data via
    Python functions on AWS Lambda and store and query data using AWS IoT Analytics.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第15章*](B22002_15.xhtml#_idTextAnchor338)*，在 AWS 云上处理、存储和查询传感器数据*，让你通过 AWS
    Lambda 上的 Python 函数执行任务，并使用 AWS IoT Analytics 存储和查询数据。'
- en: '[*Chapter 16*](B22002_16.xhtml#_idTextAnchor356)*, Creating a Data Visualization
    Dashboard on ThingsBoard*, explains how to integrate the AWS cloud with ThingsBoard,
    set up real-time data feeds, and build your own dashboards.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第16章*](B22002_16.xhtml#_idTextAnchor356)*，在 ThingsBoard 上创建数据可视化仪表板*，解释了如何将
    AWS 云与 ThingsBoard 集成、设置实时数据流以及构建自己的仪表板。'
- en: To get the most out of this book
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用本书
- en: You will need to have an understanding of the basics of software development
    IDE tools, open source hardware, and the cloud.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要了解软件开发 IDE 工具、开源硬件和云的基本知识。
