- en: To make it easier to understand, and more interesting, this chapter attempts
    to explain the protocol by taking you through an implementation of it. For that
    reason, we hope this chapter is an easier read (not just architecture diagrams)
    and a glimpse into *how things work*. If you’re keen on getting started with building
    MCP servers, then jump straight to [*Chapter 3*](Chapter_2.xhtml), but if you
    want to understand the MCP protocol a bit more, then keep reading. You can also
    return to this chapter later.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更容易理解并更有趣，本章尝试通过带您了解协议的实现来解释该协议。因此，我们希望本章更容易阅读（不仅仅是架构图）并一窥*事物是如何工作的*。如果您想立即开始构建MCP服务器，请直接跳转到[*第3章*](Chapter_2.xhtml)，但如果您想更深入地了解MCP协议，请继续阅读。您也可以稍后返回本章。
- en: 'In this chapter, you will learn about the following:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将学习以下内容：
- en: The most common message flows in MCP and their message types
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP中最常见的消息流及其消息类型
- en: How the underlying SDK implementation roughly works
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础SDK实现的大致工作原理
- en: 'The chapter covers the following topics:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Learning about the protocol by implementing it
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过实现来了解协议
- en: Transports in MCP
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP中的传输
- en: Learning about the protocol by implementing it
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过实现来了解协议
- en: Instead of making this a *dry* chapter about a protocol and its different messages,
    let’s make it enjoyable by actually talking about the processes and messages while
    implementing them. As part of explaining the process and its flows, you will be
    shown both the flows as diagrams and also implemented as code. Let’s begin.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不打算将本章写成关于协议及其不同消息的枯燥章节，而是通过实际讨论实现过程中的过程和消息来使其变得有趣。作为解释过程及其流程的一部分，您将看到流程图以及作为代码实现的流程。让我们开始吧。
- en: Transports in MCP
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: MCP中的传输
- en: The idea with transports in MCP is that they define how clients and servers
    communicate. MCP is transport agnostic, meaning it can work over HTTP, WebSockets,
    STDIO, and more. The transport is the layer that handles the underlying message
    exchange. It exchanges messages of type JSON-RPC.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: MCP中传输的理念是定义客户端和服务器如何通信。MCP是传输无关的，这意味着它可以通过HTTP、WebSockets、STDIO等方式工作。传输是处理底层消息交换的层。它交换类型为JSON-RPC的消息。
- en: MCP has a set of transports it supports from STDIO (for servers running locally)
    to streamable transports such as WebSockets and **Server-Sent-Events** (**SSEs**),
    and finally request/response transports such as HTTP.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: MCP支持一系列传输，从STDIO（用于本地运行的服务器）到可流式传输的WebSockets和**服务器发送事件**（**SSEs**），最后是请求/响应传输，如HTTP。
- en: 'For each of the specified transports, they all have in common that they operate
    on streams. All the transports have a method exposing those streams, like so:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于指定的每个传输，它们都有一个共同点，即它们都在流上操作。所有传输都有一个方法来暴露这些流，如下所示：
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: There’s also a `BaseSession` class that all transports use to send raw JSON-RPC
    messages, which looks like so.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一个名为 `BaseSession` 的类，所有传输都使用它来发送原始 JSON-RPC 消息，其格式如下。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This class defines methods such as `send_request`, `send_notification`, and
    `response`, which send JSON-RPC messages.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类定义了 `send_request`、`send_notification` 和 `response` 等方法，这些方法用于发送 JSON-RPC
    消息。
- en: STDIO transport
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: STDIO 传输
- en: Okay, let’s start our journey understanding and implementing the message flow
    in MCP. We will use the STDIO transport as an example for this exercise. Let’s
    go!
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们开始了解和实现 MCP 中的消息流。我们将使用 STDIO 传输作为这个练习的例子。让我们开始吧！
- en: 'I’m sure you’re familiar with seeing messages in the console or even typing
    into the console – that’s **standard input and output**, or **STDIO** for short.
    But how can we leverage these *streams* for a program? Well, let’s start thinking
    in terms of a server and a client. A client would write a message to a server,
    and a server would respond with something. Let’s look at a very simple server
    implementation for STDIO:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信你对在控制台看到消息甚至键入控制台很熟悉——那就是 **标准输入和输出**，或简称 **STDIO**。但我们是如何利用这些 *流* 来为程序服务的呢？好吧，让我们从服务器和客户端的角度来思考。客户端会向服务器发送消息，服务器会做出响应。让我们看看
    STDIO 的一个非常简单的服务器实现：
- en: 'The server will need to listen to **standard input** (**stdin**) for incoming
    messages. In Python, you can use `sys.stdin` and iterate over it to get the next
    message, like so:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器需要监听 **标准输入**（**stdin**）以接收传入的消息。在 Python 中，你可以使用 `sys.stdin` 并迭代它以获取下一个消息，如下所示：
- en: '[PRE3]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We also want to differentiate between simple text messages and JSON-RPC messages.
    Simple text messages can be handled directly, while JSON-RPC messages will need
    to be parsed and responded to according to the JSON-RPC specification. Let’s identify
    JSON-RPC messages by their structure with code such as this:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还希望区分简单文本消息和 JSON-RPC 消息。简单文本消息可以直接处理，而 JSON-RPC 消息则需要根据 JSON-RPC 规范进行解析并做出响应。让我们通过以下代码来识别
    JSON-RPC 消息的结构：
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Also, we need to send messages back to the calling client. We can do that with
    `print` and `sys.stdout.flush()`, like so:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还需要向调用客户端发送消息。我们可以使用 `print` 和 `sys.stdout.flush()` 来实现，如下所示：
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Now that we’ve identified the key elements to implement, let’s create the first
    server:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经确定了要实现的关键元素，让我们创建第一个服务器：
- en: '[PRE6]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，我们做了以下操作：
- en: Created code that listens to `sys.stdin`
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建了监听 `sys.stdin` 的代码
- en: Responded with `hello there` if it’s being sent `hello` and if given a JSON
    message, parsed it and thereafter examined its `method` property and responded
    differently depending on its value
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果发送的是 `hello`，则响应 `hello there`；如果给定 JSON 消息，则解析它并检查其 `method` 属性，然后根据其值做出不同的响应
- en: Added code that makes the program shut down if given the text `exit`
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加了代码，如果输入文本为 `exit`，则使程序关闭
- en: 'Note how we have code that prints and flushes like so:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们如何打印和刷新代码如下：
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'That can be rewritten as a `send_response` function like so:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以重写为一个 `send_response` 函数，如下所示：
- en: '[PRE8]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This means our server code will now look like so:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们的服务器代码现在将看起来像这样：
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Creating a client
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建客户端
- en: So, how can we create a client for this? Well, a client should be sending messages
    and be able to receive server messages. A way to achieve this is by creating the
    server as a child process with the client being the parent process sending messages
    to the server. Then, we can communicate with it via standard input and output.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何为这个创建一个客户端呢？好吧，客户端应该发送消息并能够接收服务器消息。实现这一点的办法是将服务器作为一个子进程创建，客户端作为父进程向服务器发送消息。然后，我们可以通过标准输入和输出与之通信。
- en: 'Here’s what an implementation can look like:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个实现示例：
- en: 'The way you send a message as a client to the server is by writing to its `stdin`
    and reading from its `stdout`. Here’s a simple example:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 作为客户端向服务器发送消息的方式是通过写入其 `stdin` 并从其 `stdout` 读取。以下是一个简单的示例：
- en: '[PRE10]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This code can be refactored to a `send_message` function like so:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码可以被重构为一个 `send_message` 函数，如下所示：
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Let’s use the `send_message` function in our client code when we create the
    client.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们创建客户端时，让我们在客户端代码中使用 `send_message` 函数。
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Here, you can see how the following happens:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到以下情况发生：
- en: The client creates a server as a sub-process and ends up writing outgoing messages
    to said processes via writing to `stdin` using the `send_message` method
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端创建一个服务器作为子进程，并通过使用`send_message`方法写入`stdin`来向这些进程写入出站消息
- en: Conversely, it listens to `stdout` for the child process (server) to send back
    responses with the `proc.stdout.readline()` code
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相反，它监听`stdout`以接收子进程（服务器）通过`proc.stdout.readline()`代码发送的响应
- en: This code is a great start to build on to start implementing MCP and the STDIO
    transport. In fact, this is pretty much what happens, except for the fact that
    MCP communicates with JSON-RPC messages, so let’s make it more like MCP next.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码是构建MCP和STDIO传输的绝佳起点。实际上，这正是发生的事情，只不过MCP是通过JSON-RPC消息进行通信的，所以让我们让它更像MCP。
- en: MCP and STDIO transport
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP和STDIO传输
- en: Our code in the previous section pretty much acted like the STDIO transport
    does for MCP. For that to be fully true, though, we need the client and server
    to exchange JSON-RPC messages. So, what are those?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上一节中的代码基本上就像STDIO传输对MCP所做的那样。然而，为了完全真实，客户端和服务器需要交换JSON-RPC消息。那么，这些是什么？
- en: 'Let’s have a look at an example `jsonrpc` message:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个示例`jsonrpc`消息：
- en: '[PRE13]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Here, we have a JSON-RPC message, and what makes it one is, first, it’s in JSON
    format, and secondly, it has an attribute called `jsonrpc`. Furthermore, it should
    have an `id` attribute, `method`, and `params`. The preceding `tools/list` message
    is something a client would send to a server, and the server should respond with
    its available tools, as this command is used to figure out what tools a server
    has.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们有一个JSON-RPC消息，它之所以是一个，首先是因为它是以JSON格式编写的，其次是因为它有一个名为`jsonrpc`的属性。此外，它应该有一个`id`属性、`method`和`params`。前面的`tools/list`消息是客户端发送给服务器的内容，服务器应该响应其可用的工具，因为这个命令用于确定服务器有什么工具。
- en: So, what’s our first step when building an MCP server? Well, it’s the initialization
    process, also known as a **handshake**, so let’s work on that next.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，构建MCP服务器时的第一步是什么？嗯，它是初始化过程，也称为**握手**，所以让我们接下来处理它。
- en: "See a running example of this code in the solution folder – check [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solu\uFEFF\
    tions/README.md)."
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: "在解决方案文件夹中查看此代码的运行示例——检查[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solu\uFEFF\
    tions/README.md)。"
- en: The initialization process in MCP
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP中的初始化过程
- en: Next, now that we have simple client and server code working, we should focus
    on the initialization process in MCP, sometimes referred to as a handshake.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，现在我们有了简单的客户端和服务器代码，我们应该专注于MCP中的初始化过程，有时也称为握手。
- en: 'Here’s what initialization looks like at the mile-high level:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个高度上，初始化看起来是这样的：
- en: '![Figure 2.1 – Initialization process](img/B34121_02_1.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图2.1 – 初始化过程](img/B34121_02_1.png)'
- en: Figure 2.1 – Initialization process
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 – 初始化过程
- en: 'What happens in the preceding process is this:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的过程中发生的事情是这样的：
- en: First, the client sends an *initialize* request, meaning it wants to know from
    the server what its capabilities are.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，客户端发送一个*initialize*请求，这意味着它想从服务器了解其能力。
- en: Then, the server responds with its capabilities – that is, what features it
    has.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，服务器响应其能力——即它拥有的功能。
- en: Lastly, the client lets the server know it’s ready to perform operations by
    sending an *initialized* notification. Before the mentioned notification, any
    other types of messages, such as listing or running tools, should produce an error
    response as the *handshake* hasn’t fully taken place.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，客户端通过发送一个*initialized*通知来让服务器知道它已准备好执行操作。在提到的通知之前，任何其他类型的消息，如列出或运行工具，都应该产生一个错误响应，因为*握手*尚未完全完成。
- en: 'Let’s look at the message for each step:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看每一步的消息：
- en: '**Client sends initialize request**: Here’s what the client sends to the server:'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**客户端发送initialize请求**：这是客户端发送给服务器的：'
- en: '[PRE14]'
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'This is an *initialize* message, which you can see from `method` with the value
    `initialize`. The client must also send its `capabilities`, which includes `roots`
    and `sampling` in this case. Here’s a closer look at the capabilities of the client:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个*initialize*消息，你可以从`method`的值`initialize`中看到。客户端还必须发送其`capabilities`，在这个例子中包括`roots`和`sampling`。让我们更仔细地看看客户端的能力：
- en: '[PRE15]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Server initializes response**: The server, on the other hand, must answer
    with a similar message of its capabilities – that is, whether it supports tools,
    resources, prompts, notifications, and so on. Here’s what a typical server response
    looks like:'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**服务器初始化响应**：另一方面，服务器必须以类似的消息回答其功能——即它是否支持工具、资源、提示、通知等。以下是一个典型的服务器响应示例：'
- en: '[PRE16]'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Observe the `capabilities` attribute in the response, containing things such
    as logging, prompts, resources, and tools. **Logging** is the ability of the server
    to send log messages to the client. We will show an example of logging notifications
    in [*Chapter 5*](Chapter_5.xhtml#_idTextAnchor134). The other capabilities – prompts,
    resources, and tools – are the basic features that a server can have – more on
    those in [*Chapter 3*](Chapter_2.xhtml).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 观察响应中的`capabilities`属性，其中包含诸如日志记录、提示、资源和工具等内容。**日志记录**是服务器向客户端发送日志消息的能力。我们将在[*第五章*](Chapter_5.xhtml#_idTextAnchor134)中展示日志通知的示例。其他功能——提示、资源和工具——是服务器可以拥有的基本功能——更多关于这些内容将在[*第三章*](Chapter_2.xhtml)中介绍。
- en: This answer will help the client determine what it can and can’t use. It also
    provides information on protocol version and server info.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这个答案将帮助客户端确定它可以和不可以使用什么。它还提供了有关协议版本和服务器信息。
- en: Let’s have a look at the *initialized* message coming from the client, and then
    we’ll try implementing the preceding message flow.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看客户端发送的`initialized`消息，然后我们将尝试实现前面的消息流程。
- en: '**Concluding the handshake**: As the final step, the client sends an *initialized*
    message. This is the final message of the *handshake*. Once received, the server
    is ready to take on any type of JSON-RPC message from the client on tools, resources,
    or prompts. This message from the client should not produce a response from the
    server. However, the server should remember it’s been initialized. Once initialized,
    *normal* operations can take place, such as calling tools, prompts, and more.
    Here’s the *initialized* message in detail – as you can see, it doesn’t carry
    much information but is crucial for the client and server to operate normally.
    Before this notification has been sent, you can’t do much.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完成握手**：作为最后一步，客户端发送一个`initialized`消息。这是*握手*的最终消息。一旦收到，服务器就可以准备处理客户端关于工具、资源或提示的任何类型的JSON-RPC消息。客户端的这条消息不应产生服务器的响应。然而，服务器应该记住它已经被初始化。一旦初始化完成，*正常*操作就可以进行，例如调用工具、提示等。以下是详细的`initialized`消息——如您所见，它携带的信息不多，但对于客户端和服务器正常操作至关重要。在发送此通知之前，您无法做很多事情。'
- en: '[PRE17]'
  id: totrans-88
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: How can we implement this? Let us look at that next.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何实现这一点？让我们接下来看看。
- en: Implementing initialization
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现初始化
- en: There were a few messages exchanged back and forth. In reality, the client can
    just send `initialized` to the server and you’re done, but it’s considered good
    practice to exchange capabilities first via `initialize`.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 双方交换了一些信息。实际上，客户端只需向服务器发送`initialized`即可完成，但通过`initialize`首先交换功能被认为是一种良好的实践。
- en: The client code in the previous subsection was just sending text messages and
    JSON-RPC messages, but it wasn’t really following the flow of the initialization
    process. To address this, we need to change the client so that it properly handles
    the initialization sequence. After said sequence is complete, then the client
    can send other types of messages such as listing tools and so on.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 之前小节中的客户端代码只是发送文本消息和JSON-RPC消息，但并没有真正遵循初始化过程的流程。为了解决这个问题，我们需要修改客户端，使其能够正确处理初始化序列。初始化序列完成后，客户端可以发送其他类型的消息，例如列出工具等。
- en: Let’s add a `connect` function to the client and make sure it first asks for
    server capabilities, followed by notifying the server that things have been initialized.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在客户端添加一个`connect`函数，并确保它首先请求服务器功能，然后通知服务器初始化已完成。
- en: '[PRE18]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Let’s explain the implementation:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来解释一下实现方法：
- en: It created a `connect` function, asking for both capabilities and sending an
    *initialized* notification.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它创建了一个`connect`函数，请求功能并发送了`initialized`通知。
- en: It set up a call chain that starts with asking for capabilities by dispatching
    the *initialize* message, thereafter dispatching *initialized*, and thereby ending
    the *handshake* process.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它设置了一个调用链，从通过派发`initialize`消息请求功能开始，然后派发`initialized`，从而结束*握手*过程。
- en: 'Let’s improve things further with a `main` function, like so:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个`main`函数进一步改进事情，如下所示：
- en: '[PRE19]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Here’s what we created:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的创建结果：
- en: We created a `main` function that connects to the server, lists the tools, and
    ends up closing the server connection once done
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们创建了一个`main`函数，该函数连接到服务器，列出工具，并在完成后关闭服务器连接
- en: We defined `list_tools`, which sends a specific JSON-RPC message that asks the
    server to list its tools
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们定义了`list_tools`，它发送一个特定的JSON-RPC消息，请求服务器列出其工具
- en: Additionally, we created the `close_server` method, which sends a *quit* message
    to the server.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，我们还创建了`close_server`方法，它向服务器发送一个*退出*消息。
- en: 'Let’s work on the server part:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们专注于服务器部分：
- en: For the server, we need to ensure it reacts accordingly. This means the server
    needs to only accept messages with an `initialize` or `notifications/initialized`
    method. All other messages before initialization should cause an error. After
    initialization, all other messages that we support should be okay for the client
    to send.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于服务器，我们需要确保它做出相应的反应。这意味着服务器只需要接受带有`initialize`或`notifications/initialized`方法的消息。初始化之前的所有其他消息应引发错误。初始化之后，我们支持的所有其他消息都应该允许客户端发送。
- en: 'To deal with a case of the client trying to do something other than initialization,
    here’s code to handle that:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理客户端尝试执行初始化之外的操作的情况，这里有一些代码来处理这种情况：
- en: '[PRE20]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This code will stop any further processing of the message and wait for the next
    incoming message.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将停止对消息的进一步处理，并等待下一个传入的消息。
- en: 'For the `initialize` and `notifications/initialized` messages, we can handle
    them like so:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 对于`initialize`和`notifications/initialized`消息，我们可以这样处理：
- en: '[PRE21]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Let’s put the code together so we see what the full server looks like:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把代码放在一起，看看完整的服务器是什么样的：
- en: '[PRE22]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'As an exercise, you’re recommended to improve the preceding solution as you
    see fit. You could rewrite this code into a `send_response` method like so:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 作为练习，建议你根据需要改进前面的解决方案。你可以将此代码重写为`send_response`方法，如下所示：
- en: '[PRE23]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，我们做了以下操作：
- en: Defined an `elif` that says if we have a JSON-RPC message, we will try to route
    the message correctly
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义了一个`elif`，表示如果我们收到一个JSON-RPC消息，我们将尝试正确路由该消息
- en: Added a check that says, if we’re not initialized, and a message is not asking
    for capabilities or a notification from the client that says `"notifications/initialized"`,
    then we send a message back indicating this is not an okay message type.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加了一个检查，表示如果我们尚未初始化，并且消息不是请求功能或客户端发送的`"notifications/initialized"`通知，那么我们发送一条消息回显这不是一个合适的消息类型。
- en: After initialization, we’re okay to accept messages such as listing tools, upon
    which we respond with our tools in that case.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化之后，我们可以接受列出工具等消息，在这种情况下，我们以我们的工具作为响应。
- en: "See a running example of this code in the solution folder. Check *Initialization*\
    \ ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter\uFEFF\
    02/Solutions/README.md))."
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决方案文件夹中查看此代码的运行示例。检查*初始化*（[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md)）。
- en: Supporting features
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持的功能
- en: Now that we have code that’s looking more robust, let’s support features such
    as tools, resources, and prompts.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了更健壮的代码，让我们支持工具、资源和提示等功能。
- en: 'You’ve already seen how `connect` is a method we call to handshake with the
    server. Thereafter, we want to call a tool, a resource, and a prompt, and wait
    for it to respond before carrying on with the next action. So, for that behavior
    to be possible, we need to do the following:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经看到了`connect`是一个我们用来与服务器握手的函数。之后，我们想要调用一个工具、一个资源和一个提示，并在继续下一步操作之前等待它们的响应。因此，为了使这种行为成为可能，我们需要做以下操作：
- en: Place the message on the stream.
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将消息放置在流中。
- en: Wait for the response to arrive.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等待响应到达。
- en: If we get a normal response back, show it, if it’s a notification, then ignore
    it. Notifications from the server are usually a special message or a progress
    update, and we’ll implement support for that in the next section.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我们得到一个正常的响应，显示它；如果是通知，则忽略它。服务器通知通常是特殊消息或进度更新，我们将在下一节中实现对该功能的支持。
- en: Great, we have a plan. Let’s revisit our `main` method to see what we have.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，我们有一个计划。让我们回顾一下`main`方法，看看我们有哪些内容。
- en: 'Now, we need to think about what to do with the response from a `list_tools()`
    call, like we have in the following code:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要考虑如何处理`list_tools()`调用返回的响应，如下面的代码所示：
- en: '[PRE24]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Ideally, we want to capture the response and do something with that response,
    such as storing these tools in case we want to call them later via, for example,
    `call_tool` (a method that we don’t have yet but plan to create).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，我们希望捕获响应并对其进行处理，例如，将这些工具存储起来，以便我们稍后可以通过例如`call_tool`（我们还没有但计划创建的方法）来调用它们。
- en: 'So, we want the following code to be possible to write:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们希望以下代码能够被编写：
- en: '[PRE25]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: At this point, we need to capture the response from `list_tools`, and we need
    to print it. To make that happen, we need to ensure that both the server and the
    client are changed. The client needs to store the response in a `tools` variable,
    and the server needs to recognize that a `list tools` command is being sent and
    respond with the appropriate JSON-RPC message.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们需要捕获`list_tools`的响应，并且我们需要打印它。为了实现这一点，我们需要确保服务器和客户端都进行了更改。客户端需要将响应存储在`tools`变量中，服务器需要识别正在发送`list
    tools`命令，并响应适当的JSON-RPC消息。
- en: 'Let’s look at the server first. Here, we need to add a new case, `tools/list`,
    listing all tools:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先看看服务器。在这里，我们需要添加一个新的情况，`tools/list`，列出所有工具：
- en: '[PRE26]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'What’s worth calling out in the preceding code is the following:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，值得指出的是以下内容：
- en: 'The `tools` property: This should point to a list of tools.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tools`属性：这应该指向工具列表。'
- en: '`inputSchema`: This schema should describe the parameters this tool accepts
    and whether they’re mandatory to send. For this specific tool, it’s called `example_tool`
    and it has one parameter, `arg1`, which is required.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`inputSchema`：这个模式应该描述这个工具接受的参数以及它们是否是必须发送的。对于这个特定的工具，它被称为`example_tool`，它有一个参数`arg1`，这是必需的。'
- en: 'Now that we have the server side done, let’s focus on the client next. First,
    let’s define the `list_tools` method:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经完成了服务器端，让我们接下来关注客户端。首先，让我们定义`list_tools`方法：
- en: '[PRE27]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Next, let’s use `list_tools` from the `main` method:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们使用`main`方法中的`list_tools`：
- en: '[PRE28]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: In the `main` method, we call `list_tools`, save the `tool_response` response,
    and add it to a `tools` list that we will use later when we try calling one of
    the tools on the server.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在`main`方法中，我们调用`list_tools`，保存`tool_response`响应，并将其添加到我们将要稍后用于尝试调用服务器上工具的`tools`列表中。
- en: 'We also need to support how to call a tool. Like before, let’s add the server
    part first:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要支持如何调用工具。就像之前一样，我们先添加服务器部分：
- en: '[PRE29]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，我们做了以下操作：
- en: Constructed a message in a JSON-RPC message.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建了一个JSON-RPC消息。
- en: Added `result` with the `properties` attribute, which itself has an attribute,
    `content`. Said property has an `items` array that contains a number of text blocks
    describing the outcome of calling the tool. In a more real implementation, the
    tool in question should be called, and its result should be listed here.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加了具有`properties`属性的`result`，它本身有一个属性，即`content`。该属性有一个包含描述调用工具结果的多个文本块的`items`数组。在更实际的实现中，应该调用相关的工具，并将结果列在这里。
- en: 'Let’s focus on the client part next. We need a `call_tool` method:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们关注客户端部分。我们需要一个`call_tool`方法：
- en: '[PRE30]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Here, we do the following:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们做以下操作：
- en: Construct a JSON-RPC message, and we pass in `tool_name` and `args` as part
    of the message.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建一个JSON-RPC消息，并将`tool_name`和`args`作为消息的一部分传递。
- en: Handle the response by loading it as JSON and dive into the response to fetch
    out `items`, which contains the relevant part of the response.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将响应加载为JSON并深入响应以获取包含相关响应部分的`items`来处理响应。
- en: 'In the `main` method, we need to add the following code:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在`main`方法中，我们需要添加以下代码：
- en: '[PRE31]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，我们做了以下操作：
- en: Called `call_tool` with the name of the tool, and we also passed arguments.
    We hardcoded the arguments.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用工具的名称调用`call_tool`，并且我们也传递了参数。我们硬编码了参数。
- en: Iterated over the response to get the text block response we defined on the
    server.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历响应以获取我们在服务器上定义的文本块响应。
- en: 'With all these parts in place, running the program should now also list this
    as part of the output:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些部分就绪后，运行程序现在也应该将其作为输出的一部分列出：
- en: '[PRE32]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Great, now we have the features we need to both list the tools on the server
    and call a tool. It should be said, though, that calling a tool should also perform
    a computation. At present, we just list what tool was called and with what argument,
    so it’s a good start, but we should improve this further.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，现在我们有了列出服务器上的工具和调用工具所需的所有功能。不过，应该指出的是，调用工具也应该执行计算。目前，我们只是列出调用了哪些工具以及传递了什么参数，所以这是一个好的开始，但我们应该进一步改进。
- en: Let’s move on to notifications next. Notifications can be sent in both directions,
    from server to client as well as from client to server.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论通知。通知可以从服务器发送到客户端，也可以从客户端发送到服务器。
- en: "See a running example of this code in the solution folder – check *Features*\
    \ ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/C\uFEFF\
    hapter02/Solutions/README.md))."
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决方案文件夹中查看此代码的运行示例——检查*功能* ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md))。
- en: Notifications, report progress, and important updates
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通知、报告进度和重要更新
- en: 'Notifications are something both the client and the server can send to each
    other. Usually, they want to tell each party something important happened – for
    example, a long-running tool response might report progress, or a server may send
    a message to report on a change in its capabilities. So, how can we support notifications?
    Well, there are two aspects of it:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 通知是客户端和服务器都可以相互发送的东西。通常，他们想要告诉对方发生了重要的事情——例如，一个长时间运行的工具响应可能会报告进度，或者服务器可能会发送消息来报告其功能的变化。那么，我们如何支持通知呢？好吧，它有两个方面：
- en: '**Sending a notification-type message** from either client or server. This
    looks like so:'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从客户端或服务器发送通知类型消息**。这看起来是这样的：'
- en: '[PRE33]'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '`[type]` is usually `cancelled` or `progress`. For a full specification of
    types, check [https://github.com/modelcontextprotocol/modelcontextprotocol/blob/main/schema/2025-03-26/schema.ts](https://github.com/modelcontextprotocol/modelcontextprotocol/blob/main/schema/2025-03-26/schema.ts).'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '`[type]`通常是`cancelled`或`progress`。有关类型的完整规范，请查看[https://github.com/modelcontextprotocol/modelcontextprotocol/blob/main/schema/2025-03-26/schema.ts](https://github.com/modelcontextprotocol/modelcontextprotocol/blob/main/schema/2025-03-26/schema.ts)。'
- en: '**The role of the notification**. For a client, a notification is seen as an
    extra thing, and something you should show, for example, in a user interface to
    improve the user’s experience. A notification from a client to a server, though,
    tends to be different. For example, a client sends a notification to the server
    to set the state to `"initialized"`.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通知的作用**。对于客户端来说，通知被视为一个额外的事物，你应该在用户界面中展示出来，以改善用户体验。然而，客户端向服务器发送的通知则有所不同。例如，客户端向服务器发送通知以将状态设置为`"initialized"`。'
- en: 'How can we implement this, then? Well, we mostly have it in place already.
    We’re going to add the following to our code, though:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何实现这一点呢？好吧，我们大部分已经准备好了。尽管如此，我们将在我们的代码中添加以下内容：
- en: Dispatch a notification from the server to, in this case, report progress while
    waiting for the result of calling a tool
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从服务器向客户端发送通知，在这种情况下，报告等待调用工具的结果时的进度
- en: Add logic to our `list_tools` and `call_tool` functions to support handling
    an arriving notification.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们的`list_tools`和`call_tool`函数中添加逻辑以支持处理到达的通知。
- en: 'First, let’s see how we can support notifications on the client:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看我们如何支持客户端上的通知：
- en: '[PRE34]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Here, we have rewritten `list_tools` and added a loop to it. As long as what
    we receive is not the final result, we print it out (as it’s a notification).
    Then, once we get the final result – that is, it contains a `result` property
    – we return it from the function.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们重写了`list_tools`并为其添加了一个循环。只要我们接收到的不是最终结果，我们就将其打印出来（因为它是一个通知）。然后，一旦我们得到最终结果——也就是说，它包含一个`result`属性——我们就从函数中返回它。
- en: 'How can we deal with this on the server side? There are a few things we need:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何在服务器端处理这个问题呢？我们需要几件事情：
- en: A notification message needs to be created. We can place that in our `utils`
    folder and `messages.py`.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要创建一个通知消息。我们可以将其放置在我们的`utils`文件夹中的`messages.py`文件里。
- en: '[PRE35]'
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'We need to dispatch the actual notification from where we want it to happen.
    For the sake of showing how it works, let’s add it to the `tools/list` case like
    so:'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们需要从我们希望它发生的地方发送实际的通知。为了展示它是如何工作的，让我们将其添加到`tools/list`案例中，如下所示：
- en: '[PRE36]'
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'It should be said that progress notifications, in particular, should be used
    when calling tools, rather than listing what tools you have, as calling a tool
    might be a lengthy operation in some cases, so let’s add that next. First, let’s
    redo `call_tool` in the same way as `list_tools` on the client:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 应该指出的是，进度通知，尤其是当调用工具时，应该使用，而不是列出你拥有的工具，因为调用工具在某些情况下可能是一个耗时的操作，所以让我们添加这一点。首先，让我们以与客户端上的`list_tools`相同的方式重做`call_tool`：
- en: '[PRE37]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Just like with `list_tools`, we add a loop that just prints notifications unless
    the final result shows up. There’s definitely some duplication of code here, so
    we might want to break that out into a utility function at some point. Let’s see
    what we need to add on the server:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在 `list_tools` 中一样，我们添加了一个循环，只打印通知，除非最终结果显示出来。这里确实有一些代码重复，所以我们可能想在某个时候将其拆分成一个实用函数。让我们看看服务器上需要添加什么：
- en: '[PRE38]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Okay, so now we’ve added code that sends two notifications to the case that
    takes care of incoming messages of type `tools/call`.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以现在我们已经添加了代码，向处理类型为 `tools/call` 的传入消息的案例发送两条通知。
- en: 'When we try to run it all again, we should now see the following at the end
    of the output:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们再次尝试运行它时，我们应该在输出末尾看到以下内容：
- en: '[PRE39]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Clearly, the two notifications arrive before the tool calling response.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，两条通知在调用工具响应之前到达。
- en: It should be said, from a performance standpoint, that where we treat this as
    an SDK implementation, we would probably change and add the `asyncio` library
    to ensure we’re non-blocking. For the sake of demonstrating how messages flow
    back and forth, it serves its purpose, but it could be improved a bit.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 应该说，从性能的角度来看，如果我们将其视为SDK实现，我们可能会更改并添加`asyncio`库以确保非阻塞。为了演示消息如何来回流动，它已经起到了作用，但可以稍作改进。
- en: Great – we’ve managed to implement notifications and did some nice refactoring.
    Let’s look at sampling next.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了——我们已经成功实现了通知并进行了一些很好的重构。让我们看看下一个采样。
- en: "See a running example of this code in the solution folder – check *Notifications*\
    \ ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Pyt\uFEFF\
    hon/blob/main/Chapter02/Solutions/README.md))."
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: "在解决方案文件夹中查看此代码的运行示例——检查*通知*([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Pyt\uFEFF\
    hon/blob/main/Chapter02/Solutions/README.md))。"
- en: Sampling – help the server complete a request
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 采样 – 帮助服务器完成请求
- en: '**Sampling** is an interesting feature. What it means is that the server is
    telling the client, *I don’t know how to do this*, or *You do it better – can
    you please help me complete this request?*. More specifically, the server asks
    the client to complete the request using the client’s **large language model**
    (**LLM**).'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '**采样**是一个有趣的功能。它的意思就是服务器在告诉客户端，“我不知道如何做这件事”，或者“你做得更好——你能帮我完成这个请求吗？”更具体地说，服务器要求客户端使用客户端的**大型语言模型**（**LLM**）来完成请求。'
- en: Okay, so we established that the server sometimes needs the client to help it
    complete a request. The way the client helps is by asking its LLM for the response,
    which it then passes back to the server.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以我们已经确定服务器有时需要客户端帮助它完成请求。客户端帮助的方式是通过向其LLM请求响应，然后将响应传递回服务器。
- en: 'What is the starting point, though? Well, it could be a client that calls a
    tool on the server, and then the tool generates a sampling request. Then the flow
    could look like so:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，起点是什么呢？好吧，它可能是一个调用服务器上工具的客户端，然后该工具生成一个采样请求。然后流程可能看起来是这样的：
- en: '![Figure 2.2 – Sampling flow, scenario 1](img/B34121_02_2.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![图2.2 – 采样流程，场景1](img/B34121_02_2.png)'
- en: Figure 2.2 – Sampling flow, scenario 1
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2 – 采样流程，场景1
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能不正确。](img/1.png)**快速提示**：需要查看此图像的高分辨率版本吗？在下一代Packt Reader中打开此书或在其PDF/ePub副本中查看。'
- en: '![](img/21.png)**The next-gen Packt Reader** and a **free PDF/ePub copy** of
    this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png)**下一代Packt Reader**以及本书的**免费PDF/ePub副本**包含在您的购买中。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找本书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![](img/Unlock1.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: 'Or, it could be an external service that generates an event that the server
    listens to. Here’s the flow for that scenario:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，它可能是一个生成事件的外部服务，服务器会监听这个事件。以下是该场景的流程：
- en: '![Figure 2.3 – Sampling flow, scenario 2](img/B34121_02_3.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![图2.3 – 采样流程，场景2](img/B34121_02_3.png)'
- en: Figure 2.3 – Sampling flow, scenario 2
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.3 – 采样流程，场景2
- en: 'From a message standpoint, here’s what the server is sending to the client:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 从消息的角度来看，以下是服务器发送给客户端的内容：
- en: '[PRE40]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'Here’s some of the information included in the preceding request:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在先前的请求中包含了一些信息：
- en: '`messages` is a chat conversation between an assistant and a user, and provides
    the required context for the request'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`messages` 是助手和用户之间的聊天对话，并为请求提供了所需上下文。'
- en: '`modelPreferences`: Here, the server can specify things such as the preferred
    model name and decide the prioritization of cost, speed, and capabilities'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`modelPreferences`：在这里，服务器可以指定诸如首选模型名称以及决定成本、速度和能力优先级的事情'
- en: There’s also model configuration data being sent on temperature, the number
    of tokens to use, and more. It’s worth calling out that these are recommendations
    that the client can choose to accept or modify.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有关于模型配置的数据正在发送，包括温度、要使用的标记数量等。值得注意的是，这些是客户可以选择接受或修改的建议。
- en: 'The client should then respond with a completion message, like so:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 客户随后应该以完成消息的形式响应，如下所示：
- en: '[PRE41]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'In the preceding response, the following information is covered:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在先前的响应中，以下信息被涵盖：
- en: '`model` is the model used. It doesn’t have to be the same as what the server
    asked for.'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`model` 是使用的模型。它不必与服务器请求的相同。'
- en: '`stopReason` – it’s good to know whether you got a full response or whether
    it stopped for some other reason.'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`stopReason` – 了解你是否得到了完整的响应，或者是否因为其他原因而停止，这是很好的。'
- en: '`content` is the content response.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`content` 是内容响应。'
- en: 'Introducing a scenario: e-commerce'
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 介绍一个场景：电子商务
- en: When does this happen, though? Well, the server could be listening to events
    that it should react to. For example, let’s say you have an e-commerce scenario
    and there are new products being registered by a system somewhere. However, before
    these products can be sold, they need a proper description. This description is
    something a client and its LLM can help with.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这发生在什么时候呢？好吧，服务器可能会监听它应该做出反应的事件。例如，假设你有一个电子商务场景，某个系统正在注册新产品。然而，在这些产品可以销售之前，它们需要一个合适的描述。这个描述是客户及其LLM可以帮助完成的事情。
- en: '![Figure 2.4 – E-commerce scenario flow](img/B34121_02_4.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图2.4 – 电子商务场景流程](img/B34121_02_4.png)'
- en: Figure 2.4 – E-commerce scenario flow
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4 – 电子商务场景流程
- en: In the final step, the server logs, stores, and possibly caches the response.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一步，服务器记录、存储并可能缓存响应。
- en: 'Let’s look at a request in this context. Here’s an example request from a server:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个上下文中的一个请求。以下是一个来自服务器的示例请求：
- en: '[PRE42]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: As you can see, we settled on only providing it with context and omitted any
    recommendations on the model to use or configuration, but we could add that if
    we wanted.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们决定只提供上下文，并省略了关于使用哪种模型或配置的建议，但如果我们想的话，我们可以添加这些。
- en: It’s now up to the client how to interpret this request and respond.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 现在取决于客户端如何解释这个请求并做出响应。
- en: Implementing sampling
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现采样
- en: 'Let’s implement sampling in our code, and we’ll use the product description
    scenario so you can see how it can be used. Here’s what we need:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在代码中实现采样，我们将使用产品描述场景，这样你可以看到它是如何被使用的。以下是我们需要的内容：
- en: '**External service**: This service should produce a new product in need of
    a product description. This product has been registered by someone else in another
    system and shows up in this server as a message payload as a result of listening
    to an event. This is scenario-specific code.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部服务**：此服务应生成一个需要产品描述的新产品。这个产品已被另一个系统中的某人注册，并作为监听事件的结果出现在这个服务器上作为消息有效负载。这是特定场景的代码。'
- en: '**Server – sample request**: We just need the capability to send a `json-rpc`
    request.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器 – 样本请求**：我们只需要发送`json-rpc`请求的能力。'
- en: '**Client response**: We need to listen to this specific message type, call
    the LLM using the message’s payload, and return a response to the server.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户响应**：我们需要监听这种特定的消息类型，使用消息的有效负载调用LLM，并将响应返回给服务器。'
- en: 'Let’s start with the external service. This isn’t really part of MCP, but it
    will hopefully give you a sense of how you can integrate an external component
    that produces a message that you’re interested in:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从外部服务开始。这实际上不是MCP的一部分，但它可能会让你对如何集成一个生成你感兴趣消息的外部组件有一个概念：
- en: Here, we are adding the external service that will end up registering new products.
    It will produce new products at random intervals and send them to any listener.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们正在添加一个外部服务，它最终将注册新产品。它将在随机的时间间隔内生成新产品并发送给任何监听者。
- en: '[PRE43]'
  id: totrans-231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: First, we create a class capable of creating and dispatching products that we
    want the client’s help with. In the previously mentioned scenario, we needed the
    client and its LLM to produce a description for us.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们创建一个能够创建和分发我们希望客户帮助的产品类。在之前提到的场景中，我们需要客户及其LLM为我们生成描述。
- en: 'Here’s what the product store code consists of:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是产品存储库代码的组成部分：
- en: 'A `ProductStore` class: This store should emulate an external source that raises
    events that, at any point, can send new products that need their product descriptions
    augmented. See the store as a queue that could, for example, be long-polling an
    API or listening to a message queue. The point is it’s just a placeholder and
    only you know what this construct is as it’s solution-specific.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ProductStore`类：这个存储库应该模拟一个外部源，该源可以随时发送需要增强产品描述的新产品。将这个存储库视为一个队列，例如，它可以长时间轮询API或监听消息队列。关键是它只是一个占位符，只有你知道这个结构是什么，因为它针对特定的解决方案。'
- en: 'Several helper methods, such as `add_listener`, `dispatch_message`, and `start_product_queue_timer`:
    The latter is responsible for starting a timer for dispatching the products at
    a certain time interval.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '几个辅助方法，例如`add_listener`、`dispatch_message`和`start_product_queue_timer`：后者负责在特定时间间隔调度产品。 '
- en: Now we will interact with the product store by first creating it and then adding
    a listener to it. The listener should dispatch a message to the client whenever
    a new product is added.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将通过首先创建产品存储库，然后向其添加监听器来与产品存储库进行交互。每当添加新产品时，监听器应向客户发送消息。
- en: '[PRE44]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'We also need a way on the server to receive a sampling response from the client.
    Let’s see how we can handle that next. The main problem we have with the client
    is that we’re not really set up to handle a message that can arrive at any time.
    What we have right now is that we explicitly send calls from the client to the
    server and expect a response that we handle. To address this, we need to change
    our architecture slightly to use a background thread. That works in the following
    way:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要一种方式在服务器上接收来自客户端的采样响应。让我们看看我们如何处理这个问题。我们目前与客户端的主要问题是，我们并没有真正设置好来处理可以随时到达的消息。我们现在所拥有的是，我们明确地从客户端发送调用到服务器，并期望得到一个响应，然后我们处理这个响应。为了解决这个问题，我们需要稍微改变我们的架构，使用一个后台线程。它的工作方式如下：
- en: The thread listens to messages on `stdout`.
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 线程监听`stdout`上的消息。
- en: If a message arrives (sent from the server), then it will be put in a queue
    for later processing.
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果收到消息（来自服务器），则将其放入队列以供后续处理。
- en: For sample messages, we will not put those in a queue but handle them directly,
    and for notifications and normal responses, we will have them in a queue and let
    them be handled in their respective method (e.g., `list_tools`, `call_tool`, etc.).
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于样本消息，我们不会将它们放入队列，而是直接处理，对于通知和常规响应，我们将它们放入队列，并让它们在相应的方法（例如`list_tools`、`call_tool`等）中处理。
- en: 'Let’s show how we set up the thread next:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们如何设置线程：
- en: '[PRE45]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'The preceding code does the following:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码执行以下操作：
- en: Reads from `stdout`.
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从`stdout`读取。
- en: Checks to see whether there’s a sampling message. If so, it tries to handle
    it by calling `handle_sampling_message`. If it’s not a sampling message, then
    it’s put in the queue.
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查是否有采样消息。如果有，它将尝试通过调用`handle_sampling_message`来处理它。如果不是采样消息，则将其放入队列。
- en: 'Here are some helper methods that we also need:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一些我们也需要的辅助方法：
- en: '[PRE46]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Especially of interest is `handle_sampling_message`, which takes the message
    from the server and calls `call_llm` (we stubbed out this method; you should ensure
    in a real implementation that it calls an actual LLM). Then the response is constructed
    and sent back to the server for caching, logging, or whatever else the server
    needs to do with it.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其值得注意的是`handle_sampling_message`，它从服务器接收消息并调用`call_llm`（我们已模拟此方法；你应该确保在实际实现中它调用实际的LLM）。然后构建响应并将其发送回服务器进行缓存、记录或服务器需要对其进行的其他操作。
- en: 'Because we now rely on this queue for messages, we need to alter `list_tools`
    and `call_tool` to read from this queue instead of reading from the stream, like
    so:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们现在依赖于这个队列来接收消息，我们需要修改`list_tools`和`call_tool`以从该队列读取，而不是从流中读取，如下所示：
- en: '[PRE47]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Here, we have commented how we used to ask for the latest message, calling `readline`,
    and we now instead call `message_queue.get`.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们注释了如何请求最新的消息，调用`readline`，而现在我们调用`message_queue.get`。
- en: That’s it – that’s how sampling works. It originates in the server as the result
    of an event, and then it asks the client for help, and the client responds. It
    should be emphasized that the client doesn’t have to do exactly what the server
    wants it to do – that is, use a specific mode or configuration. You should present
    the server request in front of an equal user so they have a chance to respond
    and configure what the client sends back – that is, *human in the loop*.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样 – 这就是采样的工作方式。它起源于服务器，作为事件的结果，然后它请求客户端的帮助，客户端做出响应。应该强调的是，客户端不必完全按照服务器的要求去做
    – 那就是使用特定的模式或配置。你应该在平等用户面前展示服务器请求，这样他们就有机会做出响应并配置客户端发送的内容 – 那就是有人工干预。
- en: "See a running example of this code in the solution folder – check *Sampling*\
    \ ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context\uFEFF\
    -Protocol-with-Python/blob/main/Chapter02/Solutions/README.md))."
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: "在解决方案文件夹中查看此代码的运行示例 – 检查 *采样* ([https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context\uFEFF\
    -Protocol-with-Python/blob/main/Chapter02/Solutions/README.md))。"
- en: SSE transport
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SSE 传输
- en: At this point, we’ve gone through large parts of the MCP. So, what’s the difference
    between SSE and STDIO? The main difference is how messages flow. In STDIO, messages
    are passed on your local machine between `stdin` and `stdout` streams; for SSE,
    messages flow over the web using HTTP. That means all the major motions, such
    as handshake, initialization, tool calling, and so on, need to be rethought as
    web requests from the client and web requests to the server.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经走过了 MCP 的很大一部分。那么，SSE 和 STDIO 之间的区别是什么？主要区别在于消息的流动方式。在 STDIO 中，消息在本地机器的
    `stdin` 和 `stdout` 流之间传递；对于 SSE，消息通过 HTTP 在网络上流动。这意味着所有主要动作，如握手、初始化、工具调用等，都需要重新考虑为客户端和服务器之间的网络请求。
- en: Conceptually, SSE transport is implemented as a web server with the `/messages`
    and `/sse` routes. The former handles incoming MCP messages, while the latter
    is used to establish a connection for streaming events.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 从概念上讲，SSE 传输被实现为一个具有 `/messages` 和 `/sse` 路由的网络服务器。前者处理传入的 MCP 消息，而后者用于建立流式传输事件的连接。
- en: 'Here’s what that looks like from a high level:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这是从宏观层面看的样子：
- en: '![Figure 2.5 – SSE transport flow](img/B34121_02_5.png)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.5 – SSE 传输流程](img/B34121_02_5.png)'
- en: Figure 2.5 – SSE transport flow
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.5 – SSE 传输流程
- en: We will cover SSE in more detail in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor094),
    but now we have a good understanding at a mile-high level of what the difference
    is compared to STDIO.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在 [*第 4 章*](Chapter_4.xhtml#_idTextAnchor094) 中更详细地介绍 SSE，但现在我们已经在宏观层面上很好地理解了与
    STDIO 相比的不同之处。
- en: Streamable HTTP
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Streamable HTTP
- en: 'Streamable HTTP is just like SSE in the sense that MCP servers using Streamable
    HTTP can be reached via a URL on the web. There are some differences and similarities.
    Let’s make that a bit clearer:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，Streamable HTTP 与 SSE 类似，因为使用 Streamable HTTP 的 MCP 服务器可以通过网络上的 URL 访达。有一些差异和相似之处。让我们使这一点更加清晰：
- en: Both SSE and Streamable HTTP need the client to accept `text/event-stream`.
    For Streamable HTTP, the client also needs to accept `application/json`, as the
    server can choose whether to stream responses or send them as JSON. For SSE, the
    server always sends content as `text/event-stream`.
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SSE 和 Streamable HTTP 都需要客户端接受 `text/event-stream`。对于 Streamable HTTP，客户端还需要接受
    `application/json`，因为服务器可以选择是流式传输响应还是以 JSON 格式发送它们。对于 SSE，服务器始终以 `text/event-stream`
    格式发送内容。
- en: SSE connections are usually long-lived `GET` requests, where Streamable HTTP
    is typically `POST`.
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SSE 连接通常是长生命周期的 `GET` 请求，而 Streamable HTTP 通常为 `POST`。
- en: From an implementation standpoint, it’s very similar to that of SSE – that is,
    it’s implemented as a web server. However, for Streamable HTTP, in the context
    of MCP, you should set up a route, `/mcp`, that handles both connections and messages,
    and it should also be set up as `POST`.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 从实现的角度来看，它与 SSE 非常相似 – 即，它被实现为一个网络服务器。然而，对于 Streamable HTTP，在 MCP 的上下文中，你应该设置一个路由，`/mcp`，该路由处理连接和消息，并且它也应该设置为
    `POST`。
- en: '![Figure 2.6 – Streamable HTTP flow](img/B34121_02_6.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.6 – Streamable HTTP 流程](img/B34121_02_6.png)'
- en: Figure 2.6 – Streamable HTTP flow
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.6 – Streamable HTTP 流程
- en: Therefore, implementing Streamable HTTP is a bit easier than SSE as you only
    need to keep track of one endpoint, `/mcp`. There’s more on Streamable HTTP in
    [*Chapter 5*](Chapter_5.xhtml#_idTextAnchor134).
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，实现 Streamable HTTP 比 SSE 简单一些，因为你只需要跟踪一个端点，`/mcp`。关于 Streamable HTTP 的更多内容请参阅
    [*第 5 章*](Chapter_5.xhtml#_idTextAnchor134)。
- en: Summary
  id: totrans-270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we covered quite a bit of information. The most important takeaway
    is that client and server communication needs to be initialized before further
    action can take place. Fortunately, most SDKs take care of the initialization
    part, and you can usually start the client-server communication by calling and
    listing tools and more. Hopefully, this was a good read for both those who find
    diagrams clarifying and those who like to see how code looks. The code *works*,
    but could surely be improved for performance, maintainability, and more. Do give
    the code a try – check the solutions folder.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们涵盖了大量的信息。最重要的收获是，客户端和服务器通信需要在进一步操作之前进行初始化。幸运的是，大多数SDK都负责初始化部分，您通常可以通过调用和列出工具等方式开始客户端-服务器通信。希望这对那些认为图表有助于理解的人和喜欢看到代码样子的人都有所帮助。代码
    *是有效的*，但当然可以为了性能、可维护性等方面进行改进。请尝试运行代码 – 检查解决方案文件夹。
- en: In the next chapter, we will learn how to build and test our first server. The
    chapter will serve as a good introduction to getting hands-on with MCP.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将学习如何构建和测试我们的第一个服务器。本章将作为MCP动手实践的良好介绍。
- en: Assignment
  id: totrans-273
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作业
- en: 'Try running the code provided in [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md)
    to see how things work. The code should do the following:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试运行提供的代码[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md)，以查看事物是如何工作的。代码应该执行以下操作：
- en: Initialize a connection
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化连接
- en: Send an initialized notification
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送初始化通知
- en: List tools
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出工具
- en: Call a tool and produce notifications
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用一个工具并生成通知
- en: Produce sample messages
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成示例消息
- en: The code is built up in steps, so it’s worth going through all the subfolders
    for your chosen runtime.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 代码是分步骤构建的，因此值得查看您选择的运行时所有子文件夹。
- en: Solution
  id: totrans-281
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解决方案
- en: "You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-C\uFEFF\
    ontext-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md)."
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter02/Solutions/README.md)访问解决方案。
- en: Quiz
  id: totrans-283
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测验
- en: What needs to happen before a *handshake* between a server and a client can
    be considered complete?
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 在服务器和客户端之间的 *握手* 被视为完成之前，需要发生什么？
- en: 'A: The client needs to first send *initialize*, wait for the server response,
    and then send *initialized*.'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 客户端需要首先发送 *initialize*，等待服务器响应，然后发送 *initialized*。'
- en: 'B: The client and server can call, for example, list tools right away.'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 客户端和服务器可以立即调用，例如，列出工具。'
