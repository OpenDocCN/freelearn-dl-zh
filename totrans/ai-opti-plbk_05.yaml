- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Selecting High-Impact AI Projects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In today’s rapidly evolving business landscape, organizations are turning to
    AI as a critical tool for driving efficiency, improving decision-making, and maximizing
    revenue. While companies can rapidly prototype AI solutions, the challenge lies
    in optimizing these solutions to achieve maximum benefits for their respective
    organizations. Building AI solutions is essential, but widespread adoption and
    sustained momentum are what truly give meaning to these solutions.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter serves as a guide for companies interested in creating impactful
    AI solutions. *Impactful* may mean different things for each organization, but
    ultimately, it relates to delivering a 5-star experience to end users. In this
    chapter, we will explore the reasons behind building optimized and impactful AI
    solutions and provide a practical blueprint for steps you can take to achieve
    this optimization. Please note that we are not discussing model optimization in
    this chapter, but rather how to use AI most effectively to obtain the optimal
    return on investment.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following key topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Why is selecting high-impact AI projects important?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Case study – choosing the right battle
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why is selecting high-impact AI projects important?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Selecting high-impact AI projects is important but difficult. It takes a village
    to determine the right use case at the right time. Hence, it is important to build
    optimized AI solutions. **AI optimization** refers to using AI algorithms and
    technologies to improve systems and processes effectively and efficiently to get
    the required business value. It is the framework that businesses can leverage
    to use AI most efficiently. Let’s discuss a few reasons why this is important:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating AI solutions and products is an expensive undertaking. Before investing
    millions of dollars in development, it’s crucial to assess all factors, such as
    impact, end users, total cost, and more. Defining these factors helps you determine
    the solution’s value and secure the necessary momentum and resources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI is the new shiny object, and there is a strong urge to build solutions using
    AI. However, it’s time to flip the script. Instead of using AI for a solution,
    it might be more effective to decide on the use case first and then determine
    whether AI can enhance it. This approach can save time and resources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building AI solutions is a team effort, and assembling an A-team is essential.
    Getting buy-in from different teams and senior leaders before starting the development
    process ensures that everyone is fully engaged and provides their critical inputs
    to the AI project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By optimizing AI solutions, organizations can identify and address potential
    risks early in the development process. This proactive approach helps minimize
    the likelihood of costly errors or failures.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let’s dive deep into some of the factors that you could analyze before
    building an AI solution.
  prefs: []
  type: TYPE_NORMAL
- en: Key factors in developing effective AI solutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Factors to consider before building an AI solution are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Business impact** : The problem you aim to solve should drive significant
    value for the business. Businesses should leverage AI to positively impact their
    operations, not just because it’s a trending topic. Common examples of business
    value include generating new revenue streams, acquiring new users, retaining existing
    customers, and creating new assets. However, the impact isn’t limited to customer
    value; it can also include improving internal operations, such as increasing employee
    productivity through tools such as AI copilots or streamlining processes such
    as recruitment or legal workflows using RAG-based solutions to access internal
    knowledge. Additionally, if you are a start-up, AI can provide you with a competitive
    edge in the market, which can help you secure funding from venture capitalists
    or angel investors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pro tip
  prefs: []
  type: TYPE_NORMAL
- en: Business impact/value should be defined by consulting appropriate business stakeholders.
    As a data scientist, feel free to propose the metrics, but also be flexible to
    incorporate feedback from business SMEs.
  prefs: []
  type: TYPE_NORMAL
- en: '**End users** : Defining your AI solution’s end users is critical for tracking
    **return on investment** ( **ROI** ) once the AI product is launched. This will
    help you create an **optimized feedback loop mechanism** . This feedback loop
    is essential for measuring the ongoing success of the AI solution, enabling continuous
    improvement. The technical team should have a clear communication line with the
    end users so that they can understand the pain points and tailor the solution
    accordingly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defining the end users also helps in defining the impact of your AI solution.
    For example, if the end users are internal employees, the impact is often measured
    in terms of productivity gains, efficiency improvements, or time saved per employee.
    On the other hand, if the solution targets external customers, the focus shifts
    to metrics such as user retention, revenue growth, customer acquisition, and increasing
    **customer lifetime value** ( **CLV** ).
  prefs: []
  type: TYPE_NORMAL
- en: Identifying the right end users ensures that you can tailor the solution to
    business goals and establish a dynamic system for capturing and acting on feedback,
    ensuring long-term success.
  prefs: []
  type: TYPE_NORMAL
- en: Pro tip
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that your end users, especially if they are internal, are part of the
    development process and set realistic expectations with them. While you cannot
    include all the end users, you can identify a few power users who can provide
    critical feedback.
  prefs: []
  type: TYPE_NORMAL
- en: '**Choosing the right use case for AI** : Defining an impactful business problem
    is essential, but determining whether it’s suitable for AI is an entirely different
    challenge. To put this in context, AI and **machine learning** ( **ML** ) excel
    in solving problems that involve identifying patterns, trends, or processing large
    volumes of data to predict or classify outcomes. However, not all use cases require
    the sophistication of AI. When considering the appropriate AI use case, it’s crucial
    to first identify the business problem and then assess whether AI can enhance
    or solve it, rather than aimlessly searching for an AI application.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s explore three case studies that demonstrate when AI is a great fit, when
    it’s overkill, and when it falls into a gray area.
  prefs: []
  type: TYPE_NORMAL
- en: Case study 1 (AI is overkill)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Suppose a company aims to calculate basic descriptive statistics, such as average
    sales over a given period or simple trend analysis. These tasks are well within
    the capabilities of standard statistical methods or tools such as Excel and dashboards.
    Introducing AI or ML here would add unnecessary complexity without adding value.
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution** : Simple statistical tools are more efficient in this case.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Word of caution** : If, in the future, the size and complexity of the data
    change, then this should be revisited to see whether simple statistical methods
    such as linear regression can add more value than simple trend analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: Case study 2 (AI is a gray area)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Consider a company using a rule-based engine to recommend the next best marketing
    action for its users based on fixed parameters. The actions could look like recommending
    a newlywed couple to apply for a home loan. Basically, the marketing team sends
    promotions based on the customer’s life events and/or other parameters. If these
    parameters (life events) can be coded in a static and predictable way, such as
    `1` if someone gets married and `0` if they don’t, AI techniques might not be
    necessary. You can very well build a rules-based engine. However, if the user
    base grows significantly and you want your solution to be dynamic enough to decide
    the important parameters, transitioning to an AI-driven approach could be beneficial.
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution** : Advanced techniques such as deep neural networks might be able
    to solve the problem better here, as they can handle the complex relationship
    between a large user base with their preference over a simple rules-based engine.
    Deep neural networks are great at capturing large user preferences and relationships
    over time. They are also great for the cold start problem – basically, new customers/users
    that join the company, as they will be able to find similar users with similar
    interests and recommend them optimally.'
  prefs: []
  type: TYPE_NORMAL
- en: Case study 3 (AI can be high impact)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Leveraging AI often benefits high-impact use cases, such as diagnosing rare
    diseases or detecting fraud. These scenarios typically involve massive datasets
    and complex patterns, which rule-based systems or manual processes might not be
    able to derive at scale. AI’s predictive capabilities can significantly enhance
    accuracy and speed in such use cases.
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution** : Implementing AI would provide tangible benefits by processing
    vast data and identifying anomalies more effectively. Let’s take an example of
    fraud detection using AI techniques.'
  prefs: []
  type: TYPE_NORMAL
- en: To build a fraud detection solution, you need multiple data points, such as
    transaction records, user behavior logs, customer profiles, and maybe even external
    data sources such as credit bureau information. Now, all this vast amount of data
    can be efficiently handled by neural networks or reinforcement learning for adaptive
    fraud detection strategies. If you also had unstructured data, such as any kind
    of documents, you could also leverage advanced reasoning **large language models**
    ( **LLMs** ) to process structured and unstructured data and efficiently flag
    fraudulent transactions. With the advent of LLMs, it is also possible to alert
    users in real time without human intervention. You can deploy an agent to send
    that message or email to the user.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have defined the use cases that could leverage AI for the end users
    of the solution and determined the business impact, the next thing to consider
    is that just because AI can be beneficial, it doesn’t mean it can be implemented
    immediately. In the next sections, let us explore other business constraints to
    AI implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Feasibility analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In an enterprise setting, there might be additional constraints such as talent,
    resources, budget, and more. Therefore, to perform the due diligence, there are
    a few additional analyses to conduct before starting the build of the AI solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conduct a comprehensive feasibility analysis to evaluate technical and business
    viability before implementing AI. This ensures that the solution that is built
    can deliver measurable business value. This can be performed on the following
    variables: data, tech stack, and talent.'
  prefs: []
  type: TYPE_NORMAL
- en: Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Data is the fuel of AI solutions. Your AI solution is as good as the data you
    provide. Even the most sophisticated techniques fail if the data is not of high-quality
    or if it is incorrect. Hence, it is important to pay attention to the data within
    your organization. Here are the factors to consider pertaining to data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Availability of high-quality data** : AI/ML requires a significant amount
    of data to learn patterns and trends and generalize on those patterns. Once you
    have identified the right data sources, it is important to ensure that the data
    is cleaned before being ingested into AI algorithms. All models, including LLMs,
    require high-quality data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, let’s say you are building a chatbot for your employees to get
    information on all things HR, such as leave policy, benefits, and so on. The data
    supplied to the LLM has to be clean and updated so that employees can get relevant
    information. Otherwise, they might think they are adhering to company rules but
    could land in trouble because of outdated information.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, if you are building a simple prediction model, it is essential to
    ensure that the data doesn’t have unnecessary characters or too many missing values,
    as these can be misleading for the model.
  prefs: []
  type: TYPE_NORMAL
- en: '**Limited amount of data** : Companies may have high-quality data limited to
    a few rows, such as data on only 100 users. The limited availability might be
    because of several reasons, such as the company just launched a new product and
    only has data for early adopters. In such cases, to augment the data, using synthetic
    data generation techniques such as a **generative adversarial network** ( **GAN**
    ) can be highly powerful.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, let’s say a company is working on the launch strategy for a potential
    blockbuster drug. In this case, you might not have tons of data to analyze the
    previous launch strategy to decide on factors such as when the drug should be
    launched, in which country, which healthcare providers to target, and so on. You
    can leverage GAN to augment the data and perform analysis to combat this issue.
    Though the results might not be 100% accurate, they gave the stakeholders a good
    starting point to develop their launch strategy. Other techniques that you can
    use include Synthetic Minority Oversampling Technique (SMOTE); here, instead of
    simply duplicating minority class samples, SMOTE generates synthetic examples
    by interpolating between existing minority samples and their nearest neighbors
    in the feature space. This helps the model learn a more general decision boundary
    and reduces the risk of overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: '**Cautionary tale**'
  prefs: []
  type: TYPE_NORMAL
- en: Synthetic data is an excellent tool for simulating complex patterns and scenarios.
    However, it’s important to note that challenges arise for high-risk use cases,
    such as predicting whether a patient is likely to contract COVID-19. Since COVID-19
    was a unique event with no prior data, making accurate predictions is difficult.
    Synthetic data might fall short here, as there is no precise base dataset to apply
    synthetic data techniques effectively. The closest you can get here regarding
    data is to look at past pandemics to analyze the overall trends.
  prefs: []
  type: TYPE_NORMAL
- en: '**Buy third-party data** : Companies often want to diversify their target audience
    and explore new user bases. In such cases, procuring the data might be of interest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, consider a case where you are working on an AI prospecting strategy
    to target small business owners. Now, this might be a completely new target audience
    for the company, so there will be no prior data available to understand the small
    business ecosystem. Here, it might be best to procure data from vendors such as
    ZoomInfo to get the data and build a personalized AI prospecting strategy based
    on the industry, company size, revenue, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '**Diverse and representative data** : To build trustworthy and responsible
    AI solutions, it is essential to have data representing everyone in the population
    so that your algorithm can understand the patterns, even for minority populations.
    It is also necessary to de-bias data to ensure that no population group is favored
    more than the other based on race, gender, and so on.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is also important to avoid using **personally identifiable information**
    ( **PII** ) as much as possible, such as social security numbers. In some scenarios,
    such as cancer prediction problems, PII data such as gender and age are inevitable,
    as those features determine the course of treatment.
  prefs: []
  type: TYPE_NORMAL
- en: For example, suppose you are building a prediction problem on whether the person
    is eligible for a high credit line. In this case, the historical data might show
    that men receive higher credit lines than women, as they have been in the workforce
    for longer or might have a higher net worth and salary than women. Here, it’s
    a societal issue that cripples the data in some form or another. If you don’t
    use gender as a training feature, the model will predict the high credit line
    based on other features such as current net worth, spending patterns, and so on,
    and wouldn’t differentiate based on gender. So, it is essential to perform a detailed
    analysis to determine such attributes that might introduce bias to the model and
    take a step back to consider whether they impact the model results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Considering the preceding points, the next question is, how much data is too
    much data? Though there is no one-size-fits-all here, there are some general guidelines
    that can be followed:'
  prefs: []
  type: TYPE_NORMAL
- en: Supervised ML problems need more labeled training data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The more complex the model is, the more data it will require.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A general rule is that you need 10 times as many data points as there are features
    in your dataset. If there are 10 columns, you should have at least 100 rows.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For LLMs, if you are fine-tuning, then it is essential to have a robust dataset
    that covers all scenarios, including edge cases.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data should be a critical component of your AI strategy. Ensuring that adequate
    and high-quality data is available for use will lead you toward a successful outcome.
    This step might require some time and effort, but it can save you from the misery
    of building sub-optimal AI solutions. Once you have the data, the next factor
    is to look at your tech stack for building these AI solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Tech stack
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most AI solutions in production require a robust technology stack. The local
    computers might not suffice to handle large amounts of data and provide a seamless
    user experience. On top of that, it is not easy for every company to build its
    own cloud infrastructure. This is an expensive undertaking and not required in
    most cases. Hence, they prefer existing cloud providers.
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, such as if you are building a rules-based engine or a simple
    statistical analysis, you might want to opt for local deployment. But as even
    that solution scales and your user base grows, you will have to switch to a cloud
    provider.
  prefs: []
  type: TYPE_NORMAL
- en: If the goal is to build Gen AI solutions, we all know there is a huge environment
    constraint when leveraging the LLMs for your solutions. There is limited capacity.
    Even if you get access to the capacity, there is a chance that if multiple users
    are using your solution at the same time, they might face rate limit errors (which
    is basically a message to tell them that there is no capacity, so please try again
    later). This can cause disruption in user experience, and people might lose interest
    in your Gen AI solution. To mitigate this problem, you should ensure that you
    can provide constant throughput for your solution so that users don’t face this
    error. This can be done by analyzing your existing traffic and ensuring that enough
    resources are available within your cloud platform during the busy time of the
    day. You should also consider the latency of the response. For example, reasoning
    models, such as o-series, will take a bit longer to respond, which might increase
    customer bounce rate or lead to an unsatisfactory experience for the customer.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pro tip**'
  prefs: []
  type: TYPE_NORMAL
- en: Another thing to note is that if you choose a cloud platform, one key advantage
    is access to its cloud solutions architects and specialists, who can provide best
    practices for your use case, help optimize your solutions, and guide you through
    implementation. Make sure to leverage these valuable resources for expert advice.
  prefs: []
  type: TYPE_NORMAL
- en: Talent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While data and tech stack are important, you also need people who can leverage
    the required data and technology to create an impactful AI solution. Building
    AI solutions is complex; hence, having people with specialized skills is important.
  prefs: []
  type: TYPE_NORMAL
- en: AI applications require a specialized talent pool. Based on the use case, skills
    might vary, but knowing the basics of data science, ML, and statistics goes a
    long way. Another key factor to note is that your data scientists might know the
    data science stack well but may not be experts in MLops, which is the skill of
    managing and deploying AI solutions in production. For that, you might need talent
    that has the operations skill set – that is, they know how to write code in production
    in the most efficient way, as well as monitor and evaluate the AI solution continuously.
  prefs: []
  type: TYPE_NORMAL
- en: With the plethora of roles, it can be difficult to decide which folks are most
    relevant to the team. The general rule of thumb is to have a data scientist, as
    these are folks with deep expertise in crunching data and even building a proof
    of concept (PoC) or minimum viable product (MVP) with ML algorithms. Next, you
    might want **machine learning engineers** ( **MLEs** ) who have deep expertise
    in deploying viable POCs to production. In the end, it is also important to have
    AI product managers or product managers who can develop a go-to-market strategy
    for the AI product and also help to keep the project on track.
  prefs: []
  type: TYPE_NORMAL
- en: Given the pace at which AI is evolving, it is difficult to get “experts” in
    the field. Instead of chasing experts, it is important to hire folks with a growth
    mindset and a willingness to learn.
  prefs: []
  type: TYPE_NORMAL
- en: Pro tip
  prefs: []
  type: TYPE_NORMAL
- en: If you are considering deploying AI as a user interface application, you might
    also need a .NET developer, so ensure you have one on your team.
  prefs: []
  type: TYPE_NORMAL
- en: Within a large organization, you might also need project or product managers
    to define milestones, keep everyone accountable, and ensure the smooth delivery
    of the AI solution.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we covered that in an enterprise setting, conducting a comprehensive
    feasibility analysis is crucial before implementing AI solutions. This involves
    evaluating technical and business viability to ensure the solution delivers measurable
    business value. Key variables to consider include data, tech stack, and talent.
    High-quality data is essential for AI success, and companies may need to augment
    or procure data. A robust tech stack, often involving cloud providers, is necessary
    for handling large data and ensuring a seamless user experience. Specialized talent
    with a growth mindset and willingness to learn is vital for leveraging data and
    technology effectively.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will explore opportunity sizing, which is important
    for understanding the potential impact and scalability of the AI solution. This
    helps in identifying the right opportunities to pursue and ensures that resources
    are allocated effectively for maximum business value.
  prefs: []
  type: TYPE_NORMAL
- en: Opportunity sizing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Opportunity sizing is a method that data scientists can use to quantify the
    potential impact of an initiative before deciding to invest in it. Although businesses
    attempt to prioritize initiatives, they rarely do the math to assess the opportunity,
    relying instead on intuition-driven decision-making. While this type of decision-making
    does have its place, it also runs the risk of being easily swayed by several subtle
    biases, such as information available, confirmation bias, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity sizing can be approached in various ways. In this section, we will
    cover two methods: directional T-shirt sizing and bottom-up using comparable methods.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Directional T-shirt sizing** is a qualitative method where opportunities
    are categorized into sizes such as small, medium, large, and extra large based
    on their potential impact and feasibility. This helps in quickly assessing and
    prioritizing opportunities without detailed analysis. On the other hand, **bottom-up
    using comparable methods** involves a more quantitative approach where opportunities
    are sized by analyzing similar projects or initiatives.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start the discussion with directional T-shirt sizing.
  prefs: []
  type: TYPE_NORMAL
- en: Directional T-shirt sizing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Directional T-shirt sizing is a qualitative method used to estimate the time
    and effort required for different phases of a project. It categorizes tasks into
    sizes such as **extra small** ( **XS** ), **small** ( **S** ), **medium** ( **M**
    ), **large** ( **L** ), and **extra large** ( **XL** ) based on their complexity
    and scope. This method helps in quickly assessing and prioritizing tasks without
    the need for detailed analysis.
  prefs: []
  type: TYPE_NORMAL
- en: The importance of directional T-shirt sizing lies in its ability to provide
    a quick and intuitive way to estimate project requirements. It facilitates consistency
    and standardization across teams, making it easier to communicate and align on
    project expectations. Additionally, it helps in identifying potential bottlenecks
    and resource needs early in the project planning phase, ensuring that projects
    are scoped realistically and managed effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you’re working on a recommendation engine for an e-commerce platform.
    Here’s how you might categorize the tasks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**XS** : Setting up the initial project environment, including basic configurations
    and dependencies. This task is straightforward and requires minimal effort.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**S** : Implementing basic recommendation algorithms using existing libraries.
    This involves some coding and testing, but is relatively simple.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**M** : Integrating the recommendation engine with the e-commerce platform’s
    user interface. This requires more effort as it involves ensuring seamless interaction
    between the recommendation engine and the platform.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**L** : Enhancing the recommendation engine with advanced features such as
    personalized recommendations based on user behavior and preferences. This task
    is complex and requires significant development and testing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**XL** : Scaling the recommendation engine to handle large volumes of data
    and users. This involves optimizing the algorithms, ensuring high availability,
    and possibly migrating to a cloud infrastructure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using directional T-shirt sizing helps in quickly assessing and prioritizing
    tasks without detailed analysis. It provides a quick and intuitive way to estimate
    project requirements, facilitating consistency and standardization across teams.
  prefs: []
  type: TYPE_NORMAL
- en: Bottom-up using comparable methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The bottom-up comparable methods sizing approach estimates the potential value
    of a business or product by leveraging comparable products, services, or markets.
    This method is beneficial when you have limited direct data but can draw parallels
    with existing businesses or market segments. The focus is on identifying similar
    entities and extrapolating their metrics to estimate your opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to apply the bottom-up comparable methods sizing approach st ep
    by step:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify relevant comparable products, services, or markets** : Look for
    products, services, or companies similar to what you’re trying to size in terms
    of target audience, functionality, industry, or pricing model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, if you’re launching a new cloud-based **customer relationship management**
    ( **CRM** ), look at other SaaS companies that offer CRM solutions, such as Salesforce
    or HubSpot. For a new electric vehicle, you might look at Tesl a or Rivian.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gather data from comparable methods** : Research publicly available information
    and collect key metrics such as revenue, customer base, pricing, growth rate,
    and market share from comparable companies. Sources can include the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Annual reports or investor presentations
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Industry benchmarks and reports
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Press releases and news articles
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Market research databases or market research
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Conduct surveys for the target user base
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, for a new streaming platform, gather data on subscribers, **average
    revenue per user** ( **ARPU** ), and market share from companies such as Netflix,
    Hu lu, or Disney+.
  prefs: []
  type: TYPE_NORMAL
- en: '**Adjust for scale and market dynamics:** Adjust the data of different products
    to reflect key differences such as geography, target audience size, or pricing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, if you compare your product to that of a company operating in North
    America, but your product will launch globally, adjust the figures accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use qualitative adjustments** : Consider qualitative differences, such as
    differences in brand strength, customer loyalty, or technology features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, if a brand already has a strong user base, the adaptation of any
    new product or service would be easier and users are more likely to engage with
    it compared to a new brand in the market. For startups, it is easier to build
    the brand by open sourcing their code or part of technology for a while, so users
    can trust them. These adjustments can be a bit tricky to implement but should
    be considered as a factor in you r calculations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Apply comparable metrics** : Once you’ve adjusted for differences, apply
    the comparable metrics (such as revenue per user or market penetration rate) to
    your business scenario.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, if a comparable product in the same industry has an ARPU of $100
    and a customer base of 1 million, estimate the ARPU and potential customer base
    for your product based on similarities in product offerings and market conditions.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, both directional T-shirt sizing and bottom-up using comparable
    methods are methods for opportunity sizing. Directional T-shirt sizing provides
    a quick and intuitive way to estimate project requirements, while bottom-up using
    comparable methods offers a more precise and data-driven assessment. By leveraging
    these methods, you can effectively prioritize opportunities and allocate resources
    to maximize business value.
  prefs: []
  type: TYPE_NORMAL
- en: Another critical component of opportunity sizing is cost versus benefit analysis.
    In the next section, we will cover that in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Performance cost versus benefit analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Cost versus benefit analysis is a critical step in justifying the assumed ROI
    and getting confidence from stakeholders. It involves evaluating the potential
    costs associated with an opportunity against the expected benefits to determine
    its overall value and feasibility. This analysis helps in making informed decisions
    by quantifying the financial impact and ensuring that the resources invested will
    yield significant returns.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating cost versus benefit analysis with opportunity sizing allows organizations
    to prioritize opportunities based on their potential value. By comparing the costs
    and benefits, companies can identify which opportunities offer the highest ROI
    and allocate resources accordingly. This ensures that efforts are focused on initiatives
    that provide the most significant business value, leading to more effective and
    strategic decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a framework for data scientists while determining it:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, identify and estimate costs:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Development costs** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data collection and preparation** : AI models require large datasets. Estimating
    the cost of gathering, cleaning, and annotating data is critical. Acquiring quality
    data can be expensive for some projects, and generating high-quality data can
    be costly.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Infrastructure** : AI projects often need significant computing power, especially
    training models. Consider cloud infrastructure costs (e.g., AWS, Azure, GCP, etc.),
    server hardware, and ongoing maintenance.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources** : AI projects require skilled teams, including data scientists,
    AI/ML engineers, and domain experts, to estimate salaries, training, and consulting
    fees. If you hire consultants instead of full-time talent, the cost should be
    adjusted accordingly.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operational costs** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment** : These are the costs associated with implementing the AI system
    in production, including integration with existing systems and automation pipelines.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring and maintenance** : AI models degrade over time and need regular
    monitoring, updating, and retraining, which requires dedicated resources.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regulation and compliance** : Depending on the industry (e.g., healthcare,
    finance, etc.), ensure compliance with legal and ethical standards, which can
    increase costs.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Next, estimate the benefits:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Increased efficiency** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Process automation** : AI can automate repetitive tasks, freeing up human
    resources for higher-value work. Quantify labor savings by reducing manual work
    hours (e.g., AI automating customer support or repetitive administrative tasks).'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operational efficiency** : AI can optimize processes, such as supply chain
    management or predictive maintenance, reducing downtime and operating costs.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Revenue growth** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**New revenue streams** : AI can create new products, services, or business
    models (e.g., personalized recommendations driving more sales, AI-enabled services
    such as virtual assistants, etc.).'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer experience** : AI-driven personalization can lead to higher customer
    retention, increased satisfaction, and higher average order value (e.g., tailored
    recommendations in e-commerce).'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved decision-making** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data-driven insights** : AI models help make faster and more accurate decisions
    by identifying patterns and trends that humans might miss. These insights can
    lead to better strategic planning, pricing, or product development.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risk mitigation** : AI models can identify potential risks, such as fraud
    detection, loan approvals, or cybersecurity. Quantify the value of reduced risks
    and avoided losses.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, develop market competitiveness to gain a competitive advantage. Being
    an early adopter of AI can give your business an edge in the market, improving
    customer loyalty, operational efficien cy, and market share.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Perform ROI analysis:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Total cost** : Add all identified costs (development, operations, talent,
    etc.)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Total benefits** : Sum up the benefits of cost savings, increased revenue,
    or risk reduction'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![img](img/B34239_03_001.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: 'Conduct a sensitivity analysis:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Best, expected, and worst-case scenarios** : Vary your assumptions about
    cost and benefit estimates to understand how sensitive your ROI is to changes
    in key variables'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Uncertainty factors** : Assess data quality, model accuracy, regulatory changes,
    or potential delays, and adjust the analysis accordingly'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long-term versus short-term value** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Short-term value** : Quantify immediate benefits, such as cost savings or
    improved customer service, and compare them to upfront development and deployment
    costs.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long-term value** : Consider the value of scalability and learning over time.
    AI models can improve and provide increasing benefits as they get e xposed to
    more data.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Non-monetary benefits** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Strategic positioning** : AI projects often align with long-term innovation
    strategies, even if they don’t provide immediate returns'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer and employee satisfaction** : Automating mundane tasks can lead
    to happier employees, and personalized AI-driven experiences can delight customers'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brand perception** : AI might enhance your brand image, positioning you as
    a forward-thinking and te ch-savvy organization'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, let’s look at an example. Let’s say you are implementing an AI chatbot
    for customer service. The **cost** might include $100,000 in development and deployment,
    $50,000 annually for infrastructure and updates, and $100,000 annually in human
    resources to manage and monitor it. The **benefits** could include reducing customer
    service costs by $400,000 annually due to fewer human agents, faster response
    times, and improved customer satisfaction. This would result in an ROI as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/B34239_03_002.png)'
  prefs: []
  type: TYPE_IMG
- en: This shows a strong positive return, but it should be taken with a grain of
    salt. All these investments assume everything will go as expected, which is rarely
    the case in real-world implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Cost versus benefit analysis is essential for evaluating the overall value and
    feasibility of an opportunity. By comparing the costs and expected benefits, organizations
    can prioritize initiatives that offer the highest ROI, ensuring that resources
    are allocated effectively for maximum business value.
  prefs: []
  type: TYPE_NORMAL
- en: All the methods discussed previously are quantitative analyses. There are a
    few other factors that you should consider before prioritizing the AI use cases
    within an enterprise.
  prefs: []
  type: TYPE_NORMAL
- en: Analyze the risk level of the use case
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Another important step is assessing whether the use case presents a high or
    low risk for the organization. If your company has low-risk tolerance, it’s wise
    to start with low- to medium-risk AI use cases, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automated reporting** : Streamlining repetitive tasks and improving reporting
    accuracy'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Internal chatbots** : Enhancing internal communications or customer service'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recommendation engines** : Personalizing product or service recommendations
    for users'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Starting with manageable, lower-risk projects helps build confidence in AI capabilities
    and creates a foundation for scaling more complex, high-impact solutions.
  prefs: []
  type: TYPE_NORMAL
- en: If you work in a regulated organization (healthcare, finance, insurance, etc.),
    implementing low-risk use cases will help you gain confidence in the legal and
    compliance team and become comfortable with documentation. This will come in handy
    when implementing complicated use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Analyze the scale of the use case
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We all know AI thrives at scaling. It is possible that the problem was solved
    with existing tools or data analysis and was sufficient, but now the company’s
    situation has changed.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a company uses a simple rules-based marketing engine to send email
    campaigns to customers. However, after acquiring another company, the number of
    users has increased tenfold, leading to an influx of new data. In this case, AI
    might be a suitable solution. Therefore, it might be more effective to leverage
    AI to build recommendation engines for customers.
  prefs: []
  type: TYPE_NORMAL
- en: Analyze the historical solutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When building an AI solution, it is essential to peek inside the organization
    and determine whether the problem has already been solved. This could have been
    achieved via a legacy tool or a simple statistical analysis. This is important
    for the following two reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: Speaking with owners/stakeholders to check whether the problem has already been
    solved is a great way to know what didn’t work in the past and whether AI can
    solve it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This will also help you decide whether AI is the solution or whether there might
    be underlying issues that cannot be solved using AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s understand this i n detail with an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Example** : Customer churn prediction in a s ubscription-based service'
  prefs: []
  type: TYPE_NORMAL
- en: '**Background** : A subscription-based video streaming company is facing a high
    churn rate. The product team suggests developing an AI model to predict which
    customers will likely churn and offer promotions to retain them proactively. Before
    that, the company should follow these steps to understand whether AI is nee ded
    to solve the problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Speak with stakeholders** : Before jumping into developing an AI solution,
    the data science team meets with key stakeholders, including customer support.
    The data science team learns that the company has already tried manual churn analysis,
    analyzing customer feedback and usage data, but has failed. The marketing team
    mentions that retention campaigns have been launched in the past based on simple
    segmentation (e.g., customers who last logged in a week ago), but have yet to
    see significant improvement in retention rates. The operations team reveals frequent
    service disruptions in certain regions, which could drive customer d issatisfaction
    and churn.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Insights from stakeholders** : The discussions reveal that AI alone might
    not fully address the churn problem. Service disruptions in certain regions likely
    drive customer dissatisfaction, but this is an operational issue that must be
    fixed before introducing an AI model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Determine whether AI is appropriate** : The team concludes that more than
    AI alone will be needed to solve the problem. While AI could help predict which
    customers will likely churn, it won’t address the root cause (service disruptions).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Solution** : They address the service issues and improve the overall customer
    experience. Once operational issues are resolved, an AI-based churn prediction
    model could add value by allowing the company to proactively engage at-risk customers
    before they decide to leave. Historical solutions are a great way to perform benchmarking
    as well.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Example** : Suppose you want to build an AI-based demand forecasting system
    to replace the existing platform. This could be that the demand planners are observing
    a decline in accuracy, hence a decrease in revenue. Now, let’s say the legacy
    system provides the forecast using statistical methods such as Auto-ARIMA, but
    your new AI-based solution can skip to the advanced ML and neural network techniques.
    This way, you are building something that adds value to a demand planner’s life.
    In addition, both systems can run in parallel for a few months to compare the
    accuracy, giving business users more confidence.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All these different kinds of analysis will help you uncover the potential of
    your use case and determine whether AI is needed for your solution. Conducting
    a detailed analysis will enable you to make informed decisions and gain confidence
    in your choices.
  prefs: []
  type: TYPE_NORMAL
- en: Case study – choosing the right battle
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we have explored potential techniques to decide the best AI
    use case for your enterprise, including performing feasibility analysis, opportunity
    sizing, and looking at other factors such as risk and scale of the use case. Now,
    let’s explore how this will play out in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Apex Bank, a fictitious leading mid-sized financial institution, has been investing
    heavily in digital transformation. As part of its 5-year innovation roadmap, the
    bank’s leadership formed an AI task force to explore high-impact use cases that
    align with strategic priorities and offer measurable returns.
  prefs: []
  type: TYPE_NORMAL
- en: 'The task force shortlisted two potential AI projects:'
  prefs: []
  type: TYPE_NORMAL
- en: Customer churn prediction model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fraud detection system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Both projects were data-rich and technically feasible, but choosing the right
    one to prioritize was crucial given the limited budget and resource constraints.
  prefs: []
  type: TYPE_NORMAL
- en: '**Project 1: AI-driven customer churn prediction** :'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Overview** : This project proposed building an ML model to predict which
    customers were likely to close their accounts or stop using key products. The
    goal was to allow proactive engagement through targeted retention campaigns.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Potential benefits of this project** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce customer attrition (estimated at 12% annually)
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Improve customer lifetime value
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhance personalized marketing
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase in brand loyalty
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Challenges associated with the project** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: It required significant data integration from various systems (CRM, transaction
    logs, and call center data)
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Actions from predictions required coordinated changes in marketing and customer
    service departments
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Retention incentives risked eroding margins
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Project 2: AI-powered fraud detection model** :'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Overview** : This project involved building a real-time fraud detection engine
    using supervised ML techniques. It would analyze transactional behavior to flag
    anomalies for review.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Potential benefits of the project** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce financial losses due to fraud (estimated at $8 million/year)
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhance customer trust and security perception
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Improve compliance with financial regulations
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Challenges associated with the project** :'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: It needed a robust real-time infrastructure
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: False positives could impact user experience
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Model retraining requires continuous data quality monitoring
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluation criteria
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The task force evaluated the two projects based on the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Criteria** | **Churn model** | **Fraud detection model** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Strategic alignment | Medium (customer growth) | High (risk mitigation priority)
    |'
  prefs: []
  type: TYPE_TB
- en: '| Business impact | Medium | High |'
  prefs: []
  type: TYPE_TB
- en: '| Data availability | Low-moderate | High |'
  prefs: []
  type: TYPE_TB
- en: '| Technical feasibility | Moderate | High |'
  prefs: []
  type: TYPE_TB
- en: '| Stakeholder buy-in | Moderate | High |'
  prefs: []
  type: TYPE_TB
- en: '| Risk | Moderate | High |'
  prefs: []
  type: TYPE_TB
- en: '| Scale | High | High |'
  prefs: []
  type: TYPE_TB
- en: 'Table 3.1: Criteria for evaluating projects'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the preceding parameters, a decision was made. We will discuss the
    viewpoint in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Decision: prioritizing fraud detection'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Apex Bank selected the AI-powered fraud detection model for immediate development.
    Key reasons included the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Strategic fit** : Fraud mitigation was a board-level priority due to recent
    high-profile incidents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High ROI** : Preventing fraud had immediate, tangible financial benefits'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Faster implementation** : Data was more centralized, and real-time capabilities
    were eventually introduced as part of the broader data strategy'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer trust** : Strengthening fraud controls supported brand reputation
    and regulatory compliance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The churn prediction model was deprioritized but earmarked for future development
    once the data infrastructure matured.
  prefs: []
  type: TYPE_NORMAL
- en: Results and impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Six months after implementation, the fraud detection system achieved the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Significant reduction in fraud-related losses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improvement in fraud detection accuracy versus previous rule-based systems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Real-time alerts with <1 second latency.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improved regulatory audit scores.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Robust data monitoring frameworks. These were built to track changes in data
    and flag potential data drifts. This was not only helpful in this project but
    also in future AI solutions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this case study, since it involves a bank, fraud detection was its top priority.
    The primary reason people use a bank is to ensure that their money is safe, making
    fraud prevention the bank’s main responsibility. On the other hand, if you work
    for an e-commerce company, your priority would be to provide personalized recommendations
    to users, as this would increase the company’s cash flow. In summary, the frameworks
    we discussed, such as feasibility analysis and opportunity sizing, are excellent
    quantitative tools. However, it is also crucial to align everything with your
    business goals to make informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we learned the importance of selecting an impactful AI project
    and the key factors to consider in doing so. We discussed methods such as feasibility
    analysis to determine whether the AI project is viable, based on factors such
    as the availability of high-quality data, the tech stack, and talent. We also
    explored opportunity sizing methods, primarily directional t-shirt sizing and
    bottom-up using comparables, to estimate the potential dollar impact of the project
    and effectively size different workstreams within an AI solution. Next, we examined
    how to perform a cost versus benefit analysis, which is another excellent way
    to determine whether you will achieve the required ROI compared to the resources
    invested in the project. Other factors to consider for making an informed choice
    include the scale and risk of the use case. Finally, we discussed a case study
    to bring everything together and see how it all plays out in action within an
    enterprise.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will learn how technical teams can secure sponsorship
    from senior leadership for AI-driven projects.
  prefs: []
  type: TYPE_NORMAL
