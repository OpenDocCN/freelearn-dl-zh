- en: '12'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Practicing Your Presentation Delivery
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You learned how to plan and structure your content in the first part of this
    book. Then, we discussed how to create better visuals with the tools and functions
    available in PowerPoint or with third-party add-ins. We are now entering the delivery
    part.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a memorable experience for your audience requires much more than planning
    the content and creating professional visuals. You need to practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'Luckily, the PowerPoint development team at Microsoft has been adding tools
    to help presenters with their delivery in the past years. Here are the topics
    that will be covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Viewing and adapting the **Slide Show** options
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging **Speaker Coach** to help you practice your talk
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rehearsing timings and creating a recorded practice run
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the new **Record** feature to practice
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Some features discussed in the chapter require a **Microsoft 365** subscription.
    They will be identified as such when they are explained. Be aware that since the
    subscription version of PowerPoint is being updated on an ongoing basis, it is
    possible that screenshots shown in this chapter might differ from your version
    of the application.
  prefs: []
  type: TYPE_NORMAL
- en: Viewing and adapting Slide Show options
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Many users are not aware of all the PowerPoint options they can control, and
    there are a few specific to presentation delivery. To access those options, you
    need to go to **File** | **Options** | **Advanced** ( **1** ) and scroll down
    to the **Slide Show** section ( **2** ) ( *Figure 12.1* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.1 – Advanced Slide Show options in PowerPoint](img/B32063_12_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.1 – Advanced Slide Show options in PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: In this section -
  prefs: []
  type: TYPE_NORMAL
- en: All options are turned on by default, so you might want to modify the available
    options according to your presentation delivery plan.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Show menu on right mouse click** option ( **3** ) can be turned off by
    unchecking the box if you want to avoid getting the contextual menu if you click
    the right mouse button by mistake. It is not necessarily a bad option, but I do
    think using **Presenter View** features—the topic of the next chapter—is much
    better.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Show popup toolbar** option ( **4** ) is related to the semi-transparent
    toolbar that can be seen in the bottom-left corner of the screen during your presentation.
    Even though it hides itself after a few seconds, I usually find it distracting
    because I use **Presenter View** most of the time. Therefore, my personal preference
    is to turn it off.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are a regular ink user, you might want to keep the **Prompt to keep ink
    annotations when exiting** option ( **5** ). It allows you to keep them for reference
    after your presentation is finished.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The last option of the section, **End with black slide** ( **6** ), is supposed
    to be used to avoid ending your Slide Show by mistake. If you use **Presenter
    View** , the slide will be black, but when you are not using it, you will unfortunately
    see the text **End of Slide Show, click to exit** displayed at the top of the
    black screen, which I find distracting. I usually advise my clients to have their
    last slid e always be one listing their contact information, summary, or call
    to action, making i t an obvious reminder that they are on the last slide of their
    presentation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even though I have shared some personal preferences for the **Slide Show** options,
    I suggest that you practice your presentation with them turned on and then off,
    to see what makes more sense to you. The main goal is to make you more comfortable
    when delivering your presentation, so my preferences may not be what works best
    for you.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now move on to a great practice feature right in your PowerPoint application
    in the next sectio n.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging Speaker Coach to help you practice your talk
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The **Speaker Coach** feature is part of Microsoft’s cloud-enhanced features,
    which means you need to be connected to the internet for it to work. It was first
    launched in PowerPoint for the web and is now also available in the desktop version
    if you have an M365 license. Anyone using a Microsoft account (for example, an
    [outlook.com](http://outlook.com) , [hotmail.com](http://hotmail.com) , [live.com](http://live.com)
    , [msn.com](http://msn.com) , or [windowslive.com](http://windowslive.com) email)
    without an M365 subscription can access it in PowerPoint for the web.
  prefs: []
  type: TYPE_NORMAL
- en: Another important element is that **Speaker Coach** only understands English
    at the time this book was written. The feature is visible only when your Office
    user interface is in English. If you don’t know how to change the language of
    your user interface, have a look at the Microsoft Support article in the *Further
    reading* section.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft always tests **Speaker Coach** enhancements in the web version first,
    adding them to the desktop version after gathering feedback from PowerPoint for
    the web users. This means that if you want to practice with the latest features,
    you need to open your presentation in PowerPoint for the w eb.
  prefs: []
  type: TYPE_NORMAL
- en: Starting Speaker Coach
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To s tart using **Speaker Coach** in PowerPoint for the web ( **1** ) or in
    the desktop application ( **2** ), you can go to the **Slide Show** tab ( **3**
    ) ( *Figure 12. 2* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.2 – Starting Speaker Coach from the web and desktop applications](img/B32063_12_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.2 – Starting Speaker Coach from the web and desktop applications
  prefs: []
  type: TYPE_NORMAL
- en: When in the web version, if you don’t see the feature icons in the ribbon, you
    can click on the ribbon display options arrow ( **4** ) and choose the **Classic**
    ribbon. Both versions of the application will have a **Rehearse with Coach** button
    ( **5** ) to start the application. In the web version, you can also find the
    feature in the **Present** dropdown ( **6** ) at the bottom of the list ( **7**
    ). At the time this book is being written, PowerPoint for the web has an optional
    **Body language** analysis feature ( **8** ) that requires having your camera
    turned on while practicing your presentation.
  prefs: []
  type: TYPE_NORMAL
- en: 'After clicking the **Rehearse with Coach** button, your presentation goes into
    Slide Show view, and a dialog box opens on top of your slides ( **1** ) in the
    bottom-right corner ( *Figure 12. 3* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.3 – Speaker Coach dialog box](img/B32063_12_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.3 – Speaker Coach dialog box
  prefs: []
  type: TYPE_NORMAL
- en: By default, the **Show real-time feedback** feature ( **2** ) is turned on,
    meaning you can see comments in the **Fillers** section ( **3** ) regarding filler
    words, repetitive words, or lack of inclusiven ess in your language as you practice.
    You will need to test whether you find it too distracting or not. When you are
    ready to start, make sure your microphone is turned on and click on the **Start
    Rehearsing** button ( **4** ).
  prefs: []
  type: TYPE_NORMAL
- en: 'At the time this chapter is being written, the overlaid dialog boxes are cropped,
    making the following elements less visible or not visible at all: the timer (
    **5** ), a blinking microphone icon ( **6** ) that can be used to pause the rehearsal,
    and a bell icon allowing you to turn off real-time feedback while you are rehearsing.
    When you are finished, simply hit the *Esc* key to end your slide show, ending
    the rehearsal at the same time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are using PowerPoint for the web, you can also use your camera and test
    the **Body language** feedback. It can give you insight into your distance from
    the camera ( **1** ) and when your distance is just right ( **2** ). It should
    help with eye contact with your camera, although I was not able to trigger bad
    eye contact during testing ( *Figure 12. 4* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.4 – Speaker Coach feedback for body language in PowerPoint for
    the web](img/B32063_12_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.4 – Speaker Coach feedback for body language in PowerPoint for the
    web
  prefs: []
  type: TYPE_NORMAL
- en: This feat ure is still in preview. It will probably keep improving in the future.
    When you end your rehearsal, whether in the web or desktop version, you get a
    rehearsal report—the topic of our next sect ion.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing your rehearsal report
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The rehea rsal report ( **1** ) gives you very interesting insights into how
    well your practice run went ( *Figure 12 .5* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.5 – Speaker Coach rehearsal report](img/B32063_12_05.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.5 – Speaker Coach rehearsal report
  prefs: []
  type: TYPE_NORMAL
- en: You get a summary ( **2** ) of the total time spent rehearsing and the number
    of slides you rehearsed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It has a **Fillers** section ( **3** ) letting you know whether you were using
    filler words often or not. This is a big challenge for many presenters I have
    worked with through the years. Knowing you are using too many filler words is
    the first step to help you reduce their use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI can even analyze repetitive language ( **4** ) in your presentation.
    It is still considered a new feature as speech recognition is a work in progress.
    I must say, it has improved in the past few years.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The inclusiveness ( **5** ) of the language is also analyzed, helping presenters
    realize where they could improve. An example that comes to mind is the use of
    the expression *you guys* by many people, which is not considered gender-neutral.
    It could be replaced by *you all* or *everyone* , depending on the context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Pace** section ( **6** ) and the following **Your average pace over time**
    ( **7** ) section are great indicators to help you adjust how fast or slow you
    are talking. The shaded area between 100 and 150 words per minute in the chart
    ( **8** ) indicates the optimal pace you should have to keep your audience engaged.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The report also includes information on your voice pitch ( **9** ). A lack of
    variation in pitch when you speak will inevitably make your audience tune out.
    In other words, you will become boring! The more you work on your variations,
    such as increasing the tone of your voice for important points, the better it
    will be to keep your audience engaged.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The shaded area is your target to keep the audience engaged.
  prefs: []
  type: TYPE_NORMAL
- en: In the **Originality** section ( **10** ), **Speaker Coach** will pick up on
    whether you are reading every word on your slides. If you started using text and
    bullet points alternatives (as we discussed when we covered best practices or
    visual alternatives), you should not see many suggestions in this category of
    the report. There are times when I think it is still okay to read text on a slide—for
    example, when you are using a quotation. The way to do it is to read it slowly
    and clearly, then give the audience a few seconds to absorb it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To help Microsoft developers and engineers fine-tune **Speaker Coach** , you
    should take the time to rate your experience ( **11** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, if you are ready to start over, just click on the **Rehearse Again**
    button ( **12** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'At the time this book is being written, there are two other features available
    when using **Speaker Coach** in PowerPoint for the web: **Pronunciation** ( **1**
    ) and **Body Language** ( **2** ) ( *Figure 12.6* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.6 – Two features of Speaker Coach in PowerPoint for the web](img/B32063_12_06.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.6 – Two features of Speaker Coach in PowerPoint for the web
  prefs: []
  type: TYPE_NORMAL
- en: The **Pronunciation** feedback is based on American English and will evolve
    as more languages become available. Microsoft has already mentioned that it is
    working on expanding **Speaker Coach** to new languages, including Spanish, French,
    and Japanese.
  prefs: []
  type: TYPE_NORMAL
- en: The **Body Language** feature will give you feedback on **Eye contact** ( **3**
    ), whether your face was always visible in **Clear view** ( **4** ), and whether
    your distance ( **5** ) from the camera was consistent. If the checkmark is missing
    for a category, you will find tips on how to improve when clicking on the small
    arrow on the right ( **6** ).
  prefs: []
  type: TYPE_NORMAL
- en: This type of feedback would be useful if you are delivering mostly virtual presentations,
    helping you get into the habit of controlling how you interact with your camera.
  prefs: []
  type: TYPE_NORMAL
- en: '**Speaker Coach** should be your go-to feature to practice your presentations,
    helping you improve your pacing and choice of words, reduce filler words, and
    improve your body language. Practice with **Speaker Coach** as long as needed
    to help you gain more control of your delivery. Even though it has been asked
    of Microsoft in the past few years, at the moment, you cannot save your reports,
    so you need to take a screen capture if you want to keep track of your improvement.'
  prefs: []
  type: TYPE_NORMAL
- en: If you need to have a better sense of how much time you spend on each slide
    and keep track of your improvement, you need to leverage the **Rehearse Timings**
    feature—the topic of the next s ection.
  prefs: []
  type: TYPE_NORMAL
- en: Rehearsing timings and creating a recorded practice run
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'If you struggle to keep on topic for some of your slides, making your presentation
    run over time, you should open the **Slide Show** tab ( **1** ) and consider practicing
    with the **Rehearse Timings** feature ( **2** ) ( *Figure 12.7* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.7 – Starting and using Rehearse Timings](img/B32063_12_07.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.7 – Starting and using Rehearse Timings
  prefs: []
  type: TYPE_NORMAL
- en: When you click on **Rehearse Timings** , it starts your presentation in **Slide
    Show** mode and displays the small **Recording** tool ( **3** ) in the upper-left
    corner of the screen. You can click through your slides with your mouse, use your
    keyboard, or click on the **Next** arrow button ( **4** ) in the **Recording**
    tool. If you need to stop, just click the pause button ( **5** ) in the toolbar.
  prefs: []
  type: TYPE_NORMAL
- en: The first timer ( **6** ) shows you how much time you have spent on a slide.
    If you need to repeat the recording, you can click on the small repeat arrow (
    **7** ). The second timer ( **8** ) shows you how long you have been talking.
    If you want to end the **Rehearse Timings** tool quickly, just hit the *Esc* key
    on your keyboard. It will prompt a dialog box ( **9** ) showing you how long your
    slide show was and asking whether you want to save the slide timings.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you keep the slide timings, you will then have **automatic transitions**
    added to the slides you rehearsed ( *Figure 12.8* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.8 – Viewing slide timings added by Rehearse Timings](img/B32063_12_08.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.8 – Viewing slide timings added by Rehearse Timings
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to view the timings is to switch to **Slide Sorter** view (
    **1** ) to see them underneath each thumbnail ( **2** ). You can also see them
    by clicking on the **Transitions** tab ( **3** ) and then looking at **After**
    ( **4** ) in the **Timing** group.
  prefs: []
  type: TYPE_NORMAL
- en: Every time you practice and use the feature, you will see how you improve your
    timings per slide. Use the speaker notes to add keywords to help you stay on track.
    In [*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296) , we will discuss how to
    use those notes while you are delivering your talk.
  prefs: []
  type: TYPE_NORMAL
- en: You could decide to use the timings to have a self-running presentation for
    your next delivery, but I would suggest you avoid doing that so that you can go
    with the natural flow of audience interactions without being stressed that your
    slides will change automatically.
  prefs: []
  type: TYPE_NORMAL
- en: 'To make sure you are not stuck with your timings, simply go to the **Slide
    Show** tab ( **1** ) and remove the checkmark for **Use Timings** ( **2** ) (
    *Figure 12.9* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.9 – Removing the timings for your slide show](img/B32063_12_09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.9 – Removing the timings for your slide show
  prefs: []
  type: TYPE_NORMAL
- en: You can also go to the **Transitions** tab ( **3** ) and remove the checkmark
    in the **After** box ( **4** ). Both methods will return to you full control over
    the timing of your presentation .
  prefs: []
  type: TYPE_NORMAL
- en: If you are already relying on notes, y ou might find that **Rehearse Timings**
    is not as convenient because it does not allow using **Presenter View** . Microsoft
    introduced an improved, feature-rich **Record** feature in early 2022 that might
    just help you, and this will be discussed in the following section. Take note
    that this improved feature is available in M365. In previous versions, users have
    the classic **Record** experience, which has fewer f eatures.
  prefs: []
  type: TYPE_NORMAL
- en: Using the enhanced Record feature to practice
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Although recording a slide show has been available as early as Office 2013,
    the enhanced **Record** feature introduced by Microsoft has many great tools to
    help you practice. Yes —its main goal is to help presenters create videos of their
    content for distribution, but using it to see how you look and hear how you talk
    is the best way to improve your delivery. You will probably hate seeing and hearing
    yourself the first few times—we all do!—but this type of feedback is even more
    realistic than just using **Speaker Coach** . Using both is the best practice
    you can have when you don’t have anyone around to serve as your test audience.
  prefs: []
  type: TYPE_NORMAL
- en: The **Record** feature will be shown from the perspective of practicing your
    delivery, not producing your content to be distributed as a video file. This means
    not all the features will be explained. If you want to follow along, make sure
    to open a PowerPoint file that contains notes, and have your microphone and camera
    ready. My example will use presentation content I delivered for the *Presentation
    Summit 2024* event, so you can see the notes.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three ways to start the **Record** feature and access what the PowerPoint
    developers have been calling the *recording studio* ( *Figur e 12.10* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.10 – Accessing the Record feature](img/B32063_12_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.10 – Accessing the Record feature
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **Record** tab ( **1** ) and decide whether you want to start recording
    from the beginning ( **2** ) or from the current slide ( **3** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on the **Record** button ( **4** ) on the right of the tabs to start recording
    from your current slide.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternatively, in the **Slide Show** tab ( **5** ), click on the **Record**
    button ( **6** ) to choose **From Current Slide…** or **From Beginning…** ( **7**
    ).
  prefs: []
  type: TYPE_NORMAL
- en: 'Whatever method you choose, it starts your slide show and opens the recording
    studio, where we will go over the features most relevant to practicing your presentation
    ( *Figure 12.11* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.11 – Recording studio features](img/B32063_12_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.11 – Recording studio features
  prefs: []
  type: TYPE_NORMAL
- en: The window opens with a highlighted start recording/stop recording button (
    **1** ). When ready, click on it to start recording your rehearsal. You can also
    use the pause recording button ( **2** ) during the recording.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your camera and microphone are turned on by default when the recording studio
    opens ( **3** ), but clicking on the icons will turn them off. This also creates
    a Cameo object on your slides during the recording. It becomes a video object
    when in Normal view ( **4** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The border around the circle was added to the screenshot to help with visibility
    in the book. The Cameo shape does not have a border during the recording.
  prefs: []
  type: TYPE_NORMAL
- en: Your notes will auto-scroll when you start the recording. But you can adjust
    the **Scroll speed** ( **5** ) or **Disable auto-scroll** ( **6** ) if you prefer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Select more options** ellipsis ( **…** ) in the toolbar ( **7** ) gives
    you access to your microphone and camera settings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you start the **Record** feature, by default, **Views** ( **8** ) is set
    to **Teleprompter** view. This is how you see the notes above your slide to help
    you keep your eyes toward your camera. You can increase or decrease ( **9** )
    the size of your notes to help you read them during your recording. If you have
    m ore notes than the pane allows you to see, scrolling down with your mouse wheel
    is probably the best thing to do, even though there is a scroll bar on the right.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having full sentences in your notes might not always be a good idea. If you
    are presenting in front of people or during a virtual event, consider having only
    a bullet list of key points you need to remember to avoid the urge to read and
    sound monotone. If you are scripting your presentation because it will be provided
    as a narrated video, then consider practicing your script even more so you sound
    natural.
  prefs: []
  type: TYPE_NORMAL
- en: The select the camera mode icon ( **10** ) is set to **Blur Background** by
    default but can be changed to **Show Background** .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can go through your slides by clicking your mouse, using any keyboard keys
    available during the Slide Show, or by using the arrow icons ( **11** ) at the
    bottom of the studio.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You might want to select the **Help** icon ( **12** ) if you want to learn more
    about keyboard shortcuts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you are recording your rehearsal, you need to keep in mind that it is done
    on a per-slide basis. This means you need to stop talking during slide transitions.
    Microsoft also mentions there is a brief buffer of silence at the beginning and
    the end of each slide, meaning you should wait for 1 or 2 seconds before you start
    the narration on a slide and wait 1 or 2 seconds before changing your slide after
    you have finished talking.
  prefs: []
  type: TYPE_NORMAL
- en: 'After clicking the stop recording button or hitting the *Esc* key on your keyboard,
    the slide preview ( **1** ) becomes a video with a playback option with your camera
    feed in the bottom-right corner ( *Figu re 12.12* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.12 – Using studio features after recording a slide](img/B32063_12_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.12 – Using studio features after recording a slide
  prefs: []
  type: TYPE_NORMAL
- en: Yo u will see how long you spent on the slide and the total duration of your
    recorded session ( **2** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The delete recording button ( **3** ) opens a list of actions. You can clear
    recordings ( **4** ) on the current slide or all slides if you decide to retake
    the recordings or simply delete them all before delivering your presentation.
    You can use **Reset to Cameo** ( **5** ) on the current slide or all slides if
    you want to keep Cameo objects on your slides without keeping the video recordings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To go back to your slides, you can click on the **Edit** button ( **6** ) or
    hit *Esc* on your keyboard.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since we are talking about recording a presentation for rehearsal purposes,
    having the camera feed block information on the slide is not a problem. But if
    you ever decide to use the feature to create narrated videos of your presentation
    with the intention of distributing or posting them, you need to plan ahead of
    time how your content will be displayed on your slides to avoid having it blocked
    by the video feed.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you are back in **Normal** slide view, your recording is added as a video
    on your slide ( **1** ), and you can play it from there too ( **2** ) ( *Figu
    re 12.13* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.13 – Rehearsal recording video available on the slide](img/B32063_12_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.13 – Rehearsal recording video available on the slide
  prefs: []
  type: TYPE_NORMAL
- en: If you click the **Clear Recording** button ( **3** ), you also get the possibility
    to clear the recording on the current slide or clear recordings on all slides.
    Unless you decide to use your recordings to produce a narrated video, remember
    to use this feature to delet e the videos before your presentation.
  prefs: []
  type: TYPE_NORMAL
- en: The **Reset to Cameo** button ( **4** ) also gives you access to reset videos
    to Cameo objects on the current slide or all slides.
  prefs: []
  type: TYPE_NORMAL
- en: If you are curious about how to produce narrated videos from your presentation,
    click the **Export to Video** button ( **5** ) and follow the information provided
    in the export window.
  prefs: []
  type: TYPE_NORMAL
- en: Even though the **Record** feature was probably intended to help users produce
    narrated videos more easily, I would recommend it to all presenters to help them
    improve their presentation delivery. Seeing and hearing ourselves helps us improve
    greatly.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, being in front of an audience in a meeting room or a large venue
    requires moving on stage to help keep people engaged, something that is difficult
    to practice with **Record** since you need to be close to your screen to use the
    various tools in the studio. That is when you should rely on **Presenter Coach**
    instead so that you can set your camera in a way that you are framed from head
    to waist, at a minimum, and see the feedback you receive.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we have discussed how to adapt the various **Slide Show** options
    available in PowerPoint and how to leverage the **Speaker Coach** , **Rehearse
    Timings** , and **Record** features to help you rehearse your presentations and
    improve your delivery skills.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, relying solely on technology to rehearse might not be enough depending
    on what is at stake. If your next presentation might win you a million-dollar
    project, start by allowing enough time to plan, create, and rehearse your presentation
    with the tools you have learned about in this chapter. Then, choose a few people
    who can be good critics and deliver your presentation in front of them, more than
    once if possible. Technology can accomplish a lot, but human feedback is priceless!
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will be discussing how to use **Presenter View** during
    your presentation delivery to help you increase your confidence and leverage tools
    to help you navigate your content even if no navigation elements w ere planned.
  prefs: []
  type: TYPE_NORMAL
