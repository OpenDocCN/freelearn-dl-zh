- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Approaches to Successful AI Adoption
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Most companies I work with struggle to grasp what successful AI adoption truly
    looks like. They often fall into one of two camps. First, there are the idealist
    types who dream of AI robots doing all the work, so they can finally spend their
    days sipping margaritas on the beach. On the flip side, you have those who view
    AI as this Matrix-like code that goes over their heads - something to be completely
    handled by their IT department, hoping that *the experts* know what they are doing.
    However, both views are flawed and will not bring you closer to your goal of succeeding
    with AI.
  prefs: []
  type: TYPE_NORMAL
- en: To get answers for successful AI adoption, business leaders and IT professionals
    alike often turn to the inventors of modern AI, big tech companies from Silicon
    Valley. “*They invented this tech, so they must know how to use it*” is the general
    thinking here. But as we will learn, copying the AI playbooks of Silicon Valley
    is a sure recipe for disaster for most *normal* businesses.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter unpacks why the answer for successful AI adoption does not lie
    in the Bay Area, and where you need to look instead to find AI strategies that
    are aligned to your organizational context.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, there are four different methods that I’m going to introduce that I’ve
    found work very effectively across many industries and businesses, regardless
    of size. They are backed up by real-world success. This chapter will give you
    a solid foundation to kick off your own AI journey successfully.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start!
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: The pitfall of imitating big tech
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI divide and conquer approach
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI moonshot approach
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Product led AI approach
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Opportunistic AI approach
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Finding your AI approach: Where you are, where you want to go, and why it matters'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The pitfall of imitating big tech
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There’s a strange and persistent phenomenon in the business world where companies
    - especially those with high legacy and low tech - often try to imitate the practices
    of comparably young, high-tech companies such as Google, Meta, or Amazon. Now,
    this trend isn’t new and also is not constrained to AI. Take **Objectives and
    Key Results (OKRs)**, for example. OKRs are a goal-setting framework pioneered
    by Google to help aim for big goals while remaining agile and flexible. Many organizations
    jumped on the OKR train, assuming that what worked for Google would also work
    for them. However, they often found that this framework didn’t align with their
    operational realities, so they were left disappointed by what this technique could
    deliver. Often, the only professionals that really benefited from this were consultants
    selling OKR training.
  prefs: []
  type: TYPE_NORMAL
- en: AI is now being swamped by the same broken logic. Many companies worldwide are
    under the impression that if they simply mimic the AI strategies that worked for
    the companies that are at the forefront of modern AI innovation - big tech - they
    too will achieve AI success. However, what most fail to realize is that these
    tech giants are playing an entirely different game.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think about it: does your company have $40 billion to spend on AI R&D, like
    Meta? Can you afford to allocate $3 billion to experimental technologies, as Amazon
    does? Does your organization hold over 24,000 patents and give core technology
    away free of charge, like Google? The reality is, these are moves that only a
    tiny fraction of companies - perhaps 0.0001% - can make. But it doesn’t mean the
    rest of us are far away from achieving AI success. The key is to play your own
    game. Take the tools and technologies developed by these giants and adapt them
    to suit your specific needs and capabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: To find what works for you, you don’t have to start from scratch. Over the years,
    I’ve identified four distinct *AI approaches* that your company can take - especially
    if you are a normal business operating outside the tech bubble. These strategies
    have been successfully adopted by various companies across different industries
    and sizes, proving that there is more than one way to win with AI.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore these approaches and discover what success looks like in each
    category.
  prefs: []
  type: TYPE_NORMAL
- en: AI divide and conquer approach
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The **AI divide and conquer** approach is often used by companies seeking to
    leverage AI on a large scale in industries that are very likely to be disrupted
    by AI. These are particularly data - and knowledge-intensive industries such as
    finance, insurance, legal, biotech, and pharma, but also functions such as marketing,
    sales, and customer service. These fields deal with vast amounts of data and rely
    heavily on information for decision-making, making them ideal candidates for AI
    transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Inspired by the ancient Roman military strategy, the business world’s AI divide
    and conquer approach involves managing the AI transformation of a large organization
    by breaking it down into smaller, more manageable components that exhibit a high
    degree of self-control under clearly defined guardrails. This strategy allows
    different units within the organization to pursue their own AI initiatives independently
    while adhering to a common, overarching goal.
  prefs: []
  type: TYPE_NORMAL
- en: Spreading AI adoption broadly with multiple smaller projects prevents the *boil
    the ocean* problem, where companies become paralyzed by the sheer size of a monolithic
    AI initiative. Many enterprises commonly follow this approach in managing their
    wider digital transformations, typically led by a central hub, often an **AI Center
    of Excellence (AICoE)**.
  prefs: []
  type: TYPE_NORMAL
- en: Take a look at *Figure 3.1*. The AICoE coordinates efforts but allows flexibility
    and innovation at the departmental level without wielding ultimate directive authority
    over the various business units.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1: AI divide and conquer approach](img/B31200_03_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.1: AI divide and conquer approach'
  prefs: []
  type: TYPE_NORMAL
- en: If you carefully observe this image, the AI projects have different sizes based
    on the requirements of each department. For instance, Department B may have several
    use cases for AI while Department A may have fewer use cases that can be driven
    by AI. This approach thus allows for adopting AI based on requirements as smaller,
    more manageable projects.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s talk about how this approach can be applied in an organization.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, the AI divide and conquer approach requires empowering different
    departments or units within the organization to operate independently while maintaining
    alignment with a common AI-driven goal. This often starts with creating a comprehensive
    backlog of AI use cases - sometimes numbering in the hundreds - that each department
    can prioritize and pursue according to their specific needs and capabilities.
    These use cases might range from automating routine administrative tasks in HR
    to deploying advanced predictive analytics in the marketing department.
  prefs: []
  type: TYPE_NORMAL
- en: The AICoE plays a crucial role in this process. It not only curates and prioritizes
    these use cases but also provides the necessary support in terms of resources,
    expertise, and best practices. This ensures that while each department has the
    freedom to innovate, their efforts remain aligned with the broader organizational
    strategy. The AICoE might organize regular cross-departmental meetings, workshops,
    or hackathons to share insights, foster collaboration, and ensure that the AI
    projects are moving in a direction that benefits the company as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: As these AI projects roll out, their cumulative effect can be transformative.
    Individually, each project might seem modest, but collectively, they can drive
    significant improvements in efficiency, innovation, and overall organizational
    performance. By engaging employees at all levels in these projects, the organization
    fosters a culture of continuous learning and improvement, upskilling its workforce
    and preparing them for the future of work.
  prefs: []
  type: TYPE_NORMAL
- en: There are several advantages and disadvantages of this approach. Let’s talk
    about them.
  prefs: []
  type: TYPE_NORMAL
- en: 'The divide and conquer approach to incorporate AI independently across verticals
    and teams offers several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Organizational-wide enablement:** Enabling different teams within an organization
    to experiment with AI can foster innovation from the ground up, finding new cost
    savings and capabilities that may not be discovered otherwise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Higher employee engagement:** Engaging in AI projects can drive motivation
    among the workforce by showing them how their work is impacted, and ideally improved,
    by AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability and adaptation:** Since each department is working on smaller,
    manageable projects, there is less risk of large-scale failure, making it easier
    to pivot or iterate on strategies as needed. Projects can be tackled in parallel,
    which further accelerates AI adoption.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'But this approach comes with some limitations too:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Alignment challenges**: Ensuring that all departments are moving toward the
    same overall AI strategy can be challenging. Without careful coordination, there’s
    a risk of departments working in silos, leading to a fragmented approach that
    dilutes the impact of AI initiatives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Measuring impact**: Quantifying the overall impact of numerous small projects
    is tough. While individual projects might yield measurable results, aggregating
    these to understand the full value of AI adoption can be complex.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Budget constraints**: Because there’s no overarching business case, the projects
    generally need to be funded from existing departmental budgets, which may limit
    their scope. Departments might prioritize short-term gains over long-term innovation
    if they’re restricted by budget constraints.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inconsistent data practices**: As different departments or units work independently
    on their AI projects, there can be inconsistencies in how data is collected, processed,
    and analyzed. Without a standardized approach to data management, these inconsistencies
    can lead to data silos, where valuable information is not shared across the organization.
    This can hinder the ability to derive comprehensive insights, reduce the overall
    effectiveness of AI initiatives, and make it difficult to maintain a unified data
    strategy that could ultimately unlock higher value AI use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s move our focus on to how Moderna successfully used the AI divide and conquer
    approach across its different functions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case study: Moderna'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Biotech innovator Moderna exemplifies the *AI divide and conquer* approach by
    strategically integrating AI across various functions within the company. From
    legal and R&D to manufacturing and commercial operations, AI tools have been embedded
    into the daily workflows of over 80% of Moderna’s workforce.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of this transformation is Moderna’s internal AI platform, *mChat*,
    a proprietary instance of ChatGPT built using OpenAI’s API. Initially launched
    in early 2023, mChat sparked a cultural shift toward AI adoption, leading to the
    rollout of ChatGPT Enterprise across the organization. This enterprise-grade implementation
    includes capabilities such as advanced data analytics, image generation, and custom
    GPTs tailored to department-specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: Moderna reported to have deployed over 750 purpose-built GPTs that act as digital
    assistants, supporting employees in tasks ranging from summarizing contracts to
    evaluating clinical trial data. For example, in the R&D department, the Dose ID
    GPT analyzes thousands of pages of clinical data to recommend optimal vaccine
    doses. It not only provides rationale and visualizations but also allows researchers
    to converse with the model to explore findings from multiple angles, which significantly
    accelerates data-driven decision-making in drug development.
  prefs: []
  type: TYPE_NORMAL
- en: Quite surprisingly, the legal department was the first to fully adopt AI, achieving
    a 100% usage rate early on. Tools such as Contract Companion GPT allow legal teams
    to upload contracts, generate summaries, and query specific clauses, freeing up
    time for higher-impact legal strategy work. This early adoption created internal
    momentum and trust in AI, which likely contributed to the smooth scaling of these
    tools across other departments.
  prefs: []
  type: TYPE_NORMAL
- en: In manufacturing, AI enhances precision and efficiency, enabling rapid scaling
    during high-demand periods, such as the COVID-19 pandemic. Commercial teams also
    benefit from AI-driven insights and automation that boost productivity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moderna’s success with AI offers several actionable takeaways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Start with a strong data foundation**: Moderna was already a digital-first,
    machine learning-native company, which made AI integration more seamless.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Invest in internal tooling**: Rather than waiting for one-size-fits-all solutions,
    Moderna built mChat in-house and developed hundreds of tailored GPTs for different
    functions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Focus on workforce transformation, not just tools**: Moderna didn’t just
    install software but redesigned workflows and trained employees to work *with*
    AI, treating it as an extension of their capabilities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead with high-ROI departments**: Early adoption by the legal team demonstrated
    clear value and helped build organizational momentum for wider rollout.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Use AI to scale without bloating the workforce**: Moderna aims to launch
    15 products in 5 years with fewer than 6,000 employees - something that is only
    feasible through automation and augmentation via AI.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using this strategic divide and conquer approach, Moderna has not only improved
    internal productivity but also strengthened its ability to scale impact in healthcare,
    providing a great case study to learn from.
  prefs: []
  type: TYPE_NORMAL
- en: The next approach we will discuss is the **AI moonshot** approach, which, instead
    of transforming the organization widely, aims to build a central core AI solution
    for extremely high business impact.
  prefs: []
  type: TYPE_NORMAL
- en: AI moonshot approach
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The AImoonshot strategy is all about honing in on a single, transformative AI
    project that has the potential to revolutionize not just a company’s operations,
    but also its entire industry. This strategy stands in stark contrast to the **AI
    divide and conquer** approach, which disperses efforts across multiple smaller
    projects. Here, the company channels its resources, talent, and focus into one
    high-impact initiative - a moonshot project that could redefine the company’s
    market position and set new standards within its industry.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2: AI moonshot approach](img/B31200_03_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.2: AI moonshot approach'
  prefs: []
  type: TYPE_NORMAL
- en: Usually, in the moonshot approach, the product keeps on evolving over time to
    reach complete transformation with AI (see *Figure 3.2*). But what exactly qualifies
    as an AI moonshot? It’s more than just a successful application of AI; it’s a
    project that has the ability to fundamentally change the way the company operates
    or delivers value to its customers, thereby changing or expanding its core business
    model. Imagine a call center that builds an autonomous voice bot that answers
    incoming customer queries in more than 10 languages, 24/7, always with the latest
    information, and at a fraction of the cost of human-staffed call centers. This
    would disrupt an entire offshoring industry. Or imagine an online university that
    provides 1:1 learning experiences in all subjects, tailored to each student for
    optimal learning performance. These are use cases that, if done right, would not
    just *improve* business but turn it on its head.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how this approach can be implemented in practice.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing the AI moonshot strategy requires deep vertical integration within
    the organization and a level of commitment that goes beyond what is typical in
    most AI projects. Moonshot projects are typically centrally funded. The company
    must be prepared to allocate substantial resources - in terms of both capital
    and human talent - to ensure the success of this single initiative. This often
    involves significant investments in R&D, acquiring or developing cutting-edge
    technology, and possibly even bringing in external expertise to supplement internal
    capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: The chosen AI use case becomes the centerpiece of the company’s AI strategy,
    commanding continuous attention from top management. To ensure success, the organization
    may need to undergo structural changes, such as creating new roles or departments
    dedicated to the project or realigning existing teams to better support the initiative.
    Cross-departmental collaboration is also essential; while the project may be spearheaded
    by a specific team, it will likely require input and expertise from various areas
    of the company, including IT, operations, marketing, and legal.
  prefs: []
  type: TYPE_NORMAL
- en: 'A moonshot approach, though risky, comes with some benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Industry leadership:** Successfully executing a killer AI use case can position
    a company as an unrivaled leader in its sector, and build a massive moat for the
    company, allowing it to capture much larger market shares.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transformational impact:** The right AI use case can transform the company’s
    operations, potentially opening up entirely new business models or revenue streams,
    and potentially creating completely new industry categories.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'But there are quite a few limitations that you need to be aware of while adopting
    this approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '**High risk of failure**: Focusing on a single project carries inherent risks.
    If the project fails to deliver as expected, it could leave the company vulnerable,
    with significant sunk costs and missed opportunities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High upfront investment**: This approach requires considerable investment
    in terms of capital, talent, and time. Smaller companies, or those with limited
    resources, might struggle to sustain the required level of commitment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sunk cost fallacy**: Because of the massive upfront investment needed and
    the long-term goal, it’s always hard to say whether you just need to keep pushing
    or whether it’s time to discontinue the project. The longer the project goes on,
    the higher the likelihood you will keep pushing, because of all the resources
    you have already invested in it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regulatory challenges**: Depending on the industry, the company might face
    significant regulatory hurdles. For example, in healthcare or finance, strict
    regulations around data privacy and security can complicate the development and
    deployment of AI solutions, especially when they touch new business areas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Organizational resistance**: The focus on a single, transformative project
    can encounter resistance within the organization, especially if it requires significant
    changes to established workflows or threatens existing power structures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A quintessential example of the AI moonshot strategy is Tesla’s ambitious pursuit
    of autonomous driving, which we will discuss next.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case study: Tesla'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tesla’s focus on achieving full self-driving capability is not just a side project;
    it’s central to the company’s long-term vision of transforming from a traditional
    car manufacturer into a global leader in shared mobility services.
  prefs: []
  type: TYPE_NORMAL
- en: Tesla has invested heavily in AI research and development, including the creation
    of custom AI chips, the development of a massive dataset collected from millions
    of Tesla vehicles, and the hiring of top-tier AI talent. This initiative has required
    deep integration across the company’s engineering, software, and hardware teams,
    as well as continuous investment in infrastructure to support the AI models that
    power autonomous driving features.
  prefs: []
  type: TYPE_NORMAL
- en: What makes Tesla’s approach distinct is its vertical integration across the
    entire AI stack - a rare feat even among the most advanced tech companies. On
    the hardware side, Tesla designed its own **Full Self-Driving (FSD)** computer,
    equipped with custom neural network inference chips optimized specifically for
    real-time driving decisions. These chips process vast volumes of visual data directly
    on the vehicle, reducing latency and increasing safety.
  prefs: []
  type: TYPE_NORMAL
- en: Tesla also controls the data pipeline from end to end. Every Tesla vehicle on
    the road acts as a sensor hub, contributing to what may be the largest video dataset
    ever assembled for driving scenarios. With billions of miles driven and petabytes
    of real-world footage, Tesla has a massive training advantage. The company’s auto-labeling
    systems use AI to annotate video data at scale, enabling rapid iteration on model
    training.
  prefs: []
  type: TYPE_NORMAL
- en: On the software side, Tesla has built its own AI training infrastructure, including
    its proprietary Dojo supercomputer, which is purpose-built for video-based neural
    network training. This allows Tesla to push the boundaries of vision-only autonomy,
    avoiding reliance on costly LiDAR and instead doubling down on foundational research
    in computer vision. For this, Tesla entertains an AI team that operates at a world-class
    level.
  prefs: []
  type: TYPE_NORMAL
- en: The potential rewards of this AI moonshot are enormous. While Tesla hasn’t yet
    achieved full autonomous driving, the progress they’ve made over the past decade
    - going from 0 to SAE Level 2 by relying solely on AI to *look* at image data
    (computer vision) instead of equipping cars with specialized, expensive sensors
    - is remarkable. Successfully achieving full autonomy could open up new revenue
    streams for Tesla, such as autonomous ride-hailing services, and could significantly
    strengthen its market position by offering a feature that few competitors can
    match. However, the stakes are equally high - failure to achieve full autonomy
    within a reasonable timeframe could jeopardize Tesla’s broader business model,
    especially as competitors advance their own autonomous driving technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Tesla’s journey illustrates the high-risk, high-reward nature of the AI moonshot
    strategy. It’s a bold approach that, if successful, can redefine an industry -
    but it requires unwavering commitment, substantial resources, and a willingness
    to face significant challenges head-on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Other organizations pursuing a breakthrough AI product can learn from Tesla’s
    approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Control the full stack:** Tesla didn’t just rely on off-the-shelf solutions
    - it built its own chips, collected its own data, and developed its own training
    infrastructure. This tight integration gives the company unmatched flexibility
    and speed of innovation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Use scale to create data advantage:** With millions of cars on the road acting
    as data collectors, Tesla created a feedback loop where real-world performance
    constantly informs model improvements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Build for your specific use case:** Tesla’s Dojo supercomputer and custom
    AI chips weren’t designed for general-purpose AI - they’re optimized for real-time,
    video-based perception, showing the value of bespoke infrastructure in a focused
    AI use case.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Invest in foundational research:** Tesla has contributed novel computer vision
    techniques tailored to driving, giving it an edge not just in implementation but
    in the core science powering its models.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Accept risk as part of the strategy:** Tesla is betting big on a single AI
    application that could define its future. This requires sustained investment and
    the resilience to weather delays, technical challenges, and regulatory hurdles.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tesla’s AI strategy underscores that sometimes, the biggest payoffs might not
    come from spreading AI broadly across every department, but from betting big on
    a singular, transformative use case and building everything needed to make it
    real.
  prefs: []
  type: TYPE_NORMAL
- en: Next up, we will talk about the **Product-led AI** approach.
  prefs: []
  type: TYPE_NORMAL
- en: Product-led AI approach
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Product-led AI strategy is centered around enhancing - not necessarily redefining
    - existing products with AI capabilities, thereby improving functionality, user
    experience, and overall value. This approach is particularly suited for companies
    that aim to maintain their core business model while remaining competitive in
    a crowded market. Instead of AI being the primary selling point, it is subtly
    integrated into products to augment their features and ensure they continue to
    meet and exceed customer expectations.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3: Product-led AI illustration](img/B31200_03_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.3: Product-led AI illustration'
  prefs: []
  type: TYPE_NORMAL
- en: What sets the Product-led AI approach apart is its focus on incremental improvement
    rather than radical transformation. AI is used to fine-tune products, making them
    smarter, more intuitive, and more responsive to user needs. This strategy allows
    companies to leverage AI’s potential without having to undergo a complete business
    model overhaul, which can be risky and resource-intensive.
  prefs: []
  type: TYPE_NORMAL
- en: Here is a primer on how you can bring the Product-led AI approach into practice.
  prefs: []
  type: TYPE_NORMAL
- en: For companies adopting a Product-led AI strategy, the goal is to integrate AI
    in a way that enhances the product without overshadowing its core value proposition.
    This typically involves embedding AI technologies into the product to add new
    features, improve performance, or provide a better user experience. For example,
    in the technology industry, AI could be used to improve software algorithms, enabling
    more personalized recommendations or faster processing times. In consumer products,
    AI could improve product usability through features such as speech recognition
    or automated adjustments based on user behavior.
  prefs: []
  type: TYPE_NORMAL
- en: A critical aspect of this approach is that AI itself is not the focus of marketing
    or customer engagement. Instead, the focus remains on the product and the benefits
    it provides. This requires close collaboration between product development teams,
    AI engineers, and marketing professionals to ensure that AI capabilities are seamlessly
    integrated and enhance the overall user experience.
  prefs: []
  type: TYPE_NORMAL
- en: In a Product-led AI strategy, AI ultimately becomes another means to the end
    of delivering a feature on the product backlog.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at some of the benefits of this approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Enhanced user experience**: By integrating AI into products, companies can
    offer new features and improved functionality, leading to a better user experience.
    This, in turn, can increase customer satisfaction and loyalty, as users find the
    product more valuable and easier to use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Competitive differentiation**: In crowded markets, AI enhancements can help
    a product stand out from the competition. Even small improvements, such as faster
    response times or more accurate predictions, can be significant differentiators.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Incremental innovation**: This approach allows companies to innovate continuously
    without the need for drastic changes to their business model. By focusing on product-level
    improvements, companies can stay ahead of the curve without taking on the risks
    associated with large-scale transformations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Low risk**: Since AI capabilities are rolled out as feature enhancements,
    there’s typically less risk of expending massive resources without seeing anything
    in return. Features are typically scoped to allow for agile delivery, so AI development
    increments need to be small. This allows you to better control costs and monitor
    the ongoing process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Product-led AI approach comes with its own set of challenges, some of which
    are listed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Replicability**: Because AI improvements are often incremental, there is
    a risk that competitors will quickly replicate them, reducing the competitive
    advantage. Copycats could even deliver a better experience than first movers if
    they find a way to learn from the user experience of early adopters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Less organizational learning**: Focusing on product-level AI integration
    may not lead to a broader organizational understanding of AI. This could limit
    the company’s ability to scale AI solutions across the organization or explore
    more transformative AI opportunities in the future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Missing out on big innovation**: If your product is leading the AI innovation,
    the scope for innovation is inherently limited by the scope of your product. This
    can lead to situations where you improve a product to perfection only to miss
    the bigger trend that makes your product obsolete (see, for example, computer
    manufacturers who missed the mobile boom).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Innovation pressure**: The reliance on continuous product improvement can
    put pressure on R&D teams to constantly innovate, focusing on short-term improvements
    and losing sight of long-term innovation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s take a look at how the Product-led AI approach drives success in Apple.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case study: Apple'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Apple’s subtle yet powerful integration of AI into its products exemplifies
    the Product-led AI strategy. While Apple rarely emphasizes AI in its marketing,
    the technology is deeply embedded in many of its offerings, enhancing both functionality
    and user experience.
  prefs: []
  type: TYPE_NORMAL
- en: Take **FaceID**, for instance. This facial recognition system, powered by advanced
    AI algorithms, has revolutionized the way users interact with their devices. It
    offers a seamless, secure, and highly intuitive method for unlocking phones, authorizing
    payments, and accessing sensitive information. By integrating this AI-driven feature
    into its devices, Apple has not only improved security but also enhanced convenience,
    reinforcing the brand’s reputation for innovation and user-centric design.
  prefs: []
  type: TYPE_NORMAL
- en: Another example is the use of machine learning in Apple’s camera systems. Thanks
    to AI, your smartphone can analyze and optimize every pixel in an image, producing
    photos that are sharper, more detailed, and more true to life. These enhancements
    are not marketed as AI features per se; instead, they are presented as part of
    the overall photography experience, which is a key selling point for Apple devices.
  prefs: []
  type: TYPE_NORMAL
- en: What distinguishes Apple’s strategy is its **deeply embedded****,** **vertically
    integrated AI architecture**, recently branded as **Apple Intelligence**. Rather
    than focusing on a single killer app or a department-wide rollout, Apple has chosen
    to let AI quietly elevate the core experiences of its flagship products - iPhone,
    iPad, and Mac - through features users rely on every day.
  prefs: []
  type: TYPE_NORMAL
- en: 'With the 2025 rollout of Apple Intelligence in iOS 18, iPadOS 18, and macOS
    Sequoia, Apple introduced a suite of generative AI capabilities designed to enhance
    language, image creation, personal context, and task automation. This includes
    tools like:'
  prefs: []
  type: TYPE_NORMAL
- en: Smart text processing, for writing, rewriting, and proofreading across apps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clean Up in Photos, which removes unwanted elements from pictures.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notification summarization and mail categorization, using on-device models to
    streamline communication.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visual intelligence, which leverages the camera for object recognition, text
    translation, and context-aware actions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Behind the scenes, this capability is powered by a highly integrated AI stack:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Apple silicon**: The M-series chips with dedicated Neural Engines are purpose-built
    to handle AI workloads efficiently and securely on-device.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**On-device processing**: Most Apple Intelligence features run locally, preserving
    privacy without sacrificing speed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Private cloud compute**: For more demanding tasks, Apple offloads data to
    encrypted servers - only when needed and only with user consent - ensuring privacy
    isn’t compromised even at scale.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apple also tailors AI features to the form factor and strengths of each device.
    On iPads, for example, new capabilities such as Math Notes and Smart Script in
    iPadOS 18 make handwriting more interactive and functional. Users can solve equations
    with Apple Pencil in real time or edit handwritten notes as fluidly as typed text.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notably, Apple rarely markets these capabilities as *AI*, per se. Instead,
    they’re seamlessly folded into the product narrative: intelligence that just works.
    This lets Apple focus on delighting users, rather than dazzling them with technical
    jargon.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Apple’s approach offers clear lessons for companies looking to infuse AI into
    their product lines without overwhelming or alienating users:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Design AI around the user experience, not the buzzword**: Apple doesn’t lead
    with AI; it leads with usability. AI features are surfaced only when they make
    something faster, simpler, or more delightful.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Control the tech stack**: From chip design (Apple silicon) to privacy-preserving
    cloud compute (Private Cloud Compute), Apple ensures its AI ecosystem is secure,
    efficient, and optimized for its products.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Deploy AI invisibly where it matters most**: Features like FaceID, Smart
    Script, or Clean Up in Photos are AI-powered, but Apple positions them as enhancements
    to core product functionality - not standalone tools.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prioritize privacy by default**: Apple’s commitment to running models on-device
    wherever possible, and encrypting any data used in the cloud, builds long-term
    user trust - especially crucial in consumer tech.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Leverage form-specific intelligence**: Whether it’s real-time handwriting
    enhancements on iPads or photo cleanup on iPhones, Apple ensures each AI application
    fits the context of the device.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By integrating AI in ways that enhance product value without overshadowing it,
    Apple has managed to maintain its leadership position in a highly competitive
    market. This approach allows Apple to continuously improve its products, offering
    users new and valuable features that keep them loyal to the brand, while also
    setting the bar for competitors in terms of product quality and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Approach 4: Opportunistic AI'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The **Opportunistic AI** approach is ideal for companies that prefer a cautious,
    risk-averse strategy for AI adoption. The general attitude here is, *We don’t
    need AI until you prove me wrong*. While this may sound naive, there are many
    industries where the most pressing challenges have nothing to do with AI. Take
    the trades, construction, or any other brick-and-mortar business as an example.
    The Opportunistic AI approach involves integrating AI only when a compelling,
    well-defined use case emerges - one that provides immediate, tangible benefits
    for specific business functions or processes. Rather than pursuing AI for innovation’s
    sake across the enterprise, companies using this strategy focus on practical,
    proven applications that align with their existing operational goals.
  prefs: []
  type: TYPE_NORMAL
- en: This approach works best when companies want to improve a single job within
    specific functions that have a proven track record of being improved by AI. Think
    of jobs in customer service or marketing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.4: Opportunistic AI adoption illustration](img/B31200_03_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.4: Opportunistic AI adoption illustration'
  prefs: []
  type: TYPE_NORMAL
- en: By selectively deploying AI in these areas, companies can achieve efficiencies
    and cost savings without undertaking large-scale transformations or taking on
    significant risk. Unlike the divide and conquer approach to AI, adoption in these
    areas isn’t a *push* - initiated by the C-suite - but often a *pull* - as business
    professionals discover that AI can improve their daily work.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing the **Opportunistic AI** approach is very often tool-driven. A
    new software or vendor catches the attention of a business professional or mid-level
    business leader, and they *fight* to get resources to implement that tool. Since
    the default decision is *we don’t need it*, business users who want to benefit
    from AI technology must create a clear business case for the tool. This leads
    to well-defined, well-scoped use cases, but may also result in longer implementation
    cycles, depending on the cost and complexity of the tool and the size of the organization.
  prefs: []
  type: TYPE_NORMAL
- en: A key aspect of this approach is the emphasis on efficiency and quick wins.
    The selected AI applications are typically low-risk and have a high probability
    of delivering immediate benefits, such as reducing operational costs or improving
    customer satisfaction. This ensures that the company can see tangible results
    without disrupting existing processes or requiring significant changes to its
    overall business model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how your organization can benefit from the Opportunistic AI approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Risk reduction**: By focusing on AI implementations in specific, proven areas,
    companies minimize the risks associated with untested or experimental applications.
    This allows them to leverage AI’s benefits without the high costs or potential
    failures of broader, less targeted initiatives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Immediate returns**: The selective nature of this approach ensures that AI
    integrations are closely aligned with specific business goals, leading to quick
    and measurable improvements in efficiency, cost savings, or customer satisfaction.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Leveraging proven success**: Companies can adopt AI technologies that have
    already been validated in similar functions or processes by others, reducing uncertainty
    and enabling the use of best practices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There are some limitations to this approach that you need to be aware of before
    you adopt it:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Missed broader opportunities**: By focusing only on specific functions or
    processes, companies might overlook broader, transformative AI opportunities that
    could revolutionize other parts of the business. This selective approach might
    also limit the company’s ability to quickly adapt or pivot in response to changing
    market conditions or competitor advances.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risk of falling behind competitors**: Companies that adopt AI selectively
    in only a few areas might fall behind more aggressive competitors who implement
    organization-wide AI strategies. This can lead to losing out on a first-mover
    advantage, potentially impacting market share and diminishing the company’s position
    as an industry leader.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Complacency leading to stagnation**: There’s a risk that companies may become
    too comfortable with their existing processes, leading to stagnation. Over time,
    this could limit the organization’s capacity for innovation or adaptation to future
    disruptions. Companies need to guard against this by continually monitoring technological
    advancements and experimenting with new AI opportunities to stay competitive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration challenges:** Opportunistic AI adoption will often lead to integration
    challenges, where AI systems may not seamlessly connect with existing workflows
    or each other, resulting in inefficiencies or a fragmented approach. This can
    complicate efforts to scale AI across the organization and reduce the overall
    effectiveness of AI initiatives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Home Depot - exemplifying a classic retailer here - is a good lesson in
    the **Opportunistic AI** approach of focusing on proven, high-impact AI applications.
    Let’s dig deeper.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case study: The Home Depot'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Home Depot uses supervised machine learning and computer vision to optimize
    inventory processes, ensuring products are in the right place at the right time.
    This targeted use of AI has led to cost savings and improved customer satisfaction,
    both in-store and online.
  prefs: []
  type: TYPE_NORMAL
- en: It has also selectively enhanced its e-commerce experience with AI-powered search
    and product recommendation systems. These tools improve engagement and drive conversions
    - but only where the return on investment is clear and measurable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the key initiatives that the company undertook are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sidekick app**: A mobile application developed in-house that uses machine
    learning and computer vision to assist store associates with real-time inventory
    management by directing them to restock shelves as needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Magic Apron**: A suite of generative AI tools designed to provide customers
    with expert advice and product recommendations online - particularly helpful for
    DIY projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhanced search functionality**: AI-driven algorithms improve the relevance
    of on-site search results, leading to increased click-through rates and higher
    conversion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While similar applications exist across many modern retailers, The Home Depot
    stands out for its focus and discipline in deploying AI where it matters most.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some of the key takeaways from this strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify high-impact areas**: Focus on domains where AI delivers clear, measurable
    value - such as inventory management or customer service.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Leverage existing expertise**: Use internal knowledge and operational data
    to design relevant, domain-specific applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Maintain operational simplicity**: Avoid unnecessary complexity. Prioritize
    technologies that enhance, not disrupt, existing workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitor and evaluate outcomes**: Continuously measure the impact of AI tools
    and adjust as needed to ensure long-term effectiveness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Home Depot’s Opportunistic AI strategy serves as a model for companies -
    retail or otherwise - that want to embrace AI without overhauling their operations.
    It shows that AI doesn’t have to be flashy to be effective. A focused, thoughtful
    approach can deliver substantial business results - without the cost or risk of
    **implementing AI everywhere**.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have looked into various approaches for AI adoption, we will talk
    about how to identify which approach suits your organization the best.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finding your AI approach: Where you are, where you want to go, and why it matters'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So, which of these four approaches - AI divide and conquer, AI moonshot, Product-led
    AI, or Opportunistic AI - should **you** choose for your organization? That’s
    like asking, *What’s the best car?,* without any context about who’s driving,
    where you’re heading, or why you’re traveling in the first place. The right AI
    strategy, much like the right vehicle, hinges on your **current state**, your
    **target future state**, and the big reason **why** you need to get there.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll walk through the key considerations to help you figure this out.
  prefs: []
  type: TYPE_NORMAL
- en: Assessing your organization’s AI readiness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you jump headfirst into any of the four approaches, you need a clear-eyed
    view of where you stand right now. Have you actually worked with data at scale
    before? Do you have AI talent on board, or will you need to rely on external partners
    and vendors? Is there a budget set aside for digital transformation initiatives,
    or are you already squeezed? Is your organization’s culture open to the idea of
    *failing forward* with new technology, or are you dealing with a fortress of skepticism
    at every department door?
  prefs: []
  type: TYPE_NORMAL
- en: These questions aren’t trivial. Your organization’s **AI maturity** will guide
    whether you’re ready for a high-octane, R&D-heavy *Moonshot*, or whether a low-risk,
    incremental *Opportunistic AI* pilot is more realistic. If you don’t have a robust
    data infrastructure or enough internal AI expertise, launching a massive, AI-fueled
    moonshot (approach 2) might be like handing the car keys to a 14-year-old. It’s
    not going to end well.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to pinpoint your AI maturity is to map your current state to
    the four adoption approaches. What are you doing right now with regard to AI?
    Are you already wrapped up in a big AI project? You might be carrying out the
    product-led or moonshot approach. Have you not done anything with AI at all? Well,
    it seems you’re in the opportunistic playing field - no AI unless convinced otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: So - if you had to simplify it - which of the current AI adoption approaches
    reflects your current business reality best?
  prefs: []
  type: TYPE_NORMAL
- en: Define your future state
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once you’ve nailed down where you stand, it’s time to ask: **Where do we want
    to be a year from now? Two years? Five?**And, more importantly, **why?** This
    is where understanding how AI influences your market dynamics becomes crucial
    - Recall the **AI as a new force** concept we introduced in *Chapter 1*. Each
    of the approaches we’ve covered can help you move the needle on at least one of
    those competitive levers:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Threat of new entrants**: If your industry is at high risk of AI disruption
    from new entrants (think banks facing fintech upstarts or retailers battling e-commerce
    pure-plays), you might need a bigger AI strategy to stay ahead. *AI divide and
    conquer* or *AI moonshot* might allow you to build a moat before the competition
    floods in.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Threat of substitutes**: If your products or services face a real risk of
    AI-driven alternatives, you might need a transformative approach - such as, doubling
    down on a killer AI use case or layering AI deeply into your product suite - to
    avoid becoming obsolete.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bargaining power of suppliers**: In data-heavy industries, consider whether
    an **AI divide and conquer** approach can democratize knowledge and reduce dependency
    on a single AI supplier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bargaining power of buyers**: If your customers can easily compare and switch
    to AI-savvy competitors, maybe a **product-led AI** approach is the easiest way
    to differentiate yourself and keep them loyal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rivalry among existing competitors**: If your market is cutthroat, do you
    really have time for incremental changes? If not, you might opt for a bold *moonshot
    use case* that redefines the entire playing field.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your future state is essentially the vantage point from which you look back
    and say, **We got the AI puzzle right - and we did it faster (or smarter) than
    our competitors**.
  prefs: []
  type: TYPE_NORMAL
- en: Your big reason why
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A compelling **why** is the imperative for change that keeps your AI journey
    going, even when you hit roadblocks (and you will hit roadblocks). If your **why**
    isn’t clear, you’ll struggle to justify the costs, resource allocations, and potential
    risks that come with AI adoption. No matter which approach you choose, tie it
    back to a clear, business-oriented rationale. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Increasing ROI** through cost savings or revenue boosts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Securing a competitive moat** by building superior AI-driven features or
    experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Opening new markets** or product lines that simply aren’t possible without
    AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Building resilience** against the five forces: for example, by lowering supplier
    power or reducing buyer churn.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Depending on where you started, it might be that your future state is actually
    the same as what it is right now (e.g., if competitive dynamics in your industry
    do not demand instant change with AI, you might as well stick with a very opportunistic
    AI adoption approach just like now). Or perhaps your future state is a combination
    of what you’re doing (e.g., divide and conquer) plus some additional focus in
    certain verticals (e.g., product-led AI for a certain business area).
  prefs: []
  type: TYPE_NORMAL
- en: Getting clarity on this end goal will not only help you confidently charter
    your AI journey and allocate budgets. It’ll also help you communicate the vision
    of how AI fits into your organization and get buy-in from your teams, as well
    as your executives and shareholders.
  prefs: []
  type: TYPE_NORMAL
- en: 'Balancing AI ROI and AI R&D: Knowing which game you’re playing'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the biggest pitfalls I see is when companies *think* they’re playing
    an ROI-first game but are actually funding R&D moonshots - **or** vice versa.
    This mismatch results in disappointment, frustration, and the dreaded **AI is
    overrated** refrain. Here is how you can differentiate what drives your ROI:'
  prefs: []
  type: TYPE_NORMAL
- en: '**ROI-driven AI**: If your industry moves slower, or if you’re simply not ready
    for massive disruption, it could be wise to **start small** and iterate quickly.
    **Opportunistic AI** or **Product-led AI** can offer immediate returns with minimal
    risk. But if you try to dress them up as game-changing transformations, you’ll
    only look foolish when the results underwhelm senior management. Going forward
    in this book, we’ll primarily build your AI roadmap using this lens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**R&D-driven AI**: If you’re in an industry where AI disruption could be existential
    (such as autonomous mobility or high-end manufacturing), you might need a **moonshot
    use case** approach to secure a *long-term* advantage, even if the payoff is uncertain
    and years away. Just don’t promise short-term ROI to justify these big bets. Instead,
    openly communicate that this is a strategic R&D investment for potential category
    leadership down the road.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The lesson here is to be brutally honest about which game you’re playing. Align
    your budget, your timelines, and your KPIs accordingly. If you’re going down the
    ROI route, measure short-term success in dollars saved or earned. If you’re going
    down the R&D route, set milestones around research breakthroughs, prototypes,
    or patents, rather than immediate revenue.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s put it all together. Here’s how you might match your organizational reality
    (current state), your endgame (future state), and your big **why** (imperative)
    to the four approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Approach** | **Best for** | **Why** | **RoI versus R&D** |'
  prefs: []
  type: TYPE_TB
- en: '| **AI divide and conquer** | Organizations with moderate to high AI readiness,
    broad data availability, and an industry likely to see widespread AI-driven disruption.
    | You need to outpace rivals by embedding AI across multiple functions. Think
    large-scale transformation but tackled in small, manageable bites. | Mixed. Some
    incremental ROI in each department, with a modest R&D angle from a central AICoE.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **AI moonshot** | Companies aiming to change the game in an industry with
    high stakes. | You want to capture a massive first-mover advantage, and you have
    (or can acquire) the resources and talent to do it. | Heavy R&D. Big risk, big
    potential reward. Expect a longer timeline before you see returns. |'
  prefs: []
  type: TYPE_TB
- en: '| **Product-led AI** | Firms with established products and loyal customers,
    looking to stay ahead without radical reinvention. | You want to continuously
    delight customers and differentiate your product in a crowded space. | Primarily
    ROI-driven with incremental improvements. Low to moderate risk. |'
  prefs: []
  type: TYPE_TB
- en: '| **Opportunistic AI** | Organizations in low-tech or slow-moving industries
    (or pockets within bigger industries) that see AI as nice to have rather than
    existential. | You only commit to AI if there’s a clear, well-defined business
    case. You prefer quick wins and minimal disruption. | Very ROI-focused. Little
    to no R&D appetite - lowest risk, lowest potential for industry-shaking innovation.
    |'
  prefs: []
  type: TYPE_TB
- en: 'Table 3.1: Comparing the four approaches to AI adoption'
  prefs: []
  type: TYPE_NORMAL
- en: 'Can you mix and match these approaches? Of course, but try not to get stuck
    in the details. Choose your primary focus and let that be your North Star. Feel
    free to add other elements here and there, but always keep your main objective
    clear. As you consider your next steps, ask yourself: Which of these four approaches
    resonates most with you? Why? Making the right turn at this critical intersection
    is crucial to your future AI and business success. Whichever approach you pick,
    remember that **AI is a journey, not a one-off project**. Your market context,
    capabilities, and strategic objectives should be in constant dialogue. Keep an
    eye on the shifting five forces. Reevaluate your approach as you gain more AI
    maturity. Stay laser-focused on that “why,” because that’s what will guide you
    when internal politics, budget constraints, or technological hiccups threaten
    to derail your plans.'
  prefs: []
  type: TYPE_NORMAL
- en: Sure, you might need to tweak your strategy mid-journey. Maybe you start with
    an Opportunistic AI approach, prove out some ROI, and then level up to Product-led
    AI once your internal teams gain confidence. Or perhaps you’ll dabble in Product-led
    AI for stability and eventually decide to double down on Moonshot because your
    market is suddenly disrupted by a well-funded competitor.
  prefs: []
  type: TYPE_NORMAL
- en: Whatever path you take, it’s better to pick an approach intentionally than to
    stumble into an *accidental AI strategy* that doesn’t fit your organization’s
    needs. AI is too important to leave to chance. So, figure out where you are, be
    bold about where you want to go, and keep your eyes on the big reason driving
    you there. The rest is just execution.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Knowing which AI game you want to play is crucial to your organization’s success
    in adopting and leveraging AI. As this chapter has shown, blindly mimicking the
    strategies of Silicon Valley giants is a recipe for failure for most companies.
    Instead, the key to successful AI adoption lies in recognizing your unique context
    and capabilities and selecting the right approach that aligns with your business
    goals and operational realities.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you have seen some examples of companies in different industries
    and of different sizes that have already found their own winning strategies by
    playing their own game. Don’t treat them as a strict blueprint, but rather as
    inspiration to follow and ultimately build your own customized AI journey that
    will give you your unique AI advantage.
  prefs: []
  type: TYPE_NORMAL
- en: In the following chapters, I’ll give you the resources to do just that. We will
    explore how *exactly* you can get started on your AI journey, using practical
    tools and proven frameworks that take the guesswork away and help you confidently
    take the first steps toward building your very own AI advantage.
  prefs: []
  type: TYPE_NORMAL
