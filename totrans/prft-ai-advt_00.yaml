- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: 'When I first thought about writing this book, my initial instinct was: *no,
    not another AI book!*'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 当我最初考虑写这本书时，我的第一反应是：*不，不要又是另一本AI书！*
- en: 'I’ve seen dozens of them. Sometimes, a dozen in the same month. Most fall into
    one of two camps: either highly technical deep-dives that only AI people or data
    scientists could really appreciate, or fluffy business books that get you excited
    (sometimes even scared) but offer little in the way of action. Neither speaks
    to the people I meet every day in my consulting work: business leaders eager to
    understand AI and put it to work, but overwhelmed by the hype and struggling to
    make it real.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我见过很多这样的例子。有时，一个月内就有十几个。大多数可以分为两类：要么是只有AI人士或数据科学家才能真正欣赏的高度技术性的深入研究，要么是让你兴奋（有时甚至害怕）但提供很少实际行动的浮夸的商业书籍。这两者都不符合我在咨询工作中每天遇到的人：渴望理解AI并将其付诸实践的企业领导者，但被炒作所压倒，努力使其成为现实。
- en: That’s the gap this book is meant to fill.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书旨在填补这个空白。
- en: I’ve spent the last five years in applied AI consulting, helping organizations
    of all shapes and sizes adopt AI in meaningful, pragmatic ways. Before that, I
    worked as a data scientist, where bringing machine learning models into production
    was part of my day job - long before ChatGPT made AI a household term. Today,
    my focus is less on training deep learning models from scratch and more on helping
    businesses apply accessible AI technology to real-world problems in ways that
    are practical and profitable.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的五年里，我从事应用AI咨询工作，帮助各种规模的组织以有意义、实用的方式采用AI。在此之前，我曾担任数据科学家，将机器学习模型投入生产是我日常工作的一部分——在ChatGPT使AI成为家喻户晓的术语之前很久。如今，我的关注点更少在于从头开始训练深度学习模型，而是更多地帮助企业在实际和盈利的方式中将可访问的AI技术应用于现实世界的问题。
- en: 'When I talk about being **profitable**, I mean it in a managerial sense - expanding
    margins by reducing avoidable costs, increasing throughput, mitigating risks,
    or generating new revenue without adding proportional costs to the organization.
    I won’t walk you through a discounted cash-flow analysis; instead, we’ll use simple
    thresholds, cost caps, and quick sizing that you can plug into your own financials.
    The goal is straightforward: implement AI so that it shows up on your P&L.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我提到**盈利**时，我是从管理角度说的——通过减少可避免的成本、增加吞吐量、减轻风险或在不向组织增加相应成本的情况下创造新的收入来扩大利润率。我不会带你进行折现现金流分析；相反，我们将使用简单的阈值、成本上限和快速估算，你可以将其应用到自己的财务中。目标是简单明了：实施AI，使其出现在你的损益表上。
- en: This book distills the lessons, patterns, and pitfalls I’ve seen firsthand in
    a (hopefully) reader-friendly way. My work has taken me inside enterprise giants
    from industries such as automotive and insurance, mid-sized companies with 500–1,000
    employees, and solopreneurs wanting to double their output, to small business
    owners uncovering $10k+ monthly savings in unexpected places. The contexts may
    differ wildly, but the underlying patterns of what makes AI succeed - and what
    makes it fail - remain surprisingly consistent.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书以（希望）读者友好的方式提炼了我亲眼所见的第一手经验教训、模式和陷阱。我的工作带我进入了汽车和保险等行业的大型企业，有500-1,000名员工的中小企业，以及希望将产出翻倍的单打独斗的创业者，还有在意想不到的地方发现每月10k+美元以上节省的小企业主。背景可能大相径庭，但AI成功和失败的根本模式却出奇地一致。
- en: 'Many of the ideas here began life as short pieces I shared in my weekly newsletter
    - read today by more than 10,000 professionals at companies like Google, Amazon,
    Gucci, Intercontinental Hotels, H&M, Santander, and Mercedes-Benz. What you’ll
    find in these pages are the expanded, sharpened versions: frameworks, case studies,
    and strategies you can start using today in your business.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的大部分想法最初都是我在每周通讯中分享的短篇作品——今天有超过10,000名来自谷歌、亚马逊、古驰、洲际酒店、H&M、桑坦德和梅赛德斯-奔驰等公司的专业人士在阅读。你将在这些页面中找到扩展、精炼后的版本：你可以立即在你的业务中使用的框架、案例研究和策略。
- en: This book is designed to help you understand what AI means for your business
    and how to take the next step with clarity and confidence, so you can move forward
    toward **profitable results**.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书旨在帮助你理解AI对你业务的意义以及如何以清晰和自信的方式迈出下一步，以便你可以朝着**盈利的结果**前进。
- en: '**Starting now.**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在就开始。**'
- en: Who this book is for
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这本书面向谁
- en: This book is for business leaders, CTOs, entrepreneurs, managers, and professionals
    who want to understand AI in a way that’s practical, actionable, and aligned with
    real business goals.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为那些希望以实用、可操作且与实际商业目标一致的方式理解AI的企业领导者、CTO、企业家、经理和专业人士而写的。
- en: It’s especially for those carrying the responsibility of pushing AI into their
    organization - whether you’re a department head exploring use cases, a transformation
    lead tasked with building a roadmap, or an executive under pressure to turn hype
    into results.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书尤其适合那些负责将AI推向他们组织的人——无论您是探索用例的部门负责人、负责构建路线图的转型负责人，还是面临将炒作转化为结果的执行压力的行政人员。
- en: You don’t need to be a data scientist to benefit from this book. What you do
    need is curiosity, a willingness to rethink how work gets done, and the drive
    to bridge the gap between strategy and execution. If you’ve ever felt caught between
    technical jargon on one side and empty buzzwords on the other - this book was
    written for you.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要成为数据科学家就能从本书中受益。您需要的只是好奇心，愿意重新思考工作如何完成，以及连接战略与执行的驱动力。如果您曾经感到夹在技术术语的一边和空洞的术语的另一边——这本书是为您写的。
- en: If you’re looking for a coding manual or a deep dive into algorithms, this isn’t
    that book. There are already many others that do that well.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在寻找一本编码手册或深入探讨算法的书籍，这不是那本书。已经有许多其他书籍在这方面做得很好。
- en: What this book covers
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '*Chapter 1, Understanding the AI Revolution*, cuts through the hype to show
    what’s really happening with AI adoption in businesses, and why so many projects
    get stuck.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*第1章，理解AI革命*，揭穿炒作，展示AI在企业中的实际应用情况，以及为什么许多项目会陷入停滞。'
- en: '[*Chapter 2*](Chapter_02.xhtml#_idTextAnchor035)*, Understanding Modern AI*,
    breaks down today’s AI technologies into simple, business-relevant concepts you
    can actually use.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第2章*](Chapter_02.xhtml#_idTextAnchor035)*，理解现代AI*，将今天的AI技术分解为简单、与业务相关的概念，您可以实际使用。'
- en: '[*Chapter 3*](Chapter_03.xhtml#_idTextAnchor054)*, Approaches to Successful
    AI Adoption*, explores proven strategies for adopting AI without falling into
    the trap of copying Silicon Valley.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](Chapter_03.xhtml#_idTextAnchor054)*，成功采用AI的方法*，探讨了采用AI而不陷入模仿硅谷的陷阱的验证策略。'
- en: '[*Chapter 4*](Chapter_04.xhtml#_idTextAnchor095)*, Getting Started on Your
    AI Journey*, teaches you how to identify pain points and bottlenecks, and who
    should own the AI roadmap.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](Chapter_04.xhtml#_idTextAnchor095)*，开始您的AI之旅*，教您如何识别痛点瓶颈，以及谁应该拥有AI路线图。'
- en: '[*Chapter 5*](Chapter_05.xhtml#_idTextAnchor140)*, Finding AI Opportunities
    in Processes and Products*, walks you through mapping AI capabilities in your
    business.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](Chapter_05.xhtml#_idTextAnchor140)*，在流程和产品中寻找AI机会*，带您了解如何在您的业务中映射AI能力。'
- en: '[*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181)*, Designing AI Use Cases*,
    gives you a structured framework to design, evaluate, and compare AI initiatives
    before committing resources.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_06.xhtml#_idTextAnchor181)*，设计AI用例*，为您提供设计、评估和比较AI项目在投入资源之前的结构化框架。'
- en: '[*Chapter 7*](Chapter_07.xhtml#_idTextAnchor220)*, Building Your AI Roadmap*,
    helps you turn a pile of use cases into a prioritized roadmap, find synergies,
    and align different stakeholders around a shared direction.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_07.xhtml#_idTextAnchor220)*，构建您的AI路线图*，帮助您将一堆用例转化为优先级路线图，找到协同效应，并使不同的利益相关者围绕共同的方向达成一致。'
- en: '[*Chapter 8*](Chapter_08.xhtml#_idTextAnchor278)*, Prototyping for Success*,
    shows you how to test ideas quickly, avoid the prototype purgatory, and balance
    the make-versus-buy decision.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_08.xhtml#_idTextAnchor278)*，为成功进行原型设计*，向您展示如何快速测试想法，避免原型炼狱，并平衡制造与购买的决定。'
- en: '[*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312)*, Scaling AI-Powered Systems
    and Workflows*, explores how to move from prototype to production successfully.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_09.xhtml#_idTextAnchor312)*，扩展AI驱动的系统和流程*，探讨了如何成功地将原型过渡到生产。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor349)*, Leveraging Your AI Toolkit*,
    gives you a practical guide to assembling an AI technology stack that fits your
    requirements and helps you start building without getting overwhelmed.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor349)*，利用您的AI工具包*，为您提供一套适合您需求的AI技术栈的实用指南，帮助您开始构建而不会感到不知所措。'
- en: To get the most out of this book
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用本书
- en: '**You don’t need to read it cover to cover.** While chapters cross-reference
    earlier concepts, each one stands on its own. Feel free to jump straight to the
    part of the journey that matches where you are - whether that’s identifying opportunities,
    building prototypes, or scaling.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您不需要从头到尾阅读它。** 虽然章节之间会交叉引用早期概念，但每个章节都是独立的。您可以自由地直接跳到与您当前位置相匹配的旅程部分——无论是识别机会、构建原型还是扩展。'
- en: '**Start with your context.** If you’re new to AI in business, Part 1 gives
    you the foundations. If you’re already running pilots, Part 2 and Part 3 will
    help you move from experiments to scale.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从您的背景出发**。如果您对商业中的AI是新手，第1部分为您提供了基础。如果您已经在进行试点项目，第2部分和第3部分将帮助您从实验过渡到规模化。'
- en: '**Blend it with what you already use.** If your organization already has frameworks
    or transformation models in place, treat mine as complementary field notes. Mix,
    match, and adapt - the value is in making it work for you.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与您现有的工具结合使用**。如果您的组织已经实施了框架或转型模型，请将我的视为补充性的现场笔记。混合、匹配和调整 - 价值在于使其为您所用。'
- en: '**Treat it like a playbook, not a theory book.**Don’t just read the frameworks
    and checklists - pick one and try it this week. Test it with your team, learn
    from what happens, then come back for more. Progress comes from small, repeated
    actions - not from planning everything until it’s perfect (a theme you’ll see
    throughout this book).'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**把它当作一本操作手册，而不是理论书籍**。不要只是阅读框架和清单 - 选择一个，本周尝试一下。与您的团队一起测试它，从发生的事情中学习，然后回来获取更多信息。进步来自小而重复的行动
    - 而不是等到一切都完美无缺的计划（您将在本书中看到这个主题）。'
- en: Download the resource files
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载资源文件
- en: The resource files for the book are hosted on GitHub at [https://github.com/PacktPublishing/The-Profitable-AI-Advantage](https://github.com/PacktPublishing/The-Profitable-AI-Advantage).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本书资源文件托管在GitHub上，网址为 [https://github.com/PacktPublishing/The-Profitable-AI-Advantage](https://github.com/PacktPublishing/The-Profitable-AI-Advantage)。我们还有其他来自我们丰富图书和视频目录的代码包，可在
    [https://github.com/PacktPublishing](https://github.com/PacktPublishing) 获取。查看它们！
- en: Download the color images
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781836205890](
    https://packt.link/gbp/9781836205890).'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图/图表彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781836205890](https://packt.link/gbp/9781836205890)。
- en: Conventions used
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中使用了多种文本约定。
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “To understand the impact of AI on competitive dynamics, let’s
    talk about the classic **Five Forces framework**.”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要词汇或您在屏幕上看到的词汇。例如，菜单或对话框中的文字会像这样显示。例如：“为了了解人工智能对竞争动态的影响，让我们谈谈经典的**五力框架**。”'
- en: Warnings or important notes appear like this.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要注意事项如下所示。
- en: Tips and tricks appear like this.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士和技巧如下所示。
- en: Get in touch
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from our readers is always welcome.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们欢迎读者的反馈。
- en: '**General feedback**: If you have questions about any aspect of this book or
    have any general feedback, please email us at `customercare@packt.com` and mention
    the book’s title in the subject of your message.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**：如果您对本书的任何方面有疑问或有任何一般性反馈，请通过电子邮件发送给我们 `customercare@packt.com`，并在邮件主题中提及本书的标题。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you reported this to us. Please visit [http://www.packt.com/submit-errata](http://www.packt.com/submit-errata),
    click **Submit Errata**, and fill in the form.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**勘误表**：尽管我们已经尽一切努力确保内容的准确性，但错误仍然可能发生。如果您在本书中发现了错误，我们将非常感谢您向我们报告。请访问 [http://www.packt.com/submit-errata](http://www.packt.com/submit-errata)，点击**提交勘误**，并填写表格。'
- en: '**Piracy**: If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at `copyright@packt.com` with a link
    to the material.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**：如果您在互联网上以任何形式遇到我们作品的非法副本，我们将非常感谢您提供位置地址或网站名称。请通过电子邮件发送链接到 `copyright@packt.com`
    与我们联系。'
- en: '**If you are interested in becoming an author**: If there is a topic that you
    have expertise in and you are interested in either writing or contributing to
    a book, please visit [http://authors.packt.com/](http://authors.packt.com/).'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您想成为作者**：如果您在某个领域有专业知识，并且您有兴趣撰写或为本书做出贡献，请访问 [http://authors.packt.com/](http://authors.packt.com/)。'
- en: Stay tuned
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保持关注
- en: To keep up with the latest developments in the fields of Generative AI and LLMs,
    subscribe to our weekly newsletter, AI_Distilled, at [https://packt.link/8Oz6Y](https://packt.link/8Oz6Y).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解生成式AI和LLMs领域的最新发展，请订阅我们的每周通讯，AI_Distilled，[https://packt.link/8Oz6Y](https://packt.link/8Oz6Y)。
