- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Practical Applications of RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In [*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020), we listed several ways
    **retrieval-augmented generation** (**RAG**) is being implemented in AI applications,
    such as customer support with chatbots, automated reporting, product descriptions,
    searchability and utility of knowledge bases, innovation scouting, content personalization,
    product recommendations, and training and education.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Customer support and chatbots with RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG for automated reporting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: E-commerce support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilizing knowledge bases with RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Personalization and targeted recommendations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Training and education
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 3.1 – adding sources to your RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These topics should provide a comprehensive understanding of the broad scope
    and versatility of RAG.
  prefs: []
  type: TYPE_NORMAL
- en: The examples presented in this chapter are not meant to be exhaustive but rather
    to provide concrete, real-world scenarios that demonstrate the potential of RAG
    and stimulate your creativity in adapting this technology to your specific corporate
    environment. RAG’s incredible flexibility allows it to be customized for a wide
    range of industries and use cases, with countless specific examples already in
    use across various organizations. By examining some of these examples, you will
    gain valuable insights into how RAG can be leveraged to enhance existing processes,
    improve efficiency, and drive innovation.
  prefs: []
  type: TYPE_NORMAL
- en: 'To conclude the chapter, we will present a code example that represents a common
    approach across many of these applications: an element adding more relevant data
    to the response. This code will continue from the code in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043)
    and add this valuable step of returning the source of the retrieved documents
    in the RAG response.'
  prefs: []
  type: TYPE_NORMAL
- en: We start by discussing how chatbots can be significantly enhanced with the power
    of RAG and **generative** **AI** (**GenAI**).
  prefs: []
  type: TYPE_NORMAL
- en: Customer support and chatbots with RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Chatbots** have evolved from simple scripted responses to the complex, RAG-driven
    conversational agents we see today. RAG has brought the next wave of innovation
    to chatbots, incorporating advanced Q&A systems into the capabilities of the chatbot
    in a way that is significantly more conversational and natural for the user. RAG
    combines the best of both worlds: the ability to retrieve information from vast
    datasets about your company and your customers, and the capability to generate
    coherent, contextually relevant responses. This has shown significant promise
    in customer support scenarios, where the ability to quickly access and leverage
    company-specific data, such as past customer interactions, FAQs, and support documents,
    has dramatically enhanced the quality of customer service.'
  prefs: []
  type: TYPE_NORMAL
- en: RAG enables chatbots to provide personalized, efficient, and highly relevant
    responses to user queries in a way that far exceeds the performance of earlier
    models that relied solely on pre-programmed responses or basic **natural language**
    **processing** (**NLP**).
  prefs: []
  type: TYPE_NORMAL
- en: Consider that this is not just a technical improvement. The level chatbots are
    reaching represents a transformative shift in how businesses can interact with
    their customers. GenAI has enabled companies to tap much deeper into all the data
    they have for each customer, such as reading through all your bank statements
    in PDF form, enabling true 1-to-1 service customization for each customer to be
    within reach. RAG-enhanced chatbots can sift through vast amounts of this data
    to find the most relevant information, answering many more questions a user might
    have effectively, and ensuring that responses are accurate and tailored to the
    specific context of each interaction. Customers expect fast, relevant, and very
    personalized responses to their queries, and using RAG is easily the most effective
    way to deliver them.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that RAG-based systems are still in their infancy. In just a couple
    of years, expect RAG-based chatbots to push the boundaries much further. You may
    see conversational chatbots that can handle the most unique and specific inquiries
    without needing any human intervention. Their **natural language** (**NL**), ability
    to handle most languages, and access to massive amounts of memory and computing
    power will revolutionize how companies can interface with every single one of
    their customers in very customized and personal ways.
  prefs: []
  type: TYPE_NORMAL
- en: The benefits of RAG in Q&A and chatbots extend across multiple sectors, such
    as technical support, financial services, healthcare, and e-commerce. We will
    briefly cover some of these popular examples, starting with technical support.
  prefs: []
  type: TYPE_NORMAL
- en: Technical support
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Consider a case where there is a recurring technical issue. For example, a large
    portion of inquiries to cable providers are related to the same technical issues.
    A RAG-enhanced chatbot could recognize the problem based on previous interactions
    and immediately provide a customized set of troubleshooting steps, acknowledging
    the customer’s past attempts to resolve the issue and adjusting the current response.
    This not only demonstrates an understanding of the customer’s experience but also
    builds trust and confidence in the support process.
  prefs: []
  type: TYPE_NORMAL
- en: Financial services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Financial service RAG-enhanced chatbots can also assist with account inquiries,
    transaction issues, and personalized financial advice, drawing from a customer’s
    transaction history and account details. When was the last time you tried to look
    up your interest rate on your credit card?
  prefs: []
  type: TYPE_NORMAL
- en: 'This seems like an easy question to answer, but for banks, it is often not
    as easy for a customer service agent to help with, as the data is buried in databases,
    PDF documents, and behind security measures. But once you have safely identified
    yourself online, a bank chatbot can use RAG to have access to all your financial
    documents and quickly indicate that your interest rate is 21.9%, while also providing
    related information, such as: You have only paid interest on your balance twice
    during your tenure as a customer. If you then need to talk about your mortgage
    account, you don’t need to switch to a different agent, as the RAG-based chatbot
    can help you with that too! It can handle more complicated questions, such as
    “How much more is the interest rate on my credit card than my mortgage?” In addition,
    if you ask a follow-up question, it understands the context of the entire conversation
    and can converse about your financial accounts in a very human and natural way.
    This level of support can significantly enhance the customer experience, fostering
    loyalty and trust in the company’s services much more than current systems can
    handle.'
  prefs: []
  type: TYPE_NORMAL
- en: Healthcare
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In healthcare, RAG-powered chatbots can provide patient support by accessing
    medical records (with appropriate permissions) to offer personalized health advice
    or facilitate appointment scheduling. If a patient asks about managing their newly
    diagnosed diabetes, the chatbot can analyze their medical history, medications,
    and recent lab results to provide tailored advice on lifestyle changes, diet,
    and medication management. The chatbot can even schedule follow-up appointments
    with their healthcare provider and send reminders, creating a more comprehensive
    and engaging patient support experience. This level of personalized care can significantly
    improve patient outcomes, foster trust in the healthcare system, and reduce the
    burden on healthcare professionals.
  prefs: []
  type: TYPE_NORMAL
- en: 'RAG isn’t just for chatbots, though. Let’s discuss another area with significant
    RAG activity: automating reporting for data analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: RAG for automated reporting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Companies that use RAG in combination with data analysis and reporting through
    its automated reporting capabilities are seeing significant improvements in their
    capabilities and the time it takes to perform the analysis. This innovative application
    of RAG serves as a bridge between the vast data lakes of unstructured data and
    the actionable insights that businesses need daily to drive key decisions and
    innovation. By utilizing RAG for automated reporting, companies can significantly
    streamline their reporting processes, enhance accuracy, and uncover valuable insights
    hidden within their data. Let’s start with how it can be utilized in this environment.
  prefs: []
  type: TYPE_NORMAL
- en: How RAG is utilized with automated reporting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While there are countless ways to set up this type of automated reporting, it
    is common to target areas where reports are relatively standard, making it easier
    to codify into a RAG environment. Often, you start with an automated report that
    is already in place from a code standpoint, but you can apply GenAI and/or RAG-like
    techniques to help make this automation even more effective. For example, a set
    of initial analysis questions can be fed to the RAG system without needing user
    input, with that content added to the initial report. This initial analysis can
    include not just charts and graphs, but commentary from a **large language model**
    (**LLM**) as well, all as an initial component in the RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: In many automated report scenarios, the automated report is often just the first
    step in helping the decision maker, the *user* of the automated report, understand
    the data. It is very common for the decision maker to ask for more analysis based
    on what they see in the automated report. Making your automated reports a part
    of a larger RAG system can essentially replace and/or accelerate the back-and-forth
    you typically have in these data analysis scenarios, helping important decision-makers
    gain access to key data analysis faster and make more effective decisions. You
    can make the report data, as well as the underlying data that it was generated
    from, available to the RAG system, which in turn allows non-technical staff to
    ask numerous and very wide-ranging questions of the data without having to wait
    for additional analysis to be performed by a data analyst. Additional data sources
    can be added to the sources available for the RAG system, enabling even more depth
    to the discussion and analysis, potentially far exceeding what could be provided
    in just a simple automated analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Much of this data is hidden within unstructured data, which has proven to be
    a difficult type of data for companies to utilize. Let’s talk about how RAG can
    help with unstructured data in support of automated reporting.
  prefs: []
  type: TYPE_NORMAL
- en: Transforming unstructured data into actionable insights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The vast majority of data available to organizations today is unstructured,
    ranging from articles and research papers to social media feeds and web content.
    This unstructured nature makes it challenging to process and analyze through traditional
    data analysis means. RAG steps in as a powerful approach to parse through this
    data, extracting data from what has been traditionally difficult to reach data,
    creating initial drafts and summaries that can even be customized to the individual,
    and highlighting the most critical information for that person specifically based
    on their role or interests. RAG can serve as a much more sophisticated tool for
    users, compared to using an LLM directly, as it can replace many of the tasks
    they typically have to do manually when interacting with an LLM. This concept
    can also be applied within the world of data analysis and automated reporting,
    where many of the steps can be replicated in the RAG system, making them faster
    and more effective. This process not only saves time but also ensures that decision-makers
    can quickly grasp the essence of the data without getting bogged down by its volume.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that when it comes to unstructured data, it is often
    a step in the indexing stage of RAG where this data is transformed into a new
    format that makes it more helpful to the overall RAG system. For example, a PDF
    might be extracted into a variety of different elements with different importance
    levels. Titles and headers might be given more weight than paragraphs in their
    level of importance. Images might be detected as tables, which can then be extracted
    as a table summary, vectorized, and used later in the RAG system. It is these
    steps that make unstructured data more accessible to automated reporting.
  prefs: []
  type: TYPE_NORMAL
- en: When looking for areas in your organization to focus on for automated reporting,
    start with the areas where timely information is the most crucial. For instance,
    in market analysis, RAG can swiftly summarize news articles, financial reports,
    and competitor information, providing companies with a condensed view of market
    trends and dynamics. This rapid processing allows your users to react swiftly
    to market changes, capitalizing on opportunities or mitigating risks promptly
    for your company.
  prefs: []
  type: TYPE_NORMAL
- en: Enhancing decision-making and strategic planning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The automated reporting and innovation scouting capabilities of RAG significantly
    enhance decision-making and strategic planning processes. By providing executives
    and strategists with concise, summarized reports and insights on industry trends,
    technological advancements, and competitive landscapes, RAG enables more informed
    and strategic decision-making. By adding the RAG-oriented ability to ask additional
    questions about the data that generated these reports, the value for these users
    is taken much further.
  prefs: []
  type: TYPE_NORMAL
- en: RAG initiatives in this area hinge on their ability to quickly assimilate and
    analyze diverse datasets. This allows the companies using RAG for this purpose
    to adopt a more proactive approach to strategy formulation. Instead of being reactive
    to changes in the industry, businesses can anticipate shifts in the market or
    technology and adjust their strategies accordingly, ensuring they remain steps
    ahead of their competitors.
  prefs: []
  type: TYPE_NORMAL
- en: While the world of automated data analysis and reporting expands substantially
    due to RAG-based applications, another area of growth we are seeing is in generating
    product descriptions and recommendations dynamically on e-commerce websites, which
    we cover in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: E-commerce support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: E-commerce is a key area that can benefit significantly from RAG applications.
    Let’s review a couple of areas where RAG can be applied, starting with product
    descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: Dynamic online product descriptions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG’s ability to generate personalized product descriptions is a game-changer
    for e-commerce businesses. By leveraging the power of RAG, companies can create
    highly targeted and persuasive product descriptions that resonate with individual
    customers, ultimately driving sales and fostering brand loyalty. RAG can produce
    personalized product descriptions or highlight features that are specifically
    tailored to the user’s past behavior and preferences, taking into account RAG’s
    ability to analyze vast amounts of customer data, including browsing history,
    past purchases, and even social media interactions.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, let’s say Rylee is a user who frequently purchases eco-friendly
    products. RAG can be used to emphasize the sustainability aspects of a product
    in its description when Rylee browses an e-commerce website. This results in an
    improved user experience for Rylee, as well as improving the likelihood of her
    purchasing that product. Now, let’s say Rylee has previously purchased a product,
    such as running shoes, and frequently engages with content related to marathon
    training. When Rylee browses running shoes on an e-commerce site powered by RAG,
    the product descriptions can be dynamically generated to emphasize features such
    as cushioning, stability, and durability – all key factors for long-distance runners.
    The description might also include additional information relevant to Rylee’s
    interests, such as how the shoes have been tested by marathon runners or have
    been designed to reduce the risk of common running injuries.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, RAG can be used to analyze customer reviews and feedback to identify
    the most frequently mentioned pros and cons of a product. This information can
    be incorporated into the product descriptions, providing potential buyers with
    a more balanced and informative overview of the item. By addressing common concerns
    or highlighting highly praised features, RAG-generated descriptions can help customers
    make more informed purchase decisions, reducing the likelihood of returns or negative
    reviews.
  prefs: []
  type: TYPE_NORMAL
- en: RAG can also be used to generate product descriptions in multiple languages,
    making it easier for businesses to expand into international markets. By using
    a multilingual LLM and incorporating region-specific content into the retrieval
    corpus on a diverse set of language data, companies can ensure that their product
    descriptions are culturally appropriate and resonate with customers in different
    regions.
  prefs: []
  type: TYPE_NORMAL
- en: Product descriptions are one area of e-commerce that is benefitting from RAG.
    Let’s also talk about how recommendation engines are benefitting.
  prefs: []
  type: TYPE_NORMAL
- en: Product recommendations for e-commerce sites
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Recommendation engines** are a significant use of AI in the business world.
    GenAI and RAG have the potential to make these recommendation engines even more
    effective. One of the key advantages of using RAG for product recommendations
    is its ability to analyze vast amounts of customer data, including browsing history,
    past purchases, search queries, and even social media interactions. By understanding
    a customer’s unique interests, style preferences, and shopping habits, RAG can
    generate product recommendations that are not only relevant but also highly appealing
    to each individual. RAG can identify patterns and preferences at a much more in-depth
    level than previous methods to ultimately recommend products that the user is
    likely to find the most appealing. RAG allows us to go way beyond traditional
    recommendation engines, integrating a deeper understanding of individual user
    preferences, leading to more accurate and personalized recommendations.'
  prefs: []
  type: TYPE_NORMAL
- en: For instance, let’s say Aubri, one of our VIP customers, frequently purchases
    outdoor gear and has recently been browsing hiking boots on our e-commerce site.
    RAG can analyze Aubri’s data and recommend not only the most suitable hiking boots
    based on her preferences and past purchases but also complementary products such
    as hiking socks, backpacks, and trekking poles. By presenting a curated selection
    of products that align with Aubri’s interests, RAG can increase the likelihood
    of Aubri making a multi-item purchase and enhance the overall shopping experience.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, RAG can take product recommendations to the next level by considering
    factors beyond just a customer’s purchase history. For example, RAG can analyze
    a customer’s product reviews and ratings to gain insights into their satisfaction
    with previous purchases. This information can be used to refine future recommendations,
    ensuring that customers are presented with products that not only match their
    interests but also meet their quality expectations.
  prefs: []
  type: TYPE_NORMAL
- en: The applications of RAG in personalizing product recommendations extend beyond
    the confines of e-commerce websites. By leveraging the power of RAG, companies
    can deliver highly targeted and engaging experiences across various touchpoints,
    including media, content platforms, and digital marketing campaigns.
  prefs: []
  type: TYPE_NORMAL
- en: As e-commerce continues to grow and evolve, the importance of personalized and
    compelling product descriptions cannot be overstated. By harnessing the power
    of RAG, businesses can create descriptions that not only inform but also persuade,
    ultimately driving sales and building long-lasting customer relationships. Much
    of this is powered by RAG’s ability to search vast amounts of data. Next, let’s
    discuss how these same search and data-accessing capabilities can help a company’s
    employees better utilize knowledge internally.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing knowledge bases with RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: RAG can access and utilize knowledge bases, whether they are internal or external.
    Let’s start with **internal** **knowledge bases**.
  prefs: []
  type: TYPE_NORMAL
- en: Searchability and utility of internal knowledge bases
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Combining the concept of advanced information retrieval with the most advanced
    LLMs, it is no surprise that RAG is bringing significant advances to the area
    of internal search engines. The combination of advanced search and intelligence
    capabilities is transforming corporate operations by allowing us to access data
    in much more sophisticated ways, better leveraging the vast amounts of data that
    businesses accumulate. This transformative technology not only simplifies the
    retrieval of information but also enriches the quality of the data presented,
    making it a cornerstone for decision-making and operational efficiency across
    multiple sectors.
  prefs: []
  type: TYPE_NORMAL
- en: RAG significantly enhances the searchability and utility of internal knowledge
    bases, acting as a catalyst for improved information access and management. Internal
    knowledge bases, which include a wide range of documents in various unstructured
    formats (such as PDFs, Word, Google Docs, spreadsheets, slide decks, and more),
    are often underutilized due to their vastness and the difficulty in extracting
    them. RAG can address this challenge in several ways by extracting the data and
    processing it in many advanced ways. For example, generating concise summaries
    of documents makes it easier for employees to grasp the essence of the content
    without having to go through the entire document. Moreover, RAG can provide direct
    answers to queries by analyzing the content of these resources and using the generative
    power of LLMs to provide coherent and accurate answers from content that can be
    buried in millions of pages of unstructured data. This direct answer capability
    is particularly useful for quickly resolving specific inquiries, having the potential
    to make significant reductions in the time employees spend searching for information.
  prefs: []
  type: TYPE_NORMAL
- en: The implementation of RAG in internal search engines also facilitates a more
    organized and efficient way of managing knowledge. By enabling better categorization
    and retrieval of information, employees can access relevant data more swiftly,
    leading to a more streamlined workflow. This is especially beneficial in fast-paced
    environments where time is of the essence and quick access to accurate information
    can significantly impact decision-making and project outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: While internal knowledge is a key strategic advantage for most companies, external
    knowledge can also play a major role in maintaining a competitive edge in your
    industry. Let’s review how RAG is enabling companies to better harness external
    data for use by their employees.
  prefs: []
  type: TYPE_NORMAL
- en: 'External knowledge retrieval: from compliance to competitive intelligence'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Beyond internal resources, RAG extends its benefits to general external knowledge
    bases, which are crucial in areas requiring up-to-date knowledge of laws, regulations,
    industry standards, and emerging trends. In these domains, the volume of information
    is not only vast but more information is constantly being released and changed,
    making it challenging to stay current. RAG simplifies this task by retrieving
    and summarizing pertinent information from these extensive databases, supporting
    use cases that range from regulatory compliance to competitive intelligence and
    innovation scouting.
  prefs: []
  type: TYPE_NORMAL
- en: In the legal and compliance sectors, RAG can quickly sift through thousands
    of documents to find relevant case laws, regulations, and compliance guidelines,
    significantly reducing the time legal professionals and compliance officers spend
    on research. This capability is essential for organizations that must stay current
    with evolving regulatory requirements across multiple jurisdictions.
  prefs: []
  type: TYPE_NORMAL
- en: In research and development, RAG can accelerate discovery by providing researchers
    with quick access to existing studies, patents, and technical documents relevant
    to their work. This capability is invaluable for avoiding duplication of efforts
    and for sparking new ideas by building on existing knowledge. In the technology
    sector specifically, RAG can analyze patents, tech news, and research publications
    to identify emerging technologies and innovation patterns, allowing companies
    to direct their R&D efforts more effectively toward areas with high potential
    for growth and market disruption.
  prefs: []
  type: TYPE_NORMAL
- en: The medical and pharmaceutical fields offer a compelling example of how these
    capabilities converge. RAG can pull up relevant case studies, research papers,
    and treatment guidelines to assist healthcare professionals in making informed
    decisions. At the same time, pharmaceutical companies are using RAG to expedite
    the process of identifying new research findings and potential drug development
    opportunities by constantly analyzing the latest releases from medical journals,
    clinical trial reports, and patent databases. This is accelerating the pace of
    innovation and helping these companies more efficiently allocate their research
    budgets and resources.
  prefs: []
  type: TYPE_NORMAL
- en: One major issue with using an LLM such as ChatGPT to do your own research is
    that they can often give you fictitious, but convincing, information (called **hallucinations**).
    RAG is a great way to reduce these hallucinations significantly because it keeps
    the LLM component in your RAG pipeline grounded in real data, which reduces the
    time you have to spend verifying responses. You can add multiple calls to the
    LLM in your RAG pipeline that can not only help to answer your research questions
    but can also verify that the response is highly relevant to the original question
    before providing the response back to you. You can also tailor the output to provide
    all supporting documentation and citations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Whether your organization needs to maintain regulatory compliance, accelerate
    R&D efforts, or identify emerging trends before your competitors do, RAG provides
    a unified approach to external knowledge retrieval that scales across these use
    cases. This same capability to analyze vast amounts of data and deliver targeted,
    relevant information also powers another critical business application: personalization.'
  prefs: []
  type: TYPE_NORMAL
- en: Personalization and targeted recommendations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In today’s digital landscape, users are inundated with an overwhelming amount
    of content. RAG offers a powerful solution to cut through the noise and deliver
    highly targeted, personalized experiences across media platforms, content delivery,
    and marketing communications. This holistic approach to personalization can lead
    to increased customer loyalty, higher conversion rates, and ultimately a more
    successful business.
  prefs: []
  type: TYPE_NORMAL
- en: For media and content platforms, RAG can analyze user behavior, preferences,
    and engagement history to curate personalized content feeds. Rather than relying
    solely on collaborative filtering or simple recommendation algorithms, RAG can
    understand the nuanced relationships between content pieces and user interests,
    surfacing articles, videos, or other media that align with each user’s unique
    profile. This deeper understanding leads to more meaningful recommendations that
    keep users engaged and coming back.
  prefs: []
  type: TYPE_NORMAL
- en: RAG can also represent a significant advancement for companies that adopt it
    to enhance user engagement and satisfaction across media, content platforms, and
    digital marketing campaigns. RAG can be used to create personalized product bundles
    or collections based on a customer’s preferences, which can be advertised and
    included in digital campaigns targeting each customer. By analyzing a customer’s
    data and identifying complementary products, RAG can suggest pre-assembled bundles
    that offer convenience and value.
  prefs: []
  type: TYPE_NORMAL
- en: RAG can also enhance the effectiveness of email marketing campaigns by providing
    personalized product recommendations directly in marketing communications. By
    analyzing a customer’s data and tailoring product suggestions to their interests,
    e-commerce sites can create highly targeted and compelling email content that
    drives **click-through rates** (**CTRs**) and conversions.
  prefs: []
  type: TYPE_NORMAL
- en: As marketing continues to evolve and businesses seek new ways to engage customers,
    RAG’s potential extends beyond personalized product recommendations on websites.
    RAG can be leveraged to create tailored experiences across various digital touchpoints,
    enhancing user engagement and fostering long-term customer loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, let’s review how RAG’s capabilities can be applied to another critical
    area for businesses: employee training and education.'
  prefs: []
  type: TYPE_NORMAL
- en: Training and education
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: RAG can be used by educational organizations, such as universities and secondary
    education. It can also be used by internal corporate training programs to keep
    their employees up to speed on vast amounts of ever-changing concepts they need
    their employees to be aware of. RAG can help generate or customize learning materials
    based on the specific needs, knowledge levels, and functions of the learners.
  prefs: []
  type: TYPE_NORMAL
- en: RAG has shown incredible promise for significantly improving learning and development
    in corporate environments. It is often a challenging task for businesses to keep
    their employees updated with the latest industry knowledge and skills, especially
    given today’s rapid pace of change across many industries. RAG helps address this
    challenge by offering personalized learning experiences that adapt to each employee’s
    individual needs, learning style, and pace with their content.
  prefs: []
  type: TYPE_NORMAL
- en: RAG can analyze an employee’s role, experience level, and learning history to
    curate a customized learning path that focuses on the most relevant and essential
    skills for their specific position. This personalized approach ensures that employees
    receive training that directly contributes to their professional growth and aligns
    with the company’s objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, RAG can also be used to generate interactive learning materials, such
    as quizzes, case studies, and simulations, tailored to each employee’s learning
    style and progress. This adaptive learning approach keeps employees engaged and
    motivated, as they receive content that challenges them at the right level and
    provides immediate feedback on their performance.
  prefs: []
  type: TYPE_NORMAL
- en: RAG’s ability to quickly summarize and present relevant information from vast
    knowledge bases also makes it an invaluable tool for on-the-job learning and performance
    support. Employees can use the RAG system to quickly access the information they
    need to solve problems, make decisions, and complete tasks more efficiently. This
    **just-in-time** (**JIT**) learning approach reduces the need for lengthy, formal
    training sessions and empowers employees to take control of their learning and
    development.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to personalized learning, RAG also enables more effective collaboration
    and knowledge sharing among employees. By analyzing the knowledge and skills of
    each individual, RAG can identify **subject matter experts** (**SMEs**) within
    the organization and facilitate connections between employees who can learn from
    one another. This internal knowledge flow promotes a culture of continuous learning
    and helps organizations retain and leverage their collective expertise.
  prefs: []
  type: TYPE_NORMAL
- en: As we’ve seen, RAG has immense potential to transform various aspects of a company’s
    operations, from personalized learning and employee development to customer engagement
    and process optimization. However, the successful implementation of RAG requires
    a strategic approach that aligns with the company’s goals and priorities.
  prefs: []
  type: TYPE_NORMAL
- en: One critical aspect of many RAG applications mentioned previously is the inclusion
    of relevant data and sources in generated responses. For example, when using RAG
    to crawl legal documents or scientific research papers, it’s crucial to cite the
    sources to provide credibility and support for the information presented. Let’s
    explore how we can extend the code example from [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043)
    to incorporate this functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 3.1 – adding sources to your RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many of the aforementioned applications include an element of adding more data
    to the response. For example, you are likely going to want to quote the sources
    of your response if you have a RAG pipeline that crawls legal documents or scientific
    research papers as a part of the efforts described in the *Expanding and enhancing
    private data with general external knowledge bases* or *Innovation scouting and
    trend analysis* sections.
  prefs: []
  type: TYPE_NORMAL
- en: We will continue the code from [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043)
    and add this valuable step of returning the retrieved documents in the RAG response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Starting with the code from [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043),
    we need to introduce these elements to this code, which I will walk through and
    explain what is happening:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Note that we continue to use the `format_docs()` function we defined in [*Chapter
    2*](B34736_02_ePub.xhtml#_idTextAnchor043), which converts our retrieved documents
    into a formatted string for the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a new import: the `RunnableParallel` object from LangChain runnables.
    This introduces the concept of running the retriever and the question in parallel.
    This can improve performance by allowing the retriever to fetch the context while
    the question is being processed simultaneously:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s break down the lambda function in this code, as it may be unfamiliar
    if you’re new to Python. The `lambda x: format_docs(x["context"])` expression
    is an anonymous function, which is simply a small, unnamed function defined inline.
    Here, `x` represents the input being passed through the chain, which is a dictionary
    containing our retrieved documents under the key `"context"`. The `x["context"]`
    expression accesses that value from the dictionary, and then passes it to our
    `format_docs` function. This is equivalent to writing a named function like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Using a lambda is just a more compact way to express the same logic when the
    function is simple and only needed in one place.
  prefs: []
  type: TYPE_NORMAL
- en: 'Compare this to our original `rag_chain` object:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In the original code, `rag_chain` is constructed using a dictionary that combines
    the `retriever` and `format_docs` function for `"context"`, and `RunnablePassthrough()`
    for `"question"`. This dictionary is then piped `(|)` through `prompt`, `llm`,
    and `StrOutputParser()`.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this new version, called `rag_chain_from_docs`, the construction of `rag_chain`
    is split into two parts:'
  prefs: []
  type: TYPE_NORMAL
- en: The `rag_chain_from_docs` chain is created using `RunnablePassthrough.assign()`
    to format the documents retrieved from the context. It then pipes the formatted
    context through `prompt`, `llm`, and `StrOutputParser()`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `rag_chain_with_source` chain is created using `RunnableParallel()` to run
    the `retriever` and `RunnablePassthrough()` in parallel for `"context"` and `"question"`,
    respectively. The result is then assigned to `"answer"` using `rag_chain_from_docs`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main difference in functionality between these two approaches is that the
    new approach separates the retrieval of the context from the formatting and processing
    of the retrieved documents. This allows for more flexibility in handling the retrieved
    context before passing it through the prompt, LLM, and output parser.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we have to change the name of the chain that we pass the user query
    to match the new chain name, `rag_chain_with_source`. As we did in the past, we
    call the invoke method, `rag_chain_with_source.invoke()`, passing it the question,
    which triggers the parallel execution of the retriever and question, followed
    by the formatting and processing of the retrieved context using `rag_chain_from_docs`
    to generate the final answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The output will look like this (I shortened some of the text to fit into this
    book, but you should see the full printout when running this in code!):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This is more code-looking than our previous final output, but it contains all
    of the information you would provide back to the user to indicate the source of
    the response you provided them. For many use cases, this sourcing of the material
    is very important in helping the user understand why the response was what it
    was, in fact-checking it, and in building off it if they have anything else they
    need to add.
  prefs: []
  type: TYPE_NORMAL
- en: Note the metadata source listed after each `page_content` instance, which is
    what you would provide as the source link. In situations where you have multiple
    documents in the results, this could be different across each individual document
    returned in the retrieval step, but we only use one document here.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: RAG’s practical applications are diverse and impactful, from enhancing chatbots
    and automated reporting to personalizing customer experiences and revolutionizing
    support across various sectors. RAG can help you bridge the gap between unstructured
    data and actionable insights, enhancing decision-making and strategic planning.
    RAG can help you generate dynamic, personalized product descriptions and recommendations,
    driving your sales and fostering brand loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: RAG can enhance the searchability and utility of internal knowledge bases and
    can expand private data with outside general knowledge, crucial for sectors such
    as legal, compliance, R&D, and healthcare. It can aid you in innovation scouting
    and trend analysis and deliver highly targeted, engaging experiences through content
    personalization for your customers. RAG also offers your company personalized
    learning experiences, adapting to each employee’s needs and learning style.
  prefs: []
  type: TYPE_NORMAL
- en: As we conclude this chapter, it’s clear that RAG has the potential to transform
    various aspects of your business operations, and we look forward to starting this
    adventure with you!
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will dive deeper into the technical components that
    make up a RAG system, exploring the intricacies of indexing, retrieval, and generation,
    and how these stages integrate to deliver the powerful capabilities we’ve discussed
    throughout this chapter. By breaking down each component, you will gain a detailed
    understanding of the inner workings and how they interact to produce enhanced
    generative outputs.
  prefs: []
  type: TYPE_NORMAL
