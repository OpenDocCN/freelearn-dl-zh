- en: '14'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: Delivering Business Value with AI in Insurance
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过人工智能在保险业中实现业务价值
- en: When architecting for AI-augmented application workflows, it’s important to
    keep your overall business objectives in mind. What business problems are you
    solving, and what are the most pressing challenges your organization is facing?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在为人工智能增强的应用程序工作流程进行架构设计时，重要的是要牢记您的整体业务目标。您正在解决哪些业务问题，您的组织面临的最紧迫挑战是什么？
- en: Different stakeholders across your organization may approach AI implementation
    from various perspectives. Technology teams driving platform consolidation and
    modernization may evaluate solutions through a technology-first lens, comparing
    platforms based on technical capabilities and cost. Data science and analytics
    teams may focus on testing or proving data hypotheses. Business product owners
    may prioritize enhancing application features and capabilities, hoping to augment
    data processing with AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 您组织中的不同利益相关者可能从不同的角度来考虑人工智能的实施。推动平台整合和现代化的技术团队可能会通过技术优先的视角来评估解决方案，根据技术能力和成本比较平台。数据科学和分析团队可能会专注于测试或验证数据假设。业务产品负责人可能会优先考虑增强应用程序的功能和能力，希望利用人工智能来增强数据处理。
- en: Regardless of your role, the challenge is to help your organization leverage
    AI to make meaningful strides in business outcomes. This requires navigating multiple
    dimensions, including a clear understanding of business objectives to align AI
    initiatives with organizational goals, deep knowledge of the relevant data and
    workflows to ensure AI supports core business processes effectively, and thoughtful
    application of AI technologies to streamline data-intensive tasks and unlock new
    efficiencies.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 不论您的角色如何，挑战在于帮助您的组织利用人工智能在业务成果上取得实质性进展。这需要跨越多个维度，包括对业务目标的清晰理解，以将人工智能倡议与组织目标对齐，对相关数据和流程的深入了解，以确保人工智能有效地支持核心业务流程，以及深思熟虑地应用人工智能技术，以简化数据密集型任务并释放新的效率。
- en: Our end goal is to be able to gather, understand, interact with, and generate
    data faster by applying the right AI capabilities to the right points in the organization.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是能够通过将正确的人工智能能力应用于组织的正确位置，更快地收集、理解、交互和生成数据。
- en: This version removes the specific role targeting and makes it applicable to
    anyone involved in AI implementation decisions, while maintaining the same key
    concepts and structure.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本版本删除了特定的角色定位，使其适用于任何参与人工智能实施决策的人，同时保持相同的关键概念和结构。
- en: 'By the end of this chapter, you will understand the following:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将理解以下内容：
- en: How data architectures have evolved from legacy systems to AI-ready infrastructures,
    and how to implement a converged datastore approach that unifies structured and
    unstructured data
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据架构如何从遗留系统发展到人工智能就绪的基础设施，以及如何实施统一的数据存储方法，以统一结构化和非结构化数据
- en: The spectrum of AI technologies available to insurance organizations, from traditional
    machine learning to agentic AI systems, and their practical applications across
    underwriting, claims processing, and customer experience
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保险组织可用的各种人工智能技术，从传统的机器学习到代理人工智能系统，以及它们在承保、索赔处理和客户体验方面的实际应用
- en: Why domain-driven AI implementation aligns with business objectives and how
    to architect root domain entities that provide the rich context needed for intelligent
    decision-making
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么以领域驱动的人工智能实施与业务目标相一致，以及如何构建提供丰富上下文以支持智能决策的根领域实体
- en: Real-world examples of insurance organizations successfully implementing AI
    solutions
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保险组织成功实施人工智能解决方案的实例
- en: The strategic importance of integrating AI directly into business applications
    rather than treating it as a separate initiative
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能直接集成到业务应用程序中的战略重要性，而不是将其视为一个单独的倡议
- en: The evolution of data architectures
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据架构的演变
- en: 'We’ve been on a journey with data architectures in insurance. This evolution
    has moved through three distinct phases:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在保险业的数据架构方面已经经历了一段旅程。这一演变经历了三个不同的阶段：
- en: '**Legacy systems**: These were characterized by monolithic relational databases
    that were slow and expensive, with rigid schemas that were slow to adapt and had
    limited scalability'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**遗留系统**：这些系统以单体关系型数据库为特征，速度慢且成本高，具有缓慢适应且可扩展性有限的刚性模式'
- en: '**Microservices era**: This introduced domain datastores with faster development
    cycles, using JSON for data both in motion and at rest, APIs and events for communication,
    and domain-specific schemas'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微服务时代**：这一时代引入了具有更快开发周期的领域数据存储，使用JSON处理动态和静态数据，使用API和事件进行通信，以及特定领域的模式。'
- en: '**AI integration**: Now, we’re entering an era where we need to architect data
    specifically for AI, with smart business applications and intelligent agents operating
    on converged datastores'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI集成**：现在，我们正进入一个需要专门为AI架构数据的时代，智能商业应用和智能代理在统一的数据存储上运行。'
- en: '![](img/B34136_14_01.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_01.png)'
- en: 'Figure 14.1: Data architecture evolution: from legacy systems to AI-ready infrastructure'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.1：数据架构演变：从传统系统到AI就绪基础设施
- en: '*Figure 14.1* illustrates the three-phase evolution of data architectures in
    insurance. Legacy systems show a traditional three-tier structure (UI, app, and
    data) with monolithic relational databases. The era of microservices introduces
    distributed domain datastores with multi-channel applications communicating through
    APIs and events. The AI phase depicts a new paradigm with smart business applications
    and multiple agent workers, raising the key question of how to properly architect
    data infrastructure to support agentic AI systems.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*图14.1* 展示了保险行业数据架构的三个阶段演变。传统系统显示了一个传统的三层结构（UI、应用和数据）以及单体关系型数据库。微服务时代引入了分布式领域数据存储，多渠道应用通过API和事件进行通信。AI阶段描绘了一个新的范式，拥有智能商业应用和多个代理工作者，提出了如何恰当地架构数据基础设施以支持代理AI系统这一关键问题。'
- en: Technology has always driven advancements in how we transact business. Each
    phase has brought increased agility and capability, with the AI integration phase
    representing the most significant leap forward in terms of business value potential.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 技术始终推动着我们交易业务方式的进步。每个阶段都带来了更高的灵活性和能力，而AI集成阶段在商业价值潜力方面代表了最显著的飞跃。
- en: Having explored how data architectures have evolved to support AI capabilities,
    let’s examine how these technical foundations translate into tangible business
    value through a concrete insurance example.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在探讨了数据架构如何演变以支持AI能力之后，让我们通过一个具体的保险案例来考察这些技术基础如何转化为有形的商业价值。
- en: Claim handling as an example
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以理赔处理为例
- en: Having explored how data architectures have evolved to support AI capabilities,
    let’s examine how these technical foundations translate into tangible business
    value through a concrete insurance example. Common organizational goals for an
    insurer may include increasing operational excellence and customer centricity.
    Emphasizing efficiency and effectiveness in operations to maximize returns and
    reduce waste, and prioritizing investments that improve customer satisfaction
    and engagement.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在探讨了数据架构如何演变以支持AI能力之后，让我们通过一个具体的保险案例来考察这些技术基础如何转化为有形的商业价值。保险公司常见的组织目标可能包括提高运营卓越性和以客户为中心。强调运营中的效率和有效性以最大化回报并减少浪费，以及优先投资提高客户满意度和参与度的项目。
- en: How well your organization can process and resolve claims, for example, directly
    impacts the preceding objectives. Achieving this is directly coupled to how quickly,
    efficiently, and accurately you can process the data found within claim-handling
    application workflows.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 您的组织在处理和解决索赔方面的能力如何，例如，直接影响到前面的目标。实现这一点直接关联到您处理理赔应用工作流程中数据的速度、效率和准确性。
- en: Claim handling provides us with great opportunities to leverage AI in order
    to accelerate data processing hotspots, so that the organization can return meaningful
    value from the technology investment.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 理赔处理为我们提供了利用AI加速数据处理热点的大好机会，从而使组织能够从技术投资中获得有意义的回报。
- en: So what kinds of data in a claim-handling workflow are hard to work with? Unstructured
    data sources, such as damage photos, accident forms and reports, claim handler
    notes, traffic camera videos, and claim-handling guidelines and recommendations.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，在理赔处理工作流程中，哪些类型的数据难以处理？非结构化数据源，例如损坏照片、事故表格和报告、理赔处理人员笔记、交通摄像头视频以及理赔处理指南和建议。
- en: 'Are these data sources cumbersome for your employees to process? Consider the
    manual effort required: opening and reading forms, examining and interpreting
    images, and distilling and writing case-file notes before claims can move forward.
    During catastrophic events, this challenge multiplies exponentially with massive,
    sudden influxes of claims.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些数据源对您的员工来说处理起来麻烦吗？考虑一下所需的手动工作量：打开和阅读表格，检查和解释图像，以及提炼和撰写案例文件笔记，然后索赔才能继续进行。在灾难性事件期间，这一挑战随着大量、突然涌入的索赔而呈指数级增长。
- en: The insurance industry’s challenge isn’t a lack of data; it’s the ability to
    process, understand, and act on that data at scale and with speed. This is where
    AI, in its various forms, offers transformative potential.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 保险业的挑战不是数据不足，而是处理、理解和快速采取行动的能力。这正是人工智能，以各种形式，提供变革潜力的地方。
- en: The spectrum of AI in insurance
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保险业中的AI光谱
- en: Insurance organizations can leverage multiple types of AI to address different
    business challenges. Understanding the full spectrum of AI capabilities is essential
    for making strategic implementation decisions.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 保险公司可以利用多种类型的AI来解决不同的业务挑战。了解AI能力的全谱系对于做出战略实施决策至关重要。
- en: Traditional machine learning
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传统机器学习
- en: Machine learning models trained on historical data can be used to make predictions
    and decisions within a business workflow, effectively replacing certain human
    tasks. These models excel at risk classification and pricing, detecting fraud
    based on patterns, segmenting and targeting customers, and triaging and routing
    claims.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在历史数据上训练的机器学习模型可以用于在业务工作流程中做出预测和决策，有效地取代某些人工任务。这些模型在风险分类和定价、基于模式检测欺诈、细分和定位客户以及分类和路由索赔方面表现出色。
- en: 'While these AI models have been in use for years, the question now is: what
    about **generative AI** (**GenAI**)?'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些AI模型已经使用了多年，但现在的问题是：关于**生成式人工智能（GenAI**）呢？
- en: GenAI and LLMs
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式人工智能（GenAI）和大型语言模型（LLMs）
- en: GenAI and LLMs give us core NLP capabilities that are particularly well-suited
    to augmenting data processing abilities. When applied to the claim-handling workflow,
    these technologies can dramatically transform how insurers process and understand
    unstructured information.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能（GenAI）和大型语言模型（LLMs）为我们提供了非常适合增强数据处理能力的核心自然语言处理能力。当应用于索赔处理工作流程时，这些技术可以显著改变保险公司处理和理解非结构化信息的方式。
- en: One of the most powerful applications is entity extraction, which helps interrogate
    and retrieve relevant information from unstructured sources such as PDF guidelines
    or large bodies of text found within accident forms. This capability allows claims
    processors to quickly identify key information such as dates, locations, policy
    numbers, and damage descriptions without manually scanning through lengthy documents.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 其中最强大的应用之一是实体提取，这有助于从非结构化来源，如PDF指南或事故表格中找到的大量文本中查询和检索相关信息。这种能力使得索赔处理人员能够快速识别关键信息，例如日期、地点、政策号码和损坏描述，而无需手动扫描冗长的文件。
- en: Text and image classification takes this a step further, enabling claim handlers
    to automatically determine types of damage or characteristics found in damage
    photos. Combined with text summarization capabilities, which speed up the synthesis
    of large bodies of text or information across many sources, these tools can dramatically
    reduce the time spent on initial claim assessment and documentation review.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 文本和图像分类更进一步，使索赔处理人员能够自动确定损坏照片中发现的损坏类型或特征。结合文本摘要能力，这些工具可以加快跨多个来源的大量文本或信息的综合速度，从而显著减少初步索赔评估和文件审查所需的时间。
- en: The technology also excels at text generation, helping generate case files and
    providing succinct instructions to workers based on larger bodies of guidelines.
    This ensures consistency in claim handling while reducing the cognitive load on
    adjusters. Additionally, interactive chat capabilities make previous or additional
    existing information available more quickly to both employees and customers, creating
    a more responsive and efficient service experience.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 该技术也擅长文本生成，有助于生成案例文件，并根据更广泛的指南为工作人员提供简洁的指令。这确保了索赔处理的连贯性，同时减少了调整人员的认知负荷。此外，交互式聊天功能使员工和客户能够更快地获取先前或额外的现有信息，从而创造更响应和高效的服务体验。
- en: Agentic AI systems
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理式人工智能系统
- en: 'At the most advanced end of the spectrum are agentic AI systems, autonomous
    systems that can perceive their environment, make decisions, and take actions
    to achieve specific goals. While still emerging and primarily deployed for specific,
    bounded tasks in production environments today, these systems represent the next
    evolution in AI capabilities. These are distinct from traditional LLMs in several
    key ways:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在最先进的端点是代理式AI系统，这些是能够感知其环境、做出决策并采取行动以实现特定目标的自主系统。虽然这些系统目前仍处于发展初期，主要在生产环境中用于特定、有限的任务，但它们代表了AI能力的下一次进化。这些系统在几个关键方面与传统LLM不同：
- en: '![](img/B34136_14_02.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_02.png)'
- en: 'Figure 14.2: LLM vs. agentic AI systems: key differences and capabilities'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.2：LLM与代理式AI系统：关键差异和能力
- en: 'This comparison chart highlights the fundamental differences between traditional
    LLMs and advanced agentic AI systems. The diagram shows five key distinctions:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 此比较图突出了传统LLM和高级代理式AI系统之间的基本差异。图中显示了五个关键区别：
- en: '**Interaction mode**: LLMs are prompted by humans for each response, while
    agents can act autonomously to execute multi-step workflows once given an initial
    goal or objective'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互模式**：LLM需要由人类为每个响应进行提示，而代理式系统一旦被赋予一个初始目标或目标，就可以自主执行多步骤工作流程'
- en: '**Response capability**: LLMs provide single answers versus agents that can
    reason through multi-step processes'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应能力**：LLM提供单一答案，而代理式系统能够通过多步骤过程进行推理'
- en: '**Processing approach**: LLMs offer single-answer responses, while agents can
    explore multiple paths'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理方法**：LLM提供单一答案的响应，而代理式系统可以探索多个路径'
- en: '**Memory**: LLMs are stateless, while agents maintain long-term context and
    memory'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆**：LLM是无状态的，而代理式系统保持长期上下文和记忆'
- en: '**Tool access**: LLMs lack tool access compared to agents that can use RAG,
    APIs, and databases'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具访问**：与能够使用RAG、API和数据库的代理式系统相比，LLM缺乏工具访问'
- en: The choice of which AI approach to implement depends on the specific business
    challenge, data availability, and organizational readiness. Many insurance organizations
    will benefit from implementing a mix of these approaches across different business
    domains and use cases.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 选择哪种AI方法实施取决于具体的业务挑战、数据可用性和组织准备情况。许多保险公司将从在各个业务领域和用例中实施这些方法的组合中受益。
- en: Understanding these fundamental differences between LLMs and agents is crucial
    because they determine how we architect AI solutions for insurance workflows.
    While LLMs excel at individual tasks such as document analysis or customer inquiries,
    the complex multi-step nature of insurance processes, from initial claim intake
    through final settlement, requires the autonomous decision-making and tool integration
    capabilities that only agentic systems can provide.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 理解LLM和代理之间的这些基本差异至关重要，因为它们决定了我们如何为保险工作流程构建AI解决方案。虽然LLM在文档分析或客户咨询等个别任务上表现出色，但保险流程的复杂多步骤性质，从最初的索赔接收到最后结算，需要只有代理式系统能够提供的自主决策和工具集成能力。
- en: Agentic workflows in insurance
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保险中的代理式工作流程
- en: To understand how AI agents can deliver business value, let’s examine a concrete
    example of an agentic workflow in insurance claims processing. These autonomous
    systems can perceive their environment, make decisions, and take actions. These
    capabilities make them particularly powerful for orchestrating complex insurance
    processes to reach your business goals of reducing operational expenses and increasing
    customer satisfaction.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解AI代理如何创造业务价值，让我们考察一个保险索赔处理中代理式工作流程的具体例子。这些自主系统可以感知其环境、做出决策并采取行动。这些能力使它们特别适合编排复杂的保险流程，以达到降低运营成本和提高客户满意度的业务目标。
- en: 'This workflow demonstrates how the most advanced AI systems can orchestrate
    complex insurance processes by seamlessly connecting the following:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程展示了最先进的AI系统如何通过无缝连接以下内容来编排复杂的保险流程：
- en: '**Structured data** (claim record)'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化数据**（索赔记录）'
- en: '**Business workflow steps** (first notice of loss → identify and document damages
    → check coverage → determine and summarize coverage)'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务工作流程步骤**（损失通知 → 识别和记录损害 → 核查承保 → 确定和总结承保）'
- en: '**Unstructured data** (damage photos, policy forms, etc.)'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化数据**（损害照片、保单表格等）'
- en: '**User touchpoints** (customer mobile app, claim handler interface, etc.)'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户接触点**（客户移动应用、索赔处理界面等）'
- en: 'The workflow is shown in the following diagram:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程在以下图中展示：
- en: '![](img/B34136_14_03.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_03.png)'
- en: 'Figure 14.3: Agentic AI workflow for insurance claims processing'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.3：保险索赔处理的代理式AI工作流程
- en: It illustrates how AI agents orchestrate an end-to-end insurance claims workflow,
    integrating structured data (claim records and policy information), business processes
    (from first notice of loss through coverage determination), unstructured data
    (damage photos and policy forms), and user touchpoints (customer mobile app and
    claim handler interface). The workflow shows AI agents operating at key decision
    points to automate processes while connecting customer experiences with backend
    systems.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 它说明了AI代理如何编排端到端保险索赔工作流程，集成结构化数据（索赔记录和政策信息）、业务流程（从首次损失通知到承保决定）、非结构化数据（损坏照片和政策表格）以及用户接触点（客户移动应用程序和索赔处理界面）。工作流程显示了AI代理在关键决策点操作以自动化流程，同时将客户体验与后端系统连接起来。
- en: This workflow demonstrates how AI agents can bridge the gap between customer
    experiences and backend processes, handling both structured and unstructured data
    seamlessly. The key advantage is that agents can operate autonomously across multiple
    systems and data types, reducing the need for human intervention in routine processes
    while still maintaining accuracy and compliance.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程展示了AI代理如何弥合客户体验和后端流程之间的差距，无缝地处理结构化和非结构化数据。关键优势在于代理可以在多个系统和数据类型上自主操作，减少在常规流程中人工干预的需求，同时仍保持准确性和合规性。
- en: Architecting for applications
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为应用程序构建架构
- en: Your software delivery teams and the applications they support may be divided
    up by agile delivery domains. It’s inside those domains and applications that
    you’ll need to apply AI in order to effectively move the needle on organizational
    and process outcomes. In short, your AI belongs in your applications.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 您的软件交付团队以及他们支持的应用程序可能被敏捷交付领域分割。您需要在那些领域和应用程序内部应用AI，以便有效地推动组织和流程的结果。简而言之，您的AI属于您的应用程序。
- en: The data that supports those applications resides in operational data stores.
    If we want both our applications and our AI to work with real-time data, it should
    be accessible within the same underlying data store. What serves our apps should
    also serve our AI.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 支持这些应用程序的数据存储在操作数据存储中。如果我们希望我们的应用程序和AI使用实时数据，它应该在同一基础数据存储中可访问。服务于我们应用程序的也应该服务于我们的AI。
- en: This integration of AI directly into business applications represents a critical
    shift from the experimental phase of AI adoption to the value-delivery phase.
    Rather than treating AI as a separate initiative, forward-thinking insurance organizations
    are embedding AI capabilities directly into their core business systems.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI直接集成到商业应用程序中代表了从AI采用实验阶段到价值交付阶段的重大转变。与其将AI视为一个单独的倡议，具有前瞻性的保险公司正在将AI能力直接嵌入其核心业务系统中。
- en: 'While this approach delivers significant business value, it requires careful
    attention to security considerations, including the following:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种方法带来了显著的商业价值，但它需要仔细关注安全考虑因素，包括以下内容：
- en: Access controls and authentication
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问控制和身份验证
- en: Data protection and encryption
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据保护和加密
- en: Secure output handling and validation
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全的输出处理和验证
- en: Zero-trust security principles
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 零信任安全原则
- en: Proper API controls and monitoring
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确的API控制和监控
- en: Regular security assessments
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期安全评估
- en: Organizations should implement these safeguards as part of their AI integration
    strategy to mitigate risks such as unauthorized access, data exposure, and potential
    system vulnerabilities.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 组织应将其作为AI集成策略的一部分实施这些安全措施，以减轻未经授权的访问、数据泄露和潜在的系统漏洞等风险。
- en: The converged datastore
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 集成数据存储
- en: A **converged datastore** is an architectural approach that brings together
    APIs and events, users and agents, and structured and unstructured data in a unified
    system. This approach is particularly powerful for insurance applications where
    diverse data types must be processed efficiently.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**集成数据存储**是一种将API和事件、用户和代理以及结构化和非结构化数据统一到一个系统中的架构方法。这种方法对于必须高效处理多种数据类型的保险应用程序尤其强大。'
- en: 'For example, in a claims processing workflow, the following happens:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在索赔处理工作流程中，以下情况发生：
- en: A customer reports first notice of loss and uploads photos through a mobile
    app.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户通过移动应用程序报告首次损失并上传照片。
- en: The system stores both the structured claim data (ID, claimant info, and status)
    and unstructured data (damage photos with vector embeddings).
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统存储了结构化索赔数据（ID、索赔人信息和状态）以及非结构化数据（带有向量嵌入的损坏照片）。
- en: AI agents extract image metadata, update status summaries, and interact with
    both the claim data and the customer.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能智能体提取图像元数据，更新状态摘要，并与索赔数据和客户进行交互。
- en: Claim handlers have access to the same unified data store, ensuring consistency.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 索赔处理人员可以访问相同的一体化数据存储，确保一致性。
- en: '![](img/B34136_14_04.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_14_04.png)'
- en: 'Figure 14.4: Converged datastore architecture for AI-enabled claims processing'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.4：AI赋能索赔处理的集成数据存储架构
- en: This diagram shows how a converged datastore unifies APIs and events, users
    and agents, and structured and unstructured data in a single system. The workflow
    illustrates a customer reporting a claim and uploading photos, with the central
    claim datastore containing both structured data (claim ID and claimant info) and
    unstructured data (damage photos with vector embeddings), while AI agents process
    image metadata and interact with both customers and claim handlers through the
    unified data foundation.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了如何通过一个集成的数据存储统一API和事件、用户和智能体，以及结构化和非结构化数据。工作流程展示了客户报告索赔并上传照片，中央索赔数据存储库包含结构化数据（索赔ID和索赔人信息）和非结构化数据（带有矢量嵌入的损坏照片），而人工智能智能体处理图像元数据并与客户和索赔处理人员通过统一的数据基础进行交互。
- en: 'The converged datastore concept addresses one of the most significant challenges
    in AI implementation: the integration of AI systems with existing operational
    systems. By providing a unified data foundation, it eliminates the need for complex
    data pipelines and reduces the latency between data creation and AI-driven insights.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 集成数据存储概念解决了人工智能实施中最具挑战性的问题之一：将人工智能系统与现有运营系统集成。通过提供统一的数据基础，它消除了复杂数据管道的需求，并减少了数据创建与人工智能驱动的洞察之间的延迟。
- en: Managing operational structured and unstructured data
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理运营结构化和非结构化数据
- en: 'Your application architecture needs to provide a way to store, serve, and update
    structured data as part of your workflow and to integrate the unstructured data.
    This may come in the form of both the raw data (PDFs, images, and notes) and the
    vector-encoding representation of it. You’ll want the vector-encoding data to
    be as close as possible to the structured data that already may exist in your
    application. There are several reasons for this, including the following:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你的应用程序架构需要提供一种方式来存储、提供和更新结构化数据，作为你的工作流程的一部分，并集成非结构化数据。这可能包括原始数据（PDF、图像和笔记）以及其矢量编码表示。你希望矢量编码数据尽可能接近你应用程序中可能已经存在的结构化数据。这有几个原因，包括以下内容：
- en: '**Performance**: Providing application-level **service-level agreements** (**SLAs**)
    utilizing efficient server compute'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**：通过利用高效的服务器计算提供应用级的服务级别协议（**SLAs**）'
- en: '**Security**: Providing consistent app tier-level security controls to determine
    who can access what data'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：提供一致的APP层安全控制，以确定谁可以访问什么数据'
- en: '**Ease of application delivery and maintenance**: The fewer components and
    dependencies, the lower the complexity and cost of building, deploying, and maintaining
    effective software solutions that leverage AI'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用交付和维护的便捷性**：组件和依赖项越少，构建、部署和维护利用人工智能的有效软件解决方案的复杂性和成本就越低'
- en: This integrated approach to data management is particularly important in insurance,
    where data privacy, security, and compliance requirements are stringent. By maintaining
    a unified approach to data governance across both structured and unstructured
    data, organizations can ensure that AI implementations meet regulatory requirements
    while still delivering business value.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这种数据管理的集成方法在保险业尤为重要，因为数据隐私、安全和合规要求非常严格。通过在结构化和非结构化数据上保持统一的数据治理方法，组织可以确保人工智能实施符合监管要求，同时仍然提供商业价值。
- en: Architecture features for agentic systems
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能体系统的架构特征
- en: Let’s look at the architectural features we can expect to find in an agentic
    system. Putting focus on architectural significance, what’s new, and what’s changing
    is important to understanding not only what you can build, but how it will integrate
    into existing systems.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看在智能体系统中我们可以期待发现的一些架构特征。关注架构的重要性、新变化以及变化之处，对于理解你能够构建什么以及它如何集成到现有系统中至关重要。
- en: Root domain entity and domain schema
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 根域实体和域模式
- en: 'The converged datastore approach uses fewer but richer data objects that provide
    deep and immediate context. A **root domain entity** is essentially a comprehensive
    data container that holds everything related to a specific business concept in
    one place. For example, a claim entity would contain the following:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Structured data (claim ID, dates, type codes, loss details, and claimant information)
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unstructured data (damage photos, accident reports, and traffic camera videos)
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector embeddings of the unstructured content
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/B34136_14_05.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.5: Root domain entity and domain schema'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 14.5* shows how unstructured data sources (damage photos, accident
    reports, and traffic camera videos) are integrated into a rich claim entity alongside
    structured data fields. This approach delivers fewer but richer data objects that
    provide deep and immediate context, using **JavaScript Object Notation** (**JSON**)
    as the AI standard format; this is the preferred data format for AI systems because
    it’s flexible and easy to process while enabling real-time access across agents
    and use cases with low-latency performance.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Unified search across all data types
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This rich data structure enables powerful new search capabilities. Instead of
    querying multiple systems, a claims adjuster can say, `"Show me all Q4 claims
    over $15,000 with damage photos similar to this new claim"`, and get results that
    combine structured data filters with visual similarity matching in a single query.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_14_06.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.6: Vector, text, and hybrid search'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 14.6* illustrates how MongoDB Atlas automatically creates both vector
    and text search indexes from the `CLAIM` collections. When data changes, edits
    propagate automatically into all indexes, enabling queries using `$vectorSearch`
    (for finding similar images or content) and `$search` (for traditional text searching)
    within MongoDB’s query language. This architecturally elegant approach allows
    you to traverse structured and unstructured data within the same query while maintaining
    low latency, low complexity, and a single security model.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Learn more about Atlas Vector Search at [https://www.mongodb.com/products/platform/atlas-vector-search](https://www.mongodb.com/products/platform/atlas-vector-search)
    and Atlas Search at [https://www.mongodb.com/products/platform/atlas-search](https://www.mongodb.com/products/platform/atlas-search).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Event-based architecture for autonomous actions
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Beyond rich data models and unified search, agentic systems need to react automatically
    to changing conditions. This is where event-based architecture becomes essential.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_14_07.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.7: Event-based architecture for autonomous actions'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 14.7* shows how MongoDB Atlas supports persistent stream processing,
    allowing AI systems to process continuous streaming data using aggregation pipeline
    stages (MongoDB’s powerful data processing framework that can filter, transform,
    and analyze data in real time). The stream processor component continuously monitors
    inserts and updates to `CLAIM` entities, automatically triggering responses by
    AI agents. This provides MongoDB Atlas deployment simplicity and security while
    enabling real-time responsiveness.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 14.7* 展示了 MongoDB Atlas 如何支持持久流处理，允许 AI 系统使用聚合管道阶段（MongoDB 的强大数据处理框架，可以实时过滤、转换和分析数据）处理连续流数据。流处理器组件持续监控
    `CLAIM` 实体的插入和更新，自动触发 AI 代理的响应。这为 MongoDB Atlas 部署提供了简单性和安全性，同时实现了实时响应能力。'
- en: 'Learn more about Atlas Stream Processing here: [https://www.mongodb.com/products/platform/atlas-stream-processing](https://www.mongodb.com/products/platform/atlas-stream-processing).'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在此处了解更多关于 Atlas 流处理的信息：[https://www.mongodb.com/products/platform/atlas-stream-processing](https://www.mongodb.com/products/platform/atlas-stream-processing)。
- en: 'Key advantages of this unified approach are as follows:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这种统一方法的关键优势如下：
- en: '**One query, comprehensive results**: Find relevant information using any combination
    of structured data, text content, and visual similarity'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个查询，全面结果**：使用任何组合的结构化数据、文本内容和视觉相似性查找相关信息'
- en: '**Automatic synchronization**: When data changes, all search indexes update
    instantly'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动同步**：当数据发生变化时，所有搜索索引会立即更新'
- en: '**Real-time responsiveness**: AI systems react immediately to data changes'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时响应**：AI 系统对数据变化立即做出反应'
- en: '**Consistent security**: One access control model across all data types and
    processes'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性安全**：所有数据类型和流程中只有一个访问控制模型'
- en: Together these architectural features include rich domain entities, unified
    search capabilities, and event-driven responsiveness. They create the technical
    foundation for intelligent, autonomous systems. However, architectural elegance
    means nothing without measurable business impact. The real test of any AI implementation
    lies in whether it solves actual business problems and improves operational outcomes.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这些架构特性包括丰富的领域实体、统一的搜索能力和事件驱动的响应能力。它们为智能、自主系统提供了技术基础。然而，如果没有可衡量的业务影响，架构的优雅也就毫无意义。任何
    AI 实施的真实测试在于它是否解决了实际业务问题并改善了运营成果。
- en: Now, let’s examine how these architectural principles translate into practical
    business value through a concrete example of AI-enhanced claims processing.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过一个 AI 增强索赔处理的实例来具体探讨这些架构原则如何转化为实际业务价值。
- en: AI-driven improvements in claim handling for better business outcomes
  id: totrans-122
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过 AI 驱动的改进，提高索赔处理以实现更好的业务成果
- en: The integration of AI into claims processing represents one of the most immediate
    opportunities for insurance organizations to realize value from AI investments.
    By automating routine aspects of claims handling, organizations can reduce processing
    times, improve accuracy, and free up human adjusters to focus on complex cases
    and customer interactions that benefit from human judgment and empathy.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 将 AI 集成到索赔处理中是保险组织从 AI 投资中获得价值的最直接机会之一。通过自动化索赔处理的常规方面，组织可以缩短处理时间，提高准确性，并释放人工调整员专注于复杂案例和需要人类判断和同理心的客户互动。
- en: '![](img/B34136_14_08.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_08.png)'
- en: 'Figure 14.8: AI use cases aligned to the claim-handling workflow'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.8：与索赔处理工作流程对齐的 AI 用例
- en: '*Figure 14.8* shows practical use cases for core NLP capabilities that include
    text and image classification, interactive chat, entity extraction, and text summarization.
    When applied to a claim-handling workflow, for example, these capabilities can
    reduce data hotspots, resulting in lower processing times and costs, and improved
    customer experience.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 14.8* 展示了核心 NLP 能力的实际用例，包括文本和图像分类、交互式聊天、实体提取和文本摘要。例如，当应用于索赔处理工作流程时，这些能力可以减少数据热点，从而降低处理时间和成本，并改善客户体验。'
- en: Before AI can transform our organizations, we first have to bring it into our
    applications and move beyond experimentation to production deployment.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在 AI 能够改变我们的组织之前，我们首先必须将其引入我们的应用程序，并从实验转向生产部署。
- en: AI maturity and implementation strategy
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 成熟度和实施策略
- en: '*Figure 14.9* shows the different stages of AI adoption within enterprises,
    from early interest to a pervasive and structural integration into processes and
    decisions. Many organizations struggle with moving out of Level 2, analytics experimentation,
    to Level 3, deploying AI features within business applications, in order to deliver
    meaningful business value and outcomes.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_14_09.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.9: AI maturity levels from undefined to transformational'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: This maturity model provides a roadmap for insurance organizations looking to
    advance their AI capabilities. The key transition from experimentation to production
    implementation requires not just technical expertise but also organizational alignment,
    clear business objectives, and a willingness to reimagine existing processes.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: The three layers of GenAI
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Understanding the technical foundation of GenAI helps insurance organizations
    make strategic decisions about where to invest resources and how to build comprehensive
    AI capabilities. GenAI applications can be separated into three major layers:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '**Layer 1, compute and AI models**: The underlying processing power plus foundational
    and embedding models that provide the core AI capabilities.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Layer 2, tooling to fine-tune and build applications**: Tools that provide
    foundational models with context by feeding them proprietary data. This is the
    critical middle layer that bridges generic AI capabilities with specific business
    needs.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Layer 3, AI-powered apps and experiences**: The interface and experiences
    that end users interact with, plus app frameworks that simplify the process of
    building AI experiences.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Foundational models are extremely powerful, but being trained on public datasets,
    they lack the domain knowledge and data context needed to adequately support enterprise
    applications. This is where Layer 2 becomes crucial, the data and tooling that
    enable GenAI-enhanced applications to be fully operational, moving your organization
    from Level 2 experimentation into Level 3 production maturity.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: A converged operational database stores proprietary structured and vector data,
    making it available to LLMs when an application makes a request. This effectively
    provides the context necessary for a foundational model to answer questions beyond
    its initial knowledge boundary.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: While much attention focuses on foundational models, the middle-layer data and
    tooling often determine the success or failure of AI initiatives in production
    environments.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 14.10* shows the three layers of GenAI in greater detail, showing structured
    data flowing from the application into the operational database, with raw unstructured
    data managed in object storage where it can be processed by applications. Part
    of this processing includes vectorization (converting unstructured content into
    numerical representations that AI can understand) and subsequent persistence of
    those vectors in the operational data store, where they can be readily accessed
    by the application.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_14_10.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_10.png)'
- en: 'Figure 14.10: AI-enabled application architecture with integrated data and
    model services'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.10：集成数据和模型服务的AI启用应用架构
- en: This architecture provides a blueprint for insurance organizations looking to
    build AI-enhanced applications. The key insight is that AI capabilities should
    be integrated directly into business applications rather than existing as separate
    systems. This integration ensures that AI has access to real-time data and can
    deliver insights and actions within the context of existing business processes.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 此架构为寻求构建AI增强应用的保险组织提供了一个蓝图。关键见解是，AI能力应直接集成到业务应用中，而不是作为独立系统存在。这种集成确保AI能够访问实时数据，并在现有业务流程的上下文中提供见解和行动。
- en: Domain-driven AI implementation
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 域驱动AI实施
- en: Insurance enterprises worldwide have embraced domain-driven design alongside
    aligned software delivery teams organized around core processing domains. With
    the shift to microservices and event-streaming architectures, AI capabilities
    can now supercharge this approach and accelerate the ability to interact with
    and serve up real-time data.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 全球保险企业已采用域驱动设计，并与围绕核心处理域组织的软件交付团队保持一致。随着向微服务和事件流架构的转变，AI能力现在可以极大地增强这种方法，并加速与实时数据的交互和服务能力。
- en: 'Working together: applications, data, and AI'
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 协同工作：应用、数据和AI
- en: 'Core insurance business capabilities organized and deployed by domain can be
    significantly enhanced when augmented by AI. This integration works best when
    AI implementations are as follows:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 通过域增强核心保险业务能力可以显著提升。当AI实施如下时，这种集成效果最佳：
- en: '**Domain-specific**: Tailored to specific business areas such as claims, underwriting,
    or customer service'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特定领域**：针对特定业务领域，如索赔、承保或客户服务'
- en: '**Task-focused**: Directly addressing data processing bottlenecks where they
    naturally occur'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务导向**：直接解决数据处理的瓶颈，这些瓶颈自然发生'
- en: '**Application-integrated**: Built into existing workflows rather than operating
    as separate systems'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用集成**：集成到现有工作流程中，而不是作为独立系统运行'
- en: 'For this approach to be effective, both operational and vector data should
    be stored as close to applications as possible. This proximity enables the following:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这种方法有效，操作数据和矢量数据应尽可能存储在接近应用的位置。这种邻近性使得以下成为可能：
- en: '**Real-time context**: Decisions made based on current data'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时上下文**：基于当前数据做出的决策'
- en: '**Optimal performance**: Reduced latency for time-sensitive insurance processes'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳性能**：降低对时间敏感的保险流程的延迟'
- en: '**Consistent security**: Unified access controls across all data types'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致的安全**：跨所有数据类型的统一访问控制'
- en: '**Domain agility**: Quick adaptation to changing business requirements'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域敏捷性**：快速适应不断变化的企业需求'
- en: Domain-based operational data stores help segment and enable stronger data lineage,
    data quality, and data governance for more trustworthy AI interactions. The architecture
    also relies on APIs and events for efficient processing both within individual
    domains and across domain boundaries.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 基于域的操作数据存储有助于细分并增强数据血缘、数据质量和数据治理，从而实现更可靠的AI交互。该架构还依赖于API和事件，以实现单个域内以及跨域边界的高效处理。
- en: Modernization and AI-forward architecture
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现代化和面向AI的架构
- en: 'Moving to a converged datastore architecture often requires modernizing existing
    systems. The recommended approach consolidates legacy complexity into a common,
    root domain schema:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 转向汇聚数据存储架构通常需要现代化现有系统。推荐的方法是将遗留复杂性合并到一个共同的、根域模式中：
- en: '**Migrate data** from relational, hierarchical, and file-based systems to a
    single-view operational data layer'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移数据**从关系型、层次型和基于文件的系统迁移到单一视图的操作数据层'
- en: '**Create unified access** that can simultaneously serve APIs, AI agents, classical
    applications, and provide internal/external interoperability'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建统一的访问**，可以同时服务于API、AI代理、经典应用，并提供内部/外部互操作性'
- en: '![](img/B34136_14_11.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_11.png)'
- en: 'Figure 14.11: Legacy system modernization strategy for converged datastore
    architecture'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.11：汇聚数据存储架构的遗留系统现代化策略
- en: This diagram illustrates the migration path from fragmented legacy systems (relational,
    hierarchical, and file-based) to a unified converged datastore approach. The strategy
    consolidates complex legacy data structures into a common root domain schema that
    can simultaneously serve APIs, agents, classical applications, and provide internal/external
    interoperability, enabling organizations to modernize incrementally while maintaining
    existing system functionality.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: This modernization strategy acknowledges the reality that most insurance organizations
    operate with a mix of legacy and modern systems. Rather than requiring complete
    replacement, the converged datastore approach offers a pragmatic path forward,
    allowing incremental modernization while delivering value from AI investments.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: AI-forward architecture
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The future of insurance technology is an AI-forward architecture built on a
    converged datastore centered around core collections for enterprise root domain
    entities such as customer, submission, policy, and claim.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: 'This architectural approach emphasizes the following:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '**Future-proof design**: Document model flexibility allows seamless integration
    of both structured and unstructured data without rigid schema constraints'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Essential features**: Every component contributes directly to business value
    for AI-enabled insurance operations'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Robust foundation**: Security, scale, and performance characteristics handle
    the demanding requirements of real-time AI processing'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reduced complexity**: Fewer objects and components create more maintainable
    and efficient systems'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/B34136_14_12.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.12: AI-forward architecture'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: This diagram shows an AI-forward architecture that consolidates core enterprise
    entities (customer, submission, policy, and claim) into a unified platform supporting
    APIs, events, stream processing, vector search, and text search capabilities.
    The architecture enables AI agents, intelligent applications, and vendor/SaaS
    solutions to operate seamlessly across a reduced complexity infrastructure, designed
    from the ground up to anticipate and enable AI capabilities rather than retrofitting
    legacy systems.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: By designing systems with AI capabilities in mind from the beginning, insurance
    organizations can avoid retrofitting challenges and rapidly adopt new AI capabilities
    as they emerge, maintaining a competitive advantage in an increasingly AI-driven
    industry.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: Underwriting and risk management
  id: totrans-177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Few roles within insurance are as important as underwriters, who strike the
    right balance between profit and risk, bring real-world variables to actuarial
    models, and help steer product portfolios, markets, pricing, and coverages. Achieving
    equilibrium between exposures and premiums requires constantly gathering and analyzing
    information from multiple sources to build comprehensive risk profiles.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: While many established insurers have access to a wealth of historical underwriting
    and claims data, challenges remain in integrating newer real-time data sources,
    keeping up with regulatory changes, and modeling what-if risk scenarios, which
    are tasks that still involve significant manual effort.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多已建立的保险公司可以访问大量的历史承保和索赔数据，但在整合新的实时数据源、跟上监管变化以及模拟假设风险场景方面仍然存在挑战，这些任务仍然需要大量的手动工作。
- en: Advanced analytics
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级分析
- en: Traditional IT systems are slow to respond to changing data formats and requirements.
    The burden often falls on underwriters to summarize data and turn it into actionable
    information and insights.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的IT系统在响应不断变化的数据格式和需求方面反应缓慢。通常，总结数据和将其转化为可操作信息和洞察的责任落在承保人身上。
- en: 'LLMs are now being leveraged to do the following:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs现在正被用于以下方面：
- en: Speed up data source wrangling and summarization
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加快数据源整理和总结
- en: Help underwriting teams make quicker decisions
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助承保团队做出更快的决策
- en: Reduce the manual effort required for data interpretation
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少数据解释所需的手动工作量
- en: By doing so, AI models are helping manage seasonal demands, market shifts, and
    staff availability impacts on the underwriting team workload and productivity.
    This saves underwriting time for high-value accounts where human expertise is
    truly needed.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，AI模型正在帮助管理季节性需求、市场变化和员工可用性对承保团队工作量和生产率的影响。这为需要真正专业知识的价值账户节省了承保时间。
- en: 'Traditional AI models already play an important role in classifying and triaging
    risk in the following ways:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的人工智能模型已经在以下方面在分类和分级风险中扮演着重要的角色：
- en: Sending very low-risk policies to touchless automated workflows
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将非常低风险的政策发送到无接触的自动化工作流程
- en: Routing low-to-moderate risk policies to trained service center staff
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将低至中等风险的政策路由到受过培训的服务中心工作人员
- en: Directing high-risk and high-value accounts to dedicated underwriters
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将高风险和高价值账户定向到专门的承保人
- en: Beyond triage, another challenge underwriters face lies in rate adjustments
    and policy renewals, which takes up a large portion of an underwriters’ daily
    responsibilities and demands significant time and manual effort. Automated underwriting
    workflows leveraging AI can analyze and classify risk with far less manual effort,
    freeing up significant time and intellectual capital.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 除了分级之外，承保人面临的另一个挑战在于费率调整和政策续保，这占据了承保人日常职责的大部分，并需要大量的时间和手动工作。利用AI的自动化承保工作流程可以以远少于手动工作的方式分析和分类风险，从而节省大量时间和智力资本。
- en: A converged datastore offers unparalleled ability to store data from vast amounts
    of sources and formats, responding quickly to requests for new data ingestion.
    As data and requirements change, the document model allows insurers to simply
    add more data and fields without costly change cycles associated with rigid database
    structures.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一个集成的数据存储库提供了无与伦比的能力，可以存储来自大量来源和格式的数据，并快速响应对新数据摄入的请求。随着数据和需求的变化，文档模型允许保险公司简单地添加更多数据和字段，而无需与刚性数据库结构相关的昂贵变更周期。
- en: Learn more about automating digital underwriting with ML at [https://www.mongodb.com/solutions/solutions-library/machine-learning-underwriting-solution](https://www.mongodb.com/solutions/solutions-library/machine-learning-underwriting-solution).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在[https://www.mongodb.com/solutions/solutions-library/machine-learning-underwriting-solution](https://www.mongodb.com/solutions/solutions-library/machine-learning-underwriting-solution)了解更多关于使用机器学习自动化数字承保的信息。
- en: Claim processing
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 索赔处理
- en: Efficient claim processing is critical for insurers. Timely resolution and good
    communication throughout the process are key to maintaining positive relationships
    and customer satisfaction. Additionally, insurers must pay and process claims
    according to jurisdictional regulations, which may include penalties for non-compliance
    with specific timelines.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 对于保险公司来说，高效的索赔处理至关重要。在整个过程中及时解决和良好的沟通是维护积极关系和客户满意度的关键。此外，保险公司必须根据司法管辖区的规定支付和处理索赔，这可能包括对特定时间表的违规行为的处罚。
- en: Processing claims accurately requires analyzing vast amounts of information.
    A typical automobile accident may include verbal and written descriptions from
    claimants and appraisers, along with unstructured content from police reports,
    traffic and vehicle dashboard cameras, photos, and vehicle telemetry data.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 准确处理索赔需要分析大量信息。典型的汽车事故可能包括索赔人和评估人的口头和书面描述，以及来自警察报告、交通和车辆仪表盘摄像头、照片和车辆遥测数据的非结构化内容。
- en: AI is helping insurers make sense of data faster and in real time. From natural
    language processing to image classification and vector embedding, all the pieces
    are now available for insurers to make a generational leap forward in transforming
    their IT systems and business workflows.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在帮助保险公司更快、实时地理解数据。从自然语言处理到图像分类和向量嵌入，所有这些组件现在都可供保险公司使用，以在转型其IT系统和业务工作流程方面实现一代人的飞跃。
- en: Generating accurate impact assessments for catastrophic events can now be done
    with far less time and greater accuracy by cross-referencing real-time and historical
    claims experience data, thanks to GenAI and the vector embedding of unstructured
    data.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 通过交叉引用实时和历史索赔经验数据，现在可以以更少的时间和更高的准确性生成对灾难性事件的准确影响评估，这得益于生成式人工智能和非结构化数据的向量嵌入。
- en: 'Using vector embeddings from photo, text, and voice sources, insurers can now
    enhance inbound claims with richer metadata, enabling them to more quickly do
    the following:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 通过从照片、文本和语音来源使用向量嵌入，保险公司现在可以增强索赔的元数据，使他们能够更快地完成以下任务：
- en: Classify and triage claims
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类和分诊索赔
- en: Route work to appropriate specialists
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将工作分配给适当的专家
- en: Make prescriptive work assignments based on real-time workload and staff availability
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据实时工作负载和员工可用性进行指导性工作分配
- en: Claim details are not always clear-cut, and parties don’t always act in good
    faith. AI is helping insurers drive to resolution faster and even avoid litigation
    altogether through its ability to analyze more data more effectively and in less
    time.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 索赔细节并不总是清晰明了，各方并不总是以诚信行事。人工智能正在帮助保险公司更快地推动解决方案，甚至通过其分析更多数据更有效、更快速的能力来避免诉讼。
- en: Many insurers provide risk-assessment services using drones, sensors, or cameras
    to capture and analyze data. This data offers the promise of preventing losses
    altogether, lowering exposures, liability, and expenses. This is possible through
    a combination of vector embedding with traditional and GenAI models.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 许多保险公司使用无人机、传感器或摄像头来捕捉和分析数据，提供风险评估服务。这些数据有望完全防止损失，降低风险敞口、责任和费用。这可以通过结合向量嵌入与传统和生成式人工智能（GenAI）模型来实现。
- en: Customer experience
  id: totrans-205
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 客户体验
- en: 'Accessing information consistently during customer service interactions, while
    expecting representatives to quickly interpret it, presents perennial challenges.
    The volume, variety, and complexity of insurance information make this particularly
    challenging, driving heavy investment in customer experience transformation:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在客户服务互动中持续访问信息，同时期望代表能够快速解释它，这始终是一个挑战。保险信息的数量、种类和复杂性使这一挑战尤为突出，推动了在客户体验转型方面的巨额投资：
- en: '**24/7 virtual assistance**: AI-based chat agents can free up call center staff
    to work on more complex, high-touch cases. Handling routine inquiries can now
    extend to more complex scenarios thanks to vector-embedded content and LLMs.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全天候虚拟助手**：基于人工智能的聊天代理可以释放呼叫中心员工的时间，让他们处理更复杂、更需要人际互动的案件。得益于向量嵌入的内容和大型语言模型（LLM），处理日常咨询现在可以扩展到更复杂的场景。'
- en: '**Claims assistance**: GenAI can deliver specific claim-handling guidelines
    to staff in real time, while traditional ML models can interrogate real-time information
    streams to alert customers or claim-handlers to quality, content, or compliance
    issues. These capabilities allow insurers to process more claims faster while
    significantly reducing errors.'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索赔协助**：生成式人工智能可以实时向员工提供具体的索赔处理指南，而传统的机器学习模型可以查询实时信息流，提醒客户或索赔处理人员注意质量、内容或合规性问题。这些能力使保险公司能够更快地处理更多索赔，同时显著减少错误。'
- en: '**Customer profiling**: Every interaction is an opportunity to learn more about
    customers. Technologies such as voice-to-text streaming, vector embedding, and
    GenAI help insurers build more robust customer profiles in near-real time.'
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户画像**：每一次互动都是了解客户更多信息的机遇。语音到文本流、向量嵌入和生成式人工智能等技术帮助保险公司几乎实时地构建更稳健的客户画像。'
- en: According to the Coalition Against Insurance Fraud, the U.S. insurance industry
    lost over $308 billion to fraud in 2022 [1]. With the vector embedding of unstructured
    data sources, semantic similarity searches across both vector and structured metadata,
    and traditional ML models, insurers can detect and prevent fraud in ways that
    were never before possible.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 根据反保险欺诈联盟的数据，2022年美国保险业因欺诈损失超过3080亿美元 [1]。通过非结构化数据源的向量嵌入、跨向量和结构化元数据的语义相似性搜索以及传统的机器学习模型，保险公司可以以以前从未可能的方式检测和预防欺诈。
- en: While these AI capabilities offer significant potential, insurance executives
    need concrete evidence that similar organizations have successfully implemented
    these technologies and achieved measurable results. The theoretical benefits of
    AI become compelling only when supported by real-world implementations that demonstrate
    clear ROI and operational improvements.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些AI功能具有巨大的潜力，但保险公司的高管需要具体证据来证明类似组织已成功实施这些技术并取得了可衡量的成果。只有当有现实世界的实施案例支持时，AI的理论优势才会变得有说服力，这些案例展示了明确的投资回报和运营改进。
- en: The following examples show how insurance companies and related industries have
    moved beyond experimentation to production-scale AI deployments. They provide
    practical blueprints for implementation and quantifiable business outcomes.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例展示了保险公司和相关行业如何从实验阶段发展到生产规模的AI部署。它们提供了实施的实际蓝图和可量化的商业成果。
- en: Real-world examples of domain-specific AI
  id: totrans-213
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 针对特定领域的AI的实际应用示例
- en: To bring the earlier concepts to life, let’s look at how domain-specific AI
    is already making a measurable impact across the insurance industry. These real-world
    examples show how insurers are applying AI to solve complex problems in underwriting,
    risk assessment, and compliance, turning advanced technologies such as real-time
    data analysis RAG into practical business outcomes.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使早期概念变得生动，让我们看看特定领域的AI如何已经在保险行业产生了可衡量的影响。这些现实世界的例子展示了保险公司如何将AI应用于解决承保、风险评估和合规方面的复杂问题，将实时数据分析等先进技术转化为实际的商业成果。
- en: '**AI-powered risk intelligence platform transforms insurance underwriting with
    AI and MongoDB Atlas, slashing costs by 30%**'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能驱动的风险智能平台通过人工智能和MongoDB Atlas改变保险承保，通过30%的成本削减**'
- en: An AI-powered risk intelligence platform helps insurance companies and underwriters
    build confidence in coverage decisions by providing real-time insights on individuals
    and businesses using AI. Powered by MongoDB Atlas, this platform analyzes vast
    amounts of public data to identify risks and opportunities for insurance underwriting,
    offering a comprehensive view of policyholder relationships and potential fraud
    indicators. The platform enables insurers to streamline **know your customer**
    (**KYC**) processes and enhance due diligence for complex commercial policies.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由人工智能驱动的风险智能平台通过使用人工智能为保险公司和承保人提供关于个人和企业的实时洞察，帮助他们建立对承保决策的信心。由MongoDB Atlas提供支持，该平台分析大量公共数据以识别保险承保的风险和机会，提供对保单持有人关系和潜在欺诈指标的全面视图。该平台使保险公司能够简化**了解你的客户**（**KYC**）流程，并增强复杂商业保单的尽职调查。
- en: 'This example has been anonymized for editorial clarity. To learn more, see:
    [https://mdb.link/building-trust-with-relationship-intelligence](https://mdb.link/building-trust-with-relationship-intelligence).'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 为了编辑清晰，此示例已被匿名化。了解更多信息，请参阅：[https://mdb.link/building-trust-with-relationship-intelligence](https://mdb.link/building-trust-with-relationship-intelligence)。
- en: '![](img/Spotlight_Icon.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon](img/Spotlight_Icon.png)'
- en: '**A leading AI-powered third-party cyber risk management platform accelerates
    vendor evaluation with AI**'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**领先的AI驱动的第三方网络安全风险管理平台通过AI加速供应商评估**'
- en: 'An AI-powered third-party cyber risk assessment platform enables insurance
    companies to evaluate cyber insurance applications and assess policyholder security
    postures in minutes. By leveraging MongoDB Atlas for efficient data storage and
    retrieval, this advanced AI platform can process vast amounts of cybersecurity
    information, delivering actionable underwriting insights in minutes. This streamlined
    approach significantly reduces policy evaluation time and enhances overall cyber
    insurance risk assessment accuracy. The platform uses sophisticated models and
    RAG techniques to provide highly accurate and contextually relevant intelligence
    for cyber insurance underwriters. This not only accelerates policy approval decisions
    but also ensures that insurance companies are equipped with the most precise cyber
    risk evaluations for premium pricing. Risk assessments generated from analysis
    are 80% faster than manual underwriting methods with no loss in accuracy.This
    example has been anonymized for editorial clarity. To learn more, see: [https://mdb.link/transforming-cyber-risk-intelligence](https://mdb.link/transforming-cyber-risk-intelligence).'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由AI驱动的第三方网络风险评估平台使保险公司能够在几分钟内评估网络保险申请并评估保单持有者的安全态势。通过利用MongoDB Atlas进行高效的数据存储和检索，这个先进的AI平台可以处理大量的网络安全信息，在几分钟内提供可操作的承保见解。这种简化的方法显著减少了政策评估时间，并提高了整体网络保险风险评估的准确性。该平台使用复杂的模型和RAG技术为网络保险承保人提供高度准确和上下文相关的情报。这不仅加速了政策批准决策，还确保保险公司拥有最精确的网络风险评估，以进行保费定价。从分析中生成的风险评估比手动承保方法快80%，且准确性不受损失。此示例已被匿名化以提高编辑清晰度。了解更多信息，请参阅：[https://mdb.link/transforming-cyber-risk-intelligence](https://mdb.link/transforming-cyber-risk-intelligence)。
- en: '![](img/Spotlight_Icon.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon.png](img/Spotlight_Icon.png)'
- en: These real-world examples demonstrate how insurance and related industries are
    already realizing significant business value from AI implementations. By studying
    these success stories, insurance organizations can identify patterns and approaches
    that might apply to their own underwriting challenges and risk assessment processes.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这些现实世界的示例展示了保险和相关行业如何从AI实施中获得显著的商业价值。通过研究这些成功案例，保险公司可以识别出可能适用于他们自己的承保挑战和风险评估流程的模式和方法。
- en: Practical AI use cases in insurance
  id: totrans-223
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保险领域的实用AI用例
- en: Having explored the architectural foundations and strategic approaches to AI
    implementation, let’s examine concrete examples that demonstrate these concepts
    in action. The following use cases showcase how insurance organizations are applying
    AI technologies to solve specific business challenges, providing practical blueprints
    that can guide similar implementations across the industry.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在探讨了AI实施的结构基础和战略方法之后，让我们来考察一些具体示例，这些示例展示了这些概念在实际中的应用。以下用例展示了保险公司如何应用AI技术来解决特定的业务挑战，提供可以指导整个行业类似实施的实用蓝图。
- en: Claim management using LLMs and Vector Search for RAG
  id: totrans-225
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用LLMs和向量搜索进行RAG的索赔管理
- en: By converting claim data into vector embeddings, MongoDB’s Atlas Vector Search
    accelerates information retrieval, making it quicker and easier to find relevant
    details. LLMs then analyze these embeddings to extract valuable insights and context,
    optimizing claim processing. This combined approach enhances accuracy, efficiency,
    and overall claims management.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将索赔数据转换为向量嵌入，MongoDB的Atlas Vector Search加速了信息检索，使其更快、更容易找到相关细节。LLMs随后分析这些嵌入以提取有价值的见解和上下文，优化索赔处理。这种结合方法提高了准确性、效率和整体索赔管理。
- en: '![](img/B34136_14_13.png)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![B34136_14_13.png](img/B34136_14_13.png)'
- en: 'Figure 14.13: Atlas Vector Search provides answers to user questions about
    insurance claims, including calculations and detailed claim examples'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.13：Atlas Vector Search为用户关于保险索赔的问题提供答案，包括计算和详细的索赔示例
- en: This interface demonstrates how MongoDB’s Atlas Vector Search enables natural
    language querying of insurance claims data. Users can ask questions such as `"For
    adverse weather-related claims, what is the average loss amount?"` and receive
    contextual answers with supporting claim examples, photos, and detailed loss information.
    The system combines vector embeddings with LLMs to provide accurate, evidence-based
    responses for claims analysis and management.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 此界面展示了MongoDB的Atlas Vector Search如何使保险索赔数据的自然语言查询成为可能。用户可以提出诸如“对于与恶劣天气相关的索赔，平均损失金额是多少？”等问题，并收到包含支持性索赔示例、照片和详细损失信息的上下文答案。该系统结合向量嵌入和LLMs（大型语言模型）来提供针对索赔分析和管理的准确、基于证据的响应。
- en: Learn more at [https://www.mongodb.com/solutions/solutions-library/claim-management-llms-vector-search](https://www.mongodb.com/solutions/solutions-library/claim-management-llms-vector-search).
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息请访问：[https://www.mongodb.com/solutions/solutions-library/claim-management-llms-vector-search](https://www.mongodb.com/solutions/solutions-library/claim-management-llms-vector-search).
- en: AI-enhanced claim adjustment for auto insurance
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强型汽车保险索赔调整
- en: By leveraging AI and vector image search, this solution automates auto insurance
    claim adjustments. Accident photos are compared to a database of past claims,
    significantly accelerating damage estimates while maintaining consistency throughout
    the claims process.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用人工智能和矢量图像搜索，此解决方案自动化了汽车保险索赔调整。事故照片与历史索赔数据库中的数据库进行比较，显著加快了损失估计的速度，同时在整个索赔过程中保持一致性。
- en: '![](img/B34136_14_14.png)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_14.png)'
- en: 'Figure 14.14: AI-enhanced auto insurance claim adjustment using vector image
    search'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.14：使用矢量图像搜索增强的汽车保险索赔调整
- en: This diagram illustrates an automated claim adjustment system where accident
    photos are processed through an embedding model to create vector representations,
    then searched against a collection of vectorized images in MongoDB Atlas. The
    system performs similarity matching to return the top 5 most similar damage images
    from historical claims, enabling rapid and consistent damage assessment.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了自动化索赔调整系统，其中事故照片通过嵌入模型处理以创建向量表示，然后与MongoDB Atlas中的向量化图像集合进行搜索。系统执行相似度匹配，返回来自历史索赔的最相似的5个损失图像，从而实现快速且一致的损失评估。
- en: "Learn more at [https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/insurance-image-search/](https://www.mongodb.com/docs/atlas/architecture/cur\uFEFF\
    rent/solutions-library/insurance-image-search/)."
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息请访问：[https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/insurance-image-search/](https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/insurance-image-search/).
- en: PDF search application with Vector Search and LLMs
  id: totrans-237
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于矢量搜索和LLMs的PDF搜索应用程序
- en: PDFs are traditionally hard to search, making it difficult for insurance workers
    to find information quickly. This solution converts PDFs into a searchable format
    using tools such as Superduper, allowing users to quickly retrieve information
    and streamline insurance work.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的PDF文件难以搜索，这使得保险工作人员难以快速找到信息。此解决方案使用Superduper等工具将PDF文件转换为可搜索的格式，使用户能够快速检索信息并简化保险工作流程。
- en: '![](img/B34136_14_15.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_14_15.png)'
- en: 'Figure 14.15: PDF search application pipeline with Vector Search and LLMs'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.15：使用矢量搜索和LLMs的PDF搜索应用程序管道
- en: 'This workflow diagram shows the process of converting PDFs into searchable
    content through a five-stage pipeline: data load, parent chunking, child chunking,
    vectorization using an embedding model, and storage in a database. The system
    breaks down PDF documents into hierarchical chunks, creates vector embeddings
    for semantic search capabilities, and stores both parent and child document structures
    to enable efficient retrieval and LLM-powered search functionality.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程图展示了通过五个阶段将PDF文件转换为可搜索内容的流程：数据加载、父块分割、子块分割、使用嵌入模型进行向量化，以及在数据库中存储。系统将PDF文档分解为分层块，为语义搜索创建向量嵌入，并存储父文档和子文档结构，以实现高效的检索和LLM驱动的搜索功能。
- en: 'Learn more here: [https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/pdf-search/](https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/pdf-search/).'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息请访问：[https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/pdf-search/](https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/pdf-search/).
- en: The future of AI in insurance
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保险领域人工智能的未来
- en: 'As AI technologies continue to mature, we’re seeing expansion into new and
    innovative use cases beyond current implementations:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的不断成熟，我们看到了其应用范围扩展到新的和创新的使用案例，而不仅仅是当前的实现：
- en: Predictive analytics for customer engagement
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户参与预测分析
- en: AI-powered predictive analytics can anticipate customer needs, preferences,
    and behaviors based on historical data and trends. By leveraging predictive models,
    insurers can identify at-risk customers, anticipate churn, and proactively engage
    with customers to prevent issues and enhance satisfaction.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 基于历史数据和趋势，人工智能驱动的预测分析可以预测客户的需求、偏好和行为。通过利用预测模型，保险公司可以识别风险客户，预测客户流失，并主动与客户互动，预防问题并提高满意度。
- en: These capabilities enable a shift from reactive to proactive customer engagement,
    improving customer retention, increasing lifetime value, and enabling more efficient
    allocation of customer service resources.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力使客户参与从被动转向主动，提高客户保留率、增加终身价值，并使客户服务资源的分配更加高效。
- en: Crop insurance and precision farming
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作物保险和精准农业
- en: AI is being used in agricultural insurance to assess crop health, predict yields,
    and mitigate risks associated with weather events and crop diseases. By combining
    satellite imagery, weather data, soil sensors, and historical yield information,
    AI systems can provide granular risk assessments at the field level, enabling
    insurers to offer customized policies that reflect the specific risk profile of
    each farming operation.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: AI正在农业保险中用于评估作物健康、预测产量以及减轻与天气事件和作物疾病相关的风险。通过结合卫星图像、天气数据、土壤传感器和历史产量信息，AI系统可以在田地级别提供细粒度的风险评估，使保险公司能够提供反映每个农业经营特定风险特征的定制政策。
- en: Predictive maintenance for property insurance
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 财产保险的预测性维护
- en: AI-powered predictive maintenance solutions, leveraging **Internet of Things**
    (**IoT**) sensors installed in buildings and infrastructure, are being used in
    property insurance to prevent losses and minimize damage to insured properties.
    These systems can detect early warning signs of equipment failure, water leaks,
    and electrical issues before they cause significant damage.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 利用安装在建筑和基础设施中的**物联网**（**IoT**）传感器提供的AI驱动的预测性维护解决方案，正在财产保险中用于防止损失并最小化保险财产的损害。这些系统可以在设备故障、水泄漏和电气问题造成重大损害之前检测到早期预警信号。
- en: Usage-based insurance (UBI) for commercial fleets
  id: totrans-252
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商用车队基于使用情况的保险（UBI）
- en: AI-enabled telematics devices installed in commercial vehicles collect data
    on driving behavior, including speed, acceleration, braking, and location. ML
    algorithms analyze this data to assess risk and determine insurance premiums,
    representing a fundamental shift from static risk assessments to dynamic pricing
    based on actual driving behavior.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 商用车辆中安装的AI赋能远程信息处理设备收集驾驶行为数据，包括速度、加速度、制动和位置。机器学习算法分析这些数据以评估风险并确定保险费率，这代表了从静态风险评估到基于实际驾驶行为的动态定价的根本转变。
- en: Insurance organizations that establish strong AI foundations today will be well
    positioned to capitalize on these emerging opportunities. The most successful
    organizations will view AI not as a standalone technology initiative but as a
    fundamental capability that transforms how they operate, serve customers, and
    manage risk.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 今天建立强大AI基础的保险公司将能够充分利用这些新兴机会。最成功的组织将把AI视为不仅仅是独立的技术项目，而是一种基本能力，它改变了他们的运营方式、客户服务和风险管理。
- en: 'For more information and resources, visit the *MongoDB for Insurance* page:
    [https://www.mongodb.com/solutions/industries/insurance](https://www.mongodb.com/solutions/industries/insurance).'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多信息和资源，请访问 *MongoDB for Insurance* 页面：[https://www.mongodb.com/solutions/industries/insurance](https://www.mongodb.com/solutions/industries/insurance)。
- en: Summary
  id: totrans-256
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored the strategic integration of AI within the insurance
    sector to drive meaningful business outcomes. It traced the evolution of data
    architectures from legacy systems to AI-ready infrastructures built on converged
    datastores, highlighting AI’s potential to transform data processing, particularly
    in managing unstructured data in claims management.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了保险行业内AI的战略整合，以推动有意义的业务成果。它追溯了数据架构从遗留系统到基于统一数据存储的AI就绪基础设施的演变，突出了AI在数据处理方面的潜力，特别是在管理索赔管理中的非结构化数据。
- en: The chapter covered a range of AI technologies, from traditional ML to generative
    and agent-based systems, showing how they enhance decision-making, automate processes,
    and improve efficiency across underwriting, claims, and customer experience. It
    demonstrated that successful AI implementation requires understanding business
    workflows first, recognizing the interplay between structured and unstructured
    data, and designing around root domain entities within a converged datastore approach.
    Most importantly, organizations must focus on delivering value through business
    applications rather than isolated AI experiments to move beyond experimentation
    and truly transform operations with measurable business value.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了从传统机器学习到生成式和基于代理的系统等一系列人工智能技术，展示了它们如何增强决策能力、自动化流程，并在承保、索赔和客户体验方面提高效率。它证明了成功的AI实施需要首先理解业务流程，认识到结构化和非结构化数据之间的相互作用，并在统一的数据存储方法中围绕根本领域实体进行设计。最重要的是，组织必须专注于通过业务应用来创造价值，而不是孤立的AI实验，以超越实验，真正通过可衡量的商业价值来转型运营。
- en: The following chapter shifts from strategic overview to focused implementation,
    examining how these architectural principles are applied in practice to transform
    underwriting processes from weeks-long quote cycles into real-time decisions.
    It outlines a 10-step AI pipeline automating the underwriting workflow and presents
    business impact metrics showing major improvements in turnaround time, cost efficiency,
    and underwriting capacity.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 以下章节从战略概述转向了专注的实施，探讨了这些架构原则如何在实践中应用，将承保流程从长达数周的报价周期转变为实时决策。它概述了一个10步骤的AI管道，自动化承保工作流程，并展示了业务影响指标，表明周转时间、成本效率和承保能力有了重大改进。
