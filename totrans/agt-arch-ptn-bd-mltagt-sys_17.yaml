    the documentation here: [https://ai.google.dev/gemini-api/docs/api-key](https://ai.google.dev/gemini-api/docs/api-key).'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google AI Studio API** **k****ey**: 您需要有效的 API 密钥才能访问代理示例中使用的 Gemini 模型。您可以通过遵循此处文档获取密钥：[https://ai.google.dev/gemini-api/docs/api-key](https://ai.google.dev/gemini-api/docs/api-key).'
- en: '**Python** **l****ibraries**: The examples rely on the `google-adk` library
