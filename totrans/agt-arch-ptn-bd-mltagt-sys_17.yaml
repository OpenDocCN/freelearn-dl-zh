  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google Colab**: 代码示例设计为在 Google Colab 笔记本中运行，该笔记本提供了一个免费、基于云的 Python 环境。示例轻量级，因此您不需要高性能的本地硬件；一个标准的网页浏览器就足够了。'
- en: '**Google AI Studio API** **k****ey**: You will need a valid API key to access
