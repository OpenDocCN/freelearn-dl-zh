  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '`ensemble_retriever`接受两个检索器，如何强调它们的权重，以及一个c值。c值被描述为添加到排名中的常数，控制着高排名项的重要性和对低排名项的考虑之间的平衡。默认值是60，但我将其设置为0。我们的函数中没有c参数，这会使比较结果变得困难！但如果你想要更多ID从底部浮上来，这可以是一个有用的参数。'
