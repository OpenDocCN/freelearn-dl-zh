  zh: 到目前为止，判断哪个版本更好有点主观，但当我们谈到RAG评估时，我们将在[*第9章*](B34736_09_ePub.xhtml#_idTextAnchor209)中介绍一个更客观的方法。同时，让我们看看一些突出的事情。我们的混合搜索版本似乎对不同倡议的覆盖范围更广。
- en: 'This is the hybrid search approach:'
