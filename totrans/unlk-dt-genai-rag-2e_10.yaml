  zh: 这使我能够在元数据中将密集文档标记为`"dense"`来源，稀疏文档标记为`"sparse"`来源。我们将这些传递到最终结果中，并可以使用它来显示每个文档的来源。尽管如此，这种方法不如我们自定义函数中使用的方法有效，因为当内容来自两个来源时，它不会同时指示两个来源。这突出了创建我们自己的函数的优势。
- en: 'We then want to add our new type of retriever, `EnsembleRetriever`, which we
