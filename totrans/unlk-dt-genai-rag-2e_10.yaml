    is a better approach from this small example. The reality is that everything you
    do will need consideration, and you will have to decide for yourself what works
    in your situation.
  prefs: []
  type: TYPE_NORMAL
- en: If hybrid search is important, you may want to consider a vector database or
    vector search service that gives you more features and flexibility in defining
    your hybrid search. LangChain provides weights that allow you to emphasize one
