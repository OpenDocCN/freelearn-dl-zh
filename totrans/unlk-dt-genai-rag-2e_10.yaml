  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了RAG管道使用混合搜索的代码更改。但我们添加了所有这些额外的元数据，我们希望在输出和分析中显示。自己构建这个函数的额外好处是，它让我们能够打印出通常在使用LangChain的`EnsembleRetriever`检索器机制时无法看到的信息。让我们利用这个机会，替换我们调用RAG管道的单元格。而不是使用过去代码实验室中的最终代码，当处理我们的RAG管道时，使用以下代码：
