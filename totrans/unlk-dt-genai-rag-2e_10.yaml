- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Similarity Searching with Vectors
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于向量的相似性搜索
- en: 'This chapter is all about the **R** or **retrieval** part of **retrieval-augmented
    generation** (**RAG**). Specifically, we are going to talk about four areas related
    to similarity searches: **indexing**, **distance metrics**, **similarity algorithms**,
    and **vector search services**. With this in mind, in this chapter, we will cover
    the following:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章全部关于**R**或**检索**部分，即**检索增强生成**（**RAG**）。具体来说，我们将讨论与相似性搜索相关的四个领域：**索引**、**距离度量**、**相似性算法**和**向量搜索服务**。考虑到这一点，在本章中，我们将涵盖以下内容：
- en: Distance metrics versus similarity algorithms versus vector search
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 距离度量与相似性算法与向量搜索
- en: Vector space
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向量空间
- en: Semantic versus keyword search
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语义搜索与关键词搜索
- en: Code lab 8.1 – semantic distance metrics
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 8.1 – 语义距离度量
- en: Different search paradigms – sparse, dense, and hybrid
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的搜索范式 – 稀疏、密集和混合
- en: Code lab 8.2 – hybrid search with a custom function
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 8.2 – 使用自定义函数进行混合搜索
- en: Code lab 8.3 – hybrid search with LangChain’s `EnsembleRetriever` retriever
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 8.3 – 使用 LangChain 的 `EnsembleRetriever` 检索器进行混合搜索
- en: Semantic search algorithms such as k-NN and ANN
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 诸如 k-NN 和 ANN 之类的语义搜索算法
- en: Indexing techniques that enhance ANN search efficiency
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高 ANN 搜索效率的索引技术
- en: Vector search options
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向量搜索选项
- en: By the end of this chapter, you should have a comprehensive understanding of
    how vector-based similarity searching operates and why it’s instrumental for the
    retrieval component in RAG systems.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你应该对基于向量的相似性搜索操作有一个全面的理解，以及为什么它在 RAG 系统的检索组件中是至关重要的。
- en: Technical requirements
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08).'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码放置在以下 GitHub 仓库中：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08)。
- en: Individual filenames for each code lab are mentioned in the respective sections.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代码实验室的单独文件名在相应的章节中提及。
- en: Distance metrics versus similarity algorithms versus vector search
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 距离度量与相似性算法与向量搜索
- en: 'First, let’s discuss the difference between distance metrics, similarity algorithms,
    and vector search. A similarity algorithm can use different distance metrics,
    whereas a vector search can use different similarity algorithms. They are all
    different concepts that ultimately form the retrieval component of your RAG system.
    It is important to make the distinction between these concepts serving different
    purposes if you are going to understand how to properly implement and optimize
    your retrieval solution. You can think of this as a hierarchy, as shown in *Figure
    8.1*:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们讨论距离度量、相似性算法和向量搜索之间的区别。相似性算法可以使用不同的距离度量，而向量搜索可以使用不同的相似性算法。它们都是不同的概念，最终构成了你的
    RAG 系统的检索组件。如果你打算正确实施和优化你的检索解决方案，区分这些服务于不同目的的概念非常重要。你可以将其视为一个层次结构，如图 *图 8.1* 所示：
- en: '![Figure 8.1 – Vector search, similarity algorithm, and distance metric hierarchy
    with two options each](img/B34736_08_1.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.1 – 向量搜索、相似性算法和距离度量层次结构，每个选项有两个](img/B34736_08_1.png)'
- en: Figure 8.1 – Vector search, similarity algorithm, and distance metric hierarchy
    with two options each
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 – 向量搜索、相似性算法和距离度量层次结构，每个选项有两个
- en: In *Figure 8.1*, we are only demonstrating two options for each, where each
    vector search has two different options for similarity algorithms, and then each
    similarity algorithm has two different options for distance metrics. In reality,
    though, there are many more options at each level.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *图 8.1* 中，我们只展示了每个选项的两个选项，其中每个向量搜索都有两种不同的相似性算法，然后每个相似性算法都有两种不同的距离度量选项。然而，实际上在每个层面上都有更多的选项。
- en: The key point here is that these terms are often used interchangeably or together
    as if they are the same thing, but they are very different parts of the overall
    similarity search mechanism. If you make the mistake of confusing them, it makes
    it much more difficult to understand the overall concepts behind similarity search.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点在于，这些术语通常被互换使用或一起使用，好像它们是同一件事，但实际上它们是整体相似性搜索机制中非常不同的部分。如果你混淆了它们，这将使理解相似性搜索背后的整体概念变得更加困难。
- en: 'Now that we have cleared that up, we will talk about another concept that can
    help you understand the underpinnings of how similarity search works: the vector
    space.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经澄清了这一点，我们将讨论另一个可以帮助你理解相似性搜索工作原理基础的概念：向量空间。
- en: Vector space
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 向量空间
- en: The concept of a **vector space** is highly related to the vector similarity
    search, as the search is conducted within the vector space represented by the
    vectors. Technically, a vector space is a mathematical construct that represents
    a collection of vectors in a high-dimensional space. The dimensions of the vector
    space correspond to the number of features or attributes associated with each
    vector. In this space, the vectors of text that are most similar have more similar
    embeddings and, therefore, are located closer to each other in the space. You
    will hear the concept of vector space referred to often when talking in more technical
    ways about similarity searches. Other common names for this *space* are **embedding
    space** and **latent space**.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**向量空间**的概念与向量相似性搜索高度相关，因为搜索是在由向量表示的向量空间内进行的。技术上讲，向量空间是一个数学结构，它表示一个高维空间中向量的集合。向量空间的维度对应于与每个向量关联的特征或属性的数量。在这个空间中，最相似的文字向量具有更相似的嵌入，因此它们在空间中彼此更接近。当以更技术性的方式讨论相似性搜索时，你经常会听到向量空间的概念。这个“空间”的其他常见名称是**嵌入空间**和**潜在空间**。'
- en: 'The concept of vector space can be helpful in visualizing how the distance
    algorithms that find the nearest vectors to our user query embedding are working.
    Using *Figure 8.2* as a reference, and ignoring the fact that these vectors are
    sometimes thousands of dimensions, we can picture them in a 2D space with its
    outer limits defined by the vectors in them, and the data points representing
    each of those vectors (see *Figure 8.2*). There are little clusters of data points
    (small dots) in various places representing semantic similarities across the different
    data points. When a search happens, a new query (X) appears in this imaginary
    space based on the user query vector dimensions, and the data points (little dots)
    that are closest to that query (X) are going to be the results of our retriever-orchestrated
    similarity search. We take all of the data points (small dots) that we are going
    to retrieve in the search result, and we turn them into query results (large dots):'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 向量空间的概念有助于可视化寻找与用户查询嵌入最近的向量的距离算法是如何工作的。以*图8.2*为参考，并忽略这些向量有时是数千维的事实，我们可以在一个二维空间中想象它们，其外限由其中的向量定义，数据点代表每个向量（参见*图8.2*）。在各个位置有代表不同数据点语义相似性的小数据点（小圆点）的簇。当发生搜索时，一个新的查询（X）根据用户查询向量的维度出现在这个想象空间中，最接近该查询（X）的数据点（小圆点）将成为我们检索器执行的相似性搜索的结果。我们取搜索结果中将要检索的所有数据点（小圆点），并将它们转换为查询结果（大圆点）：
- en: '![Figure 8.2 – 2D representation of embeddings in a vector space, with X representing
    a query and large dots representing the closest embeddings from the dataset](img/B34736_08_2.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2 – 在向量空间中嵌入的二维表示，其中X代表查询，大圆点代表数据集中最近的嵌入](img/B34736_08_2.png)'
- en: Figure 8.2 – 2D representation of embeddings in a vector space, with X representing
    a query and large dots representing the closest embeddings from the dataset
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 – 在向量空间中嵌入的二维表示，其中X代表查询，大圆点代表数据集中最近的嵌入
- en: Let’s talk through what we see here. There are four results from the query (the
    large dots). From our vantage point, in this 2D space, it looks like there are
    data points (small dots) that are closer to the query (X) than the query results
    (large dots). Why is that? You may remember that these dots were originally in
    a 1,536-dimensional space. So, if you imagine just adding one more dimension (height),
    where the dots spread toward you right out of this page, those query results (large
    dots) may actually be closer because they are all much higher than the data points
    (small dots) that seem closer. Looking straight down at them, some data points
    (small dots) may appear closer, but it is a mathematical certainty that the query
    results (large dots) are the closer ones when taking all dimensions into account.
    Expand your space to all 1,536 dimensions, and this situation becomes even more
    likely. Nevertheless, this figure can be very helpful in visualizing a vector
    space.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看这里的情况。查询结果（大圆点）有四个。从我们的视角来看，在这个二维空间中，看起来有一些数据点（小圆点）比查询结果（大圆点）更接近查询（X）。为什么是这样呢？你们可能还记得这些点最初是在一个1,536维的空间中。所以，如果你想象一下仅仅增加一个维度（高度），这些点就会从这个页面中向外扩散，那么查询结果（大圆点）实际上可能更接近，因为它们都远远高于那些看似更接近的数据点（小圆点）。直接从上面看它们，一些数据点（小圆点）可能看起来更近，但数学上可以确定，当考虑到所有维度时，查询结果（大圆点）才是更接近的。将你的空间扩展到所有1,536个维度，这种情况就更加可能了。尽管如此，这个图在可视化向量空间方面非常有帮助。
- en: Semantic versus keyword search
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 语义搜索与关键词搜索
- en: As we’ve already said many times, vectors capture the meaning behind our data
    in a mathematical representation. To find data points similar in meaning to a
    user query, we can search for and retrieve the closest objects in a vector space
    such as the one we just showed. This is known as **semantic** or **vector search**.
    A semantic search, as opposed to keyword matching, searches for documents that
    have similar semantic meaning, rather than just the same words. As humans, we
    can say the same or similar things in so many different ways! Semantic search
    can capture that aspect of our language because it assigns similar mathematical
    values to similar concepts, whereas keyword search focuses on specific word matching
    and often misses similar semantic meanings partially or entirely.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前已经多次说过的，向量以数学形式捕捉我们数据背后的意义。为了找到与用户查询在意义上相似的数据点，我们可以在向量空间中搜索和检索最接近的对象，就像我们刚刚展示的那样。这被称为**语义**或**向量搜索**。与关键词匹配相比，语义搜索寻找具有相似语义意义的文档，而不仅仅是相同的单词。作为人类，我们可以用许多不同的方式说出相同或相似的事情！语义搜索可以捕捉我们语言中的这一方面，因为它为相似的概念分配相似的数学值，而关键词搜索则侧重于特定的单词匹配，并且常常部分或完全错过相似的语义意义。
- en: From a technical standpoint, semantic search utilizes the meaning of the documents
    we have vectorized – that is, mathematically embedded in the vector that represents
    it. For math enthusiasts, you have to recognize the beauty of using a mathematical
    solution to solve linguistic challenges!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术角度来看，语义搜索利用了我们矢量化文档的意义——也就是说，数学地嵌入到代表它的向量中。对于数学爱好者来说，你们必须认识到使用数学解决方案来解决语言挑战的美丽之处！
- en: Let’s walk through an example to highlight how semantic search works.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个例子来了解一下语义搜索是如何工作的。
- en: Semantic search example
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语义搜索示例
- en: 'Think of a simple example of semantic similarity, such as a review of a blanket
    product online where one customer says the following:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 想想一个简单的语义相似性例子，比如在线对毯子产品的评论，其中一位客户说以下内容：
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Another customer says this:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一位客户说：
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'While they are saying relatively similar things semantically, a keyword search
    would not grade this nearly as similar as a semantic search would. Here, we introduce
    a third sentence representing a random comment online for comparison:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它们在语义上说的是相对相似的事情，但关键词搜索不会像语义搜索那样认为它们几乎一样相似。在这里，我们引入第三个句子，代表一个在线随机评论，以进行比较：
- en: '[PRE2]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The semantics of this random online comment are considered quite different from
    either of the last two sentences. But let’s not take my word for it, let’s do
    the math in a notebook! In the following code, we will review some of the most
    common distance metrics used as a foundational element of semantic search.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这个随机在线评论的语义被认为与最后两个句子中的任何一个都相当不同。但不要只听我的话，让我们在笔记本上做数学题！在下面的代码中，我们将回顾一些作为语义搜索基础元素的常用距离度量。
- en: Code lab 8.1 – semantic distance metrics
  id: totrans-42
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室8.1 – 语义距离度量
- en: The file you need to access from the GitHub repository is titled `CHAPTER8-1_DISTANCEMETRICS.ipynb`.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要从GitHub仓库访问的文件标题为 `CHAPTER8-1_DISTANCEMETRICS.ipynb`。
- en: Our first code lab in this chapter will focus on the different ways you can
    calculate the distance between vectors, giving you a hands-on view of the difference
    between each of these approaches. We will use a brand new notebook called `CHAPTER8-1_DISTANCEMETRICS.ipynb`
    that has separate code from what we have used up to this point. We will install
    and import the packages we need, create the embeddings for the sentences we discussed,
    and then step through three types of distance metric formulas that are very common
    in NLP, generative AI, and RAG systems.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一个代码实验室将专注于您计算向量之间距离的不同方法，让您亲身体验每种方法的差异。我们将使用一个全新的笔记本 `CHAPTER8-1_DISTANCEMETRICS.ipynb`，其中包含与我们之前使用的代码不同的代码。我们将安装并导入所需的包，为讨论的句子创建嵌入，然后逐步介绍三种在自然语言处理（NLP）、生成式人工智能（generative
    AI）和RAG系统中非常常见的距离度量公式。
- en: 'We first install the open source `sentence_transformers` library that will
    set up our embedding algorithm:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先安装开源的 `sentence_transformers` 库，这将设置我们的嵌入算法：
- en: '[PRE3]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The `sentence_transformers` package provides an easy way to compute dense vector
    representations for sentences and paragraphs. Next, we import some select packages
    that will aid our efforts to measure distance:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '`sentence_transformers` 包提供了一种简单的方法来计算句子和段落的密集向量表示。接下来，我们导入一些有助于我们测量距离的精选包：'
- en: '[PRE4]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here, we add the popular NumPy library, which will provide the mathematical
    operations we need to perform our analysis of distances. As mentioned previously,
    `sentence_transformers` is imported so that we can create dense vector representations
    for our text. This will give us the ability to create instances of a pretrained
    embedding model.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们添加了流行的NumPy库，它将提供我们进行距离分析所需的数学运算。如前所述，导入 `sentence_transformers` 以便我们可以为我们的文本创建密集向量表示。这将使我们能够创建预训练嵌入模型的实例。
- en: 'In this next line, we define the transformer model we want to use:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一行，我们定义了我们想要使用的转换器模型：
- en: '[PRE5]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This `'paraphrase-MiniLM-L6-v2'` model is one of the smaller models available
    through this package, which will hopefully make it more compatible across more
    computer environments that you may be using this code on. If you want something
    more powerful, try the `'all-mpnet-base-v2'` model, where the semantic search
    performance scores around 50% higher.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 `'paraphrase-MiniLM-L6-v2'` 模型是此包中可用的较小模型之一，希望它能与您可能在此代码上使用的更多计算机环境更加兼容。如果您需要更强大的模型，请尝试
    `'all-mpnet-base-v2'` 模型，其语义搜索性能评分大约高出50%。
- en: 'We will take the sentences we mentioned previously and add them to a list we
    can reference in our code:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把之前提到的句子添加到一个列表中，以便在代码中引用：
- en: '[PRE6]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'We then encode the sentences using our `SentenceTransformer` model:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们使用 `SentenceTransformer` 模型对句子进行编码：
- en: '[PRE7]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'The `model.encode` function takes a list of strings and converts them into
    a list of embeddings. Our output shows us the mathematical representations (vectors)
    of our sentences:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '`model.encode` 函数接受一个字符串列表，并将它们转换为嵌入列表。我们的输出显示了句子数学表示（向量）：'
- en: '[PRE8]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: You’ll notice `(3, 384)` coming from the `embedding.shape` function. Do you
    remember what that is telling us? It says we have three vectors, all of which
    are 384 dimensions. So, now we know this particular `SentenceTransformer` model
    provides vectors in `384D`!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 您会注意到来自 `embedding.shape` 函数的 `(3, 384)`。您还记得那是什么意思吗？它告诉我们我们有三个向量，它们的维度都是384。所以，现在我们知道这个特定的
    `SentenceTransformer` 模型提供的是 `384D` 向量！
- en: '**Fun fact**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**'
- en: You may be wondering whether you can use the `sentence_transformers` library
    to generate embeddings for your RAG vector store, as we have been doing with OpenAI’s
    embedding API. The answer is a resounding yes! This is a free alternative to using
    OpenAI’s embeddings API. The all-`mpnet-base-v2` model achieves a score of approximately
    57.8% on the MTEB leaderboard, while OpenAI’s `text-embedding-ada-002` model scores
    around 61.0%, and their text-embedding-3-large model (released in January 2024)
    achieves approximately 64.6% on MTEB. As of 2025, models such as NVIDIA’s NV-Embed-v2
    and Alibaba’s `gte-Qwen2-7B-instruct` lead the MTEB leaderboard, with NV-Embed
    achieving a score of 69.32%. It’s important to note that the embedding model landscape
    has evolved rapidly, with most prominent vendors releasing new flagship models
    in late 2024 or early 2025\. The MTEB leaderboard itself has faced criticism,
    as some newer models may be overfitting to benchmark datasets by training on similar
    data, and static benchmark scores don’t always reflect real-world performance.
    Independent benchmarks show that higher-priced models don’t necessarily achieve
    better accuracy, with some models, such as Mistral-embed, achieving 77.8% accuracy
    compared to lower scores from OpenAI’s text-embedding-3-large model in certain
    retrieval tasks.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能想知道是否可以使用`sentence_transformers`库为您存储的RAG向量生成嵌入，就像我们使用OpenAI的嵌入API所做的那样。答案是响亮的肯定！这是使用OpenAI嵌入API的免费替代方案。所有`mpnet-base-v2`模型在MTEB排行榜上的得分约为57.8%，而OpenAI的`text-embedding-ada-002`模型得分约为61.0%，他们于2024年1月发布的`text-embedding-3-large`模型在MTEB上的得分约为64.6%。截至2025年，如NVIDIA的NV-Embed-v2和阿里巴巴的`gte-Qwen2-7B-instruct`等模型在MTEB排行榜上领先，NV-Embed的得分为69.32%。值得注意的是，嵌入模型领域已经迅速发展，大多数主要供应商在2024年底或2025年初发布了新的旗舰模型。MTEB排行榜本身也受到了批评，因为一些较新的模型可能通过在类似数据上训练而过度拟合到基准数据集，并且静态基准分数并不总是反映实际性能。独立基准测试表明，更高价格的模型并不一定实现更好的准确性，一些模型，如Mistral-embed，在某些检索任务中的准确率达到了77.8%，而OpenAI的`text-embedding-3-large`模型在某些任务中的得分较低。
- en: You can also fine-tune these models with your own data and potentially make
    it more effective for your RAG system than any paid API embedding service. Finally,
    for any API service, you are reliant on it being available, which is not always
    the case. Using the `sentence_transformers` model locally makes it always available
    and 100% reliable. Take a look at MTEB to find even better models that you can
    download and use in a similar way.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用自己的数据对这些模型进行微调，并可能使其比任何付费的API嵌入服务对您的RAG系统更有效。最后，对于任何API服务，您都依赖于它的可用性，而这并不总是如此。使用本地的`sentence_transformers`模型使其始终可用且100%可靠。查看MTEB以找到更好的模型，您可以通过类似的方式下载和使用。
- en: Okay, we now have an environment for us to start exploring distance measures.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们现在有一个环境可以开始探索距离度量。
- en: There are many ways to calculate the distance between vectors. Euclidean distance
    (L2), dot product, and cosine distance are the most common distance metrics used
    in NLP.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 计算向量之间距离的方法有很多。欧几里得距离（L2）、点积和余弦距离是NLP中最常用的距离度量。
- en: Let’s start with **Euclidean** **distance** (**L2**).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从**欧几里得** **距离**（**L2**）开始。
- en: Euclidean distance (L2)
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欧几里得距离（L2）
- en: 'Euclidean distance calculates the shortest distance between two vectors. When
    using this to score the distance, keep in mind that we are looking for what is
    closer, so a lower value indicates higher similarity (closeness in distance).
    Let us calculate the Euclidean distance between two vectors:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离计算两个向量之间的最短距离。当使用此方法评分距离时，请记住我们正在寻找更接近的，因此较低值表示更高的相似度（距离上的接近）。让我们计算两个向量之间的欧几里得距离：
- en: '[PRE9]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: In this function, we are calculating the Euclidean distance between two vectors,
    `vec1` and `vec2`. We first perform element-wise subtraction between the two vectors,
    and then we use NumPy’s `linalg.norm()` function to calculate the Euclidean norm
    (also known as L2 norm) of the vector. This function takes the square root of
    the sum of the squares of the vector elements. Combined, these give us the Euclidean
    distance between the two vectors.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个函数中，我们正在计算两个向量`vec1`和`vec2`之间的欧几里得距离。我们首先对两个向量进行逐元素减法，然后使用NumPy的`linalg.norm()`函数计算向量的欧几里得范数（也称为L2范数）。此函数计算向量元素平方和的平方根。结合这些，我们得到两个向量之间的欧几里得距离。
- en: 'We call this function here for each of the embeddings:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里为每个嵌入调用此函数：
- en: '[PRE10]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Running this cell gives us this output:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此单元格会给出以下输出：
- en: '[PRE11]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Take a moment and look around you for the closest *thing* to you. Then, look
    for something further away. The thing that is closest to you is measured in a
    smaller distance. One foot is closer than two feet, so in this case, when you
    want it to be closer, 1 is a better score than 2\. When it comes to distance in
    semantic search, closer means it is more similar. For these results, we want to
    see a lower score to say it is more similar. `Review 1` and `Review 2` have a
    Euclidean distance of 4.6202903\. Both reviews are significantly further from
    `Random Comment`. This shows how math is used to determine how semantically similar
    or dissimilar these texts are. But as with most things in data science, we have
    several options for how to calculate these distances. Let’s take a look at another
    approach: **dot product**.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 抽空环顾四周，找到离你最近的东西。然后，寻找离你更远的东西。离你最近的东西测量的距离更小。一英尺比两英尺近，所以在这种情况下，当你想要它更近时，1比2更好。当谈到语义搜索中的距离时，更近意味着更相似。对于这些结果，我们希望看到更低的分数来说明它更相似。`Review
    1` 和 `Review 2` 的欧几里得距离为 4.6202903。这两个评论都显著地远离 `Random Comment`。这显示了数学是如何用来确定这些文本在语义上相似或不同。但就像数据科学中的大多数事情一样，我们有几种计算这些距离的方法。让我们看看另一种方法：**点积**。
- en: Dot product (also called inner product)
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 点积（也称为内积）
- en: 'The dot product is not technically a distance metric, as it measures the magnitude
    of the projection of one vector onto the other, which indicates similarity rather
    than distance. However, it is a metric used for similar purposes as the other
    metrics mentioned here. Since we are talking about magnitude and not closeness,
    a higher positive dot product value indicates more similarity. And so, as the
    value goes lower, or even negative, this indicates less similarity. Here, we will
    print out the dot product of each of our text strings:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 点积在技术上不是一个距离度量，因为它衡量的是一个向量在另一个向量上的投影的大小，这表明的是相似性而不是距离。然而，它是一种与其他提到的度量具有相似目的的度量。由于我们谈论的是大小而不是接近程度，更高的正点积值表示更大的相似性。因此，随着值的降低，甚至变为负值，这表明相似性更小。在这里，我们将打印出我们每个文本字符串的点积：
- en: '[PRE12]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In this code, we are using a NumPy function that does all the dot product computations
    for us. The output is as follows:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码中，我们使用了一个NumPy函数，它为我们完成了所有的点积计算。输出如下：
- en: '[PRE13]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: In our first comparison, `Review 1` and `Review 2`, we see a score of `12.270497`.
    The positive magnitude of the dot product (12.270497) suggests a relatively high
    similarity between `Review 1` and `Review 2`. When we compare Review 1 with Random
    Comment, we see a score of -0.7654616, and `Review 2` versus `Random Comment`
    gives us a `0.95240986` dot product. These low and negative values indicate that
    there is dissimilarity or misalignment between the two vectors. These scores tell
    us that `Review 1` and `Review 2` are more similar to each other compared to their
    similarity with `Random Comment`.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的第一次比较中，`Review 1` 和 `Review 2`，我们看到得分为 `12.270497`。点积的正幅度（12.270497）表明 `Review
    1` 和 `Review 2` 之间有相对较高的相似性。当我们比较 `Review 1` 与随机评论时，我们看到得分为 -0.7654616，而 `Review
    2` 与随机评论的比较给出了 `0.95240986` 的点积。这些低值和负值表明两个向量之间存在不相似或错位。这些分数告诉我们，`Review 1` 和
    `Review 2` 相比于与 `Random Comment` 的相似性，彼此之间更相似。
- en: 'Let’s look at our last distance metric: **cosine distance**.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看我们最后的距离度量：**余弦距离**。
- en: Cosine distance
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 余弦距离
- en: 'Cosine distance measures the difference in directionality between the vectors.
    Given that this is another distance metric, we consider a lower value to indicate
    closer, more similar vectors. First, we set up a function to calculate the cosine
    distance between two vectors:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 余弦距离衡量向量之间的方向性差异。鉴于这是另一个距离度量，我们认为较低的值表示更接近、更相似的向量。首先，我们设置一个函数来计算两个向量之间的余弦距离：
- en: '[PRE14]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Notice that the formula for cosine distance contains elements from both of
    our previous metrics. First, we use `np.dot(vec1, vec2)` to calculate the dot
    product between the two vectors. Then, we divide by the product of the magnitudes,
    using the same NumPy function we used for Euclidean distance to calculate the
    Euclidean norm. In this case, though, we are calculating the Euclidean norm of
    each of the vectors (rather than the difference between the vectors as we did
    with Euclidean distance) and then multiplying them. Combined, we get the cosine
    similarity, which is then subtracted as an absolute value from 1 to get the cosine
    distance. Here, we call this function:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到余弦距离的公式包含了我们之前提到的两个度量中的元素。首先，我们使用`np.dot(vec1, vec2)`来计算两个向量之间的点积。然后，我们除以这两个向量模量的乘积，使用与计算欧几里得距离相同的NumPy函数来计算欧几里得范数。在这种情况下，我们计算的是每个向量的欧几里得范数（而不是像欧几里得距离那样计算向量之间的差异），然后相乘。结合这些，我们得到余弦相似度，然后从1中减去这个绝对值以得到余弦距离。在这里，我们调用这个函数：
- en: '[PRE15]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'And this is what we see in the output:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们看到的输出：
- en: '[PRE16]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Just like with Euclidean distance, a lower distance value means closer, which
    means more similar. Once again, the value measuring the distance between the two
    reviews indicates much closer and similar semantics compared to either of the
    reviews and the random comment. However, it should be noted that `0.4523802399635315`
    suggests more of a moderate similarity between `Review 1` and `Review 2`. But
    the other two scores, `1.0295443572103977` and `0.9542623348534107`, indicate
    a high dissimilarity between the vectors.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 就像欧几里得距离一样，距离值越低表示越接近，这意味着越相似。再次强调，衡量两个评论之间距离的值表明，与任何一个评论或随机评论相比，这两个评论的语义和相似度更加接近。然而，需要注意的是，`0.4523802399635315`这个值表明`Review
    1`和`Review 2`之间的相似度更偏向于中等。但其他两个评分，`1.0295443572103977`和`0.9542623348534107`，则表明向量之间的高度不相似。
- en: From a mathematical standpoint, this indicates that “Taylor Swift” is not the
    semantic equivalent of a warm blanket!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学的角度来看，这表明“泰勒·斯威夫特”并不是温暖毯子的语义等价物！
- en: Keep in mind that there are many other distance metrics and similarity scores
    you can use for text embeddings, including **Lin similarity**, **Jaccard similarity**,
    **Hamming distance**, **Manhattan distance**, and **Levenshtein distance**. However,
    the three metrics listed previously are the most commonly used for NLP and should
    give you a good start in understanding how these metrics are calculated.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，你可以使用许多其他距离度量相似度分数来对文本嵌入进行评分，包括**Lin相似度**、**Jaccard相似度**、**汉明距离**、**曼哈顿距离**和**Levenshtein距离**。然而，前面列出的三个度量在NLP中是最常用的，应该能帮助你理解这些度量是如何计算的。
- en: Up to this point, we have discussed dense vectors, which represent semantic
    meaning, but not all models represent semantic meaning. Some are literally just
    a count of words in the data we provide to it. These vectors are called sparse
    vectors. Let’s talk about the differences between these types of vectors and how
    we can use those differences to our advantage in RAG.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们讨论了密集向量，它们代表语义意义，但并非所有模型都代表语义意义。有些模型实际上只是对我们提供的数据中的单词计数。这些向量被称为稀疏向量。让我们来谈谈这些类型向量之间的差异，以及我们如何在RAG中利用这些差异来获得优势。
- en: Different search paradigms – sparse, dense, and hybrid
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不同的搜索范式——稀疏、密集和混合
- en: There are different types of vectors, and this difference is important to this
    discussion because you need to use different types of vector searches, depending
    on the type of vector you are searching. Let’s talk in depth about the differences
    between these types of vectors.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 有不同类型的向量，这种差异对于这次讨论很重要，因为你需要根据你搜索的向量类型使用不同类型的向量搜索。让我们深入探讨这些类型向量之间的差异。
- en: Dense search
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 密集搜索
- en: '**Dense search** (semantic search) uses a vector embedding representation of
    data to perform search. As we have talked about previously, this type of search
    allows you to capture and return semantically similar objects. It relies on the
    meaning of the data in order to perform that query. This sounds great in theory,
    but there are some limitations. If the model we are using were trained on a completely
    different domain, the accuracy of our queries would be poor. It is very dependent
    on the data it was trained on.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**密集搜索**（语义搜索）使用数据的向量嵌入表示来执行搜索。正如我们之前所讨论的，这种搜索类型允许你捕获并返回语义相似的对象。它依赖于数据的意义来执行查询。在理论上这听起来很棒，但也有一些局限性。如果我们使用的模型是在一个完全不同的领域上训练的，那么我们查询的准确性将会很差。它非常依赖于其训练的数据。'
- en: Searching for data that is a reference to something (such as serial numbers,
    codes, IDs, and even people’s names) will also yield poor results. This is because
    there isn’t a lot of meaning in text like this, so no meaning is captured in the
    embeddings, and no meaning can be used to compare embeddings. When searching for
    specific references like that, it is better for string or word matching. We call
    this type of search a keyword search or sparse search, and we will discuss this
    next.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索指向某物（如序列号、代码、ID甚至人名）的数据也会产生较差的结果。这是因为这种文本没有太多意义，所以嵌入中没有捕捉到任何意义，也无法用于比较嵌入。当搜索这类特定引用时，使用字符串或单词匹配会更好。我们称这种类型的搜索为关键词搜索或稀疏搜索，我们将在下一节中讨论这一点。
- en: Sparse search
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稀疏搜索
- en: '**Sparse search** allows you to utilize keyword matching across all of your
    content. It is called **sparse embedding** because text is embedded into vectors
    by counting how many times every unique word in your vocabulary occurs in the
    query and the stored sentences. This vector has mostly zeros because the likelihood
    of any given sentence containing every word in your vocabulary is low. In mathematical
    terms, if an embedding contains mostly zeros, it is considered sparse.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**稀疏搜索**允许你在所有内容中利用关键词匹配。它被称为**稀疏嵌入**，因为文本通过计算你的词汇表中每个唯一单词在查询和存储句子中出现的次数来嵌入到向量中。这个向量大部分是零，因为任何给定句子包含你词汇表中所有单词的可能性很低。从数学的角度来看，如果一个嵌入包含大部分零，它被认为是稀疏的。'
- en: One example could be using a **bag of words**. A bag-of-words approach is where
    you count how many times a word occurs in the query and the data vector, and then
    return objects with the highest matching word frequency. This is the easiest way
    to do keyword matching.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子可能是使用**词袋模型**。词袋方法是指计算查询和数据向量中每个单词出现的次数，然后返回匹配词频率最高的对象。这是进行关键词匹配的最简单方法。
- en: A good example of a keyword-based algorithm is the **Best Matching 25** (**BM25**)
    algorithm. This very popular model performs really well when it comes to searching
    across many keywords. The idea behind BM25 is that it counts the number of words
    within the phrase that you are passing in, and then those that appear more than
    often are weighted as less important when the match occurs. Words that are rare
    will score much higher. Does this concept sound familiar? It uses TF-IDF, one
    of the models we reviewed in the last chapter!
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词算法的一个好例子是**最佳匹配25**（**BM25**）算法。这个非常流行的模型在搜索多个关键词时表现非常出色。BM25背后的理念是计算你传递的短语中的单词数量，然后当匹配发生时，那些出现频率较高的单词被赋予较低的权重，而罕见的单词得分会更高。这个概念听起来熟悉吗？它使用了我们在上一章中讨论过的TF-IDF模型之一！
- en: 'Having these two options brings up a challenging question, though: which one
    do we use? What if we need semantic matching and keyword matching? The great news
    is we do not have to choose; we can use both in what is called **hybrid searching**!
    We will review that concept next.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有两个选项，但这提出了一个挑战性的问题：我们该用哪一个？如果我们需要语义匹配和关键词匹配怎么办？好消息是，我们不必选择；我们可以在所谓的**混合搜索**中使用两者！我们将在下一节中回顾这个概念。
- en: Hybrid search
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合搜索
- en: Hybrid search allows you to make the most of both dense and sparse search techniques
    and then fuse the return rank results together. With hybrid search, you are performing
    both vector/dense search and keyword/sparse search, and then you combine the results.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 混合搜索允许你充分利用密集和稀疏搜索技术，并将返回的排名结果融合在一起。在混合搜索中，你正在进行向量/密集搜索和关键词/稀疏搜索，然后结合结果。
- en: This combination can be done based on a scoring system that measures how well
    each object matches the query using both dense and sparse searches. What better
    way to illustrate how this approach works than to walk through a code lab with
    it? In the next section, we will introduce you to BM25 to conduct your keyword/sparse
    search and then combine it with our existing retriever to form a hybrid search.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这种组合可以根据一个评分系统来完成，该系统衡量每个对象使用密集和稀疏搜索与查询匹配的程度。还有什么比通过一个代码实验室来展示这种方法的工作原理更好的方式呢？在下一节中，我们将向您介绍BM25以进行关键词/稀疏搜索，然后将其与我们的现有检索器结合，形成混合搜索。
- en: Code lab 8.2 – Hybrid search with a custom function
  id: totrans-106
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室8.2 – 使用自定义函数的混合搜索
- en: The file you need to access from the GitHub repository is titled `CHAPTER8-2_HYBRID_CUSTOM.ipynb`.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要从GitHub仓库访问的文件标题为`CHAPTER8-2_HYBRID_CUSTOM.ipynb`。
- en: 'In this code lab, we are going to start with the notebook from [*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103):
    `CHAPTER5-3_BLUE_TEAM_DEFENDS.ipynb`. Note that we are not using the [*Chapter
    6*](B34736_06_ePub.xhtml#_idTextAnchor128) or *7* code, which has a lot of miscellaneous
    code we won’t use going forward. There is an added bonus in this code lab, though;
    we are going to introduce some new elements that will carry us through the next
    couple of chapters, such as a new type of document loader for PDFs rather than
    web pages, a new, larger document with more data to search, and a new text splitter.
    We will also clean out any code we no longer need as a result of these changes.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码实验室中，我们将从[*第5章*](B34736_05_ePub.xhtml#_idTextAnchor103)：`CHAPTER5-3_BLUE_TEAM_DEFENDS.ipynb`开始。请注意，我们不会使用[*第6章*](B34736_06_ePub.xhtml#_idTextAnchor128)或*7*的代码，其中包含很多我们以后不会使用的杂项代码。然而，在这个代码实验室中还有一个额外的奖励；我们将介绍一些新元素，这些元素将帮助我们进入下一章，例如一个新的PDF文档加载器，而不是网页，一个更大、数据量更多的文档，以及一个新的文本分割器。我们还将清理掉由于这些更改而不再需要的任何代码。
- en: Once we have updated the code for these changes, we can focus on the task at
    hand, which is to use BM25 to generate our sparse vectors, combining those vectors
    with the dense vectors we have already used to form a hybrid search approach.
    We will use our previous vectorizer to generate our dense vectors. Then, we will
    search using both sets of vectors, rerank the results accounting for documents
    that appear in both retrievals, and provide a final hybrid result. BM25 has been
    around for several decades, but it is still a very effective bag-of-words algorithm
    based on TF-IDF, which we reviewed in the last chapter. It is also very quick
    to compute.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们更新了这些更改的代码，我们就可以专注于手头的任务，即使用BM25生成我们的稀疏向量，将那些向量与我们已经使用的密集向量结合起来，形成一个混合搜索方法。我们将使用我们之前的向量器生成我们的密集向量。然后，我们将使用这两组向量进行搜索，重新排名考虑出现在两次检索中的文档，并提供最终的混合结果。BM25已经存在了几十年，但它仍然是一个基于TF-IDF的非常有效的词袋算法，我们在上一章中已经讨论过。它也非常快。
- en: 'One interesting aspect of combining the results from the two retrievers begs
    the question: how does it rank results from two relatively different search mechanisms?
    Our dense vector search uses cosine similarity and provides a similarity score.
    Our sparse vector is based on TF-IDF and uses TF and IDF scores, which we reviewed
    in the previous chapter. These are not comparable scores. As it turns out, there
    are numerous algorithms we can use to perform the ranking among these two retrievers.
    The one we will use is called the **Reciprocal Rank Fusion** (**RRF**) algorithm.
    This lab primarily focuses on building a function that mimics the ranking approach
    that the RRF takes, so that you can walk through and understand these calculations
    yourself.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 将两个检索器的结果合并的一个有趣方面引发了一个问题：如何对来自两种相对不同的搜索机制的结果进行排名？我们密集向量搜索使用余弦相似度并提供相似度得分。我们的稀疏向量基于TF-IDF，并使用TF和IDF得分，这些我们在上一章中已经讨论过。这些得分是不可比较的。实际上，我们可以使用许多算法在这两个检索器之间进行排名。我们将使用的是称为**互逆排名融合（RRF**）算法。这个实验室主要关注构建一个模拟RRF排名方法的函数，这样你就可以亲自走一遍并理解这些计算。
- en: 'We no longer need this package focused on parsing web pages, since we are changing
    from processing a web page to parsing a PDF. Let’s start with removing that code:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在从处理网页转换为解析PDF，所以我们不再需要专注于解析网页的包。让我们从移除该代码开始：
- en: '[PRE17]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'We do need to install a new package for parsing PDFs, as we need a new package
    that will let us use the BM25 model with LangChain to generate the sparse embeddings:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们确实需要安装一个新的包来解析PDF，因为我们需要一个新包，这样我们就可以使用LangChain与BM25模型生成稀疏嵌入：
- en: '[PRE18]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: That will load both of these packages into our environment. Remember to restart
    your kernel after the installation!
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这将加载这两个包到我们的环境中。记住在安装后重新启动你的内核！
- en: 'Next, remove this code from the imports:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，从导入中移除以下代码：
- en: '[PRE19]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: As mentioned earlier, we no longer need the code for parsing web pages. We are
    also removing our text splitter and will replace it with a new one.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们不再需要解析网页的代码。我们还将移除我们的文本分割器，并用一个新的替换。
- en: 'Add this code to the imports:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下代码添加到导入中：
- en: '[PRE20]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Here, we import `chromadb` directly since we’ll use it to create a client for
    our vector store. We add `PdfReader` for PDF extraction. We import `RecursiveCharacterTextSplitter`
    from the `langchain_text_splitters` package. We add a new class that will help
    us manage and process our documents when dealing with LangChain. Lastly, we add
    the `BM25Retriever` loader that acts as a LangChain retriever.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们直接导入 `chromadb`，因为我们将会用它来创建我们的向量存储客户端。我们添加 `PdfReader` 用于 PDF 提取。我们从 `langchain_text_splitters`
    包中导入 `RecursiveCharacterTextSplitter`。我们添加一个新的类，它将帮助我们管理和处理我们的文档，当我们处理 LangChain
    时。最后，我们添加了 `BM25Retriever` 加载器，它充当 LangChain 检索器。
- en: 'Let’s remove the web parsing code next:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们移除网络解析代码：
- en: '[PRE21]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'We are going to take the cell where we are defining our OpenAI variables and
    expand it to define all of the variables we use across the code; add this to the
    bottom of that cell:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把定义我们的 OpenAI 变量的单元格扩展到定义代码中使用的所有变量；将此添加到该单元格的底部：
- en: '[PRE22]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'This sets up some variables that we will discuss further when we use them in
    the following code. Now, let’s add our code for processing a PDF:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这设置了一些变量，我们将在以下代码中使用它们时进一步讨论。现在，让我们添加处理 PDF 的代码：
- en: '[PRE23]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We will talk more about LangChain document loading in [*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271),
    but for now, we wanted to introduce you to an alternative to just loading web
    pages. Given the popularity of PDFs, this is probably going to be a common situation
    for you. The catch is that you need to have the `google-2023-environmental-report.pdf`
    file available in the same directory as your notebook. You can download that file
    from the same repo you access all of the other code in this book. This code pulls
    that file up and extracts the text across the pages, concatenating the text back
    together so that there is no text loss across the pages.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在 [*第 11 章*](B34736_11_ePub.xhtml#_idTextAnchor271) 中更多地讨论 LangChain 文档加载，但到目前为止，我们想向您介绍一种除了加载网页之外的替代方案。鉴于
    PDF 的普及，这可能是您常见的情景。难点在于您需要将 `google-2023-environmental-report.pdf` 文件放在与您的笔记本相同的目录中。您可以从访问本书中所有其他代码的同一存储库中下载该文件。此代码将提取该文件并提取跨页面的文本，将文本连接回一起，以确保页面之间没有文本丢失。
- en: 'At this point, we have a very large string representing all of the text in
    the PDF. We now need to use a splitter to break the text into manageable chunks.
    This is where we are going to switch from `SemanticChunker` to `RecursiveCharacterTextSplitter`.
    This gives you a chance to work with a different LangChain splitter as well, which
    is another topic we will expand on in [*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271).
    First, remove this one:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们有一个非常大的字符串，表示 PDF 中的所有文本。我们现在需要使用一个分割器将文本拆分成可管理的块。这就是我们将从 `SemanticChunker`
    切换到 `RecursiveCharacterTextSplitter` 的地方。这给了你一个机会来使用不同的 LangChain 分割器，这也是我们将在
    [*第 11 章*](B34736_11_ePub.xhtml#_idTextAnchor271) 中进一步展开的另一个主题。首先，移除这个：
- en: '[PRE24]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Then, add this one:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，添加这个：
- en: '[PRE25]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '`RecursiveCharacterTextSplitter` is a commonly used splitter that also saves
    us the cost of using the OpenAI `embeddings` API associated with the `SemanticChunker`
    splitter object. Combined with the larger PDF document we are now uploading, this
    splitter will give us more chunks to work with when looking at vector spaces and
    retrieval maps in the next chapter.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '`RecursiveCharacterTextSplitter` 是一个常用的分割器，同时还能节省我们使用与 `SemanticChunker` 分割器对象相关的
    OpenAI `embeddings` API 的成本。结合我们现在正在上传的更大的 PDF 文档，这个分割器在下一章查看向量空间和检索映射时，将为我们提供更多的工作块。'
- en: 'With new data and a new splitter, we also need to update our retriever-related
    code. Let’s start with prepping our documents:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 使用新的数据和新的分割器，我们还需要更新我们的检索器相关代码。让我们从准备我们的文档开始：
- en: '[PRE26]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Then, the retriever code needs to be removed:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，需要移除检索器代码：
- en: '[PRE27]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Replace it with this code:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 用此代码替换它：
- en: '[PRE28]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: This code takes a moment to load, but once it does, we are setting up our Chroma
    DB vector store to better manage the documents we get from our PDF, with ID metadata
    added. The original retriever is now called `dense_retriever`, which is a more
    descriptive and accurate name for it since it interacts with dense embeddings.
    The new retriever, `sparse_retriever`, is based on BM25, which is conveniently
    available through LangChain as a retriever, giving us similar functionality to
    any other LangChain instance of retriever. In both instances, we are ensuring
    that we are getting 10 results back by setting k to 10\. Also, note that the `vectorstore`
    object is using the `collection_name` string we defined in the variables earlier
    in the code.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码加载需要一点时间，但一旦加载完成，我们就开始设置我们的Chroma DB向量存储库，以便更好地管理我们从PDF中获取的文档，并添加了ID元数据。原来的检索器现在被称为`dense_retriever`，这是一个更描述性和准确的名称，因为它与密集嵌入进行交互。新的检索器`sparse_retriever`基于BM25，通过LangChain作为检索器方便地可用，为我们提供了与其他任何LangChain实例的检索器类似的功能。在这两种情况下，我们通过将k设置为10来确保我们返回10个结果。此外，请注意，`vectorstore`对象正在使用我们在代码中之前定义的`collection_name`字符串。
- en: '**Fun fact**'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**'
- en: You should note, though, that we are not storing our sparse embeddings in a
    Chroma DB vector store like we are with the dense embeddings. We pull the documents
    directly into the retriever, which keeps them in memory while we use them in our
    code. In a more sophisticated application, we would likely want to handle this
    more thoroughly and store the embeddings in a more permanent vector store for
    future retrieval. Even our Chroma DB is ephemeral in this code, which means we
    will lose it if we shut down the notebook kernel. You can improve this situation
    using `vectorstore.persist()`, which will store the Chroma DB database locally
    in a sqlite file. These are advanced techniques that aren’t needed for this code
    lab, but look them up if you want to build a more robust vector store environment
    for your RAG pipeline!
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你应该注意，我们并没有像处理密集嵌入那样将稀疏嵌入存储在Chroma DB向量存储库中。我们直接将文档拉入检索器，在我们使用它们时将它们保存在内存中。在一个更复杂的应用中，我们可能会想要更彻底地处理这个问题，并将嵌入存储在一个更持久的向量存储库中，以便将来检索。甚至在这个代码中，我们的Chroma
    DB也是临时的，这意味着如果我们关闭笔记本内核，我们将丢失它。你可以使用`vectorstore.persist()`来改善这种情况，它将Chroma DB数据库以sqlite文件的形式本地存储。这些是高级技术，对于这个代码实验室不是必需的，但如果你想要为你的RAG管道构建一个更健壮的向量存储环境，可以查找它们！
- en: In a moment, we will introduce you to the function that performs a hybrid search
    for you, so that you can step through and see what is happening. Before reviewing
    it, though, let’s discuss how to approach it. Keep in mind that this is a quick
    stab at trying to replicate the ranking algorithm that LangChain uses in its hybrid
    search mechanism. The idea here is that this will let you walk through what is
    going on under the hood when you are doing a hybrid search using LangChain. LangChain
    actually provides a mechanism that will do all of this in one line of code! This
    is **EnsembleRetriever**. `EnsembleRetriever` retriever performs a hybrid search
    in the same way our function does, but it employs a sophisticated ranking algorithm
    called the RRF algorithm. This algorithm does the heavy lifting of determining
    how to rank all of the results, similar to how we just discussed our function
    operation.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在不久的将来，我们将向您介绍一个执行混合搜索的函数，这样您就可以逐步查看发生了什么。在审查它之前，让我们讨论如何接近它。请记住，这是一个快速尝试复制LangChain在其混合搜索机制中使用的排名算法。这里的想法是，这将让您在通过LangChain进行混合搜索时了解底层发生了什么。LangChain实际上提供了一个机制，可以在一行代码中完成所有这些操作！这是**EnsembleRetriever**。`EnsembleRetriever`检索器以与我们函数相同的方式执行混合搜索，但它采用了一个复杂的排名算法，称为RRF算法。这个算法承担了确定如何对所有结果进行排名的重任，类似于我们刚才讨论的函数操作。
- en: 'We will step through the next function, discussing each point and how that
    relates to the RFF algorithm that LangChain uses for the same purpose. This is
    by far the biggest function we have used so far, but it is worth the effort! Keep
    in mind that this is one function, which you can see in the code altogether. Let’s
    start with the function definition:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将逐步介绍下一个函数，讨论每个点以及它如何与LangChain用于相同目的的RFF算法相关。这是我们迄今为止使用的最大的函数，但这是值得努力的！请记住，这是一个函数，你可以在代码中一起看到。让我们从函数定义开始：
- en: '[PRE29]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Initially, we are going to take the weights for the dense and sparse results
    separately. This matches the `EnsembleRetriever` retriever weight parameters from
    LangChain, which we will review in a moment, but this sets up this function to
    act exactly like that type of retriever. We also have a k value, indicating the
    total results we want the function to return. The default of k matches what the
    retrievers are set to return when they were initialized earlier in the code.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，我们将分别考虑密集和稀疏结果的权重。这与LangChain的`EnsembleRetriever`检索器权重参数相匹配，我们将在稍后进行回顾，但这将此函数设置为与那种类型的检索器完全一样。我们还有一个k值，表示函数要返回的总结果数。k的默认值与检索器在代码中初始化时设置的返回值相匹配。
- en: 'Our first step within the function is focused on retrieving the top-k documents
    from both types of retrievers:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在函数内部的第一步，我们的重点是检索两种检索器类型中的前k个文档：
- en: '[PRE30]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We start our retrieval process by retrieving the top-k documents from both dense
    search and sparse search. Just like RRF, we start with retrieving the top documents
    from both dense search and sparse search based on their respective scoring mechanisms.
    We also want to assign IDs to our content so that we can compare the results across
    retrievers, remove duplicates across results (by converting them to a set that
    removes all duplicates), and then create two dictionaries to store the reciprocal
    ranks of each document.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过检索密集搜索和稀疏搜索的前k个文档来开始我们的检索过程。就像RRF一样，我们根据各自的评分机制从密集搜索和稀疏搜索中检索前几个文档。我们还希望为我们的内容分配ID，以便我们可以比较检索器之间的结果，通过将它们转换为去除所有重复项的集合来删除结果中的重复项，然后创建两个字典来存储每个文档的倒数排名。
- en: 'Next, we are going to calculate the reciprocal rank for each document:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将计算每个文档的倒数排名：
- en: '[PRE31]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: This code will calculate the reciprocal rank for each document in dense and
    sparse search results and store them in the dictionaries we just created. For
    each document, we calculate its reciprocal rank in each ranked list. The reciprocal
    rank is the inverse of the document’s position in the ranked list (e.g., 1/rank).
    The reciprocal rank is calculated as 1.0 divided by the position of the document
    in the respective search results (1-based index). Note that the similarity scores
    are not involved in this calculation. As you might remember from previous discussions,
    our semantic search is ranking-based on distance, and BM25 is ranking-based on
    relevance. But RRF does not require these scores, which means we don’t need to
    worry about normalizing scores from the different retrieval methods to be on the
    same scale or directly comparable. RFF relies on the rank positions, making it
    easier to combine results from different scoring mechanisms. It is important to
    note the impact this will have on your search, though. You may have a scenario
    where, from a semantic standpoint, you have a really *close* score (distance-wise)
    in your semantic search, but the highest-ranked result from your keyword search
    is still not that similar. Using RFF with equal weights will result in these results
    having equal rankings and, therefore, equal value from the ranking standpoint,
    even though you would want the semantic result to have more weight. You can adjust
    this using the `dense_weight` and `sparse_weight` parameters, but what if you
    have the reverse situation? This is a downside of using RRF and hybrid search
    in general, which is why you will want to test to make sure this is the best solution
    for your particular needs.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将计算密集和稀疏搜索结果中每个文档的倒数排名，并将它们存储在我们刚刚创建的字典中。对于每个文档，我们计算其在每个排名列表中的倒数排名。倒数排名是文档在排名列表中位置的倒数（例如，1/rank）。倒数排名是文档在相应搜索结果中的位置的倒数（基于1的索引）。请注意，相似度分数不涉及此计算。如您从之前的讨论中可能记得的那样，我们的语义搜索是基于距离的排名，而BM25是基于相关性的排名。但是RRF不需要这些分数，这意味着我们不需要担心将不同检索方法的分数归一化到相同的尺度或直接可比。RRF依赖于排名位置，这使得结合不同评分机制的结果变得更容易。但重要的是要注意这将对您的搜索产生的影响。您可能有一个场景，从语义角度来看，您在语义搜索中有一个非常*接近*的分数（从距离的角度看），但您关键词搜索的最高排名结果仍然不太相似。使用具有相同权重的RFF会导致这些结果具有相同的排名和因此，从排名的角度看，具有相同的价值，尽管您可能希望语义结果具有更大的权重。您可以使用`dense_weight`和`sparse_weight`参数进行调整，但您有什么相反的情况呢？这是使用RRF和混合搜索的一般缺点，这就是为什么您会想测试以确保这是最适合您特定需求的最佳解决方案。
- en: 'Here, we sum the reciprocal ranks of each document across the ranked lists
    from dense search and sparse search:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们计算了密集搜索和稀疏搜索排名列表中每个文档的倒数排名总和：
- en: '[PRE32]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The RFF approach hinges on the idea that documents that are ranked highly by
    both retrieval methods are more likely to be relevant to the query. By using reciprocal
    ranks, RRF gives more weight to documents that appear at the top of the ranked
    lists. Note that we are weighting the sums using the weights we collected in the
    parameters. That means this is the place where we can make a particular set of
    embeddings (dense or sparse) more influential in the search results.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: RFF方法基于这样一个观点：被两种检索方法都高度排名的文档更有可能与查询相关。通过使用倒数排名，RFF给排名列表顶部的文档赋予更多的权重。注意，我们正在使用在参数中收集的权重来加权总和。这意味着这是我们可以使特定集合的嵌入（密集或稀疏）在搜索结果中更具影响力的地方。
- en: 'This next line sorts the document IDs based on their combined reciprocal rank
    scores in descending order:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 下一行根据文档的合并倒数排名分数按降序排序：
- en: '[PRE33]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Descending order is indicated by `reverse=True`. It uses the `sorted()` function
    with a key function that retrieves the combined reciprocal rank for each document
    ID.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 降序通过`reverse=True`表示。它使用带有键函数的`sorted()`函数，该键函数检索每个文档ID的合并倒数排名。
- en: 'Our next step is to iterate over the sorted document IDs and retrieve the corresponding
    documents from the dense and sparse search results:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们下一步是遍历排序后的文档ID，并从密集和稀疏搜索结果中检索相应的文档：
- en: '[PRE34]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: We use this to indicate the source retriever, giving us a better sense of how
    each of our retrievers is impacting the results. Retrieve the documents based
    on the sorted document IDs. The resulting ranked list represents the hybrid search
    results, where documents that appear higher in both dense and sparse search rankings
    will have higher combined scores.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用这来指示源检索器，这让我们能更好地理解每个检索器对我们结果的影响。根据排序后的文档ID检索文档。生成的排序列表代表混合搜索结果，其中在密集和稀疏搜索排名中都较高的文档将具有更高的综合得分。
- en: 'Finally, we return the results:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们返回结果：
- en: '[PRE35]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Note that k was used for both retrievers, giving us twice as many results as
    we are asking for here. So, this is taking those results and cutting them in half,
    returning just the top k. What this does in practice is if there are results in
    the lower half of these retrievers, such as rank #8, but they are in both results,
    it is likely to push those results into the top k.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，k被用于两个检索器，这给我们提供了两倍于我们请求的结果。所以，这是将那些结果减半，只返回前k个。在实践中，这会使得如果这些检索器的下半部分有结果，例如排名#8，但它们在两个结果中，那么这些结果很可能被推到前k个。
- en: 'Next, we have to account for this new retriever mechanism in our LangChain
    chain. Update the `rag_chain_with_source` chain to use the `hybrid_search` function
