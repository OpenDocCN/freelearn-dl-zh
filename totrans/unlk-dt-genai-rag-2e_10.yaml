  prefs: []
  type: TYPE_NORMAL
  zh: 结果几乎与我们的函数完全相同，但密集搜索结果在排序中获胜（在我们的函数中，稀疏结果是获胜的），这是一个相当小的差异，但你可以通过改变权重轻松解决。记住那个c值吗？如果你改变它，你会看到结果中的重大变化。随着时间的推移，我们应该回到我们的函数中添加一个c值，但我跑题了！
- en: Building our own function certainly gave us more flexibility and allowed us
    to see and change the inner workings of the function. With the LangChain `EnsembleRetriever`,
    we cannot change any steps in the search or ranking to better fit our needs, and
    we have a few quirks, such as the `"source"` metadata issue, where we don’t know
    whether or when it is coming from both sources. It is difficult to judge which
    is a better approach from this small example. The reality is that everything you
    do will need consideration, and you will have to decide for yourself what works
    in your situation.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 自行构建函数确实给了我们更多的灵活性，并允许我们查看和更改函数的内部工作原理。使用LangChain的`EnsembleRetriever`，我们无法更改搜索或排名中的任何步骤以更好地满足我们的需求，并且有几个怪癖，例如`"source"`元数据问题，我们不知道它是否来自两个来源，也不知道它何时来自。从这个小例子中很难判断哪种方法更好。现实是，你做的每一件事都需要考虑，你必须自己决定在你的情况下什么有效。
- en: If hybrid search is important, you may want to consider a vector database or
    vector search service that gives you more features and flexibility in defining
    your hybrid search. LangChain provides weights that allow you to emphasize one
    of the search mechanisms over the other, but as of right now, you can only use
    the built-in ranking mechanism in the RRF. Weaviate, for example, lets you pick
    from two different ranking algorithms. This is yet another consideration to take
    into account when making decisions on what infrastructure to use in your RAG pipeline.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果混合搜索很重要，你可能想要考虑一个提供更多功能和灵活性的向量数据库或向量搜索服务，以便定义你的混合搜索。LangChain提供了权重，允许你强调一种搜索机制而不是另一种，但截至目前，你只能使用RRF内置的排名机制。例如，Weaviate允许你从两种不同的排名算法中选择。这是在决定在你的RAG管道中使用哪种基础设施时需要考虑的另一个因素。
- en: Next, let’s talk about the algorithms that use these distances.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们谈谈使用这些距离的算法。
- en: Semantic search algorithms
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 语义搜索算法
- en: We have discussed the concept of a semantic search in depth. Our next step is
    to walk through the different approaches we can take to conduct a semantic search.
    These are the actual search algorithms that use things such as the distance metrics
    we’ve already discussed (Euclidean distance, dot product, and cosine similarity)
    to conduct their search of dense embeddings. We start with **k-nearest** **neighbors**
    (**k-NN**).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经深入讨论了语义搜索的概念。我们的下一步是探讨我们可以采取的不同方法来进行语义搜索。这些是实际使用我们之前讨论过的距离度量（欧几里得距离、点积和余弦相似度）来执行其密集嵌入搜索的搜索算法。我们从**k-最近****邻居**（**k-NN**）开始。
- en: k-NN
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: k-NN
- en: One way to find similar vectors is through brute force. With brute force, you
    find the distances between the query and all the data vectors. Then, you sort
    the distances from closest to furthest, returning a certain number of results.
    You can cut off the results based on a threshold, or you can define a set number
    to return, such as 5\. The set number is called k, so you would say k=5\. This
    is known in classical machine learning as the k-NN algorithm. This is a straightforward
    algorithm, but its performance degrades as the dataset grows. The increase in
    computational cost for this algorithm is linear based on the amount of data you
    are querying. The time complexity is represented by O(n * d), where n is the number
    of instances in the training dataset, and d is the dimensionality of the data.
    This means that if your data doubles, the query time will double. For large datasets
    that reach into the millions or even billions of data points, brute-force comparison
    between every pair of items can become computationally infeasible.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 找到相似向量的一个方法是通过暴力搜索。使用暴力搜索，你找到查询与所有数据向量之间的距离。然后，你按从最近到最远的顺序排序这些距离，返回一定数量的结果。你可以根据阈值截断结果，或者定义一个要返回的固定数量，例如5。这个固定数量被称为k，所以你会说k=5。这在经典机器学习中被称为k-NN算法。这是一个简单的算法，但随着数据集的增长，其性能会下降。这个算法的计算成本增加与你要查询的数据量成线性关系。时间复杂度用O(n
    * d)表示，其中n是训练数据集中的实例数量，d是数据的维度。这意味着如果你的数据量加倍，查询时间也会加倍。对于包含数百万甚至数十亿数据点的庞大数据集，每对项目之间的暴力比较在计算上可能变得不可行。
- en: If you have a relatively small dataset, it may be worth considering k-NN, as
    it is considered to be more accurate than the next approach we discuss. What constitutes
    *small* can be dependent on your data and embedding dimensions, but I have used
    k-NN successfully for projects with 25,000 to 30,000 embeddings and 256 dimensions.
    I’ve seen a 2–6% improvement in the retrieval evaluation metrics we will talk
    about in [*Chapter 9*](B34736_09_ePub.xhtml#_idTextAnchor209), which is significant
    enough for me to offset the small increase in computation cost.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的数据集相对较小，考虑使用k-NN可能是有价值的，因为它被认为比我们接下来要讨论的下一个方法更准确。*小*的定义可能取决于你的数据和嵌入维度，但我已经成功地在拥有25,000到30,000个嵌入和256维度的项目中使用了k-NN。我观察到检索评估指标（我们将在[*第9章*](B34736_09_ePub.xhtml#_idTextAnchor209)中讨论）提高了2-6%，这对于我来说已经足够显著，可以抵消计算成本的小幅增加。
- en: But what about all the distance metrics we just discussed? Where do those come
    in with k-NN? k-NN can use any of those distance metrics to determine the similarity
    between the query vector and the vectors in the dataset. The most common distance
    metric used in k-NN is Euclidean distance. Other distance metrics, such as Manhattan
    distance (also known as city block distance) or cosine similarity, can also be
    used, depending on the nature of the data and the problem at hand. The choice
    of distance metric can significantly impact the performance of the k-NN algorithm.
    Once the distances between the query vector and all the vectors in the dataset
    are calculated, k-NN sorts the distances and selects the k nearest neighbors based
    on the chosen distance metric.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们刚才讨论的所有距离度量呢？这些在k-NN中有什么作用？k-NN可以使用这些距离度量中的任何一个来确定查询向量与数据集中的向量之间的相似性。k-NN中最常用的距离度量是欧几里得距离。根据数据的性质和问题的性质，也可以使用其他距离度量，例如曼哈顿距离（也称为城市街区距离）或余弦相似度。距离度量的选择可以显著影响k-NN算法的性能。一旦计算出查询向量与数据集中所有向量的距离，k-NN将根据所选的距离度量对距离进行排序，并选择k个最近的邻居。
- en: If you find that your dataset has outgrown k-NN, there are many other algorithms
    that allow us to find the nearest vectors in a more efficient way. In general,
    we call this **Approximate Nearest Neighbors** (**ANN**), which we will discuss
    next.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现你的数据集已经超过了k-NN的处理能力，还有许多其他算法可以更有效地找到最近的向量。通常，我们称之为**近似最近邻**（ANN），我们将在下一节讨论。
- en: ANN
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ANN
- en: ANN is a family of algorithms designed to address the scalability limitations
    of k-NN while still providing satisfactory results. ANN algorithms aim to find
    the most similar vectors to a query vector in a more efficient manner, sacrificing
    some accuracy for improved performance.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: ANN是一系列算法，旨在解决k-NN的可扩展性限制，同时仍然提供令人满意的结果。ANN算法旨在以更有效的方式找到与查询向量最相似的向量，牺牲一些准确性以换取性能的提升。
- en: Compared to k-NN, which performs an exhaustive search by calculating the distances
    between the query vector and all data vectors, ANN algorithms employ various techniques
    to reduce the search space and speed up the retrieval process. These techniques
    include indexing, partitioning, and approximation methods that allow ANN algorithms
    to focus on a subset of the data points that are likely to be the nearest neighbors.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 与通过计算查询向量与所有数据向量之间的距离进行完全搜索的k-NN相比，ANN算法采用各种技术来减少搜索空间并加快检索过程。这些技术包括索引、分区和近似方法，这些方法允许ANN算法专注于可能是最邻近邻居的数据点子集。
- en: One key difference between k-NN and ANN is the trade-off between accuracy and
    efficiency. While k-NN guarantees finding the exact k nearest neighbors, it becomes
    computationally expensive as the dataset grows. On the other hand, ANN algorithms
    prioritize efficiency by approximating the nearest neighbors, accepting the possibility
    of missing some of the true nearest neighbors in exchange for faster retrieval
    times.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: k-NN与ANN之间一个关键的区别是准确性和效率之间的权衡。虽然k-NN保证找到确切的k个最近邻居，但随着数据集的增长，它变得计算成本高昂。另一方面，ANN算法通过近似最近邻居来优先考虑效率，接受在更快的检索时间中可能错过一些真实最近邻居的可能性。
- en: ANN algorithms often leverage **indexing structures** such as **hierarchical
    trees** (e.g., KD-trees, Ball trees), **hashing techniques** (e.g., **Locality-Sensitive
    Hashing** (**LSH**)), or **graph-based methods** (e.g., **Hierarchical Navigable
    Small World** (**HNSW**)) to organize the data points in a way that facilitates
    efficient search. These indexing structures allow ANN algorithms to quickly narrow
    down the search space and identify candidate neighbors without exhaustively comparing
    the query vector to every data point. We will talk in more depth about indexing
    approaches for ANN in the next section.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: ANN算法通常利用**索引结构**，如**层次树**（例如，KD树、球树），**哈希技术**（例如，**局部敏感哈希**（LSH）），或**基于图的方法**（例如，**层次可导航小世界**（HNSW））来组织数据点，从而便于高效搜索。这些索引结构允许ANN算法快速缩小搜索空间并识别候选邻居，而无需将查询向量与每个数据点进行完全比较。我们将在下一节更深入地讨论ANN的索引方法。
- en: The time complexity of ANN algorithms varies depending on the specific algorithm
    and indexing technique used. However, in general, ANN algorithms aim to achieve
    sublinear search times, meaning that the query time grows more slowly than the
    size of the dataset. This makes ANN algorithms more suitable for large-scale datasets
    where the computational cost of k-NN becomes prohibitive.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: ANN算法的时间复杂度取决于所使用的特定算法和索引技术。然而，一般来说，ANN算法旨在实现亚线性搜索时间，这意味着查询时间增长速度低于数据集的大小。这使得ANN算法更适合大规模数据集，其中k-NN的计算成本变得过高。
- en: Again, what about those distance metrics? Well, like k-NN, ANN algorithms rely
    on distance metrics to measure the similarity between the query vector and the
    vectors in the dataset. The choice of distance metric depends on the nature of
    the data and the problem at hand. Common distance metrics used in ANN include
    Euclidean distance, Manhattan distance, and cosine similarity. However, unlike
    k-NN, which calculates distances between the query vector and all data vectors,
    ANN algorithms employ indexing structures and approximation techniques to reduce
    the number of distance calculations. These techniques allow ANN algorithms to
    quickly identify a subset of candidate neighbors that are likely to be close to
    the query vector. The distance metric is then applied to this subset to determine
    the approximate nearest neighbors, rather than computing distances for the entire
    dataset. By minimizing the number of distance calculations, ANN algorithms can
    significantly speed up the retrieval process while still providing satisfactory
    results.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，那些距离度量又如何呢？嗯，像k-NN一样，ANN算法依赖于距离度量来衡量查询向量和数据集中向量之间的相似性。距离度量的选择取决于数据的性质和待解决的问题。在ANN中常用的距离度量包括欧几里得距离、曼哈顿距离和余弦相似度。然而，与k-NN不同，它计算查询向量和所有数据向量之间的距离，ANN算法采用索引结构和近似技术来减少距离计算的数量。这些技术允许ANN算法快速识别出可能接近查询向量的候选邻居子集。然后，将距离度量应用于这个子集以确定近似最近邻，而不是计算整个数据集的距离。通过最小化距离计算的数量，ANN算法可以显著加快检索过程，同时仍然提供令人满意的结果。
- en: It’s important to note that the choice between k-NN and ANN depends on the specific
    requirements of the application. If exact nearest neighbors are critical and the
    dataset is relatively small, k-NN may still be a viable option. However, when
    dealing with massive datasets or when near-real-time retrieval is required, ANN
    algorithms provide a practical solution by striking a balance between accuracy
    and efficiency.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，k-NN和ANN之间的选择取决于应用的特定要求。如果精确的最近邻至关重要且数据集相对较小，k-NN可能仍然是一个可行的选项。然而，当处理大规模数据集或需要近实时检索时，ANN算法通过在准确性和效率之间取得平衡，提供了一个实用的解决方案。
- en: In summary, ANN algorithms can offer a more scalable and efficient alternative
    to k-NN for finding similar vectors in large datasets. By employing indexing techniques
    and approximation methods, ANN algorithms can significantly reduce the search
    space and retrieval times, making them suitable for applications that require
    fast and scalable similarity search.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ANN算法可以为在大数据集中寻找相似向量提供比k-NN更可扩展和高效的替代方案。通过采用索引技术和近似方法，ANN算法可以显著减少搜索空间和检索时间，使其适用于需要快速和可扩展相似性搜索的应用。
- en: While it is important to understand what ANN is, it is just as important to
    know that the real benefit is in all the ways you can enhance it. Let’s review
    some of those techniques next.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然了解ANN是什么很重要，但同样重要的是要知道真正的益处在于所有可以增强它的方式。接下来，让我们回顾一些这些技术。
- en: Enhancing search with indexing techniques
  id: totrans-226
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用索引技术增强搜索
- en: ANN and k-NN search are fundamental solutions in computer science and machine
    learning, with applications in various domains such as image retrieval, recommendation
    systems, and similarity search. While search algorithms play a crucial role in
    ANN and k-NN, indexing techniques and data structures are equally important for
    enhancing the efficiency and performance of these algorithms.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: ANN和k-NN搜索是计算机科学和机器学习中的基本解决方案，在图像检索、推荐系统和相似性搜索等各个领域都有应用。虽然搜索算法在ANN和k-NN中扮演着至关重要的角色，但索引技术和数据结构对于提高这些算法的效率和性能同样重要。
- en: These indexing techniques are used to optimize the search process by reducing
    the number of vectors that need to be compared during the search. They help in
    quickly identifying a smaller subset of candidate vectors that are likely to be
    similar to the query vector. The search algorithms (such as k-NN, ANN, or other
    similarity search algorithms) can then operate on this reduced set of candidate
    vectors to find the actual nearest neighbors or similar vectors.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 这些索引技术通过减少搜索过程中需要比较的向量数量来优化搜索过程。它们有助于快速识别出可能类似于查询向量的较小候选向量子集。然后，搜索算法（如k-NN、ANN或其他相似度搜索算法）可以在这个减少的候选向量集上操作，以找到实际的最近邻或相似向量。
- en: All these techniques aim to improve the efficiency and scalability of similarity
    search by reducing the search space and enabling faster retrieval of relevant
    vectors. However, each has its own advantages and trade-offs in terms of indexing
    time, search time, memory usage, and accuracy. The choice of technique depends
    on the specific requirements of the application, such as the dimensionality of
    the vectors, the desired level of accuracy, and the available computational resources.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些技术都旨在通过减少搜索空间并允许更快地检索相关向量来提高相似度搜索的效率和可扩展性。然而，每种技术都有其自己的优势和使用权衡，包括索引时间、搜索时间、内存使用和准确性。技术选择取决于应用程序的具体要求，例如向量的维度、所需的精度水平和可用的计算资源。
- en: In practice, these techniques can be used independently or in combination to
    achieve the best performance for a given vector search task. Some libraries and
    frameworks, such as **Facebook AI Similarity Search** (**FAISS**) and pgvector,
    provide implementations of multiple indexing techniques, including **Product Quantization**
    (**PQ**), HNSW, and LSH, allowing users to choose the most suitable technique
    for their specific use case.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这些技术可以独立使用或组合使用，以达到特定向量搜索任务的最佳性能。一些库和框架，如**Facebook AI Similarity Search**（**FAISS**）和pgvector，提供了多种索引技术的实现，包括**Product
    Quantization**（**PQ**）、HNSW和LSH，使用户能够为他们的特定用例选择最合适的技巧。
- en: Before we dive in, let’s review where we are so far. There are distance/similarity
    metrics (e.g., cosine similarity, Euclidean distance, and dot product) used by
    the search algorithms. These search algorithms include k-NN, ANN, and others.
    The search algorithms can use indexing techniques such as LSH, KD-trees, Ball
    trees, PQ, and HNSW to improve their efficiency and scalability.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，让我们回顾一下到目前为止我们所处的位置。搜索算法使用了距离/相似度度量（例如，余弦相似度、欧几里得距离和点积）。这些搜索算法包括k-NN、ANN以及其他算法。搜索算法可以使用LSH、KD-trees、Ball
    trees、PQ和HNSW等索引技术来提高它们的效率和可扩展性。
- en: 'Okay, are we all caught up? Great! Let’s talk more about several indexing techniques
    that complement search algorithms and improve the overall efficiency of ANN search:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们都跟上了吗？太好了！让我们更深入地讨论几种补充搜索算法并提高ANN搜索整体效率的索引技术：
- en: '**LSH**: LSH is an indexing technique that maps similar vectors to the same
    hash buckets with high probability. The goal of LSH is to quickly identify potential
    candidate vectors for similarity search by reducing the search space. It achieves
    this by dividing the vector space into regions using hash functions, where similar
    items are more likely to be hashed to the same bucket.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LSH**：LSH是一种索引技术，它以高概率将相似向量映射到相同的哈希桶中。LSH的目标是通过减少搜索空间来快速识别潜在候选向量，以进行相似度搜索。它通过使用哈希函数将向量空间划分为区域来实现这一点，其中相似的项目更有可能被哈希到同一个桶中。'
- en: LSH offers a trade-off between accuracy and efficiency. By using LSH as a preprocessing
    step, the set of vectors that need to be examined by the search algorithm can
    be significantly narrowed down. This reduces the computational overhead and improves
    the overall search performance.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: LSH在准确性和效率之间提供了一个权衡。通过使用LSH作为预处理步骤，可以显著缩小搜索算法需要检查的向量集。这减少了计算开销并提高了整体搜索性能。
- en: '**Tree-based indexing**: Tree-based indexing techniques organize vectors into
    hierarchical structures based on their spatial properties. Two popular tree-based
    indexing techniques are **KD-trees** and **Ball trees**:'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于树的索引**：基于树的索引技术根据向量的空间属性将向量组织成层次结构。两种流行的基于树的索引技术是**KD-trees**和**Ball trees**：'
- en: KD-trees are binary space partitioning trees used for organizing points in a
    *k*-dimensional space. They recursively divide the space into subregions based
    on the dimensions of the vectors. During the search process, KD-trees enable efficient
    nearest neighbor search by pruning irrelevant branches of the tree.
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: KD树是用于在*k*维空间中组织点的二叉空间划分树。它们根据向量的维度递归地将空间划分为子区域。在搜索过程中，KD树通过剪枝树的不相关分支来实现高效的最近邻搜索。
- en: Ball trees, on the other hand, partition the data points into nested hyperspheres.
    Each node in the tree represents a hypersphere that encapsulates a subset of the
    data points. Ball trees are particularly effective for nearest-neighbor search
    in high-dimensional spaces.
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，球树将数据点划分为嵌套的超球体。树中的每个节点代表一个封装数据点子集的超球体。球树在处理高维空间中的最近邻搜索特别有效。
- en: Both KD-trees and Ball trees provide a way to efficiently navigate through possible
    candidates and speed up the search process.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: KD树和球树都提供了一种高效导航可能候选者并加速搜索过程的方法。
- en: '**PQ**: PQ is a compression and indexing technique that quantizes vectors into
    a set of sub-vectors and represents them using code books. Do you remember the
    earlier discussion about quantizing vectors? We use those same concepts here.
    PQ allows for compact storage and efficient distance computation by approximating
    the distances between the query vector and the quantized vectors.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PQ**：PQ是一种压缩和索引技术，将向量量化为一组子向量，并使用代码簿来表示它们。你还记得之前关于量化向量的讨论吗？我们在这里使用同样的概念。PQ通过近似查询向量与量化向量之间的距离，允许紧凑存储和高效的距离计算。'
- en: PQ is particularly effective for high-dimensional vectors and has been widely
    used in applications such as image retrieval and recommendation systems. By compressing
    the vectors and approximating distances, PQ reduces the memory footprint and computational
    cost of similarity search.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: PQ特别适用于高维向量，并且在图像检索和推荐系统等应用中得到了广泛使用。通过压缩向量和近似距离，PQ减少了相似性搜索的内存占用和计算成本。
- en: '**HNSW**: HNSW is a graph-based indexing technique that builds a hierarchical
    structure of interconnected nodes to enable fast approximate nearest neighbor
    search. It creates a multi-layer graph, where each layer represents a different
    level of abstraction, allowing for efficient traversal and retrieval of approximate
    nearest neighbors.'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HNSW**：HNSW是一种基于图的索引技术，通过构建相互连接的节点层次结构来实现快速近似最近邻搜索。它创建了一个多层图，其中每一层代表不同级别的抽象，允许高效地遍历和检索近似最近邻。'
- en: HNSW is highly scalable and solves the runtime complexity issues of brute-force
    KNN search. It is offered by the most advanced vector databases and has gained
    popularity due to its high performance and scalability, especially for high-dimensional
    data.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: HNSW具有高度的可扩展性，解决了暴力KNN搜索的运行时复杂性问题。它由最先进的向量数据库提供，由于其高性能和可扩展性而受到欢迎，尤其是在处理高维数据时。
- en: The NSW part of HNSW works by finding vectors that are well-positioned among
    many other vectors (closeness-wise) relative to other vectors. These vectors become
    the starting points for the search. The number of connections counted among nodes
    can be defined, allowing for the selection of the best-positioned nodes to connect
    to a large number of other nodes.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: HNSW的NSW部分通过找到在许多其他向量（在接近度方面）相对于其他向量位置良好的向量来工作。这些向量成为搜索的起点。可以在节点之间定义连接的数量，从而允许选择最佳位置的节点连接到大量其他节点。
- en: During a query, the search algorithm starts with a random entry node and moves
    toward the nearest neighbor to the query vector. For each node that gets closer,
    the distance from the user query node to the current node is recalculated, and
    the next node that gets the closest among the current node’s network connections
    is selected. This process traverses across nodes, skipping large parts of the
    data, making it significantly faster. The hierarchical (H) part of HNSW adds several
    layers of navigable small worlds on top of each other. This can be imagined as
    traveling to a place by taking a plane to the nearest airport, then catching a
    train to a town, and finally, searching within a much smaller set of *node* locations
    to find the desired location.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在查询过程中，搜索算法从一个随机入口节点开始，向查询向量的最近邻移动。对于每个越来越接近的节点，都会重新计算用户查询节点到当前节点的距离，并选择当前节点网络连接中距离最近的下一个节点。这个过程跨越节点，跳过了大量数据，使其显著加快。HNSW中的（H）部分在每一层之上增加了几层可导航的小世界。这可以想象为通过乘坐飞机到达最近的机场，然后乘坐火车到达一个城镇，最后在更小的节点位置集合中搜索以找到所需的位置。
- en: '**Fun fact**'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**'
- en: HNSW is inspired by the observed phenomenon in human social networks where everyone
    is closely connected, such as the **six degrees of separation** concept. *Six
    degrees of separation* says that any two individuals are on average separated
    by six acquaintance links. This concept was originally inspired by a 1929 short
    story by Frigyes Karinthy, which described a group of people playing a game of
    trying to connect any person in the world to themselves by a chain of five others.
    This chain of connections can be made to connect any two people in the world,
    in theory, by a maximum of six steps. It is also known as the **six**-**handshake
    rule**.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: HNSW受到了人类社交网络中观察到的现象的启发，即每个人都紧密相连，例如**六度分隔**的概念。**六度分隔**理论认为，任何两个人平均通过六个熟人链接相隔。这个概念最初是由Frigyes
    Karinthy在1929年的一篇短篇小说中启发的，该小说描述了一群人玩一个游戏，试图通过五个人链将世界上任何一个人与自己联系起来。理论上，通过最多六步的连接，可以连接世界上任何两个人。它也被称为**六****握手规则**。
- en: All of these indexing techniques play a vital role in enhancing the efficiency
    and performance of ANN search algorithms. LSH, tree-based indexing, PQ, and HNSW
    are some of the prominent indexing techniques used in conjunction with search
    algorithms. By leveraging these indexing techniques, the search space can be reduced,
    irrelevant candidates can be pruned, and the overall search process can be accelerated.
    Indexing techniques provide a way to organize and structure the data, enabling
    efficient retrieval and similarity search in high-dimensional spaces.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些索引技术都在提高人工神经网络（ANN）搜索算法的效率和性能方面发挥着至关重要的作用。局部敏感哈希（LSH）、基于树的索引、PQ和HNSW是一些与搜索算法结合使用的突出索引技术。通过利用这些索引技术，可以减少搜索空间，剪枝无关的候选者，并加速整体搜索过程。索引技术提供了一种组织和结构化数据的方法，使得在高维空间中进行高效检索和相似性搜索成为可能。
- en: Now that we have added the indexing techniques to our repertoire, we still have
    another important aspect to talk about before we can start actually implementing
    these capabilities. ANN and k-NN are not services you can just sign up for; they
    are search algorithm approaches that services and software packages use. So, next,
    we need to learn what those packages are so that you can actually put them to
    use. Let’s talk about vector search!
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经将索引技术添加到我们的工具箱中，我们还需要讨论另一个重要方面，然后我们才能开始实际实施这些功能。人工神经网络（ANN）和k-NN不是你可以随意注册的服务；它们是服务和软件包使用的搜索算法方法。因此，接下来，我们需要了解那些包是什么，这样你才能真正使用它们。让我们谈谈向量搜索！
- en: Vector search options
  id: totrans-249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 向量搜索选项
- en: In basic terms, vector search is the process of finding the vectors most similar
    to the query vector within the vector store. The ability to quickly identify relevant
    vectors is crucial for the system’s overall performance, as it determines which
    pieces of information will be used by the LLM for generating responses. This component
    bridges the gap between the raw user query and the data-rich inputs needed for
    high-quality generation. There are numerous offerings and numerous types of offerings
    in the marketplace that you can use to conduct your vector search. We have talked
    a lot so far about the components and concepts that make a good vector search.
    You can apply that knowledge to selecting the best vector search option for your
    specific project needs. Services are evolving quickly with new start-ups emerging
    every day, so it is worth your effort to do some deep research before deciding
    on an option. In the next few subsections, we will look at a few options to give
    you an idea of the breadth of what is available.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 在基本术语中，向量搜索是在向量存储中找到与查询向量最相似的向量的过程。快速识别相关向量的能力对于系统的整体性能至关重要，因为它决定了 LLM 将使用哪些信息来生成响应。这个组件在原始用户查询和高质量生成所需的数据丰富输入之间架起了一座桥梁。市场上提供了许多服务和多种类型的服务，你可以使用它们来进行向量搜索。我们之前已经讨论了很多关于构成良好向量搜索的组件和概念。你可以将这些知识应用到选择最适合你特定项目需求的最佳向量搜索选项上。服务正在快速发展，每天都有新的初创公司出现，因此在决定选项之前做一些深入研究是值得的。在接下来的几个小节中，我们将探讨一些选项，以给你一个关于可用的广泛性的概念。
- en: pgvector
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: pgvector
- en: '`pgvector` is an open source vector similarity search extension for PostgreSQL,
    a popular relational database management system. It allows you to store and search
    vectors directly within PostgreSQL, leveraging its robust features and ecosystem.
    `pgvector` supports various distance metrics and indexing algorithms, including
    L2 distance, cosine distance, L1 distance, Hamming distance, and Jaccard distance.
    `pgvector` is one of the few services that supports both exact k-NN search and
    approximate k-NN search using ANN algorithms. Indexing options include **Inverted
    File Index** (**IVF**) and HNSW to accelerate the search process. `pgvector` can
    be used to perform a k-NN search by specifying the desired number of nearest neighbors
    and choosing between exact or approximate search. We’ve discussed HNSW thoroughly,
    but IVF is an indexing technique commonly used in combination with vector stores.
    IVF is designed to efficiently identify a subset of vectors that are likely to
    be similar to a given query vector, reducing the number of distance calculations
    required during the search process. IVF can be used in combination with HNSW,
    improving efficiencies and speed even further. `pgvector` integrates seamlessly
    with existing PostgreSQL tools and libraries, making it easy to incorporate vector
    search into applications that already use PostgreSQL. Recent versions (0.7.0+)
    added support for `halfvec` (2-byte floats indexing up to 4,000 dimensions), `sparsevec`
    (sparse vectors), and binary vectors (up to 64,000 dimensions), along with parallel
    HNSW index builds for improved performance. `pgvector` is a good fit if you are
    already using PostgreSQL and want to add vector search capabilities without introducing
    a separate system. It benefits from the reliability, scalability, and transaction
    support of PostgreSQL.'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: '`pgvector` 是一个开源的 PostgreSQL 向量相似度搜索扩展，PostgreSQL 是一个流行的关系型数据库管理系统。它允许你在 PostgreSQL
    中直接存储和搜索向量，利用其强大的特性和生态系统。`pgvector` 支持各种距离度量指标和索引算法，包括 L2 距离、余弦距离、L1 距离、汉明距离和贾卡德距离。`pgvector`
    是少数支持使用 ANN 算法进行精确 k-NN 搜索和近似 k-NN 搜索的服务之一。索引选项包括 **倒排文件索引**（**IVF**）和 HNSW 以加速搜索过程。`pgvector`
    可以通过指定所需的最近邻数量并在精确或近似搜索之间进行选择来执行 k-NN 搜索。我们已详细讨论了 HNSW，但 IVF 是一种常与向量存储结合使用的索引技术。IVF
    设计用于高效地识别一组可能与给定查询向量相似的向量子集，从而减少搜索过程中所需的距离计算数量。IVF 可以与 HNSW 结合使用，进一步提高效率和速度。`pgvector`
    与现有的 PostgreSQL 工具和库无缝集成，使得将向量搜索集成到已使用 PostgreSQL 的应用程序中变得容易。最近版本（0.7.0+）增加了对
    `halfvec`（2 字节浮点索引，高达 4,000 维）、`sparsevec`（稀疏向量）和二进制向量（高达 64,000 维）的支持，以及并行 HNSW
    索引构建以提高性能。如果你已经在使用 PostgreSQL 并且想要添加向量搜索功能而不引入一个单独的系统，`pgvector` 是一个不错的选择。它受益于
    PostgreSQL 的可靠性、可扩展性和事务支持。'
- en: Elasticsearch
  id: totrans-253
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Elasticsearch
- en: Elasticsearch is a popular open source search and analytics engine that supports
    vector similarity search. It is widely adopted and has a large ecosystem of plugins
    and integrations. Elasticsearch uses ANN algorithms, particularly HNSW, for efficient
    vector similarity search. It does not explicitly use k-NN, but the similarity
    search functionality can be used to find the *k*-nearest neighbors. Elasticsearch
    offers advanced search capabilities, including full-text search, aggregations,
    and geospatial search, as well as a distributed architecture that allows for high
    scalability and fault tolerance. It integrates well with LangChain and offers
    robust scalability, a distributed architecture, and a wide range of features.
    Elasticsearch is a good fit if you already have experience with it or need its
    advanced search and analytics capabilities. However, it may require more setup
    and configuration compared to some other vector stores.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: Elasticsearch 是一个流行的开源搜索和分析引擎，支持向量相似搜索。它被广泛采用，并拥有庞大的插件和集成生态系统。Elasticsearch
    使用 ANN 算法，特别是 HNSW，以实现高效的向量相似搜索。它不明确使用 k-NN，但可以使用相似搜索功能来找到 *k*-最近邻。Elasticsearch
    提供了高级搜索功能，包括全文搜索、聚合和地理空间搜索，以及允许高可扩展性和容错性的分布式架构。它与 LangChain 集成良好，提供了强大的可扩展性、分布式架构和广泛的功能。如果你已经熟悉它或需要其高级搜索和分析功能，Elasticsearch
    是一个很好的选择。然而，与一些其他向量存储库相比，它可能需要更多的设置和配置。
- en: FAISS
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: FAISS
- en: '**FAISS** is a library for efficient similarity search and clustering of dense
    vectors, developed by Facebook. It is known for its exceptional performance and
    ability to handle billion-scale vector datasets. FAISS heavily relies on ANN algorithms
    for efficient similarity search, offering a wide range of ANN indexing and search
    algorithms, including IVF, PQ, and HNSW. FAISS can be used to perform a k-NN search
    by retrieving the *k* most similar vectors to a query vector. FAISS offers a wide
    range of indexing and search algorithms, including quantization-based methods
    for compact vector representation, and provides GPU support for accelerated similarity
    search. It can be used as a vector store and integrates with LangChain. FAISS
    is a good choice if you have high-performance requirements and are comfortable
    working with a lower-level library. However, it may require more manual setup
    and management compared to managed services.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**FAISS** 是由 Facebook 开发的一个用于高效相似搜索和聚类密集向量的库。它以其卓越的性能和能够处理数十亿规模向量数据集的能力而闻名。FAISS
    严重依赖于 ANN 算法以实现高效的相似搜索，提供了一系列 ANN 索引和搜索算法，包括 IVF、PQ 和 HNSW。FAISS 可以通过检索查询向量的 *k*
    个最相似向量来执行 k-NN 搜索。FAISS 提供了广泛的索引和搜索算法，包括基于量化的紧凑向量表示方法，并提供 GPU 支持，以加速相似搜索。它可以作为一个向量存储库，并与
    LangChain 集成。如果你对高性能有要求并且愿意与底层库一起工作，FAISS 是一个好的选择。然而，与托管服务相比，它可能需要更多的手动设置和管理。'
- en: Google Vertex AI Vector Search
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Google Vertex AI Vector Search
- en: Google Vertex AI Vector Search is a fully managed vector similarity search service
    offered by GCP that includes both vector storage and search capabilities. Google
    Vertex AI Vector Search uses ANN algorithms under the hood to enable fast and
    scalable vector similarity search. The specific ANN algorithms used are not disclosed,
    but it likely employs state-of-the-art techniques based on Google’s **Scalable,
    Channel-Aware Nearest Neighbors** (**ScaNN**). It can be used to perform a k-NN
    search by specifying the desired number of nearest neighbors. When you use Vertex
    AI Vector Search, the vectors are stored within the managed service itself. It
    integrates seamlessly with other Google Cloud services, such as BigQuery and Dataflow,
    enabling efficient data processing pipelines. Vertex AI Vector Search offers features
    such as online updates, allowing you to incrementally add or delete vectors without
    rebuilding the entire index. It integrates with LangChain and provides scalability,
    high availability, and easy integration with other Google Cloud services. If you
    are already using Google Cloud and want a managed solution with minimal setup,
    Vertex AI Vector Search is a good option. However, it may be more expensive compared
    to self-hosted solutions.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: Google Vertex AI 向量搜索是 GCP 提供的一项完全托管向量相似度搜索服务，它包括向量存储和搜索功能。Google Vertex AI
    向量搜索在底层使用 ANN 算法来实现快速和可扩展的向量相似度搜索。具体使用的 ANN 算法未公开，但很可能采用了基于 Google 的 **可扩展、通道感知最近邻**（**ScaNN**）的最新技术。可以通过指定所需的最近邻数量来执行
    k-NN 搜索。当您使用 Vertex AI 向量搜索时，向量存储在托管服务内部。它可以无缝集成其他 Google Cloud 服务，如 BigQuery
    和 Dataflow，从而实现高效的数据处理管道。Vertex AI 向量搜索提供在线更新等特性，允许您在不重建整个索引的情况下增量添加或删除向量。它集成了
    LangChain，并提供了可扩展性、高可用性以及与其他 Google Cloud 服务轻松集成的功能。如果您已经在使用 Google Cloud，并希望获得一个设置简单的托管解决方案，Vertex
    AI 向量搜索是一个不错的选择。然而，与自托管解决方案相比，它可能更昂贵。
- en: Azure AI Search
  id: totrans-259
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI 搜索
- en: Azure AI Search is a fully managed search service provided by Microsoft Azure.
    It supports vector similarity search alongside traditional keyword-based search.
    Azure AI Search utilizes ANN algorithms for efficient vector similarity search
    with advanced indexing techniques. It supports integrated vectorization (automatic
    embedding generation during indexing and queries using Azure OpenAI or Azure AI
    Vision), hybrid search combining vector and keyword queries in a single request,
    and multimodal search across text and images. The exact ANN algorithms used are
    not specified, but it leverages advanced indexing techniques to enable fast retrieval
    of similar vectors. It can be used to perform a k-NN search by querying for the
    *k* nearest neighbors. Azure AI Search offers features such as synonyms, autocomplete,
    and faceted navigation. It integrates with Azure Machine Learning for seamless
    deployment of machine learning models. Azure AI Search is a good choice if you
    are already using Azure services and need built-in vectorization pipelines with
    native Azure AI integration. Services created after April 3, 2024, offer higher
    vector index quotas. However, it may have a steeper learning curve compared to
    some other options.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 搜索是 Microsoft Azure 提供的一项完全托管搜索服务。它支持向量相似度搜索以及传统的基于关键词的搜索。Azure AI
    搜索利用 ANN 算法，结合先进的索引技术，实现高效的向量相似度搜索。它支持集成向量化（在索引和查询期间使用 Azure OpenAI 或 Azure AI
    Vision 自动生成嵌入），混合搜索（在单个请求中结合向量和关键词查询），以及跨文本和图像的多模态搜索。具体使用的 ANN 算法未指定，但它利用先进的索引技术，以实现快速检索相似向量。可以通过查询
    *k* 个最近邻来执行 k-NN 搜索。Azure AI 搜索提供同义词、自动完成和分面导航等功能。它集成了 Azure Machine Learning，以实现机器学习模型的无缝部署。如果您已经在使用
    Azure 服务，并需要内置的向量化管道和原生的 Azure AI 集成，Azure AI 搜索是一个不错的选择。自 2024 年 4 月 3 日之后创建的服务提供更高的向量索引配额。然而，与其他一些选项相比，它可能有一个更陡峭的学习曲线。
- en: Approximate Nearest Neighbors Oh Yeah
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 近似最近邻 哦，是的
- en: '**Approximate Nearest Neighbors Oh Yeah** (**ANNOY**) is an open source library
    developed by Spotify for ANN search. It is known for its fast indexing and querying
    speed, as well as its ability to handle high-dimensional vectors efficiently.
    It uses a combination of random projections and binary space partitioning to build
    a forest of trees that enables a fast similarity search. ANNOY can be used to
    perform a k-NN search by retrieving the *k* approximate nearest neighbors. ANNOY
    uses a combination of random projections and binary space partitioning to build
    a forest of trees that enables a fast similarity search. It has a simple and intuitive
    API, making it easy to integrate into existing projects. ANNOY is a good fit if
    you prioritize speed and have a smaller dataset. However, it may not scale as
    well as some other options for extremely large datasets.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '**近似最近邻 Oh Yeah** (**ANNOY**) 是 Spotify 开发的一个开源库，用于近似最近邻搜索。它以其快速的索引和查询速度以及高效处理高维向量的能力而闻名。它通过结合随机投影和二分空间划分来构建一棵树森林，从而实现快速相似性搜索。ANNOY
    可以通过检索 *k* 个近似最近邻来执行 k-NN 搜索。ANNOY 使用随机投影和二分空间划分的组合来构建一棵树森林，从而实现快速相似性搜索。它具有简单直观的
    API，使其易于集成到现有项目中。如果你优先考虑速度并且数据集较小，ANNOY 是一个不错的选择。然而，对于极大数据集，它可能不如一些其他选项扩展得那么好。'
- en: Pinecone
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pinecone
- en: Pinecone is a fully managed vector database designed specifically for machine
    learning applications. It offers high-performance vector similarity search and
    supports both dense and sparse vector representations. Pinecone employs ANN algorithms
    to achieve its high-performance vector similarity search. It supports various
    ANN indexing algorithms, including HNSW, to enable efficient retrieval of similar
    vectors. Pinecone can be used to perform a k-NN search by querying for the *k*-nearest
    neighbors. Pinecone’s serverless architecture (generally available as of 2024)
    separates storage and compute, enabling automatic scaling and significant cost
    reductions. It provides real-time updates, multi-region replication, hybrid search
    combining sparse and dense embeddings, and is available across AWS, Azure, and
    Google Cloud. Pinecone is a good choice for production deployments requiring guaranteed
    performance at scale with minimal infrastructure management. However, it may be
    more expensive compared to some open source or self-hosted solutions.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: Pinecone 是一个专为机器学习应用设计的完全托管向量数据库。它提供高性能的向量相似性搜索，并支持密集和稀疏向量表示。Pinecone 使用 ANN
    算法来实现其高性能向量相似性搜索。它支持各种 ANN 索引算法，包括 HNSW，以实现相似向量的有效检索。Pinecone 可以通过查询 *k* 个最近邻来执行
    k-NN 搜索。Pinecone 的无服务器架构（自 2024 年起通常可用）将存储和计算分离，实现自动扩展和显著的成本降低。它提供实时更新、多区域复制、结合稀疏和密集嵌入的混合搜索，并在
    AWS、Azure 和 Google Cloud 上提供。对于需要保证性能且基础设施管理最少的规模生产部署，Pinecone 是一个不错的选择。然而，与一些开源或自托管解决方案相比，它可能更昂贵。
- en: Weaviate
  id: totrans-265
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Weaviate
- en: Weaviate is an open source vector search engine that enables efficient similarity
    search and data exploration. It supports multiple vector indexing algorithms,
    including HNSW, and offers a GraphQL-based API for easy integration. Weaviate
    utilizes ANN algorithms, particularly HNSW, for efficient vector similarity search.
    It leverages the NSW structure of HNSW to enable fast retrieval of similar vectors.
    Weaviate can be used to perform a k-NN search by specifying the desired number
    of nearest neighbors. Weaviate provides features such as schema management, data
    validation, and real-time updates. It can be self-hosted or used as a managed
    service. Weaviate is a good fit if you prefer an open source solution with a focus
    on data exploration and graph-like queries. However, it may require more setup
    and configuration compared to fully managed services. Weaviate now offers AI agents
    (as of March 2025) for natural language database operations and a generally available
    managed vector embedding service for users who prefer not to manage their own
    embedding generation.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: Weaviate是一个开源的向量搜索引擎，它能够实现高效的相似性搜索和数据探索。它支持多种向量索引算法，包括HNSW，并提供基于GraphQL的API以实现轻松集成。Weaviate利用ANN算法，特别是HNSW，进行高效的向量相似性搜索。它利用HNSW的NSW结构来实现快速检索相似向量。Weaviate可以通过指定所需的最近邻数量来执行k-NN搜索。Weaviate提供诸如模式管理、数据验证和实时更新等功能。它可以自行托管或作为托管服务使用。如果你更喜欢一个专注于数据探索和图状查询的开源解决方案，Weaviate是一个不错的选择。然而，与完全托管服务相比，它可能需要更多的设置和配置。截至2025年3月，Weaviate现在提供AI代理（用于自然语言数据库操作）以及一个通用的托管向量嵌入服务，供那些不愿管理自己的嵌入生成用户使用。
- en: Chroma
  id: totrans-267
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Chroma
- en: This is what you have been using so far for vector search in most of the code
    in this book. Chroma is an open source embedded vector database designed for easy
    integration with existing tools and frameworks. Chroma supports ANN algorithms,
    including HNSW, for fast and efficient vector similarity search. It can be used
    to perform a k-NN search by retrieving the *k*-nearest neighbors to a query vector.
    Chroma provides a simple and intuitive Python API for storing and searching vectors,
    making it particularly convenient for machine learning and data science workflows.
    That is the primary reason we selected it to showcase in the code in this book.
    Chroma supports various indexing algorithms, including HNSW, and offers features
    such as dynamic filtering and metadata storage. It can be used as an in-memory
    database or to persist data to disk for longer-term storage. Chroma offers both
    an open source embedded version and Chroma Cloud, a managed serverless option
    introduced in 2024\. The embedded version is ideal for prototyping and local development,
    while Chroma Cloud provides production-ready scalability. However, for very large-scale
    enterprise deployments, more mature solutions may offer better performance and
    features.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你在本书的大部分代码中用于向量搜索的内容。Chroma是一个开源的嵌入式向量数据库，旨在与现有工具和框架轻松集成。Chroma支持ANN算法，包括HNSW，以实现快速和高效的向量相似性搜索。它可以通过检索查询向量的*k*个最近邻来执行k-NN搜索。Chroma提供了一个简单直观的Python
    API，用于存储和搜索向量，这使得它在机器学习和数据科学工作流程中特别方便。这就是我们选择它在本书的代码中展示的主要原因。Chroma支持各种索引算法，包括HNSW，并提供诸如动态过滤和元数据存储等功能。它可以作为内存数据库使用，或将数据持久化到磁盘进行长期存储。Chroma提供嵌入式开源版本和Chroma
    Cloud，这是一个在2024年推出的托管无服务器选项。嵌入式版本非常适合原型设计和本地开发，而Chroma Cloud提供了生产就绪的可扩展性。然而，对于非常大的规模企业部署，更成熟的产品可能提供更好的性能和功能。
- en: Summary
  id: totrans-269
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we covered a wide range of topics related to similarity searching
    with vectors, a crucial component of RAG systems. We explored the concept of a
    vector space, discussed the differences between semantic and keyword searches,
    and covered various distance metrics used to compare the similarity between embeddings,
    providing code examples to demonstrate their calculation.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们涵盖了与向量相似性搜索相关的一系列主题，这是RAG系统的一个关键组成部分。我们探讨了向量空间的概念，讨论了语义搜索和关键词搜索之间的区别，并介绍了用于比较嵌入相似性的各种距离度量，同时提供了代码示例以展示其计算方法。
- en: We reviewed code that implemented hybrid search using the BM25 algorithm for
    sparse search and a dense retriever for semantic search, showcasing how to combine
    and rerank the results. We also discussed semantic search algorithms, focusing
    on k-NN and ANN, and covered indexing techniques that enhance the efficiency of
    ANN search, such as LSH, tree-based indexing, PQ, and HNSW.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 我们回顾了使用BM25算法进行稀疏搜索和密集检索器进行语义搜索的混合搜索代码实现，展示了如何组合和重新排序结果。我们还讨论了语义搜索算法，重点关注k-NN和ANN，并介绍了增强ANN搜索效率的索引技术，如LSH、基于树的索引、PQ和HNSW。
- en: Finally, we provided an overview of several vector search options available
    in the market, discussing their key features, strengths, and considerations to
    help you make an informed decision when selecting a vector search solution for
    your specific project needs.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们概述了市场上可用的几种向量搜索选项，讨论了它们的关键特性、优势和考虑因素，以帮助您在为特定项目需求选择向量搜索解决方案时做出明智的决定。
- en: In the next chapter, we will take a deep look at ways to visualize and evaluate
    your RAG pipeline.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将深入探讨可视化评估您的RAG管道的方法。
