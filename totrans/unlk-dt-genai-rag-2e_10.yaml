  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们必须在我们的LangChain链中考虑这个新的检索器机制。更新`rag_chain_with_source`链以使用`hybrid_search`函数返回如下内容：
- en: '[PRE36]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'This completes the code changes for the RAG pipeline to use hybrid search.
    But we added all of this extra metadata that we want to show in our output and
