  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: This code takes a moment to load, but once it does, we are setting up our Chroma
    DB vector store to better manage the documents we get from our PDF, with ID metadata
