  type: TYPE_NORMAL
  zh: 然后，我们想要添加我们新的检索器类型，`EnsembleRetriever`，我们将将其添加到定义其他两个检索器的单元格底部：
- en: '[PRE46]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: '`ensemble_retriever` takes both retrievers, weights for how to emphasize them,
