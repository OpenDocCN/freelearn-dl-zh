  zh: 如果你查看前10个结果，源检索器是稀疏的、密集的、两者都有、稀疏的、密集的、稀疏的、密集的、密集的、稀疏的、稀疏的。这在不同的搜索机制中是一个相对均匀的分布，包括一个既来自稀疏又来自密集的结果，这将其进一步推高排名。排名分数为0.5、0.5、0.29、0.25、0.25、0.17、0.125、0.1、0.1、0.83。
- en: 'This is the response we saw when we were just using dense embeddings:'
