- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Similarity Searching with Vectors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter is all about the **R** or **retrieval** part of **retrieval-augmented
    generation** (**RAG**). Specifically, we are going to talk about four areas related
    to similarity searches: **indexing**, **distance metrics**, **similarity algorithms**,
    and **vector search services**. With this in mind, in this chapter, we will cover
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Distance metrics versus similarity algorithms versus vector search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector space
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semantic versus keyword search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 8.1 – semantic distance metrics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Different search paradigms – sparse, dense, and hybrid
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 8.2 – hybrid search with a custom function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 8.3 – hybrid search with LangChain’s `EnsembleRetriever` retriever
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semantic search algorithms such as k-NN and ANN
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Indexing techniques that enhance ANN search efficiency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector search options
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By the end of this chapter, you should have a comprehensive understanding of
    how vector-based similarity searching operates and why it’s instrumental for the
    retrieval component in RAG systems.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_08).'
  prefs: []
  type: TYPE_NORMAL
- en: Individual filenames for each code lab are mentioned in the respective sections.
  prefs: []
  type: TYPE_NORMAL
- en: Distance metrics versus similarity algorithms versus vector search
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'First, let’s discuss the difference between distance metrics, similarity algorithms,
    and vector search. A similarity algorithm can use different distance metrics,
    whereas a vector search can use different similarity algorithms. They are all
    different concepts that ultimately form the retrieval component of your RAG system.
    It is important to make the distinction between these concepts serving different
    purposes if you are going to understand how to properly implement and optimize
    your retrieval solution. You can think of this as a hierarchy, as shown in *Figure
    8.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1 – Vector search, similarity algorithm, and distance metric hierarchy
    with two options each](img/B34736_08_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.1 – Vector search, similarity algorithm, and distance metric hierarchy
    with two options each
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure 8.1*, we are only demonstrating two options for each, where each
    vector search has two different options for similarity algorithms, and then each
    similarity algorithm has two different options for distance metrics. In reality,
    though, there are many more options at each level.
  prefs: []
  type: TYPE_NORMAL
- en: The key point here is that these terms are often used interchangeably or together
    as if they are the same thing, but they are very different parts of the overall
    similarity search mechanism. If you make the mistake of confusing them, it makes
    it much more difficult to understand the overall concepts behind similarity search.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have cleared that up, we will talk about another concept that can
    help you understand the underpinnings of how similarity search works: the vector
    space.'
  prefs: []
  type: TYPE_NORMAL
- en: Vector space
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The concept of a **vector space** is highly related to the vector similarity
    search, as the search is conducted within the vector space represented by the
    vectors. Technically, a vector space is a mathematical construct that represents
    a collection of vectors in a high-dimensional space. The dimensions of the vector
    space correspond to the number of features or attributes associated with each
    vector. In this space, the vectors of text that are most similar have more similar
    embeddings and, therefore, are located closer to each other in the space. You
    will hear the concept of vector space referred to often when talking in more technical
    ways about similarity searches. Other common names for this *space* are **embedding
    space** and **latent space**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The concept of vector space can be helpful in visualizing how the distance
    algorithms that find the nearest vectors to our user query embedding are working.
    Using *Figure 8.2* as a reference, and ignoring the fact that these vectors are
    sometimes thousands of dimensions, we can picture them in a 2D space with its
    outer limits defined by the vectors in them, and the data points representing
    each of those vectors (see *Figure 8.2*). There are little clusters of data points
    (small dots) in various places representing semantic similarities across the different
    data points. When a search happens, a new query (X) appears in this imaginary
    space based on the user query vector dimensions, and the data points (little dots)
    that are closest to that query (X) are going to be the results of our retriever-orchestrated
    similarity search. We take all of the data points (small dots) that we are going
    to retrieve in the search result, and we turn them into query results (large dots):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2 – 2D representation of embeddings in a vector space, with X representing
    a query and large dots representing the closest embeddings from the dataset](img/B34736_08_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.2 – 2D representation of embeddings in a vector space, with X representing
    a query and large dots representing the closest embeddings from the dataset
  prefs: []
  type: TYPE_NORMAL
- en: Let’s talk through what we see here. There are four results from the query (the
    large dots). From our vantage point, in this 2D space, it looks like there are
    data points (small dots) that are closer to the query (X) than the query results
    (large dots). Why is that? You may remember that these dots were originally in
    a 1,536-dimensional space. So, if you imagine just adding one more dimension (height),
    where the dots spread toward you right out of this page, those query results (large
    dots) may actually be closer because they are all much higher than the data points
    (small dots) that seem closer. Looking straight down at them, some data points
    (small dots) may appear closer, but it is a mathematical certainty that the query
    results (large dots) are the closer ones when taking all dimensions into account.
    Expand your space to all 1,536 dimensions, and this situation becomes even more
    likely. Nevertheless, this figure can be very helpful in visualizing a vector
    space.
  prefs: []
  type: TYPE_NORMAL
- en: Semantic versus keyword search
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we’ve already said many times, vectors capture the meaning behind our data
    in a mathematical representation. To find data points similar in meaning to a
    user query, we can search for and retrieve the closest objects in a vector space
    such as the one we just showed. This is known as **semantic** or **vector search**.
    A semantic search, as opposed to keyword matching, searches for documents that
    have similar semantic meaning, rather than just the same words. As humans, we
    can say the same or similar things in so many different ways! Semantic search
    can capture that aspect of our language because it assigns similar mathematical
    values to similar concepts, whereas keyword search focuses on specific word matching
    and often misses similar semantic meanings partially or entirely.
  prefs: []
  type: TYPE_NORMAL
- en: From a technical standpoint, semantic search utilizes the meaning of the documents
    we have vectorized – that is, mathematically embedded in the vector that represents
    it. For math enthusiasts, you have to recognize the beauty of using a mathematical
    solution to solve linguistic challenges!
  prefs: []
  type: TYPE_NORMAL
- en: Let’s walk through an example to highlight how semantic search works.
  prefs: []
  type: TYPE_NORMAL
- en: Semantic search example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Think of a simple example of semantic similarity, such as a review of a blanket
    product online where one customer says the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Another customer says this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'While they are saying relatively similar things semantically, a keyword search
    would not grade this nearly as similar as a semantic search would. Here, we introduce
    a third sentence representing a random comment online for comparison:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The semantics of this random online comment are considered quite different from
    either of the last two sentences. But let’s not take my word for it, let’s do
    the math in a notebook! In the following code, we will review some of the most
    common distance metrics used as a foundational element of semantic search.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 8.1 – semantic distance metrics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The file you need to access from the GitHub repository is titled `CHAPTER8-1_DISTANCEMETRICS.ipynb`.
  prefs: []
  type: TYPE_NORMAL
- en: Our first code lab in this chapter will focus on the different ways you can
    calculate the distance between vectors, giving you a hands-on view of the difference
    between each of these approaches. We will use a brand new notebook called `CHAPTER8-1_DISTANCEMETRICS.ipynb`
    that has separate code from what we have used up to this point. We will install
    and import the packages we need, create the embeddings for the sentences we discussed,
    and then step through three types of distance metric formulas that are very common
    in NLP, generative AI, and RAG systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'We first install the open source `sentence_transformers` library that will
    set up our embedding algorithm:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The `sentence_transformers` package provides an easy way to compute dense vector
    representations for sentences and paragraphs. Next, we import some select packages
    that will aid our efforts to measure distance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Here, we add the popular NumPy library, which will provide the mathematical
    operations we need to perform our analysis of distances. As mentioned previously,
    `sentence_transformers` is imported so that we can create dense vector representations
    for our text. This will give us the ability to create instances of a pretrained
    embedding model.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this next line, we define the transformer model we want to use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This `'paraphrase-MiniLM-L6-v2'` model is one of the smaller models available
    through this package, which will hopefully make it more compatible across more
    computer environments that you may be using this code on. If you want something
    more powerful, try the `'all-mpnet-base-v2'` model, where the semantic search
    performance scores around 50% higher.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will take the sentences we mentioned previously and add them to a list we
    can reference in our code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'We then encode the sentences using our `SentenceTransformer` model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The `model.encode` function takes a list of strings and converts them into
    a list of embeddings. Our output shows us the mathematical representations (vectors)
    of our sentences:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: You’ll notice `(3, 384)` coming from the `embedding.shape` function. Do you
    remember what that is telling us? It says we have three vectors, all of which
    are 384 dimensions. So, now we know this particular `SentenceTransformer` model
    provides vectors in `384D`!
  prefs: []
  type: TYPE_NORMAL
- en: '**Fun fact**'
  prefs: []
  type: TYPE_NORMAL
- en: You may be wondering whether you can use the `sentence_transformers` library
    to generate embeddings for your RAG vector store, as we have been doing with OpenAI’s
    embedding API. The answer is a resounding yes! This is a free alternative to using
    OpenAI’s embeddings API. The all-`mpnet-base-v2` model achieves a score of approximately
    57.8% on the MTEB leaderboard, while OpenAI’s `text-embedding-ada-002` model scores
    around 61.0%, and their text-embedding-3-large model (released in January 2024)
    achieves approximately 64.6% on MTEB. As of 2025, models such as NVIDIA’s NV-Embed-v2
    and Alibaba’s `gte-Qwen2-7B-instruct` lead the MTEB leaderboard, with NV-Embed
    achieving a score of 69.32%. It’s important to note that the embedding model landscape
    has evolved rapidly, with most prominent vendors releasing new flagship models
    in late 2024 or early 2025\. The MTEB leaderboard itself has faced criticism,
    as some newer models may be overfitting to benchmark datasets by training on similar
    data, and static benchmark scores don’t always reflect real-world performance.
    Independent benchmarks show that higher-priced models don’t necessarily achieve
    better accuracy, with some models, such as Mistral-embed, achieving 77.8% accuracy
    compared to lower scores from OpenAI’s text-embedding-3-large model in certain
    retrieval tasks.
  prefs: []
  type: TYPE_NORMAL
- en: You can also fine-tune these models with your own data and potentially make
    it more effective for your RAG system than any paid API embedding service. Finally,
    for any API service, you are reliant on it being available, which is not always
    the case. Using the `sentence_transformers` model locally makes it always available
    and 100% reliable. Take a look at MTEB to find even better models that you can
    download and use in a similar way.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, we now have an environment for us to start exploring distance measures.
  prefs: []
  type: TYPE_NORMAL
- en: There are many ways to calculate the distance between vectors. Euclidean distance
    (L2), dot product, and cosine distance are the most common distance metrics used
    in NLP.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with **Euclidean** **distance** (**L2**).
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean distance (L2)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Euclidean distance calculates the shortest distance between two vectors. When
    using this to score the distance, keep in mind that we are looking for what is
    closer, so a lower value indicates higher similarity (closeness in distance).
    Let us calculate the Euclidean distance between two vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: In this function, we are calculating the Euclidean distance between two vectors,
    `vec1` and `vec2`. We first perform element-wise subtraction between the two vectors,
    and then we use NumPy’s `linalg.norm()` function to calculate the Euclidean norm
    (also known as L2 norm) of the vector. This function takes the square root of
    the sum of the squares of the vector elements. Combined, these give us the Euclidean
    distance between the two vectors.
  prefs: []
  type: TYPE_NORMAL
- en: 'We call this function here for each of the embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Running this cell gives us this output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Take a moment and look around you for the closest *thing* to you. Then, look
    for something further away. The thing that is closest to you is measured in a
    smaller distance. One foot is closer than two feet, so in this case, when you
    want it to be closer, 1 is a better score than 2\. When it comes to distance in
    semantic search, closer means it is more similar. For these results, we want to
    see a lower score to say it is more similar. `Review 1` and `Review 2` have a
    Euclidean distance of 4.6202903\. Both reviews are significantly further from
    `Random Comment`. This shows how math is used to determine how semantically similar
    or dissimilar these texts are. But as with most things in data science, we have
    several options for how to calculate these distances. Let’s take a look at another
    approach: **dot product**.'
  prefs: []
  type: TYPE_NORMAL
- en: Dot product (also called inner product)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The dot product is not technically a distance metric, as it measures the magnitude
    of the projection of one vector onto the other, which indicates similarity rather
    than distance. However, it is a metric used for similar purposes as the other
    metrics mentioned here. Since we are talking about magnitude and not closeness,
    a higher positive dot product value indicates more similarity. And so, as the
    value goes lower, or even negative, this indicates less similarity. Here, we will
    print out the dot product of each of our text strings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'In this code, we are using a NumPy function that does all the dot product computations
    for us. The output is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: In our first comparison, `Review 1` and `Review 2`, we see a score of `12.270497`.
    The positive magnitude of the dot product (12.270497) suggests a relatively high
    similarity between `Review 1` and `Review 2`. When we compare Review 1 with Random
    Comment, we see a score of -0.7654616, and `Review 2` versus `Random Comment`
    gives us a `0.95240986` dot product. These low and negative values indicate that
    there is dissimilarity or misalignment between the two vectors. These scores tell
    us that `Review 1` and `Review 2` are more similar to each other compared to their
    similarity with `Random Comment`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at our last distance metric: **cosine distance**.'
  prefs: []
  type: TYPE_NORMAL
- en: Cosine distance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Cosine distance measures the difference in directionality between the vectors.
    Given that this is another distance metric, we consider a lower value to indicate
    closer, more similar vectors. First, we set up a function to calculate the cosine
    distance between two vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice that the formula for cosine distance contains elements from both of
    our previous metrics. First, we use `np.dot(vec1, vec2)` to calculate the dot
    product between the two vectors. Then, we divide by the product of the magnitudes,
    using the same NumPy function we used for Euclidean distance to calculate the
    Euclidean norm. In this case, though, we are calculating the Euclidean norm of
    each of the vectors (rather than the difference between the vectors as we did
    with Euclidean distance) and then multiplying them. Combined, we get the cosine
    similarity, which is then subtracted as an absolute value from 1 to get the cosine
    distance. Here, we call this function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'And this is what we see in the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Just like with Euclidean distance, a lower distance value means closer, which
    means more similar. Once again, the value measuring the distance between the two
    reviews indicates much closer and similar semantics compared to either of the
    reviews and the random comment. However, it should be noted that `0.4523802399635315`
    suggests more of a moderate similarity between `Review 1` and `Review 2`. But
    the other two scores, `1.0295443572103977` and `0.9542623348534107`, indicate
    a high dissimilarity between the vectors.
  prefs: []
  type: TYPE_NORMAL
- en: From a mathematical standpoint, this indicates that “Taylor Swift” is not the
    semantic equivalent of a warm blanket!
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that there are many other distance metrics and similarity scores
    you can use for text embeddings, including **Lin similarity**, **Jaccard similarity**,
    **Hamming distance**, **Manhattan distance**, and **Levenshtein distance**. However,
    the three metrics listed previously are the most commonly used for NLP and should
    give you a good start in understanding how these metrics are calculated.
  prefs: []
  type: TYPE_NORMAL
- en: Up to this point, we have discussed dense vectors, which represent semantic
    meaning, but not all models represent semantic meaning. Some are literally just
    a count of words in the data we provide to it. These vectors are called sparse
    vectors. Let’s talk about the differences between these types of vectors and how
    we can use those differences to our advantage in RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Different search paradigms – sparse, dense, and hybrid
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are different types of vectors, and this difference is important to this
    discussion because you need to use different types of vector searches, depending
    on the type of vector you are searching. Let’s talk in depth about the differences
    between these types of vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Dense search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Dense search** (semantic search) uses a vector embedding representation of
    data to perform search. As we have talked about previously, this type of search
    allows you to capture and return semantically similar objects. It relies on the
    meaning of the data in order to perform that query. This sounds great in theory,
    but there are some limitations. If the model we are using were trained on a completely
    different domain, the accuracy of our queries would be poor. It is very dependent
    on the data it was trained on.'
  prefs: []
  type: TYPE_NORMAL
- en: Searching for data that is a reference to something (such as serial numbers,
    codes, IDs, and even people’s names) will also yield poor results. This is because
    there isn’t a lot of meaning in text like this, so no meaning is captured in the
    embeddings, and no meaning can be used to compare embeddings. When searching for
    specific references like that, it is better for string or word matching. We call
    this type of search a keyword search or sparse search, and we will discuss this
    next.
  prefs: []
  type: TYPE_NORMAL
- en: Sparse search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Sparse search** allows you to utilize keyword matching across all of your
    content. It is called **sparse embedding** because text is embedded into vectors
    by counting how many times every unique word in your vocabulary occurs in the
    query and the stored sentences. This vector has mostly zeros because the likelihood
    of any given sentence containing every word in your vocabulary is low. In mathematical
    terms, if an embedding contains mostly zeros, it is considered sparse.'
  prefs: []
  type: TYPE_NORMAL
- en: One example could be using a **bag of words**. A bag-of-words approach is where
    you count how many times a word occurs in the query and the data vector, and then
    return objects with the highest matching word frequency. This is the easiest way
    to do keyword matching.
  prefs: []
  type: TYPE_NORMAL
- en: A good example of a keyword-based algorithm is the **Best Matching 25** (**BM25**)
    algorithm. This very popular model performs really well when it comes to searching
    across many keywords. The idea behind BM25 is that it counts the number of words
    within the phrase that you are passing in, and then those that appear more than
    often are weighted as less important when the match occurs. Words that are rare
    will score much higher. Does this concept sound familiar? It uses TF-IDF, one
    of the models we reviewed in the last chapter!
  prefs: []
  type: TYPE_NORMAL
- en: 'Having these two options brings up a challenging question, though: which one
    do we use? What if we need semantic matching and keyword matching? The great news
    is we do not have to choose; we can use both in what is called **hybrid searching**!
    We will review that concept next.'
  prefs: []
  type: TYPE_NORMAL
- en: Hybrid search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hybrid search allows you to make the most of both dense and sparse search techniques
    and then fuse the return rank results together. With hybrid search, you are performing
    both vector/dense search and keyword/sparse search, and then you combine the results.
  prefs: []
  type: TYPE_NORMAL
- en: This combination can be done based on a scoring system that measures how well
    each object matches the query using both dense and sparse searches. What better
    way to illustrate how this approach works than to walk through a code lab with
    it? In the next section, we will introduce you to BM25 to conduct your keyword/sparse
    search and then combine it with our existing retriever to form a hybrid search.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 8.2 – Hybrid search with a custom function
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The file you need to access from the GitHub repository is titled `CHAPTER8-2_HYBRID_CUSTOM.ipynb`.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this code lab, we are going to start with the notebook from [*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103):
    `CHAPTER5-3_BLUE_TEAM_DEFENDS.ipynb`. Note that we are not using the [*Chapter
    6*](B34736_06_ePub.xhtml#_idTextAnchor128) or *7* code, which has a lot of miscellaneous
    code we won’t use going forward. There is an added bonus in this code lab, though;
    we are going to introduce some new elements that will carry us through the next
    couple of chapters, such as a new type of document loader for PDFs rather than
    web pages, a new, larger document with more data to search, and a new text splitter.
    We will also clean out any code we no longer need as a result of these changes.'
  prefs: []
  type: TYPE_NORMAL
- en: Once we have updated the code for these changes, we can focus on the task at
    hand, which is to use BM25 to generate our sparse vectors, combining those vectors
    with the dense vectors we have already used to form a hybrid search approach.
    We will use our previous vectorizer to generate our dense vectors. Then, we will
    search using both sets of vectors, rerank the results accounting for documents
    that appear in both retrievals, and provide a final hybrid result. BM25 has been
    around for several decades, but it is still a very effective bag-of-words algorithm
    based on TF-IDF, which we reviewed in the last chapter. It is also very quick
    to compute.
  prefs: []
  type: TYPE_NORMAL
- en: 'One interesting aspect of combining the results from the two retrievers begs
    the question: how does it rank results from two relatively different search mechanisms?
    Our dense vector search uses cosine similarity and provides a similarity score.
    Our sparse vector is based on TF-IDF and uses TF and IDF scores, which we reviewed
    in the previous chapter. These are not comparable scores. As it turns out, there
    are numerous algorithms we can use to perform the ranking among these two retrievers.
    The one we will use is called the **Reciprocal Rank Fusion** (**RRF**) algorithm.
    This lab primarily focuses on building a function that mimics the ranking approach
    that the RRF takes, so that you can walk through and understand these calculations
    yourself.'
  prefs: []
  type: TYPE_NORMAL
