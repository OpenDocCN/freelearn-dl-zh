- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: 'Agentic AI Architecture: Components and Interactions'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理人工智能架构：组件和交互
- en: In the first part of this book, we laid the foundational groundwork for understanding
    generative AI and described its progression towards more sophisticated, distributed
    AI and its evolution towards more autonomous systems. We explored the transformative
    potential of GenAI in the enterprise, charted a path towards increasingly more
    advanced capabilities using the Agentic AI Maturity Model, and then focused on
    the crucial role of LLMs as the cognitive engines powering these intelligent systems.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一部分，我们为理解生成式人工智能奠定了基础，描述了其向更复杂、分布式人工智能的进步及其向更自主系统的演变。我们探讨了GenAI在企业中的变革潜力，绘制了一条使用代理人工智能成熟度模型走向更高级能力的路径，然后重点介绍了LLMs作为这些智能系统认知引擎的关键作用。
- en: '*Chapters 2 and 3* detailed the critical considerations for selecting, deploying,
    optimizing, and adapting LLMs, through techniques ranging from RAG to fine-tuning,
    to ensure they are truly "agent-ready." We established that preparing an LLM for
    agentic tasks certainly includes prompt engineering, but it goes well beyond that.
    It also involves defining how the model interprets user intent and interacts with
    tools (APIs) through function calling; the agent requires careful preparation
    to serve as a reliable reasoning core within a larger operational construct.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*第2章和第3章* 详细介绍了选择、部署、优化和调整LLMs的关键考虑因素，通过从RAG到微调等技术的应用，以确保它们真正“适合代理”。我们确定，为代理任务准备LLM当然包括提示工程，但这远远不止于此。它还涉及定义模型如何解释用户意图以及通过函数调用与工具（APIs）交互；代理需要精心准备，以便在更大的操作结构中作为可靠的推理核心。'
- en: Having laid the groundwork for preparing an agent's cognitive core, this chapter
    shifts focus to the practical architecture necessary for developing robust and
    effective agentic AI systems.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在为代理的认知核心打下基础后，本章将重点转向开发稳健有效的代理人工智能系统所需的实际架构。
- en: We begin this chapter by examining the fundamental architecture of agentic AI,
    focusing on the core components, responsibilities, and distinguishing capabilities
    that set agents apart from simpler AI interactions. In previous chapters, we had
    established the significance of LLMs as reasoning engines, capable of adapting
    to incoming sensory input from their contextual environment and revising plans
    of action accordingly.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本章首先考察代理人工智能的基本架构，重点关注将代理与更简单的AI交互区分开来的核心组件、职责和独特能力。在之前的章节中，我们已经确定了LLMs作为推理引擎的重要性，它们能够适应来自其上下文环境的传入感官输入，并相应地修订行动计划。
- en: 'Then, we shift our perspective: an LLM, no matter how capable, is not the end
    product but a critical component within a broader, distributed operational construct.
    This marks a pivotal design paradigm shift: *from monolithic systems to dynamic
    ecosystems of intelligent, role-based AI agents*.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们转换视角：无论能力如何强大，LLM都不是最终产品，而是更广泛、分布式操作结构中的一个关键组件。这标志着设计范式的一个关键转变：*从单体系统到动态的智能、基于角色的AI代理生态系统*。
- en: We will then dissect the anatomy of an agent, examining its essential building
    blocks, from how it receives goals and perceives its environment to how it acts
    upon it. We will explore the critical role of data stores and environmental context
    that agents rely on to behave intelligently. Finally, we will introduce various
    agent interaction models and key features that define how these systems operate
    and collaborate. Understanding this architecture is the first step towards designing
    and implementing the powerful agentic patterns we will explore later in *Part*
    *2*.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将剖析代理的解剖结构，检查其基本构建块，从它如何接收目标和感知其环境到它如何对其采取行动。我们将探讨数据存储和环境上下文在代理智能行为中的关键作用。最后，我们将介绍各种代理交互模型和关键特性，这些特性定义了这些系统的操作和协作方式。理解这一架构是设计并实现我们在第2部分将要探讨的强大代理模式的第一步。
- en: 'In this chapter, we''ll be covering the following topics:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: 'Defining an agent: core concepts and capabilities'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义代理：核心概念和能力
- en: The anatomy of an agent
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理的解剖结构
- en: Data stores and environment context for agents
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理的数据存储和环境上下文
- en: Agent interaction models and key features
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理交互模型和关键特性
- en: Technical considerations for agentic architectures
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理架构的技术考虑因素
- en: Let's start by clearly defining what an AI agent is.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先明确地定义什么是人工智能代理。
- en: 'Defining an agent: core concepts and capabilities'
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定义代理：核心概念和能力
- en: In *[Chapter 1](Chapter_1.xhtml#h1_14)*, we introducedidx_6efcb56a the concept
    of agentic AI systems. It is crucial here to solidify our definition of an AI
    agent.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在*[第一章](Chapter_1.xhtml#h1_14)*中，我们介绍了idx_6efcb56a代理人工智能系统的概念。在这里，巩固我们对人工智能代理的定义至关重要。
- en: An AI agent can be understood as a system, often powered by LLMs, designed to
    perceive its environment, make decisions, and take actions to achieve specific
    goals. This definition describes a more autonomous entity with ongoing objectives
    that operates beyond simply responding to a prompt.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一个AI代理可以被理解为一种系统，通常由LLM提供动力，旨在感知其环境，做出决策，并采取行动以实现特定目标。这个定义描述了一个更自主的实体，它具有持续的目标，并超越了仅仅对提示做出反应。
- en: 'Several key characteristics idx_8e9618c2distinguish true AI agents from more
    basic LLM interactions:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 几个关键特征idx_8e9618c2区分了真正的AI代理与更基本的LLM交互：
- en: '**Autonomy**: Agents possess a degree of self-governance, enabling them to
    operate independently to achieve their goals without constant direct human intervention.
    Once a goal is set, an agent can determine the steps needed to reach it.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主性**：代理拥有一定程度的自我治理能力，使它们能够独立地实现目标，而无需持续的直接人类干预。一旦设定了目标，代理就可以确定达到该目标所需的步骤。'
- en: '**Reactivity (or** **s****ensing)**: Agents are capable of perceiving their
    operational environment and responding to changes or events within it. This "sensing"
    is a key aspect of agentic behavior.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反应性（或** **感知****）：代理能够感知其操作环境，并对其中的变化或事件做出反应。这种“感知”是代理行为的关键方面。'
- en: '**Proactivity (or** **g****oal-****o****rientation)**: Agents do not merely
    react; they take initiative and act in a goal-directed manner. They strive to
    achieve their defined objectives, which might involve complex planning and execution
    of tasks over time.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动性（或** **目标导向****）：代理不仅做出反应；它们采取主动，并以目标为导向行事。它们努力实现其定义的目标，这可能涉及复杂的规划和执行任务。'
- en: '**Social ability (****o****ptional but common, especially in multi-agent systems)**:
    Many agents, particularly those in multi-agent systems, can interact and communicate
    with other agents and humans. They use agreed-upon languages and protocols to
    collaborate, negotiate, or coordinate actions'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**社交能力（** **可选但常见，尤其是在多代理系统中）**：许多代理，尤其是多代理系统中的代理，可以与其他代理和人类进行交互和沟通。它们使用约定的语言和协议来协作、谈判或协调行动。'
- en: It is essential to idx_3aa046e6clearly distinguish agentic AI from both simple
    LLM interactions and traditional automated workflows. While all three—LLMs, automated
    workflows, and AI agents—play a role in modern systems, they represent fundamentally
    different levels of capability and autonomy, as illustrated in the following hierarchy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 明确区分代理AI与简单的LLM交互和传统的自动化工作流程至关重要。虽然LLMs、自动化工作流程和AI代理在现代系统中都发挥作用，但它们代表了根本不同的能力和自主性水平，如下面的层次结构所示。
- en: '![Image 1](img/B33147_4_1.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图像 1](img/B33147_4_1.png)'
- en: Figure 4.1 – The hierarchy of autonomy
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1 – 自主性的层次结构
- en: LLMs
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs
- en: LLMs serve idx_18ea3cd7as the idx_5db16788foundational reasoning core or "brain"
    of the agent; they are the engine that powers understanding, planning, and content
    generation. For the purposes of our discussion, we use the terms LLM and MMM synonymously,
    though the distinction is technically significant.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs作为idx_18ea3cd7代理的基础推理核心或“大脑”；它们是推动理解、规划和内容生成的引擎。在我们的讨论中，我们将LLM和MMMs这两个术语同义使用，尽管在技术上它们之间的区别是重要的。
- en: '**Multi-****modal mo****dels (MMMs)** represent aidx_a2bdf8e4 significant evolution
    in this layer. Unlike earlyidx_95be22a9 models trained solely on text, modern
    MMMs (such as Google Gemini 3) are trained on massive datasets of text, code,
    images, audio, and video. This allows them to project different modalities into
    a shared semantic space, enabling native reasoning across inputs. For example,
    an MMM can analyze a screenshot of a dashboard to diagnose a system error, or
    listen to an audio file to extract sentiment, without relying on separate, disjointed
    translation models.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**多模态模型（MMMs）**代表了idx_a2bdf8e4在这一层的重要进化。与早期idx_95be22a9仅基于文本数据集训练的模型不同，现代MMMs（如Google
    Gemini 3）在文本、代码、图像、音频和视频的庞大数据集上训练。这使得它们能够将不同的模态投影到共享的语义空间中，从而实现输入的本地推理。例如，一个MMM可以分析仪表盘的截图来诊断系统错误，或者通过音频文件来提取情感，而不依赖于单独的、不连贯的翻译模型。'
- en: However, an MMM is *not* an agent. Despite these advanced perceptual capabilities,
    the model itself remains inherently stateless and passive. It processes input
    and predicts output, but it does not initiate actions, maintain a long-term memory
    of its own volition, or pursue goals independently. It only responds when prompted.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一个MMM不是一个代理。尽管这些感知能力很先进，但模型本身仍然本质上是无状态的、被动的。它处理输入并预测输出，但它不会主动采取行动、维持自己的长期记忆或独立追求目标。它只会在被提示时做出响应。
- en: This contrasts with centralized, reactive models with distributed, agentic systems
    that operate cooperatively in swarms, coalitions, or societies. While the model
    provides the raw intelligence, it is the surrounding agent architecture that transforms
    this passive potential into active, goal-directed behavior.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这与集中式、反应式模型形成对比，后者是分布式的、具有代理系统的系统，它们在群体、联盟或社会中协同工作。虽然模型提供了原始智能，但周围代理架构将这种被动潜力转化为主动、目标导向的行为。
- en: Automated workflows
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化工作流程
- en: An idx_7f196370automated workflow, or AI orchestration, is a sequence of tasks
    idx_30f18b8csome of which are predetermined and deterministic, while others may
    be non-deterministic, relying on intent interpretation and function calling.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自动化的工作流程，或AI编排，是一系列任务，其中一些是预先确定的和确定性的，而其他可能是非确定性的，依赖于意图解释和函数调用。
- en: Think of it as a script that executes a series of `if-this-then-that` steps.
    While it performs actions, it is deterministic and rigid, following a fixed path.
    It lacks the ability to reason, plan dynamically, or adapt its behavior to unforeseen
    circumstances.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 可以将其视为执行一系列“如果这个，那么那个”步骤的脚本。虽然它执行操作，但它具有确定性和刚性，遵循固定的路径。它缺乏推理、动态规划或适应不可预见情况的能力。
- en: AI agents
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI代理
- en: An AI agent is theidx_3865994b most sophisticated of the three. It is a complete
    system that idx_906f8f8buses an LLM as its "brain" to autonomously achieve a goal.
    An agent is goal-oriented, stateful, and adaptive. Unlike a simple workflow, an
    agent can reason about its environment, create a dynamic plan, use tools to execute
    that plan, and learn from the outcomes to improve its future performance.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理是三者中最复杂的。它是一个完整的系统，使用LLM作为其“大脑”来自主实现目标。代理是目标导向的、有状态的、可适应的。与简单的流程不同，代理可以对其环境进行推理，制定动态计划，使用工具执行该计划，并从结果中学习以改进其未来的表现。
- en: For instance, an LLM might draft an email when prompted. An automated workflow
    might send a pre-written email every Monday at 9 AM. An AI agent, however, could
    be tasked with managing an entire inbox, proactively categorizing emails, using
    tools to schedule meetings based on email content, and alerting the user to urgent
    matters, all while learning the user's preferences over time.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当被提示时，一个LLM可能会起草一封电子邮件。一个自动化的工作流程可能会在每周一早上9点发送预先编写的电子邮件。然而，一个AI代理可能被分配管理整个收件箱，主动对电子邮件进行分类，使用工具根据电子邮件内容安排会议，并在必要时提醒用户紧急事项，同时随着时间的推移学习用户的偏好。
- en: 'To further clarify these differences, the following table provides a direct
    comparison:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步阐明这些差异，以下表格提供了一个直接的比较：
- en: '| **Characteristic** | **LLM** | **Automated** **w****orkflow** | **AI** **a****gent**
    |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| **特征** | **LLM** | **自动化** **工作流程** | **AI** **代理** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Core function | Generates text, answers questions, synthesizes information
    based on a prompt. | Executes a predefined, static sequence of tasks. | Autonomously
    achieves a specific goal. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 核心功能 | 根据提示生成文本、回答问题、综合信息。 | 执行预定义的、静态的任务序列。 | 自主实现特定目标。 |'
- en: '| Decision-making | Pattern matching and probabilistic text generation. Does
    not make decisions. | Based on hard-coded, `if-this-then-that` logic. Does not
    reason. | Reasons, plans, and makes dynamic decisions to navigate complex problems.
    |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 决策 | 模式匹配和概率性文本生成。不做出决策。 | 基于硬编码的“如果这个，那么那个”逻辑。不进行推理。 | 进行推理、制定计划并做出动态决策以解决复杂问题。
    |'
- en: '| State and memory | Stateless: each interaction is new (though context can
    be passed in). | Generally stateless; does not remember past executions. | Stateful:
    maintains short-term and long-term memory to learn and adapt. |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 状态和记忆 | 无状态：每次交互都是新的（尽管可以传递上下文）。 | 通常无状态；不记得过去的执行。 | 有状态：维护短期和长期记忆以学习和适应。
    |'
- en: '| Adaptability | Does not adapt unless fine-tuned or supported by new prompting
    techniques. | Rigid: any change to the process requires re-programming the workflow.
    | Highly adaptive; learns from experience and reacts to changes in its environment.
    |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 适应性 | 除非微调或由新的提示技术支持，否则不会适应。 | 刚硬的：对流程的任何更改都需要重新编程工作流。 | 高度适应性强；从经验中学习并对环境中的变化做出反应。
    |'
- en: '| Interaction model | Receives a prompt, returns a response. | Triggered by
    an event, executes a fixed script. | Operates in a continuous sense-reason-plan-act
    loop to pursue its goals. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 交互模型 | 接收提示，返回响应。 | 由事件触发，执行固定脚本。 | 在持续的感觉-推理-计划-行动循环中运行以追求其目标。 |'
- en: '| Failure handling | Passive/None: May generate plausible but incorrect info
    (hallucination) without awareness of failure. | Rigid/Brittle: Fails hard or triggers
    a pre-set exception path (e.g., "stop and alert admin") when specific rules are
    broken. | Resilient/Self-correcting: Can detect errors, reflect on the cause,
    and autonomously retry with a different strategy or tool. |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 失败处理 | 被动的/无：可能在未意识到失败的情况下生成看似合理但错误的信息（幻觉）。 | 刚硬的/脆弱的：在违反特定规则时硬性失败或触发预置的异常路径（例如，“停止并警告管理员”）。
    | 弹性的/自我纠正的：可以检测错误，反思原因，并自主地采用不同的策略或工具重试。 |'
- en: Table 4.1 – Comparing LLMs, automated workflows, and AI agents
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.1 – 比较LLMs、自动化工作流和AI代理
- en: In essence, an agent is a system that integrates and elevates the capabilities
    of the other two. It leverages an LLM for its reasoning power but places it within
    a structure that allows for the autonomous, goal-driven execution of tasks in
    a way that a static workflow cannot.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，代理是一个系统，它整合并提升了其他两个系统的能力。它利用LLM的推理能力，但将其置于一个允许自主、目标驱动的任务执行结构中，这是静态工作流所不能做到的。
- en: With these foundational concepts and distinctions established, let's now examine
    the internal structure that brings these powerful agentic characteristics to life.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些基础概念和区分建立之后，我们现在来考察那些赋予这些强大代理特性生命力的内部结构。
- en: The anatomy of an agent
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理的解剖结构
- en: As introducedidx_9777fe61 previously, an AI agent's functionality can be understood
    through its core components. While our earlier discussion provided a high-level
    overview, this section revisits that anatomy from an architectural perspective.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述idx_9777fe61，AI代理的功能可以通过其核心组件来理解。虽然我们之前的讨论提供了一个高级概述，但本节从架构的角度重新审视了该解剖结构。
- en: 'We will now frame these components not just as concepts, but as the functional
    building blocks that enable an agent''s continuous operational loop: perceiving
    the environment, reasoning to form a plan, and acting to achieve its goals. Understanding
    this structure is essential for implementing the design patterns that follow.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将这些组件不仅视为概念，而且视为使代理的持续操作循环功能化的功能构建块：感知环境、推理以形成计划，并采取行动以实现其目标。理解这种结构对于实现后续的设计模式至关重要。
- en: 'Each individual agent possesses an internal structure comprising the following
    building blocks, which are summarized in the table below with their architectural
    roles:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 每个单独的代理都拥有以下构建块组成的内部结构，这些构建块在下面的表中总结了它们的架构角色：
- en: '| **Component** | **Core** **f****unction (****r****ecap)** | **Architectural**
    **role** **and** **imp****lementation** |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **组件** | **核心功能（**摘要**） | **架构角色** **和** **实现** |'
- en: '| --- | --- | --- |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Goals(Specified through Instructions) | The objectives or desired outcomes
    the agent seeks to achieve. | Defines the agent''s objective function and directs
    its high-level planning. Implemented as configuration parameters or a dynamic
    state that can be updated. |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| 目标（通过指令指定） | 代理寻求实现的目标或期望的结果。 | 定义代理的目标函数并指导其高级规划。作为配置参数或可以更新的动态状态实现。 |'
- en: '| Sense (Perception) | Gathers information and data from its environment (digital
    or physical). | Serves as the input layer. Implemented via API listeners, data
    stream processors, or standardized protocols such as Model Context Protocol (MCP).
    |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| 感知（感知） | 从其环境（数字或物理）收集信息和数据。 | 作为输入层。通过API监听器、数据流处理器或标准化协议（如模型上下文协议[MCP]）实现。
    |'
- en: '| Reason (Cognition) | The core processing unit where sensed information is
    analyzed and interpreted. | This is the cognitive core where the agent-ready LLM
    is integrated. It interprets inputs, evaluates them against goals, and formulates
    high-level strategies. |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 推理（认知） | 分析和解释感知信息的核心处理单元。 | 这是认知核心，其中集成了准备好的代理 LLM。它解释输入，根据目标评估它们，并制定高级策略。
    |'
- en: '| Plan | Devises a sequence of actions based on reasoned insights to achieve
    its goals. | The tactical layer, also powered by the LLM. It breaks down the high-level
    strategy from the *Reason* component into a concrete, ordered sequence of executable
    steps or tool calls. |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 计划 | 根据推理洞察制定一系列动作以实现其目标。 | 战术层，也由 LLM 驱动。它将 *推理* 组件中的高级策略分解为具体的、有序的可执行步骤或工具调用。
    |'
- en: '| Act (Action) | Executes the planned actions upon the environment using available
    tools. | Serves as the output layer. Implemented by invoking tools: calling external
    APIs, executing code, sending commands to actuators, or generating responses.
    |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 行动（行动） | 使用可用的工具在环境中执行计划中的动作。 | 作为输出层。通过调用工具实现：调用外部 API、执行代码、向执行器发送命令或生成响应。
    |'
- en: '| Memory | Stores the agent''s knowledge, experiences, and state to provide
    context for decisions. | Manages state. Implemented using short-term variables
    for the current task and long-term persistent stores such as vector databases
    for RAG or user preferences. |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 记忆 | 存储代理的知识、经验和状态，为决策提供上下文。 | 管理状态。使用短期变量实现当前任务，使用如向量数据库的 RAG 或用户偏好的长期持久存储。
    |'
- en: '| Coordinate | Interacts with other agents to align actions and collaborate
    toward collective goals (primarily in multi-agent systems). | The inter-agent
    communication layer. This component manages the full life of a task, tracking
    standardized agent-to-agent (A2A) states such as submitted, working, input-required,
    and completed. It is implemented via protocols like the Agent2Agent (A2A) protocol,
    enabling agents to delegate work and synchronize state deterministically across
    distributed boundaries. |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 协调 | 与其他代理互动，以协调动作并朝着集体目标（主要在多代理系统中）协作。 | 代理间通信层。此组件管理任务的整个生命周期，跟踪标准化的代理到代理（A2A）状态，如提交、工作、输入所需和完成。它通过如
    Agent2Agent（A2A）协议等协议实现，使代理能够在分布式边界上确定性地委托工作并同步状态。 |'
- en: Table 4.2 – The architectural roles of agent components
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.2 – 代理组件的架构角色
- en: These building idx_c1047049blocks are not static; they operate in a continuous
    cycle. The agent *senses* its environment, *reasons* about the new information
    in the context of its *goals* and *memory*, formulates a *plan*, and then *acts*
    upon the environment.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这些建筑 idx_c1047049 块不是静态的；它们在一个连续的循环中运行。代理 *感知* 它的环境，根据其 *目标* 和 *记忆* 对新信息进行 *推理*，制定
    *计划*，然后对环境 *行动*。
- en: The results of this action are then sensed in the next iteration, creating a
    powerful feedback loop that allows the agent to learn and adapt its behavior over
    time. It is this dynamic, operational loop (built upon these architectural components)
    that is the foundation for the more complex behaviors and design patterns we will
    explore throughout the rest of this book.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 此行动的结果将在下一次迭代中被感知，从而形成一个强大的反馈循环，使代理能够随着时间的推移学习和适应其行为。正是这个动态的操作循环（建立在这些架构组件之上），是我们将在本书的其余部分探索的更复杂行为和设计模式的基础。
- en: To transition these architectural concepts from theory to practice, we will
    now explore two distinct case studies. These examples were specifically chosen
    to demonstrate the agent's anatomy operating at different scales of complexity.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将这些架构概念从理论转化为实践，我们现在将探索两个不同的案例研究。这些例子被特别选择来展示代理在不同复杂度级别上的解剖结构。
- en: First, we will examine a Travel Planning Agent, a relatable single-agent system
    that clearly illustrates how the core building blocks—*Goals*, *Sense*, *Reason*,
    *Plan*, *Act*, and *Memory*—work in concert to fulfill a user's request from start
    to finish.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将考察一个旅行规划代理，这是一个相关的单代理系统，它清楚地说明了核心构建块——*目标*、*感知*、*推理*、*计划*、*行动* 和 *记忆*——如何协同工作，从开始到结束满足用户的需求。
- en: Then, we will idx_03efc1b5analyze an Agentic Loan Processing System, which showcases
    a more sophisticated multi-agent architecture. This enterprise-grade example will
    highlight how multiple specialized agents collaborate, coordinate, and share context
    to manage a complex, end-to-end business workflow.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将分析一个代理贷款处理系统，它展示了更复杂的多代理架构。这个企业级示例将突出多个专业代理如何协作、协调和共享上下文来管理复杂、端到端的企业工作流程。
- en: Together, these case studies provide a practical lens through which to understand
    both the fundamental components of a single agent and the architectural principles
    of a multi-agent system in action.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究共同提供了一个实用的视角，通过这个视角可以理解单个代理的基本组件以及多代理系统在实际操作中的架构原则。
- en: 'Case study: Travel Planning Agent'
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究：旅行规划代理
- en: 'To betteridx_39636539 illustrate how these building blocks function together,
    let''sidx_1e6d3bfd consider a practical example: an autonomous Travel Planning
    Agent. The agent''s primary goal is to book a complete travel itinerary based
    on a user''s natural language request, interacting with various external systems
    to accomplish its task.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地说明这些构建块如何协同工作，让我们考虑一个实际例子：一个自主的旅行规划代理。该代理的主要目标是根据用户的自然语言请求预订完整的旅行行程，通过与各种外部系统交互来完成其任务。
- en: 'The following table breaks down each component of the agent''s anatomy within
    the context of this example:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下表根据本例的上下文分解了代理解剖的每个组件：
- en: '| **Anatomy** **c****omponent** | **Travel Planning Agent** **e****xample**
    |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| **解剖** **组件** | **旅行规划代理** **示例** |'
- en: '| --- | --- |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Goals | The agent''s primary objective is to fulfill the user''s request:
    "Book a round-trip flight to Paris and a 4-star hotel for 5 nights next month,
    keeping the total cost under $2500." This goal is dynamic and can be updated if
    the user changes their mind or provides new constraints. |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| 目标 | 代理的主要目标是满足用户的请求：“下个月预订往返巴黎的往返机票和4星级酒店，住宿5晚，总费用不超过2500美元。”这个目标是动态的，如果用户改变主意或提供新的约束，则可以更新。
    |'
- en: '| Sense (Perception) | The agent gathers initial information by processing
    the user''s natural language request. It continues to "sense" by receiving data
    back from external systems, such as a list of available flights from an airline
    API or pricing information from a hotel booking service. |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| 感知（感知） | 代理通过处理用户的自然语言请求来收集初始信息。它通过接收来自外部系统的数据继续“感知”，例如来自航空公司API的可用航班列表或来自酒店预订服务的定价信息。'
- en: '| Reason (Cognition) | The LLM core analyzes the user''s explicit preferences
    ("Paris," "4-star," "5 nights") and implicit intent. It interprets the structured
    data from flight and hotel searches, compares options against the budget constraint,
    and performs complex inference to determine the optimal itinerary. |'
  id: totrans-76
  prefs: []
  type: TYPE_TB
  zh: '| 推理（认知） | LLM核心分析用户的明确偏好（“巴黎”、“4星级”、“5晚”）和隐含意图。它解释航班和酒店搜索的结构化数据，将选项与预算约束进行比较，并执行复杂的推理以确定最佳行程。'
- en: '| Plan | Based on its reasoning, the agent devises a sequence of steps:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '| 计划 | 基于其推理，代理制定了一系列步骤：'
- en: Deconstruct user requests into sub-tasks (flight booking, hotel booking).
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将用户请求分解为子任务（机票预订、酒店预订）。
- en: Execute flight search.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行航班搜索。
- en: Execute hotel search.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行酒店搜索。
- en: Analyze results to find a valid combination that meets all constraints.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析结果以找到满足所有约束的有效组合。
- en: Present the final itinerary to the user for confirmation.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向用户展示最终行程以供确认。
- en: Execute the final booking actions.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行最终预订操作。
- en: '|'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Act (Action) | The agent executes its plan by using available tools. This
    involves calling a flight search API (e.g., `search_flights``(destination="``CDG``",`
    `month="next")`) and a hotel API (e.g., `find_hotels``(city="Paris", rating=4,
    nights=5)`). After confirmation, it acts again by calling booking functions and
    generating a final confirmation message, and updating the user''s long-term profile
    with these new preferences for future interactions. |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| 行动（行动） | 代理通过使用可用工具执行其计划。这包括调用航班搜索API（例如，`search_flights``(destination="``CDG``",`
    `month="next")`)和酒店API（例如，`find_hotels``(city="Paris", rating=4, nights=5)`）。确认后，它再次通过调用预订函数和生成最终确认消息，以及更新用户的长期配置文件以包含这些新偏好，以供未来交互使用。
    |'
- en: '| Memory | The agent uses short-term memory to store the user''s preferences,
    the flight and hotel options it found, and the conversation history for the current
    task. It might use long-term memory to recall the user''s preferred airline or
    hotel chain from past interactions to personalize future suggestions. |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| 记忆 | 智能体使用短期记忆来存储用户的偏好、它找到的航班和酒店选项以及当前任务的对话历史。它可能使用长期记忆来回忆用户过去互动中偏好的航空公司或酒店连锁，以实现未来建议的个性化。
    |'
- en: '| Coordinate | If this were a multi-agent system, the Travel Agent might coordinate
    with other specialized agents. For example, after booking the main trip, it could
    delegate a task to an "Excursion Agent" by sending a message such as "Find and
    book a ticket for the Louvre Museum," collaborating towards the collective goal
    of planning the entire trip. |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| 坐标 | 如果这是一个多智能体系统，旅行社可能会与其他专业智能体进行协调。例如，在预订主要行程后，它可以通过发送“找到并预订卢浮宫博物馆的门票”之类的消息，将任务委托给“短途旅行代理”，共同为实现规划整个行程的集体目标而努力。
    |'
- en: Table 4.3 – Agent components in a use case
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.3 – 用例中的智能体组件
- en: This idx_17635f4bexample idx_4776469ddemonstrates how the abstract components
    of an agent's anatomy translate into concrete operations. The continuous loop
    of sensing the user's needs, reasoning about the options, planning the steps,
    and acting via tools is what allows the agent to move from a simple request to
    a complex, successfully completed goal.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 idx_17635f4b 示例 idx_4776469dd 展示了智能体解剖结构的抽象组件如何转化为具体操作。通过持续循环地感知用户需求、推理选项、规划步骤并通过工具采取行动，使智能体能够从简单的请求发展到复杂且成功完成的任务。
- en: 'Case study: Agentic Loan Processing System'
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究：智能体贷款处理系统
- en: Here is anidx_280fb6b8 application of *Figure 1.1* *–* *Agentic anatomy* to
    a loan processing case study, using each component of the agent architectureidx_ab7f7241
    from your description. This maps the theory into practice and shows how agentic
    systems function across a full stack, multi-agent loan approval workflow.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对 *图 1.1* *–* *智能体解剖结构* 在贷款处理案例研究中的应用，使用您描述的智能体架构的每个组件 idx_ab7f7241。这把理论映射到实践中，展示了智能体系统如何在全栈、多智能体贷款审批工作流程中运行。
- en: A financial institution deploys a multi-agent system to automate and optimize
    its loan application process. The workflow spans from initial customer interaction
    to final disbursement, involving data verification, credit assessment, risk scoring,
    compliance checks, and final approval. Each agent specializes in a distinct phase
    of this pipeline, using the A2A protocol to communicate and coordinate tasks while
    accessing a shared memory layer for consistent context.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 金融机构部署多智能体系统来自动化和优化其贷款申请流程。工作流程从最初的客户互动到最终的发放，涉及数据验证、信用评估、风险评估、合规性检查和最终批准。每个智能体专注于该管道的特定阶段，使用
    A2A 协议进行通信和协调任务，同时访问共享内存层以保持一致的上下文。
- en: '![Image 2](img/B33147_4_2.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图像 2](img/B33147_4_2.png)'
- en: 'Figure 4.2 – Use case example: Agentic loan processing'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.2 – 用例示例：智能体贷款处理
- en: '| **Component** | **Loan Processing Agent** **e****xample** |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
  zh: '| **组件** | **贷款处理智能体** **示例** |'
- en: '| --- | --- |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Goals | Each agent has a specialized goal aligned to its role:`Intake Agent`:
    Gathers complete applicant data.`Credit Check Agent`: Validates credit history
    and flags anomalies.`Risk Assessment Agent`: Scores the applicant''s risk profile.`Compliance
    Agent`: Verifies adherence to regulatory rules.`Approval Agent`: Makes final loan
    decision based on holistic inputs. |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| 目标 | 每个智能体都有一个与其角色相对应的专业目标：`录入智能体`：收集完整的申请人数据。`信用检查智能体`：验证信用历史并标记异常。`风险评估智能体`：评估申请人的风险配置文件。`合规性智能体`：验证是否符合监管规则。`批准智能体`：根据全面输入做出最终的贷款决定。
    |'
- en: '| Sense (Perception) | Agents gather data via:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '| 感知（感知） | 智能体通过以下方式收集数据：'
- en: Intake forms (natural language, structured data)
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 录入表格（自然语言，结构化数据）
- en: API calls to credit bureaus
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对信用局的 API 调用
- en: Internal CRM and KYC databases
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内部 CRM 和 KYC 数据库
- en: Document OCR
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档 OCR
- en: Real-time market feeds (for variable rate loans)
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时市场数据（用于可变利率贷款）
- en: Each agent uses MCP to access consistent structured and unstructured data contextually.
    |
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 每个智能体使用 MCP 来根据上下文访问一致的结构化和非结构化数据环境。 |
- en: '| Reason (Cognition) | Powered by an LLM, agents reason over:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '| 理由（认知） | 由大型语言模型（LLM）驱动，智能体推理：'
- en: Financial document semantics (e.g., pay stubs, bank statements)
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财务文件语义（例如，工资条、银行对账单）
- en: Policy rules and risk guidelines
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 政策规则和风险指南
- en: Inferred intent from applicant's queries
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从申请人查询中推断出的意图
- en: Contradictions in data (e.g., income mismatch)
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据中的矛盾（例如，收入不匹配）
- en: The cognitive core evaluates inputs against agent goals. |
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 认知核心评估输入与代理目标的一致性。|
- en: '| Plan | Plans are agent-specific:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '| 计划 | 计划是针对特定代理的：'
- en: '`Intake Agent` plans follow-ups for missing info.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Intake Agent`计划对缺失信息进行后续处理。'
- en: '`Credit Check Agent` plans which credit bureaus to query (e.g., Equifax, TransUnion)
    and in what order, and defines a strategy for handling API failures or data discrepancies.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Credit Check Agent`计划查询哪些信用局（例如，Equifax、TransUnion）以及顺序，并定义处理API失败或数据差异的策略。'
- en: '`Risk Agent` chooses a scoring model based on loan type.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Risk Agent`根据贷款类型选择评分模型。'
- en: '`Compliance Agent` selects required checks based on jurisdiction.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Compliance Agent`根据司法管辖区选择所需的检查。'
- en: '`Approval Agent` builds a decision tree integrating outputs from others.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Approval Agent`构建一个决策树，整合来自其他代理的输出。'
- en: '|'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Act (Action) | Agents act by:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '| 行动（动作） | 代理通过以下方式行动：'
- en: Sending verification emails
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送验证电子邮件
- en: Updating loan status in CRM
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在CRM中更新贷款状态
- en: Calling APIs to retrieve or write data
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用API检索或写入数据
- en: Generating compliance audit trails
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成合规审计跟踪
- en: Triggering downstream agents upon task completion
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成任务后触发下游代理
- en: '|'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Memory | Two layers:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '| 记忆 | 两层：'
- en: '**Short-term**: Applicant-specific session memory'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短期**：申请人特定的会话记忆'
- en: '**Long-term**: Aggregated fraud patterns, historical decisions, regulatory
    changes'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长期**：聚合的欺诈模式、历史决策、监管变化'
- en: Memory allows learning-based improvement (e.g., adjusting for new risk indicators).
    |
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆允许基于学习的改进（例如，调整新的风险指标）。|
- en: '| Coordinate | Coordination is enabled by the **A2A Protocol** (Google''s Agent2Agent
    Interoperability Protocol), which acts as the communication layer:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '| 协调 | 协调是通过**A2A协议**（Google的Agent2Agent互操作性协议）实现的，它作为通信层：'
- en: Provides a secure and standard channel for agents to delegate tasks and exchange
    information.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为代理提供一个安全和标准的渠道，以便委派任务和交换信息。
- en: Allows agents to report on task status (e.g., `working`, `completed`, `failed`)
    back to the delegating agent.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 允许代理向委派代理报告任务状态（例如，`working`、`completed`、`failed`）。
- en: Enables interoperability, allowing agents built on different platforms to collaborate
    without sharing their internal memory or logic.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现互操作性，允许基于不同平台构建的代理能够协作，而无需共享其内部记忆或逻辑。
- en: '|'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Table 4.4 – Agentic anatomy components in loan processing
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.4 – 贷款处理中的代理解剖组件
- en: 'Illustrative flow: loan application lifecycle'
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 说明性流程：贷款申请生命周期
- en: Customer idx_a166985esubmits a loan application → `Intake Agent` parses and
    stores in shared memory.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户idx_a166985e提交贷款申请 → `Intake Agent`解析并存储在共享内存中。
- en: '`Credit Check Agent` is triggered → retrieves FICO and credit history via API.'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Credit Check Agent`被触发 → 通过API检索FICO和信用历史。'
- en: '`Risk Agent` reasons over credit + income + loan amount → assigns risk score.'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Risk Agent`根据信用、收入和贷款金额进行推理 → 分配风险评分。'
- en: '`Compliance Agent` checks KYC, AML, GDPR, and local banking rules.'
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Compliance Agent`检查KYC、AML、GDPR和本地银行规则。'
- en: '`Approval Agent` integrates inputs, reasons over conflicts, and makes the approval
    decision.'
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Approval Agent`整合输入，解决冲突，并做出批准决定。'
- en: If rejected, `Appeals Agent` may offer alternative products (e.g., secured loan).
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果被拒绝，`Appeals Agent`可能会提供替代产品（例如，担保贷款）。
- en: '`Disbursement Agent` executes fund release and updates backend systems.'
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Disbursement Agent`执行资金释放并更新后端系统。'
- en: Multi-agent coordination via A2A
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过A2A进行多代理协调
- en: Agents collaborateidx_54cd95a8 by sending structured tasks to one another using
    a defined protocol such as A2A. This is a form of direct communication, where
    a sending agent explicitly delegates a job to a specific receiving agent.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 代理通过使用定义良好的协议（如A2A）相互发送结构化任务进行协作。这是一种直接通信形式，其中发送代理明确地将工作委派给特定的接收代理。
- en: For instance, instead of publishing a score to a general bus, the orchestrator
    agent would first send a task to the `Risk Agent`. Upon receiving the result,
    it would then send a *new* task to the `Approval Agent`, including the risk score
    as part of the payload. This creates a clear, auditable chain of delegation.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，而不是将评分发布到通用总线上，协调代理会首先将任务发送给`Risk Agent`。在收到结果后，它会发送一个*新的*任务给`Approval Agent`，包括作为有效负载的一部分的风险评分。这创建了一个清晰、可审计的委派链。
- en: Disputes or edge cases (e.g., borderline credit scores) can invoke a deliberation
    loop. This is handled through a sequence of A2A messages where agents can exchange
    offers, counter-offers, or escalate the task to a different agent or a human for
    resolution.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 争议或边缘情况（例如，边缘信用评分）可以引发审议循环。这通过一系列A2A消息来处理，其中代理可以交换出价、还价或升级任务到不同的代理或人类以解决。
- en: 'The benefits of applying agentic anatomy to loan processing include the following:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 将代理解剖学应用于贷款处理的好处包括以下内容：
- en: '**Responsiveness**: Agents react to changes in real-time data (e.g., credit
    score fluctuation).'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应性**：代理对实时数据的变化做出反应（例如，信用评分波动）。'
- en: '**Compliance by design**: Modular rules embedded within agents and shared policy
    layers.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计合规性**：在代理和共享策略层内嵌入的模块化规则。'
- en: '**Transparency**: Memory logs and reasoning traces aid in audits and regulatory
    checks.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度**：内存日志和推理轨迹有助于审计和监管检查。'
- en: '**Adaptability**: Agents can evolve independently; e.g., the `Risk Agent` can
    be replaced with a newer LLM model.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应性**：代理可以独立进化；例如，可以将 `Risk Agent` 替换为更新的 LLM 模型。'
- en: These benefits demonstrate how an agent's internal structure enables intelligent
    and resilient behavior. However, this intelligence is not derived solely from
    its internal design; it is critically dependent on the richness and relevance
    of the data it can access from its environment. We will now examine the various
    data stores and contextual sources that agents rely on to perceive, reason, and
    act effectively.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这些好处展示了代理的内部结构如何使其表现出智能和弹性行为。然而，这种智能并非仅仅来自其内部设计；它关键地依赖于其从环境中可以访问的丰富和相关的数据。我们现在将检查代理依赖的各种数据存储和上下文来源，以有效地感知、推理和行动。
- en: Data stores and environment context for agents
  id: totrans-153
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理的数据存储和环境上下文
- en: As we idx_77ac788bemphasized in *[Chapter 1](Chapter_1.xhtml#h1_14)*, *context
    is king*, and this principle is especially true for agentic systems that must
    make informed decisions and take appropriate actions. Agents rely heavily on various
    data stores and contextual information from their surroundings to perceive, reason,
    and act effectively.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在 *[第 1 章](Chapter_1.xhtml#h1_14)* 中强调的，*上下文为王*，这一原则对于必须做出明智决策并采取适当行动的代理系统尤其正确。代理严重依赖其周围的各种数据存储和上下文信息，以有效地感知、推理和行动。
- en: The following figure illustrates this high-stakes dynamic. It contrasts a healthy,
    grounded workflow where rich context enables accurate reasoning against specific
    failure modes where stale memory or failed retrieval leads to incorrect actions.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了这一高风险动态。它对比了一个健康的、接地的工作流程，其中丰富的上下文使得能够对特定的故障模式进行准确的推理，而陈旧的内存或检索失败会导致不正确的行动。
- en: '![Image 3](img/B33147_4_3.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图像 3](img/B33147_4_3.png)'
- en: Figure 4.3 – Contextual inputs versus grounding failures
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.3 – 上下文输入与接地故障对比
- en: 'The environment context idx_d7771755for an agent can be broadly categorized
    as follows:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的环境上下文 idx_d7771755 可以广泛分为以下类别：
- en: '**Digital business context**: Thisidx_c7710af7 encompasses all relevant digital
    data sources that an agent might interact with or draw information from within
    an enterprise or online environment. Key types include the following:'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字业务上下文**：Thisidx_c7710af7 包括代理可能在企业或在线环境中与之交互或从中获取信息的所有相关数字数据源。关键类型包括以下内容：'
- en: '**Unstructured data**: Thisidx_9b7c642d includes vast amounts of information
    found in text documents (reports, emails, articles), images, audio, and video
    files. LLMs are particularly adept at processing and understanding unstructured
    text.'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化数据**：Thisidx_9b7c642d 包含了在文本文档（报告、电子邮件、文章）、图像、音频和视频文件中找到的大量信息。大型语言模型在处理和理解非结构化文本方面特别擅长。'
- en: '**Vector stores**: Theseidx_23fb40ae specialized databases are crucial for
    enabling efficient similarity searches on embeddings. When an agent needs to find
    information semantically similar to a query, vector stores allow for rapid retrieval
    based on meaning rather than just keywords. This is a core component of many RAG
    systems. Implementations typically fall into two categories: open source libraries
    and databases (e.g., FAISS, Weaviate, Chroma) foridx_722a307d local or self-hosted
    control, and commercial managed services (e.g., Pinecone, Google Vertex AI Vector
    Search) for scalability and ease of management.'
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量存储**：这些idx_23fb40ae 专用数据库对于在嵌入上进行高效相似性搜索至关重要。当代理需要找到与查询语义相似的信息时，向量存储允许基于意义而不是仅仅基于关键词进行快速检索。这是许多
    RAG 系统的核心组件。实现通常分为两类：开源库和数据库（例如，FAISS、Weaviate、Chroma）用于idx_722a307d 本地或自托管控制，以及商业托管服务（例如，Pinecone、Google
    Vertex AI Vector Search）用于可扩展性和易于管理。'
- en: '**Structured data**: Thisidx_004300a6 refers to organized data typically found
    in relational databases or spreadsheets. It provides well-defined data points
    that agents can query for specific tasks, such as retrieving customer records
    or product information.'
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化数据**：这idx_004300a6指的是通常在关系型数据库或电子表格中找到的有序数据。它提供了定义良好的数据点，代理可以查询以执行特定任务，例如检索客户记录或产品信息。'
- en: '**Knowledge graphs**: Theseidx_00fe1a7b represent information as a network
    of entities and their relationships, providing a structured, semantic understanding
    of a domain. Knowledge graphs are particularly useful for agents that need to
    perform complex reasoning involving interconnected concepts.'
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识图谱**：这些idx_00fe1a7b将信息表示为实体及其关系的网络，提供对领域结构化和语义化的理解。知识图谱对于需要执行涉及相互关联概念的复杂推理的代理特别有用。'
- en: '**Physical environment context**: For agents designed to interact with the
    real world, such as robotsidx_d114318d or IoT-driven systems, this involves the
    following:'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物理环境上下文**：对于旨在与真实世界交互的代理，例如idx_d114318d机器人或物联网驱动的系统，这包括以下内容：'
- en: '**Sensors**: Devices idx_9067a8d0such as cameras, microphones, temperature
    sensors, and GPS locators provide data about the physical surroundings.'
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传感器**：如相机、麦克风、温度传感器和GPS定位器等idx_9067a8d0设备提供有关物理环境的数据。'
- en: '**Actuators**: Componentsidx_7c14d829 such as robotic arms, motors, or switches
    allow the agent to perform physical actions or manipulate objects in its environment.'
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行器**：如机械臂、电机或开关等idx_7c14d829组件允许代理执行物理动作或操纵其环境中的物体。'
- en: Effective agents idx_35346520often need to integrate information from multiple
    types of data stores and must be able to synthesize information from these diverse
    contexts to build a comprehensive understanding of their situation.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的代理idx_35346520通常需要整合来自多种类型数据存储的信息，并且必须能够从这些不同的上下文中综合信息，以构建对其情况的全面理解。
- en: To make these concepts tangible, let's idx_72c5ee65consider a **Supply Chain
    Management** agent tasked with monitoring and optimizing a company's inventory
    and logistics in real time. This agent must process information from various digital
    systems and potentially interact with physical warehouse components to respond
    to disruptions.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些概念具体化，让我们idx_72c5ee65考虑一个**供应链管理**代理，该代理的任务是实时监控和优化公司的库存和物流。此代理必须处理来自各种数字系统的信息，并可能与物理仓库组件交互以应对干扰。
- en: The following table demonstrates how this agent would interact with different
    data stores andidx_324c5213 environmental idx_7927b95dcontexts to perform its
    duties.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格展示了该代理如何与不同的数据存储和idx_324c5213环境idx_7927b95d上下文交互以履行其职责。
- en: '| **Context/Data** **s****tore** | **Supply** **Chain Management** **A****gent**
    **e****xample** |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| **上下文/数据** **存储** | **供应链管理** **代理** **示例** |'
- en: '| --- | --- |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Digital business context | This is the digital world the agent operates in,
    comprising all the company''s operational data. |'
  id: totrans-172
  prefs: []
  type: TYPE_TB
  zh: '| 数字业务上下文 | 这是指代理运行的数字世界，包括公司的所有运营数据。 |'
- en: '| Unstructured data | The agent processes shipping manifests (PDFs), supplier
    delay notifications from emails, and news articles about port strikes or weather
    events to understand potential disruptions. |'
  id: totrans-173
  prefs: []
  type: TYPE_TB
  zh: '| 非结构化数据 | 代理处理装运清单（PDF文件）、来自电子邮件的供应商延误通知以及关于港口罢工或天气事件的新闻报道，以了解潜在的干扰。 |'
- en: '| Vector stores | When a new geopolitical event is detected, the agent uses
    a vector store to perform a semantic search for internal whitepapers about how
    similar past events have impacted shipping lanes, retrieving the most relevant
    historical context. |'
  id: totrans-174
  prefs: []
  type: TYPE_TB
  zh: '| 向量存储 | 当检测到新的地缘政治事件时，代理使用向量存储执行关于类似过去事件如何影响航道的内部白皮书语义搜索，检索最相关的历史背景。 |'
- en: '| Structured data | The agent queries a relational database to get current
    inventory levels for specific product SKUs, checks expected delivery dates, and
    pulls warehouse capacity information. |'
  id: totrans-175
  prefs: []
  type: TYPE_TB
  zh: '| 结构化数据 | 代理查询关系型数据库以获取特定产品SKU的当前库存水平，检查预期交货日期，并获取仓库容量信息。 |'
- en: '| Knowledge graphs | The agent leverages a knowledge graph to understand the
    complex, multi-level relationships between suppliers, manufacturing plants, distribution
    centers, and final retail destinations. This allows it to reason that a delay
    from a single component supplier will impact three specific product lines. |'
  id: totrans-176
  prefs: []
  type: TYPE_TB
  zh: '| 知识图谱 | 代理利用知识图谱来理解供应商、制造工厂、配送中心和最终零售目的地之间复杂的多级关系。这使得它可以推断出单个组件供应商的延误将影响三个特定的产品线。
    |'
- en: '| Physical environment context | This includes the real-world elements the
    agent can sense and act upon, often through IoT devices. |'
  id: totrans-177
  prefs: []
  type: TYPE_TB
  zh: '| 物理环境上下文 | 这包括代理可以感知和对其采取行动的真实世界元素，通常通过物联网设备。 |'
- en: '| Sensors | The agent receives a continuous stream of data from GPS trackers
    on delivery trucks, temperature sensors in refrigerated containers to ensure product
    integrity, and RFID scanners at warehouse loading bays confirming the arrival
    of goods. |'
  id: totrans-178
  prefs: []
  type: TYPE_TB
  zh: '| 传感器 | 代理从送货卡车上的 GPS 跟踪器、冷藏集装箱中的温度传感器（以确保产品完整性）以及仓库装卸区中的 RFID 扫描仪接收连续的数据流，确认货物的到达。
    |'
- en: '| Actuators | If the agent predicts a major disruption on a primary route,
    it could automatically trigger an actuator in the smart warehouse, such as a conveyor
    belt or robotic arm, to divert the affected pallets to a different loading bay
    for an alternate shipping route. |'
  id: totrans-179
  prefs: []
  type: TYPE_TB
  zh: '| 执行器 | 如果代理预测主要路线将发生重大中断，它可能会自动触发智能仓库中的执行器，例如输送带或机械臂，将受影响的托盘转移到不同的装卸区，以采用替代的运输路线。
    |'
- en: Table 4.5 – Datastores and environment context examples
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.5 – 数据存储和环境上下文示例
- en: This supply chain idx_889c069cexample highlights how an effective agent must
    fluidly integrate information from a idx_df9e77fbwide array of sources, from structured
    inventory databases to unstructured news feeds and real-world sensor data. The
    ability to perceive and reason across these different contexts is what enables
    its intelligent and proactive behavior.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这个供应链 idx_889c069c 示例突出了有效的代理必须流畅地整合来自广泛来源的信息，从结构化库存数据库到非结构化新闻源和现实世界的传感器数据。感知和推理这些不同上下文的能力使其能够表现出智能和主动的行为。
- en: Having explored the internal anatomy of an agent and the external data it relies
    on, let's now examine the architectural features these components enable and how
    agents interact with each other.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在探讨了代理的内部结构和它依赖的外部数据之后，现在让我们检查这些组件能够实现的架构特性以及代理如何相互交互。
- en: Agent interaction models and key features
  id: totrans-183
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理交互模型和关键特性
- en: The architectural components and contextual awareness previously discussed give
    rise to several powerful features inherent in well-designed agentic systems. These
    features define how agents operate, how they can be structured, and how they interact
    with each other and their environment. Understanding these characteristics is
    key to appreciating the advantages agent-based approaches offer.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 之前讨论的架构组件和上下文意识产生了几个强大的特性，这些特性是精心设计的代理系统固有的。这些特性定义了代理的操作方式、它们可以如何构建以及它们如何相互以及与它们的环境互动。理解这些特性是欣赏基于代理的方法提供的优势的关键。
- en: To explore these advantages in detail, this section will delve into two key
    areas. We will begin by examining the inherent architectural features that arise
    from an agent's design, such as modularity, scalability, and adaptability. We
    will then transition to the practical agent interaction models, exploring how
    agents communicate directly and indirectly, and introduce the emerging technology
    stack that enables this collaboration.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 为了详细探讨这些优势，本节将深入探讨两个关键领域。我们将首先检查从代理的设计中产生的内在架构特性，例如模块化、可扩展性和适应性。然后，我们将过渡到实际的代理交互模型，探讨代理如何直接和间接地进行沟通，并介绍使这种协作成为可能的新兴技术堆栈。
- en: Architectural features
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构特性
- en: As we brieflyidx_fb4cd751 outlined previously, a well-designed agentic architecture
    gives rise to several powerful features that contribute to its flexibility, robustness,
    and intelligence. To avoid repetition, this section will not redefine these concepts
    but will instead illustrate how they translate into practical benefits using our
    ongoing **Supply Chain Management Agent** system idx_e1ca656aas a cohesive example.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前简要概述的，一个精心设计的代理架构会产生几个强大的特性，这些特性有助于其灵活性、鲁棒性和智能性。为了避免重复，本节将不会重新定义这些概念，而是通过我们正在进行的**供应链管理代理**系统
    idx_e1ca656a 作为连贯的例子来说明它们如何转化为实际效益。
- en: 'The following table idx_a0fa2a20showcases how each key architectural feature
    is applied in practice:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 下表 idx_a0fa2a20 展示了每个关键架构特性在实际中的应用：
- en: '| **Architectural** **f****eature** | **Example in a** **supply chain management
    s****ystem** |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| **架构** **特性** | **在供应链管理系统中的** **示例** |'
- en: '| --- | --- |'
  id: totrans-190
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Modularity | The supply chain system needs to incorporate enhanced fraud
    detection for its shipping invoices. Instead of rebuilding the existing `InventoryAgent`,
    a new, specialized `InvoiceFraudAgent` is developed and added to the workflow.
    If the fraud detection model needs to be updated, only that specific agent is
    affected. |'
  id: totrans-191
  prefs: []
  type: TYPE_TB
  zh: '| 模块化 | 供应链系统需要为其运输发票集成增强的欺诈检测。而不是重建现有的`InventoryAgent`，开发了一个新的、专门的`InvoiceFraudAgent`并添加到工作流程中。如果欺诈检测模型需要更新，只有那个特定的代理受到影响。|'
- en: '| Scalability | During peak holiday shipping season, the system handles a massive
    increase in GPS data from delivery trucks by dynamically deploying multiple instances
    of the `LogisticsAgent` in parallel. A load balancer distributes the route optimization
    tasks across these instances, ensuring the system remains responsive. |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 在高峰假日运输季节，系统通过动态部署多个`LogisticsAgent`实例并行处理来自送货车辆的GPS数据的大幅增加。负载均衡器将这些路线优化任务分配到这些实例上，确保系统保持响应性。|'
- en: '| Adaptability | A `SupplierCommsAgent` observes that emails from "Supplier-X"
    containing the phrase "production delay" consistently precede critical inventory
    shortages. Using this learned correlation, the agent adapts its behavior to automatically
    escalate any future emails with those keywords to "urgent" and immediately alert
    the `InventoryAgent`. |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '| 适应性 | `SupplierCommsAgent`观察到来自“供应商-X”的电子邮件中包含“生产延迟”短语，这些电子邮件始终出现在关键的库存短缺之前。利用这种学习到的相关性，代理调整其行为，自动将包含这些关键词的任何未来电子邮件升级为“紧急”，并立即向`InventoryAgent`发出警报。|'
- en: '| Multimodal interaction | At a warehouse, a `ReceivingDockAgent` first processes
    a text-based shipping manifest (PDF), then uses a camera to visually inspect the
    received pallet for damaged boxes (image data). It acts on this combined information,
    updating the inventory system only if the visual inspection matches the manifest''s
    description. |'
  id: totrans-194
  prefs: []
  type: TYPE_TB
  zh: '| 多模态交互 | 在仓库中，`ReceivingDockAgent`首先处理基于文本的运输清单（PDF），然后使用相机对收到的托盘进行视觉检查，以检查损坏的箱子（图像数据）。它根据这些综合信息采取行动，只有当视觉检查与清单的描述匹配时，才更新库存系统。|'
- en: '| Collaboration | A `DisruptionMonitoringAgent` detects a port closure from
    a news feed and updates a status in a shared database. The `InventoryAgent` senses
    this change and sends a direct message to the `LogisticsAgent` to request alternate
    shipping routes, initiating a collaborative resolution between the two agents.
    |'
  id: totrans-195
  prefs: []
  type: TYPE_TB
  zh: '| 协作 | `DisruptionMonitoringAgent`从新闻源检测到港口关闭，并在共享数据库中更新状态。`InventoryAgent`感知到这种变化，并向`LogisticsAgent`发送直接消息，请求替代运输路线，从而在两个代理之间启动协作解决方案。|'
- en: Table 4.6 – Architectural features for the Supply Chain Management Agent
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.6 – 供应链管理代理的架构特性
- en: This table idx_7dcb29fedemonstrates how these inherent features manifest in
    a practical idx_155af4c4application. Now, let's shift from these high-level properties
    to the specific models that govern how agents interact with one another.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 此表idx_7dcb29fedemonstrates how these inherent features manifest in a practical
    idx_155af4c4application. Now, let's shift from these high-level properties to
    the specific models that govern how agents interact with one another.
- en: Agent interaction models
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理交互模型
- en: When multiple idx_e45df7c7agents operate within the same environment, the way
    they interact becomes a critical aspect of the system's design. The chosen model
    dictates how agents coordinate, share information, and work towards collective
    goals.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 当多个idx_e45df7c7代理在相同的环境中操作时，它们交互的方式成为系统设计的关键方面。所选模型决定了代理如何协调、共享信息并共同实现目标。
- en: 'To facilitate this coordination, agentic systems typically employ two fundamental
    interaction models, which differ in how agents exchange information:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 为了促进这种协调，代理系统通常采用两种基本的交互模型，它们在代理如何交换信息方面有所不同：
- en: '**Direct communication**: In idx_c00ab70dthis model, agents explicitly send
    messages to one another using a common language and protocol.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**直接通信**：在这个模型中，代理使用通用语言和协议明确地向彼此发送消息。'
- en: '**Example**: The `InventoryAgent` detects low stock and sends a direct message
    `{"task": "``reorder_part``", "``part_id``": "XYZ-123", "quantity": 500}` to the
    `ProcurementAgent`.'
  id: totrans-202
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例**：`InventoryAgent`检测到库存低，并向`ProcurementAgent`发送直接消息`{"task": "``reorder_part``",
    "``part_id``": "XYZ-123", "quantity": 500}`。'
- en: '**Indirect communication (****Stigmergy****)**: Agents can also interact indirectly
    by observingidx_1a821a74 and modifying a shared environment, such as a database.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**间接通信（**蚁群式通信**）**：代理可以通过观察idx_1a821a74并修改共享环境（如数据库）来间接交互。'
- en: '**Example**: The `ManufacturingAgent` updates a record in a shared database
    to `{"status": "complete"}`. The `LogisticsAgent`, which monitors this database,
    sees the status change and initiates the shipping process.'
  id: totrans-204
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例**：`ManufacturingAgent` 更新共享数据库中的记录为 `{"status": "complete"}`。监控此数据库的 `LogisticsAgent`
    看到状态变化，并启动装运过程。'
- en: '![Image 4](img/B33147_4_4.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![图像 4](img/B33147_4_4.png)'
- en: Figure 4.4 – Agent interaction models
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.4 – 代理交互模型
- en: 'Whileidx_8a0bde9b these models describe the conceptual approach to communication,
    their practical implementation relies on an emerging technology stack. As we introduced
    previously, this stack is composed of complementary layers that enable different
    forms of interaction. Here, we revisit these layers to detail how they facilitate
    agent-to-tool and agent-to-agent communication in practice:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 idx_8a0bde9b 这些模型描述了通信的概念性方法，但它们的实际实现依赖于一个新兴的技术堆栈。正如我们之前所介绍的，这个堆栈由互补的层组成，这些层能够实现不同形式的交互。在这里，我们回顾这些层，以详细说明它们如何在实践中促进代理到工具和代理到代理的通信：
- en: '**Layer 1: Function** **c****alling**: This idx_e5b42452is the fundamental
    interaction layer where an agent''s LLM triggers a local tool. It allows a model
    to intelligently identify what tool to use, when to call it, and with what parameters,
    all within a single application runtime. This was the first major step in making
    LLMs more than text generators, enabling them to take action. Its primary limitation
    is that the developer is responsible for hosting, running, and securing the tool
    within the same environment.'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**层 1：功能** **调用**：此 idx_e5b42452 是基本交互层，其中代理的 LLM 触发一个本地工具。它允许模型在单个应用程序运行时内智能地识别使用哪个工具、何时调用以及使用哪些参数。这是使
    LLMs 不仅仅成为文本生成器，并使其能够采取行动的第一步。其主要限制是开发者负责在同一环境中托管、运行和确保工具的安全。'
- en: '**Example**: The `LogisticsAgent`''s LLM determines it needs to find the most
    efficient delivery path and generates a call to its internal `calculate_optimal_route``()`
    function.'
  id: totrans-209
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例**：`LogisticsAgent` 的 LLM 确定需要找到最有效的配送路径，并生成对其内部 `calculate_optimal_route()`
    函数的调用。'
- en: '**Layer 2: Tool** **p****rotocols**: This idx_af5731d6layer provides a standardized
    way for agents to discover and use external tools as interoperable services. Protocols
    such as Anthropic''s **Model Context Protocol** (**MCP**) decouple the tool''s
    hosting and execution from the agent itself. This represents a significant evolution
    from framework-specific solutions such as LangChain''s ToolExecutor or LangGraph
    routers. While those robust OSS tools manage execution within a specific application''s
    runtime (often requiring shared dependencies), protocols such as MCP allow tools
    to be defined via schemas and hosted independently. This enables any compliant
    system to discover and invoke them across process or network boundaries, effectively
    turning tools into portable services much like REST APIs.'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**层 2：工具** **协议**：此 idx_af5731d6 层为代理提供了一种标准化的方式，以便发现和使用外部工具作为可互操作的服务。例如，Anthropic
    的 **模型上下文协议**（**MCP**）将工具的托管和执行与代理本身解耦。这代表了一种从框架特定解决方案（如 LangChain 的 ToolExecutor
    或 LangGraph 路由器）的重大进步。虽然这些强大的开源工具在特定应用程序的运行时内管理执行（通常需要共享依赖项），但如 MCP 这样的协议允许通过模式定义工具，并独立托管。这使得任何符合规范的系统都可以在进程或网络边界之外发现和调用它们，有效地将工具转变为像
    REST API 一样的便携式服务。'
- en: '**Example**: Toidx_162129e1 account for weather, the `LogisticsAgent` uses
    a tool protocol to discover and connect to a third-party weather service API,
    pulling real-time storm data into its route calculation without being tightly
    coupled to that specific API''s implementation.'
  id: totrans-211
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例**：为了考虑天气，`LogisticsAgent` 使用工具协议来发现和连接到第三方天气服务 API，将实时风暴数据拉入其路线计算，而无需紧密耦合到该特定
    API 的实现。'
- en: '**Layer 3: Agent-to-****a****gent** **p****rotocols**: This is the highest
    level, focused on collaborationidx_2a8f07bf between independent agents, which
    may be running on different frameworks or in different enterprises. While proprietary
    or framework-specific delegation methods exist, protocols such as **agent-to-a****gent**
    (**A2A**) focus on universal standards for agent collaboration. It provides a
    standard for delegating structured tasks, managing asynchronous workflows, and
    enabling complex, multi-agent coordination, effectively acting as a universal
    translator or "SMTP for AI agents."'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三层：代理到代理协议**：这是最高层，专注于独立代理之间的协作，这些代理可能运行在不同的框架或不同的企业中。虽然存在专有或框架特定的委托方法，但如**代理到代理**（**A2A**）这样的协议专注于代理协作的通用标准。它提供了一个委托结构化任务、管理异步工作流和实现复杂、多代理协调的标准，有效地充当通用翻译器或“AI代理的SMTP”。'
- en: '**Example**: After calculating a route, the `LogisticsAgent` needs to book
    sea freight. It uses an A2A protocol to send a structured task to a completely
    separate `FreightForwarderAgent`, which is operated by a third-party logistics
    company.'
  id: totrans-213
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例**：在计算路线后，`LogisticsAgent`需要预订海运。它使用 A2A 协议向一个完全独立的由第三方物流公司运营的`FreightForwarderAgent`发送结构化任务。'
- en: '![Image 5](img/B33147_4_5.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图像 5](img/B33147_4_5.png)'
- en: Figure 4.5 – Emerging agentic stack
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.5 – 持续出现的代理栈
- en: Many sophisticated systems idx_2452fe82employ a hybrid approach, using function
    calling for internal actions and higher-level protocols for external collaboration.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 许多复杂的系统采用混合方法，使用函数调用进行内部操作，使用高级协议进行外部协作。
- en: Technical considerations for agentic architectures
  id: totrans-217
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理架构的技术考虑
- en: Building robust idx_ad388ea3and effective agentic systems, as we've architected
    them in this chapter, is a technically demanding task. As we first identified
    in our high-level overview of production challenges, successfully deploying these
    agents requires addressing several critical technical hurdles.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 建立稳健且有效的代理系统，正如我们在本章中架构的那样，是一项技术要求很高的任务。正如我们在对生产挑战的高级概述中首先确定的，成功部署这些代理需要解决几个关键的技术障碍。
- en: Rather than restating those challenges, this section connects them directly
    to the agent anatomy we have just detailed. The following table maps those key
    technical considerations to the specific architectural components they impact
    most, providing a clearer understanding of where these challenges manifest in
    your design.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是重申这些挑战，本节将它们直接与我们已经详细说明的代理解剖学联系起来。下表将这些关键技术考虑映射到它们影响的最具体架构组件，从而更清晰地了解这些挑战在设计中的体现。
- en: '| **Technical consideration** | **Primary architectural component(s) affected**
    |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| **技术考虑** | **受影响的主要架构组件** |'
- en: '| --- | --- |'
  id: totrans-221
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Data processing and integration | Sense, Memory |'
  id: totrans-222
  prefs: []
  type: TYPE_TB
  zh: '| 数据处理和集成 | 感知、内存 |'
- en: '| Knowledge representation | Reason, Memory |'
  id: totrans-223
  prefs: []
  type: TYPE_TB
  zh: '| 知识表示 | 推理、内存 |'
- en: '| LLM integration and orchestration | Reason, Plan, Coordinate |'
  id: totrans-224
  prefs: []
  type: TYPE_TB
  zh: '| LLM 集成和编排 | 推理、计划、协调 |'
- en: '| Reliable tool use mechanisms | Act |'
  id: totrans-225
  prefs: []
  type: TYPE_TB
  zh: '| 可靠的工具使用机制 | 行动 |'
