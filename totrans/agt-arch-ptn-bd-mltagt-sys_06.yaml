- en: Table 4.7 – Mapping technical challenges to agent components
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.7 – 将技术挑战映射到代理组件
- en: Successfully idx_89fcbe2aaddressing these technical considerations involves
    a journey of progressively refining these capabilities, a path that aligns with
    the stages of the GenAI Maturity Model.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 成功解决这些技术考虑因素涉及逐步完善这些能力的过程，这个过程与 GenAI 成熟度模型的各个阶段相一致。
- en: This exploration of agent anatomy, their reliance on data, and their interaction
    models sets the stage for understanding more complex agentic behaviors. In the
    following chapters, we will build upon this architectural foundation to examine
    specific design patterns that leverage these components to solve common challenges
    in building sophisticated AI systems.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 对代理解剖学、它们对数据的依赖以及它们交互模型的研究为理解更复杂的代理行为奠定了基础。在接下来的章节中，我们将在此基础上构建，以检查利用这些组件解决构建复杂
    AI 系统中常见挑战的具体设计模式。
- en: Summary
  id: totrans-233
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter built upon the foundational concepts of *Part* *1*, providing a
    detailed architectural blueprint for the agentic systems that LLMs power. We moved
    from theory to structure by defining what makes a system "agentic," dissecting
    the core components that enable intelligent behavior, and mapping technical challenges
    directly to this new architectural framework.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 本章基于*第1部分*的基础概念，为LLM驱动的代理系统提供了一个详细的架构蓝图。我们通过定义使系统“代理化”的因素，剖析了使智能行为成为可能的核心组件，并将技术挑战直接映射到这个新的架构框架中。
- en: 'The key takeaways are as follows:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**Agents are more than LLMs**: An AI agent is a complete system defined by
    its autonomy, goal-orientation, and its ability to perceive, reason, and act.
    It uses an LLM as its cognitive core but is distinct from a simple, stateless
    LLM interaction.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理不仅仅是LLM**：人工智能代理是一个由其自主性、目标导向性和感知、推理、行动能力所定义的完整系统。它使用LLM作为其认知核心，但与简单的无状态LLM交互不同。'
- en: '**The anatomy of an agent**: We framed the essential building blocks—*Goals*,
    *Sense*, *Reason*, *Plan*, *Act*, *Memory*, and *Coordination*—by their architectural
    roles within a continuous operational loop, showing how an agent moves from perception
    to goal-oriented action.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理的解剖结构**：我们通过它们在连续操作循环中的架构角色——*目标*、*感知*、*推理*、*计划*、*行动*、*记忆*和*协调*——来构建基本构建块，展示了代理如何从感知到目标导向的行动。'
- en: '**Context is crucial for intelligence**: An agent''s effectiveness is critically
    dependent on its environment. It must draw from a rich context of digital data
    stores (such as databases and knowledge graphs) and potentially physical data
    sources (such as sensors) to make informed decisions.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文对智能至关重要**：代理的有效性严重依赖于其环境。它必须从丰富的数字数据存储（如数据库和知识图谱）和可能的物理数据源（如传感器）中汲取信息，以做出明智的决策。'
- en: '**Interactions define the system**: Agentic systems are characterized by features
    such as modularity and scalability. Agents interact through direct and indirect
    communication models, which are increasingly enabled by a practical stack of protocols
    for function calling, tool use, and agent-to-agent collaboration.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互定义系统**：代理系统以其模块化和可扩展性等特征为特点。代理通过直接和间接的通信模型进行交互，这些模型越来越多地由功能调用、工具使用和代理间协作的实际协议栈所支持。'
- en: '**Architecture is the foundation for patterns**: Understanding the core architecture
    laid out in this chapter is the essential prerequisite for designing and implementing
    the specific, repeatable agentic patterns that solve real-world business problems,
    which we will explore throughout the rest of this book.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构是模式的基础**：理解本章中概述的核心架构是设计和实施解决现实世界商业问题的特定、可重复的代理模式的基本先决条件，我们将在此书的其余部分探讨这些模式。'
- en: 'In this chapter, we have established the architectural blueprint for individual
    agents. We are now prepared to explore how these agents can be organized into
    powerful, collaborative systems. In the next chapter, we will dive deep into the
    first set of crucial design patterns: multi-agent coordination patterns.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们为单个代理建立了架构蓝图。我们现在准备探索如何将这些代理组织成强大、协作的系统。在下一章中，我们将深入探讨第一组关键设计模式：多代理协调模式。
- en: These patterns provide the strategies and solutions needed to manage how multiple
    agents interact, share information, and work together to tackle challenges that
    are beyond the scope of any single agent.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式提供了管理多个代理如何交互、共享信息和共同应对超出单个代理范围挑战所需策略和解决方案。
