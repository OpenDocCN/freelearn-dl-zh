  zh: '| 状态管理和内存 | 内存 |'
- en: '| Scalability of agent populations | Coordinate, Overall system architecture
    |'
  id: totrans-227
  prefs: []
  type: TYPE_TB
  zh: '| 代理群体可扩展性 | 协调、整体系统架构 |'
- en: '| Inter-agent communication efficiency | Coordinate |'
  id: totrans-228
  prefs: []
