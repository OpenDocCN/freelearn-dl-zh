- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: <st c="6671">Make sure to replace</st> `<st c="6693"><full_path_to_docx_file></st>`
    <st c="6717">with the actual path to your Word document file.</st> <st c="6767">Obtaining
    the file path is a simple task, achieved by right-clicking on your</st> `<st c="6844">.docx</st>`
    <st c="6849">file in VSCode and selecting the</st> **<st c="6883">Copy Relative
    Path</st>** <st c="6901">option from the</st> <st c="6918">drop-down menu.</st>
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保将 `<st c="6671">Make sure to replace</st>` `<st c="6693"><full_path_to_docx_file></st>`
    <st c="6717">with the actual path to your Word document file.</st>` <st c="6767">Obtaining
    the file path is a simple task, achieved by right-clicking on your</st>` `<st
    c="6844">.docx</st>` <st c="6849">file in VSCode and selecting the</st>` **<st
    c="6883">Copy Relative Path</st>` <st c="6901">option from the</st>` `<st c="6918">drop-down
    menu.</st>`
- en: <st c="6933">Once you have done that, run the</st> `<st c="6967">app.py</st>`
    <st c="6973">file and verify the output.</st> <st c="7002">This code will read
    the contents of your Word document and print them to the console.</st> <st c="7088">If
    the text extraction works correctly, you should see the text of your document
    printed in the console (see</st> *<st c="7197">Figure 6</st>**<st c="7205">.1</st>*<st
    c="7207">).</st> <st c="7211">The</st> `<st c="7215">text</st>` <st c="7219">variable
    now holds the data from</st> `<st c="7253">info.docx</st>` <st c="7262">as a</st>
    <st c="7268">Python string.</st>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6933">完成选择后，运行</st> `<st c="6967">app.py</st>` <st c="6973">文件并验证输出。</st>
    <st c="7002">此代码将读取您的Word文档内容并将其打印到控制台。</st> <st c="7088">如果文本提取正确工作，您应该在控制台中看到文档的文本（见</st>
    *<st c="7197">图6</st>**<st c="7205">.1</st>*<st c="7207">)。</st> <st c="7211">现在</st>
    `<st c="7215">text</st>` <st c="7219">变量包含</st> `<st c="7253">info.docx</st>`
    <st c="7262">作为</st> <st c="7268">Python字符串。</st>
- en: '![Figure 6.1 – Word text extraction console output](img/B22414_06_1.jpg)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![Figure 6.1 – Word text extraction console output](img/B22414_06_1.jpg)'
- en: <st c="7416">Figure 6.1 – Word text extraction console output</st>
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7416">图6.1 – Word文本提取控制台输出</st>
- en: <st c="7464">This section</st> <st c="7478">provided a step-by-step guide on
    how to set up a project and install the</st> `<st c="7551">docx</st>` <st c="7555">Python
    library to extract text from Word documents.</st> <st c="7608">The section also
    included instructions</st> <st c="7647">on how to create a new Word file and use
    the</st> `<st c="7692">docx</st>` <st c="7696">library to read and manipulate
    its contents,</st> <st c="7742">using Python.</st>
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7464">本节</st> <st c="7478">提供了一个逐步指南，说明如何设置项目和安装用于从Word文档中提取文本的</st>
    `<st c="7551">docx</st>` <st c="7555">Python库。</st> <st c="7608">本节还包括有关如何创建新的Word文件以及如何使用</st>
    `<st c="7692">docx</st>` <st c="7696">库通过Python读取和操作其内容的说明。</st> <st c="7742">使用Python。</st>
- en: <st c="7755">In the upcoming section, we will dive into building the frame of
    our Tkinter application.</st> <st c="7846">You will learn how to create a basic
    window with widgets and how to use geometry managers to position them on</st>
    <st c="7956">the screen.</st>
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7755">在下一节中，我们将深入探讨构建Tkinter应用程序框架的过程。</st> <st c="7846">您将学习如何创建一个带有小部件的基本窗口，以及如何使用几何管理器将它们定位在</st>
    <st c="7956">屏幕上。</st>
- en: <st c="7967">Building a user interface with Tkinter</st>
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="7967">使用Tkinter构建用户界面</st>
- en: <st c="8006">In this section, we will learn how to use the</st> `<st c="8053">Tkinter</st>`
    <st c="8060">library to create a GUI for our text translation</st> <st c="8110">application.</st>
    <st c="8123">Tkinter is a standard Python</st> <st c="8152">library to create
    GUIs, and it provides a simple and efficient way to create windows, buttons, text
    fields, and other</st> <st c="8270">graphical elements.</st>
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="8006">在本节中，我们将学习如何使用</st> `<st c="8053">Tkinter</st>` <st c="8060">库为我们文本翻译应用程序创建一个GUI。</st>
    <st c="8110">Tkinter是Python的标准库，用于创建GUI，它提供了一个简单高效的方式来创建窗口、按钮、文本字段和其他</st> <st
    c="8270">图形元素。</st>
- en: <st c="8289">The Text Translator application shown in</st> *<st c="8331">Figure
    6</st>**<st c="8339">.2</st>* <st c="8341">will be designed to have a simple and
    user-friendly interface.</st> <st c="8405">When you run the application, there
    will be a button labeled</st> **<st c="8466">Browse</st>** <st c="8472">and a
    drop-down menu with a list of languages to</st> <st c="8522">translate to:</st>
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="8289">如图</st> *<st c="8331">图6</st>**<st c="8339">.2</st>* <st c="8341">所示的文本翻译应用程序将被设计成一个简单且用户友好的界面。</st>
    <st c="8405">当您运行应用程序时，将有一个标签为</st> **<st c="8466">浏览</st>** <st c="8472">的按钮和一个包含要翻译成语言的列表的下拉菜单：</st>
- en: <st c="8535">To translate the text, the user can select the language they want
    to translate to from the</st> <st c="8627">drop-down menu.</st>
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="8535">要将文本翻译，用户可以从</st> <st c="8627">下拉菜单中选择他们想要翻译成的语言。</st>
- en: <st c="8642">Once the language is selected, the user can click on the</st> **<st
    c="8700">Browse</st>** <st c="8706">button and select the Word file they want</st>
    <st c="8749">to translate.</st>
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="8642">一旦选择了语言，用户可以点击</st> **<st c="8700">浏览</st>** <st c="8706">按钮并选择他们想要翻译的Word文件。</st>
- en: <st c="8762">Upon selection, the</st> <st c="8783">contents of the file will
    be translated using the ChatGPT API, and the translated text will be displayed
    in the large text field in the center of the window.</st> <st c="8941">The</st>
    <st c="8944">user can then copy and paste the translated text to use it</st> <st
    c="9004">as needed.</st>
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="8762">选择后，文件内容将使用ChatGPT API进行翻译，翻译后的文本将显示在窗口中央的大文本框中。</st> <st c="8941">然后，用户可以复制并粘贴翻译后的文本，按需使用。</st>
- en: <st c="9014">The Text Translator application is designed to be a simple and
    efficient tool to translate text from one language</st> <st c="9129">to another.</st>
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9014">文本翻译应用被设计成一个简单高效的工具，用于将一种语言中的文本翻译成另一种语言。</st>
- en: '![Figure 6.2 – The Text Translator application UI](img/B22414_06_2.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图6.2 – 文本翻译应用UI](img/B22414_06_2.jpg)'
- en: <st c="9177">Figure 6.2 – The Text Translator application UI</st>
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9177">图6.2 – 文本翻译应用UI</st>
- en: <st c="9224">Important note</st>
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9224">重要提示</st>
- en: <st c="9239">We do not need to specify the text from which we want to translate,
    as the ChatGPT language model is designed to automatically recognize the</st>
    <st c="9381">prompt language.</st>
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9239">我们不需要指定要翻译的文本，因为ChatGPT语言模型被设计成能够自动识别</st> <st c="9381">提示语言。</st>
- en: <st c="9397">Now that we are clear about the base design, we can bring it to
    life</st> <st c="9467">with Tkinter.</st>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9397">现在我们已经明确了基本设计，我们可以用Tkinter将其实现。</st>
- en: <st c="9480">To get started, we’ll</st> <st c="9503">need to remove the example
    code that we previously added to our</st> `<st c="9567">app.py</st>` <st c="9573">file.</st>
    <st c="9580">Simply delete all the lines of code containing the example code so
    that we can start with a</st> <st c="9672">clean slate.</st>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9480">为了开始，我们需要从我们的</st> `<st c="9567">app.py</st>` <st c="9573">文件中删除之前添加的示例代码。</st>
    <st c="9580">只需删除包含示例代码的所有代码行，这样我们就可以从一个干净的状态开始。</st>
- en: <st c="9684">Creating a Tkinter</st> <st c="9704">window is the next step in
    building our Text Translator application.</st> <st c="9773">You can achieve this
    by writing the following code in</st> `<st c="9827">app.py</st>`<st c="9833">,
    which initializes a new instance of the</st> `<st c="9875">Tk</st>` <st c="9877">class
    and sets the</st> <st c="9897">application window:</st>
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9684">创建Tkinter</st> <st c="9704">窗口是构建我们的文本翻译应用的下一步。</st> <st c="9773">您可以通过在</st>
    `<st c="9827">app.py</st>`<st c="9833">中编写以下代码来实现这一点，该代码初始化了Tkinter类的新实例并设置了</st>
    <st c="9875">应用程序窗口：</st>
- en: '[PRE2]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: <st c="10266">To start building the Tkinter app, we first need to import the
    necessary libraries.</st> <st c="10351">We will use the</st> `<st c="10367">openai</st>`<st
    c="10373">,</st> `<st c="10375">docx</st>`<st c="10379">, and</st> `<st c="10385">tkinter</st>`
    <st c="10392">libraries for</st> <st c="10407">this project.</st>
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10266">要开始构建Tkinter应用，我们首先需要导入必要的库。</st> <st c="10351">我们将使用</st> `<st
    c="10367">openai</st>`<st c="10373">,</st> `<st c="10375">docx</st>`<st c="10379">,
    和</st> `<st c="10385">tkinter</st>` <st c="10392">库来完成这个项目。</st>
- en: <st c="10420">Next, we need to create the main window of our application.</st>
    <st c="10481">We will do this using the</st> `<st c="10507">Tk()</st>` <st c="10511">method
    of the</st> `<st c="10526">tkinter</st>` <st c="10533">library.</st> <st c="10543">We
    will also give our application a title and set its background color</st> <st c="10614">to
    white.</st>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10420">接下来，我们需要创建我们应用程序的主窗口。</st> <st c="10481">我们将使用</st> `<st c="10507">Tk()</st>`
    <st c="10511">方法来创建主窗口，这是</st> `<st c="10526">tkinter</st>` <st c="10533">库的一部分。</st>
    <st c="10543">我们还将为我们的应用程序设置一个标题并将其背景颜色设置为白色。</st>
- en: <st c="10623">We can</st> <st c="10631">also set a header for our application</st>
    <st c="10669">using the</st> `<st c="10679">Label()</st>` <st c="10686">method
    of</st> `<st c="10697">tkinter</st>`<st c="10704">. We can set its text to</st>
    `<st c="10729">Text Translator</st>`<st c="10744">, its background color to</st>
    `<st c="10770">white</st>`<st c="10775">, and its font to</st> `<st c="10793">Open
    Sans</st>`<st c="10802">, with a size of</st> `<st c="10819">16</st>` <st c="10821">and
    a</st> `<st c="10828">bold</st>` <st c="10832">weight.</st> <st c="10841">We will
    then use the</st> `<st c="10862">grid()</st>` <st c="10868">method to place the
    header in our application window at a specific position by specifying the</st>
    `<st c="10963">row</st>` <st c="10966">and</st> `<st c="10971">column</st>` <st
    c="10977">values, spanning two columns and with a</st> <st c="11018">small padding.</st>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10623">我们还可以使用</st> <st c="10631">`<st c="10679">Label()</st>` <st c="10686">`方法来为我们的应用程序设置标题，该方法属于</st>
    `<st c="10697">tkinter</st>`<st c="10704">。`我们可以将其文本设置为`<st c="10729">文本翻译器</st>`<st
    c="10744">，背景颜色设置为`<st c="10770">白色</st>`<st c="10775">，字体设置为`<st c="10793">Open
    Sans</st>`<st c="10802">，大小为`<st c="10819">16</st>` <st c="10821">，并且为`<st c="10828">粗体</st>`
    <st c="10832">字体。</st> `<st c="10841">然后我们将使用`<st c="10862">grid()</st>` <st c="10868">方法通过指定`<st
    c="10963">行</st>` <st c="10966">和`<st c="10971">列</st>` <st c="10977">值将标题放置在我们的应用程序窗口的特定位置，跨越两列，并具有`<st
    c="11018">小的填充。</st>
- en: <st c="11032">We will run our application using the</st> `<st c="11071">mainloop()</st>`
    <st c="11081">method of</st> `<st c="11092">tkinter</st>`<st c="11099">. The</st>
    `<st c="11105">mainloop()</st>` <st c="11115">method is an infinite loop used
    to run the application, listen for events such as button clicks or window resizing,
    and update the display as needed.</st> <st c="11266">It continuously listens for
    events until the user closes the window or exits</st> <st c="11343">the application.</st>
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="11032">我们将使用</st> `<st c="11071">mainloop()</st>` <st c="11081">方法来运行我们的应用程序，该方法属于</st>
    `<st c="11092">tkinter</st>`<st c="11099">。`<st c="11105">mainloop()</st>` <st
    c="11115">方法是一个无限循环，用于运行应用程序，监听事件，如按钮点击或窗口大小调整，并在需要时更新显示。`<st c="11266">它将持续监听事件，直到用户关闭窗口或退出</st>
    <st c="11343">应用程序。</st>
- en: <st c="11359">After creating the app window, the next step is to add elements
    to it.</st> <st c="11431">One of those elements will be the</st> **<st c="11465">Browse</st>**
    <st c="11471">button:</st>
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="11359">在创建应用程序窗口之后，下一步是向其中添加元素。</st> <st c="11431">这些元素之一将是</st> **<st
    c="11465">浏览</st>** <st c="11471">按钮：</st>
- en: '[PRE3]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: <st c="11759">Important note</st>
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="11759">重要提示</st>
- en: <st c="11774">It’s important to add all elements before calling the</st> `<st
    c="11829">mainloop()</st>` <st c="11839">method, so they are properly included
    in the application window.</st> `<st c="11905">mainloop()</st>` <st c="11915">should
    always be the last line in your</st> `<st c="11955">app.py</st>` <st c="11961">file.</st>
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="11774">在调用`<st c="11829">mainloop()</st>` <st c="11839">方法之前添加所有元素是很重要的，以确保它们被正确地包含在应用程序窗口中。</st>
    `<st c="11905">mainloop()</st>` <st c="11915">应该始终是您的`<st c="11955">app.py</st>`
    <st c="11961">文件中的最后一行。</st>
- en: <st c="11967">To create a</st> <st c="11980">button widget, you can use the</st>
    `<st c="12011">tk.Button()</st>` <st c="12022">method in the</st> `<st c="12037">tkinter</st>`
    <st c="12044">library.</st> <st c="12054">The</st> <st c="12058">button is placed
    in the root window and has the</st> `<st c="12139">bg</st>` <st c="12141">parameter
    sets the background color of the button to a dark blue, while</st> `<st c="12214">fg</st>`
    <st c="12216">sets the foreground color</st> <st c="12243">to</st> `<st c="12246">black</st>`<st
    c="12251">.</st>
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="11967">要创建一个按钮小部件，您可以在</st> `<st c="12011">tk.Button()</st>` <st c="12022">方法中，该方法属于</st>
    `<st c="12037">tkinter</st>` <st c="12044">库。</st> `<st c="12054">按钮放置在根窗口中，其`<st
    c="12139">bg</st>` <st c="12141">参数将按钮的背景颜色设置为深蓝色，而`<st c="12214">fg</st>` <st
    c="12216">设置前景颜色为`<st c="12246">黑色</st>`<st c="12251">。</st>
- en: <st c="12252">Meanwhile,</st> `<st c="12264">relief</st>` <st c="12270">is set
    to</st> `<st c="12281">flat</st>` <st c="12285">to create a flat appearance, and</st>
    `<st c="12319">borderwidth</st>` <st c="12330">is set to</st> `<st c="12341">0</st>`
    <st c="12342">to remove the border of the button.</st> <st c="12379">We then use
    the</st> `<st c="12395">activebackground</st>` <st c="12411">and</st> `<st c="12416">activeforeground</st>`
    <st c="12432">parameters to set the colors of the button when it is clicked or</st>
    <st c="12498">hovered over.</st>
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12511">Under the</st> **<st c="12522">Browse</st>** <st c="12528">button,
    we can create a drop-down menu with a list</st> <st c="12580">of languages:</st>
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: <st c="12881">The languages list contains a list of languages that the user
    can select from.</st> <st c="12961">You can add any language to that list, and
    it will be displayed to the users in the</st> <st c="13045">drop-down menu.</st>
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13060">The</st> `<st c="13065">language_var</st>` <st c="13077">variable
    is created as a</st> `<st c="13103">StringVar</st>` <st c="13112">object and set
    to the first language in the list.</st> <st c="13163">The</st> `<st c="13167">set()</st>`
    <st c="13172">method of the</st> `<st c="13187">language_var</st>` <st c="13199">object
    is then used to set its initial value to the first element of the languages list.</st>
    <st c="13289">This is done so that the default value of the language drop-down
    menu is the first language in the list, which is</st> `<st c="13403">Bulgarian</st>`
    <st c="13412">in</st> <st c="13416">this case.</st>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13426">The</st> `<st c="13431">OptionMenu</st>` <st c="13441">widget
    is then created with the</st> `<st c="13474">language_var</st>` <st c="13486">variable
    and the</st> `<st c="13504">*languages</st>` <st c="13514">syntax, which unpacks
    the</st> `<st c="13541">languages</st>` <st c="13550">list as individual arguments.</st>
    <st c="13581">This sets the available options for the drop-down</st> <st c="13631">menu
    to the languages in the languages list.</st> <st c="13676">Then, we</st> <st c="13684">configure
    and position an options menu widget in the second column of the first row of the</st>
    <st c="13776">application window.</st>
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13795">The next step is to add the text field to our GUI.</st> <st c="13847">To
    do this, you can add the following code below the</st> `<st c="13922">app.py</st>`
    <st c="13928">file.</st> <st c="13935">This code creates a text field with specific
    dimensions, colors, and properties, and then places it within the window using</st>
    <st c="14059">grid positioning:</st>
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: <st c="14457">This code will add a text field to the GUI window, which will
    be used to display the ChatGPT translation of the Word document.</st> <st c="14585">Here,
    the</st> `<st c="14595">Text</st>` <st c="14599">widget object named</st> `<st
    c="14620">text_field</st>` <st c="14630">is placed inside the root window.</st>
    <st c="14665">The</st> `<st c="14669">Text</st>` <st c="14673">widget is used
    to display and edit text in multiple lines.</st> <st c="14733">Then, we use the</st>
    `<st c="14750">grid()</st>` <st c="14756">method to position the</st> `<st c="14780">Text</st>`
    <st c="14784">widget on the GUI.</st> <st c="14804">The</st> `<st c="14808">padx</st>`
    <st c="14812">and</st> `<st c="14817">pady</st>` <st c="14821">parameters add
    padding around the widget to create some space between it and other widgets in</st>
    <st c="14916">the window.</st>
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14457">此代码将在 GUI 窗口中添加一个文本字段，该字段将用于显示 Word 文档的 ChatGPT 翻译。</st> <st c="14585">在此，</st>
    `<st c="14595">Text</st>` <st c="14599">小部件对象名为</st> `<st c="14620">text_field</st>`
    <st c="14630">，放置在根窗口内部。</st> <st c="14665">此</st> `<st c="14669">Text</st>` <st
    c="14673">小部件用于显示和编辑多行文本。</st> <st c="14733">然后，我们使用</st> `<st c="14750">grid()</st>`
    <st c="14756">方法将</st> `<st c="14780">Text</st>` <st c="14784">小部件定位在 GUI 上。</st>
    <st c="14804">此</st> `<st c="14808">padx</st>` <st c="14812">和</st> `<st c="14817">pady</st>`
    <st c="14821">参数在窗口中为小部件添加填充，以在它与其他小部件之间创建一些空间。</st>
- en: <st c="14927">You can configure</st> `<st c="14946">text_field</st>` <st c="14956">to
    expand the main window horizontally and vertically, using the</st> `<st c="15022">grid_rowconfigure()</st>`
    <st c="15041">and</st> `<st c="15046">grid_columnconfigure()</st>` <st c="15068">methods.</st>
    <st c="15078">This allows the text field to fill up the available space in the
    window.</st> <st c="15151">Then, you can also configure the main window,</st>
    `<st c="15197">root</st>`<st c="15201">, to expand it.</st> <st c="15217">These
    settings ensure that the text field remains centered in the window and fills up
    the</st> <st c="15307">available space.</st>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14927">您可以通过使用</st> `<st c="14946">text_field</st>` <st c="14956">的配置来使主窗口在水平和垂直方向上扩展，使用</st>
    `<st c="15022">grid_rowconfigure()</st>` <st c="15041">和</st> `<st c="15046">grid_columnconfigure()</st>`
    <st c="15068">方法。</st> <st c="15078">这允许文本字段填充窗口中的可用空间。</st> <st c="15151">然后，您还可以配置主窗口，</st>
    `<st c="15197">root</st>`<st c="15201">，以扩展它。</st> <st c="15217">这些设置确保文本字段保持在窗口中心，并填充可用空间。</st>
- en: <st c="15323">Once your</st> <st c="15334">GUI is finalized, you can launch
    the application, and confirm that your GUI adheres precisely to the style and
    attributes shown in</st> *<st c="15465">Figure 6</st>**<st c="15473">.2</st>*<st
    c="15475">. By selecting the</st> **<st c="15494">Languages</st>** <st c="15503">menu
    with a single click, you can access and choose any language</st> <st c="15569">from
    it.</st>
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15323">一旦您的</st> <st c="15334">GUI 完成，您就可以启动应用程序，并确认您的 GUI 与</st> *<st
    c="15465">图 6</st>**<st c="15473">.2</st>*<st c="15475">中显示的样式和属性完全一致。</st> 通过单击**<st
    c="15494">语言</st>** <st c="15503">菜单，您可以访问并选择任何语言</st> <st c="15569">。</st>
- en: <st c="15577">This is how</st> <st c="15590">you can use the Tkinter library
    to create a GUI for a text translation application.</st> <st c="15674">We have
    created the main window, the header, the</st> **<st c="15723">Browse</st>** <st
    c="15729">button, and the drop-down menu with a list</st> <st c="15773">of languages.</st>
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15577">这就是如何使用 Tkinter 库创建文本翻译应用的 GUI。</st> <st c="15674">我们已经创建了主窗口、标题、</st>
    **<st c="15723">浏览</st>** <st c="15729">按钮，以及包含语言列表的下拉菜单。</st>
- en: <st c="15786">Despite having completed your GUI, clicking on the</st> **<st
    c="15838">Browse</st>** <st c="15844">button with a single click will not trigger
    any action, as it is not yet connected to any active Python function.</st> <st
    c="15959">We will fix that in the next section, where we will create two core
    functions that are responsible for opening the Microsoft Word file and performing</st>
    <st c="16109">the translation.</st>
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15786">尽管您已经完成了 GUI，但单击</st> **<st c="15838">浏览</st>** <st c="15844">按钮不会触发任何操作，因为它尚未连接到任何活动的
    Python 函数。</st> <st c="15959">我们将在下一节中修复这个问题，我们将创建两个核心函数，分别负责打开 Microsoft Word
    文件和执行</st> <st c="16109">翻译。</st>
- en: <st c="16125">Integrating Microsoft Word text with the ChatGPT API</st>
  id: totrans-81
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="16125">将 Microsoft Word 文本与 ChatGPT API 集成</st>
- en: <st c="16178">In this section, we will provide you with step-by-step instructions
    on how to create two core functions</st> <st c="16283">using Python, which are
    crucial</st> <st c="16315">to building a text translation application.</st> <st
    c="16359">The first function,</st> `<st c="16379">translate_text()</st>`<st c="16395">,
    uses</st> `<st c="16545">browse_file()</st>`<st c="16558">, allows users to browse
    and select a Word file from their local system and trigger the text translation
    process.</st> <st c="16672">Both functions will be explained in detail with code
    examples to help you understand and implement them in your</st> <st c="16784">own
    projects.</st>
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将逐步指导你如何使用 Python 创建两个核心函数，这些函数对于构建文本翻译应用程序至关重要。</st> <st c="16359">第一个函数，`<st
    c="16379">translate_text()</st>`<st c="16395">，使用 `<st c="16545">browse_file()</st>`<st
    c="16558">，允许用户从他们的本地系统中浏览并选择一个 Word 文件，并触发文本翻译过程。</st> <st c="16672">这两个函数将通过代码示例进行详细解释，以帮助你理解和在自己的项目中实现它们。</st>
- en: <st c="16797">Translating Word text with gpt-3.5-turbo</st>
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`<st c="16797">使用 gpt-3.5-turbo 翻译 Word 文本</st>`'
- en: <st c="16838">In this section, you</st> <st c="16860">will learn how to build
    the</st> `<st c="16888">translate_text()</st>` <st c="16904">function.</st> <st
    c="16915">This function is responsible for translating the text of a</st> <st
    c="16974">Microsoft Word file into the language chosen by the user through the
    GUI.</st> <st c="17048">We will use the OpenAI API, specifically the gpt-3.5-turbomodel,
    to translate</st> <st c="17126">the text.</st>
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将学习如何构建 `<st c="16888">translate_text()</st>` <st c="16904">函数。</st> <st
    c="16915">此函数负责将 Microsoft Word 文件的文本翻译成用户通过 GUI 选择的语言。</st> <st c="16974">我们将使用
    OpenAI API，特别是 gpt-3.5-turbomodel，来翻译 <st c="17126">文本。</st>
- en: <st c="17135">Before building the</st> `<st c="17156">translate_text()</st>`
    <st c="17172">function, you will need to create a file called</st> `<st c="17221">config.py</st>`
    <st c="17230">in your project root directory.</st> <st c="17263">This file will
    contain your OpenAI API token, which is required to use the OpenAI API.</st> <st
    c="17350">The API token should be assigned to a variable called</st> `<st c="17404">API_KEY</st>`
    <st c="17411">in the</st> `<st c="17419">config.py</st>` <st c="17428">file:</st>
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17135">在构建 `<st c="17156">translate_text()</st>` <st c="17172">函数之前，你需要在你的项目根目录下创建一个名为
    `<st c="17221">config.py</st>` <st c="17230">的文件。</st> <st c="17263">此文件将包含你的
    OpenAI API 令牌，这是使用 OpenAI API 所必需的。</st> <st c="17350">API 令牌应分配给名为 `<st c="17404">API_KEY</st>`
    <st c="17411">的变量，在 `<st c="17419">config.py</st>` <st c="17428">文件中：</st>
- en: <st c="17434">config.py</st>
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="17434">config.py</st>`'
- en: '[PRE6]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: <st c="17479">app.py</st>
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="17479">app.py</st>`'
- en: '[PRE7]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: <st c="17621">This step is</st> <st c="17634">necessary to keep the API token
    secure</st> <st c="17673">and prevent it from being accidentally uploaded to a</st>
    <st c="17726">public repository.</st>
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17621">此步骤是必要的，以保持 API 令牌的安全，并防止其意外上传到 <st c="17726">公共仓库。</st>
- en: <st c="17744">With the API key in place, you can now proceed to implement the</st>
    `<st c="17809">translate_text()</st>` <st c="17825">function in</st> `<st c="17838">app.py</st>`<st
    c="17844">, as demonstrated in the following</st> <st c="17879">code snippet:</st>
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置好 API 密钥后，你现在可以继续在 `<st c="17838">app.py</st>`<st c="17844">中实现 `<st c="17809">translate_text()</st>`
    <st c="17825">函数，如下面的 <st c="17879">代码片段</st> <st c="17879">所示：</st>
- en: '[PRE8]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: <st c="18583">The</st> `<st c="18588">translate_text()</st>` <st c="18604">function
    takes two parameters –</st> `<st c="18637">file_location</st>`<st c="18650">,
    which is the location of the Microsoft Word file to be translated, and</st> `<st
    c="18723">target_language</st>`<st c="18738">, which is the language to translate
    the text into.</st> <st c="18790">The first line of the function uses the</st>
    `<st c="18830">docx</st>` <st c="18834">module to</st> <st c="18845">open the
    Word document located</st> <st c="18876">at</st> `<st c="18879">file_location</st>`<st
    c="18892">. The next few lines of code create an empty string text and then loop
    through each paragraph in the document, concatenating the text from each paragraph
    to the text string.</st> <st c="19066">In other words, we can extract all the
    text from the Word document and store it in a</st> <st c="19151">single string.</st>
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="18583">The</st>` `<st c="18588">translate_text()</st>` `<st c="18604">函数接受两个参数
    –</st>` `<st c="18637">file_location</st>` `<st c="18650">，这是要翻译的 Microsoft Word
    文件的位置，以及</st>` `<st c="18723">target_language</st>` `<st c="18738">，这是要将文本翻译成的语言。</st>`
    `<st c="18790">函数的第一行使用</st>` `<st c="18830">docx</st>` `<st c="18834">模块打开位于</st>`
    `<st c="18876">at</st>` `<st c="18879">file_location</st>` `<st c="18892">的 Word
    文档。</st>` `<st c="18895">接下来的几行代码创建一个空字符串 text，然后遍历文档中的每个段落，将每个段落的文本连接到文本字符串中。</st>`
    `<st c="19066">换句话说，我们可以从 Word 文档中提取所有文本并存储在一个</st>` `<st c="19151">单独的字符串中。</st>`'
- en: <st c="19165">Then, the GPT-3.5 API model is used to translate the text.</st>
    <st c="19225">The</st> `<st c="19229">model_engine</st>` <st c="19241">variable
    is set to the GPT-3.5 model.</st> <st c="19280">A</st> `<st c="19282">response</st>`
    <st c="19290">variable is created by calling the</st> `<st c="19326">client.chat.completions.create()</st>`
    <st c="19358">method, which sends a prompt message to the API, requesting a response
    to translate the given text into the</st> <st c="19467">specified</st> `<st c="19477">target_language</st>`<st
    c="19492">.</st>
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="19165">然后，使用 GPT-3.5 API 模型来翻译文本。</st>` `<st c="19225">将</st>` `<st
    c="19229">model_engine</st>` `<st c="19241">变量设置为 GPT-3.5 模型。</st>` `<st c="19280">创建一个</st>`
    `<st c="19282">response</st>` `<st c="19290">变量，通过调用</st>` `<st c="19326">client.chat.completions.create()</st>`
    `<st c="19358">方法，向 API 发送提示信息，请求将给定的文本翻译成</st>` `<st c="19467">指定的</st>` `<st
    c="19477">target_language</st>` `<st c="19492">。</st>`'
- en: <st c="19493">The</st> `<st c="19498">messages</st>` <st c="19506">argument
    is a list of dictionaries that represent the conversation between the user and
    the</st> <st c="19599">language translator.</st>
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="19493">` `<st c="19498">messages</st>` `<st c="19506">参数是一个字典列表，代表用户和语言翻译器之间的对话。</st>`'
- en: <st c="19619">The</st> `<st c="19624">messages</st>` <st c="19632">variable
    is used to pass conversation history to the language model for translation.</st>
    <st c="19718">The conversation</st> <st c="19735">consists of messages exchanged
    between a user and an assistant using the</st> <st c="19808">ChatGPT API.</st>
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="19619">` `<st c="19624">messages</st>` `<st c="19632">变量用于将对话历史传递给语言模型进行翻译。</st>`
    `<st c="19718">对话</st>` `<st c="19735">由用户和助手使用</st>` `<st c="19808">ChatGPT API</st>`
    `<st c="19812">交换的消息组成。</st>`'
- en: <st c="19820">Let’s break down the design of the</st> `<st c="19856">messages</st>`
    <st c="19864">variable:</st>
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="19820">让我们分解一下</st>` `<st c="19856">messages</st>` `<st c="19864">变量的设计：</st>`'
- en: <st c="19874">The variable is a list of dictionaries, where each dictionary
    represents a message with two</st> <st c="19967">key-value pairs:</st>
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`<st c="19874">该变量是一个字典列表，其中每个字典代表一个包含两个</st>` `<st c="19967">键值对的消息：</st>`'
- en: '`<st c="19983">role</st>`<st c="19988">: This represents the role of the participant
    in the conversation.</st> <st c="20056">It can be either</st> `<st c="20073">user</st>`
    <st c="20077">or</st> `<st c="20081">assistant</st>`<st c="20090">.</st>'
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="19983">role</st>` `<st c="19988">：这代表对话中参与者的角色。</st>` `<st c="20056">它可以是</st>`
    `<st c="20073">user</st>` `<st c="20077">或</st>` `<st c="20081">assistant</st>`
    `<st c="20090">。</st>`'
- en: '`<st c="20091">content</st>`<st c="20099">: This represents the actual content
    of</st> <st c="20140">the message.</st>'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="20091">content</st>` `<st c="20099">：这代表消息的实际内容。</st>`'
- en: <st c="20152">The conversation follows a pattern, with the first two messages
    establishing the context and the last message providing the text to</st> <st c="20285">be
    translated:</st>
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`<st c="20152">对话遵循一个模式，前两条消息建立上下文，最后一条消息提供要</st>` `<st c="20285">翻译的文本：</st>`'
- en: <st c="20299">The first message is from the user’s role and explains the context
    of</st> <st c="20370">the interaction</st>
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="20299">第一条消息来自用户的角色，解释了交互的</st>` `<st c="20370">上下文</st>`'
- en: <st c="20385">The second message is from the assistant’s role and confirms its
    ability</st> <st c="20459">to help</st>
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="20466">The third message is from the user’s role and contains the text
    to be translated, including the</st> <st c="20563">target language</st>
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="20578">The conversation format is designed to give context to the language
    model about the task it needs to</st> <st c="20680">perform, making it clear that
    the user</st> <st c="20719">wants the assistant to translate the given text into
    the specified</st> <st c="20786">target language.</st>
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20802">The</st> `<st c="20807">role</st>` <st c="20811">key specifies
    whether the message is from the user or the assistant, and the</st> `<st c="20889">content</st>`
    <st c="20896">key contains the actual message text.</st> <st c="20935">The final
    translated text is obtained from the</st> `<st c="20982">response</st>` <st c="20990">object
    and returned by</st> <st c="21014">the function.</st>
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21027">After sending the message with the text to be translated and the
    target language to the GPT-3.5 API model, the response will be a JSON object containing
    various information about the response generated by the model.</st> <st c="21244">For
    this model, the actual translation is stored in the</st> `<st c="21300">content</st>`
    <st c="21307">field of the first choice in the</st> `<st c="21341">choices</st>`
    <st c="21348">list of the response.</st> <st c="21371">Therefore, the code extracts
    the translated text by accessing the</st> `<st c="21437">content</st>` <st c="21444">field
    of the first choice and assigns it to the</st> `<st c="21493">translated_text</st>`
    <st c="21508">variable, which is then returned by</st> <st c="21545">the function.</st>
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21558">Once we have processed the translated text into a Python string,
    we can display it to the user.</st> <st c="21655">In addition to that, we need
    to implement a function to establish the path to our Word file using the</st>
    `<st c="21805">browse_file()</st>` <st c="21818">function:</st>
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: <st c="22234">The</st> `<st c="22239">browse_file()</st>` <st c="22252">function
    creates a file dialog window that allows the user to select a Word file</st> <st
    c="22334">to be translated.</st> <st c="22352">If the user</st> <st c="22364">selects
    a file, the function retrieves the selected language from a drop-down menu, and
    then it calls the</st> `<st c="22470">translate_text()</st>` <st c="22486">function
    with the file location and target language as parameters.</st> <st c="22554">Once
    the text has been translated, the function clears the text field and inserts the
    translated text</st> <st c="22656">into it.</st>
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22664">The function opens a file dialog window for the user to select
    a Word file to translate.</st> <st c="22754">The</st> `<st c="22758">initialdir</st>`
    <st c="22768">parameter sets the initial directory to be displayed when the file
    dialog opens, and the</st> `<st c="22858">title</st>` <st c="22863">parameter
    sets the title of the file dialog window.</st> <st c="22916">The</st> `<st c="22920">filetypes</st>`
    <st c="22929">parameter specifies the file types that the user can select in the
    file dialog.</st> <st c="23010">In this case, the user can select files with a</st>
    `<st c="23057">.docx</st>` <st c="23062">extension.</st> <st c="23074">The path
    of the selected file is stored in the</st> `<st c="23121">file_location</st>`
    <st c="23134">variable.</st>
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="22664">该函数打开一个文件对话框，让用户选择要翻译的Word文件。</st> <st c="22754">其中，</st> `<st
    c="22758">initialdir</st>` <st c="22768">参数设置文件对话框打开时显示的初始目录，而</st> `<st c="22858">title</st>`
    <st c="22863">参数设置文件对话框窗口的标题。</st> <st c="22916">`<st c="22920">filetypes</st>`
    <st c="22929">参数指定用户可以在文件对话框中选择的文件类型。</st> <st c="23010">在这种情况下，用户可以选择具有</st>
    `<st c="23057">.docx</st>` <st c="23062">扩展名的文件。</st> <st c="23074">所选文件的路径存储在</st>
    `<st c="23121">file_location</st>` <st c="23134">变量中。</st>
- en: <st c="23144">Then, we check whether a file has been selected; if so, then we
    can retrieve the selected language from a drop-down menu using the</st> `<st c="23276">language_var.get()</st>`
    <st c="23294">function.</st> <st c="23305">The</st> `<st c="23309">translate_text()</st>`
    <st c="23325">function is called, with the selected file location and target language
    as arguments to translate the text in the file to the</st> <st c="23452">target
    language.</st>
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="23144">然后，我们检查是否已选择了一个文件；如果是的话，我们可以使用</st> `<st c="23276">language_var.get()</st>`
    <st c="23294">函数从下拉菜单中检索所选语言。</st> <st c="23305">接着调用</st> `<st c="23309">translate_text()</st>`
    <st c="23325">函数，并将所选文件位置和目标语言作为参数传递，以将文件中的文本翻译为目标语言。</st> <st c="23452"></st>
- en: <st c="23468">After the text is translated, we can delete any text that may
    be in the text field and insert the translated text into the text field.</st>
    <st c="23604">The text field is the GUI widget that displays the translated text
    in</st> <st c="23674">our app.</st>
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="23468">文本翻译完成后，我们可以删除文本字段中可能存在的任何文本，并将翻译后的文本插入到文本字段中。</st> <st c="23604">文本字段是我们应用程序中显示翻译文本的GUI小部件。</st>
- en: <st c="23682">Finally, you can add another parameter to</st> `<st c="23725">browse_button</st>`<st
    c="23738">, ensuring that the</st> `<st c="23758">browse_file()</st>` <st c="23771">function
    is activated upon a single click on</st> <st c="23817">the button:</st>
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="23682">最后，你可以向</st> `<st c="23725">browse_button</st>`<st c="23738">添加另一个参数，确保在</st>
    `<st c="23758">browse_file()</st>` <st c="23771">函数被激活时，只需点击</st> `<st c="23817">按钮：</st>
- en: '[PRE10]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
