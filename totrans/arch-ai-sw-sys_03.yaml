- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Case for Architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What would the world look like without civic architecture? Buildings would be
    built at random, health and safety regulations may not be implemented, there would
    be no coordination with municipal entities, and the actual time to build would
    be longer since coordination among the builders would lack an underlying cohesion.
    The architect, equipped with vision, purpose, processes, tools, and direction,
    ensures that the right system is built. Rigorously architected systems also allow
    for a unity of effort and ensure that the whole project team understands what
    is to be built.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture is also needed for complex systems development. A complex system
    has many different engineering domains that must come together to build a system
    that each domain could not do by itself. There are competing demands and incomplete
    knowledge among all the teams. Many times, there are basic challenges of even
    knowing how to communicate with each other. In a complex system, there are usually
    different stakeholders who have demands of the final system that are at odds with
    each other – an architect must broker these demands.
  prefs: []
  type: TYPE_NORMAL
- en: An architect’s role is to develop a unified vision, guide design that is technically
    achievable, and achieve system creation that meets budget goals and the development
    schedule.
  prefs: []
  type: TYPE_NORMAL
- en: The role of the architect has roots in antiquity and is pivotal to modern systems.
    The role of the architect in software systems is just as key as a civil architect.
    The software architect performs a critical function to ensure the correct system
    is built and acts as the principal advocate for the end user of the system. The
    architect is also responsible for ensuring that the system maintains cohesion.
    This is a tall order. Embracing the role and processes of architecture improves
    the quality and success of the end system.
  prefs: []
  type: TYPE_NORMAL
- en: Consequences of architectural failures
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To start the discussion on architecture for complex software, let’s do a quick
    thought experiment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine your team is tasked to build an application to conduct queries on a
    networked data store and return the results to a remote user. Now, you have four
    software engineers on your team: one who works on the data store, one who works
    on the service layer, one who integrates the user interface with the data store
    application, and an engineer who works on the user interface.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are seven practices that compromise project success:'
  prefs: []
  type: TYPE_NORMAL
- en: Undirected communication and coordination among team members, since often there
    is not a common understanding or reference point to unify action
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Treating all engineering assumptions as equally valid without requirement validation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Making design decisions through majority voting rather than technical expertise
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Limiting customer communication to user interface engineers only
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Treating integration and testing as optional activities
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Eliminating intermediate milestones and review checkpoints
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Recognizing only the final delivery date as a meaningful project milestone
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this scenario, usable software would not be delivered. Each list item not
    done would be considered a failure in architecture. This is a simple system –
    as the demands on the system grow or the domain becomes more challenging, the
    importance of architecture comes to the fore. AI-enabled software is exceptionally
    complex software.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will give some background on the concept of architecture, how it
    can be used to mitigate failures, and, more importantly, lay out the justification
    that architecture done right can allow one to deliver robust AI-enabled software.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following main topics in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: The origins of architecting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The role of the architect
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The holder of the vision
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Architecting processes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The language of architecture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The origins of architecting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The profession of architecture has roots in deep antiquity. The word architect
    comes from the Greek “arche,” which means first, and “techion,” which means builder.
    Thus, an architect is the person who brings forth a concept to a system that will
    serve a purpose. For the modern AI software architect, that means that they must
    grapple with making a system that can correctly make decisions or inferences in
    an algorithmic manner.
  prefs: []
  type: TYPE_NORMAL
- en: Ancient architects provided humanity with the pyramids of ancient Egypt, the
    beautiful structures to honor the Hellenistic gods, and the aqueducts of Rome,
    to name a few. Egyptian architects conceived and led the development of massive
    structures that have lasted thousands of years. They were key to the coordination
    of thousands of workers and the use of mathematics to guide workmanship and the
    dimensions of rocks, which needed to be cut and placed correctly, with amazing
    precision and symmetry, thus demonstrating mastery of mathematics and engineering
    coordination. The architects of the Hellenistic period developed techniques to
    build temples and structures with beautiful symmetry, utilizing design patterns
    and making decisions that, though usually not optimal, resulted in a beautiful
    yet still practical system.
  prefs: []
  type: TYPE_NORMAL
- en: They also coordinated and guided the workmanship and planning to assemble their
    vision. These structures were massive, and their soundness of structure and load
    balance have enabled them to last for thousands of years. The Roman architects
    built amazing coliseums and planned roadways, temples, and aqueducts. This demonstrated
    the capability to be flexible and have the engineering depth to guide the building
    of a complex system.
  prefs: []
  type: TYPE_NORMAL
- en: The aqueducts demonstrated a command not only of building structures but also
    of the use of hydrodynamic principles and advanced engineering to deliver water
    to many parts of their respective cities. This new type of structure had a transformative
    effect on cities. Water, as an essential liquid humans need not only for drinking
    but for cleansing and recreation, could be enjoyed and used by the population.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_02_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: Timeline of architectural evolution'
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)**The next-gen Packt Reader** and a **free PDF/ePub copy** of
    this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Unlock1.png)'
  prefs: []
  type: TYPE_IMG
- en: Historically, the architect was usually a single person who drove the vision
    of the end system to development. The architect is the integrating force that
    ensures the components that are built come together and realize system-level effects.
    The insight that architecture is both an ancient and modern art stems from ancient
    dictums that state that the best systems come from a single vision and that a
    system should exhibit certain key attributes and the use of design patterns.
  prefs: []
  type: TYPE_NORMAL
- en: With the modern age, specifically the Renaissance period of European history,
    the continual and accelerating development of technology exploded and has not
    abated. In the modern world, we have witnessed such breathtaking developments
    as railways, seafaring vessels, large-scale electricity, automotive vehicles,
    airplanes, radar, telecommunications, computers, nuclear energy, space flight,
    medical devices, satellites, the internet, and personal smartphones. A key system
    that is in its infancy in terms of being an engineering discipline is software.
    Before going any further, I want to clarify that this is a book on **software
    architecture** and **AI-enabled systems**. So, going forward, I will use the word
    *system* in the sense of a *software system*.
  prefs: []
  type: TYPE_NORMAL
- en: Systems architects bridge user needs and technological implementation, orchestrating
    complex projects through disciplinary coordination, requirement definition, and
    development oversight.
  prefs: []
  type: TYPE_NORMAL
- en: 'In AI-enabled systems, architects balance traditional software concerns with
    specialized challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: Data pipeline management and model development workflows.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: System adaptability while maintaining output stability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration of algorithmic components with software infrastructure.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unlike physical structures visualized through drawings, software architecture
    requires multiple perspectives:'
  prefs: []
  type: TYPE_NORMAL
- en: Logical models and functional specifications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Operational scenarios and use cases.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interface controls and service agreements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prototypes, simulations, and analyses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modern complexity necessitates architectural teams collaborating with domain
    specialists, while maintaining clear decision authority with a single responsible
    architect – avoiding the pitfalls of committee-based design decisions.
  prefs: []
  type: TYPE_NORMAL
- en: The role of the architect
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What is it that an architect delivers? A derogatory remark is that they are
    just document creators, since they deliver specifications, concept of operations
    documents, modeling diagrams, white papers, and technology evaluations. These
    are artifacts of the architecting process and communication tools that guide follow-on
    engineering activities. The thinking and collaboration must be done before relevant
    and impactful documentation is created.
  prefs: []
  type: TYPE_NORMAL
- en: For example, what would happen if a database engineer were only in charge of
    building an application?
  prefs: []
  type: TYPE_NORMAL
- en: Without a unified vision, specialists naturally optimize according to their
    expertise – database engineers prioritize data structures while interface designers
    focus on user experience. This specialization necessitates a central role to provide
    cohesion. The architect balances customer expectations with technical requirements,
    guides design decisions, and coordinates project execution.
  prefs: []
  type: TYPE_NORMAL
- en: This section explores the architect’s responsibilities, providing insight into
    the role’s breadth and significance. The prestigious title carries substantial
    responsibility.
  prefs: []
  type: TYPE_NORMAL
- en: 'From ancient monuments to modern systems, the architect’s function remains
    consistent: satisfying diverse stakeholders while delivering functional solutions.
    Egyptian pyramid architects balanced ruler glorification with construction feasibility;
    modern architects similarly reconcile competing priorities while ensuring proper
    implementation within budget and schedule constraints.'
  prefs: []
  type: TYPE_NORMAL
- en: Balancing vision and precision in AI architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI architects must simultaneously function as strategists and technical analysts.
    Their dual responsibility requires developing value-aligned roadmaps while identifying
    critical implementation details that could compromise system integrity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Successful architects employ the 5W+H framework to bridge macro and micro perspectives:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Who**: Users, stakeholders, and roles affected by the AI system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What**: Purpose, constraints, technologies, data requirements, and computational
    complexity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Why**: Justifications for requirements, techniques, and implementation decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When**: Delivery timelines, retraining cycles, and integration milestones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Where**: System positioning, data sources, execution environments, and storage
    solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How**: Testing methodologies, integration approaches, error handling, and
    performance metrics. Also, how to meet non-functional considerations such as security,
    privacy, historical data stores and overall system observability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each inquiry must be evaluated through cost, schedule, and performance lenses
    while addressing compliance and security constraints. No universal template exists
    – effective architects apply contextual heuristics, filtering critical details
    from overwhelming complexity.
  prefs: []
  type: TYPE_NORMAL
- en: AI systems and architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI-enabled systems are implemented in software. Architecture improves the engineering
    effort by using a host of models, prototyping, reviews, and design guidance. Given
    the abstract nature of AI-enabled systems, architecting is a risk reduction activity
    by methodically including many perspectives and engaging stakeholders to ensure
    first-order mistakes are not made. The architect can define, direct, and evaluate
    prototyping efforts to ensure that the prototyping is adding value to the project.
    The use of reviews of documentation and presentations ensures there is cohesive
    communication across the engineering teams, stakeholders, and end users. This
    documentation is given to the customer to demonstrate that the engineering efforts
    are understood and to give the customer the opportunity to impact the direction
    of the project. The engineering teams use the documentation to aid in executing
    their respective processes and activities. The documentation aids the project
    planners with scoping the schedule and budgets for the project. Finally, the documentation
    is the living document that the architect uses to define and update the final
    vision of the to-be-built system.
  prefs: []
  type: TYPE_NORMAL
- en: 'The role of an architect requires them to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Understand and define the requirements to the stakeholders.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop models, diagrams, drawings, documents and design artifacts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communicate with builders or engineers such that a builder can actually create
    the structure or system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Oversee and potentially lead the design of a system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coordinate and address issues and problems that occur during development.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conduct final acceptance of the built system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As the progression of technology occurred, the demands on systems have increased
    exponentially, thus making the architect’s role ever more important. For modern
    systems, there needs to be, as much as is practical, immersion into the domain
    of stakeholders, such as clients, regulators, partners, and even internal staff.
    The architect must know how value is going to be created for the customer using
    the new system. There needs to be an understanding of the various constraints
    that must be dealt with, such as safety, compliance, and regulatory constraints.
    A common occurrence is that many software systems fail not so much because any
    given part of the system was not built or tested correctly, but because the wrong
    system was built.
  prefs: []
  type: TYPE_NORMAL
- en: The main artifacts of the architect are varied. The architect needs to create
    and adjudicate system vision documents, guide the full gamut of models, write
    and communicate specification documents, aid in design reviews, and give guidance
    for test development programs, verification processes, and ultimately acceptance
    of the system. The role of the architect is also intertwined with project and
    program execution.
  prefs: []
  type: TYPE_NORMAL
- en: 'For AI-enabled systems, architects must do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Clearly communicate how AI technology delivers value to stakeholders, defining
    usage and business impact.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable data scientists to build complex models requiring strong mathematical
    and algorithmic understanding. Standard software diagrams must be augmented with
    performance simulations, detailed decision mapping, and robust state machine techniques.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Collaborate closely with AI engineers, ensuring supporting documentation enables
    unified system operation. The AI engineer looks to integrate machine learning
    models. They are also tasked with building systems that meet non-functional requirements
    such that analytic pipelines are scalable, reliable, and controllable. The AI
    engineer also looks to develop designs that are consistent with the vision of
    the system. An AI engineer needs to balance their respective detailed designs
    to conform or not be at odds with the overall vision of the system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify key non-functional requirements, patterns, and tactics for systems
    making autonomous decisions without human intervention.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Guide testing teams through decision correctness verification across varied
    inputs, including off-nominal scenarios for system robustness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The architect must lead requirements derivation and use case development to
    ensure that supporting systems around AI functionality are correctly built.
  prefs: []
  type: TYPE_NORMAL
- en: The holder of the vision
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Imagine that you and two friends want to go and eat lunch. For this scenario,
    you have the final say on where to go, but you must take into full account the
    desires of your two friends. This simple decision could potentially become involved:
    What will you eat? Where? What will the cost be? A decision must be made, but
    how? In this sort of situation, other considerations that impact the decision
    must be brought forward, such as lifestyle, frugality, allergies, and similar
    factors. You, as the decider, must craft a decision that synthesizes the desires
    and limits voiced by your friends. As the one making the decision, you must craft
    a vision that harmonizes the competing needs of your two friends while ensuring
    the outcome delivers value. This is what an architect does. They develop a vision
    for the system and then guide the building of the system in line with the vision.
    The vision of the system underpins so many aspects of a system that it must be
    done right, communicated, and ensure it meets the stakeholders’ needs.'
  prefs: []
  type: TYPE_NORMAL
- en: For AI-enabled systems, architects must articulate how technology delivers stakeholder
    value, defining clear business impact and usage patterns. Their modeling responsibilities
    require strong mathematical understanding to create performance simulations, decision
    mappings, and state machines beyond standard software diagrams.
  prefs: []
  type: TYPE_NORMAL
- en: Architects collaborate with AI engineers, ensuring documentation enables unified
    system operation. They identify non-functional requirements and architectural
    patterns for autonomous decision-making without human intervention.
  prefs: []
  type: TYPE_NORMAL
- en: Testing guidance focuses on decision correctness verification across varied
    inputs and failure scenarios, ensuring system robustness. Throughout development,
    architects lead requirements derivation and use case development to properly integrate
    AI functionality with supporting systems.
  prefs: []
  type: TYPE_NORMAL
- en: The architectural cycle
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The architectural cycle is an iterative process where analysis, synthesis, and
    evaluation are done to develop a first-order concept.
  prefs: []
  type: TYPE_NORMAL
- en: Analysis activities include decomposing the major functions and sub-functions
    that a system needs to provide, the identification of non-functional requirements
    that are most relevant for the AI-enabled system, and the identification of the
    driving metrics or measures that can be used to judge the performance of the system
    or as a measure of other key attributes. Examples of other key attributes can
    be cost constraints, the time between failures, usability metrics, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Synthesis activities are a creative process where first-order design is executed
    to arrive at feasible concepts. This is where the architect can initially use
    patterns and tactics to describe the logical framework, the identification of
    processes that must be executed to meet the needs of the customer, and the identification
    of technologies that can be used.
  prefs: []
  type: TYPE_NORMAL
- en: The evaluation process is executed to sort and prioritize the different synthesized
    concepts. Modeling and systems analysis can be used to test and understand the
    bounds of the different concepts. If too much uncertainty or difficulty in evaluation
    occurs, the use of prototyping may be done to aid this stage. The use of decision
    matrices can be used. Once a set of concepts is defined, then the final step is
    to enter into a review process with all the relevant stakeholders, but where the
    final decision is made by the stakeholder on how to proceed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_02_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Architecture cycle'
  prefs: []
  type: TYPE_NORMAL
- en: Thinking like an architect
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A common question is how does one think like an architect? This is a skill that
    can be learned and, with experience, honed. This is especially true if one focuses
    on a domain or technology approach. A main theme for thinking like an architect
    is to develop insights into how structures and processes impact the design of
    the system. For example, the architect should identify or discover the key non-functional
    requirements of the system. How does the system meet the end goal or main objectives?
    In software, at a minimum, this requires developing, understanding, and evaluating
    functions, logical structures, and behavioral processes.
  prefs: []
  type: TYPE_NORMAL
- en: In thinking like an architect, the stakeholders are key, since they are the
    ones who accept the system and are paying for it to be built. Engagement and validation
    with stakeholders is gained through interactions, both formal and semi-formal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tools to do this include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Review of documentation that the customer may already have.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Market research on the domain.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Inspection or review of competitors of the customer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Interviews, workshops, and focused meetings.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rapid prototyping, constrained demonstrations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The development of key technical documentation with reviews and acceptance by
    the customer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s use a hypothetical example of thinking like an architect for a financial
    services domain. Financial institutions must be on constant alert for fraudulent
    transactions or deception. The use of AI is a great candidate for this type of
    use case. The challenge for the architect is to decide what type of technology
    to use from the dozens of approaches that exist. A deep network works very well
    in identifying off-nominal or odd patterns in transactions, but a deep network
    cannot give a chain of reasoning for identifying a transaction as required by
    compliance mandates. A symbolic approach is not as robust as a deep network for
    identifying off-nominal transactions, but it can provide chain reasoning for classifying
    a transaction as off-nominal.
  prefs: []
  type: TYPE_NORMAL
- en: What is an architect to do? Consider a logical structure that uses both technologies.
  prefs: []
  type: TYPE_NORMAL
- en: In analyzing the domain, the speed of being able to identify odd situations
    is a driver. The faster an off-nominal situation is discovered, the faster the
    downside impacts can be mitigated. The deep net is then used as the first filter,
    which tags off-nominal conditions to then be fed to a classification engine that
    would use a symbolic approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are example questions to be asked to drive architectural considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: What is the inference that drives classification? Lots of activity for an account
    that was dormant? The size of a transaction?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the data that is going to be coming into the system? Transactions per
    second? Customer metadata? Outside data sources?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the quality of data that is going to be used? What filtering and transformations
    need to be done? Does the system need a common time stamp? Do customers need to
    be anonymized?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How is the customer’s business model impacted by the system? Is this system
    going to drive revenue increases? Will it lower expenses? Does it meet compliance
    requirements?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the computing hardware, software, and networking infrastructure needed?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the design intuitive? Who are the staff using it? Junior staff? Accountants?
    Finance professionals? Operations staff?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the schedule for delivery in line with the customer’s funding ability and
    staff resources to use the technology?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can a solution meet cost and schedule constraints?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are the new risks that shall be introduced into the customer’s organization?
    Will the system stop transactions? What happens if a transaction is missed?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In thinking like an architect, one gains the big picture and delineates potential
    key details that could have major architectural consequences.
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining architectural vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Communicating the system vision to stakeholders is essential, requiring clear
    articulation of benefits, value, and potential risks. The architect must maintain
    cohesion throughout development – ensuring consistency while integrating stakeholder
    feedback and adapting to changing requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Despite inevitable changes, the architect must prevent component and interface
    divergence to preserve continuity. Stakeholders require a detailed understanding
    of how the implementation will satisfy functional needs within budget and timeline
    constraints.
  prefs: []
  type: TYPE_NORMAL
- en: For AI-enabled systems, the vision must address algorithmic decision-making
    at the system’s core. This includes defining appropriate checks and balances,
    establishing stringent data quality requirements and observability, and designing
    human-system interactions that build trust in automated operations.
  prefs: []
  type: TYPE_NORMAL
- en: 'In AI-enabled projects, clearly documenting and communicating the system vision
    is crucial. It involves collaborative efforts to create key documents and visual
    aids, which include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Concepts of operations documents**: These are especially important in AI
    projects as they describe how the AI system will operate in various real-world
    scenarios and how it interacts with users.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High-level use case diagrams**: For AI systems, these diagrams are vital
    as they show the different ways AI will interact with its environment and users,
    highlighting automated decisions and responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Logical and functional decompositions**: In the context of AI, these decompositions
    help stakeholders understand the underlying AI architecture and how different
    components, such as machine learning models and data processing units, fit together.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Support narratives**: These narratives are essential for explaining complex
    AI functionalities and algorithms in understandable terms, helping non-technical
    stakeholders grasp how the AI will achieve its intended tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Models**: Logical data model artifacts, data flow diagrams, and guidance
    on data governance approaches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/B19300_02_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: Balancing stakeholders'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.3* gives an overview of how the architect needs to balance the potentially
    many demands of stakeholders in the development of a vision. To do this effectively,
    significant communication, diagrams, and engagement must occur. For AI-enabled
    systems, the architect usually has the most responsibility, being able to communicate
    and translate how the algorithmic decision-making of the system impacts the stakeholders.'
  prefs: []
  type: TYPE_NORMAL
- en: Modern system architecting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What do the systems that delivered humans to the moon and brought them back
    to earth have in common with advanced medical devices, a modern automobile, and
    a microprocessor?
  prefs: []
  type: TYPE_NORMAL
- en: They are systems that deliver tremendously specialized capabilities that, before
    the 20^(th) century, would have been unimaginable. Let’s take a short detour to
    look at how the history of modern system development resulted in the development
    of architecture.
  prefs: []
  type: TYPE_NORMAL
- en: World War II catalyzed transformative systems – communications, radar, rockets,
    and nuclear technology – through scientific integration and coordinated engineering.
    This approach generated hundreds of post-war innovations that revolutionized modern
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Today’s organizations employ systems architects who, like their civil counterparts,
    create vision, advocate for customers, and drive complex system design. This discipline
    became essential as performance demands increased across aerospace, electronics,
    medical, nuclear, and naval domains.
  prefs: []
  type: TYPE_NORMAL
- en: Despite diverse engineering specialties, the need for integrated development
    remains universal. Complex systems require coordination across numerous teams
    and stakeholders – unity achieved through architectural models, communications,
    and artifacts that align diverse disciplines toward cohesive implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For AI-enabled systems, which are the focus of this book, an architect must
    deal with two significant considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: The use and impact of the AI-enabled components work to meet the customer’s
    needs and performance requirements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI components are usually rooted in complex software systems, so there is non-trivial
    risk associated with software development.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The fact that a cohesive and consistent architecture for a complex system is
    needed really is not up for debate. What is up for debate is how one goes about
    creating an architecture that then drives the system development. A central tenet
    of the authors is that rigorous architecting is necessary to tame the complexity
    of modern AI/ML system development and successful deployment.
  prefs: []
  type: TYPE_NORMAL
- en: The execution of software development must involve the availability of source
    documents from which to scope, trace requirements, guide the design, allow for
    integration, and ultimately, to conduct testing. The design process requires an
    overarching set of principles, goals, and constraints so as to build the system,
    test it, and deploy it. The integration and test teams require insight into what
    is to be built, so testing resources are allocated and well defined. A whole slew
    of interrelated documents, governing models, and clear documentation satisfies
    many of the needs of the key stakeholders of the project. There must also exist
    a significant verbal and leadership presence to be able to navigate across the
    different technical teams to ensure design decisions are faithful to the vision,
    and provide guidance to clarify specifications and validation that a given implementation
    is the correct one. It is through documentation, presentations, and communications
    that the architect can ensure a coherent implementation is realized.
  prefs: []
  type: TYPE_NORMAL
- en: There are now standards for software architecture, the most relevant for this
    audience being IEEE 42010 Systems and software engineering – Architecture description.
  prefs: []
  type: TYPE_NORMAL
- en: Decision-making frameworks for AI architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Architecting AI-enabled systems requires a structured decision-making process
    that balances business objectives, technical feasibility, and ethical considerations.
    The architect must develop a conceptual foundation for selecting appropriate AI
    approaches, particularly when working with advanced technologies such as large
    language models, vector databases, and web search integration.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the right AI approach
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When developing the architectural vision for an AI system, the architect must
    evaluate which technical path will best serve the business requirements. These
    generally fall into three categories:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Traditional machine learning models**: These are appropriate for systems
    working with well-structured data and clearly defined problems, such as fraud
    detection, predictive maintenance, or customer segmentation systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deep learning architectures**: These become necessary when dealing with unstructured
    data requiring complex pattern recognition, including image recognition, natural
    language processing, or audio processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Foundation models with retrieval-augmented generation (RAG)**: This modern
    approach leverages pre-trained foundation models enhanced with domain-specific
    knowledge retrieval systems. These architectures excel at knowledge-intensive
    tasks, conversational interfaces, and systems requiring real-time information
    access.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The selection between these approaches is not merely a technical decision but
    must be guided by how well each aligns with the overall system vision and stakeholder
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.4* illustrates the structured decision-making process for AI architecture,
    showing how business requirements, data characteristics, and quality attributes
    influence the selection of appropriate AI approaches and infrastructure. The workflow
    guides architects through defining requirements, analyzing the problem domain,
    selecting AI technologies, and configuring infrastructure to produce a cohesive
    architectural blueprint.'
  prefs: []
  type: TYPE_NORMAL
- en: Multi-dimensional decision framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To ensure the architect makes informed decisions that lead to a successful
    AI implementation, they should evaluate architectural choices across three critical
    dimensions:'
  prefs: []
  type: TYPE_NORMAL
- en: Business alignment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Value creation**: How directly will this architecture support revenue generation
    or cost reduction?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operational efficiency**: What are the ongoing operational costs of maintaining
    the chosen architecture?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risk profile**: Does this approach introduce compliance, security, or ethical
    risks that must be mitigated?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data science considerations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Data readiness**: Is sufficient, high-quality data available to support the
    chosen approach?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance requirements**: What accuracy, precision, and recall metrics
    must the system achieve?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model evolution**: How will the architecture support ongoing model updates
    and fine-tuning?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical constraints
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Computational resources**: What processing power, memory, and storage will
    the system require?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration complexity**: How will the AI components interface with existing
    enterprise systems?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Real-time requirements**: What latency constraints must the architecture
    satisfy?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Structured decision process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To address these multi-dimensional concerns, the architect should implement
    a structured decision workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define the vision and requirements**: Establish clear business goals and
    translate them into functional and non-functional requirements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assess the data landscape**: Evaluate available data sources, quality issues,
    privacy, and potential biases that could impact model performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Architecture selection**: Based on requirements and a data assessment, determine
    which AI approach best balances capabilities with constraints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Infrastructure planning**: Design the deployment architecture, considering
    scaling needs, security requirements, and performance constraints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prototype and validate**: Develop proof-of-concept implementations to validate
    key architectural decisions before full implementation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Implementation strategy**: Create a roadmap for development, testing, and
    deployment that includes monitoring and feedback mechanisms.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This structured approach ensures that architectural decisions are not made in
    isolation but are part of a cohesive vision that addresses both technical excellence
    and business value.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_02_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Architectural decision flow for AI systems'
  prefs: []
  type: TYPE_NORMAL
- en: Balancing innovation and practicality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The architect must strike a balance between leveraging cutting-edge AI capabilities
    and ensuring system reliability. Novel approaches may offer powerful capabilities
    but introduce implementation challenges or operational uncertainties. The architect
    should consider the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Technological maturity**: Are the chosen technologies production-ready or
    still experimental?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Team capabilities**: Does the organization have the skills to implement and
    maintain the chosen architecture?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fallback mechanisms**: How will the system handle AI component failures or
    unexpected behaviors?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By systematically addressing these considerations within a structured decision
    framework, the architect can develop an AI system architecture that not only meets
    current needs but can evolve as both business requirements and AI technologies
    advance.
  prefs: []
  type: TYPE_NORMAL
- en: The language of software architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Software architecture communicates the system vision through artifacts, analyses,
    and synthesis validated by stakeholder engagement. Architects model complex domains
    using abstractions that organize components, interfaces, and functions for technical
    planning and execution.
  prefs: []
  type: TYPE_NORMAL
- en: 'Three essential architectural tools form this language, as described in *Software
    Architecture in Practice*:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Heuristics** reduce complexity through experience-based guidelines:'
  prefs: []
  type: TYPE_NORMAL
- en: Anticipate data corruption and model drift
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand mathematical limitations and acceptable errors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Know computational boundaries and data flow constraints
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tactics** solve specific problems:'
  prefs: []
  type: TYPE_NORMAL
- en: Limit data store operations to CRUD functions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implement redundant controls for reliability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Security considerations such as role-based access, encryption, and public key
    infrastructure
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Patterns** provide reusable templates:'
  prefs: []
  type: TYPE_NORMAL
- en: Layer functionality to manage complexity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Structure integrated pipelines for data processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While newer than traditional engineering disciplines, AI architecture has become
    critical as intelligent systems form operational foundations, create business
    value, proliferate in implementation options, establish human trust, and enable
    human-machine collaboration.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.5* shows a mind map of what the authors consider major aspects for
    the language of architecture.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_02_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5: Language of architecting'
  prefs: []
  type: TYPE_NORMAL
- en: Governance and compliance considerations for AI systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When developing AI-enabled systems, the architect must address not only functional
    and performance requirements but also governance, explainability, and compliance
    dimensions. These aspects represent critical “big picture” concerns that manifest
    in numerous detailed implementation decisions throughout the system.
  prefs: []
  type: TYPE_NORMAL
- en: Governance framework for AI architectures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'AI governance encompasses the policies, procedures, and oversight mechanisms
    that ensure ethical and responsible AI development. For software architects, this
    means establishing the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bias mitigation strategies**: The architecture must incorporate measurable
    mechanisms to identify and mitigate bias in both training data and model outputs.
    This often requires specific model validation components in the pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accountability structures**: **Human-in-the-loop** (**HITL**) mechanisms
    must be architected into critical decision paths, particularly for high-stakes
    domains. This means designing explicit points where human review can be done for
    high-value decision-making under uncertainty.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data provenance tracking**: The system must maintain comprehensive records
    of data lineage and versioning of data and models, and ensure that all sources
    used for training and inference comply with data regulations and usage rights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Auditability components**: Logging mechanisms must record model decisions,
    inference data, and responses in a manner that allows for retrospective review
    and validation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explainability in AI architecture design
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Unlike traditional software systems, whose behavior is deterministic, AI systems
    introduce non-deterministic elements that require special architectural considerations
    for explainability:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Interpretability layers**: For complex models such as deep neural networks,
    the architect should consider additional components that provide feature attribution,
    allowing users to understand which inputs most influenced a particular output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Confidence scoring**: AI responses should include confidence metrics to indicate
    reliability, requiring specific measurement components in the architecture.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decision tracing**: The architecture should enable logging of intermediate
    steps in AI pipelines, allowing for retrospective analysis and debugging of model
    behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transparent interfaces**: User interfaces should provide appropriate context
    for AI-generated content, including citations or explanations of the reasoning
    process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regulatory compliance integration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The architect must ensure that the AI system complies with applicable regulations,
    which may include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data privacy requirements**: Systems must adhere to regulations such as GDPR
    (EU) and CCPA (USA), which may necessitate specific components for user consent
    management, data access controls, and data deletion capabilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sector-specific regulations**: In domains such as healthcare (HIPAA) or finance,
    the architecture must incorporate domain-specific safeguards and documentation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Algorithmic accountability**: Emerging regulations require AI systems to
    be testable for bias and fairness, requiring the architect to design for comprehensive
    testing and validation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementation considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Consider the following to operationalize governance within AI architectures:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Governance dashboards**: Real-time monitoring tools should be integrated
    to visualize AI decisions, flag anomalies, and track bias metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automated compliance testing**: The architecture should incorporate validation
    mechanisms that periodically test AI decisions against compliance standards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Federated approaches**: Where privacy concerns are paramount, consider architectural
    patterns such as federated learning that keep sensitive data decentralized.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explainability-first design**: Rather than treating explainability as an
    afterthought, it should be integrated at the model development stage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Change control**: Be able to execute rollbacks, failovers, and decision management,
    such as when to disable non-deterministic decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By addressing these governance aspects early in the architectural process, the
    system will be better positioned to meet both technical requirements and ethical
    standards, ultimately delivering greater value to stakeholders and building user
    trust.
  prefs: []
  type: TYPE_NORMAL
- en: Modeling and simulation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As with so many other disciplines, software architecture has its own set of
    tools, concepts, and language. A strong AI architecture effort needs to have a
    robust and documented set of models.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss the different types of models that are relevant to this domain
    and then give some examples of how they would apply to an AI-enabled system.
  prefs: []
  type: TYPE_NORMAL
- en: What is software systems modeling?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Modeling can be thought of as any artifact, analysis, or diagram that can be
    used to reason about a to-be-built or built system. This impacts the actual design,
    implementation, integration, testing, and deployment of the software system. Modeling
    here is taken in a very broad and generic way. For example, it is more than the
    development of standard modeling from the software engineering community. Examples
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Unified modeling language models: such as class diagrams, sequence diagrams,
    and state models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Decision trees: a model where the focus is on an algorithmic decision.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Systems functional chart modeling: processes modeling the business and n-squared
    diagrams.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistical modeling and data descriptive techniques.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Analytical-based models: the use of mathematical models that rely on the domain
    to bound or limit the parameter space of AI technology. For example, if one is
    developing a technology for vehicle delivery, a kinematic model that limits the
    speed of a truck on a road is appropriate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data modeling: developing entity-relationship, graph models, and conceptual
    data models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User interface mock-ups.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There is specific or more detailed modeling that is applicable to architecting
    AI/ML systems. These models are more mathematically technical in nature. Examples
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive statistical tools to help understand the data inputs, data processing,
    and results of the AI/ML outputs, such as histograms, box plots, correlation graphs,
    and correlation matrices.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The use of hypothesis testing (p-value, statistical significance) is a consideration
    to benchmark performance or to create bounds on what range and amount of data
    to be expected. This also aids in developing “circuit breakers” – that is, control
    logic to ensure that the input data and rates do not adversely impact the performance
    of AI/ML.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The use of decision-mapping diagrams or flow charts so as to map out the control
    paths that can be realized.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The role of modeling and simulation in AI/ML systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An important aspect of building AI/ML systems is the use of simulations, synthetic
    data that resembles data being ingested into a production environment, and a simulation
    is itself a realization of some model. Simulations allow for the testing of the
    system to see how the actual AI algorithms are performing, but also to get a sense
    of the performance of the system. The simulation development does not have to
    be elaborate, but its complexity should mirror to some extent what the target
    system is looking to do. The simulation requires its own development effort and
    should be started from the very beginning of the project. In many ways, one grows
    the simulation as one develops the software of the target system. The simulation
    acts as both a testing tool and a tool to pose and validate design choices. An
    application would be to use data with known errors to evaluate the decision logic
    of the pipeline – for example, collecting temperature data from a low-level, unreliable
    temperature sensor. One would also use synthetic data to test storage flows and
    memory management for high-transaction domains, as seen in financial situations.
    The use of synthetic data can also be used to evaluate model updating upon the
    detection of model drift, where the domain is dynamic – say, in weather prediction.
  prefs: []
  type: TYPE_NORMAL
- en: The following figure is an overview of the different types of UML diagrams that
    can be used to model a software system. Not all diagrams need to be created, but
    a tailoring effort should be done.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_02_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.6: Overview of UML diagram types'
  prefs: []
  type: TYPE_NORMAL
- en: Architecture and interfaces
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: An architect works across the technical baseline. They are required to understand
    how the interacting components integrate through data and control signals. The
    exchange of data and control signals is realized through interfaces of all sorts,
    from direct application to application calls, commands from a user interface,
    and web services. Since the architect has this larger perspective, they are a
    principal authority on the creation, updating, and retiring of interfaces.
  prefs: []
  type: TYPE_NORMAL
- en: Interfaces
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A final note on the nature of interfaces and the role that interfaces have in
    software engineering. Very rarely in a software system is all the needed data
    and functionality encased in one area of the code base. Normally, for a subsystem
    to meet its requirements, it needs data from another part of the system.
  prefs: []
  type: TYPE_NORMAL
- en: In general, when one looks at a logical or functional model of a software system,
    connecting lines usually indicate either an exchange of data, the flow of a decision,
    or both. Interface engineering is critical for system cohesion so that a given
    development team’s need to change a key piece of functionality does not inadvertently
    cause errors in other parts of the architecture. Also, many times, what one system
    considers “raw data” is processed “metadata” from another system. The mechanism
    to ensure cohesion in the system is to implement interface engineering. Interface
    engineering is needed to get data to the right place, at the right time, in the
    right way, and in the right format. More than any other role, interfaces should
    be controlled and directed by the architecture team.
  prefs: []
  type: TYPE_NORMAL
- en: Interfaces and AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data interfaces primarily impact the processing pipeline and algorithmic decision-making
    components. This core functionality cannot conduct all possible verification and
    validation techniques. So, it must trust that the component sending it data conforms
    to the interface design in terms of format, scale, timing, and correctness. Interfaces
    are critical to ensure there is “model integration.” That is, as the algorithmic
    decisions are made, the outputs drive follow-on functionality. Interface engineering
    ensures that the intent of the decision is correctly executed and in a manner
    consistent with the engineering requirements of the overall system.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In conclusion, an argument has been made that conducting methodical and rigorous
    architecting is an enabler for the development and deployment of a successful
    AI system. Developing an architecture will almost certainly lower overall costs,
    allowing you to meet the schedule and achieve the desired end performance. One
    needs to hold back on the temptation that there is too much schedule pressure,
    so that coding needs to start “right now.” In the next chapter, we bring together
    this more abstract discussion as to how it impacts software engineering specifically.
  prefs: []
  type: TYPE_NORMAL
- en: Relevant reading
  prefs:
