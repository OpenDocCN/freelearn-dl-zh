- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Collaborating with Copilot on GitHub.com: Issues, PRs, Reviews, and Coding
    Agent'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GitHub Copilot has become a core part of the modern developer’s toolkit, offering
    much more than just code suggestions in your editor. Over the past couple of years,
    GitHub Copilot has expanded directly onto GitHub.com, bringing intelligent assistance
    right where developers collaborate, on issues, **pull requests** ( **PRs** ),
    and discussions. With these web-based features, GitHub Copilot moves beyond individual
    productivity and starts to shape how teams communicate, review code, and automate
    routine project tasks across the entire development life cycle.
  prefs: []
  type: TYPE_NORMAL
- en: While earlier chapters focused on GitHub Copilot’s experience inside IDEs, code
    completions, conversational chat, automated edits, and agent-driven changes, this
    chapter zooms in on what happens when you work in the browser. Here, GitHub Copilot
    isn’t just a sidekick for writing code, but also a helpful assistant for reviewing,
    summarizing, and moving work forward in the context of GitHub-hosted repositories.
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ll see how GitHub Copilot can help with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Drafting and summarizing issues and discussions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggesting fixes and generating PR summaries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reviewing and commenting on code directly in PRs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automating changes using Coding Agent features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Answering questions, explaining diffs, and even taking on delegated tasks when
    assigned issues
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explaining and addressing workflow failures in GitHub Actions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fixing security alerts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In practice, developers who treat GitHub Copilot as a collaborator, asking clear
    questions, reviewing its suggestions, and letting it take care of repetitive work,
    tend to get the most value from these features. GitHub Copilot on GitHub.com works
    best when there’s enough context to guide its output and when suggestions get
    a quick review before being merged or shared.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Chat on GitHub.com
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Issue and discussion support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PR support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coding Agent on GitHub.com
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additional GitHub.com Copilot features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GitHub Copilot Chat on GitHub.com
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GitHub Copilot Chat is a conversational interface built directly into GitHub.com.
    It lets you interact with GitHub Copilot right where collaboration happens, in
    issues, PRs, and workflow logs. Instead of switching back to your IDE, you can
    open a chat panel in the browser to ask questions, request explanations, or generate
    content in the context of your repository.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike the IDE version, where chat history is tied to your local editor, conversations
    on GitHub.com are saved to your GitHub account. This means context and history
    carry across sessions and devices, providing continuity whether you log in from
    your desktop, laptop, or mobile app.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you are viewing a PR on GitHub.com, click the Copilot Chat icon next to
    the search bar in the repository header to open the chat panel:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.1: Opening Copilot Chat from the repository header while viewing
    a PR on GitHub.com](img/B34107_06_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.1: Opening Copilot Chat from the repository header while viewing a
    PR on GitHub.com'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the panel is open, ask Copilot to summarize the proposed changes. This
    gives reviewers a quick technical overview of the code without needing to read
    through every file diff or commit message:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.2: Copilot Chat summarizing the main code changes in a PR on GitHub.com](img/B34107_06_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.2: Copilot Chat summarizing the main code changes in a PR on GitHub.com'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Chat can generate a plain-language summary of the changes in
    a PR, helping reviewers quickly understand what is being proposed.
  prefs: []
  type: TYPE_NORMAL
- en: Reviewing a SQL migration in a PR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most common uses of GitHub Copilot Chat on GitHub.com is clarifying
    code changes during review. When reviewing a PR, you can ask GitHub Copilot to
    explain a code change without typing a prompt. In the diff file, click the down
    arrow in the upper-right corner and select **Copilot** | **Explain** . GitHub
    Copilot then generates a plain-language explanation of the selected change directly
    in the panel.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.3: Copilot providing a plain-language explanation of a SQL migration
    in a PR diff](img/B34107_06_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.3: Copilot providing a plain-language explanation of a SQL migration
    in a PR diff'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot responds in plain language, breaking down schema changes or updates.
    This saves reviewers time and helps contributors focus discussions on design rather
    than deciphering the basics.
  prefs: []
  type: TYPE_NORMAL
- en: Explaining a CI failure in GitHub Actions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Copilot Chat is not limited to PRs. It also integrates directly with
    GitHub Actions, so you can investigate failing workflow runs without leaving the
    logs view.
  prefs: []
  type: TYPE_NORMAL
- en: When a job fails, you can expand the step, scroll to the error message, and
    click **Explain error** . Copilot then generates a plain-language breakdown of
    what went wrong and suggests how to fix it.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example of a response might be the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This keeps troubleshooting close to the source of the problem without copying
    logs into another tool or asking teammates for help.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.4: Chat explaining a failed workflow step in GitHub Actions](img/B34107_06_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.4: Chat explaining a failed workflow step in GitHub Actions'
  prefs: []
  type: TYPE_NORMAL
- en: Onboarding and documentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In long-running issues or discussions, GitHub Copilot Chat can quickly condense
    the thread into a structured summary. Instead of scrolling through dozens of comments,
    you can ask for the key decisions made so far and any open questions that remain.
    This is especially valuable for new contributors or teammates joining midstream
    who need to get up to speed fast.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example prompt might look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: GitHub Copilot will then generate a short, structured summary, highlighting
    what decisions have already been made and what remains unresolved. This helps
    newcomers orient themselves in active projects and ensures discussions stay accessible
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.5: Copilot Chat summarizing a discussion thread and highlighting
    open questions](img/B34107_06_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.5: Copilot Chat summarizing a discussion thread and highlighting open
    questions'
  prefs: []
  type: TYPE_NORMAL
- en: These examples show how GitHub Copilot Chat extends collaboration across GitHub.com.
    Whether you are reviewing schema changes in a PR, investigating a failing workflow,
    or summarizing a discussion thread, the chat window keeps the conversation tied
    to your project. Because chat history is saved to your account, Copilot provides
    continuity across sessions and devices, making it a consistent part of your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: With chat established as a companion in PRs, workflows, and discussions, next
    let’s explore how GitHub Copilot supports issues and threaded conversations more
    directly. Since issues are where most collaboration begins, this is a natural
    place for GitHub Copilot to help structure, summarize, and move work forward.
  prefs: []
  type: TYPE_NORMAL
- en: Issue and discussion support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Issues and discussions are the starting point for much of the collaboration
    that happens on GitHub.com. They capture bug reports, feature requests, design
    proposals, and day-to-day project questions. GitHub Copilot extends into these
    areas by helping you create structured issues from prompts, draft or summarize
    long conversations, and prepare responses that keep discussions moving. Instead
    of typing everything from scratch or reading through dozens of comments, you can
    rely on GitHub Copilot Chat on GitHub.com to draft, summarize, and clarify content
    — all while keeping you in control of the final message.
  prefs: []
  type: TYPE_NORMAL
- en: Drafting and summarizing issues
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On GitHub.com, you don’t get GitHub Copilot suggestions inline while filling
    out an issue form. Instead, you go to GitHub Copilot Chat in GitHub (accessed
    via the chat icon in the upper-right corner or via the immersive chat view) and
    state your request there. It will use the entire chat history of the active session
    to base the new issue on.
  prefs: []
  type: TYPE_NORMAL
- en: This is very helpful as you can now use any context from the repository or GitHub
    Actions workflow as extra information, for example, by asking GitHub Copilot questions
    on the reason why a workflow failed, let it search for the code in the repository
    that might have caused it, and then create an issue with all the gathered information.
    Having all that information will make it a lot easier to address the issue and
    implement the necessary changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, you could open GitHub Copilot Chat on GitHub.com and enter a prompt
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.6: Using Copilot Chat prompt to create a new issue](img/B34107_06_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.6: Using Copilot Chat prompt to create a new issue'
  prefs: []
  type: TYPE_NORMAL
- en: 'GitHub Copilot generates a suggestion, including a title and body, and fills
    in fields from your repo’s issue forms or templates if you have one. Here is what
    Copilot might generate:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: You review and refine the suggestion before hitting **Create** .
  prefs: []
  type: TYPE_NORMAL
- en: From the same chat interface, you can also ask GitHub Copilot Chat to summarize
    an issue thread or discussion, helping collaborators catch up quickly. You can
    also take the next step and assign the issue directly to Copilot, just as you
    would a teammate, so it can begin working on a fix or feature.
  prefs: []
  type: TYPE_NORMAL
- en: Automating responses and routine tasks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Maintainers often spend time reminding contributors to provide missing details,
    pointing them to documentation, or closing duplicate issues. With the integrated
    chat on GitHub.com, you can ask GitHub Copilot to draft those responses for you.
    Instead of typing the same text repeatedly, GitHub Copilot prepares a reply that
    you can review and edit before posting, allowing you to focus on adjusting the
    tone and details to fit the issue.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can see an example here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.7: Using Copilot Chat for routine tasks](img/B34107_06_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.7: Using Copilot Chat for routine tasks'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, the user asked Copilot to write a response requesting repro
    steps and environment details for Issue #4258. GitHub Copilot generated a polite
    message thanking the reporter and asking for detailed steps to reproduce the error,
    along with environment details such as OS, browser, app version, network setup,
    and logs.'
  prefs: []
  type: TYPE_NORMAL
- en: Supporting discussions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Discussions provide a forum-style space where contributors can share
    ideas, ask questions, or propose changes without opening an issue or PR. Unlike
    issues, which track concrete work items, discussions are often exploratory and
    can grow lengthy as multiple people weigh in.
  prefs: []
  type: TYPE_NORMAL
- en: In this context, GitHub Copilot Chat helps by condensing the conversation into
    a short, structured summary or by suggesting clarifying follow-up questions that
    move the thread forward. This is especially valuable for maintainers who want
    to respond quickly without parsing every reply.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if a user posts a YAML snippet describing a deployment setup,
    you could ask GitHub Copilot Chat the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The response may be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: This approach keeps discussions moving and ensures responses are thoughtful
    and targeted.
  prefs: []
  type: TYPE_NORMAL
- en: Workflow example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'GitHub Copilot can support both issues and discussions in practice, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: A contributor reports a login bug by opening an issue in your repository.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As a maintainer, you open GitHub Copilot Chat and ask it to reformat the description
    into a well-structured issue with observed behavior, expected behavior, and reproduction
    steps.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Another user comments with extra context. You ask GitHub Copilot Chat to summarize
    the thread so far.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A maintainer needs to follow up with a request for logs. GitHub Copilot Chat
    drafts a Markdown response in the right tone, which you review before posting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By giving GitHub Copilot enough context and then reviewing its drafts before
    publishing, you can handle issues and discussions more efficiently while still
    ensuring communication matches your project’s standards.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve seen how GitHub Copilot Chat can streamline issues and discussions, making
    it easier to capture reports, summarize conversations, and keep threads productive.
    These features shine at the early stages of collaboration, where ideas are raised
    and problems are first reported.
  prefs: []
  type: TYPE_NORMAL
- en: 'The next section looks at where much of the real decision-making happens: **pull
    requests** , or **PRs** . Here, GitHub Copilot moves beyond conversation to support
    reviews, generate summaries, suggest fixes, and integrate with security tools
    to improve code quality.'
  prefs: []
  type: TYPE_NORMAL
- en: PR support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: PRs are the heart of collaborative development on GitHub.com. GitHub Copilot
    steps into this space by helping authors and reviewers save time, clarify changes,
    and catch issues before code is merged. Whether you’re opening a new PR, reviewing
    changes, or responding to feedback, GitHub Copilot offers a range of tools to
    simplify the workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Summarizing PRs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you create or edit a PR on GitHub.com, you can ask GitHub Copilot to generate
    a summary of the proposed changes. Inside the PR description field, click the
    Copilot icon (shown in *Figure 6.8* ), then choose **Summarize the changes in
    this pull request** .
  prefs: []
  type: TYPE_NORMAL
- en: Copilot reviews the diff between the source and destination branches, along
    with commit messages and changed files, to produce a plain-language overview of
    the PR. The generated summary appears directly in the description box, where you
    can refine, expand, or edit it before submitting.
  prefs: []
  type: TYPE_NORMAL
- en: For teams with many contributors or complex code bases, this step helps reviewers
    understand the purpose of the PR without reading every file individually.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if your PR touches on multiple areas, such as updating API validation
    and adding new tests, GitHub Copilot might draft something such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This summary helps reviewers quickly grasp the intent of the PR without reading
    every file. It also streamlines onboarding for new contributors who may not be
    familiar with all parts of the code base.
  prefs: []
  type: TYPE_NORMAL
- en: '![ Figure 6.8: Using the Copilot icon on the PR description to generate a PR
    summary](img/B34107_06_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.8: Using the Copilot icon on the PR description to generate a PR summary'
  prefs: []
  type: TYPE_NORMAL
- en: Assigning GitHub Copilot as a reviewer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'On GitHub.com, you can assign GitHub Copilot as a PR reviewer, using the **Reviewers**
    tab, highlighted in the following figure:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.9: GitHub Copilot as a reviewer](img/B34107_06_9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.9: GitHub Copilot as a reviewer'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once added, GitHub Copilot can do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Analyze changes and leave review comments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flag potential bugs, inconsistencies, or style issues
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest improvements such as better test coverage or simplified code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate or update PR summaries to help reviewers understand the scope of changes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike static review tools, GitHub Copilot supports an iterative conversation
    inside the PR. You or another reviewer can ask it to clarify a specific block
    of code, expand on one of its earlier comments, or provide additional examples.
    All of this happens directly in the PR thread, so the history of AI-assisted feedback
    and human discussion remains together in one place.
  prefs: []
  type: TYPE_NORMAL
- en: General example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Consider a small aviation service that stores flight records and exposes them
    through a repository class. In this PR, the team is fixing the method that looks
    up a flight by ID. The previous code used `ElementAt(id)` , which treats the ID
    as a zero-based index rather than matching on the flight’s actual `Id` property.
  prefs: []
  type: TYPE_NORMAL
- en: 'When viewing the diff, GitHub Copilot explains the change in plain language:
    the fix replaces `ElementAt(id)` with `FirstOrDefault(f => f.Id == id)` , so the
    lookup uses the correct identifier and returns the right record. This gives reviewers
    immediate context for why the change matters.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A reviewer can keep the conversation inside the PR with a targeted request,
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: GitHub Copilot replies in the thread with follow-up details, such as trade-offs,
    edge cases, and safer alternatives. That back-and-forth helps the team confirm
    the reasoning without leaving the PR.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.10: GitHub Copilot comment and reviewer follow-up in flight app
    PR](img/B34107_06_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.10: GitHub Copilot comment and reviewer follow-up in flight app PR'
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that each review request to Copilot consumes one premium request,
    so teams may want to be intentional about when to assign it. For more details
    on how premium requests work and how they’re billed, see [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041)
    . Being mindful of this ensures you get the most value from Copilot’s feedback
    while keeping usage within your plan’s allocation.
  prefs: []
  type: TYPE_NORMAL
- en: Workflow example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Consider a multi-file PR that updates a Node.js backend and a CI workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: The author opens the PR and uses GitHub Copilot to generate a summary of the
    changes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: GitHub Copilot is added as a reviewer and flags edge cases along with missing
    documentation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A human reviewer follows up by asking the assistant to clarify a specific code
    block, continuing the conversation directly in the PR thread.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A test fails in CI, and Copilot suggests a YAML adjustment to resolve the error.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The author applies the fix and pushes an update, and GitHub Copilot refreshes
    the PR summary automatically.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Clear commit messages and descriptive PR details help Copilot’s summaries and
    comments stay accurate. This support can shorten feedback cycles and reduce routine
    reviewer work, but suggestions should always be validated against project conventions
    and business requirements before merging.
  prefs: []
  type: TYPE_NORMAL
- en: Reviewing and commenting on code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once GitHub Copilot is added as a reviewer, you can interact with it directly
    in the PR view. During the review process, it can help by doing the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Explaining diffs or complex code changes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Highlighting potential issues, such as missing error handling or inconsistent
    styles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Proposing inline suggestions or edits
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example, when reviewing a Python diff, you might highlight a section and
    prompt GitHub Copilot with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.11: Prompting Copilot in a PR review](img/B34107_06_11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.11: Prompting Copilot in a PR review'
  prefs: []
  type: TYPE_NORMAL
- en: 'It might reply with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: GitHub Copilot’s suggestions aren’t limited to code; it can also help draft
    Markdown comments that clarify reasoning, ask questions, update documentation,
    or suggest improvements, keeping review conversations focused and actionable.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that each time GitHub Copilot posts comments during a PR review,
    it consumes another premium request from your quota. Be sure to monitor your usage
    if you want to stay within your monthly allowance.
  prefs: []
  type: TYPE_NORMAL
- en: Autofix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Autofix can actually refer to two related capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: One appears during PR reviews, where GitHub Copilot suggests inline fixes based
    on the code you’re reviewing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The other is part of GitHub Advanced Security, where GitHub Copilot Autofix
    responds to code scanning alerts with targeted remediation steps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They look similar in the UI, but they are triggered by different signals and
    serve different purposes. Let’s take a look at them both.
  prefs: []
  type: TYPE_NORMAL
- en: PR suggestions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: During a PR review, GitHub Copilot can notice risky or inefficient code and
    propose inline fixes directly in the **Files changed** view. These suggestions
    are shown with an **Autofix** label, but they are not the same as GitHub Copilot
    Autofix in GitHub Advanced Security. Instead, they are part of the broader set
    of Copilot’s PR review features.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if a PR includes an unsafe SQL statement, Copilot might suggest
    parameterization right in the diff. You can apply the fix instantly, edit it,
    or ask Copilot to refine it. This keeps the entire detection–fix–review loop inside
    the PR.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.12: Copilot Autofix suggesting a parameterized SQL query to prevent
    injection](img/B34107_06_12.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.12: Copilot Autofix suggesting a parameterized SQL query to prevent
    injection'
  prefs: []
  type: TYPE_NORMAL
- en: Generating an Autofix as part of a review can consume a premium request. See
    [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) for details on usage and limits.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Autofix in GitHub Advanced Security
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The other context for Autofix is within GitHub Advanced Security. Here, Autofix
    responds when code-scanning alerts flag a vulnerability by proposing a targeted
    remediation. From the alert details page, you may see a **Generate fix** button.
    Selecting this triggers Copilot Autofix to draft a remediation plan and open a
    PR for review:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.13: Generate fix directly from a security alert in GitHub Advanced
    Security](img/B34107_06_13.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.13: Generate fix directly from a security alert in GitHub Advanced
    Security'
  prefs: []
  type: TYPE_NORMAL
- en: This distinction is important. A fix suggested by GitHub Copilot during a PR
    review is based on the changed code in the diff. A fix suggested by GitHub Copilot
    Autofix is tied to a GitHub Advanced Security alert produced by code scanning,
    and it follows the alert’s guidance to produce a targeted remediation.
  prefs: []
  type: TYPE_NORMAL
- en: When the suggestion is ready, select the **Commit to new branch** option to
    apply the fix. The proposed patch opens as a PR in your repository, where you
    review it like any other change, request adjustments if needed, and then approve
    and merge.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.14: Commit fix to a new branch and PR](img/B34107_06_14.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.14: Commit fix to a new branch and PR'
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example, for an alert titled `SQL query built from user-controlled sources`
    , GitHub Copilot Autofix provides the following explanation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.15: GitHub Copilot Autofix remediation details for a SQL injection
    alert in GitHub Advanced Security](img/B34107_06_15.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.15: GitHub Copilot Autofix remediation details for a SQL injection
    alert in GitHub Advanced Security'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Autofix supports a growing set of languages and query families.
    If a finding is outside current coverage, Autofix may not offer a patch even though
    the alert exists.
  prefs: []
  type: TYPE_NORMAL
- en: After fixing a single alert, you can take the same idea to a larger scale with
    GitHub security campaigns. This is where GitHub Copilot Autofix really shines.
  prefs: []
  type: TYPE_NORMAL
- en: '**GitHub security campaigns** let administrators and security leads group related
    vulnerabilities across many repositories and handle remediation as one effort.
    Instead of working alert by alert, you define the scope, track progress in one
    place, and apply fixes consistently across all affected code bases.'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Autofix can be integrated into security campaigns, giving maintainers
    the option to generate fixes for supported vulnerabilities in bulk. When a campaign
    is launched, you can choose **Generate fix** for eligible alerts, such as SQL
    injection, unsafe deserialization, or command injection. GitHub Copilot then prepares
    PRs across the affected repositories so teams can review and merge consistent,
    targeted remediations.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot Autofix can be integrated into security campaigns to generate
    suggestions for supported alerts at scale. Campaigns submit alerts to Autofix
    so maintainers can review the proposed remediations. When you decide to proceed,
    you create the PRs from the alert or campaign context and then review and merge
    them like any other change.
  prefs: []
  type: TYPE_NORMAL
- en: This integration extends Autofix beyond individual alerts, making it practical
    for enterprise teams to keep large code bases secure. Instead of opening dozens
    of PRs manually, security leads can trigger Autofix from the campaign view, and
    teams can then review and merge the generated patches as part of their normal
    workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.16: GitHub Copilot Autofix integrated into a GitHub security campaign](img/B34107_06_16.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.16: GitHub Copilot Autofix integrated into a GitHub security campaign'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can learn more about GitHub Advanced Security here: [https://docs.github.com/en/get-started/learning-about-github/about-github-advanced-security](https://docs.github.com/en/get-started/learning-about-github/about-github-advanced-security)
    .'
  prefs: []
  type: TYPE_NORMAL
- en: With PR reviews and security alerts covered, it’s clear that Copilot is already
    capable of handling much of the repetitive and detail-oriented work in development.
    Autofix shows how individual fixes and even campaign-scale remediations can be
    generated and reviewed without slowing teams down.
  prefs: []
  type: TYPE_NORMAL
- en: The next step is broader automation. In the following section, we’ll look at
    the GitHub Copilot Coding Agent, which allows you to assign entire issues to Copilot.
    Here, Copilot goes beyond suggesting edits to actually completing development
    tasks, running in a secure environment, and opening PRs that fit directly into
    your team’s workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Coding Agent on GitHub.com
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The GitHub Copilot Coding Agent brings automation directly into the browser
    by letting you delegate entire issues to Copilot. Instead of drafting fixes or
    writing code yourself, you can assign a task in GitHub.com and Copilot will take
    it from there. The agent runs in a secure cloud environment, makes changes on
    a new branch, opens a draft PR, and tags you for review. This turns issues into
    actionable work items that can move forward without waiting for human availability,
    while still keeping you in control of the final review and merge.
  prefs: []
  type: TYPE_NORMAL
- en: Coding Agent versus Agent Mode
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'GitHub offers two related but distinct ways of handing off work to AI: the
    **Coding Agent** and **Agent Mode** . Both fall under the broader idea of agentic
    AI, where you describe a task and the system iterates until it produces a result.
    The difference lies in where the work happens and how it is applied:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent Mode (in the IDE)** : You select Agent Mode in your editor’s chat panel
    and describe the task, and Copilot makes changes directly in your local workspace.
    It applies edits, runs tools, and keeps iterating until the job is complete.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Coding Agent (on GitHub.com)** : You delegate tasks from the browser, your
    editor, or even the GitHub mobile app. Copilot then runs asynchronously in a secure
    GitHub Actions environment, making changes in a branch and opening a PR for review.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This distinction matters because Agent Mode is best for interactive, local edits
    where you want to stay hands-on, while the Coding Agent is better suited for handing
    off contained tasks that can be automated from end to end and tracked in GitHub.
  prefs: []
  type: TYPE_NORMAL
- en: How the Coding Agent works on GitHub.com
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Copilot’s Coding Agent lets you delegate development tasks directly from
    the browser, with no IDE required. This capability is only available to paid Copilot
    plans (Pro+ and Enterprise), and administrators may need to enable the policy
    at the organization or enterprise level.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can delegate tasks in three main ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Assign an issue to Copilot** : Open the issue, use the **Assignees** panel,
    and select **Copilot** . This works just like assigning a human teammate. Copilot
    will read the issue details and begin working in the background.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use the Agents panel** : GitHub recently introduced the **Agents** panel.
    This pop-up overlay acts like a mission control center. From any GitHub.com page,
    you can open the panel, describe the task in natural language, choose the repository
    and branch, and launch the agent. Under the hood, GitHub Copilot spins up a secure
    workspace powered by GitHub Actions, applies changes, and creates a PR for review.
    The panel also displays live session details and logs so you can follow the progress
    without leaving your current context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.17: Delegate task in the Agents panel](img/B34107_06_17.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.17: Delegate task in the Agents panel'
  prefs: []
  type: TYPE_NORMAL
- en: '**Assign from your editor (if supported)** : Some editors provide integration
    points to delegate tasks directly to the Coding Agent while you are working locally,
    making it easier to keep browser and IDE workflows aligned. (As of September 1st,
    2025, only VS Code allows tasks to be assigned to the Coding Agent directly.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once assigned, the agent does the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Spins up a secure workspace in GitHub Actions, drawing from your assigned minutes
    (free for public repos, or tracked against your private repo budget)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applies changes in a new branch, runs checks, iterates if needed, and creates
    a draft PR with a WIP title
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses one premium request per session, regardless of how many edits or files
    are involved
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tags you for review and logs session details, which you can inspect during or
    after execution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can follow the agent’s progress in multiple places:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agents panel** or **Agents page** : Displays live session status, logs, and
    task history. This is the most detailed view, showing exactly what steps Copilot
    is taking in the GitHub Actions-powered workspace.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.18: Tracking a Coding Agent session from the Agents panel on GitHub.com](img/B34107_06_18.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.18: Tracking a Coding Agent session from the Agents panel on GitHub.com'
  prefs: []
  type: TYPE_NORMAL
- en: '**Issue’s Development panel and PRs view** : Lists the branch created by the
    agent and the associated draft PR. This view is helpful if you are following along
    with team discussions while the agent works.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Editor integration (if supported)** : In some IDEs, you can track session
    progress or be notified when the agent’s PR is ready for review.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once the PR is open, you interact with it just as you would with any other
    PR. At this stage, you can do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Review the diff like any other PR
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Request changes or edits
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mention `@copilot` in comments to instruct the agent to refine or extend its
    work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the PR is open, you can review the diff like any other PR, but you also
    have the option to interact with GitHub Copilot to refine or extend its work.
    By mentioning `@copilot` directly in the PR comments, you can ask for clarifications,
    request improvements, or suggest changes. As shown in the following figure, Copilot
    not only responds to the request but also begins working on updates in the background,
    with its progress tracked in the session view.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.19: Reviewing and refining a coding agent’s PR for the FlightsController
    test suite, where Copilot responds to a reviewer’s comment and starts implementing
    improvements](img/B34107_06_19.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.19: Reviewing and refining a coding agent’s PR for the FlightsController
    test suite, where Copilot responds to a reviewer’s comment and starts implementing
    improvements'
  prefs: []
  type: TYPE_NORMAL
- en: Viewing the Coding Agent session
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a Coding Agent opens a PR, you can interact directly in the thread. For
    example, you might mention `@copilot` in a comment to request refinements, as
    shown in *Figure 6.1* *9* . From the same location, clicking the **View session**
    button takes you into the session log.
  prefs: []
  type: TYPE_NORMAL
- en: This opens the **Agents** panel or **Agents** page, where you can track the
    full history of what the agent is doing. The following figure shows this detailed
    view, including each iteration of the task, the session duration, and the number
    of premium requests consumed.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.20: Coding Agent session view showing task history, MCP servers,
    session duration, and usage of Actions minutes and premium requests](img/B34107_06_20.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.20: Coding Agent session view showing task history, MCP servers, session
    duration, and usage of Actions minutes and premium requests'
  prefs: []
  type: TYPE_NORMAL
- en: Monitoring the session gives you visibility into progress, helps you catch mistakes
    early, and ensures confidence in the automation before merging.
  prefs: []
  type: TYPE_NORMAL
- en: Every session runs inside a secure GitHub Actions workspace, so it consumes
    Actions minutes from your account or organization. Public repositories are free,
    while private repositories count toward usage. Each `@copilot` interaction in
    a PR or issue also consumes a premium request. For a deeper explanation of premium
    requests and limits, see [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) .
  prefs: []
  type: TYPE_NORMAL
- en: Where it fits best
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Coding Agent is most effective for well-scoped tasks: fixing a bug described
    in an issue, adding or extending tests, or updating documentation. It saves time
    on routine work while keeping humans in control of the final review. The better
    you have your coding foundation in order, the better the results with the Coding
    Agent will be. That means setting up a good README with information, adding custom
    instructions to follow, documenting how to build, test, and run the application,
    and having enough tests to validate the results.'
  prefs: []
  type: TYPE_NORMAL
- en: All these things can be used by the Coding Agent to figure out what to do and
    how to implement the changes, including running the tests to validate whether
    everything still works correctly. If you only have a badly documented application
    with “spaghetti code,” the Coding Agent will have a hard time figuring out what
    to do, and might even fail to do so.
  prefs: []
  type: TYPE_NORMAL
- en: How it fits into your workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Coding Agent is fully integrated into GitHub.com and built for browser-first
    collaboration. Teams often use it to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Speed up routine fixes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhance test coverage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handle minor enhancements quickly without waiting for human reviewers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It also fits naturally into workflows on the go. From the GitHub mobile app,
    you can review issues and PRs on your phone or tablet. If an issue already contains
    enough detail, you can assign it to the Coding Agent directly, letting it begin
    work while you’re away from your desktop. This makes it easy to delegate tasks
    whenever you have a few minutes, without breaking momentum.
  prefs: []
  type: TYPE_NORMAL
- en: AI can handle heavy lifting, but it’s still important to review every generated
    PR to confirm the changes align with project standards. Remember that responses
    may not always be accurate, which makes the final review step critical.
  prefs: []
  type: TYPE_NORMAL
- en: Additional configuration options for the Coding Agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Beyond the basics of assigning and tracking a session, there are a few advanced
    settings that give you more control over how the Coding Agent operates:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Locked down network settings by default** : Coding Agent sessions are restricted
    by default to ensure security. They run in a locked-down network with no internet
    access, reducing the risk of external calls or data leaks. You should only open
    up network access when absolutely necessary, such as when testing code that relies
    on external APIs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP server config for the session** : You can extend a session by connecting
    it to an MCP server. This allows the agent to fetch additional context or integrate
    with external systems, such as internal documentation or APIs. Configuration is
    done at the organization or repository level so that sessions can securely pull
    in the right data when executing tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the Coding Agent, you’ve seen how GitHub Copilot can take on assigned issues,
    generate code, and move work forward autonomously inside PRs. This level of automation
    makes GitHub Copilot feel like an active contributor on your team, but it’s only
    one part of the picture.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond coding tasks, GitHub Copilot continues to expand its presence on GitHub.com
    with features that improve daily collaboration, streamline project management,
    and surface insights at scale. In the next section, we’ll look at these additional
    capabilities, from bulk summaries and metrics dashboards to experimental previews
    that hint at where the platform is heading.
  prefs: []
  type: TYPE_NORMAL
- en: Additional GitHub.com Copilot features
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Beyond issue automation and PR support, GitHub Copilot on GitHub.com continues
    to evolve with features that simplify daily development and streamline project
    workflows. Some of these capabilities are already available, while others are
    still in preview, but all are designed to help teams save time and stay focused.
  prefs: []
  type: TYPE_NORMAL
- en: Bulk summaries and comments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Copilot Chat on GitHub.com can give you high-level overviews and also help draft
    clear, targeted comments. These capabilities help teams process information faster
    and respond more effectively without having to manually skim every detail or draft
    each reply from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: During triage sessions, release planning, or when catching up after being away,
    you can request concise overviews of PRs, discussions, or even an entire repository.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, in immersive Copilot Chat, you can ask the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: GitHub Copilot then pulls context from across the repo and generates a summary
    that helps you quickly come up to speed on the project.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.21: GitHub Copilot Chat summarizing a repository](img/B34107_06_21.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.21: GitHub Copilot Chat summarizing a repository'
  prefs: []
  type: TYPE_NORMAL
- en: 'Or in a GitHub discussion or issue thread, you can type the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Copilot will condense the back-and-forth into a digestible recap so you can
    focus on the next steps.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to summarizing, GitHub Copilot can help you participate in the conversation.
    You can ask it to draft clarifying questions, provide a gentle nudge for missing
    details, or phrase a response in polished Markdown that fits the project’s tone.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, in a long discussion thread, you might say the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Copilot may return something like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This combination of summaries and comment drafting helps maintainers and reviewers
    stay productive without parsing every detail themselves, while still keeping final
    oversight in human hands.
  prefs: []
  type: TYPE_NORMAL
- en: Context-aware suggestions in code and documentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Copilot adapts to the context of your repository when making suggestions.
    This means that when you are editing a code block, YAML workflow, SQL script,
    or documentation file, the output reflects the formatting, naming conventions,
    and patterns that already exist in your project. By aligning with your team’s
    established style, Copilot reduces friction and helps keep contributions consistent.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, suppose you are updating a SQL migration script. You can ask the
    following in the chat panel:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: GitHub Copilot generates the SQL statement in line with your repository’s style,
    ensuring consistency with the way other schema updates are written.
  prefs: []
  type: TYPE_NORMAL
- en: Metrics and activity dashboards
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Admins on Business and Enterprise plans can use GitHub Copilot dashboards on
    GitHub.com to monitor adoption, usage patterns, and costs. These views make it
    easier to manage licenses, track spending, and understand how Copilot is used
    across teams.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dashboards are divided into three main views:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Copilot IDE usage** : Highlights adoption and activity trends across licensed
    developers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Premium request analytics** : Tracks billed premium requests, costs, and
    usage broken down by product'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Detailed usage patterns** : Shows chat modes, code completions, and daily
    model usage to reveal how Copilot is being used in practice'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Together, these dashboards provide both the financial and behavioral perspectives,
    helping admins balance cost control with understanding how Copilot drives developer
    productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot IDE usage
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Copilot IDE usage dashboard highlights how developers are adopting GitHub
    Copilot in their IDEs. You can track the number of active users, see which agent
    features are being used, and review daily and weekly activity trends. This helps
    admins distinguish between license allocation and real usage, so you can reallocate
    licenses if needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'To navigate to this view, take the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the top right of GitHub.com, click your profile photo, choose **Your enterprises**
    , and then select the enterprise you manage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Enterprise** sidebar, open **Insights** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Copilot** , then choose **Copilot IDE Usage** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.22: GitHub Copilot activity dashboard](img/B34107_06_22.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.22: GitHub Copilot activity dashboard'
  prefs: []
  type: TYPE_NORMAL
- en: '**To view this image in color**'
  prefs: []
  type: TYPE_NORMAL
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  prefs: []
  type: TYPE_NORMAL
- en: Access is typically available to enterprise admins and billing managers. Some
    organizations may enable a read-only analytics viewer role. Availability can vary
    by plan and permissions.
  prefs: []
  type: TYPE_NORMAL
- en: Premium request analytics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The premium request analytics dashboard focuses on cost visibility. It shows
    how many premium requests have been consumed, which products (Copilot, Coding
    Agent, or Spark) are driving usage, and the associated billing amounts. Admins
    can use this report to track spending trends and plan budgets.
  prefs: []
  type: TYPE_NORMAL
- en: 'To navigate to this view, do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: In the upper-right corner of GitHub.com, click your profile photo, then choose
    **Your organizations** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next to the organization you want to manage, click **Settings** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the left sidebar, open **Billing and Licensing** , then click **Usage** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Copilot premium request analytics** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.23: Copilot premium request analytics dashboard showing usage and
    billing details](img/B34107_06_23.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.23: Copilot premium request analytics dashboard showing usage and
    billing details'
  prefs: []
  type: TYPE_NORMAL
- en: '**To view this image in color**'
  prefs: []
  type: TYPE_NORMAL
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  prefs: []
  type: TYPE_NORMAL
- en: Detailed Copilot usage patterns
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This dashboard provides a more granular view of how GitHub Copilot is being
    used day to day. It includes charts for requests per chat mode (Ask, Edit, or
    Agent), code completions and acceptance rates, and daily model usage. These insights
    show not just whether GitHub Copilot is being used but how it is shaping developer
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: 'To navigate to this view, take these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the top right of GitHub.com, open your profile photo menu, choose **Your
    enterprises** , and then select the enterprise account you manage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Enterprise** sidebar, open **Insights** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then select **Copilot** and choose **Usage patterns** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![ Figure 6.24: Detailed Copilot usage dashboard with chat modes, completions,  and
    model trends](img/B34107_06_24.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.24: Detailed Copilot usage dashboard with chat modes, completions,
    and model trends'
  prefs: []
  type: TYPE_NORMAL
- en: Access is typically available to enterprise admins and billing managers. Some
    organizations may enable a custom analytics viewer role for read-only access.
    Availability can vary by plan and permissions.
  prefs: []
  type: TYPE_NORMAL
- en: For a full walk-through of these types of reports and how to interpret them,
    see [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) .
  prefs: []
  type: TYPE_NORMAL
- en: Early access and experimental features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub regularly releases Copilot enhancements as limited previews for select
    users and organizations. These previews give teams a chance to try out new capabilities
    and provide feedback on features that may become generally available in the future.
  prefs: []
  type: TYPE_NORMAL
- en: 'As of October 2025, here are some notable experimental features:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mission control with the Agents panel** : GitHub introduced an **Agents**
    panel that lets you start, manage, and monitor AI tasks from any page on GitHub.
    This pop-up overlay allows you to describe a task, launch it, and track progress,
    all within your current workflow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better PR handling and multi-file reasoning** : The Coding Agent now offers
    more reliable support with PR reviews and stronger multi-file contextual understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Smarter triage and project linkages** : Developers can preview advanced triage
    tools that suggest issue priorities or close stale discussions. There is also
    emerging support for linking GitHub Copilot-generated PRs or tasks directly to
    GitHub project boards, sprints, or roadmaps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To stay up to date on these previews and sign up for new releases, check out
    https://docs.github.com/en/copilot .
  prefs: []
  type: TYPE_NORMAL
- en: Integration with team workflows
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As GitHub Copilot features on GitHub.com evolve, teams are finding powerful
    ways to blend AI automation with existing workflows, security measures, and project
    management tools.
  prefs: []
  type: TYPE_NORMAL
- en: You can now use GitHub Copilot alongside GitHub Actions, branch protection rulesets,
    and custom labels to create a seamless development experience. For example, when
    GitHub Copilot opens a PR, branch protection rulesets can be configured to require
    a second approval or enforce status checks before allowing the merge. This ensures
    that AI-generated changes receive the same governance as human contributions.
  prefs: []
  type: TYPE_NORMAL
- en: Many developers notice the biggest benefits when Copilot handles repetitive
    tasks, such as drafting documentation or updating boilerplate, so human reviewers
    can stay focused on deeper technical or feature-driven work.
  prefs: []
  type: TYPE_NORMAL
- en: Staying up to date with GitHub Copilot’s documentation and release notes ensures
    your team is always aware of new workflows and how to best adopt them.
  prefs: []
  type: TYPE_NORMAL
- en: Smart integrations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some teams have gone all out to make the most use of GitHub Copilot on GitHub.com.
    For example, they’ve integrated Copilot into GitHub Actions workflows so that
    when a workflow fails, an issue is created automatically and assigned to the Coding
    Agent for resolution.
  prefs: []
  type: TYPE_NORMAL
- en: Another pattern is running a workflow whenever a new PR is opened, automatically
    assigning GitHub Copilot for review. This allows teams to skip over simple errors
    that GitHub Copilot can handle and focus their human review time on design decisions,
    architecture, and business logic. Repository administrators can also configure
    branch rulesets to require a Copilot review before merging, ensuring that every
    change benefits from at least one automated pass.
  prefs: []
  type: TYPE_NORMAL
- en: These patterns show how teams are turning routine checks and follow-ups into
    reliable automation. With GitHub Copilot handling the repetitive steps and humans
    focusing on the higher-level calls, projects move with fewer handoffs and clearer
    ownership.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you learned how GitHub Copilot extends beyond the IDE and into
    GitHub.com, supporting collaboration at the center of software development. We
    covered how it drafts and summarizes issues, streamlines discussions, reviews
    and comments on PRs, proposes inline fixes, and completes assigned tasks through
    the GitHub Copilot Coding Agent. We also looked at how GitHub Copilot integrates
    with security features such as Autofix and security campaigns, and how admins
    can monitor adoption and usage through dashboards.
  prefs: []
  type: TYPE_NORMAL
- en: This matters because these features move GitHub Copilot from being a personal
    coding tool to becoming part of the shared development process. By automating
    repetitive work, surfacing important details, and participating directly in issues
    and PRs, GitHub Copilot reduces overhead and keeps projects moving. Teams that
    use GitHub Copilot effectively report shorter review cycles, less time spent on
    boilerplate, and more time to focus on meaningful design and problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, AI-generated content should always be reviewed. Summaries,
    fixes, and PRs created by GitHub Copilot still need human oversight to ensure
    they meet project conventions and business requirements. Treating GitHub Copilot
    as a collaborator that accelerates routine tasks but still requires human review
    helps teams get the most reliable results.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will look at connecting external data sources or tools
    through **Model Context Protocol** ( **MCP** ) servers, allowing you to enrich
    GitHub Copilot’s context and align its behavior with your team’s workflows.
  prefs: []
  type: TYPE_NORMAL
