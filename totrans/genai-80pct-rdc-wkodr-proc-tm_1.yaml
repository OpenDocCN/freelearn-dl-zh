- en: CEO of Lucidis, a subsidiary of WhitegloveAI
  prefs: []
  type: TYPE_NORMAL
- en: Binni Skariah brings a wealth of experience from the financial services industry
    to his role, using his understanding of the digital revolution in finance to guide
    the Lucidis team in developing solutions for the challenges of unstructured data.
    He acts as a liaison between clients and the technical team to guarantee clear
    communication and efficient product development.
  prefs: []
  type: TYPE_NORMAL
- en: Binni’s deep knowledge of the mortgage industry and its data governance models
    ensures that Lucidis aligns with the specific needs of clients in this sector.
  prefs: []
  type: TYPE_NORMAL
