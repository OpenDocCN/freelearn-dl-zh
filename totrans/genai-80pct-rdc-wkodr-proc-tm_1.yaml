- en: Tobalo Torres
  prefs: []
  type: TYPE_NORMAL
- en: VP of AI Incubation Labs at WhitegloveAI
  prefs: []
  type: TYPE_NORMAL
- en: With a background in enterprise architecture and cloud engineering, Tobalo leads
    the engineering initiatives for Lucidis.
  prefs: []
  type: TYPE_NORMAL
- en: His experience with large language models), edge computing, and data pipelines
    is instrumental in developing Lucidis’s ability to clean, structure, and process
    unstructured data. Tobalo is passionate about using technology to improve efficiency
    and solve real-world problems for businesses. His leadership and technical expertise
    are crucial in driving Lucidis’s product development and ensuring its scalability
    and security for enterprise-level deployments.
