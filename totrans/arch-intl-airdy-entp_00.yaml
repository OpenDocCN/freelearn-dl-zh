- en: AI and Key Concepts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The following set of chapters lays the conceptual and architectural foundation
    for building intelligent systems with generative and agentic AI. It introduces
    the shift from modernization to innovation. It also explains the importance of
    real-time, document-based data models, and it describes the new architectural
    thinking required to implement AI at scale in a secure and responsible way.
