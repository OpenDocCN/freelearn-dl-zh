- en: Preparing for the Journey
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 准备旅程
- en: In the first part of the book, we’ll set the stage for your AI journey. We’ll
    explore the realities of the AI revolution, cut through the hype, and build a
    solid foundation for understanding modern AI concepts. You’ll learn why copying
    Silicon Valley’s playbook rarely works, and what successful adoption strategies
    look like in practice. By the end of this part, you’ll have the context and fundamentals
    needed to start thinking about AI in a way that’s grounded in business reality.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一部分，我们将为您的AI之旅奠定基础。我们将探讨AI革命的现状，拨开炒作的迷雾，并为理解现代AI概念建立坚实的基础。您将了解到模仿硅谷的剧本很少能奏效，以及在实践中成功的采用策略是什么样的。到这一部分结束时，您将拥有开始以基于商业现实的方式思考AI所需的背景和基础知识。
