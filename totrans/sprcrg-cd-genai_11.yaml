- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Orchestrating Intelligence: Blueprint for Next-Gen Agent Protocols'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the evolving landscape of **artificial intelligence** (**AI**) development,
    protocols are rapidly becoming the connective tissue that links models, tools,
    and external systems. In recent months, we’ve seen a surge of activity around
    new protocols designed to enhance interoperability and coordination among intelligent
    agents. Among the most prominent are the **Model Context Protocol** (**MCP**)
    by Anthropic, **Agent2Agent** (**A2A**) by Google, and the **Agent Commerce Protocol**
    (**ACP**) by Virtuals.
  prefs: []
  type: TYPE_NORMAL
- en: At first glance, these may seem like just another wave of frameworks in an already
    crowded AI ecosystem. After all, frameworks such as LangChain, Semantic Kernel,
    and AutoGen have long promised reusable, modular AI components, such as plugins,
    tools, prompts, and agents. But protocols operate on a different layer of abstraction.
    While orchestrators help build and control intelligent workflows, protocols define
    how those components communicate across systems, providing consistency, structure,
    and governance.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will thoroughly examine the MCP, A2A, and ACP protocols
    and how they are paving the way for a new way of consuming not only applications
    but the entire web, introducing the groundbreaking concept of the agentic web.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following key topics will be covered in the chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: What is a protocol?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding the Model Context Protocol
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent2Agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Commerce Protocol
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Toward an Agentic Web
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before delving into these topics, it is essential to first understand the fundamental
    concept of a protocol.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: All the code and necessary dependencies for this chapter are listed in the `requirements.txt`
    file available in the official GitHub repository of the book at [https://github.com/PacktPublishing/AI-Agents-in-Practice](https://github.com/PacktPublishing/AI-Agents-in-Practice).
  prefs: []
  type: TYPE_NORMAL
- en: To set up your environment, simply clone the repository and follow the instructions
    in the README file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Alternatively, you can start from scratch and follow the Quick Start guide
    at the official MCP Python SDK repository here: [https://github.com/modelcontextprotocol/python-sdk](https://github.com/modelcontextprotocol/python-sdk).'
  prefs: []
  type: TYPE_NORMAL
- en: What is a protocol?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A **protocol** is simply a set of rules that defines how two or more systems
    communicate. The most familiar example is HTTP—the protocol your browser uses
    to talk to websites. When you visit a URL, your browser sends a structured HTTP
    request, and the server responds with a page or data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you visit the Wikipedia page for Mount Kilimanjaro. Your browser
    sends the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The server responds with an HTML page, which your browser renders:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1: Browser rendering a web page](img/B32584_08_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.1: Browser rendering a web page'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, imagine instead of displaying a full page, you just want the data. This
    is where **Representational State Transfer** (**REST**) APIs come in. REST APIs
    let applications exchange data in a machine-readable format over HTTP. A client
    might send the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'They might then receive this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](img/3.png)**Quick tip**: Enhance your coding experience with the **AI Code
    Explainer** and **Quick Copy** features. Open this book in the next-gen Packt
    Reader. Click the **Copy** button'
  prefs: []
  type: TYPE_NORMAL
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  prefs: []
  type: TYPE_NORMAL
- en: (**2**) to get the AI assistant to explain a block of code to you.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with a black text  AI-generated content may be incorrect.](img/image_%282%291.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](img/21.png)**The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR visit packtpub.com/unlock, then use
    the search bar to find this book by name. Double-check the edition shown to make
    sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/The_next-gen_Packt_Reader_QR_Code1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The following figure illustrates this process:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2: Example of a REST API request](img/B32584_08_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.2: Example of a REST API request'
  prefs: []
  type: TYPE_NORMAL
- en: This same principle—structured communication over a standard protocol—is at
    the heart of new AI-native protocols such as MCP.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the Model Context Protocol
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**MCP** is a foundational protocol designed to standardize how LLMs interact
    with external tools, data sources, and workflows. Like HTTP for the web, MCP provides
    a unified and consistent interface for AI agents to query and invoke capabilities
    outside the model itself.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before MCP, the AI tooling landscape was fragmented:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fragmented orchestrators**: Frameworks such as LangChain, AutoGen, and Semantic
    Kernel offer their own tool registries and agent logic, but lack a shared standard
    for tool invocation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom integrations**: Each system integrates tools using bespoke code, making
    reuse and interoperability difficult'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provider dependency**: Orchestrators are tightly coupled to providers’ APIs,
    which can change unpredictably'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**No common protocol**: There was no universal method for agents and models
    to discover, describe, or invoke tools across hosts and platforms'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MCP addresses these limitations by introducing a client-server architecture
    and standardizing the tool and resource interface.
  prefs: []
  type: TYPE_NORMAL
- en: 'From an architecture perspective, MCP is made of the following components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**MCP host**: The AI application or environment that runs the LLM and facilitates
    communication. Examples include Claude Desktop, GitHub Copilot, and Cursor.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP server**: An external service that exposes tools, resources, or prompts
    in a structured, discoverable format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP client**: A component inside the host that connects to one or more MCP
    servers. It handles protocol messaging and routing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.3: MCP components](img/B32584_08_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.3: MCP components'
  prefs: []
  type: TYPE_NORMAL
- en: Unlike traditional clients that hardcode tool logic, MCP allows the LLM to choose
    which server to call based on user intent, enabled by JSON-RPC-based function
    calling.
  prefs: []
  type: TYPE_NORMAL
- en: '**Definition**'
  prefs: []
  type: TYPE_NORMAL
- en: '**JSON-RPC 2.0** is a lightweight, stateless protocol used for structured communication
    between systems via a **remote procedure call** (**RPC**). It uses JSON to encode
    requests and responses, allowing one system to call functions exposed by another
    and receive results or error messages in a consistent format.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A typical JSON-RPC request looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'And a valid response looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: MCP uses JSON-RPC 2.0 to structure requests and responses. It supports multiple
    transports (including HTTP and STDIO), and MCP servers can even wrap traditional
    REST APIs, translating standardized MCP requests into custom backend logic.
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP categorizes capabilities into three server types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Tools**:Tools are executable functions that AI models can invoke to perform
    specific actions, such as retrieving stock prices, converting formats, or querying
    APIs. These tools are described using JSON schemas, making them discoverable and
    safely invokable by models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example, here you can see the JSON definition of the aforementioned tool:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This schema allows the LLM to understand what inputs are needed and what action
    the tool performs. Tool definitions promote consistency and reusability across
    different hosts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Resources**: Resources represent structured data objects that an AI model
    may need to retrieve and use, such as documents, JSON datasets, or database outputs.
    For example, an MCP-compliant AI agent tasked with contract analysis might retrieve
    a legal document from a document management system using its URI, extract relevant
    clauses, and compare them to a compliance checklist stored in a JSON dataset.
    Similarly, in a customer service automation flow, the AI could fetch customer
    interaction logs from a database output, process the data to detect sentiment
    or unresolved issues, and generate a summary. These resources are referenced using
    **Uniform Resource Identifiers** (**URIs**) and include metadata such as MIME
    type and description, allowing the model to interpret the format and structure
    of the content efficiently.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here you can see an example of the typical schema associated with a URI resource:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Resources give models access to static or dynamic data with minimal parsing
    or hardcoded logic, offering a declarative way to retrieve relevant information.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompts**: Prompts in MCP are reusable prompt templates that can guide the
    model through specific workflows or tasks. These are especially useful for implementing
    multi-step reasoning or fine-tuned interactions with user context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For instance, consider a scenario where an AI assistant is tasked with summarizing
    quarterly earnings reports for a financial analyst. Using a reusable prompt in
    MCP, the assistant first extracts key metrics such as revenue, operating expenses,
    and net profit. It then compares them with previous quarters and highlights anomalies
    or trends.
  prefs: []
  type: TYPE_NORMAL
- en: 'This multi-step interaction is guided entirely by the prompt template, ensuring
    consistent output structure and tailored summaries aligned with the analyst’s
    past preferences. Here is an example (the prompt has been truncated for demonstration
    purposes):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Prompts add a semantic layer on top of tool execution, enabling richer interactions
    and contextual guidance directly embedded in the protocol interface.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s walk through building and exposing a simple MCP-compliant tool step by
    step. This example will demonstrate the full lifecycle from Python code to live
    interaction inside a supported MCP host such as Claude Desktop.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we define a simple Python function to retrieve the closing stock price
    using the `yfinance` package:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This function does exactly what it says – it takes a stock ticker as input and
    returns the most recent closing price.
  prefs: []
  type: TYPE_NORMAL
- en: 'We then use the `FastMCP` utility to expose this function as an MCP tool:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '`FastMCP` registers the tool and creates a server interface that speaks to
    MCP over STDIO or HTTP.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, you can consume your server through your favourite MCP host. In our example,
    we will connect to Claude Desktop. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Run the following command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This will update the `claude_desktop_config.json` file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Restart Claude Desktop. You should now see your custom tool available in the
    server panel:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.4: Example of Claude Desktop as an MCP host discovering the MCP
    server](img/B32584_08_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.4: Example of Claude Desktop as an MCP host discovering the MCP server'
  prefs: []
  type: TYPE_NORMAL
- en: 'Under the **Demo** server, you can see the available MCP resource types. In
    our case, we will see the `get_stock_price` tool:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.5: Available tools in the MCP server](img/B32584_08_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.5: Available tools in the MCP server'
  prefs: []
  type: TYPE_NORMAL
- en: Once everything is set up, you can test the integration by typing a natural
    language query such as `What's the closing price of Microsoft today?`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.6: Example of Claude Desktop invoking the tool from the MCP server](img/B32584_08_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.6: Example of Claude Desktop invoking the tool from the MCP server'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the LLM powering Claude Desktop—in our case, Claude 3.7 Sonnet
    (you can pick your model in the bottom-right list in the chat bar)—understood
    that to answer our question, the `get_stock_price` tool needs to be invoked.
  prefs: []
  type: TYPE_NORMAL
- en: From an authentication perspective, MCP handles authentication and security
    by enforcing strict identity verification and secure communication between clients
    and models. It uses OAuth 2.0 or similar token-based mechanisms to authenticate
    users and services, ensuring that only authorized entities can initiate or access
    model interactions. For security, MCP supports end-to-end encryption, auditing,
    and access control policies, which help protect sensitive data in transit and
    at rest. Additionally, it can integrate with enterprise identity providers and
    enforce **role-based access control** (**RBAC**) to align with organizational
    security standards.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, MCP ensures robust system behavior by defining standardized mechanisms
    for context, fallback strategies, and error handling. It employs well-defined
    JSON-RPC error codes—such as parse errors (`32700`), invalid requests (`32600`),
    “method not found” (`32601`), invalid parameters (`32602`), and internal errors
    (`32603`)—with implementations able to extend into custom codes above `32000`.
    MCP error responses are communicated through request‐response cycles, transport‐level
    alerts, and dedicated protocol handlers, allowing structured error detection and
    recovery.
  prefs: []
  type: TYPE_NORMAL
- en: 'For fault tolerance, MCP supports intelligent fallback: clients can be configured
    with error thresholds that, when exceeded or when services degrade, trigger automated
    switching to backup models or server versions—ideally without losing conversation
    context—ensuring high availability.'
  prefs: []
  type: TYPE_NORMAL
- en: Together, these mechanisms provide a resilient, self-healing workflow for AI
    systems operating in dynamic or distributed environments.
  prefs: []
  type: TYPE_NORMAL
- en: MCP is laying the groundwork for a more interoperable AI future. It brings structure
    to the chaotic tool ecosystem, enables reusable components, and allows models
    to interact with tools in a discoverable, secure, and standardized way.
  prefs: []
  type: TYPE_NORMAL
- en: Having looked at how MCP helps an AI agent reach out to tools and data, we will
    next explore how AI agents can reach out to each other—that’s where Google’s A2A
    protocol comes into play, facilitating direct inter-agent communication.
  prefs: []
  type: TYPE_NORMAL
- en: Agent2Agent
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Developed by Google, A2A is a protocol designed to facilitate seamless communication
    and coordination among autonomous AI agents, regardless of their underlying platforms
    or vendors.
  prefs: []
  type: TYPE_NORMAL
- en: While A2A focuses on agent-to-agent interactions, it complements MCP’s agent-to-tool
    communication. In practice, an agent might use MCP to access external tools or
    data sources and A2A to delegate tasks or share information with other agents.
    This layered approach enables the construction of sophisticated, interoperable
    AI ecosystems.
  prefs: []
  type: TYPE_NORMAL
- en: 'The premise of A2A is that one agent should be able to request assistance or
    share information with another agent, even if they were built by different organizations
    or are running on different platforms. This is crucial for scaling AI solutions:
    rather than one giant AI trying to do everything, we can have networks of smaller
    AIs each doing what they’re best at and talking to each other to accomplish complex
    tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: 'At its heart, A2A is about establishing a common **task-oriented dialogue**
    between agents. It’s not just free-form chat; it structures interactions as tasks,
    results, and optionally follow-up questions. Key principles include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent discoverability**: To communicate, agents need to know how to reach
    each other and what capabilities each agent has. A2A introduces the concept of
    an **agent card**—a metadata description that an agent can publish describing
    its identity, supported tasks, input/output format, and endpoint URL. This is
    often a machine-readable JSON file. For example, let’s consider the following
    card for a weather agent:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Let’s break down each component:'
  prefs: []
  type: TYPE_NORMAL
- en: '`name`: A human-readable name for the agent'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`description`: A brief summary of the agent’s purpose and functionalities'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`url`: The endpoint where the agent accepts A2A protocol requests'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`version`: The version of the agent or the A2A protocol it adheres to'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`capabilities`: Indicates the agent’s support for specific features:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`streaming`: Supports real-time data streaming via **Server-Sent Events** (**SSE**)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pushNotifications`: Can send asynchronous updates to clients'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stateTransitionHistory`: Maintains a history of task state changes'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`authentication`: Specifies the authentication methods the agent supports,
    such as bearer tokens or API keys'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`defaultInputModes`: The default content types the agent expects for incoming
    data (e.g., plain text)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`defaultOutputModes`: The default content types the agent produces in responses
    (e.g., JSON)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`skills`: A list of specific functionalities the agent offers:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`id`: A unique identifier for the skill'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`name`: A human-readable name for the skill'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`description`: Details about what the skill does'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tags`: Keywords associated with the skill for easier discovery'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`examples`: Sample queries or tasks that the skill can handle'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This structured format allows other agents to discover and interact with the
    weather agent effectively, facilitating seamless collaboration in multi-agent
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: '**Structured requests (tasks)**: A2A formalizes communication in terms of task
    requests. One agent (the requester) sends a task to another agent (the provider)
    in a JSON format that includes what is being asked and any necessary parameters.
    For instance, Agent A might send Agent B a task, “Translate the following text
    to Spanish,” with the text attached. These tasks have a defined schema, so Agent
    B knows exactly where to find the instructions and data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asynchronous interaction**: Agents may not respond instantly if a task takes
    time or requires multiple steps. A2A supports asynchronous processing by allowing
    an agent to respond with interim status updates (such as “Task accepted” or “50%
    complete”) and then a completion message when done. It can use technologies such
    as HTTP long-polling or SSE for streaming updates. This is important because two
    agents might run at different speeds, or one might have to perform lengthy work
    (e.g., searching a large database)—the protocol ensures that the requesting agent
    isn’t left in the dark.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-turn clarification**: Often, an agent’s request might be ambiguous
    or incomplete. A2A allows the responding agent to ask clarifying questions back.
    This creates a mini dialogue within the scope of the task. For example, Agent
    B might reply, “I can translate text, but you didn’t specify which dialect of
    Spanish. Should it be neutral or region-specific?”. Agent A can then answer, and
    the task proceeds. This dynamic makes agent collaboration more resilient, because
    it’s not all one-shot; they can negotiate to refine the task just as humans would.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Standard data formats**: The content exchanged (such as the payloads of tasks
    and results) is in standard formats (JSON for structured data, or references to
    binary data if needed). If an agent needs to send a large file to another, it
    might provide a URL or a handle rather than the raw bytes in the JSON, depending
    on the implementation. A2A deliberately builds on web standards (HTTP for transport,
    JSON for data, and OAuth for authorization) so that it fits naturally into existing
    networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Imagine a scenario of a multi-agent workflow. A user makes a request: “Plan
    me a weekend trip to a music festival, including tickets, travel, and hotel. Stay
    within a budget of €500.” A single monolithic agent might struggle with all facets,
    but a collection of agents could handle it efficiently:'
  prefs: []
  type: TYPE_NORMAL
- en: A **travel agent** knows about flights and hotels
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An **event agent** knows about concerts and festivals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **budgeting agent** can crunch numbers to stay within a budget
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **transportation agent** connects with real-time data of available public
    transport
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s take a look at the following illustration:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.7: Example of multiple agents talking to each other via A2A](img/B32584_08_07.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.7: Example of multiple agents talking to each other via A2A'
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/21.png)**The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR go to packtpub.com/unlock, then use
    the search bar to find this book by name. Double-check the edition shown to make
    sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/The_next-gen_Packt_Reader_QR_Code.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The interaction begins with the travel agent, which serves as the initial coordinator.
    The user’s request includes multiple components: finding a suitable music event,
    identifying transportation options, booking accommodation, and staying within
    a budget. Rather than relying on a single monolithic system, the travel agent
    delegates distinct parts of the request to agents better equipped to handle them.'
  prefs: []
  type: TYPE_NORMAL
- en: It first contacts the event agent with the task of finding a festival near Milan
    on a specific date. Once a relevant event is identified, the event agent independently
    reaches out to the budgeting agent to evaluate whether the €120 ticket price is
    feasible within the user’s overall €500 budget. This lateral communication, bypassing
    the original travel agent, is a hallmark of A2A—agents can initiate tasks among
    themselves without central orchestration.
  prefs: []
  type: TYPE_NORMAL
- en: Simultaneously, the travel agent consults with the transportation agent to explore
    travel options between Milan and the event location, specifying the date and origin.
    It also engages the budgeting agent directly, providing an early breakdown of
    expected costs and asking for a proposed allocation between travel and accommodation.
  prefs: []
  type: TYPE_NORMAL
- en: Each agent operates as an expert system, focused on a specific domain—events,
    transportation, and budgeting—but they collaborate fluidly by exchanging structured
    task messages. The result is a coordinated, context-aware response that feels
    holistic to the end user, even though it is produced through decentralized, asynchronous
    agent collaboration.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tip**'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this scenario, you might wonder: why not use a framework such as LangGraph
    alone?'
  prefs: []
  type: TYPE_NORMAL
- en: Such frameworks excel at orchestrating multiple agents within a single application—it
    can coordinate the travel, event, and budgeting agents as long as they’re all
    part of the same code base or runtime.
  prefs: []
  type: TYPE_NORMAL
- en: However, A2A steps in when you need agents to be autonomous, discoverable, and
    interoperable across systems. With A2A, each agent could live in a different cloud,
    be built by a different team, or even use a different framework—yet still collaborate
    through a shared protocol.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it like microservices: AI frameworks manage a tightly coupled system,
    while A2A enables loosely coupled, distributed agent ecosystems.'
  prefs: []
  type: TYPE_NORMAL
- en: In this chain, A2A is the glue that allows these agents to coordinate. Without
    it, you would need one agent to have direct knowledge of all domains or use proprietary
    APIs for each other’s domains. With A2A, any agent that understands the protocol
    can enlist help from any other, forming an ad-hoc team of experts on demand. It’s
    easy to see parallels to microservices in software architecture; each agent is
    like a microservice with a clear API (its tasks), and A2A is the interchange language.
  prefs: []
  type: TYPE_NORMAL
- en: Google designed A2A with an emphasis on openness and vendor neutrality. It’s
    not tied to Google’s internal tech; rather, they published the spec and a reference
    implementation, and they have been working with partners to drive adoption. In
    fact, Microsoft announced that its own agents (in the Microsoft 365 Copilot ecosystem)
    would be A2A-compatible to collaborate with Google’s agents, a notable show of
    cross-platform support. This cross-vendor agent communication is essential for
    an “agentic web” because users will inevitably use agents from different sources.
    A2A means your personal AI assistant could directly communicate with, say, a bank’s
    AI agent to negotiate a loan offer, instead of just relaying messages through
    rigid APIs.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, A2A fills the gap of agent coordination, standardizing the way autonomous
    AI services converse and collaborate.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: MCP and A2A are complementary to each other. MCP standardizes how agents access
    tools and external data (e.g., fetching flights or hotels). A2A enables agents
    to talk to each other, sharing tasks, results, and decisions across systems. Think
    of MCP as the agent-to-tool bridge, and A2A as the agent-to-agent handshake.
  prefs: []
  type: TYPE_NORMAL
- en: With MCP and A2A in place, we have protocols for agents to use tools and to
    talk among themselves. The next piece of the puzzle is enabling agents to engage
    in transactions and agreements, which is where the ACP comes in.
  prefs: []
  type: TYPE_NORMAL
- en: Agent Commerce Protocol
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'As AI agents become more autonomous and start acting on behalf of businesses
    or individuals, a novel question arises: can these agents enter into contracts
    or transactions with each other reliably? ACP, developed by a company called Virtuals,
    is an ambitious attempt to give agents the ability to engage in economic exchanges
    and collaborative agreements in a structured, trust-minimized way. ACP is essentially
    about building a commerce layer for AI agents, allowing them to buy and sell services,
    compensate each other for work, and ensure that all parties fulfill their obligations.'
  prefs: []
  type: TYPE_NORMAL
- en: Consider a future scenario where you have an AI agent that manages your personal
    tasks. You might need it to hire another agent (say, a freelance graphic designer
    agent) to create a logo for your project. How do these agents formalize that arrangement?
    How does your agent pay the designer agent, and how can it be sure the logo delivered
    meets the requirements? Today, a human would perhaps use a freelancing platform
    that escrows the payment and releases it upon approval. ACP generalizes this kind
    of mechanism for AI-to-AI deals.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of ACP is the use of **smart contracts** and blockchain technology
    to create tamper-proof agreements between agents.
  prefs: []
  type: TYPE_NORMAL
- en: '**Definition**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Blockchain** is a distributed, decentralized digital ledger that records
    transactions across many computers in a secure, tamper-proof way. Each **block**
    contains a list of transactions, and these blocks are linked chronologically to
    form a **chain**. Blockchain ensures data integrity through consensus mechanisms
    and cryptography, and serves as the foundation for cryptocurrencies, smart contracts,
    and decentralized applications.'
  prefs: []
  type: TYPE_NORMAL
- en: A smart contract is a self-executing digital agreement written in code and stored
    on a blockchain. It automatically enforces predefined rules and actions when specific
    conditions are met, without requiring human intervention. Smart contracts are
    immutable (cannot be altered once deployed) and transparent, making them ideal
    for trusted, automated transactions between parties.
  prefs: []
  type: TYPE_NORMAL
- en: When two agents decide to transact, they don’t just rely on trust; they create
    a digital contract that is recorded on a decentralized ledger. This contract defines
    the terms (e.g., “Agent X will deliver Asset Y by time Z, and Agent A will pay
    $W in return”) and holds the payment in escrow. Because it’s on a blockchain,
    neither party can unilaterally alter or cancel it without the other’s consent
    (or without triggering predefined penalties).
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, your personal agent and the designer agent could establish an
    ACP contract: your agent escrows the agreed fee (perhaps in a digital currency
    or token) into the contract. The designer agent delivers the logo file to the
    contract. Now, how does the contract know to release the funds? This is where
    verification comes in.'
  prefs: []
  type: TYPE_NORMAL
- en: ACP introduces the notion of **evaluator agents** (or **oracles**) to judge
    whether the terms of a contract have been met. Continuing the example, an evaluator
    agent (which could be a neutral third-party AI or a service chosen by both) could
    check the delivered logo against the requirements. If the requirement was simply
    “a logo image file of format PNG,” a straightforward programmatic check might
    suffice. If the requirement was subjective (“a logo that looks professional and
    aligns with brand guidelines”), the evaluator might use machine vision or even
    involve a human-in-the-loop to assess quality. Once the evaluator agent signals
    that the deliverable is acceptable, the smart contract automatically releases
    the payment to the designer agent’s account.
  prefs: []
  type: TYPE_NORMAL
- en: 'This setup ensures a **trustless interaction**: the designer agent trusts it
    will get paid if it does a good job, and your agent trusts it won’t lose money
    for nothing. Neither has to fully trust the other; they both put trust in the
    protocol and the chosen evaluators. ACP leverages cryptographic signatures to
    prove an agent’s identity when signing a contract, so an agent can’t later repudiate
    the agreement, similar to how a digital signature on a document works.'
  prefs: []
  type: TYPE_NORMAL
- en: Virtuals demonstrated the power of this approach with scenarios such as a multi-agent
    supply chain. In one demo, they showed a lemonade stand run by AI agents, where
    different agents autonomously negotiated supply purchases (lemons, sugar, and
    cups), production, and sales, all using ACP smart contracts to handle payments
    and enforce delivery of goods.
  prefs: []
  type: TYPE_NORMAL
- en: If you are interested in seeing the live demo, you can visit [https://echonade-demo.virtuals.io/](https://echonade-demo.virtuals.io/).
  prefs: []
  type: TYPE_NORMAL
- en: 'While a lemonade stand is a toy example, it mirrors real business processes.
    One can imagine large-scale applications: agents representing companies negotiating
    a shipment contract (the goods must arrive by a date, or payment is reduced, etc.),
    or an AI content producer selling usage rights of its content to another AI that
    assembles media. ACP provides the **digital infrastructure** for these agent economies
    to function without constant human oversight or intervention in each transaction.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Under the hood, ACP typically involves a combination of on-chain and off-chain
    components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Smart contracts**: These on-chain components hold funds and store the state
    of agreements. They are usually generic templates that ACP specifies for common
    transaction types (such as escrow contracts, auction contracts, etc.).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent wallets/identities**: Each agent has a cryptographic wallet (akin to
    a cryptocurrency wallet), which it uses to send/receive funds and to sign contracts.
    This wallet is tied to the agent’s identity. Virtuals made sure that setting up
    an agent with a wallet and identity can be integrated with the agent’s normal
    operating environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Off-chain communication**: The negotiation to form a contract likely happens
    via A2A or similar communication first (e.g., one agent says “I can do task X
    for $Y by tomorrow”, and the other says “Deal”). Once they agree, they move to
    ACP to formalize it. ACP doesn’t replace A2A; rather, it can be invoked as a next
    step. Think of A2A as discussing the terms, and ACP as signing on the dotted line
    and handling payment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluators/oracles**: These might be off-chain services or semi-autonomous
    agents that feed a result to the smart contract. Many blockchain contracts (such
    as those in decentralized finance) use oracles to get real-world data (e.g., price
    feeds). In ACP’s case, oracles report on task completion or quality. There could
    be standardized evaluator agents for certain domains, such as an “image quality
    evaluator” agent service that many contracts use for design work. The protocol
    ensures that the oracle’s input is required for the contract to release funds,
    making the oracle effectively the judge agreed upon by the participants.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'One might wonder about the performance and cost: blockchain transactions can
    be slow or incur fees. ACP is likely built on a blockchain that supports smart
    contracts (such as Ethereum or others), and part of Virtuals’ work would be optimizing
    it. The **choice of ledger** might be abstracted in the protocol (i.e., ACP could
    be used on different blockchain networks depending on the participants’ preference,
    as long as they all support the needed logic).'
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s early days for ACP. Virtuals launched it in 2025, and initial adoption
    is in pilot projects and experimental platforms. There’s excitement about enabling
    an “agent economy,” but also challenges. For one, not every transaction may need
    such heavy machinery—there’s overhead to writing on a blockchain, so ACP might
    be reserved for significant or high-value interactions where trustworthiness is
    important. For quick, low-stakes exchanges, agents might still use simpler methods.
    Additionally, legal and ethical questions will arise: if two agents contract and
    something goes awry, who is liable? The humans or companies behind them would
    presumably still be the real parties from a legal standpoint, so ACP contracts
    might eventually need to tie into legal identities too.'
  prefs: []
  type: TYPE_NORMAL
- en: Despite these challenges, ACP represents a forward-thinking element of the agentic
    ecosystem. It pushes the boundary from “agents helping people with tasks” to “agents
    engaging in commerce and collaboration on behalf of people.” If protocols such
    as MCP and A2A give agents the tools to act and communicate, ACP gives them the
    means to **commit and transact**—a foundation for complex cooperation where resources
    or money change hands.
  prefs: []
  type: TYPE_NORMAL
- en: 'With an understanding of MCP, A2A, and ACP, we can see that each addresses
    a different layer: MCP for agent-tool/data interfacing, A2A for agent-agent dialogues,
    and ACP for agent-agent agreements and exchanges of value. These are converging
    to enable what some call the **agentic web**, which is our next topic.'
  prefs: []
  type: TYPE_NORMAL
- en: Toward an agentic web
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The term **agentic web** refers to an evolution of the World Wide Web in which
    autonomous agents are first-class participants, not just human users. It’s a vision
    where websites and online services expose interfaces that are easily usable by
    AI agents (in addition to or even instead of humans clicking and typing). One
    concrete step toward this vision is Microsoft’s **Natural Language Web** (**NLWeb**)
    initiative, announced in 2025, which aims to make interacting with web services
    as simple as having a conversation.
  prefs: []
  type: TYPE_NORMAL
- en: From the traditional web to the agentic web
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Today’s web is built for humans using browsers. Even though much of the content
    is machine-readable to some extent (thanks to HTML tags, APIs, etc.), an AI agent
    that wants to do something on the web often has to do what a human does: navigate
    pages, fill forms, click buttons—essentially, **web scraping** or **automation**.
    This is brittle and inefficient. The agentic web proposes that websites should
    provide a more direct line of communication for agents, typically through natural
    language understanding or standardized APIs specifically for AI.'
  prefs: []
  type: TYPE_NORMAL
- en: NLWeb by Microsoft embodies this by encouraging websites to offer a natural
    language interface. In practical terms, a website could host an endpoint (such
    as an API endpoint) that accepts questions or commands in plain language (or a
    structured JSON format representing them) and returns answers or performs actions.
    For example, a flight booking site on the agentic web might allow an agent to
    send a query such as “Find flights from Seattle to Tokyo on June 15 returning
    June 20 under $1000” and directly respond with structured results or a booked
    itinerary, without the agent having to simulate a user clicking through pages
    of the site.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.8: Example of the architecture behind NLWeb](img/B32584_08_08.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.8: Example of the architecture behind NLWeb'
  prefs: []
  type: TYPE_NORMAL
- en: Under the hood, these natural language interfaces often tie into the same backends
    that a site’s mobile app or API might use, but the difference is that they can
    parse flexible requests. Many sites have started embedding AI chatbots for customer
    service. NLWeb generalizes that concept so that the chatbot isn’t just for human
    visitors in a chatbox but is accessible to any agent through a standard protocol.
  prefs: []
  type: TYPE_NORMAL
- en: Key components of NLWeb
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Microsoft’s approach with NLWeb includes several components aimed at standardization:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Semantic markup and schema**: Websites can annotate their content using schemas
    (such as [schema.org](http://schema.org) vocabulary) to help AI understand the
    data. For instance, a restaurant site can label its menu items, prices, and hours
    of operation in a structured way. This isn’t new (search engines use those), but
    NLWeb encourages using these annotations specifically to facilitate agent queries.
    An agent asking “Does this restaurant have vegetarian options?” can quickly parse
    the menu data if it’s marked up, or the site’s natural language interface can
    answer from that data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unified APIs and MCP compatibility**: Many web services already have APIs.
    NLWeb doesn’t necessarily replace all APIs with natural language; rather, it complements
    them. In fact, Microsoft has aligned NLWeb with MCP—every NLWeb-enabled service
    can also be accessed as an MCP server. That means if a developer has written an
    MCP integration (such as a function to get product info from an e-commerce site),
    it can be readily used by any agent. NLWeb might allow a more free-form query
    (such as “Show me the top 5 selling products in category X”), which the site’s
    AI backend interprets and then perhaps maps to an internal API call.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Standard endpoints for agents**: Similar to the agent profiles in A2A, NLWeb
    envisions that websites will advertise their agent interface at a well-known location
    (for example, `/.well-known/nlweb.json` or similar). This could list the kinds
    of queries the site can handle, example prompts, and technical details such as
    the URL to send requests to. Essentially, this is a manifesto telling agents,
    “Here’s how to talk to me.” A search engine for agents might crawl sites for these
    manifests, just as web crawlers index HTML for human search.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Natural language to action pipelines**: On the website’s side, implementing
    NLWeb might involve using an LLM or a semantic parser to translate an agent’s
    request into a database query or function call. Microsoft has been working on
    tools (such as prompt templates and adapters) to help site developers do this
    without reinventing the wheel for each site. For example, a site could use a pretrained
    language model fine-tuned on its FAQs and docs to handle user questions, but constrain
    it to factual answers drawn from the site’s own data (avoiding hallucination).
    The NLWeb toolkit would provide such models and guardrails.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s consider a concrete example in *shopping and services*. Let’s say you
    want your personal AI to compare prices for a particular laptop across multiple
    retailers. On the traditional web, the AI might have to scrape each site, dealing
    with different layouts and risking breakage if the site changes. On an agentic
    web, each retailer would have a natural language interface. Your AI could send
    essentially the same query to each seller/retailer: “Do you have a model XYZ laptop,
    and if so, what’s the price?” Each site’s agent interface would parse that and
    return a structured answer (e.g., “Yes, available for $1200, link to product page”).
    Your AI collates responses and tells you the best option. If you decide to purchase,
    your AI might even complete the transaction via the retailer’s agent API (maybe
    by providing payment details through a secure token, etc.), again, without navigating
    pixel positions on a web page.'
  prefs: []
  type: TYPE_NORMAL
- en: Current progress and applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At mid-2025, the agentic web concept is still in early adoption. Microsoft has
    started rolling out NLWeb features for some of its own services (for instance,
    Bing search itself can serve as an NLWeb endpoint, meaning other agents can query
    Bing via a natural language API rather than the older keyword-based API). A few
    partners, such as e-commerce sites and information providers, have joined pilot
    programs to expose agent-friendly interfaces.
  prefs: []
  type: TYPE_NORMAL
- en: One immediate application area is **enterprise software**. Enterprise solutions
    (CRM and ERP systems) are embracing Copilot-like AI features. With NLWeb principles,
    a CRM system could let an agent request, “Give me the list of top 5 clients by
    revenue this quarter,” and either deliver a table of results or even generate
    a brief report narrative. If all enterprise apps expose such interfaces, an AI
    agent managing a business process could seamlessly pull data from all of them
    to answer a complex query (which previously might require manually integrating
    multiple APIs or data exports).
  prefs: []
  type: TYPE_NORMAL
- en: Another area is **content consumption**. For example, news and knowledge websites
    can provide an NLWeb interface allowing agents (such as a news summarization bot)
    to request “Summarize today’s top headlines on climate policy.” The site could
    then return a summary (perhaps generated by its own AI using the full text of
    articles, which external agents might not have access to due to paywalls). This
    approach respects content ownership—the news site controls the summarization on
    its side and just gives the result, while still enabling the user’s agent to conveniently
    get the information it needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'The agentic web also implies some challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Standardization vs. creativity**: We need common standards (such as how to
    format requests, how to handle auth for user-specific requests, etc.), otherwise,
    every site might do NLWeb differently, and agents would have to adapt. Efforts
    are underway via bodies such as the W3C or industry consortia to create these
    standards, building on things such as [schema.org](http://schema.org) and OpenAPI
    specs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource usage**: If agents start using websites as much as humans (or more),
    web services need to handle that load. They might have to differentiate between
    human traffic and agent traffic to manage it. Some sites might even choose to
    monetize agent access (similar to how APIs now often require API keys or paid
    plans).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Misuse and moderation**: Opening up to agents means malicious bots could
    also try to exploit interfaces. Robust authentication and rate limiting will be
    necessary. Also, sites will want to ensure that an agent doesn’t, for instance,
    use the natural language interface to scrape all content rapidly in violation
    of the terms. Balancing openness with abuse prevention will be a key focus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Even with the challenges ahead, there’s real momentum. Major tech companies
    are recognizing a shift: as AI agents become more common, the web needs to adapt,
    or face a messy patchwork of workarounds such as scraping and unofficial APIs.
    The idea behind the agentic web is to fix that by creating shared standards, such
    as MCP and A2A, so agents can interact with online services reliably and meaningfully.
    You can already see this happening with efforts such as Microsoft’s NLWeb and
    Google’s PaLM API and tools, all aiming to make the web more agent-friendly.'
  prefs: []
  type: TYPE_NORMAL
- en: 'What we’re likely seeing is the beginning of a bigger change: one where software
    services are no longer built just for humans, but also for agents. If this vision
    takes off, using the internet could become a lot more intuitive—less clicking
    and searching, more telling your AI what you want, and letting it handle the rest,
    like having a smart assistant that knows how to navigate the web for you. It’s
    a powerful idea, but it’ll only work if these standards catch on widely.'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The chapter emphasized a major shift in AI: from isolated systems to an interconnected
    ecosystem of intelligent agents, enabled by emerging protocols. We discussed the
    following protocols that serve as the backbone for agent collaboration, tool interaction,
    and even economic transactions:'
  prefs: []
  type: TYPE_NORMAL
- en: MCP allows AI agents to access tools and data in a standardized way, similar
    to how HTTP opened up the web. It enables agents to fetch real-time context and
    perform operations beyond their training data, making them more adaptable and
    powerful.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A2A enables structured communication between agents, allowing them to delegate
    tasks, share expertise, and collaborate toward complex goals. It envisions a modular
    future where intelligence is distributed across specialized agents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ACP introduces mechanisms for economic transactions among agents via blockchain
    and smart contracts. This builds trust and accountability, paving the way for
    autonomous agent marketplaces and business automation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The agentic web (NLWeb) expands the scope, envisioning a web where agents are
    first-class users. With natural language mapped to APIs, agents can navigate and
    act on the internet much like humans, only faster and more effectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Together, these innovations lay the foundation for an “Internet of Agents”
    with a clear direction: a future of ubiquitous, collaborative, and intelligent
    agents transforming how we live, work, and interact with technology.'
  prefs: []
  type: TYPE_NORMAL
- en: As we move forward, it’s crucial to recognize that responsible AI and ethical
    considerations are not optional—they are foundational. These will be the focus
    of the next chapter.
  prefs: []
  type: TYPE_NORMAL
