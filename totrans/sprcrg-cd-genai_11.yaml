  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png)**下一代Packt Reader**随本书免费赠送。扫描二维码或访问packtpub.com/unlock，然后使用搜索栏通过名称查找此书。仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/The_next-gen_Packt_Reader_QR_Code1.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能不正确。](img/The_next-gen_Packt_Reader_QR_Code1.png)'
- en: 'The following figure illustrates this process:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下图说明了这一过程：
- en: '![Figure 8.2: Example of a REST API request](img/B32584_08_02.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2：REST API请求示例](img/B32584_08_02.png)'
- en: 'Figure 8.2: Example of a REST API request'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2：REST API请求示例
- en: This same principle—structured communication over a standard protocol—is at
    the heart of new AI-native protocols such as MCP.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这一相同的原则——通过标准协议进行结构化通信——是MCP等新AI原生协议的核心。
- en: Understanding the Model Context Protocol
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解模型上下文协议
- en: '**MCP** is a foundational protocol designed to standardize how LLMs interact
    with external tools, data sources, and workflows. Like HTTP for the web, MCP provides
    a unified and consistent interface for AI agents to query and invoke capabilities
    outside the model itself.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**MCP** 是一个基础协议，旨在标准化LLMs与外部工具、数据源和工作流程的交互方式。就像Web中的HTTP一样，MCP为AI代理提供了一个统一和一致的接口，用于查询和调用模型本身之外的能力。'
- en: 'Before MCP, the AI tooling landscape was fragmented:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在MCP之前，AI工具领域是碎片化的：
- en: '**Fragmented orchestrators**: Frameworks such as LangChain, AutoGen, and Semantic
    Kernel offer their own tool registries and agent logic, but lack a shared standard
    for tool invocation'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**碎片化编排器**：LangChain、AutoGen和Semantic Kernel等框架提供自己的工具注册表和代理逻辑，但缺乏工具调用的共享标准'
- en: '**Custom integrations**: Each system integrates tools using bespoke code, making
    reuse and interoperability difficult'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自定义集成**：每个系统都使用定制代码集成工具，这使得重用和互操作性变得困难'
- en: '**Provider dependency**: Orchestrators are tightly coupled to providers’ APIs,
    which can change unpredictably'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**供应商依赖性**：编排器与供应商的API紧密耦合，这些API可能会不可预测地发生变化'
- en: '**No common protocol**: There was no universal method for agents and models
    to discover, describe, or invoke tools across hosts and platforms'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有通用协议**：没有通用的方法让代理和模型在主机和平台之间发现、描述或调用工具'
- en: MCP addresses these limitations by introducing a client-server architecture
    and standardizing the tool and resource interface.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: MCP通过引入客户端-服务器架构并标准化工具和资源接口来解决这些限制。
- en: 'From an architecture perspective, MCP is made of the following components:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从架构角度来看，MCP由以下组件组成：
- en: '**MCP host**: The AI application or environment that runs the LLM and facilitates
    communication. Examples include Claude Desktop, GitHub Copilot, and Cursor.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP主机**：运行LLM并促进通信的AI应用程序或环境。例如，包括Claude Desktop、GitHub Copilot和Cursor。'
- en: '**MCP server**: An external service that exposes tools, resources, or prompts
    in a structured, discoverable format.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP服务器**：一个外部服务，以结构化、可发现的方式公开工具、资源或提示。'
- en: '**MCP client**: A component inside the host that connects to one or more MCP
    servers. It handles protocol messaging and routing.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP客户端**：主机内部的一个组件，连接到一个或多个MCP服务器。它处理协议消息和路由。'
- en: '![Figure 8.3: MCP components](img/B32584_08_03.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图8.3：MCP组件](img/B32584_08_03.png)'
- en: 'Figure 8.3: MCP components'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3：MCP组件
- en: Unlike traditional clients that hardcode tool logic, MCP allows the LLM to choose
    which server to call based on user intent, enabled by JSON-RPC-based function
    calling.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统客户端硬编码工具逻辑不同，MCP允许LLM根据用户意图，通过基于JSON-RPC的功能调用选择调用哪个服务器。
- en: '**Definition**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: '**JSON-RPC 2.0** is a lightweight, stateless protocol used for structured communication
    between systems via a **remote procedure call** (**RPC**). It uses JSON to encode
    requests and responses, allowing one system to call functions exposed by another
    and receive results or error messages in a consistent format.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**JSON-RPC 2.0**是一种轻量级、无状态的协议，用于通过**远程过程调用**（**RPC**）在系统之间进行结构化通信。它使用JSON来编码请求和响应，允许一个系统调用另一个系统公开的函数，并以一致格式接收结果或错误消息。'
- en: 'A typical JSON-RPC request looks like this:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的JSON-RPC请求看起来像这样：
- en: '[PRE3]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'And a valid response looks like this:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有效的响应看起来像这样：
- en: '[PRE4]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: MCP uses JSON-RPC 2.0 to structure requests and responses. It supports multiple
    transports (including HTTP and STDIO), and MCP servers can even wrap traditional
    REST APIs, translating standardized MCP requests into custom backend logic.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: MCP使用JSON-RPC 2.0来结构化请求和响应。它支持多种传输方式（包括HTTP和STDIO），并且MCP服务器甚至可以将传统的REST API包装起来，将标准化的MCP请求转换为自定义的后端逻辑。
- en: 'MCP categorizes capabilities into three server types:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: MCP将能力分为三种服务器类型：
- en: '**Tools**:Tools are executable functions that AI models can invoke to perform
    specific actions, such as retrieving stock prices, converting formats, or querying
    APIs. These tools are described using JSON schemas, making them discoverable and
    safely invokable by models.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**：工具是AI模型可以调用的可执行函数，以执行特定操作，例如检索股票价格、转换格式或查询API。这些工具使用JSON模式进行描述，使它们对模型来说是可发现的，并且可以安全地调用。'
- en: 'For example, here you can see the JSON definition of the aforementioned tool:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里可以看到上述工具的JSON定义：
- en: '[PRE5]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This schema allows the LLM to understand what inputs are needed and what action
    the tool performs. Tool definitions promote consistency and reusability across
    different hosts.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 此架构允许LLM理解需要哪些输入以及工具执行什么操作。工具定义促进了不同主机之间的一致性和可重用性。
- en: '**Resources**: Resources represent structured data objects that an AI model
    may need to retrieve and use, such as documents, JSON datasets, or database outputs.
    For example, an MCP-compliant AI agent tasked with contract analysis might retrieve
    a legal document from a document management system using its URI, extract relevant
    clauses, and compare them to a compliance checklist stored in a JSON dataset.
    Similarly, in a customer service automation flow, the AI could fetch customer
    interaction logs from a database output, process the data to detect sentiment
    or unresolved issues, and generate a summary. These resources are referenced using
    **Uniform Resource Identifiers** (**URIs**) and include metadata such as MIME
    type and description, allowing the model to interpret the format and structure
    of the content efficiently.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源**：资源代表AI模型可能需要检索和使用的数据结构化对象，例如文档、JSON数据集或数据库输出。例如，一个负责合同分析的MCP兼容AI代理可能会使用其URI从文档管理系统检索法律文件，提取相关条款，并将它们与存储在JSON数据集中的合规清单进行比较。同样，在客户服务自动化流程中，AI可以从数据库输出中获取客户交互日志，处理数据以检测情绪或未解决的问题，并生成摘要。这些资源使用**统一资源标识符**（**URIs**）进行引用，并包括如MIME类型和描述等元数据，允许模型有效地解释内容的格式和结构。'
- en: 'Here you can see an example of the typical schema associated with a URI resource:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这里可以看到与URI资源相关联的典型模式示例：
- en: '[PRE6]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Resources give models access to static or dynamic data with minimal parsing
    or hardcoded logic, offering a declarative way to retrieve relevant information.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 资源通过最小化解析或硬编码逻辑，为模型提供访问静态或动态数据的方式，提供了一种声明性检索相关信息的方法。
- en: '**Prompts**: Prompts in MCP are reusable prompt templates that can guide the
    model through specific workflows or tasks. These are especially useful for implementing
    multi-step reasoning or fine-tuned interactions with user context.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示**：MCP中的提示是可重用的提示模板，可以引导模型通过特定的工作流程或任务。这些对于实现多步推理或与用户上下文精细调优的交互特别有用。'
- en: For instance, consider a scenario where an AI assistant is tasked with summarizing
    quarterly earnings reports for a financial analyst. Using a reusable prompt in
    MCP, the assistant first extracts key metrics such as revenue, operating expenses,
    and net profit. It then compares them with previous quarters and highlights anomalies
    or trends.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个场景，一个AI助手被分配为为财务分析师总结季度收益报告。使用MCP中的可重复提示，助手首先提取关键指标，如收入、运营费用和净利润。然后，它将它们与上一季度进行比较，并突出显示异常或趋势。
- en: 'This multi-step interaction is guided entirely by the prompt template, ensuring
    consistent output structure and tailored summaries aligned with the analyst’s
    past preferences. Here is an example (the prompt has been truncated for demonstration
    purposes):'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 此多步骤交互完全由提示模板指导，确保输出结构一致，并根据分析师过去的偏好定制摘要。以下是一个示例（提示已截断以供演示）：
- en: '[PRE7]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Prompts add a semantic layer on top of tool execution, enabling richer interactions
    and contextual guidance directly embedded in the protocol interface.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 提示在工具执行之上添加了一个语义层，使交互更加丰富，并在协议接口中直接嵌入上下文指导。
- en: Let’s walk through building and exposing a simple MCP-compliant tool step by
    step. This example will demonstrate the full lifecycle from Python code to live
    interaction inside a supported MCP host such as Claude Desktop.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步步地讲解构建和公开一个简单的MCP兼容工具。此示例将演示从Python代码到在支持的MCP主机（如Claude桌面）内进行实时交互的完整生命周期。
- en: 'First, we define a simple Python function to retrieve the closing stock price
    using the `yfinance` package:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们定义一个简单的Python函数，使用`yfinance`包检索收盘价：
- en: '[PRE8]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This function does exactly what it says – it takes a stock ticker as input and
    returns the most recent closing price.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数确实如其所言——它接受一个股票代码作为输入，并返回最近的收盘价。
- en: 'We then use the `FastMCP` utility to expose this function as an MCP tool:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们然后使用`FastMCP`实用程序将此功能公开为MCP工具：
- en: '[PRE9]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '`FastMCP` registers the tool and creates a server interface that speaks to
    MCP over STDIO or HTTP.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '`FastMCP`注册工具并创建一个与MCP通过STDIO或HTTP通信的服务器接口。'
- en: 'Now, you can consume your server through your favourite MCP host. In our example,
    we will connect to Claude Desktop. Follow these steps:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以通过您最喜欢的MCP主机来消费您的服务器。在我们的示例中，我们将连接到Claude桌面。按照以下步骤操作：
- en: 'Run the following command:'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行以下命令：
- en: '[PRE10]'
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This will update the `claude_desktop_config.json` file:'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这将更新`claude_desktop_config.json`文件：
- en: '[PRE11]'
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Restart Claude Desktop. You should now see your custom tool available in the
    server panel:'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新启动Claude桌面。现在，您应该在服务器面板中看到您的自定义工具：
- en: '![Figure 8.4: Example of Claude Desktop as an MCP host discovering the MCP
    server](img/B32584_08_04.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图8.4：Claude桌面作为MCP主机发现MCP服务器的示例](img/B32584_08_04.png)'
- en: 'Figure 8.4: Example of Claude Desktop as an MCP host discovering the MCP server'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4：Claude桌面作为MCP主机发现MCP服务器的示例
- en: 'Under the **Demo** server, you can see the available MCP resource types. In
    our case, we will see the `get_stock_price` tool:'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**演示**服务器下，您可以查看可用的MCP资源类型。在我们的案例中，我们将看到`get_stock_price`工具：
- en: '![Figure 8.5: Available tools in the MCP server](img/B32584_08_05.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图8.5：MCP服务器中的可用工具](img/B32584_08_05.png)'
- en: 'Figure 8.5: Available tools in the MCP server'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5：MCP服务器中的可用工具
- en: Once everything is set up, you can test the integration by typing a natural
    language query such as `What's the closing price of Microsoft today?`.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一切设置完成后，您可以通过输入一个自然语言查询来测试集成，例如`今天微软的收盘价是多少？`。
- en: '![Figure 8.6: Example of Claude Desktop invoking the tool from the MCP server](img/B32584_08_06.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图8.6：Claude桌面从MCP服务器调用工具的示例](img/B32584_08_06.png)'
- en: 'Figure 8.6: Example of Claude Desktop invoking the tool from the MCP server'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6：Claude桌面从MCP服务器调用工具的示例
- en: As you can see, the LLM powering Claude Desktop—in our case, Claude 3.7 Sonnet
    (you can pick your model in the bottom-right list in the chat bar)—understood
    that to answer our question, the `get_stock_price` tool needs to be invoked.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，Claude桌面背后的LLM（在我们的案例中是Claude 3.7 Sonnet，您可以在聊天栏的右下角列表中选择您的模型）理解要回答我们的问题，需要调用`get_stock_price`工具。
- en: From an authentication perspective, MCP handles authentication and security
    by enforcing strict identity verification and secure communication between clients
    and models. It uses OAuth 2.0 or similar token-based mechanisms to authenticate
    users and services, ensuring that only authorized entities can initiate or access
    model interactions. For security, MCP supports end-to-end encryption, auditing,
    and access control policies, which help protect sensitive data in transit and
    at rest. Additionally, it can integrate with enterprise identity providers and
    enforce **role-based access control** (**RBAC**) to align with organizational
    security standards.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 从认证的角度来看，MCP 通过强制执行严格的身份验证和客户端与模型之间的安全通信来处理认证和安全。它使用 OAuth 2.0 或类似的基于令牌的机制来认证用户和服务，确保只有授权实体可以启动或访问模型交互。为了安全起见，MCP
    支持端到端加密、审计和访问控制策略，有助于保护传输中和静止状态下的敏感数据。此外，它可以与企业身份提供者集成并强制执行**基于角色的访问控制**（**RBAC**），以符合组织的安全标准。
- en: Finally, MCP ensures robust system behavior by defining standardized mechanisms
    for context, fallback strategies, and error handling. It employs well-defined
    JSON-RPC error codes—such as parse errors (`32700`), invalid requests (`32600`),
    “method not found” (`32601`), invalid parameters (`32602`), and internal errors
    (`32603`)—with implementations able to extend into custom codes above `32000`.
    MCP error responses are communicated through request‐response cycles, transport‐level
    alerts, and dedicated protocol handlers, allowing structured error detection and
    recovery.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，MCP 通过定义标准化的上下文、回退策略和错误处理机制来确保系统的稳健行为。它使用定义良好的 JSON-RPC 错误代码——例如解析错误（`32700`）、无效请求（`32600`）、“方法未找到”（`32601`）、无效参数（`32602`）和内部错误（`32603`）——以及能够扩展到
    `32000` 以上的自定义代码的实现。MCP 错误响应通过请求-响应周期、传输层警报和专用协议处理程序进行通信，允许结构化的错误检测和恢复。
- en: 'For fault tolerance, MCP supports intelligent fallback: clients can be configured
    with error thresholds that, when exceeded or when services degrade, trigger automated
    switching to backup models or server versions—ideally without losing conversation
    context—ensuring high availability.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 为了容错，MCP支持智能回退：客户端可以配置错误阈值，当超过阈值或服务降级时，会自动切换到备份模型或服务器版本——理想情况下不会丢失对话上下文——确保高可用性。
- en: Together, these mechanisms provide a resilient, self-healing workflow for AI
    systems operating in dynamic or distributed environments.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这些机制共同为在动态或分布式环境中运行的 AI 系统提供了一种弹性、自愈的工作流程。
- en: MCP is laying the groundwork for a more interoperable AI future. It brings structure
    to the chaotic tool ecosystem, enables reusable components, and allows models
    to interact with tools in a discoverable, secure, and standardized way.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: MCP 正在为更互操作的 AI 未来奠定基础。它为混乱的工具生态系统带来了结构，使可重用组件成为可能，并允许模型以可发现、安全、标准化的方式与工具交互。
- en: Having looked at how MCP helps an AI agent reach out to tools and data, we will
    next explore how AI agents can reach out to each other—that’s where Google’s A2A
    protocol comes into play, facilitating direct inter-agent communication.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解了 MCP 如何帮助 AI 代理访问工具和数据之后，我们将接下来探讨 AI 代理如何相互联系——这正是谷歌的 A2A 协议发挥作用的地方，它促进了代理之间的直接通信。
- en: Agent2Agent
  id: totrans-101
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Agent2Agent
- en: Developed by Google, A2A is a protocol designed to facilitate seamless communication
    and coordination among autonomous AI agents, regardless of their underlying platforms
    or vendors.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由谷歌开发的 A2A 是一种旨在促进自主 AI 代理之间无缝通信和协调的协议，无论其底层平台或供应商如何。
- en: While A2A focuses on agent-to-agent interactions, it complements MCP’s agent-to-tool
    communication. In practice, an agent might use MCP to access external tools or
    data sources and A2A to delegate tasks or share information with other agents.
    This layered approach enables the construction of sophisticated, interoperable
    AI ecosystems.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 A2A 专注于代理之间的交互，但它补充了 MCP 的代理到工具通信。在实践中，一个代理可能会使用 MCP 访问外部工具或数据源，并使用 A2A 来委派任务或与其他代理共享信息。这种分层方法使得构建复杂、互操作的
    AI 生态系统成为可能。
- en: 'The premise of A2A is that one agent should be able to request assistance or
    share information with another agent, even if they were built by different organizations
    or are running on different platforms. This is crucial for scaling AI solutions:
    rather than one giant AI trying to do everything, we can have networks of smaller
    AIs each doing what they’re best at and talking to each other to accomplish complex
    tasks.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: A2A 的前提是，一个智能体应该能够请求另一个智能体的帮助或共享信息，即使它们由不同的组织构建或在不同的平台上运行。这对于扩展 AI 解决方案至关重要：而不是一个庞大的
    AI 尝试做所有事情，我们可以拥有由较小的 AI 网络组成，每个 AI 都擅长自己擅长的事情，并通过相互交流来完成复杂任务。
- en: 'At its heart, A2A is about establishing a common **task-oriented dialogue**
    between agents. It’s not just free-form chat; it structures interactions as tasks,
    results, and optionally follow-up questions. Key principles include the following:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: A2A 的核心是建立智能体之间的**面向任务的对话**。它不仅仅是自由形式的聊天；它将交互结构化为任务、结果和可选的后续问题。关键原则包括以下内容：
- en: '**Agent discoverability**: To communicate, agents need to know how to reach
    each other and what capabilities each agent has. A2A introduces the concept of
    an **agent card**—a metadata description that an agent can publish describing
    its identity, supported tasks, input/output format, and endpoint URL. This is
    often a machine-readable JSON file. For example, let’s consider the following
    card for a weather agent:'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体可发现性**：为了进行通信，智能体需要知道如何相互联系以及每个智能体具有哪些能力。A2A 引入了**智能体卡片**的概念——一个智能体可以发布的元数据描述，描述其身份、支持的任务、输入/输出格式和端点
    URL。这通常是一个机器可读的 JSON 文件。例如，让我们考虑以下针对天气智能体的卡片：'
- en: '[PRE12]'
  id: totrans-107
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Let’s break down each component:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解每个组件：
- en: '`name`: A human-readable name for the agent'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`name`: 智能体的人类可读名称'
- en: '`description`: A brief summary of the agent’s purpose and functionalities'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`description`: 智能体目的和功能的简要总结'
- en: '`url`: The endpoint where the agent accepts A2A protocol requests'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`url`: 智能体接受 A2A 协议请求的端点'
- en: '`version`: The version of the agent or the A2A protocol it adheres to'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`version`: 智能体或其遵循的 A2A 协议的版本'
- en: '`capabilities`: Indicates the agent’s support for specific features:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`capabilities`: 指示智能体对特定功能的支持：'
- en: '`streaming`: Supports real-time data streaming via **Server-Sent Events** (**SSE**)'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`streaming`: 支持通过**服务器发送事件**（**SSE**）进行实时数据流'
- en: '`pushNotifications`: Can send asynchronous updates to clients'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pushNotifications`: 可以向客户端发送异步更新'
- en: '`stateTransitionHistory`: Maintains a history of task state changes'
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`stateTransitionHistory`: 维护任务状态变化的历史记录'
- en: '`authentication`: Specifies the authentication methods the agent supports,
    such as bearer tokens or API keys'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`authentication`: 指定智能体支持的认证方法，例如载体令牌或 API 密钥'
- en: '`defaultInputModes`: The default content types the agent expects for incoming
    data (e.g., plain text)'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`defaultInputModes`: 智能体期望的传入数据的默认内容类型（例如，纯文本）'
- en: '`defaultOutputModes`: The default content types the agent produces in responses
    (e.g., JSON)'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`defaultOutputModes`: 智能体在响应中产生的默认内容类型（例如，JSON）'
- en: '`skills`: A list of specific functionalities the agent offers:'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`skills`: 智能体提供的特定功能列表：'
- en: '`id`: A unique identifier for the skill'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`id`: 技能的唯一标识符'
- en: '`name`: A human-readable name for the skill'
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`name`: 技能的人类可读名称'
- en: '`description`: Details about what the skill does'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`description`: 关于技能功能的详细信息'
- en: '`tags`: Keywords associated with the skill for easier discovery'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tags`: 与技能相关的关键词，以便更容易发现'
- en: '`examples`: Sample queries or tasks that the skill can handle'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`examples`: 技能可以处理的示例查询或任务'
- en: This structured format allows other agents to discover and interact with the
    weather agent effectively, facilitating seamless collaboration in multi-agent
    systems.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构化格式允许其他智能体有效地发现和与天气智能体交互，促进多智能体系统中的无缝协作。
- en: '**Structured requests (tasks)**: A2A formalizes communication in terms of task
    requests. One agent (the requester) sends a task to another agent (the provider)
    in a JSON format that includes what is being asked and any necessary parameters.
    For instance, Agent A might send Agent B a task, “Translate the following text
    to Spanish,” with the text attached. These tasks have a defined schema, so Agent
    B knows exactly where to find the instructions and data.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化请求（任务）**：A2A 将通信形式化为任务请求。一个智能体（请求者）以 JSON 格式向另一个智能体（提供者）发送任务，其中包含请求的内容和任何必要的参数。例如，智能体
    A 可能会向智能体 B 发送一个任务，“将以下文本翻译成西班牙语”，并附上文本。这些任务具有定义的架构，因此智能体 B 可以确切地知道在哪里找到指示和数据。'
- en: '**Asynchronous interaction**: Agents may not respond instantly if a task takes
    time or requires multiple steps. A2A supports asynchronous processing by allowing
    an agent to respond with interim status updates (such as “Task accepted” or “50%
    complete”) and then a completion message when done. It can use technologies such
    as HTTP long-polling or SSE for streaming updates. This is important because two
    agents might run at different speeds, or one might have to perform lengthy work
    (e.g., searching a large database)—the protocol ensures that the requesting agent
    isn’t left in the dark.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异步交互**：如果任务需要时间或多个步骤，智能体可能不会立即响应。A2A通过允许智能体提供中间状态更新（如“任务已接受”或“50%完成”）并在完成后发送完成消息来支持异步处理。它可以使用HTTP长轮询或SSE进行流式更新。这很重要，因为两个智能体的运行速度可能不同，或者其中一个可能需要进行长时间的工作（例如，搜索大型数据库）——该协议确保请求智能体不会被蒙在鼓里。'
- en: '**Multi-turn clarification**: Often, an agent’s request might be ambiguous
    or incomplete. A2A allows the responding agent to ask clarifying questions back.
    This creates a mini dialogue within the scope of the task. For example, Agent
    B might reply, “I can translate text, but you didn’t specify which dialect of
    Spanish. Should it be neutral or region-specific?”. Agent A can then answer, and
    the task proceeds. This dynamic makes agent collaboration more resilient, because
    it’s not all one-shot; they can negotiate to refine the task just as humans would.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多轮澄清**：通常，智能体的请求可能含糊不清或不完整。A2A允许响应智能体提出澄清问题。这会在任务范围内创建一个迷你对话。例如，智能体B可能会回复，“我可以翻译文本，但你没有指定哪种西班牙语方言。应该是中性的还是地区特定的？”智能体A然后可以回答，任务继续进行。这种动态使得智能体协作更加坚韧，因为它不是一次性的；它们可以像人类一样协商以细化任务。'
- en: '**Standard data formats**: The content exchanged (such as the payloads of tasks
    and results) is in standard formats (JSON for structured data, or references to
    binary data if needed). If an agent needs to send a large file to another, it
    might provide a URL or a handle rather than the raw bytes in the JSON, depending
    on the implementation. A2A deliberately builds on web standards (HTTP for transport,
    JSON for data, and OAuth for authorization) so that it fits naturally into existing
    networks.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准数据格式**：交换的内容（如任务和结果的负载）采用标准格式（结构化数据使用JSON，如需则引用二进制数据）。如果一个智能体需要向另一个智能体发送大文件，它可能会提供一个URL或句柄，而不是在JSON中的原始字节，具体取决于实现方式。A2A故意建立在网络标准之上（传输使用HTTP，数据使用JSON，授权使用OAuth），以便它能够自然地融入现有网络。'
- en: 'Imagine a scenario of a multi-agent workflow. A user makes a request: “Plan
    me a weekend trip to a music festival, including tickets, travel, and hotel. Stay
    within a budget of €500.” A single monolithic agent might struggle with all facets,
    but a collection of agents could handle it efficiently:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个多智能体工作流程的场景。用户提出请求：“为我规划一个周末的音乐节之旅，包括门票、旅行和酒店。预算在500欧元以内。”单个单体智能体可能难以应对所有方面，但一组智能体可以高效地处理：
- en: A **travel agent** knows about flights and hotels
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**旅行智能体**了解航班和酒店
- en: An **event agent** knows about concerts and festivals
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**活动智能体**了解音乐会和节日
- en: A **budgeting agent** can crunch numbers to stay within a budget
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**预算智能体**可以计算数字以保持在预算内
- en: A **transportation agent** connects with real-time data of available public
    transport
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**交通智能体**连接到可用的公共交通实时数据
- en: 'Let’s take a look at the following illustration:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看以下插图：
- en: '![Figure 8.7: Example of multiple agents talking to each other via A2A](img/B32584_08_07.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图8.7：多个智能体通过A2A相互通信的示例](img/B32584_08_07.png)'
- en: 'Figure 8.7: Example of multiple agents talking to each other via A2A'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7：多个智能体通过A2A相互通信的示例
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-139
  prefs: []
