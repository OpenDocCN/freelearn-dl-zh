  - PREF_IND
  type: TYPE_IMG
- en: <st c="26692">Figure 4.4 – The database display</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26725">This was the</st> <st c="26738">final step to add the main backend
    functionality to our Code Bug Fixer application.</st> <st c="26823">In the next
    section, you will learn how to build the</st> `<st c="26876">/charge</st>` <st
    c="26883">page, where users will be redirected when their free</st> <st c="26937">trial
    ends.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26948">Adding payments to a ChatGPT application</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26989">In this</st> <st c="26998">section, I will guide you through the
    process of creating the payment page and functions in the Code Bug Fixer.</st>
    <st c="27110">We will create a payments page connected with Stripe to offer users
    three different</st> <st c="27194">subscription plans:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="27213">Monthly plan</st>**<st c="27226">: Users will be billed $5</st>
    <st c="27253">every month</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="27264">Quarterly plan</st>**<st c="27279">: Users will be billed $12</st>
    <st c="27307">every quarter</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="27320">Annual plan</st>**<st c="27332">: Users will be billed $50</st>
    <st c="27360">every year</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="27370">We will also create a confirmation page that will confirm the
    plan that a user has purchased by using a simple statement such as</st> *<st c="27500">You
    have successfully paid $12 for the quarterly plan for unlimited access to the
    Code</st>* *<st c="27587">Bug Fixer.</st>*
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="27597">Next, you will learn how to create the</st> `<st c="27637">payment.html</st>`
    <st c="27649">file.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="27655">Building the payments page</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="27682">Here, we</st> <st c="27692">will create a complete HTML document
    that includes a form to collect payment information from users.</st> <st c="27793">We
    will use the</st> **<st c="27809">Bulma CSS</st>** <st c="27818">framework to</st>
    <st c="27832">style the page and include</st> **<st c="27859">jQuery</st>** <st
    c="27865">and the</st> <st c="27874">Stripe API to handle the</st> <st c="27899">payment
    processing.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="27918">The page will be divided into three columns, each displaying a
    different payment plan option.</st> <st c="28013">Each option includes a card
    with a title, subtitle, and description of the plan.</st> <st c="28094">The payment
    form is located in the footer of each card, and it includes hidden input fields
    for the plan type and payment amount.</st> <st c="28224">The Stripe API is used
    to generate a payment button that collects payment information and initiates payment
    processing (see</st> *<st c="28348">Figure 4</st>**<st c="28356">.5</st>*<st c="28358">).</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 4.5 – The payment page](img/B22414_04_5.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="28894">Figure 4.5 – The payment page</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="28923">To generate</st> <st c="28936">the</st> `<st c="28987">templates</st>`
    <st c="28996">folder.</st> <st c="29005">Those two files will be named</st> `<st
    c="29035">payments.html</st>` <st c="29048">and</st> `<st c="29053">charge.html</st>`<st
    c="29064">. Once you do that, the Code Bug Fixer project structure will be</st>
    <st c="29129">as follows:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: <st c="29269">We will start by building the head of our</st> `<st c="29312">payments.html</st>`
    <st c="29325">page:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: <st c="29733">The head</st> <st c="29743">contains metadata and external resources
    that are necessary for a document to be displayed correctly.</st> <st c="29845">The
    character set specifies the character encoding used in the document, which is</st>
    `<st c="29927">UTF-8</st>` <st c="29932">in this case, and the viewport meta tag
    ensures that the document is displayed correctly on different devices with varying</st>
    <st c="30056">screen sizes.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="30069">The</st> `<st c="30074">link</st>` <st c="30078">tag is</st> <st
    c="30086">used to import external frameworks.</st> <st c="30122">We will use the
    Bulma CSS framework, which provides a set of pre-designed CSS styles to build
    responsive web pages quickly</st> <st c="30245">and easily.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="30256">Then, we will import the jQuery library, which is a popular JavaScript
    library that simplifies the process of manipulating HTML documents and handling
    events.</st> <st c="30416">The second import is the Stripe API library, which
    provides functionality to process</st> <st c="30501">online payments.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="30517">Now, under</st> `<st c="30529"></head></st>`<st c="30536">, we
    can move to build the main body of the HTML file, which is enclosed within the</st>
    `<st c="30620"><</st>``<st c="30621">body></st>` <st c="30626">tags:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: <st c="30783">We will use the</st> `<st c="30800"><section></st>` <st c="30809">element,
    indicating that it is a separate section of the page that can be styled independently
    of other elements.</st> <st c="30924">There is a</st> `<st c="30935"><div></st>`
    <st c="30940">element with a class of</st> `<st c="30965">columns</st>`<st c="30972">.
    This element is used to create a grid system to lay out content in columns.</st>
    <st c="31050">This is a common approach to creating responsive layouts, where
    the number of columns</st> <st c="31136">may vary depending on the screen size
    or device being used.</st> <st c="31196">The columns in this case will contain
    the different payment plan options that the user can select from, each with its
    own set of features</st> <st c="31334">and pricing.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31346">Now, inside the</st> `<st c="31363">columns</st>` `<st c="31370"><div></st>`
    <st c="31376">element, we can create three columns that represent the three payment
    plans</st> <st c="31453">mentioned earlier:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31471">You can find the complete</st> `<st c="31498">payments.html</st>`
    <st c="31511">file</st> <st c="31517">at</st> [<st c="31520">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter04%20CodeBugFixer/templates/payment.html</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter04%20CodeBugFixer/templates/payment.html)<st
    c="31654">:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: <st c="32440">Important note</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="32455">Ensure that you replace the</st> `<st c="32484">"<YOUR_PUBLIC_KEY>"</st>`
    <st c="32503">tag with the public key obtained from your</st> <st c="32547">Stripe
    account.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="32562">The first</st> `<st c="32573"><div></st>` <st c="32578">element
    with a</st> `<st c="32594">column</st>` <st c="32600">class is responsible for
    creating a card-like element that</st> <st c="32660">presents information about
    the monthly plan offered to the user.</st> <st c="32725">The card contains information
    about the name of the plan, the subscription fee, and what the user can expect
    from</st> <st c="32839">this plan.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="32849">The</st> `<st c="32854"><div></st>` <st c="32859">element with
    a</st> `<st c="32875">card</st>` <st c="32879">class is used to create the card
    that presents information about the monthly subscription plan.</st> <st c="32976">Inside
    the card, the card content is defined with the</st> `<st c="33030">card-content</st>`
    <st c="33042">class.</st> <st c="33050">The card content consists of three paragraphs,
    the first containing the title of the plan,</st> `<st c="33141">Monthly Plan</st>`<st
    c="33153">, the second containing the subscription fee,</st> `<st c="33199">$5
    per month</st>`<st c="33211">, and the third providing a description of the plan,
    which highlights the benefits of subscribing to</st> <st c="33312">the plan.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="33321">Inside the footer, a</st> `<st c="33343">form</st>` <st c="33347">element
    is defined, which is used to submit the subscription request to the server.</st>
    <st c="33432">The form’s action attribute is set to</st> `<st c="33470">/charge</st>`<st
    c="33477">, which indicates that the subscription request will be sent to the</st>
    `<st c="33545">/charge</st>` <st c="33552">route on the server.</st> <st c="33574">We
    will build the</st> `<st c="33592">/charge</st>` <st c="33599">page backend function
    later.</st> <st c="33629">This function will ensure that a confirmation is shown
    to the users once a payment plan has</st> <st c="33721">been purchased.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="33736">The form contains two hidden input fields used to send the plan’s
    name and value.</st> <st c="33819">In this case, the plan’s name is set to</st>
    `<st c="33859">monthly</st>`<st c="33866">, while the amount attribute has a value
    set to</st> `<st c="33914">500</st>`<st c="33917">, which represents the subscription
    amount in cents.</st> <st c="33970">This information will be used to render the</st>
    <st c="34014">confirmation page.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="34032">Finally, a script tag is included inside the form element, which
    loads a Stripe checkout script.</st> <st c="34130">This script is</st> <st c="34145">responsible
    for creating a</st> `<st c="34494">data-locale</st>` <st c="34505">attribute to</st>
    `<st c="34519">auto</st>`<st c="34523">, which ensures that the payment form’s
    language will be automatically set based on the user’s location.</st> <st c="34628">The</st>
    `<st c="34632">data-zip-code</st>` <st c="34645">attribute is set to</st> `<st
    c="34666">false</st>`<st c="34671">, which means that the payment form will not
    require the user to enter their</st> <st c="34748">zip code.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="34757">As you can see in the code snippet, the columns for the quarterly
    and yearly plans are built in the same way as the monthly plan.</st> <st c="34888">The
    only differences are the values for the plan’s name, subtitle, and cost, as well
    as the values for the hidden input fields for the plan and the amount to</st>
    <st c="35046">be charged.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="35057">You can verify that your</st> `<st c="35083">payment.html</st>`
    <st c="35095">page works properly by displaying it in any browser.</st> <st c="35149">You
    can select the HTML file and choose your favorite browser from the</st> **<st
    c="35220">Open with</st>** <st c="35229">options (see</st> *<st c="35243">Figure
    4</st>**<st c="35251">.6</st>*<st c="35253">).</st> <st c="35257">You should then
    see a payment page, similar to the one displayed in</st> *<st c="35325">Figure
    4</st>**<st c="35333">.5</st>*<st c="35335">.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 4.6 – Displaying an HTML in the browser](img/B22414_04_6.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="35488">Figure 4.6 – Displaying an HTML in the browser</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="35534">This is how</st> <st c="35546">you can build a payments page that
    includes a form to collect payment information from users.</st> <st c="35641">We
    styled the payments page using the Bulma CSS framework, and the payment processing
    is handled using jQuery and the Stripe API.</st> <st c="35771">The page is divided
    into three columns, each displaying a different payment plan option, and the payment
    form is in the footer of each card.</st> <st c="35912">The Stripe API is used
    to generate a payment button that collects payment information and initiates</st>
    <st c="36012">payment processing.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="36031">In the next section, you will learn how to create a charge function
    in your application that handles user payments, using the Stripe API, and returns
    a payment</st> <st c="36192">confirmation page.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="36210">Confirming user payments</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="36235">In the</st> <st c="36243">previous section, you learned that when
    a user chooses to buy a payment plan to access your application, we will promptly
    trigger the</st> `<st c="36377">/charge</st>` <st c="36384">page and furnish it
    with the name of the selected plan, as well as the corresponding payment amount</st>
    <st c="36485">in cents.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="36494">We can build the</st> `<st c="36512">charge()</st>` <st c="36520">function
    in our</st> `<st c="36537">app.py</st>` <st c="36543">file under the</st> `<st
    c="36559">index()</st>` <st c="36566">function.</st> <st c="36577">This function
    is part of the Code Bug Fixer web application and handles the</st> `<st c="36653">charge</st>`
    <st c="36659">process when a user selects a pricing plan and submits their payment
    information.</st> <st c="36742">The function is triggered when the user clicks
    the</st> `<st c="36845">payment.html</st>`<st c="36857">:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
