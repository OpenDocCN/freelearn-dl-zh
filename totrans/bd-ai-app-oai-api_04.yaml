- en: <st c="0">4</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Integrating the Code Bug-Fixing Application with a Payment Service</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="68">In this chapter, we will explore how to integrate a payment service
    into your ChatGPT Code Bug Fixer application</st> <st c="182">using the</st> **<st
    c="192">Stripe</st>** <st c="198">API.</st> <st c="204">This will allow you to
    keep track of the number of visits a user performs on your ChatGPT application
    and implement a payment mechanism for premium features or content.</st> <st c="373">You
    will also learn how to use a basic database in your ChatGPT project, which is
    necessary to track user data</st> <st c="484">and transactions.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="501">First, we will introduce Stripe and show you how to set up an account
    and API key.</st> <st c="585">We will then go through the steps of creating a
    SQL user database that will be used to store user data and transaction histories.</st>
    <st c="715">Finally, we will guide you through the process of adding payment functionality
    to your ChatGPT application using the Stripe API, including creating a checkout
    process, handling payment webhooks, and updating</st> <st c="923">a database.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="934">In this chapter, we will learn how to do</st> <st c="976">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="990">Setting up a SQL</st> <st c="1008">user database</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1021">Adding payments to a</st> <st c="1043">ChatGPT application</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1062">By the end of this chapter, you will have the necessary knowledge
    and tools to add payment services to your ChatGPT application and build a successful</st>
    <st c="1214">online business.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1230">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="1253">The technical requirements for this project are</st> <st c="1302">as
    follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1313">Python 3.7 or later installed on</st> <st c="1347">your machine</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1359">A code editor, such as</st> <st c="1383">VSCode (recommended)</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1403">A Python</st> <st c="1413">virtual environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1432">An OpenAI</st> <st c="1443">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1450">A Stripe account and</st> <st c="1472">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1479">In the next section, you will learn how to integrate payments with
    Stripe.</st> <st c="1555">You will see how to create a Stripe account, obtain
    the necessary API keys, and set up the Stripe API for use in</st> <st c="1668">your
    application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1685">The code examples from this chapter can be found on GitHub</st>
    <st c="1745">at</st> [<st c="1748">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-APIs</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-APIs)<st
    c="1825">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1826">Introducing and integrating payments with Stripe</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**<st c="1875">Stripe</st>** <st c="1882">is a</st> <st c="1887">popular payment
    gateway that provides an easy way to accept payments online.</st> <st c="1965">It
    allows businesses and individuals to accept payments over the internet, manage
    subscriptions, and track revenue all in one place.</st> <st c="2098">Stripe has
    an easy-to-use API that allows</st> <st c="2140">developers to integrate payment
    functionality into their websites and applications.</st> <st c="2224">We will
    begin by creating a Stripe account</st> <st c="2267">and configuring the Stripe
    API keys that we will use to authenticate our requests to the Stripe API.</st>
    <st c="2368">Here, you will use the Stripe API to create a payment form and process
    payments securely in your Python code.</st> <st c="2478">Other services similar
    to Stripe include PayPal, Square,</st> <st c="2535">and Braintree.</st>'
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2549">The first step toward accepting</st> <st c="2582">payments in your</st>
    **<st c="2599">Code Bug Fixer</st>** <st c="2613">application is to create a Stripe
    account.</st> <st c="2657">Stripe is a popular payment processing platform that
    enables businesses to accept payments online.</st> <st c="2756">By setting up
    a Stripe account, you can integrate it with your ChatGPT application and start
    accepting payments from your users.</st> <st c="2885">Setting up a Stripe account
    is easy and straightforward, and we will guide you through</st> <st c="2972">all
    steps.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2982">To get started with Stripe, you need to create an account.</st>
    <st c="3042">Follow these steps to create a new</st> <st c="3077">Stripe account:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3092">Go to the Stripe</st> <st c="3110">website:</st> [<st c="3119">https://stripe.com/</st>](https://stripe.com/)<st
    c="3138">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3139">Click the</st> **<st c="3150">Sign in</st>** <st c="3157">button
    in the top-right corner of</st> <st c="3192">the page.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3201">Click the</st> **<st c="3212">Create</st>** **<st c="3219">account</st>**
    <st c="3226">button.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3234">Fill out the registration form with your personal or business information.</st>
    <st c="3310">You’ll need to provide your name, email address, and password (see</st>
    *<st c="3377">Figure 4</st>**<st c="3385">.1</st>*<st c="3387">).</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3390">Confirm your email address by clicking the link in the verification
    email that Stripe</st> <st c="3477">sends you.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3487">Provide your</st> <st c="3501">business details, such as your</st>
    <st c="3532">business name, address, and tax ID</st> <st c="3567">number (optional).</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="3585">Set up your payment settings.</st> <st c="3616">You can choose
    to accept payments from all major credit cards and debit cards, as well as digital
    wallets such as Apple Pay and Google</st> <st c="3751">Pay (optional).</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.1 – The Stripe registration form](img/B22414_04_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="4252">Figure 4.1 – The Stripe registration form</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4293">Once you’ve created your Stripe account, you can start accepting
    payments from your customers.</st> <st c="4389">You can also use Stripe’s Dashboard,
    as shown in</st> *<st c="4438">Figure 4</st>**<st c="4446">.2</st>*<st c="4448">,
    to manage your transactions, issue refunds, and view reports on your payment activity.</st>
    <st c="4537">Stripe charges a fee for each transaction processed through its platform,
    but the fees are competitive</st> <st c="4640">and transparent.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.2 – The Stripe Dashboard](img/B22414_04_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="4896">Figure 4.2 – The Stripe Dashboard</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4929">Next, you need</st> <st c="4945">to obtain access to your Stripe
    API keys, which will be used later in your application to facilitate payment processing.</st>
    <st c="5066">From</st> <st c="5071">the Dashboard, click on the</st> **<st c="5099">Developers</st>**
    <st c="5109">tab on the left-hand side of the screen, and then click on</st> **<st
    c="5169">API keys</st>**<st c="5177">. On this page, you will see your live and
    test API keys, along with the option to reveal each key’s secret.</st> <st c="5286">Make
    sure to copy and securely store your keys, as you will need them to make API requests
    to Stripe from your</st> <st c="5397">ChatGPT application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5417">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5432">Your live API keys should be kept private and not shared publicly,
    as they provide access to your Stripe</st> <st c="5538">account’s sensitive data
    and allow users to make changes.</st> <st c="5596">Instead, you can use your</st>
    **<st c="5622">test API keys</st>** <st c="5635">for development and</st> <st
    c="5656">testing purposes.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5673">Stripe provides three types of API keys –</st> **<st c="5716">publishable
    keys</st>**<st c="5732">,</st> **<st c="5734">secret keys</st>**<st c="5745">,
    and</st> **<st c="5751">test keys</st>**<st c="5760">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5762">The</st> **<st c="5766">publishable key</st>** <st c="5781">is
    used on the client side to make requests to Stripe securely.</st> <st c="5846">It
    does</st> <st c="5854">not have any access to your account and can be shared publicly.</st>
    <st c="5918">This key is normally placed in the</st> <st c="5953">application
    frontend.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="5974">The</st> **<st c="5979">secret key</st>** <st c="5989">is used
    on the server side to make requests to Stripe and</st> <st c="6048">has full access
    to your account, including the ability to make charges.</st> <st c="6120">It should
    be kept secret and should never be shared publicly.</st> <st c="6182">This key
    is normally placed in the</st> <st c="6217">application backend.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="6237">The</st> **<st c="6242">test key</st>** <st c="6250">is used in</st>
    <st c="6262">testing environments to perform test transactions without charging
    any money.</st> <st c="6340">It works like the secret key but only affects test
    data, and it should not be used</st> <st c="6423">in production.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="6437">On the</st> **<st c="6445">API keys</st>** <st c="6453">page, you
    will see both the</st> **<st c="6482">publishable</st>** <st c="6493">and</st>
    **<st c="6498">test</st>** <st c="6502">API keys.</st> <st c="6513">We will use
    the</st> **<st c="6529">publishable</st>** <st c="6540">key to identify your account
    with Stripe in the frontend of your application, while the</st> **<st c="6629">test</st>**
    <st c="6633">key is used for server-side communication with Stripe.</st> <st c="6689">You
    will need to add the</st> **<st c="6714">publishable</st>** <st c="6725">key to
    the frontend code of your ChatGPT application, and the</st> **<st c="6788">test</st>**
    <st c="6792">key to the</st> <st c="6804">backend code.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6817">This is how you can</st> <st c="6838">integrate payments into a
    website or application using</st> **<st c="6893">Stripe</st>**<st c="6899">, a
    popular payment gateway that provides an effortless way to accept payments online.</st>
    <st c="6986">In this section, to use Stripe, you created a Stripe account and
    obtained the API keys, including the</st> <st c="7088">publishable key and a secret
    key, which</st> <st c="7128">have different access levels and should be</st> <st
    c="7171">kept secure.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7183">In the next section, you will learn about setting up a SQL user
    database for the Code Bug Fixer application.</st> <st c="7293">We will explore
    the different payment models and understand how to design a subscription-based</st>
    <st c="7388">payment plan.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7401">Setting up a SQL user database</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="7432">Prior to</st> <st c="7442">implementing the payment infrastructure
    into your application, it’s essential to determine your business strategy, which
    pertains to how you’ll charge users of your web application.</st> <st c="7624">There
    are several ways to</st> <st c="7650">accomplish this:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="7666">Subscription plan</st>**<st c="7684">: This is a recurring payment
    model that allows users to pay for a service</st> <st c="7760">or product on a
    regular basis, such as monthly or yearly.</st> <st c="7818">It is a common payment
    option for</st> **<st c="7852">Software-as-a-Service</st>** <st c="7873">(</st>**<st
    c="7875">SaaS</st>**<st c="7879">) products</st> <st c="7891">and online publications,
    where users pay for access to the service</st> <st c="7958">or content.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="7969">One-time payment plan</st>**<st c="7991">: Customers</st> <st
    c="8004">make a single payment for a product</st> <st c="8040">or service.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="8051">Usage-based plan</st>**<st c="8068">: Customers</st> <st c="8081">are
    charged based on their usage of a product or service, such as pay-per-view</st>
    <st c="8160">or pay-per-click.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="8177">For our Code Bug Fixer application, we will design a subscription
    model that provides users with three different plans to choose from.</st> <st
    c="8313">Furthermore, to make the user onboarding process smoother, we will include
    a</st> **<st c="8390">free trial</st>** <st c="8400">period that allows users
    to try out the application a certain number of times before committing to a</st>
    <st c="8502">payment plan.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8515">The free trial</st> <st c="8531">period will provide users with
    the opportunity to explore the application’s features and determine whether it
    meets their needs.</st> <st c="8660">During the trial period, users can use the
    application for a specific number of times without any charge.</st> <st c="8766">After
    the trial period, users will be prompted to select a payment plan to continue
    using the application.</st> <st c="8873">This subscription-based approach is beneficial
    to both the users and you as an application owner.</st> <st c="8971">The users
    can select the subscription plan that best fits their budget and usage, while
    you can generate a steady stream of revenue from the</st> <st c="9112">subscription
    fees.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9130">In order to implement the payment mechanism for our application,
    we will need to set up a database to track user visits and usage.</st> <st c="9262">The
    database will need to record two types of information – the</st> **<st c="9326">browser
    ID</st>** <st c="9336">(see</st> *<st c="9342">Table 4.1</st>*<st c="9351">),
    which is unique to each user accessing the application, and the usage counter,
    which keeps track of how many times each user has accessed the application.</st>
    <st c="9510">By tracking this information, we can identify unique users and ensure
    that they have not exceeded their allowed number of free visits before being prompted
    to choose a</st> <st c="9678">subscription plan.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '| **<st c="9696">BROWSER ID</st>** | **<st c="9707">USAGE COUNTER</st>** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="9721">28ec523f092</st> | <st c="9733">3</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="9735">58c9f5702fd</st> | <st c="9746">6</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="9748">c59523926d</st> | <st c="9758">10</st> |'
  prefs: []
  type: TYPE_TB
- en: <st c="9761">Table 4.1 – User data collected in the database</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9809">Now that we</st> <st c="9822">have established a solid business
    plan, we can move forward and delve into the technical details of integrating
    a payment service into our ChatGPT application.</st> <st c="9982">Before we can
    do that, however, we need to initialize a</st> <st c="10038">SQL database.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10051">Initializing a SQL database</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="10079">A SQL database is essential to keep track of the number of visits
    that a user performs on our application, which will in turn enable us to implement
    a payment mechanism using the Stripe API.</st> <st c="10271">By having a database,
    we can easily store and retrieve data related to our users</st> <st c="10352">and
    their interaction with our application, allowing us to manage the payment</st>
    <st c="10430">process seamlessly.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10449">Now, let’s open our Code Bug Fixer application’s</st> `<st c="10499">app.py</st>`
    <st c="10505">file and import all the necessary libraries to access Stripe and
    a</st> <st c="10573">SQL database:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10586">app.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: $ pip install stripe
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: API_KEY = "<YOUR_OPENAI_API_KEY>" <st c="12194">STRIPE_TEST_KEY = "<YOUR_STRIPE_API_TEST_KEY>"</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: client = OpenAI(
  prefs: []
  type: TYPE_NORMAL
- en: api_key=config.API_KEY,
  prefs: []
  type: TYPE_NORMAL
- en: ) <st c="12382">config.py</st> file and then retrieve this key in the <st c="12431">app.py</st>
    file, allowing your application to communicate with the Stripe APIs using the
    specified keys securely.
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12540">The next step is to</st> <st c="12561">add the</st> `<st c="12569">initialize_database()</st>`
    <st c="12590">function just under the API keys in</st> `<st c="12627">app.py</st>`<st
    c="12633">. This function will create a SQLite database and a table of users with
    two columns for</st> `<st c="12721">fingerprint</st>` <st c="12732">and the</st>
    `<st c="12741">usage_counter</st>`<st c="12754">, as shown in</st> *<st c="12768">Table
    4.1</st>*<st c="12777">:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: <st c="12985">The preceding function establishes a connection to a newly created</st>
    `<st c="13053">SQLite</st>` <st c="13059">database named</st> `<st c="13075">app.db</st>`<st
    c="13081">, using the</st> `<st c="13093">sqlite3</st>` <st c="13100">library
    in Python.</st> <st c="13120">Then, it</st> <st c="13129">creates a</st> `<st
    c="13160">c</st>`<st c="13161">, which is used to execute SQL commands and fetch
    results from the database.</st> <st c="13238">The cursor object allows you to
    perform various operations on the database such as creating tables, inserting
    data, and</st> <st c="13358">updating data.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="13372">Then, we use the cursor object to execute a SQL command that creates
    a table named</st> `<st c="13456">users</st>` <st c="13461">in the connected SQLite
    database.</st> <st c="13496">This table has two columns,</st> `<st c="13524">fingerprint,</st>`
    <st c="13536">and</st> `<st c="13541">usage_counter</st>`<st c="13554">; the</st>
    `<st c="13561">fingerprint</st>` <st c="13572">column will hold the user browser
    ID, and</st> `<st c="13615">usage_counter</st>` <st c="13628">will hold the number
    of application usages for a specific user.</st> <st c="13693">The</st> `<st c="13697">primary
    key</st>` <st c="13708">keyword specifies that the</st> `<st c="13736">fingerprint</st>`
    <st c="13747">column is the primary key of</st> <st c="13777">the table.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="13787">Finally, we can</st> `<st c="13804">commit</st>` <st c="13810">the
    changes made to the database by the previous SQL command so that they become permanent,
    and</st> `<st c="13907">close</st>` <st c="13912">the database connection, freeing
    up any resources that were used by</st> <st c="13981">the connection.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="13996">This is how you can initialize a SQL database for the Code Bug
    Fixer application.</st> <st c="14079">Those are all necessary libraries to create
    a SQL database and configure the Stripe test key.</st> <st c="14173">In the next
    step, you will discover the process of obtaining the</st> `<st c="14238">fingerprint</st>`
    <st c="14249">browser, which will aid you in recognizing individual users who
    utilize</st> <st c="14322">your application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14339">Getting a browser fingerprint ID</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14372">In order to track and identify unique users of your web application,
    you need a way to obtain their</st> <st c="14473">browser fingerprint.</st> <st
    c="14494">A browser fingerprint is a unique</st> <st c="14527">identifier generated</st>
    <st c="14549">by the browser based on various parameters, such as browser type,
    screen resolution, and installed fonts.</st> <st c="14655">In this section, we
    will explore how to obtain the browser fingerprint ID</st> <st c="14729">in Python.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14739">It is considered a good practice to have a dedicated Python function
    for each individual task in our application, and generating a browser fingerprint
    is no exception.</st> <st c="14908">Therefore, it is appropriate to create a new
    function called</st> `<st c="14969">get_fingerprint()</st>` <st c="14986">under
    the</st> `<st c="14997">initialize_database()</st>` <st c="15018">function:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="15363">The</st> `<st c="15368">get_fingerprint()</st>` <st c="15385">function
    is a Flask view function that is responsible for generating, in most cases, a
    unique browser fingerprint for each user who interacts with the application.</st>
    <st c="15550">A fingerprint is a hash of a string that uniquely identifies a user
    based on their browser type, version,</st> <st c="15656">and platform.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15669">Important note</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15684">The browser fingerprint is not 100% guaranteed to be unique for
    every user, but browser fingerprinting can often generate a relatively unique
    identifier that distinguishes one user from another.</st> <st c="15880">Identifiers
    such as an IP address or device-specific identifiers such as MAC addresses are
    more suitable for</st> <st c="15989">real-world applications.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16013">First, the</st> <st c="16025">function gets the</st> `<st c="16043">user_agent</st>`
    <st c="16053">object from the request object using</st> `<st c="16091">request.user_agent</st>`<st
    c="16109">. This object contains</st> <st c="16132">information about the user’s
    browser, platform,</st> <st c="16180">and version.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16192">Next, the function constructs a string from the browser, version,
    and platform information by concatenating them together, separated by colons (</st>`<st
    c="16337">:</st>`<st c="16339">).</st> <st c="16342">This string is used as the
    input to the</st> `<st c="16382">hashlib.sha256()</st>` <st c="16398">function,
    which generates a hash of the input string using the</st> `<st c="16599">print()</st>`
    <st c="16606">statement so that we can verify the fingerprint in our</st> <st
    c="16662">VSCode logs.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16674">The function returns the generated fingerprint string.</st> <st
    c="16730">We will later store the fingerprint in the SQLite database, along with
    the usage counter for each user, so that the application can keep track of how
    many times a user has accessed the application.</st> <st c="16928">This information
    is used to determine whether the user needs to pay to continue using</st> <st
    c="17014">the application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17030">Now, it is time to cover the final part of our user tracking mechanism
    by getting the number of app utilizations per user in the</st> <st c="17160">next
    section.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17173">Tracking application users</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17200">In this section, we</st> <st c="17221">will delve into the usage
    counter functionality of the application’s backend.</st> <st c="17299">Specifically,
    we will examine the</st> `<st c="17333">get_usage_counter()</st>` <st c="17352">and</st>
    `<st c="17357">update_usage_counter()</st>` <st c="17379">functions, which are
    responsible for retrieving and updating the usage counter associated with a user’s
    browser fingerprint ID.</st> <st c="17508">These functions play a crucial role
    in determining when a user has exceeded their usage limit and should be prompted
    to make a payment to continue using</st> <st c="17661">the application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17677">The</st> `<st c="17682">get_usage_counter()</st>` <st c="17701">function
    is responsible for retrieving the usage counter for a particular browser fingerprint
    from the SQLite database.</st> <st c="17822">The counter keeps track of how many
    times a user with that fingerprint has submitted a</st> <st c="17909">code error:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="18338">The</st> <st c="18342">function takes</st> `<st c="18358">fingerprint</st>`
    <st c="18369">as an argument because it is used to retrieve the usage counter
    for the given browser fingerprint.</st> <st c="18469">The fingerprint serves as
    the unique identifier for each user of the application, and the function looks
    up the usage counter associated with that fingerprint in the database.</st> <st
    c="18645">It creates a connection to the</st> `<st c="18698">app.db</st>` <st
    c="18704">and then creates a cursor object that can execute SQLite commands on</st>
    <st c="18774">the database.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="18787">Then, the</st> `<st c="18798">c.execute()</st>` <st c="18809">command
    creates a new database table called</st> `<st c="18854">users</st>` <st c="18859">with
    two columns named</st> `<st c="18883">fingerprint</st>` <st c="18894">and</st>
    `<st c="18899">usage_counter</st>`<st c="18912">. It only creates the table if
    it doesn’t</st> <st c="18954">already exist.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="18968">The</st> `<st c="18973">result</st>` <st c="18979">executes a
    SQL query to fetch the value of the</st> `<st c="19027">usage_counter</st>` <st
    c="19040">column for the given</st> `<st c="19062">fingerprint</st>` <st c="19073">from
    the</st> `<st c="19083">users</st>` <st c="19088">table.</st> <st c="19096">It
    does so by using parameterized queries and the</st> `<st c="19146">fetchone()</st>`
    <st c="19156">method.</st> <st c="19165">If no record is found for the given fingerprint,
    the result will be set to</st> `<st c="19240">None</st>` <st c="19244">for</st>
    <st c="19249">new users.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19259">Once</st> <st c="19264">the connection with the database is closed,
    the function checks whether the result of the previous database query is</st>
    `<st c="19382">None</st>` <st c="19386">or not.</st> <st c="19395">If it is</st>
    `<st c="19404">None</st>`<st c="19408">, it means there is no record for the provided</st>
    `<st c="19455">fingerprint</st>` <st c="19466">in the</st> `<st c="19474">users</st>`
    <st c="19479">table.</st> <st c="19487">In this case, the function does</st> <st
    c="19519">the following:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19533">Connects to</st> <st c="19546">the database.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19559">Creates a</st> <st c="19570">cursor object.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19584">Inserts a new record for</st> `<st c="19610">fingerprint</st>`
    <st c="19621">with a</st> `<st c="19629">usage_counter</st>` <st c="19642">value</st>
    <st c="19649">of</st> `<st c="19652">0</st>`<st c="19653">.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19654">Commits the changes to</st> <st c="19678">the database.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19691">Closes</st> <st c="19699">the connection.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19714">Returns</st> `<st c="19723">0</st>`<st c="19724">.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="19725">If the result is not</st> `<st c="19747">None</st>`<st c="19751">,
    it means that there is already a record for the provided</st> `<st c="19810">fingerprint</st>`
    <st c="19821">in the</st> `<st c="19829">users</st>` <st c="19834">table.</st>
    <st c="19842">In this case, the function returns the value of the</st> `<st c="19894">usage_counter</st>`
    <st c="19907">column of the record.</st> <st c="19930">In essence, this function
    aims to either return the value of</st> `<st c="19991">0</st>` <st c="19992">for
    new users or the count of usages for those already in</st> <st c="20051">the database.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="20064">The</st> `<st c="20069">update_usage_counter()</st>` <st c="20091">function,
    on the other side, is responsible for updating the usage counter in the database
    for a given browser fingerprint.</st> <st c="20216">The function takes two arguments
    – the browser fingerprint and the updated usage</st> <st c="20297">counter value:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <st c="20542">Once connected</st> <st c="20558">to the database and an edition
    cursor has been created, the function is responsible for updating the usage counter
    after every use of our Code Bug Fixer app.</st> <st c="20716">It uses the</st>
    `<st c="20728">execute</st>` <st c="20735">method of the cursor object to execute
    a SQL statement that updates the</st> `<st c="20808">usage_counter</st>` <st c="20821">field
    for the user with the</st> <st c="20850">provided</st> `<st c="20859">fingerprint</st>`<st
    c="20870">.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="20871">The SQL statement uses</st> `<st c="20895">placeholders ?</st>`
    <st c="20909">to indicate where the values of</st> `<st c="20942">usage_counter</st>`
    <st c="20955">and</st> `<st c="20960">fingerprint</st>` <st c="20971">should be
    inserted.</st> <st c="20992">The values to be inserted are passed as a list in
    the second argument of</st> `<st c="21065">execute()</st>` <st c="21074">in the
    order they appear in the SQL statement.</st> <st c="21122">The</st> `<st c="21126">WHERE</st>`
    <st c="21131">clause ensures that the update is only applied to the row matching
    the</st> <st c="21203">specified</st> `<st c="21213">fingerprint</st>`<st c="21224">.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="21225">To sum up, the</st> `<st c="21241">get_usage_counter()</st>` <st
    c="21260">function retrieves the usage counter for a user’s browser fingerprint
    ID from the SQLite database, while the</st> `<st c="21370">update_usage_counter()</st>`
    <st c="21392">function updates the usage counter value in the database for a given
    fingerprint after every use of the Code Bug Fixer app.</st> <st c="21517">These
    functions are crucial to determine when a user has exceeded their usage limit
    and should be prompted to make a payment to continue using the application.</st>
    <st c="21677">We can now implement all the functions we have created so far into
    our Code Bug Fixer application</st> `<st c="21775">index()</st>` <st c="21782">page.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="21788">Implementing the usage counters</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="21820">In this section, we</st> <st c="21841">will integrate all the
    functions that we created earlier into the</st> `<st c="21907">index()</st>` <st
    c="21914">page of our Code Bug Fixer application.</st> <st c="21955">By doing
    so, we will be able to keep track of the number of times a user has submitted
    a code error and whether they have reached the limit of three submissions, thus
    requiring them to pay to continue.</st> <st c="22157">Additionally, we will be
    able to associate each submission with a unique browser fingerprint to prevent
    users from submitting multiple errors using</st> <st c="22305">different aliases:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: <st c="22478">The preceding code</st> <st c="22498">snippet performs three essential
    tasks.</st> <st c="22538">Firstly, it initializes the database, then it retrieves
    the user’s browser fingerprint and fetches their current usage counter from the
    database.</st> <st c="22684">The database table for users will be created if it
    does not already exist.</st> <st c="22759">The fingerprint variable uniquely identifies
    the user and allows us to track their</st> <st c="22842">usage counter.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="22856">After our initialization is completed, we need to set a rule that
    will pass the control to the payment page if the usage counter is higher than
    a</st> <st c="23003">specific number:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'fixed_code_prompt = (f"Fix this code: \n\n{code}\n\nError:\n\n{error}." f"
    \n Respond only with the fixed code.")'
  prefs: []
  type: TYPE_NORMAL
- en: fixed_code_completions = client.chat.completions.create(
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: model=model_engine,
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: messages=[
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '{"role": "user", "content": f"{fixed_code_prompt}"},'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '],'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: max_tokens=1024,
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: n=1,
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: stop=None,
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: temperature=0.2,
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: )
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: fixed_code = fixed_code_completions.choices[0].message.content <st c="24289">usage_counter
    += 1</st>
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="24307">print(usage_counter)</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24502">usage_counter</st> variable by one, which means that the user
    has used the service one more time. After that, we will update the <st c="24626">usage_counter</st>
    value in the database for the user, identified by their browser fingerprint. This
    ensures that the usage counter is persistent across user sessions and reflects
    the total number of times the user has used the service. We also add a <st c="24872">print()</st>
    statement so that we can verify the counter increment in our logs.
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24946">You can now run the Code Bug Fixer application to verify that
    your usage tracking method works successfully.</st> <st c="25056">Once the Code
    Bug Fixer is up and running, you can place a sample buggy code and an error into
    the relevant fields, and then click the</st> **<st c="25191">Code Fix</st>** <st
    c="25199">button.</st> <st c="25208">Perform that operation twice so that your
    usage counter can increment twice.</st> <st c="25285">Once you get the response
    for ChatGPT API and the</st> **<st c="25335">Fixed Code</st>** <st c="25345">and</st>
    **<st c="25350">Explanation</st>** <st c="25361">fields in your Code Bug Fixer
    are populated, you can go back to the</st> **<st c="25430">Terminal</st>** <st
    c="25438">window and verify that your fingerprint and usage counter are displayed
    (see</st> *<st c="25516">Figure 4</st>**<st c="25524">.3</st>*<st c="25526">).</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 4.3 – The browser fingerprint and usage counter logging](img/B22414_04_3.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="26060">Figure 4.3 – The browser fingerprint and usage counter logging</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '`<st c="26122">3ae64fc…</st>` <st c="26131">is your specific browser fingerprint,
    while the number represents the number of times you currently used the application.</st>
    <st c="26254">Since you performed two requests to the ChatGPT API, the counter</st>
    <st c="26319">incremented twice.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26337">To confirm the creation of a new database, you can check for a
    file named</st> `<st c="26412">app.db</st>` <st c="26418">in your project directory
    (see</st> *<st c="26450">Figure 4</st>**<st c="26458">.4</st>*<st c="26460">).</st>
    <st c="26464">This file is where all user data will be stored and will persist
    even if you shut down and restart</st> <st c="26563">the application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 4.4 – The database display](img/B22414_04_4.jpg)'
