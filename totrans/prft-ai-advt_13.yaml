- en: 'Table 10.2: Comparison of popular no-code platforms'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 表10.2：流行无代码平台的比较
- en: While tools such as Zapier, Make, and n8n started as general-purpose automation
    platforms, they’ve increasingly embraced AI integrations to stay relevant. These
    platforms now support everything from basic LLM actions to more intelligent, AI-powered
    workflows.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 当Zapier、Make和n8n等工具最初作为通用自动化平台起步时，它们越来越多地拥抱人工智能集成以保持相关性。这些平台现在支持从基本的LLM操作到更智能的人工智能驱动的工作流程。
- en: But there’s another class of tools - those that were built with AI as the foundation,
    not as an enhancement.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有另一类工具——那些以人工智能为基础构建，而不是作为增强的工具。
- en: 'These are **AI developer platforms**, built from the ground up to develop,
    deploy, and run AI-powered workflows, applications, and agents (to which we’ll
    get in a bit). Every major cloud provider has a version of these AI platforms.
    As an example, here’s a quick look at Microsoft’s Azure offerings, which are a
    popular choice for businesses that are already invested in the Microsoft ecosystem:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是**人工智能开发平台**，从头开始构建、部署和运行人工智能驱动的流程、应用程序和代理（我们稍后会讨论）。每个主要的云服务提供商都有自己的这些人工智能平台版本。以微软的Azure产品为例，它是那些已经在微软生态系统中投入的企业的一个受欢迎的选择：
- en: '**Azure AI Foundry**([https://ai.azure.com/](https://ai.azure.com/)): A central
    hub that allows you to build GenAI-powered apps such as custom copilots or customer-facing
    chatbots in one place.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI Foundry**([https://ai.azure.com/](https://ai.azure.com/))：一个中心枢纽，让您可以在一个地方构建由通用人工智能（GenAI）驱动的应用程序，例如定制的共飞行员或面向客户的聊天机器人。'
- en: '**Azure Machine Learning Studio**([https://azure.microsoft.com/en-us/products/machine-learning](https://azure.microsoft.com/en-us/products/machine-learning)):
    Focuses more on classical ML and AutoML workflows - think churn prediction, demand
    forecasting, or regression modeling.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure Machine Learning Studio**([https://azure.microsoft.com/en-us/products/machine-learning](https://azure.microsoft.com/en-us/products/machine-learning))：更专注于传统的机器学习和AutoML工作流程——例如客户流失预测、需求预测或回归建模。'
- en: '**Other cloud providers** offer similar AI suites, such as Vertex AI ([https://cloud.google.com/vertex-ai](https://cloud.google.com/vertex-ai))
    on Google Cloud and SageMaker ([https://aws.amazon.com/sagemaker](https://aws.amazon.com/sagemaker)/)
    on AWS.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**其他云服务提供商**提供类似的AI套件，例如Google Cloud上的Vertex AI ([https://cloud.google.com/vertex-ai](https://cloud.google.com/vertex-ai))
    和AWS上的SageMaker ([https://aws.amazon.com/sagemaker](https://aws.amazon.com/sagemaker)/)。'
- en: 'Outside of major cloud providers, there’s also a growing ecosystem of lightweight,
    SaaS-friendly GenAI platforms targeting specific domains or use cases. A few worth
    noting are:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在主要云服务提供商之外，还有越来越多的轻量级、SaaS友好的通用人工智能平台，针对特定的领域或用例。以下是一些值得注意的平台：
- en: '**Chatbase** ([https://www.chatbase.co/](https://www.chatbase.co/)): Lets you
    turn documents or websites into chatbot interfaces in minutes. Especially useful
    for onboarding bots, internal helpdesks, or searchable knowledge bases.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Chatbase** ([https://www.chatbase.co/](https://www.chatbase.co/))：让您能在几分钟内将文档或网站转换为聊天机器人界面。特别适用于机器人入职、内部帮助台或可搜索的知识库。'
- en: '**Harvey AI** ([https://www.harvey.ai/](https://www.harvey.ai/)):AI platform
    specialized in use cases around legal documents and contract work. Comes with
    an integrated workflow builder.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Harvey AI** ([https://www.harvey.ai/](https://www.harvey.ai/))：专注于法律文件和合同工作用例的人工智能平台。附带集成的流程构建器。'
- en: '**Synthesia** ([https://www.synthesia.io/](https://www.synthesia.io/)): Uses
    GenAI to generate avatar-based videos from text input. Widely used for automating
    video content for training, onboarding, or marketing.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Synthesia** ([https://www.synthesia.io/](https://www.synthesia.io/))：使用通用人工智能从文本输入生成基于头像的视频。广泛用于自动化培训、入职或营销的视频内容。'
- en: 'Think of it this way: If Zapier and n8n are automation platforms that have
    added AI, tools such as Azure AI Foundry are AI platforms that have added automation.
    SaaS tools such as Chatbase and Harvey have pre-built a lot of things for you,
    given a certain use case, and allow for (often limited) customization.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这样想：如果Zapier和n8n是添加了人工智能的自动化平台，那么像Azure AI Foundry这样的工具则是添加了自动化的人工智能平台。SaaS工具如Chatbase和Harvey已经为您预先构建了许多东西，针对特定的用例，并允许（通常是有限的）定制。
- en: 'Which one you choose depends on your team’s technical depth, infrastructure
    needs, and broader goals. But they all point in the same direction: the shift
    from *AI as a helper* to *AI as the system*. Still, these tools usually don’t
    hook deeply into your IT systems right away. You can often start with just a file
    upload or a webhook, and build out integrations as you go.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 您选择哪个取决于您团队的技术深度、基础设施需求以及更广泛的目标。但它们都指向同一个方向：从*人工智能作为助手*到*人工智能作为系统*的转变。然而，这些工具通常不会立即深入到您的IT系统中。您通常可以从文件上传或webhook开始，随着项目的进行逐步构建集成。
- en: 'My recommendation is to pick one platform that lets you quickly test (and potentially
    scale) use cases that were discovered and validated in an assistant form. Whether
    this means bringing in a no-code workflow builder such as n8n, extending an existing
    Zapier license you already have, or giving your developers access to an AI platform
    such as AI Foundry really depends on your organization. The possibility of getting
    quick access to a versatile platform is more important than the tool itself. Another
    benefit of having a central platform is that you can quickly probe how much better
    (or feasible) a custom integration performs over a domain-specific vendor solution
    such as Harvey. In the end, this is another make-or-buy decision. If you’d like
    to dive deeper into that, I wrote an article about AI make or buy here: [https://blog.tobiaszwingmann.com/p/ai-make-vs-buy](https://blog.tobiaszwingmann.com/p/ai-make-vs-buy).'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是选择一个平台，让您能够快速测试（并可能扩展）在助手形式中发现和验证的用例。这可能意味着引入一个无代码的工作流程构建器，如 n8n，扩展您已有的
    Zapier 许可证，或者为您的开发者提供访问 AI 平台，如 AI Foundry 的权限，这完全取决于您的组织。快速访问一个多功能平台的可能性比工具本身更重要。拥有一个中心平台的好处之一是您可以快速测试与特定领域供应商解决方案（如
    Harvey）相比，自定义集成表现得多好（或是否可行）。最终，这又是一个是买还是做的决定。如果您想深入了解这一点，我写了一篇关于 AI 是买还是做的文章：[https://blog.tobiaszwingmann.com/p/ai-make-vs-buy](https://blog.tobiaszwingmann.com/p/ai-make-vs-buy)。
- en: 'So where do these autopilots fit in? You might already be familiar with some
    typical workflow automation use cases: auto-sending emails, routing form data,
    and syncing data between systems. But adding AI into the mix expands the value
    significantly. You can use AI to enhance several tasks, making the automation
    better, cheaper, faster, or just more scalable. Some of them are listed as follows:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这些自动驾驶仪在哪里呢？你可能已经熟悉一些典型的流程自动化用例：自动发送电子邮件、路由表单数据，以及在不同系统之间同步数据。但是，将 AI 加入其中可以显著扩大其价值。您可以使用
    AI 来增强多个任务，使自动化更好、更便宜、更快，或者只是更具可扩展性。以下是一些例子：
- en: '**Customer onboarding**: Parse a new client’s submitted documents, extract
    relevant metadata using an LLM, populate internal systems, and notify the account
    manager.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户入职**：解析新客户提交的文件，使用 LLM 提取相关元数据，填充内部系统，并通知账户经理。'
- en: '**Content repurposing**: Watch a Google Drive folder for new content, extract
    insights with AI, generate LinkedIn posts and summaries, and queue them in Buffer
    or HubSpot.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容再利用**：监控 Google Drive 文件夹中的新内容，使用 AI 提取见解，生成 LinkedIn 帖子和摘要，并在 Buffer 或
    HubSpot 中排队。'
- en: '**Lead scoring and enrichment**: When a lead enters your CRM, enrich it with
    data from LinkedIn, analyze the job title with an LLM, and assign it to the right
    sales pipeline based on keywords.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在客户评分和丰富**：当潜在客户进入您的 CRM 时，使用 LinkedIn 的数据对其进行丰富，使用 LLM 分析职位名称，并根据关键词将其分配到正确的销售流程。'
- en: '**Internal reporting**: Summarize support ticket data weekly and post a plain-English
    trend report in a Slack channel.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部报告**：每周总结支持工单数据，并在 Slack 频道中发布一份简单的趋势报告。'
- en: '**Survey analysis**: Use an LLM to categorize free-form feedback from customer
    surveys and flag urgent issues.'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调查分析**：使用 LLM 对客户调查中的自由格式反馈进行分类，并标记紧急问题。'
- en: A classic autopilot use case is a first-level support chatbot - an AI system
    that automatically handles routine customer questions on your website, acting
    like a smarter, interactive FAQ.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 一个经典的自动驾驶用例是一级支持聊天机器人 - 一个自动处理您网站上常规客户问题的 AI 系统，就像一个更智能、更互动的常见问题解答。
- en: 'There are several ways to build this:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以构建这个：
- en: Use **n8n** to create a custom LLM-powered chatbot that connects to your knowledge
    base and runs via a web UI. This gives you control, but requires manual data prep.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **n8n** 创建一个自定义的由 LLM 驱动的聊天机器人，该机器人连接到您的知识库并通过 Web UI 运行。这给了您控制权，但需要手动准备数据。
- en: '![Figure 10.5: An autopilot-supported chatbot](img/B31200_10_05.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.5：一个由自动驾驶仪支持的聊天机器人](img/B31200_10_05.png)'
- en: 'Figure 10.5: Simple HR chatbot autopilot built with n8n'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.5：使用 n8n 构建的简单 HR 聊天机器人自动驾驶仪
- en: Use **Azure AI Foundry** to build a custom chat app that connects to enterprise
    data sources and other Microsoft apps.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **Azure AI Foundry** 构建一个自定义聊天应用，该应用连接到企业数据源和其他 Microsoft 应用程序。
- en: Use a vertical platform such as **Chatbase** to spin up a chatbot in minutes
    - just upload a few PDFs or link your help center, and it generates a usable bot
    right away (*Figure 10.6*).
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用垂直平台如 **Chatbase** 在几分钟内启动聊天机器人 - 只需上传一些 PDF 文件或链接您的帮助中心，它就会立即生成一个可用的机器人（*图
    10.6*）。
- en: '![Figure 10.5: An autopilot-supported chatbot](img/B31200_10_06.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.5：一个由自动驾驶仪支持的聊天机器人](img/B31200_10_06.png)'
- en: 'Figure 10.6: An interface for adding files to Chatbase'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.6：用于向Chatbase添加文件的界面
- en: Each approach automates the same task - handling FAQs without human involvement
    - but with different trade-offs between control, speed, and integration.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 每种方法都自动化了相同的任务——处理常见问题，无需人工参与——但在控制、速度和集成之间有不同的权衡。
- en: 'And that’s exactly where autopilots shine: they’re easy to bring in, flexible
    to adapt, and powerful enough to turn one-off wins into always-on systems. Whether
    you start with a drag-and-drop chatbot builder or a fully custom flow, these tools
    make it possible to automate real work without calling IT every time.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 正是自动导航器在这里大放异彩：它们易于引入，灵活适应，强大到足以将一次性胜利转变为始终在线的系统。无论您是从拖放式聊天机器人构建器开始，还是从完全定制的流程开始，这些工具都使得在不每次都调用IT的情况下自动化实际工作成为可能。
- en: Why they work
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么它们有效
- en: 'Autopilots don’t just save time. They change *how* work happens - by turning
    ad hoc manual tasks into scalable, hands-free workflows. Here’s why they stick:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 自动导航器不仅节省时间。它们改变了工作发生的**方式**——通过将临时手动任务转变为可扩展的无手操作工作流程。以下是它们为何能够持续存在的原因：
- en: '**They start small**: Many workflows begin with a single prompt or one-time
    task. With autopilot tools, that initial success can be turned into a repeatable,
    automated flow with minimal effort.'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从小处着手**：许多工作流程都是从单个提示或一次性任务开始的。使用自动导航器工具，这种初始的成功可以转化为只需最小努力即可重复的自动化流程。'
- en: '**They free up headspace**: The magic isn’t just speed - it’s focus. Autopilots
    handle the boring, brittle, or brain-dead tasks so your team can focus on what
    actually matters.'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**释放思维空间**：魔法不仅仅是速度——它是专注。自动导航器处理无聊、脆弱或无脑的任务，这样您的团队能够专注于真正重要的事情。'
- en: '**They create leverage**: Small workflows save minutes. But when they run 50
    times a day across five teams, you start reclaiming days.'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它们创造杠杆作用**：小型工作流程可以节省几分钟。但当它们每天在五个团队中运行50次时，您开始挽回几天的时间。'
- en: '**They scale without scale**: Most tools here are built for business users
    - not just developers - so you don’t need to grow your IT team to grow your automation
    footprint.'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无需规模即可扩展**：这里的大多数工具都是为了商业用户而构建的——不仅仅是开发者——因此，您无需扩大您的IT团队来扩大您的自动化足迹。'
- en: Unlike copilots, which assist and suggest, autopilots act. They don’t wait for
    you to click **Go**; once set up, they’re running, routing, transforming, updating,
    summarizing, or chatting around the clock.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 与协助和提供建议的副驾驶员不同，自动导航器采取行动。它们不会等待您点击**开始**；一旦设置好，它们就会全天候运行、路由、转换、更新、总结或聊天。
- en: 'That’s why it’s smart to start with assistants or copilots first: they help
    you learn where AI adds value, where it breaks, and where automation is safe.
    Once that understanding is in place, autopilots are the logical next step - but
    they require more structure and oversight, because when software starts doing
    things on its own, it’s time to think even more about ownership, accountability,
    and governance.'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么先从助手或副驾驶员开始是明智的：它们帮助您了解AI增加价值的地方，它失败的地方，以及自动化安全的地方。一旦这种理解到位，自动导航器就是合乎逻辑的下一步——但它们需要更多的结构和监督，因为当软件开始自行做事时，就需要更多地考虑所有权、责任和治理。
- en: Organizational considerations
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组织考虑因素
- en: 'Because of their high degree of automation, often triggered by data events
    or system activity, autopilots require more oversight than assistants or Copilots:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它们的自动化程度很高，通常由数据事件或系统活动触发，自动导航器需要比助手或副驾驶员更多的监督：
- en: '**Define automation boundaries**: Not every process benefits from full autonomy.
    For example, routing support tickets to the right team can be safely automated,
    but automatically sending refund approvals without human oversight may expose
    you to financial or compliance risk. A good practice is to categorize processes
    into **safe-to-automate**, **human-in-the-loop**, and **never automate**. Some
    organizations even run **automation reviews** for new workflows, much like a lightweight
    code review.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义自动化边界**：并非每个流程都从完全自主中受益。例如，将支持票务路由到正确的团队可以安全地自动化，但自动发送退款批准而不进行人工监督可能会使您面临财务或合规风险。一种良好的做法是将流程分类为**可安全自动化**、**需要人工介入**和**永不自动化**。一些组织甚至为新工作流程进行**自动化审查**，就像轻量级的代码审查一样。'
- en: '**Audit and logging**: Ensure that automations - especially those that involve
    LLMs - are tracked. You’ll want visibility into what was generated, when, and
    for whom. When workflows run in the background, invisibility can quickly become
    a liability. Imagine an autopilot that categorizes thousands of incoming survey
    responses every week: if the categorization logic drifts or breaks, you may not
    notice until a major decision has already been made on flawed data. Proper audit
    trails - logging which workflow ran, what inputs it received, and what outputs
    were generated - allow you to backtrack and troubleshoot. In regulated industries
    (such as healthcare or finance), these logs may even be mandatory.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计和日志记录**：确保自动化——尤其是涉及LLM的自动化——被跟踪。你希望了解什么被生成、何时生成以及为谁生成。当工作流程在后台运行时，不可见性可能会迅速变成一种负担。想象一下，一个每周对数千份调查回复进行分类的自动驾驶系统：如果分类逻辑出现偏差或损坏，你可能直到基于错误数据做出重大决策时才注意到。适当的审计轨迹——记录哪些工作流程运行了，它接收了什么输入，以及生成了什么输出——允许你回溯和故障排除。在受监管的行业（如医疗保健或金融）中，这些日志甚至可能是强制性的。'
- en: '**Cost control**: Some automations, especially with high-frequency triggers
    or complex AI calls, can easily rack up surprising bills. For instance, a Zapier
    workflow that calls an LLM every time a Slack message is posted in a channel can
    spiral into thousands of calls per week. Consider techniques such as batching
    (e.g., processing messages hourly instead of instantly), caching (storing common
    outputs to avoid repeated API calls), or usage caps (stopping workflows after
    a daily threshold) to keep costs predictable. For workflows with a potentially
    high workload, consider running a cost simulation on a small sample before deploying
    a new automation to estimate its financial footprint.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本控制**：一些自动化，尤其是具有高频触发器或复杂AI调用的自动化，很容易产生令人惊讶的账单。例如，每当在频道中发布Slack消息时，就会调用LLM的Zapier工作流程可能会每周产生数千次调用。考虑批处理（例如，每小时处理消息而不是即时处理）、缓存（存储常见输出以避免重复的API调用）或使用上限（在每日阈值后停止工作流程）等技术，以保持成本可预测。对于可能具有高工作负载的工作流程，在部署新的自动化之前，考虑在小型样本上运行成本模拟，以估计其财务影响。'
- en: '**Shadow automation risk**: Just like with *shadow IT*, it’s easy for employees
    to start building unmonitored workflows. While this shows initiative, it also
    creates risk. To balance innovation with governance, you might consider setting
    up a workflow registry where employees log their automations. Others create *automation
    groups* or internal communities of practice where power users share templates,
    get feedback, and avoid reinventing the wheel.'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**影子自动化风险**：就像*影子IT*一样，员工很容易开始构建不受监控的工作流程。虽然这显示了主动性，但也创造了风险。为了在创新与治理之间取得平衡，你可能会考虑建立一个工作流程注册表，让员工记录他们的自动化。其他人创建了*自动化小组*或内部实践社区，让高级用户分享模板、获取反馈并避免重复造轮子。'
- en: '**A note of caution**'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项**'
- en: Don’t over-AI your workflows. Just because you *can* use an LLM doesn’t mean
    you should. Many automation steps are better handled by basic logic (e.g., if/then,
    regex, lookup tables). Keep AI for the steps that require judgment, nuance, or
    text transformation.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 不要过度依赖AI来优化工作流程。仅仅因为你可以使用大型语言模型（LLM）并不意味着你应该这样做。许多自动化步骤更适合用基本逻辑（例如，if/then，正则表达式，查找表）来处理。将AI保留在需要判断、细微差别或文本转换的步骤上。
- en: Leadership impact
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领导力影响
- en: Autopilots often emerge from *grassroots innovation* - a power user who wires
    something together on a weekend and shares it with the team. But leadership has
    a big opportunity to take those bottom-up breakthroughs and systematize them.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 自动驾驶系统通常源于*草根创新*——一位高级用户在周末将某些东西连接起来并与团队分享。但领导层有很大的机会将这些自下而上的突破系统化。
- en: 'As a leader, your role is to:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 作为领导者，你的角色是：
- en: '**Spot repeatable wins**: See what one team automates and ask, *Who else could
    use this?*'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发现可重复的胜利**：看看一个团队自动化了什么，然后问，“还有谁可以用到这个？”'
- en: '**Invest in reuse**: Help teams turn individual workflows into shareable templates
    or internal libraries.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资重用**：帮助团队将单个工作流程转化为可共享的模板或内部库。'
- en: '**Support tool access**: Provide licenses for no-code tools such as n8n or
    Make, and empower non-engineering teams to use them safely.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持工具访问**：提供n8n或Make等无代码工具的许可证，并授权非工程团队安全地使用它们。'
- en: '**Create a feedback loop**: Ask teams what is being automated, what’s still
    manual, and what broke last week. This creates a healthy automation culture -
    one where people build, refine, and share.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建反馈循环**：询问团队正在自动化什么，什么仍然是手动操作，以及上周什么出了问题。这创造了一个健康的自动化文化——一个人们构建、改进和分享的文化。'
- en: Most importantly, normalize the automation mindset. When a new process is created,
    ask *Can this be automated?* Not to avoid ownership, but to ensure your smartest
    people aren’t stuck doing robotic work.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，规范化自动化思维模式。当创建一个新流程时，问自己*这个可以自动化吗？*不是为了避免责任，而是确保你最聪明的人不会陷入重复性工作。
- en: And for digital top leadership (CAIOs, CTOs, or ops heads), autopilots offer
    a unique angle on AI enablement. They bridge the gap between strategy and execution
    - letting your org experiment, learn, and optimize without waiting for centralized
    roadmaps or major IT investments.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数字顶级领导（CAIOs、CTOs或运营负责人），自动驾驶仪提供了独特的AI赋能视角。它们在战略和执行之间架起桥梁——让你的组织可以实验、学习和优化，而无需等待集中路线图或重大IT投资。
- en: In fact, some of your highest-ROI AI use cases may not come from LLM research
    or vendor partnerships, but from a clever automation that turns a 20-minute task
    into a 2-second one, every day.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你的一些最高回报率的AI用例可能不是来自LLM研究或供应商合作，而是一个巧妙的自动化，将20分钟的任务变成每天2秒的任务。
- en: 'Next, we’ll step into the final quadrant: agents - where AI not only automates
    work, but begins to decide, adapt, and act across systems on your behalf.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将进入最后一个象限：代理——在这里，AI不仅自动化工作，而且开始代表你决定、适应和行动。
- en: 'AI agents: Autonomous task handling'
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI代理：自主任务处理
- en: 'If autopilots automate tasks, **agents** take it a step further: they decide,
    act, adapt, and even improve over time. This is where AI stops being a passive
    helper and becomes an operational actor.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 如果自动驾驶仪自动化任务，**代理**则更进一步：它们决定、行动、适应，甚至随着时间的推移而改进。这就是AI不再是被动助手，而成为运营行动者的地方。
- en: Agents combine deep system access with autonomous execution. They don’t wait
    for manual instructions. They act - based on goals, data, or triggers - and can
    carry out multi-step workflows across tools, departments, and decisions. They
    don’t assist with work. They run the work.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 代理结合了深度系统访问和自主执行。它们不会等待手动指令。它们根据目标、数据或触发器采取行动，并且可以在工具、部门和决策之间执行多步骤工作流程。它们不协助工作，而是运行工作。
- en: 'You’ve probably seen the early stages of this already:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经看到了这个的早期阶段：
- en: An AI system that summarizes meetings, tags action items, and automatically
    creates Jira tickets in the respective projects.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个AI系统，可以总结会议、标记行动项，并在相应项目中自动创建Jira工单。
- en: A chatbot that not only answers FAQs like the autopilots did, but also authenticates
    users, resets passwords, fetches shipping details, and escalates support tickets.
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个聊天机器人，不仅像自动驾驶仪一样回答常见问题，还能验证用户身份、重置密码、获取运输详情，以及升级支持工单。
- en: A sales agent that researches leads, drafts personalized emails, and updates
    CRM records.
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个销售代理，负责研究潜在客户、撰写个性化的电子邮件，并更新CRM记录。
- en: 'Most agentic AI tools essentially rely on the following four building blocks:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数代理AI工具本质上依赖于以下四个构建块：
- en: '**LLMs** for reasoning and decision-making.'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLMs**用于推理和决策。'
- en: '**Tools or function-calling** frameworks for interaction with real-world systems
    (e.g., OpenAI functions, LangChain).'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具或函数调用**框架，用于与真实世界系统交互（例如，OpenAI函数，LangChain）。'
- en: '**Memory** or task history to access knowledge and stay context-aware across
    steps.'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆**或任务历史记录，以便在步骤之间访问知识和保持上下文感知。'
- en: '**Automation runtimes** to coordinate workflows.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化运行时**用于协调工作流程。'
- en: This makes agents extremely powerful, but also complex. They require careful
    design, testing, monitoring, and often a blend of AI and traditional logic to
    perform reliably. Hence, they’re often not the best place to start, as we discussed
    before.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得代理非常强大，但也非常复杂。它们需要仔细设计、测试、监控，并且通常需要AI和传统逻辑的结合才能可靠地执行。因此，它们通常不是最佳起点，正如我们之前讨论的那样。
- en: '**Agent tooling** isn’t for everyone. But if your team has basic scripting
    skills or technical staff, these tools can help you deploy your own agents. These
    tools are not where most teams begin. But for organizations with technical staff
    or advanced prototypes ready to scale, they offer serious leverage. You can typically
    build AI agents on top of AI no-code tools that you’ve seen under autopilots above.
    In this case, an agent simply becomes a separate node in your workflow.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理工具**并非适合所有人。但如果你的团队具备基本的脚本编写技能或技术人员，这些工具可以帮助你部署自己的代理。这些工具不是大多数团队开始的地方。但对于拥有技术人员或准备扩展的先进原型组织，它们提供了真正的杠杆。你通常可以在上面看到自动驾驶仪的AI无代码工具上构建AI代理。在这种情况下，代理只是你工作流程中的一个单独节点。'
- en: 'Here’s an example from a lead enrichment workflow in **n8n**, where the heavy
    lifting is done by an AI agent node, can use an LLM from OpenAI to control a web
    scraping tool, which adds relevant information to a company, and then stores the
    output in a Google Sheet document:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个来自**n8n**中潜在客户丰富化工作流程的例子，其中由AI代理节点完成繁重的工作，可以使用来自OpenAI的LLM来控制网络爬虫工具，为一家公司添加相关信息，然后将输出存储在Google
    Sheets文档中：
- en: '![Figure 10.7: AI agent in n8n for a lead enrichment use case](img/B31200_10_07.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图10.7：n8n中用于潜在客户丰富化的AI代理](img/B31200_10_07.png)'
- en: 'Figure 10.7: AI agent in n8n for a lead enrichment use case'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.7：n8n中用于潜在客户丰富化的AI代理
- en: As you can see, this workflow looks relatively simple because we don’t have
    to wire up complex rules, such as which website to scrape, and what happens if
    a website is not provided or if no relevant information is found on a website.
    These are all things handled by the agent based on the prompt we gave it.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，这个工作流程看起来相对简单，因为我们不需要连接复杂的规则，比如要抓取哪个网站，如果网站没有提供或者网站上没有找到相关信息会发生什么。这些都是代理根据我们给出的提示来处理的事情。
- en: Besides building on top of existing workflow automation tools, another effective
    way to build AI agents is to use agent frameworks that are more targeted to developers,
    such as CrewAI([https://www.crewai.com/](https://www.crewai.com/)) and LangGraph
    ([https://www.langchain.com/langgraph](https://www.langchain.com/langgraph)).
    The benefit of these is that they typically offer more customizability, but they
    often don’t provide the kind of comprehensive routing and automation logic you
    get from tools such as n8n or Zapier, which have over a decade of experience automating
    workflows at scale. That’s why even simple conditional logic or basic things such
    as HTTP requests often have to be coded manually.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在现有的工作流程自动化工具之上构建，另一种构建AI代理的有效方法是使用更针对开发者的代理框架，例如CrewAI([https://www.crewai.com/](https://www.crewai.com/))和LangGraph
    ([https://www.langchain.com/langgraph](https://www.langchain.com/langgraph))。这些框架的优点是它们通常提供更多的可定制性，但它们通常不提供像n8n或Zapier这样的工具所提供的全面路由和自动化逻辑，这些工具在规模自动化工作流程方面拥有超过十年的经验。这就是为什么即使是简单的条件逻辑或基本事物，如HTTP请求，通常也必须手动编码。
- en: '**Agentic frameworks** like these shine in situations where you need to run
    multiple agents in parallel - for example, a multi-agent system where one *agent*
    does research, another generates a summary, and a third QA-checks the result before
    publishing. Ultimately, figuring out which parts work better as static automation
    and which ones should be handled by an agent is part of the learning journey,
    and usually involves a lot of trial and error.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理框架**如这些在需要并行运行多个代理的情况下特别出色——例如，一个多代理系统，其中一个*代理*进行研究，另一个生成摘要，第三个在发布前进行QA检查结果。最终，确定哪些部分更适合作为静态自动化，哪些应该由代理处理，这是学习旅程的一部分，通常涉及大量的试错。'
- en: When they work
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当它们工作时
- en: 'In this quadrant, the right question isn’t *Why do they work?* The value is
    obvious. If you can run entire workflows that figure out the steps, choose the
    tools, execute them, adapt on the fly without human involvement, and do it at
    near-zero marginal cost, the upside speaks for itself. It’s the operational dream:
    scale without scale. Automation that adapts. Work that happens while your team
    sleeps.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个象限中，真正的问题不是*他们为什么能工作*？其价值显而易见。如果你能够运行整个工作流程，确定步骤，选择工具，执行它们，无需人工干预即可即时适应，并且几乎零边际成本地完成，那么其优势不言而喻。这是运营的梦想：无需规模扩张，但实现自动化。在团队休息时也能进行的工作。
- en: 'No, the real question is: **when** do agents actually work?'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 不，真正的问题是：代理实际上是在什么时候工作的？
- en: In practice, agents are hard to crack. They’re more sensitive to workflow messiness,
    edge cases, permissions, context ambiguity, and tool access than any other class
    of AI system in this book.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，代理很难破解。它们比本书中任何其他类别的AI系统对工作流程的混乱、边缘情况、权限、上下文模糊性和工具访问性更敏感。
- en: 'Unlike Copilots, which live neatly inside productivity tools, or autopilots,
    which follow clean **if-this-then-that** flows, agents must navigate dynamic environments
    and make real-time decisions - often with incomplete or inconsistent information.
    That level of autonomy demands more than just good tech. It actually requires
    having all scaling levers in place, which we discussed in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312):'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 与生活在生产力工具内部的Copilots不同，或者与遵循清晰的**if-this-then-that**流程的自动驾驶仪不同，代理必须导航动态环境并做出实时决策——通常是在信息不完整或不一致的情况下。这种程度的自主性需要不仅仅是良好的技术。实际上，它需要所有扩展杠杆都到位，这是我们讨论过的[*第9章*](Chapter_09.xhtml#_idTextAnchor312)：
- en: '**People:** You need owners who take true responsibility for the agentic process,
    even if it spans company silos. Around them, you need a team ready to monitor,
    refine, and improve agents over time (see AIOps below). Treat agents less like
    tools and more like digital colleagues.'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人员方面：** 你需要真正负责代理流程的所有者，即使它跨越了公司壁垒。在他们周围，你需要一个团队，随时准备监控、优化和改进代理（见下文AIOps）。将代理视为数字同事，而不是工具。'
- en: '**Processes:** You can’t plan an agent in a waterfall-style way because you’ll
    never anticipate all the edge cases they’ll hit. Agents will explore unknowns
    by themselves. That means agile delivery - short sprints, fast feedback loops,
    and iteration - so you can adapt quickly when they behave in unintended ways.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程**：你不能以瀑布式的方式规划代理，因为你永远无法预见到它们会遇到的所有边缘情况。代理将自行探索未知领域。这意味着敏捷交付 - 短周期、快速反馈循环和迭代
    - 这样你就可以在它们以未预期的方式表现时快速适应。'
- en: '**Data:** Agents rely on structured, permissioned, and accessible data that
    provides enough context to act reliably. And no, spinning up an MCP server won’t
    fix this. Data maturity comes first; easy connectors come later.'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据**：代理依赖于结构化、授权和可访问的数据，这些数据提供了足够的上下文以可靠地行动。不，启动一个MCP服务器并不能解决这个问题。数据成熟度是首要的；简单的连接器随后才会到来。'
- en: '**Technology:** Provide a safe runtime - APIs, connectors, and sandboxed environments
    - before exposing agents to production systems. Reliability, observability, and
    guardrails are non-negotiable at this point.'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术方面：** 在将代理暴露于生产系统之前，提供安全的运行时环境 - API、连接器和沙箱环境。在这个阶段，可靠性、可观察性和安全措施是不可协商的。'
- en: '**AIOps:** Of all AI solution types, agents require the heaviest monitoring,
    logging, and intervention. If your team has never shipped at least a Copilot or
    autopilot implementation before, you’re likely not ready for agents.'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AIOps**：在所有AI解决方案类型中，代理需要最重的监控、日志记录和干预。如果你的团队之前从未发布过至少一个Copilot或自动驾驶仪实施，那么你可能还没有准备好使用代理。'
- en: Most importantly, you need to resist the temptation to hand your entire business
    process to a digital Swiss Army knife and expect magic.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，你需要抵制将整个业务流程交给数字瑞士军刀并期待奇迹的诱惑。
- en: Most failures happen when teams ask agents to do too much, too soon, in environments
    that aren’t ready. The best agents do one thing well. They’re a capability you
    earn by delivering working AI solutions in easier formats with higher human-in-the-loop
    involvement, such as assistants or Copilots. This will inform you naturally which
    tasks or workflows are ready for more **AI handoff**.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数失败发生在团队要求代理过早、过多地执行任务，而这些环境尚未准备好的情况下。最好的代理擅长一件事。它们是通过以更简单、更高的人类在环参与度（如助手或Copilots）的形式交付工作的AI解决方案而获得的能力。这将自然地告诉你哪些任务或工作流程适合更多的**AI移交**。
- en: And in that context, the *agent tool* itself? Honestly, it’s the easiest part.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，*代理工具*本身？坦白说，这是最容易的部分。
- en: Organizational considerations
  id: totrans-276
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组织考虑因素
- en: Deploying agents isn’t just a technical decision - it’s an organizational shift.
    You’re giving software the authority to act on behalf of your business. That changes
    the dynamics of ownership, oversight, accountability, and trust.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 部署代理不仅仅是技术决策，它是一场组织变革。你正在赋予软件代表你的业务行动的权力。这改变了所有权、监督、问责制和信任的动态。
- en: Unlike assistants or Copilots, which augment human users, agentic systems can
    operate without constant supervision. And that means you need to treat them less
    like tools and more like digital team members. They need policies, scopes, escalation
    paths, and quality assurance.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 与增强人类用户的助手或Copilots不同，代理系统可以在没有持续监督的情况下运行。这意味着你需要将它们视为数字团队成员，而不是工具。它们需要政策、范围、升级路径和质量保证。
- en: 'Here are four critical shifts organizations must make to operationalize agentic
    tools:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是组织必须做出的四个关键转变，以实现代理工具的运营化：
- en: '**Define boundaries**: Not every task should be automated. Not every tool should
    have access to sensitive systems. Teams need clear guidelines on what agents are
    allowed to do - and where human input is non-negotiable. This includes:'
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义边界**：并非每个任务都应该自动化。并非每个工具都应该有权访问敏感系统。团队需要明确的指导方针，了解代理被允许做什么 - 以及人类输入不可协商的地方。这包括：'
- en: Which workflows can be fully automated versus partially agent-led?
  id: totrans-281
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些工作流程可以完全自动化，哪些可以部分由代理领导？
- en: When agents should request human confirmation before proceeding?
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当代理在继续之前应该请求人类确认吗？
- en: What data sources or systems they’re permitted to access or update?
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们被允许访问或更新哪些数据源或系统？
- en: Think of it like access permissions for a new hire. You wouldn’t give an intern
    unrestricted database access on day one. Your agents should be treated with the
    same discipline.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 就像为新员工设置访问权限一样考虑。你不会在第一天就给实习生无限制的数据库访问权限。你的代理应该受到同样的纪律约束。
- en: '**Implement safety nets**: Because agents operate autonomously, they need built-in
    safeguards. These include:'
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**实施安全网**：由于代理是自主运行的，它们需要内置的安全保障。这些包括：'
- en: Rate limits to avoid spamming external systems or overloading APIs.
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制速率以避免垃圾邮件式地轰炸外部系统或过载API。
- en: Guardrails on output quality (e.g., validating generated content against business
    rules).
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对输出质量进行限制（例如，验证生成内容是否符合业务规则）。
- en: Fallback behaviors when something goes wrong (e.g., alerting a human rather
    than retrying indefinitely).
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当出现问题时采取的回退行为（例如，通知人类而不是无限期地重试）。
- en: Isolation environments (sandboxed agent testing before rollout).
  id: totrans-289
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在推广前进行隔离环境（沙盒中的代理测试）。
- en: Ensure that operational procedures are in place to monitor and control the agentic
    solutions in production.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 确保实施操作程序以监控和控制生产中的代理解决方案。
- en: Safety nets give you the confidence to roll out your agents beyond the experimentation
    stage and gain trust from users.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 安全网让你有信心将你的代理从实验阶段推广出去，并赢得用户的信任。
- en: '**Ensure observability**: One of the biggest organizational risks with agents
    is invisibility. If a workflow breaks or behaves unexpectedly, will anyone notice?
    Effective agent adoption requires:'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确保可观察性**：与代理相关的最大组织风险之一是隐形。如果工作流程出现故障或行为异常，有人会注意到吗？有效的代理采用需要：'
- en: Logging and audit trails for every action.
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对每个动作进行记录和审计跟踪。
- en: Version control for agent logic and prompts.
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对代理逻辑和提示进行版本控制。
- en: Dashboards or alerting for runtime errors, decision branches, or *edge cases*.
  id: totrans-295
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于运行时错误、决策分支或*边缘情况*，提供仪表板或警报。
- en: Without observability, you’re not in control - you’re guessing.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 没有可观察性，你就无法掌控——你只是在猜测。
- en: '**Establish ownership**: Here’s the most overlooked piece. Every agent needs
    a human owner. Someone who:'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**建立所有权**：这是最容易被忽视的部分。每个代理都需要一个人类所有者。这个人需要：'
- en: Monitors the system.
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控系统。
- en: Reviews and improves its behavior.
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查并改进其行为。
- en: Decides when to retire, retrain, or escalate.
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决定何时退役、再培训或升级。
- en: 'Without clear ownership, agents become *ghost processes* - nobody knows how
    they work, why they do what they do, or when they were last updated. That’s a
    fast path to risk, failure, or abandonment. Organizations that succeed with agents
    treat them like living systems: they evolve, adapt, and need care.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 没有明确的所有权，代理变成*幽灵进程*——没有人知道它们是如何工作的，为什么它们这样做，或者它们最后一次更新是什么时候。这是快速走向风险、失败或放弃的途径。成功使用代理的组织将它们视为活系统：它们会进化、适应，并需要关怀。
- en: Leadership impact
  id: totrans-302
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领导力影响
- en: For leaders, AI agents are both a powerful opportunity and a real test of your
    digital maturity. Why? Because agents don’t just require a tool rollout. They
    require a true culture shift. You’re asking teams to trust a system that makes
    decisions. You’re introducing AI not just as an enhancer, but as a participant
    in business processes.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 对于领导者来说，AI代理既是强大的机会，也是对你数字成熟度的真正考验。为什么？因为代理不仅需要工具的推广。它们需要真正的文化转变。你要求团队信任一个做出决策的系统。你不仅引入AI作为增强剂，还作为业务流程的参与者。
- en: And that changes everything.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都改变了。
- en: 'Here’s what effective leadership looks like in an agent-driven environment:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理驱动的环境中，有效的领导力看起来是这样的：
- en: '**Set the trust bar**: Teams will mirror your attitude. If you constantly question
    the reliability of agent tools, expect widespread hesitation. If you overhype
    them, expect disappointment. But if you openly explore where agents make sense
    - and where they don’t - you give people a balanced, usable playbook. Trust doesn’t
    start with technology. It starts with leadership behavior.'
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设定信任标准**：团队会反映你的态度。如果你不断质疑代理工具的可靠性，预期会出现广泛的犹豫。如果你过度吹嘘它们，预期会失望。但如果你公开探索代理适用和不适用的地方，你给人们提供了一个平衡、可用的操作手册。信任不是从技术开始的。它始于领导行为。'
- en: '**Normalize iteration over perfection**: No agent system will be perfect out
    of the box. The goal isn’t to build flawless autonomy - it’s to learn what kind
    of autonomy works in your environment. Leaders should create psychological safety
    for teams to test, iterate, and improve agents over time. That means rewarding
    learning velocity, not just delivery speed. Ask, *What did this agent do right?*
    *Where did it struggle?* *What did we learn?* This turns experimentation into
    improvement - and failure into progress.'
  id: totrans-307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将迭代与完美正常化**：没有任何代理系统一开始就是完美的。目标不是构建无瑕疵的自主性 - 而是学习在您的环境中哪种自主性是有效的。领导者应该为团队创造心理安全感，让他们测试、迭代并随着时间的推移改进代理。这意味着奖励学习速度，而不仅仅是交付速度。问自己，*这个代理做对了什么？*
    *它在哪些方面遇到了困难？* *我们学到了什么？* 这将实验转化为改进 - 将失败转化为进步。'
- en: '**Shift your operating model**: Agent adoption changes the rhythm of how work
    gets done. Approvals happen faster. Tasks get delegated to workflows, not people.
    Turnaround time compresses. But if you keep your old processes wrapped around
    these new capabilities, you’ll smother the value. Leaders must reimagine team
    structures and expectations:'
  id: totrans-308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**转变您的运营模式**：代理采用改变了工作完成的节奏。审批更快。任务被委派给工作流程，而不是个人。周转时间缩短。但如果你继续围绕这些新能力保留旧流程，你将扼杀价值。领导者必须重新构想团队结构和期望：'
- en: Can roles be redesigned around higher-value oversight?
  id: totrans-309
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能否围绕更高价值的监督重新设计角色？
- en: Can SLAs change because automation speeds up delivery?
  id: totrans-310
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: SLA会因为自动化加快交付而改变吗？
- en: Should performance metrics shift to reflect agentic workflows?
  id: totrans-311
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能指标应该转向反映代理工作流程吗？
- en: In other words, don’t just plug agents into your org. Organize for them. Ultimately,
    agentic systems are less about fancy AI and more about designing workflows for
    scale, resilience, and autonomy. When your teams no longer think *What can I do
    with this tool?* and start asking, *What can this tool do on behalf of me?*, you’re
    in the agents quadrant.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，不要只是将代理插入到您的组织中。为它们组织起来。最终，代理系统与其说是关于复杂的AI，不如说是关于设计用于规模、弹性和自主性的工作流程。当您的团队不再思考*我能用这个工具做什么？*而是开始问，*这个工具能代表我做什么？*，您就进入了代理领域。
- en: Now that we have explored the different categories of AI tools - from entry-level
    assistants to advanced autonomous agents - it’s time to think about how your organization
    can practically adopt them.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了不同类别的AI工具 - 从入门级助手到高级自主代理 - 是时候考虑您的组织如何实际采用它们了。
- en: Framework for AI tool adoption
  id: totrans-314
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI工具采用框架
- en: 'A natural question when you begin evaluating AI tools and their applications
    for your organization is: **Where should you start?**'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 当您开始评估AI工具及其在您组织中的应用时，一个自然的问题就是：**您应该从哪里开始？**
- en: This section presents a framework that provides a structured path for evaluating
    your current AI tool landscape, identifying opportunities for advancement, and
    embedding AI adoption into your broader tool strategy.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 本节提出一个框架，该框架提供了一个结构化的路径，用于评估您当前的AI工具景观，确定改进的机会，并将AI采用融入您更广泛的工具策略中。
- en: Instead of focusing on abstract maturity labels, this framework grounds your
    **AI tool adoption journey** in concrete stages that directly impact day-to-day
    work.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是关注抽象的成熟度标签，这个框架将您的**AI工具采用之旅**建立在直接影响日常工作的具体阶段上。
- en: 'Let’s explore these stages in detail:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细探讨这些阶段：
- en: '**Diagnose your current state**: Begin with a simple self-assessment across
    the departments or products you’ve examined during your roadmapping process.'
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**诊断您的当前状态**：从您在路线图过程中检查的部门或产品开始，进行简单的自我评估。'
- en: Which tools are we using today - AI assistants, copilots, autopilots, or AI
    agents?
  id: totrans-320
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们今天使用哪些工具 - AI助手、副驾驶、自动驾驶仪或AI代理？
- en: What behaviors or examples back that up?
  id: totrans-321
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有哪些行为或例子支持这一点？
- en: Where are our blind spots?
  id: totrans-322
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的盲点在哪里？
- en: Which tools are required as per the use cases on our roadmap?
  id: totrans-323
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据我们的路线图上的用例，需要哪些工具？
- en: This doesn’t need to be overly formal. A quick workshop, internal poll, or department
    lead sync can surface honest, directional insights. Even covering just 3–5 key
    areas can reveal major gaps and opportunities.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 这不需要过于正式。一个简短的研讨会、内部投票或部门负责人同步可以揭示诚实、有方向的见解。即使只覆盖3-5个关键领域，也可以揭示主要差距和机会。
- en: The goal isn’t perfection; it’s awareness. What matters most is achieving a
    **shared understanding of where you stand** today.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是完美；而是意识。最重要的是实现对您今天所处的位置的**共同理解**。
- en: '**Identify the** **next-level moves**: Once you know where each team is, define
    what moving up **one tool level** would look like:'
  id: totrans-326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别下一级举措**：一旦你知道每个团队的位置，定义提升**一个工具级别**将是什么样子：'
- en: '**From AI assistants to copilots**: For example, a support rep shifts from
    casually using ChatGPT for email drafts to having a copilot embedded in their
    ticketing system, suggesting replies and summaries.'
  id: totrans-327
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从AI助手到副驾驶**：例如，支持代表从随意使用ChatGPT撰写电子邮件草稿转变为在他们的工单系统中嵌入副驾驶，建议回复和摘要。'
- en: '**From copilots to autopilots**: For example, the support team begins automating
    entire workflows, such as AI handling ticket triage and routing without manual
    intervention.'
  id: totrans-328
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从副驾驶到自动驾驶仪**：例如，支持团队开始自动化整个工作流程，如AI处理工单分类和路由，无需人工干预。'
- en: '**From autopilots to AI agents**: For example, rethinking the support model
    entirely so that autonomous AI agents handle common issues end-to-end, escalating
    only the edge cases to human reps.'
  id: totrans-329
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从自动驾驶仪到AI代理**：例如，重新思考支持模型，使自主AI代理从头到尾处理常见问题，仅将边缘案例升级给人类代表。'
- en: 'I recommend framing these moves in terms of behaviors and outcomes and not
    buzzwords. You may start by asking:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议用行为和结果来界定这些举措，而不是用流行语。你可以从以下问题开始：
- en: What process could we automate further?
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能进一步自动化哪些流程？
- en: What decision could we accelerate?
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能加速哪些决策？
- en: What tasks could AI take on directly?
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI可以直接承担哪些任务？
- en: What would the business impact be?
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务的潜在影响是什么？
- en: '**Prioritize with purpose**: Not every team member should advance at once.
    Use the model to prioritize where investment and support will yield the biggest
    impact:'
  id: totrans-335
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**有目的地优先考虑**：并非每个团队成员都应该同时进步。使用该模型来优先考虑投资和支持将产生最大影响的地方：'
- en: Where is demand already emerging (people experimenting, building small prototypes)?
  id: totrans-336
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需求已经在哪里出现（人们进行实验，构建小型原型）？
- en: Where are manual processes creating major bottlenecks?
  id: totrans-337
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些手动流程正在造成重大瓶颈？
- en: Where is leadership most open to change?
  id: totrans-338
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导层最开放于哪些变革？
- en: Focus on 3–4 **pilot** areas for the next phase. Equip them with the right tools,
    track the results, and then scale learnings across other areas. Start with *units
    that already show signs of AI fluency and have high operational impact* (like
    Support or Ops).
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 关注下一阶段的3-4个**试点**领域。为他们配备正确的工具，跟踪结果，然后将学习成果扩展到其他领域。从*已经显示出AI熟练迹象并具有高运营影响*的单位开始（如支持或运营）。
- en: '**Turn it into an ongoing conversation**: This framework isn’t a destination
    - it’s a journey. Use it to:'
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将其转变为持续对话**：这个框架不是一个目的地——它是一段旅程。使用它来：'
- en: Set quarterly AI adoption goals by team
  id: totrans-341
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按团队设定季度AI采用目标
- en: Guide enablement and upskilling initiatives
  id: totrans-342
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指导赋能和技能提升计划
- en: Track cross-functional progress
  id: totrans-343
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪跨职能进展
- en: Celebrate wins (for example, *Marketing just shifted from copilots to autopilots!*)
  id: totrans-344
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 庆祝胜利（例如，*市场营销刚刚从副驾驶转变为自动驾驶仪！*）
- en: Over time, this becomes your shared language for AI maturity.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，这成为你用于AI成熟度的共同语言。
- en: '**Embed in strategic planning**: Finally, link AI adoption directly to your
    business goals. For example:'
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**嵌入战略规划中**：最后，将AI的采用直接与你的业务目标联系起来。例如：'
- en: 'If your goal is to *reduce time-to-hire*, ask: What would moving Recruiting
    from assistants to copilots do for that metric?'
  id: totrans-347
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的目标是**减少招聘时间**，问：将招聘从助手转变为副驾驶对这个指标有什么影响？
- en: 'If the objective is to *improve customer resolution time*, ask: What would
    moving Support from copilots to autopilots unlock?'
  id: totrans-348
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果目标是**提高客户解决时间**，问：将支持从副驾驶转变为自动驾驶仪能解锁什么？
- en: When tool adoption becomes part of how you talk about **business performance**,
    AI is no longer a side project. It becomes a natural driver of competitiveness
    and strategy.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 当工具采用成为你谈论**业务绩效**的一部分时，AI就不再是副项目。它成为竞争力和战略的自然驱动者。
- en: Now that you’ve seen how teams evolve in capability, let’s bring it all together
    with a quick tool reference you can use to support that growth.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经看到团队在能力上的发展，让我们通过一个快速的工具参考来汇总所有内容，您可以使用它来支持这种增长。
- en: 'AI Tool Map: A practical guide'
  id: totrans-351
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI工具地图：一本实用指南
- en: Every day, there’s a new AI tool launching - and every day, another quietly
    disappears.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 每天都有新的AI工具推出——每天都有另一个悄然消失。
- en: Trying to track them all is pointless. But in some situations, a high-level
    view of the landscape helps, especially when you’re guiding experimentation or
    supporting teams with tools they’ll actually use.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试跟踪所有这些是徒劳的。但在某些情况下，对整个格局的高层次了解有帮助，尤其是在你指导实验或支持使用实际工具的团队时。
- en: That’s why I’ve created the AI Tool Map,which you can see in *Figure 10.8* and
    download using this link ([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx));
    this gets updated as the tools evolve. The AI Tool Map groups different AI tools
    by function, shows where they fit in your AI journey, which quadrant of the Integration-Automation
    AI Framework they fit in, highlights real use cases, and flags what to watch out
    for.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我创建了AI工具图，您可以在*图10.8*中查看，并通过此链接下载（[https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx)）；随着工具的发展，这个工具图会不断更新。AI工具图按功能分组不同的AI工具，显示它们在您的AI旅程中的位置，它们在集成-自动化AI框架的哪个象限中，突出实际用例，并标记需要注意的事项。
- en: '![Figure 10.8: AI Tool Map](img/B31200_10_08.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![图10.8：AI工具图](img/B31200_10_08.png)'
- en: 'Figure 10.8: AI Tool Map'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.8：AI工具图
- en: Think of it as your shortcut through the hype, so you can focus on what to use,
    when to use it, and who should own the rollout.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为您穿越炒作的捷径，这样您就可以专注于使用什么，何时使用，以及谁应该负责推广。
- en: The purpose of this section was to show you how to reframe AI adoption from
    a tools-first mindset to an intentional, fluency-first approach. The most successful
    organizations aren’t the ones chasing every new app but the ones building consistent,
    team-level fluency across functions in a way that drives real business impact.
    Using the framework above, you can guide progress and choose tools intentionally,
    one step at a time. The goal isn’t perfection, but visible, shared, and strategic
    movement toward real transformation.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的目的在于向您展示如何将AI采用从以工具为先的思维模式转变为以意图和流畅性为先的方法。最成功的组织并不是那些追逐每一个新应用的组织，而是那些在各个职能中建立一致、团队级别的流畅性，从而推动真正的业务影响。使用上述框架，您可以指导进度并有意地选择工具，一步一个脚印。目标不是完美，而是可见的、共享的、战略性的向真正转型迈进。
- en: Summary
  id: totrans-359
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: You’ve seen the frameworks. You’ve studied the use cases. You’ve built prototypes
    and explored how to scale them.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 您已经看到了框架。您已经研究了用例。您已经构建了原型并探索了如何扩展它们。
- en: But in the end, it’s the tools that turn your AI strategy into tangible business
    results. Not because they’re magical, but because they’re usable. Today**.**
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 但最终，是工具将您的AI战略转化为可衡量的业务成果。不是因为它们是神奇的，而是因为它们是可用的。**今天**。
- en: Some tools - such as ChatGPT and GitHub Copilot - deliver quick, personal wins.
    Others - such as n8n and Azure AI Foundry (or the service ecosystem on Azure)
    - unlock even more scalable automation and system-level transformation.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 一些工具——如ChatGPT和GitHub Copilot——可以带来快速、个人的成功。其他工具——如n8n和Azure AI Foundry（或Azure上的服务生态系统）——则解锁了更多可扩展的自动化和系统级转型。
- en: 'But they all share one thing in common: they only work when placed in the hands
    of people who are empowered to explore, enabled to execute, and equipped to share
    what works.'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 但它们都有一个共同点：只有在被赋予探索、执行和分享成功经验的人手中才能发挥作用。
- en: Whether it’s a marketer using ChatGPT to rewrite an email, a product team wiring
    up an LLM-powered assistant, or your ops lead automating reports in n8n, AI shifts
    from a future concept to a functional lever.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是营销人员使用ChatGPT重写电子邮件，还是产品团队搭建一个由LLM驱动的助手，亦或是你的运维负责人在n8n中自动化报告，AI已经从未来的概念转变为实际的功能杠杆。
- en: The companies that win won’t be the ones with the most tools. They’ll be the
    ones that learned to use a few of them well - early, often, and across the org.
    The real edge isn’t an impressive tech stack. It’s an organization that knows
    how to learn, adapt, and build with AI every day.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 获胜的公司不会是那些拥有最多工具的公司。它们将是那些学会了如何早期、频繁且在整个组织中有效地使用其中一些工具的公司。真正的优势不是令人印象深刻的科技堆栈。而是一个知道如何学习、适应和每天使用AI来构建的组织。
- en: You don’t need a big launch. You just need to start and build your roadmap as
    you go. Because AI transformation doesn’t begin with a keynote.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要一个大型的发布。您只需要开始，并在前进的过程中构建您的路线图。因为AI转型并非从一场主题演讲开始。
- en: It begins with a single prompt, a working workflow, and a team willing to press
    **Run**.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 它始于一个简单的提示，一个工作流程，以及一个愿意按下**运行**按钮的团队。
- en: Thank you for joining me on this journey. I hope this book empowers you to identify
    opportunities, prioritize initiatives, and scale AI across your business - and
    build your **Profitable AI Advantage**.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您与我一同踏上这段旅程。我希望这本书能赋予您识别机会、优先考虑项目以及将AI扩展到您的业务中——并构建您的**盈利AI优势**。
