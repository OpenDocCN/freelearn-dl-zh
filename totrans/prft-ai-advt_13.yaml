- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Leveraging Your AI Toolkit
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You’ve come a long way.
  prefs: []
  type: TYPE_NORMAL
- en: You now understand what modern AI really is. You have identified high-impact
    AI use cases, designed and prioritized them, built working prototypes, and even
    explored how to scale these prototypes across your organization. But there’s still
    one major piece missing - and it’s not more theory. It’s, finally, tools. Not
    the kind of tools that require six-month procurement cycles or cross-functional
    IT alignment, but the kind that teams can start using today to solve real problems,
    test real ideas, and build real value.
  prefs: []
  type: TYPE_NORMAL
- en: In this final chapter, we’ll shift into practical enablement, showing you how
    to bring AI directly into the hands of your employees, teams, and business units.
    Not through massive overhauls or moonshot bets, but through everyday tools that
    are increasingly powerful, surprisingly accessible, and designed to slot into
    your organization’s existing workflows.
  prefs: []
  type: TYPE_NORMAL
- en: 'To make sense of these tools, we’ll use a framework we introduced earlier in
    this book: the **Integration-Automation (IA-AI) Framework** - a practical lens
    for evaluating what an AI tool can do, how it fits into your operations, and what
    kind of ROI you can realistically expect.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Revisiting the Integration-Automation framework
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI assistants: Easy entry tools'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Copilots: Deep integration into workflows'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Autopilots: Business workflow automation tools'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI agents: Autonomous task handling'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Framework for AI tool adoption
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI Tool Map: A practical guide'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Revisiting the Integration-Automation framework
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before we begin, let’s have a quick refresher on the IA-AI framework we discussed
    in [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181). This framework classifies
    AI projects by their levels of system integration and task automation. It defines
    four progressive use case types, in four quadrants, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Assistants** are low-integration, low-automation tools such as ChatGPT -
    perfect for writing, summarizing, ideating, or just experimenting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Copilots** are deeply integrated but still require manual input - think Microsoft
    365 Copilot in Word or Excel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Autopilots** are highly automated but loosely integrated - such as a chatbot
    that works 24/7 without touching internal systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agents** are the most advanced quadrant - they combine high integration and
    high automation to take on full tasks across your business with minimal human
    input.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s take another look at this framework (*Figure 10.1*).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.2: Chat assistant interface (here, Claude)](img/B31200_10_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.1: Integration-Automation Framework'
  prefs: []
  type: TYPE_NORMAL
- en: Each quadrant supports a different phase of the AI journey. The best organizations
    aren’t trying to leap straight into agentic complexity - they’re sequencing tools
    thoughtfully, matching them to real-world maturity, and gradually building capability
    across teams.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will walk you through:'
  prefs: []
  type: TYPE_NORMAL
- en: Which tools to explore (and which ones to ignore)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where each tool fits into your AI enablement roadmap?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What capabilities they unlock, and for whom?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to roll them out without overwhelming your organization?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whether you’re an individual contributor responsible for steering your company’s
    AI efforts, a team lead, or an executive guiding enterprise AI strategy, this
    chapter gives you the **practical blueprint to put AI in motion** - starting with
    the tools your teams can open tomorrow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the first quadrant: assistants.'
  prefs: []
  type: TYPE_NORMAL
- en: 'AI assistants: Easy entry tools'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you want to start building AI capability inside your business, this is the
    quadrant to begin with.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI assistants** are **low-integration**, **low-automation** tools. That means
    they don’t touch your internal systems, and they don’t take autonomous action
    on your behalf. But what they *do* offer is immediate value with almost zero friction.
    These tools are your entry point into building AI literacy across your organization
    - without a single API call or opening an IT ticket for every mini use case.'
  prefs: []
  type: TYPE_NORMAL
- en: There are several tools that fall in this quadrant, such as **ChatGPT (OpenAI,**
    [https://openai.com/](https://openai.com/)**)**, **Claude (Anthropic,** [https://claude.ai](https://claude.ai)**)**,
    and **Poe (Quora’s multi-model chat wrapper,** [https://poe.com/login](https://poe.com/login)**)**.
    Besides the big names, there are plenty of smaller variations that focus on different
    areas, such as **Langdock** ([https://www.langdock.com/](https://www.langdock.com/)),
    which puts a heavy emphasis on data sovereignty and control. Many larger enterprises
    have also started to build their internal version of these tools.
  prefs: []
  type: TYPE_NORMAL
- en: These tools are often built around a simple chat interface, such as the one
    popularized by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 10.2* shows Claude’s chat interface.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.2: Chat assistant interface (here, Claude)](img/B31200_10_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.2: Chat assistant interface (here, Claude)'
  prefs: []
  type: TYPE_NORMAL
- en: You feed the assistants with prompts, and they generate responses. That’s exactly
    why they’re so powerful - they’re *generalists*. They don’t need a fixed integration
    point or a clearly scoped workflow. They’re just there when you need them.
  prefs: []
  type: TYPE_NORMAL
- en: 'These assistants can:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize dense documents in seconds
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rewrite and personalize emails
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Brainstorm headlines, titles, or product names
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Draft job descriptions, briefs, or proposals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extract structured data from messy text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Translate text or adjust tone and complexity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate ideas, outlines, or talking points on demand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are tasks that eat up time, drain energy, and rarely justify a full-blown
    project. But with a capable assistant, you can offload the *mental heavy lifting*
    and move on faster. For individuals across virtually all business functions, this
    is like having a hyper-fast research assistant, writer, analyst, and project collaborator
    all in one tab. For example, a sales manager uses ChatGPT to write first drafts
    of client proposal emails, then runs them through a custom GPT to check tone and
    clarity against company guidelines. A task that would easily have taken considerable
    effort can now be completed in significantly less time - with higher consistency.
  prefs: []
  type: TYPE_NORMAL
- en: Out of the box, these tools don’t connect to your internal systems, which keeps
    the technical barriers to adoption virtually zero. That’s exactly why they’re
    so effective as a first step.
  prefs: []
  type: TYPE_NORMAL
- en: Why they work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The real power of assistants isn’t so much what they do, but what they normalize.
    Assistants are the easiest on-ramp to AI fluency. They do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Encourage experimentation**: There’s no setup or commitment - just ask a
    question and see what happens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create instant productivity wins**: Even a single prompt can save an hour.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Democratize AI use**: No training required. Anyone who can use a search bar
    can use an AI assistant.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Start the habit**: Once people get one win, they keep coming back - and that
    consistency builds momentum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once a few team members start using a general-purpose AI assistant regularly,
    others follow. You’ll notice people:'
  prefs: []
  type: TYPE_NORMAL
- en: Asking colleagues for prompt templates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing output quality between models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating their own internal GPTs or workflows
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sharing wins from saved time or improved drafts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is the beginning of small *AI habits*, where people build their own intuition
    about when to delegate to AI, when to trust it, and when to refine it. It’s the
    foundation of AI fluency.
  prefs: []
  type: TYPE_NORMAL
- en: These tools also spark bottom-up innovation. Unlike top-down software rollouts,
    assistants let curious individuals explore on their own terms. Often, this leads
    to unexpected process improvements or prototype ideas that would never come from
    a strategy deck. Some of the most valuable AI use cases in mature companies started
    not as top-down initiatives, but as a clever workaround one employee created using
    ChatGPT and a shared prompt library. I saw one particularly striking example where
    two editors of a leading German media company started to collect well-working
    prompts for everyday tasks such as improving headlines, creating article summaries,
    or writing preview texts and sharing these with colleagues. The best version of
    these prompts is now used by thousands of editors across the entire organization
    in the form of an **Article AI Too**l that quickly became an everyday companion
    nobody wants to miss anymore. And these assistants aren’t standing still. Especially
    on major platforms such as ChatGPT and Claude, new features are rolling out fast,
    such as Tasks in ChatGPT ([https://help.openai.com/en/articles/10291617-tasks-in-chatgpt](https://help.openai.com/en/articles/10291617-tasks-in-chatgpt)),
    which let you schedule prompts to run automatically (e.g., tracking news mentions
    every morning). Claude, on the other hand, doubled down on shipping lots of connectors
    ([https://www.anthropic.com/news/connectors-directory](https://www.anthropic.com/news/connectors-directory))
    to tools such as Jira, Confluence, or Google Drive, plus a convenient way to add
    custom connectors leveraging their **Model Context Protocol (MCP)**. *Figure 10.3*
    shows Claude’s integration of several tools using its Connectors.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.3: Connectors in Claude for deeper integration](img/B31200_10_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.3: Connectors in Claude for deeper integration'
  prefs: []
  type: TYPE_NORMAL
- en: That means some of the classic limitations of this quadrant - manual copy-paste,
    lack of context, limited integration - are starting to erode. While assistants
    will never fully replace more embedded or automated solutions, they’re quickly
    becoming powerful bridges to them.
  prefs: []
  type: TYPE_NORMAL
- en: Before you roll out AI assistants, you would need to introduce support mechanisms
    and establish rules and guardrails to ensure their safe and effective usage. Let’s
    look at how you can do it.
  prefs: []
  type: TYPE_NORMAL
- en: Organizational considerations for AI assistants integration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While AI assistants are easy to adopt, they still benefit from light governance.
    This includes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Usage guidelines**: Provide a clear *dos and don’ts* list. For example, don’t
    paste sensitive data. Do use it to improve drafts or summarize complex material.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt libraries**: Create templates or example prompts tailored to your
    team (e.g., *Structure this presentation using the Pyramid Principle framework
    for the board meeting*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Curated access**: Some organizations opt to centrally manage logins or licenses
    (e.g., ChatGPT Pro accounts) to track usage and simplify budgeting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lightweight enablement**: Run live demos, short workshops, or office hours.
    Even a short 15-minute video of a use case walkthrough can help to turn unaware
    or skeptical users into curious ones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The key principle here is lightweight. Every employee today has access to ChatGPT
    from their personal phone or browser. The more friction or restrictions you impose
    on internal tools, the more likely employees will default to using their personal
    version - a phenomenon often called **shadow AI**, a term borrowed from *shadow
    IT*, where employees bring their own AI tools without organizational approval
    or governance. And shadow AI is exactly what you want to avoid. Not just for data
    privacy, but because it disconnects usage from organizational learning. You don’t
    just want people using AI, you want to learn *how* they’re using it, and help
    them get better over time. This shifts the cultural conversation from “*Can we
    use AI?*” to “*How could we?*”.
  prefs: []
  type: TYPE_NORMAL
- en: Leadership impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI assistants might start as individual tools, but their broader influence depends
    heavily on how leaders respond.
  prefs: []
  type: TYPE_NORMAL
- en: For department heads and team leads, the goal is less to micromanage usage,
    but to channel it. Encourage teams to share their favorite prompts, highlight
    time saved, or host informal *Prompt Fridays*, where employees demo clever use
    cases. This builds momentum from the bottom up.
  prefs: []
  type: TYPE_NORMAL
- en: 'For executives - especially CAIOs, CDOs, or digital transformation leaders
    - AI assistants are an early opportunity to signal cultural change. Not through
    bold declarations, but through small acts of enablement:'
  prefs: []
  type: TYPE_NORMAL
- en: Sharing a prompt you personally found useful.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Forwarding a document with a note: *Tried summarizing this with Claude - surprisingly
    good*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Asking “*What are you using ChatGPT for these days?*” in team check-ins.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These micro-signals matter. They show that AI isn’t just tolerated, but you’re
    actively inviting employees on the journey. And when leaders treat AI tools as
    an everyday part of work (not just as a moonshot or risk vector), it gives others
    permission to do the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we’ll explore the second quadrant: copilots - AI tools that embed intelligence
    directly into your existing productivity apps.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Copilots: Deep integration into workflows'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Where assistants often live in a browser tab, **copilots** live inside the
    tools you already use all day. They bring a layer of intelligence into familiar
    environments - you’ll find copilots directly inside your docs, sheets, inboxes,
    notebooks, and meetings. That’s what makes them so powerful: they already live
    where the work happens.'
  prefs: []
  type: TYPE_NORMAL
- en: Yet, Copilots are, by definition, rather passive. They suggest, sometimes even
    proactively, but they don’t take action on your behalf (that’s another quadrant
    we’ll get to soon). For copilots, the human is not only in the loop, they’re in
    the driver’s seat.
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ve probably seen a few of these by now:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Microsoft 365 Copilot** writing meeting summaries or rewriting your 500-word
    update into something your boss might actually read.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google Gemini** popping up in Gmail with a “*Help me write…*” button.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GitHub Copilot** suggesting code, commenting it, or catching that one missing
    bracket before you waste 15 minutes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The deep integration allows Copilots to thrive on context. They typically know
    what you’re working on right now:'
  prefs: []
  type: TYPE_NORMAL
- en: In **Excel**, you can say, *Turn this into a waterfall chart*, and it just builds
    it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In **Outlook**, you can highlight an email and prompt, *Tell Jen I prefer option
    2*, and it will know what *option 2* means from a previous email.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In **Docs**, you can add a new line and say, *Wrap up with a conclusion*, and
    the Copilot has read everything before in this document already.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In **PowerPoint**, you can upload a product brief and get a 10-slide deck -
    in your custom **corporate identity** (**CI**).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In **VS Code**, you can say *Call the weather_forecast function here*, and the
    Copilot knows which parameters this function expects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following table gives you a list of popular Copilots, their typical user
    surface, and what value they add:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Suite / Tool** | **Typical Surface** | **What It Adds** |'
  prefs: []
  type: TYPE_TB
- en: '| Microsoft 365 Copilot | Outlook, Word, Excel, PowerPoint, and Teams | Draft
    replies, rewrite paragraphs, build pivot tables, and auto-generate slides |'
  prefs: []
  type: TYPE_TB
- en: '| Copilot Studio/Power Automate | Low-code canvas | Build your own domain-specific
    chat or form bots, and connect to Dataverse or SharePoint |'
  prefs: []
  type: TYPE_TB
- en: '| Google Workspace + Gemini | Gmail, Docs, Sheets, Slides, and Meet | “Help
    me write…” buttons, data-cleaning helpers, slide themes, and call transcripts
    |'
  prefs: []
  type: TYPE_TB
- en: '| GitHub Copilot | VS Code and JetBrains IDEs | Predict next lines, generate
    tests, explain code, and suggest refactors |'
  prefs: []
  type: TYPE_TB
- en: '| Google Colab (Gemini pane) | Jupyter-style notebook | Inline code generation,
    cell explanations, and one-click data-cleaning steps |'
  prefs: []
  type: TYPE_TB
- en: 'Table 10.1: Popular Copilots in comparison'
  prefs: []
  type: TYPE_NORMAL
- en: Together, these tools bring generative AI onto familiar work surfaces without
    forcing users into new environments.
  prefs: []
  type: TYPE_NORMAL
- en: Why they work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Copilots eliminate a lot of the copy-paste work we used to have with assistants
    and enable much more seamless AI-augmented workflows. When used right, copilots
    can be incredibly effective for organizations already using platforms such as
    Microsoft 365 or Google Workspace that offer copilot integrations out of the box.
    This extends existing workflows without requiring any larger behavioral change
    and meets users where they already are, making AI adoption smoother and less intimidating
    than asking people to learn a new platform.
  prefs: []
  type: TYPE_NORMAL
- en: Still, let’s talk expectations, because this is where many teams trip up.
  prefs: []
  type: TYPE_NORMAL
- en: The most common feedback I hear when Copilot rolls out is *Is that it?* People
    often expect something closer to a magic button, not a helpful nudge. And that’s
    fair. For all the bold marketing and splashy demos, most copilot interactions
    are surprisingly… quiet. They don’t rewrite your entire spreadsheet. They won’t
    deliver a final product. What they do is give you a faster starting point, a smarter
    suggestion, or a cleaner draft.
  prefs: []
  type: TYPE_NORMAL
- en: That’s not a letdown - it’s the point. Copilots won’t do the work for you. They’re
    helping you make your work smoother. And once you get used to that, it’s hard
    to go back.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now talk about key considerations that you need to factor in before rolling
    out copilots in your organization.
  prefs: []
  type: TYPE_NORMAL
- en: Organizational considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Despite their convenience, copilots aren’t always plug-and-play. Because they
    touch sensitive systems and live inside core business workflows, they require
    thoughtful rollout and governance:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Licensing and cost expectations**: Microsoft Copilot, for example, can come
    priced per user per month, often significantly more than standard Microsoft 365
    licenses. Many organizations start with limited pilots to evaluate ROI before
    wider rollout.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data access controls**: These tools can access everything a user can - shared
    drives, inboxes, and calendars. It’s critical to review what documents and systems
    are accessible by default, especially if Copilot-generated output might surface
    confidential info.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training and enablement**: Most copilot users don’t fail due to lack of functionality
    - they fail from unclear expectations. Short demos and prompt starter packs can
    dramatically improve adoption and perceived value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance expectations**: These tools are powerful but not magic. Teams
    need to understand the strengths and limits of copilot models. For example, M365
    Copilot may struggle with nuanced Excel analysis unless the underlying data is
    well structured.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vendor lock-in**: Another dimension to consider is the risk of vendor lock-ins.
    Many companies go with the copilot integration of the platform they already use,
    and then call AI integration a day. However, copilots should be framed as a starting
    point, not the end goal. For lower-value workflows, some copy-paste effort here
    and there will just be enough. For more specialized or advanced workflows, power
    users often still prefer higher customization or automation with less human-in-the-loop
    involvement. But before we talk about these, let’s shine a light on the leadership
    impact of copilots.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leadership impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Business leaders play a critical role in the rollout and implementation of copilots
    across their teams - a role that spans more than just greenlighting the budget
    for additional licenses.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike general-purpose assistants, copilots are embedded into your workflow
    by design, which means they have the potential to accelerate real business processes.
    But only if you decide who gets access, how it’s rolled out, and where it actually
    makes sense to use.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a case of *Switch it on and let everyone figure it out*. Copilots
    can do a lot - but not everything they do is equally valuable. For example, Microsoft
    Copilot in Outlook can write full email replies. But should your sales team really
    use it to respond to clients? Probably not - at least not without oversight. In
    that context, a rushed AI-generated email can damage trust more than save time.
  prefs: []
  type: TYPE_NORMAL
- en: 'A better leadership move might be to define what Copilot is for in your org:'
  prefs: []
  type: TYPE_NORMAL
- en: In Outlook, use it to draft internal updates, not external communication.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Excel, use it to spot trends or clean data, not build final forecasts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Word, use it to restructure rough notes, not generate proposals from scratch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leaders should clearly communicate these expectations. Not because people need
    hand-holding, but because clarity drives smarter adoption.
  prefs: []
  type: TYPE_NORMAL
- en: 'Also important: decide early **who gets Copilot first**. You don’t need a perfect
    rollout plan - but you do need a strategic one. Prioritize high-leverage roles:'
  prefs: []
  type: TYPE_NORMAL
- en: Sales ops teams buried in forecasting sheets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strategy analysts wrangling slides and Excel.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Internal comms or HR drafting company-wide updates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Give them early access. Set a time frame (e.g., 8 weeks). Then, collect feedback:
    quantitative by measuring performance between similar teams who had access to
    copilot and those who didn’t, or qualitative by surveying participants in the
    pilot. Don’t just ask, *Did you like it?* but:'
  prefs: []
  type: TYPE_NORMAL
- en: What did it actually replace?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do you trust it with?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What still feels manual?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it worth the extra expense?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This helps you separate novelty from real ROI and lays the groundwork for a
    broader rollout that’s grounded in actual workflows, not assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: For digital leaders, CAIOs, or transformation officers, Copilots are also an
    early litmus test for your org’s data readiness. One of the hidden values of Copilots
    is that they expose where your internal knowledge is weak. If a Copilot can’t
    generate a good proposal because your materials are scattered across 15 documents
    with no consistency, that’s not the tool’s fault - it’s an insight about documentation
    debt.
  prefs: []
  type: TYPE_NORMAL
- en: Leaders who treat Copilots not just as tools but as reusable building blocks
    for knowledge work will see the real return. That’s where the compounding value
    begins.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s look at the next quadrant: autopilots - where tasks don’t just get
    easier to complete, they start to complete themselves.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Autopilots: Business workflow automation tools'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If copilots help you work faster, **autopilots** aim to help you work less by
    letting systems take over entire tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Autopilot tools are **high-automation** and **low-integration**: they can run
    processes with minimal human input, but don’t necessarily sit inside your day-to-day
    apps. Instead, they often run in the background, like a digital operations team
    handling repetitive work quietly and consistently.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the quadrant where business process automation meets AI. Instead of
    prompting a tool to help you rewrite something, you can automate the entire content
    workflow - such as listening for a new sales lead in your CRM, extracting company
    names from emails, and generating personalized follow-ups based on that data.
    While autopilots can, of course, entirely be built from scratch, this is a category
    where no-code workflow builders shine. The most popular examples include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Zapier** ([https://zapier.com](https://zapier.com)) is a category king of
    no-code automation tools. Offers the most integrations and connects common SaaS
    integrations (e.g., *When a form is submitted in Typeform, send a Slack message
    and write to a Google Sheet*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Make**([https://www.make.com/](https://www.make.com/)) is similar to Zapier,
    but offers a simpler UI and a more competitive pricing model with slightly fewer
    integrations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**n8n** ([https://n8n.io](https://n8n.io)) is an open-source alternative that
    supports AI-powered logic and agents, with scriptable flows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take a look at the n8n support ticket classification workflow in *Figure 10.4*.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.4: LLM-powered ticket classification workflow in n8n](img/B31200_10_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.4: LLM-powered ticket classification workflow in n8n'
  prefs: []
  type: TYPE_NORMAL
- en: This classification workflow is a good example of how classical **no-code workflows**
    interact with AI capabilities. The workflow is executed from left to right. In
    this case, the workflow is triggered when a website form is submitted. In the
    second step, the form content is parsed by an AI text classifier that sends a
    prompt to an LLM - in this case, from OpenAI. The result of the LLM is a classification
    that can be one of three support ticket categories. n8n routes the form depending
    on the content, forwards it to the respective email address, and updates a record
    in a support ticket database.
  prefs: []
  type: TYPE_NORMAL
- en: 'While discussing these tools in detail would be beyond the scope of this book,
    the following table gives you a brief overview and comparison:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Tool** | **Founded** | **Strengths** | **Limitations** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Zapier, San Francisco, USA | 2012 |'
  prefs: []
  type: TYPE_TB
- en: 7,000+ integrations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simple UX and stability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strong error handling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Expensive at scale
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weak developer extensibility
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limited sharing/collaboration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Make, Prague, EU (part of Celonis) | 2012 |'
  prefs: []
  type: TYPE_TB
- en: Cheaper than Zapier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visual editor for non-tech users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Supports import/export
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GDPR compliance (European provider)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: 2,000+ integrations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No native code blocks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| n8n, Berlin, Germany | 2019 |'
  prefs: []
  type: TYPE_TB
- en: Self-hostable, open source version available
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Native Python/JS scripting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Excellent for AI integration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GDPR compliance (European provider)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Smaller integration library
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More technical interface
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Microsoft Power Automate, Redmond, USA | 2019 | Fully integrated into the
    Microsoft ecosystem |'
  prefs: []
  type: TYPE_TB
- en: Risk of vendor lock-in
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Steep learning curve
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: 'Table 10.2: Comparison of popular no-code platforms'
  prefs: []
  type: TYPE_NORMAL
- en: While tools such as Zapier, Make, and n8n started as general-purpose automation
    platforms, they’ve increasingly embraced AI integrations to stay relevant. These
    platforms now support everything from basic LLM actions to more intelligent, AI-powered
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: But there’s another class of tools - those that were built with AI as the foundation,
    not as an enhancement.
  prefs: []
  type: TYPE_NORMAL
- en: 'These are **AI developer platforms**, built from the ground up to develop,
    deploy, and run AI-powered workflows, applications, and agents (to which we’ll
    get in a bit). Every major cloud provider has a version of these AI platforms.
    As an example, here’s a quick look at Microsoft’s Azure offerings, which are a
    popular choice for businesses that are already invested in the Microsoft ecosystem:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Azure AI Foundry**([https://ai.azure.com/](https://ai.azure.com/)): A central
    hub that allows you to build GenAI-powered apps such as custom copilots or customer-facing
    chatbots in one place.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Azure Machine Learning Studio**([https://azure.microsoft.com/en-us/products/machine-learning](https://azure.microsoft.com/en-us/products/machine-learning)):
    Focuses more on classical ML and AutoML workflows - think churn prediction, demand
    forecasting, or regression modeling.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Other cloud providers** offer similar AI suites, such as Vertex AI ([https://cloud.google.com/vertex-ai](https://cloud.google.com/vertex-ai))
    on Google Cloud and SageMaker ([https://aws.amazon.com/sagemaker](https://aws.amazon.com/sagemaker)/)
    on AWS.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Outside of major cloud providers, there’s also a growing ecosystem of lightweight,
    SaaS-friendly GenAI platforms targeting specific domains or use cases. A few worth
    noting are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chatbase** ([https://www.chatbase.co/](https://www.chatbase.co/)): Lets you
    turn documents or websites into chatbot interfaces in minutes. Especially useful
    for onboarding bots, internal helpdesks, or searchable knowledge bases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Harvey AI** ([https://www.harvey.ai/](https://www.harvey.ai/)):AI platform
    specialized in use cases around legal documents and contract work. Comes with
    an integrated workflow builder.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Synthesia** ([https://www.synthesia.io/](https://www.synthesia.io/)): Uses
    GenAI to generate avatar-based videos from text input. Widely used for automating
    video content for training, onboarding, or marketing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Think of it this way: If Zapier and n8n are automation platforms that have
    added AI, tools such as Azure AI Foundry are AI platforms that have added automation.
    SaaS tools such as Chatbase and Harvey have pre-built a lot of things for you,
    given a certain use case, and allow for (often limited) customization.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Which one you choose depends on your team’s technical depth, infrastructure
    needs, and broader goals. But they all point in the same direction: the shift
    from *AI as a helper* to *AI as the system*. Still, these tools usually don’t
    hook deeply into your IT systems right away. You can often start with just a file
    upload or a webhook, and build out integrations as you go.'
  prefs: []
  type: TYPE_NORMAL
- en: 'My recommendation is to pick one platform that lets you quickly test (and potentially
    scale) use cases that were discovered and validated in an assistant form. Whether
    this means bringing in a no-code workflow builder such as n8n, extending an existing
    Zapier license you already have, or giving your developers access to an AI platform
    such as AI Foundry really depends on your organization. The possibility of getting
    quick access to a versatile platform is more important than the tool itself. Another
    benefit of having a central platform is that you can quickly probe how much better
    (or feasible) a custom integration performs over a domain-specific vendor solution
    such as Harvey. In the end, this is another make-or-buy decision. If you’d like
    to dive deeper into that, I wrote an article about AI make or buy here: [https://blog.tobiaszwingmann.com/p/ai-make-vs-buy](https://blog.tobiaszwingmann.com/p/ai-make-vs-buy).'
  prefs: []
  type: TYPE_NORMAL
- en: 'So where do these autopilots fit in? You might already be familiar with some
    typical workflow automation use cases: auto-sending emails, routing form data,
    and syncing data between systems. But adding AI into the mix expands the value
    significantly. You can use AI to enhance several tasks, making the automation
    better, cheaper, faster, or just more scalable. Some of them are listed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer onboarding**: Parse a new client’s submitted documents, extract
    relevant metadata using an LLM, populate internal systems, and notify the account
    manager.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content repurposing**: Watch a Google Drive folder for new content, extract
    insights with AI, generate LinkedIn posts and summaries, and queue them in Buffer
    or HubSpot.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead scoring and enrichment**: When a lead enters your CRM, enrich it with
    data from LinkedIn, analyze the job title with an LLM, and assign it to the right
    sales pipeline based on keywords.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Internal reporting**: Summarize support ticket data weekly and post a plain-English
    trend report in a Slack channel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Survey analysis**: Use an LLM to categorize free-form feedback from customer
    surveys and flag urgent issues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A classic autopilot use case is a first-level support chatbot - an AI system
    that automatically handles routine customer questions on your website, acting
    like a smarter, interactive FAQ.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several ways to build this:'
  prefs: []
  type: TYPE_NORMAL
- en: Use **n8n** to create a custom LLM-powered chatbot that connects to your knowledge
    base and runs via a web UI. This gives you control, but requires manual data prep.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 10.5: An autopilot-supported chatbot](img/B31200_10_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.5: Simple HR chatbot autopilot built with n8n'
  prefs: []
  type: TYPE_NORMAL
- en: Use **Azure AI Foundry** to build a custom chat app that connects to enterprise
    data sources and other Microsoft apps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a vertical platform such as **Chatbase** to spin up a chatbot in minutes
    - just upload a few PDFs or link your help center, and it generates a usable bot
    right away (*Figure 10.6*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 10.5: An autopilot-supported chatbot](img/B31200_10_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.6: An interface for adding files to Chatbase'
  prefs: []
  type: TYPE_NORMAL
- en: Each approach automates the same task - handling FAQs without human involvement
    - but with different trade-offs between control, speed, and integration.
  prefs: []
  type: TYPE_NORMAL
- en: 'And that’s exactly where autopilots shine: they’re easy to bring in, flexible
    to adapt, and powerful enough to turn one-off wins into always-on systems. Whether
    you start with a drag-and-drop chatbot builder or a fully custom flow, these tools
    make it possible to automate real work without calling IT every time.'
  prefs: []
  type: TYPE_NORMAL
- en: Why they work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Autopilots don’t just save time. They change *how* work happens - by turning
    ad hoc manual tasks into scalable, hands-free workflows. Here’s why they stick:'
  prefs: []
  type: TYPE_NORMAL
- en: '**They start small**: Many workflows begin with a single prompt or one-time
    task. With autopilot tools, that initial success can be turned into a repeatable,
    automated flow with minimal effort.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**They free up headspace**: The magic isn’t just speed - it’s focus. Autopilots
    handle the boring, brittle, or brain-dead tasks so your team can focus on what
    actually matters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**They create leverage**: Small workflows save minutes. But when they run 50
    times a day across five teams, you start reclaiming days.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**They scale without scale**: Most tools here are built for business users
    - not just developers - so you don’t need to grow your IT team to grow your automation
    footprint.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike copilots, which assist and suggest, autopilots act. They don’t wait for
    you to click **Go**; once set up, they’re running, routing, transforming, updating,
    summarizing, or chatting around the clock.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s why it’s smart to start with assistants or copilots first: they help
    you learn where AI adds value, where it breaks, and where automation is safe.
    Once that understanding is in place, autopilots are the logical next step - but
    they require more structure and oversight, because when software starts doing
    things on its own, it’s time to think even more about ownership, accountability,
    and governance.'
  prefs: []
  type: TYPE_NORMAL
- en: Organizational considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Because of their high degree of automation, often triggered by data events
    or system activity, autopilots require more oversight than assistants or Copilots:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define automation boundaries**: Not every process benefits from full autonomy.
    For example, routing support tickets to the right team can be safely automated,
    but automatically sending refund approvals without human oversight may expose
    you to financial or compliance risk. A good practice is to categorize processes
    into **safe-to-automate**, **human-in-the-loop**, and **never automate**. Some
    organizations even run **automation reviews** for new workflows, much like a lightweight
    code review.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Audit and logging**: Ensure that automations - especially those that involve
    LLMs - are tracked. You’ll want visibility into what was generated, when, and
    for whom. When workflows run in the background, invisibility can quickly become
    a liability. Imagine an autopilot that categorizes thousands of incoming survey
    responses every week: if the categorization logic drifts or breaks, you may not
    notice until a major decision has already been made on flawed data. Proper audit
    trails - logging which workflow ran, what inputs it received, and what outputs
    were generated - allow you to backtrack and troubleshoot. In regulated industries
    (such as healthcare or finance), these logs may even be mandatory.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost control**: Some automations, especially with high-frequency triggers
    or complex AI calls, can easily rack up surprising bills. For instance, a Zapier
    workflow that calls an LLM every time a Slack message is posted in a channel can
    spiral into thousands of calls per week. Consider techniques such as batching
    (e.g., processing messages hourly instead of instantly), caching (storing common
    outputs to avoid repeated API calls), or usage caps (stopping workflows after
    a daily threshold) to keep costs predictable. For workflows with a potentially
    high workload, consider running a cost simulation on a small sample before deploying
    a new automation to estimate its financial footprint.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Shadow automation risk**: Just like with *shadow IT*, it’s easy for employees
    to start building unmonitored workflows. While this shows initiative, it also
    creates risk. To balance innovation with governance, you might consider setting
    up a workflow registry where employees log their automations. Others create *automation
    groups* or internal communities of practice where power users share templates,
    get feedback, and avoid reinventing the wheel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A note of caution**'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t over-AI your workflows. Just because you *can* use an LLM doesn’t mean
    you should. Many automation steps are better handled by basic logic (e.g., if/then,
    regex, lookup tables). Keep AI for the steps that require judgment, nuance, or
    text transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Leadership impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Autopilots often emerge from *grassroots innovation* - a power user who wires
    something together on a weekend and shares it with the team. But leadership has
    a big opportunity to take those bottom-up breakthroughs and systematize them.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a leader, your role is to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Spot repeatable wins**: See what one team automates and ask, *Who else could
    use this?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Invest in reuse**: Help teams turn individual workflows into shareable templates
    or internal libraries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Support tool access**: Provide licenses for no-code tools such as n8n or
    Make, and empower non-engineering teams to use them safely.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create a feedback loop**: Ask teams what is being automated, what’s still
    manual, and what broke last week. This creates a healthy automation culture -
    one where people build, refine, and share.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most importantly, normalize the automation mindset. When a new process is created,
    ask *Can this be automated?* Not to avoid ownership, but to ensure your smartest
    people aren’t stuck doing robotic work.
  prefs: []
  type: TYPE_NORMAL
- en: And for digital top leadership (CAIOs, CTOs, or ops heads), autopilots offer
    a unique angle on AI enablement. They bridge the gap between strategy and execution
    - letting your org experiment, learn, and optimize without waiting for centralized
    roadmaps or major IT investments.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, some of your highest-ROI AI use cases may not come from LLM research
    or vendor partnerships, but from a clever automation that turns a 20-minute task
    into a 2-second one, every day.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we’ll step into the final quadrant: agents - where AI not only automates
    work, but begins to decide, adapt, and act across systems on your behalf.'
  prefs: []
  type: TYPE_NORMAL
- en: 'AI agents: Autonomous task handling'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'If autopilots automate tasks, **agents** take it a step further: they decide,
    act, adapt, and even improve over time. This is where AI stops being a passive
    helper and becomes an operational actor.'
  prefs: []
  type: TYPE_NORMAL
- en: Agents combine deep system access with autonomous execution. They don’t wait
    for manual instructions. They act - based on goals, data, or triggers - and can
    carry out multi-step workflows across tools, departments, and decisions. They
    don’t assist with work. They run the work.
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ve probably seen the early stages of this already:'
  prefs: []
  type: TYPE_NORMAL
- en: An AI system that summarizes meetings, tags action items, and automatically
    creates Jira tickets in the respective projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A chatbot that not only answers FAQs like the autopilots did, but also authenticates
    users, resets passwords, fetches shipping details, and escalates support tickets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A sales agent that researches leads, drafts personalized emails, and updates
    CRM records.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Most agentic AI tools essentially rely on the following four building blocks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LLMs** for reasoning and decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools or function-calling** frameworks for interaction with real-world systems
    (e.g., OpenAI functions, LangChain).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory** or task history to access knowledge and stay context-aware across
    steps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automation runtimes** to coordinate workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This makes agents extremely powerful, but also complex. They require careful
    design, testing, monitoring, and often a blend of AI and traditional logic to
    perform reliably. Hence, they’re often not the best place to start, as we discussed
    before.
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent tooling** isn’t for everyone. But if your team has basic scripting
    skills or technical staff, these tools can help you deploy your own agents. These
    tools are not where most teams begin. But for organizations with technical staff
    or advanced prototypes ready to scale, they offer serious leverage. You can typically
    build AI agents on top of AI no-code tools that you’ve seen under autopilots above.
    In this case, an agent simply becomes a separate node in your workflow.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example from a lead enrichment workflow in **n8n**, where the heavy
    lifting is done by an AI agent node, can use an LLM from OpenAI to control a web
    scraping tool, which adds relevant information to a company, and then stores the
    output in a Google Sheet document:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.7: AI agent in n8n for a lead enrichment use case](img/B31200_10_07.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.7: AI agent in n8n for a lead enrichment use case'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, this workflow looks relatively simple because we don’t have
    to wire up complex rules, such as which website to scrape, and what happens if
    a website is not provided or if no relevant information is found on a website.
    These are all things handled by the agent based on the prompt we gave it.
  prefs: []
  type: TYPE_NORMAL
- en: Besides building on top of existing workflow automation tools, another effective
    way to build AI agents is to use agent frameworks that are more targeted to developers,
    such as CrewAI([https://www.crewai.com/](https://www.crewai.com/)) and LangGraph
    ([https://www.langchain.com/langgraph](https://www.langchain.com/langgraph)).
    The benefit of these is that they typically offer more customizability, but they
    often don’t provide the kind of comprehensive routing and automation logic you
    get from tools such as n8n or Zapier, which have over a decade of experience automating
    workflows at scale. That’s why even simple conditional logic or basic things such
    as HTTP requests often have to be coded manually.
  prefs: []
  type: TYPE_NORMAL
- en: '**Agentic frameworks** like these shine in situations where you need to run
    multiple agents in parallel - for example, a multi-agent system where one *agent*
    does research, another generates a summary, and a third QA-checks the result before
    publishing. Ultimately, figuring out which parts work better as static automation
    and which ones should be handled by an agent is part of the learning journey,
    and usually involves a lot of trial and error.'
  prefs: []
  type: TYPE_NORMAL
- en: When they work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this quadrant, the right question isn’t *Why do they work?* The value is
    obvious. If you can run entire workflows that figure out the steps, choose the
    tools, execute them, adapt on the fly without human involvement, and do it at
    near-zero marginal cost, the upside speaks for itself. It’s the operational dream:
    scale without scale. Automation that adapts. Work that happens while your team
    sleeps.'
  prefs: []
  type: TYPE_NORMAL
- en: 'No, the real question is: **when** do agents actually work?'
  prefs: []
  type: TYPE_NORMAL
- en: In practice, agents are hard to crack. They’re more sensitive to workflow messiness,
    edge cases, permissions, context ambiguity, and tool access than any other class
    of AI system in this book.
  prefs: []
  type: TYPE_NORMAL
- en: 'Unlike Copilots, which live neatly inside productivity tools, or autopilots,
    which follow clean **if-this-then-that** flows, agents must navigate dynamic environments
    and make real-time decisions - often with incomplete or inconsistent information.
    That level of autonomy demands more than just good tech. It actually requires
    having all scaling levers in place, which we discussed in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312):'
  prefs: []
  type: TYPE_NORMAL
- en: '**People:** You need owners who take true responsibility for the agentic process,
    even if it spans company silos. Around them, you need a team ready to monitor,
    refine, and improve agents over time (see AIOps below). Treat agents less like
    tools and more like digital colleagues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processes:** You can’t plan an agent in a waterfall-style way because you’ll
    never anticipate all the edge cases they’ll hit. Agents will explore unknowns
    by themselves. That means agile delivery - short sprints, fast feedback loops,
    and iteration - so you can adapt quickly when they behave in unintended ways.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data:** Agents rely on structured, permissioned, and accessible data that
    provides enough context to act reliably. And no, spinning up an MCP server won’t
    fix this. Data maturity comes first; easy connectors come later.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Technology:** Provide a safe runtime - APIs, connectors, and sandboxed environments
    - before exposing agents to production systems. Reliability, observability, and
    guardrails are non-negotiable at this point.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AIOps:** Of all AI solution types, agents require the heaviest monitoring,
    logging, and intervention. If your team has never shipped at least a Copilot or
    autopilot implementation before, you’re likely not ready for agents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most importantly, you need to resist the temptation to hand your entire business
    process to a digital Swiss Army knife and expect magic.
  prefs: []
  type: TYPE_NORMAL
- en: Most failures happen when teams ask agents to do too much, too soon, in environments
    that aren’t ready. The best agents do one thing well. They’re a capability you
    earn by delivering working AI solutions in easier formats with higher human-in-the-loop
    involvement, such as assistants or Copilots. This will inform you naturally which
    tasks or workflows are ready for more **AI handoff**.
  prefs: []
  type: TYPE_NORMAL
- en: And in that context, the *agent tool* itself? Honestly, it’s the easiest part.
  prefs: []
  type: TYPE_NORMAL
- en: Organizational considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deploying agents isn’t just a technical decision - it’s an organizational shift.
    You’re giving software the authority to act on behalf of your business. That changes
    the dynamics of ownership, oversight, accountability, and trust.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike assistants or Copilots, which augment human users, agentic systems can
    operate without constant supervision. And that means you need to treat them less
    like tools and more like digital team members. They need policies, scopes, escalation
    paths, and quality assurance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are four critical shifts organizations must make to operationalize agentic
    tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define boundaries**: Not every task should be automated. Not every tool should
    have access to sensitive systems. Teams need clear guidelines on what agents are
    allowed to do - and where human input is non-negotiable. This includes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Which workflows can be fully automated versus partially agent-led?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: When agents should request human confirmation before proceeding?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What data sources or systems they’re permitted to access or update?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Think of it like access permissions for a new hire. You wouldn’t give an intern
    unrestricted database access on day one. Your agents should be treated with the
    same discipline.
  prefs: []
  type: TYPE_NORMAL
- en: '**Implement safety nets**: Because agents operate autonomously, they need built-in
    safeguards. These include:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rate limits to avoid spamming external systems or overloading APIs.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Guardrails on output quality (e.g., validating generated content against business
    rules).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Fallback behaviors when something goes wrong (e.g., alerting a human rather
    than retrying indefinitely).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Isolation environments (sandboxed agent testing before rollout).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that operational procedures are in place to monitor and control the agentic
    solutions in production.
  prefs: []
  type: TYPE_NORMAL
- en: Safety nets give you the confidence to roll out your agents beyond the experimentation
    stage and gain trust from users.
  prefs: []
  type: TYPE_NORMAL
- en: '**Ensure observability**: One of the biggest organizational risks with agents
    is invisibility. If a workflow breaks or behaves unexpectedly, will anyone notice?
    Effective agent adoption requires:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Logging and audit trails for every action.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Version control for agent logic and prompts.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Dashboards or alerting for runtime errors, decision branches, or *edge cases*.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Without observability, you’re not in control - you’re guessing.
  prefs: []
  type: TYPE_NORMAL
- en: '**Establish ownership**: Here’s the most overlooked piece. Every agent needs
    a human owner. Someone who:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Monitors the system.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Reviews and improves its behavior.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Decides when to retire, retrain, or escalate.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Without clear ownership, agents become *ghost processes* - nobody knows how
    they work, why they do what they do, or when they were last updated. That’s a
    fast path to risk, failure, or abandonment. Organizations that succeed with agents
    treat them like living systems: they evolve, adapt, and need care.'
  prefs: []
  type: TYPE_NORMAL
- en: Leadership impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For leaders, AI agents are both a powerful opportunity and a real test of your
    digital maturity. Why? Because agents don’t just require a tool rollout. They
    require a true culture shift. You’re asking teams to trust a system that makes
    decisions. You’re introducing AI not just as an enhancer, but as a participant
    in business processes.
  prefs: []
  type: TYPE_NORMAL
- en: And that changes everything.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what effective leadership looks like in an agent-driven environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Set the trust bar**: Teams will mirror your attitude. If you constantly question
    the reliability of agent tools, expect widespread hesitation. If you overhype
    them, expect disappointment. But if you openly explore where agents make sense
    - and where they don’t - you give people a balanced, usable playbook. Trust doesn’t
    start with technology. It starts with leadership behavior.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Normalize iteration over perfection**: No agent system will be perfect out
    of the box. The goal isn’t to build flawless autonomy - it’s to learn what kind
    of autonomy works in your environment. Leaders should create psychological safety
    for teams to test, iterate, and improve agents over time. That means rewarding
    learning velocity, not just delivery speed. Ask, *What did this agent do right?*
    *Where did it struggle?* *What did we learn?* This turns experimentation into
    improvement - and failure into progress.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Shift your operating model**: Agent adoption changes the rhythm of how work
    gets done. Approvals happen faster. Tasks get delegated to workflows, not people.
    Turnaround time compresses. But if you keep your old processes wrapped around
    these new capabilities, you’ll smother the value. Leaders must reimagine team
    structures and expectations:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Can roles be redesigned around higher-value oversight?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Can SLAs change because automation speeds up delivery?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Should performance metrics shift to reflect agentic workflows?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In other words, don’t just plug agents into your org. Organize for them. Ultimately,
    agentic systems are less about fancy AI and more about designing workflows for
    scale, resilience, and autonomy. When your teams no longer think *What can I do
    with this tool?* and start asking, *What can this tool do on behalf of me?*, you’re
    in the agents quadrant.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have explored the different categories of AI tools - from entry-level
    assistants to advanced autonomous agents - it’s time to think about how your organization
    can practically adopt them.
  prefs: []
  type: TYPE_NORMAL
- en: Framework for AI tool adoption
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'A natural question when you begin evaluating AI tools and their applications
    for your organization is: **Where should you start?**'
  prefs: []
  type: TYPE_NORMAL
- en: This section presents a framework that provides a structured path for evaluating
    your current AI tool landscape, identifying opportunities for advancement, and
    embedding AI adoption into your broader tool strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of focusing on abstract maturity labels, this framework grounds your
    **AI tool adoption journey** in concrete stages that directly impact day-to-day
    work.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore these stages in detail:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Diagnose your current state**: Begin with a simple self-assessment across
    the departments or products you’ve examined during your roadmapping process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Which tools are we using today - AI assistants, copilots, autopilots, or AI
    agents?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What behaviors or examples back that up?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Where are our blind spots?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Which tools are required as per the use cases on our roadmap?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This doesn’t need to be overly formal. A quick workshop, internal poll, or department
    lead sync can surface honest, directional insights. Even covering just 3–5 key
    areas can reveal major gaps and opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: The goal isn’t perfection; it’s awareness. What matters most is achieving a
    **shared understanding of where you stand** today.
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify the** **next-level moves**: Once you know where each team is, define
    what moving up **one tool level** would look like:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**From AI assistants to copilots**: For example, a support rep shifts from
    casually using ChatGPT for email drafts to having a copilot embedded in their
    ticketing system, suggesting replies and summaries.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**From copilots to autopilots**: For example, the support team begins automating
    entire workflows, such as AI handling ticket triage and routing without manual
    intervention.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**From autopilots to AI agents**: For example, rethinking the support model
    entirely so that autonomous AI agents handle common issues end-to-end, escalating
    only the edge cases to human reps.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I recommend framing these moves in terms of behaviors and outcomes and not
    buzzwords. You may start by asking:'
  prefs: []
  type: TYPE_NORMAL
- en: What process could we automate further?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What decision could we accelerate?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What tasks could AI take on directly?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What would the business impact be?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prioritize with purpose**: Not every team member should advance at once.
    Use the model to prioritize where investment and support will yield the biggest
    impact:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Where is demand already emerging (people experimenting, building small prototypes)?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Where are manual processes creating major bottlenecks?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Where is leadership most open to change?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Focus on 3–4 **pilot** areas for the next phase. Equip them with the right tools,
    track the results, and then scale learnings across other areas. Start with *units
    that already show signs of AI fluency and have high operational impact* (like
    Support or Ops).
  prefs: []
  type: TYPE_NORMAL
- en: '**Turn it into an ongoing conversation**: This framework isn’t a destination
    - it’s a journey. Use it to:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set quarterly AI adoption goals by team
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Guide enablement and upskilling initiatives
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Track cross-functional progress
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Celebrate wins (for example, *Marketing just shifted from copilots to autopilots!*)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Over time, this becomes your shared language for AI maturity.
  prefs: []
  type: TYPE_NORMAL
- en: '**Embed in strategic planning**: Finally, link AI adoption directly to your
    business goals. For example:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If your goal is to *reduce time-to-hire*, ask: What would moving Recruiting
    from assistants to copilots do for that metric?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If the objective is to *improve customer resolution time*, ask: What would
    moving Support from copilots to autopilots unlock?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: When tool adoption becomes part of how you talk about **business performance**,
    AI is no longer a side project. It becomes a natural driver of competitiveness
    and strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve seen how teams evolve in capability, let’s bring it all together
    with a quick tool reference you can use to support that growth.
  prefs: []
  type: TYPE_NORMAL
- en: 'AI Tool Map: A practical guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Every day, there’s a new AI tool launching - and every day, another quietly
    disappears.
  prefs: []
  type: TYPE_NORMAL
- en: Trying to track them all is pointless. But in some situations, a high-level
    view of the landscape helps, especially when you’re guiding experimentation or
    supporting teams with tools they’ll actually use.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why I’ve created the AI Tool Map,which you can see in *Figure 10.8* and
    download using this link ([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch10/AI_Tool_Map.xlsx));
    this gets updated as the tools evolve. The AI Tool Map groups different AI tools
    by function, shows where they fit in your AI journey, which quadrant of the Integration-Automation
    AI Framework they fit in, highlights real use cases, and flags what to watch out
    for.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.8: AI Tool Map](img/B31200_10_08.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.8: AI Tool Map'
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as your shortcut through the hype, so you can focus on what to use,
    when to use it, and who should own the rollout.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this section was to show you how to reframe AI adoption from
    a tools-first mindset to an intentional, fluency-first approach. The most successful
    organizations aren’t the ones chasing every new app but the ones building consistent,
    team-level fluency across functions in a way that drives real business impact.
    Using the framework above, you can guide progress and choose tools intentionally,
    one step at a time. The goal isn’t perfection, but visible, shared, and strategic
    movement toward real transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You’ve seen the frameworks. You’ve studied the use cases. You’ve built prototypes
    and explored how to scale them.
  prefs: []
  type: TYPE_NORMAL
- en: But in the end, it’s the tools that turn your AI strategy into tangible business
    results. Not because they’re magical, but because they’re usable. Today**.**
  prefs: []
  type: TYPE_NORMAL
- en: Some tools - such as ChatGPT and GitHub Copilot - deliver quick, personal wins.
    Others - such as n8n and Azure AI Foundry (or the service ecosystem on Azure)
    - unlock even more scalable automation and system-level transformation.
  prefs: []
  type: TYPE_NORMAL
- en: 'But they all share one thing in common: they only work when placed in the hands
    of people who are empowered to explore, enabled to execute, and equipped to share
    what works.'
  prefs: []
  type: TYPE_NORMAL
- en: Whether it’s a marketer using ChatGPT to rewrite an email, a product team wiring
    up an LLM-powered assistant, or your ops lead automating reports in n8n, AI shifts
    from a future concept to a functional lever.
  prefs: []
  type: TYPE_NORMAL
- en: The companies that win won’t be the ones with the most tools. They’ll be the
    ones that learned to use a few of them well - early, often, and across the org.
    The real edge isn’t an impressive tech stack. It’s an organization that knows
    how to learn, adapt, and build with AI every day.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a big launch. You just need to start and build your roadmap as
    you go. Because AI transformation doesn’t begin with a keynote.
  prefs: []
  type: TYPE_NORMAL
- en: It begins with a single prompt, a working workflow, and a team willing to press
    **Run**.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for joining me on this journey. I hope this book empowers you to identify
    opportunities, prioritize initiatives, and scale AI across your business - and
    build your **Profitable AI Advantage**.
  prefs: []
  type: TYPE_NORMAL
- en: Stay tuned
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
