- en: '16'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '16'
- en: 'Agentic Memory: Extending RAG with Stateful Intelligence'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理记忆：通过状态智能扩展RAG
- en: 'Memory transforms an **artificial intelligence** (**AI**) agent from a stateless
    responder into an intelligent system capable of learning, adapting, and building
    meaningful relationships over time. While **large language models** (**LLMs**)
    possess vast parametric knowledge encoded in their weights, they lack the ability
    to remember specific interactions, learn from experience, or maintain consistency
    across conversations. At its core, this is an evolution of **retrieval-augmented
    generation** (**RAG**): where basic RAG retrieves static documents to augment
    responses, agentic memory creates dynamic, evolving knowledge stores that are
    continuously updated through agent interactions. Agentic memory bridges this gap
    by providing structured mechanisms for storing, organizing, and retrieving information
    that extends far beyond the model’s training data or context window. This chapter
    explores how memory architectures enable agents to maintain context across sessions,
    personalize their responses, learn from past successes and failures, and, ultimately,
    deliver experiences that feel more like interacting with a knowledgeable colleague
    than a forgetful assistant.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆将人工智能（**AI**）代理从无状态的响应者转变为一个能够学习、适应并在一段时间内建立有意义关系的智能系统。虽然**大型语言模型**（**LLMs**）在其权重中编码了大量的参数化知识，但它们缺乏记住特定交互、从经验中学习或在不同对话中保持一致性的能力。在本质上，这是**检索增强生成**（**RAG**）的演变：其中基本的RAG检索静态文档以增强响应，代理记忆则创建动态、不断演变的知识库，这些知识库通过代理交互不断更新。代理记忆通过提供存储、组织和检索信息的结构化机制来弥合这一差距，这些机制远远超出了模型的训练数据或上下文窗口。本章探讨了记忆架构如何使代理能够在会话之间保持上下文，个性化其响应，从过去的成功和失败中学习，并最终提供更像是与知识渊博的同事互动而不是与健忘的助手互动的体验。
- en: 'In this chapter, we’ll cover the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下内容：
- en: What is agentic memory?
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是代理记忆？
- en: The evolution of agent memory
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理记忆的演变
- en: Core memory types (CoALA framework)
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 核心记忆类型（CoALA框架）
- en: Memory scope dimensions
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆范围维度
- en: Challenges of implementing CoALA
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施CoALA的挑战
- en: Comparing three memory framework approaches
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较三种记忆框架方法
- en: Evaluation and monitoring
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估和监控
- en: By mastering these memory architectures and implementation strategies, you’ll
    be equipped to build agents that evolve with their users, transforming one-off
    interactions into ongoing relationships that deliver increasingly valuable and
    personalized experiences. Whether you’re building a financial advisor that remembers
    client portfolios, a healthcare assistant tracking patient symptoms over time,
    a technical support bot that learns from debugging sessions, or an educational
    tutor adapting to student learning patterns, the principles in this chapter provide
    the foundation for creating truly intelligent, adaptive AI systems.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握这些记忆架构和实施策略，你将能够构建随着用户发展而演变的代理，将一次性交互转变为持续的关系，提供越来越有价值且个性化的体验。无论你是在构建一个能够记住客户投资组合的财务顾问，一个随着时间的推移跟踪患者症状的医疗助手，一个从调试会话中学习的客户支持机器人，还是一个适应学生学习模式的辅导教师，本章中的原则为创建真正智能、自适应的AI系统提供了基础。
- en: What is agentic memory?
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是代理记忆？
- en: '**Agentic memory** represents the collection of storage and retrieval mechanisms
    that transform a stateless AI system into one capable of maintaining context,
    learning from experiences, and building relationships over time. This builds upon
    the fundamental RAG pattern of retrieve-then-generate, but extends it with persistent
    storage, continuous learning, and multi-tiered retrieval strategies. Unlike traditional
    chatbots that treat each interaction in isolation, agents equipped with memory
    systems can recall previous conversations, track evolving user preferences, accumulate
    domain knowledge, and refine their behaviors based on past outcomes. This fundamental
    shift from stateless to stateful operation mirrors the difference between meeting
    someone new every day versus developing an ongoing relationship where shared history
    enriches each interaction.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理记忆**代表了一组存储和检索机制，这些机制将无状态AI系统转变为能够维持上下文、从经验中学习并随时间建立关系的系统。这建立在基本的RAG检索-然后生成模式之上，但通过持久存储、持续学习和多级检索策略进行了扩展。与传统将每次交互视为孤立的聊天机器人不同，配备记忆系统的代理可以回忆先前的对话，跟踪不断变化的患者偏好，积累领域知识，并根据过去的成果调整其行为。这种从无状态到有状态操作的根本转变，反映了每天与新人见面与建立持续关系之间的差异，共享的历史丰富了每一次互动。'
- en: The power of agentic memory lies not just in storing information but in how
    that information is organized, retrieved, and utilized to enhance agent capabilities.
    When properly implemented, memory enables agents to provide personalized responses
    grounded in user history, avoid repeating mistakes, build upon previous discussions
    without requiring users to re-explain the context, and gradually improve their
    performance through accumulated experience. For instance, in the financial industry,
    an advisor agent with robust memory can remember a user’s risk tolerance stated
    months ago and track portfolio evolution. Similarly, in healthcare, a medical
    assistant can track symptom patterns across appointments, medication responses,
    and treatment progress. In education, a tutoring agent can remember which teaching
    methods work best for each student and build upon previously mastered concepts.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 代理记忆的力量不仅在于存储信息，还在于信息的组织、检索和利用方式，这些方式可以增强代理的能力。当得到恰当实施时，记忆使代理能够基于用户历史提供个性化的响应，避免重复错误，在不需要用户重新解释上下文的情况下，基于之前的讨论进行构建，并通过累积的经验逐步提高其性能。例如，在金融行业，具有强大记忆能力的顾问代理可以记住几个月前用户的风险承受能力，并跟踪投资组合的演变。同样，在医疗保健领域，医疗助理可以跟踪跨预约、药物反应和治疗进展的症状模式。在教育领域，辅导代理可以记住哪种教学方法最适合每个学生，并基于之前掌握的概念进行构建。
- en: 'Modern agentic memory systems draw inspiration from human cognitive architecture
    while adapting to the unique capabilities and constraints of AI systems. They
    typically employ multiple storage mechanisms working in concert: knowledge graphs
    for structured relationships and facts, vector databases for semantic similarity
    search, relational databases for transactional data and system state, and specialized
    stores for temporal or procedural information. Each of these storage mechanisms
    enhances the basic RAG retrieval pattern in different ways: vector databases enable
    semantic search just like traditional RAG, but now over personalized conversation
    histories; knowledge graphs add structured reasoning to complement RAG’s document
    retrieval; and temporal stores allow RAG queries to consider how information has
    evolved over time. This polyglot approach ensures that each type of memory is
    stored and accessed using the most appropriate technology, maximizing both performance
    and capability.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 现代代理记忆系统从人类认知架构中汲取灵感，同时适应AI系统独特的功能和限制。它们通常采用多种存储机制协同工作：知识图谱用于结构化关系和事实，向量数据库用于语义相似性搜索，关系数据库用于事务数据和系统状态，以及用于时间或程序信息的专用存储。这些存储机制以不同的方式增强基本的RAG检索模式：向量数据库实现了与传统RAG类似的语义搜索，但现在是在个性化的对话历史中；知识图谱增加了结构化推理，以补充RAG的文档检索；时间存储允许RAG查询考虑信息随时间的变化。这种多语言方法确保每种类型的记忆都使用最合适的技术进行存储和访问，最大化性能和能力。
- en: To appreciate how we arrived at these sophisticated memory architectures, it
    helps to understand the evolution of conversational AI memory over the past two
    decades, from the rigid state machines of early chatbots to the flexible, multi-tiered
    systems we build today.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解我们是如何达到这些复杂的记忆架构的，了解过去二十年来对话式人工智能记忆的演变过程很有帮助，从早期聊天机器人的刚性状态机到我们今天构建的灵活、多层次的系统。
- en: The evolution of agent memory
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理记忆的演变
- en: The concept of memory in conversational AI has undergone a dramatic transformation
    over the past twenty years, evolving from simple state tracking to sophisticated
    cognitive architectures that rival human memory organization.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的二十年里，对话式人工智能中的记忆概念经历了巨大的转变，从简单的状态跟踪发展到与人类记忆组织相媲美的复杂认知架构。
- en: The pre-ChatGPT era – state machines and slot filling
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预ChatGPT时代 – 状态机和槽位填充
- en: Before the transformer revolution, conversational agents relied on fundamentally
    different approaches to memory. Early chatbots from the 2000s and 2010s operated
    as finite state machines, moving through predefined conversation flows with memory
    limited to tracking which state the conversation had reached. Systems built on
    technologies such as **Artificial Intelligence Markup Language** (**AIML**) could
    recognize patterns and retrieve canned responses, but their memory consisted of
    nothing more than pattern-matching rules and session variables. When you asked
    a customer service bot about your order status, it remembered your order number
    for the duration of that session by storing it in a variable, then promptly forgot
    everything the moment the conversation ended.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在变压器革命之前，对话代理依赖于根本不同的记忆方法。2000年代和2010年代的早期聊天机器人作为有限状态机运行，通过预定义的对话流程进行操作，其记忆仅限于跟踪对话达到了哪个状态。建立在**人工智能标记语言**（**AIML**）等技术之上的系统可以识别模式并检索预先准备好的响应，但它们的记忆仅由模式匹配规则和会话变量组成。当你询问客户服务机器人你的订单状态时，它会通过将订单号存储在一个变量中，在会话期间记住你的订单号，然后一旦对话结束，立即忘记所有内容。
- en: Task-oriented dialogue systems represented a modest improvement through dialogue
    state tracking. These systems maintained structured representations of user goals
    and constraints, such as slots for origin city, destination city, and travel date
    in a flight booking system. Memory meant filling in these predetermined fields
    and persisting them throughout a multi-turn conversation. The system could remember
    that you wanted to fly to New York on Tuesday, but only because “destination”
    and “date” were explicitly designed slots in its architecture. Anything outside
    these predefined categories simply could not be remembered.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 以任务为导向的对话系统通过对话状态跟踪实现了小幅度的改进。这些系统维护着用户目标和约束的结构化表示，例如在航班预订系统中，有起始城市、目的地城市和旅行日期等槽位。记忆意味着填写这些预定义字段并在多轮对话中持续它们。系统可以记住你想要在星期二飞往纽约，但这仅仅是因为“目的地”和“日期”在其架构中被明确设计为槽位。任何超出这些预定义类别的信息都根本无法被记住。
- en: Personalization in this era typically meant user profiles stored in databases,
    containing explicit preferences that users had manually configured or that systems
    had extracted through direct questions. A music recommendation system might remember
    that you liked jazz, but only because you had selected it from a drop-down menu
    or answered a direct question. The idea of an agent naturally learning your preferences
    through conversation, inferring your tastes from subtle cues, or building a nuanced
    understanding of your needs over time remained firmly in the realm of science
    fiction.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个时代，个性化通常意味着存储在数据库中的用户配置文件，包含用户手动配置的显式偏好或系统通过直接问题提取的偏好。一个音乐推荐系统可能会记住你喜欢爵士乐，但这仅仅是因为你从下拉菜单中选择了它或回答了一个直接问题。通过对话自然学习你的偏好、从细微的提示中推断你的品味，或者随着时间的推移建立对您需求的细微理解的想法，仍然牢牢地停留在科幻领域。
- en: The ChatGPT inflection point – from stateless to stateful
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT转折点 – 从无状态到有状态
- en: 'The release of ChatGPT in late 2022 fundamentally altered expectations for
    conversational AI. Suddenly, users experienced conversations that felt remarkably
    natural, with responses that demonstrated deep understanding and contextual awareness.
    Yet this sophistication came with a critical limitation: each conversation existed
    in isolation. The model possessed no mechanism for remembering previous sessions,
    learning user preferences over time, or building upon past interactions. You could
    have a brilliant conversation about your investment strategy on Monday, then return
    on Tuesday to find the agent had no recollection of what you had discussed.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 2022 年底 ChatGPT 的发布从根本上改变了人们对对话人工智能的期望。突然之间，用户体验到了感觉非常自然的对话，其响应展示了深刻的理解和上下文意识。然而，这种复杂性伴随着一个关键的限制：每次对话都是孤立的。模型没有记住先前会话、随时间学习用户偏好或建立过去互动的机制。你可能在周一就投资策略进行了精彩的对话，然后在周二回来时发现代理根本不记得你们讨论过什么。
- en: 'As developers, we understood exactly why this isolation existed, and the answer
    was frustratingly simple: context window constraints. Early GPT models offered
    just a few thousand tokens of context space, roughly equivalent to a few pages
    of text. This space had to accommodate the system prompt, the current conversation
    history, and the user’s latest message. After accounting for these essentials,
    precious little room remained for anything else. We attempted to implement basic
    long-term memory solutions, storing conversation summaries or extracted facts
    in databases and retrieving them during the RAG process. But with the conversation
    itself consuming most of the available tokens and the model requiring substantial
    space for its reasoning and response, you might have only a few hundred tokens
    available for injected memories. Try summarizing weeks of nuanced user interactions
    into a few hundred tokens while maintaining useful context, and you quickly realize
    the futility of the exercise. The technology simply had not matured to the point
    where sophisticated memory architectures were feasible.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 作为开发者，我们确切地理解了这种隔离存在的原因，答案令人沮丧地简单：上下文窗口限制。早期的 GPT 模型只提供了几千个上下文标记的空间，大约相当于几页文本。这个空间必须容纳系统提示、当前的对话历史和用户的最新消息。在考虑到这些基本要素之后，剩下的空间就非常有限了。我们尝试实施基本的长期记忆解决方案，将对话摘要或提取的事实存储在数据库中，并在
    RAG 过程中检索它们。但是，由于对话本身消耗了大部分可用的标记，并且模型需要大量的空间来进行推理和响应，你可能只有几百个标记可用于注入记忆。尝试将几周内细微的用户交互总结成几百个标记，同时保持有用的上下文，你很快就会意识到这项练习的无用。这项技术还没有成熟到能够实现复杂记忆架构的程度。
- en: 'This limitation became increasingly apparent as users attempted to build sustained
    relationships with AI assistants. Developers responded with the simplest possible
    solution: concatenating conversation history into the prompt. If the model could
    not remember previous messages on its own, the application would simply feed them
    back as context. This approach worked for short conversations but immediately
    collided with that same context window ceiling. Any conversation that exceeded
    the token limit required truncation, summarization, or sophisticated strategies
    for selecting which historical messages to retain. Each of these approaches involved
    trade-offs: truncation risked losing critical early context, summarization compressed
    away nuance and detail while increasing latency, and selective retention required
    complex heuristics to determine what mattered most.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户试图与人工智能助手建立持续关系时，这种限制变得越来越明显。开发者以最简单的解决方案做出回应：将对话历史连接到提示中。如果模型无法自己记住之前的消息，应用程序就会简单地将其作为上下文反馈。这种方法适用于简短的对话，但立即遇到了同样的上下文窗口上限。任何超过标记限制的对话都需要截断、摘要或选择性地保留历史消息的复杂策略。这些方法每一种都涉及权衡：截断可能会丢失关键早期上下文，摘要会压缩掉细微和细节，同时增加延迟，而选择性地保留则需要复杂的启发式算法来确定什么最重要。
- en: 'The pressure to extend memory beyond these narrow windows sparked rapid innovation
    in multiple directions simultaneously. The core concept underlying RAG proved
    transformative: introducing data from outside the LLM to help it generate informed
    responses. This seemingly simple idea, retrieving relevant external information
    and injecting it into the context, unlocked the possibility of true long-term
    memory. Rather than cramming everything into the constrained context window, developers
    could store conversation histories and extracted facts in external databases with
    virtually unlimited capacity. The challenge then shifted from storage to retrieval.
    When an agent has accumulated thousands of interactions over months or years,
    finding the handful of memories relevant to the current moment becomes critical.
    RAG’s emphasis on effective retrieval, using semantic similarity search and other
    relevance-ranking techniques, provided the machinery needed to surface pertinent
    memories from vast archives. An agent could now “remember” a conversation from
    six months ago by searching for semantically similar past exchanges and pulling
    only the most relevant portions into the current context.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展记忆超出这些狭窄窗口的压力激发了多方向上的快速创新。RAG背后的核心概念证明了其变革性：引入LLM之外的数据以帮助其生成有见地的响应。这个看似简单的想法，即检索相关外部信息并将其注入上下文，解锁了真正长期记忆的可能性。开发者不再需要将所有内容都塞入受限的上下文窗口，他们可以在几乎无限容量的外部数据库中存储对话历史和提取的事实。挑战随后从存储转向检索。当代理在数月或数年内积累了数千次交互后，找到与当前时刻相关的少数记忆变得至关重要。RAG对有效检索的强调，使用语义相似性搜索和其他相关性排序技术，提供了从大量档案中提取相关记忆所需的机制。现在，代理可以通过搜索语义上相似的过去交流，并将最相关的部分拉入当前上下文，来“记住”六个月前的对话。
- en: Context window sizes grew dramatically in response to user demand and competitive
    pressure. The progression from 4,000 tokens to 8,000, then 32,000, 128,000, and
    eventually over 1 million tokens, suggested that the memory problem might simply
    disappear with sufficient context capacity. Yet, even with massive context windows,
    challenges remained. Including hundreds of pages of conversation history in every
    prompt became prohibitively expensive, increased latency, and paradoxically could
    degrade response quality as models struggled to identify relevant information
    within vast seas of context. The attention mechanism that made transformers so
    powerful also meant that signal could get lost in noise when context windows grew
    too large.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在用户需求和竞争压力的推动下，上下文窗口的大小急剧增长。从4,000个标记增加到8,000，然后是32,000、128,000，最终超过1百万个标记，这表明随着上下文容量的增加，记忆问题可能会简单地消失。然而，即使拥有巨大的上下文窗口，挑战依然存在。在每一个提示中包含数百页的对话历史变得成本高昂，增加了延迟，并且矛盾的是，当模型在浩瀚的上下文中努力识别相关信息时，可能会降低响应质量。使Transformer变得强大的注意力机制也意味着，当上下文窗口变得过大时，信号可能会在噪声中丢失。
- en: 'Parallel to these developments, the agent paradigm emerged as researchers recognized
    that language models could do more than simply respond to queries. Memory has
    always been central to agent development, arguably more so than for any other
    LLM application. The reason is straightforward: agents operate autonomously over
    extended periods, making decisions and taking actions that build upon each other.
    A chatbot can function reasonably well by treating each conversation in isolation,
    but an agent tasked with managing a complex project cannot. It must remember what
    actions it has taken, what outcomes resulted from those actions, what constraints
    it discovered along the way, and what strategies proved effective or ineffective.
    Without robust memory, an agent would repeatedly attempt failed approaches, forget
    critical constraints, and lose track of its own progress. This fundamental requirement
    drove significant innovation in long-term memory architectures. Agent developers
    could not wait for context windows to grow large enough to hold all relevant history.
    They needed sophisticated memory systems that could store vast amounts of operational
    history and surface precisely the right information at decision points. The agent
    use case pushed memory systems beyond simple conversation recall toward tracking
    causal relationships, learning from outcomes, and maintaining coherent goals across
    extended time horizons, capabilities that benefit all memory-augmented applications.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 与这些发展并行，随着研究人员认识到语言模型能够做的不仅仅是简单地响应查询，智能体范式出现了。记忆始终是智能体发展的核心，可能比任何其他LLM应用都更重要。原因很简单：智能体在较长的时间内自主运行，做出基于彼此的决策和采取行动。聊天机器人可以通过将每次对话孤立处理而合理地良好运行，但被分配管理复杂项目的智能体则不能。它必须记住它已经采取的行动、这些行动产生的结果、它沿途发现的约束以及哪些策略有效或无效。没有强大的记忆，智能体将反复尝试失败的方法，忘记关键约束，并失去自己的进度。这一基本需求推动了长期记忆架构的重大创新。智能体开发者不能等待上下文窗口足够大以容纳所有相关历史。他们需要复杂的记忆系统，能够存储大量的操作历史，并在决策点精确地呈现正确的信息。智能体用例推动了记忆系统从简单的对话回忆向追踪因果关系、从结果中学习以及在整个时间范围内保持一致目标的方向发展，这些能力对所有记忆增强应用都有益。
- en: From simple dichotomies to cognitive architectures
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从简单的二分法到认知架构
- en: 'Early attempts to organize agent memory typically employed a straightforward
    binary classification: short-term memory held the immediate conversation context
    within the model’s working space, while long-term memory stored information in
    external databases for later retrieval. Frameworks such as Mem0 represented a
    crucial advance in this paradigm, making long-term memory highly retrievable through
    semantic search while also managing memory evolution over time through automatic
    extraction, deduplication, and consolidation. Mem0 stood as a significant step
    forward in the state of the art, demonstrating that long-term memory could be
    both scalable and practical for production applications. We will examine Mem0’s
    architecture in detail later in this chapter when we compare memory platforms.
    However, even with these advances, the simple short-term versus long-term dichotomy
    proved insufficient as agent applications grew more sophisticated. Different types
    of information required fundamentally different storage and retrieval strategies,
    and the binary distinction failed to capture these nuances.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 早期尝试组织智能体记忆通常采用直接的二进制分类：短期记忆在模型的工怍空间内持有即时对话上下文，而长期记忆则在外部数据库中存储信息以供后续检索。Mem0这样的框架代表了这一范式的重要进步，它通过语义搜索使长期记忆高度可检索，同时通过自动提取、去重和整合来管理记忆随时间的变化。Mem0在技术前沿上迈出了重要的一步，证明了长期记忆既可扩展又适用于生产应用。我们将在本章后面比较记忆平台时详细检查Mem0的架构。然而，即使有了这些进步，简单的短期与长期二分法在智能体应用变得更加复杂时证明是不够的。不同类型的信息需要根本不同的存储和检索策略，而二进制区分未能捕捉到这些细微差别。
- en: Consider the diversity of information an intelligent agent must manage. Raw
    conversation logs differ substantially from distilled facts about user preferences.
    Knowledge of what happened in past interactions serves different purposes than
    knowledge of how to perform specific tasks. Understanding that a user prefers
    concise responses requires different treatment than remembering the specific conversation
    where they expressed this preference. Storing all of this information in undifferentiated
    “long-term memory” made retrieval challenging and often returned irrelevant or
    inappropriate context.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个智能代理必须管理的各种信息。原始对话记录与用户偏好的提炼事实有显著差异。过去交互中发生的事情的知识服务于不同的目的，与如何执行特定任务的知识不同。理解用户喜欢简洁的回复需要不同的处理方式，与记住他们表达这种偏好的具体对话相比。将这些所有信息存储在未区分的“长时记忆”中使得检索变得困难，并且经常返回不相关或不适当的上下文。
- en: 'Researchers began drawing inspiration from cognitive science, where decades
    of research had revealed that human memory operates through multiple specialized
    systems working in concert. Psychologists had long distinguished between different
    memory types: the immediate workspace we use for active reasoning, our repository
    of personal experiences, our general knowledge about the world, and our ability
    to perform learned skills. Each of these systems stores and retrieves information
    differently, optimized for its specific purpose. Episodic memories preserve contextual
    details that help us relive experiences, while semantic memories abstract away
    context to store general facts. Procedural memories operate largely unconsciously,
    guiding our actions without requiring explicit recall.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员开始从认知科学中汲取灵感，几十年的研究揭示了人类记忆是通过多个协同工作的专业系统运作的。心理学家长期以来一直区分不同的记忆类型：我们用于积极推理的即时工作空间、我们个人经验的存储库、我们对世界的普遍知识和我们执行学习技能的能力。这些系统中的每一个都以不同的方式存储和检索信息，针对其特定目的进行了优化。事件记忆保存有助于我们重温经历的上下文细节，而语义记忆抽象出上下文以存储一般事实。程序记忆在很大程度上是无意识的，指导我们的行动而不需要明确的回忆。
- en: This cognitive science foundation led to more sophisticated memory architectures
    for AI agents. Rather than forcing all information into a single long-term store,
    systems could maintain separate memory modules optimized for different information
    types. Conversation logs could flow into episodic stores that preserved temporal
    context and experiential details. Facts extracted from these experiences could
    be distilled into semantic stores optimized for rapid fact retrieval. Behavioral
    patterns and effective strategies could be encoded as procedural knowledge that
    guided agent actions. Each module could employ the storage technology and retrieval
    strategy best suited to its specific function.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这项认知科学基础导致了人工智能代理更复杂的记忆架构。而不是将所有信息强制放入一个单一的长时存储中，系统可以维护针对不同信息类型优化的独立记忆模块。对话记录可以流入保存时间上下文和经验细节的事件存储。从这些经验中提取的事实可以被提炼成针对快速事实检索优化的语义存储。行为模式和有效策略可以作为程序知识编码，指导代理的行动。每个模块都可以采用最适合其特定功能的存储技术和检索策略。
- en: The **Cognitive Architectures for Language Agents** (**CoALA**) framework crystallized
    these insights into a coherent theoretical foundation, providing a common vocabulary
    and conceptual structure for understanding agent memory. By explicitly defining
    working memory, episodic memory, semantic memory, and procedural memory as distinct
    but interacting systems, CoALA gave developers a principled approach to memory
    architecture design. This framework transformed agent memory from an ad hoc collection
    of databases into a thoughtfully designed cognitive system where each component
    serves a specific purpose and contributes to the agent’s overall intelligence.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**认知架构语言代理**（**CoALA**）框架将这些见解结晶为一个连贯的理论基础，为理解代理记忆提供了一个共同的词汇和概念结构。通过明确定义工作记忆、事件记忆、语义记忆和程序记忆为不同的但相互作用的系统，CoALA为开发者提供了一个原则性的记忆架构设计方法。这个框架将代理记忆从随意收集的数据库转变为一个精心设计的认知系统，其中每个组件都服务于特定的目的，并有助于代理的整体智能。'
- en: Several modern frameworks have embraced CoALA’s cognitive architecture explicitly
    in their implementations. LangMem, developed by the LangChain team, provides tools
    specifically designed around CoALA’s memory types, enabling agents to extract
    and organize memories into semantic facts, episodic experiences, and procedural
    knowledge through configurable pipelines. Zep’s Graphiti engine takes this further
    by implementing temporal knowledge graphs that track how episodic and semantic
    memories evolve over time, adding a crucial temporal dimension that CoALA’s original
    framework did not explicitly address. We will examine each of these frameworks
    in depth later in this chapter when comparing memory platform approaches, exploring
    how their architectural choices reflect different interpretations of the CoALA
    framework.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 几个现代框架明确在其实现中采用了CoALA的认知架构。由LangChain团队开发的LangMem，提供了专门针对CoALA内存类型的工具，使代理能够通过可配置的管道提取和组织记忆，将其转化为语义事实、情景经验和程序知识。Zep的Graphiti引擎进一步实现了时间知识图，跟踪情景和语义记忆随时间的变化，为CoALA原始框架未明确解决的问题添加了一个关键的时间维度。我们将在本章后面比较内存平台方法时，深入探讨这些框架，探讨它们的架构选择如何反映对CoALA框架的不同解读。
- en: To understand how these memory types work together to create truly intelligent
    agents, we need to examine each component of the CoALA framework in detail, beginning
    with working memory and progressing through the three long-term memory types that
    enable persistent learning and adaptation.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解这些内存类型如何协同工作以创建真正智能的代理，我们需要详细检查CoALA框架的每个组件，从工作记忆开始，然后逐步过渡到三种长期内存类型，这些长期内存类型使代理能够进行持续的学习和适应。
- en: Core memory types (CoALA framework)
  id: totrans-38
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 核心内存类型（CoALA框架）
- en: The foundation of modern agentic memory systems rests on a cognitive architecture
    that mirrors human memory organization. Just as humans process information through
    distinct memory systems that work in concert, AI agents benefit from a similarly
    structured approach to managing information. The CoALA framework provides this
    structure by defining four fundamental memory types that enable agents to maintain
    context, learn from experience, store knowledge, and execute skilled behaviors.
    Understanding these memory types is essential for building agents that can engage
    in sophisticated, context-aware interactions over extended periods.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现代代理内存系统的基础在于一个反映人类记忆组织的认知架构。正如人类通过协同工作的不同记忆系统处理信息一样，AI代理也受益于一种类似的结构化方法来管理信息。CoALA框架通过定义四种基本内存类型提供了这种结构，使代理能够维持上下文、从经验中学习、存储知识和执行熟练的行为。理解这些内存类型对于构建能够在长时间内进行复杂、上下文感知交互的代理至关重要。
- en: '![Figure 16.1 – The four memory types in the CoALA framework](img/B34736_16_1.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图16.1 – CoALA框架中的四种内存类型](img/B34736_16_1.png)'
- en: Figure 16.1 – The four memory types in the CoALA framework
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.1 – CoALA框架中的四种内存类型
- en: The four memory types include working memory for immediate context and active
    processing, episodic memory for past experiences and events, semantic memory for
    factual knowledge, and procedural memory for skills and behaviors, all interconnected
    and informing each other.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 四种内存类型包括用于即时上下文和主动处理的工作记忆，用于过去经验和事件的情景记忆，用于事实知识的语义记忆，以及用于技能和行为的程序记忆，它们相互连接并相互影响。
- en: Let’s begin by examining how agents manage their immediate operational state
    through working memory.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从考察代理如何通过工作记忆管理其即时操作状态开始。
- en: Working memory (short-term)
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作记忆（短期）
- en: '**Working memory** serves as the agent’s active workspace, holding the immediate
    conversation context and current operational state, much like a computer’s RAM
    holds data for active processing. This memory type maintains recent dialogue turns,
    current goals, intermediate computations, and any information the agent needs
    to persist between reasoning steps. In RAG terms, working memory determines what
    gets included in the retrieval context for each query: not just the user’s immediate
    question, but also the conversation history, current task state, and any recently
    retrieved information that remains relevant.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作记忆**作为代理的主动工作区，持有即时对话上下文和当前操作状态，就像计算机的RAM持有用于主动处理的数据一样。这种内存类型维护最近的对话轮次、当前目标、中间计算以及代理在推理步骤之间需要持续的信息。在RAG术语中，工作记忆决定了每个查询检索上下文中包含的内容：不仅包括用户的即时问题，还包括对话历史、当前任务状态以及任何最近检索的仍相关的信息。'
- en: Importantly, working memory is not formally part of the CoALA framework itself,
    which focuses primarily on long-term memory architectures. However, working memory
    sets the foundation for successful CoALA implementations because it represents
    the source material from which all other memory types derive. The episodic experiences,
    semantic facts, and procedural patterns that populate your long-term stores originate
    from what passes through working memory. From a practical development perspective,
    you need to prioritize working memory quality early in your implementation. If
    the data flowing through your agent’s working memory is incomplete, poorly structured,
    or noisy, every downstream memory extraction and storage operation will suffer.
    We will discuss this further in the *Challenges of implementing CoALA* section.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，工作记忆本身并不是CoALA框架的正式部分，该框架主要关注长期记忆架构。然而，工作记忆是成功实施CoALA的基础，因为它代表了所有其他记忆类型起源的素材。填充你长期存储的情景经历、语义事实和程序模式都源自于通过工作记忆的内容。从实际开发的角度来看，你需要在实施早期就优先考虑工作记忆的质量。如果你的智能体工作记忆中的数据不完整、结构差或噪声大，每个下游的记忆提取和存储操作都会受到影响。我们将在*实施CoALA的挑战*部分进一步讨论这个问题。
- en: 'The challenge with working memory lies in its inherent limitations: language
    models operate within fixed context windows, typically ranging from a few thousand
    to hundreds of thousands of tokens, which means the agent must carefully manage
    what information to retain in this precious space. As conversations progress,
    older information must be summarized or transferred to long-term storage to make
    room for new inputs, requiring sophisticated strategies such as rolling summaries
    or selective retention of key facts. The agent’s ability to maintain coherent
    conversations depends critically on how well it manages this limited working memory,
    balancing the need for immediate context with the constraints of the model’s attention
    mechanism.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 工作记忆的挑战在于其固有的局限性：语言模型在固定的上下文窗口内运行，通常从几千到几十万个标记不等，这意味着智能体必须仔细管理在这个宝贵空间中保留哪些信息。随着对话的进行，旧信息必须被总结或转移到长期存储中，为新输入腾出空间，这需要诸如滚动摘要或选择性保留关键事实等复杂策略。智能体维持连贯对话的能力在很大程度上取决于它如何管理这个有限的短期记忆，平衡即时上下文的需求与模型注意力机制的约束。
- en: While working memory handles the present moment, agents also need to recall
    specific past experiences to inform their current actions, which brings us to
    episodic memory.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当工作记忆处理当前时刻时，智能体还需要回忆特定的过去经历来指导它们当前的行为，这引出了情景记忆的概念。
- en: Episodic memory (experiences/events)
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情景记忆（经历/事件）
- en: '**Episodic memory** captures the agent’s concrete experiences and interactions,
    storing them as discrete events that can be recalled when similar situations arise.
    This memory type preserves past conversations, the solution paths taken to resolve
    queries, and the outcomes of previous decisions, essentially creating a searchable
    history of the agent’s experiences. When a user returns to a topic discussed weeks
    earlier, episodic memory enables the agent to retrieve that specific interaction,
    including not just what was said but also the context and reasoning that led to
    particular responses. For example, a project management assistant might recall
    the specific reasons why a deadline was moved, while a recipe recommendation system
    remembers which cuisines the user enjoyed or found too spicy.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**情景记忆**捕捉智能体的具体经历和互动，将它们存储为离散的事件，当类似情况出现时可以召回。这种记忆类型保留了过去的对话、解决查询所采取的解决方案路径以及先前决策的结果，本质上创建了一个可搜索的智能体经历历史。当用户返回几周前讨论的主题时，情景记忆使智能体能够检索那个特定的互动，包括不仅仅是说过的话，还包括导致特定回应的背景和推理。例如，项目管理助手可能会回忆为什么截止日期被推迟的具体原因，而食谱推荐系统会记住用户喜欢或觉得太辣的菜系。'
- en: 'The power of episodic memory lies in its ability to provide case-based reasoning:
    when facing a new problem, the agent can search for similar past episodes and
    adapt successful solution strategies from those experiences. This represents a
    sophisticated evolution of RAG’s retrieval mechanism. Instead of searching for
    a static document corpus, the agent performs RAG over its own experiential database,
    retrieving not just information but entire problem-solving contexts that can guide
    current decisions. This creates a form of experiential learning where each interaction
    potentially improves future performance, as the agent builds a library of solved
    problems and successful interaction patterns that can guide its behavior in novel
    situations.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 事件记忆的力量在于其提供基于案例的推理能力：当面对新问题时，代理可以搜索类似过去的案例，并从那些经验中适应成功的解决方案策略。这代表了RAG检索机制的复杂进化。代理不是在静态的文档语料库中搜索，而是在自己的经验数据库上执行RAG，检索的不仅仅是信息，还有整个问题解决背景，这可以指导当前的决策。这创造了一种经验学习形式，其中每次互动都可能改善未来的表现，因为代理构建了一个已解决问题和成功互动模式的库，这可以指导其在新情况下的行为。
- en: Beyond specific experiences, agents require a more abstract understanding of
    facts and concepts, which is where semantic memory becomes crucial.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 除了具体经验之外，代理还需要对事实和概念有更抽象的理解，这正是语义记忆变得至关重要的地方。
- en: Semantic memory (facts/knowledge)
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语义记忆（事实/知识）
- en: '**Semantic memory** houses the agent’s factual knowledge base, encompassing
    both general world knowledge and user-specific information that persists across
    sessions. This memory type stores structured facts like a user’s preferences,
    biographical details, and domain-specific knowledge, as well as broader conceptual
    understanding about the world. The distinction between user-specific and community
    knowledge within semantic memory is particularly important. While community semantic
    memory might contain general facts about financial markets, scientific principles,
    or coding best practices accessible to all users, personal semantic memory holds
    individual details. In finance, this might be investment goals; in healthcare,
    allergies and medical history; in e-commerce, style preferences and sizing information;
    or in education, learning pace and preferred study methods.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**语义记忆**存储代理的事实知识库，包括通用的世界知识和在会话之间持续存在的用户特定信息。这种记忆类型存储结构化事实，如用户的偏好、传记细节和特定领域的知识，以及关于世界的更广泛的概念理解。在语义记忆中，用户特定知识与社区知识之间的区别尤为重要。虽然社区语义记忆可能包含所有用户都能访问的关于金融市场、科学原理或编码最佳实践的普遍事实，但个人语义记忆则持有个人细节。在金融领域，这可能涉及投资目标；在医疗保健领域，过敏和病史；在电子商务领域，风格偏好和尺寸信息；或在教育领域，学习速度和首选的学习方法。'
- en: 'This dual nature allows agents to provide both informed general advice and
    deeply personalized responses. Semantic memory often leverages knowledge graphs
    to represent relationships between concepts, enabling the agent to traverse connections
    and make inferences that go beyond simple fact retrieval. This enhances traditional
    RAG by enabling multi-hop reasoning: a RAG query might first retrieve a user’s
    investment goals, then use graph traversal to find related risk factors, and finally,
    retrieve relevant market analysis, all in a single RAG cycle. The continuous updating
    of semantic memory as new facts are learned or corrected ensures that the agent’s
    knowledge base remains current and accurate.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这种双重特性使得代理能够提供既全面又个性化的建议和回应。语义记忆通常利用知识图谱来表示概念之间的关系，使代理能够遍历连接并做出超越简单事实检索的推理。这通过实现多跳推理增强了传统的RAG（Retrieval-Augmented
    Generation）：一个RAG查询可能首先检索用户的投资目标，然后使用图遍历找到相关的风险因素，最后在单个RAG周期内检索相关的市场分析。随着新事实的学习或纠正而持续更新语义记忆，确保代理的知识库保持最新和准确。
- en: The final piece of the memory puzzle involves the agent’s understanding of how
    to perform tasks, encoded in procedural memory.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆拼图中最后一块涉及代理对如何执行任务的理解，这些理解编码在程序性记忆中。
- en: Procedural memory (skills)
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 程序性记忆（技能）
- en: '**Procedural memory** encodes the agent’s operational knowledge, including
    the rules, workflows, and behavioral patterns that guide its actions. This memory
    type encompasses both the implicit skills embedded in the model’s training and
    the explicit procedures defined through prompts, tools, and coded routines. While
    the other memory types focus on what the agent knows, procedural memory determines
    how the agent acts: the step-by-step processes for conducting analyses, the conversation
    management strategies it employs, and the problem-solving approaches it applies
    to different scenarios. In practice, procedural memory manifests as system prompts
    that define the agent’s behavior, tool-use patterns that determine when and how
    to invoke external capabilities, and learned refinements based on feedback. This
    includes sophisticated RAG strategies: when to trigger retrieval, how to formulate
    retrieval queries based on context, which memory stores to search for different
    query types, and how to blend retrieved memories with the base model’s knowledge.
    Unlike other memory types that primarily store information, procedural memory
    shapes the agent’s behavior directly, and updating it requires careful consideration
    since changes can fundamentally alter how the agent operates. The challenge lies
    in making procedural memory adaptable enough to improve over time while maintaining
    stability and predictability in the agent’s core behaviors.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**程序性记忆**编码智能体的操作知识，包括指导其行动的规则、工作流程和行为模式。这种记忆类型包括模型训练中嵌入的隐性技能和通过提示、工具和编码程序定义的显式程序。虽然其他记忆类型关注智能体知道什么，但程序性记忆决定了智能体的行为：进行分析的逐步过程、它采用的对话管理策略以及应用于不同场景的问题解决方法。在实践中，程序性记忆表现为定义智能体行为的系统提示、确定何时以及如何调用外部能力的工具使用模式，以及基于反馈的学习改进。这包括复杂的RAG策略：何时触发检索、如何根据上下文制定检索查询、搜索不同查询类型的内存存储以及如何将检索到的记忆与基础模型的知识融合。与主要存储信息的其他记忆类型不同，程序性记忆直接塑造智能体的行为，更新它需要仔细考虑，因为变化可以从根本上改变智能体的操作方式。挑战在于使程序性记忆足够适应，以随着时间的推移进行改进，同时保持智能体核心行为的稳定性和可预测性。'
- en: With these four memory types working together, agents can maintain immediate
    context, recall past experiences, access broad knowledge, and execute sophisticated
    behaviors, creating a rich cognitive architecture for sustained intelligent interaction.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这四种记忆类型协同工作，使智能体能够维持即时情境，回忆过去经验，访问广泛知识，并执行复杂行为，从而为持续智能交互创建一个丰富的认知架构。
- en: '**Fun fact**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**'
- en: '**What is the CoALA framework?**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是CoALA框架？**'
- en: 'The CoALA framework, introduced by researchers at Princeton and other institutions
    in 2024, represents a systematic approach to understanding and building language-based
    AI agents. Drawing inspiration from cognitive science, CoALA provides a unified
    conceptual framework that breaks down agent cognition into distinct but interacting
    memory systems and processing modules. The framework explicitly defines how agents
    should handle working memory for immediate tasks, episodic memory for past experiences,
    semantic memory for factual knowledge, and procedural memory for skills and behaviors.
    What makes CoALA particularly valuable is its emphasis on the interactions between
    these memory types: it shows how working memory pulls from long-term stores, how
    episodic experiences can crystallize into semantic knowledge, and how procedural
    routines orchestrate the use of all memory systems. By providing this structured
    approach, CoALA helps developers move beyond ad hoc agent designs toward more
    principled architectures that can scale in complexity while maintaining coherent
    behavior. The framework has become influential in the agent development community
    because it bridges the gap between theoretical cognitive models and practical
    implementation strategies for modern LLM-based systems.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年由普林斯顿大学和其他机构的研究人员提出的CoALA框架，代表了一种理解和构建基于语言的AI智能体的系统方法。从认知科学中汲取灵感，CoALA提供了一个统一的概念框架，将智能体认知分解为不同但相互作用的记忆系统和处理模块。该框架明确定义了智能体应该如何处理工作记忆以应对即时任务，情景记忆以应对过去经验，语义记忆以应对事实知识，以及程序记忆以应对技能和行为。使CoALA特别有价值的是其对这些记忆类型之间相互作用的强调：它展示了工作记忆如何从长期存储中提取，情景经验如何结晶为语义知识，以及程序常规如何协调所有记忆系统的使用。通过提供这种结构化方法，CoALA帮助开发者超越临时的智能体设计，转向更原则性的架构，这种架构可以在复杂性增加的同时保持一致的行为。该框架在智能体开发社区中产生了重大影响，因为它弥合了理论认知模型与现代基于LLM系统的实际实施策略之间的差距。
- en: Memory scope dimensions
  id: totrans-63
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 记忆范围维度
- en: 'Having established the four fundamental types of memory that agents utilize,
    we must now consider another critical dimension: the scope of access to these
    memories. Just as human societies balance individual knowledge with collective
    wisdom, agent systems must carefully manage which memories belong to specific
    users versus those that benefit the entire community. This scope dimension intersects
    with each memory type to create a nuanced matrix of memory categories that enables
    both personalization and shared learning.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在确立了智能体使用的四种基本记忆类型之后，我们现在必须考虑另一个关键维度：对这些记忆的访问范围。正如人类社会在个人知识与集体智慧之间取得平衡一样，智能体系统必须仔细管理哪些记忆属于特定用户，哪些记忆对整个社区有益。这个范围维度与每种记忆类型相交，形成了一个细致的记忆类别矩阵，它既实现了个性化，又促进了共享学习。
- en: 'Consider how a financial advisor combines industry-wide best practices with
    intimate knowledge of each client’s unique situation. AI agents face the same
    challenge: they must draw from broad, shared knowledge while maintaining strict
    boundaries around personal information. This balance between collective intelligence
    and individual privacy shapes how modern memory systems are architected.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下金融顾问如何将行业最佳实践与对每位客户独特情况的深入了解相结合。AI智能体面临着同样的挑战：它们必须从广泛共享的知识中汲取，同时严格保护个人信息的边界。这种集体智慧与个人隐私之间的平衡塑造了现代记忆系统的架构。
- en: Let’s explore this by first examining memories that serve the collective good.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先通过考察服务于集体利益的记忆来探讨这个问题。
- en: Community/public memory – shared across all users
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社区/公共记忆 - 由所有用户共享
- en: Community memory represents the collective intelligence of an agent system,
    encompassing shared knowledge that benefits all users while preserving individual
    privacy. This shared repository contains general facts about the world, domain
    expertise, best practices, and, perhaps most valuably, aggregated insights derived
    from anonymized user interactions. When one user’s agent discovers an effective
    solution, this knowledge can be abstracted and shared—for example, in customer
    support, finding an effective troubleshooting sequence for a common software issue;
    in education, identifying a particularly clear way to explain a complex concept;
    or in finance, discovering a common misconception about tax deductions.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 社区记忆代表了代理系统的集体智慧，包括对所有用户有益的共享知识，同时保护个人隐私。这个共享库包含关于世界的普遍事实、领域专业知识、最佳实践，以及从匿名化用户交互中得出的宝贵见解。当某个用户的代理发现有效的解决方案时，这种知识可以被抽象化并共享——例如，在客户支持中，找到解决常见软件问题的有效故障排除序列；在教育中，确定解释复杂概念的特别清晰方式；或在金融中，发现关于税收抵扣的常见误解。
- en: The power of community memory lies in its ability to accelerate learning across
    the entire user base. Rather than each agent independently discovering patterns,
    such as users confusing similar technical terms, visual learners benefiting from
    diagrams, or customers frequently needing help with the same software features,
    these insights propagate through the shared memory layer.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 社区记忆的力量在于其能够加速整个用户基础的学习。而不是每个代理独立地发现模式，例如用户混淆类似的技术术语、视觉学习者受益于图表，或客户经常需要帮助相同的软件功能，这些见解通过共享记忆层传播。
- en: However, the process of promoting knowledge from personal to community memory
    requires careful curation. Systems must employ sophisticated anonymization techniques,
    extracting patterns and insights while stripping away any identifying information.
    For instance, if multiple users in a geographic region ask about specific local
    tax regulations, the system might add this as community knowledge tagged to that
    region, without revealing which specific users raised the questions. Some frameworks
    even require a threshold of similar experiences across multiple users before promoting
    a pattern to community memory, ensuring both statistical significance and privacy
    protection.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，将知识从个人记忆提升到社区记忆的过程需要谨慎的整理。系统必须采用复杂的匿名化技术，在提取模式和洞察的同时，去除任何识别信息。例如，如果某个地理区域内多个用户询问特定的地方税收法规，系统可能会将此作为标记在该地区的社区知识添加，而不透露哪些具体用户提出了问题。某些框架甚至要求在多个用户之间达到相似经验的阈值，才将模式提升到社区记忆，确保统计意义和隐私保护。
- en: While community memory provides the broad foundation of knowledge, true personalization
    requires memories that belong exclusively to individual users.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然社区记忆提供了知识的基础，但真正的个性化需要属于个别用户的独特记忆。
- en: Personal/user-specific memory – individual context
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 个人/用户特定记忆 – 个体上下文
- en: 'Personal memory encompasses the intimate knowledge an agent accumulates about
    a specific user through their interactions. This includes not just the explicit
    facts a user shares, such as their age, investment goals, or risk tolerance, but
    also implicit patterns gleaned from their behavior: their communication style
    preferences, the times they typically engage with the system, the types of examples
    that resonate with them, and the concerns that keep surfacing in their questions.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 个人记忆包括代理通过与其特定用户的互动积累的亲密知识。这不仅仅包括用户分享的明确事实，如他们的年龄、投资目标或风险承受能力，还包括从他们的行为中获得的隐含模式：他们的沟通风格偏好、他们通常与系统互动的时间、与他们产生共鸣的例子类型，以及反复出现在他们问题中的关注点。
- en: The depth of personal memory enables truly individualized interactions. When
    a user returns after weeks away, the agent can seamlessly continue previous conversations,
    remembering not just what was discussed but how it was discussed. If a user previously
    indicated they prefer concise, bullet-pointed summaries over detailed explanations,
    the agent adapts its communication style accordingly. In healthcare, if a patient
    has expressed a phobia of needles, the agent can suggest alternative testing methods.
    In e-learning, if a student struggles with morning sessions, the system can recommend
    afternoon study times. In finance, if someone has expressed anxiety about market
    volatility, the agent can proactively address these concerns.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 个人记忆的深度使得真正个性化的交互成为可能。当用户在离开几周后返回，代理可以无缝地继续之前的对话，不仅记得讨论了什么，还记得如何讨论。如果一个用户之前表示他们更喜欢简洁的、以项目符号形式呈现的摘要而不是详细的解释，代理会相应地调整其沟通风格。在医疗保健领域，如果一个患者表示对针头有恐惧，代理可以建议替代的检测方法。在电子学习领域，如果一个学生在早晨的会话中遇到困难，系统可以推荐下午的学习时间。在金融领域，如果有人表示对市场波动感到焦虑，代理可以主动解决这些担忧。
- en: 'Privacy and data isolation stand as paramount concerns in personal memory management.
    Each user’s memories must exist in a completely segregated namespace, with robust
    access controls preventing any possibility of cross-contamination. Modern systems
    achieve this through various mechanisms: separate database schemas per user, encrypted
    storage with user-specific keys, or careful metadata tagging with strict query
    filters. The challenge intensifies in multi-tenant systems where thousands or
    millions of users share the same infrastructure, requiring both logical and sometimes
    physical separation of memory stores.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私和数据隔离是个人记忆管理中的首要关注点。每个用户的记忆必须存在于一个完全隔离的命名空间中，强大的访问控制可以防止任何交叉污染的可能性。现代系统通过各种机制实现这一点：每个用户都有自己的数据库模式，使用用户特定的密钥进行加密存储，或者通过严格的查询过滤器进行仔细的元数据标记。在多租户系统中，挑战加剧，数千或数百万用户共享相同的基础设施，需要逻辑上和有时物理上分离内存存储。
- en: The personal memory also raises important questions about data retention and
    user control. Users must be able to review, correct, and delete their personal
    memories, not just for regulatory compliance but for maintaining trust. Some systems
    implement memory decay, where older, unused memories gradually fade unless reinforced
    through continued relevance, mimicking the human forgetting curve while ensuring
    the system doesn’t become cluttered with outdated information.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 个人记忆也提出了关于数据保留和用户控制的重要问题。用户必须能够审查、纠正和删除他们的个人记忆，这不仅是为了符合监管要求，也是为了维护信任。一些系统实现了记忆衰减，其中较旧且未使用的记忆会逐渐消失，除非通过持续的关联性得到强化，从而模仿人类遗忘曲线，同时确保系统不会因过时信息而变得杂乱。
- en: Understanding how these two scopes interact with each memory type reveals the
    full complexity of modern memory architectures.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这两个作用域如何与每种记忆类型相互作用，揭示了现代内存架构的全部复杂性。
- en: How memory types and scopes intersect
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何记忆类型和作用域相交
- en: The intersection of memory types with scope dimensions creates distinct categories
    that shape the agent’s cognitive architecture. However, not all memory types are
    split across both scopes. Working memory stands apart as an exclusively personal
    construct, being inherently temporary and session-specific. It holds only the
    immediate context of a single user’s conversation within the model’s context window.
    While working memory itself cannot be shared across users (since each conversation
    exists in its own isolated context), the patterns observed across many working
    memory sessions can inform community-level procedural memory about optimal conversation
    flows, query formulation strategies, and context management techniques.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆类型与作用域维度的交集创造了不同的类别，这些类别塑造了代理的认知架构。然而，并非所有记忆类型都跨越了两个作用域。工作记忆作为一个纯粹的个人结构而独立存在，本质上具有暂时性和会话特定性。它只持有单个用户在模型上下文窗口内的即时对话上下文。虽然工作记忆本身不能在用户之间共享（因为每个对话都存在于其自己的孤立上下文中），但观察到的许多工作记忆会话模式可以告知社区层面的程序记忆关于最佳对话流程、查询制定策略和上下文管理技术。
- en: For the three long-term memory types (episodic, semantic, and procedural), the
    community/personal split creates six distinct categories that work together to
    enable both shared learning and personalization. Each memory type manifests differently
    across the two scopes, serving unique purposes in the agent’s architecture.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对于三种长期记忆类型（事件、语义和程序），社区/个人分割创建了六个不同的类别，它们共同工作以实现共享学习和个性化。每种记忆类型在两个范围中表现不同，在代理的架构中发挥着独特的作用。
- en: Episodic memory similarly splits across scopes. Public/community episodic memory
    might contain anonymized case studies or successful problem-solving patterns that
    emerged across many users, while personal episodic memory preserves the specific
    conversations and experiences of an individual user. This enables agents to learn
    from collective experiences while maintaining the privacy and specificity of individual
    interactions.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 事件记忆同样在范围上进行了分割。公共/社区事件记忆可能包含匿名案例研究或许多用户中出现的成功问题解决模式，而个人事件记忆则保留了单个用户的特定对话和经历。这使得代理能够从集体经验中学习，同时保持个人交互的隐私和特定性。
- en: 'Procedural memory’s split proves particularly interesting and less common in
    practice. Community procedural memory encompasses the shared “best practices”
    for task execution that the system has learned or been programmed with, such as
    the most effective sequence for debugging code errors, explaining mathematical
    concepts, or guiding users through form completion. Personal procedural memory,
    though rarer, might include user-specific adaptations: “For this user, always
    provide a visual example after introducing a new concept” or “This user prefers
    to see worst-case scenarios before best-case projections.” These personalized
    procedures essentially customize the agent’s RAG strategies per user.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 程序记忆的分割在实践中特别有趣且较为罕见。社区程序记忆包括系统学习或编程中共享的“最佳实践”，例如调试代码错误的最高效序列、解释数学概念或指导用户完成表单的最佳方法。个人程序记忆虽然较为罕见，但可能包括用户特定的调整：“对于这个用户，在介绍新概念后始终提供视觉示例”或“这个用户更喜欢在最佳情况预测之前看到最坏情况。”这些个性化的程序实际上为每个用户定制了代理的RAG策略。
- en: These six categories, plus working memory, create powerful synergies in practice.
    When answering a complex question, an agent orchestrates retrieval across multiple
    memory types and scopes. For example, a healthcare assistant helping with treatment
    options might draw upon community semantic memory for medical knowledge, community
    episodic memory for successful treatment patterns, personal semantic memory for
    the patient’s medical history, and personal episodic memory for previous discussions
    about treatment preferences. Similarly, a coding assistant might combine language
    documentation (community semantic), common debugging patterns (community episodic),
    the user’s project structure (personal semantic), and past debugging sessions
    (personal episodic). The response synthesizes collective wisdom with individual
    context, delivering advice that is both expertly informed and personally relevant.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这六个类别加上工作记忆，在实践中创造了强大的协同效应。当回答一个复杂问题时，代理会在多个记忆类型和范围内进行检索。例如，一个帮助治疗选择的医疗助手可能会利用社区语义记忆中的医学知识、社区事件记忆中的成功治疗模式、个人语义记忆中的患者的医疗历史，以及个人事件记忆中关于治疗偏好的先前讨论。同样，一个编码助手可能会结合语言文档（社区语义）、常见的调试模式（社区事件）、用户的项目结构（个人语义）和过去的调试会话（个人事件）。响应综合了集体智慧与个人上下文，提供既专业又与个人相关的建议。
- en: With these four memory types working together, agents can maintain immediate
    context, recall past experiences, access broad knowledge, and execute sophisticated
    behaviors, creating a rich cognitive architecture for sustained intelligent interaction.
    However, the elegance of CoALA’s theoretical framework belies the practical difficulties
    of implementation. Before we examine how different platforms have tackled these
    challenges, we must first understand the common obstacles that developers face
    when translating CoALA concepts into production systems.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这四种记忆类型共同工作，使代理能够维持即时上下文，回忆过去经历，访问广泛的知识，并执行复杂的行为，为持续的智能交互创造丰富的认知架构。然而，CoALA理论框架的优雅掩盖了实施的实际困难。在我们考察不同平台如何应对这些挑战之前，我们必须首先了解开发者在将CoALA概念转化为生产系统时面临的共同障碍。
- en: '**Fun fact: Relationship between semantic caches and public episodic memory**'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实：语义缓存与公共事件记忆之间的关系**'
- en: We just described “public episodic memory” as memory that “might contain anonymized
    case studies or successful problem-solving patterns that emerged across many users.”
    Where else have we seen this pattern? With semantic caches in the last chapter!
    With a semantic cache, you are taking incoming queries (or synthesizing new queries
    you expect to be asked) and setting up the infrastructure to handle that query,
    typically matching an incoming query with an existing query from the semantic
    cache list (using vector search). If it doesn’t match, we even showed how to set
    it up to populate the database with the query so that it matches the next time
    it is asked. With episodic memory, however, we talk about taking the queries (and
    responses) from a user’s chat history, and where our orchestrator agent has figured
    out the solution path for us, and potentially converting it to public episodic
    memory so that we can handle it in the same way the next time it is requested
    by any user. This is essentially the same concept! So, if you were wondering whether
    the episodic memory mechanism can replace your semantic cache in an even more
    robust way, the answer is yes! We will show how this works in a code lab in the
    next chapter!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚描述了“公开情景记忆”是指“可能包含匿名案例研究或成功的问题解决模式，这些模式在许多用户中产生。”我们在哪里还看到过这种模式？在上一个章节中的语义缓存！使用语义缓存时，你正在处理传入的查询（或合成你预期会被询问的新查询），并建立处理该查询的基础设施，通常是将传入的查询与语义缓存列表中的现有查询相匹配（使用向量搜索）。如果不匹配，我们甚至展示了如何设置它以填充数据库中的查询，以便下次被询问时能够匹配。然而，在情景记忆中，我们谈论的是从用户的聊天历史中提取查询（和响应），以及我们的编排智能体已经为我们找到了解决方案路径，并且可能将其转换为公开情景记忆，以便我们下次任何用户请求时能够以相同的方式处理它。这本质上是一个相同的概念！所以，如果你想知道情景记忆机制是否可以以更稳健的方式替换你的语义缓存，答案是肯定的！我们将在下一章的代码实验室中展示这是如何工作的！
- en: Challenges of implementing CoALA
  id: totrans-87
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施CoALA的挑战
- en: While the CoALA framework provides an elegant theoretical foundation for organizing
    agent memory, translating these concepts into production systems presents several
    practical challenges that developers must address upfront to avoid significant
    refactoring and performance issues at scale.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 CoALA 框架为组织智能体记忆提供了一个优雅的理论基础，但将这些概念转化为生产系统则带来了几个实际挑战，开发者必须提前解决这些问题，以避免在规模扩大时出现重大的重构和性能问题。
- en: Quality of working memory data
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作记忆数据的质量
- en: 'The most fundamental challenge lies in working memory data quality, as this
    raw material feeds all downstream memory extraction. Chat history logs, the typical
    source of working memory, were rarely designed for agentic memory. They were built
    for debugging or compliance, capturing message text and timestamps but missing
    rich contextual information such as tool invocations, reasoning traces, confidence
    levels, or external data consultations. When memory extraction pipelines attempt
    to derive semantic facts or episodic experiences from these impoverished logs,
    they operate with incomplete information. Improving working memory quality requires
    instrumenting your agent pipeline to capture richer event streams: tool calls
    with parameters and results, retrieved context with relevance scores, internal
    reasoning steps, and state changes during processing. This telemetry provides
    the context that memory extraction models need to generate meaningful long-term
    memories.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 最基本的挑战在于工作记忆数据的质量，因为这种原材料为所有下游的记忆提取提供支持。聊天历史记录，工作记忆的典型来源，很少是为智能体记忆而设计的。它们是为了调试或合规而构建的，捕获消息文本和时间戳，但缺少丰富的上下文信息，如工具调用、推理跟踪、置信度水平或外部数据咨询。当记忆提取管道试图从这些贫瘠的日志中推导出语义事实或情景经验时，它们是在不完整的信息下操作的。提高工作记忆质量需要对你的智能体管道进行仪器化，以捕获更丰富的事件流：带有参数和结果的工具调用、检索到的上下文及其相关性评分、内部推理步骤以及处理过程中的状态变化。这种遥测提供了记忆提取模型生成有意义的长期记忆所需的上下文。
- en: Collecting comprehensive user experience events
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 收集全面的用户体验事件
- en: 'Chat history alone does not capture the full scope of user interactions. Users
    engage through multiple channels: clicking buttons, navigating menus, adjusting
    settings, or interacting with visualizations. When a user clicks “save” after
    receiving a recommendation, that signals approval more clearly than verbal acknowledgment.
    When they dismiss an unread notification, that reveals preferences. Users naturally
    expect agents to be aware of these interactions, yet many implementations focus
    exclusively on text-based conversation. Building a comprehensive event collection
    system requires mapping every interaction touchpoint and identifying which events
    indicate user preferences, signal approval or disapproval, reveal task completion
    patterns, or provide context for subsequent turns. The goal is to ensure significant
    user actions outside the chat interface contribute to the agent’s evolving understanding.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 仅聊天历史无法捕捉用户互动的全貌。用户通过多个渠道进行互动：点击按钮、导航菜单、调整设置或与可视化进行交互。当用户在收到推荐后点击“保存”，这比口头认可更能清楚地表示同意。当他们忽略未读通知时，这揭示了他们的偏好。用户自然期望代理能够意识到这些互动，然而许多实现仅专注于基于文本的对话。构建一个全面的事件收集系统需要映射每个交互接触点，并确定哪些事件表明用户偏好、信号同意或不同意、揭示任务完成模式或为后续轮次提供上下文。目标是确保聊天界面之外的重要用户行为有助于代理不断发展的理解。
- en: Curation and maintenance of growing memory stores
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管理和维护不断增长的内存存储
- en: 'As memory collections grow, curation challenges emerge, particularly memory
    sclerosis, where older, outdated memories dominate retrieval results. Vector similarity
    search does not understand temporal relevance, so a two-year-old preference memory
    might surface despite being completely outdated. Memory curation requires active
    management: consolidation mechanisms that merge related memories, decay strategies
    where older memories lose retrieval priority unless reinforced, conflict resolution
    for contradictory information, and cleanup processes for archiving stale data.
    Different memory types age differently, with semantic facts remaining stable for
    years while episodic memories quickly lose relevance, so one-size-fits-all approaches
    inevitably fail. Successful CoALA implementations treat curation as an ongoing
    operational concern with monitoring systems, automated consolidation pipelines,
    and feedback loops that improve memory quality based on retrieval effectiveness.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 随着记忆集合的增长，出现了一些管理挑战，尤其是记忆硬化，其中较老、过时的记忆主导了检索结果。向量相似性搜索不理解时间相关性，因此即使完全过时，两年前的偏好记忆也可能出现。记忆管理需要积极的管理：合并相关记忆的巩固机制、使较老记忆失去检索优先级的衰减策略（除非得到强化）、解决矛盾信息的冲突解决以及清理过时数据的归档过程。不同的记忆类型老化速度不同，语义事实可能稳定数年，而情景记忆很快就会失去相关性，因此一刀切的方法必然失败。成功的CoALA实现将管理视为一个持续的操作问题，包括监控系统、自动巩固管道和反馈循环，这些反馈循环根据检索效果提高记忆质量。
- en: These implementation challenges, from ensuring high-quality working memory to
    comprehensive event collection to sustainable memory curation, represent the gap
    between CoALA’s theoretical elegance and production reality. Different development
    teams have approached these problems with varying strategies, resulting in a diverse
    ecosystem of memory frameworks. Each framework makes distinct architectural choices
    about how to extract, store, retrieve, and maintain memories, reflecting different
    priorities and use cases. By comparing how leading frameworks have tackled these
    challenges, we can better understand the trade-offs involved and identify which
    approaches best suit specific application requirements.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这些实现挑战，从确保高质量的工作记忆到全面的事件收集再到可持续的记忆管理，代表了CoALA理论上的优雅与生产现实之间的差距。不同的开发团队以不同的策略来处理这些问题，从而产生了多样化的记忆框架生态系统。每个框架都做出了独特的架构选择，关于如何提取、存储、检索和维护记忆，反映了不同的优先级和用例。通过比较领先框架如何应对这些挑战，我们可以更好地理解其中的权衡，并确定哪些方法最适合特定的应用需求。
- en: Comparing three memory framework approaches
  id: totrans-96
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 比较三种记忆框架方法
- en: The memory framework landscape has evolved to include both systems that align
    explicitly with CoALA’s cognitive architecture and those that take more pragmatic
    approaches. Mem0 represents the culmination of short-term/long-term memory dichotomy
    approaches, providing sophisticated unified storage without cognitive type distinctions.
    LangMem implements explicit CoALA memory type separation with dedicated extraction
    and management pipelines for each category. Zep, powered by the Graphiti knowledge
    graph engine, extends CoALA’s episodic and semantic memory concepts with temporal
    awareness but notably lacks procedural memory support. Each framework addresses
    different technical requirements and implementation complexities. Let’s begin
    with Mem0’s streamlined approach to memory management.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆框架领域已经发展到包括既与 CoALA 的认知架构明确对齐又采取更实用方法的系统。Mem0 代表了短期/长期记忆二分法方法的顶峰，提供了没有认知类型区分的复杂统一存储。LangMem
    通过为每个类别提供专门的提取和管理管道，显式实现了 CoALA 记忆类型的分离。由 Graphiti 知识图谱引擎驱动的 Zep，扩展了 CoALA 的情景和语义记忆概念，但明显缺乏程序性记忆支持。每个框架都针对不同的技术要求和实现复杂性。让我们从
    Mem0 的内存管理简化方法开始。
- en: Mem0 architecture
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Mem0 架构
- en: 'Mem0 implements an extract-update-retrieve pipeline that continuously refines
    its memory corpus through interaction. The system employs LLM-based extraction
    to identify salient facts from conversations, then maintains these memories through
    automated deduplication, consolidation, and conflict resolution. The architecture
    uses hybrid storage: key-value stores for structured fact retrieval, vector databases
    for semantic similarity search, and optionally graph databases (via Mem0g) for
    complex entity relationships. This polyglot approach optimizes for retrieval performance
    rather than cognitive categorization.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Mem0 实现了一个提取-更新-检索管道，通过交互不断优化其记忆语料库。系统使用基于 LLM 的提取来识别对话中的显著事实，然后通过自动去重、合并和冲突解决来维护这些记忆。该架构使用混合存储：键值存储用于结构化事实检索，向量数据库用于语义相似性搜索，以及可选的图数据库（通过
    Mem0g）用于复杂实体关系。这种多语言方法优化了检索性能，而不是认知分类。
- en: 'The framework treats all long-term memories as a unified store, applying the
    same extraction and retrieval logic regardless of whether information represents
    facts, experiences, or behavioral patterns. Memory updates occur through a two-phase
    pipeline: extraction identifies new information from conversation turns, while
    the update phase merges, invalidates, or consolidates existing memories based
    on semantic similarity and temporal recency. The system implements memory decay
    through configurable expiration dates and conflict-based invalidation when contradictory
    information arrives.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 该框架将所有长期记忆视为一个统一的存储库，无论信息代表事实、经验还是行为模式，都应用相同的提取和检索逻辑。记忆更新通过两阶段管道进行：提取阶段从对话轮次中识别新信息，而更新阶段基于语义相似性和时间近度合并、无效化或巩固现有记忆。系统通过可配置的到期日期和基于冲突的无效化来实施记忆衰减，当出现矛盾信息时。
- en: Mem0’s benchmark results on LOCOMO demonstrate 26% accuracy improvement over
    OpenAI’s memory implementation while reducing both latency and token consumption
    by approximately 90% compared to full-context baselines. Production adoption metrics
    (41,000+ GitHub stars, 186M+ monthly API calls) validate the approach’s practical
    effectiveness. For applications where explicit episodic/semantic/procedural distinctions
    provide minimal benefit over unified memory management, Mem0’s simplified architecture
    reduces implementation complexity while maintaining strong retrieval performance.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: Mem0 在 LOCOMO 上的基准测试结果表明，与 OpenAI 的记忆实现相比，准确率提高了 26%，同时与全上下文基线相比，降低了大约 90% 的延迟和令牌消耗。生产采用指标（41,000+
    GitHub 星标，1.86 亿+每月 API 调用）验证了该方法的实际有效性。对于那些显式情景/语义/程序区分对统一内存管理提供的益处微乎其微的应用，Mem0
    的简化架构降低了实现复杂性，同时保持了强大的检索性能。
- en: Having seen Mem0’s pragmatic approach to unified long-term memory, we can contrast
    it with LangMem’s explicit implementation of CoALA-based memory type distinctions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在看到 Mem0 对统一长期记忆的实用方法后，我们可以将其与 LangMem 的基于 CoALA 的记忆类型区分的显式实现进行对比。
- en: LangMem
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangMem
- en: 'LangMem directly instantiates CoALA’s memory type taxonomy through separate
    storage namespaces and extraction pipelines. The framework provides distinct APIs
    for each memory category: semantic memory operations store and retrieve facts
    using vector similarity, episodic memory maintains conversational sequences for
    few-shot retrieval, and procedural memory modifies system prompts to encode learned
    behaviors. This separation enables memory-type-specific optimization: semantic
    memories use aggressive deduplication and consolidation, episodic memories preserve
    full conversational context for case-based reasoning, and procedural memories
    apply prompt optimization algorithms to refine agent instructions.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem 通过单独的存储命名空间和提取管道直接实例化 CoALA 的内存类型分类法。该框架为每个内存类别提供不同的 API：语义记忆操作使用向量相似性存储和检索事实，情节记忆维护会话序列以进行少样本检索，程序性记忆修改系统提示以编码学习行为。这种分离使内存类型特定的优化成为可能：语义记忆使用积极的去重和合并，情节记忆保留完整的会话上下文以进行基于案例的推理，程序性记忆应用提示优化算法以细化代理指令。
- en: Memory formation occurs through two operational modes. Hot-path updates allow
    agents to explicitly manage memories during conversations via tool calls, providing
    immediate memory formation with full agent context. Background extraction runs
    asynchronously after conversations complete, applying more computationally intensive
    analysis to extract memories without impacting response latency. The framework
    supports multiple procedural memory optimization strategies, including metaprompt-based
    reflection, gradient-style critique-then-update approaches, and single-step prompt
    refinement.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆形成通过两种操作模式发生。热路径更新允许代理在会话期间通过工具调用显式管理记忆，提供带有完整代理上下文的即时记忆形成。背景提取在会话完成后异步运行，应用更计算密集型的分析以提取记忆，而不影响响应延迟。该框架支持多种程序性记忆优化策略，包括基于元提示的反思、梯度式批评-然后更新方法以及单步提示细化。
- en: 'LangMem integrates natively with LangGraph’s BaseStore abstraction, enabling
    pluggable backends from in-memory stores for development to PostgreSQL, MongoDB,
    or other production databases. Namespace-based memory isolation prevents cross-user
    contamination while enabling selective memory sharing at team or organizational
    scopes. The explicit CoALA alignment enables applications to apply different retrieval
    strategies based on query type: semantic search for fact lookup, k-NN episode
    retrieval for similar case identification, and procedural memory injection for
    consistent behavior enforcement.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem 与 LangGraph 的 BaseStore 抽象原生集成，允许从内存存储到 PostgreSQL、MongoDB 或其他生产数据库的可插拔后端。基于命名空间的内存隔离防止跨用户污染，同时允许在团队或组织范围内进行选择性记忆共享。显式的
    CoALA 对齐使应用程序能够根据查询类型应用不同的检索策略：语义搜索用于事实查找，k-NN 情节检索用于相似案例识别，以及程序性记忆注入用于一致性行为执行。
- en: While LangMem provides explicit CoALA memory type implementation, Zep and its
    Graphiti engine take the cognitive architecture concept further by adding temporal
    awareness to how memories evolve over time.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 LangMem 提供了显式的 CoALA 内存类型实现，但 Zep 及其 Graphiti 引擎通过添加对记忆随时间演变的时序感知，将认知架构概念进一步深化。
- en: Zep and Graphiti
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Zep 和 Graphiti
- en: 'Zep provides a managed memory platform built on Graphiti, an open source temporal
    knowledge graph engine. The relationship is architectural: Graphiti supplies the
    core graph-based memory infrastructure as a standalone framework, while Zep wraps
    it with enterprise features, security controls, and managed infrastructure. Developers
    choosing between them trade operational complexity against deployment flexibility.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: Zep 提供了一个基于 Graphiti 的托管内存平台，Graphiti 是一个开源的时序知识图谱引擎。这种关系是架构性的：Graphiti 提供了基于图的内存基础设施作为独立框架的核心，而
    Zep 则通过企业功能、安全控制和托管基础设施对其进行封装。选择它们之间的开发者需要在操作复杂性和部署灵活性之间进行权衡。
- en: The Graphiti knowledge graph implements a three-tier subgraph hierarchy. The
    episode subgraph stores raw conversational data as nodes with episodic edges connecting
    to extracted entities, maintaining full fidelity of original inputs for provenance
    tracking. The semantic entity subgraph contains entity nodes representing people,
    places, concepts, and objects, with semantic edges encoding relationships as fact
    triplets. The community subgraph clusters densely connected entities using label
    propagation, providing high-level summaries for graph regions. This architecture
    directly maps episodic and semantic memory from CoALA onto graph structures, but
    notably provides no procedural memory implementation.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: Graphiti知识图谱实现了三层子图层次结构。情节子图将原始对话数据作为节点存储，通过情节边连接到提取的实体，以保持原始输入的完整保真度，用于溯源跟踪。语义实体子图包含代表人物、地点、概念和对象的实体节点，语义边编码为事实三元组的关系。社区子图使用标签传播对密集连接的实体进行聚类，为图区域提供高级摘要。这种架构直接将CoALA的情节和语义记忆映射到图结构中，但值得注意的是，没有提供程序性记忆的实现。
- en: 'Temporal modeling distinguishes Graphiti from other frameworks through bi-temporal
    tracking. Each edge maintains four timestamps: `t_valid` and `t_invalid` mark
    when facts hold true in the real world, while `t_created` and `t_expired` track
    system-level validity for the ingested information. When new facts contradict
    existing edges, the system compares them semantically and uses temporal logic
    to invalidate superseded information by setting `t_invalid`, preserving the historical
    state without data loss. This enables point-in-time queries reconstructing knowledge
    graph state at any moment and tracking knowledge evolution across extended periods.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 时间建模通过双时间跟踪将Graphiti与其他框架区分开来。每个边维护四个时间戳：`t_valid`和`t_invalid`标记事实在现实世界中为真时的时间，而`t_created`和`t_expired`跟踪摄入信息的系统级有效性。当新事实与现有边冲突时，系统通过语义比较它们，并使用时间逻辑通过设置`t_invalid`来无效化被取代的信息，从而在不丢失数据的情况下保留历史状态。这使点时间查询能够重建在任何时刻的知识图谱状态，并跟踪知识在长期内的演变。
- en: 'Retrieval combines three search strategies: cosine similarity over vector embeddings
    for semantic relevance, BM25 full-text search for keyword matching, and breadth-first
    graph traversal from seed nodes for contextual proximity. Results merge via reciprocal
    rank fusion before reranking. The implementation achieves P95 latency of 300 ms
    by avoiding LLM calls during retrieval, instead leveraging Neo4j’s native vector
    and inverted indexes. Benchmark results show 94.8% accuracy on deep memory retrieval
    tasks and up to 18.5% improvement on `LongMemEval`, with 90% latency reduction
    versus baselines.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 检索结合了三种搜索策略：向量嵌入上的余弦相似度用于语义相关性，BM25全文搜索用于关键词匹配，以及从种子节点开始的广度优先图遍历用于上下文邻近度。结果通过互反排名融合合并，然后再进行重新排序。该实现通过避免检索过程中的LLM调用，而是利用Neo4j的本地向量和倒排索引，实现了300毫秒的P95延迟。基准测试结果表明，在深度记忆检索任务上达到94.8%的准确率，在`LongMemEval`上提高了高达18.5%，与基线相比，延迟降低了90%。
- en: The absence of procedural memory support means Graphiti cannot encode learned
    behaviors or autonomously update agent instructions. Applications requiring procedural
    learning must implement this separately or combine Graphiti with complementary
    frameworks such as LangMem.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 程序性记忆支持的缺失意味着Graphiti无法编码学习行为或自主更新代理指令。需要程序性学习的应用必须单独实现此功能或结合Graphiti与互补框架，如LangMem。
- en: 'With three distinct approaches to memory management now explored, the natural
    question becomes: which framework should you choose for your specific use case?'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 现在已经探索了三种不同的内存管理方法，自然而然的问题是：您应该为您的特定用例选择哪个框架？
- en: Choosing the right memory framework
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择正确的记忆框架
- en: Framework selection depends on whether your application benefits from explicit
    memory type distinctions and whether temporal reasoning over evolving information
    provides value.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 框架选择取决于您的应用程序是否从显式的记忆类型区分中受益，以及是否在演变信息上的时间推理提供了价值。
- en: Choose Mem0 when unified long-term memory suffices without cognitive categorization.
    Applications with straightforward persistence requirements, customer support systems
    tracking user context, educational platforms maintaining student history, and
    personal assistants managing ongoing projects operate effectively with Mem0’s
    simplified architecture. The production-tested implementation (41K+ stars, 186M+
    monthly API calls) and strong benchmark performance provide confidence for teams
    wanting battle-tested memory without implementation complexity. Mem0 works well
    when retrieval quality matters more than theoretical alignment with cognitive
    memory types.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 当统一长期记忆足以满足需求而不需要认知分类时，请选择Mem0。具有简单持久性要求的应用程序、跟踪用户上下文的客户支持系统、维护学生历史的学术平台以及管理持续项目的个人助理都可以有效地使用Mem0的简化架构。经过生产测试的实现（41K+星标，186M+每月API调用）和强大的基准性能为希望拥有经过实战考验的记忆但不需要实现复杂性的团队提供了信心。当检索质量比与认知记忆类型的理论一致性更重要时，Mem0表现良好。
- en: Choose LangMem when your application genuinely requires treating facts, experiences,
    and procedures as distinct entities with different life cycle management. Systems
    needing semantic fact storage separate from episodic few-shot learning, or agents
    that should evolve procedural instructions based on interaction patterns, align
    with LangMem’s explicit memory type separation. The native LangGraph integration
    makes it compelling for teams already invested in LangChain’s ecosystem. LangMem’s
    dual hot-path and background extraction modes provide flexibility in memory formation
    timing. Critically, LangMem provides the only production-ready procedural memory
    implementation among these frameworks.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 当您的应用程序真正需要将事实、经验和程序视为具有不同生命周期管理的不同实体时，请选择LangMem。需要将语义事实存储与情景少样本学习分离的系统，或应根据交互模式演变程序指令的智能体，与LangMem的显式记忆类型分离相一致。本地的LangGraph集成使其对已经投资于LangChain生态系统的团队具有吸引力。LangMem的双热路径和后台提取模式提供了在内存形成时间上的灵活性。重要的是，LangMem在这些框架中提供了唯一的生产就绪程序性记忆实现。
- en: Choose Zep/Graphiti when temporal dynamics dominate your requirements. Healthcare
    systems tracking patient progression, financial platforms monitoring evolving
    portfolios, customer success applications following changing client needs, and
    compliance systems requiring audit trails all benefit from bi-temporal knowledge
    graphs. The explicit episodic and semantic subgraphs provide CoALA alignment,
    while temporal metadata enables historical reasoning, which is impossible with
    other frameworks. However, the lack of procedural memory means applications that
    need to adapt to learned behavior must implement this separately or combine Graphiti
    with LangMem for comprehensive CoALA coverage.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 当时间动态成为主要需求时，请选择Zep/Graphiti。跟踪患者进展的医疗系统、监控演变投资组合的金融平台、跟踪不断变化的客户需求的客户成功应用程序以及需要审计跟踪的合规系统都受益于双时态知识图。显式的情景和语义子图提供CoALA一致性，而时间元数据使历史推理成为可能，这是其他框架无法实现的。然而，缺乏程序性记忆意味着需要适应学习行为的程序必须单独实现或结合Graphiti和LangMem以实现全面的CoALA覆盖。
- en: Hybrid architectures may prove optimal for complex requirements. Combining LangMem’s
    procedural memory with Graphiti’s temporal episodic and semantic stores provides
    a full CoALA implementation with temporal reasoning. Alternatively, using Mem0
    for simple preference tracking while leveraging Graphiti for complex relational
    and temporal data separates concerns effectively. Evaluate which capabilities
    each application component requires, rather than forcing a uniform memory infrastructure.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 混合架构可能对复杂需求来说是最优的。将LangMem的程序性记忆与Graphiti的时间情景和语义存储相结合，提供了具有时间推理的完整CoALA实现。或者，使用Mem0进行简单的偏好跟踪，同时利用Graphiti进行复杂的关系和时间数据，可以有效地分离关注点。评估每个应用程序组件所需的每个功能，而不是强迫统一的内存基础设施。
- en: Additional considerations include team expertise (Graphiti requires Neo4j proficiency;
    Mem0 needs minimal specialized knowledge), infrastructure constraints (Zep depends
    on graph databases; LangMem supports various backends), performance requirements
    (latency, throughput, and storage costs vary significantly), and operational maturity
    (production deployments, community support, and documentation quality differ substantially).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的额外因素包括团队的专业技能（Graphiti需要Neo4j的专业知识；Mem0需要最少的专门知识），基础设施限制（Zep依赖于图数据库；LangMem支持各种后端），性能要求（延迟、吞吐量和存储成本差异很大），以及运营成熟度（生产部署、社区支持和文档质量差异很大）。
- en: Understanding these selection criteria helps with navigating the diverse landscape
    of memory frameworks, leading us to a broader reflection on what this diversity
    means for the field.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些选择标准有助于我们在记忆框架的多样化领域中导航，引导我们更广泛地反思这种多样性对领域意味着什么。
- en: Having examined how `Mem0`, `LangMem`, and `Zep`/`Graphiti` implement memory
    architectures with varying levels of CoALA alignment and temporal sophistication,
    the critical question shifts from theoretical design to operational effectiveness.
    Selecting a framework based on architectural elegance means little if the system
    degrades in production, retrieves irrelevant memories, or accumulates bloat that
    erodes performance over time. Memory systems require continuous measurement and
    maintenance to ensure they deliver value as conversation histories grow, user
    bases scale, and information evolves. Understanding how to evaluate memory effectiveness,
    detect degradation patterns, and implement automated maintenance strategies separates
    prototype implementations from production-ready systems that sustain performance
    across millions of interactions.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在考察了`Mem0`、`LangMem`和`Zep`/`Graphiti`如何以不同级别的CoALA对齐和时序复杂性实现记忆架构后，关键问题从理论设计转向了操作有效性。如果系统在生产中性能下降、检索无关的记忆或随着时间的推移积累膨胀，那么基于架构优雅性的框架选择就微不足道了。记忆系统需要持续测量和维护，以确保随着对话历史增长、用户基数扩大和信息演变，它们能够提供价值。了解如何评估记忆有效性、检测退化模式并实施自动化维护策略，将原型实现与能够跨数百万次交互保持性能的生产就绪系统区分开来。
- en: Evaluation and monitoring
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估与监控
- en: Building memory systems is only half the challenge. Understanding whether they
    actually improve agent performance requires sophisticated evaluation approaches.
    Unlike traditional software metrics, memory effectiveness spans multiple dimensions,
    from technical performance to user experience, making a comprehensive evaluation
    essential for production systems.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 构建记忆系统只是挑战的一半。理解它们是否真正提高了代理性能需要复杂的评估方法。与传统软件指标不同，记忆的有效性跨越多个维度，从技术性能到用户体验，因此对生产系统进行全面评估至关重要。
- en: The complexity of evaluating memory-augmented agents stems from the indirect
    nature of memory’s impact. A memory system might perfectly store and retrieve
    information yet fail to improve agent behavior if the memories aren’t properly
    integrated into decision-making. Conversely, even imperfect memory can dramatically
    enhance user experience when applied thoughtfully. This creates a need for multi-faceted
    evaluation strategies that capture both system-level metrics and emergent behaviors.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 评估记忆增强代理的复杂性源于记忆影响的间接性。一个记忆系统可能完美地存储和检索信息，但如果记忆没有正确地整合到决策中，它可能无法改善代理行为。相反，即使是不完美的记忆，如果应用得当，也能显著提升用户体验。这需要多方面的评估策略，既要捕捉系统级指标，也要捕捉涌现行为。
- en: Let’s first examine how memory fundamentally changes what we need to measure
    in agent systems.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先考察记忆如何从根本上改变我们在代理系统中需要测量的内容。
- en: Evaluating memory-based versus memoryless systems
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估基于记忆的系统与无记忆系统
- en: 'Measuring memory effectiveness requires both quantitative metrics and qualitative
    assessment, as memory impacts numerous aspects of agent performance. Traditional
    evaluation of memoryless agents focuses primarily on single-turn accuracy: Did
    the agent provide the correct answer given the immediate context? Memory-augmented
    systems demand a fundamentally different evaluation paradigm that considers longitudinal
    coherence, knowledge accumulation, and behavioral adaptation.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 测量记忆的有效性需要定量指标和定性评估，因为记忆影响代理性能的众多方面。传统上对无记忆代理的评估主要关注单轮准确性：代理是否在给定即时上下文的情况下提供了正确的答案？记忆增强系统需要一种根本不同的评估范式，该范式考虑纵向一致性、知识积累和行为适应。
- en: Traditional evaluation of memoryless agents centers on single-turn metrics,
    namely response quality, factual accuracy, and task completion rates for isolated
    interactions. These straightforward benchmarks work well for stateless systems
    where each query receives an independent response. However, memory fundamentally
    transforms evaluation requirements. Rather than measuring point-in-time performance,
    we must now track longitudinal coherence across sessions, knowledge accumulation
    over extended periods, and behavioral adaptation that emerges from persistent
    context. This shift from isolated metrics to trajectory analysis requires entirely
    new evaluation methodologies.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上对无记忆代理的评价集中在单回合指标上，即孤立交互中的响应质量、事实准确性和任务完成率。这些简单的基准对于每个查询都得到独立响应的无状态系统来说效果很好。然而，记忆从根本上改变了评估要求。我们不再测量特定时间点的性能，而必须现在跟踪会话之间的纵向连贯性、长期的知识积累以及从持续上下文中出现的适应性行为。这种从孤立指标到轨迹分析的转变需要全新的评估方法。
- en: 'Memory-based systems demand a fundamentally different approach to evaluation,
    one that considers how information persists and influences behavior across multiple
    timescales. Rather than evaluating isolated interactions, we must now track how
    the system maintains coherence, accumulates knowledge, and improves its performance
    over extended periods:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 基于记忆的系统需要一种全新的评估方法，这种方法考虑了信息如何在多个时间尺度上持续并影响行为。我们不再评估孤立交互，而必须现在跟踪系统如何保持连贯性、积累知识以及在长期内提高其性能：
- en: '**Short-term evaluation**:'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短期评估**：'
- en: Whether the agent maintains context within a conversation
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理是否在对话中保持上下文
- en: Tracking coherence across multiple turns in a single session
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪单次会话中多个回合之间的连贯性
- en: Measuring how well working memory manages the immediate context
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量工作记忆管理即时上下文的能力
- en: '**Medium-term evaluation**:'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中期评估**：'
- en: Whether information persists across sessions
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息是否在会话之间持续
- en: Verifying that key facts and preferences are retained between conversations
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证关键事实和偏好在对话之间是否保留
- en: Testing retrieval accuracy after time delays
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在时间延迟后测试检索准确性
- en: '**Long-term evaluation**:'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长期评估**：'
- en: Whether the agent genuinely learns and improves over time
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理是否真正随着时间的推移学习和改进
- en: Tracking performance trajectories rather than point measurements
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪性能轨迹而不是点测量
- en: Measuring knowledge accumulation and refinement
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量知识积累和细化
- en: This temporal dimension transforms evaluation from a point measurement to a
    trajectory analysis, requiring new methodologies for tracking agent evolution.
    The complexity increases exponentially as we must now consider not just whether
    the agent gives correct answers but whether it maintains consistency, builds on
    previous knowledge, and demonstrates genuine learning.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这个时间维度将评估从点测量转变为轨迹分析，需要新的方法来跟踪代理的演变。随着我们必须现在考虑的不仅仅是代理是否给出正确答案，还包括它是否保持一致性、建立在前知识的基础上以及是否表现出真正的学习，复杂性呈指数增长。
- en: Understanding these fundamental differences in evaluation needs, we can now
    explore specific metrics for measuring memory effectiveness.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些评估需求的基本差异后，我们现在可以探索用于衡量记忆有效性的具体指标。
- en: Memory effectiveness metrics
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 记忆有效性指标
- en: Key metrics include retrieval precision (how often retrieved memories are actually
    relevant), recall completeness (whether important memories are successfully retrieved),
    response latency impact (the time cost of memory operations), and storage efficiency
    (the relationship between memory size and value). Advanced systems also track
    memory utilization patterns, identifying which memories are frequently accessed
    versus those that remain dormant.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 关键指标包括检索精度（检索到的记忆实际上有多相关）、召回完整性（是否成功检索到重要记忆）、响应延迟影响（记忆操作的时间成本）和存储效率（记忆大小与价值之间的关系）。高级系统还跟踪记忆利用率模式，确定哪些记忆经常被访问，哪些保持休眠。
- en: Retrieval metrics
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检索指标
- en: 'The heart of any memory system lies in its ability to find and surface the
    right information at the right time. Retrieval metrics help us understand whether
    the system can effectively navigate its stored knowledge to support the agent’s
    current needs:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 任何记忆系统的核心在于其能够在正确的时间找到并呈现正确的信息。检索指标帮助我们了解系统是否能够有效地导航其存储的知识以支持代理当前的需：
- en: '**Retrieval precision**:'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索精度**：'
- en: Measures how often retrieved memories are actually relevant to the current context
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量检索到的记忆实际上有多相关于当前上下文
- en: In RAG systems with memory, this metric becomes crucial for distinguishing between
    document relevance (traditional RAG) and memory relevance (contextual appropriateness
    based on user history)
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在具有记忆的RAG系统中，这个指标对于区分文档相关性（传统RAG）和记忆相关性（基于用户历史的上下文适宜性）变得至关重要
- en: This is particularly critical because irrelevant memories can actively harm
    performance by polluting the context with noise
  id: totrans-153
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这尤其关键，因为无关的记忆可能会通过噪声污染上下文而主动损害性能
- en: Systems must balance casting a wide net to avoid missing important memories
    against maintaining focus on truly relevant information
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统必须在避免遗漏重要记忆和专注于真正相关信息之间取得平衡
- en: High precision ensures clean context but risks missing edge-case-relevant memories
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高精确度确保了清晰的上下文，但风险是错过边缘情况相关的记忆
- en: '**Recall completeness**:'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**召回完整性**：'
- en: Measures whether important memories are successfully retrieved when needed
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测量在需要时是否成功检索到重要记忆
- en: Often trades off against precision; retrieving more memories increases the chance
    of finding relevant ones but also introduces more potential noise
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常在精确度上进行权衡；检索更多记忆增加了找到相关记忆的机会，但也引入了更多潜在噪声
- en: 'The sweet spot varies by application:'
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 最佳点因应用而异：
- en: Customer service agents might prioritize recall to never miss important context
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户服务代表可能会优先考虑回忆，以确保不遗漏重要上下文
- en: Decision-support systems might favor precision to maintain clarity
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策支持系统可能倾向于精确度以保持清晰
- en: Missing critical memories can lead to inconsistent behavior or repeated questions
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错过关键记忆可能导致行为不一致或重复提问
- en: '**Response latency impact**:'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应延迟影响**：'
- en: The time cost of memory operations on the overall system performance
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆操作在整体系统性能上的时间成本
- en: Must balance the thoroughness of retrieval with response time requirements
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须在检索的彻底性和响应时间要求之间取得平衡
- en: Includes both the retrieval time and the overhead of processing retrieved memories
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括检索时间和检索记忆的处理开销
- en: Critical for real-time applications where users expect quick responses
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于用户期望快速响应的实时应用至关重要
- en: '**Memory utilization patterns**:'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆利用模式**：'
- en: Tracking which memories are frequently accessed versus those that remain dormant
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪哪些记忆经常被访问，哪些保持休眠
- en: Reveals which stored information actually influences agent behavior
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 揭示了哪些存储信息实际上影响了代理行为
- en: Helps identify “hot” memories that should be cached versus “cold” memories that
    can be archived
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助识别应该缓存以供快速访问的“热”记忆，以及可以存档的“冷”记忆
- en: Enables targeted optimization of the memory system
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使针对记忆系统的优化变得可能
- en: '**Potential implementation approach**: Log every memory retrieval with the
    query, retrieved memories, and relevance scores. For precision, have evaluators
    rate retrieved memories as relevant/irrelevant on a sample of queries. For recall,
    create test sets with known relevant memories and check whether they’re retrieved.
    Track latency with simple timing instrumentation around retrieval calls. Monitor
    access frequency by maintaining counters for each memory ID.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在实现方法**：记录每次记忆检索的查询、检索到的记忆和相关性评分。为了精确度，让评估者在查询样本上对检索到的记忆进行相关/不相关评级。为了召回，创建包含已知相关记忆的测试集，并检查它们是否被检索。通过检索调用周围的简单计时工具跟踪延迟。通过为每个记忆ID维护计数器来监控访问频率。'
- en: These retrieval metrics reveal whether the memory system can efficiently find
    relevant information, but they don’t tell us whether that information is being
    stored efficiently in the first place.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这些检索指标揭示了记忆系统是否能够高效地找到相关信息，但它们并没有告诉我们这些信息最初是否被高效地存储
- en: Storage metrics
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 存储指标
- en: 'Beyond retrieval, we must also evaluate how efficiently the system manages
    its memory resources. Storage metrics help identify whether the system is accumulating
    valuable knowledge or simply hoarding data:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 除了检索之外，我们还必须评估系统管理其记忆资源效率的高低。存储指标有助于确定系统是在积累有价值知识还是在简单地囤积数据：
- en: '**Storage efficiency**:'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储效率**：'
- en: The relationship between memory size and value provided
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆大小与提供价值之间的关系
- en: Not all memories provide equal value, yet naive systems might allocate equal
    resources to trivial and critical information
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并非所有记忆都提供同等价值，而原始系统可能对琐碎信息和关键信息分配同等资源
- en: Sophisticated evaluation tracks the value-per-byte of stored memories
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂的评估跟踪存储记忆的价值每字节
- en: Identifies opportunities to compress, summarize, or forget low-value information
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别压缩、总结或遗忘低价值信息的机会
- en: Becomes crucial at scale when storage costs mount
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在存储成本上升的规模上变得至关重要
- en: '**Memory growth patterns**:'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆增长模式**：'
- en: Rate of accumulation over time
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间积累的速率
- en: Whether growth is linear, exponential, or logarithmic
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增长是线性的、指数的还是对数的
- en: Helps predict future storage requirements and costs
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有助于预测未来的存储需求和成本
- en: Indicates whether the system is learning efficiently or just accumulating data
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示系统是否高效学习或只是积累数据
- en: '**Deduplication and compression**:'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**去重和压缩**：'
- en: How well the system avoids storing redundant information
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统避免存储冗余信息的程度
- en: Effectiveness of summarization and consolidation strategies
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要和巩固策略的有效性
- en: Impact of compression on retrieval accuracy
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 压缩对检索精度的影响
- en: Balance between storage savings and information loss
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保存空间和信息损失之间的平衡
- en: '**Potential implementation approach**: Track storage metrics through database
    queries on memory size over time. Calculate value-per-byte by dividing retrieval
    frequency by storage size for each memory. Implement deduplication checks using
    similarity hashing or embedding distances before storage. Monitor growth with
    daily/weekly snapshots of total memory count and size.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在的实现方法**：通过在数据库中对记忆大小随时间的变化进行查询来跟踪存储指标。通过将每个记忆的检索频率除以存储大小来计算每字节的值。在存储之前使用相似性哈希或嵌入距离实现去重检查。通过每天/每周的内存总数和大小快照来监控增长。'
- en: While these technical metrics provide essential feedback about system performance,
    they don’t capture the full impact of memory on agent behavior and user experience.
    A system might have perfect retrieval precision and optimal storage efficiency
    yet still fail to deliver meaningful improvements in actual use.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些技术指标提供了关于系统性能的基本反馈，但它们并不能捕捉到记忆对代理行为和用户体验的全面影响。一个系统可能具有完美的检索精度和最佳存储效率，但在实际使用中仍然无法带来有意义的改进。
- en: Behavioral evaluation
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行为评估
- en: Behavioral evaluation examines how memory affects agent performance on specific
    tasks. This includes measuring conversation coherence across sessions, personalization
    accuracy, learning efficiency (how quickly agents improve with experience), and
    error recovery (whether agents avoid repeating past mistakes). User satisfaction
    often correlates strongly with effective memory as users feel heard and understood
    when agents remember their context.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 行为评估检查记忆如何影响代理在特定任务上的表现。这包括衡量会话之间的对话连贯性、个性化准确性、学习效率（代理如何随着经验快速提高）以及错误恢复（代理是否避免重复过去的错误）。用户满意度通常与有效的记忆密切相关，因为当代理记住他们的上下文时，用户会感到被听到和理解。
- en: Conversation coherence metrics
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对话连贯性指标
- en: 'The true test of a memory system often lies in the subtleties of conversation
    and whether the agent can maintain a coherent, contextualized dialogue that feels
    natural and aware of past interactions:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 一个记忆系统的真正考验往往在于对话的微妙之处，以及代理是否能够维持连贯、语境化的对话，感觉自然并意识到过去的交互：
- en: '**Cross-session consistency**:'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨会话一致性**：'
- en: Does the agent remember not just facts but also the emotional context of previous
    interactions?
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理是否不仅记得事实，还记住之前交互的情感背景？
- en: Can it reference earlier discussions naturally without seeming robotic?
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否能够自然地参考之前的讨论，而不显得机械？
- en: The agent maintains a consistent personality and knowledge across conversations
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理在对话中保持一致的性格和知识
- en: It avoids contradicting information from previous sessions
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它避免与之前会话中的信息相矛盾
- en: '**Reference quality**:'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参考质量**：'
- en: How naturally the agent incorporates past information into current responses
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理将过去的信息自然地融入当前响应中
- en: Avoids awkward “As you mentioned before...” constructions
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免尴尬的“正如你之前提到的...”结构
- en: Seamlessly weaves historical context into the conversation flow
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无缝地将历史背景编织到对话流程中
- en: These qualities emerge from effective memory but prove difficult to measure
    automatically
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些品质源于有效的记忆，但自动测量起来却很困难
- en: '**Contextual appropriateness**:'
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语境适宜性**：'
- en: The agent understands when to reference past interactions and when not to
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理知道何时参考过去的交互，何时不参考
- en: It respects the emotional weight of previous conversations
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它尊重之前对话的情感权重
- en: It can adjust its formality and tone based on relationship history
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以根据关系历史调整其正式程度和语气
- en: Many teams employ human evaluation or sophisticated rubrics that examine conversational
    flow, reference consistency, and contextual appropriateness
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多团队采用人工评估或复杂的评分标准，这些标准检查对话流畅性、参考一致性以及语境的适宜性
- en: '**Potential implementation approach**: Create conversation test suites that
    span multiple sessions with known facts to verify. Use human evaluators with scoring
    rubrics (1–5 scale) for naturalness and appropriateness. Automatically detect
    contradictions by comparing entity/fact assertions across sessions. Track explicit
    memory references in responses using pattern matching or LLM classification.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在的实现方法**：创建跨越多个会话并包含已知事实的对话测试套件以进行验证。使用具有评分标准（1-5级）的人类评估者对自然性和适当性进行评分。通过跨会话比较实体/事实断言来自动检测矛盾。使用模式匹配或LLM分类在响应中跟踪显式记忆引用。'
- en: Conversation coherence represents just one aspect of behavioral improvement.
    Equally important is the system’s ability to learn from experience and adapt its
    behavior over time.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 对话连贯性只是行为改进的一个方面。同样重要的是，系统能够从经验中学习并随着时间的推移调整其行为。
- en: Learning and adaptation metrics
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习和适应指标
- en: 'A memory system’s ultimate value often lies not in perfect recall but in its
    ability to help the agent learn, adapt, and avoid repeating mistakes:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆系统的最终价值往往不在于完美的回忆，而在于其帮助代理学习、适应并避免重复错误的能力：
- en: '**Learning efficiency**:'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习效率**：'
- en: How quickly agents adapt to user preferences or domain-specific patterns
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理如何快速适应用户偏好或特定领域的模式
- en: A well-designed memory system should reduce the number of corrections needed
    over time
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个设计良好的记忆系统应该随着时间的推移减少所需的更正次数
- en: It should converge on appropriate behavior faster than memoryless alternatives
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该比无记忆的替代方案更快地收敛到适当的行为
- en: This is measured by tracking correction frequency over interaction count
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这通过跟踪更正频率与交互次数之间的关系来衡量
- en: This indicates whether the system is actually learning or just memorizing
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这表明系统是否真正在学习或只是记忆
- en: '**Error recovery patterns**:'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误恢复模式**：'
- en: One of the most valuable but overlooked aspects of memory evaluation
  id: totrans-225
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆评估中最有价值但被忽视的方面之一
- en: When agents make mistakes, effective memory systems should prevent the repetition
    of the same errors
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当代理犯错误时，有效的记忆系统应该防止重复相同的错误
- en: 'This requires tracking the following:'
  id: totrans-227
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这需要跟踪以下内容：
- en: Error patterns and types
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误模式和类型
- en: Successful corrections provided by users
  id: totrans-229
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户提供的成功更正
- en: Subsequent behavior to verify that lessons were actually learned
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随后的行为以验证是否真正学到了教训
- en: The absence of repeated errors often provides stronger evidence of effective
    memory than any positive metric
  id: totrans-231
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复错误的缺失往往比任何积极的指标更能提供有效记忆的证据
- en: '**Personalization accuracy**:'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化准确性**：'
- en: How well the system tailors responses to individual users
  id: totrans-233
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统能否根据个体用户定制响应
- en: Does it remember and correctly apply user-specific preferences?
  id: totrans-234
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否记得并正确应用用户特定的偏好？
- en: It should maintain distinct interaction patterns for different users
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该为不同的用户维护不同的交互模式
- en: This is measured through user satisfaction scores and preference adherence rates
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这通过用户满意度评分和偏好依从率来衡量
- en: '**Potential implementation approach**: Log all user corrections and track whether
    similar mistakes recur. Calculate learning curves by measuring task success rate
    over the number of attempts. Create preference test scenarios where known user
    preferences should influence responses. Compare personalized versus generic response
    quality using A/B testing with memory enabled/disabled.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在的实现方法**：记录所有用户更正并跟踪是否发生类似的错误。通过测量尝试次数中的任务成功率来计算学习曲线。创建偏好测试场景，其中已知用户偏好应影响响应。通过启用/禁用记忆的A/B测试来比较个性化与通用响应质量。'
- en: These behavioral metrics provide insight into whether memory translates into
    genuine improvements in user experience. Yet, learning and adaptation only tell
    part of the story. Agents must also maintain a coherent understanding of when
    events occurred and how they relate to each other across time, requiring evaluation
    of temporal consistency.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行为指标提供了洞察力，了解记忆是否转化为用户体验的真正改进。然而，学习和适应只是故事的一部分。代理还必须保持对事件发生的时间和它们之间相互关系的连贯理解，这需要评估时间一致性。
- en: Temporal consistency metrics
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间一致性指标
- en: 'Memory systems must accurately track and maintain temporal relationships between
    events, ensuring that the agent’s understanding of time remains coherent across
    extended interactions. Unlike simple chronological ordering, temporal consistency
    requires understanding relative time references, causal sequences, and the evolution
    of information over time:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆系统必须准确跟踪并维持事件之间的时间关系，确保代理在长时间交互中对时间的理解保持连贯。与简单的按时间顺序排列不同，时间一致性需要理解相对时间参考、因果关系序列以及信息随时间的发展：
- en: '**Event sequence tracking accuracy**:'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事件序列跟踪准确性**：'
- en: Measures how well the memory system preserves the correct ordering of events
    across sessions
  id: totrans-242
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量记忆系统在会话间保持事件正确顺序的效果
- en: Goes beyond simple timestamps to understand relative temporal relationships
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超越简单的时间戳，理解相对时间关系
- en: Must correctly map temporal anchors such as “the meeting before my vacation”
    to specific events
  id: totrans-244
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须正确地将时间锚点，如“我度假前的会议”，映射到特定事件
- en: Evaluates whether the system maintains event ordering even when referenced indirectly
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估系统即使在间接引用的情况下也能保持事件顺序
- en: Critical for maintaining narrative coherence in long-running conversations
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在长时间对话中保持叙事连贯至关重要
- en: '**Temporal relationship preservation**:'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间关系保持**：'
- en: Evaluates the system’s ability to maintain complex temporal relationships
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估系统维持复杂时间关系的能力
- en: Includes overlapping events, recurring patterns, and conditional sequences
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括重叠事件、重复模式和条件序列
- en: Must understand that projects span multiple meetings, events recur weekly, and
    so on
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须理解项目跨越多个会议，事件每周重复，等等
- en: Tracks whether one decision’s cascade effects are properly linked temporally
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪一个决策的级联效应是否在时间上正确链接
- en: Measured through queries testing understanding of duration, overlap, and periodicity
  id: totrans-252
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过测试对持续时间、重叠和周期性的理解来衡量
- en: '**Causal chain consistency**:'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果关系链一致性**：'
- en: Tracks whether the system maintains accurate cause-and-effect relationships
    over time
  id: totrans-254
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪系统是否在时间上保持准确的因果关系
- en: When Event A → Event B → Event C, these causal links must persist
  id: totrans-255
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当事件A → 事件B → 事件C时，这些因果关系必须持续
- en: Critical for decision-making to avoid repeating mistakes
  id: totrans-256
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于决策至关重要，以避免重复错误
- en: Requires tracking why certain choices were made across sessions
  id: totrans-257
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要跟踪在会话间为什么做出某些选择
- en: Evaluated through questions that require understanding causal sequences
  id: totrans-258
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过需要理解因果关系序列的问题进行评估
- en: '**Potential implementation approach**: Create timeline reconstruction tests
    where the agent must order events correctly. Use probe questions such as “What
    happened after X but before Y?” to test temporal understanding. Build causal reasoning
    tests with known cause-effect chains and verify that the agent can trace them.
    Store events with both absolute timestamps and relative temporal markers for validation.'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在实现方法**：创建时间线重建测试，其中代理必须正确排序事件。使用探询问题，如“X之后但Y之前发生了什么？”来测试时间理解。构建具有已知因果关系链的因果推理测试，并验证代理能否追踪它们。存储事件时，同时使用绝对时间戳和相对时间标记进行验证。'
- en: While temporal consistency ensures agents understand when and why things happened,
    real-world tasks demand even more sophisticated capabilities, such as the ability
    to connect and synthesize information across multiple memories and sessions to
    solve complex problems.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然时间一致性确保代理理解何时以及为什么事情发生，但现实任务需要更复杂的能力，例如连接和综合多个记忆和会话中的信息以解决复杂问题的能力。
- en: Multi-hop and cross-session reasoning
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多跳和跨会话推理
- en: 'Complex real-world tasks often require synthesizing information scattered across
    multiple interactions, making multi-hop reasoning a critical capability for memory-augmented
    agents. These evaluations test whether agents can connect disparate pieces of
    information to form coherent conclusions:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的实际任务通常需要综合多个交互中分散的信息，使多跳推理成为记忆增强代理的关键能力。这些评估测试代理是否能够将不同的信息片段连接起来形成连贯的结论：
- en: '**Multi-hop query success rates**:'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多跳查询成功率**：'
- en: Measures the ability to answer questions requiring multiple memory retrievals
  id: totrans-264
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量回答需要多次记忆检索的问题的能力
- en: 'Example: “What was the budget for the project Sarah mentioned in Q2 planning?”'
  id: totrans-265
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“在Q2规划中，莎拉提到的项目的预算是多少？”
- en: 'First hop: Identify which project Sarah discussed'
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一跳：确定莎拉讨论的项目
- en: 'Second hop: Locate when Q2 planning occurred'
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二跳：定位Q2规划发生的时间
- en: 'Third hop: Retrieve the budget information'
  id: totrans-268
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三跳：检索预算信息
- en: Success rates typically decrease exponentially with each additional hop
  id: totrans-269
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成功率通常随着每个额外跳转指数级下降
- en: Distinguishes between simple lookup and true information synthesis
  id: totrans-270
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区分简单查找和真正的信息综合
- en: '**Cross-session information synthesis**:'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨会话信息综合**:'
- en: Evaluates the integration of information from different conversation sessions
  id: totrans-272
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估来自不同对话会话的信息整合
- en: Tracks evolving topics and belief updates based on new information
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪基于新信息的主题演变和信念更新
- en: Recognizes when facts from one session contradict or complement another
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别一个会话中的事实与另一个会话的事实相矛盾或补充
- en: Must actively synthesize memories into coherent responses
  id: totrans-275
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须积极将记忆综合成连贯的响应
- en: Goes beyond retrieval to measure comprehensive understanding building
  id: totrans-276
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超越检索，测量全面理解构建
- en: '**Complex reasoning chain evaluation**:'
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂推理链评估**:'
- en: Tests logical consistency across extended reasoning sequences
  id: totrans-278
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试扩展推理序列中的逻辑一致性
- en: Includes syllogistic reasoning (if A→B and B→C, then A→C)
  id: totrans-279
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括三段论推理（如果A→B和B→C，则A→C）
- en: Evaluates constraint satisfaction across multiple sessions
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个会话中评估约束满足度
- en: Measures hypothetical reasoning based on accumulated knowledge
  id: totrans-281
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据积累的知识衡量假设推理
- en: Typically requires 3+ reasoning steps with intermediate validation
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常需要3+推理步骤，中间进行验证
- en: Scores both the final accuracy and the validity of the reasoning process
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估最终准确性和推理过程的有效性
- en: '**Potential implementation approach**: Design multi-hop question sets with
    known answers that require connecting 2–5 pieces of information. Track retrieval
    chains to verify that the agent follows correct reasoning paths. Create synthetic
    conversation histories with distributed facts and test synthesis capabilities.
    Use formal logic problems translated into conversational contexts to evaluate
    reasoning consistency.'
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在实现方法**：设计包含已知答案的多跳问题集，这些答案需要连接2-5条信息。跟踪检索链以验证代理是否遵循正确的推理路径。创建包含分布式事实的合成对话历史并测试综合能力。使用转化为对话情境的正式逻辑问题来评估推理一致性。'
- en: Behavioral evaluations reveal what agents can do with their memories, but sustaining
    these capabilities in production environments requires continuous monitoring and
    optimization of the underlying system performance.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 行为评估揭示代理如何使用他们的记忆，但在生产环境中维持这些能力需要持续监控和优化底层系统性能。
- en: Performance tracking
  id: totrans-286
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能跟踪
- en: Production memory systems require continuous monitoring to detect degradation,
    identify optimization opportunities, and ensure consistent quality. Performance
    tracking encompasses both technical metrics, such as query latency and retrieval
    accuracy, and business metrics, such as user retention and task completion rates.
    The challenge lies in connecting low-level system metrics to high-level outcomes,
    understanding which technical improvements actually matter for users.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 生产内存系统需要持续监控以检测退化、识别优化机会并确保一致的质量。性能跟踪包括技术指标，如查询延迟和检索准确性，以及业务指标，如用户保留率和任务完成率。挑战在于将低级系统指标与高级结果连接起来，理解哪些技术改进对用户真正重要。
- en: Real-time monitoring requirements
  id: totrans-288
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实时监控要求
- en: 'Production systems need immediate visibility into memory system health to catch
    issues before they impact users. Real-time monitoring provides the early warning
    signals that prevent minor issues from becoming major incidents:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 生产系统需要立即了解内存系统健康状况，以便在问题影响用户之前捕捉到它们。实时监控提供了早期预警信号，防止小问题演变成重大事件：
- en: '**Memory operation latencies**:'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存操作延迟**:'
- en: Track P50, P95, and p99 latencies for memory operations
  id: totrans-291
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪内存操作的P50、P95和p99延迟
- en: Degradation often appears first as increased latency before impacting user-visible
    behavior
  id: totrans-292
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 退化通常首先表现为延迟增加，然后才会影响用户可见的行为
- en: Set alerts for anomalous latency spikes that might indicate system issues
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置异常延迟峰值警报，可能表明系统问题
- en: Monitor latency trends to predict when optimization is needed
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控延迟趋势以预测何时需要优化
- en: '**Cache performance**:'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缓存性能**:'
- en: Monitor hit rates for memory caches at different levels to ensure optimal performance.
  id: totrans-296
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控不同级别的内存缓存命中率以确保最佳性能。
- en: Measure cache effectiveness in reducing retrieval times across various query
    types.
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量缓存在减少各种查询类型检索时间上的有效性。
- en: Track memory pressure and eviction patterns to identify capacity constraints.
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪内存压力和驱逐模式以识别容量限制。
- en: Decreased cache effectiveness often precedes user-visible performance issues.
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缓存效率降低通常先于用户可见的性能问题。
- en: '**Retrieval distributions**:'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索分布**：'
- en: Whether the system uses its full memory capacity or repeatedly accesses the
    same small subset
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无论系统是否使用其全部内存容量，还是反复访问相同的小子集
- en: Helps identify whether certain memories are over-represented in retrievals
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助识别某些记忆在检索中是否过度表示
- en: Suggests opportunities for optimization or potential issues with memory organization
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 暗示优化机会或内存组织潜在问题
- en: Can reveal biases in the retrieval system
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以揭示检索系统中的偏差
- en: '**Potential implementation approach**: Use APM tools (such as Datadog or New
    Relic) or custom metrics pipelines to track latencies. Implement distributed tracing
    to follow memory operations through the system. Set up dashboards with percentile
    latencies and cache hit rates. Configure alerts for latency spikes &gt;2x the
    baseline and cache hit rates dropping below thresholds.'
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在实施方法**：使用APM工具（如Datadog或New Relic）或自定义指标管道来跟踪延迟。实现分布式跟踪以追踪内存操作通过系统。设置带有百分位延迟和缓存命中率的仪表板。配置延迟峰值大于基线2倍和缓存命中率低于阈值的警报。'
- en: Real-time metrics provide immediate feedback, but understanding system health
    also requires analyzing patterns that only emerge over extended periods.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 实时指标提供即时反馈，但了解系统健康也需要分析仅在长期内出现的模式。
- en: Longitudinal analysis patterns
  id: totrans-307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 纵向分析模式
- en: 'Long-term monitoring reveals trends and degradation patterns that short-term
    metrics miss. These longitudinal insights guide strategic decisions about system
    maintenance and evolution:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 长期监测揭示了短期指标所遗漏的趋势和退化模式。这些纵向洞察指导着关于系统维护和演化的战略决策：
- en: '**Memory growth characteristics**:'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存增长特征**：'
- en: Storage growth rates over days, weeks, and months
  id: totrans-310
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每日、每周和每月的存储增长率
- en: Whether growth is sustainable given infrastructure constraints
  id: totrans-311
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在基础设施约束下，增长是否可持续
- en: Identifying periods of rapid accumulation versus steady state
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别快速积累期与稳态期
- en: Helps with capacity planning and budget forecasting
  id: totrans-313
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助进行容量规划和预算预测
- en: '**Quality degradation patterns**:'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量退化模式**：'
- en: 'Memory bloat: This happens when the system stores every conversational detail
    without filtering for importance, or when similar information gets stored repeatedly
    in slightly different forms, gradually diluting the signal-to-noise ratio in the
    memory store:'
  id: totrans-315
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存膨胀：这发生在系统存储每个对话细节而不进行重要性筛选时，或者当类似信息以略微不同的形式反复存储时，逐渐稀释内存存储中的信噪比：
- en: Characterized by declining retrieval precision over time
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以随着时间的推移检索精度下降为特征
- en: Often caused by inadequate deduplication or summarization
  id: totrans-317
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常由不充分的去重或摘要引起
- en: Requires intervention to compress or prune low-value memories
  id: totrans-318
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要干预以压缩或修剪低价值记忆
- en: '**Memory sclerosis**: Old, outdated memories dominate retrieval results:'
  id: totrans-319
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存硬化**：旧、过时的记忆主导检索结果：'
- en: System becomes stuck in past patterns
  id: totrans-320
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统陷入过去的模式
- en: Fails to adapt to new information or changing contexts
  id: totrans-321
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法适应新信息或变化的环境
- en: Often requires reweighting of recency in retrieval algorithms
  id: totrans-322
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常需要重新加权检索算法中的近期性
- en: '**Drift monitoring**:'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**漂移监控**：'
- en: Changes in retrieval accuracy over time
  id: totrans-324
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间检索精度的变化
- en: Shifts in the distribution of retrieved memory types
  id: totrans-325
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索内存类型分布的变化
- en: Evolution of memory access patterns
  id: totrans-326
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存访问模式的演变
- en: Indicates when retraining or recalibration is needed
  id: totrans-327
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示何时需要重新训练或重新校准
- en: '**Potential implementation approach**: Schedule weekly/monthly analysis jobs
    that compute growth rates and quality metrics. Build time-series databases to
    track metric evolution. Create drift detection algorithms that compare current
    distributions to baseline periods. Use statistical process control charts to identify
    when metrics exceed normal variation bounds.'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在实施方法**：安排每周/每月分析作业，计算增长率和质量指标。构建时间序列数据库以跟踪指标演变。创建漂移检测算法，将当前分布与基线期进行比较。使用统计过程控制图来识别指标何时超出正常变异界限。'
- en: Understanding these patterns enables teams to implement proactive maintenance
    strategies rather than reactive fixes.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些模式使团队能够实施主动维护策略，而不是被动修复。
- en: Automated maintenance strategies
  id: totrans-330
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化维护策略
- en: 'The most sophisticated memory systems include self-healing mechanisms that
    automatically address common issues before they impact performance:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 最复杂的内存系统包括自我修复机制，这些机制可以自动解决在影响性能之前出现的常见问题：
- en: '**Regular analysis triggers**:'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常规分析触发器**：'
- en: Memory composition analysis (distribution of memory types and ages)
  id: totrans-333
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存组成分析（内存类型和年龄的分布）
- en: Age distribution studies (how old memories are distributed)
  id: totrans-334
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 年龄分布研究（记忆的年龄分布）
- en: Relevance score tracking (whether older memories maintain relevance)
  id: totrans-335
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关性评分跟踪（较旧的记忆是否保持相关性）
- en: All emerge over time and require longitudinal tracking
  id: totrans-336
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有这些都会随着时间的推移而出现，并需要纵向跟踪
- en: '**Automated maintenance routines**:'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化维护常规**：'
- en: Compress memories based on access patterns
  id: totrans-338
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据访问模式压缩内存
- en: Consolidate similar or redundant memories
  id: totrans-339
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 合并相似或冗余的内存
- en: Prune memories based on relevance decay
  id: totrans-340
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据相关性衰减修剪内存
- en: Archive cold memories to cheaper storage tiers
  id: totrans-341
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将冷内存存档到更便宜的存储层
- en: These routines ensure sustained performance even as systems accumulate months
    or years of interactions
  id: totrans-342
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些常规操作确保即使在系统积累了数月或数年的交互后，性能也能持续。
- en: '**Performance optimization cycles**:'
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能优化周期**：'
- en: Periodic reindexing of memory stores
  id: totrans-344
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期重新索引内存存储
- en: Retraining of retrieval models
  id: totrans-345
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新训练检索模型
- en: Recalibration of relevance scoring
  id: totrans-346
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新校准相关性评分
- en: Adjustment of memory allocation strategies
  id: totrans-347
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整内存分配策略
- en: '**Potential implementation approach**: Build cron jobs or orchestration workflows
    (such as Airflow or Temporal) for maintenance tasks. Implement memory scoring
    algorithms that combine recency, frequency, and relevance signals. Create automated
    pipelines that compress low-access memories after 30 days and archive them after
    90 days. Use feature flags to gradually roll out optimization changes while monitoring
    impact.'
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在的实现方法**：为维护任务构建cron作业或编排工作流（如Airflow或Temporal）。实现结合近期性、频率和相关性信号的内存评分算法。创建自动管道，在30天后压缩低访问内存，并在90天后存档。使用功能标志逐步推出优化更改，同时监控影响。'
- en: Advanced teams implement these patterns to maintain system health and ensure
    that memory continues to provide value as the system scales and evolves. The combination
    of real-time monitoring, longitudinal analysis, and automated maintenance creates
    a robust operational framework that keeps memory systems performing optimally
    even as they accumulate years of interactions and petabytes of stored knowledge.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 高级团队实施这些模式以维护系统健康，并确保随着系统规模和演变，内存继续提供价值。实时监控、纵向分析和自动化维护的组合创建了一个强大的操作框架，即使在内存系统积累了多年的交互和PB级存储知识后，也能保持最佳性能。
- en: Summary
  id: totrans-350
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'Agentic memory transforms stateless LLMs into systems capable of learning and
    adapting over time by extending RAG from static document retrieval to dynamic,
    continuously evolving knowledge stores. This capability represents the culmination
    of two decades of evolution, from early chatbot state machines through ChatGPT’s
    context window limitations to today’s cognitive architectures, driven by expanding
    context windows, RAG patterns, and the emergence of autonomous agents. The CoALA
    framework provides structure for this evolution through three long-term memory
    types, which are episodic memory for experiences, semantic memory for knowledge,
    and procedural memory for skills—these intersect with community and personal scopes
    to balance collective learning with individual privacy. Modern frameworks implement
    these concepts with varying philosophies: Mem0 provides sophisticated unified
    storage that prioritizes practical effectiveness over cognitive categorization,
    LangMem directly instantiates CoALA’s memory type separation with dedicated extraction
    pipelines for each category, while Zep and Graphiti extend episodic and semantic
    memory with temporal knowledge graphs that track how information evolves over
    time, though without procedural memory support. Deploying these systems in production
    requires moving beyond architectural elegance to a comprehensive evaluation of
    retrieval precision, storage efficiency, conversation coherence, and temporal
    consistency, supported by automated maintenance strategies that prevent memory
    degradation as systems scale to millions of interactions.'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 代理记忆通过将RAG从静态文档检索扩展到动态、持续演变的知识库，将无状态的LLMs转化为能够随时间学习和适应的系统。这种能力代表了二十年的演变成果，从早期的聊天机器人状态机到ChatGPT的上下文窗口限制，再到今天的认知架构，这些架构由不断扩大的上下文窗口、RAG模式和自主代理的出现所驱动。CoALA框架通过三种长期记忆类型为这种演变提供结构，这些类型是经验的事件记忆、知识的语义记忆和技能的程序记忆——这些记忆与社区和个人范围相交，以平衡集体学习与个人隐私。现代框架以不同的哲学理念实现这些概念：Mem0提供复杂的统一存储，优先考虑实际效果而不是认知分类，LangMem直接实现CoALA的记忆类型分离，为每个类别提供专门的提取管道，而Zep和Graphiti通过时间知识图扩展事件和语义记忆，跟踪信息随时间的变化，尽管没有程序记忆支持。在生产中部署这些系统需要超越架构的优雅，进行全面评估检索精度、存储效率、对话连贯性和时间一致性，并支持自动化维护策略，防止系统扩展到数百万次交互时记忆退化。
- en: While we’ve established the theoretical foundations and architectural patterns
    for agentic memory, the journey from concept to production requires concrete implementation.
    In the next chapter, we’ll dive deep into the code, exploring hands-on examples
    of building these memory systems using the CoALA framework with RAG integration.
    You’ll learn how to initialize memory modules, implement retrieval-generation-update
    pipelines, and orchestrate the complex interactions between different memory types,
    thereby transforming the concepts we’ve discussed into working systems that can
    power the next generation of intelligent agents.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经建立了代理记忆的理论基础和架构模式，但从概念到生产的转变需要具体的实现。在下一章中，我们将深入代码，探索使用具有RAG集成的CoALA框架构建这些记忆系统的实际示例。您将学习如何初始化记忆模块，实现检索-生成-更新管道，并协调不同记忆类型之间的复杂交互，从而将我们讨论的概念转化为可以驱动下一代智能代理的运行系统。
