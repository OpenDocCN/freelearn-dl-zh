- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Finding AI Opportunities in Processes and Products
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You’ve already taken some important steps on your AI journey. You’ve built a
    foundational understanding of AI, mapped out your business’s pain points and bottlenecks,
    and started thinking about how AI might fit into your overall strategy. But now
    comes a crucial part of the process – identifying the specific opportunities where
    AI can actually make a difference. This is where the rubber meets the road.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, not every problem in your business is a good fit for AI. In fact,
    trying to force AI into a situation where it doesn’t belong can lead to wasted
    resources, frustration, and, ultimately, failure. So, how do you find those sweet
    spots, those places where AI can really shine and provide tangible value? The
    answer lies in mapping AI capabilities to your business processes and products.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll walk through how to systematically identify AI opportunities.
    We’ll start by exploring how to map AI capabilities to your existing processes,
    highlighting areas where AI can solve specific pain points or remove bottlenecks.
    But we won’t stop there. We’ll also look at how this approach can be applied to
    your products by enhancing user journeys and improving customer experiences.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll not only have a better grasp of where AI
    can be implemented in your organization, but you’ll also understand how to approach
    this process with a strategic mindset. We’ll dive into examples that illustrate
    these concepts in action, helping you to see the practical steps you can take
    to identify AI opportunities that are the right fit for your business.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the process of mapping AI capabilities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example 1: Finding AI opportunities in the RFP response process'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example 2: AI opportunities in lead generation and qualification'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example 3: Enhancing a product user journey with AI'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical tips for identifying AI opportunities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Effective workflow augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s roll up our sleeves and start identifying those AI opportunities that
    can take your business to the next level.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the process of mapping AI capabilities
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'When it comes to identifying AI opportunities, one of the most effective methods
    is to map AI capabilities directly to your business processes and products. This
    might sound a bit abstract at first, but it’s really about taking a step-by-step
    approach to understanding where AI can add value. Whether you’re looking at internal
    processes or customer-facing products, the goal is the same: find those areas
    where AI can solve problems, enhance efficiency, or improve the customer experience.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s break this down.
  prefs: []
  type: TYPE_NORMAL
- en: Mapping AI to business processes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let’s talk about business processes. Every organization has them – whether
    it’s how you handle customer inquiries, how your sales team qualifies leads, or
    how you manage supply chain logistics. These processes often involve multiple
    steps, and within each step there might be inefficiencies, bottlenecks, or opportunities
    for improvement. This is where AI can come in.
  prefs: []
  type: TYPE_NORMAL
- en: So, how do you find a good place to start? It depends on your approach.
  prefs: []
  type: TYPE_NORMAL
- en: In an opportunistic scenario, you can start with anything that’s currently relevant
    - like a process you’re responsible for. In a divide-and-conquer approach, the
    entry point ties back to a north star, with processes chosen deliberately because
    they block progress toward it. From there, source problems without worrying about
    scoping yet - just surface anything painful, inefficient, or limiting using the
    pain points and bottlenecks method from the last chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, apply your $10K threshold. To recap: this is the minimum recurring value
    (per month, quarter, etc.) that a problem must offer to justify further exploration.
    Problems that don’t meet that bar are filtered out. Problems that clearly exceed
    it are kept – and that’s when you zoom in.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If a problem seems large – multiple times above your threshold – you don’t
    want to treat it as a single monolith. Instead, break it down into a sub-process
    with 5–6 meaningful steps. Then, map problems at this more detailed level and
    reapply the $10K filter. You repeat this loop – map → filter → zoom → repeat –
    until you reach a level where either of the following applies:'
  prefs: []
  type: TYPE_NORMAL
- en: The $10K problems are **reasonably distributed** across the 5 - 6 steps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Breaking it down further would dilute the value below your threshold.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This method keeps your AI exploration focused, actionable, and grounded in business
    impact. It ensures you’re always working on something that’s genuinely worth solving.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s walk through a quick example.
  prefs: []
  type: TYPE_NORMAL
- en: We assume that our $10K threshold was defined as an impact of at least $10K
    per quarter. If solving a problem would not potentially bring in that amount,
    it is not worth our attention right now.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose you’ve selected the customer support ticket process. You break it down
    into key steps like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ticket submission**: Customers submit a support request.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Categorization**: The ticket is categorized based on the issue type.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assignment**: The ticket is assigned to the appropriate team member.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Resolution**: The issue is addressed, and the ticket is closed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Follow up**: The customer is contacted to ensure satisfaction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With your $10K threshold set, you now look for problems in each step that –
    if solved – would meet or exceed that value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you find that human agents typically spend a lot of time on categorizing
    tickets and figuring out the right contact person to assign a ticket to. Looking
    deeper into this process, you estimate that every agent spends about 2 hours per
    week on average assigning tickets manually. There are 15 agents all facing the
    same challenge, so that’s 30 hours per week. If a working hour costs us $30, then
    that’s about $900 per week on the table, which translates into $3,600 impact per
    month and about $10,000 impact per quarter. So, this problem has a good chance
    of sitting right above our threshold and getting prioritized. However, remember
    that the $10K threshold isn’t meant to measure the size of the problem, but the
    impact that the resolution of this problem would have. In simple words: if we
    were able to give human agents these 2 hours per day back, what would they do
    with them?'
  prefs: []
  type: TYPE_NORMAL
- en: If those 2 hours are immediately absorbed by the existing backlog of tickets,
    the impact will be felt directly through faster response times, higher customer
    satisfaction, and potentially lower churn or higher revenue retention. If operations
    are scaling and ticket volume is growing, then the freed-up capacity prevents
    the need to hire additional agents, which represents a very tangible cost avoidance.
    On the other hand, if the workload is stable and agents simply end up with more
    idle time, then the business will not realize the financial gains we calculated,
    because those hours are not being reinvested into productive work. In other words,
    the value of solving this problem is only as strong as the downstream use of the
    recovered time – whether that’s reducing backlog, handling growth without new
    hires, or reallocating capacity to higher-value activities.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve gone through the preceding high-level customer support process and
    identified a few of these $10K+ problems, that’s your signal to bring in AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now revisit the **five AI modes with core skills** (see *Figure 5.1*). Ask
    yourself: *Which skill areas might apply to the problem?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: “AI can help categorize tickets by learning from past cases”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “AI can draft first responses, saving support reps time”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These draw from skills such as classification, reading, communication, or even
    reasoning, depending on the context. (This is now also a great time to open the
    AI skills map ([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx))
    to quickly look for signal verbs.)
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.1 – AI modes with core skills](img/B31200_05_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.1: AI modes with core skills'
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/21.png)**The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR go to [packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If you identify a matching skill, make sure it also ties back to one or more
    **AI value levers** (see *Figure 5.2*):'
  prefs: []
  type: TYPE_NORMAL
- en: Can AI help solve the task **cheaper**? (Cost)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can AI help do it **better**? (Quality)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can AI help do it **faster**? (Speed)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can AI help do it at a **larger scale**? (Scalability)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If it pulls at least one of these levers for a $10K+ problem, it’s a strong
    candidate for a prototype.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tip:** You can even run this part with ChatGPT. Once you’ve defined your
    pain points and threshold, ask it to suggest AI applications using the five modes
    and value levers. It’s a fast way to spark ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: If this still sounds too abstract for you right now, don’t worry! This is just
    to give you an overview. We’ll walk through some real-world examples together
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.2 – AI value levers](img/B31200_05_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.2: AI value levers'
  prefs: []
  type: TYPE_NORMAL
- en: While internal processes are often a good entry point, they’re not the only
    one. Sometimes the better lens is your product itself - viewed from the customer’s
    perspective. Let’s take a look.
  prefs: []
  type: TYPE_NORMAL
- en: Mapping AI to products
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Mapping AI capabilities to products works essentially the same way as mapping
    to processes. But instead of looking at process steps, you’re looking at steps
    in the user journey, that is, the user’s interaction with your product. Each of
    these steps represents an opportunity to either delight your customers or, if
    not handled well, frustrate them. The pain points and bottlenecks in this journey
    define where you need to put your attention with AI. Remember – if there’s no
    pain point or bottleneck, there’s no need for AI. This applies both to product-
    and process-based mappings.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s say you’re developing a mobile app. The user journey might
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Onboarding**: The user signs up and starts using the app.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Daily use**: The user interacts with the app regularly, utilizing its core
    features.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Feature discovery**: The user explores additional features.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Customer support**: The user encounters an issue and seeks help.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Feedback loop**: The user provides feedback on their experience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'By mapping AI capabilities to the pain points and bottlenecks at these stages,
    you can uncover ways to improve the user experience - like personalized onboarding
    or faster support. However, unlike internal workflows, it’s harder to prove the
    value of a better experience in dollars. Be clear about your objective: if ROI
    is the goal, apply the $10K filter and link improvements to conversion or retention.
    If you’re pursuing product-led AI adoption and differentiation is the main goal,
    you may need to rely on softer product signals such as higher NPS or engagement.
    Either way, be explicit about how you define and measure success.'
  prefs: []
  type: TYPE_NORMAL
- en: Remember, this isn’t a one-off exercise. As your business evolves, your products
    and processes change, and new AI technologies emerge, you’ll need to revisit and
    refine your mappings. This process is iterative, which means you should be prepared
    to make adjustments as you gather more insights and data.
  prefs: []
  type: TYPE_NORMAL
- en: In the following sections, we’ll dive into three specific examples to show you
    how this mapping process works in practice. When you carefully map AI capabilities
    to your processes and products, you’re setting the stage for significant improvements
    – not only in efficiency and cost savings, but also in customer satisfaction and
    business growth.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s map this discussion into a framework that you could follow in practice.
    This would include four steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Map the business process(es).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Identify the pain points and bottlenecks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Apply the $10K threshold.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Map the AI skills to the relevant processes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The best way to understand this is to look at some examples.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s start with them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 1: Finding AI opportunities in the RFP response process'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s start with a concrete example of how to identify AI opportunities within
    a specific business process. Let’s say we’re the head of sales and, together with
    our AICoE, we’re going to look at the process of responding to requests for proposals
    (RFPs) because we’ve identified this as a big opportunity for future growth with
    multiple $10K opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Responding to RFPs is a common and often complex task in many industries, where
    organizations must prepare detailed proposals to win new business.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Mapping the business process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first step is to break down the RFP response process into its key stages.
    For many businesses, this process might look something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Analyzing the RFP**: Understanding the client’s needs and requirements, and
    deciding whether to pursue the opportunity to add an AI capability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assembling the team**: Gathering the right people to contribute to the RFP
    proposal, including subject matter experts, writers, and reviewers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Developing a proposal outline and plan**: Creating a roadmap for the proposal,
    outlining the key sections, and setting deadlines for each part.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Drafting, customizing, and reviewing content**: Writing the proposal content,
    tailoring it to the client’s specific needs, and reviewing it for accuracy and
    effectiveness.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Finalizing formatting, gaining approvals, and submitting**: Ensuring the
    proposal is well formatted, obtaining necessary approvals, and submitting the
    proposal on time.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Following up with the client and internal debriefing**: Contacting the client
    after submission to address any questions and conducting an internal review to
    learn from the experience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By mapping out these stages, we can see where the process might be slowing down,
    where errors could occur, or where there’s an opportunity to improve efficiency.
    This lays the groundwork for identifying specific pain points.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Identifying pain points and bottlenecks'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Next, we identify the pain points at each stage of the process. These are the
    challenges that make the RFP response process time-consuming, costly, or prone
    to errors. Here are some common pain points:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Analyzing the RFP**: Difficulty quickly digesting complex RFPs, leading to
    delays in decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assembling the team**: Challenges in identifying the right experts quickly,
    resulting in bottlenecks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Developing a proposal outline and plan**: Inconsistent planning processes,
    leading to gaps in the proposal or missed deadlines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Drafting, customizing, and reviewing content**: Struggling to write persuasive,
    customized content that stands out, while also ensuring compliance with all requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Finalizing formatting, gaining approvals, and submitting**: Formatting issues
    and delays in gaining necessary approvals can lead to rushed submissions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Following up with the client and internal debriefing**: Lack of systematic
    follow-up with clients and ineffective internal debriefs can result in missed
    opportunities for learning and improvement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These pain points represent opportunities where AI could potentially step in
    to optimize the process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Applying the $10K threshold'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the sake of this exercise and to keep it simple, let’s assume all of the
    above represent a minimal $10K opportunity of $10K per year.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, this would include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Analyzing the RFP:** Faster understanding would avoid $10K+ per year wasted
    on unqualified or misread bids.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assembling the team:** Quicker access to experts would save $10K+ per year
    in bottlenecks and lost proposal quality.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Developing a proposal outline and plan:** Clearer planning would prevent
    $10K+ annual losses due to rewrites and missed deadlines.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Drafting, customizing, and reviewing content:** Stronger content would win
    $10K+ per year in additional awarded revenue.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Finalizing formatting, gaining approvals, and submitting:** Smoother submission
    would protect $10K+ per year from avoidable rejections.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Following up with the client and internal debriefing**: Consistent follow-up
    would'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: increase the chances by $10K+ per year in upsells and future wins.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Step 4: Mapping AI skills to optimize the process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now comes the exciting part - mapping AI capabilities to the specific stages
    of the RFP response process to address the prioritized pain points. Here’s how
    AI could be applied:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Analyzing the RFP** would require the perception mode of AI to quickly read
    and extract key requirements from lengthy RFP documents, helping your team make
    faster and more informed go/no-go decisions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assembling the team** would require classification skills, ( the prediction
    mode ), to classify and match the most suitable experts within your organization
    based on the specific needs of the RFP, ensuring that the right people are involved
    from the start.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Developing a proposal outline and plan** will require the creation model
    with the content creation skills to generate proposal outlines after analyzing
    similar past proposals and suggesting a structure that’s both comprehensive and
    aligned with the client’s expectations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Drafting, customizing, and reviewing content** will utilize the creation
    and thinking modes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Creation mode (content creation skills)** can draft initial proposal content,
    which can then be customized by human writers.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Thinking mode (reasoning skills)** can analyze and interpret requirements
    to ensure that all mandatory elements are addressed, reducing the risk of non-compliance.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Finalizing formatting, gaining approvals, and submitting will require the creation
    and agentic modes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Creation mode (content creation skills**) can format the proposal to meet
    all guidelines quickly and accurately.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agentic mode (execution skills)** can automate the approval process by routing
    the document to the right people and sending reminders for approvals.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Following up with the client and internal debriefing** will use the creation
    and thinking modes of AI:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Creation mode (communication skills)** can draft follow-up emails.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Thinking mode (reasoning skills)** can summarize client interactions post-submission.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see, finding an AI solution does not mean applying a single AI mode
    or capability to your whole process, but instead, it’s often multiple AI modes
    working together to handle different parts or tasks. Each mode brings specific
    skills that address particular pain points in your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a simple table that visualizes this mapping:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **RFP Process Stage** | **Pain Points** | **AI Skills** |'
  prefs: []
  type: TYPE_TB
- en: '| Analyzing the RFP | Difficulty digesting complex RFPs | Reasoning skills
    for quick analysis and key requirement extraction |'
  prefs: []
  type: TYPE_TB
- en: '| Assembling the team | Challenges in identifying the right experts | Classification
    skills for matching and recommending experts |'
  prefs: []
  type: TYPE_TB
- en: '| Developing a proposal outline and plan | Inconsistent planning processes
    | Content creation skills for drafting; reasoning skills for compliance analysis
    |'
  prefs: []
  type: TYPE_TB
- en: '| Drafting, customizing, and reviewing content | Writing persuasive, customized
    content; compliance | Content creation skills for drafting content; reasoning
    skills for analyzing and interpreting requirements |'
  prefs: []
  type: TYPE_TB
- en: '| Finalizing formatting, gaining approvals | Formatting issues, approval delays
    | Content creation skills for formatting; agentic mode execution skills for approval
    automation |'
  prefs: []
  type: TYPE_TB
- en: '| Following up and internal debriefing | Ineffective follow-up and debriefs
    | Communication skills for follow-up emails; reasoning skills for interaction
    summaries |'
  prefs: []
  type: TYPE_TB
- en: 'Table 5.1: AI capability mapping table for the RFP process'
  prefs: []
  type: TYPE_NORMAL
- en: Once you map the AI skills to the stages of the RFP response process, we can
    see where AI can add value, streamline tasks, and improve overall efficiency.
    This example also demonstrates how AI can pull both the speed and quality levers
    in your RFP responses, giving your business a competitive edge.
  prefs: []
  type: TYPE_NORMAL
- en: In the next example, we’ll apply this same approach to the process of lead generation
    and qualification, another area ripe for AI-driven improvement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: AI opportunities in lead generation and qualification'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now that we’ve explored how to identify AI opportunities within the RFP response
    process, let’s turn our attention to another critical business process: lead generation
    and qualification. For many businesses, this process is the lifeblood of their
    sales funnel, driving new opportunities and potential revenue. However, it’s also
    an area that can be fraught with inefficiencies, missed opportunities, and challenges
    in scaling effectively. Let’s see how AI can help.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Mapping the business process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, let’s outline the key stages in the lead generation and qualification
    process. This process typically involves several steps, which might look something
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lead generation**: Collecting contact information and other relevant data
    on potential customers through various channels (e.g., website forms, social media,
    or events).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead segmentation**: Categorizing leads based on certain criteria, such as
    industry, company size, or potential interest in your product or service.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead scoring**: Assigning a score to each lead based on their likelihood
    to convert, which helps prioritize sales efforts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead nurturing**: Engaging with leads through targeted content, emails, or
    calls to move them further down the sales funnel.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead qualification**: Determining whether a lead is ready to be passed on
    to the sales team based on their level of engagement and fit with your target
    customer profile.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each of these stages presents an opportunity for AI to enhance the process by
    automating repetitive tasks, making better decisions, and providing insights that
    might be missed by human analysis alone.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Identifying pain points and bottlenecks'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Next, we need to identify the common pain points in the lead generation and
    qualification process. These are the challenges that often slow down the process,
    lead to missed opportunities, or cause inefficiencies. Some typical pain points
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lead generation**: Outdated or incomplete contact data, leading to high bounce
    rates and poor-quality leads.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead segmentation**: Inefficient or manual segmentation that fails to accurately
    group leads, resulting in poorly targeted marketing efforts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead scoring**: Difficulty in predicting which leads are most likely to convert,
    leading to wasted effort on low-quality leads.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead nurturing**: Time-consuming follow-up processes that are not personalized
    enough to effectively engage leads.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead qualification**: Inconsistent criteria for determining when a lead is
    sales-ready, leading to misaligned efforts between marketing and sales teams.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These pain points indicate where AI can potentially step in to optimize the
    process and improve outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Applying the $10K threshold'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s assume again that all the steps here would fit a $10K per year scope,
    so we prioritize all problems for further exploration:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lead generation:** Improved data quality would save $10K+ per year in time
    saved on not approaching bad contacts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead segmentation:** Better grouping of leads could unlock $10K+ per year
    in additional campaign revenue.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead scoring:** Focusing effort on the right leads could generate $10K+ per
    year in higher conversion value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead nurturing:** Stronger engagement would prevent drop-offs worth $10K+
    per year in lost opportunities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead qualification:** Clearer criteria would avoid $10K+ per year in wasted
    sales and marketing effort.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Mapping AI skills to optimize the process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With the pain points prioritized, we can now map AI capabilities to the specific
    stages of the lead generation and qualification process to address these challenges.
    Here’s how AI might be applied:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lead generation** can utilize the prediction mode of AI:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prediction mode with classification skills** can *classify* and *flag* potentially
    low-quality lead data.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prediction mode with regression skills** helps *estimate* the expected customer
    lifetime value (CLV) of a new lead.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lead segmentation** can employ the **perception mode with reading skills**
    to read and analyze lead interactions, such as email content or social media activity.
    This will enable automatically categorizing leads into more precise groups based
    on behavior, interests, or engagement levels.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead scoring** can be best achieved with the **prediction mode with regression
    skills** that can score and estimate each lead’s likelihood to convert, helping
    to prioritize leads that are most worth pursuing.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead nurturing** will require the **creation mode with content creation skills**.
    This mode can generate and draft personalized content for nurturing campaigns,
    such as tailored emails or relevant content suggestions based on the lead’s interaction
    history.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Lead qualification** will utilize the prediction mode and the thinking mode:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prediction mode with classification skills** can classify lead engagement
    levels and automatically determine when a lead meets the criteria to be passed
    to the sales team, ensuring that only the most qualified leads are handed off.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Thinking mode with reasoning skills** can analyze and interpret communication
    patterns to identify leads that show signs of readiness to buy, allowing sales
    teams to focus on the most promising opportunities.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s how this mapping might look in a table:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Lead Process Stage** | **Pain Points** | **AI Skills** |'
  prefs: []
  type: TYPE_TB
- en: '| Lead generation | Outdated/incomplete contact data | Classification skills
    for data quality flagging; regression skills for missing value estimation |'
  prefs: []
  type: TYPE_TB
- en: '| Lead segmentation | Inefficient or manual segmentation | Reading skills for
    behavior-based segmentation analysis |'
  prefs: []
  type: TYPE_TB
- en: '| Lead scoring | Difficulty predicting conversion likelihood | Regression skills
    for predictive scoring |'
  prefs: []
  type: TYPE_TB
- en: '| Lead nurturing | Time-consuming, non-personalized follow-up | Content creation
    skills for personalized automated follow-ups |'
  prefs: []
  type: TYPE_TB
- en: '| Lead qualification | Inconsistent criteria for sales-readiness | Classification
    skills and reasoning skills for readiness detection |'
  prefs: []
  type: TYPE_TB
- en: 'Table 5.2: AI capability mapping table for the lead process'
  prefs: []
  type: TYPE_NORMAL
- en: By mapping AI capabilities to these stages, you can see how AI could streamline
    lead generation and qualification, making these processes more efficient, scalable,
    and effective. This approach not only helps in generating higher-quality leads
    but also ensures that your sales team focuses their efforts on the most promising
    opportunities, ultimately driving better conversion rates.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 3: Enhancing a product user journey with AI'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Thus far, we’ve focused on identifying AI opportunities within internal business
    processes. Now, let’s shift our attention to the external side – how AI can enhance
    your products by improving the user journey and overall customer experience. This
    approach is particularly valuable for businesses that offer digital products or
    services, where the user experience can make or break the product’s success.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore how AI can enhance a specific aspect of the customer journey in
    an e-commerce setting – namely, the product search process. This is a critical
    touchpoint in the customer experience, as it often determines whether a visitor
    becomes a paying customer or leaves your site frustrated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Mapping the product search process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The product search process in an e-commerce store typically involves several
    key stages that a customer goes through when trying to find the right product.
    These stages might include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Search query input**: The customer enters a search term into the search bar
    or uploads an image of the product they’re looking for.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Search results display**: The system returns a list of products that match
    the search query or the uploaded image.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Filtering and sorting**: The customer refines the search results using filters
    (e.g., price, brand, or ratings) and sorting options (e.g., relevance or popularity).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Product evaluation**: The customer reviews product details, images, and customer
    reviews to assess suitability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Product selection**: The customer adds a product to the cart or decides to
    continue searching.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These steps are crucial in guiding the customer to find exactly what they’re
    looking for, and each one presents opportunities for AI to enhance the experience,
    making it more personalized, efficient, and satisfying.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Identifying user pain points and bottlenecks'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To identify where AI can make a difference, we first need to understand the
    common pain points customers face during the product search process. Here are
    some typical issues:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Search query input**: Customers may struggle to articulate exactly what they’re
    looking for, leading to vague or inaccurate search queries that return irrelevant
    results. Some may even prefer to search by uploading an image rather than typing
    out their query.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Search results display**: The search engine might return too many results,
    overwhelming the customer, or too few, frustrating them by not showing relevant
    options.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filtering and sorting**: Applying filters can be cumbersome, and customers
    may have difficulty finding the exact products they need without extensive manual
    sorting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product evaluation**: Customers often find it challenging to compare similar
    products based on detailed specifications, reviews, and images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product selection**: Indecision can arise if the customer isn’t confident
    that they’ve found the best option, leading to cart abandonment or continued searching.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These pain points highlight the areas where the product search experience can
    be improved with AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Applying the $10K threshold'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s how the $10K prioritization could look:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Search query input:** Clearer queries would prevent $10K+ per year in lost
    sales from irrelevant results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Search results display:** More relevant results would capture $10K+ per year
    in revenue otherwise lost to frustration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filtering and sorting:** Easier navigation would unlock $10K+ per year in
    sales by helping customers find products faster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product evaluation:** Better comparison would drive $10K+ per year in higher
    conversions from confident purchase decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product selection:** Reducing indecision would recover $10K+ per year otherwise
    lost to cart abandonment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Mapping AI skills to enhance the product search process'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s explore how specific AI skills can be applied to each stage of the product
    search process to address these pain points and create a more seamless customer
    experience:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Search query input** will utilize the perception mode:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Perception mode (reading skills**): AI can interpret and understand customer
    queries, even if they’re vague or complex. For example, if a customer types “comfortable
    shoes for running,” AI can interpret the intent and prioritize showing running
    shoes with high comfort ratings**.**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Perception mode (seeing skills):** AI can allow customers to scan and recognize
    products by uploading an image instead of typing a query. For instance, if a customer
    sees a jacket they like in a photo, they can upload that image, and AI will identify
    similar jackets available in the store (in combination with **classification skills
    from prediction mode**).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prediction mode (classification skills)**: AI can suggest and recommend smart
    auto-suggestions as the customer types or immediately after an image is uploaded,
    offering popular or related search terms to guide the user more effectively. This
    reduces the likelihood of entering a query that yields poor results.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Search results display** can use the **prediction mode (regression skills).**
    AI can rank search results based on customer preferences using data such as their
    browsing history and past purchases to tailor the search results to each individual.
    For instance, if a customer frequently buys eco-friendly products, the search
    engine can prioritize sustainable options in the results.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Filtering and sorting** would employ the thinking mode and the prediction
    mode:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Thinking mode (reasoning skills):** AI can contextualize customer behavior
    and recommend the most relevant filters based on the customer’s query, behavior,
    or uploaded image. For example, if a customer searches for “summer dresses” or
    uploads a picture of one, the system might automatically suggest filters such
    as “lightweight fabrics” or “sleeveless.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prediction mode (classification or regression skills):** Instead of relying
    on basic sorting options, AI can rank and prioritize products based on a combination
    of factors such as relevance.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product evaluation** would benefit from the thinking and creation modes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Thinking mode (reasoning skills):** AI can summarize and synthesize customer
    reviews, extracting key themes and sentiments to provide a quick overview. This
    saves the customer time by reducing the need to read through dozens of reviews.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Creation mode (content creation skills):** AI can write a summary based on
    the synthesized insights, which is personalized to the criteria that the user
    really cares about.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product** **selection** can be achieved with the **prediction mode (classification
    skills**): Based on the customer’s search behavior, uploaded image, and preferences,
    AI recommends alternative or complementary products based on shopping behavior
    from similar clients.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here’s how this mapping might look in a table:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Product Search Stage** | **Pain Points** | **AI Skills** |'
  prefs: []
  type: TYPE_TB
- en: '| Search query input | Vague/inaccurate search queries; preference for visual
    search | Reading skills for better query interpretation; seeing skills for image
    upload; classification skills for auto-suggestions |'
  prefs: []
  type: TYPE_TB
- en: '| Search results display | Too many/too few results; irrelevant options | Regression
    skills for improved search result ranking |'
  prefs: []
  type: TYPE_TB
- en: '| Filtering and sorting | Cumbersome filtering; difficulty finding exact matches
    | Reasoning skills to suggest relevant filters; classification skills to dynamically
    re-rank products based on user preferences |'
  prefs: []
  type: TYPE_TB
- en: '| Product evaluation | Difficulty comparing products | Reasoning skills for
    review analysis; content creation skills for personalized summaries |'
  prefs: []
  type: TYPE_TB
- en: '| Product selection | Indecision and cart abandonment | Classification skills
    for cross-promotion and upselling recommendations |'
  prefs: []
  type: TYPE_TB
- en: 'Table 5.3: AI capability mapping table for the product search process'
  prefs: []
  type: TYPE_NORMAL
- en: By mapping AI capabilities to the stages of the product search process, you
    can significantly enhance the customer experience on your e-commerce platform.
    AI doesn’t just make the search faster – it also makes it better by making it
    more intuitive and aligned with what the customer is actually looking for. This
    leads to higher satisfaction, increased conversion rates, and, ultimately, a more
    successful e-commerce business.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve seen the mapping process in action, let’s zoom out and review
    some best practices that apply across all use cases, ensuring you can effectively
    apply these strategies across both processes and products.
  prefs: []
  type: TYPE_NORMAL
- en: Practical tips for identifying AI opportunities
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'By now, you’ve seen how AI can be mapped to both business processes and product
    journeys to create significant improvements in efficiency, customer satisfaction,
    and overall business value. But to effectively identify and capitalize on AI opportunities
    within your own organization, it’s essential to follow some best practices. These
    practices will help ensure that your AI initiatives are not only well conceived
    but also aligned with your broader business goals:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Keep your business interests first**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first and most crucial step is to align AI initiatives with your overarching
    business objectives. AI should never be implemented just for the sake of it; it
    should serve a clear purpose that drives your business forward. Whether your goal
    is to increase revenue, improve customer satisfaction, streamline operations,
    or innovate your product offerings, AI should be a means to achieve these ends.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tip:** Begin by clearly defining the business problems you want to solve
    or the opportunities you want to explore. For example, if your goal is to reduce
    customer churn, AI might be used not only to predict at-risk customers but also
    trigger targeted retention strategies. Always tie your AI projects back to these
    concrete business objectives to ensure they deliver real value.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Collaborate across departments**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI initiatives are most successful when they are cross-functional. The impact
    of AI often spans multiple departments, so it’s essential to involve stakeholders
    from different parts of the organization. Create cross-functional teams that include
    both technical members (such as IT, data science, and data analytics) and less-technical
    business units (such as marketing, sales, product management, etc.) that are relevant
    for the given use case. These teams can provide diverse perspectives and ensure
    that AI initiatives are grounded in both technical feasibility and business needs.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you’re looking to implement AI in your customer support operations,
    involve people from service, IT, and marketing. Support can surface the most common
    pain points, IT ensures the chatbot integrates securely with your systems, and
    marketing makes sure the chatbot connects seamlessly to your website so customers
    are directed to the right resources.
  prefs: []
  type: TYPE_NORMAL
- en: '**Iterate and refine**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Treat this phase as a brainstorming exercise. Move quickly through the mapping
    process, jotting down where AI might fit and how it could address identified pain
    points. Don’t worry about getting everything perfect for now; the purpose is to
    create a broad map of possibilities that you’ll dive deeper into later. This approach
    ensures that you’re not paralyzed by analysis and can move on to scoping and prioritizing
    use cases more effectively.
  prefs: []
  type: TYPE_NORMAL
- en: '**Leverage external expertise**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This stage is a good opportunity for bringing in external expertise that has
    worked on similar challenges already, providing specialized knowledge or tools
    that you might not have in-house.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tip:** Consider working with AI consultants, attending AI-focused workshops,
    or using AI concept sessions to kickstart your initiatives. External experts can
    offer fresh perspectives, introduce new methodologies, and help avoid common pitfalls.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ensure ethical AI use**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As AI becomes more integrated into business processes and products, it’s critical
    to consider the ethical implications of using AI. While we’ll explore the ethical
    dimension of AI use cases in more detail later, it’s best practice to think about
    ethics from the start. This includes ensuring data privacy and being transparent
    with customers and stakeholders about how AI is being used. Establish clear ethical
    guidelines for the use of AI within your organization.
  prefs: []
  type: TYPE_NORMAL
- en: By now, you’ve identified high-value problems and mapped them to AI capabilities
    and value levers. But what happens next? Let’s talk about it.
  prefs: []
  type: TYPE_NORMAL
- en: Effective workflow augmentation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'A common instinct is to ask, *Can AI fully automate this?* but that’s not always
    the best question. A more useful mindset at this stage is: **How can we bring
    AI into this workflow to pull at least one of the value levers so we cross our
    value threshold?**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the difference between automation and **augmentation** – a concept we’ll
    explore even further in the next chapter. Instead of handing over full control
    to AI, effective augmentation means weaving AI into an existing process in a way
    that helps people work faster, better, and with less effort – or to achieve scale
    that would otherwise be blocked by manual labor constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Take Apple’s Math Notes ([https://support.apple.com/en-gb/guide/iphone/iph46efa613a/ios](https://support.apple.com/en-gb/guide/iphone/iph46efa613a/ios))
    feature, for example. It lets users handwrite equations on an iPad, instantly
    recognizes the input, and provides real-time results or visualizations – without
    interrupting the flow. There’s no *AI mode* to switch on. It just works.
  prefs: []
  type: TYPE_NORMAL
- en: 'This kind of experience doesn’t happen by accident. It reflects a set of principles
    known as **TRICUS** ([https://www.oreilly.com/library/view/augmented-analytics/9781098151713/ch05.html](https://www.oreilly.com/library/view/augmented-analytics/9781098151713/ch05.html)),
    which define what effective AI augmentation looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Timely**: AI offers help at just the right moment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relevant**: It aligns with the user’s intent or goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Insightful**: It provides meaningful, actionable support.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Credible**: The output can be trusted.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unobtrusive**: It doesn’t interrupt the user’s flow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Specific**: It’s tailored to the precise need at hand.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You don’t need to redesign your entire process to benefit from AI. In fact,
    some of the best results come from small, targeted enhancements that remove friction
    without adding complexity. Of course, once you bring AI into a process, it’s worth
    stepping back to ask whether a more fundamental redesign could unlock even greater
    value.
  prefs: []
  type: TYPE_NORMAL
- en: This mindset will serve you well as you move into testing and prototyping. In
    the next chapter, we’ll dive deeper into how to scope your AI use cases, build
    smart prototypes, and ensure your AI solutions aren’t just technically sound but
    truly improve the way people work – and drive business impact.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Identifying AI opportunities within your business is a strategic process that
    involves mapping AI modes and skills to your business objectives, involving the
    right people, and continuously refining your approach. By following these best
    practices, you can maximize the impact of AI in your organization, turning AI
    from a buzzword into a powerful driver of business success.
  prefs: []
  type: TYPE_NORMAL
- en: The key is understanding how the five AI modes – prediction, perception, creation,
    thinking, and agentic – can address specific problems in your processes and products
    that are worth solving. Whether you’re using classification skills to improve
    lead scoring, reading skills to process customer feedback, or reasoning skills
    to synthesize complex information, the key is to match these skills to problems
    that are actually worth solving with AI.
  prefs: []
  type: TYPE_NORMAL
- en: Use your $10K threshold to focus on high-value opportunities, and your value
    levers – cost, quality, speed, and scalability – to frame how AI will drive impact.
  prefs: []
  type: TYPE_NORMAL
- en: 'And remember: AI’s power often comes not from full automation, but from thoughtful
    workflow augmentation. Bringing AI into an existing process at the right moment
    can improve outcomes without adding complexity.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As you move forward, keep these principles in mind: start with clear goals,
    involve cross-functional teams, iterate on your initiatives, seek external expertise
    when needed, focus on quick wins, and always consider the ethical implications
    of your AI use.'
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll explore how to scope, prioritize, and plan AI use
    cases effectively – so you can invest in the right projects that deliver real
    ROI.
  prefs: []
  type: TYPE_NORMAL
