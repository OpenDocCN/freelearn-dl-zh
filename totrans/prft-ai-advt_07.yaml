- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Finding AI Opportunities in Processes and Products
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在流程和产品中寻找人工智能机会
- en: You’ve already taken some important steps on your AI journey. You’ve built a
    foundational understanding of AI, mapped out your business’s pain points and bottlenecks,
    and started thinking about how AI might fit into your overall strategy. But now
    comes a crucial part of the process – identifying the specific opportunities where
    AI can actually make a difference. This is where the rubber meets the road.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你在人工智能之旅上已经迈出了重要的一步。你已经建立了人工智能的基础知识，绘制出了你业务的痛点瓶颈，并开始思考人工智能如何融入你的整体战略。但现在，这个过程的关键部分来了——识别那些人工智能能够真正产生影响的特定机会。这正是“真刀真枪”的时候。
- en: The truth is, not every problem in your business is a good fit for AI. In fact,
    trying to force AI into a situation where it doesn’t belong can lead to wasted
    resources, frustration, and, ultimately, failure. So, how do you find those sweet
    spots, those places where AI can really shine and provide tangible value? The
    answer lies in mapping AI capabilities to your business processes and products.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，并不是你业务中的每一个问题都适合人工智能。实际上，试图将人工智能强加在不属于它的环境中可能会导致资源浪费、挫败感，最终甚至失败。那么，如何找到那些甜蜜点，那些人工智能真正能够发光发热并提供实际价值的地方呢？答案在于将人工智能的能力与你的业务流程和产品相匹配。
- en: In this chapter, we’ll walk through how to systematically identify AI opportunities.
    We’ll start by exploring how to map AI capabilities to your existing processes,
    highlighting areas where AI can solve specific pain points or remove bottlenecks.
    But we won’t stop there. We’ll also look at how this approach can be applied to
    your products by enhancing user journeys and improving customer experiences.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将系统地介绍如何识别人工智能机会。我们将首先探讨如何将人工智能能力映射到现有的流程中，突出人工智能可以解决特定痛点或消除瓶颈的区域。但我们不会就此止步。我们还将探讨如何通过增强用户体验和改善客户体验来将这种方法应用于你的产品。
- en: By the end of this chapter, you’ll not only have a better grasp of where AI
    can be implemented in your organization, but you’ll also understand how to approach
    this process with a strategic mindset. We’ll dive into examples that illustrate
    these concepts in action, helping you to see the practical steps you can take
    to identify AI opportunities that are the right fit for your business.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你不仅会对人工智能在你组织中的实施有更深入的了解，而且还会理解如何以战略思维来处理这个过程。我们将通过一些实例来展示这些概念的实际应用，帮助你看到你可以采取的实用步骤来识别适合你业务的人工智能机会。
- en: 'This chapter will cover the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Understanding the process of mapping AI capabilities
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解映射人工智能能力的过程
- en: 'Example 1: Finding AI opportunities in the RFP response process'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例 1：在RFP响应过程中寻找人工智能机会
- en: 'Example 2: AI opportunities in lead generation and qualification'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例 2：在潜在客户生成和资格认证中的人工智能机会
- en: 'Example 3: Enhancing a product user journey with AI'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例 3：利用人工智能增强产品用户体验
- en: Practical tips for identifying AI opportunities
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别人工智能机会的实用技巧
- en: Effective workflow augmentation
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效的流程增强
- en: Let’s roll up our sleeves and start identifying those AI opportunities that
    can take your business to the next level.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们卷起袖子，开始识别那些能够将你的业务提升到下一个水平的人工智能机会。
- en: Understanding the process of mapping AI capabilities
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解映射人工智能能力的过程
- en: 'When it comes to identifying AI opportunities, one of the most effective methods
    is to map AI capabilities directly to your business processes and products. This
    might sound a bit abstract at first, but it’s really about taking a step-by-step
    approach to understanding where AI can add value. Whether you’re looking at internal
    processes or customer-facing products, the goal is the same: find those areas
    where AI can solve problems, enhance efficiency, or improve the customer experience.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到识别人工智能机会时，最有效的方法之一是将人工智能能力直接映射到你的业务流程和产品中。一开始这可能听起来有些抽象，但实际上，它真的是采取一步一步的方法来理解人工智能可以增加价值的地方。无论你是查看内部流程还是面向客户的产品，目标都是一样的：找到那些人工智能可以解决问题、提高效率或改善客户体验的区域。
- en: Let’s break this down.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步步来分析。
- en: Mapping AI to business processes
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将人工智能映射到业务流程
- en: First, let’s talk about business processes. Every organization has them – whether
    it’s how you handle customer inquiries, how your sales team qualifies leads, or
    how you manage supply chain logistics. These processes often involve multiple
    steps, and within each step there might be inefficiencies, bottlenecks, or opportunities
    for improvement. This is where AI can come in.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们谈谈业务流程。每个组织都有——无论是处理客户咨询、销售团队如何筛选潜在客户，还是如何管理供应链物流。这些流程通常涉及多个步骤，在每一步中可能存在低效、瓶颈或改进的机会。这就是AI可以介入的地方。
- en: So, how do you find a good place to start? It depends on your approach.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，您如何找到一个好的起点呢？这取决于您的做法。
- en: In an opportunistic scenario, you can start with anything that’s currently relevant
    - like a process you’re responsible for. In a divide-and-conquer approach, the
    entry point ties back to a north star, with processes chosen deliberately because
    they block progress toward it. From there, source problems without worrying about
    scoping yet - just surface anything painful, inefficient, or limiting using the
    pain points and bottlenecks method from the last chapter.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个机会主义场景中，您可以从任何当前相关的事物开始——比如您负责的流程。在分而治之的方法中，切入点与一个北极星（目标）相联系，流程的选择是故意为之，因为它们阻碍了向该目标迈进。从那里开始，无需担心范围界定，只需使用上一章中提到的痛点和方法，找出任何痛苦、低效或限制性的问题。
- en: 'Next, apply your $10K threshold. To recap: this is the minimum recurring value
    (per month, quarter, etc.) that a problem must offer to justify further exploration.
    Problems that don’t meet that bar are filtered out. Problems that clearly exceed
    it are kept – and that’s when you zoom in.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，应用您的$10K阈值。为了回顾：这是一个问题必须提供的最低持续价值（每月、每季度等），以证明进一步探索的合理性。不符合该标准的问题将被筛选出去。明显超过该标准的问题将被保留——这时您就需要聚焦于它们。
- en: 'If a problem seems large – multiple times above your threshold – you don’t
    want to treat it as a single monolith. Instead, break it down into a sub-process
    with 5–6 meaningful steps. Then, map problems at this more detailed level and
    reapply the $10K filter. You repeat this loop – map → filter → zoom → repeat –
    until you reach a level where either of the following applies:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个问题看起来很大——多次超过您的阈值——您不想将其视为一个单一的巨石。相反，将其分解为一个包含5-6个有意义的子步骤的子流程。然后，在这个更详细的层面上映射问题，并重新应用$10K过滤器。您重复这个循环——映射→过滤→聚焦→重复——直到达到以下任一条件：
- en: The $10K problems are **reasonably distributed** across the 5 - 6 steps.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $10K问题在5-6个步骤中**合理分布**。
- en: Breaking it down further would dilute the value below your threshold.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进一步分解会稀释其价值，低于您的阈值。
- en: This method keeps your AI exploration focused, actionable, and grounded in business
    impact. It ensures you’re always working on something that’s genuinely worth solving.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使您的AI探索保持专注、可操作，并基于业务影响。它确保您始终在解决真正值得解决的问题。
- en: Let’s walk through a quick example.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速通过一个例子来了解一下。
- en: We assume that our $10K threshold was defined as an impact of at least $10K
    per quarter. If solving a problem would not potentially bring in that amount,
    it is not worth our attention right now.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们假设我们的$10K阈值被定义为每季度至少$10K的影响。如果解决问题不会带来该金额，那么现在它不值得我们关注。
- en: 'Suppose you’ve selected the customer support ticket process. You break it down
    into key steps like this:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您已经选择了客户支持工单流程。您将其分解为以下关键步骤：
- en: '**Ticket submission**: Customers submit a support request.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提交工单**：客户提交支持请求。'
- en: '**Categorization**: The ticket is categorized based on the issue type.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分类**：根据问题类型对工单进行分类。'
- en: '**Assignment**: The ticket is assigned to the appropriate team member.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分配任务**：工单被分配给适当的团队成员。'
- en: '**Resolution**: The issue is addressed, and the ticket is closed.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决**：问题得到解决，工单被关闭。'
- en: '**Follow up**: The customer is contacted to ensure satisfaction.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**跟进**：联系客户以确保满意度。'
- en: With your $10K threshold set, you now look for problems in each step that –
    if solved – would meet or exceed that value.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置好您的$10K阈值后，您现在需要寻找每个步骤中存在的问题，如果解决了这些问题，它们将满足或超过该价值。
- en: 'Let’s say you find that human agents typically spend a lot of time on categorizing
    tickets and figuring out the right contact person to assign a ticket to. Looking
    deeper into this process, you estimate that every agent spends about 2 hours per
    week on average assigning tickets manually. There are 15 agents all facing the
    same challenge, so that’s 30 hours per week. If a working hour costs us $30, then
    that’s about $900 per week on the table, which translates into $3,600 impact per
    month and about $10,000 impact per quarter. So, this problem has a good chance
    of sitting right above our threshold and getting prioritized. However, remember
    that the $10K threshold isn’t meant to measure the size of the problem, but the
    impact that the resolution of this problem would have. In simple words: if we
    were able to give human agents these 2 hours per day back, what would they do
    with them?'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你发现人类代理通常花费大量时间在分类工单和确定正确的联系人来分配工单上。深入分析这个过程，你估计每个代理平均每周花费大约2小时手动分配工单。有15个代理都面临着同样的挑战，所以每周就是30小时。如果每小时的工作成本为30美元，那么每周的成本大约是900美元，换算成每月影响约为3600美元，每季度约为10000美元。因此，这个问题有很大可能正好在我们的阈值之上，并得到优先处理。然而，记住，10K的阈值并不是用来衡量问题的大小，而是衡量解决这个问题的影响。简单来说：如果我们能够每天给人类代理节省这2小时，他们会用这些时间做什么？
- en: If those 2 hours are immediately absorbed by the existing backlog of tickets,
    the impact will be felt directly through faster response times, higher customer
    satisfaction, and potentially lower churn or higher revenue retention. If operations
    are scaling and ticket volume is growing, then the freed-up capacity prevents
    the need to hire additional agents, which represents a very tangible cost avoidance.
    On the other hand, if the workload is stable and agents simply end up with more
    idle time, then the business will not realize the financial gains we calculated,
    because those hours are not being reinvested into productive work. In other words,
    the value of solving this problem is only as strong as the downstream use of the
    recovered time – whether that’s reducing backlog, handling growth without new
    hires, or reallocating capacity to higher-value activities.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这2小时立即被现有的工单积压所吸收，那么影响将直接体现在更快的响应时间、更高的客户满意度和潜在的更低流失率或更高的收入保留。如果运营正在扩展，工单量在增长，那么释放出的容量可以防止需要雇佣额外的代理，这代表了一种非常实际的成本避免。另一方面，如果工作量稳定，代理只是简单地拥有更多的空闲时间，那么企业将不会实现我们计算出的财务收益，因为那些小时并没有被重新投资到生产性工作中。换句话说，解决问题的价值仅在于恢复时间的下游使用——无论是减少积压、在不增加新雇佣的情况下处理增长，还是将容量重新分配到更高价值的活动。
- en: Once you’ve gone through the preceding high-level customer support process and
    identified a few of these $10K+ problems, that’s your signal to bring in AI.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你完成了前面的高级客户支持流程，并识别出几个这些10K+的问题，那就是引入AI的信号。
- en: 'Now revisit the **five AI modes with core skills** (see *Figure 5.1*). Ask
    yourself: *Which skill areas might apply to the problem?*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在重新审视**带有核心技能的五种AI模式**（见图5.1）。问问自己：*哪些技能领域可能适用于这个问题？*
- en: 'For example:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: “AI can help categorize tickets by learning from past cases”.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “AI可以通过学习过去的案例来帮助分类工单。”
- en: “AI can draft first responses, saving support reps time”.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “AI可以起草初步回应，节省支持代表的时间。”
- en: These draw from skills such as classification, reading, communication, or even
    reasoning, depending on the context. (This is now also a great time to open the
    AI skills map ([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx))
    to quickly look for signal verbs.)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技能来源于分类、阅读、沟通甚至推理等方面，具体取决于情境。（现在也是打开AI技能图谱([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx))的好时机，以便快速查找信号动词。）
- en: '![Figure 5.1 – AI modes with core skills](img/B31200_05_01.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图5.1 – 带核心技能的AI模式](img/B31200_05_01.png)'
- en: 'Figure 5.1: AI modes with core skills'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1：带核心技能的AI模式
