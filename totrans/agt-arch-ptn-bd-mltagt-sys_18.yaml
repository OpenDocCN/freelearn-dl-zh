- en: '15'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Agent Frameworks – Use Case: A Multi-Agent System for Loan Processing with
    CrewAI and LangGraph'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Throughout this book, we've explored the concepts, architectures, and patterns
    that underpin agentic AI systems. We've examined their building blocks, how they
    interact, and how they can be coordinated to tackle complex tasks. However, translating
    these theoretical constructs into functional, production-ready applications requires
    practical tools and libraries that handle the underlying complexities of agent
    creation, execution, and communication. This is where agent frameworks come into
    play.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building an agentic system from scratch involves managing numerous moving parts:
    defining agent roles and capabilities, handling state and memory, orchestrating
    workflows, integrating LLMs, managing tool use (such as function calling), and
    facilitating communication between agents.'
  prefs: []
  type: TYPE_NORMAL
- en: Agent frameworks provide abstractions and pre-built components that simplify
    these tasks, allowing developers to focus on the application logic and agent capabilities
    rather than reinventing the foundational plumbing. They offer structured approaches
    to common challenges in agent development that promote faster development cycles
    and more maintainable code, and often incorporate best practices for interaction
    and control.
  prefs: []
  type: TYPE_NORMAL
- en: In the rapidly evolving landscape of agentic AI, several frameworks have emerged,
    each with its own philosophy, strengths, and target use cases. While we will focus
    on three prominent examples to demonstrate implementation, it is important to
    note that these are illustrative rather than exhaustive; the underlying design
    patterns discussed in this book are universal and generalize to other frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will provide a practical introduction to three prominent
    examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Google's Agent Development Kit (ADK)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CrewAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LangGraph
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will start by briefly introducing each framework, highlighting its core concepts.
    Then, we will explore their similarities and differences to help you understand
    their respective design philosophies. To make the comparison concrete, we will
    reimplement the loan processing agent use case from *[Chapter 13](Chapter_13.xhtml#h1_639)*
    using both CrewAI and LangGraph. Since we extensively utilized Google's ADK in
    the previous chapters to establish the baseline architecture, we will not repeat
    that implementation here. Instead, we will focus on showing how the same problem
    can be approached using different framework paradigms based on the code in our
    accompanying notebook. Finally, we'll discuss key considerations when choosing
    an agent framework for your project, emphasizing the importance of aligning the
    framework's capabilities with your specific use case, and the ongoing need for
    robust observability and adherence to responsible AI principles, regardless of
    the tools you choose.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we understand the importance of frameworks in building agentic systems,
    let''s take a closer look at our first example: Google''s ADK.'
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of the practical examples in this chapter, you will need
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A Python environment (version 3.10+)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Jupyter Notebook interface (e.g., JupyterLab, Google Colab, or VS Code)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Google Cloud project with the Vertex AI API enabled or a Google AI Studio
    API key
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following Python libraries installed: `crewai`, `langgraph`, `langchain``-google-``genai`,
    and `google-cloud-``aiplatform`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The complete code for this chapter is available in the following folder within
    the book''s GitHub repository: [https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems/tree/main/Chapter_15](https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems/tree/main/Chapter_15).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we understand the importance of frameworks in building agentic systems,
    let''s take a closer look at our first example: Google''s ADK.'
  prefs: []
  type: TYPE_NORMAL
- en: Google's Agent Development Kit (ADK)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we saw in the previous examples, Google's ADK provides a structured environment
    for building and idx_4b4d4356deploying AI agents. It is designed with production
    readiness in mind, offering components for defining agents, managing their life
    cycles, integrating tools, and facilitating communication, particularly in multi-agent
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: 'ADK aims to provide the foundational scaffolding for building agents that can
    reason, plan, and interact idx_53ea9976reliably with external systems and other
    agents. Key features often include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent abstraction**: A base class or structure for defining an agent''s core
    logic, including its instructions, tools, and how it handles incoming tasks or
    messages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool integration**: Mechanisms for defining and registering tools (often
    functions or APIs) that agents can utilize to interact with the outside world
    or perform specific actions, aligning with the concept of agents using tools to
    act on their environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Planning and reasoning**: Integration with LLMs (such as Gemini) to power
    the agent''s reasoning loop: processing information, planning steps, and deciding
    when to use tools. ADK often includes built-in planners or allows for custom planning
    logic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State management**: Mechanisms for agents to maintain state and memory across
    interactions, which is crucial for complex, multi-step tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Communication protocol**: Native idx_5817bfd8support for the **Agent-to-Agent**
    (**A2A**) interoperability protocol. ADK enables agents to use A2A''s standardized
    message formats and task life cycles to communicate and collaborate across different
    frameworks and enterprise boundaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Runtime environment**: An execution environment (agent runtime or agent engine)
    that manages agent deployment, task distribution, parallel execution, and retries,
    and potentially integrates with observability tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The loan processing example in *Chapters 13* and *14* demonstrated how ADK allows
    defining distinct agent functionalities (document validation, credit check, risk
    assessment, and compliance check) as tools and orchestrating their execution via
    an LLM-powered agent following specific instructions. ADK provides the structure
    to build such goal-oriented, tool-using agents within a managed runtime.
  prefs: []
  type: TYPE_NORMAL
- en: CrewAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: CrewAI offers idx_92ad8e97a different perspective on building agentic systems,
    focusing explicitly on collaborative intelligence through role-playing agents.
    It provides a framework for orchestrating autonomous AI agents that work together
    as a cohesive "crew."
  prefs: []
  type: TYPE_NORMAL
- en: The core philosophy behind CrewAI is that complex tasks can often be broken
    down and assigned to agents with specific roles, responsibilities, and even "backstories"
    that guide their behavior and expertise. These agents then collaborate, sharing
    information and intermediate results, to achieve a common objective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key concepts idx_41e99904in CrewAI include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agents**: Defined with a specific role, goal, and backstory, the LLM they
    use, and potentially specific tools they have access to. The role-playing aspect
    helps the LLM embody a particular persona or expertise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tasks**: Specific assignments given to agents. Each task has a description
    and expected output and is assigned to a particular agent. Tasks can be chained,
    allowing the output of one task to become the input for another.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools**: Similar to other frameworks, these are functions or capabilities
    agents can use to interact with external systems or perform actions (e.g., search
    the web, access an API). In CrewAI, tools often inherit from a `BaseTool` class.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Crew**: The collection of agents and the tasks they need to perform. The
    crew defines how the agents collaborate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Process**: The workflow or methodology the crew follows to execute the tasks.
    Common processes include sequential (tasks executed one after another) or hierarchical
    (a manager agent delegates tasks).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CrewAI emphasizes the social aspect of agent interaction, making it intuitive
    to design systems where different AI personas contribute specialized skills, mirroring
    how human teams operate. It aims to simplify the creation of multi-agent systems
    by providing high-level abstractions for defining roles and managing collaborative
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: However, a key consideration for enterprise architects is that this "persona-driven"
    style can introduce variability in the model's output. When applying CrewAI to
    regulated or high-stakes workflows, such as our loan adjudication use case, it
    is critical to counterbalance this flexibility with strict tool contracts and
    rigorous testing to ensure deterministic and compliant outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LangGraph extends idx_e1f11775the popular LangChain library, providing a robust
    way to build stateful, multi-actor applications, including complex agentic systems,
    using graphs. While LangChain focuses on chaining calls (linear sequences), LangGraph
    allows for cycles, making it suitable for modeling agent behaviors more flexibly,
    as agents often need to loop, retry, or dynamically decide the next step based
    on the current state.
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph represents idx_a74bd4e4agentic workflows as **state machines**. Each
    step in the workflow is a **node** in the graph, and the transitions between steps
    are **edges**. This graph structure explicitly manages the application's state
    as it evolves.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key concepts in LangGraph include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**StateGraph**: The core object representing the workflow graph. It holds the
    application''s state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State**: A defined idx_9aab37f3data structure (often a Python class or dictionary,
    such as `TypedDict`) that holds all the information relevant to the workflow''s
    progress (e.g., user input, intermediate results, agent messages).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nodes**: Functions or runnable objects that represent steps or actors (agents)
    in the graph. Each node receives the current state, performs an action (such as
    calling an LLM, using a tool, or processing data), and returns updates to the
    state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edges**: Define the transitions between nodes. Edges determine the next node
    to execute based on the current state or the output of the previous node.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conditional edges**: Allow for branching logic. Based on the current state
    or the output of a node, the graph can route execution to different subsequent
    nodes, enabling complex decision-making and loops.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'LangGraph is particularly well suited for applications where the following
    apply:'
  prefs: []
  type: TYPE_NORMAL
- en: Explicit state management is crucial
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cyclical idx_fd9803f2processes are needed (e.g., an agent reflecting on its
    output and retrying, or **H****uman-in-the-****L****oop** (**HITL**) interactions)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Complex control flow involving branching and dynamic routing is required
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modeling interactions between multiple agents or actors (including humans) is
    necessary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By representing idx_1c6c3e1bagent interactions as a graph, LangGraph provides
    fine-grained control over the flow of execution and state persistence, making
    it a powerful tool for building sophisticated and reliable agentic applications.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have seen what each of these frameworks is capable of, let's highlight
    the similarities and differences between them.
  prefs: []
  type: TYPE_NORMAL
- en: Similarities and differences between the three frameworks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While all three frameworks aim to help you build sophisticated agentic applications,
    their underlying philosophies and architectures guide them toward different strengths.
  prefs: []
  type: TYPE_NORMAL
- en: Similarities
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'All three idx_89bca12bframeworks share a common conceptual foundation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LLM as the reasoning engine**: At their heart, all three frameworks use an
    LLM (such as Gemini, GPT-4, or an open source model) as the "brain" of the agent.
    The LLM is responsible for reasoning, planning, and deciding what to do next based
    on a prompt, the current state, and available tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool integration**: They are idx_a5d83495all built around the ***Function
    Calling*** or ***Tool Use*** pattern, which we''ve identified as fundamental to
    agentic AI. An idx_c1042396agent''s ability to act upon the world, for example,
    to search a database, read a file, or call an API, is enabled by idx_95c8eca2providing
    it with a set of tools. All three frameworks provide a structured way to define
    these tools and make them available to the LLM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Goal-oriented**: These are idx_3b41baa3not tools for simple, single-shot
    Q&A. They are designed to build applications that can execute complex, multi-step
    tasks to achieve a specific, developer-defined goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Key differences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The primary differences lie in their core abstraction, that is, the mental
    model they use to represent an idx_729c2dfdagentic workflow. This fundamental
    difference influences everything from control flow to state management. To help
    you evaluate which mental model best fits your specific use case, let''s examine
    how each framework conceptualizes its primary building blocks and operational
    logic:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Core philosophy and abstraction**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI** **–****r****ole-based collaboration**: CrewAI''s abstraction is
    a team of specialists. You define agents by their role (e.g., "senior loan officer"),
    goal (e.g., "Analyze a loan application"), and backstory (e.g., "You are a meticulous
    analyst..."). This makes it incredibly intuitive for workflows that mimic human
    teams. The collaboration is the central feature.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangGraph** **–****s****tateful graphs**: LangGraph''s abstraction is a flowchart
    or state machine. You define nodes (agents or functions) and edges (the paths
    between them). This shifts the focus from the *agents* to the *process*. Its power
    lies in making the application''s state explicit and the control flow deterministic.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google ADK** **–****p****roduction-ready agents**: ADK''s abstraction is
    the agent itself, treated as a modular, testable, and deployable software component.
    It provides a more structured, code-first approach that feels familiar to software
    engineers. It focuses on the agent''s life cycle and relies on two key mechanisms
    for enterprise robustness:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Callbacks** (middleware for active filtering, PII detection, and HITL control)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Workflow** **a****gents** (scaffolding for defining sequential, looping,
    or parallel tasks alongside autonomous reasoning)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Control flow and cyclical behavior**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI** manages control flow at a high level. You typically define a process
    as either *sequential* (task 1 -> Task 2 -> Task 3) or *hierarchical* (a manager
    agent delegates tasks). This is simple and effective for linear or simple delegated
    tasks, as seen in our notebook''s example.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangGraph** provides complete, fine-grained control. Because the workflow
    is a graph, you can easily create cycles, branches, and loops. You can define
    conditional edges that say, "If the validation failed, go to the ''Rejection''
    node; otherwise, go to the ''Credit Check'' node." This ability to manage errors
    and loop idx_a9b8b81ais a key requirement for many advanced agent patterns.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADK** balances these. It can run deterministic workflows (such as `SequentialAgent`)
    but also allows for dynamic, LLM-driven planning where the agent itself decides
    the next steps, which are then managed by the agent runtime.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State management**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangGraph****''****s** superpower is its explicit state management. You define
    a `State` object (e.g., a dictionary or `TypedDict`) that contains all the information
    for your application. This entire state is passed to every node. Each node performs
    its work and returns updates to the state. This makes debugging much easier; you
    can inspect the state at every single step.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI****''****s** state management is more implicit. The output of one
    task is automatically formatted and passed as context to the next task that depends
    on it. This is fast for simple chains but offers less direct control and inspection
    than LangGraph''s explicit state.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADK** uses managed state. The agent runtime and session service are responsible
    for persisting the agent''s state and memory across interactions, abstracting
    this complexity away from the developer and ensuring that even long-running agents
    can pick up where they left off.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have a deeper understanding of these frameworks, let's step back
    and compare them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Comparative analysis: ADK, CrewAI, and LangGraph'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we idx_4b24169ehave explored the individual characteristics of each
    framework, let's look at how they compare side by side. This analysis will help
    you select the right tool based on your project's specific maturity, complexity,
    and operational requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following table provides a high-level overview of the ecosystem and philosophy
    behind each framework:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Framework** | **Primary** **s****upporter** | **Announced/****l****aunched**
    | **Core** **philosophy** **and** **focu****s** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| GoogleADK | Google | 2024 (prototype)/2025 (public) | A comprehensive, open
    source toolkit for building, evaluating, and deploying production-grade, robust
    agents. Optimized for the Google ecosystem (Gemini and Vertex AI) but designed
    to be model-agnostic. |'
  prefs: []
  type: TYPE_TB
- en: '| CrewAI | CrewAI (founded by João Moura) | 2023 (open source launch) | A framework
    idx_12fd7267for orchestrating role-playing, autonomous AI agents. Emphasizes collaborative
    intelligence, where agents work together as a "crew" to accomplish goals. |'
  prefs: []
  type: TYPE_TB
- en: '| LangGraph | LangChain | 2024 | An extension of LangChain for building stateful,
    multi-actor applications. It excels at creating applications with cyclical processes
    and complex control flows by modeling them as graphs (state machines). |'
  prefs: []
  type: TYPE_TB
- en: Table 15.1 – Agentic frameworks comparison
  prefs: []
  type: TYPE_NORMAL
- en: 'For a deeper technical comparison, the following table breaks down the frameworks
    by their architectural approach, control flow mechanisms, and suitability for
    different development stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Feature** | **Google ADK** | **CrewAI** | **LangGraph** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Core abstraction | Production-grade agents and runtimes. | Role-playing teams
    (a "crew"). | Stateful graph (a "state machine"). |'
  prefs: []
  type: TYPE_TB
- en: '| Controlflow | Planner-driven; managed by an agent runtime. Can be sequential
    or parallel. | High-level process (sequential or hierarchical). | Fine-grained;
    defined by graph edges. Excellent for cycles and branching. |'
  prefs: []
  type: TYPE_TB
- en: '| Statemanagement | Managed: Handled by the agent''s session and runtime. |
    Implicit: Passed between tasks automatically via context. | Explicit: A central
    `State` object is passed to and updated by each node. |'
  prefs: []
  type: TYPE_TB
- en: '| Callbacks andhooks | Middleware/Interceptor pattern. Callbacks act as "guardrails"
    designed to intercept input/output before or after LLM calls.Key idx_8c3e97adcapability:
    Modifying data in flight (e.g., PII redaction) or bypassing the LLM entirely (caching).
    | Event-driven hooks. Callbacks are triggered on specific life cycle events (e.g.,
    `on_task_start`, `on_task_end`).Key capability: Observability and side effects
    (logging, updating a UI, or triggering a webhook) without altering the core agent
    logic. | State listeners and interrupts. Uses callbacks for tracing (LangSmith)
    but relies on "interrupts" for control.Key capability: Pausing the graph at a
    specific node (checkpointing) to wait for HITL input before resuming. |'
  prefs: []
  type: TYPE_TB
- en: '| Bestfor... | Production systems, enterprise integration (especially Google
    Cloud), robust and testable agents. | Rapid prototyping of collaborative tasks,
    role-defined workflows (e.g., "researcher," "writer"). | Complex, dynamic workflows;
    explicit error handling; loops; and HITL. |'
  prefs: []
  type: TYPE_TB
- en: Table 15.2 – Comparison between the ADK, CrewAI, and LangGraph frameworks
  prefs: []
  type: TYPE_NORMAL
- en: To understand these differences better, let's now reimplement our loan processing
    use case from *[Chapter 13](Chapter_13.xhtml#h1_639)*, using the specific code
    from our development notebook.
  prefs: []
  type: TYPE_NORMAL
- en: 'Re-implementing the loan agent: A practical comparison'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To illustrate the differences between these frameworks concretely, we will now
    implement the multi-agent idx_e4a19e5bloan processing system based on the code
    in the accompanying notebook. The goal remains to take `applicant_id` and `document_id`,
    fetch the document content, and produce a final, auditable loan decision.
  prefs: []
  type: TYPE_NORMAL
- en: 'The workflow involves several distinct tasks. Next, we map each task to the
    specific component that handles it in our two implementations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Document fetch**: Retrieve the content of the loan application document (**LangGraph**:
    `node_fetch_document` | **CrewAI**: Passed as initial input/preprocessing).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Document validation**: Check whether the fetched document content is valid
    and complete (**LangGraph**: `node_validate_document` | **CrewAI**: Document validation
    specialist).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Credit check**: Retrieve the borrower''s credit score based on their `customer_id`
    value (**LangGraph**: `node_check_credit` | **CrewAI**: Credit check agent).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Risk assessment**: Analyze the document status, credit score, and income
    to determine a risk level (**LangGraph**: `node_assess_risk` | **CrewAI**: Risk
    assessment analyst).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Compliance check**: Ensure the final decision adheres to lending regulations
    (**LangGraph**: `node_check_compliance` | **CrewAI**: Compliance officer).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will build this workflow in both CrewAI and LangGraph to highlight their
    different approaches using Google's Gemini LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'Regardless of the framework, the agent''s ability to interact with external
    systems is defined by its tools. For both implementations, we define our core
    business logic. In the provided notebook, these are defined as Python classes
    inheriting from CrewAI''s `BaseTool`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'We also idx_33e1a65fneed a helper function to simulate fetching the document
    content based on an ID:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Note on** **tool output patte****rns**'
  prefs: []
  type: TYPE_NORMAL
- en: You will notice that these tools return JSON-encoded strings rather than Python
    dictionaries. This is a deliberate design choice for agentic systems. Since the
    primary consumer of a tool's output is often the LLM itself (which processes text
    tokens), returning an explicit JSON string ensures the model receives a structured,
    readable format that it can easily parse or reason about.
  prefs: []
  type: TYPE_NORMAL
- en: 'Furthermore, we are establishing a data contract here: the tool guarantees
    it will return either a `{"status": "validated", "data": ...}` structure for success
    or an `{"error": ...}` structure for failure. This consistency allows downstream
    agents (or the `CheckLendingCompliance` tool) to handle errors deterministically.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Production** **t****ip****:** **Data** **normalization pat****terns**'
  prefs: []
  type: TYPE_NORMAL
- en: In this idx_94b4e69cexample, the `CalculateRiskScoreTool` performs basic string
    parsing to extract income figures. In a production environment, this approach
    is too fragile. You should implement a dedicated normalization node or preprocessing
    tool upstream that handles currency conversion, locale formatting (e.g., "$100k"
    versus "100,000 EUR"), and standardization before the data ever reaches the logic-heavy
    risk assessment agents.
  prefs: []
  type: TYPE_NORMAL
- en: '**Production** **p****attern** **–****t****he** **p****roxy** **t****ool (*****Agent
    Calls Proxy Agent*****)**'
  prefs: []
  type: TYPE_NORMAL
- en: The preceding `if/else` logic is a simplified heuristic for demonstration. In
    a real-world enterprise architecture, this tool idx_50ff6b73would function idx_5c84c043as
    a proxy (see the ***Agent Calls Proxy Agent*** pattern in *C**hapter 8*).
  prefs: []
  type: TYPE_NORMAL
- en: The `_run` method would act as a wrapper that constructs a secure API request
    to an external risk decision engine or a deployed ML model endpoint, executes
    the call, and parses the response. This pattern keeps the agent lightweight and
    ensures that critical business logic remains centralized and governable.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let's see idx_3ca57924how CrewAI and LangGraph orchestrate these same tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Implementation 1: CrewAI (the collaborative team)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The notebook idx_98db1220implements CrewAI using a hierarchical idx_fd0b0efdprocess,
    where a `manager` agent delegates tasks to specialized agents:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the LLM and agents.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'First, we configure the Gemini LLM using CrewAI''s `LLM` abstraction. Then,
    we define the specialist agents, each idx_332be4e2assigned with specific tools,
    and the manager idx_a19bd134agent, which has no tools but can delegate:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Minimizing** **v****ariance with** **t****emperature**'
  prefs: []
  type: TYPE_NORMAL
- en: We deliberately set `temperature=0.0` for this agent. In agentic workflows that
    rely on precise tool usage and structured outputs (such as JSON), minimizing randomness
    is crucial. Note that while `temperature=0.0` significantly reduces variance,
    it does not guarantee 100% deterministic behavior due to the inherent non-determinism
    of floating-point operations on GPUs. However, it provides the maximum stability
    possible for logic and orchestration tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Define the tasks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, we define idx_156cb190the tasks. Note how the description for `task_validate`
    includes a placeholder, `{``document_content``}`, which will receive idx_7d5fad20the
    fetched JSON string as input. The `context` parameter implicitly passes outputs
    between dependent tasks:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Assemble idx_5859e0c9and run the crew.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Finally, we assemble idx_4987e6dathe `Crew`, specifying the `hierarchical`
    process and assigning the `manager_agent`. We fetch the document content before
    kicking off the crew and pass it as input:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: CrewAI's hierarchical idx_cdb25b6capproach allows the manager agent to idx_70d5a1ccorchestrate
    the workflow. The manager delegates each task to the appropriate specialist agent
    based on the task description and available tools. Error handling is somewhat
    implicit; if `task_validate` returns an error (such as the missing `'income'`
    field in the invalid case), subsequent tasks that depend on its output might still
    run but will likely fail or produce incorrect results, as the manager attempts
    to proceed. The final report in the invalid case reflects the validation failure,
    but the intermediate steps (credit check, risk assessment) are still executed,
    potentially performing unnecessary actions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Implementation 2: LangGraph (the state machine)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LangGraph''s idx_55658972implementation uses an explicit state machine. We
    define idx_a62016c4nodes for each step, including fetching the document, and use
    conditional edges for robust error handling:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the state.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We define `LoanGraphState` using `TypedDict`, including all fields needed by
    the tools and nodes throughout the process:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Define the graph nodes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We define idx_07537b99Python functions as nodes. `node_fetch_document` simulates
    fetching content. `node_validate_document` calls the validation idx_90a88605tool
    and updates the state with extracted data *or* an error. Subsequent nodes check
    for errors before proceeding. `node_assess_risk` uses the LLM directly to generate
    a risk assessment:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Production** **t****ip: Enforcing** **s****tructured** **o****utput**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In this example, we use idx_8facd911simple string matching to parse the LLM''s
    response. In a idx_3f0460fcproduction system, this is risky as the model might
    be idx_61296de6verbose (e.g., `"The risk is relatively LOW"`). For enterprise
    applications, you should use structured output features (supported by both LangChain
    and Gemini). By passing a Pydantic schema to the model, you can force it to return
    a valid JSON object (e.g., `{"``risk_level``": "LOW"}`), guaranteeing that the
    output matches your downstream requirements without the need for fragile string
    parsing logic.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Define the graph and its edges.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We wire idx_b36170c4the nodes, starting with `fetch_doc`. Crucially, we add
    conditional edges after `fetch_doc` and `validate_doc` that idx_979ed835check
    the `error` field in the state, routing to `compile_rejection` immediately if
    an error occurs:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Run idx_c18e160dthe graph.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We run idx_599e12dbthe compiled graph (`app`) using `.stream()` to observe
    the state transitions for both valid and invalid document IDs:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This LangGraph implementation demonstrates explicit control flow and state management.
    The addition of `node_fetch_document` makes the process start cleanly. The conditional
    edges based on the `error` key in the state ensure that if fetching or validation
    fails, the graph immediately routes to the `compile_rejection` node, preventing
    unnecessary tool calls (such as credit check or risk assessment) on invalid data.
  prefs: []
  type: TYPE_NORMAL
- en: 'This explicit idx_b128967brouting provides a tangible efficiency gain: it idx_65a6bbdeeliminates
    unnecessary API costs and latency by halting execution immediately upon failure,
    a direct contrast to our CrewAI example, where intermediate agents continued to
    operate despite the initial validation error.'
  prefs: []
  type: TYPE_NORMAL
- en: The use of an LLM directly within `node_assess_risk` showcases how LangGraph
    can integrate generative steps alongside deterministic tool calls. This graph-based
    approach provides superior robustness and traceability compared to the simpler
    CrewAI process for this specific workflow, especially concerning error handling.
  prefs: []
  type: TYPE_NORMAL
- en: Let's now go through the observability and responsible AI considerations.
  prefs: []
  type: TYPE_NORMAL
- en: Observability and responsible AI considerations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Choosing a framework isn't just about the development experience; it's about
    your ability to manage, monitor, and govern the resulting application. In the
    context of agentic AI, where non-determinism is a factor, observability is a cornerstone
    of responsible AI. If you cannot trace why an agent made a decision, you cannot
    ensure it is fair, safe, or compliant.
  prefs: []
  type: TYPE_NORMAL
- en: Observability in practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Each framework idx_79ccca48leverages specific tools and protocols to provide
    the visibility required for debugging complex agent interactions and maintaining
    a verifiable audit trail:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LangGraph** **and** **CrewAI** **(with** **LangSmith****)**: The LangChain
    ecosystem, including LangGraph and CrewAI, is built idx_0eb0425cto integrate natively
    with LangSmith. LangSmith is an observability platform specifically designed for
    tracing complex LLM applications. Because LangGraph''s state is explicit, its
    traces in LangSmith are incredibly detailed, allowing you to "time-travel" debug
    by seeing the full state and LLM calls at every single node. CrewAI traces also
    benefit from LangSmith, which shows the actions and tool calls of an agent. This
    provides a complete audit trail of the agent''s thoughts and actions, which is
    invaluable for debugging and explainability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google ADK**: As a production-focused toolkit, ADK is instrumented with **OpenTelemetry**,
    the industry idx_b46ce9f7standard for tracing and metrics. This allows it to integrate
    directly idx_e0c20d70with enterprise-grade monitoring idx_a0cbff3csolutions such
    as **Google Cloud****''****s****o****perations** **s****uite** (Cloud Trace and
    Cloud Logging). This treats the agent less like a script and more like a manageable
    microservice, which is essential for enterprise governance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enabling responsible AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The principles idx_37153d9aof responsible AI are fairness, transparency, accountability,
    and safety. These are not abstract goals; they are enabled by concrete architectural
    choices and implemented in organizations through sustained governance and oversight
    of enforcing the incorporation of the following principles and guardrails:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Transparency and explainability**: LangGraph''s explicit state graph is a
    form of explainability. The graph itself documents the decision-making logic,
    and the final state object contains all the intermediate data used to reach a
    conclusion. The final report from our loan agent, which includes the rationale,
    is a direct output of this traceable process:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Demographic** **p****arity** **t****esting** **s****cenario**: Incorporating
    a fairness evaluation step in the CI/CD pipeline using ADK''s testing framework.
    This runs the agent against a curated "golden dataset" of user queries from diverse
    demographics to mathematically measure whether response quality (e.g., helpfulness,
    tone) remains consistent across different user groups before a version promotion.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reasoning transparency s****cenario**: Utilizing the **Trace** view in the
    Google Cloud console (linked to the ADK deployment). This exposes the agent''s
    internal "thought, action, observation" loop, allowing developers to see exactly
    *why* the agent chose to call the `getUserBalance` tool instead of the `getLoanStatus`
    tool, rather than just seeing the final answer.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explicit** **s****tate** **g****raph** **v****isualization** **s****cenario**:
    Before deploying the loan agent, running the model against a "golden dataset"
    of diverse applicant profiles to ensure the approval logic does not exhibit disparate
    impact based on protected attributes (e.g., ZIP code or gender), even if those
    attributes aren''t explicitly used as features.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Safety and robustness**: The use of conditional edges in our LangGraph implementation
    acts as a programmatic safety pattern by enforcing "fail-fast" logic. Rather than
    allowing the LLM to continue reasoning over incomplete or corrupted data, the
    graph monitors a dedicated `error` `key` in the state object. If an error is detected,
    such as a missing income field during validation, the conditional edge immediately
    reroutes the execution flow to a terminal rejection node. This prevents downstream
    agents from attempting to process invalid inputs, which significantly reduces
    the risk of the model hallucinating a decision or performing unauthorized API
    calls based on faulty information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Safety guardrails and PII protection s****cenario**: Explicitly configuring
    `safety_settings` in the ADK model parameters to block "hate speech" or "harassment"
    at the `BLOCK_LOW_AND_ABOVE` threshold. Additionally, implementing specific input
    guardrails (such as PII detection) that intercept and redact sensitive data before
    it reaches the LLM context window.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conditional** **e****dge** **g****uardrails** **s****cenario**: Hardcoding
    a `stop` condition in the graph (a conditional edge) that immediately halts the
    process if the income verification API returns a null or negative value, preventing
    the LLM from hallucinating a credit decision based on bad data.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accountability and governance**: A traceable, observable workflow is a prerequisite
    for accountability. When an auditor asks why a loan was denied, you can provide
    the complete idx_0425f9a3trace from LangSmith or Google Cloud Trace, showing the
    exact data, tool outputs, and LLM reasoning at each step (especially with the
    explicit state in LangGraph). This transforms the agent from a "black box" to
    a transparent, auditable component of your business process:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Immutable audit trail scenario**: Enabling data access logs and exporting
    all agent interaction logs to BigQuery. This creates an immutable record where
    every API call made by the agent is timestamped and associated with a specific
    service account identity, allowing compliance teams to query exactly *when* and
    *who* authorized a specific transaction.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Full** **e****xecution** **t****races (****LangSmith****/Cloud Trace)****s****cenario**:
    When an auditor challenges a specific loan denial, retrieving the exact trace
    ID from LangSmith that logs the specific prompt, the retrieved credit score, and
    the LLM''s intermediate reasoning step that led to the `Denied` output.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we've seen these frameworks in action with the updated code, let's
    discuss how to choose the right one for your project.
  prefs: []
  type: TYPE_NORMAL
- en: Recommendations for choosing a framework
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There is no idx_1d4bf117single "best" agent framework. The right choice depends
    on your project's complexity, your team's familiarity with the concepts, and your
    production requirements. However, a critical long-term strategy is to avoid framework
    lock-in. The agentic landscape is volatile; today's leader may be deprecated tomorrow.
    We recommend designing your system around stable interfaces, such as standardized
    tool definitions (contracts), explicit state schemas, and pattern-based orchestration
    logic, rather than tightly coupling every component to a specific framework's
    proprietary classes. This abstraction allows you to migrate or swap frameworks
    with minimal friction as your needs evolve.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let''s see idx_78ece9fcwhich framework should be considered:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Consider CrewAI when...**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are prototyping rapidly and want to get a multi-agent system running quickly
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Your workflow naturally maps to a collaborative team of specialists (e.g., "researcher,"
    "writer," "editor")
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Your process benefits from a hierarchical (manager/worker) structure where delegation
    is key
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Implicit state passing via context is sufficient for your needs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consider LangGraph when...**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need complex, non-linear control flow (loops, branches, dynamic routing
    based on state)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Explicit state management and inspection at each step is critical for logic
    or debugging
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Robust error handling with specific routing based on failures is required
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You require high-fidelity debugging and traceability (seeing the full state
    at every step)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You are building long-running agents that need precise state control
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You need to implement HITL patterns easily by adding nodes that wait for input
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consider Google ADK when...**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are building for a production enterprise environment, especially within
    the Google Cloud ecosystem
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You need a more structured, software engineering-centric approach that treats
    agents as modular, testable, and deployable components
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration with standard enterprise observability (such as OpenTelemetry) and
    governance systems is a primary requirement
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You need to manage the full life cycle of the agent, from development and evaluation
    to deployment and monitoring
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You need to inspect the payload going into tools, agents, and models; inspect
    or take action on outputs from tools, agents, and models
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You need to orchestrate complex multi-agent patterns, such as sequential pipelines,
    parallel fan-outs, or iterative loops, by utilizing specialized workflow agents
    that impose a deterministic structure over the non-deterministic reasoning of
    your LLMs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Ultimately, the framework idx_fd3d8fd8is a tool to implement the patterns we''ve
    discussed. By understanding their core abstractions, you can select the one that
    best fits the problem you are trying to solve:'
  prefs: []
  type: TYPE_NORMAL
- en: CrewAI's *team*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LangGraph's *state machine*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ADK's *production service*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let's now map these frameworks to the different levels of agentic maturity we
    have been discussing throughout the book.
  prefs: []
  type: TYPE_NORMAL
- en: Frameworks as enablers of agentic maturity
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that we have explored the practical tools for building agents, we can explicitly
    map these frameworks idx_e31c6025to the GenAI Maturity Model we introduced in
    *[Chapter 1](Chapter_1.xhtml#h1_14)*. These tools are the enablers that help an
    organization progress from basic, data-enhanced generation (Level 2) to truly
    autonomous and collaborative agentic systems (Levels 4 and 5).
  prefs: []
  type: TYPE_NORMAL
- en: 'The following table outlines how to approach each level, with an emphasis on
    how the frameworks discussed in this chapter accelerate development at the higher,
    agentic levels:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Maturity level** | **Description** | **Framework approach/****e****nabling
    tools** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Level 1 – Prompting | Simple, single-turn prompting | Tools: Direct LLM API
    calls (e.g., Gemini, OpenAI). Frameworks are generally not required. |'
  prefs: []
  type: TYPE_TB
- en: '| Level 2 – RAG | Context-enhanced generation (RAG) | Tools: LangChain (for
    RAG pipelines), or custom code that calls a vector database and inserts context
    into a prompt. |'
  prefs: []
  type: TYPE_TB
- en: '| Level 3 – Tuning |  | N/A to the agentic framework |'
  prefs: []
  type: TYPE_TB
- en: '| Level 4 – Grounding and evaluation |  | CrewAI and LangGraph represent two
    different philosophies: CrewAI focuses on high-level, role-based orchestration,
    while LangGraphidx_87977c1c provides a low-level, state-driven framework. Their
    approaches to evaluation and grounding reflect this divide.'
  prefs: []
  type: TYPE_NORMAL
- en: '**CrewAI**: **Integrated and** **e****nterprise-****f****ocused**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CrewAI has specialized features to make grounding and evaluation more "turnkey"
    for developers who want to prevent hallucinations without building custom logic.
  prefs: []
  type: TYPE_NORMAL
- en: '**Grounding and** **g****uardrails**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hallucination** **g****uardrail** **(Enterprise)**: Native feature that assigns
    a faithfulness score (0–10) and triggers self-correction if below threshold.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Built-in RAG and** **k****nowledge**: Native knowledge component for PDFs/CSVs
    allows agents to be grounded in local data by default.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Native** **u****tility** **t****ools**: Tools like `TimeAwarenessTool` ground
    agents in real-world facts (e.g., current date) to prevent temporal hallucinations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI** **Test CLI**: Runs a crew for `$N$` iterations to generate performance
    score tables.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Patronus AI** **and****t****raining** **l****oop**: First-class support for
    automated evaluation and a `crew.train``()` method for human-feedback-based fine-tuning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangGraph**: **Architectural and** **d****eveloper-****d****riven**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LangGraph treats grounding and evaluation as customizable structural components,
    offering fine-grained control over the "reasoning path."
  prefs: []
  type: TYPE_NORMAL
- en: '**Grounding and** **g****uardrails**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-****c****orrection** **l****oops**: Uses conditional edges to detect
    poor outputs and route the state back to a "Refinement" node, creating a programmatic
    grounding loop.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State** **c****heckpoints**: Native persistence allows the system to be grounded
    in a "version-controlled" history of the conversation, enabling rollbacks to known
    good states.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HITL (Human-in-the-Loop)**: Explicit "interrupts" that pause execution for
    human verification before high-stakes tool calls.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangSmith****i****ntegration**: Deep trace-level evaluation where every node
    transition is measured for latency, cost, and accuracy using "LLM-as-a-judge"
    patterns.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unit-****t****estable** **n****odes**: Since nodes are isolated Python functions,
    developers can perform deterministic unit testing on specific logic gates before
    full system integration.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Level 5 – Single-agent systems | An autonomous agent with a planner, tools,
    and memory executes a multi-step task |'
  prefs: []
  type: TYPE_TB
- en: '**LangGraph**: A graph with one or more agent nodes that can call multiple
    tools based on an explicit state, potentially looping (reflecting).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADK**: The primary use case. Define a single `Agent` class with its tools
    and run it within the agent runtime.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI**: Can be used with a "crew" of one, but this is less common.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Level 6 – Multi-agent systems | Multiple agents collaborate, negotiate, and
    delegate tasks to solve a complex problem |'
  prefs: []
  type: TYPE_TB
- en: '**LangGraph**: Ideal for complex interactions. Each agent/function is a node.
    Edges define communication, handoffs, and control flow. Explicit state facilitates
    shared understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CrewAI**: Primary design philosophy. Define a crew with distinct roles and
    a process (sequential/hierarchical) for collaboration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADK**: A system of multiple, independently deployed ADK agent services communicating
    via messaging or A2A protocols.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Table 15.3 – Approaching frameworks according to the organization's maturity
    level
  prefs: []
  type: TYPE_NORMAL
- en: As this table illustrates, frameworks are the bridge from "agent-ready" models
    (Level 3) to functional agentic systems (Levels 4 and 5). They provide the essential
    *how* for constructing the sophisticated idx_5aba42fdapplications we've designed.
  prefs: []
  type: TYPE_NORMAL
- en: Let's wrap up this chapter in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored three prominent agent frameworks—Google's ADK,
    CrewAI, and LangGraph—and saw how each provides a different but powerful abstraction
    for building complex agentic systems using Google Gemini as our LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Our practical implementations of the loan processing agent, updated based on
    the revised notebook, showed CrewAI's strength in modeling collaborative teams
    via a hierarchical process, while LangGraph demonstrated fine-grained control,
    explicit state management, and robust error handling through its state machine
    approach. We also positioned Google's ADK as an enterprise-grade toolkit focused
    on the full life cycle of building, testing, and deploying robust, manageable
    agent services.
  prefs: []
  type: TYPE_NORMAL
- en: We connected the use of these frameworks to the GenAI Maturity Model, identifying
    them as key enablers for reaching Level 5 (single-agent systems) and Level 6 (multi-agent
    systems). Finally, we emphasized that these advanced systems demand a mature approach
    to observability and governance, using tools such as LangSmith and OpenTelemetry
    to ensure traceability, a core component of responsible AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key takeaways from this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Frameworks are accelerators**: You do not need to build agentic planners,
    state managers, and tool dispatchers from scratch. Frameworks such as CrewAI,
    LangGraph, and ADK provide the essential abstractions to build Level 4 and Level
    5 systems effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Choose the right abstraction**: The framework you choose should match your
    problem. Use CrewAI''s *team* metaphor for role-based, collaborative tasks, especially
    with delegation. Use LangGraph''s *state machine* for complex, cyclical processes
    requiring explicit state and fine-grained control over flow and errors. Use ADK''s
    *production agent* model for enterprise-grade, testable, and manageable services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Control flow and error handling are key differentiators**: Moving beyond
    simple sequences is critical for robustness. LangGraph''s explicit graph structure
    provides a powerful way to manage complex branching, loops, and error handling
    (as shown in our validation example), which is essential for reliable applications.
    CrewAI''s hierarchical process offers a simpler delegation model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Observability is non-negotiable**: Agentic systems are complex. The ability
    to trace *why* an agent made a decision, facilitated by tools such as LangSmith
    (especially with LangGraph''s explicit state), is not just a debugging feature
    but a foundational requirement for governance, safety, and responsible AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have now journeyed from the foundational concepts of GenAI to the architectural
    patterns and practical frameworks used to build sophisticated, autonomous agentic
    systems. In the final chapter, we will bring together these concepts and provide
    a clear action plan for you to apply these patterns, navigate the maturity model,
    and lead your organization's transformation.
  prefs: []
  type: TYPE_NORMAL
