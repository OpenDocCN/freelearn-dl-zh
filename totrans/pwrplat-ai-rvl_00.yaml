- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Artificial intelligence** *(***AI***) is commonly thought of as the capability
    of a machine or computer system to perform tasks that would normally require human
    intelligence. Whatever your mental image of AI is—HAL 9000 in 2001: A Space Odyssey,
    Arnold Schwarzenegger as the Terminator, or Brent Spiner as Data in Star Trek:
    The Next Generation—it probably represents only one or two facets of the growing
    capabilities in* *the field.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Until recently, most AI technologies revolved around machine learning—essentially,
    an automation of applied statistics. If you’ve forgotten your college statistics
    classes, it’s basically using large data samples to predict future data (for example,
    looking at recent home prices to predict future home prices). In the last year
    and a half, however,* **generative artificial intelligence** *(or* **GenAI***,
    for short) has exploded onto the scene. Generative AI may be one of the most pivotal
    technologies created in the last hundred years. It’s a watershed moment for both
    individuals and organizations, potentially redefining what it is to be capable
    of creativity—or* *even thought.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*In case you’ve been living under a rock, generative AI is the power behind
    some of the wildest technical cultural phenomena such as OpenAI’s ChatGPT, Midjourney,
    Dall-E, and Grok (as well as a host of other commercial ventures). Generative
    AI services can “create” content (based on their training data) that resembles
    the types of things that people can create. Instead of taking minutes or hours
    to compose content, many generative AI solutions can return responses* *in seconds.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Some of the most exciting use cases are around content summarization, reasoning
    over content in an almost human-like fashion, pattern matching, prediction, and
    analysis. Generative AI can also mix operating modes or contexts—for example,
    predicting values based on time-series data and writing a narrative to go along*
    *with it.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Throughout this book, we’ll explore some exciting ways to combine the expanding
    capabilities of different types of AI with Microsoft’s Power Platform tooling
    (including Power Apps, Power Automate, and* *Copilot Studio).*'
  prefs: []
  type: TYPE_NORMAL
- en: Who this book is for
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*This book is intended for individuals who are interested in exploring and
    experimenting with AI and automation but who may not have extensive technical
    experience in the field. This includes those in fields typically categorized as
    knowledge working, such as business decision-makers, sales representatives, administrative
    assistants, business development managers, human resources representatives, and*
    *business analysts.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The content in this book assumes you have no knowledge of any machine learning
    or AI concepts (though it certainly helps with understanding some of the more*
    *complex topics).*'
  prefs: []
  type: TYPE_NORMAL
- en: What this book covers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[*Chapter 1*](B21234_01.xhtml#_idTextAnchor013), *Introduction to AI Services*,
    introduces some of the basic concepts of AI.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment
    to Support AI Services*, walks through the steps necessary to activate subscriptions
    and enable AI services in your environment.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](B21234_03.xhtml#_idTextAnchor036), *Talking to ChatGPT*, introduces
    interacting with ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](B21234_04.xhtml#_idTextAnchor047), *Using ChatGPT and Copilot
    to Create Flows*, demonstrates how to use AI to assist in creating Power Automate
    flows.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 5*](B21234_05.xhtml#_idTextAnchor057), *Bootstrapping a Power App
    with Copilot*, focuses on the power of Copilot to help design and modify a basic
    Power App through a conversational interface.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing Data with Sentiment
    Analysis*, shows how to leverage a machine learning capability to analyze text
    and then trigger actions based on a positive, negative, or neutral sentiment.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](B21234_07.xhtml#_idTextAnchor080), *Using Power Automate and
    AI to Build PowerPoint Presentations*, explores the use of Power Automate and
    ChatGPT to create a PowerPoint presentation based on content sourced from the
    internet.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](B21234_08.xhtml#_idTextAnchor099), *Building an Event Registration
    App with Identity Verification*, shows how to process government-issued identity
    documents to verify the identity of a registrant and then send automated meeting
    confirmations.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 9*](B21234_09.xhtml#_idTextAnchor114), *Implementing an AI-Enabled
    Resume Screener*, combines the power of document recognition, entity extraction,
    and a GPT service to process a submitted resume and evaluate whether it’s a good
    fit against a particular job description.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 10*](B21234_10.xhtml#_idTextAnchor134), *Creating an Executive Summary
    with GPT*, demonstrates how to use GPT to generate an executive summary of a document
    and then insert it into a document or presentation.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 11*](B21234_11.xhtml#_idTextAnchor150), *Using AI to Tag Images in
    a SharePoint Library*, shows how to use the Azure Computer Vision service to categorize
    images based on content and then update a document library with descriptions and
    tags.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 12*](B21234_12.xhtml#_idTextAnchor165), *Creating a Generative AI-Based
    Bot*, explores the new Copilot Studio interface to create conversational bots
    that can provide answers through both ChatGPT and by reasoning over a set of document
    content.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 13*](B21234_13.xhtml#_idTextAnchor183), *Publishing a Generative
    AI-Based Bot*, leverages the conversation bot created in [*Chapter 12*](B21234_12.xhtml#_idTextAnchor165)
    and walks through making the bot available for end users.'
  prefs: []
  type: TYPE_NORMAL
