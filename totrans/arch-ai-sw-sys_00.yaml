- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The age of **Artificial Intelligence** (**AI**) is upon us. Every day, new applications,
    extensions, or improvements in almost all aspects of life are being impacted by
    AI technologies. These technologies are almost entirely realized in complex software.
  prefs: []
  type: TYPE_NORMAL
- en: Building complex software is a challenge that requires disciplined and methodical
    effort to engineer. Many times, when complex software systems fail, it is usually
    that the architecture of the system failed, rather than a specific algorithmic
    or implementation detail. There exist best practices and lessons learned for building
    complex software. There also exist plenty of references on the theory and implementation
    of AI technologies.
  prefs: []
  type: TYPE_NORMAL
- en: There do not exist many references for how to build complex software that has
    AI technologies at its heart.
  prefs: []
  type: TYPE_NORMAL
- en: The authors’ main tenet is that the application of architecting concepts and
    practices is a key enabler to building complex AI software. In the pages that
    follow, we will discuss what some of the challenges facing the builder of a complex
    AI system are. You will learn how you can adapt and use the lessons from architecting
    to structure and guide the development of a software system.
  prefs: []
  type: TYPE_NORMAL
- en: 'The book looks to balance theory and application: theory so that recommendations
    are grounded and can be understood, and application so that the book can be useful
    to you in the here and now. This book is the culmination of decades of experience
    of the authors with hard-earned lessons, both positive and negative. The age of
    AI is here; we hope this book will be another tool in your toolbox.'
  prefs: []
  type: TYPE_NORMAL
- en: Who this book is for
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are three main audiences for this book:'
  prefs: []
  type: TYPE_NORMAL
- en: A software architect or engineering manager who wants to expand their knowledge
    of how to build a complex AI-centric software system. The book gives a combination
    of theory and practical insights. The guidance in the book can be readily used
    to structure project gates and team tasking.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This book can be helpful to a technology executive, chief technology officer,
    or vice president of engineering. The book gives insight to aid in understanding
    the activities present in a major systems development. The executive can also
    gain visibility into key risks in system development. By knowing how to build
    AI-enabled systems, the executive can positively influence how the organization’s
    strategy can be infused into the final systems.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This book can be used by an aspiring AI architect to learn the domain. This
    book will give insight into the major themes of architecting, provide references,
    and identify what areas can be focused on for further professional development.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What this book covers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor012), *Fundamentals of AI System
    Architecture*, provides an overview of the challenges and opportunities for building
    AI systems.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor066), *The Case for Architecture*,
    gives a short overview of architecture as a discipline and how architects have
    created and adapted tools to build complex structures.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor100), *Software Engineering and
    Architecture*, discusses how architecture concepts impact software engineering
    and can be used to improve the engineering of complex software.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor125), *Conceptual Design for AI
    Systems*, discusses one of the most important phases that the architect leads,
    the tools used, and the artifacts created to deliver a strong conceptual design.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor164), *Requirements and Architecture
    for AI Pipeline*, delves into the first aspects of post-conceptual design activities
    and lays a conceptual foundation for building an AI pipeline.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor203), *Design, Integration, and
    Testing*, gives a robust walk-through of design steps, the use of software tactics
    and patterns, and considerations for how an architecture impacts testing.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor240), *Architecting a Generative
    AI System – A Case Study*, provides a case study of how an AI system can be engineered
    for a help desk support system.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](Chapter_4.xhtml#_idTextAnchor157), *Insights and Future Directions*,
    concludes the content of the book and summarizes key points that we would want
    you to remember most.'
  prefs: []
  type: TYPE_NORMAL
