- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: The age of **Artificial Intelligence** (**AI**) is upon us. Every day, new applications,
    extensions, or improvements in almost all aspects of life are being impacted by
    AI technologies. These technologies are almost entirely realized in complex software.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（**AI**）的时代已经到来。每天，人工智能技术几乎在生活的各个方面都影响着新的应用、扩展或改进。这些技术几乎完全体现在复杂的软件中。
- en: Building complex software is a challenge that requires disciplined and methodical
    effort to engineer. Many times, when complex software systems fail, it is usually
    that the architecture of the system failed, rather than a specific algorithmic
    or implementation detail. There exist best practices and lessons learned for building
    complex software. There also exist plenty of references on the theory and implementation
    of AI technologies.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 构建复杂的软件是一个需要纪律性和系统性的努力工程。很多时候，当复杂的软件系统失败时，通常是因为系统的架构失败，而不是特定的算法或实现细节。存在构建复杂软件的最佳实践和经验教训。同时，也存在大量关于人工智能技术和实现的理论和实践参考文献。
- en: There do not exist many references for how to build complex software that has
    AI technologies at its heart.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于如何构建以人工智能技术为核心的复杂软件，没有太多的参考文献。
- en: The authors’ main tenet is that the application of architecting concepts and
    practices is a key enabler to building complex AI software. In the pages that
    follow, we will discuss what some of the challenges facing the builder of a complex
    AI system are. You will learn how you can adapt and use the lessons from architecting
    to structure and guide the development of a software system.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的主要观点是，应用架构概念和实践是构建复杂人工智能软件的关键推动力。在接下来的篇章中，我们将讨论构建复杂人工智能系统所面临的挑战。您将了解如何将架构的教训应用于构建和指导软件系统的开发。
- en: 'The book looks to balance theory and application: theory so that recommendations
    are grounded and can be understood, and application so that the book can be useful
    to you in the here and now. This book is the culmination of decades of experience
    of the authors with hard-earned lessons, both positive and negative. The age of
    AI is here; we hope this book will be another tool in your toolbox.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本书旨在平衡理论与实践：理论确保建议有据可依且易于理解，实践确保本书对您在当前和未来的实际应用有所帮助。本书是作者数十年的经验结晶，包含了宝贵的经验教训，无论是积极的还是消极的。人工智能时代已经到来；我们希望这本书能成为您工具箱中的另一件工具。
- en: Who this book is for
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向对象：
- en: 'There are three main audiences for this book:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本书有三个主要受众：
- en: A software architect or engineering manager who wants to expand their knowledge
    of how to build a complex AI-centric software system. The book gives a combination
    of theory and practical insights. The guidance in the book can be readily used
    to structure project gates and team tasking.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于希望扩展其构建以人工智能为中心的复杂软件系统知识的软件架构师或工程经理，本书提供了理论与实践的结合。书中的指导可以迅速用于构建项目关卡和团队任务。
- en: This book can be helpful to a technology executive, chief technology officer,
    or vice president of engineering. The book gives insight to aid in understanding
    the activities present in a major systems development. The executive can also
    gain visibility into key risks in system development. By knowing how to build
    AI-enabled systems, the executive can positively influence how the organization’s
    strategy can be infused into the final systems.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本书对技术高管、首席技术官或工程副总裁有所帮助。本书提供了对主要系统开发活动的见解，高管还可以了解系统开发中的关键风险。通过了解如何构建人工智能赋能的系统，高管可以积极影响组织的战略如何融入最终系统。
- en: This book can be used by an aspiring AI architect to learn the domain. This
    book will give insight into the major themes of architecting, provide references,
    and identify what areas can be focused on for further professional development.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本书可供有志成为人工智能架构师的人士学习领域知识。本书将提供架构的主要主题的见解，提供参考，并确定可以进一步专业发展的重点领域。
- en: What this book covers
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor012), *Fundamentals of AI System
    Architecture*, provides an overview of the challenges and opportunities for building
    AI systems.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor012)，*人工智能系统架构基础*，概述了构建人工智能系统所面临的挑战和机遇。'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor066), *The Case for Architecture*,
    gives a short overview of architecture as a discipline and how architects have
    created and adapted tools to build complex structures.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor100), *Software Engineering and
    Architecture*, discusses how architecture concepts impact software engineering
    and can be used to improve the engineering of complex software.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor125), *Conceptual Design for AI
    Systems*, discusses one of the most important phases that the architect leads,
    the tools used, and the artifacts created to deliver a strong conceptual design.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor164), *Requirements and Architecture
    for AI Pipeline*, delves into the first aspects of post-conceptual design activities
    and lays a conceptual foundation for building an AI pipeline.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor203), *Design, Integration, and
    Testing*, gives a robust walk-through of design steps, the use of software tactics
    and patterns, and considerations for how an architecture impacts testing.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor240), *Architecting a Generative
    AI System – A Case Study*, provides a case study of how an AI system can be engineered
    for a help desk support system.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](Chapter_4.xhtml#_idTextAnchor157), *Insights and Future Directions*,
    concludes the content of the book and summarizes key points that we would want
    you to remember most.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Download the color images
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781804615973](https://packt.link/gbp/9781804615973)'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Conventions used
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a number of text conventions used throughout this book.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “Select **System info** from the **Administration** panel.”'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Warnings or important notes appear like this.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: Tips and tricks appear like this.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Get in touch
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Feedback from our readers is always welcome.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '**General feedback**: If you have questions about any aspect of this book or
    have any general feedback, please email us at [`customercare@packt.com`](http://mailto:customercare@packt.com)and
    mention the book’s title in the subject of your message.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you reported this to us. Please visit [http://www.packt.com/submit-errata](http://www.packt.com/submit-errata),
    click **Submit Errata**, and fill in the form.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '**Piracy**: If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at [`copyright@packt.com`](http://mailto:copyright@packt.com)
    with a link to the material.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**：如果您在互联网上遇到任何形式的我们作品的非法副本，如果您能提供位置地址或网站名称，我们将不胜感激。请通过[mailto:copyright@packt.com](http://mailto:copyright@packt.com)与我们联系，并附上材料的链接。'
- en: '**If you are interested in becoming an author**: If there is a topic that you
    have expertise in and you are interested in either writing or contributing to
    a book, please visit [http://authors.packt.com/](http://authors.packt.com/).'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您有兴趣成为作者**：如果您在某个领域有专业知识，并且您有兴趣撰写或为书籍做出贡献，请访问[http://authors.packt.com/](http://authors.packt.com/)。'
- en: Share your thoughts
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分享您的想法
- en: Once you’ve read *Architecting AI Software Systems*, we’d love to hear your
    thoughts! Please [click here to go straight to the Amazon review page](https://packt.link/r/1804615978)
    for this book and share your feedback.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您阅读了《架构人工智能软件系统》，我们非常乐意听取您的意见！请[点击此处直接访问亚马逊评论页面](https://packt.link/r/1804615978)并分享您的反馈。
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 您的评论对我们和科技社区都非常重要，它将帮助我们确保我们提供高质量的内容。
