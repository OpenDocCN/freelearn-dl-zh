- en: <st c="0">1</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Getting Started with the ChatGPT API for NLP Tasks</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**<st c="52">Natural Language Processing</st>** <st c="80">(</st>**<st c="82">NLP</st>**<st
    c="85">) is an area of</st> **<st c="102">Artificial Intelligence</st>** <st c="125">(</st>**<st
    c="127">AI</st>**<st c="129">) that focuses</st> <st c="144">on the interaction
    between computers and humans through natural language.</st> <st c="219">Over the
    years, NLP has made remarkable progress</st> <st c="267">in the field of language
    understanding;</st> **<st c="308">ChatGPT</st>** <st c="315">is one such revolutionary
    NLP tool that has gained significant popularity in</st> <st c="393">recent years.</st>'
  prefs: []
  type: TYPE_NORMAL
- en: <st c="406">ChatGPT</st> <st c="414">is an advanced AI language model developed
    by</st> **<st c="461">OpenAI</st>**<st c="467">, and it has been trained on a
    massive dataset of diverse texts, including books, articles, and web pages.</st>
    <st c="574">With its ability to understand and generate human-like text, ChatGPT
    has become a go-to tool for many NLP applications, including chatbots, language
    translation, and</st> <st c="740">content generation.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="759">In this chapter, we will explore the basics of ChatGPT and how you
    can use it for your NLP tasks.</st> <st c="858">We will start with an introduction
    to ChatGPT and its impact on the field of NLP.</st> <st c="940">Then we will explore
    how to use ChatGPT from the web and its benefits.</st> <st c="1011">After that,
    we will learn how to get started with the ChatGPT API, including creating an account
    and generating API keys.</st> <st c="1133">After that, we will take a walk-through
    of setting up your development environment to work with the ChatGPT API.</st>
    <st c="1246">Finally, we will see an example of a simple ChatGPT API response
    to understand the basic functionalities of</st> <st c="1354">the tool.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1363">In this chapter, we will cover the</st> <st c="1399">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1416">The</st> <st c="1421">ChatGPT revolution</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1439">Using ChatGPT from</st> <st c="1459">the web</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1466">Getting started with the</st> <st c="1492">ChatGPT API</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1503">Setting up your Python</st> <st c="1527">development environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1550">A simple ChatGPT</st> <st c="1568">API response</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1580">By the end of this chapter, you will have a solid understanding
    of ChatGPT and how to use it to perform NLP</st> <st c="1689">tasks efficiently.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1707">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="1730">To get the most out of this chapter, you will need some basic tools
    to work with the Python code and the ChatGPT APIs.</st> <st c="1850">This chapter
    will guide you through all software installations</st> <st c="1913">and registrations.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1931">You will require</st> <st c="1949">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1963">Python 3.7 or later installed on</st> <st c="1997">your computer</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2010">An OpenAI API key, which can be obtained by signing up for an</st>
    <st c="2073">OpenAI account</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2087">A code editor, such as</st> **<st c="2111">VSCode</st>** <st c="2117">(recommended),
    to write and run</st> <st c="2150">Python code</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2161">Basic programming experience</st> <st c="2191">with Python</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2202">The code examples from this chapter can be found on GitHub</st>
    <st c="2262">at</st> [<st c="2265">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="2341">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2342">The ChatGPT revolution</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2365">ChatGPT is an advanced</st> <st c="2388">AI language model developed</st>
    <st c="2416">by OpenAI, and it has made a significant impact on the field of NLP.</st>
    <st c="2486">The model is based on the transformer architecture, and it has been
    trained on a massive dataset of diverse texts, including books, articles, and</st>
    <st c="2632">web pages.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2642">One of the key features of ChatGPT is its ability to generate text
    that is coherent and contextually appropriate.</st> <st c="2757">Unlike previous
    NLP models, ChatGPT has a broader understanding of language, and it can generate
    text that is similar in style and structure to human-generated text.</st> <st
    c="2923">This feature has made ChatGPT a valuable tool for various applications,
    including conversational AI and</st> <st c="3027">content creation.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3044">ChatGPT has also made significant progress in the field of conversational
    AI, where it has been used to develop chatbots that can interact with humans naturally.</st>
    <st c="3207">With its ability to understand context and generate text that is
    similar in style to human-generated text, ChatGPT has become a go-to tool for
    developing</st> <st c="3361">conversational AI.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3379">The emergence of</st> **<st c="3397">Large Language Models</st>**
    <st c="3418">(</st>**<st c="3420">LLMs</st>**<st c="3424">) such as GPT-3 has
    revolutionized the landscape of chatbots.</st> <st c="3487">Prior</st> <st c="3492">to
    LLMs, chatbots were limited in their capabilities, relying on rule-based systems
    with predefined responses.</st> <st c="3604">These chatbots lacked contextual
    understanding and struggled to engage in meaningful conversations.</st> <st c="3704">However,
    with LLM-based chatbots, there has been a significant transformation.</st> <st
    c="3783">These models comprehend complex queries, generate coherent and nuanced
    responses, and possess a broader knowledge base.</st> <st c="3903">They exhibit
    improved contextual understanding, learn from user interactions, and continually
    enhance their performance.</st> <st c="4024">LLM-based chatbots have elevated
    the user experience by providing more natural and personalized interactions, showcasing
    the remarkable advancements in</st> <st c="4176">chatbot technology.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4195">ChatGPT has a long and successful history in the field of NLP.</st>
    <st c="4259">The model has undergone several advancements over the years, including</st>
    <st c="4330">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="4344">GPT-1 (2018)</st>**<st c="4357">: Had 117 million parameters</st>
    <st c="4386">and was trained on a diverse set of web pages.</st> <st c="4434">It
    demonstrated impressive results in various NLP tasks, including question-answering,
    sentiment analysis, and</st> <st c="4545">language translation.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="4566">GPT-2 (2019)</st>**<st c="4579">: Had 1.5 billion parameters
    and was trained on over 8 million web pages.</st> <st c="4654">It showed remarkable
    progress in language understanding and generation and became a widely used tool
    for various</st> <st c="4767">NLP applications.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="4784">GPT-3 (2020)</st>**<st c="4797">: Had a record-breaking 175
    billion parameters and set a new benchmark for language understanding and generation.</st>
    <st c="4912">It was used for various applications, including chatbots, language
    translation, and</st> <st c="4996">content creation.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="5013">GPT-3.5</st>**<st c="5021">: Released after continued refinement
    and improvement by OpenAI.</st> <st c="5087">Currently the best value model when
    comparing cost</st> <st c="5138">and performance.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="5154">GPT-4</st>**<st c="5160">: Can solve difficult problems</st>
    <st c="5191">with greater accuracy, thanks to its broader general knowledge and</st>
    <st c="5259">problem-solving abilities.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="5285">Developers can harness the power of</st> **<st c="5322">Generative
    Pre-trained Transformer</st>** <st c="5356">(</st>**<st c="5358">GPT</st>**<st
    c="5361">) models without requiring them to train their own</st> <st c="5412">models
    from scratch.</st> <st c="5434">This can save a lot of time and resources, especially
    for smaller teams or</st> <st c="5509">individual developers.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5531">In the next section, you will learn how to use ChatGPT from the
    web.</st> <st c="5601">You will learn how to create an OpenAI account and explore
    the ChatGPT</st> <st c="5672">web interface.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5686">Using ChatGPT from the web</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="5713">Interacting with ChatGPT</st> <st c="5738">via the OpenAI website
    is incredibly straightforward.</st> <st c="5793">OpenAI provides</st> <st c="5808">a
    web-based interface that can be found at</st> [<st c="5852">https://chat.openai.com</st>](https://chat.openai.com)<st
    c="5875">, enabling users to engage with the model without</st> <st c="5924">any
    prior coding knowledge or setup required.</st> <st c="5971">Once you visit the
    website, you can begin entering your questions or prompts, and the model will
    produce its best possible answer or generated text.</st> <st c="6120">Notably,
    ChatGPT on the web also provides users with various settings and options that
    allow them to track the conversation’s context and save the history of all interactions
    with the AI.</st> <st c="6308">This feature-rich approach to web-based AI interactions
    allows users to effortlessly experiment with the model’s capabilities and gain
    insight into its vast potential applications.</st> <st c="6489">To get started
    with the web-based interface, you’ll need to register for an account with OpenAI,
    which we will cover in detail in the next section.</st> <st c="6637">Once you’ve
    created an account, you can access the web interface and begin exploring the model’s
    capabilities, including various settings and options to enhance your</st> <st
    c="6803">AI interactions.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6819">Creating an OpenAI account</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="6846">Before using ChatGPT</st> <st c="6868">or the ChatGPT API, you
    must create an account on the OpenAI website, which will give you access to all
    the tools that the company has developed.</st> <st c="7014">To do that, you can
    visit</st> [<st c="7040">https://chat.openai.com</st>](https://chat.openai.com)<st
    c="7063">, where you will be asked to either log in or sign up for a new account,
    as shown in</st> *<st c="7148">Figure 1</st>**<st c="7156">.1</st>*<st c="7158">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.1 – OpenAI welcome window](img/B22414_01_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="7225">Figure 1.1 – OpenAI welcome window</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7259">Simply click the</st> **<st c="7277">Sign up</st>** <st c="7284">button
    and follow the prompts to access the registration window (see</st> *<st c="7354">Figure
    1</st>**<st c="7362">.2</st>*<st c="7364">).</st> <st c="7368">From there, you
    have the option to enter your email address and click</st> **<st c="7438">Continue</st>**<st
    c="7446">, or you can opt to register using your Google or Microsoft account.</st>
    <st c="7515">Once this step is complete, you can select a password and validate
    your email, just like with any other website</st> <st c="7627">registration process.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7648">After completing the registration</st> <st c="7683">process, you
    can begin exploring ChatGPT’s full range of features.</st> <st c="7750">Simply
    click the</st> **<st c="7767">Log in</st>** <st c="7773">button depicted in</st>
    *<st c="7793">Figure 1</st>**<st c="7801">.1</st>* <st c="7803">and enter your
    credentials into the log in window.</st> <st c="7855">Upon successfully logging
    in, you’ll gain full access to ChatGPT and all other OpenAI products.</st> <st
    c="7951">With this straightforward approach to access, you can seamlessly explore
    the full capabilities of ChatGPT and see firsthand why it’s become such a powerful
    tool</st> <st c="8111">for</st> <st c="8116">NLP tasks.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.2 – OpenAI registration window](img/B22414_01_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="8408">Figure 1.2 – OpenAI registration window</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8447">Now we can explore the features and functionality of the ChatGPT
    web interface in greater detail.</st> <st c="8546">We’ll show you how to navigate
    the interface and make the most of its diverse options to get the best possible
    results from the</st> <st c="8674">AI model.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8683">ChatGPT web interface</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="8705">The ChatGPT web interface</st> <st c="8731">allows users to interact
    with the AI model.</st> <st c="8776">Once a user registers for the service and
    logs in, they can enter text prompts or questions into a chat window and receive
    responses from the model.</st> <st c="8925">You can ask ChatGPT anything using
    the</st> **<st c="8964">Send a message</st>** <st c="8978">text field.</st> <st
    c="8991">The chat window also displays previous messages and prompts, allowing
    users to keep track of the conversation’s context, as shown in</st> *<st c="9124">F</st><st
    c="9125">igure 1</st>**<st c="9132">.3</st>*<st c="9134">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.3 – ChatGPT following conversational context](img/B22414_01_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="9299">Figure 1.3 – ChatGPT following conversational context</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9352">In addition to that, ChatGPT allows users to easily record the
    history of their interactions with the model.</st> <st c="9462">Users’ chat logs
    are automatically saved, which can later be accessed from the left sidebar for
    reference or analysis.</st> <st c="9581">This feature is especially useful for
    researchers or individuals who want to keep track of their conversations with
    the model and evaluate its performance over time.</st> <st c="9747">The chat logs
    can also be used to train other models or compare the performance of different
    models.</st> <st c="9848">You are now able to distinguish and use the advancements
    of different ChatGPT models.</st> <st c="9934">You can also use ChatGPT from the
    web, including creating an account and generating API keys.</st> <st c="10028">The
    ChatGPT API is flexible and customizable and can save developers</st> <st c="10096">time
    and resources, making it an ideal choice for chatbots, virtual assistants, and
    automated content generation.</st> <st c="10211">In the next section, you will
    learn how to access the ChatGPT API easily</st> <st c="10284">using Python.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10297">Getting started with the ChatGPT API</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="10334">The</st> **<st c="10339">ChatGPT API</st>** <st c="10350">is developed
    by OpenAI and allows developers to interact with GPT models for NLP tasks.</st>
    <st c="10439">This API</st> <st c="10447">provides an easy-to-use interface</st>
    <st c="10481">for generating text, completing prompts, answering questions, and
    carrying out other NLP tasks using state-of-the-art machine</st> <st c="10608">learning
    models.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10624">The ChatGPT API is used for chatbots, virtual assistants, and
    automated content generation.</st> <st c="10717">It can also be used for language
    translation, sentiment analysis, and content classification.</st> <st c="10811">The
    API is flexible and customizable, allowing developers to fine-tune the model’s
    performance for their specific use case.</st> <st c="10935">Let’s now discover
    the process of obtaining an API key.</st> <st c="10991">This is the first step
    to accessing the ChatGPT API from your</st> <st c="11053">own applications.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11070">Obtaining an API key</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="11091">To use the ChatGPT API, you will need to obtain</st> <st c="11139">an
    API key.</st> <st c="11152">This can be obtained</st> <st c="11172">from OpenAI.</st>
    <st c="11186">This key will allow you to authenticate your requests to the API
    and ensure that only authorized users can access</st> <st c="11300">your account.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11313">To obtain an API key, you must</st> <st c="11344">access the OpenAI
    platform at</st> [<st c="11375">https://platform.openai.com</st>](https://platform.openai.com)
    <st c="11402">using your ChatGPT credentials.</st> <st c="11435">The OpenAI platform
    page provides a central hub for managing</st> <st c="11495">your OpenAI resources.</st>
    <st c="11519">Once</st> <st c="11523">you have signed up, you can navigate to
    the API access page:</st> [<st c="11585">https://platform.openai.com/account/api-keys</st>](https://platform.openai.com/account/api-keys)<st
    c="11629">. On the API access page, you can manage your API keys for the ChatGPT
    API and other OpenAI services.</st> <st c="11731">You can generate new API keys,
    view, and edit the permissions associated with each key, and monitor your usage
    of the APIs.</st> <st c="11855">The page provides a clear overview of your API
    keys, including their names, types, and creation dates, and allows you to easily
    revoke or regenerate keys</st> <st c="12009">as needed.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12019">Click on the</st> **<st c="12033">+ Create new secret key</st>**
    <st c="12056">button and your API key will</st> <st c="12086">be created:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.4 – Creating an API key](img/B22414_01_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="12715">Figure 1.4 – Creating an API key</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12747">After creating</st> <st c="12762">your API key, you will only
    have one chance to copy it (see</st> *<st c="12823">Figure 1</st>**<st c="12831">.5</st>*<st
    c="12833">).</st> <st c="12837">It’s important to keep your API key secure and
    confidential, as anyone who has access to your key could potentially access your
    account and use your resources.</st> <st c="12997">You should also be careful
    not to share your key with unauthorized users and avoid committing your key to
    public repositories or sharing it in plain text over</st> <st c="13156">i</st><st
    c="13157">nsecure channels.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.5 – Saving an API key](img/B22414_01_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="13454">Figure 1.5 – Saving an API key</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13484">Copying and pasting</st> <st c="13504">the API key</st> <st c="13516">in
    our applications and scripts allows us to use the ChatGPT API.</st> <st c="13583">Now,
    let’s examine the ChatGPT tokens and their involvement in the OpenAI</st> <st
    c="13657">pricing model.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13671">API tokens and pricing</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="13694">When working with ChatGPT APIs, it’s important</st> <st c="13741">to
    understand the concept</st> <st c="13767">of tokens.</st> <st c="13779">Tokens
    are the basic units of text used by models to process and understand the input
    and</st> <st c="13869">output text.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13881">Tokens can be words or chunks of characters and are created by
    breaking down the text into smaller pieces.</st> <st c="13989">For instance, the
    word</st> *<st c="14012">hamburger</st>* <st c="14021">can be broken down into</st>
    *<st c="14046">ham</st>*<st c="14049">,</st> *<st c="14051">bur</st>*<st c="14054">,
    and</st> *<st c="14060">ger</st>*<st c="14063">, while a shorter word such as</st>
    *<st c="14094">pear</st>* <st c="14098">is a single token.</st> <st c="14118">Tokens
    can also start with whitespace, such as</st> *<st c="14165">hello</st>* <st c="14170">or</st>
    *<st c="14174">bye</st>*<st c="14177">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14178">The number of tokens used in an API request depends on the length
    of both the input and output text.</st> <st c="14280">As a rule of thumb, one
    token corresponds to approximately 4 characters or 0.75 words in English text.</st>
    <st c="14383">It’s important to note that the combined length of the text prompt
    and generated response must not exceed the maximum context length of the model.</st>
    *<st c="14530">Table 1.1</st>* <st c="14539">shows the token limits of some of
    the popular</st> <st c="14586">ChatGPT models.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '| **<st c="14601">Model</st>** | **<st c="14607">Max Tokens</st>** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="14618">gpt-4</st> | <st c="14624">8,192 tokens</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="14637">gpt-4-32k</st> | <st c="14647">32,768 tokens</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="14661">gpt-3.5-turbo</st> | <st c="14675">4,096 tokens</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="14688">gpt-3.5-turbo-0125</st> | <st c="14707">16,385 tokens</st>
    |'
  prefs: []
  type: TYPE_TB
- en: <st c="14721">Table 1.1 – API model token limits</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14756">To learn more about how text is translated</st> <st c="14799">into
    tokens, you can check out OpenAI’s</st>**<st c="14839">tokenizer</st>** <st c="14849">tool.</st>
    <st c="14856">The tokenizer tool is a helpful resource provided by OpenAI for
    understanding how text is translated into tokens.</st> <st c="14970">This tool
    breaks down text into individual tokens and displays their corresponding byte
    offsets, which can be useful for analyzing and understanding the structure of</st>
    <st c="15136">your text.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15146">You can find</st> <st c="15159">the tokenizer tool at</st> [<st
    c="15182">https://platform.openai.com/tokenizer</st>](https://platform.openai.com/tokenizer)<st
    c="15219">. To use the tokenizer tool, simply</st> <st c="15254">enter the text</st>
    <st c="15269">you want to analyze and select the appropriate model and settings.</st>
    <st c="15337">The tool will then generate a list of tokens, along with their corresponding
    byte offsets (see</st> *<st c="15432">Figure 1</st>**<st c="15440">.6</st>*<st
    c="15442">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.6 – The tokenizer tool](img/B22414_01_6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="15572">Figure 1.6 – The tokenizer tool</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15603">The ChatGPT API pricing</st> <st c="15627">is structured such
    that you are charged per 1,000 tokens</st> <st c="15684">processed, with a minimum
    charge per API request.</st> <st c="15735">This means that the longer your input
    and output texts are, the more tokens will be processed and the higher the cost
    will be.</st> *<st c="15862">Table 1.2</st>* <st c="15871">displays the current
    cost of processing 1,000 tokens for several commonly used ChatGPT models as of</st>
    <st c="15972">May 2024.</st>
  prefs: []
  type: TYPE_NORMAL
