- en: <st c="15603">The ChatGPT API pricing</st> <st c="15627">is structured such
    that you are charged per 1,000 tokens</st> <st c="15684">processed, with a minimum
    charge per API request.</st> <st c="15735">This means that the longer your input
    and output texts are, the more tokens will be processed and the higher the cost
    will be.</st> *<st c="15862">Table 1.2</st>* <st c="15871">displays the current
    cost of processing 1,000 tokens for several commonly used ChatGPT models as of</st>
    <st c="15972">May 2024.</st>
