- en: <st c="16244">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16259">It is important to keep an eye on your token usage to avoid unexpected
    charges.</st> <st c="16340">You can track your usage and monitor</st> <st c="16377">your
    billing information through the</st> **<st c="16414">Usage</st>** <st c="16419">dashboard</st>
    <st c="16430">at</st> [<st c="16433">https://platform.openai.com/account/usage</st>](https://platform.openai.com/account/usage)<st
    c="16474">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16475">As you can see, ChatGPT is an easy-to-use interface that allows
    developers to interact with GPT models for NLP tasks.</st> <st c="16594">Tokens
    are the basic units of text used by the models to process and understand the input
    and output text.</st> <st c="16701">The pricing structure for the ChatGPT API
    is based on the number of tokens processed, with a minimum charge per</st> <st
    c="16813">API request.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16825">In the next section, we will cover</st> <st c="16860">how to set
    up the Python development environment</st> <st c="16909">for working with the
    ChatGPT API.</st> <st c="16944">This involves installing Python and the VSCode</st>
    `<st c="17223">venv</st>` <st c="17227">module and how to access the</st> **<st
    c="17257">Terminal</st>** <st c="17265">tab</st> <st c="17270">within VSCode.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17284">Setting up your Python development environment</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="17331">Before we start writing</st> <st c="17355">our first code, it’s
    important to create an environment to work in and install any necessary dependencies.</st>
    <st c="17463">Fortunately, Python has an excellent tooling system for managing
    virtual environments.</st> <st c="17550">Virtual environments in Python are a
    complex topic, but for the purposes of this book, it’s enough to know that they
    are isolated Python environments that are separate from your global Python installation.</st>
    <st c="17756">This isolation allows developers to work with different Python versions,
    install packages within the environment, and manage project dependencies without
    interfering with Python’s</st> <st c="17936">global installation.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17956">In order to utilize the ChatGPT API in your NLP projects, you
    will need to set up your Python development environment.</st> <st c="18076">This
    section will guide you through the necessary steps to get started, including</st>
    <st c="18158">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18172">Installing Python</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="18190">Installing the</st> <st c="18206">VSCode IDE</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="18216">Installing</st> `<st c="18228">pip</st>`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="18231">Setting up a</st> <st c="18245">virtual environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="18264">Installing the required</st> <st c="18289">Python packages</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="18304">A properly configured development environment</st> <st c="18350">will
    allow you to make API requests to ChatGPT and process the resulting responses
    in your</st> <st c="18442">Python code.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18454">Installing Python and the VSCode IDE</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="18491">Python is a popular</st> <st c="18511">programming language</st>
    <st c="18532">that is widely used for various purposes, including machine learning
    and data analysis.</st> <st c="18621">You can download and install the latest</st>
    <st c="18660">version of Python from the official website,</st> [<st c="18706">https://www.python.org/downloads/</st>](https://www.python.org/downloads/)
    <st c="18739">(see</st> *<st c="18745">Figure 1</st>**<st c="18753">.7</st>*<st
    c="18755">).</st> <st c="18759">To verify that Python has been installed, you
    can open a terminal on your device and type</st> <st c="18849">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="18882">Once you have downloaded the Python installer, simply follow the
    instructions to install Python</st> <st c="18978">on your computer.</st> <st c="18997">The
    next step is to choose an IDE to</st> <st c="19034">work with.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.7 – Python installation](img/B22414_01_7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="20109">Figure 1.7 – Python installation</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20141">One popular choice among Python developers is VSCode, a powerful
    and user-friendly IDE.</st> <st c="20230">VSCode provides a wide range of features
    that make it easy to develop Python</st> <st c="20306">applications, including
    code completion, debugging tools, and project</st> <st c="20377">management capabilities.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20401">To install VSCode, you can download</st> <st c="20437">it for
    free from the VSCode website,</st> [<st c="20475">https://code.visualstudio.com/download</st>](https://code.visualstudio.com/download)<st
    c="20513">. Once you have downloaded the installer, simply</st> <st c="20561">follow
    the instructions to install VSCode on</st> <st c="20607">your computer.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20621">Setting up a Python virtual environment</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="20661">Setting up a Python virtual environment</st> <st c="20701">is
    a crucial step in creating an isolated development environment for your project.</st>
    <st c="20786">By creating a virtual environment, you can install specific versions
    of Python packages and dependencies without interfering with other projects on</st>
    <st c="20934">your system.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20946">Creating a Python virtual environment specific to your ChatGPT
    application project is a recommended best practice.</st> <st c="21062">By doing
    so, you can ensure that all the packages and dependencies are saved inside your
    project folder rather than cluttering up your computer’s global Python installation.</st>
    <st c="21236">This approach provides a more organized and isolated environment
    for your project’s development</st> <st c="21332">and execution.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21346">The VSCode IDE allows you to set up the Python virtual environment
    using its built-in terminal.</st> <st c="21443">You can follow these steps to
    set up your</st> <st c="21485">VSCode project:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21500">Launch VSCode on</st> <st c="21518">your computer.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="21532">Use the File Explorer or the</st> `<st c="21665">ChatGPTResponse</st>`<st
    c="21680">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="21681">After creating the folder, open it in VSCode by selecting</st>
    **<st c="21740">File</st>** <st c="21744">|</st> **<st c="21747">Open Folder</st>**
    <st c="21758">and navigating to the folder you</st> <st c="21792">just created.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="21805">Inside the opened folder, create a new Python file where you will
    write your code.</st> <st c="21889">You can do this by right-clicking in the</st>
    `<st c="21997">.py</st>` <st c="22000">extension, such</st> <st c="22017">as</st>
    `<st c="22020">app.py</st>`<st c="22026">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22027">Open the integrated terminal in VSCode by selecting</st> **<st
    c="22080">View</st>** <st c="22084">|</st> **<st c="22087">Terminal</st>** <st
    c="22095">from</st> <st c="22101">the menu.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22110">Once inside your project folder, create a virtual environment
    by running the following command.</st> <st c="22207">The second</st> `<st c="22218">venv</st>`
    <st c="22222">argument refers to the folder name of your</st> <st c="22266">virtual
    environment:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="22455">To activate the virtual environment, run the following</st> <st
    c="22511">terminal command:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22528">On Windows, run the following terminal command to activate the</st>
    <st c="22592">virtual environment:</st>
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: <st c="22640">On macOS or Linux, run the following terminal command to activate
    the</st> <st c="22711">virtual environment:</st>
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 1.8 – VSCode project hierarchy](img/B22414_01_8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="22793">Figure 1.8 – VSCode project hierarchy</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22830">Once activated, you should see the name of the virtual environment
    in the command prompt or terminal, as shown here.</st> <st c="22948">From here,
    you can install any packages or dependencies you need for your project without
    interfering with other Python installations on</st> <st c="23085">your system:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="23190">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23205">For consistency, you need to activate your virtual environment
    for every new Python project</st> <st c="23298">you create.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23309">A key component</st> <st c="23325">needed to install any package
    in Python is</st> `<st c="23369">pip</st>`<st c="23372">. Let’s see how to check
    whether pip is already installed on your system, and how to install it</st> <st
    c="23468">if necessary.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23481">The pip package installer</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="23507">pip is a package installer</st> <st c="23534">for Python.</st>
    <st c="23547">It allows you to easily install and manage third-party Python libraries
    and packages such as</st> `<st c="23640">openai</st>`<st c="23646">. If you are
    using a recent version of Python,</st> `<st c="23693">pip</st>` <st c="23696">should
    already be installed.</st> <st c="23726">You can check whether pip is installed
    on your system by opening a command prompt or terminal and typing</st> `<st c="23831">pip</st>`
    <st c="23834">followed by pressing the</st> *<st c="23860">Enter</st>* <st c="23865">key.</st>
    <st c="23871">If</st> `<st c="23874">pip</st>` <st c="23877">is installed, you
    should see some output describing its usage</st> <st c="23940">and commands.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23953">If pip is not installed on your system, you can install it by
    following</st> <st c="24026">these steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24038">First, download the</st> `<st c="24059">get-pip.py</st>` <st c="24069">script
    from the official Python</st> <st c="24102">website:</st> [<st c="24111">https://bootstrap.pypa.io/get-pip.py</st>](https://bootstrap.pypa.io/get-pip.py)<st
    c="24147">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24148">Save the file to a location on your computer that you can easily
    access, such as your desktop or</st> <st c="24246">downloads folder.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24263">Open a command prompt or terminal and navigate to the directory
    where you saved the</st> `<st c="24348">get-pip.py</st>` <st c="24358">file.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24364">Run the following command to install pip:</st> `<st c="24407">python
    get-pip.py</st>`<st c="24424">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24425">Once the installation is complete, you can verify that pip is
    installed by typing</st> `<st c="24508">pip</st>` <st c="24511">into the command
    prompt or terminal and</st> <st c="24552">pressing</st> *<st c="24561">Enter</st>*<st
    c="24566">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24567">You should now have pip installed on your system and be able to
    use it to install packages and libraries</st> <st c="24673">for Python.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24684">This was a complete guide on how to set up a Python development
    environment for using the ChatGPT API in NLP projects.</st> <st c="24804">Setting
    up a virtual environment was a crucial step</st> <st c="24855">in creating an
    isolated development environment</st> <st c="24903">for your project.</st> <st
    c="24922">You are now ready to complete your first practice exercise on using
    the ChatGPT API with Python to interact with the</st> <st c="25039">OpenAI library.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="25054">A simple ChatGPT API response</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="25084">Using the ChatGPT API with Python</st> <st c="25118">is a relatively
    simple process.</st> <st c="25151">You’ll first need to make sure you have created
    the directory called</st> `<st c="25220">CHATGPTRESPONSE</st>` <st c="25235">described
    in the previous section (see</st> *<st c="25275">Figure 1</st>**<st c="25283">.8</st>*<st
    c="25285">).</st> <st c="25289">Once you have that set up, you can use the OpenAI
    Python library to interact with the ChatGPT API.</st> <st c="25388">Open a new
    terminal in VSCode, make sure that you are in your project folder and virtual
    environment, and install the</st> `<st c="25506">openai</st>` <st c="25512">package:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="25542">To get started, you’ll need to import the</st> `<st c="25585">openai</st>`
    <st c="25591">library into your</st> `<st c="25610">app.py</st>` <st c="25616">file.</st>
    <st c="25623">Also, you’ll need to provide</st> <st c="25651">your OpenAI API
    key.</st> <st c="25673">You can obtain an API key from the OpenAI website by following
    the steps outlined in the previous sections of this book.</st> <st c="25794">Then
    you’ll need to set it as a parameter in your Python code.</st> <st c="25857">Once
    your API key is set up, you can start interacting with the</st> <st c="25921">ChatGPT
    API:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <st c="25999">Replace</st> `<st c="26008">YOUR_API_KEY</st>` <st c="26020">with
    the API key you obtained from the OpenAI platform page.</st> <st c="26082">Usually,
    it is not good practice to keep API keys in the same file as your main code.</st>
    <st c="26168">In the next chapter, we will discuss how to keep those keys safe.</st>
    <st c="26234">Now, you can ask the user for a question using the</st> `<st c="26285">input()</st>`
    <st c="26292">function:</st>
