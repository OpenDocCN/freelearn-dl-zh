  type: TYPE_NORMAL
  zh: <st c="20109">Figure 1.7 – Python installation</st>
- en: <st c="20141">One popular choice among Python developers is VSCode, a powerful
    and user-friendly IDE.</st> <st c="20230">VSCode provides a wide range of features
    that make it easy to develop Python</st> <st c="20306">applications, including
    code completion, debugging tools, and project</st> <st c="20377">management capabilities.</st>
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20141">Python开发者中一个流行的选择是VSCode，这是一个强大且用户友好的IDE。</st> <st c="20230">VSCode提供了一系列功能，使开发Python</st>
    <st c="20306">应用程序变得容易，包括代码补全、调试工具和项目</st> <st c="20377">管理功能。</st>
- en: <st c="20401">To install VSCode, you can download</st> <st c="20437">it for
    free from the VSCode website,</st> [<st c="20475">https://code.visualstudio.com/download</st>](https://code.visualstudio.com/download)<st
    c="20513">. Once you have downloaded the installer, simply</st> <st c="20561">follow
    the instructions to install VSCode on</st> <st c="20607">your computer.</st>
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20401">要安装VSCode，您可以从VSCode网站免费</st> <st c="20437">下载它</st>，[<st c="20475">https://code.visualstudio.com/download</st>](https://code.visualstudio.com/download)<st
    c="20513">。下载安装程序后，只需</st> <st c="20561">按照说明在您的计算机上安装VSCode。</st>
- en: <st c="20621">Setting up a Python virtual environment</st>
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <st c="20621">设置Python虚拟环境</st>
- en: <st c="20661">Setting up a Python virtual environment</st> <st c="20701">is
    a crucial step in creating an isolated development environment for your project.</st>
    <st c="20786">By creating a virtual environment, you can install specific versions
    of Python packages and dependencies without interfering with other projects on</st>
    <st c="20934">your system.</st>
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20661">设置Python虚拟环境</st> <st c="20701">是创建项目独立开发环境的关键步骤。</st> <st c="20786">通过创建虚拟环境，您可以在不干扰系统上其他项目的情况下安装特定版本的Python包和依赖项。</st>
    <st c="20934">您的系统。</st>
- en: <st c="20946">Creating a Python virtual environment specific to your ChatGPT
    application project is a recommended best practice.</st> <st c="21062">By doing
    so, you can ensure that all the packages and dependencies are saved inside your
    project folder rather than cluttering up your computer’s global Python installation.</st>
    <st c="21236">This approach provides a more organized and isolated environment
    for your project’s development</st> <st c="21332">and execution.</st>
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20946">为您的ChatGPT应用程序项目创建特定的Python虚拟环境是一种推荐的最佳实践。</st> <st c="21062">这样做可以确保所有包和依赖项都保存在您的项目文件夹中，而不是弄乱您计算机的全局Python安装。</st>
    <st c="21236">这种方法为项目开发和执行提供了一个更组织化和隔离的环境。</st>
- en: <st c="21346">The VSCode IDE allows you to set up the Python virtual environment
    using its built-in terminal.</st> <st c="21443">You can follow these steps to
    set up your</st> <st c="21485">VSCode project:</st>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
