    <st c="16419">仪表板</st> <st c="16430">在</st> [<st c="16433">https://platform.openai.com/account/usage</st>](https://platform.openai.com/account/usage)<st
    c="16474">上跟踪你的使用情况和监控</st> <st c="16419">账单信息。</st>
- en: <st c="16475">As you can see, ChatGPT is an easy-to-use interface that allows
    developers to interact with GPT models for NLP tasks.</st> <st c="16594">Tokens
    are the basic units of text used by the models to process and understand the input
    and output text.</st> <st c="16701">The pricing structure for the ChatGPT API
    is based on the number of tokens processed, with a minimum charge per</st> <st
    c="16813">API request.</st>
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16475">正如你所见，ChatGPT 是一个易于使用的界面，允许开发者与 GPT 模型进行 NLP 任务交互。</st> <st c="16594">令牌是模型用于处理和理解输入和输出文本的基本文本单元。</st>
    <st c="16701">ChatGPT API 的定价结构基于处理的令牌数量，每个 API 请求有最低费用。</st>
- en: <st c="16825">In the next section, we will cover</st> <st c="16860">how to set
    up the Python development environment</st> <st c="16909">for working with the
    ChatGPT API.</st> <st c="16944">This involves installing Python and the VSCode</st>
    `<st c="17223">venv</st>` <st c="17227">module and how to access the</st> **<st
    c="17257">Terminal</st>** <st c="17265">tab</st> <st c="17270">within VSCode.</st>
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16825">在下一节中，我们将介绍</st> <st c="16860">如何设置 Python 开发环境</st> <st c="16909">以使用
    ChatGPT API。</st> <st c="16944">这包括安装 Python 和 VSCode 的</st> `<st c="17223">venv</st>`
    <st c="17227">模块以及如何在 VSCode 中访问</st> **<st c="17257">终端</st>** <st c="17265">选项卡。</st>
- en: <st c="17284">Setting up your Python development environment</st>
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="17284">设置你的 Python 开发环境</st>
- en: <st c="17331">Before we start writing</st> <st c="17355">our first code, it’s
    important to create an environment to work in and install any necessary dependencies.</st>
    <st c="17463">Fortunately, Python has an excellent tooling system for managing
    virtual environments.</st> <st c="17550">Virtual environments in Python are a
    complex topic, but for the purposes of this book, it’s enough to know that they
    are isolated Python environments that are separate from your global Python installation.</st>
    <st c="17756">This isolation allows developers to work with different Python versions,
    install packages within the environment, and manage project dependencies without
    interfering with Python’s</st> <st c="17936">global installation.</st>
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17331">在我们开始编写</st> <st c="17355">我们的第一个代码之前，创建一个工作环境并安装任何必要的依赖项是很重要的。</st>
    <st c="17463">幸运的是，Python有一个出色的工具系统来管理虚拟环境。</st> <st c="17550">Python中的虚拟环境是一个复杂的话题，但就本书的目的而言，只需知道它们是独立的Python环境，与您的全局Python安装分开即可。</st>
    <st c="17756">这种隔离允许开发者使用不同的Python版本，在环境中安装包，并管理项目依赖项，而不会干扰Python的</st> <st c="17936">全局安装。</st>
- en: <st c="17956">In order to utilize the ChatGPT API in your NLP projects, you
    will need to set up your Python development environment.</st> <st c="18076">This
    section will guide you through the necessary steps to get started, including</st>
    <st c="18158">the following:</st>
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17956">为了在您的NLP项目中使用ChatGPT API，您需要设置您的Python开发环境。</st> <st c="18076">本节将指导您完成启动所需的步骤，包括以下内容：</st>
