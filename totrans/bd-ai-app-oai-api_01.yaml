- en: 'Swimming is a great form of exercise and a valuable life skill. Here are some
    basic steps to follow:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 游泳是一种极佳的锻炼方式，也是一项宝贵的生存技能。以下是一些基本步骤：
- en: 1\. Start by getting in the water. If you're swimming in a pool, you can enter
    the water from the side, ladder, or diving board. If you are swimming in the ocean
    or lake, you can enter the water from the shore or a dock. 2\. Take a deep breath
    in and then exhale slowly. This will help you relax and prepare for swimming.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 首先进入水中。如果你在游泳池游泳，你可以从侧面、梯子或跳板进入水中。如果你在海边或湖中游泳，你可以从岸边或码头进入水中。2\. 深吸一口气，然后慢慢呼出。这有助于你放松并准备游泳。
