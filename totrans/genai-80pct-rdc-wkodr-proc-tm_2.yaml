- en: Executive Summary
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
  zh: 执行摘要
- en: Many organizations today grapple with “data chaos”, a challenge in managing
    and utilizing unstructured data formats like PDFs. [Lucidis AI](https://lucidis.ai/),
    a product developed by [WhitegloveAI](https://www.whitegloveai.com/), addresses
    this issue by applying machine vision, OCR, and advanced AI techniques to ingest,
    clean, and structure unstructured data. These technologies allow businesses to
    leverage their data for downstream applications and AI systems — through an intuitive
    chatbot interface, so employees can interact with the data using natural language.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织今天都在努力应对“数据混乱”，这是管理和利用非结构化数据格式（如PDF）的挑战。[Lucidis AI](https://lucidis.ai/)，由[WhitegloveAI](https://www.whitegloveai.com/)开发的产品，通过应用机器视觉、OCR和先进的AI技术来摄取、清理和结构化非结构化数据来解决这一问题。这些技术允许企业利用其数据用于下游应用和AI系统——通过直观的聊天机器人界面，员工可以使用自然语言与数据交互。
- en: This report shares insights into how AI-driven automation can be applied across
    industries to overcome the challenges of unstructured data. We’ll explore [Black
    Dome](https://www.blackdomeservices.com/), a property preservation company managing
    repairs and maintenance for foreclosed properties, and show how Lucidis streamlined
    their work order management process using the techniques discussed in this report.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本报告分享了如何将AI驱动的自动化应用于各个行业以克服非结构化数据的挑战的见解。我们将探讨[黑色穹顶](https://www.blackdomeservices.com/)，一家管理被查封房产维修和维护的财产保护公司，并展示Lucidis如何利用本报告讨论的技术简化其工作订单管理流程。
- en: The problem
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 问题
- en: Black Dome received work orders from vendors in various unstructured formats,
    including PDFs, emails, and images. This required manual data entry, a process
    that was time-intensive, error-prone, and inefficient, leading to delays and added
    costs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 黑色穹顶公司从各种非结构化格式的供应商那里接收工作订单，包括PDF、电子邮件和图像。这需要手动数据输入，这个过程耗时、易出错且效率低下，导致延误和额外成本。
- en: The solution
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案
- en: AI techniques automated the ingestion and processing of work orders, transforming
    unstructured data into structured formats that seamlessly integrate with Black
    Dome’s existing management systems.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: AI技术自动化了工作订单的摄取和处理，将非结构化数据转换为与黑色穹顶现有管理系统无缝集成的结构化格式。
- en: Key results
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 关键结果
- en: 'Increased efficiency: Black Dome eliminated manual data entry, dramatically
    reducing work order processing time.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 提高效率：黑色穹顶公司消除了手动数据输入，显著减少了工作订单处理时间。
- en: 'Cost savings: Black Dome significantly reduced outsourcing costs and achieved
    substantial ROI by bringing work order processing in-house, realizing net cost
    savings of 80%.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 成本节约：黑色穹顶公司通过将工作订单处理内部化，显著降低了外包成本，并实现了显著的回报率，实现了80%的净成本节约。
- en: 'Improved data accuracy: Automation eliminated human errors, resulting in more
    accurate work order descriptions and instructions.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 提高数据准确性：自动化消除了人为错误，从而产生了更准确的工作订单描述和指令。
- en: 'Enhanced worker experience: Integrating these techniques reduced manual steps
    from eight to two, simplifying document upload and allowing employees to focus
    on more valuable, rewarding tasks.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 提升员工体验：整合这些技术将手动步骤从八个减少到两个，简化了文档上传，并使员工能够专注于更有价值、更有回报的任务。
- en: 'Technology and innovation: Lucidis leverages machine vision, OCR, and advanced
    AI models to ensure accurate data extraction and transformation. These technologies
    offer a scalable solution that can be adapted across industries to address similar
    unstructured data challenges.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 技术和创新：Lucidis利用机器视觉、OCR和先进的AI模型来确保准确的数据提取和转换。这些技术提供了一种可扩展的解决方案，可以适应各个行业以解决类似非结构化数据挑战。
- en: 'Scalability and security: Lucidis’s cloud- agnostic architecture and robust
    security measures guarantee scalability and compliance with industry standards
    like GDPR and HIPAA.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展性和安全性：Lucidis的无云架构和强大的安全措施保证了可扩展性和符合行业标准，如GDPR和HIPAA。
- en: '![](img/2.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: Bad data leads to bad AI, which in turn builds technical debt for the organization.
    Many business leaders don’t fully understand how this kind of debt affects their
    operations, but it’s a very real issue.”
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 错误的数据会导致错误的AI，反过来又会为组织构建技术债务。许多商业领袖并不完全了解这种债务如何影响他们的运营，但它是一个非常现实的问题。”
- en: -- Tobalo Torres
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
