- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Driving Client Success in Banking with GenAI Copilots
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用生成式人工智能共飞行员在银行业推动客户成功
- en: 'The wealth management industry stands at a crossroads. While relationship managers
    have traditionally been the cornerstone of personalized financial services, they
    now face an unprecedented challenge: how to scale intimate, high-touch client
    relationships without compromising the quality of service that drives customer
    loyalty and business growth. Companies such as QuantumBlack, AI by McKinsey, have
    been tracking this change and what it means for business and technology leaders.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 财富管理行业站在十字路口。虽然关系经理一直是个性化金融服务的基石，但他们现在面临着前所未有的挑战：如何在不牺牲推动客户忠诚度和业务增长的服务质量的前提下，扩展亲密、高接触的客户关系。像QuantumBlack、麦肯锡的AI这样的公司一直在跟踪这一变化及其对商业和技术领导者的意义。
- en: The banking sector’s digital transformation has accelerated dramatically over
    recent decades, moving from branch-based interactions to omnichannel experiences
    that meet customers wherever they are. Customer expectations for immediate, personalized
    service have never been higher, while regulatory pressures and competitive forces
    demand greater efficiency and broader reach. This evolution has created both opportunity
    and tension; banks must serve more clients across wider geographic areas while
    maintaining the personal touch that differentiates premium wealth management services.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 银行业在过去几十年中数字化转型加速，从基于分支机构的互动转变为满足客户在任何地方的需求的全渠道体验。客户对即时、个性化服务的期望从未如此之高，而监管压力和竞争力量要求更高的效率和更广泛的覆盖范围。这种演变既创造了机会，也带来了紧张；银行必须在更广泛的地理区域内服务更多客户，同时保持区分高端财富管理服务的个性化接触。
- en: 'But there remains a core challenge: human relationship managers can only manage
    so many meaningful client relationships effectively. The traditional model relies
    heavily on personal memory, manual research, and one-to-one interactions that
    simply don’t scale. As client portfolios grow and market complexity increases,
    relationship managers find themselves spending more time on administrative tasks
    and less time adding genuine value to client relationships.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但仍然存在一个核心挑战：人际关系经理只能有效地管理有限数量的有意义客户关系。传统的模式严重依赖个人记忆、手动研究和一对一的互动，这些方式根本无法扩展。随着客户组合的增长和市场复杂性的增加，关系经理发现自己花更多的时间在行政工作上，而花在为客户关系增加真正价值上的时间却越来越少。
- en: 'By the end of this chapter, you will understand the following:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将了解以下内容：
- en: How the catch-22 of wealth relationship management creates an opportunity for
    AI transformation
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财富关系管理的困境如何为人工智能转型创造机会
- en: Why traditional relationship management relies heavily on manual effort and
    personal memory, limiting scalability
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么传统的关系管理严重依赖手动努力和个人记忆，限制了可扩展性
- en: How GenAI copilots can transform relationship manager productivity from 20–30%
    client interaction time to over 70%
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能共飞行员如何将关系经理的生产力从20-30%的客户互动时间提升到70%以上
- en: The technical architecture that powers real-time AI recommendations and automated
    follow-up generation
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持实时人工智能推荐和自动跟进生成的技术架构
- en: How to implement four essential AI factory pipelines for production-grade GenAI
    applications
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何实施四个必要的AI工厂管道，以生产级生成式人工智能应用
- en: Why guardrails against hallucinations and compliance frameworks are critical
    for financial services
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么防止幻觉的护栏和合规框架对金融服务至关重要
- en: Real-world use cases across call center analysis, virtual agent support, and
    fraud detection
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在呼叫中心分析、虚拟代理支持和欺诈检测等方面的实际用例
- en: How to build organizational adoption through strategic infrastructure planning
    and user engagement
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过战略基础设施规划和用户参与来构建组织采用
- en: 'The business impact of GenAI implementation: 10–25% revenue uplift per relationship
    manager and 5–15% increase in active customers managed'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能实施的业务影响：每位关系经理收入增长10-25%，管理的活跃客户增加5-15%
- en: The catch-22 of wealth relationship management
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 财富关系管理的困境
- en: 'Wealth management relationship managers have long served as the personalized
    bridge between high-net-worth clients and financial institutions. They provide
    their elite clientele with white-glove service: personalized financial advice,
    investment recommendations, fiscal planning services, and more. But they also
    face unprecedented pressure to increase the number of clients under their management.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 财富管理关系经理长期以来一直是高净值客户和金融机构之间个性化的桥梁。他们为他们的精英客户提供白手套服务：个性化的财务建议、投资建议、财政规划服务等等。但他们也面临着前所未有的压力，需要增加他们管理的客户数量。
- en: This dual mandate places relationship managers in a catch-22 situation. On the
    one hand, banking institutions require scalability and revenue growth. On the
    other hand, the human capacity for high-touch relationship management cannot scale
    without sacrificing service quality.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这种双重使命使关系经理陷入了两难境地。一方面，银行机构需要可扩展性和收入增长。另一方面，没有牺牲服务质量，人类进行高接触客户关系管理的能力无法实现规模化。
- en: Traditional wealth management relies heavily on the relationship manager’s personal
    memory and manual effort. For example, they personally assess portfolio positions,
    risks, and opportunities, manually contact their clients, manually research relevant
    news and market updates, gather insights ad hoc during conversations, and rely
    on broad and generalized ideas and strategies rather than personalized ones.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 传统财富管理严重依赖关系经理的个人记忆和手动努力。例如，他们亲自评估投资组合位置、风险和机会，手动联系客户，手动研究相关的新闻和市场更新，在对话中临时收集见解，并依赖广泛的泛化想法和策略，而不是个性化的策略。
- en: QuantumBlack, AI by McKinsey’s extensive work with clients has revealed that
    relationship managers typically spend only 20–30% of their time interacting with
    customers while 70–80% of their time is spent on research, preparation, and paperwork.
    This represents a massive opportunity for transformation through AI.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: QuantumBlack，麦肯锡 AI 部门与客户的广泛合作揭示了关系经理通常只花费 20-30% 的时间与客户互动，而 70-80% 的时间用于研究、准备和文书工作。这代表了通过
    AI 实现转型的巨大机会。
- en: Scaling a successful relationship management GenAI copilot
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规模化成功的客户关系管理 GenAI 协同助手
- en: GenAI copilots are transforming how relationship managers work, allowing them
    to bring in and manage more clients without compromising (and often improving)
    the quality of service. The GenAI copilot sits on the relationship manager’s desktop,
    tunes in to client calls, and leverages the bank’s vast data repositories from
    a wide variety of sources to provide hyper-personalized real-time recommendations,
    next-step actions, and upsell opportunities.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI 协同助手正在改变关系经理的工作方式，使他们能够在不降低（有时甚至提高）服务质量的情况下吸引和管理更多客户。GenAI 协同助手位于关系经理的桌面，监听客户通话，并利用来自各种来源的银行大量数据存储库，提供高度个性化的实时推荐、下一步行动和增值机会。
- en: For example, a GenAI copilot powered by advanced AI solutions such as MongoDB
    and Iguazio—an AI platform company acquired by QuantumBlack, AI by McKinsey—helps
    relationship managers identify investments aligned with a client’s portfolio.
    The copilot also proactively shares relevant research, conducts sentiment analysis
    based on the client’s wording, tone of voice, and context, determines and classifies
    intent to identify potential opportunities, and even highlights relevant life
    events that trigger recommendations for additional banking products (such as opening
    a new student account for the client’s child, based on the fact that they’ve just
    turned 18).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，由 MongoDB 和 Iguazio 等先进 AI 解决方案驱动的 GenAI 协同助手——Iguazio 是一家被 QuantumBlack
    收购的 AI 平台公司，QuantumBlack 是麦肯锡的 AI 部门——帮助关系经理识别与客户投资组合相一致的投资。协同助手还会主动分享相关研究，根据客户的措辞、语调和语境进行情感分析，确定并分类意图以识别潜在机会，甚至突出相关的生命事件，从而触发对额外银行产品的推荐（例如，根据客户的孩子刚刚满18岁的事实，为客户的孩子开设新的学生账户）。
- en: '![](img/B34136_13_01.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_13_01.png)'
- en: 'Figure 13.1: Real-time GenAI copilot workflow: from voice detection to automated
    follow-up'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.1：实时 GenAI 协同助手工作流程：从语音检测到自动跟进
- en: 'This flowchart demonstrates the end-to-end operational workflow of a banking
    relationship manager GenAI copilot during live client interactions. The process
    begins with audio source detection using **voice activity detection** (**VAD**),
    followed by real-time transcription via Whisper technology. The system then analyzes
    sentiment and classifies client intent using LLM-powered **natural language processing**
    (**NLP**). Based on this analysis, the copilot accesses multiple data sources,
    including past investments, bank documentation, research databases, and investment
    clustering algorithms, to generate three types of intelligent recommendations:
    upsell opportunities using LLM and **retrieval-augmented generation** (**RAG**),
    personalized investment suggestions through RAG and clustering, and relevant research
    papers via LLM and RAG. This workflow illustrates how AI orchestrates complex
    data processing and decision-making in real time to enhance relationship manager
    effectiveness.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 此流程图展示了银行关系经理 GenAI 协同助手在实时客户互动中的端到端操作工作流程。该过程从使用**语音活动检测**（**VAD**）进行音频源检测开始，然后通过
    Whisper 技术进行实时转录。然后，系统通过使用基于 LLM 的**自然语言处理**（**NLP**）分析情感并分类客户意图。基于此分析，协同助手访问多个数据源，包括过去的投资、银行文件、研究数据库和投资聚类算法，以生成三种类型的智能推荐：使用
    LLM 和**检索增强生成**（**RAG**）的增值机会，通过 RAG 和聚类提供的个性化投资建议，以及通过 LLM 和 RAG 的相关研究论文。此工作流程说明了
    AI 如何在实时中协调复杂的数据处理和决策，以增强关系经理的有效性。
- en: All these insights are presented to the relationship manager, who can decide
    whether or not to share them with the client in real time. After the call, the
    copilot automatically generates a personalized email summarizing the call, along
    with any additional documents needed based on the discussion that was held, enabling
    the relationship manager to simply check, edit, and send the documents with the
    click of a button.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些洞察都呈现给关系经理，他们可以实时决定是否与客户分享。通话结束后，协同助手自动生成一封个性化的电子邮件总结通话内容，以及根据讨论所需的任何额外文件，使关系经理能够简单地检查、编辑并通过点击按钮发送文件。
- en: By automatically providing these insights to relationship managers, the GenAI
    copilot frees the manager from preparation time, allowing them to allocate more
    of their day to value-generating interactions with clients. Based on our work
    with clients, we observed that the numbers can shift dramatically, going from
    20–30% of their time spent with clients to over 70%. The result is a potential
    uplift of 10–25% in revenue per relationship manager and an increase of 5–15%
    in active customers managed.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动将这些洞察提供给关系经理，GenAI 协同助手释放了经理的准备时间，使他们能够将更多时间分配给与客户的增值互动。根据我们与客户合作的经验，我们发现这些数字可以发生显著变化，从与客户相处时间的
    20-30% 提高到超过 70%。结果是每位关系经理的潜在收入提升 10-25%，以及管理的活跃客户增加 5-15%。
- en: How the relationship management GenAI copilot works under the hood
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关系管理 GenAI 协同助手在内部是如何工作的
- en: The GenAI copilot application operates by drawing on a wide range of the bank’s
    data sources, including structured databases such as MongoDB Atlas as a unified
    data platform, containing historical and real-time data. It continuously ingests
    internal and external data from call recordings, past interactions across emails,
    chats, and texts, social media activity, public news, and the client’s portfolio
    and transaction history to build and maintain a dynamic customer profile.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI 协同助手的应用程序通过利用银行的各种数据源来运行，包括 MongoDB Atlas 这样的结构化数据库作为统一的数据平台，其中包含历史和实时数据。它持续从通话录音、过去的电子邮件、聊天和短信互动、社交媒体活动、公开新闻、客户的投资组合和交易历史中摄取内部和外部数据，以构建和维护动态的客户档案。
- en: The bank’s knowledge base, accumulated over time, includes details such as family
    status, life events, sentiment history, loan and credit activity, risk profile,
    and shopping preferences, which are integrated from internal and external data
    sources and interactions. Banking-specific data, such as product information,
    policies, and operational systems, is also integrated.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 银行的知识库随着时间的积累，包括家庭状况、生活事件、情感历史、贷款和信用活动、风险概况以及购物偏好等详细信息，这些信息来自内部和外部数据源以及互动。银行特定的数据，如产品信息、政策和运营系统，也被整合。
- en: '![](img/B34136_13_02.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_13_02.png)'
- en: 'Figure 13.2: AI-powered client intelligence architecture: from data sources
    to personalized banking experiences'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.2：AI 驱动的客户智能架构：从数据源到个性化的银行体验
- en: 'This diagram illustrates how GenAI copilots transform diverse data sources
    into intelligent client insights through a comprehensive profile-building system.
    On the left, multiple data streams, including call recordings, communications,
    social media, public news, and transaction history, feed into a centralized profile-building
    engine. The system creates rich knowledge bases encompassing family status, financial
    preferences, risk profiles, and behavioral patterns. These insights power event-driven
    applications that deliver four core AI capabilities: hyper-personalized communication
    across all channels, investment recommendations tailored to individual preferences
    and current products, research notes based on past interactions and market intelligence,
    and hands-free answers to client questions that relieve relationship managers
    from routine inquiries. This architecture demonstrates how modern banking AI systems
    unify structured and unstructured data to enable real-time, contextual client
    engagement at scale.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 本图展示了如何通过综合的档案构建系统，将GenAI副驾驶将多样化的数据源转化为智能客户洞察。在左侧，包括通话记录、通讯、社交媒体、公共新闻和交易历史在内的多个数据流输入到一个集中的档案构建引擎。该系统创建包含家庭状况、财务偏好、风险概况和行为模式在内的丰富知识库。这些洞察为事件驱动的应用提供四个核心AI能力：跨所有渠道的超个性化沟通、针对个人偏好和当前产品的投资建议、基于以往互动和市场情报的研究笔记，以及无需手动操作即可回答客户问题的解决方案，从而减轻关系经理的日常查询负担。这种架构展示了现代银行AI系统如何统一结构化和非结构化数据，以实现大规模的实时、情境化客户参与。
- en: All of this information flows into event-driven applications and real-time pipelines.
    This data is leveraged by the GenAI copilot in real time to recommend strategies
    to the human agent. The output for the relationship manager is hyper-personalized
    communication, customized investment ideas, relevant research notes, and answers
    to client queries.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些信息都流入事件驱动的应用和实时管道。这些数据由GenAI副驾驶实时利用，向人类代理推荐策略。为关系经理输出的结果是超个性化的沟通、定制化的投资想法、相关的研硏笔记以及客户查询的答案。
- en: The AI workflows that support this architecture are designed to process the
    voice from client calls in real time with AI, provide relationship managers with
    insights and suggestions, and automate follow-ups based on the conversation taking
    place in real time.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 支持此架构的AI工作流程旨在实时使用AI处理客户通话中的语音，为关系经理提供洞察和建议，并根据实时进行的对话自动进行跟进。
- en: What does it take to productize AI applications such as the GenAI copilot for
    relationship managers? This is where the GenAI factory comes in.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 要将AI应用，如面向关系经理的GenAI副驾驶产品化，需要哪些条件？这正是GenAI工厂发挥作用的地方。
- en: 'GenAI factory: Powering copilots, agents, and GenAI apps'
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GenAI工厂：为副驾驶、代理和GenAI应用提供动力
- en: 'An AI architecture that supports the use of the copilot at scale is based on
    four pipelines:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 支持大规模使用副驾驶的AI架构基于四个管道：
- en: Data pipelines for processing the raw data (eliminating risks, improving quality,
    encoding, and so on).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据管道用于处理原始数据（消除风险、提高质量、编码等）。
- en: Application pipelines for processing incoming requests, enriching with data
    from MongoDB’s unified data platform supporting structured, unstructured, and
    vector data, running the agent logic, and applying various guardrails and monitoring
    tasks.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用管道用于处理传入的请求，利用MongoDB统一数据平台支持的结构化、非结构化和向量数据进行丰富，运行代理逻辑，并应用各种安全线和监控任务。
- en: Development and CI/CD pipelines for fine-tuning and validating models, testing
    the application to detect accuracy risk challenges, and automatically deploying
    the application.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发和CI/CD管道用于微调和验证模型，测试应用以检测准确性风险挑战，并自动部署应用。
- en: A governance and monitoring system for collecting application and data telemetry
    to identify resource usage, application performance, risks, and so on. The monitoring
    data can be used to further improve the application performance.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个治理和监控系统，用于收集应用程序和数据遥测数据，以识别资源使用、应用程序性能、风险等。监控数据可用于进一步改进应用程序性能。
- en: '![A computer screen shot of a diagram  AI-generated content may be incorrect.](img/B34136_13_03.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![一张计算机屏幕截图，显示了一个图表 AI生成的内容可能不正确。](img/B34136_13_03.png)'
- en: 'Figure 13.3: Iguazio and MongoDB’s integrated AI factory architecture for production-scale
    GenAI applications'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.3：Iguazio和MongoDB为生产规模GenAI应用集成的AI工厂架构
- en: 'This comprehensive architecture diagram illustrates how Iguazio’s AI factory
    platform integrates with MongoDB to deliver enterprise-grade GenAI applications
    at scale. The system encompasses four critical operational layers: **data pipelines**
    that transform raw data sources through Iguazio’s processing capabilities into
    MongoDB’s unified data platform that handles user features, structured data, and
    vector embeddings within a single system; **application pipelines** featuring
    stateful classification and orchestration with security controls, Q&A chains for
    entity extraction and document retrieval, and structured question chains powered
    by AI agents; an **ML and CI/CD pipeline** providing automated tuning, validation,
    and deployment through Git and Iguazio workflows; and comprehensive **monitoring
    and feedback** systems with real-time validation and alert capabilities. The architecture
    demonstrates how MongoDB’s converged data store approach eliminates the complexity
    of managing multiple database technologies by supporting structured, unstructured,
    and vector data types natively within one platform, while Iguazio orchestrates
    the complex AI workflows, session management, and response processing required
    for production financial services applications. This integrated approach enables
    the pipeline orchestration, scalability, and governance capabilities essential
    for **financial services industry** (**FSI**) compliance while maintaining the
    performance and reliability demanded by banking operations.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这张综合架构图说明了Iguazio的AI工厂平台如何与MongoDB集成，以大规模提供企业级通用人工智能（GenAI）应用。该系统包括四个关键的操作层：**数据管道**通过Iguazio的处理能力将原始数据源转换为MongoDB的统一数据平台，该平台在单一系统中处理用户特征、结构化数据和向量嵌入；**应用管道**具有具有状态分类和编排的安全控制、用于实体提取和文档检索的问答链，以及由AI代理驱动的结构化问题链；**机器学习和CI/CD管道**通过Git和Iguazio工作流程提供自动调整、验证和部署；以及全面的**监控和反馈**系统，具有实时验证和警报功能。该架构展示了MongoDB的融合数据存储方法如何通过在一个平台上原生支持结构化、非结构化和向量数据类型来消除管理多个数据库技术的复杂性，同时Iguazio协调生产金融服务应用所需的复杂AI工作流程、会话管理和响应处理。这种集成方法使管道编排、可扩展性和治理能力成为金融服务行业（FSI）合规性的必要条件，同时保持银行业务所要求的性能和可靠性。
- en: In addition, the AI factory should support both on-premises and hybrid implementations,
    and enable simple migration from one environment to the other, to address the
    financial sector’s stringent regulatory, data privacy, and security requirements
    and to enable flexibility in a very dynamic world. On-premises deployments offer
    full control over sensitive data and infrastructure, which is required for meeting
    compliance mandates such as GDPR or the EU AI Act. At the same time, hybrid models
    enable banks to leverage the scalability and innovation of cloud-based AI, while
    retaining sensitive workloads on-premises.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI工厂应支持本地和混合部署，并能够轻松地从一种环境迁移到另一种环境，以满足金融部门的严格监管、数据隐私和安全要求，并在一个非常动态的世界中提供灵活性。本地部署提供了对敏感数据和基础设施的完全控制，这对于满足GDPR或欧盟AI法案等合规性要求是必需的。同时，混合模型使银行能够利用基于云的AI的可扩展性和创新，同时保留敏感工作负载在本地。
- en: How the AI factory addresses FSI engineering needs
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI工厂如何解决FSI工程需求
- en: By implementing an AI factory, banks, insurance companies, and other financial
    institutions can benefit in a number of ways.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施AI工厂，银行、保险公司和其他金融机构可以以多种方式受益。
- en: 'One of the chief benefits is that users gain access to pipeline orchestration
    with minimal engineering. The factory simplifies the development and management
    of end-to-end robust and repeatable workflows across four pipelines: data, application,
    development, and LiveOps. This is done in a simple and resilient manner without
    requiring significant engineering efforts.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 其中最主要的好处是用户可以以最小的工程量获得管道编排的访问权限。工厂简化了跨四个管道（数据、应用、开发和LiveOps）的端到端稳健且可重复的工作流程的开发和管理。这是以简单和弹性的方式完成的，无需大量的工程努力。
- en: The AI factory also increases the options for scalable and rapid deployment.
    The factory enables building and deploying models at enterprise scale, across
    millions of banking customers, global regions, and teams, in a streamlined manner
    and without friction or cost inefficiencies on cloud, on-premises, or hybrid environments.
    By combining with databases such as MongoDB, for example, large volumes of data
    and complex data transformations can be handled with ease, while maintaining high
    levels of performance and ensuring reliability and accuracy.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: AI工厂还增加了可扩展和快速部署的选项。工厂使企业规模、数百万银行客户、全球地区和团队以简化和无摩擦的方式构建和部署模型，无论是在云上、本地还是混合环境中，都不会产生成本效率低下的问题。例如，与MongoDB等数据库结合使用，可以轻松处理大量数据和复杂的数据转换，同时保持高性能并确保可靠性和准确性。
- en: Unification of data from multiple sources also becomes more viable. GenAI applications
    involve multiple types of data, such as geospatial, graphs, tables, and vectors.
    Each data type requires considerations such as security, scalability, and metadata
    management. This creates data management complexity. An AI factory combined with
    MongoDB’s unified platform can handle all data types, structured, unstructured,
    and vector data, in a single solution. This ensures consistency, faster performance,
    and significantly less overhead.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 来自多个来源的数据统一也变得更加可行。GenAI应用涉及多种类型的数据，例如地理空间数据、图、表格和向量。每种数据类型都需要考虑诸如安全性、可扩展性和元数据管理等问题。这创造了数据管理的复杂性。结合MongoDB的统一平台，AI工厂可以处理所有数据类型，包括结构化、非结构化和向量数据，在一个解决方案中。这确保了一致性、更快的性能和显著减少的额外开销。
- en: The versatility of the factories is also a huge benefit. Once built, the factory
    can be adapted to multiple use cases without the overhead or challenges of rebuilding.
    If any changes are needed, the architecture is modular, and components can be
    easily swapped or replaced without having to re-architect entirely.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 工厂的通用性也是一个巨大的好处。一旦构建，工厂可以适应多个用例，而无需重建的额外开销或挑战。如果需要任何更改，架构是模块化的，组件可以轻松交换或替换，而无需完全重新设计。
- en: GPU and compute optimization become easier to manage. With compute, and especially
    GPUs, becoming costly and hard to come by, the factory ensures efficient allocation,
    sharing, and auto-scaling of compute resources, including distribution and parallelism.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: GPU和计算优化变得更容易管理。随着计算（尤其是GPU）变得昂贵且难以获得，工厂确保计算资源的有效分配、共享和自动扩展，包括分布和并行性。
- en: MLOps orchestration is improved because an AI factory helps move models and
    AI applications from prototype to production rapidly, securely, and reliably.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: MLOps编排得到改善，因为AI工厂有助于快速、安全、可靠地将模型和AI应用从原型转移到生产。
- en: The factory helps performance and output integrity by mitigating business and
    ethical risks such as hallucinations, bias, toxicity, and inaccurate outputs,
    ensuring high performance, accuracy, and reliability. This is done by introducing
    central management and governance for the entire AI lifecycle, including guardrails
    embedded throughout the entire development, training, and deployment process.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 工厂通过缓解业务和伦理风险（如幻觉、偏见、毒性和不准确输出）来帮助保证性能和输出完整性，确保高性能、准确性和可靠性。这是通过引入整个AI生命周期的中央管理和治理，包括在整个开发、培训和部署过程中的嵌入式护栏来实现的。
- en: '**Hallucination guardrails**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**幻觉护栏**'
- en: Protecting against hallucinations, for example, can take place as early as the
    data pipeline. This requires a RAG workflow and MongoDB’s unified data platform.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，防止幻觉可以在数据管道的早期阶段进行。这需要RAG工作流程和MongoDB的统一数据平台。
- en: Structured and reliable data (such as product manuals, FAQs, pricing policies,
    customer data, etc.) is converted to embeddings and stored in MongoDB. When a
    user prompts a query, the relevant record is retrieved from the database and structured
    as natural text. This ensures the response is grounded in real facts, minimizing
    hallucinations.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化和可靠的数据（如产品手册、常见问题解答、定价政策、客户数据等）被转换为嵌入并存储在MongoDB中。当用户提出查询时，相关的记录从数据库中检索出来，并以自然文本的形式结构化。这确保了响应基于真实事实，最大限度地减少幻觉。
- en: AI factories improve compliance, privacy, and security by enforcing guardrails
    for secure model access, explainability, logging for audit, alignment with GDPR
    and **Financial Industry Regulatory Authority** (**FINRA**) regulations, and fairness.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: AI工厂通过实施安全模型访问的护栏、可解释性、审计日志记录、与GDPR和**金融行业监管局**（**FINRA**）法规的一致性以及公平性，来提高合规性、隐私性和安全性。
- en: Many banking systems still run on legacy stacks. AI factories improve integration
    between new and legacy systems by abstracting complexity through API bridges,
    wrappers, or fine-tuned connectors, easily and seamlessly.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 许多银行系统仍在使用遗留堆栈。AI工厂通过API桥接、包装或微调的连接器抽象化复杂性，从而简化新旧系统之间的集成，易于且无缝。
- en: Even after successful proofs of concept, most enterprises still fail to scale
    AI and create real business impact. The AI factory helps ensure production-grade
    delivery and management, so that enterprises see actual ROI.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在概念验证成功之后，大多数企业仍然未能扩大人工智能的规模并创造真正的商业影响。AI工厂有助于确保生产级交付和管理，从而使企业看到实际的回报率。
- en: An AI factory is a future-proof infrastructure with modularity and scalability
    that can be adapted to any AI operationalization need, such as AI agents.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: AI工厂是一个具有模块化和可扩展性的未来保障型基础设施，可以适应任何人工智能运营需求，例如AI代理。
- en: Agents are autonomous AI systems that can perceive their environment, make decisions,
    and take actions toward a specific goal. Rather than following specific tasks,
    they can follow a set of objectives, adapt to changing inputs, and operate independently
    or alongside human teams. This helps speed up decision-making, enhance the customer
    experience, and improve operational resilience across the financial services value
    chain.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 代理是自主的人工智能系统，能够感知其环境，做出决策，并采取行动以实现特定目标。它们不仅遵循特定任务，还可以遵循一系列目标，适应不断变化的数据输入，独立或与人类团队协作操作。这有助于加快决策速度，提升客户体验，并提高金融服务价值链的运营弹性。
- en: For financial services, AI agents can automate complex workflows, serve as always-on
    financial assistants, continuously monitor transactions and flag fraud, suggest
    investment strategies, personalize financial advisory, and more.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对于金融服务，AI代理可以自动化复杂的工作流程，作为始终在线的财务助手，持续监控交易并标记欺诈，提出投资策略，个性化财务咨询，等等。
- en: Leading FSI use cases where GenAI brings real value
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领先的金融服务用例，其中生成式人工智能带来了真正的价值
- en: 'The value of GenAI for private banks and financial institutions goes beyond
    relationship management. It can also be extended to use cases such as the following:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能对私人银行和金融机构的价值不仅限于关系管理。它还可以扩展到以下用例：
- en: '**Smart call center analysis**: Using AI to transcribe, summarize, and analyze
    support calls in real time to identify sentiment, product pain points, and upsell
    opportunities, and to feed information to downstream applications for strategic
    insights'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能呼叫中心分析**：使用人工智能实时转录、总结和分析支持电话，以识别情绪、产品痛点以及交叉销售机会，并将信息反馈给下游应用程序以获得战略洞察'
- en: '**Virtual agent support**: Deploying AI-powered agents to handle routine queries,
    freeing up human agents for complex cases'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚拟代理支持**：部署人工智能代理来处理常规查询，释放人类代理处理复杂案例'
- en: '**Hyper-personalized product recommendations**: Combining behavioral data with
    customer information to recommend tailored credit cards, loans, or investment
    products'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超个性化产品推荐**：结合行为数据与客户信息，推荐定制的信用卡、贷款或投资产品'
- en: '**Fraud prediction and anomaly detection**: Detecting suspicious transaction
    patterns in real time, improving response times'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈预测和异常检测**：实时检测可疑的交易模式，提高响应时间'
- en: Let’s look at an example in detail.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细看看一个例子。
- en: 'Case study: A GenAI-driven smart call center analysis application'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究：一个由生成式人工智能驱动的智能呼叫中心分析应用程序
- en: A large successful European bank built a GenAI call center analysis app to improve
    call center operations, simplify agent training, improve customer experience,
    and reduce costs. The GenAI application, deployed on-premises, summarized customer
    calls, analyzed sentiment and topics, and removed **personally identifiable information**
    (**PII**). The data was fed to downstream applications, such as live agent support,
    customer profiles, auto-generated content, tailored recommendations, customized
    offers, and so on.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一家大型成功的欧洲银行构建了一个生成式人工智能呼叫中心分析应用程序，以改善呼叫中心运营，简化代理培训，提升客户体验，并降低成本。该生成式人工智能应用程序在本地部署，总结了客户通话，分析了情绪和主题，并移除了**个人身份信息**（**PII**）。数据被输送到下游应用程序，如实时代理支持、客户档案、自动生成的内容、定制推荐、定制优惠等。
- en: This resulted in 2x improvement in runtime, 60x faster call diarization, and
    3x improvement in GPU utilization. Such agents can also access the MongoDB data
    platform to extract information that can assist with information retrieval and
    use.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了运行时间提高了2倍，呼叫日记化速度提高了60倍，GPU利用率提高了3倍。这样的代理还可以访问MongoDB数据平台，提取有助于信息检索和使用的相关信息。
- en: What now? How enterprises can succeed with GenAI
  id: totrans-75
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 接下来是什么？企业如何利用GenAI取得成功
- en: Success with GenAI solutions isn’t just about implementing the right technology.
    Rather, it hinges on engagement with people, securing C-suite alignment, building
    the right processes, and introducing governance strategies. Integrating GenAI
    into relationship manager workflows, or any other department, in a cooperative
    manner is foundational to its success, while driving success for the company and
    the individual employee as well.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI解决方案的成功不仅仅在于实施正确的技术。相反，它取决于与人们的互动、确保高管层的一致性、建立正确的流程和引入治理策略。以合作的方式将GenAI集成到关系经理的工作流程中，或任何其他部门，是其成功的基础，同时也为公司和个人员工的成功驱动。
- en: 'Therefore, it’s recommended to implement the following practices across people,
    processes, and technology:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，建议在人员、流程和技术方面实施以下实践：
- en: '**Strategic infrastructure planning**: Developing a tailored deployment strategy
    across the cloud, on-premises, or hybrid, guided by regulatory, compliance, and
    resource needs. The data infrastructure should be designed to leverage existing
    systems while ensuring smooth integration into existing processes.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略基础设施规划**: 根据监管、合规性和资源需求，制定针对云、本地或混合部署的定制部署策略。数据基础设施应设计为利用现有系统，同时确保与现有流程的顺利集成。'
- en: '**Robust governance and regulatory alignment**: Embedding internal policies
    and aligning with regulations such as the EU AI Act, to accelerate progress and
    minimize risks.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强大的治理和监管一致性**: 内嵌内部政策并与欧盟AI法案等法规保持一致，以加速进步并最小化风险。'
- en: '**Driving adoption among users**: Engaging top-performing relationship managers
    in shaping the tool’s functionality and user experience. This ensures and drives
    a sense of ownership. It includes highlighting the potential to enhance insights,
    upskill professional capabilities, improve productivity, and boost revenue, and
    piloting with high performers to generate quick wins, build credibility, and spark
    peer-driven momentum across the organization.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推动用户接受度**: 吸引表现优异的关系经理参与塑造工具的功能和用户体验。这确保并推动了一种所有权感。它包括突出提升洞察力、提升专业技能、提高生产力和增加收入的潜力，并通过与高绩效者合作进行试点，以产生快速胜利、建立信誉并激发组织内的同伴驱动力。'
- en: By anchoring GenAI solutions such as copilots in their digital strategy, banks
    can transform customer relationships and position themselves for sustainable,
    revenue-driving growth in an increasingly competitive and volatile landscape.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将GenAI解决方案如共飞行员锚定在其数字战略中，银行可以转型客户关系，并在日益竞争和动荡的格局中为可持续的、收入驱动的增长定位自己。
- en: Summary
  id: totrans-82
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The transformation of wealth management through GenAI copilots represents a
    fundamental shift from the impossible catch-22 of scaling personalized service
    to an AI-powered solution that enhances both efficiency and client experience.
    With relationship managers currently spending more than half of their time on
    research and paperwork rather than client interaction, GenAI copilots offer a
    clear path to flip this ratio, enabling managers to focus on value-generating
    activities while AI handles data processing, sentiment analysis, and administrative
    tasks.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通过GenAI共飞行员实现的财富管理转型代表了从无法实现的个人服务规模化的二难困境到一个增强效率和客户体验的AI解决方案的根本转变。由于关系经理目前将超过一半的时间花在研究和文书工作上，而不是与客户互动，GenAI共飞行员提供了一条清晰的路径来翻转这一比例，使管理者能够专注于价值创造活动，而AI则处理数据处理、情感分析和行政任务。
- en: The technical foundation for this transformation requires a comprehensive AI
    factory approach, encompassing data pipelines, application orchestration, development
    workflows, and governance frameworks. MongoDB’s unified data platform enables
    the real-time processing of structured and unstructured data necessary for contextual
    AI responses, while built-in guardrails ensure compliance with financial services
    regulations and protect against hallucinations. Real-world implementations have
    demonstrated significant business impact, with potential revenue uplifts of 10–25%
    per relationship manager and increases of 5–15% in active customers managed, alongside
    operational improvements such as 2x runtime improvements and 60x faster call processing.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这次转型的技术基础需要一种全面的AI工厂方法，包括数据管道、应用编排、开发工作流程和治理框架。MongoDB的统一数据平台能够实现结构化和非结构化数据的实时处理，这对于实现上下文AI响应至关重要，而内置的护栏则确保符合金融服务法规，并防止幻觉。现实世界的实施已经证明了显著的商业影响，每位关系经理的潜在收入提升可达10-25%，管理的活跃客户数量增加5-15%，同时还有如运行时改进2倍和呼叫处理速度提高60倍等运营改进。
- en: The next chapter explores how to deliver business value with AI in insurance,
    examining the strategic integration of AI within the insurance sector to drive
    meaningful business outcomes. Moving beyond banking applications, it demonstrates
    how to architect AI-augmented application workflows that align with insurance
    business objectives, covering the evolution of data architectures and the practical
    applications of AI across underwriting, claims processing, and customer experience
    to transform insurance operations.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将探讨如何在保险业中利用AI创造商业价值，研究AI在保险行业中的战略整合，以推动有意义的商业成果。超越银行应用，它展示了如何构建与保险业务目标一致的AI增强型应用工作流程，涵盖了数据架构的演变以及AI在承保、理赔处理和客户体验方面的实际应用，以转型保险运营。
