  type: TYPE_NORMAL
  zh: 在这种激进的交易策略中，我们正在购买Beazley和Hiscox的看涨期权，这表明我们对这些保险公司持看涨态度。同时，我们在CrowdStrike出售看跌期权，表达了一种更为谨慎的观点。这种策略旨在利用网络保险预期的增长，结合CrowdStrike可能的估值过高：
