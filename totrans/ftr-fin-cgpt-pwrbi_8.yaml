  zh: 仪表板概览：
- en: '**Time series plot**: A line chart displaying the price movement of Beazley,
    Hiscox, and CrowdStrike options. Use different line colors for calls and puts
    to easily distinguish.'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间序列图**：显示Beazley、Hiscox和CrowdStrike期权价格走势的折线图。使用不同的线条颜色来区分看涨和看跌期权。'
- en: '**Open positions table**: A table showing current positions, including strike
    price, expiration date, number of contracts, and current value.'
  id: totrans-138
  prefs:
  - PREF_IND
