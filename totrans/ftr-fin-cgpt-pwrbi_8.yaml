  type: TYPE_NORMAL
  zh: 保守交易：在下跌5%后购买Beazley、Hiscox和CrowdStrike的股票
- en: We shift gears to explore Power BI visualizations geared toward a more conservative
    trading approach, specifically focusing on buying stocks in Beazley, Hiscox, and
    CrowdStrike after a 5% price drop. This tailored guide unfolds in three main segments.
    First up is the dashboard overview, which presents a time series plot to trace
    stock price movements, an open positions table to track your current holdings,
    and a status card for your limit orders, ensuring you have all the essential information
    at your fingertips. Second, we’ll walk you through setting up alerts, such as
    one that triggers when CrowdStrike’s stock price is within 5% of your target,
    enabling timely action.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们转换方向，探索针对更保守交易方法的Power BI可视化，特别是关注在股价下跌5%后购买Beazley、Hiscox和CrowdStrike的股票。这个定制指南分为三个主要部分。首先是仪表板概览，它展示了追踪股价走势的时间序列图、一个跟踪您当前持仓的开放职位表，以及一个跟踪您的限价订单的状态卡，确保您手头有所有必要的信息。其次，我们将向您介绍设置警报，例如当CrowdStrike的股价接近您的目标价5%时触发的警报，以便及时采取行动。
- en: 'Finally, we integrate ChatGPT, as for the aggressive trade, for interactive,
    real-time insights:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将集成 ChatGPT，针对积极交易，以实现交互式、实时的见解：
- en: 'Dashboard overview:'
  id: totrans-148
