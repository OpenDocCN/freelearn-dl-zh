  zh: 激进交易（使用期权）- 在Beazley和Hiscox购买看涨期权，在CrowdStrike出售看跌期权
- en: 'In this aggressive trade strategy, we are buying call options on Beazley and
    Hiscox, indicating that we are bullish on these insurers. Simultaneously, we are
    selling put options on CrowdStrike, expressing a more cautious view. This strategy
    aims to leverage the expected growth in cyber insurance, coupled with a possible
    overvaluation of CrowdStrike:'
