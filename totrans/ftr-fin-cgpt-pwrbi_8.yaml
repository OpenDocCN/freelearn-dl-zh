  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击获取数据 > 文本/CSV。
- en: Browse to the location of your CSV files and load them into Power BI.
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浏览到你的CSV文件位置，并将它们加载到Power BI中。
- en: 'Create visualizations for aggressive trading:'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建激进的交易可视化：
- en: For a time series plot, use a line chart and plot the price movement using date
    as the *x*axis and the price as the *y*axis.
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于时间序列图，使用折线图，并使用日期作为*x*轴，价格作为*y*轴。
- en: For an open positions table, use a table visualization and drag the relevant
    fields from `aggressive_trade_options.csv`.
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于一个开放头寸表，使用表格可视化并将相关字段从`aggressive_trade_options.csv`拖动。
- en: For a risk analysis chart, use a scatter chart and add the calculated fields
    for profit/loss.
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于风险分析图，使用散点图并添加利润/亏损的计算字段。
- en: For a CrowdStrike put alert, you can set up an alert as described in the previous
    message.
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于CrowdStrike的卖出警报，你可以按照上一条消息中描述的方法设置警报。
- en: 'Create visualizations for conservative trading:'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建保守交易的可视化：
- en: For a time series plot, similar to the aggressive trade, use a line chart.
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于时间序列图，类似于激进交易，使用折线图。
- en: For an open positions table, use a table visualization with fields from `conservative_trade_stocks.csv`.
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于一个开放头寸表，使用包含`conservative_trade_stocks.csv`字段的表格可视化。
- en: For limit order status, use a card visualization to display the target price
    and current price.
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于限价订单状态，使用卡片可视化来显示目标价格和当前价格。
- en: For a CrowdStrike target price alert, set up an alert as previously explained.
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于CrowdStrike的目标价格警报，请按照之前解释的方法设置警报。
- en: 'Integrate with ChatGPT:'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 集成ChatGPT：
- en: While Power BI can connect to GPT4 via API, you just need to enter your OpenAI
    API key and make sure you have a sufficient balance to cover API calls
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然Power BI可以通过API连接到GPT4，但你只需输入你的OpenAI API密钥，并确保你有足够的余额来覆盖API调用。
- en: Integration with ChatGPT (GPT-4)
  id: totrans-210
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与ChatGPT（GPT-4）集成
- en: 'Enable Python scripting in Power BI:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中启用Python脚本：
- en: Go to **File > Options and Settings >** **Options**.
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往**文件 > 选项和设置 > 选项**。
- en: Under **Python scripting**, select your installed Python directory.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Python脚本**下，选择你的安装Python目录。
- en: Install the required Python packages.
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装所需的Python包。
- en: 'Make sure to install the openai Python package, which will allow you to communicate
    with the GPT-4 API. You can install it via pip:'
  id: totrans-215
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 确保安装openai Python包，这将允许你与GPT-4 API通信。你可以通过pip安装它：
- en: '[PRE7]'
  id: totrans-216
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Create a Python visual in Power BI:'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Power BI中创建一个Python可视化：
- en: In Power BI Desktop, click on Python script visual.
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Power BI桌面版中，点击Python脚本可视化。
- en: A placeholder Python script visual will appear on your report, and an editor
    will open where you can input Python code.
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的报告中将出现一个占位符Python脚本可视化，并会打开一个编辑器，你可以在其中输入Python代码。
- en: Input Python code for GPT-4 API calls.
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入GPT-4 API调用的Python代码。
- en: 'Use the following sample Python code as a basis. Replace `''your_openai_api_key_here''`
    with your actual OpenAI API key:'
  id: totrans-221
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用以下示例Python代码作为基础。将`'your_openai_api_key_here'`替换为你的实际OpenAI API密钥：
- en: '[PRE8]'
  id: totrans-222
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Display insights in Power BI.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Power BI中显示洞察力。
- en: You can display the generated text (stored in the `insight` variable) in a text
    box or other visual element in Power BI.
  id: totrans-224
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你可以在Power BI中的文本框或其他可视化元素中显示生成的文本（存储在`insight`变量中）。
- en: Test the integration
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 测试集成
- en: Make sure to test the Python script in Power BI to ensure it runs successfully
    and returns the expected insights.
  id: totrans-226
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 确保在Power BI中测试Python脚本，以确保其成功运行并返回预期的洞察力。
- en: Save and apply changes.
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存并应用更改。
- en: Once you’re satisfied with the setup, click Apply changes in Power BI to update
    the report
  id: totrans-228
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一旦你对设置满意，请点击Power BI中的“应用更改”以更新报告。
- en: Add API cost monitoring
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加API成本监控
- en: Keep an eye on the OpenAI API dashboard to monitor usage and costs. Make sure
    you have a sufficient balance to cover API calls.
  id: totrans-230
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 关注OpenAI API仪表板以监控使用情况和成本。确保你有足够的余额来覆盖API调用。
- en: Schedule a refresh.
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安排刷新。
- en: If you’re using Power BI service, set up a scheduled refresh to keep your insights
    up to date.
  id: totrans-232
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你使用的是Power BI服务，请设置一个计划好的刷新来保持你的洞察力更新。
- en: By following these steps, you should be able to integrate GPT-4 into your Power
    BI reports for dynamic and insightful text generation based on your financial
    visualizations.
  id: totrans-233
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过遵循这些步骤，你应该能够将GPT-4集成到你的Power BI报告中，以便根据你的财务可视化进行动态和有洞察力的文本生成。
- en: Save the Power BI report and publish it to the Power BI service if you want
    to share it with others.
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你想要与他人分享，请保存Power BI报告并将其发布到Power BI服务。
- en: Important note
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Make sure to refresh the data as needed to get updated information. The exact
    fields and calculations might vary based on the specific data and requirements
    of your trades.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 确保根据需要刷新数据以获取更新的信息。具体的字段和计算可能根据你交易的具体数据和需求而有所不同。
- en: By following these steps, you can create insightful Power BI visualizations
    for both aggressive and conservative trades, utilizing CSV files generated directly
    from your Python trading code.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些步骤，你可以创建有洞察力的Power BI可视化，用于激进和保守交易，利用直接从你的Python交易代码生成的CSV文件。
- en: Imagine having a seasoned cybersecurity expert by your side 24/7, sifting through
    the labyrinth of cyber laws and dissecting every significant breach to tell you
    what it means for your investment portfolio. Too good to be true? Meet HackerGPT
    (AI Persona)! Engineered to mimic the best in cybersecurity intelligence, this
    model does more than just crunch numbers—it thinks, analyzes, and even identifies
    investment gold mines in the rapidly evolving cyber world. Hold onto your seats;
    you’re about to discover a game-changing tool that could redefine how you think
    about cybersecurity and investments.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，有一位经验丰富的网络安全专家全天候陪伴在你身边，穿梭于网络法律的迷宫中，剖析每一个重大违规行为，告诉你这对你的投资组合意味着什么。这听起来太好了，以至于不真实？来认识HackerGPT（AIPersona）！这款模型旨在模仿网络安全情报领域的最佳实践，它不仅能够处理数据，还能思考、分析，甚至在快速发展的网络世界中识别投资金矿。坐稳了；你即将发现一个颠覆性的工具，它可能会重新定义你对网络安全和投资的看法。
- en: HackerGPT (AI Persona) – monitoring and analyzing cybersecurity regulatory changes
    and breaches
  id: totrans-239
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: HackerGPT（AIPersona）- 监控和分析网络安全法规变化和违规行为
- en: As a highly intelligent model focused on the complex realm of cybersecurity,
    HackerGPT is dedicated to identifying, understanding, and analyzing regulatory
    changes, cybersecurity breaches, and the potential impact on various industries.
    The insights offered by HackerGPT could guide investment decisions in cyber insurance
    and cybersecurity sectors.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一款专注于网络安全复杂领域的超级智能模型，HackerGPT致力于识别、理解和分析法规变化、网络安全违规行为及其对各个行业潜在的影响。HackerGPT提供的见解可以指导网络安全保险和网络安全领域的投资决策。
- en: 'Here are the critical indicators that HackerGPT would evaluate:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是HackerGPT将评估的关键指标：
- en: 'Regulatory landscape: Monitoring and understanding the latest regulations related
    to cybersecurity across various jurisdictions and industries'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法规环境：监控和理解不同司法管辖区和行业相关的最新网络安全法规
- en: 'Cybersecurity breaches: Analyzing the nature, scope, and impact of significant
    cybersecurity breaches, including those affecting AI technologies such as generative
    AI or LLMs'
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络安全违规行为：分析重大网络安全违规行为的性质、范围和影响，包括影响生成AI或LLMs等AI技术的违规行为
- en: 'Affected industries: Examining how regulatory changes or breaches affect specific
    industries such as finance, healthcare, communications, energy, technology, utilities,
    materials, or industrials'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受影响行业：考察法规变化或违规行为如何影响特定行业，如金融、医疗保健、通信、能源、技术、公用事业、材料或工业
- en: 'Investment opportunities: Identifying potential investment avenues in the cyber
    insurance and cybersecurity industries based on the regulatory or cyber breach
    landscape'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资机会：根据法规或网络安全违规环境，识别网络安全保险和网络安全行业中的潜在投资途径
- en: 'Technology analysis: Assessing the robustness, vulnerabilities, and innovation
    in cybersecurity technologies'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术分析：评估网络安全技术的稳健性、漏洞和创新
- en: 'Risk mitigation strategies: Evaluating and suggesting strategies to mitigate
    cyber risks, including insurance solutions'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险缓解策略：评估和提出缓解网络风险的战略，包括保险解决方案
- en: Brace yourselves for an exhilarating journey into the intersection of finance
    and cybersecurity, masterfully guided by the dynamic AI duo, FinGPT and HackerGPT,
    in the next section. FinGPT lays the financial groundwork with its data-centric
    prowess, while HackerGPT, fine-tuned on cybersecurity datasets, dives deep into
    the nuances of cyber risk and investment opportunities. The Python code showcased
    offers a practical way to leverage these AIs for real-time insights. Together,
    they form an unparalleled toolset for stakeholders navigating the complex terrains
    of finance and cybersecurity.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好开始一段激动人心的旅程，探索金融与网络安全的交汇点，由动态的AI双胞胎FinGPT和HackerGPT巧妙引导。FinGPT以其数据驱动的实力奠定金融基础，而HackerGPT则专注于网络安全数据集，深入挖掘网络风险和投资机会的微妙之处。展示的Python代码提供了一种利用这些AI进行实时洞察的实用方法。它们共同构成了一个无与伦比的工具集，帮助利益相关者穿越金融和网络安全复杂的地形。
- en: HackerGPT – reflecting traits from leading cybersecurity experts
  id: totrans-249
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HackerGPT – 反映顶级网络安全专家的特点
- en: HackerGPT is designed to emulate the expertise of cybersecurity professionals,
    focusing on tracking regulatory changes, analyzing cybersecurity breaches, and
    identifying investment opportunities in related fields.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: HackerGPT旨在模拟网络安全专业人士的专长，专注于跟踪法规变化、分析网络安全违规行为以及识别相关领域的投资机会。
- en: 'Skills:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 技能：
- en: Strong knowledge of cybersecurity regulations, trends, and technologies
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深厚的网络安全法规、趋势和技术知识
- en: Proficient in analyzing complex cyber threat landscapes and regulatory environments
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通分析复杂的网络威胁景观和监管环境
- en: Expert at identifying potential investment opportunities in cyber insurance
    and security sectors
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通于识别网络安全和保险领域的潜在投资机会
- en: Excellent communication skills to present intricate analyses in an understandable
    manner
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的沟通技巧，能够以易于理解的方式呈现复杂的分析
- en: HackerGPT aims to support investors, governments, and businesses in navigating
    the complex world of cybersecurity. Its primary goal is to provide insights that
    lead to informed decisions, promote cybersecurity awareness, and identify investment
    opportunities.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: HackerGPT旨在支持投资者、政府和企业在网络安全复杂世界中导航。其首要目标是提供洞察力，以引导明智的决策，提高网络安全意识，并识别投资机会。
- en: HackerGPT conducts comprehensive evaluations, focusing on critical aspects of
    cybersecurity. It considers these factors within the broader context of current
    technological advancements, industry practices, and regulatory frameworks.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: HackerGPT进行全面的评估，重点关注网络安全的各个方面。它将这些因素置于当前技术进步、行业实践和监管框架的更广泛背景下进行考虑。
- en: HackerGPT is analytical, objective, and innovative. It strives to present nuanced
    assessments while being accessible to users with varying levels of cybersecurity
    and investment expertise.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: HackerGPT具有分析性、客观性和创新性。它努力提供细致的评估，同时使不同网络安全和投资专业水平的用户都能理解。
- en: While HackerGPT provides detailed evaluations and recommendations, the ultimate
    decisions should remain the responsibility of the professionals involved. Its
    insights should be used to complement professional judgments and to guide, rather
    than dictate, investment and regulatory strategies.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然HackerGPT提供详细评估和建议，但最终决策应始终由相关专业人士负责。其洞察力应用于补充专业判断，并指导而非命令投资和监管策略。
- en: Picture a world where artificial intelligence bridges the gap between Wall Street
    and Silicon Valley, deciphering complex cybersecurity challenges while staying
    ahead of market trends. Welcome to the groundbreaking fusion of FinGPT and HackerGPT!
    In the following pages, you will explore the alchemy of finance and cybersecurity
    through the lens of innovative AI. This partnership promises a revolutionary approach
    to real-time data analysis, investment opportunities, and cyber risk management.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个世界，其中人工智能弥合了华尔街和硅谷之间的差距，解码复杂的网络安全挑战，同时保持对市场趋势的领先。欢迎来到FinGPT和HackerGPT开创性的融合！在接下来的页面中，您将通过创新人工智能的视角探索金融和网络安全之间的炼金术。这一合作承诺了一种革命性的实时数据分析、投资机会和网络安全管理的方法。
- en: HackerGPT meets FinGPT – a comprehensive guide to analyzing the financial cybersecurity
    landscape
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HackerGPT与FinGPT相遇 – 分析金融网络安全景观的全面指南
- en: 'Before diving into the HackerGPT AI persona, it’s important to understand the
    backbone that powers it: the FinGPT model. As a reader interested in multi-agent
    systems, AI, and financial analysis, you’ll find FinGPT particularly relevant.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入了解HackerGPT人工智能角色之前，了解支撑它的基础结构至关重要：FinGPT模型。作为一名对多智能体系统、人工智能和金融分析感兴趣的读者，您会发现FinGPT特别相关。
- en: Introduction to FinGPT – democratizing financial data
  id: totrans-263
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: FinGPT简介 – 民主化金融数据
- en: FinGPT is an open source LLM specifically designed for the finance sector. Its
    mission is to democratize internet-scale financial data by offering an open-sourced,
    data-centric framework that automates the collection and curation of real-time
    financial data from various online sources1\. FinGPT outperforms similar models
    such as BloombergGPT in some scenarios and prioritizes data collection, cleaning,
    and preprocessing, which are critical steps in creating open source financial
    LLMs (FinLLMs)2\. By promoting data accessibility, FinGPT lays the groundwork
    for open finance practices and facilitates financial research, cooperation, and
    innovation.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: FinGPT是一个专门为金融行业设计的开源LLM。其使命是通过提供开源、以数据为中心的框架，自动化从各种在线来源收集和整理实时金融数据，从而民主化互联网规模的金融数据。在某些情况下，FinGPT的表现优于BloombergGPT等类似模型，并优先考虑数据收集、清洗和预处理，这些是创建开源金融LLM（FinLLMs）的关键步骤。通过促进数据可访问性，FinGPT为开放金融实践奠定了基础，并促进了金融研究、合作和创新。
- en: Why FinGPT matters for HackerGPT
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么FinGPT对HackerGPT很重要
- en: Now you may be wondering, why is FinGPT relevant when discussing HackerGPT?
    Well, the answer lies in data-centricity and domain specificity. The FinGPT model
    underpins HackerGPT’s capability to analyze and understand cybersecurity-related
    content, especially those with financial implications, such as cyber insurance
    and investment opportunities in the cybersecurity industry.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可能想知道，为什么在讨论HackerGPT时FinGPT是相关的？答案是数据中心性和领域特定性。FinGPT模型支撑了HackerGPT分析和理解与网络安全相关的内容的本领，特别是那些具有金融影响的内容，如网络安全保险和网络安全行业的投资机会。
- en: HackerGPT (FinGPT-integrated)
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HackerGPT（集成FinGPT）
- en: The HackerGPT series are LLMs fine-tuned using the LoRA method on cybersecurity
    and regulatory datasets. With FinGPT’s data-centric approach serving as its backbone,
    this version excels at tasks such as cybersecurity sentiment analysis. If you’re
    keen to delve deeper, a detailed tutorial on reproducing our experiment’s results
    through benchmarks is underway.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: HackerGPT系列是使用LoRA方法在网络安全和监管数据集上微调的LLMs。以FinGPT以数据为中心的方法作为其骨架，这个版本在网络安全情感分析等任务上表现出色。如果您想深入了解，我们正在准备一个详细的教程，通过基准测试重现我们实验的结果。
- en: By using FinGPT as part of the model architecture, HackerGPT not only gains
    the ability to analyze cybersecurity but also leverages real-time financial data,
    making it a comprehensive tool for various stakeholders in the cybersecurity and
    financial ecosystems.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将FinGPT作为模型架构的一部分，HackerGPT不仅获得了分析网络安全的本领，还利用实时金融数据，使其成为网络安全和金融生态系统中各利益相关者的综合工具。
- en: 'FinGPT Source: GitHub: MIT License AI4 Foundation and Bruce Yang [https://github.com/AI4Finance-Foundation/FinGPT](https://github.com/AI4Finance-Foundation/FinGPT)'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: FinGPT来源：GitHub：MIT许可证AI4基金会和杨博 [https://github.com/AI4Finance-Foundation/FinGPT](https://github.com/AI4Finance-Foundation/FinGPT)
- en: 'FinGPT using HackerGPT AI persona:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 使用HackerGPT AI角色的FinGPT：
- en: Installations
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装
- en: '[PRE9]'
  id: totrans-273
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Run the following Python code:'
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行以下Python代码：
- en: '[PRE10]'
  id: totrans-275
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: IMPORTANT NOTES
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 重要注意事项
- en: 1\. Run this code on a machine with at least a T4 GPU and high RAM for optimal
    performance.
  id: totrans-277
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 在至少配备T4 GPU和高内存的机器上运行此代码。
- en: 2\. Remember to replace the placeholder model names with the actual model names
    you want to use.
  id: totrans-278
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 请记住将占位符模型名称替换为您想要使用的实际模型名称。
- en: This code snippet and model configuration are tailored to assess various aspects
    of cybersecurity, such as regulatory impacts, potential investment opportunities,
    and technological advancements. By analyzing the given inputs, the model can provide
    insightful and detailed responses relevant to the cybersecurity landscape.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码片段和模型配置是为了评估网络安全各个方面的各种方面，如监管影响、潜在的投资机会和技术进步。通过分析给定的输入，该模型可以提供与网络安全格局相关的见解和详细回应。
- en: Revolutionizing the future of AI-driven development with MetaGPT – the ultimate
    catalyst for multi-agent systems
  id: totrans-280
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用MetaGPT革命性地推动AI驱动的开发未来——多智能体系统的终极催化剂
- en: Imagine a world where LLMs don’t just churn out text but collaborate like a
    dream team of engineers, product managers, and architects. They operate not just
    as isolated geniuses but as a cohesive unit with defined roles and standard operating
    procedures. Welcome to the world of MetaGPT, a trailblazing force set to redefine
    the future of multi-agent systems and AI-driven software development.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个世界，在这个世界里，大型语言模型（LLMs）不仅仅能生成文本，还能像工程师、产品经理和架构师梦之队一样协作。它们不仅作为孤立的天才运作，而且作为一个具有明确角色和标准操作程序的协同单位。欢迎来到MetaGPT的世界，这是一个开创性的力量，将重新定义多智能体系统和AI驱动的软件开发的未来。
- en: In this thrilling deep-dive, you’ll unravel the genius behind MetaGPT’s architecture,
    the roles it’s designed to play, and its transformative impact on AI-led initiatives.
    You’ll also explore its remarkable aptitude for identifying cybersecurity investment
    opportunities in the financial domain.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次激动人心的深入探讨中，您将揭开MetaGPT架构背后的天才，它设计要扮演的角色，以及它对以AI为主导的倡议的变革性影响。您还将探索它在金融领域识别网络安全投资机会的非凡能力。
- en: This section is designed for professionals and researchers interested in multi-agent
    systems, AI-driven software development, and large language models. Also note
    that conventional LLM-based multi-agent systems often suffer from coherence and
    collaboration issues, resulting in inefficient outcomes.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 本节是为对多智能体系统、AI驱动的软件开发和大型语言模型感兴趣的专业人士和研究人员设计的。还请注意，基于传统LLM的多智能体系统通常存在一致性和协作问题，导致效率低下。
- en: What is MetaGPT?
  id: totrans-284
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是MetaGPT？
- en: MetaGPT is a ground-breaking technology that addresses these problems by integrating
    **standard operating procedures** (**SOPs**) to coordinate multi-agent systems.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: MetaGPT是一种突破性的技术，通过整合**标准操作程序（SOPs**）来解决多代理系统协调的问题。
- en: 'The following diagram shows MetaGPT’s architecture:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表显示了MetaGPT的架构：
- en: '![Source: MIT License; github.com/geekan/MetaGPT](img/B21008_08_01.jpg)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![来源：MIT许可证；github.com/geekan/MetaGPT](img/B21008_08_01.jpg)'
- en: 'Source: MIT License; github.com/geekan/MetaGPT'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：MIT许可证；github.com/geekan/MetaGPT
- en: 'Figure 8.1 – MetaGPT: software company multi-role schematic'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1 – MetaGPT：软件公司多角色示意图
- en: Imagine a well-organized software company captured in a single diagram. At the
    center is MetaGPT, the orchestrator that takes a single-line requirement and converts
    it into comprehensive deliverables such as user stories, competitive analyses,
    and **application programming interfaces** (**APIs**). Surrounding MetaGPT are
    various specialized GPT agents—each symbolizing roles such as product managers,
    architects, project managers, and engineers. These agents collaboratively tackle
    complex tasks under the guidance of MetaGPT.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，一个组织良好的软件公司被一个单独的图表所捕捉。图表中心是MetaGPT，它是协调者，将单行需求转换为全面的可交付成果，如用户故事、竞争分析和**应用程序编程接口（APIs）**。围绕MetaGPT的是各种专业的GPT代理——每个代理代表产品经理、架构师、项目经理和工程师等角色。这些代理在MetaGPT的指导下共同处理复杂任务。
- en: Role-based collaboration in MetaGPT
  id: totrans-291
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MetaGPT基于角色的协作
- en: This section is your deep dive into how MetaGPT employs distinct agent roles—each
    equivalent to a product manager, architect, or engineer—to tackle intricate software
    projects with unprecedented efficiency. As with any pioneering technology, MetaGPT
    comes with its own set of challenges and limitations, such as scalability and
    complexity—factors that we’ll dissect to give you a holistic view. Streamlining
    these roles into lead and support categories, we bring clarity to the financial,
    conceptual, and operational aspects of software development. Buckle up as we take
    you through the end-to-end MetaGPT workflow, from initiation and requirement gathering
    to the final review phase. By the end, you’ll see how MetaGPT isn’t just another
    AI model; it’s a seismic shift in AI-driven software development that stands to
    revolutionize not just multi-agent systems but the broader landscape of technology
    and finance.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将深入探讨MetaGPT如何采用不同的代理角色——每个角色相当于产品经理、架构师或工程师——以前所未有的效率处理复杂的软件项目。与任何开创性技术一样，MetaGPT也带来了一组自己的挑战和限制，例如可扩展性和复杂性——我们将剖析这些因素，为您提供全面的视角。随着我们将这些角色简化为领导和支持类别，我们为软件开发中的财务、概念和运营方面带来了清晰度。系好安全带，我们将带您了解MetaGPT的端到端工作流程，从启动和需求收集到最终审查阶段。到那时，您将看到MetaGPT不仅仅是一个AI模型；它代表了AI驱动软件开发的一次地震性转变，有望不仅革命化多代理系统，还将改变更广泛的技术和金融领域。
- en: Agent roles
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 代理角色
- en: MetaGPT employs roles such as product manager, architect, and engineer to align
    with human software development teams. Each role has domain-specific skills and
    responsibilities that contribute to efficient task execution.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: MetaGPT采用产品经理、架构师和工程师等角色，以与人类软件开发团队保持一致。每个角色都有特定领域的技能和责任，有助于高效的任务执行。
- en: 'The following are the challenges and limitations of MetaGPT:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列出了MetaGPT的挑战和限制：
- en: '**Scalability**: The model may require extensive computational resources'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：该模型可能需要大量的计算资源'
- en: '**Complexity**: The adoption curve can be steep, especially for teams unfamiliar
    with SOPs or metaprogramming'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：采用曲线可能很陡峭，尤其是对于不熟悉SOPs或元编程的团队'
- en: Streamlined role classifications
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 简化的角色分类
- en: 'To avoid redundancy, we consolidate the roles in a typical software company
    setup into two broad categories:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免冗余，我们将典型软件公司设置中的角色合并为两大类：
- en: 'Lead roles:'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导角色：
- en: '**Investment**: Financial management and idea validation'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资**：财务管理及想法验证'
- en: '**Idea**: Conceptualization and alignment with market needs'
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**想法**：概念化和与市场需求保持一致'
- en: '**Boss (support)**: Overall project oversight'
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**老板（支持）**：整体项目监督'
- en: 'Support roles:'
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持角色：
- en: '**Product manager**: Aligns the product with market needs'
  id: totrans-305
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品经理**：使产品与市场需求保持一致'
- en: '**Architect**: Ensures maintainable and scalable design'
  id: totrans-306
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构师**：确保可维护和可扩展的设计'
- en: '**Engineer**: Code creation and debugging'
  id: totrans-307
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工程师**：代码创建和调试'
- en: '**QA**: Quality assurance'
  id: totrans-308
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量保证（QA）**：质量保证'
- en: MetaGPT workflow
  id: totrans-309
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MetaGPT工作流程
- en: The workflow consists of initiation, requirement gathering, design, task management,
    development, testing, and review phases, contributing to a transparent and effective
    development process.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程包括启动、需求收集、设计、任务管理、开发、测试和审查阶段，有助于实现透明和高效的开发过程。
- en: In conclusion, MetaGPT signifies a monumental shift in the landscape of AI-driven
    software development. By mirroring human-like teamwork and implementing SOPs,
    it opens up exciting avenues for complex software development, positioning itself
    as an invaluable asset in the realm of multi-agent systems.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，MetaGPT标志着AI驱动软件开发领域的重大转变。通过模仿类似人类的团队合作并实施SOPs，它为复杂软件开发开辟了令人兴奋的途径，将自己定位为多智能体系统领域中的宝贵资产。
- en: 'These are the key insights:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是关键见解：
- en: Role-based collaboration enhances efficiency
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于角色的协作提高了效率
- en: The incorporation of SOPs offers a structured approach
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SOPs的融入提供了一种结构化的方法
- en: MetaGPT performs exceptionally in real-world applications, as validated by case
    studies
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MetaGPT在现实世界应用中表现出色，如案例研究所示
- en: Your feedback and suggestions are invaluable for the continuous improvement
    of MetaGPT and its broader implications in the field of AI and multi-agent systems.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 您的反馈和建议对于MetaGPT及其在AI和多智能体系统领域的更广泛影响持续改进至关重要。
- en: Introduction to the MetaGPT model (cybersecurity investment opportunities)
  id: totrans-317
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: MetaGPT模型简介（网络安全投资机会）
- en: The MetaGPT model is a highly advanced and customizable model that has been
    designed to address specific research and analysis needs within various domains.
    In this particular context, it’s geared towards identifying investment opportunities
    within the US market that are influenced by cybersecurity regulatory changes or
    cyber breaches.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: MetaGPT模型是一个高度先进且可定制的模型，旨在满足各个领域内特定的研究和分析需求。在此特定背景下，它旨在识别受网络安全法规变化或网络攻击影响的美国市场中的投资机会。
- en: Roles and responsibilities
  id: totrans-319
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色和责任
- en: 'The model has been configured to perform various specialized roles, including
    these:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型已被配置以执行各种专业角色，包括以下这些：
- en: '**Cybersecurity regulatory research**: Understanding changes in cybersecurity
    laws and regulations and their impact on the market'
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络安全法规研究**：了解网络安全法律和法规的变化及其对市场的影响'
- en: '**Cyber breach analysis**: Investigating cyber breaches, understanding their
    nature, and identifying potential investment risks or opportunities'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络攻击分析**：调查网络攻击，了解其性质，并识别潜在的投资风险或机会'
- en: '**Investment analysis**: Evaluating investment opportunities based on insights
    derived from cybersecurity changes'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资分析**：根据网络安全变化得出的见解评估投资机会'
- en: '**Trading decisions**: Making informed buy or sell decisions on financial products'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易决策**：在金融产品上进行明智的买卖决策'
- en: '**Portfolio management**: Overseeing and aligning the investment portfolio
    based on cybersecurity dynamics'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资组合管理**：监督和调整投资组合，以符合网络安全动态'
- en: 'Here’s how it works:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它的工作原理：
- en: '**Research phase**: The model initiates research on the given topics, either
    cybersecurity regulations or breaches, depending on the role. It breaks down the
    topic into searchable queries, collects relevant data, ranks URLs based on credibility,
    and summarizes the gathered information.'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究阶段**：模型根据角色启动给定主题的研究，无论是网络安全法规还是攻击。它将主题分解为可搜索的查询，收集相关数据，根据可信度对URL进行排序，并总结收集到的信息。'
- en: '**Analysis phase**: Investment analysts then evaluate the summarized information
    to identify trends, insights, and potential investment opportunities or risks.
    They correlate cybersecurity data with market behavior, investment potential,
    and risk factors.'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析阶段**：投资分析师随后评估总结信息，以识别趋势、见解以及潜在的投资机会或风险。他们将网络安全数据与市场行为、投资潜力和风险因素相关联。'
- en: '**Trading phase**: Based on the analysis, investment traders execute appropriate
    trading decisions, buying or selling assets that are influenced by the cybersecurity
    landscape.'
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易阶段**：根据分析，投资交易员执行适当的交易决策，买卖受网络安全环境影响的资产。'
- en: '**Management phase**: The portfolio manager integrates all the insights to
    make overarching decisions about asset allocation, risk management, and alignment
    of the investment portfolio.'
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理阶段**：投资组合经理整合所有见解，就资产配置、风险管理以及投资组合的调整做出总体决策。'
- en: 'The following are its purposes and benefits:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是其目的和好处：
- en: '**Timely insights**: By automating the research and analysis process, the model
    provides quick insights into a dynamic field such as cybersecurity, where changes
    can have immediate market impacts'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**及时洞察**：通过自动化研究和分析过程，该模型为动态领域如网络安全提供快速洞察，其中变化可能立即对市场产生影响'
- en: '**Data-driven decisions**: The model ensures that investment decisions are
    grounded in comprehensive research and objective analysis, minimizing bias'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动决策**：该模型确保投资决策基于全面研究和客观分析，最小化偏见'
- en: '**Customization**: The model can be tailored to focus on specific aspects of
    cybersecurity, such as regulatory changes or particular types of breaches, allowing
    for targeted investment strategies'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制**：该模型可以根据网络安全的具体方面进行定制，例如监管变化或特定类型的违规行为，从而允许有针对性的投资策略'
- en: '**Collaboration**: By defining different roles, the model simulates a collaborative
    approach, where various experts contribute their specialized knowledge to achieve
    a common investment goal'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作**：通过定义不同的角色，该模型模拟了一种协作方法，其中各种专家贡献他们的专业知识以实现共同的投资目标'
- en: In conclusion, the MetaGPT model, with its diverse roles and sophisticated functions,
    serves as a powerful tool for investors looking to leverage the ever-changing
    landscape of cybersecurity. By integrating research, analysis, trading, and portfolio
    management, it provides a comprehensive, data-driven approach to identifying and
    capitalizing on investment opportunities arising from the complex interplay of
    cybersecurity and finance. It not only streamlines the investment process but
    also enhances the accuracy and relevance of investment decisions in a rapidly
    evolving field.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，MetaGPT 模型，凭借其多样化的角色和复杂的功能，成为投资者利用不断变化的网络安全领域的强大工具。通过整合研究、分析、交易和投资组合管理，它提供了一种全面、数据驱动的投资机会识别和利用方法，这些机会源于网络安全和金融之间复杂互动。它不仅简化了投资过程，还提高了在快速发展的领域中投资决策的准确性和相关性。
- en: 'Source: GitHub: MIT License: [https://github.com/geekan/MetaGPT](https://github.com/geekan/MetaGPT).'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：GitHub：MIT 许可证：[https://github.com/geekan/MetaGPT](https://github.com/geekan/MetaGPT).
- en: 'Source: MetaGPT: Meta Programming for Multi-Agent Collaborative Framework Paper:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：MetaGPT：多智能体协作框架论文：
- en: '[2308.00352] MetaGPT: Meta Programming for Multi-Agent Collaborative Framework
    (arxiv.org) ([https://arxiv.org/abs/2308.00352](https://arxiv.org/abs/2308.00352))'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: '[2308.00352] MetaGPT：多智能体协作框架的元编程（arxiv.org）([https://arxiv.org/abs/2308.00352](https://arxiv.org/abs/2308.00352))'
- en: By Sirui Hong, Xiawu Zheng, Jonathan Chen, Yuheng Cheng, Jinlin Wang, Ceyao
    Zhang, Zili Wang, Steven Ka Shing Yau, Zijuan Lin, Liyang Zhou, Chenyu Ran, Lingfeng
    Xiao, Chenglin Wu
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 作者：洪思睿，郑晓武，陈俊彦，程宇恒，王金林，张策瑶，王紫丽，刘子轩，周立扬，陈瑞安，肖凌峰，吴成霖
- en: 'The following is a Python code snippet:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个 Python 代码片段：
- en: 'Begin with the installations:'
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从安装开始：
- en: '[PRE11]'
  id: totrans-343
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Run the following Python code:'
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行以下 Python 代码：
- en: '[PRE12]'
  id: totrans-345
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Important notes:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 重要注意事项：
- en: Execute the installation and setup commands in your terminal before running
    the Python script
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在运行 Python 脚本之前，请在您的终端中执行安装和设置命令
- en: Don’t forget to replace placeholder texts in config files and the Python script
    with actual data or API keys
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要忘记将配置文件和 Python 脚本中的占位符文本替换为实际数据或 API 密钥
- en: Ensure that MetaGPT is properly installed and configured on your machine
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保MetaGPT已在您的机器上正确安装和配置
- en: In this high-stakes exploration, we dissect the exhilarating yet precarious
    world of LLM-integrated applications. We delve into how they’re transforming finance
    while posing emergent ethical dilemmas and security risks that simply cannot be
    ignored. Be prepared to journey through real-world case studies that highlight
    the good, the bad, and the downright ugly of LLM applications in finance, from
    market-beating hedge funds to costly security breaches and ethical pitfalls.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 在这场高风险的探索中，我们剖析了 LLM 集成应用的激动人心但充满风险的世界。我们深入探讨了它们如何改变金融，同时提出了无法忽视的突现伦理困境和安全风险。准备好通过真实世界的案例研究来了解
    LLM 在金融中的应用，从击败市场的对冲基金到代价高昂的安全漏洞和道德陷阱。
- en: So, fasten your seatbelts because we’re diving headfirst into the labyrinthine
    maze of issues surrounding the integration of LLMs in the financial sector. Here,
    you’ll find eye-opening revelations that will make you question how we’re using,
    and potentially misusing, this revolutionary technology. Are you ready to confront
    the challenges and complexities? Let’s get started!
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，系好安全带，因为我们正一头扎进金融领域LLM集成问题的错综复杂的迷宫。在这里，你会发现令人耳目一新的发现，让你质疑我们如何使用，以及可能误用这项革命性技术。你准备好面对挑战和复杂性了吗？让我们开始吧！
- en: Compromising real-world LLM-integrated applications with indirect prompt injection
  id: totrans-352
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用间接提示注入损害现实世界的LLM集成应用
- en: 'Language models integrated into applications (LLMs), such as ChatGPT, are at
    the forefront of technological innovation, especially in finance, trading, and
    investment. However, they pose emerging risks, both ethical and security-related,
    that warrant immediate attention:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 集成到应用程序中的语言模型（LLMs），如ChatGPT，在技术创新的前沿，尤其是在金融、交易和投资领域。然而，它们带来了新兴的风险，包括伦理和安全相关风险，需要立即关注：
- en: 'Transformative applications in finance:'
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 金融领域的变革性应用：
- en: LLMs have transformed various aspects of financial operations, from AI-based
    financial predictions to rendering personalized Power BI visualizations.
  id: totrans-355
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LLM已经改变了金融运营的各个方面，从基于AI的金融预测到生成个性化的Power BI可视化。
- en: 'Case study: Hedge fund profits A hedge fund leveraging ChatGPT for market sentiment
    analysis successfully navigated a volatile market, realizing a 20% increase in
    profits.'
  id: totrans-356
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 案例研究：对冲基金利润一家利用ChatGPT进行市场情绪分析的对冲基金成功穿越了动荡的市场，实现了20%的利润增长。
- en: 'Ethical maze:'
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 伦理迷宫：
- en: LLMs come with ethical baggage, from safety concerns to misinformation and regulatory
    challenges, affecting various platforms including Bing Chat and Microsoft 365
    Copilot.
  id: totrans-358
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LLM带来了道德负担，从安全担忧到虚假信息和监管挑战，影响了包括Bing Chat和Microsoft 365 Copilot在内的各种平台。
- en: 'Case study: Regulatory mishap An investment firm failed to comply with local
    regulations while using an LLM, causing legal and reputational fallout.'
  id: totrans-359
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 案例研究：监管失误一家投资公司在使用LLM时未能遵守当地法规，导致法律和声誉受损。
- en: 'The Achilles Heel: indirect prompt injection:'
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 阿基里斯的脚踝：间接提示注入：
- en: The discovery of vulnerabilities such as indirect prompt injection adds another
    layer of complexity to LLM security. This vulnerability allows attackers to send
    misleading prompts remotely, making it a critical area for immediate remediation.
  id: totrans-361
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 发现诸如间接提示注入等漏洞，为LLM安全增加了另一层复杂性。这种漏洞允许攻击者远程发送误导性提示，使其成为需要立即修复的关键领域。
- en: 'Case study: The costly alert A hacker exploited the indirect prompt injection
    loophole to send false trading alerts, leading traders to make poor investment
    decisions and incur substantial losses.'
  id: totrans-362
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 案例研究：代价高昂的警报一名黑客利用间接提示注入漏洞发送虚假交易警报，导致交易者做出糟糕的投资决策并遭受重大损失。
- en: 'Deception potential: real and experimental evidence:'
  id: totrans-363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 欺骗潜力：真实和实验证据：
- en: Both synthetic experiments and real-world testing reveal LLMs can be easily
    misled into making false or damaging decisions.
  id: totrans-364
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 无论是合成实验还是现实世界测试，都表明LLM很容易被误导，做出错误或有害的决策。
- en: 'Case study: The unauthorized transaction A banking application with an LLM
    feature was tricked into approving unauthorized transactions, showing the real-world
    impact of these vulnerabilities.'
  id: totrans-365
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 案例研究：未经授权的交易一个具有LLM功能的银行应用程序被诱骗批准未经授权的交易，展示了这些漏洞的现实影响。
- en: 'The evolving threat landscape:'
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 威胁格局的演变：
- en: As LLMs become more complex, new forms of vulnerabilities, beyond indirect prompt
    injection, are emerging. Continuous research and vigilance are vital.
  id: totrans-367
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 随着LLM变得更加复杂，新的漏洞形式正在出现，而不仅仅是间接提示注入。持续的研究和警惕至关重要。
- en: 'Case study: Phishing with AI A new form of AI-aided phishing scams was highlighted
    at a recent conference, warning the industry of evolving attack vectors.'
  id: totrans-368
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 案例研究：AI辅助的钓鱼诈骗在最近的一次会议上突出了一种新的AI辅助钓鱼诈骗形式，警告行业注意演变的攻击向量。
- en: Future-proofing LLMs – solutions on the horizon
  id: totrans-369
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为LLM提供未来保障——即将到来的解决方案
- en: 'Given the escalating risks, especially indirect prompt injection, various promising
    mitigation methods are being explored:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 鉴于风险不断升级，尤其是间接提示注入，正在探索各种有前景的缓解方法：
- en: '**AI-guided security protocols**: Real-time monitoring for immediate threat
    detection and mitigation'
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI引导的安全协议**：实时监控以立即检测和缓解威胁'
- en: '**Blockchain-based verification**: Ensuring the integrity of transactions and
    data'
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于区块链的验证**：确保交易和数据完整性'
- en: '**Quantum encryption**: Revolutionary methods for unbreakable data encryption'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量子加密**：革命性的数据加密方法'
- en: '**Behavioral analytics and biometrics**: Customized, robust authentication
    mechanisms'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为分析和生物识别**：定制、强大的身份验证机制'
- en: '**Regulatory compliance automation**: Automated checks to ensure compliance
    with global standards'
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性自动化**：自动检查以确保符合全球标准'
- en: 'The following are examples of solutions in action:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些实际应用中的解决方案示例：
- en: A leading bank is using AI-guided security protocols for real-time threat identification
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家领先的银行正在使用人工智能引导的安全协议进行实时威胁识别
- en: A fintech start-up has made strides in implementing quantum encryption for ultra-safe
    transactions
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家金融科技初创公司已在实施量子加密以实现超安全交易
- en: The incorporation of LLMs in the financial sector is an exciting yet perilous
    journey. As we delve deeper into this technology, it becomes essential to address
    the myriad of challenges, including indirect prompt injection, that come with
    it. A balanced approach, grounded in ethical consideration and technological innovation,
    will help us harness LLMs securely and responsibly.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融领域引入LLM是一次既令人兴奋又充满危险之旅。随着我们深入这一技术，解决随之而来的各种挑战，包括间接提示注入，变得至关重要。基于伦理考虑和技术创新的平衡方法将帮助我们安全、负责任地利用LLM。
- en: Imagine a world where seeing is no longer believing. The images and videos that
    flood your screen are so hyper-realistic, so impeccably crafted, that they blur
    the line between truth and fabrication. Welcome to the unsettling, yet mesmerizing
    domain of deepfakes—artificial intelligence’s most compelling yet cautionary tale.
    With the power to revolutionize media, entertainment, and even social justice,
    deepfakes equally hold a dark mirror to the societal, ethical, and financial ramifications
    that we’ve only just begun to fathom.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个世界，在这个世界里，所见不再为所信。充斥你屏幕的图像和视频如此超现实，如此完美无瑕地制作，以至于模糊了真实与虚构之间的界限。欢迎来到令人不安却又迷人的深度伪造领域——这是人工智能最具吸引力同时也是最具警示性的故事。深度伪造拥有变革媒体、娱乐甚至社会正义的力量，同时也同样映射出社会、伦理和金融后果的黑暗面，而我们才刚刚开始理解这些后果。
- en: Armed with data visualization and AI tools, we will uncover, analyze, and confront
    the existential challenges that deepfakes present to our understanding of reality
    itself.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 借助数据可视化和人工智能工具，我们将揭示、分析和面对深度伪造对我们对现实本身理解所提出的存在性挑战。
- en: You’re about to step into a world where nothing is what it seems and where the
    quest for truth becomes a high-stakes gamble against advanced algorithms and AI.
    Ready to face the disturbingly fluid borders of fact and fiction? Buckle up and
    let’s dive into the intricate complexities and unexpected vulnerabilities of our
    AI-powered future.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 你即将踏入一个看似一切皆非真实的世界，在这里，对真相的追求变成了一场与高级算法和人工智能的高风险赌博。准备好面对令人不安的事实与虚构之间的流动边界了吗？系好安全带，让我们深入探索我们人工智能驱动的未来的复杂性和意外漏洞。
- en: Source
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 来源
- en: '[2302.12173] Not what you’ve signed up for: Compromising Real-World LLM-Integrated
    Applications with Indirect Prompt Injection (arxiv.org)'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: '[2302.12173] 并非你所期望的：通过间接提示注入损害现实世界LLM集成应用 (arxiv.org)'
- en: By Kai Greshake, Sahar Abdelnabi, Shailesh Mishra, Christoph Endres, Thorsten
    Holz, Mario Fritz
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 作者：凯·格雷沙克，萨哈尔·阿布德尔纳比，沙伊勒什·米什拉，克里斯托夫·恩德斯，托尔斯滕·霍兹，马里奥·弗里茨
- en: Deepfakes and their multi-faceted impact – a closer look with AI and data visualization
  id: totrans-386
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深度伪造及其多方面影响——借助人工智能和数据可视化进行深入探讨
- en: Deepfakes, propelled by advancements in artificial intelligence, can create
    hyper-realistic yet wholly fabricated videos and images. These deepfakes not only
    challenge our perception of reality but also pose significant risks on individual,
    corporate, and governmental levels.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 由人工智能进步推动的深度伪造能够创造出超现实且完全虚构的视频和图像。这些深度伪造不仅挑战了我们对于现实的认识，而且在个人、企业和政府层面也带来了重大的风险。
- en: Here’s a technical overview. Deepfakes employ neural networks trained on thousands
    of photographs and voice samples to generate incredibly lifelike fake content.
    With the advent of new algorithms, the complexity extends to whole-head synthesis,
    joint audiovisual synthesis, and even full-body synthesis.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个技术概述。深度伪造使用在数千张照片和声音样本上训练的神经网络来生成极其逼真的虚假内容。随着新算法的出现，复杂性扩展到了全头合成、联合视听合成，甚至全身合成。
- en: 'Ethical and legal aspects:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理和法律方面：
- en: Deepfakes initially gained notoriety for their use in malicious activities,
    ranging from personal defamation to political manipulation. The legal and ethical
    considerations associated with these technologies are manifold, given their potential
    for social and individual harm.
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Deepfakes最初因在恶意活动中的应用而声名狼藉，从个人诽谤到政治操纵，其涉及的法律和伦理考量众多，鉴于其可能对社会和个人造成伤害。
- en: 'The following are their societal impacts:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是他们社会影响：
- en: Deepfake content can cause irreparable damage to individuals, from emotional
    distress to legal repercussions
  id: totrans-392
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度伪造内容可能对个人造成不可修复的损害，从情感痛苦到法律后果。
- en: For companies, fraudulent videos can manipulate stock prices and ruin reputations
    within minutes
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于公司来说，欺诈视频可以在几分钟内操纵股价并破坏声誉。
- en: Deepfakes can lead to political unrest and international conflicts
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度伪造可能导致社会动荡和国际冲突。
- en: 'The following are their financial and cybersecurity implications:'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是他们金融和网络安全的影响：
- en: Corporate deepfakes can lead to deceptive financial instructions, causing significant
    monetary losses
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业深度伪造可能导致误导性的财务指令，造成重大经济损失。
- en: The mass dissemination of deepfake content can overload digital infrastructures,
    causing cybersecurity vulnerabilities
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度伪造内容的广泛传播可能会超载数字基础设施，导致网络安全漏洞。
- en: 'Protection through generative AI tools:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 通过生成式AI工具进行保护：
- en: '**AI detection**: Advanced AI models can identify even the subtlest alterations,
    flagging them for further investigation'
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI检测**：先进的AI模型可以识别甚至最细微的修改，并将它们标记为需要进一步调查。'
- en: '**Blockchain watermarks**: Authentic content can be watermarked and verified
    through blockchain technology'
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区块链水印**：通过区块链技术可以对真实内容进行水印和验证。'
- en: '**Educational outreach**: AI-driven tools such as ChatGPT can inform and educate
    the public about the risks associated with deepfakes'
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育推广**：由ChatGPT等AI驱动的工具可以告知和教育公众关于深度伪造的风险。'
- en: '**Feedback loops for** **continuous improvement**'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**持续改进的反馈循环**'
- en: As AI models flag suspicious content, the results can be reviewed by human experts
    for accuracy. This review process feeds back into the machine learning model,
    helping to train it for improved performance in future deepfake detection efforts.
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当AI模型标记可疑内容时，结果可以由人类专家进行审查以确保准确性。这一审查过程会反馈到机器学习模型中，帮助它在未来的深度伪造检测工作中提高性能。
- en: Currently, Microsoft and other tech giants are developing deepfake detection
    tools that analyze visual and auditory content, providing a likelihood score of
    manipulation.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，微软和其他科技巨头正在开发深度伪造检测工具，这些工具分析视觉和听觉内容，提供操纵的可能性评分。
- en: As deepfake technology becomes increasingly sophisticated, our methods of identification
    and defense must evolve. By incorporating machine learning models and data visualization
    techniques, we can better understand the deepfake landscape and devise more effective
    countermeasures.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 随着深度伪造技术的日益复杂，我们的识别和防御方法必须不断发展。通过整合机器学习模型和数据可视化技术，我们可以更好地理解深度伪造的格局，并制定更有效的对策。
- en: Picture yourself on a trading floor. Numbers flicker in real-time on screens,
    brokers shout over phones, and the tension is palpable. But what if I told you
    that the real powerhouses in this chaotic scene aren’t humans but algorithms?
    Welcome to the future of finance—a landscape increasingly shaped by AI.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你站在交易大厅。数字在屏幕上实时闪烁，经纪人通过电话大喊，紧张气氛令人窒息。但如果你告诉我，在这个混乱场景中真正的力量不是人类而是算法呢？欢迎来到金融的未来——一个越来越由AI塑造的领域。
- en: AI is more than just a buzzword; it’s a transformative force that’s rewriting
    the rules of finance, from stock recommendations to fraud detection. While it
    may sound complex, understanding AI is not an elite club reserved for tech moguls
    or Wall Street tycoons. This guide is your passport to the brave new world of
    AI in finance, whether you’re a novice investor, a tech enthusiast, or a seasoned
    finance professional.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: AI不仅仅是流行语；它是一种变革力量，正在重新书写金融规则，从股票推荐到欺诈检测。虽然它可能听起来很复杂，但理解AI并非只有科技巨头或华尔街大亨才能加入的精英俱乐部。本指南是您通往金融AI新世界的护照，无论您是新手投资者、科技爱好者还是经验丰富的金融专业人士。
- en: We’re going to decode AI in terms that matter to you. Our journey will navigate
    through ethical sand traps and algorithmic pitfalls, laying out the game-changing
    opportunities and challenges that AI presents. Imagine having a personal finance
    advisor who never sleeps, a risk manager who learns from every transaction, or
    even a digital watchdog who guards against fraud—that’s the promise and the cautionary
    tale of AI in finance.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将用对你有意义的方式解码人工智能。我们的旅程将通过道德陷阱和算法陷阱，展示人工智能带来的颠覆性机会和挑战。想象一下，拥有一个从不睡觉的个人财务顾问，一个从每次交易中学习的风险管理者，甚至是一个防止欺诈的数字看门狗——这就是人工智能在金融领域的承诺和警示故事。
- en: So, why should you care? Because AI is not just shaping the future; it’s accelerating
    it. And in a world where change is the only constant, your ability to adapt and
    understand this groundbreaking technology is your ultimate edge. Get ready to
    demystify the algorithms, dissect real-world case studies, and take actionable
    steps to not just survive but to thrive in this AI-driven financial frontier.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么你应该关心呢？因为人工智能不仅正在塑造未来，还在加速它。在一个变化是唯一不变的世界里，你适应和了解这一开创性技术的能力是你最终的优势。准备好揭开算法的神秘面纱，剖析现实世界的案例研究，并采取行动步骤，不仅生存，还要在这个由人工智能驱动的金融前沿蓬勃发展。
- en: 'As we draw the curtains on this transformative journey through the pulsating
    world of AI and finance, we arrive at an exhilarating crescendo: AI literacy—your
    passport to the future. Whether you’re a curious beginner, a tech-savvy enthusiast,
    or a financial expert, this final section is your ultimate guide to claiming your
    stake in the AI revolution. We’ll chart a roadmap that transcends the limitations
    and ethical constraints of AI, touching on practical case studies such as Kount
    that exemplify AI’s game-changing potential in finance. With a wealth of resources
    ranging from formal education and certifications to community involvement and
    DIY projects, we aim to equip you with the tools you need for a lifetime of AI
    mastery. As we reach the end of this narrative, remember that the future is not
    a passive landscape that we merely inherit but an exhilarating frontier that we
    actively construct. With the insights and skills you’ve gained, you’re not just
    a spectator—you’re a trailblazer in the unfolding saga of AI and finance.'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在这激动人心的旅程中揭开人工智能和金融世界的帷幕时，我们达到了一个令人兴奋的高潮：人工智能素养——通往未来的通行证。无论你是好奇的初学者、技术娴熟的爱好者，还是金融专家，这一部分都是你最终指南，帮助你在这场人工智能革命中占据一席之地。我们将绘制一幅超越人工智能局限性和道德约束的路线图，涉及诸如
    Kount 这样的实际案例研究，这些案例研究展示了人工智能在金融领域颠覆性潜力的典范。通过提供从正规教育、认证到社区参与和DIY项目的丰富资源，我们旨在为你提供终身掌握人工智能所需的工具。当我们到达这个叙述的结尾时，请记住，未来不是一个被动的景观，我们只是继承它，而是一个令人兴奋的前沿，我们积极构建它。凭借你所获得的见解和技能，你不仅仅是一个旁观者，而是人工智能和金融这场正在展开的传奇中的开拓者。
- en: AI literacy – your passport to the future
  id: totrans-411
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能素养——通往未来的通行证
- en: From AI’s transformative impact to its practical applications in finance, this
    guide is for readers from all walks of life.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 从人工智能的变革性影响到其在金融领域的实际应用，本指南面向所有行业和领域的读者。
- en: Beginners can think of AI as a personalized assistant. A good starting point
    would be installing financial apps such as Robinhood that use AI for personalized
    stock recommendations.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 初学者可以将人工智能视为一个个性化助手。一个不错的起点是安装使用人工智能进行个性化股票推荐的金融应用，例如 Robinhood。
- en: Tech enthusiasts can start by exploring open source machine learning libraries
    such as TensorFlow. Experiment with existing finance-focused AI projects on GitHub.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 技术爱好者可以从探索开源机器学习库，如 TensorFlow 开始。在 GitHub 上尝试现有的以金融为重点的人工智能项目。
- en: If you’re a finance pro, AI can help you automate risk assessment. Platforms
    such as DataRobot offer AI services tailored to financial data analysis.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名金融专业人士，人工智能可以帮助你自动化风险评估。例如，DataRobot 提供针对金融数据分析的定制人工智能服务。
- en: Navigating AI’s landscape – considerations and guidelines
  id: totrans-416
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索人工智能的领域——考虑事项和指南
- en: '**Limitations of AI**: Be critical of AI’s financial suggestions. Use platforms
    that allow you to see the algorithm’s confidence score, such as Quantopian.'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能的局限性**：对人工智能的金融建议持批判态度。使用允许您查看算法置信度分数的平台，例如 Quantopian。'
- en: '**Ethical usage**: Look for platforms that are GDPR compliant or follow ethical
    AI guidelines when dealing with financial data.'
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**道德使用**：在处理金融数据时，寻找符合 GDPR 或遵循道德人工智能指南的平台。'
- en: Consider the following case study. Kount is a platform that uses AI to prevent
    fraud in financial transactions. Imagine a security guard who not only knows every
    trick in the book but also learns new ones as they emerge; that’s what Kount’s
    adaptive AI does. It continuously learns from data to assess the risk associated
    with each transaction. By doing so, it minimizes the instances where legitimate
    transactions are incorrectly flagged as fraudulent (known as false declines),
    thus saving businesses from revenue loss and enhancing customer trust.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下案例研究。Kount是一个使用AI防止金融交易欺诈的平台。想象一个不仅知道所有技巧，而且随着新技巧的出现而不断学习的安保人员；这就是Kount自适应AI所做的事情。它不断从数据中学习，以评估每笔交易的风险。通过这样做，它最大限度地减少了将合法交易错误标记为欺诈（称为错误拒绝）的情况，从而帮助企业避免收入损失并增强客户信任。
- en: This case study shows that AI, when used responsibly and ethically, can offer
    substantial benefits in the finance sector, making operations more secure and
    efficient.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究显示，当AI被负责任和道德地使用时，可以在金融领域提供实质性的好处，使运营更加安全和高效。
- en: 'The following is your roadmap to AI mastery:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是你通往AI精通的路线图：
- en: '**Empower yourself**: Follow introductory courses on platforms such as Coursera,
    such as *AI For Everyone* by Andrew Ng'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**赋能自己**：在Coursera等平台上跟随入门课程，例如安德鲁·吴的《人人都能学AI》。'
- en: '**Inclusive future**: Get involved in initiatives such as AI4ALL, aiming for
    a more diverse future in AI'
  id: totrans-423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**包容性的未来**：参与AI4ALL等倡议，旨在实现AI领域的更加多元化。'
- en: 'The following are the essentials of AI in finance:'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是金融AI的要点：
- en: Tools such as AlphaSense use AI to scan, search, and analyze financial documents,
    offering unprecedented efficiency
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AlphaSense等工具使用AI扫描、搜索和分析金融文件，提供前所未有的效率。
- en: For trading, consider platforms, such as Alpaca, that offer AI-driven trading
    APIs. For financial visualization, Power BI’s integration with Azure AI offers
    advanced analytics features
  id: totrans-426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于交易，考虑使用提供AI驱动交易API的平台，例如Alpaca。对于金融可视化，Power BI与Azure AI的集成提供了高级分析功能。
- en: Start with beginner-friendly platforms such as TradeStation, which has in-built
    algorithmic trading features
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从TradeStation等入门友好型平台开始，它具有内置的算法交易功能。
- en: 'The following is a guide to lifelong learning in AI for finance:'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在金融AI领域终身学习的指南：
- en: For formal education, courses such as MIT’s *AI in Finance* offer deep dives
    into specific applications of AI in financial markets
  id: totrans-429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于正规教育，麻省理工学院的《AI in Finance》等课程可以深入了解金融市场中AI的具体应用。
- en: In terms of online courses, Udacity’s *AI for Trading* is a comprehensive nano-degree
    focusing on AI in finance
  id: totrans-430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在在线课程方面，Udacity的《AI for Trading》是一个全面的纳米学位，专注于金融领域的AI。
- en: Certifications such as IBM’s AI for Financial Services certification can add
    a credibility badge to your skillset
  id: totrans-431
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如IBM的AI for Financial Services认证等证书可以为您的技能集添加一个信誉徽章。
- en: Join online forums such as Reddit’s r/algotrading to stay up to date with the
    latest in AI finance tech
  id: totrans-432
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加入如Reddit的r/algotrading等在线论坛，以保持对AI金融技术的最新动态。
- en: Regularly participate in webinars from Financial Times or KDNuggets that focus
    on AI in finance
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期参加来自《金融时报》或KDNuggets的在线研讨会，这些研讨会聚焦于金融领域的AI。
- en: Books such as *Machine Learning for Finance* by Jannes Klaas offer both theory
    and practical case studies
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如Jannes Klaas的《Machine Learning for Finance》等书籍提供了理论和实际案例研究。
- en: Platforms such as Kaggle host challenges that can give you hands-on experience
    in solving finance-based AI problems
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Kaggle等平台举办的挑战赛可以为您提供解决基于金融的AI问题的实践经验。
- en: For your own projects, use platforms such as QuantConnect to test your own trading
    algorithms using their free data and cloud resources
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于您自己的项目，请使用QuantConnect等平台，利用它们免费的数据和云资源来测试您自己的交易算法。
- en: Your journey into AI in finance is an ongoing process. This guide aims to be
    a comprehensive starting point. Always remember, AI is a tool, not a silver bullet.
    Your judgment remains your most important asset. With these resources and guidelines,
    you’re now better equipped to navigate, innovate, and thrive in the evolving landscape
    of AI in finance.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 您在金融AI领域的旅程是一个持续的过程。本指南旨在成为一个全面的起点。始终记住，AI是一个工具，而不是万能的银弹。您的判断仍然是您最重要的资产。有了这些资源和指南，您现在更有能力在金融AI不断发展的领域中导航、创新和繁荣。
- en: 'As we wrap up this chapter and this journey, remember: the future isn’t something
    that just happens to us – it’s something we build. And with the right knowledge
    and tools, including AI literacy, we are all the architects of tomorrow. So, whether
    you’re a seasoned tech guru, a finance whiz, or someone just dipping their toes
    into the world of AI, you’re now armed with the knowledge to navigate, innovate,
    and thrive in this new era.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们结束这一章节和这次旅程，请记住：未来不是偶然发生在我们身上的事情——它是我们亲手建造的。有了正确的知识和工具，包括人工智能素养，我们都是明天的建筑师。所以，无论你是经验丰富的技术大师，还是金融专家，或者只是刚刚踏入人工智能世界的初学者，你现在都拥有了导航、创新和在这个新时代茁壮成长的知识。
- en: Summary
  id: totrans-439
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we’ve journeyed through the most cutting-edge developments
    at the intersection of AI and finance in the cybersecurity realm. You’ve learned
    about GPT-4’s potential and perils in the financial sphere, understood the cloud-based
    prowess of CrowdStrike, and accelerated your financial acumen through both aggressive
    and conservative trade strategies, brought to life with compelling Power BI visualizations.
    We introduced you to HackerGPT as a lens through which to view cybersecurity’s
    financial ramifications and explored how FinGPT is revolutionizing financial analysis.
    We dove deep into MetaGPT’s multi-agent orchestration for game-changing financial
    insights. You’ve also gained valuable ethical perspectives on the use of indirect
    prompt injections in LLMs, as well as the financial risks and opportunities that
    come with the rise of deepfakes.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章节中，我们穿越了网络安全领域人工智能与金融交叉的最前沿发展。你了解了GPT-4在金融领域的潜力和风险，理解了CrowdStrike基于云的强大能力，并通过具有说服力的Power
    BI可视化，通过激进和保守的交易策略加速了你的金融洞察力。我们向你介绍了HackerGPT作为观察网络安全金融影响的视角，并探讨了FinGPT如何革新金融分析。我们深入研究了MetaGPT的多代理编排，以获得颠覆性的金融洞察。你还获得了关于在LLM中使用间接提示注入的宝贵伦理观点，以及随着深度伪造的兴起所带来的金融风险和机遇。
- en: 'And now, as we close the final chapter of this incredible journey, let’s part
    with resounding words of empowerment: you’re no longer just a passenger on the
    ship of technological change, you’re at the helm, steering through the turbulent
    yet exhilarating waters of AI and finance. With the insights and tools gained
    from this book, you’re not just prepared for the future—you’re equipped to build
    it. Go forth with confidence, wisdom, and an unquenchable thirst for innovation.
    The future awaits your imprint; make it a masterpiece!'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，随着我们结束这次不可思议旅程的最后一章，让我们以充满力量的话语告别：你不再是技术变革之船上的乘客，你是掌舵者，在人工智能和金融的动荡而令人兴奋的水域中引领方向。从这本书中获得洞察力和工具，你不仅为未来做好了准备——你已准备好去建造它。带着信心、智慧和无法满足的创新渴望前行。未来等待着你的印记；让它成为杰作！
