  type: TYPE_NORMAL
  zh: Power BI 警报配置（以 CrowdStrike 空头期权警报为例，但也可用于 Crowdstrike 股票警报）
- en: 'This section is a six-step journey that provides you with the skills to set
    up your own alerts in Power BI, tailored to your unique trading strategies. First,
    you’ll learn how to select the appropriate visual elements, such as line charts,
    to base your alert on. Next, we guide you through the alerts section in Power
    BI, where the main setup is completed. Here, you’ll set new alert rules, specify
    conditions, and choose how you’d like to be notified. Each step is a building
    block, leading to a final, configured alert that keeps you ahead of the curve.
    By mastering these steps, you’re not just adding another tool to your trading
    toolbox; you’re gaining a vigilant ally that ensures you never miss an important
    trading cue:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 本节是一个六步之旅，为您提供在 Power BI 中设置自己警报的技能，这些警报是根据您独特的交易策略定制的。首先，您将学习如何选择适当的视觉元素，例如折线图，作为您警报的基础。接下来，我们将引导您通过
    Power BI 的警报部分，在这里完成主要设置。在这里，您将设置新的警报规则、指定条件并选择您希望如何被通知。每一步都是一个构建块，最终形成一个配置好的警报，让您始终领先于市场曲线。通过掌握这些步骤，您不仅是在您的交易工具箱中添加另一个工具；您还在获得一个警惕的盟友，确保您永远不会错过重要的交易线索：
- en: Click on the specific visual that you want to set an alert on (e.g., the line
    chart showing CrowdStrike’s stock price versus put option strike price).
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击您想要设置警报的具体视觉元素（例如，显示 CrowdStrike 股票价格与看跌期权执行价格对比的折线图）。
- en: Go to the **Alerts** section in the Power BI service.
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 Power BI 服务中的 **警报** 部分。
- en: Click on **+ New** **alert** rule.
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **+ 新建** **警报**规则。
- en: Set the condition for the alert (e.g., **Stock Price <** **Strike Price**).
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置警报的条件（例如，**股票价格 <** **执行价格**）。
- en: Choose the notification method (e.g., email or mobile notification).
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择通知方法（例如，电子邮件或移动通知）。
- en: Save the alert.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存警报。
- en: Important note
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: The exact implementation and look of the visualizations will depend on your
    data sources, Power BI setup, and specific requirements.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化的具体实现和外观将取决于您的数据源、Power BI 设置和具体要求。
- en: Ensure that you are in compliance with all relevant legal and regulatory requirements,
    especially when integrating AI such as ChatGPT.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您符合所有相关的法律和监管要求，尤其是在集成如 ChatGPT 这样的 AI 时。
- en: By combining Power BI’s visualization capabilities with ChatGPT’s natural language
    analysis, these investment strategies can be monitored and managed effectively,
    with insights provided in an accessible and actionable manner. Make sure to involve
    a financial expert to tailor the strategies to individual circumstances.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合 Power BI 的可视化能力和 ChatGPT 的自然语言分析，这些投资策略可以有效地进行监控和管理，以易于访问和可操作的方式提供见解。请确保涉及财务专家，以根据个人情况调整策略。
- en: Prepare for a roller-coaster ride through Python’s dynamic capabilities as we
    bring your aggressive trade strategy to life. Imagine being able to snapshot your
    option positions, track real-time prices, and visualize potential risks, all with
    a few lines of code to create a CSV file. Welcome to the world where Python is
    your trading floor and you’re the conductor of this financial symphony. Get ready
    to code your way to dynamic, real-time trading insights.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好通过 Python 的动态能力体验一次过山车般的旅程，我们将使您的积极交易策略栩栩如生。想象一下，您能够通过几行代码创建 CSV 文件来快照您的期权头寸、跟踪实时价格和可视化潜在风险。欢迎来到
    Python 是您的交易大厅，而您是这个金融交响乐指挥的世界。准备好通过编码走向动态、实时的交易洞察。
- en: 'Harnessing Python’s power for aggressive trading: a code-driven odyssey'
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用 Python 的力量进行积极交易：一个由代码驱动的探险
- en: Get ready for a riveting journey—a code-driven odyssey into the world of aggressive
    trading powered by Python. This section isn’t merely a tutorial; it’s an action-packed
    course that turns Python code into the engine room of your trading cockpit. We
    start by assembling our trade options in a data frame called options_df, saving
    it as a CSV file for easy access. Our get_option_price function acts as a conduit
    to real-time option pricing, pulling in vital data based on the ticker, strike
    price, and expiration date. This is then neatly organized in another data frame,
    positions_df, also saved as a CSV file. As we move forward, expect to delve into
    time series plotting and risk analysis, where you’ll learn to visualize price
    trends and calculate potential gains or losses.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好开始一段扣人心弦的旅程——一个由 Python 驱动的、充满活力的交易世界探险。这一节不仅仅是教程；它是一个充满活力的课程，将 Python 代码变成您交易驾驶舱的动力室。我们首先在名为
    options_df 的数据框中组装我们的交易期权，并将其保存为 CSV 文件以便于访问。我们的 get_option_price 函数作为实时期权定价的通道，根据股票代码、行权价格和到期日拉取关键数据。这些数据随后被整齐地组织在另一个数据框
    positions_df 中，同样保存为 CSV 文件。随着我们向前推进，您将期待深入时间序列绘图和风险评估，您将学习如何可视化价格趋势并计算潜在的盈亏。
