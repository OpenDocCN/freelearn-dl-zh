- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: 'A Practical Roadmap: Implementing Agentic Patterns by Maturity Level'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过成熟度级别实施代理模式的实用路线图
- en: 'In the preceding chapters, we explored a comprehensive pattern language of
    design and architectural patterns focused on building agentic AI systems. We covered
    several categories of patterns: multi-agent coordination, explainability and compliance,
    robustness and fault tolerance, human-agent interaction, and the core capabilities
    of individual agents. With such a rich toolkit, the natural and most pressing
    question becomes: *Where do I start?*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们探讨了设计模式和架构模式的一个全面的模式语言，这些模式专注于构建代理人工智能系统。我们涵盖了几个模式的类别：多代理协调、可解释性和合规性、鲁棒性和容错性、人机交互以及个体代理的核心能力。有了这样一个丰富的工具包，自然而然且最紧迫的问题变成了：*我从哪里开始？*
- en: Implementing every pattern at once is not only impractical but often unnecessary.
    The key to successfully deploying idx_cc457ad0agentic AI is **progressive adoption**,
    that is, building a solid foundation of essential capabilities and then layering
    on more sophisticated patterns as your system's complexity, scale, and responsibilities
    grow.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性实施所有模式不仅不切实际，而且通常也不必要。成功部署代理人工智能的关键是**渐进式采用**，也就是说，先建立一个坚实的核心能力基础，然后随着系统的复杂性、规模和责任的增加，逐步添加更复杂的模式。
- en: 'This approach provides a vital roadmap: for those who want a simple implementation,
    they can focus on the foundational level, while for those who need the highest
    degree of sophistication, the advanced levels serve as an encyclopedic reference.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法提供了一个重要的路线图：对于那些想要简单实施的人，他们可以专注于基础层，而对于那些需要最高程度复杂度的人，高级层则作为一个百科全书式的参考。
- en: This chapter illustrates that roadmap, synthesizing the patterns discussed throughout
    *Part* *2* into three distinct maturity levels. Note that we have simplified the
    six levels of agentic AI maturity initially outlined in *[Chapter 3](Chapter_3.xhtml#h1_59)*,
    for a more accessible enterprise rollout by mapping 2 levels into one level resulting
    in basic , intermediate, and advanced maturity levels
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章阐述了该路线图，将第二部分讨论的模式综合为三个不同的成熟度级别。请注意，我们将最初在*[第3章](Chapter_3.xhtml#h1_59)*中概述的六个代理人工智能成熟度级别简化为六个级别，通过将两个级别映射到一个级别，从而得到基本、中级和高级成熟度级别。
- en: '**Level 1** **–** **The** **f****oundational** **s****ystem (****b****asic**
    **m****aturity)**: This level details the bare minimum set of patterns required
    to build a functional, single-process agentic system that can be deployed in a
    production setting. It focuses on getting a reliable proof of concept running
    to validate the core business logic.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**级别 1** **–** **基础系统（基本成熟度）**：此级别详细说明了构建一个功能性的、单进程代理系统所需的最小模式集，该系统可以在生产环境中部署。它侧重于运行一个可靠的证明概念，以验证核心业务逻辑。'
- en: '**Level 2** **–** **The** **p****roduction-****r****eady** **s****ervice (****i****ntermediate**
    **m****aturity)**: This level focuses on re-architecting the foundational system
    into a decoupled, resilient, and observable set of microservices. It introduces
    patterns for scalability, asynchronous communication, and robust fault tolerance.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**级别 2** **–** **生产就绪服务（中级成熟度）**：此级别侧重于将基础系统重构为解耦的、有弹性的和可观察的微服务集。它引入了可扩展性、异步通信和鲁棒容错性的模式。'
- en: '**Level 3** **–** **The** **s****elf-****i****mproving** **e****cosystem (****a****dvanced**
    **m****aturity)**: This level represents the cutting edge of agentic AI. It incorporates
    patterns for self-optimization, deep domain specialization, and adaptive learning,
    creating a system that not only performs its tasks but actively improves over
    time.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**级别 3** **–** **自我改进的生态系统（高级成熟度）**：此级别代表了代理人工智能的尖端。它结合了自我优化、深度领域专业化和自适应学习的模式，创建了一个不仅执行任务而且随着时间的推移积极改进的系统。'
- en: By following this roadmap, you can strategically select and implement the right
    set of patterns at the right time, ensuring your journey into agentic AI is both
    ambitious and achievable.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循此路线图，您可以战略性地选择和实施正确的模式集，确保您的进入代理人工智能之旅既雄心勃勃又可实现。
- en: Level 1 – The foundational system (basic maturity)
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 级别 1 – 基础系统（基本成熟度）
- en: The architectural objective to achieve at this level is to rapidly build and
    validate the core logic of an agentic idx_11c3eab0workflow in a single, monolithic,
    and synchronous application. The objective is to create a functional system that
    proves the business value of the agentic approach, even if it is not yet optimized
    for scale or resilience.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个级别要实现的架构目标是快速构建和验证代理idx_11c3eab0工作流程的核心逻辑，在一个单一、单体和同步的应用程序中。目标是创建一个功能系统，证明代理方法的价值，即使它尚未针对规模或弹性进行优化。
- en: '*Figure 12.1* illustrates the architecture of a Level 1 system. It depicts
    a monolithic, synchronous workflow where a central supervisor agent acts as the
    sole orchestrator, sequentially delegating tasks to worker idx_3ff11c2dagents
    to produce a final result. Notice how the architecture idx_4aae89ebexplicitly
    integrates key "safety net" patterns, such as ***Watchdog Timeout*** and ***Agent
    Calls Human***, to ensure that even this simple design remains reliable and governable
    in a production setting.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*图12.1*展示了第1级系统的架构。它描绘了一个单体、同步工作流程，其中中心监督代理作为唯一的协调器，依次将任务委派给工作idx_3ff11c2dagents以产生最终结果。注意架构idx_4aae89eb如何明确地整合关键“安全网”模式，如***看门狗超时***和***代理调用人工***，以确保即使在生产环境中，这种简单的设计也保持可靠和可控。'
- en: '![Image 1](img/B33147_12_1.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图像1](img/B33147_12_1.png)'
- en: Figure 12.1 – Level 1 patterns
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 – 第1级模式
- en: With this visual idx_5e7d50cfblueprint established, let's examine the guiding
    design philosophy that defines this maturity level.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立这个视觉idx_5e7d50cf蓝图之后，让我们来探讨定义这个成熟级别的指导设计哲学。
- en: Core architectural principle
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心架构原则
- en: At this foundational level, the guiding principle is simplicity to enable rapid
    validation. The primary objective idx_8e73098bis to prove the business value of
    the agentic workflow without the overhead of distributed systems. To achieve this,
    the system is built as a single, monolithic application where a central orchestrator
    synchronously calls worker agents. This predictable design ensures the system
    is easy to develop and debug, providing the quickest path to a functional prototype.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个基础层面，指导原则是简洁性，以实现快速验证。主要目标idx_8e73098bis是证明代理工作流程的商业价值，而不需要分布式系统的开销。为此，系统被构建为一个单一、单体应用程序，其中中心协调器同步调用工作代理。这种可预测的设计确保系统易于开发和调试，提供通往功能原型的最快路径。
- en: Patterns to implement
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现模式
- en: 'To build a idx_34541c61foundational system, you should focus on the most essential
    patterns from each category, including the following:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建一个idx_34541c61基础系统，你应该关注每个类别中最基本的模式，包括以下内容：
- en: '**Coordination** **and** **Planning (from** *[Chapter 5](Chapter_5.xhtml#h1_101)***)**:'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调和规划（来自*[第5章](Chapter_5.xhtml#h1_101)*）**：'
- en: '***Task Delegation Framework (Supervisor Architecture)***: This is the natural
    starting point. A single, central orchestrator agent is responsible for the entire
    workflow, providing a clear chain of command.'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***任务委派框架（监督架构）***：这是自然的起点。一个单一、中心的协调器代理负责整个工作流程，提供清晰的指挥链。'
- en: '***Multi-Agent Planning***: The orchestrator uses this pattern to perform basic
    task decomposition, breaking a user''s request into a hardcoded or simple, dynamic
    sequence of steps.'
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***多代理规划***：协调器使用此模式执行基本任务分解，将用户的请求分解为硬编码或简单、动态的步骤序列。'
- en: '**Explainability** **and** **Compliance (from** *[Chapter 6](Chapter_6.xhtml#h1_231)***)**:'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性和合规性（来自*[第6章](Chapter_6.xhtml#h1_231)*）**：'
- en: '***Basic Audit Logging***: While a full ***Causal Dependency Graph*** may be
    overkill, every action and decision must be logged to a file or console with timestamps,
    agent IDs, and outcomes. This is the non-negotiable minimum for debugging and
    accountability.'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***基本审计日志***：虽然完整的***因果依赖图***可能有些过度，但每个动作和决策都必须记录到带有时间戳、代理ID和结果的文件或控制台。这是调试和问责制的不可协商的最低要求。'
- en: '**Robustness** **and** **Fault Tolerance (from** *[Chapter 7](Chapter_7.xhtml#h1_269)***)**:'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒性和容错性（来自*[第7章](Chapter_7.xhtml#h1_269)*）**：'
- en: '***Watchdog Timeout Supervisor***: This is a critical safety net. Wrap all
    agent calls, especially idx_479583f6those involving external APIs, with a timeout
    to prevent a single hanging agent from freezing the entire application.'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***看门狗超时监督器***：这是一个关键的安全网。将所有代理调用，特别是idx_479583f6涉及外部API的调用，用超时包装，以防止单个挂起的代理冻结整个应用程序。'
- en: '***Simple Retry Mechanism***: Implement a basic loop to retry a failed task
    a fixed number of times. This handles transient network errors or API blips.'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***简单的重试机制***：实现一个基本的循环，以固定次数重试失败的任务。这处理瞬态网络错误或API闪烁。'
- en: '**Human-Agent Interaction (from** *[Chapter 8](Chapter_8.xhtml#h1_406)***)**:'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人机交互（来自*[第8章](Chapter_8.xhtml#h1_406)*）**：'
- en: '***Human Calls Agent***: This is the primary input mechanism for transactional,
    command-based tasks.'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***人类呼叫代理***：这是事务性、基于命令的任务的主要输入机制。'
- en: '***Agent Calls Human***: This is the essential safety valve. The system must
    have a simple, reliable way to stop and escalate to a human when it encounters
    a critical error or low-confidence situation.'
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理呼叫人类***：这是基本的安全阀。当系统遇到关键错误或低置信度情况时，它必须有一个简单、可靠的停止并升级到人类的方式。'
- en: '**Agent-Level Capabilities (from** *[Chapter 9](Chapter_9.xhtml#h1_455)***)**:'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理级能力（来自*[第9章](Chapter_9.xhtml#h1_455)*）**：'
- en: '***Single Agent Baseline***: This defines the structure of your worker agents,
    each equipped with a specific set of tools'
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***单一代理基线***：这定义了您的工人代理的结构，每个代理都配备了一套特定的工具。'
- en: '***Agent-Specific Memory (Short-Term)***: At a minimum, agents need a way to
    manage the context of the current session, such as storing the conversation history'
  id: totrans-33
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理特定内存（短期）***：至少，代理需要一种管理当前会话上下文的方法，例如存储对话历史。'
- en: '***Context-Aware Retrieval (Simple RAG)***: To ground the agent and prevent
    basic hallucinations, connect it to a single, core knowledge source via a straightforward
    RAG pipeline'
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***上下文感知检索（简单RAG）***：为了使代理接地并防止基本幻觉，通过简单的RAG管道将其连接到单个核心知识源。'
- en: '**System-Level Infrastructure (from** *[Chapter 10](Chapter_10.xhtml#h1_504)***)**:'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统级基础设施（来自*[第10章](Chapter_10.xhtml#h1_504)*）**：'
- en: '***Agent Authentication*** ***and*** ***Authorization***: Even in a monolithic
    system, if the agent needs to access internal APIs or databases, it must do so
    using a secure service account with clearly defined, least-privilege permissions'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理身份验证*** ***和*** ***授权***：即使在单体系统中，如果代理需要访问内部API或数据库，它也必须使用具有明确定义、最小权限的受保护服务账户来执行此操作。'
- en: Implementation focus
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现重点
- en: 'To achieve idx_e7836536the rapid validation shown in *Figure 12.1*, the implementation
    strategy deliberately trades scalability for speed and simplicity. Instead of
    building a distributed network of services, the focus is on creating a self-contained,
    executable prototype:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现*图12.1*中所示的快速验证，实现策略有意以速度和简单性为代价来换取可扩展性。不是构建一个服务器的分布式网络，而是专注于创建一个自包含、可执行的原型：
- en: '**Single-****p****rocess** **a****rchitecture**: As shown in the diagram, the
    entire workflow—from the *Supervisor* to *Worker* *B*—should run within a single
    application or script. This eliminates network latency and distributed system
    failures, allowing developers to debug the entire logic flow in a single IDE window.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单一进程架构**：如图所示，整个工作流程——从*Supervisor*到*Worker* *B*——应在单个应用程序或脚本中运行。这消除了网络延迟和分布式系统故障，允许开发者在单个IDE窗口中调试整个逻辑流程。'
- en: '**Hard****coded orchest****ration**: The logic connecting the *Supervisor Agent*
    to its workers is static. Unlike advanced systems that dynamically discover agents
    via a registry, a Level 1 implementation hardcodes the relationships (e.g., "If
    step A is done, call Worker B"). This mirrors the explicit arrows in the diagram,
    ensuring the workflow is deterministic and easy to trace.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬编码编排**：连接*Supervisor Agent*与其工人的逻辑是静态的。与通过注册表动态发现代理的高级系统不同，第1级实现硬编码了关系（例如，“如果步骤A完成，则调用Worker
    B”）。这反映了图中的显式箭头，确保工作流程是确定性的且易于追踪。'
- en: '**In-****m****emory** **s****tate** **m****anagement**: Data flowing through
    the diamond decision nodes and worker idx_b27cb64bagents does not need complex
    external databases. State is managed simply by passing a context object (such
    as a Python dictionary) between functions. This keeps the architecture flat and
    removes the overhead of managing persistent storage during the validation phase.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存状态管理**：数据通过菱形决策节点和工人idx_b27cb64bagents流动时，不需要复杂的外部数据库。状态通过在函数之间传递上下文对象（例如Python字典）来简单地管理。这保持了架构的扁平化，并在验证阶段消除了管理持久存储的开销。'
- en: By accepting these engineering constraints, we trade long-term flexibility for
    immediate execution. Let's look at the specific operational characteristics of
    the system that result from these choices.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过接受这些工程限制，我们以立即执行为代价换取长期灵活性。让我们看看这些选择导致的系统的具体操作特性。
- en: Resulting system and consequences
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果系统和后果
- en: The outcome is a functional but brittle system. It can successfully execute
    its intended workflow on the "happy path" and handle the most basic errors. However,
    it is not scalable, has high latency idx_dcaba8c7due to its synchronous nature,
    and would not survive a component crash. Its primary value lies in validating
    that the agentic workflow and core reasoning logic can effectively solve the business
    problem. This proof of value justifies the significant engineering investment
    required to re-architect the system for the scale and resilience of Level 2.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个功能但脆弱的系统。它可以在“快乐路径”上成功执行其预期的流程，并处理最基本错误。然而，它不可扩展，由于其同步特性，具有高延迟idx_dcaba8c7，并且无法在组件崩溃时生存。它的主要价值在于验证代理工作流和核心推理逻辑可以有效地解决业务问题。这种价值证明为重新架构系统以适应第二级的规模和弹性所需的重大工程投资提供了正当理由。
- en: These operational bottlenecks (tight coupling and blocking execution) set the
    stage for the necessary evolution. To transform this fragile prototype into a
    robust enterprise asset, we must break the monolith. This necessity leads us directly
    to Level 2, where we address these vulnerabilities by re-architecting the system
    into a set of resilient, asynchronous microservices.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这些操作瓶颈（紧密耦合和阻塞执行）为必要的演变奠定了基础。为了将这个脆弱的原型转变为一个健壮的企业资产，我们必须打破单体。这种必要性直接引导我们进入第二级，在那里我们通过重新架构系统为一个由弹性、异步的微服务组成的集合来解决这些漏洞。
- en: '**Note**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Many organizations may find that a well-built Level 1 system is sufficient for
    internal, non-critical automation tasks. Not every agentic system needs to evolve
    to the highest levels of maturity.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织可能会发现，一个构建良好的第一级系统对于内部非关键自动化任务来说是足够的。并非每个代理系统都需要发展到最高成熟度级别。
- en: Level 2 – The production-ready service (intermediate maturity)
  id: totrans-48
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二级 – 生产就绪服务（中级成熟度）
- en: The main objective to reach at this level is to re-architect the foundational
    prototype into a decoupled, scalable, resilient, and observable set of asynchronous
    microservices. The objective is to build idx_689fa2a7a production-ready system
    that is cost-efficient, secure, and trustworthy enough for real-world business
    operations.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 达到这一级的主要目标是重新架构基础原型为一个解耦、可扩展、弹性、可观察的异步微服务集合。目标是构建一个idx_689fa2a7a生产就绪的系统，该系统成本效益高、安全可靠，足以应对现实世界的商业运营。
- en: The following figure describes the transformation from a monolith to a distributed
    network. The central idx_03294beamessage bus replaces direct function calls, acting
    as the nervous system that enables ***Event-Driven Reactivity***. Notice that
    *Agent A*, *Agent B*, and *Agent C* no longer rely on the Orchestrator for every
    immediate instruction; instead, they subscribe to relevant events, allowing for
    asynchronous and parallel execution.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 下图描述了从单体到分布式网络的转变。中央idx_03294beamessage总线取代了直接函数调用，充当使**事件驱动反应性**成为可能的神经系统。请注意，*代理A*、*代理B*和*代理C*不再依赖于指挥官进行每个即时指令；相反，它们订阅相关事件，允许异步和并行执行。
- en: '![Image 2](img/B33147_12_2.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图像2](img/B33147_12_2.png)'
- en: Figure 12.2 – Level 2 maturity
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 – 第二级成熟度
- en: 'This architecture introduces dedicated infrastructure to support this complexity:
    ***Tool*** ***and*** ***Agent Registry*** allows the idx_a5048610orchestrator
    to dynamically discover available services (supporting the ***Agent Delegates
    to Agent*** pattern), while ***Shared*** ***Memory*** (such as Redis) ensures
    idx_7a068738that state is persisted outside of the individual agents. This separation
    ensures that if an agent crashes, it can be auto-healed without losing the context
    of the ongoing transaction.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构引入了专门的基础设施来支持这种复杂性：***工具*** ***和*** ***代理注册表***允许指挥器动态发现可用的服务（支持***代理代表代理***模式），而***共享***
    ***内存***（如Redis）确保idx_7a068738状态在单个代理之外持久化。这种分离确保如果一个代理崩溃，它可以自动修复而不会丢失正在进行的交易上下文。
- en: Core architectural principle
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心架构原则
- en: At this intermediate level, the guiding principle is decoupling for scalability
    and resilience. Unlike the idx_cda123f9monolithic prototype, a production-ready
    system must be able to survive component failures and handle fluctuating loads
    without collapsing. However, the transition to microservices should be driven
    by necessity. Microservices introduce significant operational complexity, so this
    architectural shift is recommended only when the monolithic approach no longer
    meets the system's requirements for scale, fault isolation, or team velocity.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个中间级别，指导原则是解耦以实现可扩展性和弹性。与 idx_cda123f9monolithic 原型不同，一个生产就绪的系统必须能够承受组件故障并处理波动负载而不会崩溃。然而，向微服务的转变应由必要性驱动。微服务引入了显著的操作复杂性，因此只有在单体方法不再满足系统对规模、故障隔离或团队速度的要求时，才建议进行这种架构转变。
- en: 'When this shift is justified, the architecture relies on three fundamental
    structural changes:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当这种转变是合理的时候，架构依赖于三个基本的结构变化：
- en: '**Asynchronous** **c****ommunication via** **m****essage** **b****us**: Instead
    of *Agent A* directly calling *Agent B* and waiting for a response (blocking execution),
    *Agent A* publishes an event to the central message bus. Relevant agents subscribe
    to these events and process them in parallel. This decoupling prevents a single
    slow agent from creating a bottleneck that freezes the entire system.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过** **消息** **总线** **的** **异步** **通信**：*代理A* 不是直接调用 *代理B* 并等待响应（阻塞执行），而是将事件发布到中央消息总线。相关的代理订阅这些事件并并行处理它们。这种解耦防止单个缓慢的代理创建瓶颈，从而冻结整个系统。'
- en: '**Service** **i****solation**: Each agent operates as an independent service
    (typically containerized). If *Agent A* crashes due to a bug or memory leak, *Agent
    B* and *Agent C* remain idx_fb7d7b9funaffected. This isolation idx_4146252bis
    what enables ***A******uto-******H******ealing***; the infrastructure can detect
    the crash and restart the specific failed agent automatically without bringing
    down the application.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务** **隔离**：每个代理作为一个独立的服务（通常是容器化）运行。如果 *代理A* 由于错误或内存泄漏而崩溃，*代理B* 和 *代理C* 仍然不受影响。这种隔离是
    **自动** **自我** **修复** 的基础；基础设施可以检测到崩溃并自动重启特定的失败代理，而无需关闭应用程序。'
- en: '**Externalized** **s****tate**: In Level 1, the application state lived in
    the script''s memory. In Level 2, the state is pushed to ***S******hared*** ***M******emory***
    (such as Redis or a database). This ensures that if an agent is restarted, it
    can retrieve the current context or task status from the shared idx_e80c34f7store
    and resume work immediately, facilitating ***I******ncremental*** ***C******heckpointing***.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部化** **状态**：在级别1中，应用程序状态存在于脚本的内存中。在级别2中，状态被推送到 ***S******hared*** ***M******emory***（例如
    Redis 或数据库）。这确保了如果代理被重启，它可以从共享的 idx_e80c34f7存储中检索当前上下文或任务状态并立即继续工作，从而促进 ***I******ncremental***
    ***C******heckpointing***。'
- en: Patterns to implement
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现模式
- en: 'This level idx_666c80c8builds upon the foundational patterns and introduces
    more sophisticated solutions, including the following:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这个级别在基础模式的基础上构建，并引入了更复杂的解决方案，包括以下内容：
- en: '**Coordination** **and** **Planning (from** *[Chapter 5](Chapter_5.xhtml#h1_101)***)**:'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调** **和** **规划（来自** *[第5章](Chapter_5.xhtml#h1_101)***）**：'
- en: '***Hybrid Delegation Framework***: The system may evolve to a hybrid model
    where a top-level orchestrator delegates tasks to self-organizing swarms or "crews"
    of agents.'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***混合委托框架***：系统可能演变为混合模型，其中顶级协调器将任务委托给自我组织的蜂群或“船员”代理。'
- en: '***Knowledge Sharing***: A simple idx_763d6b01in-memory state is replaced by
    a persistent, ***S******hared*** ***E******pistemic*** ***M******emory*** (e.g.,
    a Redis cache or a dedicated database) that all agents can access. To ensure production
    stability, this implementation must include concurrency controls to idx_466e932eprevent
    race conditions, **Time-to-Live** (**TTL**) policies for data hygiene, and semantic
    indexing to ensure efficient retrieval.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***知识共享***：简单的 idx_763d6b01内存状态被替换为持久化的、***S******hared*** ***E******pistemic***
    ***M******emory***（例如，Redis 缓存或专用数据库），所有代理都可以访问。为了确保生产稳定性，此实现必须包括并发控制以 idx_466e932eprevent
    竞态条件，**TTL**（生存时间）策略以维护数据卫生，以及语义索引以确保高效检索。'
- en: '**Explainability** **and** **Compliance (from** *[Chapter 6](Chapter_6.xhtml#h1_231)***)**:'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性** **和** **合规性（来自** *[第6章](Chapter_6.xhtml#h1_231)***）**：'
- en: '***Instruction Fidelity Auditing*****and** ***Persistent Instruction Anchoring***:
    These are now formally implemented to prevent instruction drift in more complex,
    multi-hop workflows'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***指令保真度审计*****和** ***持久指令锚定***：这些现在已正式实施，以防止在更复杂、多跳工作流程中的指令漂移'
- en: '***Causal Dependency Graph*** **(from** *[Chapter 7](Chapter_7.xhtml#h1_269)***)**:
    Basic logging is upgraded to a structured, auditable graph that traces the full
    lineage of every decision'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***因果依赖图*** **（来自** *[第7章](Chapter_7.xhtml#h1_269)***)**：基本的日志记录升级为结构化、可审计的图，追踪每个决策的完整血统。'
- en: '**Robustness** **and** **Fault Tolerance (from** *[Chapter 7](Chapter_7.xhtml#h1_269)***)**:'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒性和容错性（来自** *[第7章](Chapter_7.xhtml#h1_269)***)**：'
- en: '***Adaptive Retry with Prompt Mutation***: Simple retries are enhanced with
    logic to modify the prompt on failure.'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***自适应重试与提示变异***：简单的重试通过修改失败时的提示逻辑得到增强。'
- en: '***Auto-Healing Agent Resuscitation*** ***and*** ***Incremental Checkpointing***:
    The system idx_2f377d94can now automatically restart crashed agent services and
    resume long-running tasks from the last saved state. To prevent infinite "crash
    loops" caused by persistent errors, this mechanism must be governed by exponential
    backoff strategies and maximum retry thresholds.'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***自动恢复代理复活*** ***和*** ***增量检查点***：系统idx_2f377d94现在可以自动重启崩溃的代理服务，并从最后保存的状态恢复长时间运行的任务。为了防止由持续错误引起的无限“崩溃循环”，此机制必须由指数退避策略和最大重试阈值来管理。'
- en: '***Fallback Model Invocation***: Provides a business continuity plan for LLM
    API outages.'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***回退模型调用***：为LLM API中断提供业务连续性计划。'
- en: '***Rate-Limited Invocation***: Protects downstream APIs and manages costs.'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***速率限制调用***：保护下游API并管理成本。'
- en: '**Human-Agent Interaction (from** *[Chapter 8](Chapter_8.xhtml#h1_406)***)**:'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人机交互（来自** *[第8章](Chapter_8.xhtml#h1_406)***)**：'
- en: '***Agent Delegates to Agent***: The internal complexity of multi-agent collaboration
    is now abstracted away from the user'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理委托给代理***：多代理协作的内部复杂性现在从用户那里抽象出来。'
- en: '***Agent Calls Proxy Agent***: Securely manages all interactions with external,
    third-party systems'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理调用代理***：安全地管理所有与外部、第三方系统的交互。'
- en: '**Agent-Level Capabilities (from** *[Chapter 9](Chapter_9.xhtml#h1_455)***)**:'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理级能力（来自** *[第9章](Chapter_9.xhtml#h1_455)***)**：'
- en: '***Advanced RAG***: The RAG pipeline is enhanced with techniques such as re-ranking
    and query transformation to improve retrieval quality'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***高级RAG***：RAG管道通过诸如重新排序和查询转换等技术得到增强，以改善检索质量。'
- en: '**System-Level Infrastructure (from** *[Chapter 10](Chapter_10.xhtml#h1_504)***)**:'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统级基础设施（来自** *[第10章](Chapter_10.xhtml#h1_504)***)**：'
- en: '***Tool and Agent Registry***: This becomes essential for a microservices architecture,
    allowing agents to dynamically discover each other'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***工具和代理注册表***：这对于微服务架构至关重要，允许代理动态发现彼此'
- en: '***Event-Driven Reactivity***: The entire system is re-architected around a
    central message bus (such as Kafka or Google Cloud Pub/Sub), enabling asynchronous,
    scalable communication'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***事件驱动反应性***：整个系统围绕一个中心消息总线（如Kafka或Google Cloud Pub/Sub）重新架构，实现异步、可扩展的通信。'
- en: Implementation focus
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现重点
- en: 'To build idx_179dcd25the architecture we introduced in *Figure 12.2*, the implementation
    focus shifts from writing logic to engineering infrastructure. The goal is to
    create an environment where the decoupled components can operate reliably at scale:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建我们在*图12.2*中引入的架构idx_179dcd25，实现重点从编写逻辑转向工程基础设施。目标是创建一个环境，使解耦的组件能够可靠地在大规模上运行：
- en: '**Containerization (Docker)**: As depicted in the diagram, *A**gent A*, *A**gent
    B*, and *A**gent C* are distinct entities. In practice, each agent is packaged
    into its own container with its specific dependencies (e.g., Python libraries,
    drivers). This isolation prevents "dependency hell" and ensures that an update
    to *A**gent A*''s environment does not inadvertently break Agent B.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器化（Docker）**：如图所示，*代理A*、*代理B*和*代理C*是不同的实体。在实践中，每个代理都打包到自己的容器中，并包含其特定的依赖项（例如，Python库、驱动程序）。这种隔离防止了“依赖地狱”，并确保更新*代理A*的环境不会意外地破坏代理B。'
- en: '**Orchestration (Kubernetes)**: Managing dozens of independent containers requires
    an orchestrator. Kubernetes serves as the invisible hand that manages the life
    cycle of the agents in the diagram. It handles auto-healing (detecting whether
    *A**gent B* crashes and restarting it automatically) and horizontal scaling (spinning
    up multiple copies of *A**gent C* if the load increases), ensuring the resilience
    promised by this maturity level.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排（Kubernetes）**：管理数十个独立的容器需要一个编排器。Kubernetes充当了管理图中代理生命周期的无形之手。它处理自动恢复（检测*代理B*是否崩溃并自动重启它）和水平扩展（如果负载增加，则启动多个*代理C*的副本），确保了这一成熟级别所承诺的弹性。'
- en: '**Event** **i****nfrastructure (****m****essage** **b****us)**: The central
    circle in *Figure 12.2* represents the implementation of a robust message broker
    such as Apache Kafka, RabbitMQ, or Google Cloud Pub/Sub. The implementation focus
    here is on defining clear topics and idx_9cadc97aschemas so that agents can publish
    and subscribe to events without knowing who is on the other end, enabling true
    ***E******vent-******D******riven*** ***R******eactivity***.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事件** **基础设施（消息总线）**：*图12.2*中的中心圆圈代表了一个健壮的消息代理（如Apache Kafka、RabbitMQ或Google
    Cloud Pub/Sub）的实现。这里的实现重点在于定义清晰的**主题**和idx_9cadc97aschemas，以便代理可以发布和订阅事件，而无需知道另一端是谁，从而实现真正的**事件驱动**
    **反应性**。'
- en: '**Infrastructure as Code (IaC)** **and** **CI/CD**: Because the system is no
    longer a single script, manual deployment is risky and unscalable. Implementation
    at this level requires defining the infrastructure (registry, Redis, or message
    bus) using tools such as **Terraform** and idx_747fc5a1establishing CI/CD pipelines.
    This allows individual agents to be updated, tested, and deployed independently,
    minimizing the risk of system-wide regressions during updates.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施即代码（IaC）** **和** **CI/CD**：因为系统不再是单个脚本，手动部署是危险的且不可扩展的。在这个层面的实现需要使用**Terraform**等工具定义基础设施（注册表、Redis或消息总线），并建立CI/CD管道。这允许单个代理独立更新、测试和部署，最小化在更新过程中出现系统级回归的风险。'
- en: The shift to this distributed model solves the fragility issues of Level 1,
    but it introduces new dynamics in how the system operates and fails.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 向这种分布式模型的转变解决了第1级的不稳定问题，但它在系统操作和失败方面引入了新的动态。
- en: Resulting system and consequences
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果系统和后果
- en: The system is now a robust, observable, and secure production service. It can
    scale to handle real-world load, recover from common failures, and be maintained
    by an operations team. The consequence idx_6c48a646of this resilience is a significant
    increase in architectural complexity. Managing a distributed system of dozens
    of specialized microservices requires a mature DevOps and MLOps culture.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 系统现在是一个健壮的、可观察的和安全的production服务。它可以扩展以处理现实世界的负载，从常见的故障中恢复，并由运维团队维护。这种弹性的后果是架构复杂性的显著增加。管理数十个专业微服务的分布式系统需要成熟的DevOps和MLOps文化。
- en: 'However, stability is not the same as intelligence. A Level 2 system, for all
    its robustness, remains static: it executes the same logic tomorrow as it did
    today. To unlock the true transformative potential of agentic AI, we must move
    beyond mere execution to adaptation. This brings us to the final frontier of maturity,
    where we transform our stable architecture into a dynamic engine of continuous
    learning.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，稳定性并不等同于智能。第2级系统，尽管其稳健性，仍然保持静态：它明天执行的逻辑与今天相同。为了释放代理AI的真实变革潜力，我们必须超越单纯的执行，转向适应。这把我们带到了成熟度的最终前沿，我们将稳定的架构转变为一个持续学习的动态引擎。
- en: Level 3 – The self-improving ecosystem (advanced maturity)
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3级 – 自我改进的生态系统（高级成熟度）
- en: At this level, the main architectural objective is to evolve the production-ready
    service into a state-of-the-art, self-improving system that develops deep domain
    expertise and optimizes its own performance idx_f5f3928bthrough automated feedback
    loops and strategic analysis.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个层面，主要的架构目标是使生产就绪服务演变成一个前沿的、自我改进的系统，该系统能够发展深厚的领域专业知识并通过自动反馈循环和战略分析优化其自身性能
    idx_f5f3928b。
- en: The following diagram illustrates the transition from a static execution engine
    to a cyclic learning machine. Unlike the linear flows of previous levels, this
    architecture is dominated by the self-improvement loop. Notice how logs and outputs
    are not just stored for audit (as in Level 2) but are piped back into an MLOps
    tuning pipeline. This pipeline uses synthetic data generators to augment real-world
    experience, creating a rich training dataset that produces updated models and
    improved logic. These improvements are then continuously deployed back to the
    orchestrator and agent swarm, ensuring the system gets smarter with every transaction.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 下图说明了从静态执行引擎到循环学习机的转变。与之前级别的线性流程不同，此架构由自我改进循环主导。注意日志和输出不仅被存储以供审计（如第2级），还被管道回输到MLOps调优管道中。此管道使用合成数据生成器来增强现实世界经验，创建一个丰富的训练数据集，该数据集产生更新的模型和改进的逻辑。然后，这些改进持续部署回编排器和代理群，确保系统在每次交易中变得更聪明。
- en: '![Image 3](img/B33147_12_3.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图像3](img/B33147_12_3.png)'
- en: Figure 12.3 – Level 3 patterns
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 – 第3级模式
- en: With this closed-loop architecture in mind, let's examine the guiding principle
    that makes this evolution possible.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑到这种闭环架构的情况下，让我们来探讨使这种进化成为可能的指导原则。
- en: Core architectural principle
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心架构原则
- en: The core principle idx_b515e993here is **self-optimization**. The system is
    no longer static; it is a idx_94b0b6dedynamic, learning ecosystem. It is designed
    not only to perform its tasks but also to measure its own performance, learn from
    its successes and failures, and adapt its behavior to become more effective and
    efficient over time.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 核心原则idx_b515e993在这里是**自我优化**。系统不再是静态的；它是一个idx_94b0b6ded动态的学习生态系统。它不仅被设计来执行其任务，还设计来衡量其自身性能，从其成功和失败中学习，并随着时间的推移调整其行为以变得更加有效和高效。
- en: 'To achieve this state of autonomous improvement, the architecture relies on
    three fundamental pillars:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这种自主改进的状态，架构依赖于三个基本支柱：
- en: '**Closed-****l****oop** **l****earning**: The architecture is designed to capture
    its own outputs—both successes and failures—and use them as training data. By
    integrating MLOps tuning pipelines directly into the runtime, the system can fine-tune
    its models (using patterns idx_2515b830such as ***Coevolved Agent*** ***Trainin*****g**)
    to adapt to shifting data distributions without manual engineering intervention.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**闭环学习**：该架构被设计用来捕获其自身的输出——无论是成功还是失败——并将它们用作训练数据。通过将MLOps调优管道直接集成到运行时，系统可以微调其模型（使用如**协同进化代理**
    **训练**等模式）以适应数据分布的变化，而无需手动工程干预。'
- en: '**Emergent** **c****oordination**: Instead of relying solely on top-down orchestration,
    agents are idx_97926f9cempowered with "social" skills. Patterns such as **Consensus
    & Negotiation** allow the ***A******gent*** ***S******warm*** to resolve ambiguity
    idx_8f2c3726and resource conflicts autonomously, reducing the burden on the central
    orchestrator and enabling the system to handle novel, undefined scenarios.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**涌现** **协调**：而不是仅仅依赖自上而下的编排，代理被赋予了“社交”技能。如**共识与谈判**等模式允许**代理** **群**自主解决模糊性idx_8f2c3726和资源冲突，减轻中央编排器的负担，并使系统能够处理新颖、未定义的场景。'
- en: '**Safe** **e****volution**: Because the system changes dynamically, stability
    is managed through idx_6c0d0132rigorous automated testing. ***Canary*** ***Testing***
    and ***Trust D******ecay*** ensure idx_d60a1a50that "improved" logic is validated
    against real-world performance metrics before being fully trusted, preventing
    regression as the system evolves.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全** **进化**：由于系统是动态变化的，稳定性通过idx_6c0d0132严格的自动化测试来管理。**金丝雀测试**和**信任衰减**确保idx_d60a1a50“改进”的逻辑在完全信任之前与实际性能指标进行验证，防止系统演变过程中的回归。'
- en: Patterns to implement
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现模式
- en: 'This level idx_1a8572aaintroduces the most advanced patterns, focused on learning,
    strategic evaluation, and complex collaboration, including the following:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此级别idx_1a8572a引入了最先进的模式，专注于学习、战略评估和复杂协作，包括以下内容：
- en: '**Coordination** **and** **Planning (from** *[Chapter 5](Chapter_5.xhtml#h1_101)***)**:'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调** **和** **规划（来自** *[第5章](Chapter_5.xhtml#h1_101)**）**：'
- en: '***Consensus, Negotiation,*** ***and*** ***Conflict Resolution***: The system
    now has the "social" skills to handle ambiguity and disagreement autonomously.
    Agents can debate conflicting data, negotiate for resources, and resolve conflicting
    plans without needing a top-down directive.'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***共识、协商** **和** ***冲突解决***：系统现在拥有“社交”技能，可以自主处理模糊性和分歧。代理可以辩论冲突数据，协商资源，并解决冲突计划，而无需自上而下的指令。'
- en: '**Explainability** **and** **Compliance (from** *[Chapter 6](Chapter_6.xhtml#h1_231)***)**:'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性** **和** **合规性（来自** *[第6章](Chapter_6.xhtml#h1_231)***)**：'
- en: '***Fractal CoT Embedding***: Agents use this advanced reasoning pattern for
    recursive self-correction, enabling them to catch their own logical flaws and
    revise their plans based on new evidence'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***分形CoT嵌入***：代理使用这种高级推理模式进行递归自我纠正，使它们能够捕捉自己的逻辑错误并根据新证据修改计划'
- en: '**Robustness** **and** **Fault Tolerance (from** *[Chapter 7](Chapter_7.xhtml#h1_269)***)**:'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒性和容错性（来自** *[第7章](Chapter_7.xhtml#h1_269)***)**：'
- en: '***Majority Voting Across Agents***: For the most critical decisions, a panel
    of agents is used to achieve extreme reliability'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理间的多数投票***：对于最重要的决策，使用一组代理以实现极端可靠性'
- en: '***Trust Decay*** ***and*** ***Scoring***: The orchestrator implements a reputation
    system to adaptively route tasks to the most reliable agents'
  id: totrans-111
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***信任衰减** **和** **评分**：协调器实现了一个声誉系统，以自适应地将任务路由到最可靠的代理'
- en: '***Canary Agent Testing***: New agent versions are deployed safely into production
    without risking system stability'
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***金丝雀代理测试***：新代理版本可以安全地部署到生产环境中，而不会影响系统稳定性'
- en: '**Agent-Level Capabilities (from** *[Chapter 9](Chapter_9.xhtml#h1_455)***)**:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理级能力（来自** *[第9章](Chapter_9.xhtml#h1_455)***)**：'
- en: '***Agentic RAG*** ***and*** ***Graph-Vector Hybrid Retrieval***: The system
    builds and maintains its own rich knowledge graph, combining it with vector search
    for state-of-the-art domain expertise'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***代理RAG*** **和** ***图-向量混合检索***：系统构建并维护自己的丰富知识图谱，将其与向量搜索相结合，以实现最先进的领域专业知识'
- en: '**Continuous Improvement** **and** **Tuning (from** *Chapters 3* **and** *14***)**:'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进** **和** **调整（来自** *第3章* **和** *第14章**）**：'
- en: '***Hybrid Workflow Agent Architecture*** **(Planner + Scorer)**: The system
    uses a generator-evaluator pairing to create and vet its own workflows'
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***混合工作流程代理架构*** **（规划器 + 评分器）**：系统使用生成器-评估器配对来创建和审查其自身的工作流程'
- en: '***Coevolved Agent Training***: The planner and scorer agents are improved
    in tandem idx_b485bb69using a mix of SFT, DPO, and iterative learning'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***协同进化的代理训练***：规划器和评分器代理通过结合SFT、DPO和迭代学习同步改进'
- en: '***Preference-Controlled Synthetic Data Generation***: To prevent runaway divergence
    or collusion, where agents reinforce shared biases or drift into satisfying each
    other''s quirks rather than the business objective, this generation process requires
    strict offline evaluation benchmarks and periodic human-in-the-loop validation'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***偏好控制的合成数据生成***：为了防止代理之间出现失控的分歧或勾结，即代理强化共享偏见或陷入满足彼此怪癖而不是业务目标的陷阱，此生成过程需要严格的离线评估基准和定期的人机交互验证'
- en: '***Custom Evaluation Metrics***: Domain-specific metrics (such as the **STEPScore**)
    are developed to measure workflow quality accurately'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***自定义评估指标***：为准确测量工作流程质量，开发了特定领域的指标（例如 **STEPScore**）'
- en: Implementation focus
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施重点
- en: 'To realize idx_365f348athe self-improving cycle shown in *Figure 12.3*, the
    engineering focus shifts from application logic to building a sophisticated MLOps
    and DataOps infrastructure. The goal is to close the loop between execution and
    training without requiring manual intervention:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现*图12.3*中显示的自我改进循环，工程重点从应用逻辑转移到构建复杂的MLOps和DataOps基础设施。目标是关闭执行和训练之间的循环，而无需人工干预：
- en: '**Automated** **d****ata** **s****ynthesis**: As depicted by the **Synthetic
    Data Generator** box on the left idx_50b4f70fof the diagram, the system cannot
    rely solely on organic user data, which is often sparse or noisy. Implementation
    requires building pipelines where planner agents generate scenarios and scorer
    agents label them, creating a clean dataset to fuel the learning process.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化** **数据** **合成**：如图表左侧的**合成数据生成器**框所示，系统不能仅依赖于有机用户数据，这些数据通常稀疏或噪声。实施需要构建管道，其中规划器代理生成场景，评分器代理对其进行标记，创建一个干净的训练数据集。'
- en: '**Continuous** **t****uning** **p****ipelines**: The **MLOps Tuning Pipeline**
    is the engine of this architecture. Unlike Level 2, where idx_bf8ad485models are
    static assets, this level requires infrastructure (such as Kubeflow or Vertex
    AI Pipelines) that can automatically ingest data, trigger fine-tuning (SFT) or
    DPO jobs, and produce updated models.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续** **调整** **管道**：**MLOps调整管道**是这个架构的引擎。与第2级不同，那里的idx_bf8ad485模型是静态资产，这一级需要基础设施（如Kubeflow或Vertex
    AI管道），这些基础设施可以自动摄取数据，触发微调（SFT）或DPO作业，并生成更新后的模型。'
- en: '**Feedback** **l****oop** **i****ntegration**: The arrow flowing from **Logs
    & Outputs** back into the pipeline represents the critical data engineering challenge:
    transforming raw execution logs into structured training examples. This requires
    implementing ***Custom Evaluation Metrics*** (such as the STEPScore) to programmatically
    grade agent performance and signal the tuning pipeline on what to reinforce.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈** **循环** **集成**：从**日志与输出**回流到管道的箭头代表了关键的数据工程挑战：将原始执行日志转换为结构化的训练示例。这需要实施**自定义评估指标**（如STEPScore），以编程方式评估代理性能，并向调整管道发出信号，告知哪些方面需要加强。'
- en: '**Safe** **m****odel** **p****romotion**: The arrow moving from **Updated Models**
    to the ***Agent Swarm*** implies a robust deployment strategy. Implementation
    here requires ***Canary Testing*** infrastructure to automatically evaluate the
    new model against a control idx_925ee63egroup before allowing it to take over
    full production traffic.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全** **模型** **推广**：从**更新后的模型**到**代理群**的箭头意味着一个稳健的部署策略。在这里的实施需要**金丝雀测试**基础设施，在允许新模型接管全部生产流量之前，自动评估新模型与控制idx_925ee63egroup的对比。'
- en: This architecture transforms the system from a static utility into an asset
    that increases in value over time.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这个架构将系统从静态效用转变为随着时间的推移而增值的资产。
- en: Resulting system and consequences
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果系统和后果
- en: The outcome is a state-of-the-art system that acts as a dynamic, evolving expert
    for its domain. It not idx_73437fa0only provides accurate answers but also improves
    its own capabilities, hardens its defenses, and can demonstrate its strategic
    value through business-aligned metrics. The cost of this sophistication is extreme
    complexity and a significant, ongoing investment in the infrastructure and expertise
    required to maintain the automated knowledge creation and training loops.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个最先进系统，作为其领域的动态、演化的专家。它不仅提供准确的答案，还提高自己的能力，加固其防御，并通过与业务对齐的指标展示其战略价值。这种复杂性的代价是极端的复杂性和对维护自动化知识创造和训练循环所需的基础设施和专业知识的大规模、持续投资。
- en: 'Your agentic roadmap: A strategic reflection guide'
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您的代理路线图：战略反思指南
- en: You have now seen the roadmap from a simple, foundational system to a complex,
    self-improving idx_250242d1ecosystem. This model provides the *what*, a catalog
    of possibilities and patterns. The most important step, however, is to translate
    this map into a concrete plan for your own project, that is the *how* and the
    *when*.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在已经看到了从简单的基础系统到复杂、自我优化的idx_250242d1ecosystem的发展路线图。这个模型提供了*什么*，一个可能性和模式的目录。然而，最重要的步骤是将这个地图转化为您自己项目的具体计划，即*如何*和*何时*。
- en: The following section is designed to facilitate that translation, moving you
    from architectural theory to strategic action. Think of it not as a test but as
    a structured conversation with your team to chart the course for your agentic
    system's evolution.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 以下部分旨在促进这种转化，将您从架构理论引导到战略行动。不要将其视为测试，而应将其视为与团队进行的结构化对话，以规划您的代理系统演化的路线。
- en: 'The journey begins: Where are you today?'
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 旅程开始了：您现在在哪里？
- en: 'To successfully navigate this roadmap and chart your specific course, you must
    first determine your starting location. Every successful agentic system begins
    with an honest assessment of its current state idx_cb384410and immediate goals.
    Start by asking your team: *Is this a brand-new, exploratory proof**of**concept
    or are we trying to scale an existing, perhaps brittle, automation* *system**?*
    The answer will fundamentally shape your next steps.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功导航这个路线图并规划您的特定路线，您必须首先确定您的起点。每个成功的代理系统都始于对其当前状态idx_cb384410和直接目标的诚实施评估。从询问您的团队开始：*这是一个全新的、探索性的概念验证，还是我们试图扩展一个现有的、可能脆弱的自动化*
    **系统**？* 答案将从根本上塑造您的下一步行动。
- en: Your primary business objective for the near term is your compass. Are you trying
    to simply validate that an agentic workflow can solve a specific problem? If so,
    your focus is squarely on Level 1.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你近期的首要商业目标是你的指南针。你是在尝试简单地验证一个代理工作流程可以解决一个特定问题吗？如果是这样，你的焦点完全集中在第一级。
- en: Or is the goal to build a resilient, scalable service that can handle real-world
    load? This points you toward Level 2.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 或者目标是构建一个具有弹性和可扩展性的服务，能够处理现实世界的负载？这指引你走向第二级。
- en: Perhaps you are at the cutting edge, and the objective is to create a self-improving
    expert that becomes a durable competitive advantage. This is the ambitious path
    to Level 3.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你处于前沿，目标是创建一个自我改进的专家，成为持久的竞争优势。这是通往第三级的雄心之路。
- en: Finally, consider your team's current expertise. Are you fluent in distributed
    systems and MLOps or is this a new frontier? Honesty here will prevent you from
    over-architecting a system that you cannot maintain.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，考虑你团队当前的专业知识。你是否精通分布式系统和MLOps，或者这是一个新的领域？诚实将防止你过度设计一个你无法维护的系统。
- en: The outcome idx_c0c8cf6eof this initial reflection is a clear identification
    of which maturity level best describes your immediate, practical goal. This defines
    the scope for your initial or next implementation, ensuring you solve the right
    problem for right now.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这种初步反思的结果是明确地识别出哪个成熟度级别最能描述你的直接、实际目标。这定义了你的初始或下一实施的范围，确保你解决当前正确的正确问题。
- en: 'Laying the foundation: What is your minimum viable agent?'
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奠定基础：你的最小可行代理是什么？
- en: Once you have identified your starting point and strategic destination, the
    next step is execution. If your idx_62c04ffeassessment placed you at Level 2 or
    3, you might be tempted to immediately provision complex microservices or orchestration
    swarms. However, successful agentic engineering requires a discipline of progressive
    validation.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你确定了起点和战略目标，下一步就是执行。如果你的评估将你定位在第二级或第三级，你可能想立即提供复杂的微服务或编排集群。然而，成功的代理工程需要逐步验证的纪律。
- en: Regardless of your ultimate target, the development life cycle of a new agentic
    workflow should begin by establishing a **L****evel 1** **f****oundational** **s****ystem**
    as a validation step. Think of this not necessarily as idx_95c0d84eyour final
    architectural destination but as the **minimum viable agent** (**MVA**) phase
    of your engineering process. Even sophisticated engineering teams use this phase
    to isolate and perfect the agent's reasoning logic, tool interactions, and safety
    guardrails within a controlled, monolithic environment before adding the complexity
    of distributed systems.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你的最终目标是什么，一个新代理工作流程的开发生命周期应该从建立一个**L****evel 1** **f****oundational** **s****ystem**作为验证步骤开始。不要把它当作你的最终架构目标，而把它看作你的工程过程的**minimum
    viable agent** (**MVA**)阶段。即使是复杂的工程团队也会使用这个阶段来在受控的单一环境中隔离和完美化代理的推理逻辑、工具交互和安全防护，然后再添加分布式系统的复杂性。
- en: 'Resist the urge to over-engineer the initial logic. Ask your team: *W**hat
    is the simplest possible version of this system that proves our core business
    logic works?*'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 抵制过度工程化初始逻辑的冲动。问你的团队：*W**hat is the simplest possible version of this system
    that proves our core business logic works?*
- en: Can the workflow be idx_74d558a6managed by a single ***Supervisor Architecture***
    to start? This allows you to debug cognitive errors and prompt logic before introducing
    the latency and tracing challenges of a distributed architecture. From there,
    focus on the most critical risks. If the agent calls an external API, a ***Watchdog
    Timeout*** is not a luxury; it's a necessity. If the system could get stuck in
    a state of ambiguity, a safe ***Agent Calls Human*** escape hatch is non-negotiable.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 最初能否由一个单独的***Supervisor Architecture***来管理？这允许你在引入分布式架构的延迟和跟踪挑战之前调试认知错误和提示逻辑。从那里开始，关注最关键的风险。如果代理调用外部API，一个***Watchdog
    Timeout***不是奢侈品；它是必需的。如果系统可能陷入模糊状态，一个安全的***Agent Calls Human***逃生口是不可或缺的。
- en: By validating your patterns at this foundational level first, you ensure that
    when you do scale to Level 2 or 3, you are scaling a system that is already fundamentally
    functional and safe.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 通过首先在这个基础级别验证你的模式，你确保当你扩展到第二级或第三级时，你是在扩展一个已经从根本上功能性和安全的系统。
- en: 'Building for scale: What is your path to production?'
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为规模而构建：你的生产路径是什么？
- en: A successful Level 1 prototype inevitably creates demand for more – more users,
    more features, more agents. This is idx_34f1f7d1when the limitations of a simple,
    monolithic architecture become apparent. The path to a production-ready Level
    2 service is a deliberate re-architecture focused on resilience and scale.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 一个成功的1级原型必然会产生对更多需求的渴望——更多的用户、更多的功能、更多的代理。这就是当简单、单一架构的局限性变得明显的时候。通往生产就绪的2级服务的道路是一个专注于弹性和规模的故意重构。
- en: Start this phase by identifying the specific triggers that will necessitate
    this evolution. Will it be a certain number of daily users? Is it the need to
    add more than three or four specialized agents? Or is it a requirement for long-running,
    asynchronous processing that a simple script cannot handle? Having these triggers
    defined in advance turns the decision to scale from a reactive panic into a planned
    event.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 从识别将导致这种演变的特定触发因素开始这个阶段。这将是一个每日用户数达到一定数量吗？是需要添加三个或四个以上的专业代理吗？或者是对长时间运行、异步处理的需求，这是简单的脚本无法处理的？提前定义这些触发因素将使扩展决策从反应性恐慌转变为有计划的行动。
- en: Next, prioritize which Level 2 patterns will be most critical for your system's
    reliability. If uptime is the idx_b70bcf56most important metric, patterns such
    as ***Auto-Healing Agent Resuscitation*** and ***Fallback Model Invocation***
    are your top priorities. If real-time idx_b9f11a53responsiveness is key, then
    architecting around an ***Event-Driven Reactivity*** model with a central message
    bus is essential. As you envision adding more specialized agents, the question
    of discovery becomes paramount, leading you idx_279a19c5directly to planning for
    a ***Tool and Agent Registry***.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，优先考虑哪些2级模式对你的系统可靠性最为关键。如果可用性是最重要的指标，那么像**自动恢复代理复苏**和**回退模型调用**这样的模式是你的首要任务。如果实时响应是关键，那么围绕一个中心消息总线构建的**事件驱动反应性**模型是必不可少的。当你设想添加更多专业代理时，发现的问题变得至关重要，直接引导你规划一个**工具和代理注册表**。
- en: This reflection provides a strategic plan that outlines not just *what* you
    will build but *when* and *why* you will need to invest in a more complex, microservices-based
    architecture to meet growing demand.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这份反思提供了一个战略计划，概述了不仅你要构建什么，还要何时以及为什么需要投资于更复杂、基于微服务的架构来满足不断增长的需求。
- en: 'Reaching for autonomy: What is your North Star?'
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 追求自主性：你的北极星是什么？
- en: Not every system needs to reach the zenith of agentic maturity, but understanding
    what is possible can idx_c568125cinform your long-term strategy and prevent you
    from making early architectural decisions that block future innovation. This is
    the stage of envisioning your Level 3 system—your North Star.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个系统都需要达到代理成熟度的顶峰，但了解可能性的确可以指导你的长期战略，并防止你做出阻碍未来创新的早期架构决策。这是设想你的3级系统——你的北极星阶段。
- en: 'Ask the big question: Does our core business problem require the system to
    learn and adapt over time to be truly effective? If the answer is yes, then a
    path to Level 3 is a strategic necessity. What would a "self-improving" version
    of your system look like? Would it learn from implicit user feedback to personalize
    its responses? Would it automatically A/B test different workflows to find the
    most efficient path? This vision will point you toward advanced patterns such
    as ***Trust Decay*** ***and*** ***Scoring*** and ***Coevolved Agent Training***.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 提出重大问题：我们的核心业务问题是否需要系统随着时间的推移学习和适应才能真正有效？如果答案是肯定的，那么通往3级的方法是一个战略性的必要条件。你的系统“自我改进”版本会是什么样子？它会从隐式用户反馈中学习以个性化其响应吗？它会自动进行A/B测试不同的工作流程以找到最有效的路径吗？这个愿景将引导你走向像**信任衰减**、**评分**和**协同进化的代理训练**这样的高级模式。
- en: Finally, consider the stakes. Are individual decisions made by the system so
    critical that a single error could have major consequences? If so, the high cost
    and complexity of advanced patterns such as ***Consensus*** and ***Majority Voting***
    are not just justified; they are a requirement for building a trustworthy system.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，考虑风险。系统做出的个别决策是否至关重要，以至于一个错误可能会产生重大后果？如果是这样，那么像**共识**和**多数投票**这样的高级模式的高成本和复杂性不仅是有理由的，而且是构建可信赖系统的必要条件。
- en: This long-term vision for your agentic system will guide your strategic investments
    and ensure your architecture remains adaptable enough to incorporate the rapid
    advancements that are sure to come.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这个关于你的代理系统的长期愿景将指导你的战略投资，并确保你的架构足够灵活，能够吸收必将到来的快速进步。
- en: Roadmap summary table
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 路线图摘要表
- en: 'The following idx_86825524table provides a condensed summary of this strategic
    guide. Use it as a quick reference to align your project''s goals with the key
    decisions and patterns at each level of maturity:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 下表提供了本战略指南的浓缩总结。将其用作快速参考，以将您项目的目标与每个成熟级别的关键决策和模式对齐：
