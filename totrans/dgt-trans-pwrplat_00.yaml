- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Welcome to a transformative journey with *The Power Platform Playbook for* *Digital
    Transformation*!
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎加入与 *《数字转型Power Platform操作手册》* 一起的变革之旅！
- en: If you’re eager to recognize Power Platform as a strategic ally in your business’s
    digital transformation, you’re in the right place. Imagine empowering everyone
    in your organization to quickly solve problems using technology, driving innovation
    and efficiency across the board. This book is your guide to enabling that exciting
    transformation in a safe and reliable way.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你渴望将Power Platform视为你企业数字化转型的战略盟友，那么你就在正确的位置。想象一下，让组织中的每个人都能够快速利用技术解决问题，推动全面创新和效率。这本书是你以安全可靠的方式实现这一激动人心的变革的指南。
- en: Today’s organizations are on the lookout for innovative ways to harness technology
    for growth, and we believe that Microsoft’s Power Platform is the key. Whether
    you’re an IT professional, a business analyst, a manager, a consultant, or an
    aspiring developer, this book offers valuable insights tailored just for you.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当今的组织正在寻找创新的方法来利用技术促进增长，我们相信微软的Power Platform是关键。无论你是IT专业人士、业务分析师、经理、顾问还是有抱负的开发者，这本书都为你提供了针对你的宝贵见解。
- en: Before we dive in, it’s helpful to have a basic understanding of business processes
    and technology concepts, particularly around Power Platform components such as
    Power Apps, Power Automate, and Power BI. Don’t worry if you’re not already an
    expert in cloud-based services; our journey together will guide you every step
    of the way!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入之前，对业务流程和技术概念有一个基本的了解是有帮助的，特别是关于Power Platform组件，如Power Apps、Power Automate和Power
    BI。如果你还不是基于云的服务专家，请不要担心；我们共同的经历将引导你每一步！
- en: What sets this book apart is its holistic approach. Rather than focusing solely
    on individual components, we’ll explore how Power Apps, Power Pages, Power Automate,
    Copilot Studio, and Power BI work in harmony. You’ll discover a unified framework
    for digital transformation that shows you how to streamline processes, automate
    workflows, and extract meaningful insights.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书与众不同的地方在于其全面的方法。我们不仅仅关注单个组件，而是探索Power Apps、Power Pages、Power Automate、Copilot
    Studio和Power BI如何协同工作。你将发现一个统一的数字化转型框架，它展示了如何简化流程、自动化工作流并提取有意义的见解。
- en: Our approach here is pragmatic, practical, and action-oriented. We blend theoretical
    concepts with real-world scenarios, offering you step-by-step guidance along with
    useful tips, best practices, and hands-on exercises. You’ll find a treasure trove
    of practical examples and use cases designed to help you effectively leverage
    Power Platform for your digital initiatives.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法是务实的、实用的和以行动为导向的。我们将理论概念与实际场景相结合，为你提供逐步指导，并提供有用的提示、最佳实践和动手练习。你会发现大量实用的示例和用例，旨在帮助你有效地利用Power
    Platform推动你的数字化项目。
- en: We don’t just skim the technical surface. We delve deeply into critical areas
    essential for successful implementation, including business process analysis,
    change management, governance, and security. By addressing these important aspects,
    we’ll equip you with the skills needed to navigate the challenges that come with
    digital transformation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不仅仅停留在技术表面的浅尝辄止。我们深入探讨对成功实施至关重要的关键领域，包括业务流程分析、变革管理、治理和安全。通过解决这些重要方面，我们将为你提供应对数字化转型带来的挑战所需的技能。
- en: By the time you finish this book, you will have a solid understanding of how
    to harness the Power Platform to drive valuable change in your organization. You’ll
    walk away with practical tools, strategies, and insights to tackle complex business
    challenges and propel your organization into a successful digital future.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成这本书时，你将深刻理解如何利用Power Platform在你的组织中推动有价值的变革。你将带走实用的工具、策略和见解，以应对复杂的企业挑战，并推动你的组织走向成功的数字化未来。
- en: So, whether you’re looking to enhance your IT skills, streamline processes as
    a business analyst, or lead digital initiatives as a manager, *The Power Platform
    Playbook for Digital Transformation* is here to empower you with the knowledge
    and resources you need to thrive in the digital age.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论你是想提升你的IT技能、作为业务分析师简化流程，还是作为经理领导数字化项目，*《数字转型Power Platform操作手册》* 都将为你提供你所需要的知识和资源，以在数字化时代茁壮成长。
- en: Let’s embark on this exciting adventure together!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们共同踏上这场激动人心的冒险之旅！
- en: What this book covers
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: '[*Chapter 1*](B21080_01.xhtml#_idTextAnchor012), *Unleashing Transformation:
    Power Platform’s Role in Digital Evolution,* discusses Power Platform’s key role
    in digital transformation and Microsoft’s leadership in the low-code app and automation
    market. It highlights the co-pilot features developed with OpenAI, which simplify
    low-code development through AI, enabling easier application creation and process
    automation. The chapter provides insights for organizations looking to leverage
    Power Platform for innovation and growth.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](B21080_01.xhtml#_idTextAnchor012)，*释放转型：Power平台在数字进化中的作用*，讨论了Power平台在数字化转型中的关键作用以及微软在低代码应用程序和自动化市场中的领导地位。它突出了与OpenAI共同开发的协同驾驶功能，通过人工智能简化了低代码开发，使应用程序创建和流程自动化更加容易。本章为希望利用Power平台进行创新和增长的组织提供了见解。'
- en: '[*Chapter 2*](B21080_02.xhtml#_idTextAnchor042), *Gauging Growth: Assessing
    Digital Maturity for Strategic Advancement,* discusses how assessing digital maturity
    is crucial for organizations using Microsoft’s Power Platform. Organizations can
    be categorized into foundational, developing, advanced, and leading levels based
    on their proficiency. The Center of Excellence (CoE) evaluates maturity and sets
    best practices, while the Center for Enablement (C4E) improves user skills through
    training. Together, these resources help organizations enhance their digital capabilities
    and drive innovation within the Power Platform ecosystem.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](B21080_02.xhtml#_idTextAnchor042)，*评估增长：战略提升的数字成熟度评估*，讨论了评估数字成熟度对于使用微软Power平台的企业至关重要。企业可以根据其熟练程度分为基础、发展、高级和领先水平。卓越中心（CoE）评估成熟度并设定最佳实践，而赋能中心（C4E）通过培训提升用户技能。这些资源共同帮助组织提升其数字能力，并在Power平台生态系统中推动创新。'
- en: '[*Chapter 3*](B21080_03.xhtml#_idTextAnchor060), *Unlocking Potential: Enhancing
    Operations with the Power Platform*, looks at how Microsoft''s Power Platform
    provides low-code/no-code tools that empower organizations to transform their
    operations. It enables both professional and citizen developers to create applications,
    automate processes, and analyze data quickly. Key tools include Power Apps for
    custom applications, Power Automate for task automation, and Power BI for data
    insights; all designed to enhance productivity and agility in a competitive digital
    landscape.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第三章*](B21080_03.xhtml#_idTextAnchor060)，*释放潜力：利用Power平台提升运营*，探讨了微软的Power平台如何提供低代码/无代码工具，使组织能够转型其运营。它使专业和公民开发者能够快速创建应用程序、自动化流程和分析数据。关键工具包括用于定制应用程序的Power
    Apps、用于任务自动化的Power Automate和用于数据洞察的Power BI；所有这些都是为了在竞争激烈的数字领域中提高生产力和敏捷性而设计的。'
- en: '[*Chapter 4*](B21080_04.xhtml#_idTextAnchor090), *Creating Your Center for
    Enablement*, looks at the Center for Enablement (C4E) empowers individuals and
    teams in their digital transformation with the Power Platform by providing a supportive
    environment for innovation and exploration. Through training and resources, users
    enhance their skills in creating applications and automating processes. The C4E
    also fosters collaboration among diverse teams to tackle challenges, ultimately
    enabling organizations to drive meaningful change and thrive in the digital landscape.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第四章*](B21080_04.xhtml#_idTextAnchor090)，*创建您的赋能中心*，探讨了赋能中心（C4E）如何通过提供支持创新和探索的环境，利用Power平台赋能个人和团队进行数字化转型。通过培训和资源，用户在创建应用程序和自动化流程方面的技能得到提升。C4E还促进不同团队之间的协作，以应对挑战，最终使组织能够推动有意义的变化，并在数字领域中蓬勃发展。'
- en: '[*Chapter 5*](B21080_05.xhtml#_idTextAnchor105), *Executing and Scaling Transformation
    Initiatives*, discusses how with an intuitive design, business users can easily
    prototype and deploy applications, while the platform allows for seamless scaling
    from small initiatives to enterprise-wide solutions. By integrating with Microsoft
    Azure, organizations can adapt and grow their solutions alongside evolving needs,
    driving meaningful change and innovation in their digital transformation efforts.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第五章*](B21080_05.xhtml#_idTextAnchor105)，*执行和扩展转型计划*，讨论了具有直观设计的平台如何使业务用户能够轻松原型化和部署应用程序，同时平台允许从小型项目无缝扩展到企业级解决方案。通过集成Microsoft
    Azure，组织可以随着需求的演变调整和扩展其解决方案，推动数字化转型努力中的有意义的变化和创新。'
- en: '[*Chapter 6*](B21080_06.xhtml#_idTextAnchor131), *Orchestrating Success: Key
    Considerations for a Digital Transformation Strategy Using Power Platform*, looks
    at the three key stages when embarking on a digital transformation with Power
    Platform involves three key stages: Envision, Onboard, and Scale. In the envision
    phase, organizations should define clear goals, secure executive sponsorship,
    and develop an adoption strategy aligned with business objectives. It’s vital
    to manage resistance, assess readiness, and implement training to empower employees.
    Addressing these aspects lays a strong foundation for a successful transformation
    journey.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](B21080_06.xhtml#_idTextAnchor131)，*编排成功：使用Power Platform进行数字化转型策略的关键考虑因素*，探讨了在采用Power
    Platform进行数字化转型时涉及三个关键阶段：愿景、上线和扩展。在愿景阶段，组织应明确目标，获得高管支持，并制定与业务目标一致的采用策略。管理阻力、评估准备情况和实施培训以赋能员工至关重要。解决这些方面为成功的转型之旅奠定了坚实的基础。'
- en: '[*Chapter 7*](B21080_07.xhtml#_idTextAnchor152), *Collaboration and Change
    in Digital Transformation*, highlights the importance of stakeholder analysis
    and change management in adopting Power Platform for digital transformation. It
    underscores the need for executive and managerial buy-in to empower citizen developers
    and discusses the roles of various stakeholders and the Microsoft Power Platform
    admin team. By fostering a culture of collaboration and learning, organizations
    can effectively leverage citizen developers to drive innovation.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](B21080_07.xhtml#_idTextAnchor152)，*数字化转型中的协作与变革*，强调了在采用Power Platform进行数字化转型时进行利益相关者分析和变革管理的重要性。它强调了获得高管和管理层支持以赋能公民开发者的重要性，并讨论了各利益相关者和微软Power
    Platform管理员团队的作用。通过培养协作和学习文化，组织可以有效地利用公民开发者来推动创新。'
- en: '[*Chapter 8*](B21080_08.xhtml#_idTextAnchor173), *Power Platform Solutions
    for Digital Transformation*, discusses how embracing the Power Platform is key
    for digital transformation, requiring an understanding of an organization’s maturity
    level through the Capability Maturity Model Integration (CMMI). Organizations
    start at the initial level with limited success, then move to “Repeatable” with
    some controls, followed by “Defined” for standardized practices. At the “Capable”
    stage, they refine practices for critical applications, and finally, at “Efficient,”
    they demonstrate the platform’s transformative potential with expert support.
    Assessing maturity helps prioritize initiatives for early success and stronger
    leadership engagement.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](B21080_08.xhtml#_idTextAnchor173)，*Power Platform数字化转型解决方案*，讨论了拥抱Power
    Platform对于数字化转型至关重要，需要通过能力成熟度模型集成（CMMI）了解组织的成熟度水平。组织从初始水平开始，成功率有限，然后过渡到“可重复”阶段，有一些控制措施，接着是“定义”阶段，为标准化实践。在“有能力的”阶段，他们为关键应用优化实践，最终在“高效”阶段，在专家支持下展示平台的转型潜力。评估成熟度有助于优先考虑早期成功和更强的领导层参与。'
- en: '[*Chapter 9*](B21080_09.xhtml#_idTextAnchor216), *Streamlining Operations:
    Automating Processes with Solutions Built with Power Platform,* discusses how
    in today’s business landscape, automating processes is crucial for efficiency.
    Power Platform offers tools for task automation, with organizations focusing on
    repetitive tasks when choosing proof of concept candidates. Understanding Application
    Lifecycle Management (ALM) is important, and Microsoft’s ALM Accelerator helps
    manage solutions effectively. New users can start with the Creator Kit for practical
    tutorials. Establishing key performance indicators will help measure success and
    optimize the benefits of Power Platform in enhancing operations.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](B21080_09.xhtml#_idTextAnchor216)，*通过Power Platform构建的解决方案简化运营：自动化流程*，讨论了在当今的商业环境中，自动化流程对于效率至关重要。Power
    Platform提供了任务自动化的工具，当选择概念验证候选者时，组织会专注于重复性任务。理解应用程序生命周期管理（ALM）很重要，微软的ALM加速器有助于有效管理解决方案。新用户可以从Creator
    Kit开始，进行实用的教程。建立关键绩效指标将有助于衡量成功并优化Power Platform在提升运营方面的效益。'
- en: '[*Chapter 10*](B21080_10.xhtml#_idTextAnchor237), *Fortifying the Foundation:
    Integrating Systems, Ensuring Governance, and Security*, looks at the four stages
    of the CoE journey that organizations use to strengthen their technological foundation
    through a Center of Excellence (CoE) journey involving four stages: Secure (establishing
    a security framework), Evangelize (promoting security awareness), Monitor (detecting
    threats), and Evolve (continuous improvement). This approach ensures robust governance
    and protection of valuable assets in a dynamic tech landscape.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B21080_10.xhtml#_idTextAnchor237)，*巩固基础：集成系统、确保治理和安全*，探讨了组织通过卓越中心（CoE）之旅的四个阶段来加强其技术基础的四阶段：安全（建立安全框架）、宣传（提高安全意识）、监控（检测威胁）和演进（持续改进）。这种方法确保了强大的治理和在一个动态技术环境中保护宝贵资产。'
- en: '[*Chapter 11*](B21080_11.xhtml#_idTextAnchor266), *Establishing Strong Foundations:
    Governance and Security in Power Platform Solutions,* explains how governance
    and security in the Power Platform ecosystem are essential. Microsoft addresses
    these concerns with Data Loss Prevention (DLP) policies that protect data, tenant
    isolation that secures data flow, and specialized security roles such as the Power
    Platform admin for user control. By prioritizing these measures, organizations
    can effectively leverage Power Platform while safeguarding their data.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](B21080_11.xhtml#_idTextAnchor266)，*建立坚实基础：Power Platform解决方案中的治理和安全*，解释了在Power
    Platform生态系统中的治理和安全是至关重要的。微软通过数据丢失预防（DLP）策略来保护数据，租户隔离来确保数据流安全，以及如Power Platform管理员等专门的安全角色来控制用户。通过优先考虑这些措施，组织可以有效地利用Power
    Platform同时保护他们的数据。'
- en: '[*Chapter 12*](B21080_12.xhtml#_idTextAnchor285), *Navigating Compliance: Meeting
    Industry Regulations in Power Platform Deployments,* discusses how navigating
    compliance for Power Platform applications is crucial, and Microsoft’s Trust Center
    offers key resources on security and privacy, with a focus on Power Apps. The
    platform features global data centers, allowing geo-specific environments and
    secure data transmission via encryption and TLS protocols. It provides tools for
    GDPR compliance and the Microsoft Purview Compliance Manager to streamline compliance
    management across Microsoft cloud services.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](B21080_12.xhtml#_idTextAnchor285)，*导航合规性：在Power Platform部署中满足行业法规*，讨论了在Power
    Platform应用程序中导航合规性的重要性，微软的信任中心提供了关于安全和隐私的关键资源，重点关注Power Apps。该平台具有全球数据中心，允许特定地理环境，并通过加密和TLS协议进行安全的数据传输。它提供符合GDPR的工具和Microsoft
    Purview合规性管理器，以简化跨Microsoft云服务的合规性管理。'
- en: '[*Chapter 13*](B21080_13.xhtml#_idTextAnchor293), *From Metrics to Milestones:
    Measuring Success in Power Platform Initiatives*, discusses how the Microsoft
    Power Platform transforms organizations with its low-code approach, enhancing
    productivity. Success relies on identifying relevant KPIs, establishing SMART
    benchmarks, and maintaining documentation for tracking progress, ultimately enabling
    transformative change.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第13章*](B21080_13.xhtml#_idTextAnchor293)，*从指标到里程碑：衡量Power Platform项目的成功*，讨论了Microsoft
    Power Platform如何通过低代码方法转型组织，提高生产力。成功依赖于识别相关KPIs，建立SMART基准，并维护文档以跟踪进度，最终实现变革性变化。'
- en: '[*Chapter 14*](B21080_14.xhtml#_idTextAnchor302), *Tracking Success Measures:
    Monitoring Progress and Achieving Objectives*, looks at how, to measure measure
    progress with the Power Platform, organizations should define KPIs and use surveys
    to assess user knowledge and satisfaction. Initial surveys identify starting points,
    while follow-ups after six months evaluate experiences and highlight improvement
    areas. Quarterly surveys can track user adoption and productivity, guiding informed
    decisions for optimization.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第14章*](B21080_14.xhtml#_idTextAnchor302)，*跟踪成功指标：监控进度和实现目标*，探讨了如何使用Power
    Platform来衡量进度，组织应定义关键绩效指标（KPIs）并使用调查来评估用户知识和满意度。初始调查确定起点，而六个月后的后续调查则评估经验和突出改进领域。季度调查可以跟踪用户采用率和生产力，指导优化方面的明智决策。'
- en: '[*Chapter 15*](B21080_15.xhtml#_idTextAnchor333), *Embracing AI-Powered Copilots
    and Agents in Digital Transformation*, discusses how AI-powered copilots are transforming
    digital processes by enhancing user interactions and automating tasks. They boost
    productivity and improve organizational efficiency, enabling better collaboration.
    This accessibility empowers organizations to optimize operations and drive innovation.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第15章*](B21080_15.xhtml#_idTextAnchor333)，*拥抱数字化转型中的AI辅助飞行员和代理*，讨论了AI辅助飞行员如何通过增强用户交互和自动化任务来改变数字流程。它们提高了生产力并改善了组织效率，促进了更好的协作。这种可访问性使组织能够优化运营并推动创新。'
- en: Download the color images
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots and diagrams
    used in this book. Please note that some images in this book are presented for
    contextual purposes, and the readability of the graphic is not crucial to the
    discussion. You can download the PDF here: [https://packt.link/gbp/9781805121398](https://packt.link/gbp/9781805121398).'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图和图表的彩色图像PDF文件。请注意，本书中的一些图像是为了说明目的而展示的，图形的可读性对于讨论并不至关重要。您可以从这里下载PDF文件：[https://packt.link/gbp/9781805121398](https://packt.link/gbp/9781805121398)。
- en: Conventions used
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用的约定
- en: The following text conventions have been used throughout this book.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了以下文本约定。
- en: '**Bold**: Indicates a new term, an important word, or words that you see onscreen.
