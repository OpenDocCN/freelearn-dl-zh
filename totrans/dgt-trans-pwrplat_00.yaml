  zh: '**粗体**：表示新术语、重要词汇或屏幕上看到的词汇。例如，菜单或对话框中的单词会以**粗体**显示。以下是一个示例：“**Power Automate**是一种服务，使用户能够创建工作流并在不同的应用程序和服务中自动化任务”。'
