- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Talking to ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you’re reading this book, you’ve probably at least heard the hype surrounding
    ChatGPT. But, have you actually seen what it does? How it works? Know what a prompt
    is? How to interact with one?
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you’ve tinkered with it a bit, so your next questions will probably be
    things such as *How do I send data to it?* and *How do I get data back from it?*
    *What are tokens and why are* *they important?*
  prefs: []
  type: TYPE_NORMAL
- en: If so, you’ve come to the right place. In this chapter, we’re going to do a
    little bit of exploration with the ChatGPT interface to get familiar with how
    it works and then shift to Power Automate, where you’ll learn the basics of processing
    ChatGPT data.
  prefs: []
  type: TYPE_NORMAL
- en: Working with ChatGPT as a user
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Working with ChatGPT as a user is very simple. To begin, you simply need to
    open a web browser and navigate to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: Setting up
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, you’ve already started a ChatGPT account (it was part of the assignments
    in[*Chapter 2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment
    to Support* *AI Services*).
  prefs: []
  type: TYPE_NORMAL
- en: 'Once there, log in using the credentials you signed up with earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1 – Logging in to ChatGPT](img/B21234_03_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – Logging in to ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you’ve logged in, you can immediately start sending questions (**prompts**)
    to the model, as shown in *Figure 3**.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2 – Sending a prompt to ChatGPT](img/B21234_03_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.2 – Sending a prompt to ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: After entering a prompt, ChatGPT will respond with content (in this case, ideas
    for pizza side dishes).
  prefs: []
  type: TYPE_NORMAL
- en: 'You’re not limited to just submitting simple questions to ChatGPT – you can
    even submit scenarios and background information to help guide ChatGPT’s responses.
    This framing is referred to as **context**. For example, you can provide context
    to ChatGPT in several ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Explain string theory to a 10-year-old.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are a technical writer. Describe the steps necessary to mix mortar.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are a web developer. Generate basic HTML code for a web page with a simple
    one-level menu.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is a list of animals: tiger, cat, dog, grizzly bear, antelope, spider.
    Arrange them in a list from smallest to largest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ChatGPT is conversational, allowing you to refer back to previous prompts and
    responses to further refine your output.
  prefs: []
  type: TYPE_NORMAL
- en: So, what’s a token?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I’m glad you asked! This will come up when you’re interacting with ChatGPT (or
    other language models and services). In the context of ChatGPT, a token is the
    smallest unit of text that the model processes. It could be as small as a single
    character, commonly used groups of letters, prefixes, and suffixes, or even whole
    words, depending on how the model is configured.
  prefs: []
  type: TYPE_NORMAL
- en: From a cost and billing perspective, models typically charge you based on how
    many tokens you’re submitting and how many tokens you’re getting back as a response.
    Let’s use the example prompt featured in Figure 3.2 – What are three side dishes
    I can serve with pizza?
  prefs: []
  type: TYPE_NORMAL
- en: 'Using a tool such as OpenAI’s Tokenizer, you can figure out how much this request
    is going to cost to send:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3 – Viewing the Tokenizer’s result](img/B21234_03_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – Viewing the Tokenizer’s result
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, this request costs 11 tokens. The area at the bottom shows how
    OpenAI breaks apart the sentence.
  prefs: []
  type: TYPE_NORMAL
- en: Response tokens are tallied the same way. With this in mind, you may find it
    useful (or necessary, depending on your budget) to frame questions and response
    criteria in such a way that minimizes token usage. Depending on what services
    you are consuming, your usage may be counted differently. It’s always important
    to understand the pricing and charge models to make sure you don’t end up with
    an unexpected bill!
  prefs: []
  type: TYPE_NORMAL
- en: With the accounting tasks out of the way, we’ll look at sending data to ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Sending prompts to ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Working with ChatGPT as an end user is pretty simple. So, how hard is it to
    do the same thing with Power Automate? The answer, it turns out, is that it isn’t
    that bad.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have two main options for passing data to the OpenAI ChatGPT service itself:
    the built-in HTTP (Premium) connector or a third-party OpenAI connector. We’ll
    go through both options quickly, and you can adapt whichever you like to suit
    your purposes.'
  prefs: []
  type: TYPE_NORMAL
- en: Both of the examples will be built as instant cloud flows with a simple text
    prompt. For both examples, you’ll need the OpenAI API key that you created in
    [*Chapter 2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to
    Support* *AI Services*.
  prefs: []
  type: TYPE_NORMAL
- en: HTTP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The HTTP method is the more complex method of the two but also gives you the
    most flexibility.
  prefs: []
  type: TYPE_NORMAL
- en: Updated parameter information
  prefs: []
  type: TYPE_NORMAL
- en: Like all cloud services, OpenAI may change endpoints and other parameters without
    notice. You can get the most updated endpoints and parameters at [https://platform.openai.com/api-reference/completions](https://platform.openai.com/api-reference/completions).
  prefs: []
  type: TYPE_NORMAL
- en: 'To start building the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Launch a web browser and navigate to the Power Automate web portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'From the navigation menu, click **Create**, and then, under **Start from blank**,
    select **Instant cloud flow**. See *Figure 3**.4*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.4 – The Power Automate portal](img/B21234_03_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.4 – The Power Automate portal
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Build an instant cloud flow** page, add a **Flow name** value and
    then select the **Manually trigger a flow** trigger. Click **Create**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.5 – Creating a blank instant cloud flow](img/B21234_03_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.5 – Creating a blank instant cloud flow
  prefs: []
  type: TYPE_NORMAL
- en: In the canvas area, click **Manually trigger a flow** to expand the trigger.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Add an input** and select the **Text** input type:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.6 – Selecting an input type](img/B21234_03_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.6 – Selecting an input type
  prefs: []
  type: TYPE_NORMAL
- en: In the `Prompt`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why does my Power Automate canvas look different?
  prefs: []
  type: TYPE_NORMAL
- en: Depending on your settings, you may be viewing the Classic Power Automate canvas
    or the new designer interface. You can switch between the experiences using the
    **New designer** toggle in the top right-hand portion of the page. The interfaces
    are a little bit different, so feel free to adapt and use whichever one you prefer.
    If you switch the view partway through a design, you’ll be prompted to save your
    work before continuing.
  prefs: []
  type: TYPE_NORMAL
- en: Click **New step**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Choose an operation** dialogue, select the **HTTP (****Premium)**
    trigger:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.7 – Selecting the HTTP (Premium) trigger](img/B21234_03_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.7 – Selecting the HTTP (Premium) trigger
  prefs: []
  type: TYPE_NORMAL
- en: 'Fill out the first part of the HTTP action with the following data:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Method** | `Post` |'
  prefs: []
  type: TYPE_TB
- en: '| **URI** | `https://api.openai.com/v1/chat/completions` |'
  prefs: []
  type: TYPE_TB
- en: 'Next, you’ll need to add two different headers. Headers are informational data
    that are sent during the HTTP transaction. In this case, you’ll be sending an
    *Authorization* header, containing your OpenAI API key, as well as the *Content-Type*
    header, which describes the type of data transaction:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Header** | **Value** |'
  prefs: []
  type: TYPE_TB
- en: '| Authorization | `Bearer <OpenAI` `API key>` |'
  prefs: []
  type: TYPE_TB
- en: '| Content-Type | `application/json` |'
  prefs: []
  type: TYPE_TB
- en: 'Finally, you’ll need to enter values for the `Body` parameter. `Body` will
    contain information about the type of model being used, the prompt dynamic content
    object, the number of completions to return, and other instructional information.
    See *Figure 3**.8*:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Body** |'
  prefs: []
  type: TYPE_TB
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: 'The output can be seen in the following figure:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.8 – Filling out the HTTP action](img/B21234_03_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.8 – Filling out the HTTP action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Body** section, select ****TRIGGER DYNAMIC CONTENT**** (including
    the square brackets) and replace it with the dynamic content token that represents
    the prompt from Step 6 by clicking on the lightning bolt icon:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.9 – Updating the prompt body](img/B21234_03_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.9 – Updating the prompt body
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once you’ve saved it, it’s time to test it out!
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Test** icon on the menu bar to verify that it’s working correctly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the **Manually** radio button on the **Test flow** flyout and then click
    **Test**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.10 – Testing the flow](img/B21234_03_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.10 – Testing the flow
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter your text in the prompt and then select `List the ingredients for baking`
    `a cake`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.11 – Entering the prompt](img/B21234_03_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.11 – Entering the prompt
  prefs: []
  type: TYPE_NORMAL
- en: Click **Done**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Scroll down to the **Outputs** section and then look for the **Body** field.
    See *Figure 3**.9*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.12 – Completions output](img/B21234_03_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.12 – Completions output
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve seen how to do it the complex way, let’s look at using a pre-built
    connector.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI GPT-3 completions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Using a pre-built connector makes the task of interacting with ChatGPT even
    easier.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll create another instant cloud flow to see its capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: Launch a web browser and navigate to the Power Automate web portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the navigation menu, click **Create**. Then, under **Start from blank**,
    select **Instant** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Build an instant cloud flow** page, add a **Flow name** value and then
    select the **Manually trigger a flow** trigger. Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Switching gears
  prefs: []
  type: TYPE_NORMAL
- en: To see the necessary options in the **Manually trigger a flow** card, you’ll
    need to switch to the Classic view. You can switch back after you’re done.
  prefs: []
  type: TYPE_NORMAL
- en: In the canvas area, click **Manually trigger a flow** to expand the trigger.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add an input** and select the **Text** input type.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Context`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the ellipsis (**…**) for the **Context** input and then click **Add
    a drop-down list** **of options**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.13 – Adding a drop-down list](img/B21234_03_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.13 – Adding a drop-down list
  prefs: []
  type: TYPE_NORMAL
- en: 'Populate the list with the `user` role. This will be used to inform GPT of
    who is interacting with the system. This field is case-sensitive, so be sure to
    enter it in lowercase:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.14 – Configuring the drop-down list](img/B21234_03_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.14 – Configuring the drop-down list
  prefs: []
  type: TYPE_NORMAL
- en: Click **Add an input** and select the **Text** input type.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Prompt`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New step**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Choose an operation** dialogue, under **OpenAI (Independent Publisher)**,
    select the **Chat Completion (preview)** action, as shown in *Figure 3**.12*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.15 – Selecting the Chat Completion (preview) action](img/B21234_03_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.15 – Selecting the Chat Completion (preview) action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `Bearer <APIKEY>` format and click **Accept**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.16 – Configuring the connection](img/B21234_03_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.16 – Configuring the connection
  prefs: []
  type: TYPE_NORMAL
- en: Select the **Advanced parameters** dropdown and select **Body/Model** and **Body/Messages**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `gpt-3.5-turbo`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: About models
  prefs: []
  type: TYPE_NORMAL
- en: Though there are several models to choose from, the most common models you’ll
    likely use are **gpt-3.5-turbo**, **gpt-4**, and **gpt-4-turbo**. The gpt-3.5-turbo
    model is a great everyday model with the lowest cost price point, while the gpt-4
    model has some improved function-calling support and can handle more tokens. The
    gpt-4-turbo model has an even higher token count support and also has vision capabilities.
    In other contexts, you may use the **dall-e-3** model to generate images using
    the **Images API**.
  prefs: []
  type: TYPE_NORMAL
- en: In the **Body/Messages** area, click **Add** **new item**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Context` dynamic content token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Prompt` dynamic content token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `1000`. See *Figure 3**.17*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.17 – Configuring the Chat Completion card](img/B21234_03_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.17 – Configuring the Chat Completion card
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Just as before, let’s test it out:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Test** icon on the menu bar.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Test Flow** flyout, select the **Manually** radio button.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If prompted, click **Continue** to sign in and authorize the OpenAI connection.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Context** dropdown, select one of the roles.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `List the ingredients of a cake and brief instructions on how` `to prepare.`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.18 – Testing the OpenAI Chat Completions flow](img/B21234_03_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.18 – Testing the OpenAI Chat Completions flow
  prefs: []
  type: TYPE_NORMAL
- en: Click **Run flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Flow Runs Page** to be redirected to the run history.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the run and then scroll to the **Choices** area of the **Outputs** section
    to view the detailed data:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.19 – Reviewing the output](img/B21234_03_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.19 – Reviewing the output
  prefs: []
  type: TYPE_NORMAL
- en: So far, so good!
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have this output, what’s next? You can take this output and then
    feed it into other flows or processes!
  prefs: []
  type: TYPE_NORMAL
- en: Retrieving data from ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'When you were reviewing the output from your test flows, you probably noticed
    that ChatGPT’s answers (or responses) were structured in a particular way:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.20 – ChatGPT response data](img/B21234_03_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.20 – ChatGPT response data
  prefs: []
  type: TYPE_NORMAL
- en: The structure, which is `name:value` pair structure or notation.
  prefs: []
  type: TYPE_NORMAL
- en: So, what exactly is JSON?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s take a look at a few fields in our example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: In this example, the body tag or name is used to indicate the contents of the
    JSON response. In the `name:value` context, `body` is the name, and everything
    between the opening and closing curly braces (the `{` and `}` characters) is its
    value.
  prefs: []
  type: TYPE_NORMAL
- en: 'JSON also allows you to nest objects using the same structure or notation.
    In this case, the next `name:value` pair is `"object": "text_completion"`, defining
    `object` as `name` and `text_completion` as its value. This process of nesting
    `name:value` pairs can extend to a depth of 64 levels.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to simple `name:value` pairs, JSON also supports an array construct.
    Where a `name:value` pair indicates a one-to-one relationship between a name and
    its corresponding value, an array can be thought of as a one-to-many relationship.
    For example, I have five children:'
  prefs: []
  type: TYPE_NORMAL
- en: Liberty
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hudson
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Glory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anderson
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Victory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An array of kids, indeed! In JSON, array objects are denoted by square brackets
    (`[` and `]`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Were I to describe my children in JSON format, I might construct a data sample
    like this:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: JSON array objects can also contain their own `name:value` pairs, each grouping
    denoted by its own set of curly braces.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: One of the benefits of JSON is that it’s human-readable and very easy to understand.
  prefs: []
  type: TYPE_NORMAL
- en: Now that I’ve satisfied my kids by featuring them in a book, let’s shift back
    to handling ChatGPT’s JSON-formatted output.
  prefs: []
  type: TYPE_NORMAL
- en: Working with ChatGPT’s JSON output in Power Automate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We could just print the body of the response, but as you saw in Figure 3.15,
    the body contains a lot more than just the text output. The actual data we want
    is stored as one of the `name:value` pairs in the `choices` sub-object. To access
    just that portion of the data, we’ll use an expression as part of a `compose`
    action to extract the output we’re looking for and save it to a variable for later
    use.
  prefs: []
  type: TYPE_NORMAL
- en: 'From the Power Automate flow, you can follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'After the **HTTP** action, select **New step**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.21 – Adding a new step](img/B21234_03_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.21 – Adding a new step
  prefs: []
  type: TYPE_NORMAL
- en: In the **Choose an operation** box, search for and select the **Compose** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Inputs** box of the **Compose** action. If necessary, click the
    **Add dynamic content** link to surface the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the expression builder box, start typing `outputs` and select the **outputs**
    function:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.22 – Adding the triggerOutputs function](img/B21234_03_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.22 – Adding the triggerOutputs function
  prefs: []
  type: TYPE_NORMAL
- en: 'You can complete the rest of the function with this text:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Let’s dig into this expression:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In this example, `'HTTP'` references the preceding action. We’re looking for
    the result of that action (hence the `outputs` function). The `?` character is
    used to choose the element, parameter, or sub-object that we want to reference.
    In this case, we’re selecting the body element. From looking at the output of
    the test flow in *Figure 3**.20*, we know that the body element itself has many
    sub-elements or sub-objects (`body/choices`.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Depending on the type of outputs that are being generated, `[0]`). The name
    of the name/value pair we’re looking for inside that element is called **text**.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: So, when reading the expression, it says “*Using the outputs of the HTTP action,
    look in the body/choices element, select the first element, and then inside that
    element, capture the value for the* *text object*.”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Next, click **Add step**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Initialize** **variable** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `ComposeOutput`, and set **Type** to **String**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Value** box, add the dynamic content token representing the **Outputs**
    content object of the **Compose** variable, as shown in *Figure 3**.23*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 3.23 – Adding the Initialize variable step](img/B21234_03_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.23 – Adding the Initialize variable step
  prefs: []
  type: TYPE_NORMAL
- en: When you’re finished, click **Save** and then re-test.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'At this point, you can go to the flow’s run history and check the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.24 – Viewing the flow’s output](img/B21234_03_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.24 – Viewing the flow’s output
  prefs: []
  type: TYPE_NORMAL
- en: That’s it! You’ve successfully sent data to and received it from ChatGPT (and
    learned a little about JSON along the way).
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you took your first steps in using ChatGPT and Generative AI
    with Power Platform. With the sample flows you created, you were able to take
    input, send it to ChatGPT using two different actions, and then extract the responses.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’re going to look at using AI to help build more complex
    flows.
  prefs: []
  type: TYPE_NORMAL
