- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Testing, Quality Assurance, and Operations
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试、质量保证和运营
- en: Platform solutions build beyond the basics to offer standardized pipelines and
    testing processes. Successfully implementing these processes generates repeatable
    **Bodies of Evidence** (**BoEs**) that allow measuring all software against the
    same standard. BoEs are the documents, artifacts, and processes that demonstrate
    to external auditors or other interested parties that security and quality exist.
    Often, we fall into the trap of thinking that because an application performs
    a unique function, we should test for different standards. Implementing best practices
    ensures quality across the product and allows for continual success.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 平台解决方案在基础之上构建，提供标准化的管道和测试流程。成功实施这些流程会产生可重复的**证据体**（**BoEs**），允许将所有软件与同一标准进行衡量。证据体是文档、工件和流程，它们向外部审计师或其他感兴趣方证明安全性和质量的存在。我们常常陷入一个误区，认为因为一个应用程序执行的是独特功能，我们就应该针对不同的标准进行测试。实施最佳实践确保产品整体的质量，并允许持续的成功。
- en: In this chapter, we’ll explore how to design and implement effective test strategies
    within the platform, covering key areas such as development, operations, security,
    and performance. We’ll also learn how to create robust metric strategies that
    optimize both platform performance and the applications built on it. Additionally,
    the chapter will cover how to architect recovery strategies that promote resilience
    and scalability, ensuring the platform can withstand disruptions. Finally, we’ll
    examine how to coordinate incident response operations to enhance reliability
    and maintain the integrity of both applications and data.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何在平台内设计和实施有效的测试策略，涵盖开发、运营、安全和性能等关键领域。我们还将学习如何创建强大的指标策略，优化平台性能及其上构建的应用程序。此外，本章还将涵盖如何构建促进弹性和可扩展性的恢复策略，确保平台能够承受中断。最后，我们将探讨如何协调事件响应操作，以增强可靠性和保持应用程序和数据的一致性。
- en: 'We will cover the following main headings:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下主要标题：
- en: Best practices for testing platforms
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试平台的最佳实践
- en: Metrics, monitoring, and performance optimization
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指标、监控和性能优化
- en: Platform incident management and recovery
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台事件管理和恢复
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: There are no technical requirements as such. Familiarity with testing options
    such as Robot Framework and SonarQube may be valuable. Knowledge of metrics integration
    using tools such as Grafana, Prometheus, and **OpenTelemetry** (**OTel**) will
    also be helpful.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 没有此类技术要求。熟悉测试选项，如Robot Framework和SonarQube可能很有价值。了解使用Grafana、Prometheus和**OpenTelemetry**（**OTel**）等工具进行指标集成也将有所帮助。
- en: Best practices for testing platforms
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试平台的最佳实践
- en: Throughout software development, business applications, and even sports, you
    will hear about the importance of testing to success. Testing allows you to determine
    whether a planned solution can meet the needed goals and carry out the required
    strategies. In our basecamp structure, testing occurs primarily in the design,
    develop, and deploy phases, with opportunities in the operate and support phases
    as well.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件开发、商业应用甚至体育中，你都会听到测试对成功的重要性。测试可以帮助你确定计划中的解决方案是否能够满足所需的目标并执行所需的策略。在我们的基地营结构中，测试主要发生在设计、开发和部署阶段，在运营和支持阶段也有机会。
- en: Each set of testing best practices offers some known areas for success. These
    testing practices are aligned roughly with our overall platform vision. Not all
    testing is internal as some methods may expand to user groups or operational surveys.
    Practices and metrics may differ slightly across different levels, such as software
    development, cloud management, or sales, such as **Net Promoter Scores** (**NPSs**).
    For reference, the NPS is a user experience metric that uses survey questions
    to ask customers how likely they are to recommend the product. This NPS can be
    valuable but falls outside the normal testing paradigm. The NPS illustrates how
    an external practice, gathering user feedback, can contribute to developing internal
    practices.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 每套测试最佳实践都提供了一些已知的成功领域。这些测试实践大致与我们的整体平台愿景相一致。并非所有测试都是内部的，因为某些方法可能扩展到用户群体或运营调查。实践和指标在不同级别，如软件开发、云管理或销售（如**净推荐值**（**NPSs**））上可能略有不同。作为参考，NPS是一个用户体验指标，通过调查问题询问客户他们推荐产品的可能性。这个NPS可能很有价值，但超出了正常测试范式。NPS说明了外部实践，即收集用户反馈，如何有助于发展内部实践。
- en: 'The first step of any design is writing the test case. Common to DevOps, and
    essential for Platform Engineering is using **test-driven development**. Test-driven
    development means the first step in achieving success requires developing the
    test that will demonstrate success. For example, if setting a password policy
    requiring 8 different characters and no more than 20 characters in total, you
    would create a test with these parameters first. The following list clarifies
    the elements needed to design and execute successful testing:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 任何设计的第一步是编写测试用例。在DevOps中普遍存在，对于平台工程来说是必不可少的，那就是使用**测试驱动开发**。测试驱动开发意味着实现成功的第一步是开发能够证明成功的测试。例如，如果设置一个密码策略，要求包含8个不同的字符且总字符数不超过20个，你首先会创建一个包含这些参数的测试。以下列表明确了设计和执行成功测试所需元素：
- en: '**Designing the initial test case**: Password must include 8 different characters
    with no more than 20 characters in total.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设计初始测试用例**：密码必须包含8个不同的字符，且总字符数不超过20个。'
- en: '**Analyzing the testing requirements**: Define what app framework will be used
    for the test.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析测试需求**：定义将用于测试的应用框架。'
- en: '**Setting up a test environment**: Establish where testing will occur.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置测试环境**：确定测试将在哪里进行。'
- en: '**Analyzing software or hardware needs within the environment**: Ensure the
    environment has enough capacity for the test.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析环境中的软件或硬件需求**：确保环境有足够的容量进行测试。'
- en: '**Listing criteria for the system to respond**: The criteria are at least 8
    different characters and no more than 20 characters in total.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**列出系统响应的标准**：标准至少是8个不同的字符，且总字符数不超过20个。'
- en: '**Listing testing methods**: List out the methods being used for testing.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**列出测试方法**：列出正在使用的测试方法。'
- en: '**Designing the full test case and subordinate functions**: Design the full
    use case, including elements such as what types of characters are allowed.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设计完整的测试用例和子函数**：设计完整的使用案例，包括允许的字符类型等元素。'
- en: '**Running tests and studying the results**: The results may be as expected
    or they may show errors or unusual outcomes. An example is a flickering test where
    different results occur due to time-based system changes that were not part of
    the testing process.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**运行测试并研究结果**：结果可能是预期的，也可能显示错误或异常结果。一个例子是闪烁测试，由于测试过程中未包含的系统基于时间的更改导致结果不同。'
- en: One of our favorite testing approaches is **Robot Framework**. Robot Framework
    is an open source automation model allowing for test automation. It integrates
    with numerous tools and libraries. Tests can be established as an initial case
    and computed against tabular cases, and the results can be measured. Robot Framework
    elements do not provide a range of answers or alternative solutions, only whether
    the desired test passes or fails on the criteria. In our password example, any
    password with fewer than 8 different characters, or more than 20 characters in
    total, would result in the test failing. Using automation, strings of random elements
    are created to test these criteria.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最喜欢的测试方法之一是**Robot Framework**。Robot Framework是一个开源自动化模型，允许进行测试自动化。它集成了众多工具和库。测试可以作为一个初始案例建立，并针对表格案例进行计算，结果可以衡量。Robot
    Framework的元素不提供一系列答案或替代解决方案，只提供是否在标准下通过或失败。在我们的密码示例中，任何少于8个不同字符或总字符数超过20个的密码都会导致测试失败。使用自动化，创建随机元素字符串来测试这些标准。
- en: 'Testing should involve checking the initial flow, gathering feedback, and improving
    outcomes. A key consideration is how well the test environments mirror the production
    environment. The less difference, the more effective the tests tend to be; if
    there is more difference, more tests are needed. Automated tests run constantly
    and help expedite the process. Manual tests take more resources and take longer
    to identify problems. Do not forget about the impact of Conway’s law on testing:
    if you do not carefully plan, testing will resemble the larger organizational
    processes and you may not find the end solution. As an example, testing that verifies
    a streamlined messaging format may miss hierarchical approvals required by the
    parent organization. The test might be successful, but the outcome skips important
    steps that affect the final product. This is a reminder to ensure the delivered
    functions match expectations through testing. The following sections include some
    best practices and examples of various tests, beginning with development.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 测试应包括检查初始流程、收集反馈和改进结果。一个关键考虑因素是测试环境与生产环境之间的相似程度。差异越小，测试往往越有效；如果差异越大，则需要更多的测试。自动化测试持续运行并有助于加快流程。手动测试需要更多资源，并且需要更长的时间来识别问题。不要忘记康威定律对测试的影响：如果你没有仔细规划，测试将类似于更大的组织流程，你可能找不到最终解决方案。例如，验证简化消息格式的测试可能会遗漏母组织所需的高级审批。测试可能成功，但结果会跳过影响最终产品的重要步骤。这是确保通过测试交付的功能符合预期的一个提醒。以下部分包括一些最佳实践和不同测试的示例，从开发测试开始。
- en: Development tests
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发测试
- en: '**Development tests** are the most simple and fundamental types of tests. These
    tests generally occur without external users, and there is no need for complicated
    architecture. The key to successful development tests lies in breaking pieces
    down to their fundamental level and understanding each piece. Think of development
    testing like preparing to create something in a woodshop: you find all the components,
    lay out the correct pieces for assembly, and ask a friend whether the design makes
    sense. The following list highlights some common development tests:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**开发测试**是最简单和最基础的测试类型。这些测试通常在没有外部用户的情况下进行，不需要复杂的架构。成功进行开发测试的关键在于将各个部分分解到基本层面并理解每个部分。将开发测试想象成在木工车间准备制作某物的过程：你找到所有组件，布置正确的部件进行组装，并询问朋友设计是否合理。以下列表突出了一些常见开发测试：'
- en: '**Unit testing (automated)**: Unit testing assesses the smallest pieces of
    code that can be logically isolated from another unit. Across multiple languages,
    this means isolating functions, subroutines, libraries, methods, and properties.
    Unit testing can look for areas such as correctly used variables, reuse of code
    segments, and correctly written code.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单元测试（自动化）**：单元测试评估可以逻辑上从另一个单元中隔离的最小代码片段。在多种语言中，这意味着隔离函数、子程序、库、方法和属性。单元测试可以查找正确使用的变量、代码段的复用和正确编写的代码等方面。'
- en: '**Code quality (partially automated)**: Agile, DevOps, and XP rely on using
    code quality checks, starting with paired programmers. Automated systems, especially
    generative AI, can expand on those code checks. The quality checks are a subjective
    assessment determining how well the delivered code matches typical code by the
    team. Tests here seek to isolate the smallest areas to determine reliability,
    maintainability, testability, portability, reusability, defects, and complexity.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码质量（部分自动化）**：敏捷、DevOps和XP依赖于使用代码质量检查，从配对程序员开始。自动化系统，特别是生成式AI，可以扩展这些代码检查。质量检查是一种主观评估，确定交付的代码与团队典型代码的匹配程度。这里的测试旨在隔离最小的区域，以确定可靠性、可维护性、可测试性、可移植性、可重用性、缺陷和复杂性。'
- en: '**Code reviews (largely manual)**: Direct review of code should be less than
    400 lines with an inspection rate of less than 500 lines per hour, never for more
    than an hour. Good code tests establish a process to fix defects, foster a positive
    code review culture, and practice lightweight reviews. Generative AI, such as
    GitHub Copilot or OpenAI Codex, can assist by suggesting areas for code improvement.
    You can employ roles with **Large Language Models** (**LLMs**) to frame responses
    by asking as coder with 20 years of experience, which elements of the tested code
    can be reduced.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码审查（主要手动）**：代码的直接审查应少于400行，每小时检查率少于500行，永远不超过一小时。良好的代码测试建立了一个修复缺陷的过程，培养积极的代码审查文化，并实践轻量级审查。生成式AI，如GitHub
    Copilot或OpenAI Codex，可以通过建议代码改进的区域来协助。您可以使用具有**大型语言模型（LLM）**的角色，通过询问具有20年经验的程序员，来构建响应框架，询问哪些测试的代码元素可以减少。'
- en: '**Static analysis (automated)**: Static tests are the automated debugging tests
    that are carried out before the program runs. This ensures the code is in the
    right **Software Development Kit** (**SDK**) and analyzed against coding rules.
    Static testing can discover some early vulnerabilities and bugs through software
    such as SonarQube, Veracode, and HP. These tests eliminate individual security
    problems, such as open ports and embedded secrets, at the easiest time to fix.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**静态分析（自动化）**：静态测试是在程序运行之前执行的自动化调试测试。这确保代码位于正确的**软件开发工具包（SDK）**中，并针对编码规则进行分析。静态测试可以通过SonarQube、Veracode和HP等软件发现一些早期漏洞和错误。这些测试在最容易修复的时间消除单个安全问题，例如开放的端口和嵌入的秘密。'
- en: Development tests provide only a portion of the needed information. Once development
    testing occurs, the completed software expands to integration test to ensure new
    features work across the broader platform.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 开发测试只能提供所需信息的一部分。一旦进行开发测试，完成的软件就会扩展到集成测试，以确保新功能在整个平台上的工作。
- en: Integration tests
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成测试
- en: Integration practices aim to link feature elements together and bring those
    individual development code elements into further construction. Some integration
    can happen early in development, but platform integration focuses on making pieces
    work individually and then in aggregate with other platform elements. These tests
    and practices ensure information can be transmitted across coding elements, that
    the needed functions are carried out from start to finish, and that you can revert
    elements without breaking the program. Finally, initial performance tests happen
    within integration testing, especially to determine whether new code is better
    or worse at carrying out defined functions.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 集成实践旨在将功能元素链接在一起，并将这些单独的开发代码元素纳入进一步的构建中。一些集成可以在开发早期发生，但平台集成侧重于使各个部分单独工作，然后与其他平台元素一起工作。这些测试和实践确保信息可以在编码元素之间传输，所需的功能可以从头到尾执行，并且可以在不破坏程序的情况下回滚元素。最后，初始性能测试发生在集成测试中，特别是为了确定新代码在执行定义的功能方面是更好还是更差。
- en: 'You should aim to make each integration test automated. Designing for automation
    within execution allows code to be executed prior to any testing verification.
    . When the code executes, it should be relatively simple so that a no- or low-code
    option can be engaged to execute all the integration tests. The test can then
    provide a complete answer to all potential problems, rather than requiring an
    individual to constantly execute the tests. Integration tests are also best completed
    in testing or preproduction environments, showing all processes work effectively
    before moving on to production. Integration testing best practices are as follows:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该旨在使每个集成测试自动化。在执行过程中设计自动化允许代码在测试验证之前执行。当代码执行时，它应该是相对简单的，以便可以启用无代码或低代码选项来执行所有集成测试。这样，测试就可以为所有潜在问题提供完整的答案，而不是要求个人不断执行测试。集成测试最好在测试或预生产环境中完成，以确保所有流程在进入生产之前都能有效运行。集成测试的最佳实践如下：
- en: '**Data testing (automated)**: Evaluate the information with which the code
    interacts. Going back to our password example, integration data testing examines
    whether code can be called from a directory and then verifies the code samples
    against other functions.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据测试（自动化）**：评估代码交互的信息。回到我们的密码示例，集成数据测试检查代码是否可以从目录中调用，然后验证代码样本与其他函数的兼容性。'
- en: '**End to end, or E2E (automated)**: Test the application workflows from beginning
    to end. This integration test checks whether a password is accepted, whether the
    user has permission to access the right program, and whether they can retrieve
    or store data within that application. E2E testing is often combined with data
    testing for best results.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端到端，或E2E（自动化）**：测试从开始到结束的应用程序工作流程。这个集成测试检查密码是否被接受，用户是否有权访问正确的程序，以及他们是否可以在该应用程序中检索或存储数据。E2E测试通常与数据测试结合使用以获得最佳结果。'
- en: '**Regression (automated)**: Regression testing requires running functional
    and non-functional tests after a change. This practice verifies that deployed
    changes can return to an earlier state when necessary. Regression and reversion
    are key incident response elements, but only if they work. Regression is also
    essential when bugs are found and fixed.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回归（自动化）**：回归测试需要在变更后运行功能和非功能测试。这种做法验证了部署的变更在必要时可以返回到早期状态。回归和回滚是关键事件响应元素，但只有当它们起作用时。当发现并修复了错误时，回归也是必不可少的。'
- en: '**Performance (automated)**: Integration tests are the first place to examine
    how well code works. Setting performance tests means looking at memory usage,
    how long functions require, and which elements of a program are slow, and then
    establishing comparisons to desired outcomes. Performance tests are run with software
    such as Apache JMeter, WebLOAD, and BlazeMeter; however, most are not free. With
    careful metrics, you can build effective analysis to conduct mostly free performance
    tests but remember the longer-term performance primarily derives from user experiences.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能（自动化）**：集成测试是检查代码工作得如何好的第一个地方。设置性能测试意味着查看内存使用情况、函数需要多长时间，以及程序中哪些元素运行缓慢，然后与期望的结果建立比较。性能测试使用Apache
    JMeter、WebLOAD和BlazeMeter等软件进行；然而，大多数都不是免费的。通过仔细的指标，你可以构建有效的分析来执行大部分免费的性能测试，但请记住，长期性能主要来自用户体验。'
- en: Software processes, having been successfully developed and integrated across
    the platform, can then go through delivery testing. Integration testing involves
    reviewing the commonalities between elements of the testing and production environments.
    Delivery testing involves verifying these commonalities.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 软件流程，在平台成功开发和集成后，可以进入交付测试。集成测试涉及审查测试和生产环境元素之间的共性。交付测试涉及验证这些共性。
- en: Delivery tests
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交付测试
- en: 'Delivery code means a feature is almost ready for prime time but requires one
    last check. Delivery processes occur at the end of the pipeline, during beta testing,
    for example, A/B deployments or even canary deployments. These tests are typically
    less automated as some parts need to be conducted by distinct user groups separate
    from developers. User personas can be automated – generative AI can make excellent
    templates – but there remains no substitute in these tests for actual users. The
    following list highlights some possible delivery tests:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 交付代码意味着一个功能几乎准备好进入生产阶段，但需要最后的检查。交付流程发生在管道的末端，例如在beta测试期间，A/B部署或甚至金丝雀部署。这些测试通常自动化程度较低，因为某些部分需要由与开发者不同的用户群体执行。用户画像可以是自动化的——生成式AI可以制作出优秀的模板——但在这些测试中，实际用户仍然无法替代。以下列表突出了一些可能的交付测试：
- en: '**Functional (partially automated)**: Performs input versus output tests in
    black-box form. During this phase, the code is not tested as individual items
    but as a set where one input produces exactly one output, and that one output
    traces to one input. This practice ensures functions are performed correctly.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**功能（部分自动化）**：以黑盒形式执行输入与输出测试。在这个阶段，代码不是作为单个项目进行测试，而是作为一个集合，其中一个输入产生一个精确的输出，并且这个输出可以追溯到输入。这种做法确保了函数的正确执行。'
- en: '**Dynamic (partially automated)**: Dynamic tests seek to find errors when the
    code runs. Again, the emphasis on delivery means you do not look for code errors
    but errors in the function’s outputs and inputs. Rather than having set use cases,
    this option allows for various inputs during execution. These tests require tight
    integration with functional testing.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态（部分自动化）**：动态测试旨在代码运行时寻找错误。再次强调，交付的重点意味着你寻找的不是代码错误，而是函数的输出和输入错误。而不是有固定的用例，这个选项允许在执行过程中有各种输入。这些测试需要与功能测试紧密集成。'
- en: '**Red/blue team (blended processes)**: Red teams are attackers and blue teams
    are defenders. This test designates a set team to defend a function and one to
    attack, then compares the results at the end of a cycle. Modern execution sometimes
    advocates for a purple team as a mix that can perform attack and defense. As a
    cultural practice, red teams tend to win, so changing the team composition from
    time to time can be beneficial to morale. Hiring an experienced red/blue team
    can be expensive.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**红蓝队（混合流程）**：红队是攻击者，蓝队是防御者。这种测试设计指定一个团队来防御一个功能，另一个团队来攻击，然后在周期结束时比较结果。现代执行有时提倡紫色队作为可以执行攻击和防御的混合体。作为一种文化实践，红队往往获胜，因此不时改变团队组成可以有益于士气。雇佣经验丰富的红蓝队可能很昂贵。'
- en: '**Operational testing (manual)**: Operational tests are also known as user-acceptance
    tests. These are where either a single user or a team of users tries to use the
    new software. Operational testing is a more formal expression of dynamic tests
    than beta testing or A/B deployments. The chosen team might be proficient in the
    desired function, or it may consist of new users who receive training at the time.
    The best output from these tests is careful reports and user stories about the
    platform’s performance. Operational tests may be unnecessary if other tests are
    performed correctly, but some customers prefer a final, hands-on acceptance test.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作测试（手动）**：操作测试也称为用户验收测试。这些是在单个用户或一组用户尝试使用新软件的地方。操作测试是比beta测试或A/B部署更正式的动态测试的表达方式。选定的团队可能精通所需的功能，或者它可能由在那时接受培训的新用户组成。这些测试的最佳输出是关于平台性能的详细报告和用户故事。如果其他测试执行正确，则操作测试可能是不必要的，但一些客户更喜欢最终的、实际的验收测试。'
- en: Once delivery tests are complete, only one area remains before users can access
    fully tested software as a valuable product.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦交付测试完成，在用户可以完全测试的软件作为有价值的产品访问之前，只剩下一个区域。
- en: Production tests
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生产测试
- en: 'Old-school computer programmers might say production tests are not needed as
    all flaws are caught beforehand. The modern DevOps pace means this no longer holds
    true. If testing is a reasonable process during development, integration, and
    delivery, the same quality testing should occur in production. Production tests,
    especially on the platform, ensure users are not bending parameters into new and
    untried formations. The following list highlights some common production tests:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的计算机程序员可能会说，生产测试是不必要的，因为所有缺陷都在之前被捕获。现代DevOps的速度意味着这一点不再成立。如果测试在开发、集成和交付过程中是一个合理的流程，那么同样的质量测试也应该在生产中进行。生产测试，尤其是在平台层面，确保用户不会将参数弯曲成新的、未经尝试的形态。以下列表突出了一些常见的生产测试：
- en: '**Runtime security (automated)**: Runtime security tests are those that run
    on the actual deployed software. The key is implementing instrumentation to create
    observability and telemetry across the system. Runtime implementations check for
    items not noticed during initial production, such as **Common Vulnerabilities
    and Exposures** (**CVEs**) released after the code reaches deployment. Good runtime
    testing ensures security flaws do not surprise the software development or operations
    team.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行时安全（自动化）**：运行时安全测试是在实际部署的软件上运行的测试。关键是实施仪器来创建系统范围内的可观察性和遥测。运行时实现检查在代码达到部署后发布的**常见漏洞和暴露**（**CVEs**）等在初始生产过程中未注意到的项目。良好的运行时测试确保安全漏洞不会让软件开发或运维团队感到意外。'
- en: '**Reversion (manual or automated)**: Similar to regression testing, reversion
    testing ensures a full rollback can be done on production software. This ensures
    that the entire platform can be successfully returned to an earlier state when
    a bug reaches production. Key aspects of this test include data integrity, user
    databases, and minimal downtime. Automated solutions with A/B testing can be set
    to revert when certain performance metrics are reached automatically.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回滚（手动或自动化）**：与回归测试类似，回滚测试确保可以在生产软件上执行完整的回滚。这确保了当错误达到生产时，整个平台可以成功返回到早期状态。此测试的关键方面包括数据完整性、用户数据库和最短停机时间。具有A/B测试的自动化解决方案可以设置为在自动达到某些性能指标时回滚。'
- en: Integrating tests from delivery to production creates a solid foundation for
    quality software. Each step emphasizes different areas, which is only possible
    as the software reaches the next step. As a final best practice, tests should
    always be run to completion in each section as it is easier to fix multiple errors
    at once, rather than fixing them as they occur. If you fix an error immediately
    after it is identified, there could be subsequent errors after the initial fix.
    For example, an error in code that prevents compiling must be found before testing
    in production; without the earlier testing steps, you’ll spend longer trying to
    find minimal errors. Fixing problems early reduces the amount of time needed to
    resolve those changes once they reach production. One way to track testing effectiveness
    is through metrics, monitoring, and performance optimization.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 从交付到生产的集成测试为高质量软件奠定了坚实的基础。每个步骤都强调不同的领域，这只有在软件达到下一个步骤时才可能实现。作为最后的最佳实践，测试应该在每个部分完成时始终运行，因为一次性修复多个错误比它们发生时修复它们更容易。如果你在错误被识别后立即修复它，那么在初始修复之后可能会出现后续的错误。例如，防止编译的代码错误必须在生产测试之前找到；如果没有早期的测试步骤，你将花费更长的时间来尝试找到最小错误。早期修复问题可以减少在它们达到生产时解决这些更改所需的时间。跟踪测试有效性的一个方法是通过指标、监控和性能优化。
- en: Metrics, monitoring, and performance optimization
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 指标、监控和性能优化
- en: Every company wants to deliver more faster, increase customer value, and return
    a profit to stakeholders. Every DevOps business understands core metrics. More
    advanced organizations will possess the skill to identify the known unknowns behind
    the metrics. Gaining initial metrics leads to some understanding but additional
    details can be derived. Subsequent metrics should be scoped tightly and focused
    on acceleration and provide clear feedback. This section emphasizes how small
    changes to achieve some metrics can be deconstructed to provide advanced solutions.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 每家公司都希望更快地交付更多产品，增加客户价值，并回报股东。每个DevOps业务都理解核心指标。更先进的组织将具备识别指标背后的已知未知的能力。获得初始指标会导致一些理解，但可以从中得出更多细节。后续指标应紧密界定并专注于加速，提供清晰的反馈。本节强调如何通过分解以实现某些指标的小幅变化来提供高级解决方案。
- en: There is software that provides metric solutions by managing data across a platform.
    This software also allows you to select advanced metrics with multiple comparison
    levels. Metrics are defined by first asking some basic questions, which lead to
    some universal, basic metrics. Then, you can formulate more advanced metrics,
    and finally, convert those numbers into positive actions.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 有软件通过管理平台上的数据提供指标解决方案。此软件还允许你选择具有多个比较级别的先进指标。通过提出一些基本问题来定义指标，这些问题导致一些普遍的基本指标。然后，你可以制定更先进的指标，最后将这些数字转化为积极的行动。
- en: The first questions
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一个问题
- en: Many often question why using metrics matters at all, as all individuals in
    the process understand what is being done and what remains incomplete. Metrics
    provide a quantifiable and repeatable source of observability by measuring multiple
    processes and driving actionable solutions. The first element of a metric is a
    process or action to be measured, such as how many code commits a team makes.
    These can be expanded to select daily, weekly, or other time integrations to ensure
    the best time management. The key to early metric development is to assess the
    correct time frame to measure something. For example, if you are looking at website
    traffic to indicate website success, you may want to know whether the traffic
    hits were within hours after posting a new promotion or throughout the year.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人经常质疑使用指标的意义，因为流程中的所有个人都了解正在做什么以及什么尚未完成。通过衡量多个流程并推动可操作的解决方案，指标提供了一种可量化和可重复的观察来源。指标的第一个要素是要衡量的流程或行动，例如团队提交了多少代码。这些可以扩展到选择每日、每周或其他时间集成，以确保最佳的时间管理。早期指标发展的关键是评估正确的测量时间框架。例如，如果你正在查看网站流量以指示网站的成功，你可能想知道流量是否在发布新促销活动后的几小时内发生，还是全年发生。
- en: People might question why a quantifiable tracking mechanism is needed, especially
    in small teams. Most individuals make bad decisions if they do not have quantifiable
    metrics. People who make decisions tend to overestimate their ability to predict
    correctly. This problem frequently occurs in scheduling tasks; you may predict
    that a project will take six months but it in fact takes a full year. Human prediction
    capabilities are so bad that scientists have found that 77% of randomly generated
    linear models make better decisions than individuals. Examples of decisions include
    completion times, guilt or innocence, fixes required, or proposed solutions. Metrics
    ensure decisions are less random.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可能会质疑为什么需要一个可量化的跟踪机制，尤其是在小型团队中。如果没有可量化的指标，大多数人会做出糟糕的决定。做出决策的人往往高估了自己正确预测的能力。这个问题在任务调度中经常发生；你可能会预测一个项目需要六个月，但实际上需要整整一年。人类的预测能力如此糟糕，以至于科学家发现，77%的随机生成的线性模型比个人做出的决策更好。决策的例子包括完成时间、有罪或无罪、所需的修复或提出的解决方案。指标确保决策不那么随机。
- en: Numbers provide the repeatable component for linear judgments. If we know our
    development team’s performance last week and the week before, then we know that
    increasing that number by 100% in the following week with no other changes is
    a bad decision. Another similar decision is buying more cloud space for a projected
    service increase – thankfully, many of those operational decisions are now handled
    by load balancers. These technical load balancers also use metrics; they just
    make decisions about metrics without human intervention. These paths lead to options
    in using generative AI to monitor actions about metrics.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 数字为线性判断提供了可重复的组成部分。如果我们知道我们开发团队上周和上周的表现，那么我们知道，在接下来的一个星期内，如果没有其他变化，将那个数字增加100%是一个糟糕的决定。另一个类似的决策是为预期的服务增长购买更多的云空间——幸运的是，许多那些运营决策现在由负载均衡器处理。这些技术负载均衡器也使用指标；它们只是在没有人为干预的情况下做出关于指标的决策。这些路径导致使用生成式AI来监控关于指标的行动的选项。
- en: All metrics must spur action. If a metric cannot result in an action, it is
    not useful. The options we discuss next start with the basics and then expand
    into options for immediate action. If we return to the earlier commit problem,
    a basic metric might look at the number of commits per day. Expanding that metric
    might indicate commits per developer, lines of code per commit, time from the
    previous commit, or the type of function the commit provided. Each of these could
    drive a more specific action to resolve changes. You might instruct a slow developer,
    ask a fast developer to make more complete solutions with more lines, explore
    context switching between the team, or find more complicated functions. Each of
    these metrics then provides a path to make decisions to improve the metric based
    on organizational goals and value streams. Basic metrics allow for more detailed
    investigation while advanced metrics point squarely at the problem.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 所有指标都必须激发行动。如果一个指标不能导致行动，那么它就无用了。我们接下来要讨论的选项从基础开始，然后扩展到立即行动的选项。如果我们回到早期的提交问题，一个基本的指标可能查看每天的提交次数。扩展这个指标可能表明每个开发者的提交次数、每次提交的代码行数、从上次提交到这次提交的时间，或者提交提供的函数类型。这些都可以驱动更具体的行动来解决变更。你可能会指导一个进度缓慢的开发者，要求一个进度快的开发者制作更完整的解决方案并增加更多的代码行，探索团队之间的上下文切换，或者寻找更复杂的函数。这些指标中的每一个都提供了一条路径，根据组织目标和价值流来做出决策，以改进指标。基本指标允许进行更详细的调查，而高级指标则直接指向问题。
- en: Basic metrics
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本指标
- en: 'Everyone should be familiar with the most basic metrics outlined by the **DevOps
    Research and Assessment** (**DORA**) organization. These four metrics, commonly
    used for software development, are deployment frequency, mean time to change,
    mean time to recover, and change failure rate. Let’s cover them briefly:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都应该熟悉**DevOps研究和评估**（**DORA**）组织概述的最基本指标。这四个指标，通常用于软件开发，包括部署频率、平均变更时间、平均恢复时间和变更失败率。让我们简要介绍一下：
- en: '**Deployment frequency**: How often new code is deployed into production. Measured
    by deployments over time.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署频率**：新代码部署到生产中的频率。通过随时间进行的部署来衡量。'
- en: '**Mean time to change**: The time required for a new idea to become production
    code. Includes deployment frequency measurements. Measured in average time.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均变更时间**：新想法成为生产代码所需的时间。包括部署频率的测量。以平均时间衡量。'
- en: '**Mean time to recover**: The time to recover a production system to stable
    if bad or unstable code is deployed. Measured in average time.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均恢复时间**：如果部署了不良或不稳定的代码，将生产系统恢复到稳定状态所需的时间。以平均时间衡量。'
- en: '**Change failure rate**: The number of bad code elements that are allowed to
    reach production. Measured in percentage of bad code elements over good code elements.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变更失败率**：允许达到生产环境的坏代码元素的数量。以坏代码元素与好代码元素的比例来衡量。'
- en: 'These initially seem to be excellent metrics but are intended for more mature
    software organizations. Starting with these metrics can leave an organization
    wondering how to improve. For more detailed informati[on, you can chec](https://dora.dev)k
    out the DORA site: https://dora.dev/.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标最初看起来很出色，但它们是为更成熟的软件组织设计的。从这些指标开始可能会让一个组织感到困惑，不知道如何改进。有关更详细的信息，您可以查看DORA网站：[https://dora.dev/](https://dora.dev/)。
- en: One important area of note among these metrics is that three out of the four
    are measured in time, with the last measured in percentage. The main point is
    how each drives additional action. The scope of each element highlights how they
    are high-level measures of success but are not useful as individual measures or
    for computing an aggregate score.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些指标中，值得注意的是，其中三个是按时间来衡量的，最后一个是按百分比来衡量的。主要点是每个指标如何推动额外的行动。每个要素的范围突出了它们是如何作为成功的宏观指标，但作为单独的指标或用于计算综合分数并不实用。
- en: 'All metrics derive from the initial questions: what do you need to know and
    what happens afterward? This might be about security, production times, or user
    happiness. It is important to consider whether the metric actually answers the
    question even when it appears complete. For example, a metric stating that there
    have been no security breaches might only be tracking known security breaches
    or defining security breaches within a narrow parameter. While metrics address
    what seems to be the current need, they should be carefully studied before implementation
    to ensure real progress.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 所有指标都源于最初的问题：你需要知道什么，之后会发生什么？这可能关乎安全性、生产时间或用户满意度。重要的是要考虑即使指标看起来很完整，它实际上是否回答了问题。例如，一个表示没有发生安全漏洞的指标可能只跟踪已知的漏洞或在一个狭窄的参数内定义安全漏洞。虽然指标解决了看似当前的需求，但在实施之前应仔细研究以确保真正的进步。
- en: Measurements guide the development of metrics. The DORA metrics provide a single
    measurement either of a point in time or across a set period. For those computations
    to matter, you must also set a desired rate. The metric would drive further action.
    For example, if the change failure rate is 15%, does that number fall above or
    below the organization’s expected number? In some instances, these SLAs can set
    rates. Another measurement could be measuring change failure during testing, pre-production,
    or the actual production environment. In building an effective metric, you might
    tolerate 15% failure during testing, 3% in pre-production, and less than 1% in
    actual production.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 测量指导了指标的发展。DORA指标提供了一种单一测量，要么是某个时间点，要么是在一定时期内。为了使这些计算有意义，您还必须设定一个期望的速率。指标将推动进一步的行动。例如，如果变更失败率是15%，这个数字是否高于或低于组织的预期数字？在某些情况下，这些服务级别协议可以设定速率。另一种测量可以是测量测试、预生产或实际生产环境中的变更失败。在构建有效的指标时，您可能容忍测试期间的15%失败率，预生产期间的3%，以及实际生产环境中的低于1%。
- en: The other key element depends on deployment numbers within the same period.
    If a company deploys to production hundreds of times daily, higher failure numbers
    might be more acceptable as they are likely to be changed by the following deployment.
    If a team deploys over 100 times per day, each percentage of failure only indicates
    one piece of deployed code. This raises a common question about the use of raw
    numbers versus percentages. If a team averages three deployments monthly, the
    change failure rate would be 0%, 33%, 66%, or 100%. This creates much more variance
    in how you approach the metrics. In this case, you must directly compare the deployment
    frequency to the change failure rate for an accurate assessment.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键因素取决于同一时期内的部署数量。如果一家公司每天向生产环境部署数百次，较高的失败次数可能更容易接受，因为这些失败很可能会在接下来的部署中被修正。如果一个团队每天部署超过100次，每次失败的百分比仅表示一段已部署的代码。这引发了一个关于使用原始数字与百分比的比较的常见问题。如果一个团队每月平均部署三次，变更失败率将是0%、33%、66%或100%。这会在你如何处理这些指标方面产生更大的差异。在这种情况下，你必须直接比较部署频率和变更失败率，以进行准确的评估。
- en: These discussions can be further complicated when you consider value stream
    metrics. Some might suggest that value stream metrics should merely echo the DORA
    metrics. Value streams are derived initially from Lean manufacturing and consider
    the period from when material enters a process to when you receive value from
    the customer. DevOps often considers that deployed code is purchased code, but
    merely pushing code to production does not always generate revenue. These considerations
    should address how many users access production code, or broader operational metrics
    such as how code affects performance, user happiness, or other factors.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当你考虑价值流指标时，这些讨论可能会变得更加复杂。有些人可能会建议价值流指标应该仅仅反映DORA指标。价值流最初源于精益制造，并考虑从材料进入流程到从客户那里获得价值的时间段。DevOps通常认为部署的代码是购买的代码，但仅仅将代码推送到生产并不总是产生收入。这些考虑应该解决有多少用户访问生产代码，或者更广泛的运营指标，例如代码如何影响性能、用户满意度或其他因素。
- en: A simple example would be if new code is required for a company promotion event,
    time to deployment does not matter if the code is not completed before the event.
    Failure rates do not matter as the event is never launched, delayed, or canceled.
    Understanding how metrics affect overall value and success is critical to determining
    the right tests to guarantee development is done correctly and on time.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的例子是，如果公司促销活动需要新的代码，那么在活动之前代码没有完成，部署时间就不重要。失败率不重要，因为活动从未启动、延迟或取消。理解指标如何影响整体价值和成功对于确定正确的测试以保证开发正确且按时完成至关重要。
- en: 'One question we always receive is how to make sure that your metrics are the
    right ones. In answering this question, we have found a simple framework from
    our days in intelligence operations to drive this discussion. The basic model
    is as follows:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常收到的一个问题是，如何确保你的指标是正确的。在回答这个问题时，我们发现了一个简单的框架，这是我们情报行动时期用来推动这个讨论的。基本模型如下：
- en: '**How do I know what has happened?** If requiring a number for measurement,
    what element must be present to observe or deliver those numbers? For example,
    is a system reporting uptime computed by server uptime, web availability, or just
    when the software is running? Differences in those numbers can require drastically
    different solutions.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**我如何知道发生了什么？** 如果需要数字进行测量，必须存在哪些元素才能观察或提供这些数字？例如，系统报告的运行时间是由服务器运行时间、网站可用性还是仅仅当软件运行时计算的吗？这些数字的差异可能需要截然不同的解决方案。'
- en: '**If I know what has happened, what comes next?** If the numbers are accurate,
    what should the next step be? Should the mean time to change decrease if the deployment
    frequency is high? If deployment frequency increases while the time to change
    increases, what action should be taken?'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如果我已知发生了什么，接下来会发生什么？** 如果数字是准确的，下一步应该是什么？如果部署频率高，平均变更时间应该减少吗？如果部署频率增加而变更时间增加，应该采取什么行动？'
- en: '**Are the assumptions true?** Were correct assumptions made about the metric?
    Does the reporting tool assigned deliver the right information at the right frequency
    to contribute? For example, if the deployment frequency derives from a monthly
    timeline but the time to change is assessed quarterly, will the relationship between
    the items still stand?'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**假设是否正确？** 对于指标是否做出了正确的假设？分配的报告工具是否在正确的频率下提供正确的信息以贡献？例如，如果部署频率来自月度时间表，但变更时间按季度评估，那么这些项目之间的关系是否仍然成立？'
- en: '**Do conclusions follow the assumptions?** You should consider whether conclusions
    about events follow the natural flow of the assumptions. If the conclusion is
    that value increases because deployment frequency increases, does that hold true
    if the change failure also increases?'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结论是否遵循假设？** 你应该考虑关于事件的结论是否遵循假设的自然流程。如果结论是价值增加是因为部署频率增加，那么如果变更失败也增加，这个结论是否仍然成立？'
- en: '**Compare apples to apples, not oranges to elephants.** You must ensure that
    the items measured are capable of comparison. When measuring deployment frequency,
    if one team must meet a security standard and the other produces open source,
    can you compare those rates when selecting improvement actions?'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**比较苹果和苹果，而不是橙子和大象。** 你必须确保测量的项目是可以比较的。在测量部署频率时，如果一个团队必须达到安全标准，而另一个团队生产开源软件，在选择改进措施时，你能比较那些比率吗？'
- en: Coming up with answers to these questions for every metric can take some work.
    We would write them out for every problem when we started using this guideline.
    Writing out answers addresses questions two, three, and four in providing visual
    verification for what you are thinking. Writing also addresses the core metric
    issue that metrics are quantifiable and repeatable. Working through a standard
    process ensures all metrics meet the requirements, avoiding poor metrics in the
    system. The next section explores using these guidelines to decompose existing
    metrics to guide actions.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 为每个指标提出答案可能需要一些工作。当我们开始使用这个指南时，我们会为每个问题写出答案。写出答案解决了第二、三和四个问题，为你的思考提供了视觉验证。写下来也解决了核心指标问题，即指标是可量化和可重复的。通过标准流程确保所有指标都符合要求，避免系统中出现不良指标。下一节将探讨如何使用这些指南来分解现有指标，以指导行动。
- en: Decomposing a metric
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分解指标
- en: Decomposing any metric requires starting with the current situation. The most
    important part of decomposition is supporting the shared vision and objectives
    of the platform. While the metrics needed may be entirely new, chances are that
    an existing metric fills part of the need. If, by some awful chance, the team
    does not currently have any metrics, then looking at the SLA can provide guidance
    on which metrics support operations. If you do not have an SLA, then looking at
    the acceptance criteria for the functions being built can provide a starting point.
    Thankfully, we now know the basic pillars and levels to guide our foundational
    construction in building a platform.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 分解任何指标都需要从当前情况开始。分解最重要的部分是支持平台的共同愿景和目标。虽然所需的指标可能完全是新的，但很可能现有指标已经满足了部分需求。如果不幸的是，团队目前没有任何指标，那么查看服务等级协议（SLA）可以提供关于哪些指标支持运营的指导。如果你没有SLA，那么查看正在构建的功能的验收标准可以提供一个起点。幸运的是，我们现在知道了一些基本支柱和层次，这可以指导我们在构建平台时的基础建设。
- en: Change requires understanding those initial elements. If, for example, we want
    to explore the stability of our design process, that provides an initial metric.
    Previous chapters suggested that the design phase should only take up about 10%
    of the time required for the full value stream. Most teams conduct design during
    planning events, planned for about 4-8 hours of the 80-hour sprint. This provides
    an initial assurance that tasks are being completed efficiently. You may want
    to add to those measurements by determining how long a developer spends on a design
    once a ticket reaches their workflow bucket.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 变化需要理解那些初始元素。例如，如果我们想探索设计过程的稳定性，这将提供一个初始指标。前几章建议设计阶段应该只占用全价值流所需时间的约10%。大多数团队在设计规划事件中进行设计，计划占用80小时冲刺中的4-8小时。这提供了一个初步的保证，即任务正在高效地完成。你可能还想通过确定开发者在票据进入其工作流程桶后花费在设计上的时间来增加这些测量。
- en: 'Obtaining additional data for decomposition can occur in multiple ways. You
    may use surveys to highlight areas that conflict with the known process. You can
    supplement this process with individual interviews or sensing sessions. A sensing
    session is when one gathers multiple individuals to ask about a particular topic.
    The key to this qualitative process is using the same questions across multiple
    interviews. When you use different questions across interviews, you can get a
    lot of data, but it becomes difficult to compare the individuals’ contributions;
    you are making an oranges to elephants comparison. Between the surveys and interviews,
    you can often find where the existing metric falls short of the data needed to
    create action. The following list provides a quick look at how you might compose
    questions to decompose the DORA metric mean time to change:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 获取分解指标所需的数据可以通过多种方式发生。你可以使用调查来突出与已知流程冲突的区域。你可以通过个别访谈或感知会议来补充这个过程。感知会议是指收集多个个人来询问特定话题。这个定性过程的关键是在多个访谈中使用相同的问题。当你跨访谈使用不同的问题时，你可以获得大量数据，但比较个人的贡献变得困难；你是在做橘子对大象的比较。在调查和访谈之间，你通常可以找到现有指标在数据不足以创建行动方面的不足。以下列表提供了一个快速了解如何编写问题来分解DORA指标平均变更时间的示例：
- en: '**How long does it take to complete an action?** How is this measured? Do you
    use story points, stories completed within an epic, the entire epic, or delivery
    to the customer? Is completed work measured against how much work remains in progress?'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完成一个动作需要多长时间？**这是如何衡量的？你是否使用故事点、史诗中完成的故事、整个史诗或交付给客户？完成的工作是否与正在进行的工作量进行比较？'
- en: '**Are constraints identified?** The high-level evaluation of average time often
    does not show what is slowing down the various areas. Assigning reasons such as
    lack of time, blocked by other items, or not prioritized can show why the mean
    time might be changing.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**是否确定了约束条件？**对平均时间的初步评估通常不会显示哪些地方在减慢。将原因归咎于缺乏时间、被其他项目阻塞或未优先考虑可以显示平均时间可能发生变化的原因。'
- en: '**Who built it?** If all tasks are assigned to a team, do we measure change
    at the team, individual, or product level? Does the metric include complexity
    as the denominator of time required? For example, can the comparative time between
    more and less complex tasks be seen? Can you compare the knowledge and skills
    assigned to the team to the desired output?'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谁构建了它？**如果所有任务都分配给一个团队，我们是测量团队、个人还是产品层面的更改？指标是否将复杂性作为时间需求的分母？例如，能否看到更复杂和更简单任务之间的比较时间？能否将分配给团队的知识和技能与期望的输出进行比较？'
- en: '**How are different features compared?** Where does priority scaling fall into
    the metric? You want to ensure high-priority items are completed faster than lower-priority
    items. When comparing different team success rates, are you factoring in the complexity
    of the problems assigned?'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何比较不同的功能？**优先级缩放在指标中处于什么位置？你希望确保高优先级的项目比低优先级的项目完成得更快。当比较不同团队的成功率时，你是否考虑了分配问题的复杂性？'
- en: '**Never forget about security impacts.** Having a fast mean time to change
    helps, but as earlier, with the change failure rate, does the time to change include
    later security impacts? You should assess how long is spent in the production
    pipelines on security, and how that compares to overall production timelines.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**永远不要忘记安全影响**。快速的平均更改时间有所帮助，但正如之前所提到的，更改失败率，更改时间是否包括后续的安全影响？你应该评估在生产管道中花费在安全上的时间有多长，以及这与整体生产时间表相比如何。'
- en: If reading closely, you will see how these decomposition questions mirror the
    earlier questions about a metric. If a metric is underperforming but the action
    is unclear, we suggest using a physical or virtual whiteboard to ask the team
    questions. These questions help suggest where decomposition is needed to design
    accurate metrics, create action, and allow the platform to succeed.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果仔细阅读，你会看到这些分解问题如何反映了之前关于指标的问题。如果一个指标表现不佳但行动不明确，我们建议使用物理或虚拟白板向团队提问。这些问题有助于建议在何处进行分解以设计准确的指标，制定行动方案，并使平台成功。
- en: Monitoring for metrics
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控指标
- en: Once you establish metrics, the next step suggests how you might monitor those
    metrics and provide active alerting. The primary success involves using dashboards
    to compile different information but create observability. The most important
    point to consider about dashboards is that they are a starting point for discussion,
    rather than a finishing point. Many organizations use dashboards to share information
    but never move past this. Dashboards create a snapshot, a compilation of various
    data, and some easy alerts in line with needed information. The next step integrates
    tools such as OTel from the CNCF, building heartbeats or pulse checks, and incorporating
    metrics into the SLIs, SLOs, and SLAs.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了指标，下一步建议如何监控这些指标并提供主动警报。主要成功之处在于使用仪表板来汇总不同信息但创建可观察性。关于仪表板最重要的考虑点是它们是讨论的起点，而不是终点。许多组织使用仪表板来共享信息，但从未超越这一步。仪表板创建了一个快照，即各种数据的汇总，以及一些与所需信息相关的简单警报。下一步将集成来自CNCF的OTel等工具，构建心跳或脉搏检查，并将指标纳入SLIs、SLOs和SLAs。
- en: OTel combines tools, APIs, and SDKs into an open source observability framework
    to instrument, generate, collect, and export telemetry data. Most telemetry data
    consists of logs, traces, and metrics within the system. The example shown in
    *Figure 9**.1* from the OTel documentation demonstrates how OTel may be configured.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: OTel将工具、API和SDK组合成一个开源的可观察性框架，以进行仪器化、生成、收集和导出遥测数据。大多数遥测数据由系统内的日志、跟踪和指标组成。*图9.1*（来自OTel文档的示例）展示了OTel可能如何配置。
- en: '![](img/B24465_09_01.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B24465_09_01.jpg)'
- en: 'Figure 9.1: OTel architecture'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1：OTel架构
- en: You can see the various elements within OTel combined with other elements. As
    an open source option, OTel is one of our favorite tools for designing initial
    formats. The system instruments code with APIs, gathers SDK data, analyzes data
    by sampling to reduce errors, provides the required context, exports data, and
    allows for more filtering with an established backend. One advantage of OTel is
    exporting filtered data to tools such as Grafana, Prometheus, or Elastic to provide
    the needed data rapidly. Another common solution for OTel implementation is using
    the open source Jaeger tools.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到OTel与其他元素结合的各种元素。作为一个开源选项，OTel是我们设计初始格式时最喜欢的工具之一。系统使用API对代码进行仪器化，收集SDK数据，通过采样分析数据以减少错误，提供所需上下文，导出数据，并允许通过已建立的后端进行更多过滤。OTel的一个优点是将过滤后的数据导出到Grafana、Prometheus或Elastic等工具，以快速提供所需数据。OTel实现的另一个常见解决方案是使用开源的Jaeger工具。
- en: Telemetry solutions can implement quality, time, or application metrics. These
    elements look for a push to collect as a heartbeat or a pull to collect as a pulse
    check. A **heartbeat** refers to metrics collecting data at a continuous rhythm
    with constant awareness while a **pulse check** requires an action to verify that
    progress continues. An example of the two elements is provided in *Figure 9**.2*
    by comparing Prometheus and InfluxDB.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 遥测解决方案可以实现质量、时间或应用指标。这些元素寻找推送作为心跳或拉取作为脉搏检查。**心跳**指的是以连续节奏和持续意识收集数据的指标，而**脉搏检查**则需要采取行动以验证进度是否继续。这两个元素的示例在*图9.2*中提供，通过比较Prometheus和InfluxDB。
- en: '![](img/B24465_09_02.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2](img/B24465_09_02.jpg)'
- en: 'Figure 9.2: Push and pull with metrics'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2：度量推送和拉取
- en: You can see how Prometheus allows pushing data while InfluxDB pull data into
    the collected format. The difference allows monitoring different elements depending
    on the compute and storage within the platform. Push metrics can help when contributing
    to pipelines while the pull metric can be more effective in SSO environments.
    Applying a push metric solution means every time the pipeline runs in the platform,
    it pushes data into the metric collection. On the other side, pull data can assess
    security tools by verifying that user logins are communicated to the larger platform.
    This pull data supports the observability that all users have authenticated tokens
    and that API calls are using the latest patches and upgrades.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到Prometheus如何允许推送数据，而InfluxDB将数据拉入收集格式。这种差异允许根据平台内的计算和存储监控不同的元素。推送指标有助于在管道中贡献力量时使用，而拉取指标在SSO环境中可能更有效。应用推送指标解决方案意味着每次管道在平台中运行时，都会将数据推送到指标收集。另一方面，拉取数据可以通过验证用户登录是否已与更大的平台通信来评估安全工具。这种拉取数据支持所有用户都有认证令牌以及API调用正在使用最新补丁和升级的可观察性。
- en: All combined metric data should be observable through dashboards within the
    SLA frameworks. Dashboards can show different time frames but allowing monitoring
    supports implementing comparative decisions. Dashboard design can rapidly scale
    for different time frames, data, and frameworks. For example, you can set a dashboard
    to show platform time available, build a Pareto chart demonstrating which apps
    are available, and then compare through a scaled metric the individual applications
    and platform availability. Linking metric types through monitoring allows knowing
    how to optimize actions and when metrics require a change.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 所有组合的度量数据都应在SLA框架内的仪表板中可观察。仪表板可以显示不同的时间段，但允许监控支持实施比较决策。仪表板设计可以快速扩展以适应不同的时间段、数据和框架。例如，您可以设置一个仪表板来显示平台可用时间，构建一个帕累托图来展示哪些应用可用，然后通过缩放指标比较单个应用和平台可用性。通过监控链接度量类型可以了解如何优化操作以及何时需要更改指标。
- en: Optimizing metrics
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化指标
- en: The last element when considering metrics is realizing when a metric is no longer
    valuable. Teams frequently become attached to their metrics, reporting statistics
    even when they no longer create value. Metrics are designed to create discussion
    and inspire action; when a metric no longer achieves that goal, it is time to
    move on from it. This distinction can be especially difficult when metrics seem
    positive or were gamified in a way to achieve the metric without creating additional
    value.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑度量时的最后一个要素是意识到何时一个指标不再有价值。团队往往会对他们的指标产生依恋，即使在它们不再创造价值的情况下也会报告统计数据。指标旨在引发讨论并激发行动；当一个指标不再实现这一目标时，就是时候放弃它了。当指标看起来积极或以某种方式游戏化以实现指标而不创造额外价值时，这种区分可能特别困难。
- en: One great example of a metric that can be gamified occurs in **story points**
    for DevOps teams. Story points describe how complex an issue may be, and a potential
    time for completion. If an issue has two story points, it is twice as complex
    as an issue with one and may take twice as long. If the metric is how many story
    points a team completes, some teams may make issues seem more complicated so that
    they complete a higher number of points. The solution to optimize the metric is
    rather than using story points, the measurement can be how many of the planned
    tasks are completed during a sprint. While story points may help team management,
    the higher percentage of planned versus done tasks allows for more accurate comparison.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 一个很好的例子是，在DevOps团队的**故事点**中可以游戏化指标。故事点描述了一个问题可能有多复杂，以及潜在的完成时间。如果一个问题有两个故事点，它比一个故事点的问题复杂两倍，可能需要更长的时间。如果指标是团队完成的故事点数量，一些团队可能会使问题看起来更复杂，以便完成更多的点。优化该指标的解决方案是，而不是使用故事点，测量可以是在冲刺期间完成的计划任务数量。虽然故事点可能有助于团队管理，但计划任务与完成任务的更高百分比允许进行更准确的比较。
- en: Important to optimizing metrics is remembering that no metric should occur in
    isolation. Each of these metrics can relate to another for improved situational
    awareness. The math seems straightforward if the desired SLA is less than 1% of
    bugs released to production, and the metric is the bugs released to production.
    You should consider the secondary effect that if all code remains held until bug-free,
    the time to production might increase as every element waits until it is perfect.
    This summarizes the preceding thought pattern about detailing not just metrics
    but also the assumptions around those elements.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在优化指标时，重要的是记住没有任何指标应该孤立存在。这些指标中的每一个都可以相互关联，以改善情境意识。如果期望的SLA小于1%的已发布到生产的错误，并且指标是已发布到生产的错误，数学看起来很简单。你应该考虑的次要影响是，如果所有代码都保持到无错误，那么生产时间可能会增加，因为每个元素都在等待它完美。这总结了关于详细说明不仅指标，而且围绕这些元素的假设的前述思维模式。
- en: Metrics are typically posted on dashboards, reviewed during meetings, and cited
    by employees. Common metrics become cultural frameworks and sometimes express
    organizational values. A commonly held truth, expressed as a metric, can become
    a known fact, regardless of other elements surrounding the metric. One friend
    used to always quote, “50% of the people who quote statistics are right 100% of
    the time.” This type of expression underlies the need to constantly review and
    update metrics. Optimization best practices require reviewing metrics regularly,
    not for the information contained but whether the metrics still answer the desired
    question.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 指标通常发布在仪表板上，在会议期间进行审查，并由员工引用。常见的指标成为文化框架，有时也表达了组织价值观。一个普遍的真理，以指标的形式表达，可以成为众所周知的事实，无论围绕该指标的其他元素如何。一位朋友过去总是引用，“引用统计数据的人中有50%的人100%的时间都是正确的。”这种表达方式体现了不断审查和更新指标的需求。优化最佳实践要求定期审查指标，不仅是为了包含的信息，而是为了判断指标是否仍然回答了期望的问题。
- en: The next section addresses how metrics can be used to inform incident management
    and recovery.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将讨论如何使用指标来告知事件管理和恢复。
- en: Platform incident management and recovery
  id: totrans-106
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台事件管理和恢复
- en: Platforms are a customer-supporting operation, making incident management and
    recovery a critical component of success. Incident management should address all
    potential positive and negative issues, as the main goal remains supporting the
    customer with a successful platform experience. Normal delivery teams support
    an incident management response firing after an event is noticed whether internal
    or external, and platforms are no different. Previous discussions about tiered
    support, SREs ensuring various SLAs are met, and security concerns are all important
    elements of managing platform incidents. Each of those discussions highlighted
    metrics to further define how you handle incident resolution over time.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 平台是支持客户的服务操作，使事件管理和恢复成为成功的关键组成部分。事件管理应解决所有潜在的正面和负面问题，因为主要目标仍然是支持客户获得成功的平台体验。正常的交付团队在事件被注意到后支持事件管理响应，无论事件是内部还是外部，平台也不例外。关于分层支持、SRE确保满足各种SLA以及安全问题的先前讨论都是管理平台事件的重要元素。每个讨论都突出了指标，以进一步定义您如何随着时间的推移处理事件解决。
- en: 'The first step in any incident process is implementing a ticketing system.
    These systems may use software such as Jira Service Management, ServiceNow, GitLab
    issues, or even a spreadsheet tracker. The primary concern with selecting ticketing
    should be the number of issues and the level of observability. If a system receives
    one to two issues daily, spreadsheets might be practical, but automation becomes
    essential as that number scales. Automation in incident response ticketing allows
    rapid triage, assigning resources, and quick resolution for easy problems. A reminder
    of the tiers has been provided here:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 任何事件流程的第一步是实施一个票务系统。这些系统可能使用诸如Jira Service Management、ServiceNow、GitLab问题或甚至电子表格跟踪器等软件。选择票务系统的主要关注点应该是问题的数量和可观察性的水平。如果一个系统每天接收一到两个问题，电子表格可能是实用的，但随着数量的增加，自动化变得至关重要。事件响应票务中的自动化允许快速分类、分配资源和快速解决简单问题。这里提供了一个层级的提醒：
- en: '**Tier 1**: Issues resolved through existing documentation and improved practices.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一级**：通过现有文档和改进的实践解决的问题。'
- en: '**Tier 2**: Issues requiring a change in configuration, such as connections,
    ports, repositories, or software versions.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**二级**：需要更改配置的问题，例如连接、端口、存储库或软件版本。'
- en: '**Tier 3**: Issues representing a bug, something that should work but does
    not, an issue, or a desired new capability.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**三级**：代表一个错误，应该是工作但不工作的事情，一个问题，或者是一个期望的新功能。'
- en: Some incident notifications arise from observability on the system, but others
    occur through regular reporting. For example, phishing attacks, using a spam email
    to try and get targets to click links, are often reported by employees. Aggregating
    these reports and gaining observability over the ticketing system can reveal where
    an incident is occurring to a security team.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一些事件通知源于对系统的可观察性，但其他事件则是通过常规报告发生的。例如，钓鱼攻击，通过垃圾邮件尝试让目标点击链接，通常由员工报告。汇总这些报告并获取对票务系统的可观察性可以揭示事件发生的地点，对安全团队来说。
- en: The platform incident response should use metrics to highlight significant areas.
    Metrics are derived from the SLAs and SLIs, depicting effective platform operations.
    When those metrics slide, the root cause analysis can reveal the need for a broader
    intervention. Incident response processes typically use some standard process
    alignment, such as preparation, identification, containment, eradication, lessons
    learned, and communication. Each step requires a checklist, dedicated to platform
    operations to resolve incidents.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 平台事件响应应使用指标来突出显示重要区域。这些指标是从服务等级协议（SLAs）和服务等级指标（SLIs）中得出的，描述了有效的平台运营。当这些指标下滑时，根本原因分析可以揭示需要更广泛的干预。事件响应流程通常使用一些标准流程对齐，例如准备、识别、遏制、根除、经验教训和沟通。每一步都需要一个清单，专门针对平台运营以解决事件。
- en: Essential to incident response is the preparation phase. This preparation constitutes
    dedicated practices where teams assemble to address simulated issues. A smoothly
    running incident response requires practice. You never see professional sports
    athletes commit to a game without practice; the same applies to platform operations.
    The teams must know who is involved and have a place to practice and a set group
    of procedures to follow. These practice sessions should be held at least quarterly
    and should not be postponed or canceled due to actual events. The temptation is
    to skip an incident response practice when it occurs shortly after recovery from
    an actual incident. While there is no substitute for real-world actions, the practice
    helps create the success paths for those incidents.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 事件响应的关键是准备阶段。这个准备阶段包括团队聚集起来解决模拟问题的一些专门实践。平稳运行的事件响应需要实践。你从未见过专业运动员在没有练习的情况下参加比赛；平台运营也是如此。团队必须知道谁参与其中，有一个练习的地方，以及一组要遵循的程序。这些练习会议至少应该每季度举行一次，并且不应因实际事件而推迟或取消。当事件在真实事件恢复后不久发生时，跳过事件响应练习的诱惑很大。虽然现实世界的行动无法替代，但练习有助于为这些事件创造成功路径。
- en: One important point to note about incidents is that the work is not over even
    after resolution. The full response is incomplete until all systems recover to
    the pre-incident operations. In the platform, you will likely have multiple users,
    with different levels of information, all needing restoration. The 3-2-1 mantra
    applies here where platform data is backed up on three different media sources,
    in two physical locations, and with one option located offline. You can regularly
    test those backups through reversion and regression testing. These test models
    help demonstrate success before an operation becomes critical.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 关于事件的一个重要注意事项是，即使在解决之后，工作仍未结束。直到所有系统恢复到事件前的操作状态，完整的响应才算完成。在平台上，你可能会遇到多个用户，他们拥有不同水平的信息，都需要恢复。3-2-1口诀在这里适用，即平台数据在三个不同的媒体源上备份，在两个物理位置，以及一个离线选项。你可以通过回滚和回归测试定期测试这些备份。这些测试模型有助于在操作变得关键之前证明成功。
- en: Typically, testing is seen as development while incident response activities
    are operations. In the platform, you can merge these two elements. Tests are key
    to development, but running tests in operations to verify activity creates observability.
    Observability then leads to incident awareness, early operations to eliminate
    problems, and successful recovery. True learning takes place in the DevOps model
    in creating flow, feedback, and continuous improvement in multiple areas. The
    next chapter combines all the technical DevOps solutions to provide a structure
    to create high-performing platform teams.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，测试被视为开发，而事件响应活动被视为运营。在平台上，你可以合并这两个元素。测试是开发的关键，但在运营中运行测试以验证活动则创造了可观察性。可观察性随后导致事件意识，早期运营以消除问题，并成功恢复。真正的学习发生在DevOps模型中，在多个领域创造流程、反馈和持续改进。下一章将结合所有技术DevOps解决方案，为创建高性能平台团队提供结构。
- en: Summary
  id: totrans-117
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The platform evaluation in this chapter started with some of the tests and practices
    you can use to evaluate a platform. Samples of many different tests were introduced,
    with a path to success. These tests were then followed by a discussion of metrics.
    Metrics can be complicated but establishing a metric remains relatively simple.
    The basic metric framework for any question evaluates how you know and any assumptions
    around those metrics, and ensures comparisons between metrics are made accurately.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的平台评估从你可以用来评估平台的一些测试和实践开始。介绍了许多不同测试的样本，以及成功之路。然后，讨论了指标。指标可能很复杂，但建立指标相对简单。任何问题的基本指标框架评估了您如何知道以及围绕这些指标的所有假设，并确保指标之间的比较是准确的。
- en: The chapter moved on from those initial metrics to more advanced processes involving
    decomposing, monitoring, and optimizing metrics for later success. The last step
    expressed how to set up incident responses within the platform. Incident response
    includes not just negative outcomes but developing a framework to deal with every
    potential issue a platform may encounter. Good incident response makes use of
    effective testing. The next chapter takes those sound technical foundations and
    expands into how you can build a high-performance platform team.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从那些初始指标发展到更高级的过程，包括分解、监控和优化指标以实现未来的成功。最后一步说明了如何在平台上设置事件响应。事件响应不仅包括负面结果，还包括制定一个框架来处理平台可能遇到的每一个潜在问题。良好的事件响应利用有效的测试。下一章将那些坚实的理论基础扩展到如何构建高性能平台团队。
- en: Call to action
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: Practice writing and executing test cases to verify platform elements
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习编写和执行测试用例以验证平台元素
- en: Examine the metrics typically used and determine whether they provide sufficient
    information to take corrective action
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查通常使用的指标，并确定它们是否提供了足够的信息来采取纠正措施
- en: Hold a training session for the incident response team
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为事件响应团队举办培训会议
- en: 'Part 3: Accelerate **Deliver Business Value and Lead the Future**'
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分：加速**交付业务价值并引领未来**
- en: This part focuses on turning platform engineering into a strategic advantage.
    We will connect platform outcomes to business value, drive continuous improvement,
    and lead with a forward-looking mindset. This is where mastery comes into focus—where
    technology, teams, and leadership converge to deliver measurable enterprise impact.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分侧重于将平台工程转化为战略优势。我们将把平台成果与业务价值联系起来，推动持续改进，并以前瞻性的思维方式领导。这就是掌握的重点——在这里，技术、团队和领导汇聚在一起，以产生可衡量的企业影响。
- en: 'This part has the following chapters:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分包含以下章节：
