- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: IoT Network, the Neural System of Things
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The IoT network typically consists of IoT end devices, wireless connectivity
    (in most cases), and a backend cloud platform. It operates like the neural system
    of the human body, which consists of neuron cells, nervous pathways, and the brain.
    Neuron cells serve as biological sensors, detecting stimuli from the skin or muscles
    and generating biological electrical signals, similar to IoT end devices sensoring
    the object status change. These biological electrical signals travel through nervous
    pathways, which are comparable to delivering sensor data through wired/wireless
    connectivity in an IoT network.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, these biological electrical signals reach the brain, the central
    command center, as with the cloud platform in IoT. Just as the brain interprets,
    processes, and responds to sensory information, cloud services collect, store,
    analyze, and make decisions based on the received data from IoT end devices.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you will start from the multiple options of considering proper
    IoT network options for your target use case. This will help you make informed
    technology decisions for different deployment locations, whether at home, on campus,
    in a building, city, or even in a rural area.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Please note that IoT networks on industrial premises are unique and require
    specialized knowledge. This book will not cover this specific topic. Still, it
    is important to acknowledge that implementing and designing IoT systems in industrial
    settings has its own challenges and considerations. These may include network
    scalability, service reliability, data security, and integration with existing
    infrastructure.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter covers the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: IoT networks at home
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IoT networks on campuses and in buildings
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IoT networks in cities
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IoT networks in rural areas
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IoT networks at home
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The best practice for setting up an IoT network at home typically involves using
    **home Wi-Fi**, **BLE**, and **Thread**. When designing IoT applications for home
    use, such as monitoring temperature and humidity, smoke detectors, security cameras,
    and pathway lighting, it is important to prioritize simplicity, affordability,
    and ease of use for customers. Consequently, the architecture is specifically
    designed to meet the needs of residents, providing a friendly and enjoyable user
    experience.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Home Wi-Fi
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Wi-Fi**, short for **Wireless Fidelity**, is a low-cost wireless communication
    technology that enables devices to connect to the internet and communicate with
    each other without physical cables. It complies with *IEEE 802.11* standards and
    utilizes unlicensed radio frequency bands, typically 2.4 GHz, 5 GHz, and 6 GHz
    (Wi-Fi 6E). The home Wi-Fi network follows a star topology, which offers much
    simplicity and easier installation. In most cases, a home Wi-Fi router can serve
    up to 30 Wi-Fi client devices simultaneously.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Home Wi-Fi allows devices such as smartphones, tablets, laptops, smart TVs,
    and smart home devices to connect to the internet. Wi-Fi offers higher throughput
    ranging from hundreds of Mbps to Gbps, enabling users to access online services,
    browse the web, stream media, and use video surveillance and home security applications
    without the need for physical cables. By connecting to the internet, Wi-Fi enables
    control and monitoring of various smart devices in your home from anywhere in
    the world, using your smartphone, tablet, or laptop.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: However, Wi-Fi technology is not power consumption friendly compared to BLE,
    ZigBee, and LoRaWAN. Wi-Fi has strong transmission capability and wall penetration
    ability. It has the most powerful performance, but the power consumption of Wi-Fi
    is so high that it is not suitable for battery-powered devices and is more suitable
    for power plug-in devices. Some may argue that the presence of 802.11ah, also
    known as Wi-Fi HaLow, is intended to provide low-power-consumption connectivity.
    However, it is specifically targeted for use cases that are not within residential
    areas.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss more details about Wi-Fi technology in [*Chapter 4*](B22002_04.xhtml#_idTextAnchor111).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: BLE
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: BLE is a wireless technology that provides a low data rate, making it ideal
    for devices that require power efficiency. Its primary purpose is to establish
    connections with battery-powered devices, including but not limited to wearable
    devices and healthcare devices.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: In the realm of smart home technology, devices such as Amazon Alexa Echo, Google
    Home/Nest, Apple HomePod, and Apple TV serve as BLE hubs. These hubs play a vital
    role in the IoT network within a home, allowing for seamless connectivity and
    control over a wide range of smart devices in a home environment. These smart
    devices can include lighting systems, thermostats, security cameras, and much
    more.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: By utilizing BLE technology, these smart home hubs ensure reliable and efficient
    communication between devices, enhancing the overall smart home experience. Users
    can easily manage and control their smart devices through voice commands or mobile
    applications, creating a convenient and personalized living space.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss more details about BLE technology in [*Chapter 4*](B22002_04.xhtml#_idTextAnchor111).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Thread
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thread, based on the *IEEE 802.15.4* standard, complies with mesh networking
    technology that connects smart home devices, from motion sensors to door locks,
    and offers a better, more efficient way for them to work together. In a Thread
    network, multiple devices can act as board routers or mesh extenders, expanding
    the network’s reach and reliability. Unlike traditional star topology networks,
    where signals are only sent back to the original sender, mesh networks repeat
    and forward signals to other devices within range, creating a signal-hopping characteristic.
    This allows for greater range and reliability, as devices can relay signals to
    each other, extending the network’s coverage. Additionally, mesh networks automatically
    expand as more devices are added, resulting in a stronger and more reliable network
    that can support a growing number of smart home devices.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Thread natively adopts IPv6 technology, which offers numerous advantages for
    IoT applications, such as smart home, smart campus, and smart buildings applications.
    It benefits from well-established networking security and seamlessly integrates
    into the existing network infrastructure. Unlike legacy automation systems that
    operate in separate networks for each application, Thread enables multiple applications,
    even those based on different standards and protocols, to share the same network
    simultaneously. Additionally, each individual device can utilize the most suitable
    physical network type. Thread’s low-power mesh network is particularly suitable
    for power consumption-sensitive devices that need to cover large areas within
    a location.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: It is worth mentioning that there is currently a significant development in
    the application layer of Thread. The **Matter protocol**, formerly known as **Project
    CHIP** (**Connected Home over IP**), is being adopted to enhance the functionality
    and interoperability of Thread-based devices. Matter aims to create a unified
    standard for smart home devices, ensuring seamless integration and ease of use
    for consumers.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Matter adopted in the application layer of Thread signifies a major milestone
    in the evolution of smart home technology. With the adoption of the Matter protocol,
    manufacturers and developers can now leverage a standardized framework to build
    Thread-based devices that are compatible with a wide range of smart home ecosystems.
    This not only simplifies the development process but also promotes innovation
    and collaboration within the industry.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: In addition, the adoption of Matter brings numerous benefits to consumers. Establishing
    a unified standard for smart home devices eliminates the issue of compatibility
    between varied brands and platforms. Consumers can now confidently purchase Thread-based
    devices, knowing that they will seamlessly integrate with their existing smart
    home setup. This not only enhances convenience but also encourages the widespread
    adoption of smart home technology.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: The following figure compares the stack difference to Wi-Fi, Thread, Bluetooth
    Classic and Low-Energy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1 – IoT network stack at home](img/B22002_02_01.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Figure 2.1 – IoT network stack at home
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the IoT network at home, another popular case is on campuses
    and in buildings. Let’s learn more about it.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: IoT networks on campuses and in buildings
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The best practice for deploying IoT networks on campuses and in buildings typically
    includes **enterprise Wi-Fi**, a **Thread mesh**, a **private LoRaWAN network**,
    and specific industrial networks such as Wi-SUN mesh for electricity metering
    and street lighting. Although BLE and ZigBee mesh may have a limited presence
    in these locations, they are not widely utilized. This section will discuss popular
    IoT coverage options provided by enterprise Wi-Fi, Thread for buildings, and private
    LoRaWAN networks on campuses and in buildings.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Enterprise Wi-Fi
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: IoT applications on campuses and in buildings typically utilize an enterprise-grade
    architecture. This architecture considers factors such as indoor/outdoor connectivity,
    security, scalability, management, and cost. The most common wireless network
    used for IoT applications in these settings is enterprise Wi-Fi.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Compared to home Wi-Fi access, it is more than critical to consider and implement
    a robust security mechanism that allows end devices to access the enterprise Wi-Fi
    access point. Once the end devices have access to the enterprise Wi-Fi network,
    data is transmitted through the enterprise intranet, which is a private network.
    From there, it is forwarded either to the application platform at the enterprise
    data center or to the platform in the public cloud.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: 'Enterprise Wi-Fi at campus and building locations usually offers two topology
    options: star and mesh.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: A star topology is a network configuration where all devices are connected to
    a central hub, as known as a Wi-Fi access point. This hub serves as the main access
    point for routing data traffic. The star topology is known for its straightforward
    design and easy management. When a device needs to communicate with the internet,
    it sends the data to the central hub, which then forwards it to the intended destination.
    This straightforward setup makes troubleshooting and maintenance easier. A star
    topology is well suited for smaller enterprises and business spots that prioritize
    simplicity and ease of management, such as small offices, restaurants, and merchant
    franchises where a single switch connects all Wi-Fi client devices.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: A Wi-Fi mesh is a network where multiple Wi-Fi access points function as a unified
    whole. It is well suited for large campuses and building locations. Coordinated
    Wi-Fi access points are strategically placed throughout a campus, building, or
    larger area to provide access to the same wireless network. Depending on the manufacturer
    and technology chosen, one of these access points may serve as the main device,
    often referred to as a controller, or they can all be considered equal.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'Most Wi-Fi mesh networks share the following characteristics:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '**Single SSID**: This feature allows for a single network name and password.
    Wi-Fi client devices can automatically roam among the mesh network without the
    need for additional SSID provisioning.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Client steering**: Wi-Fi client devices that connect to the network are automatically
    associated with the best radio-quality access points around them.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Band steering**: The network also determines the optimal frequency band to
    provide the best performance for each client at any given time.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-healing**: If a Wi-Fi access point becomes temporarily or permanently
    unavailable, the network will automatically reroute traffic to avoid the issue.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A mesh topology is exceptionally reliable and redundant in network connectivity.
    In the event of a link or access point’s failure, data can be rerouted through
    alternative paths, ensuring uninterrupted connectivity. However, this strength
    comes with the trade-off of increased complexity and cabling requirements.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '**WPA2 for Enterprise**, also known as **WPA2-ENT**, was launched in 2004 and
    is still widely considered the standard for wireless network security. It offers
    encryption over the air and a higher level of security. When combined with the
    effective authentication protocol called 802.1X, users can be authorized and authenticated
    for secure network access. Deploying WPA2-ENT requires a RADIUS server, which
    handles the task of authenticating network user access. The authentication process
    is based on the 802.1X policy and uses various systems labeled EAP. By authenticating
    each device before connection, a personal, encrypted tunnel is effectively established
    between the device and the network.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Thread mesh
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of Thread for home will be explained in the last section. It is
    highlighted that for the expansion of the Thread network to smart buildings, along
    with the utilization of a Thread border router and battery-operated devices, it
    is typically necessary to incorporate the implementation of **Thread Mesh Extender
    (TME) devices**. This addition ensures a scalable deployment of the network, enabling
    seamless connectivity and enhanced performance throughout the building infrastructure.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: As a mesh network, Thread enables devices to not only receive data but also
    actively participate in routing data to other devices, known as TME devices. This
    unique capability of Thread creates a highly robust and efficient network infrastructure.
    TMEs, as the name suggests, are always-on Thread devices that extend the range
    and link quality of the Thread network by acting as routers for messages between
    other devices, such as battery-powered sensors. By allowing devices to act as
    relays, the network expands its coverage area without the need for additional
    repeaters or extenders. As a result, Thread provides a stable and reliable network
    with extensive reach, ensuring seamless connectivity for all devices within the
    network.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Private LoRaWAN network
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In addition to Wi-Fi, there is another wireless technology called LoRaWAN that
    can be utilized for IoT applications on campuses and in buildings. LoRaWAN is
    specifically designed for low data rates, long-range connectivity, and low power
    consumption. It is particularly suitable for applications that require long-range
    coverage and low power consumption. With LoRaWAN, IoT devices can be deployed
    in large areas such as campuses and buildings without the need for frequent battery
    replacements or complex infrastructure setups.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: LoRaWAN end devices communicate with single or multiple LoRaWAN gateways over
    long distances using an unlicensed radio spectrum known as the **industrial, scientific,
    and medical** (**ISM**) band. Unlike Wi-Fi, which operates on the 2.4 GHz and
    5 GHz ISM bands, LoRaWAN usually operates on the Sub-GHz band. In Europe, it uses
    the 868 MHz frequency, while in the US, it uses 915 MHz. This Sub-GHz band offers
    better penetration and propagation capabilities than Wi-Fi, making it especially
    suitable for providing coverage deep inside buildings.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The architecture of LoRaWAN is unique. Behind the LoRaWAN gateway, the data
    arrives at the LoRaWAN network server first. The network server is responsible
    for device management, payload encryption, and the application API.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a standard LoRaWAN network diagram used on campuses and in
    buildings, including both open-field outdoor and indoor coverage:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2 – LoRaWAN private network](img/B22002_02_02.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: Figure 2.2 – LoRaWAN private network
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: The LoRaWAN network implemented in these locations follows a loosely coupled
    star topology. Unlike enterprise Wi-Fi, a LoRaWAN endpoint does not establish
    a predefined association with a dedicated LoRaWAN gateway. Instead, the data transmitted
    from a LoRaWAN endpoint, also known as an uplink message, can be received by several
    LoRaWAN gateways in the neighboring area. However, the returning data, known as
    **downlink messages**, will be delivered from the best-signal-quality LoRaWAN
    gateway to the endpoint. The LoRaWAN gateway is typically installed on the wall
    or ceiling indoors and on a lighting pole outdoors.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: A private LoRaWAN network is a model in which the entire infrastructure is deployed
    and hosted by the IoT application providers. In this model, the IoT application
    providers take the responsibility of installing the LoRaWAN gateway themselves,
    ensuring seamless and efficient network connectivity for their IoT devices. With
    a private LoRaWAN network, the IoT application providers have complete control
    over the network operations and can tailor them to their specific needs and requirements.
    This allows for greater flexibility and customization in managing and monitoring
    connected devices, ensuring optimal performance and security.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: No one-size-fits-all approach
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When it comes to IoT applications, it is important to understand that Wi-Fi,
    Thread, and LoRaWAN are not interchangeable options. Each of these wireless technologies
    has its own strengths and considerations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Wi-Fi is a smart choice for IoT applications that require high throughput, such
    as surveillance cameras. It offers fast and reliable connectivity, but it does
    come with a requirement for an external power supply.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, Thread and LoRaWAN are specifically designed for use cases
    that prioritize low power consumption. While they may have lower throughput compared
    to Wi-Fi, devices equipped with Thread and LoRaWAN radio can typically operate
    on batteries for years. This makes them an ideal choice for devices such as smoke
    detectors, water leakage detectors, and security sensors, as well as temperature
    and humidity sensors.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: The IoT network on campuses and in buildings can be easily built and hosted
    by enterprise customers themselves. Extending IoT networks to cover the entire
    city demands seamless mobility and higher availability to serve multiple customers
    and diverse applications, which will increase complexity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: IoT networks in cities
  id: totrans-65
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Applications of IoT in a city can be seen as a complex system on a large scale.
    This system has different parts and technologies that work together to create
    an efficient and seamless system. One of the main challenges in implementing IoT
    in a city is making sure there is good wireless network coverage. This is important
    for IoT devices to work well and exchange data. The best practice to set up an
    IoT network in a city is usually by using a cellular network (such as 4G/LTE and
    5G) and a public LoRaWAN network from public IoT SPs. These technologies offer
    wide coverage and can reach deep into buildings, which makes them great for IoT
    solutions in cities.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Cellular network
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4G/LTE and 5G networks use cellular coverage from SPs to provide reliable connectivity
    for IoT devices from LTE-M and NB-IoT with low power consumption and low data
    rate (LPWAN), and superior high data rate technologies such as **LTE Advanced**
    (**LTE-A**) and 5G **Enhanced Mobile Broadband** (**eMBB**). These networks are
    well established and widely available, making them a popular choice for diverse
    IoT deployments. IoT devices on this network need a cellular modem and SIM/eSIM
    chip. These devices communicate with eNodeB, which is the base station of the
    cellular network. Data is then sent from eNodeB to the SP’s packet core network
    and finally reaches the data platform, which can be in a data center or the cloud.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: The cellular access network typically has a star topology. SPs install eNodeB
    stations on cellular towers and city building roofs. These strategically placed
    eNodeB stations are crucial for communication with end devices, which have cellular
    modems and SIM cards or eSIM chipsets.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is the standard architecture of a 4G/LTE network:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.3 – 4G/LTE network](img/B22002_02_03.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: Figure 2.3 – 4G/LTE network
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Public LoRaWAN network
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LoRaWAN uses unlicensed spectrum, making it a radio resource-sharing network.
    Unlike cellular networks, which assign dedicated air resources to each end device,
    LoRaWAN aims to support use cases on a best-effort basis. As a result, it may
    not be suitable for all IoT applications, especially those that are mission-critical.
    The topology of the LoRaWAN network in a city is the same as the one deployed
    on campuses and in buildings, which is a loosely coupled star topology as well.
    In this topology, there is a central hub called the LoRaWAN gateway that acts
    as a bridge between the end devices and the network server. The LoRaWAN gateway
    can be installed in various locations within the city. It can be mounted on the
    roof of a city building, providing wide coverage and a clear line of sight for
    communication. Another option is to install it on an electricity power pole, strategically
    placing it for optimal signal transmission. Lastly, the LoRaWAN gateway can also
    be mounted on a street light pole, taking advantage of existing infrastructure
    to expand the network reach.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: When thinking about how well a network can handle lots of users, stay available,
    and be reliable, a public LoRaWAN network usually uses a cloud-based LoRaWAN network
    server. This cloud-based server can easily grow and adapt to handle more users
    and higher demands.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a cloud-based LoRaWAN network diagram:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.4 – Cloud-based public LoRaWAN network](img/B22002_02_04.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
- en: Figure 2.4 – Cloud-based public LoRaWAN network
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: AWS IoT Core ([https://aws.amazon.com/iot-core/](https://aws.amazon.com/iot-core/))
    for LoRaWAN is a fully managed LoRaWAN network server. It allows you to connect
    and manage LoRaWAN devices using LoRaWAN connectivity with the AWS cloud. With
    AWS IoT Core for LoRaWAN, customers can establish their LoRaWAN network by connecting
    many LoRaWAN devices and gateways to the AWS cloud, without having to develop
    or operate a network server for LoRaWAN themselves. This removes the burden of
    managing a network server and enables easy and fast connection and security for
    LoRaWAN device fleets at scale.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: By using the long-range and wide in-building coverage of LoRaWAN, AWS IoT Core
    for LoRaWAN helps customers speed up IoT application development. This is achieved
    by utilizing data generated from connected LoRaWAN devices through AWS services.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: IoT networks in cities can leverage the 4G/LTE cellular network or other public-hosted
    wireless infrastructure such as LoRaWAN. In rural areas, any public coverage rarely
    reaches there; that is a significant challenge, but there still is a chance.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: IoT networks in rural areas
  id: totrans-82
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Those spaces, such as agriculture, oil fields, mining sites, forests, national
    parks, mountains, coastlines, and offshore areas, usually do not have cellular
    network coverage. IoT applications targeted for these areas must overcome the
    challenges of wireless connectivity. The best practice for accessing an IoT network
    in addition to a cellular network in a rural area is a **private LoRaWAN** network
    and a LEO network.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Private LoRaWAN network
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In addition to deploying LoRaWAN networks on campuses and in buildings, establishing
    a private LoRaWAN network in rural areas is also a reliable and cost-effective
    option. With its long-range capabilities and low power consumption, LoRaWAN is
    ideal for various IoT applications. In such cases, IoT application providers have
    the flexibility to create their own private LoRaWAN coverage at the location where
    they offer services. This model allows them to have complete control over the
    network and ensure reliable connectivity for their IoT devices.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: By establishing a private LoRaWAN network, IoT application providers can overcome
    the limitations of relying on external SPs and ensure seamless connectivity for
    their devices. They can customize the network according to their specific requirements,
    ensuring maximum coverage and performance.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: LEO network
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another good option for getting wireless connectivity in rural areas for IoT
    applications is to use a wireless broadband network provided by LEO satellites,
    such as Starlink. With this approach, you just need to set up a Starlink terminal
    at the location. This terminal acts as a gateway and gives you a reliable Wi-Fi
    hotspot to connect your IoT devices.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Using LEO satellites helps overcome the limitations of traditional cellular
    networks or local infrastructure for IoT deployments. The Starlink terminal plays
    an important role by connecting your IoT devices to the satellite network, allowing
    them to communicate seamlessly over long distances. This solution is especially
    useful in remote or hard-to-reach areas where cellular coverage is limited or
    not available.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用低地球轨道（LEO）卫星有助于克服传统蜂窝网络或本地基础设施在物联网部署中的局限性。Starlink终端通过将您的物联网设备连接到卫星网络，使它们能够无缝地跨越长距离进行通信，发挥着重要作用。这种解决方案在蜂窝覆盖有限或不可用的人迹罕至地区尤其有用。
- en: Summary
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we explored the wide-ranging world of IoT networks. We saw
    how they are used in different settings: making our homes more convenient, improving
    efficiency on campuses and in buildings, driving innovation in cities, and enhancing
    rural areas.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探索了物联网网络的广泛世界。我们看到了它们在不同环境中的应用：使我们的家庭更加便利，提高校园和建筑物的效率，推动城市创新，以及改善农村地区。
- en: 'As we move on to the next chapter, we shift our focus from the entire network
    to individual elements: the end device. In this chapter, we will look closely
    at the different types of devices that are the building blocks of an IoT network.
    We will study the hardware architecture of these devices, with a special focus
    on MCUs, which are like the brains of these devices. We will also discuss peripherals
    and interfaces that allow the devices to interact with their surroundings, as
    well as sensors and actuators that make the environment responsive and interactive.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入下一章，我们将关注点从整个网络转移到单个元素：终端设备。在本章中，我们将仔细研究构成物联网网络基石的不同类型设备。我们将研究这些设备的硬件架构，特别关注微控制器（MCUs），它们就像是这些设备的“大脑”。我们还将讨论允许设备与其周围环境交互的外设和接口，以及使环境响应和交互的传感器和执行器。
