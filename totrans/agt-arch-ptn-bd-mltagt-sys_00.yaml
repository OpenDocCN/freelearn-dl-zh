- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Generative AI, and specifically agentic AI, is a paradigm that is rapidly becoming
    a pillar of modern enterprise technology. Agentic AI entails designing systems
    where large language models (LLMs) act not just as monolithic text generators,
    but as distributed reasoning engines, each capable of perceiving their environment,
    making decisions, and taking actions to collectively achieve specific goals. Among
    other advantages, agentic AI allows the automation of complex, cognitive workflows.
    This reduces the need for human intervention in multi-step processes and thus
    enables the creation of adaptive, autonomous systems that can scale expertise
    across an organization while integrating human approval in the processes that
    are most critical.
  prefs: []
  type: TYPE_NORMAL
- en: 'Among all the emerging technologies in this space, there are many frameworks
    and their abstractions as patterns that allow for the creation of these agents.
    This book focuses on the universal architectural patterns that underpin robust
    agentic systems, while utilizing powerful tools like Google’s Gemini models and
    the Agent Development Kit (ADK), along with popular frameworks like LangGraph
    and CrewAI. These tools are pivotal today because, in addition to being at the
    cutting edge of the industry, they offer the following advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: They allow for the creation of agents that can reason, plan, and use tools to
    interact with the real world.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They support complex coordination between multiple agents, considering dependencies
    and shared context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They provide the infrastructure for governing, securing, and observing autonomous
    systems in production.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this book dedicated to designing and building progressively more sophisticated
    agentic AI, we will first discuss the landscape of generative AI in the enterprise,
    the selection and adaptation of "agent-ready" LLMs, how to architect the anatomy
    of an intelligent agent, and how to govern and integrate these systems using a
    maturity model.
  prefs: []
  type: TYPE_NORMAL
- en: Once the foundational concepts and agent anatomy are understood, we will discuss
    the practical design patterns for building robust systems that combine agents.
    We will explore how to coordinate multiple agents, ensure explainability and compliance,
    implement fault tolerance, and design effective human-agent interactions.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we will conclude this book by looking at advanced implementations and
    real-world use cases, including building self-improving systems, a detailed progressive
    roadmap for enterprise adoption, and practical coding examples of single and multi-agent
    systems for financial workflows using modern frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: This book will guide you through a comprehensive pattern language for designing
    and building agentic systems, and it will also cover practical recipes on integrating
    and implementing these patterns with tools such as Google ADK, CrewAI, and LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the agent configurations described in this book are illustrated using
    Google’s Gemini models and Python, but you can apply these architectural patterns
    to other LLMs and frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: In this book, I wanted to share our experience of real and practical agentic
    ai scenarios that we have encountered while working with enterprises and engaging
    with the global AI community.
  prefs: []
  type: TYPE_NORMAL
- en: Who this book is for
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This book is for software architects, senior developers, AI engineers, and technical
    leaders looking to move beyond simple chatbot prototypes and build robust, production-grade
    agentic systems. Experience with Python programming, basic machine learning concepts,
    and a familiarity with API-based development is required to get the most out of
    this agentic AI book.
  prefs: []
  type: TYPE_NORMAL
- en: What this book covers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*[Chapter 1](Chapter_1.xhtml#h1_14)*, *GenAI in the Enterprise: Landscape,
    Maturity, and Agent Focus*, details the transformative potential of GenAI, introduces
    the core concept of agentic systems, and presents the GenAI Maturity Model as
    a strategic roadmap for adoption.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 2](Chapter_2.xhtml#h1_35)*, *Agent-Ready LLMs: Selection, Deployment,
    and Adaptation*, introduces criteria for selecting the right foundation models,
    strategies for efficient deployment and serving, and the discipline of AgentOps
    for managing the agent life cycle.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 3](Chapter_3.xhtml#h1_59)*, *The Spectrum of LLM Adaptation for Agents:
    RAG to Fine-tuning*, explores techniques for specializing LLMs, ranging from dynamic
    context retrieval (RAG) and in-context learning to parameter-efficient fine-tuning.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 4](Chapter_4.xhtml#h1_83)*, *Agentic AI Architecture: Components
    and Interactions*, dissects the fundamental anatomy of an agent—*Sense*, *Reason*,
    *Plan*, *Act*—and examines the architectural features and data contexts required
    for agents to operate intelligently.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 5](Chapter_5.xhtml#h1_101)*, *Multi-Agent Coordination Patterns*,
    covers strategies for managing collaboration between agents, including the ***Agent
    Router***, task delegation frameworks (***Supervisor*** vs. ***Swarm***), and
    patterns for negotiation and consensus.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 6](Chapter_6.xhtml#h1_231)*, *Explainability and Compliance Agentic
    Patterns*, details patterns for ensuring accountability, such as ***Instruction
    Fidelity Auditing*** and ***Fractal Chain-of-Thought (FCoT) embedding***, to create
    transparent and auditable reasoning trails.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 7](Chapter_7.xhtml#h1_269)*, *Robustness and Fault Tolerance Patterns*,
    introduces architectural safeguards like ***Adaptive Retry***, ***Circuit Breakers***,
    and ***Parallel Execution Consensus*** to ensure agents remain reliable in the
    face of errors and uncertainty.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 8](Chapter_8.xhtml#h1_406)*, *Human-Agent Interaction Patterns*,
    examines the interface between AI and people, covering patterns for delegation,
    seamless handoffs, and Human-in-the-Loop escalation strategies for high-stakes
    decisions.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 9](Chapter_9.xhtml#h1_455)*, *Agent-Level Patterns*, focuses on the
    internal capabilities of a single agent, exploring patterns for managing agent-specific
    memory, structured reasoning, and multimodal perception.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 10](Chapter_10.xhtml#h1_504)*, *System-Level Patterns for Production
    Readiness*, discusses the holistic infrastructure required for enterprise deployment,
    including patterns for security, discovery registries, and event-driven reactivity.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 11](Chapter_11.xhtml#h1_546)*, *Advanced Adaptation: Building Agents
    That Learn*, explores the cutting edge of self-improving systems, covering synthetic
    data generation, automated scoring, and the "flywheel" effect of co-evolved agent
    training.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 12](Chapter_12.xhtml#h1_614)*, *A Practical Roadmap: Implementing
    Agentic Patterns by Maturity Level*, provides a synthesized guide for progressively
    adopting these patterns, mapping them to specific stages of organizational maturity
    from foundational to advanced.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 13](Chapter_13.xhtml#h1_639)*, *Use Case: A Single Agent for Loan
    Processing*, walks through a practical implementation of a monolithic agent handling
    a complex financial workflow, demonstrating the application of FCoT and tool use
    in code.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 14](Chapter_14.xhtml#h1_664)*, *Use Case: A Multi-Agent System for
    Loan Processing*, evolves the previous use case into a distributed multi-agent
    system, showcasing how specialized agents collaborate to handle intake, risk,
    and compliance.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 15](Chapter_15.xhtml#h1_689)*, *Agent Frameworks – Use Case: A Multi-Agent
    System for Loan Processing with CrewAI and LangGraph*, compares and contrasts
    popular industry frameworks by re-implementing the loan processing scenario to
    highlight the strengths of different abstraction models.'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Chapter 16](Chapter_16.xhtml#h1_709)*, *Conclusion: Charting Your Agentic
    AI Journey*, summarizes the key architectural principles, offers a progressively
    more sophisticated practitioner''s roadmap and action plan, and provides a final
    perspective on the future of the agentic workforce.'
  prefs: []
  type: TYPE_NORMAL
- en: To get the most out of this book
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You should have a fundamental understanding of Python programming and object-oriented
    design principles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should be familiar with basic generative AI concepts, such as what is an
    LLM and how prompting works.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to a Python development environment (such as Jupyter Notebooks or Google
    Colab) is recommended for running the code examples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will need API keys for Google Gemini (via Google AI Studio or Vertex AI)
    to execute the specific implementation examples provided in the use case chapters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
