- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Generative AI, and specifically agentic AI, is a paradigm that is rapidly becoming
    a pillar of modern enterprise technology. Agentic AI entails designing systems
    where large language models (LLMs) act not just as monolithic text generators,
    but as distributed reasoning engines, each capable of perceiving their environment,
    making decisions, and taking actions to collectively achieve specific goals. Among
    other advantages, agentic AI allows the automation of complex, cognitive workflows.
    This reduces the need for human intervention in multi-step processes and thus
    enables the creation of adaptive, autonomous systems that can scale expertise
    across an organization while integrating human approval in the processes that
    are most critical.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI，特别是代理式AI，正迅速成为现代企业技术的支柱。代理式AI意味着设计系统，其中大型语言模型（LLMs）不仅作为单一的文本生成器，而且作为分布式推理引擎，每个都能感知其环境，做出决策，并采取行动以共同实现特定目标。在众多优势中，代理式AI允许自动化复杂的认知工作流程。这减少了在多步骤过程中对人类干预的需求，从而使得能够创建自适应、自主的系统，这些系统能够在整个组织中扩展专业知识，同时将人类批准整合到最关键的过程中。
- en: 'Among all the emerging technologies in this space, there are many frameworks
    and their abstractions as patterns that allow for the creation of these agents.
    This book focuses on the universal architectural patterns that underpin robust
    agentic systems, while utilizing powerful tools like Google’s Gemini models and
    the Agent Development Kit (ADK), along with popular frameworks like LangGraph
    and CrewAI. These tools are pivotal today because, in addition to being at the
    cutting edge of the industry, they offer the following advantages:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个领域的所有新兴技术中，有许多框架及其抽象模式，这些模式允许创建这些代理。本书专注于支撑稳健代理系统的通用架构模式，同时利用像谷歌的Gemini模型和代理开发工具包（ADK）这样的强大工具，以及像LangGraph和CrewAI这样的流行框架。这些工具在今天至关重要，因为除了处于行业前沿之外，它们还提供了以下优势：
- en: They allow for the creation of agents that can reason, plan, and use tools to
    interact with the real world.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们允许创建能够推理、计划和利用工具与真实世界互动的代理。
- en: They support complex coordination between multiple agents, considering dependencies
    and shared context.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们支持多个代理之间的复杂协调，考虑依赖关系和共享上下文。
- en: They provide the infrastructure for governing, securing, and observing autonomous
    systems in production.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们为治理、保护和监控生产中的自主系统提供了基础设施。
- en: In this book dedicated to designing and building progressively more sophisticated
    agentic AI, we will first discuss the landscape of generative AI in the enterprise,
    the selection and adaptation of "agent-ready" LLMs, how to architect the anatomy
    of an intelligent agent, and how to govern and integrate these systems using a
    maturity model.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本致力于设计和构建日益复杂的代理式AI的书中，我们首先将讨论企业生成式AI的格局，“代理式”LLMs的选择和适应，如何构建智能代理的结构，以及如何使用成熟度模型来治理和整合这些系统。
- en: Once the foundational concepts and agent anatomy are understood, we will discuss
    the practical design patterns for building robust systems that combine agents.
    We will explore how to coordinate multiple agents, ensure explainability and compliance,
    implement fault tolerance, and design effective human-agent interactions.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦理解了基础概念和代理结构，我们将讨论构建结合代理的稳健系统的实用设计模式。我们将探讨如何协调多个代理，确保可解释性和合规性，实现容错性，以及设计有效的人机交互。
- en: Finally, we will conclude this book by looking at advanced implementations and
    real-world use cases, including building self-improving systems, a detailed progressive
    roadmap for enterprise adoption, and practical coding examples of single and multi-agent
    systems for financial workflows using modern frameworks.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将通过查看高级实现和实际用例来结束本书，包括构建自我改进的系统、企业采用的高级详细路线图，以及使用现代框架的金融工作流程的单代理和多代理系统的实际编码示例。
- en: This book will guide you through a comprehensive pattern language for designing
    and building agentic systems, and it will also cover practical recipes on integrating
    and implementing these patterns with tools such as Google ADK, CrewAI, and LangGraph.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将指导您了解设计和构建代理系统的全面模式语言，并还将涵盖使用Google ADK、CrewAI和LangGraph等工具整合和实施这些模式的具体配方。
- en: Most of the agent configurations described in this book are illustrated using
    Google’s Gemini models and Python, but you can apply these architectural patterns
    to other LLMs and frameworks.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本书描述的大多数代理配置都是使用Google的Gemini模型和Python进行说明的，但你也可以将这些架构模式应用到其他LLM和框架中。
- en: In this book, I wanted to share our experience of real and practical agentic
    ai scenarios that we have encountered while working with enterprises and engaging
    with the global AI community.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我想分享我们在与企业合作以及与全球AI社区互动过程中遇到的真实的、实用的代理人工智能场景的经验。
- en: Who this book is for
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向的对象
- en: This book is for software architects, senior developers, AI engineers, and technical
    leaders looking to move beyond simple chatbot prototypes and build robust, production-grade
    agentic systems. Experience with Python programming, basic machine learning concepts,
    and a familiarity with API-based development is required to get the most out of
    this agentic AI book.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向软件架构师、高级开发者、AI工程师和技术领导者，他们希望超越简单的聊天机器人原型，构建健壮、生产级的代理系统。为了充分利用这本代理人工智能书籍，需要具备Python编程经验、基本机器学习概念，以及基于API的开发熟悉度。
- en: What this book covers
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '*[Chapter 1](Chapter_1.xhtml#h1_14)*, *GenAI in the Enterprise: Landscape,
    Maturity, and Agent Focus*, details the transformative potential of GenAI, introduces
    the core concept of agentic systems, and presents the GenAI Maturity Model as
    a strategic roadmap for adoption.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第一章](Chapter_1.xhtml#h1_14)*，*GenAI in the Enterprise: Landscape, Maturity,
    and Agent Focus*，详细介绍了GenAI的变革潜力，引入了代理系统的核心概念，并提出了GenAI成熟度模型作为采用的战略路线图。'
- en: '*[Chapter 2](Chapter_2.xhtml#h1_35)*, *Agent-Ready LLMs: Selection, Deployment,
    and Adaptation*, introduces criteria for selecting the right foundation models,
    strategies for efficient deployment and serving, and the discipline of AgentOps
    for managing the agent life cycle.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第二章](Chapter_2.xhtml#h1_35)*，*Agent-Ready LLMs: Selection, Deployment, and
    Adaptation*，介绍了选择合适基础模型的准则、高效部署和服务的策略，以及用于管理代理生命周期的AgentOps学科。'
- en: '*[Chapter 3](Chapter_3.xhtml#h1_59)*, *The Spectrum of LLM Adaptation for Agents:
    RAG to Fine-tuning*, explores techniques for specializing LLMs, ranging from dynamic
    context retrieval (RAG) and in-context learning to parameter-efficient fine-tuning.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第三章](Chapter_3.xhtml#h1_59)*，*The Spectrum of LLM Adaptation for Agents:
    RAG to Fine-tuning*，探讨了针对LLM进行专业化的技术，从动态上下文检索（RAG）和上下文学习到参数高效的微调。'
- en: '*[Chapter 4](Chapter_4.xhtml#h1_83)*, *Agentic AI Architecture: Components
    and Interactions*, dissects the fundamental anatomy of an agent—*Sense*, *Reason*,
    *Plan*, *Act*—and examines the architectural features and data contexts required
    for agents to operate intelligently.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第四章](Chapter_4.xhtml#h1_83)*，*Agentic AI Architecture: Components and Interactions*，剖析了代理的基本结构——*感知*、*推理*、*计划*、*行动*——并检查了代理智能操作所需的架构特性和数据上下文。'
- en: '*[Chapter 5](Chapter_5.xhtml#h1_101)*, *Multi-Agent Coordination Patterns*,
    covers strategies for managing collaboration between agents, including the ***Agent
    Router***, task delegation frameworks (***Supervisor*** vs. ***Swarm***), and
    patterns for negotiation and consensus.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第五章](Chapter_5.xhtml#h1_101)*，*Multi-Agent Coordination Patterns*，涵盖了管理代理之间协作的策略，包括***代理路由器***、任务委托框架（***监督者***
    vs. ***蜂群***）、以及协商和共识的模式。'
- en: '*[Chapter 6](Chapter_6.xhtml#h1_231)*, *Explainability and Compliance Agentic
    Patterns*, details patterns for ensuring accountability, such as ***Instruction
    Fidelity Auditing*** and ***Fractal Chain-of-Thought (FCoT) embedding***, to create
    transparent and auditable reasoning trails.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第六章](Chapter_6.xhtml#h1_231)*，*Explainability and Compliance Agentic Patterns*，详细介绍了确保责任制的模式，如***指令忠实度审计***和***分形思维链（FCoT）嵌入***，以创建透明且可审计的推理路径。'
- en: '*[Chapter 7](Chapter_7.xhtml#h1_269)*, *Robustness and Fault Tolerance Patterns*,
    introduces architectural safeguards like ***Adaptive Retry***, ***Circuit Breakers***,
    and ***Parallel Execution Consensus*** to ensure agents remain reliable in the
    face of errors and uncertainty.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第七章](Chapter_7.xhtml#h1_269)*，*Robustness and Fault Tolerance Patterns*，介绍了如***自适应重试***、***断路器***、和***并行执行共识***等架构保障措施，以确保代理在面对错误和不确定性时保持可靠性。'
- en: '*[Chapter 8](Chapter_8.xhtml#h1_406)*, *Human-Agent Interaction Patterns*,
    examines the interface between AI and people, covering patterns for delegation,
    seamless handoffs, and Human-in-the-Loop escalation strategies for high-stakes
    decisions.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第八章](Chapter_8.xhtml#h1_406)*，*Human-Agent Interaction Patterns*，考察了AI与人类之间的接口，涵盖了委托、无缝移交以及高风险决策中的人机交互策略。'
- en: '*[Chapter 9](Chapter_9.xhtml#h1_455)*, *Agent-Level Patterns*, focuses on the
    internal capabilities of a single agent, exploring patterns for managing agent-specific
    memory, structured reasoning, and multimodal perception.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第9章](Chapter_9.xhtml#h1_455)*，*代理级模式*，专注于单个代理的内部能力，探讨了管理代理特定内存、结构化推理和多模态感知的模式。'
- en: '*[Chapter 10](Chapter_10.xhtml#h1_504)*, *System-Level Patterns for Production
    Readiness*, discusses the holistic infrastructure required for enterprise deployment,
    including patterns for security, discovery registries, and event-driven reactivity.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第10章](Chapter_10.xhtml#h1_504)*，*生产就绪的系统级模式*，讨论了企业部署所需的整体基础设施，包括安全模式、发现注册表和事件驱动的反应模式。'
- en: '*[Chapter 11](Chapter_11.xhtml#h1_546)*, *Advanced Adaptation: Building Agents
    That Learn*, explores the cutting edge of self-improving systems, covering synthetic
    data generation, automated scoring, and the "flywheel" effect of co-evolved agent
    training.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第11章](Chapter_11.xhtml#h1_546)*，*高级适应：构建学习型代理*，探讨了自我改进系统的前沿，涵盖了合成数据生成、自动评分和协同进化的代理训练的“飞轮”效应。'
- en: '*[Chapter 12](Chapter_12.xhtml#h1_614)*, *A Practical Roadmap: Implementing
    Agentic Patterns by Maturity Level*, provides a synthesized guide for progressively
    adopting these patterns, mapping them to specific stages of organizational maturity
    from foundational to advanced.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第12章](Chapter_12.xhtml#h1_614)*，*实用路线图：按成熟度级别实现代理模式*，提供了一个综合指南，逐步采用这些模式，将它们映射到从基础到高级的组织成熟度特定阶段。'
- en: '*[Chapter 13](Chapter_13.xhtml#h1_639)*, *Use Case: A Single Agent for Loan
    Processing*, walks through a practical implementation of a monolithic agent handling
    a complex financial workflow, demonstrating the application of FCoT and tool use
    in code.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第13章](Chapter_13.xhtml#h1_639)*，*用例：单一代理处理贷款*，通过一个处理复杂金融工作流的单体代理的实际实现，展示了
    FCoT 和工具在代码中的应用。'
- en: '*[Chapter 14](Chapter_14.xhtml#h1_664)*, *Use Case: A Multi-Agent System for
    Loan Processing*, evolves the previous use case into a distributed multi-agent
    system, showcasing how specialized agents collaborate to handle intake, risk,
    and compliance.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第14章](Chapter_14.xhtml#h1_664)*，*用例：贷款处理的多代理系统*，将前面的用例演变为分布式多代理系统，展示了专业代理如何协作处理接收、风险和合规性。'
- en: '*[Chapter 15](Chapter_15.xhtml#h1_689)*, *Agent Frameworks – Use Case: A Multi-Agent
    System for Loan Processing with CrewAI and LangGraph*, compares and contrasts
    popular industry frameworks by re-implementing the loan processing scenario to
    highlight the strengths of different abstraction models.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第15章](Chapter_15.xhtml#h1_689)*，*代理框架 – 用例：使用 CrewAI 和 LangGraph 的贷款处理多代理系统*，通过重新实现贷款处理场景来比较和对比流行的行业框架，突出不同抽象模型的优势。'
- en: '*[Chapter 16](Chapter_16.xhtml#h1_709)*, *Conclusion: Charting Your Agentic
    AI Journey*, summarizes the key architectural principles, offers a progressively
    more sophisticated practitioner''s roadmap and action plan, and provides a final
    perspective on the future of the agentic workforce.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*[第16章](Chapter_16.xhtml#h1_709)*，*结论：规划您的代理人工智能之旅*，总结了关键架构原则，提供了一个越来越复杂的实践者路线图和行动计划，并提供了对代理劳动力未来的最终观点。'
- en: To get the most out of this book
  id: totrans-31
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用这本书
- en: You should have a fundamental understanding of Python programming and object-oriented
    design principles.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您应该对 Python 编程和面向对象设计原则有基本的理解。
- en: You should be familiar with basic generative AI concepts, such as what is an
    LLM and how prompting works.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您应该熟悉基本的生成式人工智能概念，例如什么是大型语言模型（LLM）以及提示是如何工作的。
- en: Access to a Python development environment (such as Jupyter Notebooks or Google
    Colab) is recommended for running the code examples.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推荐使用 Python 开发环境（例如 Jupyter Notebooks 或 Google Colab）来运行代码示例。
- en: You will need API keys for Google Gemini (via Google AI Studio or Vertex AI)
    to execute the specific implementation examples provided in the use case chapters.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您将需要 Google Gemini（通过 Google AI Studio 或 Vertex AI）的 API 密钥来执行用例章节中提供的特定实现示例。
- en: Download the example code files
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载示例代码文件
- en: The code bundle for the book is hosted on GitHub at [https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems](https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍的代码包托管在GitHub上，网址为[https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems](https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems)。我们还有其他来自我们丰富图书和视频目录的代码包，可在[https://github.com/PacktPublishing](https://github.com/PacktPublishing)找到。查看它们吧！
- en: Download the color images
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781806029570](https://packt.link/gbp/9781806029570)'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图/图表的彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781806029570](https://packt.link/gbp/9781806029570)
- en: Conventions used
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and Twitter handles.
    For example: "Each sub-agent is an `LLMAgent` instance designed and adapted to
    become an expert at a specific compound task or within a narrow domain."'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`: 表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和Twitter昵称。例如：“每个子代理是一个`LLMAgent`实例，它被设计和调整以成为特定复合任务或狭窄领域的专家。”'
- en: 'A block of code is set as follows:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块设置如下：
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Any command-line input or output is written as follows:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 任何命令行输入或输出都如下所示：
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: "**Generative AI** (**GenAI**) is a field of **artificial intelligence**
    (**AI**) that allows systems to create new or synthesized content, reason, understand
    context, and make recommendations by learning from underlying patterns in vast
    datasets."'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**: 表示新术语、重要单词或您在屏幕上看到的单词。例如，菜单或对话框中的单词在文本中如下所示。例如：“**生成式AI**（**GenAI**）是**人工智能**（**AI**）的一个领域，它允许系统通过从大量数据集中的潜在模式中学习来创建新内容、推理、理解上下文并做出推荐。”'
- en: Warnings or important notes appear like this.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要提示如下所示。
- en: Tips and tricks appear like this.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 技巧和窍门如下所示。
- en: Get in touch
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from our readers is always welcome.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们始终欢迎读者的反馈。
- en: '**General feedback**: If you have questions about any aspect of this book or
    have any general feedback, please email us at `customercare``@packt.com`and mention
    the book''s title in the subject of your message.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**: 如果您对本书的任何方面有疑问或有任何一般性反馈，请通过`customercare@packt.com`给我们发邮件，并在邮件主题中提及书籍的标题。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you reported this to us. Please visit [http://www.packt.com/submit-errata](https://http://www.packt.com/submit-errata),
    click **Submit Errata**, and fill in the form.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**勘误**: 尽管我们已经尽最大努力确保内容的准确性，但错误仍然可能发生。如果您在这本书中发现了错误，如果您能向我们报告，我们将不胜感激。请访问[http://www.packt.com/submit-errata](https://http://www.packt.com/submit-errata)，点击**提交勘误**，并填写表格。'
- en: '**Piracy**: If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at `copyright@packt.com` with a link
    to the material.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**: 如果您在互联网上发现任何形式的我们作品的非法副本，如果您能提供位置地址或网站名称，我们将不胜感激。请通过`copyright@packt.com`与我们联系，并附上材料的链接。'
- en: '**If** **you** **are** **interested in becoming an author**: If there is a
    topic that you have expertise in and you are interested in either writing or contributing
    to a book, please visit [http://authors.packt.com/](https://http://authors.packt.com/).'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您** **想** **成为** **作者**: 如果您在某个领域有专业知识，并且您有兴趣撰写或为书籍做出贡献，请访问[http://authors.packt.com/](https://http://authors.packt.com/)。'
