- en: '7'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Key Role Vectors and Vector Stores Play in RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Vectors** are a key component of **retrieval-augmented generation** (**RAG**)
    to understand, as they are the secret ingredient that helps the entire process
    work well in a large portion of RAG applications. In this chapter, we dive back
    into our code from previous chapters with an emphasis on how it is impacted by
    vectors. In simplistic terms, this chapter will talk about what a vector is, how
    vectors are created, and where to store them. In more technical terms, we will
    talk about vectors, **vectorization**, and **vector stores**. This chapter is
    all about vector creation and why they are important. We are going to focus on
    how vectors relate to RAG, but we encourage you to spend more time and research
    gaining as in-depth an understanding of vectors as you can. The more you understand
    vectors, the more effective you will be at improving your RAG pipelines.'
  prefs: []
  type: TYPE_NORMAL
- en: The vector discussion is so important, though, that we will span it across two
    chapters. While this chapter focuses on vectors and vector stores, [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176)
    will focus on vector searches, which is to say how the vectors are used in a RAG
    system.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, we will cover the following topics in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentals of vectors in RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where vectors lurk in your code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The amount of text you vectorize matters!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not all semantics are created equal!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 7.1 – common vectorization techniques
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Factors in selecting a vectorization option
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting started with vector stores
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choosing a vector store
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Going back to the code we discussed in previous chapters, this chapter focuses
    on just this line of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The code for this chapter is here: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_07](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_07).'
  prefs: []
  type: TYPE_NORMAL
- en: The filename is `CHAPTER7-1_COMMON_VECTORIZATION_TECHNIQUES.ipynb`.
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176) will focus on just this
    line of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Is that it? Just those two lines of code for two chapters? Yes! That shows you
    how important vectors are to the RAG system. To thoroughly understand vectors,
    we’ll start with the fundamentals and build up from there.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentals of vectors in RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we will cover several important topics related to vectors and
    embeddings in the context of **natural language processing** (**NLP**) and RAG.
    We will begin by clarifying the relationship between vectors and embeddings, explaining
    that embeddings are a specific type of vector representation used in NLP. We’ll
    then discuss the properties of vectors, such as their dimensions and size, and
    how these characteristics impact the precision and effectiveness of text search
    and similarity comparisons.
  prefs: []
  type: TYPE_NORMAL
- en: What is the difference between embeddings and vectors?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Vectors and **embeddings** are key concepts in NLP and play a crucial role in
    building language models and RAG systems. But what are they and how do they relate
    to each other? To put it simply, you can think of embeddings as a specific type
    of vector representation. When we are talking about the **large language models**
    (**LLMs**) we use in RAG, which are part of a larger universe called NLP, the
    vectors we use are referred to as embeddings. Vectors, on the other hand, in general,
    are used across a wide variety of fields and can represent many other objects
    beyond just language constructs (such as words, sentences, paragraphs, etc.).
    When talking about RAG, words such as embeddings, vectors, vector embeddings,
    and embedding vectors can be used interchangeably!
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have that out of the way, let’s talk about what a vector actually
    is.
  prefs: []
  type: TYPE_NORMAL
- en: What is a vector?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What is the first thing you think of when you hear the word *vector*? Many people
    would say math. That would be accurate; vectors are literally mathematical representations
    of the text we work with in our data, and they allow us to apply mathematical
    operations to our data in new and very useful ways.
  prefs: []
  type: TYPE_NORMAL
- en: The word *vector* might also make you think of speed. That is also accurate;
    with vectors, we can conduct text search at significantly faster speeds than with
    any other technology that preceded vector search.
  prefs: []
  type: TYPE_NORMAL
- en: Another concept that is often associated with the word *vector* is precision.
    By converting text into embeddings that have semantic representation, we can significantly
    improve the precision of our search systems in finding what we are looking for.
  prefs: []
  type: TYPE_NORMAL
- en: 'And of course, if you are a fan of the movie *Despicable Me* from Illumination,
    you may think of the villain Vector, who describes himself in this way: *“I go
    by the name of… Vector. It’s a mathematical term, a quantity represented by an
    arrow with both direction and magnitude.”*'
  prefs: []
  type: TYPE_NORMAL
- en: He may be a villain doing questionable things, but he is right about the meaning
    behind his name! The key thing to take away from this description is that a vector
    is not just a bunch of numbers; it is a mathematical object that represents both
    magnitude and direction. This is why it does a good job of representing your text
    and the similarities between texts, as it captures a more complex form of them
    than just simple numbers.
  prefs: []
  type: TYPE_NORMAL
- en: This may give you an understanding of what a vector is, but let’s next discuss
    the important aspects of vectors that will have an impact on your RAG development,
    starting with vector size.
  prefs: []
  type: TYPE_NORMAL
- en: Vector dimensions and size
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Vector, the villain from *Despicable Me*, said that vectors are *“a quantity
    represented by an arrow.”* While thinking of arrows representing vectors on a
    2D or 3D graph makes it easier to comprehend what a vector is, it is important
    to understand that the vectors we work with are often represented in many more
    than just two or three dimensions. The number of dimensions in the vector is also
    referred to as the vector size. To see this in our code, we are going to add a
    new cell right below where we define our variables. This code will print out a
    small section of the embedding vector:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In this code, we take the question that we have used throughout our code examples
    – What are the advantages of using RAG? – and we use OpenAI’s embedding API to
    convert it into a vector representation. The `question_embedding` variable represents
    this embedding. Using a slice, [0:5], we take the first five numbers from `question_embedding`,
    which represent the first five dimensions of the vector, and print them out. The
    full vector is 1,536 float numbers with 17–20 digits each, so we will minimize
    how much is printed out to make it a little more manageable to read. The output
    of this cell will look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We only print out the first five dimensions here, but the embedding is much
    larger than that. We will talk about a practical way to determine the total number
    of dimensions in a moment, but first, I want to draw your attention to the length
    of each number.
  prefs: []
  type: TYPE_NORMAL
- en: All numbers in these embeddings will be +/-0 with a decimal point, so let’s
    talk about the number of digits that come after that decimal point. The first
    number here, -0.006319054113595048, has 18 digits after the decimal point, the
    second number has 19, and the fourth number has 17\. These digit lengths are related
    to the precision of the floating-point representation used by OpenAI’s embeddings
    model, `OpenAIEmbeddings`. This model uses what is considered a high-precision
    floating-point format, providing 64-bit numbers (also known as **double-precision**).
    This high precision results in the potential for very fine-grained distinctions
    and accurate representation of the semantic information captured by the embedding
    model.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, let’s revisit a point made in [*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020),
    that the preceding output looks a lot like a Python list of floating points. It
    actually is a Python list in this case, as that is what OpenAI returns from their
    embedding API. This is probably a decision to make it more compatible with the
    Python coding world. But to avoid confusion, it is important to understand that,
    typically in the machine learning world, when you see something like this in use
    that will be used for machine learning-related processing, it is typically a NumPy
    array, even though a list of numbers and a NumPy array look the same when printed
    out as output like we just did.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fun fact**'
  prefs: []
  type: TYPE_NORMAL
- en: You will eventually hear about the concept called **quantization** if you work
    with generative AI. Much like embeddings, quantization deals with high-precision
    floating points. However, with quantization, the concept is to convert model parameters,
    such as weights and activations, from their original high-precision floating-point
    representation to a lower-precision format. This reduces the memory footprint
    and computational requirements of the LLM, which can be applied to make it more
    cost-effective to pre-train, train, and fine-tune the LLM. Quantization can also
    make it more cost-effective to perform inference with the LLM, which is what it
    is called when you use the LLM to get responses. When I say *cost-effective* in
    this context, I am referring to being able to do these things in a smaller, less
    expensive hardware environment. There is a trade-off, though; quantization is
    a **lossy compression technique**, which means that some of the information is
    lost during the conversion process. The reduced precision of the quantized LLMs
    may result in a loss of accuracy compared to the original high-precision LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: When you are using RAG and considering different algorithms to convert your
    text into embeddings, take note of the length of the embedding values to make
    sure you are using a high-precision floating-point format if the accuracy and
    quality of the response are of high priority in your RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: 'But how many dimensions are represented by these embeddings? We only show five
    in the preceding example, but we could have printed them all out and counted them
    individually. This, of course, seems impractical. We will use the `len()` function
    to do the counting for us. In the following code, you see that helpful function
    put to good use, giving us the total size of this embedding:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of this code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This indicates that this embedding is 1,536 dimensions! Trying to visualize
    this in your mind is difficult when we typically only think in 3 dimensions at
    most, but these extra 1,533 dimensions make a significant difference in how precise
    our embedding semantic representations of the related text can be.
  prefs: []
  type: TYPE_NORMAL
- en: When working with vectors across most modern vectorization algorithms, there
    are often hundreds or thousands of dimensions. The number of dimensions is equal
    to the number of floating points that represent the embedding, meaning a 1,024-dimension
    vector is represented by 1,024 floating points. There is no hard limit to how
    long an embedding can be, but some of the modern vectorizing algorithms tend to
    have preset sizes. The model we are using, OpenAI’s ada embedding model, uses
    1,536 by default. This is because it is trained to produce a certain-sized embedding,
    and if you try to truncate that size, it changes the context captured in the embedding.
  prefs: []
  type: TYPE_NORMAL
- en: However, this is changing. Vectorizers are now available (such as the OpenAI
    text-embedding-3-large model) that enable you to change vector sizes. These embedding
    models were trained to provide the same context, relatively speaking, across the
    different vector dimension sizes. This enables a technique called **adaptive retrieval**.
  prefs: []
  type: TYPE_NORMAL
- en: With adaptive retrieval, you generate multiple sets of embeddings at different
    sizes. You first search the lower-dimension vectors to get you *close* to the
    final results, because searching lower-dimension vectors is much faster than searching
    higher-dimension vectors. Once your lower-dimension search gets you into proximity
    of the content most similar to your input inquiry, your search *adapts* to searching
    the slower search-speed, higher-dimension embeddings to target the most relevant
    content and finalize the similarity search. Overall, this can increase your search
    speeds by 30–90%, depending on how you set up the search. The embeddings generated
    by this technique are called **Matryoshka embeddings**, named after the Russian
    nesting dolls, reflecting that the embeddings, like the dolls, are all relatively
    identical to each other while varying in size. If you ever need to optimize a
    RAG pipeline in a production environment for heavy usage, you are going to want
    to consider this technique.
  prefs: []
  type: TYPE_NORMAL
- en: The next concept that will be important for you to understand is where in the
    code your vectors reside, helping you to apply the concepts you are learning about
    vectors directly to your RAG efforts.
  prefs: []
  type: TYPE_NORMAL
- en: Where vectors lurk in your code
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: One way to indicate the value of vectors in the RAG system is to show you all
    the places they are used. As discussed earlier, you start with your text data
    and convert it to vectors during the vectorization process. This occurs in the
    indexing stage of the RAG system. But, in most cases, you must have somewhere
    to put those embedding vectors, which brings in the concept of the vector store.
  prefs: []
  type: TYPE_NORMAL
- en: During the retrieval stage of the RAG system, you start with a question as input
    from the user, which is first converted to an embedding vector before the retrieval
    begins. Lastly, the retrieval process uses a similarity algorithm that determines
    the proximity between the question embedding and all the embeddings in the vector
    store. There is one more potential area in which vectors are common, and that
    is when you want to evaluate your RAG responses, but we will cover that in [*Chapter
    9*](B34736_09_ePub.xhtml#_idTextAnchor209) when we cover evaluation techniques.
    For now, let’s dive deeper into each of these other concepts, starting with vectorization.
  prefs: []
  type: TYPE_NORMAL
- en: Vectorization occurs in two places
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'At the very front of the RAG process, you typically have a mechanism for a
    user to enter a question that is passed to the retriever. We see the processing
    of this occurring in our code here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'The retriever is a LangChain retriever object that facilitates similarity search
    and retrieval of relevant vectors based on the user query. So, when we talk about
    vectorization, it actually occurs in two places in our code:'
  prefs: []
  type: TYPE_NORMAL
- en: First, when we vectorize the original data that will be used in the RAG system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Second, when we need to vectorize the user query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The relationship between these two separate steps is that they are both used
    in the similarity search. Before we talk about the search, though, let’s first
    talk about where the latter group of embeddings, the embeddings from the original
    data, is stored: the vector store.'
  prefs: []
  type: TYPE_NORMAL
- en: Vector databases/stores store and contain vectors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A vector store is typically a vector database (but not always – see the following
    note) that is optimized for storing and serving vectors, and plays a crucial role
    in an effective RAG system. Technically, you could build a RAG system without
    using a vector database, but you would miss out on a lot of the optimizations
    that have been built into these data storage tools, impacting your memory, computation
    requirements, and search precision unnecessarily. We will discuss vector stores
    in detail later in this chapter, including the important distinction between “vector
    stores” and “vector databases” as terminology.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of *where vectors lurk in your code*, the vector store is where most
    of the vectors generated in your code are stored. When you vectorize your data,
    those embeddings go into your vector store. When you conduct a similarity search,
    the embeddings used to represent that data get pulled from the vector store. This
    makes vector stores a key player in the RAG system and worthy of our attention.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know where the original data embeddings are stored, let’s bring
    this back to how they are used in relation to the user query embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Vector similarity compares your vectors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have our two primary vectorization occurrences:'
  prefs: []
  type: TYPE_NORMAL
- en: The embedding for our user query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The vector embeddings representing all the data in our vector store
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s review how these two occurrences relate to each other. When we conduct
    the highly important vector similarity search that forms the foundation of our
    retrieval process, we are really just performing a mathematical operation that
    measures the distance between the user query embedding and the original data embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Multiple mathematical algorithms can be used to perform this distance calculation,
    which we will review later in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176).
    But for now, it is important to understand that this distance calculation identifies
    the closest original data embeddings to the user query embedding and returns the
    list of those embeddings in the order of their distance (sorted by closest to
    furthest). Our code is a bit more simplistic, in that the embedding represents
    the data points (the chunks) in a 1:1 relationship.
  prefs: []
  type: TYPE_NORMAL
- en: But in many applications, such as with a question-and-answer chatbot where the
    questions or answers are very long and broken up into smaller chunks, you will
    likely see those chunks have a foreign key ID that refers back to a larger piece
    of content. That allows us to retrieve the full piece of content, rather than
    just the chunk. This will vary depending on the problem your RAG system is trying
    to solve, but it is important to understand that the architecture of this retrieval
    system can vary to meet the needs of the application.
  prefs: []
  type: TYPE_NORMAL
- en: 'This covers the most common places you find vectors in your RAG system: where
    they occur, where they are stored, and how they are used in service of the RAG
    system. In the next section, we talk about how the size of the data text we are
    using in the search for our RAG system can vary. You will ultimately make decisions
    in your code that dictate that size. But from what you already know about vectors,
    you may start to wonder, if we are vectorizing content of various sizes, how does
    that impact our ability to compare them and ultimately build the most effective
    retrieval process we can build? And you would be right to wonder! Let’s discuss
    the impact of the size of the content that we turn into embeddings next.'
  prefs: []
  type: TYPE_NORMAL
- en: The amount of text you vectorize matters!
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The vector we showed earlier came from the text, `What are the advantages of
    using RAG?`. That is a relatively short amount of text, which means a 1,536-dimension
    vector is going to do a very thorough job representing the context within that
    text. But if we go back to the code, the content that we vectorize to represent
    our *data* comes from here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'This pulls in the web page we looked at in previous chapters, which is relatively
    long compared to the question text. To make that data more manageable, we break
    that content up into chunks using a text splitter in this code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'If you were to pull out the third chunk using `splits[2]`, it would look like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: I chose the third chunk to show because it is a relatively short chunk. Most
    of the chunks are much larger. The **Semantic Chunker text splitter** we use attempts
    to use semantics to determine how to split up the text, using embeddings to determine
    those semantics. In theory, this should give us chunks that do a better job of
    breaking up the data based on context, rather than just an arbitrary size.
  prefs: []
  type: TYPE_NORMAL
- en: However, there is an important concept to understand when it comes to embeddings
    that will impact the splitter you choose and the size of your embeddings in general.
    This all stems from the fact that no matter how large the text that you pass to
    the vectorization algorithm is, it is still going to give you an embedding that
    is the same size as any of the other embeddings. In this case, that means the
    user query embedding is going to be 1,536 dimensions, but all those long sections
    of text in the vector store are also going to be 1,536 dimensions, even though
    their actual length in text format is quite different. It may be counterintuitive,
    but in an amazing turn of events, it works well!
  prefs: []
  type: TYPE_NORMAL
- en: When conducting a search with the user query of the vector store, the mathematical
    representations of the user query embedding and the other embeddings are done
    in such a way that we are still able to detect the semantic similarities between
    them, despite the large disparity in their size. This aspect of the vector similarity
    search is the kind of thing that makes mathematicians love math so much. It just
    seems to defy all logic that you can turn text of very different sizes into numbers
    and be able to detect similarities between them.
  prefs: []
  type: TYPE_NORMAL
- en: But there is another aspect of this to consider as well. When you compare the
    results across just the chunks that you break your data into, the size of those
    chunks will matter. In this case, the larger the amount of content that is being
    vectorized, the more diluted the embedding will be. On the other hand, the smaller
    the amount of content that the embedding represents, the less context you will
    have to match up when you perform a vector similarity search. For each of your
    RAG implementations, you will need to find a delicate balance between chunk size
    and context representation.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding this will help you make better decisions about how you split data
    and the vectorization algorithms you choose when trying to improve your RAG system.
    We will cover some other techniques to get more out of your splitting/chunking
    strategy in [*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271), when we talk
    about LangChain splitters. Next, we will talk about the importance of testing
    different vectorization models.
  prefs: []
  type: TYPE_NORMAL
- en: Not all semantics are created equal!
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A common mistake made in RAG applications is choosing the first vectorization
    algorithm that is implemented and just assuming that it provides the best results.
    These algorithms take the semantic meaning of text and represent them mathematically.
    However, these algorithms are generally large NLP models themselves, and they
    can vary in capabilities and quality as much as the LLMs. Just as we, as humans,
    often find it challenging to comprehend the intricacies and nuances of text, these
    models can grapple with the same challenge, having varying abilities to grasp
    the complexities inherent in written language. For example, models in the past
    could not decipher the difference between bark (a dog noise) and bark (the outer
    part of most trees), but newer models can detect this based on the surrounding
    text and the context in which it is used. This area of the field is adapting and
    evolving just as fast as other areas.
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, it is possible that a domain-specific vectorization model, such
    as one trained on scientific papers, will do better in an app that is focused
    on scientific papers than using a generic vectorization model. Scientists talk
    in very specific ways, very different from what you might see on social media,
    and so a giant model trained on general web-based text may not perform well in
    this specific domain.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fun fact**'
  prefs: []
  type: TYPE_NORMAL
- en: You often hear about how you can fine-tune LLMs to improve your domain-specific
    results. But did you know that you can also fine-tune embedding models? Fine-tuning
    an embedding model has the potential to improve the way the embedding model understands
    your domain-specific data and, therefore, has the potential to improve your similarity
    search results. This has the potential to improve your entire RAG system substantially
    for your domain.
  prefs: []
  type: TYPE_NORMAL
- en: To summarize this section on fundamentals, numerous aspects of vectors can help
    you or hurt you when trying to build the most effective RAG application for your
    needs. Of course, it would be poor manners for me to tell you how important the
    vectorization algorithm is without telling you which ones are available! To address
    this, in the next section, let’s run through a list of some of the most popular
    vectorization techniques! We will even do this with code!
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 7.1 – Common vectorization techniques
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Vectorization algorithms have evolved significantly over the past few decades.
    Understanding how these have changed, and why, will help you gain more perspective
    on how to choose the one that fits your needs the most. Let’s walk through some
    of these vectorization algorithms, starting with some of the earliest ones and
    ending with the most recent, more advanced options. This is nowhere close to an
    exhaustive list, but these select few should be enough to give you a sense of
    where this part of the field came from and where it is going. Before we start,
    let’s install and import some new Python packages that play important roles in
    our coding journey through vectorization techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The `gensim` package provides implementations of classic vectorization algorithms
    such as `Word2Vec` and `Doc2Vec`. The `transformers` package from Hugging Face
    gives us access to modern transformer-based models such as BERT. The `torch` package
    (`PyTorch`) is required by the transformers library for running neural network
    computations. We uninstall `nougat-ocr` because it can create dependency conflicts
    with some of these packages. This code should go near the top of the previous
    code, in the same cell as the other package installations.
  prefs: []
  type: TYPE_NORMAL
- en: Term frequency-inverse document frequency (TF-IDF)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1972 is probably a much earlier year than what you would expect in a book about
    a relatively brand-new technology such as RAG, but this is where we find the roots
    of the vectorization techniques we are going to talk about.
  prefs: []
  type: TYPE_NORMAL
- en: Karen Ida Boalth Spärck Jones was a self-taught programmer and pioneering British
    computer scientist who worked on several papers focused on the field of NLP. In
    1972, she made one of her most important contributions, introducing the concept
    of **inverse document frequency** (**IDF**). The basic concept, as she stated,
    was that *“the specificity of a term can be quantified as an inverse function
    of the number of documents in which it occurs.”*
  prefs: []
  type: TYPE_NORMAL
- en: As a real-world example, consider applying the **df** (**document frequency**)
    and **idf** (**inverse document frequency**) score to some words in Shakespeare’s
    37 plays and you will find that the word Romeo is the highest-scoring result.
    This is because it appears very frequently, but only in one *document*, the Romeo
    and Juliet document. In this case, Romeo would be scored 1 for df, as it appeared
    in 1 document. Romeo would score 1.57 for idf, higher than any other word, because
    of its high frequency in that one document. Meanwhile, Shakespeare used the word
    sweet occasionally, but in every single play, giving it a low score. This gives
    sweet a df score of 37, and an idf score of 0\. What Karen Jones was saying in
    her paper was that when you see words such as Romeo appear in just a small number
    of the overall number of plays, you can take the plays where those words appear
    and consider them very important and predictive of what that play is about. In
    contrast, sweet had the opposite effect, as it is uninformative in terms of the
    importance of the word and of the documents that the word is in.
  prefs: []
  type: TYPE_NORMAL
- en: 'But that’s enough talk. Let’s see how this algorithm looks in code! The scikit-learn
    library has a function that can be applied to text to vectorize that text using
    the TF-IDF method. The following code is where we define the splits variable,
    which is what we will use as our data to train the model on:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Unlike the OpenAI embedding model, this model requires you to *train* on your
    *corpus* data, which is a fancy term for all the text data you have available
    to train with. This code is primarily to demonstrate how a TD-IDF model is used
    compared to our current RAG pipeline retriever, so we won’t review it line by
    line. But we encourage you to try out the code yourself and try different settings.
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that the vectors this algorithm produces are called **sparse
    vectors**, and the vectors we were previously working with in previous code labs
    were called **dense vectors**. This is an important distinction that we will review
    in detail in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176).
  prefs: []
  type: TYPE_NORMAL
- en: 'This model uses the corpus data to set up the environment that can then calculate
    the embeddings for new content that you introduce to it. The output should look
    like the following table:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'In this case, we see at least a 10-way tie for the idf highest value (we are
    only showing 10, so there are probably more), and all of them are number-based
    text. You might wonder why the algorithm is highlighting numbers rather than meaningful
    words such as “RAG” or “retrieval.” This is actually a valuable lesson about TF-IDF’s
    limitations: the algorithm has no understanding of semantics or meaning. It simply
    identifies terms that appear in few documents but frequently within those documents.
    Numbers such as “1024” or “192” happen to meet this criterion because they appear
    rarely across our small corpus.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This output also exposes another important consideration: data preprocessing.
    In a production system, you would typically clean your text data before vectorization,
    removing numbers, punctuation, and other tokens that do not carry semantic meaning.
    Our corpus is small and uncleaned, which is why these meaningless tokens rise
    to the top. This does not mean TF-IDF failed; rather, it highlights that the quality
    of your vectorization is only as good as the quality of your input data. Training
    on more data from the same author or domain, combined with proper text preprocessing,
    can help you build a model that surfaces more contextually meaningful terms. Now,
    going back to the original question that we have been using, `What are the advantages
    of RAG?`, we want to use the TF-IDF embeddings to determine what the most relevant
    documents are:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'This replicates the behavior we see with the retriever, where it uses a similarity
    algorithm to find the nearest embedding by distance. In this case, we use cosine
    similarity, which we will talk about in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176),
    but just keep in mind that there are many distance algorithms that we can use
    to calculate this distance. Our output from this code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'If you run our original code, which uses the original vector store and retriever,
    you will see this output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: They match! A small algorithm from 1972 trained on our own data in a fraction
    of a second is just as good as the massive algorithms developed by OpenAI, spending
    billions of dollars to develop them! Okay, let’s slow down, this is definitely
    NOT the case! The reality is that in real-world scenarios, you will be working
    with a much larger dataset than we are and much more complicated user queries,
    and this will benefit from the use of more sophisticated modern embedding techniques.
  prefs: []
  type: TYPE_NORMAL
- en: 'TF-IDF has been very useful over the years. But was it necessary to learn about
    an algorithm from 1972 when we are talking about the most advanced generative
    AI models ever built? The answer is BM25\. This is just a teaser, but you will
    learn more about this very popular **keyword search** algorithm, one of the most
    popular algorithms in use today, in the next chapter. And guess what? It is based
    on TF-IDF! What TF-IDF has a problem with, though, is capturing context and semantics
    as well as some of the next models we will talk about. Let’s discuss the next
    major step up: Word2Vec and related algorithms.'
  prefs: []
  type: TYPE_NORMAL
- en: Word2Vec, Sentence2Vec, and Doc2Vec
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Word2Vec** and similar models introduced an early application of unsupervised
    learning, representing a significant step forward in the NLP field. There are
    multiple *vec* models (word, doc, and sentence), where their training was focused
    on words, documents, or sentences, respectively. These models differ in the level
    of text they are trained on.'
  prefs: []
  type: TYPE_NORMAL
- en: '`Word2Vec` focuses on learning vector representations for individual words,
    capturing their semantic meaning and relationships. **Doc2Vec**, on the other
    hand, learns vector representations for entire documents, allowing it to capture
    the overall context and theme of a document. **Sentence2Vec** is similar to `Doc2Vec`
    but operates at the sentence level, learning vector representations for individual
    sentences. While `Word2Vec` is useful for tasks such as word similarity and analogy,
    `Doc2Vec` and `Sentence2Vec` are more suitable for document-level tasks such as
    document similarity, classification, and retrieval.'
  prefs: []
  type: TYPE_NORMAL
- en: Because we are working with larger documents, and not just words or sentences,
    we are going to select the `Doc2Vec` model over `Word2Vec` or `Sentence2Vec` and
    train this model to see how it works as our retriever. Like the TD-IDF model,
    this model can be trained with our data, and then we pass the user query to it
    to see whether we can get similar results for the most similar data chunks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Add this code in a new cell after the TD-IDF code cell:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Much like the **TD-IDF model**, this code is primarily to demonstrate how a
    `Doc2Vec` model is used compared to our current RAG pipeline retriever, so we
    won’t review it line by line, but we encourage you to try out the code yourself
    and try different settings. This code focuses on training the `Doc2Vec` model
    and saving it locally.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fun fact**'
  prefs: []
  type: TYPE_NORMAL
- en: Training language models is a hot topic and can be a well-paid profession these
    days. Have you ever trained a language model? If your answer was *no*, you would
    be wrong. Not only did you just train a language model, but you have now trained
    two! Both TF-IDF and Doc2Vec are language models that you just trained. These
    are relatively basic versions of model training, but you have to start somewhere,
    and you just did!
  prefs: []
  type: TYPE_NORMAL
- en: 'In the next code, we will use that model on our data:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'We separated the code for creating and saving the model from the usage of the
    model so that you can see how this model can be saved and referenced later. Here
    is the output from this code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Comparing this to the results from our original retriever shown previously,
    this model does not return the same result. However, this model was set up with
    just 100 dimension vectors in this line:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'What happens when you change `vector_size` in this line to use 1,536, the same
    vector size as the OpenAI model? Change the `doc2vec_model` variable definition
    to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'The results will change to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: This resulted in the same text as our original results, using OpenAI’s embeddings.
    However, the results are not consistent. If you trained this model on more data,
    it would likely improve the results.
  prefs: []
  type: TYPE_NORMAL
- en: In theory, the benefit this type of model has over TF-IDF is that it is a neural
    network-based approach that takes into account surrounding words, whereas TF-IDF
    is simply a statistical measure that evaluates how relevant a word is to the document
    (keyword search). But as we said about the TD-IDF model, there are still more
    powerful models than the *vec* models that capture much more context and semantics
    of the text they are fed. Let’s jump to another generation of models, transformers.
  prefs: []
  type: TYPE_NORMAL
- en: Bidirectional encoder representations from transformers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At this point, with **bidirectional encoder representations from transformers**
    (**BERT**), we are fully into using neural networks to better understand the underlying
    semantics of the corpus, yet another big step forward for NLP algorithms. BERT
    is also among the first to apply a specific type of neural network, the **transformer**,
    which was a major step in the progression that led to the development of the LLMs
    we are familiar with today. OpenAI’s popular ChatGPT models are also transformers
    but were trained on a much larger corpus and with different techniques from BERT.
  prefs: []
  type: TYPE_NORMAL
- en: That said, BERT is still a very capable model. You can use BERT as a standalone
    model that you import, avoiding having to rely on APIs such as OpenAI’s embedding
    service. Being able to use a local model in your code can be a big advantage in
    certain network-constrained environments, instead of relying on an API service
    such as OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: One of the defining characteristics of the transformer models is the use of
    a self-attention mechanism to capture dependencies between words in a text. BERT
    also has multiple layers of transformers, allowing it to learn even more complex
    representations. Compared to our Doc2Vec model, BERT is pre-trained already on
    large amounts of data, such as Wikipedia and `BookCorpus`, with the objective
    of predicting the next sentence.
  prefs: []
  type: TYPE_NORMAL
- en: 'Much like the previous two models, we provide code for you to compare retrieved
    results using BERT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: There is one very important difference in this code compared to the usage of
    the last couple of models. Here, we are not tuning the model on our own data.
    This BERT model has already been trained on a large dataset. It is possible to
    fine-tune the model further with our data, which is recommended if you want to
    use this model. The results will reflect this lack of training, but we won’t let
    that prevent us from showing you how it works!
  prefs: []
  type: TYPE_NORMAL
- en: 'For this code, we are printing out the vector size for comparison to the others.
    Like the other models, we can see the top retrieved result. Here is the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: The vector size is a respectable `768`. I don’t even need metrics to tell you
    that the top document it found is not the best chunk to answer the question `What
    are the advantages of RAG?`.
  prefs: []
  type: TYPE_NORMAL
- en: This model is powerful and has the potential to work better than the previous
    models, but we would need to do some extra work (fine-tuning) to get it to do
    a better job with our data when comparing it to the previous types of embedding
    models we have discussed so far. That may not be the case with all data, but typically,
    in a specialized domain like this, fine-tuning should be considered as an option
    for your embedding model. This is especially true if you are using a smaller local
    model rather than a large, hosted API such as OpenAI’s embeddings API.
  prefs: []
  type: TYPE_NORMAL
- en: Running through these three different models illustrates how much embedding
    models have changed over the past 50 years. Hopefully, this exercise has shown
    you how important the decision is for what embedding model you select. We will
    conclude our discussion of embedding models by bringing us full circle back to
    the original embedding model we were using, the OpenAI embedding model from OpenAI’s
    API service. We will discuss the OpenAI model, as well as its peers on other cloud
    services.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI and other similar large-scale embedding services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s talk a little more about the BERT model we just used, relative to OpenAI’s
    embedding model. This was the `''bert-base-uncased''` version, which is a pretty
    robust 110M parameter transformer model, especially compared to the previous models
    we used. We have come a long way since the TD-IDF model. Depending on the environment
    you are working in, this may test your computational limitations. This was the
    largest model my computer could run of the BERT options. But if you have a more
    powerful environment, you can change the model in these two lines to `''bert-large-uncased''`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'You can see the full list of BERT options here: [https://huggingface.co/google-bert/bert-base-uncased](https://huggingface.co/google-bert/bert-base-uncased).'
  prefs: []
  type: TYPE_NORMAL
- en: The `'bert-large-uncased'` model has 340M parameters, more than three times
    the size of `'bert-base-uncased'`. If your environment cannot handle this size
    of a model, it will crash your kernel, and you will have to reload all your imports
    and relevant notebook cells. This just tells you how large these models can get.
    But just to be clear, these two BERT models have 110M and 340M parameters, which
    is in millions, not billions.
  prefs: []
  type: TYPE_NORMAL
- en: The OpenAI embedding model that we have been using is based on the **GPT-4**
    architecture (specifically GPT-4o-mini), which represents a significant advancement
    from the earlier GPT-3-based models. GPT-3-based models are estimated to have
    175 billion parameters, and GPT-4-based models are estimated to have 1.76 trillion
    parameters. That is a tr*illion* with a T. We will be talking about their embedding
    models later in this chapter, which are based on the **GPT-4** architecture and
    have one trillion parameters as well.
  prefs: []
  type: TYPE_NORMAL
- en: The number of parameters for GPT-5 is not public knowledge, but some industry
    estimates suggest it reaches as high as 3-5 trillion parameters. GPT-5 was trained
    on an estimated 114 trillion tokens of data, which, when converted to words, represents
    an astronomical corpus, far exceeding what was used for earlier models. Needless
    to say, these models are massive and dwarf any of the other models we have discussed.
    BERT and OpenAI are both transformers, but BERT was trained on 3.3 billion words,
    whereas the full corpus for GPT-3 is estimated to be around 17 trillion words
    (45 TB of text), and GPT-5’s training corpus of 114 trillion tokens translates
    to approximately 85-90 trillion words, representing a roughly 5x increase in training
    data scale over GPT-3\. OpenAI currently has three different embedding models
    available. We have been using the older model to save API costs based on GPT-3,
    `'text-embedding-ada-002'`, but it is a very capable embedding model. The other
    two models that are based on GPT-4 are `'text-embedding-3-small'` and `'text-embedding-3-large'`.
    Both of these models support the Matryoshka embeddings we talked about earlier,
    which allow you to use an adaptive retrieval approach for your retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI is not the only cloud provider that offers a text-embedding API, though.
    **Google Cloud Platform** (**GCP**) now offers its latest Gemini Embedding model
    (`gemini-embedding-001`), which became generally available in July 2025\. This
    model achieves top rankings on the **Massive Text Embedding Benchmark** (**MTEB**)
    multilingual leaderboard, with support for over 100 languages and output dimensions
    of 3,072\. The model includes **Matryoshka Representation Learning** (**MRL**),
    allowing users to truncate embeddings from the original 3,072 dimensions down
    to meet storage cost requirements. **Amazon Web Services** (**AWS**) launched
    Amazon Titan Text Embeddings V2 in May 2024, which is now generally available.
    This model supports up to 8,192 tokens or 50,000 characters of input and outputs
    vectors of 256, 512, or 1,024 dimensions. AWS reports that vectors with 512 dimensions
    maintain approximately 99% of the accuracy provided by 1,024-dimension vectors,
    while 256-dimension vectors offer 97% accuracy. While Titan Text Embeddings V2
    doesn’t explicitly use the term “Matryoshka embeddings,” its flexible dimension
    sizing (256, 512, or 1,024) provides similar benefits for cost optimization and
    adaptive retrieval strategies.
  prefs: []
  type: TYPE_NORMAL
- en: AWS also offers Cohere’s Embed v4 multimodal embedding model as of October 2025\.
    Cohere’s Embed v4 supports Matryoshka Representation Learning with multiple output
    dimensions, including 256, 512, 1,024, and 1,536, and features a 128,000 token
    context window, enabling organizations to generate embeddings for documents with
    around 200 pages.
  prefs: []
  type: TYPE_NORMAL
- en: That concludes our whirlwind adventure through 50 years of embedding generation
    technology! The models highlighted were selected to represent the progression
    of embedding capabilities over the past 50 years, but these are just a tiny sliver
    of the actual number of ways there are to generate embeddings. Now that your knowledge
    about embedding capabilities has been expanded, let’s turn to the factors you
    can consider when making the actual decisions on which model to use.
  prefs: []
  type: TYPE_NORMAL
- en: Factors in selecting a vectorization option
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Selecting the right vectorization option is a crucial decision when building
    a RAG system. Key considerations include the quality of the embeddings for your
    specific application, the associated costs, network availability, speed of embedding
    generation, and compatibility between embedding models. There are numerous other
    options beyond what we shared above that you can explore for your specific needs
    when it comes to selecting an embedding model. Let’s review these considerations.
  prefs: []
  type: TYPE_NORMAL
- en: Quality of the embedding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When considering the quality of your embeddings, you cannot rely on just the
    generic metrics you have seen for each model. For example, OpenAI has been tested
    on the **Massive Text Embedding Benchmark** (**MTEB**), scoring 61.0% with their
    `'text-embedding-ada-002'` model, whereas the `'text-embedding-3-large'` model
    scored 64.6%. The metrics can be useful, especially when trying to home in on
    a model of a certain quality, but this does not mean the model will be 3.6% better
    for your specific model. It does not even mean it will necessarily be better at
    all. Do not rely on generic tests completely. What ultimately matters is how well
    your embeddings work for your specific application of them. This includes embedding
    models that you train with your own data. If you work on an application that involves
    a specific domain, such as science, legal, or technology, it is very likely that
    you can find or train a model that will work better with your specific domain
    data. When you start your project, try multiple embedding models within your RAG
    system and then use the evaluation techniques we share in [*Chapter 9*](B34736_09_ePub.xhtml#_idTextAnchor209)
    to compare results from using each model to determine which is best for your application.
  prefs: []
  type: TYPE_NORMAL
- en: Cost
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The costs for these embedding services vary from free to relatively expensive.
    OpenAI’s most expensive embedding model costs $0.13 per million tokens. This means
    that for a page that has 800 tokens, it will cost you $0.000104, or slightly more
    than 1% of 1 cent. That may not sound like much, but for most applications using
    embeddings, especially in the enterprise, these costs get multiplied rapidly,
    pushing the costs into the $1,000s or $10,000s for even a small project. But other
    embedding APIs cost less and may fit your needs just as well. And of course, if
    you build your own model, as I described earlier in this chapter, you will only
    have the costs of the hardware or hosting costs for that model. That can cost
    much less over time and may meet your needs as well.
  prefs: []
  type: TYPE_NORMAL
- en: Network availability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a variety of scenarios you will want to consider in terms of network
    availability. Almost all applications will have some scenarios where the network
    will not be available. Network availability impacts your users’ access to your
    application interface, but it can also impact network calls you make from your
    application to other services. In this latter case, this could be a situation
    where your users can access your application’s interface, but the application
    cannot reach OpenAI’s embedding service to generate an embedding for your user
    query. What would you do in this case? If you are using a model that is within
    your environment, this avoids this problem. This is a consideration of availability
    and the impact it has on your users.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that you cannot just switch the embedding model for your user query,
    just in case you were thinking you could use a *fallback* mechanism and have a
    local embedding model available as a secondary option when the network is unavailable.
    If you use a proprietary API-only embedding model to vectorize your embeddings,
    you are committed to that embedding model, and your RAG system will be reliant
    on the availability of that API. OpenAI does not offer its embedding models to
    use locally. See the upcoming *Embedding compatibility* subsection!
  prefs: []
  type: TYPE_NORMAL
- en: Speed
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The speed of generating embeddings is an important consideration, as it can
    impact the responsiveness and user experience of your application. When using
    a hosted API service such as OpenAI, you are making network calls to generate
    embeddings. While these network calls are relatively fast, there is still some
    latency involved compared to generating embeddings locally within your own environment.
    However, it’s important to note that local embedding generation is not always
    faster, as the speed also depends on the specific model being used. Some models
    may have slower inference times, negating the benefits of local processing. Key
    aspects to consider when determining the speed of your embedding option(s) are
    network latency, model inference time, hardware resources, and, in some cases,
    where multiple embeddings are involved, the ability to generate embeddings in
    batches and optimize that.
  prefs: []
  type: TYPE_NORMAL
- en: Embedding compatibility
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pay close attention; this is a very important consideration and fact about embeddings!
    In any case, when you are comparing embeddings, such as when you are detecting
    the similarity between a user query embedding and the embeddings stored in the
    vector store, *they must be created by the same embedding model*. These models
    generate unique vector signatures specific to only that model. This is even true
    of models at the same service provider. With OpenAI, for example, all three embedding
    models are not compatible with each other. If you use any of OpenAI’s embedding
    models to vectorize your embeddings stored in your vector store, you have to call
    the OpenAI API and use that same model when you vectorize the user query to conduct
    a vector search.
  prefs: []
  type: TYPE_NORMAL
- en: As your application expands in size, changing or updating an embedding model
    has major cost implications, since it means you will have to generate all new
    embeddings to use a new embedding model. This may even drive you to use a local
    model rather than a hosted API service, since generating new embeddings with a
    model you have control over tends to cost much less.
  prefs: []
  type: TYPE_NORMAL
- en: While generic benchmarks can provide guidance, it’s essential to evaluate multiple
    embedding models within your specific domain and application to determine the
    best fit. Costs can vary significantly, depending on the service provider and
    the volume of embeddings required. Network availability and speed are important
    factors, especially when using hosted API services, as they can impact the responsiveness
    and user experience of your application. Compatibility between embedding models
    is also crucial, as embeddings generated by different models cannot be directly
    compared.
  prefs: []
  type: TYPE_NORMAL
- en: As your application grows, changing or updating vector embedding models can
    have significant cost implications. Local embedding generation can offer more
    control and potentially lower costs, but the speed depends on the specific model
    and available hardware resources. Thorough testing and benchmarking are necessary
    to find the optimal balance of quality, cost, speed, and other relevant factors
    for your application. Now that we have explored the considerations for selecting
    a vectorization option, let’s dive into the topic of how they are stored with
    vector stores.
  prefs: []
  type: TYPE_NORMAL
- en: Getting started with vector stores
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Vector stores, combined with other data stores (databases, data warehouses,
    data lakes, and any other data sources), are the fuel for your RAG system engine.
    Not to state the obvious, but without a place to store your RAG-focused data,
    which typically involves the creation, management, filtering, and search of vectors,
    you will not be able to build a capable RAG system. What you use and how it is
    implemented will have significant implications for how your entire RAG system
    performs, making it a critical decision and effort. To start this section, let’s
    first go back to the original concept of a database.
  prefs: []
  type: TYPE_NORMAL
- en: Data sources (other than vector)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In our basic RAG example so far, we are keeping it simple (for now) and have
    not connected it to an additional database resource. You could consider the web
    page that the content is pulled from as the database, although the most accurate
    description in this context is probably to call it an unstructured data source.
    Regardless, it is very likely your application will expand to the point of needing
    database-like support. This may come in the form of a traditional SQL database,
    or it may be in the form of a giant data lake (a large repository of all types
    of raw, primarily unstructured data), where the data is preprocessed into a more
    usable format representing the data source that supports your RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture of your data storage may be based on a **relational database
    management system** (**RDBMS**), a variety of different types of NoSQL, NewSQL
    (aimed at giving you the best of the two previous approaches), or various versions
    of data warehouses and data lakes. From the perspective of this book, we will
    approach the data sources these systems represent as an abstract concept of the
    **data source**. But what is important to consider here is that your decision
    on what vector store to use will likely be highly influenced by the existing architecture
    of your data source. The current technical skills of your staff will likely play
    a key role in these decisions as well.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, you may be using **PostgreSQL** for your RDBMS and have a team
    of expert engineers with significant expertise in fully utilizing and optimizing
    PostgreSQL. In this case, you will want to consider the **pgvector** extension
    for PostgreSQL, which turns PostgreSQL tables into vector stores, extending many
    of the PostgreSQL capabilities your team is familiar with into the vector world.
    Concepts such as indexing and writing SQL specifically for PostgreSQL are already
    going to be familiar, and that will help get your team up to speed quickly with
    how this extends to `pgvector`. If you are building your entire data infrastructure
    from scratch, which is rare in enterprise, then you may go a different route optimized
    for speed, cost, accuracy, or all of the above! But for most companies, you will
    need to consider compatibility with existing infrastructure in the vector store
    selection decision criteria.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fun fact – What about applications such as SharePoint?**'
  prefs: []
  type: TYPE_NORMAL
- en: SharePoint is typically considered a **content management system** (**CMS**)
    and may not fit strictly into the definitions of the other data sources we mentioned
    previously. But SharePoint and similar applications contain massive repositories
    of unstructured data, including PDF, Word, Excel, and PowerPoint documents that
    represent a huge portion of a company’s knowledge base, especially in large enterprise
    environments. Combine this with the fact that generative AI has shown a proclivity
    to tap into unstructured data unlike any other technology preceding it, and you
    have the makings of an incredible data source for RAG systems. These types of
    applications also have sophisticated APIs that can conduct data extraction as
    you pull the documents, such as pulling text out of a Word document and putting
    it into your database before vectorization. In many large companies, due to the
    high value of the data in these applications and the relative ease of extracting
    that data using the APIs, this has been one of the first sources of data for RAG
    systems. So yes, you can definitely include SharePoint and similar applications
    in your list of potential data sources!
  prefs: []
  type: TYPE_NORMAL
- en: We will talk more about `pgvector` and other vector store options in a moment,
    but it is important to understand how these decisions can be very specific to
    each situation and that considerations other than just the vector store itself
    will play an important role in what you ultimately decide to work with.
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of what option you choose, or are starting with, this will be a key
    component that feeds the data to your RAG system. This leads us to the vector
    stores themselves, which we will discuss next.
  prefs: []
  type: TYPE_NORMAL
- en: Vector stores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Vector stores, also known as vector databases or vector search engines, are
    specialized storage systems designed to efficiently store, manage, and retrieve
    vector representations of data. Unlike traditional databases that organize data
    in rows and columns, vector stores are optimized for operations in high-dimensional
    vector spaces. They play a crucial role in an effective RAG system by enabling
    fast similarity search, which is essential for identifying the most relevant pieces
    of information in response to a vectorized query.
  prefs: []
  type: TYPE_NORMAL
- en: A note on terminology – vector stores versus vector databases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we go further, let’s clarify two terms you will see often: **vector
    database** and **vector store**. People frequently use them interchangeably, but
    there is a useful distinction.'
  prefs: []
  type: TYPE_NORMAL
- en: A **vector database** is a purpose-built database system designed to store embeddings
    (high-dimensional vectors) and run fast similarity search at scale, typically
    alongside metadata, filtering, and operational features you would expect from
    a database (persistence, indexing, and production management). Common examples
    include Pinecone, Milvus, and Weaviate.
  prefs: []
  type: TYPE_NORMAL
- en: A **vector store** is the broader umbrella term. It includes vector databases,
    but it also includes other mechanisms that can store vectors and perform similarity
    search. For example, some teams use **database extensions** such as **pgvector**
    for PostgreSQL, which adds vector types and vector indexing inside an existing
    relational database. Others use **libraries** or **in-memory indexes** such as
    **FAISS**, which is primarily an indexing and similarity search library rather
    than a full database system.
  prefs: []
  type: TYPE_NORMAL
- en: Because LangChain uses the term vector store as the name of its abstraction
    layer, we will use vector store throughout this book to refer to any of these
    backends (databases, extensions, or libraries) that store embeddings and support
    similarity search.
  prefs: []
  type: TYPE_NORMAL
- en: Vector store architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The architecture of a vector store typically consists of three main components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Indexing layer**: This layer organizes the vectors in a manner that speeds
    up search queries. Think of it as creating a map or shortcut system for your vectors.
    Without an index, searching for similar vectors would require comparing your query
    against every single vector in the database, which becomes impossibly slow as
    your data grows. The indexing layer solves this by organizing vectors into structures
    that allow the search algorithm to quickly narrow down which vectors are worth
    comparing, dramatically reducing the number of comparisons needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common indexing techniques include tree-based partitioning (such as KD-trees,
    which recursively divide the vector space into regions) and graph-based methods
    (such as Hierarchical Navigable Small World, or HNSW, which creates a network
    of connections between similar vectors). These are essentially “smarter” ways
    to organize your data so that finding similar vectors does not require checking
    every single one. For example, HNSW works by creating multiple layers of connections
    between vectors, allowing the search to quickly “hop” through the graph from a
    random starting point toward the most similar vectors, rather than exhaustively
    checking each one.
  prefs: []
  type: TYPE_NORMAL
- en: '**Storage layer**: The storage layer efficiently manages the data storage on
    disk or in memory, ensuring optimal performance and scalability. The indexing
    layer works in conjunction with the storage layer: the index acts as a guide that
    points to where the actual vector data is stored, allowing for fast retrieval
    without loading all vectors into memory at once.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processing layer (optional)**: Some vector stores include a processing layer
    to handle vector transformations, similarity computations, and other analytics
    operations in real time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While it is technically possible to build a RAG system without using a vector
    store, doing so would result in suboptimal performance and scalability. Vector
    stores are specifically designed to handle the unique challenges of storing and
    serving high-dimensional vectors, offering optimizations that significantly improve
    memory usage, computation requirements, and search precision.
  prefs: []
  type: TYPE_NORMAL
- en: As noted earlier, we use vector store as the general term (consistent with LangChain)
    to cover any backend that stores embeddings and supports similarity search, including
    vector databases and non-database options, such as pgvector or FAISS.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s discuss the vector store options to give you a better grasp of what
    is available.
  prefs: []
  type: TYPE_NORMAL
- en: Common vector store options
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When choosing a vector store, consider factors such as scalability requirements,
    ease of setup and maintenance, performance needs, budget constraints, and the
    level of control and flexibility you require over the underlying infrastructure.
    Additionally, evaluate the integration options and supported programming languages
    to ensure compatibility with your existing technology stack.
  prefs: []
  type: TYPE_NORMAL
- en: There are quite a few vector stores, some from established database companies
    and communities, many that are new start-ups, many more that are appearing each
    day, and in all likelihood, some that will go out of business by the time you
    are reading this. It is a very active space! Stay vigilant and use the information
    in this chapter to understand the aspects that are most important to your specific
    RAG applications, and then look at the current marketplace to determine which
    option works best for you.
  prefs: []
  type: TYPE_NORMAL
- en: We will focus on the vector stores that have established integration with LangChain,
    and even then, we will pare them down to not overwhelm you, while also giving
    you enough options so that you can get a sense of what kinds of options are available.
    Keep in mind that these vector stores are adding features and improvements all
    the time. Be sure to look up their latest versions before making a selection!
    It could make all the difference you need to change your mind and make a better
    choice!
  prefs: []
  type: TYPE_NORMAL
- en: In the following subsections, we will walk through some common vector store
    options that integrate with LangChain, along with what you should consider about
    each one during the selection process.
  prefs: []
  type: TYPE_NORMAL
- en: Chroma
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Chroma** is an open source vector database that offers fast search performance
    and supports easy integration with LangChain through its Python SDK. Chroma stands
    out for its simplicity and ease of use, with a straightforward API and support
    for dynamic filtering of collections during search. It is free and open source,
    distributed under the permissive Apache 2.0 license, designed to provide “Retrieval
    that just works” with a focus on developer experience. Chroma now offers a hosted
    service called Chroma Cloud, which powers serverless vector and full-text search
    with fast performance and cost-effectiveness. Chroma is a good choice if you prioritize
    simplicity and want an open source solution that can be self-hosted. However,
    it requires manual reindexing for optimal performance after bulk updates and may
    not have as many advanced features as some other options, such as distributed
    search and built-in hybrid search capabilities that combine vector similarity
    with metadata filtering.'
  prefs: []
  type: TYPE_NORMAL
- en: LanceDB
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**LanceDB** is a vector database designed for efficient similarity search and
    retrieval, positioning itself as an open source multimodal lakehouse that provides
    one place for all AI data and workloads. It stands out for its hybrid search capabilities,
    combining vector similarity search with traditional keyword-based search, and
    includes blazing fast search capabilities with compute-storage separation. LanceDB
    supports various distance metrics and indexing algorithms, including **Hierarchical
    Navigable Small World** (**HNSW**) for efficient approximate nearest neighbor
    search, and is built on the Lance columnar format for efficient storage and analytics.
    LanceDB Cloud offers serverless vector search with enterprise-grade performance,
    and the platform now includes features such as declarative, distributed, and versioned
    pre-processing with native support for LLM-as-UDF. LanceDB is a good choice if
    you want a dedicated vector database with good performance, multimodal support,
    and integration with LangChain. However, it may not have as large a community
    or ecosystem compared to some other options.'
  prefs: []
  type: TYPE_NORMAL
- en: Milvus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Milvus** is an open source vector database that provides scalable similarity
    search and supports various indexing algorithms, including HNSW, IVF, FLAT (brute-force),
    SCANN, and DiskANN. It provides a cloud-native architecture with separated compute
    and storage layers that can scale horizontally, supports Kubernetes-based deployments
    for scalability and high availability, and implements hardware acceleration to
    enhance vector search performance, including support for GPU indexing such as
    NVIDIA’s CAGRA. Milvus 2.6, released in June 2025, introduced Storage Format V2
    with adaptive columnar storage, achieving up to 100x performance gains, native
    support for INT8 vectors, and integrated embedding functions that allow inserting
    and querying using raw text data. Milvus offers features such as multi-vector
    indexing, allowing you to search across multiple vector fields simultaneously,
    supports sparse vectors for full-text search with BM25, as well as hybrid search
    combining semantic and keyword search, and provides a plugin system for extending
    its functionality. Milvus is a good fit if you need a scalable and feature-rich
    open source vector store. However, it may require more setup and management compared
    to managed services.'
  prefs: []
  type: TYPE_NORMAL
- en: pgvector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**pgvector** is an extension for PostgreSQL that adds support for vector similarity
    search and integrates with LangChain as a vector store. It leverages the power
    and reliability of PostgreSQL, the world’s most advanced open source relational
    database, and benefits from PostgreSQL’s mature ecosystem, extensive documentation,
    and strong community support. `pgvector` 0.8.0, released in November 2024, added
    new vector types, including `halfvec` (2-byte floats supporting up to 4,000 dimensions)
    and `sparsevec` (supporting up to 1,000 nonzero dimensions), HNSW indexing support
    for L1 distance operations, and improvements to PostgreSQL’s query planner for
    better performance with filters.'
  prefs: []
  type: TYPE_NORMAL
- en: Recent benchmarks reveal `pgvector 0.8.0` delivers up to 9× faster query processing
    and 100× more relevant results than previous versions. `pgvector` seamlessly integrates
    vector similarity search with traditional relational database features, enabling
    hybrid search capabilities. Given that PostgreSQL is the most popular database
    in the world (a battle-tested, mature technology that has a huge community) and
    that the vector extension `pgvector` gives you all the capabilities of other vector
    databases, this combination offers a great solution for any company already using
    PostgreSQL.
  prefs: []
  type: TYPE_NORMAL
- en: Pinecone
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Pinecone** is a fully managed vector database service that offers high performance,
    scalability, and easy integration with LangChain. In February 2025, Pinecone announced
    the second generation of its serverless architecture, designed to automatically
    make the right configuration decisions for a wider variety of application types,
    including recommendation engines and AI agentic systems requiring millions of
    independent agents operating simultaneously. The platform now includes reranking
    models for search results, a proprietary sparse vector embedding model for lexical
    search with sparse vector indexes, and security upgrades, including **Role-Based
    Access Controls** (**RBAC**), customer-managed encryption keys, audit logs, and
    Private Endpoints for AWS PrivateLink. Pinecone offers features such as real-time
    indexing with dynamically indexed vectors, hybrid search combining sparse and
    dense embeddings, metadata filtering, and support for namespaces to ensure tenant
    isolation. Pinecone is a good choice if you want a managed solution with good
    performance and minimal setup. However, it may be more expensive compared to self-hosted
    options.'
  prefs: []
  type: TYPE_NORMAL
- en: Weaviate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Weaviate** is an open source vector search engine that supports various vector
    indexing and similarity search algorithms, combining vector similarity search
    with keyword (BM25) filtering, **retrieval-augmented generation** (**RAG**), and
    reranking in a single query interface. It follows a schema-based approach, allowing
    you to define a semantic data model for your vectors. Weaviate’s cloud-native
    architecture is built in Go for speed and reliability. **Weaviate v1.31**, released
    in June 2025, introduced MUVERA encoding for multi-vector embeddings, new BM25
    operators for customizable keyword searching, the ability to add new vectors to
    existing collections, and support for numerous new models, including **Cohere
    v3.5 reranker** and **V4 embed** models. Weaviate has also unveiled three AI agents
    in preview mode that use LLMs pre-trained on its APIs to perform tasks in the
    Weaviate vector database environment based on natural language commands. Weaviate
    supports CRUD operations, data validation, and authorization mechanisms, offers
    modules for common machine learning tasks such as text classification and image
    similarity search, and integrates with LangChain, with features such as schema
    management, real-time indexing, and a **GraphQL** API. Weaviate is a good fit
    if you want an open source vector search engine with advanced features and flexibility.
    However, it may require more setup and configuration compared to managed services.'
  prefs: []
  type: TYPE_NORMAL
- en: In the preceding subsections, we discussed various vector store options that
    integrate with LangChain, providing an overview of their features, strengths,
    and considerations for selection. This emphasizes the importance of evaluating
    factors such as scalability, ease of use, performance, budget, and compatibility
    with existing technology stacks when choosing a vector store. While broad, this
    list is still very short compared to the overall number of options available to
    integrate with LangChain and to use as vector stores in general.
  prefs: []
  type: TYPE_NORMAL
- en: The vector stores mentioned span a range of capabilities, including fast similarity
    search, support for various indexing algorithms, distributed architectures, hybrid
    search combining vector similarity with metadata filtering, and integration with
    other services and databases. Given the rapid evolution of the vector store landscape,
    new options are emerging frequently. Use this information as a base, but when
    you are ready to build your next RAG system, we highly recommend you visit the
    LangChain documentation on available vector stores and consider which option best
    suits your needs at that time.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will talk more in-depth about considerations when choosing
    a vector store for your RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing a vector store
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Selecting the right vector store for a RAG system involves considering several
    factors, including the scale of the data, the required search performance (speed
    and accuracy), and the complexity of the vector operations. Scalability is crucial
    for applications dealing with large datasets, requiring a mechanism that can efficiently
    manage and retrieve vectors from a growing corpus. Performance considerations
    involve evaluating the database’s search speed and its ability to return highly
    relevant results.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the ease of integration with existing RAG models and the flexibility
    to support various vector operations are also critical. Developers should look
    for vector stores that offer robust APIs, comprehensive documentation, and strong
    community or vendor support. As listed previously, there are many popular vector
    stores, each offering unique features and optimizations tailored to different
    use cases and performance needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'When choosing a vector store, it’s essential to align the selection with the
    overall architecture and operational requirements of the RAG system. Here are
    some key considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Compatibility with existing infrastructure**: When evaluating vector stores,
    it’s crucial to consider how well they integrate with your existing data infrastructure,
    such as databases, data warehouses, and data lakes. Assess the compatibility of
    the vector store with your current technology stack and the skills of your development
    team. For example, if you have strong expertise in a particular database system,
    such as PostgreSQL, a vector store extension such as `pgvector` might be a suitable
    choice, as it allows for seamless integration and leverages your team’s existing
    knowledge.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability and performance**: What is the vector store’s ability to handle
    the expected growth of your data and the performance requirements of your RAG
    system? Assess the indexing and search capabilities of the vector store, ensuring
    it can deliver the desired level of performance and accuracy. If you anticipate
    a large-scale deployment, distributed vector databases such as Milvus or Elasticsearch
    with vector plugins might be more appropriate, as they are designed to handle
    high data volumes and provide efficient search throughput.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ease of use and maintenance**: What is the learning curve associated with
    the vector store, taking into account the available documentation, community support,
    and vendor support? Understand the effort required for setup, configuration, and
    ongoing maintenance of the vector store. Fully managed services such as Pinecone
    can simplify deployment and management, reducing the operational burden on your
    team. On the other hand, self-hosted solutions such as Weaviate provide more control
    and flexibility, allowing for customization and fine-tuning to meet your specific
    requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data security and compliance**: Evaluate the security features and access
    controls provided by the vector store, ensuring they align with your industry’s
    compliance requirements. If you deal with sensitive data, assess the encryption
    and data protection capabilities of the vector store. Consider the vector store’s
    ability to meet data privacy regulations and standards, such as GDPR or HIPAA,
    depending on your specific needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost and licensing**: What is the pricing model of the vector store? Is it
    based on data volume, search operations, or a combination of factors? Consider
    the long-term cost-effectiveness of the vector store, taking into account the
    scalability and growth projections of your RAG system. Assess the licensing fees,
    infrastructure costs, and maintenance expenses associated with the vector store.
    Open source solutions may have lower upfront costs but require more in-house expertise
    and resources for maintenance, while managed services may have higher subscription
    fees but offer simplified management and support.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ecosystem and integrations**: When selecting a vector store, it’s important
    to evaluate the ecosystem and integrations it supports. Consider the availability
    of client libraries, SDKs, and APIs for different programming languages, as this
    can greatly simplify the development process and enable seamless integration with
    your existing code base. Assess the compatibility of the vector store with other
    tools and frameworks commonly used in RAG systems, such as NLP libraries or machine
    learning frameworks. The general size of the supporting community is important
    as well; make sure it is at a critical mass to grow and thrive. A vector store
    with a robust ecosystem and extensive integrations can provide more flexibility
    and opportunities for extending the functionality of your RAG system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By carefully evaluating these factors and aligning them with your specific requirements,
    you can make an informed decision when choosing a vector store for your RAG system.
    It’s important to conduct thorough research, benchmark different options, and
    consider the long-term implications of your choice in terms of scalability, performance,
    and maintainability.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that the choice of vector store is not a one-size-fits-all decision,
    and it may evolve as your RAG system grows and your requirements change. It’s
    crucial to periodically reassess your vector store selection and adjust as needed
    to ensure optimal performance and alignment with your overall system architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The integration of vectors and vector stores into RAG systems is foundational
    for enhancing the efficiency and accuracy of information retrieval and generation
    tasks. By carefully selecting and optimizing your vectorization approach, as well
    as your vector store, you can significantly improve the performance of your RAG
    system. Vectorization techniques and vector stores are only part of how vectors
    play a role in RAG systems; they also play a major role in our retrieval stage.
    In the next chapter, we will address the retrieval role vectors play, going in-depth
    on the subject of vector similarity search algorithms and services.
  prefs: []
  type: TYPE_NORMAL
