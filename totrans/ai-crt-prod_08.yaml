- en: In this part of the book, we’ll look at tools that generate more than they assist,
    creating text, parts of images, entire images or videos, complete video transformations,
    or audio such as speech or music.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的这一部分，我们将探讨那些生成内容多于辅助的工具，包括生成文本、图像的部分、整个图像或视频、完整的视频转换，或如语音或音乐这样的音频。
