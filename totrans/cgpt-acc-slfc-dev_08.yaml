  prefs: []
  type: TYPE_PRE
- en: '[PRE150]'
  prefs: []
  type: TYPE_PRE
- en: In this rewritten version, a separate list called `accountsToDelete` is populated
    and then used for the delete operation. This way, you’re not trying to perform
    DML directly on `Trigger.old`, and it will comply with Salesforce’s rules. |
