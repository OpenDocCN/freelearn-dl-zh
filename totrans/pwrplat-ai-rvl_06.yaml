- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Processing Data with Sentiment Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, we’ve looked at using AI (specifically, Microsoft’s Copilot and ChatGPT)
    to help us create and modify tooling (such as flows and apps). While they can
    be helpful, it often requires a lot of extra effort to get these types of general-purpose
    assistants to do very specific step-oriented tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Power Platform allows you to harness AI to make judgments across a wide range
    of content and data types, helping mimic human evaluations at machine speed.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, humans can easily glance at a business card and discern the person’s
    name and job title, regardless of their placement on the card. However, this task
    is considerably more challenging for traditional computer logic to execute. As
    business card designs evolve, data fields shift and become increasingly challenging
    for traditional automation engines to recognize and identify. AI models introduce
    contextual awareness to data, simplifying the automation process to mirror human-like
    performance. Another example might be determining how a customer feels about a
    particular product or service. It’s relatively easy for a human to infer if a
    customer’s email has a happy or angry tone, but it’s much more difficult with
    standard programming logic.
  prefs: []
  type: TYPE_NORMAL
- en: 'Power Platform provides access to a variety of AI capabilities – whether it’s
    leveraging existing AI models that have been trained for specific types of tasks
    or feeding data to more general-purpose AI tools to reason over content. Power
    Platform’s native AI models are divided into two categories: **pre-built models**
    (models trained on specific types of datasets for a narrow content domain) and
    **custom models** (models that have some core training but require additional
    customization and training with your data).'
  prefs: []
  type: TYPE_NORMAL
- en: What is sentiment analysis, anyway?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Sentiment analysis, simply put, answers the question, “*What type of feelings
    are present in this content?*” Power Platform’s sentiment analysis model can examine
    a piece of content and return one of the following four sentiments:'
  prefs: []
  type: TYPE_NORMAL
- en: Positive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Negative
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Neutral
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mixed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When processing text, the sentiment analysis AI model returns a sentiment value
    for each sentence, as well as the content as a whole. In addition to the sentiment
    value, sentiment analysis provides confidence scoring, indicating how confident
    the model is in its assessment, on a scale of 0 to 1, where 1 represents more
    confidence and 0 represents less confidence. Sentiment analysis does have its
    limitations, however – for example, if the content has incorrect or improper word
    usage – that may influence the ratings.
  prefs: []
  type: TYPE_NORMAL
- en: The scenario in this chapter is based on a fictional company that uses a customer
    service mailbox as a funnel for comments and complaints. The business objective
    is to process the emails and determine the sentiment. If the sentiment is negative,
    the solution should post the message to a Teams channel so that a service representative
    can follow up with the customer.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using AI models and connectors in Power Platform has several prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Dataverse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Builder capacity (or trial capacity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Apps or Power Automate premium licensing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The easiest way to get the right amount of licensing is to sign up for a Microsoft
    365 E5 trial that includes Power Apps and Power Automate premium licenses, along
    with a modest amount of AI Builder capacity credits.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have an existing Microsoft 365 subscription, you can sign up for Power
    Apps or Power Automate premium licensing from the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    as shown in *Figure 6**.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.1 – Microsoft 365 admin center](img/B21234_06_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.1 – Microsoft 365 admin center
  prefs: []
  type: TYPE_NORMAL
- en: 'You can review your current allocation of AI Builder capacity in the Power
    Platform admin center ([https://admin.powerplatform.microsoft.com/resources/capacity#add-ons](https://admin.powerplatform.microsoft.com/resources/capacity#add-ons))
    under **Resources** > **Capacity**, as shown in *Figure 6**.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.2 – Viewing Power Platform capacity](img/B21234_06_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.2 – Viewing Power Platform capacity
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll look at the prerequisites for building the solution.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring solution prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Once you’ve got the licensing squared away, you’ll need to set up a few things
    to make this demonstration work:'
  prefs: []
  type: TYPE_NORMAL
- en: A mailbox (either a standard mailbox or a shared mailbox in Exchange Online)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Microsoft team with at least the default General channel
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While it’s not necessary, it’s also helpful to have a free email account (such
    as an Outlook.com or Gmail.com account) that you can use to validate that the
    solution is working end to end.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a shared mailbox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, we’ll walk through creating a shared mailbox. A shared mailbox doesn’t
    require any special licensing for itself, though it does require a licensed user
    to access it:'
  prefs: []
  type: TYPE_NORMAL
- en: Log into the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)).
    From there, expand **Teams & groups** and select **Shared mailboxes**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Add a shared mailbox**, as shown in *Figure 6**.3*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.3 – Viewing shared mailboxes](img/B21234_06_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.3 – Viewing shared mailboxes
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Add a shared mailbox** flyout, enter a **Name** value and adjust the
    **Email** address as necessary:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.4 – Creating a shared mailbox](img/B21234_06_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.4 – Creating a shared mailbox
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **Add members to your** **shared mailbox**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.5 – Viewing the newly created mailbox](img/B21234_06_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.5 – Viewing the newly created mailbox
  prefs: []
  type: TYPE_NORMAL
- en: On the **Shared mailbox members** flyout, click **Add members**, select at least
    one user in the organization that has a mailbox license, and click **Add**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Close the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When working with Power Automate, you’ll need to use the credentials for the
    account you granted access to in *step 5*.
  prefs: []
  type: TYPE_NORMAL
- en: Next, you’ll need to create a team.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Microsoft Teams team
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Microsoft Teams team will be used to receive notifications from Power Automate.
    To create a team from the Microsoft 365 admin center, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: All roads lead to Rome
  prefs: []
  type: TYPE_NORMAL
- en: There are lots of ways to do the same task in Microsoft 365\. While this set
    of steps details creating a team through the Microsoft 365 admin center (since
    we’re already there), you can also do it directly from Microsoft Teams. To learn
    how to use Teams to accomplish this task, go to [https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b](https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b).
  prefs: []
  type: TYPE_NORMAL
- en: From the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    expand **Teams & groups** and then select **Active teams** **and groups**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Teams & Microsoft 365 groups** tab, click **Add** **a team**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Basics** page of the **Add a team** wizard, provide a **Name** value
    for the team and click **Next**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.6 – Creating a new team](img/B21234_06_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.6 – Creating a new team
  prefs: []
  type: TYPE_NORMAL
- en: On the **Owners** page, add at least one owner (such as the account managing
    the shared mailbox). Then, click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Members** page, add any additional members and click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Settings** page, enter a **Team email address** value. Then, click
    **Next**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.7 – Configuring an email address for the team](img/B21234_06_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.7 – Configuring an email address for the team
  prefs: []
  type: TYPE_NORMAL
- en: On the **Finish** page, review the settings and click **Add team**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, it’s on to the fun part!
  prefs: []
  type: TYPE_NORMAL
- en: Configuring a sentiment analysis flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As you learned earlier in this chapter, sentiment analysis provides a mechanism
    to evaluate content’s tone and provide an output. To address the business scenario
    of responding to negative customer feedback, you can use a sentiment analysis
    flow to process messages that are received by the shared mailbox.
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create the flow:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Automate Maker Portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the navigation menu, select **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Start from blank**, select **Automated** **cloud flow**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.8 – Starting a new flow](img/B21234_06_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.8 – Starting a new flow
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Build an automated cloud flow** wizard, enter a **Flow name** value
    and then select the **When a new email arrives in a shared mailbox (V2)** trigger.
    Click **Create** once you’re done:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.9 – Selecting the flow’s trigger](img/B21234_06_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.9 – Selecting the flow’s trigger
  prefs: []
  type: TYPE_NORMAL
- en: In the canvas area, select the **When a new email arrives in a shared mailbox
    (****V2)** trigger.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the flyout, click the **Change connection** link if the screen displays
    a message about an invalid connection. See *Figure 6**.10*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.10 – Configuring the shared mailbox](img/B21234_06_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.10 – Configuring the shared mailbox
  prefs: []
  type: TYPE_NORMAL
- en: Select the credential that will be used to authenticate to the mailbox. If the
    credential is not listed, click **Add new** and provide the username and password
    for an account that has access to the shared mailbox.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.11 – Updating the connection settings](img/B21234_06_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.11 – Updating the connection settings
  prefs: []
  type: TYPE_NORMAL
- en: On the **Parameters** tab of the flyout, enter the email address of the shared
    mailbox that will be used to receive customer emails. When prompted, select **Use
    <email address> as a** **custom value**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **<<** (**Collapse**) icon to close the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the canvas area, click the **+** icon under the trigger to add a new step
    and then click **Add** **an action**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.12 – Adding a new action](img/B21234_06_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.12 – Adding a new action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `detect` in the search box and select the **Detect the language being
    used in text** action, as shown in *Figure 6**.13*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.13 – Choosing the Detect the language being used in text action](img/B21234_06_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.13 – Choosing the Detect the language being used in text action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Detect the language being used** flyout, click inside the **Text**
    box. Select the lightning bolt icon to expand the dynamic content picker:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.14 – Configuring the Detect the language being used in text action](img/B21234_06_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.14 – Configuring the Detect the language being used in text action
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the **Body** token:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.15 – Selecting the Body token](img/B21234_06_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.15 – Selecting the Body token
  prefs: []
  type: TYPE_NORMAL
- en: Collapse the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **+** icon outside the **For each** loop component and select **Add**
    **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `sentiment analysis` in the search box and select the **Analyze positive
    or negative sentiment in** **text** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Analyze positive or negative sentiment in text** flyout, choose the
    **Language** dropdown and select **Enter a custom value**. Select the lightning
    bolt icon to display the dynamic content picker:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.16 – Configuring the Language field](img/B21234_06_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.16 – Configuring the Language field
  prefs: []
  type: TYPE_NORMAL
- en: Select the lightning bolt icon to display the dynamic content picker.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the dynamic content picker, under the **Detect the language being used in
    the text** action, select the **Language** dynamic content token:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.17 – Choosing the Language dynamic content token](img/B21234_06_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.17 – Choosing the Language dynamic content token
  prefs: []
  type: TYPE_NORMAL
- en: Click inside the **Text** field and select the dynamic content picker.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the dynamic content picker, under the **When a new email arrives in a shared
    mailbox (V2)** action, select the **Body** token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Collapse the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the flow so far. It should look similar to the arrangement depicted
    in *Figure 6**.18*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.18 – Reviewing the current state of the flow](img/B21234_06_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.18 – Reviewing the current state of the flow
  prefs: []
  type: TYPE_NORMAL
- en: Inside the nested **For each** loop container containing the **Analyze positive
    or negative sentiment in text** action, click the **+** icon to **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `condition` in the search box and select the **Condition** action located
    under **Control**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Condition** flyout, click inside the left textbox and choose the dynamic
    content picker.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the dynamic content picker, under **Analyze positive or negative sentiment
    in text**, choose the **Overall text sentiment** token. If that token doesn’t
    display in the default list of choices, you may need to click **See more**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.19 – Selecting the Overall text sentiment token](img/B21234_06_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.19 – Selecting the Overall text sentiment token
  prefs: []
  type: TYPE_NORMAL
- en: 'In the right textbox, enter `negative`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.20 – Configuring the condition evaluation](img/B21234_06_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.20 – Configuring the condition evaluation
  prefs: []
  type: TYPE_NORMAL
- en: Collapse the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **True** branch of the condition, click the **+** icon to **Add** **an
    action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the search box, enter `post message` and select the **Post message in a
    chat or channel** Microsoft Teams action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.21 – Adding the Post message in a chat or channel action](img/B21234_06_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.21 – Adding the Post message in a chat or channel action
  prefs: []
  type: TYPE_NORMAL
- en: On the **Post message in a chat or channel** flyout, click **Sign in** to create
    a connection. Provide credentials for the user account that will be used to post
    to Teams.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Post As** dropdown, select **Flow bot**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Post In** dropdown, select **Channel**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Team** dropdown, search for the team you created in the *Licensing*
    *prerequisites* section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Channel** drop-down, select **General**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Message** textbox, add details for the message to be posted to the
    channel. You can use rich text formatting options, as well as select from dynamic
    content tokens. See *Figure 6**.22*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.22 – Configuring the Post message in a chat or channel action](img/B21234_06_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.22 – Configuring the Post message in a chat or channel action
  prefs: []
  type: TYPE_NORMAL
- en: Collapse the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the flow’s layout and check for any obvious errors. See *Figure 6**.23*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.23 – Reviewing the overall flow](img/B21234_06_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.23 – Reviewing the overall flow
  prefs: []
  type: TYPE_NORMAL
- en: On the menu bar, click **Save** to save the flow.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Review the flow to make sure the steps have been configured. Once you’re done,
    it’s time to test it!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now, it’s time to make sure everything works as anticipated:'
  prefs: []
  type: TYPE_NORMAL
- en: 'From the menu bar, select the **beaker** icon (**Test**):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.24 – Testing the flow](img/B21234_06_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.24 – Testing the flow
  prefs: []
  type: TYPE_NORMAL
- en: Select the **Manually** radio button and click **Test**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Test your flow by sending an email to the configured shared mailbox. Be sure
    to word it strongly to ensure you are expressing disapproval:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.25 – Composing a test email](img/B21234_06_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.25 – Composing a test email
  prefs: []
  type: TYPE_NORMAL
- en: 'After sending the email, the flow run history should begin to update in the
    Power Automate Maker Portal:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.26 – Flow execution results](img/B21234_06_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.26 – Flow execution results
  prefs: []
  type: TYPE_NORMAL
- en: 'Open Microsoft Teams (or navigate to [https://teams.microsoft.com](https://teams.microsoft.com))
    and validate that the channel post has been made:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 6.27 – Verifying the channel post](img/B21234_06_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.27 – Verifying the channel post
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Depending on your requirements and other connected systems, you may be able
    to expand and enhance this solution, including workflows that do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Connect to an e-commerce platform and generate a coupon code for a discount
    on future purchases
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
