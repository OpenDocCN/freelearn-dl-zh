- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Generating Text with AI for Content Creation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The rise of **artificial intelligence** (**AI**) has opened up exciting new
    possibilities for automating and enhancing content creation. In this chapter,
    we will explore how AI can be leveraged to write compelling copy across a variety
    of mediums and use cases, from social media posts to long-form articles.
  prefs: []
  type: TYPE_NORMAL
- en: We will begin by looking at the basics of using AI for copywriting. Generative
    language models can now produce human-like text tailored to your brand voice and
    goals. We’ll discuss best practices for crafting effective prompts to guide the
    AI and produce high-quality draft content. With the right prompts and input, AI
    can generate blog posts, social media captions, landing page copy, emails, and
    more.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore how AI can customize content at scale. By incorporating
    personalization into prompts and giving the AI user data, it can tailor messaging
    for each reader. This has powerful marketing applications, allowing brands to
    provide a more personalized experience. We’ll cover different techniques for personalization
    with AI.
  prefs: []
  type: TYPE_NORMAL
- en: Later sections will provide tips on using AI for specific content types and
    use cases. We’ll look at crafting viral social media posts, writing compelling
    video scripts that convert viewers, and optimizing long-form content such as articles
    and newsletters for engagement. Throughout, we’ll share actionable strategies
    and examples for getting the most out of AI as a copywriting tool.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will have a firm grasp of how to utilize AI
    as a copywriting assistant to create high-quality, personalized content quickly
    and at scale. The strategies covered will help writers, marketers, and entrepreneurs
    supercharge their content engines with this exciting new technology.
  prefs: []
  type: TYPE_NORMAL
- en: 'The most common generative AI tools for writing are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**ChatGPT and ChatGPT Plus**: You can sign in at [https://openai.com/](https://openai.com/)
    ChatGPT Plus allows you to access not only GPT-3.5 Turbo but also GPT-4\. It also
    gives access to plugins. Plugins will be discussed later in this book.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Google Bard ([https://bard.google.com/chat](https://bard.google.com/chat)):
    This has access to the internet and it allows you to upload image files. Thus,
    you can ask Bard to describe the scene in an image.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Anthropic Claude 2 ([https://claude.ai/login](https://claude.ai/login)): This
    also has access to the internet, and it has a 100,000 token context window, which
    allows it to handle large documents and PDFs of up to 75,000 words.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Microsoft Bing** ([https://www.bing.com/search](https://www.bing.com/search)):
    This is the ChatGPT version run by Microsoft. It has access to the internet.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open AI Playground** ([https://platform.openai.com/playground](https://platform.openai.com/playground)):
    Here, you can access different versions of GPT-3.5 Turbo and GPT-4\. The versions
    are referenced by released dates and context windows. For example, gpt-3.5-turbo-16k-0613
    has a context window of 16,000 tokens and was released on June 13, 2023.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following topics will be covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Using AI for copywriting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating social media posts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing video scripts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating blog posts, articles, and news
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating engaging content with AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to use AI for personalized messaging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating tailored content with AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using AI for copywriting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: By utilizing ChatGPT as a powerful content creation tool, content creators can
    harness its versatility, knowledge, and language abilities to streamline their
    creative process, generate innovative ideas, improve writing quality, and engage
    with their audience in novel ways.
  prefs: []
  type: TYPE_NORMAL
- en: 'Content creators have several compelling reasons to use tools such as ChatGPT
    to enhance their content creation process:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Versatility and flexibility**: ChatGPT can be leveraged across various content
    formats, including articles, scripts, social media posts, and more. Its versatility
    allows creators to engage with the model conversationally, enabling them to brainstorm
    ideas, ask for suggestions, or receive feedback, thereby expanding the possibilities
    for their content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Idea generation and inspiration**: ChatGPT’s vast knowledge base and language
    capabilities make it an excellent tool for generating fresh ideas and finding
    inspiration. Content creators can tap into the model’s extensive understanding
    of diverse topics and trends to develop unique concepts, explore different angles,
    or even spark innovative collaborations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Writing assistance and editing support**: Creating high-quality content often
    involves careful crafting and editing. ChatGPT can act as a virtual writing assistant,
    offering real-time suggestions, improving sentence structure, providing grammar
    and spelling corrections, and enhancing overall clarity. This can save content
    creators time and effort while they’re refining their work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research and fact-checking**: Accurate information is crucial for content
    creators. ChatGPT can assist in researching topics, verifying facts, and providing
    references to reputable sources. By leveraging the model’s knowledge cutoff date
    and its ability to analyze vast amounts of text, content creators can access reliable
    information and ensure the accuracy and credibility of their work. In this case,
    the user has to be careful to check that ChatGPT is not hallucinating.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Audience engagement and interaction**: ChatGPT’s conversational nature allows
    content creators to simulate dialogues, interviews, or Q&A sessions with the model.
    This opens up opportunities for dynamic and engaging content formats that foster
    audience interaction. Creators can ask the model questions on behalf of their
    audience, present hypothetical scenarios, or explore different perspectives, fostering
    an interactive and immersive experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content optimization**: With the vast amount of content available online,
    creators need to optimize their work for search engines and social media platforms.
    ChatGPT can offer insights on SEO-friendly keywords, headlines, meta descriptions,
    and social media captions. It can assist content creators in tailoring their content
    to maximize its visibility and reach a wider audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Timesaving and efficiency**: ChatGPT’s ability to generate text quickly and
    provide immediate responses can significantly enhance a content creator’s productivity.
    Instead of spending excessive time researching or drafting, creators can rely
    on the model to assist them, allowing them to focus on other aspects of their
    work, such as strategy, creativity, and engaging with their audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multilingual support**: Content creators catering to diverse audiences can
    benefit from ChatGPT’s multilingual capabilities. The model can assist with content
    creation in various languages, opening up opportunities for creators to reach
    a global audience and expand their content’s international reach.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Crafting powerful prompts is essential for engaging content. Here are five
    formulas you can use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AIDA formula**: *Attention*, *Interest*, *Desire*, and *Action*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This classic copywriting formula is designed to take readers through a persuasive
    journey by capturing attention, piquing interest, creating desire, and ultimately
    inspiring action. Follow these steps:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Attention**: Begin with a strong headline or opening statement that grabs
    the reader’s attention, addressing their pain points and desires, or evoking curiosity.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Interest**: Provide interesting and informative content that aligns with
    your target audience’s needs and preferences. Use facts, stories, or examples
    to captivate readers and keep them engaged.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Desire**: Tap into your audience’s emotions and aspirations by showcasing
    the benefits of your product or service, making them feel that it’s essential
    for achieving their goals or solving their problems.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Action**: End the content with a clear and compelling call to action that
    encourages readers to take the next step, whether it’s purchasing your product,
    signing up for your service, or requesting more information.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**PAS formula**: *Problem*, *Agitate*, and *Solve*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This formula focuses on identifying a specific problem faced by your target
    audience, agitating it by highlighting the pain it causes, and presenting your
    product or service as the ideal solution. Follow these steps:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Problem**: Start by identifying a problem or pain point that your target
    audience experiences. Make sure it’s a problem that your product or service can
    effectively address. Demonstrate that you understand their struggle and can empathize
    with their situation.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Agitate**: Dive deeper into the problem by explaining the consequences and
    negative impact of not addressing it. Make the problem feel more pressing and
    urgent, evoking emotions such as frustration, fear, or a sense of missing out.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Solve**: Present your product or service as the solution to the problem.
    Showcase the benefits, advantages, and how it specifically resolves the issue.
    Provide evidence such as case studies, statistics, or testimonials to build trust
    and credibility. Finally, include a clear call to action that directs readers
    to what they should do next to take advantage of your offering and solve their
    problem.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**FOMO formula**: *Fear of* *Missing Out*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Leverage the psychology of **fear of missing out** (**FOMO**) to create urgent
    and compelling prompts. This formula taps into the innate desire people have not
    to be left behind or miss out on something valuable. Follow these steps:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Exclusivity**: Emphasize the exclusive or limited nature of your offering,
    such as being available to a specific group or having a limited supply.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Timing**: Create urgency by adding a time-sensitive aspect, such as a limited-time
    promotion, a countdown timer, or a deadline for registration.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Social Proof**: Showcase the popularity or high demand for your product or
    service by sharing testimonials, reviews, or the number of people who have already
    taken advantage of your offer.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Action**: Encourage immediate action by combining the preceding elements
    and stating what the reader needs to do to avoid missing out, such as purchasing
    now, signing up, or joining a waiting list.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**SMILE formula**: *Storytelling*, *Metaphor*, *Inspirational*, *Language*,
    and *Emotion*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This formula focuses on creating a strong emotional connection with your audience
    by integrating different elements of storytelling and persuasive language. Follow
    these steps:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Storytelling**: Start your content with a captivating story that resonates
    with your target audience. It can be a personal story, a case study, or a story
    of someone else’s experience with your product or service.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Metaphor**: Use metaphors, analogies, and vivid imagery to make complex concepts
    more relatable and memorable.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Inspirational**: Uplift your readers and motivate them to take action by
    presenting an inspiring vision of what their lives could be like once they use
    your offering.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Language**: Choose powerful, descriptive, and persuasive words that appeal
    to your audience’s emotions and aspirations. Avoid jargon and technical language
    that may be difficult to understand.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Emotion**: Evoke strong emotions that grab your reader’s attention, create
    a sense of connection, and ultimately motivate them to take action. Focus on emotions
    such as excitement, enthusiasm, joy, relief, or pride.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**POWER formula**: *Promise*, *Objection*, *Why*, *Evidence*, and *Reward*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This formula tackles potential objections to the offering made in the cold
    email from your audience while demonstrating the value of your product or service.
    Apply these steps to create effective prompts:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Promise**: Begin with a clear and powerful promise that shows how your product
    or service will benefit your target audience. Let them know what they can expect
    to gain or achieve.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Objection**: Address the common objections or concerns that your audience
    might have about your offering. Be upfront and honest about potential drawbacks
    and demonstrate how your solution overcomes these limitations.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Why**: Explain the unique reasons your product or service stands out in the
    marketplace compared to competitors. Showcase the factors that differentiate your
    offering and make it worth choosing.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Evidence**: Provide evidence to support your claims, such as testimonials,
    case studies, data, or expert endorsements. This helps build trust, credibility,
    and confidence in your product or service.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Reward**: Conclude by highlighting the rewards or positive outcomes your
    audience will experience when they take action. Summarize the benefits, emphasize
    the improvements they can expect, and motivate them to act by connecting the rewards
    to their personal or professional goals.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Thus, when creating prompts to generate copy, instruct the model (ChatGPT, Bard,
    and so on) which of these formulas or a combination of them you would like it
    to use to be able to create compelling content that captures your audience’s attention,
    connects with their emotions, and effectively communicates the value of your product
    or service.
  prefs: []
  type: TYPE_NORMAL
- en: 'To produce better copy, providing most of the following information would be
    helpful:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Target audience**: Details about your target market, including demographics
    (age, gender, income, education), psychographics (interests, values, lifestyle),
    and any known pain points or desires.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product or service**: A thorough understanding of your product or service,
    including features, benefits, pricing, and what sets it apart from competitors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brand identity**: Information about your brand’s identity, values, and voice
    to ensure the copy is consistent and reflects your brand’s personality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Marketing goals**: A clear understanding of your specific marketing goals
    and objectives, such as increasing sales, generating leads, creating awareness,
    or improving brand perception.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tone and style**: The desired tone and style for your copy (for example,
    professional, conversational, humorous, informative, or inspirational).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key messages**: Any key messages or unique selling points you’d like to emphasize
    in the copy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Restrictions**: Any restrictions, such as word count, formatting requirements,
    or platform-specific guidelines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Call to action**: The desired call to action, whether it’s purchasing a product,
    signing up for a newsletter, contacting you for more information, or visiting
    your website.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Competitors**: Insights into your main competitors and their marketing strategies,
    which help identify areas of opportunity and differentiation for your brand.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Channel and format**: The specific channels and formats where the copy will
    be applied, such as website content, blog posts, social media, email campaigns,
    or printed materials. This helps tailor the copy to meet the requirements and
    user experience of each medium.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Keywords**: If you’re focusing on **search engine optimization** (**SEO**),
    provide a list of relevant keywords and phrases you’d like to target or incorporate
    within the copy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Testimonials and social proof**: Customer reviews, testimonials, case studies,
    or any other forms of social proof that support the claims made in your copy and
    build trust with your audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visual elements**: Details about any visual elements, such as images, graphs,
    videos, or infographics, which can help support the text and create a more engaging
    experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Providing this information ensures the creation of tailored, high-quality copy
    that not only resonates with your target audience but also effectively communicates
    your brand’s unique value proposition, aligns with your marketing goals, and drives
    the desired action. The more detailed and comprehensive the information provided,
    the better the copy can be customized to your specific needs and objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that ChatGPT allows you to build a *conversation*. As such, you can
    ask it to refine or rewrite parts of the copy to adjust to your needs.
  prefs: []
  type: TYPE_NORMAL
- en: In the next few sections, we are going to explore how to use this approach to
    create different types of content with the help of generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: Creating social media posts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s learn how to use ChatGPT (with GPT-4) to write a Twitter thread. In general,
    GPT-4 is better than GPT-3.5 Turbo, but it’s also more expensive. Thus, experiment
    with different models, including Bing (free), Google Bard (free), and Anthropic
    Claude (free).
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-4 is a significant improvement over GPT-3.5 in several ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Multimodal capabilities**: GPT-4 can understand and generate text, and soon
    it will be able to understand images and graphics. This makes it a more versatile
    tool for a wider range of applications. This makes it a more versatile tool for
    a wider range of applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved context understanding**: GPT-4 can retain more information from
    previous conversations and use it to generate more relevant and coherent responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better performance on complex tasks**: GPT-4 is better at solving complex
    problems, such as generating code, translating languages, and writing different
    kinds of creative content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reduced likelihood of generating harmful or offensive content**: GPT-4 is
    less likely to generate harmful or offensive content, even when prompted to do
    so.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To use ChatGPT with GPT-4, you need to subscribe to ChatGPT Plus. Another way
    to use GPT-4 is by signing in to get access to OpenAI APIs. Once you do that,
    you can use GPT-4 in the playground (you can find it at [https://platform.openai.com/playground](https://platform.openai.com/playground))
    or by using the corresponding API. In both cases, you will be charged depending
    on how much you use it.
  prefs: []
  type: TYPE_NORMAL
- en: In ChatGPT, Bard, Bing, and Claude, you can enter a prompt and get a response,
    enter another prompt and get another response, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: In most cases, we will be using GPT-4 in the playground.
  prefs: []
  type: TYPE_NORMAL
- en: With AI now capable of generating coherent text, one application that shows
    promise is using these models to draft social media content such as Twitter threads.
  prefs: []
  type: TYPE_NORMAL
- en: Writing a Twitter thread
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Social media platforms such as Twitter have become popular outlets for sharing
    ideas and engaging audiences. However, writing compelling threads that spark discussion
    can be challenging. AI text generation models present an intriguing option for
    drafting initial Twitter threads that human creators can then refine and finalize.
    Harnessing this to ideate thread topics and content is an emerging use case to
    explore.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with a zero-shot prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s make it a thread.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This isn’t bad, but it can be better. Let’s provide more context on what we
    want.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s how you can further improve the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Again, let’s make it a thread.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: In this case, it produced a thread of three items. You can ask for more if needed.
    That’s the beauty of it – you can chat with the LLM to make improvements and changes
    as you see fit.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s create an Instagram post.
  prefs: []
  type: TYPE_NORMAL
- en: Writing an Instagram post
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While Twitter’s short posts lend themselves well to fully automated AI drafting,
    the longer-form captions on visual platforms such as Instagram may benefit more
    from AI assistance in ideating and outlining initial content.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the first prompt for an Instagram post.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: It seems that the captions are too long and the prompts for the images are not
    detailed enough. So, let’s improve that in the next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: To create the images, we can use prompts and tools such as Midjourney, Stable
    Diffusion, Adobe Firefly, or any other text-to-image generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, using Adobe Firefly with the prompt for the first image, we get the following
    output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1: Images generated with Adobe Firefly](img/B21161_02_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: Images generated with Adobe Firefly'
  prefs: []
  type: TYPE_NORMAL
- en: 'Maybe you would like a more photorealistic image. No problem – add *photorealistic*
    to the prompt and you will get something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2: Adding photorealistic to the prompt](img/B21161_02_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Adding photorealistic to the prompt'
  prefs: []
  type: TYPE_NORMAL
- en: You can modify the prompts to get something closer to what you are looking for
    or click on **Regenerate** to create another set of images. Once you get an image
    that you like, just download it.
  prefs: []
  type: TYPE_NORMAL
- en: You could do something similar to create the content for a LinkedIn post or
    a carousel.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will explore how to use these techniques to create high-converting
    sales copy.
  prefs: []
  type: TYPE_NORMAL
- en: Producing high-converting sales copy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Crafting an effective sales and marketing copy is an art that combines an understanding
    of psychology, writing ability, and strategic messaging. For businesses, the stakes
    are high because quality copy can notably impact conversion rates, revenue, and
    brand perception.
  prefs: []
  type: TYPE_NORMAL
- en: With AI natural language models now capable of generating human-like text, companies
    are experimenting with these systems to ideate, outline, and even draft full sales
    copy. The goal is to utilize AI as an assistive tool for brainstorming compelling
    narratives and value propositions. While human copywriters still reign supreme,
    AI could augment their workflows and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: The possibilities to generate high-converting initial drafts or personalized
    copy tailored to customer segments present exciting opportunities to explore.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this example, let’s focus on another niche: fitness and weight loss.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This looks very similar to the real offers you get for similar programs. Does
    it work? Maybe, maybe not. The good news is that you can quickly change some of
    the variables, make other versions of the copy, and then run A/B tests. Furthermore,
    you probably won’t take the copy produced by the LLM as-is but use it as a starting
    draft that you can tailor as you see fit.
  prefs: []
  type: TYPE_NORMAL
- en: Is there a copywriter style that you like? Add a couple of examples of copy
    from that author as examples and in the prompt say, *Write the copy using the
    style of these examples…* We will explore that later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: In the upcoming section, we will delve into crafting effective prompts that
    help you seamlessly write compelling video scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Writing video scripts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Video content has exploded in popularity in recent years across social platforms,
    websites, and advertising. However, scripting compelling, engaging videos that
    connect with audiences can be difficult. AI text generation tools present an opportunity
    to get an initial draft down quickly.
  prefs: []
  type: TYPE_NORMAL
- en: While human scriptwriters craft the story, characters, and dialogue, AI could
    help ideate broad themes and content, or even take a first pass at turning outlines
    into full scripts. This can allow content creators to iterate more quickly and
    focus their time on refinement. As with sales copy, AI-assisted scriptwriting
    aims to boost efficiency and creativity rather than fully automate. Finding the
    right balance for using these tools will be key to producing compelling videos
    people want to watch and share.
  prefs: []
  type: TYPE_NORMAL
- en: The formula here is similar. We provide a topic, context, goals, audience, and
    so on and we ask GPT-4 to produce a video script.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin with our prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the first prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: In this case, the images for the different scenes can also be generated with
    text-to-image generators, as discussed before. The user could also search for
    royalty-free video clips at sites such as Pixabay or Pexels.
  prefs: []
  type: TYPE_NORMAL
- en: For the voiceovers, you can narrate the video yourself or use text-to-speech
    applications such as Murf.ai, Lovo.ai, Listnr, Synthesis, and Deep Brain, among
    others. The last two can also produce a video based on the script. Just use the
    script as a prompt and voila.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve explored AI’s capabilities for crafting video scripts and sales
    copy, let’s look at another domain where these text models show promise – generating
    long-form written content such as blog posts, articles, and news. Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: Generating blog posts, articles and news
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Publishing high-quality written content at scale is crucial, yet challenging,
    for brands and publishers today. AI text generation presents opportunities to
    augment human writers’ workflows for research, ideation, and drafting. For blog
    posts, AI tools can analyze data such as search volume and user interests to propose
    engaging topics. The AI can then produce a rough initial draft for the writer
    to revise and finalize. For news, AI programs can synthesize information from
    large datasets and event details to draft basic articles that human journalists
    can customize and fact-check.
  prefs: []
  type: TYPE_NORMAL
- en: While AI-generated text still lacks true comprehension and intent, capabilities
    continue improving rapidly. With proper human guidance, AI writing assistants
    could unlock immense value in researching, personalizing, and scaling content
    creation.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing you need to decide is what the post or article is all about.
    If you have a blog, it is probably about a certain topic in particular. It could
    be about anything really, such as mental health, finances, self-care, career,
    technology, or something else.
  prefs: []
  type: TYPE_NORMAL
- en: In any case, you can use ChatGPT to get ideas and outlines for your next blog
    posts. Ask the AI to suggest potential topics and headlines that fit your blog’s
    focus for the coming weeks or months. Then review the AI’s suggestions, pick the
    best ones, and develop them into a content calendar. From there, use the AI outlines
    as a starting point, expanding on them with your own voice, expertise, and research.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose you blog about finances, and you need some fresh ideas to blog about
    for the next few months. Let’s look at what you can do then.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: This is a solid list. Now, you have a great list of ideas to write your blog
    posts. Maybe you needed only 10\. In that case, you could include *Write 10 ideas
    for my next blog posts* in the prompt. But in this case, you can choose the 10
    that best resonate with you or ask for more ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Once you choose one idea, you could prompt part of the post and ask to expand
    on it.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt for it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: You can also use a prompt to ask ChatGPT to write the draft of the post or article.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Maybe your style is more informal. In the following example, you want to write
    about your experiences traveling in Thailand.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: This looks quite good, don’t you agree? You still need to adapt it to your real
    adventure, but the tone is engaging and friendly.
  prefs: []
  type: TYPE_NORMAL
- en: For SEO purposes, you might want to ask for a slug and a meta description.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, using the right prompts can help both generate ideas for the
    blog posts and help draft the post itself, including keywords, meta description,
    and the slug.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will explore some techniques that make content more
    engaging.
  prefs: []
  type: TYPE_NORMAL
- en: Creating engaging content with AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In today’s crowded digital landscape, creating content that genuinely engages
    audiences is more important than ever, yet also more difficult. AI presents opportunities
    to help analyze audience interests and writing patterns to produce more compelling
    narratives.
  prefs: []
  type: TYPE_NORMAL
- en: 'To create truly engaging prompts, consider incorporating the following elements,
    as well as drawing inspiration from the style and voice of great writers:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Relatability**: Craft prompts that resonate with the target audience’s emotions,
    experiences, or challenges. Great writers often create an emotional connection
    with their readers, making their work more engaging.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: J.K. Rowling, Maya Angelou, Chimamanda Ngozi Adichie.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Open-endedness**: Ensure the prompts encourage diverse interpretations and
    responses, allowing the reader to explore their creativity and ideas without feeling
    limited or restricted.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Ernest Hemingway, Haruki Murakami, Virginia Woolf.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Evocative language**: Use vivid and descriptive language to spark the reader’s
    imagination and create a strong mental image of the topic or situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: F. Scott Fitzgerald, Toni Morrison, Gabriel García Márquez.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Strong hooks**: Start the prompt with a catchy statement or intriguing question
    that instantly captures the reader’s attention and makes them want to dive in.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: George Orwell, Jane Austen, Ray Bradbury.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Sense of curiosity**: Inspire the reader to learn something new, explore
    an unfamiliar topic, or dive deeper into a specific subject matter by encouraging
    their curiosity and sparking their interest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Isaac Asimov, Arthur C. Clarke, Mary Roach.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Personal reflection**: Encourage introspection by asking readers to examine
    their own experiences, thoughts, or emotions, leading to more authentic and engaging
    content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Sylvia Plath, Anne Lamott, Joan Didion.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Escapism**: Provide prompts that allow readers to escape from their everyday
    lives by delving into fantastical or unfamiliar worlds, or exploring scenarios
    they may not encounter in their regular experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: J.R.R. Tolkien, Lewis Carroll, Neil Gaiman.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Cultural relevance**: Tap into current events, popular trends, or societal
    issues to create content that feels timely, relevant, and reflective of the readers’
    context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Margaret Atwood, Ta-Nehisi Coates, Zadie Smith.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Provocative statements or questions**: Use controversial or thought-provoking
    themes in your prompts to stimulate debate, challenge readers’ beliefs, or push
    them to re-evaluate their perspective on a topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Aldous Huxley, George Bernard Shaw, Simone de Beauvoir.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Humor and wit**: Inject playfulness, sarcasm, or humor into your prompts
    to create a relaxed atmosphere and allow readers to approach the content with
    a sense of enjoyment and lightheartedness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspiration**: Oscar Wilde, Dorothy Parker, David Sedaris.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: By incorporating these elements into your prompts and emulating the styles and
    voices of these renowned writers, you can create engaging content that captivates,
    challenges, and entertains your readers, all while inspiring meaningful discussions
    and creative responses.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s use ChatGPT to suggest some topic ideas in one of these styles.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s ask ChatGPT to write a piece about *The Secret Door - A Hidden World
    in* *Your Neighborhood*.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Again, you can instruct ChatGPT to edit the resulting text as you see fit, making
    the language simpler, more witty, more casual, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will cover how to make the content more personalized
    to an individual or organization.
  prefs: []
  type: TYPE_NORMAL
- en: How to use AI for personalized messaging
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It’s quite common for organizations to send personalized messages to many people.
    Some of these cases include sending cold emails or LinkedIn messages and sending
    thank you cards after attending an event.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, we could use some of the writing formulas that we covered at the
    beginning of this chapter such as AISA, FOMO, or SMILE. Please use them to craft
    a cold email. Experiment and see what works best for you.
  prefs: []
  type: TYPE_NORMAL
- en: For now, we will introduce a new way to pass variables to accomplish the same.
    One common problem when sending cold messages is that most of them are too salesly.
    Remember, in general, people love to buy, but they hate to be sold. Thus, the
    goal is to have ChatGPT help you write compelling cold messages providing real
    value to help establish relationships with potential clients.
  prefs: []
  type: TYPE_NORMAL
- en: So, here’s a customized prompt for it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see what the response would be.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: Notice how the variables were introduced. This allows us to use the same conversation
    to produce similar content to highlight other problems and solutions, change the
    target person/company, and more.
  prefs: []
  type: TYPE_NORMAL
- en: However, there are a couple of things that could be better. First, even though
    it is common practice to include a paragraph as the first one (*I hope this email
    finds you well. My name is [Your Name], and…*), it seems fake; people don’t really
    care. Second, it’s too formal. Lastly, the idea here is not to sell, so there
    shouldn’t be a paragraph about our offering *DataInsights*. Since the call to
    action leads the reader to the article describing in detail both solutions, there
    is an opportunity there to talk about our solution, once we are gaining their
    trust.
  prefs: []
  type: TYPE_NORMAL
- en: To fix the first two issues, let’s continue the conversation. The last one is
    up to you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Much better, don’t you think?
  prefs: []
  type: TYPE_NORMAL
- en: However, the subject lines are not catchy enough. If the recipients are not
    tempted to read the emails, it will not matter whether we are providing real value
    to them or not.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s explore how we can get better subject lines.
  prefs: []
  type: TYPE_NORMAL
- en: Now, here's the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: If you want, you can get more options.
  prefs: []
  type: TYPE_NORMAL
- en: For that, we can use the following prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: Much better.
  prefs: []
  type: TYPE_NORMAL
- en: To finish this chapter, we will learn how to create tailored content with an
    LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Creating tailored content with AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Earlier, we covered how to copy the style of a famous author. But suppose you
    want to use ChatGPT to produce content in your voice, using your style or maybe
    some other person’s style that you like, but they are not famous enough so that
    ChatGPT knows their style.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, you can give ChatGPT some examples of your style or that other
    person.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, we are going to copy the voice of Seth Godin. He is a recognized
    American author who writes about marketing, but we can assume he is not famous.
    We will copy some short articles from his blog at [https://seths.blog/](https://seths.blog/).
  prefs: []
  type: TYPE_NORMAL
- en: So, here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: Now that you are equipped with some titles, you can write a prompt asking the
    LLM to write a post related to that topic in the style of the person that you
    want to emulate – in this case, Seth Godin.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: As we’ve explored, AI text generation models open up new possibilities to augment
    human creativity and workflows for producing all types of marketing, journalistic,
    and engagement-focused content.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we covered many typical cases of content that you can brainstorm
    and create with ChatGPT and similar tools. You learned about powerful techniques
    to create social media posts, produce engaging sales copy, write video scripts,
    and make other types of content more engaging and persuasive. Now, it’s up to
    you to practice and get better and write effective prompts. Remember, don’t be
    afraid to experiment. In the end, that’s the key to great prompting.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some of the key lessons that were learned in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: AI can help ideate, outline, and draft initial versions of content, but human
    refinement is still essential. The goal is augmenting, not replacing, human creativity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Different mediums lend themselves to different levels of reliance on AI. Short-form
    posts may utilize more automation than long-form articles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Striking the right balance between AI assistance and human intent/editing is
    crucial for quality and authentic audience engagement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While capabilities are advancing rapidly, current AI still lacks true comprehension
    and intent. Judicious human guidance is needed to craft strategic narratives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI excels at synthesizing data/info to generate rough initial drafts that humans
    can then customize for their brand voice and goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For businesses, experimenting with AI content generation in a pilot phase is
    recommended to determine ideal workflows before wide-scale implementation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, AI writing tools show immense promise to complement human creativity,
    productivity, and insight in developing engaging, high-quality content.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Just consider this:'
  prefs: []
  type: TYPE_NORMAL
- en: …our ability to do prompt engineering is still developing. …we learn a lot from
    Twitter… prompt engineering should NOT be underestimated… many complex customer
    problems can be solved without fine-tuning the LLM model…
  prefs: []
  type: TYPE_NORMAL
- en: '- Angela Jiang, Product Manager, OpenAI'
  prefs: []
  type: TYPE_NORMAL
- en: Even OpenAI is learning prompt engineering techniques from the community at
    large.
  prefs: []
  type: TYPE_NORMAL
- en: Think about it.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will explore some practical applications using LLMs,
    including going through a complete example of creating and promoting a podcast
    from start to finish. You will learn practical skills such as conducting research
    to prepare customized interview questions tailored to high-profile versus everyday
    guests. We’ll also leverage AI tools to efficiently generate promotional materials
    for the podcast. Additionally, you will learn how to apply similar question preparation
    techniques to ace job interviews, whether you are the interviewer or the candidate.
  prefs: []
  type: TYPE_NORMAL
- en: Part 2:Basic Prompt Engineering Techniques
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Part 2* provides you with an essential toolkit of prompt engineering techniques
    that enable a wide range of practical applications. [*Chapter 3*](B21161_03.xhtml#_idTextAnchor052)
    demonstrates leveraging AI to conduct research and prepare customized questions
    to deliver compelling podcast episodes and ace job interviews. You will learn
    strategies to promote podcast content using AI summarization and soundbite generation.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](B21161_04.xhtml#_idTextAnchor066) guides you through utilizing
    large language models to unlock new frontiers of imagination for fiction writing
    and poetry. Proven techniques to develop characters, settings, and plotlines and
    refine AI-generated drafts are covered. [*Chapter 5*](B21161_05.xhtml#_idTextAnchor085)
    shifts to more functional applications – sentiment analysis for understanding
    emotions in text, data classification for organizing information, data cleaning
    for improving data quality, and pattern matching for extracting structured data
    from unstructured sources.'
  prefs: []
  type: TYPE_NORMAL
- en: Together, these chapters equip you with fundamental prompt engineering skills
    to classify text by sentiment, categorize information, resolve dataset issues,
    match patterns, and extract insights more efficiently than ever before. With the
    techniques covered in *Part 2*, you can tap the power of AI across diverse domains,
    paving the way for more advanced applications in subsequent chapters.
  prefs: []
