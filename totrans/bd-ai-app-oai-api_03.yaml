- en: <st c="7493">In the next section, we will modify the</st> `<st c="7534">index()</st>`
    <st c="7541">function in the backend of the Code Bug Fixer application to ensure
    that it can distinguish between</st> `<st c="7642">GET</st>` <st c="7645">and</st>
    `<st c="7650">POST</st>` <st c="7654">requests.</st> <st c="7665">We will also
    use the OpenAI GPT-3.5 API to generate explanations and fixed code for the user’s
    input, which</st> <st c="7772">we will then pass to the</st> `<st c="7798">index.html</st>`
    <st c="7808">template using the</st> `<st c="7828">render_template</st>` <st c="7843">function.</st>
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7493">在下一节中，我们将修改Code Bug Fixer应用程序后端的</st> `<st c="7534">index()</st>`
    <st c="7541">函数，以确保它可以区分</st> `<st c="7642">GET</st>` <st c="7645">和</st> `<st
    c="7650">POST</st>` <st c="7654">请求。</st> <st c="7665">我们还将使用OpenAI GPT-3.5 API为用户的输入生成解释和修复后的代码，然后我们将使用</st>
    `<st c="7828">render_template</st>` <st c="7843">函数将这些内容传递给</st> `<st c="7798">index.html</st>`
    <st c="7808">模板。</st>
- en: <st c="7853">Implementing the Code Bug Fixer backend</st>
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="7853">实现Code Bug Fixer后端</st>
- en: <st c="7893">The backend of the Code Bug Fixer application</st> <st c="7940">should
    ensure that we properly send our buggy code to ChatGPT and, on the other side,
    receive the correct response.</st> <st c="8056">For this reason, you need to make
    sure that the</st> `<st c="8104">index()</st>` <st c="8111">function is able to
    clearly distinguish between</st> `<st c="8160">GET</st>` <st c="8163">and</st>
    `<st c="8168">POST</st>` <st c="8172">requests.</st> <st c="8183">You can add
    the following modification to the</st> `<st c="8229">index()</st>` <st c="8236">function
    to</st> <st c="8249">achieve that:</st>
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7893">代码错误修复应用程序的后端</st> `<st c="7940">应确保我们正确地将有错误的代码发送到ChatGPT，并在另一端接收正确的响应。</st>
    `<st c="8056">因此，您需要确保</st> `<st c="8104">index()</st>` `<st c="8111">函数能够清楚地区分</st>
    `<st c="8160">GET</st>` `<st c="8163">和</st>` `<st c="8168">POST</st>` `<st c="8172">请求。</st>
    `<st c="8183">您可以在</st> `<st c="8229">index()</st>` `<st c="8236">函数中添加以下修改来实现这一点：</st>
- en: '[PRE4]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: <st c="8533">This function</st> <st c="8548">checks the HTTP request method
    – whether it is a</st> `<st c="8597">GET</st>` <st c="8600">or</st> `<st c="8604">POST</st>`
    <st c="8608">request.</st> <st c="8618">If the request method is</st> `<st c="8643">POST</st>`<st
    c="8647">, it means that the user has submitted a form from the</st> `<st c="8702">index.html</st>`
    <st c="8712">template.</st> <st c="8723">In that way, you can make sure that the
    ChatGPT API is invoked only after the user has submitted the form and clicked
    on the</st> **<st c="8848">Code Fix</st>** <st c="8856">button, which we will
    construct in the</st> <st c="8896">upcoming section.</st>
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="8533">此函数</st> `<st c="8548">检查HTTP请求方法——是</st> `<st c="8597">GET</st>`
    `<st c="8600">还是</st>` `<st c="8604">POST</st>` `<st c="8608">请求。</st> `<st c="8618">如果请求方法是</st>
    `<st c="8643">POST</st>` `<st c="8647">，这意味着用户已从</st> `<st c="8702">index.html</st>`
    `<st c="8712">模板中提交了表单。</st> `<st c="8723">这样，你可以确保只有在用户提交表单并点击了</st> **<st c="8848">代码修复</st>**
    `<st c="8856">按钮后，ChatGPT API才会被调用，我们将在下一节中构建该按钮。</st>
- en: <st c="8913">The function then retrieves the user’s input in the</st> `<st c="9037">code</st>`
    <st c="9041">and</st> `<st c="9046">error</st>` <st c="9051">variables, respectively.</st>
    <st c="9077">Those variables will hold the code that the user wants to fix and
    the error code received.</st> <st c="9168">The extracted</st> `<st c="9182">code</st>`
    <st c="9186">and</st> `<st c="9191">error</st>` <st c="9196">variables are then
    used to create a prompt that is passed to the OpenAI ChatGPT API.</st> <st c="9282">Those
    variables are</st> <st c="9302">formatted using</st> **<st c="9318">f-strings</st>**
    <st c="9327">in Python.</st>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="8913">函数随后从</st> `<st c="9037">代码</st>` `<st c="9041">和</st>` `<st c="9046">错误</st>`
    `<st c="9051">变量中分别检索用户的输入。</st> `<st c="9077">这些变量将保存用户想要修复的代码和接收到的错误代码。</st>
    `<st c="9168">然后使用提取的</st> `<st c="9182">代码</st>` `<st c="9186">和</st>` `<st c="9191">错误</st>`
    `<st c="9196">变量来创建一个传递给OpenAI ChatGPT API的提示。</st> `<st c="9282">这些变量使用Python中的</st>
    **<st c="9318">f-strings</st>** `<st c="9327">进行格式化。</st>
- en: <st c="9338">For instance, let’s say the</st> `<st c="9367">code</st>` <st c="9371">and</st>
    `<st c="9376">error</st>` <st c="9381">variables take the</st> <st c="9401">following
    values:</st>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9338">例如，假设</st> `<st c="9367">代码</st>` `<st c="9371">和</st>` `<st c="9376">错误</st>`
    `<st c="9381">变量具有以下值：</st>
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: <st c="9475">In this case, our prompt will be displayed</st> <st c="9519">as
    follows:</st>
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9475">在这种情况下，我们的提示将显示如下：</st>
- en: '[PRE6]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: <st c="9705">The</st> `<st c="9710">prompt</st>` <st c="9716">variable provides
    a clear and specific task for the ChatGPT model to perform and ensure that the
    output generated by the</st> <st c="9838">model will be relevant to the</st> <st
    c="9868">user’s input.</st>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9705">`<st c="9710">提示</st>` `<st c="9716">变量为ChatGPT模型提供了一个明确和具体的任务，并确保模型生成的输出与</st>
    `<st c="9838">用户输入</st>` `<st c="9868">相关。</st>
- en: <st c="9881">You can set the</st> `<st c="9898">gpt-3.5-turbo</st>` <st c="9911">string
    value to the</st> `<st c="9932">model_engine</st>` <st c="9944">variable.</st>
    <st c="9955">This variable is later used to specify the OpenAI language model
    to be used for both text completions.</st> <st c="10058">In this case,</st> `<st
    c="10072">gpt-3.5-turbo</st>` <st c="10085">is one of the most capable and versatile
    models provided</st> <st c="10143">by OpenAI.</st>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9881">您可以将</st> `<st c="9898">gpt-3.5-turbo</st>` `<st c="9911">字符串值设置为</st>
    `<st c="9932">model_engine</st>` `<st c="9944">变量。</st> `<st c="9955">此变量随后用于指定用于文本补全的OpenAI语言模型。</st>
    `<st c="10058">在这种情况下，</st> `<st c="10072">gpt-3.5-turbo</st>` `<st c="10085">是OpenAI提供的功能最强大和最通用的模型之一。</st>
- en: <st c="10153">Inside the</st> `<st c="10165">if</st>` <st c="10167">statement,
    you call now call the ChatGPT API to construct both</st> `<st c="10231">explanation_completion</st>`
    <st c="10253">and</st> `<st c="10258">fixed_code_completion</st>` <st c="10279">for</st>
    <st c="10284">the user:</st>
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="10153">在</st>` `<st c="10165">if</st>` `<st c="10167">语句中，你现在可以调用ChatGPT
    API来为用户构建</st>` `<st c="10231">explanation_completion</st>` `<st c="10253">和</st>`
    `<st c="10258">fixed_code_completion</st>` `<st c="10279">：</st>`'
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: <st c="10914">The preceding code makes use of the ChatGPT API to</st> <st c="10965">generate
    completions based on a given prompt.</st> <st c="11012">The</st> `<st c="11016">client.chat.completions.create()</st>`
    <st c="11048">function is called twice in this code snippet to generate two different
    completions:</st> `<st c="11134">explanation_completions</st>` <st c="11157">and</st>
    `<st c="11162">fixed_code_completions</st>`<st c="11184">.</st>
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="10914">前面的代码利用ChatGPT API</st>` `<st c="10965">根据给定的提示生成补全内容。</st>`
    `<st c="11012">在这段代码中，</st>` `<st c="11016">client.chat.completions.create()</st>`
    `<st c="11048">函数被调用两次，以生成两个不同的补全内容：</st>` `<st c="11134">explanation_completions</st>`
    `<st c="11157">和</st>` `<st c="11162">fixed_code_completions</st>` `<st c="11184">。</st>`'
- en: <st c="11185">After the</st> `<st c="11196">client.chat.completions.create()</st>`
    <st c="11228">function is called twice, the</st> `<st c="11259">explanation</st>`
    <st c="11270">and</st> `<st c="11275">fixed_code</st>` <st c="11285">variables
    are assigned the generated text from the choices attribute of the two objects,
    respectively.</st> <st c="11389">These generated texts will be used in the next
    steps of the code to display the explanations and fixed code to</st> <st c="11500">the
    user.</st>
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="11185">在调用</st>` `<st c="11196">client.chat.completions.create()</st>`
    `<st c="11228">函数两次后，</st>` `<st c="11259">解释</st>` `<st c="11270">和</st>` `<st
    c="11275">fixed_code</st>` `<st c="11285">变量分别被分配给两个对象的choices属性中生成的文本。</st>`
    `<st c="11389">这些生成的文本将在代码的下一步中使用，以向用户显示解释和修复代码。</st>`'
- en: <st c="11509">Finally, you can use the</st> `<st c="11535">render_template</st>`
    <st c="11550">function to update an HTML template with the</st> <st c="11596">ChatGPT
    response:</st>
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你可以使用`<st c="11509">render_template</st>` `<st c="11535">函数来更新一个HTML模板，并使用</st>
    `<st c="11596">ChatGPT响应</st>`：
- en: '[PRE8]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '<st c="11772">The function takes two parameters: the first is the name of the
    template to render, and the second is a dictionary of variables that will be used
    in the template.</st> <st c="11936">The variables passed to the template are</st>
    `<st c="11977">explanation</st>` <st c="11988">and</st> `<st c="11993">fixed_code</st>`<st
    c="12003">.</st> `<st c="12005">explanation</st>` <st c="12016">is the text generated
    by the ChatGPT API that explains the error in the user’s code.</st> `<st c="12102">fixed_code</st>`
    <st c="12112">is the text generated by the ChatGPT API that represents the fixed
    version of the</st> <st c="12195">user’s code.</st>'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="11772">该函数接受两个参数：第一个是要渲染的模板名称，第二个是将在模板中使用的变量字典。</st> `<st c="11936">传递给模板的变量是</st>`
    `<st c="11977">解释</st>` `<st c="11988">和</st>` `<st c="11993">fixed_code</st>`
    `<st c="12003">。</st>` `<st c="12005">解释</st>` `<st c="12016">是ChatGPT API生成的文本，用于解释用户代码中的错误。</st>`
    `<st c="12102">fixed_code</st>` `<st c="12112">是ChatGPT API生成的文本，表示用户代码的修复版本。</st>`'
- en: <st c="12207">The variables are</st> <st c="12226">passed to the</st> `<st c="12240">index.html</st>`
    <st c="12250">template so that they can be displayed to the user.</st> <st c="12303">The
    template will use these variables to dynamically update the page content with
    the explanation and fixed code generated by</st> <st c="12429">the API.</st>
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="12207">这些变量被传递到</st>` `<st c="12226">index.html</st>` `<st c="12240">模板中，以便它们可以显示给用户。</st>`
    `<st c="12303">模板将使用这些变量来动态更新页面内容，显示由API生成的解释和修复代码。</st>`'
- en: <st c="12437">After executing your Flask application, no error should be displayed.</st>
    <st c="12508">Nevertheless, your browser would show a completely blank screen
    since our</st> `<st c="12582">index.html</st>` <st c="12592">file is empty.</st>
    <st c="12608">Our next task is to create that file, and this will be discussed
    in the</st> <st c="12680">following section.</st>
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="12437">执行你的Flask应用程序后，不应显示任何错误。</st>` `<st c="12508">然而，你的浏览器会显示一个完全空白的屏幕，因为我们的</st>`
    `<st c="12582">index.html</st>` `<st c="12592">文件是空的。</st>` `<st c="12608">我们的下一个任务是创建该文件，这将在下一节中讨论。</st>`'
- en: <st c="12698">This is how you can modify the</st> `<st c="12730">index()</st>`
    <st c="12737">function to ensure that the ChatGPT API is only invoked after the
    user has submitted the form and clicked on the</st> `<st c="13037">render_template</st>`
    <st c="13052">function.</st>
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="12698">这就是如何修改</st> `<st c="12730">index()</st>` <st c="12737">函数以确保在用户提交表单并点击</st>
    `<st c="13037">render_template</st>` <st c="13052">函数之后才调用 ChatGPT API。</st>
- en: <st c="13062">In the next section, you will learn how to create an</st> `<st
    c="13116">index.html</st>` <st c="13126">file and construct the</st> **<st c="13150">Code
    Fix</st>** <st c="13158">button that allows users to submit their code for debugging.</st>
    <st c="13220">You will also learn how to use JavaScript and AJAX to handle the
    form submission and display the response from the Flask application without reloading</st>
    <st c="13371">the page.</st>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="13062">在下一节中，您将学习如何创建一个</st> `<st c="13116">index.html</st>` <st c="13126">文件并构建一个</st>
    **<st c="13150">代码修复</st>** <st c="13158">按钮，允许用户提交他们的代码进行调试。</st> <st c="13220">您还将学习如何使用
    JavaScript 和 AJAX 处理表单提交并在不重新加载</st> <st c="13371">页面的情况下显示 Flask 应用程序的响应。</st>
- en: <st c="13380">Using text areas and containers</st>
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="13380">使用文本区域和容器</st>
- en: <st c="13412">In this section, you will learn how to create a simple user</st>
    <st c="13472">interface for your</st> `<st c="13492">CodeBugFixer</st>` <st c="13504">application
    using HTML and CSS.</st> <st c="13537">We will walk through the process of designing
    a simple form for users to input their code and error message and display the
    results of the ChatGPT API call.</st> <st c="13694">By the end of this section,
    you will have a fully functional web application that can help users fix errors
    in</st> <st c="13805">their code.</st>
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="13412">在本节中，您将学习如何使用 HTML 和 CSS 为您的</st> `<st c="13492">CodeBugFixer</st>`
    <st c="13504">应用程序创建一个简单的用户</st> <st c="13537">界面。</st> <st c="13537">我们将逐步讲解为用户设计一个简单表单的过程，以便他们输入代码和错误信息，并显示
    ChatGPT API 调用的结果。</st> <st c="13694">在本节结束时，您将拥有一个功能齐全的 Web 应用程序，可以帮助用户修复他们代码中的错误。</st>
- en: <st c="13816">To modify the</st> `<st c="13831">index.html</st>` <st c="13841">file,
    first, you need to open the file located in the</st> `<st c="13896">templates</st>`
    <st c="13905">folder of your project.</st> <st c="13930">You can open this file
    in any text editor, or you can use the built-in HTML editor in VSCode.</st> <st
    c="14024">Once you have the file open, add the following basic</st> <st c="14077">HTML
    structure:</st>
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="13816">要修改</st> `<st c="13831">index.html</st>` <st c="13841">文件，首先，您需要打开位于您项目</st>
    `<st c="13896">templates</st>` <st c="13905">文件夹中的文件。</st> <st c="13930">您可以在任何文本编辑器中打开此文件，或者您可以使用
    VSCode 内置的 HTML 编辑器。</st> <st c="14024">一旦文件打开，添加以下基本的</st> <st c="14077">HTML
    结构：</st>
- en: '[PRE9]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: <st c="14258">The</st> `<st c="14263"><title></st>` <st c="14270">tag sets the
    title of the HTML page to</st> `<st c="14310">Code Bug Fixer</st>`<st c="14324">.
    This is the text that will appear on the browser tab when the page is loaded.</st>
    <st c="14404">It is</st> <st c="14410">also used by search engines to display
    the title of the page in</st> <st c="14474">search results.</st>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14258">The</st> `<st c="14263"><title></st>` <st c="14270">标签将 HTML 页面的标题设置为</st>
    `<st c="14310">代码错误修复器</st>`<st c="14324">。这是当页面加载时将在浏览器标签上显示的文本。</st> <st c="14404">它还被搜索引擎用于在</st>
    <st c="14410">搜索结果中显示页面的标题。</st>
- en: <st c="14489">Then, you can use the</st> `<st c="14512"><h1></st>` <st c="14516">tag
    to create a header on the web page with the text</st> **<st c="14570">Code Bug
    Fixer</st>** <st c="14584">in</st> <st c="14588">large font.</st>
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14489">然后，您可以使用</st> `<st c="14512"><h1></st>` <st c="14516">标签在网页上创建一个包含文本</st>
    **<st c="14570">代码错误修复器</st>** <st c="14584">的标题，并使用大字体。</st>
- en: <st c="14599">Next, we will add an input form to our</st> `<st c="14639">index.html</st>`
    <st c="14649">file.</st> <st c="14656">This form will allow the user to input
    their code and the corresponding error message, and then hit the</st> `<st c="14894"><</st>``<st
    c="14895">div></st>` <st c="14899">tag:</st>
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14599">接下来，我们将向我们的</st> `<st c="14639">index.html</st>` <st c="14649">文件中添加一个输入表单。</st>
    <st c="14656">此表单将允许用户输入他们的代码和相应的错误信息，然后点击</st> `<st c="14894"><</st>``<st c="14895">div></st>`
    <st c="14899">标签：</st>
- en: '[PRE10]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: <st c="15498">The form is</st> <st c="15511">enclosed in HTML</st> `<st c="15528"><form></st>`
    <st c="15534">tags, with the</st> `<st c="15550">action</st>` <st c="15556">attribute
    set to</st> `<st c="15574">"/"</st>` <st c="15577">and the</st> `<st c="15586">method</st>`
    <st c="15592">attribute set to</st> `<st c="15610">post</st>`<st c="15614">. This
    means that when the user submits the form, the data will be sent to the server
    at the root URL</st> `<st c="15716">("/")</st>` <st c="15721">using the HTTP</st>
    `<st c="15737">POST</st>` <st c="15741">method.</st> <st c="15750">This refers
    to our</st> `<st c="15769">index()</st>` <st c="15776">function in the</st> `<st
    c="15793">app.py</st>` <st c="15799">file.</st>
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15498">表单被</st> <st c="15511">HTML</st> `<st c="15528"><form></st>` <st
    c="15534">标签包围，其中</st> `<st c="15550">action</st>` <st c="15556">属性设置为</st> `<st
    c="15574">"/"</st>` <st c="15577">，而</st> `<st c="15586">method</st>` <st c="15592">属性设置为</st>
    `<st c="15610">post</st>`<st c="15614">。这意味着当用户提交表单时，数据将通过HTTP</st> `<st c="15737">POST</st>`
    <st c="15741">方法发送到根URL</st> `<st c="15716">("/")</st>` <st c="15721">。</st> <st
    c="15750">这指的是我们</st> `<st c="15769">index()</st>` <st c="15776">函数在</st> `<st
    c="15793">app.py</st>` <st c="15799">文件中的实现。</st>
- en: <st c="15805">Inside the form, we have two text areas with the</st> `<st c="15855">name</st>`
    <st c="15859">attributes set to</st> `<st c="15878">code</st>` <st c="15882">and</st>
    `<st c="15887">error</st>`<st c="15892">, respectively.</st> <st c="15908">These
    will allow the user to input their code and</st> <st c="15958">error message.</st>
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15805">在表单内部，我们有两个文本区域，其</st> `<st c="15855">name</st>` <st c="15859">属性分别设置为</st>
    `<st c="15878">code</st>` <st c="15882">和</st> `<st c="15887">error</st>`<st c="15892">。</st>
    <st c="15908">这将允许用户输入他们的代码和</st> <st c="15958">错误信息。</st>
- en: <st c="15972">The form also contains a</st> `<st c="15998">submit</st>` <st
    c="16004">button with the</st> `<st c="16021">submit-button</st>` <st c="16034">class.</st>
    <st c="16042">When the user clicks this button, the form will be submitted and
    the data will be sent to the</st> <st c="16136">backend server.</st>
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15972">表单还包含一个</st> `<st c="15998">submit</st>` <st c="16004">按钮，带有</st>
    `<st c="16021">submit-button</st>` <st c="16034">类。</st> <st c="16042">当用户点击此按钮时，表单将被提交，数据将被发送到</st>
    <st c="16136">后端服务器。</st>
- en: <st c="16151">The form is</st> <st c="16164">divided into two columns using
    a</st> `<st c="16197"><div></st>` <st c="16202">tag with the</st> `<st c="16216">container</st>`
    <st c="16225">class.</st> <st c="16233">The left column contains the code and
    error message text areas, while the right column contains the fixed code and explanation</st>
    <st c="16360">text areas.</st>
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16151">表单</st> <st c="16164">分为两列，使用</st> `<st c="16197"><div></st>`
    <st c="16202">标签，并带有</st> `<st c="16216">container</st>` <st c="16225">类。</st>
    <st c="16233">左侧列包含代码和错误信息文本区域，而右侧列包含固定的代码和解释</st> <st c="16360">文本区域。</st>
- en: <st c="16371">The fixed code and explanation text areas have the</st> `<st c="16423">name</st>`
    <st c="16427">attributes set to</st> `<st c="16446">fixed-code</st>` <st c="16456">and</st>
    `<st c="16461">explanation</st>`<st c="16472">, respectively.</st> <st c="16488">They
    are also set to</st> `<st c="16509">readonly</st>`<st c="16517">, so the user
    cannot modify their content.</st> <st c="16560">These text areas will be updated
    with the fixed code and explanation generated by the ChatGPT API after the user
    submits</st> <st c="16681">the form.</st>
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16371">固定的代码和解释文本区域将</st> `<st c="16423">name</st>` <st c="16427">属性设置为</st>
    `<st c="16446">fixed-code</st>` <st c="16456">和</st> `<st c="16461">explanation</st>`<st
    c="16472">，分别。</st> <st c="16488">它们也被设置为</st> `<st c="16509">readonly</st>`<st
    c="16517">，因此用户无法修改其内容。</st> <st c="16560">这些文本区域将在用户提交</st> <st c="16681">表单后，由ChatGPT
    API生成的固定代码和解释进行更新。</st>
- en: <st c="16690">Now that you have added the necessary HTML code for the</st> `<st
    c="16747">index</st>` <st c="16752">page, let’s run the Flask app and see how
    it looks in the browser.</st> <st c="16820">When you run the Flask app, you should
    see a page with a header that says</st> **<st c="16894">Code Bug Fixer</st>**
    <st c="16908">and a form with two text areas to enter your code and the error
    message.</st> <st c="16982">There is also a submit button labeled</st> **<st c="17020">Code
    Fix</st>**<st c="17028">. On the right side of the form, you will see two more
    text areas that will display the fixed code and the explanation.</st> <st c="17148">However,
    these text areas will be initially empty until the user enters the code and error
    message and clicks the</st> **<st c="17262">Code Fix</st>** <st c="17270">button
    (see</st> *<st c="17283">Figure 3</st>**<st c="17291">.3</st>*<st c="17293">).</st>
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16690">现在你已经添加了<st c="16747">index</st> <st c="16752">页面的必要 HTML 代码，让我们运行
    Flask 应用程序并查看它在浏览器中的外观。</st> <st c="16820">当你运行 Flask 应用程序时，你应该会看到一个带有标题的页面，标题为**<st
    c="16894">Code Bug Fixer</st>** <st c="16908">，以及一个包含两个文本区域以输入你的代码和错误信息的表单。</st>
    <st c="16982">还有一个标记为**<st c="17020">Code Fix</st>**<st c="17028">的提交按钮。</st>
    <st c="17148">在表单的右侧，你将看到另外两个文本区域，它们将显示修复后的代码和说明。</st> <st c="17148">然而，这些文本区域最初将是空的，直到用户输入代码和错误信息并点击**<st
    c="17262">Code Fix</st>** <st c="17270">按钮（见<st c="17283">图 3</st>**<st c="17291">.3</st>**<st
    c="17293">）。</st>
- en: <st c="17296">Currently, the app’s appearance might not be visually appealing
    since we have not incorporated any styling into</st> <st c="17409">the HTML.</st>
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17296">目前，由于我们没有将任何样式添加到 HTML 中，应用程序的外观可能不够吸引人。</st>
- en: '![Figure 3.3 – HTML-based frontend of the Code Bug Fixer app](img/B22414_03_3.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.3 – 基于HTML的 Code Bug Fixer 应用前端](img/B22414_03_3.jpg)'
- en: <st c="17489">Figure 3.3 – HTML-based frontend of the Code Bug Fixer app</st>
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17489">图 3.3 – 基于HTML的 Code Bug Fixer 应用前端</st>
- en: <st c="17547">Finally, we will add some CSS to our application to style the
    HTML elements.</st> <st c="17625">The CSS code will define the fonts, colors,
    sizes, and positions of the elements on the page.</st> <st c="17719">We will add
    CSS code to our</st> `<st c="17747">index.html</st>` <st c="17757">file to enhance
    the look and feel of our application.</st> <st c="17812">With these styling improvements,
    our app will become more visually appealing and easier to use for</st> <st c="17911">our
    users.</st>
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将向我们的应用程序添加一些 CSS 来样式化 HTML 元素。<st c="17547">CSS 代码将定义页面中元素的字体、颜色、大小和位置。</st>
    <st c="17625">我们将向我们的<st c="17747">index.html</st> <st c="17757">文件中添加 CSS 代码，以增强应用程序的外观和感觉。</st>
    <st c="17812">通过这些样式改进，我们的应用程序将更具视觉吸引力，并且更容易为<st c="17911">我们的用户使用。</st>
- en: <st c="17921">You can add your CSS code under the</st> `<st c="17958">title</st>`
    <st c="17963">tag inside the</st> `<st c="17979">head</st>` <st c="17983">of the</st>
    `<st c="17991">index.html</st>` <st c="18001">file:</st>
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在<st c="17921">`<st c="17958">title</st>` <st c="17963">标签内</st> `<st c="17979">head</st>`
    <st c="17983">的</st> `<st c="17991">index.html</st>` <st c="18001">文件中添加你的 CSS
    代码：</st>
- en: '[PRE11]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: <st c="18128">Firstly, let’s</st> <st c="18144">open the CSS style block.</st>
    <st c="18170">It indicates that the following code is CSS and will be applied
    to the HTML elements in the</st> <st c="18262">web page.</st>
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们<st c="18128">打开 CSS 样式块。</st> <st c="18144">它表示以下代码是 CSS，并将应用于网页中的 HTML
    元素。</st> <st c="18170"></st>
- en: <st c="18271">The CSS code targets a</st> `<st c="18295"><body></st>` <st c="18301">element
    in the HTML.</st> <st c="18323">In CSS, you can target elements using their tag
    name, class name, or ID.</st> <st c="18396">Here, we are targeting the entire
    body of the</st> <st c="18442">web page.</st>
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="18271">CSS 代码针对 HTML 中的<st c="18295"><body></st> <st c="18301">元素。</st>
    <st c="18323">在 CSS 中，你可以使用它们的标签名、类名或 ID 来定位元素。</st> <st c="18396">在这里，我们正在定位整个网页的
    body。</st>
- en: <st c="18451">Here, we can also set</st> `<st c="18474">font-family</st>` <st
    c="18485">to</st> `<st c="18489">Arial sans-serif</st>`<st c="18505">, which means
    that any text inside the</st> `<st c="18544">body</st>` <st c="18548">element
    will be displayed using the Arial font, or a similar sans-serif font if Arial
    is not available.</st> <st c="18653">We can also set the background color of the
    body to a light</st> <st c="18713">grayish-blue color:</st>
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="18451">在这里，我们还可以将<st c="18474">font-family</st> <st c="18485">设置为<st
    c="18489">Arial sans-serif</st> <st c="18505">，这意味着任何在<st c="18544">body</st>
    <st c="18548">元素内的文本都将使用 Arial 字体显示，或者如果 Arial 不可用，则使用类似的 sans-serif 字体。</st>
    <st c="18653">我们还可以将 body 的背景色设置为浅灰色：</st>
- en: '[PRE12]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: <st c="18960">The</st> `<st c="18965">.header</st>` <st c="18972">class</st>
    <st c="18978">specifies the background color, text color, padding, and alignment
    for the header.</st> <st c="19062">Here, the text is centered using the</st> `<st
    c="19099">text-align</st>` <st c="19109">property.</st>
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="18960">`.header` <st c="18965">类</st> <st c="18972">指定了标题的背景颜色、文字颜色、填充和对齐方式。</st>
    <st c="19062">在这里，文本是通过使用</st> `<st c="19099">text-align</st>` <st c="19109">属性来居中的。</st>
- en: <st c="19119">The</st> `<st c="19124">.header h1</st>` <st c="19134">class</st>
    `<st c="19141">font-size</st>` <st c="19150">property is set to</st> `<st c="19170">28</st>`
    <st c="19172">pixels,</st> `<st c="19181">font-weight</st>` <st c="19192">is set
    to</st> `<st c="19203">bold</st>`<st c="19207">, and</st> `<st c="19213">margin</st>`
    <st c="19219">is set to</st> `<st c="19230">0</st>`<st c="19231">, so there is
    no space between the top of the page and</st> <st c="19286">the header.</st>
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="19119">`.header h1` <st c="19124">类</st> <st c="19134">字体大小</st> <st
    c="19141">属性设置为</st> <st c="19170">28</st> <st c="19172">像素，</st> `<st c="19181">字体粗细</st>`
    <st c="19192">设置为</st> `<st c="19203">粗体</st>`<st c="19207">，并且</st> `<st c="19213">边距</st>`
    <st c="19219">设置为</st> `<st c="19230">0</st>`<st c="19231">，因此页面顶部和</st> <st c="19286">标题之间没有空间。</st>
- en: <st c="19297">The</st> `<st c="19302">.container</st>` <st c="19312">class</st>
    `<st c="19319">display</st>` <st c="19326">property is set to</st> `<st c="19346">flex</st>`
    <st c="19350">to allow us to use Flexbox for layout, and</st> `<st c="19394">justify-content</st>`
    <st c="19409">is set to</st> `<st c="19420">space-between</st>` <st c="19433">to
    evenly distribute the contents of the container across the</st> <st c="19496">horizontal
    axis:</st>
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="19297">`.container` <st c="19302">类</st> <st c="19312">的`<st c="19319">display</st>`
    <st c="19326">属性设置为</st> `<st c="19346">flex</st>` <st c="19350">，以便我们可以使用Flexbox进行布局，并且</st>
    `<st c="19394">justify-content</st>` <st c="19409">设置为</st> `<st c="19420">space-between</st>`
    <st c="19433">，以便在水平轴上均匀分布容器的内容：</st>
- en: '[PRE13]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: <st c="19817">Next, let’s design the</st> <st c="19841">two-column layout where
    the left column contains the input fields for the user to enter their code and
    error, while the right column displays the output of</st> <st c="19997">the program.</st>
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="19817">接下来，让我们设计一个</st> <st c="19841">两列布局，其中左侧列包含用户输入代码和错误的输入字段，而右侧列显示</st>
    <st c="19997">程序的输出。</st>
- en: '<st c="20009">The</st> `<st c="20014">.left-column</st>` <st c="20026">and</st>
    `<st c="20031">.right-column</st>` <st c="20044">classes were given a width of</st>
    `<st c="20075">49%</st>` <st c="20078">so that they take up almost an equal amount
    of space on the page.</st> <st c="20145">The</st> `<st c="20149">textarea</st>`
    <st c="20157">elements were styled to have a fixed width of</st> `<st c="20204">100%</st>`
    <st c="20208">and a height of</st> `<st c="20225">200px</st>` <st c="20230">to
    create a clear input field.</st> <st c="20262">The</st> `<st c="20266">resize:
    none</st>` <st c="20278">property ensures that the user cannot resize the</st>
    <st c="20328">input fields.</st>'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '<st c="20009">`.left-column` <st c="20014">和</st> `.right-column` <st c="20026">类被赋予了</st>
    `<st c="20075">49%</st>` <st c="20078">的宽度，以便它们在页面上占据几乎相等的空间。</st> `<st c="20145">textarea`
    <st c="20149">元素被设计为具有固定的宽度为</st> `<st c="20204">100%</st>` <st c="20208">和高度为</st>
    `<st c="20225">200px</st>` <st c="20230">，以创建一个清晰的输入字段。</st> `<st c="20262">resize:
    none</st>` <st c="20278">属性确保用户不能调整</st> <st c="20328">输入字段的大小。</st>'
- en: <st c="20341">The</st> `<st c="20346">.fixed-code</st>` <st c="20357">and</st>
    `<st c="20362">.explanation</st>` <st c="20374">classes were given</st> `<st c="20394">bold</st>`
    <st c="20398">for</st> `<st c="20403">font-weight</st>` <st c="20414">to make
    them stand out from the input fields.</st> <st c="20461">This helps the user to
    quickly identify the</st> <st c="20505">output fields:</st>
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20341">`.fixed-code` <st c="20346">和</st> `.explanation` <st c="20357">类被赋予了`<st
    c="20394">bold</st>` <st c="20398">的`<st c="20403">font-weight</st>` <st c="20414">属性，使它们从输入字段中脱颖而出。</st>
    `<st c="20461">这有助于用户快速识别</st> <st c="20505">输出字段：</st>
- en: '[PRE14]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: <st c="20766">Our final goal is to</st> <st c="20788">make the</st> `<st c="20797">submit</st>`
    <st c="20803">button visually appealing and to give feedback to the user when
    they hover over it.</st> <st c="20888">We set the background color to a dark blue
    color (</st>`<st c="20938">#3b5998</st>`<st c="20946">) and the font color to
    white (</st>`<st c="20978">#ffffff</st>`<st c="20986">) to create contrast.</st>
    <st c="21009">We also added padding and a border radius to make the button more
    noticeable</st> <st c="21086">and attractive.</st>
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="20766">我们的最终目标是</st> <st c="20788">使</st> `<st c="20797">提交</st>` <st
    c="20803">按钮看起来更吸引人，并在用户悬停时向用户提供反馈。</st> <st c="20888">我们将背景颜色设置为深蓝色（</st>`<st
    c="20938">#3b5998</st>`<st c="20946">）并将字体颜色设置为白色（</st>`<st c="20978">#ffffff</st>`<st
    c="20986">）以创建对比。</st> <st c="21009">我们还添加了填充和边框半径，使按钮更引人注目</st> <st c="21086">和吸引人。</st>
- en: <st c="21101">The</st> `<st c="21106">margin-top</st>` <st c="21116">property
    adds some space between the button and the text areas.</st> <st c="21181">Finally,
    we added the</st> `<st c="21203">:hover</st>` <st c="21209">pseudo-class to change
    the background color of the button when the user hovers over it, which provides
    visual feedback to the user that the button</st> <st c="21357">is interactive.</st>
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="21101">`<st c="21106">margin-top</st>` <st c="21116">属性在按钮和文本区域之间添加了一些空间。</st>
    <st c="21181">最后，我们添加了</st> `<st c="21203">:hover</st>` <st c="21209">伪类，当用户悬停时改变按钮的背景颜色，这为用户提供视觉反馈，表明按钮</st>
    <st c="21357">是交互式的。</st>
- en: <st c="21372">You have now completed the</st> `<st c="21400">index.html</st>`
    <st c="21410">file for the</st> `<st c="21424">CodeBugFixer</st>` <st c="21436">application.</st>
    <st c="21450">You can now run the</st> `<st c="21470">app.py</st>` <st c="21476">file
    and test the application to make sure everything is working correctly.</st> <st
    c="21553">In the next section, we will provide some examples of how to use the
    application to fix code bugs.</st> <st c="21652">Alternatively, you can try out
    your own code examples to see how the</st> <st c="21721">app performs.</st>
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="21372">您现在已经完成了</st> `<st c="21400">index.html</st>` <st c="21410">文件，这是</st>
    `<st c="21424">CodeBugFixer</st>` <st c="21436">应用程序的。</st> <st c="21450">现在您可以运行</st>
    `<st c="21470">app.py</st>` <st c="21476">文件并测试应用程序，以确保一切运行正常。</st> <st c="21553">在下一节中，我们将提供一些如何使用应用程序修复代码错误的示例。</st>
    <st c="21652">或者，您也可以尝试自己的代码示例来查看应用程序的表现。</st>
- en: <st c="21734">This is how we can create a user interface for the</st> `<st c="21786">CodeBugFixer</st>`
    <st c="21798">application using HTML and CSS.</st> <st c="21831">We walked through
    designing a form for users to input their code and error message and display the
    results of the ChatGPT</st> <st c="21953">API call.</st>
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="21734">这就是我们如何使用HTML和CSS为</st> `<st c="21786">CodeBugFixer</st>` <st
    c="21798">应用程序创建用户界面。</st> <st c="21831">我们介绍了为用户设计表单的过程，以便他们可以输入代码和错误信息，并显示ChatGPT</st>
    <st c="21953">API调用的结果。</st>
- en: <st c="21962">In the next section, you will learn how to test the</st> `<st
    c="22015">CodeBugFixer</st>` <st c="22027">application by writing test cases and
    verifying that it handles different scenarios correctly.</st> <st c="22123">You
    will also see examples of how the Code Bug Fixer app can fix code written in two
    different programming languages, Java, and Python, and learn how to test the fixed
    code to confirm</st> <st c="22307">its accuracy.</st>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="21962">在下一节中，您将通过编写测试用例并验证它是否正确处理不同的场景来学习如何测试</st> `<st c="22015">CodeBugFixer</st>`
    <st c="22027">应用程序。</st> <st c="22123">您还将看到Code Bug Fixer应用程序如何修复用Java和Python两种不同的编程语言编写的代码的示例，并学习如何测试修复后的代码以确认</st>
    <st c="22307">其准确性。</st>
- en: <st c="22320">Testing the Code Bug Fixer app</st>
  id: totrans-110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="22320">测试代码错误修复应用程序</st>
- en: <st c="22351">Now, we will learn how to test our Code Bug Fixer application.</st>
    <st c="22415">We</st> <st c="22417">will write some test cases to ensure that
    the application is functioning correctly and handling different scenarios appropriately.</st>
    <st c="22549">Testing is a critical part of software development, as it ensures
    that the application works as intended and meets the</st> <st c="22668">user’s
    requirements.</st>
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="22351">现在，我们将学习如何测试我们的代码错误修复应用程序。</st> <st c="22415">我们</st> <st c="22417">将编写一些测试用例以确保应用程序能够正确运行并适当地处理不同的场景。</st>
    <st c="22549">测试是软件开发的一个关键部分，因为它确保应用程序按预期工作并满足</st> <st c="22668">用户的需求。</st>
- en: '<st c="22688">The Code Bug Fixer app can fix any programming language, making
    it a versatile tool.</st> <st c="22774">Therefore, we will demonstrate its effectiveness
    by using examples written in two different programming languages: Java</st> <st
    c="22894">and Python.</st>'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22905">Our Python example has two properties.</st> <st c="22945">Firstly,
    we have the following</st> <st c="22976">buggy code:</st>
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: <st c="23105">Then, you can enter the following error:</st> `<st c="23147">Type
    Error:</st>`
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '<st c="23158">This code is returning an error because it is attempting to concatenate
    a string and an integer in the</st> `<st c="23262">print</st>` <st c="23267">statement.</st>
    <st c="23279">The</st> `<st c="23283">factorial</st>` <st c="23292">function returns
    an integer, but it is being concatenated to the string</st> `<st c="23365">"The
    factorial of 5</st>` `<st c="23385">is: "</st>`<st c="23390">.</st>'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23391">To fix this code in the Code Bug Fixer app, follow</st> <st c="23443">these
    steps:</st>
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23455">Paste the code inside the</st> **<st c="23482">Enter</st>** **<st
    c="23488">Code</st>** <st c="23492">field.</st>
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="23499">Paste the error inside the</st> **<st c="23527">Enter</st>** **<st
    c="23533">Error</st>** <st c="23538">field.</st>
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="23545">Left-click on the</st> **<st c="23564">Code</st>** **<st c="23569">Fix</st>**
    <st c="23572">button.</st>
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="23580">Once you complete the steps listed, the fixed code and the explanation
    generated by the ChatGPT API will be displayed in the corresponding field.</st>
    <st c="23727">As depicted in</st> *<st c="23742">Figure 3</st>**<st c="23750">.4</st>*<st
    c="23752">, the response</st> <st c="23766">from ChatGPT appears in bold font
    and is not editable.</st> <st c="23822">You can also see that the explanation</st>
    <st c="23860">is accurate.</st>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.4 – Code Bug Fixer processing some Python code](img/B22414_03_4.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: <st c="24134">Figure 3.4 – Code Bug Fixer processing some Python code</st>
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24189">To ensure that the fixed code is functioning correctly, you can
    test it by running it in a Python IDE such as VSCode or any other online Python
    compiler.</st> <st c="24344">By examining the explanation provided alongside the
    fixed code, you can confirm that it provides an accurate and detailed explanation
    of</st> <st c="24481">the error.</st>
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24491">Finally, to verify that the Code Bug Fixer app works with any
    programming language, let’s try to fix the following</st> <st c="24607">Java code:</st>
