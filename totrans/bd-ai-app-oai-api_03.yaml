    <st c="5092">file is where the main code for the</st> `<st c="5129">CodeBugFixer</st>`
    <st c="5141">app will be written, and the</st> `<st c="5171">config.py</st>` <st
    c="5180">file will contain any sensitive information such as API keys</st> <st
    c="5242">and passwords.</st>
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="4977">首先，在项目的根目录中创建两个新的Python文件，分别命名为</st> `<st c="5022">app.py</st>`
    <st c="5028">和</st> `<st c="5033">config.py</st>`<st c="5042">。</st> <st c="5082">`<st
    c="5086">app.py</st>` <st c="5092">文件是编写`<st c="5129">CodeBugFixer</st>` <st c="5141">应用程序主要代码的地方，而`<st
