- en: <st c="2">Creating and Deploying a Code Bug-Fixing Application Using Flask</st>
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="2">使用 Flask 创建和部署代码错误修复应用程序</st>
- en: <st c="66">In this chapter, we will dive into the creation and deployment of
    an AI-powered code bug-fixing SaaS application using</st> **<st c="186">Flask</st>**<st
    c="191">. This</st> <st c="198">application will leverage OpenAI’s GPT-3.5 language
    model to provide code error explanations and fixes to users.</st> <st c="311">With
    the rapid growth of software development, the need for effective and efficient
    error-debugging solutions has become more important than ever.</st> <st c="458">By
    building this SaaS application, we aim to provide developers with a powerful tool
    to speed up their debugging process and improve the quality of</st> <st c="606">their
    code.</st>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨使用 <st c="186">Flask</st> <st c="191">创建和部署一个由人工智能驱动的代码错误修复 SaaS
    应用程序。此 <st c="198">应用程序将利用 OpenAI 的 GPT-3.5 语言模型为用户提供代码错误解释和修复。随着软件开发速度的快速增长，对有效且高效的错误调试解决方案的需求比以往任何时候都更加重要。</st>
    <st c="311">通过构建此 SaaS 应用程序，我们的目标是向开发者提供一款强大的工具，以加快他们的调试过程并提高其代码的质量。</st> <st
    c="458"></st>
- en: <st c="617">To develop this SaaS application, we will be utilizing a familiar
    tool that you may already be well acquainted with, namely the Flask framework
    for building web applications in Python.</st> <st c="803">Our aim is to become
    proficient in utilizing this framework to build an effective and scalable web
    application that can deliver efficient code error solutions to its users.</st>
    <st c="976">Furthermore, we will be utilizing OpenAI’s GPT-3.5 language model
    to provide natural language explanations and</st> <st c="1087">code fixes.</st>
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开发此 SaaS 应用程序，我们将利用一个你可能已经非常熟悉的工具，即用于在 Python 中构建网络应用的 Flask 框架。我们的目标是熟练掌握这个框架，以构建一个有效且可扩展的
    Web 应用程序，能够为用户提供高效的代码错误解决方案。</st> <st c="803">我们的目标是熟练掌握这个框架，以构建一个有效且可扩展的 Web
    应用程序，能够为用户提供高效的代码错误解决方案。</st> <st c="976">此外，我们还将利用 OpenAI 的 GPT-3.5 语言模型提供自然语言解释和代码修复。</st>
