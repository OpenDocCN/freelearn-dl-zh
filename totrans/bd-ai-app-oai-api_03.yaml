    <st c="4715">This is an essential step to prevent conflicting package installations
    between projects and guarantee that you are using the correct set</st> <st c="4852">of
    dependencies.</st>
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4361">任何Python开发过程中的第一步是创建一个名为</st> `<st c="4456">CodeBugFixer</st>`<st
    c="4468">的VSCode项目。</st> 你可以通过前往<st c="4633">(venv)</st> <st c="4639">指示器来在VSCode中打开终端，以确认你正在虚拟环境中工作。</st>
    <st c="4715">这是防止项目间包安装冲突并确保你使用正确集合的依赖项的必要步骤。</st> <st c="4852">的依赖项。</st>
