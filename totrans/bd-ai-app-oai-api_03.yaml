- en: <st c="1995">Performing multiple ChatGPT API requests</st>
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="1995">执行多个 ChatGPT API 请求</st>
- en: <st c="2036">Let’s first</st> <st c="2048">dive into the ChatGPT API requests
    and learn how to build your project and the</st> `<st c="2128">app.py</st>` <st
    c="2134">file.</st> <st c="2141">In this project, we will explore how to make
    multiple ChatGPT API requests to get the explanations and fixed code for our input
    queries.</st> <st c="2278">We will go through each step of the process and provide
    clear examples, so you can follow along</st> <st c="2374">with ease.</st>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2036">让我们首先</st> <st c="2048">深入了解ChatGPT API请求，并学习如何构建项目和</st> `<st
    c="2128">app.py</st>` <st c="2134">文件。</st> <st c="2141">在这个项目中，我们将探讨如何进行多个ChatGPT
    API请求，以获取我们输入查询的解释和修复后的代码。</st> <st c="2278">我们将逐步讲解整个过程，并提供清晰的示例，以便您可以轻松跟随。</st>
- en: '<st c="2384">To fix users’ code, ChatGPT needs two key components: some buggy
    code and the error provided by the system.</st> <st c="2493">The idea behind the
    Code Bug Fixer application is that you provide ChatGPT with two separate requests
    simultaneously (see</st> *<st c="2615">Figure 3</st>**<st c="2623">.1</st>*<st
    c="2625">):</st>'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2384">为了修复用户的代码，ChatGPT需要两个关键组件：一些有错误的代码和系统提供的错误信息。</st> <st c="2493">代码错误修复器应用程序背后的理念是，你同时向ChatGPT提供两个单独的请求（参见</st>
    *<st c="2615">图 3</st>**<st c="2623">.1</st>*<st c="2625">）：</st>
- en: '**<st c="2628">Request 1</st>**<st c="2638">: ChatGPT uses the buggy code and
    the error to fix</st> <st c="2690">the code</st>'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="2628">请求 1</st>**<st c="2638">：ChatGPT使用有错误的代码和错误信息来修复</st> <st c="2690">代码</st>'
- en: '**<st c="2698">Request 2</st>**<st c="2708">: ChatGPT uses the buggy code and
    the error to explain the error to the user in</st> <st c="2789">plain English</st>'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="2698">请求 2</st>**<st c="2708">：ChatGPT使用有错误的代码和错误信息，用普通英语向用户解释错误</st>'
