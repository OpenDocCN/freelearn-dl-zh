- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: The Need for an AI Orchestrator
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 需要一个AI编排器
- en: 'Since the emergence of large language models and the explosion of AI applications,
    developers have faced a growing challenge: how to effectively manage and coordinate
    increasingly complex AI systems. As AI agents become more capable and autonomous,
    their behaviors must be structured, monitored, and optimized—often across multiple
    tools, services, and data sources. This growing complexity has created an urgent
    need for orchestration: a way to ensure these intelligent components work together
    seamlessly toward a common goal.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 随着大型语言模型的出现和AI应用的爆炸式增长，开发者面临着日益增长的挑战：如何有效地管理和协调日益复杂的AI系统。随着AI代理变得更加能够和自主，它们的行为必须被结构化、监控和优化——通常涉及多个工具、服务和数据源。这种日益增长的复杂性产生了对编排的迫切需求：确保这些智能组件无缝地共同实现一个共同目标。
- en: AI orchestrators emerged in response to this need. Rather than simply offering
    pre-built components, they provide a framework for structuring interactions, managing
    dependencies, and maintaining control over multi-agent or modular workflows—all
    while accelerating development and reducing operational risk.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器应运而生，以满足这一需求。它们不仅提供预构建的组件，还提供了一个框架来构建交互、管理依赖关系并保持对多代理或模块化工作流程的控制——同时加速开发并降低运营风险。
- en: 'In this chapter, we are going to cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Introduction to AI orchestrators
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI编排器简介
- en: Core components of AI orchestrators
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI编排器的核心组件
- en: Overview of the most popular AI orchestrator in the market
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场上最流行的AI编排器概述
- en: How to choose the right orchestrator for your AI agent
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何为你的AI代理选择合适的编排器
- en: By the end of this chapter, you will be familiar with the most popular AI orchestrators
    and how to leverage them for your unique agentic use case.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将熟悉最流行的AI编排器以及如何利用它们来满足你独特的代理用例。
- en: Introduction to AI orchestrators
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI编排器简介
- en: It is now clear that leveraging large language models (LLMs) goes far beyond
    simple API calls—it involves orchestrating tools, managing memory, and coordinating
    complex interactions to build truly intelligent systems. While early AI integrations
    relied on direct interactions with models, modern AI agents demand a more structured
    approach to manage workflows, integrate external tools, and handle memory efficiently.
    This is where **AI orchestrators** come into play.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现在很清楚，利用大型语言模型（LLMs）远不止简单的API调用——它涉及编排工具、管理内存和协调复杂交互，以构建真正智能的系统。虽然早期的AI集成依赖于与模型的直接交互，但现代AI代理需要一种更结构化的方法来管理工作流程、集成外部工具和高效处理内存。这正是**AI编排器**发挥作用的地方。
- en: An AI orchestrator serves as the central hub that coordinates interactions between
    the model, tools, memory stores, APIs, and other external systems. It ensures
    that AI agents operate effectively and in a controlled manner.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器作为中央枢纽，协调模型、工具、内存存储、API和其他外部系统之间的交互。它确保AI代理以有效且受控的方式运行。
- en: '![Figure 3.1: Example of an AI orchestrator layer in a typical development
    framework](img/B32584_03_001.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图3.1：典型开发框架中AI编排器层的示例](img/B32584_03_001.png)'
- en: 'Figure 3.1: Example of an AI orchestrator layer in a typical development framework'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1：典型开发框架中AI编排器层的示例
- en: 'AI orchestrators can help in the following:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器可以帮助以下方面：
- en: '**Managing complexity**: AI workflows often involve multiple coordinated steps
    such as retrieval, reasoning, and action execution. Orchestrators automate and
    structure these processes, making systems easier to scale and maintain.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理复杂性**：AI工作流程通常涉及多个协调步骤，如检索、推理和动作执行。编排器自动化并结构化这些流程，使系统更容易扩展和维护。'
- en: '**Enhancing scalability**: Orchestrators handle high loads by distributing
    tasks, caching responses, and parallelizing operations—critical for handling multiple
    users or token-intensive tasks.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强可扩展性**：编排器通过分配任务、缓存响应和并行化操作来处理高负载——这对于处理多个用户或密集型任务至关重要。'
- en: '**Ensuring context awareness**: Since LLMs have limited memory, orchestrators
    integrate vector databases and memory systems to help agents retain information
    and deliver more coherent, personalized experiences.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保上下文感知**：由于大型语言模型（LLMs）的内存有限，编排器集成了向量数据库和内存系统，以帮助代理保留信息并提供更连贯、个性化的体验。'
- en: '**Facilitating tool integration**: Orchestrators streamline the use of APIs,
    search engines, and databases by managing task execution and ensuring smooth interaction
    between LLMs and external tools.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**促进工具集成**：协调器通过管理任务执行并确保LLM与外部工具之间交互顺畅，简化了API、搜索引擎和数据库的使用。'
- en: '**Improving reliability and monitoring**: From logging to human-in-the-loop
    feedback, orchestrators offer tools to catch errors, prevent hallucinations, and
    ensure systems run securely and reliably.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高可靠性和监控**：从日志记录到人工反馈，协调器提供了捕捉错误、防止幻觉并确保系统安全可靠运行的工具。'
- en: 'To better understand the need for an AI orchestrator in the specific context
    of AI agents, we need to introduce three important features of the latter: autonomy,
    abstraction, and modularity.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解在AI代理的具体场景中需要AI协调器的原因，我们需要介绍后者的三个重要特性：自主性、抽象性和模块化。
- en: Autonomy
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自主性
- en: Autonomy refers to an AI agent’s capacity to operate **independently**, making
    decisions and executing actions without human intervention. This self-directed
    behavior enables AI agents to perform tasks, adapt to new situations, and pursue
    goals based on their learned experiences.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 自主性指的是AI代理能够**独立地**操作，在无需人类干预的情况下做出决策和执行动作。这种自我指导的行为使得AI代理能够执行任务、适应新情况并基于其学习经验追求目标。
- en: The autonomy of an AI agent implies that the steps that the agent is going to
    take are not necessarily known in advance.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理的自主性意味着代理将要采取的步骤不一定是可以事先知道的。
- en: 'For example, let’s consider a non-agentic workflow as simple as the following:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们考虑一个非代理工作流程，它就像以下这样简单：
- en: '![Figure 3.2: Example of a direct API call to the LLM](img/B32584_03_002.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图3.2：直接调用LLM的API示例](img/B32584_03_002.png)'
- en: 'Figure 3.2: Example of a direct API call to the LLM'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2：直接调用LLM的API示例
- en: 'Whenever we prompt an LLM, we are doing an API call, which is the only step
    that comprises this workflow. Even in the scenario of a **retrieval augmented
    generation** (**RAG**) workflow, steps are known in advance:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我们向大型语言模型（LLM）发出提示时，我们就是在进行一个API调用，这是这个工作流程中唯一的步骤。即使在**检索增强生成（RAG**）工作流程的场景中，步骤也是事先知道的：
- en: '![Figure 3.3: Example of a RAG pattern](img/B32584_03_003.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图3.3：RAG模式的示例](img/B32584_03_003.png)'
- en: 'Figure 3.3: Example of a RAG pattern'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3：RAG模式的示例
- en: 'Let’s now consider an autonomous agentic approach. Let’s say we have an agent
    with two tools:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们考虑一个自主的代理方法。假设我们有一个拥有两个工具的代理：
- en: 'Weather tool, a function that takes two parameters: city and unit of measurement.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 天气工具，一个接受两个参数：城市和单位。
- en: Location tool, a function that takes the current position of the user, leveraging
    the GPS position. This function takes no parameters.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位置工具，一个接受用户当前位置作为参数的功能，利用GPS位置。此函数不接受任何参数。
- en: Both functions come with a natural language description, as per the AI agent’s
    anatomy. Our workflow design will let the agent decide which tool to invoke.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 两个函数都附有自然语言描述，符合AI代理的结构。我们的工作流程设计将让代理决定调用哪个工具。
- en: '![Figure 3.4: Example of an agentic pattern](img/B32584_03_004.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图3.4：代理模式的示例](img/B32584_03_004.png)'
- en: 'Figure 3.4: Example of an agentic pattern'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.4：代理模式的示例
- en: 'Let’s say that a new user asks, “What’s the weather for tomorrow?”. The following
    things will happen:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一个新用户问道：“明天的天气怎么样？”。以下事情将会发生：
- en: 'The agent will read through the descriptions of its tools and understand that
    it needs to invoke the weather tool. However, it’s missing the two parameters,
    but thanks to its autonomy, it can look around to retrieve them. It soon understands
    that it can leverage the location tool to get the first parameter: the output
    of that function will serve as the parameter of the weather tool.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理将阅读其工具的描述并理解它需要调用天气工具。然而，它缺少两个参数，但多亏了它的自主性，它可以四处寻找以检索它们。它很快意识到可以利用位置工具来获取第一个参数：该函数的输出将作为天气工具的参数。
- en: '![Figure 3.5: Example of an AI agent invoking a tool to retrieve a parameter](img/B32584_03_005.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图3.5：AI代理调用工具检索参数的示例](img/B32584_03_005.png)'
- en: 'Figure 3.5: Example of an AI agent invoking a tool to retrieve a parameter'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.5：AI代理调用工具检索参数的示例
- en: 'For the second parameter, the agent cannot make it alone: it needs to ask the
    user. So it does, asking the user which kind of unit of measurement is needed.
    Once the user responds, the agent is able to properly invoke the tool with both
    parameters.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于第二个参数，代理无法单独完成：它需要询问用户。因此，它这样做，询问用户需要哪种类型的计量单位。一旦用户做出回应，代理就能正确地使用两个参数调用工具。
- en: '![Figure 3.6: Example of an AI agent asking the user for a missing parameter](img/B32584_03_006.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图3.6：AI代理请求用户提供缺失参数的示例](img/B32584_03_006.png)'
- en: 'Figure 3.6: Example of an AI agent asking the user for a missing parameter'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6：AI代理请求用户提供缺失参数的示例
- en: The agent observes the output of the weather tool and ascertains it now knows
    the final answer for the user.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理观察天气工具的输出，并确认它现在知道用户的最终答案。
- en: '![Figure 3.7: Example of an AI agent invoking a tool with the retrieved parameters](img/B32584_03_007.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图3.7：AI代理使用检索到的参数调用工具的示例](img/B32584_03_007.png)'
- en: 'Figure 3.7: Example of an AI agent invoking a tool with the retrieved parameters'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.7：AI代理使用检索到的参数调用工具的示例
- en: Can you imagine how many *“if…else”* statements would have been needed to replicate
    such a degree of autonomy in a standard **Robotic Process Automation** (**RPA**)
    process? And even if we could manage a similar scenario, what if the user asks
    something that has not been hardcoded in the process? Adaptability, self-critique,
    are self-adjustment are key features of agentic autonomy.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你能想象在标准的**机器人流程自动化**（**RPA**）过程中需要多少个“if…else”语句才能复制这种程度的自主性吗？即使我们能够管理类似的场景，如果用户提出的过程中没有硬编码的问题，怎么办？适应性、自我批评和自我调整是代理自主性的关键特征。
- en: 'There are many degrees of autonomy we can provide our agents with: it all boils
    down to the workflow we set up and the planning strategy we instruct our agents
    to follow. As we will see throughout this chapter, we can define a plan where
    the agent will execute tools in a specific order, we can plan to let the agent
    loop over a tool until it reaches a specific output before going to the next one,
    or we can set the agent totally free to use all tools as many times as it wishes,
    when it needs them.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以为我们的代理提供许多程度的自主性：这一切都归结为我们设置的工作流程和指导代理遵循的计划策略。正如我们将在本章中看到的那样，我们可以定义一个计划，其中代理将按特定顺序执行工具，我们可以计划让代理在达到特定输出之前循环使用一个工具，或者我们可以让代理完全自由地根据需要多次使用所有工具。
- en: Designing the proper agentic workflow is an architectural design conversation
    that is key when building your agentic state.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 设计适当的代理工作流程是构建代理状态时关键的建筑设计对话。
- en: Abstraction and modularity
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 抽象和模块化
- en: Abstraction refers to breaking down and simplifying complexity. It is what makes
    these systems comprehensible and scalable. But beyond simplification, it also
    enables modular design, a fundamental principle in building intelligent systems.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 抽象是指分解和简化复杂性。它使得这些系统易于理解并可扩展。但除了简化之外，它还使模块化设计成为构建智能系统的一个基本原理。
- en: 'Modularity breaks down complex problems into smaller, reusable components,
    each handling a specific part of the challenge. This approach offers several advantages:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 模块化将复杂问题分解成更小、可重用的组件，每个组件处理挑战的特定部分。这种方法提供了一些优点：
- en: '**Interchangeability**: Components can be swapped, upgraded, or replaced without
    affecting the entire system'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可互换性**：组件可以在不影响整个系统的情况下进行交换、升级或替换。'
- en: '**Reusability**: Well-designed modules can be repurposed across different projects,
    improving efficiency'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重用性**：设计良好的模块可以在不同的项目中重新使用，从而提高效率。'
- en: '**Scalability**: Independent yet seamlessly integrated components make it easier
    to expand solutions'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：独立但无缝集成的组件使得扩展解决方案更加容易。'
- en: In multi-agent systems, abstraction and modularity allow for the creation of
    cooperative agents, each specializing in specific tasks while interacting dynamically.
    This mirrors human problem-solving, where we divide, delegate, and collaborate
    to tackle complexity effectively.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在多代理系统中，抽象和模块化允许创建协作代理，每个代理专注于特定任务，同时动态交互。这反映了人类的解决问题方式，我们通过分解、委派和协作来有效地应对复杂性。
- en: A great way to understand abstraction and modularity in agentic patterns is
    by looking at a multi-agent traffic management system in a busy metropolitan city,
    where different levels of agents handle different levels of abstraction, ensuring
    smooth operation without overwhelming any single entity.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察繁忙大都市中多代理交通管理系统，我们可以很好地理解代理模式中的抽象和模块化。在这个系统中，不同级别的代理处理不同级别的抽象，确保平稳运行而不使任何单一实体超负荷。
- en: '**Note**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: We will cover multi-agent systems in more detail in [*Chapter 7*](Chapter_07.xhtml#_idTextAnchor122).
    However, it is important to note that a standalone agent can always be consumed
    by another agent as a “tool” with the very same approach of coming with a natural
    language description of its capabilities. For example, an “SQL agent” can be a
    tool for a “project manager agent,” the moment the latter needs to query an SQL
    database.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第七章*](Chapter_07.xhtml#_idTextAnchor122)中更详细地介绍多代理系统。然而，重要的是要注意，一个独立的代理始终可以被另一个代理作为“工具”所消耗，采用带有其能力自然语言描述的相同方法。例如，一个“SQL代理”可以在“项目经理代理”需要查询SQL数据库时成为一个工具。
- en: Henceforth, in multi-agent systems – and in the upcoming examples – think about
    agents as potential tools for other agents.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 从此以后，在多代理系统中——以及即将到来的例子中——将代理视为其他代理的潜在工具。
- en: At the most granular level, we have intersection controllers, which operate
    at a single traffic light or intersection. These agents rely on real-time data
    from cameras and sensors to adjust traffic signals based on vehicle congestion,
    pedestrian movement, and emergency vehicle priority.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在最细粒度级别，我们有交叉口控制器，它们在单个交通信号灯或交叉口操作。这些代理依赖于来自摄像头和传感器的实时数据，根据车辆拥堵、行人移动和紧急车辆优先级调整交通信号。
- en: They don’t worry about what’s happening in the next city block or the broader
    urban landscape; their only job is to optimize traffic flow at their specific
    location. If a sudden influx of cars appears at a junction, they may extend green-light
    durations to ease congestion.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不关心下一个街区或更广泛的城市景观中发生的事情；他们的唯一任务是优化他们特定位置的交通流量。如果交叉口出现车辆突然涌入，他们可能会延长绿灯时长以缓解拥堵。
- en: Zooming out, we have district-level traffic coordinators. These agents don’t
    micromanage individual traffic lights but instead analyze traffic flow across
    multiple intersections within a neighborhood or district.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 从更广阔的角度来看，我们有区域级交通协调员。这些代理不会微观管理单个交通信号灯，而是分析一个社区或区域内部多个交叉口的交通流量。
- en: They use data from intersection controllers, GPS tracking, and public transport
    systems to identify congestion patterns, reroute vehicles, and balance the flow
    of cars across the area. If they detect excessive delays in one zone, they adjust
    how much time a light is on for the traffic signal for multiple intersections
    rather than just one.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使用来自交叉口控制器、GPS跟踪和公共交通系统的数据来识别拥堵模式，重新规划车辆路线，平衡该区域的车流量。如果他们检测到某个区域有过度延误，他们会调整多个交叉口的交通信号灯的亮灯时间，而不仅仅是单个交叉口。
- en: More importantly, they direct intersection-level agents, ensuring their adjustments
    align with broader district-wide traffic goals.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，他们指导交叉口级代理，确保他们的调整与更广泛的区域级交通目标相一致。
- en: At the highest level, we have the citywide traffic management system, responsible
    for optimizing the flow of millions of vehicles across the entire metropolitan
    area. This agent doesn’t focus on specific traffic lights or individual congestion
    points; instead, it allocates resources, predicts long-term patterns, and makes
    strategic adjustments.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在最高级别，我们有城市级交通管理系统，负责优化整个大都市区域内数百万辆车的流量。这个代理不专注于特定的交通信号灯或单个拥堵点；相反，它分配资源，预测长期模式，并做出战略调整。
- en: Using data from weather reports, major event schedules, accidents, and public
    transportation networks, this agent might reroute entire roads, coordinate construction
    schedules to minimize disruption, or implement city-wide emergency response plans
    in case of major incidents.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用来自天气预报、重大事件日程、事故和公共交通网络的数据，这个代理可能会重新规划整个道路，协调施工时间表以最小化干扰，或者在发生重大事件时实施城市级紧急响应计划。
- en: If an accident occurs on a major highway, the citywide system redirects district-level
    agents to adjust traffic patterns, which in turn instruct intersection controllers
    to reroute vehicles efficiently.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果主要高速公路发生事故，城市级系统会重新分配区域级代理以调整交通模式，进而指导交叉口控制器高效地重新规划车辆路线。
- en: 'This layered structure demonstrates the power of abstraction and modularity
    in multi-agent systems:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分层结构展示了抽象和模块化在多代理系统中的力量：
- en: Intersection agents handle local, real-time decisions, adjusting traffic lights
    and prioritizing immediate flow
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交叉路口代理处理本地、实时的决策，调整交通灯并优先考虑即时流量
- en: District-level agents analyze and coordinate groups of intersections, optimizing
    traffic across a wider region
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区域级代理分析和协调交叉路口的群体，优化更广泛区域的交通
- en: Citywide agents focus on the big picture, planning for long-term efficiency,
    emergency responses, and systemic optimizations
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市级代理关注大局，规划长期效率、应急响应和系统优化
- en: This mirrors how software architectures, AI systems, and even corporate structures
    function in the real world. Whether it’s frontline workers executing tasks, middle
    managers coordinating efforts, or executives setting the overall vision, abstraction
    enables complex systems to remain scalable, efficient, and resilient.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这反映了软件架构、AI系统和甚至企业结构在现实世界中的运作方式。无论是前线工作人员执行任务、中层管理人员协调努力，还是高管设定整体愿景，抽象化使复杂系统保持可扩展性、效率和弹性。
- en: By designing multi-agent AI architectures with this layered approach, we ensure
    each agent focuses only on what it needs to handle, preventing system overload
    and enabling adaptive, real-time decision-making at scale, just like a smart traffic
    system managing a bustling city.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用这种分层方法设计多代理AI架构，我们确保每个代理只关注它需要处理的任务，防止系统过载，并实现大规模的适应性、实时决策，就像一个智能交通系统管理繁忙的城市一样。
- en: If this doesn’t sound like a real thing to you, let’s have a look at OpenAI’s
    tool called **Operator**, which acts as an autonomous agent, capable of performing
    tasks in a web browser, such as booking tickets or filling online orders.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这听起来不像一个真实的事物，让我们看看OpenAI的工具**Operator**，它作为一个自主代理，能够在网页浏览器中执行任务，如预订机票或填写在线订单。
- en: OpenAI’s Operator follows a hierarchical multi-agent approach similar to the
    traffic management system. Each agent operates at a different level of abstraction,
    ensuring efficiency and adaptability without overwhelming any single component.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的Operator遵循类似于交通管理系统的分层多代理方法。每个代理在不同的抽象级别上运行，确保效率和适应性，而不使任何单个组件过载。
- en: '**Web controllers (low-level agents)**:These agents handle execution: moving
    the mouse, clicking buttons, and entering text. They don’t analyze or plan—they
    simply follow commands.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Web控制器（低级代理）**：这些代理处理执行任务：移动鼠标、点击按钮和输入文本。它们不进行分析或规划——它们只是简单地遵循命令。'
- en: '**Vision and reasoning (mid-level agents)**: These agents interpret the web
    interface. The Vision Agent processes screenshots, detecting relevant elements,
    while the Reasoning Agent determines the next action (clicking, typing, or scrolling).
    This layer abstracts away the details of execution, focusing on understanding
    and decision-making.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视觉和推理（中级代理）**：这些代理解释网页界面。视觉代理处理截图，检测相关元素，而推理代理确定下一步行动（点击、输入或滚动）。这一层抽象掉了执行细节，专注于理解和决策。'
- en: '**The planner/orchestrator (high-level agent**): The top-level agent oversees
    the entire system, ensuring that web interactions align with broader goals—whether
    it’s searching for information or filling out a form. It delegates tasks to mid-level
    agents, ensuring smooth and strategic navigation.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划者/协调者（高级代理）**：顶级代理监督整个系统，确保网页交互与更广泛的目标一致——无论是搜索信息还是填写表格。它将任务委托给中级代理，确保平稳和战略性的导航。'
- en: 'This structured approach highlights why abstraction is critical in multi-agent
    design:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构化的方法突出了抽象在多代理设计中的关键性：
- en: Low-level agents execute without worrying about decisions
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低级代理执行任务时无需担心决策
- en: Mid-level agents focus on interpreting and planning
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中级代理专注于解释和规划
- en: High-level agents handle overall strategy, without getting into technical details
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高级代理处理整体策略，而不涉及技术细节
- en: By leveraging this modular design, OpenAI’s Operator adapts dynamically, handling
    different websites without requiring manual programming. This scalable and generalizable
    architecture is a prime example of how multi-agent systems drive real-world AI
    applications.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用这种模块化设计，OpenAI的Operator能够动态适应，处理不同的网站而无需手动编程。这种可扩展和可泛化的架构是多代理系统驱动现实世界AI应用的典范。
- en: From an architectural perspective, all these components – agents, skills, plugins
    – can be seen as repeatable assets in your organization. In this context, AI orchestrators
    ensure that these components work together without being tightly coupled, preventing
    complexity from overwhelming the system.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从建筑学的角度来看，所有这些组件——代理、技能、插件——都可以被视为组织中可重复使用的资产。在这种情况下，AI编排器确保这些组件能够协同工作，而不会紧密耦合，防止复杂性压倒系统。
- en: 'Following the preceding hierarchical example, with an AI orchestrator, you
    can easily define the following:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 按照前面的分层示例，使用AI编排器，你可以轻松定义以下内容：
- en: '**Execution agents** (**low-level)**: These handle raw tasks such as API calls,
    database queries, or web scraping, executing commands without decision-making'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行代理（低级）**：这些处理原始任务，如API调用、数据库查询或网络抓取，执行命令而不做决策'
- en: '**Reasoning agents (mid-level)**: They analyze data, determine actions, and
    select the right tools, abstracting execution details'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理代理（中级）**：它们分析数据，确定行动，并选择合适的工具，抽象执行细节'
- en: '**Orchestration and planning (high-level)**: The orchestrator oversees workflows,
    breaking down tasks, distributing them across agents, and adapting dynamically'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排和规划（高级）**：编排器监督工作流程，分解任务，分配给代理，并动态调整'
- en: '![Figure 3.8: AI agents hierarchy](img/B32584_03_008.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图3.8：AI代理层次结构](img/B32584_03_008.png)'
- en: 'Figure 3.8: AI agents hierarchy'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8：AI代理层次结构
- en: By structuring AI systems this way, orchestrators enable adaptive, generalizable
    intelligence, ensuring seamless interaction between components without manual
    intervention.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种方式结构化AI系统，编排器能够实现自适应、可泛化的智能，确保组件之间无需人工干预的顺畅交互。
- en: Core components of an AI orchestrator
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI编排器的核心组件
- en: Now that we’ve explored why AI orchestrators are critical in managing complexity,
    scalability, context, and reliability in agentic systems, it’s time to examine
    how they work under the hood. At the heart of every orchestrator lies a set of
    foundational components, including workflow execution, memory handling, tool integration,
    error detection, and security enforcement. Each component plays a crucial role
    in ensuring that AI agents operate efficiently and reliably.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了为什么AI编排器在管理代理系统中的复杂性、可扩展性、上下文和可靠性方面至关重要，现在是时候检查它们在幕后是如何工作的了。每个编排器的核心都有一组基础组件，包括工作流程执行、内存处理、工具集成、错误检测和安全执行。每个组件都在确保AI代理高效和可靠地运行中扮演着关键角色。
- en: Workflow management
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作流程管理
- en: 'One of the primary functions of an AI orchestrator is to define and manage
    structured workflows. Workflows dictate how tasks are executed, whether they occur
    sequentially, in parallel, or through conditional logic. Below we list some of
    the most common workflows you can encounter:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器的主要功能之一是定义和管理结构化工作流程。工作流程决定了任务是如何执行的，是按顺序、并行还是通过条件逻辑执行。以下列出了一些你可能会遇到的最常见工作流程：
- en: '**Sequential workflows**: Tasks are executed step by step in a predefined order.
    *Example*: A document-processing AI agent first extracts text from images, then
    summarizes the content, and finally translates it into another language.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顺序工作流程**：任务按预定义的顺序逐步执行。*示例*：一个文档处理AI代理首先从图像中提取文本，然后总结内容，最后将其翻译成另一种语言。'
- en: '**Parallel workflows**: Multiple tasks are performed simultaneously to optimize
    efficiency. *Example*: A financial analysis AI agent can process multiple stock
    trends at the same time to provide a comprehensive market report.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行工作流程**：同时执行多个任务以优化效率。*示例*：一个金融分析AI代理可以同时处理多个股票趋势，以提供全面的市场报告。'
- en: '**Conditional workflows**: Execution paths change based on specific conditions.
    *Example*: A customer support AI agent might escalate complex queries to a human
    agent if sentiment analysis detects frustration.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**条件工作流程**：执行路径根据特定条件而改变。*示例*：如果情感分析检测到挫败感，客户支持AI代理可能会将复杂查询升级给人工代理。'
- en: '**Hierarchical workflows**: Tasks are organized in a structured, multi-layered
    manner, where high-level AI agents delegate subtasks to specialized agents. *Example*:
    A project management AI agent oversees an engineering workflow, delegating tasks
    to coding, testing, and deployment AI agents while ensuring overall progress tracking.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分层工作流程**：任务以结构化、多层次的方式组织，高级AI代理将子任务委派给专业代理。*示例*：一个项目管理AI代理监督工程工作流程，将任务委派给编码、测试和部署AI代理，同时确保整体进度跟踪。'
- en: '**Group chat workflows**: AI agents collaborate in a conversational environment,
    exchanging insights and adjusting their actions based on real-time interactions.
    *Example*: A team of AI agents (e.g., a research assistant, a fact-checking bot,
    and a summarization model) discusses a topic dynamically, refining outputs before
    presenting the final response to a user.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**群聊工作流程**：AI代理在对话环境中协作，根据实时交互交换见解并调整其行为。*示例*：一组AI代理（例如，研究助理、事实核查机器人、摘要模型）动态地讨论一个主题，在向用户展示最终响应之前，对输出进行细化。'
- en: '**Note**'
  id: totrans-102
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Workflow management goes hand in hand with the concept of autonomy we introduced
    in the preceding section. For example, in a group chat type of workflow, you are
    providing your multi-agent system with a high degree of autonomy; on the other
    hand, a sequential workflow is more predictable as you are clearly stating the
    sequence of agents to be invoked.
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 工作流程管理与我们在上一节中引入的自主性概念密切相关。例如，在群聊类型的工作流程中，你为你的多代理系统提供了高度自主性；另一方面，顺序工作流程更具可预测性，因为你明确地指出了要调用的代理的顺序。
- en: AI orchestrators provide developers with tools to design, modify, and optimize
    these workflows dynamically, making them essential for creating scalable and adaptable
    AI applications.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能编排者向开发者提供工具，以动态地设计、修改和优化这些工作流程，这对于创建可扩展和适应性强的AI应用至关重要。
- en: Memory and context handling
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 记忆和上下文处理
- en: 'Effective AI agents need access to historical interactions and external knowledge
    bases to deliver relevant responses and maintain continuity. Orchestrators handle
    this through various memory management techniques:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的AI代理需要访问历史交互和外部知识库，以提供相关响应并保持连贯性。编排者通过各种内存管理技术来处理这一点：
- en: '**Short-term memory**: Stores session-based context, allowing AI agents to
    recall details within an ongoing conversation. *Example*: A virtual assistant
    remembers a user’s previous question during a chat session.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短期记忆**：存储基于会话的上下文，允许AI代理在持续对话中回忆细节。*示例*：一个虚拟助手会记住用户在聊天会话中的上一个问题。'
- en: '**Long-term memory**: Retains knowledge over extended periods, often stored
    in vector databases. *Example*: A medical AI system remembers a patient’s medical
    history for personalized recommendations, such as transcripts of past visits,
    medical reports, allergies or medications taken, and so forth.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长期记忆**：在较长时间内保留知识，通常存储在向量数据库中。*示例*：一个医疗人工智能系统会记住患者的医疗历史，以便提供个性化的推荐，例如过去的就诊记录、医疗报告、过敏或服用的药物等。'
- en: '**Semantic memory caching**: When AI orchestrators manage memory, they use
    caching strategies to optimize retrieval speed and efficiency. Semantic memory
    caching involves storing frequently asked information in a way that allows AI
    agents to recall facts, concepts, and relationships without relying on session-based
    history. *Example*: A customer service AI agent might recall a user’s past complaints
    and retrieve the resolution faster.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义记忆缓存**：当AI编排者管理内存时，他们会使用缓存策略来优化检索速度和效率。语义记忆缓存涉及以允许AI代理在无需依赖基于会话的历史的情况下回忆事实、概念和关系的方式存储频繁询问的信息。*示例*：一个客户服务AI代理可能会回忆用户的过去投诉并更快地检索解决方案。'
- en: '**Definition**'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**定义**'
- en: In the context of computing, caching is a technique used to store data temporarily
    to expedite future access. Traditionally, applications with low latency and high
    throughput requirements leverage in-memory caching, which involves storing data
    directly within a system’s RAM, enabling rapid data retrieval due to the high-speed
    nature of RAM. However, in-memory caches typically rely on exact key-value pairs
    for data retrieval, meaning that a request must match the stored key precisely
    to retrieve the corresponding data.
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在计算环境中，缓存是一种用于临时存储数据以加速未来访问的技术。传统上，具有低延迟和高吞吐量要求的程序利用内存缓存，这涉及到直接在系统的RAM中存储数据，由于RAM的高速特性，这使得数据检索变得快速。然而，内存缓存通常依赖于精确的键值对进行数据检索，这意味着请求必须与存储的键精确匹配才能检索相应的数据。
- en: 'With the advent of LLM-powered apps, a new caching system has been introduced:
    Semantic caching. This focuses on the meaning and context of data (leveraging
    embeddings) rather than exact matches. This approach stores the results of queries
    along with their semantic context, enabling the system to recognize and retrieve
    relevant data even if the new query isn’t an exact match to a previous one.'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 随着LLM驱动应用程序的出现，引入了一种新的缓存系统：语义缓存。这侧重于数据的含义和上下文（利用嵌入），而不是精确匹配。这种方法存储查询及其语义上下文的结果，使系统能够识别和检索相关数据，即使新查询与之前的查询不完全匹配。
- en: By efficiently managing memory, AI orchestrators ensure that agents provide
    coherent, informed, and context-aware responses.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有效地管理内存，AI编排器确保代理提供连贯、信息丰富和上下文感知的响应。
- en: Tool and API integration
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具和API集成
- en: 'AI agents often require access to external resources such as databases, APIs,
    and computational tools. Orchestrators facilitate seamless integration by enabling
    agents to do the following:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理通常需要访问外部资源，如数据库、API和计算工具。编排器通过使代理能够执行以下操作来实现无缝集成：
- en: Fetch real-time data from APIs (e.g., fetching weather updates for a travel
    assistant AI)
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从API获取实时数据（例如，为旅行助手AI获取天气更新）
- en: Access and query databases (e.g., retrieving order details for an e-commerce
    AI assistant)
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问和查询数据库（例如，为电子商务AI助手检索订单详情）
- en: Leverage external computation tools (e.g., using a machine learning API for
    fraud detection in banking applications)
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用外部计算工具（例如，在银行应用程序中使用机器学习API进行欺诈检测）
- en: Orchestrators allow these integrations to be managed efficiently, ensuring AI
    agents operate with up-to-date and accurate information.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 编排器允许这些集成得到有效管理，确保AI代理以最新和准确的信息运行。
- en: Error handling and monitoring
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 错误处理和监控
- en: 'To ensure AI applications remain reliable, orchestrators implement robust error-handling
    and monitoring mechanisms:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保AI应用程序保持可靠性，编排器实施强大的错误处理和监控机制：
- en: '**Logging and analytics**: Captures detailed logs of AI interactions for debugging
    and optimization.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志和分析**：捕获AI交互的详细日志，用于调试和优化。'
- en: '**Automated error detection**: Identifies failed processes and retries or escalates
    them automatically.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动错误检测**：识别失败的进程并自动重试或升级。'
- en: '**Performance tracking**: Monitors response times, accuracy, and overall system
    health.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能跟踪**：监控响应时间、准确性和整体系统健康。'
- en: '**Human-in-the-loop integration**: Allows human review for critical decisions.
    *Example*: A medical AI assistant requires human confirmation before making a
    diagnosis.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人机交互集成**：允许对关键决策进行人工审查。*示例*：医疗AI助手在做出诊断之前需要人工确认。'
- en: By proactively handling errors and providing comprehensive monitoring, AI orchestrators
    help maintain high system reliability and trustworthiness.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过主动处理错误和提供全面的监控，AI编排器有助于保持高系统可靠性和可信度。
- en: Security and compliance
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全性和合规性
- en: 'Security is a top priority in AI systems, especially when dealing with sensitive
    data. AI orchestrators incorporate multiple security measures, including the following:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI系统中，安全性是首要任务，尤其是在处理敏感数据时。AI编排器整合了多项安全措施，包括以下内容：
- en: '**Authentication and access control**: Ensuring only authorized users and systems
    can interact with AI agents'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**身份验证和访问控制**：确保只有授权的用户和系统能够与AI代理交互'
- en: '**Rate limiting**: Preventing abuse by controlling the number of requests an
    AI agent can process within a specific timeframe'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速率限制**：通过控制AI代理在特定时间段内可以处理的请求数量来防止滥用'
- en: '**Data privacy compliance**: Adhering to regulations such as GDPR or HIPAA
    by managing user data securely'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据隐私合规性**：通过安全地管理用户数据来遵守GDPR或HIPAA等法规'
- en: '**Bias and safety filters**: Implementing safeguards to prevent biased or harmful
    AI outputs'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏差和安全过滤器**：实施安全措施以防止有偏差或有害的AI输出'
- en: Security and compliance mechanisms help ensure AI agents operate safely, ethically,
    and within legal frameworks.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性和合规性机制有助于确保AI代理在安全、道德和合法框架内运行。
- en: The core components of an AI orchestrator—workflow management, memory handling,
    tool integration, error detection, and security—form the foundation for building
    robust and efficient AI applications. By leveraging these capabilities, developers
    can create AI agents that are not only powerful but also reliable, scalable, and
    secure. Understanding these components allows for better decision-making when
    selecting or designing an AI orchestration framework.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器的核心组件——工作流程管理、内存处理、工具集成、错误检测和安全——是构建稳健和高效AI应用的基础。通过利用这些功能，开发者可以创建不仅强大而且可靠、可扩展和安全的AI智能体。了解这些组件有助于在选择或设计AI编排框架时做出更好的决策。
- en: Overview of the most popular AI orchestrators in the market
  id: totrans-135
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 市场上最受欢迎的AI编排器概述
- en: Several AI orchestrators have emerged as leaders in this space, each offering
    unique capabilities tailored to different use cases. Some focus on modularity
    and flexibility, allowing developers to customize workflows, while others prioritize
    user-friendly interfaces for rapid prototyping. Here, we’ll explore the most widely
    used AI orchestrators as of May 2025, highlighting their key strengths and ideal
    applications.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 几个AI编排器已经在这个领域崭露头角，各自提供针对不同用例的独特功能。一些侧重于模块化和灵活性，允许开发者自定义工作流程，而另一些则优先考虑用户友好的界面以实现快速原型设计。在这里，我们将探讨截至2025年5月最广泛使用的AI编排器，突出它们的关键优势和理想应用。
- en: '**LangChain**: LangChain is a modular framework designed for building applications
    powered by LLMs. It provides essential components for integrating external tools,
    managing memory across interactions, and defining agent-based workflows. As an
    open source project, LangChain boasts extensive documentation and a strong community,
    making it a go-to choice for developers looking to build robust AI-driven applications.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LangChain**：LangChain是一个模块化框架，旨在构建由LLM驱动的应用。它提供了集成外部工具、管理交互间内存和定义基于智能体的工作流程的基本组件。作为一个开源项目，LangChain拥有广泛的文档和强大的社区，使其成为开发者构建稳健AI驱动应用的优选。'
- en: '**LlamaIndex (formerly GPT Index)**: LlamaIndex specializes in optimizing data
    retrieval for LLMs, ensuring efficient access to both structured and unstructured
    data sources. It is particularly effective when combined with LangChain to build
    knowledge-driven AI agents that require sophisticated search and indexing capabilities.
    Its ability to bridge the gap between large-scale data and generative AI makes
    it an invaluable tool for organizations handling vast information repositories.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LlamaIndex（原名GPT Index）**：LlamaIndex专注于优化LLM的数据检索，确保高效访问结构化和非结构化数据源。当与LangChain结合使用时，它特别有效，可以构建需要复杂搜索和索引能力的知识驱动AI智能体。它能够在大规模数据和生成式AI之间架起桥梁，使其成为处理大量信息库的组织不可或缺的工具。'
- en: '**AutoGen**: AutoGen is tailored for developing multi-agent AI workflows, enabling
    LLM-powered agents to communicate and collaborate on complex tasks. By automating
    interactions between AI entities, AutoGen facilitates research, reasoning, and
    content generation, allowing AI systems to make more informed decisions through
    structured dialogue. It is well-suited for applications that require multiple
    specialized agents working together toward a common goal.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AutoGen**：AutoGen专为开发多智能体AI工作流程而设计，使LLM驱动的智能体能够在复杂任务中进行沟通和协作。通过自动化AI实体之间的交互，AutoGen促进了研究、推理和内容生成，使AI系统通过结构化对话做出更明智的决策。它非常适合需要多个专业智能体共同实现共同目标的用例。'
- en: '**Langflow**: Langflow simplifies the process of designing AI agent workflows
    through an intuitive visual interface. By integrating seamlessly with LangChain
    and other orchestration tools, it enables rapid prototyping and real-time visualization
    of agent interactions. This makes it particularly useful for developers and researchers
    who want to experiment with AI-driven automation without deep diving into code-heavy
    implementations.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Langflow**：Langflow通过直观的视觉界面简化了设计AI智能体工作流程的过程。通过与LangChain和其他编排工具无缝集成，它实现了快速原型设计和智能体交互的实时可视化。这使得它对于想要实验AI驱动自动化但不想深入研究代码实现的开发者和研究人员特别有用。'
- en: '**Semantic Kernel (SK)**: Developed by Microsoft, Semantic Kernel bridges the
    gap between AI and enterprise applications by combining machine learning capabilities
    with traditional software development practices. It supports a plugin-based approach,
    allowing developers to integrate AI-powered workflows into existing business systems.
    Semantic Kernel is designed to enhance productivity by embedding AI-driven automation
    directly into corporate software environments.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义内核（SK）**：由微软开发，语义内核通过结合机器学习能力和传统软件开发实践，弥合了人工智能与企业应用之间的差距。它支持基于插件的架构，允许开发者将人工智能驱动的流程集成到现有的商业系统中。语义内核旨在通过将人工智能驱动的自动化直接嵌入到企业软件环境中来提高生产力。'
- en: '**LangGraph**: LangGraph introduces a structured approach to multi-agent collaboration
    by leveraging graph-based workflows. It provides a framework for designing sophisticated
    agent-to-agent interactions, ensuring that AI systems communicate in an organized
    and scalable manner. This makes it particularly valuable for orchestrating AI
    applications where different agents must collaborate dynamically to solve complex
    problems.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LangGraph**：LangGraph通过利用基于图的工作流程引入了一种结构化的多代理协作方法。它提供了一个框架来设计复杂的代理间交互，确保人工智能系统以有组织和可扩展的方式进行通信。这使得它在编排需要不同代理动态协作以解决复杂问题的AI应用程序方面特别有价值。'
- en: 'Now, the question is: how do I choose the right orchestrator for my AI agent?'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，问题是：我如何为我的AI代理选择正确的编排器？
- en: How to choose the right orchestrator for your AI agent
  id: totrans-144
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何为你的AI代理选择正确的编排器
- en: 'Selecting an AI orchestrator depends on several factors, including the complexity
    of the application, the level of customization required, the available ecosystem,
    and ease of deployment. Here are some key criteria to consider when choosing an
    orchestrator:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 选择人工智能编排器取决于多个因素，包括应用程序的复杂性、所需的定制程度、可用的生态系统以及部署的简便性。在选择编排器时，以下是一些关键标准需要考虑：
- en: '**Ease of use and modularity**: If you are looking for a quick and modular
    way to integrate LLMs into applications, **LangChain** is a great choice due to
    its well-documented, flexible architecture. *Example*: A start-up developing an
    AI chatbot for customer support might use LangChain to quickly prototype and integrate
    with its existing database and APIs.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**易用性和模块化**：如果你正在寻找一种快速且模块化的方式将LLMs集成到应用程序中，**LangChain**由于其良好的文档和灵活的架构，是一个很好的选择。*示例*：一个初创公司开发用于客户支持的人工智能聊天机器人，可能会使用LangChain快速原型设计和集成到其现有的数据库和API中。'
- en: '**Data-intensive applications**: If your AI agent relies heavily on structured
    or unstructured data retrieval, **LlamaIndex** is optimized for efficiently integrating
    external knowledge sources. *Example*: A legal AI assistant retrieving and analyzing
    case law across multiple document repositories would benefit from LlamaIndex’s
    retrieval capabilities.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据密集型应用程序**：如果你的AI代理严重依赖结构化或非结构化数据检索，**LlamaIndex**针对高效集成外部知识源进行了优化。*示例*：一个法律人工智能助手，在多个文档存储库中检索和分析案例法，将受益于LlamaIndex的检索能力。'
- en: '**Multi-agent workflows**: If your application requires multiple agents to
    interact with each other dynamically, **AutoGen** or **LangGraph** are ideal choices
    for orchestrating complex AI interactions. *Example*: Research assistant AI where
    multiple agents collaborate—one summarizing documents, another fact-checking,
    and a third generating reports—would benefit from these orchestrators.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多代理工作流**：如果你的应用程序需要多个代理动态交互，**AutoGen**或**LangGraph**是编排复杂人工智能交互的理想选择。*示例*：研究助理人工智能，其中多个代理协作——一个总结文档，另一个核实事实，第三个生成报告——将受益于这些编排器。'
- en: '**Enterprise-grade AI applications**: If you need strong enterprise integration
    and security, **Semantic Kernel** is well-suited for Microsoft-based environments
    and structured AI workflows. *Example*: A corporate AI-powered analytics tool
    that integrates with Microsoft Teams and SharePoint would align well with Semantic
    Kernel.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业级人工智能应用程序**：如果你需要强大的企业集成和安全，**语义内核**非常适合基于微软的环境和结构化人工智能工作流。*示例*：一个与Microsoft
    Teams和SharePoint集成的企业级人工智能分析工具与语义内核非常契合。'
- en: '**Visual workflow design**: If you prefer a no-code or low-code interface for
    AI workflow design, **Langflow** provides an intuitive UI for rapid prototyping
    and debugging of AI agent interactions. *Example*: A marketing team creating an
    AI-driven content generator without deep coding expertise could leverage Langflow’s
    visual interface for rapid workflow design.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化工作流程设计**：如果您更喜欢无代码或低代码界面进行AI工作流程设计，**Langflow**提供了一个直观的用户界面，用于快速原型设计和调试AI代理交互。*示例*：一个没有深厚编码专长的营销团队可以借助Langflow的视觉界面进行快速工作流程设计。'
- en: The choice of an AI orchestrator should align with the goals and technical requirements
    of your AI system. While some orchestrators specialize in modular development,
    others focus on scalability, multi-agent collaboration, or enterprise integrations.
    Understanding these distinctions will help you select the best tool for your specific
    use case.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 选择AI编排器应与您的AI系统的目标和技术要求相一致。虽然一些编排器专注于模块化开发，而另一些则专注于可扩展性、多代理协作或企业集成。了解这些区别将帮助您为特定的用例选择最佳工具。
- en: Summary
  id: totrans-152
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: AI orchestrators play a pivotal role in the development and deployment of intelligent
    systems, providing the necessary framework to manage workflows, integrate tools,
    and maintain efficiency. As AI applications continue to evolve, orchestrators
    ensure that AI agents operate autonomously, handle complex tasks, and adapt to
    dynamic requirements.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: AI编排器在智能系统的发展和部署中扮演着关键角色，提供了管理工作流程、集成工具和保持效率所需的框架。随着AI应用的持续发展，编排器确保AI代理能够自主运行、处理复杂任务并适应动态需求。
- en: Throughout this chapter, we have explored the fundamental components of AI orchestrators,
    including workflow management, memory handling, and security. We have also examined
    some of the most popular orchestrators available today, each offering unique strengths
    tailored to specific use cases.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了AI编排器的基本组件，包括工作流程管理、内存处理和安全。我们还考察了今天一些最受欢迎的编排器，每个编排器都提供针对特定用例的独特优势。
- en: Selecting the right AI orchestrator depends on various factors, such as integration
    needs, scalability, and workflow complexity. By understanding their core functionalities,
    developers and businesses can make informed decisions when choosing an orchestration
    tool that aligns with their goals.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的AI编排器取决于各种因素，如集成需求、可扩展性和工作流程复杂性。通过了解它们的核心功能，开发者和企业可以在选择与他们的目标相一致的编排工具时做出明智的决定。
- en: Starting from the next chapter, we are going to deep dive into some of the most
    compelling components of AI agents, starting from memory and context management.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 从下一章开始，我们将深入探讨AI代理中最引人入胜的一些组件，从记忆和上下文管理开始。
