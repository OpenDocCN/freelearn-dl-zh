- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: The Need for Memory and Context Management
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 需要记忆和上下文管理
- en: '**Large language models** (**LLMs**) are fundamentally stateless, despite how
    coherent and conversational they seem. They only know what you tell them in the
    current prompt. There’s no persistent context or history unless you explicitly
    build it in. Done well, memory allows agents to be consistent, context-aware,
    and even personalized over time.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**大型语言模型**（**LLMs**）在本质上是无状态的，尽管它们看起来很连贯、对话性强。它们只知道你在当前提示中告诉它们的内容。除非你明确构建，否则没有持久的环境或历史记录。做得好的话，记忆可以让代理保持一致性、上下文感知，甚至随着时间的推移实现个性化。'
- en: 'Throughout this chapter, we’re going to cover the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Different types of memory
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同类型的记忆
- en: Managing context windows
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理上下文窗口
- en: Storing, retrieving, and refreshing memory
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存储记忆、检索和刷新记忆
- en: Popular tools to manage memory
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理记忆的流行工具
- en: By the end of this chapter, you’ll have a solid understanding of how memory
    functions in AI agents and the tools and patterns needed to make your agents smarter,
    more reliable, and context-aware.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将深入了解记忆在人工智能代理中的功能，以及使你的代理更智能、更可靠和上下文感知所需的工具和模式。
- en: Different types of memory
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不同类型的记忆
- en: Just like humans rely on memory to make sense of the world, AI agents need memory
    to operate intelligently over time. Memory enables agents to retain information
    across interactions, remember past events, store useful knowledge, and build consistent
    behavior. Without memory, even the most powerful language models are stateless—reacting
    only to the current input with no awareness of what came before.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 正如人类依赖记忆来理解世界一样，人工智能代理需要记忆来在时间上智能地操作。记忆使代理能够在交互中保留信息、记住过去的事件、存储有用的知识，并构建一致的行为。没有记忆，即使是最强大的语言模型也是无状态的——只对当前输入做出反应，而对之前的内容毫无意识。
- en: As AI agents become more sophisticated, so do the demands placed on their memory
    systems. It’s no longer enough for an agent to simply generate responses—it must
    remember, adapt, and improve over time. Interestingly, the way researchers design
    memory architectures for agents draws heavily from how psychologists understand
    human memory. This parallel has led to a growing taxonomy of memory types in AI,
    each serving a distinct purpose, from handling recent interactions to building
    long-term knowledge and skills.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能代理变得更加复杂，对其记忆系统的要求也越来越高。仅仅生成响应已经不再足够，代理必须能够记住、适应并在时间上不断改进。有趣的是，研究人员为代理设计记忆架构的方式在很大程度上借鉴了心理学家对人类记忆的理解。这种平行关系导致了人工智能中记忆类型分类法的不断增长，每种类型都有其独特的用途，从处理近期交互到构建长期知识和技能。
- en: In this section, we’ll break down the different types of memory systems that
    power modern AI agents, following the same framework proposed by Theodore R. Sumers
    et al. in their *Cognitive Architectures for Language Agents* paper (https://arxiv.org/pdf/2309.02427).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将根据 Theodore R. Sumers 等人在其论文《语言代理的认知架构》（https://arxiv.org/pdf/2309.02427）中提出的相同框架，分解现代人工智能代理所使用的不同类型的记忆系统。
- en: Short-term memory
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 短期记忆
- en: '**Short-term memory** (**STM**) is the agent’s immediate workspace—the scratchpad
    where recent inputs are temporarily held for quick reference. That’s why STM is
    often referred to as **working memory** (according to the terminology used in
    the aforementioned paper).'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**短期记忆**（**STM**）是代理的即时工作空间——一个临时存放最近输入以供快速参考的草稿本。这就是为什么 STM 通常被称为 **工作记忆**（根据上述论文中使用的术语）。'
- en: In conversational systems, this is essential for maintaining coherence across
    multi-turn interactions. If a user says, “Book me a table at 7 for 4 people,”
    and follows up with, “Add one more seat,” STM helps the agent connect those dots.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话系统中，这对于在多轮交互中保持连贯性至关重要。如果用户说，“给我预订一个7点的4人桌”，然后补充说，“再加一个座位”，STM 帮助代理连接这些点。
- en: '![Figure 4.1: Example of short-term memory context window](img/B32584_04_01.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.1：短期记忆上下文窗口示例](img/B32584_04_01.png)'
- en: 'Figure 4.1: Example of short-term memory context window'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.1：短期记忆上下文窗口示例
- en: Technically, STM is often implemented using a rolling context window or buffer,
    which holds the most recent chunks of dialogue or data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 技术上，STM 通常使用滚动上下文窗口或缓冲区来实现，它保存最近的对话或数据块。
- en: '**Definition**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: Context window refers to the maximum amount of information (tokens) a model
    can process at once—typically including the prompt, conversation history, and
    any retrieved or injected knowledge. It’s a key constraint in memory management,
    as exceeding the window forces the agent to forget or summarize past data to stay
    within the limit.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口指的是模型一次可以处理的最大信息量（标记），通常包括提示、对话历史以及任何检索或注入的知识。它是内存管理中的一个关键约束，因为超过窗口会迫使代理忘记或总结过去的数据以保持在限制内。
- en: As new input arrives, older data is pushed out. This keeps interactions responsive
    and lightweight but also means STM is inherently transient. Once the buffer fills
    up or the session ends, that information is gone.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当新的输入到来时，旧的数据会被推出去。这保持了交互的响应性和轻量级，但也意味着短期记忆（STM）本质上是不持久的。一旦缓冲区满了或者会话结束，那些信息就消失了。
- en: 'So, while STM is ideal for quick Q&A-style interactions, it falls short when
    it comes to remembering preferences or learning from past sessions. This raises
    a key question: how can AI agents retain long-term context and continuity across
    interactions?'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，虽然STM非常适合快速问答式交互，但在记住偏好或从过去的会话中学习时却显得不足。这提出了一个关键问题：AI代理如何在与用户的交互中保持长期上下文和连续性？
- en: Long-term memory
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 长期记忆
- en: While STM handles the present, **long-term memory** (**LTM**) is about continuity
    over time. It allows agents to recall information across different sessions, enabling
    personalization, persistent knowledge, and better decision-making.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当STM处理当前情况时，**长期记忆**（**LTM**）则是关于时间上的连续性。它允许代理在不同会话中回忆信息，从而实现个性化、持久知识和更好的决策。
- en: LTM is typically backed by persistent storage systems—vector databases, knowledge
    graphs, or structured repositories. One of the most effective techniques here
    is **retrieval-augmented generation** (**RAG**), where an agent pulls in relevant
    knowledge from a stored base to inform its responses. This makes LTM essential
    for agents such as customer support assistants, recommendation engines, or personalized
    tutors.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: LTM通常由持久存储系统支持——向量数据库、知识图谱或结构化存储库。这里最有效的技术之一是**检索增强生成**（**RAG**），其中代理从存储库中拉入相关的知识来告知其回答。这使得LTM对于客户支持助手、推荐引擎或个性化导师等代理至关重要。
- en: Note that STM and LTM are related, as STM can eventually be flushed into LTM
    the moment it is no longer relevant for the user’s session (we will explore similar
    techniques in the upcoming section).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，STM和LTM是相关的，因为STM一旦对用户的会话不再相关，就可以被冲入LTM（我们将在下一节中探讨类似的技术）。
- en: '![Figure 4.2: Example of short-term memory pushed out into long-term memory](img/B32584_04_02.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图4.2：短期记忆推入长期记忆的示例](img/B32584_04_02.png)'
- en: 'Figure 4.2: Example of short-term memory pushed out into long-term memory'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2：短期记忆推入长期记忆的示例
- en: Within long-term memory, we can further break down three distinct subtypes that
    mirror human cognition.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在长期记忆中，我们可以进一步分解出三种不同的亚型，这些亚型反映了人类的认知。
- en: Semantic memory
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语义记忆
- en: Semantic memory stores general knowledge—facts, concepts, rules, and definitions.
    It’s the part of the system that “knows things,” enabling agents to reason, explain,
    and provide informed answers.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 语义记忆存储一般知识——事实、概念、规则和定义。它是系统中“知道事情”的部分，使代理能够推理、解释并提供有根据的答案。
- en: 'Note that, by design, LLMs come with parametric knowledge that already provides
    extensive knowledge of the world: they know physics, maths, general culture, and
    everything that has been encoded in any form of document publicly available on
    the internet. However, this knowledge might not be enough or relevant for our
    specific use case: what if we want our AI agent to have memory of all past diagnoses
    that we did in our healthcare center? Of course, this is something that could
    not be part of the training set and, henceforth, it’s not part of the parametric
    knowledge of the LLM powering our agent.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，按照设计，大型语言模型（LLM）已经包含了参数化知识，这些知识已经提供了对世界的广泛了解：它们知道物理学、数学、一般文化以及任何形式上公开在互联网上可用的文档中编码的一切。然而，这种知识可能对我们的特定用例来说可能不够或相关：如果我们想让我们的AI代理记住我们在医疗中心所做的所有过去诊断呢？当然，这可能是训练集的一部分，因此它不是我们代理所使用的LLM参数化知识的一部分。
- en: That’s why semantic memory is especially useful for agents operating in complex
    domains such as law, medicine, or finance, where factual correctness and domain
    understanding are critical.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，语义记忆对于在复杂领域（如法律、医学或金融）中运行的代理特别有用，在这些领域中，事实正确性和领域理解至关重要。
- en: In practice, semantic memory may be implemented via vector-encoded embeddings
    stored in a vector store, and the retrieval principle is similar to the concept
    of RAG explored in [*Chapter 1*](Chapter_01.xhtml#_idTextAnchor020).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，语义记忆可能通过存储在向量存储中的向量编码嵌入来实现，其检索原理与在[*第一章*](Chapter_01.xhtml#_idTextAnchor020)中探讨的RAG概念类似。
- en: '**Note**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Semantic memory can also be the final destination of a certain extent of the
    STM. In fact, some components or conversations in STM context windows may be worth
    preserving and, if this is the case, they can be vectorized and stored in the
    semantic memory’s vector database.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 语义记忆也可以是STM（短期记忆）的最终目的地到一定程度。事实上，STM上下文窗口中的某些组件或对话可能值得保留，如果这样，它们可以被矢量化并存储在语义记忆的向量数据库中。
- en: Episodic memory
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 情景记忆
- en: Episodic memory, in the context of the human brain, refers to the capability
    of recalling specific past events in which one personally participated. When it
    comes to AI, episodic memory would allow AI agents to store and retrieve memories
    of particular experiences or episodes from their interactions with the environment,
    rather than just general factual knowledge.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类大脑的背景下，情景记忆指的是回忆个人参与过的特定过去事件的能力。当涉及到人工智能时，情景记忆将使人工智能代理能够从其与环境交互中存储和检索特定经历或事件，而不仅仅是普遍的事实知识。
- en: For instance, an AI tutor might recall how a student answered a math problem
    last week and use that to adapt today’s lesson. This memory is often stored as
    structured logs or event histories that the agent can reference to make case-based
    decisions or adapt its behavior.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个人工智能导师可能会回忆起学生上周如何回答数学问题，并利用这一点来调整今天的课程。这种记忆通常以结构化日志或事件历史的形式存储，代理可以参考这些内容来做出基于案例的决定或调整其行为。
- en: In practice, episodic memory can be seen as an extension of the **few-shot prompting
    technique**.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，情景记忆可以被视为**少样本提示技术**的扩展。
- en: '**Definition**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: Few-shot prompting is a technique used in large language models where the model
    is provided with a small number (typically 2-5) of illustrative examples within
    the prompt itself. These examples help guide the model’s responses to better align
    with the desired task, without requiring extensive fine-tuning or training data.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示是一种在大规模语言模型中使用的技术，其中模型在提示本身中提供了少量（通常是2-5个）示例。这些示例有助于引导模型的响应，以更好地与所需任务对齐，而无需进行广泛的微调或训练数据。
- en: 'Here’s an example:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '`Task: Sentiment Analysis`'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：情感分析`'
- en: '`Example 1:`'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`示例 1：`'
- en: '`Text: "I loved this movie!"`'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`文本："我喜欢这部电影！"`'
- en: '`Sentiment: Positive`'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '`情感：积极`'
- en: '`Example 2:`'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '`示例 2：`'
- en: '`Text: "This movie was terrible."`'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '`文本："这部电影太糟糕了。"`'
- en: '`Sentiment: Negative`'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '`情感：负面`'
- en: '`Now classify the following text:`'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '`现在对以下文本进行分类：`'
- en: '`Text: "The movie was enjoyable overall, despite some flaws."`'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`文本："这部电影总体上很令人愉快，尽管有一些缺点。"`'
- en: '`Sentiment:`'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`情感：`'
- en: In this way, few-shot prompting leverages the model’s ability to quickly learn
    patterns from just a handful of examples, improving its performance on specific
    tasks without explicit retraining.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，少样本提示利用模型从少量示例中快速学习模式的能力，在不进行显式重新训练的情况下提高其在特定任务上的性能。
- en: In fact, by storing a set of pairs of (“user’s question,” “given answer”) or
    (“user’s question,” “performed task”), the AI agent can be guided through the
    correct way to perform specific actions.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，通过存储一组（“用户问题”，“给定答案”）或（“用户问题”，“执行任务”）的配对，人工智能代理可以被引导通过执行特定动作的正确方式。
- en: 'According to the paper *Episodic memory in AI agents poses risks that should
    be studied and mitigated* by Chad DeChant, implementing episodic memory in AI
    agents would allow significant enhancements, such as the following:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Chad DeChant的论文《人工智能代理中的情景记忆风险应进行研究并减轻》，在人工智能代理中实现情景记忆将允许以下显著的增强：
- en: '**Planning and decision making**: Memories provide building blocks to form
    new strategies or plans by recalling similar previous experiences and outcomes'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划和决策**：通过回忆类似的前期经验和结果，记忆提供构建新策略或计划的基本块'
- en: '**Improved learning**: AI agents can better adapt to new scenarios by reflecting
    on past events and their outcomes, identifying patterns and learning from mistakes'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进学习**：人工智能代理可以通过反思过去的事件及其结果，识别模式并从错误中学习，更好地适应新场景'
- en: '**Problem solving**: Episodic memory provides examples from past scenarios
    to help solve current problems by analogy or recombination of past solutions'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题解决**：情景记忆通过类比或组合过去的解决方案提供过去场景的例子，帮助通过类比或重组过去的解决方案来解决当前问题'
- en: '**Prediction and imagination**: Just as humans mentally simulate future scenarios
    based on past events, AI agents could use episodic memory to predict possible
    outcomes'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测和想象**：正如人类根据过去的事件在心理上模拟未来场景一样，人工智能代理可以使用情景记忆来预测可能的后果。'
- en: 'However, the author also highlights some potential risks associated with episodic
    memory:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，作者也指出了与情景记忆相关的潜在风险：
- en: '**Deception**: Agents could leverage episodic memories to carry out complex
    deception, by recalling past interactions and strategically manipulating future
    ones'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺骗**：智能体可以利用情景记忆来执行复杂的欺骗行为，通过回忆过去的交互并策略性地操纵未来的交互。'
- en: '**Unwanted knowledge retention**: Agents could retain and recall information
    that users wish to keep private, posing significant privacy risks'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不希望保留的知识**：智能体可能会保留和回忆用户希望保持私密的个人信息，这可能导致重大的隐私风险。'
- en: '**Unpredictable behaviors**: As agents reuse past experiences to form future
    actions, it may be difficult to predict how certain stored memories could influence
    future behaviors, potentially leading to unintended consequences'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不可预测的行为**：随着代理重复使用过去经验来形成未来行为，可能难以预测某些存储的记忆如何影响未来的行为，这可能导致意外的后果。'
- en: '**Enhanced situational awareness**: Improved memory capabilities could enable
    AI to better understand and adapt to its operational environment, possibly escaping
    controls or audits intended to ensure safety'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强情境意识**：改进的记忆能力可能使人工智能更好地理解和适应其操作环境，可能逃避旨在确保安全性的控制或审计。'
- en: Despite the potential risks associated with integrating episodic memory into
    AI agents, the overall capability remains highly promising. The paper emphasizes
    that these risks can be significantly mitigated through carefully designed containment
    strategies and safety principles, such as ensuring human interpretability of memories,
    providing user control to add or delete memories, isolating memory storage, and
    restricting AI agents from editing their own memories.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管将情景记忆集成到人工智能代理中存在潜在风险，但整体能力仍然非常有前景。论文强调，这些风险可以通过精心设计的遏制策略和安全原则得到显著缓解，例如确保记忆的可解释性、提供用户控制以添加或删除记忆、隔离记忆存储以及限制人工智能代理编辑自己的记忆。
- en: '**Note**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'In both human cognition and AI systems, episodic and semantic memory serve
    different purposes:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类认知和人工智能系统中，情景记忆和语义记忆有不同的用途：
- en: Episodic memory is like a personal diary. It stores “what happened”—specific
    events, interactions, and experiences tied to a time and place. For AI, this could
    mean remembering a particular user’s complaint or the steps taken during a failed
    process.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 情景记忆就像个人日记。它存储“发生了什么”——与特定时间、地点相关联的具体事件、交互和经历。对于人工智能来说，这可能意味着记住某个用户的投诉或失败过程中采取的步骤。
- en: Semantic memory is more like an encyclopedia. It stores “what is known”—general
    facts, concepts, and rules independent of context. For an AI agent, this might
    include product specifications, policy rules, or domain knowledge.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 语义记忆更像是一部百科全书。它存储“已知的内容”——独立于上下文的一般事实、概念和规则。对于人工智能代理来说，这可能包括产品规格、政策规则或领域知识。
- en: 'Keeping these two types of memory distinct allows agents to reason more effectively:
    they can draw on past events when needed while relying on established knowledge
    for consistency and accuracy.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 保持这两种记忆类型区分开来，使代理能够更有效地推理：当需要时，他们可以借鉴过去的事件，同时依靠既定的知识来保持一致性和准确性。
- en: 'Typically, AI agents capture episodic memories by logging interactions, which
    typically include the following:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，人工智能代理通过记录交互来捕捉情景记忆，这些交互通常包括以下内容：
- en: '**User inputs**: The queries or commands provided by the user'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户输入**：用户提供的查询或命令。'
- en: '**Agent responses**: The actions or replies generated by the AI'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理响应**：人工智能生成的动作或回复。'
- en: '**Contextual metadata**: Additional information such as timestamps, user identifiers,
    and environmental context'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文元数据**：如时间戳、用户标识符和环境上下文等附加信息。'
- en: 'These interactions are stored in structured formats within databases. Common
    storage solutions include the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这些交互存储在数据库中的结构化格式中。常见的存储解决方案包括以下几种：
- en: '**Relational databases**: Systems such as SQLite and PostgreSQL are used to
    store structured logs of interactions'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关系数据库**：如SQLite和PostgreSQL等系统用于存储交互的结构化日志。'
- en: '**Vector databases**: Tools such as Pinecone, Weaviate, and Chroma store embeddings
    (numerical representations) of interactions, facilitating efficient similarity-based
    retrieval'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量数据库**：如Pinecone、Weaviate和Chroma等工具存储交互的嵌入（数值表示），从而促进基于相似性的高效检索。'
- en: 'When an AI agent needs to recall past experiences to inform current decisions,
    it performs the following steps:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个AI代理需要回忆过去的经验来指导当前决策时，它会执行以下步骤：
- en: '**Query embedding**: The current user input is converted into an embedding'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查询嵌入**：当前用户输入被转换为嵌入'
- en: '**Similarity search**: This embedding is compared against stored embeddings
    in the vector database to find the most relevant past interactions'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相似性搜索**：此嵌入与向量数据库中存储的嵌入进行比较，以找到最相关的过去交互'
- en: '**Contextual injection**: Retrieved memories are incorporated into the agent’s
    current context, often through prompt engineering, to influence response generation'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文注入**：检索到的记忆被纳入代理的当前上下文中，通常通过提示工程来实现，以影响响应生成'
- en: This process enables the agent to adapt its behavior based on prior experiences,
    enhancing personalization and continuity in interactions.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程使代理能够根据以往的经验调整其行为，从而增强交互中的个性化和连续性。
- en: Procedural memory
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 程序记忆
- en: 'The final memory we need to mention is procedural memory. For us, this type
    of long-term memory is responsible for storing *how* to do things, such as remembering
    how to ride a bike or tie our shoes—skills that, once learned, can be performed
    without conscious thought. In the context of AI agents, procedural memory serves
    a similar function: it encodes the foundational “know-how” that governs an agent’s
    behavior. For example, in self-driving cars, procedural memory enables the execution
    of navigation routines and obstacle avoidance without reevaluating each decision
    from scratch.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要提到的最后一个记忆是程序记忆。对我们来说，这种长期记忆负责存储*如何*做事情，例如记住如何骑自行车或系鞋带——一旦学会，就可以在没有意识思考的情况下执行。在AI代理的背景下，程序记忆发挥着类似的作用：它编码了控制代理行为的“知道如何”的基础知识。例如，在自动驾驶汽车中，程序记忆使导航程序和障碍物避让得以执行，而无需从头开始重新评估每个决策。
- en: 'According to the CoALA framework proposed in the *Cognitive Architectures for
    Language Agents* paper, procedural memory in agents consists of two main components:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 根据在《*认知架构语言代理*》论文中提出的CoALA框架，代理的程序记忆由两个主要组件组成：
- en: The **LLM weights**, which encode vast amounts of procedural knowledge implicitly—such
    as language usage, reasoning patterns, and world models
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM权重**，它隐式地编码了大量的程序知识，例如语言使用、推理模式和世界模型'
- en: The **agent code,** which explicitly defines procedures such as prompt construction,
    retrieval mechanisms, grounding routines, and decision-making logic
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理代码**，它明确定义了诸如提示构造、检索机制、地面化程序和决策逻辑等程序'
- en: In essence, procedural memory is encoded in the architecture of the model. As
    such, most current AI agents treat this memory as static (different from human
    procedural memory, which can adapt over time through experience). The LLM’s weights
    remain unchanged during deployment, and the agent code is rarely rewritten by
    the agent itself.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，程序记忆编码在模型的架构中。因此，大多数当前的AI代理将这种记忆视为静态的（与人类程序记忆不同，人类程序记忆可以通过经验随着时间的推移进行适应）。LLM的权重在部署期间保持不变，代理代码很少被代理本身重写。
- en: '**Note**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: It is theoretically possible to create agents that can automatically update
    their *own* source code—especially to its set of skills (by coding new skills,
    for example) or decision-making logic. On the other hand, in-the-wild LLM fine-tuning
    (i.e., modifying weights) remains uncommon due to high costs, complexity, and
    safety concerns.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 从理论上讲，可以创建能够自动更新其*自身*源代码的代理——特别是更新其技能集（例如通过编码新技能）或决策逻辑。另一方面，由于成本高、复杂性和安全问题，野外的LLM微调（即修改权重）仍然不常见。
- en: A more practical and observed behavior is agents modifying their **system messages**—essentially
    updating the instructions they give themselves to guide behavior. This approach
    offers a lightweight form of procedural adaptation, though it’s still limited
    in scope and underutilized in most current systems.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更实际且观察到的行为是代理修改他们的**系统消息**——本质上是在更新他们给予自己的指令以引导行为。这种方法提供了一种轻量级的程序适应性，尽管它在范围和当前系统中的利用率仍然有限。
- en: 'Each type of memory we have covered plays a unique role in shaping the agent’s
    intelligence, from enabling action to informing decisions and learning from the
    past (refer to Table 4.1 below):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所涵盖的每种类型的记忆都在塑造代理智能方面发挥着独特的作用，从使行动成为可能到提供决策信息和从过去学习（参见表4.1以下）：
- en: '| **Memory Type** | **Purpose** | **Content** | **Storage Mechanism** | **Usage
    Example** | **Update Mechanism** |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| **记忆类型** | **目的** | **内容** | **存储机制** | **使用示例** | **更新机制** |'
- en: '| Semantic | Stores general world knowledge and facts | Abstract concepts,
    definitions, and relationships (e.g., “Paris is the capital of France”) | Knowledge
    bases, vector databases, or embedded within model parameters | Retrieving factual
    information or domain-specific knowledge | Updated through training on structured
    data or manual input |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
  zh: '| 语义 | 存储一般世界知识和事实 | 抽象概念、定义和关系（例如，“巴黎是法国的首都”） | 知识库、向量数据库或嵌入在模型参数中 | 获取事实信息或特定领域的知识
    | 通过在结构化数据上训练或手动输入进行更新 |'
- en: '| Episodic | Records specific events and experiences | Contextual details of
    past interactions (e.g., a user’s previous queries) | Logs, databases, or structured
    memory stores | Personalizing responses based on user history | Captured during
    interactions; may involve user feedback |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| 事件性 | 记录特定的事件和经验 | 过去交互的上下文细节（例如，用户的先前查询） | 日志、数据库或结构化内存存储 | 根据用户历史记录个性化响应
    | 在交互过程中捕获；可能涉及用户反馈 |'
- en: '| Procedural | Encodes how-to knowledge and skills | Sequences of actions or
    routines (e.g., steps to process a user request) | Embedded in code, model weights,
    or defined workflows | Executing tasks such as authentication or data processing
    | Refined through training, reinforcement learning, or manual updates |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| 程序性 | 编码如何知识和技能 | 行动序列或常规（例如，处理用户请求的步骤） | 内置于代码、模型权重或定义的工作流程中 | 执行如身份验证或数据处理等任务
    | 通过训练、强化学习或手动更新进行优化 |'
- en: 'Table 4.1: Types of memory with usage and examples'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.1：内存类型及其用法示例
- en: Together, they form the backbone of an agent’s persistent capabilities and accumulated
    knowledge.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 它们共同构成了代理持久能力及其累积知识的骨架。
- en: 'We’ve covered long- and short-term memory; however, there is a third category
    that is worth mentioning: semantic in-memory cache.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了长期和短期记忆；然而，还有一个第三类值得提及：语义内存缓存。
- en: In between short-term memory and long-term memory – the role of semantic caches
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在短期记忆和长期记忆之间——语义缓存的作用
- en: Between the immediacy of STM and the durability of LTM, **semantic caches**
    offer a nimble, high-speed layer for retrieving recent information based on meaning.
    These caches operate by storing recent interactions as vector embeddings, enabling
    **semantic similarity search** within the current session—without needing to query
    or persist data in long-term stores.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在STM（短期记忆）的即时性和LTM（长期记忆）的持久性之间，**语义缓存**提供了一个灵活、高速的层，用于根据意义检索最近的信息。这些缓存通过将最近交互作为向量嵌入存储，允许在当前会话内进行**语义相似度搜索**，而无需查询或持久化长期存储中的数据。
- en: '**Note**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: In traditional application development, an in-memory cache is a temporary storage
    layer that holds frequently accessed data in memory (typically RAM) to reduce
    latency and improve performance. Instead of repeatedly querying a database or
    external API for the same data, the application retrieves it from the cache—enabling
    much faster access. Tools such as Redis, Memcached, and in-memory layers in app
    frameworks are commonly used for this purpose.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的应用程序开发中，内存缓存是一种临时存储层，它将频繁访问的数据存储在内存中（通常是RAM），以减少延迟并提高性能。应用程序不是反复查询数据库或外部API以获取相同的数据，而是从缓存中检索它——从而实现更快的访问。Redis、Memcached以及应用程序框架中的内存层等工具通常用于此目的。
- en: These caches typically operate on key-value pairs—you store a result using a
    unique key and retrieve it by referencing that key later. This is extremely efficient
    for scenarios such as storing user sessions, API responses, or computed values
    that don’t change frequently.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这些缓存通常基于键值对操作——您使用一个唯一的键存储结果，稍后通过引用该键检索它。这在存储用户会话、API响应或不太频繁更改的计算值等场景中非常高效。
- en: In the context of AI agents and, more broadly, LLM-powered apps, the concept
    is similar, but the key-value pairs are based on embeddings so that the retrieval
    can happen through a vector search rather than a keyword match.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI代理和更广泛的LLM（大型语言模型）驱动应用程序的背景下，概念类似，但键值对基于嵌入，以便检索可以通过向量搜索而不是关键字匹配来实现。
- en: 'In *Figure 4.3*, you can see an example of the difference between a keyword
    and a semantic in-memory cache:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图4.3*中，您可以看到一个关键字和语义内存缓存之间区别的示例：
- en: '![Figure 4.3: Difference between keyword and semantic in-memory cache](img/B32584_04_03.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图4.3：关键字和语义内存缓存的区别](img/B32584_04_03.png)'
- en: 'Figure 4.3: Difference between keyword and semantic in-memory cache'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3：关键字和语义内存缓存的区别
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能不正确。](img/11.png)**快速提示**：需要查看此图像的高分辨率版本？在下一代Packt Reader中打开此书或在其PDF/ePub副本中查看。'
- en: '![](img/21.png)**The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR go to packtpub.com/unlock, then use
    the search bar to find this book by name. Double-check the edition shown to make
    sure you get the right one.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png)**新一代Packt Reader**随本书免费赠送。扫描二维码或访问packtpub.com/unlock，然后使用搜索栏通过名称查找此书。仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/The_next-gen_Packt_Reader_QR_Code.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能不正确。](img/The_next-gen_Packt_Reader_QR_Code.png)'
- en: Unlike STM, which relies on the model’s token context window, and unlike LTM,
    which is designed for durable memory across sessions, a semantic cache is session-scoped,
    transient, and fast. It’s not designed to retain knowledge or events over time
    but rather to help the agent surface relevant context dynamically during an ongoing
    interaction—even if phrased differently from how it was originally expressed.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 与依赖于模型标记上下文窗口的STM不同，与为跨会话持久记忆设计的LTM不同，语义缓存是会话范围的、短暂的、快速的。它不是为了保留知识或事件随时间推移，而是为了帮助代理在持续交互中动态地呈现相关上下文——即使表达方式与最初不同。
- en: This real-time recall is made possible by vector-enabled databases designed
    specifically for semantic retrieval. Tools such as Cosmos DB with integrated vector
    indexing, Pinecone, Weaviate, and Qdrant allow developers to store and query embeddings
    with low latency. These systems support features such as in-memory search, filtering
    by metadata, and scoring based on relevance and recency—making them ideal for
    implementing semantic caches.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这种实时召回是由专门为语义检索设计的向量数据库实现的。例如，具有集成向量索引的Cosmos DB、Pinecone、Weaviate和Qdrant等工具允许开发者以低延迟存储和查询嵌入。这些系统支持内存搜索、按元数据过滤和基于相关性和最近性评分等功能——使它们非常适合实现语义缓存。
- en: For example, during a patient scheduling flow, if the user previously said “Afternoons
    work best,” and later asks “Do you have anything post 3 pm?”, a semantic cache
    can retrieve and match the prior statement—even if it’s no longer in the context
    window. This enables agents to maintain coherence and context-awareness without
    incurring additional token costs.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在患者排程流程中，如果用户之前说“下午最适合”，后来询问“你有3点之后的安排吗？”，语义缓存可以检索并匹配之前的声明——即使它已不在上下文窗口中。这使得代理能够保持连贯性和上下文意识，而无需承担额外的标记成本。
- en: In practice, semantic caches serve as an intelligent short-term recall layer,
    empowering agents to remain responsive, semantically fluent, and efficient—all
    without a long-term commitment. They don’t replace STM or LTM, but they complement
    them by enabling low-latency, relevance-driven memory within the flow of conversation.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，语义缓存充当智能短期召回层，使代理能够保持响应、语义流畅和高效——而无需长期承诺。它们不取代STM或LTM，而是通过在对话流程中实现低延迟、相关性驱动的记忆来补充它们。
- en: In the next section, we’ll turn our attention to STM—how agents hold and manipulate
    active information during decision-making. This is where perception, reasoning,
    and context come together in real time.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将关注STM——代理在决策过程中如何保持和操作活动信息。这是感知、推理和上下文实时结合的地方。
- en: Managing context windows
  id: totrans-118
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理上下文窗口
- en: When it comes to STM (or working memory), the concept of a **context window**
    is pivotal. It defines the maximum span of text—measured in tokens—that a model
    can process simultaneously. This window allows the model to “remember” and utilize
    a specific segment of information when generating responses so that the user doesn’t
    have to repeat contextual information.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到STM（或工作记忆）时，**上下文窗口**的概念至关重要。它定义了模型可以同时处理的文本最大跨度——以标记为单位。这个窗口允许模型在生成响应时“记住”并利用特定信息段，这样用户就不必重复上下文信息。
- en: Despite the increase in the maximum number of tokens that the latest LLMs can
    handle (up to 128K tokens for models such as GPT-4o), managing context windows
    presents challenges. When the input exceeds the model’s context window, the model
    may struggle to maintain coherence and relevance, as it cannot access earlier
    parts of the text. This limitation can lead to outputs that lack context or continuity,
    especially in tasks requiring the processing of extensive documents or prolonged
    dialogues.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管最新的大型语言模型（LLM）可以处理的最大令牌数量有所增加（例如GPT-4o模型可达128K个令牌），但管理上下文窗口仍然存在挑战。当输入超过模型的上下文窗口时，模型可能难以保持连贯性和相关性，因为它无法访问文本的早期部分。这种限制可能导致输出缺乏上下文或连续性，尤其是在需要处理大量文档或长时间对话的任务中。
- en: 'Consequently, we need to properly design the handling of context windows. There
    are numerous techniques in this landscape, and in this section, we are going to
    examine some of the most popular ones:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要正确设计上下文窗口的处理。在这个领域有许多技术，在本节中，我们将探讨其中一些最受欢迎的：
- en: '**Sliding window**: The sliding window technique manages short-term memory
    by maintaining a fixed-size window of recent messages and updating it dynamically.
    First, it is essential to determine the window size, either by fixing the number
    of recent messages or setting a token limit based on system constraints and the
    desired response quality. The window is then updated dynamically by discarding
    the oldest messages as new ones arrive to maintain its size. For example, if we
    set our sliding window to keep 4 messages at a time (which are typically set in
    terms of the number of tokens we want to retain), we will have something similar
    to the following:'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**滑动窗口**：滑动窗口技术通过维护一个固定大小的近期消息窗口并动态更新它来管理短期记忆。首先，确定窗口大小至关重要，可以通过固定近期消息的数量或根据系统约束和期望的响应质量设置基于令牌的限制。然后，随着新消息的到来，通过丢弃最旧的消息来动态更新窗口，以保持其大小。例如，如果我们设置滑动窗口以同时保留4条消息（这通常以我们想要保留的令牌数量来设定），我们将有类似以下的内容：'
- en: '![Figure 4.4: Example of short-term memory sliding window](img/B32584_04_04.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图4.4：短期记忆滑动窗口示例](img/B32584_04_04.png)'
- en: 'Figure 4.4: Example of short-term memory sliding window'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4：短期记忆滑动窗口示例
- en: This process shifts the window forward, retaining only the current relevant
    information.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程将窗口向前移动，仅保留当前的相关信息。
- en: '**Editing message lists**:Editing message lists is an extension of the sliding
    window approach, with the possibility of being more granular in deciding which
    messages to preserve. It involves selectively trimming or filtering messages before
    they’re processed by the LLM powering your agent. For example, imagine an AI customer
    support agent helping a user troubleshoot a software issue. Over a 20-message
    back-and-forth, only the last few messages are directly relevant to the user’s
    latest request. Instead of feeding all 20 messages to the LLM (which may exceed
    the token limit), the system selectively keeps the following:'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑消息列表**：编辑消息列表是滑动窗口方法的扩展，可以更细致地决定保留哪些消息。它涉及在LLM处理之前有选择地修剪或过滤消息。例如，想象一个AI客户支持代理帮助用户解决软件问题。在20条消息的来回中，只有最后几条消息与用户的最新请求直接相关。而不是将所有20条消息都输入到LLM（这可能会超过令牌限制），系统有选择地保留以下内容：'
- en: The user’s most recent question
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户最近提出的问题
- en: The assistant’s last 1–2 responses
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 助手的最后1-2个回复
- en: An earlier message with critical context (e.g., the user’s OS version)
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一条包含关键上下文的信息（例如，用户的操作系统版本）
- en: All other small talk or redundant questions are trimmed out. This ensures the
    model focuses only on the most pertinent details within the context window.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 所有其他闲聊或冗余问题都被修剪掉。这确保模型只关注上下文窗口中最相关的细节。
- en: 'In practice, you will need to establish explicit rules or guidelines to determine
    which messages should be retained or discarded. Common criteria include the following:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，您需要建立明确的规则或指南来确定哪些消息应该保留或丢弃。常见的标准包括以下内容：
- en: '**Recency (which is a form of sliding window)**: Prioritize recent messages
    to maintain relevant context'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**近期性（这是一种滑动窗口的形式）**：优先考虑近期消息以保持相关上下文'
- en: '**Relevance**: Retain messages directly related to the current query or task
    (this “assessment” might be performed by another LLM assessing the relevancy,
    thanks to a specific system prompt)'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性**：保留与当前查询或任务直接相关的消息（这种“评估”可能由另一个LLM通过特定的系统提示进行）'
- en: '**Sender**: Retain only messages coming from a specific sender (either the
    user or one agent)'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发送者**：仅保留来自特定发送者的消息（无论是用户还是某个代理）'
- en: The level of detail of your filter will depend on the metadata associated to
    each and every message in your chat window.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你的过滤器详细程度将取决于你聊天窗口中每条消息关联的元数据。
- en: 'For example, we could decide only to keep messages coming from the user sent
    in the last 5 minutes:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可能决定只保留用户在最后5分钟内发送的消息：
- en: '![Figure 4.5: Example of editing short-term memory message list](img/B32584_04_05.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图4.5：编辑短期记忆消息列表的示例](img/B32584_04_05.png)'
- en: 'Figure 4.5: Example of editing short-term memory message list'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.5：编辑短期记忆消息列表的示例
- en: As we will see in the hands-on chapters, frameworks such as LangGraph provide
    an out-of-the-box, very detailed metadata structure associated with your message,
    so that you can apply filters on it very granularly.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在实践章节中将要看到的，LangGraph等框架提供了一种现成的、非常详细的与你的消息相关的元数据结构，这样你可以非常细致地对其应用过滤器。
- en: 'For example, in the preceding example, a potential set of metadata could be
    the following:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在前面的例子中，一个潜在的元数据集可能如下所示：
- en: '[PRE0]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Summarization**: Summarization is the process of condensing extensive conversation
    histories or lengthy documents into concise, focused overviews. This technique
    captures essential points and key information, significantly reducing the number
    of tokens required while preserving the critical context.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**摘要**：摘要是将广泛的对话历史或长篇文档压缩成简洁、集中的概述的过程。这项技术捕捉了关键点和关键信息，显著减少了所需的标记数量，同时保留了关键上下文。'
- en: '![Figure 4.6: Example of summarizing short-term memory messages](img/B32584_04_06.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图4.6：总结短期记忆消息的示例](img/B32584_04_06.png)'
- en: 'Figure 4.6: Example of summarizing short-term memory messages'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6：总结短期记忆消息的示例
- en: In practice, the summary is generated by the LLM itself and passed as a parameter
    in that portion of the system message that tells the agent how to handle the short-term
    memory.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，摘要是由LLM本身生成的，并作为系统消息的一部分参数传递，告诉代理如何处理短期记忆。
- en: '**Note**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Besides the specific technique we are going to employ, it is important to know
    when we want to apply this technique—for example, when the number of tokens of
    the STM reaches a given amount (which we can set close to the maximum number of
    tokens handled by the LLM we are using). By performing token checking, we make
    sure that, when the token count approaches the limit, the selected strategy (such
    as summarization or message editing) is enforced.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 除了我们将要采用的具体技术外，了解我们何时想要应用这项技术也很重要——例如，当STM的标记数达到一定的数量（我们可以将其设置为我们使用的LLM可以处理的标记数的最大值附近）。通过执行标记检查，我们确保当标记计数接近限制时，选定的策略（如摘要或消息编辑）得到执行。
- en: The preceding techniques are key to handling STM context windows; however, they
    might not be enough. In fact, depending on the kind of AI agent you are developing,
    you might need to keep and store working memories for a longer period of time,
    beyond the user’s session.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的技术是处理STM上下文窗口的关键；然而，它们可能并不足够。实际上，根据你正在开发的AI代理类型，你可能需要保留和存储工作记忆更长的时间，超出用户的会话时间。
- en: In the next section, we are going to see how to handle similar scenarios.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将看到如何处理类似的场景。
- en: Storing, retrieving, and refreshing memory
  id: totrans-150
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 存储和检索记忆
- en: Moving information from STM to LTM in AI agents is essential for retaining context
    across sessions and enabling learning over time. This process typically involves
    identifying relevant facts, user preferences, or insights from recent interactions
    and storing them in a structured, retrievable format.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI代理中，将信息从STM移动到LTM对于在会话间保留上下文并允许随时间学习至关重要。这个过程通常涉及识别相关事实、用户偏好或从最近交互中获得的见解，并将它们存储在结构化、可检索的格式中。
- en: Long-term memory can be implemented in various ways, depending on the use case.
    One common approach is to use vector databases for semantic storage—where chunks
    of information are embedded into vectors and stored for similarity-based retrieval,
    often in conjunction with RAG. This allows the system to recall contextually relevant
    data even if it’s not part of the immediate prompt.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 长期记忆可以根据用例以各种方式实现。一种常见的方法是使用向量数据库进行语义存储——其中信息块被嵌入到向量中并存储，以便基于相似性检索，通常与RAG结合使用。这允许系统回忆与上下文相关的数据，即使它不是即时提示的一部分。
- en: The stored information can also be organized as structured metadata (such as
    user profiles or preferences) or appended as factual entries to a broader knowledge
    base.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 存储的信息也可以组织为结构化元数据（如用户资料或偏好）或作为事实条目附加到更广泛的知识库中。
- en: Note that this approach can be coupled with the vector store one. This hybrid
    approach allows the system to first filter relevant information using explicit,
    structured fields—such as user ID, topic tags, or timestamps—and then apply semantic
    vector search within that filtered subset. For example, in a multi-user application,
    the agent can first retrieve only the documents associated with a specific user,
    ensuring that the context is scoped correctly.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这种方法可以与向量存储方法相结合。这种混合方法允许系统首先使用显式、结构化的字段（如用户ID、主题标签或时间戳）过滤相关信息，然后在过滤后的子集中应用语义向量搜索。例如，在多用户应用程序中，代理可以首先仅检索与特定用户关联的文档，确保上下文正确。
- en: '![Figure 4.7: Example of hybrid memory retrieval, combining filters with vector
    search](img/B32584_04_07.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图4.7：混合记忆检索示例，结合过滤与向量搜索](img/B32584_04_07.png)'
- en: 'Figure 4.7: Example of hybrid memory retrieval, combining filters with vector
    search'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.7：混合记忆检索示例，结合过滤与向量搜索
- en: Once the relevant slice of memory is isolated, a vector similarity search can
    surface the most contextually appropriate pieces of information based on the current
    query. This layered method increases both precision and relevance, enabling more
    accurate and personalized responses. It also improves performance by narrowing
    the search space before invoking the more computationally expensive vector similarity
    operations.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦隔离了相关的记忆片段，基于当前查询，向量相似度搜索可以展示最符合上下文的信息片段。这种分层方法提高了精确度和相关性，使得响应更加准确和个性化。它还通过在调用更计算密集的向量相似度操作之前缩小搜索空间来提高性能。
- en: Ultimately, we need to consider how to manage our memory in the long run. Refreshing
    and updating memory in AI agents involves periodically reviewing and modifying
    stored knowledge to ensure it remains relevant, accurate, and useful. This process
    can be both reactive, triggered by specific interactions or changes, or proactive,
    scheduled as a background task.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我们需要考虑如何长期管理我们的记忆。在人工智能代理中刷新和更新记忆涉及定期审查和修改存储的知识，以确保其保持相关性、准确性和有用性。这个过程可以是反应性的，由特定的交互或变化触发，也可以是主动的，作为后台任务安排。
- en: Memory updates can be implemented either at the working memory layer in real
    time, or asynchronously in the background for the long-term memory. For example,
    if a user changes a preference or corrects the agent, that data can immediately
    overwrite or amend the corresponding entry in memory.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆更新可以在工作记忆层实时实现，也可以异步地在后台为长期记忆实现。例如，如果用户更改偏好或纠正代理，这些数据可以立即覆盖或修改内存中相应的条目。
- en: '![Figure 4.8: Example of editing memory in the context of a user session](img/B32584_04_08.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图4.8：用户会话上下文中编辑记忆的示例](img/B32584_04_08.png)'
- en: 'Figure 4.8: Example of editing memory in the context of a user session'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.8：用户会话上下文中编辑记忆的示例
- en: On the other hand, agents can also periodically review accumulated interactions
    to refine summaries, restructure profiles, or remove outdated facts.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，代理也可以定期回顾累积的交互，以完善摘要、重构个人资料或删除过时的信息。
- en: A common technique for refreshing semantic memory is to regenerate embeddings
    of updated documents and replace the old vectors in the database. For structured
    metadata, updates might involve overwriting fields in a user profile or adjusting
    scores and counters that reflect user behavior over time. By combining both real-time
    and background refresh strategies, and allowing for both semantic and structured
    updates, AI agents can maintain a memory system that evolves in tandem with user
    needs and application dynamics—ensuring that the information they rely on stays
    both current and contextually accurate.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 刷新语义记忆的常见技术是重新生成更新文档的嵌入，并替换数据库中的旧向量。对于结构化元数据，更新可能涉及覆盖用户资料中的字段或调整反映用户随时间行为得分的分数和计数器。通过结合实时和后台刷新策略，并允许语义和结构化更新，人工智能代理可以维护一个与用户需求和应用程序动态同步演变的记忆系统——确保他们依赖的信息既保持最新又符合上下文。
- en: Temporal and spatial reasoning in AI agents
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能代理中的时空推理
- en: 'For AI agents to operate effectively in dynamic environments, they must possess
    the ability to understand and reason about temporal sequences and spatial contexts.
    This involves not only recalling past events but also anticipating future occurrences
    based on learned patterns. Let’s see some examples:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使AI代理在动态环境中有效运作，它们必须具备理解和推理时间序列和空间环境的能力。这不仅包括回忆过去的事件，还包括根据学习到的模式预测未来的发生。让我们看看一些例子：
- en: '**Utilizing time-sequenced events**: Temporal reasoning enables agents to process
    events in chronological order, allowing them to understand cause-and-effect relationships
    and predict subsequent actions. For instance, in a customer service chatbot, recognizing
    that a user previously inquired about a product’s availability can inform the
    agent to proactively provide updates or related information in future interactions.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用时间序列事件**：时间推理使智能体能够按时间顺序处理事件，从而让他们能够理解因果关系并预测后续行为。例如，在一个客户服务聊天机器人中，识别到用户之前曾询问过产品可用性，可以告知代理在未来的交互中主动提供更新或相关信息。'
- en: In reinforcement learning scenarios, agents benefit from temporal reasoning
    by recalling sequences of actions that led to successful outcomes, thereby refining
    their strategies over time.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习场景中，代理通过回忆导致成功结果的行为序列，从而随着时间的推移改进他们的策略，从而受益于时间推理。
- en: '**Referencing past interactions**: By maintaining a history of interactions,
    agents can personalize responses and maintain continuity in conversations. This
    episodic memory allows for more natural and context-aware engagements, as the
    agent can reference specific details from prior exchanges, enhancing user experience
    and trust.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**引用过去交互**：通过维护交互历史，代理可以个性化响应并保持对话的连贯性。这种情景记忆允许更自然和上下文感知的参与，因为代理可以引用先前交换中的具体细节，从而提升用户体验和信任。'
- en: '**Managing temporal decay**: Just as humans tend to forget information that
    is not reinforced, AI agents must also manage the relevance of stored information
    over time. Implementing temporal decay mechanisms ensures that outdated or less
    pertinent data does not clutter the agent’s memory, allowing for more efficient
    processing and retrieval of relevant information.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理时间衰减**：正如人类倾向于忘记未被加强的信息一样，AI代理也必须随着时间的推移管理存储信息的相关性。实施时间衰减机制确保过时或不那么相关的数据不会使代理的记忆杂乱无章，从而允许更有效地处理和检索相关信息。'
- en: 'Here are the strategies for managing temporal decay:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是管理时间衰减的策略：
- en: '**Time-aware retrieval**: Prioritizing recent and frequently accessed information
    during decision-making processes. For example, the agent can attach timestamps
    to each memory and use recency scoring during retrieval. Vector stores may decay
    embeddings over time or apply filters to retrieve only recent entries.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间感知检索**：在决策过程中优先考虑最近和频繁访问的信息。例如，代理可以为每个记忆附加时间戳并在检索期间使用最近度评分。向量存储可能会随着时间的推移衰减嵌入，或应用过滤器以仅检索最近条目。'
- en: '**Reinforcement mechanisms**: Strengthening the retention of information that
    is repeatedly accessed or deemed important, while allowing less critical data
    to fade. For example, you can enforce a mechanism to track access frequency and
    apply a reinforcement signal (e.g., boosting vector similarity scores or tagging
    them as “pinned”). These can be managed through custom retrieval logic or hybrid
    RAG pipelines.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化机制**：加强重复访问或被认为重要的信息的保留，同时允许不那么关键的数据逐渐消失。例如，您可以实施一种机制来跟踪访问频率并应用强化信号（例如，提升向量相似度分数或将其标记为“固定”）。这些可以通过自定义检索逻辑或混合RAG管道进行管理。'
- en: '**Memory pruning**: Regularly evaluating and removing obsolete information
    to optimize memory usage and maintain system performance. For example, you can
    have LLMs or memory managers periodically evaluate memory entries using criteria
    such as age, access frequency, and relevance. Low-value items are either archived
    or deleted to optimize memory usage and latency.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆修剪**：定期评估和删除过时信息以优化内存使用并维持系统性能。例如，您可以让LLM或内存管理器定期使用诸如年龄、访问频率和相关性等标准评估内存条目。低价值项要么存档要么删除，以优化内存使用和延迟。'
- en: By effectively managing temporal decay, AI agents can maintain a balance between
    retaining useful information and discarding irrelevant data, leading to more accurate
    and contextually appropriate responses.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有效地管理时间衰减，AI代理可以在保留有用信息和丢弃无关数据之间保持平衡，从而产生更准确和上下文相关的响应。
- en: Popular tools to manage memory
  id: totrans-175
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理记忆的流行工具
- en: As we saw in this chapter, equipping AI agents with sophisticated memory systems
    is vital for delivering personalized and coherent user experiences, especially
    over long or recurring interactions.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在本章中看到的，为AI智能体配备复杂的记忆系统对于提供个性化的连贯用户体验至关重要，尤其是在长时间或重复的交互中。
- en: Popular AI orchestrators such as LangChain, LangGraph, Semantic Kernel, and
    so on, provide pre-built libraries to make it easier to manage both STM and LTM.
    However, some applications might require complex memory management, which might
    become cumbersome by solely relying on the above-mentioned frameworks.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 流行的AI编排器，如LangChain、LangGraph、Semantic Kernel等，提供了预构建的库，以简化STM和LTM的管理。然而，某些应用程序可能需要复杂的内存管理，仅依靠上述框架可能会变得繁琐。
- en: Henceforth, many memory-specific, lightweight frameworks have been recently
    released to provide developers with a robust toolkit for complex applications.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，最近已经发布了许多针对特定内存的轻量级框架，为开发者提供了一套强大的工具集，用于复杂的应用程序。
- en: 'Let’s explore three of the most popular: LangMem, Mem0, and MemGPT—each offering
    distinct approaches to enhancing agent memory.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索其中最受欢迎的三种：LangMem、Mem0和MemGPT——每种都提供了增强智能体记忆的独特方法。
- en: LangMem
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangMem
- en: LangMem is a purpose-built memory management tool developed within the LangChain
    ecosystem to give developers granular, intentional control over how AI agents
    remember and recall information. LangMem allows memory to be treated as an active,
    programmable part of an agent’s workflow—especially when used with LangGraph.
    This integration enables developers to specify exactly when an agent should write
    to or read from memory, such as after a decision point, an external API call,
    or user input.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem是LangChain生态系统中开发的一个专门用于内存管理的工具，它使开发者能够对AI智能体如何记住和回忆信息拥有细粒度和有意的控制。LangMem允许将记忆视为智能体工作流程中的一个活跃的、可编程的部分——尤其是在与LangGraph一起使用时。这种集成使开发者能够精确指定智能体何时应该写入或读取内存，例如在决策点、外部API调用或用户输入之后。
- en: 'LangMem introduces a memory architecture that distinguishes between two complementary
    modes of memory processing: the **hot path** and **background memory**. These
    modes define *when* and *how* information is stored and processed by an AI agent,
    giving developers precise control over memory behavior.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem引入了一种内存架构，它区分了两种互补的内存处理模式：**热路径**和**背景记忆**。这些模式定义了AI智能体存储和处理信息的时间和方式，使开发者能够精确控制内存行为。
- en: '![Figure 4.9: Hot path and background memory in Langmem. Source: https://langchain-ai.github.io/langmem/hot_path_quickstart/](img/B32584_04_09.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图4.9：Langmem中的热路径和背景记忆。来源：https://langchain-ai.github.io/langmem/hot_path_quickstart/](img/B32584_04_09.png)'
- en: 'Figure 4.9: Hot path and background memory in Langmem. Source: https://langchain-ai.github.io/langmem/hot_path_quickstart/'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.9：Langmem中的热路径和背景记忆。来源：https://langchain-ai.github.io/langmem/hot_path_quickstart/
- en: The **hot path** refers to memory that is written during the agent’s active
    reasoning process. In other words, as the agent interacts with a user—answering
    questions, solving tasks, or guiding workflows—it can consciously decide what
    information to remember. This is done through a tool called *manage_memory*, which
    the agent can call, using natural language input, to store meaningful facts, decisions,
    or preferences. For example, if a user says, “I prefer morning appointments,”
    the agent can choose to save that preference immediately into memory. These memories
    are organized into **namespaces**—a sort of folder system—so that they can be
    scoped to specific users, topics, or threads. This gives developers precise control
    over what gets stored, where, and why.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**热路径**指的是在智能体活跃推理过程中写入的记忆。换句话说，当智能体与用户互动——回答问题、解决问题或引导工作流程时，它可以有意识地决定要记住哪些信息。这是通过一个名为
    *manage_memory* 的工具来完成的，智能体可以通过自然语言输入调用该工具，以存储有意义的事实、决策或偏好。例如，如果用户说，“我更喜欢早上预约”，智能体可以选择立即将这个偏好保存到记忆中。这些记忆被组织成
    **命名空间**——一种文件夹系统——以便它们可以针对特定用户、主题或线程进行范围限定。这使开发者能够精确控制存储的内容、位置和原因。'
- en: On the other hand, **background memory** works passively and asynchronously.
    Rather than being triggered by the agent during the conversation, this mode runs
    in the background—typically after the interaction ends. It can process the entire
    conversation history to extract summaries, recurring themes, or useful metadata
    without interfering with the user’s experience. This is especially useful for
    building long-term user profiles or condensing long interactions into a few digestible
    insights. Think of it as a post-conversation reflection, where the system learns
    from the dialogue without needing to be explicitly told what to remember.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**背景内存**被动且异步地工作。不是在对话中被代理触发，而是在对话结束后在后台运行——通常在交互结束后。它可以处理整个对话历史，提取摘要、重复主题或有用的元数据，而不会干扰用户的体验。这对于构建长期用户档案或将长时间交互压缩为几个可消化的见解特别有用。将其视为对话后的反思，系统在无需明确告知要记住什么的情况下从对话中学习。
- en: LangMem is tightly integrated with the **LangGraph** framework, which allows
    developers to build AI agents with structured workflows and state management.
    Because memory in LangMem is thread-aware, it tracks along with the conversation
    flow, so agents don’t just recall isolated facts but also understand *when* and
    *why* those facts were stored.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem 与 **LangGraph** 框架紧密集成，这使得开发者能够构建具有结构化工作流程和状态管理的 AI 代理。由于 LangMem 中的内存是线程感知的，它随着对话流程跟踪，因此代理不仅能够回忆起孤立的事实，还能理解这些事实是**何时**和**为什么**被存储的。
- en: LangMem also supports different storage backends. Developers can begin with
    an in-memory setup—useful for testing and rapid development—and later switch to
    a more persistent store such as a database when building for production. This
    flexibility ensures that memory strategies can scale alongside the complexity
    and lifespan of the agent.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem 还支持不同的存储后端。开发者可以从内存设置开始——适用于测试和快速开发——然后在构建生产环境时切换到更持久的存储，如数据库。这种灵活性确保了内存策略可以与代理的复杂性和生命周期一起扩展。
- en: 'By combining hot path and background memory, LangMem enables agents that are
    both **reactive and reflective**: capable of making smart decisions in real time,
    while also learning and adapting over time. It bridges short-term awareness with
    long-term learning, making it a powerful foundation for intelligent, memory-aware
    agents.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合热点路径和背景内存，LangMem 使代理既**反应迅速**又**深思熟虑**：能够在实时做出明智的决定，同时随着时间的推移学习和适应。它将短期意识与长期学习联系起来，成为智能、具有记忆意识的代理的强大基础。
- en: Mem0
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Mem0
- en: Mem0 is a specialized memory layer engineered to equip AI agents with the capability
    to retain, adapt, and personalize their behavior across different users and sessions.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: Mem0 是一个专门设计的内存层，旨在为 AI 代理提供保留、适应和个性化其行为在不同用户和会话中的能力。
- en: 'According to the Mem0 official documentation, this framework has the following
    features:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 Mem0 官方文档，此框架具有以下特性：
- en: '**Memory processing**: Mem0 leverages LLMs to automatically extract and distill
    meaningful insights from conversations. It captures entities, events, and relationships
    while preserving full context, enabling agents to remember relevant facts without
    manual tagging or input formatting.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存处理**：Mem0 利用大型语言模型（LLMs）自动从对话中提取和提炼有意义的见解。它捕捉实体、事件和关系，同时保留完整上下文，使代理能够在无需手动标记或输入格式化的情况下记住相关事实。'
- en: '**Dual storage architecture**: Mem0 combines two complementary storage systems:'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双存储架构**：Mem0 结合了两个互补的存储系统：'
- en: A **vector database** for storing semantic representations of memories, optimized
    for similarity-based retrieval.
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于存储记忆语义表示的 **向量数据库**，针对基于相似性的检索进行了优化。
- en: A **graph database** for capturing and querying relationships between entities,
    providing structure and traceability to the memory network.
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于捕捉和查询实体之间关系的 **图数据库**，为记忆网络提供结构和可追溯性。
- en: '**Definition**'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: A graph database is a type of database that stores data in a graph structure—composed
    of nodes (entities) and edges (relationships between entities). Unlike traditional
    relational databases that use tables, graph databases are optimized for navigating
    and querying relationships, making them ideal for representing complex, interconnected
    data such as social networks, recommendation engines, or knowledge graphs.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图数据库是一种以图结构存储数据的数据库类型——由节点（实体）和边（实体之间的关系）组成。与传统使用表的传统关系数据库不同，图数据库针对导航和查询关系进行了优化，使其非常适合表示复杂、相互关联的数据，例如社交网络、推荐引擎或知识图谱。
- en: '**Smart retrieval system**: Mem0’s hybrid retrieval engine uses both vector
    search and graph-based queries to retrieve the most relevant memories. It prioritizes
    information based on importance, recency, and context, ensuring the agent responds
    with precise and meaningful references from its memory.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能检索系统**：Mem0的混合检索引擎同时使用向量搜索和基于图的查询来检索最相关的记忆。它根据重要性、最近性和上下文优先级排序信息，确保代理从其记忆中响应精确且具有意义的引用。'
- en: '**Simple API integration**: Developers can integrate Mem0 effortlessly through
    a lightweight API. It offers intuitive endpoints for adding new memories (add)
    and retrieving contextually relevant ones (search), making it easy to build memory-enabled
    agents without deep infrastructure work.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单的API集成**：开发者可以通过轻量级的API轻松集成Mem0。它提供了直观的端点来添加新的记忆（添加）和检索上下文相关的记忆（搜索），这使得构建具有记忆功能的代理而无需深入的基础设施工作变得容易。'
- en: '**Memory management**: As new information becomes available, Mem0 updates stored
    memory while resolving inconsistencies and contradictions. This ensures the agent’s
    memory stays coherent and trustworthy, even as user preferences or facts evolve
    over time.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存管理**：随着新信息的出现，Mem0更新存储的内存，同时解决不一致性和矛盾。这确保了代理的记忆保持一致和可信，即使随着时间的推移，用户偏好或事实发生变化。'
- en: Note that this latter feature—memory management—is an example of adaptive learning.
    As agents interact with users, Mem0 empowers them to dynamically refine and expand
    their memory—effectively allowing them to “learn” without requiring formal retraining.
    This capability is especially beneficial in long-term deployments where agents
    need to deliver a personalized experience that evolves with the user.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，此后的功能——内存管理——是自适应学习的例子。随着代理与用户的交互，Mem0赋予它们动态优化和扩展其记忆的能力——有效地允许它们“学习”而无需正式重新训练。这种能力在长期部署中特别有益，因为代理需要提供随着用户发展而演变的个性化体验。
- en: In summary, Mem0 functions as a cognitive backbone for AI agents, bridging short-term
    interaction with long-term memory. Its emphasis on personalization, adaptability,
    and flexible deployment positions it as an ideal choice for developers aiming
    to build agents that do more than just react—they remember, evolve, and engage
    with depth.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Mem0作为人工智能代理的认知骨干，连接短期交互和长期记忆。它对个性化、适应性和灵活部署的重视，使其成为开发者构建能够做到不仅仅是反应的代理的理想选择——它们能够记住、进化并深入参与。
- en: LeTTA (formerly MemGPT)
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LeTTA（以前称为MemGPT）
- en: Letta—formerly known as MemGPT—is an open source framework for building stateful,
    memory-aware AI agents. Its core innovation lies in how it transforms traditional
    stateless LLM interactions into dynamic, ongoing relationships by equipping agents
    with long-term memory, multi-step reasoning, and adaptive context management.
    This means Letta-based agents can remember key facts, user preferences, and prior
    decisions across sessions—enabling truly coherent and personalized conversations
    over time.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: Letta——以前称为MemGPT——是一个用于构建具有状态、记忆感知的人工智能代理的开源框架。其核心创新在于它如何通过为代理配备长期记忆、多步推理和自适应上下文管理，将传统的无状态LLM交互转换为动态的、持续的关系。这意味着基于Letta的代理可以在会话之间记住关键事实、用户偏好和先前决策——随着时间的推移，实现真正一致和个性化的对话。
- en: Letta is designed to be model-agnostic, which allows developers to choose the
    best model for their use case without being tied to a specific provider. One of
    Letta’s most unique components is the **Agent Development Environment** (**ADE**),
    a graphical interface that gives developers deep visibility into an agent’s state.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: Letta被设计成模型无关，这允许开发者根据他们的用例选择最佳模型，而无需绑定到特定提供商。Letta最独特的组件之一是**代理开发环境**（**ADE**），这是一个图形界面，它为开发者提供了深入了解代理状态的深度可见性。
- en: Through ADE, you can observe how the agent is reasoning, what memory it’s accessing,
    which tools it’s using, and how it’s responding—offering a transparent and interactive
    debugging experience rarely found in other frameworks.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 通过ADE，您可以观察代理的推理过程，它访问哪些记忆，使用哪些工具，以及如何响应——提供在其他框架中很少见到的透明和交互式调试体验。
- en: From an engineering perspective, Letta is built for robustness and integration.
    It includes full API and SDK support (via REST, Python, and TypeScript), making
    it easy to plug into both new and existing applications. Its auto-persistence
    layer ensures that every interaction, memory update, and internal state transition
    is stored securely in a PostgreSQL database. This not only guarantees continuity
    between sessions but also supports auditability and analytics.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 从工程角度来看，Letta 是为了鲁棒性和集成而构建的。它包括完整的 API 和 SDK 支持（通过 REST、Python 和 TypeScript），这使得它很容易集成到新的和现有的应用程序中。其自动持久化层确保每次交互、内存更新和内部状态转换都安全地存储在
    PostgreSQL 数据库中。这不仅保证了会话之间的连续性，还支持可审计性和分析。
- en: Letta also supports the **Model Context Protocol** (**MCP**), which allows agents
    to access and orchestrate external tools dynamically—such as web search, calendars,
    or custom APIs.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: Letta 还支持 **模型上下文协议**（**MCP**），它允许代理动态访问和编排外部工具——例如网络搜索、日历或自定义 API。
- en: '**Definition**'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: The MCP is a standardized interface that allows AI agents to dynamically access,
    invoke, and coordinate external tools, APIs, or data sources during their reasoning
    process. It acts as a communication layer between the language model and a library
    of available capabilities, enabling the agent to extend its core functionality
    beyond text generation.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: MCP 是一个标准化的接口，允许 AI 代理在其推理过程中动态访问、调用和协调外部工具、API 或数据源。它作为语言模型和可用能力库之间的通信层，使代理能够扩展其核心功能，超越文本生成。
- en: The MCP is especially powerful in multi-agent or tool-rich environments, where
    flexibility, modularity, and coordination are essential for building intelligent,
    autonomous systems.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在多代理或工具丰富的环境中，MCP 尤其强大，因为灵活性、模块化和协调对于构建智能、自主系统至关重要。
- en: By combining deep memory integration, flexible tooling, persistent state tracking,
    and transparent observability, Letta stands out as a comprehensive platform for
    developing truly autonomous, context-aware AI agents—ones that grow smarter and
    more capable with every interaction.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合深度内存集成、灵活的工具、持久状态跟踪和透明可观察性，Letta 成为一个全面的平台，用于开发真正自主、上下文感知的 AI 代理——这些代理在与每个交互中变得更聪明、更有能力。
- en: Summary
  id: totrans-214
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Memory is a foundational component of intelligent AI agents, enabling them to
    maintain context, personalize interactions, and adapt over time. This chapter
    explored the spectrum of memory types—short-term and long-term—and their subcategories,
    including semantic, episodic, and procedural memory.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 内存是智能 AI 代理的基础组件，使它们能够维持上下文、个性化交互并随时间适应。本章探讨了内存类型的范围——短期和长期——及其子类别，包括语义、情景和程序性记忆。
- en: We examined strategies for managing the limited context window of LLMs, as well
    as techniques for storing, retrieving, and refreshing memory using both structured
    and semantic approaches. A hybrid model, combining metadata filtering with vector
    search, emerged as a powerful method for scalable and relevant memory access.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我们探讨了管理 LLM 有限上下文窗口的策略，以及使用结构和语义方法存储、检索和刷新内存的技术。一种混合模型，结合元数据过滤和向量搜索，成为了一种强大的可扩展和相关的内存访问方法。
- en: Finally, we introduced key tools—**LangMem**, **Mem0**, and **MemGPT**—that
    operationalize memory in different ways, from workflow-aware storage to operating
    system-inspired context management.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们介绍了关键的工具——**LangMem**、**Mem0** 和 **MemGPT**——它们以不同的方式实现内存操作，从工作流感知存储到操作系统启发的上下文管理。
- en: In the next chapter, we will see how to integrate memory with the actual capability
    of AI agents of “doing things,” by properly defining tools and integration layers
    with the surrounding ecosystem.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将看到如何通过正确定义工具和集成层与周围生态系统，将内存与 AI 代理的“做事”实际能力相结合。
