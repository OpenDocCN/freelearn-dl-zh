- en: Improving Presentation Delivery
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the third part of the book, we’ll discuss how to leverage some great PowerPoint
    tools to practice presentation delivery, with practice being an essential element
    of having a memorable effect on audiences. We’ll also discuss some useful tools
    and applications in Teams that will help engage virtual audiences. By the end
    of this part of the book, you’ll have the knowledge needed to deliver presentations
    in a more impactful and engaging way to make presentations more memorable.
  prefs: []
  type: TYPE_NORMAL
