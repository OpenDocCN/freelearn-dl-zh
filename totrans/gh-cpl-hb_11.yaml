- en: Part 4
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting the Most Out of GitHub Copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The last part of the book will dive into the learnings that happen when you
    start using GitHub Copilot. To get the most value from it, you’ll need to rewire
    some of the thought processes we have been using since the beginning of programming.
    This takes more than getting a license and watching a short video of the features.
    You’ll learn what kind of steps are very helpful to gain a deep understanding
    of GitHub Copilot, and how you can leverage an internal community of continuous
    learning about these new tools. The changes in this field are going so fast that
    it is important to stay up to date.
  prefs: []
  type: TYPE_NORMAL
- en: To close things off, we will discuss the importance of how we approach and talk
    about these new tools and ways of working (which involves a lot more than just
    talking about developer productivity). We will look at the developer experience
    and how that changes, and how we need to have a solid engineering practice in
    place that can allow us to go faster, with trust that we are not leaving our level
    of quality behind.
  prefs: []
  type: TYPE_NORMAL
