  prefs: []
  type: TYPE_NORMAL
- en: '**Call a tool**: Run the following command in the terminal:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs:
  - PREF_IND
