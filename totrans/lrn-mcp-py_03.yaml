- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we covered how to build your first server. For our first server,
    we used the STDIO transport to create a server meant to be run on our machine.
    We also looked into various ways of testing out the server features using a tool
    called the inspector. The inspector tool has two different modalities, CLI mode
    and visual mode. The former mode is used for CI/CD scenarios, and the latter for
    you as a developer quickly trying out features.
  prefs: []
  type: TYPE_NORMAL
- en: In our upcoming chapter, we’ll describe the SSE transport, which you can use
    if you want the server to be consumed via a URL address.
  prefs: []
  type: TYPE_NORMAL
- en: Assignment – an e-commerce STDIO server
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: For this MCP server, we will add capabilities that can be used in the context
    of an e-commerce application. Therefore, the server will need the following features.
  prefs: []
  type: TYPE_NORMAL
- en: 'It will need these tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '`get-orders`: This tool will return a list of orders. The optional input is
    a customer ID, and the output is a list of orders. Each order should contain the
    following fields: ID, customer ID, quantity, total price, and status.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get-order`: This tool will return a specific order. The input is the order
    ID, and the output is an order. The order should contain the following fields:
    ID, customer ID, quantity, total price, and status.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`place-order`: This tool will place an order. The input is the customer ID
    and the cart ID.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get-cart`: This tool will return a cart.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get-cart-items`: This tool will return a list of items in the cart. The input
    is the cart ID, and the output is a list of items. Each item should contain the
    following fields: ID, name, description, price, quantity, and product ID.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`add-to-cart`: This tool will add an item to the cart. The input is the cart
    ID, product ID, and quantity. The output is a success message. If the cart ID
    is not provided, the tool should create a new cart and add the item to the new
    cart. The output should be a success message and the cart ID.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`products`: This tool will return a list of products. The optional input is
    a category, and the output is a list of products. The product should contain the
    following fields: ID, name, description, price, and category. The output should
    be in JSON format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`product`: This tool should return a specific product. The input is the product
    ID, and the output is a product. The product should contain the following fields:
    name, description, price, category, and ID. The output should be in JSON format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`categories`: This tool will return a list of categories. The output should
    be in JSON format. The categories should contain the following fields: ID, name,
    and description. The output should be in JSON format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get-customers`: This tool will return a list of customers. The output should
    be in JSON format. It should contain the following fields: ID, name, and email.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It will need this resource:'
  prefs: []
  type: TYPE_NORMAL
- en: '`product_catalog`: This resource will return a list of products in the catalog.
    The optional input is a category, and the output is a list of products. Each product
    should contain the following fields: name, description, and category. The idea
    is that the resource will return a list of products in the catalog, in case potential
    customers want to see them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see, this will support a simple e-commerce application and a customer
    trying to either put items in a cart or place an order.
  prefs: []
  type: TYPE_NORMAL
- en: You can keep state within memory data structures.
  prefs: []
  type: TYPE_NORMAL
