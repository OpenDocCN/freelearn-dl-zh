- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building and Testing Servers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will cover the basics of building and testing servers. We
    will start with a simple server that uses the STDIO transport. The STDIO transport
    is a simple way to communicate with the server using standard input and output
    streams. Building STDIO servers is a great way to get started with the **Model
    Context Protocol** (**MCP**) and understand how it works. It should also be added
    that the STDIO transport is the most common way to communicate with the server,
    and it’s meant for servers running on your machine.
  prefs: []
  type: TYPE_NORMAL
- en: As part of the chapter, we will also cover different ways of testing the server.
    It’s important that what we build works as expected. We will cover different tools
    that can be used visually, in the CLI, and in code.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn how to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Build a simple server using the STDIO transport
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Describe the core concepts of the server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Test the server using different tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: A STDIO server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Concepts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runtimes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing the server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A STDIO server
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using STDIO transport means that the server communicates with the client through
    standard input and output streams. This means that the server can read input from
    the client via **standard input** (**stdin**) and send output back to the client
    via **standard output** (**stdout**). Okay, that sounds simple, but how does it
    work?
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP uses JSON-RPC 2.0 as its wire format. Thereby, it needs to convert stream
    messages into JSON-RPC format for transmission and convert received JSON-RPC messages
    back into stream messages. Imagine the following example in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'To be used in a STDIO server, the preceding message would be converted into
    JSON-RPC format, and it would look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'That’s an interesting example, but what really matters to you as a developer
    is two things:'
  prefs: []
  type: TYPE_NORMAL
- en: How to build a STDIO server. We’ll show this shortly in an upcoming section.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why it matters, and what it means that your server is a STDIO server. It means
    that your server is running on your local machine and is communicating with the
    client through standard input and output streams. In *Chapter 4* and *Chapter
    5*, we’ll show you how to build a server that can communicate with servers over
    the internet.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Concepts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s take a look at the core concepts (features, if you will) that the server
    can offer.
  prefs: []
  type: TYPE_NORMAL
- en: Resources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'These are the data and context that the server can provide to the client. The
    way MCP is meant to be used is by the client having an LLM when they communicate
    with the server. Resources in this use case serve as context that could be added
    to the LLM at the time of the prompt. Imagine the following scenario playing out:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1 – Resources scenario](img/B34123_03_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – Resources scenario
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, the context ensures that the end user gets a better result
    as the server’s context is paired with the user’s prompt, like a simplified **retrieval-augmented
    generation** (**RAG**) pattern. That is, you pair the user’s prompt with your
    data to get a better response.
  prefs: []
  type: TYPE_NORMAL
- en: 'A specific example implementing this way of thinking could be where the user
    asks for products like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![Figure 3.2 – Example of a resource interaction](img/B34123_03_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.2 – Example of a resource interaction
  prefs: []
  type: TYPE_NORMAL
- en: In this specific product query, we call resources first to learn what table
    to query, and then we let the LLM identify which tool to call. Thanks to calling
    the resource, we gain extra knowledge on what tools to select and what parameters
    to use.
  prefs: []
  type: TYPE_NORMAL
- en: Resources can also be used in a manner where the LLM isn’t used, but the way
    you should think about your server is that it’s here to empower a client’s LLM.
    That means the tools, resources, and prompts you provide should be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we understand when resources are used, let’s talk more about the nature
    of them. Resources are static and can be anything that the server can access and
    share with the client. What’s important to know is that you can ask for a resource
    either with or without a template. If there’s only one file or one app setting
    configuration, it makes sense to create that with a set name such as `config`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Here, we are returning the same type of information each time.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, if there are many types of settings, such as user settings, calendar
    settings, and so on, it might make sense to create a more templated version such
    as `settings://{type}`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The settings are still non-changing, but there are many of them, so we choose
    to group them under one namespace.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the resource is called `settings` and takes `type` as a parameter.
    For example, `settings://hello` would match this pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Tools are the functions or capabilities that the server can perform. Examples
    of tools include data processing functions, tools that call an API to fetch data,
    and more. For tools, we need to define the input and output by providing a schema.
    How this is done looks different depending on the used runtime, but the idea is
    that it should be clear to the consumer of the tool what the input and output
    are. For example, if we have a tool that takes two numbers and returns their product,
    we can define it like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: In this example, we define a tool called `multiply` that takes two numbers as
    input and returns their product. The input and output are defined using Python
    type hints.
  prefs: []
  type: TYPE_NORMAL
- en: Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompts are the templated messages or workflows that guide the interactions
    between the client and server. A good example of a prompt is a template that helps
    the client write a product description or slogan in the context of an e-commerce
    application. Just like resources and tools, prompts can take input. Here’s an
    example of a prompt that takes a product name and returns a product description:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Here, we define a prompt called `describe_product` that takes a product name
    as input and returns a product description. The input is defined using Python
    type hints.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know what our server can contain, what else do we need to know?
  prefs: []
  type: TYPE_NORMAL
- en: Runtimes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The officially supported runtimes at present for MCP are TypeScript, Python,
    .NET, Java and Kotlin, Rust, and Go. More are being added all the time. For an
    updated list of runtimes, please refer to the MCP documentation here: [https://modelcontextprotocol.io/docs/sdk](https://modelcontextprotocol.io/docs/sdk).
    Each of these runtimes has its own SDK you can use. The implementation of the
    runtimes is similar, but there are some differences.'
  prefs: []
  type: TYPE_NORMAL
- en: Excited? Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the server
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are many tools at your disposal to test the server. Why we test is that
    we want to ensure that the server is working as expected. The tools we will cover
    in this chapter are as follows.
  prefs: []
  type: TYPE_NORMAL
- en: Inspector
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a CLI tool that can present both a UI and a CLI interface. The latter
    is meant for scripting and automation.
  prefs: []
  type: TYPE_NORMAL
- en: The inspector tool runs a Node.js package with npx, so ensure that you have
    the Node.js runtime installed. This is also true even if you run the inspector
    tool via a Python command, as Python wraps a call to the underlying Node.js process.
  prefs: []
  type: TYPE_NORMAL
- en: The UI is meant for manual testing and debugging. In this example command, we
    run the inspector tool. Ensure that you stand in the same directory as the server
    file when you run the following commands.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Python SDK installed an executable `mcp` that helps run the server:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'By running this tool, we can test the server in visual mode. Here’s a screenshot
    of the inspector tool:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3 – Inspector tool](img/B34123_03_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – Inspector tool
  prefs: []
  type: TYPE_NORMAL
- en: 'Ensure that the visual tool specifies the following fields:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Transport Type**: **STDIO**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Command**: `mcp`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Arguments**: `run server.py`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can also run the inspector tool in CLI mode. This is useful for scripting
    and automation. You type almost the same command as earlier, but you add the `--cli`
    flag:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Here, we are adding the `--method` command followed by the `tools/list` argument,
    which says we want to list all tools on the server.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that `mcp dev` in the Python pivot earlier wraps a Node.js tool, which
    is the inspector. If you want full access to all the features of the inspector,
    you can run it directly for both Node.js and Python, and that’s what we recommend
    doing (that is, run it like so: `npx @modelcontextprotocol/inspector`).'
  prefs: []
  type: TYPE_NORMAL
- en: cURL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A standard command-line tool such as cURL can be used to send requests to the
    server. This is normally used to test servers using SSE or streamable HTTP as
    transport. Other tools capable of making web requests can be used as well. A `curl`
    command will only work if the server is running on the internet, which is the
    case with SSE servers. For STDIO servers, you need to use the inspector or a custom
    client to send requests to the server. Let’s see a typical `curl` command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding command, we are sending a `POST` request to the server with
    the `tools/list` method. The server will respond with a list of tools available
    on the server. This is a good alternative to using the inspector in CLI mode.
  prefs: []
  type: TYPE_NORMAL
- en: Tests
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s possible to write unit tests for the server. This is a good practice in
    addition to using the inspector. The tests can be run in a CI/CD pipeline and
    are useful to ensure that the server is working as expected. You can use any testing
    framework you like, and you can add resources, tools, and prompts to the server
    and then test them. Let’s see an example of a test:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding example, we do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the `pytest` framework to test the server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a new server instance and add a tool called `add`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Test that the tool is added to the server and that the number of tools is equal
    to `1`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is a simple test, but it shows how you can use `pytest` to test the server.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we have a good grasp of the concepts and features of the server; let’s
    write down the plan for how we will go about building our first server.
  prefs: []
  type: TYPE_NORMAL
- en: First server
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To build our first server, let’s first go through the steps to build a simple
    server:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create a new project**: We will create a new project with the needed dependencies
    and set up any environment specifics. You’re highly encouraged to create a virtual
    environment to ensure you don’t install libraries globally. By using a virtual
    environment, each project is isolated from other projects and you don’t have to
    worry about conflicting library versions that might otherwise occur.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Install dependencies**: Here, we will list and install dependencies for the
    project, which differ, of course, depending on the runtime you are using.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Add server code**: This is where we will add the server’s features. As part
    of this, we will discuss the feature, its input and output, and schemas.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Test the server with inspector**: Inspector is a tool that helps you ensure
    new features work okay. The tool allows you to run it in both CLI mode and a visual
    mode, where it shows a web browser UI:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The CLI mode is appropriate for CI/CD scenarios, as it responds with JSON in
    a terminal
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The visual mode is more appropriate when you, as a developer, try to ensure
    that the server is working as it should
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s write some code!
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Create a new project'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we write any code, we need a project. This will set us up for success.
    The project will contain everything we need to write our server and define tests
    and scripts for testing and running the server:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create the following folder structure:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create a virtual environment:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Activate the virtual environment:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You should see the name of the virtual environment in the terminal prompt. This
    means that the virtual environment is activated, and any packages you install
    will be installed in this environment.
  prefs: []
  type: TYPE_NORMAL
- en: Great, now we have a virtual environment and a folder structure. Next, we need
    to install the dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Install dependencies'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Run the following command in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: This will install the MCP SDK and the CLI tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Add server code'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Add the following code to `server.py`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'The preceding code does the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Creates an MCP server instance with the name `Demo`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds a tool called `multiply` that takes two numbers as input and returns their
    sum
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds a resource called `greeting` that takes a name as input and returns a personalized
    greeting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creates a prompt called `review_code` that takes a code snippet as input and
    returns a review of the code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Test the server with the inspector'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here, we will use the inspector to test the server. The inspector is a CLI
    tool that can present both a UI and a CLI interface. The latter is meant for scripting
    and automation. The UI is meant for manual testing and debugging:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Run the following command in the terminal:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This will start the inspector tool on port `6274`.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to `http://localhost:6274` in your web browser. This should start a
    web server with a visual interface, allowing you to test the sample.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the visual interface, ensure you fill in the fields like so:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Command**: `"mcp"`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Arguments**: `"run server.py"`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Click **Connect**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the **Tools** tab and **List Tools**, and **multiply** should be listed.
    Click **multiply** and fill in the fields like so:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**first**: `2`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**second**: `4`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You should see the result **8** in the **Tool Result** field.
  prefs: []
  type: TYPE_NORMAL
- en: Great, now we have a working server, and we can test it using the inspector.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Test the server with the inspector in CLI mode'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this subsection, we will run the inspector directly in CLI mode. The inspector
    is a Node.js app, and `mcp dev` is a wrapper around it.
  prefs: []
  type: TYPE_NORMAL
- en: At the time of this writing, `mcp dev` does not support all the features made
    available in the inspector. We will therefore show how to run the inspector directly
    as a Node.js app as that’s what it’s been written in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s show some useful commands you can run in the inspector:'
  prefs: []
  type: TYPE_NORMAL
- en: '**List tools**: Run the following command in the terminal:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This will list all the tools available on the server, and you should see the
    following output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Here, you see all the tools on the server in JSON format. We only have one tool,
