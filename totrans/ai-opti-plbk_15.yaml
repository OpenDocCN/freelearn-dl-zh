- en: '11'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI Agents Explained
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Imagine joining a new company, being inundated with new information, feeling
    like an imposter, and being scared to ask your colleagues for information or help
    with understanding the processes. You don’t want to be that new person who bugs
    your manager with every small question, and your colleagues are grappling to meet
    their deadlines, so you don’t want to be an additional burden. Sound relatable?
    Imagine a new world where you join a company, have your initial orientation, and
    are told about this copilot that could answer your questions, big or small, and
    even provide you with the sources for that information. That is the power of AI
    agents. They can automate complicated, repetitive, and time-consuming tasks so
    that you can focus your energy on something productive.
  prefs: []
  type: TYPE_NORMAL
- en: AI agents are not new, but they have gained popularity, with LLMs being more
    accessible now. The agentic workflows powered with LLMs make agents powerful.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will explore the following key topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding AI agents and their components
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI agents – when to apply them and when to avoid them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Types of AI agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agentic frameworks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent observability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Challenges related to AI agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enterprise agent AI use cases
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Context Protocol and Agent2Agent protocols
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Best practices for implementing agentic AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding AI agents and their capabilities
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Agents are software programs that perform tasks autonomously based on the configuration
    provided by the user through code or prompts. The beauty of agentic systems is
    that they are dynamic and can interact with and improve their behavior over time.
    For instance, an AI agent planning a vacation could assess the weather, budget,
    and user preferences to recommend the best tour options. It can consult external
    tools, adjust suggestions based on feedback, and refine its recommendations over
    time.
  prefs: []
  type: TYPE_NORMAL
- en: Capabilities of AI agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Four capabilities of AI agents make them unique and capable of handling complex
    workflows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Understanding complex instructions** : This is for the user to type the request
    and for the model to understand the user’s needs and ultimately carry out each
    task. For example, if a user types, “Book a flight to New York and arrange accommodation,”
    LLMs can grasp this request by interpreting location, preference, and logistical
    nuances.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Planning and reasoning frameworks** : These help agents break the task into
    smaller, manageable steps. This is great for use cases such as those of a financial
    advisor or trip-planning agent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhanced tool interaction** : LLMs can interact with external tools and APIs.
    This capability enables AI agents to perform tasks such as executing code, interacting
    with databases, and performing web searches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory and context management** : LLMs use different types of memory systems.
    Episodic memory helps agents recall specific past interactions, aiding in context
    retention. Semantic memory stores general knowledge, enhancing the AI’s reasoning
    and application of learned information across various tasks. Working memory allows
    LLMs to focus on current tasks, ensuring they can handle multi-step processes
    without losing sight of their overall goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI agents thrive at solving complex workflows with their unique capability to
    understand the problem, call the right tools, and remember context from previous
    conversations. In the next section, we will dive deep into the “why” behind AI
    agents.
  prefs: []
  type: TYPE_NORMAL
- en: Why AI agents?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'By now, you should have a good understanding of what AI agents are, their capabilities,
    and the impact they could have on your enterprise. Let’s discuss a few reasons
    why enterprises should consider building AI agents :'
  prefs: []
  type: TYPE_NORMAL
- en: '**Improved productivity** : Organizations use AI agents to achieve specific
    goals and more efficient business outcomes .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reduced costs** : Businesses can use intelligent agents to reduce unnecessary
    costs arising from inefficiencies, human errors, and manual processes .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Informed decision-making** : Advanced intelligent agents use **machine learning**
    ( **ML** ) to gather and process massive amounts of real-time data. This allows
    business managers to make better predictions at pace when strategizing their next
    mo ve.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**24/7 availability** : AI agents are available around the clock, ensuring
    that customer inquiries are addressed promptly, regardless of time zones or business
    hours.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved customer experience** : Integrating AI agents allows businesses
    to personalize product recommendations, provide prompt responses, and innovate
    to improve customer engagement, conversion, and loyalty.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we learned that AI agents are autonomous software programs
    that perform tasks based on user input and improve over time through interaction
    and feedback. They consist of components such as instruction understanding, planning
    frameworks, tool integration, and memory systems that enable complex workflows.
    Businesses use them to boost productivity, reduce costs, enhance decision-making,
    and improve customer experience with 24/7 availability. In the next section, we
    will explore when and when not to use agents.
  prefs: []
  type: TYPE_NORMAL
- en: AI agents – when to apply them and when to avoid them
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Real-world tasks are complicated, cumbersome, and non-deterministic. Imagine
    you run a travel company. A customer logs on to your website and submits this
    request: “Book me a three-day trip to Malibu in October. I am flexible on the
    dates. Plan the activities based on the weather. The hotel should be a mile away
    from downtown, and I need a Mercedes car to pick me up from the airport. If my
    flight is delayed by an hour, cancel the car booking.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'This request involves multiple layers:'
  prefs: []
  type: TYPE_NORMAL
- en: Checking availability for a specific month
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating cancellation options
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Selecting the right activities based on the weather
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding personal schedules and logistical details
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In situations where workflows can’t be neatly defined in advance, agents offer
    the flexibility needed to respond to complex requests. An agentic system could
    handle this request by dynamically accessing various tools and APIs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Weather API** : To provide accurate forecasts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google Maps API** : For calculating travel distances'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Renting car availability portal** : To rent cars'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Employee availability dashboard** : To check staff schedules'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RAG system** : To retrieve relevant answers from your knowledge base'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we learned that AI agents allow systems to break free from
    rigid workflows, adapting to user requests on the fly. This makes them ideal for
    solving problems in unpredictable or high-variability dom ains.
  prefs: []
  type: TYPE_NORMAL
- en: When to avoid AI agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While agents can handle complexity, they’re not always the best choice. Overusing
    them can introduce unnecessary risks and costs. You should avoid agents in the
    following situations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The workflow is not expected to perform an action** : If the AI workflow
    that you are building does not involve an action such as writing a report, booking
    a ticket, or sending an email, it is recommended to start with a simple chatbot
    and then scale to an agentic system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Error tolerance is low** : Agents, powered by LLMs, are probabilistic systems,
    meaning they may occasionally make incorrect decisions. For applications where
    accuracy is critical, avoid relying on agents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High-volume, low-latency pipelines** : Agents rely on LLM calls, which introduce
    latency and cost. For real-time classification at scale, for example, a classic
    ML model or deterministic approach would be better.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**No tool integration** : If the workflow has no external tools and is just
    calling an API, you don’t need an agent but an API directly. Agents are useful
    when they can choose between multiple tools or combine reasoning with actions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we explored how AI agents are ideal for handling complex, dynamic
    tasks where workflows can’t be predefined, such as travel planning with multiple
    variables and contingencies. However, they should be avoided for well-defined,
    low-error-tolerance, or cost-sensitive tasks where deterministic systems are more
    efficient and reliable. In the next section, we will explore the type of agents
    and agentic frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: Types of AI agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Based on the complexity of the use case, you can build a single agent or multiple
    agents. Let’s dive deep into each of them to explore them further.
  prefs: []
  type: TYPE_NORMAL
- en: Single agent versus multi-agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Single agents** are one entity or agent performing a particular task. In
    single-agent models, a single AI entity is responsible for all decision-making
    processes. It makes managing and understanding the system’s behavior easier. They
    are also easier to implement and can be optimized for an organization. Examples
    of single agents include chess-playing agents and image recognition.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The limitations of a single agent are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Single agents struggle to solve complex tasks and increased computational loads
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Single points of failure can lead to overall system breakdowns, making these
    models less robust in dynamic and unpredictable environments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-agents or multiple entities** work together to accomplish a task. Multiple
    agents share the workload, distributing tasks based on specialization and capability,
    which can enhance efficiency and performance. Different agents can be designed
    to specialize in various tasks, making the system more flexible and adaptable
    to diverse challenges.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples include autonomous vehicles, such as Waymo. Traditional single-agent
    models may struggle to navigate complex urban environments efficiently. However,
    a multi-agent system can divide the tasks among specialized agents, such as the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: One agent focuses on real-time traffic data analysis and route optimization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another agent handles obstacle detection and collision avoidance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A third agent manages passenger interactions and in-vehicle services
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By collaborating, these agents can ensure a smoother, safer, and more efficient
    ride, demonstrating the tangible advantages of multi-agent systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'The limitations of multi-agents are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Complexity** : Developing and managing multiple agents requires sophisticated
    coordination and communication protocols, increasing the overall system complexity'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource management** : Efficiently allocating resources among agents and
    ensuring optimal performance can be challenging and requires advanced optimization
    techniques'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we saw that single-agent systems are simpler and easier to
    manage but struggle with complex tasks, while multi-agent systems offer flexibility
    and specialization for handling dynamic workflows. The choice between a single-
    or multi-agent framework is dependent on your use case. Both can offer unique
    benefits and possess certain limitations. In the next section, we will explore
    frameworks to build agents.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic frameworks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building agents from scratch is hard. Frameworks simplify the process and allow
    developers to focus on their application rather than creating a framework from
    scratch. A framework is designed to help define tools, an orchestration mechanism,
    and memory, to name a few.
  prefs: []
  type: TYPE_NORMAL
- en: Frameworks enable the collaboration of different agents to solve complex tasks.
    They provide processes with which agents can talk to each other, coordinate, and
    achieve a common goal. They also equip agents to understand context and adapt
    to changing environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s discuss a few popular frameworks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LangChain** : A framework for developing applications and agents powered
    by language models. It is robust and adaptable as it has extensive tools and abstractions.
    LangChain provides an easier way to integrate with data sources and external tools
    and is flexible in designing complex agent behaviors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AutoGen** : This is an open source framework by Microsoft that enables the
    development of LLM applications using multiple agents that can converse with each
    other to solve tasks. AutoGen is a great way to perform experimentation and spin
    a quick prototype to showcase the art of the possible. It also supports both autonomous
    operation and human oversight. One important element that distinguishes AutoGen
    is its multi-agent communication structure. Because of this, developers can design
    systems in which many specialized agents work together to solve complicated issues
    or carry out difficult jobs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LlamaIndex** : A framework for connecting custom data sources to LLMs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agentverse** : Designed to facilitate the deployment of multiple LLM-based
    agents in various applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agents** : An open source library/framework for building autonomous language
    agents. The library supports long-term and short-term memory, tool usage, web
    navigation, multi-agent communication, and brand-new features, including human-agent
    interaction and symbolic control.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Crew AI** : An AI agent framework reimagined for engineers, offering powerful,
    simple capabilities to build agents and automation. This allows developers to
    create a “crew” of AI agents, each with specific responsibilities to work together
    on complex tasks. The unique aspect of this is that it creates more realistic
    simulations of human team dynamics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Semantic Kernel** : This framework, developed by Microsoft, is designed to
    make it easier to integrate LLMs into existing applications. It is lightweight
    and modular, which makes it easier to update the code. The framework is highly
    secure and scalable and promotes code reusability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to choose the right agentic framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agentic frameworks are an evolving field, so it is important to ensure that
    there is a strong community associated with it that can provide valuable resources,
    support, and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: It is important that the framework is stable and suitable for production environments.
    You can always confirm this by sending a note to the developer community.
  prefs: []
  type: TYPE_NORMAL
- en: Different frameworks excel in different areas, such as conversational agents,
    multi-agents, and autonomous decision-making; hence, it is important to clearly
    define the outcome you would like to achieve through these agents so that you
    can make the right choice.
  prefs: []
  type: TYPE_NORMAL
- en: It is also important to consider combining multiple frameworks to build robust
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: You should also consider the expertise of your team while choosing the right
    framework; some require software engineering expertise, while others, such as
    Crew AI, can be configured via prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we explored agentic frameworks such as LangChain, AutoGen,
    and Semantic Kernel that simplify development and enable collaboration, tool integration,
    and context awareness. In the next section, we will learn what agent observability
    is and why it is important.
  prefs: []
  type: TYPE_NORMAL
- en: Agent observability
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Agent observability is the practice of achieving deep, actionable visibility
    into the internal workings, decisions, and outcomes of AI agents throughout their
    life cycle, that is, from development and testing to deployment and ongoing operation.
    Key aspects of agent observability include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Continuous monitoring** : Tracking agent actions, decisions, and interactions
    in real time to surface anomalies, unexpected behaviors, or performance drift.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tracing** : Capturing detailed execution flows, including how agents respond
    through tasks, select tools, and collaborate with other agents or services. This
    helps answer not just what happened but why and how it happened.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Logging** : Records agent decisions, tool calls, and internal state changes
    to support debugging and behavior analysis in agentic AI workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation** : Systematically assessing agent outputs for quality, safety,
    compliance, and alignment with user intent using both automated and human-in-the-loop
    methods. Some evaluation methods include, but are not limited to, the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human annotation** : This includes human evaluators who directly score LLM
    results across different application aspects, such as honesty, helpfulness, engagement,
    and unbiasedness.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Turing test** : Human evaluators are asked to compare results from real humans
    and agents, whereas indistinguishable results mean that agents can achieve human-like
    performance.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Protocols** : Correspond to standard evaluation protocols that determine
    how the metrics are used. Examples include real-world simulation, social evaluation,
    multi-task evaluation, and software testing.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation SDKs and frameworks** : Companies such as Microsoft have invested
    heavily in building Evaluation SDKs that automate the process of agent evaluation.
    You can calculate how well the agent is adhering to the task, planning the task,
    and executing it. It is best to leverage these evaluation frameworks to escalate
    the development.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open source framework** : You can also leverage open source frameworks such
    as the Microsoft evaluation framework. Microsoft introduced two new roles during
    the evaluation process: the examiner and the judge. The task description is first
    given to the examiner for each test case. The examiner then asks the agent questions
    and supervises the conversation. The evaluation target is allowed to ask the examiner
    questions to clarify the task. The examiner can only provide the task description
    and cannot provide any hints or solutions. When the evaluation target provides
    a solution, the examiner will stop the conversation and pass the solution to the
    judge. The judge will then evaluate the solution based on the ground truth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Governance** : Enforcing policies and standards to ensure agents operate
    ethically, safely, and in accordance with organizational and regulatory requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent observability is a critical aspect of building agentic applications. It
    is important to spend substantial time designing the agent architecture in a way
    that you are able to evaluate and monitor it continuously. In the next section,
    we will explore some other best practices for observability.
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for agent observability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s now dive deep into best practices for observability that you can implement
    within your organization when building observability for your agents. These are
    based on the practical experiences that we have had building agents day in and
    day out:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pick the right evaluation method and evaluate continuously. One size does not
    fit all. It is possible that for your organization or use case, out-of-the-box
    methods won’t work. It is always a good idea to start with them, so you don’t
    have to invest in building, but if one iteration proves that it is not providing
    adequate information, it is best to build your own evaluation framework. This
    can be done by building an agent for evaluating and providing it with instructions
    such as: “You are an evaluation agent and your job is to evaluate on XYZ parameters.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is imperative to evaluate your agent continuously, both in development and
    production, to be able to monitor it and be proactive about low performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrate evaluations and logging capabilities in your **continuous integration**
    ( **CI** ) and **continuous deployment** ( **CD** ) pipelines. Automated evaluations
    and tracing should be part of your CI/CD pipeline, so every code change is tested
    for quality and safety before release. This approach helps teams catch regressions
    early and can help ensure agents remain reliable as they evolve. Logging helps
    you monitor all the conversations for auditing and safety purposes. If a drift
    is detected, you can always go back to the logs to see what caused it. It is also
    a good idea to have alerts in place, so if the performance is below a threshold,
    you can get informed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scan for vulnerabilities before the launch. Before deployment, proactively test
    agents for security and safety risks by simulating adversarial attacks. This will
    help you to test your application and be prepared for unfortunate events such
    as an attack by a malicious actor.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we explored the different dimensions of agent observability,
    tracing, evaluation, and logging, and their importance for enterprise-grade applications.
    In the next section, we will uncover challenges associated with building AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges related to AI agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'As AI systems evolve from static models to autonomous agents capable of planning,
    reasoning, and acting, organizations face a new set of challenges that go beyond
    traditional ML concerns. In this section, we will discuss these challenges in
    detail:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lack of high-quality data** : AI systems can leverage generalized data, but
    agents require highly specialized data to learn and execute tasks. For instance,
    training an AI agent to perform complex, nuanced tasks in dynamic environments
    demands detailed, context-rich data that is often not readily available. The absence
    of such targeted data can lead to ineffective training, where agents either fail
    to generalize or exhibit suboptimal performance due to gaps in their learning.
    Issues of data privacy, high collection costs, and the inherent biases in available
    datasets compound this challenge.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lower accuracy** : Since multiple LLM calls are needed for agents to perform,
    if one of the LLMs is hallucinating, it is possible that the outcome of the agent
    will be inaccurate. High accuracy at every stage is essential to prevent these
    errors from escalating and for the agent to achieve its goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lack of stable agentic frameworks** : Though there are multiple agentic frameworks
    available in the market, it can be challenging to choose one for production workloads.
    The reason is that most frameworks are still evolving and can prove to be unstable
    for enterprise workloads.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Autonomy challenges** : Agents can perform tasks autonomously, but that can
    prove to be tricky in highly regulated environments where each step needs to be
    monitored and validated. In such cases, it is best to either avoid agents altogether
    or have humans in the loop. Examples of these scenarios could be prescribing medication
    to a patient or approving someone’s loan application.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we discussed the challenges of building agents, such as a lack
    of high-quality data and lower accuracy. In the next section, we will discuss
    how AI agents can help with enterprise AI use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Enterprise agent AI use cases
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this section, let’s deep dive into some interesting enterprise AI agent
    use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agentic workflow for data tasks** : Let’s say the user asks the question
    about the difference between revenue for a company from 2023 to 2024. If you have
    deployed a simple RAG application, the LLM has to first retrieve the data for
    2023 and then 2024, and then find the difference. It may not see the revenue for
    2023 or 2024, as you might have grounded it only on the latest data. In this case,
    agentic frameworks can be helpful as they can dynamically plan this task and leverage
    the RAG pipeline, and memory modules can handle the subsequent questions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Along with that, data is no longer limited to text; it can take multiple forms,
    such as images and audio files. Agents for data curation, processing, collection,
    and domain expertise can all be used to build enterprise-ready applications.
  prefs: []
  type: TYPE_NORMAL
- en: '**Swarm of agents for marketing campaigns and coding workflows** : This refers
    to a collection of agents working together to solve a common problem. Frameworks
    such as ChatDev enable you to build a team of engineers, designers, product managers,
    a CEO, and agents to build essential software cheaply. With this, you can populate
    an entire marketing campaign for a company or achieve complex coding workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dynamic pricing systems** : These power services such as ride-sharing apps.
    These agents adjust prices in real-time based on factors such as demand, competition,
    and time of booking. This is why your Uber ride might cost more during rush hour
    or in bad weather.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Modern irrigation systems** : Modern model-based irrigation systems are powered
    by model-based reflex agents. These agents can collect data and create informed
    decisions around water needs and which part of the field might require more attention.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These use cases are just a few examples of how AI agents can impact enterprises.
    In the next section, let’s explore the **Model Context Protocol** ( **MCP** )
    and **Agent2Agent** ( **A2A** ) protocols.
  prefs: []
  type: TYPE_NORMAL
- en: Model Context Protocol and Agent2Agent protocols
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As enterprises shift toward multi-agent AI architectures, two foundational protocols,
    MCP and A2A, are emerging as critical enablers of scalable, interoperable, and
    intelligent systems.
  prefs: []
  type: TYPE_NORMAL
- en: MCP – tool access and execution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: MCP, introduced by Anthropic, standardizes how AI agents discover and invoke
    external tools, APIs, and data sources, making it smarter and more helpful. It
    acts as a “USB-C port” for AI applications, providing a universal interface between
    models and the outside world.
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP follows a client-server architecture with the following key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**MCP hosts** : Programs using LLMs (such as Claude Desktop or IDEs) that initiate
    connections to access external data and tools'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP clients** : Protocol clients embedded within the host application that
    maintain a 1:1 connection with servers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP servers** : Lightweight programs that expose specific capabilities through
    the standardized protocol'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data sources** : Both local (files, databases) and remote services (APIs)
    that MCP servers can access'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A2A – collaboration and interoperability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Agent-to-Agent** ( **A2A** ) protocol, spearheaded by Google, focuses
    on enabling agents to communicate and collaborate across platforms, vendors, and
    frameworks. It defines structured interactions using agent cards, which describe
    an agent’s capabilities, endpoints, and authentication requirements. A2A supports
    decentralized orchestration, allowing agents to dynamically discover and coordinate
    tasks without centralized control, which is ideal for complex workflows involving
    multiple specialized agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'A2A architecture centers around facilitating communication between agents with
    these key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Client agent** : Formulates tasks and communicates them to remote agents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Remote agent** : Acts on tasks to provide information or perform actions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent card** : JSON metadata file describing an agent’s capabilities and
    endpoint'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task management** : Defines task objects with life cycle stages and outputs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Messaging system** : Allows agents to exchange context, replies, and artifacts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While MCP provides vertical integration (agent-to-tool), A2A enables horizontal
    integration (agent-to-agent). Together, they form a robust ecosystem for building
    modular, multi-agent systems. In the next section, we will explore best practices
    for building agentic AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for implementing agentic AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this last section, we want to bring all the knowledge home and share practical
    tips and tricks for building AI agents. Since this space is rapidly evolving,
    we would recommend not just learning from these but also building fast and learning
    from your mistakes so you can evolve quickly in this space:'
  prefs: []
  type: TYPE_NORMAL
- en: Clearly define the objectives of your agentic workload. Defining clear goals
    will help you define success, which could be reducing response times, enhancing
    customer satisfaction, or cutting operational costs; this will help you decide
    between single- or multi-agent and choose appropriate agentic frameworks for the
    development process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When choosing the use case for agents, focus on the process that needs to be
    automated instead of the underlying model or tools. Being process-focused will
    help you derive business value.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The quality of your agent is dependent on the quality of your data. Before starting
    the development process, ensure that you have robust data management practices.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consider integrating your agentic workflow into your legacy systems for optimal
    results and increasing the intelligence of your existing system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the UI is intuitive and responses are timely and accurate, providing
    a positive customer experience. Test your AI agents thoroughly to identify and
    address potential issues before deployment, ensuring they meet customer expectations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularly monitor your agent to adapt to the changing user needs, as well as
    for any safety threats.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the initial stages, plan to have a human in the loop for agentic oversight
    to ensure the process works as expected.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implement robust data privacy and security measures to protect customer information
    handled by your AI agents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have a “trust but verify” approach. When starting the journey, it is normal
    to spend hours on the performance of agents, analyzing their responses, and having
    humans in the loop. As the trust builds up, you can reduce the human oversight.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you just started your Gen AI as an organization, don’t immediately jump to
    agentic workflows; start slow and then create more complex workflows.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Inform users where AI is involved, how it works, and how to give feedback.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for consistent, multi-modal experiences across devices and endpoints. Use
    familiar UI/UX elements where possible (e.g., microphone icon for voice interaction)
    and reduce the customer’s cognitive load as much as possible (e.g., aim for concise
    responses, visual aids, and “Learn More” content).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure you have set up robust logging for each action done by an agent. A log
    entry should store information on the agent that took the action, the action taken,
    and the outcome of the action. This is necessary for any debugging required.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Performance metrics can help you track the effectiveness of the multi-agent
    system. For example, you could track the time taken to complete a task, the number
    of tasks completed per unit of time, and the accuracy of the recommendations made
    by the agents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Though it is tempting to use MCP or A2A for agentic workloads, it is important
    to think about whether you need it for your use case or whether it is the next
    shiny new object. Using any of these protocols demands maintenance; hence, only
    use what you need.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take a phased approach to your Gen AI journey. Start simple with **retrieval-augmented
    generation** ( **RAG** ) and gradually evolve toward agentic RAG capabilities.
    Begin with foundational use cases to build confidence, then scale into more advanced
    agentic workflows as your maturity and infrastructure grow.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From Roomba (a smart vacuum cleaner) to adaptive thermostats, we are surrounded
    by agents in our homes and offices. Now it’s time to adapt them on an enterprise
    level to transform the way you cater to your customers and make your employees
    more productive. Agents will bring a change to the way we operate. It may transform
    jobs, but hopefully for the better.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we explored how enterprise AI agents are used for dynamic data
    tasks, marketing campaigns, pricing systems, and smart irrigation, leveraging
    multi-agent collaboration and external tools. We also discussed that successful
    implementation requires clear objectives, robust data practices, intuitive UI,
    human oversight, and continuous performance monitoring to ensure reliability and
    business value.
  prefs: []
  type: TYPE_NORMAL
- en: Case study – agent-based architecture for counterparty credit risk assessment
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Counterparty credit risk** ( **CCR** ) refers to the possibility that the
    counterparty in a financial transaction may default before the final settlement
    of the contract. This risk is especially critical in **over-the-counter** ( **OTC**
    ) derivatives, securities lending, and other bilateral financial agreements. Traditional
    CCR models often struggle to capture the dynamic and nonlinear nature of financial
    markets, especially during stress periods.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The goal of this project is to build a **modular, intelligent, and scalable
    system** that can do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Ingest and process client and trade data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analyze credit risk using contextual and market-aware reasoning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide actionable insights to financial analysts and risk managers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be agent framework-agnostic, so developers can use any framework to orchestrate
    the agent and host these agents anywhere
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s an overview of the solution. The repository implements a **full-stack
    application** combining the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Frontend** : Built with **Next.js** , offering a modern UI for user interaction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Backend** : Powered by **FastAPI (Python)** , handling API requests, data
    processing, and orchestrating AI agents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI agents** : Can be deployed using any agent framework, such as Azure AI;
    each agent specializes in a distinct aspect of the credit risk workflow'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive deep into the agentic architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Agent-based architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The system is composed of **five specialized agents** , each with a unique
    role:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Client data agent** :'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Role** : Retrieves and processes client-specific information from internal
    or external data sources'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Functionality** : Extracts financial ratios, credit ratings, and historical
    default data'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Purpose** : Establishes a foundational profile for credit risk evaluation'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Trade data agent** :'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Role** : Gathers and processes trade-related data'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Functionality** : Analyzes exposure, trade types, and contractual terms'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Purpose** : Quantifies potential exposure and risk from active trades'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reasoning agent** :'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Role** : Performs detailed credit risk analysis'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Functionality** : Uses client and trade data, along with market indicators,
    to assess risk'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Purpose** : Generates insights and recommendations based on complex reasoning
    and probabilistic models'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orchestrator agent** :'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Role** : Acts as the central coordinator'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Functionality** : Interfaces with users, gathers additional information via
    Bing Search, and delegates tasks to other agents'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Purpose** : Ensures smooth workflow execution and integrates results from
    all agents'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following table lists the frameworks and technologies used:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Component** | **Technology** | **Purpose** |'
  prefs: []
  type: TYPE_TB
- en: '| Frontend | Next.js | UI and interaction |'
  prefs: []
  type: TYPE_TB
- en: '| Backend | FastAPI (Python) | API handling and agent orchestration |'
  prefs: []
  type: TYPE_TB
- en: '| AI agents | Azure AI or any cloud for hosting and executing | Intelligent
    task execution and reasoning |'
  prefs: []
  type: TYPE_TB
- en: '| DevOps | npm, virtualenv | Dependency management and environment setup |'
  prefs: []
  type: TYPE_TB
- en: 'Table 10.1: Frameworks and technologies used'
  prefs: []
  type: TYPE_NORMAL
- en: Impact and use case
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This architecture allows financial institutions to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Automate and scale credit risk assessments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improve accuracy by leveraging contextual and market-aware reasoning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce manual effort and operational risk
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will find the full project at [https://github.com/rom212/counterparty_credit_risk](https://github.com/rom212/counterparty_credit_risk)
    . This agent-based system offers a modular and intelligent approach to CCR assessment,
    leveraging specialized agents for data ingestion, contextual modeling, and reasoning.
    The architecture exemplifies how autonomous agents can transform complex risk
    workflows into efficient, explainable, and adaptive solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we covered how AI agents can automate complex tasks, improve
    productivity, and enhance user experience through dynamic, autonomous workflows.
    It covered when and how to use agents, types of agent systems, popular frameworks,
    such as LangChain, AutoGen, and Semantic Kernel, evaluation methods, and enterprise
    use cases such as data tasks, marketing, and pricing. The chapter concluded with
    best practices for implementation, emphasizing clear goals, robust data, human
    oversight, and continuous monitoring, as well as a real-life case study.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss responsible AI practices for building enterprise
    AI solutions.
  prefs: []
  type: TYPE_NORMAL
