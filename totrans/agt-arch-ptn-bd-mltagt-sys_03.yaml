- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: 'Agent-Ready LLMs: Selection, Deployment, and Adaptation'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理就绪LLM：选择、部署和适应
- en: As we explored in *[Chapter 1](Chapter_1.xhtml#h1_14)*, agentic AI systems represent
    the next step in the evolution of GenAI. This shift involves moving from centralized
    intelligence to distributed intelligence. Alongside this, stricter controls are
    gradually relaxed. This is made possible as the monitoring, governance, and steering
    of agentic systems become more common and reliable. Over time, a track record
    of confidence begins to emerge and gradually becomes the norm.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在*[第一章](Chapter_1.xhtml#h1_14)*中探讨的那样，代理人工智能系统代表了通用人工智能（GenAI）演化的下一步。这一转变涉及从集中式智能到分布式智能的转变。与此同时，更严格的控制逐渐放宽。这是由于代理系统的监控、治理和引导变得更加普遍和可靠而成为可能。随着时间的推移，一个信心记录开始出现，并逐渐成为常态。
- en: However, in retrospect, it may seem like a significant leap toward more autonomous,
    self-driven applications motivated by prompt-based goal steering. Recall that
    an AI agent is a system designed to perceive its environment, make decisions,
    and take actions to achieve specific goals, often exhibiting characteristics such
    as autonomy, reactivity, and proactivity. At the heart of many of these agents
    (particularly those requiring sophisticated understanding, complex reasoning to
    bridge perception to action, and nuanced communication) lies the LLM or, more
    generally, the **multi-modal model** (**MMM**) thatidx_9a6cd9b1 acts as the "brain"
    of the agent.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，回顾过去，这似乎是一个向更自主、自我驱动的应用迈出的重大飞跃，这些应用是由基于提示的目标引导所激发的。回想一下，人工智能代理是一个旨在感知其环境、做出决策并采取行动以实现特定目标的系统，通常表现出自主性、反应性和主动性等特征。在这些代理（尤其是那些需要复杂理解、将感知与行动联系起来并进行细微沟通的代理）的核心，是LLM或更普遍的**多模态模型**（**MMM**），它作为代理的“大脑”。
- en: The LLM typically serves as the cognitive engine or the reasoning core of an
    agent, enabling it to interpret inputs, formulate plans, and decide on actions
    within its characteristic *sense-reason-plan-act* loop. However, while the LLM
    is a critical enabler of an agent's intelligence, it's important to recognize
    that it is one component within a broader architecture that includes sensors,
    actuators (tools), memory, and goal-defining mechanisms, as outlined in the *The*
    *anatomy of agentic AI* section in *[Chapter 1](Chapter_1.xhtml#h1_14)*.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: LLM通常作为代理的认知引擎或推理核心，使它能够在其特征的*感知-推理-计划-行动*循环中解释输入、制定计划并决定行动。然而，尽管LLM是代理智能的关键推动者，但重要的是要认识到它只是更广泛架构中的一个组成部分，该架构包括传感器、执行器（工具）、记忆和目标定义机制，如*[第一章](Chapter_1.xhtml#h1_14)*中*代理人工智能的解剖学*部分所述。
- en: Making an LLM "agent-ready" involves more than just selecting the model with
    the highest benchmark scores. Indeed, the most capable general-purpose LLM might
    not always be the optimal choice for every agent or every task within an agentic
    system. As we will discuss, factors such as task-specificity, efficiency, latency,
    and cost can impact our choice, which means we could select smaller, more specialized
    LLMs. Furthermore, there's a compelling case for specialized LLM reasoners (smaller,
    task-specific LLMs that are trained and optimized to excel at tasks requiring
    reasoning and logical deduction rather than just memorization), and some advanced
    agentic designs might even employ a combination of LLMs – perhaps a larger model
    for orchestration and smaller, expert models for specific sub-tasks.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 使LLM“代理就绪”不仅仅是选择具有最高基准分数的模型。事实上，最强大的通用LLM可能并不总是每个代理或代理系统内每个任务的理想选择。正如我们将讨论的，任务特定性、效率、延迟和成本等因素会影响我们的选择，这意味着我们可能会选择更小、更专业的LLM。此外，对于专门的LLM推理器（较小、针对特定任务进行训练和优化的LLM，旨在在需要推理和逻辑推理的任务上表现出色，而不仅仅是记忆）有一个令人信服的案例，而且一些高级代理设计甚至可能采用LLM的组合——可能是一个用于协调的大模型和用于特定子任务的较小、专家模型。
- en: This chapter delves into the critical aspects of choosing, deploying, and preparing
    LLMs to serve as effective and efficient intelligence cores for robust and reliable
    agentic systems. We will first examine the multifaceted role LLMs play within
    agents. Then, we will explore the key criteria for selecting the right foundation
    model (or models), followed by strategies for optimal deployment and performance.
    Finally, we will introduce AgentOps for managing these vital components. The goal
    is to equip you with the knowledge to transform a powerful LLM (or a suite of
    LLMs) into a truly effective engine for your AI agents.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨了选择、部署和准备LLM以作为有效且高效的智能核心，为强大且可靠的智能体系统服务的关键方面。我们首先将检查LLM在智能体中扮演的多方面角色。然后，我们将探讨选择正确的基础模型（或模型）的关键标准，接着是优化部署和性能的策略。最后，我们将介绍AgentOps来管理这些关键组件。目标是让您具备将强大的LLM（或一系列LLM）转化为真正有效的AI智能体引擎的知识。
- en: 'In this chapter, we''ll be covering the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Role of LLMs in agentic systems
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM在智能体系统中的作用
- en: 'Model selection: choosing the right foundation'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型选择：选择正确的基石
- en: Deployment and performance optimization for agents
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体的部署和性能优化
- en: 'AgentOps: managing LLMs in agentic systems'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AgentOps：管理智能体系统中的LLM
- en: Role of LLMs in agentic systems
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM在智能体系统中的作用
- en: In the landscapeidx_d1bcf46f of agentic AI, LLMs have emerged as the predominant
    technology idx_e459b9cffor endowing agents with sophisticated cognitive capabilities.
    While an agent comprises multiple components (as will be detailed in *[Chapter
    4](Chapter_4.xhtml#h1_83)*, *Agentic AI* *A**rchitecture*), the LLM often serves
    as its central reasoning core or "brain," orchestrating the agent's journey from
    perception to action.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在智能体AI的领域中，LLM已经成为了赋予智能体复杂认知能力的占主导地位的技术。虽然智能体由多个组件组成（将在*[第4章](Chapter_4.xhtml#h1_83)*，*智能体AI*
    *架构*中详细说明），但LLM通常充当其核心推理核心或“大脑”，协调智能体从感知到行动的旅程。
- en: The process begins with understanding and interpretation. Agents are constantly
    sensing their environment, which might involve processing user requests in natural
    language, interpreting streams of unstructured data, or comprehending complex
    instructions. LLMs, with their advanced **natural language understanding** (**NLU**)
    and pattern recognition abilities, excel at making sense ofidx_d8a19531 these
    diverse inputs, transforming raw information into a structured understanding that
    the agent can work with.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程始于理解和解释。智能体不断感知其环境，这可能涉及处理自然语言的用户请求、解释非结构化数据流或理解复杂指令。具有高级**自然语言理解**（NLU）和模式识别能力的LLM在处理这些多样化的输入方面表现出色，将原始信息转化为智能体可以操作的结构化理解。
- en: Once an understanding is established, the LLM facilitates the critical functions
    of *reasoning*, *planning*, and *decision-making*. An agent must be able to reason
    about its current state, its overarching goals, and the information it has gathered
    to formulate a coherent plan of action. LLMs can perform this by engaging in multi-step
    reasoning, breaking down complex objectives into manageable sub-tasks, and generating
    potential sequences of actions.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了理解，LLM就促进了*推理*、*规划*和*决策制定*等关键功能。智能体必须能够对其当前状态、总体目标和收集到的信息进行推理，以制定连贯的行动计划。LLM可以通过进行多步推理、将复杂目标分解为可管理的子任务以及生成潜在的动作序列来实现这一点。
- en: For instance, consider a LoanFlow orchestrator agent tasked with processing
    a new loan application. Such complex, multi-step processes are common in enterprise
    settings and serve as excellent examples for illustrating agentic capabilities,
    which we will explore further in use case chapters.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个负责处理新贷款申请的LoanFlow编排智能体。这种复杂的多步骤流程在企业环境中很常见，是展示智能体能力的优秀例子，我们将在用例章节中进一步探讨。
- en: '![Image 1](img/B33147_2_1.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图像1](img/B33147_2_1.png)'
- en: Figure 2.1 – The LLM as the central reasoning core of an AI agent
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 – LLM作为AI智能体的核心推理核心
- en: The LLM at the core of this orchestrator agent wouldn't just passively understand
    the application; it would actively plan the processing pipeline. This planning
    can be illustrated through an idx_b7a331e2iterative idx_f57b63facycle. The frameworks
    that guide this cycle represent different levels of maturity and sophistication
    in agentic systems.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 核心的LLM不会只是被动地理解申请；它将积极规划处理流程。这种规划可以通过一个idx_b7a331e2迭代idx_f57b63facycle来表示。引导此循环的框架代表了代理系统中不同成熟度和复杂性的水平。
- en: For instance, the process shown in the following table idx_f8c666a7resembles
    a **ReAct** (**Reason-Act**) framework, where the agent synergizes reasoning and
    acting in a loop. At a more advanced level of maturity, agents can incorporate
    self-reflection and feedback loops to learn from their actions and self-correct,
    a patternidx_c9b020a1 known as ***Reflexion***. This introduces a mechanism for
    continuous improvement.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下表格中显示的过程类似于**ReAct**（**推理-行动**）框架，其中代理在循环中协同推理和行动。在更高级的成熟度水平上，代理可以结合自我反思和反馈循环，从其行动中学习并自我纠正，这种模式称为**反思**。这引入了一种持续改进的机制。
- en: For particularly complex problems, even more sophisticated reasoning techniques
    can be employed. **Tree-of-****t****hought** (**ToT**), for example, allows an
    agent to explore different reasoning paths or branchesidx_fd39c958 simultaneously,
    enabling more deliberate problem-solving. These advanced frameworks are hallmarks
    of the highest levels of the GenAI Maturity Model, where multi-agent systems can
    enhance their reasoning, planning, and decision-making capabilities.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于特别复杂的问题，甚至可以采用更复杂的推理技术。例如，**思维树**（**ToT**）允许代理同时探索不同的推理路径或分支，从而实现更谨慎的问题解决。这些高级框架是GenAI成熟度模型最高水平的标志，其中多代理系统可以增强其推理、规划和决策能力。
- en: The choice of framework, from a direct ReAct cycle to one that includes self-reflection
    or multi-path exploration, dependsidx_3222bc53 onidx_daee4040 the complexity of
    the task and the desired level of autonomy and intelligence for the agent.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 框架的选择，从直接的ReAct循环到包括自我反思或多路径探索的循环，取决于任务的复杂性和代理所需的自主性和智能水平。
- en: 'The following table outlines a process like the iterative ReAct framework:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格概述了一个类似于迭代ReAct框架的过程：
- en: '| **Step** | **Phase** | **Description** **within** **the** **LoanFlow****o****rchestrator**
    **a****gent** |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| **步骤** | **阶段** | **LoanFlow Orchestrator代理中的描述** |'
- en: '| --- | --- | --- |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Goal/initial state | New loan application package received. |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 目标/初始状态 | 收到新的贷款申请包。 |'
- en: '| 2 | LLM reason (thought) | `The first step is to ensure all submitted documents
    are present and legible, then extract key information`. |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| 2 | LLM推理（思考） | 第一步是确保所有提交的文件都存在且可读，然后提取关键信息。 |'
- en: '| 3 | LLM action (tool use) | Invoke `DocumentValidationAndParsingTool` with
    the application files as input. |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| 3 | LLM行动（工具使用） | 使用应用程序文件作为输入调用`DocumentValidationAndParsingTool`。 |'
- en: '| 4 | Observation (result) | Tool returns extracted data (e.g., applicant name,
    income, and loan amount) and validation status (`All clear`). |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 观察（结果） | 工具返回提取的数据（例如，申请人姓名、收入和贷款金额）和验证状态（`全部通过`）。 |'
- en: '| 5 | LLM reason (thought) | `Documents are validated. Now, I need to assess
    financial risk: check credit score and run fraud detection`. |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| 5 | LLM推理（思考） | 文件已验证。现在，我需要评估财务风险：检查信用评分和运行欺诈检测。 |'
- en: '| 6 | LLM action (tool use) | Invoke `CreditCheckTool` (with applicant ID)
    and `FraudDetectionTool` (with application details). |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| 6 | LLM行动（工具使用） | 调用`CreditCheckTool`（带有申请人ID）和`FraudDetectionTool`（带有申请详情）。
    |'
- en: '| 7 | Observation (result) | Agent receives credit score (e.g., `750`) and
    fraud risk assessment (e.g., `Low Risk`). |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 观察（结果） | 代理收到信用评分（例如，`750`）和欺诈风险评估（例如，`低风险`）。 |'
- en: '| 8 | LLM reason (thought) | `Credit` `score is` `strong, fraud risk low. The
    next step is regulatory and internal policy compliance check`. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| 8 | LLM推理（思考） | 信用评分高，欺诈风险低。下一步是合规性和内部政策合规性检查。 |'
- en: '| 9 | LLM action (tool use) | Invoke `ComplianceCheckTool` with all relevant
    application data and risk assessments. |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| 9 | LLM行动（工具使用） | 使用所有相关应用程序数据和风险评估调用`ComplianceCheckTool`。 |'
- en: '| 10 | Observation (Result) | Tool returns compliance status (e.g., `Compliant`).
    |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 10 | 观察（结果） | 工具返回合规状态（例如，`合规`）。 |'
- en: '| 11 | LLM reason (thought) | `All checks have passed. The application is ready
    for underwriting review or final decision`. |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| 11 | LLM推理（思考） | `所有检查均已通过。应用程序已准备好进行承保审查或最终决策`。|'
- en: '| 12 | LLM action (decision) | Prepare a summary report for a human underwriter
    or invoke `FinalDecisionTool`. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 12 | LLM行动（决策） | 为人类承保人准备一份总结报告或调用`FinalDecisionTool`。|'
- en: Table 2.1 – Illustrative LLM-driven planning cycle for loan processing
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 表2.1 – 由LLM驱动的贷款处理规划周期的示例
- en: This iterative cycle of reasoning about the current state and observations and
    then deciding on the next action (often involving tool use) showcases how the
    LLM actively plans and drives the workflow within the agent. While we will explore
    specific agent design patterns and advanced reasoning techniques in greater detail
    in *Part* *2* of this book, this example highlights the LLM's crucial role in
    transforming a general goal into a sequence of concrete, actionable steps.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这个关于当前状态和观察的推理迭代周期，然后决定下一步行动（通常涉及工具使用），展示了LLM如何积极地在代理内部规划和推动工作流程。虽然我们将在本书的第二部分更详细地探讨具体的代理设计模式和高级推理技术，但这个例子突出了LLM在将一般目标转化为一系列具体、可执行步骤中的关键作用。
- en: A pivotal aspect of this decision-making idx_42a0052cprocess is **tool orchestration**.
    Agents inherently use tools to interact with and affect their environment; this
    is a foundational construct in agentic AI. The LLM is typically responsible for
    the intelligent selection and invocation of these tools. It decides which specific
    tool is best suited for the current sub-task, when it should be called, and with
    what parameters it should idx_a5452e7fbeidx_3e72b60d executed. This effectively
    makes the LLM the conductor of the agent's available functionalities, translating
    abstract plans into concrete interactions. The mechanics of tool definition and
    invocation will be examined further in *[Chapter 4](Chapter_4.xhtml#h1_83)*.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这个决策过程中的一个关键方面是**工具编排**。代理本质上是使用工具来与其环境和影响其环境进行交互；这是代理AI的基础结构。LLM通常负责智能选择和调用这些工具。它决定哪个特定工具最适合当前子任务，何时应该调用，以及应该使用什么参数来执行。这实际上使LLM成为代理可用功能的指挥者，将抽象计划转化为具体交互。工具定义和调用的机制将在*[第4章](Chapter_4.xhtml#h1_83)*中进一步探讨。
- en: Finally, LLMs empower agents with robust communication and generation capabilities.
    Agents frequently need to interact with users by providing explanations, requesting
    clarifications, or delivering information. They might also need to communicate
    with other agents in a multi-agent system. The **natural language generation**
    (**NLG**) prowessidx_e2a5004b of LLMs allows agents to articulate their outputs,
    decisions, and requests in a clear, coherent, and human-understandable (or machine-interpretable)
    format.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，LLMs赋予代理强大的沟通和生成能力。代理经常需要通过与用户提供解释、请求澄清或提供信息来与用户互动。他们还可能需要在多代理系统中与其他代理进行沟通。LLMs的**自然语言生成**（**NLG**）能力使得代理能够以清晰、连贯和人类可理解（或机器可解释）的格式表达他们的输出、决策和请求。
- en: It's crucial to reiterate that while the LLM is the cognitive engine, it operates
    within a broader agentic architecture. It receives processed data from perception
    components, accesses and updates memory to maintain context, and triggers actions
    through an action interface, often involving the orchestrated use of tools. The
    synergy between the LLM and these other components is what brings an intelligent
    agent to life.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要重申，虽然LLM是认知引擎，但它在一个更广泛的代理架构中运行。它从感知组件接收处理后的数据，访问和更新内存以保持上下文，并通过动作接口触发动作，通常涉及工具的编排使用。LLM与这些其他组件之间的协同作用使得智能代理得以实现。
- en: Now that we've established the pivotal role of LLMs as the reasoning core in
    agentic systems, understanding how to idx_cde394f6chooseidx_bb627d38 the right
    LLM becomes paramount. The selection process is a critical first step before an
    LLM can be effectively deployed and adapted for agentic tasks.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经确立了LLMs在代理系统中的核心推理作用，了解如何选择正确的LLM变得至关重要。选择过程是在LLM能够有效部署和适应代理任务之前的一个关键步骤。
- en: 'Model selection: choosing the right foundation'
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型选择：选择正确的基座
- en: Selecting the idx_3da4bac6appropriate LLM is a foundational and multifaceted
    step in building any effective agentic system. The choice of model will significantly
    impact the agent's capabilities, its operational performance characteristics such
    as latency and cost, and its overall maintainability and trustworthiness.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的idx_3da4bac6大型语言模型（LLM）是构建任何有效代理系统的基本且多方面的步骤。模型的选择将显著影响代理的能力、其操作性能特征（如延迟和成本），以及其整体的可维护性和可靠性。
- en: With a plethora of models available and being released, ranging from large,
    general-purpose foundation models to smaller, more specialized ones, making an
    informed decision requires careful consideration of several interdependent factors
    tailored to specific agentic use cases. It is not merely about picking the model
    with the highest benchmark scores; rather, it is about finding the best fit across
    a spectrum of capabilities and constraints. While dedicated open source frameworks
    exist to help compare models on standard benchmarks, a truly effective selection
    process for an agent requires a deeper, task-specific evaluation.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在众多模型可供选择和发布的情况下，从大型通用基础模型到小型、更专业的模型，做出明智的决定需要仔细考虑几个相互依赖的因素，这些因素针对特定的代理用例进行了定制。这不仅仅是选择具有最高基准分数的模型；而是关于在一系列能力和约束之间找到最佳匹配。虽然存在专门的开源框架来帮助在标准基准上比较模型，但一个真正有效的代理选择过程需要更深入、针对特定任务的评估。
- en: The dimensions for model selection are broad. One key aspect involves assessing
    the model's inherent capabilities for the tasks the agent will perform. This includes
    its reasoning and instruction-following abilities, the breadth of its knowledge,
    and, crucially for agents, its native support for tool use and function calling.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 模型选择的维度非常广泛。一个关键方面涉及评估模型在代理将执行的任务中的内在能力。这包括其推理和指令遵循能力，其知识广度，以及对于代理至关重要的本机对工具使用和函数调用的支持。
- en: The ability for an LLM to determine what tool to use, when to call it, and with
    what parameters is a fundamental upgrade for creating active, tool-using agents,
    moving them beyond simple text generation. Furthermore, the model's context window
    size plays a pivotal role; larger context windows, with some modern models such
    as Gemini processing up to two million tokens, allow agents to process entire
    documents or maintain longer conversation histories, enabling more comprehensive
    understanding and reducing the need for complex data chunking strategies.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: LLM确定使用什么工具、何时调用它以及使用什么参数的能力是创建主动、使用工具的代理的基本升级，使其超越简单的文本生成。此外，模型的内容窗口大小也起着关键作用；较大的内容窗口，例如Gemini等一些现代模型可以处理高达两百万个标记，允许代理处理整个文档或维持更长的对话历史，从而实现更全面的理解并减少对复杂数据分块策略的需求。
- en: Beyond raw capability, operational viability and efficiency present another
    critical set of considerations. This is where the trade-offs between large, general-purpose
    models and the increasing relevance of smaller, task-specific LLMs come into play.
    These *small yet mighty* AIs, such as those in the Gemma family or other compact
    models such as the ones in the Mistral and Phi series, can offer significant advantages
    in terms of lower latency and reduced computational costs, making them highly
    suitable as efficient reasoners for specific agent tasks.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 除了原始能力之外，操作可行性和效率也呈现另一组关键考虑因素。这就是大型通用模型和越来越重要的较小、特定任务LLM之间权衡的地方。这些“小而强大”的AI，如Gemma系列或其他紧凑型模型，如Mistral和Phi系列，在降低延迟和减少计算成本方面可以提供显著优势，使它们成为特定代理任务的效率推理器非常合适。
- en: Established best practices for enterprise GenAI adoption also emphasize that
    factors such as data privacy, the technical challenges of integration, and the
    required technical expertise for deployment and maintenance are vital.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 企业级通用人工智能（GenAI）采用的既定最佳实践也强调，数据隐私、集成的技术挑战以及部署和维护所需的技术专长等因素至关重要。
- en: Finally, ensuring model robustness, reliability, and safety, including resistance
    to adversarial inputs and mitigation of biases, is non-negotiable for production-grade
    agentic systems that are expected to be trustworthy and secure.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，确保模型的鲁棒性、可靠性和安全性，包括对对抗性输入的抵抗和缓解偏差，对于预期可信赖和安全的量产级代理系统来说是不可协商的。
- en: 'The following tableidx_77fc03bf summarizes the key dimensions influencing LLM
    selection for agentic systems:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 下表idx_77fc03bf总结了影响代理系统LLM选择的几个关键维度：
- en: '| **Dimension** | **Key** **c****onsiderations/****f****ocus** |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **维度** | **关键** **考虑因素/****焦点** |'
- en: '| --- | --- |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Inherent capabilities | Reasoning, instruction following, knowledge breadth,
    and native tool use/function calling. |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| 内在能力 | 推理、指令遵循、知识广度和原生工具使用/函数调用。|'
- en: '| Context window size | Ability to process and retain information, handle long
    dialogues, support multi-step tasks, and enable **in-context learning** (**ICL**).
    |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| 上下文窗口大小 | 处理和保留信息的能力、处理长对话、支持多步任务以及启用**上下文学习**（**ICL**）。|'
- en: '| Operational viability | Latency, throughput, computational cost, and overall
    efficiency. Trade-offs between large vs. smaller/specialized models. |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 运营可行性 | 延迟、吞吐量、计算成本和整体效率。大型模型与小型/专用模型之间的权衡。|'
- en: '| Robustness and reliability | Resistance to adversarial inputs, consistent
    performance, factual accuracy, and low hallucination tendency. |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 坚韧性和可靠性 | 对对抗性输入的抵抗力、一致的性能、事实准确性以及低幻觉倾向。|'
- en: '| Safety and security | Bias mitigation, content safety filters, data privacy
    during inference, and secure model access. |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 安全性和安全性 | 偏差缓解、内容安全性过滤器、推理过程中的数据隐私以及安全模型访问。|'
- en: '| Adaptability | Ease of fine-tuning (PEFT or full), performance with RAG,
    and ICL capability. |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 适应性 | 微调的简便性（PEFT或完整），与RAG的性能以及ICL能力。|'
- en: '| Task and domain specificity | Alignment of model strengths with specific
    agent tasks or industry domains; potential for specialization. |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 任务和领域特定性 | 模型优势与特定代理任务或行业领域的对齐；专业化的潜力。|'
- en: '| Integration and deployment | Ease of integration with existing systems, and
    compatibility with deployment environments (cloud, on-premises, or edge). |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 集成和部署 | 与现有系统集成的简便性，以及与部署环境（云、本地或边缘）的兼容性。|'
- en: '| Maintainability and governance | Technical expertise required, provider support,
    licensing, explainability features, and ongoing management (AgentOps). |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 可维护性和治理 | 需要的技术专长、提供商支持、许可、可解释性功能以及持续管理（AgentOps）。|'
- en: Table 2.2 – Key dimensions for LLM selection in agentic systems
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 表2.2 – 代理系统中LLM选择的键维度
- en: Having outlined these broad dimensions, the following subsections will examine
    each of these critical selection factors inidx_4fe61a19 greater detail, starting
    with the importance of context window size.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在概述了这些广泛的维度之后，以下子节将更详细地检查这些关键选择因素，从上下文窗口大小的重要性开始。
- en: Context window size
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文窗口大小
- en: One of the most critical idx_7cda3cd9technical specifications for an agent-ready
    LLM is its context window size. A larger context window allows the LLM to process
    and retain more information simultaneously, a capability that is paramount for
    effective agentic systems.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个准备好的代理LLM来说，上下文窗口大小是最关键的idx_7cda3cd9技术规格之一。更大的上下文窗口允许LLM同时处理和保留更多信息，这对于有效的代理系统至关重要。
- en: The ongoing expansion of context windows, with some models such as Gemini now
    supporting impressive lengths such as one million or even up to an experimental
    two million tokens for specific modalities or versions, is unlocking powerful
    new capabilities for agent design.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口的持续扩展，一些模型如Gemini现在支持令人印象深刻的长度，例如一百万甚至高达实验性的两百万个标记，为代理设计解锁了强大的新功能。
- en: The benefits of a substantial context window are manifold in agentic applications.
    For agents, especially conversational ones, a large context window is essential
    for handling complex dialogues and maintaining state. It allows the LLM to *remember*
    more of the interaction history, leading to coherent and contextually relevant
    responses over extended conversations. Similarly, agents often need to process
    extensive documents or data, such as internal knowledge bases, user-provided documents,
    or operational data streams.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理应用中，一个较大的上下文窗口的好处是多方面的。对于代理，尤其是对话型代理，一个大的上下文窗口对于处理复杂对话和维持状态至关重要。它允许LLM记住更多的交互历史，从而在长时间的对话中产生连贯且与上下文相关的响应。同样，代理通常需要处理大量的文档或数据，例如内部知识库、用户提供的文档或运营数据流。
- en: An LLM with a large context window can ingest and reason over this data more
    effectively within a single pass, reducing the necessity for intricate chunking
    mechanisms and iterative processing strategies that can introduce complexity and
    potential loss of coherence. A large context window, for instance, allows an agent
    to potentially comprehend an entire book or a lengthy legal document in one go,
    which is transformative for tasks requiring holistic understanding.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有大上下文窗口的LLM可以在单次遍历中更有效地摄取和推理这些数据，减少了对复杂分块机制和迭代处理策略的需求，这些策略可能会引入复杂性和潜在的连贯性损失。例如，一个大的上下文窗口允许代理一次性理解整本书或一份冗长的法律文件，这对于需要整体理解的任务来说具有变革性。
- en: Furthermore, supporting multi-step tasks is greatly enhanced by larger context
    windows. Complex agentic tasks frequently involve multiple steps where information
    and decisions from earlier stages are crucial for successful execution in later
    ones. A larger context window helps the LLM maintain this necessary informational
    thread throughout the task's duration, capturing long-range dependencies that
    might be sections or even chapters apart in source material.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，支持多步任务的能力通过更大的上下文窗口得到了极大的增强。复杂的代理任务通常涉及多个步骤，其中早期阶段的信息和决策对于后续阶段的成功执行至关重要。更大的上下文窗口有助于LLM在整个任务期间维持这一必要的信息线索，捕捉到可能在原始材料中相隔数节或甚至数章的长期依赖关系。
- en: This also ties into facilitating ICL. Although ICL as an adaptation technique
    will be explored in detail in *[Chapter 3](Chapter_3.xhtml#h1_59)*, the LLM's
    capacity to handle extensive contexts is a prerequisite. It enables more effective
    few-shot or even many-shot prompting, allowing the agent to adapt its behavior
    based on examples provided directly in the prompt, often without requiring more
    resource-intensive fine-tuning.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这也与促进ICL有关。尽管ICL作为一种适应技术将在*[第3章](Chapter_3.xhtml#h1_59)*中详细探讨，但LLM处理广泛上下文的能力是先决条件。它使得更有效的少样本或甚至多样本提示成为可能，允许代理根据提示中直接提供的示例调整其行为，通常无需进行更资源密集的微调。
- en: 'However, when selecting a model based on its context window, it is crucial
    to evaluate not just the advertised maximum length but also its effective utilization
    of that length. The *needle in a haystack* test (see *Gemini 1.5: Unlocking multimodal
    understanding across millions of tokens of context* at ([https://arxiv.org/html/2403.05530v2](https://arxiv.org/html/2403.05530v2))
    has become a common method for this type of evaluation. This test involves embedding
    a specific piece of information (the needle) within a very large and potentially
    distracting body of text (the haystack) and then querying the LLM to see whether
    it can accurately retrieve or reason about that specific piece of information.
    The position of the *needle* (beginning, middle, or end of the context) and the
    overall length of the *haystack* are varied to assess the model''s performance
    under different conditions.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在根据其上下文窗口选择模型时，不仅要评估其宣传的最大长度，还要评估其对长度的有效利用。*大海捞针*测试（参见*Gemini 1.5：解锁数百万上下文标记的多模态理解*，见([https://arxiv.org/html/2403.05530v2](https://arxiv.org/html/2403.05530v2)）已成为此类评估的常用方法。这种测试涉及在非常庞大且可能令人分心的文本体（稻草堆）中嵌入特定的信息（针），然后查询LLM以查看它是否能够准确检索或推理该特定信息。通过改变*针*的位置（上下文的开始、中间或结束）和*稻草堆*的整体长度，来评估模型在不同条件下的性能。
- en: 'When evaluating long context windows, several factors must be kept in mind:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当评估长上下文窗口时，必须注意几个因素：
- en: There may be a difference between the theoretical maximum context length and
    the practically usable length where the model maintains high fidelity. Performance
    might degrade as the amount of context grows or as the key information is placed
    further from the start or end of the prompt. Some models may exhibit positional
    bias, performing better when the crucial information is at the very beginning
    or end of the context, rather than buried deep in the middle.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理论上的最大上下文长度和模型保持高保真度的实际可用长度之间可能存在差异。随着上下文数量的增加或关键信息放置在提示的开始或结束之外，性能可能会下降。某些模型可能表现出位置偏差，当关键信息位于上下文的开始或结束时表现更好，而不是深埋在中间。
- en: The computational cost and latency are significant considerations. Processing
    longer contexts typically requires more computational resources and can lead to
    increased response times, which might be a critical factor for interactive agents.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算成本和延迟是重要的考虑因素。处理较长的上下文通常需要更多的计算资源，并可能导致响应时间增加，这可能是交互式代理的一个关键因素。
- en: It's important to assess the actual needs of the agentic application. While
    a very large context window might seem advantageous, it might be an unnecessary
    overhead if the agent's tasks primarily involve shorter interactions or smaller
    documents.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估代理应用的实际需求非常重要。虽然一个非常大的上下文窗口可能看起来具有优势，但如果代理的任务主要涉及较短的交互或较小的文档，这可能会是一个不必要的开销。
- en: The chosen context window capability should align with the genuine complexity
    and information requirements of the agent's intended functions. Thus, careful
    benchmarking, including tests idx_93ed19b2similar to the *needle in a haystack*
    approach, tailored to your specific use case, is essential to ensure that the
    selected LLM can truly leverage its proclaimed context window effectively and
    efficiently for your agentic system.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 所选的上下文窗口能力应与代理预期功能的真实复杂性和信息需求相一致。因此，包括针对您特定用例的类似“大海捞针”方法的测试在内的仔细基准测试是必不可少的，以确保所选的LLM能够真正有效地利用其宣称的上下文窗口为您的代理系统服务。
- en: Model size and specialization for agents
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型大小和代理的专门化
- en: The adage *bigger is always better* does idx_34ba268anot necessarily hold true
    when selecting LLMs for agentic systems. While larger models often boast a wider
    range of capabilities, understanding what these capabilities entail and whether
    they align with an agent's specific purpose is crucial.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择代理系统中的LLM时，“越大越好”的谚语并不一定总是成立。虽然较大的模型通常拥有更广泛的性能范围，但理解这些能力包含的内容以及它们是否与代理的特定目的相一致是至关重要的。
- en: There is a growing recognition of the power and relevance of smaller, task-specific
    LLMs, which can serve as highly efficient reasoners for agents. The choice between
    a large, general-purpose foundation model and a smaller, potentially fine-tuned
    or distilled model involves a careful consideration of several trade-offs.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更小、特定任务的LLM的力量和相关性越来越受到认可，这些LLM可以作为代理的高效推理器。在大型通用基础模型和较小、可能经过微调或蒸馏的模型之间进行选择，需要仔细考虑几个权衡。
- en: When we speak of a "more capable" LLM, especially in an agentic context, we're
    often referring to a confluence of advanced attributes. Superior reasoning capabilities
    are paramount; this includes the ability to perform complex multi-step reasoning,
    break down ambiguous problems into logical sub-tasks, and maintain coherence through
    extended chains of thought. It also encompasses sophisticated instruction following,
    where the model can understand and execute nuanced, multi-part, or conditional
    directives.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们提到“更强大的”LLM时，尤其是在代理环境中，我们通常指的是一系列高级属性的汇聚。卓越的推理能力至关重要；这包括执行复杂的多步推理、将模糊问题分解为逻辑子任务，并通过扩展的思维链保持连贯性。它还包括复杂的指令遵循，其中模型可以理解并执行细微、多部分或条件指令。
- en: A highly capable model might exhibit stronger knowledge synthesis, not just
    recalling isolated facts but adeptly integrating diverse information to generate
    novel insights or formulate complex plans. For agents that interact with the world,
    advanced capabilities also mean more sophisticated tool use orchestration, potentially
    involving selecting from numerous tools, chaining their use intelligently, and
    interpreting complex outputs from these external functionalities. However, these
    advanced capabilities, often found in the largest models, come with inherent trade-offs.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个高度强大的模型可能表现出更强的知识综合能力，不仅能够回忆孤立的事实，而且能够巧妙地整合各种信息以产生新的见解或制定复杂的计划。对于与世界互动的代理，高级能力还意味着更复杂的工具使用编排，可能涉及从众多工具中选择、智能地链接它们的使用，并解释来自这些外部功能的复杂输出。然而，这些通常在最大模型中找到的高级能力伴随着固有的权衡。
- en: Large, general-purpose models, such as GPT-4, Claude 3, or Gemini Pro, offer
    the advantage of a broad knowledge base and strong general reasoning and synthesis
    capabilities. They often excel at complex instruction following and demonstrate
    impressive zero-shot or few-shot learning performance, adapting to new tasks with
    minimal examples.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 大型通用模型，如 GPT-4、Claude 3 或 Gemini Pro，具有广泛的知识库和强大的通用推理与综合能力优势。它们通常在复杂指令遵循方面表现出色，并展现出令人印象深刻的零样本或小样本学习性能，能够通过最少量的示例适应新任务。
- en: These characteristics can make them suitable for multi-skilled agents, agents
    requiring a deep understanding of diverse and unpredictable inputs, or orchestrator
    agents that need to manage complex workflows and delegate to other specialized
    agents or tools.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这些特性使它们适合于多技能代理、需要深入理解多样且不可预测输入的代理，或需要管理复杂工作流程并将任务委托给其他专业代理或工具的协调代理。
- en: However, their advanced prowess typically translates to higher computational
    costs for both training (if applicable) and inference, potentially leading to
    increased latency. Their sheer complexity can also make them less interpretable
    – understanding why a very large model made a specific decision can be challenging.
    For narrowly defined agent tasks, their extensive capabilities might represent
    an unnecessary overhead, consuming more resources and time than a simpler task
    warrants.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它们的先进能力通常会导致训练（如果适用）和推理的计算成本更高，可能导致延迟增加。它们的复杂性也可能使它们更难以解释——理解一个非常大的模型为何做出特定决策可能具有挑战性。对于定义狭窄的代理任务，它们广泛的能力可能代表不必要的开销，消耗比简单任务更多的资源和时间。
- en: Conversely, smaller, task-specific models, including those from the Gemma family
    or various specialized open idx_ea4d03c2source options, present a compelling alternative
    by excelling in efficiency and focused performance.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，较小、针对特定任务的模型，包括 Gemma 家族或各种专门的开放 idx_ea4d03c2源选项，通过在效率和专注性能方面表现出色，提供了一个引人注目的替代方案。
- en: Their primary benefits include lower computational costs and reduced latency,
    which is critical for interactive agents requiring near-real-time responses or
    agents deployed in resource-constrained environments. For instance, frameworks
    leveraging the GGUF file format (the successor to GGML) specialize in model quantization,
    a process that shrinks a model's size and computational cost by reducing the precision
    of its numerical weights. This technique allows even relatively complex models
    to run efficiently on consumer-grade CPUs, making true on-device or edge deployments
    practical. Similarly, serving libraries such as vLLM optimize inference throughput,
    making self-hosted specialized agents both performant and cost-effective.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 它们的首要好处包括较低的计算成本和降低的延迟，这对于需要近乎实时响应的交互式代理或在资源受限环境中部署的代理至关重要。例如，利用 GGUF 文件格式（GGML
    的继任者）的框架专门从事模型量化，通过降低其数值权重的精度来缩小模型的大小和计算成本。这种技术使得即使是相对复杂的模型也能在消费级 CPU 上高效运行，使得真正的设备或边缘部署成为可能。同样，如
    vLLM 这样的服务库优化推理吞吐量，使得自托管的专业代理既高效又经济。
- en: Smaller models can often be more interpretable, and through techniques such
    as fine-tuning or knowledge distillation from larger models, they can be highly
    optimized for specific tasks or domains. For instance, an agent focused solely
    on SQL generation, summarizing customer service transcripts, or classifying incoming
    support tickets might achieve superior performance with a smaller, specialized
    model that has been expertly tuned for that particular function.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 较小的模型通常更易于解释，并且通过微调或从较大模型中提取知识蒸馏等技术，它们可以针对特定任务或领域进行高度优化。例如，专注于仅生成 SQL、总结客户服务记录或分类来支持票的代理，可能通过一个针对该特定功能经过专家调优的较小、专业化的模型实现更优越的性能。
- en: These models can retain key capabilities relevant to their task while operating
    with greater efficiency. The main drawback is their limited general knowledge
    and potentially narrow range of reasoning patterns, which might necessitate more
    significant effort in fine-tuning or adaptation if the agent's role unexpectedly
    requires broader understanding or more complex reasoning beyond its initial specialization.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型可以在保持与任务相关的关键能力的同时，以更高的效率运行。主要缺点是它们的通用知识有限，推理模式可能范围较窄，如果代理的角色意外需要更广泛的理解或超出其初始专业化的更复杂推理，可能需要更多的微调或适应工作。
- en: 'When making a decision on model size and specialization, several key considerations
    should guide the choice:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在决定模型大小和专业化的决策中，以下几个关键考虑因素应指导选择：
- en: '**Agent task complexity**: This is a primary factor. A multi-skilled *super**agent*
    or one tackling multifaceted problems, such as the research assistant, might benefit
    from a larger model''s versatility, whereas a specialized *worker agent*, such
    as the smart home controller, could achieve optimal performance with a smaller,
    focused model.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理任务复杂性**：这是一个主要因素。一个多技能的*超级代理*或解决多方面问题的代理，如研究助理，可能从更大模型的灵活性中受益，而一个专门的*工作代理*，如智能家居控制器，可能通过较小的、专注的模型实现最佳性能。'
- en: '**Reasoning and knowledge requirements**: Assess the depth and breadth of reasoning
    needed. Does the agent need to synthesize novel information, or primarily follow
    well-defined procedures based on specific inputs?'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理和知识需求**：评估所需推理的深度和广度。代理是否需要综合新颖信息，还是主要基于特定输入遵循定义良好的程序？'
- en: '**Performance requirements**: Latency, in particular, is crucial. Interactive
    agents often demand near-real-time responses, which typically favors smaller,
    faster models.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能要求**：特别是延迟至关重要。交互式代理通常需要近乎实时的响应，这通常有利于更小、更快的模型。'
- en: '**Cost constraints**: These encompass expenses related to inference, potential
    fine-tuning, and hosting, and will heavily influence the selection. The cost per
    task for the smart home agent should be minimal, while it might be higher for
    the research assistant.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本限制**：这包括与推理、潜在微调和托管相关的费用，并将严重影响选择。智能家居代理每项任务的成本应尽可能低，而对于研究助理可能更高。'
- en: '**Interpretability needs**: The necessity of understanding *why* an agent made
    a particular decision can sometimes be better met by smaller, more transparent
    models, which might be important for debugging or compliance in certain agentic
    applications.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性需求**：理解代理为何做出特定决策的必要性有时可以通过更小、更透明的模型更好地满足，这对于某些代理应用的调试或合规性可能很重要。'
- en: '**Deployment environment**: The intended environment, whether cloud, on-premises,
    or edge devices, will impose practical limits on feasible model sizes and types.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署环境**：目标环境，无论是云、本地还是边缘设备，将对可行模型的大小和类型施加实际限制。'
- en: Always consider an idx_15ca094aagentic system architecture where a larger, more
    powerful LLM acts as an orchestrator or planner. This central agent can then delegate
    specific sub-tasks to smaller, specialized LLMs or other dedicated tools. This
    hybrid approach can effectively balance broad capability with operational efficiency
    and cost-effectiveness.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 总是考虑一个idx_15ca094aagentic系统架构，其中更大的、更强大的LLM充当协调器或规划者。然后，这个中心代理可以将特定子任务委托给较小的、专业的LLM或其他专用工具。这种混合方法可以有效地平衡广泛的能力与操作效率和成本效益。
- en: 'Let''s take a look at some examples of choosing the right model for different
    agent tasks:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些选择不同代理任务正确模型的例子：
- en: '**AI medical research assistant agent**: This agent is tasked with ingesting
    and understanding dozens of lengthy, complex medical research papers, identifying
    novel correlations between different studies, formulating new hypotheses for drug
    interactions based on subtle textual cues, and then drafting a preliminary research
    proposal. For such an agent, a highly capable model with a very large context
    window (to process full papers), sophisticated reasoning and knowledge synthesis
    abilities (to find novel connections), and strong NLG capabilities (for drafting
    proposals) would be paramount. The higher cost and potential latency might be
    acceptable given the complexity and value of the insights sought. A model such
    as Gemini Pro or GPT-4 with advanced analysis capabilities would be a strong candidate
    here.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI医学研究助理代理**：这个代理的任务是吸收和理解数十篇长篇、复杂的医学研究论文，识别不同研究之间的新颖相关性，根据微妙的文本线索制定新的药物相互作用假设，然后起草初步的研究提案。对于这样的代理，一个高度能干的模型，具有非常大的上下文窗口（处理全文）、复杂的推理和知识综合能力（找到新颖的联系），以及强大的自然语言生成能力（起草提案）至关重要。鉴于所寻求的洞察力的复杂性和价值，更高的成本和潜在的延迟可能是可以接受的。像Gemini
    Pro或GPT-4这样的具有高级分析能力的模型将是这里的一个强有力的候选人。'
- en: '**Smart home device control agent**: This agent''s primary role is to understand
    simple voice commands (e.g., "Turn on the living room lights" or "Set thermostat
    to 72 degrees") and translate these into API calls to smart home devices. Here,
    speed, low latency, and cost-effectiveness are critical. The agent needs reliable
    natural language understanding for a limited domain and accurate function calling.
    A smaller, highly efficient model, perhaps even one capable of running on an edge
    device or a small cloud instance, would be far more suitable. Extensive world
    knowledge or deep multi-step reasoning is unnecessary. A specialized or distilled
    version of a model, such as Gemma, fine-tuned for command interpretation and tool
    use, would be a more appropriate and economical choice.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能家居设备控制代理**：这个代理的主要角色是理解简单的语音命令（例如，“打开客厅的灯”或“将恒温器设置为72度”），并将这些命令翻译成智能家庭设备的API调用。在这里，速度、低延迟和成本效益至关重要。代理需要有限领域的可靠自然语言理解和准确的功能调用。一个更小、更高效的模型，甚至可能是在边缘设备或小型云实例上运行的模型，将更适合。广泛的世界知识或深层次的推理步骤是不必要的。一个针对命令解释和工具使用进行微调的模型，如Gemma，将是一个更合适且经济的选择。'
- en: These examples illustrate that the "most capable" model is relative to the task.
    The research assistant needs a idx_ac96ebd2model that excels in deep, broad reasoning,
    while the smart home agent needs one optimized for quick, accurate interpretation
    of specific commands and efficient action.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子说明，“最强大”的模型相对于任务而言是相对的。研究助理需要一个在深度、广泛推理方面表现出色的idx_ac96ebd2模型，而智能家居代理需要一个针对快速、准确解释特定命令和高效动作进行优化的模型。
- en: Native support for tool use and function calling
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对工具使用和函数调用的本地支持
- en: For an LLM to beidx_4b61cdf5 truly agent-ready, its ability to effectively interact
    with tools through mechanisms such as function calling is non-negotiable. Function
    calling capabilities represent a major advancement, transforming LLMs from mere
    text generators into active participants that can trigger actions and interact
    with external systems.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个LLM来说，要真正准备好成为代理，它通过诸如函数调用等机制与工具有效互动的能力是不可或缺的。函数调用能力代表了一个重大进步，将LLM从单纯的文本生成器转变为可以触发动作并与外部系统交互的积极参与者。
- en: When selecting an LLM, a key criterion is its native support for a reliable
    function-calling mechanism. This means the model must be able to accurately identify
    when a function needs to be called based on the user's intent or the ongoing task.
    It also needs to determine which specific function to call from a potentially
    long list of available tools, and critically, how to correctly format the parameters
    required for that function.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择LLM时，一个关键标准是其对可靠函数调用机制的本地支持。这意味着模型必须能够根据用户的意图或正在进行的工作准确识别何时需要调用函数。它还需要确定从可能的长列表中选择哪个具体函数，以及如何正确格式化该函数所需的参数。
- en: Strong schema adherence is vital here; the model must reliably generate structured
    outputs, commonly JSON, that conform to the predefined schema for the tool's parameters.
    In fact, the ease with which the model's function-calling capabilities integrate
    with common agent development frameworks can significantly impact development
    speed and complexity.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，严格遵守模式至关重要；模型必须可靠地生成符合工具参数预定义模式的结构化输出，通常是JSON格式。实际上，模型的功能调用能力与常见代理开发框架集成的便捷性可以显著影响开发速度和复杂性。
- en: The importance of robust tool use for agents cannot be overstated. Agents are
    defined by their ability to perceive, think, and, crucially, act. Tool use is
    the primary way LLM-driven agents execute actions upon their environment or access
    external information and capabilities. Tools also play a vital role in grounding
    the agent's responses and reasoning.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理来说，使用强大工具的重要性不容忽视。代理通过其感知、思考和，关键的是，行动的能力来定义。工具的使用是LLM驱动的代理执行环境中的动作或访问外部信息和能力的主要方式。工具在使代理的响应和推理扎根方面也发挥着至关重要的作用。
- en: By invoking tools that connect to APIs, databases, or search engines, agents
    can retrieve real-time, factual information, which helps to reduce hallucinations
    and ensure that their outputs are based on verifiable data. Lastly, tools provide
    immense extensibility, allowing agent capabilities to be expanded far beyond the
    LLM's inherent knowledge or pretrained skills. New functionalities can be added
    to an agent simply by defining new tools and making them available to the LLM.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调用连接到API、数据库或搜索引擎的工具，代理可以检索实时、事实性的信息，这有助于减少幻觉并确保其输出基于可验证的数据。最后，工具提供了极大的可扩展性，允许代理能力远远超出LLM固有的知识或预训练技能。只需定义新的工具并将其提供给LLM，就可以简单地向代理添加新功能。
- en: 'The following is a conceptual example of how a function might be defined and
    how an LLM might be instructed to call it:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个如何定义函数以及如何指导LLM调用它的概念示例：
- en: '[PRE0]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'If a user then asks the agent, `What''s the weather like in London in` `C``elsius?`,
    the LLM, if it supports functionidx_77207f67 calling and has been provided with
    the preceding schema, might output a JSON object indicating its intent to call
    the function:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户随后询问代理，“伦敦的气温是多少摄氏度？”，如果LLM支持函数调用并已提供前面的模式，它可能会输出一个JSON对象，表明其意图调用该函数：
- en: '[PRE1]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The agent's runtime would then parse this, execute the actual `get_weather`
    function with these arguments, and feed the result back to the LLM for further
    processing or to generate a user-facing response. The reliability of an LLM in
    correctly identifying the need for a function, choosing the rightidx_207b6e50
    one, and formatting the arguments accurately is a key selection criterion.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的运行时会解析这些内容，使用这些参数执行实际的`get_weather`函数，并将结果反馈给LLM以进行进一步处理或生成面向用户的响应。LLM在正确识别需要函数、选择正确的函数并准确格式化参数方面的可靠性是关键的选择标准。
- en: Model robustness, reliability, and safety
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型鲁棒性、可靠性和安全性
- en: Beyond core idx_288a462acapabilities andidx_a040dc70 efficiency, theidx_e0509ec5
    suitability of an LLM for production-grade agentic systems hinges significantly
    on its robustness, reliability, and safety. These attributes are critical for
    building trust and ensuring that agents perform as intended without causing harm
    or generating erroneous outcomes. Enterprises developing GenAI applications must
    prioritize these aspects from the outset, as highlighted by established roadmaps
    for secure and ethical AI implementation.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 除了核心能力和效率之外，LLM适用于生产级代理系统的适用性在很大程度上取决于其鲁棒性、可靠性和安全性。这些属性对于建立信任和确保代理按预期执行而不造成伤害或产生错误结果至关重要。开发通用人工智能（GenAI）应用的企业必须从一开始就优先考虑这些方面，正如安全且道德的AI实施路线图所强调的那样。
- en: Model robustness refers to the LLM's ability to maintain its performance integrity
    even when faced with imperfect or potentially malicious inputs. A key aspect of
    this is its resistance to adversarial inputs. These are inputs craftily designed
    to deceive the model, potentially leading an agent to perform unintended actions,
    reveal sensitive information, or produce unsafe outputs.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 模型鲁棒性指的是大型语言模型（LLM）在面对不完美或潜在的恶意输入时，仍能保持其性能完整性的能力。这一特性的关键方面是其对对抗性输入的抵抗力。这些输入被巧妙地设计来欺骗模型，可能导致代理执行未预期的动作、泄露敏感信息或产生不安全输出。
- en: The LLM should ideally be able to handle slightly perturbed, out-of-distribution,
    or intentionally misleading inputs without a significant degradation in its performance
    or safety posture. Robustness also encompasses consistent performance; the agent's
    LLM core should behave predictably and reliably across a diverse range of valid
    inputs and under varying operational conditions, avoiding erratic or unexpected
    responses that can undermine an agent's utility.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: LLM理想情况下应能够处理略微扰动的、分布外或故意误导的输入，而不会对其性能或安全性产生重大影响。鲁棒性还包括一致的性能；代理的LLM核心应在各种有效输入和不同的操作条件下表现出可预测性和可靠性，避免可能导致代理效用降低的异常或意外响应。
- en: Reliability in an agent-ready LLM centers on the trustworthiness of its outputs
    and its internal confidence assessment. Factual accuracy is paramount, especially
    if the agent is tasked with providing information, making analytical judgments,
    or triggering actions based on the LLM's understanding.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个准备好的代理LLM中，可靠性集中在其输出的可信度和其内部置信度评估上。事实准确性至关重要，特别是如果代理被分配提供信息、做出分析判断或基于LLM的理解触发动作的任务。
- en: While grounding the LLM's outputs with external knowledge (a topic we will explore
    in *Chapters 3* and *4*) is a key strategy, some models may inherently possess
    a stronger inclination to stick to known facts or, importantly, to signal uncertainty
    when they are operating outside their domain of expertise or when their confidence
    in an answer is low.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然将LLM的输出与外部知识相结合（我们将在第3章和第4章中探讨这个主题）是一个关键策略，但某些模型可能天生具有更强的倾向，即坚持已知事实，或者更重要的是，在它们超出专业领域或对答案的信心较低时发出不确定性信号。
- en: This ability to express uncertainty, a component of responsible AI, is an invaluable
    trait for agents, as it allows them to potentially defer to human experts, seek
    clarification, or avoid taking action in ambiguous situations. A closely related
    aspect is the model's reduced hallucination tendency. Selecting LLMs with a demonstrably
    lower propensity to generate factually incorrect, nonsensical, or fabricated information
    is crucial for maintaining the agent's credibility and preventing downstream errors.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这种表达不确定性的能力，作为负责任AI的一个组成部分，对于代理来说是一种宝贵的特质，因为它使他们能够有可能依赖人类专家，寻求澄清或避免在模糊情况下采取行动。与之密切相关的一个方面是模型的幻觉倾向降低。选择具有明显较低生成事实错误、无意义或虚构信息的倾向的LLM对于维护代理的信誉和防止下游错误至关重要。
- en: Another key attribute is model safety, which involves measures to prevent the
    LLM from causing harm, whether through biased outputs or the generation of inappropriate
    content. Bias mitigation is a significant concern; LLMs are trained on vast datasets
    that can contain societal biases related to race, gender, and other attributes.
    It is essential to select models that have undergone rigorous training and evaluation
    to minimize such harmful biases, as these can manifest in an agent's decisions
    or communications, leading to unfair or discriminatory outcomes. Complementing
    this is content safety.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键属性是模型安全性，这包括防止LLM通过有偏输出或生成不适当内容的措施来造成伤害。偏差缓解是一个重大关注点；LLMs是在包含与种族、性别和其他属性相关的社会偏差的庞大数据集上训练的。选择经过严格训练和评估的模型以最大限度地减少这种有害偏差至关重要，因为这些偏差可能会在代理的决定或交流中表现出来，导致不公平或歧视性的结果。与此相辅相成的是内容安全性。
- en: The LLM should either have built-in mechanisms or allow for the straightforward
    integration of filters and guardrails to prevent the generation of inappropriate,
    harmful, offensive, or policy-violating content.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: LLM应该具备内置机制或允许直接集成过滤器和护栏，以防止生成不适当、有害、冒犯性或违反政策的内容。
- en: This is especially critical if the agent interacts directly with end users or
    operates autonomously in sensitive contexts. Ensuring robust input validation
    and sanitization before data reaches the LLM, and before the LLM's outputs trigger
    actions, is a foundational security and safety practice.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于代理直接与最终用户互动或在敏感环境中自主操作尤其关键。在数据到达LLM之前，以及在LLM的输出触发动作之前确保强大的输入验证和净化，是一种基础的安全和保障实践。
- en: 'When selecting an LLM idx_66d21754for idx_516958d0agentic systems, consideridx_8f340a67
    these critical non-functional requirements:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当选择用于代理系统的LLM idx_66d21754for idx_516958d0时，请考虑idx_8f340a67这些关键的非功能性要求：
- en: '| **Attribute** | **Key** **a****spects** |'
  id: totrans-125
  prefs: []
  type: TYPE_TB
  zh: '| **属性** | **关键** **a****spects** |'
- en: '| --- | --- |'
  id: totrans-126
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Robustness |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
  zh: '| 弹性 |'
- en: Resilience against adversarial or unexpected inputs
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对抗性或意外输入的弹性
- en: Consistent and predictable behavior across various conditions
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在各种条件下保持一致和可预测的行为
- en: '|'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Reliability |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| 可靠性 |'
- en: High factual accuracy in generated information
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成信息的高事实准确性
- en: The ability to indicate uncertainty or lack of knowledge
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表明不确定或缺乏知识的能力
- en: A low tendency for hallucinations or fabrication
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幻觉或虚构的低倾向
- en: '|'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Safety |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| 安全性 |'
- en: Minimized inherent biases from training data
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少训练数据中的固有偏差
- en: Effective mechanisms for content filtering and preventing harmful outputs
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效的内容过滤机制和防止有害输出的机制
