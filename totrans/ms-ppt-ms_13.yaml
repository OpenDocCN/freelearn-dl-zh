- en: '11'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using PowerPoint Third-Party Add-Ins
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: By now, you probably realize that PowerPoint has become a very powerful creative
    application. It has functions and tools that will fit most creators’ needs, but
    if your use of PowerPoint becomes intensive, you might find that some workflows
    could be improved to make your days more efficient. This is when you can consider
    using third-party add-ins. If you are part of a larger organization, make sure
    to check with your IT department before installing any add-ins. Some IT settings
    will block third-party installations.
  prefs: []
  type: TYPE_NORMAL
- en: There are a lot of PowerPoint add-ins available on the market – some of them
    are free, and others need to be purchased. When I was reflecting on which add-ins
    I should include in this chapter, I decided to use trust and security as my criteria.
    I wanted to make sure the developers were trustworthy, and their add-ins were
    safe for your computers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, all the add-ins suggested in this chapter are from people I know
    personally – I have even met them in real life! They did not pay me to talk about
    their products, but they did give me a license or shared some visuals with me
    for paid products that I did not already use. I know that their products are hugely
    popular in the presentation design industry. The add-in creators I have chosen
    to feature in this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: BrightCarbon
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Neuxpower
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Billion Dollar Graphics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PPTools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The add-ins featured in this chapter are known to be compatible with many desktop
    versions of PowerPoint on Windows and macOS. I suggest that you visit the developers’
    websites for more details on compatibility (see *Further reading* ). Be aware
    that since the subscription version of PowerPoint is updated on an ongoing basis,
    it is possible that the screenshots shown in this chapter will differ from your
    version of the application.
  prefs: []
  type: TYPE_NORMAL
- en: BrightCarbon
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: BrightCarbon is a presentation and e-learning agency that was founded in the
    UK, with offices in Manchester, Bristol, and London in the UK, and Boston in the
    US. I have met Richard Goring, its director, and Jamie Garroch, its principal
    technical consultant, at The Presentation Summit many times – we are all trying
    to make a difference in our community as Microsoft MVPs specializing in PowerPoint
    and other M365 applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'They have the following two products that help individuals, teams, and companies,
    which will be discussed in the sections ahead:'
  prefs: []
  type: TYPE_NORMAL
- en: '**BrightSlide** is a free add-in that helps you be more productive'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**BrandIn** is a paid add-in that helps organizations create brand-compliant
    content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using BrightSlide (for free)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This add-in was first created to help BrightCarbon designers make their design
    workflow more efficient, adding shortcuts and functionality that users neede d
    but that were not available in PowerPoint. With their first core value being “
    *Share our knowledge and our time* ,” it was not long before they decided to share
    their valuable add-in with the rest of the world. Needless to say, our industry
    experts were quick to spread the word to all presentation creators and designers.
    You can find BrightSlide on their products page via the link supplied in *Further
    reading* .
  prefs: []
  type: TYPE_NORMAL
- en: The BrightSlide add-in would probably be voted the most complete tool available
    for free in our industry. It has nine tool categories, each containing many features.
    At the time of writing this book, the add-in has over 60 different features for
    improving your workflow and productivity. This might be different by the time
    you try BrightSlide because Jami e and the BrightCarbon product team ad d features
    regularly as their designers or add-in users voice their needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'To use BrightSlide, first, you need to download the Windows or macOS installer
    from the product page ( [https://www.brightcarbon.com/products/](https://www.brightcarbon.com/products/)
    ) and install it on your computer. When you open your PowerPoint application,
    you will see a new **BrightSlide** ( **1** ) tab ( *Figure 11.1* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.1 – The BrightSlide add-in tab in PowerPoint](img/B32063_11_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.1 – The BrightSlide add-in tab in PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore t he main categories of features you will find in your new tab:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Align** ( **2** ): This category has tools that give you more control and
    options to align your slide objects beyond the standard alignment tools found
    in PowerPoint. For example, you can create a shape grid with only a few clicks.
    You can even choose to align objects to the first or last selected object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Format** ( **3** ): The tools in this category will help you edit multiple
    objects at once or copy complex formatting. This category can help you copy the
    size, position, format, adjustments, and animations from an object to any other
    object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Selection & Object** ( **4** ): This category is here to make your life easier.
    Selecting objects according to a specific characteristic, such as a fill or outline
    color, hidin g or showing slide objects without scrolling down your **Selection**
    pane, and swapping objects are only a few of the gems in this group. Are you excited
    yet?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Animation** ( **5** ): The tools in this category will save you a lot of
    time when trying to recreate complex animations. You can use some of BrightSlide’s
    starting sequences or add your own to the library.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**File & Master** ( **6** ): This category has many tools to help you set up
    your templates, such as setting up guides, editing your theme colors, setting
    custom colors, assigning layouts in bulk, comparing multiple presentations, and
    many more. The features take care of most repetitive tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Settings & Help** ( **7** ): This is where you can find add-in customization
    options for the ribbon and shortcuts. You also have access to two subcategories
    of features:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Settings** – passive features: These are features that don’t appear in the
    ribbon and mo dify default PowerPoint behaviors, which you can choose to turn
    off or on. As an example, you can duplicate comments when duplicating slides or
    resize multiple lines in one go.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Help** – contextual tools: T hose tools become available when you right-click
    on slide objects such as tables or lines, allowing you to move sections within
    your presentation, and check contrast between text and fill color easily.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want the complete details, there is a **Help** section on their website
    that lists the features with a description of what they do, but I will share some
    of the tools I know that even part-time presentation designers should use to save
    some time. To help you find them, I will refer to the names of the groups on the
    ribbon in the following subsections.
  prefs: []
  type: TYPE_NORMAL
- en: The Align group
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This group has so many alignment features that it’s almost impossible to choose
    between them. I finally set my choice on three that I find partic ularly interesting
    to help you quickly overlay many objects, one on top of the other, distribute
    them on a grid, or create a new grid.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first feature helps us overlay all selected objects on top of each other
    and is named **Align Objects Center and Middle** ( **1** ) ( *Figure 1 1.2* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.2 – The Align Objects Center and Middle feature in the Align group](img/B32063_11_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.2 – The Align Objects Center and Middle feature in the Align group
  prefs: []
  type: TYPE_NORMAL
- en: With several objects selected (hexagons in our example), just click on the feature
    in the ribbon to overlay all of them with one click ( **2** ). As you can see
    in the **Selection** pane ( **3** ), all the shapes are present on the slide.
    You can use this type of alignment for animations that reveal one shape after
    the other, always in the same position.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s now use six hexagons spread out with no sp ecific alignment on the slide
    and use the **Distribute to Grid** tool ( **1** ) this time. BrightSlide aligns
    and distributes them ( **2** ) and opens the **Distribute to Grid** dialog box
    ( **3** ), in which you can adapt the grid ( *Figure 1 1.3* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.3 – The Distribute to Grid feature in the Align group](img/B32063_11_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.3 – The Distribute to Grid feature in the Align group
  prefs: []
  type: TYPE_NORMAL
- en: You can then adjust the number of **Rows** and **Columns** ( **4** ), set **Spacing**
    units ( **5** ) as inches, centimeters, or pixels, and adapt the **Horizontal**
    and **Vertical** spacing ( **6** ) between your slide objects. The **Preview**
    checkbox ( **7** ) is checked by default and is very helpful for viewing what
    your grid will look like before clicking on the **OK** button ( **8** ) to confirm
    your choices. At the time of writing this chapter, only same-sized objects can
    be used with this feature.
  prefs: []
  type: TYPE_NORMAL
- en: Even though PowerPoint’s **Smart Guides** tool has helped me align and distribute
    shapes on a grid for a long time, this BrightSlide feature saves many clicks in
    a day, making it much more efficient.
  prefs: []
  type: TYPE_NORMAL
- en: 'The third feature I want to show you from the **Align** group requires you
    to start from a single object or a group of objects on your slide ( **1** ) and
    use the **Split & Align** feature ( **2** ) ( *Figure 11.4* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.4 – The Split & Align feature in the Align group](img/B32063_11_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.4 – The Split & Align feature in the Align group
  prefs: []
  type: TYPE_NORMAL
- en: This feature creates a grid of evenly sized and spaced copies of a group or
    the selected object. In my example, it created a grid of evenl y sized and spaced
    rectangles ( **3** ) while opening the **Split & Align** dialog box ( **4** ).
    You can adjust the settings as needed for **Columns** ( **5** ) and **Rows** (
    **6** ). The numbers you see for **Gutter** (spacing between the objects) and
    **Width** and **Height** ( **7** ) are impacted by the setting you choose for
    **Units** . When testing the feature, I realized that using inches or centimeters
    was not as flexible as using pixels, which are much smaller units. My best advice
    is to do a few tests the first time you try it. It will be time well invested
    because BrightSlide will remember your previous settings and use them the next
    time you use the **Split & Align** feature.
  prefs: []
  type: TYPE_NORMAL
- en: Many more features are available in the **Align** group. The best way to know
    which ones would be useful for your type of presentation work is to try them out
    or at least review BrightSlide’s **Help** section on the website.
  prefs: []
  type: TYPE_NORMAL
- en: The Format group
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This category also has a great list of features to work with, but since I have
    limited space, I’ll just point out the **Match Size** feature ( **1** ), which
    a llows you to quickly make both **Width** and **Height** the same for objects
    selected on a slide (or either one of the two) with a single click ( **2** ) (
    *Figur e 11.5* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.5 – The Match Size feature in the Format group](img/B32063_11_05.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.5 – The Match Size feature in the Format group
  prefs: []
  type: TYPE_NORMAL
- en: To make sure you get the desired result, pay attention to the tooltip when you
    hover over the feature button ( **3** ). As we can see, selecting only one object
    will reference the size of the slide – imagine how quickly you can crop and make
    an image full slide!
  prefs: []
  type: TYPE_NORMAL
- en: By default, the last object selected becomes the size reference for any objects
    created afterward. In my example, if I first select the image ( **4** ) and then
    the **Event 3** button ( **5** ), the **Match Size** feature will make the image
    the same size as the action button. Be aware that images resized with this feature
    will be distorted, not cropped to fit the size, and will keep the same aspe ct
    ratio.
  prefs: []
  type: TYPE_NORMAL
- en: The Selection & Object and Animation groups
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Those two categories are filled with productivity tools that all designers
    can leverage. For the sake of space, I’ll only give a high-level definition for
    a few features to give you an idea of how powerful they can be ( *Figure 11.6*
    ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.6 – Highlights of the Selection & Object and Animation groups](img/B32063_11_06.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.6 – Highlights of the Selection & Object and Animation groups
  prefs: []
  type: TYPE_NORMAL
- en: '**Select Objects** ( **1** ): This feature allows selecting all objects on
    a slide according to a certain formatting style so you can easily change their
    formatting all at once.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Split Text** ( **2** ): This feature allows you to split the text content
    into multiple objects either by paragraph or by sentence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Text Margins** ( **3** ): This feature allows you to remove all text margins
    in one click. Whether you want to fix only one object, or objects on all the slides,
    or the ones on the masters, you’re covered.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**My Animations** ( **4** ): This feature allows you to save and reuse your
    own animation library. After creating a complex animation scheme for an object,
    you can save it from your selected object for future use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Utilities** ( **5** ): In this list, you will find features to create waterfall
    delays, manage motion paths more efficiently, and delete all animations on selected
    slides or in the presentation ( **6** ). The last one is a huge time-saver when
    you realize animations have been brought into your presentation from various sources.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The best way to get to know the features is by trying them in your presentation
    files. Taking time to read the tooltips available when hovering over the features
    will also help you a lot.
  prefs: []
  type: TYPE_NORMAL
- en: The File & Master group
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Even though the **File & Master** group might not sound as interesting as others,
    I must say it is where I have found some of the features I treasure the most for
    the type of work I do.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll highlight the ones that have been very useful for me ( *Figure 11.7* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.7 – Highlights from the File & Master group](img/B32063_11_07.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.7 – Highlights from the File & Master group
  prefs: []
  type: TYPE_NORMAL
- en: '**Guides** ( **1** ): When I receive a file with too many guides, or when I
    create temporary guides, the **Delete Guides** feature saves a lot of precious
    time. We can use it to select which guides we want to delete (master, layout,
    or normal view) or delete them all.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Theme Colors** ( **2** ): There are two features I use the most in this list:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Color Contrast Report** ( **3** ) creates a new slide, allowing me to assess
    text contrast accessibility according to shape fill.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Delete Recent Colors** feature ( **4** ) removes all color swatches from
    the recent list. This is very valuable after testing a few off-brand colors or
    cleaning up a template file before sending it to your client.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Batch** ( **5** ): Every feature in this list is valuable. The one I particularly
    like is for when you have to deal with complex presentation decks, where layouts
    have been misused, which is **Assign Layouts** . From *one* window, you will be
    able to change the slide master or the layout of any slide in the file. However,
    this means you have to get acquainted with the names used for the master and the
    layouts. You can still navigate through your slides to view their content before
    making any changes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Review** ( **6** ): Two features in this list have been especially valuable:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instead of trying desperately to change the language of a file with PowerPoint’s
    native tools, sometimes with questionable success, I use **Presentation Language**
    . In *one* click, it changes the *entire* presentation language.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: As for **Speaker Notes** , it allows you to get a reliable word count for all
    the speaker notes and also delete all notes in one click.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export** ( **7** ): The features in this list address some of PowerPoint’s
    important missing features. The ability to create a new presentation file from
    selected slides is a huge time-saver. Same for the ability to export selected
    slides as images or export all the media files in the presentation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The BrightSlide add-in is a treasure trove for anyone creating visuals with
    PowerPoint. My best advice is to download the add-in and give it a try. You don’t
    have anything to lose (it is free!), but you have so much to gain in terms of
    efficiency and productivity. If you are wondering why BrightCarbon made this free
    to all users, it’s because of th eir company culture, which believes in sharing
    with the community .
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now see an overview of their BrandIn add-in, helping users in organizations
    to sta y on brand.
  prefs: []
  type: TYPE_NORMAL
- en: Using BrandIn (Freemium & paid)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many organizations struggle with staying on brand. Most of the time, they have
    invested in creating a branded PowerPoint template that uses their corporate colors,
    provides graphic elements in sample slides, and was plann ed with a set of standard
    layouts – but users often don’t have the PowerPoint proficiency required to navigate
    the whole template properly, or the time to read dozens of pages of a brand guide.
  prefs: []
  type: TYPE_NORMAL
- en: 'That is why BrandIn was created. It helps organizations offer easy access to
    a library of assets while helping users stay on brand, all within PowerPoint.
    And here is a great perk: you can make it work within PowerPoint and Word, on
    Windows, macOS, and online.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The add-in fixes many of the most annoying presentation creation problems in
    organizations, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Users waste hours struggling to make slides brand-compliant, or even just finding
    relevant content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Users add off-brand and/or copyrighted images instead of those from the brand
    library
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are problems related to slides copied from other presentations, bloated
    templates , and masters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BrandIn can be found in the Microsoft AppSource store and can also be made available
    to an organization’s users from the **M365 admin center** . The licensing model
    is a yearly subscription paid for the number of users you have, much like the
    M365 licenses. Different levels of licenses with varying feature sets are available,
    including a free plan for teams of one to four people. For more information, please
    see the *Further reading* section for a link to their site and contact them to
    discuss your licensing needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned before, you may need support from your IT admins to deploy the
    add-in in your organization if you don’t have access to the **Add-ins** store
    in the **Home** tab of PowerPoint or Word. Once deployed, there are some initial
    setup tasks to accomplish to make BrandIn’s magic happen:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a new SharePoint site dedicated to all your creative corporate assets
    and decide who will be responsible for content maintenance. You can also use an
    existing site or an **organization asset library** ( **OAL** ).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Curate your actual content and sort it into the following categories: `Templates`
    , `Slides` , `Images` , `Icons` , and `Graphics` .'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a document library for each category in your new SharePoint site and
    add your sorted content to each one, organized by named folders.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a new workspace in BrandIn and link the document libraries.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As you probably realize, you need to first invest some time, so your team saves
    a lot of creation and design time and stays on brand, so you get the best return
    on your investment.
  prefs: []
  type: TYPE_NORMAL
- en: I can say that it’s not the SharePoint site and document libraries’ creation
    that will take the most time, especially if you don’t really care about having
    a branded site – it took me about 15 minutes just because I had not done it in
    a long time. The most time-consuming part is gathering what you already have,
    cleaning it up so you are only offering content aligned with your brand, and then
    connecting the libraries in BrandIn. Of course, make sure you maintain assets
    on a regular basis to keep them aligned with your brand. My advice is to name
    a person on your team responsible for this task.
  prefs: []
  type: TYPE_NORMAL
- en: 'After the add-in has been deployed, a workspace created, and content libraries
    connected, a new **BrandIn** button is visible at the far right of the **Home**
    tab ( **1** ) in PowerPoint ( *Figure 11.8* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.8 – The BrandIn button and pane in PowerPoint](img/B32063_11_08.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.8 – The BrandIn button and pane in PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: 'Clicking on the button opens the **BrandIn** task pane ( **2** ), where users
    will access brand assets added to the SharePoint site. Here is a brief description
    of the tools in this task pane:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Workspaces & account** icon ( **3** ): Up to two workspaces can be created
    with most plans, allowing the creation of asset libraries specific to brands,
    teams, or departments. The Enterprise plan has unlimited workspaces.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Workspace** ( **4** ): The name of the workspace you are in displays at the
    top of the task pane. The **Edit** button will be available only to BrandIn admins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**New presentation** ( **5** ): You can start a new presentation directly from
    the task pane, allowing you to select the corporate template added to the SharePoint
    site. If more than one is available, they will all be listed. This makes it really
    easy for the brand admin to publish new templates and keep existing ones up to
    date.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assets** ( **6** ): This section allows selecting between the various asset
    categories that were added to the SharePoint site.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BrightCarbon website access ( **7** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge base** , **Support** , **Feedback** , and **Settings** ( **8**
    ).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s see how quickly you can create a new presentation from the **BrandIn**
    task pan e ( *Figure 11.9* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.9 – Creating a new presentation from the BrandIn task pane](img/B32063_11_09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.9 – Creating a new presentation from the BrandIn task pane
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **New presentation** option ( **1** ) so the pane displays your
    organization’s templates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on the template thumbnail ( **2** ). In this example, there is only one
    template.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your new presentation file is created ( **3** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The only thing left to do is name and save your file in its appropriate storage
    location. This is a straightforward and very efficient process, considering the
    number of clicks it usually takes to get to your template.
  prefs: []
  type: TYPE_NORMAL
- en: Adding a slide is also a very simple and visual process *if* you previously
    took the time to create sample slides and add them to the corporate asset SharePoint
    site.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the time this edition of the book is launched, you should have access to
    new add-in features that will help you automate the task of publishing single
    slides as individual assets. The BrightCarbon development team is always innovating!
    And that’s the beauty of a cloud-based add-in: you’ll see new features appear
    from time to time, without having to manually update the add-in.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Again, it’s a quick process ( *Figure 11.10* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.10 – Adding a slide from the BrandIn task pane](img/B32063_11_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.10 – Adding a slide from the BrandIn task pane
  prefs: []
  type: TYPE_NORMAL
- en: Click on **Slides** ( **1** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **Slides** pane ( **2** ), select a category that fits the theme of the
    slide you want to add. This folder structure should be part of your best practices
    when setting up your assets libraries, helping users find content more efficiently.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the example, the **Introductions** category was selected ( **3** ), and we
    have a list of sample files to choose from. A simple click on the thumbnail adds
    it to your presentation file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BrandIn can be a life-changing solution for teams creating a lot of presentations,
    helping in leveling up your communications while enhancing your brand, and saving
    a lot of time. To achieve this, it means taking the time to create enough sample
    slides so your team members can quickly leverage them instead of creating text
    boxes and shapes on blank slides. The add-in works like magic if you put in time
    and effort before deploying it and keep adding content to suit your team’s needs.
  prefs: []
  type: TYPE_NORMAL
- en: The process for adding other assets is as simple as the previous examples. When
    adding images and icons, they go on the selected slide using compatible empty
    placeholders when present. Adding graphics, such as charts and tables, adds a
    new slide. Knowing how frustrating it is to create on-brand tables and charts,
    BrandIn is the solution to work hard once to create them and reuse them with a
    few clicks!
  prefs: []
  type: TYPE_NORMAL
- en: The previous examples should give you an idea of what BrandIn could do for your
    organization. Visit the product page on the BrightCarbon website for more information
    and pricing.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re unsure about committing to a subscription on day one, try the freemium
    plan for a few months and discover how much more efficient your content workflows
    can become, experience the boost in quality and brand compliance, and see how
    much time and money you save in the process. In my opinion, it is an investment
    that will help you spend more time on other high-value tasks in your organization.
    You can start with the free plan to test-drive the add-in with a small group in
    your organization. I’m positive that they’ll get as excited as I have been and
    will push for deployment to the whole team.
  prefs: []
  type: TYPE_NORMAL
- en: I want to extend all my gratitude to the BrightCarbon team for letting me use
    their demo assets. Being a two-person business that usually creates content for
    others, I don’t have my own assets library. But that is about to change!
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now move on to two other add-ins from Neuxpower in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Neuxpower
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The **Neuxpower** team has been building software for over 25 years now – and
    I have had the pleasure of knowing Mike Power, the owner, for over 18 years!
  prefs: []
  type: TYPE_NORMAL
- en: His team is passionate about developing high-quality, helpful software tools.
    Neuxpower has an innovative PowerPoint add-in and powerful file compression tools
    ( [https://neuxpower.com/products](https://neuxpower.com/products) ) that we will
    introduce in the following sections.
  prefs: []
  type: TYPE_NORMAL
- en: In the first section, the Neuxpower product I want to discuss is an add-in that
    helps you manage key resources in a presentation file while flagging and fixing
    potential problems.
  prefs: []
  type: TYPE_NORMAL
- en: Using Slidewise (paid)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many pain points in presentation files. Users have been comp laining
    for years that it is difficult to check fonts in a file and replace them. Same
    with trying to figure out which layouts are used in which slides – it can take
    forever if you have a presentation that contains lots of slides. These elements
    are some of the pain points addressed by Slidewise.
  prefs: []
  type: TYPE_NORMAL
- en: 'After installing Slidewise, your **Home** tab ( **1** ) will have a new **Slidewise**
    butto n ( **2** ) ( *Figure 11.11* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.11 – The Slidewise add-in available on the Home tab](img/B32063_11_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.11 – The Slidewise add-in available on the Home tab
  prefs: []
  type: TYPE_NORMAL
- en: When you click on the **Slidewise** button ( **1** ), it will show or hide the
    **Slidewise** task pane ( **3** ) automatically. If you click on the bottom arrow
    of the button to open the features list ( **4** ), you can set your **Preferences**
    for the add-in, open the **Help Center** web page, and access features related
    to the add-in itself, such as **Check for Updates** .
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Slidewise** tab above the ribbon ( **1** ) gives access to the same help
    and settings features and has other valuable features ( *Figure 11.12* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.12 – The Slidewise tab above the ribbon](img/B32063_11_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.12 – The Slidewise tab above the ribbon
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Presentation** group ( **2** ), you have access to features that will
    be active only when your presentation file has a path in your File Explorer. This
    means that any file saved in a OneDrive or SharePoint storage that has not been
    set to synchronize to the File Explorer will see the following features as inactive:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export All Media** : To export image, audio, and video files to a folder
    of your choice'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open File Location** : To show the location of the file in File Explorer'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Copy path** : To copy the file location path to the Clipboard'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the **Selection** group, you will have access to the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export Original Images** ( **3** ): This feature allows you to export unmodified
    images from selected objects. This can be valuable if you have applied image formatting
    or cropping and want easy access to originals in the future.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export Slides As** ( **4** ): This feature allows you to export selected
    slides as images (PNG or JPEG), PDF, and PowerPoint files. The added value of
    this feature is having the possibility to choose the image size from a list of
    various units (pixels, percent, centimeters, or inches). A video tutorial can
    be accessed with the **How does this work?** link ( **5** )'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s now see the sections and the list of views available in the **Slidewis
    e** pane ( *Figure 11.13* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.13 – The Fonts and Media view in Slidewise](img/B32063_11_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.13 – The Fonts and Media view in Slidewise
  prefs: []
  type: TYPE_NORMAL
- en: 'Dropdown list of tools ( **1** ):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fonts and Media** ( **2** ): This tool allows you to manage various categories
    of elements found in your presentation file, such as fonts, images, embedded chart
    data, audio, video, and so on. In just a few clicks, you can see where the elements
    are in the file and accomplish tasks such as embedding fonts, exporting images,
    audio, and video, or removing embedded data. If you have ever struggled with trying
    to find odd fonts in a file and replace them, this is a great feature to help
    you save precious time.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Slide Masters** ( **3** ): This tool allows you to view all the masters and
    layouts in your file and find out which slides use them. The beauty of this view
    is that it has features that allow you to consolidate masters, remove unused masters
    and layouts, and even reassign slides between layouts. This removes all the manual
    work usually required to clean up a file that is cluttered with too many masters
    and layouts.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Colors** ( **4** ): This shows all color palettes and identifies wherever
    non-theme colors have been used – that is, for all masters, whether for slides,
    notes, or handouts. It also lists the RGB values of colors in the theme palette,
    much better than digging into the PowerPoint interface to get the values. You
    can replace non-compliant colors and even see/clear the recent colors list easily.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**File Review** ( **5** ): This tool has so many useful features. It has a
    **Content** section that helps you find empty placeholders, hidden objects and
    slides, adjust text box autofit settings, and view all languages used in your
    file – that’s how I found out that a timeline template had introduced Russian
    into a file! In the **Metadata** section, you will easily find a list of comments,
    the document properties, and where you have speaker notes. Any item listed can
    easily be fixed or viewed in the PowerPoint file.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Slide Selection** ( **6** ): At the time this chapter is reviewed, this tool
    has two views – **Masters / Layouts** , and **Transitions** . The first view has
    a table listing all the slide numbers with the slide master and layout in use,
    and whether the slide is visible or not. The **Transitions** view lists all slide
    numbers with the name of the transition used, its timing, and whether it is automatic.
    I was told the **Masters / Layouts** view might be moved to the **Slide Masters**
    section in the future, changing the name of this section back to **Transitions**
    .'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image Audit** ( **7** ): This tool allows you to scan for images that have
    size or quality issues. The feature turns on automatically when you open it and
    closes automatically when you move away to avoid add-in performance issues. It
    will help you find where images are too big or too small, have been cropped, and
    when they are distorted or corrupted.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Presentation** ( **8** ): When hovering over the word, you see a tooltip
    listing the name of the file, its location, and slide size. On its right, you
    have the total file size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clicking on one of the arrows on the left ( **9** ) in any view expands the
    list of elements, listing them by type or slide numbers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clicking on an arrow on the right ( **10** ) opens a list of actions you can
    take, such as embedding or replacing fonts, using the **Show in PowerPoint** action
    to navigate to a slide, and so on.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Highlighted content will have a dot ( **11** ), colored green or yellow for
    supplemental information or tips. When content is flagged as problematic, the
    text will have an orange font with a flag icon.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the bottom of the pane, you have the **Inspector** tool ( **12** ), showing
    the details of an object that you have selected on a slide.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Do not fear having problems with this add-in just because I have not covered
    every feature individually. When you install Slidewise, it opens a `Slidewise.pptx`
    f ile ( **1** ) ( *Figure 11.14* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.14 – Slidewise Get Started guide](img/B32063_11_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.14 – Slidewise Get Started guide
  prefs: []
  type: TYPE_NORMAL
- en: The slides show you the important elements and, on the last slide, you have
    links to their help and support centers, and to their contact form ( **2** ).
  prefs: []
  type: TYPE_NORMAL
- en: You really should go to Neuxpower’s products page ( [https://neuxpower.com/products](https://neuxpower.com/products)
    ) and download Slidewise so that you can try it for free for 30 days. That’s the
    best way to see whether it is worth the investment for the kind of presentation
    work you do regularly. After the 30-day trial, the add-in reverts to a free mode
    that lets you continue using a limited set of features without charge forever.
    Slidewise can be purchased with an annual subscription, which, in my opinion,
    you’ll get a return on your investment after a week or two using it on your presentation
    files. And great news for people who don’t work solely in English! The add-in
    will install in German, French, or Spanish if your Windows and PowerPoint languages
    are set to any of these.
  prefs: []
  type: TYPE_NORMAL
- en: Using Neuxpower’s compression tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I remember when the biggest struggle I had with presentations, or any o ther
    Microsoft Office file for that matter, was the huge file size. The first time
    I used Neuxpower’s compression tool, probably 18 years ago, I was blown away by
    how efficient it was at reducing the file size while making sure images remained
    high enough quality that the audience could not see the difference.
  prefs: []
  type: TYPE_NORMAL
- en: Since then, the product has evolved into five distinct products, which you ca
    n see on the products page on their website ( [https://neuxpower.com/products](https://neuxpower.com/products)
    ). In this section, I will introduce you to **WeCompress** (free) and **NXPowerLite**
    (paid). Even though this chapter is about PowerPoint add-ins, I feel any user
    who creates content should know about their compression tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you don’t have great needs in terms of file compression and your files have
    a maximum size of 50 MB, you can then head to the [wecompress.com](http://wecompress.com)
    website, or click on the product name on the Neuxpower p roducts page ( *Figure
    11.15* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.15 – The WeCompress online file compression tool from Neuxpower](img/B32063_11_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.15 – The WeCompress online file compression tool from Neuxpower
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, you can compress the most common types of files used in organizations
    these days: **PDF** , **PowerPoint** , **Word** , **Excel** , **JPEG** , **PNG**
    , and **TIFF** files ( **1** ). You only need to click on the **+** sign ( **2**
    ) to browse your files and add one, or you can click and drag a file directly
    into the browser page. When the online application has finished processing your
    file, you will receive a **File ready** message ( **3** ). In our example, the
    initial **6.26 MB** file size was brought down to **1.56 MB** ( **4** ). The only
    thing left to do is click on the **Download** button ( **5** ) to move your compressed
    file into the `Downloads` folder on your computer.'
  prefs: []
  type: TYPE_NORMAL
- en: The file I tested in the previous example showed the same photo quality as in
    my original file on all the slides. The only elements that seemed to be affected
    by the process were the small images created by the Zoom feature for my interactive
    menus. As you can see, it is very easy to use and has no cost at all.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have more frequent needs or your files are over 50 MB most of the time,
    I suggest that you invest in the NXPowerLite de sktop version ( *Figure 11.16*
    ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.16 – Custom settings available in the NXPowerLite desktop compression
    application](img/B32063_11_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.16 – Custom settings available in the NXPowerLite desktop compression
    application
  prefs: []
  type: TYPE_NORMAL
- en: You can create and name various optimization profiles ( **1** ) that will allow
    much more control over specific compression settings, such as the **JPEG quality**
    level ( **2** ) you want in your presentation files, or the creation of various
    custom settings for **PDF** , **PowerPoint** , **Word** , **Excel** , and **JPEG**
    files ( **3** ). A new setting allows removing Excel data from charts when using
    a strong compression profile ( **4** ).
  prefs: []
  type: TYPE_NORMAL
- en: NXPowerLite also integrates with File Explorer on Windows, with Finder on Mac,
    with Outlook, and much more. The license is a one-time, affordable purchase per
    user, and there is a 14-day trial available on their website. The desktop version
    installs an NXPowerLite group in the **Home** tab of your Office applications
    to help you optimize your files while you are creating them.
  prefs: []
  type: TYPE_NORMAL
- en: Even if the file compression tools are not PowerPoint add-ins per se, I’m sure
    you will find them useful when dealing with large presentations.
  prefs: []
  type: TYPE_NORMAL
- en: So far, we have covered productivity, presentation management, and clean-up
    tools. Let’s move on to an add-in that will help you create or access graphics
    to express yourself more visually.
  prefs: []
  type: TYPE_NORMAL
- en: Billion Dollar Graphics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Billion Dollar Graphics** was founded by Mike Parkinson, a very tal ented
    visual communicator I have known for many years. Leveraging his over 25 years
    of expertise, he has created how-to books, training wo rkshops, and an amazingly
    useful add-in called **Build-a-Graphic** . It allows users to build their content
    using any of the thousands of graphics available within the add-in or use prebuilt
    graphics to speed up the process.'
  prefs: []
  type: TYPE_NORMAL
- en: Using Build-a-Graphic (paid)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Build-a-Graphic is an add-in with a yearly subscription model, and you have
    the possibility to use a trial version with limited functionalities. For a group
    or enterprise, there is a license for a local library. This section will focus
    on the add-in with a subscription, but you can find all the information at the
    Build-a-Graphic website ( [https://billiondollargraphics.com/build-a-graphic/](https://billiondollargraphics.com/build-a-graphic/)
    ).
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use the Build-a-Graphic add-in in two ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Starting with your own bullet lists or text slides, build your own visuals with
    the help of the thousands of creative assets provided by the add-in
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Search the library for prebuilt graphics tagged with keywords and add your own
    text content into the text boxes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whether you choose to build your own or use a prebuilt graphic, the great advantage
    is that everything is fully customizable. Almost everything you add is a vector
    graphic, making it 100% editable.
  prefs: []
  type: TYPE_NORMAL
- en: You can change the colors, remove the fill colors, keep outlines, and ungroup
    shapes. Anything you can do in the **Shape Format** tab with PowerPoint’s native
    shapes can be used for Build-a-Graphic assets. If you feel you lack the skills
    to build your own graphics, and especially if you want to work wisely by not putting
    so much time into creating your own graphics, you should consider investing in
    this add-in.
  prefs: []
  type: TYPE_NORMAL
- en: It is worth mentioning that the Build-a-Graphic add-in was rebuilt from the
    ground up in collaboration with the Neuxpower people. This amazing version is
    -
  prefs: []
  type: TYPE_NORMAL
- en: Compatible with Windows, Mac, and web versions of PowerPoint.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Always connected to the complete library of graphics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'After installing the add-in, you will have a new **Build-a-Graphic** button
    ( **1** ) availa ble in the **Home** tab ( *Figure 11.17* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.17 – The Build-a-Graphic button in the Home tab and the task pane](img/B32063_11_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.17 – The Build-a-Graphic button in the Home tab and the task pane
  prefs: []
  type: TYPE_NORMAL
- en: Clicking on the button will open the **Build-a-Graphic** pane ( **2** ), where
    you will be able to search from a growing library of over 10,000 graphics ( **3**
    ), use various tools to help with your design ( **4** ), and manage your account
    ( **5** ), where you have access to license information and agreement, tutorials,
    requesting a graphic, and a way to contact support.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by showing an example of how you can create your own graphics from
    a bullet list on a slide in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Creating your graphic from a text slide
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following example was created by Copilot, asking it to create a new slide
    for a four-step training process for success. If you don’t have a text slide on
    hand, just create a new blank slide using the title and content layout and add
    a list of four sentences.
  prefs: []
  type: TYPE_NORMAL
- en: When you want to test how text will look on a layout, you can use a nice hidden
    feature in your Office applications to create filler text. To create the Latin-looking
    text, you need to type `=lorem(x,y)` , where `x` is the number of paragraphs/bullets
    and `y` is the number of sentences per line, and press *Enter* .
  prefs: []
  type: TYPE_NORMAL
- en: If you want to reproduce readable text, you can use `=rand(x,y)` , which will
    generate the sentence **The quick brown fox jumps over the lazy dog** repeated
    for all paragraphs/bullets and sentences. Why this sentence? Because it uses all
    the letters in the alphabet, allowing you to see how your font displays. Be aware
    that in PowerPoint, the random text might be the same even if you are using another
    user interface language – that’s what I have in French. But in the French Word,
    the random text generated discusses Word features.
  prefs: []
  type: TYPE_NORMAL
- en: 'To start using Build-a-Graphic on a text slide, first select the text placeholder
    ( **1** ) ( *Figure 11.18* ):'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 11.18 – Using \uFEFFthe Chunk Text tool with a list](img/B32063_11_18.png)"
  prefs: []
  type: TYPE_IMG
- en: Figure 11.18 – Using the Chunk Text tool with a list
  prefs: []
  type: TYPE_NORMAL
- en: 'When clicking on the **Chunk Text** button ( **2** ), you see three options
    ( **3** ) to help you separate your list into individual text boxes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chunk Text by Sentence**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chunk Text by Bullet**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chunk Text by Paragraph**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It does not matter how the text is formatted on the slide because those three
    options cover everything.
  prefs: []
  type: TYPE_NORMAL
- en: 'For my example, chunking by bullet or by paragraph results in a slide that
    looks like *Figure 11.19* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.19 – Divided text after using the Chunk Text tool](img/B32063_11_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.19 – Divided text after using the Chunk Text tool
  prefs: []
  type: TYPE_NORMAL
- en: The original placeholder is deleted and replaced by eight text boxes ( **1**
    ), one for each bullet or paragraph, as shown in the **Selection** pane ( **2**
    ). Your slide layout will still show **Title** and **Content** , so I suggest
    you go to **Home** | **Layout** and select the **Title Only** layout. This will
    help in the future when applying a new template or copying and pasting the slide
    into another file.
  prefs: []
  type: TYPE_NORMAL
- en: Before starting to insert graphics on the slide, I suggest that you format text
    boxes to your needs and align them below the middle of the slide vertically and
    distribute them evenly horizontally.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s now use the **Search** box with the keyword `Assess` . From the search
    results, click on a graphic in the list to access a preview ( **1** ) ( *Figure
    11.20* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.20 – Searching for and inserting graphics](img/B32063_11_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.20 – Searching for and inserting graphics
  prefs: []
  type: TYPE_NORMAL
- en: The **Bookmark** button ( **2** ) is a great way to keep graphics you will need
    often in your **Bookmarks** view ( **3** ). The name of the button will change
    to **Bookmarked** when already added to your list.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The associated **KEYWORDS** list ( **4** ) is a great way to get to know how
    graphics are tagged in the add-in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clicking on the **Insert Graphic** button ( **5** ) adds it to a new slide (
    **6** ). I simply copied and pasted it on my slide and resized it. I also flipped
    the graphic so the face of the person would not be facing the border of the slide
    ( **7** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As you can see in *Figure 11.21* , the inserted graphic is a group of shapes
    that can be formatted with any o f the tools in the **Shape Format** tab:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.21 – The inserted graphic is fully editable with formatting tools](img/B32063_11_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.21 – The inserted graphic is fully editable with formatting tools
  prefs: []
  type: TYPE_NORMAL
- en: You can repeat the process and include as many graphics a s you need for your
    slide, moving and resizing them to your needs. If you have very specific needs,
    this might be a great way to assemble a professional-looking slide without spending
    days searching online libraries, purchasing many licenses, or creating everything
    from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have access to thousands of graphic elements you can use to make almost
    any graphic you can imagine. Think of it as a kit of parts to build your perfect
    graphic ( *Figure 11.22* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.22 – Build-a-Graphic has thousands of graphic elements](img/B32063_11_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.22 – Build-a-Graphic has thousands of graphic elements
  prefs: []
  type: TYPE_NORMAL
- en: Enter your keyword ( **1** )
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Filter by **Graphic Elements** ( **2** )
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get access to vector graphics ( **3** ) or, depending on your keyword, quality
    images ( **4** ) in PNG format so they can be overlaid on dark backgrounds without
    the white rectangles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You might also want to just search the Build-a-Graphic library and use a complete
    graphic, which is the topic of the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Using t he Build-a-Graphic library
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you are creating content for a common business topic, you might find exactly
    what you need in the Build-a-Graphic library. To find a graphic, search as you
    normally would, click on the **Filter** tool ( **1** ), and choose **Pre-built
    Gra phics** ( **2** ) from the menu ( *Figure 11.23* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.23 – Using Pre-built Graphics](img/B32063_11_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.23 – Using Pre-built Graphics
  prefs: []
  type: TYPE_NORMAL
- en: Scroll down the list until you see one that fits your needs ( **3** ) and click
    on the **Insert Graphic** button to add it to a new slide ( **4** ).
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two other tools in the Build-a-Graphic task pane you will find useful
    ( *Figure 11.24* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.24 – Selecting the same color objects and What’s New features](img/B32063_11_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.24 – Selecting the same color objects and What’s New features
  prefs: []
  type: TYPE_NORMAL
- en: '**Selecting same color objects** ( **1** ): Clicking on this icon opens a list
    of selection possibilities that allow you to quickly select all shapes on the
    slide by **Same Fill Color** , **Same Outline Color** , or **Same Text Color**
    as the shape you selected on the slide ( **2** ).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What’s New** ( **3** ): Clicking on this icon opens the search results view
    with all graphics tagged as **#New** . New graphics are added almost weekly. Consider
    browsing through the list from time to time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see, you get a lot of value for your investment. I would even say
    that if you have ever paid a talented graphic designer, what you will have paid
    for a few hours of their time is similar to what you would invest in Build-a-Graphic
    per year to have thousands of assets available in just a few clicks.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we will move on to the last section on add-ins in this chapter, looking
    at two productivity add-i ns from PPTools.
  prefs: []
  type: TYPE_NORMAL
- en: PPTools
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Why do I come back to productivity tools after discussing a design add-in? Simply
    because the man behind **PPTools** is highly respected in our industry. Steve
    Rindsberg has been creating PowerPoint add-ins and help articles since 1997! I
    made a great friend when I first met him in 2005 during a conference.
  prefs: []
  type: TYPE_NORMAL
- en: His website ( [http://www.pptools.com/products.htm](http://www.pptools.com/products.htm)
    ) has many add-ins that have been created over the years to help users with specific
    needs that remain unmet by the native PowerPoint features. You can also find an
    article on his site explaining add-ins and their types – I have added the link
    in *Further reading* . Instead of trying to figure out which ones to include in
    this chapter, I simply asked Steve to tell me his two most popular add-ins, one
    free and one paid. We’ll cover the free one first in the next sectio n.
  prefs: []
  type: TYPE_NORMAL
- en: Using THOR (free)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The **THOR** add-in has one simple focus: memorize the size and position of
    an object on a slide so you can apply it – or hammer it, as Steve would say –
    to one or multiple selected objects elsewhere in your presentation. As for the
    name, yes, he is referring to the hammer-wielding god in Norse mythology, reflecting
    his great sense of humor and how cultured he is.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To install the add-in, simply navigate to the **Free PPTools Add-ins** section
    of the site (see *Further reading* ) and select **THOR - The Hammer** from the
    list. Then, follow the instructions in the **Download and install THOR** section.
    Once installed, you will see a new **PPTools** tab ( **1** ) in the ribbon (see
    *Figure 11.25* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.25 – The PPTools tab with the Hammer tool](img/B32063_11_25.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.25 – The PPTools tab with the Hammer tool
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Thor** group has a simple set of buttons. Here is a brief description
    of each:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Memorize** ( **2** ): This is the button to click on first when you want
    to memorize the size and position of a slide object'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hammer** ( **3** ): This is the button to click after selecting one or many
    other objects to which you want to apply the same size and position'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Help** ( **4** ): This button opens a `.pdf` file, providing all the information
    you need about the add-in without having to go back to the website'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**About** ( **5** ): This provides access to regular licensing information,
    a link to the support, and a d iagnostics feature'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Options** ( **6** ): This b utton allows you to configure how THOR will work
    by changing the options in the **THOR Options** dialog box:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alignment** ( **7** ): Click on the radio button to choose which reference
    point to use. In this example, THOR will remember the position of the upper-left
    corner of an object.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resize** ( **8** ): This option allows you to remember the position of an
    object – if the checkbox is unchecked – or remember how to resize objects, as
    well as how to move them into the same position.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Don’t distort** ( **9** ): This option is important when you decide to resize
    slide objects to avoid distortion.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quiet mode** ( **10** ): This option simply avoids bringing up a dialog box
    giving you the exact position and size of the memorized object. If you want to
    know more about this, please refer to the **Help** document.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: And, of course, an **OK** button to confirm your settings.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s see how THOR works with the following example in which we want to memorize
    the size and position of the circle on slide **2** ( **1** ) and apply it to the
    rectangle on slide **3** ( **2** ) ( *Figure 11.26* ):'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 11.26 – Using THOR to memorize the posi\uFEFFtion and size of an object](img/B32063_11_26.png)"
  prefs: []
  type: TYPE_IMG
- en: Figure 11.26 – Using THOR to memorize the posi tion and size of an object
  prefs: []
  type: TYPE_NORMAL
- en: I select the shap e and click on **Memorize** ( **3** ) – then, I change the
    view to slide **3** ( **4** ) and select the square ( **5** ). The only thing
    left to do is click on the **Hammer** button ( **6** ).
  prefs: []
  type: TYPE_NORMAL
- en: 'The final result is a resized rectangle ( **1** ) moved to the same position
    as the circle in slide **2** ( **2** ). The **Don’t distort** setting was on,
    so we s till have a rectangular shape ( *Figure 11.27* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.27 – The result of using Hammer on an image](img/B32063_11_27.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.27 – The result of using Hammer on an image
  prefs: []
  type: TYPE_NORMAL
- en: THOR is a very simple but also very powerf ul add-in. If you ever have to quickly
    resize and position many objects on several slides in your presentation, this
    is the tool to have in your toolkit, and it will not cost you anything.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now move on to the last add-in I will discuss in this chapter, which will
    help you merge data in a PowerPoin t file just like Mail Merge would work in Wor
    d.
  prefs: []
  type: TYPE_NORMAL
- en: Using PPTMerge (paid)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The **PPTMerge** add-in is a great tool to help you merge data from an Excel
    file to create customized individual slides or complete presentations. If you
    are wondering how that can be helpful, here are a few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating a presentation file that includes the names of specific people on each
    slide.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using a certificate PowerPoint template. You can then merge the list of names
    to show on each certificate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating your social media posts by merging some key elements into a visual
    template created in PowerPoint. The credit for this amazingly creative idea goes
    to Catharine Richardson from My TechGenie (see *Further reading* ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This time- saving add-in is available on the PPTools website in the products
    list as a one-time purchase. One testimonial on Steve’s PPTMerge page is from
    a client saying they only use it once a year, and it is still well worth the cost.
  prefs: []
  type: TYPE_NORMAL
- en: 'After it has been installed, you can find PPTMerge in t he **PPTools** tab
    in the ribbon ( **1** ) ( *Figure 11.28* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.28 – PPTMerge available from the PPTools tab](img/B32063_11_28.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.28 – PPTMerge available from the PPTools tab
  prefs: []
  type: TYPE_NORMAL
- en: We can see a simple **Merge** group ( **2** ), and since I already have the
    THOR add-in installed, it is also available in the same tab. The **Help** and
    **About** buttons work the same way as described for the previous PPTools add-in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say we want to create a certificate with the name of each person receiving
    it – you can find some examples in Microsoft’s templates ( *Figure 11.29* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.29 – Using PPTMerge to create personalized certificates](img/B32063_11_29.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.29 – Using PPTMerge to create personalized certificates
  prefs: []
  type: TYPE_NORMAL
- en: On the PowerPoint slide, add `:Name:` ( **1** ) to the text box where the name
    should be added.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create your Excel file where cell **A1** has t he same `:Name:` title so that
    the add-in wil l know what to look for in the data file. Add all the names you
    need in the following rows.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are now ready to click on the **Merge** button ( **2** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The **PPTools Merge** dialog box opens ( **3** ):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **1 - Choose Merge Mode** section ( **4** ), we can keep the **Slides**
    default setting so that we create only one presentation file with one slide per
    row of data.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **2 - Select a Data File and worksheet** section ( **5** ), use the **Browse**
    button to select your Excel file. If you decide to use an Excel workbook that
    contains many worksheets, you can select which one to use from the **Worksheet**
    drop-down list ( **6** ).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **3 - Load & Validate Data** section ( **7** ), click on the **Load data**
    button and then the **Show data** button to see your field and data displayed.
    In my example, you can see that my name and Steve’s name will be added to the
    certificates.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **4 - Merge to PowerPoint file** section ( **8** ), click on the **Browse**
    button to choose a place and name for your merged file.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Important**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Choose a local drive to avoid error messages. SharePoint and OneDrive for Business
    storage can cause error messages.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click on the **Merge** button ( **9** ) to create your file.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Your merged file is quickly created and easy to use, whether you need to print
    the slides as certificates or present them with custom fields. When you are using
    the trial version, the word **DEMO** is added, and a few extra letters are shown
    in the merged fields ( **10** ). You need to purchase your license to get a perfectly
    merged file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It might not be an add-in everyone will need, but it is worth the investment
    if you do need to merge information into a PowerP oint file. Just think of how
    much time you will save!
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter on PowerPoint add-ins helped you discover tools that can boost
    your efficiency – whether helping you during your content creation phase, cleaning
    up your presentation file and reducing its size, or creating beautiful graphics
    in a fraction of the time and adding valuable functions to your PowerPoint application.
  prefs: []
  type: TYPE_NORMAL
- en: If you have struggled with repetitive tasks or ever thought that you were spending
    way too much time on content creation, it is probably time to take a closer look
    at the add-ins that can help you boost your PowerPoint efficiency. I only covered
    a few add-ins from people I know well and a sample of their tools and features,
    but there are many more add-ins available on the market for you to discover. Search
    for your specific needs and make sure you inquire about other users’ experiences
    with any new add-in or tool you might be considering.
  prefs: []
  type: TYPE_NORMAL
- en: If you would like to connect with others and discuss anything and everything
    about presentation design, PowerPoint, and any other tools to help you create
    your content, I suggest that you have a look at the Presentation Guild website
    (see *Further reading* ) and even consider becoming a member. I am one of the
    founding members and a past board member, and I can assure you it is a dynamic
    and helpful community.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will be discussing how to practice your presentation
    delivery using the tools available within PowerPoint, because pre sentations cannot
    be impactful if you don’t practice.
  prefs: []
  type: TYPE_NORMAL
