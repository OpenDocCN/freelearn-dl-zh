    storage location for all the API keys used in our project.</st> <st c="6633">Make
    sure that you have the</st> `<st c="6661">config.py</st>` <st c="6670">file located
    in the same directory as the code.</st> <st c="6719">However, you must avoid pushing
    this file to a Git repository to maintain its confidentiality and prevent exposing
    the API key.</st> <st c="6847">With the API token securely stored, you can proceed
