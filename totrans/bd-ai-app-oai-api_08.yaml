    <st c="4393">Moderate</st> <st c="4403">to steep</st> |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| <st c="4360">学习曲线</st> | <st c="4375">适合初学者</st> | <st c="4393">适中</st> <st
