- en: <st c="0">8</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Essay Generation Tool with PyQt and the ChatGPT API</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="53">In this chapter, we will dive into the exciting world of integrating
    the ChatGPT API with one of the most popular Python frameworks for</st> <st c="189">app
    development,</st> **<st c="207">PyQt</st>**<st c="211">. You will build a user-friendly
    desktop essay generation tool, powered by the integration of PyQt and the ChatGPT
    API, allowing users to effortlessly generate well-written essays on any topic.</st>
    <st c="405">Here, you will gain valuable insights into the design stages involved
    in building a PyQt</st> <st c="494">desktop application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="514">We’ll guide you through the process of designing a desktop app using
    an object-oriented approach with PyQt, helping you to understand the fundamental
    concepts and components involved in that framework.</st> <st c="717">With a solid
    foundation in place, we’ll then shift our focus to leveraging the capabilities
    of the ChatGPT API.</st> <st c="829">You will learn how to integrate the API into
    your PyQt application, enabling you to generate</st> <st c="922">essays seamlessly.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="940">By combining the strengths of PyQt and the ChatGPT API, you will
    be equipped to create an interactive and intelligent desktop app capable of generating
    well-written essays on various topics.</st> <st c="1132">Furthermore, we will
    demonstrate how to provide users with the ability to control API tokens directly
    from the frontend, giving them the power to specify the desired length of the
    essay responses obtained from the ChatGPT API.</st> <st c="1359">This level of
    customization empowers users to tailor their generated essays to meet specific
    requirements, whether they are concise summaries or</st> <st c="1504">in-depth
    analyses.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1522">In this chapter, you will cover the</st> <st c="1559">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1576">Building a desktop application</st> <st c="1608">with PyQT</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1617">Creating essay generation methods with the</st> <st c="1661">ChatGPT
    API</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1672">Controlling ChatGPT</st> <st c="1693">API tokens</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1703">By the end of this chapter, you will be proficient in using PyQt
    to design and develop desktop applications, gaining a strong foundation in app
    development.</st> <st c="1861">Additionally, you will further develop the skills
    to integrate the ChatGPT API into your applications, giving you better control
    over the AI</st> <st c="2002">response parameters.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2022">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2045">In this chapter, we will demonstrate the complete</st> `<st c="2096">PyQt6</st>`
    <st c="2101">installation.</st> <st c="2116">However, to successfully finish the
    Essay Generation Tool project, you should ensure that you also meet the following</st>
    <st c="2234">technical prerequisites:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2258">Python 3.7 or later installed on</st> <st c="2292">your machine</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2304">A code editor, such as VS</st> <st c="2331">Code (recommended)</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2349">A Python</st> <st c="2359">virtual environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2378">An OpenAI</st> <st c="2389">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2396">Familiarity with Python</st> **<st c="2421">Object-Oriented Programming</st>**
    <st c="2448">(</st>**<st c="2450">OOP</st>**<st c="2453">) concepts</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2464">The code snippets showcased in this chapter can be found on the
    GitHub platform.</st> <st c="2546">Access to the code can be obtained by visiting
    the following</st> <st c="2607">link:</st> [<st c="2613">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/tree/main/Chapter08%20ArticleGenerator</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/tree/main/Chapter08%20ArticleGenerator)<st
    c="2728">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2729">In the upcoming sections, you will embark on the journey of building
    a desktop application using PyQt.</st> <st c="2833">You will dive into the intricacies
    of GUI design and learn how to leverage PyQt’s powerful features to develop a
    visually appealing and interactive</st> <st c="2981">desktop application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3001">Building a desktop application with PyQT</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3042">In this section, you</st> <st c="3063">will gain hands-on experience
    in</st> <st c="3096">creating various components of the PyQt application’s user
    interface, such as windows, labels, buttons, text fields, and drop-down menus.</st>
    <st c="3235">Here, you will set up the project, install the</st> `<st c="3282">PyQt6</st>`
    <st c="3287">and</st> `<st c="3292">docx</st>` <st c="3296">libraries, and build
    your desktop</st> <st c="3331">application frontend.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3352">First, let’s discuss what the PyQt library is and how it differs
    from the rest of the Python application development tools, such as Tkinter (see</st>
    *<st c="3498">Table 8.1</st>*<st c="3507">).</st> <st c="3511">PyQt is a powerful
    Python framework widely used to create desktop applications with rich</st> **<st
    c="3600">Graphical User Interfaces</st>** <st c="3625">(</st>**<st c="3627">GUIs</st>**<st
    c="3631">).</st> <st c="3635">It</st> <st c="3637">provides developers with a
    comprehensive set of tools, classes, and functionalities to design and build intuitive
    and visually appealing applications.</st> <st c="3789">PyQt is a wrapper around</st>
    <st c="3813">the popular</st> **<st c="3826">Qt</st>** <st c="3828">framework,
    offering seamless integration of Qt’s extensive libraries and widgets</st> <st
    c="3910">into Python.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '| **<st c="3922">Framework</st>** | **<st c="3932">Based on Qt (powerful</st>**
    **<st c="3955">GUI toolkit)</st>** | **<st c="3967">Built-in Python GUI</st>**
    **<st c="3988">toolkit (Tkinter)</st>** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4005">Cross-platform</st> | <st c="4020">Yes</st> | <st c="4024">Yes</st>
    |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4028">License</st> | <st c="4036">GPL</st> <st c="4041">and commercial</st>
    | <st c="4055">Open-source (Python</st> <st c="4076">Software Foundation)</st>
    |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4096">Widget Library</st> | <st c="4111">Extensive</st> | <st c="4121">Limited</st>
    |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4129">Look</st> <st c="4135">and Feel</st> | <st c="4143">Native look
    on</st> <st c="4159">all platforms</st> | <st c="4172">Native look only on</st>
    <st c="4193">some platforms</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4207">Documentation</st> | <st c="4221">Comprehensive</st> <st c="4236">and
    well-documented</st> | <st c="4255">Basic</st> <st c="4262">but adequate</st>
    |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4274">Popularity</st> | <st c="4285">Popular in both hobby</st> <st
    c="4308">and industry</st> | <st c="4320">Standard library, widely used</st> <st
    c="4351">in Python</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4360">Learning Curve</st> | <st c="4375">Beginner-friendly</st> |
    <st c="4393">Moderate</st> <st c="4403">to steep</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4411">Performance</st> | <st c="4423">Generally faster due to</st>
    <st c="4448">C++ backend</st> | <st c="4459">Generally slower due to</st> <st
    c="4484">Python backend</st> |'
  prefs: []
  type: TYPE_TB
- en: '| <st c="4498">Community</st> <st c="4509">Support</st> | <st c="4516">Active
    community and</st> <st c="4538">third-party modules</st> | <st c="4557">Active
    community and</st> <st c="4579">ample resources</st> |'
  prefs: []
  type: TYPE_TB
- en: <st c="4594">Table 8.1 – A comparison between PyQt and Tkinter</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4644">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4659">PyQt is available under two licenses – the GNU</st> **<st c="4707">General
    Public License</st>** <st c="4729">(</st>**<st c="4731">GPL</st>**<st c="4734">)
    and a commercial license.</st> <st c="4763">The GPL allows you to use PyQt for
    free as long as you adhere to the terms and conditions of the license, which include
    making your application’s source code available if you distribute it.</st> <st
    c="4953">If you do not want to comply with the GPL requirements or need to use
    PyQt in a proprietary, closed-source project, you can purchase a commercial license
    from Riverbank Computing, the company that develops PyQt.</st> <st c="5165">The
    commercial license allows you to use PyQt without the restrictions imposed by</st>
    <st c="5247">the GPL.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5255">PyQt is a Python framework, unlike Tkinter, which is Python’s standard
    library for creating GUIs using the Tk toolkit.</st> <st c="5375">PyQt offers
    a more extensive range of widgets and a highly customizable</st> <st c="5446">appearance.</st>
    <st c="5459">It also provides a more</st> <st c="5483">modern and aesthetically
    appealing look for GUIs.</st> <st c="5533">Now that you know what PyQt is, we
    can set up your project and install this outstanding Python desktop</st> <st c="5636">app
    framework.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5650">Setting up the essay generation tool project</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="5695">Let’s first</st> <st c="5708">configure our project by following
    the steps with which we are already familiar.</st> <st c="5789">You can begin
    by creating a new directory called</st> `<st c="5838">EssayGenerationTool</st>`
    <st c="5857">and loading it in VS Code.</st> <st c="5885">Once the project directory
    is created, you can build your Python virtual environment and create a Python
    file named</st> `<st c="6001">app.py</st>`<st c="6007">, where the main code for
    the email generation tool is going</st> <st c="6068">to live.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6076">To finalize the project setup, you will require the installation
    of several Python libraries.</st> <st c="6171">You can use the</st> `<st c="6187">pip</st>`
    <st c="6190">package manager to install these libraries.</st> <st c="6235">To
    commence, open a terminal in VS Code and enter the following command to install
    all the</st> <st c="6326">necessary libraries:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="6407">Additionally, let’s set up the necessary API key from OpenAI by
    creating the</st> `<st c="6485">config.py</st>` <st c="6494">module.</st> <st
    c="6503">As we have seen in previous projects, this file will serve as a secure
    storage location for all the API keys used in our project.</st> <st c="6633">Make
    sure that you have the</st> `<st c="6661">config.py</st>` <st c="6670">file located
    in the same directory as the code.</st> <st c="6719">However, you must avoid pushing
    this file to a Git repository to maintain its confidentiality and prevent exposing
    the API key.</st> <st c="6847">With the API token securely stored, you can proceed
    to include it in the relevant files alongside the necessary libraries, as</st>
    <st c="6973">demonstrated in the following</st> <st c="7003">code snippet:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7016">config.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: <st c="7061">app.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: <st c="7278">Inside the</st> `<st c="7290">app.py</st>` <st c="7296">file, we
    can import several libraries to create our desktop application.</st> <st c="7370">The
    specific classes imported from</st> `<st c="7405">PyQt6</st>` <st c="7410">represent
    different GUI components, such as the application window, labels, text fields,
    buttons, and drop-down menus.</st> <st c="7530">The</st> `<st c="7534">docx</st>`
    <st c="7538">module is also imported to handle the export of our AI-generated
    essays to a</st> <st c="7616">Microsoft</st> <st c="7626">Word document.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7640">Building the application GUI with PyQt</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="7679">In this section, we</st> <st c="7699">will explore the process
    of creating a PyQt</st> <st c="7744">application.</st> <st c="7757">We will set
    up the foundation for the essay generation application using the</st> `<st c="7834">PyQt6</st>`
    <st c="7839">library.</st> <st c="7849">The application user interface that you
    will build consists of various widgets such as labels, input fields, a text area,</st>
    <st c="7971">and buttons.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7983">To begin our journey in creating a PyQt application to generate
    essays, we will start by creating the initial app window and setting up the application
    launch logic.</st> <st c="8150">As mentioned earlier, our application will use</st>
    `<st c="8286">EssayGenerator</st>` <st c="8300">class.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8307">Using OOD with PyQt is beneficial because PyQt is built upon the
    Qt framework, which itself is designed with object-oriented principles.</st> <st
    c="8445">By aligning our code with the underlying framework, we can leverage the
    full power and flexibility of PyQt.</st> <st c="8553">By encapsulating the</st>
    <st c="8574">app functionality in a class, we can easily manage and maintain our
    application.</st> <st c="8655">This</st> <st c="8659">promotes code reusability
    and extensibility, as classes can be inherited, modified, and extended as needed.</st>
    <st c="8768">The</st> `<st c="8772">EssayGenerator</st>` <st c="8786">class will
    be derived from the</st> `<st c="8818">QWidget</st>` <st c="8825">class, which
    is a base class for all user interface objects</st> <st c="8886">in PyQt:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: <st c="9183">Here is how our PyQt application</st> <st c="9217">is implemented:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9232">Firstly, we use the</st> `<st c="9253">QWidget</st>` <st c="9260">class
    as a base class in the</st> `<st c="9290">EssayGenerator</st>` <st c="9304">class,
    which allows us to adopt all</st> `<st c="9341">QWidget</st>` <st c="9348">features
    in the GUI of our application.</st> `<st c="9389">QWidget</st>` <st c="9396">is
    a fundamental class in</st> `<st c="9423">PyQt</st>` <st c="9427">that provides
    functionality to create windows, handle events, and manage layouts.</st> <st c="9510">While
    there are other alternative base classes available in</st> `<st c="9570">PyQt</st>`<st
    c="9574">, such as</st> `<st c="9584">QMainWindow</st>` <st c="9595">for more
    complex applications or</st> `<st c="9629">QDialog</st>` <st c="9636">for custom
    dialog boxes,</st> `<st c="9662">QWidget</st>` <st c="9669">is chosen here because
    it serves as a versatile foundation for most user interface elements and provides
    the necessary features to create a basic window in our essay</st> <st c="9836">generation
    application.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="9859">The</st> `<st c="9864">EssayGenerator</st>` <st c="9878">class
    is a specialized type of widget that can be used to create a GUI element.</st>
    <st c="9959">Inside the class, we have the</st> `<st c="9989">__init__</st>` <st
    c="9997">method, which is</st> <st c="10014">a</st> <st c="10017">special method
    in Python known as a constructor.</st> <st c="10066">It gets executed when an
    object of the class is created.</st> <st c="10123">Within the</st> `<st c="10134">__init__</st>`
    <st c="10142">method of the</st> `<st c="10157">EssayGenerator</st>` <st c="10171">class,
    we use the</st> `<st c="10190">super()</st>` <st c="10197">keyword to call the</st>
    `<st c="10218">__init__</st>` <st c="10226">method of the parent class,</st> `<st
    c="10255">QWidget</st>`<st c="10262">, and initialize it.</st> <st c="10283">This
    ensures that the necessary setup from the parent class is performed before any
    additional initialization specific to the</st> `<st c="10409">EssayGenerator</st>`
    <st c="10423">class.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="10430">Then, the</st> `<st c="10441">initUI()</st>` <st c="10449">method
    is responsible for setting up the user interface and other elements of the application,
    such as the window title, size, and position.</st> <st c="10591">It sets the window
    title of the application to</st> `<st c="10638">Essay Generator</st>`<st c="10653">,
    using the built-in</st> `<st c="10674">setWindowTitle</st>` <st c="10688">method,
    and specifies the position and size of the window on the screen, where the numbers
    represent the</st> `<st c="10794">x</st>` <st c="10795">and</st> `<st c="10800">y</st>`
    <st c="10801">coordinates of the top-left corner of the window, followed by its
    width and</st> <st c="10878">height, respectively.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="10899">By calling</st> `<st c="10911">super().__init__()</st>` <st c="10929">and</st>
    `<st c="10934">self.initUI()</st>`<st c="10947">, we ensure that the application
    is properly initialized, and the main application window is launched once we run
    it.</st> <st c="11065">This approach follows the principle of inheritance, where
    the</st> `<st c="11127">EssayGenerator</st>` <st c="11141">child class inherits
    and extends the functionality of the parent class,</st> `<st c="11214">QWidget</st>`<st
    c="11221">, resulting in a fully functional and customized widget for</st> <st
    c="11281">our application.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="11297">In Python, it is common to use the</st> `<st c="11333">__name__
    == '__main__'</st>` <st c="11355">condition to ensure that the subsequent code
    is only executed when the script is run as the main module.</st> <st c="11461">If
    it is, the code proceeds to create an instance of the</st> `<st c="11518">QApplication</st>`
    <st c="11530">class, which manages the application’s</st> <st c="11570">control
    flow.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="11583">The</st> `<st c="11588">ex</st>` <st c="11590">object is created
    from the</st> `<st c="11618">EssayGenerator</st>` <st c="11632">class to display
    the application window, and finally,</st> `<st c="11687">sys.exit(app.exec())</st>`
    <st c="11707">starts the event loop of the application, ensuring that the program
    remains active until the user closes the window or exits the application.</st>
    <st c="11850">This allows us to execute the application when the script is run
    directly.</st> <st c="11925">You can easily verify that by running the project
    to display the main</st> <st c="11994">application</st> <st c="12007">window,
    as shown in</st> *<st c="12027">Figure 8</st>**<st c="12035">.1</st>*<st c="12037">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.1 – The Essay Generator tool window](img/B22414_08_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="12055">Figure 8.1 – The Essay Generator tool window</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12099">Now that we have built the application window, we can start adding
    the core elements of our essay generator tool.</st> <st c="12214">Those are</st>
    <st c="12224">as follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="12235">Topic input</st>**<st c="12247">: The</st> <st c="12254">essay
    generator requires a mechanism for users to input the topic or subject of the
    essay.</st> <st c="12345">This can be done through a text</st> <st c="12377">input
    field.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="12389">Essay output</st>**<st c="12402">: Once the</st> <st c="12414">generation
    algorithm produces the essay content, it needs to be displayed to the user.</st>
    <st c="12501">This can be achieved through a text area where the generated essay</st>
    <st c="12568">is presented.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="12581">Saving functionality</st>**<st c="12602">: Providing</st> <st
    c="12615">an option for users to save the generated essay is often useful.</st>
    <st c="12680">This can involve saving the essay to a file, such as a Word document,
    or providing the ability to copy the text to</st> <st c="12795">the clipboard.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="12809">Those core</st> <st c="12820">elements</st> <st c="12830">can
    be easily included inside the</st> `<st c="12864">initUI()</st>` <st c="12872">function,
    which holds all the elements shown in</st> <st c="12921">our application:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="13558">Before creating the essay topic input field, we will instantiate
    a</st> `<st c="13626">QLabel</st>` <st c="13632">object called</st> `<st c="13647">topic_label</st>`<st
    c="13658">. This label will be positioned above the</st> `<st c="13700">topic_input</st>`
    <st c="13711">field.</st> <st c="13719">The purpose of the label is to instruct
    the user on the purpose of the text field below.</st> <st c="13808">We then use
    the</st> `<st c="13824">move()</st>` <st c="13830">method to position the label
    at coordinates</st> `<st c="13875">(20, 40)</st>` <st c="13883">within the</st>
    <st c="13895">application window.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13914">Next, we will create a</st> `<st c="13938">QLineEdit</st>` <st
    c="13947">object named</st> `<st c="13961">topic_input</st>` <st c="13972">as
    the input field for the topic.</st> <st c="14007">Here, we can use the</st> `<st
    c="14028">move()</st>` <st c="14034">method again to position the input field
    below the label at coordinates</st> `<st c="14107">(20, 100)</st>`<st c="14116">.
    Additionally, we use the</st> `<st c="14143">resize()</st>` <st c="14151">method
    to set the dimensions of the input field.</st> <st c="14201">This ensures that
    the input field has an appropriate size for</st> <st c="14263">user input.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14274">Then, we can define the</st> `<st c="14299">essay_output</st>`
    <st c="14311">attribute as an instance of the</st> `<st c="14344">QTextEdit</st>`
    <st c="14353">class, which represents a multiline text editing widget.</st> <st
    c="14411">We again use the</st> `<st c="14428">move()</st>` <st c="14434">and</st>
    `<st c="14439">resize()</st>` <st c="14447">built-in methods to place the essay
    output filed under the topic input text field.</st> <st c="14531">The</st> `<st
    c="14535">essay_output</st>` <st c="14547">text</st> <st c="14553">area is used
    so that the generated essay</st> <st c="14593">text can be displayed.</st> <st
    c="14617">Users can now easily read and interact with the essay output, enhancing
    the usability and functionality of</st> <st c="14724">the application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14740">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14755">In Python, the</st> `<st c="14771">self</st>` <st c="14775">keyword
    is a convention used to refer to the instance of a class within the class itself.</st>
    <st c="14866">It is not a reserved keyword but a commonly used name for the first
    parameter of instance methods in a class.</st> <st c="14976">Defining methods
    within a class, including the</st> `<st c="15023">self</st>` <st c="15027">parameter
    as the first parameter, allows you to access and modify the instance variables
    and methods of</st> <st c="15132">that class.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15143">Finally, we will create two buttons for the essay generator application
    – a</st> `<st c="15294">QPushButton</st>` <st c="15305">class, which provides
    a clickable button element that users can interact with by clicking or pressing
    it.</st> <st c="15412">Here, it is essential to use the</st> `<st c="15445">clicked.connect()</st>`
    <st c="15462">method, which connects the button’s clicked signal to a method,
    allowing the method to be called when the button</st> <st c="15576">is clicked.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15587">Once the user clicks the</st> `<st c="15672">generate_essay()</st>`
    <st c="15688">function.</st> <st c="15699">Be patient, as the AI will need some
    time to generate a response after the</st> `<st c="15951">essay_output</st>` <st
    c="15963">text field.</st> <st c="15976">Similarly, once the essay is generated,
    the user will be able to click on the</st> `<st c="16097">save_essay()</st>` <st
    c="16109">function, where we will later use the</st> `<st c="16148">docx</st>`
    <st c="16152">library to save our essay in a</st> <st c="16184">Word document.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16198">Even though</st> `<st c="16211">save_essay()</st>` <st c="16223">and</st>
    `<st c="16228">generate_essay()</st>` <st c="16244">are not implemented yet, we
    can initialize them to test our application.</st> <st c="16318">Both methods should
    be placed inside the</st> `<st c="16359">EssayGeneration</st>` <st c="16374">class
    but outside the</st> `<st c="16397">initUI()</st>` <st c="16405">method.</st>
    <st c="16414">It is also a good practice</st> <st c="16440">to</st> <st c="16443">place
    the function definitions above the main Python function to avoid any</st> <st
    c="16519">unexpected errors:</st>
  prefs: []
  type: TYPE_NORMAL
