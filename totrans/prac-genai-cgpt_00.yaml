- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: We are living in an era of rapid technological transformation, where **artificial
    intelligence** (**AI**) is no longer just a tool but an active collaborator in
    our daily lives. Among the many advancements in AI, generative AI has emerged
    as a disruptive force, reshaping how we interact with technology, create content,
    and drive innovation. From generating human-like text and producing stunning visuals
    to composing music and even writing code, generative AI has unlocked possibilities
    that once belonged only to science fiction.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于快速技术变革的时代，**人工智能**（AI）不再仅仅是工具，而是我们日常生活中的积极参与者。在众多AI进步中，生成式AI已成为一股颠覆性力量，重塑了我们与技术互动、创造内容和推动创新的方式。从生成类似人类的文本和制作令人惊叹的视觉效果，到创作音乐甚至编写代码，生成式AI解锁了曾经只属于科幻小说的可能性。
- en: This book serves as a comprehensive guide to generative AI, with a special focus
    on ChatGPT, one of the most influential players in this evolving landscape. It
    is designed for both beginners and professionals who want to understand the underlying
    principles, practical applications, and enterprise-scale implementations of **large
    language models** (**LLMs**).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本书是生成式AI的全面指南，特别关注ChatGPT，这是不断发展的格局中最有影响力的参与者之一。它旨在为希望了解大型语言模型（LLMs）的底层原理、实际应用和企业级实施的初学者和专业人员提供帮助。
- en: 'The book is structured into three parts:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为三个部分：
- en: '*Part 1, Fundamentals of Generative AI and OpenAI*,introduces the core concepts
    of generative AI, the evolution of AI models, and the mechanics behind large foundation
    models. It also provides an in-depth look at OpenAI, its model families (such
    as GPT-4, DALL·E, and Whisper), and the rapid adoption of ChatGPT.'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第一部分，生成式AI和OpenAI的基础*，介绍了生成式AI的核心概念、AI模型的演变以及大型基础模型背后的机制。它还深入探讨了OpenAI，其模型家族（如GPT-4、DALL·E和Whisper），以及ChatGPT的快速采用。'
- en: '*Part 2, ChatGPT in Action*, explores how to interact with ChatGPT effectively,
    covering prompt engineering techniques and real-world applications across various
    domains, including productivity, software development, marketing, research, and
    creativity. This section also introduces GPTs, the next step in AI customization,
    allowing users to build their own personalized AI assistants.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第二部分，ChatGPT实战*，探讨了如何有效地与ChatGPT互动，涵盖了提示工程技巧以及跨多个领域的实际应用，包括生产力、软件开发、营销、研究和创造力。本节还介绍了GPTs，这是AI定制的下一步，使用户能够构建自己的个性化AI助手。'
- en: '*Part 3, OpenAI for Enterprises*, shifts the focus to enterprise-scale applications,
    discussing how businesses can leverage OpenAI’s models via APIs to develop powerful
    AI-driven solutions. The book concludes with a forward-looking epilogue, analyzing
    the broader AI landscape and what to expect in the near future.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第三部分，面向企业的OpenAI*，将焦点转向企业级应用，讨论企业如何通过API利用OpenAI的模型来开发强大的AI驱动解决方案。本书以一个前瞻性的序言结束，分析了更广泛的AI格局以及未来可以期待的内容。'
- en: Who this book is for
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向对象
- en: This book is for AI enthusiasts, business professionals, and researchers who
    want to harness the power of generative AI. Whether you’re a software engineer
    exploring AI-driven development, a marketer leveraging AI for content creation,
    or a business leader strategizing AI adoption, this book provides the knowledge
    and practical insights you need.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向希望利用生成式AI力量的AI爱好者、商业专业人士和研究人员。无论您是探索AI驱动开发的软件工程师，利用AI进行内容创作的营销人员，还是制定AI采用策略的企业领导者，本书都提供了您需要的知识和实用见解。
- en: What this book covers
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: '*Chapter 1*, *Introduction to Generative AI,* lets you discover the evolution
    of AI from traditional methods to generative AI, explore the foundation of LLMs,
    and understand how generative AI powers text, image, music, and video generation.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*第一章，生成式AI简介*，让您了解AI从传统方法到生成式AI的演变，探索LLMs的基础，并理解生成式AI如何推动文本、图像、音乐和视频的生成。'
- en: '*Chapter 2*, *OpenAI and ChatGPT: Beyond the Market Hype,* dives into OpenAI’s
    ecosystem, explores the different model families (GPT-4, DALL·E, and Whisper),
    and understands ChatGPT’s rapid rise and its capabilities for everyday and professional
    use.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '*第二章，OpenAI和ChatGPT：超越市场炒作*，深入探讨了OpenAI的生态系统，探索了不同的模型家族（GPT-4、DALL·E和Whisper），并理解ChatGPT的快速崛起及其在日常和职业用途中的能力。'
- en: '*Chapter 3*, *Understanding Prompt Engineering,* explores the art of crafting
    effective prompts, including techniques like ReAct and **Chain of Thought** (**CoT**),
    and shows how structured prompting enhances AI-generated responses.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*第3章*，*理解提示工程*，探讨了制作有效提示的艺术，包括ReAct和**思维链**（**CoT**）等技术，并展示了结构化提示如何增强AI生成的响应。'
- en: '*Chapter 4*, *Boosting Day-to-Day Productivity with ChatGPT,* leverages ChatGPT
    as a personal productivity assistant, showing how to automate tasks, improve writing,
    translate content, retrieve quick information, and enhance research efficiency.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*第4章*，*用ChatGPT提升日常生产力*，利用ChatGPT作为个人生产力助手，展示了如何自动化任务、改进写作、翻译内容、检索快速信息以及提高研究效率。'
- en: '*Chapter 5*, *Developing the Future with ChatGPT,* explores how ChatGPT aids
    developers in generating, optimizing, and debugging code and translating programming
    languages.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '*第5章*，*用ChatGPT开发未来*，探讨了ChatGPT如何帮助开发者生成、优化和调试代码，以及翻译编程语言。'
- en: '*Chapter 6*, *Mastering Marketing with ChatGPT*, uncovers how ChatGPT can revolutionize
    marketing—enhancing content creation, optimizing SEO, running A/B testing, and
    improving customer engagement with sentiment analysis.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*第6章*，*用ChatGPT精通营销*，揭示了ChatGPT如何革命性地改变营销——增强内容创作、优化SEO、进行A/B测试，并通过情感分析提高客户参与度。'
- en: '*Chapter 7*, *Research Reinvented with ChatGPT,* shows how ChatGPT can assist
    researchers in brainstorming ideas, structuring studies, formatting bibliographies,
    and presenting findings in a clear and concise manner.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*第7章*，*用ChatGPT重新发明研究*，展示了ChatGPT如何帮助研究人员在头脑风暴、构建研究、格式化参考文献以及以清晰简洁的方式呈现研究结果。'
- en: '*Chapter 8*, *Unleashing Creativity Visually with ChatGPT,* explores ChatGPT’s
    multimodal capabilities, including GPT-4 Vision and DALL-E, enabling AI-driven
    image generation, visual Q&A, and enhanced creative workflows.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*第8章*，*用ChatGPT视觉释放创造力*，探讨了ChatGPT的多模态能力，包括GPT-4 Vision和DALL-E，使AI驱动的图像生成、视觉问答和增强创意工作流程成为可能。'
- en: '*Chapter 9*, *Exploring GPTs*, teaches the concept of GPTs, explores assistant-based
    AI workflows, and shows how to build your own AI-powered assistants for tasks
    like research, analysis, and marketing.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*第9章*，*探索GPTs*，介绍了GPTs的概念，探讨了基于助手的AI工作流程，并展示了如何构建自己的AI助手以执行研究、分析和营销等任务。'
- en: '*Chapter 10*, *Leveraging OpenAI Models for Enterprise-Scale Applications,*
    delves into OpenAI’s model APIs, comprehends enterprise applications of LLMs,
    and explores how businesses can integrate generative AI into their workflows responsibly.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*第10章*，*利用OpenAI模型进行企业级应用*，深入探讨了OpenAI的模型API，理解了大型语言模型的企业应用，并探讨了企业如何负责任地将生成式人工智能集成到其工作流程中。'
- en: '*Chapter 11*, *Epilogue and Final Thoughts*, reflects on the evolving landscape
    of generative AI, discusses ethical implications, and looks ahead to the future
    of AI.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*第11章*，*结语和最后思考*，回顾了生成式人工智能的发展态势，讨论了伦理影响，并展望了人工智能的未来。'
- en: The *Appendix* contains a set of hands-on examples of real-world use cases leveraging
    OpenAI and Python code.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**附录**包含了利用OpenAI和Python代码的实战案例集，展示了现实世界的应用场景。'
- en: To get the most out of this book
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用这本书
- en: 'Following along will be easier if you keep the following in mind:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能记住以下几点，跟随起来会更容易：
- en: '**Learn through hands-on examples**: Many sections include practical exercises
    and real-world applications. Whenever possible, try them out using OpenAI’s APIs,
    ChatGPT, and other tools.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过实战学习**：许多章节包括实际练习和现实世界的应用。尽可能使用OpenAI的API、ChatGPT和其他工具尝试它们。'
- en: '**Experiment with different prompts**: Since prompt engineering is a key skill
    in working with generative AI, experiment with different prompts and observe how
    slight modifications affect the results.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尝试不同的提示**：由于提示工程是与生成式人工智能工作时的关键技能，尝试不同的提示并观察细微的修改如何影响结果。'
- en: '**Explore the APIs and developer tools**: If you’re a developer, take time
    to explore OpenAI’s API documentation and try integrating AI capabilities into
    your own applications.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索API和开发者工具**：如果你是开发者，花些时间探索OpenAI的API文档，并尝试将AI功能集成到自己的应用中。'
- en: '**Think beyond the basics**: This book provides a foundation, but AI is an
    evolving field. Stay updated with the latest research and industry trends to deepen
    your understanding.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超越基础思维**：本书提供了一个基础，但人工智能是一个不断发展的领域。通过关注最新的研究和行业趋势来深化你的理解。'
- en: 'Here is a list of things you need to have:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份你需要拥有的清单：
- en: '| **Software/hardware covered in the book** | **System requirements** |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **本书涵盖的软件/硬件** | **系统要求** |'
- en: '| Python 3.7.1 or higher | Windows, macOS, or Linux |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| Python 3.7.1 或更高版本 | Windows、macOS 或 Linux |'
- en: '| Streamlit | Windows, macOS, or Linux |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| Streamlit | Windows、macOS 或 Linux |'
- en: '| LangChain | Windows, macOS, or Linux |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| LangChain | Windows、macOS 或 Linux |'
- en: '| OpenAI model APIs | An OpenAI account |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| OpenAI 模型 API | OpenAI 账户 |'
- en: '| Azure OpenAI Service (optional) | An Azure subscription enabled for Azure
    OpenAI (optional) |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| Azure OpenAI 服务（可选） | 启用 Azure OpenAI 的 Azure 订阅（可选） |'
- en: Download the example code files
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载示例代码文件
- en: The code bundle for the book is hosted on GitHub at [https://github.com/PacktPublishing/Practical-GenAI-with-ChatGPT-Second-Edition](https://github.com/PacktPublishing/Practical-GenAI-with-ChatGPT-Second-Edition).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 本书代码包托管在 GitHub 上，网址为 [https://github.com/PacktPublishing/Practical-GenAI-with-ChatGPT-Second-Edition](https://github.com/PacktPublishing/Practical-GenAI-with-ChatGPT-Second-Edition)。我们还有其他来自我们丰富图书和视频目录的代码包，可在
    [https://github.com/PacktPublishing](https://github.com/PacktPublishing) 获取。请查看它们！
- en: Conventions used
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: 'A block of code is set as follows:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块设置如下：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “As always, a **subject-matter expert** (**SME**) is needed
    in the loop to review the results.”'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或您在屏幕上看到的单词。例如，菜单或对话框中的单词在文本中显示如下。例如：“一如既往，需要一个**领域专家**（**SME**）参与审查结果。”'
- en: Warnings or important notes appear like this.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要提示看起来像这样。
- en: Tips and tricks appear like this.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 提示和技巧看起来像这样。
