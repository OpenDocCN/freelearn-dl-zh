- en: '11'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Automation AI with Video
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Video editing can sometimes be a time-consuming task, but modern AI tools are
    ready to assist, making some parts of the process significantly easier. Earlier
    in the book, we looked at how a text-based editing workflow can help to streamline
    the editing process, and now, we’ll look at solutions that try to automate the
    editing process more completely.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these systems are entirely online, some are entirely offline, and others
    use a hybrid model. Some are aimed at editors, some are aimed at a more general
    audience, and capabilities vary quite a bit. Some systems try to do everything,
    including generating a new background (and even an AI avatar) as part of the edit,
    while others aim to give you a rough cut you can finesse further in your editing
    application of choice.
  prefs: []
  type: TYPE_NORMAL
- en: When you assess some of these video services yourself, keep an open mind to
    how they could help your workflow, even if you want to tweak (or entirely manage)
    the final edit yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the features discussed here do cross over into Utility AI, and it would
    certainly be possible to use these features (such as transcribing, logging, and
    organizing) without automating the actual editing. For more on text-based editing
    and adjacent transcript-based workflows, head back to [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor062)
    in the *Utility AI* section of the book. Text-based editing is at the heart of
    many automatic editing solutions.
  prefs: []
  type: TYPE_NORMAL
- en: But how far do you want that automation to go? While non-editors may want a
    service to completely edit a piece for them, experienced creatives will probably
    want to retain final control. AI is rarely perfect, and as you’ll see, it’s not
    great at placing all the edits in exactly the right places. But *imperfect* doesn’t
    mean *bad*, and automation can still give you *something* instead of a blank timeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll look at the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Automatic editing with DaVinci Resolve
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simple automatic editing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt-based automatic editing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s find out whether editors (like me!) can be replaced with AI, starting
    in the desktop app that has the most AI smarts: DaVinci Resolve.'
  prefs: []
  type: TYPE_NORMAL
- en: Automatic editing in DaVinci Resolve
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**DaVinci Resolve** ([https://blackmagicdesign.com](https://blackmagicdesign.com))
    is a professional **non-linear editing** (**NLE**) app that we’ve discussed already,
    and it includes some features for automatic editing. In both the free and Studio
    versions of the app, you can automatically remove silences, and in the Studio
    version, you can also use **IntelliScript** to cut automatically based on a script,
    or **IntelliCut** to help separate different speakers in a single audio track.'
  prefs: []
  type: TYPE_NORMAL
- en: Technically, removing silences isn’t actually classed as an “AI” feature in
    Resolve, but it automates the process and won’t take long to mention. In the **Edit**
    page, select a clip, then choose **Clip** > **Audio Operations** > **Ripple Delete
    Silence**. This feature isn’t terribly smart, and if your source audio is on the
    quiet side, you can expect some of your words to be deleted. Happily, you can
    adjust the threshold by which silence is detected, so dial it in.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.1 – It’s not AI, but it does a similar job](img/B34247_11_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.1 – It’s not AI, but it does a similar job
  prefs: []
  type: TYPE_NORMAL
- en: Without AI smarts, this feature only gets half the job done; as we’ll see soon,
    AI really can help to detect duplicate sentences, coughs, and retakes.
  prefs: []
  type: TYPE_NORMAL
- en: IntelliScript is a feature that could save a great deal of effort, and it’s
    remarkably easy to use. You start with a transcript of a clip, which you can generate
    in Resolve itself, or with MacWhisper or another tool. Next, edit that transcript
    in any text editor, removing any text you don’t want and only leaving the parts
    you want to keep.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, right-click on your source clip and choose **AI Tools** > **Create
    New Timeline Using IntelliScript…**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.2 – Just right-click on your clip, then choose a text file, and
    you’re done](img/B34247_11_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.2 – Just right-click on your clip, then choose a text file, and you’re
    done
  prefs: []
  type: TYPE_NORMAL
- en: In a short period of time, Resolve will find all the segments of video that
    you’ve asked for and put them back-to-back in a timeline. Not every edit is perfect,
    but it’s remarkably good.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.3 – The quickest way to a rough cut is to follow the script](img/B34247_11_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.3 – The quickest way to a rough cut is to follow the script
  prefs: []
  type: TYPE_NORMAL
- en: If multiple segments of the original recording match up with the chosen lines
    in the script, they’re added on tracks alongside the main match, as shown in the
    preceding figure. To evaluate them, press *D* to disable the main clip and again
    to enable the alternate clip to find the best take. Note that if you’re working
    with multicam clips, be sure to make your multicam first, then apply the IntelliScript
    feature.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, on the **Fairlight** page, there’s a feature that can help with audio
    tasks. When multiple speakers have been recorded into a single microphone, it’s
    sometimes necessary to treat their voices independently. Though blading the clips
    around every speaker is tedious, Resolve can help make the process a little easier.
  prefs: []
  type: TYPE_NORMAL
- en: 'To start, add a clip to a timeline, then head to the **Fairlight** page, right-click
    the clip, then choose **AI Tools** > **Checkerboard** **to New Tracks**, like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.4 – This command makes it a little easier to separate multiple
    speakers](img/B34247_11_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.4 – This command makes it a little easier to separate multiple speakers
  prefs: []
  type: TYPE_NORMAL
- en: Transcription commences if it hasn’t happened already, and processing follows.
    While the results aren’t perfect, especially if speakers talk at the same time,
    in general, this feature does a good job.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.5 – The output, after renaming the tracks](img/B34247_11_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.5 – The output, after renaming the tracks
  prefs: []
  type: TYPE_NORMAL
- en: It’s a good idea to rename the tracks, either using the speakers’ names or simply
    `questions` and `answers`. The cuts might not be perfect, but they’re still useful,
    which makes applying track-based effects much easier. Resolve has many other AI-based
    features—we discussed a few in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor062)—and
    new ones are frequently added. It’s a great app, and can be used alone, or alongside
    other NLEs, such as Final Cut Pro or Premiere Pro.
  prefs: []
  type: TYPE_NORMAL
- en: But while Resolve is a fully-featured NLE, smaller specialist apps and websites
    can also help to automate your edits. Let’s start with some basic options.
  prefs: []
  type: TYPE_NORMAL
- en: Simple automatic editing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Even if I weren’t a video editor, I wouldn’t sugarcoat this: though some of
    these tools can produce a time-saving rough cut, none of these AI tools can put
    together a complex final cut worth watching. So much of what goes into a finished
    edit is the result of intuition, of knowledge picked up while on location, of
    scribbled notes in the margins of a printed script.'
  prefs: []
  type: TYPE_NORMAL
- en: If your needs are very simple, and you’ve never edited anything before, you
    might be tempted to think that you can record yourself talking, get the AI to
    pick the best bits, and then generate some B-roll to illustrate some points. In
    fact, some solutions we’ve already looked at emphasize the generative side of
    things, including HeyGen, which will generate AI speakers and AI B-roll to create
    a video from the script you provide (or which another AI wrote).
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s not our focus here; we’re trying to edit real footage of real people
    into a good edit. But alas: prepare for disappointment. Editing has just too many
    variables for an AI to get it all right the first time, and the delivery methods
    available mean that it may not be easy to correct the issues created.'
  prefs: []
  type: TYPE_NORMAL
- en: Every cough, “um”, or silence that an editor removes requires thought and careful
    timing. Are you trying to mask the edit completely, planning to cover it up with
    B-roll, or is this an especially emotive moment, and you need to leave it all
    in? How long should the pause around an edit be to best serve the narrative that
    this edit delivers?
  prefs: []
  type: TYPE_NORMAL
- en: What if you notice that the point made about 30 seconds in is similar to a point
    made about a minute later, and one of them should be removed, but you don’t think
    you can cleanly remove the one the client wanted? There’s no one perfect answer
    to all these questions, and every video needs somewhat unique treatment, even
    if you’re cutting to a “house style.” Even though most humans aren’t video editors,
    we’ve all seen a lot of video content, and we know a bad edit when we hear and
    see one.
  prefs: []
  type: TYPE_NORMAL
- en: However, AI can help you to remove obvious mistakes or repeated lines to build
    a rough cut. If you’ve got a longer interview piece, you may find value in asking
    an AI to cut out the bad stuff (coughs, interviewer questions, and so on) so you
    can get to the good part of the job more quickly.
  prefs: []
  type: TYPE_NORMAL
- en: To create a sample clip, I recorded myself talking to the camera for 1 minute
    41 seconds, including long pauses, short pauses, coughs, dead-end thoughts, and
    repeated deliveries of the same lines. To challenge audio processing capabilities,
    I didn’t use an external microphone, and a small amount of wind added just the
    right level of difficulty. This became the main test clip I sent to all the automatic
    editing services I tested.
  prefs: []
  type: TYPE_NORMAL
- en: To provide a baseline for comparison, I also did the edit myself, trimming out
    the bad, zooming in to mask jump cuts, and finessing every edit, to produce a
    50-second finished piece. In Final Cut Pro, this took me about five minutes, and
    I’d expect an experienced editor to be able to perform this task in any modern
    NLE in a similar amount of time.
  prefs: []
  type: TYPE_NORMAL
- en: To test the capabilities of these apps further, I also uploaded a longer real-world
    interview, but it’s important to realize that editing tasks don’t usually scale
    in a linear fashion. Rather, the more interviews you have to work with, the less
    of each one is likely to make the final cut. Editing workflows change significantly
    as the total input duration goes up, and you may not want to just “cut out the
    bad bits” on longer projects. Real-world editing requires you to connect a thought
    from one person to a thought from another, and that’s a more subtle process.
  prefs: []
  type: TYPE_NORMAL
- en: The ideal situation for a simpler automatic edit is, therefore, a longer, continuous
    piece to camera with plenty of mistakes, coughs, and pauses. Can an AI figure
    out what’s good and what’s not?
  prefs: []
  type: TYPE_NORMAL
- en: '**Veed.io** ([https://veed.io](https://veed.io)) is a web-based video editing
    platform that enables text-based editing. I uploaded my main *1:41* test clip
    to the system, where it was transcribed, and chose the **Magic Cut** option:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.6 – Magic Cut enables basic automatic editing](img/B34247_11_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.6 – Magic Cut enables basic automatic editing
  prefs: []
  type: TYPE_NORMAL
- en: The initial cut did spot some of the repetitions and intentional mistakes in
    the original piece, but as you might expect, it didn’t do a perfect job. Some
    of the pauses that I wanted left in were removed, some of my words were trimmed
    too tightly, and some of the mistakes remained in the cut. Magic Cut wasn’t quite
    what I needed, but it got partway there.
  prefs: []
  type: TYPE_NORMAL
- en: Correcting the edit was straightforward, as the text-based editing interface
    makes it clear which parts of the transcript have made it into the final edit.
    Unfortunately, this display doesn’t visually differentiate between pauses and
    other noises such as coughs, making it a little harder to decipher, but it’s still
    easy to work with. Cutting in this way provides a way for a non-editor to get
    close to a finished edit, and it didn’t take long to get up to speed.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.7 – A corrected text-based edit in Veed.io](img/B34247_11_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.7 – A corrected text-based edit in Veed.io
  prefs: []
  type: TYPE_NORMAL
- en: Other features here include audio cleaning, which does a good job, striking
    a decent balance between *processed* and *bad*. You can also remove filler words,
    trim silences, convert between aspect ratios, remove backgrounds, and some more
    advanced options. A feature to make your speaker always look at the camera didn’t
    work well for me; it made my eyes look odd.
  prefs: []
  type: TYPE_NORMAL
- en: Though there are useful features here, the absence of one makes the site significantly
    less useful. Veed.io unfortunately doesn’t export to an NLE-friendly format, so
    you have to get the edit perfect within the web-based interface. Therefore, this
    app aims to replace video editing apps rather than augment them, and that’s not
    what I want. If I can’t get the output back on a timeline in my NLE of choice,
    it’s not useful to me as a video professional.
  prefs: []
  type: TYPE_NORMAL
- en: I need to be able to color-correct, or at the very least, work with Log footage.
    I need to be able to add my own titles or transitions. Above all else, I need
    to be able to finesse the edits. Text-based editing is useful for a rough cut,
    but it’s too hard to move an edit by a few frames to make the pauses just right.
    As a few frames can be the difference between an OK edit and a great one, I think
    many professional editors want timeline exporting so they can add the final finishing
    touches themselves.
  prefs: []
  type: TYPE_NORMAL
- en: If you have simpler needs, Veed.io might be fine. The Lite plan starts at US$24/month
    (or US$144/year), but you’ll need the Pro plan for 4K export and some additional
    AI features such as avatars and voice dubbing.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gling** ([https://www.gling.ai/](https://www.gling.ai/)) is a solution that
    runs locally and starts by asking you to choose between an AI edit or extracting
    shorts before transcribing your clips. At this stage, it’s possible to connect
    multiple clips into multicams and even to upload a script. With one or more clips
    ready for transcription, you’ll choose your default options:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.8 – Gling includes several options for processing](img/B34247_11_8.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.8 – Gling includes several options for processing
  prefs: []
  type: TYPE_NORMAL
- en: When processing is complete, which has taken less than the running time in my
    tests, the video is presented in a timeline at the bottom of the screen and with
    a text-based interface to the left. The automatic edit took out more pauses than
    I would ideally remove, but repeated phrases were correctly removed, as was a
    false start at the beginning.
  prefs: []
  type: TYPE_NORMAL
- en: Gling isn’t designed to perform more complex edits for you, or to make judgements
    about which take is best—that’s your job. Unfortunately, pauses and coughs aren’t
    shown in the text-based editing interface, but it’s still quite easy to make edits.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.9 – Select a line, then cut it out or restore it if you wish](img/B34247_11_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.9 – Select a line, then cut it out or restore it if you wish
  prefs: []
  type: TYPE_NORMAL
- en: Each section of video that’s been included can have effects applied or removed
    using the “magic wand” icon that appears on each clip in the timeline at the bottom
    of the window, or you can use the **Enhance** menu at the top to apply these effects
    to all the clips in your timeline.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.10 – Controls in Gling are quite simple, but work well](img/B34247_11_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.10 – Controls in Gling are quite simple, but work well
  prefs: []
  type: TYPE_NORMAL
- en: As well as text-based editing, it’s possible to zoom right in on the timeline
    and make frame-by-frame edits—necessary if a word fragment has been omitted.
  prefs: []
  type: TYPE_NORMAL
- en: 'Crucially, after this processing, you can export to one of several NLE-friendly
    formats: FCP, Resolve, and Premiere are all supported. Both closed captions and
    open captions, jump zooms, and all your edits will survive this journey, but audio
    cleanup won’t—you’ll have to fix that yourself.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.11 – Several different options for exporting are included](img/B34247_11_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.11 – Several different options for exporting are included
  prefs: []
  type: TYPE_NORMAL
- en: Note that if you’ve shot with multiple cameras, you’ll want to be using Final
    Cut Pro or Resolve for best results, because multicam export to Premiere is not
    supported. The easiest workflow is to upload only the angle with the best audio,
    let Gling do its thing, then download in multicam format.
  prefs: []
  type: TYPE_NORMAL
- en: Back in your FCP or Resolve, you can open the multicam container (which you
    may need to “reveal” from your timeline), then add and sync the other angles.
    Return to your main timeline, and you can now switch between angles manually.
  prefs: []
  type: TYPE_NORMAL
- en: Gling isn’t expensive, but you will need a paid plan to regularly export to
    an NLE-friendly format. The first timeline export you make on the free plan is
    free, but after that, you’ll have to pay at least US$20/month (or US$120/year)
    for this feature. As you can test it for free, send it some of your clips and
    see whether Gling’s edits will save you time.
  prefs: []
  type: TYPE_NORMAL
- en: If these solutions don’t provide enough flexibility, some other tools can be
    given much more specific instructions. Let’s prompt a couple of them.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt-based automatic editing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Riverside** ([https://riverside.fm](https://riverside.fm)) is a well-known
    editing platform with several features to support web-based editing workflows.
    Through the prompt-based **Co-Creator** feature, I asked for an output of about
    50 seconds in length, and it intelligently figured out what to include, doing
    a pretty good job but trimming some phrases a little too tightly, clipping off
    part of a word. My further prompts were sometimes successful and sometimes not.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.12 – Prompting with Co-Creator is a little unpredictable](img/B34247_11_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.12 – Prompting with Co-Creator is a little unpredictable
  prefs: []
  type: TYPE_NORMAL
- en: In my first request in the preceding figure, the AI wasn’t able to adjust the
    tolerance by which pauses were being detected as noise and re-added obvious coughs
    to the edit. In the second request, the specific words that had been cut off in
    the edit were not restored. Still, being able to ask for a specific duration did
    work well as a first step, making prompting a mixed bag. Happily, the text-based
    editing interface is comprehensive and makes it easy to add or remove parts of
    a transcript from the finished piece.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.13 – As you hover over a pause (…), Riverside will tell you how
    long it is, and noises are shown by a squiggle](img/B34247_11_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.13 – As you hover over a pause (…), Riverside will tell you how long
    it is, and noises are shown by a squiggle
  prefs: []
  type: TYPE_NORMAL
- en: The text-based editing here is a step up in complexity from both Veed.io and
    Gling, as it can differentiate between a cough and a pause, and will even tell
    you how long a pause is—just hover over it. Note that background noise can cause
    silences and pauses to be confused with one another; as ever, better quality inputs
    give better results.
  prefs: []
  type: TYPE_NORMAL
- en: A Riverside feature called **VideoDub** was mentioned briefly in an earlier
    chapter on Gen AI with audio, and if you want to give it a try, select a word,
    then choose **VideoDub** above it. You can type in a replacement word, and a new
    generation will take the place of the original audio. Sadly, this didn’t work
    well for me, as the synthetic speech that was generated didn’t match my own voice.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.14 – VideoDub may work well for you, but the audio didn’t sound
    like my original speech](img/B34247_11_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.14 – VideoDub may work well for you, but the audio didn’t sound like
    my original speech
  prefs: []
  type: TYPE_NORMAL
- en: As well as the prompt-based Co-Creator, you’ll find additional AI tools to remove
    pauses, filler words (or “fluff”), improve audio quality, force eye contact, and
    more. Unfortunately, the quality of the audio cleanup features wasn’t great, and
    to me, it sounded quite processed.
  prefs: []
  type: TYPE_NORMAL
- en: On the plus side, the timeline interface at the bottom of the window is quite
    flexible, allowing fine control over exactly where each edit is placed. If you’re
    comfortable with a web-only interface and want to do most of your editing here,
    Riverside might work for you.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.15 – The editing workflow in Riverside is well thought out](img/B34247_11_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.15 – The editing workflow in Riverside is well thought out
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, if you’re a video professional, this tool doesn’t offer the same
    flexibility that Gling does with its timeline exports. Only timeline exports to
    Final Cut Pro and Premiere Pro are supported (not Resolve), and neither includes
    multicam support. Worse, though, this feature is only supported on a Business
    plan, for which a fixed price is not shown. Without timeline exports, Riverside
    can’t easily slot into an existing video editing workflow like Gling can. Costs
    start at US$29/month (or US$288/year) for the Pro plan.
  prefs: []
  type: TYPE_NORMAL
- en: '**Descript** ([https://www.descript.com/](https://www.descript.com/)) is an
    app we looked at in the context of generative audio, but there’s a full promptable
    video editing system hiding in there, too. Much like the other systems, after
    you’ve uploaded your source clips, they’ll be transcribed and then shown in a
    text-based editing interface.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.16 – Pauses are shown with a vertical bar (|), but coughs aren’t
    shown](img/B34247_11_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.16 – Pauses are shown with a vertical bar (|), but coughs aren’t shown
  prefs: []
  type: TYPE_NORMAL
- en: One strength here is that the words are also shown in the timeline at the bottom
    of the window, which makes it easy to find specific words in a video. Waveforms
    are initially hidden but can be revealed with a quick click on one of the words.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.17 – The words on the timeline are a useful addition](img/B34247_11_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.17 – The words on the timeline are a useful addition
  prefs: []
  type: TYPE_NORMAL
- en: Several preset AI tools are presented, including **Edit for clarity**, **Studio
    Sound**, and tools to remove filler words or retakes. I found these preset options
    to not be as effective as I would have liked; not all duplicates were found, not
    all coughs were removed, and audio quality was pretty crunchy after **Studio Sound**
    was applied—it was too strong for my tastes.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.18 – Presets to get you started](img/B34247_11_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.18 – Presets to get you started
  prefs: []
  type: TYPE_NORMAL
- en: However, the prompt-based system seemed to do a better job in my testing. The
    assistant is called **Underlord**, which seems like an odd branding choice, but
    it works pretty well. I asked for the total length to be cut to 50 seconds, and
    it managed to preserve most of the right parts of the video and cut the rest.
    Not every decision was what I wanted—sometimes a cough was removed without the
    partial sentence before it—but it got close.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.19 – Underlord responds to English language requests and is more
    flexible than the preset options](img/B34247_11_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.19 – Underlord responds to English language requests and is more flexible
    than the preset options
  prefs: []
  type: TYPE_NORMAL
- en: Although I tried to correct some of these errors by talking to Underlord, it
    didn’t do quite what I wanted. If you want something simple done, you may be better
    off doing it yourself.
  prefs: []
  type: TYPE_NORMAL
- en: While Descript did manage to place the edits well, not trimming off the edges
    of any words, I did find that some segments that should have been trimmed out
    were left in. Editing via the transcript is easy enough, allowing you to restore
    cut words or remove additional ones using the mouse alone, or with keyboard shortcuts.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re done, you’ll probably want to export this to a timeline-friendly
    format and make the final cut in your NLE, but this requires a paid plan at the
    Creator tier or higher, for US$35/month (or US$288/year). Multicam isn’t supported,
    so it won’t be suitable for multi-camera shoots. If you’re using Descript for
    other purposes, then Underlord could be useful, but I suspect that serious editing
    jobs may be better handled with Eddie.
  prefs: []
  type: TYPE_NORMAL
- en: '**Eddie AI** ([https://heyeddie.ai](https://heyeddie.ai)) is a service with
    a local app, ChatGPT mode to support prompt-based interactions, and AI-driven
    rough cuts. Further, it not only allows *exporting* to timelines across all common
    NLEs but *importing* from them too. You can choose from several options right
    now, but I’d expect them to change soon. Upcoming options allow a URL to be provided,
    from which Eddie can learn more about a video’s subject, but you can just chat
    if you wish.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.20 – Several ways to start an edit in Eddie](img/B34247_11_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.20 – Several ways to start an edit in Eddie
  prefs: []
  type: TYPE_NORMAL
- en: Eddie requires at least 5 minutes of footage to get started, making it a little
    trickier to run basic tests, so I pushed it a little harder by giving it my longer
    test interview. While it’s possible to upload a timeline with a shorter clip repeated,
    Eddie’s strengths are not in simply removing coughs and pauses. It won’t add a
    punch-in zoom to mask jump cuts, and there’s no traditional timeline to adjust
    yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Eddie aims to be more of an assistant at arm’s length, and it’s able to tackle
    more complex tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.21 – A rough cut begins in Eddie](img/B34247_11_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.21 – A rough cut begins in Eddie
  prefs: []
  type: TYPE_NORMAL
- en: By accepting existing footage in video editing apps, including single clips
    and multicam clips direct from Final Cut Pro, integration into an existing video
    editing workflow becomes quite a bit easier. To avoid uploading multi-GB source
    files, I transcoded my clips first, but I needn’t have bothered; Eddie automatically
    did the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.22 – Two source clips being combined into a single multicam before
    transcoding](img/B34247_11_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.22 – Two source clips being combined into a single multicam before
    transcoding
  prefs: []
  type: TYPE_NORMAL
- en: AI-based rough cuts will do well with some kinds of interviews and presentations
    to camera, but not so well with others. Although it’s possible to upload many
    interviews together, an AI can’t know exactly which sentences are most important
    and is likely to pick answers that are less than ideal.
  prefs: []
  type: TYPE_NORMAL
- en: After all, a human editor may not pick the best answers for a particular video
    piece on the first go; this process requires deep knowledge of the subject matter
    and can often require that a client look through transcripts themselves. Telling
    a story is a job for humans, and the AI doesn’t understand what’s valuable.
  prefs: []
  type: TYPE_NORMAL
- en: Eddie does all the right things, though; not just guessing but asking for more
    information before proceeding. It asked about the target length, whether we wanted
    to exclude the interviewer or not—the right questions to ask. Still, while it
    started with one of the best interviews I’ve had the pleasure of shooting, it
    didn’t assemble the best parts of it into a story on its first attempt—how could
    it? It’s not human. It can’t read emotion from a transcript. It missed the magic,
    though it honestly didn’t do too badly.
  prefs: []
  type: TYPE_NORMAL
- en: Of all these tools, the options in Eddie provide the most flexibility, but a
    human still needs to craft the story. A human needs to listen, not just to the
    words, but to how they are said. Eddie might come up with a nice edit quickly,
    but equally, it might not. Complex jobs require a lot more planning and thought,
    and it’s not easy to join together disparate threads of distinct conversations
    to create a greater narrative.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.23 – Pick from the preset buttons, or type your own response if
    you prefer](img/B34247_11_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.23 – Pick from the preset buttons, or type your own response if you
    prefer
  prefs: []
  type: TYPE_NORMAL
- en: The great news is that because Eddie leans into prompts and encourages conversations,
    you can ask it to make substantial, detailed changes. You’re not left out; the
    more you know about the original source material, the more likely you are to get
    to a great result. For example, if there is a line you know you want to include,
    you can just ask for it, and Eddie will find it and add it for you. Treat Eddie
    like a collaborator, and it’ll revise its edits along with your requests. Preset
    buttons allow you to ask for basic options, or you can just type something else
    in the text entry field.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.24 – Eddie asks a lot of questions, and you can ask it your own,
    too](img/B34247_11_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.24 – Eddie asks a lot of questions, and you can ask it your own, too
  prefs: []
  type: TYPE_NORMAL
- en: When you’re talking to the system through a prompt, Eddie will take you through
    the different parts of the edit that it’s put together for you and ask you whether
    you’re happy with what it’s done. There’s no timeline to fuss with, and though
    you see a transcript from time to time, changes are made by you asking for them
    directly, or by the answers you give to its questions. If you’re not sure, asking
    Eddie to cut longer pieces rather than shorter ones will give you the flexibility
    to make the final cut later, but you’ll be acting more like a director or producer
    than an editor.
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, this system refused to take out “ums” to preserve authenticity.
    I respect that and can take them out myself if I need to—that’s one reason I shot
    multiple angles, after all.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.25 – I respect that Eddie refused to take out the ums](img/B34247_11_25.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.25 – I respect that Eddie refused to take out the ums
  prefs: []
  type: TYPE_NORMAL
- en: While I’d still like to finesse a final cut into shape in an editing app myself,
    I can definitely see a place for this in longer interviews or moderately complex
    edits. If a client asks for a specific answer to be included, I don’t need to
    find exactly where those words are. If Eddie can find them by searching the transcripts,
    it’ll find them and add them for me. That sentence it chose to omit? Just ask
    for it.
  prefs: []
  type: TYPE_NORMAL
- en: You can ask for longer cuts, shorter cuts, more cuts, fewer cuts—whatever this
    version of the story needs. Use it as a pre-editing tool if you like or try to
    tell the whole story. Work with multiple clips at once, or take them one at a
    time, as you wish.
  prefs: []
  type: TYPE_NORMAL
- en: After all the interactive edits, Eddie was able to assemble a decent rough cut—a
    little long, but a great starting point for further cuts, or as source material
    for integration with other edited interviews.
  prefs: []
  type: TYPE_NORMAL
- en: The cut is shown as a video you can watch in the app, read as a transcript,
    or simply drag an icon and drop it into your editing app.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.26 – Pick from a variety of different formats, then drag away](img/B34247_11_26.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.26 – Pick from a variety of different formats, then drag away
  prefs: []
  type: TYPE_NORMAL
- en: That XML file can be delivered as a multicam clip with a single angle, or even
    a multicam clip set up with multiple clips, synced (by audio) for you, and the
    files it references can be linked back to your original full-size media. You’re
    now free to choose angles and make fine adjustments. Yes, there’s a reference
    MP4 as well, but you’ll probably want to make the final export from your own NLE.
  prefs: []
  type: TYPE_NORMAL
- en: Integration with FCP, Resolve, and Premiere is present, and it’s easy to both
    drag clips to Eddie or finished edits back the other way. Helpfully, you can also
    drag a completed timeline *into* Eddie, then ask it to chop out some social media-friendly
    moments. This might not be the hardest task in editing, but I’m sure many editors
    will appreciate it.
  prefs: []
  type: TYPE_NORMAL
- en: Honestly, Eddie surprised me. Although the approach is really quite different
    from the other apps here, its capabilities will probably be more useful to serious
    editors than the other apps I’ve looked at. While Gling could be handy for rough-cutting
    more predictable pieces, Eddie is the only solution to marry a prompt with an
    NLE timeline export, and it’s very welcome.
  prefs: []
  type: TYPE_NORMAL
- en: Costs start low but can become expensive. The Plus plan starts at US$25/month
    (or US$252/year) and allows multiple exports from 4 separate projects each month.
    If you need more than that, Pro starts at US$125/month (or $996/year) and allows
    multiple exports from 10 projects per month.
  prefs: []
  type: TYPE_NORMAL
- en: '**Using AI to manipulate XML**'
  prefs: []
  type: TYPE_NORMAL
- en: Automatic video editing isn’t the only way to assist the video editing process
    with AI, but it’s the most accessible. While it’s possible to use an LLM to mess
    around with the text files that describe an edited timeline, this process ends
    up being quite technical and somewhat error-prone. While there’s potential here,
    I think the process is a little too tricky for most editors to follow.
  prefs: []
  type: TYPE_NORMAL
- en: Still, if you’re curious to explore, start with this video by Peter Wiggins
    ([https://youtu.be/ixoJdNL4RpM?si=VMgoydkvIVbL-pkB](https://youtu.be/ixoJdNL4RpM?si=VMgoydkvIVbL-pkB))
    and then continue with his other videos.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This space is more complex than I expected, with a wide variety of tools and
    capabilities on show. Simpler editing tasks can be dealt with by several tools
    here, but if you have more complex tasks in mind, you’ll have fewer options:'
  prefs: []
  type: TYPE_NORMAL
- en: If you only need a finished video from a piece to camera, then Veed.io or Riverside
    could work for you, but if you need a timeline, they’re either not capable or
    charge a lot for the privilege.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gling provides a good solution for a specific YouTuber-talking-to-camera problem,
    and if you deal with longer projects often, its text-based editing combined with
    XML export could save you a good chunk of time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Descript allows for more complex requests, though, as it doesn’t export in multicam
    format, it’s not really suitable for jobs that require it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While Eddie isn’t the best fit for shorter jobs, it could save a lot of time
    on larger ones and on more complex editing tasks. I was surprised at how well
    it was able to make sense of my requests and pleased with the results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These products are aimed at different audiences, and I’d recommend trying a
    few to see which one(s) suit you best. It’s a more complex space than I expected
    and given the depth and variety of the video editing workflows out there, you’ll
    want to test a few of these solutions for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we’ve come to the last chapter in the book. It’s time to see how agents
    and digital assistants can help us today and in the coming years.
  prefs: []
  type: TYPE_NORMAL
