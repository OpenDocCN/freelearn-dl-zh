- en: <st c="0">7</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Building an Outlook Email Reply Generator</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="43">Email communication is an essential part of our personal and professional
    lives.</st> <st c="125">However, crafting the</st> <st c="147">perfect email response
    can be a time-consuming and challenging task.</st> <st c="216">This is where</st>
    **<st c="230">Artificial Intelligence</st>** <st c="253">(</st>**<st c="255">AI</st>**<st
    c="257">) can come in handy.</st> <st c="279">Using</st> <st c="285">the</st>
    **<st c="289">ChatGPT API</st>**<st c="300">, you will learn how to generate automatic
    email replies that are both relevant and personalized to the</st> <st c="404">sender’s
    message.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="421">Many companies have already started using AI to generate email replies
    to save time and increase productivity.</st> <st c="533">For example, Google’s
    Smart Reply feature uses machine learning algorithms to generate short, concise
    email responses that are contextually relevant to the message at hand.</st> <st
    c="706">Similarly, we</st> <st c="719">can use OpenAI’s most powerful</st> **<st
    c="751">Natural Language Processing</st>** <st c="778">(</st>**<st c="780">NLP</st>**<st
    c="783">) model, GPT-4, to generate more complex replies compared to GPT-3, helping
    us develop personalized</st> <st c="884">email replies.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="898">In this chapter, you’ll learn how to</st> <st c="935">build an</st>
    **<st c="945">Outlook email reply generator</st>** <st c="974">using OpenAI’s
    GPT-4 language model.</st> <st c="1012">You will be able to build an app that
    automatically generates original</st> <st c="1083">replies to specific emails</st>
    <st c="1110">integrating the</st> **<st c="1126">Outlook API</st>** <st c="1137">and
    OpenAI’s GPT-4\.</st> <st c="1158">This will help you to save time and increase
    your productivity by automating the process of crafting well-written email responses.</st>
    <st c="1289">You will also learn how to use the Outlook API to send data to the
    ChatGPT API, and how to automate ChatGPT API prompts to get relevant</st> <st
    c="1425">email replies.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1439">For this project, in addition to the</st> `<st c="1477">tkinter</st>`
    <st c="1484">and</st> `<st c="1489">openai</st>` <st c="1495">libraries, we’ll
    use the</st> `<st c="1521">win32com</st>` <st c="1529">library in</st> <st c="1541">Python
    to interact with</st> `<st c="1796">win32com</st>`<st c="1804">, we can easily
    retrieve the subject and body of an email message and use it as input for OpenAI’s
    GPT-4 language model.</st> <st c="1925">Together with</st> `<st c="1939">tkinter</st>`
    <st c="1946">and</st> `<st c="1951">openai</st>`<st c="1957">,</st> `<st c="1959">win32com</st>`
    <st c="1967">provides us with a comprehensive set of tools to build a powerful
    and user-friendly email</st> <st c="2058">reply generator.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2074">By leveraging the</st> `<st c="2093">win32com</st>` <st c="2101">library
    to interact with Microsoft Outlook, you can effectively use the Outlook API to
    send data to the ChatGPT API.</st> <st c="2219">This integration allows for the
    creation of automatic email replies, which can be enhanced by designing effective
    prompts.</st> <st c="2342">To streamline the process, a simple GUI desktop app
    can be built using</st> `<st c="2413">tkinter</st>`<st c="2420">, making the email
    reply generator user-friendly</st> <st c="2469">and efficient.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2483">In this chapter, we will cover the</st> <st c="2519">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2536">Passing Outlook data to the</st> <st c="2565">ChatGPT API</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2576">Generating automatic</st> <st c="2598">email replies</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2611">By the end</st> <st c="2623">of this chapter, you will be able
    to generate and send original email replies using NLP techniques and a user-friendly</st>
    <st c="2742">graphical interface.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2762">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2785">To complete this chapter, we assume that you have installed Microsoft
    Office and Outlook on your device.</st> <st c="2891">You can learn how to install
    Microsoft Office</st> <st c="2937">here:</st> [<st c="2943">https://learn.microsoft.com/en-us/microsoft-365/admin/setup/install-applications?view=o365-worldwide</st>](https://learn.microsoft.com/en-us/microsoft-365/admin/setup/install-applications?view=o365-worldwide)<st
    c="3043">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3044">However, we will walk through the complete installation of the</st>
    <st c="3108">Outlook API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3120">You will require</st> <st c="3138">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3152">Python 3.11 or later installed on</st> <st c="3187">your computer</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3200">An OpenAI</st> <st c="3211">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3218">A code editor, such as VS</st> <st c="3245">Code (recommended)</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3263">A Windows</st> <st c="3274">operating system</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3290">The latest Microsoft Office 365 apps (Outlook) installed on</st>
    <st c="3351">your device</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3362">In the next section, you will learn how to install Microsoft Outlook
    and the</st> `<st c="3440">win32com</st>` <st c="3448">library.</st> <st c="3458">You
    will also learn how to pass email data from Outlook to the ChatGPT API for automatic
    email</st> <st c="3553">reply generation.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3570">The code for the</st> *<st c="3588">Outlook Email Reply Generator</st>*
    <st c="3617">project can be found on GitHub</st> <st c="3649">at</st> [<st c="3651">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="3728">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3729">Passing Outlook data to the ChatGPT API</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3769">To get started, we will first cover the essential steps to set
    up your development environment</st> <st c="3865">for building the Outlook email
    reply generator.</st> <st c="3913">Here, you will start by installing Microsoft
    Outlook on your computer and</st> <st c="3987">setting up an email account.</st>
    <st c="4016">Once you have all the libraries installed, we will show you how to
    use the</st> `<st c="4091">win32com</st>` <st c="4099">library to extract email
    data from Outlook and pass it to the ChatGPT API to generate an automatic</st>
    <st c="4199">email reply.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4211">Let’s set up your project to</st> <st c="4241">build the Outlook
    email reply generator.</st> <st c="4282">To do this, create a new directory called</st>
    `<st c="4324">EmailReplyGenerator</st>` <st c="4343">and open it in VS Code.</st>
    <st c="4368">Once the project is created, you can activate your virtual environment,
    create a new Python file called</st> `<st c="4472">app.py</st>`<st c="4478">,
    and start writing the code to extract email data from Outlook, passing it to the</st>
    <st c="4561">ChatGPT API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4573">To complete the project setup, you will also need to install two
    Python libraries.</st> <st c="4657">You can install these libraries using the</st>
    `<st c="4699">pip</st>` <st c="4702">package manager.</st> <st c="4720">To get
    started, open Command Prompt or a terminal on your machine and type the following
    command to install</st> <st c="4828">both libraries:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="4884">After installing these libraries, we can now proceed to the secure
    handling of the ChatGPT API key, which will enable us to authenticate ourselves
    when connecting to the AI.</st> <st c="5059">To do that, let’s create a new file
    in our project called</st> `<st c="5117">config.py</st>`<st c="5126">. As demonstrated
    in the previous projects, this file will securely store all API keys utilized
    for the project.</st> <st c="5239">You can now include an API token and the necessary
    libraries in the</st> <st c="5307">appropriate files.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5325">Use this code for the</st> <st c="5348">API token:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5358">config.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: <st c="5403">Use this code for</st> <st c="5422">the libraries:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5436">app.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: <st c="5570">The</st> `<st c="5575">config.py</st>` <st c="5584">file securely
    stores the ChatGPT API key, which is imported into the</st> `<st c="5654">app.py</st>`
    <st c="5660">file.</st> <st c="5667">The API key is then used to establish a secure
    connection with the ChatGPT</st> <st c="5742">API through the</st> `<st c="5758">openai</st>`
    <st c="5764">library.</st> <st c="5774">Additionally, the</st> `<st c="5792">win32com.client</st>`
    <st c="5807">and</st> `<st c="5812">tkinter</st>` <st c="5819">libraries are imported
    to work with Outlook</st> <st c="5864">email data and create the graphical user</st>
    <st c="5905">interface, respectively.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5929">With these steps, you can ensure that your project is properly
    set up, allowing you to proceed with launching the installed Outlook application
    on your</st> <st c="6082">device smoothly.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6098">Setting up the Outlook app</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="6125">In this section, we</st> <st c="6146">will guide you through the
    process of setting up your Microsoft Outlook app.</st> <st c="6223">Microsoft
    Outlook is a widely used email client and personal information manager developed
    by Microsoft.</st> <st c="6328">It is part of the Microsoft Office suite of applications,
    which includes popular productivity tools such as Word, Excel, and PowerPoint.</st>
    <st c="6465">While Microsoft Outlook is commonly associated with Microsoft email
    services, it is important to note that Outlook can be used with any email account,
    regardless of the email provider.</st> <st c="6650">This means that users can
    leverage the power and features of Outlook even if they have an email account
    from providers such as Gmail, Yahoo, or any other</st> <st c="6804">email service.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6818">To open and log in to</st> <st c="6841">your email account using
    Outlook installed on your computer, follow</st> <st c="6909">these steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="6921">Launch Microsoft Outlook</st>**<st c="6946">: Look for the Outlook
    application icon on your computer and double-click it to open</st> <st c="7032">the
    program.</st>'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**<st c="7044">Set up a new account</st>**<st c="7065">: Upon opening Outlook
    for the first time, you will be able to log in to your email address.</st> <st
    c="7159">Simply type your email address and click on the</st> **<st c="7207">Connect</st>**
    <st c="7214">button to begin the setup process (see</st> *<st c="7254">Figure
    7</st>**<st c="7262">.1</st>*<st c="7264">).</st>'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.1 – The Outlook email setup window](img/B22414_07_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="7326">Figure 7.1 – The Outlook email setup window</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="7369">Follow the onscreen prompts</st>**<st c="7397">: Outlook will
    attempt to automatically configure the account settings based on your email address.</st>
    <st c="7498">You will see a confirmation message, and your email account will
    be added</st> <st c="7572">to Outlook.</st>'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**<st c="7583">Access your email</st>**<st c="7601">: After</st> <st c="7609">the
    setup process is complete, you can access your email in the Outlook navigation
    pane.</st> <st c="7699">You will be able to view, send, receive, and manage your
    email messages within the Outlook application, as shown in</st> *<st c="7815">Figure
    7</st>**<st c="7823">.2</st>*<st c="7825">.</st>'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.2 – The Outlook desktop interface](img/B22414_07_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="8445">Figure 7.2 – The Outlook desktop interface</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8487">Upon reaching the Outlook application interface, you can now use
    the Outlook API to access and use</st> `<st c="8587">win32com.client</st>` <st
    c="8602">to manage your</st> <st c="8618">email data.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8629">Accessing email data with the win32com client</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="8675">In this section, we</st> <st c="8695">will guide you through the
    process of retrieving the last 10 email subjects from your Outlook account and
    displaying them in a user-friendly drop-down menu.</st> <st c="8853">You will
    learn how to use the</st> `<st c="8883">win32com</st>` <st c="8891">library to
    interact with Outlook, access email data, and populate the drop-down</st> <st
    c="8972">menu in a</st> `<st c="9027">tkinter</st>`<st c="9034">. This will allow
    users to conveniently select the email they want to generate a</st> <st c="9115">reply
    for.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9125">To accomplish this, we</st> <st c="9149">will use the</st> `<st
    c="9162">last_10_emails()</st>` <st c="9178">function.</st> <st c="9189">Inside
    this function, we will utilize the</st> `<st c="9231">win32com.client</st>` <st
    c="9246">library.</st> <st c="9256">We will connect to the Outlook application
    and access the default email inbox folder.</st> <st c="9342">From there, we will
    retrieve the collection of email messages in</st> <st c="9407">the inbox:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: <st c="9723">The preceding code demonstrates how to interact with the Outlook
    application using the</st> `<st c="9811">win32com.client</st>` <st c="9826">module
    to access and manipulate email messages, as detailed in</st> <st c="9890">these
    steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9902">First, we will use the</st> `<st c="9926">win32com.client.Dispatch()</st>`
    <st c="9952">function to create a connection to the Outlook application.</st>
    <st c="10013">This function takes a string argument,</st> `<st c="10052">Outlook.Application</st>`<st
    c="10071">, to specify the application we want</st> <st c="10108">to access.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="10118">Then, we will use the</st> `<st c="10141">GetNamespace()</st>`
    <st c="10155">method with the</st> `<st c="10172">MAPI</st>` <st c="10176">argument
    to retrieve the messaging and collaboration services namespace within Outlook.</st>
    <st c="10265">This namespace provides access to various Outlook objects</st> <st
    c="10323">and folders.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="10335">By</st> <st c="10339">calling</st> `<st c="10347">GetDefaultFolder(6)</st>`<st
    c="10366">, we retrieve the default email</st> `<st c="10398">Inbox</st>` <st
    c="10403">folder.</st> <st c="10412">The</st> `<st c="10416">6</st>` <st c="10417">argument
    corresponds to the index of the</st> `<st c="10459">Inbox</st>` <st c="10464">folder
    within the Outlook namespace.</st> <st c="10502">This ensures that we access the
    correct folder.</st> <st c="10550">By assigning the result to the</st> `<st c="10581">inbox</st>`
    <st c="10586">variable, we now have a reference to the</st> `<st c="10628">Inbox</st>`
    <st c="10633">folder, which allows us to retrieve email messages and perform operations
    on them.</st> `<st c="10717">inbox.Items</st>` <st c="10728">retrieves the collection
    of items or email messages within the</st> `<st c="10792">Inbox</st>` <st c="10797">folder.</st>
    <st c="10806">This collection is assigned to the</st> `<st c="10841">messages</st>`
    <st c="10849">variable.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="10859">To retrieve the subject of the most recent email,</st> `<st c="10910">messages.GetLast().Subject</st>`
    <st c="10936">will be used.</st> `<st c="10951">GetLast()</st>` <st c="10960">returns
    the last email item in the collection, while</st> `<st c="11014">.Subject</st>`
    <st c="11022">retrieves the subject of that email.</st> <st c="11060">We can now
    wrap the email subject in a list to ensure that it is a list containing a single
    subject.</st> <st c="11161">We can also define a variable called</st> `<st c="11198">email_number</st>`<st
    c="11210">, which represents the number of previous emails for which we want to</st>
    <st c="11280">retrieve subjects.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="11298">In addition to the</st> `<st c="11318">GetList</st>` <st c="11325">method,
    you can get specific email items using the following</st> `<st c="11387">win32com</st>`
    <st c="11395">methods:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="11404">FindNext</st>`<st c="11413">: This method is used to retrieve
    the next email item in a collection of emails that match the specified</st> <st
    c="11519">search criteria</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="11534">GetFirst</st>`<st c="11543">: With this method, you can retrieve
    the first email item from a collection of emails, enabling access to its contents</st>
    <st c="11663">or properties</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="11676">GetNext</st>`<st c="11684">: Used in conjunction with</st> `<st
    c="11712">GetFirst</st>`<st c="11720">, this method retrieves the next email item
    in a collection, facilitating sequential access to all the emails within</st>
    <st c="11837">the collection</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="11851">GetPrevious</st>`<st c="11863">: This method complements</st>
    `<st c="11890">GetFirst</st>` <st c="11898">and allows you to retrieve the email
    item that comes before the currently accessed item in a collection of emails,
    enabling sequential backward access to</st> <st c="12053">the emails</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="12063">We can</st> <st c="12071">now iterate over a range of the previous
    10 subjects of the previous emails.</st> <st c="12148">Within the loop, we use</st>
    `<st c="12172">GetPrevious().Subject</st>` <st c="12193">to access the subject
    of the email preceding the current one in the iteration.</st> <st c="12273">This
    method moves the pointer to the previous email in the collection, and</st> `<st
    c="12348">.Subject</st>` <st c="12356">retrieves the topic of</st> <st c="12380">the
    email.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12390">For each iteration, we append the retrieved subject to the email
    list using the</st> `<st c="12471">append()</st>` <st c="12479">method.</st> <st
    c="12488">This builds up a list of email subjects for the previous emails, starting
    from the most recent and going back</st> <st c="12598">in time.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12606">Once the loop completes, we have a list of 10 email subjects stored
    in the emails list.</st> <st c="12695">We can then return this list of email subjects
    from the</st> `<st c="12751">last_10_emails()</st>` <st c="12767">function, allowing
    it to be used in our Outlook email</st> <st c="12822">reply generator.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12838">Now, we can focus on creating the user interface to display the
    email subjects and allow the user to select one to generate</st> <st c="12963">a
    reply:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="13251">Let’s break down what each part of the preceding</st> <st c="13301">code
    does:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13311">Firstly, we will initialize and configure the main graphical window
    for the application using the</st> `<st c="13410">tkinter</st>` <st c="13417">library.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`<st c="13426">root = tk.Tk()</st>` <st c="13441">creates the main window object,
    which is commonly referred to as the root or the top-level window.</st> <st c="13541">This
    object represents the main window that will contain the user interface elements
    of</st> <st c="13629">our application.</st>'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="13645">Then, we can set the title</st> <st c="13673">of the window to</st>
    `<st c="13690">Outlook Emails</st>`<st c="13704">. This title will be displayed
    in the title bar of the window.</st> <st c="13767">We will also set the dimensions
    of the window to</st> `<st c="13816">300</st>` <st c="13819">pixels wide and</st>
    `<st c="13836">300</st>` <st c="13839">pixels tall.</st> <st c="13853">This determines
    the initial size of the window when it is first displayed on</st> <st c="13930">the
    screen.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="13941">After the window template is completed, we can initialize the
    variables that will be used to manage the email subjects in the user interface.</st>
    <st c="14084">The</st> `<st c="14088">last_10_emails()</st>` <st c="14104">function
    is used here to retrieve the list of email subjects.</st> <st c="14167">The function
    returns a list of the last 10 email subjects from the Outlook application into
    the</st> `<st c="14263">email_subjects</st>` <st c="14277">variable.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="14287">The</st> `<st c="14292">selected_subject</st>` <st c="14308">variable
    creates a</st> `<st c="14328">StringVar</st>` <st c="14337">object from the</st>
    `<st c="14354">tkinter</st>` <st c="14361">library.</st> <st c="14371">This object
    is a special variable type that can be associated with various GUI widgets.</st>
    <st c="14459">By creating a</st> `<st c="14473">StringVar</st>` <st c="14482">object,
    we have a variable that can hold a string value and be easily associated with
    GUI elements, such as buttons or drop-down menus.</st> <st c="14619">This allows
    us to track and manipulate the selected email subject within</st> <st c="14692">our
    application.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="14708">Then, we create a drop-down menu in the user interface to display
    the list of email subjects.</st> <st c="14803">The</st> `<st c="14807">OpenMenu</st>`
    <st c="14815">widget represents a drop-down menu where the user can select an
    option from a list.</st> <st c="14900">The</st> `<st c="14904">root</st>` <st
    c="14908">argument specifies that the drop-down menu should be placed within the
    main window of our application, while the</st> `<st c="15022">selected_subject</st>`
    <st c="15038">argument specifies the variable that will be associated with the
    drop-down menu.</st> <st c="15120">It indicates the variable that will hold the
    currently selected email subject from the</st> <st c="15207">drop-down menu.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="15222">The</st> `<st c="15227">*email_subjects</st>` <st c="15242">argument
    uses the</st> `<st c="15261">*</st>` <st c="15262">operator to unpack the</st>
    `<st c="15286">email_subjects</st>` <st c="15300">list into individual items.</st>
    <st c="15329">This allows each email subject to be treated as a separate argument
    for the</st> `<st c="15405">OptionMenu</st>` <st c="15415">widget, providing the
    list of options for the</st> <st c="15462">drop-down menu.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15477">We can</st> <st c="15485">then build a label widget and start
    the main event loop of the application.</st> <st c="15561">The</st> `<st c="15565">label</st>`
    <st c="15570">variable creates a label widget, used to display text or other information
    in the user interface.</st> <st c="15669">The</st> `<st c="15673">text</st>` <st
    c="15677">argument specifies the initial text to be displayed in the label, which
    is an empty string in this case.</st> `<st c="15783">label.pack()</st>` <st c="15795">packs
    the widgets within the</st> <st c="15825">main window.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="15837">Finally,</st> `<st c="15847">root.mainloop()</st>` <st c="15862">starts
    the main event loop.</st> <st c="15891">This method is responsible for handling
    user events, such as mouse clicks or button presses, and updating the GUI accordingly.</st>
    <st c="16018">The program will remain in this loop until the user closes the application
    window, ensuring that the application remains responsive</st> <st c="16150">and
    interactive.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16166">To test the application, let’s imagine that we are a software
    engineer who received 10 work emails from</st> <st c="16271">our colleagues.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16286">Now, you can execute the current version of your Outlook email
    reply generator.</st> <st c="16367">Once the code is running, a window titled</st>
    **<st c="16409">Outlook Emails</st>** <st c="16423">will appear.</st> <st c="16437">This
    window contains a drop-down menu listing the last 10 email subjects from the</st>
    *<st c="16519">Outlook</st>* <st c="16526">application, as shown in</st> *<st
    c="16552">Figure 7</st>**<st c="16560">.3</st>*<st c="16562">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.3 – The email reply generator’s last 10 emails drop-down menu](img/B22414_07_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="16950">Figure 7.3 – The email reply generator’s last 10 emails drop-down
    menu</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17020">You</st> <st c="17025">can now select an email subject from the
    drop-down menu.</st> <st c="17082">Upon selection, the text of the selected email
    subject will be stored in the</st> `<st c="17159">selected_subject</st>` <st c="17175">variable
    and displayed inside the drop-down menu button (see</st> *<st c="17237">Figure
    7</st>**<st c="17245">.4</st>*<st c="17247">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.4 – A selected email subject inside the drop-down menu button](img/B22414_07_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="17318">Figure 7.4 – A selected email subject inside the drop-down menu
    button</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17388">Those</st> <st c="17395">are the essential steps to set up the
    development environment to build the Outlook email reply generator.</st> <st c="17501">We
    went through extracting email data from Outlook using the</st> `<st c="17562">win32com</st>`
    <st c="17570">library and passing it to the ChatGPT API.</st> <st c="17614">You
    also learned how to access and display email data using the</st> `<st c="17678">win32com</st>`
    <st c="17686">and</st> `<st c="17691">tkinter</st>` <st c="17698">libraries to
    create</st> <st c="17719">a GUI.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17725">In the next section, you will complete your Outlook email reply
    generator by using the ChatGPT API to generate AI replies to a specific email
    selected by the user.</st> <st c="17890">We will also build the corresponding
    button for users to access that functionality from the</st> <st c="17982">desktop
    application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18002">Generating automatic email replies</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="18037">Now, let’s</st> <st c="18049">delve into the implementation of
    key functionality in our application to generate automatic replies to Outlook
    emails.</st> <st c="18168">We will go through the process of building the final
    portion of our app that utilizes the Outlook API to retrieve email data, leveraging
    the power of the ChatGPT API to generate original replies based on the data obtained
    in the previous section.</st> <st c="18415">Here, you will learn how to seamlessly
    integrate the ChatGPT API into your</st> <st c="18490">Outlook applications.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18511">We will build the</st> `<st c="18530">reply()</st>` <st c="18537">function,
    which serves as the core component responsible for generating email replies.</st>
    <st c="18625">Within this function, you will retrieve the selected email subject
    from the user interface and use it to fetch the corresponding email content from
    Outlook.</st> <st c="18782">We will demonstrate how to leverage the ChatGPT API
    to generate AI-powered responses based on the email content.</st> <st c="18895">Through
    this process, you will gain hands-on experience in passing data between ChatGPT</st>
    <st c="18983">and Outlook.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18995">You can include the</st> `<st c="19016">reply()</st>` <st c="19023">function
    just above</st> `<st c="19044">root.mainloop()</st>` <st c="19059">inside your</st>
    `<st c="19072">app.py</st>` <st c="19078">file.</st> <st c="19085">Note that the</st>
    `<st c="19099">root.mainloop()</st>` <st c="19114">function call should always
    be the last line of the code in a</st> `<st c="19177">tkinter</st>` <st c="19184">application.</st>
    <st c="19198">This is because</st> `<st c="19214">root.mainloop()</st>` <st c="19229">initiates
    the main event loop, which is responsible for handling user events and updating</st>
    <st c="19320">the GUI:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="19849">Here, we</st> <st c="19858">can retrieve the selected email content
    from the Outlook application using the</st> `<st c="19938">win32com</st>` <st
    c="19946">library.</st> <st c="19956">We will access the Outlook application through
    the</st> `<st c="20007">Dispatch</st>` <st c="20015">method.</st> <st c="20024">From
    there, we retrieve the</st> `<st c="20052">Inbox</st>` <st c="20057">email folder
    using</st> `<st c="20077">GetDefaultFolder(6)</st>` <st c="20096">and retrieve
    the specific email item, based on the subject obtained from</st> `<st c="20170">selected_subject</st>`<st
    c="20186">. The resulting</st> `<st c="20202">email</st>` <st c="20207">object
    represents the email with the subject specified by the user, and it can be further
    used to generate a reply or access other</st> <st c="20339">email properties.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20356">Then, we can make use of the ChatGPT API to generate a response
    to an email.</st> <st c="20434">We will call the</st> `<st c="20451">client.chat.completions.create()</st>`
    <st c="20483">method and provide several parameters to generate a response.</st>
    <st c="20546">The</st> `<st c="20550">max_tokens</st>` <st c="20560">parameter
    limits the length of the generated email reply to 1,024 tokens.</st> <st c="20635">By
    adjusting this parameter, you can increase or decrease the number of tokens to
    achieve the desired length for your</st> <st c="20753">email reply.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20765">As you can see here, we are using the</st> <st c="20804">most
    advanced ChatGPT model,</st> **<st c="20833">GPT-4</st>**<st c="20838">. This
    model is trained on significantly more data compared to GPT-3 and is more accurate,
    factual, and relievable in solving complex tasks, which include personalized</st>
    <st c="21006">email copywriting.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21024">The</st> `<st c="21029">client.chat.completions.create()</st>`
    <st c="21061">method is a crucial part of the implementation, as it leverages
    the ChatGPT API to generate automatic email replies.</st> <st c="21179">The</st>
    `<st c="21183">prompt</st>` <st c="21189">parameter is particularly significant,
    as it sets the initial input given to the language model.</st> <st c="21287">In
    this case, the prompt includes the email content obtained from Outlook, which
    serves as the context to generate</st> <st c="21402">the reply.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21412">To improve the</st> <st c="21427">quality and diversity of responses,
    developers can experiment with different prompts.</st> <st c="21514">By crafting
    more specific or varied prompts, the model’s output can be guided to meet specific
    criteria or generate replies tailored to different contexts.</st> <st c="21670">Here</st>
    <st c="21675">are a</st> <st c="21681">few alternatives:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="21698">Contextual prompt</st>**<st c="21716">: “You received an email
    from a colleague requesting your availability for a meeting.</st> <st c="21803">Compose
    a</st> <st c="21813">polite and concise reply confirming</st> <st c="21849">your
    attendance.”</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="21866">In this prompt, the model is explicitly instructed to respond
    to a meeting request from a colleague.</st> <st c="21968">By providing a specific
    scenario and asking for a “polite and concise” reply, the generated response is
    more likely to align with the desired context</st> <st c="22118">and tone.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="22127">Emotion-infused prompt</st>**<st c="22150">: “You just received
    an email from a close friend sharing some exciting news.</st> <st c="22229">Draft
    a</st> <st c="22237">warm and enthusiastic reply to congratulate them and share</st>
    <st c="22296">your thoughts.”</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="22311">By infusing the prompt with emotional keywords such as “exciting
    news,” “warm,” and “enthusiastic,” the model is encouraged to produce a response
    that conveys a sense of joy and support, making it sound more authentic</st> <st
    c="22530">and human-like.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="22545">Formal business prompt</st>**<st c="22568">: “As a customer
    service representative, you received an email from a dissatisfied</st> <st c="22652">customer
    regarding a recent product issue.</st> <st c="22695">Craft a professional and
    empathetic response to address their concerns and offer</st> <st c="22776">a solution.”</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="22788">Here, the prompt sets a formal business context, instructing the
    model to respond as</st> <st c="22874">a customer service representative dealing
    with a dissatisfied customer.</st> <st c="22946">Using the term “empathetic” emphasizes
    the importance of a compassionate and helpful reply, which can lead to a more
    realistic and</st> <st c="23077">considerate response.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="23098">Personalized prompt</st>**<st c="23118">: “Your best friend
    sent you an email with some exciting updates about their recent vacation.</st>
    <st c="23213">Reply</st> <st c="23218">with your genuine excitement, ask follow-up
    questions, and share a bit about what’s been happening in your</st> <st c="23326">life
    too.”</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="23336">This prompt</st> <st c="23349">encourages a more personalized
    response, as it specifies that the reply should express genuine excitement and
    involve asking follow-up questions.</st> <st c="23495">By emphasizing the reciprocity
    of sharing information about the sender’s life, the generated reply is likely
    to feel more natural and akin to a</st> <st c="23639">real conversation.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="23657">Instructional prompt</st>**<st c="23678">: “You received an
    email from a colleague asking for detailed instructions on how to use a</st> <st
    c="23769">new software tool.</st> <st c="23789">Provide a step-by-step guide with
    clear explanations and visual aids</st> <st c="23858">where necessary.”</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="23875">In this case, the prompt sets a clear instruction for the model
    to generate a reply containing detailed instructions.</st> <st c="23994">The use
    of terms such as “step-by-step guide” and “clear explanations” directs the model
    toward providing more informative and</st> <st c="24121">structured responses.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="24142">The subject and email content play vital roles in generating the
    reply.</st> <st c="24215">The selected email subject serves as a key identifier
    for the email that the user wants to respond to.</st> <st c="24318">Once the email
    is identified, its content body is used as the context to generate the reply.</st>
    <st c="24411">By utilizing both the subject and email content, the reply function
    ensures that the response generated by ChatGPT is relevant and contextual.</st>
    <st c="24554">The email content provides essential information about the sender’s
    query or message, and the model uses this information to craft a coherent and</st>
    <st c="24700">appropriate reply.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24718">Sharing mail content with ChatGPT, or any external API for that
    matter, raises valid security concerns.</st> <st c="24823">This can be prevented
    through appropriate privacy policies and user consent mechanisms.</st> <st c="24911">Furthermore,
    using secure communication protocols (e.g., HTTPS) and working with reputable
    and trusted API providers, such as OpenAI, can help safeguard data during transmission</st>
    <st c="25089">and processing.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="25104">After the</st> <st c="25115">ChatGPT API response is obtained,
    we can prepare the email reply by creating a reply object using</st> `<st c="25213">email.Reply()</st>`<st
    c="25226">. The reply’s body text is then assigned the extracted response text
    obtained from the ChatGPT</st> `<st c="25321">response</st>` <st c="25329">parameter.</st>
    <st c="25341">This ensures that the AI-generated content is included in</st> <st
    c="25399">the reply.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="25409">The</st> `<st c="25414">reply.Display()</st>` <st c="25429">function
    is then called to display the reply in a separate window, allowing the user to
    review and potentially make any necessary edits before sending it.</st> <st c="25585">The</st>
    `<st c="25589">return</st>` <st c="25595">statement signifies the end of the</st>
    `<st c="25631">reply()</st>` <st c="25638">function and returns control to the
    main program, where we will build the</st> **<st c="25713">Reply</st>** <st c="25718">button:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <st c="25819">The button is associated with the root window and displays the
    text</st> `<st c="25921">command</st>` <st c="25928">parameter specifies that
    the previously built</st> `<st c="25975">reply()</st>` <st c="25982">function
    should be executed when the button is clicked.</st> <st c="26039">By calling</st>
    `<st c="26050">button.pack()</st>`<st c="26063">, the button is packed within
    the window, allowing it to be displayed to the user.</st> <st c="26146">This is
    how we can set up a user interface element that triggers the</st> `<st c="26215">reply()</st>`
    <st c="26222">function when clicked, enabling the generation of an email reply
    in response to</st> <st c="26303">user interaction.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="26320">Once you start your Outlook email reply generator app, there will
    be a new button called</st> **<st c="26410">Generate Reply</st>** <st c="26424">displayed
    on your application window (see</st> *<st c="26467">Figure 7</st>**<st c="26475">.5</st>*<st
    c="26477">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.5 – The Generate Reply button](img/B22414_07_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="26569">Figure 7.5 – The Generate Reply button</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="26607">You can now select an email from the drop-down menu and click
    the</st> `<st c="26736">reply()</st>` <st c="26743">function, passing the content
    of the email to the ChatGPT API and asking it to generate a reply based on that
    content.</st> <st c="26863">This process will happen in</st> <st c="26891">the
    background, and within a few seconds, your app will launch the Outlook reply window.</st>
    <st c="26980">As you can see in</st> *<st c="26998">Figure 7</st>**<st c="27006">.6</st>*<st
    c="27008">, the reply window will be populated with the generated ChatGPT reply
    to the</st> <st c="27085">selected email.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.6 – An email reply generated by ChatGPT](img/B22414_07_6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="27692">Figure 7.6 – An email reply generated by ChatGPT</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="27740">To verify that the generated reply is relevant, you</st> <st c="27792">can
    check the content of the selected email and the ChatGPT reply, such as</st> <st
    c="27868">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="27882">Selected</st>** **<st c="27892">email content</st>**<st c="27905">:</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="27907">Hi Martin,</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="27917">I have an exciting new feature request for you.</st> <st c="27966">Our
    users have been asking for a personalized dashboard that provides an overview
    of their account activity</st>** **<st c="28074">and statistics.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28089">I would appreciate it if you could start working on this feature
    and provide an estimate for the development</st>** **<st c="28199">effort required.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28215">Regards,</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28224">Bill.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28230">GPT-4</st>** **<st c="28237">API reply</st>**<st c="28246">:</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="28248">Dear Bill,</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28258">Thank you for your email and for presenting such an exciting
    new</st>** **<st c="28324">feature request.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28340">A personalized dashboard is indeed a wonderful addition that
    would significantly enhance the user experience.</st> <st c="28451">I understand
    the importance of a tool that could provide our users with a comprehensive overview
    of their account activity</st>** **<st c="28574">and statistics.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28589">I will immediately commence with the preliminary work to evaluate
    the possibilities.</st> <st c="28675">This constitutes understanding user needs
    in depth, defining the necessary features, and analyzing the scope</st>** **<st
    c="28784">of work.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28792">By considering the complexity and range of this feature, I
    anticipate the initial estimate to be concluded within a week’s time.</st> <st
    c="28922">This will assist me in providing an accurate estimate of the development</st>**
    **<st c="28995">effort required.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="29011">I look forward to the potential positive impact this new feature
    could bring to our user experience.</st> <st c="29113">Thank you for entrusting
    this task</st>** **<st c="29148">to me.</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="29154">Best Regards,</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="29168">Martin</st>**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="29175">In addition to generating a</st> <st c="29203">relevant reply,
    your application empowers the user to edit the AI-generated response before sending
    it.</st> <st c="29308">This functionality also allows them to address any minor
    imperfections or make adjustments to the reply, ensuring a polished final email.</st>
    <st c="29446">By providing the option to review and modify the AI-generated reply,
    the user has greater control over the content and can tailor it to their specific
    needs before sending</st> <st c="29618">the email.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="29628">This concludes our implementation of generating automatic email
    replies using Outlook and the ChatGPT API.</st> <st c="29736">You can now retrieve
    email data from Outlook, use the ChatGPT API to generate AI-powered responses,
    and integrate this functionality into an Outlook application, allowing users to
    review and modify the generated replies before</st> <st c="29963">sending them.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="29976">Summary</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="29984">In this chapter, we covered the complete development of the Outlook
    email reply generator using the Outlook and ChatGPT APIs with the state-of-the-art
    GPT-4 model.</st> <st c="30149">We learned how to retrieve email data from Outlook
    using the</st> `<st c="30210">win32com</st>` <st c="30218">library and display
    the email subjects in a drop-down menu using the</st> `<st c="30288">tkinter</st>`
    <st c="30295">library.</st> <st c="30305">We wrote the code to connect to the
    Outlook application, access the default email inbox folder, and retrieve the last
    10 email subjects.</st> <st c="30442">We also covered the creation of the user
    interface, including the main window, the drop-down menu, and</st> <st c="30545">a
    label.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="30553">We also learned the process of building the</st> `<st c="30598">reply()</st>`
    <st c="30605">function, which retrieved email data from Outlook, generated AI-powered
    responses using the ChatGPT API, and displayed the generated reply in a separate
    window for reviewing and editing.</st> <st c="30793">The chapter also explained
    how to integrate the</st> `<st c="30841">reply()</st>` <st c="30848">function
    into the application and how to create a button in the user interface that triggers
    the</st> `<st c="30946">reply()</st>` <st c="30953">function.</st> <st c="30964">We
    also tested the application by selecting an email subject from the drop-down menu
    and generating an AI reply email, using the</st> <st c="31093">ChatGPT API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="31105">In</st> [*<st c="31109">Chapter 8</st>*](B22414_08.xhtml#_idTextAnchor103)<st
    c="31118">, you will learn how to integrate ChatGPT API with one of the most popular
    app development Python frameworks,</st> **<st c="31228">PyQT</st>**<st c="31232">.
    You will build an essay-generation tool that will be able to create essays on
    any topic.</st> <st c="31323">Here, we will move one step further and show you
    how to control the API tokens directly from the application frontend.</st> <st
    c="31442">This will allow you to specify the length of the responses and, consequently,
    the generated essay received from the</st> <st c="31558">ChatGPT API.</st>
  prefs: []
  type: TYPE_NORMAL
