- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Unlocking Insights from Unstructured Text – AI Techniques for Text Analysis
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从非结构化文本中解锁见解——文本分析的AI技术
- en: Unstructured text data holds invaluable insights, but making sense of qualitative
    information at scale presents a monumental challenge. This chapter explores techniques
    that enable generative AI systems to automate the analysis and organization of
    free-form text.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 非结构化文本数据蕴含着宝贵的见解，但大规模理解定性信息是一项巨大的挑战。本章探讨了使生成式AI系统能够自动化分析和组织自由文本的技术。
- en: We’ll learn how sentiment analysis classifies the emotional tone behind words
    to determine whether content is positive, neutral, or negative. We’ll see how
    data classification uses machine learning to categorize text into predefined topics
    and labels. And we’ll discover how pattern-matching techniques can extract key
    information from unstructured data and transform it into structured outputs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将学习情感分析如何将词语背后的情感基调分类，以确定内容是正面、中性还是负面。我们将看到数据分类如何使用机器学习将文本分类到预定义的主题和标签中。我们还将发现模式匹配技术如何从非结构化数据中提取关键信息并将其转换为结构化输出。
- en: These AI capabilities help businesses and organizations efficiently process
    massive amounts of unstructured data to uncover actionable insights. Sentiment
    analysis reveals how consumers feel about products or brands. Data classification
    automatically organizes content such as customer support tickets into topics.
    Pattern matching extracts data from documents such as invoices into neat, structured
    records.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些AI能力帮助企业和组织高效地处理大量非结构化数据，以发现可操作的见解。情感分析揭示了消费者对产品或品牌的感受。数据分类自动将客户支持票据等内容组织到主题中。模式匹配从发票等文档中提取数据，形成整洁的结构化记录。
- en: This practical toolkit enables anyone to tap into the knowledge hidden within
    the proliferation of text data being created daily. Let’s explore how generative
    AI can help make sense of language at scale.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这个实用工具包使任何人都能挖掘出每天产生的文本数据中隐藏的知识。让我们探讨生成式AI如何帮助大规模地理解语言。
- en: 'The topics covered in this chapter are as follows:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖的主题如下：
- en: Sentiment analysis – AI techniques for emotion detection in text
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感分析——AI在文本中检测情感的技术
- en: Organizing unstructured data – how AI automates text categorization
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织非结构化数据——AI如何自动化文本分类
- en: Cleaning up dirty data – how AI identifies and resolves issues in datasets
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理脏数据——AI如何识别和解决数据集中的问题
- en: Making sense of unstructured data – pattern matching for information extraction
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解非结构化数据——信息提取的模式匹配
- en: Sentiment analysis – AI techniques for emotion detection in text
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 情感分析——AI在文本中检测情感的技术
- en: Sentiment analysis is one of the key applications of AI techniques in the field
    of prompt engineering. As the first in a series of AI applications we will cover,
    sentiment analysis uses natural language processing to identify and extract emotional
    signals from text data. The goal is to gauge the overall attitude or feeling within
    a piece of writing, for instance, determining whether a product review is positive
    or negative.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析是AI技术在提示工程领域的关键应用之一。作为我们将要介绍的一系列AI应用的第一项，情感分析利用自然语言处理从文本数据中识别和提取情感信号。目标是评估一篇写作中的整体态度或情感，例如，确定产品评论是正面还是负面。
- en: 'The most common uses of sentiment analysis are as follows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析最常用的用途如下：
- en: '*Brand monitoring*: Brands can track conversations happening online to monitor
    their reputation. Sentiment analysis allows them to detect PR issues as they emerge
    and measure the impact of marketing campaigns.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*品牌监控*：品牌可以跟踪在线发生的对话以监控其声誉。情感分析使他们能够检测公关问题并在其出现时进行衡量，以及衡量营销活动的影响。'
- en: '*Customer service*: Customer experience teams can aggregate feedback at scale
    by analyzing surveys, reviews, and social media mentions. This provides data-driven
    insights into where people are satisfied or frustrated with products and services.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*客户服务*：客户体验团队可以通过分析调查、评论和社交媒体提及来大规模地汇总反馈。这提供了关于人们对于产品和服务满意或不满意的数据驱动见解。'
- en: '*Market research*: By understanding customer sentiment, businesses can discover
    gaps in their services or products and fill them accordingly.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*市场研究*：通过理解客户情感，企业可以发现其服务或产品中的差距并相应地填补。'
- en: '*Political analysis*: Political groups can keep an eye on voter attitudes by
    monitoring discussions about candidates and issues. The technology assists with
    message testing and identifying areas where more outreach is needed.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*政治分析*：政治团体可以通过监控有关候选人和问题的讨论来关注选民态度。这项技术有助于信息测试和确定需要更多接触的区域。'
- en: '*Social media monitoring*: Companies use sentiment analysis to identify the
    sentiment of social media posts to understand broader consumer behavior and trends.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*社交媒体监控*：公司使用情感分析来识别社交媒体帖子的情绪，以了解更广泛的消费者行为和趋势。'
- en: '*Investment analysis*: Investors can use sentiment analysis to help forecast
    market movement. By processing relevant news, forums, and blogs, tools can determine
    whether investors feel bullish or bearish about certain stocks or sectors.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*投资分析*：投资者可以使用情感分析来帮助预测市场走势。通过处理相关的新闻、论坛和博客，工具可以确定投资者对某些股票或行业是看涨还是看跌。'
- en: '*Public health*: Health authorities can apply sentiment analysis to understand
    public concerns, misinformation, and emotional states during crises such as pandemics.
    This input helps guide communication strategies and allocation of resources.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*公共卫生*：卫生当局可以将情感分析应用于理解在流行病等危机期间公众的担忧、错误信息和情绪状态。这种输入有助于指导沟通策略和资源分配。'
- en: Here are some sentiment analysis prompt examples.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些情感分析提示示例。
- en: Here’s prompt 1.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 提示1。
