  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: You can pass many texts at once and ask ChatGPT, Bard, or Claude to provide
    the results in tabular format.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以一次传递许多文本，并要求ChatGPT、Bard或Claude以表格格式提供结果。
- en: Here’s another prompt.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这是另一个提示。
- en: 'Prompt:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here is the response produced by Claude:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Claude生成的响应：
- en: '![Figure 5.1: Response in table format](img/B21161_05_01.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图5.1：表格格式的响应](img/B21161_05_01.jpg)'
- en: 'Figure 5.1: Response in table format'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1：表格格式的响应
- en: 'Your rating system can be arbitrary. In the previous examples, the sentiment
    can be just one of three options: positive, negative, or neutral. However, you
    can tell the LLM to assign a value on an arbitrary scale. For instance, from `-1`
    (very negative) to `1` (very positive).'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评分系统可以是任意的。在先前的示例中，情感可以是三个选项之一：正面、负面或中性。然而，你可以告诉LLM在任意尺度上分配一个值。例如，从`-1`（非常负面）到`1`（非常正面）。
- en: In summary, sentiment analysis unlocks value from qualitative data at scale.
    It equips organizations to base decisions on public sentiment rather than gut
    instinct alone. With continued advances in natural language processing, the technology
    has the potential for an even wider range of applications in the future.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，情感分析在规模上从定性数据中释放了价值。它使组织能够基于公众情绪而非仅仅基于直觉做出决策。随着自然语言处理技术的持续进步，这项技术在未来的应用范围有潜力变得更加广泛。
- en: 'Furthermore, in this section, you learned that you can ask the LLM to produce
    the output in a particular format: tabular. This is not the only option. You can
    ask the LLM to produce the output as Markdown, HTML, HTML table, XML, JSON, or
    even in your own pattern. This is discussed later in this chapter.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在本节中，你了解到你可以要求LLM以特定格式生成输出：表格格式。这并非唯一选项。你可以要求LLM以Markdown、HTML、HTML表格、XML、JSON或甚至是你自己的模式生成输出。这将在本章后面讨论。
- en: 'In the next section, we explore a similar topic: data classification.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨一个类似的主题：数据分类。
- en: Organizing unstructured data – using AI for automated text categorization and
    data classification
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 组织非结构化数据 - 使用AI进行自动文本分类和数据分类
- en: In the context of data classification, a trained LLM can analyze the various
    features in the dataset and classify data accurately. For instance, if the task
    is to categorize customer complaints into predefined classes, such as *billing
    issues*, *technical issues*, *customer service issues*, and so on, an LLM can
    analyze the text of the customer complaints, understand the context and the language
    used, and classify them into the respective categories accurately.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据分类的背景下，一个训练有素的LLM可以分析数据集中的各种特征，并准确地对数据进行分类。例如，如果任务是分类客户投诉到预定义的类别，如*账单问题*、*技术问题*、*客户服务问题*等，LLM可以分析客户投诉的文本，理解上下文和使用的语言，并将它们准确分类到相应的类别中。
- en: In many cases, the LLM should be able to make an accurate classification without
    the need for any training. However, in some cases, it will need to have some examples
    to understand the pattern that you want.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，LLM应该能够做出准确的分类，而无需任何训练。然而，在某些情况下，它将需要一些示例来理解你想要的模式。
- en: 'Typical uses of data classification include the following:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分类的典型用途包括以下内容：
- en: 'Distinguish between the different categories of data and assign each data point
    to its suitable category. Some examples are as follows:'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区分不同类别的数据，并将每个数据点分配到其合适的类别。以下是一些例子：
- en: Classifying incoming emails as spam or not spam based on features such as the
    sender’s address or the email’s content
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据发件人地址或电子邮件内容等特征将收到的电子邮件分类为垃圾邮件或非垃圾邮件
- en: Classifying news articles into topics such as sports, politics, and entertainment
    based on the keywords and phrases used in the article
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据文章中使用的关键词和短语将新闻文章分类到如体育、政治和娱乐等主题
- en: 'Analyze the dataset and classify the data into various groups by using specific
    classification algorithms or criteria:'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用特定的分类算法或标准分析数据集，并将数据分类到不同的组：
- en: Classifying customers into different segments (such as high value and low value)
    based on their purchasing history using machine learning algorithms
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用机器学习算法根据购买历史将客户分类到不同的细分市场（如高价值客户和低价值客户）
- en: Using logistic regression or decision tree algorithms to classify bank loan
    applicants into low-risk or high-risk categories
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用逻辑回归或决策树算法将银行贷款申请人分类为低风险或高风险类别
- en: 'Divide and organize the given dataset into separate classes or categories,
    ensuring each class holds a common characteristic, like in these examples:'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将给定的数据集划分为单独的类别或类别，确保每个类别具有共同的特征，如下例所示：
- en: Dividing a dataset of animals into categories such as mammals, reptiles, birds,
    and fish, each having unique characteristics
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将动物数据集划分为如哺乳动物、爬行动物、鸟类和鱼类等类别，每个类别具有独特的特征
- en: Organizing a dataset of automobiles into categories such as sedans, SUVs, and
    trucks, each holding specific features
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将汽车数据集组织到如轿车、SUV和卡车等类别，每个类别具有特定的特征
- en: 'Allocate each piece of the given data to appropriate categories by understanding
    their characteristics. Here are a couple of examples:'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过理解其特征，将给定的数据中的每一部分分配到适当的类别。以下是一些例子：
- en: Allocating a list of fruits to categories such as citrus, berries, and tropical
    based on their specific characteristics
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据其特定特征将水果列表分配到如柑橘、浆果和热带等类别
- en: Assigning students to different groups based on their proficiency level in a
    subject
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据学生在某一学科中的熟练程度将学生分配到不同的组
- en: 'Categorize the collected data into predefined classes, like in the following
    cases:'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将收集到的数据分类到预定义的类别中，如下所示：
- en: Categorizing customer complaints into predefined classes such as billing issues,
    technical issues, and customer service issues
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将客户投诉分类到预定义的类别，如账单问题、技术问题和客户服务问题
- en: Classifying a collection of books into predefined genres such as mystery, romance,
    and sci-fi based on their content and themes
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据内容主题将书籍集合分类到预定义的流派，如悬疑、浪漫和科幻
- en: 'The following example shows how to classify incoming emails as spam/not spam
    and by importance in the case that the email is not spam:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例展示了如何将收到的电子邮件分类为垃圾邮件/非垃圾邮件，以及在不属于垃圾邮件的情况下根据重要性进行分类：
- en: 'Prompt:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE5]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'In this case, we are using ChatGPT, and you can see the response here:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们使用ChatGPT，你可以在这里看到响应：
- en: '![Figure 5.2: Classification of emails in two categories](img/B21161_05_02.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图5.2：电子邮件在两个类别中的分类](img/B21161_05_02.jpg)'
- en: 'Figure 5.2: Classification of emails in two categories'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2：电子邮件在两个类别中的分类
- en: It also provided an explanation, but it’s not included for brevity.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 它也提供了一个解释，但为了简洁起见，未包含在内。
- en: As you can see, you can classify things in several dimensions at once, and even
    handle some content in different languages. It is important to note that while
    GPT-3.5/GPT-4 can handle many languages, other LLMs cannot. Therefore, do some
    research before using an LLM for a specific use case.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，你可以同时在多个维度上对事物进行分类，甚至处理一些不同语言的内容。需要注意的是，虽然GPT-3.5/GPT-4可以处理许多语言，但其他LLM则不能。因此，在使用LLM进行特定用例之前，请做一些研究。
- en: Once data has been successfully classified, the next crucial step in the prompt
    engineering process is to clean the data by removing inconsistencies and inaccuracies.
    We will cover that in the next section.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦数据成功分类，prompt工程流程中的下一个关键步骤就是通过去除不一致性和不准确性来清理数据。我们将在下一节中介绍这一点。
- en: Cleaning up dirty data – how AI identifies and resolves issues in datasets
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 清理脏数据——AI如何识别和解决数据集中的问题
- en: Data cleansing, also known as data cleaning or data scrubbing, is the process
    of identifying and rectifying (or removing) errors, discrepancies, and inaccuracies
    from a dataset. This can involve detecting duplicate records, handling missing
    or incomplete data, validating and correcting values, formatting, standardizing,
    or normalizing data, and dealing with outliers.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理，也称为数据清洗或数据刮擦，是从数据集中识别和纠正（或删除）错误、差异和不准确性的过程。这可能包括检测重复记录、处理缺失或不完整的数据、验证和纠正值、格式化、标准化或归一化数据，以及处理异常值。
- en: The main objective of data cleansing is to improve the quality and reliability
    of your data, ensuring it is accurate, consistent, and in a format suitable for
    your purposes. This is crucial as dirty or messy data can interfere with your
    analysis, lead to inaccurate insights and conclusions, and negatively impact decision-making
    processes.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理的主要目标是提高数据的质量和可靠性，确保数据准确、一致，并且适合您的目的。这对于脏乱数据可能会干扰您的分析、导致不准确的观点和结论，以及负面地影响决策过程至关重要。
- en: It’s important to note that data cleansing should be a regular part of data
    management – it’s not a one-time task, as new errors can be introduced when new
    data is added or existing data is modified.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，数据清理应该是数据管理的一个常规部分——它不是一个一次性任务，因为当添加新数据或修改现有数据时，可能会引入新的错误。
- en: In general, data cleansing has been a complex and expensive process, but with
    the use of generative AI, it can be done efficiently and effectively.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，数据清理是一个复杂且昂贵的流程，但使用生成式AI，它可以高效且有效地完成。
- en: As an example, let’s suppose you scraped some data from LinkedIn. You got the
    names of potential leads and you got their emails from different sources, but
    they can be wrongly formatted. Some of the names may include emojis or additional
    attributes such as Dr., PhD, or MBA. In this case, you will need to clean the
    data to be able to send email campaigns. The goal here is to get the data back
    without titles, emojis, or additional characters.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你从LinkedIn爬取了一些数据。你得到了潜在客户的姓名和来自不同来源的电子邮件，但它们可能格式错误。一些姓名可能包含表情符号或额外的属性，如Dr.、PhD或MBA。在这种情况下，你需要清理数据以便能够发送电子邮件活动。这里的目的是获取没有头衔、表情符号或额外字符的数据。
- en: 'Prompt:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '[PRE6]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'In this case, we are using Claude, and this is the response:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例中，我们使用的是Claude，这是它的回答：
- en: 'Response:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 'Response:'
- en: '![Figure 5.3: Resulting table with a cleaned-up list of names and emails](img/B21161_05_03.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图5.3：清理后的姓名和电子邮件列表的表格结果](img/B21161_05_03.jpg)'
- en: 'Figure 5.3: Resulting table with a cleaned-up list of names and emails'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3：清理后的姓名和电子邮件列表的表格结果
- en: As you can see, this can save a lot of time if you have hundreds or even thousands
    of records that you need to clean. However, there could be cases in which LLMs
    could not solve this issue completely if some key information is missing. Thus,
    always check the results.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，如果您需要清理数百甚至数千条记录，这将节省大量时间。然而，可能存在LLMs无法完全解决这个问题的情况，如果某些关键信息缺失。因此，始终检查结果。
- en: 'Here are some other use cases for cleaning data with AI:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用AI清理数据的其他用例：
- en: '*Remove duplicates*: Identify and remove any duplicate entries in the dataset'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*移除重复项*：识别并删除数据集中的任何重复条目'
- en: '*Handle missing values*: Determine how to handle missing values, either by
    imputing or deleting them'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*处理缺失值*：确定如何处理缺失值，要么通过插补要么删除它们'
- en: '*Standardize data formats*: Ensure consistent formatting for data fields such
    as dates, phone numbers, or addresses'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*标准化数据格式*：确保日期、电话号码或地址等数据字段格式的一致性'
- en: '*Remove special characters*: Eliminate unnecessary special characters or symbols
    that may affect data quality'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*移除特殊字符*：消除可能影响数据质量的不必要特殊字符或符号'
- en: '*Convert data types*: Convert data fields to the appropriate data types (e.g.,
    converting strings to numbers)'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*转换数据类型*：将数据字段转换为适当的数据类型（例如，将字符串转换为数字）'
- en: '*Handle outliers*: Identify and handle outliers that might skew analysis or
    modeling results'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*处理异常值*：识别和处理可能扭曲分析或建模结果的异常值'
- en: '*Resolve inconsistent spellings*: Standardize and correct inconsistent spellings
    or variations of the same entity'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Validate email addresses*: Verify the validity of email addresses and correct
    any format errors'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Normalize text data*: Remove unnecessary whitespace, convert to lowercase,
    and handle punctuation in text fields'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Check for data integrity*: Ensure data consistency and integrity by validating
    relationships and cross-referencing between fields'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After ensuring that the data is clean and reliable, the focus then shifts to
    leveraging pattern-matching techniques for generating coherent and contextually
    aware responses.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Making sense of unstructured data – pattern matching for information extraction
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Pattern matching in responses involves the process of taking unstructured text
    as input and producing a structured output by identifying and extracting relevant
    patterns or information.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s look at an example to illustrate how pattern matching can be used
    in this context.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a scenario where the input is an unstructured text containing
    information about a person, including their name, age, and occupation. The goal
    is to extract and structure this information into a more organized format.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the unstructured text input:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: '*John Smith is a 35-year-old* *software engineer.*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: In this case, pattern matching can be employed to identify specific patterns
    or keywords that correspond to the desired information. For instance, we can define
    patterns such as *[name] is a [age]-year-old [occupation]* to capture the relevant
    details.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: 'By applying pattern matching to the input text, the system can recognize that
    the pattern matches the provided information and extract the corresponding values
    as follows:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '*Pattern: “[name] is a [**age]-year-old [occupation]”*'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '*Input: “John Smith is a 35-year-old* *software engineer.”*'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '*Extracted Values:*'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '*Name:* *John Smith*'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '*Age: 35*'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '*Occupation:* *Software Engineer*'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Once the structured values are extracted, they can be used to generate a more
    organized output or perform further processing. For instance, the extracted information
    can be stored in a structured database or used to populate a predefined template
    for a structured response.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: The structured output can then be used for various purposes, such as displaying
    the information in a structured format, performing calculations or comparisons,
    integrating with other systems, or generating personalized responses based on
    the extracted data.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Pattern matching in responses enables the transformation of unstructured text
    into structured information, facilitating better organization, analysis, and utilization
    of the extracted data.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s work through an exciting use case: using AI to structure unstructured
    text extracted from an image using **Optical Character** **Recognition** (**OCR**).'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: 'The scenario is this: a person wants to capture the data from an invoice to
    keep track of her expenses. She can do either of the following:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Open a spreadsheet and create a record for each new expense (manually)
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开电子表格，并为每个新的费用创建一个记录（手动）。
- en: Upload the document image to a site that allows you to do OCR to get the text
    from the image, then use an LLM to structure that data, and finally, save it to
    the spreadsheet automatically
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将文档图像上传到允许您进行OCR以从图像中获取文本的网站，然后使用LLM来结构化这些数据，最后自动将其保存到电子表格中。
- en: 'While this seems to be a lot of work to capture the data from each invoice/document,
    a more automated process is quite useful for cases such as the following: Company
    A has a team of drivers who make deliveries to different clients in multiple cities.
    The drivers have to report the expenses they incur, such as gas, tolls, vehicle
    maintenance, food, and lodging. In the current situation, they need to send an
    email at the end of each day detailing every expense, and they have to attach
    images of the invoices or receipts. This is time-consuming and error-prone.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然捕获每张发票/文档的数据似乎要做很多工作，但对于以下情况，一个更自动化的流程非常有用：公司A有一支司机团队，他们在多个城市的不同客户那里进行配送。司机必须报告他们产生的费用，如汽油、过路费、车辆维护、食物和住宿。在当前情况下，他们需要在每天结束时发送一封电子邮件，详细说明每一项费用，并附上发票或收据的图像。这是耗时且易出错的。
- en: Besides, someone at the office has to read each email, copy the data to a spreadsheet
    or other system, and put the images in a Drive directory or something similar.
    This process is error-prone, time-consuming, and creates complexity in linking
    data together.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，办公室里的人必须阅读每一封电子邮件，将数据复制到电子表格或其他系统中，并将图像放入驱动器目录或类似的地方。这个过程易出错、耗时，并在数据链接中创建复杂性。
- en: For example, if images from emails are saved in a Drive folder while other fields
    are copied to a spreadsheet, it can be difficult to connect which image goes with
    which record or row in the spreadsheet. There is no automatic linkage between
    the separated data.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果电子邮件中的图像保存在驱动器文件夹中，而其他字段则复制到电子表格中，那么很难连接哪个图像与电子表格中的哪个记录或行相对应。这些分离的数据之间没有自动链接。
- en: With the help of AI, this can be greatly simplified.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI的帮助下，这可以大大简化。
- en: Each driver can use a conversational automation tool, such as Twnel, Manychat,
    UChat, or Landbot, or any tool that allows them to create tree-based workflows
    and is able to take pictures and call APIs.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 每个司机都可以使用会话自动化工具，例如Twnel、Manychat、UChat或Landbot，或任何允许他们创建基于树的流程并能拍照调用API的工具。
- en: 'The chatbot flow should be something like the following figure:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人流程应该类似于以下图示：
- en: '![Figure 5.4: Report Expenses flow](img/B21161_05_04.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图5.4：报告费用流程](img/B21161_05_04.jpg)'
- en: 'Figure 5.4: Report Expenses flow'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4：报告费用流程
- en: So, the user opens a flow in the conversational automation tool and selects
    **Report Expenses**. Then, the flow asks them to take a picture of a receipt.
    That image is processed by an OCR and then the unstructured text is sent to GPT-3.5
    Turbo for processing, which returns a JSON. Finally, the flow takes some values
    from the JSON and creates a new row on a Google Sheet (or another spreadsheet).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，用户在会话自动化工具中打开一个流程，并选择**报告费用**。然后，流程要求他们拍摄一张收据的照片。该图像经过OCR处理，然后将非结构化文本发送到GPT-3.5
    Turbo进行处理，它返回一个JSON。最后，流程从JSON中提取一些值，并在Google表格（或另一个电子表格）上创建一个新的行。
- en: 'Use Bard or Claude to create a JSON model of the typical receipt. You could
    upload an image of a typical invoice to Bard and type this prompt:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Bard或Claude创建典型收据的JSON模型。您可以将典型发票的图像上传到Bard，并输入以下提示：
- en: 'Prompt:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE7]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This sort of works, but at the time of this writing, the results were not very
    accurate. Instead of uploading the image, you can also provide a URL of the image.
    This should be better by the time the book is published.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法似乎可行，但在撰写本文时，结果并不非常准确。除了上传图像外，您还可以提供图像的URL。到本书出版时，这应该会更好。
- en: A better way is to use an LLM (such as GPT-3.5 Turbo, GPT-4, Bard, or Claude)
    to create a JSON model of the typical invoice. Feed the text generated by an OCR
    application that you call via an API.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的方法是使用LLM（如GPT-3.5 Turbo、GPT-4、Bard或Claude）创建典型发票的JSON模型。通过API调用的OCR应用程序生成的文本进行喂养。
- en: Alternatively, you could do OCR using many of the tools available on the internet,
    such as [https://ocr.space/](https://ocr.space/).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以使用互联网上许多可用的工具进行OCR，例如[https://ocr.space/](https://ocr.space/)。
- en: 'Suppose the invoices are similar to this one:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 假设发票与此类似：
- en: '![Figure 5.5: Example invoice](img/B21161_05_05.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图5.5：示例发票](img/B21161_05_05.jpg)'
- en: 'Figure 5.5: Example invoice'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.5：示例发票
- en: 'The text extracted from this invoice using OCR is as follows:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 使用OCR从这张发票中提取的文本如下：
- en: '*“||TOM GREEN HANDYMAN||5 Any Street. Any City, That Area Code||Telephone:
    0800 XXX XXX||Date:||6/5/2016||Invoice No||0003521||Tax Registered No||123466||Mr
    and Mrs Fielding||This Address||This City||This Area Code||TAX INVOICE||Quantity||Description||Upgrade
    to Bathroom||23.75 Labour||Nails and screws||Paint and Plywood||Imported wall
    tiles||Freight||Sub-contractor Tie-t||Unit Price||Cost||40.00||950.00||080||40.00||1000
    00||1000 00||14 00||560 00||150 00||228.00||Subtotal||2928 00||Total Due $3.367.20||Payment
    due by the 10th of the month following the date of invoice Please make payment
    into Bank Account No. 12 3456 789112 012||Interest of 10% per year will be charged
    on te paNDIS||Remittance||Mr and Mrs Fielding||TOM GREEN HANDYMAN||qS||Amount
    Que $3.367.20||Amount* *Paid||Learn More||”*'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '*“||TOM GREEN 手艺人||5 Any Street. Any City, That Area Code||电话：0800 XXX XXX||日期：||6/5/2016||发票号||0003521||税务登记号||123466||菲尔丁夫妇||此地址||此城市||此区号||税发票||数量||描述||升级浴室||23.75
    劳动||钉子和螺丝||油漆和胶合板||进口墙砖||运费||分包商Tie-t||单价||成本||40.00||950.00||080||40.00||1000
    00||1000 00||14 00||560 00||150 00||228.00||小计||2928 00||总计应付$3.367.20||发票日期后的下一个月的10日付款，请将款项存入银行账户12
    3456 789112 012||逾期付款将按年利率10%收取利息||汇款||菲尔丁夫妇||TOM GREEN 手艺人||qS||金额Que $3.367.20||金额*
    *已付||了解更多”*'
- en: 'Then, type this prompt (this works best using Claude 2 or Bard):'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，输入这个提示（在克劳德2或巴德中使用效果最好）：
- en: 'Prompt:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE8]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Here’s the response:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是响应：
- en: 'Response:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE9]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Both Claude 2 and Bard misunderstood the instructions. We can fix that by providing
    further instructions:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德2和B阿德都误解了指令。我们可以通过提供进一步的指令来修复这个问题：
- en: 'Prompt:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE10]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Here’s the response:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是响应：
- en: 'Response:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE11]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Now this is good. We can adjust it manually to leave only one item inside the
    `items` array and add the job name and the tax. Since the `items` element is an
    array, the LLM can deduce that it could have several objects of the type included
    in the model. Furthermore, `number` should include quotation marks: `"number"`.
    This is because `"number"` is a string that represents a variable of that type
    and is not a variable per se. The revised JSON model should look like this:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这是好的。我们可以手动调整它，只保留`items`数组中的一个项目，并添加工作名称和税。由于`items`元素是一个数组，LLM可以推断出它可能包含模型中包含的几种类型的对象。此外，`number`应该包含引号：“`number`”。这是因为“`number`”是一个表示该类型变量的字符串，而不是一个变量本身。修改后的JSON模型应该看起来像这样：
- en: '[PRE12]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Then, when you want to process another invoice, you should write something like
    the following prompt.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当你想要处理另一张发票时，你应该写一些像以下这样的提示。
- en: 'Prompt:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE13]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Here’s the response.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是响应。
- en: 'Response:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '![Figure 5.6: Screenshot of the response highlighting some errors](img/B21161_05_06.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图5.6：突出显示一些错误的响应截图](img/B21161_05_06.jpg)'
- en: 'Figure 5.6: Screenshot of the response highlighting some errors'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6：突出显示一些错误的响应截图
- en: It’s almost there. However, there are a couple of errors, marked inside the
    red rectangles, in the response image.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 它几乎完成了。然而，在响应图像中，有几个错误，用红色矩形标记。
- en: Fortunately, that’s an easy fix. In the prompt, you should provide, along with
    the JSON model, or even instead of it, a couple of examples showing the LLM what
    you expect to put where.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，这是一个简单的修复。在提示中，你应该提供，连同JSON模型，甚至可以不用它，一些示例来展示LLM你期望放置的位置。
- en: The new prompt should look like this.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 新的提示应该看起来像这样。
- en: 'Prompt:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE14]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Here’s the result:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果：
- en: 'Response:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE15]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Now it should work with similar invoices.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在它应该可以处理类似的发票。
- en: LLMs are very good at pattern matching. Therefore, this kind of application
    usually works very well. You just need to fine-tune your prompts until you get
    it right.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs在模式匹配方面非常出色。因此，这类应用通常工作得很好。你只需要微调你的提示，直到你得到正确的结果。
- en: When using this with GPT-3.5 Turbo or GPT-4 using the APIs, you always need
    to pass the training part to the call and add the last OCR text with the value
    returned from the OCR process. Test both GPT-3.5 Turbo and GPT-4\. If both render
    the same results, use GPT-3.5 Turbo, which is 20 times less expensive.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用GPT-3.5 Turbo或GPT-4的API时，你总是需要将训练部分传递给调用，并添加最后OCR文本与OCR过程返回的值。测试GPT-3.5 Turbo和GPT-4。如果两者渲染相同的结果，则使用GPT-3.5
    Turbo，它比GPT-4便宜20倍。
- en: If you have access to the Claude 2 API, you can test that one as well.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你可以访问克劳德2 API，你也可以测试它。
- en: We will revisit this case again in [*Chapter 8*](B21161_08.xhtml#_idTextAnchor121),
    exploring how to use this technique with a chatbot that can be used on the field
    by multiple people.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第8章*](B21161_08.xhtml#_idTextAnchor121)中再次回顾这个案例，探讨如何使用这项技术与多人现场使用的聊天机器人结合使用。
- en: Summary
  id: totrans-173
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: AI has revolutionized the field of prompt engineering by enabling various techniques,
    such as sentiment analysis, data classification, data cleaning, and pattern matching.
    These techniques have greatly enhanced the accuracy and efficiency of generating
    high-quality responses.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: AI通过启用各种技术，如情感分析、数据分类、数据清洗和模式匹配，已经彻底改变了提示工程领域。这些技术大大提高了生成高质量响应的准确性和效率。
- en: Sentiment analysis uses natural language processing to identify the emotional
    tone behind words and phrases. This allows us to automatically classify content
    as having positive, negative, or neutral sentiment.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析利用自然语言处理来识别词语和短语背后的情感基调。这使得我们能够自动将内容分类为具有积极、消极或中性情感。
- en: Data classification uses machine learning algorithms to categorize text into
    predefined groups or labels. This is useful for organizing unstructured data into
    meaningful categories.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分类使用机器学习算法将文本分类到预定义的组或标签中。这对于将非结构化数据组织成有意义的类别很有用。
- en: Data cleaning is an essential step in working with real-world data. AI techniques
    such as pattern matching can automatically find and fix issues such as misspellings,
    incorrect formatting, and duplicate entries. This cleans up data and makes it
    more usable for downstream analytics and machine learning models.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清洗是与现实世界数据打交道的一个基本步骤。AI技术，如模式匹配，可以自动查找和修复拼写错误、格式错误和重复条目等问题。这清理了数据，使其更适合下游分析和机器学习模型。
- en: Pattern matching, another powerful capability of AI, enables prompt models to
    recognize and interpret specific patterns or structures in user inputs and model
    outputs. This allows AI systems to generate responses that align with common patterns
    and expectations. By using pattern-matching techniques, developers can ensure
    that their AI assistants provide coherent and relevant responses, enhancing the
    overall user experience.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 模式匹配，AI的另一种强大能力，使提示模型能够识别和解释用户输入和模型输出中的特定模式或结构。这使得AI系统能够生成与常见模式和期望相符的响应。通过使用模式匹配技术，开发者可以确保他们的AI助手提供连贯且相关的响应，从而提升整体用户体验。
- en: Sentiment analysis, classification, cleaning, and information extraction can
    all be handled automatically by AI. This saves huge amounts of human time and
    effort, while also improving consistency. With the right techniques and training
    data, AI promises to unlock insights in text that would not be feasible to uncover
    manually.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析、分类、清洗和信息提取都可以由AI自动处理。这节省了大量的人力和时间，同时也提高了一致性。有了正确的技术和训练数据，AI有望揭示文本中的洞察，这些洞察手动挖掘是不切实际的。
- en: While this chapter explored AI techniques for extracting insights from unstructured
    text data, the next chapter shifts focus to applications of LLMs in education,
    legal fields, and other professional domains.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本章探讨了从非结构化文本数据中提取洞察的AI技术，但下一章将重点转向LLMs在教育、法律和其他专业领域的应用。
- en: 'Part 3: Advanced Use Cases for Different Industries'
  id: totrans-181
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分：不同行业的先进用例
- en: As large language models such as GPT-4, Claude, and Bard advance rapidly, new
    opportunities emerge to apply these powerful AI tools across diverse industries
    and domains. *Part 3* of this book explores innovative use cases and prompt engineering
    techniques to customize **large language models** (**LLMs**) for specialized needs.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GPT-4、Claude和Bard等大型语言模型迅速发展，出现了将这些强大的AI工具应用于不同行业和领域的新机遇。本书的*第三部分*探讨了创新用例和提示工程技术，以针对特定需求定制**大型语言模型**（**LLMs**）。
- en: We begin by examining applications in key fields such as education and law.
    Educators can utilize LLMs to rapidly generate customized curriculum materials
    tailored to learning objectives. Legal professionals can leverage AI to streamline
    research, review documents, draft contracts, and enrich training.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先考察了教育、法律等关键领域的应用。教育工作者可以利用LLMs快速生成针对学习目标的定制课程材料。法律专业人士可以利用AI简化研究、审阅文件、起草合同和丰富培训。
- en: For software engineers, coding assistants promise to automate monotonous programming
    while augmenting human creativity. We walk through sample projects developing
    websites and browser extensions with AI support.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 对于软件工程师来说，编码助手承诺可以自动化单调的编程工作，同时增强人类的创造力。我们通过一些示例项目展示了在人工智能支持下开发网站和浏览器扩展。
- en: Conversational interfaces also stand to benefit tremendously from integration
    with LLMs. Chatbots powered by tools such as GPT-4 and Claude enable more natural,
    coherent dialogues and complex workflow automation simply through text-based conversation.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式界面通过与LLMs的集成也能获得巨大的好处。由GPT-4和Claude等工具驱动的聊天机器人，能够通过基于文本的对话实现更自然、连贯的对话和复杂的流程自动化。
- en: Finally, we uncover techniques to optimize and scale LLM prompting through integrations
    with existing infrastructure. Whether using no-code automation platforms, custom
    developer libraries such as LangChain, or sharing prompt templates, integrating
    AI unlocks new efficiencies.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们揭示了通过现有基础设施的集成来优化和扩展LLMs提示技术的技巧。无论是使用无代码自动化平台、自定义开发者库如LangChain，还是共享提示模板，集成AI解锁了新的效率。
- en: Across these diverse applied contexts, the overarching theme is leveraging AI
    as a multipurpose productivity engine. Through thoughtful prompt engineering,
    we can customize LLMs to enhance specialized workflows rather than replace human
    expertise.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些多样化的应用场景中，总体主题是利用AI作为多用途的生产力引擎。通过精心设计的提示工程，我们可以定制LLMs来增强专门的流程，而不是取代人类的专业知识。
