- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Software Engineering and Architecture
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 软件工程与架构
- en: AI-enabled software represents a significant leap in system complexity. Unlike
    traditional software that follows deterministic rules, AI-enabled software attempts
    to mimic human decision-making, reasoning, and goal-seeking through heuristic
    algorithmic means. In doing so, creating multidimensional complexity and, hence,
    a non-deterministic system. There are different types of challenges to address
    than traditional software engineering.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: AI赋能的软件在系统复杂性方面实现了重大飞跃。与遵循确定性规则的传统软件不同，AI赋能的软件试图通过启发式算法手段模仿人类的决策、推理和目标寻求。在这个过程中，创造了多维复杂性，因此是一个非确定性系统。与传统软件工程相比，需要解决不同类型的问题。
- en: This complexity manifests in various ways, from the integration of specialized
    machine learning components to the need for robust data pipelines, from handling
    model uncertainty to ensuring appropriate human oversight. Consider the sobering
    statistic from Gartner that, through 2022, 85% of AI projects delivered erroneous
    outcomes due to bias in data, algorithms, or the teams responsible for managing
    them [1]. This highlights the critical importance of robust architecture in AI
    system development.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这种复杂性以各种方式表现出来，从集成专门的机器学习组件到需要强大的数据处理管道，从处理模型不确定性到确保适当的人类监督。考虑来自Gartner的令人警醒的统计数据，到2022年，由于数据、算法或负责管理它们的团队中的偏差，85%的AI项目交付了错误的结果[1]。这突出了在AI系统开发中稳健架构的至关重要的意义。
- en: To comprehend the scale of complexity we’re discussing, consider that the Linux
    operating system had over 30.34 million lines of source code as of 2021 (www.kernel.org).
    Linux powers millions of computers, from mission-critical systems to hobby kits,
    and was built by thousands of engineers working in self-organized groups over
    several decades. That such a complex system functions reliably is a modern marvel,
    made possible through a stable and modular architecture that frames system development.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解我们讨论的复杂性的规模，考虑一下，截至2021年，Linux操作系统有超过30.34百万行源代码（www.kernel.org）。Linux驱动着数百万台计算机，从关键任务系统到爱好套件，由数千名工程师在几十年的时间里通过自我组织的团队构建。这样一个复杂的系统能够可靠地运行，是现代奇迹，这得益于稳定的模块化架构，它为系统开发提供了框架。
- en: ”Complexity is the business we are in, and complexity is what limits us.”
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “复杂性是我们从事的业务，也是限制我们的因素。”
- en: ''
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Frederick Brooks, The Mythical Man-Month
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 弗雷德里克·布鲁克斯，《人月神话》
- en: 'Architecture in software shares common elements with other engineering domains
    such as civil, aerospace, and medical, though each field implements different
    models, patterns, and decompositions. The core goal remains consistent: ensuring
    the correct system is built. For complex software, especially AI-enabled systems,
    a disciplined architectural approach is essential to simplify the problem space
    and scope technical solutions through abstraction and modeling.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 软件架构与其他工程领域（如土木、航空航天和医疗）共享一些共同元素，尽管每个领域实施不同的模型、模式和分解。核心目标保持一致：确保构建正确的系统。对于复杂的软件，尤其是AI赋能的系统，采用严格的架构方法对于简化问题空间和通过抽象和建模范围技术解决方案至关重要。
- en: In this chapter, we’ll explore how software becomes complex in AI systems, outline
    architecting processes and documentation that mitigate these complexities, and
    examine the role of architects in project management to ensure successful project
    completion.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨软件在AI系统中变得复杂的原因，概述减轻这些复杂性的架构过程和文档，并检查架构师在项目管理中的作用，以确保项目成功完成。
- en: Understanding software complexity in AI systems
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解AI系统中的软件复杂性
- en: Several distinct but interdependent types of software complexity exist in AI-enabled
    systems. Architecture serves as a tool to manage this complexity through modeling,
    which helps the architecture team reason about the system and provides a foundation
    for detailed specifications and team communication.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI赋能系统中存在几种不同但相互依赖的软件复杂性类型。架构作为工具，通过建模来管理这种复杂性，帮助架构团队对系统进行推理，并为详细规范和团队沟通提供基础。
- en: '![](img/B19300_03_01.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B19300_03_01.png)'
- en: 'Figure 3.1: Software development lifecycle for AI systems'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1：AI系统的软件开发生命周期
- en: As shown in *Figure 3.1*, the development process for AI systems follows a structured
    lifecycle that begins with conceptual development, then moves through requirements
    gathering and architecture development before proceeding to design and development.
    After development, the process continues with integration, unit testing, system
    testing, and finally deployment. This systematic approach helps manage the inherent
    complexities of AI systems by ensuring that architectural considerations are addressed
    early in the development process. An excellent resource for learning about systems
    methodology can be found in the *INCOSE Systems Engineering Handbook* [5]. The
    authors posit that this sort of cycle can be applied to different development
    methodologies, be it a waterfall development or Agile methodology.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如*图3.1*所示，人工智能系统的开发过程遵循一个结构化的生命周期，始于概念开发，然后通过需求收集和架构开发，接着进入设计和开发阶段。开发完成后，流程继续进行集成、单元测试、系统测试，最后部署。这种系统方法通过确保在开发早期就解决架构考虑因素，有助于管理人工智能系统固有的复杂性。关于系统方法的优秀资源可以在*INCOSE系统工程手册*
    [5]中找到。作者认为，这种循环可以应用于不同的开发方法，无论是瀑布式开发还是敏捷方法。
- en: Integration complexity
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成复杂性
- en: Software integration becomes particularly challenging when development teams
    must incorporate code bases they didn’t create or don’t control. This spans multiple
    layers of the software stack, from operating system kernels to application frameworks.
    These different software packages have varying dependencies on libraries, operating
    systems, versions, and programming languages.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当开发团队必须整合他们没有创建或不受控制的代码库时，软件集成变得特别具有挑战性。这跨越了软件堆栈的多个层次，从操作系统内核到应用框架。这些不同的软件包对库、操作系统、版本和编程语言的依赖性各不相同。
- en: For AI-enabled systems, it’s economically advantageous to leverage open source
    or commercial packages for core algorithms rather than building functionality
    from scratch. We see this in the widespread adoption of frameworks such as TensorFlow,
    PyTorch, and scikit-learn, which provide ready-made implementations of complex
    machine learning algorithms. Consequently, the rest of the software architecture
    often needs to adapt to accommodate these components.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有人工智能功能的系统，利用开源或商业软件包中的核心算法比从头开始构建功能在经济上更有优势。我们可以在TensorFlow、PyTorch和scikit-learn等框架的广泛应用中看到这一点，它们提供了复杂机器学习算法的现成实现。因此，软件架构的其余部分通常需要适应以容纳这些组件。
- en: 'Case study: healthcare AI integration'
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究：医疗保健人工智能集成
- en: A healthcare provider implementing a diagnostic assistance system faced significant
    integration challenges when incorporating a pre-trained deep learning model for
    medical image analysis. The model, built with TensorFlow, required specific versions
    of supporting libraries that conflicted with the hospital’s existing Java-based
    infrastructure. The architecture team solved this by implementing a microservice
    architecture with containerized components, allowing the AI system to operate
    in an isolated environment while communicating with existing systems through well-defined
    APIs. This said, there also exists the complexity of API management. This includes
    working with updated or revised APIs. This then forces the version control and
    compatibility of APIs based on the evolution of models or the application itself.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一家实施诊断辅助系统的医疗保健提供商在整合用于医学图像分析的预训练深度学习模型时面临了重大的集成挑战。该模型使用TensorFlow构建，需要特定版本的支撑库，这与医院现有的基于Java的基础设施相冲突。架构团队通过实施一个带有容器化组件的微服务架构来解决这个问题，使人工智能系统能够在隔离环境中运行，同时通过定义良好的API与现有系统进行通信。然而，也存在API管理的复杂性。这包括处理更新或修订的API。这迫使API的版本控制和兼容性基于模型或应用的演变。
- en: Functional complexity
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 功能复杂性
- en: The need for autonomous decision-making or inference introduces significant
    functional complexity. The decision process must be executed correctly for the
    system to fulfill its objectives. This requires implementing robust checks through
    monitoring, alerts, and alarms, as human oversight isn’t always available to ensure
    decision correctness.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 自主决策或推理的需求引入了显著的功能复杂性。决策过程必须正确执行，以便系统能够实现其目标。这需要通过监控、警报和警报来实现稳健的检查，因为人类监督并不总是可用以确保决策的正确性。
- en: AI technologies also introduce requirements for model re-training and deployment
    when models become incorrect or outdated. Alert systems and break points must
    be implemented to allow human override when the system operates incorrectly. Additionally,
    extensive logging is necessary to enable checking, alerting, and diagnostic functionality.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型变得不正确或过时时，AI技术还引入了模型重新训练和部署的要求。必须实施警报系统和断点，以便在系统运行不正确时允许人工干预。此外，广泛的日志记录对于实现检查、警报和诊断功能是必要的。
- en: Privacy concerns and management of large volumes of log data become particularly
    important in AI systems that involve sensitive data, such as those in healthcare,
    finance, or government applications. A well-architected system must include mechanisms
    for data anonymization, secure storage, and controlled access to logs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在涉及敏感数据的人工智能系统中，如医疗保健、金融或政府应用，隐私问题和大量日志数据的管理变得尤为重要。一个良好的架构系统必须包括数据匿名化、安全存储和对日志的受控访问机制。
- en: Technical complexity
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术复杂性
- en: AI algorithms place tremendous demands on underlying hardware. The computational
    complexity of algorithms, data preprocessing needs, and performance margins add
    complexity to hardware deployment decisions. As an example, training a large language
    model such as GPT-3 required approximately 3.14 x 10^(23) FLOPS of compute [2],
    highlighting the extreme computational demands of modern AI systems.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: AI算法对底层硬件提出了巨大的需求。算法的计算复杂性、数据预处理需求以及性能边际增加了硬件部署决策的复杂性。例如，训练大型语言模型如GPT-3大约需要3.14
    x 10^(23) FLOPS的计算能力[2]，突显了现代人工智能系统的极端计算需求。
- en: Timeliness requirements for query and data processing introduce additional challenges.
    In real-time applications such as autonomous vehicles or financial trading systems,
    AI components must deliver decisions within strict time constraints, requiring
    careful optimization of the entire processing pipeline.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 查询和数据处理的及时性要求引入了额外的挑战。在实时应用中，如自动驾驶汽车或金融交易系统，AI组件必须在严格的时间约束内做出决策，这要求对整个处理管道进行仔细优化。
- en: Processing pipelines require careful consideration of volatile memory and data
    storage needs. For instance, a computer vision system processing high-resolution
    images might generate terabytes of intermediate data that must be efficiently
    managed. Additionally, cybersecurity requirements add another layer of complexity
    through monitoring, encryption, and logging needs.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 处理管道需要仔细考虑易失性内存和数据存储需求。例如，处理高分辨率图像的计算机视觉系统可能会生成数以千计的中间数据，这些数据必须被高效地管理。此外，网络安全要求通过监控、加密和日志记录需求增加了另一层复杂性。
- en: Scalability becomes a critical concern as AI systems move from development to
    production. The architecture must account for increasing data volumes, user loads,
    and computational demands, often requiring distributed computing approaches and
    cloud-based infrastructure.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统从开发阶段过渡到生产阶段，可扩展性成为一个关键关注点。架构必须考虑到数据量、用户负载和计算需求的增加，通常需要分布式计算方法和基于云的基础设施。
- en: Verification complexity
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 验证复杂性
- en: Ensuring the correct implementation of algorithms and test cases presents unique
    challenges in AI systems. Unlike traditional software, where outputs are deterministic,
    AI systems produce probabilistic results that can vary based on training data,
    initialization parameters, and even random factors introduced during training.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 确保算法和测试用例的正确实现是人工智能系统中的独特挑战。与传统的软件不同，其输出是确定性的，AI系统产生基于训练数据、初始化参数以及训练过程中引入的随机因素的概率性结果。
- en: For AI components, understanding and defining nominal or unexpected data inputs
    is essential to demonstrate system robustness. This involves testing with adversarial
    examples, edge cases, and out-of-distribution data to ensure the system behaves
    appropriately even when faced with unfamiliar inputs.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AI组件，理解和定义正常或意外的数据输入对于证明系统鲁棒性至关重要。这涉及到使用对抗性示例、边缘情况和分布外数据来测试，以确保系统在面对不熟悉的输入时也能适当行为。
- en: While unit testing is valuable, integration testing often reveals failures that
    unit tests miss. A subtler verification challenge involves ensuring all logic
    paths and potential execution paths are adequately tested, which becomes exponentially
    more difficult in AI systems with complex decision boundaries.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然单元测试很有价值，但集成测试往往能揭示单元测试中遗漏的失败。一个更微妙的验证挑战在于确保所有逻辑路径和潜在的执行路径都得到了充分的测试，这在具有复杂决策边界的AI系统中变得指数级困难。
- en: 'Example: verification in computer vision'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：计算机视觉中的验证
- en: Consider a pedestrian detection system for autonomous vehicles. Unit tests might
    verify that the model correctly identifies pedestrians in a test dataset with
    high accuracy. However, integration testing might reveal that the system fails
    when camera inputs are affected by adverse weather conditions or unusual lighting.
    Even more concerning, adversarial testing might show that specific patterns on
    clothing could cause the system to miss detecting pedestrians entirely. Robust
    verification must account for all these scenarios.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑自动驾驶汽车的行人检测系统。单元测试可能验证模型在测试数据集中以高精度正确识别行人的能力。然而，集成测试可能会揭示，当摄像头输入受到恶劣天气条件或异常照明的影响时，系统会失败。更令人担忧的是，对抗性测试可能会显示特定图案的衣物可能导致系统完全错过检测行人。稳健的验证必须考虑到所有这些场景。
- en: Human interface complexity
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人机界面复杂性
- en: The roles and interactions between users and AI functionality must be clearly
    understood. This defines how information, warnings, alerts, and alarms will be
    activated, presented, and acted upon within the overall system.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 用户与AI功能之间的角色和交互必须清晰理解。这定义了信息、警告、警报和警报将在整个系统中如何激活、呈现和执行。
- en: The concept of levels of automation, as developed by Parasuraman et al. [3],
    provides a framework for understanding the division of responsibilities between
    human users and automated systems. Even highly autonomous AI systems require human
    configuration, oversight, and intervention capabilities.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化层次的概念，由Parasuraman等人[3]提出，为理解人类用户与自动化系统之间责任划分提供了一个框架。即使是高度自主的AI系统，也需要人类进行配置、监督和干预能力。
- en: If conflicts arise between user commands and AI system recommendations, the
    system must have clear protocols for adjudication. Similarly, the approach for
    user involvement in AI learning frameworks for model updates or improvements must
    be well-defined.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户命令与AI系统推荐之间出现冲突，系统必须具有明确的裁决协议。同样，用户在AI学习框架中参与模型更新或改进的方法也必须明确定义。
- en: Explainability is a critical aspect of human interface design in AI systems.
    Users need to understand why an AI system made a particular recommendation or
    decision, especially in high-stakes domains such as healthcare, finance, and legal
    applications. This requires thoughtful design of explanation mechanisms that bridge
    the gap between complex mathematical models and human understanding.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释性是AI系统中人机界面设计的关键方面。用户需要了解为什么AI系统做出了特定的推荐或决策，尤其是在高风险领域，如医疗保健、金融和法律应用。这需要精心设计解释机制，以弥合复杂数学模型与人类理解之间的差距。
- en: Architecting in practice
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实践中的架构
- en: Complex software systems are rarely built from scratch, and architects typically
    don’t have complete command of all relevant technologies or domain expertise.
    This necessitates an architecting function distributed across a small team that
    typically includes the key roles called out in *Figure 3.2*.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的软件系统很少是从零开始构建的，架构师通常并不完全掌握所有相关的技术或领域专业知识。这需要将架构功能分散到一个小团队中，该团队通常包括*图3.2*中提到的关键角色。
