  zh: '![](img/2.png)**下一代Packt Reader**以及本书的**免费PDF/ePub副本**包含在您的购买中。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细核对显示的版本，以确保您获得正确的版本。'
- en: '![](img/Unlock1.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: 'As illustrated in *Figure 3.2*’s organizational structure, AI project teams
    typically have the Project Manager at the top, with three key roles reporting
    directly to them: the Chief Architect, Specialty Engineers such as data engineers,
    data scientists, user interface developers, full stack developers, DevOps engineers,
    security engineers, operations analysts, compliance analysts, and project control
    analysts. This structure ensures that architectural concerns are given proper
    weight in project decisions, with the Chief Architect playing a crucial role in
    translating business requirements into technical specifications. Some key roles
    are outlined here:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如*图3.2*的组织结构所示，AI项目团队通常由项目经理位于顶层，直接向他们汇报三个关键角色：首席架构师、专业工程师，如数据工程师、数据科学家、用户界面开发者、全栈开发者、DevOps工程师、安全工程师、运营分析师、合规分析师和项目控制分析师。这种结构确保了在项目决策中给予架构问题适当的重视，首席架构师在将业务需求转化为技术规范中扮演着关键角色。以下是一些关键角色的概述：
- en: '**Vision Holder**: This role focuses on the end customer’s needs and communicates
    the vision through technical documentation, presentations, diagrams, and working-level
    meetings. For AI systems, this role must understand both business objectives and
    the capabilities and limitations of AI technologies.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景持有者**：这个角色专注于最终客户的需求，并通过技术文档、演示、图表和工作层面的会议传达愿景。对于AI系统，这个角色必须理解业务目标和AI技术的功能和限制。'
- en: '**Technology Expert**: This role provides a specific understanding of the major
    components needed in the software system, including database technologies, middleware,
    user interface design, computational requirements, networking, and storage needs.
    In AI systems, this expertise extends to machine learning frameworks, model deployment
    technologies, and data management systems.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术专家**：这个角色提供对软件系统中所需主要组件的特定理解，包括数据库技术、中间件、用户界面设计、计算需求、网络和存储需求。在AI系统中，这种专业知识扩展到机器学习框架、模型部署技术和数据管理系统。'
- en: '**AI Engineer**: This role understands the data science or analytics process
    to ensure AI components meet the architectural vision and operate within technology
    constraints while delivering value to the end customer. This includes knowledge
    of machine learning algorithms, data preparation techniques, and model evaluation
    metrics.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI工程师**：这个角色理解数据科学或分析过程，以确保AI组件符合架构愿景，在技术约束范围内运行，并向最终客户提供价值。这包括对机器学习算法、数据准备技术和模型评估指标的了解。'
- en: The domain knowledge and AI/ML engineering roles should be tightly coupled since
    the ultimate goal is for AI/ML technology to deliver unique value to end customers.
    These functions come together to document and communicate the system vision.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 领域知识和AI/ML工程角色应该紧密耦合，因为最终目标是让AI/ML技术为最终客户提供独特的价值。这些功能共同来记录和传达系统愿景。
- en: A general rule of thumb from the systems engineering community is that architecting
    types of efforts should consume approximately 12–15% of project resources [5].
    While this might seem unproductive initially, this up-front work saves time and
    prevents major technical errors later in the project, particularly in AI systems
    where architectural decisions can have far-reaching implications for system performance,
    maintainability, and scalability.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 系统工程社区的一个普遍规则是，架构设计类型的努力应消耗大约12-15%的项目资源[5]。虽然这最初可能看起来不具生产力，但这种前期工作可以节省时间并防止项目后期出现重大技术错误，尤其是在AI系统中，架构决策可能对系统性能、可维护性和可扩展性产生深远的影响。
- en: Approaches for taming software complexity
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 软件复杂性控制方法
- en: The most visible artifacts from the architecting process are interrelated documents
    that guide system development. These include concept of operations documents,
    use cases, activity diagrams, logical diagrams, non-functional requirements specifications,
    metrics definitions, and the identification of software development tactics and
    patterns.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 架构过程最明显的成果是与系统开发相关的相互关联的文档。这些包括操作概念文档、用例、活动图、逻辑图、非功能性需求规范、指标定义以及识别软件开发策略和模式。
- en: Developing the architecture
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建架构
- en: Even the smallest projects should develop a **Concept of Operations** (**CONOPS**)
    document that justifies the AI-enabled system and explains how users will interact
    with it. The CONOPS document should describe how users will utilize the AI aspects
    of the system, how AI will be presented to customers, and how customers can impact
    AI decisions or outputs.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是最小的项目也应该开发一个**操作概念**（**CONOPS**）文件，以证明AI系统的合理性并解释用户如何与之交互。CONOPS文件应描述用户如何利用系统的AI方面，AI将如何向客户展示，以及客户如何影响AI决策或输出。
- en: This document will also identify the major actors involved with the system and
    how AI/ML components will interact with them, if at all. The CONOPS document should
    delineate other systems that the AI system will interface with and how it fits
    into the larger system of systems. A recommended standard is the IEEE standard
    1362-1998, “IEEE Guide for Information Technology –– System Definition –– **Concept
    of Operations** (**ConOps**) document.”
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 本文件还将确定与系统相关的关键参与者以及AI/ML组件如何与他们交互（如果有的话）。CONOPS文件应界定AI系统将与之接口的其他系统以及它如何适应更大的系统体系。推荐的标准是IEEE标准1362-1998，“信息技术——系统定义——**操作概念**（**ConOps**）文件指南。”
- en: Another set of key artifacts developed by the architect is the description of
    the system through diagrams from the **Unified Modeling Language** (**UML**) or
    **System Modeling Language** (**SysML**). Not all UML or SML diagrams need to
    be developed.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 架构师开发的一组关键工件是通过**统一建模语言**（**UML**）或**系统建模语言**（**SysML**）的图表来描述系统。并非所有UML或SML图表都需要开发。
- en: 'The most common diagrams include the following:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的图表包括以下内容：
- en: '**UML use case diagrams**: Identify actors, roles, and actions that create
    value'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**UML用例图**：识别参与者、角色和创造价值的动作'
- en: '**SysML block definition diagrams**: Capture the major logical components of
    the system'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**SysML块定义图**：捕捉系统的主要逻辑组件'
- en: '**SysML activity diagrams**: Show general flow of control'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**SysML活动图**：显示控制流的一般流程'
- en: '**UML state transition diagrams**: Capture system states and transitions'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**UML状态转换图**：捕捉系统状态和转换'
- en: '**SysML interface control documents**: Define data exchanges between components'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**SysML接口控制文档**：定义组件之间的数据交换'
- en: '**IDEF0 diagrams**: Show inputs, objectives, constraints, and outputs of AI/ML
    decisions'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**IDEF0图**：显示AI/ML决策的输入、目标、约束和输出'
- en: These diagrams must capture the full cycle of AI/ML functionality, capturing
    decision-making processes. These diagrams should capture major logic decisions,
    error-handling approaches, model maintenance, validation, and re-training processes.
    Additionally, diagrams should show human interactions and control of the overall
    system. They should highlight key data engineering aspects, including data cleansing,
    transformation, and quality checks.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这些图表必须捕捉AI/ML功能的完整周期，包括决策过程。这些图表应捕捉主要逻辑决策、错误处理方法、模型维护、验证和再训练过程。此外，图表应显示人类交互和对整个系统的控制。它们应突出关键数据工程方面，包括数据清洗、转换和质量检查。
- en: The data exchange interface is particularly critical for AI systems, defining
    how data exchange will be executed, including quality checks, volume, rates, and
    formats. This interface management and service-level agreements for data exchanges
    are part of data engineering, ensuring the system can be scalable, resilient,
    and perform within computational constraints. In the following chapters, more
    details and examples of these diagrams are presented.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 数据交换接口对于AI系统尤其关键，它定义了数据交换的执行方式，包括质量检查、数量、速率和格式。此接口管理和数据交换的服务级别协议是数据工程的一部分，确保系统可扩展、有弹性和在计算约束内运行。在接下来的章节中，将提供更多关于这些图表的细节和示例。
- en: 'As described by Bass et al. [4], software architecture is driven by non-functional
    requirements levied on the system. Examples include reliability, scalability,
    and usability. For AI/ML systems, common non-functional requirements include the
    following:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如Bass等人[4]所述，软件架构是由施加在系统上的非功能性需求驱动的。例如，可靠性、可扩展性和可用性。对于AI/ML系统，常见的非功能性需求包括以下内容：
- en: '**Reliability**: How the system handles failures and maintains operation'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可靠性**：系统如何处理故障并保持运行'
- en: '**Explainability**: How the system explains its decisions and recommendations'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可解释性**：系统如何解释其决策和建议'
- en: '**Fairness**: How the system ensures equitable treatment across user groups'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**公平性**：系统如何确保对用户群体进行公平对待'
- en: '**Privacy**: How the system protects sensitive data'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**隐私性**：系统如何保护敏感数据'
- en: '**Adaptability**: How the system evolves as data patterns change'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**适应性**：系统如何随着数据模式的变化而发展'
- en: Understanding and defining these requirements for AI/ML components is essential
    for successful system development.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和定义AI/ML组件的这些需求对于成功开发系统至关重要。
- en: Integration and cohesion
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成与协同
- en: Complex AI/ML software systems require team development, demanding robust integration
    approaches established before integration activities begin. The architecture team
    doesn’t need complete implementation details, but must guide the process effectively.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的AI/ML软件系统需要团队开发，在集成活动开始之前，需要建立稳健的集成方法。架构团队不需要完整的实现细节，但必须有效地指导过程。
- en: 'Four main integration activities are as follows:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 四个主要的集成活动如下：
- en: '**Design adequacy assessment**: Determining whether the design meets functional
    and non-functional requirements'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设计充分性评估**：确定设计是否满足功能和非功能需求'
- en: '**Non-functional requirements evaluation**: Assessing how well the system satisfies
    quality attributes'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**非功能性需求评估**：评估系统满足质量属性的程度'
- en: '**Metrics measurement**: Initial determination of key system performance indicators'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**度量测量**：关键系统性能指标的初步确定'
- en: '**Interface verification**: Ensuring interfaces are correctly implemented and
    used'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**接口验证**：确保接口正确实施和使用'
- en: The architect must understand how different system components and data engineering
    impact the overall system. Integration issues inevitably arise, and the architect
    must carefully evaluate the impact of requirement changes across the system.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 架构师必须了解不同的系统组件和数据工程如何影响整体系统。集成问题不可避免地会出现，架构师必须仔细评估系统范围内需求变更的影响。
- en: For example, a seemingly simple change in a database query response time could
    cause an AI component to receive out-of-sync data, leading to incorrect decisions.
    The architect must identify and address such dependencies early in the development
    process.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，数据库查询响应时间的一个看似简单的变化可能导致AI组件接收不同步的数据，从而导致决策错误。架构师必须在开发早期阶段识别并解决这些依赖关系。
- en: Integration typically is the first time non-functional requirements are tested.
    Addressing architectural-level issues early in the development lifecycle is critical.
    Late-stage architectural changes can have significant cascading effects on the
    system. Integration also provides the first opportunity to measure key system
    metrics and test interfaces between components. There exist several mechanisms
    and processes that help address integration challenges. The use of DevOps **continuous
    integration/continuous deployment** (**CI/CD**) techniques allows for the testing
    of new code in an automated way. This automation has steps set up where pre-defined
    integration testing happens as new code is developed and merged into the configured
    pre-production system baseline. The use of DevOps also allows for change management
    to identify areas of the baseline that were changed and are causing integration
    errors. Another advantage of a DevOps process is the rollback of a baseline in
    the event of an issue or undesired behavior from a production release.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 集成通常是首次测试非功能性需求。在开发生命周期早期解决架构级问题至关重要。后期架构变更可能对系统产生重大级联效应。集成还提供了首次测量关键系统指标和测试组件之间接口的机会。存在几种机制和流程有助于解决集成挑战。使用DevOps
    **持续集成/持续部署**（**CI/CD**）技术可以自动测试新代码。这种自动化设置了步骤，在新代码开发和合并到配置的预生产系统基线时，预先定义的集成测试就会发生。DevOps的使用还允许进行变更管理，以识别导致集成错误的基线更改区域。DevOps流程的另一个优点是在出现问题或生产发布中的不期望行为时，可以回滚基线。
- en: Project management
  id: totrans-85
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目管理
- en: 'The architect plays a crucial role in project management, though they shouldn’t
    be the project manager due to other responsibilities. The architect contributes
    to the five major project management activities defined by the Program Management
    Institute in the Program Management Book of Knowledge:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管由于其他职责，架构师不应担任项目经理，但在项目管理中，架构师发挥着至关重要的作用。架构师为项目管理研究所定义的《项目管理知识体系指南》中规定的五大主要项目管理活动做出贡献：
- en: Project initiation
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目启动
- en: The architect helps develop key documents, including objectives, statement of
    work, work breakdown structure, schedule, and other project management documents.
    They clarify work scope, define milestones, and identify necessary resources,
    including staff type, level of effort, and supporting materials. Depending on
    the size of the project or the engineering culture of the organization, a system
    engineering team may exist. If this team is present, they work closely with the
    architect, identifying key features and work planning—for example, in an Agile
    development methodology, they aid in the creation of epics and user stories.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 架构师帮助制定关键文档，包括目标、工作说明书、工作分解结构、进度表以及其他项目管理文档。他们明确工作范围，定义里程碑，并确定必要的资源，包括人员类型、努力程度和支持材料。根据项目规模或组织的工程文化，可能存在系统工程团队。如果这个团队存在，他们将与架构师紧密合作，确定关键特性和工作规划——例如，在敏捷开发方法中，他们帮助创建史诗和用户故事。
- en: The architect also provides input on project execution methodology, such as
    Agile or spiral approaches.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 架构师还会对项目执行方法提供意见，例如敏捷或螺旋方法。
- en: '![](img/B19300_03_03.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_03_03.png)'
- en: 'Figure 3.3: Kanban board for Agile AI development'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3：敏捷人工智能开发的看板
- en: 'For AI projects, an Agile methodology such as Kanban (shown in *Figure 3.3*)
    often works well, allowing for a continuous flow of tasks and software development
    as models are refined and improved through iteration. The Kanban board visualizes
    work in three columns: *TO DO* for tasks that haven’t been started, *DOING* for
    tasks currently in progress, and *DONE* for completed tasks. There are other methods
    of organizing a Kanban board, with more stages. The authors chose to highlight
    the most basic type of board. Tasks can occur over a single or several execution
    cycles. In Agile, this is called a “sprint.”'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能项目，像看板（如图3.3所示）这样的敏捷方法通常效果很好，允许在模型通过迭代不断优化和改进时，持续流动的任务和软件开发。看板将工作可视化在三个列中：*待办*（TO
    DO）表示尚未开始的任务，*进行中*（DOING）表示当前正在进行的任务，*完成*（DONE）表示已完成的任务。看板板的组织方法还有其他方式，有更多阶段。作者选择突出最基本类型的看板。任务可能发生在单个或多个执行周期中。在敏捷中，这被称为“冲刺”。
- en: 'Example activities to meet the criteria of “Done” in a sprint are as follows:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 满足冲刺中“完成”标准的示例活动如下：
- en: There has been a code review
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 已经进行了代码审查
- en: Unit testing has been conducted
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 已经进行了单元测试
- en: The new code has been run through the CI/CD pipelines
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 新代码已经通过CI/CD管道运行
- en: Human acceptance testing
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工验收测试
- en: An important note is that a feature may require several tasks over a longer
    period to be considered “Done.” The use of documentation and guidance from the
    architect aids in tracking and validation that a multi-sprint task is considered
    “Done.”
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的一点是，一个功能可能需要跨越较长时间完成多个任务才能被认为是“完成”。使用文档和来自架构师的指导有助于跟踪和验证一个跨多个迭代的任务是“完成”的。
- en: This visual management tool helps teams track progress and identify bottlenecks
    in the development process, which is particularly valuable for AI projects where
    tasks may have varying levels of complexity and uncertainty.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这个视觉管理工具帮助团队跟踪进度并识别开发过程中的瓶颈，这对于人工智能项目尤其有价值，因为任务可能具有不同复杂性和不确定性水平。
- en: Project planning
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目规划
- en: During planning, the architect identifies major milestones and technical evidence
    requirements for milestone completion. They help determine team composition, effort
    allocation, and financial planning. The architect establishes reporting requirements
    and configuration control strategies for the architecture team.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在规划阶段，架构师会确定主要里程碑和里程碑完成所需的技术证据要求。他们帮助确定团队构成、努力分配和财务规划。架构师为架构团队建立报告要求和配置控制策略。
- en: For AI systems, planning must account for the iterative nature of model development,
    the uncertainty in algorithmic performance, and the need for continuous data collection
    and quality assurance.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能系统，规划必须考虑到模型开发的迭代性、算法性能的不确定性以及持续数据收集和质量保证的需要。
- en: '![](img/B19300_03_04.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_03_04.png)'
- en: 'Figure 3.4: Critical path analysis for AI system development'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.4：人工智能系统开发的临界路径分析
- en: This planning process often involves critical path analysis, as depicted in
    *Figure 3.4*, which shows how different activities and dependencies affect the
    overall project timeline. In this network diagram, nodes represent project milestones
    (numbered 10 through 80), while edges represent activities (labeled A through
    I) with their associated durations (t=1 mo to t=4 mo). The critical path analysis
    helps project managers and architects identify which activities must be completed
    on time to prevent project delays, as well as which activities have slack time
    that can be utilized if resources need to be reallocated.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 此规划过程通常涉及关键路径分析，如图3.4所示，它展示了不同的活动和依赖关系如何影响整体项目时间表。在这个网络图中，节点代表项目里程碑（编号10至80），而边代表活动（标记为A至I）及其相关持续时间（t=1个月至t=4个月）。关键路径分析帮助项目经理和建筑师确定哪些活动必须按时完成以防止项目延误，以及哪些活动具有可利用的松弛时间，如果需要重新分配资源。
- en: Project execution
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目执行
- en: In execution, the architect oversees work items allocated to their team and
    supports other engineering teams by providing insights and clarifications. They
    help the project manager track overall project execution and ensure integration
    activities will produce a coherent system.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行过程中，建筑师监督分配给其团队的工作项，并通过提供见解和澄清支持其他工程团队。他们帮助项目经理跟踪整体项目执行，并确保集成活动将产生一个连贯的系统。
- en: The architect serves as a key resource for resolving technical conflicts, clarifying
    requirements, and ensuring design decisions align with the overall vision. This
    role becomes particularly important in AI systems where trade-offs between model
    accuracy, computational efficiency, and explainability must be carefully balanced.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 建筑师作为解决技术冲突、明确需求和确保设计决策与整体愿景一致的关键资源。在人工智能系统中，模型精度、计算效率和可解释性之间的权衡必须仔细平衡，这一角色变得尤为重要。
- en: Monitoring and control
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控与控制
- en: For monitoring and control, the architect provides quality checks and reviews
    of engineering efforts, giving the project manager updates on schedule and resource
    utilization. The architect helps interpret technical progress and identify potential
    risks before they impact project outcomes.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对于监控与控制，建筑师提供对工程努力的质控和审查，向项目经理更新进度和资源利用情况。建筑师帮助解释技术进展并识别潜在风险，以防止其对项目结果产生影响。
- en: In AI projects, monitoring extends to tracking model performance metrics, data
    quality, and drift detection to ensure the system continues to meet requirements
    as it operates in the real world.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能项目中，监控扩展到跟踪模型性能指标、数据质量和漂移检测，以确保系统在现实世界中的运行过程中继续满足要求。
- en: Project closing
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目收尾
- en: In the closing phase, the architect ensures testing and certification are complete,
    advocating for the customer during final system validation. They work with the
    project manager on system deployment and delivery, providing the key artifacts
    required by the contract and statement of work.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在收尾阶段，建筑师确保测试和认证完成，在最终系统验证期间代表客户。他们与项目经理合作进行系统部署和交付，提供合同和工作说明书所需的关键工件。
- en: For AI systems, closing activities might include knowledge transfer of model
    maintenance procedures, handover of monitoring tools, and documentation of future
    improvement opportunities.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能系统，关闭活动可能包括模型维护流程的知识转移、监控工具的移交以及记录未来改进机会的文档。
- en: 'Case study: AI project management in action'
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究：人工智能项目管理的实际应用
- en: A financial services company implementing a fraud detection system using machine
    learning faced significant project management challenges. The initial project
    plan, based on traditional waterfall software development approaches, failed to
    account for the iterative nature of model development and the complexity of integrating
    with existing transaction processing systems.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 一家实施机器学习欺诈检测系统的金融服务公司面临重大的项目管理挑战。基于传统瀑布软件开发方法的初始项目计划未能考虑到模型开发的迭代性质以及与现有交易处理系统集成复杂性。
- en: The architecture team restructured the project using an Agile methodology around
    three-week sprints, with each sprint focusing on improving specific aspects of
    model performance while gradually expanding integration points. A key point of
    Agile methodology advocates the development of features in an iterative manner
    to get quick and impactful feedback from stakeholders. Also, by getting working
    code delivered sooner, the system could be tested and validated in a quicker manner,
    reducing total development time. They implemented early integration testing using
    synthetic data, allowing parallel development of both model components and system
    interfaces. This approach enabled them to identify and address integration issues
    early, ultimately delivering a system that reduced fraud losses by 37% while meeting
    all compliance requirements.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 架构团队使用围绕三周冲刺的敏捷方法重构了项目，每个冲刺都专注于提高模型性能的特定方面，同时逐渐扩展集成点。敏捷方法的一个关键点是倡导以迭代的方式开发功能，以便从利益相关者那里获得快速而有力的反馈。此外，通过更早地交付可工作的代码，系统可以更快地进行测试和验证，从而减少总开发时间。他们使用合成数据进行早期集成测试，允许模型组件和系统接口的并行开发。这种方法使他们能够及早识别和解决集成问题，最终交付的系统通过37%的欺诈损失减少同时满足所有合规要求。
- en: 'The authors do not intend to advocate for just an Agile methodology. Advantages
    of waterfall mechanisms are: robust requirements elicitation is done, and project
    control is more closely tracked through schedule definition and oversight of resources.
    Also, usually, time is allocated for robust documentation. Disadvantages of Agile
    methods are: a major function or interface is not accounted for, and Agile methods
    can lose architectural coherence. This happens when too much parallel development
    enables the execution of conflicting major design decisions. That said, we think
    that Agile methods with architecting aspects as described in this text are more
    effective in developing complex AI systems.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 作者并不打算仅仅提倡敏捷方法。瀑布机制的优点是：进行了稳健的需求收集，并且通过定义进度表和资源监督，项目控制更加紧密。此外，通常还会分配时间进行稳健的文档。敏捷方法的缺点是：没有考虑到主要功能或接口，敏捷方法可能会失去架构一致性。这发生在过多的并行开发使得执行冲突的主要设计决策时。尽管如此，我们认为，如本文所述的具有架构方面的敏捷方法在开发复杂AI系统方面更为有效。
- en: Summary
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed how algorithmic decision-making in AI systems
    introduces unique forms of software complexity. We identified several dimensions
    of this complexity—integration, functional, technical, verification, and human
    interfaces—and explained how architecting processes and documentation applied
    early in the development project can help manage these challenges.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了AI系统中算法决策引入的独特形式的软件复杂性。我们确定了这种复杂性的几个维度——集成、功能、技术、验证和人类界面——并解释了在开发项目早期应用架构流程和文档如何帮助管理这些挑战。
- en: AI-enabled systems are not merely traditional software with an AI component
    bolted on; they represent a fundamentally different class of system that requires
    thoughtful architecture to achieve their potential. The role of the architect
    in these systems extends beyond technical design to include project management,
    stakeholder communication, and ensuring that the final system delivers the intended
    value.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: AI赋能的系统不仅仅是传统软件加上一个AI组件；它们代表了一种本质上不同的系统类别，需要深思熟虑的架构来实现其潜力。在这些系统中，架构师的角色不仅限于技术设计，还包括项目管理、利益相关者沟通以及确保最终系统交付预期的价值。
- en: As we progress through this book, we’ll build on these foundational concepts
    to explore specific AI techniques, implementation examples, and detailed architecting
    processes and development artifacts. These tools will equip you to successfully
    navigate the complexities of AI system development and create robust, valuable
    solutions that effectively leverage AI capabilities.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们继续阅读这本书，我们将基于这些基础概念来探讨特定的AI技术、实现示例以及详细的架构流程和开发工件。这些工具将使你能够成功导航AI系统开发的复杂性，并创建出利用AI能力有效的强大、有价值的解决方案。
- en: It is the position of the authors that architecting is best learned by doing.
    As one conducts more architecting tasks and projects, one can hone their skills.
    The following are some exercises that are done on different types of systems and
    will aid in the development of architecting skills.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 作者认为，通过实践学习架构是最好的。随着进行更多的架构任务和项目，一个人可以磨练他们的技能。以下是一些在不同类型的系统上进行的练习，这些练习将有助于架构技能的发展。
- en: Exercises
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 练习
- en: Identify several component and process architecture products for an AI/ML system.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为AI/ML系统识别几个组件和流程架构产品。
- en: Research and identify how CONOPS and requirements documents are used and integrated.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究并确定CONOPS和需求文档的使用和集成方式。
- en: Identify the major components of a complex website—such as Amazon, Google Maps,
    Zillow, or other systems where many components need to be integrated.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别复杂网站的主要组成部分——例如亚马逊（Amazon）、谷歌地图（Google Maps）、Zillow或其他需要集成许多组件的系统。
