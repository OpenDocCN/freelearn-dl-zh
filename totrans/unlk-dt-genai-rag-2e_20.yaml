- en: '17'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: RAG-Based Agentic Memory in Code
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Having explored the theoretical foundations of agentic memory in [*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381),
    we’ll now turn to its practical implementation. This chapter presents three focused
    code labs that demonstrate how to build memory-enabled agents using the **Cognitive
    Architectures for Language Agents** (**CoALA**) framework. We’ll implement working,
    episodic, semantic, and procedural memory systems that allow agents to maintain
    context, recall past experiences, and accumulate knowledge over time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what we’ll cover in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Code lab 17.1** – setting up the initial agent'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code lab 17.2** – coding episodic memory components'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code lab 17.3** – coding semantic memory components'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each code lab builds upon the previous one, gradually constructing a sophisticated
    memory system. We’ll start with a minimal RAG agent foundation, then systematically
    add episodic memory for conversation recall and semantic memory for knowledge
    extraction. By the end of this chapter, you’ll have a working agent that can remember
    past interactions and build a persistent knowledge base, which are essential capabilities
    for creating truly intelligent AI systems. Let’s begin by setting up our base
    agent architecture, which will serve as the foundation for all memory enhancements.
  prefs: []
  type: TYPE_NORMAL
