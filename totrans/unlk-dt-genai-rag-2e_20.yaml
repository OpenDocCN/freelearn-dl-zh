  prefs: []
  type: TYPE_NORMAL
- en: That concludes this semantic memory code lab. However, before we finish, just
    like we did for the episodic memory code lab, let’s talk about how this would
    be applied in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Real-world application – educational tutor
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The semantic memory system we just built is perfect for educational applications.
    A tutoring agent can extract and store facts about a student’s knowledge gaps
    (struggles with quadratic equations), learning preferences (prefers visual explanations),
    and progress milestones (mastered derivatives on March 15). Over time, the tutor
    builds a comprehensive knowledge graph of each student, enabling truly personalized
    instruction that adapts to their unique learning journey.
  prefs: []
  type: TYPE_NORMAL
- en: This example focuses on semantic memories, but what about a combination of both
    episodic and semantic memory?
  prefs: []
  type: TYPE_NORMAL
- en: Real-world application – personal assistant
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The combination of episodic and semantic memory creates a powerful personal
    assistant. Consider how it learns over time: When you mention *“I’m meeting with
    Sarah from marketing about the Q3 budget,”* it stores both the episodic memory
    (the conversation about this meeting) and semantic facts (Sarah works in marketing;
    there’s a Q3 budget discussion planned). Later, when you ask, *“What do I need
    to prepare for Sarah?”* the assistant combines episodic recall of previous Sarah-related
    discussions with semantic knowledge about her role and your upcoming meeting.
    This creates an assistant that truly understands your work context and relationships,
    becoming more valuable with every interaction.'
  prefs: []
  type: TYPE_NORMAL
- en: With both episodic and semantic memory functioning, our agent can now maintain
    conversation history and build a knowledge base.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Through these three code labs, we’ve transformed a simple stateless agent into
    a sophisticated memory-enabled system capable of maintaining context across conversations
    and accumulating knowledge over time. Our implementation of episodic memory allows
    the agent to store and retrieve entire conversation episodes, providing temporal
    context and continuity that make interactions feel more natural and personalized.
    The semantic memory system extracts factual knowledge from conversations, building
    a persistent knowledge base that grows with each interaction. Together, these
    memory components create an agent that not only responds to queries but genuinely
    learns from experience.
  prefs: []
  type: TYPE_NORMAL
- en: The modular approach we’ve taken in building each memory type as a separate
    component demonstrates the flexibility of the CoALA framework. By using ChromaDB
    for vector storage and LangGraph for workflow orchestration, we’ve created a scalable
    architecture that can handle increasing amounts of memory data while maintaining
    fast retrieval times. The separation of episodic and semantic memory mirrors cognitive
    science principles, where different types of information are processed and stored
    through distinct mechanisms, each optimized for its specific purpose.
  prefs: []
  type: TYPE_NORMAL
- en: What makes this implementation particularly powerful is how the different memory
    types work together. When a user asks a question, the agent can simultaneously
    retrieve relevant past conversations through episodic memory and access stored
    facts through semantic memory, combining both sources to generate informed, contextual
    responses. This multi-modal memory approach enables the agent to handle complex
    scenarios such as remembering user preferences across sessions, tracking the evolution
    of topics over time, and building comprehensive user profiles that improve with
    each interaction.
  prefs: []
  type: TYPE_NORMAL
- en: While we’ve successfully implemented episodic and semantic memory, there’s one
    crucial memory type we haven’t yet addressed–procedural memory. It is the ability
    to remember and execute learned sequences of actions. In [*Chapter 18*](B34736_18_ePub.xhtml#_idTextAnchor447),
    we’ll explore how LangMem, a specialized memory management framework, can help
    us implement procedural memory that allows agents to learn and refine complex
    multi-step processes. This final memory component will complete our CoALA-based
    agent, creating a fully functional system that can not only remember facts and
