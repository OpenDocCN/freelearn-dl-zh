- en: '9'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Working with Transitions and Animations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: By now, you have learned about the visuals you can create and multimedia elements
    you can use to create better presentations. If you started creating a new presentation
    or modifying an existing one while reading the previous chapters, now is the time
    to learn how to create a better visual flow during delivery. Using transitions
    and animations will make complex topics easier to comprehend.
  prefs: []
  type: TYPE_NORMAL
- en: I should add that you will learn how to create purposeful movement. We won’t
    be making content move around and fly across the screen for the sake of it! The
    goal is to tell a better story and make the content memorable for the audience.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will discuss the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Using slide transitions wisely
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging the Morph transition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using advanced animation sequences
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using triggers for on-demand animations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Most of the topics discussed in this chapter don’t require having an **M365
    subscription** , as the tools and features have been introduced in previous versions
    of PowerPoint. I will identify when a feature is in M365 or newer versions only.
    Also, be aware that since the subscription version of PowerPoint is updated on
    an ongoing basis, it is possible that some features don’t appear exactly the same
    in your version of the application.
  prefs: []
  type: TYPE_NORMAL
- en: Using slide transitions wisely
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using slide transitions can help you create a movement that helps the audience
    follow along. The important thing to remember is avoiding the use of a transition
    just because you can, and to use it because it adds value to your content. In
    regular business settings, you can use just a few of the available transitions
    and your presentations will always look professional. Let’s start by discussing
    how transitions work in the next section .
  prefs: []
  type: TYPE_NORMAL
- en: Understanding transition basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To access t he transitions gallery, you simply need to click on the **Transitions**
    tab ( **1** ). In the **Transition to This Slide** group ( **2** ), click on the
    **More** button ( **3** ) to open the transitions gallery ( **4** ) ( *Figure
    9.1* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.1 – PowerPoint’s slide transition gallery](img/B32063_09_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.1 – PowerPoint’s slide transition gallery
  prefs: []
  type: TYPE_NORMAL
- en: 'You have many transitions available, and they are sorted into three categories
    **: Subtle** , **Exciting** , and **Dynamic Content** . Whether you feel overwhelmed
    or excited about all the choices, let me start by saying that you could create
    all your presentations with no transition or a simple **Fade** for the rest of
    your business life, and no one would complain. That said, here is a list of transitions
    that can be useful and when to use them:'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Subtle** ( **5** ) category, I have picked out the ones I feel are
    most suited to business presentations:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**None** : As mentioned previously, having no transition won’t be distracting.
    It is the default when you create a new presentation file.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Morph** : This transition can be so useful that it will be covered all by
    itself later in this chapter. If you are using a PowerPoint version older than
    2019, you won’t have access to this transition. Take note that after October 2025,
    Office 2016 and 2019 will no longer be supported by Microsoft.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fade** : A transition that softly transforms one slide to the next, giving
    a cue that the content is changing. This one is my personal favorite for all my
    slides.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Push** : Depending on the direction we give it and how the slide is created,
    it can help you create the illusion of moving forward.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Wipe** : Also depending on the direction and the way we create the content,
    it can help create the illusion that the new content is wiping over the existing
    content.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the **Exciting** ( **6** ) category, here are two personal comments:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I woul d avoid this category in most regular business contexts because these
    transitions can be very distracting.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Have I ever used any of these transitions before? Yes. In self-running presentations
    for trade shows where viewers need something that will catch the eye. For example,
    I could use a specific one every time the content moves to a new section. The
    idea is to avoid creating an expectation for new cool transitions. We want to
    let the viewer know we are changing to a new topic.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the **Dynamic Content** ( **7** ) category, let’s define what it does, and
    which one is the most useful:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s first define what dynamic content means. When using one of the transitions
    in this category, anything in the background of the slide will not move during
    the transition. This is applicable if you have filled the background of your slides
    with a picture or any graphic element that is added to the slide master.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pan** : This is the only dynamic transition I have used in a regular business
    setting, helping me create a forward movement for a timeline before the **Morph**
    transition became available. For regular business presentations, all the others
    are more distracting than the added value of using dynamic content. But if you
    ever have to produce slideshows of photos or content that will become a video
    clip, do consider testing these transitions.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If you ha ve not used slide transitions much, the important thing to remember
    is that the effect is applied when we move to that slide during a slidesho w.
  prefs: []
  type: TYPE_NORMAL
- en: Viewing slide transitions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There a re tools within **Normal view** to help you preview the transition
    and adjust various options, such as effects and timings ( *Figure 9.2* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.2 – Slide transition options and timings](img/B32063_09_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.2 – Slide transition options and timings
  prefs: []
  type: TYPE_NORMAL
- en: You can preview a slide transition you just applied either by clicking on the
    **Preview** button in the ribbon ( **1** ) or the *star icon* beside the slide
    thumbnail ( **2** ) next to slide 55 in the previous example.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Depending on the slide transition you have selected, you will have access to
    various options in **Effect Options** ( **3** ). In the previous example, the
    **Wipe** transition ( **4** ) has an effect called **From Right** ( **5** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Try it yourself**'
  prefs: []
  type: TYPE_NORMAL
- en: The best w ay to get familiar with effect options is to apply different transitions
    to a slide and view the list to test each option. If you have not used transitions
    much in the past, you should take some time now to try them. You can either use
    an existing presentation or just create a few slides in a new file, then add different
    transitions to each slide. Finally, explore the **Effect Options** list available
    for each transition you selec t.
  prefs: []
  type: TYPE_NORMAL
- en: Adjusting the Timing options
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Still in the **Transitions** tab, the **Timing** group ( **1** ) has a few
    settings that can be changed ( *Figure 9.3* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.3 – In the Transitions tab, the Timing group settings can be adjusted](img/B32063_09_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.3 – In the Transitions tab, the Timing group settings can be adjusted
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to add **Sound** ( **2** ) during a transition. Since we are
    discussing how to make business presentations more impactful, you should avoid
    this option to stay professional unless you have a special presentation need.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Duration** setting ( **3** ) is the number of seconds the slide transition
    takes to change the slide. Usually, the default is good for most presentations,
    but you can experiment with longer or shorter durations if you want to create
    a specific mood. In our example, a fade transition was applied, and it has a duration
    of 01,00 seconds.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Apply To All** setting ( **4** ) allows you to apply the selected transition
    to all your slides in one click. As an example, you could select a simple fade
    transition, adjust any other option in the **Timing** group, and then apply it
    to all the slides in your presentation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a subgroup in the **Timing** group named **Advance Slide** ( **5**
    ). By default, the check box for **On Mouse Click** is checked, meaning that during
    a slideshow, you advance slides by clicking the mouse or using keyboard navigation
    keys. If you are not familiar with which keyboard keys can be used duri ng presentation
    delivery, they will be discussed in [*Chapter 12*](Chapter_12.xhtml#_idTextAnchor1228)
    .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you uncheck the **On Mouse Click** check box, it will allow you to remove
    the possibility to navigate with the mouse or keyboard when the presentation is
    in slideshow mode. The only way to navigate the slides then requires built-in
    navigation elements with hyperlinks. This is useful when creating a self-running
    presentation, such as for at a kiosk. If you are not familiar with hyperlinks
    in PowerPoint, they will be discussed in [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor1003)
    .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The last setting in the **Advance Slide** subgroup is the **After** checkbox
    ( **6** ). Checking this option allows you to select a duration for the display
    of a slide before PowerPoint automatically transitions to the next one. The format
    is `minutes: seconds, tenths of seconds` ( **00:00,00** ). This option can be
    used when you want to create a self-running presentation, or simply because you
    want a slide displayed for a short period of time and not to have to click to
    get to the next one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that you have a better understanding of how slide transitions work, let’s
    have a closer look at the **Morph** transition in the next secti on.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging the Morph transition
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When Micros oft introduced the **Morph** transition, it was an amazing game-changer
    for presentation creators! It was finally possible to create real movement *during
    a transition* to another slide without having to spend hours tweaking animation
    effects or using automatic transitions. In short, **Morph** allows you to smoothly
    move objects from one slide to another.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see the steps to help you create your first **Morph** transition with
    the help of *Figure 9 .4* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.4 – Creating a movement effect with the Morph transition](img/B32063_09_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.4 – Creating a movement effect with the Morph transition
  prefs: []
  type: TYPE_NORMAL
- en: Create a slide similar to slide **49** in *Figure 9.4* , using four squares
    of different colors. Then duplicate the slide – using *Ctrl* + *D* ( **1** ) on
    your keyboard. This step is essential to make the transition work because PowerPoint
    needs to have the same object names to calculate where the shapes start and where
    they finish. You can also copy and paste objects from one slide to the other,
    but duplicating the slide has the advantage of not having to select all the objects
    to copy and paste them – it’s all done in one efficient keyboard shortcut.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the newly duplicated slide (slide **50** ), move the squares, make them smaller,
    and change their color ( **2** ) to a color different from the ones you chose
    previously.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply the **Morph** transition to the second slide ( **3** ) and use the **Preview**
    button to see what it looks like.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The default duration for **Morph** is 2 seconds ( **4** ). This allows the four
    shapes to smoothly move to their new position while being reduced and having their
    color changed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can only applaud the great engineering wizardry responsible for the calculations
    and rendering of this transition! The previous example was done with basic shapes,
    but **Morph** has quite a few more tricks in reserve. First, let’s see how to
    use **Morph** effect options in the next sect ion.
  prefs: []
  type: TYPE_NORMAL
- en: Using Morph effect options
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We saw how easy it was to apply the **Morph** transition to a duplicated slide.
    What we have not seen is that this transition also has **Effect Options** ( **1**
    ), which can be changed depending on the results we want to achieve ( *Figure
    9 .5* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.5 – Using Effect Options for Morph](img/B32063_09_05.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.5 – Using Effect Options for Morph
  prefs: []
  type: TYPE_NORMAL
- en: The default option is **Objects** ( **2** ) when you first apply the **Morph**
    transition to a slide. This means that any object on the slide can be moved, resized,
    or recolored. When using a textbox or a shape with text, the whole object is moved
    with no effect on the text itself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When using the **Words** option ( **3** ), any changes you make to text from
    the initial s lide to the duplicated slide will rearrange the words themselves.
    As an example, you could have a sentence from which you remove and add words.
    The **Morph** transition will show the words disappearing, moving, and appearing
    in their final place. For example: Try typing `Live to work` in one textbox. Then,
    duplicate the slide and change the text in the textbox to `Work to live` . Add
    the **Morph** transition with the **Words** option.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The **Characters** option ( **4** ) works in a similar way to the previous
    one, except that letters will move to recreate the final state. Microsoft refers
    to it as *creating an anagram effect* , which is a great name to trigger the creative
    use of words on your slides. For example: Try typing `Live` in one textbox. Then,
    duplicate the slide and change the text in the textbox to `Love` . Add the **Morph**
    transition with the **Words** option.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once again, you can adjust the duration of the transition to create the effect
    you want. Just keep in mind that if you make the duration very short, the movement
    might be too intense, even creating dizziness for some people.
  prefs: []
  type: TYPE_NORMAL
- en: To create seamless text effects, whether you are using placeholders, textboxes,
    or shapes with text, don’t forget to change **Effect Options** . Shapes, images,
    videos, and SmartArt objects will morph nicely, changing in size, shape, or color.
    As for charts, the object can be resized and series colors changed, but you cannot
    morph the chart type.
  prefs: []
  type: TYPE_NORMAL
- en: If you have not tried the **Morph** transition yet, I suggest that you take
    some time to test it on your own. Let’s move on to how you can leverage the **Morph**
    transition to help you move on a time line.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a moving timeline with Morph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For years, I wished I could make timelines bigger and easily move forward seamlessly
    fr om one slide to the next. It was not impossible, but we had to think it through
    and sometimes use dynamic content transitions to help. With the **Morph** transition,
    things are much simpler.
  prefs: []
  type: TYPE_NORMAL
- en: 'I have created a timeline example to show you how to do it ( *Figure 9.6* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.6 – Creating a moving timeline with Morph](img/B32063_09_06.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.6 – Creating a moving timeline with Morph
  prefs: []
  type: TYPE_NORMAL
- en: In case you have not noticed yet, Microsoft offers more than just presentation
    templates when you go to **File | New** . For this example, just use the `timeline`
    keyword in the search box. You can then choose one that you like to follow along
    with this example. All timelines are usually created to fit on a slide. If the
    template you chose has the timeline on the slide master, first cut it and paste
    it on a slide. Then make sure to duplicate the slide content so the timeline will
    extend out of the canvas/slide into the gray area.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how you can replicate this effect with a timeline:'
  prefs: []
  type: TYPE_NORMAL
- en: Make sure you have the whole timeline on a slide ( **1** ). Make it as big as
    needed to make sure your text is easy to read. Expand it outside the right side
    of the slide as much as needed. Then duplicate your slide with *Ctrl* + *D* .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Move your timeline to the left so you get the remaining content on the second
    slide in its final position ( **2** ). To help you see the whole timeline, you
    can zoom out of the slide – a quick shortcut is using *Ctrl* + mouse wheel.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply the **Morph** transition to the slide ( **3** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next time you need a timeline, there is no reason to try to fit everything on
    one slide. Make it as big as possible and use **Morph** . When you keep the same
    title, your audience will only see the seamless movement of the timeline. It can
    be used more than once if your timeline or process is very long. Just start the
    process again from the last slide and move your objects a second time. I have
    also used this trick to show a very long web page, giving my audience the illusion
    that I was scrolling from top to bottom.
  prefs: []
  type: TYPE_NORMAL
- en: '**Morph** can also be very useful to create a zooming effect, which is the
    topic of the next s ection.'
  prefs: []
  type: TYPE_NORMAL
- en: Creating movement and a zooming effect with Morph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the steps to get to the **Morph** transition were already described in
    previous section s, here we will focus on the canvas a nd slide thumbnails to
    create a zooming effect with an image. I suggest that you try the steps in PowerPoint
    as you are reading.
  prefs: []
  type: TYPE_NORMAL
- en: The example I chose to create includes an image of a road and three road signs.
    The **Morph** transition will be used to create the illusion that we are driving
    on the road and see three signs as we move forward. The creative content was found
    in **Stock Images** .
  prefs: []
  type: TYPE_NORMAL
- en: Creating the first slide
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Start by inserting your image into a slide, making sure it is the same size
    as the slide. If **Designer** gives you a design idea of an image filling the
    slide, use it. In *Figure 9.7* , you have the various components required to create
    the zoomin g effect:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.7 – Creating the first slide for a Morph zooming effect with an
    image](img/B32063_09_07.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.7 – Creating the first slide for a Morph zooming effect with an image
  prefs: []
  type: TYPE_NORMAL
- en: Search in **Icons** for a road sign like the one used in the example ( **1 in**
    *Figure 9.7* ) . Instead of keeping the original black color, you can change it
    to a light gray and use a bevel effect, so it mimics real road sign structures.
    I added a white rectangle so the text would be visible over the image.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To add a bevel effect to an icon you first need to right-click it after insertion
    and select the Convert to Shape option.
  prefs: []
  type: TYPE_NORMAL
- en: Or, you can use Copilot’s chat pane to create your sign ( **2** ) and add a
    textbox over it. In my example, I added two and grouped the textboxes with the
    image.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you have a Copilot license or have a free Microsoft account with **Designer**
    , you can try creating your road sign. You can use a prompt such as `Create a
    road sign where the post is metal gray and has a rectangular white space where
    I can overlay content` as a starting point. Then ask it to refine the image according
    to your needs. Asking to remove the background will give you options without busy
    backgrounds, but it won’t make the backgrounds transparent. If the contrast is
    good, you can try using the **Remove Background** tool in PowerPoint or copy the
    image and paste it in Windows Paint – it now has a free Copilot feature to remove
    the background image that gives surprisingly good results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Using shapes with text when we have to resize objects for perspective has one
    big disadvantage: the text will not resize. Therefore, the best thing to do is
    to copy and paste the road sign and textbox ( *Ctrl* + *C* , and *Ctrl* + *V*
    ) and use **Paste Options** ( **3** ) to convert the objects into one picture
    ( **4** ). *Note* : don’t forget to change the text for each road sign before
    creating images!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After repeating the previous step to create three road signs with their own
    text, it becomes easier to place the images over the road picture ( **5** ) and
    resize them ( **6** ) to create the perspective we need.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make sure to add a rectangle with no fill over the slide ( **7** ) so you can
    easily see its borders in the next step.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that the first slide has been created, we can move on to the creation of
    the zooming effect with **Morph** .
  prefs: []
  type: TYPE_NORMAL
- en: Creating the zooming effect with the second and third s lides
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After creating the first slide, we can st art creating the movement and zooming
    effect with the **Morph** transition. As seen previously, the quickest way is
    to duplicate the slide with *Ctrl* + *D* ( **1** ) ( *Figure 9.8* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.8 – Creating the movement and zooming effect with Morph](img/B32063_09_08.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.8 – Creating the movement and zooming effect with Morph
  prefs: []
  type: TYPE_NORMAL
- en: On your second slide, you now need to increase the size of your picture ( **2**
    ), so it overflows the slide area. Even if you can see the borders of the slide
    when resizing the picture, having a rectangle with no fill ( **3** ) becomes a
    great guide to help you move and resize your objects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can move your first road sign diagonally out of the slide area ( **4** )
    to create the illusion of driving past it. Move and resize the two other signs
    ( **5** ) so they seem to be growing as you move toward them. Apply the **Morph**
    transition to the slide ( **6** ). The **Objects** effect option is applied by
    default.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the previous step to create the third slide ( **7** ), making sure that
    when you look at the slide thumbnail, your road is still aligned with the previous
    slide. You might have to move your road picture upward to make the movement more
    realistic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you need to create a fast-paced animation, you can change **Duration** for
    the **Morph** transition in the **Timing** group ( **8** ). The default is `2,00`
    seconds, good for most needs. Just test and adapt for the effect you want to create.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Preview your work and make any changes that would improve the movement or zooming
    effect. When you are satisfied, make sure to remove the rectangle with no fill
    so you don’t see a slide border while in slideshow mode.
  prefs: []
  type: TYPE_NORMAL
- en: You can adapt this example for many business scenarios, such as showing a big
    plan that you move through while zooming in and out. The only limit is your creativity.
    Next time you have a hard time fitting all your information on one slide, and
    you need to show some sort of navigation between the elements while taking a closer
    look, consider trying this **Morph** transition trick.
  prefs: []
  type: TYPE_NORMAL
- en: I cannot write about **Morph** without discussing the exciting feature it has
    of allowing us to morph one object into another – the topic of our next section.
  prefs: []
  type: TYPE_NORMAL
- en: Morphing an object into another using the !! naming sc heme
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Microsoft has built in the ability for **Morph** to make various objects transform
    into other ones. At the time this book was written, here are the types of objects
    that can be transformed:'
  prefs: []
  type: TYPE_NORMAL
- en: Converting a shape to another one, such as a square becoming a circle.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Converting the same shape that includes different text from one slide to the
    other.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Morphing two different images.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Morphing between any two similar objects, such as one table into another table,
    or a SmartArt object into another SmartArt object. It does not work for charts,
    although you can resize and recolor the series.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To take control over how your objects can morph, a !! naming scheme was introduced.
    Since we are talking about the names of slide objects, you might recall that we
    discussed the **Selection Pane** feature in [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    . We will use it now to bring the **Morph** transition to a whole new level.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We will create a simple slide with a rectangle and an oval that will morph
    into a smaller triangle and a larger pentago n ( *Figure 9.9* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.9 – Using the naming scheme to morph shapes](img/B32063_09_09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.9 – Using the naming scheme to morph shapes
  prefs: []
  type: TYPE_NORMAL
- en: After creating the two slides, open the **Selection** pane ( **1** ). The easiest
    way is by selecting a shape ( **2** ) and clicking on the **Selection Pane** button
    ( **3** ) of the **Shape Format** tab. Unless you added it to the **Quick Access
    Toolbar** .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click twice on the name field of a shape ( **4** ), start by typing two exclamation
    points ( `!!` ), and then give it a name such as `Morph1` ( **5** ). Whatever
    name you use, keep it short and relevant because we need to use it again on the
    next slide.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On the next slide, we need to rename objects with the same naming scheme as
    the previous slide, so the **Morph** transition does its magic ( *Figure 9.10*
    ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.10 – Using the naming scheme on the second slide to morph objects](img/B32063_09_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.10 – Using the naming scheme on the second slide to morph objects
  prefs: []
  type: TYPE_NORMAL
- en: In my example, the triangle was renamed `!!Morph1` so it transforms from the
    rectangle shape, and the pentagon was renamed `!!Morph2` so it transforms from
    the oval ( **1** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you are done, apply the **Morph** transition ( **2** ) to the slide, and
    feel free to use one of the effect options ( **3** ) to create the effect you
    want with the letters. Preview your work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The only way to make the feature work is to make sure you start the name of
    an object with `!!` and make sure the name is the same for the two objects you
    want to morph. Also, make sure your naming scheme is unique on a slide. For example,
    you cannot have two objects named `!!Shape` on the same slide – this is why I
    usually name objects `Morph1` , `Morph2` , and so on, making it easy to see which
    objects are used with **Morph** directly in the **Selection** pane.
  prefs: []
  type: TYPE_NORMAL
- en: There are other elements to consider when working with custom shapes, or with
    versions of PowerPoint that support the `!!` naming scheme. You should have a
    look at Microsoft’s support article mentioned in *Further reading* for more details.
  prefs: []
  type: TYPE_NORMAL
- en: As exciting as the **Morph** transition can be, it might not be suited to every
    animation motion need you might have in a presentation. This is when learning
    about advanced animation sequences might be helpful, which is the topic of ou
    r next section.
  prefs: []
  type: TYPE_NORMAL
- en: Using advanced animation sequences
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Even though the goal of this section is to discuss more advanced animations,
    let’s start with a short review of the **Animations** tab ( **1** ) ( *Figure
    9.11* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.11 – Review of the Animations tab](img/B32063_09_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.11 – Review of the Animations tab
  prefs: []
  type: TYPE_NORMAL
- en: If animation styles are grayed out in the **Animations** tab, make sure to select
    an object on your slide to make them available.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we saw for **Transitions** in the first section of this chapter, you can
    preview animations on a slide by using the **Preview** button ( **2** in *Figure
    9.11* ) on the ribbon or by clicking on the *star icon* beside a slide thumbnail.
    Clicking on the **More** arrow ( **3** ) opens the animation gallery, where you
    will find four categories of animations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Entrance** ( **4** ): This applies an effect that causes an object to appear
    on the slide'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Emphasis** ( **5** ): This applies an effect to an object already on the
    slide'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Exit** ( **6** ): This applies an effect that causes the object to disappear
    from the slide'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Motion Paths** ( **7** ): This moves an object already on the slide'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the bottom of the list, you will find links to the complete list of effects
    and paths when you click on one of the links. After you have applied an animation
    to an object, you can also configure how the effect will play by changing it using
    the **Effect Options** button ( **8** ); the effects available will depend on
    the animation you have chosen, just like the effects for slide transitions.
  prefs: []
  type: TYPE_NORMAL
- en: 'I have one big word of caution regarding animations: just because there is
    a long list of effects doesn’t mean you should use them all on one slide. Any
    animation should bring value in terms of understanding your content or helping
    you describe a complex process, one step at a time, while you are talking. You
    should always animate with intention.'
  prefs: []
  type: TYPE_NORMAL
- en: Just as we mentioned about using transitions wisely, you could probably create
    all your business presentations with no animation or simple fades and wipes for
    the rest of your career. No one will complain if you have done a good job at creating
    content that conveys one idea per slide.
  prefs: []
  type: TYPE_NORMAL
- en: That being said, there are times when using animations is a wise choice to help
    our audience understand our concepts and ideas better. Let’s see how we can combine
    animations and use the **Animation Pane** option in t he next section.
  prefs: []
  type: TYPE_NORMAL
- en: Reviewing animation basics with the Animation Pane option
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We previously discussed how **Selection Pane** could help you view and rename
    all slide objects – **Animation Pane** has a similar function, but for all animations
    on a slide. To introduce more complex animations and learn how to work with the
    **Animatio n Pane** ( **1** ), let’s start with a simple **SmartArt** object (
    **2** ) to which a **Fade** entrance animation ( **3** ) was adde d ( *Figure
    9.12* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.12 – SmartArt animated with a Fade entrance in Animation Pane](img/B32063_09_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.12 – SmartArt animated with a Fade entrance in Animation Pane
  prefs: []
  type: TYPE_NORMAL
- en: The effect option selected is **One by One** ( **4** ), and in the animation
    pane, the small **Click to expand/hide contents** arrow ( **5** ) has been clicked
    to expand the list of animations applied to the SmartArt object. Using the **One
    by One** effect created a three-step animation sequence, as listed in the animation
    pane and shown by the numbered rectangles beside the SmartArt ob ject ( **6**
    ).
  prefs: []
  type: TYPE_NORMAL
- en: 'Before making changes to the animation sequence, let’s briefly review the **Timing**
    options we have availabl e ( *Figure 9.13* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.13 – Animation start option definitions](img/B32063_09_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.13 – Animation start option definitions
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Timing** group ( **1** ), the first option we have is how to start
    the animation ( **2** ), for which you have three choices:'
  prefs: []
  type: TYPE_NORMAL
- en: '**On Click** : When you click your mouse, use the keyboard, or a remote to
    advance your presentation, the animation of the object will start (entrance, emphasis,
    exit, or path)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**With Previous** : The animation of the object starts at the same time as
    the previous animation, without having to click again'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**After Previous** : The animation of the object starts right after the previous
    animation has ended, without having to click'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Duration** option ( **3** ) works the same as discussed for slide transitions,
    meaning you can make it shorter or longer based on the intended effect. The **Delay**
    option ( **4** ) allows you to add a delay time before the animation starts. I
    would recommend not using it with the **On Click** start because it will make
    you think your click is not working during your presentation. But it can be useful
    to create sequential movement with the other two options.
  prefs: []
  type: TYPE_NORMAL
- en: The **Reorder Animation** subgroup ( **5** ) can help you change the sequence
    of the animations, having the same effect as the *small arrows* ( **6** ) in the
    animation pane. Since the object in our example is a SmartArt object, reordering
    animations is not available. The duration of animations is also shown in the animation
    pane with the **Advanced Timeline** markers ( **7** ); each rectangle shows the
    start and end times. If you don’t see the timeline, either right-click on one
    of the animations or click the arrow on its right ( **8** ) and select **Show
    Advanced Timeline** ( **9** ).
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have reviewed some important functions, let’s move on to modifying
    and adding animations to our SmartArt example.
  prefs: []
  type: TYPE_NORMAL
- en: Modifying existing animations and creating an advanced sequence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we applied a **Fade** animation to the SmartArt object, PowerPoint applied
    the same animation effect to all its components. In our example, it would be better
    to create an animation sequence from left to right, guiding the audience through
    the process. It would make the movement even more natural if the arrows appeared
    after each rectangle.
  prefs: []
  type: TYPE_NORMAL
- en: 'Many people might be tempted to just have an **On Click** animation for all
    objects on their slide. While that does work, I have seen many presenters forget
    how many clicks they used to animate a slide and then get distracted from their
    content delivery. Let’s see a better way to create the sequence while reducing
    the number of cli cks ( *Figure 9.14* ):'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 9.14 – Creating an advanced animati\uFEFFon sequence](img/B32063_09_14.png)"
  prefs: []
  type: TYPE_IMG
- en: Figure 9.14 – Creating an advanced animati on sequence
  prefs: []
  type: TYPE_NORMAL
- en: In the original animation sequence (overlaid rectangle in *Figure 9.14* ), we
    see **On Click** animations, represented by the *mouse icon* ( **1** ), and **With
    Previous** animations ( **2** ); the only visual clue confirming this option in
    the animation pane is the *timing marker* ( **3** ) on the right showing the same
    start time as the previous object. The *star icon* ( **4** ) represents the animation
    effect applied to each object. You can also hover over each animation to get a
    tooltip with complete information.
  prefs: []
  type: TYPE_NORMAL
- en: 'To reproduce a left-to-right animation process for the SmartArt, we must modify
    animation effects and the way they start. Here is what you need to do:'
  prefs: []
  type: TYPE_NORMAL
- en: Click on the second animation ( **5** ), which is applied to the first arrow,
    and change it to a **Wipe** effect ( **6** ) by clicking in the gallery. In **Effect
    Options** ( **7** ), choose **From Left** .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on the third animation ( **8** ), which is applied to the second rectangle,
    and change the **Start** option to **After Previous** ( **9** ) – this will add
    a *clock icon* on the left.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the previous steps so the second arrow and third rectangle get the same
    final animations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To test your animation sequence, select the first animation in the list and
    click the **Play From** button ( **10** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Everything you have learned about in this SmartArt example can be applied to
    any object you want to animate on your slides. It will take practice before you
    feel comfortable creating sequences that feel natural and look professional. My
    advice is to fir st imagine what your animation sequence should look like and
    even write it down. Just as planning presentations away from PowerPoint can help
    make our presentations more impactful, planning animations can save us a lot of
    time.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now see how we can add some emphasis animation to our SmartArt example,
    so each component is grayed out when new object s appear on the slide.
  prefs: []
  type: TYPE_NORMAL
- en: Adding new animations to objects already animated
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can create nice effects when using multiple animations on slide objects
    , but it can be tricky if you are not well organized. If you decide to create
    a more complex animation sequence, the first thing you should do is rename your
    slide objects in the **Selection** pane, as we saw earlier in this chapter. Unfortunately,
    when using SmartArt, as in our example, you can only rename a whole object, not
    its components. If you are using the SmartArt example for the next steps, I suggest
    you rename the object to something short, such as `SA` , the initials for *SmartArt*
    .
  prefs: []
  type: TYPE_NORMAL
- en: 'When we customize the animation for SmartArt, the **Multiple** animations button
    will be shown ( **1** ). If we want to add additional animations, we need to click
    on the **Add Animation** button ( **2** ). Choosing an **Emphasis** animation
    such as **Desaturate** ( **3** ) will help us create a faded look as soon as we
    move to the secon d shape ( *Figure 9.15* ):'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 9.15 – Adding new animations to an animated\uFEFF SmartArt object](img/B32063_09_15.png)"
  prefs: []
  type: TYPE_IMG
- en: Figure 9.15 – Adding new animations to an animated SmartArt object
  prefs: []
  type: TYPE_NORMAL
- en: 'After applying the additional animation, it is added in the animation pane
    ( **1** ), and we need to click on the **Click to expand contents** arrow ( **2**
    ) to see every added ani mation ( *Figure 9.16* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.16 – Sequencing the new animations in the timeline](img/B32063_09_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.16 – Sequencing the new animations in the timeline
  prefs: []
  type: TYPE_NORMAL
- en: 'As we can see, an **Emphasis** animation was added to all the components of
    the SmartArt object. If we were to leave them in the actual sequence, the color
    change would happen after the first sequence, making all the shapes a gray shade.
    Wh at we want is to start the emphasis right after we click for the second animation.
    Here is how we will accomplish this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Click on the first emphasis animation ( **3** ). The name, **SA: Plan and…**
    , is the same as the first animation at the top. This is how we can figure out
    more easily where it will be moved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowing we want the first rounded rectangle to fade when we click to make the
    first arrow and the second rectangle appear on the slide, we can click and drag
    the animation right under the second one ( **4** ), or we can select it and use
    the small arrows to make it move upward ( **5** ). When it is moved, you need
    to change the start of the animation to **With Previous** ( **6** ), so the first
    rectangle fades as the arrow and the second rectangle appear.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the third click, we want to fade the first arrow and the second rectangle,
    so we need to move the second and third emphasis animations ( **7** ) right under
    the third **On Click** animation in the animation pane ( **8** ). You don’t need
    to change the start of those animations because they are already set to **With
    Previous** .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are two emphasis animations left. You can simply select and delete them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can validate your timeline with the visual of the end result ( **9** ) on
    the right in the previous figure and preview your animation sequence.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is possible that you feel overwhelmed with all the steps, and this is normal!
    Animating a SmartArt object might be quite a challenge if this is your first time
    trying animations. But I also felt it was a great complex example that would also
    help you go through any simpler animation needs with other types of objects. The
    best thing to do is make sure you plan your animations and complex sequences first,
    then try creating them with simple shapes to help you practice.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, there are many more animation combinations you can do. If you are
    wondering why I have not discussed motion paths, it’s simply because M365, Office
    2024, and Office 2021 users have a much simpler way to create motion with the
    **Morph** transition, as we discussed in a previous section. If you are using
    an older version, you should have a look at the Microsoft support article on motion
    paths in the *Furth er reading* section.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have discussed how animations work, you might be wondering whether
    there is a way to show content on demand, when you choose to show it, and not
    include it in an animation sequence. This is exactly what we will discuss in the
    ne xt section on triggers.
  prefs: []
  type: TYPE_NORMAL
- en: Using triggers for on-demand animations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using triggers in your presentations allows you to have full contro l over
    what you show and when you show it. As an example, I am using triggers to discuss
    the meaning of colors in one of my presentations, where I can show the meanings
    one at a time, in no particular order. I simply need to click on one of the shapes
    while in slideshow mode to either display or hide a de finition ( *Figure 9.17*
    ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.17 – Example of how triggers can be used to show a list of color
    meanings](img/B32063_09_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.17 – Example of how triggers can be used to show a list of color meanings
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/2.png) ** The next-gen Packt Reader ** is included for free with
    the purchase of this book. Scan the QR code OR go to [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock4.png)'
  prefs: []
  type: TYPE_IMG
- en: Since discussing colors in a black-and-white book would not be convenient, we
    will be creating a simple example with shapes in th e following section.
  prefs: []
  type: TYPE_NORMAL
- en: Using triggers with shapes and images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To help you follow along with this technique, you should create a slide that
    has three shapes labeled **Event 1** , **Event 2** , and **Event 3** ( **1** ),
    and add three images that will be used to depict each of the events ( **2** ).
    Then, make sure you open the **Selection** pan e ( **3** ) ( *Figure 9.18* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.18 – Create a slide with three event buttons and three images with
    the Selection pane](img/B32063_09_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.18 – Create a slide with three event buttons and three images with
    the Selection pane
  prefs: []
  type: TYPE_NORMAL
- en: The first thing you need to do to make your use of triggers simpler is to rename
    all objects so you can easily identify the buttons and the pictures for **Event
    1** , **Event 2** , and **Event 3** ( **4** ). Trust me, you will thank me later.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you have renamed them, you can proceed to animate the pictures by using
    triggers. You can quickly add a **Fade** entrance animation to the three pictures
    at the same time by selecting them all before adding the anim ation ( *Figure
    9.19* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.19 – Using an Entrance and Exit Fade animation on pictures before
    using triggers](img/B32063_09_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.19 – Using an Entrance and Exit Fade animation on pictures before using
    triggers
  prefs: []
  type: TYPE_NORMAL
- en: This will create the first animation, **On Click** ( **1** ), followed by the
    other two starting **With Previous** ( **2** ). Use the **Add Animation** button
    ( **3** ) to add **Exit Fade** to all three pictures too, so you have a second
    set of animations in the animation pane ( **4** ).
  prefs: []
  type: TYPE_NORMAL
- en: 'The result we want is to be able to click on the **Event 1** button to fade
    in the first picture and hide it when we click again on the same button. The way
    to configure this is by selecting the entrance and ex it animations for the first
    picture in **Animation Pane** ( **1** ) – the star for the entrance animation
    is green, and it is red for the exit anim ation ( *Figure 9.20* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.20 – Configuring the trigger animations](img/B32063_09_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.20 – Configuring the trigger animations
  prefs: []
  type: TYPE_NORMAL
- en: Click on the **Trigger** button ( **2** ), then **On Click of** in the drop-down
    list, and choose **Event 1** **button** ( **3** ) from the list since we want
    the first picture to animate in and out when we click this button. This is the
    reason why renaming your objects is a time-saver. You don’t have to remember which
    generic name t o choose from.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the same p rocess for the second and third pictures.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When you are done, the animation pane will now have three groups of triggered
    animations ( **4** ). They are identified as *Trigger: name of object on which
    we click: name of object that is animated* . Just make sure you change their animations
    to all start **On Click** .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Align the pictures in the same position and test your work by using the **Slide
    Show** button in the status bar ( **6** ), or *Shift* + *F5* on your keyboard
    to start the slideshow on the actual slide. Press *Esc* on your keyboard to exit
    the slideshow.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have now configured your first trigger animations. They can be useful in
    many ways in business presentations, such as having a hidden graphic you can show
    on demand or being able to show only one part of the slide at a time on demand.
    Triggers can also be used with video bookmarks, which will be the last topic of
    this chapter in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: Using triggers with a video bookmark
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In [*Chapter 8*](Chapter_08.xhtml#_idTextAnchor722) , we m entioned that we
    could add bookmarks to v ideos. Now is the time to see how we can use them to
    animate objects on a slide at a specific moment in a video.
  prefs: []
  type: TYPE_NORMAL
- en: 'In *Figure 9.21* , we see an inserted video ( **1** ) and a callout ( **2**
    ) with an **Entrance Fade** animation ( **3** ). The **Trigger: Video 5** ( **4**
    ) animation is there because of the option to pause the video, and is automatically
    added when the video is inserted:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.21 – Adding a trigger animation to a callout, set on a video bookmark](img/B32063_09_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.21 – Adding a trigger animation to a callout, set on a video bookmark
  prefs: []
  type: TYPE_NORMAL
- en: A bookmark ( **5** ), represented by the circle on the playback tool, was added
    to the video from the **Video Playback** tab ( **6** ). When you hover your mouse
    cursor over the bookmark, you will see a tooltip with the name of the bookmark.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To animate the callout at the bookmark when the video is played, you need to
    select the callout, then click on **Trigger** ( **7** ) | **On Bookmark** ( **8**
    ) | **Bookmark 1** ( **9** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After you are done, the animation pane will display a second trigger for the
    callout animation that will play when the video reaches the bookmark ( **10**
    ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can be very creative with thi s feature in a business setting. For example,
    you could have a video of a specific operation in your organization to which you
    add in and fade out callouts at different moments. You only need to plan how to
    put the bookmarks in the right positions before using them as triggers.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we saw how to use slide transitions wisely, discussed how to
    leverage the **Morph** transition to create various types of movements between
    slides, and learned how to use the advanced animation timeline to create complex
    animation sequences or use triggers to control our animations.
  prefs: []
  type: TYPE_NORMAL
- en: Using animations can be extremely time-consuming if you don’t plan what you
    want to achieve before trying to create complex sequences. Just like most of the
    topics we have covered so far in this book, it will take more time for your first
    few attempts when creating animations, especially more complex ones. Remember
    that there is nothing wrong with using simple animations, or no animations at
    all, if you don’t need them.
  prefs: []
  type: TYPE_NORMAL
- en: I hope that the topics in this chapter will open up new possibilities for your
    next presentations, helping you decide whether they can help tell your story more
    efficiently while helping your audience remember your content for longer. Remember
    that just because there are many animation effects available, you don’t have to
    use them all!
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss how to build more flexibility and interactivity
    into your presentations so you can engage your audience even more. Being able
    to let them choose or showing them you can easily navigate your whole con tent
    is very impactful.
  prefs: []
  type: TYPE_NORMAL
