  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们签署合同之前与 HHS 就 PHI 和加拿大 HIPAA 相似法规进行的讨论
- en: '1'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '1'
- en: rigorous cybersecurity assessment with a vendor, in which Medloaner was asked
