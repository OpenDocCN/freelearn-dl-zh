- en: The Healthcare Landscape
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
- en: To make an effective entry, Medloaner required an in-depth understanding of
    the dynamics of the US healthcare system, including organization structures and
    incentives, attitudes to innovation, and regulatory concerns.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: In brief
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Operational innovations lag behind clinical ones by at least 15-20 years. Data
    exists but is fragmented, and the vertical structure of hospital departments presents
    the challenge of organizational silos. Kip found through his user interviews that
    there is an overwhelming desire for innovation here.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fear of HIPAA (or equivalent) regulations abounds. The high cost of compliance
    is a significant barrier to AI adoption and innovation in healthcare.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The current US healthcare system is too focused on short-term revenue wins.
    Hospitals are resistant to adopting technologies that improve efficiency without
    driving revenue directly.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is no data economy, even though the data is available. Kip contrasts this
    with the advertising technology industry, citing identity vendors like [LiveRamp](https://liveramp.com/),
    which claims to be “the industry’s only interoperable platform for data collaboration
    across all cloud, walled garden, and media platforms”.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: We still have those laggards in charge of divisions within organizations.”
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: The technology adoption lifecycle
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'According to this model (Everett Rogers, 1962), any new piece of technology
    is adopted [in five stages](https://www.hightechstrategies.com/innovation-adoption-curve/)
    as time goes on, by:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Innovators (2.5%)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Early adopters (13.5%)
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Early majority (34%)
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Late majority (34%)
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Laggards (16%)
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/Figure_1.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 1: The technology adoption lifecycle.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'The rate of adoption is governed by different factors. Rogers identifies five:
    relative advantage, compatibility, complexity, trialability, and observability.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: In some formulations, there is a “[chasm](https://learning.dell.com/content/dam/dell-emc/documents/en-us/2022KS_Khurana-Technology_Adoption_Curve.pdf)”
    — popularized by Geoffrey A. Moore in his book, [Crossing the Chasm](https://www.goodreads.com/en/book/show/61329.Crossing_the_Chasm)
    – depicted between the early adopters and the early majority, reflecting the mentality
    gap between visionaries and pragmatists, who will only make the leap to adoption
    once they have seen other organizations and clients doing the same thing.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: The problem of HIPAA
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The Health Insurance Portability and Accountability Act (HIPAA) of 1996 is a
    [US law](https://www.hhs.gov/hipaa/index.html) that guards the privacy and security
    of [protected health information](https://privacyruleandresearch.nih.gov/pr_07.asp)
    (PHI), among other things. The law amounts to a tight lock on the sharing of medical
    history. Data that contains [identifiers](https://www.ncbi.nlm.nih.gov/books/NBK500019/)
    that could link it to a specific patient cannot be shared, including names, addresses,
    and social security numbers.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: HIPAA also means that subcontractors like Medloaner share liability for any
    data leakages, alongside healthcare entities. Healthcare-adjacent products and
    services carry additional costs because of the heavy regulatory burden needed
    to deliver them – which means attorneys are expensive. Kip says, “There are companies
    who work with [electronic health records](https://www.cms.gov/priorities/key-initiatives/e-health/records)
    (EHRs), there are a couple of successful startups, but they are always short on
    cash because of HIPAA.” [A 2017 report from Acritas](https://phillipskaiser.com/wp-content/uploads/2018/06/acritas_legal_spend_report_2017.pdf)
    found that legal departments of US companies spend the most in the world relative
    to revenue, and that “Pharma” and “Healthcare” legal spend rank 7th and 9th respectively
    out of 22 industries.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The reason why HIPAA is so tricky is that it is effectively use-case based,
    according to Kip. As a subcontractor, in your risk assessment, you need to be
    able to identify all possible use cases where potential data leakage can happen,
    which is a difficult task. Inevitable holes in your strategy can lead to fines
    and lawsuits, particularly following cyberattacks, which have been responsible
    for some of the [biggest HIPAA violations in history](https://www.thinksecurenet.com/blog/top-10-settlements-fines-hipaa/).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner by numbers
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '3'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: discussions with HHS around PHI and the Canadian HIPAA-equivalent before they
    signed a contract
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: rigorous cybersecurity assessment with a vendor, in which Medloaner was asked
    questions like, “What’s your network situation?” and “How are you going to integrate
    with the hospital system’s existing computer network?”. The only approved phone
    within HHS was the iPhone 7, which was introduced by Apple [in 2016](https://www.apple.com/newsroom/2016/09/apple-introduces-iphone-7-iphone-7-plus/)
    and [discontinued three years later](https://endoflife.date/iphone).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 7-8
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: months spent talking to people in the healthcare system before starting to build
    a proof of concept
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 50-60
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: interviews conducted with industry professionals
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '106'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: unique tray types in orthopedic surgery
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: trays in the initial dataset for early model development
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: The Surgical Instrument Problem
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: A surgical kit is an essential collection of medical instruments and tools carefully
    prepared to meet the specific requirements of a surgical procedure.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Figure_2_-_components_of_a_surgical_kit.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 2: Components of a surgical kit. 1) Auxiliary tray 2) Graphic case 3)
    Standard plate tray 4) Reduction tray 5) Insertion tray 6) Screw rack.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: HHS had identifiable inefficiencies in its Medical Device Reprocessing Department
    (MDRD) and its Sterile Processing Department (SPD), which rely on manual methods
    for tracking, cleaning, inspecting, and assembling surgical kits.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'HHS hospitals use two different types of kit:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: In-house kits, which are a permanent part of hospital inventory.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Loaner kits, which are vendor-managed and need to be ordered and returned after
    use.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Loaner kits bring cutting-edge technology to hospitals but have more complex
    handling requirements and create a higher operational burden: additional inspection
    steps, double sterilization (48-hour processing time per [CSA standards](https://www.csagroup.org/standards/?srsltid=AfmBOorTKMw5jNyctkTTBCEdZg9ULM4jsUsX0EZswVm1Lqh7tdrpGz6I)),
    compliance checks before and after use, meticulous tracking, and expedited processing.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Problem outline
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: The existing MDRD workflow faces several key problems.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'Less than full utilization of surgical kits: Hospitals track kits as a whole
    and not components. Medloaner discovered that 20% of the instruments in a surgical
    kit are never used but are still included, transported, and processed unnecessarily,
    leading to financial waste and storage inefficiencies.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'Lost or misplaced instruments: 1-2 incorrect items or discrepancies are common
    in vendor-provided write-ups. On top of this, there can be a mix-up of tags in
    kits after the sterilization of instruments. Instruments can also be taken from
    other kits to supplement missing ones, without the change being recorded. Missing
    items lead to scavenger hunts, where MDRD staff must search for tools across departments.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'STAT: One of Medloaner’s customers loses $11,000 every week due to lost or
    misplaced inventory.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'Manual processes leading to errors and inefficiencies: The lack of digital
    tracking systems forces MDRD technicians to rely on manual processes for counting,
    assembling, disassembling, and sterilizing. This is time-consuming, error-prone,
    and contributes to mental fatigue. Technicians may also have to resterilize instruments
    that were not properly positioned during the decontamination process, which has
    a huge impact on workflow.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Operational delays due to different kit types and surgical needs. High-priority
    kits often need expedited processing, which disrupts planned workflows and strains
    resources. 9+ loaner trays may arrive for a single hip surgery, overwhelming MDRD
    staff.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: If that department stops, not a single surgery will be performed. Even something
    as simple as removing stitches. It’s literally the heartbeat of the hospital.”
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: User interviews
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: In its quest to balance efficiency with cost effectiveness, Medloaner sought
    to understand the pain points and KPIs of stakeholders involved in the process.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Figure_3_-_PDF.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 3: Personas that Medloaner spoke to within HHS hospitals.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'They identified 5 customer personas:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '3 personas within the MDRD: Technician, Supervisor, Manager. These personas
    generally cared about metrics like time to the OR (operating room) for surgical
    kits.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '1 persona within Procurement: Supply Chain Coordinator. This persona focused
    on metrics like kit utilization, instrument utilization, revenue per kit, and
    revenue per instrument.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '1 persona within the Operating Room (OR): Service Registered Nurse (SRN).'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Internal champions: Understanding the MDR department'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'Kip paints us a picture of employees in the MDR department:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Essential to hospital function.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technicians are overworked and undervalued. “Generally, it’s a low paying job,
    and they are asked to do at least twice more than they are supposed to do.”
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Eager to embrace new technologies. “They kept talking continuously because they
    finally realized that you are the one who can make their life easier. They all
    want to innovate, but the resistance is huge because of silos in the organization.”
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Potentially powerful internal champions.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/Figure_4_-_PDF.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 4: The MDRD workflow, as described by Kip.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 'FEEDBACK TOUCHPOINT 1:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: We value sharp feedback.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Quick thoughts on this section?](https://forms.office.com/e/5TN9a1d5LB)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner’s Solution
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting around HIPAA: A novel data layer'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: 'Medloaner’s solution avoids using any information that would identify patients
    personally, and thus avoids having to deal with HIPAA entirely. The only information
    they collect about a given surgery is:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '① [Surgery type](https://www.facs.org/for-medical-professionals/education/online-guide-to-choosing-a-surgical-residency/guide-to-choosing-a-surgical-residency-for-medical-students/faqs/specialties/):
    For example, orthopedic.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '② Surgery subcategory: For example, knee surgery or shoulder surgery.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On top of this, Medloaner’s key insight is to track and collect data about each
    ③ individual surgical instrument, rather than staying at the higher level of the
    surgical kit.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: The needs of every hospital are different, of course, and they understood from
    user research that their solution must also be tailored to the ④ data management
    at each hospital, and the relationships between different software systems that
    hospitals utilize.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Together with an HHS internal team consisting of consultants, business analysts,
    data scientists, and data engineers, they designed a novel data layer that would
    bring all these datasets (① ② ③ ④) together. There is a system of checks in place
    to ensure that not a single PHI or patient ID, or any patient information, is
    leaked.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: The rest of the technology is fed by this data layer.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: 'A key insight: Instrument-level data'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 'Kip describes a previous attempt at an instrument-level solution:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Someone I know implemented an RFID tracking system. Imagine you have to tag
    with a specific sticker every single component of the surgical kit, and imagine
    what will happen to those tags if they go through 120, 150°C decontamination.
    It’s either steam or, if it’s very delicate, it will be processed by specific
    chemicals, and after that it also has to go through sterilization. So often those
    tags get lost. That’s why that solution never took off.”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: -- Kip Pogrebenko
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to see how Medloaner’s computer vision-based tracking model learns
    from this insight.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Without instrument-level tracking, there are commonly observed failure modes,
    which demonstrate that the devil is in the detail.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'Failure mode #1'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: 'Technician 1 comes in and grabs the surgical kit that needs to be decontaminated.
    They disassemble everything and drop metal tags labeled #25 into all the compartments
    of that kit, and it goes to the washer. Technician 1 leaves.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'Technician 2 comes in and sees the stack of tags labeled #25\. They have no
    idea that this stack was already used. They grab the stack and drop them into
    another surgical kit.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Once the two kits come back from sterilization, they are all mixed up.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'Failure mode #2'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: A surgical kit is ready to go to the OR. A nurse notices there is a critical
    instrument missing. They open any case in storage that may contain it. They grab
    it, pack it, stick it to the surgical kit with sports tape, and it goes to the
    OR.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: The original set was missing that instrument, but it’s now also missing from
    another kit. But that change was never logged.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 'The instrument-level data collected continuously by Medloaner’s solution includes:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Instrument type
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instrument movements
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instrument vendor and manufacturer
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instrument positioning inside kit (outlines)
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These data provide insight into:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: 'Instrument utilization rates: Identifying frequently and infrequently used
    instruments to optimize kit configuration and reduce waste.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Inventory management: Improving tracking and reducing the frequency of lost
    or misplaced instruments.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Extent of decontamination and kit completeness: Assessing cleaning efficacy
    and automating completeness checks improves accuracy, mitigates the risk of human
    error, and reduces burden on MDRD technicians.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Workflow efficiency: Analyzing instrument flow to identify bottlenecks and
    areas for improvement, optimize inventory levels, and predict high-priority cases.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Medloaner’s proof-of-concept used AI and computer vision to realise these aims.
    The next few subtopics explore how this was done.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: 'The model: AI-backed automation'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 'Kip describes the two levels of the model that deal with different concepts:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
- en: We trained multiple models. We have a general model for just the type of device,
    and then it’s broken down by vendor and by manufacturer. This way we are able
    to recognize any single device, doesn’t matter where it sits. But then another
    higher-level layer of the model understands “a configuration of the set”.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: The model is integrated with a perioperative resource (PR) management or inventory
    management system, so the system understands the shapes of all the specific instruments,
    puts them together, and helps the technician make sure that they sit on a proper
    kit tray in a proper location. Kip describes this as “your giant system of equations”.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: The tech stack
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: 'For the model itself, Medloaner has been through a few refactors, with a core
    philosophy of avoiding commercial packages. They used:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '[OpenCV](https://opencv.org/) for the first proof of concept.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open-source libraries from [Meta](https://www.meta.com/) for the second iteration,
    which allowed them to tackle the more challenging aspects of image recognition.
    Kip gives the example of screws on caddies that look the same from above but that
    are actually different lengths.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Difficult image recognition tasks Medloaner faces
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: 'Multi-level kits: Hard to see all instruments in a single image.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Varying instrument sizes: Hard to distinguish, for example, screws of different
    diameters.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Inconsistent reference images from vendors: Hard to tag instruments correctly.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In parallel, the team are building their own in-house solution based on the
    internal workings of the Meta libraries, so they can avoid vendor lock-in.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
- en: If Meta goes out of business tomorrow, who’s going to maintain those packages?”
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: For their novel data layer, Medloaner uses [Amazon Redshift](https://aws.amazon.com/redshift/)
    for data warehousing. They chose Redshift because of its position as an industry
    standard, but also because “it closely resembles a relational database management
    structure, but it also allows you to store unstructured data”. [Alternatives to
    Redshift](https://www.gartner.com/reviews/market/cloud-database-management-systems/vendor/amazon-web-services/product/amazon-redshift/alternatives)
    include SQL Server, MongoDB Atlas, Databricks, and Google BigQuery.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
- en: When we talk about data, generally speaking, you have structured and unstructured
    data. You want to have your data warehousing solution house in both types of data,
    because there are a lot of insights in unstructured data.”
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: “Now with the advances in AI technologies, it’s much easier to process unstructured
    data and create a structure from it according to your own requirements.” TechLeader
    has covered [Lucidis AI](https://lucidis.ai/)’s solution to internal data chaos
    in another report, Generative AI for 80% Reduction in Work Order Processing Time.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Quantifiable improvements
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: 'It is early days, but Medloaner has been able to demonstrate some significant
    operational gains for HHS:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: 'Time savings: Reduced kit processing time from 10 minutes to 1 minute per tray.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cost efficiency: Lowered annual inventory verification costs by 90%, from $1.6M
    to $160K.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reduced errors: Reduced human errors in tray assembly, preventing delays and
    improving surgical outcomes.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enhanced productivity: Allowed MDRD technicians to focus on high-value tasks,
    boosting morale and efficiency.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is important to remember that properly sterilized surgical kits also reduce
    the risk of infections and procedural complications. The implications of this
    technology are clear — they extend far beyond pure efficiency gains, into the
    realm of better patient safety. This is the nature of innovation in the healthcare
    industry.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'FEEDBACK TOUCHPOINT 2:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: Quick thoughts on this section?](https://forms.office.com/e/5TN9a1d5LB)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Business Challenges
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 'Challenge #1: Reluctant customers'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: In the early stages, armed with their initial software prototype, Medloaner
    spoke to a large number of healthcare groups in the US, as well as device manufacturers,
    device distributors, and group purchasing organizations (GPOs).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
- en: 'The #1 question that we were asked is, ‘How can we drive revenue with your
    technology?’”'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: They struggled to articulate a clear value proposition that resonated with these
    groups, who were primarily focused on revenue generation, and not interested in
    the more indirect effects implied by cost savings from Medloaner’s tech. They
    told Kip to come back when he had his first customer.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: 'Solution #1: Reassess target geographies and go-to-market strategy'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner took a pause while Kip hit the books. He took three Harvard Business
    School courses online and learned more about strategies for specialization.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'RESOURCE: What they taught Kip at Harvard Business School (Online), at a cost
    of $1,850 each:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '[Disruptive Strategy](https://online.hbs.edu/courses/disruptive-strategy/)'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Business Strategy](https://online.hbs.edu/courses/business-strategy/)'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Strategy Execution](https://online.hbs.edu/courses/strategy-execution/)'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kip decided to shift Medloaner’s first region of focus to Canada rather than
    the US, because they operate under a publicly funded model and so — in theory
    — have a weaker emphasis on direct revenue.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: “Canada doesn’t care about revenue. What the Canadian hospital system does,
    they forecast the number of surgeries, in our case per year, and they go to the
    government. The prices for the surgeries are roughly equal across all healthcare
    systems because they are government-subsidized. Depending on that forecast, the
    government will fund the hospital, and at the end of the year it has to file a
    report.”
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Certain provinces use [activity-based funding](https://healthcarefunding.ca/key-issues/activity-based-funding/)
    (ABF) models, under which funding may be [increased or withdrawn](https://pmc.ncbi.nlm.nih.gov/articles/PMC9235246/)
    in future budget allocations if a hospital performs more or fewer procedures than
    projected. Therefore, if a hospital bound by this model can make itself more efficient,
    it will see direct benefits to revenue. “For the Canadian market, an efficiency
    play is of the highest priority.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '|  | Canada | US |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
- en: '| Funding model | Single-payer ([Medicare](https://www.canada.ca/en/health-canada/services/canada-health-care-system.html),
    13 plans by region) | Private insurance, government programs, out-of-pocket payments
    |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
- en: '| Healthcare spending [in 2023](https://www.statista.com/statistics/268826/health-expenditure-as-gdp-percentage-in-oecd-countries/)
    | 11.2% of GDP | 16.5% of GDP |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
- en: 'TABLE 1: Canadian versus US healthcare systems.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: 'Challenge #2: Learn the right lessons from competitor failures'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: Almost all Medloaner’s competitors are out of business. Among the remainder,
    one example is a UK-based startup, [Scalpel AI](https://scalpel.ai/), which secured
    funding in October 2024\.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: One difficulty that Kip rattles off is the expense associated with supporting
    hardware like cameras, and having to rely on third-party vendors here. Failed
    competitor solutions also added to the complexity of existing hospital logistics,
    introducing additional steps to processes rather than taking them away.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
- en: Some of them relied on third-party vendors in terms of equipment. All those
    frames with additional bolt-on cameras and video feed, and the surgical kit was
    supposed to slide underneath the cameras. They gave too much power to third-party
    vendors. Power of suppliers, it’s called.”
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Porter’s Five Forces (1979)
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: 'This [seminal framework](https://www.isc.hbs.edu/strategy/business-strategy/Pages/the-five-forces.aspx)
    from Harvard Business School professor and businessman, Michael Porter, defines
    the five competitive forces that govern dynamics in any industry. These are:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: 'Rivalry between existing competitors, which is fed by:'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bargaining power of suppliers
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bargaining power of buyers
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Threat of new entrants
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Threat of substitute products
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Undertaking a Five Forces analysis gives companies a firmer idea about their
    competitive position relative to the rest of the industry.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: 'In particular, Kip highlights his closest competitor [ORtelligence](https://www.ortelligence.com/),
    the Lyft to Medloaner’s Uber, who also “ceased to exist” a few months before our
    interview. Medloaner invested a substantial amount of time into figuring out why,
    owing to the similarities between them: both companies had computer vision as
    their backbone, and they had independently built out all the same additional streams
    of revenue.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: They discovered that ORtelligence wanted to charge an expensive onboarding fee,
    requiring hospitals to pay a $5,000 fee for each surgical kit, to cover the cost
    of imaging and analyzing each kit and training its model to recognize the instruments
    inside it. For the average hospital that may circulate hundreds of surgical kits,
    this proves prohibitive. “It’s not easy to go to the CIO of the healthcare group
    and justify that cost without [them] knowing if the technology is going to work
    or not.” This was a custom solution for each hospital, and not optimized for scalability.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: 'Solution #2: Change the funding model'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner took a different path, opting to rely on government grants and fundraising
    so they could chase an ultimate goal of building a comprehensive surgical kit
    image library, something that “from a financial point of view, no one [else] wanted
    to build and work off”. This allowed them to offer hospitals a more attractive
    value proposition with extremely low upfront costs, “virtually zero”.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner focused on rolling out pilot schemes to get their foot in the door,
    laying the foundations for a land and expand strategy, with the US as a slightly
    more distant goal.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Land and expand
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '[Land and expand](https://userpilot.com/blog/land-and-expand/) is a growth
    strategy that focuses on securing and delivering on a smaller initial deal with
    a client (“land”), then using this foothold to cross-sell and up-sell (“expand”).'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Figure_5_-_PDF.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 5: A sketch of how land and expand achieves growth.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: Customer retention is a key aspect of this strategy.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: Towards a standard taxonomy
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: For now, Medloaner is focused on addressing the pain points of the HHS, analyzing
    high-moving and high-discrepancy surgical kits first – those used most frequently,
    and those most often missing instruments.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: However, Kip talks with some zest about the potential of his comprehensive surgical
    kit image library, once it is built. His stretch goal is “to be able to recognize
    every single surgical kit eventually”. This is a possibility because every medical
    device in the world has a unique reference ID.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
- en: We are kind of creating a standard taxonomy, if you will. That taxonomy doesn’t
    exist today, but once you have a standard taxonomy, that’s your network effect.”
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Network effects
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '[Network effects](https://online.hbs.edu/blog/post/what-are-network-effects)
    come into play when the value of a product depends, usually positively, on how
    many users of the product there are. They can be direct or indirect.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: The more hospitals Medloaner partners with, the more surgical instruments they
    will need to add to their image library, and the more useful the library will
    become — both for attracting new clients and for adding value to existing ones.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Figure_6_-_PDF.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 6: How Medloaner’s image library creates network effects.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: Other standard taxonomies include the UN’s Food and Agriculture Organization’s
    [AGRAVOC](https://www.fao.org/agrovoc/) and the [Dewey Decimal Classification](https://www.oclc.org/en/dewey/webdewey.html)
    (DDC).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: Cross-Industry Perspective
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: 'Kip makes a range of cross-industry references over the course of our interview.
    He has many parallels to draw between attitudes to AI and innovation at various
    points in history, including:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: The carriage industry’s resistance to automobiles (20th century).
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Candlemakers’ resistance to electricity (19th century).
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: He reflects on how the role of bank tellers changed when the ATM came out, from
    people who “just count the money” to fully fledged customer representatives who
    can cross-sell. “Exactly the same will happen with AI and it’s going to happen
    in two years. In two years, there will be a new generation of knowledge workers
    who will be extremely accustomed to AI technologies, and they will not be able
    to see a future where these technologies are not in place.”
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
- en: Those people who will drive the revolution, they don’t have purchasing power
    yet.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: Salesforce and Epic Systems
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Most interesting is Kip’s comparison between [Salesforce](https://www.salesforce.com/)
    and [Epic](https://www.epic.com/), as it pertains to the specifics of the healthcare
    industry in the US but also to Kip’s ideas about internal champions.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: Kip cites how Salesforce achieved widespread adoption in the enterprise world.
    They did this, in part, by targeting mid-level sales managers with a simpler version
    of their software instead of only trying to sell directly to top executives. These
    managers became advocates for the software’s use within their organizations, leading
    to a bottom-up approach to adoption.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: Epic Systems versus Salesforce
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: Epic is the dominant electronic health record system in US hospitals. According
    to its website, over 325 million people worldwide have a record with Epic.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: Salesforce is the leading customer relationship management (CRM) platform.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: Both systems require significant customization and integration effort to implement
    effectively.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: “To give you a good understanding of what Epic is, it’s like a Salesforce. You
    can’t just deploy Salesforce and start using it. It requires a lot of manual effort,
    a lot of custom work. That’s why you have a huge economy around Salesforce. All
    sorts of contractors, subcontractors, companies that simplify your workflow and
    make your life easy.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: “It’s the same with Epic. It’s not that easy to knock on Epic’s door unless
    someone from the healthcare organization knocks on that door on your behalf. So
    that was the challenge. We were super happy initially. ‘Oh, Epic. It should be
    easy.’ But it’s not that easy. It’s a serious gatekeeper to a lot of things.”
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner knew they had to capitalize on their access to employees in the MDRD,
    technicians and managers alike — their deep, hands-on understanding of the problem
    of manual processing, their interaction with hospital systems day-to-day, and
    how automation could solve their problems. “We had to find internal champions
    and work with them. Once they understood, they became the driving force behind
    us.”
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
- en: They had so many ideas! Like, oh, we can do this. We can do that. We can remove
    this stuff. We could deploy something like that. We could create a simple spreadsheet
    that would track this and that. It’s just mind-blowing.”
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner’s Next Steps
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: 'Medloaner’s immediate focus is to finalize their minimum viable product (MVP),
    which will include:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: Digitized instructions for surgical kit assembly, disassembly, and sterilization.
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instrument purchase order (PO) tracking.
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With their MVP, they will aim to demonstrate five important metrics, including
    two emotional and social ones. A component of the solution not discussed in this
    report relates to social proof: to directly address the mental fatigue of technicians,
    Medloaner introduces gamification with features like leaderboards and rewards.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: A short-term roadmap
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: An alpha launch across four HHS hospitals.
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A beta launch for select healthcare organizations. Kip is currently in conversation
    with two large healthcare groups in the US, one of them the largest in Michigan
    State.
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In parallel, Medloaner is building a comprehensive surgical kit image library,
    which will play an important role in its long-term strategy.
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Disposable surgical kits: A stretch goal'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: Kip’s stretch goal, which he believes possible in three years, is the production
    of disposable surgical kits, from biodegradable materials like high-grade plastic.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: These kits would target small, localized procedures like ACL replacements and
    would be offered at a fraction of the cost of traditional surgical kits. Kip sees
    this as a way to democratize access to surgical care in developing countries like
    Ukraine, where Kip hails from, and where the high cost of traditional surgical
    equipment is a major barrier to treatment. He also cites regions like Gaza, where
    the healthcare ecosystem may have to be re-built.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
- en: War-torn Ukraine cannot afford $150,000 per surgery using those standard surgical
    kits. What if we could offer disposable kits at a fraction of the cost, let’s
    say, $10,000?”
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: The majority of surgeries are orthopedic surgeries, according to Kip. They certainly
    account for a large portion of annual hospital revenue. Massachusetts healthcare
    analytics platform Definitive Healthcare found that there were over [1.4 million
    knee and hip arthroplasties](https://www.definitivehc.com/blog/how-many-orthopedic-surgeons-in-us)
    — surgeries to restore joint function — performed in 2022 alone.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: This means orthopedic surgeries are a prime target for medical device companies.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: A Data Economy
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: In this report, we touch on the expansive topic of data economies.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: Kip’s ultimate vision is for there to be an “Amazon of healthcare” — a data-driven
    marketplace that improves quality while reducing costs, something akin to [LiveRamp](https://liveramp.com/)
    for adtech. LiveRamp relies on [“advanced encryption technology”](https://liveramp.com/about/)
    and multi-party computation (MPC), a cryptographic technique, to protect its data.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: 'For industry stakeholders and policy makers, Kip has these words:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
- en: Sharing means caring. If you allow healthcare organizations to share data for
    good and create necessary guardrails to ensure patient data is safe, it will be
    a tremendous value-add for society as a whole. So, they need to encourage healthcare
    businesses to try to deal with regulations – but the only way to encourage them
    to deal is to loosen them up, right?”
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: The challenges posed by laws like HIPAA are not easily overcome. Medloaner chose
    to sidestep these concerns and isolate their technology from all patient data.
    Despite this, they still had to persevere through many discussions about PHI.
    Kip does not see Medloaner’s approach as the only path.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: The blockchain facilitator
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Kip believes that blockchain technologies could be a long-term solution to the
    information security problem. By using blockchain to anonymize patient data while
    preserving its granularity, an extremely rich repository of information could
    be used for R&D without compromising patient privacy.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
- en: Think about disease prescription. All sorts of procedures, treatment plans,
    all that stuff. We are sitting on wells of information in EHR systems. But it’s
    so heavily guarded...we could have predicted COVID-19.”
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: Blockchain’s decentralized system would allow patients to control and potentially
    monetize their data. The financial burden of healthcare can be high, and could
    be offset by the value that an individual’s data provides to other parts of the
    healthcare system, for example as a small dividend or a discount on medical insurance.
    Kip imagines a data economy where researchers, healthcare providers, and patients
    can share and benefit from data in a secure and ethical manner.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: 'Kip as mentor: A Ukrainian mammogram startup'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: “I mentor a couple of startups in a government incubator in Ukraine, and we
    are testing this idea with one company that created a mammogram scanner to identify
    whether or not a breast image has a benign or malign tumor.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: The technology is ready to use, but now we are looking into how to integrate
    it, to create a marketplace like a matching engine between oncologists and patients.
    As a patient you can upload your scans, and then based on the result the system
    will match you with an oncologist based on historical data, the success rate of
    those doctors — this way, you create this data economy. The regulations are not
    as stringent in Ukraine. So, there is a way to experiment with that.”
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: Kip even proposes an actionable way ahead, a phased approach starting with less
    sensitive data, like for the common cold, bronchitis, or pneumonia, to test effectiveness
    and build trust.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: This type of strategy could pave the way for wider adoption and demonstrate
    the benefits of a more data-driven healthcare economy to sceptics.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: 'FEEDBACK TOUCHPOINT 3:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: How did this section land with you?](https://forms.office.com/e/5TN9a1d5LB)
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: In its journey so far, Medloaner has demonstrated a willingness to understand
    its business context and adapt its strategies.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: Kip’s team developed a technical solution to a regulatory problem that many
    potential entrants in healthcare see as prohibitive — but there are lessons to
    take away for tech leaders outside this industry as well.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: 'Design around regulatory landscapes: Tech leaders should think carefully about
    how they want their solutions to interact with existing regulations, and explore
    workarounds that allow for progress. Medloaner has not yet cracked the US healthcare
    market, but their foundational work puts them in a position to meet the challenge
    smoothly when it arrives.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Find internal champions: Successfully implementing new technology, particularly
    in slow-innovating industries, can hinge on empowering internal champions — users
    at the ground level who can help you advocate for change.'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Know your strategy: Medloaner pursued a disruptive strategy — building a library
    of surgical kits using government grants — which gives them a competitive advantage
    over competitors who may charge for onboarding, and sets them up for scale and
    network effects.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Think about data as a strategic asset: Medloaner’s case underscores the importance
    of viewing data collection and analysis as an opportunity to identify previously
    hidden problems and develop innovative solutions.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The business challenges around going to market, balancing short-term gain with
    long-term planning, approaching regulatory environments, and robust competitor
    analysis seem to outweigh the technical challenges in the particular case of Medloaner
    — a likely story for healthcare startups in general.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: Current and future tech leaders in this space now have the challenge of unlocking
    a true data economy for healthcare.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
