  type: TYPE_NORMAL
  zh: 与供应商进行的严格网络安全评估，其中 Medloaner 被问到诸如“你的网络状况如何？”和“你将如何与医院现有的计算机网络集成？”等问题。HHS 唯一获批准的手机是
    iPhone 7，这是苹果公司在 [2016 年](https://www.apple.com/newsroom/2016/09/apple-introduces-iphone-7-iphone-7-plus/)
    推出的，并在三年后 [停产](https://endoflife.date/iphone)。
