- en: Using basic authentication for our MCP server
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为我们的MCP服务器使用基本认证
- en: 'Let’s leverage this technique to secure our MCP server. After all, we don’t
    want just anyone to be able to access our server and potentially misuse it. To
    get this to work, we need two things:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们利用这项技术来保护我们的MCP服务器。毕竟，我们不想让任何人都能访问我们的服务器，并可能滥用它。为了使这项技术生效，我们需要两样东西：
- en: A server middleware that checks for the `Authorization` header and validates
    the credentials
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个检查`Authorization`头部并验证凭证的服务器中间件
- en: The client that sends the `Authorization` header with each request
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送带有`Authorization`头部的客户端请求
- en: Implementing the MCP server and bootstrapping it as a web app
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现MCP服务器并将其作为Web应用程序启动
- en: First things first, we need to implement the MCP server and bootstrap it as
    a web app. In doing so, we will have a web server that can handle MCP requests
    and responses. Once we’re done with this, we can add the middleware to the server
    that will add the security layer.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要实现MCP服务器并将其作为Web应用程序启动。这样做，我们将有一个可以处理MCP请求和响应的Web服务器。完成这项工作后，我们可以向服务器添加中间件，以增加安全层。
- en: This uses Starlette; however, that server isn’t easy to get a hold of for your
    MCP server. So instead, you need to take control of the bootstrapping of the server
    and add the middleware yourself.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这使用Starlette；然而，对于您的MCP服务器来说，获取这个服务器并不容易。因此，您需要控制服务器的启动，并自己添加中间件。
- en: 'First, let’s create our MCP server instance:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们创建我们的MCP服务器实例：
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Second, let’s see how we can create the Starlette MCP app, which should use
    the Streamable HTTP transport:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，让我们看看我们如何创建Starlette MCP应用程序，它应该使用Streamable HTTP传输：
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Next, we need the bootstrap code that will run the server. This is done using
    Uvicorn:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要运行服务器的启动代码。这是使用Uvicorn完成的：
- en: '[PRE3]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Creating the middleware
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建中间件
- en: To create our middleware, we need to remember how it should work. The middleware
    should check for the `Authorization` header, validate the credentials, and either
    allow the request to proceed or return an error response.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建我们的中间件，我们需要记住它应该如何工作。中间件应该检查`Authorization`头部，验证凭证，然后允许请求继续或返回错误响应。
- en: 'With that in mind, here’s what the middleware can look like. We need the middleware
    itself and a function to validate the token. Middleware in Starlette is created
    by subclassing `BaseHTTPMiddleware`. It has the request and a `call_next` function
    that you call to proceed with the request, should the validation be successful.
    If not, you should return a response with an error code:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，以下是中间件可能的样子。我们需要中间件本身和一个验证令牌的函数。在Starlette中创建中间件是通过从`BaseHTTPMiddleware`派生来实现的。它有一个请求和一个`call_next`函数，如果验证成功，你应该调用它来继续请求。如果不成功，你应该返回一个带有错误代码的响应：
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The logic of the middleware is as follows:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 中间件的逻辑如下：
- en: Check whether the `Authorization` header is present. If not, return a `401 Unauthorized`
    response.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查`Authorization`头是否存在。如果不存在，则返回`401 Unauthorized`响应。
- en: Validate the token; if the token is invalid, return a `403 Forbidden` response.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证令牌；如果令牌无效，则返回`403 Forbidden`响应。
- en: If the token is valid, proceed with the request and add a custom header to the
    response. We proceed with the request by calling `call_next(request)`, which will
    pass the request to the next middleware or the actual endpoint handler.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果令牌有效，继续请求并添加一个自定义头到响应中。我们通过调用`call_next(request)`来继续请求，这将把请求传递给下一个中间件或实际的端点处理器。
- en: 'The final part is to add the middleware to the Starlette app:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的部分是将中间件添加到Starlette应用中：
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In this code, we create a list of middleware and add `CustomHeaderMiddleware`
    to it. Then, in the `main` function, we add the middleware to the Starlette app
    using `starlette_app.add_middleware(CustomHeaderMiddleware)`.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码中，我们创建了一个中间件列表，并将`CustomHeaderMiddleware`添加到其中。然后，在`main`函数中，我们使用`starlette_app.add_middleware(CustomHeaderMiddleware)`将中间件添加到Starlette应用中。
- en: Testing the middleware
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试中间件
- en: To test the middleware, we can use the same client code as before, but this
    time, we need to include the `Authorization` header with a valid token.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试中间件，我们可以使用之前相同的客户端代码，但这次我们需要包含带有有效令牌的`Authorization`头。
- en: 'Here’s how the client code can look:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是客户端代码可能的样子：
- en: '[PRE6]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: To test it with an MCP client, it’s the same idea, but we need to know how to
    pass custom headers with the MCP client. Here’s how you can do it.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用MCP客户端进行测试，思路相同，但我们需要知道如何使用MCP客户端传递自定义头。下面是如何做到这一点的方法。
- en: 'Here, we use `streamablehttp_client` from the MCP SDK to create a client. We
    pass the `Authorization` header via the `headers` parameter:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用MCP SDK中的`streamablehttp_client`来创建一个客户端。我们通过`headers`参数传递`Authorization`头：
- en: '[PRE7]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s look at JWT next.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看JWT。
- en: Hardening security with JWT
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用JWT强化安全性
- en: 'What’s the benefit of JWT rather than basic authentication? Well, with JWT,
    you can have more granular control over what the client can do. You can include
    claims in the token that specify what the client is allowed to do. For example,
    you can include a claim that specifies that the client is only allowed to read
    data, but not write data. This would look like something like this:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: JWT与基本认证相比有什么好处？嗯，使用JWT，你可以对客户端可以做什么有更细粒度的控制。你可以在令牌中包含声明，指定客户端被允许做什么。例如，你可以包含一个声明，指定客户端只能读取数据，但不能写入数据。这看起来可能像这样：
- en: '[PRE8]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This token payload specifies that the client is allowed to read user data.
    The server can then check the token and see whether the client has the required
    scope to perform the requested action. There are a lot of other benefits as well,
    such as the following:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 此令牌负载指定客户端被允许读取用户数据。然后服务器可以检查令牌，看客户端是否有执行请求操作所需的范围。还有许多其他好处，例如以下内容：
- en: '**Stateless**: The server doesn’t need to store any session information. The
    token contains all the information needed to authenticate the client.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无状态**：服务器不需要存储任何会话信息。令牌包含所有用于验证客户端所需的信息。'
- en: '**Scalability**: Since the server doesn’t need to store any session information,
    it can easily scale horizontally.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：由于服务器不需要存储任何会话信息，它可以轻松地进行横向扩展。'
- en: '**Security**: The token can be signed and/or encrypted to ensure its integrity
    and confidentiality.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：令牌可以被签名和/或加密，以确保其完整性和机密性。'
- en: '**Flexibility**: The token can include any number of custom claims, allowing
    for a wide range of use cases.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：令牌可以包含任意数量的自定义声明，允许广泛的应用场景。'
- en: '**Interoperability**: JWT is a widely adopted standard, making it easy to integrate
    with other systems and services.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互操作性**：JWT是一个广泛采用的标准，使其与其他系统和服务的集成变得容易。'
- en: Okay, all of that sounds great, but let’s take you through what you need to
    do to *upgrade* your basic authentication to JWT. First off, let’s talk about
    how JWT works.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所有这些都听起来很棒，但让我们来了解一下您需要做什么来将基本身份验证升级到JWT。首先，让我们谈谈JWT是如何工作的。
- en: How does JWT work?
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: JWT是如何工作的？
- en: 'JWT is a compact, URL-safe means of representing claims to be transferred between
    two parties. The claims in a JWT are encoded as a JSON object. This JSON object
    has three parts separated by dots (`.`):'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: JWT是一种紧凑、URL安全的表示声明的方式，用于在双方之间传输。JWT中的声明编码为JSON对象。此JSON对象由三个部分组成，由点（`.`）分隔：
- en: '**Header**: This typically consists of two parts: the type of the token (`JWT`)
    and the signing algorithm being used, such as HMAC SHA256 or RSA. A header typically
    looks like this:'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**头部**：这通常由两部分组成：令牌的类型（`JWT`）和所使用的签名算法，例如HMAC SHA256或RSA。头部通常看起来像这样：'
- en: '[PRE9]'
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Here we see that the algorithm used is HMAC SHA256, and the type is `JWT`. This
    information is important for the server to know how to verify the token.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到使用的算法是HMAC SHA256，类型是`JWT`。这些信息对于服务器来说很重要，因为服务器需要知道如何验证令牌。
- en: '**Payload**: This contains the claims. Claims are statements about an entity
    (typically, the user) and additional data. There are three types of claims: registered,
    public, and private claims. A payload typically looks like this:'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有效载荷**：这包含声明。声明是关于实体（通常是用户）和附加数据的陈述。有三种类型的声明：注册、公共和私有声明。有效载荷通常看起来像这样：'
- en: '[PRE10]'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This payload represents a user with an ID of `1234567890`, the name `User Userson`,
    who is not an admin, and the `User.Write` and `User.Read` scopes. The `iat` claim
    represents the time the token was issued, and the `exp` claim represents the time
    the token expires.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 此有效载荷代表一个ID为`1234567890`的用户，名为`User Userson`，不是管理员，并且具有`User.Write`和`User.Read`作用域。`iat`声明表示令牌签发的时间，而`exp`声明表示令牌过期的时间。
- en: '**Signature**: This is used to verify that the sender of the JWT is who it
    says it is and to ensure that the message wasn’t changed along the way.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**签名**：这用于验证JWT的发送者是否为声明者本人，并确保消息在传输过程中未被更改。'
- en: Creating a JWT
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建JWT
- en: 'Okay, so we know what parts we have, but how do we create a JWT? Well, it’s
    actually quite simple. You can use a library to create the JWT for you. Here’s
    how you can do it:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以我们知道了我们有哪些部分，但我们如何创建JWT呢？实际上，这相当简单。您可以使用库为您创建JWT。以下是您如何做到这一点的示例：
- en: '[PRE11]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: With this code, you can create a JWT with a header, payload, and signature.
    The `jwt.encode` function takes care of encoding the header and payload, and signing
    the token with the secret. The signature is created as part of the `jwt.encode`
    function. Now, the `token` variable is in Base64-encoded format and can be used
    as a bearer token in the `Authorization` header. If you remove the Base64 encoding,
    you would see that the token consists of three parts separated by dots (`.`),
    namely, the header, payload, and signature, as mentioned previously. To decode
    the token, however, you would see the header and payload in JSON format.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这段代码，您可以创建一个包含头部、有效载荷和签名的JWT。`jwt.encode`函数负责编码头部和有效载荷，并使用密钥对令牌进行签名。签名是作为`jwt.encode`函数的一部分创建的。现在，`token`变量是Base64编码格式，可以用作`Authorization`头部的承载令牌。如果您移除Base64编码，您会看到令牌由三个部分组成，由点（`.`）分隔，即头部、有效载荷和签名，如前所述。但是，要解码令牌，您会看到头部和有效载荷以JSON格式显示。
- en: Validating the JWT
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 验证JWT
- en: 'We also need to know how to validate the JWT. What we do when we validate is
    ensure that the token is valid, not expired, and that the signature is correct.
    That’s by no means all we can do, but it’s a good start. Here’s how you can validate
    a JWT:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要了解如何验证JWT。我们在验证时确保令牌有效、未过期，以及签名正确。这绝对不是我们能做的全部，但这是一个良好的开始。以下是您如何验证JWT的方法：
- en: '[PRE12]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This code checks that the token is valid, not expired, and that the signature
    is correct. If the token is valid, it prints the decoded claims. If the token
    has expired or is invalid, it prints an error message.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码检查令牌是否有效、未过期，以及签名是否正确。如果令牌有效，它将打印解码的声明。如果令牌已过期或无效，它将打印错误信息。
- en: 'We mentioned earlier that these structural checks are a good start. What other
    checks should we do? Here are some ideas of things you can check:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前提到，这些结构检查是一个良好的开始。我们还应该进行哪些其他检查？以下是一些您可以检查的想法：
- en: The `iss` (issuer) claim to ensure the token was issued by a trusted authority,
    for example, your auth server.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`iss`（发行者）声明，以确保令牌是由受信任的权威机构签发的，例如您的认证服务器。'
- en: The `aud` (audience) claim to ensure the token is intended for your application.
    Valid values could be your MCP server URL.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`aud`（受众）声明确保令牌是针对你的应用的。有效的值可以是你的MCP服务器URL。'
- en: The `nbf` (not before) claim to ensure the token is not used before a certain
    time.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`nbf`（not before）声明确保令牌在特定时间之前不被使用。'
- en: Scopes or roles, to ensure the client has the required permissions to perform
    the requested action. Examples of scopes could be `User.Read`, `User.Write`, `Admin.Read`,
    and `Admin.Write`, and the roles could be `User`, `Admin`, and so on. These look
    similar, but scopes are typically more granular than roles.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 范围或角色，以确保客户端具有执行请求操作所需的权限。范围示例可以是`User.Read`、`User.Write`、`Admin.Read`和`Admin.Write`，角色可以是`User`、`Admin`等。它们看起来很相似，但范围通常比角色更细粒度。
- en: Integrating the JWT in our middleware (and MCP server)
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我们的中间件（和MCP服务器）中集成JWT
- en: 'So far, you’ve seen how we perform basic authentication and check whether a
    credential is valid as part of our middleware. Now, let’s see how we can integrate
    JWT validation. Our plan is as follows:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经看到了我们如何执行基本身份验证并检查凭证是否有效，作为我们中间件的一部分。现在，让我们看看我们如何集成JWT验证。我们的计划如下：
- en: Create a JWT for testing. We will do so with a utility script. In a real-world
    application, you would get the token from an **identity provider** (**IDP**) such
    as Auth0, Keycloak, or Entra ID.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个用于测试的JWT。我们将使用实用脚本来完成。在实际应用中，你会从**身份提供者**（**IDP**）如Auth0、Keycloak或Entra
    ID获取令牌。
- en: Update the middleware to validate the JWT.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新中间件以验证JWT。
- en: Update the client to send the JWT in the `Authorization` header.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新客户端以在`Authorization`头部发送JWT。
- en: Creating a JWT for testing
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建用于测试的JWT
- en: 'Here’s the utility code we will use to create a JWT token for testing, including
    functions for generating a JWT and validating it:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们将用于创建JWT测试令牌的实用代码，包括生成JWT和验证它的函数：
- en: '[PRE13]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: In this code, we create a JWT with a header, payload, and signature. The `create_jwt`
    function generates the token and writes it to a `.env` file. Note how the `validate_jwt`
    function validates the token and returns the decoded claims if the token is valid.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码中，我们创建了一个包含头部、有效载荷和签名的JWT。`create_jwt`函数生成令牌并将其写入`.env`文件。注意`validate_jwt`函数如何验证令牌，并在令牌有效时返回解码后的声明。
- en: Updating the client to send the JWT
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新客户端以发送JWT
- en: 'Let’s move on to the client. It will need to load the token from the `.env`
    file and send it in the `Authorization` header. Here’s how you can do it:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们转到客户端。它需要从`.env`文件中加载令牌并将其发送到`Authorization`头部。以下是你可以这样做的方法：
- en: '[PRE14]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Updating the server middleware to validate the JWT
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新服务器中间件以验证JWT
- en: 'Finally, we need to update the server middleware to validate the JWT. Here’s
    how we can do it:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要更新服务器中间件以验证JWT。以下是我们可以这样做的方法：
- en: '[PRE15]python'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE15]python'
- en: from starlette.middleware.base import BaseHTTPMiddleware
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: from starlette.middleware.base import BaseHTTPMiddleware
- en: from starlette.responses import Response
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: from starlette.responses import Response
- en: 'class JWTMiddleware(BaseHTTPMiddleware):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 'class JWTMiddleware(BaseHTTPMiddleware):'
- en: 'async def dispatch(self, request, call_next):'
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'async def dispatch(self, request, call_next):'
- en: token = request.headers.get("Authorization")
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: token = request.headers.get("Authorization")
- en: 'if not token or not token.startswith("Bearer "):'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'if not token or not token.startswith("Bearer "):'
- en: return Response("Unauthorized", status_code=401)
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: return Response("Unauthorized", status_code=401)
- en: jwt_token = token.split(" ")[1]
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: jwt_token = token.split(" ")[1]
- en: decoded = validate_jwt(jwt_token)
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: decoded = validate_jwt(jwt_token)
- en: 'if not decoded:'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'if not decoded:'
- en: return Response("Unauthorized", status_code=401)
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: return Response("Unauthorized", status_code=401)
- en: TODO, check things like existing user, scopes etc.
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: TODO，检查现有用户、作用域等。
- en: Optionally attach user info to request.state
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可选地将用户信息附加到request.state
- en: request.state.user = decoded
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: request.state.user = decoded
- en: response = await call_next(request)
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: response = await call_next(request)
- en: return response
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: return response
- en: '[PRE16]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: auth=AuthSettings(
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: auth=AuthSettings(
- en: 'issuer_url=AnyHttpUrl("https://auth.example.com"),  #'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'issuer_url=AnyHttpUrl("https://auth.example.com"),  #'
- en: Authorization Server URL
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 授权服务器URL
- en: 'resource_server_url=AnyHttpUrl("http://localhost:3001"),  # This'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'resource_server_url=AnyHttpUrl("http://localhost:3001"),  # This'
- en: server's URL
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 服务器URL
- en: required_scopes=["user"],
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: required_scopes=["user"],
- en: )
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: )
- en: '[PRE17]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Step 1: Simulate browser redirect to /authorize'
  id: totrans-139
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第1步：模拟浏览器重定向到/authorize
- en: authorize_url = f"{AUTH_SERVER}/authorize?client_id={CLIENT_ID}
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: authorize_url = f"{AUTH_SERVER}/authorize?client_id={CLIENT_ID}
- en: '&redirect_uri={REDIRECT_URI}&state={STATE}'
  id: totrans-141
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '&redirect_uri={REDIRECT_URI}&state={STATE}'
- en: '&code_challenge={CODE_CHALLENGE}&code_challenge_method=plain"'
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '&code_challenge={CODE_CHALLENGE}&code_challenge_method=plain"'
- en: 'print(f"Requesting authorization: {authorize_url}")'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 'print(f"Requesting authorization: {authorize_url}")'
- en: response = requests.get(authorize_url, allow_redirects=False)
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: response = requests.get(authorize_url, allow_redirects=False)
- en: 'Step 2: Extract authorization code from redirect'
  id: totrans-145
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第2步：从重定向中提取授权代码
- en: redirect_location = response.headers.get("Location")
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: redirect_location = response.headers.get("Location")
- en: 'if not redirect_location:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有重定向位置：
- en: print("Authorization server did not redirect. Is it running?")
  id: totrans-148
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: print("授权服务器未重定向。它是否正在运行？")
- en: exit(1)
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: exit(1)
- en: parsed_url = urlparse(redirect_location)
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: parsed_url = urlparse(redirect_location)
- en: query_params = parse_qs(parsed_url.query)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: query_params = parse_qs(parsed_url.query)
- en: auth_code = query_params.get("code", [None])[0]
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: auth_code = query_params.get("code", [None])[0]
- en: 'print(f"Received authorization code: {auth_code}")'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 'print(f"收到授权代码: {auth_code}")'
- en: 'Step 3: Exchange code for access token'
  id: totrans-154
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3步：用代码交换访问令牌
- en: token_response = requests.post(f"{AUTH_SERVER}/token", data={
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: token_response = requests.post(f"{AUTH_SERVER}/token", data={
- en: '"grant_type": "authorization_code",'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"grant_type": "authorization_code",'
- en: '"code": auth_code,'
  id: totrans-157
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"code": auth_code,'
- en: '"redirect_uri": REDIRECT_URI,'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"redirect_uri": REDIRECT_URI,'
- en: '"client_id": CLIENT_ID,'
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"client_id": CLIENT_ID,'
- en: '"code_verifier": CODE_VERIFIER'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"code_verifier": CODE_VERIFIER'
- en: '})'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '})'
- en: token_data = token_response.json()
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: token_data = token_response.json()
- en: access_token = token_data.get("access_token")
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: access_token = token_data.get("access_token")
- en: 'print(f"Access token: {access_token}")'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 'print(f"访问令牌: {access_token}")'
- en: 'Step 4: Call resource server'
  id: totrans-165
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第4步：调用资源服务器
- en: resource_response = requests.get(f"{RESOURCE_SERVER}/userinfo", headers={
  id: totrans-166
