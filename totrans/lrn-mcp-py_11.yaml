- en: '11'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Securing Your Application
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In many cases, a prerequisite for a web application is to secure it before you
    put it in production. There are definitely cases where you don’t need to do that,
    but in most cases, you want to make sure that your application is secure and that
    only authorized users can access certain parts of it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at some scenarios and what security measures you should consider
    for each of them:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Scenario** | **Sensitivity level** | **Security measures** | **Rationale**
    |'
  prefs: []
  type: TYPE_TB
- en: '| Public data that anyone can access | Minimal risk of exposure | Basic security
    or none | If you want to prevent bots or similar from using your API excessively,
    opt for having users sign up for an API key |'
  prefs: []
  type: TYPE_TB
- en: '| Some public data and some protected data | Moderate risk of exposure | Basic
    security with HTTPS and API keys | Protect sensitive data while allowing public
    access to non-sensitive data |'
  prefs: []
  type: TYPE_TB
- en: '| Sensitive personal data (e.g., health records and financial information)
    | High risk of exposure | Advanced security with HTTPS, OAuth 2.0/2.1, encryption,
    and RBAC | Comply with regulations such as **General Data Protection Regulation**
    (**GDPR**) and **Health Insurance Portability and Accountability Act** (**HIPAA**),
    and ensure data privacy and integrity |'
  prefs: []
  type: TYPE_TB
- en: Table 11.1 – Security measures scenarios
  prefs: []
  type: TYPE_NORMAL
- en: With that in mind, let’s look at some common security measures you can implement
    in your web application.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn how to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Add basic authentication to your application
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Secure your application with a **JSON Web Token** (**JWT**)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use OAuth2 to secure your application for an even better security posture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Basic authentication
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hardening security with JWT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How does JWT work?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating a JWT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating JWT in our middleware (and MCP server)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OAuth2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Basic authentication
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Basic authentication is the simplest way to secure your application. It involves
    sending a username and password with each request to the server. This is definitely
    not the most secure way to do it. If it’s not that secure, why would you use it?
    Well, there are scenarios where it’s better to have at least *some* security than
    no security at all. For example, if you have an API and it’s generally open to
    the public but you want to restrict access to certain endpoints, basic authentication
    can be a good option.
  prefs: []
  type: TYPE_NORMAL
- en: 'How does it work under the hood? The client sends an `Authorization` header
    with each request. The value of this header is the word `Basic` followed by a
    space and a Base64-encoded string of the format `username:password`. The server
    then decodes this string and checks whether the username and password are valid.
    Here’s the flow of how it works:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.1 – Basic authentication flow](img/B34121_11_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.1 – Basic authentication flow
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes the basic authentication consists of an API key instead of a username
    and password. The API key is sent in the same way as the username and password,
    but it’s just a single string that identifies the client. The server then checks
    whether the API key is valid.
  prefs: []
  type: TYPE_NORMAL
- en: 'From a code viewpoint, here’s what it can look like when the client sends a
    request with basic authentication:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](img/3.png)**Quick tip**: Enhance your coding experience with the **AI Code
    Explainer** and **Quick Copy** features. Open this book in the next-gen Packt
    Reader. Click the **Copy** button'
  prefs: []
  type: TYPE_NORMAL
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  prefs: []
  type: TYPE_NORMAL
- en: (**2**) to get the AI assistant to explain a block of code to you.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with a black text  AI-generated content may be incorrect.](img/image_%282%29.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](img/2.png)**The next-gen Packt Reader** is included for free with the purchase
