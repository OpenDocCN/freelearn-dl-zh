- en: Using basic authentication for our MCP server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s leverage this technique to secure our MCP server. After all, we don’t
    want just anyone to be able to access our server and potentially misuse it. To
    get this to work, we need two things:'
  prefs: []
  type: TYPE_NORMAL
- en: A server middleware that checks for the `Authorization` header and validates
    the credentials
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The client that sends the `Authorization` header with each request
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing the MCP server and bootstrapping it as a web app
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First things first, we need to implement the MCP server and bootstrap it as
    a web app. In doing so, we will have a web server that can handle MCP requests
    and responses. Once we’re done with this, we can add the middleware to the server
    that will add the security layer.
  prefs: []
  type: TYPE_NORMAL
- en: This uses Starlette; however, that server isn’t easy to get a hold of for your
    MCP server. So instead, you need to take control of the bootstrapping of the server
    and add the middleware yourself.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let’s create our MCP server instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Second, let’s see how we can create the Starlette MCP app, which should use
    the Streamable HTTP transport:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we need the bootstrap code that will run the server. This is done using
    Uvicorn:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Creating the middleware
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To create our middleware, we need to remember how it should work. The middleware
    should check for the `Authorization` header, validate the credentials, and either
    allow the request to proceed or return an error response.
  prefs: []
  type: TYPE_NORMAL
- en: 'With that in mind, here’s what the middleware can look like. We need the middleware
    itself and a function to validate the token. Middleware in Starlette is created
    by subclassing `BaseHTTPMiddleware`. It has the request and a `call_next` function
    that you call to proceed with the request, should the validation be successful.
    If not, you should return a response with an error code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The logic of the middleware is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Check whether the `Authorization` header is present. If not, return a `401 Unauthorized`
    response.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Validate the token; if the token is invalid, return a `403 Forbidden` response.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the token is valid, proceed with the request and add a custom header to the
    response. We proceed with the request by calling `call_next(request)`, which will
    pass the request to the next middleware or the actual endpoint handler.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The final part is to add the middleware to the Starlette app:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we create a list of middleware and add `CustomHeaderMiddleware`
    to it. Then, in the `main` function, we add the middleware to the Starlette app
    using `starlette_app.add_middleware(CustomHeaderMiddleware)`.
  prefs: []
  type: TYPE_NORMAL
- en: Testing the middleware
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To test the middleware, we can use the same client code as before, but this
    time, we need to include the `Authorization` header with a valid token.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how the client code can look:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: To test it with an MCP client, it’s the same idea, but we need to know how to
    pass custom headers with the MCP client. Here’s how you can do it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we use `streamablehttp_client` from the MCP SDK to create a client. We
    pass the `Authorization` header via the `headers` parameter:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Let’s look at JWT next.
  prefs: []
  type: TYPE_NORMAL
- en: Hardening security with JWT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'What’s the benefit of JWT rather than basic authentication? Well, with JWT,
    you can have more granular control over what the client can do. You can include
    claims in the token that specify what the client is allowed to do. For example,
    you can include a claim that specifies that the client is only allowed to read
    data, but not write data. This would look like something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'This token payload specifies that the client is allowed to read user data.
    The server can then check the token and see whether the client has the required
    scope to perform the requested action. There are a lot of other benefits as well,
    such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stateless**: The server doesn’t need to store any session information. The
    token contains all the information needed to authenticate the client.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability**: Since the server doesn’t need to store any session information,
    it can easily scale horizontally.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security**: The token can be signed and/or encrypted to ensure its integrity
    and confidentiality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexibility**: The token can include any number of custom claims, allowing
    for a wide range of use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interoperability**: JWT is a widely adopted standard, making it easy to integrate
    with other systems and services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Okay, all of that sounds great, but let’s take you through what you need to
    do to *upgrade* your basic authentication to JWT. First off, let’s talk about
    how JWT works.
  prefs: []
  type: TYPE_NORMAL
- en: How does JWT work?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'JWT is a compact, URL-safe means of representing claims to be transferred between
    two parties. The claims in a JWT are encoded as a JSON object. This JSON object
    has three parts separated by dots (`.`):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Header**: This typically consists of two parts: the type of the token (`JWT`)
    and the signing algorithm being used, such as HMAC SHA256 or RSA. A header typically
    looks like this:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Here we see that the algorithm used is HMAC SHA256, and the type is `JWT`. This
    information is important for the server to know how to verify the token.
  prefs: []
  type: TYPE_NORMAL
- en: '**Payload**: This contains the claims. Claims are statements about an entity
    (typically, the user) and additional data. There are three types of claims: registered,
    public, and private claims. A payload typically looks like this:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This payload represents a user with an ID of `1234567890`, the name `User Userson`,
    who is not an admin, and the `User.Write` and `User.Read` scopes. The `iat` claim
    represents the time the token was issued, and the `exp` claim represents the time
    the token expires.
  prefs: []
  type: TYPE_NORMAL
- en: '**Signature**: This is used to verify that the sender of the JWT is who it
    says it is and to ensure that the message wasn’t changed along the way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating a JWT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Okay, so we know what parts we have, but how do we create a JWT? Well, it’s
    actually quite simple. You can use a library to create the JWT for you. Here’s
    how you can do it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: With this code, you can create a JWT with a header, payload, and signature.
    The `jwt.encode` function takes care of encoding the header and payload, and signing
    the token with the secret. The signature is created as part of the `jwt.encode`
    function. Now, the `token` variable is in Base64-encoded format and can be used
    as a bearer token in the `Authorization` header. If you remove the Base64 encoding,
    you would see that the token consists of three parts separated by dots (`.`),
    namely, the header, payload, and signature, as mentioned previously. To decode
    the token, however, you would see the header and payload in JSON format.
  prefs: []
  type: TYPE_NORMAL
- en: Validating the JWT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We also need to know how to validate the JWT. What we do when we validate is
    ensure that the token is valid, not expired, and that the signature is correct.
    That’s by no means all we can do, but it’s a good start. Here’s how you can validate
    a JWT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: This code checks that the token is valid, not expired, and that the signature
    is correct. If the token is valid, it prints the decoded claims. If the token
    has expired or is invalid, it prints an error message.
  prefs: []
  type: TYPE_NORMAL
- en: 'We mentioned earlier that these structural checks are a good start. What other
    checks should we do? Here are some ideas of things you can check:'
  prefs: []
  type: TYPE_NORMAL
- en: The `iss` (issuer) claim to ensure the token was issued by a trusted authority,
    for example, your auth server.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `aud` (audience) claim to ensure the token is intended for your application.
    Valid values could be your MCP server URL.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `nbf` (not before) claim to ensure the token is not used before a certain
    time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scopes or roles, to ensure the client has the required permissions to perform
    the requested action. Examples of scopes could be `User.Read`, `User.Write`, `Admin.Read`,
    and `Admin.Write`, and the roles could be `User`, `Admin`, and so on. These look
    similar, but scopes are typically more granular than roles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating the JWT in our middleware (and MCP server)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, you’ve seen how we perform basic authentication and check whether a
    credential is valid as part of our middleware. Now, let’s see how we can integrate
    JWT validation. Our plan is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a JWT for testing. We will do so with a utility script. In a real-world
    application, you would get the token from an **identity provider** (**IDP**) such
    as Auth0, Keycloak, or Entra ID.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Update the middleware to validate the JWT.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Update the client to send the JWT in the `Authorization` header.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating a JWT for testing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s the utility code we will use to create a JWT token for testing, including
    functions for generating a JWT and validating it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we create a JWT with a header, payload, and signature. The `create_jwt`
    function generates the token and writes it to a `.env` file. Note how the `validate_jwt`
    function validates the token and returns the decoded claims if the token is valid.
  prefs: []
  type: TYPE_NORMAL
- en: Updating the client to send the JWT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s move on to the client. It will need to load the token from the `.env`
    file and send it in the `Authorization` header. Here’s how you can do it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Updating the server middleware to validate the JWT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Finally, we need to update the server middleware to validate the JWT. Here’s
    how we can do it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]python'
  prefs: []
  type: TYPE_NORMAL
- en: from starlette.middleware.base import BaseHTTPMiddleware
  prefs: []
  type: TYPE_NORMAL
- en: from starlette.responses import Response
  prefs: []
  type: TYPE_NORMAL
- en: 'class JWTMiddleware(BaseHTTPMiddleware):'
  prefs: []
  type: TYPE_NORMAL
- en: 'async def dispatch(self, request, call_next):'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: token = request.headers.get("Authorization")
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'if not token or not token.startswith("Bearer "):'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: return Response("Unauthorized", status_code=401)
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: jwt_token = token.split(" ")[1]
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: decoded = validate_jwt(jwt_token)
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'if not decoded:'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: return Response("Unauthorized", status_code=401)
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: TODO, check things like existing user, scopes etc.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
- en: Optionally attach user info to request.state
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
- en: request.state.user = decoded
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: response = await call_next(request)
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: return response
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: auth=AuthSettings(
  prefs: []
  type: TYPE_NORMAL
- en: 'issuer_url=AnyHttpUrl("https://auth.example.com"),  #'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: Authorization Server URL
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'resource_server_url=AnyHttpUrl("http://localhost:3001"),  # This'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: server's URL
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: required_scopes=["user"],
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: )
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 1: Simulate browser redirect to /authorize'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: authorize_url = f"{AUTH_SERVER}/authorize?client_id={CLIENT_ID}
  prefs: []
  type: TYPE_NORMAL
- en: '&redirect_uri={REDIRECT_URI}&state={STATE}'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '&code_challenge={CODE_CHALLENGE}&code_challenge_method=plain"'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'print(f"Requesting authorization: {authorize_url}")'
  prefs: []
  type: TYPE_NORMAL
- en: response = requests.get(authorize_url, allow_redirects=False)
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Extract authorization code from redirect'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: redirect_location = response.headers.get("Location")
  prefs: []
  type: TYPE_NORMAL
- en: 'if not redirect_location:'
  prefs: []
  type: TYPE_NORMAL
- en: print("Authorization server did not redirect. Is it running?")
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: exit(1)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: parsed_url = urlparse(redirect_location)
  prefs: []
  type: TYPE_NORMAL
- en: query_params = parse_qs(parsed_url.query)
  prefs: []
  type: TYPE_NORMAL
- en: auth_code = query_params.get("code", [None])[0]
  prefs: []
  type: TYPE_NORMAL
- en: 'print(f"Received authorization code: {auth_code}")'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Exchange code for access token'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: token_response = requests.post(f"{AUTH_SERVER}/token", data={
  prefs: []
  type: TYPE_NORMAL
- en: '"grant_type": "authorization_code",'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '"code": auth_code,'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '"redirect_uri": REDIRECT_URI,'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '"client_id": CLIENT_ID,'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '"code_verifier": CODE_VERIFIER'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '})'
  prefs: []
  type: TYPE_NORMAL
