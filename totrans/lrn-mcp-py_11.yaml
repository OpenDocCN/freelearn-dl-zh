- en: Summary
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you’ve learned about the importance of securing your MCP server
    and client. You’ve seen how to implement basic authentication, JWT, and OAuth2.1
    to enhance the security of your applications. Remember that security is an ongoing
    process, and it’s essential to stay updated with the latest best practices and
    technologies to protect your applications and data. In our next and final chapter,
    we’ll explore how to bring your MCP server to production and ensure that it’s
    robust and scalable.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了保护你的MCP服务器和客户端的重要性。你看到了如何实现基本身份验证、JWT和OAuth2.1以增强你应用程序的安全性。请记住，安全性是一个持续的过程，并且保持对最新最佳实践和技术更新的了解对于保护你的应用程序和数据至关重要。在我们的下一章和最后一章中，我们将探讨如何将你的MCP服务器推向生产并确保它是健壮和可扩展的。
- en: 'Assignment 1: Secure your MCP server with basic authentication'
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 'Assignment 1: 使用基本身份验证保护你的MCP服务器'
- en: In this assignment, you’re asked to implement basic authentication in your MCP
    server, which involves the creation of a middleware that checks for the `Authorization`
    header in incoming requests. The client should send the credentials in the `Authorization`
    header. This is a good first step to secure your MCP server, but remember that
    basic authentication has its limitations and should ideally be replaced with more
    secure methods.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个任务中，你被要求在你的MCP服务器中实现基本身份验证，这涉及到创建一个中间件来检查传入请求中的`Authorization`头。客户端应在`Authorization`头中发送凭证。这是保护你的MCP服务器的一个好步骤，但请记住，基本身份验证有其局限性，理想情况下应替换为更安全的方法。
- en: Review the code snippets provided earlier in the section on basic authentication
    for guidance.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 请参考本节中关于基本身份验证提供的代码片段以获取指导。
