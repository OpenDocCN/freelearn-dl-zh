- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Leveraging PowerPoint’s Slide Master for Design
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用PowerPoint的幻灯片母版进行设计
- en: PowerPoint’s **s** **lide master** is a design feature that is still overlooked
    by so many presentation creators and presenters. This is the main reason why I
    have seen so many presentation files where content has been created by hand *on
    each slide* . No wonder people have been complaining all this time that slide
    creation takes so much time!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint的**幻灯片母版**是一个被许多演示文稿创建者和演讲者忽视的设计功能。这就是为什么我见过这么多演示文稿文件，其内容是在每张幻灯片上手动创建的。难怪人们一直抱怨幻灯片创建花费了这么多时间！
- en: 'Therefore, the use of slide master is one of the first topics I go through
    in my training sessions. If you are still creating your slides by deleting the
    placeholders you see on the blank slides and get busy adding text boxes and other
    types of content manually, this chapter will help you gain hours of your life
    back. I usually even make this bold statement to users: if you use the Slide Master
    feature, you’ll automate up to 90% of your presentation design tasks. You’ll stop
    re-creating basic designs on each slide to focus on adding your content.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在培训课程中，我首先讲解的是幻灯片母版的使用。如果您仍然通过删除空白幻灯片上看到的占位符，并手动添加文本框和其他类型的内容来创建幻灯片，这一章节将帮助您找回数小时的生命。我通常还会对用户做出这样的明确声明：如果您使用幻灯片母版功能，您将自动化高达90%的演示文稿设计任务。您将停止在每个幻灯片上重新创建基本设计，以便专注于添加内容。
- en: The goal here is not to show you how to build a robust corporate template. If
    that is what you need, you will find a resource in the *Further reading* section
    from my friends Echo Swinford and Julie Terberg – *they* are the template gurus
    in our industry, and you should read their book if you need to create functional
    templates for your organization. Instead, I will focus on the main functions in
    the Slide Master feature that will help you to create your presentations quickly
    when you don’t have a corporate template or if you need to adapt an existing one.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的目标不是向您展示如何构建一个健壮的企业模板。如果您需要这样的模板，您可以在我的朋友Echo Swinford和Julie Terberg的*进一步阅读*部分找到资源——*他们*是我们行业中的模板大师，如果您需要为您的组织创建功能模板，您应该阅读他们的书籍。相反，我将专注于幻灯片母版功能中的主要功能，这将帮助您在没有企业模板或需要调整现有模板时快速创建演示文稿。
- en: 'In this chapter, we will focus on the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将关注以下主题：
- en: Understanding **layouts** and **placeholders**
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解**版式**和**占位符**
- en: Choosing fonts and colors
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择字体和颜色
- en: Configuring standard layouts
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置标准版式
- en: Adding custom layouts
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加自定义版式
- en: Making your slide master compatible for AI services
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使您的幻灯片母版兼容AI服务
- en: Technical requirements
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: PowerPoint’s Slide Master feature can be found in all desktop versions of the
    application. Except for the last section in the chapter, the topics discussed
    can be applied to whichever version of PowerPoint you are using, although you
    might encounter some differences if you are not using PowerPoint in its **Microsoft
    365** subscription model. The topic *Making your slide master compatible for AI
    services* applies to users subscribing to Copilot for M365.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint的幻灯片母版功能可在所有桌面版本的应用程序中找到。除了本章的最后部分，讨论的主题可以应用于您使用的PowerPoint的任何版本，尽管如果您不是在**Microsoft
    365**订阅模式下使用PowerPoint，您可能会遇到一些差异。*使您的幻灯片母版兼容AI服务*这一主题适用于订阅Copilot for M365的用户。
- en: Understanding layouts and placeholders
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解版式和占位符
- en: 'Through the years, I have seen many people start a new presentation and tell
    me they did not like the text boxes on the first slide, so they just deleted them
    to start from scratch. Unfortunately for them, they did not know that doing so
    would make them work much harder than necessary to create their slides. This also
    makes it even harder if they decide to change the overall look of their presentation.
    This huge mistake usually happens because users don’t know about two fundamental
    features in PowerPoint: **layouts** and **placeholders** . So, let’s show you
    what they are and how they will help you create your content faster.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 几年来，我见过很多人开始制作新的演示文稿，并告诉我他们不喜欢第一张幻灯片上的文本框，所以他们直接删除它们从头开始。不幸的是，他们不知道这样做会使他们比必要的多付出很多努力来创建幻灯片。如果他们决定改变演示文稿的整体外观，这也会变得更加困难。这个巨大的错误通常发生是因为用户不知道PowerPoint中的两个基本功能：**版式**和**占位符**。所以，让我们向您展示它们是什么，以及它们将如何帮助您更快地创建内容。
- en: Layouts
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 版式
- en: 'When you start a new presentation with PowerPoint’s blank default template,
    your new file already includes a **title slide** . But there are more layouts
    available in the **Home** tab ( **1** ). To access these, in the **Slides** group
    ( **2** ), click on the **Slide Layout** ( **3** ) drop-down list ( *Figure 3.1*
    ) :'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用PowerPoint的空白默认模板开始一个新的演示文稿时，你的新文件已经包含了一个**标题幻灯片**。但在**主页**选项卡（**1**）中还有更多布局可用。要访问这些，在**幻灯片**组（**2**）中，点击**幻灯片布局**（**3**）下拉列表（*图3.1*）：
- en: '![Figure 3.1 – Finding the Slide Layout button from the Home tab in PowerPoint](img/B32063_03_01.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图3.1 – 在PowerPoint的主页选项卡中找到幻灯片布局按钮](img/B32063_03_01.png)'
- en: Figure 3.1 – Finding the Slide Layout button from the Home tab in PowerPoint
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 – 在PowerPoint的主页选项卡中找到幻灯片布局按钮
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能不正确。](img/1.png) **快速提示**：需要查看此图像的高分辨率版本？在下一代Packt Reader中打开此书或在其PDF/ePub副本中查看。'
- en: '![img](img/2.png) ** The next-gen Packt Reader ** is included for free with
    the purchase of this book. Scan the QR code OR go to [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '![img](img/2.png) **下一代Packt Reader**是随本书免费赠送的。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保你得到正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock2.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能不正确。](img/Unlock2.png)'
- en: 'As you can see in *Figure 3.1* , a new b lank presentation file already has
    nine default layouts you can choose from to organize your slide contents quickly:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在*图3.1*中可以看到的，一个新的空白演示文稿文件已经包含了九种默认布局，你可以从中选择以快速组织幻灯片内容：
- en: '**Title Slide**'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标题幻灯片**'
- en: '**Title and Content**'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标题和内容**'
- en: '**Section Header**'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**章节标题**'
- en: '**Two Content**'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双内容**'
- en: '**Comparison**'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比较**'
- en: '**Title Only**'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅标题**'
- en: '**Blank**'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**空白**'
- en: '**Content with Caption**'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**带标题的内容**'
- en: '**Picture with Caption**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**带标题的图片**'
- en: Whenever you are on a slide for which you want to organize the content differently,
    your first move should be to go to the **Slide Layout** button to change the layout
    of the slide. By using existing layouts, you are making sure similar elements
    on your slides will be placed in the same position across all your slides, creating
    a more consistent look, as discussed in [*Chapter 2*](Chapter_02.xhtml#_idTextAnchor130)
    . If the standard layouts don’t suit your needs, keep on reading because we will
    address that need in an upcoming section on **custom layouts** .
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 无论何时你处于想要以不同方式组织内容的幻灯片上，你的第一步应该是转到**幻灯片布局**按钮来更改幻灯片的布局。通过使用现有布局，你确保你的幻灯片上相似元素将在所有幻灯片中放置在相同的位置，从而创建一个更一致的外观，如[*第2章*](Chapter_02.xhtml#_idTextAnchor130)中讨论的那样。如果标准布局不符合你的需求，请继续阅读，因为我们将在一个关于**自定义布局**的即将到来的部分中解决这个需求。
- en: 'If you want to add a slide with a different layout than the previous one, then
    it will be more efficient to simply choose the layout you want from the **New
    Slide** ( **2** ) drop-down list in the **Home** tab ( **1** ) ( *Figure 3.2*
    ):'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要添加一个与上一个不同的布局的幻灯片，那么从**主页**选项卡（**1**）的**新建幻灯片**（**2**）下拉列表（*图3.2*）中选择你想要的布局将会更高效：
- en: '![Figure 3.2 – Using the New Slide button to choose a specific layout](img/B32063_03_02.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图3.2 – 使用“新建幻灯片”按钮选择特定布局](img/B32063_03_02.png)'
- en: Figure 3.2 – Using the New Slide button to choose a specific layout
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 – 使用“新建幻灯片”按钮选择特定布局
- en: When applying a new layout to an existing slide, if your content is not changing
    as expected, it might be because the slide was created using text boxes instead
    of the placeholders described in the next section. If that is the case, simply
    copy the text from the text boxes and paste it into the right placeholders. You
    can then delete th e text boxes and proceed with the layout changes with better
    results .
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当将新的布局应用到现有幻灯片上时，如果你的内容没有按预期改变，可能是因为该幻灯片是使用文本框而不是下一节中描述的占位符创建的。如果是这种情况，只需从文本框中复制文本并将其粘贴到正确的占位符中。然后你可以删除文本框，并继续进行布局更改，以获得更好的结果。
- en: Placeholders
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 占位符
- en: 'Layouts wou ld not be useful without **placeholders** ; these are the default
    boxes that you see on slides when you have applied a layout. At first glance,
    they might look like regular text boxes, but they are not. Placeholders are coded
    and managed differently than other slide elements by PowerPoint. The first way
    to differentiate them is the prompt text we see before adding any content ( *Figure
    3.3* ):'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 没有占位符，布局将没有用；这些是在您应用布局时在幻灯片上看到的默认框。乍一看，它们可能看起来像常规文本框，但并非如此。占位符由 PowerPoint 以不同于其他幻灯片元素的方式编码和管理。区分它们的第一种方法是我们在添加任何内容之前看到的提示文本（*图
    3.3*）：
- en: '![Figure 3.3 – Placeholders have prompt text before adding content](img/B32063_03_03.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.3 – 在添加内容之前占位符有提示文本](img/B32063_03_03.png)'
- en: Figure 3.3 – Placeholders have prompt text before adding content
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.3 – 在添加内容之前占位符有提示文本
- en: It is important to note that replacing placeholders with text boxes can make
    presentations inaccessible to people using screen readers. Knowing about placeholders
    is the first step to helping you navigate the functions we find in the Slide Master
    feature that we’ll cover in our next sect ion.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，用文本框替换占位符可能会使使用屏幕阅读器的人无法访问演示文稿。了解占位符是帮助您导航我们在下一节中将要介绍的幻灯片母版功能中找到的功能的第一步。
- en: Accessing layouts and placeholders through the slide master
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过幻灯片母版访问布局和占位符
- en: 'Now that you have a better unders tanding of layouts and their placehol ders,
    we can introduce the Slid e Master feature, the first of three types of masters
    discussed in this book (Document and Notes masters will be discussed in [*Chapter
    4*](Chapter_04.xhtml#_idTextAnchor387) ). The way I have been describing the Slide
    Master feature for many years is this: PowerPoint’s design automation tool that
    allows you to determine the overall look and feel of your presentation. It allows
    you to create a visually consistent look without having to create each element
    on every slide.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您对布局及其占位符有了更好的理解，我们可以介绍幻灯片母版功能，这是本书中讨论的三种母版类型中的第一种（文档母版和笔记母版将在[*第 4 章*](Chapter_04.xhtml#_idTextAnchor387)中讨论）。多年来我一直这样描述幻灯片母版功能：PowerPoint
    的设计自动化工具，允许您确定演示文稿的整体外观和感觉。它允许您创建一个视觉上一致的外观，而无需在每个幻灯片上创建每个元素。
- en: 'The way to access the slide mast er is by clicking the **View** tab ( **1**
    ), then clicking the **Slide Master** button ( **2** ) in the **Master Views**
    group ( *Figur e 3.4* ):'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 访问幻灯片母版的方式是点击**视图**选项卡（**1**），然后在**母版视图**组中点击**幻灯片母版**按钮（**2**）（*图 3.4*）：
- en: "![Figure 3.4 – Accessing the Slide Master feature through the View ta\uFEFF\
    b](img/B32063_03_04.png)"
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.4 – 通过“视图”选项卡访问幻灯片母版功能](img/B32063_03_04.png)'
- en: Figure 3.4 – Accessing the Slide Master feature through the View ta b
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.4 – 通过“视图”选项卡访问幻灯片母版功能
- en: 'After clicking on the **Slide Master** but ton, you will be shown a brand-new
    tab also called **Slide Master** ( **1** ) ( *Fi gure 3.5* ):'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**幻灯片母版**按钮后，您将看到一个全新的选项卡，也称为**幻灯片母版**（**1**）（*图 3.5*）：
- en: '![Figure 3.5 – The Slide Master view showing the master and the layouts](img/B32063_03_05.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.5 – 显示母版和布局的幻灯片母版视图](img/B32063_03_05.png)'
- en: Figure 3.5 – The Slide Master view showing the master and the layouts
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.5 – 显示母版和布局的幻灯片母版视图
- en: This view can be considered the backend of your presentation. Think of it as
    the place to create your visual standard for all your slides, whether they are
    placeholder positions, graphic elements required on all slides, or even font styles
    and colors, which will be discussed in the next section. Any visual element you
    want to find on all slides can be customized in **Slide Master** ( **2** ). Then,
    you can adapt these elements in the layouts ( **3** ), which are shown as the
    smaller thumbnails linked to the **Slide Master** feature. We will discuss how
    to do this in the sections titled *Configuring standard layouts* and *Adding custom
    layouts* .
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这个视图可以被认为是您演示文稿的后端。把它想象成创建所有幻灯片视觉标准的地方，无论是占位符位置、所有幻灯片上需要的图形元素，甚至是将在下一节讨论的字体样式和颜色。您想在所有幻灯片上找到的任何视觉元素都可以在**幻灯片母版**（**2**）中进行自定义。然后，您可以在布局（**3**）中调整这些元素，布局以较小的缩略图的形式显示，并与**幻灯片母版**功能相关联。我们将在名为*配置标准布局*和*添加自定义布局*的章节中讨论如何做到这一点。
- en: When you have accessed the **Slide Master** view, don’t forget that you need
    to click on the **Close Master View** button to get back into PowerPoint’s normal
    view to add content to your slides. Any time you want to make changes to the overall
    look of your slide master or layouts, go back to the **View** tab and click on
    **Sli de Master** .
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入**幻灯片母版**视图时，别忘了你需要点击**关闭母版视图**按钮才能回到PowerPoint的正常视图，以便向幻灯片中添加内容。任何你想对幻灯片母版或布局的整体外观进行更改的时候，回到**视图**选项卡，然后点击**幻灯片母版**。
- en: Now that we have explore d what layouts and placeholders a re and we know how
    to access a slide m aster, we will explore some of the features of the slide master,
    starting with how to choose fonts and colors.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了布局和占位符是什么，以及我们知道了如何访问幻灯片母版，我们将探索幻灯片母版的一些功能，从如何选择字体和颜色开始。
- en: Choosing fonts an d colors
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择字体和颜色
- en: Since the introduction of **Office 2007** , users have started to see the presence
    of **themes** in their applications. Just to keep the description short, we can
    say that themes help to define the overall look of a *document* in terms of colors,
    fonts, effects applied to shapes, and so on. As you might have noticed, I put
    emphasis on the word *document* . That’s because a theme can be applied throughout
    your Office applications, making your **Word** , **Excel** , and **PowerPoint**
    documents look more consistent. Microsoft supplies some free themes that can be
    found in the **Themes** list in the **Slide Master** view. If you want to learn
    more about themes, you should check out Echo Swinford and Julie Terberg’s book
    *Building PowerPoint Templates v2* , listed in *Further reading* .
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 自从**Office 2007**推出以来，用户开始在他们应用程序中看到**主题**的存在。为了使描述简短，我们可以这样说，主题有助于定义*文档*的整体外观，包括颜色、字体、应用于形状的效果等。正如你可能已经注意到的，我在*文档*这个词上加了强调。那是因为一个主题可以被应用到你的Office应用程序中，使你的**Word**、**Excel**和**PowerPoint**文档看起来更加一致。微软提供了一些免费的主题，可以在**幻灯片母版**视图中的**主题**列表中找到。如果你想了解更多关于主题的信息，你应该查看Echo
    Swinford和Julie Terberg的书籍*Building PowerPoint Templates v2*，该书籍列在**进一步阅读**中。
- en: Using one of Microsoft’s themes to create your presentations can help speed
    up the design process, if one suits your needs. But I would still advise you to
    make some changes so that your presentation will be more aligned with your organization’s
    look. One thing you might want to do when using one of Microsoft’s themes is change
    the colors and the pair of fonts. This process is the same if you decide to start
    with a template of your own or a new b lank presentation.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 使用微软的主题之一来创建你的演示文稿可以加快设计过程，如果其中一种符合你的需求。但我仍然建议你做一些修改，以便你的演示文稿将与你的组织外观更加一致。当你使用微软的主题之一时，你可能想要做的一件事是更改颜色和字体搭配。如果你决定从一个模板或一个新的空白演示文稿开始，这个过程是相同的。
- en: Selecting the color palet te
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择颜色调板
- en: 'Since I usually start my presentation process in the **Slide Master** tab,
    that’s also where I set my colors. From the **Slide Master** tab ( **1** ), simply
    click on the **Colors** button ( **2** ) to open the list of Office color palettes
    supplied by Microsoft ( **3** ), as s hown in *Figure 3.6* :'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我通常在**幻灯片母版**选项卡中开始我的演示文稿过程，因此我也在那里设置我的颜色。从**幻灯片母版**选项卡（**1**），只需点击**颜色**按钮（**2**）即可打开由微软提供的Office颜色调板列表（**3**），如图3.6所示：
- en: "![Figure 3.6 – Steps to select a color palette from the Slide M\uFEFFaster\
    \ tab](img/B32063_03_06.png)"
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图3.6 – 从幻灯片母版选项卡选择颜色调板的步骤](img/B32063_03_06.png)'
- en: Figure 3.6 – Steps to select a color palette from the Slide M aster tab
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6 – 从幻灯片母版选项卡选择颜色调板的步骤
- en: 'The other way to access color pal ettes in PowerPoint is through the **Design**
    tab ( **1** ), using the dropdown for background variants ( **2** ), and selecting
    **Colors** ( **3** ), as sh own in *Figure 3.7* :'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在PowerPoint中访问颜色调板的另一种方式是通过**设计**选项卡（**1**），使用背景变体的下拉菜单（**2**），然后选择**颜色**（**3**），如图3.7所示：
- en: '![Figure 3.7 – Accessing color palettes through the Design tab](img/B32063_03_07.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图3.7 – 通过设计选项卡访问颜色调板](img/B32063_03_07.png)'
- en: Figure 3.7 – Accessing color palettes through the Design tab
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.7 – 通过设计选项卡访问颜色调板
- en: Selecting any palette will help you create a consistent look throughout your
    content because you then have the color swatches available for font color, shape
    fill, and outline. Even though Microsoft provides a nice list of color palettes,
    if the stan dard Office choices don’t exactl y fit your corporate colors, you
    can customize them. This is what we will be discussing in our next section.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 选择任何调板将帮助您在整个内容中创建一致的外观，因为您将拥有可用于字体颜色、形状填充和轮廓的颜色色卡。尽管Microsoft提供了一系列不错的颜色调板，但如果标准的Office选择与您的公司颜色不完全匹配，您可以自定义它们。这就是我们将在下一节中讨论的内容。
- en: How to customize a color palette
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何自定义颜色调板
- en: 'If you need to customize some colors in a palette, you need to first open the
    **Colors** drop-down list ( **1** ) and click on **Customize Colors ...** ( **2**
    ) ( *Figure 3.8* ):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要自定义调板中的某些颜色，您需要首先打开**颜色**下拉列表（**1**）并点击**自定义颜色...**（**2**）（*图3.8*）：
- en: "![Figure 3.8 – Accessing the Customize Colors\uFEFF... function](img/B32063_03_08.png)"
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图3.8 – 访问自定义颜色...功能](img/B32063_03_08.png)'
- en: Figure 3.8 – Accessing the Customize Colors ... function
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8 – 访问自定义颜色...功能
- en: 'You will get the **Create New Theme Colors** window ( *Figure 3.9* ):'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 您将获得**创建新主题颜色**窗口（*图3.9*）：
- en: '![Figure 3.9 – Steps to create a new color palette](img/B32063_03_09.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图3.9 – 创建新颜色调板的步骤](img/B32063_03_09.png)'
- en: Figure 3.9 – Steps to create a new color palette
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.9 – 创建新颜色调板的步骤
- en: The window in *Figure 3.9* allows you to adjust any color by clicking on any
    of the colors in the theme ( **1** ) and then choosing the **More Colors...**
    option ( **2** ) to get to the new **Colors** window. This is where you will be
    able to choose a **Custom** color ( **3** ) from a color model (RGB and HSL),
    a hex code, or from the swatches in the **Stand ard** tab ( **4** ).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*图3.9*中的窗口允许您通过点击主题中的任何颜色来调整任何颜色，然后选择**更多颜色...**选项（**2**）以进入新的**颜色**窗口。这就是您将能够从颜色模型（RGB和HSL）、十六进制代码或**标准**选项卡中的色卡中选择**自定义**颜色（**3**）的地方。'
- en: 'When you have finished adjusting a color, click the **OK** button ( **5** )
    to confirm your choice and repeat the process for any other color you want to
    change. The only thing left to do when you have completed all color changes is
    to fill in **Name** ( **6** ) for your new custom palette and click **Save** to
    confirm. After confirming, you can see your new custom color palette ( **1** )
    in the **Colors** drop-down list in the **Varian ts** group ( *Figure 3.10* ):'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当您完成调整颜色后，点击**确定**按钮（**5**）以确认您的选择，并重复此过程以更改任何其他颜色。完成所有颜色更改后，您需要填写**名称**（**6**）以确认您的新自定义颜色调板，然后点击**保存**以确认。确认后，您可以在**颜色**下拉列表的**变体**组中看到您的新自定义颜色调板（**1**）（*图3.10*）：
- en: '![Figure 3.10 – Custom color palettes listed in the Custom section of Colors](img/B32063_03_10.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图3.10 – 在颜色中自定义部分列出的自定义颜色调板](img/B32063_03_10.png)'
- en: Figure 3.10 – Custom color palettes listed in the Custom section of Colors
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.10 – 在颜色中自定义部分列出的自定义颜色调板
- en: Things to be aware of when changing colors in a palette
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在调板中更改颜色时需要注意的事项
- en: 'PowerPoint’s color palettes are always set up in three sets ( *Figure 3.11*
    ):'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint的颜色调板始终设置为三组（*图3.11*）：
- en: Four swatches labeled as **Text/Background - Dark 1** , **Text/Background -
    Dark 2** , **Text/Background - Light 1** , and **Text/Background - Light 2** .
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 四种标签为**文本/背景 - 深色1**、**文本/背景 - 深色2**、**文本/背景 - 浅色1**和**文本/背景 - 浅色2**的色卡。
- en: Six **Accent** colors.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 六种**强调**颜色。
- en: Two colors for **Hyperlink** and **Followed Hyperlink** .
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 两种颜色用于**超链接**和**已访问超链接**。
- en: '![Figure 3.11 – Text/Background, Accent, and Hyperlink color categories](img/B32063_03_11.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图3.11 – 文本/背景、强调和超链接颜色类别](img/B32063_03_11.png)'
- en: Figure 3.11 – Text/Background, Accent, and Hyperlink color categories
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.11 – 文本/背景、强调和超链接颜色类别
- en: Since my goal is to help business users create their presentations more quickly,
    I will give you the basic elements you need to be aware of to make colors work
    in your presentations. For detailed information, I will again refer you to *Building
    PowerPoint Templates v2* , listed in *Further reading* .
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我的目标是帮助商业用户更快地创建演示文稿，因此我将向您提供您需要了解的基本元素，以便在演示文稿中使用颜色。有关详细信息，我再次将您推荐到*构建PowerPoint模板v2*，列在*进一步阅读*中。
- en: For the first four colors labeled as **Text/Background - Dark 1** and **Dark
    2** , and **Light 1** and **Light 2** , you need to keep in mind that they are
    used to automatically change the text color to a background style allowing optimal
    contrast. When a template or theme is built properly, you will usually have **Text/Background
    - Dark 1** as black, and **Text/Background - Light 1** as white, giving the best
    possible contrast between text and background. For the **Dark 2** / **Light 2**
    colors, you need to make sure their contrast level looks good in the **Sample**
    preview, as can be seen in the previous figure ( *Figure 3.11* ).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对于标记为**文本/背景 - 深色 1**和**深色 2**，以及**浅色 1**和**浅色 2**的前四种颜色，你需要记住它们被用来自动将文本颜色更改为背景样式，以实现最佳对比度。当模板或主题正确构建时，你通常会将**文本/背景
    - 深色 1**设置为黑色，将**文本/背景 - 浅色 1**设置为白色，从而在文本和背景之间提供最佳对比度。对于**深色 2**/**浅色 2**颜色，你需要确保它们在**样本**预览中的对比度水平看起来不错，如图
    3.11 中所示。
- en: 'If you make any changes to the text/background colors, you should test what
    your content looks like when changing your background style. To do so, you can
    either use the **Background Styles** button in the **Slide Master** tab ( **1**
    ) or go to the **Design** tab ( **2** ) and click the **Variants** group to get
    to the **Background Style s** option ( *Figure 3.12* ):'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更改了文本/背景颜色，你应该测试更改背景样式后你的内容看起来如何。为此，你可以使用**幻灯片母版**选项卡中的**背景样式**按钮（**1**）或转到**设计**选项卡（**2**），然后点击**变体**组以访问**背景样式**选项（图
    3.12）：
- en: '![Figure 3.12 – Accessing the background styles from the Slide Master and Design
    tabs](img/B32063_03_12.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.12 – 从幻灯片母版和设计选项卡访问背景样式](img/B32063_03_12.png)'
- en: Figure 3.12 – Accessing the background styles from the Slide Master and Design
    tabs
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.12 – 从幻灯片母版和设计选项卡访问背景样式
- en: For the accent and hyperlink colors, make the necessary changes and h ave a
    look at the sample preview to make sure your colors have enough contrast with
    both the dark and light backgrounds. You should also look at the side-by-side
    effect of your contrast colors, especially if you will be adding charts and using
    a colorful style in your presentation. If you want to know how your color palette
    may look for your audience, create a few content slides, open the slide show view,
    and move back from your computer screen to look at them.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于强调色和超链接颜色，进行必要的更改，并查看样本预览以确保你的颜色与深色和浅色背景都有足够的对比度。你还应该查看你的对比色并排效果，特别是如果你将在演示文稿中添加图表并使用彩色风格的话。如果你想了解你的颜色调色板对你的观众看起来如何，创建几个内容幻灯片，打开幻灯片放映视图，然后从你的电脑屏幕后退一步查看它们。
- en: You can do the same for your virtual presentations by starting a virtual meeting
    with your preferred tool and having a look at how a few content slides look when
    sharing your screen. Viewing your content while imagining you are in your audience’s
    place will help you to correct contrast problems or colors that don’t render well.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过使用你喜欢的工具开始一个虚拟会议并查看共享屏幕时几个内容幻灯片的外观来对你的虚拟演示做同样的事情。想象你处于观众的位置来查看你的内容将帮助你纠正对比度问题或渲染不佳的颜色。
- en: In [*Chapter 4*](Chapter_04.xhtml#_idTextAnchor387) , there is a topic on making
    your presentations more accessible where we will have a look at the **Accessibility
    Checker** , which includes color and contrast tools.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第 4 章*](Chapter_04.xhtml#_idTextAnchor387)中，有一个关于使你的演示文稿更具可访问性的主题，我们将查看**可访问性检查器**，其中包括颜色和对比度工具。
- en: Selecting title and body fonts
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择标题和正文字体
- en: Have you ever had the problem that every time you create a new eleme nt on your
    slides, you have to manually set the font to the one you have chosen as a corporate
    font? This is usually because you have not set your theme fonts in your file or
    template and PowerPoint uses its default theme fonts, or the ones previously set
    as a default. Here is how to solve this issue and help you save a lot of time
    too.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否遇到过每次在幻灯片上创建新元素时，都必须手动将字体设置为已选择的公司字体的问题？这通常是因为你没有在你的文件或模板中设置主题字体，PowerPoint
    使用其默认主题字体，或者之前设置的默认字体。以下是如何解决这个问题并帮助你节省大量时间的步骤。
- en: 'When in the **Slide Master** tab ( **1** ), click the **Fonts** button ( **2**
    ) to o pen the list ( *Figure 3.13* ):'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当在**幻灯片母版**选项卡（**1**）时，点击**字体**按钮（**2**）以打开列表（图 3.13）：
- en: '![Figure 3.13 – Selecting theme fonts while in the Slide Master tab](img/B32063_03_13.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.13 – 在幻灯片母版选项卡中选择主题字体](img/B32063_03_13.png)'
- en: Figure 3.13 – Selecting theme fonts while in the Slide Master tab
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.13 – 在幻灯片母版选项卡中选择主题字体
- en: There is an **Office** category ( **3** ) showing you how titles (larger text)
    and body text (smaller text) will look. You can create your own custom theme fonts
    by selecting **Customize Fonts...** ( **4** ) at the bottom. You will then be
    able to choose the **Heading font** ( **5** ) and **Body font** ( **6** ) to match
    your organization’s choice. When you are done, you can also fill in **Name** (
    **7** ) and click **Save** . This makes it available in the **Custom** category
    ( **8** ) at the top of the **Fonts** list. You can also access theme fonts when
    in the **Design** tab by clicking the more arrow in the **Variants** group.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个**Office**类别（**3**）显示了标题（较大文本）和正文文本（较小文本）的外观。您可以通过在底部选择**自定义字体...**（**4**）来创建自己的自定义主题字体。然后您可以选择**标题字体**（**5**）和**正文字体**（**6**）以匹配您组织的选项。完成之后，您还可以填写**名称**（**7**）并点击**保存**。这将使其在**字体**列表顶部的**自定义**类别（**8**）中可用。您也可以在**设计**选项卡中访问主题字体，通过在**变体**组中点击更多箭头。
- en: To help you choose your fonts, you may want to revisit the *Choosing fonts*
    section in [*Chapter 2*](Chapter_02.xhtml#_idTextAnchor130) .
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您选择字体，您可能需要回顾[*第2章*](Chapter_02.xhtml#_idTextAnchor130)中的*选择字体*部分。
- en: Even though you would need much more information to become a color and font
    expert, with what was covered in this section you have enough understanding of
    the bas ics to help you create b etter presentations in a more efficient way.
    We can now move on to configuring the standard layouts fou nd in the Slide Master
    feature.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管您需要更多的信息才能成为颜色和字体专家，但本节所涵盖的内容已经足够您理解基础知识，以帮助您以更有效的方式创建更好的演示文稿。现在我们可以继续配置幻灯片母版功能中找到的标准布局。
- en: Configuring standard layouts
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置标准布局
- en: We already mentioned that in the **Slide Master** view, the slid e master is
    the larger thumbnail and the smaller ones that follow are the layouts. Another
    element you need to be aware of is the highlighted thumbnail ( **1** ), which
    shows you the layout of the slide you were on when you opened the **Slide Master**
    feature ( *Figure 3.14* ). You can hover over any thumbnail to show a tooltip
    ( **2** ) that tells you on what sl ide(s) the layout is being used.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经提到，在**幻灯片母版**视图中，幻灯片母版是较大的缩略图，而跟在其后的较小缩略图是布局。您还需要注意的一个元素是高亮显示的缩略图（**1**），它显示了您打开**幻灯片母版**功能时所在的幻灯片的布局（*图3.14*）。您可以将鼠标悬停在任何缩略图上以显示一个工具提示（**2**），它会告诉您布局在哪些幻灯片中正在使用。
- en: '![Figure 3.14 – The Slide Master view showing the layout applied to your current
    slide](img/B32063_03_14.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图3.14 – 显示应用于当前幻灯片的幻灯片母版视图](img/B32063_03_14.png)'
- en: Figure 3.14 – The Slide Master view showing the layout applied to your current
    slide
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.14 – 显示应用于当前幻灯片的布局的幻灯片母版视图
- en: Before making changes to any of the layouts, you should make formatting changes
    and position adjustments to the title and content placeholders that you want to
    see applied in all of the layouts in **Slide Master** ( **1** ) ( *Figure 3.15*
    ). Doing so repli cates the changes to the layouts.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在对任何布局进行更改之前，您应该对您希望在**幻灯片母版**（**1**）（*图3.15*）中应用的所有布局的标题和内容占位符进行格式更改和位置调整。这样做会将更改复制到布局中。
- en: '![Figure 3.15 – Formatting changes made in Slide Master replicate in layouts](img/B32063_03_15.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图3.15 – 在幻灯片母版中进行的格式更改在布局中复制](img/B32063_03_15.png)'
- en: Figure 3.15 – Formatting changes made in Slide Master replicate in layouts
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.15 – 在幻灯片母版中进行的格式更改在布局中复制
- en: I have created an example where I changed the font color and size and modified
    the vertical alignment of the text to the top in the title placeholder of my slide
    master ( **2** ). I also changed the font size of three levels of bullets and
    modified the bullet for the first level ( **3** ). In the title and content layout,
    my changes were reproduce d automatically ( **4** ).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个示例，我在我的幻灯片母版的标题占位符中更改了字体颜色和大小，并修改了文本的垂直对齐方式到顶部（**2**）。我还更改了三个级别的项目符号大小，并修改了第一级的项目符号（**3**）。在标题和内容布局中，我的更改被自动复制（**4**）。
- en: Some layouts will not get the exact same changes because of their use. For example,
    the title slide’s layout will get the same font style and color but won’t get
    the same font size as the regular titles since it is common practice to use bigger
    fonts on the title slide. Adjustments can be made to other placeholders after
    you are done with the slide master. Just keep in mind that doing so breaks the
    placeholder’s association with your slide master, meaning the next time you make
    a change in the slide master it won’t replicate in pl aceholders modified on th
    e layouts.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一些布局可能不会获得完全相同的变化，因为它们的使用方式。例如，标题幻灯片的布局将获得相同的字体样式和颜色，但不会获得与常规标题相同的字体大小，因为通常在标题幻灯片上使用更大的字体。完成幻灯片母版后，可以对其他占位符进行调整。只需记住，这样做会断开占位符与幻灯片母版之间的关联，这意味着下次你在幻灯片母版中进行更改时，它不会在布局上修改过的占位符中复制。
- en: '**Try it yourself**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**亲自尝试**'
- en: 'The best way to understand the previous explanation is to try it yourself.
    Follow these steps:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 理解之前的解释的最佳方式是亲自尝试。按照以下步骤操作：
- en: Open a new blank presentation and go to the **Slide Master** view.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的空白演示文稿并切换到**幻灯片母版**视图。
- en: Change the font size and color of the title placeholder on your slide master.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更改幻灯片母版中标题占位符的字体大小和颜色。
- en: Select a layout and change the color of the font in the title placeholder.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个布局并更改标题占位符中的字体颜色。
- en: Go back to **Slide Master** and change the title font color again.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回到**幻灯片母版**并再次更改标题的字体颜色。
- en: Now, have a look at your modified layout. The new color change did not replicate.
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，看看你修改后的布局。新的颜色更改没有复制。
- en: You need to keep in mind that you should review all your layouts every time
    you decide to change something in the slide master to make sure the chang es look
    like what you have in mind.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要记住，每次决定在幻灯片母版中更改内容时，都应该审查所有布局，以确保更改看起来符合你的预期。
- en: Changes you should avoid
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应该避免的更改
- en: Whether in the slide master or layouts, we already mentioned that we can adjust
    font sizes, font colors, and text alignment within t he placeholders. Make sure
    you always keep in mind the best practices we discussed in the previous chapter.
    You can also resize and move placeholders to create the look that suits your organization’s
    needs, and you can add any shape or graphic element that you want to see on all
    slides, or just on specific layouts.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是在幻灯片母版还是布局中，我们之前已经提到，我们可以在占位符内调整字体大小、字体颜色和文本对齐方式。确保你始终牢记我们在上一章中讨论的最佳实践。你还可以调整占位符的大小和位置，以创建适合你组织需求的样式，你还可以添加你希望在所有幻灯片上或仅在特定布局上看到的任何形状或图形元素。
- en: 'But there is a list of things that could create more problems than you bargained
    for depending on your situation:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 但根据你的情况，有一系列事情可能会造成比你预期的更多问题：
- en: '**Deleting placeholders on** **the slide master** : Doing so breaks the link
    to the layouts and prevents the possibility of making font size and color changes
    in one place. Just don’t do it!'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在** **幻灯片母版** **中删除占位符**：这样做会断开与布局的链接，并阻止在单个位置进行字体大小和颜色更改的可能性。所以，请千万不要这样做！'
- en: '**Deleting placeholders on standard layouts** : Doing so can cause a lot of
    problems when bringing together some slides with the same layout from another
    presentation, or when applying the template to another presentation. PowerPoint
    won’t be able to map the placeholders thus making you work harder to put everything
    in its place.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在标准布局中删除占位符**：这样做在将来自另一个演示文稿的具有相同布局的一些幻灯片合并在一起，或者当将模板应用于另一个演示文稿时，可能会引起很多问题。PowerPoint
    将无法映射占位符，这会让你更努力地将所有内容放置到位。'
- en: '**Deleting standard layouts you are not using** : This might cause similar
    problems to the ones mentioned previously, especially when handling content from
    files that don’t use the same template.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**删除未使用的标准布局**：这可能会引起与之前提到的问题类似的问题，尤其是在处理不使用相同模板的文件中的内容时。'
- en: '**Renaming standard layouts** : Doing so will create problems when PowerPoint
    is trying to map content coming from a layout with a standard name with a template
    that does not have such a layout anymore.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重命名标准布局**：这样做会在 PowerPoint 尝试将来自具有标准名称的布局的内容映射到不再具有该布局的模板时引起问题。'
- en: When you decide to do a bit of cleaning in your layouts, you will also realize
    that some elements canno t be deleted, such as layouts already used by some slides,
    or placeholders on a layout that are used by a slide in the file; that is by design.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 当你决定对你的布局进行一些清理时，你也会意识到一些元素不能被删除，例如已被某些幻灯片使用的布局，或者文件中幻灯片使用的布局上的占位符；这是设计上的原因。
- en: So, if you are not satisfied with some of the standard layouts provided in PowerPoint,
    what should you do next? Simply add some custom layouts, which is the topic of
    the next section, including tips to help you create them.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你对PowerPoint中提供的某些标准布局不满意，下一步应该怎么做？简单添加一些自定义布局，这是下一节的主题，包括帮助你创建它们的技巧。
- en: Adding custom layouts
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加自定义布局
- en: 'Even though adding custom layouts can be done at any time, I prefer to do it
    after I have taken the time to configure and format the standard layouts. The
    reason is simple: you can then simply duplicate a standard layout as a starting
    point, rename it, and make all the necessary changes to it. Here is how you do
    it:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可以在任何时候添加自定义布局，但我更喜欢在花时间配置和格式化标准布局之后进行。原因很简单：这样你可以简单地复制一个标准布局作为起点，重命名它，并对它进行所有必要的更改。以下是操作步骤：
- en: 'Right-click the layout you want to start with and choo se **Duplicate Layout**
    ( *Figure 3.16* ):'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右键点击你想要开始的布局并选择**复制布局**（*图3.16*）：
- en: "![Figure 3.16 – Duplica\uFEFFting an existing layout](img/B32063_03_16.png)"
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图3.16 – 复制现有布局](img/B32063_03_16.png)'
- en: Figure 3.16 – Duplica ting an existing layout
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.16 – 复制现有布局
- en: 'Right-click the second layout that was created ( **1** ) and choose **Rename
    Layout** ( **2** ) to get to the renaming window ( **3** ). Change the name to
    one that describes the layout you are creating and cli ck the **Rename** button
    ( **4** ) ( *Figure 3.17* ):'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右键点击创建的第二个布局（**1**）并选择**重命名布局**（**2**）以进入重命名窗口（**3**）。将名称改为描述你正在创建的布局的名称，然后点击**重命名**按钮（**4**）（*图3.17*）：
- en: "![Figur\uFEFFe 3.17 – Renaming a layout](img/B32063_03_17.png)"
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图3.17 – 重命名布局](img/B32063_03_17.png)'
- en: Figur e 3.17 – Renaming a layout
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.17 – 重命名布局
- en: 'You now have a new layout that already has the same title and content placeholders
    as your other layout. Let’s see an example of a custom layout that I often use
    in presentations when I want a full slide image with a semi-transparent placeholder
    for my title or headline:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在有一个新的布局，它已经具有与你的其他布局相同的标题和内容占位符。让我们看看一个自定义布局的例子，我经常在演示中用它，当我想要一个全屏图像以及一个半透明的占位符来放置我的标题或标题时：
- en: '![Figure 3.18 – Deleting the Content placeholder and inserting a Picture placeholder](img/B32063_03_18.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图3.18 – 删除内容占位符并插入图片占位符](img/B32063_03_18.png)'
- en: Figure 3.18 – Deleting the Content placeholder and inserting a Picture placeholder
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.18 – 删除内容占位符并插入图片占位符
- en: 'From the newly created layout ( *Figure 3.18* ), you need to do the following:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 从新建的布局（*图3.18*）中，你需要执行以下操作：
- en: Select the content placeholder and hit the *Delete* key on your keyboard to
    remove it ( **1** ).
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择内容占位符并按键盘上的*删除*键来移除它（**1**）。
- en: Click on the **Insert Placeholder** button to open the list of available placeholder
    types ( **2** ).
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**插入占位符**按钮以打开可用的占位符类型列表（**2**）。
- en: Select the **Picture** placeholder ( **3** ). Your mouse cursor will look like
    a *plus* sign, meaning you can draw the placeholder just as you would draw any
    shape or text box on a slide.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择**图片**占位符（**3**）。你的鼠标光标将看起来像一个*加号*，这意味着你可以像在幻灯片上绘制任何形状或文本框一样绘制占位符。
- en: 'If you insert a picture into a **Content** placeholder, it will be resized
    to keep the picture’s aspect ratio, either keeping its original height or width.
    The **Picture** placeholder will keep its size and adjust the picture to fit the
    space, making it easier to keep your slide designed according to your needs whatever
    the picture orientation or size. If you use the **Online Image** placeholder,
    it keeps the entire image and will adjust the width or the height to keep the
    image aspect ratio. As my friend and MVP colleague Echo Swinford mentioned, this
    placeholder’s behavior is perfect as a logo placeholder on your layouts to avoid
    dealing with prompt text from the content placeholder. In the following figure,
    you can see how the same picture is resized or cropped depending on the placeholder
    type:'
  id: totrans-139
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果您将图片插入到**内容**占位符中，它将被调整大小以保持图片的宽高比，要么保持原始高度，要么保持宽度。**图片**占位符将保持其大小并调整图片以适应空间，这使得无论图片方向或大小如何，都能更容易地根据您的需求设计幻灯片。如果您使用**在线图片**占位符，它将保持整个图片并将宽度或高度调整以保持图片的宽高比。正如我的朋友和
    MVP 同事 Echo Swinford 提到的，这个占位符的行为在布局中作为标志占位符是完美的，以避免处理内容占位符的提示文本。在以下图中，您可以看到相同的图片根据占位符类型进行缩放或裁剪：
- en: '![A screenshot of a computer screen  AI-generated content may be incorrect.](img/B32063_03_18A.png)'
  id: totrans-140
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![计算机屏幕截图  AI生成的内容可能不正确。](img/B32063_03_18A.png)'
- en: Figure 3.18A – Comparing content, picture, and online picture placeholder behaviors
  id: totrans-141
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 3.18A – 比较内容、图片和在线图片占位符的行为
- en: You need to be aware of the various behaviors, so you can choose the placehol
    der type ac cording to your desired result.
  id: totrans-142
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您需要了解各种行为，以便根据您期望的结果选择占位符类型。
- en: 'Make sure the placeholder is the size of the slide ( **1** ) ( *Figure 3.19*
    ):'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 确保占位符的大小与幻灯片相同（**1**）（*图 3.19*）：
- en: '![Figure 3.19 – Full-slide Picture placeholder sent to the back](img/B32063_03_19.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.19 – 全屏图片占位符发送到背面](img/B32063_03_19.png)'
- en: Figure 3.19 – Full-slide Picture placeholder sent to the back
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.19 – 全屏图片占位符发送到背面
- en: Right-click the placeholder ( **2** ) to change its order by using **Send to
    Back** ( **3** ). This way, you make sure you have access to the title placeholder.
    Inserting a placeholder also brings up the **Shape Format** contextual tab, from
    which you can access the **Send Backward** button.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 右键点击占位符（**2**），通过使用**发送到背面**（**3**）来更改其顺序。这样，您可以确保您有权访问标题占位符。插入占位符还会弹出**形状格式**上下文选项卡，您可以通过它访问**向后发送**按钮。
- en: 'You can then proceed to adjust the size of the title placeholder. I like to
    make it the same width as the slide to give it a banner-like look ( **1** ) (
    *Figure 3.20* ):'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您可以继续调整标题占位符的大小。我喜欢让它与幻灯片宽度相同，以使其看起来像横幅（**1**）（*图 3.20*）：
- en: '![Figure 3.20 – Adjusting the title placeholder and its margins](img/B32063_03_20.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.20 – 调整标题占位符及其边距](img/B32063_03_20.png)'
- en: Figure 3.20 – Adjusting the title placeholder and its margins
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.20 – 调整标题占位符及其边距
- en: Then click on the dialog launcher ( **2** ), which is the small arrow in the
    bottom-right corner of the **Shape Styles** group. It opens the **Format Shape**
    ( **3** ) pane. Make sure to select the **Text Options** tab.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 然后点击对话框启动器（**2**），即**形状样式**组右下角的小箭头。它打开**格式形状**（**3**）面板。请确保选择**文本选项**选项卡。
- en: Click on the **Text Box** ( **4** ) icon so you can adjust the margins. The
    left and right margins can be around half an inch ( **1.5 cm** ). The top and
    bottom margins can be adjusted on the slide later when you know how much text
    you have in the placeholder.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**文本框**（**4**）图标，以便您可以调整边距。左右边距可以大约为半英寸（**1.5 厘米**）。上下边距可以在您知道占位符中有多少文本后，在幻灯片上调整。
- en: 'Click on the **Shape Options** tab of the pane ( **1** ) then on the **Fill
    and Line** icon ( **2** ) and open the **Fill** section ( **3** ) ( *Figure 3.21*
    ):'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 点击面板的**形状选项**选项卡（**1**），然后点击**填充和线条**图标（**2**），并打开**填充**部分（**3**）（*图 3.21*）：
- en: "![Figure 3.21 – Adding a semi-transparen\uFEFFt fill to the title placeholder](img/B32063_03_21.png)"
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.21 – 向标题占位符添加半透明填充](img/B32063_03_21.png)'
- en: Figure 3.21 – Adding a semi-transparen t fill to the title placeholder
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.21 – 向标题占位符添加半透明填充
- en: Choose a solid fill color – usually, black or dark gray looks nice on any picture
    ( **4** ). After that, adjust the transparency ( **5** ). I usually start at around
    **30%** and make sure my font color is cont rasting (for example, white).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个实色填充颜色——通常，黑色或深灰色在任何图片上看起来都很不错（**4**）。之后，调整透明度（**5**）。我通常从大约**30%**开始，并确保我的字体颜色是对比的（例如，白色）。
- en: 'You can see how your layout will look by using the **Close Master View** button
    in the **Slide Master** tab and adding a new slide with your new custom layout.
    Add your title or headline to the slide, then click the picture icon in the middle
    to browse for a picture you want to add. In *Figure 3.22* , you’ll see an example
    of this new custom layout with a title and an image:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过在“幻灯片母版”选项卡中使用“关闭母版视图”按钮，添加一个带有你新自定义布局的新幻灯片来查看你的布局将如何看起来。将你的标题或标题添加到幻灯片中，然后点击中间的图片图标来浏览你想要添加的图片。在*图
    3.22*中，你会看到一个带有标题和图像的新自定义布局的示例：
- en: '![Figure 3.22 – Full-slide image with a title banner](img/B32063_03_22.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.22 – 带有标题横幅的全幻灯片图像](img/B32063_03_22.png)'
- en: Figure 3.22 – Full-slide image with a title banner
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.22 – 带有标题横幅的全幻灯片图像
- en: 'If you have already gone through the planning stage o f your presentation,
    you might have some ideas on what layouts might work for your content. Just create
    whatever makes sense for the time being. You can always come back to your slide
    master and change or add extra layouts as you go. I know this tip might not be
    aligned with some design practices, but I am giving you steps that will help you
    in your usual business settings, which means that you are probably stuck with
    impossible deadlines. There is no such thing as a perfect presentation or design
    because we always find something to improve in our previous presentations. As
    I mentioned before: one step at a time is better than no improvement at all.'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经完成了演示文稿的规划阶段，你可能对哪些布局可能适合你的内容有一些想法。只需创建目前看起来合理的布局即可。你总是可以回到你的幻灯片母版，随着你的进行更改或添加额外的布局。我知道这个技巧可能不符合某些设计实践，但我给你提供的是一些有助于你在通常的商业环境中的步骤，这意味着你可能面临着不可能的截止日期。完美的演示或设计是不存在的，因为我们总是在之前的演示中找到可以改进的地方。正如我之前提到的：一步一步来总比没有任何改进要好。
- en: If you are using a template that includes many custom layouts that are not used
    within your presentation, it is okay to delete them if you need to manage the
    file size. The more layouts you have in your template, the larger the file size.
    When deleting unused custom layouts from your file, remember that you will need
    to start your next presentations from the original template to get them back.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是包含许多未在演示文稿中使用自定义布局的模板，如果你需要管理文件大小，删除它们是可以的。你的模板中包含的布局越多，文件大小就越大。当你从文件中删除未使用的自定义布局时，请记住，你需要从原始模板开始你的下一个演示文稿才能恢复它们。
- en: When you don’t have a corporate template to start with and feel overwhelmed
    by the thought of starting from a blank presentation, have a look at the templates
    provided by Microsoft in **File** | **New** . Browse the list or use keywords
    relevant to your topic and open a few templates to explore their slide master.
    Inspi re yourself with some of the layouts that might work for you. Unfortunately,
    many templates provided break a few of the best practice rules, but if it helps
    you have a starting point, you will be able to fix some issues you might find.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当你没有从公司模板开始，并且对从空白演示文稿开始感到不知所措时，请查看在**文件** | **新建**中提供的Microsoft模板。浏览列表或使用与你的主题相关的关键词，打开几个模板来探索它们的幻灯片母版。从可能适合你的布局中汲取灵感。不幸的是，许多模板提供的布局违反了一些最佳实践规则，但如果它帮助你有一个起点，你将能够修复你可能会遇到的一些问题。
- en: 'I can also suggest a low-tech means to inspire you for your slide layouts:
    *The Better Deck Deck* by my friend Nolan Haims. You can find information in the
    *Further reading* section.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我还可以建议一种低技术手段来激发你的幻灯片布局灵感：我的朋友诺兰·海姆斯的《更好的牌组》。你可以在“进一步阅读”部分找到相关信息。
- en: The rest of this section will focus on tips and tricks to h elp you with common
    slide master problems.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 本节剩余部分将重点介绍一些技巧和窍门，帮助你解决常见的幻灯片母版问题。
- en: Reordering your slide layouts
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重新排列幻灯片布局
- en: 'When using layouts regularly, the list might not present itself in an optimal
    order. You can s imply reorder them by clicking and dragging the layouts in the
    **Slide Master** view ( **1** ), so you have them sorted in a more efficient way
    ( *Figure 3.23* ):'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当你经常使用布局时，列表可能不会以最佳顺序呈现。你可以简单地通过在“幻灯片母版”视图中点击并拖动布局来重新排列它们（**1**），这样你就可以以更有效的方式排序（*图
    3.23*）：
- en: '![Figure 3.23 – Reordering layouts in the Slide Master feature](img/B32063_03_23.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图3.23 – 在幻灯片母版功能中重新排序布局](img/B32063_03_23.png)'
- en: Figure 3.23 – Reordering layouts in the Slide Master feature
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.23 – 在幻灯片母版功能中重新排序布局
- en: Click and drag any layout to the best position ( **2** ). According to a Microsoft
    list of shortcuts available to create presentations, you should be able to use
    *Ctrl* + *Up* or *Down* arrow keys to move thumbnails. If you are using an operating
    system in a language other than English, these might not work. See the *Further
    reading* s ection for a link to the Microsoft ar ticle.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 点击并拖动任何布局到最佳位置（**2**）。根据Microsoft提供的可用于创建演示文稿的快捷键列表，您应该能够使用*Ctrl* + *上*或*下*箭头键来移动缩略图。如果您使用的是非英语语言的操作系统，这些可能不起作用。请参阅*进一步阅读*部分以获取Microsoft文章的链接。
- en: 'The **Ne w Slide** and **Layout** lists will be s orted the way you want them
    ( *Figure 3.24* ):'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**新建幻灯片**和**布局**列表将按照您希望的方式排序（*图3.24*）：'
- en: "![Figure 3.24\uFEFF - Reordered list of slide layouts](img/B32063_03_24.png)"
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![图3.24 - 重新排序的幻灯片布局列表](img/B32063_03_24.png)'
- en: Figure 3.24 - Reordered list of slide layouts
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.24 - 重新排序的幻灯片布局列表
- en: Thi s is not something you should be doing for all your templates. But if you
    find that you are wasting a lot of time on a very long list of layouts, consider
    this tip to help you save some time when designing.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是您应该在所有模板上都做的事情。但如果您发现自己在非常长的布局列表上浪费了大量的时间，请考虑这个技巧以帮助您在设计时节省一些时间。
- en: Renaming your tem plate to avoid Office Theme labeling
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重命名模板以避免Office Theme标签
- en: 'If you have started your template from a new blank presentation, then your
    slide master will be named **Office Theme** . It is not a huge problem, although
    it might confuse others using the template you created. You simply need to rename
    the master by right-clicking it and choosing **Rename Master** . You could give
    the master yo ur company or department name ( *Figure 3.25* ):'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是从一个新的空白演示文稿开始创建模板，那么您的幻灯片母版将被命名为**Office Theme**。这并不是一个大问题，尽管它可能会让使用您创建的模板的其他人感到困惑。您只需通过右键单击并选择**重命名母版**来重命名母版。您可以为母版命名您公司或部门的名字（*图3.25*）：
- en: "![\uFEFFFigure 3.25 – Renaming a s\uFEFFlide master](img/B32063_03_25.png)"
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图3.25 – 重命名幻灯片母版](img/B32063_03_25.png)'
- en: Figure 3.25 – Renaming a s lide master
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.25 – 重命名幻灯片母版
- en: If you have used a template from the list supplied by Microsoft, you should
    also consider renaming you r slide master to avoid even more confusion.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用了Microsoft提供的列表中的模板，您还应考虑重命名您的幻灯片母版以避免更多的混淆。
- en: Using the Hide Background Graphics feature
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用“隐藏背景图形”功能
- en: 'When creating your template, we have discussed that you need to start formatting
    the slide master first, then the layouts. Dep ending on what graphic elements
    you have added to the slide master, you might end up with an issue such as a shape
    or logo that has been added onto your slide master but not placed properly for
    the title slide layout design you had in mind, or any other layout for that matter.
    This is where the **Hide Back ground Graphics** checkbox comes to the rescue:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建模板时，我们讨论过您需要首先格式化幻灯片母版，然后是布局。根据您添加到幻灯片母版中的图形元素，您可能会遇到一些问题，例如形状或标志已经添加到幻灯片母版中，但并未正确放置在您所设想的标题幻灯片布局设计或其他任何布局中。这时，“隐藏背景图形”复选框就能派上用场：
- en: '![Figure 3.26 – Using the Hide Background Graphics checkbox](img/B32063_03_26.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图3.26 – 使用“隐藏背景图形”复选框](img/B32063_03_26.png)'
- en: Figure 3.26 – Using the Hide Background Graphics checkbox
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.26 – 使用“隐藏背景图形”复选框
- en: In *Figure 3.26* , you can see that the section layout has a colored shape at
    the bottom ( **1** ), and the title layout does not ( **2** ). The only reason
    for this difference is that the **Hide Backgroun d Graphics** checkbox has been
    used ( **3** ).
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图3.26*中，您可以看到部分布局在底部有一个彩色形状（**1**），而标题布局则没有（**2**）。这种差异的唯一原因是使用了**隐藏背景图形**复选框（**3**）。
- en: So, next time you have unwanted graphic elements from your slide master, use
    the **Hide Background Graphics** checkbox to help you change the design of your
    lay out without having to first hide them manually.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，下次您在幻灯片母版中遇到不需要的图形元素时，请使用“隐藏背景图形”复选框来帮助您更改布局设计，而无需先手动隐藏它们。
- en: Using the improved Insert Picture experience in placeholders
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在占位符中使用改进的插入图片体验
- en: Microsoft recently introduced a new **Insert picture** icon within various placeholders
    that helps users select the storage source. This is an improvement because before,
    when using a picture placeholder, we could only browse images from our computer
    when clicking the icon, requiring extra steps when we wanted to use Microsoft’s
    stock images.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 微软最近在各个占位符中引入了一个新的**插入图片**图标，这有助于用户选择存储源。这是一个改进，因为在此之前，当使用图片占位符时，我们只能通过点击图标浏览电脑中的图片，当我们想要使用微软的库存图片时，需要额外的步骤。
- en: 'With the new experience, clicking on the **Insert Picture** icon in any placeholder
    gives us the same choices ( *Figure 3.27* ):'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在新的体验中，点击任何占位符中的**插入图片**图标会给我们相同的选项（*图 3.27*）：
- en: '**From Devic e**'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从设备**'
- en: '**Stock Images**'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**库存图片**'
- en: '**Search on Web**'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在网络上搜索**'
- en: '**Mobile Device**'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**移动设备**'
- en: '**Icons**'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图标**'
- en: '![Figure 3.27 – Using the improved Insert Picture icon in placeholders](img/B32063_03_27.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.27 – 使用占位符中的改进插入图片图标](img/B32063_03_27.png)'
- en: Figure 3.27 – Using the improved Insert Picture icon in placeholders
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.27 – 使用占位符中的改进插入图片图标
- en: Just remember that depending on the type of placeholder that was used in your
    master layouts, your pictures might either be cropped to fill the placeholder
    or keep the same aspect ratio while the placeholder is resized.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 只需记住，根据你在母版布局中使用的占位符类型，你的图片可能要么被裁剪以填充占位符，要么在占位符调整大小时保持相同的宽高比。
- en: Here is one last tip to help you replace pictures quickly in your presentation.
    Right-click a picture ( **1** ), then use **Change Picture** ( **2** ) to access
    the list of the va rious sources that can be used ( **3** ) ( *Figure 3.28* ).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个最后的技巧，可以帮助你快速在演示文稿中替换图片。右键点击一张图片（**1**），然后使用**更改图片**（**2**）来访问可以使用的各种来源列表（**3**）（*图
    3.28*）。
- en: '![Figure 3.28 – Using the Change Picture feature](img/B32063_03_28.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.28 – 使用更改图片功能](img/B32063_03_28.png)'
- en: Figure 3.28 – Using the Change Picture feature
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.28 – 使用更改图片功能
- en: '**Important information**'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要信息**'
- en: As a licensed Microsoft 365 user, you can use any stock content provided in
    the library if it is part of a presentation file or any other Microsoft Office
    file type. All the content is royalty-free, and no attribution is required. You
    cannot reuse any content on its own. Have a look at Microsoft’s terms of use listed
    in *Further reading* .
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 作为授权的 Microsoft 365 用户，如果你使用的是演示文稿文件或任何其他 Microsoft Office 文件类型中提供的库内容，你可以使用任何库存内容。所有内容都是免版税的，无需署名。你不能单独重用任何内容。请查看“进一步阅读”中列出的
    Microsoft 的使用条款。
- en: Using pictures is a great way to m ake your presentation more i mpactful, whether
    you use some of your own images or Microsoft’s stock images. Let’s move on to
    the mi ssing footer placeholder topic in the next sec tion.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图片是让你的演示文稿更具影响力的好方法，无论你使用的是自己的图片还是微软的库存图片。让我们继续到下一节中缺失的页脚占位符主题。
- en: Retrieving missing footer placeholders
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恢复缺失的页脚占位符
- en: If you open the slide master of a presentation file and realize that the footer
    placeholders (such as date, footer, and slide number) have been deleted, you can
    and should add them back so you can control their display more efficiently.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打开演示文稿文件的幻灯片母版，发现页脚占位符（如日期、页脚和幻灯片编号）已被删除，你可以也应该将它们添加回来，以便更有效地控制它们的显示。
- en: 'When you are on the **Slide Master** tab, you can right-click while over the
    slide master ( **1** ) and select **Master Layout...** ( **2** ) to display the
    **Master Layout** window. You can then add back all footer placeholders by checking
    the boxes ( **3** ). Or you can select **Master Layout** on the ribbon ( **4**
    ) to access this window i f your slide master was selected first ( *Figure 3.29*
    ):'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在**幻灯片母版**选项卡上时，你可以右键点击幻灯片母版（**1**）并选择**母版布局...**（**2**）来显示**母版布局**窗口。然后你可以通过勾选复选框（**3**）将所有页脚占位符添加回来。或者，如果你首先选择了幻灯片母版，你可以通过选项卡上的**母版布局**来访问此窗口（*图
    3.29*）：
- en: '![Figure 3.29 – Adding footer placeholders to your slide master](img/B32063_03_29.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.29 – 向幻灯片母版添加页脚占位符](img/B32063_03_29.png)'
- en: Figure 3.29 – Adding footer placeholders to your slide master
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.29 – 向幻灯片母版添加页脚占位符
- en: 'If this does not solve the problem of the footer placeholders being missing
    from some of your layouts ( **1** ), then you need to check the **F ooters** box
    ( **2** ) on the specific layout ( *Figure 3.30* ):'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这不能解决某些布局中页脚占位符缺失的问题（**1**），那么你需要检查特定布局上的**页脚**复选框（**2**）（*图 3.30*）：
- en: "![Figure 3.\uFEFF30 – Adding footer placeh\uFEFFolders to a layout](img/B32063_03_30.png)"
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.30 – 向布局添加页脚占位符](img/B32063_03_30.png)'
- en: Figure 3. 30 – Adding footer placeh olders to a layout
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.30 – 向布局中添加页脚占位符
- en: Now that you know how to retrieve the footer placeholders, let’s move on to
    a ne w feature that helps you lock objects or placeholders.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道了如何检索页脚占位符，让我们继续介绍一个帮助你锁定对象或占位符的新功能。
- en: Using the lock feature for placeholders or objects
  id: totrans-210
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用占位符或对象的锁定功能
- en: Any graphic element or regular text box added to a layout in the **Slide Master**
    view won’t be editable when you go back to the **Normal** view. This is to protect
    any content that needs to be displayed on slides without being editable. But for
    many years, users have asked for a feature that allo ws them to lock placeholders
    in their templates to avoid having them moved by users. A locking feature was
    introduced in May 2021 to help users lock slide objects. It does help protect
    any elements added to your layouts from being moved around in the **Slide Master**
    view, but that does not mean they are also locked in the **Normal** view. Let’s
    have a look at how to use the feature so you get the desired result.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在**幻灯片母版**视图中添加到布局中的任何图形元素或常规文本框，当你回到**正常**视图时将不可编辑。这是为了保护需要在幻灯片上显示且不可编辑的内容。但是，多年来，用户们一直要求一个功能，允许他们锁定模板中的占位符，以避免用户移动它们。2021年5月引入了锁定功能，以帮助用户锁定幻灯片对象。它确实有助于保护添加到布局中的任何元素在**幻灯片母版**视图中不被移动，但这并不意味着它们在**正常**视图中也被锁定。让我们看看如何使用这个功能，以便你得到期望的结果。
- en: 'While in the slide master view, you can access the locking feature by right
    clicking any object on the slide master or layouts and then clicking **Lock**
    or **Unlock** in the contextual menu. However, I think it is more interesting
    to do it from the **Selection pane** , a feature unknown to many users that offers
    a few other tricks you should know. To display the **Selection pane** while in
    the slide master view, you can select the **Home** tab ( **1** ) | **Drawing**
    group, **A rrange** ( **2** ) | **Selection Pane...** ( **4** ) options ( *Figure
    3.31* ):'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在幻灯片母版视图中时，你可以通过在幻灯片母版或布局上的任何对象上右键单击并然后在上下文菜单中点击**锁定**或**解锁**来访问锁定功能。然而，我认为从**选择面板**来做会更有趣，这是许多用户不知道的功能，它提供了一些你应该知道的技巧。要在幻灯片母版视图中显示**选择面板**，你可以选择**开始**选项卡（**1**）|
    **绘图**组，**排列**（**2**）| **选择面板...**（**4**）选项（*图3.31*）：
- en: '![Figure 3.31 – Steps to display Selection pane](img/B32063_03_31.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图3.31 – 显示选择面板的步骤](img/B32063_03_31.png)'
- en: Figure 3.31 – Steps to display Selection pane
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.31 – 显示选择面板的步骤
- en: 'Once it is displayed, you will have acces s to the list of objects on your
    slide labeled with their generic name created by PowerPoint. In the example in
    *Figure 3. 32* , we can see that the title and content layout has five placeholders
    ( **1** ):'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦显示，你将能够访问幻灯片上对象的列表，这些对象被PowerPoint创建的通用名称标记。在*图3.32*的例子中，我们可以看到标题和内容布局有五个占位符（**1**）：
- en: '![Figure 3.32 – Locking feature available in Selection pane](img/B32063_03_32.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![图3.32 – 选择面板中可用的锁定功能](img/B32063_03_32.png)'
- en: Figure 3.32 – Locking feature available in Selection pane
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.32 – 选择面板中可用的锁定功能
- en: To lock an object, you simply need to click the *lock* icon to close it ( **2**
    ). As you can see in the figure, the title placeholder ( **3** ) has been locked.
    If we try to select it on the slide, its border will be full without any handles
    allowing resizing or movement.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 要锁定一个对象，你只需点击*锁定*图标来关闭它（**2**）。正如你在图中可以看到的，标题占位符（**3**）已经被锁定。如果我们尝试在幻灯片上选择它，其边框将完全封闭，没有任何手柄允许调整大小或移动。
- en: This is where you should use the locking feature if you want to make sure placeholders,
    or any other objects added to the slide master and layouts are not moved accidentally
    in your template. That being said, it will not lock slide objects when you go
    back to the **Normal** view.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你应该使用锁定功能的地方，如果你想确保占位符，或任何其他添加到幻灯片母版和布局中的对象不会在模板中意外移动。换句话说，当你回到**正常**视图时，它不会锁定幻灯片对象。
- en: If you leave the **Selection** pane open and go into the **Normal** view, it
    will display the same locking possibility but, as we can see in *Figure 3.33*
    ( **1** ), the title placeholder we locked in the **Slide Master** view is now
    unlocked, and the placeholder on the slide can be moved or resized ( **2** ) with
    the selection and rotation handles. You need to use the **Lock** feature once
    again in the **Normal** view while on slides to prevent any elements from being
    moved there.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你保持**选择**面板打开并进入**正常**视图，它将显示相同的锁定可能性，但正如我们在*图3.33*（**1**）中看到的，我们在**幻灯片母版**视图中锁定的标题占位符现在已解锁，幻灯片上的占位符可以使用选择和旋转手柄进行移动或调整大小（**2**）。你需要在幻灯片上的**正常**视图中再次使用**锁定**功能，以防止任何元素被移动到那里。
- en: '![Figure 3.33 – Unlocked placeholder in the Normal view](img/B32063_03_33.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![图3.33 – 正常视图中的未锁定占位符](img/B32063_03_33.png)'
- en: Figure 3.33 – Unlocked placeholder in the Normal view
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.33 – 正常视图中的未锁定占位符
- en: So, if you want to protect placeholders from being moved or resized when editing
    the template, lock them in the **Slide Master** view. If you want to protect objects
    from being accidentally moved on slides while addi ng content, then lock them
    from the **Normal** view.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你想保护占位符在编辑模板时不会被移动或调整大小，请在**幻灯片母版**视图中锁定它们。如果你想保护对象在添加内容时不会意外地移动到幻灯片上，那么请从**正常**视图中锁定它们。
- en: Sin ce we are talking about the **Selection** pane, let’s explore other features
    there that will become useful later when we discuss animations in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor874)
    . If you look back at *F igure 3.33* , you see a small eye icon ( **3** ) that
    allows you to hide or display objects on your slide. When we want to cre ate more
    complex animation effects, it is common to overlay more than one object, which
    makes it very difficult to select only one – this is when this hiding feature
    will help. If you double-click on the name of an object ( **4** ), you will be
    able to rename it. Renaming objects should become a standard procedure if you
    want to keep your sanity with complex animations – it is the quickest way to find
    objects that need special animations.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们在谈论**选择**面板，那么让我们探索一下那里的一些其他功能，这些功能在我们讨论第[*第9章*](Chapter_09.xhtml#_idTextAnchor874)中的动画时将会变得很有用。如果你回顾一下*图3.33*，你会看到一个小的眼睛图标（**3**），它允许你隐藏或显示你的幻灯片上的对象。当我们想要创建更复杂的动画效果时，通常会在多个对象上叠加，这使得只选择一个对象变得非常困难——这就是这个隐藏功能能帮上忙的时候。如果你双击一个对象的名字（**4**），你将能够重命名它。如果你想保持对复杂动画的理智，重命名对象应该成为一种标准程序——这是找到需要特殊动画的对象的最快方式。
- en: '**A word on the Quick Access Toolbar**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于快速访问工具栏的一词**'
- en: The **Quick Access Toolbar** ( **QAT** ) feature can be found in all Microsoft
    Office applications. It is a great way to customize a list of tools you use often.
    In PowerPoint, the **Selection** pane is a great tool to add to your QAT. To do
    that, simply right-click the feature and click on **Add to Quick Access Toolbar**
    . If you are not familiar with the QAT, type `quick access toolbar` in the **Search**
    box in the title bar of any Office application to get help.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**快速访问工具栏**（**QAT**）功能可以在所有Microsoft Office应用程序中找到。这是一种自定义你经常使用的工具列表的绝佳方式。在PowerPoint中，**选择**面板是一个很好的工具，可以添加到你的QAT中。要这样做，只需右键单击该功能，然后点击**添加到快速访问工具栏**。如果你不熟悉QAT，可以在任何Office应用程序标题栏的**搜索**框中键入`quick
    access toolbar`以获取帮助。'
- en: Using this short list of tips to help you with common problems when dealing
    with the slide master and its layouts, as well as how to create custom layouts,
    you will be able to automate your content creation to save some precious time.
    If you are wondering how you will be able to create layouts that will serve the
    purpose of presenting and printing your presentation, then you need to read [*Chapter
    4*](Chapter_04.xhtml#_idTextAnchor387) . There are ways to make your PowerPoint
    file work harder without making the slides do all the work. Since AI services
    are being used more frequently, let’s now discuss how to plan the layouts in your
    slide master so that they can be used by AI for better results.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个简短的技巧列表来帮助你处理幻灯片母版及其布局时的常见问题，以及如何创建自定义布局，你将能够自动化你的内容创建以节省一些宝贵的时间。如果你想知道你将如何创建既适用于演示又适用于打印的布局，那么你需要阅读[*第4章*](Chapter_04.xhtml#_idTextAnchor387)。有一些方法可以使你的PowerPoint文件更加努力工作，而不会让幻灯片做所有的工作。由于AI服务越来越频繁地被使用，现在让我们讨论如何规划幻灯片母版中的布局，以便它们可以被AI用于更好的结果。
- en: Making your slide master compatible for AI services
  id: totrans-228
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使你的幻灯片母版与AI服务兼容
- en: If you plan on using your PowerPoint template with Microsoft’s Copilot for M365
    AI assistant, everything that has been discussed in this chapter still holds true.
    But you must take extra steps so Copilot can use branded layouts to create new
    presentations and slides. This section applies if you have purchased an add-on
    Copilot for M365 license to your regular M365 subscription.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您计划使用Microsoft的Copilot M365 AI助手与PowerPoint模板一起使用，本章中讨论的每件事仍然适用。但您必须采取额外步骤，以便Copilot可以使用品牌布局创建新的演示文稿和幻灯片。本节适用于您已购买附加Copilot
    for M365许可证以添加到常规M365订阅的情况。
- en: In [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor491) , we will discuss how to
    leverage this AI assistant’s features. For now, we’ll focus on how the slide master
    needs to be updated to optimize your results.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第五章*](Chapter_05.xhtml#_idTextAnchor491)中，我们将讨论如何利用这个AI助手的特性。目前，我们将关注如何更新幻灯片母版以优化您的结果。
- en: Microsoft’s recommendations
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Microsoft的建议
- en: Even though Copilot for M365 in PowerPoint was officially launched by Microsoft
    in March 2023, supporting branded corporate templates only became available in
    November 2024. That is also when they made recommendations on how corporate templates
    should be updated so users would get AI results more aligned with their brand.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Microsoft在2023年3月正式发布了PowerPoint中的M365 Copilot，但仅支持品牌企业模板的功能直到2024年11月才可用。那时，他们还提出了关于如何更新企业模板的建议，以便用户能够获得与品牌更一致的AI结果。
- en: Since those recommendations are still quite new at the time I am writing this
    book, I’ll focus on giving you the high-level information and referring to Microsoft’s
    documentation in the *Further reading* section, so you have access to any updates
    on their part in the future.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些推荐在我撰写本书时仍然相当新颖，我将专注于为您提供高级信息，并在*进一步阅读*部分引用Microsoft的文档，以便您能够访问他们未来的任何更新。
- en: When creating presentation content with Copilot, it will look at the layouts
    in your template. It will try using the best fit for the content it wants to create
    from your prompts. The following are three categories of elements to consider
    with a short explanation for each.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用Copilot创建演示文稿内容时，它将查看您的模板中的布局。它将尝试使用最适合从您的提示中创建内容的布局。以下是需要考虑的三个元素类别，每个类别都有简短的说明。
- en: Placeholder size variety
  id: totrans-235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 占位符大小多样性
- en: Since your Copilot assistant will be looking for placeholders to add its suggested
    content, if your template’s layouts only have placeholders of the same size, text
    content will likely look cluttered.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 由于您的Copilot助手将寻找占位符以添加其建议的内容，如果您的模板布局中只有相同大小的占位符，文本内容可能会显得杂乱。
- en: 'This is caused by my first pain-point with AI-created slides: there is usually
    *too much text* . My suggestion is to plan various placeholder sizes, as recommended
    by Microsoft, so your corporate template will be usable by Copilot, but plan on
    having some text-reduction work to do after AI slides are created.'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我对AI创建的幻灯片的第一个痛点：通常有**太多文本**。我的建议是按照Microsoft的建议规划各种占位符大小，这样您的企业模板就可以被Copilot使用，但请计划在AI幻灯片创建后进行一些文本减少工作。
- en: Slide layout variety
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 幻灯片布局多样性
- en: 'To accommodate the size variety recommendation, you inevitably have to create
    more layouts. If you only use standard layouts, it will also be difficult for
    Copilot to create varied content. You should plan on creating more than one version
    for each layout you have. As an example, if you customized the *Two Content* standard
    layout, duplicate it and change one of the content placeholders to a picture placeholder.
    The same thing for your *Title Slide* layout: add versions with or without images
    or graphic elements.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 为了适应大小多样性建议，您不可避免地需要创建更多布局。如果您只使用标准布局，Copilot创建多样化内容也会很困难。您应该计划为每个布局创建多个版本。例如，如果您自定义了*双内容*标准布局，请复制它并将其中一个内容占位符更改为图片占位符。对于您的*标题幻灯片*布局也是如此：添加带有或不带有图像或图形元素的版本。
- en: Naming layouts
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 命名布局
- en: The last recommendation category is to use a clear naming convention for your
    layouts. This means indicating clearly why a layout is created. Copilot will understand
    words such as **Title** , **Agenda** , **Section** , **Content** and **Conclusion**
    , so make sure to use them.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个推荐类别是使用清晰的命名约定来命名您的布局。这意味着清楚地说明创建布局的原因。Copilot会理解诸如**标题**、**议程**、**章节**、**内容**和**结论**等词语，所以请确保使用它们。
- en: You can find the link to Microsoft’s blog post, *Keep your presentations on
    brand with Copilot in PowerPoint* , in the *Further reading* section. They also
    have some examples illustrating each recommendation.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在**进一步阅读**部分找到指向微软博客文章的链接，“使用Copilot在PowerPoint中保持演示文稿的品牌一致性”。他们还提供了一些示例，说明了每个建议。
- en: Using the Copilot PowerPoint Starter Template
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Copilot PowerPoint Starter Template
- en: At the bottom of Microsoft’s blog post, you will also find a download link for
    a PowerPoint file named *Copilot PowerPoint Starter Template Nov 2024* . I should
    add that you must scroll down past the **Feedback** section of the post to find
    the gray box allowing download.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在微软博客文章的底部，您还可以找到名为“Copilot PowerPoint Starter Template Nov 2024”的PowerPoint文件的下载链接。我应该补充一点，您必须滚动到文章的**反馈**部分之后，才能找到允许下载的灰色框。
- en: The starter template includes nine slides that explain the size recommendation
    and give you the steps you need to copy and paste starter layouts in your own
    files. You also have links to additional resources on the last slide.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 起始模板包括九个幻灯片，解释了尺寸建议，并提供了您在自身文件中复制和粘贴起始布局所需的步骤。您还可以在最后一页找到指向附加资源的链接。
- en: Be warned that meeting Copilot’s need for various sizes and layouts will add
    *43 layouts* to your actual template. It’s a starting point to quickly add layouts
    with a naming convention that will help Copilot, but you will need to customize
    them with your own branding, too.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 提醒您，满足Copilot对各种尺寸和布局的需求将向您的实际模板中添加**43个布局**。这是一个快速添加布局的起点，具有有助于Copilot的命名约定，但您还需要使用自己的品牌进行定制。
- en: As you probably realize now, making your template compatible with Copilot is
    not just a matter of a few extra clicks of the mouse; however, the time invested
    here will help you get better results when using Copilot to create content. And
    yes, I mentioned *better results* , not *impressive content ready f or delivery*
    . We will discuss Copilot’s other limitations in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor491)
    .
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 如您现在可能意识到的，使您的模板与Copilot兼容不仅仅是鼠标点击几个额外按钮的问题；然而，在这里投入的时间将帮助您在使用Copilot创建内容时获得更好的结果。是的，我提到了**更好的结果**，而不是**准备交付的令人印象深刻的内容**。我们将在[*第五章*](Chapter_05.xhtml#_idTextAnchor491)中讨论Copilot的其他限制。
- en: Summary
  id: totrans-248
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed layouts and placeholders so that you understand
    their role in the slide master. We also covered how to choose theme fonts and
    colors, as well as how to format your standard layouts and create new ones. And
    finally, we introduced Microsoft recommendations to help you keep your template
    on brand if you are planning to use Copilot in M365.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了布局和占位符，以便您了解它们在幻灯片母版中的作用。我们还介绍了如何选择主题字体和颜色，以及如何格式化您的标准布局并创建新的布局。最后，我们介绍了微软的建议，帮助您在计划在M365中使用Copilot时保持模板的品牌一致性。
- en: Of course, many more topics could have been included in this chapter if the
    main goal had been the creation of a robust corporate template. With what you
    have learned, you will be able to have a decent template to work from and save
    yourself a lot of time creating your slides afterward. Even if you have a feeling
    that it will take you too much time, I can guarantee you that it is all worth
    it. You will be able to reuse slides and create new presentations very quickly
    the second time around.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果本章的主要目标是创建一个强大的企业模板，那么可以包含更多主题。凭借您所学的知识，您将能够拥有一个不错的模板来工作，并在之后创建幻灯片时节省大量时间。即使您觉得这会花费您太多时间，我也可以向您保证，这一切都是值得的。您将能够在第二次使用时快速重用幻灯片并创建新的演示文稿。
- en: In the next chapter, you will learn about the handout and notes masters so you
    can make your PowerPoint file serve more than one purpose without overcrowding
    your slides. We will also explore tools that will help you make your presentations
    more accessi ble and various ways you can print or create PDFs from your documents.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将了解讲义和备注母版，这样您就可以在不使幻灯片过于拥挤的情况下使您的PowerPoint文件服务于多个目的。我们还将探讨帮助您使演示文稿更易于访问的工具以及从您的文档中打印或创建PDF的各种方法。
