- en: If you’re interested in becoming an author for Packt, please visit [authors.packt.com](https://authors.packt.com/)
    and apply today. We have worked with thousands of developers and tech professionals,
    just like you, to help them share their insight with the global tech community.
    You can make a general application, apply for a specific hot topic that we are
    recruiting an author for, or submit your own idea.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对成为 Packt 的作者感兴趣，请访问 [authors.packt.com](https://authors.packt.com/) 并今天申请。我们与成千上万的开发者和技术专业人士合作，就像你一样，帮助他们将见解分享给全球技术社区。你可以提交一般申请，申请我们正在招募作者的特定热门话题，或者提交你自己的想法。
- en: Share your thoughts
  id: totrans-295
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分享你的想法
- en: Now you’ve finished *Microsoft PowerPoint Mastery* , we’d love to hear your
    thoughts! If you purchased the book from Amazon, please [click here to go straight
    to the Amazon review page](https://packt.link/r/1835882250) for this book and
    share your feedback or leave a review on the site that you purchased it from.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经完成了 *Microsoft PowerPoint Mastery*，我们非常想听听你的想法！如果你从亚马逊购买了这本书，请[点击此处直接跳转到该书的亚马逊评论页面](https://packt.link/r/1835882250)并分享你的反馈或在该购买网站上留下评论。
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评论对我们和科技社区都非常重要，并将帮助我们确保我们提供高质量的内容。
