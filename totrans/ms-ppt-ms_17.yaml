- en: '14'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: PowerPoint Live and Interactive Features in Microsoft Teams
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Microsoft Teams 中的 PowerPoint Live 和交互式功能
- en: If you present virtually, you might run into challenges while trying to figure
    out the best way to share your PowerPoint presentation. Yes, you could simply
    share your whole screen and use **Presenter View** , as discussed in the previous
    chapter. But then you might have a hard time seeing your meeting controls, especially
    if you are working with only one monitor.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您进行虚拟演示，在尝试确定最佳方式来共享您的 PowerPoint 演示文稿时可能会遇到挑战。是的，您可以直接共享整个屏幕并使用**演示者视图**，如前一章所述。但这样您可能很难看到会议控制，尤其是如果您只使用一台显示器。
- en: With virtual presentations now part of our business lives, I wanted to include
    a chapter on leveraging Microsoft Teams’ PowerPoint Live and other features to
    create more interactions and engagement. Why Teams and not another virtual meeting
    tool? Simply because it is the application I have been using and have seen evolve
    since its introduction in 2017, and its ability to leverage many more features
    included in Microsoft 365.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着虚拟演示现在成为我们商业生活的一部分，我想包含一个章节，介绍如何利用 Microsoft Teams 的 PowerPoint Live 和其他功能来创造更多的互动和参与。为什么选择
    Teams 而不是其他虚拟会议工具？简单来说，因为它是我自 2017 年推出以来一直在使用并看到其发展的应用程序，以及它利用 Microsoft 365 中包含的更多功能的能力。
- en: 'To help you take your presentations to a new level using PowerPoint Live within
    Teams, here are the topics discussed in this chapter:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您在 Teams 中使用 PowerPoint Live 将演示文稿提升到新的水平，本章讨论了以下主题：
- en: Getting started with and using PowerPoint Live
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始使用并使用 PowerPoint Live
- en: Creating and using breakout rooms
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建和使用分组会议室
- en: Using Q&A and Polls to create more interactions
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用问答和投票来创造更多互动
- en: Creating and using an avatar
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建和使用头像
- en: Improving the camera, lighting, and microphone setup
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改善摄像头、照明和麦克风设置
- en: Technical requirements
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: You need access to Microsoft Teams with a Microsoft 365 work or school license
    to have access to PowerPoint Live. Be aware that since Microsoft Teams, just like
    the subscription version of PowerPoint, is updated on an ongoing basis, it is
    possible that screenshots shown in this chapter might differ from your version
    of the application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要使用带有 Microsoft 365 工作或学校许可证的 Microsoft Teams 才能访问 PowerPoint Live。请注意，由于
    Microsoft Teams，就像 PowerPoint 的订阅版本一样，会持续更新，因此本章中显示的截图可能与您应用程序的版本不同。
- en: 'The *Creating and using an avatar* section has additional requirements:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建和使用头像*部分有额外的要求：'
- en: A Teams Essentials or M365 Business / Enterprise license
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Teams Essentials 或 M365 Business / Enterprise 许可证
- en: The Teams desktop application
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Teams 桌面应用程序
- en: A decently powerful computer using Windows or macOS
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一台运行 Windows 或 macOS 的相当强大的计算机
- en: The Avatars app to be allowed in the Teams admin center by IT
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要由 IT 在 Teams 管理中心允许使用 Avatars 应用
- en: Getting started with and using PowerPoint Live
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始使用并使用 PowerPoint Live
- en: Trying to manage your PowerPoint presentation, participants, reactions, and
    the chat pane in Microsoft Teams can be quite challenging, especially if you only
    have one monitor connected to your computer. Even when you do have two monitors,
    handling the various overlapping windows can be overwhelming.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试在 Microsoft Teams 中管理您的 PowerPoint 演示文稿、参与者、反应和聊天窗口可能会相当具有挑战性，尤其是如果您只连接了一台显示器到您的计算机。即使您有两台显示器，处理各种重叠的窗口也可能令人不知所措。
- en: 'That is when the PowerPoint Live feature can help you. You will find it when
    clicking on the **Share** button ( **1** ) in your Teams meeting window ( *Figure
    14.1* ):'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 此时，PowerPoint Live 功能可以帮助您。您可以在点击 Teams 会议窗口中的 **共享** 按钮（**1**）时找到它（*图 14.1*）：
- en: '![Figure 14.1 – Starting PowerPoint Live from the share screen feature in Teams](img/B32063_14_01.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.1 – 从 Teams 的共享屏幕功能启动 PowerPoint Live](img/B32063_14_01.png)'
- en: Figure 14.1 – Starting PowerPoint Live from the share screen feature in Teams
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.1 – 从 Teams 的共享屏幕功能启动 PowerPoint Live
- en: 'Let’s start by defining what sharing options are available:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义一下可用的共享选项：
- en: '**Include sound** ( **2** ): Make sure you toggle this option on if your presentation
    includes sound. This is the only way attendees will hear it.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**包含声音**（**2**）：如果您演示文稿中包含声音，请确保切换此选项。这是与会者能够听到声音的唯一方式。'
- en: 'The **Presenter mode** section ( **3** ):'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**演示者模式**部分（**3**）：'
- en: '**Content only** ( **4** ) will only display shared content.'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅内容**（**4**）将仅显示共享内容。'
- en: '**Standout** mode ( **5** ) overlaps your video feed on top of your slides.'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**突出显示**模式（**5**）将视频流叠加在幻灯片上方。'
- en: '**Side-by-Side** ( **6** ) displays your video feed next to your slides or
    content.'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并排** ( **6** )显示你的视频流在你的幻灯片或内容旁边。'
- en: '**Reporter** ( **7** ) displays your slides at an angle to the left of your
    video feed, just as we see for news reporters.'
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**报告者** ( **7** )模式将你的幻灯片显示在视频流的左侧角度，就像我们看到的新闻报道者一样。'
- en: You cannot use the **Standout** , **Side-by-Side** , or **Reporter** mode when
    sharing a presentation through PowerPoint Live.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当通过PowerPoint Live共享演示文稿时，你不能使用**突出显示**、**并排**或**报告者**模式。
- en: The **Add background** button ( **8** ) gives you access to either blur or choose
    a background image.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**添加背景**按钮 ( **8** )让你可以选择模糊或选择背景图片。'
- en: The **Screen** ( **9** ) section allows you to share your whole screen so you
    can easily switch from one window to another while sharing the screen. If you
    only have one monitor, only one thumbnail view will be available.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**屏幕** ( **9** )部分允许你共享整个屏幕，这样你可以在共享屏幕的同时轻松地在不同的窗口之间切换。如果你只有一个显示器，则只有一个缩略图视图可用。'
- en: '**Warning** : this type of screen share shows everything on your screen to
    you r attendees. Make sure you have closed any confidential content before you
    start your meeting.'
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**警告**：这种类型的屏幕共享会将你的屏幕上的所有内容显示给你的参会者。在开始会议之前，请确保你已经关闭了任何机密内容。'
- en: The **Window** ( **10** ) section allows you to choose a specific window to
    share. The number in parentheses shows you how many single windows are available
    to choose from. Clicking on the window illustration displays previews of all your
    windows so you can choose the one you need.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**窗口** ( **10** )部分允许你选择要共享的特定窗口。括号中的数字显示你可以从多少个单个窗口中进行选择。点击窗口插图将显示所有窗口的预览，以便你可以选择所需的窗口。'
- en: '**Microsoft Whiteboard** ( **11** ) allows sharing an existing or new virtual
    board so everyone can sketch and brainstorm on it.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Whiteboard** ( **11** )允许共享现有的或新的虚拟白板，以便每个人都可以在上面绘制和头脑风暴。'
- en: '**Content from camera** ( **12** ) allows you to share external content with
    your camera or from a more complex equipment setting.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**来自摄像头的** ( **12** )内容允许你通过摄像头或从更复杂的设备设置共享外部内容。'
- en: The **PowerPoint Live** section ( **13** ) is where a list of your recent PowerPoint
    files will be displayed if they are stored in your OneDrive for Business or SharePoint
    sites. Clicking on one of the files starts sharing your content with PowerPoint
    Live, which we’ll describe soon. You might need to scroll down the list to view
    the **Show more** option ( **14** ).
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PowerPoint Live** ( **13** )部分将显示你的最近PowerPoint文件列表，如果它们存储在你的OneDrive for
    Business或SharePoint站点上。点击其中一个文件将开始使用PowerPoint Live共享你的内容，我们将在后面进行描述。你可能需要滚动列表以查看**显示更多**选项
    ( **14** )。'
- en: The **Excel Live** ( **15** ) section allows sharing and collaborating in an
    Excel file during your meeting. There are some restrictions, such as a maximum
    of 25 attendees and people outside your organization not being granted access.
    Please see *Further reading* for the full support article.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Excel Live** ( **15** )部分允许你在会议期间共享和协作Excel文件。有一些限制，例如最多25名参会者和组织外的人无法获得访问权限。请参阅*进一步阅读*以获取完整的支持文章。'
- en: If you did not have any files in the PowerPoint Live list, or the one you need
    is not there, you can use **Browse OneDrive** or **Browse my computer** ( **16**
    ) to load your presentation and use it.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你PowerPoint Live列表中没有文件，或者你需要的是不在那里的文件，你可以使用**浏览OneDrive**或**浏览我的电脑** ( **16**
    )来加载你的演示文稿并使用它。
- en: If you browse your computer or a network drive to upload a presentation file,
    it gets added to the meeting files. If you create a personal meeting, the file
    is made available to meeting participants when they open the Teams meeting details
    in their calendar, and it is saved in your OneDrive space. If you create a channel
    meeting, the file is available to all team members in the team files.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你浏览计算机或网络驱动器以上传演示文稿文件，它将被添加到会议文件中。如果你创建一个个人会议，文件将在参与者打开日历中的Teams会议详细信息时对会议参与者可用，并保存在你的OneDrive空间中。如果你创建一个频道会议，文件将在团队文件中对所有团队成员可用。
- en: 'After selecti ng a PowerPoint file from the PowerPoint Live list, a loading
    screen will appear until the application is ready. Your Teams meeting screen will
    be adjusted to include PowerPoint Live features ( **1** ), which have a similar
    layout to Presenter View, seen in the previous chapter, while keeping your meeting
    management tools available ( *Figure 14.2* ) :'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在从PowerPoint Live列表中选择PowerPoint文件后，将出现一个加载屏幕，直到应用程序准备就绪。你的Teams会议屏幕将调整以包括PowerPoint
    Live功能 ( **1** )，这些功能与上一章中看到的演示者视图布局相似，同时保持你的会议管理工具可用 (*图14.2*)：
- en: '![Figure 14.2 – PowerPoint Live features integrated into your Teams meeting
    window](img/B32063_14_02.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.2 – PowerPoint Live 功能集成到您的 Teams 会议窗口](img/B32063_14_02.png)'
- en: Figure 14.2 – PowerPoint Live features integrated into your Teams meeting window
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.2 – PowerPoint Live 功能集成到您的 Teams 会议窗口
- en: I also opened the **Participants** pane ( **2** ), labeled as **People** ( **3**
    ) in the meeting tools, to show you how easy it is to manage the presentation
    and your attendees.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我还打开了**参与者**面板（**2**），在会议工具中标记为**人员**（**3**），以向您展示管理演示和您的与会者有多容易。
- en: 'A new category of tools ( **4** ) becomes available in the meeting toolbar,
    above the meeting window:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在会议工具栏中，会议窗口上方出现了一类新的工具（**4**）：
- en: '**Stop sharing** ( **5** ) is where you must click when you want to stop sharing
    your presentation.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**停止共享**（**5**）是您想要停止共享演示时必须点击的地方。'
- en: '**Layout** ( **6** ): This button toggles the focus from **Cameo** to **Content
    only** when a Cameo object is detected on your slide.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**布局**（**6**）：当检测到幻灯片上的 Cameo 对象时，此按钮会在**轮廓**和**仅内容**之间切换焦点。'
- en: '**Private view** ( **7** ) is a must-know feature! By default, attendees can
    navigate your slides while you are presenting, even the ones that have not yet
    been covered. To disable browsing through your upcoming slides, click the **eye**
    icon.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**私密视图**（**7**）是一个必须了解的功能！默认情况下，与会者可以在您演示时浏览您的幻灯片，即使是没有被覆盖的幻灯片。要禁用浏览即将到来的幻灯片，请点击**眼睛**图标。'
- en: '**Pop out** ( **8** ) allows having PowerPoint Live in a separate window. I
    suggest you avoid using it if you have only one monitor, as it will make your
    meeting management more complex.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹出**（**8**）允许将 PowerPoint Live 放在一个单独的窗口中。如果您只有一个显示器，我建议您避免使用它，因为它会使您的会议管理更加复杂。'
- en: When using the PowerPoint Live sharing feature, there are a few things going
    on in the background that explain the loading icon. Your file, if it was not already
    stored in cloud storage, is first uploaded to your OneDrive if it’s a personal
    meeting, or SharePoint if it is a channel meeting. Then the file is processed
    and optimized so it can run as a web-based experience inside Teams. This step
    allows Teams to stream the same cloud-hosted version to each participant while
    making it possible to use live captions and translations. PowerPoint Live uses
    less bandwidth than screen sharing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 PowerPoint Live 共享功能时，后台有一些操作解释了加载图标。如果您的文件尚未存储在云端存储中，那么如果是个人会议，它首先会被上传到您的
    OneDrive；如果是频道会议，则上传到 SharePoint。然后文件会被处理和优化，以便在 Teams 中作为基于网页的体验运行。这一步骤允许 Teams
    向每个参与者流式传输相同的云端托管版本，同时使实时字幕和翻译成为可能。PowerPoint Live 使用比屏幕共享更少的带宽。
- en: 'PowerPoint Live makes it easy to navigate through your slides because most
    tools are like the ones we have described in Presenter View in the previous chapter.
    Let’s review what you have available ( *Figure 14.3* ):'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint Live 使您轻松浏览幻灯片变得容易，因为大多数工具都类似于我们在上一章中在演示者视图中描述的工具。让我们回顾一下您可以使用的内容（*图
    14.3*）：
- en: '![Figure 14.3 – Using PowerPoint Live tools during your presentation](img/B32063_14_03.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.3 – 在您的演示中使用 PowerPoint Live 工具](img/B32063_14_03.png)'
- en: Figure 14.3 – Using PowerPoint Live tools during your presentation
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.3 – 在您的演示中使用 PowerPoint Live 工具
- en: You have arrows, the current slide number, and the total number of slides for
    slide navigation ( **1** ).
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您有箭头、当前幻灯片的编号以及幻灯片总数，用于幻灯片导航（**1**）。
- en: The slide thumbnail strip ( **2** ) to quickly access another slide.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩略图条**（**2**）用于快速访问另一张幻灯片。'
- en: The list of all your slides in **Grid view** ( **3** ) to easily show one on
    demand.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您所有幻灯片的列表在**网格视图**（**3**）中显示，以便按需轻松展示。
- en: The notes pane ( **4** ) displays your notes but does not allow adding or changing
    them during your presentation, like in Presenter View, at least at the time this
    chapter was reviewed. But you do have tools to increase or decrease the font size
    ( **5** ).
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**笔记**面板（**4**）显示您的笔记，但在您的演示过程中不允许添加或更改它们，至少在审查这一章节时是这样的。但您确实有工具可以增加或减少字体大小（**5**）。'
- en: 'In **More actions (…)** ( **6** ):'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**更多操作（…）**（**6**）中：
- en: You can remove your notes and the strip of slide thumbnails with **Hide presenter
    view** ( **7** ) while keeping the line of tools below the slide preview.
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用**隐藏演示者视图**（**7**）来移除您的笔记和幻灯片缩略图条，同时保留幻灯片预览下方的工具行。
- en: You have access to the **Magnify slide for all** tool ( **8** ), which requires
    clicking on the **+** sign. You don’t need it if you are comfortable using the
    *Ctrl* + *mouse wheel* tip to zoom in and out, which was discussed for Presenter
    View.
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用**放大所有幻灯片**工具（**8**），这需要点击**+**号。如果您习惯使用*Ctrl* + *鼠标滚轮*技巧来缩放，那么您可能不需要它，这在演示者视图中已经讨论过。
- en: '**View slides in high contrast** ( **9** ) is an accessibility feature on the
    attendees’ side. It helps people with visual contrast or color issues.'
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以高对比度查看幻灯片**（**9**）是参会者侧的一个辅助功能。它帮助有视觉对比度或颜色问题的参会者。'
- en: '**Translate slides** ( **10** ) lets attendees choose the language to machine-translate
    the text on your slides. Be aware that machine translation is not perfect and
    that it will introduce formatting variations.'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**翻译幻灯片**（**10**）允许参会者选择语言以机器翻译您幻灯片上的文本。请注意，机器翻译并不完美，它可能会引入格式变化。'
- en: The annotation tools ( **11** ) are like the ones discussed for Presenter View.
    Click on one of them to change your mouse cursor into a laser pointer, pen, or
    highlighter. Clicking on the icon a second time brings up settings such as color
    or thickness, when applicable. Use the eraser to remove an annotation or click
    a second time to access the setting to erase all the annotations on the slide.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注释工具（**11**）与用于演示者视图讨论的工具类似。点击其中一个工具，可以将鼠标光标转换为激光指针、笔或荧光笔。点击图标第二次时，会弹出设置，如颜色或粗细（如有适用）。使用橡皮擦删除注释，或点击第二次以访问清除幻灯片上所有注释的设置。
- en: Using PowerPoint Live during your virtual meetings is a great way to stay in
    control of your presentation and your participants’ interactions. You could also
    use it as a practice tool for yourself, recording your sessions and then reviewing
    them for timing and how you are looking at your camera. Practicing your virtual
    presentations ahead of time is a great way to keep improving your delivery.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的虚拟会议中使用PowerPoint Live是一种保持对演示和参会者互动控制的绝佳方式。您还可以将其用作自己的练习工具，记录您的会议，然后回顾它们以检查时间安排和您看摄像头的方式。提前练习您的虚拟演示是一种不断提高您表现力的好方法。
- en: We will briefly discuss how you can make some adjustments to your meeting view
    in the next section.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一节中简要讨论您如何调整会议视图。
- en: Adjusting your meeting view
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调整您的会议视图
- en: 'When using PowerPoint Live in Teams, you automatically see attendees, and your
    own camera feed or tile, displayed above the slide preview ( **1** ). You can
    change this view to fit your needs ( *Figure 14 .4* ):'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在Teams中使用PowerPoint Live时，您会自动看到参会者以及您自己的摄像头流或瓷砖，它们显示在幻灯片预览上方（**1**）。您可以根据需要更改此视图（*图14.4*）：
- en: '![Figure 14.4 – Changing how video cameras are displayed while using PowerPoint
    Live](img/B32063_14_04.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图14.4 – 使用PowerPoint Live时更改视频摄像头的显示方式](img/B32063_14_04.png)'
- en: Figure 14.4 – Changing how video cameras are displayed while using PowerPoint
    Live
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.4 – 使用PowerPoint Live时更改视频摄像头的显示方式
- en: 'We will discuss some interesting settings to consider from the **View** menu
    ( **2** ):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一节中讨论一些从**查看**菜单（**2**）中考虑的有趣设置：
- en: '**Focus on content** ( **3** ): Activating this feature removes camera feeds
    and tiles above your slide preview. If no one is using their camera, it might
    be worth using it so your content can fill the whole space.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚焦内容**（**3**）：激活此功能将移除您的幻灯片预览上方的摄像头流和瓷砖。如果没有人使用摄像头，那么使用它可能值得，这样您的内容就可以填满整个空间。'
- en: '**Prioritize video** ( **4** ): Aligns video feeds first in the attendee list.
    People with their camera off will be listed at the end.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先显示视频**（**4**）：首先在参会者列表中排列视频流。关闭摄像头的参会者将被列在最后。'
- en: '**More options** | **Show gallery on the right** ( **5** ): When you have at
    least four participants with their video turned on, this feature is active and
    allows moving the gallery vertically on the right of your PowerPoint Live view.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更多选项** | **在右侧显示图库**（**5**）：当至少有四个参会者开启视频时，此功能处于活动状态，并允许在PowerPoint Live视图的右侧垂直移动图库。'
- en: You must be in **Gallery** view in Teams desktop with the application window
    wide enough to support that side-by-side layout.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须在Teams桌面上的**图库**视图中，并且应用程序窗口足够宽，以支持并排布局。
- en: There are many View options you can explore. The ones discussed were the most
    relevant to our topic, covering PowerPoint Live in Teams.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以探索许多查看选项。讨论的这些选项与我们的话题最相关，涵盖了在Teams中使用PowerPoint Live。
- en: If you are using subtitles when presenting in PowerPoint to make your presentations
    more accessible, there are features in Teams you must know about to make presenting
    with PowerPoint Live more accessible, which is the topic of the next section.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在 PowerPoint 中使用字幕来使您的演示更易于访问，那么您必须了解 Teams 中的功能，以便使使用 PowerPoint Live 的演示更易于访问，这是下一节的主题。
- en: Making PowerPoint Live presentations more accessible
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使 PowerPoint Live 演示更易于访问
- en: 'When using PowerPoint Live in Teams, it does n’t show subtitles configured
    in PowerPoint; therefore, you will need to turn them on in Teams ( *Figure 14.5*
    ):'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当在 Teams 中使用 PowerPoint Live 时，它不会显示 PowerPoint 中配置的字幕；因此，您需要在 Teams 中将其打开（*图
    14.5*）：
- en: '![Figure 14.5 – Turning on subtitles in Teams](img/B32063_14_05.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.5 – 在 Teams 中开启字幕](img/B32063_14_05.png)'
- en: Figure 14.5 – Turning on subtitles in Teams
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.5 – 在 Teams 中开启字幕
- en: Go to the **More** ( **…** ) menu ( **1** ) and open the **Language and speech**
    features ( **2** ). Click on **Show live captions** .
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往**更多**（**…**）（**1**）菜单并打开**语言和语音**功能（**2**）。点击**显示实时字幕**。
- en: At the bottom of your PowerPoint Live view, a **Captions** panel will display
    ( **3** ), mentioning translation settings if they were previously used.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 PowerPoint Live 视图的底部，将显示一个**字幕**面板（**3**），如果之前使用过，将提及翻译设置。
- en: Click on the **Open caption settings** icon ( **4** ) and select **Language
    settings** to open the **Language** **settings** pane ( **5** ). You will be able
    to select the spoken language, activate captions translation, and select the translation
    language. The translation option will work with M365 Business Premium, E3, and
    E5 licenses.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**打开字幕设置**图标（**4**），然后选择**语言设置**以打开**语言****设置**面板（**5**）。您将能够选择口语语言，激活字幕翻译，并选择翻译语言。翻译选项将适用于
    M365 商业高级版、E3 和 E5 许可证。
- en: To change the caption styles, go back to the **Open caption settings** icon
    ( **4** ), then select **Caption styles** ( **6** ) – a new pane will open. You
    can change the font and background colors, the font size, the panel height, and
    its position, at the bottom or at the top.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要更改字幕样式，请返回到**打开字幕设置**图标（**4**），然后选择**字幕样式**（**6**） – 将打开一个新的面板。您可以更改字体和背景颜色、字体大小、面板高度及其位置，在底部或顶部。
- en: The other option you should consider for more accessible and inclusive presentations
    is **Start transcription** ( **7** ), available in **Record and transcribe** in
    the **More** ( **…** ) ( **1** ) menu. Starting the feature opens a pane on the
    right of your meeting screen and captures what each participant is saying, either
    with their name or anonymously, depending on the Teams settings they chose. It
    can be a productive feature for meetings, capturing your discussions as you go.
    Transcriptions can also help you repurpose your virtual presentations because
    you can download the transcript as a Word file or `.vtt` file to add captions
    to your videos. The feature is limited to the desktop version of Teams and to
    a select set of licenses. See the support article in *Further reading* for details.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以考虑的另一个选项是**开始转录**（**7**），在**更多**（**…**）（**1**）菜单中的**录制和转录**中可用。启动此功能将在您的会议屏幕右侧打开一个面板，并捕捉每个参与者所说的话，要么用他们的名字，要么匿名，这取决于他们选择的
    Teams 设置。它可以是会议中的一个富有成效的功能，因为它可以记录您的讨论。转录还可以帮助您重新利用虚拟演示，因为您可以将转录内容下载为 Word 文件或
    `.vtt` 文件以添加到您的视频中。此功能仅限于 Teams 的桌面版本和选定的一组许可证。有关详细信息，请参阅“进一步阅读”中的支持文章。
- en: Now that we have s een the most important features that can be used while sharing
    a presentation with PowerPoint Live, let’s see how to use breakout rooms from
    your meeting window to create more enga gement.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了在使用 PowerPoint Live 共享演示时可以使用的最重要的功能，让我们看看如何从您的会议窗口中使用分组讨论室来创造更多的参与度。
- en: Creating and using breakout rooms
  id: totrans-86
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建和使用分组讨论室
- en: There are many scenarios in which you can use breakout rooms during a Teams
    meeting. And there are lots of ways to create and use those rooms too! Since I
    want to keep the focus on how using this feature can be helpful to keep your presentation
    attendees engaged , I will discuss only one scenario in the following example.
    If you want to learn more about the various ways to create and use breakout rooms,
    have a look at the support article listed in *Further reading* .
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Teams 会议中，您可以使用分组讨论室的场景有很多。创建和使用这些房间的方法也有很多！由于我想保持关注如何使用此功能来保持演示参与者参与，以下示例中我将只讨论一个场景。如果您想了解更多关于创建和使用分组讨论室的各种方法，请参阅“进一步阅读”中列出的支持文章。
- en: Let’s sa y you are delivering a workshop using Teams meetings. If you were in
    a room with your attendees, you would probably ask them to work in small groups
    to discuss a specific topic that each team would present to the whole group.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在使用 Teams 会议进行工作坊。如果你在一个房间里与你的参会者在一起，你可能会要求他们分成小组讨论一个特定的话题，每个小组将向整个小组展示。
- en: 'To reproduce this team exercise from your meeting window, you need to click
    on the **Rooms** icon ( **1** ) to access the **Create breakout rooms** pane (
    **2** ) ( *Figur e 14.6* ):'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 要从你的会议窗口重现这个团队练习，你需要点击 **会议室** 图标（**1**）以访问 **创建分组会议室** 面板（**2**）（*图 14.6*）：
- en: '![Figure 14.6 – Creating and using breakout rooms in Teams](img/B32063_14_06.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.6 – 在 Teams 中创建和使用分组会议室](img/B32063_14_06.png)'
- en: Figure 14.6 – Creating and using breakout rooms in Teams
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.6 – 在 Teams 中创建和使用分组会议室
- en: The first section, **Choose the number of rooms you want to create** ( **3**
    ), has a drop-down list to choose the number of rooms you want to create; up to
    50 breakout rooms can be created. For our example, I will keep **2** as the number
    of rooms to create.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一部分，**选择你想要创建的会议室数量**（**3**），有一个下拉列表来选择你想要创建的会议室数量；最多可以创建 50 个分组会议室。在我们的例子中，我将保持
    **2** 作为要创建的会议室数量。
- en: In the **Assign participants** section ( **4** ), the default option is **Automatically
    assign people to each room** ( **5** ), where you will see the number of people
    already in your meeting. The **Let people choose their rooms** ( **6** ) option
    can be very interesting when you are creating various exercises led by facilitators,
    allowing participants to select the topic of their choice.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 **分配参与者** 部分（**4**），默认选项是 **自动将人员分配到每个会议室**（**5**），在这里你会看到已经参加会议的人数。**让人员选择他们的会议室**（**6**）选项在你创建由引导者领导的多种练习时可能非常有趣，允许参与者选择他们偏好的话题。
- en: The only thing left to do is to click on the **Create rooms** button ( **7**
    ) to change the right-hand pane to **Breakout rooms** ( **8** ) with its own set
    of tools and an **Open rooms** ( **9** ) button.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剩下的唯一事情就是点击 **创建会议室** 按钮（**7**），将右侧面板更改为 **分组会议室**（**8**），它有一套自己的工具和一个 **打开会议室**（**9**）按钮。
- en: When you need breakout rooms on the fly, automatically assigning people is quick
    and e asy to do. If you need to assign specific people t o certain groups, consult
    the Microsoft Support article in *Further reading* to see how you can create your
    breakout rooms before your event. That is a more efficient way of doing it when
    structure is key and you have many participants.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要即时创建分组会议室时，自动分配人员既快又简单。如果你需要将特定人员分配到特定的小组，请参考 *进一步阅读* 中的 Microsoft 支持文章，了解如何在活动之前创建你的分组会议室。当结构至关重要且参与者众多时，这是一种更有效的方法。
- en: 'After opening your rooms, you can manage them from the **Breakout rooms** pane.
    In my example, one room remained closed ( **1** ) because there were no participants
    to add to it ( *Figur e 14.7* ):'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你的会议室后，你可以从 **分组会议室** 面板中管理它们。在我的例子中，有一个会议室保持关闭状态（**1**），因为没有参与者可以添加到其中（*图
    14.7*）：
- en: '![Figure 14.7 – Manage breakout rooms and settings](img/B32063_14_07.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.7 – 管理分组会议室和设置](img/B32063_14_07.png)'
- en: Figure 14.7 – Manage breakout rooms and settings
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.7 – 管理分组会议室和设置
- en: Clicking on the **small arrow** on the left of an opened room opens the list
    of participants ( **2** ).
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击打开的会议室左侧的 **小箭头** 打开参与者列表（**2**）。
- en: Hovering over the room displays options ( **…** ) ( **3** ) allowing you to
    join, rename, or close the room.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将鼠标悬停在会议室上会显示选项（**…**）（**3**），允许你加入、重命名或关闭会议室。
- en: The **Close rooms** button ( **4** ) closes them all at once and brings participants
    back into your main Teams meeting.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关闭会议室** 按钮（**4**）一次性关闭所有会议室，并将参与者带回你的主要 Teams 会议。'
- en: When your rooms are closed, you have access to **Settings** ( **5** ), which
    allows assigning people to manage the rooms ( **6** ), toggling the **Set a time
    limit** ( **7** ) feature to active and selecting the duration in the **hours**
    and **minutes** lists, and deciding whether people can choose their rooms or return
    to the main meeting on their own ( **8** ). Always click on the **Save** button
    after you have made any changes.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你的会议室关闭时，你可以访问 **设置**（**5**），这允许分配人员来管理会议室（**6**），切换 **设置时间限制**（**7**）功能为激活状态，并在
    **小时** 和 **分钟** 列表中选择持续时间，并决定人们是否可以选择他们的会议室或自行返回主会议。在做出任何更改后，请始终点击 **保存** 按钮。
- en: Using breakout rooms can help change the pace during your presentation while
    helping attendees interact more with one another, energizing them before you continue
    with your presentation. Get familiar with the various breakout room features and
    settings so you can try a scenario that works for your type of content.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分组室可以帮助在演示过程中改变节奏，同时帮助与会者之间进行更多互动，在你继续演示之前让他们充满活力。熟悉各种分组室功能和设置，以便你可以尝试适合你内容类型的场景。
- en: Let’s now move on to two other interactive features you can use in a Teams meeting
    to help increase interactions with your attendees while getting their feedback
    to help you adapt your talk.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来谈谈在Teams会议中你可以使用的另外两个交互功能，这些功能可以帮助你增加与会者的互动，同时收集他们的反馈以帮助你调整你的演讲。
- en: Using Q&A and Polls to create more interactions
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用问答和投票来创建更多互动
- en: 'Virtual presentations require more interaction to keep your audience engaged.
    The reason is simple: you are competing with emails, news feeds, text messages,
    and social media, so you absolutely need to find ways to grab everyone’s attention.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟演示需要更多的互动来保持观众的参与度。原因很简单：你正在与电子邮件、新闻源、短信和社交媒体竞争，因此你绝对需要找到吸引每个人注意力的方法。
- en: When using Microsoft Teams, you have nice tools that can help you, and we will
    discuss two of them in the following sections.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用Microsoft Teams时，你有一些很好的工具可以帮助你，我们将在接下来的几节中讨论其中两个。
- en: Using Q&A
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用问答
- en: '**Q&A** is a nice a ddition to Teams meetings, allowing you to separate questions
    and important discussions from the regular chat pane. Unfortunately, it is not
    active by default and first needs to be activated in the meeting options. It can
    be done when you are creating your meeting invite, but also during your meeting
    ( *Fig ure 14.8* ):'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**问答**是Teams会议的一个很好的补充，允许你将问题和重要讨论从常规聊天面板中分离出来。不幸的是，它默认不激活，并且首先需要在会议选项中激活。这可以在创建会议邀请时完成，也可以在会议期间完成（*图14.8*）：'
- en: '![Figure 14.8 – Enabling Q&A during a meeting](img/B32063_14_08.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图14.8 – 在会议中启用问答](img/B32063_14_08.png)'
- en: Figure 14.8 – Enabling Q&A during a meeting
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.8 – 在会议中启用问答
- en: Click on **More** ( **…** ) ( **1** ), go to **Settings** ( **2** ), and click
    on **Meeting options** .
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**更多**（**…**）（**1**），转到**设置**（**2**），然后点击**会议选项**。
- en: In the new **Meeting options** window ( **3** ), go to the **Participation**
    section ( **4** ) and toggle the **Q&A** switch to active ( **5** ).
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在新的**会议选项**窗口（**3**）中，转到**参与**部分（**4**），并将**问答**开关切换到激活状态（**5**）。
- en: Click the **Apply** button ( **6** ) so your Teams meeting gets updated with
    the **Q&A** application ( **7** ).
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**应用**按钮（**6**），以便你的Teams会议更新为包含**问答**应用（**7**）。
- en: The pre vious steps are only available if you are the Teams meeting organizer
    or if you were made a co-organizer for the meeting. If the meeting was scheduled
    by someone else for you and they did not make you a co-organizer, you need to
    ask them to make the changes. They can go back to their meeting in their calendar
    and make changes to the meeting options, or they can start the meeting and change
    the options by following the previous steps. If you are not familiar with the
    different roles in Teams meetings, have a look at the Microsoft Support article
    in *Further reading* .
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '前面的步骤仅适用于你是Teams会议的组织者，或者如果你被指定为会议的共同组织者。如果会议是由其他人为你安排的，并且他们没有让你成为共同组织者，你需要要求他们进行更改。他们可以回到他们的日历中的会议并更改会议选项，或者他们可以开始会议并按照前面的步骤更改选项。如果你不熟悉Teams会议中的不同角色，请查看“进一步阅读”中的Microsoft支持文章。 '
- en: 'When you do have **Q&A** available in your meeting window toolbar, click on
    its icon ( **1** ) so the **Q&A** pane ( **2** ) shows on the right ( *Fig ure
    14.9* ):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在会议窗口工具栏中确实有**问答**可用时，点击其图标（**1**），以便**问答**面板（**2**）在右侧显示（*图14.9*）：
- en: '![Figure 14.9 – Opening Q&A and managing its settings](img/B32063_14_09.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图14.9 – 打开问答并管理其设置](img/B32063_14_09.png)'
- en: Figure 14.9 – Opening Q&A and managing its settings
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.9 – 打开问答并管理其设置
- en: The firs t thing you should do if you have never used this feature is to click
    on the gear icon ( **3** ) to access the **Q&A settings** pane.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你从未使用过这个功能，首先应该点击齿轮图标（**3**）来访问**问答设置**面板。
- en: You can then decide what permissions you give your attendees, such as asking
    questions, replying, upvoting, or reacting to questions ( **4** ). Since our goal
    is to improve interactions with attendees, allow them to ask questions and reply
    instead of using Q&A solely for your own questions.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以决定你给予参会者的权限，例如提问、回复、点赞或对问题做出反应（**4**）。由于我们的目标是提高与参会者的互动，允许他们提问和回复，而不是仅用问答来提问。
- en: The next setting is for allowing attendees to use anonymous posts or replies
    ( **5** ) – there is an important note mentioning that replies and reactions won’t
    be anonymous.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个设置是允许参会者使用匿名帖子或回复（**5**）——有一个重要说明提到回复和反应将不会是匿名的。
- en: Finally, you can activate the **Moderate questions** toggle ( **6** ), making
    them available only after reviewing them. If you are running your meeting alone,
    I would advise not using it to avoid overwhelming you with extra tasks.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，你可以激活**审阅问题**切换按钮（**6**），使其在审阅后才可用。如果你是独自主持会议，我建议不要使用它，以免给你带来额外的任务。
- en: Any change you make will activate the **Save** button ( **7** ).
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所做的任何更改都会激活**保存**按钮（**7**）。
- en: 'You or your attendees can quickly enter a question by clicking in the **Start
    a discussion** field ( **1** ) to access the **Post as** dialog box ( **2** )
    ( *Figu re 14.10* ):'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你或你的参会者可以通过点击**开始讨论**字段（**1**）快速输入问题，以访问**发布为**对话框（**2**）（*图 14.10*）：
- en: '![Figure 14.10 – Adding and managing questions in Q&A](img/B32063_14_10.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.10 – 在问答中添加和管理问题](img/B32063_14_10.png)'
- en: Figure 14.10 – Adding and managing questions in Q&A
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.10 – 在问答中添加和管理问题
- en: 'Two types of posts are available ( **3** ): **Start a discussion** and **Ask
    a question** . There are not many differences between the two besides the fact
    that a question is shaded with a colored rectangle, and that it has three types
    of interactions instead of two ( **4** ): **Upvote** , **Reaction** , and **Comment**
    .'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有两种类型的帖子可供选择（**3**）：**开始讨论**和**提问**。两者之间没有太多区别，除了一个问题被一个彩色矩形阴影覆盖，并且它有三种而不是两种交互类型（**4**）：**点赞**、**反应**和**评论**。
- en: If you want to manage the Q&A list of messages, you can click on the ellipses
    ( **…** ) ( **5** ) to access **Edit** , **Archive** , **Delete** , **Close conversation**
    , or **Pin conversation** features.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要管理问答消息列表，你可以点击省略号（**…**）（**5**）来访问**编辑**、**存档**、**删除**、**关闭对话**或**固定对话**功能。
- en: When you have a new activity in Q&A during your meeting, you will see a small
    circle over the **Q&A** icon ( **6** ) to notify you.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你在会议中的问答部分有新活动时，你会在**问答**图标（**6**）上方看到一个小的圆圈来通知你。
- en: The best way to get comfortable with this feature is to plan a practice meeting
    with a few people and decide what would be useful for you. Again, Q&A can be planned
    before your event when you create your meeting invite.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 要熟悉这个功能，最好的方法是计划一次与少数人进行的练习会议，并决定对你来说什么是有用的。再次强调，问答可以在创建会议邀请时提前计划。
- en: The advantage of using Q&A for any formal question is to avoid having to search
    through the chat pane when it is used for everything. To make this work, you do
    need to tell your attendees about your expectations at the beginning of your meeting.
    If you prefer Q&A for questions and specific topics, and chat for more informal
    conversations, show them how to find those panes and use them.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 使用问答来提出任何正式问题的优点是避免在用于所有内容时搜索聊天面板。为了使这起作用，你确实需要在会议开始时告诉你的参会者你的期望。如果你更喜欢问答来提问和特定主题，而聊天用于更非正式的对话，向他们展示如何找到那些面板并使用它们。
- en: Even though Q&A could be a nice place to add your own questions for attendees,
    you might want to consider **Polls** instead, the topic of the n ext section.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管问答可能是一个添加你自己的问题给参会者的好地方，但你可能想考虑**投票**，这是下一节的主题。
- en: Using Polls in a meeting
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在会议中使用投票
- en: '**Polls** is a n application that can quickly be added to your Teams meetings
    so you can ask various questions and get attendees to participate ( *Fi gure 14.11*
    ):'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**投票**是一个可以快速添加到你的 Teams 会议中的应用程序，这样你可以提出各种问题并让参会者参与（*图 14.11*）：'
- en: '![Figure 14.11 – Finding and adding the Polls app](img/B32063_14_11.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.11 – 查找和添加投票应用](img/B32063_14_11.png)'
- en: Figure 14.11 – Finding and adding the Polls app
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.11 – 查找和添加投票应用
- en: If you don’t see the **Polls** icon ( **1** ) in your Teams meeting toolbar,
    click the **Apps** icon ( **2** ). Use the search box ( **3** ) and add the `Polls`
    keyword. When you see **Polls** in the list, click on it ( **4** ).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在Teams会议工具栏中没有看到**投票**图标（**1**），请点击**应用**图标（**2**）。使用搜索框（**3**）并添加`Polls`关键字。当您在列表中看到**投票**时，点击它（**4**）。
- en: 'During your presentation, you can quickly launch the Polls application by clicking
    on its icon ( **1** ) to open the **Polls** pane ( **2** ) and view **Suggestions**
    ( **3** ) ( *Fig ure 14.12* ):'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的演示过程中，您可以通过点击其图标（**1**）来快速启动投票应用，以打开**投票**面板（**2**）并查看**建议**（**3**）（*图14.12*）：
- en: '![Figure 14.12 – Launching Polls and using Suggestions](img/B32063_14_12.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图14.12 – 启动投票和使用建议](img/B32063_14_12.png)'
- en: Figure 14.12 – Launching Polls and using Suggestions
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.12 – 启动投票和使用建议
- en: The list has many quick polls you can easily customize on the fly. For example,
    clicking on **How are you feeling today?** ( **4** ) opens a new window.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列表中有很多快速投票，您可以轻松地即时自定义。例如，点击**你今天感觉怎么样？**（**4**）将打开一个新窗口。
- en: In the new **Polls** window, you can edit the question or answers simply by
    clicking on any of the fields ( **5** ).
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在新的**投票**窗口中，您可以通过点击任何字段来简单地编辑问题或答案（**5**）。
- en: If you want to remove one of the choices, click on the field and then choose
    the **delete** icon ( **6** ).
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想删除一个选项，请点击该字段，然后选择**删除**图标（**6**）。
- en: Click **Add question** ( **7** ) if you need to and select the type of question
    you want to create from the list ( **8** ).
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果需要，点击**添加问题**（**7**），然后从列表中选择您想要创建的问题类型（**8**）。
- en: The list of question types is also available when you click on the arrow beside
    a question type ( **9** ) if you want to change it.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您点击问题类型旁边的箭头（**9**）以更改问题类型时，也会显示问题类型列表。
- en: 'Next, you should have a look at the poll settings ( **1** ) available from
    the link at the bottom of the **Polls** creation window ( *Fi gure 14.13* ):'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您应该查看从**投票**创建窗口底部链接提供的投票设置（**1**）（*图14.13*）：
- en: '![Figure 14.13 – Changing the settings of a poll and saving or launching it](img/B32063_14_13.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图14.13 – 更改投票设置并保存或启动](img/B32063_14_13.png)'
- en: Figure 14.13 – Changing the settings of a poll and saving or launching it
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.13 – 更改投票设置并保存或启动
- en: By default, the poll’s aggregated results are shared with your attendees ( **2**
    ), but you could decide to record their names as an organizer or for presenters
    or allow your co-presenters to edit polls that have been saved as drafts.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 默认情况下，投票的汇总结果会与您的与会者共享（**2**），但您可以选择记录他们的名字作为组织者或演讲者，或者允许您的共同演讲者编辑已保存为草稿的投票。
- en: When you click on the **Save as draft** button ( **3** ), your poll is li sted
    as **DRAFT** in the **Polls** pane ( **4** ).
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您点击**保存为草稿**按钮（**3**）时，您的投票将在**投票**面板（**4**）中列出为**草稿**。
- en: You can click the **Launch** button ( **5** ) when you are ready to make it
    live, or the arrow beside it ( **6** ) if you want to edit or delete your poll.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您准备好将其设置为直播时，可以点击**启动**按钮（**5**），或者点击其旁边的箭头（**6**）来编辑或删除您的投票。
- en: 'When you launch a poll directly from its creation window, it overlays the meeting
    window ( **1** ) for everyone in the meeting and becomes available in the **Polls**
    pane labeled as **LIVE** ( **2** ) ( *Fi gure 14.14* ):'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 当您直接从创建窗口启动投票时，它将覆盖会议窗口（**1**）并显示给会议中的每个人，并在**投票**面板中标记为**直播**（**2**）（*图14.14*）：
- en: '![Figure 14.14 – Launching a poll and retrieving it in the meeting chat](img/B32063_14_14.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图14.14 – 启动投票并在会议聊天中检索](img/B32063_14_14.png)'
- en: Figure 14.14 – Launching a poll and retrieving it in the meeting chat
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.14 – 启动投票并在会议聊天中检索
- en: People can answer and submit their reply from the overlaid window and see the
    overall results ( **3** ). Clicking the **X** or **Done** button closes the window.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们可以从覆盖窗口回答并提交他们的回复，并查看总体结果（**3**）。点击**X**或**完成**按钮关闭窗口。
- en: Polls also show in the **Meeting chat** pane feed ( **4** ), where anyone can
    click the **View poll** button ( **5** ) to answer if they have not done so before,
    or view overall results for the question.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投票也会显示在**会议聊天**面板的流中（**4**），任何人都可以点击**查看投票**按钮（**5**）来回答如果他们之前还没有做，或者查看问题的总体结果。
- en: Quick polls can be helpful, but it would be much better for you to plan those
    polls or interactions before your presentation date. In the first chapter of this
    book, we discussed how important planning is for your presentation content. For
    your delivery, it is also important to plan the types of interactions you will
    want to use.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 快速投票可能会有所帮助，但最好在您的演示日期之前规划这些投票或互动。在这本书的第一章中，我们讨论了规划对您的演示内容的重要性。对于您的交付，规划您希望使用的互动类型也同样重要。
- en: 'To plan your polls and save them as drafts before your event, go to your Teams
    calendar and click on your planned meeting ( **1** ) and then on the **Chat**
    button ( **2** ) ( *F igure 14.15* ):'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 要规划您的投票并在活动前将其保存为草稿，请转到您的Teams日历并点击您计划中的会议（**1**），然后点击**聊天**按钮（**2**）（*图14.15*）：
- en: '![Figure 14.15 – Planning your polls from the Polls tab in your meeting details](img/B32063_14_15.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图14.15 – 在会议详情中的投票标签页规划您的投票](img/B32063_14_15.png)'
- en: Figure 14.15 – Planning your polls from the Polls tab in your meeting details
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.15 – 在会议详情中的投票标签页规划您的投票
- en: You now have access to all your meeting tabs and applications. If you do not
    see the **Polls** tab ( **3** ), use the **+** sign ( **4** ) to add the application,
    as previously explained in the Teams meeting window.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您现在可以访问所有会议标签和应用程序。如果您看不到**投票**标签（**3**），请使用**+**号（**4**）添加应用程序，如之前在Teams会议窗口中所述。
- en: Use the **+ New poll** button ( **5** ) to create all your polls in advance.
    A **Suggestions** pane has a list of quick polls you can use ( **6** ).
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**+新建投票**按钮（**5**）提前创建所有您的投票。**建议**面板中有一份您可以使用的快速投票列表（**6**）。
- en: Just leave them in draft mode ( **7** ) until you launch during your meeting.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只需将它们保留在草稿模式（**7**）中，直到您在会议中启动。
- en: If you want more information on Polls, have a look at the Microsoft Support
    article in *Further reading* .
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想了解更多关于投票的信息，请查看“进一步阅读”中的Microsoft支持文章。
- en: You have now seen a few tools to help you improve interactions during your virtual
    presen tations. When you share your presentation file with PowerPoint Live, you
    can easily access it directly in the same meeting window.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在已经看到了一些工具，可以帮助您在虚拟演示中改善互动。当您通过PowerPoint Live共享演示文稿文件时，您可以在同一会议窗口中轻松访问它。
- en: In the next section, we’ll discuss a creative way of creating interesting interactions
    during your virtual presentations in Teams with the u se of avatars.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将讨论一种创造性的方法，在Teams中使用头像在您的虚拟演示中创建有趣的互动。
- en: Creating and using an avatar
  id: totrans-167
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建和使用头像
- en: Even though **avatars** are not an interactive feature per se, they do have
    a way of spicing up meetings and reducing virtual fatigue. I also think it could
    be a way to encourage participation for camera-shy people.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管头像本身不是交互式功能，但它们确实有一种方式可以增加会议的趣味性并减少虚拟疲劳。我也认为这可能是一种鼓励害羞的人参与的方式。
- en: If you need more details, please refer to the Microsoft Learn article listed
    in *Further reading* .
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要更多信息，请参阅“进一步阅读”中列出的Microsoft Learn文章。
- en: 'The easiest way to start creating your first avatar, and validate that you
    have access to the app at the same time, is by opening the application in your
    Teams interface ( *Figure 14.16* ):'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 开始创建您的第一个头像并验证您同时可以访问该应用的最简单方法是在您的Teams界面中打开应用（*图14.16*）：
- en: '![Figure 14.16 – Opening the Avatars application in Teams](img/B32063_14_16.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图14.16 – 在Teams中打开头像应用](img/B32063_14_16.png)'
- en: Figure 14.16 – Opening the Avatars application in Teams
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.16 – 在Teams中打开头像应用
- en: Click on the **View more apps** ellipsis ( **…** ) ( **1** ) and search for
    the application with the `Avatars` keyword.
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**查看更多应用**省略号（**…**）（**1**）并搜索带有`头像`关键词的应用。
- en: It will open the **Avatars** app ( **2** ), where you can start creating your
    avatar or see the ones you have already created ( **3** ) – up to three versions
    can be created.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将打开**头像**应用（**2**），在那里您可以开始创建您的头像或查看您已经创建的头像（**3**）——最多可以创建三个版本。
- en: Clicking on the **+** sign ( **4** ) lets you create your avatar from a photo,
    from a list ( **Create from base** ), or duplicate one you already created.
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**+**号（**4**）让您可以从照片、列表（**从基础创建**）或复制一个您已经创建的头像来创建头像。
- en: Existing avatars can be customized or deleted easily ( **5** ).
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现有的头像可以轻松地进行自定义或删除（**5**）。
- en: 'During the creation or customization process, you can adjust a list of features
    to make your avatar more aligned with your own look ( *Figure 14.17* ):'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建或自定义过程中，您可以调整一系列功能，使您的头像更符合您的个人形象（*图14.17*）：
- en: '![Figure 14.17 – Creating or customizing your avatar](img/B32063_14_17.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.17 – 创建或自定义您的头像](img/B32063_14_17.png)'
- en: Figure 14.17 – Creating or customizing your avatar
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.17 – 创建或自定义您的头像
- en: '**Skin Tone** ( **1** )'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**肤色** ( **1** )'
- en: '**Face** ( **2** )'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**面部** ( **2** )'
- en: '**Hair** ( **3** )'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**头发** ( **3** )'
- en: '**Makeup** ( **4** )'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**化妆** ( **4** )'
- en: '**Body** ( **5** )'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**身体** ( **5** )'
- en: '**Wardrobe** ( **6** )'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服装** ( **6** )'
- en: As you can see in the **Face** category ( **2** ), all parts of the face can
    be adjusted separately ( **7** ), sometimes adding another selection pane for
    colors, such as for the eyes ( **8** ).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在 **面部** 类别（ **2** ）中看到的，面部的所有部分都可以单独调整（ **7** ），有时还会添加另一个颜色选择面板，例如眼睛（ **8**
    ）。
- en: The best way to get familiar with the application is by trying it. Depending
    on the level of likeness you want to achieve, it might take you a while to create
    your first avatar. But once you have one created, duplicate it so you have a starting
    point.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 熟悉应用程序的最佳方式是通过尝试使用它。根据您想要达到的相似度水平，创建第一个头像可能需要一些时间。但一旦创建了一个，就复制它以便有一个起点。
- en: 'Selecting your avatar for a meeting can be done in the **Join meeting** window
    ( *Figure 14.18* ):'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 **加入会议** 窗口（ *图 14.18* ）中选择您的头像：
- en: '![Figure 14.18 – Using your avatar from the Join meeting window](img/B32063_14_18.png)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.18 – 在加入会议窗口中使用您的头像](img/B32063_14_18.png)'
- en: Figure 14.18 – Using your avatar from the Join meeting window
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.18 – 在加入会议窗口中使用您的头像
- en: Turn your camera off ( **1** ) and click on **Effects and avatars** ( **2**
    ).
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关闭您的摄像头（ **1** ）并点击 **效果和头像**（ **2** ）。
- en: Select the avatar you want to use and add a background if you want ( **3** ).
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择您想要使用的头像，如果您想要的话可以添加背景（ **3** ）。
- en: You can select your avatar after you have joined a meeting by using the arrow
    beside the camera icon and selecting the **Avatars** effects category.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过使用摄像头图标旁边的箭头并选择 **头像** 效果类别来在加入会议后选择您的头像。
- en: What I really like about avatars is that they move and express themselves. We
    see eye and lip movements when we talk, as well as hand movements aligned to the
    **Raise hand** or **React** features in the meeting.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常喜欢头像的一点是它们可以移动并表达自己。当我们说话时，我们看到眼睛和嘴唇的动作，以及与会议中的 **举手** 或 **反应** 功能对齐的手部动作。
- en: Don’t get me wrong. I am not saying all meetings should use avatars! But do
    consider them on certain occasions, such as when people are not feeling well but
    attending a meeting anyway, or for specific presentation types such as virtual
    games or relaxed meetings. Establish what is allowed for your team and when. Making
    it clear when avatars can be used can add variety and create a different type
    of audience engagement.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要误解。我并不是说所有会议都应该使用头像！但在某些场合，比如人们身体不适但仍参加会议，或者对于特定类型的演示，如虚拟游戏或轻松会议，可以考虑使用它们。明确您团队允许使用头像的情况和时机。明确何时可以使用头像可以增加多样性并创造不同类型的观众参与。
- en: In the final section of this chapter, we will discuss a few ways you can improve
    how you look and sound during a virtual meeting.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的最后部分，我们将讨论一些方法，帮助您在虚拟会议中改善您的外观和声音。
- en: Improving the camera, lighting, and microphone setup
  id: totrans-197
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改善摄像头、照明和麦克风设置
- en: My goal with this section is not to cover all the greatest and latest equipment
    available on the market, but to share some features and tips that can help you
    even when you don’t have acces s to fancy gear.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我在本节中的目标不是涵盖市场上所有最新和最先进的设备，而是分享一些可以帮助您的功能和技巧，即使您没有访问到高端设备。
- en: Checking Microsoft Teams device settings
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查 Microsoft Teams 设备设置
- en: When Microsoft introduced the improved and lighter version of Teams, they finally
    made it easier to access camera and microphone settings. They can be accessed
    in the **Join meeting** window, but we will see how to access them during a Teams
    meeting.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 当 Microsoft 推出了改进和更轻量级的 Teams 版本时，他们最终使访问摄像头和麦克风设置变得更容易。它们可以在 **加入会议** 窗口中访问，但我们将看到如何在
    Teams 会议中访问它们。
- en: 'Let’s start with camera settings ( *Figure 14.19* ):'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从摄像头设置开始（ *图 14.19* ）：
- en: '![Figure 14.19 – Accessing camera settings in a Teams meeting](img/B32063_14_19.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.19 – 在 Teams 会议中访问摄像头设置](img/B32063_14_19.png)'
- en: Figure 14.19 – Accessing camera settings in a Teams meeting
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.19 – 在 Teams 会议中访问摄像头设置
- en: Click on the arrow beside the **Camera** icon ( **1** ) to open the **Effects
    and settings** window ( **2** ) and click on **More video effects and settings**
    ( **3** ).
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击摄像头图标旁边的箭头（ **1** ）以打开 **效果和设置** 窗口（ **2** ），然后点击 **更多视频效果和设置**（ **3** ）。
- en: The **Video effects and settings** pane will display on the right ( **4** ).
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视频效果和设置**面板将在右侧显示（**4**）。'
- en: 'Click on the **Settings** tab ( **5** ):'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**设置**标签（**5**）：
- en: The **Brightness** tool ( **6** ) will enhance video quality in low light conditions.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**亮度**工具（**6**）将在光线不足的条件下提高视频质量。'
- en: The **Soft focus** tool ( **7** ) will smooth your appearance by adjusting it
    with the slider when it is turned on. Just be careful not to overdo it, because
    it can make you look unnatural.
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**柔焦**工具（**7**）通过调整滑块来平滑你的外观，当它开启时。只需小心不要过度使用，因为它可能会让你看起来不自然。'
- en: Even though these settings will not fix everything, they can help improve the
    quality of your video.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这些设置不能解决所有问题，但它们可以帮助提高你的视频质量。
- en: 'Audio settings can also be accessed easily by clicking on the arrow beside
    the **microphone** icon ( **1** ) ( *Figure 14.20* ):'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击**麦克风**图标旁边的箭头（**1**）可以轻松访问音频设置（*图 14.20*）：
- en: '![Figure 14.20 – Accessing audio settings in a Teams meeting](img/B32063_14_20.png)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.20 – 在 Teams 会议中访问音频设置](img/B32063_14_20.png)'
- en: Figure 14.20 – Accessing audio settings in a Teams meeting
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.20 – 在 Teams 会议中访问音频设置
- en: In the settings window ( **2** ), you have access to select your speaker or
    microphone if more than one device is detected on your computer ( **3** ).
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在设置窗口（**2**），如果你在电脑上检测到多个设备，你可以选择你的扬声器或麦克风（**3**）。
- en: '**Spatial audio** ( **4** ) is a feature that will change your audio experience.
    When in a meeting, you will hear the audio from where the person speaking is positioned
    on your screen. Wireless headphones are not supported yet.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**空间音频**（**4**）是一个会改变你的音频体验的功能。在会议中，你将听到屏幕上说话人所在位置的声音。目前不支持无线耳机。'
- en: '**Noise suppression** ( **5** ) is on by default, greatly reducing ambient
    noise. It is an AI-based feature, analyzing background noise. Teams monitors your
    background noise and turns suppression up or down to remove noise not recognized
    as your voice. Two secondary settings are available:'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪音抑制**（**5**）默认开启，大大减少了环境噪音。这是一个基于AI的功能，分析背景噪音。Teams会监控你的背景噪音，并调整抑制级别以移除不被识别为你的声音的噪音。有两个辅助设置可用：'
- en: '**Background noise only** , which enhances your audio quality by removing background
    noise only.'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅背景噪音**，通过仅移除背景噪音来提高你的音频质量。'
- en: '**Voice isolation** , which isolates your voice from the background noise and
    other voices. If you decide to use this feature, follow the instructions in Teams
    to add a voice sample in the **Recognition** section of the application settings.'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**声音隔离**，它可以将你的声音从背景噪音和其他声音中隔离出来。如果你决定使用此功能，请按照Teams中的说明在应用程序设置的**识别**部分添加声音样本。'
- en: Clicking **More audio settings** ( **6** ) opens the **Audio settings** pane,
    where the only new setting option is **High fidelity music mode** ( **7** ), useful
    if you play music during some meetings.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**更多音频设置**（**6**）将打开**音频设置**面板，其中唯一的新设置选项是**高保真音乐模式**（**7**），如果你在会议中播放音乐，这将很有用。
- en: If you are wondering how efficient the noise suppression feature is, I can share
    that I once had to deliver virtual training from a room in my basement while workers
    were drilling our house foundation in front of me – participants confirmed they
    could not hear anything. Lucky for them, as I had problems concentrating on what
    I had to say! But I would add that the reliability of the feature might depend
    on which type of microphone you are using. Test it with your own equipment.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道噪音抑制功能的有效性，我可以分享我曾在地下室的一个房间里进行虚拟培训，而工人们在我面前钻我们的房屋地基——参与者确认他们什么都没听到。幸运的是，我集中注意力有困难！但我还会补充说，该功能的可靠性可能取决于你使用的麦克风类型。请用你自己的设备测试它。
- en: Now that we have seen what Teams settings can help you improve how you look
    and sound during a meeting, let’s see some best practice tips in the next section.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了 Teams 设置如何帮助你在会议中改善外观和声音，接下来让我们看看下一节中的最佳实践技巧。
- en: Tips to help you improve how you look and sound
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 帮助你改善外观和声音的技巧
- en: Even though I will not discuss any specific equipment, it is clear that if you
    want to look more professional for your virtual presentations, you need to avoid
    using the built-in camera and microphone of your laptop. You simply cannot control
    them well.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我不会讨论任何特定的设备，但很明显，如果你想在你虚拟演示中看起来更专业，你需要避免使用笔记本电脑的内置摄像头和麦克风。你根本无法很好地控制它们。
- en: Try looking for a separate webcam, and ideally for quality headphones with a
    microphone. When you add that equipment, small applications are usually supplied
    by their manufacturer that can help you adjust the settings.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试寻找一个单独的网络摄像头，理想情况下是带有麦克风的优质耳机。当你添加这些设备时，制造商通常会提供一些小应用程序，可以帮助你调整设置。
- en: 'To help you look your best, make sure your webcam is in front of you at eye
    level. This also helps you look toward your attendees, which is much more engagi
    ng ( *Figure 14.21* ):'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你看起来最好，确保你的网络摄像头在你面前，与眼睛水平。这也帮助你看向你的听众，这会更有吸引力（*图14.21*）：
- en: '![Figure 14.21 – Position your webcam in front of you at eye level](img/B32063_14_21.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![图14.21 – 将你的网络摄像头放在你面前，与眼睛水平](img/B32063_14_21.png)'
- en: Figure 14.21 – Position your webcam in front of you at eye level
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.21 – 将你的网络摄像头放在你面前，与眼睛水平
- en: 'For lighting, you should ideally try to present in a room where you have natural
    light in front of you or where you can use LED or ring lights if you don’t have
    a window. Never present with lighting coming from behind you because you will
    look like a silhouette with no fac e ( *Figure 14.22* ):'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 对于照明，理想情况下，你应该在一个有自然光在前方或如果没有窗户，可以使用LED或环形灯的房间里进行展示。永远不要在背后有灯光的情况下进行展示，因为你会看起来像没有脸部的剪影（*图14.22*）：
- en: '![Figure 14.22 – Position yourself so the light is in front of you](img/B32063_14_22.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![图14.22 – 将自己放置在光线前方的位置](img/B32063_14_22.png)'
- en: Figure 14.22 – Position yourself so the light is in front of you
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.22 – 将自己放置在光线前方的位置
- en: 'During your virtual presentation, if the room you are using is rather dark,
    try adding light sources at an angle on each side of your face to avoid shadow
    s ( *Figure 14.23* ):'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的虚拟演示过程中，如果你使用的房间相当昏暗，尝试在脸的两侧各添加一个角度的光源，以避免产生阴影（*图14.23*）：
- en: '![Figure 14.23 – Adding light sources on each side when you are in a dark environment](img/B32063_14_23.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![图14.23 – 在昏暗环境中在两侧添加光源](img/B32063_14_23.png)'
- en: Figure 14.23 – Adding light sources on each side when you are in a dark environment
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.23 – 在昏暗环境中在两侧添加光源
- en: Of course, improving how you look when delivering your virtual presentations
    means cleaning up what you have in your background. There is also the possibility
    of using features such as blurring your background or adding a virtual background.
    Be aware that if people walk behind you during your presentation, it will look
    as if you have human body parts floating behind you if they walk close enough.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，改善你在虚拟演示中的外观意味着清理你的背景。还有使用诸如模糊背景或添加虚拟背景等功能的可能性。请注意，如果在你的演示过程中有人从你身后走过，如果他们走得足够近，看起来就像你背后有人的身体部分漂浮。
- en: If you have curly hair, like me, virtual backgrounds will sometimes create deceptive
    results. I often end up having part of my face disappear when I move. I decided
    to purchase meeting backdrops that I clip to a pole behind me or just use a plain
    curtain if I’m delivering content for another organization as a contractor. Now
    my face stays intact for the duration of my classes or meetings!
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我一样有卷发，虚拟背景有时会创造出欺骗性的效果。我经常发现自己的一部分脸在移动时消失了。我决定购买可以夹在我背后柱子上的会议背景，或者如果我是作为承包商为其他组织提供内容，就只使用一块简单的窗帘。现在，我的脸在整个课程或会议期间都保持完整！
- en: The tips I shared in this section are what I would call quick fixes. If you
    are going to present virtually on a regular basis, you should invest in good equipment
    and lighting. Your best bet in terms of knowing what to choose is to ask other
    presenters what they use and what the y would recommend.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这个部分分享的技巧可以称为快速修复。如果你打算定期进行虚拟演示，你应该投资于好的设备和照明。在了解选择什么方面，你最好的选择是询问其他演示者他们使用什么以及他们推荐什么。
- en: Summary
  id: totrans-236
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter was all about using tools in Microsoft Teams to help you deliver
    better virtual presentations. We discussed how PowerPoint Live can help you manage
    your presentation and your meeting in the same window. We also learned about a
    few features that can help you keep your attendees engaged, such as breakout rooms,
    Q&A, and Polls. And we briefly introduced how creating and using avatars could
    help with engagement. We finally discussed how to improve your camera, lighting,
    and microphone setup, sharing quick tips you can easily try.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 本章主要介绍了如何使用 Microsoft Teams 中的工具来帮助你提供更好的虚拟演示文稿。我们讨论了 PowerPoint Live 如何帮助你在一个窗口中管理你的演示文稿和会议。我们还了解了一些可以帮助你保持与会者参与度的功能，例如分组讨论室、问答和投票。我们还简要介绍了如何创建和使用头像来提高参与度。最后，我们讨论了如何改进你的摄像头、照明和麦克风设置，分享了一些你可以轻松尝试的快速技巧。
- en: My wish is that you realize that virtual presentations need as much practice
    as the ones you do in meeting rooms or large venues. In my opinion, they are even
    more complex to manage because you often have to learn more about the features
    that will help you keep people engaged, and handle technology problems by yourself.
    Make sure you continue learning about the virtual tools you can use.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '我的愿望是让你意识到虚拟演示文稿需要与你在会议室或大型场所进行的演示一样多的练习。在我看来，它们甚至更复杂，因为你通常需要更多地了解可以帮助你保持人们参与度的功能，并自己处理技术问题。确保你继续学习你可以使用的虚拟工具。 '
- en: Conclusion
  id: totrans-239
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: If you have read this book from start to finish, you probably remember from
    our content structure in the chapters that your content should have an introduction,
    your main key points, and a conclusion.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从头到尾阅读了这本书，你可能记得我们在章节中的内容结构，你的内容应该有一个引言、你的主要要点和一个结论。
- en: In this book, my introduction was all about the challenges encountered while
    creating your content. I then proceeded to help you learn how to plan, create,
    and deliver more impactful presentations with the help of many of the advanced
    tools and features in PowerPoint.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我的引言全部关于在创建内容时遇到的挑战。然后我继续帮助你学习如何利用 PowerPoint 中的许多高级工具和功能来计划、创建和提供更具影响力的演示文稿。
- en: 'Now that you have more knowledge on how to create better presentations, here
    is my challenge: plan more time in your schedule to put your learnings into practice.
    Your goal should not be to change everything for your next presentation. Just
    decide on a few elements that can be improved and work on them. After that, you
    can focus on other improvements for future presentations. One step at a time is
    better than no improvement at all.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了如何创建更好的演示文稿，这里是我的挑战：在你的日程中安排更多的时间来将你的所学付诸实践。你的目标不应该是为了你下一次的演示文稿而改变一切。只需决定几个可以改进的元素并专注于它们。之后，你可以专注于未来演示文稿的其他改进。一步一步来，总比没有任何改进要好。
- en: Wishing you much success in your upcom ing presentations!
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 祝你在即将到来的演示文稿中取得巨大成功！
