  type: TYPE_NORMAL
- en: 'Learn smarter using our AI assistant (Beta):'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/sparkler.png) ** Summarize it ** : Summarize key sections or an
    entire chapter.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/sparkler1.png) ** AI code explainers ** : In the next-gen Packt
    Reader, click the ** Explain ** button above each code block for AI-powered code
    explanations.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '**Note** : The AI assistant is part of next-gen Packt Reader and is still in
    beta.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Learn anytime, anywhere:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![A black background with a black square  AI-generated content may be incorrect.](img/pdf.png)
    ![img](img/epub_%282%29.png) Access your content offline with DRM-free PDF and
    ePub versions—compatible with your favorite e-readers.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Unlock Your Book’s Exclusive Benefits
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Your copy of this book comes with the following exclusive benefits:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/cloud-computing1.png) Next-gen Packt Reader'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/sparkler2.png) AI assistant (beta)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: '![img](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Use the following guide to unlock them if you haven’t already. The process takes
    just a few minutes and needs to be done only once.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: How to unlock these benefits in three easy steps
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Step 1
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Keep your purchase invoice for this book ready, as you’ll need it in *Step 3*
    . If you received a physical invoice, scan it on your phone and have it ready
    as either a PDF, JPG, or PNG.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](Preface.xhtml)
    .
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '**Note** : Did you buy this book directly from Packt? You don’t need an invoice.
    After completing Step 2, you can jump straight to your exclusive content.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Step 2
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Scan this QR code or go to [https://packtpub.com/unlock](Preface.xhtml) . |
    ![img](img/Unlock1.png) |
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '| On the page that opens (which will look similar to Figure 0.1 if you’re on
    desktop), search for this book by name. Make sure you select the correct edition.![A
    screenshot of a web page  AI-generated content may be incorrect.](img/Packt_unlock_landing_page.png)Figure
    0.1: Packt unlock landing page on desktop |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
- en: Step 3
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sign in to your Packt account or create a new one for free. Once you’re logged
    in, upload your invoice. It can be in PDF, PNG, or JPG format and must be no larger
    than 10 MB. Follow the rest of the instructions on the screen to complete the
    process.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 登录您的Packt账户或免费创建一个新账户。登录后，上传您的发票。它可以是以PDF、PNG或JPG格式，且大小不能超过10 MB。按照屏幕上的其余说明完成此过程。
- en: '|'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: 'If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](Preface.xhtml)
    for a detailed FAQ on how to find your invoices and more. The following QR code
    will take you to the help page directly: | ![img](img/Need_help.jpg) |'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到困难需要帮助，请访问[https://www.packtpub.com/unlock-benefits/help](Preface.xhtml)获取如何查找你的发票等详细FAQ。以下二维码将直接带您到帮助页面：|
    ![img](img/Need_help.jpg) |
- en: '**Note** : If you are still facing issues, reach out to [customercare@packt.com](Preface.xhtml)
    .'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果你仍然遇到问题，请联系[customercare@packt.com](Preface.xhtml)。'
- en: Share your thoughts
  id: totrans-88
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分享你的想法
- en: Once you’ve read *Microsoft PowerPoint Mastery* , we’d love to hear your thoughts!
    Please [click here to go straight to the Amazon review page](https://packt.link/r/1835882250)
    for this book and share your feedback.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你阅读了《Microsoft PowerPoint Mastery》，我们很乐意听听你的想法！请[点击此处直接进入此书的亚马逊评论页面](https://packt.link/r/1835882250)并分享你的反馈。
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评论对我们和科技社区都很重要，并将帮助我们确保我们提供高质量的内容。
