- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Using PowerPoint is something that many people have done at some point in their
    business life, and even before as students. But creating engaging and impactful
    presentations is something many users struggle with.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PowerPoint是许多人在他们的商业生涯中某个时刻都做过的事情，甚至在学生时代也是如此。但创建引人入胜且具有影响力的演示文稿却是许多用户面临的挑战。
- en: 'For me, writing about the PowerPoint application meant including more than
    just the tools and features. For over 20 years, I have seen clients struggle because
    they did not know about the industry’s best practices and did not have formal
    training to help them discover and use some more advanced and very helpful features.
    All the people I trained or the clients I worked with had another big challenge:
    they all wanted to save time creating their presentations.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，撰写关于PowerPoint应用程序的文章意味着不仅仅包括工具和功能。超过20年来，我见证了客户因为不了解行业最佳实践而没有接受过正规培训，无法发现和使用一些更高级且非常有帮助的功能而感到困扰。我所培训的所有人员或我合作过的客户都面临另一个重大挑战：他们都希望节省创建演示文稿的时间。
- en: This is why this book is different from most PowerPoint books. You have the
    choice of being taken on a journey through the most important tools to help you
    plan your presentation, create visually appealing and meaningful content, and
    deliver your presentations in a more flexible and impactful way. Or you can choose
    to read any chapter or topic that will help you learn about features and tools
    you don’t know already. For the book’s first edition, I even received comments
    that some creative agencies had purchased it for their whole team as a reference
    tool!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，这本书与大多数PowerPoint书籍不同。你可以选择跟随本书的引导，了解帮助你规划演示文稿、创建视觉吸引力和意义内容的最重要的工具，并以更灵活和有影响力的方式呈现你的演示文稿。或者，你也可以选择阅读任何章节或主题，以帮助你了解你尚未知晓的功能和工具。对于本书的第一版，我甚至收到了一些创意机构购买本书作为团队参考工具的评论！
- en: Whatever the method of reading you adopt, I can guarantee that you will be more
    knowledgeable on presentation best practices, PowerPoint features that help you
    create better presentations more efficiently, and how to improve your presentation
    delivery.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你采用何种阅读方法，我都可以保证你将更加了解演示文稿的最佳实践、有助于你更高效地创建优质演示文稿的PowerPoint功能，以及如何提高你的演示文稿呈现效果。
- en: Who this book is for
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向的对象
- en: This book first targets business professionals without any formal design training
    or experience who want to create more impactful and engaging content faster. But
    anyone having to create a few presentations once in a while will also find a lot
    of valuable content that they can apply quickly. These professionals may have
    had some very brief PowerPoint training in the past, but many will be self-taught.
    Most will have used PowerPoint before and are therefore already familiar with
    the basics.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本书首先针对那些没有正规设计培训或经验，但希望更快地创建更具影响力和吸引力的内容的商业专业人士。但那些偶尔需要创建几个演示文稿的人也会发现很多有价值的、可以快速应用的内容。这些专业人士在过去可能接受过一些非常简短的PowerPoint培训，但许多人都是自学成才。大多数人之前都使用过PowerPoint，因此已经熟悉了基础知识。
- en: What this book covers
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](Chapter_01.xhtml#_idTextAnchor022) , *Analyzing Your Audience
    and Presentation Delivery Needs* , covers questions that will help you plan and
    structure your presentation content.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_01.xhtml#_idTextAnchor022) ，*分析你的受众和演示文稿呈现需求*，涵盖了帮助你规划和构建演示文稿内容的问题。'
- en: '[*Chapter 2*](Chapter_02.xhtml#_idTextAnchor130) , *Using Industry Best Practices
    to Design Better Visuals* , helps you learn about fonts, contrast, decluttering
    slides, and visual consistency.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](Chapter_02.xhtml#_idTextAnchor130) ，*利用行业最佳实践设计更佳视觉元素*，帮助你了解字体、对比度、整理幻灯片以及视觉一致性。'
- en: '[*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206) , *Leveraging PowerPoint’s
    Slide Master to Speed Up Your Design Process* , talks about how the slide master
    becomes a design automation tool.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第三章*](Chapter_03.xhtml#_idTextAnchor206) ，*利用PowerPoint的幻灯片母版加速你的设计流程*，讨论了幻灯片母版如何成为设计自动化工具。'
- en: '[*Chapter 4*](Chapter_04.xhtml#_idTextAnchor387) , *Using PowerPoint’s Notes
    and Document Masters to Create Handouts and Your Speaker Notes* , covers how to
    leverage masters that help you make your presentation file works both as on-screen
    visuals and as handouts, while remaining efficient and impactful.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第四章*](Chapter_04.xhtml#_idTextAnchor387) ，*利用PowerPoint的备注和文档母版创建讲义和演讲者备注*，介绍了如何利用母版来帮助你使演示文稿文件既适用于屏幕视觉，也适用于讲义，同时保持高效和有影响力。'
- en: '[*Chapter 5*](Chapter_05.xhtml#_idTextAnchor491) , *Starting Your Presentation
    with Copilot for M365* , helps you understand what M365 Copilot in PowerPoint
    can do and learn about prompting.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](Chapter_05.xhtml#_idTextAnchor491) ，*使用M365 Copilot开始您的演示*，帮助您了解PowerPoint中的M365
    Copilot能做什么以及如何进行提示。'
- en: '[*Chapter 6*](Chapter_06.xhtml#_idTextAnchor517) , *Using Artificial Intelligence
    to Improve Your Visuals* , helps you understand how the Designer feature can save
    you some design time.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_06.xhtml#_idTextAnchor517) ，*使用人工智能提升您的视觉效果*，帮助您了解设计师功能如何节省您一些设计时间。'
- en: '[*Chapter 7*](Chapter_07.xhtml#_idTextAnchor580) , *Adding and Modifying Visual
    Elements in Your Content* , discusses how to use graphic elements and customize
    them to replace text and bullet points.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_07.xhtml#_idTextAnchor580) ，*在您的内容中添加和修改视觉元素*，讨论了如何使用图形元素并自定义它们以替换文本和项目符号。'
- en: '[*Chapter 8*](Chapter_08.xhtml#_idTextAnchor722) , *Adding and Modifying Multimedia
    Elements in Your Content* , talks about improving your content by using and formatting
    audio and video elements.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_08.xhtml#_idTextAnchor722) ，*在您的内容中添加和修改多媒体元素*，讨论了通过使用和格式化音频和视频元素来改进您的内容。'
- en: '[*Chapter 9*](Chapter_09.xhtml#_idTextAnchor874) , *Working with Transitions
    and Animations* , helps you learn about creating movement with purpose that improves
    the pace of your content and audience understanding.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_09.xhtml#_idTextAnchor874) ，*使用过渡和动画*，帮助您了解如何通过有目的的移动来改善您的内容节奏和观众理解。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor1003) , *Building Flexibility
    and Interactivity in Your Presentations* , covers how to engage your audience
    by using navigation elements to adapt to their needs or show them special content.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor1003) ，*在您的演示中构建灵活性和交互性*，涵盖了如何通过使用导航元素来适应他们的需求或展示特殊内容来吸引您的观众。'
- en: '[*Chapter 11*](Chapter_11.xhtml#_idTextAnchor1099) , *Using Third-Party Add-Ins*
    , discusses a few ways to boost your content creation productivity and presentation
    management possibilities.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](Chapter_11.xhtml#_idTextAnchor1099) ，*使用第三方插件*，讨论了几种提高您内容创作生产力和演示管理可能性的方法。'
- en: '[*Chapter 12*](Chapter_12.xhtml#_idTextAnchor1228) , *Practicing Your Presentation
    Delivery* , puts forward some of PowerPoint’s native tools that help you practice
    so you have a memorable effect on your audience.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](Chapter_12.xhtml#_idTextAnchor1228) ，*练习您的演示交付*，提出了一些PowerPoint的内置工具，这些工具可以帮助您练习，以便在观众中留下难忘的印象。'
- en: '[*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296) , *Using Presenter View*
    , discusses how this feature and its many tools can help you deliver more engaging
    presentations and have more control.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第13章*](Chapter_13.xhtml#_idTextAnchor1296) ，*使用演示者视图*，讨论了该功能及其众多工具如何帮助您提供更具吸引力的演示并拥有更多控制权。'
- en: '[*Chapter 14*](Chapter_14.xhtml#_idTextAnchor1366) , *Using PowerPoint Live
    in Teams for Remote Presentations* , helps virtual presenters using Teams discover
    many features that help create engagement.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第14章*](Chapter_14.xhtml#_idTextAnchor1366) ，*在Teams中使用PowerPoint Live进行远程演示*，帮助使用Teams的虚拟演示者发现许多有助于创建互动性的功能。'
- en: To get the most out of this book
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要充分利用本书
- en: This book will give you step-by-step instructions to help you find the features
    and tools and use them. To get the most out of this book, try features you are
    not familiar with as you read about them. This is the best way to learn, remember,
    and quickly apply tips and best practices. If your goal is to learn about how
    to implement a better presentation creation process, you should read the chapters
    in order. But reading chapters or topics in any order can be valuable if you are
    a more advanced user.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将为您提供逐步说明，帮助您找到功能和工具并使用它们。要充分利用本书，在阅读有关它们的内容时尝试您不熟悉的功能。这是学习、记忆和快速应用技巧和最佳实践的最佳方式。如果您的目标是学习如何实施更好的演示创建流程，您应该按顺序阅读章节。但如果您是更高级的用户，按任何顺序阅读章节或主题也可能很有价值。
