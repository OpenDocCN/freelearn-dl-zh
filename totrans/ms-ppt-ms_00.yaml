- en: Conventions used
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`CodeInText` : Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X/Twitter handles.
    For example: “If you are not familiar with the QAT, type `quick access toolbar`
    in the **Search** box in the title bar of any Office application to get help.”'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`：表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和X/Twitter用户名。例如：“如果您不熟悉QAT，请在任何Office应用程序标题栏的**搜索**框中键入`快速访问工具栏`以获取帮助。”'
- en: '**Bold** : Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “You can see how your layout will look by using the **Close
    Master View** button in the **Slide Master** tab and adding a new slide with your
    new custom layout.”'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或您在屏幕上看到的单词。例如，菜单或对话框中的单词在文本中显示如下。例如：“您可以通过在**幻灯片母版**选项卡中使用**关闭母版视图**按钮并添加一个带有您新自定义布局的新幻灯片来查看您的布局将如何显示。”'
- en: Warnings or important notes appear like this.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要提示看起来像这样。
- en: Tips and tricks appear like this.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 技巧和窍门看起来像这样。
