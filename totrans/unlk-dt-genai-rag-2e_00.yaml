- en: Conventions used
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a number of text conventions used throughout this book.
  prefs: []
  type: TYPE_NORMAL
- en: '`CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X/Twitter handles.
    Here is an example: “Locate `FinancialOntology.ttl` from *Code lab 13.1* and copy
    it into the same directory as your notebook.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'A block of code is set as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in **bold**. For
    example: “Right-click on **owl:Thing** and select **Add Subclasses** from the
    context menu.”'
  prefs: []
  type: TYPE_NORMAL
