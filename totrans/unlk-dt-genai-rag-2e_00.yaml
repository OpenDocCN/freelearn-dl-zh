  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图/图表彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781806381654](https://packt.link/gbp/9781806381654)。
- en: Conventions used
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中使用了多种文本约定。
- en: '`CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X/Twitter handles.
    Here is an example: “Locate `FinancialOntology.ttl` from *Code lab 13.1* and copy
    it into the same directory as your notebook.”'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`：表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和X/Twitter用户名。以下是一个示例：“从*代码实验室13.1*中定位`FinancialOntology.ttl`并将其复制到您的notebook同一目录下。”'
- en: 'A block of code is set as follows:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块设置如下：
- en: '[PRE0]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in **bold**. For
    example: “Right-click on **owl:Thing** and select **Add Subclasses** from the
    context menu.”'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或您在屏幕上看到的单词。例如，菜单或对话框中的单词以**粗体**显示。例如：“右键单击**owl:Thing**并从上下文菜单中选择**添加子类**。”'
- en: Tips and tricks appear like this.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士和技巧看起来像这样。
- en: Warnings or important notes appear like this.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要注意事项如下所示。
- en: Tips and tricks appear like this.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 技巧和窍门如下所示。
