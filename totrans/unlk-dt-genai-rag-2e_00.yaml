  prefs: []
  type: TYPE_NORMAL
  zh: 我们始终欢迎读者的反馈！
- en: '**General feedback**: Email `feedback@packtpub.com` and mention the book’s
    title in the subject of your message. If you have questions about any aspect of
    this book, please email us at [questions@packtpub.com](https://mailto:questions@packtpub.com).'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**：请发送电子邮件至 `feedback@packtpub.com`，并在邮件主题中提及书籍标题。如果您对本书的任何方面有疑问，请通过
    [questions@packtpub.com](https://mailto:questions@packtpub.com) 发送电子邮件给我们。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
