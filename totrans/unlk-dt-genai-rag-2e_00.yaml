- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the rapidly evolving landscape of **artificial intelligence** (**AI**), **retrieval-augmented
    generation** (**RAG**) has emerged as far more than a retrieval method. It has
    become the cornerstone of every modern generative AI system. RAG combines the
    strengths of information retrieval and generative AI models to create powerful
    applications that can access and utilize vast amounts of data to generate highly
    accurate, contextually relevant, and informative responses. Without a solid RAG
    foundation, building a robust AI application becomes nearly impossible.
  prefs: []
  type: TYPE_NORMAL
- en: As AI continues to permeate various industries and domains, understanding and
    mastering RAG has become increasingly crucial for developers, researchers, and
    businesses alike. RAG enables AI systems to go beyond the limitations of their
    training data and access up-to-date and domain-specific information, making them
    more versatile, adaptable, and valuable in real-world scenarios. But the role
    of RAG has expanded dramatically since this book’s first edition. Beyond simply
    retrieving content, RAG now underpins critical capabilities such as semantic caches,
    episodic memory retrieval, knowledge graphs, and the agentic memory systems that
    power today’s most sophisticated AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: The AI landscape has shifted decisively toward agent-based architectures. While
    the first edition focused primarily on RAG as a standalone technique, modern generative
    AI applications are increasingly built around autonomous agents that reason, plan,
    and take actions. These agents rely on RAG as a core component of their functionality,
    using retrieval not just to answer questions but to maintain context across sessions,
    learn from past interactions, and continuously improve their performance. Memory
    can no longer remain a second-class citizen in AI system design. RAG is now positioned
    as the backbone of agentic memory, which in turn is central to how intelligent
    agents function.
  prefs: []
  type: TYPE_NORMAL
- en: This second edition reflects these fundamental shifts. You will learn how to
    design RAG so it seamlessly interacts with agentic memory, semantic caches, knowledge
    graphs, and other critical components of your AI workflow. Step by step, we will
    not only show you how to implement RAG but also explain the underlying concepts
    so you can adapt as the field evolves and unlock advanced capabilities for your
    AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: As this book progresses, it serves as a comprehensive guide to the world of
    RAG, covering both fundamental concepts and the advanced techniques that define
    the current state of the art. It is filled with detailed coding examples showcasing
    the latest tools and technologies, such as LangChain, LangGraph, Neo4j, Chroma,
    and OpenAI’s latest models. We will cover essential topics, including vector stores,
    vectorization, vector search techniques, prompt engineering and design, knowledge
    graphs for structured reasoning, semantic caching for performance optimization,
    and the complete CoALA memory framework (working, episodic, semantic, and procedural
    memory) that enables agents to learn and adapt over time. Methods for evaluating
    and visualizing RAG outcomes round out the technical foundation.
  prefs: []
  type: TYPE_NORMAL
- en: The importance of learning RAG cannot be overstated. The core RAG principles
    from the first edition still matter, but only when viewed as part of today’s fast-moving
    AI ecosystem. Instead of treating RAG in isolation, this edition positions it
    as the foundation for agentic memory, semantic caching, graph-based retrieval,
    and other cutting-edge capabilities. RAG remains a key facilitator of customized,
    efficient, and insightful AI solutions, bridging the gap between generative AI’s
    potential and specific business needs. Whether you are a developer looking to
    enhance your AI skills, a researcher exploring new frontiers in AI, or a business
    leader seeking to leverage AI for growth and innovation, this book will provide
    you with the knowledge and practical skills necessary to harness the power of
    RAG and unlock the full potential of AI in your projects and initiatives. By mastering
    RAG as presented in this edition, you will be equipped to build the intelligent,
    adaptive, and continuously improving AI systems that define the next generation
    of applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'The book is structured into three parts:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Part 1*, *Introduction to Retrieval-Augmented Generation (RAG)*, introduces
    you to the fundamentals of RAG, covering its core concepts, advantages, challenges,
    and practical applications across various industries. We will walk through implementing
    a complete RAG pipeline using Python, managing security risks in RAG applications,
    and building interactive user interfaces with Gradio. You will learn about the
    key components of RAG systems, including indexing, retrieval, generation, and
    evaluation, and discover how to optimize each stage for enhanced performance and
    user experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Part 2*, *Components of RAG*, takes a deeper dive into the essential building
    blocks of RAG systems and how to implement them using LangChain. We will explore
    the crucial role of vectors and vector stores in enhancing RAG performance, techniques
    for similarity searching, and methods for evaluating RAG both quantitatively and
    with visualizations. You will also work with core LangChain components such as
    document loaders, text splitters, and output parsers to further optimize your
    RAG pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Part 3*, *Implementing Agentic RAG*, builds directly on the foundation established
    in *Parts 1* and *2*. This foundation is essential because every advanced pattern
    covered here, from agents to graphs to caches to memory systems, builds directly
    on RAG as its core architecture. Without that structural integrity, these advanced
    patterns cannot perform reliably in production. With your foundation now securely
    in place, *Part 3* prepares you for the cutting edge of agentic AI development.
    You will begin by integrating AI agents with LangGraph for more powerful control
    flows, then explore knowledge engineering through ontologies and graph-based RAG
    architectures that enable complex reasoning over structured data. The chapters
    progress into semantic caches for dramatically reducing latency and inference
    costs, followed by a deep dive into agentic memory systems, the most advanced
    expression of RAG you can implement, transforming stateless agents into intelligent
    systems capable of learning and adapting over time. Through hands-on code labs,
    you will implement the CoALA memory framework, build procedural memory with LangMem,
    and integrate complete memory architectures into your RAG pipelines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Who this book is for
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The target audience for this book encompasses a wide range of professionals
    and enthusiasts who are keen on exploring the cutting-edge intersection of RAG,
    agentic AI systems, and generative AI. This includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AI researchers and academics**:Individuals engaged in the study and advancement
    of AI who are interested in the latest methodologies and frameworks, such as RAG,
    **cognitive architectures for language agents** (**CoALA**), and knowledge graph
    integration, and their implications for building intelligent, adaptive AI systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data scientists and AI engineers**: Professionals who work with large datasets,
    aiming to leverage generative AI and RAG for more efficient data retrieval, improved
    accuracy in AI responses, and innovative solutions to complex problems, including
    those building production systems that require semantic caching, memory persistence,
    and continuous learning capabilities'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Software developers and technologists**: Practitioners who design and build
    AI-driven applications and are looking to integrate RAG into agent-based architectures
    to enhance performance, relevance, and user engagement, including implementing
    episodic, semantic, and procedural memory systems'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business analysts and strategists**: Individuals who seek to understand how
    AI agents powered by RAG can be applied strategically within organizations to
    drive innovation, operational efficiency, and competitive advantage through systems
    that learn and improve over time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product managers in tech**: Professionals responsible for overseeing the
    development of AI products, interested in understanding how RAG-powered agents
    with memory capabilities can contribute to smarter, more personalized, and continuously
    improving applications that align with business goals'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI hobbyists and enthusiasts**: A broader audience with a keen interest in
    AI, eager to learn about the latest trends, tools, and techniques shaping the
    future of AI applications, from foundational RAG concepts to advanced agent architectures'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This book is particularly suited for readers who have a foundational understanding
    of AI and are looking to deepen their knowledge of how RAG serves as the backbone
    for modern agentic AI systems. It appeals to those who want to understand not
    just retrieval techniques in isolation, but how RAG integrates with memory systems,
    knowledge graphs, and semantic caches to create AI applications that maintain
    context, learn from experience, and continuously improve. The book values practical,
    hands-on learning, offering real-world coding examples, comprehensive code labs,
    and strategies for implementing everything from basic RAG pipelines to complete
    cognitive architectures with hierarchical procedural learning.
  prefs: []
  type: TYPE_NORMAL
- en: What this book covers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020), *What Is Retrieval-Augmented
    Generation (RAG)*, introduces RAG, a technique that combines **large language
    models** (**LLMs**) with a company’s internal data to enhance the accuracy, relevance,
    and customization of AI-generated outputs. It discusses the advantages of RAG,
    such as improved performance and flexibility, as well as challenges such as data
    quality and complexity. The chapter also covers key RAG vocabulary, the importance
    of vectors, and real-world applications across various industries. It compares
    RAG to conventional generative AI and fine-tuning and outlines the architecture
    of RAG systems, which consists of indexing, retrieval, and generation stages.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), *Code Lab: An Entire
    RAG Pipeline*, provides a comprehensive code lab that walks through the implementation
    of a complete RAG pipeline using Python, LangChain, and Chroma. It covers installing
    necessary packages, setting up an OpenAI API key, loading and preprocessing documents
    from a web page, splitting them into manageable chunks, embedding them into vector
    representations, and storing them in a vector database. The chapter then demonstrates
    how to perform a vector similarity search, retrieve relevant documents based on
    a query, and generate a response using a prebuilt prompt template and a language
    model within a LangChain chain. Finally, it shows how to submit a question to
    the RAG pipeline and receive an informative response.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](B34736_03_ePub.xhtml#_idTextAnchor064), *Practical Applications
    of RAG*, explores various practical applications of RAG in business, including
    enhancing customer support chatbots, automated reporting, e-commerce product descriptions
    and recommendations, utilizing internal and external knowledge bases, innovation
    scouting, trend analysis, content personalization, and employee training. It highlights
    how RAG can transform unstructured data into actionable insights, improve decision-making,
    and deliver personalized experiences across different sectors. The chapter concludes
    with a code example demonstrating how to add sources to RAG-generated responses,
    emphasizing the importance of citing information for credibility and support in
    applications such as legal document analysis or scientific research.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](B34736_04_ePub.xhtml#_idTextAnchor085), *Components of a RAG
    System*, provides a comprehensive overview of the key components that make up
    a RAG system. It covers the three main stages: indexing, retrieval, and generation,
    explaining how they work together to deliver enhanced responses to user queries.
    The chapter also highlights the importance of the **user interface** (**UI**)
    and evaluation components, with the UI serving as the primary point of interaction
    between the user and the system, and evaluation is crucial for assessing and improving
    the RAG system’s performance through metrics and user feedback. While not exhaustive,
    these components form the foundation of most successful RAG systems.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103), *Managing Security in
    RAG Applications*, explores security aspects specific to RAG applications. It
    discusses how RAG can be leveraged as a security solution by limiting data access,
    ensuring reliable responses, and providing transparency of sources. However, it
    also acknowledges the challenges posed by the black-box nature of LLMs and the
    importance of protecting user data and privacy. It introduces the concept of red
    teaming to proactively identify and mitigate vulnerabilities, and through hands-on
    code labs, it demonstrates how to implement security best practices, such as securely
    storing API keys and defending against prompt injection attacks using a red team
    versus blue team exercise. The chapter emphasizes the importance of ongoing vigilance
    and adaptation in the face of ever-evolving security threats.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 6*](B34736_06_ePub.xhtml#_idTextAnchor128), *Interfacing with RAG
    and Gradio*, provides a practical guide on creating interactive applications using
    RAG and Gradio as the UI. It covers setting up the Gradio environment, integrating
    RAG models, and creating a user-friendly interface that allows users to interact
    with the RAG system like a typical web application. The chapter discusses the
    benefits of using Gradio, such as its open source nature, integration with popular
    machine learning frameworks, and collaboration features, as well as its integration
    with Hugging Face for hosting demos. The code lab demonstrates how to add a Gradio
    interface to a RAG application, creating a process question function that invokes
    the RAG pipeline and displays the relevance score, final answer, and sources returned
    by the system.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137), *The Key Role Vectors
    and Vector Stores Play in RAG*, addresses the crucial role of vectors and vector
    stores in RAG systems. It explains what vectors are, how they’re created through
    various embedding techniques, and their importance in representing semantic information.
    The chapter covers different vectorization methods, from traditional TF-IDF to
    modern transformer-based models, such as BERT and OpenAI’s embeddings. It discusses
    factors to consider when selecting a vectorization option, including quality,
    cost, network availability, speed, and compatibility. The chapter also explores
    vector stores, their architecture, and popular options such as Chroma, Pinecone,
    and pgvector. It concludes by outlining key considerations for choosing the right
    vector store for a RAG system, emphasizing the need to align with specific project
    requirements and existing infrastructure.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176), *Similarity Searching
    with Vectors*, focuses on the intricacies of similarity searching with vectors
    in RAG systems. It covers distance metrics, vector spaces, and similarity search
    algorithms, such as k-NN and ANN. The chapter explains indexing techniques to
    enhance search efficiency, including LSH, tree-based indexing, and HNSW. It discusses
    dense (semantic) and sparse (keyword) vector types, introducing hybrid search
    methods that combine both approaches. Through code labs, the chapter demonstrates
    a custom hybrid search implementation and the use of LangChain’s EnsembleRetriever
    as a hybrid retriever. Finally, it provides an overview of various vector search
    tool options, such as PGVector, Elasticsearch, FAISS, and ChromaDB, highlighting
    their features and use cases to help select the most suitable solution for RAG
    projects.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 9*](B34736_09_ePub.xhtml#_idTextAnchor209), *Evaluating RAG Quantitatively
    and with Visualizations*,emphasizes the crucial role of evaluation in building
    and maintaining RAG pipelines. It covers evaluation during development and after
    deployment, emphasizing its importance in optimizing performance and ensuring
    reliability. The chapter discusses standardized evaluation frameworks for various
    RAG components and the significance of ground truth data. A code lab demonstrates
    the integration of the Ragas evaluation platform, generating synthetic ground
    truth and establishing comprehensive metrics to compare hybrid search with dense
    vector semantic-based search. The chapter explores retrieval, generation, and
    end-to-end evaluation stages, analyzing results and visualizing them. It also
    presents insights from a Ragas co-founder and discusses additional evaluation
    techniques, such as BLEU, ROUGE, semantic similarity, and human evaluation, highlighting
    the importance of using multiple metrics for a holistic assessment of RAG systems.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 10*](B34736_10_ePub.xhtml#_idTextAnchor244), *Key RAG Components
    in LangChain*,explores key RAG components in LangChain: vector stores, retrievers,
    and LLMs. It discusses various vector store options, such as Chroma, Weaviate,
    and FAISS, highlighting their features and integration with LangChain. The chapter
    then covers different retriever types, including dense, sparse (BM25), ensemble,
    and specialized retrievers, such as `WikipediaRetriever` and `KNNRetriever`. It
    explains how these retrievers work and their applications in RAG systems. Finally,
    the chapter examines LLM integration in LangChain, focusing on OpenAI and Together
    AI models. It demonstrates how to switch between different LLMs and discusses
    extended capabilities, such as async, streaming, and batch support. The chapter
    provides code examples and practical insights for implementing these components
    in RAG applications using LangChain.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271), *Using LangChain to
    Get More from RAG*, addresses how to enhance RAG applications using LangChain
    components. It covers document loaders for processing various file formats, text
    splitters for dividing documents into manageable chunks, and output parsers for
    structuring LLM responses. The chapter provides code labs demonstrating the implementation
    of different document loaders (HTML, PDF, Word, and JSON), text splitters (character,
    recursive character, and semantic), and output parsers (string and JSON). It highlights
    the importance of choosing appropriate splitters based on document characteristics
    and semantic relationships. The chapter also shows how to integrate these components
    into a RAG pipeline, emphasizing the flexibility and power of LangChain in customizing
    RAG applications. Overall, it provides practical insights into optimizing RAG
    systems using LangChain’s diverse toolkit.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284)*, Combining RAG with
    the Power of AI Agents and LangGraph*, explores integrating AI agents and LangGraph
    into RAG applications. It explains that AI agents are LLMs with a decision-making
    loop, allowing for more complex task handling. The chapter introduces LangGraph,
    an extension of LCEL, which enables graph-based agent orchestration. Key concepts
    covered include agent state, tools, toolkits, and graph theory elements, such
    as nodes and edges. A code lab demonstrates building a LangGraph retrieval agent
    for RAG, showcasing how to create tools, define agent state, set up prompts, and
    establish cyclical graphs. The chapter emphasizes how this approach enhances RAG
    applications by allowing agents to reason, use tools, and break down complex tasks,
    ultimately providing more thorough responses to user queries.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299), *Ontology-Based Knowledge
    Engineering for Graphs*,introduces ontologies as formal representations of domain
    knowledge that provide the semantic backbone for advanced AI reasoning. It covers
    the role of ontologies in agent architectures, comparing RDFS and OWL modeling
    languages, and provides a comprehensive code lab for building a financial ontology
    in Protégé. The chapter walks through defining domain scope, establishing class
    hierarchies, creating properties and relationships, and enriching ontologies with
    annotations using SKOS vocabulary.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 14*](B34736_14_ePub.xhtml#_idTextAnchor327), *Graph-Based RAG*, transforms
    the ontology from [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299) into a
    functioning knowledge graph within Neo4j. It covers the advantages of combining
    knowledge graphs with RAG, including enhanced retrieval precision, multi-hop reasoning,
    and explainability. The chapter provides a detailed code lab demonstrating how
    to convert RDF triples into a property graph, create navigational anchor nodes,
    implement hybrid embeddings that combine textual descriptions with graph topology,
    and build a complete graph-based RAG pipeline using Python dictionary format for
    optimal LLM reasoning.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 15*](B34736_15_ePub.xhtml#_idTextAnchor346), *Semantic Caches*, explores
    how semantic caches serve as an intelligent interceptor layer that dramatically
    reduces latency and inference costs in production AI systems. It covers the long-tail
    pattern in query distribution, vector-based similarity matching, entity masking
    for generalization, cross-encoder verification to reduce false positives, and
    adaptive thresholds for different match types. The chapter includes a comprehensive
    code lab demonstrating auto-population with fallback mechanisms and discusses
    population strategies, including LLM-based paraphrasing and back-translation.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381), *Agentic Memory: Extending
    RAG with Stateful Intelligence*, demonstrates the theoretical foundation for transforming
    stateless AI systems into agents capable of learning and adapting over time. It
    covers the evolution of agent memory from early chatbots to modern cognitive architectures,
    introduces the CoALA framework with its four memory types (working, episodic,
    semantic, and procedural), and explores memory scope dimensions, including community
    and personal memory. The chapter compares three memory framework approaches: Mem0,
    LangMem, and Zep/Graphiti, and provides guidance on evaluation and monitoring
    strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422), *RAG-Based Agentic Memory
    in Code*,provides hands-on implementation of episodic and semantic memory systems,
    building upon the CoALA framework. Through three focused code labs, it demonstrates
    setting up a baseline agent with LangGraph and ChromaDB, implementing episodic
    memory for storing and retrieving conversation experiences, and building semantic
    memory for extracting and utilizing factual knowledge across sessions. The chapter
    shows how these memory types work together to enable personalized, context-aware
    agent responses.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 18*](B34736_18_ePub.xhtml#_idTextAnchor447), *Procedural Memory for
    RAG with LangMem*, introduces LangMem as the SDK for procedural memory optimization
    that enables agents to learn, adapt, and improve autonomously. It covers the benefits
    of procedural memory, including self-healing capabilities, compounding performance
    improvements, and customer intelligence extraction. The chapter provides a comprehensive
    code lab implementing hierarchical learning at the user, community, task, and
    global scopes, demonstrating how agents can extract patterns from conversations
    and apply them appropriately while maintaining complete separation between domain-agnostic
    learning mechanisms and domain-specific logic.'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 19*](B34736_19_ePub.xhtml#_idTextAnchor464), *Advanced RAG with Complete
    Memory Integration*, completes the CoALA implementation by integrating procedural
    memory with episodic and semantic systems to create a complete cognitive architecture.
    It covers creating a full CoALA agent with all memory types working together,
    explores LangMem’s learning algorithms (`prompt_memory`, gradient, and metaprompt),
    and provides guidance on designing domain metrics that shape agent evolution.
    The chapter includes a framework for adapting the investment advisor implementation
    to any domain, demonstrating how the modular architecture enables rapid deployment
    of learning agents across healthcare, education, customer service, and beyond.'
  prefs: []
  type: TYPE_NORMAL
- en: To get the most out of this book
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You should have a basic understanding of Python programming and familiarity
    with machine learning concepts. Knowledge of **natural language processing** (**NLP**)
    and LLMs would be beneficial. Experience with data processing and database management
    is also helpful. This book assumes that you have some experience with AI development
    environments, are comfortable working with APIs, and have experience working in
    a Jupyter Notebook environment.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Software/hardware covered in the book** | **Operating system requirements**
    |'
  prefs: []
  type: TYPE_TB
- en: '| Python 3.x | Windows, macOS, or Linux |'
  prefs: []
  type: TYPE_TB
- en: '| LangChain | Windows, macOS, or Linux |'
  prefs: []
  type: TYPE_TB
- en: '| OpenAI API | Windows, macOS, or Linux |'
  prefs: []
  type: TYPE_TB
- en: '| Jupyter Notebook | Windows, macOS, or Linux |'
  prefs: []
  type: TYPE_TB
- en: You will need access to a Python development environment that supports Jupyter
    Notebook. An OpenAI API key is required for many of the examples. Some chapters
    may require additional API keys for services such as Tavily or Together AI, but
    you will be walked through setting those up in those chapters. A machine with
    at least 8 GB of RAM is recommended for running the more complex examples, especially
    those involving LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: If you are using the digital version of this book, we advise you to type the
    code yourself or access the code from the book’s GitHub repository (a link is
    available in the next section). Doing so will help you avoid any potential errors
    related to the copying and pasting of code.
  prefs: []
  type: TYPE_NORMAL
- en: Download the example code files
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code bundle for the book is hosted on GitHub at [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  prefs: []
  type: TYPE_NORMAL
