- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Sampling
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 采样
- en: 'One of the most powerful features of MCP is **sampling**. What does that mean,
    first of all? Well, let’s take a look at the definition of the word and deduce
    from there. Merriam-Webster defines sampling as follows:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: MCP最强大的功能之一是**采样**。首先，这意味着什么？好吧，让我们看看这个词的定义，并从中推断。梅里尔-韦伯斯特将采样定义为如下：
- en: “the action or process of taking samples of something for analysis”
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “对某物进行采样的行为或过程”
- en: Okay, so we need a sample, and we end up analyzing said sample, understood.
    With this definition in mind, let’s talk about it in the context of MCP. In MCP,
    sampling means the server is sending a sampling request, a *sample* for analysis,
    to the client. Why does the server do that? It’s simple; the server needs the
    client’s help with some things. Because the client is the one with the LLM (even
    though a server can have an LLM sometimes), the server delegates tasks to the
    client, where an LLM can help.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以我们需要一个样本，并且我们最终分析了这个样本，明白了。带着这个定义，让我们在MCP的背景下讨论它。在MCP中，采样意味着服务器正在向客户端发送一个采样请求，一个用于分析的*样本*。服务器为什么要这样做呢？很简单；服务器需要客户的帮助做一些事情。因为客户端拥有LLM（即使服务器有时也可以拥有LLM），服务器将任务委托给客户端，在那里LLM可以提供帮助。
- en: Makes sense so far, right? But I bet you’re asking why a server would do that.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，这听起来合理，对吧？但我敢打赌你正在问为什么服务器会这样做。
- en: 'In this chapter, we’ll do the following:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将进行以下操作：
- en: Understand the topic of sampling and when to use it
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解采样的主题以及何时使用它
- en: Build a server implementation using sampling and consume it with VS Code
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用采样构建服务器实现并使用VS Code进行消费
- en: Connect the server implementation to a client implementation for the occasions
    when we want to integrate this functionality into our app.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们想要将此功能集成到我们的应用程序中时，将服务器实现连接到客户端实现。
- en: 'The chapter covers the following topics:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Why sampling?
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么需要采样？
- en: Implementing sampling
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现采样
- en: Why sampling?
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么需要采样？
- en: 'As we said at the beginning, the server wants to delegate some problems to
    the client and, specifically, to the client’s LLM. So, what problems can an LLM
    help with that the server can’t? There are lots of examples if you think about
    it: generating product descriptions, abstracts, tags, and more.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们一开始所说的，服务器想要将一些问题委托给客户端，特别是客户端的LLM。那么，LLM能帮助解决哪些服务器无法解决的问题呢？如果你思考这个问题，会发现有很多例子：生成产品描述、摘要、标签等等。
- en: Let’s look into the sample flow first so we understand how the interaction happens
    at a high level.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先了解一下采样流程，以便我们了解在高级别上交互是如何发生的。
- en: Sampling flow
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 采样流程
- en: 'When performing sampling, the following participants are involved:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行采样时，以下参与者会参与其中：
- en: '**User**: The user is usually involved in two places, as the originator of
    the initial action, and even as the *human in the loop*, accepting or modifying
    the sample request.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户**：用户通常在两个地方参与，作为初始动作的发起者，甚至作为*人机交互*中的接受者或修改采样请求。'
- en: '**Server**: The server is the participant sending out a sample request. This
    request is usually sent out from a server feature, such as a tool call, reading
    of a resource, or a request from a prompt template.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器**：服务器是发送采样请求的参与者。这个请求通常是从服务器功能中发送的，比如工具调用、读取资源或提示模板的请求。'
- en: '**Client**: The client’s job is to receive the sample request and show it to
    the user, so the user can decide what to do with it. A user treats a sampling
    request as a recommendation for what to do. If the request asks for a specific
    model, number of tokens, and so on, then this is something the user can take under
    advisement, and either accept or change to their liking.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户端**：客户端的职责是接收采样请求并向用户展示，以便用户可以决定如何处理它。用户将采样请求视为一项行动的建议。如果请求要求特定的模型、令牌数量等，那么这就是用户可以参考并接受或修改的内容。'
- en: '**LLM**: The LLM on the client plays the part of completing the sampling request
    and takes a prompt originating from the server, and produces a response using
    its generative capabilities.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM**：客户端上的LLM负责完成采样请求，并接收来自服务器的提示，然后使用其生成能力生成响应。'
- en: 'Here’s a diagram depicting the overall flow:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个描述整体流程的图：
- en: '![Figure 9.1 – Sampling flow](img/B34121_09_1.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1 – 采样流程](img/B34121_09_1.png)'
- en: Figure 9.1 – Sampling flow
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 – 采样流程
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜 AI生成的内容可能不正确。](img/1.png)**快速提示**：需要查看此图像的高分辨率版本吗？在下一代Packt Reader中打开此书或在其PDF/ePub副本中查看。'
- en: '![](img/21.png)**The next-gen Packt Reader** and a **free PDF/ePub copy** of
    this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png)**下一代Packt Reader**以及本书的**免费PDF/ePub副本**包含在您的购买中。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找本书。仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![](img/Unlock1.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: It’s worth clarifying that a sampling request doesn’t happen for no reason,
    but rather, there’s an initial action that ends up triggering it. For example,
    the user wants to create a product, or needs help with a blog post, and so on,
    and that in turn leads to the server delegating part of that task back to the
    client.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 值得明确的是，采样请求并非没有原因，而是有一个初始动作最终触发了它。例如，用户想要创建产品，或需要帮助写博客文章等，这反过来又导致服务器将部分任务委托给客户端。
- en: Let’s look at some specific scenarios next to understand it better.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些具体的场景，以便更好地理解。
- en: Scenarios
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景
- en: We’ve mentioned some scenarios briefly up to this point, but let’s discuss them
    in detail.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经简要提到了一些场景，但让我们详细讨论它们。
- en: Writing a blog post
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 写博客文章
- en: 'The act of writing a blog post is a good case, as there are aspects of it that
    definitely fall on the user, such as writing a draft. However, there are parts
    of it when an LLM does a better job, such as summarizing it for an abstract or
    even generating keywords (thank you, Kent Dodds, for the inspiration for this
    use case):'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 写博客文章的行为是一个很好的案例，因为它有一些方面肯定属于用户，例如撰写草稿。然而，也有一些方面LLM做得更好，例如为摘要总结或甚至生成关键词（感谢Kent
    Dodds为此用例提供灵感）：
- en: The user submits a draft blog post to the server.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户将草稿博客文章提交到服务器。
- en: The server stores the draft but asks for help with producing tags, so a sample
    request is sent.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器存储草稿，但请求帮助生成标签，因此发送了一个样本请求。
- en: The client uses its LLM to analyze the draft and produce a response.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户使用其LLM分析草稿并生成响应。
- en: Back office e-commerce
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后台电子商务
- en: 'A common task for someone working in a back office as part of e-commerce is
    the management of products. Usually, you start off registering the product by
    title and capture other properties that might make sense. However, writing a compelling
    description might be a time-consuming task and something an LLM does better than
    a human. Here’s how this use case could look as a sampling scenario:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子商务后台工作的人员的一个常见任务是产品的管理。通常，您从注册产品标题开始，并捕获其他可能合理的属性。然而，撰写引人入胜的描述可能是一项耗时的工作，而LLM在这方面可能比人类做得更好。以下是如何作为一个采样场景的用例：
- en: The admin user, via the client, adds a new product with a title and keywords.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理员用户通过客户端添加一个带有标题和关键词的新产品。
- en: The server asks the client for help with creating a compelling product description
    with keywords as context.
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器请求客户端帮助创建一个具有关键词上下文的引人入胜的产品描述。
- en: The client produces such a description, and the server updates the product with
    a better description.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户生成这样的描述，服务器用更好的描述更新产品。
- en: Mystery game
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 悬疑游戏
- en: 'Many times, when playing games, you encounter characters in the game you want
    to have a conversation with; some of these characters are known as **NPCs** or
    **non-player characters**. Usually, these characters are limited in what they
    can say, as this is how they’re programmed. This limitation takes away from the
    gaming experience, and this is where an LLM can step in and do a better job. See
    the following flow for how this could work:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在玩游戏时，你经常会遇到你想要与之交谈的游戏角色；其中一些角色被称为**NPC**或**非玩家角色**。通常，这些角色的说话能力有限，因为这正是它们被编程的方式。这种限制减少了游戏体验，这正是LLM可以介入并做得更好的地方。以下是如何实现这一点的流程：
- en: The user asks to talk to a character.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户要求与一个角色交谈。
- en: The server retrieves character information such as name, description, motive,
    clues, and so on, and sends it as a sample request.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器检索角色信息，如姓名、描述、动机、线索等，并将其作为样本请求发送。
- en: The client retrieves the character information from the prompt request and uses
    that as a system message to produce a nice conversation response.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户端从提示请求中检索字符信息，并使用该信息作为系统消息来生成一个愉快的对话响应。
- en: Now that we understand more about suitable scenarios, let’s discuss what the
    actual messages look like, as it’s important to understand what is being sent
    back and forth. More importantly, it’s important to understand what information
    you can configure upon sending a sample request to a client.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对合适的场景有了更多的了解，让我们来讨论实际的消息看起来是什么样子的，因为理解正在发送和接收的内容非常重要。更重要的是，理解在向客户端发送样本请求时可以配置哪些信息非常重要。
- en: Messages
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 消息
- en: 'If you’re using an SDK, you will almost never encounter a JSON-RPC, but what
    is interesting to know is what can be sent as part of a sampling request, so you
    know what type of guidance you can send to the client. Let’s have a look at the
    following message:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用SDK，你几乎永远不会遇到JSON-RPC，但有趣的是要知道可以作为采样请求一部分发送的内容，这样你就知道可以向客户端发送什么类型的指导。让我们看看以下消息：
- en: '**Request**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**请求**'
- en: '[PRE0]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'In the preceding message, the following are of special interest:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的消息中，以下内容特别引人关注：
- en: '`messages`: Here’s where you’re sending the messages that get fed to the LLM.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`messages`: 这里是你发送的消息，这些消息将被输入到LLM中。'
- en: '`modelPreferences`: This property is just a *preference* for which model should
    ideally be used. The user is the one ultimately deciding, but this should be seen
    as a recommendation. Also, make note of other properties we can set, such as `intelligencePriority`
    and `speedPriority`.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`modelPreferences`: 这个属性只是对理想中应该使用哪个模型的*建议*。用户是最终决定的人，但应将其视为建议。还要注意我们可以设置的其他属性，例如`intelligencePriority`和`speedPriority`。'
- en: '`systemPrompt`: This is an important one, as this is the *personality* of the
    LLM and can greatly affect the outcome of the message.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`systemPrompt`: 这是一个重要的属性，因为这是LLM的*个性*，它可以极大地影响消息的结果。'
- en: '`maxTokens`: This property decides how many tokens will be used for this task.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`maxTokens`: 这个属性决定了将用于此任务多少个标记。'
- en: 'Now that we have had a good look at what the server is sending to the client,
    let’s look at what the client sends back:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经仔细查看服务器发送给客户端的内容，让我们看看客户端发送回的内容：
- en: '**Response**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**响应**'
- en: '[PRE1]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Here, we can see how the LLM response comes back in the `content` property,
    and it also lets us know which model was ultimately used, among other details.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到LLM的响应是如何在`content`属性中返回的，它还告诉我们最终使用了哪个模型，以及其他细节。
- en: Implementing sampling
  id: totrans-61
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实现采样
- en: Now, we’ve come to the extra exciting part of this chapter, namely, how to implement
    sampling.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经来到了本章最激动人心的部分，即如何实现采样。
- en: 'We’ll cover the following parts of the implementation:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下实施部分：
- en: '**Server side**: How to add this to the MCP server'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器端**: 如何将其添加到MCP服务器'
- en: '**Client side**: How to enable it and what the code looks like, both to receive
    a request and send a response'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户端**: 如何启用它以及代码看起来像什么，包括接收请求和发送响应'
- en: Server implementation
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 服务器实现
- en: 'To implement sampling on the server side, we need to consider when the sampling
    request should take place. Usually, a sampling request doesn’t happen out of nowhere,
    but it happens in the context of an action. Imagine the following scenario. A
    user working in the back office of an e-commerce site adds new products for sale.
    They need help with the description, and it should be as compelling as possible.
    For the description, they will therefore use the help of a client and its LLM.
    Here’s how it will play out:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 要在服务器端实现采样，我们需要考虑采样请求应该在何时进行。通常，采样请求不会无中生有，而是在某个动作的上下文中发生。想象以下场景。一个在电子商务网站后台工作的用户添加新的销售产品。他们需要帮助编写描述，并且希望描述尽可能吸引人。因此，他们将使用客户端及其LLM的帮助。以下是它将如何展开：
- en: The user’s client calls a tool on the server that asks to create a new product.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户的客户端调用服务器上的一个工具，请求创建一个新的产品。
- en: The server’s tool then dispatches a sample request with instructions on what
    to do, which is a prompt.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器工具随后发送一个带有操作说明的样本请求，这被称为提示。
- en: 'The client then takes said prompt from the sample request, calls their LLM,
    and returns the answer:'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户端随后从样本请求中获取提示，调用他们的LLM，并返回答案：
- en: '[PRE2]'
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'In steps `1` and `2` in the preceding code, note the use of the `ctx` (context)
    object, calling `session.create_message`, and passing in `SamplingMessage`, which
    has a `user` value, and `messages` being populated with the prompt you’re sending
    to the client:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码步骤 `1` 和 `2` 中，注意 `ctx`（上下文）对象的使用，调用 `session.create_message` 并传入 `SamplingMessage`，其中包含
    `user` 值，以及 `messages` 被填充了你发送给客户端的提示：
- en: '[PRE3]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Also, take note of the fact that we’re waiting for the client here to come
    back to us before we return. Once the client’s message comes back, we assign the
    result to the product description and, finally, return the product:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意，我们在返回之前正在等待客户端回复。一旦客户端的消息返回，我们将结果分配给产品描述，最后返回产品：
- en: '[PRE4]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Let’s test this out in VS Code. Ensure you do the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在 VS Code 中测试一下。请确保执行以下操作：
- en: 'Create a server entry in `mcp.json` like so:'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `mcp.json` 中创建一个服务器条目，如下所示：
- en: '[PRE5]'
  id: totrans-78
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Make sure the server is running by clicking the **Start Server** link at the
    top of the server entry.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击服务器条目顶部的 **Start Server** 链接确保服务器正在运行。
- en: You also need to select which models are allowed to be used with sampling. To
    make the selection, open the **Extension** view and notice the **MCP Servers –
    installed** section at the bottom. Click the gear icon and **Configure Model Access**
    for the installed server, and select the allowed models for sampling, such as
    **Claude Sonnet**.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你还需要选择哪些模型可以与采样一起使用。为了进行选择，打开 **扩展** 视图，并注意底部的 **MCP Servers – installed** 部分。点击齿轮图标，为已安装的服务器配置
    **Model Access**，并选择允许用于采样的模型，例如 **Claude Sonnet**。
- en: 'Open the **GitHub Copilot Chat** window in VS Code and ensure the **Agent**
    mode is selected in the chat (select the icon for it at the top or run the **Chat:
    Open Chat** command in the command palette). Now, type the following prompt:'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '在 VS Code 中打开 **GitHub Copilot Chat** 窗口，并确保聊天中选择了 **Agent** 模式（在顶部选择该图标或通过命令面板运行
    **Chat: Open Chat** 命令）。现在，输入以下提示：'
- en: '[PRE6]'
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'You should see a dialog asking for your permission to run that, once allowed,
    produces a tooling response from `create_product`. Here’s what happened under
    the hood:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到一个对话框请求你的权限来运行它，一旦允许，就会从 `create_product` 产生工具响应。以下是底层的操作过程：
- en: 'The prompt was parsed. Here’s what was sent to the tool:'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示已解析。以下是发送给工具的内容：
- en: '[PRE7]'
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The `create_product` tool was invoked.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调用了 `create_product` 工具。
- en: 'The sample request was sent to the client. Because the client in VS Code has
    its own LLM, it produces a response to the sample request like so:'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 样本请求已发送到客户端。因为 VS Code 中的客户端有自己的 LLM，它会像这样对样本请求产生响应：
- en: '![Figure 9.2 – Sampling in VS Code](img/B34121_09_2.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.2 – VS Code 中的采样](img/B34121_09_2.png)'
- en: Figure 9.2 – Sampling in VS Code
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.2 – VS Code 中的采样
- en: 'Let’s have a look at the generated description:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看生成的描述：
- en: '[PRE8]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Wouldn’t you buy that tomato? :)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会买那个番茄吗？ :)
- en: Okay, that’s great. We got sampling to work on an MCP server, and VS Code was
    acting as a client, ensuring that it worked. How do we actually build a client
    for this in a scenario where we want to integrate this into a real solution? That’s
    a great question and something we will cover in the next section.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，太棒了。我们在 MCP 服务器上成功实现了采样，VS Code 作为客户端运行，确保了其正常工作。那么，在实际解决方案中集成这一功能时，我们如何实际构建一个客户端呢？这是一个很好的问题，我们将在下一节中讨论。
- en: Client implementation
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户端实现
- en: 'First off, you need to let the server know that you support sampling as a feature.
    To do that, you need to pass the configuration when creating the client instance,
    like so:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要让服务器知道你支持采样作为一项功能。为此，你需要在创建客户端实例时传递配置，如下所示：
- en: '[PRE9]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Okay, what do we need to know? For one, sampling is outside of your normal
    flow of calling tools, resources, and prompts. What does that mean, you wonder.
    Well, let’s see how we listen for incoming sampling requests:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们需要了解什么？首先，采样是在你调用工具、资源和提示的正常流程之外的。你可能会想，这意味着什么。让我们看看我们如何监听传入的采样请求：
- en: '[PRE10]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This code shows how we normally connect to an MCP server and initialize the
    process so we can later call tools or whatever we want to do. There’s a difference,
    though: note `sampling_callback=handle_sampling_message`. This is important as
    this allows us to listen for incoming messages.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码展示了我们通常如何连接到 MCP 服务器并初始化进程，以便我们稍后可以调用工具或执行我们想要的任何操作。不过，有一个区别：注意 `sampling_callback=handle_sampling_message`。这很重要，因为它允许我们监听传入的消息。
- en: 'Let’s look at `handle_sampling_message` next:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 `handle_sampling_message`：
- en: '[PRE11]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'There are three things in the preceding code we should make a note of:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，有三件事情我们应该注意：
- en: In step `1`, here’s how we parse out the incoming product message (our assignment,
    if you will). This is what we will send to the LLM to get a response from. In
    this case, our response should be a product description.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在步骤 `1` 中，这是我们对传入的产品消息（如果你愿意，可以称之为我们的任务）进行解析的方式。这是我们将其发送给 LLM 以获取响应的内容。在这种情况下，我们的响应应该是一个产品描述。
- en: In step `2`, we call the LLM to get a response.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在步骤 `2` 中，我们调用 LLM 以获取响应。
- en: Lastly, we construct a sample response that gets sent back to the MCP server.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们构建一个样本响应并将其发送回 MCP 服务器。
- en: A helper function calls GitHub Models with a prompt and a system message, and
    parses out the LLM response.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助函数使用提示和系统消息调用 GitHub 模型，并解析出 LLM 的响应。
- en: 'That’s it, if you test running the client at this point: [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/code/python/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/code/python/README.md
    )'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，如果你现在测试运行客户端：[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/code/python/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/code/python/README.md)
- en: 'You should see a response similar to the following:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到以下类似的响应：
- en: '[PRE12]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The client does two things:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端执行以下两个操作：
- en: 'It calls the `create_product` tool with a product name and keyword, and it
    ends up producing a product with an LLM-generated description like so:'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它使用产品名称和关键词调用 `create_product` 工具，并最终生成一个具有 LLM 生成的描述的产品，如下所示：
- en: '[PRE13]'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Doesn’t that sound like paprika you would buy? Imagine sending this to an LLM
    and asking it to generate a photo (optional homework). What an image that would
    be.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 难道这不像是你想要购买的辣椒吗？想象一下将这个发送给 LLM 并要求它生成一张图片（可选作业）。那会是一张多么令人惊叹的图片。
- en: It calls the `get_products` tool, which lists the newly added product.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它调用 `get_products` 工具，列出新添加的产品。
- en: As you can see, this is a great way to delegate tasks to the client that it’s
    better equipped to handle.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，这是一种将任务委托给客户端的绝佳方式，因为客户端更适合处理这些任务。
- en: Summary
  id: totrans-116
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The idea with the meaning of the word *sampling* is to analyze a small sample.
    In the context of MCP, this is about delegation and how the server delegates part
    of its work to the client.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 关于“采样”一词的含义，是指分析一个小样本。在 MCP 的上下文中，这涉及到委托，即服务器如何将部分工作委托给客户端。
- en: A scenario is usually started by a user, such as authoring a blog post or wanting
    to create a product in a back office solution. The server ends up creating a sampling
    request and sends that to the client as part of a task it needs help with. The
    client is then able to respond to said request using an LLM response.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 一个场景通常由用户启动，例如撰写博客文章或希望在后台解决方案中创建产品。服务器最终创建一个采样请求，并将其作为需要帮助的任务的一部分发送给客户端。然后，客户端能够使用
    LLM 响应来回应该请求。
- en: It should also be stated that the sample request contains recommendations on
    model, token usage, system prompt, and much more, and that it should involve a
    human who either accepts these recommendations or changes them to their liking.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 应该还指出，样本请求包含有关模型、令牌使用、系统提示等方面的建议，并且应该涉及一个人类，该人类可以接受这些建议或根据他们的喜好进行更改。
- en: This is a great functionality, where an LLM on the client can be called in to
    help.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很棒的功能，其中客户端的 LLM 可以被调用以提供帮助。
- en: In our next chapter, we’ll dive into yet another powerful feature of MCP, namely,
    elicitation, which is about improving the user experience by setting up a flow
    where the user is asked to pick another choice or provide more information to
    help the server do its job better.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将深入探讨 MCP 的另一个强大功能，即“诱导”，这是通过设置一个流程来改善用户体验，在该流程中，用户被要求选择另一个选项或提供更多信息以帮助服务器更好地完成任务。
- en: Assignment
  id: totrans-122
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务
- en: In this assignment, we’ll take all our knowledge of adding sampling implementations
    to the client and server and apply it to a fun area, namely, a mystery game, and
    the conversational part. The idea is to create a character that’s interesting
    to talk to over pre-programmed responses.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个任务中，我们将把我们对在客户端和服务器中添加采样实现的所有知识应用到有趣的应用领域，即神秘游戏和对话部分。我们的想法是创建一个有趣的对话角色，它可以通过预编程的响应进行交谈。
- en: 'Here’s how it should work:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它的工作方式：
- en: '**User**: Talk to character *N*'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户**：与角色 *N* 交谈'
- en: '**Server**: Retrieve character info'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器**：检索角色信息'
- en: '**Server**: Send sampling request with character info'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器**：发送带有字符信息的采样请求'
- en: '**Client**: Receive sampling request and produce a response using the LLM'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户端**：接收采样请求并使用 LLM 生成响应'
- en: '**Server**: Store response for caching and logging'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器**：存储响应以进行缓存和记录'
- en: 'To help you, imagine that a character is defined in a JSON file like so:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您，想象一下一个角色在JSON文件中定义如下：
- en: '[PRE14]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
