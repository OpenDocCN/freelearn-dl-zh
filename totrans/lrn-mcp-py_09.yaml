    9/solution/README.md)."
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: "您可以在[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/solution/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter0\uFEFF\
    9/solution/README.md)访问解决方案。"
- en: Quiz
  id: totrans-134
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测验
- en: What’s the reason for using sampling?
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 使用抽样的原因是什么？
- en: 'A: You want to sample a smaller piece of information from a large dataset'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 您想从大量数据集中采样一小部分信息'
- en: 'B: The server needs help with a generative AI-type task, and the client can
    use its LLM to generate a response'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 服务器需要帮助完成一个生成式AI类型的任务，客户可以使用其LLM来生成响应'
- en: 'C: The client needs the server’s help with a task'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 客户需要服务器的帮助来完成一项任务'
- en: What party initiates the sampling request?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 谁发起抽样请求？
- en: 'A: Either of them'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 两者之一'
- en: 'B: The client'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 客户'
- en: 'C: The server'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 服务器'
- en: You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/solution/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/solution/solution-quiz.md).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/solution/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter09/solution/solution-quiz.md)访问解决方案。
