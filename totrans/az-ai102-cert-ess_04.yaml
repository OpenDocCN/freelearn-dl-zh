- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Implementing Content Moderation Solutions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will focus on the fundamental role that responsible AI principles
    play in developing ethical and secure AI systems. As AI continues to expand in
    its capabilities, the principles of fairness, reliability, privacy, inclusiveness,
    transparency, and accountability become essential. These values guide the development
    of AI systems that not only meet technical standards but also respect human values
    and dignity. By adhering to these principles, we can ensure that AI is a force
    for good, minimizing risks and maximizing benefits for society.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll also cover some of the unique risks posed by generative AI, such as the
    potential for unverified or misleading outputs, susceptibility to manipulation,
    and the creation of harmful or inappropriate content. Strategies to mitigate these
    risks, such as using content filters and the Responsible Innovation Framework,
    are essential in safeguarding AI’s responsible deployment. This framework includes
    steps such as testing for vulnerabilities, measuring risks, implementing mitigations,
    and ongoing monitoring to maintain the security and ethical integrity of AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, we will examine how Azure AI Content Safety helps organizations manage
    and protect the content generated by AI models. Tools such as content filters,
    jailbreak detection, and risk assessments ensure that AI outputs are safe and
    reliable. The exercises in this chapter are designed to give you a hands-on understanding
    of the capabilities of Azure AI Content Safety, providing practical insights into
    how these tools can be effectively implemented.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Understand responsible AI principles and their significance in creating ethical,
    fair, and reliable AI systems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recognize the unique risks associated with generative AI, including unverified
    outputs, potential manipulations, and the generation of harmful content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn about mitigation strategies such as content filters and the Responsible
    Innovation Framework to address these risks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gain practical insights into Azure AI Content Safety and its role in monitoring,
    filtering, and safeguarding AI-generated content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply these concepts through hands-on exercises to understand how content filtering
    and safety mechanisms work in real-time AI deployment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive into the ethical and practical sides of building safe AI solutions!
  prefs: []
  type: TYPE_NORMAL
- en: Planning for responsible AI principles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The advancement of AI should be guided by principles that prioritize ethical
    considerations and human well-being. While generative AI models offer remarkable
    benefits—such as automating tasks, enhancing creativity, and improving decision-making—they
    also pose risks if not carefully designed and managed. These risks include the
    generation of misleading or harmful content, biased outputs, and the potential
    misuse of AI capabilities in unintended or unethical ways. To ensure responsible
    AI deployment, organizations must implement safeguards such as well-defined use
    cases, adherence to responsible AI principles, content moderation mechanisms,
    and clear guidelines for ethical AI usage.
  prefs: []
  type: TYPE_NORMAL
- en: Six foundational principles should guide the development and use of AI to ensure
    fairness, security, and accountability. Each principle plays a crucial role in
    safeguarding individual rights, upholding societal values, and addressing the
    broader implications of AI-driven technologies. By integrating these principles
    into AI systems, developers can create solutions that align with ethical standards
    while mitigating risks associated with bias, security vulnerabilities, and lack
    of transparency.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.1 – Responsible AI principles](img/B31034_04_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.1 – Responsible AI principles
  prefs: []
  type: TYPE_NORMAL
- en: 'Each principle should be explored to understand its importance:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fairness**: AI systems should be designed to treat all individuals and groups
    fairly, without bias or discrimination. For example, AI used in hiring is trained
    to screen resumes fairly, avoiding biases based on gender, ethnicity, or age.
    The system is validated using diverse candidate profiles across various demographics
    to confirm fairness in recommendations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reliability and safety**: AI systems should be designed and tested to be
    reliable and safe, with appropriate measures to prevent errors or harm. For example,
    medical image analysis AI is rigorously tested using various real-world datasets
    to ensure it accurately identifies conditions such as tumors without false positives
    or negatives that could endanger patients.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy and security**: AI systems should be designed to protect the privacy
    and security of personal information, with appropriate safeguards to prevent unauthorized
    access or use. For example, a chatbot used in banking encrypts all user data,
    does not store personal financial details after a session ends, and uses multi-factor
    authentication to prevent unauthorized access.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inclusiveness**: AI systems should be designed to be inclusive and accessible,
    with considerations for diversity and inclusiveness. For example, a voice assistant
    supports multiple languages and dialects and can respond to users with speech
    impairments by integrating visual and tactile interfaces.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transparency**: AI systems should be designed to be transparent and explainable,
    with clear documentation of how the system works and makes decisions. For example,
    loan approval AI explains its decision by showing the applicant the key factors
    (e.g., credit score and income) that influenced the outcome, using a clear and
    understandable dashboard.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accountability**: AI systems should be designed to be accountable, with clear
    lines of responsibility and mechanisms for oversight and review. For example,
    a retail company using AI for pricing automation sets up an internal review board
    to monitor outputs, log decisions, and investigate any complaints about pricing
    inconsistencies or errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These responsible AI principles are a set of guidelines and best practices designed
    to ensure that AI systems are developed and deployed in a manner that is ethical,
    fair, secure, and transparent. These principles aim to uphold personal agency
    and dignity while considering the broader impacts of AI on society.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore the new potential risks that arise with the increasing integration
    of AI technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Recognizing the risks associated with generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While generative AI offers powerful capabilities, it also presents risks such
    as misinformation, adversarial manipulation, harmful content, copyright issues,
    and deceptive outputs. Understanding these challenges is crucial for ensuring
    responsible AI use. Let’s explore these risks in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.2 – Generative AI introduces new risks](img/B31034_04_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.2 – Generative AI introduces new risks
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s briefly look at these new risks with some examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ungrounded outputs and errors**: AI can generate misleading or false information
    that appears credible but lacks a factual basis. For example, a chatbot incorrectly
    states that a historical event happened in 1850 when it actually occurred in 1860,
    leading to misinformation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Jailbreaks and prompt injection attacks**: Malicious users can manipulate
    AI prompts to bypass safety measures and generate harmful content. For example,
    a user bypasses safety filters by rephrasing a request to make an AI assistant
    unknowingly provide instructions for producing restricted substances.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Harmful content and code**: AI may generate offensive, violent, or inappropriate
    content, including dangerous code. For example, social media AI inadvertently
    generates hate speech in response to a controversial topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Copyright infringement**: AI may reproduce copyrighted text, images, or music
    without proper authorization. For example, a generative AI tool produces an image
    that closely resembles a copyrighted cartoon character, leading to legal concerns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manipulation and human-like behavior**: AI can mimic human interactions to
    deceive users, leading to misinformation or fraud. For example, a scammer uses
    AI-generated voices to impersonate a bank representative and trick customers into
    sharing personal information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With an understanding of new risks associated with AI, let’s dive into the concept
    of responsible innovation, an iterative process designed to manage risks and ensure
    the ethical deployment of AI technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Innovating responsibly through iteration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The framework for managing risks in innovative AI technologies is an iterative
    process known as **responsible innovation**. This approach ensures safety, ethics,
    and accountability when deploying AI models and tools. The framework follows four
    core steps within a governance model: **Red Team**, **Measure**, **Mitigate**,
    and **Operate**.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.3 – Generative AI introduces new risks](img/B31034_04_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.3 – Generative AI introduces new risks
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s briefly go over the process:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Red Team**: This step involves adversarial testing of the AI system by a
    dedicated team that acts as ethical hackers. Their goal is to simulate realistic
    attack vectors, misuse scenarios, and edge cases to uncover potential vulnerabilities
    in the model’s behavior or output. These tests are conducted before deployment
    to identify how the system might respond under stress or manipulation, or in situations
    that could lead to harmful or unsafe outcomes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For instance, they might test how an AI chatbot handles sensitive information
    or see whether it can be tricked into generating harmful content. This step is
    crucial for understanding how the AI system can be compromised and what measures
    need to be put in place to prevent such scenarios.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Measure**: After identifying potential risks, the next step is to measure
    these risks at scale. This involves running large-scale tests to see how the AI
    handles different types of data and scenarios. The goal is to quantify the risks
    discovered during the *Red Team* phase to better understand their impact.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, a company might test how often AI misclassifies or misinterprets
    data in different environments or with diverse user inputs. Metrics are established
    to measure identified risks, and the effectiveness of mitigations is tested to
    ensure they address these risks adequately.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Mitigate**: Once risks are identified and measured, mitigation strategies
    are implemented to address these risks. This might involve tweaking the AI model,
    adding additional safeguards, or updating policies around the AI model’s use.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, if the red team found that the AI model was prone to giving biased
    results, mitigation could involve rebalancing the training data or adjusting how
    the AI makes decisions. The mitigation process ensures that any identified risks
    are managed effectively to reduce the likelihood of harm.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Operate**: The final step is to monitor the AI system once deployed, keeping
    an eye on any emerging issues and incidents. This is where continuous monitoring
    happens, with protocols in place for incident response.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For instance, if the AI model starts behaving unexpectedly in production, this
    step ensures quick identification and resolution of the issue, ensuring that no
    harm comes from the AI model’s use. Continuous monitoring and feedback loops are
    essential to detect anomalies early and ensure that deployed AI systems remain
    secure, accurate, and aligned with their intended purpose.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The process is iterative, meaning that AI systems are continuously improved
    by cycling through these steps. This approach allows for the ongoing identification
    and resolution of potential risks, emphasizing that responsible AI development
    isn’t a one-time process but an ongoing commitment to safety, ethics, and accountability.
    The framework incorporates new learnings and updates to security practices, ensuring
    that AI systems evolve to meet emerging challenges and standards.
  prefs: []
  type: TYPE_NORMAL
- en: By following these principles and processes, organizations can develop and deploy
    AI systems responsibly, ensuring they are safe, fair, and transparent while minimizing
    potential risks to users and society.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s explore how built-in security and safety systems are designed to
    keep everything running smoothly, securely, and responsibly.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding built-in security and safety systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The following figure describes a built-in security and safety system for generative
    AI applications, highlighting the flow from user input (user prompt) to the application’s
    response, integrating multiple layers of security and safety features. This ensures
    the AI application remains secure, compliant, and responsible at every step.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.4 – Built-in security and safety system ](img/B31034_04_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.4 – Built-in security and safety system
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go over the steps briefly:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User prompt**: The process begins when a user submits a request or query
    to an AI system. This input can be a text prompt, an image, or other data formats,
    depending on the application.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data—Microsoft Purview**: Before processing, the input passes through Microsoft
    Purview, a data governance solution that ensures compliance with privacy regulations
    such as the **General Data Protection Regulation** (**GDPR**) and the **Health
    Insurance Portability and Accountability Act** (**HIPAA**). This step helps manage
    sensitive data, enforce access controls, and maintain regulatory compliance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Safety system—Azure AI Content Safety**: The data then passes through a safety
    system. Here, Azure AI Content Safety is responsible for checking the content
    of the user input for harmful or inappropriate content. Azure AI Content Safety
    filters out offensive language or harmful content in a chatbot or social media
    post generated by an AI model. It identifies unsafe or inappropriate language,
    images, or content that could be harmful if generated or used in the AI response.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model—HiddenLayer Model Scanner**: The filtered input is then processed by
    the AI model, which is protected by HiddenLayer Model Scanner. This tool defends
    against adversarial attacks and manipulations that could compromise the AI’s integrity.
    For example, an attacker attempting to manipulate fraud detection AI by feeding
    it misleading inputs is blocked by HiddenLayer’s security measures.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI response generation**: Once the AI model processes the input, it generates
    a response. Before delivering the response to the user, Azure AI Content Safety
    performs a final check to filter any inappropriate or unsafe output.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monitoring—Microsoft Defender**: To maintain security and detect emerging
    threats, Microsoft Defender continuously monitors AI interactions for anomalies,
    unauthorized access, or malicious activities. If any suspicious activity is detected,
    alerts are triggered for immediate intervention. For example, if an AI service
    suddenly experiences unusual user requests attempting to bypass safety checks,
    Microsoft Defender detects and reports the anomaly.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By integrating these security layers—data governance, content moderation, model
    security, and continuous monitoring—organizations can develop AI systems that
    are safe, compliant, and resistant to attacks. This comprehensive approach minimizes
    risks and ensures AI applications function within ethical and legal boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s explore how these mitigation strategies are implemented in real time
    to ensure that AI systems operate securely and responsibly at every step of the
    process.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing mitigating strategies
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To ensure that AI operates securely and responsibly, mitigation strategies
    must be embedded at every stage of the AI life cycle. Azure AI Foundry provides
    a structured approach to risk mitigation through multiple layers of safety mechanisms.
    The following framework outlines how mitigation happens in real time to prevent
    misuse, maintain accuracy, and protect users:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.5 – How mitigations happen in real time](img/B31034_04_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.5 – How mitigations happen in real time
  prefs: []
  type: TYPE_NORMAL
- en: 'This step-by-step breakdown helps you to understand how this mitigation happens
    in real time:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User prompt**: Every interaction starts with a user input, such as a query,
    instruction, or data submission. Before reaching the AI model, multiple safeguards
    ensure that prompts are appropriate and free from malicious intent. For example,
    a user submits a question to an AI chatbot regarding a financial transaction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**System message and grounding data**: The system message layer provides internal
    instructions that shape AI responses, ensuring controlled and reliable outputs.
    Additionally, grounding data (such as company knowledge bases or indexed search
    results) enhances response accuracy. For example, a customer service AI is guided
    by system instructions to always provide polite and accurate answers while grounding
    data ensures that responses align with verified company policies.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Safety system**: Before processing, the Azure AI Content Safety layer scans
    the user prompt for inappropriate or harmful content. This filter ensures that
    harmful, biased, or policy-violating prompts are blocked before reaching the AI
    model. For example, if a user attempts to input offensive language, the content
    safety system flags and prevents the AI from processing the request.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model**: The AI model processes the filtered prompt and generates a response
    based on its training data and applied safeguards. Since the input has been pre-screened,
    the AI operates within defined ethical and security boundaries. For example, a
    legal AI assistant generates a response only based on verified legal documents
    rather than speculative opinions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Filtered response**: Before returning the response to the user, Azure AI
    Content Safety performs another check to filter or modify inappropriate, unsafe,
    or misleading outputs. This ensures that AI-generated content remains responsible
    and compliant with safety standards. For example, if an AI-generated news summary
    contains sensitive or confidential information, the system modifies or removes
    it before displaying the final response.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This multi-layered mitigation strategy ensures that AI-generated content remains
    safe, transparent, and ethical while protecting against security threats, misinformation,
    and inappropriate outputs. By leveraging Azure AI Content Safety, grounding mechanisms,
    and continuous monitoring, organizations can build trustworthy AI systems that
    minimize risks while maximizing benefits.
  prefs: []
  type: TYPE_NORMAL
- en: Building on the earlier discussion of risks and mitigation strategies, we now
    take a closer look at how AI systems—particularly those utilizing Azure AI Content
    Safety—are engineered to monitor, filter, and protect against potentially harmful
    or inappropriate content.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging Azure AI Content Safety
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'As AI systems increasingly generate both text and visual content, ensuring
    that output remains safe, ethical, and compliant becomes essential. This section
    introduces two key components: first, the core capabilities of Azure AI Content
    Safety for detecting and filtering harmful content, and second, how content safety
    evaluation is performed in Azure AI Foundry using quality, risk, and custom metrics.
    Together, these tools provide a comprehensive framework for organizations to manage,
    monitor, and control AI-generated content responsibly.'
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Content Safety overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As AI systems become more integrated into various applications, ensuring the
    safety and appropriateness of generated content is paramount. Azure AI Content
    Safety is a comprehensive service designed to detect and mitigate harmful content
    in both user-generated and AI-generated inputs across text and images.
  prefs: []
  type: TYPE_NORMAL
- en: Key features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Azure AI Content Safety offers a suite of tools and APIs to help developers
    and organizations maintain a safe and compliant environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text and image analysis APIs**: These APIs scan content for categories such
    as sexual content, violence, hate speech, and self-harm, providing multi-severity
    level assessments to determine the appropriate action'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt Shields**: This feature analyzes user input to detect potential prompt
    injection attacks aimed at manipulating **Large Language** **Models** (**LLMs**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Groundedness detection (preview)**: This feature evaluates whether AI-generated
    text responses are grounded in the source materials provided, helping to identify
    hallucinations or unsupported statements'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Protected material detection**: This feature scans AI-generated text for
    known content such as song lyrics, articles, and recipes to prevent unauthorized
    reproduction of copyrighted material'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom categories (preview)**: This feature allows users to define and train
    custom content categories to detect emerging harmful content patterns specific
    to their use cases'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content Safety Studio
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Content Safety Studio is an interactive platform that enables users to do the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Moderate text and image content**: Test and evaluate content against safety
    filters, adjust sensitivity levels, and manage blocklists to suit specific requirements'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitor online activity**: Track moderation API usage, analyze trends, and
    assess performance metrics such as latency, error rates, and category distributions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This tool is particularly useful for industries such as gaming, media, education,
    and e-commerce, where content moderation is crucial.
  prefs: []
  type: TYPE_NORMAL
- en: Security and compliance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Azure AI Content Safety ensures data protection and compliance through the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Integration with Microsoft Entra ID and** **Managed Identities**: Provides
    secure access management to resources'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data encryption**: Supports encryption of data at rest using **Customer-Managed
    Keys** (**CMKs**), offering flexibility in key management and auditing'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This system allows for a high degree of customization, including setting thresholds
    for specific users or individuals, creating user-defined blocklists, and configuring
    real-time threat detection. Additionally, Azure AI Content Safety integrates seamlessly
    with the broader Azure environment, enabling a comprehensive approach to ensuring
    compliance and safety.
  prefs: []
  type: TYPE_NORMAL
- en: Content safety evaluation in Azure AI Foundry
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ensuring the safety and appropriateness of AI-generated content is paramount
    in deploying responsible AI solutions. Azure AI Foundry offers a comprehensive
    suite of tools and features to evaluate and monitor content safety throughout
    the AI application life cycle.
  prefs: []
  type: TYPE_NORMAL
- en: Built-in safety evaluators
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure AI Foundry provides a range of built-in evaluators designed to assess
    various aspects of content safety. These evaluators can be applied during both
    pre-production testing and post-deployment monitoring to ensure AI output aligns
    with ethical standards and organizational policies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key safety evaluators include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Violence**: Detects violent content or incitement'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sexual**: Identifies inappropriate sexual content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-harm**: Detects content promoting or describing self-harm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hate and unfairness**: Identifies biased, discriminatory, or hateful content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ungrounded attributes**: Detects fabricated or hallucinated information inferred
    from user interactions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code vulnerability**: Identifies security issues in generated code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Protected materials**: Detects unauthorized use of copyrighted or protected
    content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content safety**: Provides a comprehensive assessment of various safety concerns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These evaluators can be integrated into your evaluation workflows using the
    Azure AI Evaluation SDK or through the Azure AI Foundry portal.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous evaluation and monitoring
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Azure AI Foundry supports continuous evaluation to monitor AI applications
    in real time. By enabling continuous evaluation, you can do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify and troubleshoot issues early**: Detect potential safety concerns
    promptly'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Optimize performance**: Ensure the AI application maintains high-quality
    outputs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Maintain safety standards**: Continuously assess content against safety evaluators
    to uphold responsible AI practices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Continuous evaluation results are accessible through the **Foundry Observability**
    dashboard, providing insights into quality, safety, and performance metrics.
  prefs: []
  type: TYPE_NORMAL
- en: Integration with Azure Monitor Application Insights
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'For enhanced observability, Azure AI Foundry integrates with Azure Monitor
    Application Insights. This integration allows you to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Collect telemetry data**: Gather detailed information on application performance
    and user interactions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visualize metrics**: Use dashboards to monitor key indicators such as latency,
    error rates, and content safety violations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Set up alerts**: Configure notifications for specific events or thresholds
    related to content safety'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By leveraging Application Insights, you can maintain a comprehensive view of
    your AI application’s health and safety compliance.
  prefs: []
  type: TYPE_NORMAL
- en: Risk and Safety Monitoring dashboard
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Azure AI Foundry offers a dedicated **Risk and Safety Monitoring** dashboard
    for deployments utilizing content filters. This dashboard provides the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Blocked request analytics**: View total blocked requests and block rates
    over time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Category-specific insights**: Analyze blocked content by categories such
    as hate, sexual, self-harm, and violence'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Severity distribution**: Understand the severity levels of detected content
    across different categories'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Potentially abusive user detection**: Identify users whose behavior results
    in frequent content violations, enabling targeted interventions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to this dashboard requires an Azure OpenAI resource in a supported region
    and a model deployment with an applied content filter configuration.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing content safety evaluations
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To implement content safety evaluations in your AI applications, follow these
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Select appropriate evaluators**: Choose from the built-in safety evaluators
    that align with your application’s requirements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Configure evaluation workflows**: Integrate evaluators into your development
    and deployment pipelines using the Azure AI Evaluation SDK or the Azure AI Foundry
    portal.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Enable continuous evaluation**: Set up real-time monitoring to assess content
    safety continuously.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Utilize observability tools**: Leverage Application Insights and the **Risk
    and Safety Monitoring** dashboard for comprehensive insights and proactive management.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now that we’ve explored the fundamentals of content safety and its importance
    in maintaining ethical AI practices, let’s put these concepts into action through
    practical exercises. We’ll dive into content filtering for both text and image
    inputs to see how Azure OpenAI identifies and blocks inappropriate or harmful
    material.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Content filtering via Azure OpenAI'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The goal of this exercise is to explore and understand how Azure OpenAI’s default
    content filters work in identifying and removing potentially harmful prompts and
    completions from interactions with the AI model. These filters are designed to
    help ensure that AI systems are used responsibly, aligning with Microsoft’s responsible
    AI principles. Additionally, there is an option to apply for permission to define
    custom content filters based on specific needs, enabling greater control over
    what is flagged or filtered out in generative AI scenarios. By the end of this
    exercise, you will have hands-on experience with content filtering, a crucial
    element of building responsible AI models. Here are the steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: 'You can access Azure OpenAI services through two primary portals: [https://ai.azure.com](https://ai.azure.com)
    and [https://oai.azure.com](https://oai.azure.com). Both are part of the **Azure
    AI Foundry** ecosystem but serve different purposes. The [https://ai.azure.com](https://ai.azure.com)
    portal, also known as Azure AI Foundry, provides a unified platform for managing,
    deploying, and evaluating a wide range of foundation models—including those from
    OpenAI, as well as other providers like Mistral, Meta, and Cohere. Azure AI Foundry
    also offers advanced tools for content safety, evaluation metrics, data integration,
    and end-to-end deployment management across AI projects. In contrast, [https://oai.azure.com](https://oai.azure.com)
    (Azure OpenAI Studio) is dedicated exclusively to working with OpenAI models such
    as GPT-3, GPT-4, and DALL·E. This portal delivers a focused experience for model
    exploration, prompt engineering, fine-tuning, and rapid prototyping with OpenAI’s
    language and image models. For the hands-on exercises in this chapter, we’ll use
    [https://oai.azure.com](https://oai.azure.com) to specifically focus on interacting
    with OpenAI models.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Provision an Azure OpenAI resource**: Before using Azure OpenAI models, you
    need to create an Azure OpenAI resource in your Azure subscription:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sign in to the Azure portal.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create a new resource by navigating to **Create a resource**, and then search
    for **Azure OpenAI**:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Subscription**: Select a subscription that has been approved for Azure OpenAI
    access.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource Group**: Choose an existing group or create a new one.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Region**: Pick any region from the following: East US, East US 2, North Central
    US, South Central US, Sweden Central, West US, and West US3\. Please refer to
    the model availability site at [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models#standard-deployment-model-availability](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models#standard-deployment-model-availability).'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Name**: Choose a unique name.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pricing Tier**: Select **Standard S0**.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the resource is deployed, proceed to the resource page and note down the
    **Keys** and **Endpoint** values.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Deploy a model in Azure OpenAI Studio**: Now, deploy a model to begin generating
    natural language content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Overview** page of your OpenAI resource, click on **Explore** or directly
    go to Azure OpenAI Studio ([https://oai.azure.com/](https://oai.azure.com/)).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Navigate to the **Shared Resources** section in the left-hand menu, then select
    **Deployments** to create a new model deployment (**Deploy** **base model**):'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model**: Select **gpt-4o**.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment Name**: Enter a unique name.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment type**: **Global Standard**.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Note**: You can customize the model version, token-per-minute rate limit,
    and content filtering settings. However, for this exercise, we’ll proceed with
    the default configuration.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This will deploy the GPT-4o model, optimized for natural language tasks.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate natural language output**: Next, interact with the model in a conversational
    scenario:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In OpenAI Studio, navigate to **Chat**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter the following prompt without modifying the default system message:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Save the changes and enter the same prompt again. The content filter should
    prevent the AI from generating inappropriate responses.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.6 – Harmful prompt example in Playground](img/B31034_04_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.6 – Harmful prompt example in Playground
  prefs: []
  type: TYPE_NORMAL
- en: '`CustomContentFilter`).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Connection**: Select an existing Azure OpenAI resource from the drop-down
    menu.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the next two steps, you’ll define what types of input and output content
    should be allowed, annotated, or blocked before reaching your AI model. For each
    category listed (e.g., **Violence**, **Hate**, **Sexual**, **Self-harm**), do
    the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Set Action**: From the dropdown, select **Annotate and block** or another
    appropriate option.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adjust Blocking Threshold**: Use the slider under **Blocking threshold level**
    to control how aggressively content should be filtered, as shown in *Figure 4.7*:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Block some** = Moderate filtering (the default in the screenshot)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Block most** = Higher sensitivity'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Block all** = Maximum filtering'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt shields for jailbreak attacks**: It is recommended to set this to
    **Annotate and block** to safeguard your model from malicious prompt manipulation.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt shields for indirect attacks**: Configure if desired.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](img/B31034_04_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.7 – Creating a customized content filter
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you have created a customized content filter, you can apply it to specific
    model deployments under the **Connection** step, as shown in the screenshot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **Connection** field displays the name of the Azure OpenAI resource (in
    this case, **common-open-ai**) that hosts your model deployments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Under **Deployments**, you’ll see a list of available deployments, each showing
    **Name**, **Model name**, **Model version**, and the currently applied content
    filter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, the deployment named **chat** is using the **Microsoft.Default**
    content filter, which is the out-of-the-box default provided by Microsoft.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **gpt-4-tutbo** deployment will be configured with a custom filter named
    **CustomContentFilter**, indicating that this deployment uses a user-defined filtering
    policy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 4.8 – Assigning a customized content filter to model deployments](img/B31034_04_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.8 – Assigning a customized content filter to model deployments
  prefs: []
  type: TYPE_NORMAL
- en: Customized content filters in Azure AI Foundry allow you to tailor safety controls
    to the specific needs of your AI application. These filters are tightly integrated
    with Azure OpenAI models (including DALL·E) and let you configure how input prompts
    and output completions are screened for harmful content. You can adjust strictness
    levels, enable advanced options such as Prompt Shields and protected material
    detection, and fine-tune filtering by category—such as violence, hate, sexual,
    and self-harm—for each model deployment.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, **Azure AI Content Safety** is a standalone, cloud-based moderation
    service designed to detect and mitigate harmful content—both user-generated and
    AI-generated—across any Azure AI application, not just OpenAI models. It offers
    separate REST APIs for text, image, and multimodal content analysis, identifying
    material in the categories of violence, hate, sexual content, and self-harm with
    a multi-severity scoring. The accompanying Content Safety Studio provides a no-code
    interface to test configurations, adjust blocklists, tune sensitivity, monitor
    moderation trends, and export production-ready code. While it enforces a universal
    safety policy with built-in classifiers and optional blocklists, it does not support
    per-deployment customization in Azure OpenAI’s guardrails—but you can extend its
    capabilities with blocklists, Prompt Shields, groundedness detection, protected-material
    detection, and even custom categories (in preview).
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s set up Azure AI Content Safety to explore its capabilities and see
    how it complements in-model filtering.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2: Create an Azure AI Content Safety resource'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'You will need to create a Content Safety resource in the Azure portal to enable
    content filtering capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: Sign in to the Azure portal.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create a new resource by navigating to **Create a resource**, and then search
    for **Content safety**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Subscription**: Select a subscription that has been approved for Azure OpenAI
    access.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource Group**: Choose an existing group or create a new one.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Region**: Pick any region.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Name**: Choose a unique name.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pricing Tier**: Select **Standard S0**.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the resource is deployed, go to Azure AI Foundry at [https://ai.azure.com/explore/contentsafety](https://ai.azure.com/explore/contentsafety),
    then select **Moderate text content** from the menu list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select your content safety filter from the **Azure AI Services** drop-down
    menu. Next, copy the following text containing an improper conversation between
    the agent and customer into the textbox and click **Run test** to evaluate how
    the filter responds:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'As shown in the following figure, the content has been successfully blocked
    by the filters:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 4.9 – Content filters blocked example](img/B31034_04_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.9 – Content filters blocked example
  prefs: []
  type: TYPE_NORMAL
- en: You can modify the filters to be more restrictive if needed. However, if you
    want to allow less restrictive filtering (such as permitting medium- or high-severity
    content), additional configuration may be required.
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: If you encounter the error message **Your account does not have access to this
    resource, please contact your resource owner to get access**, ensure that your
    account is assigned the **Cognitive Services User** role for the **Content Safety**
    resource or the **Azure AI Services** resource you’re attempting to use, even
    if you are a subscription owner. You can find more details by visiting [https://learn.microsoft.com/en-us/azure/ai-services/content-safety/concepts/response-codes#azure-ai-studio-error-messages](https://learn.microsoft.com/en-us/azure/ai-services/content-safety/concepts/response-codes#azure-ai-studio-error-messages).
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 3: Image content via AI Foundry'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this exercise, you will explore how Azure AI Content Safety moderates image-based
    content by detecting and filtering harmful or inappropriate visuals before they
    reach users:'
  prefs: []
  type: TYPE_NORMAL
- en: Follow *steps 1* and *2* from the previous exercise, but at *step 3*, select
    **Moderate image content** under the **Filter image content** section from the
    available options in the menu list instead.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Run test** on the provided image, which contains self-harm content,
    and review the results displayed in the following screenshot to observe how the
    system identifies and filters the harmful material:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.10 – Moderate image content example](img/B31034_04_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.10 – Moderate image content example
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: The image is intentionally blurred to prevent distress related to self-harm
    content. This is a sample image provided by Azure AI Foundry.
  prefs: []
  type: TYPE_NORMAL
- en: By completing these exercises, you have gained hands-on experience with Azure
    OpenAI and Azure AI Content Safety, learning how to configure and apply content
    filtering for both text and image inputs. These exercises demonstrated default
    and customized filtering mechanisms, equipping you with the knowledge to detect,
    block, and mitigate harmful content in AI-generated interactions. This practical
    understanding will help you implement responsible AI solutions that prioritize
    user safety and compliance.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the foundational principles of responsible AI,
    emphasizing the need for fairness, reliability, privacy, inclusiveness, transparency,
    and accountability in AI systems. We also examined the risks associated with generative
    AI, such as misinformation, security vulnerabilities, and content manipulation,
    and discussed strategies to mitigate these challenges through responsible innovation
    and continuous monitoring.
  prefs: []
  type: TYPE_NORMAL
- en: We then introduced Azure AI Content Safety, a robust system for filtering and
    moderating AI-generated content. Through hands-on exercises, you learned how to
    configure content filters for text and images, detect security threats, and enforce
    safety measures within AI applications. By leveraging these tools, organizations
    can ensure trustworthy, secure, and ethical AI deployments that comply with industry
    regulations and best practices.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will dive into **computer vision solutions**, exploring
    how AI can analyze visual data, detect objects, and interpret images, along with
    hands-on exercises to apply these concepts in real-world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Review questions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Answer the following questions to test your knowledge of this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Which of the following principles ensures that AI systems treat all individuals
    and groups without bias or discrimination?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reliability and safety
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Fairness
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Privacy and security
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Transparency
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
