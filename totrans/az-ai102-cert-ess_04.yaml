  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensuring transparency of AI systems
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Protecting personal information and preventing unauthorized access
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Including human oversight in decision-making
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
