  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Harmful content and code
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Ungrounded outputs and errors
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Copyright infringement
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: C'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which step in the Responsible Innovation Framework involves ethical hacking
    to identify risks in AI systems?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Red Team
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Measure
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Mitigate
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Operate
