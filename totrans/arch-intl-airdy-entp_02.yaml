- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What Sets GenAI, RAG, and Agentic AI Apart
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Organizations today face a critical challenge: separating real AI capabilities
    from marketing hype, while aligning future strategies in a rapidly changing environment.
    With newly minted AI terms flooding every proposal, pitch, and product demo, even
    experienced technologists find themselves navigating conversations where the fundamental
    differences between technologies remain unclear. At best, these differences are
    unclear; more often, they are incomprehensible. Whether you’re evaluating solutions,
    architecting systems, or advising on strategic investments, this isn’t just about
    understanding buzzwords; it’s about making informed decisions that define your
    organization’s competitive advantage.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Three concepts have emerged as the cornerstone technologies defining modern
    AI applications: **generative AI** (**GenAI**), which enables systems to create
    new content from learned patterns; **retrieval-augmented generation** (**RAG**),
    which connects AI models to external knowledge sources for improved accuracy;
    and agentic AI, which powers autonomous systems that can plan, reason, and execute
    complex workflows with minimal human intervention. Understanding how these technologies
    interconnect and build upon one another is essential for making strategic decisions
    about AI implementation. Even these widely accepted terms have a myriad of interpretations,
    and while we do not claim to present the single truth, we aim to provide you with
    a solid fundamental baseline.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter serves as your entry point into the world of GenAI. If you already
    possess extensive experience with AI architectures and clearly understand the
    distinction among these technologies, you may choose to advance to subsequent
    chapters. But for those seeking to build solid foundational knowledge, this chapter
    will provide the essential groundwork for everything that follows.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the end of this chapter, you will have a clear understanding of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: An exploration of the historical evolution of AI and how GenAI emerged from
    earlier approaches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The fundamental role of **large language models** (**LLMs**) and how they process
    and generate information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How embedding models transform data into vectors, the foundation for AI reasoning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The critical role of vector databases in storing, managing, and enabling efficient
    similarity searches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The distinction between semantic search, RAG, and hybrid search approaches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What makes agentic AI different from previous AI systems, and how it enables
    autonomous decision making
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The core components of AI agents, including memory, orchestration, tools, models,
    and data services
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How these components work together in practical applications to solve real business
    problems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'How AI evolved: From theory to ChatGPT'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To understand today’s AI landscape, we need to trace the technological journey
    that brought us here. This evolution spans decades of research breakthroughs,
    from symbolic logic and expert systems to the transformer architectures powering
    today’s LLMs. By examining this progression, we can better appreciate how current
    capabilities emerged and why architectural decisions continue to shape today’s
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: When we talk about *models* in GenAI, we are referring to a mathematical system
    trained to recognize and replicate patterns found in data. We use the word *model*
    because, like a model of a building or a climate system, it’s a simplified, structured
    version of something complex; in this case, language, images, or behavior. A GenAI
    model is trained on large datasets to learn how elements (such as words or pixels)
    typically relate to each other. Once trained, it can generate new, realistic-like
    content based on that learned structure. It doesn’t store exact answers; it models
    how things work, then uses that understanding to create new outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll trace that evolution across three major inflection points: the early
    foundations of AI, the breakthrough emergence of LLMs, and how these developments
    culminated in the GenAI systems we know today.'
  prefs: []
  type: TYPE_NORMAL
- en: A small walk into history
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI has arguably become the most talked-about technology in the IT community
    since the advent of the mouse through Xerox PARC. It’s fascinating how widespread
    the belief is that *AI was magically invented overnight, emerging fully formed
    when OpenAI released ChatGPT to the public*. But today’s capabilities did not
    appear overnight. To understand them, we need to trace the evolution of today’s
    *GenAI* in the context of time.
  prefs: []
  type: TYPE_NORMAL
- en: 'The term **artificial intelligence** was coined in 1955 by John McCarthy and
    colleagues, and first used at the Dartmouth Workshop in 1956, a pioneering event
    that brought together leading scientists to define and advance the field[1]. According
    to the Oxford dictionary, AI is:'
  prefs: []
  type: TYPE_NORMAL
- en: The theory and development of computer systems able to perform tasks normally
    requiring human intelligence, such as visual perception, speech recognition, decision
    making, and translation between languages [2].
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'From that starting point, several different approaches emerged, each shaped
    by the computing capabilities and research priorities of their time. Among them:
    symbolic logic systems, fuzzy logic (1980s), early neural networks (1990s), and
    eventually machine learning, which became increasingly practical and widespread
    in the early 2000s.'
  prefs: []
  type: TYPE_NORMAL
- en: As experimentation accelerated, two key technological advances converged to
    enable large-scale AI development. First, parallel compute power was established
    through early support of graphics cards (GPUs) via software interfaces such as
    **CUDA** (released in 2007), which allowed programmers to harness the massive
    parallel processing power of graphics cards for general computing tasks. Second,
    frameworks such as **Apache Spark** (open-sourced in 2010) helped overcome a core
    limitation of earlier distributed computing platforms such as **Hadoop MapReduce**.
  prefs: []
  type: TYPE_NORMAL
- en: Hadoop MapReduce was an early system for splitting large computing jobs across
    multiple computers, but it was slow for machine learning because it had to repeatedly
    read and write data to disk. Spark revolutionized this by keeping data in computer
    memory between processing steps, making iterative algorithms essential for machine
    learning run orders of magnitude faster. Together, these advances meant researchers
    could finally process and analyze massive datasets efficiently, a breakthrough
    that became crucial for training the large-scale AI models we see today.
  prefs: []
  type: TYPE_NORMAL
- en: AlphaGo and the turning point in AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In March 2016, another milestone unfolded. On a Go board in Seoul, South Korea,
    **AlphaGo**, an AI system developed by DeepMind, faced off against Lee Sedol,
    one of the most accomplished Go players in history. What followed was a stunning
    4–1 victory for the machine, and a turning point in the story of modern AI.
  prefs: []
  type: TYPE_NORMAL
- en: Why was this such a big deal? Go, unlike chess, had long resisted computer mastery.
    Its search space is vast, with more possible board states than atoms in the universe.
    It demands intuition, pattern recognition, and strategic depth. For decades, AI
    researchers believed Go was beyond the reach of brute-force computation, requiring
    a form of reasoning once thought uniquely human.
  prefs: []
  type: TYPE_NORMAL
- en: AlphaGo shattered that belief. Combining deep neural networks with **reinforcement
    learning** andMonte Carlo tree search, it marked a radical shift in approach.
    Rather than relying solely on predefined rules or exhaustive search, AlphaGo learned.
    First, from human expert games, and then by playing millions of games against
    itself. It was one of the first public demonstrations of deep reinforcement learning
    at scale, showing the power of systems that could improve through experience rather
    than being programmed line by line.
  prefs: []
  type: TYPE_NORMAL
- en: The emergence of LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If AlphaGo marked a turning point in decision-making AI, **transformers** redefined
    how machines understand language.
  prefs: []
  type: TYPE_NORMAL
- en: Starting from a 2006 proposal, IBM developed *Watson*, a deep question-answering
    system that won *Jeopardy!* in 2011, a significant breakthrough for **natural
    language processing** (**NLP**) on unstructured data[3]. Watson combined knowledge
    bases, ML, and sophisticated question-answering systems, marking an important
    milestone in AI’s ability to understand and process human language.
  prefs: []
  type: TYPE_NORMAL
- en: But today’s LLMs followed a different evolutionary path. In 2017, Google researchers
    published *Attention Is All You Need*, introducing the **transformer** architecture,
    critical for building modern language models[4]. The key innovation of transformers
    was the self-attention mechanism, allowing models to process entire sequences
    simultaneously and capture long-range dependencies in text more effectively than
    previous sequential approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Transformers became the foundation for modern LLMs, which truly entered the
    mainstream with models such as GPT-3 in 2020 and ChatGPT in 2022, ushering in
    the **GenAI era**.
  prefs: []
  type: TYPE_NORMAL
- en: '**The turning point**'
  prefs: []
  type: TYPE_NORMAL
- en: 'While Watson showcased engineered systems and curated knowledge bases to win,
    transformer-based LLMs took a radically different route. Instead of being programmed
    with what to say, they learned to *predict* it, spotting patterns across massive
    datasets and generating fluent, often human-like responses. Between those milestones,
    AlphaGo’s victory revealed something new: that AI could not only answer but adapt,
    learn, and surprise. That shift helped pave the way for today’s generative and
    agentic systems.'
  prefs: []
  type: TYPE_NORMAL
- en: This recent history underscores that today’s GenAI systems aren’t the product
    of a single breakthrough, but the result of decades of incremental innovation,
    infrastructure evolution, and compounding research progress. While the broader
    history of AI includes both progress and periods of reduced funding known as *AI
    winters*, the trajectory leading directly to GenAI has accelerated sharply in
    recent years. Modern data platforms have been crucial in this recent evolution,
    providing the infrastructure needed to store, process, and analyze the massive
    datasets required to train today’s most powerful models.
  prefs: []
  type: TYPE_NORMAL
- en: The development of LLMs continues to evolve rapidly. While early leaders such
    as OpenAI (ChatGPT) and Anthropic dominate the market in 2025, new approaches
    are emerging. Companies such as DeepSeek are exploring divide-and-conquer methodologies
    to reduce LLM complexity and costs, while others such as Zhipu are developing
    router-based architectures with specialized *experts*. Despite these varied approaches,
    the core concept of LLMs serving as knowledge bases and reasoning engines will
    likely remain central to AI systems in the foreseeable future.
  prefs: []
  type: TYPE_NORMAL
- en: 'GenAI: Creating new content from patterns'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'LLMs form the foundation of any GenAI solution. While often perceived as the
    sole requirement for implementing GenAI capabilities, today’s LLMs, despite achieving
    substantial reasoning abilities, still depend critically on an external resource
    to provide useful context: **data**.'
  prefs: []
  type: TYPE_NORMAL
- en: The terms **prompting** and **prompt engineering** are frequently used in the
    same breath as LLMs and GenAI. Prompting refers to crafting queries for an LLM,
    while prompt engineering involves systematically optimizing these queries for
    better results. Early LLM interactions heavily emphasized standalone prompt engineering
    and led to the overnight phenomenon of millions of prompt engineers on LinkedIn.
  prefs: []
  type: TYPE_NORMAL
- en: However, the emergence of advanced architectural patterns such as RAG, which
    combines LLMs with external knowledge retrieval systems, has shifted the focus
    toward more comprehensive solutions that embed LLMs within broader systems rather
    than treating them as isolated tools. (We’ll explore RAG in detail later in this
    chapter.) Effective prompting now involves crafting queries that optimally leverage
    rich contextual data provided by these patterns, making the quality of context
    as crucial as the prompt itself.
  prefs: []
  type: TYPE_NORMAL
- en: More advanced prompting techniques, such as **Chain-of-Thought** (**CoT**) prompting,
    give us a way to help AI think step by step, similar to showing your work in math
    class, which further improves the quality of the responses. By asking it to `"think
    step by step"`, you make it more likely to reason correctly, especially for harder
    problems in math, logic, or multi-part tasks. This approach is particularly effective
    when dealing with complex scenarios that benefit from systematic breakdown; for
    instance, when processing large documents such as insurance claims, you might
    prompt the LLM first to identify key components, then analyze each section methodically,
    and finally synthesize the findings.
  prefs: []
  type: TYPE_NORMAL
- en: As with any data system, the old phrase *garbage in*, *garbage out* applies.
    In the case of LLMs, poor input quality can result in **hallucinations**, responses
    that often generate incorrect answers that initially appear to be reasonable output
    but, upon inspection, turn out to be complete fabrications by the LLM. Approaches
    to mitigate these issues have evolved beyond simple prompt tuning to include better
    context framing, improved data validation, and sophisticated filtering mechanisms
    to prevent information drift and ensure output reliability.
  prefs: []
  type: TYPE_NORMAL
- en: How GenAI works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GenAI refers to AI systems that can create new content, such as text, images,
    code, or other media, based on patterns learned from existing data. Unlike traditional
    AI systems that follow explicit rules, GenAI learns patterns and relationships
    from vast datasets and then uses this understanding to generate new, original
    content that resembles the training data. Understanding the foundational nature
    of LLMs can help organizations assess their resource implications and effectively
    leverage these technologies.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, the reality is that LLMs are black boxes and non-deterministic, meaning
    that the same input doesn’t always produce the same output. There is some truth
    in the idea that we still don’t fully understand the internal workings of LLMs.
    While a lot of research is being done on this, a clear and accurate understanding
    of what actually happens inside an LLM is tantalisingly out of reach. Anthropic,
    one of the leaders in the field of AI safety, wrote a paper on this, concluding
    that:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the representations the model uses doesn’t tell us how it uses
    them; even though we have the features, we still need to find the circuits they
    are involved in. And we need to show that the safety-relevant features we have
    begun to find can actually be used to improve safety. There’s much more to be
    done.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Recognizing both the capabilities and limitations of LLMs, such as their limited
    context windows and potential for hallucinations, becomes crucial for setting
    realistic expectations and planning for necessary safeguards and augmentation
    strategies. Furthermore, decisions around using pre-trained models versus fine-tuning
    or building custom models directly impact budget, timelines, and infrastructure
    choices, knowledge that proves invaluable for vendor negotiations and platform
    selection.
  prefs: []
  type: TYPE_NORMAL
- en: The GenAI process follows key sequential steps, as illustrated in *Figure 2.1*.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a diagram of a light bulb and a light bulb  AI-generated content
    may be incorrect.](img/B34136_02_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: GenAI process flow'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram depicts a process flow that involves five key stages. Firstly, a
    giant training dataset is assembled, typically many petabytes in size. This is
    then used to train the LLM. During training, and with subsequent use, the model
    begins to recognize patterns and build connections between disparate pieces of
    data. The model is then prompted by an end user, and output is generated. Often,
    these prompts and outputs will be monitored internally and fed back into the model
    for constant refinement and quality improvement.
  prefs: []
  type: TYPE_NORMAL
- en: 'This sequential process demonstrates a fundamental principle: GenAI’s ability
    to create novel content stems directly from its comprehensive understanding of
    existing patterns. The more diverse and high-quality the training data, the more
    sophisticated and accurate the generated outputs become. This understanding is
    crucial for organizations planning GenAI implementations, as it highlights the
    critical importance of data quality and the iterative nature of achieving optimal results.'
  prefs: []
  type: TYPE_NORMAL
- en: Limitations and challenges of GenAI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While GenAI has made remarkable progress, it faces several significant limitations
    that organizations must consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training data limitations**: LLMs are fundamentally constrained by their
    training data. If the data is outdated, biased, or lacks diversity, the model’s
    outputs will reflect these flaws, potentially generating irrelevant information
    or perpetuating harmful stereotypes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hallucinations and factual inaccuracy**: Models can confidently generate
    plausible-sounding but factually incorrect or nonsensical information, a phenomenon
    known as *hallucination*. This makes them unreliable for applications requiring
    high levels of factual accuracy without proper safeguards such as RAG.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lack of explainability**: The complex, *black-box* nature of many LLMs makes
    it difficult to understand their internal reasoning. This lack of transparency,
    often called the challenge of explainability or interpretability, can be a significant
    barrier in regulated industries or critical applications where understanding the
    *why* behind a decision is essential.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context and reasoning limitations**: Models can struggle with nuanced understanding,
    commonsense reasoning, and maintaining context over long interactions. They may
    misinterpret ambiguous queries or fail to grasp complex, multi-step instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ethical and societal risks**: The widespread use of GenAI introduces significant
    ethical challenges, including the potential for generating misinformation and
    deepfakes, perpetuating biases, infringing copyright, and creating new avenues
    for malicious use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modern data platforms help address some of these challenges by providing flexible,
    scalable infrastructure for storing and processing the diverse data types needed
    for AI training and operation. Document-based data models are particularly well-suited
    for AI applications, as they can adapt to changing requirements and store heterogeneous
    data types in their natural form, a foundational step in building more reliable
    and grounded AI systems. Furthermore, accessing a broad range of data sources,
    rather than being limited to legacy siloed systems, often requires concepts such
    as dynamic systems of action, which we’ll discuss in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: From data to vectors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Building on the introduced flexible data storage capabilities, the next step
    in enabling AI reasoning requires transforming data into a format that computers
    can process and manipulate mathematically. This is where the concept of vectors
    comes in; they serve as the universal language that enables GenAI to work with
    any type of structured or unstructured data. Think of vectors as coordinates on
    a map, but instead of just showing location with latitude and longitude, they
    can represent the *meaning* of any piece of data in hundreds or thousands of dimensions.
    A vector might capture what makes a product description appealing, why certain
    customer reviews are similar, or how different documents relate to each other.
    While the representation of text in three dimensions is still easy to grasp, the
    representation of movie segments in hundreds of dimensions defies any visualization,
    and we leave the concept as a mental exercise. A use case for movie segments could
    be digital rights management and identification of identical versus derived movies,
    so this is not something unusual.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the key insight: similar things end up close together in vector space.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Vector space visualization – similar concepts cluster together'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.2* illustrates this concept in action. Each colored dot represents
    a different piece of data that has been converted into vector form. Notice how
    related concepts naturally group together, sports-related terms cluster in one
    area, beverages form their own region, and specific activities such as basketball
    and football sit close to their broader sports category. This isn’t a coincidence;
    it’s the mathematical representation of meaning that makes AI systems so powerful.'
  prefs: []
  type: TYPE_NORMAL
- en: But what does this look like in action in business applications? When a customer
    asks about `"payment issues"`, the AI system can instantly locate not just documents
    containing those exact words, but also related content about `"billing problems"`,
    `"account charges"`, and `"subscription fees"`, because they all exist in the
    same neighborhood of vector space.
  prefs: []
  type: TYPE_NORMAL
- en: The embedding models and “embedders”
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: But now you might ask, “*How do I transform my data into vectors*?” Data gets
    represented as vectors through specialized algorithms called embedding models.
    These models, often incorporating machine learning or mathematical functions,
    can transform a wide variety of data types into numerical representations in the
    form of vectors that enable AI systems to understand relationships and find similarities
    across multiple dimensions. Text, pictures, video, and voice are the most common
    applications, but embedding models can represent virtually any data type and even
    complex combinations of data that capture specific states or contexts.
  prefs: []
  type: TYPE_NORMAL
- en: The tools that perform this data transformation, commonly called *embedders*,
    are where the real mathematics happens. Not every dataset is identical, and clearly,
    a video has different embedding requirements than simple text. The embedder is
    the engine for vector generation and often becomes the most sought-after piece
    of the overall system design. It is not unheard of that clients do A/B testing
    (comparing two different approaches to see which performs better) of different
    embedders to identify the one that fits best for their specific needs (every embedder
    has its own mathematical undercarriage, and something that works well for German
    insurance documents may not be great for healthcare documents in Malaysia).
  prefs: []
  type: TYPE_NORMAL
- en: Depending on whether teams come from the application development side or the
    data science side, embedders are viewed quite differently. Application developers
    often see them as basic tools to serialize data into a usable format, while data
    scientists and AI specialists recognize them as critical components that can determine
    the success or failure of an entire AI solution. The choice of embedding model
    can dramatically impact search relevance, semantic understanding, and overall
    system performance.
  prefs: []
  type: TYPE_NORMAL
- en: A good example of high-performance embedding models is Voyage AI’s suite of
    embedding models, which are specifically optimized for retrieval tasks and offer
    state-of-the-art performance across different domains and data types. These models
    demonstrate how specialized embedders can significantly improve the quality of
    vector representations and, consequently, the effectiveness of AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: How embedding models convert diverse unstructured data types into
    vector representations'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.3* demonstrates how embedding models, such as Voyage AI, convert
    unstructured data into vector representations for AI processing. The visualization
    shows the transformation process through several key stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Input data**: Various unstructured data types (text documents, images, audio,
    and video) serve as the starting point for the embedding process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Optional data processing**: Depending on the size and complexity of the input
    data, some content may require preprocessing to ensure it fits within the embedding
    model’s capacity limits. This optional step, called **chunking**, is most commonly
    needed for large text documents that exceed model limitations, though it can apply
    to other data types as well. We’ll explore chunking strategies and best practices
    in detail later in this chapter.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Embedding transformation**: The embedding model (such as Voyage AI) converts
    all data, whether processed or direct, into numerical vector representations that
    capture the semantic meaning and relationships within the original content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vector output**: The result is a collection of numerical vectors that enable
    AI systems to mathematically understand and compare the meaning of different pieces
    of content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The diagram illustrates that while some data follows a direct path to the embedding
    model, other content may require intermediate processing based on size or complexity
    constraints. All paths ultimately lead to the same outcome: vector representations
    that enable efficient search, retrieval, and AI reasoning across diverse data
    types.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Learn more about Voyage AI’s embedding models here: [https://www.voyageai.com](https://www.voyageai.com
    )'
  prefs: []
  type: TYPE_NORMAL
- en: Vector databases and their importance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once embedding models have transformed your data into vectors, you need a system
    to store, manage, and efficiently search through these vector representations,
    either through dedicated vector databases or databases with built-in vector search
    functionality. The built-in approach offers the advantage of keeping your original
    data and its vector representations in a single place, eliminating the need for
    complex joins across multiple databases.
  prefs: []
  type: TYPE_NORMAL
- en: 'The storage of vectors themselves can be achieved in a simple JSON format,
    aligned with the actual source dataset. This approach has significant advantages:
    multiple vectors can be stored alongside the data, and datasets can have different
    vectors attached for various purposes, such as customer sentiment, purchase behavior,
    or next-best-offer recommendations, covering a range of typical retail use cases.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The second part of the work involves fast search capabilities. Once you have
    millions of vectors stored, you need a way to quickly find the most similar ones
    when you run a query. This search functionality is really the core of what *vector
    databases* provide. Here’s where it gets interesting: traditional databases store
    and retrieve exact data (such as customer names or order amounts). But vector
    databases are primarily about similarity search, finding vectors that are *close*
    to your query vector (as shown previously). In that sense, they’re more like sophisticated
    search engines than traditional databases. Naturally, the vendors of *pure vector
    databases* may violently disagree with this position, so we keep the term vector
    database in this context as an industry standard term.'
  prefs: []
  type: TYPE_NORMAL
- en: Vector databases store organizational information, which AI systems can query
    and use as additional context. The more data you can store and the more precisely
    you can represent it, the broader your information space becomes for addressing
    specific business problems. It’s important to recognize that both models and vectors
    may need frequent updates based on new research, evolving requirements, or simply
    discovering that the chosen embedding model isn’t optimal for the task.
  prefs: []
  type: TYPE_NORMAL
- en: 'These specialized systems are critical components in modern AI applications
    for several key reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Efficient similarity search**: At their core, vector databases excel at performing
    rapid similarity searches, often using **Approximate Nearest Neighbor** (**ANN**)
    algorithms, sometimes enhanced with techniques such as K-means clustering, to
    find the most similar vectors from billions of entries. This capability is fundamental
    for applications such as semantic search, recommendation engines, and anomaly
    detection.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability**: They are built to handle the massive datasets required by
    today’s AI, providing the infrastructure to manage and query billions of vectors
    without compromising performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multimodal support**: These databases can store vector representations of
    various data types, including text, images, audio, and time series data in a unified
    system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration capabilities**: Vector databases are designed to connect seamlessly
    with various AI frameworks and tools, facilitating their integration into broader
    AI and MLOps workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To achieve these capabilities, vector databases employ several advanced technologies.
    A key innovation is the use of advanced indexing algorithms to accelerate similarity
    searches. One of the most prominent and widely adopted implementations is the
    **Hierarchical Navigable Small World** (**HNSW**) algorithm[5]. HNSW constructs
    a hierarchical graph structure that allows for efficient traversal and searching,
    significantly speeding up query times compared to brute-force methods. This algorithm
    is not only highly performant but also adaptable, making it a popular choice for
    databases such as MongoDB and Pinecone.
  prefs: []
  type: TYPE_NORMAL
- en: Another relatively new capability in leading vector databases is vector quantization.
    Quantization is the process of shrinking full-fidelity vectors into fewer bits.
    It reduces the amount of main memory required to store each vector in a vector
    search index by indexing the reduced representation vectors instead. This allows
    for the storage of more vectors or vectors with higher dimensions. Therefore,
    quantization reduces resource consumption and improves speed.
  prefs: []
  type: TYPE_NORMAL
- en: For enterprise deployments, additional considerations become critical. In regulated
    industries, both embedding models and their generated vectors may need to be preserved
    for significant periods. Organizations often require multiple vector embeddings
    for the same document to represent different aspects or modalities. For instance,
    a wildlife database might store both `description_embedding` (vector representation
    of the textual description) and an `image_embedding` (vector representation of
    the animal’s photograph), or use different embedding models optimized for various
    search tasks. Additionally, implementing **time-to-live** (**TTL**) index technology
    that acts as an expiry timer and archives historical data becomes critical for
    maintaining compliance while managing storage costs. TTL functionality allows
    organizations to retain vector embeddings and associated documents for required
    regulatory periods (such as 7 years for financial records) while automatically
    purging outdated data to prevent storage costs from growing indefinitely.
  prefs: []
  type: TYPE_NORMAL
- en: Document-based databases such as MongoDB with integrated vector search capabilities
    offer additional advantages. By storing the original data alongside its vector
    representation within a single document, they can often entirely eliminate the
    need for complex joins between different databases (e.g., a relational database
    for metadata and a dedicated vector store). This unified approach simplifies the
    overall architecture, reduces data duplication, and can lead to significant performance
    improvements for AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: These technical capabilities combine to make vector databases essential infrastructure
    for modern AI applications. However, before we can effectively leverage these
    systems, we need to understand how to optimally prepare our data through strategic
    chunking approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Chunking strategies for AI applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Earlier, we introduced chunking as an optional preprocessing step for data that
    exceeds embedding model capacity limits. Now that you understand how vectors work
    and where they’re stored, let’s explore how to implement chunking strategically
    to maximize the effectiveness of your AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: Chunking is more than just splitting large documents into smaller pieces; it’s
    about finding the optimal balance between preserving context and staying within
    technical constraints. Poor chunking can break logical connections, leading to
    irrelevant search results and degraded AI performance. Effective chunking, however,
    ensures that each piece contains meaningful, self-contained information that AI
    systems can reason about accurately.
  prefs: []
  type: TYPE_NORMAL
- en: 'Every chunking strategy involves three key decisions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Splitting technique**: Where to place chunk boundaries based on paragraph
    breaks, sentence boundaries, semantic content, or programming language-specific
    separators'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chunk size**: The maximum number of characters or tokens allowed per chunk,
    typically constrained by your embedding model’s limits'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chunk overlap**: Overlapping content between adjacent chunks to preserve
    context across boundaries, usually specified as a percentage of chunk size'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s explore how to use chunking strategically to enhance your AI applications:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fixed-size chunking** splits documents into chunks with a predetermined number
    of tokens. While simple to implement, this approach can break sentences or concepts
    mid-way, potentially losing important context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fixed-size with overlap** adds overlapping content between chunks to preserve
    contextual continuity. For example, with 20% overlap, each chunk shares some content
    with its neighbors, helping maintain narrative flow and reducing information loss
    at boundaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recursive chunking** attempts to split text at natural boundaries such as
    paragraphs, then sentences, then words, keeping related content together as much
    as possible while respecting size limits.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Semantic chunking** groups content based on meaning rather than size, using
    embedding similarity to identify where topics change and creating chunks around
    these semantic boundaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The optimal chunking strategy depends on your content type and use case and
    may evolve throughout the implementation process. Technical documentation with
    a clear hierarchical structure benefits from recursive chunking that respects
    headings and sections. Conversational content or narratives often work better
    with semantic chunking that preserves conceptual flow. As with choosing embedding
    models, we recommend testing different chunking strategies on a representative
    sample of your data and evaluating their impact on retrieval quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'When designing your chunking approach, keep in mind key practical factors that
    impact performance, cost, and accuracy. Start with your embedding model’s token
    limits as a hard constraint, typically around 8,000 tokens for most models. Tokens
    are the basic units that AI models use to process text; think of them as individual
    words or parts of words that the model reads and understands. Since AI services
    typically charge based on token usage, tokens essentially become the currency
    of AI operations, comparable to coins in many online games, where you pay for
    each action or feature you want to use. Consider your typical query patterns:
    if users ask broad conceptual questions, larger chunks with more context may perform
    better. For specific factual queries, smaller, focused chunks often provide more
    precise results.'
  prefs: []
  type: TYPE_NORMAL
- en: Remember that chunking decisions compound through your entire AI pipeline. Well-chunked
    data improves semantic search accuracy, enhances RAG response quality, and enables
    more effective agent reasoning, all of which we’ll explore in the following sections.
  prefs: []
  type: TYPE_NORMAL
- en: Modern document databases such as MongoDB make experimenting with different
    chunking strategies straightforward, allowing you to test multiple approaches
    and optimize for your specific use case without complex infrastructure changes.
  prefs: []
  type: TYPE_NORMAL
- en: Learn more about chunking at [https://www.mongodb.com/resources/basics/chunking-explained](https://www.mongodb.com/resources/basics/chunking-explained).
  prefs: []
  type: TYPE_NORMAL
- en: 'Semantic search: Putting vectors to work'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having established how to chunk data effectively for maximum AI performance,
    we’re ready to put these optimized vectors to work through semantic search capabilities.
    To utilize these vectors effectively, we implement vector search indexes that
    enable semantic alignment between queries and stored information. This process
    of matching a query vector with the nearest neighbors in our vector space is called
    **semantic search**.
  prefs: []
  type: TYPE_NORMAL
- en: When you perform a vector search, the system returns multiple results automatically
    ranked by similarity scores. These scores indicate how close each result is to
    your original query in the multi-dimensional vector space, with the most similar
    results (highest scores) appearing first based on mathematical distance calculations
    between vectors. These initial similarity rankings can be further refined through
    reranking techniques, which we’ll explore later, to improve the relevance and
    quality of retrieved results.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate this concept, `Lemon` and `Banana` would be positioned close together
    in vector space as they share attributes such as being yellow and fruit, but would
    be quite distant from `Cat` and `Dog`, which cluster together due to shared mammalian
    and pet characteristics. `Monkey` might fall somewhere between these groups, sharing
    mammalian traits while also having associations with fruit consumption.
  prefs: []
  type: TYPE_NORMAL
- en: Semantic search represents a fundamental shift from traditional information
    retrieval methods and opens up powerful new possibilities for AI applications.
    Let’s explore how this technology works in practice and examine its expanding
    capabilities across different types of data.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond keyword matching
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Semantic search alone is already a powerful tool and allows the use of vectorized
    data and embedding models without the need to reach out to an LLM. Unlike traditional
    keyword-based search that matches exact terms, semantic search understands the
    meaning and context of a query, returning results based on relevance rather than
    exact matches.
  prefs: []
  type: TYPE_NORMAL
- en: This works because (as with the preceding mammal and fruit example) embedding
    models position semantically related concepts close together in multi-dimensional
    vector space. Concepts such as `wind turbines`, `solar panels`, and `hydroelectric
    power` are all clustered near `renewable energy` because they share conceptual
    relationships and similar semantic meaning.
  prefs: []
  type: TYPE_NORMAL
- en: A semantic search for renewable energy solutions might return results about
    solar panels, wind turbines, and hydroelectric power, even if those exact terms
    weren’t used in the query. This capability is particularly valuable for applications
    where understanding intent and context is crucial.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Keyword search versus semantic search comparison'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.4* illustrates the fundamental difference between traditional keyword
    search and semantic search approaches. On the left, a keyword search for `renewal
    energy solutions` performs exact term matching, returning content that includes
    all or part of the search phrase, such as `renewable energy solutions`, `renewable
    energy`, and `energy solutions`. On the right, a semantic search understands the
    underlying meaning and context of the query, retrieving **conceptually related
    results**, including `renewable energy solutions`, `wind turbines`, and `hydroelectric
    power`, even if those exact terms do not appear in the text.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Learn more about Atlas Vector Search here: [https://www.mongodb.com/products/platform/atlas-vector-search](https://www.mongodb.com/products/platform/atlas-vector-search)'
  prefs: []
  type: TYPE_NORMAL
- en: Multimodal applications of semantic search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Semantic search can be applied across various data types, not just text. For
    instance, it can be used to search for similar images, audio patterns, or video
    content. A powerful example of multimodal semantic search would be a system of
    action that can find relevant content across different media types based on a
    single query.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a retail application where a customer uploads an image of a product
    they like. The system uses an LLM to determine what the product in the photo is,
    and then performs a semantic search to find similar products across the catalog,
    matching visual features, style, and characteristics, regardless of whether the
    product descriptions use similar terminology. This capability enables more intuitive
    and user-friendly search experiences that mirror how humans naturally think about
    similarity.
  prefs: []
  type: TYPE_NORMAL
- en: Modern data platforms with vector search capabilities built in make implementing
    these advanced search features straightforward. By storing vector embeddings alongside
    the original data, they enable efficient semantic search across large datasets
    without increasing tech sprawl or requiring specialized knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding semantic search is fundamental to realizing the potential of modern
    AI applications. By transforming data into vectors and enabling similarity-based
    retrieval, semantic search bridges the gap between human language and machine
    understanding. This capability forms the foundation of more sophisticated AI patterns
    such as RAG, where the quality of semantic search directly impacts the accuracy
    and relevance of AI-generated responses. As we’ll see in the next section, combining
    semantic search with LLMs unlocks even greater potential for creating intelligent,
    context-aware applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'RAG: Enhancing LLMs with contextual data'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While semantic search provides powerful retrieval capabilities, combining it
    with LLMs unlocks even greater potential. RAG represents the synthesis, a pattern
    where vector search results enhance user queries to LLMs, providing specific context
    that produces more accurate, grounded responses with fewer or no hallucinations.
  prefs: []
  type: TYPE_NORMAL
- en: RAG architectures enable organizations to build applications that securely ground
    AI in trusted company data, thereby reducing risks associated with hallucinations,
    ensuring factual accuracy, and enabling domain-specific solutions. To be effective
    with RAG, organizations must prioritize data strategies that allow proprietary,
    up-to-date information to be accessible for retrieval. Architecturally, planning
    for RAG implementations influences decisions on how LLMs integrate with existing
    data stores and the necessity of robust vector database capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: RAG uses the company’s proprietary corporate, domain-specific data to add context
    to a prompt, such as providing a customer history record or a product description,
    which narrows down the *ask* to the LLM and delivers more precise, less hallucinatory
    answers. The ability to provide hyper-personalization through RAG implementations
    represents a significant competitive differentiator that can really add value
    to customer interactions and lift mundane online chores into pleasant, collaborative
    experiences.
  prefs: []
  type: TYPE_NORMAL
- en: While this concept sounds complex, its implementation is actually quite simple,
    as can be seen in the following figure.
  prefs: []
  type: TYPE_NORMAL
- en: How RAG works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Figure 2.5* illustrates a comprehensive RAG implementation that demonstrates
    how organizations can leverage their proprietary data to enhance LLM responses.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5: Basic RAG process flow'
  prefs: []
  type: TYPE_NORMAL
- en: 'While RAG architectures can vary in complexity, from basic three-step workflows
    (retrieval, augmentation, generation) to more sophisticated multi-step implementations,
    this diagram shows a detailed eight-step process that provides complete visibility
    into the RAG workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Document preparation**: The system gathers required data for question-answering
    and splits large documents into manageable chunks to ensure they fit within embedding
    model constraints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vector generation**: Embedding models such as Voyage AI convert each document
    chunk into numerical vector representations that capture semantic meaning.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vector storage**: These document embeddings, the vectors, are stored in databases
    such as MongoDB, and then the vector database search index is created on top.
    It creates a searchable knowledge base of organizational information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Query processing**: When a user or application asks a question, the system
    generates embeddings for that query using the same embedding model to ensure compatibility.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vector search**: The question embeddings are used in a vector search query
    to find document chunks with similar semantic meaning, retrieving the most relevant
    information from the knowledge base.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Context augmentation**: The retrieved information, whether reliable, up-to-date,
    or private organizational data, is used to prepare an enhanced prompt context.
    This contextual enhancement is the core of RAG.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Enhanced generation**: The contextualized prompt is sent to an LLM (such
    as OpenAI’s GPT-4, GCP’s PaLM 2, Mistral 7B, or Llama 4), which generates responses
    based on both its pre-trained knowledge and the retrieved context.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Optimized output**: Users receive accurate, contextually relevant answers
    that are grounded in the organization’s specific data and knowledge.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This approach addresses several limitations of standalone LLMs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reduces hallucinations**: By grounding responses in retrieved facts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provides up-to-date information**: By retrieving current data not available
    during model training'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enables domain specialization**: By incorporating domain-specific knowledge'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improves transparency**: By citing sources for information'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A typical use case is a chatbot that augments information about the case being
    discussed with additional information, such as airline tickets, actual location,
    and flight status, so the answer from the LLM is context-relevant for the individual
    and puts the actual need in the center.
  prefs: []
  type: TYPE_NORMAL
- en: 'Organizations across industries are implementing RAG to enhance their AI applications:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer support**: Augmenting responses with product documentation and support
    history.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Healthcare**: Providing medical professionals with relevant research and
    patient history.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Financial services**: Incorporating regulatory information and market data
    into advisory services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manufacturing**: Integrating equipment manuals and maintenance records into
    operational guidance. Product and engineering documents can be made accessible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Insurance**: Evaluating insurance claim documents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Public sector**: Providing information about public works projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modern document databases excel at supporting RAG implementations because they
    can store both the original data and its vector representations in a unified model.
    This approach simplifies the architecture and improves performance by eliminating
    the need to join data across multiple systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Beyond RAG: Hybrid search approaches'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG can be further enhanced by utilizing regular text search as a verbatim recall
    of information alongside vector search. The combination of text and vector search
    is called **hybrid search** and is still just a flavor of RAG. Nonetheless, it
    is powerful and allows the extension of refining the LLM input with additional
    data points.
  prefs: []
  type: TYPE_NORMAL
- en: 'Traditional text search and vector search have complementary strengths:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text search**: Excels at finding exact matches and specific keywords'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vector search**: Better at understanding meaning and finding semantically
    similar content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hybrid search combines these approaches to deliver comprehensive and relevant
    results. For example, a hybrid search system might use vector search to understand
    the semantic intent of a query while using text search to ensure specific terms
    are present in the results.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.6: Hybrid search architecture combining text and vector search'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.6* demonstrates how hybrid search enhances RAG by combining both
    text search and vector search capabilities. The system processes queries through
    two parallel paths: vector search (left) handles semantic understanding and finds
    conceptually similar content, while text search (right) performs exact keyword
    matching and precise term identification. The results from both approaches are
    merged through a fusion algorithm that delivers improved accuracy by leveraging
    the complementary strengths of semantic understanding and specific term matching
    before augmenting the LLM prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reranking: Refining search results'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The final enhancement in the retrieval pipeline is reranking, a process that
    improves the retrieved context before serving it to the LLM. As the name suggests,
    reranking reorders search results based on a deeper understanding of their relevance
    to the original query. This typically involves four steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Initial retrieval**: Gathering a larger set of potentially relevant documents'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Contextual evaluation**: Assessing each document’s relevance to the specific
    query in context'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prioritization**: Reordering results based on this deeper evaluation'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Selection**: Choosing the most relevant documents to include in the LLM prompt'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This process significantly improves the quality of information provided to the
    LLM, resulting in more accurate and helpful responses. Modern data platforms with
    integrated search capabilities make implementing these sophisticated retrieval
    patterns straightforward, allowing developers to focus on application logic rather
    than infrastructure.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_07.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.7: Hybrid search process'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.7* illustrates a practical example of hybrid search in action, showing
    how the system processes a complex natural language query: `"What''s the 80s rock
    song from a movie scene where a teen is skateboarding behind cars?"` The process
    demonstrates vector search capturing the semantic meaning of the query, while
    full-text search identifies specific keywords such as `movie`, `skateboarding`,
    and `cars`. The hybrid approach connects these complementary search methods to
    successfully identify `"The Power of Love" from the movie Back to the Future`,
    showcasing how combining semantic understanding with precise keyword matching
    delivers accurate results that neither approach could achieve independently.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As illustrated in the figure, hybrid search excels at handling complex, natural
    language queries that traditional search methods would struggle with. The following
    steps occur in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: Vector search captures the semantic meaning of the query about an 80s rock song
    in a skateboarding scene.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Full-text search identifies specific keywords such as `movie`, `skateboarding`,
    and `cars`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Hybrid search combines these approaches to connect the conceptual dots.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The system successfully identifies `"The Power of Love" from the movie Back
    to the Future` as the answer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This example demonstrates how hybrid search can understand both the context
    (a memorable movie scene) and specific details (skateboarding behind cars) to
    deliver precise results that neither approach could achieve alone.
  prefs: []
  type: TYPE_NORMAL
- en: 'Agentic AI: Automating decision-making and reasoning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While RAG and hybrid search enhance LLMs with external knowledge, they still
    require human initiation and oversight. The next evolutionary step removes this
    limitation, creating systems that can autonomously pursue goals and make decisions
    within their designated domain. This is the realm of agentic AI.
  prefs: []
  type: TYPE_NORMAL
- en: This transition from human-guided to autonomous AI systems represents more than
    just a technological advancement; it’s a fundamental shift in how we conceptualize
    AI’s role in business operations. Where RAG systems excel at providing enhanced
    responses to specific queries, agentic AI systems can independently identify problems,
    formulate strategies, and execute solutions across extended workflows. Collaborating
    agentic AI instances build out a broader functional scope that represents the
    concept of a digital expert, functioning like a subject matter expert within an
    organization.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic AI foundation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agentic AI incorporates an orchestrator layer that manages task execution in
    workflows. AI agents can operate in either a fully autonomous or semi-autonomous
    way, with a **human-in-the-loop** (**HITL**). AI agents are equipped with advanced
    tools, models, memory, and data storage. Memory leverages both long- and short-term
    contextual data for informed decision-making and continuity of the interactions.
    Tools and models enable the AI agents to decompose tasks into steps and execute
    them cohesively. The data storage and retrieval are pivotal to AI agent effectiveness
    and can be advanced by embedding and vector search capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  AI-generated content may be incorrect.](img/B34136_02_08.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.8: Agentic AI foundation'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.8* illustrates the foundational layers of agentic AI systems, showing
    how the orchestrator manages task execution workflows. The visualization depicts
    the relationship between AI agents, their tools, models, and memory systems that
    enables autonomous or semi-autonomous operation with HITL capabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some key characteristics of an AI agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Autonomy**: Theability to make decisions based on the situation dynamically
    and to execute tasks with minimal human intervention'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chain of thought**: The ability to perform step-by-step reasoning and break
    complex problems into logical, smaller steps for better judgment and decision-making'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context-aware**: AI agents continuously adapt their actions based on the
    environment, changing conditions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Learning**: AI agents improve their performance over time by adapting and
    enhancing'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agentic AI represents a significant leap towards automating complex workflows
    and decision-making, marking the next evolutionary step in our AI journey. Organizations
    may begin strategic planning for how these autonomous systems will integrate into
    enterprise architecture, considering data access, security protocols, and governance
    frameworks. The development and deployment of AI agents and digital experts will
    require new skill sets and potentially new roles within IT and business operations,
    making it essential for forward-looking leaders to start assessing these needs
    now.
  prefs: []
  type: TYPE_NORMAL
- en: Building upon these retrieval and generation capabilities is the automation
    of processes and reasoning in a contained environment, leading to the concept
    of agentic AI. While decision-making agents based on rule engines have existed
    for a long time, the concept of agentic AI is much more refined. These sophisticated
    systems rely heavily on robust, accessible, and well-structured data, as well
    as advanced orchestration capabilities. This reinforces the critical importance
    of a modern, flexible data platform that can serve as the ‘memory’ and ‘tool-access
    layer’ for these agents.
  prefs: []
  type: TYPE_NORMAL
- en: What is an agent?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An AI agent is an autonomous system that can perceive its environment, make
    decisions, and take actions to achieve specific goals. Unlike simpler AI systems
    that perform specific tasks in isolation, agents operate with a degree of autonomy
    and can adapt their behavior based on feedback and changing conditions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_09.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.9: AI agent architecture and core components'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.9* illustrates the fundamental structure of an AI agent system, showing
    how users assign tasks and receive results through the agent’s core components.
    The architecture demonstrates how these components work together to enable autonomous
    decision making and task execution, with the agent able to perceive its environment,
    process information, and take actions to achieve specific objectives while adapting
    based on feedback and changing conditions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The core components of an AI agent include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instructions and goals**: The agent’s purpose and objectives that guide all
    decision-making processes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory**: Both short-term (for current task context) and long-term (for persistent
    knowledge), which enables continuity across interactions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orchestration**: Planning and reasoning capabilities that determine actions
    and coordinate between different components'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools**: Specific capabilities the agent can use to interact with its environment
    and execute tasks'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Models**: The underlying AI models that power the agent’s capabilities, from
    language understanding to decision-making'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data**: The information the agent can access and use, stored in various formats
    and updated dynamically'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Agentic AI is being applied across various domains to automate complex decision-making
    processes: financial services deploy portfolio management agents that analyze
    market trends, assess risk, and recommend investment strategies. Healthcare organizations
    use diagnostic agents that review patient history, symptoms, and medical literature
    to suggest potential diagnoses and treatments. Manufacturing and logistics companies
    implement agents that optimize routing, inventory, and scheduling based on real-time
    conditions. Modern data platforms with document models and vector search capabilities
    are ideal for supporting these applications. They provide the flexible, scalable
    infrastructure needed for both agent memory (short-term and long-term) and diverse
    data storage, while enabling the fast, context-aware retrieval essential for effective
    decision-making.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Digital experts or multi-agent systems: Collaborative problem-solving'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Multi-agent systems represent the next level of sophistication, where multiple
    AI agents collaborate to solve complex tasks. Each agent specializes in specific
    capabilities, enabling more sophisticated problem-solving through collaboration.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.10: Evolution from RAG to multi-agent systems'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.10* illustrates the evolution from simple RAG chatbots to sophisticated
    multi-agent systems. As agent maturity increases (*x* axis), so does organizational
    complexity (*y* axis), progressing from single AI assistants to specialized collaborative
    agents working across different domains such as production and quality management.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In a multi-agent system, different agents can do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Specialize in different domains**: Some might excel at data analysis, others
    at natural language understanding, and others at planning'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Collaborate on complex tasks**: Breaking down problems into manageable components'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Communicate and share information**: Passing relevant data and insights between
    agents'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Provide checks and balances**: Verifying each other’s work and catching errors'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As AI systems mature, their use of structured and unstructured data increases
    exponentially. Systems supporting flexible data models (accommodating time series,
    relational, and vector data) with integrated vector search capabilities become
    essential for effective multi-agent deployments.
  prefs: []
  type: TYPE_NORMAL
- en: How agentic AI works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From a technical perspective, user interaction with agentic systems follows
    familiar API patterns but with sophisticated processing underneath. The agent
    engages in multi-stage planning to accurately interpret user intent and contextualize
    queries.
  prefs: []
  type: TYPE_NORMAL
- en: This approach fundamentally differs from deterministic software, which follows
    a prescribed path. Agents dynamically determine their approach based on context
    and goals, marking where the true value of the GenAI approach emerges.
  prefs: []
  type: TYPE_NORMAL
- en: The agent leverages various tools, including vector search, text search, and
    data augmentation, to create a comprehensive context. This can incorporate long-term
    information such as historical trends, transaction data, and statistical analyses.
    By synthesizing this broad information spectrum and accessing its own data stores
    and vectorizations, the agent can provide rich context to the LLM for reasoning
    and retrieval. After reranking responses, it structures formal answers for the
    requesting client.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B34136_02_11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.11: Agentic AI system workflow and architecture'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.11* illustrates the complete workflow of an agentic AI system, showing
    how user queries are processed through four main stages: **Planning**, **Perception**,
    **Tools**, and **Memory**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The system processes each user query by moving through these four interconnected
    stages to deliver intelligent, contextual responses:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Planning**, where the agent uses reflection to analyze what the user is asking,
    employs a chain of thought to break down reasoning into logical steps, uses decomposition
    to split complex tasks into smaller parts, and applies ReAct to plan reasoning
    and action steps iteratively while determining the overall strategy for responding
    to the query.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Perception**, which involves data collection from various sources, including
    JSON, CSV, and collections, while database systems such as MongoDB Atlas serve
    as the central data hub. For unstructured data, this stage will utilize vector
    search to process data for semantic understanding, gather information from multiple
    databases and formats, and contextualize data relevant to the user’s specific
    query.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Tools**, where vector search tools find semantically similar information,
    data retrieval tools access specific information from databases, specialized processing
    tools manipulate and analyze gathered data, external integrations provide additional
    capabilities as needed, and the system executes specific functions required to
    answer the query.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Memory**, which maintains long-term memory to store persistent knowledge
    and past experiences, short-term memory to maintain current conversation context,
    learning integration to update the agent’s knowledge base, context preservation
    for handling follow-up questions, and historical data storage in database collections
    for future reference.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Throughout this process, the central AI agent coordinates all four stages to
    provide contextualized, intelligent responses, and the system dynamically adapts
    its approach based on context and goals rather than following predetermined paths.
  prefs: []
  type: TYPE_NORMAL
- en: This proposed framework represents the practical realization of the AI evolution
    we’ve traced from basic RAG systems to autonomous agents. By building on your
    existing data infrastructure and search capabilities, organizations can rapidly
    deploy agents that provide immediate business value while establishing the foundation
    for more advanced multi-agent systems.
  prefs: []
  type: TYPE_NORMAL
- en: The key insight is that successful agent deployment isn’t about replacing existing
    systems; it’s about intelligently orchestrating them to create autonomous, goal-oriented
    capabilities that scale with your organization’s needs.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter traced the evolution of AI from its origins in the 1950s to today’s
    sophisticated GenAI systems. We explored the fundamental components powering modern
    AI applications, including LLMs, embedding models that transform data into vectors,
    and the semantic search capabilities that enable AI reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: We clarified the distinctions between semantic search (understanding meaning
    in queries), RAG (enhancing LLMs with external context), hybrid search approaches
    (combining semantic and keyword matching), and agentic AI systems (autonomous
    decision-making). More importantly, we examined how these components build upon
    each other to create increasingly sophisticated capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout these advancements, modern data platforms have played a crucial role
    in enabling AI innovation. Choosing the right data platform, one that is flexible,
    scalable, and natively supports these diverse AI workloads, from vector search
    to complex data models for agentic memory, becomes a critical enabler for innovation
    and competitive advantage in the era of GenAI. By understanding these concepts
    and their relationships, organizations can make more informed decisions about
    how to leverage AI to drive business value.
  prefs: []
  type: TYPE_NORMAL
- en: The next chapter will examine why data is the key differentiator for companies
    investing in innovation. It will discuss why consolidating operational data into
    a single layer is critical for moving forward with AI initiatives, covering real-time
    data requirements, the importance of well-structured data, data flow, and integration
    approaches.
  prefs: []
  type: TYPE_NORMAL
