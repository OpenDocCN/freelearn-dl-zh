- en: <st c="24001">You will get a rate limit warning either when you reach the maximum
    number of tokens or by reaching the maximum RPM.</st> <st c="24119">For example,
    if the max RPM is 60, you can send 1 request per second.</st> <st c="24189">If
    you</st> <st c="24196">attempt to send requests more frequently, you will need
    to introduce a short sleep time to avoid hitting the</st> <st c="24305">rate limit.</st>
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="24001">当您达到最大令牌数或达到最大RPM时，您将收到速率限制警告。</st> <st c="24119">例如，如果最大RPM是60，您每秒可以发送1个请求。</st>
    <st c="24189">如果您</st> <st c="24196">尝试更频繁地发送请求，您需要引入短暂的休眠时间以避免触</st> <st c="24305">发速率限制。</st>
- en: <st c="24316">When a rate limit error occurs, it means that you have exceeded
    the allowed number of requests within the specified time frame.</st> <st c="24445">The
    error message will indicate the specific rate limit that has been reached and
    provide information on the limit and your</st> <st c="24569">current usage.</st>
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="24316">当发生速率限制错误时，这意味着您在指定的时间框架内已超出允许的请求数量。</st> <st c="24445">错误信息将指示已达到的具体速率限制，并提供有关限制和您</st>
    <st c="24569">当前使用情况的信息。</st>
- en: <st c="24583">To mitigate rate limit errors and optimize your API usage, there
    are several steps you</st> <st c="24671">can take:</st>
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="24583">为了减轻速率限制错误并优化您的 API 使用，您可以采取以下几步：</st> <st c="24671"></st>
- en: '**<st c="24680">Retry with exponential backoff</st>**<st c="24711">: Implementing
    exponential backoff is a reliable strategy to handle rate limit errors.</st> <st
    c="24799">When a rate limit error occurs, you can automatically retry the request
    after a short delay.</st> <st c="24892">If the request fails again, you increase
    the delay exponentially before each subsequent retry.</st> <st c="24987">This
    approach allows for efficient retries without overwhelming the system, as</st>
    <st c="25066">shown here:</st>'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="24680">使用指数退避重试</st>**<st c="24711">：实现指数退避是一种处理速率限制错误的可靠策略。<st c="24799">当发生速率限制错误时，您可以在短暂的延迟后自动重试请求。</st>
    <st c="24892">如果请求再次失败，您将在每次后续重试之前指数级增加延迟。</st> <st c="24987">这种方法允许在不过度压倒系统的情况下进行有效的重试，如下所示：</st>
    <st c="25066"></st>'
- en: '[PRE7]'
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '`<st c="25581">max_tokens</st>` <st c="25591">and the estimated number of tokens
    calculated from the character count of your input.</st> <st c="25678">By setting
    the</st> `<st c="25693">max_tokens</st>` <st c="25703">variable close to your
    anticipated response size, you can reduce the token usage and your</st> <st c="25794">cost,
    respectively.</st>'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="25581">max_tokens</st>` <st c="25591">以及从您的输入字符数计算得出的估计令牌数。<st c="25678">通过将</st>
    `<st c="25693">max_tokens</st>` <st c="25703">变量设置得接近您预期的响应大小，您可以减少令牌使用量以及您的</st>
    <st c="25794">成本。</st>'
- en: '**<st c="25813">Batch requests</st>**<st c="25828">: Occasionally, you</st>
    <st c="25849">may encounter a situation where you have reached the maximum RPM
    but still have a considerable number of unused tokens</st> <st c="25968">remaining.</st>
    <st c="25979">In such instances, you have the option to enhance the efficiency
    of your requests by consolidating multiple tasks into a</st> <st c="26100">single
    request.</st>'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="25813">批量请求</st>**<st c="25828">：偶尔，您</st> <st c="25849">可能会遇到一种情况，即您已经达到最大
    RPM，但仍有许多未使用的令牌</st> <st c="25968">剩余。<st c="25979">在这种情况下，您可以选择通过将多个任务合并为一个</st>
    <st c="26100">单独的请求来提高请求的效率。</st>'
- en: <st c="26115">Rate limits are important</st> <st c="26142">for maintaining the
    stability, fairness, and performance of the ChatGPT API, protecting against abuse,
    and ensuring fair access, while default rate limits vary based on account type,
    and techniques such as exponential backoff, optimizing</st> `<st c="26380">max_tokens</st>`<st
    c="26390">, and batching requests can help mitigate rate limit errors and optimize</st>
    <st c="26463">API usage.</st>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="26115">速率限制对于维护 ChatGPT API 的稳定性、公平性和性能至关重要，可以防止滥用，并确保公平访问，而默认的速率限制根据账户类型而变化，并且诸如指数退避、优化</st>
    `<st c="26380">max_tokens</st>`<st c="26390">和批量请求等技术可以帮助减轻速率限制错误并优化</st> <st
    c="26463">API 使用。</st>
- en: <st c="26473">In the forthcoming section, we will learn about OpenAI embeddings,
    exploring their significance, applications, and</st> <st c="26588">optimization
    techniques.</st> <st c="26614">We’ll cover their applications and provide practical
    insights for maximizing their utility in</st> <st c="26708">your projects.</st>
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的部分中，我们将学习关于 OpenAI 嵌入的内容，探讨其重要性、应用以及优化技术。<st c="26588">我们还将介绍其应用，并提供在您的项目中最大化其效用的实用见解。</st>
    <st c="26708"></st>
- en: <st c="26722">OpenAI embeddings</st>
  id: totrans-111
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="26722">OpenAI 嵌入</st>
- en: <st c="26740">In the ever-evolving landscape of AI, the processing and interpretation
    of unstructured data pose significant challenges.</st> <st c="26863">Whether it’s
    text, images, or audio files, making sense of this complexity is crucial for developing
    robust software solutions.</st> <st c="26991">This is where embedding vectors,
    commonly known as</st> <st c="27041">embeddings, emerge as a pivotal technology.</st>
    <st c="27086">By converting unstructured data into structured formats, embeddings
    facilitate seamless processing by</st> <st c="27188">software systems.</st>
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能不断演变的领域中，非结构化数据的处理和解释提出了重大挑战。<st c="26863">无论是文本、图像还是音频文件，理解这种复杂性对于开发稳健的软件解决方案至关重要。</st>
    <st c="26991">这就是嵌入向量，通常称为</st> <st c="27041">嵌入（embeddings）的技术成为关键。</st> <st
    c="27086">通过将非结构化数据转换为结构化格式，嵌入促进了软件系统的高效处理。</st>
- en: <st c="27205">OpenAI provides cutting-edge models that excel in creating embeddings,
    particularly for textual data.</st> <st c="27308">These embeddings are instrumental
    in various AI applications, ranging from</st> **<st c="27383">natural language
    processing</st>** <st c="27410">(</st>**<st c="27412">NLP</st>**<st c="27415">)
    to image</st> <st c="27426">recognition and recommendation systems.</st> <st c="27467">By
    understanding the fundamentals of embeddings, you’ll gain insights into how these
    powerful tools can be harnessed to enhance software</st> <st c="27604">development
    projects.</st>
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI提供了在创建嵌入方面表现卓越的尖端模型，尤其是在文本数据方面。<st c="27308">这些嵌入在多种人工智能应用中发挥着关键作用，从</st>
    **<st c="27383">自然语言处理</st>** <st c="27410">(**<st c="27412">NLP</st>**) 到图像识别和推荐系统。</st
    c="27426">通过理解嵌入的基本原理，你将深入了解如何利用这些强大的工具来增强软件开发项目。</st>
- en: <st c="27625">But first, let’s unravel the essence</st> <st c="27663">of embeddings.</st>
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们揭开嵌入（embeddings）的本质。
- en: <st c="27677">Embeddings are like the DNA of data, offering a structured representation
    that computers can readily understand and manipulate.</st> <st c="27806">Consider
    a library filled with books of diverse genres, each representing a unique aspect
    of human knowledge and experience.</st> <st c="27931">Now, imagine you’re tasked
    with organizing this vast collection.</st> <st c="27996">You decide to categorize
    the books based on their themes, topics,</st> <st c="28062">and content.</st>
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入就像是数据的DNA，提供了一种结构化的表示，计算机可以轻松理解和操作。<st c="27806">想象一下，一个图书馆里充满了各种类型的书籍，每本书都代表人类知识和经验的独特方面。</st>
    <st c="27931">现在，假设你被要求组织这个庞大的收藏。</st> <st c="27996">你决定根据书籍的主题、主题</st> <st c="28062">和内容进行分类。</st>
- en: <st c="28074">To achieve this, you create a sophisticated system where each
    book is represented by a set of attributes – perhaps their genre, author, publication
    year, and subject matter.</st> <st c="28249">Collectively, these attributes form
    a multidimensional vector for each book, positioning it within a conceptual space
    that reflects its characteristics.</st> <st c="28402">Books with similar attributes
    cluster together in this space, reflecting their thematic or</st> <st c="28493">conceptual
    similarities.</st>
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，你创建了一个复杂的系统，其中每本书都由一组属性表示——可能是它们的类型、作者、出版年份和主题。</st c="28249">这些属性共同形成每本书的多维向量，将其定位在一个反映其特性的概念空间中。</st
    c="28402">具有相似属性的书籍在这个空间中聚集在一起，反映了它们的主题或</st c="28493">概念上的相似性。</st>
- en: <st c="28517">In this analogy, embeddings serve as the blueprint for organizing
    the library.</st> <st c="28597">By transforming the unstructured data of books
    into structured vectors, embeddings enable computers to navigate and comprehend
    the intricacies of the library’s contents.</st> <st c="28767">Just as a librarian
    can efficiently locate books based on their attributes, algorithms can analyze
    and manipulate data based on its</st> <st c="28899">embedded representation.</st>
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个类比中，嵌入（embeddings）充当组织图书馆的蓝图。<st c="28597">通过将书籍的非结构化数据转换为结构化向量，嵌入使计算机能够导航并理解图书馆内容的复杂性。</st>
    <st c="28767">正如图书管理员可以根据书籍的属性高效地定位书籍一样，算法可以根据其</st> <st c="28899">嵌入表示来分析和操作数据。</st>
- en: <st c="28923">OpenAI takes this concept to new heights with its advanced embedding
    models.</st> <st c="29001">These models leverage sophisticated algorithms and
    extensive datasets to capture nuanced representations of textual data.</st> <st
    c="29123">By considering not only individual words but also their contextual usage,
    OpenAI embeddings yield more precise and meaningful</st> <st c="29249">vector
    representations.</st>
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="28923">OpenAI 通过其先进的嵌入模型将这一概念提升到了新的高度。</st> <st c="29001">这些模型利用复杂的算法和庞大的数据集来捕捉文本数据的细微表示。</st>
    <st c="29123">通过考虑不仅单个单词，还包括它们的上下文用法，OpenAI 的嵌入产生了更精确和有意义的</st> <st c="29249">向量表示。</st>
- en: <st c="29272">Moreover, OpenAI embeddings are underpinned by state-of-the-art
    machine learning techniques, enabling them to glean insights from vast amounts
    of data.</st> <st c="29425">This capability empowers the embeddings to discern
    intricate patterns and relationships, surpassing the limitations of traditional
    scaling and</st> <st c="29568">dimensionality reduction methods.</st> <st c="29602">As
    a result, OpenAI embeddings boast superior abilities to recognize and leverage
    similarities and differences within the</st> <st c="29724">data landscape.</st>
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="29272">此外，OpenAI 的嵌入由最先进的机器学习技术支撑，使它们能够从大量数据中提取见解。</st> <st c="29425">这种能力使嵌入能够识别和利用数据景观中的复杂模式和关系，超越了传统缩放和</st>
    <st c="29568">降维方法的限制。</st> <st c="29602">因此，OpenAI 的嵌入在识别和利用数据景观中的相似性和差异性方面具有卓越的能力。</st>
- en: <st c="29739">Next, we’ll learn how to compare the meaning of two sentences
    for similarities using embeddings.</st> <st c="29837">Since we transform the sentences
    into vectors before comparing them, we need to understand the term</st> **<st
    c="29937">cosine similarity</st>**<st c="29954">. Concise similarity measures
    provide a compact representation of the degree of similarity between two vectors,
    allowing for efficient comparison and categorization of textual elements such
    as sentences</st> <st c="30157">or documents.</st>
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="29739">接下来，我们将学习如何使用嵌入来比较两个句子的意义以寻找相似之处。</st> <st c="29837">由于我们在比较之前将句子转换为向量，因此我们需要了解术语</st>
    **<st c="29937">余弦相似度</st>**<st c="29954">。简洁的相似度度量提供了两个向量之间相似度程度的紧凑表示，允许对文本元素（如句子或文档）进行高效的比较和分类。</st>
    <st c="30157">或文档。</st>
- en: <st c="30170">Cosine similarity quantifies the similarity between two vectors
    by measuring the cosine of the angle between them.</st> <st c="30286">It ranges
    from -1 to 1, where a value of 1 indicates perfect similarity, 0 indicates no
    similarity, and -1 indicates</st> <st c="30403">perfect dissimilarity.</st>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="30170">余弦相似度通过测量两个向量之间角度的余弦值来量化两个向量之间的相似度。</st> <st c="30286">它的范围从 -1
    到 1，其中 1 表示完美的相似度，0 表示没有相似度，-1 表示</st> <st c="30403">完美的不同度。</st>
- en: <st c="30425">From what we mentioned previously, if we want to check the similarity
    between two sentences, we need to find their vectors using the OpenAI API and
    compare them using the cosine similarity methodology.</st> <st c="30628">We can
    easily leverage Python to do that and represent sentences as vectors and compute
    their concise similarity using cosine similarity.</st> <st c="30766">Here’s a
    Python script demonstrating</st> <st c="30803">the process:</st>
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="30425">从我们之前提到的内容来看，如果我们想检查两个句子之间的相似度，我们需要使用 OpenAI API 找到它们的向量，并使用余弦相似度方法进行比较。</st>
    <st c="30628">我们可以轻松地利用 Python 来完成这项工作，并将句子表示为向量，然后使用余弦相似度计算它们的简洁相似度。</st> <st
    c="30766">以下是一个演示</st> <st c="30803">此过程的 Python 脚本：</st>
- en: '[PRE8]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: <st c="31634">Here, the code imports the</st> <st c="31661">necessary libraries,
    including OpenAI’s API client, NumPy for numerical operations, and scikit-learn’s</st>
    `<st c="31765">cosine_similarity</st>` <st c="31782">function for calculating
    cosine similarity.</st> <st c="31827">It defines a function,</st> `<st c="31850">get_embedding</st>`<st
    c="31863">, to obtain embeddings for input sentences using OpenAI’s text embedding
    model.</st> <st c="31943">The</st> `<st c="31947">compare_sentences</st>` <st
    c="31964">function then utilizes</st> `<st c="31988">get_embedding</st>` <st c="32001">to
    fetch embeddings for both input sentences and computes their</st> <st c="32066">cosine
    similarity.</st>
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="31634">在这里，代码导入了</st> <st c="31661">必要的库，包括 OpenAI 的 API 客户端、用于数值计算的
    NumPy 以及 scikit-learn 的</st> `<st c="31765">cosine_similarity</st>` <st c="31782">函数，用于计算余弦相似度。</st>
    <st c="31827">它定义了一个函数，</st> `<st c="31850">get_embedding</st>`<st c="31863">，用于使用
    OpenAI 的文本嵌入模型获取输入句子的嵌入。</st> <st c="31943">然后，</st> `<st c="31947">compare_sentences</st>`
    <st c="31964">函数利用</st> `<st c="31988">get_embedding</st>` <st c="32001">获取两个输入句子的嵌入，并计算它们的</st>
    <st c="32066">余弦相似度。</st>
- en: <st c="32084">An example usage showcases the comparison of two sentences (</st>**<st
    c="32145">I love reading books.</st>** <st c="32167">and</st> **<st c="32172">Reading
    is my favorite hobby.</st>**<st c="32201">) and prints the resulting similarity
    score.</st> <st c="32247">Given the semantic proximity of these sentences, the
    similarity coefficient is expected to be high,</st> <st c="32347">nearing 1.</st>
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32084">一个示例用法展示了两个句子（</st>**<st c="32145">我爱读书。</st>** <st c="32167">和</st>
    **<st c="32172">阅读是我最喜欢的爱好。</st>**<st c="32201">）的比较，并打印出产生的相似度分数。</st> <st c="32247">鉴于这些句子的语义邻近性，相似系数预计会很高，</st>
    <st c="32347">接近1。</st>
- en: <st c="32357">Upon execution, the code yields the following</st> <st c="32404">similarity
    score:</st>
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32357">执行代码后，代码返回以下</st> <st c="32404">相似度分数：</st>
- en: '[PRE9]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: <st c="32448">This score indicates a high degree of similarity as it exceeds
    0 and</st> <st c="32518">approaches 1.</st>
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32448">这个分数表示高度相似，因为它超过了0，</st> <st c="32518">接近1。</st>
- en: <st c="32531">Next, by altering the value of</st> `<st c="32563">sentence2</st>`
    <st c="32572">to</st> **<st c="32576">Financial markets have seen better days</st>**
    <st c="32615">and rerunning the script, we obtain a</st> <st c="32654">different
    result:</st>
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32531">接下来，通过将`<st c="32563">sentence2</st>` <st c="32572">的值更改为</st>
    **<st c="32576">金融市场已经度过了更好的日子</st>** <st c="32615">并重新运行脚本，我们得到了一个</st> <st c="32654">不同的结果：</st>
- en: '[PRE10]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: <st c="32697">The cosine similarity coefficient drops significantly, now being
    more than 10 times lower and closer to 0\.</st> <st c="32805">This reflects the
    substantial dissimilarity between the</st> <st c="32861">two sentences.</st>
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32697">余弦相似度系数显著下降，现在比之前低10多倍，更接近0。</st> <st c="32805">这反映了这两个句子之间存在的实质性差异。</st>
- en: <st c="32875">Through the exploration of semantic similarity using embeddings
    and cosine similarity metrics, noteworthy findings emerge, shedding light on the
    profound implications and practical applications of this technology.</st> <st
    c="33090">By comparing sentences with varying degrees of semantic resemblance,
    we</st> <st c="33161">observe a clear correlation between their textual content
    and the resultant similarity scores.</st> <st c="33257">This underscores the effectiveness
    of embeddings in capturing and quantifying semantic relationships between textual
    data points.</st> <st c="33387">Such insights extend beyond mere sentence comparison,
    offering invaluable utility in diverse applications.</st> <st c="33494">For instance,
    in sentiment analysis of social media data, embeddings enable the extraction of
    nuanced opinions from platforms such as X (formerly Twitter), empowering businesses
    and researchers to gauge public sentiment, track trends, and inform decision-making.</st>
    <st c="33757">Additionally, in recommendation systems, embeddings facilitate the
    identification of related items or content based on their underlying semantic
    similarities, enhancing user experiences, and driving engagement.</st> <st c="33968">Thus,
    embeddings serve as indispensable tools in harnessing the wealth of information
    embedded within unstructured data, enabling transformative advancements across</st>
    <st c="34133">various domains.</st>
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="32875">通过使用嵌入和余弦相似度指标探索语义相似度，出现了引人注目的发现，揭示了这项技术的深远影响和实际应用。</st> <st c="33090">通过比较具有不同程度语义相似度的句子，我们</st>
    <st c="33161">观察到它们的文本内容和产生的相似度分数之间存在明显的相关性。</st> <st c="33257">这强调了嵌入在捕捉和量化文本数据点之间语义关系方面的有效性。</st>
    <st c="33387">这些见解超越了简单的句子比较，为各种应用提供了宝贵的实用性。</st> <st c="33494">例如，在社会媒体数据的情感分析中，嵌入能够从X（前身为Twitter）等平台提取细微的意见，使企业和研究人员能够衡量公众情绪，追踪趋势，并指导决策。</st>
    <st c="33757">此外，在推荐系统中，嵌入有助于根据其潜在的语义相似性识别相关项目或内容，增强用户体验，并推动参与度。</st> <st c="33968">因此，嵌入在利用非结构化数据中嵌入的信息财富方面发挥着不可或缺的作用，使各个领域实现变革性进步。</st>
    <st c="34133">的各个领域。</st>
- en: <st c="34149">Summary</st>
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="34149">摘要</st>
- en: <st c="34157">In this chapter, we explored various ChatGPT API models.</st>
    <st c="34215">In the</st> *<st c="34222">ChatGPT API models – GPT-3.5, GPT-4,
    and beyond</st>* <st c="34269">section, we explored the different ChatGPT API
    models.</st> <st c="34325">Then, we provided you with a deeper understanding of
    these AI models and their features, enabling you to choose the most suitable model
    for your specific applications.</st> <st c="34493">This chapter emphasized the
    importance of considering factors such as cost, quality, and prompt length when
    selecting a model as the most advanced and capable model may not always be the
    best choice.</st> <st c="34693">Additionally, we used Python to compare the responses
    and costs of different models, aiding in the</st> <st c="34792">decision-making
    process.</st>
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了各种ChatGPT API模型。<st c="34215">在</st> *<st c="34222">ChatGPT API模型
    – GPT-3.5、GPT-4以及更高级的模型</st>* <st c="34269">部分，我们探讨了不同的ChatGPT API模型。</st> <st
    c="34325">随后，我们为您提供了对这些AI模型及其特性的深入了解，使您能够为您的特定应用选择最合适的模型。</st> <st c="34493">本章强调了在选择模型时考虑成本、质量和提示长度等因素的重要性，因为最先进和功能强大的模型并不总是最佳选择。</st>
    <st c="34693">此外，我们使用Python比较了不同模型的响应和成本，有助于决策过程。</st>
- en: <st c="34816">We also focused on the various parameters of the ChatGPT API and
    their impact on response quality.</st> <st c="34916">We highlighted key parameters
    such as</st> `<st c="34954">model</st>`<st c="34959">,</st> `<st c="34961">messages</st>`<st
    c="34969">,</st> `<st c="34971">temperature</st>`<st c="34982">,</st> `<st c="34984">max_tokens</st>`<st
    c="34994">,</st> `<st c="34996">stop</st>`<st c="35000">, and</st> `<st c="35006">n</st>`<st
    c="35007">, and explained how they can be manipulated to optimize interactions
    with the ChatGPT API.</st> <st c="35098">You learned about the importance of rate
    limits in maintaining the stability and fairness of the ChatGPT API.</st> <st
    c="35208">Finally, we explored how to implement appropriate strategies that can
    enhance the efficiency and cost-effectiveness of using the</st> <st c="35337">ChatGPT
    API.</st>
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="34816">我们还关注了ChatGPT API的各种参数及其对响应质量的影响。</st> <st c="34916">我们强调了如<st
    c="34954">模型</st><st c="34959">、<st c="34961">消息</st><st c="34969">、<st c="34971">温度</st><st
    c="34982">、<st c="34984">最大令牌数</st><st c="34994">、<st c="34996">停止</st><st c="35000">和</st>
    <st c="35006">n</st><st c="35007">等关键参数，并解释了如何操作它们以优化与ChatGPT API的交互。</st> <st
    c="35098">您了解了在保持ChatGPT API稳定性和公平性方面，速率限制的重要性。</st> <st c="35208">最后，我们探讨了如何实施适当的策略，以提高使用ChatGPT
    API的效率和成本效益。</st>
- en: <st c="35349">In</st> [*<st c="35353">Chapter 12</st>*](B22414_12.xhtml#_idTextAnchor140)<st
    c="35363">,</st> *<st c="35365">Fine-Tuning ChatGPT to Create Unique API Models</st>*<st
    c="35412">, we will dive into the process of fine-tuning ChatGPT API models.</st>
    <st c="35479">This chapter aims to equip you with the skills necessary to teach
    ChatGPT additional information tailored to a specific project or application.</st>
    <st c="35623">Through a series of case studies, you will gain insights into real-world
    applications of fine-tuning and be encouraged to think creatively.</st> <st c="35763">Additionally,
    we will emphasize the cost-saving potential of fine-tuning in the development
    of</st> <st c="35858">AI applications.</st>
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="35349">在第</st> [*<st c="35353">12章</st>*](B22414_12.xhtml#_idTextAnchor140)<st
    c="35363">中，*<st c="35365">微调ChatGPT以创建独特的API模型</st>*<st c="35412">，我们将深入了解微调ChatGPT
    API模型的过程。</st> <st c="35479">本章旨在为您提供教授ChatGPT针对特定项目或应用定制信息的必要技能。</st> <st c="35623">通过一系列案例研究，您将深入了解微调在现实世界中的应用，并受到鼓励进行创造性思考。</st>
    <st c="35763">此外，我们将强调微调在开发</st> <st c="35858">AI应用中的成本节约潜力。</st>
