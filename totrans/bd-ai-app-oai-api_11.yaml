  type: TYPE_NORMAL
  zh: <st c="2072">为了充分利用本章内容，您必须具备用于处理Python代码和ChatGPT API的必要工具。</st> <st c="2213">本章将提供逐步指导，介绍安装所需软件和完成必要的</st>
    <st c="2316">注册。</st>
