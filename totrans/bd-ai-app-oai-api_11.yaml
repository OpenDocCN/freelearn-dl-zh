  zh: <st c="9304">在前面脚本中我们提出的问题的答案，</st> `<st c="9366">"估算 121 的平方根并在每个平方根数字后输入 'orange'"</st>`<st
    c="9456">，是</st> `<st c="9461">"1orange1orange"</st>`<st c="9477">。您可以在以下位置看到不同模型的答案：</st>
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: <st c="10047">As this was a rather complex question, GPT-4 was the only model
    that answered correctly in this case.</st> <st c="10150">We can confidently use
    the GPT-4 model for this specific task.</st> <st c="10213">It is interesting that
    even the</st> `<st c="10245">gpt-4.5-turbo</st>` <st c="10258">model, which is
    similar to</st> `<st c="10286">gpt-4</st>`<st c="10291">, was not able to solve
    the problem.</st> <st c="10328">Even though the</st> `<st c="10344">gpt-3.5-turbo</st>`
    <st c="10357">models are significantly cheaper compared to the</st> `<st c="10407">gpt-4</st>`
    <st c="10412">models, they would not be suitable for solving the</st> <st c="10464">aforementioned
    problem.</st>
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10047">由于这是一个相当复杂的问题，GPT-4 是唯一在这个情况下正确回答的模型。</st> <st c="10150">我们可以有信心使用
    GPT-4 模型来完成这个特定任务。</st> <st c="10213">有趣的是，即使是</st> `<st c="10245">gpt-4.5-turbo</st>`
    <st c="10258">模型，它与</st> `<st c="10286">gpt-4</st>`<st c="10291">相似，也无法解决这个问题。</st>
    <st c="10328">尽管</st> `<st c="10344">gpt-3.5-turbo</st>` <st c="10357">模型与</st>
    `<st c="10407">gpt-4</st>` <st c="10412">模型相比要便宜得多，但它们不适合解决</st> <st c="10464">上述问题。</st>
- en: <st c="10487">That was a complete</st> <st c="10508">overview of the ChatGPT
    API models and the importance</st> <st c="10562">of selecting the right model
    for specific language tasks.</st> <st c="10620">We</st> <st c="10622">developed
    a Python script that compares the responses and costs of</st> <st c="10690">different
    models, allowing users to make</st> <st c="10731">informed decisions.</st>
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10487">这是对 ChatGPT API 模型及其在特定语言任务中选择正确模型的重要性</st> <st c="10562">的全面概述。</st>
    <st c="10620">我们</st> <st c="10622">开发了一个 Python 脚本，用于比较不同模型的响应和成本，使用户能够做出</st>
    <st c="10690">明智的决定。</st>
- en: <st c="10750">Having gained insights into ChatGPT API models and their comparisons,
    we will now proceed to the next section, where we will explore ChatGPT</st> <st
    c="10892">API parameters.</st>
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="10750">在了解了 ChatGPT API 模型及其比较之后，我们现在将进入下一节，我们将探讨 ChatGPT</st> <st c="10892">API
    参数。</st>
- en: <st c="10907">Using chat completion parameters</st>
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="10907">使用聊天完成参数</st>
- en: <st c="10940">In this section, we will be using ChatGPT API parameters and look
    at their profound impact on the quality of responses generated by models.</st>
    <st c="11081">By understanding and harnessing the power of these parameters, you
    will gain the ability to optimize your interactions with the ChatGPT API, unlocking
    its true potential.</st> <st c="11252">Some of the key</st> <st c="11267">parameters
    to control the API response are</st> <st c="11311">as follows:</st>
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用 ChatGPT API 参数，并探讨它们对模型生成响应质量产生的深远影响。<st c="11081">通过理解和利用这些参数的力量，您将获得优化与
    ChatGPT API 交互的能力，解锁其真正潜力。</st> <st c="11252">一些关键的</st> <st c="11267">控制 API
    响应的参数如下：</st>
- en: '`<st c="11322">model</st>`<st c="11328">: Specifies the specific ChatGPT model
    to use for</st> <st c="11379">generating responses.</st>'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11322">model</st>`<st c="11328">: 指定用于</st> <st c="11379">生成响应的特定 ChatGPT
    模型。</st>'
- en: '`<st c="11400">messages</st>`<st c="11409">: Provides the conversation history
    as a list of message objects, including user and</st> <st c="11495">assistant
    messages.</st>'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11400">messages</st>`<st c="11409">: 提供作为消息对象列表的对话历史，包括用户和</st> <st
    c="11495">助手消息。</st>'
- en: '`<st c="11514">temperature</st>`<st c="11526">: Controls the randomness of
    the generated responses.</st> <st c="11581">Higher values (for example, 0.8) make
    the responses more random, while lower values (for example, 0.2) make them more
    focused</st> <st c="11707">and deterministic.</st>'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11514">temperature</st>`<st c="11526">: 控制生成响应的随机性。</st> <st c="11581">更高的值（例如，0.8）会使响应更加随机，而较低的值（例如，0.2）会使它们更加集中</st>
    <st c="11707">和确定。</st>'
- en: '`<st c="11725">max_tokens</st>`<st c="11736">: Sets the maximum number of tokens
    in the generated response.</st> <st c="11800">Limiting this parameter can control
    the length of</st> <st c="11850">the response.</st>'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11725">max_tokens</st>`<st c="11736">: 设置生成响应中的最大标记数。</st> <st c="11800">限制此参数可以控制</st>
    <st c="11850">响应的长度。</st>'
- en: '`<st c="11863">stop</st>`<st c="11868">: Allows you to specify a custom string
    or list of strings to indicate when the model should stop generating</st> <st
    c="11978">the response.</st>'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11863">stop</st>`<st c="11868">: 允许您指定一个自定义字符串或字符串列表，以指示模型何时停止生成</st>
    <st c="11978">响应。</st>'
- en: '`<st c="11991">n</st>`<st c="11993">: Determines the number of alternative
    completions to generate.</st> <st c="12057">Setting a higher value increases the
    diversity</st> <st c="12104">of responses.</st>'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="11991">n</st>`<st c="11993">: 确定要生成的替代完成项的数量。</st> <st c="12057">设置更高的值会增加响应的多样性。</st>'
- en: <st c="12117">The</st> `<st c="12122">temperature</st>` <st c="12133">parameter
    is a key aspect of the OpenAI ChatGPT API that allows you to control the randomness
    and creativity of the generated responses.</st> <st c="12271">It influences the
    diversity and randomness of the text produced by</st> <st c="12338">the model.</st>
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="12117">`<st c="12122">温度</st>` <st c="12133">参数是OpenAI ChatGPT API的关键方面，允许您控制生成响应的随机性和创造性。</st>
    <st c="12271">它影响模型生成的文本的多样性和随机性。</st>
- en: <st c="12348">When making a request to the API, you can specify the</st> `<st
    c="12403">temperature</st>` <st c="12414">parameter, which takes a value between
    0 and 1\.</st> <st c="12463">A lower temperature value (for example, 0.2) produces</st>
    <st c="12516">more focused and deterministic responses with less diversity, while
    a higher temperature value (for example, 1) leads to more random and diverse responses
    that can be more inaccurate and irrelevant.</st> <st c="12716">Create a new file</st>
    <st c="12734">called</st> `<st c="12741">temperature.py</st>`<st c="12755">.</st>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="12348">在向API发出请求时，您可以指定</st> `<st c="12403">温度</st>` <st c="12414">参数，该参数的值介于0和1之间。</st>
    <st c="12463">较低的温度值（例如，0.2）会产生</st> <st c="12516">更专注和确定性的响应，多样性较低，而较高的温度值（例如，1）会导致更随机和多样化的响应，这些响应可能更不准确和不相关。</st>
    <st c="12716">创建一个名为</st> <st c="12734">`<st c="12741">temperature.py</st>`<st
    c="12755">`的新文件。</st>
- en: <st c="12756">The following example demonstrates the effect of modifying the</st>
    `<st c="12820">temperature</st>` <st c="12831">parameter:</st>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="12756">以下示例演示了修改</st> `<st c="12820">温度</st>` <st c="12831">参数</st>的效果：
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '<st c="13731">In this example, we use the</st> `<st c="13760">generate_response</st>`
    <st c="13777">function to generate responses for a given prompt with two different
    temperature values: low (</st>`<st c="13872">0</st>`<st c="13874">) and high (</st>`<st
    c="13886">1</st>`<st c="13888">).</st> <st c="13891">We run the response generation
    at each temperature three times in a row to compare the</st> <st c="13977">diversity
    of</st> <st c="13991">the responses.</st>'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="13731">在这个示例中，我们使用</st> `<st c="13760">generate_response</st>` <st c="13777">函数</st>为给定的提示生成具有两个不同温度值的响应：低（</st>`<st
    c="13872">0</st>`<st c="13874">）和高（</st>`<st c="13886">1</st>`<st c="13888">）。</st>
    <st c="13891">我们在每个温度下连续运行三次响应生成，以比较</st> <st c="13977">响应</st> <st c="13991">的多样性。</st>
- en: <st c="14005">By adjusting the</st> `<st c="14023">temperature</st>` <st c="14034">parameter,
    you can fine-tune the level of creativity and randomness in the responses generated
    by the ChatGPT API.</st> <st c="14150">You can experiment with different temperature
    values to achieve the desired output for your specific</st> <st c="14251">use
    case.</st>
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14005">通过调整</st> `<st c="14023">温度</st>` <st c="14034">参数，您可以微调ChatGPT
    API生成的响应中的创造性和随机性水平。</st> <st c="14150">您可以通过尝试不同的温度值来实现特定用例的期望输出。</st>
