- en: <st c="5021">While it may seem</st> <st c="5040">logical to opt for the most
    advanced and capable</st> <st c="5089">model for your application, it is important
    to consider that sometimes a cheaper, less capable model can adequately fulfill
    your task requirements.</st> <st c="5237">In certain scenarios, a less sophisticated
    model may provide sufficient performance while being more cost-effective.</st>
    <st c="5354">By carefully evaluating the specific needs of your application, you
    can make an informed decision and potentially save resources by selecting a model
    that strikes the right balance between capability and cost.</st> <st c="5564">Remember,
    it is not always about using the most powerful tool, but rather about using the
    right tool for the job</st> <st c="5677">at hand.</st>
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5021">虽然选择最先进和功能强大的</st> <st c="5040">模型对于您的应用程序来说可能看起来很合理，但重要的是要考虑有时一个更便宜、功能更少的模型可以充分满足您的任务需求。</st>
    <st c="5237">在某些情况下，一个不那么复杂的模型可能提供足够的性能，同时更具成本效益。</st> <st c="5354">通过仔细评估您应用程序的具体需求，您可以做出明智的决定，并通过选择在功能和成本之间取得平衡的模型来节省资源。</st>
    <st c="5564">记住，并不总是关于使用最强大的工具，而是关于使用适合手头工作的正确工具</st> <st c="5677">。</st>
- en: <st c="5685">As you can see, OpenAI provides an extensive selection of models,
    making it challenging to decide on the most suitable one.</st> <st c="5810">To
    simplify this process, a Python script can be utilized for easy comparison, empowering
    you to identify the optimal model that aligns with your specific task.</st> <st
    c="5971">You</st> <st c="5975">can create a new file called</st> `<st c="6004">models.py</st>`
    <st c="6013">and add the</st> <st c="6026">following</st> <st c="6035">code:</st>
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5685">正如您所看到的，OpenAI提供了广泛的模型选择，这使得决定最合适的模型变得具有挑战性。</st> <st c="5810">为了简化这个过程，可以使用Python脚本来轻松比较，让您能够识别与您特定任务最匹配的模型。</st>
    <st c="5971">您</st> <st c="5975">可以创建一个名为</st> <st c="6004">models.py</st> <st
    c="6013">的新文件，并添加以下</st> <st c="6026">代码：</st>
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: <st c="7134">The purpose of</st> <st c="7150">this script is to compare the
    responses from different</st> <st c="7205">OpenAI models using the OpenAI Python
    library and make API calls to</st> <st c="7273">generate responses.</st>
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="7134">此脚本的目的是使用OpenAI Python库比较不同</st> <st c="7150">OpenAI模型的结果，并通过API调用生成响应。</st>
- en: <st c="7292">By effortlessly adjusting the</st> `<st c="7323">prompt</st>` <st
    c="7329">variable, you can ask the same question of multiple ChatGPT models and
    evaluate their respective</st> <st c="7426">responses and the associated cost.</st>
    <st c="7462">This approach empowers</st> <st c="7484">you to select the most suitable
    model that aligns with the requirements of your</st> <st c="7565">specific tasks.</st>
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="7292">通过轻松调整</st>` `<st c="7323">prompt</st>` `<st c="7329">变量，您可以向多个ChatGPT模型提出相同的问题，并评估它们各自的</st>`
    `<st c="7426">响应和相关成本。</st>` `<st c="7462">这种方法使</st>` `<st c="7484">您能够选择与您特定任务要求最合适的模型。</st>`'
- en: <st c="7580">Firstly, ChatGPT API credentials are set up by assigning the API
    key to the</st> `<st c="7657">client = OpenAI(api_key=config.API_KEY)</st>` <st
    c="7696">variable.</st> <st c="7707">This allows the code to authenticate and
    access the ChatGPT API.</st> <st c="7772">Additionally, a dictionary named</st>
    `<st c="7805">model_ids</st>` <st c="7814">is defined to store the names and corresponding
    model IDs of various ChatGPT models, along with their associated costs.</st> <st
    c="7935">The model names serve as keys, and each key is paired with a dictionary</st>
    <st c="8007">containing the model ID and cost as of May 2024\.</st> <st c="8056">This
    enables</st> <st c="8069">easy referencing and being able to select specific models
    based on their names in the subsequent code execution.</st> <st c="8182">You can
    add and remove models to be tested from</st> <st c="8230">this dictionary.</st>
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，通过将API密钥分配给`<st c="7657">client = OpenAI(api_key=config.API_KEY)</st>` `<st
    c="7696">变量</st>` `<st c="7707">，</st>` `<st c="7772">ChatGPT API凭证被设置。这允许代码进行身份验证并访问ChatGPT
    API。</st>` `<st c="7805">此外，定义了一个名为</st>` `<st c="7805">model_ids</st>` `<st c="7814">的字典，用于存储各种ChatGPT模型的名称及其对应的模型ID，以及相关的成本。</st>`
    `<st c="7935">模型名称作为键，每个键都与一个包含模型ID和截至2024年5月的成本</st>` `<st c="8007">的字典配对。</st>`
    `<st c="8056">这使</st>` `<st c="8069">后续代码执行中能够根据模型名称轻松引用并选择特定的模型。</st>` `<st c="8182">您可以从</st>`
    `<st c="8230">此字典中添加和删除要测试的模型。</st>`
- en: <st c="8246">Then, we make the API calls to the ChatGPT models specified in
    the</st> `<st c="8314">model_ids</st>` <st c="8323">dictionary and store their</st>
    <st c="8351">respective responses.</st>
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="8246">然后，我们向</st>` `<st c="8314">model_ids</st>` `<st c="8323">字典中指定的ChatGPT模型进行API调用，并存储它们的</st>`
    `<st c="8351">相应响应。</st>`'
- en: <st c="8372">The code initializes an empty dictionary called</st> `<st c="8421">responses</st>`
    <st c="8430">to store the responses from the models.</st> <st c="8471">It then
    iterates over each item in the</st> `<st c="8510">model_ids</st>` <st c="8519">dictionary,
    where</st> `<st c="8538">model_name</st>` <st c="8548">represents the name of
    the model and</st> `<st c="8586">model_id</st>` <st c="8594">contains the corresponding</st>
    <st c="8622">model information.</st>
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="8372">代码初始化了一个名为</st>` `<st c="8421">responses</st>` `<st c="8430">的空字典，用于存储来自模型的响应。</st>`
    `<st c="8471">然后，它遍历</st>` `<st c="8510">model_ids</st>` `<st c="8519">字典中的每个条目，其中</st>`
    `<st c="8538">model_name</st>` `<st c="8548">代表模型的名称，而</st>` `<st c="8586">model_id</st>`
    `<st c="8594">包含相应的</st>` `<st c="8622">模型信息。</st>`'
- en: <st c="8640">The</st> `<st c="8645">client.chat.completions.create()</st>` <st
    c="8677">method is employed to simulate a conversation by providing a list of
    messages as input.</st> <st c="8766">The user, assistant, and prompt messages
    are included in the</st> `<st c="8827">messages</st>` <st c="8835">parameter,
    and the response from the API call is stored in the</st> `<st c="8899">response</st>`
    <st c="8907">variable.</st> <st c="8918">The total</st> <st c="8927">tokens that
    are used for the completion are printed.</st> <st c="8981">The generated text
    and the calculated</st> `<st c="9019">cost</st>` <st c="9023">based on token usage
    and the model’s cost are then</st> <st c="9074">added to the response’s dictionary
    using</st> `<st c="9116">model_name</st>` <st c="9126">as</st> <st c="9130">the
    key.</st>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="8640">使用</st>` `<st c="8645">client.chat.completions.create()</st>`
    `<st c="8677">方法通过提供消息列表作为输入来模拟对话。</st>` `<st c="8766">用户、助手和提示消息包含在</st>` `<st
    c="8827">messages</st>` `<st c="8835">参数中，API调用的响应存储在</st>` `<st c="8899">response</st>`
    `<st c="8907">变量中。</st>` `<st c="8918">打印出用于完成的总</st>` `<st c="8927">令牌数。</st>`
    `<st c="8981">然后，根据令牌使用情况和模型的成本计算出的</st>` `<st c="9019">成本</st>` `<st c="9023">被添加到响应字典中，使用</st>`
    `<st c="9116">model_name</st>` `<st c="9126">作为</st>` `<st c="9130">键。</st>`'
- en: <st c="9138">Finally, we print the responses and associated costs for each model,
    enabling us to compare them and make an informed decision on selecting the most</st>
    <st c="9288">suitable option.</st>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="9138">最后，我们打印每个模型的响应和相关成本，使我们能够进行比较，并做出明智的选择，选择最</st> <st c="9288">合适的选项。</st>
