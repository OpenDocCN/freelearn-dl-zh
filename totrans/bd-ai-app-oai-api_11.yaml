    c="2740">。</st>
- en: <st c="2741">In the next section, you will learn about various AI models, including
    GPT-3.5 and GPT-4, and develop the ability to select the most suitable model for
    your</st> <st c="2899">specific application.</st>
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2741">在下一节中，你将了解各种 AI 模型，包括 GPT-3.5 和 GPT-4，并培养选择最适合你</st> <st c="2899">特定应用</st>
    的能力。
