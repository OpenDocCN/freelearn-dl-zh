    size has increased to four elements.</st> <st c="17784">This will provide four
    alternative names for a cat, showcasing the increased diversity of responses obtained
    by increasing the</st> `<st c="17911">n</st>` <st c="17912">parameter.</st> <st
    c="17924">By modifying the value of</st> `<st c="17950">n</st>` <st c="17951">in
    the</st> `<st c="17959">generate_response</st>` <st c="17976">function, you can
    experiment with different numbers to explore a broader range of suggestions or</st>
    <st c="18073">generate more creative and varied responses from the</st> <st c="18127">ChatGPT
    model.</st>
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们的`<st c="17713">选择</st>` `<st c="17734">列表</st>` `<st c="17741">大小已增加到四个元素。</st>`
    `<st c="17784">这将提供四个不同的猫名，展示了通过增加`<st c="17911">n</st>` `<st c="17912">参数</st>`所获得的响应多样性的增加。</st>`
    `<st c="17924">通过修改`<st c="17950">n</st>` `<st c="17951">在`<st c="17959">generate_response</st>`
    `<st c="17976">函数中的值，您可以尝试不同的数字来探索更广泛的建议或`<st c="18073">从ChatGPT模型生成更多创意和多样化的响应。</st>`
- en: <st c="18141">By increasing</st> `<st c="18156">n</st>`<st c="18157">, you increase
    the diversity of the generated responses, allowing you to explore different perspectives,
    creative ideas, or alternative solutions to a given problem.</st> <st c="18323">However,
    it’s important to note that increasing</st> `<st c="18371">n</st>` <st c="18372">also
    increases the API cost and response time, so it’s a trade-off between diversity
    and efficiency.</st> <st c="18474">Therefore, if you’re looking for a more varied
    set of responses or seeking creative inspiration, increasing the</st> `<st c="18586">n</st>`
    <st c="18587">parameter can be a</st> <st c="18607">valuable approach.</st>
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过增加`<st c="18141">n</st>` `<st c="18156">，您增加了生成响应的多样性，这允许您探索不同的观点、创意想法或针对给定问题的替代解决方案。</st>`
    `<st c="18323">然而，需要注意的是，增加`<st c="18371">n</st>` `<st c="18372">也会增加API成本和响应时间，因此在多样性和效率之间是一个权衡。</st>`
    `<st c="18474">因此，如果您正在寻找更多样化的响应集或寻求创意灵感，增加`<st c="18586">n</st>` `<st c="18587">参数可以是一个有价值的方法。</st>`
- en: <st c="18625">The</st> `<st c="18630">messages</st>` <st c="18638">parameter
    plays a vital role in the GPT-3.5 Turbo model’s chat completion and allows for
    interactive and dynamic conversations with the model.</st> <st c="18782">This
    parameter enables you to simulate a conversation by providing a list of messages
    as input, where each message consists of a role (either “user” or “assistant”)
    and the content of</st> <st c="18966">the message.</st>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="18625">` `<st c="18630">messages</st>` `<st c="18638">参数在 GPT-3.5 Turbo
    模型的聊天完成中起着至关重要的作用，并允许与模型进行互动和动态的对话。</st>` `<st c="18782">此参数允许您通过提供消息列表作为输入来模拟对话，其中每个消息包含一个角色（“用户”或“助手”）和消息的内容。</st>`'
- en: <st c="18978">When utilizing the</st> `<st c="18998">messages</st>` <st c="19006">parameter,
    it is important to structure the conversation appropriately.</st> <st c="19079">The
    model uses the preceding messages to generate context-aware responses while considering
    the history</st> <st c="19183">of the conversation.</st> <st c="19204">This means
    that you can build upon previous messages to create engaging and interactive exchanges.</st>
    <st c="19303">Now, you can create a new file</st> <st c="19334">called</st> `<st
    c="19341">messages.py.</st>`
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用`<st c="18978">messages</st>` `<st c="18998">参数</st>`时，适当地构建对话结构非常重要。</st>
    `<st c="19079">该模型使用先前的消息来生成考虑对话历史</st>` `<st c="19183">的上下文感知响应。</st>` `<st c="19204">这意味着您可以通过构建先前的消息来创建引人入胜且互动的交流。</st>`
    `<st c="19303">现在，您可以创建一个名为</st>` `<st c="19334">messages.py</st>`的`
- en: <st c="19353">Here is an example code snippet demonstrating the usage of the</st>
    `<st c="19417">messages</st>` <st c="19425">parameter in GPT-3.5 Turbo</st> <st
    c="19453">chat completion:</st>
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="19353">以下是一个演示在 GPT-3.5 Turbo 聊天完成中使用` `<st c="19417">messages</st>`
    `<st c="19425">参数</st>`的代码片段示例：</st>'
- en: '[PRE6]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: <st c="20273">In the preceding code, we define the</st> `<st c="20311">chat_with_model</st>`
    <st c="20326">function, which takes the</st> `<st c="20353">messages</st>` <st
    c="20361">list as input.</st> <st c="20377">This function uses the</st> `<st c="20400">client.chat.completions.create</st>`
    <st c="20430">method to send a request to the GPT-3.5 Turbo model.</st> <st c="20484">The
    model parameter specifies the model to be used – in this case,</st> `<st c="20551">gpt-3.5-turbo</st>`<st
    c="20564">. The</st> `<st c="20570">messages</st>` <st c="20578">parameter is
    set to the defined list of</st> <st c="20619">conversation messages.</st>
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，我们定义了`<st c="20273">chat_with_model</st>` `<st c="20311">函数</st>`，它接受`<st
    c="20353">messages</st>` `<st c="20361">列表</st>`作为输入。</st> `<st c="20377">此函数使用</st>`
    `<st c="20400">client.chat.completions.create</st>` `<st c="20430">方法向 GPT-3.5
    Turbo 模型发送请求。</st>` `<st c="20484">模型参数指定要使用的模型 - 在这种情况下，</st>` `<st c="20551">gpt-3.5-turbo</st>`
    `<st c="20564">。` `<st c="20570">messages</st>` `<st c="20578">参数设置为定义的对话消息列表。</st>`
- en: <st c="20641">We create a conversation by providing</st> <st c="20679">a series
    of messages from both the user and the assistant.</st> <st c="20739">Each message
    includes the role (“user” or “assistant”) and the content of the message.</st>
    <st c="20826">The messages are structured in the order they occur in</st> <st
    c="20881">the conversation.</st>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '`<st c="20641">我们通过提供用户和助手的一系列消息来创建对话。</st>` `<st c="20679">每条消息包含角色（“用户”或“助手”）和消息的内容。</st>`
    `<st c="20739">消息按照它们在对话中出现的顺序进行结构化。</st>`'
- en: <st c="20898">By utilizing the</st> `<st c="20916">messages</st>` <st c="20924">parameter,
    you can have dynamic and interactive conversations with the GPT-3.5 Turbo model,
    making it suitable for applications such as chatbots, virtual assistants,</st>
    <st c="21091">and more.</st>
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用`<st c="20898">messages</st>` `<st c="20916">参数</st>`，您可以与 GPT-3.5 Turbo
    模型进行动态和互动的对话，使其适用于聊天机器人、虚拟助手等应用。
- en: <st c="21100">This section provided an overview of the parameters that are used
    in the ChatGPT API and their impact on response quality.</st> <st c="21224">It
    discussed the</st> `<st c="21241">temperature</st>` <st c="21252">parameter and
    the</st> `<st c="21271">n</st>` <st c="21272">parameter, which determines the
    number of alternative completions to generate for increased response diversity.</st>
    <st c="21385">We also learned about the</st> `<st c="21411">messages</st>` <st
    c="21419">parameter and how it enables dynamic and interactive conversations with
    the model, allowing for context-aware responses based on the</st> <st c="21553">conversation
    history.</st>
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 本节概述了在ChatGPT API中使用到的参数及其对响应质量的影响。<st c="21252">它讨论了</st> `<st c="21241">温度</st>`
    <st c="21252">参数和</st> `<st c="21271">n</st>` <st c="21272">参数，这些参数决定了为增加响应多样性而生成替代完成项的数量。</st>
    <st c="21419">我们还了解了</st> `<st c="21411">消息</st>` <st c="21419">参数以及它是如何使模型能够进行动态和交互式对话的，允许根据</st>
    <st c="21553">对话历史进行上下文感知的响应。</st>
- en: <st c="21574">In the next section, you will learn about the rate limits that
    are imposed on the ChatGPT API.</st> <st c="21670">You will also come to understand
    the limitations and restrictions associated with different AI models when making</st>
    <st c="21783">requests to</st> <st c="21796">the API.</st>
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，你将了解对ChatGPT API施加的速率限制。<st c="21670">你还将了解到在向API发起请求时，与不同AI模型相关的限制和约束。</st>
- en: <st c="21804">ChatGPT API rate limits</st>
  id: totrans-81
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT API速率限制
- en: <st c="21828">Rate limits play a crucial role in maintaining the stability and
    fairness of the ChatGPT API.</st> <st c="21923">Restrictions are placed</st> <st
    c="21947">on the number of requests and tokens that a user or client can access
    within a specific time frame.</st> <st c="22047">OpenAI implements rate limits
    for</st> <st c="22081">several reasons:</st>
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 速率限制在维护ChatGPT API的稳定性和公平性方面发挥着至关重要的作用。<st c="21947">对用户或客户端在特定时间段内可以访问的请求数量和令牌数量设置了限制。</st>
    <st c="22047">OpenAI实施速率限制的几个原因包括：</st>
- en: '**<st c="22097">Protection against abuse and misuse</st>**<st c="22133">: Rate
    limits help safeguard the API from malicious actors who may attempt to overload
    the system by flooding it with excessive requests.</st> <st c="22272">By setting
    rate limits, OpenAI can mitigate such activities and maintain the quality of service
    for</st> <st c="22372">all users.</st>'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="22097">防止滥用和误用</st>**<st c="22133">：速率限制有助于保护API免受恶意行为者的攻击，他们可能会通过发送过多的请求来试图超载系统。</st>
    <st c="22272">通过设置速率限制，OpenAI可以减轻此类活动，并维护所有用户的</st> <st c="22372">服务质量。</st>'
- en: '**<st c="22382">Ensuring fair access</st>**<st c="22403">: By throttling the
    number of requests a single user or organization can make, rate limits ensure
    that everyone has an equal opportunity to utilize the API.</st> <st c="22561">This
    prevents a few users from monopolizing the resources and causing slowdowns</st>
    <st c="22641">for others.</st>'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="22382">确保公平访问</st>**<st c="22403">：通过限制单个用户或组织可以发起的请求数量，速率限制确保每个人都有平等的机会使用API。</st>
    <st c="22561">这防止了少数用户垄断资源，从而对其他人造成</st> <st c="22641">减速。</st>'
- en: '**<st c="22652">Managing server load</st>**<st c="22673">: With rate limits,
    OpenAI can effectively manage the overall load on its infrastructure.</st> <st
    c="22764">By controlling the rate of incoming requests, the servers can handle
    the traffic more efficiently, minimizing performance issues and ensuring a consistent
    experience for</st> <st c="22934">all users.</st>'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="22652">管理服务器负载</st>**<st c="22673">：通过速率限制，OpenAI可以有效地管理其基础设施的整体负载。</st>
    <st c="22764">通过控制传入请求的速率，服务器可以更有效地处理流量，最小化性能问题，并确保所有用户都能获得一致的体验。</st>'
- en: <st c="22944">The rate limits can be</st> <st c="22968">measured as</st> **<st
    c="22980">requests per minute</st>** <st c="22999">(</st>**<st c="23001">RPM</st>**<st
    c="23004">) and</st> **<st c="23011">tokens per minute</st>** <st c="23028">(</st>**<st
    c="23030">TPM</st>**<st c="23033">).</st> <st c="23037">The default rate limits
    for the ChatGPT API vary</st> <st c="23086">depending on the model and account</st>
    <st c="23121">type.</st> <st c="23127">OpenAI offers five tiers to users, each
    of them having different rate limits.</st> <st c="23205">As you utilize the OpenAI
    API more frequently and invest more in their services, you are automatically upgraded
    to the next usage tier.</st> <st c="23341">This typically leads to higher rate
    limits across various models, as shown in</st> *<st c="23419">Table 11.2</st>*<st
    c="23429">:</st>
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="22944">速率限制可以</st> <st c="22968">测量为</st> **<st c="22980">每分钟请求次数</st>**
    <st c="22999">(</st>**<st c="23001">RPM</st>**<st c="23004">) 和</st> **<st c="23011">每分钟令牌数</st>**
    <st c="23028">(</st>**<st c="23030">TPM</st>**<st c="23033">)。</st> <st c="23037">ChatGPT
    API的默认速率限制根据模型和账户</st> <st c="23086">类型而异。</st> <st c="23121">OpenAI为用户提供五个等级，每个等级都有不同的速率限制。</st>
    <st c="23127">随着您更频繁地使用OpenAI API并更多投资于他们的服务，您将自动升级到下一个使用等级。</st> <st c="23341">这通常会导致各种模型上的速率限制提高，如</st>
    *<st c="23419">表11.2</st>*<st c="23429">所示：</st>
- en: '| **<st c="23431">TIER</st>** | **<st c="23435">QUALIFICATION</st>** | **<st
