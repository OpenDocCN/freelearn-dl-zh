- en: <st c="1745">By the end of this chapter, you will have gained knowledge on choosing
    the right ChatGPT API model for your project, understanding the process of creating
    chat completion contexts, optimizing API parameters, and navigating the limitations
    of different AI models to create transformative</st> <st c="2033">AI applications.</st>
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="1745">在本章结束时，您将了解如何为您的项目选择正确的ChatGPT API模型，理解创建聊天完成上下文的过程，优化API参数，以及导航不同AI模型的限制，以创建变革性的</st>
    <st c="2033">AI应用。</st>
