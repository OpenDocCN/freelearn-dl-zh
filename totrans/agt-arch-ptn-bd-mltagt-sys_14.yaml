- en: Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分
- en: 'Execution: Strategy, Use Cases, and The Future'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 执行：策略、用例和未来
- en: 'In this final part, you will bridge the gap between architectural theory and
    real-world application. You will begin by learning how to operationalize the patterns
    you’ve mastered, using a practical maturity roadmap to align technical implementation
    with organizational readiness. You will then step into a comprehensive, hands-on
    case study: building a loan processing system. You will follow the evolution of
    this system from a monolithic single-agent design to a robust multi-agent system,
    and, finally, implement these solutions using leading industry frameworks like
    Google ADK, CrewAI, and LangGraph. By the end of this part, you will have seen
    how abstract patterns translate into working code and will be equipped with a
    forward-looking perspective on the future of the agentic workforce.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节的最后一部分，你将弥合建筑理论与实际应用之间的差距。你将首先学习如何将你掌握的模型转化为可操作的形式，使用实用的成熟度路线图来确保技术实施与组织准备就绪相一致。然后，你将进入一个全面的、动手的案例研究：构建一个贷款处理系统。你将跟随这个系统的演变过程，从单体单代理设计到稳健的多代理系统，最后使用领先的行业框架，如Google
    ADK、CrewAI和LangGraph来实施这些解决方案。在本部分结束时，你将看到抽象模式如何转化为可工作的代码，并具备对未来代理工作力的前瞻性视角。
