- en: 'To successfully complete the hands-on examples in this chapter, you will need
    the following:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功完成本章的动手示例，你需要以下内容：
- en: '**A Google** **a****ccount**: This is required to access Google Colab and Google
    AI Studio.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个谷歌** **账户**：这是访问 Google Colab 和 Google AI Studio 所必需的。'
- en: '**Google** **Colab**: The code examples are designed to run in a Google Colab
    notebook, which provides a free, cloud-based Python environment. The examples
    are lightweight, so you do not need high-performance local hardware; a standard
    web browser will suffice.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谷歌** **Colab**：代码示例设计为在 Google Colab 笔记本中运行，它提供了一个免费、基于云的 Python 环境。示例轻量级，因此你不需要高性能的本地硬件；一个标准的网络浏览器就足够了。'
- en: '**Google AI Studio API** **k****ey**: You will need a valid API key to access
    the Gemini models used in the agent examples. You can obtain a key by following
    the documentation here: [https://ai.google.dev/gemini-api/docs/api-key](https://ai.google.dev/gemini-api/docs/api-key).'
  id: totrans-17
