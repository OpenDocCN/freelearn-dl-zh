- en: Setup and dependencies
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置和依赖
- en: 'The first idx_3a87781estep is to install the necessary libraries and import
    the required modules:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是安装必要的库和导入所需的模块：
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let''s briefly look at the key components we are importing, as they map directly
    to the agent anatomy we defined earlier:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要看看我们正在导入的关键组件，因为它们直接映射到我们之前定义的代理解剖结构：
- en: '`LlmAgent`: The core class representing our agent. It brings together the model,
    instructions, and tools into a cohesive unit.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`LlmAgent`: 代表我们代理的核心类。它将模型、指令和工具整合成一个统一的单元。'
- en: '`BuiltInPlanner` and `ThinkingConfig`: These components power the agent''s
    reasoning core. The planner manages the execution loop, while the configuration
    allows us to enable and control the agent''s internal thought process for observability.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`BuiltInPlanner`和`ThinkingConfig`: 这些组件为代理的推理核心提供动力。规划器管理执行循环，而配置允许我们启用和控制代理的内部思维过程，以便可观察。'
- en: '`FunctionTool`: The idx_28e8bf48wrapper that turns our standard Python functions
    into a toolbelt that the agent can understand and invoke.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`FunctionTool`: 将我们的标准Python函数转换为代理可以理解和调用的工具包的包装器。'
- en: '`Runner`and`InMemorySessionService`: These handle the state management and
    execution life cycle, managing the conversation history and context for our user
    session.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Runner`和`InMemorySessionService`: 这些处理状态管理和执行生命周期，管理用户会话的对话历史和上下文。'
- en: '**Standard** **l****ibraries** (`os`, `time`,`random`, and`uuid`): We use these
    to manage API keys, simulate latency in our tools, generate mock data, and create
    unique session identifiers.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准库** (`os`, `time`, `random`, 和 `uuid`): 我们使用这些来管理API密钥，模拟工具中的延迟，生成模拟数据，并创建唯一的会话标识符。'
