  zh: '13'
- en: 'Use Case: A Single Agent for Loan Processing'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用例：单一代理用于贷款处理
- en: In the preceding chapters, we have studied the foundational concepts of agentic
    AI, from the core anatomy of an agent, its key components and interactions, to
    the architectural patterns that enable it to perform complex tasks at various
    levels of sophistication as required by business or application need. We established
    a maturity model to guide the level of sophistication required for each stage
    of development and explored the design patterns that provide the blueprints for
    robust and scalable agentic systems. Now, it is time to transition from theory
    to practice.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们已经研究了代理人工智能的基础概念，从代理的核心结构，其关键组件和交互，到能够满足商业或应用需求的各种复杂程度执行复杂任务的架构模式。我们建立了一个成熟度模型来指导每个发展阶段所需的复杂程度，并探讨了提供稳健和可扩展代理系统蓝图的设计模式。现在，是时候从理论转向实践了。
- en: 'In this chapter we will begin our hands-on implementation, where we will build
    a complete agentic system to solve a real-world business problem: automating a
    loan origination pipeline. To provide the most valuable learning experience, we
    will tackle this challenge in two distinct phases, spanning this chapter and the
    next.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将开始我们的动手实现，我们将构建一个完整的代理系统来解决一个现实世界的商业问题：自动化贷款发放流程。为了提供最有价值的学习体验，我们将分两个不同的阶段来应对这个挑战，跨越本章和下一章。
- en: First, we will construct the entire system using a single, monolithic agent.
    Through this exercise, you will learn idx_2afad7achow to implement the ***Fractal
    Chain of Thought*** (***FCoT***) approach and pattern that we will use to structure
    the agent's reasoning and how to define a robust toolbelt that allows it to interact
    with the world. This will allow us to achieve initial success and demonstrate
    the core value of an agent-based approach.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将使用一个单一的、统一的代理来构建整个系统。通过这个练习，你将学习如何实现***分形思维链***（***FCoT***）方法和模式，我们将使用这些方法和模式来构建代理的推理结构，以及如何定义一个强大的工具包，使其能够与世界互动。这将使我们能够取得初步的成功，并展示基于代理方法的核心价值。
- en: 'However, we will not stop here at prototyping a solution: we will use this
    initial implementation to deliberately expose the architectural strains/possible
    shortcomings inherent in a single-agent design, specifically highlighting issues
    of cognitive overload and fault isolation when faced with production-level complexity.
    By identifying these specific "cracks in the foundation," we lay the necessary
    groundwork for *[Chapter 14](Chapter_14.xhtml#h1_664)*, where we will re-architect
    this system using a more robust, maintainable, and scalable multi-agent approach.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们不会止步于原型设计解决方案：我们将使用这个初步实现来故意暴露单一代理设计中固有的架构紧张/可能的缺点，特别是当面临生产级复杂性时，突出认知过载和故障隔离的问题。通过识别这些具体的“基础裂缝”，我们为*[第
    14 章](Chapter_14.xhtml#h1_664)*奠定了必要的基础，在那里我们将使用更稳健、可维护和可扩展的多代理方法来重新设计这个系统。
- en: 'In this chapter, we''ll be covering the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
