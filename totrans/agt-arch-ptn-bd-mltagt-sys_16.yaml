    a Google AI Studio API key; in production systems, we recommend using Google Vertex
    AI:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 您还需要设置一个API密钥。在这种情况下，我们将使用Google AI Studio API密钥；在生产系统中，我们建议使用Google Vertex
    AI：
- en: '[PRE1]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Not****e**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: We use the `gemini-``3``-flash` model in these examples for its speed and cost-efficiency,
    which is ideal for learning and experimentation. However, the landscape of LLMs
    is evolving rapidly.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些示例中，我们使用`gemini-3-flash`模型，因为它速度快且成本效益高，非常适合学习和实验。然而，LLM的领域正在迅速发展。
