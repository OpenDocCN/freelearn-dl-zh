- en: '13'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Use Case: A Single Agent for Loan Processing'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the preceding chapters, we have studied the foundational concepts of agentic
    AI, from the core anatomy of an agent, its key components and interactions, to
    the architectural patterns that enable it to perform complex tasks at various
    levels of sophistication as required by business or application need. We established
    a maturity model to guide the level of sophistication required for each stage
    of development and explored the design patterns that provide the blueprints for
    robust and scalable agentic systems. Now, it is time to transition from theory
    to practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter we will begin our hands-on implementation, where we will build
    a complete agentic system to solve a real-world business problem: automating a
    loan origination pipeline. To provide the most valuable learning experience, we
    will tackle this challenge in two distinct phases, spanning this chapter and the
    next.'
  prefs: []
  type: TYPE_NORMAL
- en: First, we will construct the entire system using a single, monolithic agent.
    Through this exercise, you will learn idx_2afad7achow to implement the ***Fractal
    Chain of Thought*** (***FCoT***) approach and pattern that we will use to structure
    the agent's reasoning and how to define a robust toolbelt that allows it to interact
    with the world. This will allow us to achieve initial success and demonstrate
    the core value of an agent-based approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, we will not stop here at prototyping a solution: we will use this
    initial implementation to deliberately expose the architectural strains/possible
    shortcomings inherent in a single-agent design, specifically highlighting issues
    of cognitive overload and fault isolation when faced with production-level complexity.
    By identifying these specific "cracks in the foundation," we lay the necessary
    groundwork for *[Chapter 14](Chapter_14.xhtml#h1_664)*, where we will re-architect
    this system using a more robust, maintainable, and scalable multi-agent approach.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we''ll be covering the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The challenge: a high-stakes workflow'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Guiding the agent's mind using the FCoT framework
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Designing a monolithic agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building the agent in a Colab notebook
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Execution and analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Moving from Level 5 to 6: a roadmap for improvement'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To successfully complete the hands-on examples in this chapter, you will need
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A Google** **a****ccount**: This is required to access Google Colab and Google
    AI Studio.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google** **Colab**: The code examples are designed to run in a Google Colab
    notebook, which provides a free, cloud-based Python environment. The examples
    are lightweight, so you do not need high-performance local hardware; a standard
    web browser will suffice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google AI Studio API** **k****ey**: You will need a valid API key to access
    the Gemini models used in the agent examples. You can obtain a key by following
    the documentation here: [https://ai.google.dev/gemini-api/docs/api-key](https://ai.google.dev/gemini-api/docs/api-key).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Python** **l****ibraries**: The examples rely on the `google-``adk` library
    and other standard Python idx_55aa0ffepackages. We selected Google **Agent Development
    Kit** (**ADK**) for this implementation because it offers a production-first architecture
    that natively supports the structured reasoning and strong typing required for
    the ***F******C******oT*** pattern. The notebook includes the necessary commands
    to install these dependencies directly within the environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The complete code for this chapter, including the runnable notebooks and helper
    scripts, is available in the book''s GitHub repository: [https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems/tree/main/Chapter_13](https://github.com/PacktPublishing/Agentic-Architectural-Patterns-for-Building-Multi-Agent-Systems/tree/main/Chapter_13).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The challenge: a high-stakes workflow'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A loan origination idx_be8dcd6dpipeline is an ideal use case for an agentic
    system because it is not a single task, but a sequence of complex stages, each
    with its own logic, data requirements, and potential for failure. To appreciate
    the challenge, let's break down the typical workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Stage** | **Description** | **Key** **c****hallenge for** **a****utomation**
    |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1\. Document intake and validation | Receiving the application and ensuring
    that all supporting documents (e.g., income verification) are complete and valid
    | Note: All relevant documents have been provided; we will not deal with the actual
    intake , OCR, etc., in this example.Handling various document formats, identifying
    missing information, and applying business rules for completeness |'
  prefs: []
  type: TYPE_TB
- en: '| 2\. Credit check | Interacting with external credit bureau APIs to pull the
    borrower''s credit history and score | Securely handling credentials, parsing
    varied API responses, and gracefully handling network errors or API downtime |'
  prefs: []
  type: TYPE_TB
- en: '| 3\. Risk assessment | Applying internal business logic and dynamic risk-scoring
    models based on all gathered financial data | Executing complex, often non-linear
    logic that synthesizes multiple data points (not just a simple `if/then` rule)
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4\. Compliance review | Auditing the process to ensure that it idx_aa6a6851adheres
    to all relevant regulations, such as the **Equal Credit Opportunity Act** (**ECOA**)
    | Maintaining an auditable trail of the decision-making process and ensuring no
    protected attributes influenced the outcome |'
  prefs: []
  type: TYPE_TB
- en: '| 5\. Final decision and generation | Synthesizing all information to make
    a final approve/deny decision and generating the necessary documentation | Creating
    a coherent, human-readable justification for the decision based on the entire
    preceding workflow |'
  prefs: []
  type: TYPE_TB
- en: Table 13.1 – Stages of a loan origination workflow
  prefs: []
  type: TYPE_NORMAL
- en: Attempting to automate idx_0ca83b9cthis with traditional scripts would create
    a brittle, hard-to-maintain system. Traditional automation relies on rigid, predefined
    rules that break easily when faced with unstructured data, such as varying document
    formats or ambiguous applicant details. To handle every possible exception, developers
    would need to write and maintain an endless web of `if/then` logic, which quickly
    becomes unmanageable. Instead, the workflow requires dynamic reasoning to handle
    exceptions gracefully, structured planning to adapt execution steps based on context,
    and the ability to generate a clear, auditable trail for its decisions. This is
    where agentic AI shines.
  prefs: []
  type: TYPE_NORMAL
- en: Guiding the agent's mind using the FCoT framework
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To ensure that our agent operates with the rigor required for this financial
    task, we will equip it with a sophisticated idx_21701af9cognitive framework built
    upon the ***Fractal*** ***C******hain-of-******T******hought*** (***FCoT***) approach
    and pattern. We will initially craft a prompt that embodies the principles of
    FCoT. This FCoT prompt will act as the agent's internal "operating system," providing
    a formal structure for its mission, constraints, and reasoning process. It is
    the constitution that will govern the agent's actions.
  prefs: []
  type: TYPE_NORMAL
- en: In complex, multi-step business processes such as our loan origination workflow,
    simpler agents often suffer from goal drift, a behavioral failure where the agent
    gradually deviates from its original objective idx_91cee3b4as the task progresses.
    This drift is frequently caused by a well-documented technical limitation known
    as the "lost in the middle" phenomenon, where LLMs struggle to recall critical
    constraints or instructions buried deep within a long context window. The ***FCoT***
    pattern is a powerful technique designed specifically to combat both issues by
    enforcing a rigid, self-correcting structure on the agent's reasoning, ensuring
    that it constantly refers back to its core mission and constraints regardless
    of the context length.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conceptually, the ***FCoT*** pattern is composed of two primary elements, which
    we will implement in our agent''s instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: First is the **i****nstruction** **c****ontract** (**IC**), which idx_ef91f69fserves
    as the agent's immutable source of truth. It formally defines the agent's mission,
    the exact deliverables it must produce, and the safety and compliance guardrails
    it must never violate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second idx_d794c08aelement is the **r****ecursive** **l****oop**, which
    defines the agent's active thinking process. This structure compels the agent
    to iterate through cycles of planning its actions, executing them, and most importantly,
    **verifying** its work and reasoning against the IC at every stage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When we build our agent's mind around using our ***FCoT*** approach, implemented
    by the FCoT pattern, we are laying a foundation for reliable and auditable behavior.
    With this cognitive core in mind, we can now move on to defining the high-level
    architecture for our monolithic system.
  prefs: []
  type: TYPE_NORMAL
- en: Designing a monolithic agent
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: After we have idx_8ebd2c2cdefined the business problem and the sophisticated
    ***FCoT*** framework that will guide our agent's reasoning, we can proceed with
    its architectural design. For this first implementation, we will adopt a monolithic
    approach. This means a single, highly capable agent will be responsible for executing
    the entire loan origination workflow from start to finish.
  prefs: []
  type: TYPE_NORMAL
- en: This design pattern is common in the initial stages of agentic development (reflecting
    Level 3 of our Agentic AI Levels). While the preceding chapters focused on foundational
    capabilities such as prompting and basic workflows (Levels 1 and 2), we are now
    stepping up to full agentic autonomy through introspective reasoning and self-correction.
    This approach concentrates all the logic, tools, and state management into one
    centralized component. The agent's primary task is to follow its internal FCoT
    prompt, sequentially invoking the right idx_22573888tools at the right time to
    move the loan application through the pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our monolithic agent will be composed of three essential parts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The** **FCoT****r****easoning** **c****ore**: The idx_fed3bedcFCoT prompt
    we introduced in the previous section will serve as the agent''s "brain."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State** **m****anagement**: The idx_8de5c555agent needs a way to track the
    status of the loan application as it progresses. `Runner` and `SessionService`
    in ADK will handle this for us.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The** **t****oolbelt**: To interact idx_533a014bwith the outside world, the
    agent requires a toolbelt, which is a collection of functions it can call.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The overall architecture is straightforward: the agent, guided by its FCoT
    core, uses its tools to gather and process information until it can make a final
    decision.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 1](img/B33147_13_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.1 – Architectural diagram of the monolithic loan processing agent
  prefs: []
  type: TYPE_NORMAL
- en: With our architectural blueprint and cognitive framework in place, we are ready
    to translate these concepts into working code. In the following sections, we will
    build this monolithic agent step by step idx_3e4b0930using Python and Google ADK.
    We will begin by setting up the environment, defining our specialized tool functions,
    configuring the agent's FCoT instructions, and finally, executing test scenarios
    to verify its performance.
  prefs: []
  type: TYPE_NORMAL
- en: Building the agent in a Colab notebook
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We will now implement our monolithic loan processing agent using Google ADK
    in a Jupyter/Colab idx_707d8de4Notebook format. This will provide a clear, step-by-step,
    and runnable example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before writing any code, we need to initialize our development environment:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to Google Colab ([colab.research.google.com](https://colab.research.google.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on **File** | **New** **n****otebook**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: (Optional) Rename the notebook to `Chapter13_Monolithic_Agent.ipynb`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once your environment is ready, the first step is to install the necessary libraries
    and import the required modules. Copy the following code into the first cell of
    your notebook and run it.
  prefs: []
  type: TYPE_NORMAL
- en: Setup and dependencies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first idx_3a87781estep is to install the necessary libraries and import
    the required modules:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Let''s briefly look at the key components we are importing, as they map directly
    to the agent anatomy we defined earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '`LlmAgent`: The core class representing our agent. It brings together the model,
    instructions, and tools into a cohesive unit.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`BuiltInPlanner` and `ThinkingConfig`: These components power the agent''s
    reasoning core. The planner manages the execution loop, while the configuration
    allows us to enable and control the agent''s internal thought process for observability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`FunctionTool`: The idx_28e8bf48wrapper that turns our standard Python functions
    into a toolbelt that the agent can understand and invoke.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Runner`and`InMemorySessionService`: These handle the state management and
    execution life cycle, managing the conversation history and context for our user
    session.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Standard** **l****ibraries** (`os`, `time`,`random`, and`uuid`): We use these
    to manage API keys, simulate latency in our tools, generate mock data, and create
    unique session identifiers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You will also need to set up an API key. In this case, we are going to use
    a Google AI Studio API key; in production systems, we recommend using Google Vertex
    AI:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Not****e**'
  prefs: []
  type: TYPE_NORMAL
- en: We use the `gemini-``3``-flash` model in these examples for its speed and cost-efficiency,
    which is ideal for learning and experimentation. However, the landscape of LLMs
    is evolving rapidly.
  prefs: []
  type: TYPE_NORMAL
- en: 'When building your own agents, we strongly recommend checking for the latest
    available models to ensure that you are using the most capable and efficient version.
    You can find the current idx_64167ab3list of available models in the Google AI
    Studio documentation: [https://ai.google.dev/models/gemini](https://ai.google.dev/models/gemini).'
  prefs: []
  type: TYPE_NORMAL
- en: Now, let's define the tools that will be used by our agent.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An agent's ability to reason is only as powerful as its ability to act. The
    toolbelt is the critical component idx_970d7ce8that bridges the agent's cognitive
    processes to the real world, allowing it to perform tasks, gather information,
    and effect change.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this specific implementation, we will equip our agent with four specialized
    tools designed to simulate the key stages of the loan origination workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '`validate_document`: Simulates the document intake process by checking whether
    the required document IDs are present in the application.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`run_credit_check`: Simulates a request to a credit bureau. It returns a realistic
    credit score and report summary, using a short delay (`time.sleep``()`) to mimic
    real-world network latency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`assess_risk`: Simulates the bank''s internal underwriting logic, determining
    a risk level (`low`, `medium`, or `high`) based on the credit score and loan amount.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`check_compliance`: Simulates a regulatory audit, verifying that the risk assessment
    and decision-making process adhere to fair lending guidelines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By implementing these as simple Python functions with mock data, we can create
    a fully functional, self-contained example. This allows us to focus entirely on
    the agent's orchestration and reasoning logic without the complexity of managing
    live API keys or external service dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: '**Production** **n****ote**'
  prefs: []
  type: TYPE_NORMAL
- en: In a real-world deployment, these function signatures would remain largely the
    same, but their internal logic would change. Instead of returning mock strings,
    they would act as wrappers for complex operations, calling internal document management
    systems, third-party APIs, or communicating idx_1cdc80e4with other services via
    the **Model Context Protocol** (**MCP**).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we define our four specialized tools as Python functions and then wrap
    them in ADK''s `FunctionTool` class. This wrapper makes the function''s description
    and parameters available to the agent''s LLM core:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Production** **t****ip: Strong** **t****yping for** **data cont****racts**'
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we use simple Python dictionaries for tool outputs to keep
    the code accessible and focused idx_97752948on the agent's logic. However, in
    a real-world financial system, strongly typed data structures are essential for
    reliability.
  prefs: []
  type: TYPE_NORMAL
- en: When building for production, consider using libraries such as Pydantic to define
    rigorous data models (e.g., `class` `RiskAssessmentResult``(``BaseModel``)`).
    This enforces schema validation, prevents data type errors, and serves as a strict
    "data contract" between your agents, ensuring that downstream components always
    receive exactly the data structure they expect.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let's configure our agent's system instructions.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the agent's mind
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the idx_95ed80cbtools ready, we can assemble the agent itself. A critical
    idx_55810ba8part of this is defining the agent's instructions. The following prompt
    is much more than a simple set of commands; it is a direct implementation of the
    ***FCoT*** pattern, which serves as the master pattern for the agent's entire
    reasoning process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let''s dissect this prompt to see how ***FCoT*** and other crucial design patterns
    are put into practice:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Pattern** **i****nsight: Semantic** **g****uardrails v****ersus****p****rogrammatic**
    **e****valuation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'You might idx_94572363notice the success criteria (e.g., `Latency` `<` `5 min`)
    and deliverables listed in the prompt. A common question is: *Does the Python
    code enforce this?*'
  prefs: []
  type: TYPE_NORMAL
- en: In this idx_6b2877a7Level 3 monolithic design, these are semantic guardrails.
    They are not external Python assertions but instructions for the LLM's internal
    reasoning idx_d637afbfengine. By explicitly listing `Accuracy` and `Policy` `c``ompliance`
    as success criteria, we force the model to consider these factors during its `VERIFY`
    steps in the FCoT loop.
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, the model uses these instructions to self-correct (e.g., "I need to
    be concise to keep latency low"). In a Level 5 or production system, we would
    pair these prompts with a real external evaluation harness (using tools such as
    DeepEval or Ragas) to programmatically enforce these metrics, moving from *in-context*
    verification to *system-level* governance.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pattern** **insight: cognitive control v****ersus** **code contr****ol**'
  prefs: []
  type: TYPE_NORMAL
- en: The instruction `FCoT` `RECURSIVE LOOP (N = 3)` is a prime example of cognitive
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: It is important idx_e6a377aato note that `N=3` is not a Python parameter idx_b24f6dbdpassed
    to `BuiltInPlanner`. Instead, it is a semantic instruction to the LLM to iterate
    over three repetitions. We are effectively programming the model in English, directing
    it to structure its internal reasoning process into three distinct iterations
    (planning, execution, and verification), each with its own objective functions,
    before considering the task complete.
  prefs: []
  type: TYPE_NORMAL
- en: While the Python code (`thinking_budget``=1024`) sets the resource limits (how
    many tokens it can use), the prompt defines the algorithm (how it should use them).
  prefs: []
  type: TYPE_NORMAL
- en: '**Concept** **n****ote: Explainable AI (XAI) and SHAP**'
  prefs: []
  type: TYPE_NORMAL
- en: 'In Iteration 3, in the section `REASON: Summarize SHAP values, create narrative
    justification`, you will idx_c319c81cnotice the instruction refers to **SHapley**
    **Additive** **exPlanations** (**SHAP**) values. This idx_9e449b15is a standard
    method in data science for interpreting ML models. This method assigns a numerical
    value to each feature (e.g., `Credit Score` or `Debt-to-Income`) to quantify exactly
    how much it contributed to a specific prediction.'
  prefs: []
  type: TYPE_NORMAL
- en: In a hybrid agentic architecture, we often see a powerful pattern.
  prefs: []
  type: TYPE_NORMAL
- en: 'Traditional ML (the tool) performs the precise risk calculation and generates
    raw SHAP values (e.g., `Credit Score: -0.45 contribution`).'
  prefs: []
  type: TYPE_NORMAL
- en: GenAI (the agent) acts as the narrator. It takes these dry, mathematical values
    and translates them into a coherent, human-readable justification for the customer
    (e.g., "Your application was primarily impacted by your credit score...").
  prefs: []
  type: TYPE_NORMAL
- en: By including idx_0f9c4692the instruction `Summarize SHAP values` in the prompt,
    we prepare the agent to handle the rich payloads typically returned by financial
    models. In our code, you will see this manifested in the `explainability_report`
    section of the final JSON output. The agent isn't just reciting a result; it is
    synthesizing the *why* behind the *what*, satisfying the transparency requirements
    of **Level** **4** and **5** systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'This instruction prompt is composed of two primary sections: `INSTRUCTION CONTRACT`
    and `FCoT` `RECURSIVE LOOP`. Each section applies specific design patterns to
    ensure that the agent is reliable, safe, and aligned with its mission.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The instruction contract: implementing governance and safety'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The entire `INSTRUCTION CONTRACT` block is a direct implementation of the IC
    pattern. It establishes idx_69998f3ba fixed, non-negotiable set of rules, goals,
    and constraints that govern the agent's behavior, preventing "goal drift" and
    ensuring its actions are always auditable and aligned with business objectives.
  prefs: []
  type: TYPE_NORMAL
- en: 'Within the IC, we can identify several other patterns at play:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Guardrails** **p****attern**: The `Hard Constraints` and `Safety Policy`
    sections are a clear application of this pattern. Instead of hoping the agent
    behaves, we are building explicit, non-negotiable rules into its core identity.
    In our specific prompt, we establish these boundaries through the following directives:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Must follow Fair Lending & ECOA regulations` is a compliance guardrail.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Reject` `speculative or hallucinated data` is a safety guardrail that promotes
    factual grounding'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human-in-the-Loop** **p****attern**: The line `Defer ambiguous cases to Human-in-the-Loop
    agent` explicitly defines the escalation path. This is a critical pattern for
    enterprise idx_95831294applications, ensuring that the agent knows when it has
    reached the limit of its capabilities and needs to ask for help.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explainability and Audit Trail** **p****attern**: This pattern is instantiated
    in the `Deliverables` section. The agent is not just asked for a final decision;
    it is mandated to produce the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`(c) justification citing verified data`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`(d) compliance audit record`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`(e) explainability report`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This forces the agent to show its work, providing the necessary transparency
    and traceability required in a regulated industry such as finance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The recursive loop: implementing planning and verification'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This section is the "engine" of the ***FCoT*** pattern. It forces the agent
    to think in a structured, iterative idx_5ade7c45cycle of reasoning and self-verification,
    rather than trying to solve the entire problem in one go. Let''s examine how this
    iterative structure instantiates key agentic patterns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task** **d****ecomposition (****p****lanner)** **p****attern**: In `Iteration
    1 (Planning)`, the instruction `REASON: Design DAG of actions` is a direct implementation
    of this pattern. The agent is compelled to first break down the complex mission
    into a sequence of smaller, manageable subtasks (a directed acyclic graph) before
    it begins execution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool** **u****se** **p****attern**: `Iteration 2 (Execution)` is where the
    agent actively uses its tools (`execute tools for credit scoring & data validation`).
    The FCoT structure ensures that tool use is not random but is part of a deliberate,
    pre-planned sequence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-****c****orrection and** **v****erification**: The `VERIFY` step in
    *every single iteration* is the most powerful feature of the ***FCoT*** pattern:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the planning phase, it verifies that the *plan itself* is compliant
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the execution phase, it verifies that the *reasoning* is sound (`Check causal
    alignment`)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the final phase, it verifies that the *output* is coherent and fulfills all
    aspects of the IC
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: By engineering this prompt, we have woven a safety net of patterns that guide
    the agent toward a correct, safe, and verifiable outcome. This pattern-based approach
    to prompt design is a hallmark idx_6ab374e4of moving from experimental agents
    to production-grade agentic systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'We are now ready to instantiate the agent object itself. This setup process
    involves three critical configuration steps that translate our architectural design
    into executable code:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Configuring the** **p****lanner (****t****he** **r****easoning** **e****ngine)**:
    We initialize `BuiltInPlanner` with `ThinkingConfig`. Crucially, we set `include_thoughts``=True`.
    This is what enables observability. It forces the agent to expose its internal
    monologue (the FCoT process) in the output, allowing us to debug its reasoning
    logic rather than just seeing the final result.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assembling the** **t****oolbelt**: We aggregate our four `FunctionTool` objects
    into a single list. This explicitly defines the agent''s action space; it can
    only perform the actions listed here.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Instantiating the** **a****gent**: Finally, we create the `LlmAgent` object.
    This is the integration step that binds together the specific *m**odel* (Gemini),
    the *c**ognitive* *c**ore* (`agent_instructions``)`, the *p**lanner*, and the
    *t**oolbelt* into a single, runnable entity.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Now, let''s explore the agent setup:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: With the idx_9d3ac295system instructions and the agent initialized, let's run
    two sample prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Execution and analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'With the agent''s cognitive core and toolbelt fully assembled, we now move
    to the final phase: bringing it to life. In idx_141a7979this section, we will
    instantiate the execution environment and run specific test scenarios.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Our primary goal here is observability. We do not just want to know whether
    the agent approves or denies a loan; we want to see how it reaches that conclusion.
    We need to verify that it does the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Respects the FCoT structure (planning, executing, and verifying)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintains state across multiple steps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gracefully handles both qualified applicants and high-risk cases
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To do this, we will set up an ADK runner to manage the session life cycle and
    define a helper function, `call_agent`, to print a clean, filtered log of the
    agent''s "thoughts" and tool interactions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: While `Runner` handles the execution, the raw output from the LLM can be dense
    and difficult to read. To truly understand our agent's reasoning, we need to extract
    and format specific parts of the conversation, specifically, its internal "thoughts"
    and "tool calls."
  prefs: []
  type: TYPE_NORMAL
- en: 'The following function, `call_agent`, acts as our observability layer. It runs
    the user''s query and filters the idx_4872f343event stream to print a clean, readable
    log of the ***F******CoT*** process:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Our implementation idx_3ce4e836of `call_agent` includes a professional error
    handling block. This is critical because, in the real world, a `429 Rate Limit`
    error shouldn't just be a cryptic Python traceback; it should be a diagnostic
    message that tells the operator exactly what happened and how to fix it (e.g.,
    "Wait 24 Hours" or "Enable Billing").
  prefs: []
  type: TYPE_NORMAL
- en: Running the happy path
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, we begin idx_15743177our testing. In software engineering, the **h****appy**
    **p****ath** refers to idx_0a18426fa scenario where the input is valid, no exceptions
    occur, and the system produces a successful, positive outcome.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our goal here is idx_3d25cfa5to verify the baseline functionality of the agent.
    We want to confirm the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The agent correctly interprets a standard, well-qualified loan application
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It triggers the tools in the correct order (validation → credit → risk → compliance)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It produces an approval decision without hallucinating obstacles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once we confirm that this core logic works, we will then move on to testing
    a rejection scenario (the unhappy path) in the next step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Now that we have dispatched the request, let's look at the result. We are not
    just looking for a final `Approved` message; we are looking for proof of reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing the output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following output, generated by our `call_agent` helper, provides a transparent
    view into the agent''s idx_12e418aeFCoT. As you read through the log, pay close
    attention to how the agent explicitly plans its approach in the `THOUGHT` block
    before it ever touches a tool. This is the *Reasoning* phase of the ***FCoT***
    pattern in action, preventing the agent from rushing to a hallucinated conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Outcome analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The preceding idx_f9cda0a9filtered output demonstrates that our monolithic agent
    is functional. It successfully reasoned through the steps, executed the plan,
    and resulted in an `Approved` decision.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let's test how it handles failure.
  prefs: []
  type: TYPE_NORMAL
- en: 'Running the exception path: handling rejection'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, we test the system's robustness. A loan agent isn't useful if it approves
    everyone; it must be able to idx_2bf61700detect risk and make difficult decisions
    while maintaining compliance.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this idx_7be35d9dscenario, we introduce `Borrower-400`, an applicant with
    a compromised credit history. We want to verify that the agent does the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Correctly identifies the low credit score
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Triggers a `High` risk assessment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Still performs the compliance check (crucial for Fair Lending laws)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generates a denial with a clear, fact-based justification
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To observe how the agent navigates these constraints under pressure, we will
    execute the following code block to initiate the rejection workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Observing the agent's critical reasoning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following idx_0594da65output demonstrates the agent handling a negative
    scenario. Pay particular attention to `Iteration 3 (Verification & Explainability)`.
    Even though the loan is denied, the agent produces a detailed *Explainability
    Report* citing the specific data points (`Score 450\`) that led to the decision.
    This is idx_960cb94fthe ***Audit Trail*** pattern in action:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Outcome analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This test idx_6677493cconfirms that our monolithic agent is not just a "yes
    man." It successfully ingested data from the `run_credit_check` tool, reasoned
    that a score of `450` constituted high risk, and correctly denied the loan. Crucially,
    it still ran the `check_compliance` tool, ensuring that the process of denial
    was just as rigorous as the process of approval.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have tested our first agent, let's analyze this architecture and
    the opportunities for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moving from Level 5 to 6: a roadmap for improvement'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The single-agent system we have built is a great success and a powerful example
    of a Level 5 implementation idx_0a62c59fon our Agentic AI Levels. It is a complete,
    autonomous solution that correctly follows a complex instruction set to solve
    a business problem, using a toolbelt to act upon its environment. Reaching this
    stage marks a significant step in maturity of the solution and can be used to
    deliver tangible business value.
  prefs: []
  type: TYPE_NORMAL
- en: By analyzing our successful Level 3 design, we can use the Agentic AI Levels
    as a roadmap to identify opportunities for evolving this implementation into a
    more robust and scalable **Level 4** system, and eventually toward the self-correcting
    swarms of Level 6\. The following opportunities are not weaknesses of the current
    design, but rather the specific architectural enhancements required to advance
    to the next level of agentic maturity, unlocking greater resilience, maintainability,
    and complexity handling.
  prefs: []
  type: TYPE_NORMAL
- en: Enhancing robustness and resilience
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A key characteristic of our monolithic Level 3 system is that the agent itself
    represents a single point of idx_3c344563failure. In our "happy path" test, the
    agent's logic was sound, and the execution was flawless. However, in a real-world
    production environment, external systems can be unreliable. For example, if the
    API call within our `run_credit_check` tool failed due to a temporary network
    issue, the entire agent's execution would halt with an unhandled error. The agent's
    design does not account for transient failures in its dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: The path to a more resilient, Level 4 architecture lies in applying the principle
    of **fault isolation**. Instead of the single agent being responsible for all
    external calls, we can introduce specialized agents to encapsulate the risk of
    dependency failures.
  prefs: []
  type: TYPE_NORMAL
- en: In a multi-agent system, a dedicated `CreditCheckAgent` would be solely responsible
    for this interaction. This specialist agent could be built with its own internal
    error-handling logic, such as an automatic retry mechanism with exponential backoff.
    If the `CreditCheckAgent` ultimately fails, the error is contained within that
    specific sub-system, allowing the main orchestrator to decide on a fallback plan
    rather than crashing the entire workflow.
  prefs: []
  type: TYPE_NORMAL
- en: The orchestrating agent is decoupled from the direct failure. If the `CreditCheckAgent`
    ultimately fails after several retries, the orchestrator can make a high-level
    strategic decision, such as invoking a backup credit bureau tool or escalating
    the entire case by applying the ***Human-in-the-Loop*** pattern. This idx_59383312prevents
    a single tool failure from bringing down the entire business process.
  prefs: []
  type: TYPE_NORMAL
- en: Improving maintainability through specialization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As we idx_e9f41aefsaw in our implementation, the core logic of our Level 3
    agent is contained within the `agent_instructions` variable. This FCoT prompt
    is a powerful, centralized artifact, but it mixes multiple business concerns:
    document validation rules are in the same instruction set as risk assessment policies
    and compliance checks. As the business evolves, these rules will inevitably change.
    A request from the credit risk department to update their scoring logic would
    require a developer to carefully edit this large, complex prompt, carrying a significant
    risk of accidentally disrupting the compliance or validation logic.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Advancing to **Level** **4** involves applying the design principle of separation
    of concerns. We can dramatically idx_276021faimprove maintainability by decomposing
    our single agent into a team of specialists, each with its own focused instruction
    set, as shown in these examples:'
  prefs: []
  type: TYPE_NORMAL
- en: A `RiskAssessmentAgent` would have a much shorter, simpler prompt focused exclusively
    on risk analysis. This agent could be owned and updated independently by the credit
    risk team.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A `ComplianceAgent` would be governed by instructions defined and maintained
    by the legal and compliance department.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This modularity, a key feature of the multi-agent patterns we will explore,
    allows different parts of the system to evolve independently and safely, which
    is a core tenet of modern, agile software engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Scaling to greater complexity with modularity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our agent's FCoT instruction prompt works exceptionally well for the defined
    four-step process. However, a single idx_0def17feLLM has a finite cognitive capacity.
    If we needed to expand our workflow to 10 or 15 steps by adding the `FraudDetection`,
    `CollateralValuation`, and `InsuranceVerification` stages, our single `agent_instructions`
    prompt would become extremely long and complex. This increases the risk of the
    "lost in the middle" problem, where an LLM can lose track of earlier instructions
    buried in a long context window.
  prefs: []
  type: TYPE_NORMAL
- en: A Level 5 multi-agent system solves this scaling challenge through division
    of cognitive labor, much like a well-run human team.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, an `OrchestratorAgent`, an idx_d81506e9implementation of the ***Supervisor***
    pattern, does not need to know the intricate details of fraud detection; it only
    needs to know when to delegate a task to the `FraudDetectionAgent`. Instead, each
    specialist agent works with a shorter, simpler prompt that is hyper-focused on
    its specific domain. This reduces the cognitive load and allows each agent to
    perform its task with higher accuracy and reliability.
  prefs: []
  type: TYPE_NORMAL
- en: This modular, plug-and-play architecture allows us to easily add new capabilities
    to the system, such as a new `InsuranceVerificationAgent`, without increasing
    the complexity of the existing components, enabling the system to scale gracefully.
    However, realizing this in practice requires enforcing standardized message schemas
    and shared state objects (data contracts), ensuring that new agents can seamlessly
    interoperate with the existing ecosystem without requiring custom integration
    logic.
  prefs: []
  type: TYPE_NORMAL
- en: Our deep dive into the monolithic agent is now complete. We have progressed
    from defining a complex business problem to architecting a solution, implementing
    it with ADK, and observing its successful operation.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, by analyzing our agent through the lens of the Agentic AI Levels,
    we have not only idx_d2ed9ab3validated our work as a significant Level 3 achievement
    but also illuminated the path toward an even more sophisticated **Level** **4**
    architecture. Before we conclude this chapter and prepare for the next step, let's
    consolidate the key lessons from this practical journey.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we undertook the practical journey of building a complete,
    autonomous agent from the ground up. We began with a real-world business challenge
    (loan processing) and progressed through architectural design, implementation
    using ADK, and finally, execution and analysis.
  prefs: []
  type: TYPE_NORMAL
- en: The result is a functional Level 3 agent that successfully uses a sophisticated
    cognitive framework and a toolbelt to complete a complex, multi-step task.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key takeaways from this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pattern-****driven design is key to r****eliability**: An effective agent
    is not merely prompted; it is engineered. By building our agent''s instructions
    on the ***FCoT*** pattern, we embedded principles of planning, safety, and explainability
    directly into its core, ensuring its behavior was both reliable and transparent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools are the** **bridge to the real w****orld**: An agent''s capabilities
    are defined by its tools. We saw how standard Python functions, when properly
    described and wrapped with ADK''s `FunctionTool` object, become the agent''s hands,
    allowing it to act upon its environment, call external APIs, and make decisions
    based on real data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Observability is** **non-negoti****able**: An agent''s reasoning should not
    be a black box. Using ADK''s `ThinkingConfig` parameter to expose the agent''s
    internal monologue is crucial for debugging, establishing trust, and ensuring
    that the agent''s actions are aligned with its instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The** **monolithic agent is a valuable miles****tone**: The single-agent
    architecture we built is a powerful and necessary step in the agentic maturity
    journey. It is often the fastest way to deliver an end-to-end autonomous solution
    and serves as the perfect foundation upon which more complex, resilient, and scalable
    systems can be built.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Our successful Level 3 agent provides immense value, and the architectural opportunities
    we identified for greater robustness, maintainability, and scalability are the
    natural motivators for advancing to the next stage. In the next chapter, we will
    seize these opportunities and use this agent as the foundation for building a
    **Level** **4** multi-agent system, demonstrating how a team of collaborating
    agents can solve problems at an even greater scale.
  prefs: []
  type: TYPE_NORMAL
