- en: <st c="0">5</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Quiz Generation App with ChatGPT and Django</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="45">In this chapter, we will delve into the exciting world of combining
    the power of</st> **<st c="127">ChatGPT</st>**<st c="134">, a cutting-edge</st>
    <st c="150">language</st> <st c="160">model, with</st> **<st c="172">Django</st>**<st
    c="178">, the widely acclaimed Python framework for app development.</st> <st
    c="239">Together, we will explore how to build a dynamic and interactive exam</st>
    <st c="309">generation application that leverages</st> **<st c="347">Artificial</st>**
    **<st c="358">Intelligence</st>** <st c="370">(</st>**<st c="372">AI</st>**<st
    c="374">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="377">In the previous chapters, we primarily focused on Flask, a lightweight
    and basic web framework.</st> <st c="474">However, in this chapter, we will focus
    on Django, a robust and advanced framework that has been instrumental in constructing
    some of the most renowned and widely used applications, including Instagram, Dropbox,
    and Pinterest.</st> <st c="701">You will have the opportunity to explore the capabilities
    of Django, which include features such as database management, an authentication
    system, an admin interface, and</st> <st c="872">form handling.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="886">You will learn how to build a Django project from scratch, including
    setting up the environment and creating the foundational components for your application.</st>
    <st c="1046">We will focus on creating the framework and views for a quiz generation
    app.</st> <st c="1123">You will explore the integration of ChatGPT and Django,
    enabling you to use AI for quiz generation.</st> <st c="1223">To ensure a comprehensive
    learning experience, we will cover two essential views within the application.</st>
    <st c="1328">One view will allow users to generate quizzes by inputting study
    material and executing the ChatGPT API, resulting in the generation of relevant
    questions that will be stored in a database.</st> <st c="1518">The other view
    will enable users to conveniently download any previously</st> <st c="1591">generated
    tests.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1607">In this chapter, you will explore several key topics essential
    for developing a robust Django application.</st> <st c="1715">You will begin by
    installing Django and creating your first running project, laying the foundation
    for your application.</st> <st c="1836">After that, you will build Django views
    specifically tailored for an exam generation application, followed by integrating
    the ChatGPT API with Django to intercept responses in the backend.</st> <st c="2025">To
    enhance the user experience, you will utilize Bootstrap templates to create a
    visually appealing interface.</st> <st c="2136">Furthermore, you will learn how
    to store and fetch ChatGPT responses securely in a database, ensuring data integrity
    and security.</st> <st c="2267">Finally, the chapter will guide you through adding
    file download functionality to your application, rounding out your skill set and
    enabling you to deliver a comprehensive and functional</st> <st c="2454">web application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2470">In this chapter, we will cover the</st> <st c="2506">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2523">Building a</st> <st c="2535">Django project</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2549">Creating the exam app frame</st> <st c="2578">and views</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2587">Integrating ChatGPT and Django for</st> <st c="2623">quiz generation</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2638">Storing and downloading</st> <st c="2663">generated quizzes</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2680">By the end of this chapter, you will have the knowledge and skills
    to employ the ChatGPT API to generate examination questions derived from any provided</st>
    <st c="2834">study material.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2849">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2872">You will need to cover some basic software installations before
    continuing with this chapter.</st> <st c="2967">In addition, the installation
    of the Django web framework will be demonstrated in the</st> <st c="3053">next
    section.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3066">The project has the following</st> <st c="3097">technical prerequisites:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3121">Python version 3.7 or higher installed on your</st> <st c="3169">local
    machine</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3182">A code editor, with VSCode recommended for an</st> <st c="3229">optimal
    experience</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3247">An OpenAI API key to access the necessary</st> <st c="3290">API
    functionalities</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3309">You can access the code examples used in this chapter on GitHub
    at the provided</st> <st c="3390">repository:</st> [<st c="3402">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="3478">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3479">Building a Django project</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3505">In this section, we</st> <st c="3525">will embark on the exciting
    journey of building a Django project that forms the foundation of our quiz generation
    application.</st> <st c="3653">We will guide you through the step-by-step process
    of setting up and structuring your Django project, ensuring that you have a solid
    groundwork to build upon.</st> <st c="3812">By the end of this section, you will
    have a fully functional Django project that can facilitate the automated generation
    of quizzes based on</st> <st c="3953">study materials.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3969">Our adventure begins with</st> <st c="3996">the installation of
    Django and the creation of a new Django project.</st> <st c="4065">We will walk
    you through the process of setting up your development environment, including
    the installation of Python and the Django framework.</st> <st c="4209">With Django
    in place, we will use the command-line interface to generate a new Django project,
    providing you with the necessary directory structure and initial</st> <st c="4369">configuration
    files.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4389">We can start by creating a new VSCode project called</st> `<st
    c="4443">QuizApp</st>`<st c="4450">. Now, let’s click on the VSCode</st> `<st
    c="4651">pip</st>`<st c="4654">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="4676">Next, you can run the following command to create a new Django
    project in</st> <st c="4751">the terminal:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: <st c="4804">When you run this command, Django’s command-line utility, called</st>
    `<st c="4870">django-admin</st>`<st c="4882">, creates a new project directory
    with the specified name,</st> `<st c="4941">quiz_project</st>`<st c="4953">. This
    directory will contain the necessary files and folders to start a</st> <st c="5026">Django
    project.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5041">The</st> `<st c="5046">startproject</st>` <st c="5058">command</st>
    <st c="5066">initializes the project structure by generating the</st> <st c="5119">following
    files:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="5135">manage.py</st>`<st c="5145">: A command-line utility that allows
    you to interact with various Django commands and manage</st> <st c="5239">your
    project.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="5252">quiz_project</st>`<st c="5265">: The project directory, which
    will have the same name as the one specified in the command.</st> <st c="5358">This
    directory serves as the root of your Django project and contains configuration
    files and other</st> <st c="5458">project-specific components.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="5486">Inside the project directory, you will find the following files</st>
    <st c="5551">and directories:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="5567">__init__.py</st>`<st c="5579">: An empty file that marks the
    directory as a</st> <st c="5626">Python package</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="5640">settings.py</st>`<st c="5652">: The configuration file where
    you define various settings for your Django project, including database settings,
    middleware, and</st> <st c="5782">installed apps</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="5796">urls.py</st>`<st c="5804">: The URL configuration file that defines
    the mapping between URLs and views for</st> <st c="5886">your project</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="5898">wsgi.py</st>`<st c="5906">: The</st> **<st c="5913">Web Server
    Gateway Interface</st>** <st c="5941">(</st>**<st c="5943">WSGI</st>**<st c="5947">)
    configuration file used</st> <st c="5974">for</st> <st c="5977">deployment</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="5988">You can further customize</st> <st c="6014">and develop your Django
    project by defining models, views, and templates and configuring settings based
    on your</st> <st c="6127">application’s requirements.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6154">In Django, a project is a collection of settings, configurations,
    and multiple apps that work together to create a web application.</st> <st c="6287">An
    app, on the other hand, is a modular component within a Django project that serves
    a specific purpose or functionality.</st> <st c="6410">For this reason, in our</st>
    `<st c="6434">quiz_project</st>`<st c="6446">, we can create a new application</st>
    <st c="6480">as follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: <st c="6544">The purpose of our newly created application will be to generate
    AI questions and enable users to download them.</st> <st c="6658">A new directory
    is generated with the specified app name,</st> `<st c="6716">quiz_app</st>`<st
    c="6724">. This directory contains the necessary files and folders to develop
    your Django app.</st> <st c="6810">Let’s explore the typical project structure
    and files within the</st> <st c="6875">app directory:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="6889">admin.py</st>`<st c="6898">: This file is used to register your
    app’s models with the Django admin interface.</st> <st c="6982">You can customize
    how your models are displayed and interacted with on the</st> <st c="7057">admin
    site.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="7068">apps.py</st>`<st c="7076">: This file defines the app configuration,
    including the name of the app, and uses initialization functions when the application</st>
    <st c="7206">is started.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="7217">models.py</st>`<st c="7227">: Here, you define your app’s data
    models using</st> <st c="7275">Django’s</st> **<st c="7285">Object-Relational
    Mapping</st>** <st c="7310">(</st>**<st c="7312">ORM</st>**<st c="7315">).</st>
    <st c="7319">Models represent the structure of your data and define the tables
    in</st> <st c="7388">your database.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="7402">tests.py</st>`<st c="7411">: This file</st> <st c="7424">is used
    to write tests for your app.</st> <st c="7461">You can create test cases and run
    them to ensure the functionality of</st> <st c="7531">your app.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="7540">views.py</st>`<st c="7549">: This file defines the functions
    or classes that handle HTTP requests and return HTTP responses.</st> <st c="7648">The
    file processes data, interacts with models, and renders templates to generate
    the content displayed to</st> <st c="7755">the user.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="7764">migrations/</st>`<st c="7776">: The folder is used to store database
    migration files.</st> <st c="7833">Migrations are a way to manage changes to your
    database schema over time.</st> <st c="7907">They allow you to track and apply
    incremental changes to your database structure, such as creating new tables, modifying
    existing tables, and adding or</st> <st c="8059">removing columns.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="8076">The complete high-level project structure of the quiz generation
    app is</st> <st c="8149">as follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: <st c="8394">By default, Django includes several built-in apps, such as</st>
    `<st c="8454">auth</st>`<st c="8458">,</st> `<st c="8460">admin</st>`<st c="8465">,</st>
    `<st c="8467">contenttypes</st>`<st c="8479">, and</st> `<st c="8485">sessions</st>`<st
    c="8493">. These apps have their own migrations that need to be applied to create
    the required tables holding the default user data in</st> <st c="8619">the database.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8632">Django utilizes a default SQLite database to store data.</st> <st
    c="8690">We can run the</st> <st c="8705">following command to initialize the
    database with all</st> <st c="8759">existing models:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="8801">When you run the command, Django will check for any pending migrations
    in these default apps and apply them if necessary.</st> <st c="8924">This ensures
    that the database schema is properly set up to support Django’s built-in functionality,
    verified by the</st> <st c="9041">command output:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="10069">Once the migrations are all set, you can start the development
    server to</st> <st c="10142">run your Django</st> <st c="10159">project locally:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <st c="10493">When you run this command in the terminal, Django’s</st> `<st
    c="10546">manage.py</st>` <st c="10555">script launches a lightweight web server,
    allowing you to run and test your Django application locally.</st> <st c="10660">To
    access your app, you can click on the link provided in the terminal output (http://127.0.0.1:8000/)
    or type it in your browser.</st> <st c="10791">This link includes a local IP address
    and a port on which you can access your new app (see</st> *<st c="10882">Figure
    5</st>**<st c="10890">.1</st>*<st c="10892">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.1 – The Django welcome screen](img/B22414_05_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="11053">Figure 5.1 – The Django welcome screen</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11091">Seeing the Django</st> <st c="11110">welcome page in our browser
    means that we successfully created our Django project and application.</st> <st
    c="11209">In the next section, we will begin building our application by defining
    models, views, and templates and configuring the URL routing, according to our</st>
    <st c="11360">project requirements.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11381">Creating the exam app frame and views</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="11419">In this section, we</st> <st c="11439">will focus on building
    the fundamental structure of our Django application.</st> <st c="11516">We will
    begin</st> <st c="11529">by exploring the Django settings, where you will learn
    how to configure important aspects such as database connections and middleware
    components.</st> <st c="11676">Understanding and properly setting these configurations
    is essential for the smooth operation of</st> <st c="11773">your application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11790">We will also learn about URL handling in Django.</st> <st c="11840">You
    will discover how to define URL patterns using the</st> `<st c="11895">urls.py</st>`
    <st c="11902">file, enabling seamless navigation within your application.</st>
    <st c="11963">We will also cover dynamic URLs using regular expressions, allowing
    for flexible and dynamic routing.</st> <st c="12065">Additionally, we will guide
    you through the process of incorporating</st> <st c="12133">a base template, which
    will provide consistent menus, sidebars, and views throughout</st> <st c="12219">your
    application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12236">Connecting Django views and URLs</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="12269">In Django, the relations between views, app URLs, and project
    URLs form a crucial structure to handle and route web requests.</st> <st c="12396">The</st>
    <st c="12399">flow begins with views, which are Python functions or classes responsible
    for processing specific HTTP requests and returning appropriate responses.</st>
    <st c="12549">Each view corresponds to a particular functionality or page within
    your application.</st> <st c="12634">Those views can be shown to users by being
    assigned a unique URL.</st> <st c="12700">Since, in Django, a project can have
    more than one application, those URLs are first defined at an app level in</st>
    `<st c="12812">quiz_app/urls.py</st>`<st c="12828">. Those URLs are then passed
    to the project-level</st> `<st c="12878">urls.py</st>` <st c="12885">file located
    in the</st> `<st c="12906">quiz_project</st>` <st c="12918">directory for our
    project (see</st> *<st c="12950">Figure 5</st>**<st c="12958">.2</st>*<st c="12960">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.2 – Django views/URLs architecture](img/B22414_05_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="12981">Figure 5.2 – Django views/URLs architecture</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13024">By default, Django automatically generates the</st> `<st c="13072">quiz_project/urls.py</st>`
    <st c="13092">file when you initialize your project.</st> <st c="13132">However,
    it is important to note that we will need to manually create a new</st> `<st c="13208">urls.py</st>`
    <st c="13215">file inside the</st> `<st c="13232">quiz_app</st>` <st c="13240">folder.</st>
    <st c="13249">Unlike the project-level</st> `<st c="13274">urls.py</st>` <st c="13281">file,
    the</st> `<st c="13292">urls.py</st>` <st c="13299">file at the app level is not
    generated automatically, and it is essential to organize and define the URL patterns
    specific to the functionalities</st> <st c="13446">within</st> `<st c="13453">quiz_app</st>`<st
    c="13461">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13462">Now, you can open</st> `<st c="13481">quiz_app/views.py</st>`
    <st c="13498">and write the following</st> <st c="13523">Python code:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: <st c="13626">This code</st> <st c="13637">demonstrates a simple Django view
    function named</st> `<st c="13686">home</st>`<st c="13690">. This view function
    is responsible for handling a specific type of request, typically an HTTP</st>
    `<st c="13785">GET</st>` <st c="13788">request, and generating an</st> <st c="13816">appropriate
    response.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13837">Within the function, the Django shortcut</st> `<st c="13879">render</st>`
    <st c="13885">function is used to render an HTML template.</st> <st c="13931">The
    first parameter,</st> `<st c="13952">request</st>`<st c="13959">, represents the
    incoming HTTP request object.</st> <st c="14006">This object contains information
    about the request, such as headers, data, and user session details.</st> <st c="14107">The
    second parameter,</st> `<st c="14129">base.html</st>`<st c="14138">, specifies
    the template to</st> <st c="14166">be rendered.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14178">Before building the</st> `<st c="14199">base.html</st>` <st c="14208">file,
    we need to ensure that the</st> `<st c="14242">home</st>` <st c="14246">view can
    be accessed by the user.</st> <st c="14281">To achieve that, we need to specify
    a unique URL in our</st> `<st c="14337">quiz_app/urls.py</st>` <st c="14353">file:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: <st c="14461">Here, the</st> `<st c="14472">urlpatterns</st>` <st c="14483">variable
    is a list that holds the defined URL patterns for the application.</st> <st c="14560">In
    this case, there is a single URL pattern specified for now.</st> <st c="14623">The</st>
    `<st c="14627">path</st>` <st c="14631">function is used to define a URL pattern.</st>
    <st c="14674">It takes three arguments – the first argument is the URL pattern
    itself, which is represented by an empty string,</st> `<st c="14788">''</st>`<st
    c="14790">, in this case.</st> <st c="14806">This empty string signifies the root
    URL or the base URL of</st> <st c="14866">the application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14882">The second argument,</st> `<st c="14904">views.home</st>`<st c="14914">,
    refers to the view function that will handle the request for this URL pattern.</st>
    <st c="14995">The third argument,</st> `<st c="15015">name='home'</st>`<st c="15026">,
    provides a unique name for this URL pattern.</st> <st c="15073">This name can
    be used to reference the URL pattern from other parts</st> <st c="15141">of the
    application, such as templates or other</st> <st c="15188">URL configurations.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15207">Finally, we can import this application-level URL into the project
    level by</st> <st c="15284">modifying</st> `<st c="15294">quiz_project/urls.py</st>`<st
    c="15314">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: <st c="15473">The provided code showcases the configuration of URL patterns
    in our Django project.</st> <st c="15558">Just like in the application-level URL
    file, here the</st> `<st c="15612">urlpatterns</st>` <st c="15623">variable holds
    a list of URL names for the project.</st> <st c="15676">In this case, there are
    two URL</st> <st c="15708">patterns specified.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15727">The first URL pattern is defined using the</st> `<st c="15771">path</st>`
    <st c="15775">function with the</st> `<st c="15794">admin/</st>` <st c="15800">argument.</st>
    <st c="15811">This associates the</st> `<st c="15831">admin/</st>` <st c="15837">URL
    pattern with the Django admin interface, enabling access to the admin dashboard
    and related functionalities.</st> <st c="15951">The Django admin page is usually
    set by default and is not related to the functionality of our</st> <st c="16046">quiz
    application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16063">The</st> `<st c="16068">path('', include('quiz_app.urls'))</st>`
    <st c="16102">path function takes the app-level URLs from</st> `<st c="16147">quiz_app/urls.py</st>`<st
    c="16163">. The first argument, an empty string,</st> `<st c="16202">''</st>`<st
    c="16204">, signifies the root URL or base URL of the application.</st> <st c="16261">This
    means that when a user accesses the root URL of the project, this URL pattern
    will</st> <st c="16349">be matched.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16360">The second argument,</st> `<st c="16382">include('quiz_app.urls')</st>`<st
    c="16406">, instructs Django to include the URL patterns defined in the</st> `<st
    c="16468">quiz_app.urls</st>` <st c="16481">module.</st> <st c="16490">This means
    that any URLs specified within the</st> `<st c="16536">quiz_app</st>` <st c="16544">application
    will be matched and</st> <st c="16577">handled accordingly.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16597">This is what the hierarchical structure of URL handling looks
    like.</st> <st c="16666">We started from views that process requests to app-level
    URLs that define specific URL patterns, and, finally, to project-level URLs that
    route requests to the appropriate app-level URLs.</st> <st c="16854">The process
    was illustrated with code examples, highlighting the significance of correctly
    configuring URLs at both the app and project levels for smooth navigation and
    functionality within a</st> <st c="17046">Django application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17065">In the upcoming section, we will delve into building HTML templates,
    including the essential</st> `<st c="17159">base.html</st>` <st c="17168">file.</st>
    <st c="17175">Templates play a crucial role in defining the visual structure and
    layout of</st> <st c="17252">web pages in a Django application.</st> <st c="17287">By
    constructing and customizing HTML templates, we can create a consistent and visually
    appealing user interface for our</st> <st c="17408">quiz application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17425">Developing Django templates</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="17453">In this section, we</st> <st c="17474">will focus on building
    the</st> `<st c="17501">base.html</st>` <st c="17510">template and incorporating
    CSS into our Django application.</st> <st c="17571">The</st> `<st c="17575">base.html</st>`
    <st c="17584">template serves as the foundation for the visual structure and layout
    of our web pages.</st> <st c="17673">To enhance the design and styling of our
    application, we will utilize external CSS resources.</st> <st c="17767">One valuable
    resource is the Bootstrap framework, which offers a wide range of pre-designed
    templates and components.</st> <st c="17885">We will go through the process of
    finding suitable templates from the official Bootstrap website (</st>[<st c="17983">https://getbootstrap.com/docs/5.3/examples/</st>](https://getbootstrap.com/docs/5.3/examples/)<st
    c="18027">), where you can explore various examples and choose the ones that align
    with your desired aesthetics</st> <st c="18130">and functionality.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18148">You can easily access the code behind any of the Bootstrap templates
    if you use</st> **<st c="18229">Google Chrome</st>**<st c="18242">. For</st> <st
    c="18247">instance, for this project, we can use the</st> **<st c="18291">Dashboard</st>**
    <st c="18301">template, which you</st> <st c="18320">can access here:</st> [<st
    c="18338">https://getbootstrap.com/docs/5.3/examples/dashboard/</st>](https://getbootstrap.com/docs/5.3/examples/dashboard/)<st
    c="18391">. As you can see in</st> *<st c="18411">Figure 5</st>**<st c="18419">.3</st>*<st
    c="18421">, the HTML code can be accessed by right-clicking on the</st> **<st
    c="18478">Dashboard</st>** <st c="18487">template and choosing the</st> **<st
    c="18514">View Page</st>** **<st c="18524">Source</st>** <st c="18530">option.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.3 – Viewing the page source in Chrome](img/B22414_05_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="18768">Figure 5.3 – Viewing the page source in Chrome</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18814">By following this</st> <st c="18832">approach, you can extract
    specific sections from this template and incorporate them into your own application,
    allowing for easy customization and extension.</st> <st c="18991">This process
    establishes a solid foundation for your</st> <st c="19044">Django app.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="19055">To begin, you can create a</st> `<st c="19083">templates</st>`
    <st c="19092">folder in a separate location outside of both your application and
    project folders, adhering to the recommended structure outlined as follows.</st>
    <st c="19236">This organized setup ensures efficient management of your</st> <st
    c="19294">template files:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: <st c="19368">Within the</st> `<st c="19380">templates</st>` <st c="19389">directory,
    you will create a new HTML file named</st> `<st c="19439">base.html</st>`<st c="19448">,
    serving as the foundation for your application’s structure.</st> <st c="19510">In
    this file, you can begin by including relevant links and defining the header section
    that sets the overall context for</st> <st c="19632">your application:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: <st c="20108">The first</st> <st c="20118">line,</st> `<st c="20125">{% load
    static %}</st>`<st c="20142">, is a Django template tag that allows us to load
    static files, such as CSS style sheets and JavaScript scripts, into our HTML template.</st>
    <st c="20279">It enables us to access and utilize these files within our Django
    project.</st> <st c="20354">Later in this section, we will create the</st> `<st
    c="20396">.css</st>` <st c="20400">files, and they will be automatically passed
    to</st> <st c="20449">the HTML.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20458">Then, the</st> `<st c="20469">data-bs-theme</st>` <st c="20482">attribute
    is used for automatic theme handling.</st> <st c="20531">This attribute is often
    used with Bootstrap, a popular CSS framework, to automatically switch between
    light and dark themes based on the user’s</st> <st c="20675">device settings.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20691">The</st> `<st c="20696">head</st>` <st c="20700">section contains
    various meta tags and external script and style sheet references.</st> <st c="20784">These
    meta tags provide information about the character encoding and viewport settings
    for the web page.</st> <st c="20889">They ensure that the web page is rendered
    properly and adjusts its layout to fit different</st> <st c="20980">screen sizes.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20993">Next, we include external CSS style sheets.</st> <st c="21038">The</st>
    `<st c="21042">{% static 'css/bootstrap.min.css' %}</st>` <st c="21078">and</st>
    `<st c="21083">{% static 'css/dashboard.css' %}</st>` <st c="21115">tags refer
    to the static CSS files that we will create in our Django project.</st> <st c="21194">These
    CSS files provide styling rules and formatting instructions that define the visual
    appearance of elements on the</st> <st c="21313">web page.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21322">Once the header</st> <st c="21338">is completed, we can use the
    following code snippet to build the body of</st> <st c="21412">our page:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: <st c="22235">Here, the body</st> <st c="22251">consists of a</st> `<st c="22265"><header></st>`
    <st c="22273">section that contains a navigation bar.</st> <st c="22314">The navigation
    bar includes a brand name for the quiz app.</st> <st c="22373">The</st> `<st c="22377"><div
    class="navbar-nav"></st>` <st c="22401">element can be used to add additional
    navigation items</st> <st c="22457">if needed.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22467">Inside this navigation, there is a</st> `<st c="22503"><nav id="sidebarMenu"></st>`
    <st c="22525">element that serves as a sidebar menu.</st> <st c="22565">It contains
    a list of navigation items that can be customized as needed.</st> <st c="22638">Each
    navigation item is represented by</st> `<st c="22677"><li class="nav-item"></st>`
    <st c="22698">with an associated link.</st> <st c="22724">We will have two main
    links inside</st> <st c="22759">the sidebar:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="22771">The Questions Generator tab</st>**<st c="22799">: This shows
    the ChatGPT quiz</st> <st c="22830">generation tool</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="22845">The My Quiz tab</st>**<st c="22861">: This shows all the quizzes
    that the user has created so far, ready to</st> <st c="22934">be downloaded</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="22947">Now that we have finished with</st> `<st c="22979">base.html</st>`<st
    c="22988">, we can add the style files.</st> <st c="23018">To do that, create
    two new directories called</st> `<st c="23064">static/css</st>` <st c="23074">inside
    your</st> `<st c="23087">quiz_project</st>`<st c="23099">, as</st> <st c="23104">shown
    here:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: <st c="23243">Instead of writing the style files on our own, we can simply download
    the CSS files from the</st> `<st c="23433">css</st>` <st c="23436">folder.</st>
    <st c="23445">You can find the links to each of the CSS files required for our</st>
    <st c="23510">project here:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="23523">dashboard.css</st>`<st c="23537">:</st> [<st c="23540">https://getbootstrap.com/docs/5.3/examples/dashboard/dashboard.css</st>](https://getbootstrap.com/docs/5.3/examples/dashboard/dashboard.css)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="23606">bootstrap.min.css</st>`<st c="23624">:</st> [<st c="23627">https://getbootstrap.com/docs/5.3/dist/css/bootstrap.min.css</st>](https://getbootstrap.com/docs/5.3/dist/css/bootstrap.min.css)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="23687">Alternatively, you can access all the project files from our GitHub</st>
    <st c="23756">repository:</st> <st c="23768">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st><st
    c="23844">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23845">Now, let’s see how to integrate these HTML and CSS files into
    our Django project.</st> <st c="23928">By modifying the</st> `<st c="23945">settings.py</st>`
    <st c="23956">file, we can specify the directories where Django should look for
    static files, including HTML templates and CSS files.</st> <st c="24077">This
    configuration will ensure that our Django application can access and utilize the
    desired templates and CSS styles, providing a visually appealing and cohesive
    user experience throughout the</st> <st c="24272">entire application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24291">Firstly, to add the HTML files to your project, you can simply
    reference the</st> `<st c="24369">templates</st>` <st c="24378">directory inside
    the</st> `<st c="24400">settings.py</st>` <st c="24411">file.</st> <st c="24418">To
    do that, find the</st> `<st c="24439">TEMPLATES</st>` <st c="24448">dictionary
    and edit the</st> `<st c="24473">DIRS</st>` <st c="24477">key,</st> <st c="24483">as
    follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: <st c="24877">This is used to construct the</st> <st c="24908">absolute path
    to the</st> `<st c="24929">templates</st>` <st c="24938">directory within your
    Django project.</st> `<st c="24977">BASE_DIR</st>` <st c="24985">refers to the
    base directory of your Django project, and</st> `<st c="25043">templates</st>`
    <st c="25052">is the name of the directory where your template files</st> <st
    c="25108">are stored.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="25119">By setting the</st> `<st c="25135">DIRS</st>` <st c="25139">key,
    you tell Django to include the</st> `<st c="25176">templates</st>` <st c="25185">directory
    as one of the locations to search for template files.</st> <st c="25250">This
    allows you to organize your template files separately from your application directories
    and provides a central location to store your</st> <st c="25389">HTML templates.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="25404">We will also need to import the</st> `<st c="25437">os</st>` <st
    c="25439">library at the beginning of the</st> `<st c="25472">setting.py</st>`
    <st c="25482">file:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: <st c="25523">Secondly, to pass all CSS files to your Django project, you can
    scroll to the bottom of</st> `<st c="25612">settings.py</st>` <st c="25623">and
    add</st> <st c="25632">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: <st c="26043">Here,</st> `<st c="26050">STATICFILES_DIRS</st>` <st c="26066">tells
    Django where to find static files during development, while</st> `<st c="26133">STATIC_ROOT</st>`
    <st c="26144">specifies the directory where static files will be collected for
    deployment.</st> <st c="26222">These settings ensure that your static files are
    organized and accessible, both during development and in a production environment.</st>
    <st c="26354">This will allow us to pick those CSS files for</st> <st c="26401">our
    project.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="26413">This section explained the process of developing Django templates
    by building a</st> `<st c="26494">base.html</st>` <st c="26503">template, incorporating
    CSS resources such as Bootstrap, and configuring the</st> `<st c="26581">settings.py</st>`
    <st c="26592">file</st> <st c="26598">to manage static files and templates in
    a Django project.</st> <st c="26656">After completing the steps outlined, you
    are now ready to run your Django application in the</st> <st c="26749">next section.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="26762">Running your Django application</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="26794">Once you have</st> <st c="26808">completed the steps covered in
    the previous section, you can run your Django project.</st> <st c="26895">To run
    a Django application, you will need to again access your terminal or navigate
    to the root directory,</st> `<st c="27003">quiz_project</st>`<st c="27015">, of
    your Django project.</st> <st c="27041">This is the directory that contains the</st>
    `<st c="27081">manage.py</st>` <st c="27090">file.</st> <st c="27097">Once you’re
    in the correct directory, execute the</st> <st c="27147">following command:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: <st c="27193">This command starts the development server, which allows you to
    run your Django application locally for testing and</st> <st c="27310">development
    purposes.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="27331">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="27346">An important note to keep in mind is that Django’s development
    server has a useful feature</st> <st c="27438">called</st> **<st c="27445">auto-reloading</st>**<st
    c="27459">. This means that you can leave the server running while you make changes
    to your code, and the server will automatically detect these changes and apply
    them without requiring a</st> <st c="27637">manual restart.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="27652">Once the Django development server is running, you can access
    your application by opening a web browser and entering the following URL:</st>
    `<st c="27789">http://127.0.0.1:8000/</st>` <st c="27811">(see</st> *<st c="27817">Figure
    5</st>**<st c="27825">.4</st>*<st c="27827">).</st> <st c="27831">By default,
    Django runs the server on localhost</st> `<st c="27879">127.0.0.1</st>` <st c="27888">and
    uses port</st> `<st c="27903">8000</st>`<st c="27907">. The preceding</st> <st
    c="27923">URL will point your browser to the home page of your</st> <st c="27976">Django
    application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.4 – The quiz app initial page view](img/B22414_05_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="28028">Figure 5.4 – The quiz app initial page view</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="28071">In our Django application, we can observe three distinct sections:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="28139">Firstly, at the top, we have the header area displaying the name</st>
    **<st c="28204">Quiz App</st>** <st c="28212">against a dark background.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="28240">On the left-hand side, we find a navigation bar with two tabs
    that we incorporated into the</st> `<st c="28332">base.html</st>` <st c="28341">file
    –</st> **<st c="28349">Questions Generator</st>** <st c="28368">and</st> **<st
    c="28373">My Quiz</st>**<st c="28380">. These tabs facilitate easy navigation
    between different features of our application.</st> <st c="28467">The</st> **<st
    c="28471">Questions Generator</st>** <st c="28490">tab directs users to a section
    where they can construct quizzes, while the</st> **<st c="28566">My Quiz</st>**
    <st c="28573">tab presents a view to download quizzes.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="28615">Finally, on the right-hand side of the navigation bar, we have
    the working area, where users can interact with and explore the contents of the</st>
    **<st c="28758">My Quiz</st>** <st c="28765">and</st> **<st c="28770">Questions</st>**
    **<st c="28780">Generator</st>** <st c="28789">functionalities.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="28806">This is what the initial view of your application looks like,
    with a sleek and modern interface showcasing a user-friendly design.</st> <st
    c="28938">In the next section, our attention can now be directed toward</st> <st
    c="29000">developing the fundamental aspect of the app, which involves creating
    the core ChatGPT quiz</st> <st c="29092">generation component.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="29113">Integrating ChatGPT and Django for quiz generation</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="29164">In this section, we</st> <st c="29184">will explore the exciting</st>
    <st c="29210">task of generating questions using the ChatGPT</st> <st c="29258">API
    within your Django application.</st> <st c="29294">This</st> <st c="29299">powerful
    functionality will allow you to create interactive quizzes based on user-provided
    text input.</st> <st c="29402">By handling</st> `<st c="29414">POST</st>` <st
    c="29418">requests from the user and leveraging the capabilities of the ChatGPT
    API, you will be able to dynamically generate insightful questions that enhance
    user engagement and</st> <st c="29589">knowledge acquisition.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="29611">The process begins by incorporating a field in your Django application
    where users can input text.</st> <st c="29711">Once the user submits the text
    by clicking the submit button, the magic unfolds as your application utilizes
    the ChatGPT API to generate relevant and contextually accurate questions based
    on the provided text.</st> <st c="29921">These questions are seamlessly displayed
    to the user, enabling an interactive and educational experience.</st> <st c="30027">By
    automating the question generation process, you can save time and effort while
    providing valuable content to your users.</st> <st c="30151">So, let’s dive in
    and explore the steps involved in handling</st> `<st c="30212">POST</st>` <st
    c="30216">requests, building the ChatGPT API function for question creation, and,
    ultimately, displaying the generated questions to your users in a user-friendly
    and</st> <st c="30373">intuitive manner.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="30390">Building the quiz generation text area and the submit button</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="30451">In a slight</st> <st c="30464">departure from the chronological
    order, we will begin by</st> <st c="30521">making modifications to the</st> `<st
    c="30549">base.html</st>` <st c="30558">file to incorporate the necessary components
    for our question generation feature.</st> <st c="30641">Specifically, we will
    add a text area where users can input their desired text, and a submit button
    that triggers the question generation process.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="30788">You can add those</st> <st c="30805">fields under the navigation
    bar menu</st> <st c="30843">code (under the</st> `<st c="30859"></nav></st>` <st
    c="30865">tag), as shown in the</st> <st c="30888">following code:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="30903">base.html</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: <st c="31353">This represents the</st> <st c="31373">section of the</st> `<st
    c="31389">base.html</st>` <st c="31398">file that is</st> <st c="31411">responsible
    for displaying the user interface elements related to the question generation
    feature in our quiz</st> <st c="31522">generation application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="31545">In the code, we can observe the usage of HTML tags and Django
    template syntax.</st> <st c="31625">The</st> `<st c="31629"><main></st>` <st c="31635">tag
    defines the main content area.</st> <st c="31671">Inside the</st> `<st c="31682"><main></st>`
    <st c="31688">tag, we have a Django template block defined by</st> `<st c="31737">{%
    block content %}</st>` <st c="31756">and</st> `<st c="31761">{% endblock %}</st>`<st
    c="31775">, which allows for dynamic content insertion.</st> <st c="31821">This
    will ensure that we can connect this block with our Django</st> <st c="31885">views
