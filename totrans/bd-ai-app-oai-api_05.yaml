    some CSS styling.</st> <st c="33822">To do that, you can create a new CSS file
    called</st> `<st c="33871">quiz_style.css</st>` <st c="33885">inside the</st>
    `<st c="33897">quiz_project/static/css</st>` <st c="33920">directory.</st> <st
    c="33932">You can find the CSS file content</st> <st c="33966">here:</st> [<st
    c="33972">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css)<st
    c="34130">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="34131">Here, we define the styles for the</st> `<st c="34167">body</st>`<st
    c="34171">,</st> `<st c="34173">container</st>`<st c="34182">, and</st> `<st c="34188">main</st>`
    <st c="34192">elements.</st> <st c="34203">The</st> `<st c="34207">body</st>`
    <st c="34211">element is set to use the Arial font family and has a white background.</st>
    <st c="34284">The</st> `<st c="34288">container</st>` <st c="34297">class specifies
    a maximum width of</st> `<st c="34333">960px</st>`<st c="34338">, while the</st>
    `<st c="34350">main</st>` <st c="34354">element, which holds our application,
    also has a box shadow effect and a border radius</st> <st c="34442">of</st> `<st
    c="34445">5px</st>`<st c="34448">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="34449">Then, we can define the styles for the</st> `<st c="34489">textarea</st>`
    <st c="34497">and</st> `<st c="34502">submit</st>` <st c="34508">button elements.</st>
    <st c="34526">The</st> `<st c="34530">textarea</st>` <st c="34538">element is
    set to have a width of</st> `<st c="34573">70%</st>` <st c="34576">of its parent
