    c="33280">file inside</st> <st c="33293">its</st> `<st c="33297">head</st>`<st
    c="33301">:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: <st c="33523">When you launch your quiz generator at this point, you will see
    that while all the fields are visible, their visual presentation may not be aesthetically
    pleasing.</st> <st c="33688">This is because we have only incorporated HTML elements
