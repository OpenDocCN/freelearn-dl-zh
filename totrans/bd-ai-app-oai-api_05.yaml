    <st c="34650">element, which represents a submit button, has a blue background
    color, and the cursor changes to a pointer when hovering</st> <st c="34773">over
    it.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="34781">The</st> `<st c="34786">Responsive styles</st>` <st c="34803">section
    uses media queries to apply specific styles when the maximum width of the viewport
    is</st> `<st c="34898">767px</st>` <st c="34903">or less.</st> <st c="34913">In
    this case, it reduces the padding of the</st> `<st c="34957">.container</st>`
    <st c="34967">and</st> `<st c="34972">main</st>` <st c="34976">elements, decreases
