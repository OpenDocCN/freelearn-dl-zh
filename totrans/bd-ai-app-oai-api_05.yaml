    `<st c="35076">input[type="submit"]</st>` <st c="35096">elements.</st> <st c="35107">These
    styles ensure that the quiz generator application is visually appealing and adapts
    well to different screen sizes, providing a better</st> <st c="35247">user experience.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="35263">So far, we have</st> <st c="35279">successfully</st> <st c="35292">constructed
    the entire user interface for the quiz generation feature of our application.</st>
    <st c="35383">Our next step is to integrate the ChatGPT API service and implement
    the</st> <st c="35455">necessary views.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="35471">Creating ChatGPT API views with Django</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="35510">Now that we have</st> <st c="35527">completed the frontend, we
    will</st> <st c="35560">explore how to incorporate this powerful ChatGPT API into
    our Django views, enabling us to harness the capabilities of ChatGPT to generate</st>
    <st c="35699">quiz questions.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="35714">Asking ChatGPT to generate a response in a specific structure
    can be a challenging task, as we need to define very specific instructions about
    how the questions in our quiz should be generated.</st> <st c="35909">Having that
    in mind, our ChatGPT prompt should meet the</st> <st c="35965">following requirements:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="35988">A variable holding the text that we want to create questions for
    should be passed as a separate variable.</st> <st c="36095">That will enable our
    app to work with different types</st> <st c="36149">of text.</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="36157">The prompt should consist of instructions that specify</st> <st
    c="36213">the following:</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="36227">The number</st> <st c="36239">of questions</st>
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="36251">Where and how the correct answer should</st> <st c="36292">be
    displayed</st>
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="36304">What type of question ChatGPT should generate (multiple-choice,</st>
    <st c="36369">open-answer, etc.)</st>
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="36387">It is a good</st> <st c="36401">practice to create such requirements
    every time you want to design a ChatGPT prompt and test whether the API response
    meets the expected response, based on your</st> <st c="36562">prompt definition.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="36580">Inside the</st> `<st c="36592">quiz_app</st>` <st c="36600">folder
    of your Django project, you will need to create two essential files –</st> `<st
    c="36678">config.py</st>` <st c="36687">and</st> `<st c="36692">services.py</st>`<st
    c="36703">. The</st> `<st c="36709">config.py</st>` <st c="36718">file serves
    as a container for your ChatGPT API key, allowing you to securely store and access
    it within your application.</st> <st c="36842">This key is crucial to establish
    a connection with the ChatGPT API service.</st> <st c="36918">The</st> `<st c="36922">services.py</st>`
    <st c="36933">file, on the other hand, plays a pivotal role in housing the necessary
    functions</st> <st c="37015">that will enable you to interact with the ChatGPT
    API within your Django views.</st> <st c="37095">These functions will facilitate
    communication with the API, allowing you to generate quiz questions dynamically
    based on</st> <st c="37216">user input:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="37227">services.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: <st c="38017">config.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: <st c="38052">Here, we have a</st> <st c="38069">Python function that utilizes
    the OpenAI library to interact with</st> <st c="38135">the ChatGPT API to generate
    quiz questions.</st> <st c="38179">First, the necessary dependencies are imported,
    including the OpenAI library and the local</st> `<st c="38270">config</st>` <st
    c="38276">module, which holds the API key.</st> <st c="38310">The API key is set
    using the imported</st> `<st c="38348">config.API_KEY</st>` <st c="38362">value
    to establish a connection with the</st> <st c="38404">ChatGPT API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="38416">The</st> `<st c="38421">generate_questions</st>` <st c="38439">function
    takes a text input as a parameter, which represents the content or context from
    which questions will be generated.</st> <st c="38564">The function prepares a
    prompt by incorporating the provided text into a specific format that instructs
    the AI model to create multiple-choice questions, based on the</st> <st c="38731">given
    content.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="38745">As you can see, the design of the given ChatGPT prompt focuses
    on providing clear instructions to generate a practice test with multiple-choice
    questions, based on a given text.</st> <st c="38924">Here’s the reasoning behind</st>
    <st c="38952">the design:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="38963">Clear instructions</st>**<st c="38982">: The prompt begins
    by clearly stating the purpose of the task – to create a practice test with multiple-choice
    questions.</st> <st c="39106">This helps set the context and expectations for
    the</st> <st c="39158">generated content.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="39228">{text}</st>` <st c="39234">placeholder to indicate that the
    given text should be inserted at that point.</st> <st c="39313">This allows the
    user to provide the specific text on which the questions will</st> <st c="39391">be
    based.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="39400">Structured format</st>**<st c="39418">: The prompt specifies
    that each question should be on a separate line.</st> <st c="39491">This helps
    create a structured layout for the practice test, making it easier to read and
    understand by humans and other</st> <st c="39612">Python scripts.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="39627">Multiple-choice format</st>**<st c="39650">: The prompt states
    that each question should have four possible answers.</st> <st c="39725">This
    indicates that the generated questions should follow the multiple-choice question
    format commonly used in tests</st> <st c="39842">and quizzes.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**<st c="39854">Indicating the correct answer</st>**<st c="39884">: The prompt
    mentions that under the possible answers, the correct answer should be provided.</st>
    <st c="39979">This ensures that the generated questions include the correct answer
    along with the options, allowing learners to easily identify the</st> <st c="40113">correct
    response.</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="40130">Using the ChatGPT</st> <st c="40149">API, the function</st> <st
    c="40167">sends a request to the API with the prepared prompt.</st> <st c="40220">The
    API response contains the generated questions.</st> <st c="40271">The function
    extracts these questions from the API response and returns them as a</st> <st
    c="40353">string variable.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="40369">The</st> `<st c="40374">questions</st>` <st c="40383">variable
    can be now used inside the</st> `<st c="40420">views.py</st>` <st c="40428">file
    to pass the generated questions to be displayed in our</st> `<st c="40489">base.html</st>`
    <st c="40498">frontend file:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: <st c="40819">Here, we upgrade the</st> `<st c="40841">home</st>` <st c="40845">function,
    which handles the rendering of the home page and the generation of quiz questions
    based on user input.</st> <st c="40959">Upon receiving a request, the</st> `<st
    c="40989">view</st>` <st c="40993">function checks the HTTP method of the request.</st>
    <st c="41042">If it is a</st> `<st c="41053">POST</st>` <st c="41057">request,
    indicating that the user has submitted a form, the function proceeds to extract
    the text input from the request’s</st> `<st c="41181">POST</st>` <st c="41185">data
    using the</st> `<st c="41201">text</st>` <st c="41205">key.</st> <st c="41211">In
    fact, the submission is initiated by selecting the</st> `<st c="41308">text</st>`
    <st c="41312">files of our question</st> <st c="41335">generation app.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="41350">The extracted text is then</st> <st c="41377">passed as an argument
    to the</st> `<st c="41407">generate_questions</st>` <st c="41425">function, which</st>
    <st c="41442">we previously defined in the</st> `<st c="41471">services.py</st>`
    <st c="41482">file.</st> <st c="41489">This function utilizes the ChatGPT API
    to generate quiz questions based on the provided text.</st> <st c="41583">The
    generated questions are stored in the</st> `<st c="41625">questions</st>` <st
    c="41634">variable.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="41644">To display the generated questions on the web page, a dictionary
    called</st> `<st c="41717">context</st>` <st c="41724">is created with the</st>
    `<st c="41745">questions</st>` <st c="41754">key and the corresponding value containing
    the generated questions.</st> <st c="41823">This</st> `<st c="41828">context</st>`
    <st c="41835">dictionary is passed as an argument to the</st> `<st c="41879">render</st>`
    <st c="41885">function, along with the</st> `<st c="41911">request</st>` <st c="41918">object
    and the template file,</st> `<st c="41949">base.html</st>`<st c="41958">. The
    rendered page will have access to the</st> `<st c="42002">questions</st>` <st
    c="42011">variable and can display</st> <st c="42037">it appropriately.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="42054">By implementing this code in your Django application’s</st> `<st
    c="42110">views.py</st>` <st c="42118">file, the</st> `<st c="42129">home</st>`
    <st c="42133">view function will handle the generation of quiz questions, based
    on user input, and render the home page with the generated questions displayed
    if a</st> `<st c="42284">POST</st>` <st c="42288">request</st> <st c="42297">is
    received.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="42309">Before testing your Django application and utilizing the ChatGPT
    API, you need to ensure that the</st> `<st c="42408">openai</st>` <st c="42414">library
    is installed.</st> <st c="42437">The OpenAI library provides the necessary tools
    and functionalities to interact with the ChatGPT API.</st> <st c="42539">To install
    the library, you can type the following command in the</st> <st c="42605">terminal
    window:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: <st c="42640">To test your quiz generator application, follow</st> <st c="42689">these
    steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="42701">Ensure</st> <st c="42709">that your Django development server
    is running.</st> <st c="42757">If it’s not already running, navigate</st> <st
    c="42795">to the root directory of your Django project in the terminal or command
    prompt and execute the</st> <st c="42890">following command:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="43072">On the home page, you will see a text area where you can enter
    some text.</st> <st c="43147">Paste or type the desired text for which you want
    to generate quiz questions (see</st> *<st c="43229">Figure 5</st>**<st c="43237">.5</st>*<st
    c="43239">).</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.5 – Adding text to the quiz generation app](img/B22414_05_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="43633">Figure 5.5 – Adding text to the quiz generation app</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="43684">Once you have</st> <st c="43698">entered the text, click the</st>
    `<st c="43794">POST</st>` <st c="43798">request to</st> <st c="43810">the server.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="43821">The server will process the request and generate quiz questions
    based on the provided text, using the ChatGPT API.</st> <st c="43937">The generated
    questions will be displayed below the text area (see</st> *<st c="44004">Figure
    5</st>**<st c="44012">.6</st>*<st c="44014">).</st>
