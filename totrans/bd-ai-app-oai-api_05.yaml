  type: TYPE_IMG
- en: <st c="44584">Figure 5.6 – Questions displayed by the quiz generation app</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="44643">Having followed these</st> <st c="44666">steps, you can now test
    your quiz generator application</st> <st c="44722">and see how it generates questions
    based on the text input.</st> <st c="44782">Feel free to experiment with different
    inputs to explore the capabilities of</st> <st c="44859">your application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="44876">In this section, we explored the integration of ChatGPT and Django
    for quiz generation.</st> <st c="44965">We covered the creation of a user interface
    for question generation, incorporating CSS styling for visual appeal, implementing
    ChatGPT API views using Django, and testing the Quiz Generator application</st>
    <st c="45167">by</st> <st c="45170">entering text and generating questions based
    on it.</st> <st c="45222">We can now build a database to store the generated questions
    and enable users to download them, which we will cover in the</st> <st c="45345">next
    section.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="45358">Storing and downloading generated quizzes</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="45400">In this section, you</st> <st c="45422">will learn how to build
    the quiz download functionality for your quiz generation app.</st> <st c="45508">By
    incorporating a database and creating a dedicated page for downloading quizzes,
    you will empower your users to access and utilize the quizzes they generate.</st>
    <st c="45668">This feature will enhance the overall user experience by providing
    a seamless way to save and retrieve quizzes, enabling users to revisit and share
    their generated</st> <st c="45832">content effortlessly.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="45853">We will explore the process of saving generated quizzes in a database
    using Django’s models and database management capabilities.</st> <st c="45984">By
    defining the appropriate database structure and implementing the necessary views
    and templates, you will be able to create a user-friendly page where users can
    browse and download their generated quizzes.</st> <st c="46192">With this functionality
    in place, your quiz generation app will offer a comprehensive solution to generate,
    store, and access quizzes, further enriching the interactive and educational experience
    for</st> <st c="46392">your users.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="46403">Saving the quizzes in a SQLite database</st>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <st c="46443">One of the key aspects of building the quiz download functionality
    is the ability to save the generated quizzes in a database.</st> <st c="46571">SQLite
    provides a simple</st> <st c="46596">and efficient solution for this purpose.</st>
    <st c="46637">SQLite is a lightweight, serverless, and self-contained database
    engine that requires minimal setup and configuration.</st> <st c="46756">It is
    ideal for smaller-scale applications and offers seamless integration</st> <st
    c="46831">with Python.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="46843">To begin, you will need to modify the</st> `<st c="46882">generate_questions()</st>`
    <st c="46902">function to incorporate database functionality.</st> <st c="46951">Within
    this function, you can include code to save the generated quiz questions and options
    into the SQLite database.</st> <st c="47069">By defining appropriate table structures
    using Django’s models, you can easily map the quiz data to the corresponding fields
    in</st> <st c="47197">the database.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="47210">In addition to modifying the</st> `<st c="47240">generate_questions()</st>`
    <st c="47260">function, you will also need to create a separate function to initialize
    the database.</st> <st c="47348">This function will handle tasks such as creating
    the necessary tables and establishing a database connection.</st> <st c="47458">To
    create it, open your</st> `<st c="47482">services.py</st>` <st c="47493">file,
    where you can write the initialization function under your</st> `<st c="47559">API_KEY</st>`
    <st c="47566">definition:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'def generate_questions(text): <st c="49241">initialize_database()</st><st c="49262">#
    Connect to the SQLite database</st><st c="49295">conn = sqlite3.connect(''questions.db'')</st><st
    c="49334">cursor = conn.cursor()</st> # Define your prompt for generating questions'
  prefs: []
  type: TYPE_NORMAL
- en: prompt = f"Create a practice test with multiple choice questions on the following
    text:\n{text}\n\n" \
  prefs:
