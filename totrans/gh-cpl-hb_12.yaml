- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Navigating the GitHub Copilot Learning Curve
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Working with GitHub Copilot is so much more than the IntelliSense or autocomplete
    functionality that people are used to working with in their favorite editors.
    This is one of the major reasons we see companies fail to get the most out of
    GitHub Copilot, as they think it is a matter of handing out a license and the
    inquisitive minds of the engineers will “just get it,” automatically becoming
    smarter and faster at what they do. Unfortunately, this does not take the GitHub
    Copilot and generative AI learning curve into account, or the fact that we all
    learn differently. With new tools embedded in the editor, as well as all the agentic
    features in the browser, we need to rewire how engineers think about working with
    a code base, as it is now more than just focusing on typing in changes.
  prefs: []
  type: TYPE_NORMAL
- en: Some people get new tools and get cracking, and some people learn by seeing
    other people doing and sharing their lessons learned, before they internalize
    how GitHub Copilot can help them. On top of all the new functionality that is
    available, you are now also conversing with an LLM. If you do not have the right
    understanding of what an LLM is, you might make the wrong assumptions, and you
    might be expecting miracles to happen. That can lead to disappointments. That
    is why we included [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor022) , all about
    generative AI, so that you can have realistic expectations right from the start.
  prefs: []
  type: TYPE_NORMAL
- en: In our opinion, the learning curve must be acknowledged, which is why this book
    is structured the way it is. We strongly believe you should not hand over tools
    like Copilot, with the coding agent feature or the Agent Mode feature, without
    a solid understanding of how things work with LLMs. You need to clearly understand
    how these tools use information that the editor gives them to build up context,
    and how that context is used in the conversation you are having with GitHub Copilot.
    Different IDEs set up their context in a different way, so understanding the flow
    of information is crucial to having realistic expectations of what these tools
    can do.
  prefs: []
  type: TYPE_NORMAL
- en: That is why we have taken you through generative AI in general, through suggestions,
    general chat (Ask Mode and on the web UI), Edit Mode, and only then start talking
    about Agent Mode. We believe it is not right to start with the last part first,
    and we have seen too many people fail that way as well.
  prefs: []
  type: TYPE_NORMAL
- en: 'It is crucial for both engineers and company leadership to have a solid understanding
    of the impact of AI on the entire team that works on the SDLC: from stakeholders
    describing the changes they would like to get, to the product owners planning
    the work for those changes, and from the engineer creating the changes, to the
    testers validating the system after the changes have been made. Even the engineering
    managers who decide to roll out new AI tools like GitHub Copilot need to understand
    the impact it has on the way that we all work.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ve supported enablement projects across many organizations, working with
    thousands of engineers, and we’ve observed a common pattern: people often expect
    high-quality results from very brief prompts, even for complex tasks. It’s understandable
    because the entire industry uses terms such as “generative AI,” “reasoning,” “thinking,”
    and “understanding.” This naming suggests that these tools can intuitively grasp
    and solve problems with minimal input. When someone writes a prompt such as “fix
    all the issues in my code” or “convert my million-line code base to a modern framework,”
    they may genuinely expect the tool to deliver a near-magical solution. However,
    these expectations can lead to disappointment, not because the user lacks skill,
    but because the learning curve of these tools is often underestimated. Our goal
    in this chapter is to help you avoid that frustration. By understanding how these
    tools work and how they’ve evolved, you’ll be better equipped to use their strengths
    effectively and confidently.'
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will show the lessons that we have learned over time, with
    small and large revelations we have had. Often, we have had an insightful moment
    while working with GitHub Copilot, or while looking at someone else using the
    tools and seeing that they approach a problem differently. Then we’ll discuss
    an approach that we think works best while using GitHub Copilot to get higher
    quality and usefulness in the results.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Unpacking important learning motions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Approaching problems the right way
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unpacking important learning motions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There is a normal progression in learning to work with GitHub Copilot and getting
    more proficient over time. People start with suggestions while you type, move
    over to the chat interface with Ask Mode, then take the next step to Edit Mode,
    and then start using Agent Mode. The next level up is then using the coding agent
    in the web interface for an even more asynchronous way of working.
  prefs: []
  type: TYPE_NORMAL
- en: To help you to the next level of understanding these features, in this section,
    we will share the different learning moments that we had ourselves over the years.
    Some of these moments we stumbled upon or heard about from other people, and it
    can often take some time to really understand their value in your own work. That
    is why we call these “motions,” as it takes a couple of repetitions before you
    “get them.” Each of these motions made certain pieces fall into place for us,
    and they might help you too. Since everyone learns differently, some might lead
    to a different way of thinking, or help you realise little improvements in your
    flow of working with GitHub Copilot and generative AI overall.
  prefs: []
  type: TYPE_NORMAL
- en: With our trainees, we see that the learning motions do not stop but keep on
    evolving over time. That is why we recommend revisiting this occasionally, as
    you might have procured some knowledge in the meantime, which could help the next
    piece to fall into place. Even we experienced trainers learn about new features
    or new ways of thinking and utilizing GitHub Copilot by looking at each other’s
    way of working. That’s why we also recommend that you look at [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor277)
    – it shows ways to keep sharing knowledge on where the tools work really well
    for you or your workflow. A big part is also to share where it falls short for
    your environment, where you might learn how other people work with or around those
    kinds of obstacles.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s dive into a variety of different learning motions – some of these
    are little realizations, and others are really restructuring our thought or engineering
    processes.
  prefs: []
  type: TYPE_NORMAL
- en: Explain what you want to achieve
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Engineers often fall into a pitfall where they start implementing code changes
    at the method level instead of taking a step back and understanding what the different
    steps are to implement the feature they want to build. Instead, it helps a lot
    if you start by documenting what you want to achieve, as that helps you with the
    implementation flow and prevents a lot of reworking – particularly if you’re working
    from the lowest level of implementation up.
  prefs: []
  type: TYPE_NORMAL
- en: When documenting what you want to achieve, think about how you would explain
    the task to a colleague. Start breaking up that goal into smaller pieces and describe
    the steps you plan to take to achieve that goal. Make sure that you focus on *what*
    you want to achieve, rather than focusing on *how* you want to achieve it. That
    means that instead of diving into the details of the implementation, you ask GitHub
    Copilot to help you achieve the business goal of your changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example of diving too deep into the how would be asking GitHub Copilot:
    `"` `Write a for loop to check all the items in the list and calculate the sum
    and average of a field."` Instead, prompt with what you want to achieve, and let
    it propose a good way to do so. The better prompt here would be: `"Summarize all
    the items in the list based on this field."` The models used are really well-suited
    to figuring out whether this should be a `for` loop, map-reduce, or some other
    method. Even better, sometimes the model comes up with a technique that you might
    not have seen before, or proposes a smarter solution than the one you had in mind.'
  prefs: []
  type: TYPE_NORMAL
- en: 'When it comes to GitHub Copilot, what worked for us is writing down those steps
    as comments in your code file. Since GitHub Copilot uses the information of the
    current file, and especially looks at the code around your cursor, it picks up
    on what you want to achieve. Implementing those steps as actual code is then easier,
    as GitHub Copilot does not have to guess at what you want to achieve: it already
    knows from your comments.'
  prefs: []
  type: TYPE_NORMAL
- en: Even better, by following this, you now have proper documentation in your code
    of what you are trying to achieve. This massively helps you, your co-workers/coders,
    and GitHub Copilot in the future when they review your code or when they need
    to make changes. Ultimately, the comments make your thinking process clear on
    what you want to achieve, instead of having to guess it from the actual code.
    That is a win-win for us!
  prefs: []
  type: TYPE_NORMAL
- en: Know your context
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It is important to know how GitHub Copilot uses the information from the editor
    to choose what to send to the LLM in the backend. Not every single line of code
    in your application is necessarily sent for each call, so have a good understanding
    of what parts are being chosen to be used alongside your prompt message. Key parts
    are always the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Your cursor location
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some lines of code around that location (often referred to as “10 lines before
    and after your cursor”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Potentially adjacent files you happen to have open in your editor
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sometimes it can help to close additional files that are not relevant to the
    task at hand, or open the right files, for example, to include a class definition
    declared in another file, or add a direct reference to the file that implements
    an interface.
  prefs: []
  type: TYPE_NORMAL
- en: If you just ask a question without much context, the quality of the results
    might be disappointing, or show fields/variables/methods that do not even exist.
    This comes from the non-deterministic nature of the models, as well as the probability
    calculations that are done to predict the completion that makes the most sense
    (see more examples in [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor022) ). You can
    always try to work with a minimal context size and see how well that works in
    your situation, or choosing a different model might help. Sometimes GitHub Copilot
    will determine that it needs more information to have a better-quality result,
    and then it chooses to execute the `#codebase` or `@workspace` command to gather
    more information.
  prefs: []
  type: TYPE_NORMAL
- en: Some editors, such as Visual Studio, are even smarter and start to include snippets
    from methods or class definitions as they leverage the local IntelliSense or information
    from the language server for your SDK. What we recommend is to be the pilot in
    this process and define what context the model might need to get better results.
    See *Figure 8.1* , where we only have one file open, but we include extra files
    as context because we know they are relevant to the question we are asking.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1: Example of adding context yourself in the chat interface](img/B34107_08_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.1: Example of adding context yourself in the chat interface'
  prefs: []
  type: TYPE_NORMAL
- en: Also, refer to available tools such as `#file` and `#terminalLastCommand` ,
    and include the context you know is important in the context sent to GitHub Copilot.
    You can even drag and drop an entire folder to be included as context.
  prefs: []
  type: TYPE_NORMAL
- en: If you have another method that does something very similar to the thing you
    want to implement, refer to that method in your chat message and prompt with something
    such as `"Implement a REST controller for this object storage method, similar
    to what is inside of controller X."` You can even include `#symbol` for a direct
    reference to another class or method.
  prefs: []
  type: TYPE_NORMAL
- en: Copy method calls as comments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you are ready to implement a method, do not copy the call and start working
    that into a new method definition yourself. In a lot of languages, the way to
    call a method is written differently compared to the method implementation itself.
    That means that you copy the calling code and have to then rework it into the
    definition header by adding in extra keywords, such as parameter declarations!
  prefs: []
  type: TYPE_NORMAL
- en: 'After repeating this pattern over and over, we wondered if there was a better
    way. Eventually, we found that instead of reworking the call into the method setup,
    we could copy the call itself as a comment to the location where you want to implement
    it, then ask GitHub Copilot to implement that method for you. Once done, you can
    do either of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Trigger the code completion like we do in *Figure 8.2* . This is the fastest
    option, as you can continue your flow and do not have to switch to a different
    mode.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.2: Example difference in the method call and declaration in C#](img/B34107_08_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.2: Example difference in the method call and declaration in C#'
  prefs: []
  type: TYPE_NORMAL
- en: In the ghost text, you see that the entire method implementation is suggested
    by GitHub Copilot, without the need for you to add parameter types to every parameter.
  prefs: []
  type: TYPE_NORMAL
- en: Another option is to use the chat interface to ask for the implementation. GitHub
    Copilot will infer the parameters, their types, and how to return the correct
    information from the method and the available context, all from the calling code
    example that you just gave it!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All that is left is to clean up the comment and validate whether the suggested
    code correctly implements the value you wanted to achieve (you might want to write
    some unit tests with GitHub Copilot as well!). Don’t forget to add at least some
    minimal comment on what the method should achieve, or add complete documentation
    (using GitHub Copilot, of course!).
  prefs: []
  type: TYPE_NORMAL
- en: Top-down programming instead of bottom-up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We often see engineers form an initial idea of the changes they want to make
    to their code, based on the functionality they aim to implement. As soon as the
    outline of the idea is thought of, they make the mental jump to all the places
    in the code base where the necessary changes need to be made. They mentally jump
    from the top level in the code base through the hoops in their frameworks to the
    location at the lowest level where the changes need to be made. Then they navigate
    to that location and start working on implementing the changes. This is not efficient,
    especially when looking at the way GitHub Copilot helps us implement changes.
    Instead, we recommend changing your way of working to a more **Test-Driven Development**
    ( **TDD** ) style of working (so top-down programming instead of bottom-up).
  prefs: []
  type: TYPE_NORMAL
- en: 'This tip boosts the speed of creating new methods tremendously. Instead of
    working from the lowest level of code towards the places where you will call this
    new code, work the other way around, more top-down coding instead of bottom-up.
    This is another pitfall of many engineers who want to dive into the deep levels
    of their code implementation, instead of constantly thinking of what they want
    to achieve. With TDD, you write the test cases first to describe what you think
    is valid proof that the code works. This TDD process flow is how Agent Mode works
    as well: it will make the changes in the code first and then execute the code
    and tests to validate whether everything works as intended.'
  prefs: []
  type: TYPE_NORMAL
- en: TDD is a methodology in coding where you first write down a test that you want
    to run to prove that the code implements a feature the way you intended it to
    work. By testing the outputs to be correct for your input, you know the code achieved
    its goal. Taking this all the way in TDD, you first write the test and make sure
    that you can compile/execute the code to see that the moving parts (method calls)
    are there, but they fail in achieving the correct outcomes. Then implement the
    code, run the tests, fix any failures, and so on, until the test succeeds.
  prefs: []
  type: TYPE_NORMAL
- en: So, we recommend turning your coding flow around and starting by describing
    the value you want to add to the application, by writing down the code and method
    calls from the top to the bottom for GitHub Copilot to implement.
  prefs: []
  type: TYPE_NORMAL
- en: Typos in your prompt do not matter
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a tip we learned from another trainer after they watched some of our
    demos. When they noticed that we continuously went back in our prompts to fix
    typos (especially in the chat interface), they reminded us that these language
    models work by splitting up our context and prompts into tokens, and then mathematically
    calculating the most probable completion on the prompt to give us the suggestion
    or chat result. Since the models have been trained on large amounts of example
    data, there is a very good chance that they have also seen the word you were trying
    to type in all the ways it can be spelled incorrectly. As long as it resembles
    the word you had in mind, just keep on typing! Most of the time, the meaning will
    be correctly inferred from your prompt, so that it does not matter in the result.
  prefs: []
  type: TYPE_NORMAL
- en: Our rule of thumb is to leave typos in words if the word is mostly still readable
    – if you squint and can make sense of it, the LLM can probably too. Of course,
    this affects shorter words more than longer words, and it matters whether you
    have a small typo in a word versus multiple mangled words in a row.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.3: A typo in the prompt does not matter (that much)](img/B34107_08_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.3: A typo in the prompt does not matter (that much)'
  prefs: []
  type: TYPE_NORMAL
- en: Use the chat
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We often see people relying on their muscle memory, diving straight into the
    code they already have in mind. As a result, they mostly stick to using inline
    suggestions in the editor, missing out on 90% of what GitHub Copilot can do!
  prefs: []
  type: TYPE_NORMAL
- en: The chat interface is where a lot of the power is in GitHub Copilot, as that’s
    what lets you direct the LLM to update or create complete code blocks or methods.
    This is another example where it works best to show people how to be smart with
    these tools and not start typing everything yourself. It can be a lot faster to
    just ask in the chat interface (in Edit or Agent Mode) to refactor a method so
    that it is a new method. Now compare that to copying and pasting the new method
    yourself, implementing the method signature, going back to the calling location,
    and implementing that method – with the chat interface, you can do the same thing
    in one prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Another benefit is that, again, you can focus on what you want to achieve, saving
    some brain power, as you do not have to think out all those new lines of code,
    or the correct way of calling the new method. This is another great way to achieve
    more speed and focus on what you want to do.
  prefs: []
  type: TYPE_NORMAL
- en: 'We always say that we did not become engineers to type in the same mundane
    code every day. We do not add value with the next `for` loop or fancy implementation
    of an algorithm. Our value lies in systems thinking: understanding how code behaves
    in our production environment, with the limitations we have in our configuration.
    Use GitHub Copilot for that benefit as well, and let it implement those things
    for you, so you can focus on the right things. We lean on the chat interface so
    much these days that we hardly get out of Agent Mode at all!'
  prefs: []
  type: TYPE_NORMAL
- en: Accept the truth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This lesson is something we internalized ourselves by understanding what an
    LLM is, and where the restrictions of it are: there is no one magic prompt that
    will do all the work for you. You still need to understand your application, how
    each part works, and how they interact together to add up to a smooth execution
    in production.'
  prefs: []
  type: TYPE_NORMAL
- en: '*You* are the engineer, and *you* drive the conversation. If you do not document
    your requirements and environmental constraints, then GitHub Copilot will not
    take that into account with its implementation either. The more tests you add,
    the easier you or Agent Mode can validate that the code correctly implements your
    requirements. Use the tools that you have, such as the project README file, or
    use custom instructions to document the important constraints and the way y ou
    and your team work(s). That way, the LLM uses that context where needed, leading
    to much improved results.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This learning motion is all about accepting that generative AI still needs
    your input as well as your validation. It will not produce perfect solutions for
    every prompt you give it, and it can produce a different result with the same
    context, due to the non-deterministic nature of language models. That is why we
    still see a role for engineers in this new era of writing software: there is a
    need for the human brain to steer the AI in a direction, hand out constraints
    and context, and to check whether the results are actually as you intended.'
  prefs: []
  type: TYPE_NORMAL
- en: Be smart and creative
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The best way to use GitHub Copilot depends on your creativity and the task at
    hand. We’ve often found ourselves preparing to write a script for something, only
    to realize that the data involved was small enough to fit entirely within the
    model’s context window. In such cases, Copilot can handle the task directly in
    the chat interface.
  prefs: []
  type: TYPE_NORMAL
- en: For example, imagine you have a short list of usernames and want to sort them
    by last name. Instead of writing a script, you can simply paste the list into
    the chat and ask GitHub Copilot to sort it for you. The effectiveness of this
    approach depends on the size of the data and the context window of the model you’re
    using. When the data fits, GitHub Copilot can offer quick, accurate results without
    the need for traditional scripting. And if the data doesn’t fit, GitHub Copilot
    will return an error if your prompt is too long.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see another example in *Figure* *8.4* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.4: Retrieving a column from CSV](img/B34107_08_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.4: Retrieving a column from CSV'
  prefs: []
  type: TYPE_NORMAL
- en: In the example, you can see a smart and creative use of GitHub Copilot to handle
    a piece of data that we needed to convert. We could go the route of generating
    a script to handle this dataset with full precision and in a repeatable way, or
    we can be smart and ask the model to handle the use case completely from start
    to finish. The opportunities for these kinds of conversions are endless. Another
    example would be to generate a similar dataset, just by prompting to generate
    the test data with a set of defined characteristics (such as the fields in the
    class you want to generate tests for).
  prefs: []
  type: TYPE_NORMAL
- en: 'We also get this question a lot during training: Can Copilot also handle my
    specific language/SDK/code? The answer we always give is: let’s try it out! As
    long as it is some form of structured text, lots of models will handle it just
    fine. The quality of the result depends on the model and the training data it
    has seen, of course, but overall it works really well.'
  prefs: []
  type: TYPE_NORMAL
- en: That opens so many possibilities for using GitHub Copilot across a wide range
    of tasks. We have contributed to Go libraries, although we are not familiar with
    Go as a language at all. We have written Splunk/ Grafana/Power BI queries and
    dashboards with it, created scripts to load data from APIs, and migrated issues
    from repo to repo using the GitHub MCP server. You can use GitHub Copilot for
    ideation, to review your code, to find new ways to use your application, or ways
    to make it more performant. Every time we ask for ways to make the code more readable
    and therefore more maintainable, people are amazed by the results. That is the
    challenge we want to put to you, to use GitHub Copilot more for discovery and
    tasks that you normally do not get the time for, and take it to the next level!
  prefs: []
  type: TYPE_NORMAL
- en: Review and refine, don’t just accept
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the biggest traps we see with new users is hitting *Tab* too quickly.
    GitHub Copilot produces a suggestion, and people accept it right away, without
    check ing whether it actually solves their problem, fits their coding standards,
    or keeps things clean. What we learned is that the first suggestion is usually
    just a starting point, not the finished product. By asking Copilot to “make it
    simpler,” “optimize this loop,” or “rewrite this to match method X,” you get a
    much stronger result. Treat the output as a draft and keep the conversation going.
    This small shift in mindset helps you remain the engineer in control, instead
    of letting the tool dictate your code.
  prefs: []
  type: TYPE_NORMAL
- en: Build team etiquette for Copilot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When only one person uses GitHub Copilot, you see their personal style reflected
    in the code. But when a whole team starts using it, you quickly notice inconsistencies.
    Some people leave detailed comments to guide the AI, others barely prompt at all.
    Some rely heavily on chat, while others only use inline completions. Without a
    shared way of working, pull requests can feel like patchwork.
  prefs: []
  type: TYPE_NORMAL
- en: What worked better for us was talking about “AI etiquette” as a team. Decide
    how much context you want to leave in comments, how you validate generated tests,
    and when to use chat versus inline prompts. Just like coding standards, these
    agreements make collaboration smoother and help everyone get consistent value
    from GitHub Copilot. Document these agreements in the custom instructions file
    so that everyone, including GitHub Copilot, has the same context when making changes
    to the code base.
  prefs: []
  type: TYPE_NORMAL
- en: Talk to it like a person (but know it doesn’t care)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A question we hear a lot is: Should I be polite when prompting? Does “please”
    or “thank you” make any difference? The short answer is no, the model doesn’t
    “feel” or reward politeness. The real trick is to focus on describing what you
    want clearly and directly. Work with it in the same way you would work with someone
    that is new to your code base and explain as much as possible about what you want
    to achieve, the constraints that you have when the code base is being executed,
    and so on. Often, people are very terse in their prompts, leading to lower-quality
    answers. Since GitHub Copilot has no history other than the current chat conversation
    and the code base at hand, you will need to explain things to it, just like you
    would to a new team member.'
  prefs: []
  type: TYPE_NORMAL
- en: Reset the conversation when things go sideways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We noticed in our training sessions that people often keep poking GitHub Copilot
    with slightly different prompts when it is clearly stuck in a loop. By doing this,
    the results do not improve, and frustration builds quickly. What we learned is
    that it works much better to reset the situation instead. Move your cursor, close
    files that are not part of the task, or even start a fresh chat conversation.
    That small reset often makes GitHub Copilot take a completely different path.
    We now compare it to wiping the whiteboard in a classroom: sometimes you need
    a clean slate to get unstuck.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Remember, the entire chat history is used as context for generating responses.
    So, if the quality of suggestions starts to drop, it might be time for a reset.
    Starting a new conversation can help Copilot refocus—especially when switching
    tasks, such as moving from backend to frontend work, or after submitting a pull
    request. A fresh chat is like wiping the whiteboard clean: it gives the model
    a chance to take a new direction without being influenced by previous context.'
  prefs: []
  type: TYPE_NORMAL
- en: Mix prompting styles, models, and chat modes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over time, we have seen that people tend to fall into a single prompting style
    – either very short or very long. Both have their place. Short prompts often work
    great for quick completions or boilerplate, while longer and more structured prompts
    are better for complex refactors or new features. During customer sessions, we
    also learned that trying a different model can completely change the outcome.
    One model might generate more concise code, and another might give you more detail
    or comments.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our tip is to experiment with both prompt length and model choice. The people
    who do this get noticeably better results because they are not locked into one
    way of working. Add extra information in your prompts if you switch between ways
    of approaching a coding challenge as well: when researching, switch to Ask Mode
    to prevent GitHub Copilot from immediately writing code. You research first to
    get enough context to handle your current task. Only when you feel like you have
    enough context do you switch to Edit or Agent Mode and start implementing. It’s
    the same vice versa: when you change tasks, switching back to Edit or Agent Mode
    can help a lot.'
  prefs: []
  type: TYPE_NORMAL
- en: One example of this is handling bugs in your code. Instead of dropping the error
    into the chat with Agent Mode and hoping that GitHub Copilot will figure it out,
    we start in Ask Mode first. We can use a prompt to try to find where in the code
    the bug might be coming from. We then add extra context by mentioning, for example,
    that this bug only occurs if we run the code in a memory-constrained environment,
    and continue until we have enough context in the chat to have properly analyzed
    the issue and found the places where adjustments are needed. Only then do we switch
    to Agent Mode (which preserves the chat history) and ask GitHub Copilot to make
    the necessary changes in the places we have identified in our analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Learn from what it gets wrong
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This final lesson came from watching people react when GitHub Copilot gives
    a bad suggestion. The first instinct is usually to dismiss it as “useless” or
    “garbage.” What helped us was looking at those moments as feedback instead. If
    the result was wrong, was it because the context was too thin, the goal was not
    clear, or the request was too ambitious? Once we started asking those questions,
    our prompting skills improved quickly. We even began sharing bad outputs with
    each other during training, because sometimes the “wrong” suggestion sparked a
    new idea or revealed a gap we had not thought of. So, even the failures became
    part of the learning process. Similarly, share these experiences as it helps other
    people to understand the current state of different modes or models. Especially
    models that are in preview can run into issues, as GitHub is still working on
    the quality of the responses, while giving you a chance to learn from the new
    options.
  prefs: []
  type: TYPE_NORMAL
- en: With these learning motions, we shared some tips that helped us to go to the
    next level of proficiency using GitHub Copilot and improved our quality of life
    by either saving us manual work or by lowering the mental load of keeping track
    of extra information. Not all of them might work for you, and some can be realizations
    that make sense after spending some more time working with GitHub Copilot. Use
    them to your benefit where it helps, and share your own epiphanies on this with
    us as well! We continuously learn new ways of looking at problems as well, and
    are very curious about all the creative ways you look at these learning opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Now we are going to look at an example to tie all these learning motions together,
    by approaching GitHub Copilot in a staggered manner, so that you build up context
    and use that context over time in the same conversation. The more context the
    LLM can get, the better the results will be.
  prefs: []
  type: TYPE_NORMAL
- en: Approaching problems the right way
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To come back to the wrong ways we see people use generative AI and tools such
    as GitHub Copilot, we want to show you the right ways as well. Since LLMs use
    the context of what they know (given by the IDEs) to predict the most likely next
    word(s), we can use that to give enough context (and not too much) to describe
    *what* we want to achieve, but not too much on *how* to achieve it. We also know
    that the longer the suggestions are, the lower the quality will be. So, we don’t
    go for big results in one go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take an example. Let’s say you don’t have any code and you want you to
    build a game. A bad idea would be to simply say, `Build Super Mario in Vite.js`
    , as shown in *Figure* *8.5* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.5: Prompt too short with big expectations](img/B34107_08_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.5: Prompt too short with big expectations'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, I prompted `"Build Super Mario in Vite.js"` in an empty folder.
    GitHub Copilot generated plenty of files that have sensible names, so the expectations
    were rather high. Even after iterating on the prompt with Agent Mode for over
    10 minutes, I only got a blue rectangle when I started up the game, and nothing
    else. There were all sorts of mistakes in the generated code, including using
    a package that is no longer supported. This is an example of starting off too
    big and ending up disappointed.
  prefs: []
  type: TYPE_NORMAL
- en: When starting from scratch, our recommendation is to build things up slowly
    and to make sure you have the right foundations in place. For example, a key thing
    to start with is making sure your code can be executed locally, and that you can
    run all tests locally as well. This will give us the most confidence that the
    code works as we want it to.
  prefs: []
  type: TYPE_NORMAL
- en: Keeping with our game example, in *Figure* *8.6* , you can see that we start
    by asking for help to devise a good approach for tackling such an assignment,
    specifically asking, `"Let's make a plan before we start to iterate."`
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.6: Prompt with more steps and context](img/B34107_08_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.6: Prompt with more steps and context'
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on the output of the chat, you can ask follow-up questions to guide the
    model through the steps you want it to take, which will get you higher-quality
    results. Some of those follow-up questions/prompts in this scenario would be:
    `"Add the tests to describe the behavior we want to implement,"` or `"Add a script
    to build the application and execute the unit tests."`'
  prefs: []
  type: TYPE_NORMAL
- en: Working this way helps you build a foundation of tests so that you can gain
    trust that the changes that are made add the features you wanted to create.
  prefs: []
  type: TYPE_NORMAL
- en: By being mindful of the way we prompt GitHub Copilot, we make the changes smaller
    in the beginning. Once the foundation has been laid in the form of project structure
    and tests, you will start to see that we can go faster, because GitHub Copilot
    uses the generated content to tune the next changes it makes.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this chapter, we looked at lessons that we have learned over time to work
    faster with GitHub Copilot, or to get better results from it. By either realizing
    seemingly little things, such as “typos do not matter” or “accept the truth: there
    is no magic,” we have a different way we look at generative AI as a whole and
    realize that our value as an engineer has moved a little bit as well. Instead
    of focusing on the most amazing approach or the most brilliant way to write a
    piece of code, we focus on adding more business value instead. By making a couple
    of adjustments to how we go from ideation to code creation, and by describing
    *what* we want to achieve, and less about *how* we want to achieve it, we get
    more help from the tooling and sometimes even learn about new concepts that fit
    even better than our own initial ideas!'
  prefs: []
  type: TYPE_NORMAL
- en: We did not magically discover all these learning motions just by using the tools
    ourselves. We learn the most by looking at other people using these tools and
    asking for tips and tricks to learn from them. We’ve been part of so many training
    sessions with co-trainers, and every one of them has slightly different ways of
    working with GitHub Copilot! The next chapter dives into building a knowledge-sharing
    community around these tools, where you can learn new ways of using them, and
    even see new features being demonstrated, for example. Keeping up with the latest
    changes is a challenge, so the more people share about new functionality that
    helps them in some way, the more ideas you get on how you can get to the next
    level of proficiency with GitHub Copilot as well.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
