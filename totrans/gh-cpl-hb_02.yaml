- en: '1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: GitHub Copilot Explained
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解释 GitHub Copilot
- en: '**GitHub Copilot** is a service offering from GitHub that helps you to work
    on your applications in all steps of the software development lifecycle: from
    ideation, to understanding and writing code, to reviewing your pull requests and
    analyzing pipeline failures. By using what we call generative **Artificial Intelligence**
    ( **AI** ), it helps you speed up normal tasks so you can focus on what you do
    best: adding value to your end users.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**GitHub Copilot** 是 GitHub 提供的一项服务，它帮助你在软件开发生命周期的所有步骤中工作：从构思、理解编写代码，到审查你的拉取请求和分析管道故障。通过使用我们所说的生成式
    **人工智能**（**AI**），它帮助你加快常规任务，以便你可以专注于你做得最好的事情：为最终用户提供价值。'
- en: 'GitHub describes Copilot as you r pair-programming buddy: a tool that knows
    almost every coding language, framework, and well-known codin g patterns. It can
    help you with researching both existing and new code directions, can help review
    your code and suggest improvements, or can complete the task that you have been
    working on. It intuitively understands your current code and coding style and
    will follow that to match it. We even think that GitHub Copilot is better than
    a human pair-programming buddy, as it is a tool that does not judge you on anything
    you ask about! Can’t remember how to implement an algorithm that you learned years
    ago? You might be afraid to ask your team members about it, but GitHub Copilot
    will happily explain it to you – plus, it will explain it in the context of your
    code base!'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub 将 Copilot 描述为你的编程伙伴：一个几乎了解所有编程语言、框架和知名编码模式的工具。它可以帮助你研究现有和新代码方向，可以帮助审查你的代码并提出改进建议，或者可以完成你正在进行的任务。它直观地理解你当前的代码和编码风格，并将遵循这些风格来匹配。我们甚至认为
    GitHub Copilot 比人类编程伙伴更好，因为它不会对你提出的任何问题进行评判！记不起几年前学过的算法如何实现吗？你可能害怕向团队成员询问，但 GitHub
    Copilot 会乐意为你解释——而且，它还会在你的代码库上下文中解释它！
- en: 'Keep in mind that the name of the tool also gives away the most important part
    of its role in your usage of it: it is a *co-pilot* , which means *you* are the
    pilot, and *you* are in control. You define the questions you ask it; the scenarios
    you let it complete; the help you ask it for; and whether you accept the suggestions
    or not. In the end, the code is stored in a **Source Code Management** ( **SCM**
    ) system with *your* name attached to it, not GitHub Copilot’s name.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，工具的名称也揭示了它在您使用中的最重要部分：它是一个 *共飞行员*，这意味着 *你* 是飞行员，*你* 掌控一切。你定义你向它提出的问题；你让它完成的场景；你请求它的帮助；以及你是否接受这些建议。最后，代码存储在带有
    *你的* 名字的 **源代码管理**（**SCM**）系统中，而不是 GitHub Copilot 的名字。
- en: This book will take you through the impact that GitHub Copilot has on all steps
    of the **Software Development Life Cycle** ( **SDLC** ), from start to finish.
    We will explain the features of the tools, the basics of generative AI, and how
    to leverage GitHub Copilot to get the most value out of it. We will also discuss
    the different license types that are available and what features they have for
    either usage in your editor or on the web interface for GitHub.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将带你了解 GitHub Copilot 对 **软件开发生命周期**（**SDLC**）所有步骤的影响，从开始到结束。我们将解释工具的功能、生成式人工智能的基础知识以及如何利用
    GitHub Copilot 获取最大价值。我们还将讨论可用的不同许可类型及其在您的编辑器或 GitHub 网页界面上的功能。
- en: To get things going, we will take a look at what GitHub Copilot is and what
    kind of features it provides. It all started as an extension in your coding editor,
    and it has grown into a full set of features to help you, from writing code to
    generating completely new ideas, from analyzing pull requests to helping you fix
    your pipeline errors, and so much more. These features are built into a lot of
    editors, and some reside inside the web interface on GitHub.com.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让事情开始运转，我们将探讨 GitHub Copilot 是什么以及它提供了哪些功能。它最初是编码编辑器中的一个扩展，现在已经发展成为一个完整的特性集，帮助你从编写代码到生成全新的想法，从分析拉取请求到帮助你修复管道错误，以及更多。这些功能内置到许多编辑器中，其中一些位于
    GitHub.com 的网页界面内。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: What is GitHub Copilot?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是 GitHub Copilot？
- en: Reviewing additional supporting features in editors
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在编辑器中审查其他辅助功能
- en: Using GitHub Copilot integrations on GitHub.com
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 GitHub.com 上使用 GitHub Copilot 集成
- en: '|'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Free Benefits with Your Book
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随书免费福利
- en: Your purchase includes a free PDF copy of this book along with other exclusive
    benefits. Check the *Free Benefits with Your Book* section in the Preface to unlock
    them instantly and maximize your learning experience. |
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 您的购买包括本书的免费 PDF 复印本以及其他独家优惠。请参阅序言中的 *本书的免费优惠* 部分，以立即解锁它们并最大化您的学习体验。|
- en: Technical requirements
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: To use GitHub Copilot, you do not need to use the rest of the GitHub suite of
    tools. You can use it in a supported editor of your choosing against any file,
    no matter where it is stored. If you already use source control systems such as
    GitLab, Azure DevOps, or Bitbucket, you can still use GitHub Copilot. GitHub is
    the vendor of the product, but using GitHub itself is not a requirement.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 GitHub Copilot，您不需要使用 GitHub 套件中的其他工具。您可以在您选择的任何支持编辑器中对其任何文件使用它，无论它存储在哪里。如果您已经使用
    GitLab、Azure DevOps 或 Bitbucket 等源代码控制系统，您仍然可以使用 GitHub Copilot。GitHub 是该产品的供应商，但使用
    GitHub 本身不是必需的。
- en: Of course, there is extra functionality available if you use GitHub, which will
    be explained in depth in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191) . The
    only integration to be able to use GitHub Copilot is having a GitHub account that
    you can use to log in and then tie your GitHub Copilot license to it. This tool
    is even available as a free tier (with some limitations), making it available
    for all GitHub users. Which features are available in which tier is explained
    in [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) .
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果您使用 GitHub，还有额外的功能可用，这将在 [*第 6 章*](Chapter_6.xhtml#_idTextAnchor191) 中详细介绍。能够使用
    GitHub Copilot 的唯一集成是拥有一个可以用来登录的 GitHub 账户，然后可以将您的 GitHub Copilot 许可证与之关联。这个工具甚至作为一个免费层（有一些限制）提供，使其对所有
    GitHub 用户都可用。哪些功能在哪个层可用将在 [*第 3 章*](Chapter_3.xhtml#_idTextAnchor041) 中解释。
- en: What is GitHub Copilot?
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是 GitHub Copilot？
- en: GitHub Copilot is a set of tools that can help you understand or produce code,
    either by helping you write code in an editor, talking to your code base to gain
    more information, or getting help from integrated functionality inside the web
    interface of GitHub.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 是一套工具，可以帮助您理解或生成代码，无论是通过帮助您在编辑器中编写代码，与您的代码库交谈以获取更多信息，还是从 GitHub
    网页界面中的集成功能中获得帮助。
- en: This all starts with GitHub Copilot leveraging **Large Language Models** ( **LLMs**
    ) to complete the current line(s) of code that you are working on, by adding a
    suggestion when you stop typing for a couple of milliseconds, or when you hit
    the *Return* key. Depending on your color scheme, a suggestion is shown in *gray*
    or *dimmed* text in the editor, behind your cursor. You can see this in *Figure
    1.1* , where the cursor is on line 9. This is also called “ghost text.” This text
    is a continuation of the code you already typed, and GitHub Copilot finds the
    most logical completion of the code and suggests it for you to accept.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切都始于 GitHub Copilot 利用 **大型语言模型**（**LLMs**）来补充您正在工作的当前代码行，通过在您停止输入几毫秒或按下
    *Return* 键时添加建议来实现。根据您的配色方案，建议在编辑器中以 *灰色* 或 *暗淡* 文本显示，位于您的光标后面。您可以在 *图 1.1* 中看到这一点，其中光标位于第
    9 行。这也被称为“幽灵文本”。这段文本是您已经输入的代码的延续，GitHub Copilot 找到代码的最合理完成部分，并为您建议接受。
- en: '![Figure 1.1: Example of “ghost text” inside of VS Code](img/B34107_01_1.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.1：VS Code 中“幽灵文本”的示例](img/B34107_01_1.png)'
- en: 'Figure 1.1: Example of “ghost text” inside of VS Code'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1：VS Code 中“幽灵文本”的示例
- en: 'Accepting the code is as simple as hitting the *Tab* key, and the ghost text
    will be inserted at your cursor. The cursor will be moved to the end of the text
    that was inserted. Depending on what you were doing and how confident GitHub Copilot
    is in the suggestion, you can get either a word, a complete line, or multiple
    lines of code. It is then completely up to you what you want to do with that suggestion:
    you can use it as was proposed, you can accept parts of it, or you cannot accept
    any of it. What we also see is that people read the suggestions and then revise
    either the direction they were going in or the surrounding code based on new insights.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 接受代码就像按下 *Tab* 键一样简单，并且幽灵文本将插入到您的光标处。光标将移动到插入文本的末尾。根据您正在做什么以及 GitHub Copilot
    对建议的信心程度，您可以得到一个单词、一行完整的代码，或者多行代码。然后，您完全可以根据自己的意愿来决定如何处理这个建议：您可以使用它如提议的那样，您可以选择接受其中的一部分，或者您可以选择不接受任何部分。我们还看到，人们阅读建议后，会根据新的见解修改他们原本的方向或周围的代码。
- en: 'As well as the suggestion functionality, GitHub Copilot has chat integration,
    where you can have a conversation with the tool about the currently open files.
    See *Figure 1.2* for an example:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 除了建议功能，GitHub Copilot还集成了聊天功能，你可以与工具就当前打开的文件进行对话。参见*图1.2*的示例：
- en: '![Figure 1.2: Example of a chat conversation with GitHub Copilot](img/B34107_01_2.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图1.2：与GitHub Copilot的聊天对话示例](img/B34107_01_2.png)'
- en: 'Figure 1.2: Example of a chat conversation with GitHub Copilot'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.2：与GitHub Copilot的聊天对话示例
- en: 'In the chat interface, you can ask anything you can think of – here are some
    examples:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在聊天界面中，你可以提出任何你能想到的问题——以下是一些示例：
- en: What the major elements of the current open code base are
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前开源代码库的主要元素是什么
- en: How you can execute the tests that exist in your project
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何执行你项目中存在的测试
- en: To find missing edge cases in your test suite
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的测试套件中找到缺失的边缘情况
- en: Create your pipelines for you in any **Continuous Integration/Continuous Deployment**
    ( **CI/CD** ) system you need
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你需要的任何**持续集成/持续部署**（**CI/CD**）系统中为你创建管道
- en: 'The possibilities are endless and entirely up to you. The chat interface is
    a great way to engage with your code. It does not matter whether you are a developer
    who is just getting started or an experienced engineer: GitHub Copilot offers
    something for everyone.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 可能性是无限的，完全取决于你。聊天界面是与你的代码互动的绝佳方式。无论你是刚开始接触开发的开发者，还是经验丰富的工程师：GitHub Copilot为每个人提供了所需的东西。
- en: 'We find it especially helpful if you are new to a code base, where GitHub Copilot
    can help you quickly find your way around the parts that you want to take a look
    at. Another great use case is when working in a development language that you
    are not that familiar with: we started contributing to code written in coding
    languages we did not use before, because GitHub Copilot helps us understand how
    those languages work. If you understand the basics of programming, such as `if`
    statements, `for` loops, and arrays, you can get very far very fast with GitHub
    Copilot. Even if you do not fully understand these basics, if you have an exploratory
    mindset, GitHub Copilot can help guide you through this new environment in a pragmatic
    way:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是新接触一个代码库，GitHub Copilot可以帮助你快速找到你想要查看的部分，我们会觉得这特别有帮助。另一个很好的用例是当你在一个你不那么熟悉的开发语言中工作时：我们开始为之前没有使用过的编程语言编写代码做出贡献，因为GitHub
    Copilot帮助我们理解这些语言是如何工作的。如果你理解编程的基本知识，例如`if`语句、`for`循环和数组，你就可以利用GitHub Copilot快速取得很大的进步。即使你对这些基础知识并不完全理解，如果你有探索的心态，GitHub
    Copilot可以通过一种实用主义的方式帮助你在这个新环境中导航：
- en: You can ask it to explain these features to you, and it will happily take you
    through these concepts step by step
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以要求它为你解释这些功能，它将乐意一步一步地带你通过这些概念
- en: You can quickly find your way around the new code base by asking for an explanation
    of where the entry point is or how to build the application
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过请求解释入口点在哪里或如何构建应用程序来快速找到新代码库的路径
- en: You can let GitHub Copilot explain the application by using diagrams to place
    the components in the right places for you, so you can quickly learn about the
    integration points between the backend and frontend
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以让GitHub Copilot通过使用图表来放置组件，为你解释应用程序，这样你可以快速了解后端和前端之间的集成点
- en: Since GitHub Copilot is that non-judgmental pair programming buddy that can
    help you with super basic tasks as well as more complex coding concepts, the chat
    function is a great tool for both people who are new to the field of coding, as
    well as for experienced engineers, and everything in between.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GitHub Copilot是非评判性的配对编程伙伴，可以帮助你完成从超级基础任务到更复杂的编码概念，聊天功能是对于新手和经验丰富的工程师，以及两者之间的所有人都是一个伟大的工具。
- en: Having a basic understanding of the underlying technology of generative AI is
    paramount to having realistic expectations of what value these tools bring to
    the table. Knowing how GitHub Copilot produces code is explained in [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor022) . With that knowledge, even more junior
    engineers can use GitHub Copilot to their advantage in researching and explaining
    coding concepts in the context of the current code base, where they can pick apart
    these concepts one by one. Since they understand that they need to double-check
    what GitHub Copilot produces, they can safely validate their own knowledge and
    grow their coding skills over time. Normal coding practices still apply, where
    we guide these engineers through the programming landscape and review the code
    they produce with that mindset, so they can grow in a safe manner. All this applies
    equally well to other non-technical stakeholders.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对生成式 AI 的底层技术有一个基本的了解对于对这些工具带来的价值有现实的期望至关重要。GitHub Copilot 生成代码的方式在[*第 2 章*](Chapter_2.xhtml#_idTextAnchor022)中解释。有了这些知识，即使是经验较少的工程师也能利用
    GitHub Copilot 在当前代码库的背景下研究并解释编码概念，他们可以逐一分析这些概念。由于他们明白需要仔细检查 GitHub Copilot 生成的代码，所以他们可以安全地验证自己的知识，并在一段时间内提高他们的编码技能。常规的编码实践仍然适用，我们通过编程景观引导这些工程师，并以这种心态审查他们产生的代码，以确保他们以安全的方式成长。所有这些都同样适用于其他非技术利益相关者。
- en: While suggestions and chat are the main functionalities that GitHub Copilot
    offers in most editors, some editors have even more functionality included. There
    are editors that offer, for example, an in-line chat functionality (see *Figure
    1.3* ) to directly edit a piece of code inside your text editor window. This feature
    lets you directly interact with your code in the place that you are editing, and
    it will directly apply the suggestions it is proposing with an inline overview
    to show the differences from your code.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 GitHub Copilot 在大多数编辑器中提供的主要功能是建议和聊天，但一些编辑器甚至包含更多功能。例如，有些编辑器提供了内联聊天功能（见 *图
    1.3*），可以直接在文本编辑器窗口中编辑一段代码。这个功能让你可以直接在你编辑的地方与代码互动，并且它会直接应用它提出的建议，并通过内联概述显示与你的代码的差异。
- en: '![Figure 1.3: Example of an in-line chat conversation](img/B34107_01_3.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.3：内联聊天对话示例](img/B34107_01_3.png)'
- en: 'Figure 1.3: Example of an in-line chat conversation'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.3：内联聊天对话示例
- en: Other editors have deep integrations with their own features; for example, some
    editors leverage their debug functionality to view the runtime values of your
    variables during test execution, or can view the statistics of your performance
    tests. The common convention is to look for a “magic” icon that indicates GitHub
    Copilot can do something at that location or functionality in the editor. See
    *Figure 1.4* for an example where GitHub Copilot generates a `git commit` message
    based on the current set of files that were changed.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 其他编辑器与其自身功能有深度集成；例如，有些编辑器利用其调试功能来查看测试执行期间的变量运行时值，或者可以查看性能测试的统计数据。常见的做法是寻找一个表示
    GitHub Copilot 在编辑器的该位置或功能上可以执行某些操作的“魔法”图标。见 *图 1.4* 中的示例，其中 GitHub Copilot 根据当前更改的文件集生成一个
    `git commit` 消息。
- en: '![Figure 1.4: GitHub Copilot integration in the git commit window](img/B34107_01_4.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.4：GitHub Copilot 在 git 提交窗口中的集成](img/B34107_01_4.png)'
- en: 'Figure 1.4: GitHub Copilot integration in the git commit window'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.4：GitHub Copilot 在 git 提交窗口中的集成
- en: Now we have seen a brief overview of the main functionalities that GitHub Copilot
    adds to your editor – including suggestions while you type, chat with your code,
    and inline chat to create inline changes – as well as some features available
    in other editors. In the next section, let’s take a closer look at which editors
    support which of these additional features on top of the main functionalities.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经简要概述了 GitHub Copilot 为你的编辑器添加的主要功能——包括你输入时的建议、与代码聊天以及内联聊天以创建内联更改——以及其他编辑器中的一些功能。在下一节中，我们将更详细地探讨哪些编辑器支持这些附加功能，以及它们是如何在主要功能之上实现的。
- en: Reviewing additional supporting features in editors
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在编辑器中审查其他辅助功能
- en: The primary use case of GitHub Copilot is helping you with your code base while
    you are creating code. This is done by integrating the different functionalities
    in an existing **Integrated Development Environment** ( **IDE** ). This is often
    also referred to as an “editor.” You work on your code inside the editor to add
    new methods and features to your application or scripts that you are working on.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot的主要用例是在您编写代码时帮助您处理代码库。这是通过将现有**集成开发环境**（**IDE**）中的不同功能集成来实现的。这通常也被称为“编辑器”。您在编辑器中工作，以向您正在开发的应用程序或脚本添加新方法和功能。
- en: Editors with GitHub Copilot plugins
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 拥有GitHub Copilot插件的编辑器
- en: 'The list of IDEs that have a plugin for GitHub Copilot is still growing. Currently,
    the following editors have some support for GitHub Copilot:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有GitHub Copilot插件的IDE列表仍在增长。目前，以下编辑器对GitHub Copilot提供了一些支持：
- en: '| **Editor** | **Suggestions** | **Chat** | **Other features** |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **编辑器** | **建议** | **聊天** | **其他功能** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| **VS Code** | Yes | Yes | Yes |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| **VS Code** | 是 | 是 | 是 |'
- en: '| **Visual Studio** | Yes | Yes | Yes |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| **Visual Studio** | 是 | 是 | 是 |'
- en: '| **JetBrains IDEs** | Yes | Yes | Yes |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **JetBrains IDEs** | 是 | 是 | 是 |'
- en: '| **Vim/Neovim** | Yes | No | No |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| **Vim/Neovim** | 是 | 否 | 否 |'
- en: '| **XCode** | No | Yes | No |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| **XCode** | 否 | 是 | 否 |'
- en: '| **Eclipse** | Yes | Yes | No |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| **Eclipse** | 是 | 是 | 否 |'
- en: 'Figure 1.5: Overview of the three types of features per editor'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.5：每种编辑器的三种类型功能概述
- en: 'Depending on the editor, certain features have been built in that work specifically
    for that editor, where we see the teams that create them learn from each other
    and sometimes rebuild great features in a way that works for their editor setup.
    One example is the deep integration that Visual Studio has with its Performance
    Profiler to give GitHub Copilot additional context during these performance-tuning
    sessions: a feature that the other editors do not have.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 根据编辑器的不同，某些功能已被内置，专门为该编辑器工作，我们看到创建它们的团队相互学习，有时以适合他们编辑器设置的方式重建出色的功能。一个例子是Visual
    Studio与其性能分析器深度集成，在性能调整会话期间为GitHub Copilot提供额外的上下文：这是其他编辑器没有的功能。
- en: Additional integrations outside of editors
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编辑器之外的额外集成
- en: 'Alongside editors, there are also additional integrations into the GitHub Desktop
    tool that let you work with any Git repository, no matter the source control system
    you are using:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 除了编辑器之外，GitHub Desktop工具还提供了额外的集成，让您可以使用任何Git仓库，无论您使用的是哪种版本控制系统：
- en: The **Pull Request** ( **PR** ) extension for VS Code has integrations with
    GitHub Copilot to write the PR title and description, and even the option to review
    the changes in the PR using AI.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: VS Code的**拉取请求**（**PR**）扩展与GitHub Copilot集成，可以编写PR标题和描述，甚至可以选择使用AI来审查PR中的更改。
- en: There is even a GitHub Copilot **Command Line Interface** ( **CLI** ) available
    to ask questions and let GitHub Copilot make the necessary changes to your code
    base, straight from the command line. We dive into the CLI in [*Chapter 5*](Chapter_5.xhtml#_idTextAnchor144)
    .
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 甚至还有一个GitHub Copilot的**命令行界面**（**CLI**），可以提问并让GitHub Copilot直接从命令行对您的代码库进行必要的更改。我们将在[*第5章*](Chapter_5.xhtml#_idTextAnchor144)中深入了解CLI。
- en: Plus, there is even an open source GitHub Copilot language server available,
    which lets *anyone* build GitHub Copilot into *any* client if they use the GitHub
    Copilot license to authenticate users.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，还有一个开源的GitHub Copilot语言服务器可用，允许任何人在使用GitHub Copilot许可证验证用户的情况下，将GitHub Copilot集成到任何客户端中。
- en: That means the possibilities to include GitHub Copilot are endless.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着包含GitHub Copilot的可能性是无限的。
- en: Editor feature release schedules
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编辑器功能发布计划
- en: Each editor plugin is often built by a different team from either GitHub or
    Microsoft (as they own VS Code and Visual Studio). The GitHub Copilot features
    for VS Code are open source and directly integrated into the open source code
    base in the VS Code repository! You can find the repository at [https://github.com/microsoft/vscode](https://github.com/microsoft/vscode)
    and follow along with their iteration planning. Since VS Code is Microsoft’s main
    editor these days, with support for a lot of languages and tools, we often see
    that new features first appear in VS Code. It is the editor where things are tried
    and tested out first.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 每个编辑器插件通常由 GitHub 或 Microsoft（因为他们拥有 VS Code 和 Visual Studio）的不同团队构建。VS Code
    的 GitHub Copilot 功能是开源的，并且直接集成到 VS Code 仓库中的开源代码库！您可以在 [https://github.com/microsoft/vscode](https://github.com/microsoft/vscode)
    找到该仓库，并跟踪他们的迭代规划。由于 VS Code 是微软目前的主要编辑器，支持许多语言和工具，我们经常看到新功能首先出现在 VS Code 中。它是首先尝试和测试新功能的地方。
- en: As the normal test versions of VS Code are in the Insiders release, following
    and using the Insiders release is the best way to see new features in action before
    the broader audience gets access to the formal releases. You can download and
    install the Insiders version for free from [https://code.visualstudio.com/insiders](https://code.visualstudio.com/insiders)
    . VS Code follows a regular release cadence of a new release version every month.
    The plugins are versioned separately and get multiple updates throughout the month.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 VS Code 的正常测试版本在 Insiders 发布中，因此跟踪和使用 Insiders 发布是在更广泛的受众获得正式发布之前看到新功能实际效果的最佳方式。您可以从
    [https://code.visualstudio.com/insiders](https://code.visualstudio.com/insiders)
    免费下载和安装 Insiders 版本。VS Code 每月都会有一个新的发布版本。插件是单独分版本的，并在整个月份内进行多次更新。
- en: The editor that usually gets new features after VS Code is Visual Studio, although
    sometimes the Visual Studio team has great ideas that they add first to Visual
    Studio, and then the VS Code team implements them as well in a later stage. Eventually,
    the functionality shows up in most other editors as well, where it makes sense
    or is possible. Editors such as Vim/Neovim only have a minimal user interface,
    and thus GitHub Copilot can only work with suggestions, as there is no place to
    show the chat interface. Visual Studio usually has a new release every three months.
    The plugins are versioned separately and can be released multiple times during
    the main release window.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 通常在 VS Code 之后获得新功能的编辑器是 Visual Studio，尽管有时 Visual Studio 团队有很好的想法，他们首先将其添加到
    Visual Studio 中，然后 VS Code 团队在稍后的阶段也实现了这些功能。最终，这些功能会在其他大多数编辑器中出现，只要它们有意义或可行。例如
    Vim/Neovim 这样的编辑器只有最小的用户界面，因此 GitHub Copilot 只能通过建议来工作，因为没有地方显示聊天界面。Visual Studio
    通常每三个月发布一个新版本。插件是单独分版本的，可以在主要发布窗口期间多次发布。
- en: IDE features are explained in depth in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor100)
    .
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: IDE 功能在 [*第 4 章*](Chapter_4.xhtml#_idTextAnchor100) 中进行了深入解释。
- en: At this point, we have taken a look at additional tools available outside of
    editors, such as the extension for the GitHub CLI and the integration into GitHub
    Desktop. We have seen that different editors follow a different update cadence,
    which impacts when a specific feature might be added to your editor of choice,
    or even if that happens at all. In the next section, we will take a look at the
    additional features that are available on the GitHub.com platform when you have
    your code stored in it.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们已经探讨了编辑器之外可用的额外工具，例如 GitHub CLI 的扩展和 GitHub Desktop 的集成。我们了解到不同的编辑器遵循不同的更新周期，这会影响特定功能何时可能添加到您选择的编辑器中，甚至是否会发生这种情况。在下一节中，我们将探讨当您的代码存储在
    GitHub.com 平台上时，该平台上可用的额外功能。
- en: Using GitHub Copilot integrations on GitHub.com
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 GitHub.com 上使用 GitHub Copilot 集成
- en: If you are using parts of the rest of the GitHub suite of products, then you
    can greatly enhance that experience with tooling from GitHub Copilot as well.
    After logging into [https://github.com](https://github.com) , you can start chatting
    with GitHub Copilot on top of any repository (see *Figure 1.6* ) or open it in
    an immersive window to chat without the context of a repository. This is great
    for researching things and having a separate, contextless window to the side to
    quickly look up things while you are working. Need to look up how to install packages
    in a specific package manager? Then this chat window is the right place to ask
    about it. Personally, we have this tab open in our browser all the time.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在使用 GitHub 套件产品的其他部分，那么你还可以通过 GitHub Copilot 的工具大大增强这一体验。登录到 [https://github.com](https://github.com)
    后，你可以在任何仓库的顶部与 GitHub Copilot 进行聊天（参见 *图 1.6* ）或在一个沉浸式窗口中打开它以进行聊天，而不需要仓库的上下文。这对于研究事物并有一个独立的、无上下文的侧边窗口在旁边快速查找信息非常有用。需要查找如何在特定的包管理器中安装包？那么这个聊天窗口就是询问这个问题的正确地方。个人来说，我们一直在浏览器中打开这个标签页。
- en: '![ Figure 1.6: Chat on the GitHub interface](img/B34107_01_6.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.6：GitHub 界面上的聊天](img/B34107_01_6.png)'
- en: 'Figure 1.6: Chat on the GitHub interface'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.6：GitHub 界面上的聊天
- en: Next to the chat, you will also find GitHub Copilot integrations in a lot of
    places on the web interface. Following the steps in the SDLC, it starts with researching
    new features you want to build and planning that work. GitHub Copilot can help
    you with both. The chat interface has a feature to create an issue in a repository,
    just by telling GitHub Copilot that you want to. It will then propose the issue
    title and text, with all the requirements you have been gathering in the chat
    conversation. This is great for researching where the touchpoints of the new feature
    in your application are, and for finding more context to base the issue’s description
    on. You can then instruct GitHub Copilot to create the issue in the repository,
    and it will do that for you, using your GitHub login. This will also make sure
    the issue contribution is linked to your user for future tracking and attribute
    the work you have done with GitHub Copilot to you.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在聊天旁边，你也会在网页界面的很多地方找到 GitHub Copilot 的集成。按照 SDLC 的步骤，它从研究你想要构建的新功能并规划这项工作开始。GitHub
    Copilot 可以帮助你完成这两项任务。聊天界面有一个创建仓库问题的功能，只需告诉 GitHub Copilot 你想要这样做。然后它会提出问题标题和文本，包括你在聊天对话中收集的所有要求。这对于研究你的应用程序中新功能的接触点以及为问题描述找到更多上下文非常有用。然后你可以指示
    GitHub Copilot 在仓库中创建问题，它会为你这样做，使用你的 GitHub 登录。这将确保问题贡献与你的用户相关联，以便未来跟踪，并将你使用 GitHub
    Copilot 所做的工作归功于你。
- en: There are also integrations when you start creating an issue, to bring in, for
    example, context from pipeline runs, or code scanning alerts, and allocate the
    places in your code base where the changes need to happen or will have an impact.
    The better the level of information in your issue, the easier it is for an engineer
    (or even GitHub Copi lot!) to start working on implementing the necessary changes.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始创建问题的时候，也有集成功能，例如，可以引入来自管道运行的环境或代码扫描警报，并分配代码库中需要发生更改或将会受到影响的位置。你的问题中信息量越高，工程师（甚至
    GitHub Copilot！）开始实施必要更改就越容易。
- en: 'And yes, you read that right: GitHub has the functionality now to assign an
    issue directly to GitHub Copilot and let it try to implement the needed changes
    for you! It will attempt to figure out what steps to take and implement the changes,
    validate it with a build and or test run, and then create a pull request for you
    to review.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你没有看错：GitHub 现在有了直接将问题分配给 GitHub Copilot 并让它尝试为你实施所需更改的功能！它将尝试确定要采取的步骤并实施更改，通过构建和或测试运行进行验证，然后为你创建一个拉取请求以供审查。
- en: 'Plus, if you need to create a pull request by hand, GitHub Copilot can help
    you write the title and the pull request body based on the changes for you. It
    summarizes the changeset and will give you a verbose description of what the changes
    are, where they impact the application, and even annotate the description with
    the file and line location of the relevant changes. See *Figure 1.7* :'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '此外，如果你需要手动创建拉取请求，GitHub Copilot 可以帮助你根据你的更改编写标题和拉取请求正文。它会总结更改集，并会给出关于更改的详细描述，包括它们对应用程序的影响，甚至会在描述中标注相关更改的文件和行位置。参见
    *图 1.7* :'
- en: '![Figure 1.7: Example of a pull request summary generated by GitHub Copilot](img/B34107_01_7.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.7：GitHub Copilot 生成的拉取请求摘要示例](img/B34107_01_7.png)'
- en: 'Figure 1.7: Example of a pull request summary generated by GitHub Copilot'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.7：GitHub Copilot 生成的拉取请求摘要示例
- en: The top sentence was the description of the engineer, and everything below the
    line was generated by GitHub Copilot. Notice the clear explanation and the inclusion
    of references to the changes in the GitHub Copilot version. This is great for
    getting better pull request information, as that is something that a lot of engineers
    are notoriously bad at. We always admire the level of detail in these summaries,
    as they are more descriptive of the changes than when we create these descriptions
    ourselves.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最上面的句子是工程师的描述，而所有以下内容都是由 GitHub Copilot 生成的。注意清晰的解释和包含对 GitHub Copilot 版本中更改的引用。这对于获取更好的拉取请求信息非常有用，因为这是许多工程师都臭名昭著地做得不好的地方。我们总是钦佩这些摘要的详细程度，因为它们比我们亲自创建的描述更能描述更改。
- en: After the pull request is created, there is an integration to have GitHub Copilot
    automatically review the proposed changes for things such as errors, maintainability,
    typos, and more. It will annotate the pull request with feedback, and it even
    creates suggestions that you can incorporate into your application with a single
    click. This saves a lot of review time to find the low-hanging fruit during the
    review process, so that your team members can focus on things such as checking
    for completeness, fit with the application’s architecture and design, and so on.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建拉取请求后，有一个集成可以让 GitHub Copilot 自动审查提出的更改，例如错误、可维护性、错别字等。它将对拉取请求进行注释并提供反馈，甚至可以创建您只需单击一下即可将其合并到应用程序中的建议。这大大节省了审查时间，以便在审查过程中找到低垂的果实，从而使团队成员可以专注于检查完整性、与应用程序架构和设计的匹配度等问题。
- en: 'If the pull request gets annotated by security scans such as Code Scanning
    results (part of GitHub Advanced Security), GitHub Copilot can review the findings
    and propose fixes right on the pull request feedback. This lets you quickly resolve
    common coding issues before they become a problem in production, right from the
    PR interface. This feature is called **GitHub Copilot Autofix** , which you can
    see in *Figure 1.8* :'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果拉取请求被安全扫描（如代码扫描结果，GitHub 高级安全的一部分）注释，GitHub Copilot 可以在拉取请求反馈中审查发现并提出修复方案。这允许您在它们成为生产问题之前快速解决常见的编码问题，直接从
    PR 界面进行。这个功能被称为 **GitHub Copilot 自动修复**，您可以在 *图 1.8* 中看到：
- en: '![Figure 1.8: Result of Copilot Autofix](img/B34107_01_8.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.8：Copilot 自动修复的结果](img/B34107_01_8.png)'
- en: 'Figure 1.8: Result of Copilot Autofix'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.8：Copilot 自动修复的结果
- en: 'Another integration that shows the deep connection between GitHub Copilot and
    the rest of the GitHub suite of tools, is the integration into GitHub Actions:
    when a workflow (pipeline) run fails, there is a button to start a chat session
    with GitHub Copilot and look at the error together, map it with the information
    it has on your repository, and then propose the reason why the workflow failed
    and propose a fix. You can then create a new issue and plan the work to be done,
    right from the chat interface!'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个体现 GitHub Copilot 与 GitHub 工具套件之间深层联系的集成，是集成到 GitHub Actions 中：当工作流程（管道）运行失败时，有一个按钮可以启动与
    GitHub Copilot 的聊天会话，一起查看错误，将其与您仓库中的信息进行映射，然后提出工作流程失败的原因并提出修复方案。您可以直接从聊天界面创建新的问题并规划要完成的工作！
- en: These integrations on GitHub.com are explained in depth in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191)
    .
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在 GitHub.com 上，这些集成在 [*第 6 章*](Chapter_6.xhtml#_idTextAnchor191) 中有详细的解释。
- en: Now we have seen an overview of the different integrations that GitHub Copilot
    has on the web interface of GitHub. From a generic chat to ask common coding questions
    to creating issues and working with pull requests, GitHub Copilot is integrated
    in all places in an engineer’s day-to-day process, where it makes sense.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经概述了 GitHub Copilot 在 GitHub 网页界面上的不同集成。从通用聊天来询问常见的编码问题到创建问题和处理拉取请求，GitHub
    Copilot 在工程师日常流程的各个地方都有集成，这是非常有意义的。
- en: Summary
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed the functionalities that GitHub Copilot offers
    so that we can place them in the right context, from integrations into your editor
    of choice to integrations on the web interface of GitHub. This is not bound to
    only the GitHub suite of tools, as it is offered in different IDEs from third-party
    vendors. You can use GitHub Copilot against any code file, no matter where it
    is stored. Your code does not need to be stored on GitHub at all if you do not
    want to.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了GitHub Copilot提供的功能，以便我们可以将它们放在正确的上下文中，从集成到您选择的编辑器到集成在GitHub的Web界面上。这不仅仅局限于GitHub工具套件，因为它由第三方供应商在不同IDE中提供。您可以使用GitHub
    Copilot针对任何代码文件，无论它存储在哪里。如果您不想，您的代码根本不需要存储在GitHub上。
- en: 'We looked at the main IDE features, such as coding suggestions while you type,
    the chat interface, and inline chat. Keep in mind that not all editors offer the
    exact same features, so look at editors’ or plugins’ documentation for more specific
    information. In the web interface on GitHub.com, there are features that will
    help you throughout the entire SDLC: from requirements engineering to creating
    an issue to the creation of pull requests, there are integrations with GitHub
    Copilot to help you add value to the software that you are working on.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们探讨了主要的IDE功能，例如在您输入时提供编码建议、聊天界面和内联聊天。请记住，并非所有编辑器都提供完全相同的功能，因此请查看编辑器或插件的文档以获取更具体的信息。在GitHub.com的Web界面上，有一些功能可以帮助您在整个SDLC（软件开发生命周期）中：从需求工程到创建问题再到创建拉取请求，都有与GitHub
    Copilot的集成，以帮助您为正在工作的软件增加价值。
- en: In the next chapter, we will take a look at how GitHub Copilot produces all
    the suggestions and chat answers that you ask it for. Having a good understanding
    of the basics of generative AI is important to have a realistic understanding
    of where tools help and where they have shortcomings. That will set you up for
    real understanding so that you do not view these tools as magic black boxes and
    instead become a power user who can put these tools to use where they shine!
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨GitHub Copilot如何产生您请求的所有建议和聊天答案。对生成式AI基础知识的良好理解对于对工具的帮助和不足之处有现实的理解至关重要。这将为您打下真正的理解基础，这样您就不会将这些工具视为魔法黑盒子，而是成为一个能够将这些工具发挥最大作用的强大用户！
