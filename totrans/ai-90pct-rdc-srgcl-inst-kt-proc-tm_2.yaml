- en: Executive Summary
  prefs: []
  type: TYPE_NORMAL
- en: Medical supply chains were [thrust onto the global stage](https://www.oecd.org/en/publications/2024/02/securing-medical-supply-chains-in-a-post-pandemic-world_3c8cef7c.html)
    during the COVID-19 pandemic, when PPE shortages hit many areas of the world.
    This report looks at how [Medloaner](https://www.medloaner.com/), a Florida-based
    startup headed by Ukrainian Kip Pogrebenko, navigated the fragmented and heavily
    regulated healthcare landscape.
  prefs: []
  type: TYPE_NORMAL
- en: We focus on the decisions and insights involved in developing and deploying
    an AI-assisted automated solution for medical device reprocessing, supporting
    mission-critical links in the supply chain. Kip’s awareness of the importance
    of personal relationships and identifying internal champions is a takeaway for
    all tech leaders in healthcare.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The #1 lesson: if you want to build something for healthcare, you have to forget
    about any virality that would improve your growth. It doesn’t exist. It’s all
    based on personal relationships and it’s highly correlated with the technology
    adoption lifecycle.”'
  prefs: []
  type: TYPE_NORMAL
- en: – Kip Pogrebenko, CEO and Co-Founder
  prefs: []
  type: TYPE_NORMAL
- en: Medloaner has begun its journey with partners in Canada. It is planning an expansion
    to the Middle East, Africa, and eventually the US.
  prefs: []
  type: TYPE_NORMAL
- en: In this report, we focus on Medloaner’s solution for its Canadian design partner,
    [Hamilton Health Sciences](https://www.hamiltonhealthsciences.ca/) (HHS), and
    a group of four of its hospitals.
  prefs: []
  type: TYPE_NORMAL
- en: Core challenge
  prefs: []
  type: TYPE_NORMAL
- en: 'Launching AI products in regulated industries involves complex hurdles:'
  prefs: []
  type: TYPE_NORMAL
- en: Ensuring compliance with privacy laws like HIPAA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Managing sensitive or restricted data while maintaining operational effectiveness
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Balancing the demands of innovation with the necessity for trust and reliability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Medloaner’s example demonstrates a way to confront these challenges head-on
    while delivering measurable operational improvements.
  prefs: []
  type: TYPE_NORMAL
- en: Problem and solution outline
  prefs: []
  type: TYPE_NORMAL
- en: 'Problem context: The manual reprocessing of surgical kits is time-intensive
    and error-prone. It includes the tracking, cleaning, inspecting, and assembling
    of kits. Regulatory demands and operational inefficiencies compound these challenges,
    with 58% of surgical delays tied to equipment issues (a stat on a previous version
    of Medloaner’s own website).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Solution overview: Medloaner’s AI-powered system automates reprocessing workflows,
    reducing time per kit from 10 minutes to about one minute. Using a combination
    of computer vision and AI-driven analytics, the solution offers visual instructions
    for technicians, verifies correct kit assembly, and identifies errors early to
    avoid costly re-sterilization cycles.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Regulatory approach: From the outset, Medloaner prioritized compliance by isolating
    its system from patient data, focusing instead on procedural and operational workflows.
    This separation minimized exposure to HIPAA-related risks while preserving the
    system’s utility.'
  prefs: []
  type: TYPE_NORMAL
- en: Key decisions
  prefs: []
  type: TYPE_NORMAL
