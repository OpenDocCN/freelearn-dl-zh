- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Generative AI with Text
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于文本的生成式AI
- en: As we move into the **Generative AI** (**GenAI**) section of the book, it’s
    worth recapping the ethical flags that any use of this tech may raise. To be clear,
    while not all use of GenAI is inherently bad, I would not recommend making regular
    use of generative text for anything you send directly to clients.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们进入本书的**生成式AI**（**GenAI**）部分时，回顾一下任何使用这项技术可能引发的伦理问题是有意义的。为了明确起见，虽然并非所有生成式AI的使用本质上都是坏的，但我不会建议您将生成式文本用于直接发送给客户的内容。
- en: If you over-use GenAI—let’s say, you decide to ask AI to write your emails for
    you—then the mental muscles you use to produce text will atrophy. You’ll fail
    to develop new ones. You’ll lose uniqueness in your voice, and clients will have
    fewer reasons to choose your services over anyone else’s.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你过度使用GenAI——比如说，你决定让AI帮你写电子邮件——那么你用来产生文本的心理肌肉会萎缩。你将无法发展新的肌肉。你的声音的独特性将消失，客户将减少选择你的服务而不是其他人的理由。
- en: If you’re in creative production, creativity is not a side hustle. You need
    to create more interesting work than other people do, not just pump out as much
    sub-standard slop as possible. Every email should be a chance to practice clearer
    communication, not a chore to outsource.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从事创意制作，创意不是副业。你需要创造出比其他人更有趣的作品，而不仅仅是尽可能多地生产低标准的垃圾。每一封电子邮件都应该是练习更清晰沟通的机会，而不是外包的任务。
- en: 'With all that said, there’s definitely scope for GenAI to create text that
    helps you to do your job more efficiently, to give you ideas, or to help make
    your work more accessible. Let’s take a deeper look at the following:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，确实有空间让生成式AI（GenAI）创建帮助您更高效地完成工作的文本，提供想法，或帮助使您的工作更易于访问。让我们更深入地看看以下内容：
- en: Ideation
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思想生成
- en: Rewriting text in a different style
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以不同风格重写文本
- en: Generating citations
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成引用
- en: Translation
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 翻译
- en: Alt text descriptions for accessibility
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可访问性的替代文本描述
- en: Not all creative professionals will need all these features, but most of us
    can find a use for several of them. Let’s kick off with a bit of brainstorming.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有创意专业人士都需要所有这些功能，但我们大多数人都可以找到其中几个功能的用途。让我们从一点头脑风暴开始。
- en: Ideation
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 思想生成
- en: 'Creative jobs vary widely: some are self-directed, some are fully directed
    by a client’s brief, and many are somewhere in between. When you’re faced with
    a creative decision about how to proceed, a blank page can sometimes feel daunting,
    and using AI to come up with ideas could be useful.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 创意工作差异很大：有些是自我指导的，有些是完全由客户的简报指导的，许多则介于两者之间。当你面临关于如何进行的创意决策时，一张空白的页面有时会感到令人畏惧，使用AI来提出想法可能是有用的。
- en: 'As usual, you’ll get better results if you ask more specific questions, so
    the more you know about a subject, the better questions you’ll be able to ask.
    Also, if you only push a little outside your comfort zone, you’ll hopefully be
    able to spot bad advice when it’s given. So, if you’re a video creator wanting
    ideas for YouTube videos, just ask:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，如果你提出更具体的问题，你会得到更好的结果，所以你对一个主题了解得越多，你就能提出更好的问题。此外，如果你只稍微超出你的舒适区，你可能会在给出糟糕建议时发现它。所以，如果你是一个想要YouTube视频想法的视频创作者，只需提出以下问题：
- en: '![Figure 6.1 – All 10 ideas (not all shown here) are solid](img/B34247_06_1.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图6.1 – 所有10个想法（此处未全部展示）都是可靠的](img/B34247_06_1.png)'
- en: Figure 6.1 – All 10 ideas (not all shown here) are solid
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1 – 所有10个想法（此处未全部展示）都是可靠的
- en: These are all good ideas that could easily be turned into a short video. While
    I could have come up with a similar list myself, results like this can easily
    spark further and better ideas. Similar prompts on different topics also give
    good results. What if you’re a digital artist who likes dogs?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是可以轻松转化为短视频的好主意。虽然我可以自己想出类似的列表，但这样的结果可以轻易激发更多更好的想法。不同主题上的类似提示也能得到良好的结果。如果你是一个喜欢狗的数字艺术家呢？
- en: '![Figure 6.2 – Again, these ideas are mostly solid](img/B34247_06_2.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图6.2 – 再次，这些想法大多是可靠的](img/B34247_06_2.png)'
- en: Figure 6.2 – Again, these ideas are mostly solid
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2 – 再次，这些想法大多是可靠的
- en: If you’re lacking in inspiration, using an LLM for ideas should at least get
    you started. While the results here aren’t going to be wholly original, if a blank
    page is your enemy, these are a solid starting point to iterate from.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你缺乏灵感，使用LLM（大型语言模型）来提出想法至少可以让你开始。虽然这里的结果不会完全原创，但如果空白页面是你的敌人，这些可以作为迭代的可靠起点。
- en: Stretching into nearby creative fields
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 拓展到附近的创意领域
- en: Ideation isn’t just about ideas for content you know well, though. LLMs can
    also help you stretch your wings a little further than you might be comfortable
    with—common when working in or with smaller teams.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 想象力不仅仅是关于你熟悉的内容的想法，尽管如此。大型语言模型（LLMs）还可以帮助你稍微伸展一下翅膀，超出你可能感到舒适的范畴——这在与较小团队一起工作时很常见。
- en: 'For example, if you’re a videographer who normally covers events and you’ve
    been asked to make a promotional video, an LLM can provide you with a checklist
    of the typical things that a video should include. Here’s the top of Gemini’s
    response:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你通常负责活动拍摄的视频摄影师，现在被要求制作宣传视频，LLM可以为你提供一个视频应包含的典型事项清单。以下是Gemini的回应开头：
- en: '![Figure 6.3 – The points included here (not all shown) are relatively obvious
    and sensible](img/B34247_06_3.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图6.3 – 这里包含的点（并非全部展示）相对明显且合理](img/B34247_06_3.png)'
- en: Figure 6.3 – The points included here (not all shown) are relatively obvious
    and sensible
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3 – 这里包含的点（并非全部展示）相对明显且合理
- en: 'If you’re a skilled video editor but not confident with direction, this provides
    a starting framework you could develop into a client proposal and then a shooting
    script. Along similar lines, if you’re a designer but not a board game marketing
    expert, perhaps an LLM could help you discover the best places for you to place
    the ads you create and niche-specific elements to include:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个熟练的视频编辑师但对自己的方向感不太自信，这提供了一个你可以发展成客户提案和拍摄脚本的起始框架。沿着相似的方向，如果你是一个设计师但不是桌面游戏市场营销专家，也许一个LLM可以帮助你发现放置你创建的广告的最佳位置以及包含特定领域的元素：
- en: '![Figure 6.4 – This response is comprehensive and useful, with many specific
    points that aren’t obvious outside the board game community](img/B34247_06_4.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图6.4 – 这个回应全面且有用，包含许多在桌面游戏社区外并不明显的具体观点](img/B34247_06_4.png)'
- en: Figure 6.4 – This response is comprehensive and useful, with many specific points
    that aren’t obvious outside the board game community
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4 – 这个回应全面且有用，包含许多在桌面游戏社区外并不明显的具体观点
- en: While I can’t confirm how accurate the advice offered in other specific niches
    is, the preceding responses are in areas I know well, and they’re solid. While
    ideation is certainly a GenAI task, it doesn’t have to take away your creativity
    and could in fact inspire you further. To make sure you don’t come to rely wholly
    on AI for inspiration, ideate on your own or with peers before you ask AI for
    help. That way, you’ll be getting a second opinion rather than outsourcing the
    job entirely.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我不能确认其他特定领域提供的建议有多准确，但前面的回应是在我熟悉的领域，它们是可靠的。虽然想象力当然是一个生成式人工智能（GenAI）的任务，但它不必剥夺你的创造力，实际上可能会进一步激发你的灵感。为了确保你不会完全依赖AI来获得灵感，在你向AI寻求帮助之前，自己或与同伴一起进行想象力创作。这样，你将得到一个第二意见，而不是完全外包这项工作。
- en: Now that you’ve got some ideas, hopefully you’ve been able to write something.
    What if you’re not quite happy with it?
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经有一些想法了，希望你已经能够写点什么。如果你对它不太满意怎么办？
- en: Rewriting text in a different style
  id: totrans-31
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 以不同风格重写文本
- en: 'Although the gap between summarizing and rewriting is narrow, I do think there’s
    a distinct difference here: a summary is usually provided for your benefit, while
    rewritten text is more transformative, and usually intended to be public-facing
    output. The line between Utility AI and GenAI is somewhat fuzzy here, as it was
    with summarization, and ultimately, it’s up to you where you draw the line.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然总结和重写之间的差距很小，但我确实认为这里有一个明显的区别：总结通常是为你提供的，而重写的文本则更具变革性，通常旨在面向公众的输出。在实用AI和GenAI之间，这里的界限有些模糊，就像在总结中一样，最终，这取决于你如何划线。
- en: While I wouldn’t regard most uses of a grammar checker as rewriting text, the
    same tools that offer grammar assistance (such as Grammarly, Copilot, and Apple
    Intelligence) can absolutely give you more help if you feel you need it. Rewriting
    is a feature of many general-purpose LLMs, such as ChatGPT and Claude, so if you
    already use one, try it out. However, if none of these tools work for you, a specialist
    writing assistant such as **Spiral** ([https://writewithspiral.com/](https://writewithspiral.com/))
    may suit you better.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我不会认为大多数语法检查器的使用是重写文本，但提供语法帮助的相同工具（如Grammarly、Copilot和Apple Intelligence）如果你觉得需要，绝对可以给你更多的帮助。重写是许多通用LLMs（如ChatGPT和Claude）的功能之一，所以如果你已经使用了一个，试试它。然而，如果你没有这些工具中的任何一个适合你，一个专业的写作助手，如**Spiral**（[https://writewithspiral.com/](https://writewithspiral.com/))可能更适合你。
- en: '**Novel-writing tools**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**小说写作工具**'
- en: Planning to write a novel? You might want to engage a dedicated tool to help
    you. Writing assistance tools such as Novelcrafter ([https://www.novelcrafter.com/](https://www.novelcrafter.com/)),
    Sudowrite ([https://sudowrite.com/](https://sudowrite.com/)) and Squibler ([https://www.squibler.io/](https://www.squibler.io/))
    are optimized for stories and novels, and as the output they produce is targeted
    towards more descriptive prose for fiction applications, these tools are less
    suited to more typical creative production text tasks such as proposals, emails,
    and pitch decks.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 计划写一部小说吗？你可能需要使用一个专门的工具来帮助你。如Novelcrafter ([https://www.novelcrafter.com/](https://www.novelcrafter.com/))、Sudowrite
    ([https://sudowrite.com/](https://sudowrite.com/))和Squibler ([https://www.squibler.io/](https://www.squibler.io/))等写作辅助工具针对故事和小说进行了优化，并且由于它们产生的输出针对的是更多用于虚构应用的描述性散文，因此这些工具不太适合更典型的创意生产文本任务，如提案、电子邮件和提案演示文稿。
- en: Here, we’ll focus on more general-purpose writing assistants, and of course,
    this list is not comprehensive—new tools pop up all the time.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将关注更多通用写作助手，当然，这个列表并不全面——新的工具总是层出不穷。
- en: 'AI tools can rewrite for clarity, brevity, and in the style of a publication
    or author, but you can request more or less any style from most LLMs. As a test,
    I processed the opening section of one of my recent articles on [https://provideocoalition.com](https://provideocoalition.com),
    about experiments in stereoscopic video. My style is perhaps a little quirky and
    not entirely error-free, but that’s fine by me:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具可以为了清晰、简洁和符合出版物或作者的风格而重写文本，但你几乎可以从大多数LLMs请求任何风格。作为一个测试，我处理了我最近一篇关于[https://provideocoalition.com](https://provideocoalition.com)上立体视频实验文章的开头部分。我的风格可能有点古怪，而且并不完全无误，但对我来说这没关系：
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: After processing this text in many different ways, across many tools, I didn’t
    get many results I’d be truly happy to use in a professional context. Because
    everyone’s needs and styles are different, you may have more luck than I did,
    and of course the tools will evolve over time.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用许多不同的工具和多种方式处理这段文本后，我没有得到很多真正愿意在专业环境中使用的成果。因为每个人的需求和风格都不同，你可能比我更有运气，当然，这些工具也会随着时间的推移而发展。
- en: 'As a first pass, I started with the default “rewrite” options. Take a look
    at what Grammarly suggested:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 作为第一步，我使用了默认的“重写”选项。看看Grammarly的建议：
- en: '![Figure 6.5 – Grammarly wants to make plenty of changes, but not all are helpful](img/B34247_06_5.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图6.5 – Grammarly想要做出很多更改，但并非所有都有帮助](img/B34247_06_5.png)'
- en: Figure 6.5 – Grammarly wants to make plenty of changes, but not all are helpful
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.5 – Grammarly想要做出很多更改，但并非所有都有帮助
- en: 'Besides the near-complete loss of my own writing style, “limitations” are not
    the same as “restrictions” and “simple” does not mean the same as “janky”—I don’t
    want a “rewrite” to change my intended meaning. CoPilot’s first attempt was worse,
    though:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 除了几乎完全丧失我的写作风格之外，“局限性”并不等同于“限制”，“简单”也不意味着“糟糕”——我不想让“重写”改变我的意图。CoPilot的第一次尝试更糟糕：
- en: '![Figure 6.6 – CoPilot isn’t doing a great job here](img/B34247_06_6.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图6.6 – CoPilot在这里的表现并不出色](img/B34247_06_6.png)'
- en: Figure 6.6 – CoPilot isn’t doing a great job here
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.6 – CoPilot在这里的表现并不出色
- en: 'This feels robotic, lacking flow and direction. Two alternative options were
    no better; the second was a single paragraph long and the third was overly-salted
    with flowery language. How about Apple Intelligence? It didn’t try to change as
    much as the other models:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这感觉像机器人，缺乏流畅性和方向感。两种替代选项也好不到哪里去；第二种是一个很长的段落，第三种则过度使用了华丽辞藻。那么Apple Intelligence呢？它并没有像其他模型那样试图做出太多改变：
- en: '![Figure 6.7 – More of the original text was retained by Apple Intelligence’s
    Rewrite](img/B34247_06_7.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图6.7 – Apple Intelligence的重写保留了更多原始文本](img/B34247_06_7.png)'
- en: Figure 6.7 – More of the original text was retained by Apple Intelligence’s
    Rewrite
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7 – Apple Intelligence的重写保留了更多原始文本
- en: 'Apple Intelligence didn’t make as many revisions to the text as the other tools,
    and as a result, the changes made didn’t change its overall style or feel. But
    what if you need a more formal result? Let’s stay with Apple Intelligence and
    ask for a **Professional** tone:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他工具相比，Apple Intelligence对文本的修订并不多，因此所做的更改并没有改变其整体风格或感觉。但如果你需要一个更正式的结果呢？让我们继续使用Apple
    Intelligence，并要求一个**专业**的语气：
- en: '![Figure 6.8 – ‘Professional’ has a more verbose, less casual tone](img/B34247_06_8.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图6.8 – ‘Professional’有更冗长、更不随意的语气](img/B34247_06_8.png)'
- en: Figure 6.8 – ‘Professional’ has a more verbose, less casual tone
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8 – ‘Professional’有更冗长、更不随意的语气
- en: 'While this feels a little more formal than I’d personally prefer, the meaning
    remains intact and the feel isn’t too far removed from the original. ChatGPT’s
    **Technical** offering was OK, though it differed more from the original:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这感觉比我个人更正式一些，但意义保持不变，感觉也没有离原文太远。ChatGPT的**技术**版本可以接受，尽管它与原文的差异更大：
- en: '![Figure 6.9 – ChatGPT’s technical rewrite is mostly OK](img/B34247_06_9.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图6.9 – ChatGPT的技术重写大致可以接受](img/B34247_06_9.png)'
- en: Figure 6.9 – ChatGPT’s technical rewrite is mostly OK
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9 – ChatGPT的技术重写大致可以接受
- en: 'ChatGPT offered **Casual**, **Technical**, and **Promotional** rewrites; this
    was the second of those. Though there are a few points where the word substitutions
    have changed the meaning (including “simple” in place of “janky”), it’s mostly
    sound. Here’s Grammarly’s **formal** offering:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了**休闲**、**技术**和**促销**重写选项；这是其中的第二个。尽管在几个地方单词替换改变了意义（包括用“简单”代替“糟糕”），但总体上还是合理的。以下是Grammarly的**正式**版本：
- en: '![Figure 6.10 – Grammarly, offering a “formal” rewrite](img/B34247_06_10.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图6.10 – Grammarly提供“正式”重写](img/B34247_06_10.png)'
- en: Figure 6.10 – Grammarly, offering a “formal” rewrite
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.10 – Grammarly提供“正式”重写
- en: While this is certainly formal, all the flowery adjectives don’t make it clearer.
    I think CoPilot did a better job with its formal attempt, though I did have to
    request “formal tone” manually, while the other tools discussed so far offered
    this option by default.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这确实很正式，但所有花哨的形容词并没有让它变得更清晰。我认为CoPilot在正式尝试方面做得更好，尽管我不得不手动请求“正式语气”，而其他讨论过的工具默认提供了这个选项。
- en: '![Figure 6.11 – CoPilot, asked for a “formal tone”](img/B34247_06_11.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图6.11 – CoPilot，要求“正式语气”](img/B34247_06_11.png)'
- en: Figure 6.11 – CoPilot, asked for a “formal tone”
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.11 – CoPilot，要求“正式语气”
- en: 'While examining these examples should be useful as a starting point for assessing
    these tools’ capabilities, they will differ every time you run them. If you don’t
    get the result you were hoping for, simply try again, or vary your prompt slightly.
    Perhaps as a way to invite experimentation, ChatGPT proactively offered a variety
    of styles (**Casual**, **Technical**, **Promotional**) and then offered to combine
    all three into a single “condensed best of” version. Hilariously, this rewriting
    of rewriting mangled the “if you’re used to shooting with a couple of dedicated
    cameras already” fragment into “if you already have a pair”… which carries a distinctly
    different connotation:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然检查这些示例应该有助于评估这些工具功能的一个起点，但每次运行它们都会有所不同。如果您没有得到您希望的结果，只需再次尝试，或者稍微改变您的提示。也许作为一种邀请实验的方式，ChatGPT主动提供了多种风格（**休闲**、**技术**、**促销**），然后提出将三者结合成一个单一的“压缩最佳”版本。令人捧腹的是，这种重写重写将“如果你已经习惯了使用几部专用相机射击”片段搞成了“如果你已经有一对”，……这有着截然不同的含义：
- en: '![Figure 6.12 – The condensed “best-of” version that ChatGPT offered — not
    quite what I meant](img/B34247_06_12.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图6.12 – ChatGPT提供的压缩“最佳”版本——并不完全是我想要的](img/B34247_06_12.png)'
- en: Figure 6.12 – The condensed “best-of” version that ChatGPT offered — not quite
    what I meant
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.12 – ChatGPT提供的压缩“最佳”版本——并不完全是我想要的
- en: Even though I probably won’t be using these tools much myself, if you’re still
    finding your feet as a writer, I can see the appeal. However, I’d recommend starting
    with Apple Intelligence (using **Notes** or **Pages** on a modern Apple device)
    because it maintains more of your original work. In a world where mostly competent
    AI writing is commonplace, mostly competent is no longer good enough. If you plan
    to use these services, don’t just accept bulk changes. Examine the suggestions
    and implement them yourself if you agree.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我可能不会自己经常使用这些工具，但如果您作为作家还在寻找自己的脚步，我可以看到其吸引力。然而，我建议从Apple Intelligence开始（在现代苹果设备上使用**笔记**或**页面**），因为它能更好地保留您的原始作品。在一个大多数AI写作都司空见惯的世界里，仅仅“大多数合格”已经不再足够。如果您打算使用这些服务，不要只是接受大量更改。检查建议，如果您同意，请自行实施。
- en: If you’re in a position where you feel you need AI’s help to revise or generate
    text, go beyond the presets and ask a prompt-based system to help you in a more
    specific way. There’s nothing stopping you providing a document (or several, or
    your whole website) and asking AI to imitate that style. You might also have luck
    asking AI to rewrite for brevity, when you’re beyond a strict word limit. While
    I’d recommend doing it yourself, if that’s simply not an option, at least avoid
    the presets.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你觉得自己需要AI的帮助来修订或生成文本，那么超越预设，让基于提示的系统以更具体的方式帮助你。没有什么阻止你提供一份文档（或几份，或你的整个网站）并要求AI模仿那种风格。当你超出严格的字数限制时，你也可以尝试让AI为了简洁而重写。虽然我建议你自己来做，但如果这根本不是一种选择，至少避免使用预设。
- en: Conversely, what if you haven’t written the text yet, and you’d like AI to generate
    whole paragraphs from bullet points? This is, indeed, possible—but is it a good
    idea?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，如果你还没有写文本，而你希望AI从要点中生成整个段落，这是可能的——但这是一个好主意吗？
- en: Writing full text from bullet points
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从要点中撰写完整文本
- en: 'If something is easy to do, it has little value. A design built on a template
    doesn’t stand out when viewed alongside other work made with templates, and AI-written
    text won’t stand out either. In a few short points, here are my key recommendations:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果某件事容易做，它的价值就很小。建立在模板上的设计在与其他使用模板制作的作品并排观看时不会脱颖而出，AI撰写的文本也不会。以下是我的一些关键建议：
- en: Writing something yourself helps you grow as a writer
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自己写东西有助于你作为作家成长
- en: If you outsource a job you don’t get better at it
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你外包了一项工作，你不会变得擅长它
- en: AI is quick, cheap outsourcing
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI是快速、低成本的外包
- en: AI work is competent but not great
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI的工作能干但并不出色
- en: If AI starts something, you should edit it to add your own touches
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果AI开始写，你应该编辑它以添加你自己的风格
- en: 'If I was feeling lazy, I could just get AI to turn those bullets into text,
    right? Let’s see if that hurts or helps my argument:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我觉得懒惰，我就可以让AI将那些要点转换成文本，对吧？让我们看看这会不会损害或帮助我的论点：
- en: '![Figure 6.13 – ChatGPT—competent and well said, but that’s not my writing](img/B34247_06_13.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图6.13 – ChatGPT—能干且表达得体，但这不是我自己的写作](img/B34247_06_13.png)'
- en: Figure 6.13 – ChatGPT—competent and well said, but that’s not my writing
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.13 – ChatGPT—能干且表达得体，但这不是我自己的写作
- en: This text is *fine*. Not exceptional, just fine. But if you want *great* results—and
    you should always aim for great—I can’t recommend generating text you expect clients
    or customers to read. If it’s worth reading, it’s worth writing yourself.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这段文本是*不错的*。并不出色，只是不错。但如果你想要*出色*的结果——你应该始终追求出色——我不建议生成你期望客户或客户阅读的文本。如果它值得阅读，那就值得你自己来写。
- en: As you might expect, spending time writing something yourself produces richer
    text than any outsourced shortcut. Yes, you’ll need to invest time in it, but
    the paybacks are often worth it. Writing full-length text helps you understand
    the concepts more deeply, and you’ll be able to stand behind those points if questioned.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所预期，花时间自己写东西会比任何外包捷径产生更丰富的文本。是的，你需要在上面投入时间，但回报往往是值得的。撰写完整长度的文本有助于你更深入地理解概念，并且如果你被质疑，你将能够支持这些观点。
- en: '*Growing as a writer* is an undervalued benefit of writing, and it shouldn’t
    be ignored. Outsourcing gets you to the end goal quickly, but that end goal is
    all you get. If you spend time repeatedly writing prompts, you just get good at
    writing prompts.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*作为作家成长*是写作的一个被低估的好处，而且不应该被忽视。外包可以让你快速达到目标，但那个目标就是你所得到的一切。如果你花时间反复撰写提示，你只是擅长撰写提示。'
- en: 'Still, I understand: if you don’t feel you have the skills to do a good job
    of writing longer text, using AI is a tempting option. If that temptation is too
    strong, or you’re simply tasked with too much work and not enough budget to do
    it properly, at the very least, you should edit the generated text, as much as
    you can, to make it yours. Reshape, reimagine, delete at will. The less you contribute
    to your own outputs, the less you’ll grow, and the less value your work will have.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我理解：如果你觉得自己没有写好长文本的技能，使用AI是一个诱人的选择。如果这种诱惑太强烈，或者你只是被分配了太多工作而没有足够的预算来正确完成，至少你应该尽可能多地编辑生成的文本，使其成为你自己的。随意重塑、重新想象、删除。你对自己输出的贡献越少，你的成长就越少，你的工作价值也就越低。
- en: Further, I also understand that there are vast swathes of text out there that
    aren’t terribly important—and hopefully they’re not your job as a creative professional.
    Legally important text should be left to the lawyers, but if it’s your job to
    write persuasive copy, *you should do your job*. If you outsource your core skills,
    why wouldn’t a client hire someone cheaper using the same AI tools as you?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我明白还有很多大量的文本并不特别重要——希望这些不是作为创意专业人士你的工作内容。法律上重要的文本应该留给律师处理，但如果你的工作是撰写有说服力的文案，*你应该做好你的工作*。如果你外包了你的核心技能，客户为什么不雇佣一个使用与你相同AI工具且价格更低的人呢？
- en: Finally, some services, such as Spiral, promise to learn your style, and then
    create more work in an imitation of that style, on your behalf. While this approach
    does address issues around a personal voice and tone, the issue of *not actually
    doing the work* remains. You’ll still atrophy creatively, you’ll fail to fully
    understand a brief if you never engage with and further develop the key bullet-point
    concepts, and your writing won’t change and grow.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，一些服务，如Spiral，承诺学习你的风格，然后代表你创作更多模仿该风格的作品。虽然这种方法确实解决了关于个人声音和语调的问题，但“实际上不做工作”的问题仍然存在。你仍然会失去创造力，如果你从未参与并进一步发展关键要点概念，你的写作就不会改变和成长。
- en: If you have the option, do *better* work, not simply *more* work.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有机会，做*更好的*工作，而不仅仅是*更多的*工作。
- en: Are there generative tasks which simply alleviate the drudgery? Definitely.
    For instance, if you need to cite your sources, there are many different ways
    to do so, and it’s a largely technical task. Can AI handle this?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 是否有可以减轻繁琐工作的生成性任务？当然有。例如，如果你需要引用你的来源，有很多人不同的方式可以做到，这主要是一个技术任务。AI能处理这个吗？
- en: Generating citations
  id: totrans-85
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成引用
- en: 'Though citations are more commonly required in academia, some clients may expect
    correctly formatted citations in proposals, work plans or annual reports. If you’re
    in charge of the design of these longer documents and need to create citations,
    you may be tempted to ask AI to help with the quite specific formatting requirements
    of the chosen citation standard. As a test, I asked three major LLMs to turn a
    list of URLs into citations and was surprised at how variable the results were.
    Here’s the prompt:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在学术界引用更为常见，但一些客户可能期望在提案、工作计划或年度报告中正确格式化的引用。如果你负责设计这些较长的文档并需要创建引用，你可能会想请AI帮助完成所选引用标准的特定格式要求。作为一个测试，我要求三个主要的LLM将URL列表转换为引用，结果差异之大让我感到惊讶。这是提示：
- en: '[PRE1]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'ChatGPT got the details confidently wrong on at least two of the three URLs:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在至少两个URL上自信地犯了错误：
- en: '![Figure 6.14 – The author and date for the first and third references here
    are incorrect](img/B34247_06_14.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图6.14 – 这里第一个和第三个引用的作者和日期是错误的](img/B34247_06_14.png)'
- en: Figure 6.14 – The author and date for the first and third references here are
    incorrect
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.14 – 这里第一个和第三个引用的作者和日期是错误的
- en: 'Faults persisted across multiple attempts, though Gemini did better with the
    same prompt:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在多次尝试中，错误持续存在，尽管Gemini在相同的提示下表现更好：
- en: '![Figure 6.15 – The end result, after a long “thinking” process](img/B34247_06_15.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图6.15 – 经过漫长的“思考”过程后的最终结果](img/B34247_06_15.png)'
- en: Figure 6.15 – The end result, after a long “thinking” process
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.15 – 经过漫长的“思考”过程后的最终结果
- en: However, this wasn’t repeatable; another attempt with the same prompt gave entirely
    different results.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不是可重复的；使用相同提示的另一次尝试给出了完全不同的结果。
- en: '![Figure 6.16 – The same engine also produced… this?](img/B34247_06_16.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图6.16 – 同样的引擎也产生了…这个？](img/B34247_06_16.png)'
- en: Figure 6.16 – The same engine also produced… this?
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.16 – 同样的引擎也产生了…这个？
- en: 'I don’t want to spend too much space on examples, but Claude also failed at
    this task, and the unreliability of all these services, on what I expected to
    be a relatively simple task, causes me concern. If this is something you need
    to do regularly, I’d recommend using a manual citation generator such as the one
    Grammarly offers ([https://www.grammarly.com/citations](https://www.grammarly.com/citations)):'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想在例子上花费太多空间，但克劳德也在这项任务上失败了，所有这些服务在相对简单的任务上的不可靠性让我感到担忧。如果你需要定期做这件事，我建议使用像Grammarly提供的这样的手动引用生成器（[https://www.grammarly.com/citations](https://www.grammarly.com/citations)）：
- en: '![Figure 6.17 – This manually assembled citation took more copying and pasting,
    but the automated options weren’t reliable](img/B34247_06_17.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图6.17 – 这个手动组装的引用需要更多的复制粘贴，但自动选项并不可靠](img/B34247_06_17.png)'
- en: Figure 6.17 – This manually assembled citation took more copying and pasting,
    but the automated options weren’t reliable
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.17 – 这篇手动组装的引用需要更多的复制粘贴，但自动选项并不可靠
- en: While I’d like to think that this is a task that at least some AI tools will
    be able to perform reliably, if none of the biggest LLMs can get it right yet,
    I can’t recommend trusting any other tools to do this correctly either. The rule
    remains—be very cautious sharing AI-produced output with the world unless you’ve
    checked it.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我希望这至少是一些 AI 工具能够可靠执行的任务，但如果连最大的 LLM 都无法正确完成，我也不能推荐信任其他工具来做这件事。规则仍然是——除非你已检查，否则请非常谨慎地将
    AI 生成的输出与世界分享。
- en: OK, ideas done, document written, citations complete, and now your client wants
    to deliver in a different language. Can AI help?
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，想法完成，文档编写完成，引用完成，现在你的客户希望用不同的语言进行交付。AI 能帮忙吗？
- en: Translation
  id: totrans-102
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 翻译
- en: Although translation is a task that AI tools are good at, it’s not one they
    are perfect at. If you need to translate text that’s in another language for your
    own understanding, AI is probably fine. If you can accept imperfect results, you’ll
    be able to grasp the meaning of text in other languages that would otherwise remain
    inaccessible—and that’s a great thing.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然翻译是 AI 工具擅长的任务，但它们并不完美。如果你需要将另一种语言中的文本翻译成你自己的理解，AI 可能是可行的。如果你可以接受不完美的结果，你将能够理解其他语言中的文本的意义，否则这些文本将无法触及——这是一件好事。
- en: However, if you need to translate creative content in your own language to deliver
    to native speakers in another language, do not expect that AI will be able to
    produce perfect results on its own.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你需要将你自己的语言中的创意内容翻译成另一种语言以供母语人士阅读，不要期望 AI 能够独立产生完美的结果。
- en: Just as with transcription, the output will be fast, and mostly correct. But
    while mistakes in a transcription can be corrected relatively easily, if you can’t
    understand the language you’re translating to, you’ll struggle to confirm the
    accuracy of a translation.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 就像转录一样，输出将会很快，并且大部分是正确的。但尽管转录中的错误可以相对容易地纠正，如果你无法理解你要翻译成的语言，你将很难确认翻译的准确性。
- en: Website listings and video advertisements for most of the cheapest products
    bear this out. Where there’s no budget to translate a product description into
    proper English, automatic translation tools are used and the output remains unedited.
    As a result, expectations and perceived worth are lowered even further.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数最便宜产品的网站列表和视频广告都证实了这一点。在没有预算将产品描述翻译成正确的英语的情况下，会使用自动翻译工具，并且输出未经编辑。因此，期望和感知的价值进一步降低。
- en: '![Figure 6.18 – This cheap smartwatch on AliExpress has a description riddled
    with errors](img/B34247_06_18.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.18 – 这款在 AliExpress 上出售的廉价智能手表的描述充满了错误](img/B34247_06_18.png)'
- en: Figure 6.18 – This cheap smartwatch on AliExpress has a description riddled
    with errors
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.18 – 这款在 AliExpress 上出售的廉价智能手表的描述充满了错误
- en: This isn’t new, of course, but if other languages can’t be translated to English
    without fault, why should we expect English to be able to be translated to other
    languages? I’ve been responsible for designing board game manuals in English as
    well as in several other languages, and in each case, the translation was handled
    by a native speaker, laid out by me, and then checked by that same translator
    before being checked by others.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不新鲜，但如果其他语言不能无错误地翻译成英语，我们为什么期望英语能够无错误地翻译成其他语言呢？我负责设计过英语以及几种其他语言的桌面游戏手册，在每种情况下，翻译都是由母语人士完成的，由我排版，然后由那位相同的翻译者在其他人检查之前进行检查。
- en: Translators can definitely use AI translation tools as a starting point, but
    the subtleties of different languages and dialects need a human touch. The finer
    points of translation are not easy to navigate, even for a native speaker. For
    example, the differences between European Spanish and Mexican Spanish are subtle
    and numerous, and even a human-supervised translation will contain errors that
    require many proofreaders. Subtle translation problems are also more likely to
    occur in creative contexts, such as video and board games, than fact-based news
    articles.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译员当然可以使用 AI 翻译工具作为起点，但不同语言和方言的细微差别需要人类的触摸。翻译的细微之处并不容易掌握，即使是母语人士。例如，欧洲西班牙语和墨西哥西班牙语之间的差异微妙且众多，即使是经过人类监督的翻译也会包含需要许多校对员纠正的错误。在创意环境中，如视频和桌面游戏，细微的翻译问题也比基于事实的新闻文章更可能出现。
- en: 'In terms of tools, the Google Translate website has worked well for several
    years, and on Apple platforms, the Safari browser includes translation features
    that allow you to translate any website you visit:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在工具方面，谷歌翻译网站已经使用了几年，在苹果平台上，Safari 浏览器包含了翻译功能，允许您翻译您访问的任何网站：
- en: '![Figure 6.19 – Safari (and other browsers) can translate foreign-language
    websites](img/B34247_06_19.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图6.19 – Safari（以及其他浏览器）可以翻译外语网站](img/B34247_06_19.png)'
- en: Figure 6.19 – Safari (and other browsers) can translate foreign-language websites
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.19 – Safari（以及其他浏览器）可以翻译外语网站
- en: Translation apps from Google, Apple, and others allow live translation of audio
    into text (or more audio) in another language in real time, which is helpful enough
    to make visiting a foreign country easier, but not good enough for creative production
    purposes.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 来自谷歌、苹果和其他公司的翻译应用程序允许实时将音频翻译成文本（或更多音频）成另一种语言，这对于使访问外国国家变得更容易已经足够有帮助，但对于创意制作目的来说还不够好。
- en: However, AI has distinct uses for anyone engaged in creating accessible PDFs
    or websites.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，AI在创建可访问的PDF或网站方面对任何人都有独特的用途。
- en: Alt text descriptions for accessibility
  id: totrans-116
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可访问性的替代文本描述
- en: '**Alt text** is a text equivalent of an image, describing it for anyone who
    can’t see the image. While alt text is intended for use by blind or vision impaired
    readers, it’s also important for search engines. In fact, text descriptions of
    images are a large part of how LLMs can interpret what’s in an image in the first
    place, using it as part of their training data.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**替代文本**是图像的文本等价物，为无法看到图像的人描述它。虽然替代文本旨在供盲人或视力受损的读者使用，但它对搜索引擎也很重要。事实上，图像的文字描述是LLM最初如何通过将其作为其训练数据的一部分来解释图像内容的重要组成部分。'
- en: As a result, many LLMs can interpret what an image contains, and they can therefore
    generate an alt text description, which designers can paste into apps such as
    Adobe InDesign or Bridge, or into a website CMS such as WordPress. Many governments
    around the world require public-facing documents to be accessible, so this is
    not an optional task.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，许多大型语言模型（LLM）可以解释图像包含的内容，因此可以生成替代文本描述，设计师可以将这些描述粘贴到Adobe InDesign或Bridge等应用程序中，或者WordPress等网站内容管理系统（CMS）中。世界上许多政府要求面向公众的文档要易于访问，因此这并非一项可选项的任务。
- en: While it’s not difficult to write a short sentence describing a single image,
    describing many images can be a time-consuming process. Also, because alt text
    descriptions should use concise, simple language, their creation is a task well
    suited for an LLM with human oversight... right?
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然描述一张单独的图像的短句并不困难，但描述多张图像可能是一个耗时的工作过程。此外，由于替代文本描述应使用简洁、简单的语言，因此其创建非常适合在人类监督下的LLM进行...对吗？
- en: 'Before we assess the output, here are a few best practices tips for alt text,
    from Harvard’s Digital Accessibility guide ([https://accessibility.huit.harvard.edu/describe-content-images](https://accessibility.huit.harvard.edu/describe-content-images)):'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估输出之前，这里有一些来自哈佛数字无障碍指南（[https://accessibility.huit.harvard.edu/describe-content-images](https://accessibility.huit.harvard.edu/describe-content-images)）的关于替代文本的最佳实践建议：
- en: Keep it short, usually 1-2 sentences. Don’t overthink it.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持简短，通常是一到两句话。不要过度思考。
- en: Consider key elements of why you chose this image, instead of describing every
    little detail.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑选择此图像的关键要素，而不是描述每一个细节。
- en: There’s no need to say “image of” or “picture of.”
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有必要说“图像”或“图片”。
- en: But do say if it’s a logo, illustration, painting, or cartoon.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 但如果它是标志、插图、绘画或卡通，请说明。
- en: Don’t duplicate text that’s adjacent in the document or website.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要在文档或网站中重复相邻的文本。
- en: End the alt text sentence with a period.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以句号结束替代文本句子。
- en: 'There are many subtleties to generating alt text, but as well as the preceding
    points, the alt text must include the *context* in which an image is presented.
    A photograph of a university campus used in a discussion of architecture may be
    given different alt text than the same image used in a student prospectus. More
    tips can be found here: [https://www.visionaustralia.org/business-consulting/digital-access/blog/five-tips-for-writing-alt-text](https://www.visionaustralia.org/business-consulting/digital-access/blog/five-tips-for-writing-alt-text).'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 生成替代文本有许多细微之处，但除了前面提到的点之外，替代文本还必须包括图像呈现的*上下文*。在讨论建筑时使用的大学校园照片可能比用于学生简章的同一图像具有不同的替代文本。更多建议可以在以下链接找到：[https://www.visionaustralia.org/business-consulting/digital-access/blog/five-tips-for-writing-alt-text](https://www.visionaustralia.org/business-consulting/digital-access/blog/five-tips-for-writing-alt-text)。
- en: The easiest way to use AI to generate alt text is to use one of the many free
    tools designed explicitly to do the job, including **Ahrefs** ([https://ahrefs.com/writing-tools/img-alt-text-generator](https://ahrefs.com/writing-tools/img-alt-text-generator)),
    or **TailWind** ([https://www.tailwindapp.com/marketing/tools/image-alt-text-generator](https://www.tailwindapp.com/marketing/tools/image-alt-text-generator)).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI生成替代文本的最简单方法是使用许多专门为此目的设计的免费工具之一，包括**Ahrefs** ([https://ahrefs.com/writing-tools/img-alt-text-generator](https://ahrefs.com/writing-tools/img-alt-text-generator))，或**TailWind**
    ([https://www.tailwindapp.com/marketing/tools/image-alt-text-generator](https://www.tailwindapp.com/marketing/tools/image-alt-text-generator))。
- en: 'Alternatively, using a general-purpose LLM such as ChatGPT, Gemini, or Claude
    brings the added benefit of being able to tweak the output—by priming them with
    tips for generating better alt text, or by providing the context in which those
    images are presented. Using one of my own images as a source, here’s a concise
    alt text description from Tailwind:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，使用像ChatGPT、Gemini或Claude这样的通用LLM，可以带来额外的优势，即能够调整输出——通过提供生成更好替代文本的提示来引导它们，或者提供展示这些图像的上下文。以下是一个来自Tailwind的简洁替代文本描述，使用了我自己的图像作为来源：
- en: '![Figure 6.20 – This text is concise, but without context it doesn’t tell the
    whole story](img/B34247_06_20.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图6.20 – 这段文字简洁，但没有上下文，无法讲述整个故事](img/B34247_06_20.png)'
- en: Figure 6.20 – This text is concise, but without context it doesn’t tell the
    whole story
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.20 – 这段文字简洁，但没有上下文，无法讲述整个故事
- en: 'That description is about the right length and gives sufficient meaning, but
    no context. Not all descriptions were accurate, though. Ahrefs offered three options,
    but all of them interpreted Apple Park as a walkway:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 该描述长度适中，提供了足够的意义，但没有上下文。尽管如此，并非所有描述都是准确的。Ahrefs提供了三个选项，但所有选项都将Apple Park解释为步行道：
- en: '![Figure 6.21 – Ahrefs provided options, but none were correct](img/B34247_06_21.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图6.21 – Ahrefs提供了选项，但没有一个是正确的](img/B34247_06_21.png)'
- en: Figure 6.21 – Ahrefs provided options, but none were correct
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.21 – Ahrefs提供了选项，但没有一个是正确的
- en: 'While a human could edit any of these descriptions to include context, a more
    advanced LLM *can* do it for you. Here, ChatGPT offers a generic description,
    then adds context on request:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然人类可以编辑这些描述以包含上下文，但更高级的LLM *可以*为您完成这项工作。在这里，ChatGPT提供了一个通用的描述，然后根据请求添加上下文：
- en: '![Figure 6.22 – Providing context improves the alt text—although it’s probably
    a little too long](img/B34247_06_22.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图6.22 – 提供上下文可以改善替代文本——尽管它可能有点太长了](img/B34247_06_22.png)'
- en: Figure 6.22 – Providing context improves the alt text—although it’s probably
    a little too long
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.22 – 提供上下文可以改善替代文本——尽管它可能有点太长了
- en: So, while AI-generated alt text is impressive, it is, as usual, just a starting
    point. Human input is often necessary, either to correct the generated alt text
    directly, or by asking an LLM to add new information.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管AI生成的替代文本令人印象深刻，但它通常只是一个起点。人类输入通常是必要的，要么直接纠正生成的替代文本，要么通过请求LLM添加新信息。
- en: '![Figure 6.23 – This free mobile app can describe any photo in detail—but it’s
    not instant](img/B34247_06_23.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图6.23 – 这个免费移动应用程序可以详细描述任何照片——但它不是即时的](img/B34247_06_23.jpg)'
- en: Figure 6.23 – This free mobile app can describe any photo in detail—but it’s
    not instant
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.23 – 这个免费移动应用程序可以详细描述任何照片——但它不是即时的
- en: Blind users already have access to free tools such as Be My Eyes, a mobile app
    that can describe anything a phone camera can see, and it’s also available for
    smart glasses such as those from Meta AI. Automatic generation of alt text is
    now the bare minimum, and if you’re providing alt text, you should be able to
    do better.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 盲人用户已经可以访问像Be My Eyes这样的免费工具，这是一个可以描述手机摄像头所能看到任何事物的移动应用程序，它也适用于像Meta AI那样的智能眼镜。自动生成替代文本现在是最低要求，如果您提供替代文本，您应该能够做得更好。
- en: We’ve covered a lot of ground, so let’s wrap this up.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经覆盖了很多内容，现在让我们总结一下。
- en: Summary
  id: totrans-143
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: AI-generated text has the potential to make many tasks easier, and in projects
    with formal, specific output requirements, it can shine. However, in creative
    fields, there are real risks in fully embracing it.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的文本有可能使许多任务变得更简单，在具有正式、特定输出要求的项目中，它可以大放异彩。然而，在创意领域，完全接受它存在真正的风险。
- en: If the point of your creative writing is to stand out from the crowd, you can’t
    use the same tools and techniques as everyone else. And if you want to grow as
    a creative person, you can’t simply outsource creative tasks.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您创意写作的目的是脱颖而出，您就不能使用与其他人相同的工具和技术。如果您想作为一个创意人士成长，您就不能简单地外包创意任务。
- en: That said, there’s nothing wrong with accepting help, and AI is certainly able
    to give you feedback on your work, as well as ideas. Ideation from an LLM has
    few downsides, as you’re in control of what you do with its advice. Creatives
    wanting to stretch professionally could do much worse than ask for help from an
    LLM, though the closer you are to a subject, the better.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，接受帮助并没有什么不妥，AI当然能够对你的作品提供反馈，以及提供想法。从大型语言模型（LLM）中获得的创意想法几乎没有缺点，因为你控制着如何使用它的建议。对于想要在专业上有所拓展的创意人士来说，向LLM寻求帮助绝对不是最糟糕的选择，尽管你对某个主题越熟悉，效果越好。
- en: If possible, use text generation as a tool to help you, not replace you.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果可能的话，将文本生成作为帮助你而不是取代你的工具。
- en: 'With that basic principle in mind, let’s dive into perhaps the most controversial
    application of AI for creative people: generating images.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 带着这个基本原则，让我们深入探讨AI在创意人士中最具争议的应用：生成图像。
- en: Additional resources
  id: totrans-149
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他资源
- en: '[https://www.boia.org/blog/be-careful-when-using-ai-for-alternative-text](https://www.boia.org/blog/be-careful-when-using-ai-for-alternative-text)'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[https://www.boia.org/blog/be-careful-when-using-ai-for-alternative-text](https://www.boia.org/blog/be-careful-when-using-ai-for-alternative-text)'
