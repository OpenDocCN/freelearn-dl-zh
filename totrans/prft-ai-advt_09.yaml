- en: '7'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building Your AI Roadmap
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now that you’ve created your **Use case fact sheet or fact sheet** – and ideally
    many of them – the next step is to put them on an AI roadmap. Or better: AI roadmaps.
    The title of this chapter might suggest we’re building one **AI roadmap**, but
    in reality, most organizations need to build multiple AI roadmaps. Each department
    or business unit will have its own unique set of AI use cases, strategies, and
    goals. These various roadmaps must work together, creating a cohesive strategy
    that aligns with broader business objectives and ensures long-term success.'
  prefs: []
  type: TYPE_NORMAL
- en: An AI roadmap in the sense I’m using it for this book is a rather tactical element.
    While your overall AI adoption approach (see [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor054))
    tells you how your organization should tackle the AI age in general, an AI roadmap
    tells you how to realize a given set of business goals with AI in a shorter period
    of time. While there’s no definite number to what *a shorter period of time* means,
    I found planning intervals of six months to be very helpful. Six months gives
    you enough runway to plan AI initiatives upfront, but it is also short enough
    to embrace changes in the overall AI landscape.
  prefs: []
  type: TYPE_NORMAL
- en: 'The basis of your roadmap is the Use case fact sheets that you learned about
    in the last chapter. To turn a loose collection of Use case fact sheets into a
    cohesive roadmap, we must do the following: organize fact sheets by common denominators;
    prioritizing fact sheets, to know what to tackle and identify the connections
    between fact sheets to know which synergies exist.'
  prefs: []
  type: TYPE_NORMAL
- en: Based on this information, you can put your use cases onto a project plan that
    gets executed in a structured way while allowing you to maintain flexibility,
    and to cycle through options as you gather more feedback, priorities shift or
    as new opportunities arise.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll explore how to build multiple AI roadmaps across an organization
    that work together towards a larger business goal. While the focus here is on
    the technical and tactical
  prefs: []
  type: TYPE_NORMAL
- en: elements, remember that true success also depends on fostering an AI-ready culture,
    which we’ll address further in [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor349).
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Organizing AI use cases
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prioritizing AI use cases
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Connecting the dots: Finding synergies across use cases'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sequencing use cases for maximum impact
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aligning roadmaps across the organization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Organizing AI use cases
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are three main ways to organize your use cases that enable decentralized
    ownership while allowing strategic decision-making: by department, by product
    team, or by business goal. Each grouping method offers unique advantages depending
    on the structure of your organization and the focus of your AI initiatives.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Approach A: Group by department'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'You can group your use cases by the department or team that generated them.
    This method typically categorizes use cases by business function, aligning AI
    projects with specific departmental goals. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: The marketing team may focus on customer segmentation, personalized outreach,
    and campaign optimization, using AI to better understand customer behavior and
    improve targeting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The operations team might prioritize process automation, predictive maintenance,
    or improving customer support efficiency through AI-driven solutions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By grouping use cases this way, you ensure that each department has a clear
    view of its AI opportunities, and these opportunities are directly tied back to
    **core business processes**. This approach works well in opportunistic AI adoption
    and organizations where departments operate with relative independence, and where
    AI is seen as a tool to improve department-specific efficiency and performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Approach B: Group by product team'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If your organization is product-centric, you might prefer grouping your use
    case fact sheet by how AI supports each product, acknowledging nuances in each
    product lifecycle as well as the underlying customer journeys.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if your organization runs multiple e-commerce outlets, such as
    B2B and B2C stores, AI use cases can be grouped by each type:'
  prefs: []
  type: TYPE_NORMAL
- en: '**B2C store**: AI use cases might focus on personalized recommendations, dynamic
    pricing, and AI-driven marketing automation to enhance the customer experience
    and drive conversions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**B2B store**: AI initiatives may include bulk order predictions, supply chain
    optimization, and automated customer account management, addressing the longer
    sales cycles and operational efficiency needs of B2B transactions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach works particularly well in industries where product development
    and customer experience are central, such as e-commerce, technology, or consumer
    goods.
  prefs: []
  type: TYPE_NORMAL
- en: 'Approach C: Group by business goal'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another way to group your AI use cases is by their contribution to broader business
    goals which works well with a divide-and-conquer approach. This approach ensures
    that all AI initiatives are aligned with the company’s strategic priorities, such
    as increasing revenue, improving customer satisfaction, or enhancing operational
    efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: If the organization’s top priority is improving customer retention, you could
    group AI use cases from multiple departments – such as marketing, customer service,
    and product development – under this goal. Use cases could include personalized
    marketing recommendations, AI-powered customer support chatbots, and improving
    the product recommendation engine.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the business goal is reducing operational costs, use cases from departments
    such as operations, logistics, and finance might be grouped together, including
    AI projects for streamlined order delivery, improved demand forecasting, and supply
    chain optimization.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This categorization ensures that AI initiatives remain strategically focused
    on what’s most important to the business, regardless of which department is responsible
    for the execution.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, you might find a combination of these approaches works best. For
    example, a product-centric organization might group AI use cases by product but
    also align certain initiatives with broader business goals, such as improving
    customer retention or driving operational efficiency. In the end, you’ll often
    have a mix of these different factors, which is completely fine, as this reflects
    the very uniqueness of your own organization.
  prefs: []
  type: TYPE_NORMAL
- en: Building a use case backlog
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s explore a practical example of building a roadmap by department. In the
    previous chapter, we explored the *AI RFP response process* use case. In our sales
    department, we also identified the following potential AI use cases that could
    be added to the department **backlog**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.1: AI RFP response process backlog](img/B31200_07_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.1: AI RFP response process backlog'
  prefs: []
  type: TYPE_NORMAL
- en: 'This backlog includes entries like:'
  prefs: []
  type: TYPE_NORMAL
- en: '**RFP Chatbot Analyzer**: AI-driven chatbot that helps answer RFP-related questions
    quickly and accurately.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Team Matcher**: AI system that suggests the best internal teams to handle
    specific RFPs based on skillset and experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time Predictor**: Predicts how long it will take to complete an RFP based
    on past data and project complexity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content Generator**: Automatically generates proposal content by leveraging
    AI to draft sections based on previous successful proposals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RFP Classifier**: AI system that classifies incoming RFPs and routes them
    to the appropriate department or team.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Call Transcriber**: Transcribes and analyzes sales calls related to RFPs,
    helping identify key insights and action points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Proposal Reviewer**: AI-powered tool that reviews and provides feedback on
    RFP drafts, ensuring compliance and improving quality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content Extractor**: Extracts relevant information from RFP documents for
    easier analysis and faster response times.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource Optimizer**: Optimizes the allocation of internal resources based
    on project needs and availability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain Avatar**: AI-driven *avatar* that can simulate internal domain experts
    to quickly gather the right knowledge necessary for submitting an RFP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For every one of these use cases, the department has created a **use case fact
    sheet**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The use case fact sheet for the RFP Chatbot Analyzer is depicted in *Figure
    7.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.2: Use case fact sheet example](img/B31200_07_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.2: Use case fact sheet example'
  prefs: []
  type: TYPE_NORMAL
- en: When a backlog is populated with fact sheet, it becomes easier for the organization
    to quickly identify high-priority use cases, reallocate resources when necessary,
    and maintain momentum even when certain projects hit roadblocks. The Use case
    fact sheets also ensure consistency, as each AI project can be evaluated, compared,
    and refined using the same set of criteria.
  prefs: []
  type: TYPE_NORMAL
- en: A backlog of use cases is not a one-time exercise – it’s a living document.
    As new technologies emerge and business needs evolve, your backlog should be continuously
    updated to reflect these changes. For instance, a use case that wasn’t feasible
    a year ago might now be within reach due to advancements in AI technology or changes
    in data availability.
  prefs: []
  type: TYPE_NORMAL
- en: This ongoing review process also allows you to reprioritize use cases as needed.
    For example, if a department achieves success with a low-complexity use case (a
    **Quick Win**), they can immediately move on to a higher-complexity project that’s
    already in the backlog. By continually cycling through the backlog, you ensure
    that your AI efforts remain aligned with current business priorities and external
    opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Your AI **use case backlog** (*Figure 7.1*) is the foundation of your roadmapping
    process. It provides a structured, comprehensive view of the organization’s AI
    opportunities, ensuring that each department, product team, or cross-functional
    team behind a business goal has a clear understanding of how AI can drive value.
    The backlog demonstrates a robust example of multiple AI initiatives that, when
    prioritized and aligned correctly, can become a well-organized roadmap.
  prefs: []
  type: TYPE_NORMAL
- en: This department could now proceed by prioritizing these use cases by business
    impact and feasibility and finding synergies that exist between them.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s exactly what we’re going to do next!
  prefs: []
  type: TYPE_NORMAL
- en: Prioritizing AI use cases
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With your use cases collected in the backlog, the next logical step is to bring
    them into an order of priority. Before diving into dependencies or overlaps between
    use cases, we first need to evaluate them based on their **business impact** and
    **feasibility**. This will help you focus on the use cases that deliver the most
    value and are the most practical to implement in the short term.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two key dimensions to consider when prioritizing: business impact
    and the feasibility of the use case.'
  prefs: []
  type: TYPE_NORMAL
- en: Business impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This dimension assesses the potential value a use case can bring to the organization.
    In earlier steps, you’ve already checked whether a use case clears your $10K threshold
    and is therefore worth considering at all. At this stage, the focus shifts to
    two questions: how much value the use case delivers above that threshold, and
    how measurable that value will be in practice. You can gather insights for this
    dimension from the **VALUE DIMENSION** field in your Use case fact sheets.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.3: Value dimensions to assess the business value of the project](img/B31200_07_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.3: Value dimensions to assess the business value of the project'
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that at this early stage, quantifying impact can be difficult due
    to many unknowns. You don’t need a perfect financial model yet, but you do need
    a credible sense of scale and traceability for value creation.
  prefs: []
  type: TYPE_NORMAL
- en: So, instead of using arbitrary scoring systems like *T-shirt sizes* or vague
    categories, a more straightforward approach is to rank use cases against each
    other. This allows you to prioritize without overcomplicating things in the beginning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Simply compare each use case head-to-head with another and ask yourself: Which
    one is likely to deliver more measurable value above the $10K threshold? You can
    think in terms of the following four **Value levers**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost**: Will this use case allow us to operate more cost-effectively?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quality**: Will this use case allow us to do things better?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speed**: Will this use case allow us to do things faster?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quantity**: Will this use case allow us to do more?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some use cases might hit just one – others might hit all value levers. What
    matters, though, is the business impact overall. If one use case just has a cost
    lever of allowing you to save $50k per month – that is more valuable than a use
    case where you can do more things faster and cheaper, but the overall impact might
    be just $20k per month.
  prefs: []
  type: TYPE_NORMAL
- en: Continue doing this for all use cases. As you compare them one by one, you’ll
    end up with a ranked list – highest impact to lowest – without worrying too much
    about the exact numbers or metrics in between.
  prefs: []
  type: TYPE_NORMAL
- en: Bear in mind that, in practice, you don’t need to compare every use case against
    each other. For example, if we know that *Use Case 1* is more valuable than *Use
    Case 2*, we don’t need to compare *Use Case 3* against *Use Case 1* if *Use Case
    3* is less valuable than *Use Case 2*.
  prefs: []
  type: TYPE_NORMAL
- en: In our RFP example (*Figure 7.3*), we might find that **Domain Avatar** has
    a higher expected business impact than **RFP Chatbot** **Analyzer**. However,
    when comparing **Team Matcher** to **Domain Avatar**, **Team Matcher** might rank
    higher in terms of potential business value. Comparing **RFP Chatbot** **Analyzer**
    with **Time Predictor** could result in **RFP Chatbot** **Analyzer** taking precedence.
    By working through this head-to-head comparison method, you’ll end up with a rough
    ranking of use cases by business impact, which is a great starting point to move
    forward.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.4: Use-case ranking of AI RFP response process](img/B31200_07_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.4: Use-case ranking of AI RFP response process'
  prefs: []
  type: TYPE_NORMAL
- en: Remember, this ranking is just a rough heuristic – use it to establish an order
    of priority quickly, knowing that it can and likely will change as you progress
    and gather more insights.
  prefs: []
  type: TYPE_NORMAL
- en: Feasibility
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have a rough ranking of use cases by business impact, the next dimension
    to evaluate is feasibility. This dimension assesses how practical each use case
    is to implement based on available resources, data, technology, and organizational
    readiness - essentially, a measure of how fast and easily value can be realized.
  prefs: []
  type: TYPE_NORMAL
- en: In your Use case fact sheets, you’ve already made an initial guess regarding
    the feasibility (refer to [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181)). Refine
    this initial assessment now with a strong focus on the fields **Data Dimension**,
    **Risk Dimension**, **Resources**, and **Stakeholders** in [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181),
    *Figure 6.20*.
  prefs: []
  type: TYPE_NORMAL
- en: Some use cases may require substantial investment in data collection, integration,
    or infrastructure, while others might be relatively easy to implement with the
    tools already available.
  prefs: []
  type: TYPE_NORMAL
- en: 'I use a system where I assign *complexity points* to a given use case whether
    it checks off a criteria or not:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Check?** | **Question** | **Complexity Points** |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Does this require high automation? | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Does this require high integration? | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Is the data for this use case not available? | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Do we need to train an AI model for this? | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Are we lacking the necessary expertise? | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| [ ] | Is this use case in a regulated domain? | 1 |'
  prefs: []
  type: TYPE_TB
- en: 'Table 7.1: Complexity points for different use cases'
  prefs: []
  type: TYPE_NORMAL
- en: Whenever you check off one of these lines, add the number of complexity points
    to your total.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then you can match this use case roughly to one of the following categories:'
  prefs: []
  type: TYPE_NORMAL
- en: '**0-2 Points**: High feasibility'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3-4 Points**: Medium feasibility'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**5+ Points**: Low feasibility'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feel free to adjust these questions and the complexity point system to your
    organization.
  prefs: []
  type: TYPE_NORMAL
- en: With this information in mind, perform a head-to-head comparison of your use
    cases based on feasibility, much like you did for business impact, but this time
    doing it within each feasibility class (low/medium/high) and through a lens of
    asking yourself how easily each project can be executed.
  prefs: []
  type: TYPE_NORMAL
- en: 'As you work through this head-to-head comparison of feasibility, you’ll spread
    out your use cases vertically, forming a two-dimensional view. The first dimension
    is impact, and the second dimension is feasibility. Here’s how that might look
    in our current example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.5: Comparing use cases – feasibility vs business impact](img/B31200_07_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.5: Comparing use cases – feasibility vs business impact'
  prefs: []
  type: TYPE_NORMAL
- en: For example, after evaluating feasibility, you might realize that building a
    **Call Transcriber (6)** would be easier than implementing the more complex **RFP
    Chatbot** **Analyzer** **(1)**. Similarly, **RFP Chatbot** **Analyzer** **(1)**
    might be easier to develop than an **Automated Content Generator (4)**, which
    might require significant resources and advanced capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: With these two dimensions in mind, we will look at a more structured method
    to prioritize your use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Use case prioritization matrix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’ve completed this exercise, congratulations, you’ve just created the
    first draft of your **Use case prioritization matrix** (*Figure 7.5*). This matrix
    allows you to quickly identify where to focus your efforts and provides a structured
    approach for deciding which use cases to prioritize.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.6: Use case prioritization matrix](img/B31200_07_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.6: Use case prioritization matrix'
  prefs: []
  type: TYPE_NORMAL
- en: 'The **prioritization matrix** is a great visual tool that offers a clear, objective
    way to align stakeholders on which use cases to pursue and ensures that resources
    are directed toward initiatives that deliver maximum business value. It also helps
    to categorize use cases into four distinct types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Champions**: High-impact, high-feasibility projects. These should be prioritized
    as they offer the most immediate value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quick wins**: Lower-impact but high-feasibility projects. These can be implemented
    quickly to demonstrate early success and build momentum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research cases**: High-impact but lower-feasibility projects. These are longer-term
    strategic bets that will require more resources and development time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reassess later**: Low-impact, low-feasibility projects. These should be deprioritized
    but may be revisited later as circumstances change.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This prioritization matrix will be crucial as you move forward, ensuring that
    your AI roadmap focuses on the highest-value and most feasible use cases, while
    also maintaining a clear view of more ambitious projects that require a longer-term
    commitment. It will also serve as an effective tool for stakeholder communication,
    helping everyone stay aligned.
  prefs: []
  type: TYPE_NORMAL
- en: To be clear, you need to run this process for every use case backlog you have
    in each department, product team, or business goal – depending on how you grouped
    them. This is why scoping is critical. A good sweet spot is a backlog of around
    **5-15** use cases per group. This range gives you enough room to iterate while
    preventing you from becoming overwhelmed by too many competing priorities.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, keeping track of all the different roadmaps and ensuring overarching
    alignment across the organization is the task of a central AI unit, such as a
    **Head of AI** or **AI Center of Excellence** (**AI CoE**). We’ll explore that
    topic in more depth later, in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: For now, the last missing piece is to identify how different use cases are related
    and if they can be combined to leverage additional synergies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Connecting the dots: Finding synergies across use cases'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In practice, a lot of *AI roadmapping* processes stop right here after the
    *prioritization matrix*, with teams jumping straight into developing *quick win*
    use cases or starting to build resources for more ambitious but less feasible
    projects. However, they overlook a critical step: *Connecting the dots*.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Connecting the dots** means finding overlaps and identifying synergies across
    different use cases. The goal is to leverage insights from one use case to benefit
    others, transferring learnings (both successes and failures) across projects.
    It also enables the organization to achieve compounding gains, where progress
    in one area leads to improvements in others.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This process can take place:'
  prefs: []
  type: TYPE_NORMAL
- en: Within a single group (whether grouped by department, product team, or business
    goal).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Between groups across all roadmaps, ensuring alignment across the organization.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While a central unit like an AI CoE or a Head of AI will ensure alignment between
    multiple roadmaps, business leaders and department heads of different groups are
    responsible for maintaining alignment within their own roadmaps. AI experts should
    assist in this process, but business leaders must also develop a sense of how
    different use cases relate to one another. This helps them pivot as needed, adjust
    roadmaps on the go, and make more informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at some of the common overlaps.
  prefs: []
  type: TYPE_NORMAL
- en: Common data sources and technology overlaps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most immediate ways to connect the dots is by identifying shared
    data sources and technology overlaps across your use cases. Many AI projects require
    the same types of data or depend on similar technical infrastructure. By identifying
    these shared requirements, you can centralize efforts and reduce redundancies.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in our RFP example, both the **RFP Chatbot** **Analyzer** and the
    **Content Generator** require access to the original RFP documents submitted by
    clients. Both use cases may share a similar data pipeline, which processes these
    documents and ensures that the data is formatted correctly. Streamlining this
    data pipeline benefits both use cases simultaneously.
  prefs: []
  type: TYPE_NORMAL
- en: If you look at the technology aspect, the **RFP Chatbot** **Analyzer** and the
    **Domain Avatar** are both **Chat with your documents** use cases, powered by
    **large language models** (**LLMs**). Both use cases share a similar technological
    stack, meaning that advancements or improvements in one (e.g., refining LLM interactions)
    can easily benefit the other.
  prefs: []
  type: TYPE_NORMAL
- en: When data or technology is standardized across use cases, the benefits multiply.
    Enhanced data quality or improvements in your AI tech stack can elevate multiple
    projects at once.
  prefs: []
  type: TYPE_NORMAL
- en: Similar processes across departments or teams
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Process-driven synergies often arise within a group but can also emerge between
    departments. Different teams might be solving similar problems, even if the specific
    use cases look different on the surface.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, while the sales department is building an RFP chatbot to automate
    responses to client tenders, the internal purchasing department might face a similar
    challenge from the opposite angle – comparing incoming offers to RFPs they’ve
    sent out. Both departments deal with document comparison and could benefit from
    a shared AI platform that streamlines document processing.
  prefs: []
  type: TYPE_NORMAL
- en: Identifying these process overlaps ensures that similar AI tools can be leveraged
    across departments, reducing duplication and improving overall efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Shared product features or customer touchpoints
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some use cases might target similar product features or customer interactions.
    Recognizing these connections ensures that improvements in one use case directly
    enhance other parts of the customer journey or product experience.
  prefs: []
  type: TYPE_NORMAL
- en: Consider an e-commerce setting where different use cases, such as personalized
    recommendations or cart abandonment recovery, might all impact the checkout process
    in an online store. Streamlining the underlying technology powering these features
    ensures that multiple parts of the customer journey benefit from AI-driven improvements.
  prefs: []
  type: TYPE_NORMAL
- en: Connecting the dots between product-focused use cases allows for more consistent
    user experiences and helps maximize the value of AI across the entire organization.
  prefs: []
  type: TYPE_NORMAL
- en: As you connect these dots, you ensure that your AI roadmaps are not just a collection
    of isolated projects but a tightly integrated program of initiatives working together
    to drive greater business value.
  prefs: []
  type: TYPE_NORMAL
- en: But how do you find and orchestrate these overlaps in practice? There is a practical
    framework you can use – the **3****S** **framework**. Let’s see how you can use
    it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The 3S framework: Spot, Size, Seize'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Start with **Spotting the Overlaps**, which involves scanning your AI use cases
    for any shared data sources, technologies, workflows, or customer touchpoints.
    Create a shortlist of overlaps between the use cases in your backlog.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tip: Cluster the use case overlaps using a mind map!'
  prefs: []
  type: TYPE_NORMAL
- en: Next, **Size the Overlaps** to decide which commonalities truly matter. Not
    every shared element is worth unifying – some might offer a limited benefit or
    require too much extra effort. A quick evaluation of each overlap’s potential
    business value, feasibility, and cost savings allows you to focus on the integrations
    that will have the most impact.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, **Seize the Overlaps** and translate these insights into concrete action.
    Once you know where you can consolidate effort and investment, it’s time to unify
    those projects under a shared architecture or platform, and a timeline that avoids
    duplicated effort, allows smoother future integrations, and adds a quicker path
    to scaling.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate how applying this framework and connecting the dots looks in practice,
    let’s revisit the RFP process we prioritized earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Revisiting the RFP response process example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Which dots are there that we should connect – and how do we find them? Let’s
    run the 3S framework:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Spot the Overlaps**: Look across AI projects for shared needs in:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data**: Are multiple use cases relying on the same datasets or sources?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Technology**: Do different AI use cases need similar models, APIs, or infrastructure?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processes**: Are different use cases essentially trying to solve the same
    type of problem in different ways?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Touchpoints**: Which new AI features would impact the same customer/user
    journey?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In our RFP scenario, for example, the **Chatbot** **Analyzer**, **Content Generator**,
    and **Domain Avatar** all rely on the same RFP document database and LLM-powered
    text generation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Size the Overlaps**: Not every dot (connection) is relevant for us. So, let’s
    briefly evaluate which overlaps are really worth pursuing by asking:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Higher business impact**: Will combining efforts create significantly better
    outcomes?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better feasibility**: Will merging make execution easier rather than harder?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost-saving potential**: Will we reduce redundant AI work and save resources?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Since the **RFP Chatbot** **Analyzer**, **Domain Avatar**, and **Content
    Generator** are all ranked with high business value, it makes sense to bundle
    them in order to reduce cost and build technical capabilities to unlock the most
    complex use case (**Domain Avatar**) as we go.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Seize the Overlaps**: Now that we know which synergies exist and whether
    it makes sense to realize them, we will define guardrails for our implementation
    plan accordingly.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In our example, instead of developing separate AI tools in isolation, we could
    merge the **RFP Chatbot** **Analyzer**, **Domain Avatar**, and **Content Generator**
    into a single project called **Smart RFP AI Suite**. While each use case still
    lives on its own (and gets implemented individually), we would ensure that infrastructure,
    AI models, and strategic decisions are planned holistically, eliminating redundant
    development efforts and infrastructure costs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Concretely, rather than purchasing an off-the-shelf *chat-with-your-data* tool
    that only solves the immediate chatbot use case, we choose a flexible AI platform
    that:'
  prefs: []
  type: TYPE_NORMAL
- en: Meets the chatbot’s immediate needs, enabling rapid deployment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provides built-in support (or easy expansion) for additional AI use cases, such
    as content generation and domain expertise simulation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensures long-term scalability by allowing seamless model updates and integration
    with future AI initiatives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Figure 7.7* shows how you can connect and order the use cases for the RFP
    Chatbot Analyzer project.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.7: Connecting the dots for the RFP response process](img/B31200_07_07.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.7: Connecting the dots for the RFP response process'
  prefs: []
  type: TYPE_NORMAL
- en: This approach reduces tech fragmentation, avoids vendor lock-in, and maximizes
    ROI by ensuring that every AI investment serves multiple use cases over time.
    It also helps optimize resources and amplifies the business value of AI implementation
    within the department.
  prefs: []
  type: TYPE_NORMAL
- en: After grouping, prioritizing, and connecting the dots between your AI use cases,
    the final step is to determine the optimal sequence for implementation. Let’s
    talk about it more in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Sequencing use cases for maximum impact
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Sequencing the use cases ensures that the AI initiatives in your roadmap are
    tackled in the right order, balancing quick wins, strategic bets, and dependencies
    between use cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'A well-thought-out sequence allows your organization to:'
  prefs: []
  type: TYPE_NORMAL
- en: Maximize resource efficiency by reusing capabilities and infrastructure across
    related projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deliver short-term wins while laying the groundwork for more complex initiatives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mitigate risks by solving foundational issues (e.g., data readiness) early on,
    making larger projects more feasible down the road.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When deciding the order in which to implement your use cases, several factors
    should be taken into account:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dependencies between use cases** : Some use cases will naturally depend on
    others. You need to determine which use cases must be completed first to unlock
    the value of subsequent projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, in our RFP example, the **RFP Chatbot** **Analyzer** may require
    a well-established document processing pipeline. If the department also has a
    **Content Generator** that uses the same document inputs, it makes sense to implement
    both sequentially, so that the document pipeline created for the chatbot also
    powers the generator. In this case, the chatbot might need to be prioritized first
    as it helps establish the infrastructure for the other.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: By sequencing use cases with shared dependencies, you ensure smoother implementation
    and more efficient use of resources.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Quick wins** **versus** **strategic bets**: You should also balance quick
    wins with more ambitious, long-term projects. Quick wins demonstrate immediate
    value, helping build momentum and support from stakeholders. Strategic bets, on
    the other hand, are more complex initiatives that take longer to deliver but offer
    greater rewards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In cases where the **RFP Chatbot** **Analyzer** is a feasible quick win that
    could be implemented within a few months, it should be prioritized early. On the
    other hand, the **Domain Avatar** might be a more ambitious project, requiring
    advanced AI capabilities and a longer timeframe. While both are important, tackling
    the quick win first can help build organizational support and generate early value
    while laying the groundwork for more complex projects.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: By sequencing both types of projects strategically, you maintain momentum and
    deliver continuous value throughout the roadmap.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Data and infrastructure readiness**: Before certain AI use cases can be implemented,
    the organization needs to ensure that the necessary data and infrastructure are
    in place. If foundational work is required – such as cleaning data, integrating
    systems, or improving data governance – these tasks should be prioritized early
    to unlock future AI capabilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s consider a case where your roadmap includes an AI-driven **Proposal Reviewer**
    that relies on high-quality, structured data from past proposals. The first step
    might involve the data pipeline and ensuring that historical data is cleaned and
    accessible. Once the data is ready, the proposal reviewer can be developed more
    easily.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Addressing data readiness early ensures that later projects are not delayed
    due to foundational issues.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Phased approach for ambitious projects**: For large, complex AI projects
    (what we previously referred to as strategic bets), it’s often helpful to break
    them down into smaller, more manageable phases. This phased approach allows you
    to make gradual progress while minimizing risk.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For an ambitious project like the **Domain Avatar**, you might start by implementing
    a simpler version of the avatar that handles basic inquiries before gradually
    expanding its capabilities to more complex tasks. This incremental approach allows
    for continuous learning and improvement while ensuring that progress is made without
    overwhelming the team with a large, complex project from the start.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Let’s return to our RFP example to see how sequencing plays out in practice.
  prefs: []
  type: TYPE_NORMAL
- en: Sequencing the RFP Use Cases
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After connecting the dots between the **RFP Chatbot** **Analyzer**, **Domain
    Avatar**, and **Content Generator**, the team has determined the following sequence:'
  prefs: []
  type: TYPE_NORMAL
- en: '**RFP Chatbot Analyzer**: This use case is a feasible quick win that can demonstrate
    immediate value. It also establishes the necessary document processing pipeline
    that other use cases will depend on.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Content Generator**: Once the document processing pipeline is in place, the
    content generator can leverage this infrastructure to automate sections of the
    RFP creation process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Domain Avat****ar**: This is a more ambitious use case that will require
    more development time. By sequencing it after the chatbot and content generator,
    the team ensures that key infrastructure is already in place, reducing implementation
    risk.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Figure 7.8* illustrates this sequencing based on the two priority dimensions,
    Business impact and feasibility.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.8: Sequencing use cases for the RFP response process](img/B31200_07_08.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7.8: Sequencing use cases for the RFP response process'
  prefs: []
  type: TYPE_NORMAL
- en: By sequencing both quick wins and strategic bets, your organization can drive
    immediate impact while building infrastructure and readiness for more complex
    projects. Phasing ambitious use cases into smaller steps allows continuous learning
    and prevents the roadmap from becoming bogged down by large, slow-moving initiatives.
    With a well-sequenced roadmap in hand, your group will be well-equipped to deliver
    both immediate results and long-term transformation through AI.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s wrap up by finding out how we can synchronize AI roadmaps across
    departments, processes, and priorities to gain maximum impact across the organization.
  prefs: []
  type: TYPE_NORMAL
- en: Aligning roadmaps across the organization
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Aligning multiple department- or product-specific roadmaps ensures that every
    AI initiative contributes to the company’s overarching objectives, while addressing
    specific challenges within its scope.
  prefs: []
  type: TYPE_NORMAL
- en: Decentralized ownership of AI roadmaps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the key elements of a successful AI roadmap is ownership. While the AI
    CoE or central AI team plays an essential role in coordination and strategic alignment,
    the responsibility for building and executing AI roadmaps should be decentralized
    and owned by individual business leaders or department heads.
  prefs: []
  type: TYPE_NORMAL
- en: Each business unit or department needs to take ownership of its AI initiatives,
    ensuring that use cases are directly aligned with its specific goals, processes,
    and challenges. This decentralized ownership model allows each team to move at
    its own pace and experiment with AI solutions tailored to its unique workflows.
    Business leaders must be equipped with the tools and support needed to develop
    their AI roadmaps. This means understanding how AI fits into their operational
    objectives and making informed decisions about which use cases to prioritize.
    By giving ownership of AI roadmaps to departments, you foster accountability –
    and also allow technical departments like IT, as well as AI experts from the CoE,
    to come in and help most effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Role of the AI CoE: Driving synergy and coordination'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While each department owns its roadmap, the AI CoE (if available) ensures that
    these roadmaps are coordinated across the organization, enabling departments to
    collaborate and leverage shared AI infrastructure and learnings. This balance
    between decentralized ownership and centralized coordination ensures that AI initiatives
    are both tailored to the needs of each business unit and aligned with the overall
    AI strategy.
  prefs: []
  type: TYPE_NORMAL
- en: 'The AI CoE acts as the central hub for coordinating all AI efforts across the
    organization. While individual departments own and manage their own AI roadmaps,
    the AI CoE ensures:'
  prefs: []
  type: TYPE_NORMAL
- en: Best practices and learnings are shared across departments to avoid duplication
    of effort.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data and infrastructure are unified, allowing different departments to benefit
    from shared resources such as data pipelines, AI models, and cloud services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI projects align with the broader business objectives, ensuring that each initiative
    contributes to the company’s overall goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By establishing a coordinated structure, the AI CoE makes sure that AI adoption
    doesn’t happen in silos, but instead benefits the entire organization through
    collaboration and shared insights. Decentralized ownership enables teams to move
    at their own pace and implement solutions tailored to their unique challenges
    and goals. However, strategic alignment ensures that, while departments have autonomy,
    their efforts are still contributing to the company’s larger objectives.
  prefs: []
  type: TYPE_NORMAL
- en: This balance ensures that each department can address its immediate needs while
    staying aligned with the organization’s long-term goals.
  prefs: []
  type: TYPE_NORMAL
- en: KPIs for AI success
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, to ensure that roadmaps are driving the desired outcomes, the AI CoE
    and department heads must establish **Key Performance Indicators (KPIs)** that
    reflect both individual department goals and broader business objectives. These
    KPIs provide a clear measure of AI’s success and help maintain alignment between
    roadmaps and the overall company strategy. Example KPIs may include metrics like
    cost reductions, improved customer retention, or increased revenue, depending
    on the goals of the specific AI use cases being implemented.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, tracking AI project success with high-level KPIs is often too simplistic,
    as AI’s impact frequently spans multiple complex dimensions. However, operating
    without any measurable criteria isn’t feasible either, as you’d lack visibility
    into whether a project delivers tangible value or not.
  prefs: []
  type: TYPE_NORMAL
- en: 'A more realistic and actionable approach is to define *two simple thresholds*
    for every AI use case:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Value threshold:** This is the expected minimum business value or impact
    delivered per defined period (typically annually). It reflects concrete operational
    benefits, such as time savings, incremental revenue, improved customer retention
    scores, or cost reductions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost cap:** A clear upper limit for the annual costs or cost share associated
    with an AI initiative, including all factors – software licensing, infrastructure,
    maintenance, data labeling, and internal resource allocation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'By clearly setting both thresholds, you create an intuitive benchmark: as long
    as your *value threshold exceeds your cost cap*, your AI use case is considered
    *net-positive*, justified, and delivering meaningful value. It’s profitable.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s illustrate this approach concretely with our RFP Chatbot Analyzer example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose the primary benefit of your chatbot is saving sales representatives’
    valuable working time. You decide to set your value threshold as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Value threshold****:** Saving each sales rep at least 1 hour per week.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With 10 sales reps using the chatbot, this adds up quickly:'
  prefs: []
  type: TYPE_NORMAL
- en: 10 hours/week saved × 52 weeks/year = 520 hours/year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With each hour valued at roughly *$60/hour*, that translates into a business
    impact of around $31,200 per year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Co****s****t cap**: Then, let’s say your total yearly cost cap for developing,
    deploying, and maintaining this RFP Chatbot is $10,000*.* Since your annual value
    (~$31K) significantly exceeds your annual cost ($10K), your chatbot is effectively
    looking at a payback period of under four months. As a rule of thumb, prioritize
    projects with payback within 12 months for use cases with medium to high feasibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incorporating these simplified but effective thresholds into your AI roadmap
    evaluation ensures clarity around your AI project’s value and viability. This
    approach also reduces the complexity and impracticality of overly simplistic or
    excessively complicated metrics. And also supports informed decision-making, strategic
    adjustments, and effective resource allocation – critical factors in driving AI
    success at scale.
  prefs: []
  type: TYPE_NORMAL
- en: As AI continues to scale throughout the organization, it becomes essential to
    treat AI roadmaps as living, evolving documents – regularly refining value thresholds
    and cost caps based on real-world performance insights, technological advancements,
    and shifting business priorities.
  prefs: []
  type: TYPE_NORMAL
- en: 'The iterative nature of AI roadmaps: Learning and pivoting'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI roadmaps aren’t static documents, but living plans that need to be continuously
    updated and iterated based on new information, emerging technologies, and changing
    business priorities.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike traditional project roadmaps that may have fixed timelines and objectives,
    AI roadmaps must be adaptive because the field of AI evolves quickly. Technological
    breakthroughs, such as new machine learning models or more efficient data processing
    techniques, can open up opportunities that didn’t exist when the roadmap was first
    created. Similarly, business priorities can change in response to market trends,
    customer needs, or competitive pressures.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these changes could be external. If a new, highly capable AI model is
    released that drastically improves language processing, a company working on an
    internal document analysis AI system might decide to pivot from its original solution
    to incorporate this new model, thus improving performance and reducing development
    time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Internal changes based on evolving business and strategic objectives may also
    impact the AI roadmap. For instance, a company might be focused on an AI-driven
    customer support chatbot. However, if early trials show that the chatbot is struggling
    to understand customer queries, the organization might pivot to a text-based recommendation
    engine instead, while they work on refining the chatbot’s capabilities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI roadmaps need to be dynamic to allow for these pivots – adapting to both
    internal learning and external technological advancements.
  prefs: []
  type: TYPE_NORMAL
- en: Hence, it is essential to be flexible about your AI roadmaps. Let’s talk more
    about it in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Approaching AI projects in an agile way
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The key to maintaining a flexible roadmap is adopting an agile approach to AI
    development. In **agile project management**, work is done in small, iterative
    cycles (**sprints**), allowing teams to continuously test, learn, and adapt. This
    principle is especially effective in AI, where trial and error is often part of
    the process.
  prefs: []
  type: TYPE_NORMAL
- en: The small and fast iterations enable breaking down AI projects into smaller,
    more manageable phases allowing teams to make faster progress while limiting risk.
    By developing small increments, like proof-of-concepts or prototypes, teams can
    test AI use cases quickly and gather feedback early on. You’ll learn more about
    this in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor312).
  prefs: []
  type: TYPE_NORMAL
- en: 'For example: Instead of building a complex AI-based customer voice bot all
    at once, a company could start by launching a text-based chatbot for internal
    use. By gathering insights and refining the chatbot’s performance over time, the
    company can then move on to more complex iterations, such as external customer-facing
    bots or voice interfaces.'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Throughout this chapter, we’ve explored how AI roadmaps provide the structure
    and flexibility needed to guide profitable AI adoption, from building comprehensive
    use case backlogs to adapting to internal and external changes. Done right, AI
    roadmaps become more than planning tools—they become engines of profitable transformation.
    To achieve this, they must be owned, aligned, and measured against clear value
    thresholds and cost caps.
  prefs: []
  type: TYPE_NORMAL
- en: Yet even the best-designed roadmap succeeds only through effective execution.
    The critical factor is empowering teams across the organization. Each department
    must take ownership of AI initiatives that address its specific challenges and
    goals. Departments that own their roadmaps are better positioned to innovate and
    adapt, while the AI CoE ensures alignment with the company’s overall strategy,
    prevents silos, and optimizes resources. Empowering teams goes beyond tools and
    data. It requires fostering an environment of cross-functional communication,
    continuous skills development, and regular roadmap reviews to ensure each department
    can respond swiftly to both successes and challenges. When teams have the right
    support structures in place, they can move quickly and confidently, knowing they’re
    contributing to both short-term wins and long-term business objectives.
  prefs: []
  type: TYPE_NORMAL
- en: With our roadmaps in place, we’re now in a great spot to start building our
    use cases out. That’s what we’re going to cover in the next chapter!
  prefs: []
  type: TYPE_NORMAL
