- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Enhancing Audits with AI
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用人工智能增强审计
- en: “In God we trust; all others bring data.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: “我们信仰上帝；其他人带来数据。”
- en: '*- W.Edwards Deming*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*- W. Edwards Deming*'
- en: In the meticulous and detail-oriented realm of auditing, where accuracy is paramount
    and there is minimal tolerance for error, **artificial intelligence** (**AI**)
    has emerged as a beacon of transformative potential. Traditionally characterized
    by manual data sifting and painstaking analysis, the auditing process is witnessing
    a paradigm shift owing to the integration of AI and **machine learning** (**ML**)
    technologies. The promise is enhanced precision, unprecedented efficiency, and
    deeper and more insightful analysis capabilities.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在细致和注重细节的审计领域，准确性至关重要，对错误的容忍度极低，**人工智能**（**AI**）已经成为了变革潜力的灯塔。传统上以手动数据筛选和费力的分析为特征，审计过程正因人工智能和**机器学习**（**ML**）技术的融合而经历着范式转变。承诺是更高的精度、前所未有的效率和更深层次的洞察力。
- en: As the quote by W. Edwards Deming suggests, trust is a precious commodity, and
    in the world of auditing, it is earned through the relentless pursuit of data-backed
    truths and transparency. AI contributes significantly to this endeavor, making
    it indispensable for auditors to navigate the intricate tapestry of financial
    data and compliance requirements.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正如W. Edwards Deming的名言所说，信任是一种宝贵的商品，在审计的世界里，它是通过不懈追求数据支持的真相和透明度来赢得的。人工智能在这一努力中发挥了重要作用，对于审计师来说，它是不可或缺的，帮助他们穿越复杂的财务数据和合规要求。
- en: The AI audit landscape
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能审计领域
- en: Auditing is a pivotal function in the financial landscape, acting as a linchpin
    and assuring the accuracy and completeness of financial information disseminated
    by organizations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 审计在金融领域扮演着关键角色，作为核心环节，确保组织传播的财务信息的准确性和完整性。
- en: Current challenges in auditing
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 审计当前面临的挑战
- en: 'The traditional auditing process, however, while robust, is not without its
    distinctive set of challenges, such as the following:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，传统的审计过程虽然稳健，但也存在其独特的挑战，如下所述：
- en: '**Volume of data**: The digital age has ushered in an era in which businesses
    are generating data at an unprecedented rate. In their quest to ensure financial
    integrity, auditors find themselves grappling with colossal datasets. The sheer
    volume makes manual review and analysis of all available information an arduous
    and often impractical task.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据量**：数字时代带来了一个企业以前所未有的速度生成数据的时代。在确保财务诚信的征程中，审计师发现自己正在与庞大的数据集作斗争。数据量之大使得对所有可用信息的手动审查和分析变得艰巨且往往不切实际。'
- en: '**Complex transactions**: With the business environment becoming increasingly
    dynamic, the complexity of transactions and financial arrangements has skyrocketed.
    These intricacies necessitate a deeper and more nuanced understanding, often proving
    to be overwhelming for human auditors, who might lack the computational prowess
    to decode these complexities efficiently.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂交易**：随着商业环境的日益动态化，交易和财务安排的复杂性急剧上升。这些复杂性需要更深入和更细致的理解，这往往对人类审计师来说是压倒性的，他们可能缺乏解码这些复杂性的计算能力。'
- en: '**Fraud detection**: The arena of fraud detection is a battlefield in which
    auditors are perpetually pitted against individuals, employing sophisticated schemes
    to misrepresent financial records. Detecting these meticulously planned fraudulent
    activities remains a daunting task for auditors, who demand a combination of vigilance,
    expertise, and advanced analytical skills.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈检测**：欺诈检测领域是一场审计师与利用复杂方案来伪造财务记录的个人之间的持久战。对于审计师来说，检测这些精心策划的欺诈活动是一项艰巨的任务，他们需要具备警觉性、专业知识和高级分析技能的结合。'
- en: '**Time constraints**: Auditors constantly race against the clock. The imperative
    for the timely completion of audit tasks often finds itself at odds with the equally
    pressing demand for a thorough and meticulous analysis and review of financial
    statements, placing auditors under significant pressure and stress.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间限制**：审计师们时刻在与时间赛跑。及时完成审计任务的要求常常与对财务报表进行彻底和细致的分析和审查的紧迫需求相冲突，这给审计师带来了巨大的压力和压力。'
- en: Against this challenging backdrop, AI has emerged as a tool and game changer.
    AI does not simply offer solutions; it innovatively addresses and mitigates these
    challenges, propelling the auditing function into a new paradigm characterized
    by efficiency, accuracy, and effectiveness.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个充满挑战的背景下，人工智能作为一种工具和变革者出现。人工智能不仅提供解决方案；它创新性地解决和缓解了这些挑战，推动审计职能进入一个以效率、准确性和有效性为特征的新范式。
- en: How AI is transforming audits
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能如何改变审计
- en: Audits transform with AI as the catalyst, driving this change. This transformation
    is not superficial; it is a fundamental shift in how audits are conducted and
    data is analyzed.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 以人工智能为催化剂，审计随着这种变化而转变。这种转变不是表面的；它是对审计执行和数据分析方法的基本转变。
- en: Automated data analysis
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化数据分析
- en: 'The deluge of data in the financial sphere can indeed be overwhelming for auditors.
    With copious amounts of data generated every minute, manual analysis is time-consuming,
    susceptible to human error, and impractical. AI ingeniously addresses this bottleneck
    by automating much of the data-analysis processes. Here, we look at how it does
    this:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 金融领域的海量数据确实可能让审计员感到不知所措。随着每分钟产生的大量数据，手动分析既耗时又容易出错，不切实际。人工智能巧妙地解决了这个瓶颈，通过自动化大部分数据分析过程。在这里，我们看看它是如何做到这一点的：
- en: '**Real-time analysis**: AI is not bound by time limitations. It can analyze
    vast datasets in real time, offering instant insights and analysis that would
    take human auditors an inordinate amount of time to derive.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时分析**：人工智能不受时间限制。它可以实时分析大量数据集，提供即时洞察和分析，这需要人类审计员花费大量时间才能得出。'
- en: '**Advanced algorithms**: By applying sophisticated algorithms, AI can meticulously
    sift through data and precisely identify errors, discrepancies, or anomalies in
    financial data. These algorithms are designed to learn and adapt and become more
    accurate and efficient.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级算法**：通过应用复杂的算法，人工智能可以细致地筛选数据，精确地识别财务数据中的错误、差异或异常。这些算法旨在学习和适应，并变得更加准确和高效。'
- en: '**Error reduction**: Automated data analysis significantly reduces the time
    and effort required for verification and validation. However, the impact does
    not end. It enhances the accuracy of the audit by eliminating human bias or error,
    offering an unparalleled level of precision.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误减少**：自动化的数据分析显著减少了验证和验证所需的时间和精力。然而，影响并未结束。它通过消除人为偏见或错误，提高了审计的准确性，提供了一种无与伦比的精确度。'
- en: '**Efficiency and accuracy**: AI accelerates the auditing process and ensures
    that it is more accurate and reliable. With automated data analysis, auditors
    can trust the data they are working with, allowing for more accurate and insightful
    conclusions.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率和准确性**：人工智能加速了审计过程，并确保其更加准确和可靠。通过自动化的数据分析，审计员可以信任他们正在处理的数据，从而得出更准确和有洞察力的结论。'
- en: By automating data analysis, AI does not just augment the auditing process;
    it revolutionizes it, laying the foundation for an audit that is efficient, inherently
    more reliable, and accurate.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动化数据分析，人工智能不仅增强了审计过程，而且彻底改变了它，为高效、本质上更可靠和准确的审计奠定了基础。
- en: Fraud detection and prevention
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 欺诈检测和预防
- en: 'In an intricate web of financial transactions, fraud detection is one of the
    most daunting challenges for auditors. AI and ML are equipped with predictive
    analytics and pattern-recognition capabilities, serving as beacons illuminating
    murky waters where fraudulent activities might be concealed:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在错综复杂的金融交易网络中，欺诈检测是审计员面临的最艰巨挑战之一。人工智能和机器学习配备了预测分析和模式识别能力，作为灯塔照亮了可能隐藏欺诈活动的浑浊水域：
- en: '**Predictive analytics**: AI predictive analytics involves the use of statistical
    algorithms and ML techniques to identify the likelihood of future outcomes based
    on historical data. AI utilizes these analytics to predict potentially fraudulent
    activities before they happen or as they are happening. This proactive approach
    allows auditors to nip fraudulent schemes in the bud, safeguarding the organization’s
    financial health and integrity.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测分析**：人工智能预测分析涉及使用统计算法和机器学习技术，根据历史数据识别未来结果的可能性。人工智能利用这些分析来预测潜在的欺诈活动，在它们发生之前或发生时。这种主动方法允许审计员在欺诈计划萌芽时将其扼杀，保护组织的财务健康和完整性。'
- en: '**Pattern recognition**: AI thrives on its ability to discern patterns within
    sprawling datasets. It meticulously analyzes transaction histories and identifies
    usual trends and norms in financial activities. With this knowledge, AI has become
    adept at spotting unusual transactions or trends that veer away from established
    patterns, flagging these anomalies for further scrutiny by auditors.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式识别**：人工智能依赖于其从庞大数据集中辨别模式的能力。它细致地分析交易历史，并识别金融活动中的常规趋势和规范。凭借这一知识，人工智能已经擅长发现异常交易或趋势，这些交易或趋势偏离了既定模式，并将这些异常情况标记出来，供审计员进一步审查。'
- en: '**Learning from history**: AI does not function in a vacuum; it learns and
    evolves. By continuously learning from historical data, it develops a keen understanding
    of typical transaction patterns. This learning process is perpetual, with AI constantly
    refining and enhancing its analytical capabilities to understand the ever-changing
    dynamics of financial transactions and fraudulent schemes.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从历史中学习**：人工智能并非在真空中运作；它学习和进化。通过不断从历史数据中学习，它发展了对典型交易模式的深刻理解。这一学习过程是持续的，人工智能不断改进和增强其分析能力，以理解金融交易和欺诈计划的不断变化的动态。'
- en: '**Flagging deviations**: Any deviation from the norm does not escape the AI’s
    vigilant eye. Even subtle and sophisticated attempts at financial misrepresentation
    are flagged for further investigation. AI serves as an initial filter, highlighting
    areas that demand auditor attention, thus allowing them to focus on their expertise
    where it is most needed.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标记偏差**：任何偏离常规的行为都无法逃脱人工智能敏锐的视线。即使是细微和复杂的财务误导尝试也会被标记出来进行进一步调查。人工智能作为一个初始过滤器，突出了需要审计员注意的领域，从而让他们能够专注于最需要专业知识的地方。'
- en: '**Proactive fraud prevention**: AI is not just a tool for detection; it is
    also an instrument for prevention. Early identification of suspicious activities
    enables auditors and organizations to adopt preventive measures. This proactive
    stance on fraud prevention minimizes financial losses and protects an organization’s
    reputation.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动欺诈预防**：人工智能不仅仅是一个检测工具，它还是一个预防工具。早期识别可疑活动使审计员和组织能够采取预防措施。这种对欺诈预防的主动立场最大限度地减少了财务损失并保护了组织的声誉。'
- en: '**Enhanced security protocols**: With cyber threats becoming increasingly sophisticated,
    AI integrates advanced security protocols to protect sensitive financial data.
    It plays a pivotal role in safeguarding against unauthorized access and data breaches,
    thereby ensuring that the audit process is accurate and secure.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强安全协议**：随着网络威胁变得越来越复杂，人工智能集成了高级安全协议来保护敏感的财务数据。它在防止未经授权的访问和数据泄露方面发挥着关键作用，从而确保审计过程准确且安全。'
- en: AI is a powerful tool in the auditor’s arsenal for fraud prevention and detection.
    Its capabilities extend beyond mere number crunching, offering a dynamic, responsive,
    and proactive approach to identifying and preventing fraudulent activities. With
    AI, auditors can navigate through the labyrinthine financial landscape with confidence
    and assurance, knowing that they have a robust and intelligent system to watch
    their backs.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是审计员在欺诈预防和检测方面的强大工具。其能力不仅限于简单的数字计算，它提供了一种动态、响应和主动的方法来识别和预防欺诈活动。有了人工智能，审计员可以自信地穿梭于错综复杂的金融环境中，知道他们有一个强大而智能的系统在背后支持他们。
- en: Risk assessment
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 风险评估
- en: 'Risk assessment is a crucial aspect in the structure of the auditing process
    that cannot be overlooked or underestimated. AI is invaluable for auditors, providing
    a nuanced lens through which risks can be identified, evaluated, and understood
    with unparalleled depth and precision. The following are some ways in which it
    can assist:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 风险评估是审计过程结构中的一个关键方面，不容忽视或低估。人工智能对审计员来说是无价的，它提供了一个细腻的视角，通过这个视角可以以无与伦比的深度和精确度识别、评估和理解风险。以下是一些它可以帮助的方式：
- en: '**Dynamic risk analysis**: The financial landscape is ever-changing, with risks
    continuing to morph and evolve. AI systems are designed to adapt to these changes
    dynamically and continuously update the risk profiles based on the latest available
    data. This dynamic approach to risk analysis ensures that auditors always work
    with the most current and relevant risk assessments, allowing timely and informed
    decision-making.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态风险分析**：金融环境不断变化，风险持续演变。人工智能系统旨在动态适应这些变化，并基于最新可用数据持续更新风险档案。这种动态的风险分析方法确保审计员始终与最新和最相关的风险评估工作，从而允许及时和明智的决策。'
- en: '**Nuanced understanding of risks**: AI does not just identify risks; it understands
    them. It considers various parameters and their interrelations, weaving a tapestry
    that represents the complex risk environment associated with an organization’s
    financial statements. This nuanced understanding allows auditors to not only identify
    risks but also appreciate their origins, implications, and potential impacts on
    financial statements.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对风险的细微理解**：人工智能不仅能够识别风险，还能理解它们。它考虑各种参数及其相互关系，编织出代表与组织财务报表相关的复杂风险环境的图案。这种细微的理解使得审计师不仅能识别风险，还能欣赏其起源、影响以及可能对财务报表产生的潜在影响。'
- en: '**Targeted audit approach**: Armed with AI insights, auditors can adopt a more
    targeted approach to their audits and evaluations of internal controls. They can
    focus their attention and resources on areas identified as higher risk, ensuring
    that these critical sections of the financial statements receive the enhanced
    review and analysis that they require. This targeted approach facilitates a more
    efficient and effective audit process, with auditors concentrating their efforts
    where they matter most.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有针对性的审计方法**：凭借人工智能的洞察力，审计师可以采取更有针对性的审计和内部控制评估方法。他们可以将注意力和资源集中在被识别为高风险的领域，确保这些财务报表的关键部分得到增强的审查和分析。这种有针对性的方法促进了更高效、更有效的审计过程，审计师将精力集中在最重要的地方。'
- en: '**Optimized resource allocation**: Efficiency is at the heart of the AI’s contribution
    to risk assessment. By identifying areas of higher risk, AI helps auditors optimize
    resource allocation. Instead of spreading their efforts thinly across all sections
    of financial statements, auditors can allocate more time and resources to high-risk
    areas, ensuring a deeper and more meticulous review of these sections.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化资源配置**：效率是人工智能对风险评估贡献的核心。通过识别高风险区域，人工智能帮助审计师优化资源配置。审计师不必将精力分散在财务报表的所有部分，而是可以将更多的时间和资源分配给高风险区域，确保对这些部分进行更深入和细致的审查。'
- en: '**Predictive risk modeling**: AI employs advanced algorithms and models to
    predict potential risks before they materialize. These predictive risk models
    consider various factors and variables and provide auditors with a forward-looking
    view of the risk landscape. This foresight enables auditors to prepare and plan
    for potential risks, adopt proactive measures to mitigate these risks, and protect
    the integrity of financial statements.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性风险建模**：人工智能采用先进的算法和模型来预测潜在风险在发生之前。这些预测性风险模型考虑各种因素和变量，并为审计师提供对风险景观的前瞻性视角。这种先见之明使得审计师能够为潜在风险做好准备和规划，采取主动措施来减轻这些风险，并保护财务报表的完整性。'
- en: '**Interactive risk dashboards**: With AI, auditors have access to interactive
    dashboards that provide visual representations of the risk landscape. These dashboards
    allow auditors to interact with risk data, explore various risk scenarios, and
    understand the potential impacts of different risks on financial statements. The
    visual and interactive nature of these dashboards makes risk data more accessible
    and understandable, facilitating informed and insightful risk assessment and audit
    planning.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互式风险仪表盘**：借助人工智能，审计师可以访问交互式仪表盘，这些仪表盘提供了风险景观的视觉表示。这些仪表盘允许审计师与风险数据互动，探索各种风险场景，并理解不同风险对财务报表的潜在影响。这些仪表盘的视觉和交互特性使得风险数据更加易于获取和理解，从而促进有见地和深入的风险评估和审计规划。'
- en: Incorporating AI into risk assessment does not simply streamline the process;
    rather, it transforms it. AI empowers auditors with insights and tools that allow
    a more nuanced, dynamic, and informed approach to risk assessment. With AI’s assistance,
    auditors can navigate through the complex web of financial risks with confidence
    and precision, conducting thorough audits that reflect the intricate risk environment
    that characterizes today’s financial landscape.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能融入风险评估不仅简化了流程，而且改变了流程。人工智能赋予审计师洞察力和工具，使他们能够采取更细微、动态和有见地的风险评估方法。在人工智能的帮助下，审计师可以自信且精确地穿越复杂的财务风险网络，进行全面的审计，反映当今金融景观所特有的复杂风险环境。
- en: AI tools in auditing
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 审计中的AI工具
- en: 'In auditing, a suite of AI tools and applications are available, each designed
    meticulously to assist and support auditors as they navigate through their multifaceted
    and demanding tasks. These tools are not merely electronic assistants; they are
    sophisticated entities equipped with features such as data mining, predictive
    analytics, and **natural language processing** (**NLP**), all of which are instrumental
    in analyzing financial documents and transactions. The following table looks at
    a few such tools:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计领域，有一套AI工具和应用程序可供使用，每个工具都精心设计，旨在协助和支持审计人员在处理多方面和繁重任务时。这些工具不仅仅是电子助手；它们是配备了数据挖掘、预测分析和**自然语言处理**（**NLP**）等功能的复杂实体，所有这些都在分析财务文件和交易中发挥着至关重要的作用。以下表格探讨了这些工具中的几个：
- en: '| **Tool Name** | **Main Functions** | **Application** **in Auditing** |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| **工具名称** | **主要功能** | **在审计中的应用** |'
- en: '| **Audit data** **analytics** (**ADA**) | Analyzes large datasets efficiently;
    identifies anomalies and patterns; facilitates risk assessment | Used for swift
    and efficient analysis of large datasets, providing deep insights and identifying
    anomalies and patterns crucial for risk assessment |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| **审计数据** **分析**（**ADA**） | 高效分析大数据集；识别异常和模式；促进风险评估 | 用于快速高效地分析大数据集，提供深入见解，并识别对风险评估至关重要的异常和模式
    |'
- en: '| **Robotic process** **automation** (**RPA**) | Automates repetitive, rule-based
    tasks | Frees up auditors to focus on more analytical and judgmental aspects of
    the audit, leading to increased productivity and efficiency |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **机器人流程** **自动化**（**RPA**） | 自动化重复的基于规则的任务 | 释放审计人员的时间，让他们专注于审计的更多分析和判断方面，从而提高生产力和效率
    |'
- en: '| NLP | Analyzes and understands textual data; extracts relevant information;
    conducts sentiment analysis | Assists in analyzing financial reports, contracts,
    and other textual data, providing valuable insights during the audit process |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| NLP | 分析和理解文本数据；提取相关信息；进行情感分析 | 在审计过程中协助分析财务报告、合同和其他文本数据，提供有价值的见解 |'
- en: Table 4.1 - Overview of AI audit tools
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.1 - AI审计工具概述
- en: 'Let us delve deeper into the examples provided and understand their functionalities
    and applications in the auditing environment:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨所提供的示例，了解它们在审计环境中的功能和应用：
- en: '**ADA**:'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ADA**：'
- en: '**Deep data insights**: ADA tools are nothing short of being revolutionary
    when it comes to analyzing large volumes of data. They do not just skim through
    the surface; they dive deep, sifting through data layers to extract insights that
    are not only valuable but often impossible to obtain through manual processes.'
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深入数据洞察**：在分析大量数据方面，ADA工具堪称革命性的。它们不仅仅是浏览表面；它们深入挖掘，通过筛选数据层来提取不仅有价值而且通常无法通过人工过程获得的见解。'
- en: '**Efficient analysis**: Time is essential in auditing. ADA tools understand
    this well. They are designed to conduct analyses quickly and efficiently, providing
    auditors with timely insights that can inform and guide the audit process.'
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效分析**：时间是审计中的关键。ADA工具充分理解这一点。它们被设计成快速高效地进行分析，为审计人员提供及时见解，这些见解可以指导和告知审计过程。'
- en: '**Visual data representation**: Through interactive dashboards and visual data
    representation, ADA tools make data accessible and comprehensible for auditors,
    facilitating a better understanding and interpretation of data insights.'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化数据表示**：通过交互式仪表板和可视化数据表示，ADA工具使数据对审计人员易于访问和理解，从而促进对数据见解的更好理解和解释。'
- en: '**RPA**:'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RPA**：'
- en: '**Task automation**: RPA takes on the mantle of routine and repetitive tasks
    that are integral to the audit process but are time-consuming and mundane. From
    data entry to basic data analysis, RPA automates these tasks with precision, freeing
    auditors to focus on activities that require strategic thinking and analysis.'
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务自动化**：RPA承担了审计过程中不可或缺的常规和重复性任务，这些任务既耗时又枯燥。从数据录入到基本数据分析，RPA以精确的方式自动化这些任务，使审计人员能够专注于需要战略思考和分析的活动中。'
- en: '**Enhanced accuracy**: Accuracy is achieved through automation. RPA eliminates
    the risk of human error in the tasks it performs, ensuring that the data and insights
    generated are accurate and reliable.'
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高准确性**：准确性是通过自动化实现的。RPA消除了其在执行任务时可能出现的错误风险，确保生成的数据和见解是准确可靠的。'
- en: '**Streamlined workflow**: By performing routine tasks, the RPA tool streamlines
    the audit workflow, ensuring that tasks are completed in a systematic and timely
    manner, contributing to the overall efficiency and effectiveness of the audit
    process.'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化工作流程**：通过执行常规任务，RPA工具简化了审计工作流程，确保任务以系统化和及时的方式进行，从而提高了审计过程的总体效率和效果。'
- en: '**NLP**:'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言处理**：'
- en: '**Contextual understanding**: NLP tools are adept at reading and understanding
    text, but their true strength lies in their ability to grasp context. They can
    analyze textual data in financial documents and reports, communicating and understanding
    the nuances and implications of the language used.'
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境理解**：自然语言处理工具擅长阅读和理解文本，但它们的真正优势在于理解情境的能力。它们可以分析财务文件和报告中的文本数据，传达和理解所使用语言中的细微差别和含义。'
- en: '**Sentiment analysis**: Beyond understanding text, NLP can gauge the sentiment
    behind words, providing insights into the tone and mood of financial documents,
    which can be instrumental in understanding the financial health and stability
    of an organization.'
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析**：除了理解文本之外，自然语言处理还可以评估文字背后的情感，提供关于财务文件语气和情绪的见解，这对于理解组织的财务健康和稳定性可能非常有用。'
- en: '**Document summarization**: NLP tools can summarize lengthy financial documents,
    providing auditors with concise and comprehensive overviews of the content, making
    it easier for them to grasp the essence of the documents without having to sift
    through text pages.'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档摘要**：自然语言处理工具可以总结冗长的财务文件，为审计人员提供内容简洁且全面的概述，使他们能够更容易地把握文件的精髓，而无需翻阅大量文本页面。'
- en: The confluence of these AI tools creates an ecosystem in which data is not merely
    collected and analyzed; it is understood, interpreted, and utilized to inform
    and guide the auditing process. Each tool brings its unique set of capabilities
    to the table, addressing different needs and challenges within the audit environment
    and making the audit process more efficient, effective, insightful, and informed.
    The age of AI in auditing is here, and with these tools at their disposal, auditors
    are better equipped to conduct audits that are rigorous, accurate, and reflective
    of the complexities of today’s financial landscape.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这些AI工具的汇聚形成了一个生态系统，在这个生态系统中，数据不仅仅是被收集和分析；它被理解、解释，并用于指导和告知审计过程。每个工具都带来其独特的功能集，解决审计环境中的不同需求和挑战，使审计过程更加高效、有效、有洞察力和信息丰富。审计领域的AI时代已经到来，有了这些工具，审计人员能够更好地进行严谨、准确且反映当今金融领域复杂性的审计。
- en: Benefits of AI in auditing
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 审计中AI的好处
- en: 'Incorporating AI into the auditing process is not just a matter of staying
    current with technological advancements; it is also an essential strategy for
    enhancing the quality and effectiveness of audits. The implementation of AI in
    auditing brings forth a cascade of benefits that are transformative and far-reaching.
    Let’s take a closer look at these:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI融入审计过程不仅仅是跟上技术进步的步伐；它也是提高审计质量和效果的一项基本策略。在审计中实施AI带来了一系列变革性和深远的影响。让我们更深入地了解一下这些：
- en: '**Increased accuracy**:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**提高准确性**：'
- en: '**Minimized human error**: AI operates devoid of the susceptibility to fatigue
    or oversight that auditors might experience. It meticulously processes and analyzes
    data, significantly reducing the likelihood of errors that can compromise the
    integrity of audit procedures, tests, and results.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最小化人为错误**：AI在操作过程中没有审计人员可能遇到的疲劳或疏忽的倾向。它细致地处理和分析数据，显著降低了可能损害审计程序、测试和结果完整性的错误发生的可能性。'
- en: '**Precision in calculations**: AI can handle complex calculations with absolute
    precision, ensuring that financial data and insights generated during the audit
    are accurate and reliable. This level of accuracy is instrumental for making informed
    and sound financial decisions and audit assessments.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算精度**：AI可以以绝对精确的方式处理复杂的计算，确保审计过程中生成的财务数据和见解是准确和可靠的。这种精确度对于做出明智和合理的财务决策以及审计评估至关重要。'
- en: '**Efficiency**:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**效率**：'
- en: '**Swift data analysis**: The automation capabilities of AI mean that tasks,
    especially those related to data analysis and review, are completed expeditiously.
    With AI, auditors can shift through voluminous datasets in a fraction of the time
    it would take manually, significantly accelerating the audit process.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速数据分析**：人工智能的自动化能力意味着任务，尤其是那些与数据分析和相关审查相关的任务，可以迅速完成。有了人工智能，审计员可以在极短的时间内浏览大量数据集，这比手动操作要快得多，从而显著加快了审计过程。'
- en: '**Optimized workflow**: AI not only speeds up individual tasks but also contributes
    to a smoother and more streamlined workflow. It allows for seamless integration
    and coordination of various audit tasks, ensuring that the audit process flows
    efficiently from one stage to the next without delays or bottlenecks.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化工作流程**：人工智能不仅加快了单个任务，还促进了更顺畅和更高效的工作流程。它允许无缝集成和协调各种审计任务，确保审计过程从一阶段到下一阶段流畅进行，没有延误或瓶颈。'
- en: '**Enhanced** **fraud detection**:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**增强** **欺诈检测**：'
- en: '**Proactive fraud identification**: AI does not wait to stumble upon fraudulent
    activities; it actively seeks them. With its predictive analytics and pattern-recognition
    capabilities, AI can identify anomalous or suspicious transactions or trends,
    flagging them for further investigation.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动欺诈识别**：人工智能不会等待偶然发现欺诈活动；它主动寻找它们。凭借其预测分析和模式识别能力，人工智能可以识别异常或可疑的交易或趋势，并将它们标记为需要进一步调查。'
- en: '**Historical data learning**: AI learns from historical data to understand
    the typical transaction patterns and behaviors associated with a particular account
    or organization. This learning enables it to identify deviations or anomalies
    that could signify fraudulent activities and serve as an early warning system
    for auditors.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**历史数据学习**：人工智能通过学习历史数据来理解与特定账户或组织相关的典型交易模式和行为。这种学习使它能够识别出可能表明欺诈活动的偏差或异常，并为审计员提供早期预警系统。'
- en: '**Improved** **risk assessment**:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**改进** **风险评估**：'
- en: '**Dynamic risk analysis**: AI introduces a dynamic approach to risk analysis.
    It does not just look at static data; it also considers various parameters and
    their interrelations, providing a nuanced understanding of the risk landscape
    associated with an organization’s financial statements.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态风险评估**：人工智能引入了一种动态的风险分析方法。它不仅关注静态数据，还考虑各种参数及其相互关系，为与组织财务报表相关的风险景观提供细致入微的理解。'
- en: '**Targeted audit focus**: With AI’s comprehensive risk analysis, auditors can
    focus their attention and resources on high-risk areas. This targeted approach
    ensures that high-risk areas receive the scrutiny they require while resources
    are not wasted on lower-risk areas.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有针对性的审计重点**：借助人工智能的综合风险评估，审计员可以将注意力和资源集中在高风险领域。这种有针对性的方法确保高风险领域得到所需的审查，同时不会在低风险领域浪费资源。'
- en: These benefits collectively contribute to faster, more accurate, insightful,
    and analytical audits. The use of AI in auditing represents a paradigm shift where
    audits are not just about compliance and verification but also about understanding,
    analysis, and strategic financial planning and decision-making. With AI in their
    toolkit, auditors are better equipped to navigate the complexities of the financial
    landscape, providing invaluable and indispensable services in today’s fast-paced,
    dynamic business environment.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些好处共同促进了更快、更准确、更有洞察力和分析性的审计。在审计中应用人工智能代表了范式转变，其中审计不仅仅是关于合规性和验证，还涉及理解、分析和战略财务规划和决策。有了人工智能工具，审计员能够更好地应对金融环境的复杂性，在当今快节奏、动态的商业环境中提供无价和不可或缺的服务。
- en: Diving deeper into AI audit tools
  id: totrans-78
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深入了解人工智能审计工具
- en: In the constantly evolving auditing landscape, AI tools are invaluable assets
    for auditors worldwide. These tools are designed to streamline, automate, and
    enhance the traditional auditing process, thereby allowing for increased audit
    accuracy and efficiency. Let’s dive deeper into these.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在不断演变的审计领域中，人工智能工具是全球审计员的无价资产。这些工具旨在简化、自动化和增强传统的审计过程，从而提高审计的准确性和效率。让我们更深入地探讨这些内容。
- en: Overview of AI audit tools
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能审计工具概述
- en: The advent of AI in the auditing domain marks a significant shift from conventional
    methods, offering advanced capabilities that auditors can leverage to efficiently
    navigate through the intricacies of financial data.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在审计领域的出现标志着从传统方法向一个重大转变，为审计员提供了可以利用的先进能力，以有效地穿越金融数据的复杂性。
- en: The introduction of AI audit tools has revolutionized how auditors approach
    their tasks, addressing the perennial challenges of time constraints, data volume,
    and complexity, which often impede the auditing process. With AI’s computational
    power, auditors can now shift through colossal datasets in a fraction of the time
    it would take to accomplish manually, targeting anomalies and discrepancies with
    pinpoint accuracy.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: AI审计工具的引入彻底改变了审计员处理任务的方式，解决了时间限制、数据量和复杂性等长期挑战，这些挑战往往阻碍了审计过程。借助AI的计算能力，审计员现在可以在极短的时间内浏览庞大的数据集，以精确的准确性定位异常和差异。
- en: AI audit tools embody diverse technologies, each contributing uniquely to the
    audit process. These tools bring automation to the forefront, thus minimizing
    the need for manual intervention in data analysis and validation. Automation accelerates
    the audit life cycle and introduces a level of precision that is unseen in manual
    methodologies. The elimination of human error, a significant factor in data misinterpretation,
    ensures that audit findings are reliable and reflective of the financial landscape.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: AI审计工具体现了多种技术，每种技术都独特地贡献于审计过程。这些工具将自动化置于首位，从而最大限度地减少了在数据分析验证中手动干预的需求。自动化加速了审计生命周期，并引入了一种在手动方法中未见过的精确度。消除人为错误，这是数据误解释的一个重要因素，确保审计发现是可靠的，并反映了财务状况。
- en: AI audit tools provide auditors with insightful analytics derived from **deep
    learning** (**DL**) capabilities embedded within the technology. These analytics
    delve beneath the surface of financial transactions, uncovering patterns and trends
    that may escape the human eye. The insights gained through AI analytics are instrumental
    in forming audit strategies that are both proactive and informed, enabling auditors
    to anticipate and respond to financial risks through agility and foresight.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: AI审计工具为审计员提供了由技术中嵌入的**深度学习**（**DL**）能力得出的有洞察力的分析。这些分析深入到财务交易的表面之下，揭示可能逃过人类眼睛的模式和趋势。通过AI分析获得的见解对于形成既积极主动又信息丰富的审计策略至关重要，使审计员能够通过敏捷性和远见来预见和应对财务风险。
- en: In a realm where financial transparency and accountability are paramount, AI
    audit tools are indispensable alliances for auditors. They facilitate a more robust
    and insightful audit process, empowering auditors with technology to conduct their
    duties with unprecedented efficiency and accuracy. Through the seamless integration
    of AI tools, auditors can confidently navigate the dynamic audit environment and
    ensure that they have the support of cutting-edge technology to guide them through
    the complex labyrinth of financial auditing.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个财务透明度和问责制至关重要的领域，AI审计工具是审计员不可或缺的联盟。它们促进了更加稳健和有洞察力的审计过程，使审计员能够利用技术以前所未有的效率和准确性履行职责。通过AI工具的无缝集成，审计员可以自信地穿梭于动态的审计环境，并确保他们拥有尖端技术的支持，以引导他们穿越复杂的财务审计迷宫。
- en: ADA
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ADA
- en: ADA refers to technology that enables auditors to analyze large datasets quickly
    and efficiently. With ADA, auditors can review vast amounts of financial transactions
    and accounts, providing them with deeper insights and a better understanding of
    the financial data they are analyzing. ADA tools utilize various analytical procedures,
    including regression analysis, clustering, and classification, to identify anomalies
    and patterns in data. In doing so, they facilitate risk assessment and help auditors
    focus their efforts on areas of higher risk.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: ADA指的是一种技术，它使审计员能够快速有效地分析大量数据集。有了ADA，审计员可以审查大量的财务交易和账户，为他们提供更深入的见解和对他们正在分析财务数据的更好理解。ADA工具利用各种分析程序，包括回归分析、聚类和分类，以识别数据中的异常和模式。通过这样做，它们促进了风险评估，并帮助审计员将精力集中在风险较高的领域。
- en: In the intricate sphere of auditing, the ability to analyze data swiftly and
    accurately is imperative. These ADA tools are specifically designed to address
    this necessity. They are not only adept at handling data of significant volume
    but also proficient in dissecting the data’s complexity, offering auditors a clear
    lens through which they can examine and interpret the financial narrative unfolding
    within the data.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计的复杂领域，快速准确地分析数据的能力至关重要。这些ADA工具专门设计来满足这一需求。它们不仅擅长处理大量数据，而且精通剖析数据的复杂性，为审计员提供了一个清晰的视角，通过这个视角他们可以检查和解释数据中展开的财务叙事。
- en: One of the standout features of ADA tools is their capacity for predictive analytics.
    By employing sophisticated algorithms, these tools can forecast future trends
    and potential risks using historical data. This predictive capability is crucial
    for auditors as it allows them to anticipate and prepare for future financial
    scenarios while evaluating the potential need for additional testing procedures,
    thereby enabling proactive audit planning and risk-mitigation strategies.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: ADA工具的一个显著特点是它们在预测分析方面的能力。通过采用复杂的算法，这些工具可以利用历史数据预测未来的趋势和潜在风险。这种预测能力对于审计师至关重要，因为它使他们能够预测并准备未来的财务情景，同时评估是否需要额外的测试程序，从而实现主动的审计规划和风险缓解策略。
- en: ADA tools also embody versatility as they are compatible with various data formats
    and sources. This compatibility ensures that auditors have the flexibility to
    seamlessly integrate data from disparate systems, thereby creating a more cohesive
    and comprehensive data-analysis framework. Whether dealing with structured data
    from databases or unstructured data from documents and emails, ADA tools can process
    and analyze this information efficiently.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: ADA工具也体现了多功能性，因为它们与各种数据格式和来源兼容。这种兼容性确保了审计师能够无缝集成来自不同系统的数据，从而创建一个更统一和全面的数据分析框架。无论是处理来自数据库的结构化数据还是来自文档和电子邮件的非结构化数据，ADA工具都可以高效地处理和分析这些信息。
- en: The visual representation of data is another significant advantage of ADA tools.
    Through intuitive dashboards and graphic displays, auditors can visualize data
    trends and patterns, facilitating data interpretation and analysis. These visual
    elements are not only instrumental for auditors but are also valuable when communicating
    audit findings to stakeholders, as they provide a more accessible and understandable
    view of the data.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的可视化表示是ADA工具的另一个重要优势。通过直观的仪表板和图形显示，审计师可以可视化数据趋势和模式，促进数据解释和分析。这些视觉元素不仅对审计师至关重要，而且在向利益相关者传达审计发现时也非常有价值，因为它们提供了更易于理解和可访问的数据视图。
- en: ADA tools are designed with user-friendly interfaces that do not require advanced
    technical expertise for navigation. Auditors can leverage these tools with minimal
    training, which makes ADA a practical solution for audit firms of all sizes, including
    those with limited resources.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ADA工具设计有用户友好的界面，无需高级技术专业知识即可导航。审计师可以通过最少量的培训来利用这些工具，这使得ADA成为各种规模审计公司的实用解决方案，包括那些资源有限的审计公司。
- en: Ultimately, ADA tools are indispensable assets in modern auditor toolkits. They
    amalgamate speed, accuracy, and depth in data analysis, providing auditors with
    a robust platform through which they can conduct thorough and insightful audits.
    Through the power of the ADA, auditors are better equipped to navigate the complex
    financial terrain, delivering audit results that are not only timely but also
    more reflective of the true financial picture of the entities they audit.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，ADA工具是现代审计师工具箱中不可或缺的资产。它们将数据分析的速度、准确性和深度结合起来，为审计师提供了一个强大的平台，通过这个平台，他们可以进行彻底和有洞察力的审计。借助ADA的力量，审计师能够更好地应对复杂的财务领域，提供不仅及时而且更能反映被审计实体真实财务状况的审计结果。
- en: RPA
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RPA
- en: RPA is a technology that automates rule-based repetitive tasks within an audit
    process. RPA tools are designed to mimic an auditor’s actions in gathering, processing,
    and analyzing data. These tools significantly reduce auditors’ time on mundane
    and time-consuming tasks, allowing them to focus on more analytical and judgmental
    aspects of an audit. With RPA, auditors can increase their productivity and efficiency,
    leading to timely and cost-effective audits.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: RPA是一种在审计过程中自动化基于规则重复性任务的技术。RPA工具旨在模仿审计师在收集、处理和分析数据时的行为。这些工具显著减少了审计师在繁琐且耗时任务上的时间，使他们能够专注于审计的更多分析和判断方面。通过RPA，审计师可以提高他们的生产力和效率，从而实现及时且成本效益高的审计。
- en: Within the broader framework of audit automation, RPA is a pivotal element that
    acts as a catalyst for enhanced operational efficiency. The power of RPA lies
    in its ability to execute predefined tasks without human intervention. It can
    shift through extensive datasets, perform calculations, generate reports, and
    even flag inconsistencies or anomalies in the data, all at speeds that are unattainable
    by a human auditor.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计自动化的更广泛框架内，RPA（机器人流程自动化）是一个关键元素，它作为催化剂，促进了运营效率的提升。RPA的力量在于其无需人工干预即可执行预定义任务的能力。它能够快速穿梭于大量数据集中，进行计算，生成报告，甚至可以标记数据中的不一致性或异常，这些速度是人工审计员无法达到的。
- en: One of the primary advantages of RPA is its accuracy. Because it is immune to
    the fatigue and distraction that human auditors might experience, it performs
    its tasks with meticulous precision, minimizing the risk of errors. This level
    of accuracy is particularly crucial when dealing with financial data, in which
    even minor mistakes can have significant repercussions.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: RPA的一个主要优势是其准确性。由于它不受人工审计员可能经历的疲劳和分心的干扰，它以细致入微的精确度执行任务，最大限度地减少了错误的风险。这种准确度在处理财务数据时尤为重要，因为即使是微小的错误也可能产生重大影响。
- en: Furthermore, RPA is flexible and scalable. It can be easily configured to perform
    different tasks and scaled up or down based on the volume of data and the complexity
    of the audit. This scalability ensures that audit firms of varying sizes and capacities
    can leverage RPA to effectively streamline their audit processes.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，RPA具有灵活性和可扩展性。它可以轻松配置以执行不同的任务，并根据数据量和审计的复杂性进行上下调整。这种可扩展性确保了不同规模和能力的审计公司可以利用RPA有效地简化其审计流程。
- en: RPA also plays a significant role in enhancing audit quality. By taking over
    routine and mechanical aspects of data gathering and processing, human auditors
    can delve deeper into the analysis and interpretation of data. This collaborative
    synergy between human auditors and RPA allows for a more insightful and thorough
    audit, contributing to the reliability and credibility of audit findings.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: RPA在提高审计质量方面也发挥着重要作用。通过接管数据收集和处理的常规和机械方面，人工审计员可以更深入地分析数据。这种人工审计员与RPA之间的协同作用使得审计更加深入和全面，有助于提高审计发现的可信度和可靠性。
- en: The implementation of RPA translates into cost savings for audit firms and their
    clients. With automated processes handling the heavy lifting of data, firms can
    allocate their human resources more strategically, focusing on areas that require
    critical thinking and expert judgment. This efficient allocation of resources
    not only reduces operational costs but also shortens the audit cycle and delivers
    timely results to clients.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: RPA的实施为审计公司和他们的客户带来了成本节约。随着自动化流程处理数据的繁重工作，公司可以更战略性地分配人力资源，专注于需要批判性思维和专家判断的领域。这种资源的有效分配不仅降低了运营成本，还缩短了审计周期，并及时向客户交付结果。
- en: RPA is a transformative technology in the realm of auditing. Its contributions
    to efficiency, accuracy, and quality are invaluable, making it an essential tool
    for auditors committed to delivering excellence in their engagements. Whether
    for a small-scale audit or a large-scale examination of multinational corporations,
    RPA is a reliable ally, facilitating a smooth and efficient audit process from
    start to finish.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: RPA是审计领域的一项变革性技术。它对效率、准确性和质量的贡献是无价的，使其成为致力于在业务中提供卓越表现的审计员不可或缺的工具。无论是小规模的审计还是对跨国公司的大规模审查，RPA都是一个可靠的盟友，从开始到结束都促进了审计过程的顺畅和高效。
- en: NLP
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NLP
- en: NLP is a subset of AI that enables computers to understand, interpret, and generate
    communications in human language. In auditing, NLP tools can analyze textual data
    such as financial reports and contracts and extract relevant information for auditors.
    NLP can also help with sentiment analysis, which can be crucial in understanding
    the tone and content of financial disclosures, providing additional insights to
    auditors during their analysis.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: NLP（自然语言处理）是人工智能的一个子集，它使计算机能够理解、解释和生成人类语言。在审计中，NLP工具可以分析如财务报告和合同等文本数据，并为审计员提取相关信息。NLP还可以帮助进行情感分析，这在理解财务披露的语气和内容时可能至关重要，为审计员的分析提供额外的见解。
- en: NLP’s capabilities extend beyond mere text extraction to include the comprehension
    and analysis of nuances in the language used in financial documents, board meetings,
    and analyst/earnings calls. This technology is adept at identifying subtle cues
    in language that might indicate potential risks or areas of concern, such as uncertainty
    or lack of clarity in financial disclosures. Such insights are invaluable to auditors
    as they can pinpoint areas that require closer scrutiny and review.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: NLP的能力不仅限于文本提取，还包括对财务文件、董事会会议和分析师/收益电话中使用的语言的细微差别进行理解和分析。这项技术擅长识别语言中的微妙线索，这些线索可能表明潜在的风险或关注领域，例如财务披露中的不确定性或缺乏清晰度。这些洞察对审计人员来说非常有价值，因为他们可以确定需要更仔细审查和审查的领域。
- en: Auditors often encounter voluminous and dense documents such as regulatory filings,
    shareholder reports, or transaction records. Manually sifting through these pages
    to extract pertinent information is not only time-consuming but also prone to
    oversight and error. However, with NLP, auditors can swiftly and accurately navigate
    through these texts, isolating and extracting data crucial for their audit analysis.
    This accelerates the auditing process and enhances its precision and reliability.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 审计人员经常遇到大量且内容密集的文档，如监管文件、股东报告或交易记录。手动筛选这些页面以提取相关信息不仅耗时，而且容易出错。然而，借助NLP，审计人员可以迅速且准确地浏览这些文本，隔离和提取对他们的审计分析至关重要的数据。这加速了审计过程，并提高了其精确性和可靠性。
- en: In addition, NLP supports auditors in dealing with diverse formats and sources
    of textual data. Financial data is often dispersed across different documents
    and systems, and sometimes in unstructured forms. NLP tools are designed to handle
    this diversity efficiently, assimilating data from various sources into a coherent
    and accessible format for auditors. This capability is particularly beneficial
    for auditing firms with complex operations and multiple reporting structures.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，自然语言处理（NLP）支持审计人员在处理各种格式和来源的文本数据方面。财务数据通常分散在不同的文档和系统中，有时以非结构化形式存在。NLP工具旨在高效地处理这种多样性，将来自不同来源的数据整合成一个连贯且易于审计人员访问的格式。这种能力对于运营复杂且具有多个报告结构的审计公司尤其有益。
- en: Sentiment analysis, a distinctive feature of NLP, offers auditors a unique perspective.
    By analyzing the sentiment conveyed in financial communications and disclosures,
    auditors gain insights into a company’s confidence level, outlook, and possibly
    even undisclosed challenges or issues. This analysis provides an additional layer
    of understanding, supplementing quantitative data with qualitative insights that
    contribute to a more holistic audit assessment.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析是NLP的一个独特功能，为审计人员提供了一个独特的视角。通过分析财务沟通和披露中传达的情感，审计人员可以深入了解公司的信心水平、展望，甚至可能是不公开的挑战或问题。这种分析提供了额外的理解层次，通过定性的洞察力补充了定量数据，有助于更全面的审计评估。
- en: Furthermore, the integration of NLP into audit processes promotes a more proactive
    auditing approach. Instead of reacting to issues identified through traditional
    audit methods, auditors equipped with NLP tools can preemptively identify potential
    areas of risk or concern through their analysis of language and sentiment in financial
    disclosures. This proactive stance enables auditors to address and mitigate risks
    before they escalate to significant problems.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，将NLP集成到审计过程中促进了更主动的审计方法。审计人员不再只是对通过传统审计方法确定的问题做出反应，而是可以通过分析财务披露中的语言和情感来预先识别潜在的风险或关注领域。这种主动立场使审计人员能够在问题升级为重大问题之前解决和减轻风险。
- en: In a continuously advancing audit environment, NLP is a powerful and indispensable
    tool for modern auditors. NLP enhances the scope, accuracy, and efficiency of
    audit processes through its ability to understand, interpret, and analyze human
    language in financial documents, leading to more insightful and reliable outcomes.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在不断发展的审计环境中，NLP是现代审计人员的一个强大且不可或缺的工具。NLP通过其理解、解释和分析财务文件中的人类语言的能力，增强了审计过程的范围、准确性和效率，从而产生更深入和可靠的成果。
- en: Selecting the right AI audit tool
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择合适的AI审计工具
- en: Choosing an appropriate AI audit tool is paramount to the success of the audit
    process. Firms should consider the specific needs and objectives of their audits,
    the volume and type of data to be analyzed, and the desired outcomes of the audit.
    It is also essential to consider the tool’s ease of use, integration capabilities
    with existing systems, and level of support and training provided by the vendor
    of the tool. Conducting a thorough assessment and comparing the different tools
    available in the market, considering their features and limitations and level
    of AI integration, will guide firms in selecting the AI audit tool that best suits
    their needs.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的AI审计工具对于审计过程的成功至关重要。公司应考虑其审计的具体需求和目标、要分析的数据量类型以及审计的预期结果。同时，还应考虑工具的易用性、与现有系统的集成能力以及工具供应商提供的技术支持和培训水平。对市场上的不同工具进行全面评估，考虑其功能和限制以及AI集成水平，将有助于公司选择最适合其需求的AI审计工具。
- en: In the selection process, understanding the distinct challenges and requirements
    of the audit engagement is fundamental. Different audit engagements may demand
    various functionalities and capabilities from AI audit tools. For instance, an
    audit that focuses primarily on detecting fraud might require a tool with robust
    anomaly detection and predictive analytics features. Audits dealing with voluminous
    transaction data might require tools with powerful data analytics and processing
    capacities.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择过程中，理解审计任务独特的挑战和要求是基本的。不同的审计任务可能需要AI审计工具具有不同的功能和能力。例如，主要关注欺诈检测的审计可能需要一个具有强大异常检测和预测分析功能的工具。处理大量交易数据的审计可能需要具有强大数据分析和处理能力的工具。
- en: Compatibility with the existing technological infrastructure of an audit firm
    is another critical factor. The selected AI tool should seamlessly integrate with
    the current systems and software that the firm utilizes, minimizing disruption
    and facilitating a smooth transition. Integration ensures that the tool can efficiently
    exchange and process data with other applications, thereby enhancing the functionality
    of the tool and the audit team’s productivity.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 与审计公司现有技术基础设施的兼容性是另一个关键因素。所选的AI工具应能够无缝集成到公司当前使用的系统和软件中，最小化干扰并促进平稳过渡。集成确保工具能够与其他应用程序高效地交换和处理数据，从而增强工具的功能和审计团队的效率。
- en: The user-friendliness of an AI audit tool also plays a crucial role in its successful
    implementation and use. Tools that offer intuitive interfaces and user experiences
    reduce the learning curve for auditors, promoting quicker adoption and more effective
    utilization. A tool that is difficult to navigate or understand can impede the
    audit process rather than facilitate it, leading to inefficiencies and frustrations
    among the audit team.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能审计工具的用户友好性在其成功实施和使用中也起着至关重要的作用。提供直观界面和用户体验的工具可以降低审计人员的学习曲线，促进更快地采用和更有效的利用。一个难以导航或理解的工具可能会阻碍审计过程，而不是促进它，导致审计团队效率低下和感到沮丧。
- en: Support and training are indispensable aspects that should be considered. Vendors
    should provide adequate training resources and support to assist auditors in mastering
    the tool. Comprehensive training ensures that auditors can leverage the tool’s
    full suite of features and capabilities, thus maximizing the value derived from
    its use. Continuous support from the vendor is also vital as it guarantees prompt
    assistance and resolution of any issues or challenges encountered while using
    the tool.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 支持和培训是不可缺少的方面，应予以考虑。供应商应提供足够的培训资源和支持，以帮助审计人员掌握工具。全面的培训确保审计人员能够充分利用工具的全部功能和能力，从而最大化其使用价值。供应商的持续支持也至关重要，因为它保证了在使用工具时遇到任何问题或挑战能够得到及时的协助和解决。
- en: Furthermore, firms should weigh the cost implications of acquiring and implementing
    AI audit tools. While AI tools bring invaluable benefits to the audit process,
    they also entail investments. Firms should conduct a **cost-benefit analysis**
    (**CBA**) to ascertain how a tool’s value proposition aligns with budgetary constraints
    and financial expectations.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，公司还应权衡获取和实施AI审计工具的成本影响。虽然AI工具为审计过程带来了无价的益处，但也涉及投资。公司应进行**成本效益分析**（CBA），以确定工具的价值主张如何与预算限制和财务预期相匹配。
- en: Finally, considering the dynamic and rapidly evolving nature of technology,
    it is wise to select a scalable and adaptable tool allowing for future changes
    and advancements. The tool should evolve with the changing landscape of auditing
    and technology, accommodating new features and updates that respond to emerging
    audit challenges and needs.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，考虑到技术的动态和快速发展的特性，选择一个可扩展和适应性强的工具，以适应未来的变化和进步是明智的。该工具应随着审计和技术领域的不断变化而发展，适应新的功能和更新，以应对新兴的审计挑战和需求。
- en: By meticulously evaluating these factors, audit firms can ensure that they select
    an AI audit tool that not only meets their immediate needs but also serves as
    a long-term asset that contributes significantly to the efficiency, accuracy,
    and success of their audit engagements.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细评估这些因素，审计公司可以确保他们选择的AI审计工具不仅满足他们的当前需求，而且作为一项长期资产，对他们的审计工作的高效性、准确性和成功做出重大贡献。
- en: Best practices for implementing AI audit tools
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施AI审计工具的最佳实践
- en: 'Let us look at some best practices for implementing AI tools:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看实施AI工具的一些最佳实践：
- en: '**Understanding the tool**: Before implementation, auditors should have a comprehensive
    understanding of how the AI audit tool functions, its capabilities, and its limitations.
    This in-depth knowledge is fundamental as it allows auditors to leverage the tool’s
    features fully and efficiently, thereby enhancing the audit process. Furthermore,
    understanding the limitations of the tool is essential as it helps set realistic
    expectations and prepares the audit team for potential challenges they may encounter
    during the audit process.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解工具**: 在实施之前，审计员应全面了解AI审计工具的功能、其能力和局限性。这种深入的知识是基础性的，因为它允许审计员充分利用和高效地利用工具的功能，从而增强审计过程。此外，了解工具的局限性是至关重要的，因为它有助于设定现实的期望，并为审计团队在审计过程中可能遇到的潜在挑战做好准备。'
- en: '**Training and support**: Continuous training and support are crucial for auditors
    to effectively use AI audit tools. Firms should invest in training programs and
    provide adequate support to auditors during their implementation. This support
    system should not only be limited to the initial stages of implementation but
    should also be ongoing. Continuous training programs should be developed and offered
    to keep auditors updated on the tool’s newest features and best practices, fostering
    an environment of continuous learning and improvement.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和支援**: 持续的培训和支援对于审计员有效使用AI审计工具至关重要。公司应投资于培训计划，并在实施过程中为审计员提供充足的支持。这一支持系统不仅应限于实施初期，而应持续进行。应开发和提供持续的培训计划，以使审计员了解工具的最新功能和最佳实践，从而营造一个持续学习和改进的环境。'
- en: '**Data quality**: The effectiveness of AI audit tools is highly dependent on
    the quality of the data analyzed. Ensuring that this data is accurate, complete,
    and reliable is fundamental for the success of AI in auditing. Auditors should
    work closely with their clients to establish data quality protocols and standards,
    ensuring that the data fed into AI audit tools is of high quality. Appropriate
    data governance practices, including data validation, cleansing, and enrichment,
    should be implemented to maintain data integrity and reliability over time.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量**: AI审计工具的有效性高度依赖于分析数据的质量。确保这些数据准确、完整和可靠对于AI在审计中的成功至关重要。审计员应与客户紧密合作，建立数据质量协议和标准，确保输入AI审计工具的数据质量高。应实施适当的数据治理实践，包括数据验证、清洗和丰富，以维护数据完整性和可靠性。'
- en: '**Ethical considerations**: Auditors should be aware of ethical considerations
    related to the use of AI, including issues related to bias, transparency, and
    accountability. When implementing AI audit tools, firms should establish a code
    of ethics and guidelines to address these concerns. Ethical considerations should
    guide the use of AI in auditing to ensure that the audit process is fair, unbiased,
    and transparent, thereby building trust among clients and stakeholders.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**伦理考量**: 审计员应意识到与AI使用相关的伦理考量，包括与偏见、透明度和问责制相关的问题。在实施AI审计工具时，公司应建立道德规范和指南来解决这些关注。伦理考量应指导审计中AI的使用，以确保审计过程公平、无偏见且透明，从而在客户和利益相关者之间建立信任。'
- en: '**Continuous improvement**: Similar to AI technology, the audit profession
    is continuously evolving. Firms should regularly update and improve their AI audit
    tools to adapt to changes in the auditing landscape and technological advancement.
    Adopting a culture of continuous improvement and innovation is essential. Audit
    firms should actively seek feedback from their auditors and clients on the tool’s
    performance and usability using this valuable input to make iterative improvements
    and enhancements. Engaging with AI audit tool vendors for regular updates and
    staying informed about the latest technological trends and innovations in AI and
    auditing are also advisable.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进**：与AI技术一样，审计职业也在不断演变。公司应定期更新和改进其AI审计工具，以适应审计领域的变化和技术进步。培养持续改进和创新的文化是至关重要的。审计公司应积极征求审计师和客户对工具性能和可用性的反馈，利用这些宝贵的输入进行迭代改进和增强。与AI审计工具供应商保持联系，定期更新，并了解AI和审计领域的最新技术趋势和创新也是可取的。'
- en: By following these best practices, audit firms can ensure smooth and effective
    implementation of AI audit tools, unlocking their potential to revolutionize the
    audit process, drive efficiency, enhance accuracy, and deliver value to clients
    and stakeholders alike.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些最佳实践，审计公司可以确保AI审计工具的顺利和有效实施，释放其革命审计过程、提高效率、增强准确性和为客户和利益相关者创造价值的潜力。
- en: Ethical considerations in AI auditing
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI审计中的伦理考量
- en: 'Let’s navigate through the landscape of ethical considerations shaping the
    integrity and trustworthiness of audit processes driven by AI:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索塑造由AI驱动的审计过程完整性和可信度的伦理考量领域：
- en: '| **Ethical Consideration** | **Description** | **Importance** **in Auditing**
    |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| **伦理考量** | **描述** | **在审计中的重要性** |'
- en: '| Understanding and mitigating AI bias | AI tools might perpetuate or exacerbate
    biases present in the training data, affecting the impartiality of audit processes
    and outcomes | Critical for ensuring fairness and impartiality in AI-driven audit
    processes |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| 理解和缓解AI偏见 | AI工具可能会使训练数据中存在的偏见持续或加剧，影响审计过程的公正性和结果 | 对于确保AI驱动审计过程的公平性和公正性至关重要
    |'
- en: '| Ensuring data privacy and security | With AI tools processing large volumes
    of sensitive data, there are heightened concerns about data security and confidentiality
    | Paramount for complying with data protection laws and safeguarding client data
    |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| 确保数据隐私和安全 | 随着AI工具处理大量敏感数据，对数据安全和保密的关注加剧 | 遵守数据保护法律和保障客户数据至关重要 |'
- en: '| Adhering to ethical guidelines | Developing and following ethical guidelines
    is crucial for maintaining the integrity and public trust in the audit profession
    | Necessary for navigating ethical dilemmas and challenges presented by AI in
    auditing |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| 遵守伦理准则 | 制定和遵循伦理准则对于维护审计职业的完整性和公众信任至关重要 | 对于应对AI在审计中提出的伦理困境和挑战是必要的 |'
- en: Table 4.2 – Ethical considerations in AI auditing
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.2 – AI审计中的伦理考量
- en: By dissecting these ethical considerations and understanding their pivotal role
    in the auditing domain, we illuminate the path to fostering ethical AI practices
    that uphold the core tenets of accountability, transparency, and ethical integrity
    in audit processes within accounting information systems.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析这些伦理考量并理解它们在审计领域的关键作用，我们揭示了培养符合会计信息系统内审计过程责任、透明度和道德诚信核心原则的伦理AI实践的途径。
- en: Understanding bias in AI
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解AI偏见
- en: Bias in AI systems, including those used in auditing, can significantly impact
    the fairness and impartiality of audit processes and outcomes. AI bias occurs
    when AI tools make assumptions based on the data on which they are trained. If
    the training data contains biases, the AI system is likely to perpetuate or exacerbate
    these biases. Additionally, the methodology and practices of the developer creating
    the AI may also impose inherent biases.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计中使用的AI系统，包括AI审计系统，可能会对审计过程的公平性和公正性产生重大影响。AI偏见发生在AI工具基于其训练数据做出假设时。如果训练数据包含偏见，AI系统很可能会持续或加剧这些偏见。此外，创建AI的开发者的方法和实践也可能带来固有的偏见。
- en: In the auditing sector, bias can manifest in various intricate ways, subtly
    influencing the AI’s decision-making process. For example, an AI system might
    prioritize or neglect certain transactions or accounts based on biased criteria,
    such as the size of the company, industry type, or geographical location, which
    are inadvertently introduced during the training phase. This skewed focus can
    result in unfair or inaccurate audit outcomes, potentially harming certain businesses
    while favoring others.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计领域，偏差可能以各种复杂的方式表现出来，微妙地影响AI的决策过程。例如，AI系统可能会根据有偏见的标准（如公司规模、行业类型或地理位置）优先考虑或忽视某些交易或账户，这些标准可能在训练阶段无意中引入。这种偏斜的关注可能导致不公平或不准确的审计结果，可能损害某些企业而有利于其他企业。
- en: Given the serious implications of bias, it is imperative for auditors and accounting
    firms to be vigilant and proactive in identifying, mitigating, and preventing
    bias in AI systems used for auditing. This proactive approach requires a multifaceted
    strategy.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到偏差的严重后果，审计员和会计师事务所必须对识别、减轻和预防用于审计的AI系统中的偏差保持警惕并采取主动措施。这种主动方法需要多方面的策略。
- en: First, careful selection and preparation of training data are vital. Using diverse
    and representative datasets helps to minimize the risk of embedding bias into
    the AI system. Auditors should scrutinize the data for any signs of bias or imbalance
    to ensure a fair representation of various business types, sizes, and sectors.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，仔细选择和准备训练数据至关重要。使用多样化和具有代表性的数据集有助于最大限度地减少将嵌入偏差引入AI系统的风险。审计员应仔细审查数据，以发现任何偏差或不平衡的迹象，以确保各种商业类型、规模和行业的公平代表。
- en: Furthermore, continuous testing and validation of AI outputs against known benchmarks
    and real-world scenarios are crucial. This ongoing process helps in the early
    identification of bias, allowing for timely adjustments and recalibrations of
    the AI system to correct skewed decision-making patterns.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，持续测试和验证AI输出与已知基准和现实世界场景的匹配度至关重要。这一持续过程有助于及早发现偏差，从而允许及时调整和重新校准AI系统，以纠正偏斜的决策模式。
- en: Transparency is another cornerstone of combating AI bias in auditing. Auditors
    and firms must openly communicate with stakeholders, clients, and regulatory bodies
    about the AI tools they use, explicitly outlining their potential biases and limitations.
    Clear documentation of the AI system’s decision-making process, criteria, and
    data sources can foster better understanding and trust among stakeholders.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度是应对审计中AI偏差的另一个基石。审计员和公司必须与利益相关者、客户和监管机构公开沟通，明确说明他们使用的AI工具的潜在偏差和局限性。对AI系统决策过程、标准和数据来源的明确记录可以促进利益相关者之间的更好理解和信任。
- en: Fostering an organizational culture that is aware of and sensitive to issues
    related to AI bias is essential. Training programs and awareness campaigns can
    equip auditors with the knowledge and skills necessary to effectively navigate
    challenges posed by AI bias.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 培养一种对AI偏差问题有意识和敏感的组织文化至关重要。培训计划和意识宣传活动可以为审计员提供有效应对AI偏差带来的挑战所需的知识和技能。
- en: In the dynamic field of auditing, where the accuracy and fairness of financial
    assessment are paramount, addressing AI bias is not just a technical requirement
    but also a fundamental ethical obligation. By taking deliberate steps to understand,
    mitigate, and prevent bias, auditors and accounting firms can harness the full
    potential of AI in auditing, thereby ensuring that it serves as an instrument
    of fair and impartial financial scrutiny.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计这个动态领域，财务评估的准确性和公平性至关重要，解决AI偏差不仅是一个技术要求，也是一个基本的道德义务。通过采取有意识的步骤来理解、减轻和预防偏差，审计员和会计师事务所可以充分发挥AI在审计中的潜力，从而确保它作为公平和公正的财务审查工具。
- en: Ensuring data privacy and security
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确保数据隐私和安全
- en: Data privacy and security are paramount in the digital information age, especially
    in auditing, where sensitive financial data is handled. AI tools process large
    volumes of data, raising concerns regarding the security and confidentiality of
    information. Auditors and firms must adhere to strict data protection laws and
    industry standards in order to safeguard client data. This involves implementing
    robust security protocols, including data encryption, access control, and secure
    data storage and transmission methods. Furthermore, the use of AI should comply
    with privacy regulations, and clients should be informed about the extent and
    manner of AI’s involvement in handling and analyzing their data.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字信息时代，数据隐私和安全至关重要，尤其是在审计领域，涉及敏感财务数据。AI工具处理大量数据，引发了关于信息安全和保密性的担忧。审计人员和公司必须遵守严格的数据保护法律和行业标准，以保护客户数据。这包括实施强大的安全协议，包括数据加密、访问控制和安全的数据存储和传输方法。此外，AI的使用应遵守隐私法规，并且客户应被告知AI在处理和分析其数据中的参与程度和方式。
- en: In auditing, where confidential financial records and sensitive company information
    are routinely processed, the importance of data privacy and security cannot be
    overstated. The integration of AI tools into auditing practices introduces additional
    layers of complexity to the challenging task of securing and protecting data.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在审计领域，由于需要常规处理机密财务记录和敏感公司信息，数据隐私和安全的重要性不容忽视。将AI工具整合到审计实践中为保护数据这一具有挑战性的任务增添了额外的复杂性层。
- en: AI audit tools often require access to comprehensive datasets to function optimally,
    aggregating data from various sources, including confidential client information,
    transaction histories, and financial statements. The wide-reaching access and
    processing capabilities of AI tools necessitate stringent security measures to
    prevent unauthorized access, data breaches, and other security incidents that
    could compromise client data.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: AI审计工具通常需要访问综合数据集以最佳运行，从包括机密客户信息、交易历史和财务报表在内的各种来源聚合数据。AI工具广泛的数据访问和处理能力需要严格的措施来防止未经授权的访问、数据泄露和其他可能损害客户数据的安全事件。
- en: First, firms must be aware of and compliant with all relevant data protection
    legislation and regulations in their jurisdiction, such as the **General Data
    Protection Regulation** (**GDPR**) in Europe or the **California Consumer Privacy
    Act** (**CCPA**) in the US. These regulations impose strict requirements on the
    collection, processing, storage, and transmission of personal data, with severe
    penalties for non-compliance.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，公司必须了解并遵守其司法管辖区所有相关的数据保护立法和法规，例如欧洲的**通用数据保护条例**（**GDPR**）或美国的**加州消费者隐私法案**（**CCPA**）。这些法规对个人数据的收集、处理、存储和传输施加了严格的要求，对不遵守规定的处罚严重。
- en: In addition to compliance, firms should adopt best practices in data security.
    Employing advanced encryption techniques is crucial for protecting data, both
    in transit and at rest. **Secure Sockets Layer** (**SSL**) encryption for data
    in transit and the **Advanced Encryption Standard** (**AES**) for data at rest
    are industry-standard practices that provide robust protection against unauthorized
    access.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 除了合规性之外，公司还应采用数据安全方面的最佳实践。采用高级加密技术对于保护数据至关重要，无论是在传输中还是在静止状态下。数据传输的**安全套接字层**（**SSL**）加密和数据静止的**高级加密标准**（**AES**）是行业标准做法，提供了强大的保护，以防止未经授权的访问。
- en: Access control is another vital component of a secure AI auditing environment.
    Implementing a **role-based access control** (**RBAC**) system ensures that only
    authorized individuals have access to specific data and system functionalities.
    This approach minimizes the risk of internal data breaches and unauthorized access.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 访问控制是安全AI审计环境中的另一个关键组成部分。实施基于角色的访问控制（**RBAC**）系统确保只有授权人员才能访问特定的数据和系统功能。这种方法最小化了内部数据泄露和未经授权访问的风险。
- en: Secure data storage solutions, including the use of secure cloud services or
    on-premise servers with adequate security protocols, are essential. Firms should
    carefully evaluate their data storage options, considering factors such as the
    sensitivity of the data, regulatory requirements, and the firm’s specific data
    access and usage needs.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 安全的数据存储解决方案，包括使用安全的云服务或具有足够安全协议的本地服务器，是必不可少的。公司应仔细评估其数据存储选项，考虑因素包括数据的敏感性、监管要求以及公司特定的数据访问和使用需求。
- en: Client transparency is also crucial. Clients should be fully informed of how
    their data is being used, processed, and protected when AI auditing tools are
    deployed. Clear communication helps to build trust and ensures that clients understand
    the measures to secure their data.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 客户透明度也非常重要。当部署AI审计工具时，客户应充分了解其数据的使用、处理和保护情况。清晰的沟通有助于建立信任，并确保客户了解确保其数据安全的措施。
- en: Finally, a proactive approach to security is vital. Regular security audits,
    penetration testing, and vulnerability assessments should be conducted to proactively
    identify and address potential security risks. By actively seeking to improve
    and fortify their data privacy and security measures, auditing firms can comply
    with regulatory requirements and foster trust in their clients and stakeholders,
    ensuring that their sensitive financial data is safe.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，采取积极主动的安全措施至关重要。应定期进行安全审计、渗透测试和漏洞评估，以主动识别和解决潜在的安全风险。通过积极寻求改进和加强其数据隐私和安全措施，审计公司可以遵守监管要求，并在其客户和利益相关者中建立信任，确保其敏感的财务数据安全。
- en: Ethical guidelines for AI in auditing
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 审计中AI的伦理准则
- en: Developing and adhering to ethical guidelines for AI in auditing is crucial
    for maintaining integrity and public trust in the auditing profession. These guidelines
    should address bias, transparency, accountability, and data privacy issues. Firms
    should establish clear principles and standards to guide the ethical use of AI
    in auditing. This involves creating a framework for ethical considerations, training
    auditors on ethical issues related to AI, and establishing mechanisms for monitoring
    and ensuring compliance with ethical standards. Engaging with professional bodies,
    regulators, and stakeholders in developing and refining these guidelines can contribute
    to their robustness and acceptance in broader industry and society.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 制定并遵守审计中AI的伦理准则对于维护审计职业的诚信和公众信任至关重要。这些准则应解决偏见、透明度、问责制和数据隐私问题。公司应建立明确的原则和标准，以指导审计中AI的伦理使用。这包括创建一个伦理考虑框架，对审计员进行与AI相关的伦理问题培训，并建立监测和确保遵守伦理标准的机制。参与专业机构、监管机构和利益相关者在制定和改进这些准则，可以有助于其在更广泛的行业和社会中得到稳健和接受。
- en: Ethical guidelines for AI in auditing should start with a commitment to fairness
    and impartiality, acknowledging the potential of AI systems to inadvertently perpetuate
    or exacerbate biases present in the training data. Firms must actively work to
    identify and mitigate these biases, ensuring that AI tools provide fair and unbiased
    analyses and results. This commitment should be mirrored in a firm’s corporate
    responsibility and ethics statements, underscoring the importance of ethical AI
    use.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 审计中AI的伦理准则应始于对公平和无偏见的承诺，承认AI系统可能无意中持续或加剧训练数据中存在的偏见。公司必须积极努力识别和减轻这些偏见，确保AI工具提供公平和无偏见的分析和结果。这种承诺应在公司的企业责任和伦理声明中得到体现，强调伦理AI使用的重要性。
- en: Transparency is another cornerstone of the use of ethical AI in auditing. Firms
    should be open to the AI tools and technologies they deploy, providing clients,
    regulators, and the public with insights into how they use AI, the nature of the
    data it analyzes, and the decisions it makes. Transparency builds trust among
    stakeholders and contributes to a better understanding and acceptance of AI during
    the auditing process.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度是审计中伦理AI使用的另一个基石。公司应对其部署的AI工具和技术持开放态度，向客户、监管机构和公众提供关于他们如何使用AI、分析的数据性质以及其做出的决策的见解。透明度在利益相关者之间建立信任，有助于在审计过程中更好地理解和接受AI。
- en: Accountability mechanisms should be established to ensure that ethical guidelines
    are not merely aspirational but are actively enforced. This includes developing
    processes for auditing the use of AI tools, holding individuals and teams accountable
    for ethical AI use, and establishing clear consequences for the violation of ethical
    guidelines. Internal audits, reviews, and assessments of AI tool deployment and
    use should be conducted regularly to ensure compliance with ethical standards
    and guidelines.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 应建立问责机制，以确保伦理准则不仅仅是愿望，而是得到积极执行。这包括开发审计AI工具使用的过程，对个人和团队进行伦理AI使用的问责，以及为违反伦理准则制定明确的后果。应定期进行内部审计、审查和评估AI工具的部署和使用，以确保遵守伦理标准和准则。
- en: Continuous training and education of audit professionals on ethical considerations
    and challenges associated with AI are paramount. As AI technologies evolve, so
    do ethical considerations and challenges associated with their use. Auditors should
    be equipped with the knowledge and skills to navigate these challenges effectively
    to be able to make informed and ethical decisions in their use of AI tools.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 对审计专业人员关于AI相关道德考虑和挑战的持续培训和教育的至关重要。随着AI技术的发展，与其使用相关的道德考虑和挑战也在演变。审计员应具备有效应对这些挑战的知识和技能，以便在他们的AI工具使用中做出明智和道德的决定。
- en: Engaging in dialogue and collaboration with external bodies, including industry
    associations, regulatory agencies, and ethics boards, is vital. Participating
    in these external engagements facilitates the sharing of best practices, insights,
    and updates regarding the ethical use of AI in auditing. It also helps align the
    firm’s internal ethical guidelines with industry standards and expectations, fostering
    consistency and coherence in ethical practices adopted across the auditing profession.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 与外部机构进行对话和协作，包括行业协会、监管机构和道德委员会，至关重要。参与这些外部活动有助于分享最佳实践、见解和关于AI在审计中道德使用的更新。它还有助于将公司的内部道德准则与行业标准和管理期望相一致，促进审计职业中采用的道德实践的连贯性和一致性。
- en: Finally, firms should encourage a culture of ethical awareness and responsibility
    among professionals. Ethical considerations should be embedded in decision-making
    processes, with auditors encouraged to reflect on and consider the ethical implications
    of their actions and decisions when using AI tools. Fostering an ethical culture
    supports compliance with external regulations and guidelines and builds a firm’s
    reputation as a responsible and ethical actor in the auditing space, contributing
    positively to public trust and confidence in the auditing profession.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，公司应鼓励专业人员在道德意识和责任感方面的文化。道德考虑应嵌入决策过程中，鼓励审计员在使用AI工具时反思和考虑其行为和决策的道德影响。培养道德文化有助于遵守外部法规和指南，并建立公司在审计领域的负责任和道德行为者的声誉，为公众对审计职业的信任和信心做出积极贡献。
- en: The future of AI in auditing
  id: totrans-162
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI在审计中的未来
- en: 'Let’s peer into the horizon of auditing as AI reshapes the landscape of this
    critical domain within accounting information systems. In the following table,
    we discover the evolving roles and competencies that define the future auditor
    in the era of AI-driven auditing practices:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们展望AI重塑会计信息系统这一关键领域审计格局的未来。在下表中，我们发现未来AI驱动审计实践所定义的审计员角色和能力的演变：
- en: '| **Skill/Competency** | **Importance in** **AI-Driven Auditing** |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| **技能/能力** | **在AI驱动审计中的重要性** |'
- en: '| --- | --- |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Understanding of AI and related technologies | Essential for interacting
    with and managing AI-driven tools and platforms effectively |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| 对AI和相关技术的理解 | 有效互动和管理AI驱动工具和平台所必需的 |'
- en: '| Data analytics skills | Necessary for interpreting results generated by AI
    tools and working with large datasets |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| 数据分析技能 | 解释AI工具生成的结果和与大型数据集工作所必需的 |'
- en: '| Critical thinking and problem-solving | Vital for scrutinizing AI-generated
    insights and devising solutions to complex problems |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '| 批判性思维和问题解决能力 | 审查AI生成的见解并制定解决复杂问题的方案所必需的 |'
- en: '| Ethical considerations and professional skepticism | Fundamental for approaching
    AI tools ethically and responsibly |'
  id: totrans-169
  prefs: []
  type: TYPE_TB
  zh: '| 道德考虑和职业怀疑精神 | 以道德和负责任的方式使用AI工具的基础 |'
- en: '| Continuous learning and professional development | Crucial to stay updated
    on the latest trends, technologies, and best practices in AI-driven auditing |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| 持续学习和专业发展 | 对保持对AI驱动审计领域最新趋势、技术和最佳实践的更新至关重要 |'
- en: Table 4.3 – Skills and competencies for future auditors
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.3 – 未来审计员的技能和能力
- en: Next, let’s explore the evolving audit landscape in more detail.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们更详细地探讨审计格局的演变。
- en: The evolving audit landscape
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 审计格局的演变
- en: The audit landscape is in a perpetual state of evolution, responding agilely
    to rapid technological advancements, modifications in financial reporting and
    auditing standards, and the dynamic shift in global business models. In this fluid
    context, the imperative for audits that are not only accurate and timely but also
    insightful is accentuated, underscoring the critical role they play in ensuring
    financial transparency and accountability.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 审计领域处于持续演化的状态，敏捷地应对快速的技术进步、财务报告和审计标准的修改以及全球商业模式的动态转变。在这个流动的背景下，不仅准确和及时，而且富有洞察力的审计变得尤为重要，这凸显了它们在确保财务透明度和问责制中的关键作用。
- en: Emerging technologies are at the forefront of significant changes in the audit
    sector, with AI being particularly instrumental. AI is not merely another tool
    in the auditor’s arsenal; instead, it represents a transformative force set to
    redefine the essence of auditing, offering unprecedented opportunities to enhance
    efficiency, accuracy, and insight generation.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 新兴技术处于审计领域重大变革的前沿，其中人工智能尤其关键。人工智能不仅仅是审计人员工具箱中的另一个工具；相反，它代表了一种变革力量，将重新定义审计的本质，为提高效率、准确性和洞察力生成提供前所未有的机会。
- en: As we navigate through the coming years, the expectation is not just incremental
    changes but a substantial overhaul in the way auditing functions are conceived
    and executed. AI’s integration into the audit landscape is not a matter of if
    but when, and its impact will be multifaceted. On a fundamental level, AI will
    take on the heavy lifting associated with routine, mundane, and time-consuming
    tasks that have long characterized the audit process. This automation capability
    enables auditors to engage more deeply with the analytical aspects of auditing.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入未来几年，预期不仅仅是渐进式变化，而是对审计职能构思和执行方式的彻底改革。人工智能融入审计领域不是关于“是否”的问题，而是关于“何时”的问题，其影响将是多方面的。在根本层面上，人工智能将承担与审计过程中长期存在的常规、平凡和时间消耗性任务相关的繁重工作。这种自动化能力使审计人员能够更深入地参与审计的分析方面。
- en: However, the influence of AI extends beyond automation. This will empower auditors
    with enhanced analytical capabilities, serving as a sophisticated ally in sifting
    through voluminous financial data to extract nuanced insights that would otherwise
    remain obscure. In doing so, AI acts as a catalyst, enabling auditors to delve
    deeper and uncover stories and trends hidden within the data, providing a richer
    and more informed understanding of an organization’s financial health and risks.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能的影响远不止于自动化。这将赋予审计人员增强的分析能力，成为在筛选大量财务数据以提取细微洞察力方面的复杂盟友，这些洞察力否则将保持模糊不清。在此过程中，人工智能充当催化剂，使审计人员能够深入挖掘，揭示数据中隐藏的故事和趋势，从而提供对组织财务状况和风险的更丰富、更全面的理解。
- en: This seismic shift caused by AI does not occur in a vacuum. This necessitates
    a corresponding transformation of audit methodologies and practices. Traditional
    approaches need to be re-evaluated and recalibrated to align with the capabilities
    and potential offered by AI. This realignment also extends to human capital within
    the audit profession. The skills profile, competencies, and expertise required
    of auditing professionals will undergo significant changes, with a premium placed
    on individuals who not only understand auditing but are also fluent in the language,
    applications, and possibilities of AI.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 由人工智能引起的这场地震般的转变并非孤立发生。这需要审计方法和实践的相应转变。传统方法需要重新评估和调整，以与人工智能提供的功能和潜力相一致。这种重新定位也扩展到审计职业的人力资本。审计专业人员所需的技能概况、能力和专业知识将经历重大变化，对那些不仅理解审计，而且精通人工智能的语言、应用和可能性的人的需求将得到提升。
- en: This evolution paints the picture of an audit landscape that is adaptive, forward-looking,
    and responsive to changing demands and complexities of the business environment.
    With AI as a central player in this unfolding scenario, the future of auditing
    appears poised for a period of exciting, transformative, and far-reaching change,
    promising a new era in which audits are more accurate, timely, insightful, and
    reflective of the complex financial tapestry they seek to examine and verify.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这种演变描绘了一幅审计领域适应性强、前瞻性、能够应对不断变化的需求和商业环境复杂性的画面。随着人工智能在这个正在展开的场景中扮演核心角色，审计的未来似乎将迎来一段激动人心、变革性和深远影响的时期，预示着一个新的时代，在这个时代中，审计将更加准确、及时、富有洞察力，并能反映他们试图检查和验证的复杂财务结构。
- en: The role of AI in future auditing
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能在未来审计中的作用
- en: AI is poised to play a central and indispensable role in future auditing processes,
    serving as a catalyst for enhanced efficiency and precision. The transformative
    potential of AI in auditing is multifaceted, offering a suite of capabilities
    set to fundamentally redefine the audit practice.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: AI有望在未来审计过程中扮演中心且不可或缺的角色，作为提高效率和精确度的催化剂。AI在审计中的变革潜力是多方面的，提供了一套旨在从根本上重新定义审计实践的能力。
- en: First, AI’s unparalleled ability to process expansive datasets in real time
    constitutes a game changer for the audit profession. This real-time data processing
    capability will not merely streamline existing processes but will revolutionize
    the way auditors interact with, analyze, and interpret financial records and transactions.
    The ability to analyze entire populations of transactions, as opposed to relying
    on samples, provides auditors with a panoramic and more comprehensive view of
    an organization’s financial landscape. This holistic perspective facilitates a
    deeper understanding and more accurate representation of a firm’s financial position,
    ensuring that audits reflect a more complete financial picture.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，AI在实时处理大量数据集方面无与伦比的能力，对审计行业来说是一场变革。这种实时数据处理能力不仅将简化现有流程，还将彻底改变审计人员与财务记录和交易互动、分析和解释的方式。能够分析整个交易群体，而不是依赖于样本，为审计人员提供了一个全景式且更全面的组织财务景观视图。这种整体视角有助于更深入地理解和更准确地反映公司的财务状况，确保审计反映了一个更完整的财务图景。
- en: In addition to revolutionizing data analysis, AI plays a pivotal role in proactive
    risk management during the auditing process. By identifying and flagging potential
    issues and anomalies at their nascent stages, AI enables auditors and organizations
    alike to address and mitigate risks before they burgeon into significant insurmountable
    problems. This proactive approach to risk management is facilitated by AI’s advanced
    predictive analytics and sophisticated ML algorithms. These technologies empower
    AI tools to not only identify but also anticipate financial risks and irregularities
    with a degree of accuracy and foresight that was previously unattainable. This
    predictive capability provides auditors with a powerful tool for foresight, enabling
    them to adopt preventive measures and strategies to proactively safeguard against
    financial risk.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 除了革命性地改变数据分析之外，AI在审计过程中的主动风险管理中扮演着关键角色。通过在问题或异常的早期阶段识别并标记，AI使审计人员和组织能够在此之前就解决和减轻风险，防止它们演变成重大且难以克服的问题。这种主动风险管理方法得益于AI的高级预测分析和复杂的机器学习（ML）算法。这些技术使AI工具不仅能够识别，而且能够以以前无法达到的准确性和预见性预测金融风险和不规则性。这种预测能力为审计人员提供了一个强大的前瞻性工具，使他们能够采取预防措施和策略，主动防范金融风险。
- en: The role of AI in auditing is further amplified when considering the labyrinthine
    and ever-evolving regulatory environment that characterizes the financial sector.
    With financial regulations undergoing continuous modifications and updates, staying
    compliant is challenging. AI equipped with NLP serves as a valuable tool in this
    context. NLP enables AI tools to interpret, understand, and integrate new compliance
    requirements and regulatory changes. This ensures that audits are not only compliant
    but also aligned with the most current and relevant legal and regulatory standards,
    safeguarding against legal infractions and non-compliance.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑到金融行业特征性的错综复杂且不断演变的监管环境时，AI在审计中的作用进一步得到加强。随着金融法规的持续修改和更新，保持合规性是一项挑战。配备自然语言处理（NLP）的AI在此背景下成为一项宝贵的工具。NLP使AI工具能够解释、理解和整合新的合规要求和监管变化。这确保了审计不仅合规，而且与最最新和相关的法律和监管标准保持一致，从而防范法律违规和非合规行为。
- en: Finally, and perhaps most significantly, the integration and adoption of AI
    within the auditing process is set to substantially enhance the value proposition
    offered to clients. With AI at the helm, audits are characterized by an unparalleled
    level of accuracy and insight driven by data analytics. These data-driven insights,
    borne out of AI’s analytical prowess, provide auditors with a basis for delivering
    strategic informed advice to clients. Such counsel is invaluable for organizations
    seeking to understand their current financial performance and improve and optimize
    their financial and risk management practices. Through AI, audits will transition
    from retrospective analysis to a tool for prospective, strategic financial planning
    and decision-making, marking a significant evolution in the value and role of
    audits within an organization’s broader financial strategy.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，也许是最重要的是，人工智能在审计过程中的集成和采用将显著提升提供给客户的价值主张。在人工智能的引领下，审计的特点是数据驱动的分析带来的无与伦比的准确性和洞察力。这些由人工智能分析能力产生的数据驱动的洞察力，为审计人员提供了向客户提供战略咨询的基础。这种咨询对于寻求了解其当前财务表现并改进和优化其财务和风险管理实践的组织来说是无价的。通过人工智能，审计将从回顾性分析转变为前瞻性、战略性的财务规划和决策工具，标志着审计在组织更广泛的财务战略中的价值和角色的重大演变。
- en: Preparing for the future – skills and competencies
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为未来做准备——技能和胜任力
- en: With AI steadily becoming an indispensable component in the auditing realm,
    it is imperative for professionals in the field to proactively equip themselves
    with a novel set of skills and competencies tailored to this technological landscape.
    The integration of AI into auditing is not merely a supplementary addition; it
    represents a fundamental shift in the auditing process, necessitating auditors
    to have a robust understanding of AI and related technologies. This understanding
    is non-negotiable as it forms the basis for the effective interaction, management,
    and extraction of insights from AI-driven tools and platforms that are increasingly
    becoming the bedrock of modern auditing practices.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能在审计领域稳步成为不可或缺的组成部分，该领域的专业人士积极装备自己，掌握一套针对这一技术景观的新颖技能和胜任力变得至关重要。人工智能融入审计过程不仅仅是补充性的增加；它代表着审计过程的基本转变，要求审计人员对人工智能和相关技术有坚实的理解。这种理解是不可或缺的，因为它构成了与人工智能驱动的工具和平台有效互动、管理和提取洞察力的基础，而这些工具和平台正日益成为现代审计实践的基础。
- en: Auditors in the future will need to be proficient in data analytics, possessing
    the requisite skills for interpreting, critically analyzing, and evaluating results
    generated by AI tools. The ability to work adeptly with large and complex datasets,
    apply statistical techniques with precision, and visualize data in a manner that
    conveys findings clearly and compellingly are non-negotiable skills. These competencies
    enable auditors to communicate complex data and insights in an accessible manner,
    facilitating informed decision-making and strategic planning.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 未来的审计人员需要精通数据分析，具备解读、批判性分析和评估人工智能工具生成结果所需的基本技能。熟练处理大量和复杂的数据集、精确应用统计技术以及以清晰和有说服力的方式可视化数据的能力是非谈判性的技能。这些能力使审计人员能够以易于理解的方式传达复杂的数据和洞察力，促进明智的决策和战略规划。
- en: Critical thinking and acute problem-solving skills are of unprecedented importance
    in this AI-driven auditing landscape. Auditors are called upon to scrutinize AI-generated
    insights with a discerning eye, identifying potential issues, anomalies, or inaccuracies
    with precision and alacrity. Furthermore, they must be equipped to devise innovative
    and effective solutions to complex, multifaceted problems, navigating through
    the intricacies of financial data and AI-generated insights with expertise and
    confidence.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个由人工智能驱动的审计领域中，批判性思维和敏锐的问题解决技能具有前所未有的重要性。审计人员被要求以挑剔的眼光审视人工智能生成的洞察力，精确且迅速地识别潜在问题、异常或不准确之处。此外，他们必须具备设计创新和有效解决方案的能力，以应对复杂且多面的问题，在金融数据和人工智能生成的洞察力的复杂性中，以专业和自信的态度进行导航。
- en: In a profession in which ethical considerations and professional skepticism
    have always been paramount, the advent of AI further accentuates the importance
    of these principles. Auditors must navigate AI tools and processes with a steadfast
    commitment to ethical considerations and approach these advanced technologies
    responsibly and conscientiously. Ensuring that AI-driven processes are fair, impartial,
    transparent, and accountable, this ethical approach safeguards against bias and
    ensures that AI is used to uphold the integrity and credibility of the auditing
    profession.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个伦理考量和专业怀疑始终至关重要的职业中，AI的出现进一步强调了这些原则的重要性。审计师必须以坚定不移的伦理考量来导航AI工具和流程，并负责任、有意识地对待这些先进技术。确保AI驱动的流程公平、公正、透明和可问责，这种伦理方法可以防止偏见，并确保AI被用于维护审计职业的完整性和信誉。
- en: The dynamic and rapidly evolving nature of AI technologies makes continuous
    learning and professional development non-negotiable for auditors. Staying abreast
    of the latest trends, technologies, and best practices in AI-driven auditing is
    a perennial requirement, not a one-time effort. The future of auditing is characterized
    by constant change and evolution, demanding a workforce that is adaptable, tech-savvy,
    and unequivocally committed to excellence, ethics, and continuous improvement
    in delivering high-quality audit services. The auditor of the future is not just
    a financial expert but a technologically astute professional, equipped and ready
    to leverage AI for enhanced auditing practices.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: AI技术的动态和快速发展的特性使得审计师持续学习和专业发展变得不可或缺。跟上AI驱动审计的最新趋势、技术和最佳实践是永恒的要求，而不仅仅是一次性努力。审计的未来特征是不断的变革和进化，要求一支能够适应、技术熟练、并且坚定不移致力于卓越、伦理和持续改进以提供高质量审计服务的工作队伍。未来的审计师不仅是一位财务专家，而且是一位技术精明的专业人士，装备齐全，准备利用AI来提升审计实践。
- en: Summary
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, it is essential to take a moment to assimilate and reflect
    on the crucial insights and extensive knowledge about the revolutionary impact
    of AI in auditing:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，花一点时间吸收和反思关于AI在审计中革命性影响的至关重要见解和广泛知识是至关重要的：
- en: '**AI audit tool overview**: AI audit tools have emerged as irreplaceable assets
    in the modern auditing landscape. These tools are not merely accessories but also
    pivotal elements that bring unparalleled efficiency and accuracy to the table.
    They act as linchpins that facilitate a smoother, more streamlined approach to
    data analysis, fraud detection, risk assessment, and myriad other tasks integral
    to the auditing process. The introduction and incorporation of these advanced
    technological tools significantly elevate the efficacy and precision of traditional
    auditing methodologies, making them indispensable in the current scenario.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI审计工具概述**：AI审计工具已成为现代审计领域中不可替代的资产。这些工具不仅仅是配件，而且是带来无与伦比效率和准确性的关键要素。它们作为连接点，促进了数据分析、欺诈检测、风险评估以及审计过程中许多其他任务的更顺畅、更简化的方法。这些先进技术工具的引入和整合显著提高了传统审计方法的效率和精确度，使它们在当前情况下变得不可或缺。'
- en: '**Understanding** **AI tools**:'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解AI工具**：'
- en: '**ADA**: ADA is a technological marvel that empowers auditors with the capability
    to analyze vast datasets swiftly and efficiently. This rapid analysis is not superficial;
    instead, it allows for deep, insightful exploration of data, shedding light on
    anomalies and patterns that might otherwise escape notice. Such insights are instrumental
    in conducting thorough risk assessments, making ADA a cornerstone of the auditing
    process.'
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ADA**：ADA是一项技术奇迹，它赋予审计师快速高效分析大量数据集的能力。这种快速分析并非肤浅；相反，它允许对数据进行深入、有洞察力的探索，揭示可能被忽视的异常和模式。这些见解对于进行彻底的风险评估至关重要，使ADA成为审计过程的基础性工具。'
- en: '**RPA**: RPA is an invaluable tool in the auditor’s toolkit. It takes over
    repetitive, rule-bound tasks and executes them quickly and accurately. This automation
    frees auditors from the shackles of mundane tasks, allowing them to channel their
    expertise and focus on more analytical and judgment-intensive aspects of the audit
    process.'
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RPA**：RPA是审计师工具箱中的无价之宝。它接管重复性、规则约束的任务，并快速准确地执行它们。这种自动化使审计师摆脱了日常任务的束缚，使他们能够将专业知识集中在审计过程的更分析性和判断性方面。'
- en: '**NLP**: NLP is a specialized AI subset that provides the ability to analyze
    textual data meticulously. It does not just parse through text; it extracts relevant
    and crucial information and assists in conducting sentiment analysis, acting as
    an invaluable ally during the audit process by providing insights that are both
    deep and valuable.'
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言处理（NLP）**：NLP是专门的人工智能子集，能够细致地分析文本数据。它不仅解析文本；它提取相关和关键信息，并在审计过程中通过提供深入且有价值的信息，作为无价盟友。 '
- en: '**Ethical considerations**: Ethical aspects must be considered when discussing
    AI during auditing. These considerations are not afterthoughts but integral to
    the process, demanding immediate attention and respect. Understanding and mitigating
    AI bias, ensuring the privacy and security of data, and adhering to ethical guidelines
    crafted for AI in auditing are non-negotiable. These ethical standards and considerations
    act as guiding lights, ensuring that the path of AI in auditing is not only innovative
    but also conscientious and responsible.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**伦理考量**：在讨论人工智能时，必须考虑伦理方面。这些考量不是事后想起的，而是审计过程的重要组成部分，需要立即关注和尊重。理解和减轻人工智能偏见，确保数据的隐私和安全，以及遵守为审计中的人工智能制定的伦理准则，这些都是不可协商的。这些伦理标准和考量如同指路明灯，确保人工智能在审计的道路上不仅创新，而且负责任、有意识。'
- en: '**Future of AI in auditing**: The horizon of auditing is witnessing a transformative
    phase, with AI gearing up to play a central pivotal role in this transformation.
    In the future, glistening with promises of innovation and efficiency, auditors
    must brace themselves and acquire new skills and competencies. Future auditors
    need to be well versed in data analytics, possess razor-sharp critical-thinking
    abilities, approach AI tools with a deep sense of ethics and responsibility, and
    be committed to the path of continuous learning and professional development.
    The auditor of tomorrow needs to be a blend of the traditional and modern, ready
    to embrace the future with open arms and a prepared mind.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能在审计中的未来**：审计的前景正在经历一个变革阶段，人工智能正准备在这个变革中扮演核心和关键的角色。在未来，充满创新和效率的承诺，审计员必须做好准备，掌握新的技能和能力。未来的审计员需要精通数据分析，拥有敏锐的批判性思维能力，以深刻的伦理和责任感对待人工智能工具，并致力于持续学习和职业发展之路。未来的审计员需要是传统与现代的结合，准备好张开双臂、带着准备好的心态拥抱未来。'
- en: Closing thoughts
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: 'As we traverse and navigate through the intricate and complex tapestry of AI
    in auditing, the image that emerges is crystal-clear and unequivocal. AI is not
    merely a supplementary tool that makes the auditor’s job easier. Rather, it is
    a transformative force: a dynamo of change that is actively reshaping, redefining,
    and reimagining the contours, boundaries, and essence of auditing.'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们穿越和导航审计中人工智能的错综复杂和复杂的图案，浮现出的图像清晰而明确。人工智能不仅仅是使审计员工作更轻松的辅助工具。相反，它是一种变革力量：一个积极重塑、重新定义和重新想象审计轮廓、边界和本质的变革动力。
- en: AI’s integration into the field is not a silent convergence but a herald of
    a new era. Unprecedented levels of efficiency and accuracy characterize this epoch
    in the annals of auditing, and it is marked by an analysis that is not just deep
    but also insightful. This amalgamation lays down a robust and unshakeable foundation
    that supports informed decision-making and strategic planning, both of which are
    indispensable in today’s fast-paced and ever-changing business environment.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能融入审计领域并非无声的汇聚，而是新时代的先声。在审计史册上，这一时代以其前所未有的效率和准确性为特征，其分析不仅深入，而且富有洞察力。这种融合奠定了坚实而稳固的基础，支持了明智的决策和战略规划，这两者在当今快节奏和不断变化的企业环境中是不可或缺的。
- en: It is imperative to remember that a great power brings about even greater responsibility.
    Seamless adoption and integration of AI in auditing is not a task to be taken
    lightly. This demands a thoughtful, careful, and conscientious approach. This
    approach should balance the relentless pursuit of innovation with a steadfast,
    unwavering commitment to the principles of ethics, integrity, and professionalism
    that have long defined the auditing profession.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 必须牢记，大权在握意味着更大的责任。人工智能在审计中的无缝采用和整合不是轻率之举。这需要深思熟虑、谨慎和有意识的处理。这种方法应平衡对创新的持续追求与对伦理、诚信和专业原则的坚定不移的承诺，这些原则长期以来一直定义着审计职业。
- en: Auditors must adopt a proactive stance toward learning and development rather
    than being reactive. This proactive approach ensures that auditors are not only
    equipped with but also proficient in the skills and knowledge necessary to harness
    the immense power of AI effectively, efficiently, and ethically.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 审计师必须采取积极主动的学习和发展态度，而不是被动应对。这种积极主动的方法确保审计师不仅装备了必要的技能和知识，而且熟练掌握利用人工智能巨大力量的有效、高效和道德的方法。
- en: Standing at the cusp of this thrilling and exciting juncture, the future of
    auditing with AI as its partner and ally unfolds before our eyes as a landscape.
    However, it is not a barren or mundane landscape; it is brimming and overflowing
    with potential and opportunities that are just waiting to be tapped and explored.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 站在这个激动人心和令人兴奋的转折点上，以人工智能为伙伴和盟友的审计未来在我们眼前展开，就像一幅景观。然而，这并非一片荒凉或平凡的土地；它充满了等待被挖掘和探索的潜力和机会。
- en: This future is because auditors and accounting professionals engage with AI.
    However, this engagement is not meant to be passive, with auditors being mere
    recipients or beneficiaries of AI’s capabilities. Instead, auditors need to step
    forward as active participants, contributors, and architects of a future, where
    auditing is defined not only by excellence and innovation but also by ethical
    responsibility and accountability.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这个未来是因为审计师和会计专业人士与人工智能互动。然而，这种互动并非被动，审计师不应仅仅是人工智能能力的接受者或受益者。相反，审计师需要成为积极的参与者、贡献者和未来审计的架构师，其中审计不仅由卓越和创新定义，还由道德责任和问责制定义。
- en: As we embark on this shared and collective journey of integrating AI into auditing,
    it is essential to recognize that it is indeed a shared endeavor. This journey
    invites and welcomes collaboration, dialogue, and engagement from all stakeholders
    in the auditing ecosystem. From those who practice auditing to those who rely
    on their findings, everyone has a role to play and a contribution to make.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始将人工智能融入审计的共享和集体旅程时，认识到这确实是一项共同的事业至关重要。这段旅程邀请并欢迎来自审计生态系统所有利益相关者的合作、对话和参与。从那些从事审计工作的人到那些依赖其发现的人，每个人都有自己的角色和贡献。
- en: Together, as we navigate through the labyrinth of challenges and possibilities,
    and as we explore opportunities and potential that lie in wait, the future of
    AI in auditing promises to be not just transformative but also enriching. It promises
    to be a journey not just about reaching a destination but also about the learning,
    experiences, and insights gained along the way. For all involved, the journey
    of AI in auditing is set to be an adventure of discovery, learning, and growth,
    promising rewards and insights that are as substantial as they are transformative.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，当我们穿越挑战和机遇的迷宫，探索等待的机会和潜力时，人工智能在审计中的未来不仅承诺带来变革，也承诺带来丰富。它承诺不仅是一段关于达到目的地的旅程，也是关于沿途的学习、经验和洞察的旅程。对于所有参与者来说，人工智能在审计中的旅程注定是一次发现、学习和成长的冒险，承诺带来实质性和变革性的回报和洞察。
- en: Further reading
  id: totrans-210
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: 'The realm of AI in auditing is extensive and continually evolving, with new
    insights and practices emerging. For readers interested in deepening their understanding
    and staying informed about the latest developments in AI-assisted auditing, the
    following resources and readings are highly recommended:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 审计中的人工智能领域广泛且持续发展，新的见解和实践不断涌现。对于希望深化对人工智能辅助审计的理解并了解最新发展动态的读者，以下资源和阅读材料强烈推荐：
- en: '*Auditing in the age of artificial intelligence* ([https://www.audit.vic.gov.au/sites/default/files/IMPACT-2020/Auditing%20in%20the%20Age%20of%20Artificial%20Intelligence.pdf](https://www.audit.vic.gov.au/sites/default/files/IMPACT-2020/Auditing%20in%20the%20Age%20of%20Artificial%20Intelligence.pdf)):
    This resource was designed for auditing professionals to navigate the AI landscape.
    It provides essential information, tools, and best practices to help auditors
    effectively use AI in their work, highlighting the importance of ethics, bias
    mitigation, and continuous learning.'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能时代的审计* ([https://www.audit.vic.gov.au/sites/default/files/IMPACT-2020/Auditing%20in%20the%20Age%20of%20Artificial%20Intelligence.pdf](https://www.audit.vic.gov.au/sites/default/files/IMPACT-2020/Auditing%20in%20the%20Age%20of%20Artificial%20Intelligence.pdf))：这份资源是为审计专业人士设计的，旨在帮助他们了解人工智能的格局。它提供了必要的信息、工具和最佳实践，以帮助审计师有效地在工作中使用人工智能，强调道德、偏见缓解和持续学习的重要性。'
- en: '*Ethics of Artificial Intelligence* ([https://www.unesco.org/en/artificial-intelligence/recommendation-ethics](https://www.unesco.org/en/artificial-intelligence/recommendation-ethics)):
    Focusing on ethics, this guide addresses unique challenges and considerations
    involved in using AI. It is a crucial resource for auditors committed to ethical
    practice and responsible for AI use in their profession.'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能的伦理* ([https://www.unesco.org/en/artificial-intelligence/recommendation-ethics](https://www.unesco.org/en/artificial-intelligence/recommendation-ethics)):
    专注于伦理，本指南解决了使用人工智能时涉及的独特挑战和考量。它是致力于道德实践并对其职业中的人工智能使用负责的审计员的重要资源。'
- en: '*Auditing with AI: How AI is transforming auditing* ([https://www.theaccessgroup.com/en-au/blog/act-ai-auditing/#:~:text=AI%20in%20auditing%20processes%20can,risk%20and%20prioritise%20audit%20tasks](https://www.theaccessgroup.com/en-au/blog/act-ai-auditing/#:~:text=AI%20in%20auditing%20processes%20can,risk%20and%20prioritise%20audit%20tasks)):
    Looking at the future of the auditing profession, this blog explores how AI is
    set to transform auditing, offering insights into the skills and competencies
    required of auditors in the age of AI. It provides practical guidance for auditors
    preparing for a future defined by AI and technology.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能审计：人工智能如何改变审计* ([https://www.theaccessgroup.com/en-au/blog/act-ai-auditing/#:~:text=AI%20in%20auditing%20processes%20can,risk%20and%20prioritise%20audit%20tasks](https://www.theaccessgroup.com/en-au/blog/act-ai-auditing/#:~:text=AI%20in%20auditing%20processes%20can,risk%20and%20prioritise%20audit%20tasks)):
    这篇博客展望了审计职业的未来，探讨了人工智能如何改变审计，为人工智能时代审计员所需的技能和能力提供了见解。它为准备迎接由人工智能和技术定义的未来提供了实用指导。'
- en: '*How artificial intelligence will impact accounting* ([https://www.icaew.com/technical/technology/artificial-intelligence/artificial-intelligence-articles/how-artificial-intelligence-will-impact-accounting](https://www.icaew.com/technical/technology/artificial-intelligence/artificial-intelligence-articles/how-artificial-intelligence-will-impact-accounting)):
    Engaging with a community of professionals, scholars, and experts in the field
    of AI in auditing, these platforms provide space for discussion, collaboration,
    and knowledge sharing among individuals interested in the transformative impact
    of AI on auditing.'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能将如何影响会计* ([https://www.icaew.com/technical/technology/artificial-intelligence/artificial-intelligence-articles/how-artificial-intelligence-will-impact-accounting](https://www.icaew.com/technical/technology/artificial-intelligence/artificial-intelligence-articles/how-artificial-intelligence-will-impact-accounting)):
    与审计人工智能领域的专业人士、学者和专家群体互动，这些平台为对人工智能对审计的变革性影响感兴趣的个人提供了讨论、合作和知识分享的空间。'
- en: Q&A
  id: totrans-216
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Q&A
- en: 'Next are reflective queries and answers. These answers offer a concise representation
    of key insights and learning points explored throughout the text:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是反思性的问题和答案。这些答案提供了对文本中探索的关键见解和学习点的简洁表述：
- en: How do AI audit tools enhance traditional auditing processes?
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能审计工具如何增强传统的审计流程？
- en: AI audit tools significantly enhance the traditional auditing process by introducing
    efficiency, accuracy, and depth to data analysis and review. They automate routine
    tasks, thereby freeing auditors to focus on analytical and judgmental aspects
    of the audit, and provide deep insights by swiftly and efficiently analyzing large
    datasets. AI also plays a crucial role in risk assessment, fraud detection, and
    sentiment analysis, offering a comprehensive auditing approach.
  id: totrans-219
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 人工智能审计工具通过引入数据分析与审查的效率、准确性和深度，显著增强了传统的审计流程。它们自动化了常规任务，从而让审计员能够专注于审计的分析和判断方面，并通过迅速有效地分析大量数据集提供深入见解。人工智能在风险评估、欺诈检测和情感分析中也发挥着关键作用，提供了一种全面的审计方法。
- en: What are the key ethical considerations in implementing AI in auditing?
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在审计中实施人工智能时，有哪些关键的道德考量？
- en: Ethical considerations are paramount when implementing AI in auditing. This
    includes understanding and mitigating AI bias, ensuring data privacy and security,
    and adhering to ethical guidelines crafted for AI during auditing. Auditors and
    firms must approach AI tools ethically and responsibly, ensuring that processes
    are fair, transparent, and accountable.
  id: totrans-221
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在审计中实施人工智能时，道德考量至关重要。这包括理解和减轻人工智能偏见、确保数据隐私和安全，以及遵守为审计期间的人工智能制定的道德准则。审计员和公司必须以道德和负责任的态度对待人工智能工具，确保流程是公平、透明和可问责的。
- en: How can auditors prepare for the future integration of AI into auditing?
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审计员如何为人工智能在未来审计中的集成做准备？
- en: Preparation for the future integration of AI in auditing requires the acquisition
    of new skills and competencies. Auditors must have a strong understanding of AI
    and related technologies, develop data analytics skills, and hone their critical
    thinking and problem-solving abilities. Ethical considerations continue to be
    fundamental, and auditors must engage in continuous learning and professional
    development to stay abreast of the latest trends, technologies, and best practices
    in AI-driven auditing.
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 准备未来在审计中整合人工智能需要获取新的技能和能力。审计师必须对人工智能和相关技术有深入的理解，发展数据分析技能，并磨练他们的批判性思维和解决问题的能力。道德考量始终是基础性的，审计师必须参与持续学习和专业发展，以跟上人工智能驱动审计的最新趋势、技术和最佳实践。
- en: What role will AI play in the auditing future?
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能在审计的未来将扮演什么角色？
- en: AI will play a pivotal role in the auditing future by introducing increased
    efficiency, accuracy, and proactive risk management. This facilitates the analysis
    of the entire population of transactions, enabling a comprehensive view of an
    organization’s financial position and audit risks. AI will also assist in navigating
    complex regulatory environments and enhancing value delivered to clients through
    accurate data-driven insights and strategic advice.
  id: totrans-225
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 人工智能通过引入更高的效率、准确性和主动风险管理，将在审计未来的发展中扮演关键角色。这有助于分析整个交易群体，从而全面了解组织的财务状况和审计风险。人工智能还将协助在复杂的监管环境中导航，并通过准确的数据驱动洞察和战略建议来提升为客户提供的价值。
