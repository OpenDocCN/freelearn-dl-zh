  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`Code in text`: Indicates code words in text, database table names, folder
    names, filenames, file extensions, pathnames, dummy URLs, user input, and X/Twitter
    handles. Here is an example: “Open the `speaking-clock.py` file located in the
    `/``02-synthesize-speech/Python/speaking-clock` folder.”'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`文本中的代码`：表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟 URL、用户输入和 X/Twitter 处理符。以下是一个示例：“打开位于
    `/``02-synthesize-speech/Python/speaking-clock` 文件夹中的 `speaking-clock.py` 文件。”'
- en: 'A block of code is set as follows:'
