- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: The timing for **Artificial Intelligence** (**AI**) could not be better. As
    an AI/data solution architect at Microsoft, I have witnessed firsthand the transformative
    power of AI, especially since the advent of OpenAI. The world is evolving rapidly,
    and traditional processes are being reimagined.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能**（AI）的时机再好不过了。作为微软的AI/数据解决方案架构师，我亲眼见证了AI的变革力量，尤其是在OpenAI出现之后。世界正在快速发展，传统流程正在被重新构想。'
- en: Take, for example, one of my insurance clients. They used to deal with vast
    amounts of unstructured data, such as PDFs and emails. Teams of hundreds of people
    manually extracted information from thousands of files, entered it into the custom
    structured format of Excel, validated the data, and passed it to business analysts
    to generate reports. Decision-makers would then rely on these reports to make
    critical choices.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 以我的一个保险客户为例。他们过去处理大量非结构化数据，如PDF和电子邮件。数百人的团队手动从数千个文件中提取信息，将其输入到Excel的定制结构化格式中，验证数据，并将其传递给业务分析师生成报告。决策者随后会依赖这些报告来做出关键选择。
- en: Now, with AI, this entire workflow is automated. AI extracts data from structured,
    semi-structured, and unstructured sources, stores it in a database, and generates
    analytic reports. It even enables users to interact with their data conversationally.
    The result? Millions of dollars saved and a significant boost in productivity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，有了AI，整个工作流程都是自动化的。AI从结构化、半结构化和非结构化来源中提取数据，将其存储在数据库中，并生成分析报告。它甚至允许用户以对话方式与数据互动。结果是？节省了数百万美元，并显著提高了生产力。
- en: 'If you’re excited to be part of this transformative journey, you’ve come to
    the right place. This book not only focuses on helping you pass the *AI-102: Azure
    AI Engineer Associate Certification* but also equips you with real-world project
    experience ([*Chapter 10*](B31034_10.xhtml#_idTextAnchor191)). My goal is for
    you to walk away with both the confidence of a certified professional and practical
    skills that open doors to new opportunities.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '如果你热衷于成为这一变革性旅程的一部分，你就来对地方了。这本书不仅专注于帮助你通过**AI-102: Azure AI工程师助理认证**，还为你提供了实际项目经验（[第10章](B31034_10.xhtml#_idTextAnchor191)）。我的目标是让你带着认证专业人员的信心和开启新机会的实用技能离开。'
- en: Whether you’re considering a career switch to AI or enhancing your current skill
    set, I welcome you to this exciting moment. Let this book be your gateway to a
    rewarding and dynamic future. I hope you enjoy the journey.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是考虑转向AI职业还是提升你当前技能集，我都欢迎你来到这个激动人心的时刻。让这本书成为你通往有回报和充满活力的未来的大门。我希望你享受这段旅程。
- en: Who this book is for
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向对象
- en: 'This book is designed for anyone preparing for the *AI-102: Azure AI Engineer
    Associate Certification* exam, regardless of their background. It’s an excellent
    resource for developers and engineers looking to expand their knowledge of AI
    within the Azure ecosystem. For those transitioning from traditional software
    development roles to AI-focused careers, this book provides the tools and insights
    needed to thrive in AI projects using Azure. Students and educators will also
    find it valuable, offering practical ways to connect AI concepts with real-world
    applications.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '这本书是为所有准备参加**AI-102: Azure AI工程师助理认证**考试的人设计的，无论他们的背景如何。它是对开发者工程师在Azure生态系统中扩展AI知识的一个极好的资源。对于那些从传统软件开发角色转向AI专注职业的人来说，这本书提供了在Azure项目中茁壮成长所需工具和见解。学生和教育工作者也会发现它很有价值，提供了将AI概念与实际应用相结合的实用方法。'
- en: While some familiarity with AI/ML concepts or development practices can be helpful,
    it’s not a requirement. The book includes a clear, comprehensive summary of the
    exam topics and provides additional resources to support your learning journey.
    Through practical examples, hands-on exercises, and straightforward explanations,
    this book aims to give you the confidence to pass the *Azure AI-102* exam and
    apply your skills to real-world AI projects.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对AI/ML概念或开发实践有一定的了解可能会有所帮助，但这不是必需的。本书包含对考试主题的清晰、全面的总结，并提供额外的资源来支持你的学习之旅。通过实际案例、动手练习和直接解释，本书旨在让你有信心通过**Azure
    AI-102**考试，并将你的技能应用于实际的AI项目中。
- en: What this book covers
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: This book is structured to closely follow the official *Microsoft study guide
    for Exam AI-102*, ensuring comprehensive coverage of the certification objectives.
    You may notice that some of the latest Azure AI services or features are either
    not included or only briefly mentioned. That’s intentional—I focused on what’s
    required for the exam rather than trying to chase every new release. However,
    as long as you understand the foundational concepts—the principles that power
    both current and future services—you’ll be well-prepared to adapt to whatever
    comes next. Think of this book as a cornerstone for your AI career. That’s also
    why I included [*Chapter* *10*](B31034_10.xhtml#_idTextAnchor191), which goes
    beyond the exam content to showcase real-world use cases and project examples.
    These are designed to not only reinforce your knowledge but also help you transition
    from passing the exam to confidently applying AI in practical scenarios. This
    book will help you earn your certification—but more importantly, it will prepare
    you to think and operate like a real AI professional from day one.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本书结构紧密遵循官方 *Microsoft AI-102 考试指南*，确保全面覆盖认证目标。您可能会注意到，一些最新的 Azure AI 服务或功能可能没有包括，或者只是简要提及。这是故意的——我专注于考试所需的内容，而不是试图追逐每一个新版本。然而，只要您理解了基础概念——支撑当前和未来服务的原则——您就会为适应未来做好准备。将这本书视为您
    AI 生涯的基石。这也是为什么我包括了 [*第 10 章*](B31034_10.xhtml#_idTextAnchor191)，它不仅超越了考试内容，还展示了实际应用案例和项目示例。这些案例旨在不仅加强您的知识，还帮助您从通过考试到自信地将
    AI 应用于实际场景的过渡。这本书将帮助您获得认证——更重要的是，它将帮助您从第一天起就具备像真正的 AI 专业人士一样的思维和操作能力。
- en: Let’s look at what is covered in each chapter.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看每章都涵盖了哪些内容。
- en: '[*Chapter 1*](B31034_01.xhtml#_idTextAnchor014), *Understanding AI, ML, and
    Azure’s AI Services*, introduces key AI and ML basic concepts, including advanced
    topics such as deep learning and generative AI, foundational elements such as
    **Large Language Models** (**LLMs**), **Natural Language Processing** (**NLP**),
    and prompt engineering, and an overview of Azure’s AI services, equipping you
    with a foundational understanding to build on in later chapters.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](B31034_01.xhtml#_idTextAnchor014)，*理解 AI、ML 和 Azure 的 AI 服务*，介绍了关键的
    AI 和 ML 基本概念，包括深度学习、生成式 AI 等高级主题，以及 **大型语言模型**（**LLMs**）、**自然语言处理**（**NLP**）和提示工程等基础元素，并对
    Azure 的 AI 服务进行了概述，为您在后续章节中构建基础理解提供了工具。'
- en: '[*Chapter 2*](B31034_02.xhtml#_idTextAnchor033), *Getting Started with Azure
    AI: Studios, Pipelines, and Containerization*, introduces key Azure development
    environments (Azure AI Foundry, Azure OpenAI, Machine Learning Studio, and Copilot
    Studio) along with **Visual Studio Code** (**VS Code**), explores their roles
    in AI development, and covers CI/CD integration, resource management, and container
    deployment strategies for flexible and secure AI model hosting.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](B31034_02.xhtml#_idTextAnchor033)，*Azure AI 入门：工作室、管道和容器化*，介绍了关键的 Azure
    开发环境（Azure AI Foundry、Azure OpenAI、Machine Learning Studio 和 Copilot Studio），以及
    **Visual Studio Code**（**VS Code**），探讨了它们在 AI 开发中的作用，并涵盖了 CI/CD 集成、资源管理和灵活且安全的
    AI 模型托管策略。'
- en: '[*Chapter 3*](B31034_03.xhtml#_idTextAnchor047), *Managing, Monitoring, and
    Securing Azure AI Services*, focuses on managing and monitoring Azure AI services
    by covering diagnostic logging, performance metrics, cost management, secure key
    handling, network security, authentication mechanisms, and private communications,
    providing the tools to ensure smooth and secure AI deployments.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第三章*](B31034_03.xhtml#_idTextAnchor047)，*管理、监控和安全 Azure AI 服务*，通过涵盖诊断日志、性能指标、成本管理、安全密钥处理、网络安全、身份验证机制和私密通信，专注于管理和监控
    Azure AI 服务，提供确保平稳和安全 AI 部署的工具。'
- en: '[*Chapter 4*](B31034_04.xhtml#_idTextAnchor075), *Implementing Content Moderation
    Solutions*, emphasizes the importance of responsible AI principles (fairness,
    transparency, accountability, and more) in developing ethical AI systems, addresses
    the unique risks of generative AI, and explores mitigation strategies such as
    Azure AI Content Safety and the Responsible Innovation framework to ensure secure
    and reliable AI deployment.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第四章*](B31034_04.xhtml#_idTextAnchor075)，*实施内容审查解决方案*，强调了在开发道德 AI 系统中负责任的
    AI 原则（公平性、透明度、问责制等）的重要性，讨论了生成式 AI 的独特风险，并探讨了缓解策略，如 Azure AI 内容安全和负责任创新框架，以确保安全可靠的
    AI 部署。'
- en: '[*Chapter 5*](B31034_05.xhtml#_idTextAnchor091), *Exploring Azure AI Vision
    Solutions*, explores Azure AI Vision’s capabilities for image and video analysis,
    including object detection, face recognition, **Optical Character Recognition**
    (**OCR**), custom model development, and video insights such as scene detection
    and real-time spatial analysis, equipping you to extract meaningful data from
    visual content.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](B31034_05.xhtml#_idTextAnchor091), *探索Azure AI视觉解决方案*，探讨了Azure AI视觉在图像和视频分析方面的能力，包括目标检测、人脸识别、**光学字符识别**（**OCR**）、自定义模型开发以及视频洞察，如场景检测和实时空间分析，使您能够从视觉内容中提取有意义的数据。'
- en: '[*Chapter 6*](B31034_06.xhtml#_idTextAnchor117), *Implementing Natural Language
    Processing Solutions*, covers advanced text and speech analysis using Azure AI
    Language and Speech services, including NLP techniques, speech-to-text, text-to-speech,
    custom speech solutions, and translation capabilities, enabling the development
    of intelligent, multilingual, voice-enabled applications.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](B31034_06.xhtml#_idTextAnchor117), *实施自然语言处理解决方案*，涵盖了使用Azure AI语言和语音服务进行高级文本和语音分析，包括NLP技术、语音转文本、文本转语音、自定义语音解决方案和翻译功能，使开发智能、多语言、语音启用应用程序成为可能。'
- en: '[*Chapter 7*](B31034_07.xhtml#_idTextAnchor140), *Implementing Knowledge Mining,**Document
    Intelligence, and Content Understanding*, teaches you how to use Azure AI Search
    and Document Intelligence tools to extract, organize, and analyze unstructured
    data, transforming it into actionable insights and automating data processing
    workflows.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](B31034_07.xhtml#_idTextAnchor140), *实施知识挖掘、**文档智能**和内容理解*，教您如何使用Azure
    AI搜索和文档智能工具提取、组织和分析非结构化数据，将其转化为可操作的见解并自动化数据处理工作流。'
- en: '[*Chapter 8*](B31034_08.xhtml#_idTextAnchor167), *Working on Generative AI
    Solutions*, explores the practical use of generative AI with Azure OpenAI Service,
    covering text, code, and image generation, model deployment, API usage, fine-tuning,
    and integrating data with **Retrieval-Augmented Generation** (**RAG**) to create
    customized AI-driven solutions.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](B31034_08.xhtml#_idTextAnchor167), *在生成式AI解决方案上工作*，探讨了使用Azure OpenAI服务生成式AI的实用应用，包括文本、代码和图像生成、模型部署、API使用、微调和将数据与**检索增强生成**（**RAG**）集成以创建定制AI驱动解决方案。'
- en: '[*Chapter 9*](B31034_09.xhtml#_idTextAnchor183), *Implementing Agentic Solutions
    with Azure AI Agent Service*, explores how to design, build, and deploy intelligent
    AI agents using Azure tools and frameworks such as Azure AI Agent Service, Semantic
    Kernel, and AutoGen. It explores core agent components and real-world use cases
    and compares development approaches through hands-on exercises. The chapter also
    covers collaborative agent orchestration, deployment best practices, and strategies
    for monitoring and securing agents in production.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](B31034_09.xhtml#_idTextAnchor183), *使用Azure AI代理服务实施代理解决方案*，探讨了如何使用Azure工具和框架（如Azure
    AI代理服务、语义内核和AutoGen）设计、构建和部署智能AI代理，包括核心代理组件和实际用例，并通过动手练习比较开发方法。本章还涵盖了协作代理编排、部署最佳实践以及监控和在生产中保护代理的策略。'
- en: '[*Chapter 10*](B31034_10.xhtml#_idTextAnchor191), *Practical AI Implementation:
    Industry Use Cases, Technical Patterns, and Hands-On Projects*, explores AI’s
    transformative impact through technical patterns such as custom Copilot, chat
    with your own data, and document processing, real-world applications in various
    industries, RAG patterns, and advanced tools for data extraction and AI search,
    supported by hands-on projects.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B31034_10.xhtml#_idTextAnchor191), *实际AI实施：行业用例、技术模式和动手项目*，通过自定义Copilot、与自己的数据聊天和文档处理等技术模式，探讨了AI的变革性影响，以及各行业的实际应用、RAG模式，以及用于数据提取和AI搜索的高级工具，这些内容都通过动手项目得到支持。'
- en: '[*Chapter 11*](B31034_11.xhtml#_idTextAnchor203), *Preparing for the AI-102:**Azure
    AI Engineer Associate Certification Exam*, prepares you for the *AI-102* certification
    by outlining the exam framework, key focus areas, and preparation strategies,
    and providing a comprehensive practice exam to assess your readiness.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](B31034_11.xhtml#_idTextAnchor203), *准备AI-102：Azure AI工程师助理认证考试*，通过概述考试框架、关键关注领域和准备策略，并提供全面的实践考试来评估您的准备情况，帮助您准备*AI-102*认证。'
- en: The following diagram outlines the recommended flow for navigating this book.
    [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014) provides an overview of all the
    key concepts covered throughout the chapters, serving as a foundation. You can
    always revisit relevant concepts while working through *Chapters 3* to *9*. One
    suggested approach is to focus on an AI service that interests you most, read
    through the relevant section, and then dive into the corresponding chapter instead
    of going through all the details in [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014)
    upfront. [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033) comes next, as it covers
    the essential service setup and provides information such as service endpoints
    and keys needed for exercises in later chapters.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表概述了导航本书的推荐流程。[*第1章*](B31034_01.xhtml#_idTextAnchor014)概述了全书各章节中涵盖的所有关键概念，作为基础。你可以在阅读*第3章*到*第9章*的过程中随时回顾相关概念。一种建议的方法是专注于你最感兴趣的AI服务，阅读相关部分，然后直接进入相应的章节，而不是一开始就阅读[*第1章*](B31034_01.xhtml#_idTextAnchor014)中的所有细节。[*第2章*](B31034_02.xhtml#_idTextAnchor033)接下来，因为它涵盖了基本的服务设置，并提供了服务端点以及后续章节练习所需的信息，如密钥。
- en: The chapters are ordered based on current hot topics and typical excitement,
    with [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167) focusing on generative AI
    and OpenAI. However, you are encouraged to start with any service or topic that
    interests you most, ensuring you stay motivated and make steady progress through
    the book. [*Chapter 11*](B31034_11.xhtml#_idTextAnchor203) is dedicated to exam
    practice and detailed explanations. It’s strongly recommended that you review
    all the questions—both the correct and incorrect answers—along with the reference
    links provided to deepen your understanding of each topic. Some exam questions
    may cover areas not discussed in detail earlier in the book due to space limitations.
    This chapter offers a valuable opportunity to fill in those gaps and strengthen
    your preparation for the certification exam.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 章节按照当前的热门话题和典型的兴奋点进行排序，其中[*第8章*](B31034_08.xhtml#_idTextAnchor167)专注于生成式AI和OpenAI。然而，鼓励你从你最感兴趣的服务或主题开始，确保你保持动力，并通过本书稳步进步。[*第11章*](B31034_11.xhtml#_idTextAnchor203)专门用于考试练习和详细解释。强烈建议你回顾所有问题——包括正确和错误的答案——以及提供的参考链接，以加深你对每个主题的理解。一些考试问题可能涉及由于篇幅限制而在本书早期没有详细讨论的领域。这一章节提供了填补这些空白并加强你认证考试准备的有价值的机会。
- en: '[*Chapter 10*](B31034_10.xhtml#_idTextAnchor191), while not mandatory for the
    certification exam, is highly recommended. It offers hands-on activities with
    real-world projects that will solidify your expertise. Following this flow will
    guide you effectively through the book. Best of luck on your journey!'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B31034_10.xhtml#_idTextAnchor191)，虽然对于认证考试不是强制性的，但强烈推荐阅读。它提供了与真实世界项目相结合的动手活动，这将巩固你的专业知识。按照这个流程可以有效地引导你阅读全书。祝你在学习旅程中一切顺利！'
- en: '![](img/B31034_Preface_01.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B31034_Preface_01.jpg)'
- en: Important note
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Azure AI services and user interfaces are continuously evolving. This includes
    changes to model availability, API versions, regional support, and visual layout—especially
    as Azure consolidates experiences under AI Foundry Studio. Before starting any
    project or hands-on exercise in this book, always verify that the services and
    models you intend to use are supported in your selected Azure region. While service
    names, organization, or UI elements may change, a strong grasp of the underlying
    concepts and technologies will enable you to confidently navigate updates and
    adapt to future changes.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI服务和用户界面正在不断演变。这包括模型可用性、API版本、区域支持和视觉布局的变化——特别是在Azure将体验统一到AI Foundry
    Studio之下时。在本书的任何项目或动手练习开始之前，请始终验证你打算使用的服务和模型是否在你选择的Azure区域中得到支持。虽然服务名称、组织或UI元素可能会改变，但深刻理解底层概念和技术将使你能够自信地导航更新并适应未来的变化。
- en: To get the most out of this book
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要充分利用本书
- en: You will need the latest version of VS Code, .NET, PowerShell Core, the Azure
    CLI, Python since this book is based on Python too and Git.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要VS Code、.NET、PowerShell Core、Azure CLI、Python的最新版本，因为本书也基于Python，还需要Git。
- en: '| **Software/hardware covered in** **the book** | **Operating** **system requirements**
    |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| **本书涵盖的软件/硬件** | **操作系统要求** |'
- en: '| PowerShell Core | Windows, macOS, or Linux |'
  id: totrans-32
