- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architectural Foundations and Strategy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Everything in software ascribes to specific standards, from security to operations,
    and running a platform is no different. Platforms use shared digital tools with
    a common infrastructure to maximize value. Understanding the standards applied
    to a platform starts with the essential cloud migration; the cloud format selected
    from **Amazon Web Services** (**AWS**), Azure, or Google; and then moves from
    the cloud structure into setting up clusters for Kubernetes. The basic standards
    allow us to design and implement custom architectures within those spaces, but
    architectures also have their own standards. The chapter explains how to set up
    a platform within a cloud with a practical, custom architecture, leading to success
    and meeting regulatory standards.
  prefs: []
  type: TYPE_NORMAL
- en: An analogy for building a good platform is asking someone else to build your
    workshop rather than doing it yourself. You need to build a shelf, so you travel
    to the hardware store and buy wood, tools, and screws. On returning home, you
    realize that you have forgotten something and return to the store. The project
    multiplies, taking more time and effort than you want to spend. The process requires
    grabbing multiple items, at different times, as the need arises. When building
    architecture, you plan what you need in the workshop so that the tools are available
    and safe, and you can complete projects without returning to the hardware store.
    The successful platform provides everything up front, without you ever needing
    to return to a marketplace, and keeps all the tools up to date. The architectural
    concepts in this chapter provide some options for designing the best platform
    to accomplish user needs, scaling to multiple projects, and eventually including
    multiple platforms.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll introduce key architectural concepts that form the foundation
    of modern platforms. We’ll break down architecture into specific components to
    guide practical implementation, and examine how to scale and secure these models
    to ensure greater resilience. The chapter also explores the challenges that arise
    when balancing legacy systems with cloud-native applications, and concludes by
    outlining various architectural models that apply across different elements of
    a platform.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will be covering the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Core concepts and components
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Designing for scalability, security, and resilience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From legacy systems to cloud-native applications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are no technical requirements for this section. A minimal understanding
    of architectural diagrams and some basic Terraform knowledge could prove helpful.
  prefs: []
  type: TYPE_NORMAL
- en: Core concepts and components
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'At the beginning of an architectural design, it can help to start with a common
    framework. Regardless of where you build architecture, any cloud-based strategy
    incorporates four primary areas:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cloud**: The cloud is the basic framework for later operations, a space where
    the potential exists for events to occur, such as AWS, Google Cloud, Azure, or
    a private cloud installation. Many take the cloud to mean that operations occur
    somewhere else, which is also valid. When you run private constructions, the virtual
    space is the cloud, just a private one on a personal server. The cloud contains
    all the requirements and standards to operate on someone else’s server. The following
    three components are all contained within the initial cloud.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cluster**: Clusters aggregate a collection of virtual machines that can work
    together to accomplish tasks. Clusters typically use a standard function such
    as a controller node to integrate the various tasks. Controller nodes manage tasks
    in a cluster to effectively determine compute and storage for various functions.
    Kubernetes and Docker are examples of shared services used to integrate clusters.
    Clusters are designed to act like a single system delivering parallel processing,
    high levels of availability, and balanced resources across a wide function base.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Container**: Containers are the next level down within the cluster. Each
    container, or group of containers, can operate independently or dependently with
    other containers in the cluster. Containers should be packaged programs that execute
    all the dependencies within a single instance. Another term for a container is
    a unit of capability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code**: The last level is code. Code describes the language used to provide
    instructions to the computer. Containers are written in code and then executed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These areas are demonstrated in the following figure:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_02_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: The four Cs of cloud computing'
  prefs: []
  type: TYPE_NORMAL
- en: Multiple containers operate within a cluster, and multiple clusters can interact
    within the cloud. When designing a platform, the first architectural choice is
    picking a cloud. Since platform design optimizes streamlined functions, multi-cloud
    functionality can remain an issue. Within the cloud, platforms can operate multiple
    clusters and design them based on functionality. As a reminder, a platform is
    a set of digital tools using a shared infrastructure to create value. A good example
    is having a **collaboration function** within a cluster that interacts with other
    clusters designed for development, testing, and production. Separating clusters
    allows multiple functions to happen simultaneously. Each cluster will incorporate
    multiple containers to run specific functions like development environments, version
    control, security testing, or user management.
  prefs: []
  type: TYPE_NORMAL
- en: The **Open Systems Interconnection** (**OSI**) model for data interaction is
    another option to consider when designing a platform. Understanding what each
    tool requires within the platform allows structuring interaction to maximize value.
    The mnemonic for remembering these layers is *All People Seem To Need Data Processing*,
    standing for **Application**, **Presentation**, **Session**, **Transport**, **Network**,
    **Data link**, and **Physical**. When looking at the initial architecture for
    a platform, we are mainly concerned with the middle three layers (Session, Transport,
    and Network). We assume that Physical (raw data) and Data link (data format) are
    handled by the initial cloud. Our primary objective is to assess the network;
    move data within the system; transmission; review communication between clusters,
    containers, and sessions; and maintain working connections and ports within the
    platform. Presentation and Application are important but remain on the outside
    as the final interface of presenting usable data to the user in a format that
    allows simple interactions. These foundational considerations are often reflected
    in common architectural patterns, which provide a baseline for understanding how
    systems interact. Building on that, the chapter then introduces more specialized
    platform architectures that address the unique demands of modern, scalable environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'A common architecture should provide guidelines to expand. The typical architectural
    guidelines are the **SOLID principles**. These principles are important as we
    build a platform architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Single responsibility**: Each architectural object has only one reason to
    change.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open-closed**: Every element is open for extension and closed for modification.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Liskov substitution**: All class elements can be derived from a parent class
    and will still provide the same results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interface segregation**: Users should not depend on unused interfaces.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dependency inversion**: Objects should depend on abstractions rather than
    inversion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These principles have guided much of the transition between monolithic systems
    and the microservices approach, but they remain an important guideline. Numerous
    research and materials appear across the internet on each principle and their
    combined effectiveness, but that is beyond the scope of this book; hopefully,
    the generic reference will either spark your brain or guide you to the necessary
    information.
  prefs: []
  type: TYPE_NORMAL
- en: The essential platform
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When examining the principles in aggregate, they show important factors desired
    in a platform. A platform should support various applications, and when the SOLID
    foundation governs their interaction, it helps to create a resilient architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'When converting to a platform, we change our mindset from building an entire
    system to a partial one that enables the broader design to function. There are
    two important aspects to first consider within the platform architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: How to design it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where to display or implement those designs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These aspects can be best defined as collaborative and deployment components.
    A collaborative environment generally uses a common cluster with multiple containers
    to provide functions. The deployment target will also be a cluster with a different
    set of containers depending on the purpose of that deployment target. Both can
    be scaled repeatedly to add resilience and expand operations, but discussing each
    in detail provides a starting point for a broader architecture.
  prefs: []
  type: TYPE_NORMAL
- en: The collaboration component is the first element to consider in architectural
    design for a platform. When we say collaboration, we mean the spot where cooperative
    work can happen. This work includes all elements short of the actual deployment
    of the application. From the DevOps perspective, these are the elements to plan,
    code, and build. Monitoring applications can also collaborate as they gather information
    from the deployment targets. The most essential part of any collaboration occurs
    in the discussion between the team and establishing a communication function.
    Essential support for this should include some asynchronous chat, such as Mattermost
    or Slack. These communication tools provide a way for the individual team and
    multiple teams to connect.
  prefs: []
  type: TYPE_NORMAL
- en: The second element of collaboration is an **Integrated Development Environment**
    (**IDE**). While an IDE could be as basic as a text editor or VSCode, you could
    provide options such as GitHub, GitLab, or Anaconda, depending on the later platform
    demands. Different IDEs specialize in different languages and enable platform
    customization even if plug-in software can make an IDE multi-language. One essential
    is that the connection chosen should be linked to the communication piece so that
    IDE commits and changes are visible to the broader team. IDEs should also include
    common security aspects such as fuzz testing, static analysis, linting, and dependency
    checks. Including these security aspects as a separate platform element is possible
    but most effective when directly tied to code.
  prefs: []
  type: TYPE_NORMAL
- en: Communication components and the IDE link to the third element of collaboration,
    **work management**. Some IDEs provide ways to track work as an embedded feature,
    but using an external tool such as the Atlassian suite or Aha can be beneficial.
    These tools allow high-level observability into elements through feature flags,
    essential tasks, and connections to releases. In addition, these work management
    tools should also provide knowledge management for the platform. Knowledge management
    includes various how-to guides and self-help pieces. Linking work and knowledge
    management provides a place for generative AI to excel, finding not only standard
    documentation but internal instances across chat, planning, and work execution.
    As an example, when searching for information about App A, you would find the
    how-to documentation, mentions in Slack, and tasks on a Jira board. These could
    be cross-referenced or time-linked to provide context.
  prefs: []
  type: TYPE_NORMAL
- en: '**Monitoring** elements are a good addition to the collaborative environment
    but are not required. Monitoring means linking some operational tools to demonstrate
    which users are present and active, how the various deployment targets are running,
    current updates, and various other data. These tools link through functions and
    software such as Prometheus, Kibana, Grafana, Open Telemetry, and the Elastic
    Stack. These tools should provide those using the platform with observability.'
  prefs: []
  type: TYPE_NORMAL
- en: 'All these collaborative elements are centrally managed by an integrated dashboard.
    This dashboard allows you to manage users within the platform, observe operational
    metrics, and manage permissions. The permissions element should integrate through
    a **Single-Sign-On** (**SSO**) application once a user establishes an identity.
    These pieces also provide separation between multiple teams to establish security.
    This application ensures that teams within the platform can only access approved
    data. Sometimes, you want all the platform teams to view everything, and sometimes,
    regulatory or compliance standards might require separation in either the coding
    or the data used in the deployment targets. With all those elements in mind, the
    following diagram gives an example of the collaborative architecture within the
    platform:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_02_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Collaboration components diagram'
  prefs: []
  type: TYPE_NORMAL
- en: Each functional element is depicted as a single container, but they can be multiple
    containers or applications depending on the functional needs. For example, work
    management can include time-keeping, program progress, and business-level reporting,
    while an IDE might include security tools or alternate languages. Communication
    can also include knowledge repositories.
  prefs: []
  type: TYPE_NORMAL
- en: Monitoring responsibilities are shared between these tools throughout the collaboration
    element. Monitoring occurs for multiple reasons but should benefit observability
    through operational and developmental aspects. At the application level, systems
    can incorporate tools such as Prometheus, **Open Telemetry** (**O-TEL**) or the
    **ElasticSearch, Logstash, Kibana** (**ELK**) stack to provide adequate visibility.
    Cloud integration can also use tools such as AWS CloudWatch, Azure Monitor, or
    Datadog to combine the various pieces. Monitoring should provide details on which
    applications are being used, at what level, and how the platform performs during
    their usage.
  prefs: []
  type: TYPE_NORMAL
- en: Deployment components
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deployment components are those virtual spaces where you deploy code from the
    platform. These targets support the DevOps functions for testing, releasing, and
    deployment. Much like the initial element, these clusters are built from Infrastructure
    as Code with clear requirement definitions. Although these work functions follow
    the collaboration cluster, SSO should be enabled to allow direct, secure access
    to these clusters. Definitions provide a safe space to work. Common definitions
    include Kubernetes baselines, Docker configurations, Amazon Machine Interfaces,
    or specific Linux releases. Returning to the concept of the workshop metaphor,
    the deployment environment functions as a controlled space where teams can safely
    test and release their work. It offers the stability and isolation needed to validate
    changes before they move further down the delivery pipeline, reinforcing the platform’s
    reliability and reducing risk during deployment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Deployment cluster creation, which occurs through implementing a common baseline,
    typically includes two functions residing solely in that environment: the **continuous
    integration** (**CI**) and **continuous delivery** (**CD**) functions. CI/CD tools
    are the elements of the platform that test and publish software. Remember, the
    building piece appeared as a part of the collaboration environment. These tools
    communicate with that IDE to pull new code changes or receive pushes from the
    underlying platform. Some DevOps professionals see the initial pipeline as the
    final integration of CI; as we build common platforms, the pipelines we use in
    the platform are only the first step. Examples of commercially available CI tools
    include Jenkins, GitHub Actions, CircleCI, GitLab CI/CD, and Harness. I prefer
    GitLab CI/CD as it integrates smoothly with the GitLab IDE incorporated in the
    collaboration environment. The deployment environment architecture is shown in
    *Figure 2**.3*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_02_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: Deployment environment'
  prefs: []
  type: TYPE_NORMAL
- en: Builders often select multiple tools to prevent vendor lock-in. Vendor lock-in
    can be difficult, but many of the GitLab functions are smooth enough to allow
    easy export between tools. Recently, one well-known vendor migrated from open
    source to a subscription model, requiring anyone using the model to pay license
    fees. At the same time, switching vendors frequently across the platform can lead
    to integration issues and is one reason why self-built platforms take such a long
    time to achieve profitability. The Platform Engineering goal is to build a common
    platform for various developers. Azure DevOps excels in allowing deployment to
    multiple environments regardless of where the code is built, or where pipelines
    are executed.
  prefs: []
  type: TYPE_NORMAL
- en: The CI tool ensures all new and approved code changes integrate into the new
    code. This integration provides productized version control in the applications
    available to the customer. The versions in the following sentences are generic
    and not connected to any particular tool. In the background, within the collaboration
    environment, you may be working on versions 7.16, 7.17, and 8, but the version
    released to the customer and supported might only be 7.15\. This is because 7.15
    is the full production version that has been tested and deployed. An effective
    CI tool in a Kubernetes implementation would allow the creation of distinct namespaces
    for each version to ensure the quality of changes.
  prefs: []
  type: TYPE_NORMAL
- en: The next step implements CD tools to expose the desired version, in this case,
    version 7.15 to the customer. The current version may have bug fixes or security
    concerns that do not require a new release. These implementations occur through
    CD. CD automatically readies submitted code for release into the production environment.
    These tools ensure those changes reach the customer immediately every time updates
    to the baseline code occurs. Standard tools specializing in CD include Jenkins,
    GitLab, Datadog, GoCD, and JBoss. ArgoCD and FluxCD are tools for the delivery
    of Kubernetes solutions.
  prefs: []
  type: TYPE_NORMAL
- en: In many cases, finding a tool delivering exclusively CI or CD can be challenging
    because many companies prefer to integrate CI and CD. These solutions work in
    broader applications but can create difficulty across a platform. In the platform,
    separating CI and CD functions creates the opportunity to work on multiple versions
    and features without slowing the development process. The decision to combine
    CI and CD in a single tool or split that functionality should be deliberate and
    based on resources, training, and cloud availability. DevOps methods frequently
    include CI and CD but cannot scale effectively beyond a single product or feature.
    Examples might include strictly controlled industries that require external testing,
    such as pharmaceuticals, or large companies with multiple legacy systems. Integration
    works well for a single team working on a single product or multiple teams working
    on different projects but proves challenging when you build to multiple teams
    supporting different aspects of a single project. The next section examines these
    challenges through the context of scalability, resilience, and security.
  prefs: []
  type: TYPE_NORMAL
- en: Designing for scalability, security, and resilience
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now that you understand the essential platform components, we can discuss how
    these items can adjust for scalability, security, and resilience. Scalability
    relates to how we can add users and platforms without changing the architecture.
    Security ensures that only the individuals who intend to use the platform are
    still benefiting from applications. Finally, platforms should demonstrate the
    resilience of the SOLID principles in allowing recovery while eliminating waste
    regarding unused cloud resources. These aspects should be essential drivers of
    initially architecting a platform. One thought framework I use in applying new
    systems is shown in *Figure 2**.4*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_02_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Thought framework'
  prefs: []
  type: TYPE_NORMAL
- en: The framework appears as a table with operational elements down the middle and
    thought pillars around the side. Scalability and security are defined, while resilience
    forms the stable and adaptive pillars. The size of each operational element gives
    general trends for how much time users spend in those spaces. For example, teams
    should routinely spend three times as much work on development as design and four
    to five times as much work on operations as deployment. Following sound DevOps
    principles, all of these functions should be automated as much as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Building for scalability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can define **scalability** as the ability for the platform to continue to
    function well when it is changed in size or volume to meet customer needs. Typically,
    scalability applies upward to increased demands, but you can also think about
    downward trends when a function needs to contract. This scalability becomes especially
    relevant when considering a platform with a variable user base. You need to rapidly
    change to maximize high user numbers but implement auto-scaling to reduce cloud
    costs during off-hours or slow development periods.
  prefs: []
  type: TYPE_NORMAL
- en: 'Upwards scalability creates a more straightforward progression; you simply
    need more storage, compute, and functions. Functions such as databases, message
    queues, and analysis can complicate these progressions as well. Platform models
    support scalability as deployment clusters are eminently scalable. You can always
    add more clusters within the cloud to support additional app development. Internally,
    using Kubernetes namespaces allows the division between different applications,
    but configuration through resources such as Terraform makes life extremely easy.
    Generative AI support to provide coding elements can apply to any of these sections
    to supplement initial coding and solutions. If you have a Terraform basis for
    the deployment cluster, creating additional clusters is as easy as the following
    EKS sample:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The next step is running command lines for `terraform init` and applying and
    configuring `kubectl` with AWS to react to the individual cluster:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This initializes the Terraform instance within the environment so that tools
    can be used and the variables are assessed. It then applies the variables to the
    Terraform code and ensures all fields are supportable. If an error occurs in `apply`,
    it will mean the variables are not clear in the supporting field. The Terraform
    instance running those clusters will configure those instances with the previously
    referenced CI/CD functions for the deployment clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Scalability for the collaboration cluster can be more difficult. In this case,
    the containers can scale by creating additional containers or changing CPU/memory
    limits rather than creating additional collaboration instances. If you add additional
    collaboration clusters, the challenge can be synching work across IDE, SSO, and
    work management instances. Many of those instances are designed to work separately.
    Integration becomes the prime challenge when multiple collaboration clusters are
    added with the same users. However, most of the referenced tools for those areas
    are designed to scale rapidly without changes.
  prefs: []
  type: TYPE_NORMAL
- en: The primary guideline for scaling should be that one collaboration cluster can
    support any number of deployment targets. Collaboration clusters should only be
    added when a security or user-based challenge exists. User-based challenge means
    that I may employ different contractors and do not want them to be able to observe
    code from the other teams. As a side note, these logical separation types can
    be just as easily scaled and managed through the SSO functions. In those SSO functions,
    you can create different permissions and, using RBAC, prevent certain users from
    interacting with certain elements or data within the collaboration node. These
    considerations lead to building security functions as an integrated part of the
    platform architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Designing security
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Security** should be a primary feature of any platform design. Using SSO
    has been a continuing concept. SSO implements a session and user authentication
    service to allow users to use one set of credentials for multiple applications.
    While initial user credentials are frequently a username and password, modern
    designs should incorporate a **One-time Personal Identification Number** (**OTP**).
    OTP functions send a time-limited number to an external device to enter in conjunction
    with the username and password. After initial access, **Multi-Factor Authentication**
    (**MFA**) provides a viable alternative. This standard meets the security theory
    that verification emerges from something possessed, something known, and something
    intrinsic to the user, such as biometrics. All platform credentials should be
    stored in an encrypted account.'
  prefs: []
  type: TYPE_NORMAL
- en: For commercial platforms, one SSO example is to implement **Open Authorization**
    (**OAuth**) as a framework to federate user information between third-party services.
    Google uses this approach, as a single Google account can be activated with multiple
    applications and sites. However, other site information is maintained internally
    rather than externally available when integrating with the platform. A common
    example is to use **Lightweight Directory Access Protocol** (**LDAP**) for the
    platform, which then shares authentication across all the tools. This implementation
    allows designing the platform so a user can either log in to a central collaboration
    point, or directly to the applications within the platform.
  prefs: []
  type: TYPE_NORMAL
- en: If you are integrating an existing SSO system rather than building one, some
    commercially available applications include Duo, Okta, AWS SSO, AuthPoint SSO,
    and Azure Active Directory. SSO is an area where benefiting from someone else’s
    extensive security knowledge can be helpful. Some SSO functions might be limited
    to a certain type of cloud. Understanding the cloud limitations in communicating
    security is essential to the initial platform architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once users are signed in, there is another element to consider within the platform:
    how do we protect the data? To create integration, data must be available within
    multiple applications, but you should still retain some control over the various
    functions. Data is typically categorized as data at rest and data in transit.
    In either case, some type of encryption can be beneficial. You should encrypt
    access information, passwords, and usernames, with those functions being normally
    integrated within a good SSO system.'
  prefs: []
  type: TYPE_NORMAL
- en: The other piece is that the data at rest, the code, and the work management
    details within the system should also be encrypted. One advantage to the platform
    is the majority of the work occurs within a single cluster. This cluster-based
    approach is an advantage because internal data can remain unencrypted until accessed
    from the outside. This may be slightly misleading since most internal data would
    reside in encryption layers, just not encrypted between users within the same
    key structure. This encryption model improves communication speeds and prevents
    delays. For example, all the data used during the day would be unencrypted after
    the user signed in but inaccessible without an approved sign-in. After operations,
    data would be backed up and stored in encrypted files. When users start the following
    day, they log in and continue to work as before, but any restoration would use
    the encrypted files. Security practices supplement backup and disaster recovery
    but ultimately demonstrate **resilience** within platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing resilience
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first example of resilience within the platform should be that an SSO links
    to a collaboration environment which, during the first sign-on, creates a working
    place within all the subsequent applications. With a quick return to *Figure 2**.2*,
    the operations would be an initial sign-in asking a user for a name, password,
    OTP, and then linking the user to an organization and a team. The user account
    would then be approved to work within the platform’s communication, IDE, work
    management, and deployment applications. A quick example is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: User – John Smith
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Password – XXXXXX
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OTP – Authenticator – six-digit time-limited number
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Organization – Ostrich
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Team – Egg1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applications – IDE, Communication, Work Management, CI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the information is entered, John Smith would set up an OTP authenticator
    to verify access. The system would register him against the Ostrich organization
    and the Egg1 team for the IDE, communication window, work management tools, and
    CI. This system would ensure he can access team items in those areas. Additional
    areas might include roles that provide different sets of permissions within environments,
    as sometimes IDE systems distinguish between a guest who can view, a maintainer
    who can edit and create new work, and an owner who can merge work. The architecture
    should carefully detail each of these areas.
  prefs: []
  type: TYPE_NORMAL
- en: Building resilience between the platforms means laying out what each platform
    application requires and demonstrating parity between roles. For example, the
    role in the work management system might be a scrum master or team lead while
    the IDE role could be development lead or technical review. Understanding the
    limitations of those various pieces is critical for creating resilience when moving
    from one application to the next. The more understanding there is between those
    roles, the better the applications interact within the platform. The best solution
    would be the same roles across all applications, but that can be difficult with
    commercially available functions.
  prefs: []
  type: TYPE_NORMAL
- en: A critical aspect of resilience should be **recovery**. This recovery may be
    required because of a user error, a network outage, or a disaster such as a tornado
    or tsunami. Recovery involves having ready backups that can be quickly restored
    to provide functionality to the platform. Any resilient platform should conduct
    regular backups of the primary platform clusters and the data associated with
    those clusters. We must realize that there is a disconnect in operational performance
    between how you revert from an IDE upgrade, moving version 6.2 back to 6.1 to
    resolve a bug, and then how you restore data to that instantiation that users
    have committed. Versions are examples and do not reference any specific tool.
    These aspects towards to standard recovery practices that the platform must support.
  prefs: []
  type: TYPE_NORMAL
- en: A general backup process is the **three-two-one model**. Data storage should
    always occur in three locations, on two different media storage types, and with
    one copy offsite. This practice allows multiple places to verify crown-jewel data
    versus daily operations. An interesting real-world example is the NotPetya cyberattack
    against a significant international shipper. When they commenced restoration,
    the shipper had lost hundreds of systems and realized all their backup systems
    were also infected. Only one site for the company had safe data to conduct any
    recovery operations, and that was because they were offline for maintenance when
    the attack happened. You should avoid this scenario at all costs, hence the three-two-one
    model for generating resilience in any system, especially the platform in our
    use case.
  prefs: []
  type: TYPE_NORMAL
- en: Scalability, resilience incorporated with adaptability and stability, and security
    should all form the basis for expanding into platform architecture. These guidelines
    help shape those initial questions to build a comprehensive diagram. The next
    step is to agglomerate this conceptual understanding into a practical architecture
    to build or incorporate a platform within an organization.
  prefs: []
  type: TYPE_NORMAL
- en: From legacy systems to cloud-native applications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are two main aspects to building a platform. The first considers whether
    you are using cloud-native systems, and the second provides ways to build the
    various deployment targets into an architecture. Cloud-native operations will
    be discussed briefly by reviewing the six Rs. The second half of this section
    explains how to design a permanent, transitory, or ephemeral design to support
    platform operations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Any movement onto the cloud, or within clouds, depends on understanding the
    six Rs. As an experienced development professional, you should have already encountered
    many of them, although the full list is often new to many architects. A list is
    included here, and each R will be discussed in more detail:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Rehost**: Rehosting is sometimes called the *lift and shift* approach. It
    involves taking a full current environment and moving it to a similar location,
    except on the cloud. This can be a quick migration but often requires modifications
    to achieve cost-effectiveness or stability. While this can help with the basics
    of platforming, the amount of integration required means other strategies will
    also be needed. This strategy applies to organizations that simply want to be
    on the cloud without understanding the implications. Implications may include
    increased latency, suboptimal resource usage, and generally poor performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Replatform**: As a basic concept, re-platforming means adjusting to the cloud
    by integrating current processes with those provided by the cloud. As mentioned
    in this book, Platform Engineering takes a deeper look and assesses different
    types of platforms to cross-cut across multiple outputs. One DevOps concept involves
    using the thinnest possible platform for each section. This means that while platforms
    incorporate multiple technologies, they should build on stacks that potentially
    incorporate separate platforms. The primary platform assesses software development,
    but this can be platformed multiple times to integrate with platforms for operational
    output, security, testing, or other functions. Each platform should support those
    minimal functions to remain reliable and secure and help with scalability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Repurchase**: The third alternative is repurchasing, buying another cloud
    alternative, or moving from local servers to someone else’s server. This enforces
    what can be called the three As of migration:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Access**: Having wider access to systems through cloud services.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Awareness**: Being more broadly aware of everything occurring within a space
    due to cloud tools, and VM interaction.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Abdication**: Abandoning all responsibility for elements within your platform
    by depending on cloud services to perform those functions.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Repurchasing typically occurs when users want to gain access and awareness but
    want to abdicate management responsibilities.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Retain**: This is the opposite to the repurchase option; here, we keep what
    we have. Retaining practices can benefit the lower end but creates challenges
    when scaling platforms, mainly because the additional resources are not readily
    available. It is a different order of complexity between merely purchasing additional
    storage and computing through a credit card swipe and installing new server racks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retire**: Retiring means eliminating some of the services that are no longer
    needed. It also integrates with the next option.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Refactor**: This means redesigning and rebuilding needed functions. This
    can be used as a means to enhance performance through scalability and security
    changes. One common example of refactoring involves moving from legacy to more
    modern applications, which often involves containerizing software and applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Platform Engineering solves both challenges by focusing on what elements are
    needed for a particular platform, bringing them into a common framework, and eliminating
    waste within the process. Refactoring can be critical when building a platform
    but less so when buying or renting solutions. Most commercial platform solutions
    offer various available plugins supporting a constant software stream.
  prefs: []
  type: TYPE_NORMAL
- en: Essential platform architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After considering the six Rs, and the motivation for an initial cloud transition,
    the next step is designing a platform architecture. This architecture will inform
    subsequent design by creating a workshop with space to expand and having all the
    available tools within easy reach. There are three basic designs to begin or continue
    a platform design, each focusing on developing the thinnest possible platform
    and supporting the widest customer base. The difference between the designs lies
    largely in the permanence of the proposed design. The three designs can be labeled
    simply as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Permanent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transitory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ephemeral
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following figure demonstrates the construction of these three initial architectural
    models:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_02_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5: Platform architecture samples'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at these architectures in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Permanent platform architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Permanent architecture** is designed for the long term. The goal is to design
    and operate multiple clusters that are always there for the user. The system probably
    incorporates a primary collaboration cluster, at least one development cluster,
    and a production cluster. When designing a permanent approach, users would log
    in to the collaboration cluster and then promote work and design through the other
    clusters. This approach provides a highly stable environment for testing and deploying
    code. A permanent design deprecates load balancers on the primary tools by using
    pre-determined cluster sizes within the VPCs. Operational management allows us
    to add clusters if computing or storage becomes a concern. The primary advantage
    of this architecture is known configuration and easy maintenance. Establishing
    set clusters with defined namespaces early in the process creates an opportunity
    for set training approaches. These designs use pre-determined locations and known
    clusters for all operations. Companies with well-defined software needs or static
    concerns might prefer a permanent cluster. Well-defined and stable instances can
    help reduce public cloud billing costs by closing non-required cycles.'
  prefs: []
  type: TYPE_NORMAL
- en: Permanent clusters work well for resources that are always required in set amounts.
    Building a testing platform with known resources or a security platform are excellent
    options. The permanent testing platform also has set resources that can be accessed
    to test operations or run functions across a cloud. A security cluster with this
    design provides a place to maintain security knowledge more restrictedly. A stable
    cluster design can prove more manageable to maintain RBAC permissions in the cluster,
    establish clear logs, and define some known metrics to manage operations.
  prefs: []
  type: TYPE_NORMAL
- en: Clusters designed in a permanent architecture incorporate advantages in **Representational
    State Transfer Application Programming Interfaces** (**REST APIs**), no-code applications,
    and strong relational databases. Since all the data is maintained, the cluster
    can have a wide range of potential implementations by relying on standing conversion
    and configuration across multiple toolsets. Examples include using Istio to manage
    container security across pods or a tool such as Crossplane. Crossplane extends
    existing APIs by translating all infrastructure calls into Kubernetes-native resources,
    allowing a consistent, declarative approach and reducing the need for developers
    to resolve infrastructure issues individually. This change reduces the endpoints
    users must manage during implementation. These permanent platforms tend to expand
    by maintaining known good pipelines and plug-in libraries that allow a large bench
    of additional applications. Open source tools can be rapidly integrated and used
    by everyone within the platform if a strong dependency library exists.
  prefs: []
  type: TYPE_NORMAL
- en: The disadvantage of permanent clusters is that they are difficult to change
    rapidly. Keeping these clusters aligned with new features and releases requires
    frequently using a different version of the same cluster. Feature upgrades for
    the platform that occur within the platform can be complex to access when facing
    a system crash or user issues. These issues normally result in the company maintaining
    the platform by owning a development and testing area that is distinct from the
    permanent platform. These crashes only become an issue if you are building and
    operating the platform in addition to working on the platform.
  prefs: []
  type: TYPE_NORMAL
- en: The other challenge for a permanent design is visualizing resource usage as
    fixed on the initial deployment. Although load balancers can help, in most cases,
    they are disabled to maintain stable operations across clusters. A design that
    rapidly increases the pipelines required or pulls large amounts of data on non-regular
    timelines can cause problems. For example, a system designed to find the best
    sale price on a given item might search numerous databases, including images and
    metadata. The massive pull for one application might create challenges within
    the cluster and slow other operations. The solution for these fixed designs is
    implementing a transitory design.
  prefs: []
  type: TYPE_NORMAL
- en: Transitory platform architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Transitory platform designs** only call resources when needed. These designs
    incorporate auto-scaling at multiple steps but focus on creating a known cluster
    and then adjusting those clusters as needed. Another architectural element within
    the transitory design is to limit clusters, frequently by time and usage. The
    collaboration cluster serves as the primary, stable environment within a transitory
    platform design, but it also offers the flexibility for users to spin up additional
    clusters as specific needs or workloads arise. These clusters would have an expiration
    point, such as three months, below a certain compute usage, with inactive users
    or similar metric-based decision points. For example, when working in collaboration
    on a new design, I would reach a point where I needed to deploy a segment for
    testing. I would then use a cluster launch application to launch the CI/CD function
    for 72 hours. This type of launch could promote the development into a permanent
    location within those 72 hours, but if operations remained incomplete, the cluster
    would spin back down. That can be frustrating when you are facing numerous problems.'
  prefs: []
  type: TYPE_NORMAL
- en: An advantage of transitory design is knowing the costs. You can implement a
    limit on initiated clusters and project costs through multiple quarters. Another
    advantage is that unused resources are always eliminated. These designs tend to
    be highly opinionated when creating clusters. The limited nature means fewer options
    are available for design, but it can be beneficial if you already know the defined
    workspace. Think about it as if you already know that the workshop only needs
    to produce shelves; there is no reason to maintain machinery capable of making
    bowls, birdhouses, or statues. These constraints can limit the cluster but also
    tend to make it more highly focused.
  prefs: []
  type: TYPE_NORMAL
- en: Transitory designs excel for items that are only required for a defined period,
    such as software supporting retail sales, event management, or support during
    a conference. A company may want to be able to launch many demos at a conference
    but no longer have those functions available afterward. This design ensures that
    those additional clusters will disappear when they are no longer needed. The first
    disadvantage is that everything constructed on those clusters will eventually
    disappear. While the code may be maintained, the specific aspects during operations
    will no longer be present. You may implement a transitory approach to a testing
    cluster; when you call a test, the cluster running those operations will run the
    tests, pass the data, and then shut down. These operational guidelines can be
    beneficial for managing resources.
  prefs: []
  type: TYPE_NORMAL
- en: A second disadvantage of a transitory cluster can be in managing operations.
    Although you know the cluster will eventually quit, setting those parameters can
    be difficult. If the parameters are set too high, you could just as easily use
    a permanent architecture; if the parameters are too low, then the needed work
    will remain incomplete. Users can become highly aggravated if all the required
    work disappears at the penultimate step, and they must return to the beginning
    of the process. This aggravation can also happen with transitory security platforms
    when the scans are designed to launch from those clusters. Sometimes, the artifacts
    are lost if the cluster quits before the security tool concludes.
  prefs: []
  type: TYPE_NORMAL
- en: Ephemeral platform architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A third architectural model is **ephemeral design**. Similar to transitory design,
    this sets up a cluster that will eventually disappear. Unlike the set guidelines
    for a transitory approach, ephemeral clusters take advantage of flexible load
    balancing. Ephemeral clusters are only designed to build on commit and then have
    a set expiration. Whether you are using a development, testing, operations, or
    security platform, these clusters spin up to complete a task and remove themselves.
    This cluster creation allows any user to create any number of clusters at any
    point as deployment targets but uses a metric like active users to decide when
    to terminate operations.
  prefs: []
  type: TYPE_NORMAL
- en: One key to using ephemeral clusters is ensuring that logging functions report
    to the collaboration cluster. Any data associated with that cluster disappears,
    so any long-term metrics or evaluations need to be reported elsewhere. You can
    see the advantage of running an operations platform ephemerally that spins up
    clusters to check performance, reports results, and then deprecates to minimize
    cloud usage. This is best suited to customers with tight budgets or those who
    are unsure what may be part of a future spending plan.
  prefs: []
  type: TYPE_NORMAL
- en: Ephemeral clusters are best suited for those at either end of the experience
    spectrum. For those with minimal experience, using a platform with an ephemeral
    design can allow you to explore platform properties without full commitment. Conversely,
    those who know exactly what they want, and for how long, can effectively use ephemeral
    platforms to control costs. One challenge is that each user must know exactly
    what they want. In the permanent approach, an operations team sets the deployment
    targets; in the transitory approach, a hybrid approach between an operations team
    and individual users probably exists; in the ephemeral architecture, each user
    sets their own needs. This challenge could be mitigated by having templates for
    various ephemeral clusters. However, setting templates too broadly leads us back
    into designing an ephemeral cluster and operationally running those functions
    in a transitory approach.
  prefs: []
  type: TYPE_NORMAL
- en: The ephemeral design maximizes many of the DevOps concepts in creating high
    availability, low coupling, and easy configuration changes. These designs are
    not suited to a production environment as they do not tend to last long enough.
    Low coupling emerges as every transitory environment contains all the elements
    necessary to move forward.
  prefs: []
  type: TYPE_NORMAL
- en: Each architectural design provides some benefits and some challenges. As a personal
    approach, I would use a permanent structure for internal development and operations,
    a transitory design for testing and security, and then an ephemeral platform for
    research and development. Each organization has its own needs and requirements.
    Understanding the difference between the structures allows you to quickly identify
    the tasks needed. These can be incorporated to consider the tools needed, ingress
    and egress pathways, and version changes.
  prefs: []
  type: TYPE_NORMAL
- en: When implemented through a platform, the other beneficial aspect of these architectures
    is the ability to structure for self-service. Understanding the base architecture
    and then working with a generative AI structure later allows each user to support
    their own needs through platforms at multiple levels. The more well-defined the
    architecture, the greater the capability for automated assistants to help. This
    increases the amount of work completed and reduces the toil from everyday tasks
    that must be accomplished multiple times.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter began by explaining the key architectural concepts required to
    implement Platform Engineering. You start with the SOLID principles and then expand
    those functions as required for a platform. Platforms are relatively simple, with
    the basic architecture comprising collaborative clusters and deployment targets.
    Integrating those concepts allows you to maximize DevOps cultural constructions
    to obtain consistent and repeated quality.
  prefs: []
  type: TYPE_NORMAL
- en: An initial architecture can then be positioned to optimize scalability, resilience,
    and security. Scalability facilitates the adjustment of resource usage in either
    direction to maximize profit instead of spinning clusters without value. Resilient
    constructions ensure those platforms can perform when faced with external changes
    from buggy code, constantly changing dependencies, and even physical disasters.
    Secure platforms are a must for any operator in the modern digital landscape.
    Information may want to be free, but we must also prioritize protecting customer
    data from unethical use. We also must be able to secure our own intellectual property
    to protect long-term profits.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, all the architectural concepts were integrated into moving to cloud-native
    solutions and then deploying a permanent, transitory, or ephemeral structure to
    our platform. Each option scales differently, incorporating resilience and demonstrating
    security. These platforms can be implemented for development functions, security
    tasks, operational needs, or testing various constructions.
  prefs: []
  type: TYPE_NORMAL
- en: 'These designs lead us to the next step: determining whether the existing culture
    can support a platform transformation. After all, DevOps is a cultural solution,
    not just a technical one, so the next chapter covers determining the best-fit
    cultures and leadership strategies to adapt fully to platform-engineered success.'
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Malik, U. (2024) *Provisioning an Amazon EKS Cluster* *with Terraform.*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
