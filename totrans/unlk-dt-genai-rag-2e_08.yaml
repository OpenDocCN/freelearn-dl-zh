- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Interfacing with RAG and Gradio
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与 RAG 和 Gradio 的接口
- en: In almost all cases, **retrieval-augmented generation** (**RAG**) development
    involves the creation of one or more applications, or *apps* for short. When coding
    RAG apps initially, you will often create a variable in your code that represents
    a prompt or some other type of input that, in turn, represents what the RAG pipeline
    will work from. But is that how future users will use the app you are building?
    How do you test this with these users using your code? You need an interface!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎在所有情况下，**检索增强生成**（**RAG**）开发都涉及创建一个或多个应用程序，或简称为 *app*。在最初编码 RAG 应用程序时，您通常会创建一个变量，该变量代表一个提示或其他类型的输入，反过来，它代表
    RAG 管道将从中工作的内容。但这是否就是未来用户将使用您构建的应用程序的方式？您如何使用您的代码与这些用户进行测试？您需要一个界面！
- en: In this chapter, we will provide a practical guide to making your application
    interactive with RAG using **Gradio** as a **user interface** (**UI**). It covers
    setting up the Gradio environment, integrating RAG models, creating a user-friendly
    interface that allows users to use your RAG system like a typical web application,
    and hosting it online in a permanent and free space. You will learn how to quickly
    prototype and deploy RAG-powered applications, enabling end users to interact
    with AI models in real time.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将提供一份实用指南，教您如何使用 **Gradio** 作为 **用户界面**（**UI**）来使您的应用程序与 RAG 交互。它涵盖了设置
    Gradio 环境、集成 RAG 模型、创建一个用户友好的界面，使用户能够像使用典型的网络应用程序一样使用您的 RAG 系统，并在永久且免费的在线空间中托管它。您将学习如何快速原型设计和部署
    RAG 驱动的应用程序，使最终用户能够实时与 AI 模型交互。
- en: There are entire books written on how to build an interface, and there are many
    places you can provide an interface, such as in a web browser or through a mobile
    app. But luckily, using Gradio, we can provide you with an easy way to offer an
    interface for your RAG-based app, without having to do extensive web or mobile
    development. While this is no substitute for a full production application interface,
    this does make it easier to share and demo your app(s).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何构建界面的书籍已经有很多，你可以在很多地方提供界面，比如在网页浏览器或通过移动应用。但幸运的是，使用 Gradio，我们可以为您提供一种简单的方式来为您的基于
    RAG 的应用程序提供界面，而无需进行广泛的网页或移动开发。虽然这不能替代完整的生产应用程序界面，但这确实使共享和演示您的应用程序变得更加容易。
- en: 'In the chapter, we will specifically cover the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将具体涵盖以下主题：
- en: Why Gradio?
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么选择 Gradio？
- en: Benefits of using Gradio
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Gradio 的好处
- en: Limitations to using Gradio
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Gradio 的局限性
- en: Code lab – adding a Gradio interface
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 – 添加 Gradio 界面
- en: Let’s first discuss why Gradio is an important part of your RAG development
    efforts.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先讨论一下为什么 Gradio 是您 RAG 开发努力中的重要部分。
- en: Technical requirements
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter is here: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_06](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_06).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码在此：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_06](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_06)。
- en: Why Gradio?
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么选择 Gradio？
- en: Up until this point, we have focused on topics that are typically relegated
    to the world of data science. **Machine learning** (**ML**), **natural language
    processing** (**NLP**), **generative artificial intelligence** (**generative AI**),
    **large language models** (**LLMs**), and RAG are technologies that require significant
    expertise and often take up enough time that we are not able to build expertise
    in other technical areas, such as working with web technologies and building web
    frontends. **Web development** is a highly technical field in its own right and
    requires significant experience and expertise to implement successfully.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直关注的是通常属于数据科学领域的话题。**机器学习**（**ML**）、**自然语言处理**（**NLP**）、**生成式人工智能**（**generative
    AI**）、**大型语言模型**（**LLMs**）和 RAG 是需要大量专业知识的技术，而且通常需要足够的时间，以至于我们无法在其他技术领域，如网页技术和构建网页前端，建立专业知识。**网页开发**是一个高度技术化的领域，需要丰富的经验和专业知识才能成功实施。
- en: However, with RAG, it can be very helpful to have a UI, especially if you want
    to test it or demonstrate it to potential users. How can we provide that if we
    do not have the time to learn web development?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用 RAG 时，拥有一个 UI 非常有帮助，尤其是如果您想测试它或向潜在用户展示它。如果我们没有时间学习网页开发，我们如何提供这样的界面呢？
- en: That is the primary reason why many data scientists, including myself, use Gradio.
    It allows you to get a UI up and running very quickly (relative to building a
    web frontend) in a shareable format and even with some basic authentication features.
    This is not going to put any web developers out of a job, as Gradio would not
    be a great choice if you wanted to turn your RAG application into a fully-fledged,
    robust website. But what it will do is allow you, as someone with very limited
    time to build a website, to get a UI that is well-suited to RAG applications up
    and running within minutes!
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么许多数据科学家，包括我自己，使用Gradio的主要原因。它允许您以可分享的格式快速搭建用户界面（相对于构建网页前端），甚至带有一些基本的身份验证功能。这不会让任何网页开发者失业，因为如果您想将您的RAG应用程序转变为一个功能齐全、稳健的网站，Gradio将不是一个很好的选择。但它将允许您，作为一个时间非常有限来构建网站的人，在几分钟内搭建一个非常适合RAG应用程序的用户界面并投入使用！
- en: As the idea here is to allow you to keep most of your focus on RAG development
    rather than web development, we are going to streamline our discussion about Gradio
    to just the components that will help you get your RAG application on the web
    and shareable. However, as your RAG development continues, we encourage you to
    further investigate the capabilities of Gradio to see whether there is anything
    else that it can do for your specific efforts!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这里的想法是让您将大部分精力集中在RAG开发上，而不是网页开发上，我们将简化对Gradio的讨论，仅讨论那些有助于您将RAG应用程序部署到网络并使其可分享的组件。然而，随着您的RAG开发继续进行，我们鼓励您进一步调查Gradio的功能，看看是否还有其他可以为您特定的努力提供帮助的地方！
- en: With that in mind, let’s talk about the main benefits of Gradio when building
    a RAG application.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们来谈谈Gradio在构建RAG应用程序时的主要好处。
- en: Benefits of using Gradio
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Gradio的好处
- en: Besides being really easy to use for non-web developers, Gradio has many advantages.
    Gradio’s core library is open source, which means developers can freely use, modify,
    and contribute to the project. Gradio integrates well with widely used ML frameworks,
    such as **TensorFlow**, **PyTorch**, and **Keras**. In addition to the open source
    library, it offers a hosted platform where developers can deploy their model interfaces
    and manage access. It also includes features that facilitate collaboration among
    teams working on ML projects, such as sharing interfaces and collecting feedback.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 除了对非网页开发者来说非常容易使用之外，Gradio还有很多优点。Gradio的核心库是开源的，这意味着开发者可以自由地使用、修改并为项目做出贡献。Gradio与广泛使用的机器学习框架，如**TensorFlow**、**PyTorch**和**Keras**，集成良好。除了开源库之外，它还提供了一个托管平台，开发者可以在平台上部署他们的模型接口并管理访问权限。它还包括一些有助于在从事机器学习项目的团队之间协作的功能，例如共享接口和收集反馈。
- en: Another exciting feature of Gradio is that it integrates well with **Hugging
    Face**. Hugging Face has a lot of resources meant to support the generative AI
    community, such as model sharing and dataset hosting. One of the resources is
    the ability to set up a permanent link to your Gradio demo on the internet, using
    **Hugging Face Spaces**. Hugging Face Spaces provides the infrastructure to permanently
    host your machine learning model for free! Take a look at the Hugging Face website
    to find out more about their Spaces.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Gradio的另一个令人兴奋的功能是它与**Hugging Face**集成良好。Hugging Face拥有许多旨在支持生成式AI社区的资源，例如模型共享和数据集托管。这些资源之一是能够使用**Hugging
    Face Spaces**在互联网上设置指向您的Gradio演示的永久链接。Hugging Face Spaces提供了永久免费托管您的机器学习模型的基础设施！请访问Hugging
    Face网站以了解更多关于他们的Spaces的信息。
- en: There are also some limitations to using Gradio when it comes to using it for
    your RAG application, and it is important to know what those are.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用Gradio为您的RAG应用程序服务时，也存在一些限制，了解这些限制是很重要的。
- en: Limitations to using Gradio
  id: totrans-23
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Gradio的限制
- en: Probably the most important thing to keep in mind with Gradio is that it does
    not provide adequate support for building a production-level app that will be
    interfacing with hundreds, thousands, or even millions of users. In this case,
    you probably want to hire someone with expertise in building frontends for large-scale
    production-level applications. But for what we call a **proof-of-concept** (**POC**)
    type of app, or to build something that allows you to test out your app with users
    with basic interactivity and functionality, Gradio does a fantastic job.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Gradio 时，最需要记住的一点是它并不提供足够的支持来构建一个将与其他数百、数千甚至数百万用户交互的生产级应用。在这种情况下，你可能需要雇佣一个在构建大规模生产级应用前端方面有专业知识的人。但对于我们所说的**概念验证**（**POC**）类型的应用，或者构建允许你测试具有基本交互性和功能的应用，Gradio
    做得非常出色。
- en: Another limitation that you may come across when using Gradio for RAG applications
    is the lack of flexibility in what you can build. For many RAG applications, especially
    when building a POC, this will not be an issue. But if you or your users start
    demanding more sophisticated UI features, Gradio is going to be much more limiting
    than a full web development framework. Not only is it good for you to understand
    this, but it is also good to set these expectations with your users, helping them
    understand that this is only meant for a simple demo application.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Gradio 进行 RAG 应用时，你可能会遇到的一个局限性是你能构建的内容缺乏灵活性。对于许多 RAG 应用，尤其是在构建原型时，这不会成为一个问题。但如果你或你的用户开始要求更复杂的
    UI 功能，Gradio 相比于完整的 Web 开发框架将会受到更多的限制。不仅了解这一点对你有益，而且与用户设定这些期望也很重要，帮助他们理解这只是一个简单的演示应用。
- en: Let’s dive right into the code and walk through how Gradio can give your RAG
    application the interface it deserves.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直接进入代码，看看 Gradio 如何为你的 RAG 应用提供应有的界面。
- en: Code lab – adding a Gradio interface
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 – 添加 Gradio 接口
- en: 'This code picks up right where we left off in [*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103),
    except for the last set of lines representing the prompt probe attack. As we have
    at the beginning of all of our code labs, we are going to start with installing
    a new package, which is, of course, Gradio! We are also going to uninstall `uvloop`,
    because of a conflict with our other packages:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码从我们在[*第五章*](B34736_05_ePub.xhtml#_idTextAnchor103)中停止的地方继续，除了最后一组代表提示探针攻击的行。正如我们在所有的代码实验室开始时做的那样，我们将从安装一个新的包开始，当然，这个包就是
    Gradio！我们还将卸载 `uvloop`，因为它与我们的其他包冲突：
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The first line installs Gradio itself, which is the UI framework we will use
    throughout this chapter. The second line installs `nest_asyncio`, a utility package
    that patches Python’s `asyncio` module to allow nested event loops. This is necessary
    because Jupyter notebooks already run their own event loop, and Gradio needs to
    run another one inside it. Without `nest_asyncio`, you would encounter a “`RuntimeError:
    This event loop is already running`" error when trying to launch your Gradio interface.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '第一行安装了 Gradio 本身，这是我们将在本章中使用的 UI 框架。第二行安装了 `nest_asyncio`，这是一个实用程序包，它修复了 Python
    的 `asyncio` 模块，以允许嵌套事件循环。这是必要的，因为 Jupyter 笔记本已经运行了自己的事件循环，而 Gradio 需要在其中运行另一个事件循环。如果没有
    `nest_asyncio`，当你尝试启动你的 Gradio 接口时，你会遇到“`RuntimeError: This event loop is already
    running`”错误。'
- en: The third line uninstalls `uvloop`, which is a high-performance event loop that
    some packages install as a dependency. While uvloop is excellent for production
    servers, it conflicts with the nested event loop approach we need in Jupyter notebooks.
    By removing it, we ensure that Python falls back to the standard asyncio event
    loop, which `nest_asyncio` can properly patch.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 第三行卸载了 `uvloop`，这是一个高性能的事件循环，一些包将其作为依赖项安装。虽然 uvloop 对于生产服务器来说非常出色，但它与我们在 Jupyter
    笔记本中需要嵌套事件循环的方法冲突。通过移除它，我们确保 Python 回退到标准的 asyncio 事件循环，而 `nest_asyncio` 可以正确地修复它。
- en: 'Next, we will add multiple packages to the list of imports:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将向导入列表中添加多个包：
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: These lines configure the event loop environment that Gradio needs to run inside
    a Jupyter notebook. First, we import `asyncio`, Python’s built-in library for
    asynchronous programming, and `nest_asyncio`, which we installed earlier. The
    `asyncio.set_event_loop_policy(asyncio.DefaultEventLoopPolicy())` line ensures
    that Python uses its standard event loop rather than any alternative that might
    have been configured. The `nest_asyncio.apply()` line activates the patching we
    discussed in the installation section, enabling nested event loops. Finally, we
    import the `gradio` package and assign it the `gr` alias for convenience, which
    is the standard convention in Gradio documentation and examples.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行配置了 Gradio 运行在 Jupyter 笔记本中所需的事件循环环境。首先，我们导入 `asyncio`，Python 的内置异步编程库，以及我们之前安装的
    `nest_asyncio`。`asyncio.set_event_loop_policy(asyncio.DefaultEventLoopPolicy())`
    这一行确保 Python 使用其标准事件循环而不是任何可能配置的替代方案。`nest_asyncio.apply()` 这一行激活了我们在安装部分讨论的补丁，使嵌套事件循环成为可能。最后，我们导入
    `gradio` 包并将其分配给 `gr` 别名以方便使用，这是 Gradio 文档和示例中的标准约定。
- en: 'After adding the imports, we only need to add this code at the end of the existing
    code to set up our Gradio interface:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在添加导入之后，我们只需在现有代码的末尾添加此代码来设置我们的 Gradio 接口：
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The `process_question` function is the function that is invoked when you hit
    the **Submit** button. You will define this invocation in the `gr.Interface` code,
    but this is the function that is called and processed. The `process_question`
    function takes the question you submit as a user as input and processes it using
    our RAG pipeline. It invokes the `rag_chain_with_source` object with the given
    question and retrieves the relevance score, final answer, and sources from the
    result. The function then joins the sources into a comma-separated string and
    returns the relevance score, final answer, and source list.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`process_question` 函数是在您点击 **提交** 按钮时被调用的函数。您将在 `gr.Interface` 代码中定义此调用，但这是被调用和处理的函数。`process_question`
    函数接受用户提交的问题作为输入，并使用我们的 RAG 流程处理它。它使用给定的问题调用 `rag_chain_with_source` 对象，并从结果中检索相关性得分、最终答案和来源。然后函数将来源连接成一个以逗号分隔的字符串，并返回相关性得分、最终答案和来源列表。'
- en: 'Next, we will set up an instance of the Gradio interface:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将设置 Gradio 接口的实例：
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `demo = gr.Interface(...)` line is where the Gradio magic happens. It creates
    a Gradio interface using the `gr.Interface` function. The `fn` parameter specifies
    the function to be called when the user interacts with the interface, which is
    what we mentioned in the last paragraph, calling `process_question` and kicking
    off the RAG pipeline. The inputs parameter defines the input component of the
    interface, which is `gr.Textbox` for entering the question. The outputs parameter
    defines the output components of the interface, which are three `gr.Textbox` components
    for displaying the relevance score, final answer, and sources. The title and description
    parameters set the title and description of the interface.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '`demo = gr.Interface(...)` 这一行是 Gradio 魔法的所在。它使用 `gr.Interface` 函数创建一个 Gradio
    接口。`fn` 参数指定了当用户与接口交互时要调用的函数，这正是我们在上一段中提到的，调用 `process_question` 并启动 RAG 流程。`inputs`
    参数定义了接口的输入组件，用于输入问题，即 `gr.Textbox`。`outputs` 参数定义了接口的输出组件，包括三个 `gr.Textbox` 组件，用于显示相关性得分、最终答案和来源。`title`
    和 `description` 参数设置了接口的标题和描述。'
- en: To stop the Gradio server and regain control of your notebook, you have a few
    options. In Jupyter Notebook or JupyterLab, click the **Interrupt Kernel** button
    (the square stop icon) in the toolbar. In Google Colab, click the **Stop** button
    that appears next to the running cell. You can also call `gr.close_all()` from
    another cell if you have multiple Gradio interfaces running, though you will need
    to interrupt the kernel first to be able to run that cell. Once you stop the server,
    the public URL will no longer work, and users will see an error if they try to
    access it.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 要停止 Gradio 服务器并重新控制您的笔记本，您有几个选择。在 Jupyter Notebook 或 JupyterLab 中，点击工具栏中的 **中断内核**
    按钮（正方形停止图标）。在 Google Colab 中，点击运行单元格旁边的 **停止** 按钮。如果您有多个 Gradio 接口正在运行，您还可以从另一个单元格中调用
    `gr.close_all()`，尽管您需要先中断内核才能运行该单元格。一旦停止服务器，公共 URL 将不再工作，如果用户尝试访问它，将会看到错误。
- en: 'The only action left to take is to launch the interface:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的唯一操作就是启动接口：
- en: '[PRE4]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The `demo.launch(share=True, debug=True)` line launches the Gradio interface.
    The `share=True` parameter enables the sharing feature of Gradio, generating a
    publicly accessible URL that you can share with others to access your interface.
    Gradio uses a tunneling service to provide this functionality, allowing anyone
    with the URL to interact with your interface without needing to run the code locally.
    The `debug=True` parameter configures Gradio to run in a debugging configuration,
    providing additional information and tools for debugging and development. With
    this setting enabled, Gradio displays detailed error messages in the browser console
    if any errors occur during the execution of the `process_question` function, making
    it easier to identify and fix issues in your code.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '`demo.launch(share=True, debug=True)`这一行将启动Gradio界面。`share=True`参数启用了Gradio的共享功能，生成一个公开可访问的URL，您可以将它与他人分享以访问您的界面。Gradio使用隧道服务提供此功能，允许任何拥有URL的人无需在本地运行代码即可与您的界面交互。`debug=True`参数配置Gradio以调试配置运行，提供额外的调试和开发信息及工具。启用此设置后，如果`process_question`函数执行期间发生任何错误，Gradio将在浏览器控制台中显示详细的错误消息，这使得识别和修复代码中的问题更加容易。'
- en: I consider `demo.launch(share=True, debug=True)` to be a special line of code
    compared to all of the other code we’ve written in this book. This is because
    it does something you haven’t seen before; it calls on Gradio to start a local
    web server to host the interface defined by `gr.Interface(...)`. When you run
    the cell, you will notice that it continues to run in perpetuity until you stop
    it. You will also notice that you cannot run any other cells without stopping
    it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为`demo.launch(share=True, debug=True)`与我们在本书中编写的所有其他代码相比，是一行特殊的代码。这是因为它做了您之前没有看到的事情；它调用Gradio启动一个本地Web服务器来托管由`gr.Interface(...)`定义的界面。当您运行单元格时，您会注意到它将持续运行，直到您停止它。您还会注意到，如果不停止它，您无法运行任何其他单元格。
- en: 'There is one more optional parameter we want to make you aware of: the `auth`
    parameter. You add it to the `demo.launch` function like this:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还想让您了解一个可选参数：`auth`参数。您可以将它添加到`demo.launch`函数中，如下所示：
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This will add a simple level of authentication, in case you are sharing your
    application publicly. It generates an extra interface that requires the `username
    (admin)` and `password (pass1234)` that you add to it. Change admin and pass1234
    to whatever you want, but definitely change them! Share those credentials with
    only the users you want to have access to your RAG application.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这将为您的应用程序提供简单的认证级别，以防您公开分享应用程序。它将生成一个额外的界面，该界面需要您添加的`用户名（admin）`和`密码（pass1234）`。将admin和pass1234更改为您想要的任何内容，但绝对要更改它们！仅将这些凭据分享给您希望访问您的RAG应用程序的用户。
- en: Keep in mind that this authentication mechanism has significant limitations.
    The credentials are transmitted and stored in plain text, meaning anyone who can
    see your code or network traffic can see the password. There is no encryption
    of the credentials themselves, no protection against brute-force attacks, no account
    lockout after failed attempts, and no session timeout. Additionally, anyone you
    share the credentials with can share them further, and you have no way to track
    who is actually using the application. For a POC demo shared with a small trusted
    group, this level of security is acceptable. However, for any application handling
    sensitive data or exposed to a broader audience, you would want to implement proper
    authentication through a production web framework with features such as hashed
    passwords, HTTPS, rate limiting, and user management.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这种认证机制有显著的局限性。凭据以纯文本形式传输和存储，这意味着任何可以查看您的代码或网络流量的人都可以看到密码。凭据本身没有加密，没有针对暴力攻击的保护，没有在失败尝试后的账户锁定，也没有会话超时。此外，您与任何人共享的凭据都可以进一步共享，您无法追踪实际使用应用程序的人。对于与小型受信任群体共享的POC演示，这种安全级别是可以接受的。然而，对于处理敏感数据或面向更广泛受众的应用程序，您希望通过具有哈希密码、HTTPS、速率限制和用户管理等功能的生成Web框架实现适当的认证。
- en: 'Now, you have an active web server that takes input, processes it, and will
    react and return new interface elements based on the code you have written for
    your Gradio interface. This is something that used to require significant expertise
    in web development, but now you can have it up and running in minutes! This lets
    you focus on what you want to focus on: writing the code for your RAG application!'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你有一个活跃的 web 服务器，它可以接收输入，处理它，并根据你为 Gradio 界面编写的代码来响应并返回新的界面元素。这曾经需要显著的 web
    开发专业知识，但现在你可以在几分钟内将其设置并运行！这让你可以专注于你想要关注的事情：编写你的 RAG 应用程序的代码！
- en: Once you have run the Gradio code in this cell, the interface becomes interactive,
    allowing users to enter questions in the input textbox. As we described previously,
    when a user submits a question, the `process_question` function is called with
    the user’s question as input. The function invokes a RAG pipeline, `rag_chain_with_source`,
    with the question and retrieves the relevance score, final answer, and sources
    from the result. It then returns the relevance score, final answer, and source
    list. Gradio updates the output textboxes with the returned values, displaying
    the relevance score, final answer, and sources to the user.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你在单元格中运行了 Gradio 代码，界面就变得交互式，允许用户在输入框中输入问题。正如我们之前所描述的，当用户提交一个问题，`process_question`
    函数被调用，并以用户的问题作为输入。该函数调用一个 RAG 管道 `rag_chain_with_source`，并从结果中检索相关性得分、最终答案和来源。然后它返回相关性得分、最终答案和来源列表。Gradio
    使用返回的值更新输出文本框，向用户显示相关性得分、最终答案和来源。
- en: The interface remains active and responsive until the cell execution completes
    or until `gr.close_all()` is called to close all active Gradio interfaces.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 界面保持活跃和响应，直到单元格执行完成或直到调用 `gr.close_all()` 来关闭所有活跃的 Gradio 界面。
- en: 'Ultimately, when you run this notebook cell with Gradio code, you will end
    up with an interface that looks like *Figure 6.1*. You can display the Gradio
    interface right in your notebook, as well as on a full web page from a link that
    will be provided when you run the cell:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，当你运行这个笔记本单元格中的 Gradio 代码时，你将得到一个看起来像 *图 6.1* 的界面。你可以在笔记本中显示 Gradio 界面，也可以在运行单元格时提供的链接指向的完整网页上显示：
- en: '![Figure 6.1 – Gradio interface](img/B34736_06_01.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.1 – Gradio 界面](img/B34736_06_01.png)'
- en: Figure 6.1 – Gradio interface
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.1 – Gradio 界面
- en: 'We have pre-filled this question: What are the advantages of using RAG?. However,
    you can change that question and ask something else. As we discussed in the last
    chapter, if it is not relevant to the contents of the database, the LLM should
    respond with “I don’t know.” We encourage you to try it out with both relevant
    and irrelevant questions! See whether you can find a situation that does work
    as expected to improve your debugging skills.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经预先填充了这个问题：使用 RAG 的优点是什么？然而，你可以更改这个问题并询问其他内容。正如我们在上一章中讨论的，如果它与数据库的内容不相关，LLM
    应该回答“我不知道。”我们鼓励你尝试使用相关和不相关的问题！看看你是否能找到一个按预期工作的场景来提高你的调试技能。
- en: 'Above this interface in your notebook, you will likely see text that looks
    similar to this:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的笔记本中，这个界面上方你可能会看到类似这样的文本：
- en: '[PRE6]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Clicking on that link should provide you with a view of the interface in its
    own browser window! It will look just like *Figure 6.1*, but it will take up the
    entire browser window.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 点击该链接应该在它自己的浏览器窗口中提供你界面视图！它看起来就像 *图 6.1*，但它将占据整个浏览器窗口。
- en: 'Hitting the **Submit** button kicks off the RAG process in your code, passing
    what you enter as the question into the LangChain chain with `result = rag_chain_with_source.invoke(question)`
    and returning a response after waiting a few moments. The resulting interface
    should look similar to *Figure 6.2*:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 **提交** 按钮会在你的代码中启动 RAG 流程，将你输入的内容作为问题传递给 LangChain 链，使用 `result = rag_chain_with_source.invoke(question)`
    并等待片刻后返回一个响应。生成的界面应该看起来类似于 *图 6.2*：
- en: '![Figure 6.2 – Gradio interface with response](img/B34736_06_02.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.2 – 带有响应的 Gradio 界面](img/B34736_06_02.png)'
- en: Figure 6.2 – Gradio interface with response
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.2 – 带有响应的 Gradio 界面
- en: Let’s talk about a few things that are happening in this interface when the
    response comes back from the LLM. It starts with the relevance score, which is
    what we added in [*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103) when using
    an LLM to determine the relevance of the question as a security measure to block
    prompt injections. In an application that you present to your users, this likely
    will not be displayed, but it is shown here as an example of showing additional
    information alongside your LLM response.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈当LLM返回响应时，在这个界面中发生的一些事情。它从相关性得分开始，这是我们使用LLM确定问题的相关性作为安全措施以阻止提示注入时在[*第五章*](B34736_05_ePub.xhtml#_idTextAnchor103)中添加的。在你向用户展示的应用中，这很可能不会显示，但在这里作为显示与你的LLM响应一起显示额外信息的示例。
- en: Speaking of the LLM response, **Final Answer** from ChatGPT-4 was already formatted
    in a way that it displays with markup. Gradio will automatically use the line
    breaks from that markup and display the text accordingly, splitting up the paragraphs
    in this case.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 谈到LLM的响应，ChatGPT-4的**最终答案**已经以标记的方式格式化，以便显示。Gradio将自动使用该标记的换行符并相应地显示文本，在这种情况下，将段落分割开来。
- en: Lastly, the sources are a list of four sources, indicating that there were four
    sources returned in the retriever. This comes from the code we set up in [*Chapter
    3*](B34736_03_ePub.xhtml#_idTextAnchor064) when we added the ability to carry
    the sources of the retrieved results forward in the metadata so that we have it
    available for display in the UI. We are finally seeing the results of this effort
    here in *Chapter 6*, now that we have a UI to show! You may have noticed that
    all four sources are the same. This is a result of this being a small example,
    where we only pull in one source of data.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，来源是一个包含四个来源的列表，表明检索器返回了四个来源。这来自于我们在[*第三章*](B34736_03_ePub.xhtml#_idTextAnchor064)中设置的代码，当时我们添加了将检索结果来源携带到元数据中的功能，以便我们在UI中显示它。现在我们终于在这里看到了这项工作的结果，即在*第六章*中，因为我们有一个可以显示的UI！你可能已经注意到，所有四个来源都是相同的。这是由于这是一个小示例，我们只拉入了一个数据来源。
- en: In most applications, you will likely pull in many more sources of information
    to your data, and there will be more sources listed in that list. If you add more
    sources of data to this code that are relevant to the question asked, you should
    see them appear in this list of sources.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数应用中，你可能会将更多的信息来源拉入你的数据中，并且那个列表中会有更多的来源。如果你向这段代码中添加更多与所提问题相关的数据来源，你应该会看到它们出现在这个来源列表中。
- en: Summary
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we went through a practical guide on creating interactive applications
    using RAG and Gradio as the UI. We covered setting up the Gradio environment,
    integrating RAG models, and creating a user-friendly interface that allows users
    to interact with the RAG system like a typical web application. Developers can
    quickly prototype and deploy RAG-powered applications, enabling end users to interact
    with RAG pipelines in real time.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了一个使用RAG和Gradio作为UI创建交互式应用的实用指南。我们涵盖了设置Gradio环境、集成RAG模型以及创建一个用户友好的界面，使用户能够像使用典型Web应用一样与RAG系统交互。开发者可以快速原型设计和部署RAG驱动的应用，使最终用户能够实时与RAG管道交互。
- en: We also discussed the benefits of using Gradio, such as its open source nature,
    integration with popular ML frameworks, and collaboration features, and Gradio’s
    integration with Hugging Face, which provides resources for the generative AI
    community, including the ability to host Gradio demos permanently and for free
    using Hugging Face Spaces.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还讨论了使用Gradio的好处，例如其开源性质、与流行的ML框架的集成以及协作功能，以及Gradio与Hugging Face的集成，为生成式AI社区提供资源，包括使用Hugging
    Face Spaces永久和免费托管Gradio演示的能力。
- en: With the code lab, we learned how to add a Gradio interface to a RAG application.
    We created the Gradio interface using `gr.Interface`, specifying the input and
    output components, title, and description. We launched the interface with `demo.launch()`,
    which starts a local web server to host the interface. This involved creating
    a `process_question` function that invokes the RAG pipeline with the user’s question
    and retrieves the relevance score, final answer, and sources from the result.
    This process reflects on the Gradio interface, allowing users to enter questions
    and receive the relevance score, final answer, and sources returned by the RAG
    system.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码实验室中，我们学习了如何将 Gradio 接口添加到 RAG 应用程序中。我们使用 `gr.Interface` 创建了 Gradio 接口，指定了输入和输出组件、标题和描述。我们通过
    `demo.launch()` 启动了接口，这会启动一个本地网络服务器来托管接口。这涉及到创建一个 `process_question` 函数，该函数调用
    RAG 管道并使用用户的问题检索相关性分数、最终答案和来源。这个过程反映在 Gradio 接口中，使用户能够输入问题并接收 RAG 系统返回的相关性分数、最终答案和来源。
- en: The chapter also discussed how the sources are carried forward from the retriever
    and displayed in the UI, showcasing the effort put into adding this functionality
    in previous chapters.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还讨论了如何将来源从检索器传递到 UI 中显示，展示了在前面章节中添加此功能所付出的努力。
- en: This was just an introduction to Gradio, though. We encourage you to go to the
    Gradio website ([https://www.gradio.app/](https://www.gradio.app/)) and walk through
    their **Quickstart** guide and their documentation to learn all the other important
    functionality their platform provides.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是对 Gradio 的一个简单介绍。我们鼓励您访问 Gradio 网站 ([https://www.gradio.app/](https://www.gradio.app/))，浏览他们的**快速入门**指南和文档，以了解他们平台提供的所有其他重要功能。
- en: In the next chapter, we will explore the critical role that vectors and vector
    stores play in enhancing RAG systems.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨向量和向量存储在增强 RAG 系统中扮演的关键角色。
