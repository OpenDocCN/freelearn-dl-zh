- en: To get the most out of this book
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*While the the authors made an effort to make this book usable to the broadest
    possible audience, it does assume a basic understanding of Salesforce, the use
    epics and user stories, and how software projects are run. If you are at the very
    beginning of your Salesforce journey, we would recommend that you spend some time
    on the Salesforce Trailhead* *site:* [https://trailhead.salesforce.com/](https://trailhead.salesforce.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Software/hardware covered in** **the book** | **Operating** **system requirements**
    |'
  prefs: []
  type: TYPE_TB
- en: '| Web Browser | Windows, MacOS, Linux |'
  prefs: []
  type: TYPE_TB
- en: '| Salesforce |  |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT |  |'
  prefs: []
  type: TYPE_TB
- en: '**For Salesforce, the latest stable version of Chrome is recommended.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatGPT will work on Chrome as well.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**If you do not have access to a Salesforce org, you can signup for a free
    one here:** [https://developer.salesforce.com/signup](https://developer.salesforce.com/signup)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**If you do not have access to ChatGPT, you can signup for a free account here:**
    [https://chat.openai.com/auth/login](https://chat.openai.com/auth/login)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Disclaimer
  prefs: []
  type: TYPE_NORMAL
- en: This book has been created by authors, technical experts, and a professional
    publishing team. We use many tools, including cutting-edge AI such as ChatGPT,
    to create the best possible material for our readers to help them on their IT
    journey.
  prefs: []
  type: TYPE_NORMAL
- en: Conventions used
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are a number of text conventions used throughout this book.
  prefs: []
  type: TYPE_NORMAL
- en: '`Code in text`: Indicates code words in text, database table names, folder
    names, filenames, file extensions, pathnames, dummy URLs, user input, and Twitter
    handles. Here is an example: “Please write positive and negative test classes
    for the rewritten `AnalyzeContactDistance` class.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'A block of code is set as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Bold**: Indicates a new term, an important word, or words that you see onscreen.
    For instance, words in menus or dialog boxes appear in **bold**. Here is an example:
    “Select **System info** from the **Administration** panel.”'
  prefs: []
  type: TYPE_NORMAL
