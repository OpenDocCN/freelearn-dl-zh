  type: TYPE_NORMAL
  zh: '1'
- en: What Is Retrieval-Augmented Generation?
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是检索增强生成？
- en: The field of **artificial intelligence** (**AI**) is rapidly evolving, with
    generative AI at its center, and at the heart of generative AI lies **retrieval-augmented
    generation** (**RAG**). RAG has established itself as a central component in almost
    all production AI implementations, harnessing the intelligence and text generation
    capabilities of **large language models** (**LLMs**) and integrating them with
    a company’s internal data to enhance organizational operations significantly.
    Whether powering the most basic chatbot or the most advanced autonomous agent,
    RAG is an indispensable core component. Without it, none of these approaches can
    function effectively. This book focuses on numerous aspects of RAG, taking you
    from that basic chatbot implementation, all the way to the end, where we will
    build an agent that autonomously adapts its approach through every interaction,
    using RAG at its core to self-learn and self-heal. In this way, we will showcase
    the full power and application of RAG in modern generative AI development. As
    this book progresses, we will outline the potential of RAG in the enterprise,
    suggesting how it can make AI applications more responsive and smarter, aligning
    them with your organizational objectives. RAG has become a key facilitator of
    customized, efficient, and insightful AI solutions, bridging the gap between generative
    AI’s potential and your specific business needs. Our exploration of RAG will encourage
    you to unlock the full potential of your corporate data, paving the way for you
    to enter the era of AI-driven innovation.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（**AI**）领域正在迅速发展，生成式AI是其核心，而生成式AI的核心是**检索增强生成**（**RAG**）。RAG已成为几乎所有生产级AI实现的核心组件，利用**大型语言模型**（**LLMs**）的智能和文本生成能力，并将它们与公司的内部数据相结合，显著提升组织运营效率。无论是驱动最基础的聊天机器人还是最先进的自主代理，RAG都是一个不可或缺的核心组件。没有它，这些方法都无法有效运作。本书专注于RAG的众多方面，从基本的聊天机器人实现开始，一直到最后，我们将构建一个通过每次交互自主调整其方法的代理，利用RAG的核心进行自我学习和自我修复。通过这种方式，我们将展示RAG在现代生成式AI开发中的全部力量和应用。随着本书的推进，我们将概述RAG在企业中的潜力，建议它如何使AI应用更加响应和智能，与您的组织目标保持一致。RAG已成为定制化、高效和有洞察力的AI解决方案的关键推动者，弥合了生成式AI的潜力与您的具体业务需求之间的差距。我们对RAG的探索将鼓励您释放企业数据的全部潜力，为您进入AI驱动创新时代铺平道路。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Understanding RAG – basics and principles
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解RAG – 基础和原则
- en: RAG vocabulary
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG词汇
- en: Understanding vectors
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解向量
- en: Implementing RAG in AI applications
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在AI应用中实现RAG
- en: Comparing RAG with conventional generative AI
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将RAG与传统的生成式AI进行比较
- en: Comparing RAG with model fine-tuning
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将RAG与模型微调进行比较
- en: The architecture and stages of RAG systems
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG系统的架构和阶段
- en: By the end of this chapter, you will have a solid foundation in the core RAG
    concepts and understand the immense potential it offers organizations so that
    they can extract more value from their data and empower their LLMs. Let’s get
    started!
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将在核心RAG概念上打下坚实的基础，并理解它为组织提供的巨大潜力，以便他们可以从数据中提取更多价值并赋予他们的LLMs更多能力。让我们开始吧！
- en: Free benefits with your book
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书中的免费优惠
- en: Your purchase includes a free PDF copy of this book along with other exclusive
    benefits. Check the *Free benefits with your book* section in the Preface to unlock
    them instantly and maximize your learning experience.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 您的购买包括本书的免费PDF副本以及其他独家优惠。请查阅前言中的“*本书的免费优惠*”部分，立即解锁它们并最大化您的学习体验。
- en: Understanding RAG – basics and principles
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解RAG – 基础和原则
- en: 'Modern-day LLMs are impressive, but they have never seen your company’s private
    data (hopefully!). This means the ability of an LLM to help your company fully
    utilize its data is very limited. This very large barrier has given rise to the
    concept of RAG, where you are using the power and capabilities of the LLM but
    combining it with the knowledge and data contained within your company’s internal
    data repositories. This is the primary motivation for using RAG: to make new data
    available to the LLM and significantly increase the value you can extract from
    that data.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当今的LLM令人印象深刻，但它们从未见过您公司的私有数据（希望如此！）这意味着LLM帮助您公司充分利用其数据的能力非常有限。这个非常大的障碍催生了RAG的概念，即您正在使用LLM的力量和能力，但将其与公司内部数据存储库中的知识和数据相结合。这是使用RAG的主要动机：使新数据对LLM可用，并显著增加您可以从这些数据中提取的价值。
- en: Beyond internal data, RAG is also useful in cases where the LLM has not been
    trained on the data, even if it is public, such as the most recent research papers
    or articles about a topic that is strategic to your company. In both cases, we
    are talking about data that was not present during the training of the LLM. You
    can have the latest LLM trained on the most tokens ever, but if that data was
    not present for training, then the LLM will be at a disadvantage in helping you
    reach your full productivity.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 除了内部数据之外，RAG在LLM未在数据上训练的情况下也很有用，即使这些数据是公开的，例如关于您公司战略主题的最新研究论文或文章。在这两种情况下，我们谈论的是在LLM训练期间不存在的数据。您可以拥有训练过最多标记的最新LLM，但如果这些数据在训练期间不存在，那么LLM在帮助您达到最大生产力方面将处于不利地位。
- en: Ultimately, this highlights the fact that, for most organizations, it is a central
    need to connect new data to an LLM. RAG is the most popular paradigm for doing
    this. This book focuses on showing you how to set up a RAG application with your
    data, as well as how to get the most out of it in various situations. We intend
    to give you an in-depth understanding of RAG and its importance in leveraging
    an LLM within the context of a company’s private or specific data needs.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，这突出了这样一个事实，对于大多数组织来说，将新数据连接到LLM是一个基本需求。RAG是执行此操作的最流行范式。本书旨在向您展示如何使用您的数据设置RAG应用程序，以及如何在各种情况下最大限度地发挥其作用。我们旨在让您深入了解RAG及其在利用公司私有或特定数据需求中的重要性。
- en: Now that you understand the basic motivations behind implementing RAG, let’s
    review some of the advantages of using it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经了解了实施RAG的基本动机，让我们回顾一下使用RAG的一些优点。
- en: Advantages of RAG
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RAG的优点
- en: 'Some of the potential advantages of using RAG include improved accuracy and
    relevance, customization, flexibility, and expanding the model’s knowledge beyond
    the training data. Let’s take a closer look:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 使用RAG的一些潜在优点包括提高准确性和相关性、定制、灵活性和扩展模型知识以超越训练数据。让我们更深入地了解一下：
- en: '**Improved accuracy and relevance**: RAG can significantly enhance the accuracy
    and relevance of responses that are generated by LLMs. RAG fetches and incorporates
    specific information from a database or dataset, typically in real time, and ensures
    that the output is based on both the model’s pre-existing knowledge and the most
    current and relevant data that you are providing directly.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高准确性和相关性**：RAG可以显著提高由LLM生成的响应的准确性和相关性。RAG从数据库或数据集中获取并整合特定信息，通常是在实时进行的，并确保输出基于模型预先存在的知识和您直接提供的最新且相关的数据。'
- en: '**Customization**: RAG allows you to customize and adapt the model’s knowledge
    to your specific domain or use case. By pointing RAG to databases or datasets
    directly relevant to your application, you can tailor the model’s outputs so that
    they align closely with the information and style that matters most for your specific
    needs. This customization enables the model to provide more targeted and useful
    responses.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制**：RAG允许您根据特定的领域或用例定制和调整模型的知识。通过将RAG指向与您的应用程序直接相关的数据库或数据集，您可以调整模型的输出，使其与对您的特定需求最重要的信息和风格紧密一致。这种定制使模型能够提供更针对性和有用的响应。'
- en: '**Flexibility**: RAG provides flexibility in terms of the data sources that
    the model can access. You can apply RAG to various structured and unstructured
    data, including databases, web pages, documents, and more. This flexibility allows
    you to leverage diverse information sources and combine them in novel ways to
    enhance the model’s capabilities. Additionally, you can update or swap out the
    data sources as needed, enabling the model to adapt to changing information landscapes.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：RAG在模型可以访问的数据源方面提供了灵活性。您可以将RAG应用于各种结构化和非结构化数据，包括数据库、网页、文档等。这种灵活性允许您利用多样化的信息来源，并以新颖的方式将它们结合起来，以增强模型的能力。此外，您可以根据需要更新或更换数据源，使模型能够适应不断变化的信息景观。'
- en: '**Expanding model knowledge beyond training data**: LLMs are limited by the
    scope of their training data. RAG overcomes this limitation by enabling models
    to access and utilize information that was not included in their initial training
    sets. This effectively expands the knowledge base of the model without the need
    for retraining, making LLMs more versatile and adaptable to new domains or rapidly
    evolving topics.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超越训练数据的模型知识扩展**：LLMs受限于其训练数据的范围。RAG通过使模型能够访问和利用其初始训练集中未包含的信息来克服这一限制。这有效地扩展了模型的知识库，而无需重新训练，使LLMs更加灵活，能够适应新的领域或快速发展的主题。'
- en: '**Removing hallucinations**: The LLM is a key component within the RAG system.
    LLMs have the potential to provide wrong information, also known as hallucinations.
    These hallucinations can manifest in several ways, such as made-up facts, incorrect
    facts, or even nonsensical verbiage. Often, the hallucination is worded in a way
    that can be very convincing, causing it to be difficult to identify. A well-designed
    RAG application can reduce hallucinations much more easily than when directly
    using an LLM.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**消除幻觉**：LLM是RAG系统中的关键组件。LLMs有可能提供错误信息，也称为幻觉。这些幻觉可以以多种方式表现出来，如虚构的事实、错误的事实，甚至无意义的措辞。通常，幻觉的措辞可能非常令人信服，导致难以识别。一个设计良好的RAG应用可以比直接使用LLM更容易地减少幻觉。'
- en: With that, we’ve covered the key advantages of implementing RAG in your organization.
    Next, let’s discuss some of the challenges you might face.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们已经涵盖了在您的组织中实施RAG的关键优势。接下来，让我们讨论一下您可能面临的挑战。
- en: Challenges of RAG
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RAG的挑战
- en: 'There are some challenges to using RAG as well, which include dependency on
    the quality of the internal data, the need for data manipulation and cleaning,
    computational overhead, more complex integrations, and the potential for information
    overload. Let’s review these challenges and gain a better understanding of how
    they impact RAG pipelines and what can be done about them:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 使用RAG也存在一些挑战，包括对内部数据质量的依赖、数据操作和清洗的需求、计算开销、更复杂的集成以及信息过载的可能性。让我们回顾这些挑战，更好地了解它们如何影响RAG管道，以及我们可以采取哪些措施：
- en: '**Dependency on data quality**: When talking about how data can impact an AI
    model, the saying in data science circles is *garbage in, garbage out*. This means
    that if you give a model bad data, it will give you bad results. RAG is no different.
    The effectiveness of RAG is directly tied to the quality of the data it retrieves.
    If the underlying database or dataset contains outdated, biased, or inaccurate
    information, the outputs generated by RAG will likely suffer from the same issues.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对数据质量的依赖性**：当谈论数据如何影响AI模型时，数据科学领域的说法是“垃圾进，垃圾出”。这意味着如果你给模型提供糟糕的数据，它将给出糟糕的结果。RAG也不例外。RAG的有效性直接与其检索到的数据质量相关联。如果底层数据库或数据集包含过时、有偏见或不准确的信息，RAG生成的输出可能会出现同样的问题。'
- en: '**Need for data manipulation and cleaning**: Data in the recesses of the company
    often has a lot of value to it, but it is not often in good, accessible shape.
    For example, data from PDF-based customer statements needs a lot of massaging
    so that it can be put into a format that can be useful to a RAG pipeline.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据操作和清洗的必要性**：公司深处的数据往往具有很高的价值，但它通常并不处于良好、易于访问的状态。例如，基于PDF的客户声明数据需要大量的处理，以便将其转换为RAG管道可以使用的格式。'
- en: '**Computational overhead**: A RAG pipeline introduces a host of new computational
    steps into the response generation process, including data retrieval, processing,
    and integration. LLMs are getting faster every day, but even the fastest response
    can be more than a second, and some can take several seconds. If you combine that
    with other data processing steps, and possibly multiple LLM calls, the result
    can be a very significant increase in the time it takes to receive a response.
    This all leads to increased computational overhead, affecting the efficiency and
    scalability of the entire system. As with any other IT initiative, an organization
    must balance the benefits of enhanced accuracy and customization against the resource
    requirements and potential latency introduced by these additional processes.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算开销**：RAG流水线将一系列新的计算步骤引入到响应生成过程中，包括数据检索、处理和集成。尽管LLMs每天都在变快，但即使是最快的响应也可能超过一秒，有些甚至可能需要几秒钟。如果你将这一点与其他数据处理步骤结合起来，以及可能的多个LLM调用，结果可能会导致接收响应所需的时间显著增加。所有这些都导致了计算开销的增加，影响了整个系统的效率和可扩展性。与任何其他IT倡议一样，组织必须权衡增强准确性和定制化的好处与这些额外流程引入的资源需求和潜在延迟。'
- en: '**Data storage explosion – complexity in integration and maintenance**: Traditionally,
    your data resides in a data source that’s queried in various ways to be made available
    to your internal and external systems. But with RAG, your data resides in multiple
    forms and locations, such as vectors in a vector database, that represent the
    same data, but in a different format. Add in the complexity of connecting these
    various data sources to LLMs and relevant technical mechanisms, such as vector
    searches, and you have a significant increase in complexity. This increased complexity
    can be resource-intensive. Maintaining this integration over time, especially
    as data sources evolve or expand, adds even more complexity and cost. Organizations
    need to invest in technical expertise and infrastructure to leverage RAG capabilities
    effectively while accounting for the rapid increase in complexities these systems
    bring with them.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据存储爆炸 - 集成和维护的复杂性**：传统上，你的数据存储在数据源中，通过各种方式查询以供内部和外部系统使用。但使用RAG，你的数据以多种形式和位置存在，例如在向量数据库中的向量，它们代表相同的数据，但格式不同。再加上将这些各种数据源连接到LLMs和相关技术机制（如向量搜索）的复杂性，你将面临显著增加的复杂性。这种增加的复杂性可能是资源密集型的。随着时间的推移维护这种集成，尤其是在数据源演变或扩展时，还会增加更多的复杂性和成本。组织需要投资于技术专长和基础设施，以有效地利用RAG功能，同时考虑到这些系统带来的复杂性的快速增加。'
- en: '**Potential for information overload**: RAG-based systems can pull in too much
    information. It is just as important to implement mechanisms to address this issue
    as it is to handle times when not enough relevant information is found. Determining
    the relevance and importance of retrieved information to be included in the final
    output requires sophisticated filtering and ranking mechanisms. Without these,
    the quality of the generated content could be compromised by an excess of unnecessary
    or marginally relevant details.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信息过载的潜在风险**：基于RAG的系统可能会引入过多的信息。实施机制来解决这一问题与处理找不到足够相关信息的情况一样重要。确定检索到的信息的相关性和重要性，以便包含在最终输出中，需要复杂的过滤和排名机制。没有这些机制，生成的内容的质量可能会因过多的不必要或边际相关的细节而受损。'
- en: '**Hallucinations**: While we listed removing hallucinations as an advantage
    of using RAG, hallucinations do pose one of the biggest challenges to RAG pipelines
    if they’re not dealt with properly. A well-designed RAG application must take
    measures to identify and remove hallucinations and undergo significant testing
    before the final output text is provided to the end user. This is a difficult
    task to implement, often requiring additional logic layers in a production-level
    application, but they all require RAG to work (as RAG gives you the data that
    you use to validate and remove the hallucinations). In contrast, if you are just
    using an LLM response directly, with no RAG component, it is almost impossible
    to eliminate hallucinations when they occur.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉**：虽然我们将消除幻觉列为使用RAG的优势之一，但如果处理不当，幻觉确实是对RAG管道的最大挑战之一。一个设计良好的RAG应用必须采取措施来识别和消除幻觉，并在向最终用户提供最终输出文本之前进行大量的测试。这是一个难以实施的难题，通常需要在生产级应用中添加额外的逻辑层，但所有这些都需要RAG来工作（因为RAG提供了你用来验证和消除幻觉的数据）。相比之下，如果你只是直接使用LLM的响应，而没有RAG组件，当幻觉发生时几乎不可能消除它们。'
- en: '**High levels of complexity within RAG components**: A typical RAG application
    tends to have a high level of complexity, with many components that need to be
    optimized for the overall application to function properly. The components can
    interact with each other in several ways, often with many more steps than the
    basic RAG pipeline you start with. Every component within the pipeline needs significant
    amounts of trials and testing, including your prompt design and engineering, the
    LLMs you use and how you use them, the various algorithms and their parameters
    for retrieval, the interface you use to access your RAG application, and numerous
    other aspects that you will need to add over the course of your development.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG组件中的高复杂性**：典型的RAG应用往往具有很高的复杂性，需要优化许多组件以确保整体应用能够正常工作。这些组件可以以多种方式相互交互，通常比基本的RAG管道包含更多的步骤。管道中的每个组件都需要大量的试验和测试，包括你的提示设计和工程，你使用的LLMs以及如何使用它们，用于检索的各种算法及其参数，你用来访问RAG应用的接口，以及你在开发过程中需要添加的众多其他方面。'
- en: In this section, we explored the key advantages of implementing RAG in your
    organization, including improved accuracy and relevance, customization, flexibility,
    and the ability to expand the model’s knowledge beyond its initial training data.
    We also discussed some of the challenges you might face when deploying RAG, such
    as dependency on data quality, the need for data manipulation and cleaning, increased
    computational overhead, complexity in integration and maintenance, and the potential
    for information overload. Understanding these benefits and challenges provides
    a foundation for diving deeper into the core concepts and vocabulary used in RAG
    systems.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了在组织中实施RAG的关键优势，包括提高准确性和相关性、定制化、灵活性和扩展模型知识超越其初始训练数据的能力。我们还讨论了在部署RAG时可能遇到的挑战，例如对数据质量的依赖、数据操作和清洗的需求、增加的计算开销、集成和维护的复杂性以及信息过载的潜在可能性。了解这些优势和挑战为深入探讨RAG系统中使用的核心概念和词汇奠定了基础。
- en: To understand the approaches we will introduce, you will need a good understanding
    of the vocabulary used to discuss these approaches. In the following section,
    we will familiarize ourselves with some of the foundational concepts so that you
    can better understand the various components and techniques involved in building
    effective RAG pipelines.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解我们将要介绍的方法，你需要对讨论这些方法所使用的词汇有很好的理解。在接下来的部分，我们将熟悉一些基础概念，以便你更好地理解构建有效的RAG管道所涉及的各个组件和技术。
- en: RAG vocabulary
  id: totrans-38
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAG词汇
- en: Now is as good a time as any to review some vocabulary that should help you
    become familiar with the various concepts in RAG. In the following subsections,
    we will familiarize ourselves with some of this vocabulary, including LLMs, prompting
    concepts, inference, context windows, fine-tuning approaches, vector databases,
    and vectors/embeddings. This is not an exhaustive list, but understanding these
    core concepts should help you understand everything else we will teach you about
    RAG in a more effective way.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是回顾一些词汇的好时机，这些词汇可以帮助你熟悉 RAG 中的各种概念。在接下来的小节中，我们将熟悉一些这些词汇，包括 LLMs、提示概念、推理、上下文窗口、微调方法、向量数据库和向量/嵌入。这不是一个详尽的列表，但理解这些核心概念应该有助于你更有效地理解我们将教授你的关于
    RAG 的其他所有内容。
- en: LLM
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM
- en: Most of this book will deal with LLMs. LLMs are generative AI technologies that
    focus on generating text. We will keep things simple by concentrating on the type
    of model that most RAG pipelines use, the LLM. However, we would like to clarify
    that while we will focus primarily on LLMs, RAG can also be applied to other types
    of generative models, such as those for images, audio, and videos. We will focus
    on these other types of models and how they are used in RAG in [*Chapter 14*](B34736_14_ePub.xhtml#_idTextAnchor327).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的大部分内容将涉及大型语言模型（LLMs）。LLMs 是一种生成式人工智能技术，专注于生成文本。我们将通过专注于大多数 RAG 管道使用的模型类型，即
    LLM，来简化问题。然而，我们想澄清的是，虽然我们将主要关注 LLMs，但 RAG 也可以应用于其他类型的生成模型，例如图像、音频和视频的生成模型。我们将在
    [*第 14 章*](B34736_14_ePub.xhtml#_idTextAnchor327) 中关注这些其他类型的模型以及它们在 RAG 中的应用。
- en: Some popular examples of LLMs are the OpenAI ChatGPT models, the Meta Llama
    models, Google’s Gemini models, and Anthropic’s Claude models.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一些流行的 LLM 示例包括 OpenAI 的 ChatGPT 模型、Meta 的 Llama 模型、Google 的 Gemini 模型以及 Anthropic
    的 Claude 模型。
- en: Prompting, prompt design, and prompt engineering
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示、提示设计和提示工程
- en: 'These terms are sometimes used interchangeably, but technically, while they
    all have to do with prompting, they do have different meanings:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这些术语有时可以互换使用，但从技术上讲，虽然它们都与提示有关，但它们确实有不同的含义：
- en: '**Prompting** is the act of sending a query or *prompt* to an LLM.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示**是指向 LLM 发送查询或 *提示* 的行为。'
- en: '**Prompt design** refers to the strategy you implement to *design* the prompt
    you will send to the LLM. Many different prompt design strategies work in different
    scenarios. We will review many of these in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示设计**指的是你实施的策略，用于 *设计* 你将发送给 LLM 的提示。不同的提示设计策略在不同的场景中有效。我们将在 [*第 13 章*](B34736_13_ePub.xhtml#_idTextAnchor299)
    中回顾许多这些策略。'
- en: '**Prompt engineering** focuses more on the technical aspects surrounding the
    prompt that you use to improve the outputs from the LLM. For example, you may
    break up a complex query into two or three different LLM interactions, *engineering*
    it better to achieve superior results. We will also review prompt engineering
    in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示工程**更关注围绕你用来改进 LLM 输出的提示的技术方面。例如，你可能将一个复杂的查询分解成两个或三个不同的 LLM 交互，*工程化*它以实现更优的结果。我们还将回顾
    [*第 13 章*](B34736_13_ePub.xhtml#_idTextAnchor299) 中的提示工程。'
- en: LangChain and LlamaIndex
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangChain 和 LlamaIndex
- en: This book will focus on using **LangChain** as the framework for building our
    RAG pipelines. LangChain is an open source framework that supports not just RAG
    but any development that wants to use LLMs within a pipeline approach. As of February
    2025, LangChain has over 99,000 GitHub stars and approximately 28 million downloads
    per month, with total downloads exceeding 130 million across Python and JavaScript
    platforms. In May 2025, LangChain reached over 70 million downloads in a single
    month, surpassing even the OpenAI SDK. It supports RAG particularly well, providing
    a modular and flexible set of tools that make RAG development significantly more
    efficient than not using a framework.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将专注于使用 **LangChain** 作为构建我们的 RAG 管道的框架。LangChain 是一个开源框架，不仅支持 RAG，还支持任何希望在使用管道方法中结合
    LLMs 的开发。截至 2025 年 2 月，LangChain 在 GitHub 上拥有超过 99,000 个星标，每月下载量约为 2800 万次，总下载量超过
    1.3 亿次，涵盖 Python 和 JavaScript 平台。2025 年 5 月，LangChain 在一个月内的下载量超过 7000 万次，甚至超过了
    OpenAI SDK。它特别支持 RAG，提供了一套模块化和灵活的工具，使得 RAG 开发比不使用框架的效率显著提高。
- en: While LangChain is currently the most popular framework for developing RAG pipelines,
    **LlamaIndex** is a leading alternative to LangChain, with similar capabilities
    in general. As of October 2025, LlamaIndex has approximately 5.2 million monthly
    downloads. LlamaIndex is known for its focus on search and retrieval tasks, optimized
    specifically for indexing and retrieving structured and unstructured data through
    efficient document processing. It may be a good option if you require advanced
    search or need to handle large, document-heavy datasets where retrieval speed
    and accuracy are paramount.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然LangChain目前是开发RAG管道最受欢迎的框架，但**LlamaIndex**是LangChain的一个领先替代品，在总体上具有相似的功能。截至2025年10月，LlamaIndex的月下载量约为520万。LlamaIndex以其对搜索和检索任务的关注而闻名，专门针对索引和检索通过高效文档处理的结构化和非结构化数据进行了优化。如果你需要高级搜索或需要处理大型、文档密集型数据集，其中检索速度和准确性至关重要，它可能是一个不错的选择。
- en: Many other options focus on various niches. Once you have gotten familiar with
    building RAG pipelines, be sure to look at some of the other options to see whether
    there are frameworks that work better for your particular project.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 许多其他选项专注于各种利基市场。一旦你熟悉了构建RAG管道，务必查看一些其他选项，看看是否有更适合你特定项目的框架。
- en: Inference
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理
- en: We will use the term **inference** from time to time. Generally, this refers
    to the process of the LLM generating outputs or predictions based on given inputs
    using a pretrained language model. For example, when you ask ChatGPT a question,
    the steps it takes to provide you with a response are called inference.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将不时使用术语**推理**。通常，这指的是LLM根据给定的输入使用预训练语言模型生成输出或预测的过程。例如，当你向ChatGPT提问时，它提供响应所采取的步骤被称为推理。
- en: AI agents and agent-related terminology
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI代理及其相关术语
- en: 'AI agents represent one of the most significant developments in RAG applications.
    An **AI agent** is an autonomous system that can perceive its environment, make
    decisions, and take actions to achieve specific goals. Agents are still very much
    utilizing RAG concepts, but they use them in new and innovative ways, where the
    generation step performs reasoning on top of the traditional generation we will
    talk about in the first chapters of this book. This new reasoning step allows
    the agent to do things such as reason through problems, use tools, and execute
    multi-step workflows. Here are the key agent-related terms:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理代表了RAG应用中最重大的发展之一。**AI代理**是一个能够感知其环境、做出决策并采取行动以实现特定目标的自主系统。代理仍然非常依赖于RAG概念，但它们以新的和创新的方式使用它们，其中生成步骤在本书第一章节中将要讨论的传统生成之上进行推理。这一新的推理步骤允许代理执行诸如通过问题进行推理、使用工具和执行多步骤工作流程等活动。以下是与代理相关的关键术语：
- en: '**Agentic AI or agentic systems**: AI systems that can independently plan,
    execute tasks, and adapt their behavior based on feedback. These systems use RAG
    as a core component to access and reason over information.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理式AI或代理系统**：能够独立规划、执行任务并根据反馈调整其行为的AI系统。这些系统使用RAG作为核心组件来访问和推理信息。'
- en: '**Tool calling (also called function calling)**: The ability of an LLM or agent
    to invoke external tools, APIs, or functions to accomplish tasks beyond text generation.
    For example, an agent might call a calculator function for math problems or query
    a database for specific information.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具调用（也称为函数调用）**：LLM或代理调用外部工具、API或函数以完成超出文本生成任务的能力。例如，代理可能会调用计算器函数来解决数学问题或查询数据库以获取特定信息。'
- en: '**Model Context Protocol** (**MCP**): An open standard developed by Anthropic
    that provides a universal way for AI agents to connect with external data sources,
    tools, and services. MCP standardizes how agents discover and interact with available
    capabilities, making it easier to build interoperable agent systems that can access
    diverse resources through a consistent interface.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型上下文协议（MCP**）：由Anthropic开发的一种开放标准，为AI代理提供了一种通用的方式来连接外部数据源、工具和服务。MCP标准化了代理如何发现和交互可用功能，使得构建可互操作的代理系统、通过一致接口访问各种资源变得更加容易。'
- en: '**ReAct (Reasoning and Acting)**: A prompting paradigm where agents alternate
    between reasoning about a problem and taking actions. The agent thinks step by
    step, decides what tool to use, observes the result, and continues reasoning until
    the task is complete.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ReAct（推理与行动）**：一种提示范式，其中代理在推理问题和采取行动之间交替。代理逐步思考，决定使用什么工具，观察结果，并继续推理，直到任务完成。'
- en: '**Chain-of-thought**: A technique where the LLM breaks down complex problems
    into intermediate reasoning steps, making its thought process explicit. This is
    fundamental to how agents plan and execute multi-step tasks.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思维链**：一种技术，其中LLM将复杂问题分解为中间推理步骤，使其思维过程明确。这对于智能体规划和执行多步任务至关重要。'
- en: '**Agent memory**: The system that allows agents to retain information across
    interactions, including short-term memory (current conversation context) and long-term
    memory (persistent knowledge from past interactions).'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体记忆**：允许智能体在交互中保留信息的系统，包括短期记忆（当前对话上下文）和长期记忆（从过去交互中获取的持久知识）。'
- en: '**Orchestration**: The coordination and management of multiple agents, tools,
    or LLM calls to accomplish complex tasks. LangChain and LangGraph specialize in
    agent orchestration.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排**：协调和管理多个智能体、工具或LLM调用以完成复杂任务。LangChain和LangGraph在智能体编排方面具有专长。'
- en: '**Human-in-the-loop** (**HITL**): A pattern where agents pause execution to
    request human input, approval, or guidance before proceeding with certain actions.
    This is crucial for high-stakes decisions or when agent confidence is low. HITL
    is conducted in the middle of the RAG process, which we call *on the hotpath*.
    If this is done *off* the hotpath, it is called **human-on-the-loop** (**HOTL**).'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人机交互**（**HITL**）：一种模式，其中智能体在执行某些操作之前暂停执行，请求人类输入、批准或指导。这在高风险决策或智能体信心较低时至关重要。HITL在RAG过程中进行，我们称之为*热路径*。如果这样做是在*热路径之外*，则称为**人机交互**（**HOTL**）。'
- en: '**Multi-agent systems**: Architectures where multiple specialized agents work
    together, each with specific roles and capabilities, to solve complex problems
    that no single agent could handle effectively.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多智能体系统**：由多个具有特定角色和能力的专业智能体协同工作，共同解决单个智能体无法有效处理的复杂问题。'
- en: We will spend the first 11 chapters of this book stepping through numerous RAG-related
    concepts and ensuring that you have the foundational knowledge of RAG to be highly
    successful. But in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284), we will
    come back to agents and spend *Chapters 12*–*19* discussing how this most advanced
    use of RAG can take your generative AI development to a whole new level.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本书的前11章中逐步介绍众多RAG相关概念，并确保你具备RAG的基础知识，以便在RAG领域取得高度成功。但在[*第12章*](B34736_12_ePub.xhtml#_idTextAnchor284)中，我们将回到智能体的话题，并在*第12章*至*第19章*中讨论如何将RAG的这种最先进的使用方式提升你的生成式AI开发到一个全新的水平。
- en: Context window
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文窗口
- en: A **context window**, in the context of LLMs, refers to the maximum number of
    tokens (words, sub-words, or characters) that the model can process in a single
    pass. It determines the amount of text the model can *see* or *attend to* at once
    when making predictions or generating responses.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM的上下文中，**上下文窗口**指的是模型在一次处理中可以处理的最多标记（单词、子词或字符）的数量。它决定了模型在做出预测或生成响应时一次可以看到或关注的文本量。
- en: The context window size is a key parameter of the model architecture and is
    typically fixed during model training. It directly relates to the input size of
    the model, as it sets an upper limit on the number of tokens that can be fed into
    the model at a time.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口大小是模型架构的关键参数，通常在模型训练期间固定。它直接关系到模型的输入大小，因为它设定了每次可以输入模型中的标记数量的上限。
- en: For example, if a model has a context window size of 4,096 tokens, it means
    that the model can process and generate sequences of up to 4,096 tokens. When
    processing longer texts, such as documents or conversations, the input needs to
    be divided into smaller segments that fit within the context window. This is often
    done using techniques such as sliding windows or truncation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果一个模型的上下文窗口大小为4,096个标记，这意味着该模型可以处理和生成最多4,096个标记的序列。当处理较长的文本，如文档或对话时，输入需要被分成适合上下文窗口的小段。这通常使用滑动窗口或截断等技术来完成。
- en: The size of the context window has implications for the model’s ability to understand
    and maintain long-range dependencies and context. Models with larger context windows
    can capture and utilize more contextual information when generating responses,
    which can lead to more coherent and contextually relevant outputs. However, increasing
    the context window size also increases the computational resources required to
    train and run the model.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口的大小对模型理解并维持长距离依赖和上下文的能力有影响。具有更大上下文窗口的模型在生成响应时可以捕捉和利用更多的上下文信息，这可能导致更连贯和上下文相关的输出。然而，增加上下文窗口的大小也会增加训练和运行模型所需的计算资源。
- en: 'In the context of RAG, the context window size is essential because it determines
    how much information from the retrieved documents can be effectively utilized
    by the model when generating the final response. Recent advancements in language
    models have led to the development of models with significantly larger context
    windows, enabling them to process and retain more information from the retrieved
    sources. See *Table 1.1* to see the context windows of many popular LLMs, both
    closed and open sourced:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在RAG的上下文中，上下文窗口的大小至关重要，因为它决定了检索到的文档中可以有多少信息被模型有效地利用来生成最终响应。语言模型最近的进步导致了具有显著更大上下文窗口的模型的发展，使它们能够处理和保留更多来自检索源的信息。参见*表1.1*以查看许多流行LLM的上下文窗口，包括封闭源和开源：
- en: '| **LLM** | **Context Window (Tokens)** |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| **LLM** | **上下文窗口（标记）** |'
- en: '| ChatGPT-3.5 Turbo 0613 (OpenAI), Llama 2 (Meta) | 4,096 |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT-3.5 Turbo 0613 (OpenAI), Llama 2 (Meta) | 4,096 |'
- en: '| Llama 3 (Meta) | 8,000 |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| Llama 3 (Meta) | 8,000 |'
- en: '| ChatGPT-4 (OpenAI) | 8,192 |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT-4 (OpenAI) | 8,192 |'
- en: '| ChatGPT-3.5 Turbo 0125 (OpenAI) | 16,385 |'
  id: totrans-76
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT-3.5 Turbo 0125 (OpenAI) | 16,385 |'
- en: '| ChatGPT-4.0-32k (OpenAI), Mistral (Mistral AI), Mixtral (Mistral AI), DBRX
    (Databricks), Gemini 1.0 Pro (Google) | 32,000 |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT-4.0-32k (OpenAI), Mistral (Mistral AI), Mixtral (Mistral AI), DBRX
    (Databricks), Gemini 1.0 Pro (Google) | 32,000 |'
- en: '| ChatGPT-4.0 Turbo (OpenAI), ChatGPT-4o (OpenAI), Llama 3.1 (Meta), Mistral
    Large 2 (Mistral AI), Mistral Small 3.1 (Mistral AI), Mistral NeMo (Mistral AI),
    DeepSeek R1 & V3 (DeepSeek) | 128,000 |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT-4.0 Turbo (OpenAI), ChatGPT-4o (OpenAI), Llama 3.1 (Meta), Mistral
