- en: Table 1.1 – Different context windows for LLMs (as of October 2025)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 表1.1 – LLM的不同上下文窗口（截至2025年10月）
- en: '*Figure 1.1*, which is based on *Table 1.1*, shows the largest context window
    sizes of the major LLM services visually:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1.1*，基于*表1.1*，以视觉方式显示了主要LLM服务的最大上下文窗口大小：'
- en: '![Figure 1.1 – Largest context windows for major LLM services](img/B34736_01_01.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图1.1 – 主要LLM服务的最大上下文窗口](img/B34736_01_01.png)'
- en: Figure 1.1 – Largest context windows for major LLM services
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.1 – 主要LLM服务的最大上下文窗口
- en: 'Note that *Figure 1.1* shows a selection of the largest context window sizes
    from major LLM providers, illustrating the dramatic scale differences that have
    emerged. The progression is remarkable: from DBRX’s 32,000 tokens to Llama 4 Scout’s
    groundbreaking 10 million tokens—a more than 300x increase. This acceleration
    in context window expansion represents one of the most significant developments
    in recent LLM evolution, with models now capable of processing entire books, extensive
    code bases, or thousands of pages of documentation in a single pass. While older
    models tended to have smaller context windows measured in thousands of tokens,
    the newest models have pushed boundaries into the millions, with some specialized
    models even reaching hundreds of millions of tokens. This trend is likely to continue,
    fundamentally transforming how RAG systems can be designed and implemented, as
    larger context windows reduce the need for complex retrieval strategies in some
    use cases while enabling entirely new applications in others. However, at this
    level of tokens, keep an eye on costs, as these LLMs charge you based on token
    input and output. If you are constantly sending 10 million tokens into an LLM
    compared to a few thousand, you can expect a hefty bill from that service!'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，*图1.1*显示了主要LLM提供商选择的最大上下文窗口大小，展示了出现的巨大规模差异。这种进展是显著的：从DBRX的32,000个标记到Llama
    4 Scout的开创性10百万个标记——增加了300多倍。这种上下文窗口扩展的加速代表了最近LLM演变中最重大的发展之一，现在的模型能够一次性处理整本书、广泛的代码库或数千页的文档。虽然旧模型往往只有几千个标记的小上下文窗口，但最新的模型已经将边界推向了数百万，一些专业模型甚至达到了数亿个标记。这种趋势很可能会持续下去，从根本上改变RAG系统的设计和实现方式，因为更大的上下文窗口在某些用例中减少了复杂检索策略的需求，同时在其他用例中使全新的应用成为可能。然而，在这个标记级别，请注意成本，因为这些LLM根据标记输入和输出向你收费。如果你不断地向LLM发送1000万个标记，而不是几千个，你可能会从这个服务中得到一笔不小的账单！
- en: Fine-tuning – full-model fine-tuning and parameter-efficient fine-tuning
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调 – 全模型微调和参数高效微调
- en: '**Full-model fine-tuning** (**FMFT**) is where you take a foundation model
    and train it further to gain new capabilities. You could simply give it new knowledge
    for a specific domain, or you could give it a skill, such as being a conversational
    chatbot. FMFT updates all the parameters and biases in the model.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**全模型微调**（**FMFT**）是指你从一个基础模型开始，进一步训练以获得新的能力。你可以简单地给它提供特定领域的知识，或者给它一个技能，比如成为一个会话聊天机器人。FMFT会更新模型中的所有参数和偏差。'
- en: '**Parameter-efficient fine-tuning** (**PEFT**), on the other hand, is a type
    of fine-tuning where you focus only on specific parts of the parameters or biases
    when you fine-tune the model, but with a similar goal as general fine-tuning.
    The latest research in this area shows that you can achieve similar results to
    FMFT with far less cost, time commitment, and data.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**参数高效微调**（**PEFT**）是一种微调类型，你在微调模型时只关注参数或偏差的特定部分，但与一般微调有相似的目标。该领域最新的研究显示，你可以以远低于FMFT的成本、时间和数据投入实现类似的结果。
- en: While this book does not focus on fine-tuning, it is a very valid strategy to
    try to use a model fine-tuned with your data to give it more knowledge from your
    domain or to give it more of a *voice* from your domain. For example, you could
    train it to talk more like a scientist than a generic foundation model, if you’re
    using this in a scientific field. Alternatively, if you are developing in a legal
    field, you may want it to sound more like a lawyer.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这本书不专注于微调，但尝试使用用你的数据微调的模型来给它提供更多来自你领域的知识，或者给它更多来自你领域的*声音*，是一个非常有效的策略。例如，如果你在科学领域使用它，你可以训练它说话更像科学家而不是通用基础模型。或者，如果你在法律领域开发，你可能希望它听起来更像律师。
- en: Fine-tuning also helps the LLM to understand your company’s data better, making
    it better at generating an effective response during the RAG process. For example,
    if you have a scientific company, you might fine-tune a model with scientific
    information and use it for a RAG application that summarizes your research. This
    may improve your RAG application’s output (the summaries of your research) because
    your fine-tuned model understands your data better and can provide a more effective
    summary.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 微调还有助于LLM更好地理解你的公司数据，使其在RAG过程中生成有效响应的能力更强。例如，如果你是一家科学公司，你可能会微调一个包含科学信息的模型，并将其用于总结你研究的RAG应用。这可能会提高你的RAG应用输出（即你研究总结）的质量，因为你的微调模型更好地理解了你的数据，并能提供更有效的总结。
- en: Vector store or vector database?
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向量存储或向量数据库？
- en: Both! All vector databases are vector stores, but not all vector stores are
    vector databases. OK, while you get out your chalkboard to draw a Venn diagram,
    I will continue to explain this statement. There are ways to store vectors that
    are not full databases. They are simply storage devices for vectors. So, to encompass
    all possible ways to store vectors, LangChain calls them all **vector stores**.
    We will talk more in-depth about this in [*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137),
    but for now, just note that these are generally considered the same thing.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 两者都是！所有向量数据库都是向量存储，但并非所有向量存储都是向量数据库。好吧，当你拿出粉笔在黑板上画韦恩图时，我会继续解释这个说法。有存储向量的方式，但不是完整的数据库。它们只是向量的存储设备。因此，为了涵盖所有可能的存储向量方式，LangChain将它们都称为**向量存储**。我们将在[*第七章*](B34736_07_ePub.xhtml#_idTextAnchor137)中更深入地讨论这一点，但到目前为止，只需注意这些通常被认为是同一件事。
- en: Vectors, vectors, vectors!
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向量，向量，向量！
- en: A **vector** is a mathematical representation of your data. They are often referred
    to as **embeddings** when talking specifically about **natural language processing**
    (**NLP**) and LLMs. Vectors are one of the most important concepts to understand,
    and there are many different parts of a RAG pipeline that utilize vectors.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**向量**是您数据的数学表示。当具体谈到**自然语言处理**（NLP）和LLMs时，它们通常被称为**嵌入**。向量是理解最重要的概念之一，RAG管道的许多不同部分都利用了向量。'
- en: We just covered many key vocabulary terms that will be important for you to
    understand the rest of this book. Many of these concepts will be expanded upon
    in future chapters. In the next section, we will continue to discuss vectors in
    further depth. And beyond that, we will spend *Chapters 7* and *8* going over
    vectors and how they are used to find similar content.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚介绍了许多关键词汇，这些词汇对于您理解本书的其余部分非常重要。许多这些概念将在未来的章节中进一步阐述。在下一节中，我们将进一步深入讨论向量。而且，在第七章和第八章中，我们将详细讨论向量及其如何用于查找相似内容。
- en: Understanding vectors
  id: totrans-101
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解向量
- en: It could be argued that understanding vectors and all the ways they are used
    in RAG is the most important part of this entire book. As mentioned previously,
    vectors are simply the mathematical representations of your external data, and
    they are often referred to as embeddings. These representations capture semantic
    information in a format that can be processed by algorithms, facilitating tasks
    such as similarity search, which is a crucial step in the RAG process.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 可以说，理解向量和它们在RAG中所有使用方式是本书最重要的部分。如前所述，向量只是您外部数据的数学表示，它们通常被称为嵌入。这些表示以算法可以处理的形式捕获语义信息，促进了诸如相似性搜索等任务，这是RAG过程中的关键步骤。
- en: 'Vectors typically have a specific dimension based on how many numbers are represented
    by them. For example, this is a four-dimensional vector: `[0.123, 0.321, 0.312,
    0.231]`.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 向量通常具有特定的维度，这取决于它们表示的数字数量。例如，这是一个四维向量：`[0.123, 0.321, 0.312, 0.231]`。
- en: If you didn’t know we were talking about vectors and you saw this in Python
    code, you might recognize this as a list of four floating points, and you aren’t
    too far off. However, when working with vectors in Python, you want to recognize
    them as a NumPy array, rather than lists. NumPy arrays are generally more machine-learning-friendly
    because they are optimized to be processed much faster and more efficiently than
    Python lists, and they are more broadly recognized as the de facto representation
    of embeddings across machine learning packages such as SciPy, pandas, scikit-learn,
    TensorFlow, Keras, Pytorch, and many others. NumPy also enables you to perform
    vectorized math directly on the NumPy array, such as performing element-wise operations,
    without having to code in loops and other approaches you might have to use if
    you were using a different type of sequence.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道我们在谈论向量，你看到了这段Python代码，你可能会认出这是一个包含四个浮点数的列表，而且你并不离谱。然而，当你在Python中使用向量时，你希望将它们识别为NumPy数组，而不是列表。NumPy数组通常更适用于机器学习，因为它们被优化得比Python列表更快、更高效，并且在机器学习包（如SciPy、pandas、scikit-learn、TensorFlow、Keras、Pytorch等）中被更广泛地认可为嵌入的默认表示。NumPy还允许你直接在NumPy数组上执行向量数学，例如执行元素级操作，而无需编写循环和其他你可能需要使用的方法。
- en: When working with vectors for vectorization, there are often hundreds or thousands
    of dimensions, which refers to the number of floating points present in the vector.
    Higher dimensionality can capture more detailed semantic information, which is
    crucial for accurately matching query inputs with relevant documents or data in
    RAG applications.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理用于向量化的向量时，通常会有数百或数千个维度，这指的是向量中存在的浮点数的数量。更高的维度可以捕捉到更详细的语义信息，这对于在RAG应用中准确匹配查询输入与相关文档或数据至关重要。
- en: In [*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137), we will cover the key
    role that vectors and vector databases play in RAG implementation. Then, in [*Chapter
    8*](B34736_08_ePub.xhtml#_idTextAnchor176), we will dive more into the concept
    of similarity searches, which utilize vectors to search much faster and more efficiently.
    These are key concepts that will help you gain a much deeper understanding of
    how to better implement a RAG pipeline.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第7章*](B34736_07_ePub.xhtml#_idTextAnchor137)中，我们将介绍向量和向量数据库在RAG实现中的关键作用。然后，在[*第8章*](B34736_08_ePub.xhtml#_idTextAnchor176)中，我们将更深入地探讨相似性搜索的概念，它利用向量以更快、更高效的方式搜索。这些是帮助你更深入理解如何更好地实现RAG管道的关键概念。
- en: Understanding vectors can be a crucial underlying concept to understand how
    to implement RAG, but how is RAG used in practical applications in the enterprise?
    We will discuss these practical AI applications of RAG in the next section.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 理解向量可能是理解如何实现RAG的关键基础概念，但在企业中RAG是如何在实际应用中被使用的呢？我们将在下一节讨论RAG的这些实际人工智能应用。
- en: Implementing RAG in AI applications
  id: totrans-108
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在人工智能应用中实现RAG
- en: 'RAG has rapidly become a cornerstone of generative AI platforms in the corporate
    world. RAG combines the power of retrieving internal or *new* data with generative
    language models to enhance the quality and relevance of the generated text. This
    technique can be particularly useful for companies across various industries to
    improve their products, services, and operational efficiencies. The following
    are some examples of how RAG can be used:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: RAG迅速成为企业界生成式人工智能平台的基础。RAG结合了检索内部或*新*数据与生成语言模型的力量，以增强生成文本的质量和相关性。这项技术对于各个行业的公司来说特别有用，可以帮助它们改进产品、服务和运营效率。以下是一些RAG如何被使用的例子：
- en: '**Customer support and chatbots**: These can exist without RAG, but when integrated
    with RAG, it can connect those chatbots with past customer interactions, FAQs,
    support documents, and anything else that was specific to that customer.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户支持和聊天机器人**：这些可以在没有RAG的情况下存在，但与RAG集成后，它们可以连接到过去的客户互动、常见问题解答、支持文档以及任何特定于该客户的内容。'
- en: '**Technical support**: With better access to customer history and information,
    RAG-enhanced chatbots can provide a significant improvement to current technical
    support chatbots.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术支持**：通过更好地访问客户历史和相关信息，RAG增强的聊天机器人可以显著提高当前技术支持聊天机器人的性能。'
- en: '**Automated reporting**: RAG can assist in creating initial drafts or summarizing
    existing articles, research papers, and other types of unstructured data into
    more digestible formats.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动报告**：RAG可以帮助创建初始草案或总结现有的文章、研究论文和其他类型的非结构化数据，使其更易于消化。'
- en: '**E-commerce support**: For e-commerce companies, RAG can help generate dynamic
    product descriptions and user content, as well as make better product recommendations.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**电子商务支持**：对于电子商务公司，RAG可以帮助生成动态的产品描述和用户内容，以及提供更好的产品推荐。'
- en: '**Utilizing knowledge bases**: RAG improves the searchability and utility of
    both internal and general knowledge bases by generating summaries, providing direct
    answers to queries, and retrieving relevant information across various domains
    such as legal, compliance, research, medical, academia, patents, and technical
    documents.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用知识库**：RAG通过生成摘要、提供直接答案以及检索跨越法律、合规、研究、医疗、学术界、专利和技术文档等多个领域的相关信息，提高了内部和通用知识库的可搜索性和实用性。'
- en: '**Innovation scouting**: This is like searching general knowledge bases, but
    with a focus on innovation. With this, companies can use RAG to scan and summarize
    information from quality sources to identify trends and potential areas for innovations
    that are relevant to that company’s specialization.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新侦察**：这就像搜索通用知识库，但重点是创新。通过这种方式，公司可以使用RAG扫描和总结来自优质来源的信息，以识别与公司专业相关的趋势和潜在的创新领域。'
- en: '**Training and education**: RAG can be used by education organizations and
    corporate training programs to generate or customize learning materials based
    on specific needs and knowledge levels of the learners. With RAG, a much deeper
    level of internal knowledge from the organization can be incorporated into the
    educational curriculum in very customized ways to the individual or role.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和教育工作**：RAG可以被教育机构和企业培训项目用来根据学习者的具体需求和知识水平生成或定制学习材料。通过RAG，组织内部的知识可以在非常定制化的方式中融入教育课程，针对个人或角色。'
- en: '**Advanced agent applications**: RAG serves as the foundation for autonomous
    AI agents that can perform complex, multi-step tasks. These agentic systems combine
    RAG with reasoning capabilities, tool calling, and decision-making to handle sophisticated
    workflows such as automated code review and refactoring, multi-document legal
    analysis and contract generation, autonomous research assistants that can plan
    research strategies and synthesize findings, and intelligent workflow automation
    that adapts to changing business conditions. By integrating RAG at their core,
    these agents can access vast knowledge bases while maintaining the ability to
    reason, plan, and execute actions autonomously, representing the next evolution
    beyond simple question-answering systems.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级智能体应用**：RAG是自主AI智能体的基础，这些智能体可以执行复杂的多步骤任务。这些智能系统将RAG与推理能力、工具调用和决策制定相结合，以处理复杂的流程，如自动代码审查和重构、多文档法律分析和合同生成、能够规划研究策略和综合发现的自主研究助手，以及适应不断变化的商业条件的智能工作流程自动化。通过在核心处集成RAG，这些智能体可以在保持推理、规划和执行行动自主能力的同时访问庞大的知识库，代表着超越简单问答系统的下一阶段进化。'
- en: These are just a few of the ways organizations are using RAG right now to improve
    their operations. We will dive into each of these areas in more depth in [*Chapter
    3*](B34736_03_ePub.xhtml#_idTextAnchor064), helping you understand how you can
    implement all these game-changing initiatives in multiple places in your company.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是组织目前使用RAG来改进其运营的几种方式。我们将在[*第3章*](B34736_03_ePub.xhtml#_idTextAnchor064)中深入探讨这些领域，帮助你了解如何在公司的多个地方实施这些颠覆性的创新举措。
- en: You might be wondering, “*If I am using an LLM such as ChatGPT to answer my
    questions in my company, does that mean my company is using RAG already?*”
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想，“*如果我在公司使用LLM如ChatGPT来回答我的问题，这意味着我的公司已经使用RAG了吗？*”
- en: The answer is “*No.*”
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是“*不*”。
- en: If you just log in to ChatGPT and ask questions, that is not the same as implementing
    RAG. Both ChatGPT and RAG are forms of generative AI, and they are sometimes used
    together, but they are two different concepts. In the next section, we will discuss
    the differences between generative AI and RAG.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只是登录ChatGPT并提问，这并不等同于实现RAG。ChatGPT和RAG都是生成式AI的形式，它们有时会一起使用，但它们是两个不同的概念。在下一节中，我们将讨论生成式AI和RAG之间的区别。
- en: Comparing RAG with conventional generative AI
  id: totrans-122
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将RAG与传统的生成式AI进行比较
- en: Conventional generative AI has already shown to be a revolutionary change for
    companies, helping their employees reach new levels of productivity. LLMs such
    as ChatGPT are assisting users with a rapidly growing list of applications that
    include writing business plans, writing and improving code, writing marketing
    copy, and even providing healthier recipes for a specific diet. Ultimately, much
    of what users are doing is getting done faster.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的生成式AI已经显示出对公司的革命性变革，帮助员工达到新的生产力水平。LLM如ChatGPT正在帮助用户处理快速增长的列表中的应用，包括撰写商业计划、编写和改进代码、撰写营销文案，甚至为特定饮食提供更健康的食谱。最终，用户所做的许多事情都变得更高效。
- en: However, conventional generative AI does not know what it does not know. And
    that includes most of the internal data in your company. Can you imagine what
    you could do with all the benefits mentioned previously, but combined with all
    the data within your company – about everything your company has ever done, about
    your customers and all their interactions, or about all your products and services
    combined with a knowledge of what a specific customer’s needs are? You do not
    have to imagine it – that is what RAG does!
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，传统的生成式AI并不知道它不知道什么。这包括你公司的大部分内部数据。你能想象，如果你能结合之前提到的所有好处，再加上你公司内部的所有数据——关于你公司所做的一切，关于你的客户及其所有互动，或者关于你所有产品和服务的组合，再加上对特定客户需求的认识，你能做什么吗？你不必想象——这正是RAG所做的事情！
- en: Before RAG, most of the services you saw that connected customers or employees
    with the data resources of the company were just scratching the surface of what
    is possible compared to if they could access *all* the data in the company. With
    the advent of RAG and generative AI in general, corporations are on the precipice
    of something really, really big.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在 RAG 出现之前，你看到的大多数将客户或员工与公司数据资源连接的服务，与如果他们能够访问公司**所有**数据相比，只是触及了可能性的表面。随着 RAG
    和生成式 AI 的出现，企业正站在一个真正、真正重大的转折点上。
- en: Another area you might confuse RAG with is the concept of fine-tuning a model.
    Let’s discuss what the differences are between these types of approaches.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会将 RAG 与调整模型的概念混淆的另一个领域。让我们讨论一下这些方法之间的区别。
- en: Comparing RAG with model fine-tuning
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 比较RAG与模型微调
- en: 'LLMs can be adapted to your data in two ways:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 可以通过两种方式适应你的数据：
- en: '**Fine-tuning**: With fine-tuning, you are adjusting the weights and/or biases
    that define the model’s intelligence based on new training data. This directly
    impacts the model, permanently changing how it will interact with new inputs.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微调**：通过微调，你根据新的训练数据调整定义模型智能的权重和/或偏差。这直接影响模型，永久改变其与新输入交互的方式。'
- en: '**Input/prompts**: This is where you *use* the model, using the prompt/input
    to introduce new knowledge that the LLM can act upon.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入/提示**：这是你**使用**模型的地方，使用提示/输入引入 LLM 可以采取的新知识。'
- en: Why not use fine-tuning in all situations? Once you have introduced the new
    knowledge, the LLM will always have it! It is also how the model was created –
    by being trained with data, right? That sounds right in theory, but in practice,
    fine-tuning has been more reliable in teaching a model specialized tasks (such
    as teaching a model how to converse in a certain way), and less reliable for factual
    recall.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么不在所有情况下都使用微调呢？一旦你引入了新知识，LLM 总是会拥有它！这也是模型创建的方式——通过用数据进行训练，对吧？从理论上讲，这似乎是正确的，但在实践中，微调在教授模型特定任务（例如，教授模型如何以某种方式交谈）方面更为可靠，而在事实回忆方面则不太可靠。
- en: The reason is complicated, but in general, a model’s knowledge of facts is like
    a human’s long-term memory. If you memorize a long passage from a speech or book
    and then try to recall it a few months later, you will likely still understand
    the context of the information, but you may forget specific details. On the other
    hand, adding knowledge through the input of the model is like our short-term memory,
    where the facts, details, and even the order of wording are all very fresh and
    available for recall. It is this latter scenario that lends itself better in a
    situation where you want successful factual recall. And given how much more expensive
    fine-tuning can be, this makes it that much more important to consider RAG.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 原因很复杂，但总的来说，模型对事实的了解就像人类的长时记忆。如果你记住了演讲或书籍中的长篇大论，然后在几个月后尝试回忆，你可能会仍然理解信息的上下文，但你可能会忘记具体细节。另一方面，通过模型输入添加知识就像我们的短期记忆，其中事实、细节，甚至措辞的顺序都非常新鲜且可供回忆。在需要成功回忆事实的情况下，这种后一种情况更适合。鉴于微调可能更加昂贵，这使得考虑
    RAG 更加重要。
- en: There is a trade-off, though. While there are generally ways to feed all data
    you have to a model for fine-tuning, inputs are limited by the context window
    of the model. This is an area that is actively being addressed. For example, early
    versions of ChatGPT 3.5 had a 4,096 token context window, which is the equivalent
    of about 5 pages of text. There are now several models ranging from 1 to 10 million-token
    (1,000–10,000 pages) context windows.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然通常有方法将所有数据输入模型进行微调，但输入受限于模型的上下文窗口。这是一个正在积极解决的问题。例如，ChatGPT 3.5 的早期版本有一个 4,096
    个标记的上下文窗口，相当于大约 5 页文本。现在有几种模型，上下文窗口从 1 到 1000 万个标记（1000-10,000 页文本）不等。
- en: As the context windows expand, another issue is created. Early models with expanded
    context windows were shown to lose a lot of the details, especially in the *middle*
    of the text. This issue is also being addressed. The latest generation of models
    with million-token context windows, including Gemini 2.5 Pro, Claude Sonnet 4,
    and GPT-5, have shown significant improvements in tests called *needle in a haystack*
    tests for *remembering* all details well throughout the text it can take as input.
    However, these models still face challenges with more complex scenarios, such
    as *multiple needles in a haystack* tests, where they must track and recall numerous
    distinct pieces of information scattered throughout massive contexts. Additionally,
    research has shown that even with these improvements, model performance can degrade
    when relevant information is buried in the middle of very long contexts, a phenomenon
    sometimes called *lost in the middle*. Expect continued effort in this area as
    context windows grow even larger. Keep this in mind if you need to work with large
    amounts of text at a time, and consider strategies such as placing the most critical
    information at the beginning or end of your prompts.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 随着上下文窗口的扩大，又产生了另一个问题。研究表明，早期具有扩展上下文窗口的模型在细节上丢失了很多，尤其是在文本的*中间*部分。这个问题也在被解决。最新一代的模型，包括
    Gemini 2.5 Pro、Claude Sonnet 4 和 GPT-5，在所谓的*大海捞针*测试中显示出显著的改进，这些测试旨在检验模型在处理整个输入文本时能否很好地记住所有细节。然而，这些模型在更复杂的场景中仍然面临挑战，例如*大海捞针*测试，在这些测试中，它们必须跟踪和回忆散布在大量上下文中的众多不同信息片段。此外，研究表明，即使有了这些改进，当相关信息被埋藏在非常长的上下文中间时，模型的表现可能会下降，这种现象有时被称为*迷失在中间*。随着上下文窗口的进一步扩大，我们预计在这个领域将继续进行持续的努力。如果你需要一次性处理大量文本，请记住这一点，并考虑将最关键的信息放在提示的开始或结束处的策略。
- en: '**Note**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: It is important to note that *token count* differs from *word count*, as tokens
    include punctuation, symbols, numbers, and other text representations. How a compound
    word, such as *ice cream*, is treated token-wise depends on the tokenization scheme,
    and it can vary across LLMs. But most well-known LLMs (such as ChatGPT and Gemini)
    would consider *ice cream* as two tokens. Under certain circumstances in NLP,
    you may argue that it should be one token based on the concept that a token should
    represent a useful semantic unit for processing, but that is not the case for
    these models. In addition, when you talk about the context window of an LLM, that
    includes a combination of the input and output tokens, so make sure you save some
    room for the output!
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，*标记数*与*词数*不同，因为标记包括标点、符号、数字和其他文本表示。复合词，如*ice cream*，在标记方面的处理取决于标记化方案，并且可能在不同的大型语言模型（LLMs）中有所不同。但大多数知名LLMs（如ChatGPT和Gemini）会将*ice
    cream*视为两个标记。在自然语言处理（NLP）的某些情况下，你可能会根据标记应代表一个有用的语义处理单元的概念来争论它应该是一个标记，但对于这些模型来说并非如此。此外，当谈论LLM的上下文窗口时，这包括输入和输出标记的组合，因此请确保为输出留出一些空间！
- en: Fine-tuning can also be quite expensive, depending on the environment and resources
    you have available. In recent years, the costs for fine-tuning have come down
    substantially due to new techniques such as representative fine-tuning, LoRA-related
    techniques, and quantization. But in many RAG development efforts, fine-tuning
    is considered an additional cost to already expensive RAG efforts, so it is considered
    a more expensive addition to the efforts.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 微调也可能相当昂贵，这取决于你拥有的环境和资源。近年来，由于代表性的微调、LoRA相关技术和量化等新技术的出现，微调的成本大幅下降。但在许多RAG开发工作中，微调被视为已经昂贵的RAG工作之外的额外成本，因此它被视为对努力的一种更昂贵的补充。
- en: Ultimately, when deciding between RAG and fine-tuning, consider your specific
    use case and requirements. RAG is generally superior for retrieving factual information
    that is not present in the LLM’s training data or is private. It allows you to
    dynamically integrate external knowledge without modifying the model’s weights.
    Fine-tuning, on the other hand, is more suitable for teaching the model specialized
    tasks or adapting it to a specific domain. Keep the limitations of context window
    sizes and the potential for overfitting in mind when fine-tuning a specific dataset.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，在决定使用RAG和微调之间，考虑您的具体用例和需求。RAG通常在检索LLM训练数据中不存在或私有的事实性信息时表现更优。它允许您在不修改模型权重的情况下动态集成外部知识。另一方面，微调更适合教授模型特定任务或将其适应到特定领域。在微调特定数据集时，请记住上下文窗口大小的限制和过拟合的潜在可能性。
- en: Now that we have defined what RAG is, particularly when compared to other approaches
    that use generative AI, let’s review the general architecture of RAG systems.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了什么是RAG，尤其是与其他使用生成式AI的方法相比，让我们回顾一下RAG系统的通用架构。
- en: The architecture and stages of RAG systems
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAG系统的架构和阶段
- en: 'The following are the stages of a RAG process from how a user experiences it:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从用户体验的角度来看RAG过程的阶段：
- en: A user enters a query/question.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户输入一个查询/问题。
- en: The application thinks for a little while before checking the data it has access
    to, so that it can see what is most relevant.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用程序在检查它所能访问的数据之前会稍微思考一下，以便它能看到最相关的信息。
- en: The application provides a response that focuses on answering the user’s question,
    but using data that has been provided to it through the RAG pipeline.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用程序提供了一个专注于回答用户问题的响应，但使用通过RAG管道提供给它的大量数据。
- en: 'From a technical standpoint, this captures two of the stages you will code:
    the **retrieval** and **generation** stages. But there is one other stage, known
    as **indexing**, which can be and is often executed before the user enters the
    query. With indexing, you are turning supporting data into vectors, storing them
    in a vector database, and likely optimizing the search functionality so that the
    retrieval step is as fast and effective as possible.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术角度来看，这涵盖了您将编码的两个阶段：**检索**和**生成**阶段。但还有一个其他阶段，称为**索引**，它可以在用户输入查询之前执行。通过索引，您将辅助数据转换为向量，将它们存储在向量数据库中，并可能优化搜索功能，以便检索步骤尽可能快且有效。
- en: 'From a technical perspective, once the user passes their query into the system,
    the following steps occur:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术角度来看，一旦用户将他们的查询输入到系统中，以下步骤就会发生：
- en: The user query is vectorized.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户查询被向量化。
- en: The vectorized query is passed to a vector search to retrieve the most relevant
    data in a vector database representing your external data.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将向量化的查询传递到向量搜索中，以检索表示您外部数据的向量数据库中最相关的数据。
- en: The vector search returns the most relevant results and unique keys referencing
    the original content that those vectors represent.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向量搜索返回最相关的结果和引用原始内容的唯一键。
- en: The unique keys are used to pull out the original data associated with those
    vectors, often in a batch of multiple documents.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用唯一键来提取与这些向量相关联的原始数据，通常是一批多个文档。
- en: The original data might be filtered or post-processed, but will typically then
    be passed to an LLM based on what you expect the RAG process to do.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 原始数据可能会被过滤或后处理，但通常随后会传递到一个基于您期望RAG过程要做什么的LLM（大型语言模型）。
- en: 'The LLM is provided with a prompt that generally says something like:'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM（大型语言模型）提供了一个提示，通常说类似以下内容：
- en: '`You are a helpful assistant for question-answering tasks. Take the following
    question (the user query) and use this helpful information (the data retrieved
    in the similarity search) to answer it. If you don''t know the answer based on
    the information provided, just say you don''t know`.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '`您是一个问答任务的辅助助手。请根据以下问题（用户查询）和以下有用的信息（相似性搜索中检索到的数据）来回答。如果您根据提供的信息不知道答案，只需说不知道即可。`'
- en: The LLM processes that prompt and provides a response based on the external
    data you provided.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM处理该提示并根据您提供的扩展数据提供响应。
- en: Depending on the scope of the RAG system, these steps can be done in real time,
    or steps such as indexing can be done before the query so that it is ready to
    be searched when the time comes. Later in the book, we will cover some more advanced
    versions of retrieval, such as semantic caches, but the core concept is the same.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 根据RAG系统的范围，这些步骤可以是实时的，或者像索引这样的步骤可以在查询之前完成，以便在需要时可以立即搜索。本书后面将介绍一些更高级的检索版本，例如语义缓存，但核心概念是相同的。
- en: 'As mentioned previously, we can break these aspects down into three main stages
    (see *Figure 1.2*):'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们可以将这些方面分解为三个主要阶段（见图*1.2*）：
- en: Indexing
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 索引
- en: Retrieval
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索
- en: Generation
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成
- en: '![Figure 1.2 – The three stages of RAG](img/B34736_01_02.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图1.2 – RAG的三个阶段](img/B34736_01_02.png)'
- en: Figure 1.2 – The three stages of RAG
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.2 – RAG的三个阶段
- en: As described previously, these three stages make up the overall user pattern
    and design of a general RAG system. In [*Chapter 4*](B34736_04_ePub.xhtml#_idTextAnchor085),
    we will dive much deeper into understanding these stages. This will help you tie
    the concepts of this coding paradigm to their actual implementation.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，这三个阶段构成了整体用户模式和通用RAG系统的设计。在第[*4章*](B34736_04_ePub.xhtml#_idTextAnchor085)中，我们将更深入地了解这些阶段。这将帮助您将此编码范式中的概念与其实际应用联系起来。
- en: Summary
  id: totrans-163
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored RAG and its ability to enhance the capabilities
    of LLMs by integrating them with an organization’s internal data. We learned how
    RAG combines the power of LLMs with a company’s private data, enabling the model
    to utilize information it was not originally trained on, making the LLM’s outputs
    more relevant and valuable for the specific organization. We also discussed the
    advantages of RAG, such as improved accuracy and relevance, customization to a
    company’s domain, flexibility in data sources used, and expansion of the model’s
    knowledge beyond its original training data. Additionally, we examined the challenges
    and limitations of RAG, including dependency on data quality, the need for data
    cleaning, added computational overhead and complexity, and the potential for information
    overload if not properly filtered.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了RAG及其通过整合组织内部数据来增强LLM能力的能力。我们学习了RAG如何将LLM的力量与公司的私有数据相结合，使模型能够利用其最初训练时未使用的信息，从而使LLM的输出对特定组织更加相关和有价值。我们还讨论了RAG的优势，例如提高准确性和相关性、针对公司领域的定制化、数据源使用的灵活性以及将模型的知识扩展到其原始训练数据之外。此外，我们还考察了RAG的挑战和局限性，包括对数据质量的依赖性、数据清洗的需要、增加的计算开销和复杂性，以及如果未正确过滤，可能导致的信息过载。
- en: Midway through this chapter, we defined key vocabulary terms and emphasized
    the critical importance of understanding vectors. We explored examples of how
    RAG is being implemented across industries for various applications and compared
    RAG to conventional generative AI and model fine-tuning.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的中间部分，我们定义了关键词汇，并强调了理解向量的重要性。我们探讨了RAG在各个行业中实施的各种应用示例，并将RAG与传统的生成式AI和模型微调进行了比较。
- en: Finally, we outlined the architecture and stages of a typical RAG pipeline from
    both the user’s perspective and a technical standpoint while covering the indexing,
    retrieval, and generation stages of the RAG pipeline. In the next chapter, we
    will walk through these stages using an actual coding example.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们从用户视角和技术角度概述了典型RAG管道的架构和阶段，同时涵盖了RAG管道的索引、检索和生成阶段。在下一章中，我们将通过实际的编码示例来讲解这些阶段。
