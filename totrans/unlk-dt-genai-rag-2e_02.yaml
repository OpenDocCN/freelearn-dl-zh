- en: '1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What Is Retrieval-Augmented Generation?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The field of **artificial intelligence** (**AI**) is rapidly evolving, with
    generative AI at its center, and at the heart of generative AI lies **retrieval-augmented
    generation** (**RAG**). RAG has established itself as a central component in almost
    all production AI implementations, harnessing the intelligence and text generation
    capabilities of **large language models** (**LLMs**) and integrating them with
    a company’s internal data to enhance organizational operations significantly.
    Whether powering the most basic chatbot or the most advanced autonomous agent,
    RAG is an indispensable core component. Without it, none of these approaches can
    function effectively. This book focuses on numerous aspects of RAG, taking you
    from that basic chatbot implementation, all the way to the end, where we will
    build an agent that autonomously adapts its approach through every interaction,
    using RAG at its core to self-learn and self-heal. In this way, we will showcase
    the full power and application of RAG in modern generative AI development. As
    this book progresses, we will outline the potential of RAG in the enterprise,
    suggesting how it can make AI applications more responsive and smarter, aligning
    them with your organizational objectives. RAG has become a key facilitator of
    customized, efficient, and insightful AI solutions, bridging the gap between generative
    AI’s potential and your specific business needs. Our exploration of RAG will encourage
    you to unlock the full potential of your corporate data, paving the way for you
    to enter the era of AI-driven innovation.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding RAG – basics and principles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG vocabulary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding vectors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing RAG in AI applications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing RAG with conventional generative AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing RAG with model fine-tuning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The architecture and stages of RAG systems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By the end of this chapter, you will have a solid foundation in the core RAG
    concepts and understand the immense potential it offers organizations so that
    they can extract more value from their data and empower their LLMs. Let’s get
    started!
  prefs: []
  type: TYPE_NORMAL
- en: Free benefits with your book
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Your purchase includes a free PDF copy of this book along with other exclusive
    benefits. Check the *Free benefits with your book* section in the Preface to unlock
    them instantly and maximize your learning experience.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding RAG – basics and principles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Modern-day LLMs are impressive, but they have never seen your company’s private
    data (hopefully!). This means the ability of an LLM to help your company fully
    utilize its data is very limited. This very large barrier has given rise to the
    concept of RAG, where you are using the power and capabilities of the LLM but
    combining it with the knowledge and data contained within your company’s internal
    data repositories. This is the primary motivation for using RAG: to make new data
    available to the LLM and significantly increase the value you can extract from
    that data.'
  prefs: []
  type: TYPE_NORMAL
- en: Beyond internal data, RAG is also useful in cases where the LLM has not been
    trained on the data, even if it is public, such as the most recent research papers
    or articles about a topic that is strategic to your company. In both cases, we
    are talking about data that was not present during the training of the LLM. You
    can have the latest LLM trained on the most tokens ever, but if that data was
    not present for training, then the LLM will be at a disadvantage in helping you
    reach your full productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, this highlights the fact that, for most organizations, it is a central
    need to connect new data to an LLM. RAG is the most popular paradigm for doing
    this. This book focuses on showing you how to set up a RAG application with your
    data, as well as how to get the most out of it in various situations. We intend
    to give you an in-depth understanding of RAG and its importance in leveraging
    an LLM within the context of a company’s private or specific data needs.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you understand the basic motivations behind implementing RAG, let’s
    review some of the advantages of using it.
  prefs: []
  type: TYPE_NORMAL
- en: Advantages of RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Some of the potential advantages of using RAG include improved accuracy and
    relevance, customization, flexibility, and expanding the model’s knowledge beyond
    the training data. Let’s take a closer look:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Improved accuracy and relevance**: RAG can significantly enhance the accuracy
    and relevance of responses that are generated by LLMs. RAG fetches and incorporates
    specific information from a database or dataset, typically in real time, and ensures
    that the output is based on both the model’s pre-existing knowledge and the most
    current and relevant data that you are providing directly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customization**: RAG allows you to customize and adapt the model’s knowledge
    to your specific domain or use case. By pointing RAG to databases or datasets
    directly relevant to your application, you can tailor the model’s outputs so that
    they align closely with the information and style that matters most for your specific
    needs. This customization enables the model to provide more targeted and useful
    responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexibility**: RAG provides flexibility in terms of the data sources that
    the model can access. You can apply RAG to various structured and unstructured
    data, including databases, web pages, documents, and more. This flexibility allows
    you to leverage diverse information sources and combine them in novel ways to
    enhance the model’s capabilities. Additionally, you can update or swap out the
    data sources as needed, enabling the model to adapt to changing information landscapes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Expanding model knowledge beyond training data**: LLMs are limited by the
    scope of their training data. RAG overcomes this limitation by enabling models
    to access and utilize information that was not included in their initial training
    sets. This effectively expands the knowledge base of the model without the need
    for retraining, making LLMs more versatile and adaptable to new domains or rapidly
    evolving topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Removing hallucinations**: The LLM is a key component within the RAG system.
    LLMs have the potential to provide wrong information, also known as hallucinations.
    These hallucinations can manifest in several ways, such as made-up facts, incorrect
    facts, or even nonsensical verbiage. Often, the hallucination is worded in a way
    that can be very convincing, causing it to be difficult to identify. A well-designed
    RAG application can reduce hallucinations much more easily than when directly
    using an LLM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With that, we’ve covered the key advantages of implementing RAG in your organization.
    Next, let’s discuss some of the challenges you might face.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges of RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are some challenges to using RAG as well, which include dependency on
    the quality of the internal data, the need for data manipulation and cleaning,
    computational overhead, more complex integrations, and the potential for information
    overload. Let’s review these challenges and gain a better understanding of how
    they impact RAG pipelines and what can be done about them:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dependency on data quality**: When talking about how data can impact an AI
    model, the saying in data science circles is *garbage in, garbage out*. This means
    that if you give a model bad data, it will give you bad results. RAG is no different.
    The effectiveness of RAG is directly tied to the quality of the data it retrieves.
    If the underlying database or dataset contains outdated, biased, or inaccurate
    information, the outputs generated by RAG will likely suffer from the same issues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Need for data manipulation and cleaning**: Data in the recesses of the company
    often has a lot of value to it, but it is not often in good, accessible shape.
    For example, data from PDF-based customer statements needs a lot of massaging
    so that it can be put into a format that can be useful to a RAG pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Computational overhead**: A RAG pipeline introduces a host of new computational
    steps into the response generation process, including data retrieval, processing,
    and integration. LLMs are getting faster every day, but even the fastest response
    can be more than a second, and some can take several seconds. If you combine that
    with other data processing steps, and possibly multiple LLM calls, the result
    can be a very significant increase in the time it takes to receive a response.
    This all leads to increased computational overhead, affecting the efficiency and
    scalability of the entire system. As with any other IT initiative, an organization
    must balance the benefits of enhanced accuracy and customization against the resource
    requirements and potential latency introduced by these additional processes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data storage explosion – complexity in integration and maintenance**: Traditionally,
    your data resides in a data source that’s queried in various ways to be made available
    to your internal and external systems. But with RAG, your data resides in multiple
    forms and locations, such as vectors in a vector database, that represent the
    same data, but in a different format. Add in the complexity of connecting these
    various data sources to LLMs and relevant technical mechanisms, such as vector
    searches, and you have a significant increase in complexity. This increased complexity
    can be resource-intensive. Maintaining this integration over time, especially
    as data sources evolve or expand, adds even more complexity and cost. Organizations
    need to invest in technical expertise and infrastructure to leverage RAG capabilities
    effectively while accounting for the rapid increase in complexities these systems
    bring with them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Potential for information overload**: RAG-based systems can pull in too much
    information. It is just as important to implement mechanisms to address this issue
    as it is to handle times when not enough relevant information is found. Determining
    the relevance and importance of retrieved information to be included in the final
    output requires sophisticated filtering and ranking mechanisms. Without these,
    the quality of the generated content could be compromised by an excess of unnecessary
    or marginally relevant details.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hallucinations**: While we listed removing hallucinations as an advantage
    of using RAG, hallucinations do pose one of the biggest challenges to RAG pipelines
    if they’re not dealt with properly. A well-designed RAG application must take
    measures to identify and remove hallucinations and undergo significant testing
    before the final output text is provided to the end user. This is a difficult
    task to implement, often requiring additional logic layers in a production-level
    application, but they all require RAG to work (as RAG gives you the data that
    you use to validate and remove the hallucinations). In contrast, if you are just
    using an LLM response directly, with no RAG component, it is almost impossible
    to eliminate hallucinations when they occur.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High levels of complexity within RAG components**: A typical RAG application
    tends to have a high level of complexity, with many components that need to be
    optimized for the overall application to function properly. The components can
    interact with each other in several ways, often with many more steps than the
    basic RAG pipeline you start with. Every component within the pipeline needs significant
    amounts of trials and testing, including your prompt design and engineering, the
    LLMs you use and how you use them, the various algorithms and their parameters
    for retrieval, the interface you use to access your RAG application, and numerous
    other aspects that you will need to add over the course of your development.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we explored the key advantages of implementing RAG in your
    organization, including improved accuracy and relevance, customization, flexibility,
    and the ability to expand the model’s knowledge beyond its initial training data.
    We also discussed some of the challenges you might face when deploying RAG, such
    as dependency on data quality, the need for data manipulation and cleaning, increased
    computational overhead, complexity in integration and maintenance, and the potential
    for information overload. Understanding these benefits and challenges provides
    a foundation for diving deeper into the core concepts and vocabulary used in RAG
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: To understand the approaches we will introduce, you will need a good understanding
    of the vocabulary used to discuss these approaches. In the following section,
    we will familiarize ourselves with some of the foundational concepts so that you
    can better understand the various components and techniques involved in building
    effective RAG pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: RAG vocabulary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now is as good a time as any to review some vocabulary that should help you
    become familiar with the various concepts in RAG. In the following subsections,
    we will familiarize ourselves with some of this vocabulary, including LLMs, prompting
    concepts, inference, context windows, fine-tuning approaches, vector databases,
    and vectors/embeddings. This is not an exhaustive list, but understanding these
    core concepts should help you understand everything else we will teach you about
    RAG in a more effective way.
  prefs: []
  type: TYPE_NORMAL
- en: LLM
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most of this book will deal with LLMs. LLMs are generative AI technologies that
    focus on generating text. We will keep things simple by concentrating on the type
    of model that most RAG pipelines use, the LLM. However, we would like to clarify
    that while we will focus primarily on LLMs, RAG can also be applied to other types
    of generative models, such as those for images, audio, and videos. We will focus
    on these other types of models and how they are used in RAG in [*Chapter 14*](B34736_14_ePub.xhtml#_idTextAnchor327).
  prefs: []
  type: TYPE_NORMAL
- en: Some popular examples of LLMs are the OpenAI ChatGPT models, the Meta Llama
    models, Google’s Gemini models, and Anthropic’s Claude models.
  prefs: []
  type: TYPE_NORMAL
- en: Prompting, prompt design, and prompt engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'These terms are sometimes used interchangeably, but technically, while they
    all have to do with prompting, they do have different meanings:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompting** is the act of sending a query or *prompt* to an LLM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt design** refers to the strategy you implement to *design* the prompt
    you will send to the LLM. Many different prompt design strategies work in different
    scenarios. We will review many of these in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt engineering** focuses more on the technical aspects surrounding the
    prompt that you use to improve the outputs from the LLM. For example, you may
    break up a complex query into two or three different LLM interactions, *engineering*
    it better to achieve superior results. We will also review prompt engineering
    in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LangChain and LlamaIndex
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book will focus on using **LangChain** as the framework for building our
    RAG pipelines. LangChain is an open source framework that supports not just RAG
    but any development that wants to use LLMs within a pipeline approach. As of February
    2025, LangChain has over 99,000 GitHub stars and approximately 28 million downloads
    per month, with total downloads exceeding 130 million across Python and JavaScript
    platforms. In May 2025, LangChain reached over 70 million downloads in a single
    month, surpassing even the OpenAI SDK. It supports RAG particularly well, providing
    a modular and flexible set of tools that make RAG development significantly more
    efficient than not using a framework.
  prefs: []
  type: TYPE_NORMAL
- en: While LangChain is currently the most popular framework for developing RAG pipelines,
    **LlamaIndex** is a leading alternative to LangChain, with similar capabilities
    in general. As of October 2025, LlamaIndex has approximately 5.2 million monthly
    downloads. LlamaIndex is known for its focus on search and retrieval tasks, optimized
    specifically for indexing and retrieving structured and unstructured data through
    efficient document processing. It may be a good option if you require advanced
    search or need to handle large, document-heavy datasets where retrieval speed
    and accuracy are paramount.
  prefs: []
  type: TYPE_NORMAL
- en: Many other options focus on various niches. Once you have gotten familiar with
    building RAG pipelines, be sure to look at some of the other options to see whether
    there are frameworks that work better for your particular project.
  prefs: []
  type: TYPE_NORMAL
- en: Inference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will use the term **inference** from time to time. Generally, this refers
    to the process of the LLM generating outputs or predictions based on given inputs
    using a pretrained language model. For example, when you ask ChatGPT a question,
    the steps it takes to provide you with a response are called inference.
  prefs: []
  type: TYPE_NORMAL
- en: AI agents and agent-related terminology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'AI agents represent one of the most significant developments in RAG applications.
    An **AI agent** is an autonomous system that can perceive its environment, make
    decisions, and take actions to achieve specific goals. Agents are still very much
    utilizing RAG concepts, but they use them in new and innovative ways, where the
    generation step performs reasoning on top of the traditional generation we will
    talk about in the first chapters of this book. This new reasoning step allows
    the agent to do things such as reason through problems, use tools, and execute
    multi-step workflows. Here are the key agent-related terms:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agentic AI or agentic systems**: AI systems that can independently plan,
    execute tasks, and adapt their behavior based on feedback. These systems use RAG
    as a core component to access and reason over information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool calling (also called function calling)**: The ability of an LLM or agent
    to invoke external tools, APIs, or functions to accomplish tasks beyond text generation.
    For example, an agent might call a calculator function for math problems or query
    a database for specific information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model Context Protocol** (**MCP**): An open standard developed by Anthropic
    that provides a universal way for AI agents to connect with external data sources,
    tools, and services. MCP standardizes how agents discover and interact with available
    capabilities, making it easier to build interoperable agent systems that can access
    diverse resources through a consistent interface.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ReAct (Reasoning and Acting)**: A prompting paradigm where agents alternate
    between reasoning about a problem and taking actions. The agent thinks step by
    step, decides what tool to use, observes the result, and continues reasoning until
    the task is complete.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chain-of-thought**: A technique where the LLM breaks down complex problems
    into intermediate reasoning steps, making its thought process explicit. This is
    fundamental to how agents plan and execute multi-step tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent memory**: The system that allows agents to retain information across
    interactions, including short-term memory (current conversation context) and long-term
    memory (persistent knowledge from past interactions).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orchestration**: The coordination and management of multiple agents, tools,
    or LLM calls to accomplish complex tasks. LangChain and LangGraph specialize in
    agent orchestration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human-in-the-loop** (**HITL**): A pattern where agents pause execution to
    request human input, approval, or guidance before proceeding with certain actions.
    This is crucial for high-stakes decisions or when agent confidence is low. HITL
    is conducted in the middle of the RAG process, which we call *on the hotpath*.
    If this is done *off* the hotpath, it is called **human-on-the-loop** (**HOTL**).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-agent systems**: Architectures where multiple specialized agents work
    together, each with specific roles and capabilities, to solve complex problems
    that no single agent could handle effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will spend the first 11 chapters of this book stepping through numerous RAG-related
    concepts and ensuring that you have the foundational knowledge of RAG to be highly
    successful. But in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284), we will
    come back to agents and spend *Chapters 12*–*19* discussing how this most advanced
    use of RAG can take your generative AI development to a whole new level.
  prefs: []
  type: TYPE_NORMAL
- en: Context window
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **context window**, in the context of LLMs, refers to the maximum number of
    tokens (words, sub-words, or characters) that the model can process in a single
    pass. It determines the amount of text the model can *see* or *attend to* at once
    when making predictions or generating responses.
  prefs: []
  type: TYPE_NORMAL
- en: The context window size is a key parameter of the model architecture and is
    typically fixed during model training. It directly relates to the input size of
    the model, as it sets an upper limit on the number of tokens that can be fed into
    the model at a time.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if a model has a context window size of 4,096 tokens, it means
    that the model can process and generate sequences of up to 4,096 tokens. When
    processing longer texts, such as documents or conversations, the input needs to
    be divided into smaller segments that fit within the context window. This is often
    done using techniques such as sliding windows or truncation.
  prefs: []
  type: TYPE_NORMAL
- en: The size of the context window has implications for the model’s ability to understand
    and maintain long-range dependencies and context. Models with larger context windows
    can capture and utilize more contextual information when generating responses,
    which can lead to more coherent and contextually relevant outputs. However, increasing
    the context window size also increases the computational resources required to
    train and run the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the context of RAG, the context window size is essential because it determines
    how much information from the retrieved documents can be effectively utilized
    by the model when generating the final response. Recent advancements in language
    models have led to the development of models with significantly larger context
    windows, enabling them to process and retain more information from the retrieved
    sources. See *Table 1.1* to see the context windows of many popular LLMs, both
    closed and open sourced:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **LLM** | **Context Window (Tokens)** |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT-3.5 Turbo 0613 (OpenAI), Llama 2 (Meta) | 4,096 |'
  prefs: []
  type: TYPE_TB
- en: '| Llama 3 (Meta) | 8,000 |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT-4 (OpenAI) | 8,192 |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT-3.5 Turbo 0125 (OpenAI) | 16,385 |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT-4.0-32k (OpenAI), Mistral (Mistral AI), Mixtral (Mistral AI), DBRX
    (Databricks), Gemini 1.0 Pro (Google) | 32,000 |'
  prefs: []
  type: TYPE_TB
- en: '| ChatGPT-4.0 Turbo (OpenAI), ChatGPT-4o (OpenAI), Llama 3.1 (Meta), Mistral
    Large 2 (Mistral AI), Mistral Small 3.1 (Mistral AI), Mistral NeMo (Mistral AI),
    DeepSeek R1 & V3 (DeepSeek) | 128,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Claude 2.1, 3, Opus 4, Sonnet 3.7, Haiku 3.5 (Anthropic) | 200,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Qwen3-Max-Preview (Alibaba) | 258,000 |'
  prefs: []
  type: TYPE_TB
- en: '| GPT-5 (API) (OpenAI) | 400,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Llama 4 Maverick (Meta) | 512,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Gemini 1.5 Pro, 2.5 Pro, 2.5 Flash (Google), Claude Sonnet 4 (Anthropic)
    | 1,000,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Gemini 2.0 (Extended Window) (Google) | 2,000,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Llama 4 Scout (Meta) | 10,000,000 |'
  prefs: []
  type: TYPE_TB
- en: Table 1.1 – Different context windows for LLMs (as of October 2025)
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 1.1*, which is based on *Table 1.1*, shows the largest context window
    sizes of the major LLM services visually:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.1 – Largest context windows for major LLM services](img/B34736_01_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.1 – Largest context windows for major LLM services
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that *Figure 1.1* shows a selection of the largest context window sizes
    from major LLM providers, illustrating the dramatic scale differences that have
    emerged. The progression is remarkable: from DBRX’s 32,000 tokens to Llama 4 Scout’s
    groundbreaking 10 million tokens—a more than 300x increase. This acceleration
    in context window expansion represents one of the most significant developments
    in recent LLM evolution, with models now capable of processing entire books, extensive
    code bases, or thousands of pages of documentation in a single pass. While older
    models tended to have smaller context windows measured in thousands of tokens,
    the newest models have pushed boundaries into the millions, with some specialized
    models even reaching hundreds of millions of tokens. This trend is likely to continue,
    fundamentally transforming how RAG systems can be designed and implemented, as
    larger context windows reduce the need for complex retrieval strategies in some
    use cases while enabling entirely new applications in others. However, at this
    level of tokens, keep an eye on costs, as these LLMs charge you based on token
    input and output. If you are constantly sending 10 million tokens into an LLM
    compared to a few thousand, you can expect a hefty bill from that service!'
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning – full-model fine-tuning and parameter-efficient fine-tuning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Full-model fine-tuning** (**FMFT**) is where you take a foundation model
    and train it further to gain new capabilities. You could simply give it new knowledge
    for a specific domain, or you could give it a skill, such as being a conversational
    chatbot. FMFT updates all the parameters and biases in the model.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Parameter-efficient fine-tuning** (**PEFT**), on the other hand, is a type
    of fine-tuning where you focus only on specific parts of the parameters or biases
    when you fine-tune the model, but with a similar goal as general fine-tuning.
    The latest research in this area shows that you can achieve similar results to
    FMFT with far less cost, time commitment, and data.'
  prefs: []
  type: TYPE_NORMAL
- en: While this book does not focus on fine-tuning, it is a very valid strategy to
    try to use a model fine-tuned with your data to give it more knowledge from your
    domain or to give it more of a *voice* from your domain. For example, you could
    train it to talk more like a scientist than a generic foundation model, if you’re
    using this in a scientific field. Alternatively, if you are developing in a legal
    field, you may want it to sound more like a lawyer.
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning also helps the LLM to understand your company’s data better, making
    it better at generating an effective response during the RAG process. For example,
    if you have a scientific company, you might fine-tune a model with scientific
    information and use it for a RAG application that summarizes your research. This
    may improve your RAG application’s output (the summaries of your research) because
    your fine-tuned model understands your data better and can provide a more effective
    summary.
  prefs: []
  type: TYPE_NORMAL
- en: Vector store or vector database?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Both! All vector databases are vector stores, but not all vector stores are
    vector databases. OK, while you get out your chalkboard to draw a Venn diagram,
    I will continue to explain this statement. There are ways to store vectors that
    are not full databases. They are simply storage devices for vectors. So, to encompass
    all possible ways to store vectors, LangChain calls them all **vector stores**.
    We will talk more in-depth about this in [*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137),
    but for now, just note that these are generally considered the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Vectors, vectors, vectors!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **vector** is a mathematical representation of your data. They are often referred
    to as **embeddings** when talking specifically about **natural language processing**
    (**NLP**) and LLMs. Vectors are one of the most important concepts to understand,
    and there are many different parts of a RAG pipeline that utilize vectors.
  prefs: []
  type: TYPE_NORMAL
- en: We just covered many key vocabulary terms that will be important for you to
    understand the rest of this book. Many of these concepts will be expanded upon
    in future chapters. In the next section, we will continue to discuss vectors in
    further depth. And beyond that, we will spend *Chapters 7* and *8* going over
    vectors and how they are used to find similar content.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding vectors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It could be argued that understanding vectors and all the ways they are used
    in RAG is the most important part of this entire book. As mentioned previously,
    vectors are simply the mathematical representations of your external data, and
    they are often referred to as embeddings. These representations capture semantic
    information in a format that can be processed by algorithms, facilitating tasks
    such as similarity search, which is a crucial step in the RAG process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Vectors typically have a specific dimension based on how many numbers are represented
    by them. For example, this is a four-dimensional vector: `[0.123, 0.321, 0.312,
    0.231]`.'
  prefs: []
  type: TYPE_NORMAL
- en: If you didn’t know we were talking about vectors and you saw this in Python
    code, you might recognize this as a list of four floating points, and you aren’t
    too far off. However, when working with vectors in Python, you want to recognize
    them as a NumPy array, rather than lists. NumPy arrays are generally more machine-learning-friendly
    because they are optimized to be processed much faster and more efficiently than
    Python lists, and they are more broadly recognized as the de facto representation
    of embeddings across machine learning packages such as SciPy, pandas, scikit-learn,
    TensorFlow, Keras, Pytorch, and many others. NumPy also enables you to perform
    vectorized math directly on the NumPy array, such as performing element-wise operations,
    without having to code in loops and other approaches you might have to use if
    you were using a different type of sequence.
  prefs: []
  type: TYPE_NORMAL
- en: When working with vectors for vectorization, there are often hundreds or thousands
    of dimensions, which refers to the number of floating points present in the vector.
    Higher dimensionality can capture more detailed semantic information, which is
    crucial for accurately matching query inputs with relevant documents or data in
    RAG applications.
  prefs: []
  type: TYPE_NORMAL
- en: In [*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137), we will cover the key
    role that vectors and vector databases play in RAG implementation. Then, in [*Chapter
    8*](B34736_08_ePub.xhtml#_idTextAnchor176), we will dive more into the concept
    of similarity searches, which utilize vectors to search much faster and more efficiently.
    These are key concepts that will help you gain a much deeper understanding of
    how to better implement a RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding vectors can be a crucial underlying concept to understand how
    to implement RAG, but how is RAG used in practical applications in the enterprise?
    We will discuss these practical AI applications of RAG in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing RAG in AI applications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'RAG has rapidly become a cornerstone of generative AI platforms in the corporate
    world. RAG combines the power of retrieving internal or *new* data with generative
    language models to enhance the quality and relevance of the generated text. This
    technique can be particularly useful for companies across various industries to
    improve their products, services, and operational efficiencies. The following
    are some examples of how RAG can be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer support and chatbots**: These can exist without RAG, but when integrated
    with RAG, it can connect those chatbots with past customer interactions, FAQs,
    support documents, and anything else that was specific to that customer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Technical support**: With better access to customer history and information,
    RAG-enhanced chatbots can provide a significant improvement to current technical
    support chatbots.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automated reporting**: RAG can assist in creating initial drafts or summarizing
    existing articles, research papers, and other types of unstructured data into
    more digestible formats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**E-commerce support**: For e-commerce companies, RAG can help generate dynamic
    product descriptions and user content, as well as make better product recommendations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Utilizing knowledge bases**: RAG improves the searchability and utility of
    both internal and general knowledge bases by generating summaries, providing direct
    answers to queries, and retrieving relevant information across various domains
    such as legal, compliance, research, medical, academia, patents, and technical
    documents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Innovation scouting**: This is like searching general knowledge bases, but
    with a focus on innovation. With this, companies can use RAG to scan and summarize
    information from quality sources to identify trends and potential areas for innovations
    that are relevant to that company’s specialization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training and education**: RAG can be used by education organizations and
    corporate training programs to generate or customize learning materials based
    on specific needs and knowledge levels of the learners. With RAG, a much deeper
    level of internal knowledge from the organization can be incorporated into the
    educational curriculum in very customized ways to the individual or role.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Advanced agent applications**: RAG serves as the foundation for autonomous
    AI agents that can perform complex, multi-step tasks. These agentic systems combine
    RAG with reasoning capabilities, tool calling, and decision-making to handle sophisticated
    workflows such as automated code review and refactoring, multi-document legal
    analysis and contract generation, autonomous research assistants that can plan
    research strategies and synthesize findings, and intelligent workflow automation
    that adapts to changing business conditions. By integrating RAG at their core,
    these agents can access vast knowledge bases while maintaining the ability to
    reason, plan, and execute actions autonomously, representing the next evolution
    beyond simple question-answering systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are just a few of the ways organizations are using RAG right now to improve
    their operations. We will dive into each of these areas in more depth in [*Chapter
    3*](B34736_03_ePub.xhtml#_idTextAnchor064), helping you understand how you can
    implement all these game-changing initiatives in multiple places in your company.
  prefs: []
  type: TYPE_NORMAL
- en: You might be wondering, “*If I am using an LLM such as ChatGPT to answer my
    questions in my company, does that mean my company is using RAG already?*”
  prefs: []
  type: TYPE_NORMAL
- en: The answer is “*No.*”
  prefs: []
  type: TYPE_NORMAL
- en: If you just log in to ChatGPT and ask questions, that is not the same as implementing
    RAG. Both ChatGPT and RAG are forms of generative AI, and they are sometimes used
    together, but they are two different concepts. In the next section, we will discuss
    the differences between generative AI and RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Comparing RAG with conventional generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conventional generative AI has already shown to be a revolutionary change for
    companies, helping their employees reach new levels of productivity. LLMs such
    as ChatGPT are assisting users with a rapidly growing list of applications that
    include writing business plans, writing and improving code, writing marketing
    copy, and even providing healthier recipes for a specific diet. Ultimately, much
    of what users are doing is getting done faster.
  prefs: []
  type: TYPE_NORMAL
- en: However, conventional generative AI does not know what it does not know. And
    that includes most of the internal data in your company. Can you imagine what
    you could do with all the benefits mentioned previously, but combined with all
    the data within your company – about everything your company has ever done, about
    your customers and all their interactions, or about all your products and services
    combined with a knowledge of what a specific customer’s needs are? You do not
    have to imagine it – that is what RAG does!
  prefs: []
  type: TYPE_NORMAL
- en: Before RAG, most of the services you saw that connected customers or employees
    with the data resources of the company were just scratching the surface of what
    is possible compared to if they could access *all* the data in the company. With
    the advent of RAG and generative AI in general, corporations are on the precipice
    of something really, really big.
  prefs: []
  type: TYPE_NORMAL
- en: Another area you might confuse RAG with is the concept of fine-tuning a model.
    Let’s discuss what the differences are between these types of approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Comparing RAG with model fine-tuning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'LLMs can be adapted to your data in two ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fine-tuning**: With fine-tuning, you are adjusting the weights and/or biases
    that define the model’s intelligence based on new training data. This directly
    impacts the model, permanently changing how it will interact with new inputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Input/prompts**: This is where you *use* the model, using the prompt/input
    to introduce new knowledge that the LLM can act upon.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why not use fine-tuning in all situations? Once you have introduced the new
    knowledge, the LLM will always have it! It is also how the model was created –
    by being trained with data, right? That sounds right in theory, but in practice,
    fine-tuning has been more reliable in teaching a model specialized tasks (such
    as teaching a model how to converse in a certain way), and less reliable for factual
    recall.
  prefs: []
  type: TYPE_NORMAL
- en: The reason is complicated, but in general, a model’s knowledge of facts is like
    a human’s long-term memory. If you memorize a long passage from a speech or book
    and then try to recall it a few months later, you will likely still understand
    the context of the information, but you may forget specific details. On the other
    hand, adding knowledge through the input of the model is like our short-term memory,
    where the facts, details, and even the order of wording are all very fresh and
    available for recall. It is this latter scenario that lends itself better in a
    situation where you want successful factual recall. And given how much more expensive
    fine-tuning can be, this makes it that much more important to consider RAG.
  prefs: []
  type: TYPE_NORMAL
- en: There is a trade-off, though. While there are generally ways to feed all data
    you have to a model for fine-tuning, inputs are limited by the context window
    of the model. This is an area that is actively being addressed. For example, early
    versions of ChatGPT 3.5 had a 4,096 token context window, which is the equivalent
    of about 5 pages of text. There are now several models ranging from 1 to 10 million-token
    (1,000–10,000 pages) context windows.
  prefs: []
  type: TYPE_NORMAL
- en: As the context windows expand, another issue is created. Early models with expanded
    context windows were shown to lose a lot of the details, especially in the *middle*
    of the text. This issue is also being addressed. The latest generation of models
    with million-token context windows, including Gemini 2.5 Pro, Claude Sonnet 4,
    and GPT-5, have shown significant improvements in tests called *needle in a haystack*
    tests for *remembering* all details well throughout the text it can take as input.
    However, these models still face challenges with more complex scenarios, such
    as *multiple needles in a haystack* tests, where they must track and recall numerous
    distinct pieces of information scattered throughout massive contexts. Additionally,
    research has shown that even with these improvements, model performance can degrade
    when relevant information is buried in the middle of very long contexts, a phenomenon
    sometimes called *lost in the middle*. Expect continued effort in this area as
    context windows grow even larger. Keep this in mind if you need to work with large
    amounts of text at a time, and consider strategies such as placing the most critical
    information at the beginning or end of your prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that *token count* differs from *word count*, as tokens
    include punctuation, symbols, numbers, and other text representations. How a compound
    word, such as *ice cream*, is treated token-wise depends on the tokenization scheme,
    and it can vary across LLMs. But most well-known LLMs (such as ChatGPT and Gemini)
    would consider *ice cream* as two tokens. Under certain circumstances in NLP,
    you may argue that it should be one token based on the concept that a token should
    represent a useful semantic unit for processing, but that is not the case for
    these models. In addition, when you talk about the context window of an LLM, that
    includes a combination of the input and output tokens, so make sure you save some
    room for the output!
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning can also be quite expensive, depending on the environment and resources
    you have available. In recent years, the costs for fine-tuning have come down
    substantially due to new techniques such as representative fine-tuning, LoRA-related
    techniques, and quantization. But in many RAG development efforts, fine-tuning
    is considered an additional cost to already expensive RAG efforts, so it is considered
    a more expensive addition to the efforts.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, when deciding between RAG and fine-tuning, consider your specific
    use case and requirements. RAG is generally superior for retrieving factual information
    that is not present in the LLM’s training data or is private. It allows you to
    dynamically integrate external knowledge without modifying the model’s weights.
    Fine-tuning, on the other hand, is more suitable for teaching the model specialized
    tasks or adapting it to a specific domain. Keep the limitations of context window
    sizes and the potential for overfitting in mind when fine-tuning a specific dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have defined what RAG is, particularly when compared to other approaches
    that use generative AI, let’s review the general architecture of RAG systems.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture and stages of RAG systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following are the stages of a RAG process from how a user experiences it:'
  prefs: []
  type: TYPE_NORMAL
- en: A user enters a query/question.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The application thinks for a little while before checking the data it has access
    to, so that it can see what is most relevant.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The application provides a response that focuses on answering the user’s question,
    but using data that has been provided to it through the RAG pipeline.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'From a technical standpoint, this captures two of the stages you will code:
    the **retrieval** and **generation** stages. But there is one other stage, known
    as **indexing**, which can be and is often executed before the user enters the
    query. With indexing, you are turning supporting data into vectors, storing them
    in a vector database, and likely optimizing the search functionality so that the
    retrieval step is as fast and effective as possible.'
  prefs: []
  type: TYPE_NORMAL
- en: 'From a technical perspective, once the user passes their query into the system,
    the following steps occur:'
  prefs: []
  type: TYPE_NORMAL
- en: The user query is vectorized.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The vectorized query is passed to a vector search to retrieve the most relevant
    data in a vector database representing your external data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The vector search returns the most relevant results and unique keys referencing
    the original content that those vectors represent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The unique keys are used to pull out the original data associated with those
    vectors, often in a batch of multiple documents.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The original data might be filtered or post-processed, but will typically then
    be passed to an LLM based on what you expect the RAG process to do.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The LLM is provided with a prompt that generally says something like:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`You are a helpful assistant for question-answering tasks. Take the following
    question (the user query) and use this helpful information (the data retrieved
    in the similarity search) to answer it. If you don''t know the answer based on
    the information provided, just say you don''t know`.'
  prefs: []
  type: TYPE_NORMAL
- en: The LLM processes that prompt and provides a response based on the external
    data you provided.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Depending on the scope of the RAG system, these steps can be done in real time,
    or steps such as indexing can be done before the query so that it is ready to
    be searched when the time comes. Later in the book, we will cover some more advanced
    versions of retrieval, such as semantic caches, but the core concept is the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned previously, we can break these aspects down into three main stages
    (see *Figure 1.2*):'
  prefs: []
  type: TYPE_NORMAL
- en: Indexing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieval
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 1.2 – The three stages of RAG](img/B34736_01_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.2 – The three stages of RAG
  prefs: []
  type: TYPE_NORMAL
- en: As described previously, these three stages make up the overall user pattern
    and design of a general RAG system. In [*Chapter 4*](B34736_04_ePub.xhtml#_idTextAnchor085),
    we will dive much deeper into understanding these stages. This will help you tie
    the concepts of this coding paradigm to their actual implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored RAG and its ability to enhance the capabilities
    of LLMs by integrating them with an organization’s internal data. We learned how
    RAG combines the power of LLMs with a company’s private data, enabling the model
    to utilize information it was not originally trained on, making the LLM’s outputs
    more relevant and valuable for the specific organization. We also discussed the
    advantages of RAG, such as improved accuracy and relevance, customization to a
    company’s domain, flexibility in data sources used, and expansion of the model’s
    knowledge beyond its original training data. Additionally, we examined the challenges
    and limitations of RAG, including dependency on data quality, the need for data
    cleaning, added computational overhead and complexity, and the potential for information
    overload if not properly filtered.
  prefs: []
  type: TYPE_NORMAL
- en: Midway through this chapter, we defined key vocabulary terms and emphasized
    the critical importance of understanding vectors. We explored examples of how
    RAG is being implemented across industries for various applications and compared
    RAG to conventional generative AI and model fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we outlined the architecture and stages of a typical RAG pipeline from
    both the user’s perspective and a technical standpoint while covering the indexing,
    retrieval, and generation stages of the RAG pipeline. In the next chapter, we
    will walk through these stages using an actual coding example.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
