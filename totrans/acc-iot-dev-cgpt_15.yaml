- en: '15'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '15'
- en: Processing, Storing, and Querying Sensor Data on AWS Cloud
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 AWS 云上处理、存储和查询传感器数据
- en: In the previous chapter, we successfully instructed ChatGPT in creating an MQTT
    publish topic and a JSON-format payload in ESP32, which then delivered the serialized
    data to AWS IoT Core. Starting from this chapter, we will use additional AWS services.
    These will allow us to process abnormal events, trigger corresponding email alerts,
    and store, transform, sort, and query all the received sensor data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们成功指导 ChatGPT 在 ESP32 中创建了一个 MQTT 发布主题和 JSON 格式的有效载荷，然后这些序列化数据被发送到 AWS
    IoT Core。从本章开始，我们将使用额外的 AWS 服务。这些服务将使我们能够处理异常事件、触发相应的电子邮件警报，以及存储、转换、排序和查询所有接收到的传感器数据。
- en: By the end of this chapter, you will have acquired the necessary skills to configure
    a variety of other AWS services to process, store, and query the collected sensor
    data. This will allow you to carry out a range of critical tasks that are routinely
    employed in the context of commercial deployment.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将掌握配置各种其他 AWS 服务以处理、存储和查询收集到的传感器数据所需的技能。这将使您能够执行在商业部署环境中常规使用的各种关键任务。
- en: 'In this chapter, we’re going to cover the following main topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍以下主要主题：
- en: Creating a customer-managed policy
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建客户管理的策略
- en: Task 1 – abnormal event process
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务 1 – 异常事件处理
- en: Task 2 – data storage and querying
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务 2 – 数据存储和查询
- en: Creating a customer-managed policy
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建客户管理的策略
- en: 'In [*Chapter 13*](B22002_13.xhtml#_idTextAnchor319), using the principle of
    *least privilege* in AWS, we created a regular IAM user and attached the following
    permission policies to it:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 13 章*](B22002_13.xhtml#_idTextAnchor319) 中，我们利用 AWS 中的 *最小权限原则* 创建了一个常规
    IAM 用户，并将其以下权限策略附加到该用户上：
- en: '`AWSIoTFullAccess`'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWSIoTFullAccess`'
- en: '`AmazonSNSFullAccess`'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AmazonSNSFullAccess`'
- en: '`AWSIoTAnalyticsFullAccess`'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWSIoTAnalyticsFullAccess`'
- en: '`AWSLambda_FullAccess`'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWSLambda_FullAccess`'
- en: These permissions are tagged as **AWS Managed** policies in the AWS IAM console,
    which are created and managed by AWS. They are designed to simplify the process
    of granting permissions for commonly used AWS services and tasks. AWS-managed
    policies ensure that your IAM roles adhere to best practices for security, aligning
    with AWS guidelines. However, for more specific use cases or to gain more granular
    control, usually you need to create some *customer-managed* policies.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这些权限在 AWS IAM 控制台中标记为 **AWS Managed** 策略，由 AWS 创建和管理。它们旨在简化为常用 AWS 服务和任务授予权限的过程。AWS-managed
    policies 确保您的 IAM 角色遵循最佳安全实践，与 AWS 指南保持一致。然而，对于更具体的用例或要获得更细粒度的控制，通常您需要创建一些 *客户管理的*
    策略。
- en: Unlike *AWS-managed policies* predefined by AWS for use across multiple accounts,
    a customer-managed policy is an IAM policy you manage within your own AWS account.
    This gives you full control over the permissions you set, allowing for more detailed
    management of your AWS resources.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 与 AWS 预定义的、适用于多个账户的 *AWS-managed policies* 不同，客户管理的策略是您在您的 AWS 账户内管理的 IAM 策略。这使您能够完全控制您设置的权限，从而允许更详细地管理您的
    AWS 资源。
- en: As we are going to use the necessary AWS resources—IoT Core, Lambda, SNS, and
    IoT Analytics—to complete the following two tasks, these services must be granted
    the proper role and permission to execute operations at our request.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用必要的 AWS 资源——IoT Core、Lambda、SNS 和 IoT Analytics——来完成以下两个任务，因此这些服务必须获得适当的角色和权限，以便根据我们的请求执行操作。
- en: 'Here are the configuration steps for policy settings for these two tasks:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这两个任务策略设置的配置步骤：
- en: Log in to the AWS IAM console using your admin role.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用您的管理员角色登录 AWS IAM 控制台。
- en: Under **Access management** | **Policies**, click **Create policy**.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **访问管理** | **策略** 下，点击 **创建策略**。
- en: In **Policy editor**, create the policy statement by clicking **JSON**.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **策略编辑器** 中，通过点击 **JSON** 创建策略声明。
- en: '![Figure 15.1 – Create policy statement](img/B22002_15_01.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.1 – 创建策略声明](img/B22002_15_01.jpg)'
- en: Figure 15.1 – Create policy statement
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.1 – 创建策略声明
- en: You can find an example policy statement file at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/aws_customer_managed_policy](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/aws_customer_managed_policy).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/aws_customer_managed_policy](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/aws_customer_managed_policy)
    找到示例策略声明文件。
- en: 'This customer-managed policy example grants sufficient permissions to set up
    the two tasks we are going to complete in this chapter. Here’s a breakdown and
    explanation of each section:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此客户管理的策略示例授予足够的权限来设置本章中我们将完成的两个任务。以下是每个部分的分解和解释：
- en: '**IAM Role Management**: It permits reading, listing, creating, and passing
    IAM roles, limited to service roles within your own AWS account'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IAM角色管理**：它允许读取、列出、创建和传递IAM角色，限于您自己的AWS账户内的服务角色'
- en: '**IAM Policy Management**: It allows the listing, creation, attachment, and
    detachment of IAM policies for the resource under the same AWS account by the
    service role instead of identity-based policy'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IAM策略管理**：它允许通过服务角色而不是基于身份的策略，在同一AWS账户下列出、创建、附加和解除对资源的IAM策略'
- en: '**IAM User Management**: It provides permissions to list and get users, roles,
    policies, and their attachments'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IAM用户管理**：它提供列出和获取用户、角色、策略及其附件的权限'
- en: '**KMS Key Description**: It is required when the IAM user creates an SNS topic'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**KMS密钥描述**：当IAM用户创建SNS主题时是必需的'
- en: '**SNS Publishing**: It grants permission to publish messages to any SNS topic
    in your region'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SNS发布**：它授予向您所在区域的任何SNS主题发布消息的权限'
- en: '**Access Analyzer**: The final statement allows listing policy generations
    and validating policies using AWS IAM Access Analyzer across all resources'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**访问分析器**：最后的语句允许列出策略生成并使用AWS IAM访问分析器验证所有资源中的策略'
- en: Please note that you need to replace `<your_region>` and `<your_account_id>`
    in this policy statement example with your own information. You can find the value
    for `<your_account_id>` showing under your admin account in the upper-right corner.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，您需要在此策略语句示例中将`<your_region>`和`<your_account_id>`替换为您自己的信息。您可以在管理账户右上角找到`<your_account_id>`的值。
- en: You can now name this policy and create it. For instance, you might call it
    `Service_Role_Policy_For_IoT`. However, feel free to choose a name that suits
    your preference.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您现在可以为此策略命名并创建它。例如，您可能称之为`Service_Role_Policy_For_IoT`。然而，请随意选择一个符合您偏好的名称。
- en: In the `Service_Role_Policy_For_IoT`, and attach it to this IAM user. You should
    be able to see it under **Policy name**.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`Service_Role_Policy_For_IoT`中，并将其附加到此IAM用户。您应该在**策略名称**下看到它。
- en: '![Figure 15.2 – New policy attached](img/B22002_15_02.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图15.2 – 新附加的策略](img/B22002_15_02.jpg)'
- en: Figure 15.2 – New policy attached
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.2 – 新附加的策略
- en: Now, as an IAM admin, we have granted the IAM user the privilege required to
    execute the setup procedure for the following two tasks.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，作为IAM管理员，我们已经授予IAM用户执行以下两个任务设置程序的必要权限。
- en: 'In the realm of commercial IoT applications, the arrival of data in the cloud
    always triggers two fundamental tasks that must be executed without delay:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业物联网应用的领域，数据到达云中总是触发两个必须立即执行的基本任务：
- en: Data processing
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理
- en: Data storage and query
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据存储和查询
- en: The primary objective of the data processing action is usually to analyze incoming
    messages for any abnormal events reported by the IoT device. If any anomalies
    are detected, appropriate actions need to be taken depending on the severity of
    the event. These measures can range from sending out SMS alerts to initiating
    email notifications, ensuring a timely response to any potential issues.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 数据处理操作的主要目标是通常分析来自物联网设备报告的任何异常事件。如果检测到任何异常，需要根据事件的严重性采取适当的行动。这些措施可能包括发送短信警报到启动电子邮件通知，确保对任何潜在问题的及时响应。
- en: The storage of data and subsequent querying form the backbone of data collection
    from IoT devices. These actions are not merely rudimentary procedures but serve
    a crucial role in the overall operation. The data collected is often utilized
    to maintain a historical record of operational statuses, and it forms the basis
    for future forecasting. Furthermore, it also aids in the creation of visual representations
    that provide a clear and concise overview of the system’s status.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的存储和随后的查询是物联网设备数据收集的基础。这些操作不仅仅是基本程序，而且在整体操作中起着至关重要的作用。收集的数据通常用于维护操作状态的历史记录，并为未来的预测提供基础。此外，它还有助于创建提供系统状态清晰简洁概述的视觉表示。
- en: Now you are all set to proceed with configuring the following two tasks.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经准备好继续配置以下两个任务。
- en: Task 1 – abnormal event process
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务1 – 异常事件处理
- en: 'As discussed in the previous chapter, the sensor data in the main ESP32 code
    is encapsulated in JSON format. You can view the serialized data stream in the
    local terminal window as shown in the following output:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如前一章所述，主ESP32代码中的传感器数据以JSON格式封装。您可以在以下输出中查看序列化的数据流，如图所示：
- en: '[PRE0]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In the AWS IoT Core MQTT test client, the received MQTT message payload will
    appear as displayed in the following screenshot.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在AWS IoT Core MQTT测试客户端中，接收到的MQTT消息负载将显示如下截图。
- en: '![Figure 15.3 – MQTT message shown in AWS IoT Core](img/B22002_15_03.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图15.3 – 在AWS IoT Core中显示的MQTT消息](img/B22002_15_03.jpg)'
- en: Figure 15.3 – MQTT message shown in AWS IoT Core
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.3 – 在AWS IoT Core中显示的MQTT消息
- en: You may notice a variable named `status` in the previous two messages. This
    variable represents the sensor’s status, indicating whether temperature and humidity
    values fall within, below, or above the normal range. A `null` value indicates
    a sensor error. This status is determined by comparing the actual values to a
    predefined value range in the main code.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能会在前两条消息中注意到一个名为`status`的变量。此变量表示传感器的状态，指示温度和湿度值是否在正常范围内，以下或以上。`null`值表示传感器错误。此状态是通过将实际值与主代码中预定义的值范围进行比较来确定的。
- en: In this task, we will instruct AWS IoT Core to forward the payload data to Lambda
    if the variable named `status` is not set to `Normal`.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在此任务中，我们将指导AWS IoT Core在变量`status`未设置为`Normal`时将有效负载数据转发到Lambda。
- en: 'To understand this service flow, we’ll use [https://mermaidchart.com](https://mermaidchart.com),
    as mentioned in [*Chapter 9*](B22002_09.xhtml#_idTextAnchor285), to create a diagram,
    following these instructions:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解这个服务流程，我们将使用[https://mermaidchart.com](https://mermaidchart.com)，如[*第9章*](B22002_09.xhtml#_idTextAnchor285)中提到的，创建一个图表，按照以下说明进行：
- en: '`Create a flow chart to reflect the interaction among the following` `AWS services.`'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`创建一个流程图来反映以下` `AWS服务`之间的交互。`'
- en: '`ESP32 sends sensor data in a serialized JSON format to AWS` `IoT Core.`'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`ESP32以序列化的JSON格式将传感器数据发送到AWS` `IoT Core。`'
- en: '`AWS IoT Core uses a messaging routing rule to filter the sensor data status
    by using an` `SQL statement.`'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '`AWS IoT Core使用消息路由规则通过SQL语句过滤传感器数据状态。`'
- en: '`If the "status" object is set to "Normal", AWS IoT Core does not forward this
    event` `to Lambda.`'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '`如果"status"对象设置为"Normal"，AWS IoT Core不会将此事件` `转发到Lambda。`'
- en: '`If the "status" object is not set to "Normal", AWS IoT Core forwards this
    event` `to Lambda.`'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '`如果"status"对象未设置为"Normal"，AWS IoT Core将此事件` `转发到Lambda。`'
- en: '`Upon receiving non-"Normal" status event, Lambda generates an email content
    incorporating the sensor data and sends it to SNS (Amazon Simple` `Notification
    Service).`'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '`在接收到非"Normal"状态事件后，Lambda生成包含传感器数据的电子邮件内容并将其发送到SNS（亚马逊简单` `通知服务）。`'
- en: '`Sequentially, SNS sends an email notification to the pre-subscribed user''s`
    `email address.`'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '`SNS按顺序向预先订阅用户的` `电子邮件地址`发送电子邮件通知。`'
- en: The service flow generated as per the preceding instructions is as follows.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 根据前面的说明生成的服务流程如下。
- en: '![Figure 15.4 – Task 1 service interaction flow](img/B22002_15_04.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图15.4 – 任务1服务交互流程](img/B22002_15_04.jpg)'
- en: Figure 15.4 – Task 1 service interaction flow
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.4 – 任务1服务交互流程
- en: This diagram explicitly describes the task configuration flow, starting from
    AWS IoT Core to filter received data, creating a forwarding rule to Lambda, and
    triggering an email notification to SNS.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此图表明确描述了任务配置流程，从AWS IoT Core开始，过滤接收到的数据，创建转发规则到Lambda，并触发发送到SNS的电子邮件通知。
- en: Configuration steps
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置步骤
- en: 'The configuration steps for this task, as depicted in *Figure 15**.4*, comprise
    the following phases:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 本任务的配置步骤，如图15**.4**所示，包括以下阶段：
- en: '**Steps 1 to 13; 15 to 18**: Create a message routing rule (triggered by abnormal
    sensor data through a SQL statement) on AWS IoT Core that points to a new Lambda
    function'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤1至13；步骤15至18**：在AWS IoT Core上创建一个消息路由规则（通过SQL语句触发异常传感器数据），指向一个新的Lambda函数'
- en: '**Step 14**: Generate a new Lambda function to link to this rule'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤14**：生成一个新的Lambda函数以链接到此规则'
- en: '**Steps 19 to 23**: Establish an SNS topic and subscription'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤19至23**：建立SNS主题和订阅'
- en: '**Steps 24 to 31**: Provide the Lambda function with the appropriate role to
    access SNS'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤24至31**：为Lambda函数提供适当的角色以访问SNS'
- en: '**Step 32**: Create Python code on this Lambda function to ingest data from
    AWS IoT Core, produce email content, and send it to SNS to dispatch an email notification
    to the recipient’s address'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤32**：在此Lambda函数上创建Python代码以从AWS IoT Core获取数据，生成电子邮件内容并将其发送到SNS以向收件人的地址发送电子邮件通知'
- en: Let us now look at the steps in detail.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Creating a message routing rule
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Log in to the AWS console using the regular IAM user we created in the previous
    steps, that is, **jun.wen**.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.5 – Log in as a regular IAM user](img/B22002_15_05.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: Figure 15.5 – Log in as a regular IAM user
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Search for and click on the **IoT** **Core** service.
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.6 – Open the IoT Core console](img/B22002_15_06.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
- en: Figure 15.6 – Open the IoT Core console
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Click on **Rules**, found under **Message routing** in the left-side navigation
    menu.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.7 – Locate Rules](img/B22002_15_07.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
- en: Figure 15.7 – Locate Rules
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Click on **Create rule** to create a rule from AWS IoT Core to report abnormal
    events to Lambda.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.8 – Start to create a rule](img/B22002_15_08.jpg)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: Figure 15.8 – Start to create a rule
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Give the rule name here, for example, `Report_Abnormal_Event_to_Lambda`.
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.9 – Name this new rule](img/B22002_15_09.jpg)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
- en: Figure 15.9 – Name this new rule
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Create a SQL statement here to report abnormal events to Lambda.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.10 – Create a SQL statement](img/B22002_15_10.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Figure 15.10 – Create a SQL statement
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is the SQL statement we are going to use:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The `SELECT *` and `FROM '+/pub'` statements represent selecting all objects
    from a JSON payload and referring to an incoming MQTT publish topic from any ESP32
    device with a `/pub` appendix, where the status is not `Normal`.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: You may recall that in the ESP32 code, we created the publish topic as `AWS_IOT_PUBLISH_TOPIC
    = deviceID + /pub`, which means any ESP32 device with an appendix of `/pub`.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: You can also find the AWS IoT SQL reference at [https://docs.aws.amazon.com/iot/latest/developerguide/iot-sql-reference.html?icmpid=docs_iot_hp_act](https://docs.aws.amazon.com/iot/latest/developerguide/iot-sql-reference.html?icmpid=docs_iot_hp_act).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: After typing in the SQL statement, navigate to **Rule actions** and click **Choose
    an action** under **Action 1**.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.11 – Create an action triggered by this rule](img/B22002_15_11.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
- en: Figure 15.11 – Create an action triggered by this rule
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Search for and select **Lambda**.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: w
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.12 – Select Lambda as the action](img/B22002_15_12.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
- en: Figure 15.12 – Select Lambda as the action
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Click on **Create a Lambda function**, and you will be redirected to the Lambda
    console.
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.13 – Start to create a Lambda function](img/B22002_15_13.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
- en: Figure 15.13 – Start to create a Lambda function
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: In the Lambda console, create a Lambda function. Assign a name to the function,
    such as `Process_Abnormal_Event_from_IoT_Core`, and select **Runtime**. AWS Lambda
    supports many languages to write functions, such as Python, Java, Dot NET, Ruby,
    and Node.js. In this task, we are going to use Python. AWS Lambda functions support
    Python versions from 3.8 to 3.12 but AWS highly recommends using version 3.12\.
    Select **Python 3.12**, and then click on **Create function**.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 15.14 – Create a Lambda function with the Python runtime](img/B22002_15_14.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图15.14 – 使用Python运行时创建Lambda函数](img/B22002_15_14.jpg)'
- en: Figure 15.14 – Create a Lambda function with the Python runtime
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.14 – 使用Python运行时创建Lambda函数
- en: Creating a Lambda function
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建Lambda函数
- en: A Lambda function named `Process_Abnormal_Event_from_IoT_Core` is successfully
    created. At this stage, we will not deploy any actual code on it – this will be
    done in the final step. Since we haven’t completed the setup of SNS, we’ll return
    to the previous IoT Core console to continue creating the message routing rules.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 成功创建了一个名为`Process_Abnormal_Event_from_IoT_Core`的Lambda函数。在这个阶段，我们不会在上面部署任何实际代码——这将在最后一步完成。由于我们尚未完成SNS的设置，我们将返回到之前的IoT
    Core控制台以继续创建消息路由规则。
- en: '![Figure 15.15 – Lambda function created (actual code not deployed yet)](img/B22002_15_15.jpg)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图15.15 – 创建的Lambda函数（实际代码尚未部署）](img/B22002_15_15.jpg)'
- en: Figure 15.15 – Lambda function created (actual code not deployed yet)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.15 – 创建的Lambda函数（实际代码尚未部署）
- en: Let’s begin!
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: In the previous IoT Core console, click **Refresh** under **Action 1**, then
    click **Lambda function** to load the new Lambda function we just created.
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在之前的IoT Core控制台中，点击**动作1**下的**刷新**，然后点击**Lambda函数**以加载我们刚刚创建的新Lambda函数。
- en: '![Figure 15.16 – Refresh the Lambda function](img/B22002_15_16.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图15.16 – 刷新Lambda函数](img/B22002_15_16.jpg)'
- en: Figure 15.16 – Refresh the Lambda function
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.16 – 刷新Lambda函数
- en: Select the new Lambda function we just created, and then click **Next**.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择我们刚刚创建的新Lambda函数，然后点击**下一步**。
- en: '![Figure 15.17 – Select the Lambda function just created](img/B22002_15_17.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图15.17 – 选择刚刚创建的Lambda函数](img/B22002_15_17.jpg)'
- en: Figure 15.17 – Select the Lambda function just created
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.17 – 选择刚刚创建的Lambda函数
- en: Review the configuration information of rules creation and then click **Create**.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看规则创建的配置信息，然后点击**创建**。
- en: '![Figure 15.18 – Complete the rule creation](img/B22002_15_18.jpg)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图15.18 – 完成规则创建](img/B22002_15_18.jpg)'
- en: Figure 15.18 – Complete the rule creation
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.18 – 完成规则创建
- en: Now, you can see that the rule was successfully created.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，你可以看到规则已成功创建。
- en: '![Figure 15.19 – New rule shown under Rules](img/B22002_15_19.jpg)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图15.19 – 在规则下显示新规则](img/B22002_15_19.jpg)'
- en: Figure 15.19 – New rule shown under Rules
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.19 – 在规则下显示新规则
- en: 'So far, we have successfully done the following:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经成功完成了以下操作：
- en: Created a messaging routing rule, allowing IoT Core to report abnormal statuses
    to the Lambda function
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建了一个消息路由规则，允许IoT Core向Lambda函数报告异常状态
- en: Created a Lambda function to link IoT Core through the messaging routing rule
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建了一个Lambda函数，通过消息路由规则将IoT Core连接起来
- en: 'Next, we’ll finish the remaining configuration before executing the task:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将在执行任务之前完成剩余的配置：
- en: Create an SNS topic and subscribe an email address to it
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个SNS主题并订阅一个电子邮件地址
- en: Write Python code on the Lambda function to generate an alert email content
    under the topic, which is sent to SNS to forward to subscribed email address.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Lambda函数上编写Python代码以在主题下生成警报电子邮件内容，该内容被发送到SNS以转发到订阅的电子邮件地址。
- en: Creating an SNS topic
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建SNS主题
- en: Search for `SNS` and navigate to the SNS console.
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索`SNS`并导航到SNS控制台。
- en: '![Figure 15.20 – Log in to the SNS console](img/B22002_15_20.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图15.20 – 登录SNS控制台](img/B22002_15_20.jpg)'
- en: Figure 15.20 – Log in to the SNS console
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.20 – 登录SNS控制台
- en: Click on **Topics** in the left-side navigation menu, then click on **Create
    topic**.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击左侧导航菜单中的**主题**，然后点击**创建主题**。
- en: '![Figure 15.21 – Start to create an SNS topic](img/B22002_15_21.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图15.21 – 开始创建SNS主题](img/B22002_15_21.jpg)'
- en: Figure 15.21 – Start to create an SNS topic
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.21 – 开始创建SNS主题
- en: Under the `DHT11_Abnormal_Event`. The **FIFO** type is a better option for use
    cases that require message ordering and deduplication. However, in our case, the
    temperature and humidity abnormal events are standalone, not in any order or correlation,
    so we select the **Standard** type here.
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`DHT11_Abnormal_Event`下。**FIFO**类型对于需要消息排序和去重的用例是一个更好的选择。然而，在我们的案例中，温度和湿度异常事件是独立的，没有任何顺序或关联，所以我们在这里选择**标准**类型。
- en: '![Figure 15.22 – Selecting the Standard type](img/B22002_15_22.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图15.22 – 选择标准类型](img/B22002_15_22.jpg)'
- en: Figure 15.22 – Selecting the Standard type
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.22 – 选择标准类型
- en: After creating the topic successfully, click on **Create subscription** under
    this topic.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在成功创建主题后，点击此主题下的**创建订阅**。
- en: '![Figure 15.23 – Create subscription](img/B22002_15_23.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图15.23 – 创建订阅](img/B22002_15_23.jpg)'
- en: Figure 15.23 – Create subscription
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.23 – 创建订阅
- en: Set **Protocol** to **Email**.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将**协议**设置为**电子邮件**。
- en: '![Figure 15.24 – Select the Email protocol](img/B22002_15_24.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图15.24 – 选择电子邮件协议](img/B22002_15_24.jpg)'
- en: Figure 15.24 – Select the Email protocol
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.24 – 选择电子邮件协议
- en: In the **Endpoint** section, enter an email address to receive SNS email notifications
    about any abnormal events. After you create the subscription, a confirmation email
    will be sent to that recipient address. The recipient must confirm it to begin
    receiving notification emails.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**端点**部分，输入一个用于接收SNS关于任何异常事件的电子邮件通知的电子邮件地址。创建订阅后，将向该收件人地址发送确认电子邮件。收件人必须确认才能开始接收通知电子邮件。
- en: '![Figure 15.25 – Create a subscription](img/B22002_15_25.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图15.25 – 创建订阅](img/B22002_15_25.jpg)'
- en: Figure 15.25 – Create a subscription
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.25 – 创建订阅
- en: At this point, the SNS email notification is properly set up.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 到目前为止，SNS电子邮件通知已正确设置。
- en: '![Figure 15.26 – Subscription is confirmed](img/B22002_15_26.jpg)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图15.26 – 订阅已确认](img/B22002_15_26.jpg)'
- en: Figure 15.26 – Subscription is confirmed
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.26 – 订阅已确认
- en: Now, we have completed the setup of an SNS topic and added an email address
    to the subscription list. When Lambda sends a notification to SNS with the matching
    topic, the contents of this notification will be forwarded to this email address.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经完成了SNS主题的设置，并将电子邮件地址添加到订阅列表中。当Lambda向SNS发送匹配主题的通知时，此通知的内容将被转发到该电子邮件地址。
- en: Now, we have arrived at the final stage of creating Python code on the Lambda
    function to trigger the notification.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经到达了在Lambda函数上创建Python代码以触发通知的最终阶段。
- en: Programming the Lambda function
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编程Lambda函数
- en: In this final step, we need to program the Lambda function to send abnormal
    event email notifications to SNS using the previously defined SNS topic.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这一最后步骤中，我们需要编程Lambda函数，使用之前定义的SNS主题向SNS发送异常事件电子邮件通知。
- en: '![Figure 15.27 – Log in to the Lambda console](img/B22002_15_27.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图15.27 – 登录Lambda控制台](img/B22002_15_27.jpg)'
- en: Figure 15.27 – Log in to the Lambda console
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.27 – 登录Lambda控制台
- en: You will see the previously created Lambda function. Click on its name to edit
    it.
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将看到之前创建的Lambda函数。点击其名称以编辑它。
- en: '![Figure 15.28 – Edit the Lambda function](img/B22002_15_28.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图15.28 – 编辑Lambda函数](img/B22002_15_28.jpg)'
- en: Figure 15.28 – Edit the Lambda function
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.28 – 编辑Lambda函数
- en: Before typing code on the Lambda function, we need to grant this function permission
    to talk to SNS. Click on **Configuration**, then **Permissions**, and then on
    the **Role** name.
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Lambda函数上编写代码之前，我们需要授予此函数与SNS通信的权限。点击**配置**，然后**权限**，再点击**角色**名称。
- en: '![Figure 15.29 – Click the execution role name](img/B22002_15_29.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图15.29 – 点击执行角色名称](img/B22002_15_29.jpg)'
- en: Figure 15.29 – Click the execution role name
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.29 – 点击执行角色名称
- en: In this role, click on **Add permissions**.
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在此角色中，点击**添加权限**。
- en: '![Figure 15.30 – Add permissions](img/B22002_15_30.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图15.30 – 添加权限](img/B22002_15_30.jpg)'
- en: Figure 15.30 – Add permissions
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.30 – 添加权限
- en: Search for and select **AmazonSNSFullAccess**, and then click on **Add permissions**.
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索并选择**AmazonSNSFullAccess**，然后点击**添加权限**。
- en: '![Figure 15.31 – Add AmazonSNSFullAccess permission](img/B22002_15_31.jpg)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![图15.31 – 添加AmazonSNSFullAccess权限](img/B22002_15_31.jpg)'
- en: Figure 15.31 – Add AmazonSNSFullAccess permission
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.31 – 添加AmazonSNSFullAccess权限
- en: Now, under **Resource summary**, you should see **Amazon SNS**.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，在**资源摘要**下，你应该能看到**Amazon SNS**。
- en: '![Figure 15.32 – Check whether the Amazon SNS permission is added](img/B22002_15_32.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图15.32 – 检查是否已添加Amazon SNS权限](img/B22002_15_32.jpg)'
- en: Figure 15.32 – Check whether the Amazon SNS permission is added
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.32 – 检查是否已添加Amazon SNS权限
- en: 'Now, click on **Code**. We’ve reached the final step: programming Python code
    on the Lambda function we previously created.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，点击**代码**。我们已经到达了最后一步：在之前创建的Lambda函数上编程Python代码。
- en: '![Figure 15.33 – Code tab](img/B22002_15_33.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图15.33 – 代码选项卡](img/B22002_15_33.jpg)'
- en: Figure 15.33 – Code tab
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.33 – 代码选项卡
- en: 'Since we selected Python 3.12 as the runtime language, we can continue instructing
    ChatGPT to produce code by our service logic design:'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于我们选择了Python 3.12作为运行时语言，我们可以继续指导ChatGPT根据我们的服务逻辑设计生成代码：
- en: '`Hi, ChatGPT,`'
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Hi, ChatGPT,`'
- en: '`Please develop Python 3.12 code on an AWS Lambda function that meets the`
    `following requirements:`'
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`请开发一个符合以下要求的Python 3.12代码，在AWS Lambda函数上：`'
- en: '`AWS IoT Core forwards any abnormal events (where the value of object "status"
    is not "Normal") to the` `Lambda function.`'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS IoT Core将任何异常事件（对象“状态”的值不是“正常”）转发到Lambda函数。`'
- en: '`The Lambda function receives JSON format data from IoT Core with the following`
    `example structure:`'
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Lambda函数从IoT Core接收JSON格式的数据，以下是一个` `示例结构：`'
- en: '[PRE2]'
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '`Upon receiving the data, the Lambda function should generate an email content
    in the following format and send it to SNS by the topic` `of "arn:aws:sns:my_region:my_account_id:DHT11_Abnormal_Event"`'
  id: totrans-183
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`在接收到数据后，Lambda函数应生成以下格式的电子邮件内容，并通过“arn:aws:sns:my_region:my_account_id:DHT11_Abnormal_Event”主题发送到SNS。`'
- en: '[PRE3]'
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '`You must create two separated functions: format_email_content(received_event)
    to generate email contents including the event details, and lambda_handler(received_event,
    context) to send the formatted email contents to the` `SNS topic.`'
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`您必须创建两个独立的函数：format_email_content(received_event)用于生成包含事件详情的电子邮件内容，以及lambda_handler(received_event,
    context)用于将格式化的电子邮件内容发送到` `SNS主题。`'
- en: '`Retrieve the SNS topic ARN from` `environment variables.`'
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`从` `环境变量中检索SNS主题ARN。`'
- en: You can find this prompt file and a Lambda function Python code example at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_15](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_15).
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_15](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_15)找到此提示文件和Lambda函数Python代码示例。
- en: After obtaining the Python code from ChatGPT, copy and paste it into the **Code**
    section. To activate the code, click **Deploy**.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从ChatGPT获取Python代码后，将其复制并粘贴到**代码**部分。要激活代码，请点击**部署**。
- en: '![Figure 15.34 – Deploy the Python code](img/B22002_15_34.jpg)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![图15.34 – 部署Python代码](img/B22002_15_34.jpg)'
- en: Figure 15.34 – Deploy the Python code
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.34 – 部署Python代码
- en: Let’s conduct a live test by removing the data cable connector on the DHT11
    from the ESP32\. If all settings are correct, you should receive an email notification,
    as shown in the following screenshot.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让我们通过从ESP32上移除DHT11的数据线连接器来进行现场测试。如果所有设置都正确，您应该会收到电子邮件通知，如下面的截图所示。
- en: '![Figure 15.35 – Email notification for abnormal event](img/B22002_15_35.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图15.35 – 异常事件的电子邮件通知](img/B22002_15_35.jpg)'
- en: Figure 15.35 – Email notification for abnormal event
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.35 – 异常事件的电子邮件通知
- en: If the recipient didn’t receive the email notification, you can check the logs
    in the CloudWatch console under the rule name, such as `Process_Abnormal_Event_from_IoT_Core`.
    Click on the most recent log stream name.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果收件人没有收到电子邮件通知，您可以在CloudWatch控制台下的规则名称下检查日志，例如`Process_Abnormal_Event_from_IoT_Core`。点击最新的日志流名称。
- en: '![Figure 15.36 – Open the log in the CloudWatch console](img/B22002_15_36.jpg)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![图15.36 – 在CloudWatch控制台中打开日志](img/B22002_15_36.jpg)'
- en: Figure 15.36 – Open the log in the CloudWatch console
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.36 – 在CloudWatch控制台中打开日志
- en: The following screenshot shows that an abnormal event, **Sensor Error**, was
    successfully sent as an SNS notification.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下面的截图显示，一个异常事件“传感器错误”已成功作为SNS通知发送。
- en: '![Figure 15.37 – Log records](img/B22002_15_37.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![图15.37 – 日志记录](img/B22002_15_37.jpg)'
- en: Figure 15.37 – Log records
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.37 – 日志记录
- en: Now, we have successfully set up the abnormal event process task using AWS IoT
    Core, Lambda, and SNS. When the sensor reports its status at `Sensor Error`, `BelowNormal`,
    or `AboveNormal`, an alert email notification will be sent out to the recipient.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经成功使用AWS IoT Core、Lambda和SNS设置了异常事件处理任务。当传感器报告其状态为“传感器错误”、“低于正常”或“高于正常”时，将向收件人发送警报电子邮件通知。
- en: It is also possible to create an IoT rule to send the abnormal data directly
    from IoT Core to an SNS topic with original JSON format data, whereas, Lambda
    can create much more readable format with customized email topic and contents
    .
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 还可以创建一个IoT规则，将异常数据直接从IoT Core发送到SNS主题，其中原始JSON格式数据，而Lambda可以创建带有自定义电子邮件主题和内容的更易读的格式。
- en: Next, we will handle the task of data storage and querying on IoT Analytics,
    which is quite straightforward.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将处理在IoT Analytics上的数据存储和查询任务，这相当直接。
- en: Task 2 – data storage and querying
  id: totrans-203
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务2 – 数据存储和查询
- en: In contrast to the abnormal event process, in this task, AWS IoT Core will forward
    all received data to AWS IoT Analytics, regardless of whether the status is `Normal`
    or not.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 与异常事件处理相比，在这个任务中，无论状态是否为“正常”，AWS IoT Core都将将所有接收到的数据转发到AWS IoT Analytics。
- en: 'As introduced in [*Chapter 5*](B22002_05.xhtml#_idTextAnchor170), AWS IoT Analytics
    incorporates several sub-services. These include channels, pipelines, data stores,
    and datasets. Their functions are briefly described here:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 如在 [*第 5 章*](B22002_05.xhtml#_idTextAnchor170) 中所述，AWS IoT Analytics 集成了多个子服务。这些包括通道、管道、数据存储和数据集。它们的功能在此简要描述：
- en: '**Channels**: Utilize your channel to collect raw and unprocessed IoT device
    data from other AWS services'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通道**：利用您的通道收集来自其他 AWS 服务的原始和未处理过的 IoT 设备数据'
- en: '**Pipelines**: Transform raw data from your channel into valuable information
    by using activities to filter, enrich, and convert your raw IoT device data'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管道**：通过使用活动来过滤、丰富和转换您的原始 IoT 设备数据，将您的通道中的原始数据转换为有价值的信息'
- en: '**Data stores**: Store your processed IoT device data for future data analysis'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据存储**：存储您的处理过的 IoT 设备数据以供未来的数据分析'
- en: '**Datasets**: Process query data from IoT devices to deliver automatic, frequent,
    and current insights about your devices'
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集**：处理来自 IoT 设备的查询数据，以提供关于您的设备的自动、频繁和最新的洞察'
- en: 'We’ll continue to use [https://mermaidchart.com](https://mermaidchart.com)
    to create a diagram using these instructions:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将继续使用 [https://mermaidchart.com](https://mermaidchart.com) 根据以下说明创建图表：
- en: '`Please create a flow chart to reflect the interaction among the following
    AWS services.`'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '`请创建一个流程图，以反映以下 AWS 服务之间的交互。`'
- en: '`ESP32 sends sensor data in a serialized JSON format to AWS` `IoT Core.`'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ESP32 以序列化的 JSON 格式将传感器数据发送到 AWS IoT Core。`'
- en: '`AWS IoT Core uses a messaging routing rule to forward all the received data
    to AWS` `IoT Analytics.`'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS IoT Core 使用消息路由规则将所有接收到的数据转发到 AWS` `IoT Analytics。`'
- en: '`The raw data will arrive at data` `channels first.`'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`原始数据将首先到达数据` `通道。`'
- en: '`And then transform data at` `data pipelines.`'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`然后在数据管道中转换数据。`'
- en: '`And then store the enriched data at` `data stores.`'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`然后将丰富后的数据存储在` `数据存储中。`'
- en: '`And then provide query to` `data sets.`'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`然后将查询提供给` `数据集。`'
- en: The following is the generated service flow as instructed.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的服务流程是根据指示生成的。
- en: '![Figure 15.38 – Data storage and query flow](img/B22002_15_38.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.38 – 数据存储和查询流程](img/B22002_15_38.jpg)'
- en: Figure 15.38 – Data storage and query flow
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.38 – 数据存储和查询流程
- en: The flow chart illustrates a data storage flow where an ESP32 device sends serialized
    JSON sensor data to AWS IoT Core, which forwards the raw data to data channels.
    These channels transmit the data to data pipelines for transformation. The enriched
    data is then stored in data stores, where it is accessed via queries to create
    datasets that are ready for further analysis.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图展示了数据存储流程，其中 ESP32 设备将序列化的 JSON 传感器数据发送到 AWS IoT Core，然后 AWS IoT Core 将原始数据转发到数据通道。这些通道将数据传输到数据管道进行转换。转换后的数据随后存储在数据存储中，通过查询访问以创建准备进一步分析的数据集。
- en: 'The configuration steps for this task, shown in *Figure 15**.38*, include the
    following actions:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 此任务的配置步骤，如 *图 15**.38* 所示，包括以下操作：
- en: '**Steps 1 to 9**: Create IoT Analytics resources'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 1 到 9**：创建 IoT Analytics 资源'
- en: '**Steps 10 to 14**: Create a second message routing rule on AWS IoT Core to
    forward all sensor data to IoT Analytics'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 10 到 14**：在 AWS IoT Core 上创建第二个消息路由规则，将所有传感器数据转发到 IoT Analytics'
- en: '**Steps 15 to 18**: Run a data query at IoT Analytics'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 15 到 18**：在 IoT Analytics 运行数据查询'
- en: Creating IoT Analytics resources
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建 IoT Analytics 资源
- en: 'Let’s go through the steps in detail:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细地过一遍这些步骤：
- en: In the services console, search for and click on **IoT Analytics**.
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在服务控制台中搜索并点击 **IoT Analytics**。
- en: '![Figure 15.39 – Log in to the IoT Analytics console](img/B22002_15_39.jpg)'
  id: totrans-229
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.39 – 登录 IoT Analytics 控制台](img/B22002_15_39.jpg)'
- en: Figure 15.39 – Log in to the IoT Analytics console
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.39 – 登录 IoT Analytics 控制台
- en: Enter a prefix in `dht11`.
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `dht11` 中输入前缀。
- en: '![Figure 15.40 – Getting started with IoT Analytics](img/B22002_15_40.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.40 – 开始使用 IoT Analytics](img/B22002_15_40.jpg)'
- en: Figure 15.40 – Getting started with IoT Analytics
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.40 – 开始使用 IoT Analytics
- en: All the IoT Analytics resources will start to be created. There’s no need to
    wait here.
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有 IoT Analytics 资源都将开始创建。这里无需等待。
- en: '![Figure 15.41 – Creation in progress](img/B22002_15_41.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.41 – 创建中](img/B22002_15_41.jpg)'
- en: Figure 15.41 – Creation in progress
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.41 – 创建中
- en: Click on **Channels** in the left-side navigation menu. You’ll see a channel
    named **dht11_channel**, which has already been created.
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧导航菜单中点击 **通道**。您将看到一个名为 **dht11_channel** 的通道，它已经被创建。
- en: '![Figure 15.42 – Check the status of the data channel](img/B22002_15_42.jpg)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.42 – 检查数据通道的状态](img/B22002_15_42.jpg)'
- en: Figure 15.42 – Check the status of the data channel
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.42 – 检查数据通道的状态
- en: Click on **Pipelines** in the left-side navigation menu. You will notice that
    a pipeline named **dht11_pipeline** has already been created.
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧导航菜单中点击**管道**。您会注意到已经创建了一个名为**dht11_pipeline**的管道。
- en: '![Figure 15.43 – Check the status of the data pipeline](img/B22002_15_43.jpg)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![图15.43 – 检查数据管道的状态](img/B22002_15_43.jpg)'
- en: Figure 15.43 – Check the status of the data pipeline
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.43 – 检查数据管道的状态
- en: Click on **Data stores** in the left-side navigation menu. You will find that
    a data store named **dht11_datastore** has already been created.
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧导航菜单中点击**数据存储**。您会发现已经创建了一个名为**dht11_datastore**的数据存储。
- en: '![Figure 15.44 – Check the status of data stores](img/B22002_15_44.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![图15.44 – 检查数据存储的状态](img/B22002_15_44.jpg)'
- en: Figure 15.44 – Check the status of data stores
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.44 – 检查数据存储的状态
- en: Click on **dht11_datastore**, then on **Storage settings**, followed by **Edit**.
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**dht11_datastore**，然后点击**存储设置**，接着点击**编辑**。
- en: '![Figure 15.45 – Edit the storage settings](img/B22002_15_45.jpg)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![图15.45 – 编辑存储设置](img/B22002_15_45.jpg)'
- en: Figure 15.45 – Edit the storage settings
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.45 – 编辑存储设置
- en: You can now set the retention period for your processed data, such as `7` days.
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您现在可以设置您处理数据的保留期，例如`7`天。
- en: '![Figure 15.46 – Change the storage time](img/B22002_15_46.jpg)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图15.46 – 修改存储时间](img/B22002_15_46.jpg)'
- en: Figure 15.46 – Change the storage time
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.46 – 修改存储时间
- en: Click on **Datasets** in the left-side navigation menu. You will find a dataset
    named **dht11_dataset** already created there.
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧导航菜单中点击**数据集**。您会发现已经创建了一个名为**dht11_dataset**的数据集。
- en: '![Figure 15.47 – Check the status of the dataset](img/B22002_15_47.jpg)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![图15.47 – 检查数据集的状态](img/B22002_15_47.jpg)'
- en: Figure 15.47 – Check the status of the dataset
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.47 – 检查数据集的状态
- en: Now, we have completed the setup of IoT Analytics, including the data channel,
    data pipeline, data store, and dataset. The subsequent step involves creating
    another message routing rule in IoT Core, akin to our previous task. This new
    rule should then be linked to the IoT Analytics resource we created earlier.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经完成了IoT Analytics的设置，包括数据通道、数据管道、数据存储和数据集。接下来的步骤是在IoT Core中创建另一条消息路由规则，类似于我们之前的任务。然后，这条新规则应该与之前创建的IoT
    Analytics资源相关联。
- en: Creating a second message routing rule
  id: totrans-256
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建第二条消息路由规则
- en: Navigate to the AWS IoT Core console. Under **Message routing**, you will find
    the first rule we created in the previous task. Now, we are going to create a
    second rule by clicking on **Create rule**.
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到AWS IoT Core控制台。在**消息路由**下，您将找到之前任务中创建的第一个规则。现在，我们将通过点击**创建规则**来创建第二个规则。
- en: '![Figure 15.48 – Create a new rule in IoT Core](img/B22002_15_48.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图15.48 – 在IoT Core中创建新规则](img/B22002_15_48.jpg)'
- en: Figure 15.48 – Create a new rule in IoT Core
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.48 – 在IoT Core中创建新规则
- en: Give a rule name here, for example, `Store_All_Events_to_IoT_Analytics`, and
    click on **Next**.
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里输入规则名称，例如`Store_All_Events_to_IoT_Analytics`，然后点击**下一步**。
- en: '![Figure 15.49 – Give a name to this new rule](img/B22002_15_49.jpg)'
  id: totrans-261
  prefs: []
  type: TYPE_IMG
  zh: '![图15.49 – 为这条新规则命名](img/B22002_15_49.jpg)'
- en: Figure 15.49 – Give a name to this new rule
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.49 – 为这条新规则命名
- en: In the **SQL statement** section, add the following statement to forward all
    the sensor data to IoT Analytics regardless of its status.
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**SQL语句**部分，添加以下语句以将所有传感器数据转发到IoT Analytics，无论其状态如何。
- en: '![Figure 15.50 – Create the SQL statement for this new rule](img/B22002_15_50.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![图15.50 – 为此新规则创建SQL语句](img/B22002_15_50.jpg)'
- en: Figure 15.50 – Create the SQL statement for this new rule
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.50 – 为此新规则创建SQL语句
- en: Under the **Rule actions** section, click on **Action 1**. Search for and select
    **IoT Analytics**. Under **Channel name**, click on the refresh icon, and then
    click the **View** button. In the pop-out window, you will find **dht11_channel**,
    which was created in *step 2*. Under **IAM role**, click on the refresh icon,
    and then click the **View** button. In the pop-out window, you will find **dht11_role**,
    which was also created in *step 2*.
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**规则操作**部分，点击**操作1**。搜索并选择**IoT Analytics**。在**通道名称**下，点击刷新图标，然后点击**查看**按钮。在弹出窗口中，您将找到在*步骤2*中创建的**dht11_channel**。在**IAM角色**下，点击刷新图标，然后点击**查看**按钮。在弹出窗口中，您将找到也在*步骤2*中创建的**dht11_role**。
- en: '![Figure 15.51 – Select an action, channel, and role for this rule](img/B22002_15_51.jpg)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图15.51 – 为此规则选择操作、通道和角色](img/B22002_15_51.jpg)'
- en: Figure 15.51 – Select an action, channel, and role for this rule
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.51 – 为此规则选择操作、通道和角色
- en: Now review and create this rule by hitting **Create**.
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在通过点击**创建**来审查并创建此规则。
- en: '![Figure 15.52 – Both rules are shown under Message routing and are now active](img/B22002_15_52.jpg)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.52 – 两个规则均显示在消息路由下，并且现在处于活动状态](img/B22002_15_52.jpg)'
- en: Figure 15.52 – Both rules are shown under Message routing and are now active
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.52 – 两个规则均显示在消息路由下，并且现在处于活动状态
- en: Running a data query
  id: totrans-272
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行数据查询
- en: At this point, when the sensor data arrives into IoT Core, triggered by the
    second message routing rule, all the sensor data, regardless of whether it is
    normal or abnormal, will be ready to be forwardedto IoT Analytics for storage
    and querying.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 在此阶段，当传感器数据通过第二个消息路由规则触发进入 IoT Core 时，所有传感器数据，无论其是否正常或异常，都将准备好转发到 IoT Analytics
    进行存储和查询。
- en: 'Let us run through a data query exercise using the following steps:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们按照以下步骤进行一次数据查询练习：
- en: Click on the dataset name. Under **Details**, click **Edit**. In this step,
    we will edit the SQL query rule to define the object we want to see from the dataset.
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击数据集名称。在 **详细信息** 下，点击 **编辑**。在此步骤中，我们将编辑 SQL 查询规则，以定义我们希望从数据集中查看的对象。
- en: '![Figure 15.53 – Edit the SQL query statement](img/B22002_15_53.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.53 – 编辑 SQL 查询语句](img/B22002_15_53.jpg)'
- en: Figure 15.53 – Edit the SQL query statement
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.53 – 编辑 SQL 查询语句
- en: For example, if you want to query all the object data in a record and all the
    records are shown by the timestamp in descending order (the latest record shows
    at the top), you can edit the current SQL query as in the following screenshot
    (an example is also provided at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/dataset_sql_statement](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/dataset_sql_statement)).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想查询记录中的所有对象数据，并且所有记录都按时间戳降序显示（最新记录显示在顶部），你可以编辑当前的 SQL 查询，如下截图所示（[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/dataset_sql_statement](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_15/dataset_sql_statement)
    也提供了一个示例）。
- en: '![Figure 15.54 – Update the statement to show records by timestamp in descending
    order](img/B22002_15_54.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.54 – 更新语句以按时间戳降序显示记录](img/B22002_15_54.jpg)'
- en: Figure 15.54 – Update the statement to show records by timestamp in descending
    order
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.54 – 更新语句以按时间戳降序显示记录
- en: Make sure your ESP32 is operational and successfully connected to AWS IoT Core.
    Then, go to the **IoT Analytics** console. Under **Datasets**, click on **Run
    now** to execute a data query. Following that, under **Content**, click the query
    record name, as shown in the following screenshot.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保你的 ESP32 正在运行并且成功连接到 AWS IoT Core。然后，转到 **IoT Analytics** 控制台。在 **数据集** 下，点击
    **立即运行** 以执行数据查询。随后，在 **内容** 下，点击查询记录名称，如下截图所示。
- en: '![Figure 15.55 – Run data query](img/B22002_15_55.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.55 – 运行数据查询](img/B22002_15_55.jpg)'
- en: Figure 15.55 – Run data query
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.55 – 运行数据查询
- en: Finally, you will see all the sensor data stored in the datasets, regardless
    of status.
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，你将看到存储在数据集中的所有传感器数据，无论其状态如何。
- en: '![Figure 15.56 – Data query result](img/B22002_15_56.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![图 15.56 – 数据查询结果](img/B22002_15_56.jpg)'
- en: Figure 15.56 – Data query result
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.56 – 数据查询结果
- en: At this point, we have successfully set up the data storage and query task using
    AWS IoT Core and IoT Analytics. All sensor data will be stored and ready for analytics
    queries.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 在此阶段，我们已经成功使用 AWS IoT Core 和 IoT Analytics 设置了数据存储和查询任务。所有传感器数据都将被存储并准备好进行分析查询。
- en: Summary
  id: totrans-288
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned about the configuration steps to complete two fundamental
    tasks in a commercial IoT application. The first task is data processing, which
    involves using AWS Lambda to trigger notifications to SNS to send alert emails
    about abnormal events. The second task is data storage and querying using AWS
    IoT Analytics, a crucial aspect of IoT applications that ensures the efficient
    handling and retrieval of vast amounts of data. These tasks form the backbone
    of IoT applications and mastering them is key to the successful implementation
    of any commercial IoT project.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了完成商业物联网应用中两个基本任务的配置步骤。第一个任务是数据处理，这涉及到使用 AWS Lambda 触发通知到 SNS，以发送关于异常事件的警报电子邮件。第二个任务是使用
    AWS IoT Analytics 进行数据存储和查询，这是物联网应用的关键方面，确保大量数据的有效处理和检索。这些任务构成了物联网应用的基础，掌握它们对于任何商业物联网项目的成功实施至关重要。
- en: 'Next, we will explore the final step: executing data analytics and visualization.
    In the following chapter, we will use the ThingsBoard cloud platform to ingest
    real-time sensor data from AWS IoT Core to create a dynamic dashboard.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探索最后一步：执行数据分析与可视化。在下一章中，我们将使用ThingsBoard云平台从AWS IoT Core摄取实时传感器数据，以创建一个动态仪表板。
