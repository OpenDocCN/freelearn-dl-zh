- en: 'Part 2: Building and Implementing AI Systems'
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分：构建和实施人工智能系统
- en: Transforming AI from concept to impactful solutions requires a deep understanding
    of its foundations, processes, and applications. This part provides a step-by-step
    guide to building and implementing AI systems, from managing data—the lifeblood
    of AI—to training and deploying powerful models. Through insights into AI project
    management, the nuances of deterministic, probabilistic, and generative AI, and
    the emerging potential of agentic systems, this part equips you with the tools
    and strategies needed to design, train, and launch AI solutions that deliver measurable
    value and drive innovation.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能从概念转化为有影响力的解决方案需要对其基础、过程和应用有深刻的理解。本部分提供了一步步构建和实施人工智能系统的指南，从管理数据——人工智能的生命线——到训练和部署强大的模型。通过深入了解人工智能项目管理、确定性、概率性和生成性人工智能的细微差别以及代理系统的潜在新兴能力，本部分为您提供了设计、训练和推出能够带来可衡量价值并推动创新的AI解决方案所需工具和策略。
