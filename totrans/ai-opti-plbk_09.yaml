- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Beyond Accuracy: A Guide to Defining Metrics for Adoption'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we discussed in [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor022) , the idea
    for any successful ML application is to have a measurable metric. ML generally
    is an iterative process, and the idea is to improve experiments or enhancements.
  prefs: []
  type: TYPE_NORMAL
- en: Defining success for AI/ML models is far more nuanced than selecting a single
    metric. It requires a structured, multi-dimensional approach. This chapter begins
    by establishing the importance of clear success metrics and the foundational principles
    that make them effective. It then explores the role of guardrail metrics to prevent
    unintended side effects, followed by a discussion on operational latency and the
    evolving nature of model performance. The narrative continues by highlighting
    the misalignment between technical loss functions and business metrics and introducing
    surrogate metrics as a practical solution for bridging short- and long-term goals.
    We also delve into multi-objective optimization through the Pareto frontier, cost
    considerations in scaling AI solutions, and finally, the critical role of responsible
    AI in ensuring fairness, transparency, and societal alignment. Through these interconnected
    themes, the chapter provides a holistic framework for defining, measuring, and
    sustaining success in AI/ML systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following key topics will be covered in the chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: The need to define success metrics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fundamental principles of a success metric
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The need to define success metrics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A crucial first step when operationalizing AI/ML models is clearly defining
    what “success” looks like. Without an established success criterion, there is
    no structured way to assess the effectiveness of a model. A well-defined success
    metric serves as a feedback loop, enabling teams to track the progress and performance
    of a model in real time. It ensures alignment between business goals and model
    behavior, helping stakeholders make informed decisions. Moreover, it provides
    a foundation for setting thresholds, triggering alerts, and guiding model improvements
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: When success metrics are missing or poorly defined, teams may deploy underperforming
    models, misallocate resources, or optimize for the wrong objectives, which ultimately
    lead to financial losses, degraded user experience, and loss of stakeholder trust.
  prefs: []
  type: TYPE_NORMAL
- en: Fundamental principles of a success metric
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'For a success metric to be meaningful, it must adhere to the following key
    principles:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Specific** : The metric must directly align with the business objective and
    should not be ambiguous. This ensures that the AI/ML model is solving the right
    problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Measurable** : A metric is only useful if it can be quantified. Measurability
    is essential for tracking progress and for drawing insights from the model’s performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Actionable** : The chosen metric should provide meaningful insights that
    lead to specific actions. If a metric signals poor performance, it should be clear
    what steps need to be taken to improve it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Realistic** : Success metrics should be attainable, given the available resources
    and constraints.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time-bound** : The performance of the AI/ML model should be evaluated within
    a defined time frame to monitor its effectiveness over short-term and long-term
    periods.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take, for example, a recommendation engine used in an e-commerce platform. A
    specific success metric could be the **conversion rate** ( **CR** ), which measures
    the percentage of users who made a purchase after interacting with product recommendations.
    The CR is specific (it measures purchases), measurable (the ratio of conversions
    to interactions), actionable (changes can be made to improve it), realistic (based
    on past performance), and time-bound (evaluated daily, weekly, or monthly). Is
    defining a success criterion good enough to ensure success? Maybe not. Another
    example is improving customer experience with chatbots, which can answer initial
    queries and provide relevant responses. In such cases, success metrics could include
    a reduction of customer service calls or an increase in the **net promoter score**
    ( **NPS** ) based on surveys.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another example is responding with visualizations for business reports when
    the user asks in their language of choice. If we take a lot of time to come up
    with the business report and visualization, it’s a bad user experience, and we
    will miss out on the market. AI models without a well-defined success metric often
    struggle to drive adoption. This is evident with text generation models, where
    comparing generated messages or aligning them with ground truth can be challenging.
    Various evaluation techniques have been proposed, each with its own assumptions.
    For instance, if the focus is on high-quality messages, BLEU scores are commonly
    used; for diversity, ROUGE scores are more appropriate. In cases where both quality
    and diversity need to be optimized, MS-Jaccard may be a better choice. While these
    are quantitative methods for evaluating generated text, they come with specific
    assumptions, and understanding these can help mitigate potential issues. With
    the recent advancement in leveraging another LLM for evaluation, as suggested
    in *Reference-Guided Verdict: LLMs-as-Judges in Automatic Evaluation of Free-Form
    Text* by Sher Badshah, the sky is the limit. Next, let’s look at guardrail metrics,
    which ensure that while models optimize for success, they don’t unintentionally
    harm other critical business objectives. In the following section, we’ll explore
    how to define, monitor, and enforce these guardrails effectively in production
    systems.'
  prefs: []
  type: TYPE_NORMAL
- en: Guardrail metrics – balancing short-term success with long-term objectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sometimes optimizing one metric can have unintended consequences on other important
    aspects of the business. Guardrail metrics help maintain a balance between the
    primary success criterion and other essential business objectives. While optimizing
    for success, businesses must ensure that they don’t compromise other key performance
    indicators.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take that e-commerce recommendation engine as an example again. Say you’ve
    got a system recommending products to users. You could define your success metric
    as **CR** , which tracks the percentage of users who make a purchase after clicking
    on a recommendation. CR ticks all the boxes. It’s specific (measuring purchases
    from recommendations), it’s measurable (it’s just a ratio), it’s actionable (if
    the CR drops, you know you need to tweak something), it’s realistic (you know
    based on historical data what’s achievable), and it’s time-bound (you could measure
    it daily, weekly, or monthly).
  prefs: []
  type: TYPE_NORMAL
- en: 'But is that enough? Just having a success metric in place, does that guarantee
    the model’s success? Not quite. There’s more to it, guardrail metrics. These are
    the metrics that help us avoid unintended consequences. Think about it: if all
    you’re focused on is boosting the CR, what happens if the AI model starts pushing
    aggressive recommendations that users find annoying or overwhelming? Sure, the
    CR might go up in the short term, but you could damage the long-term relationship
    with your customers. Not a great idea, right?'
  prefs: []
  type: TYPE_NORMAL
- en: Another example in finance would be predicting churn from a subscription program
    where various reward offers are given to retain valuable customers. However, if
    the cost sensitivity is not taken into consideration as a guardrail, the reward
    program may cost a large sum of money to run and may not justify the **return
    on investment** ( **ROI** ) from the model.
  prefs: []
  type: TYPE_NORMAL
- en: This paves the way for us to not only measure CR in product recommendations
    or churn rate in subscription programs, but also to determine whether guardrails
    are maintained in terms of annoyance, which can be measured as daily active users
    or app deletion every week, or costs to justify ROI.
  prefs: []
  type: TYPE_NORMAL
- en: Operational latency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another essential consideration is operational latency, which refers to whether
    the system can provide timely predictions under realistic conditions. Meeting
    **service-level agreements** ( **SLAs** ) for response times often depends on
    architectural choices, such as whether models are served in real time or in batches.
    While **large language models** ( **LLMs** ) offer impressive capabilities, they
    can be slow without specialized infrastructure. Balancing speed, cost, and performance
    becomes critical here, especially as real-time systems may require significant
    infrastructure investments. Usually, it’s a great idea to monitor the 95th percentile
    or 99th percentile latency for most ML applications, especially customer-facing
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Evolving metrics – monitoring model performance over time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here’s another thing to consider, metrics *change* . Yes, ML/AI solutions live
    in a world of assumptions and assumptions change, so do metrics. What worked for
    you when you first deployed the model might not work six months down the line.
    At the start, you might focus on something such as user engagement or click-through
    rates to make sure the model is doing its basic job of getting recommendations
    in front of people. But as the model matures, you’ll shift your focus to more
    business-oriented metrics such as lifetime value or long-term customer retention.
    AI models aren’t static, and neither should your metrics be. *You’ve got to adapt*
    as the model grows, as the market shifts, and as business priorities change.
  prefs: []
  type: TYPE_NORMAL
- en: 'Performance can evolve in three ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Deteriorating performance** : Over time, an AI/ML model might suffer from
    performance degradation. For example, the quality of predictions may drop due
    to changes in user behavior, market conditions, or shifts in data distribution.
    This phenomenon, known as data drift, requires businesses to regularly retrain
    and update the model. For instance, a recommendation model that once had a high
    conversion rate might see a dip due to evolving customer preferences, necessitating
    updates in feature engineering and retraining.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improving performance** : Sometimes, a model may start performing better
    over time, either due to improved data quality, larger datasets, or model refinement.
    It’s crucial to continuously measure success metrics even when performance improves.
    However, businesses should also be cautious when a metric shows sustained improvements
    without corresponding external factors. This could point to overfitting or model
    gaming, where the model starts to exploit shortcuts in the data instead of learning
    generalizable patterns. Another example for improvement in performance over time
    can become evident with reinforcement approaches, where online learning updates
    the environment parameters to reach the optimal goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stagnant performance** : If the performance of the model remains static over
    an extended period, it’s time to explore new techniques or conduct feature engineering.
    Even if the metric doesn’t deteriorate, it could indicate that the model is no
    longer adapting to changing environments or is not sufficiently optimized.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By regularly monitoring and revising models, businesses can ensure that their
    AI/ML solutions stay relevant and impactful over time.
  prefs: []
  type: TYPE_NORMAL
- en: Linking model metrics to business wins
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What’s the point of building a super-accurate AI model if it doesn’t actually
    help a company make more money or work better? A model can get a perfect score
    on paper, but if it has no impact on real-world business goals such as keeping
    customers happy or cutting down on waste, then it’s really just a waste of time
    and money.
  prefs: []
  type: TYPE_NORMAL
- en: The key is to pick the right way to measure success, and that really depends
    on what kind of problem you’re trying to solve with your AI. We’ll look at a few
    ways to measure success.
  prefs: []
  type: TYPE_NORMAL
- en: '**Supervised learning (did the model learn the right answers?)** : This is
    the most familiar type of AI, where we give the model a bunch of examples with
    the correct answers and ask it to learn the pattern.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For classification models (is it this or that?)** : When a model has to sort
    things into buckets, such as flagging an email as “spam” or “not spam,” just looking
    at overall accuracy can be a trap, especially if one bucket is way bigger than
    the other. It’s better to use a few specific tools:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Precision and recall** : You have to think about these two together. Imagine
    you’re a bouncer at a club. You want to let in all the cool people (recall), but
    if you’re not careful, you might let in some trouble-makers. On the other hand,
    you could be super strict and only let in people you’re 100% sure are cool (precision),
    but you might turn away a lot of great people. The F1-score helps you find the
    right balance between these two goals.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ROC curve and AUC** : This is basically a report card for how good the model
    is at telling two groups apart. The final score, **area under the curve** ( **AUC**
    ), tells you how confidently it can separate one from the other. An AUC of 1.0
    is a perfect score, while 0.5 means the model is just flipping a coin.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calibration** : This is all about trust. If your weather app says there’s
    a 70% chance of rain, you expect it to rain about 7 out of 10 times. A well-calibrated
    model is one whose confidence you can actually believe.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For regression models (guess a prediction/number)** : When the model is trying
    to predict a specific number, such as a house price or company sales, we measure
    success by how close its guesses are:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mean absolute error (MAE)** : This is the most straightforward measurement.
    It tells you, on average, how far off your model’s guess was. If the MAE for a
    sales forecast is $500, it means your predictions are off by about $500 on average.
    It’s simple and easy to understand.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Root mean squared error (RMSE)** : This one is a bit different because it
    gets really upset about big mistakes. It penalizes a single, wildly wrong guess
    much more than a bunch of small errors. You’d use RMSE when being way off is a
    business disaster, like not ordering nearly enough of your most popular product.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unsupervised learning (did we find any useful patterns?)** : With unsupervised
    learning, we don’t give the model any answers. We just give it a pile of data
    and ask it to find interesting structures or groups on its own.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For clustering (grouping things):**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Silhouette score** : After the model has grouped your data, this score tells
    you whether those groups actually make sense. A high score means the clusters
    are dense and well-separated, like distinct friend groups at a party. A low score
    means all the data points are just mixed together in one big, messy blob.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Davies-Bouldin index** : Think of this as the “anti-social” score for clusters.
    A low score is good—it means each cluster remains distinct and doesn’t overlap
    with others, indicating clean separation.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For dimensionality reduction (simplifying things):**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explained variance** : Imagine summarizing a 500-page book into a 10-page
    summary. “Explained variance” tells you what percentage of the original plot you
    kept. A 95% score means your short summary is excellent and captures almost everything
    important, proving your simplified data is still highly useful.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge-based AI (is our digital expert actually an expert?)** : This type
    of AI doesn’t learn from data patterns but operates on a pre-programmed “brain”
    of facts and rules, like a digital encyclopedia or an expert system for diagnosing
    machine failures. Success isn’t about statistical error; it’s about correctness
    and utility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Coverage** : How comprehensive is our digital librarian’s library? If it’s
    a medical diagnostic tool, does it cover 50 diseases or 1,000? This measures the
    breadth of its knowledge.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Query accuracy** : When you ask a question, does it give the right answer?
    If the AI is designed to help technicians fix engines, its advice must be correct.
    The business metric is simple: a higher “first-time fix rate” for the technicians
    using it.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User satisfaction** : This is the ultimate test. Do the doctors, lawyers,
    or engineers using the system actually trust its advice and find it helpful? A
    high satisfaction score means the AI isn’t just smart, it’s useful.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generative AI (did we create something good?)** : Generative AI is all about
    creating new content: text, images, code, or music. The metrics here are often
    more subjective, blending technical scores with human judgment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For text generation (LLMs):**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**BLEU/ROUGE scores** : For tasks such as summarization or translation, these
    scores compare the AI’s output to a human-written “gold standard.” It’s like a
    teacher grading a summary by checking how many key phrases from the original text
    were included.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Perplexity** : This technical metric measures how “confused” a model is by
    a sentence. A low score means the model finds the text predictable and natural-sounding,
    which is a good sign of fluency.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human evaluation** : This is the gold standard. Real people rate the output
    on a scale for fluency (does it sound natural?), coherence (does it make sense?),
    and helpfulness (did it answer the question well?).'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For image generation:**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fréchet Inception Distance (FID)** : This is like an AI art critic. It asks
    two questions: 1) “Are these images sharp and realistic?” (quality) and 2) “Are
    you showing me a wide variety of creative images, or just the same cat picture
    over and over?” (diversity). A low FID score is better.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Aesthetic score and human preference** : Ultimately, art is subjective. Models
    are often trained on human ratings to learn what people find visually appealing.
    The key business metric is often user engagement. Do people download, share, or
    upvote the images the AI creates?'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reinforcement learning (is our bot learning to win?)** : This is where an
    AI agent learns by doing things and getting feedback, like a pet learning a new
    trick through treats.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cumulative reward** : This is basically the AI’s total score. In a video
    game, the reward is points. For AI managing an ad campaign, the reward could be
    the total profit earned. The goal is always the same: make the cumulative reward
    as high as possible.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the end, all these technical stats are just clues. They help us understand
    whether the model is working correctly under the hood. But the true test of success
    is whether it actually solves the real-world problem it was designed for. The
    metrics are just the tools; the business impact is the real prize.
  prefs: []
  type: TYPE_NORMAL
- en: Linking model optimization to business metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the ML world, a loss function is a mathematical function used to measure
    the difference between the predicted output of a model and the actual outcome.
    It is central to the training process, guiding the optimization of the model through
    a step update gradient descent. However, the loss function is typically not directly
    aligned with business metrics, which makes metric selection more nuanced.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in fraud detection, the model’s objective is to classify transactions
    as “fraudulent” or “not fraudulent.” The loss function for this classification
    task might be cross-entropy, which measures the divergence between the predicted
    probabilities and the true outcomes. However, from a business perspective, the
    relevant success metrics could be precision (the ratio of correctly predicted
    frauds to total fraud predictions) or recall (the ratio of correctly identified
    frauds to actual fraud cases). Precision might be critical for minimizing false
    positives, while recall could be essential for detecting as many fraudulent cases
    as possible.
  prefs: []
  type: TYPE_NORMAL
- en: A common example of misalignment is if the objective is to improve F1 score
    (consider both precision and recall as a harmonic mean) for an imbalanced class
    problem, cross-entropy wouldn’t be a great choice since minimizing cross-entropy
    loss could result in a model that performs well on the majority class but poorly
    on the minority class, which is not desirable.
  prefs: []
  type: TYPE_NORMAL
- en: Often, loss functions are designed to be differentiable for gradient descent
    to work efficiently, while business metrics, such as precision or recall, are
    often non-differentiable. This misalignment presents a challenge in direct AI/ML
    model optimization. Techniques such as focal loss have been developed to address
    imbalances in classification tasks, particularly in scenarios where the model
    is required to focus more on challenging examples rather than easy ones.
  prefs: []
  type: TYPE_NORMAL
- en: When the business metric is non-differentiable or sequential decision-making,
    techniques such as **reinforcement learning** ( **RL** ) may be employed, which
    focus on learning from feedback rather than direct optimization through a loss
    function. RL can optimize for a non-differentiable metric by using rewards and
    penalties to guide model training, making it particularly useful in scenarios
    where traditional loss functions fall short.
  prefs: []
  type: TYPE_NORMAL
- en: Navigating long-term metrics – the surrogate metric problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many business strategies aim to optimize long-term success. However, long-term
    metrics are often hard to measure in real time, creating a challenge for model
    development teams. Businesses often rely on short-term metrics as proxies for
    long-term goals, with the assumption that improving these short-term metrics will
    eventually lead to long-term success. Big leap of faith, right?
  prefs: []
  type: TYPE_NORMAL
- en: For instance, a social media platform may use **daily active users** ( **DAU**
    ) as a short-term metric if increasing DAU will also lead to improved long-term
    user retention. However, this leap of faith can be problematic, as optimizing
    for a short-term metric might not always lead to the intended long-term result.
    Surrogate metrics are often employed in such situations, acting as a stand-in
    for long-term objectives. Surrogates are needed as proxies for long-term metrics
    with the idea of providing more real-time feedback, which is often needed for
    building a more robust ML/AI solution.
  prefs: []
  type: TYPE_NORMAL
- en: To operationalize AI/ML models effectively, businesses must identify surrogate
    metrics that are temporally stable, highly correlated with the long-term goal,
    and minimally sensitive to short-term fluctuations. The goal is to ensure that
    short-term optimization leads to sustainable, long-term success. This process
    is still an open field of research, and businesses need to continuously evaluate
    and validate whether their surrogate metrics are indeed leading to the desired
    long-term outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: In the banking sector, predicting customer churn presents unique challenges.
    Unlike many industries, banking customers often hold multiple products simultaneously—such
    as savings accounts, checking accounts, credit cards, loans, and investment portfolios.
    Here, churn doesn’t always mean a complete exit from the bank; instead, it can
    involve a gradual reduction in product usage or a shift of key services to competitors.
    Like subscription-based businesses, churn may occur much later in the customer
    journey, making it difficult to detect and address in time. To proactively manage
    this, banks often rely on surrogate metrics that signal early signs of disengagement,
    allowing them to intervene before the customer fully disengages.
  prefs: []
  type: TYPE_NORMAL
- en: These surrogate metrics should be thoughtfully aligned with specific business
    goals. For instance, if the goal is to increase product usage and engagement,
    a meaningful metric could be a noticeable reduction in transactional activities,
    logins, or other forms of customer interaction within a defined timeframe. When
    the objective is to retain high-value customers and balances, banks might track
    a significant drop in account balances, say, by a certain percentage, as an early
    warning signal. Similarly, for reducing overall attrition, the closure of key
    accounts can serve as a clear indicator of churn. Finally, to boost cross-selling
    or upselling efforts, banks may monitor reductions in the number of active products
    held by customers, as such declines often precede broader disengagement. By carefully
    selecting and monitoring these surrogate metrics, banks can gain actionable insights
    into customer behavior, enabling timely interventions to prevent churn.
  prefs: []
  type: TYPE_NORMAL
- en: Dealing with multiple objectives – the Pareto frontier and optimization techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In most real-world applications, businesses often have multiple objectives,
    each of which plays a critical role in overall success. The challenge lies in
    optimizing multiple objectives simultaneously without compromising one for the
    other. This is where the concept of the Pareto frontier comes into play.
  prefs: []
  type: TYPE_NORMAL
- en: The Pareto frontier is a boundary that represents the optimal trade-offs between
    competing objectives. Any point on the frontier represents a solution where improving
    one objective will degrade another. For example, an e-commerce platform might
    want to optimize both user engagement and profit margins. However, increasing
    engagement by offering excessive discounts could negatively impact profit margins.
  prefs: []
  type: TYPE_NORMAL
- en: To navigate such trade-offs, businesses can employ techniques such as **reinforcement
    learning** or **Bayesian optimization** , which help in learning a scalarization
    of the objectives by combining them using linear weights or deploying heuristic
    search. These weights can be adjusted to prioritize different objectives based
    on business priorities. For instance, at one point in time, maximizing user engagement
    may be the primary goal, while at another time, profitability may take precedence.
  prefs: []
  type: TYPE_NORMAL
- en: By leveraging RL or Bayesian optimization, businesses can explore the Pareto
    frontier and make informed decisions about how to balance their competing objectives.
    Would balancing the goals of business be enough to reach adoption, or do we need
    to be more responsible while doing so?
  prefs: []
  type: TYPE_NORMAL
- en: Cost/ROI considerations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Operationalizing AI also raises questions about cost. Maintaining systems, especially
    those requiring real-time inference or continual training, can be expensive. The
    cost of infrastructure, including specialized hardware for LLMs, must be weighed
    against the model’s expected ROI. Organizations face tough decisions about whether
    to invest in high-performance systems or consider more efficient alternatives,
    such as smaller models, which may trade off some accuracy for lower costs.
  prefs: []
  type: TYPE_NORMAL
- en: Need for responsible AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In an AI era where machines try to outthink humans, the ethical deployment of
    AI has never been more critical. AI impacts various societal aspects, including
    mental health, spreading misinformation, job displacement, and socio-economic
    challenges. **Responsible AI** ( **RAI** ), therefore, is necessary to mitigate
    these adverse effects and ensure fairer AI solutions are built and are accountable
    and transparent.
  prefs: []
  type: TYPE_NORMAL
- en: With increasing AI regulations worldwide, such as in the EU and China, and regulatory
    initiatives across the United States, organizations need to adopt RAI practices
    to comply with legal requirements. Ensuring RAI means avoiding biases and inaccurate
    decisions, which is paramount for public services, the private sector, and regulated
    institutions. Shifting towards a human-centered approach in AI practices is essential.
    This means practitioners should aim to focus not just on compliance but also on
    understanding the socio-technical impacts of AI systems on stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: Every organization should aim to adopt RAI as a culture and not to think of
    it as a checklist. It is imperative to develop explainable and trustworthy AI
    systems that can provide comprehensible explanations needed for decision-making,
    fostering trust, and enabling users to make informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: So, at the end of the day, *defining success* for AI/ML models isn’t just about
    picking up a metric and running with it. You need a well-thought-out approach
    that considers business goals, the model’s evolution over time, and the broader
    impact on customers. And don’t forget those guardrail metrics. They’ll save you
    from making short-term gains at the cost of long-term sustainability.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: Defining success for AI models isn’t merely a technical exercise. It requires
    a thoughtful, holistic approach. Success metrics must align with business goals,
    adapt over time, and account for trade-offs, costs, and societal impacts. Getting
    this right is arguably the most critical step in operationalizing AI, ensuring
    models deliver sustained, meaningful value to businesses and society alike.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter outlined a holistic playbook for measuring ML success. It started
    with defining specific, measurable, and actionable metrics aligned with business
    goals, then adding guardrails to avoid harmful side effects. Next, we discovered
    how to link technical performance to business value, manage evolving metrics,
    and ensure responsible, cost-effective AI adoption. This foundation is vital for
    building trustworthy systems. In the next chapter, we’ll explore how to operationalize
    these models and bring them from experimentation to scalable, production-ready
    solutions.
  prefs: []
  type: TYPE_NORMAL
