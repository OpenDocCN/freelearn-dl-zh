- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Cloud, IoT’s “Superpower Brain”
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the intricate world of IoT, the cloud serves a role similar to the human
    brain, collecting, processing, and analyzing the vast streams of data generated
    by countless IoT devices, much like the brain interprets signals from neuron cells.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore the important role played by the cloud in IoT
    solutions and unveil how the cloud effectively addresses and resolves the challenges
    that arise with the rapid growth of IoT applications.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: In addition, we will discuss how IoT interacts with the cloud, including device
    management and data ingestion by the cloud. By understanding these integration
    aspects, you can see how IoT and the cloud work together to provide easy connectivity
    and data usage in real production scenarios.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: We will also talk about several popular communication protocols that facilitate
    data exchange and interaction between IoT devices and the cloud. Understanding
    these protocols is crucial for efficient and secure communication in IoT ecosystems.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, we will go through Amazon Web Services (AWS), which offers powerful
    services that are widely used for building robust and scalable IoT architectures.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will have a thorough understanding of the role
    of the cloud in IoT solutions and the components that contribute to the successful
    implementation of IoT projects.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'The following topics will be covered in this chapter:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Why is the cloud essential for IoT?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating IoT with the cloud
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communication protocols between IoT devices and the cloud
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AWS for IoT
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Important tips
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: During the project practice in *Chapters 13*, *14*, *15*, and *16*, you will
    program ESP32 to connect to AWS, utilize multiple AWS services to process sensor
    abnormal events, as well as collect, store, and query sensor data, and then transform
    the real-time data into a visualization dashboard. The knowledge you’ll learn
    about the cloud here will help you complete those practices.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Why is the cloud essential for IoT?
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In *Chapters 3* and *4*, we discussed two important aspects of IoT elements:
    the devices and the wireless connection. However, we also need to consider another
    crucial element in the IoT system – the **cloud**.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Undoubtedly, the cloud plays a crucial role in facilitating efficient IoT solutions
    by offering flexibility, scalability, reliability, and cost-effectiveness in managing
    large-scale IoT data, thus creating significant business opportunities. It serves
    as the operation center for all IoT device data. It has been proven that the cloud
    has effectively tackled numerous challenges that were hindering the growth of
    the IoT industry, including high initial investments, slow responses to dynamic
    market growth, inflexibility to new service demands, and limited global customer
    engagement, all of which are addressed in the following sections.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: The pain point of IoT before the cloud
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A brutal challenge faced by IoT application providers as their businesses grow
    is the unpredictable scale of growth of IoT devices and data.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Typically, IoT application providers start their innovation by creating prototypes
    in their labs. Then, they test them on a small scale at a customer site. If they
    work well, they can expand and implement the IoT solutions on a larger scale,
    either in one country or globally. The number of IoT devices can quickly increase
    from a few dozen to hundreds in a week, or even thousands or tens of thousands
    in a few months, depending on customer growth. As a result, the data that’s collected
    from these IoT devices can rapidly upsurge from megabytes to gigabytes and terabytes.
    This rapid growth, although a sign of business success, raises an important question
    for IoT application providers: How can they build a data platform that can handle
    such unpredictable traffic increases in an elastic, flexible, and cost-effective
    way?'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Before the cloud became widely adopted, IoT application providers typically
    purchased servers and physically installed them either at the customer’s data
    center or in a public data center. The important task was to make sure that the
    servers had enough capacity, including CPU, memory, hard disk drives, and networking
    bandwidth, to handle not only current but also deal with future traffic demands.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: For example, during the initial stage of deploying an IoT application, customers
    may only need to connect a few dozen sensors. This would require a server capable
    of handling a data transaction rate of approximately 10 packets per second, a
    100 MB hard disk drive, and a 100 Mbps networking bandwidth. However, in the coming
    weeks, if customers rapidly expand their deployment, the number of sensors could
    increase to tens of thousands. This up-spike scale requires the server to support
    a data transaction rate of up to 1,000 packets per second, a 100 GB hard disk
    drive, and a 1 Gbps networking bandwidth. Unfortunately, the existing servers’
    hardware capacity and networking bandwidth are unable to handle this surge in
    traffic, resulting in a decrease in service quality and then a horrible customer
    experience.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: In the past, to tackle such unpredictable traffic up-spike, IoT application
    providers usually equipped the servers with higher capacity than needed from the
    early stages. However, this approach led to significant overhead costs for small-scale
    deployments, making it not a cost-effective solution.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned earlier, during the early stage of go-to-market, IoT application
    providers only need to support a small number of customers. They may have enough
    engineering resources to assist these customers in setting up a data platform,
    either at the customer’s office or a public data center. However, as their business
    grows beyond a small-scale customer base, the number of customers may rapidly
    increase, requiring additional resources beyond their current engineering capacity.
    If the customer base crosses countries, regions, and continents, it becomes quite
    challenging for their engineering resource to implement contracts promptly.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: The impact of the cloud
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the rise of the cloud, the traditional approach of self-hosting data centers
    has been completely changed. Instead of installing physical server hardware, the
    IoT application providers can now lease the virtual servers and services from
    cloud service providers such as AWS. This not only makes the process simpler but
    also brings many advantages.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: One of the key advantages is scalability. With the cloud, IoT application providers
    can easily scale their infrastructure up or down based on their needs. This means
    that they can effortlessly handle sudden surges in demand without any hassle.
    Additionally, this scalability also ensures that resources are allocated optimally,
    leading to improved performance and efficiency.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: For instance, AWS offers a prominent feature called **Auto Scaling**. This feature
    helps you monitor and adjust the capacity of your application across various AWS
    services, such as **Elastic Compute Cloud** (**EC2**), **Elastic Container Service**
    (**ECS**), **DynamoDB** (a fully managed, serverless, key-value NoSQL database),
    and **Aurora** (a fully managed relational database engine). You can enhance performance,
    optimize costs, or strike a balance between them using straightforward scaling
    plans and recommendations.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are some of the benefits of AWS Auto Scaling:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: You can set up scaling quickly and easily using a single, intuitive interface
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can make smart scaling decisions based on your preference and the service’s
    suggestions
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can automatically maintain performance and availability, even when workloads
    are unpredictable or changing
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can balance capacity across Availability Zones for high availability and
    resiliency
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can launch multiple instance types and purchase options (Spot and On-Demand
    Instances) within a single Auto Scaling group to optimize costs
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Furthermore, the cloud enables rapid business scaling and extends the customer
    reach for IoT application providers, particularly in global expansion efforts.
    For example, AWS offers a vast global cloud infrastructure that serves as the
    foundation for extensive and flexible IoT deployments. As of December 2023, AWS
    spans 105 Availability Zones across 33 geographic regions, with over 600 points
    of presence and 13 regional edge caches. This extensive network ensures that IoT
    application providers can confidently deploy their solutions globally, guaranteeing
    high availability, low latency, and strong fault tolerance, regardless of the
    geographical distribution of their customer base.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, cost-effectiveness is the biggest advantage brought by scalability and
    flexibility. By getting rid of the need for physical hardware installation and
    upkeep, IoT application providers can lower their initial costs by using the cloud.
    This smartly shifts their spending from upfront expenses to operational expenses.
    They only pay for the resources they use, which helps them optimize their spending
    and allocate their budget more efficiently. This cost-effectiveness lets providers
    allocate more resources to core application development and innovation, promoting
    growth and progress in the IoT industry.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have understood the constraints to IoT growth before the advent
    of the cloud and the advantages brought by the cloud, let’s explore how the cloud
    works in the game of IoT.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Integrating IoT with the cloud
  id: totrans-38
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The integration of IoT and the cloud has two main focuses: device management
    and data ingestion. This integration allows us to connect to and control multiple
    devices, as well as collect and process large volumes of data. Through the use
    of cloud services, customers can analyze and obtain valuable insights from this
    data, resulting in improved decision-making and increased efficiency. Furthermore,
    this integration creates new possibilities for innovation and the development
    of cutting-edge applications that can bring about significant changes in various
    industries.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Device management
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the realm of IoT combined with the cloud, managing end devices is of paramount
    importance due to the sheer number and diversity of devices involved. This efficient
    management ensures operations are smooth, secure, and scalable. It entails authorizing
    customers’ devices associated with their cloud accounts and accessing other data
    services. The following key functions are involved in end-device management:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '**Registration**:'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device provisioning**: This first step involves connecting the device to
    the cloud by providing its unique identifiers (such as device ID and type) and
    metadata (such as location, owner, and organization). This helps establish the
    device’s identity within the IoT network.'
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Credential management**: Given the importance of security in IoT, this phase
    focuses on creating and protecting the credentials needed for the device’s cloud
    authentication. This includes access keys, passwords, tokens, and certificates.
    Managing these credentials carefully is crucial to prevent unauthorized access
    and potential security breaches.'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Configuration**:'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operational setup**: Post-registration, devices are configured with default
    settings such as network configurations, data reporting frequencies, and operational
    modes, aligning device operation with predefined specifications.'
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Service policy assignment**: Devices are assigned specific roles and permissions
    to access the data services or applications. These policies determine what actions,
    resources, and access levels each device can have, making sure they follow their
    intended operational scope.'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring**:'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Health monitoring**: This includes checks on operational status, battery
    life, and connectivity.'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Logging and diagnostics**: Systematic logging aids in issue diagnosis, behavioral
    understanding, and performance enhancement. Log analysis offers insights into
    system performance, aiding in issue identification and resolution.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Life** **cycle management**:'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Firmware updates (FOTA)**: Regular updates via **firmware over the air**
    (**FOTA**) are crucial for enhancing functionality, rectifying bugs, and reinforcing
    security'
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Data ingestion
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To keep the data of IoT devices safe, it needs to be securely sent to the cloud.
    Data ingestion goes beyond just storing the data. It involves preprocessing, storing,
    analyzing, and visualizing the data. Let’s look at these steps in greater detail:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '**Data collection**: Retrieve the raw data payload from the protocol messages
    sent by IoT devices, such as extracting raw data from the payload section of MQTT
    messages published by IoT devices.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data preprocessing**: Preprocess raw data through transformation, formalization,
    filtering, appending, or amalgamating it for streamlined storage. An example of
    this is converting temperature sensor readings from raw data into a uniform unit
    or appending the current timestamp to the payload data.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data storage**: Load the processed data into the databases on the cloud,
    prepping it for subsequent analysis and presentation.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data analysis**: Employ techniques such as time series analysis for trend
    spotting or forecasting, or utilize a machine learning algorithm to correlate
    data points and spot particular events or situations. You should construct alert
    systems based on preset thresholds or anomaly detection, subsequently notifying
    customers through messaging or email.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data visualization**: Present data in a clear and vivid format in a dashboard
    or generate regular reports summarizing essential metrics and insights, showcasing
    the health status of the system.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now that we understand the functions that the cloud can perform in the overall
    IoT architecture, let’s look at how the cloud talks to IoT devices remotely.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Communication protocols between IoT devices and the cloud
  id: totrans-61
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In [*Chapter 4*](B22002_04.xhtml#_idTextAnchor111), we discussed the application
    layer of the OSI model as it applies to wireless connectivity. The application
    layer, also known as **Layer 7**, interacts with software applications and serves
    as a data communication component.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Indeed, the communication protocols between IoT devices and the cloud are very
    important in determining how well IoT solutions work. These protocols are designed
    to meet the specific needs of IoT ecosystems, such as using low power, sending
    as little data as possible, and making sure data is transmitted reliably even
    when the network isn’t stable. These protocols are part of the application layer
    of the OSI model.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Several popular protocols are used in IoT with the cloud today, including **Message
    Queueing Telemetry Transport** (**MQTT**), **User Datagram Protocol** (**UDP**),
    **Constrained Application Protocol** (**CoAP**), and **Lightweight Machine-to-Machine**
    (**LwM2M**). Let’s learn more about some of these protocols.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: MQTT
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Type**: Application layer protocol.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Publish/Subscribe model**: Sensors connect to the MQTT broker and publish
    their data within topics. MQTT brokers act as proxies to make information available
    to other parties, such as cloud services, databases, dashboards, and even other
    devices. These parties act as MQTT clients and fetch the information by subscribing
    to the published topic.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Features**:'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lightweight and efficient**: Provides reliable message delivery, retains
    messages for future subscribers, and supports last will and testament messages
    for notifying disconnections.'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quality of service (QoS) levels**: Offers three levels of message delivery
    assurance (At most once, At least once, and Exactly once).'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use cases**: Widely used in IoT for sending data from devices to the cloud
    and vice versa. It’s lightweight and designed for low-bandwidth, high-latency,
    or unreliable networks.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LwM2M
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Type**: Application layer protocol.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Built on top of CoAP (transport layer), it takes advantage of CoAP’s lightweight
    and easy-to-implement nature.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Features**:'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device management and service enablement**: Efficient in terms of data transmission
    and power consumption, supports features such as firmware updates, remote diagnostics,
    and reporting'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Secure**: Supports a variety of security modes, including Datagram Transport
    Layer Security (DTLS)'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use cases**: Specifically designed for remote device management and telemetry
    within IoT. It’s used for managing the life cycle of IoT devices, their configuration,
    and how they collect telemetry data.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CoAP
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Type**: Web transfer protocol.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GET`, `POST`, `PUT`, and `DELETE` types.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Features**:'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Designed for IoT**: Supports built-in discovery of services and resources,
    asynchronous message exchanges, and offers low overhead and parsing complexity.'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Supports RESTful services**: Allows interaction between IoT devices in a
    request/response model.'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use cases**: Specifically designed for constrained devices and networks (such
    as IoT). It’s used for machine-to-machine (M2M) applications such as smart energy
    and building automation.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each protocol has its strengths and is designed to address specific challenges
    and requirements in IoT communications. The choice of protocol largely depends
    on the specific needs of the IoT application, including factors such as network
    reliability, power availability, data transmission frequency, and payload size.
    Understanding these protocols and their characteristics is crucial for designing
    robust, efficient, and scalable IoT solutions.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Understanding common communication protocols between IoT devices and the cloud
    is crucial for selecting the appropriate option based on your specific use cases.
    Next, we’ll focus on a market leader, AWS, and explore its range of popular cloud
    services for IoT applications. Please note that some of these services will be
    utilized in the practice project in later chapters of this book.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: AWS for IoT
  id: totrans-88
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AWS is widely recognized as the leading cloud platform in the market. It offers
    a comprehensive suite of advanced services that deliver flexibility and scalability
    for cloud computing. The range of AWS services related to IoT is diverse and encompasses
    various functionalities. Some of these services are specifically tailored for
    IoT applications, while others are commonly used services that also play a critical
    role in processing IoT data.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we’ll cover some popular AWS cloud services that are widely
    used in IoT applications. These services, when used together, create a complete
    system for managing IoT applications, including device management, data collection,
    storage, analysis, and gaining insights from data. Depending on your project requirements,
    you can use several of these services to build a complete IoT solution.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: AWS IoT Core
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS IoT Core** is a cloud service that helps devices connect and interact
    with cloud applications and other devices securely and easily. It can handle a
    large number of devices and messages and securely process and route them to different
    endpoints.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the key features and benefits:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '**Device connectivity and management**: AWS IoT Core ensures reliable and secure
    device connection to the cloud, no matter where these devices are located. It
    supports lightweight communication protocols such as MQTT and HTTP, which are
    ideal for IoT devices with limited resources.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Secure device communication**: It provides authentication and encryption
    for all device connections, guaranteeing that data is only exchanged between devices
    and AWS IoT Core when their identity is verified.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Message broker**: AWS IoT Core’s message broker enables communication between
    IoT devices and AWS services. It can handle a massive number of messages and route
    them to the necessary endpoints.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rules engine**: The rules engine allows you to process and transform messages
    effectively. You can use SQL-based rules to query message content and use the
    results to route the message to other AWS services. For example, you can trigger
    a Lambda function, send a push notification, or store data in a DynamoDB table
    based on incoming data.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device shadows**: AWS IoT Core provides device shadows, virtual versions
    of devices in the cloud. This feature allows you to keep track of your devices’
    current and desired states so that your applications can interact with them even
    when they’re offline.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration with other AWS services**: It seamlessly integrates with other
    AWS services, enabling you to build IoT applications that collect, process, analyze,
    and take action on data generated by connected devices without the need to manage
    infrastructure.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AWS IoT Core supports the following communication protocols with IoT devices
    as of December 2023:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '**MQTT**.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MQTT over WebSockets** **Secure** (**WSS**).'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hypertext Transfer Protocol –** **Secure** (**HTTPS**).'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long Range Wide Area Network** (**LoRaWAN**). To learn more, visit [https://docs.aws.amazon.com/iot-wireless/latest/developerguide/iot-lorawan.html](https://docs.aws.amazon.com/iot-wireless/latest/developerguide/iot-lorawan.html).'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following are its use cases in IoT:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '**Home automation**: Control and monitor home devices such as lights, thermostats,
    and security cameras'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Industrial IoT**: Connect and manage industrial equipment such as conveyor
    belts, robotic arms, and sensors'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Smart agriculture**: Gather data from agricultural sensors such as soil moisture
    sensors, weather stations, and GPS trackers on farming equipment'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Healthcare monitoring**: Securely process and analyze data from healthcare
    devices such as wearable health monitors and medical equipment'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To learn more about AWS IoT Core working in IoT devices, please refer to [https://aws.amazon.com/blogs/compute/building-an-aws-iot-core-device-using-aws-serverless-and-an-esp32/](https://aws.amazon.com/blogs/compute/building-an-aws-iot-core-device-using-aws-serverless-and-an-esp32/).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: AWS IoT Device Management
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS IoT Device Management**, working as part of IoT Core, is a service that
    makes it easy to onboard, organize, monitor, and remotely manage your IoT devices
    at scale. It provides essential tools and features to keep your devices healthy,
    manage permissions and settings, and troubleshoot devices remotely.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are its key features and benefits:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '**Device onboarding**: It simplifies the process of connecting IoT devices.
    You can register devices individually or in bulk, and AWS IoT Device Management
    ensures they are properly connected and authenticated before sending data.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device organization**: It can manage and categorize devices in groups and
    make bulk changes. This is especially useful for managing settings or deploying
    updates to multiple devices at once.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Remote device management**: It can securely manage devices remotely. It can
    push updates, reset, reboot, or make changes across your devices without physical
    access.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring and troubleshooting**: It can monitor device health and activity,
    set alerts for non-compliant devices, and use diagnostic features to troubleshoot
    remotely.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Access control**: It can integrate with **AWS Identity and Access Management**
    (**IAM**) for granular permission control. Ensure devices only perform authorized
    actions.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Audit and compliance**: It can audit device fleets to ensure compliance with
    security policies, as well as maintain the security and integrity of your IoT
    ecosystem.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, let’s look at some of its use cases in IoT:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '**Fleet management and maintenance**: Manage and maintain your fleet of IoT
    devices efficiently, ensuring they are always operational, up-to-date, and secure'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Software updates**: Remotely update the software running on your devices,
    ensuring they have the latest features and security patches'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device monitoring**: Monitor device health and activity, and set up alerts
    to be notified about potential issues or required maintenance'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security and compliance**: Ensure your devices are compliant with your security
    policies and best practices, reducing the risk of security breaches'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To learn more about the function blocks of AWS IoT Device Management, please
    refer to [https://aws.amazon.com/iot-device-management/](https://aws.amazon.com/iot-device-management/).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: AWS IoT Device Defender
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS IoT Device Defender**, working as part of IoT Core, is a service that
    helps secure your IoT devices. It checks your IoT configurations to ensure they
    follow security best practices and provides tools to monitor device behavior and
    detect abnormalities.'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are its key features and benefits:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: '**Continuous auditing**: AWS IoT Device Defender checks your IoT configurations
    to ensure they follow security best practices. It checks policies, device certificates,
    and device communication with AWS IoT Core to identify potential security vulnerabilities.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Real-time monitoring and detection**: It monitors your IoT devices for abnormal
    behavior that may indicate a security threat. For example, if a device starts
    sending data more frequently or to an unrecognized endpoint, IoT Device Defender
    alerts you.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alerts and mitigation**: When an issue is detected, AWS IoT Device Defender
    sends alerts based on your criteria. It can also integrate with AWS Lambda to
    trigger automatic actions, such as quarantining a device.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security metrics**: It provides predefined security metrics to evaluate your
    device’s behavior. These metrics include authentication failures, connection drops,
    and messages sent.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration with other AWS services**: AWS IoT Device Defender works with
    other AWS services such as AWS IoT Core, AWS IoT Analytics, and AWS IoT Events
    to create a secure IoT ecosystem.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s look at some of its use cases in IoT:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '**Prevent unauthorized access**: Detect and respond to unauthorized access
    attempts against your IoT devices'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ensure device authenticity**: Continuously check and ensure your devices
    use the correct certificates and policies'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitor fleet metrics**: Keep track of your fleet’s security metrics from
    a central place, making it easier to manage many IoT devices'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automated security responses**: Automate responses to potential security
    threats, reducing the time and resources needed for IoT security management'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please refer to [https://aws.amazon.com/iot-device-defender/](https://aws.amazon.com/iot-device-defender/)
    to learn more about the function blocks of AWS IoT Device Defender.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: AWS IoT Analytics
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS IoT Analytics** is a managed service that makes it easy to analyze large
    amounts of IoT data without the usual cost and complexity. It’s designed specifically
    for IoT data and analytics, providing advanced capabilities to analyze data from
    IoT devices and make informed business decisions.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are its key features and benefits:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '**Data collection**: IoT Analytics automates the process of collecting data
    from IoT devices. You can set up a channel to collect IoT data securely and at
    scale.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data processing and enrichment**: After data collection, the service allows
    you to process, filter, and enrich the data. You can transform the data into a
    format that’s ready for analysis.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data storage**: The service provides a time series data store optimized for
    IoT scenarios with large volumes of time-series data, like sensor readings.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data analysis**: AWS IoT Analytics lets you run queries using a built-in
    SQL query engine. You can also perform more complex analytics and machine learning
    using Jupyter Notebooks or connect your data to BI tools such as AWS QuickSight
    for visualization.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration with machine learning**: The service integrates with Amazon SageMaker,
    allowing you to build, train, and deploy machine learning models on your IoT data.
    You can also use your own pre-trained models.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security and privacy**: AWS IoT Analytics provides control over data access
    using AWS IAM policies, ensuring that only authorized services and individuals
    can access the data.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are some of its use cases in IoT:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '**Predictive maintenance**: Analyze data from industrial equipment to predict
    when machines are likely to fail so that maintenance can be scheduled just in
    time to prevent breakdowns'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asset tracking**: Analyze location data to track assets in real time and
    understand asset utilization patterns'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Environmental monitoring**: Collect and analyze data from environmental sensors
    to monitor air quality, water quality, temperature, humidity, and more, as well
    as make informed decisions based on environmental conditions'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User behavior analytics**: Understand how users interact with IoT devices
    to help inform product improvements, targeted marketing, and personalized user
    experiences'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To learn more about the function blocks of AWS IoT Analytics, please refer to
    [https://aws.amazon.com/iot-analytics/](https://aws.amazon.com/iot-analytics/).
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: AWS Lambda
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS Lambda** is a serverless service that allows you to run code without
    worrying about servers. It automatically handles the computing resources such
    as memory, CPU, and network. This is great for IoT applications because it can
    easily scale, adapt, and save costs.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at its key features and benefits:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '**Event-driven**: Lambda responds to events from various AWS services and other
    applications. In IoT, Lambda can process data from devices in real time.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability**: Lambda scales your application by running code for each trigger.
    It can handle workloads of any size, from a few requests to thousands per second.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost-effective**: You only pay for the time your code runs and when it’s
    triggered. There are no charges when it’s not running. This is beneficial for
    IoT applications with sporadic or unpredictable device interactions.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integrated with AWS IoT**: Lambda can be triggered by AWS IoT rules, allowing
    real-time data processing systems to be used.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexible**: Lambda supports multiple programming languages and can be used
    for any type of application or backend service.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Microservices**: Lambda works well with microservices architecture, allowing
    you to manage backend services without infrastructure.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are its use cases in IoT:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '**Data processing**: Transforming or enriching IoT data before sending it to
    another service'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device provisioning and management**: Automatically managing devices connecting
    to your network'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alerting and notification**: Sending alerts or notifications based on IoT
    sensor data'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please refer to [https://aws.amazon.com/lambda/](https://aws.amazon.com/lambda/)
    to learn more about the flow of AWS Lambda when used in IoT applications.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: AWS Kinesis
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS Kinesis** is designed for data streaming services. It offers services
    that let you load and analyze streaming data in real time, as well as build custom
    streaming data applications. It’s particularly useful in IoT scenarios where many
    devices generate a large stream of data that needs to be collected, analyzed,
    and acted upon quickly.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a breakdown of the different components of AWS Kinesis and their key
    features and benefits:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '**AWS Kinesis Data Streams**: This service lets you build custom applications
    that process or analyze streaming data for specific needs. In IoT, you can use
    Kinesis Data Streams to continuously capture and store large amounts of data from
    various sources, such as sensors, website clickstreams, financial transactions,
    social media feeds, IT logs, and location-tracking events.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AWS Kinesis Data Firehose**: Kinesis Data Firehose is the easiest way to
    reliably load streaming data into data lakes, data stores, and analytics services.
    It can capture, transform, and load data into AWS data stores for near real-time
    analytics using existing **business intelligence** (**BI**) tools and dashboards.
    IoT applications often use this service to route data from devices to AWS S3,
    AWS Redshift, or AWS Elasticsearch Service for further analysis.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AWS Kinesis Data Analytics**: This service allows you to analyze streaming
    data with standard SQL without needing to learn new programming languages or processing
    frameworks. In IoT applications, Kinesis Data Analytics can help run real-time
    analytics on data gathered from devices, providing immediate insights and enabling
    quick decision-making.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AWS Kinesis Video Streams**: This service simplifies the process of securely
    streaming video from connected devices to AWS for analytics, ML, and other processing.
    IoT devices with video feeds, such as security cameras or drones, can use Kinesis
    Video Streams to stream video to AWS for analysis and storage.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are its use cases in IoT:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: '**Real-time monitoring and analytics**: IoT devices generate a lot of data.
    Kinesis can process and analyze this data in real time, allowing for immediate
    insights and actions. For example, it can be used to monitor equipment health
    in industrial settings and send real-time alerts if anomalies are detected.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time series analytics**: For IoT applications that require time series data
    analysis (such as sensor data analysis), Kinesis can ingest this high-volume data
    for real-time analytics and subsequent decision-making.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Video data analysis from IoT devices**: With Kinesis Video Streams, you can
    stream video from connected devices to the cloud for analytics, machine learning,
    playback, and other processing.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data routing**: Kinesis Data Firehose can efficiently move data to various
    AWS services, such as S3, Redshift, or Elasticsearch, where you can use it for
    further analysis and storage or to build interactive dashboards.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can learn more about the flow of AWS Kinesis, when used in IoT applications,
    at [https://aws.amazon.com/kinesis/](https://aws.amazon.com/kinesis/).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: AWS DynamoDB
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS DynamoDB** is a highly efficient and scalable NoSQL database service
    specifically designed for IoT applications.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at its key features and benefits:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: '**High performance**: DynamoDB can handle over 10 trillion requests per day
    and support peaks of more than 20 million requests per second. This makes it perfect
    for handling a large volume of requests from numerous IoT devices.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexible data storage**: DynamoDB supports key-value and document data structures.
    This is ideal for storing diverse types of data from IoT devices, such as sensor
    readings, user settings, and device states.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fast response time**: DynamoDB provides consistently low latency in the single-digit
    millisecond range, ensuring real-time access to data for timely decision-making
    in IoT applications.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Secure data storage**: DynamoDB encrypts data at rest by default and offers
    fine-grained access control using AWS IAM, ensuring authorized access to your
    IoT data.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fully managed and hassle-free**: DynamoDB is a fully managed service that
    takes care of hardware provisioning, setup, configuration, replication, software
    patching, and cluster scaling. This allows you to focus on your IoT application
    development without worrying about database management.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Global data replication**: DynamoDB supports multi-region, fully replicated
    tables, enabling global access to data with minimal latency in IoT applications.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Streams and triggers**: DynamoDB Streams captures item-level modifications
    in a time-ordered sequence and trigger AWS Lambda functions. This feature can
    be used to send alerts or perform actions in response to changes in device data.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Seamless integration with AWS IoT**: DynamoDB seamlessly integrates with
    other AWS services such as AWS IoT Core, AWS Lambda, and AWS IoT Analytics, providing
    a comprehensive IoT solution.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In terms of its use cases, In IoT projects, DynamoDB is commonly used for storing
    and retrieving device telemetry data, device states, user settings, and managing
    dynamic content. Its scalability, performance, and integration capabilities make
    it an excellent choice as a backend for IoT applications.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: You can go to [https://aws.amazon.com/blogs/compute/implementing-a-serverless-aws-iot-backend-with-aws-lambda-and-amazon-dynamodb/](https://aws.amazon.com/blogs/compute/implementing-a-serverless-aws-iot-backend-with-aws-lambda-and-amazon-dynamodb/)
    to learn more about the flow of AWS DynamoDB when it’s used in IoT applications.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: AWS QuickSight
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AWS QuickSight** is a cloud-based BI service that provides easy-to-understand
    insights, visualizations, and dashboards from your data sources. It’s designed
    to be scalable, serverless, and embeddable, with built-in machine learning capabilities.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are its key features and benefits:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: '**Interactive dashboards**: It can create interactive dashboards that can be
    accessed from any device. These dashboards automatically update with new data,
    which is ideal for real-time monitoring of IoT devices and systems.'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Easy integration**: QuickSight integrates with various data sources, including
    popular cloud services such as AWS S3, AWS RDS, AWS Redshift, and AWS Athena,
    as well as third-party databases. You can easily bring in data from IoT devices
    stored in these services and analyze it using QuickSight.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Machine learning insights**: QuickSight provides machine-learning-powered
    insights to help uncover hidden trends and outliers, forecast future results,
    and facilitate informed decisions. For IoT, this means predicting device maintenance
    needs, optimizing operations, or understanding usage patterns.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Serverless and scalable**: As a fully managed service, QuickSight requires
    no server provisioning or management. It effortlessly scales to support tens of
    thousands of users, making it ideal for handling data generated by potentially
    millions of IoT devices.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pay-per-session pricing**: QuickSight offers a unique pay-per-session pricing
    model, which can be cost-effective for organizations with many users who access
    dashboards infrequently.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Embeddability**: You can embed QuickSight dashboards into apps and websites,
    providing integrated analytics within IoT applications or platforms.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security**: QuickSight offers robust security features, including row-level
    security, column-level security, and multi-factor authentication, ensuring secure
    access and analysis of data from IoT devices and other sources.'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In terms of its use cases in IoT, QuickSight simplifies the process of visualizing
    and interpreting data from various devices. It helps stakeholders understand patterns,
    monitor systems, and make data-driven decisions. For example, you can create dashboards
    to monitor environmental conditions reported by IoT sensors across different locations,
    visualize equipment performance in a factory, or track the usage patterns of smart
    home devices.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: To learn more about the flow of AWS QuickSight when it’s used in IoT applications,
    please refer to [https://aws.amazon.com/blogs/big-data/build-a-visualization-and-monitoring-dashboard-for-iot-data-with-amazon-kinesis-analytics-and-amazon-quicksight/](https://aws.amazon.com/blogs/big-data/build-a-visualization-and-monitoring-dashboard-for-iot-data-with-amazon-kinesis-analytics-and-amazon-quicksight/).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-207
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we discussed the indispensable role of the cloud in IoT applications,
    its essential functions, prevalent communication protocols, and several AWS services
    designed for IoT. Understanding these concepts is vital when you’re planning your
    IoT innovations. We will practice some of these AWS services in *Chapters 13*
    through *16*.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: So far, we’ve covered basic IoT elements from a high-level perspective, including
    its network, architecture, devices, wireless connectivity, and the cloud. In the
    upcoming chapters, we’ll explore how to employ ChatGPT to accelerate our IoT innovation
    journey. This will include the areas where ChatGPT can be utilized in the development
    process, the specific prompting framework and skills for our innovation, and some
    beginner-friendly IoT hands-on projects with prompting examples. Using these skills,
    you can instruct ChatGPT to accurately draw diagrams about the IoT application
    logic flow in terms of your design and generate code that’s driven on your hardware
    prototype, as per your intentions.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 2: Utilizing AI in IoT Development'
  id: totrans-210
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The second part of the book applies AI, especially ChatGPT, to IoT projects,
    linking theory with hands-on practice. It introduces the integration approach
    of ChatGPT into IoT projects, discussing AI's role in conceptualizing and executing
    IoT solutions, and its transformative impact on innovation. It also highlights
    the interaction principle with ChatGPT, effective prompt framework options for
    IoT applications, and the example of instructing ChatGPT to generate C++ code
    snippets on ESP32 in the context of IoT projects. Practical advice on starting
    IoT projects is also provided, emphasizing a gradual approach to avoid common
    pitfalls and ensure sustainable development. Ten detailed project examples demonstrate
    how ChatGPT can streamline the development process, from sensor integration to
    data handling. Finally, this part explores using AI tools to create flow diagrams,
    which are crucial for planning and understanding data flow within IoT projects,
    serving as a blueprint for coding and assembly phases.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 书的第二部分将人工智能，特别是ChatGPT，应用于物联网项目，将理论与实际操作相结合。它介绍了将ChatGPT集成到物联网项目中的方法，讨论了人工智能在构思和执行物联网解决方案中的作用，以及它对创新的变革性影响。它还突出了与ChatGPT的交互原则，物联网应用的有效的提示框架选项，以及在物联网项目背景下指导ChatGPT生成ESP32上的C++代码片段的示例。还提供了关于开始物联网项目的实用建议，强调逐步方法以避免常见陷阱并确保可持续发展。十个详细的项目示例展示了ChatGPT如何简化开发过程，从传感器集成到数据处理。最后，本部分探讨了使用AI工具创建流程图，这对于规划和理解物联网项目中的数据流至关重要，是编码和组装阶段的蓝图。
