- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Generative AI with Audio
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In some ways, AI-assisted generative audio suffers from the same imperfection
    problems as generative video does, especially voice recordings. Though some services
    can produce completely convincing dialogue, the majority produce stilted, artificial
    voices. Still, there are a surprising number of solutions in this space, some
    of which can improve or even revolutionize a video or audio production workflow.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Generative tech today can generate spoken dialogue, music, and other sounds
    from a variety of text and audio prompts. As is the case with video, humans can
    still do a better job in most cases, though a human is likely to take longer and
    cost more than an AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: If a job is worth doing really well, you should engage a human. Of course, not
    all jobs are the same, and if you’re short on budget or time, or you just want
    a temporary audio file to replace later, an AI may be just fine. After all, an
    imperfect AI-made voiceover could fit the bill better than an editor’s own voice,
    making it less distracting to a client reviewing an early draft.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: But that’s draft audio—can you use GenAI for the final output? While using an
    AI voice or music for an advertising campaign could carry reputational risk, an
    internal corporate training video using less-than-perfect audio is far less likely
    to raise eyebrows.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: A hybrid approach is also an option here. A creative using human-made voiceovers
    can—if the voice talent gives approval—use GenAI to correct mistakes picked up
    after recording. Not all voice artists will allow this, but if quick changes may
    be needed, it may be worth seeking permission to use AI to redo short sections
    of their work.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Finally, what about music? While working with a composer to create a piece would
    be nice, time and budget constraints mean that’s not usually a possibility for
    most creators. On a budget, sourcing and licensing the right track can be a time-consuming
    and tricky process.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: The idea of conjuring completely original music, at the right length, in the
    right tempo and key, is enticing, but can it compete with human-made tracks? Increasingly,
    for shorter tracks and background music used in videos and podcasts, the answer
    is probably yes. Generated sound effects aren’t quite at the same standard yet,
    but you can retain a good amount of control over the process.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll take a look at the state of the art in audio generation:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Creating synthetic speech
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Synthetic speech with voice cloning
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Replacing part of an existing voice recording
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating original music
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audio translation
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating synthetic sound effects
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First up, let’s see how realistic artificial speech has become.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Creating synthetic speech
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Text-to-speech** (**TTS**) solutions have existed for decades, but only recently
    have they actually started to sound human. We’ve come a long way since the late
    Stephen Hawking’s robotic voice was first heard, and the best AI voices are now
    nearly indistinguishable from real humans, faking emotion and even sometimes making
    mistakes.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: One service that made waves is Google’s NotebookLM ([https://notebooklm.google](https://notebooklm.google)),
    a tool that can generate an entire podcast from any text source. Here’s a primer
    from *The Verge* ([https://www.youtube.com/watch?v=YGtINs3R5EM](https://www.youtube.com/watch?v=YGtINs3R5EM)).
    While this is technically impressive, eerie, and potentially quite frightening,
    it’s probably not something of direct use to creative professionals.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Single-shot solutions like this don’t offer enough control or variety to be
    part of most creative workflows, and we’ll need to step back a little, focusing
    on generating speech from text we provide ourselves.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: As a baseline, your operating system includes some basic text-to-speech options
    for reading text aloud, and though they’ve improved, most of them still sound
    quite artificial.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: On a Mac, you can choose the voice you want to hear in **System Settings**,
    under **Accessibility** > **Read and Speak** > **System voice** (the Siri voices
    sound the best). With setup complete, select some text in a built-in app such
    as **Notes** or **Pages**, then right-click and choose **Speech** > **Start Speaking**
    to hear it.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Siri and other digital assistants use the best of these voices, but they don’t
    try to sound exactly like a human, and we know they’re not. Human-class AI voices
    are usually too complex to work in real time on a phone, though. These more complex
    models interpret provided text in a much more comprehensive way, decoding the
    emphasis and intonation each word should be given, the correct in-context pronunciation,
    and even how long any pauses should be. As with a human voiceover, there’s variation
    from one recording to the next, and there will be mistakes from time to time.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Though a wildly mispronounced word can sometimes give them away, the best of
    these voices sound better than a poor or even average human voiceover. The worst
    of them are little better than system voices, though—don’t settle for “OK” when
    “great” is out there.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Quality isn’t always important, though. If you only plan to use a synthetic
    voice as a temp “scratch” track, giving you something to edit against before you
    record with a human, a few odd phrases aren’t a problem. Of course, timing is
    still critical, and the better a temp track, the closer your draft edit will be
    to the final product.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: 'Web-based providers are numerous. As with images and video, some of the models
    used are available at multiple platforms, while some are unique. Here are the
    options I’ve tried:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: ElevenLabs ([https://elevenlabs.io](https://elevenlabs.io))
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Artlist ([https://artlist.io/voice-over](https://artlist.io/voice-over))
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runway ([https://app.runwayml.com/](https://app.runwayml.com/))
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uberduck ([https://www.uberduck.ai/app/text-to-speech](https://www.uberduck.ai/app/text-to-speech))
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Murf.ai ([https://murf.ai](https://murf.ai))
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Genny ([https://genny.lovo.ai/](https://genny.lovo.ai/))
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resemble.ai ([https://app.resemble.ai/hub](https://app.resemble.ai/hub))
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hume ([https://hume.ai](https://hume.ai))
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In several tests, I was able to produce clear, usable speech with many voices
    from these providers. **Artlist** and **Runway** both offer a wide selection of
    professional-sounding choices optimized for video projects, but **ElevenLabs**
    is the best known, the market leader, and has a huge library of good voices to
    choose from. If you don’t have time to run your own comparisons, start with their
    most recent voices, currently those built with the “v3” model. We’ll return to
    their agent voices later in the book, too.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.1 – The ElevenLabs TTS interface is similar to other providers in
    this space; you’ll see more controls after choosing a voice](img/B34247_09_1.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Figure 9.1 – The ElevenLabs TTS interface is similar to other providers in this
    space; you’ll see more controls after choosing a voice
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: While most of these services aren’t expensive, some open-source models can be
    run entirely offline, on your own device, for free.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.2 – Namigen gives you several options at no cost](img/B34247_09_2.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Figure 9.2 – Namigen gives you several options at no cost
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Although installing most of these solutions takes some technical know-how, if
    you have a Mac, you can download **Namigen** ([https://namigen.com](https://namigen.com))
    to get started with the high-quality free models Kokoro, Orpheus, and Dia. **Resemble.ai’s**
    Chatterbox ([https://www.resemble.ai/chatterbox/](https://www.resemble.ai/chatterbox/))
    is another popular open source option that can be run locally or online.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: For any jobs for which the budget isn’t there, or you need instant turnaround,
    a digital voice is probably the quickest solution. But remember that real humans
    offer this service too—with real human performances—and it may not cost as much
    as you think.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Outsourcing platforms such as Fiverr ([http://fiverr.com](http://fiverr.com))
    have many talented humans offering voice-over recording services at low prices.
    For this to work, you’ll need to give your direction in text form and wait a day
    or two for the job to be completed.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: For larger jobs, projects for which performance is important, or with a director
    who wants to direct, you’ll still need to hire a human and record in a studio,
    in person.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: I suspect most people using AI voices wouldn’t have hired a human in the first
    place. Instead, synthetic voices are replacing poor voiceovers or being added
    where no voiceover would have been considered previously.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'To use any of these options is simple: you need a script, and you need to pick
    a voice. Each service will have its own set of voices available, and this choice
    is important. You don’t want to use a voice that’s too familiar, because it’ll
    feel stale—and that’s the main risk with premade voices from a big provider.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: You’ll also want to choose a voice that sounds great to your audience. Most
    synthetic voices are American, and that may not work in your market. For example,
    a voiceover for a local Australian company would need to be in an Australian accent,
    because that’s what the local market expects.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: However, if I were creating an internationally targeted piece in English, I’d
    choose an American voice, or perhaps a British voice, or even a different voice
    in each country. Be sure to ask your client what each local market prefers, because
    regional accents bring meaning to a local audience that’s lost to outsiders. (If
    you’re interested in translation, though, that’s covered later in this chapter.)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Style and emotion
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s important to bear in mind the style of generation you’re looking for:
    a narration, a podcast conversation, educational content, or something else. Some
    services allow you to define this, while others provide specific voices for each
    purpose.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: A dramatic performance is possible with some services, but it’s stretching the
    capabilities of most. If you’re planning a radio play or an emotionally engaging
    audiobook reading, be ready to give up a lot of control, or hire a human.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s not to say you can’t try to step beyond a plain script. More advanced
    services allow you to specify `[excited]` tags to indicate emotion and `[gasps]`
    for non-verbal sounds, which can help to guide the generation. The more advanced
    ElevenLabs v3 model allows this, and also allows for multiple speakers to have
    a conversation:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.3 – This conversation at ElevenLabs is a good example of what’s
    coming to more platforms](img/B34247_09_3.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: Figure 9.3 – This conversation at ElevenLabs is a good example of what’s coming
    to more platforms
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Acronyms will usually be recognised as such, but if they’re not, you can try
    spelling them out letter by letter.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'For more control, dig into the settings. Some models allow you to control only
    one or two parameters (**Stability** is common) while others give you sliders
    to adjust speed, exaggeration, and more. Here are some controls from Resemble.ai:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.4 – Resemble.ai voices include these controls](img/B34247_09_4.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Figure 9.4 – Resemble.ai voices include these controls
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: If you’re struggling to get exactly the right results, try breaking your text
    up into sections, generating them independently, and reuniting them in an audio
    or video editing app. That way, you can retry problematic recordings and combine
    multiple versions—as long as they sound similar enough.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Just as with regular human recordings, each generation will be slightly different,
    so don’t be afraid to just try again if it’s not perfect. Conversely, if consistency
    becomes an issue, and separate generations sound quite different from one another,
    you may wish to try longer generations, not shorter ones. It may even be worth
    repeating parts of your script to make sure you get two takes in a single generation.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Note that many AI avatars (discussed in the previous chapter) will offer to
    generate synthetic speech, though you can record or generate audio independently
    if you prefer. **Descript** is one service that’s happy to animate an image (or
    a provided AI avatar) to match generated audio, but use with caution, because
    the visual side of things is not nearly as convincing as the audio side.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.5 – Descript has a desktop app, which makes life a little easier,
    and avatars are an option, too](img/B34247_09_5.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: Figure 9.5 – Descript has a desktop app, which makes life a little easier, and
    avatars are an option, too
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: While it’s possible today to produce human-like output, even the best AI voices
    have a limited lifespan. The default voices offered in the most popular apps will
    be used more often and more widely, and as a result, they’ll become recognizable
    and then passé. If you care about design, you don’t use default fonts, and if
    you care about audio, you won’t want to use a default AI voice either. Uniqueness
    matters.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: At some providers, such as ElevenLabs and Hume, you can design a custom voice
    by choosing specific characteristics. This will go a long way toward creating
    something unique to a particular client, though it could still be imitated.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: So… is it possible to create a custom AI voice that nobody else has access to?
    Indeed, it is.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Synthetic speech with voice cloning
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Stephen Hawking knew he was going to lose the ability to speak, and at the time,
    a robotic replacement voice was the best solution available. Today, if you expect
    to lose the ability to speak due to ALS or a similar disease, technology can capture
    your real voice before you lose it, and the next step beyond that tech can clone
    a voice in an incredibly short span of time.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: As an accessibility aid, Apple introduced **Personal Voice** in 2023 ([https://machinelearning.apple.com/research/personal-voice](https://machinelearning.apple.com/research/personal-voice)),
    and it’s still available today. To use it, you must train a model by speaking
    10 randomized sentences, and the model can then speak text that you type aloud
    in a synthetic clone of your own voice. It takes just a few minutes to create,
    but it’s not perfect. A clone of my own voice had some of my characteristics,
    but it sounds as if I’m speaking in a fake American accent.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'Just two years on, voice cloning has advanced to the point where just a few
    seconds of a voice can be enough to capture its essence. Sometimes, providing
    longer samples can give better results, but results vary widely. This tech has
    created the following possibilities:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: A text-to-speech provider can offer many more voices, trained on real people
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Part of a human voiceover can be replaced with a synthetic replacement
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New recordings in the same voice as existing recordings can be generated
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is, of course, an ethical line here—do you have permission to generate
    audio in a specific person’s voice? If an organization has previously engaged
    a voice artist to narrate their training videos, there are ethical and legal issues
    stopping you from simply replacing them with a synthetic copy. Most voice cloning
    services do attempt to verify that permission has been given, so you’ll probably
    need their active participation anyway.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: While I wouldn’t expect a new public voice to be created from your voice samples
    without permission, it’s always wise to check the privacy conditions of services
    you use. This is especially true when working with recordings of other people.
    To test these services out, I’ve used recordings of my own voice, and I’d recommend
    you do the same in your own tests. Note that many of the larger names in this
    space actually require you to read out a verbal permission statement as part of
    the voice creation process.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'While I tested several voice cloning services, not all do an equally good job.
    You may have more luck than I do, but only some of the services I’ve tried so
    far have been able to create a clone of my voice that actually sounds like me.
    This could be down to my hybrid Australian-with-a-hint-of-UK accent, but I’m surprised
    at how little success I had:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '**Descript** asked me to read a short script, which took just over 30 seconds,
    then produced a clone quite quickly. Unfortunately, it sounded like a slightly
    robotic American version of me—not something I could use.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Riverside.fm** includes a feature called VideoDub that lets you retype a
    word or two that a person has spoken in a video. I didn’t get results that sounded
    like me.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resemble.ai** promises free “rapid” voice clones and asks you to read a short
    script. Like Descript, it made the voice available quickly, but this time, it
    sounded nothing like me at all, sounding more English than Australian. Changing
    the language setting to different English accents gave wildly varying results.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Runway** offers a custom voice feature, charging 300 credits (almost half
    the monthly credits on a Standard plan) to process it. The script provided was
    far longer, nearly three minutes in length, but the output was a very American
    version of me, not suitable as a clone.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Uberduck** allows you to clone your voice for free, and—surprisingly—it did
    a very good job of cloning my voice with only 10 seconds of speech. If you want
    to test the voice cloning waters, this site is quick and effective, and it’s not
    expensive to use, with 1 hour of generations for $10/month.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ElevenLabs** offers **Instant Voice Cloning** with just a few seconds of
    recording, and this is available on all paid plans, including the Starter plan
    ($5/month). While my instant clone was quick to make and sounded acceptable, it
    wasn’t quite as good as Uberduck’s. However, ElevenLabs also offers **Professional
    Voice Cloning** (**PVC**) on their Creator, Pro, and Scale plans ($22/$99/$330/month,
    respectively). This takes significantly more training and has a strict limit of
    just one high-quality voice per account.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before you commit, realize that the creation of a professional voice clone is
    a non-trivial exercise. It requires at least 30 minutes of recorded audio, and
    preferably up to 3 hours. I’m in the lucky position of having created many, many
    hours of narrated video training courses, so I uploaded over two hours of high-quality
    recordings and let it process away. After all those uploads, I also had to record
    a specific phrase live to verify that it was really me.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, if you want to share your voice clone with others, you can. If
    you choose to add your voice to the **Voice Library**, you’ll earn money when
    your voice is used by others to generate audio. While it remains to be seen whether
    this is a financial win for participants, there’s at least the potential for success.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: A few hours later, my voice was ready, and overall, it’s pretty amazing to hear
    words I have only ever typed being said aloud. The realistic voice can be generated
    using any one of their models, and though the cheaper *Turbo* model is recommended,
    I heard fewer issues with the higher quality v2 *Multilingual* model. For now,
    skip the most advanced v3 model, as it’s still in alpha; it changed the way my
    voice sounded substantially.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: While most of the audio generated is perfectly acceptable, there’s still an
    occasional pause that feels like it’s in the wrong place, or a word pronounced
    differently from how I would have said it. Just like recording a second take with
    a real human, a quick regeneration can fix this while introducing other issues
    elsewhere. Merely clicking **Regenerate speech** is like telling a human, “*Give
    me another take*” without giving specific guidance. For better results, you could
    tweak the sliders to control speed, stability, or similarity, or you could add
    tags to specify emotion, but unwanted pauses can’t be totally banished.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: You can edit the best parts of each take together, and for many projects, that’ll
    work well enough. This process is similar to how you might work with an outsourced
    human voiceover artist—providing feedback, and receiving alternate takes of some
    lines—but it shifts the burden to an editor and isn’t as smooth a process as working
    with a human live in a vocal booth.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: All up, these professional voice clones are incredibly technically impressive
    and very useful. If you want to work with a specific voice-over artist who’s willing
    to train a model with their voice and let you use it, this can work well. If you
    can record with a real human directly, you’ll get better results, but at a higher
    cost in time and money.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: The market is still evolving rapidly and locally run open-source solutions are
    maturing too. Namigen (discussed earlier) plans to add voice cloning soon, and
    **IndexTTS2** ([https://indextts2.org](https://indextts2.org)) is available now
    if you’re happy to mess with a command line. You can also test this solution through
    **Voicv** ([https://voicv.com](https://voicv.com)).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: In the end, though ElevenLabs is leading the market today, competition in this
    space means that there are several good options to choose from, and some of the
    base models will be common to several providers. If an AI provider you’re already
    subscribed to offers voice services you can use, try them out.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: We’ve looked at how to generate a narration from an existing voice and also
    how to imitate an existing voice. Can we use this tech to revise an existing video?
    As you may have guessed, of course we can.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Replacing part of an existing voice recording
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: For video and audio creators, a potentially useful trick would be to change
    the words that someone says in a video to correct their mistakes or rewrite a
    script after shooting. As mentioned earlier, if you’d like the flexibility to
    replace part of a human voice recording with a synthetic one, gain permission
    ahead of time. While a human, given direction from another human, has the potential
    to record the most accurate, emotive audio, you’ll need their approval to put
    new words in their mouth.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: 'With that approval in hand, if you only need to replace a word or two, the
    process is easy. Using a provider that can make a good, quick voice clone, you
    can upload the incorrect section of audio, then type in the correct text and use
    TTS to make the correct version. Download, splice in the replacement, and you’re
    done: Tyler Stalman has shown this working with Artlist ([https://youtu.be/jCXHOUkeXn4?si=hwRabP5YpnrdyWih&t=806](https://youtu.be/jCXHOUkeXn4?si=hwRabP5YpnrdyWih&t=806)).'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'While a simpler TTS model may be able to generate a short section with a bit
    of coaxing, it’s not always easy to match the style of an original delivery well
    enough to pass as human. Intonation matters, emotion matters, and many models
    aren’t controllable enough to get what you need. Here’s one way to make a longer
    change:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Create a synthetic clone of that person’s voice.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Imitate that person’s speech *yourself*, matching their pace and emotion, but
    saying the right words instead of the wrong ones.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transform your new vocals into their voice, maintaining your emotion and pace.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the same way that you can create a synthetic video from another video, you
    can create synthetic speech based on existing speech, potentially allowing greater
    control over the emotion and pace of the delivery. Artlist offers this (Voice
    to Voice), as does ElevenLabs (Voice Changer) and Runway (Speech to Speech). It’s
    also possible in DaVinci Resolve, and since the process is less straightforward,
    I’ll take you through it step by step.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: This example is a real-world problem a client of mine experienced. I was filming
    a speech for professional speaker Daryl Elliott Green ([https://twiceshot.com](https://twiceshot.com))
    and then delivering a video of the speech to Daryl afterward. Unfortunately, he
    misspoke at the start of his speech, saying “August” instead of “April” in the
    first line of his talk. Many clients have made similar mistakes and fixing them
    used to require rerecording that moment—but no longer.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: To use this workflow, you’ll need the Studio version of DaVinci Resolve, and
    you’ll need an audio recording of the person to be cloned. About five minutes
    should be enough, but if you have time, you can provide a longer recording.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Select an original clip of the person speaking, then choose **AI Tools** > **DaVinci
    AI Voice Training…**.
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.6 – Train a model on a recording of a person’s voice, and then you
    can imitate it](img/B34247_09_6.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
- en: Figure 9.6 – Train a model on a recording of a person’s voice, and then you
    can imitate it
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: The first time you use this feature, you’ll have to download an additional file,
    or more than one if you’re working with languages other than English.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: After agreeing that you have permission to clone this voice, you can name the
    voice model and choose the level of accuracy needed—just go with the default **Better**
    option here.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Creating the model can take a little while, but it will continue in the background—my
    MacBook Pro with M3 Max took about an hour to process five minutes of source material.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: When it’s done, record your own voice, speaking the corrected “guide” words
    with the pace, intonation, and emotion you need. It’s easiest to use **Timeline**
    > **Record Voiceover** to record this to a new track.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You may find it easier to match the original speech if you listen to it in headphones
    while you record, and this will also avoid problems with feedback.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Select the new track, then choose **Clip** > **AI Tools** > **Voice Convert**.
    In this dialog box, choose **New Track** from the **Track** menu at the top, and
    your new voice from the **Voice Model** menu below.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Press **Render** to transform the new “guide” clip to that person’s voice. If
    it doesn’t sound quite right, undo and try again with a different pitch change
    value or try rerecording your guide clip.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The new clip will show up on a new track.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.7 – AI Voice Convert can transform a recording into one of a few
    built-in voices or one you’ve trained](img/B34247_09_7.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
- en: Figure 9.7 – AI Voice Convert can transform a recording into one of a few built-in
    voices or one you’ve trained
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Blade the original clip and the replacement clip, trimming and fading to decide
    exactly how much of each clip to use.
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This workflow enables tricks that would have been impossible just a year or
    two ago, and the example I’ve shown here is real—a presenter said one word instead
    of another, and I’ve been able to seamlessly replace it by saying it myself.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.8 – In the timeline, choose what you want to keep from the original
    and replacement audio](img/B34247_09_8.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
- en: Figure 9.8 – In the timeline, choose what you want to keep from the original
    and replacement audio
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, the strength of this approach is the control it provides. If you don’t
    have DaVinci Resolve Studio, try one of the voice-to-voice models online, and
    don’t be afraid to rerecord a new guide track (or simply regenerate) if you don’t
    have success the first time.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: We’ve looked at a number of ways to generate voice, but words aren’t the only
    important part of audio. Music is important too, and AI services are happy to
    help.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Creating original music
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Original music is one of the most controlled parts of the modern media landscape.
    Every video uploaded to every major streaming platform is scanned to identify
    the music it contains; YouTube’s system is called **Content ID**. If you use a
    track you don’t have the rights to, your video can be blocked, or muted, or you
    could get a copyright strike, or you could lose all monetization for that video.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Finding music for a video can be a little tricky, though. If you search for
    “corporate uplifting background” on a common stock music site, you’ll find several
    tracks that people have heard before. And even if you make music yourself, programming
    loops in free software such as **GarageBand**, if you’re not original enough,
    someone else might make a similar track and claim that you’re violating their
    copyright. (Yes, this has happened to me.)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Even musicians playing original pieces have to be careful—if you unknowingly
    use the same sequence of notes as that of a more famous and litigious artist,
    they could come after you independently. With copyright issues on one hand and
    originality issues on the other, it’s tempting to look to AI to make music that
    fits a client’s needs.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: While some people are using AI to make tracks to be played on streaming services
    or even sold independently, I’d only recommend using Gen AI to create background
    tracks for projects where the music plays a minor supporting role. For a project
    in which music is the focus, hire a human if you can, or use AI-made music as
    temp music only.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: But if you’ve never heard AI-made music, head to **Suno** ([https://suno.com](https://suno.com))
    and ask for something you could potentially use as a backing track for a podcast
    or video. To push the ethical boundaries just a little, I asked for `A song in
    the style of Daft Punk with lyrics about being on holiday at the beach with friends`,
    and it understood the brief.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: In a short time, I could play four different songs in the right style, based
    on two different sets of lyrics. Additional partial sample songs were also created
    with newer models, showing more variation and more complex structure, and most
    clients would find something here they’d like. If you’re a musician yourself,
    a paid account lets you upload your own music to build on.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: 'When a song has been made, in just a minute or two, be sure to read the lyrics
    and make sure they’re saying what you want. While two songs used lyrics about
    friends on a beach holiday, two other songs used lyrics written from the perspective
    of a pool cleaning robot: “*Scrub the algae chase the grime / Perfect pool it’s
    cleaning time*.” Hilarious, still decent music, but not usable.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.9 – Songs about friends at the beach, sure; songs about a robot
    cleaning a pool, not so much](img/B34247_09_9.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
- en: Figure 9.9 – Songs about friends at the beach, sure; songs about a robot cleaning
    a pool, not so much
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: The same prompt was rejected at **ElevenMusic** ([https://elevenlabs.io/app/music/](https://elevenlabs.io/app/music/))
    for including the name *Daft Punk*. After tweaking, the output was more generic,
    leaning too far into robotic voices instead of the vocoder that Daft Punk are
    known for, and with more of a generic pop soundtrack behind. Other generations
    with different prompts suffered from lyrics that weren’t sung clearly and an overly
    simple musical structure.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '**Udio** ([https://www.udio.com](https://www.udio.com)) misunderstood things
    badly and created a couple of punk guitar tracks. That would have been OK, except
    these songs included vocals that sounded vaguely like words but weren’t, the sonic
    equivalent of a person with seven fingers on one hand.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, there are many sites, many styles, and many prompts to try, and you’ll
    need to experiment to find a site that suits your tastes. Mind you, if you know
    a bit about music, you can step beyond prompting and become an active shaper of
    AI-made sounds.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '**Soundraw** ([https://soundraw.io/](https://soundraw.io/)) allows you to choose
    a genre, mood, theme, length, tempo, and the instruments to use, then presents
    you with a selection of tracks that it has just popped together. Scroll down,
    and you’ll see a mixer that you can adjust as the track plays, making parts of
    the track more or less intense, controlling when the quiet moments hit, when the
    fills kick in, when the bass drop lands, and even changing the chords used. These
    tracks may have vocal elements but are mostly instrumental. This is a different
    kind of music, but it’s great if you need more control.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Among people who know music well, opinions vary on these services. Technically,
    many AI tracks contain artifacts, and it’s difficult to separate the musical stems
    cleanly. If you were hoping to remix these tracks, to remaster them, or to remove
    some elements, you may struggle.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: Still, imperfect AI-made music can function as useful inspiration for professionals,
    just as imperfect AI-made images can. And again, for a less critical job, imperfect
    AI music could slot right into a final product, just as imperfect AI images can
    be “good enough.” If you’re not a music expert, use these tracks with caution,
    as you may not hear all the flaws that some of the audience will.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Also, be sure to stay on the right side of licensing; if you plan to use any
    music you make for any commercial purposes, you’ll need to read the fine print
    carefully. Music made with ElevenLabs can’t be used for traditional TV or film
    purposes, for example. Also, if you use a free or lower-tier account at many of
    these services, you can’t use the music for commercial purposes at all.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: As an aside, if you really do know what you’re doing and like to create music
    yourself, can AI help? Indeed, it can, with plugins such as **Output Co-Producer**
    ([https://output.com/products/co-producer](https://output.com/products/co-producer)).
    This sits inside your DAW and suggests samples that might help based on your prompts
    and from its analysis of your composition. The samples are human made, so this
    is not a Gen AI solution, but if you’re into making music, you may find it useful.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: Before we close this chapter, let’s have a quick look at the most useful new
    solutions for translating spoken dialogue.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Audio translation
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In many ways, translating audio is an extension of translating text, with the
    same issues and limitations discussed in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor113).
    Translations are imperfect, but still useful in many contexts, and the method
    you should use will vary depending on the task at hand.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Live translation is perfect for a conversation with collaborators who don’t
    speak your language. For this, you can use Apple’s Translate app, the cross-platform
    Google Translate app, or another system. These apps often tie into headphones,
    letting another person speak in their language while you hear it in yours.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.10 – In the Translate app, speaking in one language and having it
    instantly translated into another still feels like magic](img/B34247_09_10.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
- en: Figure 9.10 – In the Translate app, speaking in one language and having it instantly
    translated into another still feels like magic
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Because speed is critical to a fluid conversation, these systems won’t give
    you perfect results, though they’re usually good enough in the moment. In a production
    context, where accuracy is more critical, we’ll look to another solution.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: YouTube offers automatic **dubbing** into several languages, turning a video’s
    **captions** into audio using synthetic voices. These voices are relatively robotic,
    and any emotion or nuance in the original delivery will be lost. Also, since YouTube’s
    automatically generated captions are not usually as accurate as those produced
    by other transcription services, that can compromise the translated captions and
    dubs too.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: To improve quality, be sure to create your own captions and check them before
    uploading. If possible, ask a native speaker of a target language to either translate
    the script themselves or to correct errors in an AI-created translation. At this
    point, you can use a TTS service to generate new audio, potentially with more
    expression than a robotic default.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Though different languages are often spoken at different speeds, research has
    shown that they still deliver information in about the same amount of time ([https://www.cnrs.fr/en/press/similar-information-rates-across-languages-despite-divergent-speech-rates](https://www.cnrs.fr/en/press/similar-information-rates-across-languages-despite-divergent-speech-rates)).
    Overall, while you can expect a dubbed program to run about as long as the original,
    the timing of individual sentences is important in the context of a video. While
    an audio-only podcast has the flexibility for some sentences to take longer than
    others, the translated audio track on a video has to maintain the original language’s
    timing on every sentence.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: As an all-in-one solution for translating audio on videos, ElevenLabs offers
    a **Dubbing** service ([https://elevenlabs.io/app/dubbing](https://elevenlabs.io/app/dubbing)),
    which combines transcribed captions, dubbed audio, and offers timing control for
    each dubbed sentence. To test, I created a French dub of my promotional launch
    video for my Final Cut Pro Spatial Kit plugin.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.11 – After uploading the video, choose the languages you want to
    dub to, and wait a short time](img/B34247_09_11.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: Figure 9.11 – After uploading the video, choose the languages you want to dub
    to, and wait a short time
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Each language is charged separately, and at 10,000 credits per minute, per language,
    if you don’t want watermarked output, it’s easy to run through a standard plan’s
    monthly credits. (Note that if you plan to extract the audio from the output,
    a visual watermark doesn’t matter, and costs drop to 5,000 credits per minute,
    per language.)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: The output sounds very impressive, using instant voice cloning to create a foreign
    translation that sounds more or less like the original speaker(s). As you’d expect,
    it’s not quite as good as a professional voice clone. Importantly, in the Dubbing
    Studio, you have a chance to correct mistakes in both the original transcription
    and the translations, and this is a crucial step.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.12 – ElevenLabs’ Dubbing Studio lets you fix problems and regenerate
    audio if needed](img/B34247_09_12.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
- en: Figure 9.12 – ElevenLabs’ Dubbing Studio lets you fix problems and regenerate
    audio if needed
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Firstly, transcription errors happen and should be corrected before translation.
    For example, though most of the transcription here (*Figure 9.12*) is very good,
    the very first word, *Cinematic*, simply doesn’t exist in the original video.
    *Cinématique* in the translation is not just superfluous; it also ruins the timing.
    Happily, the Dubbing Studio lets you adjust the timing of any sentence, so do
    check for problems, then move or trim audio clips if needed.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: Also, remember that translation problems can be subtle, and as there are often
    multiple potential translations for a particular phrase, the automatic solution
    may not be the best one. This is especially important with jargon or technical
    phrases, and you’ll want to make sure you speak in a consistent way across all
    related videos in a language. As already mentioned, you really should ask a native
    speaker to check any translation.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: The transcription and the translated text are both editable, and if you make
    changes to the translation, you can press the **Generate Audio** button below
    that section to create a new audio clip. These regenerations are free (within
    limits), so you can fix problems without worrying that you have to pay significantly
    more than you’d expected.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.13 – Free changes can be made in the Dubbing Studio if you need
    to regenerate some sections](img/B34247_09_13.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
- en: Figure 9.13 – Free changes can be made in the Dubbing Studio if you need to
    regenerate some sections
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: ElevenLabs is a powerful solution that I’d recommend, but it’s not alone in
    the market, and it’s only a solution for the audio side of translation. Because
    the video remains untouched when the audio is changed, there’s a mismatch between
    the mouth movements and the words heard. In what seems like a magic solution,
    AI lip sync, done well, could potentially be a better option.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: AI lip sync
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Solutions such as **Perso** ([https://perso.ai](https://perso.ai)), **LipDub**
    ([https://www.lipdub.ai](https://www.lipdub.ai)), and **Dubly** ([https://dubly.ai](https://dubly.ai))
    include not just translation and dubbing but also regeneration of videos to match
    the newly generated audio. **Flawless** ([https://flawlessai.com/](https://flawlessai.com/)),
    mentioned briefly in the previous chapter, offers higher-end features more optimized
    for feature film workflows.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Some AI lip sync videos can be incredibly impressive, to the point where many
    viewers won’t realize that they have been translated at all. But be careful—the
    more seamless the end result, the more important it is to make sure the transcription
    and translation are perfect. Importantly, unless you are fluent in both the source
    and target languages, you won’t be able to assess that yourself.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: A viewer watching an auto-dubbed YouTube video using a robotic voice will expect
    it to make some mistakes, just as the transcribed captions in the original language
    may contain mistakes. There will also be some level of forgiveness if only the
    audio has been translated.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: However, if you’re presenting dialogue in a person’s real voice that actually
    appears to be said by them, that expectation shifts. Translation mistakes are
    likely to now be seen as a real mistake by a real person. There’s also the risk
    of falling into the *uncanny valley*, with something that looks *nearly human
    but not quite*. With lip-synced videos, a person’s hand movements may not quite
    match up with the translation, and you can be left with a vague feeling that something’s
    off. This will hopefully be less of a problem as the tech matures.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Whether you choose to use lip sync or not, if you have considerable translation
    needs, consider a dedicated service. Know that costs can quickly add up, and the
    more languages you produce, the more content you’re creating and the quicker you’ll
    run through your credits. Mind you, traditional translation isn’t cheap either,
    and you’ll still need real humans for verification at the very least.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: YouTube provides free automatic dubbing available at the low end, and the higher
    end is well served, though time will tell whether audiences embrace lip-synced
    translations. While I would personally prefer to hear the original speaker’s voice
    clone rather than a dubbing artist, I’m sure others feel differently. Just as
    some viewers are happy to read subtitles while others are not, the market will
    likely embrace a mix of these technologies, just as they have for subtitles and
    dubbing today.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: To end this chapter, let’s look at what AI can do for sound effects.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Creating synthetic sound effects
  id: totrans-170
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Even if you prefer to use real human voices and real human musicians, sound
    effects aren’t always something you can easily put your hands on. To do this job
    well by hand requires specialist software such as **Audio Design Desk** ([http://add.app](http://add.app))
    and banks of sounds to call on—it’s fun if you have the time.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: But if you don’t think you have time, yes, AI can fill that silence too, either
    temporarily or perhaps to a standard that’s good enough for final output. If you’ve
    been using Gen AI to make videos, this could be especially useful; few of these
    models include audio, and even **Veo 3**, which does include audio, doesn’t always
    get it right.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '**Firefly** is an easy place to start: you’ve probably got a login and some
    spare credits, quality is OK, and there are plenty of options to explore. Firstly,
    you can simply use a text prompt to request audio, and Firefly will give you four
    variations. I went for something relatively challenging (`Dogs barking at a surf
    beach`) to test how well it could blend two different kinds of sounds that would
    actually sometimes be heard together.'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.14 – Firefly’s four options all sounded good here](img/B34247_09_14.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
- en: Figure 9.14 – Firefly’s four options all sounded good here
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: A book is not the ideal format for delivering audio, but the waveforms should
    show you that there is a decent amount of variation in the eight-second files.
    That’s good—there are different beaches and different kinds of dogs, and I wasn’t
    very specific with my prompt. Unfortunately, the quality is not high enough to
    use for final output; listening on a half-decent pair of headphones reveals muddy
    audio with compression artifacts.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: Asking for the same sound from other providers gave mixed results. ElevenLabs
    offers sound effects (four variations and duration control), but the quality there
    wasn’t much better. Trying **SFX Engine** ([https://sfxengine.com/app/sound-effects](https://sfxengine.com/app/sound-effects)),
    which took a little longer, I received files 10 seconds long with a single variation
    per generation, and the quality was pretty variable.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: If you’re not confident with audio mixing, asking for a combined sound like
    this might seem like a good approach, but it may end up compromising the audio
    quality. When you ask for multiple elements to be combined, the output will only
    sound good if both source elements work, and you’ve got no way to swap out just
    one of the elements.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: 'If you can, it’s best to ask for elements separately, then control volume,
    panning, EQ, reverb, and so on for each sound on its own. It’s the classic tale:
    *the more time you can spend, the better the results*. If you skip all the fun
    parts with the help of AI, you won’t get better at mixing, timing, or positioning
    sounds in space.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: Returning to these sites and asking for elements separately gave better results
    overall, though quality was still variable. Sounds of dogs barking were OK, while
    surf waves crashing on a beach tended to sound artificial—something that can happen
    to sounds (especially of waves) with a data rate that’s too low.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: This quality issue was evident in many other sounds generated at ElevenLabs.
    By default, generations are public and sounds that other users have created can
    be heard and downloaded.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.15 – This public feed of sound effects at ElevenLabs gives a good
    idea of what’s possible](img/B34247_09_15.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
- en: Figure 9.15 – This public feed of sound effects at ElevenLabs gives a good idea
    of what’s possible
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: Listening to many of these results (from long and short prompts) revealed low-level
    hums in the background of forest ambience, explosions with clipped peaks, and
    some unpleasant beeps. It wasn’t all bad, but I didn’t find many sounds that would
    compete with a regular sound library. Variety is good, quality is not.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: AI does have some tricks that a regular sound library can’t quite match, though.
    On some sites, you can upload a video, and an AI will generate audio to match,
    with or without a prompt. **KlingAI** ([https://app.klingai.com/global/video-to-audio/](https://app.klingai.com/global/video-to-audio/))
    offers this, and while the video does seem to serve as a prompt enhancement, results
    were mixed—after all, you’re asking for multiple things at once.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: A video with nobody walking and no prompt produced audio with scrambled speech
    or footsteps added, though one or two variations were possibly usable. When I
    added a simple prompt of `Wind gently rustles the crops in the field`, it got
    the content right, but all four generations were of poor quality. Another video,
    of a person walking along a forest track, was paired with the prompt `Wind in
    the trees with birdsong` and produced artifact-filled audio with bonus (unwanted)
    running water, thunder, or mistimed footsteps.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: I tried Firefly too, and it didn’t seem to try to use the source video for inspiration.
    However, the interface here does encourage you to use short, specific prompts
    and combine multiple sounds—a good idea. At the time of writing, this feature
    is still in beta and isn’t fully active, but it’s worth exploring.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: Another potentially useful feature in Firefly is that you can use your voice
    to imitate the timing of sounds you request in a prompt. I asked for `footsteps
    crunching into gravel` and provided the timing in a voice recording that I uploaded
    separately. Four generations all kept the timing spot on, and though the quality
    wasn’t perfect, I could definitely use this as a temp track or a mix with other
    sounds.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.16 – Timing of these footsteps matched the voice recording I provided](img/B34247_09_16.png)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
- en: Figure 9.16 – Timing of these footsteps matched the voice recording I provided
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: For sound effects, quality seems to be a problem with most of these sites. While
    I can’t test all the possible services, I was surprised that the overall quality
    of sound effects is lower than it was for music. Given that sound effects are
    easiest to generate one at a time, and they’re not always that hard to find, perhaps
    it’s better to mix them the old-fashioned way for now.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Let’s step back and sum this up.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Between speech, music, and sound effects, there are many ways in which AI can
    help. The speech side of things is perhaps best developed, and whether you choose
    to use a high-quality premade voice or to train one of your own, I think we’re
    at the point where you could—with the best models—create a synthetic voice that
    many people would identify as human. Some synthetic music could pass for human-made,
    especially if it’s used at a low volume, but results vary widely in quality. Across
    the board, sound effects aren’t quite there, and though there’s huge potential,
    I’ll be mixing by hand for now.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a video or photo expert who dabbles in audio, it’s easy to take a
    quick listen to AI-made audio and potentially be impressed. But if you’re a visual
    expert, and you can spot flaws in visual generations that others might miss, don’t
    let poor audio quality slide by. Audio is critical to a good video, and though
    AI tools can perform wonders with cleanup, the generative side of things is a
    mixed bag for now.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一位涉猎音频的视频或照片专家，快速听听AI制作的音频并可能印象深刻是很简单的。但如果你是一位视觉专家，能够发现其他人可能忽略的视觉生成中的缺陷，那么不要让糟糕的音频质量轻易滑过。音频对于优质视频至关重要，尽管AI工具可以在清理方面创造奇迹，但目前生成方面的效果参差不齐。
- en: Next up, we’re stepping into the *Automation AI* part of the book—a brave new
    world.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将进入本书的*自动化AI*部分——一个充满勇气的新世界。
