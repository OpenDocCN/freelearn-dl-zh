- en: '**Establishes Alpaca API connection**: This will set up a connection to Alpaca’s
    API using your personal API keys.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立Alpaca API连接**：这将使用您的个人API密钥设置与Alpaca API的连接。'
- en: '**Defines the stock**: This is where you specify the stock you’re interested
    in trading (Tesla, in this case).'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义股票**：这是您指定想要交易的股票的地方（在这个例子中是特斯拉）。'
