  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`<Your-API-Key>` and `<Your-Secret-Key>` with the actual Alpaca API key and
    secret key.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用实际的Alpaca API密钥和秘密密钥替换`<Your-API-Key>`和`<Your-Secret-Key>`。
- en: '**Market orders**: The code is currently placing market orders. Make sure the
    market is open when you run this code, or else the orders may not execute.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市价订单**：当前代码正在放置市价订单。确保在运行此代码时市场是开放的，否则订单可能无法执行。'
- en: '`time_in_force` to `gtc` (good-til-cancelled). This is fine for limit orders,
    but for market orders, you may consider using ‘day’ to specify that the order
    is only valid during the trading day.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`time_in_force`设置为`gtc`（有效至取消）。这对于限价订单来说是可行的，但对于市价订单，您可能考虑使用‘day’来指定订单仅在交易日内有效。
- en: '**Error handling**: The code does not include any error handling. You might
    want to add some try-except blocks.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误处理**：代码中没有包含任何错误处理。您可能想要添加一些try-except块。'
- en: 'The following is an explanation of this Python code snippet:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对此Python代码片段的解释：
