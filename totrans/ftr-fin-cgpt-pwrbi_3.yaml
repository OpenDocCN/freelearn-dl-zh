  type: TYPE_NORMAL
  zh: 从特斯拉文章和特斯拉收益电话会议记录中获取特斯拉新闻和收益电话会议数据。
- en: 'To extract news articles about Tesla, use the following code:'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要提取关于特斯拉的新闻文章，请使用以下代码：
- en: '[PRE6]'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'IMPORTANT: Replace `''your-newsapi-key''` with your actual News API key.'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 重要提示：将`'your-newsapi-key'`替换为您的实际News API密钥。
- en: The date range above requires a paid membership to obtain all the Tesla news
    articles from 2022-10-01 to 2022-12-31\. See the following instructions to access
    the paid membership at the News API website.
  id: totrans-138
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 上面的日期范围需要付费会员资格才能获取2022-10-01至2022-12-31之间的所有特斯拉新闻文章。请参阅以下说明，在News API网站上访问付费会员资格。
- en: Navigate to the News API website. Go to News API and click on **Get** **API
    key**.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到News API网站。前往News API并点击**获取** **API密钥**。
- en: Sign up or log in. If you don’t have an account, you’ll need to create one.
    If you already have an account, log in.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册或登录。如果您没有账户，您需要创建一个。如果您已经有了账户，请登录。
- en: Select a plan. News API offers multiple plans, including a free tier with limited
    access and paid memberships for more comprehensive access. In this case, a paid
    plan will be required to run the Python code shown previously.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个计划。News API提供多个计划，包括具有有限访问权限的免费层和更全面访问的付费会员资格。在这种情况下，需要付费计划才能运行之前显示的Python代码。
- en: If you’ve selected a paid plan, you’ll be prompted to enter your payment information.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您选择了付费计划，您将被提示输入您的支付信息。
- en: Once the account setup is complete, you’ll be provided with an API key. This
    is what you’ll use to access the service programmatically.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 账户设置完成后，您将获得一个API密钥。这是您将用于以编程方式访问服务的密钥。
- en: 'For earnings call transcripts, let’s use the Financial Modeling Prep API as
    an example. First, we can use it to extract the page content and then parse the
    data:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 对于收益电话会议记录，让我们以Financial Modeling Prep API为例。首先，我们可以用它来提取页面内容，然后解析数据：
- en: Navigate to the Financial Modeling Prep website.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Financial Modeling Prep网站。
- en: Register or log in. If you are new, you’ll need to create an account. If you
    already have an account, log in.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册或登录。如果您是新手，您需要创建一个账户。如果您已经有了账户，请登录。
- en: Choose a plan. Go to the pricing section and choose Ultimate Plan. Follow the
    steps for payment to activate your subscription.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个计划。前往定价部分并选择终极计划。按照支付步骤激活您的订阅。
- en: 'Once your account is set up and the subscription is active, go to your dashboard
    to generate an API key:'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦您的账户设置完成并且订阅处于活动状态，请转到您的仪表板以生成API密钥：
- en: '[PRE7]'
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Replace `"your_api_key_here"` and `"your_endpoint_here"` with your actual API
    key and the API endpoint you’re interested in. Also, adjust the `params` according
    to the API’s actual documentation.
  id: totrans-150
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将`"your_api_key_here"`和`"your_endpoint_here"`替换为您实际的API密钥和您感兴趣的API端点。同时，根据API的实际文档调整`params`。
- en: Important note
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: The provided Python code is a general template and may not work out of the box
    due to API-specific requirements and data structures. Always refer to the API
    documentation for accurate and up-to-date information.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 提供的Python代码是一个通用模板，可能由于API特定的要求和数据结构而无法直接使用。请始终参考API文档以获取准确和最新的信息。
- en: As for parsing the Q&A part and comments, the structure of the HTML would dictate
    how to isolate that section. If it’s consistently structured across transcripts,
    you could simply adjust your selectors to grab that specific part of the page.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 至于解析问答部分和评论，HTML的结构将决定如何隔离该部分。如果它在记录中结构一致，您可以简单地调整选择器以获取页面上的特定部分。
- en: 'Here’s a Python code snippet that assumes you have the earnings call transcript
    in a string format. It looks for the line where Martin Viecha, VP of investor
    relations at Tesla, announces the start of the Q&A section in the earnings call.
    Then, it separates investor questions from the answers from the management team
    in the earnings call transcript:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个Python代码片段，假设您已经将收益电话的记录以字符串格式存储。它查找Martin Viecha（特斯拉投资者关系副总裁）在收益电话中宣布问答部分开始的那一行。然后，它将收益电话记录中的投资者问题与管理团队的回答分开：
- en: '[PRE8]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This is a simple example and might not handle all the intricacies of real-world
    earnings call transcripts. For example, some earnings calls might have multiple
    people answering a single question, the VP of investor relations might be different
    in the future, or the Q&A format may vary on the earnings call.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的示例，可能无法处理现实世界收益电话记录的所有复杂性。例如，一些收益电话可能有多个人在回答同一个问题，未来的投资者关系副总裁可能不同，或者问答格式可能在收益电话中有所不同。
- en: Note that this assumes the transcript is well-formatted and follows the patterns
    coded into the function. You might need to adapt the code to fit the specific
    formatting and structure of the transcripts you’re working with.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这假设记录格式良好且遵循函数中编码的模式。您可能需要调整代码以适应您正在处理的记录的特定格式和结构。
- en: Save the data as a CVS file(s).
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据保存为CVS文件（s）。
- en: 'Now, you can save the news articles and earnings call transcripts data as a
    CSV file. You can easily save the data as a CSV file using the `pandas` library.
    Here’s how you might modify the previous scripts to save the data into a CSV file:'
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在，您可以将新闻文章和收益电话记录数据保存为CSV文件。您可以使用`pandas`库轻松地将数据保存为CSV文件。以下是您可能修改的脚本，以将数据保存到CSV文件中：
- en: 'For the `NewsAPI` data, use the following code:'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于`NewsAPI`数据，使用以下代码：
- en: '[PRE9]'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Important note
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: '[PRE10]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The reasons why we chose to save the raw data in the CSV files as opposed to
    saving it after the sentiment analysis was completed are as follows:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择将原始数据保存为CSV文件而不是在情感分析完成后保存的原因如下：
- en: '**Reusability of raw data**: If you believe the raw data could be useful for
    other analyses in the future, it might be a good idea to save it as is. This way,
    you can always go back to the original data and perform different or additional
    analyses as required.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原始数据的可重用性**：如果您认为原始数据可能对未来的其他分析有用，将其保存为原始状态可能是个好主意。这样，您总是可以回到原始数据并按需执行不同的或额外的分析。'
- en: '**Computational resources**: If you’re dealing with a large amount of data
    and limited computational resources, it might be more efficient to perform sentiment
    analysis on-the-fly as the data comes in and then save the results. This way,
    you don’t need to store large amounts of raw data and then process it all at once.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算资源**：如果您处理大量数据且计算资源有限，在数据到来时即时进行情感分析可能更有效率。这样，您不需要存储大量原始数据，然后一次性处理。'
- en: '**Iterative improvement**: If you plan to improve or change your sentiment
    analysis method over time, saving the raw data would be beneficial. You can re-run
    your new and improved analysis on the original data at any time.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代改进**：如果您计划在未来改进或更改您的情感分析方法，保存原始数据将会很有益处。您可以在任何时间重新运行您的新改进分析在原始数据上。'
- en: Perform sentiment analysis.
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行情感分析。
- en: Once you have the news and earnings call data, we can perform sentiment analysis
    on it using `TextBlob`.
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一旦你有了新闻和收益电话数据，我们可以使用 `TextBlob` 对其进行情感分析。
- en: 'Here’s an outline of the process using the `TextBlob` library in Python for
    Tesla news articles:'
  id: totrans-170
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是使用 Python 中的 `TextBlob` 库对特斯拉新闻文章进行情感分析的过程概述：
- en: '[PRE11]'
  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This will create a CSV file named `article_sentiments.csv`, which contains each
    article along with its sentiment score.
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这将创建一个名为 `article_sentiments.csv` 的 CSV 文件，其中包含每篇文章及其情感得分。
- en: You can then import this CSV file into Power BI to create visualizations.
  id: totrans-173
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然后，你可以将此 CSV 文件导入 Power BI 以创建可视化效果。
- en: For the news articles, consider separating the text by speaker and then running
    sentiment analysis. This could provide insights into how different people commenting
    on the article are perceived or whether different individuals have different sentiment
    in their speech.
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于新闻文章，考虑按说话者分隔文本，然后进行情感分析。这可能有助于了解评论文章的不同人如何看待，或者是否不同个人在他们的言谈中有不同的情感。
- en: 'Here’s an outline of the process using the `TextBlob` library in Python for
    Tesla earnings call transcripts:'
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是使用 Python 中的 `TextBlob` 库对特斯拉收益电话记录进行情感分析的过程概述：
- en: '[PRE12]'
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This code will create a new CSV file named `transcript_sentiments.csv`, which
    includes each earnings call transcript along with its sentiment score. As with
    the news articles, you can then import this CSV file into Power BI to create visualizations.
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此代码将创建一个名为 `transcript_sentiments.csv` 的新 CSV 文件，其中包含每个收益电话记录及其情感得分。与新闻文章一样，然后你可以将此
    CSV 文件导入 Power BI 以创建可视化效果。
- en: For the earnings call transcript, consider separating the text by speaker and
    then running sentiment analysis. This could provide insights into how different
    people (e.g., CEO, CFO, investor relations, Wall Street analysts) are perceived
    or whether different individuals have different sentiments in their speech.
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于收益电话记录，考虑按说话者分隔文本，然后进行情感分析。这可能有助于了解不同的人（例如，CEO、CFO、投资者关系、华尔街分析师）是如何被感知的，或者是否不同个人在他们的言谈中有不同的情感。
- en: Again, it’s important to note that `TextBlob` provides a simple form of sentiment
    analysis. For more nuanced analysis, consider using more sophisticated models
    from libraries such as transformers, i.e., GPT 3.5.
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 再次强调，`TextBlob` 提供了一种简单的情感分析形式。对于更细致的分析，考虑使用来自如 transformers 等库的更复杂模型，即 GPT
    3.5。
- en: Import the data into Power BI or GPT-4.
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据导入 Power BI 或 GPT-4。
- en: Once you’ve saved your sentiment analysis data to a CSV file(s), you can import
    it into Power BI.
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存你的情感分析数据到 CSV 文件（们）后，你可以将其导入 Power BI。
- en: Open the Power BI desktop and select `news_article_sentiments.csv` and `transcript_sentiments.csv`
    files separately into Power BI. Then, for each data source, follow the steps provided
    to create a pie chart and a bar chart. You’ll do this once for the news article
    data and once for the earnings call data.
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Power BI 桌面，分别将 `news_article_sentiments.csv` 和 `transcript_sentiments.csv`
    文件选入 Power BI。然后，对于每个数据源，按照提供的步骤创建饼图和柱状图。你将分别为新闻文章数据和收益电话数据各做一次。
- en: To consolidate these visualizations, you first need to consolidate the data.
    Power BI allows you to append queries, which essentially stacks one dataset on
    top of another. You would need to make sure the data columns align correctly.
    For instance, you could have a common structure such as `{Source, Text, Sentiment,
    PublishedAt}`, where `Source` would be either `News Article` or `Earnings Call`.
    Then, follow the same steps to create your pie chart and bar chart.
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要合并这些可视化效果，你首先需要合并数据。Power BI 允许你附加查询，这实际上是将一个数据集堆叠在另一个数据集之上。你需要确保数据列正确对齐。例如，你可以有一个共同的格式，如
    `{Source, Text, Sentiment, PublishedAt}`，其中 `Source` 可能是 `News Article` 或 `Earnings
    Call`。然后，按照相同的步骤创建你的饼图和柱状图。
- en: 'Here’s how to append the data:'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是如何附加数据的方法：
- en: In the Power BI desktop, go to the `publishedAt` might not be the right field
    for the earnings call data unless you have a specific timestamp for each portion
    of the transcript. For the consolidated bar chart over time, it might be more
    useful to focus on articles or ensure you have a suitable time-based field for
    the earnings calls.
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Power BI 桌面中，前往 `publishedAt` 字段可能不是收益电话数据的正确字段，除非你有每个转录部分的特定时间戳。对于按时间合并的柱状图，可能更有用的是关注文章或确保你有适合收益电话的时间字段。
- en: This way, you can create individual visualizations for the sentiment from news
    articles and earnings call transcripts, as well as a consolidated view that shows
    the overall sentiment that takes into account both these data sources.
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这样，你可以为新闻文章和收益电话会议记录的情感创建单独的可视化，以及一个综合视图，显示考虑了这两个数据源的总体情感。
- en: 'The following are Power BI visualization steps for news article and earnings
    call transcript sentiment data:'
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是对新闻文章和收益电话会议记录情感数据的 Power BI 可视化步骤：
- en: 'Pie Chart: Click on the pie chart icon in the `sentiment` field into the `publishedAt`
    field into the `sentiment` field into the **Values** area. Power BI will create
    a bar chart showing the sentiment over time.'
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 饼图：在 `sentiment` 字段中点击饼图图标进入 `publishedAt` 字段进入 `sentiment` 字段进入 **值** 区域。Power
    BI 将创建一个显示情感随时间变化的柱状图。
- en: Integrate the sentiment analysis with a trading strategy.
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将情感分析与交易策略整合。
- en: The sentiment analysis data can be used as a signal in a trading strategy. For
    instance, a significant increase in positive sentiment could be a signal to buy,
    while an increase in negative sentiment could be a signal to sell or short.
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 情感分析数据可以用作交易策略中的一个信号。例如，正面情感的大幅增加可能是一个买入信号，而负面情感的增加可能是一个卖出或做空信号。
- en: Please consider these as illustrative examples rather than ready-to-use code.
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请将这些视为说明性示例，而不是现成的代码。
- en: Let’s assume you have two Python scripts, one for sentiment analysis (`sentiment_analysis.py`)
    and another for decision making and trade execution (`trade_execution.py`).
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 假设你拥有两个 Python 脚本，一个用于情感分析（`sentiment_analysis.py`），另一个用于决策和交易执行（`trade_execution.py`）。
- en: 'For the sentiment analysis script (`sentiment_analysis.py`), here’s a simplified
    version of a script that performs sentiment analysis and saves the results:'
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于情感分析脚本（`sentiment_analysis.py`），以下是一个执行情感分析并保存结果的简化脚本版本：
- en: '[PRE13]'
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'For the decision making and trade execution script (`trade_execution.py`),
    here’s a simplified version of a script that reads the sentiment scores, makes
    decisions, and executes trades:'
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于决策和交易执行脚本（`trade_execution.py`），以下是一个读取情感分数、做出决策并执行交易的简化脚本版本：
- en: '[PRE14]'
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'To run these scripts at specific intervals, you might use a task scheduler.
    For example, on Unix-based systems, you might use `cron`. Here’s a sample `cron`
    job that runs `sentiment_analysis.py` every day at 8 AM and `trade_execution.py`
    every day at 9 AM:'
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要在特定间隔运行这些脚本，你可能需要使用任务计划程序。例如，在基于 Unix 的系统上，你可能使用 `cron`。以下是一个示例 `cron` 作业，每天早上
    8 点运行 `sentiment_analysis.py`，每天早上 9 点运行 `trade_execution.py`：
- en: '[PRE15]'
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: In the Windows environment, you can use Task Scheduler to accomplish the same
    task. Remember to replace `/path/to/your/scripts` with the actual path to your
    scripts and `/usr/bin/python3` with the path to your Python interpreter.
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 Windows 环境中，你可以使用任务计划程序来完成相同的任务。请记住将 `/path/to/your/scripts` 替换为你的脚本的实际路径，将
    `/usr/bin/python3` 替换为你的 Python 解释器的路径。
- en: Involve ChatGPT in the process.
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 ChatGPT 涉入此过程。
- en: Including ChatGPT in this process could provide an additional layer of analysis
    to support your trading strategy. Specifically, ChatGPT can be used to provide
    additional insights from the news articles or transcripts and help with decision-making.
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在此过程中包含 ChatGPT 可以提供额外的分析层来支持你的交易策略。具体来说，ChatGPT 可以用来提供新闻文章或记录的额外见解，并帮助做出决策。
- en: For instance, instead of a simple positive, neutral, or negative sentiment analysis,
    you could use ChatGPT to generate a summary of each article or transcript. This
    summary could be analyzed for more nuanced sentiment, such as enthusiasm for a
    new Tesla product or concerns about supply chain issues.
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，你不必仅仅进行简单的正面、中性或负面情感分析，可以使用 ChatGPT 生成每篇文章或记录的摘要。这个摘要可以用于分析更细微的情感，比如对新特斯拉产品的热情或对供应链问题的担忧。
- en: To implement this, you would need to feed the text of each article or transcript
    into ChatGPT and then analyze the resulting output.
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要实现这一点，你需要将每篇文章或记录的文本输入到 ChatGPT 中，然后分析产生的输出。
- en: 'See the python code example below:'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请看下面的 Python 代码示例：
- en: '[PRE16]'
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Important note
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 重要提示
- en: Remember that this is a simplified example and the actual implementation might
    require handling various edge cases and API limits.
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请记住，这是一个简化示例，实际实现可能需要处理各种边缘情况和 API 限制。
- en: Moreover, incorporating ChatGPT into your process might require an adjustment
    of the sentiment analysis, as you’re moving from analyzing the entire articles
    to analyzing summaries generated by GPT-4\. You’ll also need to account for the
    costs associated with using the OpenAI API.
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此外，将ChatGPT纳入您的流程可能需要调整情感分析，因为您从分析整个文章转向分析由GPT-4生成的摘要。您还需要考虑使用OpenAI API相关的成本。
- en: 'In the upcoming section, Power BI will be used to create several visualizations
    based on different aspects of Tesla’s financial performance, market competition,
    and KPIs. Here’s a summary of the visualizations:'
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在接下来的部分中，Power BI将用于根据特斯拉的财务表现、市场竞争和KPI的不同方面创建多个可视化。以下是可视化的摘要：
- en: 'Financial visualizations: A pie or donut chart can illustrate the market share
    of Tesla and its competitors in the EV market.'
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财务可视化：一个饼图或甜甜圈图可以说明特斯拉及其竞争对手在电动汽车市场的市场份额。
- en: 'Operating efficiency ratio: A bar chart comparing the operating efficiency
    ratios (**Cost of Good Sold** (**COGS**) + **Operating Expenses** (**OpEx**) /
    revenue) of Tesla and its competitors.'
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营效率比率：一个柱状图比较特斯拉及其竞争对手的运营效率比率（**销售成本**（**COGS**）+ **运营费用**（**OpEx**）/收入）。
- en: 'Revenue growth: A line or area chart tracking the growth in revenue over time
    for each automaker from EV sales.'
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收入增长：一个折线图或面积图，追踪每个汽车制造商从电动汽车销售中收入随时间的变化。
- en: 'Gross Margin: A bar chart comparing the gross margins of each automaker to
    identify cost efficiency and profitability.'
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 毛利率：一个柱状图比较每个汽车制造商的毛利率，以识别成本效率和盈利能力。
- en: 'Research and development (R&D) Investment: A stacked bar or line chart displaying
    R&D investments made by different automakers over multiple years if data is available.'
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研发（R&D）投资：如果有多年的数据，一个堆叠柱状图或折线图显示不同汽车制造商的R&D投资。
- en: 'Geographic revenue distribution: A TreeMap to visualize revenue distribution
    by country or region for Tesla, and a line chart to display the revenue trends
    by country or region over time.'
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地理收入分布：一个 TreeMap 用于可视化特斯拉按国家或地区的收入分布，以及一个折线图用于显示随时间变化的收入趋势。
- en: 'Market competition visualizations:'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场竞争可视化：
- en: 'Vehicle Range and Performance: A scatter plot to visualize vehicle range against
    charging time for various automakers’ models. Also, a bar chart to compare acceleration
    (0-60 mph time) for different EV models.'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 车辆续航和性能：一个散点图用于可视化不同汽车制造商的车型续航与充电时间的关系。此外，一个柱状图用于比较不同电动汽车模型的加速（0-60英里/小时时间）。
- en: 'Infrastructure: A map that visualizes the charging network infrastructure if
    geographical data for charging stations is available. A stacked bar chart can
    also be used to compare total charging infrastructure between different automakers.'
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础设施：如果可用充电站的地理数据，一个地图用于可视化充电网络基础设施。也可以使用堆叠柱状图来比较不同汽车制造商之间的总充电基础设施。
- en: 'KPI visualizations:'
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键绩效指标（KPI）可视化：
- en: 'Vehicle Deliveries: A bar chart with a line chart overlay to show vehicle deliveries
    by quarter, and a stacked bar chart to breakdown vehicle deliveries by model (e.g.,
    Model S, Model 3, Model X, Model Y).'
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 车辆交付：一个带有折线图的柱状图，显示按季度进行的车辆交付，以及一个堆叠柱状图按车型（例如，Model S、Model 3、Model X、Model
    Y）分解车辆交付。
- en: 'Energy Storage and Solar Deployments: A bar chart with a line chart overlay
    to display energy storage deployments and solar installations by quarter.'
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能源存储和太阳能部署：一个带有折线图的柱状图，显示按季度进行的能源存储部署和太阳能安装。
- en: Power BI visualizations—Tesla
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI可视化—特斯拉
- en: Visualizations are, in essence, a universal language of shapes, patterns, and
    colors that the human brain can quickly interpret. With the burgeoning availability
    of big data and AI, we are now able to process and understand more information
    than ever before. However, this information is often complex and multi-dimensional.
    This is where visualizations step in as a transformative tool.
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可视化本质上是一种形状、模式和颜色的通用语言，人类大脑可以快速解读。随着大数据和人工智能的日益普及，我们现在能够处理和理解比以往任何时候都多的信息。然而，这些信息通常是复杂和多维的。这就是可视化作为变革性工具的用武之地。
- en: Our brains are exceptionally well-adapted to interpret visual information. Research
    suggests that the human brain processes images 60,000 times faster than text,
    and 90% of the information transmitted to the brain is visual. As such, visualizations
    harness this power, translating intricate patterns within raw data into something
    digestible and intuitive.
  id: totrans-224
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们的大脑非常擅长解释视觉信息。研究表明，人脑处理图像的速度比文本快60,000倍，大脑接收到的90%的信息是视觉的。因此，可视化利用这种力量，将原始数据中的复杂模式转化为易于消化和直观的东西。
- en: Let’s start this section by pulling in the required data for the following visualizations
    from Tesla’s 10-K annual report(s) and 10-Q quarterly report(s) in detail.
  id: totrans-225
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们从详细提取特斯拉的10-K年度报告和10-Q季度报告中的以下可视化所需数据开始这一部分。
- en: Financial visualizations—data extraction to Power BI visualizations
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H2
  type: TYPE_NORMAL
  zh: 财务可视化——数据提取到Power BI可视化
- en: Here are the steps to build the financial visualizations discussed in the previous
    section. We will take you through the process of extracting the data, saving it,
    and then extracting it to create each visualization.
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是构建上一节中讨论的财务可视化的步骤。我们将带您通过提取数据、保存数据以及提取数据以创建每个可视化的过程。
- en: 'Use Python to download the 10-Q and 10-K reports from the EDGAR database on
    the SEC’s website. Here’s a basic Python script using the `requests` library to
    download a single file:'
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用Python从美国证券交易委员会（SEC）网站上的EDGAR数据库下载10-Q和10-K报告。以下是一个使用`requests`库下载单个文件的基本Python脚本：
- en: '[PRE17]'
  id: totrans-229
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This script simply downloads a file from a given URL and saves it to the specified
    location. You need to replace the `url` variable with the URL of the 10-K or 10-Q
    report that you want to download.
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此脚本仅从给定的URL下载文件并将其保存到指定的位置。您需要将`url`变量替换为您想要下载的10-K或10-Q报告的URL。
- en: Keep in mind that you would need to repeat this process for each 10-K and 10-Q
    company report you want to include in the Power BI visualizations to compare to
    Tesla. We would recommend adding from the upcoming list to complete your comparison
    analysis through SEC filings.
  id: totrans-231
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请记住，您需要为每个想要包含在Power BI可视化中与特斯拉进行比较的10-K和10-Q公司报告重复此过程。我们建议从即将到来的列表中添加，以通过SEC文件完成您的比较分析。
- en: '**Instructions**'
  id: totrans-232
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**说明**'
- en: You will need to locate the **Central Index Key** (**CIK**) number for any company
    from which you want to find SEC filings, such as 10-K annual reports or 10-Q quarterly
    reports. The CIK number is a unique identifier assigned by the **US Securities
    and Exchange Commission** (**SEC**) to corporations who are obligated to disclose
    financial information with the SEC.
  id: totrans-233
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您需要找到您想要查找SEC文件（如10-K年度报告或10-Q季度报告）的任何公司的**中央索引键**（**CIK**）编号。CIK编号是由**美国证券交易委员会**（**SEC**）分配给有义务向SEC披露财务信息的公司的唯一标识符。
- en: Here’s a concise guide on how to obtain a CIK number for a public company.
  id: totrans-234
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一份关于如何获得上市公司CIK编号的简要指南。
- en: 'SEC’s EDGAR database:'
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: SEC的EDGAR数据库：
- en: 'Go to the SEC’s EDGAR database: [https://www.sec.gov/edgar/searchedgar/companysearch.html](https://www.sec.gov/edgar/searchedgar/companysearch.html)'
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往SEC的EDGAR数据库：[https://www.sec.gov/edgar/searchedgar/companysearch.html](https://www.sec.gov/edgar/searchedgar/companysearch.html)
- en: In the **Company Name** field, type the name of the company you’re interested
    in.
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**公司名称**字段中，输入您感兴趣的公司名称。
- en: The search results will display the company’s CIK number alongside its name.
  id: totrans-238
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 搜索结果将显示公司的CIK编号及其名称。
- en: 'Google or Bing online search:'
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Google或Bing在线搜索：
- en: You can obtain a CIK number by conducting a simple online search. Type the company’s
    name followed by `CIK number` into the search engine of your choice (e.g., `Google`
    `CIK number`).
  id: totrans-240
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以通过简单的在线搜索获得CIK编号。在您选择的搜索引擎中输入公司的名称后跟`CIK编号`（例如，`Google CIK编号`）。
- en: 'Company’s website or filings:'
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 公司网站或文件：
- en: Public companies often include their CIK number on their official website, especially
    in the investor relations section or in their SEC filings.
  id: totrans-242
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公众公司通常在其官方网站上包含其CIK编号，尤其是在投资者关系部分或在其SEC文件中。
- en: 'General Motors (GM) SEC CIK Number: 0001467858'
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通用汽车（GM）SEC CIK编号：0001467858
- en: GM is a traditional automaker that’s investing heavily in electrification and
    autonomous driving technologies. Its Chevrolet Bolt and upcoming GMC Hummer EV
    and Cadillac Lyriq are direct competitors to Tesla’s models.
  id: totrans-244
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通用汽车（GM）是一家传统汽车制造商，正在大力投资电气化和自动驾驶技术。其雪佛兰Bolt、即将推出的GMC Hummer EV和凯迪拉克Lyriq是特斯拉车型的直接竞争对手。
- en: 'Ford (F) SEC CIK Number: 0000037996'
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 福特（F）SEC CIK编号：0000037996
- en: Ford’s Mustang Mach-E and the upcoming all-electric F-150 Lightning show the
    company’s commitment to electrification. Ford is a legacy car manufacturer similar
    to GM and is in the midst of a transition to the EV market.
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 福特Mustang Mach-E和即将推出的纯电动F-150 Lightning展示了公司对电动化的承诺。福特是一家类似于通用汽车的汽车制造商，正处于向电动汽车市场的转型期。
- en: 'Rivian (RIVN) SEC CIK Number: 0001809779'
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rivian（RIVN）美国证券交易委员会CIK编号：0001809779
- en: A pure-play EV company, Rivian is a US-based EV manufacturer backed by Ford
    and Amazon, which recently went public and is a direct competitor to Tesla in
    the electric truck market.
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 纯电动汽车公司Rivian是一家由福特和亚马逊支持的美国电动汽车制造商，最近上市，是特斯拉在电动卡车市场的直接竞争对手。
- en: 'NIO Inc. (NIO) SEC CIK Number: 0001736541'
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蔚来汽车股份有限公司（NIO）美国证券交易委员会CIK编号：0001736541
- en: While not US-based (it’s a Chinese company), NIO is listed on the NYSE. NIO
    is a manufacturer of premium EVs and is often referred to as the “Tesla of China."
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 尽管不是美国公司（它是一家中国公司），但蔚来汽车在纽约证券交易所上市。蔚来是一家高端电动汽车制造商，常被称为“中国的特斯拉”。
- en: 'XPeng Inc. (XPEV) SEC CIK Number: 0001821684'
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小鹏汽车股份有限公司（XPEV）美国证券交易委员会CIK编号：0001821684
- en: Another Chinese EV manufacturer listed on the NYSE, XPeng is focused on developing
    affordable EVs and advanced autonomous driving technologies.
  id: totrans-252
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 另一家在纽约证券交易所上市的中国电动汽车制造商，小鹏汽车，专注于开发经济实惠的电动汽车和先进的自动驾驶技术。
- en: 'Lucid Group (LCID) SEC CIK Number: 0001736874'
  id: totrans-253
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Lucid集团（LCID）美国证券交易委员会CIK编号：0001736874
- en: Lucid Motors is an American EV manufacturer that recently went public. Its first
    model, the Lucid Air, is a luxury electric sedan that competes with Tesla’s Model
    S.
  id: totrans-254
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Lucid Motors是一家最近上市的美国电动汽车制造商。其首款车型Lucid Air是一款豪华电动轿车，与特斯拉的Model S竞争。
- en: By comparing Tesla with both traditional automakers (GM, Ford) and pure-play
    EV companies (Rivian, NIO, XPeng, Lucid), the visualizations should provide a
    comprehensive view of Tesla’s performance in the rapidly evolving EV market.
  id: totrans-255
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过将特斯拉与传统汽车制造商（通用汽车、福特）和纯电动汽车公司（Rivian、蔚来、小鹏、Lucid）进行比较，可视化应该能够提供一个全面的视角，了解特斯拉在快速发展的电动汽车市场中的表现。
- en: Automating this for multiple companies over multiple years would involve building
    a more sophisticated process that can navigate the SEC’s EDGAR database, which
    is beyond the scope of this example. You can also reference the SEC API process
    provided in [*Chapter 1*](B21008_01.xhtml#_idTextAnchor017).
  id: totrans-256
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在多年内为多家公司自动化这一过程将涉及构建一个更复杂的过程，该过程能够导航美国证券交易委员会的EDGAR数据库，这超出了本例的范围。你还可以参考在[*第一章*](B21008_01.xhtml#_idTextAnchor017)中提供的SEC
    API过程。
- en: Once you have these files, you would then need to process them to extract the
    relevant financial data. This could be done using Python’s built-in string methods
    or regular expressions for simple cases or with a library such as `BeautifulSoup`
    for more complex HTML processing.
  id: totrans-257
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一旦你有了这些文件，你接下来就需要处理它们以提取相关的财务数据。这可以通过使用Python内置的字符串方法或正则表达式在简单情况下完成，或者使用如`BeautifulSoup`这样的库来进行更复杂的HTML处理。
- en: 'As an alternative to *step 1* (CSV file option), you can extract data from
    a company’s 10-K and 10-Q reports for analysis involves web scraping from SEC’s
    EDGAR database, HTML/XML parsing, and handling CSV files for data storage. Here’s
    a basic script that demonstrates these steps:'
  id: totrans-258
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 作为*步骤1*（CSV文件选项）的替代方案，你可以从公司的10-K和10-Q报告中提取数据进行分析，这涉及到从SEC的EDGAR数据库进行网络抓取、HTML/XML解析和处理CSV文件以进行数据存储。以下是一个基本脚本，演示了这些步骤：
- en: '[PRE18]'
  id: totrans-259
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Extract Power BI visualization data for each visualization.
  id: totrans-260
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提取每个可视化中的Power BI可视化数据。
- en: 'The next step is to identify which tables contain the data you need and to
    extract that data into CSV files. Here’s a simple Python script to illustrate
    this process:'
  id: totrans-261
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下一步是确定哪些表格包含你需要的数据，并将这些数据提取到CSV文件中。以下是一个简单的Python脚本，用于说明此过程：
- en: '[PRE19]'
  id: totrans-262
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: You’ll need to manually inspect the 10-K and 10-Q documents to determine which
    tables contain the data you need (`market_share_table_index`, `operating_efficiency_ratio_table_index`,
    etc., in the script). Once you’ve identified those tables, this script will extract
    the data from them and save it into separate CSV files.
  id: totrans-263
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你需要手动检查10-K和10-Q文件，以确定哪些表格包含你需要的数据（脚本中的`market_share_table_index`、`operating_efficiency_ratio_table_index`等）。一旦确定了这些表格，此脚本将从这些表格中提取数据，并将其保存到单独的CSV文件中。
- en: However, this is still a simplified example. In practice, the data may need
    cleaning or reshaping before it can be used for visualizations. You may also need
    to extract data from other parts of the document besides tables. Furthermore,
    some of the data you’re interested in, such as market share or operating efficiency
    ratio, might not be directly reported in the 10-K or 10-Q. In these cases, you
    would need to calculate these metrics from the available data or find alternative
    data sources.
  id: totrans-264
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，这仍然是一个简化的例子。在实际操作中，数据可能需要在用于可视化之前进行清理或重塑。您可能还需要从文档的其他部分提取数据，而不仅仅是表格。此外，您感兴趣的一些数据，如市场份额或运营效率比率，可能不会直接在10-K或10-Q中报告。在这些情况下，您需要从可用数据中计算这些指标或寻找替代数据来源。
- en: Import the data.
  id: totrans-265
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 导入数据。
- en: Let’s walk through the steps of importing the CSV files and creating the visualizations.
    We’ll use `market_share.csv` as an example, but the same process applies to the
    other CSV files that will be used for the other visualizations listed in the upcoming
    financial visualization section.
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们一步步导入CSV文件并创建可视化。我们将使用`market_share.csv`作为示例，但相同的过程也适用于即将在财务可视化部分列出的其他CSV文件。
- en: Open the Power BI desktop and click on **Home** in the ribbon at the top.
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开Power BI桌面，点击顶部的功能区中的**主页**。
- en: In the **External Data** section, click on **Get Data**.
  id: totrans-268
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**外部数据**部分，点击**获取数据**。
- en: In the drop-down menu, select **Text/CSV**.
  id: totrans-269
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在下拉菜单中，选择**文本/CSV**。
- en: Navigate to the `market_share.csv` file, select it, and click **Open**. In the
    preview window, verify that the data is correct and click Load.
  id: totrans-270
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航到`market_share.csv`文件，选择它，然后点击**打开**。在预览窗口中，验证数据是否正确，然后点击加载。
- en: 'Create the Power BI visualizations for the financial visualizations:'
  id: totrans-271
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 创建财务可视化的Power BI可视化：
- en: 'Compare Tesla’s market share in the EV space with that of other automakers:'
  id: totrans-272
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较特斯拉在电动汽车领域的市场份额与其他汽车制造商：
- en: '**Visualization type**: Pie chart or donut chart.'
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：饼图或环形图。'
- en: '**Description**: Show the market share of each automaker, including Tesla.
    The pie chart segments will represent the proportion of market share each automaker
    holds.'
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：展示每个汽车制造商（包括特斯拉）的市场份额。饼图段将代表每个汽车制造商持有的市场份额比例。'
- en: '`Company` field into the **Legend** or **Details** area of the visual and the
    Market Share field into the Values area.'
  id: totrans-275
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`Company`字段拖入可视化的**图例**或**详细**区域，将市场份额字段拖入值区域。
- en: Operating efficiency ratio – COGS + OpEX / revenue for Tesla and its competitors
  id: totrans-276
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营效率比率 – 特斯拉及其竞争对手的COGS + OpEX / 收入
- en: '**Visualization type**: Bar chart'
  id: totrans-277
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：柱状图'
- en: '**Description:** Compare the operating efficiency ratios of Tesla and its competitors'
  id: totrans-278
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：比较特斯拉及其竞争对手的运营效率比率'
- en: '**Instructions**: Drag the Company field into the Axis area and the Operating
    Efficiency Ratio field into the Values area'
  id: totrans-279
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**说明**：将公司字段拖入轴区域，将运营效率比率字段拖入值区域。'
- en: 'Revenue growth: Compare the growth in revenue from EV sales across different
    automakers:'
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 收入增长：比较不同汽车制造商电动汽车销售的收入增长：
- en: '**Visualization type**: Line chart or area chart'
  id: totrans-281
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：折线图或面积图'
- en: '**Description**: Track the growth in revenue over time for each automaker'
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：跟踪每个汽车制造商的收入增长趋势'
- en: '`Year` field into the `Revenue Growth` field into the `Company` field into
    the **Legend** area'
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`Year`字段拖入`Revenue Growth`字段，将`Company`字段拖入**图例**区域。
- en: 'Gross margin: Compare gross margins for EV sales to understand cost efficiency
    and profitability'
  id: totrans-284
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 毛利率：比较电动汽车销售的毛利率，以了解成本效率和盈利能力
- en: '**Visualization type**: Bar chart'
  id: totrans-285
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：柱状图'
- en: '**Description**: Compare the gross margins of each company to identify which
    are more cost efficient and profitable'
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：比较每个公司的毛利率，以确定哪些公司更具成本效率和盈利能力'
- en: '`Company` field into the `Gross Margin` field into the **Values** area'
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`Company`字段拖入`Gross Margin`字段，将`Gross Margin`字段拖入**值**区域。
- en: 'R&D investment: Compare the R&D investments made by different automakers in
    the EV space'
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 研发投资：比较不同汽车制造商在电动汽车领域的研发投资
- en: '**Visualization type**: Stacked bar chart or line chart.'
  id: totrans-289
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：堆叠柱状图或折线图。'
- en: '**Description**: Show R&D investments made by different automakers. This can
    be shown for multiple years, if data is available.'
  id: totrans-290
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：展示不同汽车制造商的研发投资。如果有数据，可以展示多年数据。'
- en: '`Year` field into the `R&D Investment` field into the `Company` field into
    the **Legend** area.'
  id: totrans-291
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`Year`字段拖入`R&D Investment`字段，将`Company`字段拖入**图例**区域。
- en: 'Geographic revenue distribution:'
  id: totrans-292
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地理收入分布：
- en: '**Visualization Type**: A TreeMap to visualize revenue distribution for Tesla
    and a line chart to display the revenue trends'
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化类型**：一个 TreeMap 来可视化特斯拉的收入分布，以及一个折线图来显示收入趋势。'
- en: '**Description**: A TreeMap to visualize revenue distribution by country or
    region for Tesla and a line chart to display the revenue trends by country or
    region over time for Tesla'
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述**：一个 TreeMap 来可视化特斯拉按国家或地区的收入分布，以及一个折线图来显示特斯拉随时间变化的收入趋势。'
- en: 'The following are instructions for importing the data:'
  id: totrans-295
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下为导入数据的说明：
- en: Open Power BI Desktop and click on **Get Data** in the **Home** ribbon.
  id: totrans-296
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Power BI Desktop 并点击 **获取数据** 在 **主页** 标签上。
- en: From the dropdown menu, select **More** to open the window with all the available
    connectors.
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 **更多** 以打开包含所有可用连接器的窗口。
- en: Choose **CSV** (if your data is in CSV format) or the format of your file.
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **CSV**（如果您的数据是 CSV 格式）或您的文件格式。
- en: Navigate to your file, select it, and click **Open**.
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到您的文件，选择它，然后点击 **打开**。
- en: In the navigator window, you can preview your data. Click **Load** to load the
    data into Power BI.
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导航窗口中，您可以预览您的数据。点击 **加载** 将数据加载到 Power BI 中。
- en: 'The following are instructions for creating a TreeMap visualization:'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下为创建 TreeMap 可视化的说明：
- en: Click on the TreeMap icon in the **Visualizations** pane.
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **可视化** 面板中的 TreeMap 图标。
- en: Drag the `Country` or `Region` field into the **Group** area.
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `国家` 或 `地区` 字段拖动到 **分组** 区域。
- en: Drag the `Revenue` field into the **Values** area.
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `收入` 字段拖动到 **值** 区域。
- en: Power BI will automatically create a TreeMap where the size of the rectangles
    represents the revenue in each country or region.
  id: totrans-305
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Power BI 将自动创建一个 TreeMap，其中矩形的尺寸代表每个国家或地区的收入。
- en: 'Create the line chart visualization:'
  id: totrans-306
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建折线图可视化：
- en: Click on the line chart icon in the **Visualizations** pane.
  id: totrans-307
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **可视化** 面板中的折线图图标。
- en: Drag the `Date` or `Period` field into the **Axis** area.
  id: totrans-308
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `日期` 或 `期间` 字段拖动到 **轴** 区域。
- en: Drag the `Revenue` field into the **Values** area.
  id: totrans-309
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `收入` 字段拖动到 **值** 区域。
- en: From the `Country` or `Region` field, drag to the **Legend** field to create
    multiple lines, one for each country or region.
  id: totrans-310
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 `国家` 或 `地区` 字段，拖动到 **图例** 字段以创建多条线，每条线代表一个国家或地区。
- en: Power BI will create a line chart showing the revenue trends over time for each
    country or region.
  id: totrans-311
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Power BI 将为每个国家或地区创建一条折线图，显示随时间变化的收入趋势。
- en: Remember to format your visualizations according to your preference, such as
    changing colors, adding data labels, titles, and so on. You can access these formatting
    options by clicking on the paint roller icon in the **Visualizations** pane.
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请记住根据您的偏好格式化您的可视化，例如更改颜色、添加数据标签、标题等。您可以通过点击 **可视化** 面板中的油漆桶图标来访问这些格式化选项。
- en: Market competition visualizations–data extraction to Power BI visualization
  id: totrans-313
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H2
  type: TYPE_NORMAL
  zh: 市场竞争可视化–从数据提取到 Power BI 可视化
- en: Here are the steps to build the market competition visualizations stated in
    the previous section. We will take you through the process of extracting the data,
    saving it, and then extracting it to create each visualization.
  id: totrans-314
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是构建上一节所述市场竞争可视化的步骤。我们将带您通过提取数据、保存数据以及提取数据以创建每个可视化的过程。
- en: Keep in mind that due to the scattered nature of the required data and the fact
    that some of it resides on the official websites of automakers, it might be a
    challenging task to directly extract this data through a Python script or API,
    especially for performance indicators. Some websites might block scraping activities,
    and it’s crucial to respect each website’s policies regarding web scraping and
    data extraction.
  id: totrans-315
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请记住，由于所需数据的分散性以及其中一些数据位于汽车制造商的官方网站上，直接通过 Python 脚本或 API 提取这些数据可能是一项具有挑战性的任务，特别是对于性能指标。一些网站可能会阻止爬取活动，并且尊重每个网站关于网络爬取和数据提取的政策至关重要。
- en: 'Vehicle range and performance data:'
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 车辆续航和性能数据：
- en: Let’s use a hypothetical example of extracting electric vehicle data from a
    website such as Inside EVs, which contains the specifications of various electric
    vehicles. Please remember that this example is only for educational purposes,
    and you should always respect the website’s terms and conditions and data privacy
    regulations.
