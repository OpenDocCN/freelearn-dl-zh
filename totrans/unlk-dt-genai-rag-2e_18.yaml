- en: '15'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Semantic Caches
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Semantic caches represent an evolution of RAG concepts, forming a critical component
    in modern production-grade generative AI applications. They are particularly useful
    in agent-based RAG, to help offset the extra reasoning steps an agent typically
    takes. By leveraging vector search and intelligent query matching, semantic caches
    ensure users receive correct, consistent information while dramatically reducing
    latency and computational costs. This chapter explores how to build, optimize,
    and deploy semantic caches as an advanced control flow mechanism in your AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding semantic caches with the long-tail pattern
