- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: The Rise of AI Pair Programmers – Teaming Up with Intelligent Assistants for
    Better Code
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能配对程序员的崛起——与智能助手团队合作以编写更好的代码
- en: As **artificial intelligence** (**AI**) continues advancing, coding assistants
    have emerged as powerful tools to aid software developers. In this chapter, we
    will explore the capabilities of modern coding assistants and how they are transforming
    the process of writing computer programs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 随着**人工智能**（AI）的持续进步，代码助手已成为帮助软件开发者的强大工具。在本章中，我们将探讨现代代码助手的特性以及它们如何改变编写计算机程序的过程。
- en: Coding assistants can generate boilerplate code, explain code functionality
    in plain language, add comments and reformat existing code, debug errors, and
    optimize code performance. They can even translate code from one programming language
    to another.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 代码助手可以生成样板代码，用普通语言解释代码功能，添加注释和重新格式化现有代码，调试错误，以及优化代码性能。它们甚至可以将代码从一种编程语言翻译成另一种语言。
- en: With LLMs, these AI systems understand developer intents and generate relevant
    code snippets and documentation. We will look at case studies of using coding
    assistants to develop website code and Chrome extensions, showing how they speed
    up development cycles.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 使用大型语言模型（LLMs），这些人工智能系统理解开发者的意图，并生成相关的代码片段和文档。我们将研究使用代码助手开发网站代码和Chrome扩展的案例研究，展示它们如何加快开发周期。
- en: Rather than wholly replacing human coders, coding assistants aim to augment
    programmers’ abilities. Advancements in AI promise more autonomous systems that
    can write functioning code with minimal supervision. By collaborating with AI,
    developers may focus more on innovation and big-picture thinking while mundane
    coding tasks are automated. This human-AI symbiosis could enable programmers to
    be more productive and creative. The future possibilities are exciting as coding
    assistants evolve from basic autocompletion to AI pair programmers.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 代码助手的目标不是完全取代人类程序员，而是旨在增强程序员的技能。人工智能的进步承诺将带来更多自主的系统，这些系统可以在最少监督下编写功能代码。通过与人工智能合作，开发者可以更多地关注创新和宏观思考，而将日常编码任务自动化。这种人机共生可能使程序员更加高效和富有创造力。随着代码助手从基本的自动补全发展到人工智能配对程序员，未来的可能性令人兴奋。
- en: 'The topics we will cover in this chapter are as follows:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将涵盖以下主题：
- en: Code generation
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码生成
- en: Using AI to explain what some code does
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用人工智能解释某些代码的功能
- en: Commenting and reformatting code
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注释和代码格式化
- en: Debugging
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调试
- en: Code optimization with AI
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用人工智能进行代码优化
- en: Translating code from one language to another
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将代码从一种语言翻译成另一种语言
- en: Case study – developing a website code using AI
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例研究——使用人工智能开发网站代码
- en: Case study – creating a Chrome extension using AI
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例研究——使用人工智能创建Chrome扩展
- en: Code generation with coding assistants
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用代码助手进行代码生成
- en: Advanced coding assistants such as GPT-4 can now generate fully functional code
    blocks from high-level prompts. This automates the production of large segments
    of code, customized to developers’ needs. The AI models synthesize integrated,
    modular code much faster than human programmers. This code generation promises
    to significantly accelerate development cycles and increase programmer productivity.
    By automating code drafting, the AI enables developers to focus on more strategic
    tasks requiring human creativity.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 高级代码助手，如GPT-4，现在可以从高级提示中生成完全功能性的代码块。这自动化了代码的大量生产，并针对开发者的需求进行定制。人工智能模型比人类程序员更快地综合模块化代码。这种代码生成承诺将显著加速开发周期并提高程序员的生产力。通过自动化代码起草，人工智能使开发者能够专注于更多需要人类创造力的战略任务。
- en: 'Let’s see an example. You can use a template such as `Generate a boilerplate
    [language] code for a [class/module/component] named [name] with the following
    functionality: [functionality description].`, to generate some code.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个例子。你可以使用如下模板来生成一些代码：`为名为[name]的[语言]类/模块/组件生成以下功能的样板代码：[功能描述]。`
- en: 'Suppose you want to create a boilerplate Python code for a class named `Circle`:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想为名为`Circle`的类创建一个样板Python代码：
- en: 'Prompt:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Response:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Although this example is quite simple, it provides a good illustration of how
    to use LLMs to generate code.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个例子相当简单，但它很好地说明了如何使用大型语言模型（LLMs）来生成代码。
- en: 'Besides the preceding template, there are other templates that you could use
    to generate code, such as the following:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 除了前面的模板，还有其他模板可以用来生成代码，例如以下内容：
- en: '`Formulate a [language] function designed to execute [operation] on [data structure],
    utilizing these input parameters: [input variables], and projecting the anticipated
    outcome as: [``output description].`'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`设计一个[语言]函数，用于在[数据结构]上执行[操作]，利用以下输入参数：[输入变量]，并将预期的结果投影为：[输出描述]。`'
- en: '`Create a [language] category intended for an [application domain], incorporating
    functions for [methods list] and incorporating characteristics such as [``properties
    list].`'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建一个针对[应用领域]的[语言]类别，包含[方法列表]中的函数，并包含如[属性列表]等特性。`'
- en: '`Employing the [design pattern] as a guide, produce a code snippet in [language]
    to exhibit its application in a [use` `case] scenario.`'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`以[设计模式]为指导，用[语言]编写一个代码片段，以展示其在[用例]场景中的应用。`'
- en: '`Draft a [language] script to fulfill [task] by utilizing [library/framework],
    conforming to the subsequent specifications: [``requirements list].`'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`编写一个[语言]脚本，通过使用[库/框架]，满足[任务]，并符合以下规范：[要求列表]。`'
- en: 'Just as we’ve seen how AI can facilitate code generation, we’ll now turn our
    attention to another innovative application: using AI to decipher and explain
    what certain code does. This next section will dive into how AI can be a powerful
    tool in demystifying and interpreting complex code, transforming the way we engage
    with programming.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，人工智能如何促进代码生成，我们现在将注意力转向另一个创新应用：使用人工智能来解码和解释某些代码的功能。接下来的这一节将深入探讨人工智能如何成为解开和解释复杂代码的强大工具，改变我们与编程互动的方式。
- en: From confusion to clarity – AI explains what code does in plain English
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从困惑到清晰——人工智能用通俗易懂的语言解释代码的功能
- en: Making sense of complex code can be challenging. Luckily, AI is here to help.
    This technology can break down and clarify the purpose of various code snippets,
    saving time and reducing confusion. In this section, we’ll focus on this aspect
    of AI, discussing its role in enhancing efficiency and promoting skill development
    among programmers. This can help developers work more efficiently and learn new
    skills.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 理解复杂的代码可能具有挑战性。幸运的是，人工智能技术在这里提供帮助。这项技术可以分解并阐明各种代码片段的目的，节省时间并减少困惑。在本节中，我们将关注人工智能的这一方面，讨论其在提高程序员效率和发展技能方面的作用。这可以帮助开发者更高效地工作并学习新技能。
- en: We will use a code snippet in TypeScript to illustrate how to prompt an LLM
    to explain it.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用TypeScript代码片段来说明如何提示一个LLM来解释它。
- en: 'Prompt:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Here’s the response using Claude 2.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这是使用Claude 2的响应。
- en: 'Response:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'After exploring the realm of code explanation with the assistance of AI, it’s
    time to shift our focus toward other crucial aspects of programming: code commenting,
    formatting, and optimization. These are key to enhancing the readability and maintainability
    of code. Let’s delve into how AI can assist in these areas, making the life of
    a programmer easier and more efficient.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在借助人工智能探索代码解释领域之后，现在是时候将我们的注意力转向编程的其他关键方面：代码注释、格式化和优化。这些是提高代码可读性和可维护性的关键。让我们深入了解人工智能如何在这些领域提供帮助，使程序员的日常生活更加轻松高效。
- en: Commenting, formatting, and optimizing code
  id: totrans-39
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 注释、格式化和优化代码
- en: Writing robust, maintainable code involves more than just functionality. It
    requires careful organization, clear comments, consistent styling, and optimal
    performance. AI can provide valuable assistance with all of these aspects of high-quality
    code.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 编写健壮、可维护的代码不仅仅是功能性的问题。它需要仔细的组织、清晰的注释、一致的样式和最优的性能。人工智能可以在高质量代码的所有这些方面提供有价值的帮助。
- en: Powerful language models can analyze code and add descriptive comments to clarify
    the intent and logic, improving readability. The AI can also rename variables
    and methods with semantic, readable names.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 强大的语言模型可以分析代码并添加描述性注释，以阐明意图和逻辑，提高可读性。人工智能还可以使用语义和可读性强的名称重命名变量和方法。
- en: Additionally, AI can reformat code to conform to style guides and best practices.
    This enhances consistency and maintainability across large code bases.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，人工智能还可以重新格式化代码，使其符合风格指南和最佳实践。这增强了大型代码库的一致性和可维护性。
- en: The AI can even optimize code by refactoring inefficient logic, streamlining
    data structures, and improving algorithms. This automated optimization can provide
    huge performance gains and lower resource consumption.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能甚至可以通过重构低效的逻辑、简化数据结构和改进算法来优化代码。这种自动优化可以提供巨大的性能提升并降低资源消耗。
- en: Let’s look at an example prompt and response showing the AI’s capabilities to
    comment, reformat, and optimize code.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个示例提示和响应，展示人工智能在注释、重新格式化和优化代码方面的能力。
- en: 'Prompt:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Response:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 回复：
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This iterative approach avoids deep recursion stacks and redundant calculations,
    providing much faster performance for large inputs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这种迭代方法避免了深层递归栈和冗余计算，为大型输入提供了更快的性能。
- en: 'Now that we’ve understood how AI can assist in code commenting, formatting,
    and optimization, leading to more readable and maintainable code, let’s move on
    to another critical aspect of programming: debugging. Debugging is an integral
    part of the development process, and AI can offer significant help in this area.
    So, let’s delve into how AI can aid in identifying and resolving coding errors,
    and thus streamline the debugging process.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了AI如何帮助代码注释、格式化和优化，从而生成更易读和维护的代码，让我们继续探讨编程的另一个关键方面：调试。调试是开发过程中的一个重要组成部分，AI可以在这一领域提供重大帮助。因此，让我们深入了解AI如何帮助识别和解决编码错误，从而简化调试过程。
- en: Fixing faulty code – how AI transforms the debugging process
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 修复有缺陷的代码——AI如何改变调试过程
- en: AI can automate and simplify the debugging process – pinpointing bugs, explaining
    errors, and suggesting fixes.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以自动化并简化调试过程——定位错误、解释错误并提出修复建议。
- en: Imagine you’re working on a Node.js project that involves several modules. One
    of the modules is designed to handle user authentication. However, while testing,
    you notice that the application crashes whenever a new user tries to sign up.
    The error message indicates a type error, but due to the complexity of the code
    base, you’re having difficulty locating the source of this error.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正在处理一个涉及多个模块的Node.js项目。其中一个模块被设计用来处理用户认证。然而，在测试过程中，你注意到每当新用户尝试注册时，应用程序都会崩溃。错误消息表明是类型错误，但由于代码库的复杂性，你很难找到这个错误的源头。
- en: So, here’s how you can solve this issue with the help of AI prompting.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，以下是您如何借助AI提示解决这个问题的方法。
- en: 'Prompt:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE6]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Response:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 回复：
- en: '[PRE7]javascript'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE7]javascript'
- en: function signUp(username, password) {
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: function signUp(username, password) {
- en: const user = db.getUser(username);
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: const user = db.getUser(username);
- en: if (user) {
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: if (user) {
- en: return "Username already exists"; // Return message instead of throwing an error
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: return "用户名已存在"； // 返回消息而不是抛出错误
- en: '}'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: db.addUser({ username, password });
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: db.addUser({ username, password });
- en: return "User signed up successfully"; // Return a success message
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: return "用户注册成功"； // 返回成功消息
- en: '}'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: '[PRE8]javascript'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE8]javascript'
- en: console.log(auth.signUp("testuser", "testpassword")); // User signed up successfully
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: console.log(auth.signUp("testuser", "testpassword")); // 用户注册成功
- en: console.log(auth.signUp("testuser", "testpassword")); // Username already exists
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: console.log(auth.signUp("testuser", "testpassword")); // 用户名已存在
- en: '[PRE9]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The response explains the potential sources of bugs and suggests ways to solve
    them. The response identified a different error than the one produced while testing
    the code. The developer should make the suggested changes and test the code again,
    and if it continues to fail, feed the error-edited code back along with the error
    messages for more feedback. This is an iterative process until the bugs get fixed.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 该回复解释了错误可能的来源并提出了解决问题的方法。回复识别了一个与测试代码时产生的不同错误。开发者应该实施建议的更改并再次测试代码，如果它继续失败，则将错误编辑后的代码以及错误消息反馈以获取更多反馈。这是一个迭代过程，直到错误被修复。
- en: 'Next, let’s look at some templates that are useful when trying to write prompts
    for debugging code:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看一些在尝试编写调试代码提示时有用的模板：
- en: '`Find any bugs in the following [language]` `code snippet:`'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`在以下[language]` `代码片段中查找任何错误：`'
- en: '`Improve the following [language] code to prevent [``error type]:`'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`改进以下[language]代码以防止[``error type]：`'
- en: '`Check for memory leaks in the following [``language] code:`'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`在以下[``language]代码中检查内存泄漏：`'
- en: '`Prevent race conditions in the following [``language] code:`'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`防止以下[``language]代码中的竞态条件：`'
- en: '`Fix any security vulnerabilities in the following [``language] code:`'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`在以下[``language]代码中修复任何安全漏洞：`'
- en: 'After uncovering the usefulness of AI in code optimization, commenting, and
    formatting, let’s now turn our attention to another impressive application of
    AI: translating code from one programming language to another. This capability
    can truly be a game-changer, particularly in understanding unfamiliar code or
    migrating projects to newer languages. In our next section, we will unveil the
    magic of AI-enabled code translation.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在发现AI在代码优化、注释和格式化中的有用性之后，现在让我们将注意力转向AI的另一个令人印象深刻的用途：将代码从一种编程语言翻译成另一种编程语言。这种能力确实可以改变游戏规则，尤其是在理解不熟悉的代码或将项目迁移到新语言时。在我们下一节中，我们将揭示AI辅助代码翻译的神奇之处。
- en: Translating code from one language to another
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将代码从一种语言翻译成另一种语言
- en: In today’s world of diverse programming languages, developers often need to
    translate code from one language to another. This could be to leverage new platforms,
    utilize modern languages, or understand unfamiliar code.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今多样化的编程语言世界中，开发者经常需要将代码从一种语言翻译成另一种语言。这可能是为了利用新平台、使用现代语言或理解不熟悉的代码。
- en: Traditionally, this required deep expertise in multiple languages. But now,
    AI is automating code translation – converting code bases from one language to
    another with ease.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，这需要精通多种语言的深厚专业知识。但现在，人工智能正在自动化代码翻译，轻松地将代码库从一种语言转换到另一种语言。
- en: For example, a Python machine learning pipeline could be translated into production-ready
    Java code. The AI transforms the syntax and structure between languages while
    preserving functionality.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以将Python机器学习管道翻译成可用于生产的Java代码。人工智能在保持功能的同时，转换了两种语言之间的语法和结构。
- en: This code conversion leverages techniques such as parsing, optimization, and
    code generation. The AI analyzes the input code, extracts meaning and logic, and
    then regenerates equivalent output code.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这种代码转换利用了诸如解析、优化和代码生成等技术。人工智能分析输入代码，提取意义和逻辑，然后重新生成等效的输出代码。
- en: Though some manual review is still required, AI drastically reduces the time
    and effort of translating code. It empowers developers to switch languages and
    platforms faster for greater agility.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管仍需要一些手动审查，人工智能大大减少了翻译代码的时间和精力。它使开发者能够更快地切换语言和平台，从而提高灵活性。
- en: To demonstrate, here is a simple Python script to add two numbers that you want
    to translate to JavaScript.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示，这里有一个简单的Python脚本，用于添加两个您想要翻译成JavaScript的数字。
- en: 'Prompt:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE10]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Response:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE11]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The AI abstracts the code and then rewrites it between languages. This automates
    translating projects to modernize stacks and access new capabilities. With AI,
    the world of code is becoming multilingual.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能抽象化代码，然后在语言之间重新编写。这自动化了将项目转换为现代化堆栈和访问新功能的过程。有了人工智能，代码的世界正在变得多语言化。
- en: Until now, we have explored several uses of AI to generate, debug, comment,
    and optimize code snippets. With proper instructions (prompts), it’s possible
    to achieve even more, such as creating complete web applications or developing
    Chrome extensions, to name a couple. In the next sections, we will explore a couple
    of such use cases.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了人工智能在生成、调试、注释和优化代码片段方面的几种用途。通过适当的指令（提示），可以实现更多功能，例如创建完整的网络应用程序或开发Chrome扩展，仅举两例。在接下来的几节中，我们将探讨一些这样的用例。
- en: Case study 1 – developing a website code using AI
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究1 - 使用人工智能开发网站代码
- en: Website development is one of the most common use cases for AI coding assistants.
    In this section, we will walk through building a simple website from scratch with
    the help of generative AI.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 网站开发是人工智能编码助手最常见用例之一。在本节中，我们将通过生成式人工智能的帮助，从头开始构建一个简单的网站。
- en: For this example, we want to get the code to build a personal portfolio website.
    Thus, we will provide the LLM with all the specifications and details for the
    site. In this case, we will create a static site, to make things simple. You may
    begin the code with a basic skeleton, then seek the assistant’s help by asking,
    *How do I add a navbar with links to Home, About, Services, and Contact pages?*
    The assistant would then generate the HTML code for the requirement.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们希望获取构建个人作品集网站的代码。因此，我们将向LLM提供网站的所有规格和细节。在这种情况下，我们将创建一个静态网站，以简化事情。您可以从一个基本骨架开始编写代码，然后通过询问*我该如何添加一个包含链接到主页、关于、服务和联系页面的导航栏？*
    来寻求助手的帮助。然后，助手将生成满足要求的HTML代码。
- en: Once the structure is set, you might step into the CSS part of your portfolio.
    While defining the styles, you might inquire, *How do I style the navbar to have
    a background color of black and the text color to be white?* The LLM will then
    provide the code as per the request.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦结构设置好，您可能就会进入个人作品集的CSS部分。在定义样式时，您可能会询问，*我该如何设置导航栏，使其背景颜色为黑色，文字颜色为白色？* 然后，大型语言模型（LLM）将根据请求提供代码。
- en: Finally, let’s ask the AI for help with JavaScript.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们请求人工智能帮助处理JavaScript。
- en: With the LLM, mundane tasks such as setting up a server, deploying the website,
    or even debugging your code can be a relatively hassle-free process. It helps
    to stay ahead of errors and glitches by identifying potential roadblocks and providing
    valuable solutions.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LLM，设置服务器、部署网站或甚至调试代码等日常任务可以相对无烦恼。它通过识别潜在的障碍并提供有价值的解决方案，帮助避免错误和故障。
- en: Once you have a static version, you can prompt the LLM to get help to connect
    to a database and make the website more dynamic and not purely a hardcoded version
    of every piece of content.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦有了静态版本，你可以提示LLM获取帮助以连接到数据库，使网站更加动态，而不仅仅是纯硬编码的内容版本。
- en: 'Prompt:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE12]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Response:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE13]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The next step is to test this code. However, notice that the LLM (in this case,
    Bard) didn’t generate the CSS code to style the site. Therefore, let’s ask for
    that before testing.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是测试此代码。然而，请注意，LLM（在本例中为Bard）没有生成CSS代码来样式化网站。因此，在测试之前，让我们要求生成CSS代码。
- en: 'Prompt:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE14]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Response:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE15]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: In order to test this code, we will use CodePen. CodePen is an online code editor
    and development environment. It allows developers to write HTML, CSS, and JavaScript
    code directly in a web browser and see the results in real time.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试此代码，我们将使用CodePen。CodePen是一个在线代码编辑器和开发环境。它允许开发者直接在网页浏览器中编写HTML、CSS和JavaScript代码，并实时查看结果。
- en: In CodePen, we need to place the HTML, JavaScript, and CSS in the corresponding
    blocks. In the code generated by the AI, the JavaScript code is included inside
    the HTML, inside a `<``script>` element.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在CodePen中，我们需要将HTML、JavaScript和CSS放置在相应的块中。在AI生成的代码中，JavaScript代码包含在HTML中，位于`<script>`元素内。
- en: 'The following screenshot shows the organization of the code in each block and
    the resulting site:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 以下截图显示了每个代码块中的代码组织以及生成的网站：
- en: '![Figure 7.1: The code and the result in CodePen](img/B21161_07_01.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图7.1：CodePen中的代码和结果](img/B21161_07_01.jpg)'
- en: 'Figure 7.1: The code and the result in CodePen'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1：CodePen中的代码和结果
- en: As you can see, some of the text in the bullets doesn’t show up. The CSS for
    the `a` and `a:hover` elements has a color of white (`#FFF`), and because the
    background of the page is also white, we cannot see the text.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，项目符号中的一些文本没有显示出来。`a`和`a:hover`元素的CSS颜色为白色（`#FFF`），由于页面背景也是白色，所以我们看不到文本。
- en: You can ask the LLM to change the color of the font to another value. However,
    the change is so simple that you can do it yourself directly.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求LLM更改字体颜色为其他值。然而，这个更改非常简单，你可以直接自己完成。
- en: The resulting page can be seen at [https://codepen.io/gilbertmizrahi/pen/MWzMVRG](https://codepen.io/gilbertmizrahi/pen/MWzMVRG).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 结果页面可以在[https://codepen.io/gilbertmizrahi/pen/MWzMVRG](https://codepen.io/gilbertmizrahi/pen/MWzMVRG)查看。
- en: 'The site looks like this:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 网站看起来是这样的：
- en: '![Figure 7.2: The resulting web page in CodePen](img/B21161_07_02.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图7.2：CodePen中的结果网页](img/B21161_07_02.jpg)'
- en: 'Figure 7.2: The resulting web page in CodePen'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2：CodePen中的结果网页
- en: In the generated website code, the HTML contains `<img>` tags that point to
    local image files such as `"images/img1.jpg"` for displaying photos and screenshots.
    However, since this code was programmatically generated without actual image assets,
    these `<img> src` paths lead to non-existent files.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成的网站代码中，HTML包含指向本地图像文件的`<img>`标签，例如`"images/img1.jpg"`用于显示照片和截图。然而，由于此代码是程序生成的，没有实际的图像资源，这些`<img>
    src`路径指向不存在的文件。
- en: To fix this, the images need to be manually added to an images folder in the
    project directory structure. Then, the `<img>` source references in the HTML can
    be updated to match the real filenames – for example, replacing `"images/img1.jpg"`
    with the actual filename, such as `"images/photo1.jpg"`.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，需要手动将图像添加到项目目录结构中的images文件夹。然后，可以将HTML中的`<img>`源引用更新为匹配实际文件名——例如，将`"images/img1.jpg"`替换为实际文件名，如`"images/photo1.jpg"`。
- en: Without placing the referenced image files in the expected location, the `<img>`
    tags will result in broken images on the rendered website. Updating the `src`
    attributes to valid paths resolves this issue and allows the photos to display
    as originally intended.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有将引用的图像文件放置在预期位置，`<img>`标签将在渲染的网站上显示为损坏的图像。更新`src`属性到有效路径可以解决这个问题，并允许照片按原意显示。
- en: At the bottom of the site, we can see a contact form as requested in the prompt.
    The next step is to prompt the LLM to generate the code to save the form data
    to a backend database, Airtable, or Google Sheets. I will leave you that task
    as an exercise.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在网站底部，我们可以看到如提示中要求的一个联系表单。下一步是提示LLM生成代码以将表单数据保存到后端数据库，Airtable或Google Sheets。我将把这个任务留给你作为练习。
- en: We have just seen how an LLM can be leveraged to rapidly generate website code,
    saving developers significant time and effort. These intelligent tools are not
    limited to web development. They can be helpful for coding applications. Next,
    we will explore this by stepping through the creation of a Chrome extension with
    the help of AI.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚看到如何利用LLM快速生成网站代码，从而为开发者节省大量时间和精力。这些智能工具不仅限于Web开发。它们对于编码应用程序也有帮助。接下来，我们将通过逐步创建一个Chrome扩展来探索这一点，借助AI的帮助。
- en: Case study 2 – creating a Chrome extension using AI
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究2 – 使用AI创建Chrome扩展
- en: In this section, we will utilize ChatGPT to rapidly develop a custom Chrome
    extension. We will then direct it to build the core functionality such as content
    scripts, background scripts, and UI elements to create a simple but useful extension.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将利用ChatGPT快速开发一个自定义Chrome扩展。然后，我们将指导它构建核心功能，如内容脚本、背景脚本和UI元素，以创建一个简单但有用的扩展。
- en: For this example, we will make a simple Chrome extension that, when activated,
    will display a popup with an input field to display some text and a button. The
    button, when clicked, will highlight all instances of that text on the site on
    the selected tab.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将创建一个简单的Chrome扩展，当激活时，将显示一个包含输入字段以显示一些文本和按钮的弹出窗口。当点击按钮时，它将在所选标签页的网站上突出显示该文本的所有实例。
- en: Although you don’t need to know how to program, it’s useful to know that a Chrome
    extension needs a manifest and that it needs to be version 3\. This is important
    because we will be using the free ChatGPT, which uses GPT-3.5\. As you know, it
    doesn’t have access to the internet, and it has been trained with data up to 2021\.
    At that time, the manifest version 3 was in beta. Thus, by default, ChatGPT would
    create code based on version 2 of the manifest.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然您不需要知道如何编程，但了解Chrome扩展需要一个清单并且需要是版本3是有用的。这很重要，因为我们将会使用免费的ChatGPT，它使用GPT-3.5。如您所知，它无法访问互联网，并且它使用截至2021年的数据进行训练。当时，清单版本3处于测试阶段。因此，默认情况下，ChatGPT会基于清单的版本2创建代码。
- en: 'Prompt:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE16]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Response:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE17]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Since it didn’t provide any code for the `background.js` file, we need to ask
    ChatGPT why.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它没有为`background.js`文件提供任何代码，我们需要询问ChatGPT原因。
- en: 'Prompt:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE18]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Response:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE19]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We will delete the `default_icon` parameter to avoid having to create the icons
    for the extension. If you prefer, you can still make an image for the icons.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将删除`default_icon`参数，以避免创建扩展的图标。如果您愿意，您仍然可以为图标创建一个图像。
- en: Then, we need to ask ChatGPT for instructions on what to do next.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们需要向ChatGPT询问下一步该做什么。
- en: 'Prompt:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE20]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Response:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE21]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Following these steps, we get the following error in the Chrome **Extensions**
    tab:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤操作，我们在Chrome **扩展**标签页中得到了以下错误：
- en: '![Figure 7.3: Error message in the Chrome Extensions tab](img/B21161_07_03.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3：Chrome扩展标签页中的错误信息](img/B21161_07_03.jpg)'
- en: 'Figure 7.3: Error message in the Chrome Extensions tab'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3：Chrome扩展标签页中的错误信息
- en: 'Thus, using the error as a prompt, we get the following prompt:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，使用错误作为提示，我们得到以下提示：
- en: 'Prompt:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE22]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Here is the response:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是响应：
- en: 'Response:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE23]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The rest of the code (`popup.html`, `popup.js`, and `background.js`) remains
    the same. After updating the manifest, load your extension as described in the
    previous steps. The extension icon should now appear in the Chrome toolbar, and
    clicking it will open the popup where you can input text to highlight.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的代码（`popup.html`、`popup.js`和`background.js`）保持不变。更新清单后，按照前面的步骤加载您的扩展。现在，扩展图标应该出现在Chrome工具栏中，点击它将打开弹出窗口，您可以在其中输入文本以突出显示。
- en: The only thing that changed was that `browser-action` changed to `action` in
    the manifest. Now, when we try again, we can see that it works just fine.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一改变的是，在清单中`browser-action`变为了`action`。现在，当我们再次尝试时，我们可以看到它运行得很好。
- en: 'Now, we can test the Chrome Extension. If we test the extension on a CNN page
    to highlight `human`, we get the following:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以测试Chrome扩展。如果我们在一个CNN页面上测试扩展以突出显示`human`，我们会得到以下结果：
- en: '![Figure 7.4: The Chrome extension in action](img/B21161_07_04.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图7.4：Chrome扩展的实际应用](img/B21161_07_04.jpg)'
- en: 'Figure 7.4: The Chrome extension in action'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.4：Chrome扩展的实际应用
- en: Therefore, it’s working as expected. However, if you input a different text,
    it will keep the previous text highlighted along with the matches for the new
    text. This is something that you would like to fix. To do that, you need to prompt
    ChatGPT to remove the highlighted text before highlighting the new one.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它按预期工作。然而，如果你输入不同的文本，它将保留之前文本的高亮显示，以及新文本的匹配项。这是你想要解决的问题。为了做到这一点，你需要提示ChatGPT在突出显示新文本之前移除高亮文本。
- en: Another thing you might want to enhance is the styling of the content of the
    popup.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还想增强弹出内容中的内容样式。
- en: With the successful creation of a functioning Chrome extension, we have now
    completed our two hands-on case studies. And with that, we have reached the end
    of this chapter exploring the transformative impact of AI on software engineering.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功创建一个功能性的Chrome扩展之后，我们现在已经完成了我们的两个实战案例研究。因此，我们到达了探索人工智能对软件工程变革性影响的这一章节的结尾。
- en: Summary
  id: totrans-160
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored how AI is transforming software engineering by
    automating coding tasks. The case studies demonstrated the use of AI to rapidly
    build a website and Chrome extension.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们探讨了人工智能如何通过自动化编码任务来改变软件工程。案例研究展示了人工智能如何快速构建网站和Chrome扩展。
- en: In the next chapter, we’ll see how AI is revolutionizing another core area of
    technology – conversational interfaces.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将看到人工智能如何正在革命性地改变技术的另一个核心领域——对话式界面。
