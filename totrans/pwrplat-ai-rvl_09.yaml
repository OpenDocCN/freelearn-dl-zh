- en: '9'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Implementing an AI-Enabled Resume Screener
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: At some point, you may be responsible for hiring someone—or, at a minimum, reviewing
    a stack of resumes and trying to separate out the good candidates.
  prefs: []
  type: TYPE_NORMAL
- en: If you make a popular job posting, you could be faced with dozens, hundreds,
    or even thousands of resumes. How can you filter through those effectively?
  prefs: []
  type: TYPE_NORMAL
- en: Keyword matching might be one tactic you can employ. What about getting help
    from AI? Is there something an AI model might be able to do? Let’s find out!
  prefs: []
  type: TYPE_NORMAL
- en: Designing a solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This solution is going to build on some of the skills already learned in this
    book, including working with Power Automate flows and AI Builder capabilities.
    In this solution, you’ll be using AI to process candidate resumes, extract key
    information, and compare the candidates against a list of job descriptions to
    see if they’re qualified. Candidates that the AI model determines are qualified
    will be posted to a Teams channel.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following diagram represents the logical process behind the solution:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.1 – Reviewing the solution workflow](img/B21234_09_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.1 – Reviewing the solution workflow
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s break this down:'
  prefs: []
  type: TYPE_NORMAL
- en: Resume is received by a shared mailbox.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Power Automate retrieves the document and sends it to SharePoint.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SharePoint is used to maintain the status information of the applicant:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The resume document itself is stored in a SharePoint library.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: A reference to the candidate is stored as an item in a SharePoint list.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: AI Builder processes the resume and updates the SharePoint list with the extracted
    candidate information.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI Builder also evaluates the candidate against a job description stored in
    SharePoint.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The output of AI Builder determines how the flow proceeds:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the candidate is a potential match, a notification is sent to the Teams channel.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: If the candidate is not a match, a declination email is sent back to the candidate’s
    email address.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This solution uses AI in two ways:'
  prefs: []
  type: TYPE_NORMAL
- en: To extract **entity** information (such as a person’s name and email address)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To reason over the text to determine the meaning of the content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are a lot of moving pieces in this project, so let’s get going!
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using AI models and connectors in the Power Platform has several prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Dataverse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Builder capacity (or trial capacity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Apps or Power Automate premium licensing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Teams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A subscription that includes Exchange Online so that you can provision a shared
    mailbox
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Cloudmersive Free Tier account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring solution prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before you start the workflow configuration, you’ll need to set up a few prerequisites,
    such as Microsoft Teams, as well as a few SharePoint lists and a document library.
    Since all teams in Microsoft Teams include a SharePoint site, you can just leverage
    the SharePoint site component of that team—saving you (and your IT environment)
    from sprawl.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a shared mailbox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Creating a shared mailbox is a relatively straightforward task. This mailbox
    is going to be used by candidates submitting their resumes. To configure a shared
    mailbox, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the navigation menu, expand **Teams & groups** and select **Shared mailboxes**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add a** **shared mailbox**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a `resumes`. Confirm the entry for the **Email** address and click **Save
    changes**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After the mailbox has been created, select **Add members to your shared mailbox**,
    as shown in *Figure 9**.2*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.2 – Adding members to a shared mailbox](img/B21234_09_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.2 – Adding members to a shared mailbox
  prefs: []
  type: TYPE_NORMAL
- en: On the **Shared mailbox members** flyout, select **Add members**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select one or more users (such as yourself) and click **Add**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, you’ll create a team that will be used for storing resumes and candidates’
    information (since one of the components of a team is a SharePoint site), as well
    as notifying other people that a potential candidate has submitted their resume
    for a role.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a team
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Creating a team is similarly straightforward. You can create one from either
    Microsoft Teams or the Microsoft 365 admin center. Since we’re already in the
    Microsoft 365 admin center, we’ll just use that interface. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    expand **Teams & groups** and then select **Active teams &** **groups**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Active teams and groups** page, select **Add** **a team**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `Jobs and candidates`, and click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Owners** tab, add at least one owner (such as yourself) and click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Members** tab, optionally add extra team members. Click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `jobsandcandidates`). Select **Public** for the **Privacy level** and
    click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Validate the settings and click **Add team** to finish.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Close**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the team has provisioned, it’s time to move on to SharePoint.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring SharePoint Online
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As mentioned earlier, every Microsoft Teams team gets a SharePoint site. For
    this solution, we’ll be using some SharePoint lists and a document library.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: For more information on the components that make up a Microsoft Teams team object,
    see [https://www.undocumented-features.com/2021/07/05/a-deeper-dive-into-teams-architecture/](https://www.undocumented-features.com/2021/07/05/a-deeper-dive-into-teams-architecture/).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s step through the requirements for making sure SharePoint Online is correctly
    configured. The first step is to create a document library that will hold candidates’
    application documents.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning a SharePoint document library
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This solution requires a storage location to hold a candidate’s resume. While
    you can use the default document library, it tends to lead to more troubleshooting
    as the library’s display name (**Documents**) is different than its actual name
    (**Shared Documents**).
  prefs: []
  type: TYPE_NORMAL
- en: 'To create a new SharePoint document library, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the Microsoft 365 admin center ([https://admin.teams.microsoft.com](https://admin.teams.microsoft.com)),
    expand **Teams & groups** and select **Active teams &** **groups**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the team you created in the previous section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the flyout, click **View site** to navigate to the team’s connected SharePoint
    site. See *Figure 9**.3*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.3 – Navigating to the team’s connected SharePoint site](img/B21234_09_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.3 – Navigating to the team’s connected SharePoint site
  prefs: []
  type: TYPE_NORMAL
- en: Click **New** and then select **Document library**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Create new document library** page, select **Blank library**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter `Resumes` in the **Name** field and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: That’s it! Next, we’ll create some SharePoint lists.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning SharePoint lists
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this section, you’ll be creating two SharePoint lists—one that lists role
    names and descriptions, and one that is used to store candidate information. Follow
    these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Jobs and candidates** SharePoint site home page.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New** and then select **List**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Create a list** page, select **Blank list**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a `Roles`, and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Roles** list, click **Add column**. Select **Multiple lines of text**
    as the type and click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Job descriptions` and click **Save**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Home** to navigate back to the home page for the site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New** and then select **List**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Create a list** page, select **Blank list**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a `Candidates`, and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Repeat the process of adding a column to the **Candidates** list using the
    column names and types in *Table 9.1*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Column name** | **Column type** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| --- | --- |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **First name** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Last name** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Phone number** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Email** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Current company** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Current role** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Candidate summary** | **Multiple lines** **of text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Resume link** | **Text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **AI-screened** | **Yes/No**; default value **No** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Service** **Desk Technician** | **Choice**: **Yes**/**No**/**Maybe** (You
    can also use **Text** as the column type) |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: '| **Reason** | **Multiple lines** **of text** |'
  prefs:
  - PREF_IND
  type: TYPE_TB
- en: Table 9.1 – SharePoint list column information
  prefs: []
  type: TYPE_NORMAL
- en: Neat trick
  prefs: []
  type: TYPE_NORMAL
- en: 'Later on, we’re going to create a flow to populate the **Resume link** column
    with the URL of the file. If you want to make it clickable, you can customize
    the field formatting. Select the **Resume link** column, point to **Column settings**,
    and click **Format this column**. Paste the following JSON into the textbox and
    click **Save**:'
  prefs: []
  type: TYPE_NORMAL
- en: '`{ "$schema": "https://developer.microsoft.com/json-schemas/sp/v2/column-formatting.schema.json",
    "elmType": "a", "txtContent": "@currentField", "attributes": { "target": "_blank",
    "href": "=@currentField" } }`'
  prefs: []
  type: TYPE_NORMAL
- en: Configuring job descriptions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the goals of this resume screening solution is to be able to determine
    if a candidate is a good fit for a role. In order to do that, you need to define
    the role information. There are many ways to import the job description data;
    in this example, we’re going to use the **Roles** SharePoint list that we created
    earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Finding good sample job descriptions
  prefs: []
  type: TYPE_NORMAL
- en: In order for the AI model to determine if a resume matches a job, you’ll need
    good job descriptions (preferably ones that you can also find corresponding resumes
    for). You can use a site such as [https://resources.workable.com/job-descriptions/](https://resources.workable.com/job-descriptions/)
    to retrieve sample job descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'To add job descriptions, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Roles** SharePoint list you created earlier in the **Jobs
    and** **candidates** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter the role or job title in the **Title** field.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a job description in the **Job Description** text area field.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat the process, adding several job titles and descriptions. In this chapter,
    we’re just going to focus on matching a single job description (such as an IT
    service desk technician).
  prefs: []
  type: TYPE_NORMAL
- en: Online content
  prefs: []
  type: TYPE_NORMAL
- en: 'You can download sample resumes from this book’s GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution)'
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the AI model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To this point, you’ve used a few different kinds of AI technologies:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompts, such as the AI Builder **generative AI** (**GenAI**) prompting or Open
    AI’s ChatGPT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copilot for Power Platform
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pre-built AI Builder models such as the sentiment analysis model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In each of these examples, you’ve supplied the content you want to be analyzed
    or processed at runtime (that is, in the context of the flow or app). In this
    solution, however, you’re going to use an AI model that requires training.
  prefs: []
  type: TYPE_NORMAL
- en: Training, in this context, means showing the model a sample dataset and then
    highlighting what data is important and how to map the recognized data to fields.
    Since we’re building a resume screener, the training data should be representative
    of resumes you might expect to process. You can obtain samples from searching
    sources such as LinkedIn or the internet. You could ask co-workers, family, or
    friends for resumes as well. The model will do best by seeing lots of different
    kinds of samples.
  prefs: []
  type: TYPE_NORMAL
- en: Finding good sample data
  prefs: []
  type: TYPE_NORMAL
- en: The reason you need several examples is so that you can train the AI model on
    how to identify certain fields. Key item or entity extraction works best when
    the AI model has learned what kinds of data are associated with certain fields.
    For example, if a human sees *123 Main Street, Chicago, IL*, they’re easily able
    to determine that it’s an address. An AI model, unless trained otherwise, just
    sees numbers and letters. To help bolster your training data, you can download
    example resumes from a site such as [https://www.beamjobs.com/resumes](https://www.beamjobs.com/resumes).
    Be sure to seek out resume templates that include the types of roles and job descriptions
    you added to the **Roles** list earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Training an AI model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To train the AI model, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the navigation menu, select **AI hub**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select **AI models**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.4 – Exploring the AI hub](img/B21234_09_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.4 – Exploring the AI hub
  prefs: []
  type: TYPE_NORMAL
- en: 'From the top navigation bar, select **Documents** and then choose the **Extract
    custom information from documents** custom model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.5 – Selecting the custom model](img/B21234_09_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.5 – Selecting the custom model
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Extract custom information from documents** page, select **Create
    custom model**, as shown in *Figure 9**.6*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.6 – Creating a custom model](img/B21234_09_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.6 – Creating a custom model
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Choose document type** page, select **Unstructured documents**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.7 – Selecting Unstructured documents](img/B21234_09_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.7 – Selecting Unstructured documents
  prefs: []
  type: TYPE_NORMAL
- en: Click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Choose information to extract** page, click **Add** and select **Text**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.8 – Choosing information to extract](img/B21234_09_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.8 – Choosing information to extract
  prefs: []
  type: TYPE_NORMAL
- en: In the **Text field** flyout, enter **First name** for the field. Click **Done**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add additional text fields for **Last name**, **Email**, **Phone number**, **Current
    role**, and **Current company**. Click **Next** when finished.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Add collections of documents** page, click **New collection**, as
    shown in *Figure 9**.9*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.9 – Adding a collection of documents](img/B21234_09_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.9 – Adding a collection of documents
  prefs: []
  type: TYPE_NORMAL
- en: Click the **+** sign to add documents to the collection.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Collection 1** flyout, click **Add documents**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.10 – Adding documents to the collection](img/B21234_09_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.10 – Adding documents to the collection
  prefs: []
  type: TYPE_NORMAL
- en: Select the location where your sample data is stored.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Choose documents to include in the collection and click **Add**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.11 – Selecting documents for the collection](img/B21234_09_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.11 – Selecting documents for the collection
  prefs: []
  type: TYPE_NORMAL
- en: On the **Upload documents** page, click **Upload documents**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Done** after the upload has completed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For each document in the collection, select text in the document that corresponds
    to one of the **Text** fields (**First name**, **Last name**, **Email**, **Phone
    number**, **Current role**, **Current company**). After selecting the text for
    a field, choose the appropriate field to map this item to. See *Figure 9**.12*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.12 – Tagging fields](img/B21234_09_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.12 – Tagging fields
  prefs: []
  type: TYPE_NORMAL
- en: 'After you’ve tagged all the fields for the selected document, use the navigation
    arrows in the collection pane to move to the next document in the collection.
    Repeat the selection and tagging process for each document. After tagging each
    field in a document, the document thumbnail will be updated with a checkmark indicating
    completion. If a sample document does not have a field present, select the ellipsis
    next to the field and choose **Not available in document**. See *Figure 9**.13*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.13 – Viewing a fully tagged document](img/B21234_09_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.13 – Viewing a fully tagged document
  prefs: []
  type: TYPE_NORMAL
- en: When all documents have been tagged, click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Model summary** page, click **Train**. The model training may take
    anywhere from a few minutes to a few hours. Click **Go to models** after the training
    job has been submitted.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'You can review the status on the **AI models** > **My models** page, as shown
    in *Figure 9**.14*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.14 – Viewing the model training](img/B21234_09_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.14 – Viewing the model training
  prefs: []
  type: TYPE_NORMAL
- en: If desired, you can modify the `Resume identification`. If your environment
    has multiple AI models trained, this will help you easily identify it.
  prefs: []
  type: TYPE_NORMAL
- en: Testing the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After the model has completed training, you should test it to make sure it returns
    the desired results.
  prefs: []
  type: TYPE_NORMAL
- en: 'To test a model, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the **AI hub** setting, open the model by clicking on its name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Training document**, select **Quick test**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.15 – Running a quick test](img/B21234_09_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.15 – Running a quick test
  prefs: []
  type: TYPE_NORMAL
- en: On the **Quick test** page, click **Upload from my device** and browse to a
    sample resume document (preferably one that you didn’t use for training).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If it doesn’t recognize certain fields or you discover that it’s mapping data
    to the wrong fields, you may need to update the model by adding more reference
    documents to the collection and rerunning the training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Publishing the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After you are satisfied with the model’s data recognition, you need to make
    it available to the Power Platform by **publishing** it. To publish a model, click
    on a trained model and then select **Publish**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.16 – Publishing the model](img/B21234_09_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.16 – Publishing the model
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s go sign up for a connector to make some of the text manipulation
    a bit easier.
  prefs: []
  type: TYPE_NORMAL
- en: Enabling the Cloudmersive connector
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some AI Builder actions require you to specify a document-type parameter or
    only take input in the form of text. Since end users may email in a variety of
    document types (such as Word documents or PDFs), you’ll need to be able to format
    data accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: While you could do some of this with some condition controls and compose statements,
    why not use tools to make your job easier? Cloudmersive’s connector makes converting
    content a snap! And, with 800 free API calls per month forever, it’s a pretty
    good deal, too.
  prefs: []
  type: TYPE_NORMAL
- en: 'To sign up, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to [https://portal.cloudmersive.com/signup](https://portal.cloudmersive.com/signup).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fill out the form and click **Sign** **Up Now**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Select Plan** page, choose **Free Tier**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Select your role to finish account setup** page, select a role that
    represents your job type.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Which API do you wish to start with?** page, select **Document and
    Data** **Conversion API**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Which programming language do you wish to use?** page, select **Microsoft
    Flow /** **Power Automate**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **API Keys** page, click **Create Key**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Copy the value in the **API Key** area under **Free Tier Keys** to a location
    that you can easily access later. The API key is a 36-character code consisting
    of the letters a through f and numerals 0-9.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, it’s time to start working with the automation!
  prefs: []
  type: TYPE_NORMAL
- en: Creating a flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With all of the prerequisites out of the way, it’s time to start working with
    some automation! This flow will be broken into several sections to help you conceptualize
    the actions.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the trigger and variables
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the *Designing a solution* section, we identified a shared mailbox as the
    way resume content will be ingested. In the real world, that might only be one
    way you choose to receive resumes. You might also have a website where candidates
    can upload their resumes or even a third-party job posting service that you may
    configure to store or forward resumes. In any case, the processes will be very
    similar. The triggers will depend on what access, polling, or notification methods
    you have available to you.
  prefs: []
  type: TYPE_NORMAL
- en: For simplicity’s sake, this example will use a shared mailbox.
  prefs: []
  type: TYPE_NORMAL
- en: 'This flow will make use of **variables**—essentially, placeholders that can
    be used to hold temporary content or values in memory throughout the flow. There
    will be four variables constructed:'
  prefs: []
  type: TYPE_NORMAL
- en: '`RoleFitJson`: Used to store the JSON output of the AI Builder action evaluating
    the candidate’s resume.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`RoleFit`: One-word answer for whether the candidate is a good fit. The example
    flow will output one of three potential values—**Yes**, **Maybe**, and **No**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`RoleFitSummary`: Brief description or reasoning behind AI Builder’s evaluation.
    This helps your organization map to Microsoft’s Responsible AI principle of transparency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`CandidateSummary`: Brief summary of the candidate’s resume.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Throughout the flow, we’ll update these with the values generated by our various
    AI solutions.
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: 'To configure the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com))
    and select **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Start from blank**, select **Automated** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `Process resumes`) and select the **When a new email arrives in a shared
    mailbox (v2)** trigger. Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **When a new email arrives in a shared mailbox (V2)** trigger. In
    the flyout, enter the email address of the shared mailbox you created in the prerequisites
    as a **custom value**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Advanced parameters**, select the **Only With Attachments** and **Include
    Attachments** parameters. For both parameters, select **Yes**. See *Figure 9**.17*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.17 – Configuring the trigger](img/B21234_09_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.17 – Configuring the trigger
  prefs: []
  type: TYPE_NORMAL
- en: Click **Add an action** and select the **Initialize variable** variable action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Update the `- RoleFitJson` to the action name. In the `RoleFitJson` and select
    the **Type** value of **String**. See *Figure 9**.18*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.18 – Adding an Initialize variable action](img/B21234_09_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.18 – Adding an Initialize variable action
  prefs: []
  type: TYPE_NORMAL
- en: Click **Add an action** and select the **Initialize variable** variable action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the `- RoleFit` to the action name. In the `RoleFit` and select the **Type**
    value of **String**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add an action** and select the **Initialize variable** variable action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the `- RoleFitSummary` to the action name. In the `RoleFitSummary` and
    select the **Type** value of **String**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add an action** and select the **Initialize variable** variable action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the `- CandidateSummary` to the action name. In the `CandidateSummary`
    and select the **Type** value of **String**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, we’ll work on saving the attachment and adding a SharePoint list item for
    the candidate.
  prefs: []
  type: TYPE_NORMAL
- en: Processing the attachment and candidate record
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll configure the steps necessary to save the attachment
    and then add a SharePoint list item for candidates who send in their resumes.
    Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: After the **Initialize variable CandidateSummary** action, add the **Create
    file** SharePoint action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the `– Add resume to SharePoint library` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, choose the **Jobs and candidates** SharePoint site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Folder Path**, select the **Resumes** document library.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **File Name** field, add an expression. Add the following expression:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`concat(utcNow(''yyyyMMddHHmmss''),''_'',triggerOutputs()?[''body/from''],''_'',item()?[''name''])`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This will construct a new name for the file according to the current date (Year-Month-Day-Hours-Minutes-Seconds),
    the sender’s email address, and the original attachment name, each separated by
    an underscore character. For example, a filename of `20240326140005_sender@domain.com_MyResume.pdf`
    would indicate a file received on March 26, 2024, at 14:00:05 hours from `sender@domain.com`
    with the original filename of `MyResume.pdf`. While it’s not wholly necessary,
    it does help track individual resume files to make sure they’re individually identifiable
    easily.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In the **File Content** field, add the **Attachments Content** dynamic token
    under the **When a new email arrives in a shared mailbox (V2)** action. See *Figure
    9**.19*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.19 – Adding the SharePoint Create file action](img/B21234_09_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.19 – Adding the SharePoint Create file action
  prefs: []
  type: TYPE_NORMAL
- en: Add the `– Get properties of uploaded file` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under `https://<tenant>.sharepoint.com/sites/jobsandcandidates`, as shown in
    *Figure 9**.20*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.20 – Selecting the SharePoint site associated with the team](img/B21234_09_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.20 – Selecting the SharePoint site associated with the team
  prefs: []
  type: TYPE_NORMAL
- en: Under **Library Name**, select the **Resumes** document library.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Id**, choose the **Id** or **ItemId** dynamic content token from the
    **Create file Add resume to SharePoint library** action. It also may be displayed
    as the **body/ItemId** token (depending on it you’re using the **New designer**
    or **Classic designer** view), as depicted in *Figure 9**.21*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.21 – Adding the ItemId dynamic content token](img/B21234_09_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.21 – Adding the ItemId dynamic content token
  prefs: []
  type: TYPE_NORMAL
- en: Next, add the `– Import resume data` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the SharePoint site associated with the **Jobs
    and candidates** team. This should be the same site you chose for *step* *8* previously.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **File Path**, add the **body/Path** dynamic content token under the
    **Create file Add resume to SharePoint library** action. See *Figure 9**.22*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.22 – Adding the body/Path dynamic content token](img/B21234_09_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.22 – Adding the body/Path dynamic content token
  prefs: []
  type: TYPE_NORMAL
- en: After the `– Candidate list entry` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All right! Time to click **Save** to preserve your progress! Next, we’ll introduce
    a new AI Builder action using the model that you trained earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Extracting information from a resume and updating a candidate record
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This next process will leverage the document extraction model. Since the model
    is already trained, there’s nothing you really need to do other than send the
    document to the model. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'After the **Create item Candidate list entry** action, add the **Extract information
    from documents** AI Builder action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.23 – Adding an AI Builder action](img/B21234_09_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.23 – Adding an AI Builder action
  prefs: []
  type: TYPE_NORMAL
- en: Append `– Extract candidate information from resume` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **AI Model**, select the **Resume identification** model that you trained.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Form Type**, select **PDF**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Form**, select the **File Content** dynamic content token under the
    **Get file content using path Import resume** **data** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.24 – Configuring the Extract information from documents action](img/B21234_09_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.24 – Configuring the Extract information from documents action
  prefs: []
  type: TYPE_NORMAL
- en: Add an `– Update candidate personal data` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the SharePoint site associated with the **Jobs
    and** **candidates** team.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List Name**, select the **Candidates** list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Id**, select the **ID** dynamic content token under the **Create item
    - Candidate list entry** SharePoint action. See *Figure 9**.25*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.25 – Selecting the ID associated with the candidate entry](img/B21234_09_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.25 – Selecting the ID associated with the candidate entry
  prefs: []
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, click **Show all**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **First Name**, **Last Name**, **Phone Number**, **Email**, **Current
    Role**, and **Current Company** fields, add the corresponding dynamic content
    token under the **Extract data from documents - Extract candidate information**
    from resume action, as shown in *Figure 9**.26*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.26 – Mapping dynamic content tokens to fields](img/B21234_09_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.26 – Mapping dynamic content tokens to fields
  prefs: []
  type: TYPE_NORMAL
- en: You can use either the *<Field name> value* or *text* dynamic content tokens.
    For consistency’s sake, use the same token type for all of the fields.
  prefs: []
  type: TYPE_NORMAL
- en: In the **Resume Link** field, add the **Link to item** dynamic content token
    under the **Get file properties Get properties of uploaded** **file** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It’s time to click **Save** again! Up to this point, you’ve processed a resume
    to the point where you’ve extracted key details from the document and inserted
    them into the candidate record. Next, you’ll evaluate the resume against the job
    description.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating the resume with a prompt
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll configure actions to import one of the job descriptions
    and send the text of both the job description and the resume to a GenAI prompt.
    Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: After the `– Import job descriptions` to the description of the action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the **Jobs and** **candidates** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List Name**, select **Roles**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, in the dropdown, select **Filter Query**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `Title eq ''Service` `Desk Technician''`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.27 – Editing the filter query](img/B21234_09_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.27 – Editing the filter query
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the filter query is used to select the list row containing
    the job description for the *service desk technician*. Change the text between
    the single quotes to match the role description you’re testing for.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add the **Convert PDF Document to Text (txt)** Cloudmersive action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.28 – Adding the Cloudmersive PDF document conversion action](img/B21234_09_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.28 – Adding the Cloudmersive PDF document conversion action
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Create Connection** flyout, specify a **Connection Name** value and
    then enter the **API Key** value you obtained when you set up in the *Enabling
    the Cloudmersive connector* section. Click **Create new** when finished. See *Figure
    9**.29*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.29 – Configuring a connection](img/B21234_09_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.29 – Configuring a connection
  prefs: []
  type: TYPE_NORMAL
- en: In the **Input File To Perform The Operation On** field, add the **File Content**
    dynamic content token under the **Get file content using path Import resume**
    **data** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Input File to Perform the Operation On (File Name)** field, add the
    **File name with extension** dynamic content token under **the Get file properties
    Get properties of uploaded** **file** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This will result in the resume PDF file being converted to text for processing
    with the GenAI prompt.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Add a `– Evaluate candidate against job descript` to the description of the
    action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Prompt**, select **New** **custom prompt**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.30 – Configuring the AI Builder GPT prompt](img/B21234_09_30.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.30 – Configuring the AI Builder GPT prompt
  prefs: []
  type: TYPE_NORMAL
- en: 'In the prompt area, paste the following text:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Add a `Role match based on resume and` `job description`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Replace the highlighted words, denoted by asterisks (`*CandidateResume*, *RoleTitle*,
    and *RoleDescription*`), with dynamic values. You can type a forward slash (`/`)
    character or use the **Add dynamic value** button to insert a dynamic content
    token. See *Figure 9**.31* for an example of a completed prompt:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.31 – Editing the prompt](img/B21234_09_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.31 – Editing the prompt
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save** **custom prompt**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **InputRoleTitle** field, select the **Title** dynamic content token
    under the **Get items Import job** **descriptions** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Input CandidateResume** field, add the **body/TextResult** dynamic
    content token under the **Convert PDF Document to Text (****txt)** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.32 – Adding the Cloudmersive Convert PDF Document to Text (txt)
    action](img/B21234_09_32.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.32 – Adding the Cloudmersive Convert PDF Document to Text (txt) action
  prefs: []
  type: TYPE_NORMAL
- en: In the **Input RoleDescription** field, add the **JobDescription** dynamic content
    token under the **Get items Import job** **descriptions** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You’ve only got a few sections left! Next, we’ll update some variables that
    we can use for updating the candidate’s record in the SharePoint list and generating
    messages to post to Teams or send via email.
  prefs: []
  type: TYPE_NORMAL
- en: Updating the candidate record
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll take the generated data elements from the GPT action
    and add them back to the candidate record. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: After the `– RoleFitJson` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Name** field, select **RoleFitJson**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Value** field, select the **Text** dynamic content token under the
    **Create text with GPT using a prompt Evaluate candidate against job** **description**
    action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This dynamic content token contains the JSON structure we specified in the
    prompt:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 9.33 – Adding the text output of the GPT prompt](img/B21234_09_33.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.33 – Adding the text output of the GPT prompt
  prefs: []
  type: TYPE_NORMAL
- en: Add a `– Extract generated RoleFit data` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Content** field, add the **RoleFitJson** variable dynamic content token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Schema** area, paste the following definition:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This schema is used to define the structure of the JSON array. Notice the name/value
    pair definitions along with their content type. The `– RoleFit` to the action
    name.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In the **Name** field, select the **RoleFit** variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Value** field, add the **Body RoleFit** dynamic content token under
    the **Parse JSON Extract generated RoleFit** **data** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.34 – Selecting the RoleFit content](img/B21234_09_34.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.34 – Selecting the RoleFit content
  prefs: []
  type: TYPE_NORMAL
- en: Add a `– RoleFitSummary` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Name** field, select the **RoleFitSummary** variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Value** field, add the **Body RoleFitSummary** dynamic content token
    under the **Parse JSON Extract generated RoleFit** **data** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add a `– CandidateSummary` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Name** field, select the **CandidateSummary** variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Value** field, add the **Body CandidateSummary** dynamic content token
    under the **Parse JSON Extract generated RoleFit** **data** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add an `– Update Candidate Status` to the action name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the SharePoint site containing the candidate
    resumes and list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List Name**, select **Candidates**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Id** field, add the **ID** dynamic content token under the **Create
    item Candidate list** **entry** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.35 – Configuring the Update item action – Update Candidate Status](img/B21234_09_35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.35 – Configuring the Update item action – Update Candidate Status
  prefs: []
  type: TYPE_NORMAL
- en: Under **Advanced Parameters**, click **Show all**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Candidate Summary** field, add the **CandidateSummary** variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Service Desk Technician** field, add the **RoleFit** variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Reason** field, add the **RoleFitSummary** variable. See *Figure 9**.36*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.36 – Adding the output variables](img/B21234_09_36.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.36 – Adding the output variables
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save** to save the progress on the flow. In the final section, we’ll
    add some notifications.
  prefs: []
  type: TYPE_NORMAL
- en: Sending confirmation messages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After updating the candidate’s **RoleFit** status as either **Yes**, **No**,
    or **Maybe**, it’s time to send some notifications! Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: After the **Update item** action (where you updated the candidate’s status),
    click **Add an action** and select the **Condition** control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Change the expression evaluation from **AND** to **OR**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the first box, add the dynamic content token for the `Yes`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New item** and then select **Add row**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the first box of the new row, add the dynamic content token for the `Maybe`.
    See *Figure 9**.37*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.37 – Adding a Condition control for RoleFit](img/B21234_09_37.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.37 – Adding a Condition control for RoleFit
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **True** branch of the **Condition** control, add the **Post message
    in a chat or channel** Teams action, as shown in *Figure 9**.38*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.38 – Adding the Teams post message action](img/B21234_09_38.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.38 – Adding the Teams post message action
  prefs: []
  type: TYPE_NORMAL
- en: Under **Post As**, select **Flow bot**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Post In**, select **Channel**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Team**, select the **Jobs and** **candidates** team.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Channel**, select **General**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Customize the message area using tokens, such as *Candidate Summary*, *Role
    Fit*, and a link to the resume:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.39 – Creating a Teams channel notification](img/B21234_09_39.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.39 – Creating a Teams channel notification
  prefs: []
  type: TYPE_NORMAL
- en: In the **False** condition branch, add the **Send an email from a shared mailbox
    (V2)** Office 365 Outlook action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Original Mailbox Address** field, select **Enter custom value** and
    then add the email address of the shared mailbox configured earlier in this chapter.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **To** field, add the **Email value** dynamic content token from the
    **Extract information from documents Extract candidate information from resume**
    AI Builder action. This will select the email address specified in the resume.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Subject** field, enter a message.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Body** text area, enter a message to send back to a candidate, using
    any of the dynamic content tokens that you find appropriate for the message (such
    as the **First name value** token from the **Extract …** AI Builder action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.40 – Customizing the email message](img/B21234_09_40.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.40 – Customizing the email message
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now for the moment of truth!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To test the flow, you’ll need a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: A few sample resumes (one that should match the job description and one that
    shouldn’t)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An email account to send the resumes from
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To test the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: From the flow designer, click **Test**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Manually** radio button and then click **Test**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Launch your email client and send an email with a sample resume to the shared
    mailbox configured.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the flow run history as it is updated in the flow designer:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.41 – Reviewing the flow run history](img/B21234_09_41.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.41 – Reviewing the flow run history
  prefs: []
  type: TYPE_NORMAL
- en: 'Launch Microsoft Teams and navigate to the **Jobs and candidates** team. Check
    the channel you specified in the **Post message** action to see how the resume
    was evaluated:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.42 – Reviewing the Teams channel post](img/B21234_09_42.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.42 – Reviewing the Teams channel post
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, navigate to the **Jobs and candidates** SharePoint site and select the
    **Candidates** list to see your resume submissions:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 9.43 – Reviewing resume submissions](img/B21234_09_43.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.43 – Reviewing resume submissions
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You’ve successfully verified the flow!
  prefs: []
  type: TYPE_NORMAL
- en: If the flow mis-categorizes resumes, you can easily go back and adjust the prompt
    to raise or lower the confidence requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The foundation that this flow lays opens up a lot of possibilities for workflow
    automation. Possibilities include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Branching to allow checking against other role descriptions in the same flow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conditions to filter the subject of the message to route to other flows
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Document validation using a Cloudmersive action to ensure the submitted resumes
    can be read
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conditions to reject attachments that are not PDFs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interview scheduling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this chapter, we introduced two powerful AI Builder concepts: data extraction
    modeling and using GenAI to summarize and evaluate content.'
  prefs: []
  type: TYPE_NORMAL
- en: With the skills gained in this chapter, you can adapt GenAI to a myriad of business
    challenges.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll build on the GenAI text summarization capabilities
    from this chapter to craft executive summaries of documents.
  prefs: []
  type: TYPE_NORMAL
