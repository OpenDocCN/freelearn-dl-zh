- en: 'Emerging Topics: Generative AI and AI Agents'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In *Part 4* of this book, we will explore the new frontier of AI technologies
    that are transforming enterprises. We will begin by explaining generative AI and
    **large language models** ( **LLMs** ) in business-friendly terms, covering key
    use cases across various functions, from marketing and customer service to code
    generation, as well as practical adoption considerations. Following this, we will
    define LLMOps and detail how it extends traditional MLOps to handle the unique
    operational life cycle of LLMs, including prompt orchestration, fine-tuning, and
    specialized monitoring. Finally, we will explore the emerging world of AI agents,
    discussing what they are, their potential to automate complex multi-step tasks,
    and the frameworks for building and governing these autonomous systems safely.
  prefs: []
  type: TYPE_NORMAL
