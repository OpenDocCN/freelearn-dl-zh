- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Using AI to Tag Images in a SharePoint Library
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 SharePoint 库中使用 AI 标记图像
- en: Imagine a scenario where you have field workers, contractors, employees, or
    other people taking pictures with an app and uploading them to a SharePoint site.
    It could be for any reason—workers could be capturing inventory at an auction,
    surveying a facility, documenting work procedures, or taking pictures at a company
    picnic.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个场景，你有一些现场工作人员、承包商、员工或其他人在使用一个应用程序拍照并将照片上传到 SharePoint 网站上。这可能出于任何原因——工作人员可能是在拍卖会上捕捉库存、调查设施、记录工作流程或在公司野餐会上拍照。
- en: Once you have data at scale coming into your environment, it becomes increasingly
    difficult to categorize and tag it. Why not let AI take the first crack at it?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦大量数据进入你的环境，对其进行分类和标记变得越来越困难。为什么不让 AI 尝试一下呢？
- en: In this solution, we’re going to walk through letting AI do just that. By leveraging
    Azure Computer Vision and Power Automate, you’ll be able to process images (either
    existing libraries or new content after it arrives), accelerating the content
    categorization process in your organization.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个解决方案中，我们将展示如何让 AI 做这件事。通过利用 Azure 计算机视觉和 Power Automate，你将能够处理图像（无论是现有的库还是新到达的内容），加速你组织中内容分类的过程。
- en: Before we get to the meat of the solution, let’s take a quick look at the technology
    we’ll be using.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入解决方案的核心之前，让我们快速了解一下我们将要使用的技术。
- en: What is computer vision?
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是计算机视觉？
- en: 'Azure Computer Vision is a Microsoft cloud service for analyzing images and
    extracting insights using AI algorithms and deep learning models. Computer Vision
    can be used to perform a number of image analysis and processing tasks. Azure
    Computer Vision has a number of different capabilities, including:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 计算机视觉是微软云服务，它使用 AI 算法和深度学习模型来分析和提取图像中的洞察力。计算机视觉可以用于执行多种图像分析和处理任务。Azure
    计算机视觉具有多种不同的功能，包括：
- en: '**Image classification**: This refers to classifying an image as a whole by
    identifying the main objects in the content. For example, you might train a model
    to identify images such as *Figure 11**.1* using the word “dog.”'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像分类**：这指的是通过识别内容中的主要对象来整体分类图像。例如，你可能训练一个模型来识别像 *图 11.1* 这样的图像，并使用“狗”这个词。'
- en: '![Figure 11.1 – Classifying an image as a dog](img/B21234_11_01.jpg)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.1 – 将图像分类为狗](img/B21234_11_01.jpg)'
- en: Figure 11.1 – Classifying an image as a dog
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.1 – 将图像分类为狗
- en: '**Object detection**: Similar to image classification, object detection is
    used to identify objects inside of an image. Objects are indicated through the
    use of a type of border called a **bounding box**. Object detection can typically
    identify different kinds of objects in a single image, as shown in *Figure 11**.2*.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对象检测**：与图像分类类似，对象检测用于识别图像中的对象。对象通过使用称为 **边界框** 的类型边界来指示。对象检测通常可以在单个图像中识别不同类型的对象，如图
    *图 11.2* 所示。'
- en: '![Figure 11.2 – Detecting objects in an image](img/B21234_11_02.jpg)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.2 – 在图像中检测对象](img/B21234_11_02.jpg)'
- en: Figure 11.2 – Detecting objects in an image
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.2 – 在图像中检测对象
- en: '**Semantic segmentation**: Another take on object classification, semantic
    segmentation refers to classifying the individual pixels of an object. This type
    of classification mechanism might be used to track items as they move through
    a video feed or captured video file.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义分割**：这是对对象分类的另一种看法，语义分割指的是对对象单个像素的分类。这种分类机制可能用于跟踪物品在视频流或捕获的视频文件中移动的情况。'
- en: '![Figure 11.3 – Viewing a semantic segregation image](img/B21234_11_03.jpg)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.3 – 查看语义分割图像](img/B21234_11_03.jpg)'
- en: Figure 11.3 – Viewing a semantic segregation image
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.3 – 查看语义分割图像
- en: '**Image analysis**: This type of detection employs multiple techniques, including
    machine learning models recognizing common features (edges, colors, shapes, patterns,
    and borders) and applying domain-specific knowledge to identify and describe objects.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像分析**：这种检测采用多种技术，包括机器学习模型识别常见特征（边缘、颜色、形状、模式和边界）并应用特定领域的知识来识别和描述对象。'
- en: '![Figure 11.4 – Processing an image with image analysis](img/B21234_11_04.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.4 – 使用图像分析处理图像](img/B21234_11_04.jpg)'
- en: Figure 11.4 – Processing an image with image analysis
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.4 – 使用图像分析处理图像
- en: '**Face detection**: A specialized form of object detection that identifies
    human faces in images. Classification and other techniques can be used to provide
    advanced recognition (such as identifying individuals).'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人脸检测**：一种特殊对象检测形式，用于在图像中识别人脸。分类和其他技术可以用来提供高级识别（如识别个人）。'
- en: '![Figure 11.5 – Identifying faces in an image](img/B21234_11_05.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图11.5 – 图像中的面部识别](img/B21234_11_05.jpg)'
- en: Figure 11.5 – Identifying faces in an image
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.5 – 图像中的面部识别
- en: '**Optical character recognition (OCR)**: Another form of specialized object
    detection, OCR recognizes letters and words in images.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**光学字符识别（OCR）**：另一种特殊对象检测形式，OCR识别图像中的字母和单词。'
- en: '![Figure 11.6 – Detected text in images](img/B21234_11_06.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图11.6 – 图像中检测到的文本](img/B21234_11_06.jpg)'
- en: Figure 11.6 – Detected text in images
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.6 – 图像中检测到的文本
- en: In each of the examples, computer vision is able to process a picture and extract
    individual features and objects to make them addressable by other computerized
    systems.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个示例中，计算机视觉能够处理图片并提取单个特征和对象，使它们可以通过其他计算机化系统访问。
- en: Designing a solution
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计解决方案
- en: As the introduction alluded to, we’ll be using the Azure Computer Vision service
    (originally part of Azure Cognitive Services, now rebranded as Azure AI Services).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如简介所暗示，我们将使用Azure计算机视觉服务（最初是Azure认知服务的一部分，现在重新命名为Azure AI服务）。
- en: Licensing prerequisites
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 许可先决条件
- en: 'Using AI models and connectors in Microsoft Power Platform has several prerequisites:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在Microsoft Power Platform中使用AI模型和连接器有几个先决条件：
- en: Premium licensing for Power Automate
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Power Automate的高级许可
- en: An Azure subscription
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Azure订阅
- en: A SharePoint Online subscription
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SharePoint Online订阅
- en: Once you have these in place, it’s time to set up computer vision!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦这些设置就绪，就是时候设置计算机视觉了！
- en: Configuring solution prerequisites
  id: totrans-35
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置解决方案先决条件
- en: Before you start the workflow configuration, you’ll need to set up a few things
    first—namely, a computer vision service and a SharePoint site.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始工作流配置之前，你需要先设置一些事情——即，一个计算机视觉服务和SharePoint网站。
- en: Creating a computer vision service
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建计算机视觉服务
- en: 'Create a computer vision service in your Azure subscription by following these
    steps:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤在Azure订阅中创建一个计算机视觉服务：
- en: Navigate to the Azure portal ([https://portal.azure.com](https://portal.azure.com))
    and sign in.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Azure门户([https://portal.azure.com](https://portal.azure.com))并登录。
- en: In the `Computer vision` and select **Computer vision**.
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`计算机视觉`下选择**计算机视觉**。
- en: On the **Computer vision** page, click **Create**.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**计算机视觉**页面，点击**创建**。
- en: '![Figure 11.7 – Creating a Computer vision service](img/B21234_11_07.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图11.7 – 创建计算机视觉服务](img/B21234_11_07.jpg)'
- en: Figure 11.7 – Creating a Computer vision service
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.7 – 创建计算机视觉服务
- en: Select a subscription, a resource group, a region, enter a name (it must be
    unique across the entire Azure space), and select a pricing tier. Click **Review
    +** **Create**.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个订阅、资源组、区域，输入一个名称（必须在整个Azure空间中唯一），并选择一个定价层。点击**审查+** **创建**。
- en: On the confirmation screen, click **Create**.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在确认屏幕上，点击**创建**。
- en: On the deployment **Overview** page, click **Go** **to resource**.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**部署概览**页面，点击**转到资源**。
- en: '![Figure 11.8 – Reviewing the overview page](img/B21234_11_08.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图11.8 – 审查概览页面](img/B21234_11_08.jpg)'
- en: Figure 11.8 – Reviewing the overview page
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.8 – 审查概览页面
- en: Under **Resource Management**, select **Keys** **and Endpoint**.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**资源管理**下，选择**密钥**和**端点**。
- en: Click **Show Keys**. Copy one of the API keys and the endpoint and save them
    to use later.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**显示密钥**。复制一个API密钥和端点，并保存以备后用。
- en: '![Figure 11.9 – Viewing the Keys and Endpoint page](img/B21234_11_09.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图11.9 – 查看密钥和端点页面](img/B21234_11_09.jpg)'
- en: Figure 11.9 – Viewing the Keys and Endpoint page
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.9 – 查看密钥和端点页面
- en: Next, we’ll set up a SharePoint library to store the images.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将设置一个SharePoint库来存储图像。
- en: Configuring a SharePoint library
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置SharePoint库
- en: While you can create a standard SharePoint library, there’s a benefit (both
    from the perspective of this project and in terms of broader functionality) to
    creating a team in Microsoft Teams and then building on top of the team-attached
    SharePoint library.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可以创建一个标准的SharePoint库，但创建一个Microsoft Teams团队并在团队附加的SharePoint库上构建（从项目角度和更广泛的功能角度来看）都有好处。
- en: Launch Microsoft Teams (or navigate to [https://teams.microsoft.com](https://teams.microsoft.com))
    and create a Team (**Teams** | **+** | **Create team** | **Create** **from scratch**).
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动 Microsoft Teams（或导航到 [https://teams.microsoft.com](https://teams.microsoft.com)）并创建一个团队（**团队**
    | **+** | **创建团队** | **从头开始创建**）。
- en: '![Figure 11.10 – Creating a team](img/B21234_11_10.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.10 – 创建团队](img/B21234_11_10.jpg)'
- en: Figure 11.10 – Creating a team
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.10 – 创建团队
- en: After the team has been created, navigate to the **General** channel, select
    the **Files** tab, and then select **Open in SharePoint** to navigate to the team’s
    connected SharePoint site.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 团队创建后，导航到 **通用** 通道，选择 **文件** 选项卡，然后选择 **在 SharePoint 中打开** 以导航到团队的连接 SharePoint
    网站。
- en: '![Figure 11.11 – Opening the team’s connected SharePoint site](img/B21234_11_11.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.11 – 打开团队的连接 SharePoint 网站](img/B21234_11_11.jpg)'
- en: Figure 11.11 – Opening the team’s connected SharePoint site
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.11 – 打开团队的连接 SharePoint 网站
- en: Select **Home** from the menu and then click **New** | **Document library**.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从菜单中选择 **主页**，然后点击 **新建** | **文档库**。
- en: '![Figure 11.12 – Creating a new document library](img/B21234_11_12.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.12 – 创建新的文档库](img/B21234_11_12.jpg)'
- en: Figure 11.12 – Creating a new document library
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.12 – 创建新的文档库
- en: From the list of available options, select **Media library**, as shown in *Figure
    11**.13*.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从可用选项列表中，选择 **媒体库**，如图 *图 11*.13* 所示。
- en: '![Figure 11.13 – Creating a media library](img/B21234_11_13.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.13 – 创建媒体库](img/B21234_11_13.jpg)'
- en: Figure 11.13 – Creating a media library
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.13 – 创建媒体库
- en: Click **Use template**.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **使用模板**。
- en: Click **Create**.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **创建**。
- en: Select the **Don’t add these features** checkbox, click **Next**, and then click
    **Got it**.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **不添加这些功能** 复选框，点击 **下一步**，然后点击 **明白了**。
- en: Inside the media library, select the gear icon to expand the **Settings** flyout.
    Select **Library settings**.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在媒体库内部，选择齿轮图标以展开 **设置** 飞出菜单。选择 **库设置**。
- en: '![Figure 11.14 – Expanding the Settings flyout](img/B21234_11_14.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.14 – 展开设置飞出菜单](img/B21234_11_14.jpg)'
- en: Figure 11.14 – Expanding the Settings flyout
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.14 – 展开设置飞出菜单
- en: On the **Library settings** flyout, select **More** **library settings**.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **库设置** 飞出菜单中，选择 **更多库设置**。
- en: 'Under **Columns**, select **Add from existing site columns**, as shown in *Figure
    11**.15*:'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **列** 下，选择 **从现有网站列添加**，如图 *图 11*.15* 所示：
- en: '![Figure 11.15 – Adding columns](img/B21234_11_15.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.15 – 添加列](img/B21234_11_15.jpg)'
- en: Figure 11.15 – Adding columns
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.15 – 添加列
- en: On the **Add Columns from Site Columns** page, select **Keywords** from the
    **Available site columns** list and click **Add**. This column will hold the keywords
    that computer vision generates when it processes the image.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **从网站列添加列** 页面上，从 **可用网站列** 列表中选择 **关键词** 并点击 **添加**。此列将保存计算机视觉在处理图像时生成的关键词。
- en: '![Figure 11.16 – Adding the Keywords column](img/B21234_11_16.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.16 – 添加关键词列](img/B21234_11_16.jpg)'
- en: Figure 11.16 – Adding the Keywords column
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.16 – 添加关键词列
- en: Click **OK** when finished.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成后点击 **确定**。
- en: Click on **Media library** in the site breadcrumb trail to navigate back to
    the media library page.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击网站导航栏中的 **媒体库** 返回到媒体库页面。
- en: Select the **View** dropdown (set to **All media** by default) and then select
    **Edit** **current view**.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **视图** 下拉菜单（默认设置为 **所有媒体**），然后选择 **编辑当前视图**。
- en: '![Figure 11.17 – Editing the current view](img/B21234_11_17.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.17 – 编辑当前视图](img/B21234_11_17.jpg)'
- en: Figure 11.17 – Editing the current view
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.17 – 编辑当前视图
- en: Under **Columns**, scroll down and select **Description**.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **列** 下，向下滚动并选择 **描述**。
- en: Scroll to the bottom of the page and click **OK** to save changes.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将页面滚动到最底部并点击 **确定** 保存更改。
- en: Depending on your screen size and browser zoom, you may need to scroll to the
    right to see the additional columns. At this point, you’ve got a library ready
    for images!
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的屏幕大小和浏览器缩放，您可能需要向右滚动才能看到额外的列。到此为止，您已经准备好了一个用于图像的库！
- en: Creating the flow
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建流程
- en: With all of the prerequisites out of the way, it’s time to start working with
    some automation! We’ll start with the trigger.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 所有先决条件都已准备就绪，现在是时候开始使用一些自动化工作了！我们将从触发器开始。
- en: Configuring the trigger
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置触发器
- en: This flow works best with an automated trigger, where it can process new images
    as they’re inserted into the library.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 此流程与自动触发器配合使用最佳，其中它可以处理新图像，当它们被插入到库中时。
- en: 'To configure the flow, follow these steps:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 要配置流程，请按照以下步骤操作：
- en: Navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com))
    and select **Create**.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Power Automate 制作门户([https://make.powerautomate.com](https://make.powerautomate.com))并选择**创建**。
- en: Under **Start from blank**, select **Automated** **cloud flow**.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**从空白开始**下，选择**自动化****云流程**。
- en: On the `Update image descriptions`) and select the **When a file is created
    (properties only)** SharePoint trigger.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`更新图像描述`操作中，选择**当文件创建时（仅属性）**SharePoint 触发器。
- en: Click **Create**.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**创建**。
- en: In the **When a file is created (properties only)** flyout, under **Site Address**,
    select the SharePoint site that contains the media document library you created
    in the prerequisites section.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**当文件创建时（仅属性）**弹出窗口中，在**站点地址**下，选择包含您在先决条件部分创建的媒体文档库的 SharePoint 站点。
- en: Under **Library Name**, select the library that you configured in the prerequisites
    section.
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**库名称**下，选择在先决条件部分配置的库。
- en: '![Figure 11.18 – Configuring the trigger](img/B21234_11_18.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.18 – 配置触发器](img/B21234_11_18.jpg)'
- en: Figure 11.18 – Configuring the trigger
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.18 – 配置触发器
- en: On the **When a file is created (properties only)** flyout, select the **Settings**
    tab.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在**当文件创建时（仅属性）**弹出窗口中，选择**设置**选项卡。
- en: Under `@or(endsWith(triggerOutputs()?['body/Name'],'.jpg'),endsWith(triggerOutputs()?['body/Name'],'.jpeg'),endsWith(triggerOutputs()?['body/Name'],'.bmp'),endsWith(triggerOutputs()?['body/Name'],'.png'),endsWith(triggerOutputs()?['body/Name'],'.gif'))`
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在`@or(endsWith(triggerOutputs()?['body/Name'],'.jpg'),endsWith(triggerOutputs()?['body/Name'],'.jpeg'),endsWith(triggerOutputs()?['body/Name'],'.bmp'),endsWith(triggerOutputs()?['body/Name'],'.png'),endsWith(triggerOutputs()?['body/Name'],'.gif'))`
- en: This creates a trigger condition that only processes files based on file extensions
    ending with `.jpg`, `.jpeg`, `.bmp`, `.png`, or `.gif`. See *Figure 11**.19*.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这将创建一个触发条件，仅处理以 `.jpg`、`.jpeg`、`.bmp`、`.png` 或 `.gif` 结尾的文件扩展名。见*图 11.19*。
- en: '![Figure 11.19 – Configuring a trigger condition](img/B21234_11_19.jpg)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.19 – 配置触发条件](img/B21234_11_19.jpg)'
- en: Figure 11.19 – Configuring a trigger condition
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.19 – 配置触发条件
- en: Further reading
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: 'You can learn more about the **Workflow Definition Language** used to create
    conditions and expressions here: [https://learn.microsoft.com/en-us/azure/logic-apps/workflow-definition-language-functions-reference](https://learn.microsoft.com/en-us/azure/logic-apps/workflow-definition-language-functions-reference).'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处了解用于创建条件和表达式的**工作流定义语言**：[https://learn.microsoft.com/en-us/azure/logic-apps/workflow-definition-language-functions-reference](https://learn.microsoft.com/en-us/azure/logic-apps/workflow-definition-language-functions-reference)。
- en: Press **Add an action** and select **Initialize variable**.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按**添加操作**并选择**初始化变量**。
- en: Update the name of the variable action by appending `– Description` to it.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在变量操作名称后追加`– 描述`来更新变量操作的名称。
- en: In the `Description`.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`描述`。
- en: In the **Type** field, select **String**. See *Figure 11**.20*.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**类型**字段中，选择**字符串**。见*图 11.20*。
- en: '![Figure 11.20 – Adding a variable action for Description](img/B21234_11_20.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.20 – 添加描述变量操作](img/B21234_11_20.jpg)'
- en: Figure 11.20 – Adding a variable action for Description
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.20 – 添加描述变量操作
- en: After the **Initialize variable - Description** action, add another **Initialize**
    **variable** action.
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**初始化变量 - 描述**操作之后，添加另一个**初始化****变量**操作。
- en: Update the name of the variable action by appending `– Keywords` to it.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在变量操作名称后追加`– 关键字`来更新变量操作的名称。
- en: In the `Keywords`.
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`关键字`。
- en: In the **Type** field, select **String**.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**类型**字段中，选择**字符串**。
- en: '![Figure 11.21 – Adding a variable action for Keywords](img/B21234_11_21.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.21 – 添加关键字变量操作](img/B21234_11_21.jpg)'
- en: Figure 11.21 – Adding a variable action for Keywords
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.21 – 添加关键字变量操作
- en: With the trigger and variables configured, it’s time to start working with AI!
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 配置好触发器和变量后，是时候开始使用 AI 进行工作了！
- en: Working with computer vision
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用计算机视觉
- en: In this section, we’ll pull in the content of the uploaded file and then send
    it to the Azure AI service that was configured earlier. Let’s go!
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将导入已上传文件的內容，并将其发送到之前配置的 Azure AI 服务。让我们开始吧！
- en: After the **Initialize variable - Keywords** action, add the **Get file content**
    SharePoint action.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**初始化变量 - 关键字**操作之后，添加**获取文件内容**SharePoint 操作。
- en: '![Figure 11.22 – Adding the Get file content using a path action](img/B21234_11_22.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.22 – 添加使用路径获取文件内容操作](img/B21234_11_22.jpg)'
- en: Figure 11.22 – Adding the Get file content using a path action
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.22 – 添加使用路径获取文件内容操作
- en: In the **Get file content using path** flyout, under **Site Address**, select
    the site for this exercise.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**获取文件内容使用路径**弹出菜单中，在**站点地址**下，选择此练习的站点。
- en: Under **File Identifier**, select the **Full Path** dynamic content token under
    the **When a file is created (properties** **only)** action.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**文件标识符**下，选择**完整路径**动态内容令牌，位于**当文件创建时（仅属性）**操作下。
- en: '![Figure 11.23 – Configuring the Get file content action](img/B21234_11_23.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图11.23 – 配置获取文件内容操作](img/B21234_11_23.jpg)'
- en: Figure 11.23 – Configuring the Get file content action
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.23 – 配置获取文件内容操作
- en: After the **Get file content using path** action, add the **Describe Image**
    Computer Vision API action. See *Figure 11**.24*.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**获取文件内容使用路径**操作之后，添加**描述图像**计算机视觉API操作。见*图11*.24*。
- en: '![Figure 11.24 – Adding the Describe Image action](img/B21234_11_24.jpg)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图11.24 – 添加描述图像操作](img/B21234_11_24.jpg)'
- en: Figure 11.24 – Adding the Describe Image action
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.24 – 添加描述图像操作
- en: On the **Create Connection** flyout, enter a name into the **Connection** **Name**
    box.
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**创建连接**弹出菜单中，在**连接名称**框中输入一个名称。
- en: Set the **Authentication Type** to **API Key**.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将**身份验证类型**设置为**API密钥**。
- en: In the **Account Key** field, enter the Computer Vision API key that you saved
    earlier while completing the prerequisites.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**账户密钥**字段中，输入在完成先决条件时保存的计算机视觉API密钥。
- en: In the **Site URL** field, enter the endpoint URL that you saved earlier while
    completing the prerequisites.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**站点URL**字段中，输入在完成先决条件时保存的端点URL。
- en: '![Figure 11.25 – Configuring the API connection](img/B21234_11_25.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![图11.25 – 配置API连接](img/B21234_11_25.jpg)'
- en: Figure 11.25 – Configuring the API connection
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.25 – 配置API连接
- en: Click **Create New**.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**创建新**。
- en: On the **Describe Image** flyout, under **Image Content**, select **Image Source**.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**描述图像**弹出菜单中，在**图像内容**下，选择**图像源**。
- en: Under **Image Source**, select **File Content** dynamic content token under
    the **Get file content using** **path** action.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**图像源**下，选择**文件内容**动态内容令牌，位于**获取文件内容使用** **路径**操作下。
- en: Click **Save**.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**。
- en: At this point, we can run a test to determine what type of output we have to
    work with. You’ll need a file or two that you can upload to the media library.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们可以运行一个测试来确定我们需要处理哪种类型的输出。你需要一个或两个可以上传到媒体库的文件。
- en: Follow these steps to run a quick test to check the output of the **Describe**
    **Image** action.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤运行快速测试以检查**描述** **图像**操作的输出。
- en: Inside Flow designer, click **Test**.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在流程设计器内部，点击**测试**。
- en: Select the **Manually** radio button.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**手动**单选按钮。
- en: In another browser tab or window, navigate to the SharePoint Online site that
    contains the media library.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在另一个浏览器标签或窗口中，导航到包含媒体库的SharePoint Online站点。
- en: Drag and drop or use the upload button to add your image to the library.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过拖放或使用上传按钮将你的图像添加到库中。
- en: '![Figure 11.26 – Uploading a test image](img/B21234_11_26.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图11.26 – 上传测试图像](img/B21234_11_26.jpg)'
- en: Figure 11.26 – Uploading a test image
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.26 – 上传测试图像
- en: Switch back to the browser tab or window that has the flow designer and review
    the run history after the flow completes.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在流程完成之后，切换回具有流程设计器的浏览器标签或窗口，并查看运行历史记录。
- en: After it has completed, select the **Describe Image Content** action and then,
    in the flyout, scroll to the **Outputs** section. Examine the **body** area.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成后，选择**描述图像内容**操作，然后在弹出菜单中滚动到**输出**部分。检查**正文**区域。
- en: '![Figure 11.27 – Examining the body area](img/B21234_11_27.jpg)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![图11.27 – 检查正文区域](img/B21234_11_27.jpg)'
- en: Figure 11.27 – Examining the body area
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.27 – 检查正文区域
- en: The body output is structured as a JSON object with a few notable schema items—`tags`
    object will get added to the **Keywords** column in the media library, while the
    value in the **Captions** column will be added to **Description**.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 正文输出是一个结构化的JSON对象，包含一些值得注意的架构项——`tags`对象将被添加到媒体库的**关键词**列中，而**字幕**列中的值将被添加到**描述**中。
- en: Click **Edit** in the Flow designer to return to editing the flow.
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在流程设计器中点击**编辑**以返回编辑流程。
- en: Add the **Set** **Variable** action.
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加**设置** **变量**操作。
- en: Rename the `– Description` to the title.
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将`– 描述`重命名为标题。
- en: Under **Name**, select **Description**.
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**名称**下，选择**描述**。
- en: In the **Value** field, add the **Captions Caption Text** dynamic content token
    from the **Describe Image Content** action, as shown in *Figure 11**.27*.
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**字段中，添加来自**描述图像内容**操作的**字幕文本**动态内容令牌，如图*图11*.27*所示。
- en: '![Figure 11.28 – Updating the Description variable](img/B21234_11_28.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图11.28 – 更新描述变量](img/B21234_11_28.jpg)'
- en: Figure 11.28 – Updating the Description variable
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.28 – 更新描述变量
- en: Add another **Set** **Variable** action.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加另一个**设置****变量**操作。
- en: Rename the `– Keywords` to the title.
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将`– Keywords`重命名为标题。
- en: 'In the **Value** field, add an expression. Paste the following expression into
    it:'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**字段中，添加一个表达式。将以下表达式粘贴到其中：
- en: '[PRE0]'
  id: totrans-167
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This expression takes all of the individual keywords from the **Describe Image**
    action output and appends them together, separated by a comma character.
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此表达式将**描述图像**操作输出的所有单个关键词连接起来，并用逗号分隔。
- en: Click **Save**.
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**。
- en: Next, we’ll send those updates back to the image file that was uploaded.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将这些更新发送回上传的图像文件。
- en: Updating the image details in the library
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新库中的图像详细信息
- en: Now that you have variables containing the content updates, it’s time to apply
    those back to the original image in the library.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您有了包含内容更新的变量，是时候将它们应用到库中的原始图像上了。
- en: After the **Set variable – keywords** action, add the **Update file properties**
    SharePoint action.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**设置变量 – 关键词**操作之后，添加**更新文件属性**SharePoint 操作。
- en: On the **Update file properties** flyout, under **Site Address**, select the
    site address containing the media library.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**更新文件属性**弹出窗口中，在**网站地址**下选择包含媒体库的网站地址。
- en: Under **Library Name**, select the media library.
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**库名称**下，选择媒体库。
- en: Under **Id**, select the **ID** dynamic content token from the **When a file
    is created (properties only)** trigger action.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**ID**下，从**当文件创建时（仅属性）**触发操作中选择**ID**动态内容令牌。
- en: Expand the **Advanced parameters** dropdown and select the **Keywords** and
    **Description** checkboxes.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开**高级参数**下拉菜单并选择**关键词**和**描述**复选框。
- en: In the **Keywords** field, add the **Keywords** dynamic content token under
    the **Variables** section.
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**关键词**字段中，在**变量**部分下添加**关键词**动态内容令牌。
- en: In the **Description** field, add the **Description** dynamic content token
    under the **Variables** section. See *Figure 11**.29*.
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**描述**字段中，在**变量**部分下添加**描述**动态内容令牌。见*图 11.29*。
- en: '![Figure 11.29 – Updating the file properties](img/B21234_11_29.jpg)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.29 – 更新文件属性](img/B21234_11_29.jpg)'
- en: Figure 11.29 – Updating the file properties
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.29 – 更新文件属性
- en: Click **Save**.
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**。
- en: Now, for the moment of truth!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，到了关键时刻！
- en: Testing the flow
  id: totrans-184
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试流程
- en: Now that the flow is fully configured, let’s try it out!
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 现在流程已完全配置，让我们试试看！
- en: Click the test icon.
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击测试图标。
- en: If you followed along earlier and tested the flow, you can select the **Automatically**
    radio button and then select **With a recently used trigger**, and then select
    a previous run of the flow. If you didn’t, select **Manually**. After making your
    selection, click **Test**.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您之前已经跟随操作并测试了流程，可以选中**自动**单选按钮，然后选择**使用最近使用的触发器**，然后选择流程的先前运行。如果没有，选择**手动**。做出选择后，点击**测试**。
- en: Upload a file if necessary.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如有必要，上传文件。
- en: Review the flow run history to ensure that the flow has been completed successfully.
    If it hasn’t, make adjustments based on the errors and retry.
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查流程运行历史记录以确保流程已成功完成。如果没有，根据错误进行调整并重试。
- en: '![Figure 11.30 – Reviewing the flow run history](img/B21234_11_30.jpg)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.30 – 查看流程运行历史](img/B21234_11_30.jpg)'
- en: Figure 11.30 – Reviewing the flow run history
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.30 – 查看流程运行历史
- en: Next, navigate to the SharePoint site containing the media library.
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，导航到包含媒体库的 SharePoint 网站。
- en: View the content in the **Keywords** and **Description** columns, as shown in
    *Figure 11**.31*.
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如*图 11.31*所示，查看**关键词**和**描述**列中的内容。
- en: '![Figure 11.31 – Reviewing the updated fields](img/B21234_11_31.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.31 – 查看更新的字段](img/B21234_11_31.jpg)'
- en: Figure 11.31 – Reviewing the updated fields
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.31 – 查看更新的字段
- en: To verify that the content is indeed searchable, you can click on the home icon
    in SharePoint to go to the main SharePoint landing page. Type a word from the
    **Keywords** column or part of the description of the image. You should get a
    return for the image from your media library.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了验证内容确实可搜索，您可以在 SharePoint 中点击主页图标进入主 SharePoint 登录页面。在**关键词**列中输入一个词或图像描述的一部分。您应该从您的媒体库中找到该图像的搜索结果。
- en: '![Figure 11.32 – Reviewing the output of the search](img/B21234_11_32.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.32 – 查看搜索输出](img/B21234_11_32.jpg)'
- en: Figure 11.32 – Reviewing the output of the search
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.32 – 查看搜索输出
- en: Congratulations! You’ve successfully verified the flow!
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！您已成功验证流程！
- en: Further exploration
  id: totrans-200
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步探索
- en: 'Now that you’ve got the basics under your belt, think about some of the things
    that you’ve learned in other chapters and how they might be useful to expand this
    flow:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经掌握了基础知识，思考一下在其他章节中学到的内容，以及它们如何有助于扩展这个流程：
- en: Posting a notification to a Teams channel that images were categorized
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在团队频道中发布通知，说明图片已被分类
- en: Generating a summary of image descriptions that were added to the media library
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成媒体库中添加的图片描述的摘要
- en: Explore how this can further enhance other workflows in your organization.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 探索如何进一步增强你组织中其他的工作流程。
- en: Summary
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we introduced the Azure AI Services Computer vision API. This
    API allows you to perform image content recognition and tagging and provides text
    outputs containing a description (or caption) as well as keywords (tags).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了Azure AI服务计算机视觉API。此API允许你执行图像内容识别和标记，并提供包含描述（或标题）以及关键词（标签）的文本输出。
- en: In the next chapter, we’ll harness the power of generative AI to create a bot
    that can answer questions!
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将利用生成式AI的力量来创建一个能够回答问题的机器人！
