- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting Started with Generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before we dive into the features and applications of GitHub Copilot, we want
    to make sure you have a basic understanding of the underlying technology. Having
    a grasp on the mechanics of generative AI gives you a solid foundation to have
    realistic expectations of what these tools can do for you and where they shine
    and where they have shortcomings. This understanding prevents disappointment when
    the technology doesn’t deliver the value you might have been expecting, something
    we have seen during the many training sessions and hackathons we have delivered.
    It also sets the right context for the things generative AI does not work so well
    with, as there are definitely some rough edges in its current state.
  prefs: []
  type: TYPE_NORMAL
- en: However, keep in mind that things are evolving fast, because the models, our
    understanding of working with models, and chaining features together, are all
    improving over time. This field has been rapidly accelerating over the last few
    years, jumping forward in leaps and bounds.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter explains the core concepts surrounding generative AI, where it
    is most utilized, and where the rough edges are. This is because it’s important
    to remember that generative AI is not a black box that is embedded with all the
    world’s factual knowledge, so it will not magically take over all your coding
    work. The better you understand this, and therefore the limitations, the better
    working with generative AI is, and the better the results will be as well, growing
    from expecting magic into tuning your usage to the right level of detail and gaining
    leaps of improvement in your own coding flow.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will dive into the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding generative AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilization of generative AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limitations of generative AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Generative **Artificial Intelligence** ( **AI** ) is the group name for the
    latest iterations of **Machine Learning** ( **ML** ). In the field of ML, you
    process large amounts of data to learn about the patterns in your data. This results
    in a trained model that can then be used to recognize these patterns or to predict
    certain values based on new parameters. The training data can be anything that
    is digitally available, from text to audio to images or video, and these models
    can be trained with all of it. Models trained on this type of textual data are
    called **language models** , as they can refer to concepts that can be expressed
    in natural (spoken) language.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot uses these models to handle specific tasks. The two types of
    media that are supported by GitHub Copilot are text and images. The focus is on
    text, as that is how we write or document our code. However, images can also be
    used in the chat interface with models that supp ort them. You might add an image
    to your question, and the model will try to describe what is visible in the image.
    The question that you ask is called a **prompt** . The language model then uses
    the prompt and other information that you shared (such as the image) to predict
    what it needs to respond with. That response will then be part of your conversation
    as well, and you can use that information in the follow-up questions.
  prefs: []
  type: TYPE_NORMAL
- en: You can see an example in *Figure 2.1* , where we added the image on the left
    to the chat context and asked GitHub Copilot to describe it. As you can see, a
    good description of the image has been provided.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1: Chatting with an image as extra context](img/B34107_02_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: Chatting with an image as extra context'
  prefs: []
  type: TYPE_NORMAL
- en: In the following subsections, we dive into the different types of language models
    that we know and how these are used for text prediction tasks. We will also look
    at system prompts and see that the size of the information we send to the model
    has an impact on the accuracy of the result.
  prefs: []
  type: TYPE_NORMAL
- en: Language models and sizes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we talk about language models, we always refer to the size of the data
    that the models were trained on, as that is an indicator of the type of tasks
    that they could be a fit for – the more data that the model has been trained on,
    the more generic the model is. The training data itself consists of terabytes
    and terabytes of data coming from different sources and in different formats and
    languages (both natural language and coding languages). This also leads to the
    naming concept of **Large Language Models** ( **LLMs** ).
  prefs: []
  type: TYPE_NORMAL
- en: There are also **Small Language Models** ( **SLMs** ) around that were trained
    with smaller amounts of data. Alongside that, there are models that are more focused
    on a specific topic group or on a specific type of task. They tend to perform
    better than larger models on that specific task and can therefore be chosen when
    working on that same type of task. These models are referred to as **specialized
    models** .
  prefs: []
  type: TYPE_NORMAL
- en: Using large amounts of training data also means that training these models can
    be very costly, as there is a large amount of computational power involved in
    the training phase. Those costs are up in the millions, ranging from 1 to 100
    million US dollars. That also means that companies that train these models only
    train the model once and then use the trained model from then on. Only when a
    new technological improvement happens, or there is a need to retrain to have access
    to the latest available data, will a model be retrained. That is why all those
    models are also labeled with a version that indicates their order in the timeline
    compared to other model releases. Every vendor follows their own setup and definition
    for these. They also differ in the way they train their models, the data that
    the model is trained on, and so on. The vendors compete with each other on the
    quality of the predictions, the speed of generating the result, or the length
    of the input and output they can handle.
  prefs: []
  type: TYPE_NORMAL
- en: Using LLMs for text prediction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We initially started using trained LLMs when we learned they could help us with
    text completion. This basic text prediction application can be seen in many places
    these days. When you type something in your phone or in your email editor, the
    application tries to predict what the next word is in your sentence and offers
    it for you for faster text input. This is what LLMs do as well, but on a larger
    scale – working on entire sentences or paragraphs. They also display a higher
    level of confidence in the probability of their output. The probability here refers
    to how likely it is that the next word matches your expectations.
  prefs: []
  type: TYPE_NORMAL
- en: 'This entire concept is what feeds the output of generative AI: based on the
    input (the existing text, image, or audio file), it tries to predict the next
    part of the sentence (or image, or audio file). It makes a calculation based on
    the probability score for the next part of the sentence. See *Figure 2.2* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2: Text prediction with example scoring values](img/B34107_02_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Text prediction with example scoring values'
  prefs: []
  type: TYPE_NORMAL
- en: Given the example sentence “The trees in the forest...”, we ask the language
    model to complete the sentence by filling in the blank at the end of the sentence.
    The figure shows some of the probability scores for the different completions
    it has found.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a good way to understand generative AI in its simplest form: it tries
    to complete your current sentence word by word. It predicts the likelihood of
    the next word, chooses the most likely one, and then starts a new calculation
    for the next word, and so on. Some models then also feed the input sentence back
    to the model, and the word it predicted, to score the suggestions and see if the
    sentence still makes sense. If it does not make sense, the suggestion can either
    stop or go back to the previous prediction and retry.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The reason generative AI can make accurate predictions is that the underlying
    language model has been trained on vast amounts of text, allowing it to learn
    the patterns and structures we commonly use. In natural languages, humans follow
    certain grammatical rules – such as using nouns and verbs in specific orders –
    to form coherent sentences. Interestingly, while these rules vary across languages,
    they often follow similar underlying patterns. For example, when expressing numbers,
    English uses the structure “forty-two” (tens before units), while in German, you
    would say “zweiundvierzig,” which translates to “two and forty.” French takes
    it a step further: the number 80 is expressed as “quatre-vingts,” or “four twenties.”
    These linguistic quirks reflect deeper cultural and structural differences in
    how languages handle concepts such as quantity and order. Language models learn
    to recognize and adapt to these nuances, which helps them generate more contextually
    accurate and natural-sounding output.'
  prefs: []
  type: TYPE_NORMAL
- en: Since a lot of the data the models are trained with has all sorts of different
    mismatched inputs or contains special notations or even typos, the models are
    not trained with just the words, but more on the *parts* of those words. This
    process is called **tokenization** , where the source text is broken up into smaller
    pieces, which can even include punctuation. *See Figure 2.3* for an example of
    breaking a sentence into tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.3: Breaking up text into tokens](img/B34107_02_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: Breaking up text into tokens'
  prefs: []
  type: TYPE_NORMAL
- en: '**To view this image in color**'
  prefs: []
  type: TYPE_NORMAL
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  prefs: []
  type: TYPE_NORMAL
- en: Each color represents a token, in this case, based on the tokenization method
    for the GPT-3.5 model (each model can handle tokenization in a different way).
    Notice that more common words are converted into a single token, whereas some
    more complex and less common words are broken up into multiple pieces. This is
    also an effect that can be different for each model.
  prefs: []
  type: TYPE_NORMAL
- en: Each token is converted into a mathematical array of numbers, and using those
    numbers, we can start plotting the tokens spatially to compare them based on how
    close they are in reference to each other. The closer one token is to another
    token, the more they are alike and could have the same meaning. This information
    is stored as output that we refer to as a “trained model.” The models then use
    that kind of information to find words that are alike, to be able to continue
    a given piece of text.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s illustrate this concept with an example. A trained model can have the
    concept of “an animal.” This means the tokens for the words of different animal
    names are “near” each other in the model. When you start combining that “an animal”
    can make “a sound” or “a noise,” as well as that we can “hear” the sound, you
    can now start predicting the next part of a given sentence, like the example in
    *Figure 2.4* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.4: Text prediction (I heard a cat …)](img/B34107_02_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Text prediction (I heard a cat …)'
  prefs: []
  type: TYPE_NORMAL
- en: The model has learned from all the references that a cat makes a different noise
    than an elephant and uses that context to determine the completion of the sentence.
    If the training data contains correct information to learn from, these concepts
    appear correctly in the output as well.
  prefs: []
  type: TYPE_NORMAL
- en: The reason this works so well with written text is because of all the structures
    we use in our natural languages. The code and **Software Development Kits** (
    **SDKs** ) we use as engineers to produce applications also follow similar structures
    and rules. These rules are even more strict than the things we do in our spoken
    language. An `if` statement in JavaScript always follows the same pattern – after
    the `if` statement, the evaluation code occurs, with a code block being executed
    if the `if` statement is satisfied, and potentially an `else` statement being
    executed if the initial requirements were not met. The same goes for a `for` loop,
    or case or switch statements, and so on. That means that generative AI based on
    LLMs works extremely well with our code bases, and that is where a lot of the
    value of tools such as GitHub Copilot comes from.
  prefs: []
  type: TYPE_NORMAL
- en: It’s often said that when a model finds similarities and patterns, it has an
    “understanding” of these concepts in our language, and therefore, the model can
    show signs of “reasoning” about these concepts. This is an example of humanizing
    the models in easy-to-understand concepts for us humans. The reality is that this
    is just a symptom of the probabilistic calculations that are based on how often
    the model has encountered that specific way of ordering text. In short, the model
    will just surface the thing it has seen the most in its training data.
  prefs: []
  type: TYPE_NORMAL
- en: System prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**System prompts** (also referred to as **system instructions** ) are additional
    instructions given to the raw model as an initial way to tell the model how it
    should respond, which gives vendors extra options to tune the way the model behaves
    in certain cases. The most common example of a system prompt is: `"You are a helpful
    assistant that focuses on <insert task>."` This sets up the LLM with extra information
    about the preferred way of working, which in turn helps the results to be more
    in line with the users’ expectations. Summarizing text needs a different way of
    directing than creating a new poem or writing a new piece of code.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The system prompt is always given first to the model, in this order:'
  prefs: []
  type: TYPE_NORMAL
- en: System instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: User instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Then we get a completion back from the model:'
  prefs: []
  type: TYPE_NORMAL
- en: System instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: User instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Model response
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The system prompt is applied by, for example, an editor with different content
    depending on the context. For example, specifically with GitHub Copilot, the chat
    functionality will have a different set of instructions compared to the inline
    suggestions functionality: the chat needs to explain concepts to the user, whereas
    the inline suggestions only need to show to code changes it would make, with an
    occasional comment left and right.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.5* shows the system prompt for the Llama2 model from Meta. It starts
    with framing the purpose of the model and then describes the way it should handle
    code generation. This helps the quality of the result to prevent issues with the
    markup of the suggested text and code:'
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/B34107_02_5.png) Figure 2.5: Llama2 system prompt'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see from the system prompt that there can be specific instructions
    in it that could show the strengths and weaknesses of the model itself. A lot
    of model vendors keep these instructions hidden to prevent that kind of information
    from being shared. Other vendors share their system prompts as part of their own
    documentation, so we can learn from them and see how it influences the suggestions
    coming back from those models. One of those vendors is Anthropic, which shares
    its system prompt (per model and model version) here: [https://docs.anthropic.com/en/release-notes/system-prompts](https://docs.anthropic.com/en/release-notes/system-prompts)
    . Feel free to take a look!'
  prefs: []
  type: TYPE_NORMAL
- en: Context sizes matter
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over time, we also learned that the more context or input we add to the question
    we ask, the better the quality of the predictions is as well. That is where prompt
    sizes come into play as well. Each different model has both a maximum input and
    a maximum output size – often referred to as the input or output **context size**
    . These sizes are referred to in terms of the number of tokens the model can handle
    and *cannot be exceeded* .
  prefs: []
  type: TYPE_NORMAL
- en: See *Figure 2.6* for some examples of different context sizes of some common
    models. If you calculate an average count of 500 words on a normal page of text
    and calculate with an average token split on a word as 1.33 tokens per word, we
    can estimate that a 32,000-token context size is around 49.1 pages of text that
    you can work with.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.6: Context sizes for different models](img/B34107_02_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.6: Context sizes for different models'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 2.6* also notes that the output size is often smaller than the input
    size. This depends on the internal feedback mechanism in the model that checks
    the output to keep it sensible. What we see in the usage of the models is that
    they generate really high-quality results on smaller amounts of predictions, as
    they use the given input to base the results on. That means that the more predictions
    they make, the less user input on the basis of the input can be used, and the
    quality of the predictions goes down over the length of the prediction, as it
    is based less and less on the initial data it was given.'
  prefs: []
  type: TYPE_NORMAL
- en: We will return to context size and how it can create limitations later in the
    chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have seen the basic concepts of generative AI, we can look at how
    we can leverage generative AI to get the benefits of it in almost every situation.
    The next section will show some of the different use cases that people are using
    these tools for, from generating text and code to generating videos complete with
    audio and music.
  prefs: []
  type: TYPE_NORMAL
- en: Ut ilization of generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To get the most benefit from generative AI, you need to let go of existing reasoning
    that might hold you back and open your mind to the possibilities. Generative AI
    is used in all types of work. The main way to use generative AI to start to work
    is by asking it a question/prompt, which is normally presented to it as text.
    There are tools that translate images or audio into text, and that will be the
    prompt for the generative AI models to start working with. The prompt is the starting
    point, and the model has been instructed to complete the prompt by generating
    the next predicted text.
  prefs: []
  type: TYPE_NORMAL
- en: General uses of AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The use cases we see generative AI being applied to range from office work,
    such as generating code, emails, presentations, or reports, to creating new images
    based on an input prompt, and even audio and video. But we are learning about
    new types of applications all the time. LLMs have a common understanding of languages,
    so we can use them to summarize documents or to create a meeting report with the
    notes and action points of the meeting, including the owner of those action points,
    or to translate documents/notes/meetings into the reader’s native language. The
    possibilities are endless. In the case of audio or video applications of generative
    AI, we see that the inputs are first translated into text (for example, by prompting
    “describe this image”), and then, based on that image, the completion for that
    prompt is generated as text, and that script is then used for the next prompt
    to complete the initial question.
  prefs: []
  type: TYPE_NORMAL
- en: Uses for structured versus unstructured information
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Generative AI can be used to extract meaningful information from unstructured
    data – data that doesn’t follow a predefined format, such as free-form text, emails,
    or conversation transcripts. For example, imagine a user writes a long paragraph
    describing their travel plans: “I’m thinking of flying out of New York sometime
    next week, maybe Tuesday or Wednesday, and heading to Paris for a conference.
    I’d prefer a morning flight if possible.” A traditional search system might struggle
    with this, but a generative AI model can understand the context and semantics
    of the entire message. It can identify the departure and arrival cities, the preferred
    dates, and even the time of day, all scattered across the text, and use that to
    help find relevant flight options. This ability to interpret and extract structured
    meaning from unstructured input is a key strength of large language models.'
  prefs: []
  type: TYPE_NORMAL
- en: Structured data refers to information that is organized in a predefined format,
    such as rows and columns in a spreadsheet or fields in a database. This kind of
    data is easy for traditional systems to process because each piece of information
    is clearly labeled and consistently placed. For example, a hotel booking system
    might store guest names, check-in dates, and room numbers in a structured table.
    However, even when this data is exported into a document such as a hotel bill
    (which may vary in layout and design), an LLM can still recognize and extract
    the relevant fields (such as hotel name, stay dates, and total cost) by understanding
    the context and labels in the text. This shows how LLMs can bridge the gap between
    structured data and its less structured representations.
  prefs: []
  type: TYPE_NORMAL
- en: Since it also knows multiple spoken languages and the way they are structured,
    it can be used to translate from one language to another. When given enough documents
    to search through, generative AI can be a big boost in finding the correct information
    in your dataset, instead of the old way of searching for keywords in the text
    and returning a list of potential documents to look at. We have even started to
    tune models to understand the context when we are asking questions, and then let
    them return and validate their results. This last example is what is referred
    to as “agentic AI,” where the model response is validated by one or more agents,
    and, for example, even tested if it has generated code.
  prefs: []
  type: TYPE_NORMAL
- en: Tools that use language models perform really well in all sorts of tasks, especially
    against structured text. The multimodal models even translate images, audio, or
    video, first into text so that the next step can work with that text as a starting
    point. Coding languages, of course, are all about structured text, as each language
    is specifically designed to implement code principles such as `if` statements
    and `for` loops that have to be written down in a defined format.
  prefs: []
  type: TYPE_NORMAL
- en: Tools such as GitHub Copilot have been set up for the type of context they have
    been built for, and work with both structured and unstructured data. The code
    part is very structured – parameters have a way to declare them, `if` statements
    have a structure, and so on. The method and variable names, and even the comments
    in the code base, on the other hand, are unstructured data. The LLMs will need
    to work with the semantic meaning of that to be able to determine what the intent
    of the code is.
  prefs: []
  type: TYPE_NORMAL
- en: Coding assistants use models that have seen a lot of code and coding guidelines.
    They are instructed to help the user produce more code and to use the same coding
    style as the surrounding project. Other tools, such as Microsoft 365, have been
    primed for their context as well. Microsoft Copilot for Teams uses multimodal
    models to make a translation from audio in a meeting into text as a transcript,
    then summarize the text and get the action points and action owners from a meeting,
    all in a few steps.
  prefs: []
  type: TYPE_NORMAL
- en: Uses of AI in coding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Generative AI is excellently suited for our current coding activities. Since
    we code in structured languages, GitHub Copilot can leverage language models to
    add more code, create new unit tests, create documentation, and much more. It
    can also translate our code from, for example, TypeScript to Python, or from English
    to Dutch. The possibilities are endless and are only limited by our own creativity.
    Do you need a review of your code base? Ask GitHub Copilot! Want to find places
    where you can optimize your code? Make it more maintainable? The models have seen
    so many references in both code and publications on how to learn and write code
    that they use that information to help you with your tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Since the basic coding concepts are very similar across different coding languages,
    generative AI can even translate these concepts between those languages as well.
    This is helpful when migrating from different versions of a framework – for example,
    Python 2 to Python 3, moving from synchronous code calls to asynchronous environments,
    or when you have a working example in Bash that you want to convert to PowerShell.
  prefs: []
  type: TYPE_NORMAL
- en: It does not matter how esoteric you think your code base is; there is a very
    good chance that GitHub Copilot can understand its syntax and can help you work
    with or understand that code base. We have shown people how to use it in their
    favorite coding language and then went beyond that with demos on architecture
    diagrams, infrastructure as code, and writing queries or creating dashboards,
    in tools such as Power BI, Splunk, and others. If there is a way to express the
    configuration of a tool as text, GitHub Copilot can probably be used to generate
    variations of that configuration as well.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will explain the limitations of generative AI to prevent
    you from thinking these tools are a black box that always produces high-quality
    results, and that you can trust whatever it returns.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are quite a few limitations to generative AI to be aware of. Having an
    understanding of these limitations also helps to have realistic expectations of
    what these tools can do for you. We will focus on three: bias, context size, and
    perceived reasoning versus non-deterministic reasoning.'
  prefs: []
  type: TYPE_NORMAL
- en: Bias
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first limitation to be aware of is that when LLMs are being created, they
    are trained in such a way that they focus on the data they have seen the most,
    in the order of the words they have seen the most. That means that the response
    they will generate is based on the common denominator of the source data. You
    can imagine that these models have seen the phrase “The capital of France is Paris”
    more often than many other capital cities and countries. Hence, they will most
    likely complete the prompt, “What is the capital of France?” with the correct
    answer, “Paris.” This means that the quality of the results of a model heavily
    depends on the source of that data. Well-curated data from multiple varied data
    sources is imperative for obtaining higher-quality results.
  prefs: []
  type: TYPE_NORMAL
- en: Since data sources can come from anywhere, they might not always contain factually
    correct information either. We call this phenomenon **bias** . If we trained a
    language model on a dataset that repeatedly mentioned that the world is flat,
    then it is likely that the model would start repeating this information too. Certain
    human predispositions can also end up in the data, with biases around race, faith,
    gender, and so on entering the training data. Even coding examples can be impacted
    by the use of outdated or incorrect patterns and practices.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some model vendors scan both input and output for this kind of bias, but that
    does not completely prevent the bias from being in the model and the output we
    use. GitHub Copilot leverages the Azure AI Content Safety filters that already
    help a lot, but of course, it is never a perfect guarantee against bias in your
    suggestions. You can find the Microsoft Azure documentation for the content safety
    filter here: [https://azure.microsoft.com/en-us/products/ai-services/ai-content-safety](https://azure.microsoft.com/en-us/products/ai-services/ai-content-safety)
    .'
  prefs: []
  type: TYPE_NORMAL
- en: 'Having bias in the model means we cannot fully trust that what the model will
    suggest to us is factually correct, which can be hard because it seems to be correct
    most of the time. Receiving seemingly correct answers most of the time leads to
    building up trust in the model that is easily overlooked. This ends up in us trusting
    *all* the results, and we then miss the places where it is incorrect. This process
    starts by us anthropomorphizing the model into showing human-like behavior: we
    speak of the model “reasoning” about both the prompt and the suggestions, or “having
    an understanding” of the task we want to complete. But this kind of thinking is
    a common pitfall, as humans like to simplify concepts into something that is close
    to our own constructs. Doing so will lead to expecting factual truths in the responses
    and then being frustrated when they turn out to be wrong or incomplete. You see
    this often when people complain about generative AI, where they ask it to complete
    a complex task and don’t give a lot of information. The response they get back
    often lacks any grounding in either the code base itself or the methodology that
    you want to use, and then goes off in a wrong or weird direction. Having this
    correct understanding is crucial in working with these models, and that is why
    we are spending this entire chapter on this topic.'
  prefs: []
  type: TYPE_NORMAL
- en: Context size
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another limitation to be aware of is the context sizes of the models. Look back
    at *Figure 2.6* and notice that every model has a different input and/or output
    size. That means these models have limitations on the context we can send to the
    model and then receive as a result.
  prefs: []
  type: TYPE_NORMAL
- en: If we then consider that sending in a lot of data to the model has both a networking
    cost associated with it and a duration of time to send the data across the network,
    you can understand that a provider has to make choices on what data to send in
    and what parts to leave out. That means that most providers, including GitHub
    Copilot, will not send in your entire code base to answer a question about the
    current method that you are working on. That would simply take too much time and
    cost too much compute power and thus money to execute.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are using the models here to write code for us, we need to have a speedy
    response; otherwise, people will just start typing in the code themselves. There
    needs to be a middle ground between those two options – fast response times versus
    completeness due to having more context – and that is why tools such as GitHub
    Copilot make decisions on what data they need to send to the model to get a response
    that has enough quality for the user to accept it. You can see that best in the
    chat interface shown in *Figure 2.7* .
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/B34107_02_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.7: Example of a partially used file (training-corpus.md)'
  prefs: []
  type: TYPE_NORMAL
- en: It shows either the complete file(s) that it is using as context or the relevant
    parts of the files. Based on the extra information in the prompt or from the editor,
    it can even choose to do a local file search first, to figure out which extra
    files are needed to have a higher-quality response to the prompt. All these are
    examples of consciously weighed decisions that are being made by the local editor.
  prefs: []
  type: TYPE_NORMAL
- en: Perceived reasoning versus non-deterministic results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We want to call out this limitation specifically, although it is also part of
    the bias limitation. We tend to perceive the results of generative AI as a perfect
    result, as it seems reasonable enough to be true. This is a normal human perception,
    as we place everything in our own context. And if that happens a couple of times
    in a row, we tend to start believing the results more and more.
  prefs: []
  type: TYPE_NORMAL
- en: To explain this further, let’s consider an outdoor shop that has an online customer-facing
    chatbot trained on its product catalog. A customer might ask the chatbot a question
    about a product, such as what tent would be appropriate for camping in the winter.
    It will likely return valuable information about the product, such as references
    to the height, width, and mass of the tent, and links to the places on the product
    page. This leads the user to trust the results and will not check all the references,
    as the response seems logical and reasonable. However, the customer does not realize
    that the LLM that is used generates the text based on the most likely continuation
    of the prompt and generated sentences. There is no fact-checking involved at all,
    only the expectation that the model uses the reference data to base its suggestions
    on. When the customer buys the product and it does not match up exactly to the
    description given by the bot, the customer will be very disappointed.
  prefs: []
  type: TYPE_NORMAL
- en: An example would be that the training data on the shop’s inventory only included
    *all-season* tents. When the customer asks a question on a specific *three-season*
    tent, the model will confidently reply that the tent is suited for all seasons,
    which is not true. This is called **perceived reasoning** . The model only reiterated
    what it had seen the most, and made a customer think that the product had properties
    that it didn’t, leading to a disappointed customer and a broken promise from the
    store’s website.
  prefs: []
  type: TYPE_NORMAL
- en: We also have the tendency to forget that these models are making calculations
    based on probabilistic mathematics. This leads to different results every time
    you ask it to complete your prompt. This is what is called a **non-deterministic
    result** . Ask a model to complete the same relatively complicated question 10
    times over, and you will get different responses most of the time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ultimately, the key concepts about generative AI to remember are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: The results are based on the data it has seen the most (bias)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The results are always non-deterministic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is no computation involved to generate/fact-check the answers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In our training sessions, we combine these ideas in a couple of examples to
    illustrate how language models display these traits. For the first example, consider
    the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The response to our prompt will be the number it has seen the most in its training
    data, where we humans have referred to the book that references this universal
    answer in thousands of different ways. The results show the bias of the model.
    You can try this out for yourself in any generative AI that has a chat window.
    Enter the prompt, remember the answer, then open a new chat session and enter
    the same prompt again – over ~99% of the time, you will get the same answer back.
  prefs: []
  type: TYPE_NORMAL
- en: Note that this bias is present in a lot of the early generations of LLMs, such
    as models before GPT-4o. Newer models have been subtly instructed to handle these
    use cases when making calculations with a method to seem more random, but the
    basic bias is still there. The example is to instill a healthy dose of precaution
    in you so that you always validate results, especially when these kinds of calculations
    are involved.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, in the same chat session, try asking the same question multiple times,
    *but in the same chat session* (so without clearing any history). Here, you will
    start to see more diverse answers. This stems from the fact that the model is
    non-deterministic: it weighs its results based on the information in the model,
    together with the information in your chat history. Looking at *Figure 2.8* ,
    each time we started a chat session and asked the prompt, the answer was 42 (this
    is the answer the model has been trained on the most). But when asked a second
    and third time, it tries to produce different results, including 87, 27, and 23::'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.8: Several chat sessions next to each other with the same prompts,
    using the GPT-4o model of OpenAI](img/B34107_02_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.8: Several chat sessions next to each other with the same prompts,
    using the GPT-4o model of OpenAI'
  prefs: []
  type: TYPE_NORMAL
- en: Note that the second number (27) was still the same in two out of the three
    results, so here we see the same bias present when it generated the original number.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a third example, to show that there is no computation involved in the models,
    but only mathematical expressions on the most likely suggestion, we can ask the
    model to do simple calculations, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'We anthropomorphize the model into thinking it will actually interpret the
    given text and “reason” its way to the correct answer of “three” by breaking up
    the word into the specific letters. However, *Figure 2.9* shows that this is not
    the case:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.9: Prompting the model to count letters](img/B34107_02_9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.9: Prompting the model to count letters'
  prefs: []
  type: TYPE_NORMAL
- en: You can see that the model has been configured to handle these situations as
    it takes the steps that a person would also take – the model starts to break up
    the word into pieces and work its way through the problem, looking for proof of
    the search letter (“r”) in the provided search word. Where it goes wrong is when
    it tries to complete the response token by token, instead of actually breaking
    up the word into individual letters and then counting those. In fact, there is
    no counting involved at all.
  prefs: []
  type: TYPE_NORMAL
- en: This “step-by-step” reasoning is behavior that has been added to the system
    prompt that instructs the model to tackle the problem by first explaining the
    steps it would need to take to solve it and then walking its way through those
    steps. Earlier versions of the models did not have those instructions, which made
    the quality of the results a lot worse, since they would only give a random number
    of how many times the search letter occurs in the original word, based on a number
    they had seen the most (often in relation to the search word as well).
  prefs: []
  type: TYPE_NORMAL
- en: Our industry is now at the point where model vendors are setting up their own
    system prompts with so much text (we have seen 15 pages or more instructions!),
    to attempt to get better results out of their models.
  prefs: []
  type: TYPE_NORMAL
- en: 'For these newer models, this tactic works and that lures users into believing
    the models more, but in reality, it obfuscates the truth that the models do not
    do any calculations. Of course, the next steps are adding detection for these
    types of prompts and feeding the data into a specific algorithm that can handle
    these use cases to make it more accurate. It is important to keep this phenomenon
    of anthropomorphizing in mind. The models have been set up to be helpful assistants,
    and that is what they will try to be: they will almost always try to give you
    an answer, even though that answer might be completely wrong. In their responses,
    they will always tell the user that their prompts are so clever and that the user
    is always correct.'
  prefs: []
  type: TYPE_NORMAL
- en: You can see this effect in *Figure 2.10* . The model tries its best to be very
    confident in the answer, and there is not a single hint in the response that it
    is not sure about the results. However, you need to remember that LLMs are biased,
    do not reason, and are configured to please you. With that knowledge, you can
    apply the right steps to prevent producing these kinds of fictional results as
    well as validating everything. In this case, the outcomes of calculations are
    incorrect, both for the base area as well as the second calculation for the volume
    (even with the incorrect numbers, the outcome is still not what the model predicts).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.10: Confident results with a calculation](img/B34107_02_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.10: Confident results with a calculation'
  prefs: []
  type: TYPE_NORMAL
- en: To validate the calculation from *Figure 2.10* , we asked instead to create
    a script for this calculation. Executing the script will use the actual mathematical
    calculation (assuming the calculation is correct, of course; that is up to you
    to confirm). With that result, we can see the difference between the actual calculation
    and the response of the model. *Figure 2.11* shows this difference in the chat
    window. Notice how subtle that difference is.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.11: Validate the answers given by generative AI!](img/B34107_02_11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.11: Validate the answers given by generative AI!'
  prefs: []
  type: TYPE_NORMAL
- en: You must rely on your engineering skills to know how to handle the results and
    validate the actual working of anything generated (similar to how you worked before
    using generative AI as a tool!). In this case, it is a matter of some rounding
    in between, so the model output is pretty good. You can understand that having
    these errors might permeate through the entire application you are building, which
    can have a big impact in the end.
  prefs: []
  type: TYPE_NORMAL
- en: Note the spelling mistakes in the prompt and how the model responds to the user.
    Even though we requested the information on the “piramid of Gizeh,” the model
    stays in its role and answers fluently with the correct name in English (Giza),
    along with the correct spelling of “pyramid.” The model does not even indicate
    to the user that there was something wrong there. This stems from the training
    of the model, where small typos do not matter for the quality of the result.
  prefs: []
  type: TYPE_NORMAL
- en: Model memory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: People often do not realize that every single interaction with GitHub Copilot
    starts over from the beginning. A model is normally hosted by a provider in a
    “read-only” mode, to prevent data from one customer (or chat session) from flowing
    over into the next. It is also far too costly to host these models with a sense
    of memory for every single chat conversation for every single user. Having no
    memory also means that the *entire conversation* will get sent to the model every
    single time you give it a prompt!
  prefs: []
  type: TYPE_NORMAL
- en: The first time you ask the model a question, your prompt is sent through the
    service hosting the model for you. The model provider (the party that hosts the
    service) will add their own system instructions to the prompt to potentially prohibit
    unwanted responses and then instruct the model how to “behave” and respond. The
    behavior instructs it, for example, to only provide code examples or to respond
    more in a chat conversation while explaining things.
  prefs: []
  type: TYPE_NORMAL
- en: Added to that is your prompt or “user instructions.” The model runs the complete
    prompt and sends back the “model response.” This flow is also referred to as a
    chat “turn.” When you continue the conversation with a follow-up question, the
    entire conversation will be sent again to the service *as a whole* ! This is because
    the service provider, as well as the model, does not store the conversation on
    its end, and thus there is no concept of memory on either the model or the service
    provider side of things (note that some providers, such as ChatGPT, are adding
    it to their services, but overall the model itself does not provide this type
    of functionality).
  prefs: []
  type: TYPE_NORMAL
- en: 'We mentioned this flow earlier, but as a reminder, the parts that are sent
    to the model are always in the following order and setup:'
  prefs: []
  type: TYPE_NORMAL
- en: System instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: User instructions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Model response
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: New user instructions from the chat conversation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Model response
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This flow also highlights that it is not possible for the service provider to
    keep track of your entire repository with all the files it contains, as it is
    not feasible to send that over the connection for every single turn of your conversation.
    Even for a small repo, this type of data would add up over time and would become
    too costly.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, keep this in mind with your interactions with generative AI and GitHub
    Copilot, as you are in control of the context you give the model in your conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: Feed it enough information to act as correctly as possible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have realistic expectations of what it can do.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be the pilot! That means being direct in giving the models what you *want* to
    achieve, thereby steering them in the right direction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding the limits gives you realistic expectations, so that you can use
    GitHub Copilot where it shines, helping you to understand code and add new features
    to the code base.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we looked at the foundations of generative AI overall, with
    specific references to GitHub Copilot. Having a good understanding of the inner
    workings of generative AI is crucial to prevent disappointments and get the most
    out of these tools, as you will know where their boundaries are, so you can guide
    them in the right direction.
  prefs: []
  type: TYPE_NORMAL
- en: We also discussed the current limitations of generative AI and how model vendors
    are adding smart remediations to those shortcomings, and we showed that this is
    only hiding them beneath the surface, furthering the notion that these models
    seem to be able to do anything, whereas, in reality, they cannot. Having this
    understanding helps you to know how to work with tools such as GitHub Copilot
    with realistic expectations, so that you can get the best results to help you
    along your coding journey and greatly speed up your normal flow of working.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will learn about the different plans there are for getting
    a GitHub Copilot license. You can get started for free to try things out and see
    how well it works in your specific environment, editor, and code base. When you
    run into limitations with the free versions, we will show you all the different
    paid plans available, as well as the differences, to help you choose the best
    plan for you.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
